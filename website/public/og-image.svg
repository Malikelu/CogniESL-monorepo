<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f4f4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles — subtle teal -->
  <circle cx="1080" cy="80" r="220" fill="#0b7272" opacity="0.04" />
  <circle cx="120" cy="530" r="160" fill="#0b7272" opacity="0.03" />
  <circle cx="950" cy="560" r="110" fill="#1baa6e" opacity="0.06" />

  <!-- Bottom accent strip -->
  <rect x="0" y="618" width="1200" height="12" fill="#0b7272" />

  <!-- C-arc wordmark — large, centered-left -->
  <g transform="translate(80, 160) scale(3.5)">
    <path d="M 45,50 A 18,18 0 1,1 45,21" fill="none" stroke="#0b7272" stroke-width="9" stroke-linecap="round"/>
    <line x1="45" y1="21" x2="57" y2="9" stroke="#1baa6e" stroke-width="8" stroke-linecap="round"/>
    <text x="52" y="55" font-size="38" fill="#0b7272" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-weight="500">ogni</text>
    <text x="128" y="55" font-size="38" fill="#1baa6e" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-weight="500" letter-spacing="2">ESL</text>
  </g>

  <!-- Tagline -->
  <text x="88" y="415" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="400" fill="#374151">L1-aware teaching materials, made in minutes.</text>

  <!-- Sub-tagline -->
  <text x="88" y="460" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="18" fill="#6b7280">Slides · Worksheets · Flashcards · Activity Guides — for 31 native languages</text>

  <!-- Feature badges -->
  <rect x="88" y="495" width="148" height="36" rx="18" fill="#0b7272" opacity="0.10"/>
  <text x="162" y="518" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#0b7272" font-weight="600" text-anchor="middle">31 Languages</text>

  <rect x="250" y="495" width="168" height="36" rx="18" fill="#0b7272" opacity="0.10"/>
  <text x="334" y="518" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#0b7272" font-weight="600" text-anchor="middle">Under 30 Seconds</text>

  <rect x="432" y="495" width="168" height="36" rx="18" fill="#1baa6e" opacity="0.12"/>
  <text x="516" y="518" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#1baa6e" font-weight="600" text-anchor="middle">L1 Interference AI</text>

  <!-- Right side: chat mockup panel -->
  <g transform="translate(710, 80)">
    <rect x="0" y="0" width="420" height="420" rx="20" fill="white" opacity="0.85"/>
    <rect x="0" y="0" width="420" height="44" rx="20" fill="#f5f5f4"/>
    <rect x="0" y="24" width="420" height="20" fill="#f5f5f4"/>
    <circle cx="22" cy="22" r="7" fill="#FF6B6B" opacity="0.7"/>
    <circle cx="44" cy="22" r="7" fill="#F4A261" opacity="0.7"/>
    <circle cx="66" cy="22" r="7" fill="#2EC4B6" opacity="0.7"/>
    <text x="400" y="27" font-family="monospace" font-size="11" fill="#9ca3af" text-anchor="end">CogniESL</text>

    <!-- User message bubble -->
    <rect x="210" y="58" width="190" height="52" rx="14" fill="#0b7272"/>
    <text x="220" y="79" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="white" opacity="0.95">Spanish students. Present</text>
    <text x="220" y="96" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="white" opacity="0.95">perfect vs. past simple.</text>

    <!-- AI response bubble -->
    <rect x="20" y="125" width="370" height="130" rx="14" fill="#f0f9f9"/>
    <text x="35" y="150" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1baa6e" font-weight="600">🔍 Found 3 L1 interference patterns</text>
    <text x="35" y="172" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#374151">• Spanish preterite ≠ English present perfect</text>
    <text x="35" y="191" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#374151">• 'Ya' → 'already' overuse pattern</text>
    <text x="35" y="210" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#374151">• Missing 'have/has' auxiliary verb</text>
    <text x="35" y="240" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#9ca3af">Generating your materials...</text>

    <!-- Done bubble -->
    <rect x="20" y="268" width="370" height="54" rx="14" fill="#e6f4f4"/>
    <text x="35" y="291" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0b7272" font-weight="600">✅ Done! 18 slides · worksheet · flashcards</text>
    <text x="35" y="310" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#0b7272">Spanish L1 Oracle slide included</text>

    <!-- Format row -->
    <rect x="20" y="338" width="80" height="28" rx="8" fill="#0b7272" opacity="0.12"/>
    <text x="60" y="357" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0b7272" font-weight="600" text-anchor="middle">Slides</text>
    <rect x="112" y="338" width="90" height="28" rx="8" fill="#0b7272" opacity="0.12"/>
    <text x="157" y="357" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0b7272" font-weight="600" text-anchor="middle">Worksheet</text>
    <rect x="214" y="338" width="90" height="28" rx="8" fill="#1baa6e" opacity="0.15"/>
    <text x="259" y="357" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#1baa6e" font-weight="600" text-anchor="middle">Flashcards</text>
    <rect x="316" y="338" width="76" height="28" rx="8" fill="#0b7272" opacity="0.12"/>
    <text x="354" y="357" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#0b7272" font-weight="600" text-anchor="middle">Activities</text>

    <!-- Watermark -->
    <g transform="translate(340, 390) scale(0.45)">
      <path d="M 45,50 A 18,18 0 1,1 45,21" fill="none" stroke="#0b7272" stroke-width="9" stroke-linecap="round"/>
      <line x1="45" y1="21" x2="57" y2="9" stroke="#1baa6e" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- URL -->
  <text x="88" y="610" font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif" font-size="14" fill="#9ca3af">cogniesl.com</text>
</svg>
