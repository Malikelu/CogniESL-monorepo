<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Space+Grotesk:wght@500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./_theme.css" />
    <style>

    * { box-sizing: border-box; }
    html, body {
      width: 1280px;
      height: 720px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #0f0f0f;
    }
    body {
      position: relative;
    }
    .slide-wrapper {
      width: 1280px;
      height: 720px;
      margin: 0;
      padding: 0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background-color: #151517;
      color: #ffffff;
    }
    .bg-grid {
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E");
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
    }
    .title-font {
      font-family: 'Space Grotesk', sans-serif;
    }
    .slide {
      width: 100%;
      height: 100%;
      padding: 0;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }
    .content-safe-area {
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding: 54px 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .canvas {
      width: 100%;
      height: 100%;
    }

    </style>
  </head>
  <body>
    <div class="slide-wrapper bg-grid">
      <div class="slide">
        <div class="content-safe-area">

        </div>
      </div>
    </div>
  </body>
</html>
