grammar_point: adverb_phrase_position
title: "Position of Adverb Phrases"
description: "Where adverbs and adverb phrases go in a sentence — front, mid, and end position. Different types of adverbs have different preferred positions."
level: B2

meaning:
  core_meaning: "Adverbs can go in different positions in a sentence. The position depends on the type of adverb and what you want to emphasize. Front position adds emphasis, end position is neutral."
  timeline: "Depends on the tense used."
  contrast: "Front position = Yesterday, I went to the store. (emphasis) vs End position = I went to the store yesterday. (neutral)"
  ccqs:
    - question: Is the adverb at the beginning, middle, or end?
      answer: Different positions have different emphasis.
    - question: What type of adverb is it?
      answer: Manner, frequency, time, or place — each has preferred positions.
  example_generator:
    contexts:
      - sentence structure
      - emphasis
      - formal writing
      - spoken English
    cultural_notes:
      - Word order errors with adverbs are very common across L1 groups
      - Some L1 speakers put all adverbs at the end
    min_examples: 5

form:
  affirmative:
    structure: "Front: Yesterday, I went to the store. / Mid: I always go to the store. / End: I went to the store yesterday."
    example_generator:
      contexts:
        - front position
        - mid position
        - end position
      min_examples: 4
  negative:
    structure: "Same positions: Never have I seen such a thing. (front with inversion) / I never go there. (mid)"
    example_generator:
      contexts:
        - negative adverbs
        - inversion
      min_examples: 3
  questions:
    structure: "Where does the adverb go?"
    example_generator:
      contexts:
        - question formation
      min_examples: 3

sub_rules:
  - rule: Frequency adverbs — mid position before main verb, after be
    type: word_order
    examples:
      - I always eat breakfast.
      - She is never late.
      - They often go out.
  - rule: Manner adverbs — end position
    type: word_order
    examples:
      - She speaks English fluently.
      - He drove carefully.
  - rule: Time adverbs — front or end position
    type: word_order
    examples:
      - Yesterday, I went to the store.
      - I went to the store yesterday.
  - rule: Place adverbs — end position
    type: word_order
    examples:
      - I live here.
      - She went home.
  - rule: Front position with inversion for negative adverbs
    type: word_order
    examples:
      - Never have I seen such a thing.
      - Seldom do we see him.

use:
  - context: Emphasizing information
    description: Moving adverbs to the front for emphasis
    examples:
      - Rarely do we see such talent.
      - Only then did I understand.
  - context: Natural speech
    description: Using mid-position for frequency adverbs
    examples:
      - I always wake up early.
      - She is usually on time.

phonetics:
  - note: Stress changes with position — front position gets more emphasis
    example_generator:
      contexts:
        - emphasis
    l1_issue: Many L1 speakers put all adverbs at the end, sounding unnatural

teaching:
  methodology: Guided discovery
  tips:
    - Use the MIFF rule for position
    - Practice moving adverbs and noticing emphasis changes
  recommended_activities:
    - name: Adverb Position Game
      duration: 10
      adaptation_notes: Students move adverbs to different positions and notice meaning changes.
