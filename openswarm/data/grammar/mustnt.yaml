grammar_point: mustnt
title: Mustn't (prohibition)
description: Modal verb used to express strong prohibition, meaning something is not
  allowed under any circumstances.
level: A2
meaning:
  core_meaning: Expresses absolute prohibition; something is forbidden by rule, law,
    or authority.
  timeline: Refers to present or future actions; prohibition applies to the time of
    speaking or future.
  contrast: 'Mustn''t = Strong prohibition (forbidden): "You mustn''t park here" (illegal)

    Don''t have to = No obligation (allowed but not required): "You don''t have to
    come" (optional)

    Can''t = Informal prohibition: "You can''t sit here" (casual)

    '
  ccqs:
  - question: Does must not mean the same as do not have to
    answer: No. Must not = prohibition (forbidden). Do not have to = no obligation
      (optional).
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: Subject + mustn't (must not) + base verb
    example_generator:
      contexts:
      - health and wellbeing
      - weather and nature
      - social interactions
      min_examples: 4
  negative:
    structure: Mustn't is already negative; no additional negative forms.
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: Must + subject + not + base verb? (rare, use 'Are we allowed to...?'
      instead)
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Must not expresses prohibition — something is forbidden or not allowed
  type: semantic
  examples:
  - You must not smoke here (it is forbidden)
  - You must not park on double yellow lines (it is prohibited)
  - Students must not use their phones in class (rule)
- rule: Must not is different from do not have to. Must not = forbidden. Do not have
    to = optional
  type: semantic
  examples:
  - You must not park here (prohibition — you are not allowed)
  - You do not have to park here (no obligation — you can park elsewhere)
  - You must not eat in the library (forbidden)
  - You do not have to eat in the cafeteria (optional — you can bring lunch)
- rule: Must not is often used in formal rules, signs, and official announcements
  type: register
  examples:
  - Visitors must not feed the animals (zoo sign)
  - You must not enter without authorization (official notice)
  - Passengers must not stand while the plane is moving (announcement)
use:
- name: Legal/Rule Prohibition
  description: Talk about actions forbidden by law, school rules, or official policies.
  examples:
  - You mustn't drive over 120 km/h.
  - Students mustn't use phones in class.
  key_point: Prohibition is enforced by authority.
- name: Safety Prohibition
  description: Forbid actions that are dangerous or harmful.
  examples:
  - You mustn't touch the electrical wires.
  - Children mustn't play with matches.
  key_point: Focuses on preventing harm.
- name: Strong Personal Prohibition
  description: Forbid actions in personal contexts (stronger than 'don't').
  examples:
  - You mustn't tell anyone my secret.
  - We mustn't forget her birthday.
  key_point: Speaker has strong authority or emotional investment.
phonetics:
- note: Must not is pronounced /mʌsnt/ or /mʌsənt/. The /t/ is often unreleased or
    a glottal stop in connected speech.
  example_generator:
    contexts:
    - must not pronunciation
  l1_issue: Learners may confuse must not and do not have to in listening. Teach the
    clear pronunciation of must not vs the reduced form of don't have to.
teaching:
  methodology: PPP
  tips:
  - 'Use real rules: School rules, traffic signs, safety warnings.'
  - 'Role-play: Teacher gives class rules using ''mustn''t''.'
  - 'Contrast with ''don''t have to'' using scenarios: ''You mustn''t cheat'' (forbidden)
    vs ''You don''t have to cheat'' (optional, but don''t do it).'
  - Practice with safety and legal contexts.
  recommended_activities:
  - name: Sign Interpretation
    duration: 10
    adaptation_notes: Show students real-world signs (no smoking, no parking). Students
      explain the meaning using must not.
  - name: Must Not or Do Not Have To
    duration: 15
    adaptation_notes: 'Students choose: ''You ___ wear a uniform.'' (must not — forbidden)
      ''You ___ wear a tie.'' (do not have to — optional).'
