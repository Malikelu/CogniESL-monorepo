grammar_point: modals
title: "Modal Verbs (can, could, may, might, will, would, shall, should, must)"
description: "Auxiliary verbs that express ability, permission, possibility, obligation, or prediction. Used with the base form of the main verb (no -s, -ing, -ed)."
level: A2

meaning:
  core_meaning: "Modal verbs express the speaker's attitude toward an action — whether it is possible, permitted, obligatory, or likely. They do not describe the action itself but the speaker's judgment about it. All modals are followed by the base form of the main verb (no to, no -s, no -ing)."
  timeline: "Varies by modal: can (present ability), could (past ability), will (future prediction), must (present obligation), might (future possibility)."
  contrast: "'Can' = present ability/permission (I can drive.) vs 'Could' = past ability/polite request (I could drive when I was 18.) vs 'Must' = strong obligation (You must wear a seatbelt.)"
  ccqs:
    - question: "Is this about what someone is able to do, or what they are allowed to do?"
      answer: "Ability = can/could. Permission = can/may/could."
    - question: "Is this about something that is certain, possible, or obligatory?"
      answer: "Certain = will. Possible = may/might/could. Obligation = must/should."
    - question: "Does the modal change form for he/she/it (add -s)?"
      answer: "No — modals never change form. 'He can' NOT 'He cans'. 'She must' NOT 'She musts'."
  example_generator:
    contexts:
      - ability and skills
      - permission and requests
      - obligation and rules
      - possibility and predictions
      - advice and recommendations
    cultural_notes:
      - "Use diverse scenarios (workplace, school, travel, daily life)"
      - "Be mindful of cultural differences in politeness — 'may' is more formal than 'can' for permission"
      - "Avoid examples with alcohol, gambling, or illegal activities"
    min_examples: 5

form:
  affirmative:
    structure: "Subject + modal + base verb (no to, no -s, no -ing, no -ed)"
    example_generator:
      - "I can swim."
      - "She must go."
      - "They should study."
      - "He might come."
    min_examples: 4
  negative:
    structure: "Subject + modal + not + base verb (contractions: can't, couldn't, mustn't, shouldn't, won't, wouldn't, mightn't)"
    example_generator:
      - "I cannot (can't) swim."
      - "She must not (mustn't) go."
      - "They should not (shouldn't) study."
      - "He might not (mightn't) come."
    min_examples: 4
  questions:
    structure: "Modal + subject + base verb?"
    example_generator:
      - "Can you swim?"
      - "Must she go?"
      - "Should they study?"
      - "Might he come?"
    min_examples: 4

sub_rules:
  - rule: "Modals never change form — no -s for third person, no -ing, no -ed"
    type: grammatical
    examples: ["He can swim. (NOT He cans)", "She must go. (NOT She musts)", "They should study. (NOT They shoulds)"]
  - rule: "Modals are always followed by the base verb (no 'to')"
    type: grammatical
    examples: ["I can swim. (NOT I can to swim)", "She must go. (NOT She must to go)"]
  - rule: "Can/cannot for ability and permission"
    type: semantic
    examples: ["I can speak English. (ability)", "Can I leave early? (permission)", "You cannot park here. (prohibition)"]
  - rule: "May/might for possibility and formal permission"
    type: semantic
    examples: ["It might rain. (possibility)", "May I come in? (formal permission)", "She may be late. (possibility)"]
  - rule: "Must/should for obligation and advice"
    type: semantic
    examples: ["You must wear a seatbelt. (strong obligation)", "You should study more. (advice)", "We must not be late. (prohibition)"]
  - rule: "Will/would for predictions and polite requests"
    type: semantic
    examples: ["It will rain tomorrow. (prediction)", "Would you help me? (polite request)", "I would like some coffee. (polite desire)"]
  - rule: "Could for past ability and polite requests"
    type: semantic
    examples: ["I could run fast when I was young. (past ability)", "Could you open the window? (polite request)", "Could I borrow your pen? (polite request)"]

use:
  - context: "Ability (can/could)"
    description: "Expressing what someone is or was able to do"
    examples: ["She can play the piano.", "He could run fast as a child.", "I can speak three languages.", "They could not find the address."]
  - context: "Permission (can/may/could)"
    description: "Asking for or giving permission"
    examples: ["Can I leave early?", "May I use your phone?", "Could I borrow your pen?", "You cannot park here."]
  - context: "Obligation (must/should)"
    description: "Expressing duty, rules, or advice"
    examples: ["You must wear a seatbelt.", "We should study more.", "Students must not cheat.", "You should see a doctor."]
  - context: "Possibility (may/might/could)"
    description: "Expressing likelihood"
    examples: ["It might rain tomorrow.", "She may be late.", "This could be the answer.", "It may not be true."]
  - context: "Predictions and polite requests (will/would)"
    description: "Talking about the future or making polite requests"
    examples: ["It will rain tomorrow.", "Would you help me with this?", "I would like some coffee.", "Will you marry me?"]

phonetics:
  - note: "Weak forms in connected speech: 'can' → /kən/, 'could' → /kəd/, 'should' → /ʃəd/, 'would' → /wəd/, 'might' → /maɪt/ (no reduction)."
    example_generator:
      - "I can /aɪ kən/"
      - "She could /ʃiː kəd/"
      - "You should /juː ʃəd/"
    l1_issue: "Portuguese and Spanish speakers often pronounce modals with full vowel sounds. Teach weak forms for natural speech."
  - note: "Contractions are essential in spoken English: can't /kɑːnt/, couldn't /kʊdnt/, mustn't /mʌsnt/, shouldn't /ʃʊdnt/, won't /wəʊnt/, wouldn't /wʊdnt/."
    example_generator:
      - "can't /kɑːnt/"
      - "won't /wəʊnt/"
      - "shouldn't /ʃʊdnt/"
    l1_issue: "Many L1 speakers struggle with 'won't' pronunciation /wəʊnt/. It does not rhyme with 'don't'. Drill explicitly."

teaching:
  methodology: "PPP (Present-Practice-Produce)"
  tips:
    - "Start with 'can' for ability — this is the most intuitive modal for A2 students. Use real examples: 'I can swim. I can't fly.'"
    - "Move from ability to permission: 'I can swim (ability) vs Can I go to the bathroom? (permission).' Same word, different meaning."
    - "Teach must/should as a pair: must = strong obligation (rules), should = advice (recommendations)."
    - "Use real-life scenarios for permission: 'Can I leave early?' 'May I open the window?' 'Could I borrow your pen?'"
    - "Drill contractions explicitly — they are essential for natural spoken English."
    - "Contrast 'may' and 'might' for possibility: may = more likely, might = less certain."
  recommended_activities:
    - name: "Can You...?"
      duration: 10
      adaptation_notes: "Students ask classmates about abilities: 'Can you swim?' 'Can you play guitar?' Then report: 'Pedro can swim. Maria can't play guitar.'"
    - name: "Permission Role Play"
      duration: 15
      adaptation_notes: "Students practice asking for permission in different situations: classroom, office, restaurant. 'Can I...?' 'May I...?' 'Could I...?' Focus on polite forms."
    - name: "Must or Should?"
      duration: 10
      adaptation_notes: "Teacher says a situation. Students choose 'must' or 'should': 'Wear a seatbelt.' (must) 'Study more.' (should) 'Be kind to others.' (should) 'Stop at a red light.' (must)"
    - name: "What Might Happen?"
      duration: 15
      adaptation_notes: "Show pictures of situations (dark clouds, someone studying hard, a job interview). Students make predictions: 'It might rain.' 'She might pass the exam.' 'He might get the job.'"
