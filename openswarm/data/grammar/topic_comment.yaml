grammar_point: topic_comment
title: "Topic-Comment Structure"
description: "Manipulating the topic (what is being talked about) and the comment (what is said about it) to organise information, create emphasis, and manage discourse flow."
level: C1

meaning:
  core_meaning: "Every sentence can be divided into a topic (what the sentence is about) and a comment (what is said about the topic). English normally follows a topic-comment order where the topic comes first. However, advanced speakers can manipulate this structure for emphasis, focus, or stylistic effect — using devices such as fronting, cleft sentences, left dislocation, and topicalisation."
  timeline: "Not a tense-related concept — this is about information structure and how speakers organise what they say."
  contrast: "Compare with basic SVO order: 'I really enjoyed that movie' (neutral) vs. 'That movie, I really enjoyed it' (topicalisation — the movie is the topic). Both convey the same information but with different focus."
  ccqs:
    - question: "In 'That book, I've read it twice', what is the topic?"
      answer: "'That book' — it's what we're talking about."
    - question: "Is topicalisation common in formal or informal English?"
      answer: "It's more common in spoken and informal English, though it appears in formal writing for rhetorical effect."
    - question: "Does changing the topic change the meaning of the sentence?"
      answer: "The basic meaning stays the same, but the focus and emphasis change."
  example_generator:
    contexts: ["academic writing", "spoken discourse", "literary analysis", "rhetorical emphasis", "discourse management"]
    cultural_notes: ["Topic-comment manipulation is a hallmark of advanced proficiency. It is used extensively in speeches, debates, and persuasive writing."]
    min_examples: 5

form:
  affirmative:
    structure: "Topic + comment (standard order) / Fronted topic + subject + verb + resumptive pronoun (left dislocation) / It + be + focused element + that/who... (cleft) / What + subject + verb + be + comment (pseudo-cleft)"
    example_generator:
      contexts: ["emphasis", "contrast", "discourse management"]
      min_examples: 4
  negative:
    structure: "Negative elements can be fronted for emphasis: 'Never have I seen such beauty.' / 'Not once did he apologise.'"
    example_generator:
      contexts: ["emphatic negation", "formal rhetoric"]
      min_examples: 3
  questions:
    structure: "Questions can also manipulate topic: 'That film — have you seen it?' / 'What I don't understand is why he left.'"
    example_generator:
      contexts: ["checking knowledge", "expressing confusion"]
      min_examples: 3

sub_rules:
  - rule: "Topicalisation (fronting): moving an element to the front of the sentence to make it the topic. 'That movie, I really enjoyed it.' / 'The money, we don't need it.'"
    type: "grammatical"
    examples: ["That new restaurant, we should try it.", "His behaviour, I find it unacceptable.", "The exam, she passed it easily."]
  - rule: "Left dislocation: the topic is stated first, then referred to with a pronoun in the main clause. Common in spoken English."
    type: "grammatical"
    examples: ["My brother, he's a doctor.", "The new restaurant, we went there yesterday.", "That woman from the council, she called again."]
  - rule: "Right dislocation: the topic is added after the main clause, often for clarification. 'She's really clever, your daughter.'"
    type: "grammatical"
    examples: ["He's very tall, that boy.", "It was amazing, that concert.", "They're lovely, those flowers."]
  - rule: "Cleft sentences (it-cleft): 'It + be + focused element + that/who clause.' Used to highlight specific information."
    type: "grammatical"
    examples: ["It was John who broke the window.", "It's the coffee that keeps me going.", "It was in 1969 that they landed on the moon."]
  - rule: "Pseudo-cleft (wh-cleft): 'What + subject + verb + be + comment.' Puts the focus at the end."
    type: "grammatical"
    examples: ["What I need is a good night's sleep.", "What she said was very upsetting.", "What we should do is contact the police."]
  - rule: "Fronting with inversion: negative or restrictive adverbials moved to the front trigger subject-auxiliary inversion. 'Never have I...', 'Not only did he...', 'Rarely do we...'"
    type: "grammatical"
    examples: ["Never have I seen such a beautiful sunset.", "Not only did he fail the exam, but he also lost his textbook.", "Rarely do we see such dedication."]
  - rule: "Fronting of adverbials for literary effect: 'Down came the rain.' / 'Into the room walked a tall stranger.'"
    type: "stylistic"
    examples: ["Along the road came a procession of cars.", "Round the corner came a group of children.", "On the hill stood an ancient castle."]

use:
  - context: "Spoken discourse management"
    description: "Using left and right dislocation to introduce or clarify topics in conversation."
    examples: ["That meeting on Friday, I can't make it.", "He's really nice, your new colleague.", "The train to Manchester, when does it leave?"]
  - context: "Emphasis and contrast in writing"
    description: "Using cleft sentences and fronting to highlight key information in essays, reports, and articles."
    examples: ["It is the government's responsibility to address this issue.", "What matters most is the quality of education.", "Not until the 20th century did women gain the right to vote."]
  - context: "Rhetorical and persuasive language"
    description: "Politicians, speakers, and writers use topic-comment manipulation for dramatic effect."
    examples: ["What we need is real leadership.", "It is the people who must decide.", "Never before has the world faced such a challenge."]
  - context: "Literary and narrative style"
    description: "Authors use fronting and inversion to create atmosphere and vary sentence rhythm."
    examples: ["Through the mist came the sound of footsteps.", "Gone were the days of innocence.", "Such was the fear in her eyes that he looked away."]

phonetics:
  - note: "Topicalised elements are typically spoken with a falling tone, followed by a pause (represented by a dash in writing). The comment then follows as a separate intonation unit."
    example_generator:
      contexts: ["spoken emphasis", "presentation skills"]
    l1_issue: "Speakers of topic-prominent languages (e.g., Japanese, Korean) may find topic-comment structures more natural than speakers of subject-prominent languages, but may overuse left dislocation in formal English."
  - note: "Cleft sentences place heavy stress on the focused element: 'It was JOHN who broke the window' (not someone else)."
    example_generator:
      contexts: ["contrastive stress", "emphasis practice"]
    l1_issue: "Learners may not use stress and intonation to signal the focused element, making cleft sentences sound flat and unnatural."

teaching:
  methodology: "Guided discovery"
  tips: [
    "Start by asking students to identify the topic and comment in simple sentences.",
    "Use authentic examples from speeches, films, and literature to show topic-comment manipulation in context.",
    "Introduce left dislocation first as it is the most common in spoken English.",
    "Move to cleft sentences (it-cleft and pseudo-clear) for written and formal contexts.",
    "Practise fronting with negative adverbials as a separate sub-skill due to the inversion rule.",
    "Encourage students to experiment with these structures in writing tasks and presentations."
  ]
  recommended_activities:
    - name: "Topic-comment identification"
      duration: 10
      adaptation_notes: "Students read a text and label the topic and comment in each sentence, discussing how the structure affects meaning."
    - name: "Rewriting for emphasis"
      duration: 15
      adaptation_notes: "Students rewrite neutral sentences using cleft structures, topicalisation, or fronting to create different emphases."
    - name: "Speech analysis"
      duration: 15
      adaptation_notes: "Students watch a short political speech or TED talk and identify all topic-comment manipulations, discussing their effect."
    - name: "Creative writing"
      duration: 20
      adaptation_notes: "Students write a short descriptive paragraph (a scene, a person, a place) using at least 3 different topic-comment structures."
