grammar_point: must_have_to_need
title: Must, Have to, Need (Obligation & Necessity)
description: Express obligation, necessity, and requirement. Contrasts internal obligation
  (must) vs external obligation (have to) vs necessity (need).
level: A2
meaning:
  core_meaning: Must = internal obligation (speaker's rule); Have to = external obligation
    (law, boss, rule); Need = necessity (requirement).
  timeline: 'Present: must/have to/need to; Past: had to (no must in past); Future:
    will have to.'
  contrast: '''Must'' = internal rule: "I must study (I decided)."

    ''Have to'' = external rule: "I have to study (teacher said)."

    ''Don''t have to'' = no obligation: "You don''t have to come (optional)."

    '
  ccqs:
  - question: What is the difference between must and have to
    answer: Must = personal obligation. Have to = external obligation or rule.
  - question: What is the negative of must
    answer: Must not = prohibition. Do not have to = no obligation.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Must + base verb: "I must go."

      Have to + base verb: "I have to go." (third person: has to)

      Need + to + verb: "I need to go." (negative: don''t need to)

      '
    example_generator:
      contexts:
      - work and professional life
      - food and daily routines
      - shopping and commerce
      min_examples: 4
  negative:
    structure: 'Must not + base verb: "You must not smoke." (prohibition)

      Don''t have to + base verb: "You don''t have to come." (no obligation)

      Don''t need to + base verb: "You don''t need to worry." (no necessity)

      '
    example_generator:
      contexts:
      - shopping and commerce
      min_examples: 4
  questions:
    structure: 'Must + subject + base verb: "Must I sign this?" (rare, formal)

      Do/Does + subject + have to + base verb: "Do you have to go?"

      Do/Does + subject + need to + base verb: "Do you need to leave?"

      '
    example_generator:
      contexts:
      - work and professional life
      - food and daily routines
      min_examples: 4
sub_rules:
- rule: Must expresses personal obligation — the speaker feels it is necessary
  type: semantic
  examples:
  - I must study harder (I feel this is necessary)
  - You must see this movie (I strongly recommend it)
  - She must be more careful (my opinion)
- rule: Have to expresses external obligation — rules, laws, or other people require
    it
  type: semantic
  examples:
  - I have to wear a uniform at work (rule)
  - You have to pay taxes (law)
  - She has to take medication (doctor's orders)
- rule: Must not expresses prohibition (forbidden). Do not have to expresses no obligation
    (optional)
  type: semantic
  examples:
  - You must not smoke here (prohibition)
  - You do not have to come if you do not want to (no obligation)
  - She must not park here (forbidden)
  - She does not have to work on Sundays (optional)
- rule: Need to expresses necessity — something is necessary or important
  type: semantic
  examples:
  - I need to study for the exam
  - She needs to see a doctor
  - We need to leave early
use:
- name: Internal Obligation (must)
  description: Speaker's personal rule or strong advice.
  examples:
  - I must remember her birthday.
  - You must try this cake.
  key_point: Must is rarely used in questions/negatives in American English.
- name: External Obligation (have to)
  description: Obligation from outside authority (law, boss, schedule).
  examples:
  - I have to wear a uniform at work.
  - She has to take the bus.
  key_point: Had to for past external obligation.
- name: Necessity (need to)
  description: Requirement for a task.
  examples:
  - We need to buy eggs for the recipe.
  - You need to finish the report.
  key_point: Don't need to = no necessity, not prohibition.
phonetics:
- note: 'Must is pronounced /mʌst/ in affirmative but often reduced to /məs/ in connected
    speech: ''I must go'' → /aɪ məs ɡəʊ/.'
  example_generator:
    contexts:
    - must pronunciation
  l1_issue: Learners may confuse must and must not in listening. The vowel length
    and the /nt/ ending are the key distinguishing features.
teaching:
  methodology: PPP
  tips:
  - 'Contrast must (internal) vs have to (external) with role plays: teacher (must)
    vs boss (have to).'
  - Drill had to for past obligation with timeline activities.
  - 'Use real-life examples: ''You must wear a helmet (law) vs You have to wear a
    helmet (gym rule).'''
  recommended_activities:
  - name: Must or Have To
    duration: 10
    adaptation_notes: 'Students choose: ''I ___ wear a seatbelt.'' (have to — law)
      ''I ___ study more.'' (must — personal feeling).'
  - name: Obligation Scenarios
    duration: 15
    adaptation_notes: 'Students describe obligations in different contexts: school
      (have to), personal goals (must), health (need to).'
