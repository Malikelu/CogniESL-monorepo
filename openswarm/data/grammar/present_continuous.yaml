grammar_point: present_continuous
title: "Present Continuous (am/is/are + V-ing)"
description: "Describes actions happening now, temporary actions, or future arrangements. Sometimes called present progressive."
level: A1

meaning:
  core_meaning: "Describes an action that is in progress at the moment of speaking, a temporary situation, or a fixed future arrangement. The key idea is that the action is NOT finished — it is ongoing."
  timeline: "Present time: right now, around now, or a planned near-future event."
  contrast: "'Present Continuous' = 'I am eating.' (right now, in progress) vs 'Present Simple' = 'I eat.' (habit, general truth)"
  ccqs:
    - question: "Is this action happening right now, at this exact moment?"
      answer: "Yes — it is in progress and not finished."
    - question: "Is this a permanent situation or a temporary one?"
      answer: "Temporary — it is happening around now but will change."
    - question: "Can we use words like 'now', 'right now', 'at the moment' with this?"
      answer: "Yes — these time expressions go with the Present Continuous."
  example_generator:
    contexts:
      - actions happening now
      - temporary situations
      - future arrangements
      - current projects
    cultural_notes:
      - "Use classroom-appropriate actions for demonstrations"
      - "Avoid examples with alcohol, politics, or religion"
      - "Include diverse names and contexts"
    min_examples: 5

form:
  affirmative:
    structure: "Subject + am/is/are + verb-ing"
    example_generator:
      - "I am walking."
      - "She is working."
      - "They are studying."
      - "He is cooking."
    min_examples: 4
  negative:
    structure: "Subject + am/is/are + not + verb-ing"
    example_generator:
      - "I am not walking."
      - "She is not (isn't) working."
      - "They are not (aren't) studying."
      - "He is not (isn't) cooking."
    min_examples: 4
  questions:
    structure: "Am/Is/Are + subject + verb-ing?"
    example_generator:
      - "Am I walking?"
      - "Is she working?"
      - "Are they studying?"
      - "Is he cooking?"
    min_examples: 4

sub_rules:
  - rule: "Spelling: verbs ending in -e, drop the e and add -ing"
    type: spelling
    examples: ["make → making", "write → writing", "come → coming", "drive → driving"]
  - rule: "Spelling: verbs ending in consonant-vowel-consonant, double the final consonant"
    type: spelling
    examples: ["run → running", "swim → swimming", "sit → sitting", "stop → stopping"]
  - rule: "Spelling: verbs ending in -ie, change -ie to -y and add -ing"
    type: spelling
    examples: ["die → dying", "lie → lying", "tie → tying"]
  - rule: "Spelling: verbs ending in -ee, just add -ing (no dropping)"
    type: spelling
    examples: ["see → seeing", "agree → agreeing", "free → freeing"]
  - rule: "Common time expressions: now, right now, at the moment, currently, today, this week"
    type: lexical
    examples: ["I am working now.", "She is studying at the moment.", "They are traveling this week."]

use:
  - context: "Action happening now"
    description: "Action in progress at the moment of speaking"
    examples: ["I am writing an email now.", "She is talking on the phone.", "They are having lunch."]
  - context: "Temporary action"
    description: "Action happening around now but not permanently"
    examples: ["I am staying at my friend's house this week.", "She is working in London for the summer.", "He is learning to drive."]
  - context: "Future arrangement"
    description: "Fixed plan for near future (often with time and place)"
    examples: ["I am meeting John at 3pm tomorrow.", "We are flying to Paris next week.", "She is having a party on Saturday."]
  - context: "Changing situations"
    description: "Situations that are developing or changing"
    examples: ["The weather is getting colder.", "Your English is improving.", "The population is growing."]

phonetics:
  - note: "Contractions are essential in spoken English: I'm, you're, he's, she's, it's, we're, they're. Full forms sound unnatural in casual speech."
    example_generator:
      - "I am → I'm /aɪm/"
      - "She is → She's /ʃiːz/"
      - "They are → They're /ðeə/"
    l1_issue: "Portuguese and Spanish speakers often omit the verb 'to be' in English because their languages do not use a copula in the same way. Drill 'I am', 'she is', 'they are' explicitly."
  - note: "The -ing ending is pronounced /ɪŋ/ not /iŋg/. No hard 'g' sound."
    example_generator:
      - "working /wɜːkɪŋ/"
      - "studying /stʌdɪɪŋ/"
    l1_issue: "Many L1 speakers add a hard /g/ sound at the end of -ing. Teach the correct /ɪŋ/ pronunciation early."

teaching:
  methodology: "PPP (Present-Practice-Produce)"
  tips:
    - "Act out actions while saying them: 'I am jumping', 'She is writing'. This makes the meaning immediately clear."
    - "Use the classroom as a resource: 'Pedro is sitting. Maria is writing. We are learning English.'"
    - "Drill contractions from the start — full forms sound unnatural in spoken English."
    - "Contrast with Present Simple early: 'I eat breakfast (every day) vs I am eating breakfast (right now).'"
    - "Teach the spelling rules for -ing explicitly. This is a common source of errors."
  recommended_activities:
    - name: "Mime Game"
      duration: 10
      adaptation_notes: "One student mimes an action. Others guess: 'Are you swimming?' 'Yes, I am.' Great for practicing questions and affirmative/negative."
    - name: "Classroom Snapshot"
      duration: 10
      adaptation_notes: "Students look around the room and describe what everyone is doing: 'Pedro is sitting. Maria is writing.' Practices third person -s with present continuous."
    - name: "Picture Description"
      duration: 15
      adaptation_notes: "Show a busy picture (airport, restaurant, park). Students describe what people are doing. Good for practicing all persons."
    - name: "Future Plans Interview"
      duration: 15
      adaptation_notes: "Students ask about each other's plans for the weekend using present continuous: 'What are you doing on Saturday?' Practices future arrangement meaning."
