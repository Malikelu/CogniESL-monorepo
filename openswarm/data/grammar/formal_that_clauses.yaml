grammar_point: formal_that_clauses
title: "Formal That-Clauses (Mandative Subjunctive & Should)"
description: "Formal that-clauses used after verbs of suggestion, recommendation, demand, and after adjectives of importance. Covers both the mandative subjunctive (AmE) and should + infinitive (BrE) patterns."
level: C1

meaning:
  core_meaning: "Expresses that something is necessary, important, or strongly recommended, typically in formal written and spoken English"
  timeline: "The action in the that-clause is prospective — it refers to something that should happen in the future relative to the main clause"
  contrast: "Differs from ordinary that-clauses (e.g., 'I think that...') because the verb in the subordinate clause does not take normal tense inflection. Differs from 'to'-infinitive constructions by maintaining a full clausal structure with its own subject."
  ccqs:
    - question: "Is the speaker describing something that already happened, or something that should happen?"
      answer: "Something that should happen (prospective)"
    - question: "Is this formal or informal language?"
      answer: "Formal — this structure is used in academic writing, legal documents, and official recommendations."
    - question: "Can we replace 'that he go' with 'that he goes' in formal American English?"
      answer: "No — the base form (subjunctive) is required in formal AmE"
    - question: "Is 'should' acceptable in British English in this structure?"
      answer: "Yes — BrE commonly uses 'should + infinitive' as an alternative"
  example_generator:
    contexts: ["academic writing", "business meetings", "legal documents", "formal recommendations", "committee decisions"]
    cultural_notes: ["American English strongly prefers the bare subjunctive ('that he go'), while British English accepts both the subjunctive and 'should go'. In informal English, 'to'-infinitive or ordinary indicative forms are used instead."]
    min_examples: 5

form:
  affirmative:
    structure: "Subject + verb of demand/suggestion/recommendation + that + subject + base form of verb (subjunctive) / should + base form (BrE)"
    example_generator:
      contexts: ["formal proposals", "minutes of meetings", "academic recommendations", "legal stipulations"]
      min_examples: 4
  negative:
    structure: "Subject + verb + that + subject + not + base form / should not + base form"
    example_generator:
      contexts: ["prohibitions", "formal warnings", "restrictions"]
      min_examples: 3
  questions:
    structure: "Wh-word + auxiliary + subject + verb + that + subject + base form...?"
    example_generator:
      contexts: ["formal enquiries", "clarification requests"]
      min_examples: 3

sub_rules:
  - rule: "Mandative subjunctive uses the base form of the verb for all persons (no -s for third person singular)"
    type: "grammatical"
    examples: ["I suggest that she attend the meeting (NOT 'attends')", "They demanded that he be present (NOT 'is')"]
  - rule: "Common trigger verbs: suggest, recommend, demand, insist, require, request, propose, urge, advise, stipulate, mandate"
    type: "lexical"
    examples: ["The committee recommended that the policy be revised", "We insist that every member contribute"]
  - rule: "Common trigger adjectives: essential, important, necessary, vital, crucial, imperative, urgent"
    type: "lexical"
    examples: ["It is essential that all data remain confidential", "It is vital that she not be informed"]
  - rule: "In British English, 'should + infinitive' is a common and accepted alternative to the subjunctive"
    type: "varietal"
    examples: ["I suggest that he should apply for the position", "It is important that students should arrive on time"]
  - rule: "The negative subjunctive places 'not' before the base verb (not 'does not')"
    type: "grammatical"
    examples: ["They requested that he not attend", "It is crucial that the documents not be destroyed"]

use:
  - context: "Academic writing"
    description: "Used in research papers, theses, and academic recommendations to express necessity or suggestion formally"
    examples: ["The findings suggest that further research be conducted", "It is imperative that the methodology be transparent"]
  - context: "Legal and official documents"
    description: "Used in contracts, regulations, and formal stipulations"
    examples: ["The court ordered that the defendant pay restitution", "The regulation requires that all applicants submit proof of identity"]
  - context: "Business and professional communication"
    description: "Used in formal proposals, meeting minutes, and professional recommendations"
    examples: ["The board recommended that the merger proceed", "We propose that the budget be increased by 10%"]
  - context: "Formal spoken English"
    description: "Used in speeches, debates, and formal discussions"
    examples: ["I move that the motion be adopted", "She urged that the government act immediately"]

phonetics:
  - note: "The word 'that' in that-clauses is typically reduced to /ðət/ or even elided in rapid speech"
    example_generator:
      contexts: ["formal speech", "presentations"]
    l1_issue: "Speakers of languages without complementizers (e.g., Mandarin, Japanese) may omit 'that' entirely or use incorrect conjunctions"
  - note: "Stress falls on the trigger verb/adjective and the main content words in the that-clause, not on 'that'"
    example_generator:
      contexts: ["spoken emphasis"]
    l1_issue: "Learners may over-stress 'that', making speech sound unnatural"

teaching:
  methodology: "Guided discovery"
  tips: [
    "Start with authentic examples from formal texts (meeting minutes, academic abstracts) and have learners identify the pattern",
    "Contrast formal that-clauses with informal equivalents (e.g., 'They suggested that he apply' vs. 'They said he should apply')",
    "Highlight the lack of -s on third person singular as a key marker of the subjunctive",
    "Provide ample practice with both AmE (bare subjunctive) and BrE (should + infinitive) variants"
  ]
  recommended_activities:
    - name: "Formal email rewrite"
      duration: 20
      adaptation_notes: "Give students informal emails and have them rewrite using formal that-clauses. Suitable for B2+ learners."
    - name: "Committee role-play"
      duration: 25
      adaptation_notes: "Students role-play a committee meeting making formal recommendations. Provide trigger verb cards."
    - name: "Error correction relay"
      duration: 15
      adaptation_notes: "Display sentences with incorrect verb forms in that-clauses. Teams race to correct them."
