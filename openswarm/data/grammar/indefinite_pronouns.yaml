grammar_point: indefinite_pronouns
title: Indefinite Pronouns
description: 'Pronouns that refer to non-specific people or things: someone, anyone,
  everyone, no one, something, anything, everything, nothing.'
level: A2
meaning:
  core_meaning: Indefinite pronouns refer to people or things without specifying who
    or what exactly.
  timeline: Timeless — the reference is general, not specific.
  contrast: '''Indefinite pronoun'' = ''Someone called.'' (I don''t know who) vs ''Definite''
    = ''Maria called.'' (specific person)'
  ccqs:
  - question: Do we know exactly who/what?
    answer: No — that's why it's indefinite.
  - question: Is it about people or things?
    answer: Someone/somebody = people, Something = things
  example_generator:
    contexts:
    - describing unknown people
    - talking about things
    - making general statements
    - questions and negatives
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Indefinite pronoun + verb: ''Someone is here.'', ''Everything is ready.'''
    example_generator:
      contexts:
      - describing unknown people
      - talking about things
      - making general statements
      min_examples: 4
  negative:
    structure: 'Use ''any-'' forms: ''Nobody came.'', ''Nothing happened.'' / ''Not...any-'':
      ''I didn''t see anyone.'''
    example_generator:
      contexts:
      - describing unknown people
      - talking about things
      - making general statements
      min_examples: 4
  questions:
    structure: 'Use ''any-'' forms: ''Did anyone call?'', ''Is anything wrong?'''
    example_generator:
      contexts:
      - describing unknown people
      - talking about things
      - making general statements
      min_examples: 4
sub_rules:
- rule: Some- for positive, Any- for questions and negatives
  type: grammatical
  examples:
  - Someone called. (positive)
  - Did anyone call? (question)
  - Nobody called. (negative)
- rule: Indefinite pronouns take singular verbs
  type: grammatical
  examples:
  - Everyone is here. ✅ / Everyone are here. ❌
- rule: Someone = positive, Anyone = question/negative, No one = negative
  type: grammatical
  examples:
  - I saw someone.
  - Did you see anyone?
  - I saw no one.
use:
- context: Describing unknown people
  description: When you don't know or don't want to say who
  examples:
  - Someone knocked on the door.
  - Everybody loves chocolate.
- context: Making general statements
  description: Talking about things in general
  examples:
  - Everything is fine.
  - Nothing is impossible.
phonetics:
- note: 'Stress on first syllable: /ˈsʌmwʌn/, /ˈeniwʌn/'
  contexts:
  - pronunciation
  l1_issue: Some L1 speakers stress the wrong syllable
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Contrast some- vs any- explicitly
  - Use real situations (knocking on door, finding something)
  recommended_activities:
  - name: Mystery Person
    duration: 10
    adaptation_notes: Students describe unknown people using indefinite pronouns.
