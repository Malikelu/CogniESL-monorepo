grammar_point: compound_nouns
title: "Compound Nouns (Two+ Words as One Noun)"
description: "Nouns formed by combining two or more words to act as a single noun, with different spelling patterns."
level: A2

meaning:
  core_meaning: "Combines two or more words to create a single noun with a specific meaning that is more than the sum of its parts."
  timeline: "N/A (Noun form, not tense-based)."
  contrast: "Closed: 'Toothbrush' (one word, common objects)\n\nOpen: 'Bus stop' (two words, locations/services)\n\nHyphenated: 'Mother-in-law' (hyphenated, family terms or adjectives)\n\nStress is almost always on the first word: 'TOOTHbrush', 'BUS stop', 'MOTHER-in-law'.\n"
  ccqs:
    - question: "Is this one word, two words, or hyphenated?"
      answer: "One word = closed (toothbrush). Two words = open (bus stop). Hyphenated = mother-in-law."
    - question: "Where is the stress in this compound noun?"
      answer: "Almost always on the first word: TOOTHbrush, BUS stop, MOTHER-in-law."
    - question: "What is the plural form — where does the -s go?"
      answer: "On the last word: toothbrushes, bus stops, mothers-in-law."
    - question: "Can you guess the meaning from the two words?"
      answer: "Sometimes yes (bedroom = bed + room), sometimes no (butterfly ≠ butter + fly)."
  example_generator:
    contexts: ["everyday situations", "home and family", "travel", "work"]
    cultural_notes: ["English has many compound nouns and new ones are created all the time (e.g., 'smartphone', 'earbuds')", "The spelling (closed/open/hyphenated) must often be memorised — there is no single rule"]
    min_examples: 5

form:
  affirmative:
    structure: "Closed (one word): toothbrush, toothpaste, bedroom\nHyphenated (with hyphen): mother-in-law, well-known, self-esteem\nOpen (two separate words): bus stop, post office, high school\nPlural rule: Pluralize the last word (toothbrushes, bus stops, mothers-in-law)\n"
    example_generator:
      contexts: ["family and relationships", "travel and places", "daily routines"]
      min_examples: 4
  negative:
    structure: "No + compound noun (plural for countable)"
    example_generator:
      contexts: ["everyday situations"]
      min_examples: 4
  questions:
    structure: "How many + plural compound noun? / Is this a + singular compound noun?"
    example_generator:
      contexts: ["education and school", "shopping"]
      min_examples: 4

sub_rules:
  - rule: "Closed compound nouns are one word — most common for everyday objects"
    type: orthographic
    examples: ["toothbrush", "bedroom", "notebook", "sunflower", "football", "raincoat"]
  - rule: "Open compound nouns are two separate words — common for locations and services"
    type: orthographic
    examples: ["bus stop", "post office", "swimming pool", "train station", "police station", "high school"]
  - rule: "Hyphenated compound nouns use a hyphen — common for family terms and some adjectives"
    type: orthographic
    examples: ["mother-in-law", "father-in-law", "well-known", "self-esteem", "check-in", "editor-in-chief"]
  - rule: "Plural is formed on the last element, not the first"
    type: grammatical
    examples: ["toothbrush → toothbrushes", "bus stop → bus stops", "mother-in-law → mothers-in-law", "passer-by → passers-by"]
  - rule: "Stress is almost always on the first element of a compound noun"
    type: phonological
    examples: ["TOOTHbrush (not toothBRUSH)", "BUS stop (not bus STOP)", "MOTHER-in-law (not mother-in-LAW)"]

use:
  - context: "Common Objects"
    description: "Closed compound nouns for everyday objects."
    examples: ["I need a new toothbrush.", "She left her notebook on the desk.", "We sat on the bookshelf."]
  - context: "Locations and Services"
    description: "Open compound nouns for places or services."
    examples: ["I'm waiting at the bus stop.", "Let's go to the post office.", "The children are at the swimming pool."]
  - context: "Family Terms and Adjectives"
    description: "Hyphenated compound nouns for family or descriptive adjectives."
    examples: ["My mother-in-law is visiting.", "She is a well-known author.", "He has low self-esteem."]

phonetics:
  - note: "Primary stress on the first element: TOOTHbrush, BUS stop, MOTHER-in-law"
    example_generator:
      contexts: ["word stress", "pronunciation drills"]
    l1_issue: "Many L1 speakers stress the second element, which can make the compound hard to recognise"
  - note: "No pause between the elements — they are pronounced as one unit"
    example_generator:
      contexts: ["connected speech"]
    l1_issue: "Some L1 speakers insert a small pause between the words, breaking the compound into separate words"

teaching:
  methodology: "PPP"
  tips:
    - "Sort common compound nouns into closed, hyphenated, and open categories."
    - "Practice pronunciation with stress on the first word."
    - "Drill plural forms: 'toothbrushes', 'mothers-in-law'."
    - "Use picture flashcards — students guess the compound noun from an image."
  recommended_activities:
    - name: "Compound Noun Sort"
      duration: 10
      adaptation_notes: "Students sort a list of compound nouns into closed, open, and hyphenated columns on the board."
    - name: "Create a Compound"
      duration: 15
      adaptation_notes: "Students combine two simple words to make compound nouns and illustrate them. Check if the meaning is transparent or opaque."
