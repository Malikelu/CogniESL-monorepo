grammar_point: place_adverbs
title: Common Place Adverbs
description: 'Words that tell us where: here, there, everywhere, somewhere, nowhere,
  upstairs, downstairs, inside, outside.'
level: A1
meaning:
  core_meaning: Place adverbs tell us WHERE something happens or where something/someone
    is.
  timeline: Timeless — describes location, not time.
  contrast: '''Here'' = near the speaker vs ''There'' = far from the speaker'
  ccqs:
  - question: Does this word tell us WHERE?
    answer: Yes — it's a place adverb.
  - question: Is it near or far from the speaker?
    answer: Here = near, There = far
  example_generator:
    contexts:
    - giving directions
    - describing locations
    - talking about where things are
    - daily routines
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + verb + place adverb: ''I live here.'', ''She is upstairs.'''
    example_generator:
      contexts:
      - giving directions
      - describing locations
      - talking about where things are
      min_examples: 4
  negative:
    structure: 'Subject + verb + no-/nowhere: ''I found it nowhere.'' / ''There''s
      nothing here.'''
    example_generator:
      contexts:
      - giving directions
      - describing locations
      - talking about where things are
      min_examples: 4
  questions:
    structure: 'Where + be/auxiliary + subject?: ''Where is the bathroom?'', ''Where
      do you live?'''
    example_generator:
      contexts:
      - giving directions
      - describing locations
      - talking about where things are
      min_examples: 4
sub_rules:
- rule: Here = near speaker, There = far from speaker
  type: semantic
  examples:
  - Come here. (near me)
  - Put it there. (over there)
- rule: No- words for negative meaning
  type: grammatical
  examples:
  - nowhere = not anywhere
  - nothing = not anything
use:
- context: Giving directions
  description: Telling someone where to go
  examples:
  - Turn left here.
  - The bathroom is upstairs.
- context: Describing where things are
  description: Talking about location
  examples:
  - My keys are here somewhere.
  - She lives nearby.
phonetics:
- note: Stress on 'here' and 'there' for emphasis
  contexts:
  - emphasis
  l1_issue: Some L1 speakers confuse 'here' and 'there'
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use classroom locations to demonstrate
  - Use gestures to reinforce here/there
  recommended_activities:
  - name: Hide and Seek
    duration: 10
    adaptation_notes: Hide objects, students describe where they are using place adverbs.
