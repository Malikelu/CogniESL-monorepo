grammar_point: past_continuous
title: "Past Continuous (was/were + V-ing)"
description: "Describes an action that was in progress at a specific past time, or interrupted by another past action. Sets background in stories."
level: A2

meaning:
  core_meaning: "Describes an action that was ongoing (in progress) at a specific moment in the past. The action was not finished — it was interrupted or serving as background for another event. Think of it as a 'long action' in the past."
  timeline: "Past time point: was/were + V-ing during a specific time or when another action happened. The action was already in progress."
  contrast: "'Past Continuous' = 'I was eating.' (in progress, not finished) vs 'Past Simple' = 'I ate.' (completed action)"
  ccqs:
    - question: "Was this action in progress at a specific past time?"
      answer: "Yes — it was ongoing, not finished."
    - question: "Did this action happen all at once, or was it ongoing?"
      answer: "Ongoing — it was in progress for a period of time."
    - question: "Can we use 'when' and 'while' with this tense?"
      answer: "Yes — 'while' + past continuous (long action), 'when' + past simple (short interruption)."
  example_generator:
    contexts:
      - interrupted actions
      - background scenes
      - simultaneous actions
      - storytelling
    cultural_notes:
      - "Use diverse scenarios and characters"
      - "Avoid violent or traumatic scenarios for interrupted actions"
      - "Keep examples relatable for adult learners"
    min_examples: 5

form:
  affirmative:
    structure: "Subject + was/were + verb-ing"
    example_generator:
      - "I was walking."
      - "She was cooking."
      - "They were playing."
      - "He was working."
    min_examples: 4
  negative:
    structure: "Subject + was not (wasn't) / were not (weren't) + verb-ing"
    example_generator:
      - "I wasn't walking."
      - "She wasn't cooking."
      - "They weren't playing."
      - "He wasn't working."
    min_examples: 4
  questions:
    structure: "Was/Were + subject + verb-ing?"
    example_generator:
      - "Was she cooking?"
      - "Were they playing?"
      - "Was he working?"
      - "Were you sleeping?"
    min_examples: 4

sub_rules:
  - rule: "Use 'while' for two simultaneous long actions"
    type: grammatical
    examples: ["While I was cooking, he was cleaning.", "While she was studying, her brother was watching TV.", "While we were walking, it started to rain."]
  - rule: "Use 'when' for a short action that interrupts a long action"
    type: grammatical
    examples: ["I was showering when the phone rang.", "She was driving when it started to rain.", "They were sleeping when the alarm went off."]
  - rule: "Past continuous for background scenes in stories"
    type: discourse
    examples: ["The sun was shining and birds were singing.", "It was raining and people were walking quickly.", "The children were playing in the garden."]
  - rule: "Time expressions: at 7pm yesterday, this time last year, at that moment, all day yesterday"
    type: lexical
    examples: ["At 8am, I was having breakfast.", "This time last year, we were living in London.", "At that moment, she was working."]
  - rule: "Spelling rules for -ing: drop -e (make → making), double consonant after short vowel (run → running), change -ie to -y (die → dying)"
    type: spelling
    examples: ["make → making", "run → running", "die → dying", "write → writing"]

use:
  - context: "Action in progress at a specific past time"
    description: "An action happening at a named past time"
    examples: ["At 8am, I was brushing my teeth.", "This time last year, we were living in Paris.", "At 7pm yesterday, she was cooking dinner.", "I was working all day yesterday."]
  - context: "Interrupted action"
    description: "A long action interrupted by a short action"
    examples: ["I was showering when the phone rang.", "She was driving when it started to rain.", "They were sleeping when someone knocked on the door.", "He was cooking when he cut his finger."]
  - context: "Background in stories"
    description: "Setting the scene for a narrative"
    examples: ["The sun was shining, and birds were singing when I woke up.", "It was raining, and people were walking quickly through the streets.", "The children were playing in the garden while their parents were having lunch."]
  - context: "Simultaneous actions"
    description: "Two actions happening at the same time"
    examples: ["While I was cooking, my husband was setting the table.", "She was reading while he was watching TV.", "We were listening to music while we were studying."]

phonetics:
  - note: "Contractions are essential: I was → I was (no contraction), but 'was not' → 'wasn't' /wɒzənt/, 'were not' → 'weren't' /wɜːnt/."
    example_generator:
      - "wasn't /wɒzənt/"
      - "weren't /wɜːnt/"
    l1_issue: "Portuguese and Spanish speakers often omit 'was/were' because their languages do not use a continuous form in the same way. Drill 'I was eating' NOT 'I eating'."
  - note: "Weak form of 'was' in connected speech: /wəz/. 'I was eating' sounds like /aɪ wəz iːtɪŋ/."
    example_generator:
      - "was /wəz/"
      - "were /wə/"
    l1_issue: "Many L1 speakers over-pronounce 'was' as /wɒz/. Teach the weak form for natural speech."

teaching:
  methodology: "PPP (Present-Practice-Produce)"
  tips:
    - "Use timeline drawings: past continuous as a long line, past simple as a dot interrupting it. This visual makes the concept immediately clear."
    - "Practice with 'when' and 'while' clauses explicitly. This is the most common structure using past continuous."
    - "Drill time phrases: 'At 7pm yesterday, I was...' 'This time last year, I was...'"
    - "Use storytelling: 'The sun was shining. People were walking. Suddenly, a car crashed.' This practices the narrative function."
    - "Contrast with Past Simple: 'I was eating (in progress) when the phone rang (interruption).'"
  recommended_activities:
    - name: "What Were You Doing?"
      duration: 10
      adaptation_notes: "Teacher says a past time: 'At 8pm yesterday.' Students write what they were doing: 'I was watching TV.' Then share with the class."
    - name: "Interrupted Actions"
      duration: 15
      adaptation_notes: "Students work in pairs. Student A says a past continuous sentence: 'I was cooking.' Student B adds an interruption: 'When the phone rang.' Then switch roles."
    - name: "Story Background"
      duration: 15
      adaptation_notes: "Show a picture of a scene (park, street, restaurant). Students describe what was happening: 'The sun was shining. People were walking. A man was reading.' Practices background description."
    - name: "When or While?"
      duration: 10
      adaptation_notes: "Teacher says two actions. Students choose 'when' or 'while': 'I was cooking / the phone rang.' (when) 'I was cooking / he was cleaning.' (while)"
