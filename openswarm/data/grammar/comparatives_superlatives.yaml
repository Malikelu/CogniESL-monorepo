grammar_point: comparatives_superlatives
title: "Comparatives & Superlatives (Adjectives & Adverbs)"
description: "Forms used to compare two or more people/things: comparatives (compare two, -er/more) and superlatives (compare three+, -est/most)."
level: A2

meaning:
  core_meaning: "Compare differences between two (comparative) or more than two (superlative) people/things in terms of quality, quantity, or manner."
  timeline: "N/A (Applies to all tenses; form of adjective/adverb does not change with tense)."
  contrast: "\"Comparative\" = Two items: \"taller than\" (A vs B)\n\n\"Superlative\" = Three+ items: \"tallest\" (A vs B vs C)\n\n\"Regular\" = -er/-est/more/most: \"happy → happier → happiest\"\n\n\"Irregular\" = Special forms: \"good → better → best\"\n"
  ccqs:
    - question: "Are we comparing two things or a group of three or more?"
      answer: "Two = comparative. Three or more = superlative."
    - question: "Is the comparative form using -er or more?"
      answer: "Short adjectives (1-2 syllables) usually use -er. Long adjectives (2+ syllables) use more."
    - question: "Do we need 'the' before the adjective?"
      answer: "Yes, for superlatives (the tallest, the most beautiful). Not for comparatives."
    - question: "Is this an irregular form?"
      answer: "Good/better/best, bad/worse/worst, far/further/furthest are irregular — they do not follow the -er/-est pattern."
  example_generator:
    contexts: ["everyday situations", "shopping", "sports", "describing people"]
    cultural_notes: ["Many languages use a separate word for comparison rather than changing the adjective form", "Irregular forms are very common and must be memorised early"]
    min_examples: 5

form:
  affirmative:
    structure: "Short adjectives (1 syllable): Comparatives add -er, superlatives add -est: \"taller\", \"tallest\"\nLong adjectives (2+ syllables): Comparatives use more/less, superlatives use most/least: \"more beautiful\", \"most beautiful\"\nIrregular adjectives: \"good → better → best\", \"bad → worse → worst\"\nAdverb comparatives/superlatives: \"faster\", \"fastest\" (regular adverbs); \"more carefully\", \"most carefully\" (adverbs ending in -ly)\n"
    example_generator:
      contexts: ["family and relationships", "entertainment and media", "sports"]
      min_examples: 4
  negative:
    structure: "Use less/least for negative comparisons: 'less interesting', 'least popular'. Negate verb: 'She isn't taller than him.'"
    example_generator:
      contexts: ["entertainment and media", "opinions"]
      min_examples: 4
  questions:
    structure: "Invert verb for questions: 'Is she taller than him?' 'What's the most popular sport?'"
    example_generator:
      contexts: ["family and relationships", "quizzes"]
      min_examples: 4

sub_rules:
  - rule: "Spelling: double the final consonant after a short vowel (big → bigger, sad → sadder)"
    type: grammatical
    examples: ["big → bigger → biggest", "sad → sadder → saddest", "thin → thinner → thinnest"]
  - rule: "Spelling: change y to i after a consonant (happy → happier, dry → drier)"
    type: grammatical
    examples: ["happy → happier → happiest", "dry → drier → driest", "pretty → prettier → prettiest"]
  - rule: "Spelling: just add -r/-st to adjectives ending in -e (nice → nicer, large → larger)"
    type: grammatical
    examples: ["nice → nicer → nicest", "large → larger → largest", "simple → simpler → simplest"]
  - rule: "Irregular forms: good → better → best; bad → worse → worst; far → farther/further → farthest/furthest"
    type: lexical
    examples: ["good → better → best", "bad → worse → worst", "far → further → furthest"]
  - rule: "Adverbs ending in -ly always use more/most (more carefully, most quickly)"
    type: grammatical
    examples: ["carefully → more carefully → most carefully", "quickly → more quickly → most quickly"]
  - rule: "Superlative with 'the' — except before possessives (the tallest girl / my best friend)"
    type: grammatical
    examples: ["the tallest building in the city", "my best friend", "her worst nightmare"]

use:
  - context: "Compare Two Items (Comparatives)"
    description: "Show difference between two people/things using 'than'."
    examples: ["My car is faster than yours.", "She is more experienced than him.", "This book is cheaper than that one."]
  - context: "Compare Three+ Items (Superlatives)"
    description: "Show the highest/lowest degree among three or more, use 'the' before superlative."
    examples: ["He is the tallest in the class.", "This is the most delicious cake I've ever eaten.", "That was the worst film of the year."]
  - context: "Negative Comparisons"
    description: "Use less/least to show lower degree."
    examples: ["This task is less difficult than I thought.", "He is the least prepared student.", "She is less outgoing than her sister."]
  - context: "Adverb Comparisons"
    description: "Compare how actions are performed."
    examples: ["She speaks more quietly than her sister.", "He works the hardest in the team.", "I drive more carefully than my brother."]

phonetics:
  - note: "Stress on the comparative/superlative adjective: She is TALLER. She is the TALLest."
    example_generator:
      contexts: ["sentence stress"]
    l1_issue: "Some L1 speakers give equal stress to all syllables, losing the contrastive emphasis"
  - note: "Weak form of 'than' /ðæn/ → /ðən/; 'the' before superlative is often reduced to /ðə/"
    example_generator:
      contexts: ["connected speech"]
    l1_issue: "Speakers whose L1 lacks dental fricatives may substitute /d/, /z/, or /t/ for the 'th' sound"

teaching:
  methodology: "PPP"
  tips:
    - "Week 1: Short adjectives (-er/-est), comparatives with 'than'."
    - "Week 2: Long adjectives (more/most), superlatives with 'the'."
    - "Week 3: Irregular adjectives, adverb comparisons."
    - "Use real objects: Compare two pencils (longer/shorter), three students (tallest/shortest)."
  recommended_activities:
    - name: "Object Comparison Game"
      duration: 10
      adaptation_notes: "Students pick two objects from a bag and make comparative sentences. Then add a third for superlatives."
    - name: "Class Superlatives"
      duration: 15
      adaptation_notes: "Students vote on class superlatives (the funniest, the most talkative, the tallest) and write sentences about the results."
