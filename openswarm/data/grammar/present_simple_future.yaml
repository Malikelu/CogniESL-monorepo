grammar_point: present_simple_future
title: "Present Simple for Future (Timetables and Schedules)"
description: "Using the present simple tense to talk about fixed, scheduled future events — timetables, programmes, and official arrangements that are not personal plans."
level: A2

meaning:
  core_meaning: "Fixed schedules and timetables that are set by an organisation or system, not by personal choice. The event is certain to happen at the scheduled time."
  timeline: "Future time, but using the present simple form because the schedule is fixed and unchangeable. The speaker has no control over the timing."
  contrast: "'The train leaves at 6pm.' (Present Simple — fixed timetable, decided by the railway.) vs 'I am going to leave at 6pm.' (Going to — personal plan, my decision.) vs 'I will leave at 6pm.' (Will — decision made at the moment of speaking.)"
  ccqs:
    - question: "Is this a personal plan or a fixed schedule?"
      answer: "A fixed schedule — it is set by an organisation or system."
    - question: "Can the speaker easily change this time?"
      answer: "No — it is a published or official schedule."
    - question: "Are we using a future form (will/going to)?"
      answer: "No — we use the present simple because the schedule is fixed."
  example_generator:
    contexts: ["transport timetables", "cinema and theatre programmes", "school timetables", "business opening hours", "TV schedules"]
    cultural_notes: ["This use is very common in British English for talking about transport and events", "In American English, people may use 'will' or 'is going to' more often in these contexts", "Train and bus announcements use this form: 'The next train leaves at...'"]
    min_examples: 5

form:
  affirmative:
    structure: "Subject + present simple verb (base form, with -s/-es for third person): 'The train leaves at 6pm.' / 'The film starts at 8.' / 'School finishes at 3:30.'"
    example_generator:
      contexts: ["transport", "entertainment", "education", "business hours"]
      min_examples: 4
  negative:
    structure: "Subject + do not/does not + base verb: 'The shop does not open on Sundays.' / 'The bus doesn't stop here.' / 'The class doesn't start until 10.'"
    example_generator:
      contexts: ["closed days", "cancellations", "exceptions to schedules"]
      min_examples: 3
  questions:
    structure: "Do/Does + subject + base verb: 'What time does the train leave?' / 'Does the bank open on Saturdays?' / 'When does the film start?'"
    example_generator:
      contexts: ["asking about schedules", "planning around timetables", "checking opening times"]
      min_examples: 3

sub_rules:
  - rule: "Use for transport timetables — trains, buses, flights, ferries"
    type: "grammatical"
    examples: ["The train leaves at 6:15.", "The bus arrives at 8:30.", "The flight departs at noon.", "The ferry leaves from Dover at 10am."]
  - rule: "Use for entertainment and event schedules — cinema, theatre, concerts, sports"
    type: "grammatical"
    examples: ["The film starts at 7:30.", "The concert begins at 8pm.", "The match kicks off at 3pm.", "The play finishes at 10:15."]
  - rule: "Use for institutional schedules — school, work, business hours"
    type: "grammatical"
    examples: ["School starts at 8:45.", "The meeting begins at 2pm.", "The bank opens at 9am.", "The restaurant closes at 11pm."]
  - rule: "Common time expressions: at + time, on + day, every + frequency"
    type: "lexical"
    examples: ["The train leaves at 6pm every day.", "The museum opens on Tuesdays at 10am.", "The bus runs every 15 minutes."]

use:
  - context: "Transport and travel"
    description: "The most common use — talking about when buses, trains, planes, and ferries depart and arrive."
    examples: ["What time does the next train to Manchester leave?", "The flight arrives at 9:45 local time.", "The last bus leaves at midnight."]
  - context: "Entertainment and events"
    description: "Talking about when films, shows, concerts, and sports events begin and end."
    examples: ["The film we want to see starts at 6:15.", "The concert finishes at 10pm, so we can catch the last train."]
  - context: "Daily schedules and routines"
    description: "Describing the fixed times of institutions and services."
    examples: ["The library opens at 10 and closes at 6.", "My first class starts at 9am.", "The supermarket is open from 7am to 11pm."]

phonetics:
  - note: "Time expressions with 'at' use the weak form /ət/: 'at 6pm' → /ət sɪks piː em/."
    example_generator:
      contexts: ["connected speech", "preposition reduction"]
    l1_issue: "Learners may stress 'at' unnecessarily: 'AT 6pm' instead of the natural weak form."
  - note: "Third-person -s is often overlooked in speech: learners may say 'The train leave at 6' instead of 'The train leaves at 6'."
    example_generator:
      contexts: ["third-person -s"]
    l1_issue: "The third-person -s is one of the most persistent errors for ESL learners. Drilling with timetable contexts provides meaningful practice."

teaching:
  methodology: "PPP"
  tips:
    - "Use real timetables (bus, train, cinema) as authentic material — print them or display on screen."
    - "Contrast with 'going to' for personal plans: 'The train leaves at 6' (timetable) vs 'I am going to leave at 6' (personal plan)."
    - "Practice question forms: 'What time does...?' is the most useful question for real-life situations."
    - "Have students create their own timetables (school, ideal day, holiday itinerary) and present them."
    - "Emphasise that this is NOT a general future form — it is only for fixed, scheduled events."
  recommended_activities:
    - name: "Timetable Information Role-Play"
      duration: 15
      adaptation_notes: "One student is a ticket office clerk; the other is a traveller. The traveller asks about departure times, platforms, etc. using 'What time does...?'"
    - name: "My Ideal School Timetable"
      duration: 15
      adaptation_notes: "Students design their dream school timetable and present it: 'On Monday, English starts at 10. Maths begins at 11:15.' Great for practising time-telling and present simple."
    - name: "Cinema Programme Challenge"
      duration: 10
      adaptation_notes: "Give students a cinema listings page. They must answer questions: 'What time does the 7:30 film finish?' 'Which film starts latest?'"
