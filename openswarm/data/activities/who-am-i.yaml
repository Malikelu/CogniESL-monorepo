id: who-am-i
name: Who Am I?
category: speaking
description: Students have a name or word on their back and must ask yes/no questions
  to guess their identity. Practices question formation, deduction, and vocabulary
  in a fun guessing game.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Sticky notes or tape
- Pen for writing names
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Prepare sticky notes with names of famous people, fictional characters, or vocabulary
  words related to your lesson topic.
- Place one sticky note on each student's back without them seeing what it says.
- Students walk around the room and ask each other yes/no questions to figure out
  their identity (e.g., 'Am I a real person?', 'Am I an actor?', 'Am I from America?').
- The answering student can only say 'yes' or 'no'.
- When a student correctly guesses their identity, they sit down. Continue until everyone
  has guessed.
- 'Debrief: ask students what questions were most helpful and review question formation
  patterns.'
script:
- '''"Walk around and ask your classmates questions. Remember — they can only answer
  yes or no!"'' '
- '''"Am I alive? Am I a man? Am I a singer? Think about what you''ve learned so far."'' '
- '''"Great question! Now you know I''m a living male singer. Who could it be?"'' '
setupInstructions: Write 15-20 names on sticky notes before class. Choose people your
  students will know — mix of historical figures, celebrities, and characters from
  current topics.
exampleSnippet:
  topic: past simple — famous historical figures
  execution:
  - Students get names like 'Albert Einstein', 'Cleopatra', 'Michael Jackson'.
  - 'Questions practiced: ''Am I alive?'', ''Was I a scientist?'', ''Did I live in
    the 20th century?'''
  teacherDialogue:
  - '''"Remember to use past tense: Did I live...? Was I born...? Did I write...?"'' '
  - '''"You''re doing great! Now narrow it down — what country am I from?"'' '
differentiation:
  support: Give struggling students a cheat sheet of question starters (Am I...? Do
    I...? Did I...? Have I...?). Pair them with a stronger partner.
  extension: Require advanced students to ask only negative questions (Aren't I...?
    Didn't I...?) or indirect questions (Can you tell me if I...?). Limit the number
    of questions to 10.
keywords:
- question formation
- deduction
- yes/no questions
- famous people
- guessing game
l1Enhanced: true
