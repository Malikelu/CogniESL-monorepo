id: speed-dating
name: Speed Dating
category: speaking
description: Students sit in two rows facing each other. They talk for 2-3 minutes,
  then one row rotates. Everyone practices with multiple partners.
targetStructures:
- speaking-fluency
- verb-tenses
- clauses
bestForLevels:
- A2
- B1
- B2
- C1
duration: 20
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Chairs in two facing rows
- Timer
- Topic cards
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
