hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Arrange chairs in two rows facing each other.
- Give students a topic or question to discuss.
- Students talk for 2-3 minutes. When time is up, one row shifts one seat to the right.
- Students talk to their new partner.
- Continue for 5-7 rounds.
- 'After the activity, ask: What was the most interesting thing you learned about
  someone?'
- 'Discuss: What questions did you ask?'
script:
- You have 3 minutes to talk to the person across from you. Ask questions, share your
  opinions. Ready? Go!
- Time! This row, move one seat to the right. New partner, new conversation!
setupInstructions: Arrange chairs in two facing rows. Prepare 5-7 topic cards. Set
  a timer.
differentiation:
  support: Provide conversation starters. Use simpler topics. Give more time.
  extension: Give more abstract topics. Reduce time to 90 seconds. Require note-taking.
keywords:
- speed dating
