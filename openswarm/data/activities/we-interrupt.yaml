id: we-interrupt
name: We Interrupt
category: speaking
description: 'We Interrupt -- a speaking activity. Explain the rules: you will read
  a statement or ask a question. Students must interrupt you with a natural response
  -- agreement, disagreement, a ques...'
targetStructures:
- clauses
bestForLevels:
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- List of provocative statements or questions
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Explain the rules: you will read a statement or ask a question. Students must interrupt
  you with a natural response -- agreement, disagreement, a question, a comment, anything
  appropriate.'
- Read a statement clearly and pause. Wait for students to jump in. The first student
  to respond 'wins' that round.
- 'Encourage a variety of response types: ''But...'', ''Really?'', ''I disagree because...'',
  ''That reminds me of...'', ''Wait, are you saying...?'''
- After each response, briefly acknowledge it and move to the next statement.
- If students are shy, start with easier, more controversial statements to provoke
  reactions.
- 'Debrief: discuss which responses sounded most natural and why.'
script:
- '''"Social media is destroying young people''''s ability to communicate. -- Go!"'''
- '''"Interesting! Okay, next one: Homework should be banned in all schools."'''
- '''"I can see you want to jump in -- go ahead! What do you say?"'''
setupInstructions: Prepare 10-15 provocative statements or questions related to your
  lesson topic or current events. Statements should be designed to provoke strong
  reactions.
exampleSnippet:
  topic: second conditional -- hypothetical situations
  execution:
  - 'Teacher: ''If I gave you no homework tonight, what would you do?'' -- Student
    interrupts: ''I would go to the cinema!'''
  - 'Teacher: ''If money wasn''''t important, I would become a musician.'' -- Student:
    ''But you can play music without it being your job!'''
  teacherDialogue:
  - '''"I''''m going to say something. Interrupt me with your reaction. Ready?"'''
  - '''"If animals could talk, the first thing my dog would say is... Go!"'''
  - '''"Great interruption! Now keep the conversation going with your partner."'''
differentiation:
  support: Give struggling students the statement in advance (written on a card) so
    they can prepare a response. Allow them to write their response first, then say
    it.
  extension: Require advanced students to use specific discourse markers in their
    interruptions (Actually..., Well..., Hold on..., But don't you think...?). Challenge
    them to keep the exchange going for 3 turns.
keywords:
- spontaneous speaking
- active listening
- conversation
- interruption
- fluency
l1Enhanced: true
