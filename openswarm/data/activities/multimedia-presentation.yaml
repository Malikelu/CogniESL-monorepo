instructions:
- Groups choose a topic related to their unit. They research and gather information
  (10 minutes).
- 'Groups create a multimedia presentation (20 minutes). Include: title slide, content
  slides with images, conclusion, and sources.'
- Each group presents (3-4 minutes per group).
- The audience takes notes and prepares 1-2 questions.
- After each presentation, the audience asks questions. The presenting group answers.
- 'The class evaluates each presentation on: content, visuals, delivery, and teamwork.'
- 'Discuss: What made the best presentations effective?'
script:
- Create a 5-slide presentation about your topic. Include images, key information,
  and sources. You have 30 minutes.
- Group 1, present your work. Class, take notes and prepare questions.
setupInstructions: Ensure access to computers and presentation software. Prepare a
  list of possible topics. Create a simple evaluation rubric.
differentiation:
  support: Provide a presentation template. Allow simpler topics. Require fewer slides.
  extension: Require interactive elements (polls, quizzes). Have students include
    a video clip or audio recording.
