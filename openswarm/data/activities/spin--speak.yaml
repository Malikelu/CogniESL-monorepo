id: spin--speak
name: Spin & Speak
category: speaking
description: A spontaneous speech prompt activity where a spinner selects a topic
  and students must speak about it for a set duration. Reduces speech inhibition and
  focuses on extemporaneous fluency.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Spinner (physical or digital)
- Timer
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: true
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Prepare a spinner with 8-12 topic options related to your lesson or general interest
  topics.
- 'Explain the rules: when the spinner lands on a topic, the selected student must
  speak about it for 30-60 seconds without stopping.'
- Spin the spinner. The student it points to (or the nearest student) must speak about
  the topic.
- If the student pauses for more than 5 seconds, gently encourage them to continue
  or ask a follow-up question.
- After the student finishes, briefly give positive feedback and one gentle correction
  if needed.
- Spin again for the next student. Aim to give 4-6 students a turn per session.
script:
- Spin the wheel! It landed on... FAVORITE FOOD. Maria, tell us about your favorite
  food for 45 seconds. Go!
- Hmm, what else? What does it taste like? Who cooks it? Keep going!
- Great job, Maria! You spoke for almost a full minute. Spin again -- this time for
  Carlos!
setupInstructions: 'Create a spinner with topic options. You can use a physical spinner,
  a digital spinner app, or simply draw topics from a hat. Topics should be accessible
  to all levels: favorite food, weekend plans, a memorable trip, etc.'
exampleSnippet:
  topic: travel and holidays
  execution:
  - Spinner lands on 'Dream vacation.' Student speaks for 45 seconds about where they
    would go and why.
  - Spinner lands on 'Worst travel experience.' Student narrates a past event using
    past tenses.
  - Spinner lands on 'If I could live anywhere.' Student practices conditional structures.
  teacherDialogue:
  - Your topic is 'My hometown.' Tell us about it -- what is it like? What do people
    do there? Go!
  - Do not worry about being perfect. Just keep talking. What else can you say?
differentiation:
  support: Allow 30 seconds of speaking time. Provide sentence starters on the board.
    Let students choose from two topics instead of one.
  extension: Increase speaking time to 90 seconds. Require students to use specific
    grammar structures (past tense, conditionals). Have the audience ask follow-up
    questions.
