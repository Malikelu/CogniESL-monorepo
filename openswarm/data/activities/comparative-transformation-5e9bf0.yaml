instructions:
- Prepare cards with base adjectives (tall, fast, big, small, expensive, etc.).
- Students draw a card and must write the comparative and superlative forms.
- 'Check answers. Review spelling rules: double consonant (bigger), -y to -ier (happier),
  more + adjective (more beautiful).'
- Students race to transform 10 adjectives as quickly as possible.
- 'Use the forms in sentences: ''A car is faster than a bike, but a plane is the fastest.'''
- Students create a comparison chart of 5 things (cities, animals, foods) using comparative
  and superlative forms.
script:
- Draw adjective cards.
- Race to write comparative.
- Check with group.
