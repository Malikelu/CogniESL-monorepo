id: scanning-race
name: Scanning Race
category: reading
description: Students race to find specific information in authentic texts (menus,
  schedules, ads, websites). Develops real-world reading skills.
targetStructures:
- reading-comprehension
- vocabulary
bestForLevels:
- A1
- A2
- B1
duration: 15
groupSize: pairs
energyRequired: high
prepTime: medium
materials:
- Authentic texts (menus, schedules, ads, websites)
- Question sheets
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give each pair an authentic text (menu, bus schedule, advertisement, website printout)
  and a question sheet.
- 'Questions should require scanning, not careful reading. Example: ''What time does
  the bus leave?'' / ''How much does the large pizza cost?'''
- Pairs race to find all answers. They must write the answer AND where they found
  it.
- The first pair to finish calls Done! Check their answers.
- 'Discuss: What strategies did you use? (Looking for numbers, keywords, headings)'
- 'Discuss: When do we scan in real life? (Menus, schedules, websites, forms)'
script:
- You have a menu and 10 questions. Find the answers as fast as you can. Write the
  answer AND where you found it. Ready? Go!
- First pair done! Let us check...
setupInstructions: Collect authentic texts (menus, schedules, ads). Create 10-12 scanning
  questions per text.
differentiation:
  support: Use simpler texts with fewer details. Provide fewer questions. Allow more
    time.
  extension: Use more complex texts. Include inference questions that require reading
    between the lines.
keywords:
- scanning
- authentic texts
- real-world reading
- speed
l1Enhanced: true
