id: reader-theater
name: Reader's Theater
category: reading
description: Students perform a script or dialogue by reading aloud with expression
  and emotion. No memorization needed -- focus on fluent, expressive reading.
targetStructures:
- reading-comprehension
- pronunciation
bestForLevels:
- A1
- A2
- B1
- B2
duration: 25
groupSize: small-groups
energyRequired: medium
prepTime: medium
materials:
- Scripts or dialogues (one per group)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Select or write a short script related to your lesson. Assign roles.
- Groups read through their script silently first, checking for unknown words.
- 'Groups practice reading aloud with expression: change your voice for different
  characters.'
- Each group performs for the class. The audience rates expression, fluency, and teamwork.
- 'Discuss: What made a good performance? How did expression help you understand?'
script:
- You are going to perform this script. Use your voice to show emotion.
- Listen to how Maria changed her voice for the angry character!
setupInstructions: Find or write short scripts at the appropriate level. One script
  per group.
differentiation:
  support: Give lower-level students shorter roles. Allow more practice time.
  extension: Ask students to add stage directions or create props.
keywords:
- readers theater
- fluency
- expression
- performance
l1Enhanced: true
