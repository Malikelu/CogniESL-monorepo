instructions:
- 'Review mixed conditionals: past condition + present result (e.g., ''If I had studied
  harder, I would have a better job now.'').'
- 'Write the first half of a mixed conditional on the board: ''If I had...'''
- Student 1 completes it with a past action and present result.
- 'Student 2 must start a new conditional using Student 1''s result. Example chain:
  ''If I had saved money, I would be rich now.'' -> ''If I were rich, I would travel
  the world.'''
- Continue the chain around the room. Each student builds on the previous one.
- 'Discuss: How do mixed conditionals help us talk about regrets and their present
  consequences?'
script:
- Write past result with present condition.
- Chain to next student.
- Identify pattern shift.
differentiation:
