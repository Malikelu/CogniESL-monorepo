id: story-cubes
name: Story Cubes
category: speaking
description: A spontaneous narrative creation task where students roll image-faced
  dice and must link all resulting images into a cohesive story. Promotes narrative
  flow, sequencing, and the use of transition words.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 15
groupSize: small-groups
energyRequired: medium
prepTime: low
materials:
- Story cubes (Rory's Story Cubes or similar) or homemade image dice
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Divide students into groups of 3-4. Give each group a set of story cubes (or use
  a digital alternative).
- Each student rolls the cubes (typically 6-9 cubes). All images must be incorporated
  into one story.
- Give groups 2-3 minutes to plan their story together. They must use ALL the images.
- One student narrates the story while others can help with forgotten images.
- Groups share their stories with the class. Listeners vote on the most creative or
  coherent story.
- 'Optional: have students write their story after telling it.'
script:
- '"Roll the cubes! Okay, you got a tree, a key, a lightning bolt, a book, a fish,
  and a heart. Now create a story using all six images!"'
- '"You have 2 minutes to plan. Work together -- how can a key, a fish, and a lightning
  bolt all be in the same story?"'
- '"Group 1, tell us your story! Remember to use all the images. Ready? Begin!"'
setupInstructions: Get a set of story cubes (Rory's Story Cubes or similar). If unavailable,
  create homemade dice with images glued to wooden blocks, or use a digital story
  cube app. Divide students into groups of 3-4.
exampleSnippet:
  topic: past simple narrative
  execution:
  - 'Images: tree, key, lightning bolt, book, fish, heart.'
  - 'Story: ''One day, a boy found a key under a tree. He opened an old book and suddenly
    a lightning bolt struck...'''
  - Class votes on the most creative story.
  teacherDialogue:
  - '"How does the heart connect to the fish? Be creative!"'
  - '"Great transition! Now what happened next?"'
differentiation:
  support: Use fewer cubes (4-5 instead of 6-9). Provide a story template with sentence
    starters. Pair with a stronger student.
  extension: Require groups to use all images AND include dialogue. Have them tell
    the story from a different character's perspective. Add a time limit for planning.
keywords:
