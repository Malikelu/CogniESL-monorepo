instructions:
- Select an audio clip (1-2 minutes) at the appropriate level. Create 10-12 detailed
  comprehension questions.
- Give students the question sheet. Let them read the questions before listening.
- Play the audio once. Students answer as many questions as they can.
- Play the audio a second time. Students check and complete their answers.
- Play a third time if needed. Students confirm all answers.
- 'Review answers as a class. Discuss: What strategies helped you catch the details?'
- 'Discuss: What was hardest -- names, numbers, or places? Why?'
script:
- Read the questions first. What information do you need to listen for?
- Listen carefully. Answer the questions. Ready?
setupInstructions: Find or create an audio clip at the appropriate level. Create 10-12
  detailed questions focusing on specific information.
differentiation:
  support: Use shorter clips. Provide multiple-choice questions. Play the audio 3-4
    times.
  extension: Use longer clips. Include inference questions. Play only twice.
