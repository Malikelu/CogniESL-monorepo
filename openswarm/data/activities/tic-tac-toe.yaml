id: tic-tac-toe
name: Tic-Tac-Toe
category: games
description: A grammar-focused strategy game played on a 3x3 grid. To mark a square,
  the team must produce a correct sentence using that square's prompt (grammar point,
  vocabulary word, or question). Combines strategic thinking with grammar practice.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Whiteboard and markers
- 3x3 grid drawn on the board
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Draw a 3x3 grid on the board. Write a grammar prompt in each square (e.g., past
  simple of 'eat,' make a question with 'where,' use 'since' in a sentence).
- 'Divide the class into two teams: X and O.'
- Team X chooses a square. They must produce a correct sentence using that square's
  prompt. If correct, they mark the square with X. If wrong, the other team can steal.
- Teams alternate turns. The first team to get 3 in a row wins.
- Play 2-3 rounds with different prompts each time.
script:
- '"Here is the grid. Top left: past tense of ''go.'' Top middle: make a question
  with ''what.'' Top right: use ''already'' in a sentence. Team X, choose a square!"'
- '"Team X chose the middle: make a question with ''where.'' Your question?"'
- '"Where did you go last weekend? Correct! Team X gets the middle square. Team O,
  your turn!"'
setupInstructions: Prepare 3x3 grids with grammar prompts. Each square should have
  a different prompt related to your current grammar focus. Draw the grid on the board
  before class.
exampleSnippet:
  topic: past simple practice
  execution:
  - 'Square prompts: past tense of eat (ate), past tense of see (saw), past tense
    of buy (bought), negative past (did not go), question with where (Where did you
    go?), question with when (When did it happen?), use already (I have already finished),
    use yet (Have you finished yet?), use never (I have never been there).'
  teacherDialogue:
  - '"Remember: to get the square, your sentence must be grammatically correct. If
    there is an error, the other team can steal."'
  - '"Think strategically -- which square will help you get 3 in a row?"'
differentiation:
  support: Use simpler prompts (single word transformations). Allow teams to discuss
    before answering. Give a word bank for reference.
  extension: 'Require more complex sentences (e.g., use the past simple in a sentence
    with a time clause: ''When I arrived, the movie had already started''). Add a
    time limit of 10 seconds per turn.'
keywords:
- grammar game
- strategy
- sentence production
- team competition
- grid game
l1Enhanced: true
