id: placemat-32f380
name: Placemat
category: review
description: Students divide a paper into sections and fill each with different aspects
  of a topic (vocabulary, grammar, questions, facts). A collaborative review tool
  that organizes learning visually.
targetStructures:
- vocabulary
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 10
groupSize: individuals
energyRequired: low
prepTime: none
materials:
- paper
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Give each group of 4 students a large piece of paper.
- They divide it into 4 sections (one per student) with a shared center.
- 'Each student writes/pictures their section: vocabulary from the unit, key grammar
  rules, a question they have, and a fun fact.'
- In the center, they write the most important thing the group learned.
- Groups rotate placemats and read each other's work. They can add comments or questions.
- Display placemats on the wall as a visual summary of the unit.
script:
- Divide paper into 4.
- Place topic in center.
- 'Fill corners: vocab, grammar, question, fact.'
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
keywords:
- placemat
- categorize
- review
l1Enhanced: true
