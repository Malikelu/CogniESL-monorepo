id: sentence-scramble
name: Sentence Scramble
category: grammar-practice
description: Teams race to the board to arrange jumbled words into a grammatically
  correct sentence. A fast-paced relay that reinforces English word order (SVO), identifies
  common syntax errors, and builds awareness of sentence structure.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
- C1
duration: 20
groupSize: small-groups
energyRequired: high
prepTime: low
materials:
- Whiteboard and markers
- Word cards or magnetic words (one set per sentence)
- Timer
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Prepare 8-10 scrambled sentences on word cards or write jumbled words on the board.
  Each sentence should be cut into individual words.
- Divide the class into teams of 3-4. Each team lines up at the back of the room,
  facing the board.
- Place the scrambled words for sentence 1 on the board (or give each team a set of
  word cards).
- On your signal, the first student from each team runs to the board and places one
  word in the correct position. They run back and tag the next teammate.
- Each teammate can move one word per turn. Teams continue until they believe the
  sentence is correct.
- Check each team's sentence. If correct, they earn a point. If incorrect, they have
  30 more seconds to fix it.
- Continue with new scrambled sentences. The team with the most correct sentences
  wins.
script:
- '"Your scrambled sentence is: yesterday / went / she / to / the / park. First player,
  run to the board and place one word. Go!"'
- '"Next player, you can move one word or add a word. Remember: English is Subject-Verb-Object!"'
- '"Time is up! Let us check. Team 1: She went to the park yesterday. Correct! One
  point!"'
setupInstructions: Prepare 8-10 sentences at the appropriate level. Write each word
  on a separate card or piece of paper. For the board method, write the words in jumbled
  order. For the card method, prepare one set per team. Ensure the whiteboard is accessible
  from all team positions.
exampleSnippet:
  topic: Past simple word order
  execution:
  - 'Scrambled: ''watched / last night / we / a / movie.'' Teams race to arrange:
    ''We watched a movie last night.'''
  - 'Scrambled: ''did / where / you / go / yesterday.'' Teams arrange: ''Where did
    you go yesterday?'' (Question form)'
  teacherDialogue:
  - '"Remember: Subject first, then verb, then object. Where does the time expression
    go? At the beginning or end!"'
  - '"Team 2, check your sentence. Did you put the subject before the verb? Good!
    Now check the question word order."'
differentiation:
  support: Use shorter sentences (4-5 words). Provide color-coded word cards (blue
    for subjects, red for verbs, yellow for objects). Allow teams to work together
    at the board instead of as a relay. Give a word-order template on the board.
  extension: Use longer sentences with adjectives, adverbs, and prepositional phrases.
    Include question forms and negative sentences. Add distractor words that do not
    belong in the sentence. Require teams to also identify the tense and subject-verb
    agreement rule for each sentence. At C1 level, include complex sentences with
    relative clauses.
keywords:
- word order
- syntax
- relay
- team race
- sentence building
- grammar
l1Enhanced: true
