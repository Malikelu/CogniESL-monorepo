hasVisualComponent: true
adaptableToTopic: true
instructions:
- Divide the class into groups of 3-4. Give each group one picture from a sequence
  (e.g., a 4-part story).
- Each group writes a paragraph describing their picture. They do not see the other
  pictures.
- 'After 10 minutes, regroup students: one member from each original group forms a
  new group. Now each new group has one paragraph from each part of the story.'
- The new group reads all paragraphs and edits them into a cohesive story. They must
  add transition words, fix pronoun reference, and ensure narrative flow.
- Groups read their completed stories to the class. The class votes on the most cohesive
  version.
- 'Debrief by reviewing the editing changes: What transition words were added? How
  were pronouns used to avoid repetition?'
script:
- Your group has picture 1. Write a paragraph describing what you see. Do not worry
  about the other pictures -- just focus on yours.
- Now we regroup. You each have a different paragraph. Read them in order. Does the
  story flow? What is missing between paragraphs?
- 'Add transition words: ''Meanwhile,'' ''After that,'' ''Suddenly,'' ''In the end.''
  Fix pronoun reference: ''The boy... he... the boy... he...'''
setupInstructions: 'Prepare a 4-6 part picture sequence (a story told through images).
  Print one picture per group. Prepare a transition word reference sheet with categories:
  time (first, then, after that), addition (also, moreover), contrast (however, but),
  result (therefore, so). Have colored pens available for editing.'
exampleSnippet:
  topic: Narrative cohesion and transition words
  execution:
  - 'Picture 1: A boy finds a map. Group 1 writes: ''One day, a boy was walking in
    the park. He found an old map under a tree.'''
  - 'Picture 2: The boy follows the map. Group 2 writes: ''The map showed a path through
    the forest. He decided to follow it.'''
  - 'Picture 3: The boy reaches a river. Group 3 writes: ''There was a wide river.
    He could not cross it.'''
  - 'Picture 4: The boy finds a bridge. Group 4 writes: ''Finally, he found a bridge.
    He crossed it and found the treasure.'''
  - 'Edited version adds: ''After finding the map, he decided to follow it. However,
    when he reached the river, he could not cross it. Fortunately, he found a bridge...'''
  teacherDialogue:
  - Read the paragraphs in order. Does it flow? What is missing between paragraph
    1 and 2?
  - 'Add a transition: ''After finding the map, he...'' or ''The next day, he...'''
  - 'Check pronoun reference: ''The boy... he... the boy... he...'' Good! You are
    using ''he'' to avoid repeating ''the boy.'''
differentiation:
  support: Use a 3-part story instead of 4-6 parts. Provide a transition word bank.
    Give each group a paragraph template with sentence starters. Allow the teacher
    to circulate and help with editing.
  extension: 'Use a 6-part story. Require groups to add dialogue, descriptions, and
    varied sentence structures. Have groups write a reflection on their editing process:
    What changes did they make and why? Include peer review where groups evaluate
    another group''s cohesion.'
