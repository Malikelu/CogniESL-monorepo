id: jigsaw-writing
name: Jigsaw Writing
category: writing
description: Groups each write one paragraph of a multi-part story or essay, then
  regroup to edit all paragraphs into a cohesive whole. Practices transition words,
  pronoun reference, narrative flow, and collaborative editing.
targetStructures:
- clauses
- discourse
- pronouns
- verb-tenses
bestForLevels:
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 25
groupSize: small-groups
energyRequired: low
prepTime: medium
materials:
- Picture sequence or story prompt (one picture per group)
- Paper and pencils
- Colored pens for editing
- Transition word reference sheet
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
