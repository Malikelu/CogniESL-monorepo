id: scavenger-hunt
name: Scavenger Hunt
category: warm-up
description: A physical-to-semantic connection task where students must find an object
  in the classroom or school that matches a specific linguistic description. Reinforces
  descriptive vocabulary and the utility of English in describing the immediate environment.
targetStructures:
- adjectives
- prepositions
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: small-groups
energyRequired: high
prepTime: low
materials:
- Description cards (e.g., 'Find something that is opaque,' 'Find something made of
  wood')
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Prepare description cards with target vocabulary. Examples: ''Find something that
  is opaque,'' ''Find something made of wood,'' ''Find something that is cylindrical.'''
- Divide students into small groups. Give each group 5-6 description cards.
- Groups must find objects in the classroom (or school) that match each description.
- When they find an object, they bring it back (or take a photo) and write the name
  of the object next to the description.
- The first group to complete all descriptions correctly wins.
- 'Review: Each group presents one object and explains why it matches the description.'
script:
- '"Your first card says: Find something that is opaque. What does opaque mean? It
  means you cannot see through it. Go find one!"'
- '"Found it! What is it? A wooden desk. Great! Write it down and move to the next
  card."'
- '"Remember, you must write the English name of the object, not just point at it."'
setupInstructions: Prepare 20-30 description cards with target vocabulary (opaque,
  transparent, cylindrical, rectangular, made of metal, soft, rough, etc.). Ensure
  the target objects are available in the classroom. Each group needs a pencil and
  their set of cards.
exampleSnippet:
  topic: Adjectives and prepositions of place
  execution:
  - 'Card: ''Find something that is cylindrical.'' Students find a pencil or a water
    bottle.'
  - 'Card: ''Find something made of fabric.'' Students find a curtain, a bag, or a
    piece of clothing.'
  - 'Card: ''Find something that is transparent.'' Students find a glass window or
    a clear plastic bottle.'
  teacherDialogue:
  - '"What does the word cylindrical mean? It means shaped like a cylinder -- long
    and round!"'
  - '"Where did you find it? On the desk? Under the chair? Next to the window? Use
    prepositions!"'
differentiation:
  support: Give weaker groups easier descriptions with pictures. Allow them to work
    with a stronger partner. Provide a word bank of descriptive vocabulary.
  extension: 'Challenge stronger groups with more abstract descriptions: ''Find something
    that makes you feel calm.'' ''Find something that represents technology.'' At
    B2 level, require students to write full sentences describing the object''s location
    using prepositions of place.'
keywords:
- scavenger-hunt
- adjectives
- prepositions
- movement
- vocabulary
- environment
l1Enhanced: true
