instructions:
- Select a short text or story that contains clear cause-and-effect relationships.
- Read the text aloud or have students read it silently.
- Ask students to identify one event from the text. They write it on a piece of paper.
- Students write one CAUSE and one EFFECT for that event, using 'because' for cause
  and 'so' for effect.
- 'Example: Event = ''The streets were wet.'' Cause = ''It rained because...'' Effect
  = ''The streets were wet, so cars drove slowly.'''
- Students share their cause-effect pairs. Discuss different valid interpretations.
- 'Extension: Students create a chain of 3 cause-effect events from the story.'
script:
- Identify event from story.
- Write one cause and effect.
- Connect with 'because'.
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
