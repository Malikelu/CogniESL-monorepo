id: simon-says
name: Simon Says
category: games
description: A classic listening and reaction game where students follow commands
  only when prefaced by "Simon says." Practices imperative forms, listening for sentence-initial
  triggers, and physical response to spoken English.
targetStructures:
- verb-tenses
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: high
prepTime: none
materials:
- None
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Explain the rule: students must ONLY follow commands that begin with ''Simon says.''
  If you give a command without ''Simon says,'' students who move are out.'
- 'Demonstrate with a few rounds: ''Simon says touch your nose'' (students touch nose).
  ''Touch your head'' (students who move are out).'
- Start slowly with simple commands. Gradually increase speed and complexity.
- 'Use commands that review target vocabulary: body parts, classroom actions, prepositions
  of place.'
- Eliminate students who follow a command without 'Simon says' or who fail to follow
  a 'Simon says' command.
- The last student standing wins. Play multiple rounds.
script:
- Simon says stand up. Simon says touch your nose. Simon says turn around. Jump! --
  Ha, I did not say Simon says!
- Simon says raise your left hand. Simon says put your hand on your head. Simon says
  sit down. Clap! -- Oops, no Simon says!
- Faster now! Simon says touch your knees. Simon says point to the door. Walk to the
  window! -- Got you!
setupInstructions: Clear space for students to move around. No materials needed. Prepare
  a list of commands using your target vocabulary.
exampleSnippet:
  topic: body parts and actions
  execution:
  - 'Round 1: ''Simon says touch your elbow. Simon says stamp your feet. Simon says
    blink twice.'''
  - 'Trick round: ''Simon says close your eyes. Open your eyes! -- Students who open
    their eyes are out.'''
  - Final round with faster commands until one student remains.
  teacherDialogue:
  - Remember -- only move when I say Simon says first!
  - You are out! Sit down and watch carefully. See how the others stay still?
differentiation:
  support: Give struggling students a visual cue (hold up a card) when 'Simon says'
    is spoken. Use very simple commands. Let them observe a round before joining.
  extension: 'Have advanced students give the commands instead of the teacher. Use
    complex multi-step commands: ''Simon says touch your nose, then turn around, then
    sit down.'''
keywords:
