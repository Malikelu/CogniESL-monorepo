- Letter format reference sheet
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Review letter format: date, greeting, body, closing, signature. Show formal and
  informal examples.'
- 'Assign letter types: formal (complaint, request) or informal (to a friend).'
- Students write a letter to their partner (15 minutes). 100-150 words.
- Students exchange letters and read carefully.
- Students write a reply (10 minutes). Address the content of the original letter.
- 'Discuss: What is different about formal and informal letters?'
script:
- Today you will write a letter to your partner. It can be formal or informal. Make
  it 100-150 words.
- Now read your partner's letter. Write a reply. Answer their questions and ask new
  ones.
setupInstructions: Prepare letter format reference sheets. Create letter writing prompts.
differentiation:
  support: Provide a letter template with sentence starters. Allow shorter letters.
  extension: Require specific letter types. Have students research real-world letter
    formats.
keywords:
- letter
- formal
- informal
- register
- exchange
l1Enhanced: true
