id: letter-exchange
name: Letter Exchange
category: writing
description: 'Letter Exchange -- a writing activity. Review letter format: date, greeting,
  body, closing, signature. Show formal and informal examples. Assign letter types:
  formal (complaint, request) or...'
targetStructures:
