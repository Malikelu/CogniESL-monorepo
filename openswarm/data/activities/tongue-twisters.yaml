instructions:
- Write a tongue twister on the board. Read it aloud slowly, emphasizing the tricky
  sounds.
- Students repeat after you, slowly at first. Gradually increase the speed.
- 'Practice 3 times: slow, medium, fast. The goal is to say it fast without errors.'
- Have individual students try. The class listens for errors.
- Practice 2-3 different tongue twisters, each targeting different sounds.
script:
- '"Listen: She sells seashells by the seashore. Now repeat after me, slowly: She
  sells seashells by the seashore."'
- '"Faster: She sells seashells by the seashore. Even faster! She sells seashells
  by the seashore!"'
- '"Your turn! Say it three times fast without making a mistake."'
setupInstructions: 'Prepare 3-4 tongue twisters targeting sounds your students struggle
  with. For Japanese speakers: L/R sounds. For Spanish speakers: B/V sounds. For Portuguese
  speakers: TH sounds.'
exampleSnippet:
  topic: minimal pairs and tricky sounds
  execution:
  - 'For L/R practice: Red lorry, yellow lorry. Red lorry, yellow lorry.'
  - 'For TH practice: The thirty-three thieves thought that they thrilled the throne
    throughout Thursday.'
  - 'For B/V practice: Betty bought butter but the butter was bitter, so Betty bought
    better butter.'
  teacherDialogue:
  - '"The difference between ''light'' and ''right'' is the first sound. Put your
    tongue between your teeth for TH, and curl it back for R."'
  - '"Do not worry about speed at first. Focus on accuracy. Speed comes with practice."'
differentiation:
  support: Use shorter tongue twisters (5-6 words). Practice one sound at a time.
    Allow students to practice in pairs before performing for the class.
  extension: 'Use longer, more complex tongue twisters. Have a speed competition:
    who can say it the fastest without errors? Have students create their own tongue
    twisters targeting specific sounds.'
