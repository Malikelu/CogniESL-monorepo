id: summarize-ted
name: Summarize TED
category: listening
description: Students watch a short TED talk or professional presentation and must
  summarize the main argument in 3-5 sentences. A high-level comprehension task that
  targets academic English, note-taking skills, and the ability to synthesize complex
  ideas.
targetStructures:
- listening-comprehension
bestForLevels:
- B2
- C1
bestForAges:
- teens
- adults
duration: 30
groupSize: individuals
energyRequired: low
prepTime: medium
materials:
- TED talk video (5-10 minutes)
- Projector or screen
- Note-taking handout (optional)
format:
- in-person
- online
requiresTech: true
digitalReady: true
hasAudioComponent: true
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Select a TED talk (5-10 minutes) related to your lesson topic or a general interest
  topic. Prepare 2-3 pre-viewing questions.
- Give students the pre-viewing questions. Play the talk once. Students take notes.
- Play the talk a second time. Students add to their notes.
- 'Students write a 3-5 sentence summary of the main argument. They must include:
  the speaker''s main point, 1-2 supporting arguments, and the conclusion.'
- Students share their summaries in pairs or small groups. Compare what they understood.
- 'Discuss as a class: What was the main argument? What evidence did the speaker use?'
script:
- '"We are going to watch a TED talk about happiness. Before we start, think about
  this: What do you think makes people happy?"'
- '"Watch and take notes. You will write a summary afterward."'
- '"Now write your summary in 3-5 sentences. Include the main point and the key evidence."'
setupInstructions: Select a TED talk (5-10 minutes) at an appropriate level. Prepare
  pre-viewing questions and a note-taking template. Test the video and audio before
  class.
exampleSnippet:
  topic: academic listening and summarization
  execution:
  - 'Video: ''The Happy Secret to Better Work'' by Shawn Achor (7 minutes).'
  - 'Summary: Shawn Achor argues that fuels success, not the other way around. He
    presents research showing that positive brains perform better. He suggests daily
    habits like writing down three gratitudes to rewire the brain for positivity.'
  teacherDialogue:
  - '"Do not try to write everything down. Focus on the main points and key examples."'
  - '"Your summary should answer: What did the speaker believe? What evidence did
    they give?"'
differentiation:
  support: Use a shorter video (3-4 minutes). Provide a fill-in-the-blank summary
    template. Give students the transcript to read after watching. Work through the
    summary as a class.
  extension: 'Require a longer summary (1 paragraph). Have students also evaluate
    the speaker''s arguments: Do you agree? Why or why not? Have them present their
    summary to the class.'
keywords:
- TED talks
- academic listening
- summarization
- comprehension
- note-taking
- synthesis
- academic English
l1Enhanced: true
