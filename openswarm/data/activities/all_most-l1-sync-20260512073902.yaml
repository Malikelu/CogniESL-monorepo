instructions:
- Review the quantifiers 'all' and 'most.' 'All' means 100% of something. 'Most' means
  more than 50% but not 100%.
- 'Write example sentences on the board: ''All students have notebooks.'' / ''Most
  students like music.'' / ''All water is wet.'' / ''Most water on Earth is saltwater.'''
- Give students 10 sentences with blanks. They choose 'all' or 'most' for each.
- Students compare answers with a partner. Discuss any disagreements.
- Students write 5 sentences about their class, city, or country using 'all' and 'most'.
- 'Share sentences with the class. Discuss: When would you use ''all'' vs. ''most''?
  What changes the meaning?'
script:
- '"Let''s talk about quantity words. \"All\" means 100% — every single one. \"Most\"
  means more than half, the majority. For example: All students passed the exam. Most
  students passed the exam. Do you hear the difference?"'
- '"Now, with your partner, take the sentence strips and sort them into \"all\" or
  \"most\" categories. Then rewrite each one as a full English sentence. Watch out
  — some work with countable nouns, some with uncountable!"'
- '"Let''s hear some of your sentences. Who had a tricky one? Remember, we say \"all
  the students\" but \"most students\" — no \"the\" after \"most\" when speaking generally."'
differentiation:
  support: Provide sentence stems for lower‑level learners.
  extension: Challenge advanced students to create their own sentences with mixed
    noun types.
