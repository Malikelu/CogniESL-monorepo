id: semantic-mapping
name: Semantic Mapping
category: vocabulary
description: 'Semantic Mapping -- a vocabulary activity. Write a central word in the
  middle. Example: HOUSE. Students brainstorm related words as branches: rooms, furniture,
  actions, adjectives....'
targetStructures:
- vocabulary
- nouns
- adjectives
- adverbs
bestForLevels:
- A2
- B1
- B2
- C1
duration: 15
groupSize: pairs
energyRequired: low
prepTime: none
materials:
- Large paper and colored pens
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Write a central word in the middle. Example: HOUSE.'
- 'Students brainstorm related words as branches: rooms, furniture, actions, adjectives.'
- Use different colors for categories. Connect related words with lines.
- 'Add collocations: do the dishes, make the bed, go home.'
- Students compare maps with another pair.
- Display maps on the wall. Students add new words throughout the unit.
script:
- Write HOUSE in the middle. Now think of every word you can connect to house.
- Use different colors for different categories.
setupInstructions: Have large paper and colored pens. Choose central words with rich
  vocabulary networks.
differentiation:
  support: Provide a starter map with some branches filled in. Use more concrete words.
  extension: Challenge students to include idioms. Have them write a short text using
    words from their map.
keywords:
- semantic map
- vocabulary network
- word association
- visual
l1Enhanced: true
