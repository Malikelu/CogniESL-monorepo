id: emoji-check-in
name: Emoji Check-in
category: warm-up
description: Students select an emoji representing their mood and explain their reasoning.
  A modern, low-pressure warm-up activity that bridges emotional intelligence with
  linguistic expression, practicing descriptive adjectives, present simple, and causal
  language (because, so).
targetStructures:
- adjectives
- adverbs
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 10
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Emoji cards or digital board with emoji display
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Display a set of emoji on the board or distribute emoji cards to students.
- Each student selects the emoji that best represents their current mood.
- 'Students share their emoji with the class and explain why they chose it: ''I chose
  this emoji because...'''
- 'Encourage use of descriptive language: ''I feel tired because I did not sleep well.'''
- 'Optional: students can ask follow-up questions to the person who shared.'
- Use this as a transition into the lesson, connecting the emotional check-in to the
  day's topic.
script:
- '"Good morning, everyone! Let us do a quick check-in. Look at these emoji. Which
  one matches how you feel right now? When it is your turn, tell us: I feel... because..."'
- '"Great! Maria chose the happy emoji because she got good news today. Ahmed chose
  the tired emoji because he stayed up late. Thank you for sharing!"'
setupInstructions: Prepare a set of 10-15 emoji representing different emotions (happy,
  sad, tired, excited, nervous, confused, etc.). Display them on a slide, whiteboard,
  or as printed cards. No other materials needed.
exampleSnippet:
  topic: feelings with because
  execution:
  - 'The teacher displays 12 emoji on the board. Each student picks one and says:
    ''I chose the sleepy emoji because I went to bed late last night.'' ''I chose
    the excited emoji because we are going on a field trip tomorrow.'' The teacher
    responds naturally to each share.'
  - 'Teacher extends: ''Maria chose the happy emoji. Why is she happy? Use because!''
    Students practice third-person because-clauses.'
  teacherDialogue:
  - '"Good morning, everyone! Let us do a quick check-in. Look at these emoji. Which
    one matches how you feel right now?"'
  - '"Great! Maria chose the happy emoji because she got good news today. Thank you
    for sharing! Ahmed, you chose the sleepy emoji. Is it because you went to bed
    late?"'
differentiation:
  support: 'Provide sentence frames: ''I chose this emoji because I feel...'' ''Today
    I am... because...'' Allow students to point to an emoji without speaking, then
    gradually add words. Accept short answers.'
  extension: 'Students explain their emoji choice in detail using complex sentences
    with intensifiers (''I am extremely tired because...''). They can also guess why
    others chose their emoji. Discuss how emotions are expressed differently across
    cultures. Use past tense: ''Yesterday I felt... because...'''
keywords:
- emoji
- check-in
