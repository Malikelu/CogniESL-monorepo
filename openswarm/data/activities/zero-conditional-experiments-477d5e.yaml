id: zero-conditional-experiments-477d5e
name: Zero Conditional Experiments
category: grammar-practice
description: Conduct simple cause-effect experiments demonstrating zero conditional
  structure.
targetStructures:
- conditionals
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 30
groupSize: pairs
energyRequired: high
prepTime: medium
materials:
- simple science items
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Review the zero conditional: ''If + present simple, present simple.'' Used for
  scientific facts and general truths.'
- 'Demonstrate with simple examples: ''If you heat water, it boils.'' / ''If you mix
  red and blue, you get purple.'''
- Students work in pairs to think of 5 zero conditional sentences about science, nature,
  or daily life.
- 'Share sentences with the class. Discuss: Are these always true?'
- 'Optional: Conduct simple safe experiments to test zero conditional statements (e.g.,
  ''If you drop something, it falls.'').'
- Students write a paragraph about a scientific fact using zero conditionals.
script:
- Test simple cause-effect (heat water = boil).
- Write zero conditional sentences.
- Present findings to class.
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: Predict outcomes before testing.
