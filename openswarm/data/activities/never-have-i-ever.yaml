id: never-have-i-ever
name: Never Have I Ever
category: speaking
description: Students share things they have never done using the present perfect
  structure, and classmates respond if they have done those things. A popular social
  game that drills the present perfect in a fun, engaging context.
targetStructures:
- verb-tenses
bestForLevels:
- A2
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None (or a soft ball for passing)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Explain the game: Students take turns saying ''Never have I ever...'' followed
  by something they have never done. For example: ''Never have I ever eaten sushi.'''
- Classmates who HAVE done that thing respond by raising their hand or saying 'I have!'
- 'Model the activity first: ''Never have I ever been to Japan.'' (Students who have
  been to Japan raise their hands.)'
- Go around the room. Each student says one 'Never have I ever...' statement.
- 'After each statement, ask follow-up questions: ''When did you do that?'' ''How
  was it?'' (This practices past simple.)'
- 'Debrief: Review the present perfect structure on the board. Discuss any grammar
  questions that came up.'
script:
- '"It is my turn: Never have I ever ridden a horse. If you HAVE ridden a horse, raise
  your hand! Oh, Maria has! Maria, when did you ride a horse?"'
- '"Your turn! Say: Never have I ever... and then something you have never done. Remember
  to use have + past participle."'
- '"Great! Now class, ask [student] a question about it: When did you...? How was
  it?"'
setupInstructions: 'No materials needed. Optionally write the sentence frame on the
  board: ''Never have I ever ______.'' Prepare a few example statements to get the
  game started.'
exampleSnippet:
  topic: Life experiences
  execution:
  - 'Student 1: ''Never have I ever been to Europe.'' (Three students raise their
    hands.)'
  - 'Class: ''When did you go to Europe?'' Student 2: ''I went to France last summer.'''
  - 'Student 3: ''Never have I ever tried skydiving.'' (No one raises their hand.)'
  teacherDialogue:
  - '"Remember the structure: Never have I ever + past participle. So it is Never
    have I ever eaten, Never have I ever been, Never have I ever tried..."'
  - '"Good! Now if someone says something you HAVE done, raise your hand and say I
    have! Then we will ask you about it."'
differentiation:
  support: Provide a list of common past participles on the board (been, eaten, tried,
    seen, visited, ridden, flown, etc.). Allow students to read from a prepared sentence.
    Work in small groups instead of whole-class to reduce anxiety.
  extension: 'Add a scoring system: students earn points for each classmate who raises
    their hand. Introduce follow-up questions using past simple: ''When did you do
    that?'' ''How was it?'' ''Would you do it again?'' Have students write a short
    paragraph about the most interesting thing they learned about a classmate. At
    C1 level, require students to use more complex structures: ''Never have I ever
    had the opportunity to...'' or ''Never have I ever been in a situation where...'''
keywords:
- present perfect
- social game
- experiences
- speaking
- icebreaker
- getting to know you
l1Enhanced: true
