id: rod-mind-mapping
name: Rod Mind-Mapping
category: writing
description: A tactile essay planning tool where students use colored rods to visually
  map out the structure of an essay or story before writing. Each color represents
  a different theme or paragraph element.
targetStructures:
- discourse
- verb-tenses
bestForLevels:
- A2
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 20
groupSize: small-groups
energyRequired: low
prepTime: medium
materials:
- Cuisenaire rods or colored strips of paper
- Essay prompt cards
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Assign colors to essay elements: white = thesis statement, red = main arguments,
  blue = supporting details, yellow = examples, green = conclusion.'
- 'Give each group an essay prompt. For example: ''Should students wear school uniforms?'''
- Groups discuss their essay plan and select rods to represent each element. They
  arrange the rods in order on their desk.
- 'For example: white rod (thesis: ''Students should wear uniforms because...'') +
  3 red rods (3 arguments) + blue/yellow rods (details and examples for each) + green
  rod (conclusion).'
- Groups present their rod map to the class, explaining their essay structure.
- Students then write their essay based on the rod plan. The rods serve as a visual
  outline.
script:
- '"White rod is your thesis statement. What is your main argument? Place it first."'
- '"Now add red rods for each main point. How many arguments do you have? Three? Use
  three red rods."'
- '"Under each red rod, add blue and yellow rods for your supporting details and examples."'
setupInstructions: 'Prepare Cuisenaire rods or colored strips of paper in 5 colors.
  Create a color key: white = thesis, red = arguments, blue = details, yellow = examples,
  green = conclusion. Prepare 3-4 essay prompt cards.'
exampleSnippet:
  topic: Essay structure and linking words
  execution:
  - 'Prompt: ''Is social media good or bad for teenagers?'''
  - 'Group plan: White rod (thesis: ''Social media has both benefits and dangers for
    teenagers.'') + Red rod 1 (benefits: staying connected) + Blue/Yellow rods (details:
    messaging friends, sharing experiences) + Red rod 2 (dangers: cyberbullying) +
    Blue/Yellow rods (details: anonymous harassment, mental health) + Green rod (conclusion:
    balance is key).'
  - Group presents their rod map, then writes the essay following the plan.
  teacherDialogue:
  - '"What is your thesis? Write it on the white rod."'
  - '"Now add your arguments. Use linking words: first, second, furthermore, however,
    in conclusion."'
differentiation:
  support: Provide weaker groups with a partially completed rod map. Give them the
    thesis and ask them to add the arguments and details. Provide a word bank of linking
    words.
  extension: 'Challenge stronger groups to add counter-argument rods (a different
    color) and rebuttal rods. Practice the structure: argument, counter-argument,
    rebuttal. At C1 level, require students to write a full essay using the rod plan
    as a guide, with sophisticated linking words and complex sentence structures.'
keywords:
- essay-planning
- mind-mapping
- structure
- writing
- tactile
- organization
l1Enhanced: true
