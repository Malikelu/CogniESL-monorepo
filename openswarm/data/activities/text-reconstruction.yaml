id: text-reconstruction
name: Text Reconstruction
category: reading
description: Students receive a text cut into individual sentences. They must reconstruct
  the original by putting sentences in the correct order.
targetStructures:
- reading-comprehension
- discourse
- clauses
bestForLevels:
- A2
- B1
- B2
duration: 20
groupSize: pairs
energyRequired: medium
prepTime: medium
materials:
- Texts cut into individual sentence strips
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give each pair a set of sentence strips that form a complete text.
- 'Students arrange the sentences. They look for clues: pronouns, time connectors,
  logical flow.'
- When pairs think they have the correct order, they compare with another pair.
- Display the correct order. Students check their version.
- 'Discuss: What clues helped you decide the order?'
- Students read the reconstructed text aloud to check it makes sense.
script:
- These sentences are all mixed up. Put them back in the correct order. Look for clues
  -- pronouns, time words, and logic.
- How did you know that sentence came first?
setupInstructions: Select texts with clear structure. Cut into sentence strips. Keep
  an answer key.
differentiation:
  support: Use shorter texts. Highlight connecting words. Provide the first and last
    sentences.
  extension: Use longer texts with more subtle connections.
keywords:
- text structure
- cohesion
- sequencing
- reconstruction
l1Enhanced: true
