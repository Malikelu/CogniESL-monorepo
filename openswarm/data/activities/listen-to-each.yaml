instructions:
- Pair students up. Give each pair a topic card or let them choose a topic (e.g.,
  'My favorite holiday,' 'A memorable experience,' 'My hometown').
- Student A speaks for 2-3 minutes on the topic. Student B listens without interrupting.
- Student B must listen carefully and write down 2-3 follow-up questions based on
  what they heard.
- After Student A finishes, Student B asks their follow-up questions. Student A answers.
- Switch roles with a new topic.
- 'Debrief: What was hard about listening without interrupting? What makes a good
  follow-up question?'
script:
- Student A, you will speak for 2 minutes about your favorite holiday. Student B,
  listen carefully -- no interrupting. Write down questions as you listen.
- Time is up! Student B, what questions do you have? Ask them now.
- 'Great question: Why did you choose that holiday? Now switch -- Student B speaks,
  Student A listens.'
setupInstructions: 'Prepare 5-6 topic cards with simple prompts: ''My favorite holiday,''
  ''A memorable experience,'' ''My hometown,'' ''My favorite food,'' ''Something I
  want to learn.'' Alternatively, let students choose their own topics. Have paper
  and pencils ready for question writing.'
exampleSnippet:
  topic: Personal experiences
  execution:
  - Student A speaks about their hometown for 2 minutes. Student B listens and writes
    questions.
  - Student B asks follow-up questions using WH-words based on what they heard.
  - Student A answers each question. Then they switch roles with a new topic.
  teacherDialogue:
  - Listen carefully. What details can you remember? What would you like to know more
    about?
  - Good follow-up question! You used a WH-word -- that gives a more interesting answer
    than yes/no.
differentiation:
  support: 'Provide sentence starters for follow-up questions: ''Can you tell me more
    about...?'' ''Why did you...?'' ''How did you feel when...?'' Allow Student B
    to take notes while listening.'
  extension: 'Require Student B to ask at least one follow-up question that uses a
    different tense than the original statement (e.g., if Student A used past simple,
    Student B asks a present perfect question: ''Have you ever been back?'').'
keywords:
