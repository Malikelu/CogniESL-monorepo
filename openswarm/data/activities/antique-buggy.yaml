id: antique-buggy
name: Antique Buggy
category: speaking
description: Students compare old and new versions of everyday objects, describing
  differences using comparative adjectives and the 'used to' structure. A hands-on
  activity that practices historical comparison language while building vocabulary
  for describing technology and everyday items across time periods.
targetStructures:
- adjectives
- verb-modals
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 15
groupSize: small-groups
energyRequired: low
prepTime: high
materials:
- Pairs of old/new objects (or photos)
- Comparison worksheet (optional)
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Display pairs of old and new objects (or photos) for students to compare.
- 'Model the activity: ''The old phone was much heavier than the new one. People used
  to dial with a finger wheel, but now we touch a screen.'''
- Students handle the objects (or study photos) and describe differences in small
  groups.
- Encourage use of comparative adjectives ('heavier than,' 'more expensive than')
  and 'used to' for past habits.
- Groups share their comparisons with the class.
- The teacher highlights correct usage and addresses common errors.
script:
- '"Look at these two phones. The one on the left is from 1950. The one on the right
  is from today. I want you to compare them. Use sentences like: ''The old phone is
  ___ than the new phone.'' ''People used to ___, but now we ___.''"'
- '"Who can tell me about the weight? Yes! ''The old phone was much heavier than the
  smartphone.'' Great! What about the size?"'
setupInstructions: 'Gather 4-6 pairs of old and new objects (or printed photos). Good
  examples: rotary phone/smartphone, typewriter/laptop, paper map/GPS, film camera/digital
  camera, vinyl record/streaming. If physical objects are not available, use high-quality
  printed images. Prepare a comparison frame handout for support.'
exampleSnippet:
  topic: used to
  execution:
  - 'Display an old telephone (rotary or candlestick) next to a modern smartphone.
    Students handle both objects and describe differences. The teacher models: ''The
    old phone was much heavier than the new one. People used to dial with a finger
    wheel, but now we touch a screen.'' Students then compare other object pairs in
    small groups.'
  teacherDialogue:
  - '"Look at these two phones. The one on the left is from 1950. The one on the right
    is from today. I want you to compare them. Use sentences like: ''The old phone
    is ___ than the new phone.'' ''People used to ___, but now we ___.''"'
  - '"Who can tell me about the weight? Yes! ''The old phone was much heavier than
    the smartphone.'' Great! What about the size?"'
differentiation:
  support: 'Provide a comparison frame on the board: ''The old ___ was ___ but the
    new ___ is ___.'' Give a list of useful adjectives (heavy/light, big/small, slow/fast,
    expensive/cheap). Allow students to work in pairs.'
  extension: Advanced students can write a short paragraph comparing the objects using
    complex comparative structures ('not nearly as..as,' 'far more..than,' 'considerably
    lighter than'). They can also speculate about future versions of the objects.
keywords:
