instructions:
- At the end of class, give each student a small piece of paper.
- 'Ask them to complete the sentence: ''Today I discovered...'' with one new thing
  they learned or realized.'
- Students can write about grammar, vocabulary, a cultural point, or even something
  about how they learn.
- Collect the papers anonymously. Read 5-6 interesting discoveries aloud.
- 'Discuss: What patterns do you notice? What surprised you about what your classmates
  discovered?'
- Keep the papers and review them to identify common insights or gaps.
script:
- 'Write: ''Today I discovered...'''
- Note new fact or rule.
- Share with class.
differentiation:
  support: Provide sentence starter.
  extension: Explain discovery impact.
