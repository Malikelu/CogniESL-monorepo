id: future_continuous-l1-sync-20260512073902
name: Future Continuous Practice
category: grammar-practice
description: 'Future Continuous Practice -- a grammar-practice activity. Review future
  continuous: ''will be + verb-ing.'' Used for actions that will be in progress at
  a specific time in the future. Example: ''At 8 PM...'
targetStructures:
- verb-tenses
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 25
groupSize: small-groups
energyRequired: medium
prepTime: low
materials:
- timelines worksheet
- sentence cards
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Review future continuous: ''will be + verb-ing.'' Used for actions that will be
  in progress at a specific time in the future.'
- 'Example: ''At 8 PM tonight, I will be eating dinner.'' / ''This time next week,
  I will be lying on a beach.'''
- Give students a timeline of tomorrow with specific times. They write what they will
  be doing at each time.
- 'Students share with a partner: ''At 7 AM, I will be waking up. At 9 AM, I will
  be sitting in class.'''
- 'Ask about other people: ''What will your mother be doing at 3 PM?'' / ''What will
  the president be doing right now?'''
- 'Contrast with simple future: ''I will eat dinner'' (decision) vs. ''I will be eating
  dinner'' (in progress at a specific time).'
- Students write 5 predictions about what people around the world will be doing at
  a specific time tomorrow.
script:
- '"Imagine it''s 8 PM tomorrow. What will you be doing? You will be eating dinner.
  You will be watching TV. We use \"will be + verb-ing\" to describe actions in progress
  at a specific time in the future."'
- '"Now look at your sentence cards. Each card has half a future continuous sentence.
  Find your matching partner — the person whose card completes your sentence. Pay
  attention to the time expressions!"'
- '"Let''s check your matches. Remember: \"I will be sleeping at midnight\" is correct,
  but \"I will sleep at midnight\" means you start sleeping then — different meaning!
  The continuous form shows the action is already in progress."'
differentiation:
  support: Provide sentence stems and word banks for lower‑level learners.
  extension: Challenge advanced students to write their own future continuous scenarios
    describing complex events.
keywords:
- future
- continuous
- will be
- progress
- ongoing
l1Enhanced: true
