instructions:
- Give Student A a sheet with 8 words in a pyramid. Student B has a blank pyramid.
- Student A describes each word WITHOUT saying it. Student B guesses and writes the
  word.
- 'Example: for elephant -- It is a very big animal. It has a long nose called a trunk.'
- When all 8 are guessed, switch roles with a new pyramid.
- 'Discuss: What description strategies worked best?'
script:
- Describe the word without saying it. Use synonyms, examples, anything except the
  word itself.
- What strategies did you use?
setupInstructions: Create 4-6 pyramid sheets with 8 words each. Make sure words are
  guessable through description.
differentiation:
  support: Use more concrete words. Allow gestures. Provide a word bank.
  extension: 'Use abstract words. Add a rule: cannot use the word it or the first
    letter.'
