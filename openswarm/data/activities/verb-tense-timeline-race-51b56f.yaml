id: verb-tense-timeline-race-51b56f
name: Verb Tense Timeline Race
category: grammar-practice
description: Students arrange mixed-up sentences in chronological order, reinforcing
  tense sequencing.
targetStructures:
- verb-tenses
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 25
groupSize: small-groups
energyRequired: high
prepTime: low
materials:
- sentence strips
- timeline template
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Prepare 15-20 sentence strips. Each strip contains a sentence in a different tense.
- Divide the class into teams. Give each team a set of mixed-up sentence strips.
- Teams race to arrange the sentences in chronological order on a timeline drawn on
  paper.
- The first team to correctly order all sentences wins.
- 'Review the timeline as a class. Discuss: Why does each sentence go in that position?'
- 'Extension: Students write their own timeline sentences for another team to order.'
script:
- Give teams mixed tense sentences about one story.
- Arrange in correct chronological order.
- Explain why each verb form fits its time position.
differentiation:
  support: Color-code sentences by tense.
  extension: Add future perfect for advanced students.
keywords:
- timeline
- tense
- sequence
l1Enhanced: true
