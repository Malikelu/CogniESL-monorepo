id: next-word-is
name: Next Word Is...
category: listening
description: The teacher plays an audio recording and pauses it at key moments. Students
  must predict the very next word based on context, building anticipatory listening
  skills and reinforcing vocabulary, grammar patterns, and natural speech processing.
targetStructures:
- listening-comprehension
bestForLevels:
- A2
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 15
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Audio recording (podcast, song, dialogue, or story)
- Speaker or headphones
- Projector or whiteboard (optional)
format:
- in-person
requiresTech: true
digitalReady: true
hasAudioComponent: true
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Select an appropriate audio recording (podcast, song, dialogue, or story) at the
  students' level. Identify 5-8 pause points where the next word is predictable from
  context.
- 'Play the audio. At each pause point, stop the recording and ask: ''What do you
  think the next word is?'''
- Students write down or call out their predictions. Accept multiple reasonable answers.
- Play the next word. Students check if their prediction was correct or close.
- 'Discuss: What clues helped you predict? Grammar, context, collocation, logic?'
- After completing all pause points, play the full audio without pauses for general
  comprehension.
script:
- '"Listen carefully. I am going to pause the audio. When I pause, try to guess the
  next word. Write it down or say it out loud."'
- '"What do you think comes next? Think about the grammar -- what type of word fits
  here? A noun? A verb? An adjective?"'
- '"Let us check! (Plays next word.) Were you close? What clues helped you guess?"'
setupInstructions: Select an audio recording appropriate to your students' level.
  Listen through it and identify 5-8 natural pause points where the next word is predictable
  from context. Mark the timestamps. Ensure the audio equipment (speaker, projector)
  is working before class.
exampleSnippet:
  topic: Listening to a short story
  execution:
  - 'Audio: ''Last weekend, I went to the...'' [PAUSE] Students predict: ''park,''
    ''beach,'' ''store,'' ''movies.'''
  - 'Audio continues: ''Last weekend, I went to the beach.'' Discuss: ''What clues
    helped? We went to the... -- we need a place.'''
  - 'Audio: ''The water was cold, but I decided to go for a...'' [PAUSE] Students
    predict: ''swim,'' ''walk,'' ''run.'''
  teacherDialogue:
  - '"The sentence is: She opened the door and saw a... What type of word comes next?
    Yes -- a noun! What nouns might fit?"'
  - '"Great prediction! You used the context clue -- opened the door -- so it is probably
    something you see when you open a door."'
differentiation:
  support: Use slower, clearer audio. Pause after shorter phrases. Provide multiple
    choice options for the next word. Allow students to discuss predictions in pairs
    before sharing with the class.
  extension: Use natural-speed audio with connected speech. Pause at more challenging
    points where prediction requires understanding of idioms or cultural references.
    Have students also predict the next phrase, not just the next word. Discuss the
    grammar patterns that help prediction such as article-noun collocations. At C1
    level, use authentic news broadcasts or academic lectures.
keywords:
- listening
- prediction
- audio
- context clues
- anticipatory skills
- comprehension
l1Enhanced: true
