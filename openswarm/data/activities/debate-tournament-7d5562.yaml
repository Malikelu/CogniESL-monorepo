instructions:
- Announce the debate topic and assign positions (For/Against). Students do not choose
  their side.
- Give 10 minutes for preparation. Students outline 3 arguments and anticipate counterarguments.
- 'Round 1: Pairs debate (3 minutes per side). The class votes on the winner.'
- 'Round 2: Winners debate winners. Continue until you have a final round.'
- In the final round, the whole class watches and votes.
- 'Debrief: What made the winning arguments strong? What language was most effective?'
script:
- Draw debate motion.
- Prepare 3 arguments for your side.
- Rebut opponent points in turn.
differentiation:
  support: Provide argument starters.
  extension: Include definition challenge.
