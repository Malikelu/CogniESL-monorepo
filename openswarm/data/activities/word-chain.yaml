id: word-chain
name: Word Chain
category: vocabulary
description: Students take turns saying a word that starts with the last letter of
  the previous word. A fast-paced vocabulary game that builds lexical retrieval speed
  and spelling awareness.
targetStructures:
- vocabulary
bestForLevels:
- A1
- A2
- B1
- B2
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Choose a starting word and write it on the board. For example: ''apple''.'
- 'The next student must say a word that starts with the last letter of the previous
  word. For example: ''apple'' ends with ''e'' → ''elephant'' ends with ''t'' → ''tree''
  ends with ''e'' → ''egg''.'
- No word can be repeated. If a student cannot think of a word within 10 seconds,
  they are out.
- The game continues until one student remains or the class reaches a target number
  of words.
- 'Optional: write the chain on the board for visual reference.'
script:
- '"The first word is APPLE. The last letter is E. Who can say a word starting with
  E?"'
- '"Elephant! Good. Elephant ends with T. Next word: starts with T?"'
- '"So far we have: APPLE → ELEPHANT → TREE → EGG → GAME → EIGHT → TIME. Can we keep
  going?"'
setupInstructions: No materials needed. Choose a starting word appropriate for the
  level. Decide whether to allow proper nouns or only common nouns. Decide on the
  time limit per turn (5-15 seconds).
exampleSnippet:
  topic: vocabulary recall and spelling
  execution:
  - 'Teacher writes: APPLE on the board.'
  - 'Student 1: ''Elephant!'' Teacher writes: ELEPHANT. Student 2: ''Tree!'' Teacher
    writes: TREE. Student 3: ''Egg!'' continues.'
  - 'Chain: APPLE → ELEPHANT → TREE → EGG → GAME → EIGHT → TIME → EIGHTEEN.'
  - Student 4 repeats 'eighteen' — disqualified for repeating. Game continues with
    next student.
  teacherDialogue:
  - '"Remember: the last letter of the word determines the next word. Apple ends with
    E. What words start with E?"'
  - '"No repeating words! Someone already said EIGHT. Can you think of another word
    starting with T?"'
differentiation:
  support: Allow longer time limits (15-20 seconds). Accept any word, even with weak
    connections. Write the previous word's last letter prominently on the board. Allow
    students to work in pairs.
  extension: 'Set a category for each round (animals, countries, food). Require words
    of 5+ letters. Increase speed: 3-second turn limit. Students must use full sentences:
    ''The last letter of APPLE is E, so my word is ELEPHANT.'''
keywords:
- word chain
- vocabulary
- spelling
- word retrieval
- chain game
- quick thinking
- lexical recall
l1Enhanced: true
