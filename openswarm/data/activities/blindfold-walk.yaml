id: blindfold-walk
name: Blindfold Walk
category: listening
description: A blindfolded student must navigate a room following only the verbal
  directions of a partner. This activity practices giving and following instructions,
  spatial prepositions, directional verbs, and imperative forms in a high-stakes,
  engaging context.
targetStructures:
- listening-comprehension
- prepositions
- verb-modals
bestForLevels:
- A1
- A2
- B1
- B2
duration: 10
groupSize: pairs
energyRequired: medium
prepTime: low
materials:
- Blindfold (scarf or eye mask)
- Obstacles (chairs, bags, cones)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Clear a path through the classroom or designated area. Place obstacles (chairs,
  bags, boxes) along the route.
- Pair up students. One student puts on the blindfold. The other becomes the navigator.
- 'The navigator must guide the blindfolded student from one end of the course to
  the other using only verbal directions: ''Take two steps forward. Turn left. Stop.
  Duck down.'''
- The blindfolded student must listen carefully and follow instructions exactly. If
  they touch an obstacle, they must start over from the last checkpoint.
- After completing the course, partners switch roles and repeat with a different route.
- 'Debrief: discuss which directions were clearest and which were confusing. Review
  key directional vocabulary.'
script:
- '"Partner A, put on the blindfold. Partner B, your job is to guide them across the
  room using only your voice. Partner A, listen carefully and follow the instructions
  exactly."'
- '"Take three steps forward. Good. Now turn to your left. Stop. There is a chair
  in front of you — step over it. Careful!"'
setupInstructions: Clear a path through the classroom. Place 4-6 obstacles (chairs,
  bags, boxes) along the route. Prepare blindfolds (scarves or eye masks) — one per
  pair. If space is limited, create a smaller course or have pairs take turns.
exampleSnippet:
  topic: prepositions of place and movement
  execution:
  - 'Navigator says: ''Walk forward three steps. Turn right. Go straight. Stop. There
    is a bag in front of you — step over it. Now walk under the desk.'''
  - The blindfolded student follows each instruction. Partners then switch roles.
  teacherDialogue:
  - '"What did your partner say that was unclear? How could they give better directions?"'
  - '"Remember to use prepositions: in front of, behind, next to, under, over, through."'
differentiation:
  support: Allow the navigator to use gestures in addition to words. Use a simpler
    course with fewer obstacles. Pre-teach key directional vocabulary on the board.
  extension: 'Add time pressure: pairs must complete the course in under 2 minutes.
    Add more complex instructions involving two-step directions. Have blindfolded
    students repeat the instruction before executing it.'
