id: clapping-rhythms
name: Clapping Rhythms
category: pronunciation
description: Students repeat clapping sequences that mirror the stress patterns of
  target words and phrases. A kinesthetic pronunciation activity that builds awareness
  of English word stress, syllable structure, and rhythm without requiring explicit
  metalanguage.
targetStructures:
- pronunciation
bestForLevels:
- A1
- A2
- B1
- B2
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- None
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Stand facing the class. Explain that you will clap a rhythm and they must copy it
  exactly.
- 'Start with simple two-syllable patterns: CLAP-clap (strong-weak) for words like
  ''TABLE,'' ''WATER,'' ''HAPPY.'''
- 'Progress to three-syllable patterns: CLAP-clap-clap for words like ''COMPUTER,''
  ''ELEPHANT,'' ''BEAUTIFUL.'''
- Say the word while clapping the rhythm. Students repeat both the word and the clap
  pattern.
- 'Gradually increase complexity: four-syllable words, then phrases, then short sentences.'
- 'Challenge round: clap a rhythm and have students guess which word or phrase matches
  the stress pattern.'
script:
- '"Listen and watch: TA-ble. CLAP-clap. Now you try: TA-ble. CLAP-clap. Good!"'
- '"This one has three beats: com-PU-ter. CLAP-clap-clap. Your turn!"'
- '"Now a phrase: I LIKE coFFEE. CLAP-clap-CLAP-clap. Repeat!"'
setupInstructions: No materials needed. Prepare a list of 10-15 target words at the
  appropriate level, organized by syllable count. Practice the clapping patterns beforehand.
  Consider preparing a visual chart showing strong (S) and weak (w) syllable patterns.
exampleSnippet:
  topic: word stress in two-syllable nouns
  execution:
  - 'Teacher claps: CLAP-clap. Says: ''TA-ble.'' Students repeat: ''TA-ble'' with
    clapping.'
  - 'Teacher claps: clap-CLAP. Says: ''a-BOVE.'' Students repeat: ''a-BOVE'' with
    clapping.'
  - Teacher claps various patterns and students identify which word matches.
  teacherDialogue:
  - '"Which syllable is stronger? The first or the second? Listen: TA-ble. The first!
    So we clap: CLAP-clap."'
  - '"Now try: a-BOVE. Which syllable is stronger? The second! So: clap-CLAP."'
differentiation:
  support: Use only two-syllable words. Provide visual support with stress marks (TA-ble).
    Allow students to tap on their desk instead of clapping. Go slowly and repeat
    each pattern multiple times.
  extension: Use longer words (4-5 syllables) and full sentences. Have students create
    their own clapping patterns for classmates to guess. Introduce the concept of
    sentence stress vs. word stress.
keywords:
- clapping
- word stress
- syllable
- rhythm
- pronunciation
- phonological awareness
- stress patterns
- kinesthetic
l1Enhanced: true
