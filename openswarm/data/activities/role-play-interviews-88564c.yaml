instructions:
- 'Assign roles: one student is the interviewer, one is the job applicant.'
- Give the interviewer a list of 5 questions to ask (e.g., 'Tell me about yourself.'
  / 'What are your strengths?' / 'Why do you want this job?').
- Give the applicant a fake job description to prepare from.
- Pairs conduct the interview (5 minutes). Then switch roles.
- 'After both rounds, discuss: What was easy? What was hard? What vocabulary did you
  need?'
- Ask 1-2 pairs to perform their interview for the class.
script:
- Pair as interviewer/interviewee.
- Ask prepared questions.
- Take turns roles.
