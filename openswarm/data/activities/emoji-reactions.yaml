id: emoji-reactions
name: Emoji Reactions
category: warm-up
description: Students respond to prompts, questions, or statements using only emojis,
  then explain their choices. A low-pressure way to check understanding and encourage
  emotional vocabulary.
targetStructures:
- vocabulary
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
- B2
duration: 5
groupSize: whole-class
energyRequired: low
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Read a statement, question, or scenario aloud.
- Students respond by holding up an emoji card, drawing an emoji on paper, or (if
  online) using the emoji reaction feature.
- Ask 2-3 students to explain why they chose that emoji.
- 'Discuss different interpretations: the same emoji can mean different things to
  different people.'
- 'Use as a quick comprehension check: ''How does this character feel? Show me with
  an emoji.'''
script:
- '"How do you feel about today''s topic? Show me an emoji."'
- '"Interesting! Maria chose the thinking face. Maria, why?"'
- '"Now: how would you feel if you failed an important test? Emoji, go!"'
setupInstructions: No setup needed for in-person (students can draw emojis). For online,
  ensure students know how to use emoji reactions.
differentiation:
  support: Provide a set of 5-6 emoji options to choose from. Allow students to point
    rather than explain verbally.
  extension: Ask students to create emoji stories (sequences of emojis that tell a
    narrative) or to interpret ambiguous emoji combinations.
keywords:
- emoji
- emotions
- warm-up
- check-in
- vocabulary
l1Enhanced: true
