id: jigsaw-reading
name: Jigsaw Reading
category: reading
description: Each group member reads a different section of a text, then teaches their
  section to the group. Students reconstruct the full story by combining their parts.
targetStructures:
- reading-comprehension
- clauses
- discourse
bestForLevels:
- A2
- B1
- B2
- C1
duration: 25
groupSize: small-groups
energyRequired: medium
prepTime: medium
materials:
- A text divided into 4-5 sections
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Select a text and divide it into 4-5 sections. Each section should be incomplete
  without the others.
- Assign each group member one section. They read it carefully and become the expert
  on that part.
- 'Students take notes on key information: main ideas, important details, new vocabulary.'
- Each expert teaches their section to the group without reading it aloud. They must
  summarize and explain.
- 'After all sections are shared, the group discusses: What is the full story? What
  is the main idea?'
- Groups answer comprehension questions about the full text to check understanding.
- 'Discuss: What strategies did you use to understand your section?'
script:
- Each of you will read a different part. Your job is to become the expert and teach
  it to your group.
- 'Remember: do not just read your part aloud. Summarize it in your own words.'
setupInstructions: Choose a text that can be logically divided into sections. Prepare
  comprehension questions.
differentiation:
  support: Give lower-level students shorter sections. Provide a summary template.
  extension: 'Add a synthesis task: groups write a summary of the full text.'
keywords:
- jigsaw
- reading
- collaboration
- comprehension
l1Enhanced: true
