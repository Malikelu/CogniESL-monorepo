instructions:
- Give students a sample exam or practice test. Do NOT have them take it yet.
- 'Walk through the exam structure: How many sections? What types of questions? How
  much time per section?'
- 'Teach 3 key strategies: (1) Read all questions first. (2) Answer easy questions
  first. (3) Check answers before submitting.'
- Students practice one section using the strategies. Time them.
- 'Review answers together. Discuss: Which strategy helped most? What will you do
  differently next time?'
- 'Students write down their personal exam plan: which strategy they will use and
  why.'
script:
- Analyze sample exam.
- Mark timing for sections.
- Practice key strategies.
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: Simulate full practice test.
