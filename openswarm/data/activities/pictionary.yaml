instructions:
- Divide the class into teams of 4-5. Give each team a set of word cards or a word
  list.
- One student from each team comes to the board. Show them the same word (or give
  them the same word card).
- 'On your signal, all drawers start drawing. Their teams guess by calling out: ''Is
  it a cat?'' ''Are you drawing a house?'''
- The drawer cannot speak, write letters, or use gestures -- only draw.
- The first team to guess correctly wins a point. Rotate drawers each round.
- Play 5-8 rounds. The team with the most points wins.
- 'Debrief: What words were easy to draw? What words were hard? Review any vocabulary
  that was new.'
script:
- '"Drawer, come to the board. Your word is: ELEPHANT. Ready? Go! Start drawing!"'
- '"Teams, call out your guesses! Is it a...? Are you drawing a...? Remember, the
  drawer cannot speak!"'
- '"Team 3 guessed it -- ELEPHANT! One point! Next round -- new drawers, new word."'
setupInstructions: Prepare 10-15 word cards with vocabulary appropriate to your students'
  level. Use concrete nouns first (cat, house, tree, car), then progress to more abstract
  words (love, freedom, hunger) or idioms (raining cats and dogs). Ensure the whiteboard
  and markers are ready.
exampleSnippet:
  topic: Animal vocabulary
  execution:
  - 'Round 1: Word is ''elephant.'' Drawer draws a large animal with a trunk. Team
    guesses: ''Is it a pig?'' ''Is it an elephant?'' ''Yes! Elephant!'''
  - 'Round 2: Word is ''butterfly.'' Drawer draws wings. Team guesses: ''Is it a bird?''
    ''Is it a butterfly?'' ''Yes!'''
  teacherDialogue:
  - '"Drawer, remember: no talking, no letters, only drawing! Teams, keep guessing
    -- you have 60 seconds!"'
  - '"Great guess! Team 2 got it right. What helped you guess? The trunk -- that is
    the key detail!"'
differentiation:
  support: Use concrete, easy-to-draw nouns (sun, house, cat, tree). Allow the drawer
    to nod or shake their head. Give teams a word bank to choose from. Extend the
    time limit to 90 seconds.
  extension: 'Use abstract words (freedom, jealousy, success) or idioms (break a leg,
    piece of cake). Add a rule: teams must use the word in a sentence after guessing
    to earn the point. Have drawers draw phrases instead of single words. At C1 level,
    use phrasal verbs or idiomatic expressions that require explanation.'
