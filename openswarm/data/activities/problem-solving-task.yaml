id: problem-solving-task
name: Problem Solving Task
category: integrated-skills
description: Groups receive a real-world problem and must discuss, negotiate, and
  present a solution. Combines speaking, listening, reading, and writing.
targetStructures:
- speaking-fluency
- verb-modals
- clauses
- writing-accuracy
bestForLevels:
- A2
- B1
- B2
- C1
duration: 30
groupSize: small-groups
energyRequired: medium
prepTime: medium
materials:
- Problem scenario cards
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Give each group a problem scenario card. Example: Your school has $500 to improve
  student life.'
- Groups read the problem together (2 minutes).
- Groups discuss possible solutions (10 minutes). Everyone must contribute.
- Groups must agree on ONE solution. They write a short proposal.
- Each group presents their solution (2-3 minutes).
- The class asks questions and votes on the best solution.
- 'Discuss: How did you reach agreement? What language did you use?'
script:
- Here is your problem. Read it together. You have 10 minutes to discuss and decide.
- Time is up. Group 1, what did you decide?
setupInstructions: Create 4-6 problem scenarios related to your lesson topics.
differentiation:
  support: Provide language frames. Use simpler problems.
  extension: Add constraints. Require groups to write a formal proposal.
keywords:
- problem solving
- negotiation
- decision making
- discussion
l1Enhanced: true
