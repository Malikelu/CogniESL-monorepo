id: taboo
name: Taboo
category: games
description: Students describe a word to their team without using the word itself
  or 5 taboo related words. Builds circumlocution and creative description.
targetStructures:
- vocabulary
- speaking-fluency
- sentence-structure
bestForLevels:
- A2
- B1
- B2
- C1
duration: 20
groupSize: small-groups
energyRequired: high
prepTime: medium
materials:
- Taboo cards (word + 5 taboo words)
- Timer
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Divide the class into two teams. Prepare cards with a target word and 5 taboo words.
- One student draws a card. They must get their team to guess WITHOUT saying the target
  or taboo words.
- Set a 60-second timer. The describer can use any other words or gestures.
- If the team guesses correctly, they score a point. If a taboo word is used, the
  turn is lost.
- Switch to Team B. Continue alternating.
- The team with the most points wins.
- 'Discuss: What strategies did you use when you could not use the obvious words?'
script:
- You have 60 seconds. Get your team to guess. But you CANNOT say these 5 words. Ready?
  Go!
- 30 seconds left! ... Time! Did they guess it?
setupInstructions: Create 20-30 taboo cards using vocabulary from your current unit.
differentiation:
  support: Allow gestures. Reduce taboo words to 3. Use easier vocabulary.
  extension: 'Add a rule: no hands allowed. Use more abstract vocabulary.'
keywords:
- taboo
- description
- circumlocution
- vocabulary
- guessing
l1Enhanced: true
