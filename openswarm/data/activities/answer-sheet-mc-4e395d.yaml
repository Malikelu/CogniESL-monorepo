instructions:
- Prepare 10-15 multiple-choice questions related to your current grammar or vocabulary
  topic. Include 4 options (A, B, C, D) per question.
- Write the questions on the board or project them. Give each student an answer sheet.
- Students work individually to circle the correct answer for each question.
- After 10 minutes, review answers as a class. For each question, ask a student to
  explain WHY the answer is correct.
- Discuss common mistakes. If many students got the same question wrong, re-teach
  that concept briefly.
- Collect answer sheets to assess individual understanding.
script:
- Four questions on board.
- Circle A, B, C, or D.
- Review answers together.
