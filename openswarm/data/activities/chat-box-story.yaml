id: chat-box-story
name: Chat Box Story
category: writing
description: In an online or in-person class, each student adds one sentence to a
  shared chat or document to collaboratively build a story. A digital writing activity
  that practices narrative tenses, creative writing, coherence, and quick response
  skills in a collaborative format.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 15
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Shared digital document or chat platform
- Projector (optional, for in-person)
format:
- in-person
- online
requiresTech: true
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Set up a shared document or use the chat function in your video conferencing platform.
- Start a story with an opening sentence such as 'The old house at the end of the
  street had been empty for twenty years. Until last Tuesday...'
- Each student adds one sentence in sequence, building on what the previous student
  wrote.
- After everyone has contributed, the class reads the full story aloud.
- Discuss the unexpected directions the story took and vote on the best twist.
- 'Optional: students identify and correct any tense errors in the collaborative story.'
script:
- '"We are going to write a story together! I will start with the first sentence,
  then each of you will add one sentence in the shared document. Use past tenses to
  keep the story going. Be creative! Here is the start: ''The old house at the end
  of the street had been empty for twenty years. Until last Tuesday...''"'
- '"Great! Maria added: ''A strange light was flickering in the window.'' Now Ahmed,
  add the next sentence. Remember to use past simple or past continuous!"'
setupInstructions: Set up a shared document (Google Docs, Padlet, or similar) or use
  the chat function in your video conferencing platform. Prepare 2-3 opening sentences
  at different levels. Test the technology before class. For in-person classes, project
  the shared document on a screen.
exampleSnippet:
  topic: narrative tenses — collaborative storytelling
  execution:
  - 'The teacher starts: ''The old house at the end of the street had been empty for
    twenty years. Until last Tuesday...'' Student 1 adds: ''A strange light was flickering
    in the window.'' Student 2 adds: ''Suddenly, the front door opened by itself.''
    Student 3 adds: ''A small cat walked out and looked around nervously.'' The class
    reads the complete story and discusses the unexpected directions it took.'
  teacherDialogue:
  - '"Remember to use past tenses! Not ''A strange light flickers'' but ''A strange
    light was flickering.'' Good! Now continue the story."'
  - '"What a twist! The cat was actually a wizard in disguise. Who can add the next
    sentence using past perfect? ''The wizard had been waiting for someone to discover
    his secret!'' Perfect!"'
differentiation:
  support: Provide sentence starters or frames for each turn. Allow students to write
    their sentence before posting so they have time to think. Pair weaker students
    with stronger ones who can help edit.
  extension: Advanced students can be assigned specific narrative roles (one student
    handles dialogue, another handles description, another handles action). They can
    also be required to use specific grammar structures in their sentences, such as
    past perfect for flashbacks.
keywords:
- collaborative writing
- creative writing
- narrative tenses
- digital storytelling
- writing fluency
- story building
l1Enhanced: true
