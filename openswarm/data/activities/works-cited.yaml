instructions:
- Give students a short text that includes both original writing and information from
  other sources (some cited, some not).
- Students work in pairs to identify which information needs a citation and which
  is common knowledge or original.
- 'Discuss as a class: What needs a citation? What does not? Why?'
- Show the basic format for a works cited entry (author, title, date, source).
- Students create proper citations for the sources in the text.
- Discuss why giving credit matters and what happens when we do not cite.
script:
- '"Read this paragraph. Can you spot which ideas came from other sources? Which ones
  need a citation?"'
- '"Common knowledge does not need a citation. But specific facts, quotes, and data
  do. Why?"'
setupInstructions: Prepare a sample text with 3-5 sources, some properly cited and
  some not. Create a simple citation format reference sheet.
differentiation:
  support: 'Provide a checklist: ''Does this sentence have a specific fact, a quote,
    or data? If yes, it needs a citation.'' Use a simplified citation format.'
  extension: Require full MLA or APA formatting. Have students research sources and
    create a complete works cited page for a short essay.
