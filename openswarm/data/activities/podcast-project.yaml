instructions:
- Groups choose a topic related to their unit. They research and plan their podcast
  (15 minutes).
- 'Groups write a script: introduction, main content, interview or discussion, conclusion
  (15 minutes).'
- Groups record their podcast (15 minutes). They can use phones or free recording
  software.
- 'Optional: Groups edit their recording (add music, cut mistakes).'
- Groups share their podcasts with the class. The class listens and gives feedback.
- 'Discuss: What makes a good podcast? What was hardest: researching, writing, or
  recording?'
- 'Optional: Publish podcasts on a class website or shared drive.'
script:
- Your group will create a 3-5 minute podcast. Research, write, record, and share.
  You have one hour.
- 'Time to record! Remember: speak clearly, stay on topic, and have fun with it.'
setupInstructions: Ensure students have phones or devices for recording. Prepare a
  list of possible topics. Create a simple rubric for evaluating podcasts.
differentiation:
  support: Provide a script template. Allow shorter podcasts (2-3 minutes). Assign
    simpler topics.
  extension: Require interviews with real people. Add editing and music. Have groups
    create a series of episodes.
