id: alphabet-convo
name: Alphabet Convo
category: speaking
description: Partners carry on a dialogue where each new sentence must start with
  the next letter of the alphabet. A creative speaking activity that pushes students
  to think on their feet, use varied vocabulary, and practice diverse sentence structures
  under a challenging constraint.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 10
groupSize: pairs
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Pair students up and explain the alphabet constraint for dialogue.
- Student A starts with a sentence beginning with 'A.' Student B must respond with
  a sentence beginning with 'B,' and so on through the alphabet.
- Set a 10-second time limit per turn. If a student cannot produce a sentence, they
  pass and the partner gets a point.
- After reaching Z, they switch roles and go backward.
- Monitor and award points for successful turns; track which letters cause difficulty.
- Debrief by discussing which letters were hardest and why.
script:
- '"Partner A, start a conversation with a sentence that begins with A. Partner B,
  your response must begin with B. Keep going through the alphabet! You have 10 seconds
  per turn. If you cannot think of something, say ''pass'' and your partner gets a
  point."'
- '"Let me show you: I will start — ''Amazing weather we are having today!'' Your
  turn — respond with a B sentence. ''Beautiful, is not it? I love spring.'' Great!
  Now C!"'
setupInstructions: No materials needed. Optionally prepare alphabet reference cards
  with 2-3 example words for each letter (especially Q, X, Z) to support struggling
  students. Decide whether to go A-Z or use a shorter sequence for lower levels.
exampleSnippet:
  topic: vocabulary flexibility
  execution:
  - Pair students up. Student A starts with a sentence beginning with 'A.' Student
    B must respond with a sentence beginning with 'B,' and so on through the alphabet.
    If a student cannot produce a sentence within 10 seconds, they pass and the partner
    gets a point. After reaching Z, they switch roles and go backward.
  teacherDialogue:
  - '"Partner A, start a conversation with a sentence that begins with A. Partner
    B, your response must begin with B. Keep going through the alphabet! You have
    10 seconds per turn. If you cannot think of something, say ''pass'' and your partner
    gets a point."'
  - '"Let me show you: I will start — ''Amazing weather we are having today!'' Your
    turn — respond with a B sentence. ''Beautiful, is not it? I love spring.'' Great!
    Now C!"'
differentiation:
  support: Allow students to work in groups of three so each person has more time
    to think. Provide a word bank organized by starting letter. Let students use a
    shorter sequence (A-J) or skip difficult letters (Q, X, Z).
  extension: Advanced students can go through the entire alphabet (A-Z), use only
    complex sentences, or add a thematic constraint (e.g., all sentences must relate
    to travel). They can also try to make the conversation coherent rather than disjointed.
