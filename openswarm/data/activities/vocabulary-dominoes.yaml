id: vocabulary-dominoes
name: Vocabulary Dominoes
category: vocabulary
description: Students match vocabulary words with definitions, synonyms, or examples
  using domino-style cards.
targetStructures:
- vocabulary
- nouns
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: small-groups
energyRequired: medium
prepTime: medium
materials:
- Domino cards (word on one half, definition on the other)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Create domino cards: word on one half, definition/synonym of the NEXT word on the
  other.'
- Shuffle and deal to groups of 3-4.
- One student places a card. The next student finds a card that connects.
- If a student cannot play, they draw. First to play all cards wins.
- After the game, students write 5 sentences using words from the dominoes.
script:
- Each card has a word on one side and a definition on the other. Match them like
  dominoes.
- If you cannot find a match, draw a new card.
setupInstructions: Create 20-30 domino cards per set. Create 3-4 sets for groups.
differentiation:
  support: Use pictures alongside definitions. Allow dictionary use.
  extension: Include more abstract vocabulary. Require students to use the word in
    a sentence when playing.
keywords:
- dominoes
- matching
- vocabulary
- definitions
- game
l1Enhanced: true
