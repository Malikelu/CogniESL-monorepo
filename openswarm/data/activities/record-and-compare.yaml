id: record-and-compare
name: Record and Compare
category: pronunciation
description: Students record themselves reading a passage, then compare their recording
  with a native speaker version. They identify differences and practice improving.
targetStructures:
- pronunciation
- verb-tenses
bestForLevels:
- A2
- B1
- B2
- C1
duration: 20
groupSize: individuals
energyRequired: low
prepTime: medium
materials:
- Short passages for reading
- Native speaker recordings
- Phones or recording devices
format:
- in-person
- online
requiresTech: true
digitalReady: true
hasAudioComponent: true
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give each student a short passage (50-80 words) and a native speaker recording of
  the same passage.
- Students listen to the native speaker once, just listening.
- Students read the passage and record themselves on their phones.
- Students listen to the native speaker again, then listen to their own recording.
- 'They note 3 differences: sounds, stress, speed, or intonation.'
- Students practice the passage again, trying to match the native speaker more closely.
- 'Students re-record and compare. Discuss: What improved? What is still challenging?'
script:
- Listen to the native speaker. Just listen.
- Now record yourself. Then listen to both. What differences do you notice?
setupInstructions: Prepare short passages with native speaker recordings. Ensure students
  have phones or recording devices.
differentiation:
  support: Use shorter passages. Focus on one aspect (sounds OR stress). Provide a
    checklist of what to listen for.
  extension: Use longer passages. Have students transcribe what they hear vs. what
    they read. Focus on connected speech.
keywords:
- recording
- comparison
- self-assessment
- pronunciation
- native speaker
l1Enhanced: true
