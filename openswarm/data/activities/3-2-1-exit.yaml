id: 3-2-1-exit
name: 3-2-1 Exit Ticket
category: review
description: At the end of class, students write 3 things they learned, 2 things they found interesting, and 1 question they still have. A structured reflection that gives teachers instant feedback on comprehension.
targetStructures:
- sentence-structure
- writing-accuracy
bestForLevels:
- A1
- A2
- B1
- B2
- C1
duration: 5
groupSize: individuals
energyRequired: low
prepTime: none
materials:
- Paper or index cards
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- In the last 5 minutes of class, give each student a piece of paper or index card.
- Ask them to write 3 things they learned today, 2 things they found interesting, and 1 question they still have.
- Collect the cards as students leave (or have them submit digitally).
- Review the cards before your next class to identify common questions or misunderstandings.
- Address the most common questions at the start of the next lesson.
script:
- '"Before you leave, I want you to write me a quick note. Three things you learned today. Two things you found interesting. One question you still have. You have 4 minutes. Go."'
- '"Thank you! I will read all of these and answer your questions next class."'
setupInstructions: No setup needed. Have scrap paper or index cards available, or ask students to use their phones or notebooks.
differentiation:
  support: "Provide sentence starters such as 'I learned that' and 'I still don't understand.' Allow lower-level students to draw or use single words."
  extension: Ask advanced students to also write how they would explain one concept to a friend, or to connect today's lesson to a previous one.
keywords:
- exit ticket
- reflection
- formative assessment
- review
- feedback
l1Enhanced: true
