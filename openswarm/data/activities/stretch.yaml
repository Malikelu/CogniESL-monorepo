id: stretch
name: Stretch
category: warm-up
description: A physical warm-up sequence where students mirror the teacher's movements
  while repeating directional cues. Reinforces directional vocabulary, prepositions,
  and body parts through total physical response.
targetStructures:
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
duration: 5
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Students stand up and face the teacher. Clear some space if needed.
- 'The teacher performs a stretch or movement while saying the direction aloud: ''Reach
  UP!'' Students mirror the movement and repeat the word.'
- 'Continue with a sequence: ''Stretch to the LEFT! Now to the RIGHT! Reach DOWN to
  your toes! Step FORWARD! Step BACKWARD!'''
- Gradually increase speed. Students who make mistakes can continue -- the goal is
  movement and vocabulary practice.
- After the sequence, point to students to lead the next round, giving directions
  to the class.
- 'Connect to your lesson topic: if teaching prepositions, add ''Put your hand ON
  your head. Put your hand UNDER your chair.'''
script:
- '"Everyone stand up! Reach UP high! UP! Good! Now stretch to the LEFT! LEFT!"'
- '"Reach DOWN to your toes! DOWN! Now UP again! UP! Faster now -- LEFT, RIGHT, FORWARD,
  BACK!"'
- '"Great! Now Maria, you lead. Tell us what to do!"'
setupInstructions: Clear space for students to stand and move. No materials needed.
  Prepare a sequence of 8-10 directional commands.
exampleSnippet:
  topic: prepositions of place
  execution:
  - 'Warm-up: ''Reach up! Stretch left! Touch your toes! Step forward! Step back!'''
  - 'Lesson connection: ''Put your hand ON the desk. Put your hand UNDER the chair.
    Stand BEHIND your partner.'''
  - Student leader gives commands to the class.
  teacherDialogue:
  - '"Up! Up! Reach for the ceiling! Now down -- touch your toes!"'
  - '"Put your hand ON your head. ON. Now UNDER your desk. UNDER!"'
differentiation:
  support: Go slowly. Demonstrate each movement clearly. Use gestures to support meaning.
    Allow students to watch before joining. Use only 4 basic directions (up, down,
    left, right).
  extension: 'Increase speed. Add more complex directions: ''Put your left hand on
    your right knee.'' Have students lead and create their own sequences. Add prepositions:
    between, next to, in front of.'
keywords:
- warm-up
- physical
- stretching
- directions
- prepositions
- TPR
- body parts
- movement
l1Enhanced: true
