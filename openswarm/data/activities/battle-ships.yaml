id: battle-ships
name: Battle Ships
category: games
description: A competitive team game based on the classic Battleship board game, adapted
  for grammar practice. Students call out grid coordinates to 'hit' ships, but must
  conjugate verbs correctly or form grammatically correct sentences to score.
targetStructures:
- verb-tenses
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Grid paper
- Whiteboard or projector
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Divide the class into two teams. Draw a 10x10 grid on the board with columns labeled
  A-J and rows labeled 1-10.
- Each team secretly places 3-5 'ships' (words or verb forms) on their grid. Each
  cell contains a verb in base form or a subject.
- Teams take turns calling out coordinates (e.g., 'B-5'). The teacher reveals the
  content of that cell.
- To score a hit, the team must correctly conjugate the verb or form a grammatically
  correct sentence using the subject and verb in the target tense.
- If they conjugate correctly, it is a hit. If not, it is a miss and the other team
  gets a chance to 'steal' by answering correctly.
- The first team to hit all opponent ships wins.
- 'Debrief: review common errors and reinforce correct conjugation patterns.'
script:
- '"Team A, call out a coordinate. Remember, you need to conjugate the verb correctly
  to score a hit!"'
- '"Team B got a miss — can Team A steal? What is the correct past tense of ''go''?"'
setupInstructions: Prepare grid paper or draw a 10x10 grid on the whiteboard. Create
  a list of verbs at the appropriate level for the current grammar focus. Decide on
  the target tense(s) for the activity. Optionally prepare a digital version for online
  classes.
exampleSnippet:
  topic: past simple irregular verbs
  execution:
  - Each team places verbs like 'go,' 'eat,' 'see,' 'write' on their grid. When a
    team calls a coordinate, they must produce the correct past simple form (went,
    ate, saw, wrote) to score a hit.
  teacherDialogue:
  - '"Team A, call out a coordinate. Remember, you need to conjugate the verb correctly
    to score a hit!"'
  - '"Team B got a miss — can Team A steal? What is the correct past tense of ''go''?"'
differentiation:
  support: Allow students to use a verb conjugation reference sheet. Use only regular
    verbs or a smaller set of common irregular verbs. Provide sentence frames for
    the target structure.
  extension: Require full sentences with time expressions. Add negative and question
    forms. Use less common irregular verbs or mixed tenses.
