adaptableToTopic: true
instructions:
- Each student writes a topic sentence or title at the top of their paper (e.g., 'Why
  I love my hometown').
- Students pass their paper to the classmate on their right. That classmate reads
  the topic and writes one question they would want answered about it.
- Papers continue around the room. Each new student reads the topic and all previous
  questions, then adds a new question.
- After the paper has been passed 5-6 times, it returns to the original author.
- The author must now write a paragraph or essay that addresses ALL the questions
  their classmates asked.
- Authors share their finished text. Classmates check whether all questions were answered.
script:
- '"Write your topic at the top of the paper. Just one sentence -- what are you going
  to write about?"'
- '"Now pass it to your neighbor. Read their topic and write one question you''d want
  answered."'
- '"Keep passing! Add a new question each time. Try to ask something different from
  what''s already there."'
setupInstructions: No special materials needed -- just paper and pens. This works
  well as a lead-in to a writing assignment. Prepare your own example to show the
  class.
exampleSnippet:
  topic: opinion writing -- should uniforms be mandatory?
  execution:
  - 'Student A writes: ''School uniforms should be banned.'''
  - 'Classmate 1 asks: ''Why do you think uniforms are bad?'''
  - 'Classmate 2 asks: ''What would students wear instead?'''
  - 'Classmate 3 asks: ''Do uniforms really stop bullying?'''
  - Student A writes a paragraph addressing all three questions.
  teacherDialogue:
  - '"Your questions should make the writer think. Don''t ask yes/no questions --
    ask WHY, HOW, WHAT IF."'
  - '"Look at all these questions. Your job now is to answer every single one in your
    writing."'
differentiation:
  support: Provide question starters on the board (Why...? How...? What would happen
    if...?). Allow students to write questions in pairs. Limit to 3 questions instead
    of 5-6.
  extension: Require advanced students to write indirect questions ('Can you explain
    why...?'). Have them also rank the questions by importance and explain their reasoning.
