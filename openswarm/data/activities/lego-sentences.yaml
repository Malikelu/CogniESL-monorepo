id: lego-sentences
name: LEGO Sentences
category: grammar-practice
description: Students snap together labeled LEGO bricks to build grammatically correct
  sentences, with different colors representing different parts of speech. A tactile
  activity that makes sentence structure visible and physical.
targetStructures:
- adjectives
- prepositions
- verb-tenses
bestForLevels:
- A1
- A2
- B1
bestForAges:
- kids
- teens
duration: 15
groupSize: small-groups
energyRequired: medium
prepTime: high
materials:
- LEGO bricks or similar building blocks, labeled with words (use stickers or tape)
- Sentence prompt cards
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Prepare LEGO bricks labeled with words, organized by color: blue = nouns/pronouns,
  red = verbs, yellow = adjectives, green = prepositions, white = articles, orange
  = adverbs.'
- Give each group a set of bricks and a sentence prompt card (e.g., 'Make a sentence
  about a dog').
- 'Students snap bricks together to build a grammatically correct sentence. The color
  pattern should follow English word order: white (article) + yellow (adjective) +
  blue (noun) + red (verb) + orange (adverb) + green (preposition) + blue (noun).'
- Groups read their sentences aloud. The class checks for grammatical accuracy.
- Groups can then rearrange bricks to make new sentences or add more bricks to extend
  the sentence.
- Debrief by reviewing the color patterns and what they represent grammatically.
script:
- You need to make a sentence about a cat. Start with an article -- that is a white
  brick. Then an adjective -- yellow. Then the noun -- blue. What comes next?
- 'Your sentence is: ''The small cat sleeps on the sofa.'' Let us check: article (white)
  + adjective (yellow) + noun (blue) + verb (red) + preposition (green) + article
  (white) + noun (blue). Perfect pattern!'
- Now can you add an adverb? Where does it go? Yes, after the verb -- orange brick!
setupInstructions: 'Prepare LEGO bricks or similar blocks. Label them with words using
  stickers or tape. Organize by color: blue (nouns: cat, dog, teacher, student, book,
  house), red (verbs: runs, eats, reads, sleeps, walks, is), yellow (adjectives: big,
  small, happy, red, old), green (prepositions: on, in, at, under, with, to), white
  (articles: a, an, the), orange (adverbs: quickly, slowly, always, never). Prepare
  enough sets for groups of 3-4 students.'
exampleSnippet:
  topic: SVO word order with adjectives and prepositions
  execution:
  - 'Prompt: ''Make a sentence about a student.'' Students build: ''The (white) hardworking
    (yellow) student (blue) studies (red) in (green) the (white) library (blue).'''
  - 'Prompt: ''Make a sentence about food.'' Students build: ''A (white) delicious
    (yellow) cake (blue) is (red) on (green) the (white) table (blue).'''
  teacherDialogue:
  - What color brick do you need first? White -- an article! Then what? Yellow --
    an adjective!
  - Where does the verb go? After the noun -- red brick. What comes after the verb?
    A preposition -- green brick!
  - Can you make a longer sentence? Add an adverb -- orange brick. Where does it go?
    After the verb!
differentiation:
  support: 'Provide a color pattern card showing the order: white-yellow-blue-red-green-blue.
    Use fewer brick types (no adverbs or prepositions). Give students the words they
    need -- they just need to arrange them. Use very simple sentences.'
  extension: 'Add more brick types: conjunctions (purple), relative pronouns (pink).
    Require complex sentences with relative clauses. Have students build questions
    (different word order). Challenge students to build the longest grammatically
    correct sentence.'
keywords:
- sentence building
- parts of speech
- tactile learning
- word order
- grammar
l1Enhanced: true
