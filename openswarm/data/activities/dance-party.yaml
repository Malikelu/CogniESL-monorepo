id: dance-party
name: Dance Party
category: warm-up
description: Students follow the moves of well-known action songs while singing key
  phrases. A rhythmic, high-energy warm-up that lowers the affective filter, encourages
  participation through communal movement, and practices listening comprehension and
  pronunciation through song.
targetStructures:
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
bestForAges:
- kids
- teens
duration: 10
groupSize: whole-class
energyRequired: high
prepTime: low
materials:
- Music player or speaker
- Action song audio (e.g., YMCA, Head Shoulders Knees and Toes)
format:
- in-person
requiresTech: true
digitalReady: true
hasAudioComponent: true
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Clear space for movement. Ensure all students have room to move safely.
- Introduce the song. Play a short clip so students can hear the melody and rhythm.
- Teach the key actions and phrases one by one. Demonstrate each move.
- Play the song and have students follow along. Repeat 2-3 times.
- Gradually increase speed or add variations to keep it challenging.
- 'Debrief: ask students to recall the phrases and actions from the song.'
setupInstructions: Choose 1-2 appropriate action songs. Ensure you have a music player
  and speaker. Clear space in the classroom. Learn the moves yourself beforehand.
  Prepare lyrics on a handout or slide if needed.
exampleSnippet:
  topic: imperative verbs and body vocabulary
  execution:
  - The teacher plays 'Head Shoulders Knees and Toes' and demonstrates the actions.
    Students follow along, touching each body part as it is sung. The song gets faster
    each round. Students practice body vocabulary and imperative-like song instructions.
  - 'Extension: Students modify the song to include different body parts and actions,
    practicing present continuous: ''I am touching my head. I am tapping my knees.'''
  teacherDialogue:
  - '"Touch your head! Now touch your shoulders! Good. Now knees! Now toes! Let us
    try it with the song."'
  - '"Great job! Now let us go faster! Ready? Head, shoulders, knees, and toes, knees
    and toes..."'
differentiation:
  support: Use slower songs with simpler movements. Provide a visual chart of body
    parts. Allow students to watch before participating. Use songs with clear, repeated
    vocabulary.
  extension: 'Students create their own actions for a song. Use more complex songs
    with faster tempos. Students lead the class in their favorite action song. Add
    language tasks: ''Which body part did we touch first? Use past tense: We touched
    our heads first.'''
keywords:
- dance
- songs
- warm-up
- movement
- music
- action songs
- affective filter
- body vocabulary
- rhythm
l1Enhanced: true
script:
- '"Let us get started with Dance Party. Here is what we are going to do."'
- '"Does everyone understand? Any questions? Let us begin!"'
