id: reading-theater
name: Reading Theater
category: reading
description: 'Reading Theater -- a reading activity. Give each student a copy of a
  short text. Round 1: Read the text aloud as a news reporter. Serious, formal, clear....'
targetStructures:
- reading-comprehension
- pronunciation
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Short texts (news articles, stories, dialogues)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give each student a copy of a short text.
- 'Round 1: Read the text aloud as a news reporter. Serious, formal, clear.'
- 'Round 2: Read the same text as a sports commentator. Excited, dramatic, fast.'
- 'Round 3: Read it as a dramatic reading. Emotional, expressive, with pauses.'
- 'Round 4: Read it in pairs as a dialogue (if applicable) or as a conversation.'
- 'Discuss: How did the different readings change the meaning? Which was most fun?
  Which helped you understand the text best?'
- 'Discuss: How does reading aloud help with comprehension?'
script:
- Read this text as a news reporter. Serious, formal, clear. Ready?
- Now read it as a sports commentator! Excited! Dramatic! Go!
setupInstructions: Select short texts that work well with different reading styles.
  News articles, stories, and dialogues all work well.
differentiation:
  support: Use shorter texts. Allow students to read with a partner. Focus on one
    style.
  extension: 'Use longer texts. Add styles: whisper reading, robot reading, opera
    singing. Have students explain how each style changes the meaning.'
keywords:
- reading theater
- fluency
- expression
- repeated reading
- voices
l1Enhanced: true
