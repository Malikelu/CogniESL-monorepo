instructions:
- Show an example of an Instagram post that summarizes a topic visually (photo + short
  caption).
- 'Explain the task: students will create an Instagram-style post summarizing today''s
  lesson.'
- 'They can draw or write. The ''post'' must include: a visual element (drawing or
  diagram) and a caption (2-3 sentences max).'
- Give students 8 minutes to create their post.
- Students share their posts in small groups. Group members 'like' and comment on
  each other's posts.
- 'Display the best posts on the board. Discuss: What makes a good summary? What key
  ideas did people capture?'
script:
- Draw key lesson image.
- Add relevant hashtag.
- Share with class.
