instructions:
- Select a text of appropriate length (200-300 words) for your students' level.
- Students read silently for 2 minutes. They mark how far they got.
- Calculate words per minute (WPM). Record the number.
- 'Discuss reading strategies: Do you read every word? Do you skip unknown words?
  Do you guess from context?'
- Students re-read the same text, applying one new strategy. Time again.
- 'Compare WPM. Discuss: Did the strategy help? Which strategy works best for you?'
script:
- Set 2-minute timer.
- Read passage silently.
- Count words per minute.
differentiation:
  support: Start with short passages.
  extension: Track improvement over time.
