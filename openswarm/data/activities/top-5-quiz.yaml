instructions:
- 'Divide the class into teams of 3-4. Explain: I will give you a category. Your team
  must guess the top 5 answers.'
- Give teams 2 minutes to discuss and write down their 5 guesses.
- Reveal the top 5 answers one by one. Teams earn 1 point per correct answer.
- Play 5-6 rounds with different categories. The team with the most points wins.
script:
- '"Category: Top 5 fast food restaurants in the world. You have 2 minutes. Write
  down your 5 guesses."'
- '"Time is up! Number 1 is... McDonald''s! Who guessed that? One point!"'
- '"Number 2... KFC! Number 3... Burger King! How many did your team get?"'
setupInstructions: Prepare 5-6 categories with their top 5 answers. Use general knowledge
  categories (fast foods, countries by population, most spoken languages) or lesson-related
  categories (top 5 irregular verbs, top 5 adjectives).
exampleSnippet:
  topic: general knowledge and vocabulary
  execution:
  - 'Category: Top 5 pizza toppings. Answers: pepperoni, mushrooms, onions, sausage,
    bacon.'
  - 'Category: Top 5 English-speaking countries by population. Answers: USA, UK, Canada,
    Australia, Ireland.'
  teacherDialogue:
  - '"Think about what most people would say. This is about common answers, not your
    personal opinion."'
  - '"How many did you get? 3 out of 5? Great job!"'
differentiation:
  support: Give teams 3 minutes instead of 2. Provide a word bank of possible answers.
    Use easier categories (colors, animals).
  extension: Reduce time to 1 minute. Use harder categories (top 5 exports of Brazil,
    top 5 longest rivers). Require teams to rank their answers in order.
keywords:
