id: find-someone-who
name: Find Someone Who
category: warm-up
description: Students mingle and ask classmates questions to find people who match
  descriptions. Practices question formation and small talk.
targetStructures:
- speaking-fluency
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Find Someone Who sheets
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Give each student a sheet with 10-15 descriptions. Example: Find someone who has
  been to another country.'
- 'Students stand up and mingle. They ask classmates: Have you been to another country?'
- When they find someone who matches, they write that person's name.
- The goal is to fill the sheet with as many different names as possible.
- 'After 10 minutes, stop and review. Ask: Who has been to another country? Where
  did you go?'
- 'Discuss: What questions did you ask? What grammar did you use?'
script:
- Stand up! Walk around the room. Ask your classmates questions. When you find someone
  who matches, write their name. Go!
- Time! How many did you find?
setupInstructions: Create a Find Someone Who sheet with 10-15 descriptions that practice
  your target grammar.
differentiation:
  support: Use simpler descriptions with pictures. Provide the question form.
  extension: Require follow-up questions and write a sentence about each person found.
keywords:
- mingling
- question formation
- getting to know you
- survey
l1Enhanced: true
