instructions:
- Choose a short text (100-150 words) with target grammar and vocabulary.
- 'Tell students: I will read a short text. Take notes on key words. You will NOT
  catch every word.'
- Read once at normal speed. Students listen and take notes.
- Read a second time. Students add to their notes.
- Students work in groups to reconstruct the text from their combined notes.
- Display the original. Groups compare their version.
- 'Discuss: What note-taking strategies helped?'
script:
- I am going to read a short text twice. Take notes on key words -- nouns, verbs,
  adjectives.
- Now work with your group. Combine your notes and try to write the text as close
  to the original as you can.
setupInstructions: Prepare a short text with clear structure. Practice reading at
  natural speed.
differentiation:
  support: Use shorter texts. Read more slowly. Provide the first and last sentences
    as anchors.
  extension: Use longer texts. Read only once. Require groups to match the original
    exactly.
keywords:
