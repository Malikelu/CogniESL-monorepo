id: video-comprehension
name: Video Comprehension
category: listening
description: 'Students watch a short video and complete comprehension tasks: sequencing
  events, identifying main ideas, noting details. Visual support makes listening more
  accessible.'
targetStructures:
- listening-comprehension
- verb-tenses
- discourse
bestForLevels:
- A1
- A2
- B1
- B2
duration: 25
groupSize: whole-class
energyRequired: low
prepTime: medium
materials:
- Short video (2-5 minutes)
- Comprehension worksheets
- Projector or screen
format:
- in-person
- online
requiresTech: true
digitalReady: true
hasAudioComponent: true
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Select a short video (2-5 minutes) related to your lesson topic. Create comprehension
  tasks: sequencing, main ideas, details.'
- 'Before watching: Give students the worksheet. Discuss what to look for.'
- 'First viewing: Students watch without writing. They just get the gist.'
- 'Second viewing: Students complete the worksheet while watching.'
- 'Third viewing: Students check their answers.'
- 'Review as a class. Discuss: What was the main idea? What details did you catch?'
- 'Discuss: How did the visual images help you understand?'
script:
- Watch the video. Just watch -- do not write yet. What is it about?
- Now watch again. This time, complete the worksheet.
setupInstructions: Find an appropriate video (TED-Ed, YouTube, news clips). Create
  a comprehension worksheet with sequencing, main idea, and detail questions.
differentiation:
  support: Use shorter videos with simpler language. Provide the worksheet with some
    answers filled in. Pause the video at key moments.
  extension: Use longer videos. Include inference and opinion questions. Have students
    write a summary after watching.
keywords:
- video
- comprehension
- visual
- sequencing
- main idea
l1Enhanced: true
