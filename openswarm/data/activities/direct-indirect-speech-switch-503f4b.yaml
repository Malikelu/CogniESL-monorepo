id: direct-indirect-speech-switch-503f4b
name: Direct Indirect Speech Switch
category: grammar-practice
description: Convert sentences between direct and reported speech, practicing pronoun
  and verb shifts.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- B1
- B2
bestForAges:
- adults
duration: 30
groupSize: pairs
energyRequired: medium
prepTime: low
materials:
- quote cards
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Review reported speech rules: tense backshift (present -> past), pronoun changes
  (I -> he/she), time changes (today -> that day).'
- Write 5 direct quotes on the board. Students convert each to reported speech.
- 'Example: ''I am happy,'' said Tom. -> Tom said (that) he was happy.'
- Students write 3 direct quotes from their own life and convert them.
- Partners check each other's conversions. Discuss any tricky changes.
- 'Role play: One student ''reports'' what another student said. The original speaker
  confirms if it is accurate.'
script:
- Read direct quote aloud.
- Convert to reported speech.
- Check pronoun and verb backshifting.
differentiation:
  support: Provide reported speech templates.
  extension: Include mixed reporting verbs.
keywords:
- reported
- indirect
- pronoun shift
l1Enhanced: true
