id: fix-the-story
name: Fix the Story
category: listening
description: The teacher tells a story with obvious grammatical, factual, or logical
  errors; students must listen carefully and call out to fix the narrative. An engaging
  listening activity that builds confidence in identifying common errors and reinforces
  grammar accuracy through active error correction.
targetStructures:
- listening-comprehension
bestForLevels:
- A2
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: medium
materials:
- Prepared error-rich story scripts
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Prepare 2-3 short stories (8-12 sentences each) with 8-10 deliberate errors of varying
  types such as verb tense, subject-verb agreement, articles, prepositions, and word
  order. Mark the errors in your script so you can track which ones have been caught.
- Tell students they will hear a story with mistakes. Their job is to listen carefully
  and call out 'Stop!' when they hear an error, then correct it.
- Read the story aloud at a natural pace. When a student calls out 'Stop,' pause and
  let them identify and correct the error. Confirm or redirect as needed, then continue
  reading.
- If students miss an error, continue reading and circle back later. You can give
  hints such as 'There is still an error in that sentence' if needed.
- After the story is finished, review any errors that were not caught. Read the corrected
  version of the story from the clean script.
- 'Optional: have students retell the corrected story in pairs to reinforce the accurate
  grammar.'
script:
- '"Listen carefully to this story. I am going to make some mistakes. Your job is
  to catch them and fix them. Ready? Last weekend, I goed to the park. It was very
  more beautiful than usual."'
- '"Stop! Yes, Maria. \"goed\" should be \"went\"! Good catch. Last weekend, I went
  to the park. It was much more beautiful than usual. I seed three deers."'
setupInstructions: Prepare 2-3 short stories (8-12 sentences each) with 8-10 deliberate
  errors of varying types (verb tense, subject-verb agreement, articles, prepositions,
  word order). Mark the errors in your script. Prepare a clean version for the final
  review.
exampleSnippet:
  topic: past simple and subject-verb agreement
  execution:
  - 'The teacher reads: ''Last weekend, I goed to the park. It was very more beautiful
    than usual. I seed three deers. My friend was very happy to see me.'''
  - 'Students call out: ''goed should be went!'', ''more beautiful should be much
    more or more beautiful?'', ''seed should be saw!'', ''deers should be deer!'''
  - Teacher confirms each correction and explains why. Continue the story with remaining
    errors.
  teacherDialogue:
  - '"Stop! What is the error? Yes -- \"goed\" is not correct. What is the past tense
    of \"go\"? Went! Good catch."'
  - '"Any more errors in that sentence? Look at \"deers\" -- is that right? In English,
    \"deer\" is the same in singular and plural. No s!"'
differentiation:
  support: Use obvious, clear errors. Pause after each error to give students time
    to identify it. Provide a list of the types of errors to listen for. Allow students
    to work in pairs.
  extension: Advanced students can be given more subtle errors such as article misuse,
    wrong preposition, or incorrect collocation. Challenge them to categorize each
    error by type. They can also take turns being the storyteller and deliberately
    introducing errors for classmates to catch.
keywords:
