id: sketchnote
name: Sketchnote
category: integrated-skills
description: Students take notes using a combination of drawings, symbols, words,
  and connectors instead of traditional text-only notes. Engages visual learning and
  improves retention of key concepts.
targetStructures:
- vocabulary
- writing-accuracy
bestForLevels:
- A2
- B1
- B2
- C1
duration: 15
groupSize: individuals
energyRequired: low
prepTime: low
materials:
- Paper and pens or markers
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Explain sketchnoting: combining simple drawings, words, arrows, and symbols to
  capture ideas visually.'
- Show a brief example of a sketchnote on any topic.
- During a reading, listening, or review activity, students create their own sketchnote
  instead of traditional notes.
- 'Encourage simple icons: a lightbulb for ''idea,'' a question mark for ''confused,''
  arrows for connections.'
- After the activity, students pair up and explain their sketchnotes to each other.
- Display the best sketchnotes and discuss what makes them effective.
script:
- '"Today we are going to try something different. Instead of writing notes, you are
  going to DRAW them. Yes, draw!"'
- '"You do not need to be an artist. Simple shapes work. A sun for happy, a cloud
  for confused. Just capture the ideas."'
- '"Now explain your sketchnote to your partner. What did you capture? What did you
  leave out?"'
setupInstructions: Prepare a sample sketchnote to show as an example. Have paper and
  colored pens available.
differentiation:
  support: Provide a template with pre-drawn sections (main idea, details, questions).
    Allow students to use mostly words with a few drawings.
  extension: Challenge students to create sketchnotes for complex texts or lectures.
    Have them present their sketchnotes to the class as a teaching tool.
keywords:
- visual notes
- drawing
- retention
- creativity
- note-taking
l1Enhanced: true
