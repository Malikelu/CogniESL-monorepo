id: contraction-surg
name: Contraction Surg.
category: grammar-practice
description: Students act out a surgical procedure, cutting apart word pairs and bandaging
  them together to form contractions. A tactile, memorable activity that teaches contractions,
  the relationship between full and contracted forms, and the orthographic rules of
  apostrophe placement.
targetStructures:
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 15
groupSize: individuals
energyRequired: medium
prepTime: medium
materials:
- Word pair cards (printed)
- Scissors
- Band-aids or tape
- Markers
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Prepare word pair cards for common contractions such as I am, do not, they are,
  we will, she would, he is, it is, you have, cannot, should not. Print on card stock
  if possible.
- Distribute scissors, band-aids or tape, and markers to each student. Give each student
  a set of word pair cards.
- 'Model the procedure with one example: hold up the ''I am'' card, cut between the
  words, use a band-aid to join them, and write ''I''m'' on the band-aid. Emphasize
  that the apostrophe replaces the missing letter.'
- Students work through their word pair cards independently, cutting, bandaging, and
  writing each contraction. Circulate to check apostrophe placement and spelling.
- Once all students have completed their contractions, review as a class. Hold up
  each original word pair and have students show their contraction. Discuss any errors.
- 'Optional extension: have students use each contraction in a sentence to confirm
  they understand the meaning and context.'
script:
- '"You are a contraction surgeon! Here is your patient: I am. We need to operate.
  Cut between the I and the am. Now, use this band-aid to join them as a contraction.
  Write the result on the band-aid."'
- '"Next patient: do not. Cut! Bandage! What do we get? Don''t! Remember, the apostrophe
  goes where the missing letter was."'
setupInstructions: Prepare word pair cards for common contractions (I am, do not,
  they are, we will, she would, he is, it is, you have, cannot, should not). Print
  on card stock if possible. Provide scissors, band-aids or tape, and markers for
  each student. Prepare a reference poster showing full forms and their contractions.
exampleSnippet:
  topic: contractions
  execution:
  - Give each student word pair cards. Students cut between the two words, then use
    band-aids to join them in contracted form. They write the contraction on the band-aid.
  - 'Example: ''I am'' becomes ''I''m'' written on the band-aid joining the two pieces.'
  - Students produce 10-15 contractions and then use each in a sentence to confirm
    understanding.
  teacherDialogue:
  - '"Cut between I and am. What letter did we remove? The a! So the apostrophe goes
    where the a was: I''m. That is correct English."'
  - '"Now do \"do not.\" Cut! What letters are we removing? The o! So do + not becomes
    don''t."'
differentiation:
  support: Provide a reference list of common contractions. Start with simple ones
    (I am to I'm, do not to don't). Allow students to work in pairs and focus on matching
    before cutting and writing.
  extension: Advanced students can work with less common contractions (she will to
    she'll, they would to they'd) or explore the difference between contractions and
    possessives. They can also write sentences using both full and contracted forms.
