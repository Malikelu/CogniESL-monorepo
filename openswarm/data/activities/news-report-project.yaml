id: news-report-project
name: News Report Project
category: integrated-skills
description: Groups research a topic, write a news report, and present it as a news
  broadcast. Combines research, writing, speaking, and listening.
targetStructures:
- writing-accuracy
- speaking-fluency
- verb-tenses
- clauses
bestForLevels:
- B1
- B2
- C1
duration: 45
groupSize: small-groups
energyRequired: medium
prepTime: medium
materials:
- Research materials or internet access
- Paper and pens
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Assign or let groups choose a topic related to your unit.
- Groups research their topic (10 minutes). They gather facts, quotes, and details.
- 'Groups write a news report script (15 minutes). Include: headline, lead, body with
  quotes, conclusion.'
- 'Groups rehearse. Assign roles: anchor, reporter, eyewitness, expert.'
- Each group presents their news broadcast (3-4 minutes).
- The audience takes notes and prepares 1-2 questions.
- After each presentation, the audience asks questions. The group answers spontaneously.
script:
- You are news reporters. Research a story, write a report, and present it. You have
  45 minutes.
- Group 1, you are up. Welcome to Channel 5 News!
setupInstructions: Prepare a list of possible topics. Ensure access to research materials.
differentiation:
  support: Provide a news report template. Allow groups to use notes.
  extension: Require groups to include interviews, statistics, and multiple perspectives.
keywords:
- news
- broadcast
- project
- presentation
- research
l1Enhanced: true
