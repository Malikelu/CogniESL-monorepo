id: infinitive-gerund-battle-539290
name: Infinitive Gerund Battle
category: grammar-practice
description: Debate which verb form fits best in given contexts, exploring subtle
  meaning shifts.
targetStructures:
- verb-tenses
bestForLevels:
- B1
- B2
bestForAges:
- adults
duration: 25
groupSize: pairs
energyRequired: medium
prepTime: low
materials:
- verb list
- context cards
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Write 10 verbs on the board that can take either infinitive or gerund (e.g., stop,
  remember, forget, try, regret).
- 'For each verb, give two contexts that change the meaning. Example: ''I stopped
  smoking'' vs. ''I stopped to smoke.'''
- Students work in pairs to create sentences showing the meaning difference for each
  verb.
- Pairs share their sentences. The class votes on which pair best illustrates the
  difference.
- 'Discuss: Why does English use two forms? How do you remember which to use?'
- Students write a rule summary for their notebooks.
script:
- Draw verb and context card.
- Argue for gerund or infinitive use.
- Class votes on most convincing argument.
differentiation:
  support: Teach common patterns (stop + gerund, decide + infinitive).
  extension: Explore verbs that take both with meaning change.
keywords:
- gerund
- infinitive
- debate
l1Enhanced: true
