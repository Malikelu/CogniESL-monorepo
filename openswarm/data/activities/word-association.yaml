id: word-association
name: Word Association
category: vocabulary
description: Students take turns saying words related to a target word or theme, building
  a chain of associations. Quick-paced warm-up that activates vocabulary networks
  and encourages creative connections.
targetStructures:
- vocabulary
bestForLevels:
- A1
- A2
- B1
- B2
duration: 5
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Choose a starting word related to your lesson topic (e.g., "water").
- Go around the room. Each student says a word they associate with the previous word.
- Set a 3-second time limit per student. If a student hesitates or repeats a word,
  they sit out.
- Play for 2-3 rounds with different starting words.
- '{''Optional'': ''At the end, trace the chain on the board and discuss surprising
  connections.''}'
script:
- '"We are going to play Word Association. I will say a word, and you say the first
  word that comes to mind. Ready? Start: TRAVEL."'
- '"Great! Travel... beach... sun... hot... summer... vacation. Wow, we went from
  travel to vacation in five steps!"'
setupInstructions: No setup needed. Optionally prepare 3-5 starting words related
  to your lesson topic.
differentiation:
  support: Allow students to pass if they are stuck. Give them an extra second. Let
    them whisper to a partner first.
  extension: Require that associations be from a specific category (e.g., only adjectives,
    only verbs). Challenge students to reverse the chain back to the original word.
keywords:
- word association
- vocabulary activation
- quick thinking
- warm-up
- chain game
l1Enhanced: true
