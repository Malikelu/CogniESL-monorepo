id: service-project
name: Service Project
category: integrated-skills
description: Students plan and carry out a small service project for the school or
  community. They write proposals, create materials, and present their results. Real-world
  application of all skills.
targetStructures:
- writing-accuracy
- speaking-fluency
- verb-tenses
- clauses
bestForLevels:
- B1
- B2
- C1
duration: 90
groupSize: small-groups
energyRequired: medium
prepTime: high
materials:
- Varies by project
- Research materials
- Presentation tools
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Groups identify a need in the school or community. Examples: create a guide for
  new students, organize a book drive, make signs for the school.'
- 'Groups write a project proposal: What will you do? Why? What do you need? What
  is the timeline?'
- Teacher approves proposals. Groups carry out their projects over several class periods.
- 'Groups document their work: take photos, write reports, create presentations.'
- Groups present their projects to the class or school.
- 'Discuss: What did you learn? What was challenging? How did you use English in a
  real-world context?'
- 'Reflect: How can you continue to use English to help your community?'
script:
- Your group will plan and carry out a real service project. Think about what your
  school or community needs.
- 'Present your project. Tell us: What did you do? What did you learn? How did English
  help you?'
setupInstructions: Brainstorm possible service projects with the class. Help groups
  identify feasible projects. Coordinate with school administration if needed.
differentiation:
  support: Provide a project proposal template. Assign simpler projects. Offer more
    teacher guidance.
  extension: Require formal written proposals and reports. Have groups present to
    an audience beyond the class.
keywords:
- service project
- community
- real-world
- project-based
- presentation
l1Enhanced: true
