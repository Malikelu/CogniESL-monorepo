id: mirror-me
name: Mirror Me
category: warm-up
description: Partners face each other and one student leads movements while the other
  mirrors them silently. A non-verbal warm-up activity that builds focus, physical
  awareness, and classroom rapport before language work begins.
targetStructures:
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
- B2
- C1
- C2
duration: 5
groupSize: pairs
energyRequired: low
prepTime: none
materials:
- None
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: false
instructions:
- Have students find a partner and stand facing each other, about arm's length apart.
- Assign one student as the 'leader' and one as the 'mirror.' The leader moves slowly
  and the mirror copies exactly.
- 'Start with simple hand and arm movements. Gradually increase complexity: facial
  expressions, full-body movements.'
- After 2 minutes, switch roles. The mirror becomes the leader.
- 'Optional: Add a verbal phase where the leader gives commands in English: ''Raise
  your left hand. Touch your nose. Turn around.'''
- 'Debrief briefly: ''How did it feel to lead? How did it feel to follow?'''
script:
- '"Face your partner. Person A, you are the leader. Person B, you are the mirror.
  Copy every movement exactly."'
- '"Start slowly. Raise your right hand... now your left... touch your nose... good!"'
- '"Switch! Person B, you are the leader now. Person A, mirror the movements."'
setupInstructions: No materials needed. Ensure there is enough space for students
  to stand and move without bumping into each other. Clear desks to the sides if necessary.
exampleSnippet:
  topic: Warm-up and focus (transition to imperatives)
  execution:
  - 'Silent phase: Leader raises hand, mirror copies. Leader touches head, mirror
    copies.'
  - 'Verbal phase: Leader says: ''Stand up. Raise your left hand. Touch your nose.
    Sit down.'' Mirror follows commands.'
  teacherDialogue:
  - '"Silent phase first. Mirror, watch your partner carefully. Copy every movement."'
  - '"Now we add words. Leader, say what to do: Raise your hand. Touch your nose.
    Turn around."'
differentiation:
  support: Start with very simple movements (hand only). Demonstrate with a student
    before pairs begin. Allow students to choose their own partner for comfort. Keep
    the activity entirely silent if the verbal phase is too challenging.
  extension: 'Add the verbal command phase using English imperatives. Increase the
    speed of movements. Add a competitive element: which pair can mirror most accurately?
    Have the whole class mirror the teacher for a full-body warm-up. At higher levels,
    require leaders to use more complex commands: ''Put your left hand on your right
    knee. Stand on one foot.'''
keywords:
- warm-up
- non-verbal
- focus
- physical
- rapport building
l1Enhanced: true
