id: twitter
name: Twitter Summary
category: writing
description: Students summarize a concept, story, or lesson in exactly 280 characters.
  Forces concise writing, prioritization of key ideas, and creative word choice.
targetStructures:
- writing-accuracy
- sentence-structure
- discourse
bestForLevels:
- A2
- B1
- B2
- C1
duration: 10
groupSize: individuals
energyRequired: low
prepTime: none
materials:
- Paper or phones
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Explain the concept of a tweet: 280 characters maximum, concise, captures the essence.'
- Ask students to write a tweet summarizing the lesson, a story, a character, or a
  concept.
- Give them 5 minutes to draft and refine.
- Students share their tweets with the class (read aloud or posted on a shared board).
- Vote on the most accurate, most creative, and most concise tweets.
- Discuss what they chose to include and what they left out.
script:
- '"Imagine you have to explain today''s lesson in one tweet. 280 characters. No more.
  What would you write?"'
- '"Remember: every word counts. What is the most important idea? Start there."'
setupInstructions: No setup needed. Optionally display a real tweet as an example
  of concise writing.
differentiation:
  support: Allow 500 characters for lower-level students. Provide sentence starters
    such as 'Today I learned' or 'The most important thing is.'
  extension: Require students to include a hashtag, mention, or link. Challenge them
    to write a thread of 3 connected tweets for a more complex summary.
keywords:
- summary
- concise writing
- social media
- writing
- character limit
l1Enhanced: true
