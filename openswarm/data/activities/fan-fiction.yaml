id: fan-fiction
name: Fan Fiction Writing
category: writing
description: Students take a character or situation from a text they have read and
  write a new story about them. Motivates creative writing by building on familiar
  characters.
targetStructures:
- writing-accuracy
- verb-tenses
- clauses
- discourse
bestForLevels:
- A2
- B1
- B2
- C1
duration: 30
groupSize: individuals
energyRequired: low
prepTime: low
materials:
- The original text
- Writing paper
- 'Optional: planning template'
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Review a text the class has read. Discuss the characters: What are they like? What
  might happen next?'
- 'Students choose a character and write a new story. They can: continue the story,
  write a prelude, change the ending, or put the character in a new situation.'
- 'Give students a planning template: Character, Setting, Problem, Events, Resolution.'
- Students plan (5 minutes) and write (20 minutes).
- Students share their stories in small groups. Group members give feedback.
- 'Discuss: How did you keep the character consistent? What creative choices did you
  make?'
script:
- You know the characters from our reading. Now YOU are the author. What happens next?
- Be creative! You can change the ending, write about the past, or put the character
  in a new situation.
setupInstructions: Choose a text with interesting characters. Create a planning template.
differentiation:
  support: Provide a story starter. Allow shorter stories (5-8 sentences).
  extension: Require students to write from a different character's perspective. Include
    dialogue and descriptive language.
keywords:
- fan fiction
- creative writing
- characters
- storytelling
l1Enhanced: true
