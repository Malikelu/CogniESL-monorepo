id: grammar-story-chain
name: Grammar Story Chain
category: grammar-practice
description: The teacher starts a story using a target grammar point. Each student
  adds a sentence, but must use the target grammar correctly. If they make a mistake,
  the class corrects it.
targetStructures:
- verb-tenses
- clauses
- conditionals
bestForLevels:
- A2
- B1
- B2
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Announce the target grammar. Example: We are going to practice past perfect. Every
  sentence must use past perfect at least once.'
- 'Start the story: I had never been to Paris before last summer. I had always wanted
  to go.'
- 'Student 1 continues: Before I went, I had studied French for two years.'
- 'Student 2 continues: When I arrived, I realized I had forgotten my passport.'
- Continue around the room. Each student adds one sentence using the target grammar.
- If a student makes a mistake, the class helps correct it before continuing.
- After 10-15 sentences, the teacher ends the story.
- Students write the full story in their notebooks, correcting any errors.
script:
- We are going to create a story together. Every sentence must use past perfect. I
  will start.
- 'Good! Before I went, I had studied French. Now you. Remember: past perfect!'
setupInstructions: Choose a target grammar point. Prepare a story starter sentence.
  Be ready to help students who get stuck.
differentiation:
  support: Use simpler grammar points (past simple). Allow students to use notes.
    Provide sentence starters.
  extension: 'Use more complex grammar (mixed conditionals, passive perfect). Add
    a rule: each sentence must be at least 10 words.'
keywords:
- story chain
- grammar practice
- collaboration
- narrative
l1Enhanced: true
