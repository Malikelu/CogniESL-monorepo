instructions:
- Write a central topic in the middle of the board (e.g., 'Food', 'Travel', 'Present
  Perfect').
- Ask students to brainstorm related words, phrases, or ideas. Write them as branches
  from the center.
- Connect related branches with lines. Add sub-branches for more specific ideas.
- Students copy the mind map into their notebooks, adding their own branches.
- Students work in pairs to explain their mind maps to each other, using complete
  sentences.
- 'Discuss: How does organizing ideas visually help you remember them?'
script:
- Write main topic in center.
- Connect 3 related topics.
- Add details to each branch.
