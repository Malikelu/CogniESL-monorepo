instructions:
- Create a Jeopardy board with 5 categories (e.g., Grammar, Vocabulary, Pronunciation,
  Culture, Fun Facts) and 5 levels (100-500 points).
- Divide the class into 3-4 teams.
- Teams take turns choosing a category and point value. Read the question or prompt.
- The team must respond in the form of a question (Jeopardy style) or complete the
  task.
- Award points for correct answers. Deduct points for incorrect answers.
- The team with the most points wins. Review any questions that stumped multiple teams.
script:
- Pick category and point value.
- Respond in question form.
- Earn points for correct responses.
