adaptableToTopic: true
instructions:
- Give each student a large piece of paper.
- Ask them to draw a road or path. At the left end, write 'START' and list what they
  knew at the beginning of the unit.
- Along the road, they add milestones -- key things they learned during the unit.
- At the right end, write 'NOW' and list what they can do now that they could not
  before.
- At the far right, write 'NEXT' and list what they still want to learn or improve.
- Students share their roadmaps in small groups and discuss common goals.
script:
- '"Draw a road. At the start, write what you knew about this topic before we began.
  Along the road, add what you learned. At the end, write where you are now."'
- '"What is the next destination on your road? What do you still want to learn?"'
setupInstructions: Prepare a sample roadmap to show as an example. Have large paper
  and colored pens available.
differentiation:
  support: Provide a pre-drawn template with labeled sections. Allow students to use
    single words or drawings instead of full sentences.
  extension: Ask students to add detours (things that confused them) and shortcuts
    (things that helped them learn faster). Have them write specific, measurable goals
    for the NEXT section.
keywords:
- roadmap
- goal setting
- reflection
- metacognition
- self-assessment
l1Enhanced: true
