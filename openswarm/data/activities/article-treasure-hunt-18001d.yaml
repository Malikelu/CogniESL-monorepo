id: article-treasure-hunt-18001d
name: Article Treasure Hunt
category: grammar-practice
description: Find articles in authentic texts and explain their usage in context.
targetStructures:
- verb-tenses
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 25
groupSize: individuals
energyRequired: medium
prepTime: low
materials:
- newspaper
- highlighters
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Give students a short text (newspaper article, blog post, or story) that contains
  many examples of a/an/the.
- Students read the text and highlight every article (a, an, the) they find.
- 'For each article, they label why it was used: first mention (a/an), specific reference
  (the), general (zero article), or unique (the sun).'
- Students compare their labels with a partner. Discuss any disagreements.
- Review as a class. Create a summary chart of article rules based on the examples
  found.
- Students write 5 sentences about their own life, using articles correctly.
script:
- Find 10 article examples in text.
- Label each as a/an/the.
- Explain the rule for each.
differentiation:
  support: Provide article checklist.
  extension: Write own article usage guide.
keywords:
- article
- treasure
- context
l1Enhanced: true
