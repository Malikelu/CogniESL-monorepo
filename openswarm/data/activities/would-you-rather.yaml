id: would-you-rather
name: Would You Rather
category: warm-up
description: Students answer Would You Rather questions and explain their choices.
  Practices conditionals, expressing preferences, and giving reasons.
targetStructures:
- verb-modals
- conditionals
- speaking-fluency
bestForLevels:
- A2
- B1
- B2
- C1
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Ask a Would You Rather question. Example: Would you rather be able to fly or be
  invisible?'
- Students move to one side of the room for each option.
- Ask 2-3 students from each side to explain their choice.
- 'Encourage follow-up questions: But what if you flew into a bird?'
- Play 5-7 rounds with different questions.
- 'Extension: Students create their own questions for the class.'
script:
- Would you rather live in the mountains or by the beach? Go to the mountains side
  or the beach side!
- Interesting! Maria, you chose the beach. Why?
setupInstructions: Prepare 8-10 Would You Rather questions. Connect them to your lesson
  topic when possible.
differentiation:
  support: Use simpler questions. Provide sentence starters.
  extension: Use more abstract questions. Require 2-3 reasons and counterarguments.
keywords:
- would you rather
- preferences
- discussion
- conditional
- reasons
l1Enhanced: true
