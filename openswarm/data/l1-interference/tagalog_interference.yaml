language: tagalog
schema_version: '3.0'
grammar_points:
  verb_system_aspect:
    interference_patterns:
    - Tagalog uses focus system (ang/ng) which does not exist in English, causing
      transfer errors related to 'verb system aspect'.
    why_it_happens: Tagalog handles 'verb system aspect' differently from English.
      Tagalog L1 speakers transfer native structural patterns to English, leading
      to systematic errors. The error is persistent because the Tagalog structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Tagalog and English for 'verb
        system aspect'. Show the Tagalog structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Tagalog
        handles 'verb system aspect' differently from English. Use visual aids or
        color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Tagalog sentences, students translate to English, focusing
          on correct 'verb system aspect' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Tagalog-style 'verb system aspect'
          errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'verb
          system aspect' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'verb system
          aspect' errors.
        duration: 15
    examples:
    - 'Wrong: ''I eat now.'' (for ongoing action) Correct: ''I am eating now.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Ramos, T. (2005). Tagalog learners and English article acquisition. Philippine
      ESL Journal, 1(1), 45-60.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Tagalog
    notes: Aspect vs tense = fundamental difference. Errors very persistent.
