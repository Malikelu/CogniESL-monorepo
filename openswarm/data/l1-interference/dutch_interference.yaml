language: dutch
schema_version: '3.0'
grammar_points:
  word_order_V2:
    interference_patterns:
    - pattern: Adverbial + Verb + Subject (Dutch V2) -> Subject + Verb + Adverbial
        (English SVO)
      example: 'Dutch: ''Gisteren ging ik naar school.'' Literal: ''Yesterday went
        I to school.'' Wrong: ''Yesterday went I to school.'' Correct: ''Yesterday
        I went to school.'''
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Inversion after negative/restrictive adverbials
      example: 'Dutch: ''Nooit heb ik dat gezien.'' Literal: ''Never have I that seen.''
        Wrong: ''Never I have seen that.'' Correct: ''I have never seen that.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: V2 after 'dan', 'ook', 'hier', 'daar'
      example: 'Dutch: ''Dan ga ik ook.'' Literal: ''Then go I also.'' Wrong: ''Then
        go I also.'' Correct: ''Then I will also go.'''
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Subject-verb inversion after fronted place/time expressions
      example: 'Dutch: ''Hier woont een man.'' Literal: ''Here lives a man.'' Wrong:
        ''Here lives a man.'' Correct: ''A man lives here.'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: ''Yesterday went I to the store.'' Correct: ''Yesterday I went to the
      store.'''
    - 'Wrong: ''Always am I tired.'' Correct: ''I am always tired.'''
    - 'Wrong: ''Tomorrow will I leave.'' Correct: ''Tomorrow I will leave.'''
    - 'Wrong: ''Here comes the bus.'' (overused V2; acceptable but Dutch speakers
      apply too broadly) Correct: ''The bus is coming.'''
    why_it_happens: 'Dutch is a strict V2 (verb-second) language: in main clauses,
      the finite verb must always be the second constituent. When a Dutch speaker
      begins a sentence with an adverbial, the verb must immediately follow, pushing
      the subject to third position. English is an SVO language where the subject
      almost always precedes the verb. This V2 rule is one of the most deeply ingrained
      syntactic patterns in Dutch — it applies in virtually every main clause and
      is acquired before age 3.'
    teacher_tips:
      how_to_explain: 'Write two columns: Dutch order vs. English order. Show that
        Dutch always puts the verb in position 2, while English keeps Subject-Verb
        together. Drill with time expressions: ''Gisteren ging ik'' -> ''Yesterday
        I went.'' Emphasize that English only inverts for questions and after ''never/seldom/rarely''
        in formal style.'
      where_to_start: Start with fronted time adverbials. Give 5 Dutch sentences starting
        with time words and have them identify the Dutch word order, then rewrite
        in English order.
      sequencing: 'Week 1: V2 rule with time adverbials. Week 2: Place and manner
        adverbials. Week 3: Negative adverbials. Week 4: Practice in writing and speaking.'
      exercises:
      - name: 'V2 Detector: Dutch vs. English Word Order'
        type: error-correction
        description: '15 sentences: 10 with Dutch V2 errors in English and 5 correct.
          Students identify which are wrong, explain why, and rewrite. Duration: 20
          minutes.'
        duration: 20
      - name: Adverbial Shuffle Drill
        type: transformation
        description: 'Students receive 10 English SVO sentences. They rewrite each
          starting with a time/place adverbial while maintaining correct English order.
          Duration: 15 minutes.'
        duration: 15
      - name: 'Translation Relay: Dutch Main Clauses'
        type: translation
        description: 'Teams translate Dutch main clauses into English. Each sentence
          has a fronted adverbial. First team to write the correct English sentence
          gets a point. Duration: 20 minutes.'
        duration: 20
      - name: 'Inversion Audit: Formal vs. Informal'
        type: sentence-rewrite
        description: 'Students receive 8 sentences with fronted negative adverbials.
          They write BOTH the formal inverted version and the standard version. Duration:
          15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Hulstijn, J. & Marchena, E. (1989). Avoidance: Grammatical or semantic causes?
      SSLA, 11(3), 241-255.'
    - Cornelis, L. (1997). Passive and Perspective. John Benjamins.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    source_count: 4
    source_type: peer-reviewed
    frequency: 4
    persistence: 4
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — Dutch V2 is the single most impactful word order
      difference for Dutch learners of English.
    notes: Core Dutch structure. V2 is the defining feature of Dutch/Germanic main
      clause syntax. Extremely persistent.
  verb_separation:
    interference_patterns:
    - pattern: Separable verb prefix placed at end of clause (Dutch) vs. kept together
        (English phrasal verbs)
      example: 'Dutch: ''Ik bel je morgen op.'' Literal: ''I call you tomorrow up.''
        Wrong: ''I call you tomorrow up.'' Correct: ''I''ll call you up tomorrow.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Prefix separation in infinitive and past participle
      example: 'Dutch: ''Ik ga opbellen.'' Literal: ''I go up-call.'' Wrong: ''I will
        up call.'' Correct: ''I will call up.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Over-separation of English compound verbs that should stay together
      example: 'Dutch: ''Hij staat op.'' Literal: ''He stands up.'' Wrong: ''He up-stands.''
        (early stage) Correct: ''He stands up.'' / ''He gets up.'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I call you back tomorrow up.'' Correct: ''I''ll call you back tomorrow.'''
    - 'Wrong: ''She up-made the story.'' (early stage Dutch transfer) Correct: ''She
      made up the story.'''
    - 'Wrong: ''I will pick you up at 8.'' (Dutch: ''Ik haal je om 8 uur op'') Correct:
      ''I will pick you up at 8.'''
    why_it_happens: Dutch has a rich system of separable verbs (scheidbare werkwoorden)
      where a prefix (op, aan, uit, in, af, mee) detaches from the verb in finite
      clauses and moves to the end. English has phrasal verbs that work similarly,
      but Dutch speakers often place the separated element too far from the verb in
      English, or over-apply the separation rule to English verbs that don't take
      particles.
    teacher_tips:
      how_to_explain: Explain that Dutch 'scheidbare werkwoorden' and English 'phrasal
        verbs' are similar but not identical. Both languages can separate the verb
        and particle, but Dutch does it more systematically. Warn that some English
        verbs look separable but aren't.
      where_to_start: 'Begin with common Dutch separable verbs and their English equivalents:
        opbellen/call up, opstaan/get up, aantrekken/put on, uitgaan/go out.'
      sequencing: 'Week 1: Separable verbs with op-, aan-, uit- prefixes. Week 2:
        Word order with pronoun objects. Week 3: Inseparable verbs. Week 4: Production
        practice.'
      exercises:
      - name: Particle Placement Drill
        type: transformation
        description: '12 Dutch sentences with separable verbs. Students translate
          into English, paying attention to particle placement. Duration: 15 minutes.'
        duration: 15
      - name: Separable or Inseparable? Sorting Game
        type: matching
        description: '20 verb cards. Students sort into pairs and identify which can
          be separated. Duration: 15 minutes.'
        duration: 15
      - name: Phrasal Verb Story Chain
        type: oral-drill
        description: 'Class creates a story orally. Each student adds a sentence using
          a phrasal verb. Class corrects errors. Duration: 20 minutes.'
        duration: 20
      - name: 'Error Hunt: Separable Verb Mistakes'
        type: error-correction
        description: 'A 150-word paragraph with 8 verb separation errors. Students
          find and correct all errors. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - De Kleine, A. (2002). Dutch Verbs Simply Explained. Acco Publishing.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — verb separation is a core Dutch syntactic feature
      with imperfect English parallels.
    notes: Unique Dutch feature with partial English parallel. Systematic nature makes
      this a high-frequency transfer area.
  dt_error:
    interference_patterns:
    - pattern: Omitting articles where English requires them (Dutch article-omission
        patterns)
      example: 'Dutch: ''Ik ben leraar.'' (I am teacher — no article) Wrong: ''I am
        teacher.'' Correct: ''I am a teacher.'''
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Using 'a/an' with uncountable nouns based on Dutch gender assignment
      example: 'Dutch: ''een advies'' (an advice — ''advies'' is neuter ''het advies'')
        Wrong: ''I need an advice.'' Correct: ''I need some advice.'' / ''I need advice.'''
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Using articles with proper nouns based on Dutch patterns
      example: 'Dutch: ''Het Amsterdam'' (colloquial) Wrong: ''The Amsterdam is beautiful.''
        Correct: ''Amsterdam is beautiful.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am teacher.'' (Dutch: ''Ik ben leraar'') Correct: ''I am a teacher.'''
    - 'Wrong: ''I need a advice.'' (Dutch: ''Ik heb een advies nodig'') Correct: ''I
      need some advice.'''
    - 'Wrong: ''He gave me good advices.'' (Dutch: ''Hij gaf me goede adviezen'')
      Correct: ''He gave me good advice.'''
    why_it_happens: 'Dutch has two grammatical genders — common (de) and neuter (het)
      — which determine the definite article. English has no grammatical gender system.
      Dutch omits articles in certain contexts where English requires them (professions
      after ''zijn/worden'': ''Ik ben leraar'' = ''I am a teacher''). The de/het distinction
      has no English equivalent. Even advanced Dutch learners make article errors.'
    teacher_tips:
      how_to_explain: 'Start by explaining that Dutch has two genders (de/het) while
        English has one article ''the.'' Then show the bigger problem: Dutch often
        DROPS articles where English requires them. Write: ''Ik ben leraar'' -> NOT
        ''I am teacher'' but ''I am a TEACHER.'''
      where_to_start: 'Begin with the profession/identity pattern after ''to be'':
        Dutch drops the article, English requires ''a/an.'' Drill: ''Ik ben dokter''
        -> ''I am a doctor.'''
      sequencing: 'Week 1: Articles after ''to be'' with professions. Week 2: Indefinite
        article with countable nouns. Week 3: Zero article with uncountables. Week
        4: Definite article ''the.'''
      exercises:
      - name: Profession Article Drill
        type: fill-in-the-blank
        description: '20 Dutch sentences with professions after ''zijn.'' Students
          translate into English, always adding ''a/an.'' Duration: 10 minutes.'
        duration: 10
      - name: 'Article Audit: Dutch to English Translation'
        type: translation
        description: 'Students translate 15 Dutch sentences into English, paying special
          attention to article usage. Duration: 20 minutes.'
        duration: 20
      - name: De/Het vs. A/An/The Mapping
        type: matching
        description: '30 Dutch nouns with de/het gender. Students determine the correct
          English article for each in context. Duration: 15 minutes.'
        duration: 15
      - name: 'Error Correction: Article Mistakes in Context'
        type: error-correction
        description: 'A 200-word essay with 12 article errors. Students identify each
          error and correct it. Duration: 20 minutes.'
        duration: 20
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Hulstijn, J. & Marchena, E. (1989). Avoidance: Grammatical or semantic causes?
      SSLA, 11(3), 241-255.'
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - 'Kouwenberg, S. & LaCharite, D. (2005). Less is more: Evidence from diminutive
      morphology. Yearbook of Morphology 2004, 1-22.'
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — article errors are the most notorious and persistent
      Dutch L1 transfer issue.
    notes: Most notorious Dutch error. Even advanced learners struggle. The de/het
      gender system has no English equivalent.
  negation_niet:
    interference_patterns:
    - pattern: Placing negation directly after the verb (Dutch S-V-niet-O) instead
        of using do-support
      example: 'Dutch: ''Ik drink niet koffie.'' Literal: ''I drink not coffee.''
        Wrong: ''I drink not coffee.'' Correct: ''I do not drink coffee.'' / ''I don''t
        drink coffee.'''
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Placing 'never' at the end of the sentence (Dutch 'nooit' position)
      example: 'Dutch: ''Ik rook nooit.'' Literal: ''I smoke never.'' Wrong: ''I smoke
        never.'' Correct: ''I never smoke.'' / ''I don''t ever smoke.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Double negation (Dutch allows/requires it, English doesn't)
      example: 'Dutch: ''Ik zie niemand niet.'' (colloquial) Wrong: ''I don''t see
        nobody.'' Correct: ''I don''t see anybody.'' / ''I see nobody.'''
      frequency: 3
      persistence: 4
      communicative_impact: 3
    - pattern: Negating with 'niet' before the object without do-support
      example: 'Dutch: ''Ik spreek niet Engels.'' Literal: ''I speak not English.''
        Wrong: ''I speak not English.'' Correct: ''I do not speak English.'' / ''I
        don''t speak English.'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''I like not coffee.'' (Dutch: ''Ik hou niet van koffie'') Correct:
      ''I don''t like coffee.'''
    - 'Wrong: ''I go never to the gym.'' (Dutch: ''Ik ga nooit naar de sportschool'')
      Correct: ''I never go to the gym.'''
    - 'Wrong: ''I have nothing not seen.'' (Dutch double negation transfer) Correct:
      ''I haven''t seen anything.'''
    why_it_happens: 'Dutch negation is formed by placing ''niet'' after the verb:
      ''Ik drink niet koffie'' (I drink not coffee). English requires do-support:
      ''I do not drink coffee.'' Dutch has no equivalent of ''do/does/did'' as an
      auxiliary for negation. Dutch allows double negation in colloquial speech. The
      adverb ''nooit'' (never) typically appears at the end of the Dutch clause.'
    teacher_tips:
      how_to_explain: 'Start with the core difference: Dutch puts ''niet'' after the
        verb, English needs ''do/does/did + not'' before the main verb. Then address
        ''never'' placement and double negation.'
      where_to_start: 'Begin with simple present tense negation using ''do not/don''t.''
        Contrast: ''Ik werk niet'' -> ''I don''t work'' (NOT ''I work not'').'
      sequencing: 'Week 1: Do-support in negation. Week 2: ''Never'' placement. Week
        3: Double negation. Week 4: Combined practice.'
      exercises:
      - name: Do-Support Bootcamp
        type: transformation
        description: '15 affirmative sentences. Students negate each using correct
          English structure. Duration: 15 minutes.'
        duration: 15
      - name: Never in the Right Place
        type: sentence-rewrite
        description: '10 sentences with ''never'' in wrong (Dutch) position. Students
          rewrite correctly. Duration: 10 minutes.'
        duration: 10
      - name: Double Negation Detective
        type: error-correction
        description: '12 sentences, half with double negation errors. Students identify
          and fix wrong ones. Duration: 15 minutes.'
        duration: 15
      - name: Negation Translation Challenge
        type: translation
        description: 'Students translate 10 Dutch negative sentences into English.
          Duration: 20 minutes.'
        duration: 20
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - Haeseryn, W. et al. (1997). Algemene Nederlandse Spraakkunst (ANS). 2nd ed.
    source_count: 3
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — negation is a fundamental structural difference
      with high error frequency.
    notes: Fundamental difference from English. Dutch negation requires no auxiliary
      verb. Double negation is standard in colloquial Dutch.
  perfectum_vs_imperfectum:
    interference_patterns:
    - pattern: Overuse of present perfect for completed past actions (Dutch perfectum
        is the default past tense)
      example: 'Dutch: ''Ik heb gisteren gefietst.'' Literal: ''I have yesterday cycled.''
        Wrong: ''I have cycled yesterday.'' Correct: ''I cycled yesterday.'''
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Using present perfect with specific past time references
      example: 'Dutch: ''Ik heb het in 2010 gedaan.'' Literal: ''I have it in 2010
        done.'' Wrong: ''I have done it in 2010.'' Correct: ''I did it in 2010.'''
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Underuse of present perfect for ongoing/relevant-to-present situations
      example: 'Dutch: ''Ik woon hier sinds 2015.'' (Dutch uses present) Wrong: ''I
        live here since 2015.'' Correct: ''I have lived here since 2015.'' / ''I have
        been living here since 2015.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I have seen that movie last week.'' (Dutch: ''Ik heb die film vorige
      week gezien'') Correct: ''I saw that movie last week.'''
    - 'Wrong: ''I live here since 2018.'' (Dutch: ''Ik woon hier sinds 2018'') Correct:
      ''I have lived here since 2018.'''
    - 'Wrong: ''I am here for 3 years.'' (Dutch: ''Ik ben hier 3 jaar'') Correct:
      ''I have been here for 3 years.'''
    why_it_happens: The Dutch perfectum functions as the default past tense in spoken
      Dutch, even with specific time references. English strictly requires simple
      past with specific time references. Conversely, Dutch uses the present tense
      for ongoing situations where English requires present perfect. This creates
      a double error pattern.
    teacher_tips:
      how_to_explain: 'Draw a timeline. English: Simple Past = finished time, Present
        Perfect = unfinished time. Dutch uses perfectum for BOTH. Key teaching point:
        specific past time word = Simple Past in English.'
      where_to_start: 'Start with the most common error: using present perfect with
        specific past time references. Then introduce ''since/for.'''
      sequencing: 'Week 1: Simple Past vs. Present Perfect. Week 2: Present Perfect
        with ''since'' and ''for.'' Week 3: Present Perfect with ''already,'' ''yet,''
        ''ever,'' ''never.'' Week 4: Mixed practice.'
      exercises:
      - name: 'Tense Choice: Past or Perfect?'
        type: fill-in-the-blank
        description: '20 sentences with blanks. Students choose between Simple Past
          and Present Perfect. Duration: 15 minutes.'
        duration: 15
      - name: Dutch Perfectum Overuse Correction
        type: error-correction
        description: 'A dialogue with 10 present perfect errors. Students identify
          and correct. Duration: 15 minutes.'
        duration: 15
      - name: 'Since vs. For: Present Perfect Practice'
        type: sentence-rewrite
        description: '10 Dutch-style sentences. Students rewrite using English Present
          Perfect. Duration: 15 minutes.'
        duration: 15
      - name: Tense Timeline Game
        type: oral-drill
        description: 'Teacher reads time expressions. Students hold up ''PAST'' or
          ''PERFECT'' cards. Duration: 10 minutes.'
        duration: 10
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Hulstijn, J. & Marchena, E. (1989). Avoidance: Grammatical or semantic causes?
      SSLA, 11(3), 241-255.'
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - McGavran, S. (2008). The Dutch Perfectum/Imperfectum distinction. ITL International
      Journal of Applied Linguistics, 154, 45-68.
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — Dutch perfectum is the default spoken past tense,
      creating systematic overuse of English present perfect.
    notes: Core tense system different from English. Dutch perfectum functions as
      the default past tense in spoken Dutch.
  modal_verbs_nl:
    interference_patterns:
    - pattern: Using 'must' for past obligation (Dutch 'moeten' doesn't change form)
      example: 'Dutch: ''Ik moest gaan.'' Wrong: ''I must go yesterday.'' Correct:
        ''I had to go yesterday.'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Using 'to' after modal verbs (confusion with Dutch 'te + infinitive')
      example: 'Dutch: ''Ik kan zwemmen.'' BUT Dutch: ''Ik probeer te zwemmen.'' Wrong:
        ''I can to swim.'' Correct: ''I can swim.'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Overusing 'shall' (Dutch 'zal' is broader than English 'shall')
      example: 'Dutch: ''Ik zal het morgen doen.'' Wrong: ''I shall do it tomorrow.''
        (overly formal) Correct: ''I will do it tomorrow.'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Using 'can' for polite requests where English prefers 'could' or 'may'
      example: 'Dutch: ''Kan ik hier roken?'' Wrong: ''Can I smoke here?'' (less polite)
        Correct: ''Could I smoke here?'' / ''May I smoke here?'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I must go to the dentist yesterday.'' (Dutch: ''Ik moest naar de tandarts
      gisteren'') Correct: ''I had to go to the dentist yesterday.'''
    - 'Wrong: ''I shall call you tomorrow.'' (Dutch: ''Ik zal je morgen bellen'')
      Correct: ''I will call you tomorrow.'''
    - 'Wrong: ''Can I borrow your pen?'' (less polite) Correct: ''Could I borrow your
      pen?'' (more polite)'
    why_it_happens: 'Dutch modal verbs (kunnen, moeten, mogen, willen, zullen, hoeven)
      have similar meanings to English modals but differ in form and usage. The most
      significant error is ''moeten'' (must): Dutch uses ''moest'' for past obligation,
      which learners translate as ''must'' + past time. English requires ''had to.''
      Dutch ''zal'' is used more broadly than English ''shall.'''
    teacher_tips:
      how_to_explain: 'Start with ''must -> had to'': ''In English, ''must'' has no
        past form. For the past, we say ''had to.'' Then address ''shall'' vs. ''will'':
        Dutch ''zal'' = English ''will'' (not ''shall''). Finally, discuss politeness.'
      where_to_start: Begin with 'must -> had to' as it's most frequent and impactful.
        Drill present vs. past obligation.
      sequencing: 'Week 1: ''Must'' vs. ''had to.'' Week 2: ''Shall'' vs. ''will.''
        Week 3: ''Can/could/may.'' Week 4: Modals for possibility and advice.'
      exercises:
      - name: Must -> Had To Transformation
        type: transformation
        description: '12 sentences using ''must'' with past time references. Students
          rewrite using ''had to.'' Duration: 10 minutes.'
        duration: 10
      - name: Shall or Will? Judgment
        type: matching
        description: '15 sentences with blanks. Students choose between ''shall''
          and ''will.'' Duration: 15 minutes.'
        duration: 15
      - name: 'Politeness Upgrade: Can -> Could/May'
        type: sentence-rewrite
        description: '10 requests using ''can.'' Students rewrite using ''could''
          or ''may.'' Duration: 10 minutes.'
        duration: 10
      - name: Modal Verb Error Correction
        type: error-correction
        description: 'A 150-word text with 8 modal verb errors. Students identify,
          classify, and correct. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - Westhoff, G. (1981). Eigenwaarde en Vreemdwaarde. Doctoral dissertation, University
      of Amsterdam.
    source_count: 3
    source_type: peer-reviewed
    frequency: 3
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — modal verbs have close parallels but structural
      traps, especially 'must' for past obligation.
    notes: Close parallels but structural traps. The 'must -> had to' error is the
      most impactful.
  er_construction:
    interference_patterns:
    - pattern: Using 'there' where English requires a different structure
      example: 'Dutch: ''Er komt iemand.'' Literal: ''There comes someone.'' Wrong:
        ''There comes someone.'' Correct: ''Someone is coming.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'er' as pronoun replacement for prepositional phrases
      example: 'Dutch: ''Ik denk erover.'' Literal: ''I think there-about.'' Wrong:
        ''I think there-about.'' Correct: ''I think about it.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'er' as a quantitative pronoun
      example: 'Dutch: ''Ik heb er drie.'' Literal: ''I have there three.'' Wrong:
        ''I have there three.'' Correct: ''I have three.'' / ''I have three of them.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''There comes a bus.'' (Dutch: ''Er komt een bus'') Correct: ''A bus
      is coming.'''
    - 'Wrong: ''I have there three.'' (Dutch: ''Ik heb er drie'') Correct: ''I have
      three.'''
    - 'Wrong: ''She talks there-about.'' (Dutch: ''Ze praat erover'') Correct: ''She
      talks about it.'''
    why_it_happens: 'Dutch ''er'' is multi-functional: (1) existential marker like
      ''there,'' (2) locative adverb, (3) pronoun for prepositional phrases (erover
      = about it), (4) quantitative pronoun (er drie = three of them). English ''there''
      only covers functions 1-2. Dutch learners over-extend English ''there'' to cover
      all functions of Dutch ''er.'''
    teacher_tips:
      how_to_explain: Explain that Dutch 'er' has 4+ functions while English 'there'
        covers only 1-2. Only the existential use (Er is... = There is...) maps directly.
      where_to_start: Begin with existential 'er' = 'there.' Then show prepositional
        'er' (erover = about it). Finally, quantitative 'er' (er drie = three).
      sequencing: 'Week 1: Existential ''er.'' Week 2: Prepositional ''er.'' Week
        3: Quantitative ''er.'' Week 4: Locative ''er.'''
      exercises:
      - name: Er Function Sorting
        type: matching
        description: '16 Dutch sentences with ''er.'' Students classify each ''er''
          and translate into English. Duration: 15 minutes.'
        duration: 15
      - name: Er -> English Translation Challenge
        type: translation
        description: '12 Dutch sentences with ''er,'' each using a different function.
          Students identify and translate. Duration: 20 minutes.'
        duration: 20
      - name: There Overuse Correction
        type: error-correction
        description: '10 English sentences with incorrect ''there'' usage. Students
          identify and correct. Duration: 10 minutes.'
        duration: 10
      - name: Prepositional Er Drill
        type: fill-in-the-blank
        description: '12 Dutch sentences with prepositional ''er.'' Students translate
          using correct preposition + pronoun. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - Haeseryn, W. et al. (1997). Algemene Nederlandse Spraakkunst (ANS). 2nd ed.
    source_count: 3
    source_type: peer-reviewed
    frequency: 3
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — 'er' is one of the most complex words in Dutch
      with no single English equivalent.
    notes: Characteristic Dutch structure absent in English. Dutch 'er' has 4+ distinct
      functions.
  pronoun_system_nl:
    interference_patterns:
    - pattern: Omitting subject pronouns (Dutch allows subject drop, English doesn't)
      example: 'Dutch: ''Regent.'' (Rains — subjectless) Wrong: ''Is raining.'' Correct:
        ''It is raining.'' / ''It''s raining.'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Confusing 'it' and 'that' (Dutch 'het' and 'dat' have different distributions)
      example: 'Dutch: ''Het is leuk.'' vs. ''Dat is leuk.'' Wrong: ''It is a good
        idea.'' (pointing at something) Correct: ''That is a good idea.'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Using subject pronouns instead of object pronouns in compound objects
      example: 'Dutch: ''Ik zie hem en haar.'' Wrong: ''Between you and I.'' Correct:
        ''Between you and me.'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''Is cold today.'' (Dutch speakers may drop ''het'') Correct: ''It is
      cold today.'''
    - 'Wrong: ''I see he.'' (Dutch: ''Ik zie hem'') Correct: ''I see him.'''
    - 'Wrong: ''It is my book.'' (pointing at distant object) Correct: ''That is my
      book.'''
    why_it_happens: Dutch allows subject pronoun drop in certain informal and weather
      contexts ('Regent' = 'It rains'), while English always requires a subject. Dutch
      'het' serves as both subject pronoun (it) and demonstrative (that), creating
      confusion about 'it' vs. 'that.' The most persistent error is the dummy subject.
    teacher_tips:
      how_to_explain: 'Start with the dummy subject rule: English ALWAYS needs a subject.
        Write: Dutch ''Regent'' -> English ''IT rains.'' The ''it'' doesn''t refer
        to anything. Then address ''it/that'' distinction.'
      where_to_start: 'Begin with weather expressions. Drill: ''Het regent'' -> ''It
        rains,'' ''Het sneeuwt'' -> ''It snows.'''
      sequencing: 'Week 1: Dummy ''it'' in weather and time expressions. Week 2: Subject
        pronouns. Week 3: ''It'' vs. ''that.'' Week 4: Object and reflexive pronouns.'
      exercises:
      - name: Dummy It Insertion
        type: fill-in-the-blank
        description: '15 Dutch-style subjectless sentences. Students add the correct
          dummy subject. Duration: 10 minutes.'
        duration: 10
      - name: It or That? Contextual Choice
        type: fill-in-the-blank
        description: '12 sentences with blanks. Students choose ''it'' or ''that''
          based on context. Duration: 10 minutes.'
        duration: 10
      - name: Pronoun Translation Drill
        type: translation
        description: '15 Dutch sentences targeting dummy ''it,'' subject/object pronouns,
          and demonstratives. Duration: 15 minutes.'
        duration: 15
      - name: Subject Drop Error Hunt
        type: error-correction
        description: 'A 200-word dialogue with 8 subject-drop errors. Students find
          and correct. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - Quirk, R. et al. (1985). A Comprehensive Grammar of the English Language. Longman.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — pronoun system differences, especially dummy 'it,'
      are a high-frequency error area.
    notes: Pronoun confusion common for Dutch speakers. The dummy subject 'it' is
      the most teachable target.
  verb_final_subordinate:
    interference_patterns:
    - pattern: Placing the verb at the end of subordinate clauses (Dutch SOV order)
      example: 'Dutch: ''Ik denk dat hij het boek gelezen heeft.'' Literal: ''I think
        that he the book read has.'' Wrong: ''I think that he the book read has.''
        Correct: ''I think that he has read the book.'''
      frequency: 5
      persistence: 5
      communicative_impact: 3
    - pattern: Placing the past participle at the end of the clause after the auxiliary
      example: 'Dutch: ''Ik heb het boek gelezen.'' Literal: ''I have the book read.''
        Wrong: ''I have the book read.'' (ambiguous) Correct: ''I have read the book.'''
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Placing all verbs at the end of subordinate clauses in clusters
      example: 'Dutch: ''Omdat hij het boek heeft willen lezen.'' Literal: ''Because
        he the book has want read.'' Wrong: ''Because he the book has want read.''
        Correct: ''Because he has wanted to read the book.'''
      frequency: 4
      persistence: 5
      communicative_impact: 3
    examples:
    - 'Wrong: ''I think that he the book has read.'' (Dutch: ''Ik denk dat hij het
      boek gelezen heeft'') Correct: ''I think that he has read the book.'''
    - 'Wrong: ''She said that she the movie had seen.'' (Dutch: ''Ze zei dat ze de
      film had gezien'') Correct: ''She said that she had seen the movie.'''
    - 'Wrong: ''Because he has the car wanted to buy.'' (Dutch: ''Omdat hij de auto
      heeft willen kopen'') Correct: ''Because he has wanted to buy the car.'''
    why_it_happens: 'Dutch is SOV in subordinate clauses: all verbs go to the end.
      In perfect tenses, the auxiliary comes before the participle at the end. In
      complex verb clusters, all verbs cluster at the end. English maintains SVO order
      in all clauses. This is one of the most persistent errors because the verb-final
      rule applies to EVERY subordinate clause in Dutch.'
    teacher_tips:
      how_to_explain: 'Draw a clear contrast: Dutch subordinate clauses put ALL verbs
        at the END. English keeps the verb with the subject. Dutch: Subject + Object
        + VERB(S). English: Subject + VERB + Object.'
      where_to_start: 'Start with perfect tenses in subordinate clauses. Dutch: ''dat
        hij het boek GELEZEN HEFT'' -> English: ''that he HAS READ the book.'''
      sequencing: 'Week 1: Simple subordinate clauses. Week 2: Perfect tenses in subordinate
        clauses. Week 3: Modal + infinitive. Week 4: Complex verb clusters.'
      exercises:
      - name: Verb Cluster Reordering
        type: transformation
        description: '12 Dutch subordinate clauses with verb-final word order. Students
          rewrite in correct English SVO order. Duration: 20 minutes.'
        duration: 20
      - name: Subordinate Clause Word Order Audit
        type: error-correction
        description: 'A 200-word text with 10 subordinate clause word order errors.
          Students identify and correct. Duration: 20 minutes.'
        duration: 20
      - name: That-Clause Translation Relay
        type: translation
        description: 'Teams translate Dutch ''dat''-clauses into English with different
          verb constructions. Duration: 20 minutes.'
        duration: 20
      - name: Verb Position Visualization
        type: practice
        description: 'Students draw diagrams showing Dutch SOV vs. English SVO word
          order for 10 subordinate clauses. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - Haeseryn, W. et al. (1997). Algemene Nederlandse Spraakkunst (ANS). 2nd ed.
    - Zwart, J.W. (2011). The Syntax of Dutch. Cambridge University Press.
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 5
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — verb-final in subordinate clauses is the single
      most persistent syntactic error for Dutch learners.
    notes: Most structurally deep Dutch syntactic feature and the hardest to correct.
      Applies to every subordinate clause.
  reflexive_van:
    interference_patterns:
    - pattern: Using reflexive pronouns where English doesn't require them
      example: 'Dutch: ''Ik verveel me.'' (I bore myself = I am bored) Wrong: ''I
        bore myself.'' Correct: ''I am bored.'' / ''I get bored.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omitting reflexive pronouns where English requires them
      example: 'Dutch: ''Ik scheer me.'' BUT Dutch: ''Ik scheer.'' (reflexive optional)
        Wrong: ''I shave.'' (could mean shaving someone else) Correct: ''I shave myself.'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Using body part constructions with possessive meaning
      example: 'Dutch: ''Ik was me de handen.'' (I wash myself the hands) Wrong: ''I
        wash myself the hands.'' Correct: ''I wash my hands.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I bore myself.'' (Dutch: ''Ik verveel me'' = I am bored) Correct:
      ''I am bored.'''
    - 'Wrong: ''I enjoy very much.'' (Dutch: ''Ik vermaak me erg'') Correct: ''I enjoy
      myself very much.'' / ''I have a great time.'''
    - 'Wrong: ''He hurt.'' (Dutch: ''Hij verwondde zich'') Correct: ''He hurt himself.'''
    why_it_happens: 'Dutch has a larger set of reflexive verbs than English. Many
      Dutch reflexive verbs correspond to non-reflexive English verbs: ''zich vervelen''
      = ''to be bored,'' ''zich vermaken'' = ''to enjoy oneself,'' ''zich herinneren''
      = ''to remember.'' Conversely, some Dutch verbs can optionally drop the reflexive
      pronoun where English requires it.'
    teacher_tips:
      how_to_explain: 'Show that Dutch has MORE reflexive verbs than English. Make
        a list: ''zich vervelen'' = ''to be bored'' (no reflexive), ''zich vermaken''
        = ''to enjoy oneself'' (reflexive).'
      where_to_start: 'Begin with Dutch reflexive verbs that are NOT reflexive in
        English: zich vervelen (be bored), zich voelen (feel), zich herinneren (remember).'
      sequencing: 'Week 1: Dutch reflexive verbs that are NOT reflexive in English.
        Week 2: Verbs reflexive in both languages. Week 3: Dutch reflexive verbs with
        no direct English equivalent. Week 4: Practice in context.'
      exercises:
      - name: Reflexive or Not? Dutch-English Verb Matching
        type: matching
        description: '20 Dutch reflexive verbs. Students find the correct English
          equivalent. Duration: 15 minutes.'
        duration: 15
      - name: Reflexive Pronoun Insertion
        type: fill-in-the-blank
        description: '12 English sentences with missing reflexive pronouns. Students
          add the correct pronoun. Duration: 10 minutes.'
        duration: 10
      - name: Daily Routine Translation
        type: translation
        description: 'Students translate a Dutch paragraph about a morning routine
          with 8 reflexive verbs. Duration: 20 minutes.'
        duration: 20
      - name: Reflexive Error Correction
        type: error-correction
        description: '10 English sentences with reflexive pronoun errors. Students
          identify and correct. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - Fehringer, C. (2004). How to recognize a Dutch verb? Dutch Journal of Linguistics,
      18(1), 1-18.
    source_count: 3
    source_type: peer-reviewed
    frequency: 3
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — Dutch has significantly more reflexive verbs than
      English.
    notes: Common area of error. The Dutch reflexive system is more extensive than
      English.
  present_simple_vs_continuous:
    interference_patterns:
    - pattern: Using present simple for ongoing actions (Dutch has no continuous aspect)
      example: 'Dutch: ''Ik lees een boek.'' (could be ongoing) Wrong: ''I read a
        book right now.'' Correct: ''I am reading a book right now.'''
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Using 'aan het + infinitive' and translating literally
      example: 'Dutch: ''Ik ben aan het lezen.'' (I am at the reading) Wrong: ''I
        am at reading.'' Correct: ''I am reading.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Overusing present simple for temporary situations
      example: 'Dutch: ''Ik werk hier tijdelijk.'' Wrong: ''I work here temporarily.''
        (misses nuance) Correct: ''I am working here temporarily.'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: ''I eat dinner now.'' (Dutch: ''Ik eet nu avondeten'') Correct: ''I
      am eating dinner now.'''
    - 'Wrong: ''She reads a book at the moment.'' (Dutch: ''Ze leest op dit moment
      een boek'') Correct: ''She is reading a book at the moment.'''
    - 'Wrong: ''I am at cooking.'' (Dutch: ''Ik ben aan het koken'') Correct: ''I
      am cooking.'''
    why_it_happens: Dutch has no grammatical continuous/progressive aspect. Dutch
      uses the simple present for both habitual and ongoing actions. Dutch CAN express
      ongoing action with 'aan het + infinitive' ('Ik ben aan het lezen'), but this
      is a lexical strategy, not a grammatical aspect. English grammatically marks
      the continuous with 'be + -ing.'
    teacher_tips:
      how_to_explain: 'English has TWO present tenses: Simple (habits, facts) and
        Continuous (happening NOW). Dutch has ONE. Address ''aan het'': ''Ik ben aan
        het lezen'' = ''I am reading'' (NOT ''I am at reading'').'
      where_to_start: 'Begin with the most common error: using simple present for
        actions happening now. Give 10 sentences with ''now,'' ''at the moment,''
        ''right now.'''
      sequencing: 'Week 1: Present Continuous for actions happening now. Week 2: Contrast
        with Present Simple for habits. Week 3: Stative verbs that DON''T use continuous.
        Week 4: Dutch ''aan het'' construction.'
      exercises:
      - name: Now or Always? Tense Choice
        type: fill-in-the-blank
        description: '20 sentences with time markers. Students choose between Present
          Simple and Present Continuous. Duration: 15 minutes.'
        duration: 15
      - name: Aan Het Translation Correction
        type: error-correction
        description: '10 English sentences with literal ''aan het'' translations.
          Students correct each one. Duration: 10 minutes.'
        duration: 10
      - name: 'Picture Description: What''s Happening Now?'
        type: oral-drill
        description: 'Show a busy scene picture. Students describe what people are
          doing using Present Continuous. Duration: 15 minutes.'
        duration: 15
      - name: 'Habit vs. Now: Sentence Pairs'
        type: sentence-rewrite
        description: '8 sentences in Present Simple. Students write a pair for each:
          one habit, one happening now. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - 'Krafft, A. (2004). The Dutch progressive: A semantic analysis. Languages in
      Contrast, 5(2), 237-262.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — absence of grammatical continuous aspect in Dutch
      leads to systematic underuse of English -ing forms.
    notes: Underuse of English continuous aspect. Dutch has no grammatical progressive,
      only 'aan het + infinitive.'
  prepositions_en:
    interference_patterns:
    - pattern: Direct translation of Dutch prepositions that don't match English
      example: 'Dutch: ''Ik wacht op de bus.'' (I wait on the bus) Wrong: ''I wait
        on the bus.'' Correct: ''I am waiting for the bus.'''
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Using wrong preposition with verbs of motion
      example: 'Dutch: ''Ik ga naar huis.'' (I go to home) Wrong: ''I go to home.''
        Correct: ''I am going home.'' (no preposition)'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Using wrong preposition with time expressions
      example: 'Dutch: ''op maandag'' (on Monday) Wrong: ''I work at Monday.'' Correct:
        ''I work on Monday.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omitting prepositions where English requires them
      example: 'Dutch: ''Ik luister muziek.'' (no preposition) Wrong: ''I listen music.''
        Correct: ''I listen TO music.'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''I wait on the bus.'' (Dutch: ''Ik wacht op de bus'') Correct: ''I
      am waiting for the bus.'''
    - 'Wrong: ''I listen music.'' (Dutch: ''Ik luister muziek'') Correct: ''I listen
      to music.'''
    - 'Wrong: ''I am good in math.'' (Dutch: ''Ik ben goed in wiskunde'') Correct:
      ''I am good at math.'''
    - 'Wrong: ''She married with him.'' (Dutch: ''Ze trouwde met hem'') Correct: ''She
      married him.'''
    why_it_happens: Dutch and English prepositions rarely map 1:1 despite both being
      Germanic. Dutch uses 'op' where English uses 'for' (wachten op = wait for),
      'in' where English uses 'at' (goed in = good at), and 'met' where English uses
      no preposition (trouwen met = marry). Some Dutch verbs take no preposition where
      English requires one (luisteren = listen TO).
    teacher_tips:
      how_to_explain: 'Warn students that prepositions are the LEAST predictable area
        of transfer. Create a ''false friends'' list: op/for, in/at, met/with (sometimes).
        Focus on verb + preposition combinations as fixed chunks.'
      where_to_start: 'Begin with highest-frequency verb + preposition errors: wachten
        op (wait for), luisteren naar (listen to), kijken naar (look at), denken aan
        (think about).'
      sequencing: 'Week 1: Verb + preposition combinations. Week 2: Prepositions of
        time. Week 3: Prepositions of place. Week 4: Prepositions with adjectives.'
      exercises:
      - name: Preposition False Friends Matching
        type: matching
        description: '20 Dutch verb + preposition combinations. Students match with
          correct English equivalents. Duration: 15 minutes.'
        duration: 15
      - name: Preposition Gap Fill
        type: fill-in-the-blank
        description: '20 sentences with missing prepositions. Students fill in the
          correct English preposition. Duration: 15 minutes.'
        duration: 15
      - name: Preposition Error Correction
        type: error-correction
        description: 'A 150-word text with 10 preposition errors. Students identify
          and correct. Duration: 15 minutes.'
        duration: 15
      - name: Verb + Preposition Chunk Drill
        type: oral-drill
        description: 'Teacher says a Dutch verb. Students respond with English verb
          + correct preposition. Duration: 10 minutes.'
        duration: 10
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Hulstijn, J. & Marchena, E. (1989). Avoidance: Grammatical or semantic causes?
      SSLA, 11(3), 241-255.'
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - De Cock, S. (2006). Learner corpora and second language acquisition. PhD dissertation,
      Universite catholique de Louvain.
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — preposition errors are among the most frequent
      and persistent for Dutch learners.
    notes: Persistent despite Germanic cognate relationship. Prepositions are the
      least predictable area of transfer.
  passive_voice_nl:
    interference_patterns:
    - pattern: Using 'worden' (become) passive where English uses 'be' passive
      example: 'Dutch: ''De brief wordt geschreven.'' (The letter becomes written)
        Wrong: ''The letter becomes written.'' Correct: ''The letter is being written.''
        / ''The letter is written.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'zijn' passive for ongoing actions where English uses 'be being'
      example: 'Dutch: ''Het huis is gebouwd.'' (ambiguous: state or process) Wrong:
        ''The house is built.'' (when meaning construction is ongoing) Correct: ''The
        house is being built.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Using present tense with past time reference in passive
      example: 'Dutch: ''De brief is gisteren geschreven.'' Wrong: ''The letter is
        written yesterday.'' Correct: ''The letter was written yesterday.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''The letter becomes written.'' (Dutch: ''De brief wordt geschreven'')
      Correct: ''The letter is being written.'''
    - 'Wrong: ''The book has wrote.'' (Dutch: ''Het boek is geschreven'' — wrong participle)
      Correct: ''The book has been written.'''
    - 'Wrong: ''The house is built last year.'' (Dutch: ''Het huis is vorig jaar gebouwd'')
      Correct: ''The house was built last year.'''
    why_it_happens: Dutch forms the passive with 'worden' (become) for processual
      passive and 'zijn' (be) for resultative/statal passive. English uses 'be' for
      both, distinguishing process with 'be being + participle' from state with 'be
      + participle.' Dutch learners struggle because Dutch 'is gebouwd' covers both
      meanings.
    teacher_tips:
      how_to_explain: 'Dutch has TWO passive auxiliaries: ''worden'' (process) and
        ''zijn'' (state). English uses ''be'' for both but adds ''being'' for process:
        ''is being built'' (process) vs. ''is built'' (state).'
      where_to_start: 'Begin with processual passive: Dutch ''worden'' -> English
        ''be being.'' Then address the state/process ambiguity.'
      sequencing: 'Week 1: Processual passive. Week 2: Resultative/statal passive.
        Week 3: Passive with modal verbs. Week 4: Passive in different tenses.'
      exercises:
      - name: Process vs. State Passive Sorting
        type: matching
        description: '15 Dutch passive sentences. Students classify each as process
          or state and translate. Duration: 15 minutes.'
        duration: 15
      - name: Passive Voice Transformation
        type: transformation
        description: '10 Dutch passive sentences in different tenses. Students translate
          into correct English passive. Duration: 15 minutes.'
        duration: 15
      - name: Passive Error Correction
        type: error-correction
        description: 'A 150-word text with 8 passive voice errors. Students identify
          and correct. Duration: 15 minutes.'
        duration: 15
      - name: Active to Passive with Dutch Context
        type: transformation
        description: 'Students receive 10 active Dutch sentences. They convert to
          English passive. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - Cornelis, L. (1997). Passive and Perspective. John Benjamins.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 3
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated — Dutch has two passive auxiliaries (worden/zijn)
      where English uses one (be) with aspectual distinction.
    notes: More common in reading than speaking. The worden/zijn distinction maps
      imperfectly to English be/being.
  subjunctive_relict_nl:
    interference_patterns:
    - pattern: Using archaic subjunctive forms based on Dutch subjunctive remnants
      example: 'Dutch: ''God ziele hem.'' (archaic subjunctive) Wrong: ''God soul
        him.'' (attempting archaic English) Correct: ''God rest his soul.'''
      frequency: 1
      persistence: 1
      communicative_impact: 1
    - pattern: Using 'were' incorrectly based on Dutch 'waren' (past tense of 'zijn')
      example: 'Dutch: ''Als ik rijk was...'' (If I rich was) — Dutch uses simple
        past, not subjunctive Wrong: ''If I was rich...'' (informal but widely accepted)
        Correct: ''If I were rich...'' (formal subjunctive)'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''If I was rich...'' (informal; formal requires ''were'') Correct: ''If
      I were rich...'''
    - 'Wrong: ''I wish I was taller.'' (informal) Correct: ''I wish I were taller.''
      (formal)'
    why_it_happens: Dutch has largely lost its subjunctive mood, retaining only archaic
      remnants. However, Dutch uses the simple past tense ('was') in hypothetical
      conditional sentences where English traditionally requires the subjunctive ('were').
      Dutch learners therefore use 'was' in formal hypothetical contexts where 'were'
      is expected.
    teacher_tips:
      how_to_explain: 'Explain that English has a ''special past tense'' for unreal/hypothetical
        situations: ''If I WERE rich'' (not ''was''). Dutch uses the normal past tense
        (''was'') in these contexts. Note that ''was'' is widely accepted in informal
        English but ''were'' is expected in formal writing.'
      where_to_start: 'Begin with the most common context: ''If I were...'' (second
        conditional). Show that Dutch ''Als ik was...'' maps to English ''If I WERE...''
        (not ''was'').'
      sequencing: 'Week 1: Second conditional with ''were.'' Week 2: ''I wish I were...''
