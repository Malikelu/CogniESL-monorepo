    notes: Affects intelligibility when speaking. The /th/ error is the most recognizable
      marker of Dutch accent in English.
  fixed_expressions:
    interference_patterns:
    - pattern: Literal translation of Dutch idioms and fixed expressions
      example: 'Dutch: ''Ik ben het zat.'' (I am it sat = I am fed up) Wrong: ''I
        am it sat.'' Correct: ''I am fed up.'' / ''I''ve had enough.'''
      frequency: 2
      persistence: 2
      communicative_impact: 2
    - pattern: Using Dutch collocation patterns in English
      example: 'Dutch: ''sterk maken'' (strong make = strengthen) Wrong: ''I want
        to strong my English.'' Correct: ''I want to strengthen my English.'' / ''I
        want to improve my English.'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am it sat.'' (Dutch: ''Ik ben het zat'') Correct: ''I am fed up.''
      / ''I''ve had enough.'''
    - 'Wrong: ''I want to strong my English.'' (Dutch: ''Ik wil mijn Engels sterk
      maken'') Correct: ''I want to strengthen my English.'''
    - 'Wrong: ''He made a photo.'' (Dutch: ''Hij maakte een foto'') Correct: ''He
      took a photo.'''
    why_it_happens: Dutch has many fixed expressions and collocations that don't translate
      literally to English. Dutch learners may translate these expressions word-for-word,
      producing errors like 'I am it sat' (Ik ben het zat = I am fed up) or 'I want
      to strong my English' (Ik wil mijn Engels sterk maken = I want to strengthen
      my English).
    teacher_tips:
      how_to_explain: Explain that every language has fixed expressions that can't
        be translated word-for-word. Make a list of common Dutch expressions and their
        English equivalents. Emphasize that these must be learned as whole chunks.
      where_to_start: 'Begin with the most common Dutch-to-English false friend expressions:
        ''sterk maken'' = strengthen, ''een foto maken'' = take a photo, ''zat zijn''
        = be fed up.'
      sequencing: 'Week 1: Common Dutch-English false friend expressions. Week 2:
        Collocation patterns (make/take/do). Week 3: Idiomatic expressions. Week 4:
        Practice in context.'
      exercises:
      - name: Dutch Expression -> English Equivalent Matching
        type: matching
        description: '15 Dutch fixed expressions. Students match each with the correct
          English equivalent. Duration: 10 minutes.'
        duration: 10
      - name: Literal Translation Error Correction
        type: error-correction
        description: '10 English sentences with literal Dutch translations. Students
          identify and correct. Duration: 10 minutes.'
        duration: 10
      - name: Make/Take/Do Collocation Sort
        type: matching
        description: '20 activities. Students sort by whether they use ''make,'' ''take,''
          or ''do.'' Duration: 10 minutes.'
        duration: 10
      - name: Idiom Story Creation
        type: composition
        description: 'Students write a short story using 5 English idioms that have
          different Dutch equivalents. Duration: 15 minutes.'
        duration: 15
    sources:
