  countability_en:
    interference_patterns:
    - pattern: Using plural -s with uncountable nouns (Dutch has different countability
        assignments)
      example: 'Dutch: ''adviezen'' (countable in Dutch) Wrong: ''He gave me good
        advices.'' Correct: ''He gave me good advice.'''
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Using 'many' with uncountable nouns that are countable in Dutch
      example: 'Dutch: ''veel adviezen'' (many advices — countable in Dutch) Wrong:
        ''I have many informations.'' Correct: ''I have a lot of information.'''
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Using 'a/an' with nouns that are uncountable in English but countable
        in Dutch
      example: 'Dutch: ''een onderzoek'' (an investigation — countable) Wrong: ''I
        did a research.'' Correct: ''I did research.'' / ''I did a study.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I have many informations.'' Correct: ''I have a lot of information.'''
    - 'Wrong: ''He gave me good advices.'' (Dutch: ''Hij gaf me goede adviezen'')
      Correct: ''He gave me good advice.'''
    - 'Wrong: ''I need a furniture.'' (Dutch: ''Ik heb een meubel nodig'') Correct:
      ''I need furniture.'' / ''I need a piece of furniture.'''
    why_it_happens: Dutch and English have different countability assignments for
      many nouns. Some nouns that are countable in Dutch are uncountable in English
      (advies/advice, onderzoek/research, meubel/furniture). Dutch learners apply
      Dutch countability to English, producing errors like 'advices,' 'informations,'
      'a research.' The error is persistent because countability is a lexical property
      that must be learned noun by noun.
    teacher_tips:
      how_to_explain: 'Explain that countability is a property of the WORD, not the
        CONCEPT. A noun can be countable in one language and uncountable in another.
        Teach the ''piece of'' strategy: ''a piece of advice,'' ''a piece of furniture.'''
      where_to_start: 'Begin with the most common errors: advice, information, research,
        furniture, luggage, equipment.'
      sequencing: 'Week 1: Common uncountable nouns. Week 2: ''Much'' vs. ''many''
        vs. ''a lot of.'' Week 3: ''Piece of'' strategy. Week 4: Nouns that change
        meaning.'
      exercises:
      - name: Countable or Uncountable? Dutch-English Comparison
        type: matching
        description: '20 Dutch nouns. Students determine if they are countable or
          uncountable in English. Duration: 15 minutes.'
        duration: 15
      - name: Much, Many, or A Lot Of?
        type: fill-in-the-blank
        description: '15 sentences. Students choose between ''much,'' ''many,'' and
          ''a lot of.'' Duration: 10 minutes.'
        duration: 10
      - name: Countability Error Correction
        type: error-correction
        description: 'A 150-word text with 8 countability errors. Students identify
          and correct. Duration: 15 minutes.'
        duration: 15
      - name: Piece Of Strategy Practice
        type: sentence-rewrite
        description: '10 sentences with uncountable nouns used incorrectly. Students
          rewrite using ''piece of.'' Duration: 10 minutes.'
        duration: 10
