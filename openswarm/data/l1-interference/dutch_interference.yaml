  diminutive_suffix:
    interference_patterns:
    - pattern: Overusing diminutive forms in English (Dutch uses diminutives far more
        frequently)
      example: 'Dutch: ''Een beetje'' (a bit — diminutive of ''beet'') Wrong: ''I
        want a bits.'' / ''I want a small of that.'' Correct: ''I want a bit of that.''
        / ''I want a little of that.'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Using diminutive-like forms where English requires different structures
      example: 'Dutch: ''Huisje'' (house-DIM = little house) Wrong: ''I live in a
        houselet.'' / ''I live in a small house.'' Correct: ''I live in a small house.''
        / ''I live in a cottage.'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I want a bits.'' (Dutch: ''Ik wil een beetje'') Correct: ''I want
      a bit.'' / ''I want a little.'''
    - 'Wrong: ''I live in a houselet.'' (Dutch: ''Ik woon in een huisje'') Correct:
      ''I live in a small house.'' / ''I live in a cottage.'''
    - 'Wrong: ''Can I have a momentje?'' (Dutch: ''Kan ik een momentje hebben?'')
      Correct: ''Can I have a moment?'''
    why_it_happens: Dutch has a highly productive diminutive suffix (-je, -tje, -pje,
      -etje, -kje) that is used far more frequently than any English equivalent. Dutch
      diminutives convey not just smallness but also affection, informality, and nuance.
      English has no equivalent grammatical diminutive. Dutch learners may attempt
      to create English diminutives ('houselet,' 'bits') or overuse 'small' and 'little.'
    teacher_tips:
      how_to_explain: Explain that Dutch has a special word ending (-je) that makes
        things 'small' or 'cute.' English doesn't have this. Instead, English uses
        'small,' 'little,' or different words entirely.
      where_to_start: 'Begin with the most common Dutch diminutives and their English
        equivalents: huisje = small house/cottage, beetje = a bit/a little, momentje
        = a moment.'
      sequencing: 'Week 1: Common Dutch diminutives and their English equivalents.
        Week 2: When to use ''small'' vs. ''little.'' Week 3: Words that change completely.
        Week 4: Practice in context.'
      exercises:
      - name: Diminutive Translation Matching
        type: matching
        description: '15 Dutch diminutive words. Students match each with the correct
          English equivalent. Duration: 10 minutes.'
        duration: 10
      - name: Small or Little? Appropriate Choice
        type: fill-in-the-blank
        description: '12 sentences. Students choose between ''small'' and ''little.''
          Duration: 10 minutes.'
        duration: 10
      - name: Diminutive Overuse Correction
        type: error-correction
        description: '10 English sentences with diminutive-like errors. Students correct.
          Duration: 10 minutes.'
        duration: 10
      - name: Dutch Diminutive Awareness Discussion
        type: practice
        description: 'Students discuss the cultural role of diminutives in Dutch and
          how English expresses similar meanings. Duration: 15 minutes.'
        duration: 15
