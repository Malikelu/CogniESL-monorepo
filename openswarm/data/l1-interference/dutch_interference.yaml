      is the most impactful pattern.
  relative_clause_order:
    interference_patterns:
    - pattern: Using 'what' as a relative pronoun (Dutch 'wat' used after indefinites)
      example: 'Dutch: ''Alles wat ik zag...'' (Everything what I saw) Wrong: ''Everything
        what I saw.'' Correct: ''Everything that I saw.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'which' for people (Dutch 'die' covers both people and things)
      example: 'Dutch: ''De man die sprak...'' (The man who/that spoke) Wrong: ''The
        man which spoke.'' Correct: ''The man who spoke.'' / ''The man that spoke.'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Omitting relative pronoun where English requires it
      example: 'Dutch: ''De vrouw die ik ken...'' Wrong: ''The woman I know...'' (actually
        correct in English too, but Dutch speakers may omit in wrong contexts) Correct:
        ''The woman who/that I know...'' / ''The woman I know...'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''The book what I read.'' (Dutch: ''Het boek dat ik las'' — but ''wat''
      used in some contexts) Correct: ''The book that I read.'''
    - 'Wrong: ''The man which speaks.'' (Dutch: ''De man die spreekt'') Correct: ''The
      man who speaks.'' / ''The man that speaks.'''
    - 'Wrong: ''Everything what I saw.'' (Dutch: ''Alles wat ik zag'') Correct: ''Everything
      that I saw.'''
    why_it_happens: Dutch relative pronouns (die, dat, wat) have different distributions
      from English (who, which, that). Dutch 'die' is used for both people and things
      in certain contexts, leading to 'which' for people. Dutch 'wat' is used as a
      relative pronoun after indefinite pronouns ('alles wat' = everything that),
      which learners may translate as 'what.'
    teacher_tips:
      how_to_explain: 'Show the key differences: (1) Dutch ''die'' for people -> English
        ''who'' (not ''which''). (2) Dutch ''wat'' after indefinites -> English ''that''
        (not ''what''). (3) English ''who'' for people, ''which'' for things, ''that''
        for both.'
      where_to_start: 'Begin with the ''who vs. which'' distinction. Drill: ''De man
        die...'' -> ''The man WHO...'' (NOT ''which'').'
      sequencing: 'Week 1: Who/which/that distinction. Week 2: ''What'' vs. ''that''
        after indefinite pronouns. Week 3: Restrictive vs. non-restrictive relative
        clauses. Week 4: Omitting relative pronouns.'
      exercises:
      - name: Who, Which, or That? Relative Pronoun Choice
        type: fill-in-the-blank
        description: '15 sentences with blanks. Students choose the correct relative
          pronoun. Duration: 10 minutes.'
        duration: 10
      - name: What vs. That After Indefinites
        type: error-correction
        description: '10 sentences with ''what'' used incorrectly after indefinite
          pronouns. Students correct to ''that.'' Duration: 10 minutes.'
        duration: 10
      - name: Relative Clause Translation
        type: translation
        description: '12 Dutch relative clauses. Students translate into English.
          Duration: 15 minutes.'
        duration: 15
      - name: Relative Pronoun Error Correction
        type: error-correction
        description: 'A 150-word text with 8 relative pronoun errors. Students identify
          and correct. Duration: 15 minutes.'
        duration: 15
    sources:
