  infinitive_clusters:
    interference_patterns:
    - pattern: Using bare infinitive after 'like', 'want', 'prefer' (Dutch uses bare
        infinitive)
      example: 'Dutch: ''Ik wil gaan.'' (I want go) Wrong: ''I want go.'' Correct:
        ''I want to go.'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Using 'that + clause' instead of 'object + to-infinitive'
      example: 'Dutch: ''Ik wil dat je komt.'' (I want that you come) Wrong: ''I want
        that you come.'' Correct: ''I want you to come.'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Using infinitive where English requires gerund
      example: 'Dutch: ''Ik hou van zwemmen.'' (I love of swim) Wrong: ''I love swim.''
        / ''I love to swim.'' (gerund more natural) Correct: ''I love swimming.''
        / ''I love to swim.'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: ''I want go.'' (Dutch: ''Ik wil gaan'') Correct: ''I want to go.'''
    - 'Wrong: ''I want that you come.'' (Dutch: ''Ik wil dat je komt'') Correct: ''I
      want you to come.'''
    - 'Wrong: ''I like eat pizza.'' (Dutch: ''Ik hou van pizza eten'') Correct: ''I
      like eating pizza.'' / ''I like to eat pizza.'''
    why_it_happens: Dutch uses the bare infinitive after modal-like verbs ('wil gaan'
      = want go) where English requires the to-infinitive ('want to go'). Dutch also
      uses a 'dat + clause' construction for verbs of wanting ('Ik wil dat je komt'
      = I want that you come) where English uses object + to-infinitive ('I want you
      to come').
    teacher_tips:
      how_to_explain: 'Show two key differences: (1) Dutch bare infinitive after ''wil/moet/kan''
        -> English to-infinitive after ''want/must/can.'' (2) Dutch ''dat + clause''
        after verbs of wanting -> English ''object + to-infinitive.'''
      where_to_start: 'Begin with ''want + to-infinitive'' since it''s most frequent.
        Drill: ''Ik wil gaan'' -> ''I want TO gaan'' -> ''I want to go.'''
      sequencing: 'Week 1: Want/need/like + to-infinitive. Week 2: Want/ask/tell +
        object + to-infinitive. Week 3: Verbs that take gerund in English but infinitive
        in Dutch. Week 4: Mixed practice.'
      exercises:
      - name: To-Infinitive Insertion
        type: fill-in-the-blank
        description: '15 Dutch-style sentences with bare infinitives. Students add
          ''to'' where required. Duration: 10 minutes.'
        duration: 10
      - name: Dat-Clause to Object+To Transformation
        type: transformation
        description: '10 Dutch ''dat''-clauses after verbs of wanting. Students rewrite
          using English object + to-infinitive. Duration: 15 minutes.'
        duration: 15
      - name: Infinitive or Gerund? Dutch Context
        type: fill-in-the-blank
        description: '12 sentences where students choose between to-infinitive and
          gerund. Duration: 15 minutes.'
        duration: 15
      - name: Infinitive Cluster Error Correction
        type: error-correction
        description: 'A 150-word text with 8 infinitive/gerund errors. Students identify
          and correct. Duration: 15 minutes.'
        duration: 15
    sources:
