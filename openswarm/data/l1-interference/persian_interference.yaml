language: persian
schema_version: '3.0'
grammar_points:
  article_omission:
    interference_patterns:
    - Persian uses ezafe construction which does not exist in English, causing transfer
      errors related to 'article omission'.
    why_it_happens: Persian handles 'article omission' differently from English. Persian
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Persian structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Persian and English for 'article
        omission'. Show the Persian structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Persian
        handles 'article omission' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Persian sentences, students translate to English, focusing
          on correct 'article omission' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Persian-style 'article omission' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'article
          omission' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'article omission'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''She is article omission.'' Correct: ''She is a article omission.'''
    - 'Wrong: ''I like the article omission.'' (general) Correct: ''I like article
      omission.'''
    - 'Wrong: ''I have article omission.'' Correct: ''I have a article omission.'''
    sources:
    - Ghomeshi, J. (1997). Non-projecting nouns and the ezafe construction in Persian.
      Natural Language and Linguistic Theory, 15(4), 729-788.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Keshavarz, M. (2012). Transfer of L1 collocations in Persian-English. Iranian
      Journal of Applied Linguistics, 15(1), 1-24.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Persian
    notes: Persian speakers consistently omit articles at all proficiency levels.
      One of the most resistant errors in ESL corpora of Farsi learners.
