      errors related to 'countable uncountable'.
    why_it_happens: Persian handles 'countable uncountable' differently from English.
      Persian L1 speakers transfer native structural patterns to English, leading
      to systematic errors. The error is persistent because the Persian structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Persian and English for 'countable
        uncountable'. Show the Persian structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Persian
        handles 'countable uncountable' differently from English. Use visual aids
        or color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Persian sentences, students translate to English, focusing
          on correct 'countable uncountable' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Persian-style 'countable uncountable'
          errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'countable
          uncountable' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'countable uncountable'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I have many informations.'' Correct: ''I have a lot of information.'''
    - 'Wrong: ''He gave me good advices.'' Correct: ''He gave me good advice.'''
