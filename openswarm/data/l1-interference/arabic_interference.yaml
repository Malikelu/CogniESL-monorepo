    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  english_rhetorical_patterns:
    interference_patterns:
    - Arabic rhetorical patterns differ from English expectations
    - Arabic writing tends to be inductive while English prefers deductive organization
    - English expects thesis statement at the beginning, Arabic may delay the main
      point
    why_it_happens: Arabic rhetorical tradition follows inductive patterns (examples
      first, thesis later). English academic writing expects deductive structure (thesis
      first, examples after).
    teacher_tips:
      how_to_explain: Start with your main point (thesis), then support it with evidence.
        English readers expect the conclusion early.
      where_to_start: 'Study English essay structure: introduction-body-conclusion.'
      sequencing: 'Week1: understand English paragraph structure. Week2: practice
        thesis-driven writing. Week3: full essay practice.'
      exercises:
      - name: english rhetorical patterns Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'english rhetorical patterns' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: english rhetorical patterns Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'english rhetorical patterns'
          errors. Students identify and correct each error.
        duration: 15
      - name: english rhetorical patterns Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'english
          rhetorical patterns' structure.
        duration: 10
      - name: english rhetorical patterns Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'english rhetorical
          patterns' errors.
        duration: 15
    notes: Kaplan (1966) described Arabic thought patterns as following a distinctive
      rhetorical structure.
    examples:
    - 'Arabic pattern: [Background details]... [Examples and discussion]... [Main
      point at end]. English pattern: [Main point/thesis]... [Supporting evidence]...
      [Conclusion].'
    - 'Correct: ''This essay argues that renewable energy is essential. First, fossil
      fuels are finite. Second, renewable costs have dropped dramatically (Smith,
      2020). Therefore, transitioning is necessary.'''
    - 'Arabic-style inductive: ''There are many energy sources. Oil has been used
      for decades. Coal is harmful. Solar energy is growing. Therefore, renewable
      energy may be important.'' English readers may find this unfocused.'
    frequency: 3
    persistence: 3
    communicative_impact: 4
    source_type: peer-reviewed
    source_count: 2
    sources:
