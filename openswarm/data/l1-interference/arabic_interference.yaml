  coord_conjunctions:
    interference_patterns:
    - Arabic 'wa' (and) is used far more frequently than English 'and'
    - Arabic uses 'amma' (but) and 'laakin' (but) with different register than 'but'
      in English
    - Learners underuse 'nor' and 'for' as coordinating conjunctions
    why_it_happens: Arabic discourse style is heavily additive (paratactic), relying
      on 'wa' to connect clauses where English would use pronouns or omit connectors.
    teacher_tips:
      how_to_explain: English uses coordinators (FANBOYS) less frequently than Arabic
        'wa.' Replace many 'ands' with pronouns or omit.
      where_to_start: Practice replacing repeated 'and' with varied connectors.
      sequencing: 'Week1: and/but/so/yet. Week2: nor/for/or. Week3: subordination
        vs coordination.'
      exercises:
      - name: coord conjunctions Contrastive Drill
        type: translation
