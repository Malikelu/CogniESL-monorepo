    - Two independent clauses joined only by comma (comma splice)
    - Learners write long unpunctuated chains of clauses
    why_it_happens: Arabic permits longer sentence chains connected by 'wa' (and)
      without strict punctuation rules. English requires conjunctions, semicolons,
      or periods to separate independent clauses.
    teacher_tips:
      how_to_explain: 'Two independent clauses need: a period, a semicolon, or a conjunction
        (and, but, so). NOT just a comma.'
      where_to_start: Identify comma splices and run-ons in writing.
      sequencing: 'Week1: identify run-ons. Week2: fix with periods/conjunctions.
