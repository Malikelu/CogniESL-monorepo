      how_to_explain: '''Had better'' = strong advice about what''s best. ''Would
        rather'' = expressing preference. ''You had better leave'' vs. ''I''d rather
        stay.'''
      where_to_start: Distinguish meaning and use.
      sequencing: 'Week1: had better. Week2: would rather. Week3: contrast.'
      exercises:
