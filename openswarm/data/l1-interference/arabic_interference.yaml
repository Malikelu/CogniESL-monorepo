  false_friends_cognates:
    interference_patterns:
    - Arabic-English false friends cause systematic misinterpretation
    - Arabic 'actually (fii Haalih)' means 'now/in fact' not 'currently'
    - Learners may produce 'library' (Arabic maktabah = office/desk, not library)
    why_it_happens: Arabic has borrowed/calqued words that have shifted meaning from
      English or vice versa.
    teacher_tips:
      how_to_explain: 'Learn false friends: ''actually'' (in fact), ''library'' (maktabah
        = office, not library in some dialects), ''actually'' in Arabic context.'
      where_to_start: Maintain a list of common false friends.
      sequencing: 'Week1: learn 10 common false friends. Week2: practice correct usage.'
      exercises:
      - name: false friends cognates Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'false friends cognates' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: false friends cognates Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'false friends cognates'
          errors. Students identify and correct each error.
        duration: 15
      - name: false friends cognates Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'false
          friends cognates' structure.
        duration: 10
      - name: false friends cognates Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'false friends
          cognates' errors.
        duration: 15
    notes: Maktabah in Arabic can mean library (in some contexts) but also office/desk.
      Magaziin means 'shop' not 'magazine' in Arabic.
    examples:
    - 'Arabic ''magaziin'' = shop/store. Learner: I read the magaziin. (Means ''store''
      in Arabic)'
    - Arabic 'naas' = people. NOT 'nose' despite the similarity in English.
    - Arabic 'sabah al-khayr' = good morning. Learners may translate word-for-word
      incorrectly.
