        description: Students exchange writing samples and check for 'abstract noun
          formation' errors.
        duration: 15
    examples:
    - 'Wrong: informasion. Correct: inFORMAtion. Wrong: motivition. Correct: motivaTION.'
    - 'Correct: achieve → achieveMENT. develop → developMENT.'
    - 'Arabic: dawra (circle/round) — no abstract suffix needed. English: ''the process
      of education'' uses abstract form.'
