    - Learners use 'informations,' 'advices,' 'furnitures' treating mass nouns as
      countable
    - Arabic lacks the countable/uncountable distinction for many English nouns
    why_it_happens: Arabic nouns do not have the countable/uncountable binary. Pluralization
      works differently through broken plurals and sound plurals.
