        description: Students create 5 original sentences using correct English 'should
          vs would' structure.
        duration: 10
      - name: should vs would Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'should vs would'
          errors.
        duration: 15
    examples:
    - 'Correct: You should see a doctor. (advice)'
    - 'Correct: I would see a doctor if I were you. (hypothetical)'
    - 'Wrong: If I should go, I will bring food. Better: If I WENT, I would bring
