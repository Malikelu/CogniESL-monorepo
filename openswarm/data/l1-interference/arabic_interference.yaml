      - name: sentence variety Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'sentence
          variety' structure.
        duration: 10
      - name: sentence variety Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'sentence variety'
          errors.
        duration: 15
    examples:
    - 'Monotonous: ''The boy went to school. He studied math. He came home. He ate
      dinner.'''
    - 'Improved: ''The boy went to school, where he studied math. After coming home,
      he ate dinner while watching TV.'''
