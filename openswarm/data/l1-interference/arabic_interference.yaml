  abstract_noun_formation:
    interference_patterns:
    - Arabic forms abstract nouns through different morphological processes
    - Learners struggle with -tion, -ment, -ness, -ity, -ance/ence suffixes
    - Arabic verbal nouns (masdar) cover some functions of English abstract nouns
    why_it_happens: Arabic uses verb-derived nouns (masdar) where English uses Latinate
      abstract suffixation.
    teacher_tips:
      how_to_explain: 'Learn common suffixes: -tion (education), -ment (development),
        -ness (kindness), -ity (creativity), -ance (importance).'
      where_to_start: Group by suffix and practice.
      sequencing: 'Week1: -tion/-sion. Week2: -ment/-ness. Week3: -ity/-ance/-ence.'
      exercises:
      - name: abstract noun formation Contrastive Drill
