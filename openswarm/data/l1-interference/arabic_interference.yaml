    - Learners confuse 'do homework' vs. 'make a decision'
    - Arabic general-purpose verbs don't map to English do/make distinction
    why_it_happens: Arabic uses general-purpose verbs where English requires specific
      do/make. The do/make distinction is largely idiomatic in English.
    teacher_tips:
      how_to_explain: DO = tasks, work, unspecified activities. MAKE = creating, producing,
        constructing. Learn common collocations as chunks.
      where_to_start: 'Make vs. do collocations: do homework, make a decision; do
        the dishes, make dinner.'
      sequencing: 'Week1: common do collocations. Week2: common make collocations.
        Week3: practice distinguishing.'
