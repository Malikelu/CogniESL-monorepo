        description: Students create 5 original sentences using correct English 'coord
          conjunctions' structure.
        duration: 10
      - name: coord conjunctions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'coord conjunctions'
          errors.
        duration: 15
    notes: Arabic expository writing may use 'wa' multiple times in a single sentence,
      which reads as choppy in English.
    examples:
    - 'Arabic-style: ''He went to the market and he bought vegetables and he came
      home and he cooked.'' Improved: ''He went to the market, bought vegetables,
      and cooked at home.'''
