  nominal_sentence_equative:
    interference_patterns:
    - Arabic nominal sentences (al-jamal al-ismiyya) have no copula verb
    - 'Learners omit ''to be'': ''He teacher'' instead of ''He IS a teacher'''
    - Arabic predicate-fronting patterns transferred to English
    why_it_happens: 'Arabic equates subjects and predicates without a copula: ''Ahmad
      taalib'' = ''Ahmad (is a) student.'' English requires ''be'' for equative sentences.'
    teacher_tips:
      how_to_explain: 'In English, use ''am/is/are'' to link subject and description:
        ''He IS smart.'' ''She IS a doctor.'' ''They ARE students.'''
      where_to_start: Practice subject + BE + complement sentences.
      exercises:
      - name: nominal sentence equative Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'nominal sentence equative' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: nominal sentence equative Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'nominal sentence equative'
          errors. Students identify and correct each error.
        duration: 15
      - name: nominal sentence equative Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'nominal
          sentence equative' structure.
        duration: 10
      - name: nominal sentence equative Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'nominal sentence
          equative' errors.
        duration: 15
    examples:
    - 'Arabic: Ahmad jamiiliyy (Ahmad, a student). Direct: ''Ahmad student.'' English:
      ''Ahmad IS a student.'''
    - 'Wrong: ''She very smart.'' Correct: ''She IS very smart.'''
    - 'Wrong: ''They both happy.'' Correct: ''They ARE both happy.'''
