      - name: binomial expressions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'binomial
          expressions' structure.
        duration: 10
      - name: binomial expressions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'binomial expressions'
          errors.
        duration: 15
    examples:
    - 'Correct: It''s a matter of MORE OR LESS. (NOT: less or more)'
    - 'Correct: Through THICK AND THIN. (NOT: thin and thick)'
    - 'Correct: Slowly BUT SURELY. (NOT: surely but slowly in this expression)'
