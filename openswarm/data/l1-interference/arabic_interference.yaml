  apostrophe_s:
    interference_patterns:
    - Arabic does not use apostrophes for possession or contractions
    - 'Learners omit apostrophes: ''its cold'' instead of ''it''s cold'''
    - Confusion between its/it's, your/you're, their/they're
    why_it_happens: Arabic script has no apostrophe equivalent. Possession is shown
      through construct state, and contractions don't exist.
    teacher_tips:
      how_to_explain: Its = possessive (belonging to it). It's = it is or it has.
        Your = possessive. You're = you are.
      where_to_start: Learn the common confusable pairs.
      sequencing: 'Week1: its vs. it''s, your vs. you''re. Week2: their/there/they''re.
        Week3: practice in writing.'
      exercises:
      - name: apostrophe s Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
