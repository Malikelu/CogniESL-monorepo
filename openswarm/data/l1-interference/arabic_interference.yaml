  subordination_vs_coordination:
    interference_patterns:
    - Arabic over-relies on coordination ('and') where English prefers subordination
    - Excessive 'and' chains instead of subordinate clauses
    - Arabic paratactic style vs. English hypotactic expectations
    why_it_happens: Arabic discourse is largely paratactic (clauses strung with 'and').
      English academic writing expects subordination (because, although, when, which).
    teacher_tips:
      how_to_explain: 'Replace ''and'' with subordinators: When, Although, Because,
        Which. This creates more complex, academic sentences.'
      where_to_start: Identify 'and' in writing and replace with subordinators.
      sequencing: 'Week1: identify ''and'' chains. Week2: convert to subordination.
        Week3: practice in essays.'
      exercises:
      - name: subordination vs coordination Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'subordination vs coordination' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: subordination vs coordination Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'subordination vs coordination'
          errors. Students identify and correct each error.
        duration: 15
      - name: subordination vs coordination Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subordination
          vs coordination' structure.
        duration: 10
      - name: subordination vs coordination Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subordination
          vs coordination' errors.
        duration: 15
    notes: This is a major stylistic difference between Arabic and English academic
      writing.
    examples:
    - 'Chained: ''I woke up and I ate breakfast and I went to school and I studied.''
      Improved: ''After waking up and eating breakfast, I went to school to study.'''
    - 'Arabic-style paratactic: ''The government made a decision. The decision affected
      the economy.'' Better: ''The government made a decision THAT affected the economy.'''
    - 'Better: ''Although the economy improved, unemployment remained high.'' vs.
      ''The economy improved AND unemployment remained high.'''
