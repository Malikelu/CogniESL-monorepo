    - 'Learners add -an / -in / -un sounds to English words: ''the banaan-in'''
    - Overgeneralization of final nasalization to English pronunciation and spelling
    why_it_happens: Arabic marks case and indefiniteness through tanween (duum, fathatan,
      kasratan) — a suffix system with no English equivalent.
    teacher_tips:
      how_to_explain: English does NOT add vowel suffixes to mark case or indefiniteness.
        'Banana' is 'banana' — no final -an/-in/-un.
