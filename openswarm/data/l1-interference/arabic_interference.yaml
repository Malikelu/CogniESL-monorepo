  countable_uncountable_advanced:
    interference_patterns:
    - English has many nouns that are countable in Arabic but uncountable (or vice
      versa)
    - Learners use 'a furniture' or 'many news'
    - Words like 'hair,' 'paper,' 'room' have countable AND uncountable meanings
    why_it_happens: Arabic countable/uncountable boundaries differ from English. Arabic
      uses broken plurals differently.
    teacher_tips:
      how_to_explain: 'Room: countable (rooms in a house) vs. uncountable (room for
        luggage). Hair: uncountable (all your hair) vs. countable (two hairs on your
        shirt).'
      where_to_start: Learn common nouns that have dual status.
      sequencing: 'Week1: common trouble words. Week2: context-dependent usage.'
      exercises:
      - name: countable uncountable advanced Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'countable uncountable advanced' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
