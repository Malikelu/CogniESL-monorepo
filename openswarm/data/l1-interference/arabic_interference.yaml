  sentence_variety:
    interference_patterns:
    - Arabic learners produce monotonous sentence structures
    - Overuse of simple SVO sentences without variety
    - English writing expects a mix of simple, compound, complex, and compound-complex
      sentences
    why_it_happens: Arabic discourse patterns favor uniform sentence structures. English
      writing quality is judged partly by sentence variety.
    teacher_tips:
      how_to_explain: 'Mix sentence types: simple (''The cat sat.''), compound (''The
        cat sat, and the dog barked.''), complex (''When the dog barked, the cat ran
        away.''), compound-complex (''When the dog barked, the cat ran away, and the
        bird flew up.'').'
      where_to_start: Identify sentence types in model texts.
      sequencing: 'Week1: identify sentence types. Week2: practice combining sentences.
        Week3: revise own writing for variety.'
      exercises:
      - name: sentence variety Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'sentence variety' structure. Emphasize the structural difference
