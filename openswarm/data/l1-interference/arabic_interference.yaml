  conjunction_subordination_mismatch:
    interference_patterns:
    - Arabic subordinators (anna, annaha, idha) don't map cleanly to English conjunctions
    - Learners use 'because' where 'that' is needed and vice versa
    - Arabic 'inna' (verily) construction mistransferred as emphatic 'do'
    why_it_happens: Arabic complementizers and conjunctions have different syntactic
      properties than English counterparts. 'Anna' (that) can behave like a conjunction
      or complementizer differently.
    teacher_tips:
      how_to_explain: '''Because'' = reason (causal). ''That'' = complementizer (no
        meaning). ''If/when'' = condition/time. They are NOT interchangeable.'
      where_to_start: Practice distinguishing because, that, if, when, although.
      exercises:
      - name: conjunction subordination mismatch Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'conjunction subordination mismatch' structure. Emphasize the
          structural difference between Arabic and English.
        duration: 15
      - name: conjunction subordination mismatch Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'conjunction subordination
          mismatch' errors. Students identify and correct each error.
        duration: 15
      - name: conjunction subordination mismatch Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'conjunction
          subordination mismatch' structure.
        duration: 10
      - name: conjunction subordination mismatch Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'conjunction
          subordination mismatch' errors.
        duration: 15
    examples:
    - 'Arabic: qal annahu ja''a (said that he came). Learner: ''He said BECAUSE he
      came.'' Correct: ''He said THAT he came.'''
    - 'Wrong: ''I know because he is here.'' (when meaning ''that''). Correct: ''I
      know THAT he is here.'''
    - 'Arabic: idha = ''when/if.'' Learner confusion: ''When you come, I was happy.''
      Correct: ''If you come, I will be happy.'''
    frequency: 3
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Brustad, K. (2000). The syntax of spoken Arabic.
    - Alhawary, M. (2008). Tense and aspect in Arabic-English interlanguage.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  aspectual_system_divergence:
    interference_patterns:
    - Arabic perfective (fa'l-a) and imperfective (ya-fa'l-u) don't map to English
      past/present simple
    - Learners use past tense where present is needed and vice versa
    - Arabic aspect choice affects English tense selection errors
    why_it_happens: Arabic organizes verbs primarily by aspect (completed vs. incomplete)
      rather than tense. The perfective can refer to past, present, or future, causing
      tense confusion in English.
    teacher_tips:
      how_to_explain: English tenses are time-based (past/present/future). Arabic
        aspects are completion-based. Learn English tenses independently of Arabic
        patterns.
      exercises:
      - name: aspectual system divergence Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'aspectual system divergence' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: aspectual system divergence Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'aspectual system divergence'
          errors. Students identify and correct each error.
        duration: 15
      - name: aspectual system divergence Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'aspectual
          system divergence' structure.
        duration: 10
      - name: aspectual system divergence Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'aspectual system
          divergence' errors.
        duration: 15
    examples:
    - 'Arabic: dhahabtu (perfective = I went). But: ''I have gone there many times''
      (present perfect) cannot map to one Arabic form.'
    - 'Arabic: aDHhabu (imperfective = I go/I am going). Learner: ''I go yesterday.''
      Correct: ''I WENT yesterday.'''
    - 'Arabic perfective can mean past OR present: saafiqani (he met me / he meets
      me). Context determines meaning in Arabic, but English must choose tense.'
    frequency: 3
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Mitchell, T. F. (1970). Dimensions of Style in a Grammar of Educated English.
    - Brustad, K. (2000). The syntax of spoken Arabic.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  topic_comment_vs_subject_predicate:
    interference_patterns:
    - Arabic frequently uses topic-comment (theme-rheme) structure
    - 'Learners front topics as subjects: ''This problem, I don''t understand it'''
    - Arabic VSVO order transferred to English
    why_it_happens: Arabic discourse structure is heavily topic-prominent. Sentences
      often begin with the topic before the grammatical subject, unlike English subject-predicate
      requirements.
    teacher_tips:
      how_to_explain: 'English prefers: Subject + Verb + Object. ''I don''t understand
        this problem.'' NOT ''This problem, I don''t understand it'' (unless for specific
        emphasis).'
      where_to_start: Practice starting sentences with the subject, then the verb.
      exercises:
      - name: topic comment vs subject predicate Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'topic comment vs subject predicate' structure. Emphasize the
          structural difference between Arabic and English.
        duration: 15
      - name: topic comment vs subject predicate Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'topic comment vs subject
          predicate' errors. Students identify and correct each error.
        duration: 15
      - name: topic comment vs subject predicate Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'topic
          comment vs subject predicate' structure.
        duration: 10
      - name: topic comment vs subject predicate Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'topic comment
          vs subject predicate' errors.
        duration: 15
    examples:
    - 'Arabic: al-mushkila hatha, ma afhamu-ha. Literal: ''This problem, I don''t
      understand-it.'''
    - 'English SVO: ''I don''t understand this problem.'''
    - 'Wrong: ''The exam tomorrow, I will study for it.'' Correct: ''I will study
      for the exam tomorrow.'''
    frequency: 3
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 2
