    - 'Learners use single verb equivalents: ''continue'' instead of ''carry on'''
    - 'Incorrect particle placement: ''I turn it off'' becomes ''I turn off it'''
    why_it_happens: Arabic does not have a productive phrasal verb system. Verb +
      particle combinations have no structural parallel.
    teacher_tips:
