        description: Students create 5 original sentences using correct English 'cohesion
          advanced' structure.
        duration: 10
      - name: cohesion advanced Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'cohesion advanced'
          errors.
        duration: 15
    notes: This is particularly problematic in academic writing where English expects
      tightly connected discourse.
    examples:
    - 'Arabic-style: ''The man went to the store and the man bought bread and the
      man came home.'' Improved: ''The man went to the store, bought some bread, and
      came home.'''
    - 'Overuse of the same word: ''The government made a decision. The government
      then...'' Better: ''After the government''s decision, it...'''
