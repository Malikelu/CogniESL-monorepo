  msa_dialect_code_switching:
    interference_patterns:
    - Arabic diglossia causes interference when learners write in English
    - Learners mix MSA structures with dialectal forms in their English output
    - Dialectal Arabic patterns (Egyptian, Levantine, Gulf) create additional interference
      layers
    why_it_happens: Arabic diglossia means learners navigate between MSA (formal)
      and regional dialects (informal). Both systems can produce interference in English.
    teacher_tips:
      how_to_explain: Be aware of which variety of Arabic the learner speaks. Dialects
        may produce different error patterns than MSA-based instruction.
      where_to_start: Identify the learner's dialect and note dialect-specific interference
        patterns.
      exercises:
      - name: msa dialect code switching Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'msa dialect code switching' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: msa dialect code switching Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'msa dialect code switching'
          errors. Students identify and correct each error.
        duration: 15
      - name: msa dialect code switching Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'msa
          dialect code switching' structure.
        duration: 10
      - name: msa dialect code switching Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'msa dialect
          code switching' errors.
        duration: 15
    examples:
    - 'Egyptian Arabic speaker: uses ''ana''ani'' instead of standard ''dhahabtu''
      (I went), may transfer non-standard verb forms to English.'
    - 'Gulf Arabic speaker: may use ''yalla'' + verb pattern and transfer urgency
      markers.'
    - 'Levantine speaker: may confuse ''biddi'' (I want) usage patterns in English
      modal constructions.'
    frequency: 2
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 1
