  cohesion_advanced:
    interference_patterns:
    - Arabic discourse relies on implicit cohesion; learners underuse English cohesive
      devices
    - Overuse of 'and' as the primary cohesive device
    - Learners repeat nouns instead of using pronouns, synonyms, or ellipsis
    why_it_happens: Arabic discourse is largely paratactic (stringing clauses together
      with 'wa'), while English academic writing expects more sophisticated cohesive
      ties.
    teacher_tips:
      how_to_explain: 'Use varied cohesive devices: reference (he, this), substitution
        (do so), ellipsis (omitting repeated words), and lexical cohesion (synonyms).'
      where_to_start: Identify 'and' overuse in paragraphs and replace with varied
        cohesive ties.
      sequencing: 'Week1: pronoun reference. Week2: substitution and ellipsis. Week3:
        lexical cohesion.'
      exercises:
      - name: cohesion advanced Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
