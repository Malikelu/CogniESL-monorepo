  paragraph_unity_coherence:
    interference_patterns:
    - Arabic paragraph structure may not follow English unity and coherence principles
    - Paragraphs contain multiple unrelated ideas
    - Transitions between paragraphs are abrupt or missing
    why_it_happens: Arabic writing conventions allow broader paragraph scope. English
      paragraphs are expected to have ONE main idea with clear topic sentences.
    teacher_tips:
      how_to_explain: Each paragraph = one main idea stated in a topic sentence, followed
        by supporting details, ending with a concluding or transitional sentence.
      where_to_start: Practice writing paragraphs with clear topic sentences.
      sequencing: 'Week1: topic sentences. Week2: supporting details. Week3: transitions
        and concluding sentences.'
      exercises:
      - name: paragraph unity coherence Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'paragraph unity coherence' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: paragraph unity coherence Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'paragraph unity coherence'
          errors. Students identify and correct each error.
        duration: 15
      - name: paragraph unity coherence Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'paragraph
          unity coherence' structure.
        duration: 10
      - name: paragraph unity coherence Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'paragraph unity
          coherence' errors.
        duration: 15
    examples:
    - 'Weak: ''Climate change is important. My uncle works in oil. The weather has
      been unusual recently. Technology is advancing.'' (scattered)'
    - 'Strong: ''Climate change poses significant environmental challenges. Rising
      temperatures have disrupted agricultural patterns (Smith, 2023). Additionally,
      extreme weather events have increased in frequency (Jones, 2022).'','
    - The paragraph above has a clear topic sentence, supporting details with citations,
      and a logical flow.
    frequency: 3
    persistence: 3
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Hinds, J. (1987). Reader vs. writer responsibility.
    - Banshaqfer, S. (2000). Cohesive features in Arabic EFL writing.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  article_in_generic_statements:
    interference_patterns:
    - Arabic uses 'al-' for generic reference, causing overuse of 'the' in English
      generics
    - Learners say 'The dogs are loyal animals' instead of 'Dogs are loyal animals'
    - Confusion between generic 'the' (with certain nouns) and zero article for generic
      plurals
    why_it_happens: Arabic 'al-' is used for generic reference with both singular
      and plural nouns. English uses 'the' for generic singular (the tiger) but zero
      article for generic plural (tigers).
    teacher_tips:
      how_to_explain: 'Generic plural: NO article — ''Dogs are loyal.'' Generic singular:
        USE ''the'' — ''The tiger is endangered.'''
      where_to_start: Practice generic statements with singular vs. plural.
      sequencing: 'Week1: generic plurals (zero article). Week2: generic singulars
        (with the). Week3: practice in essays.'
      exercises:
      - name: article in generic statements Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'article in generic statements' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: article in generic statements Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'article in generic statements'
          errors. Students identify and correct each error.
        duration: 15
      - name: article in generic statements Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'article
          in generic statements' structure.
        duration: 10
      - name: article in generic statements Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'article in generic
          statements' errors.
        duration: 15
    notes: This is distinct from a/an (indefinite singular) and specific the (definite).
    examples:
    - 'Wrong: The dogs are loyal animals. Correct: Dogs are loyal animals.'
    - 'Correct: The tiger is endangered in Asia. (= tigers in general, singular)'
    - 'Wrong: The water is essential for life. Correct: Water is essential for life.
      (uncountable, zero article)'
    frequency: 4
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Al-Khawalda, M. & Al-Musawi, N. (2020). Transfer of Arabic article system in
      EFL writing.
    - Bataineh, O. & Bataineh, A. (2006). Contrastive study of English and Arabic
      article systems.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  relative_clause_with_preposition:
    interference_patterns:
    - Arabic doesn't use preposition-fronting in relative clauses
    - Learners struggle with 'the man to whom I spoke' or resort to 'the man who I
      spoke to'
    - Formal and informal patterns differ
    why_it_happens: Arabic relative clauses don't require preposition movement. 'Alladhi'
      serves regardless of preposition attachment.
    teacher_tips:
      how_to_explain: 'In formal English: preposition + whom/which. ''The man to WHOM
        I spoke.'' In informal: who/that + preposition at end. ''The man who I spoke
        TO.'' Never use ''who'' after a preposition.'
      where_to_start: Practice preposition placement options.
      sequencing: 'Week1: informal patterns. Week2: formal patterns. Week3: choosing
        between formal and informal.'
      exercises:
      - name: relative clause with preposition Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'relative clause with preposition' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: relative clause with preposition Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'relative clause with
          preposition' errors. Students identify and correct each error.
        duration: 15
      - name: relative clause with preposition Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'relative
          clause with preposition' structure.
        duration: 10
      - name: relative clause with preposition Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'relative clause
          with preposition' errors.
        duration: 15
    examples:
    - 'Formal: The company FOR WHICH she works is innovative.'
    - 'Informal: The company (that/which) she works FOR is innovative.'
    - 'Wrong: The man to who I spoke. Correct: The man to WHOM I spoke. (formal) OR
      The man who I spoke to. (informal)'
    frequency: 3
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Rabab'ah, G. (2002). Relative clauses in English and Standard Arabic.
    - Quirk, R. et al. (1985). A Comprehensive Grammar of the English Language.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  reported_speech_requests_commands_detail:
    interference_patterns:
    - Arabic doesn't distinguish direct from indirect request forms
    - Learners struggle with 'asked me to' vs. 'told me to' vs. 'ordered me to'
    - Intensity of requests/prompts lost in translation
    why_it_happens: Arabic uses 'qala li-' for all speech acts. English distinguishes
      ask, tell, order, advise, warn, etc.
    teacher_tips:
      how_to_explain: '''Ask someone to do'' = polite. ''Tell someone to do'' = direct.
        ''Order someone to do'' = authoritative. ''Advise someone to do'' = professional.'
      where_to_start: Practice different reporting verbs.
      sequencing: 'Week1: ask/tell. Week2: order/advise. Week3: other reporting verbs
        (warn, remind, suggest).'
      exercises:
      - name: reported speech requests commands detail Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'reported speech requests commands detail' structure. Emphasize
          the structural difference between Arabic and English.
        duration: 15
      - name: reported speech requests commands detail Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'reported speech requests
          commands detail' errors. Students identify and correct each error.
        duration: 15
      - name: reported speech requests commands detail Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'reported
          speech requests commands detail' structure.
        duration: 10
      - name: reported speech requests commands detail Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'reported speech
          requests commands detail' errors.
        duration: 15
    examples:
    - 'Direct: ''Close the door.'' Report: He ASKED/TOLD me to close the door. (polite/direct)'
    - 'Direct: ''Submit your report by Friday.'' Report: The professor ORDERED us
      to submit the report by Friday. (authority)'
    - 'Direct: ''You should see a doctor.'' Report: She ADVISED me to see a doctor.'
    frequency: 3
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 1
    sources:
    - Rabab'ah, G. (2002). Reported speech in English and Arabic.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  intensifiers_amplifiers:
    interference_patterns:
    - Arabic uses 'jiddan' (very much) for all intensification
    - English has a rich system of intensifiers with different strengths
    - Learners overuse 'very' and 'really' instead of varied intensifiers
    why_it_happens: Arabic relies on 'jiddan' as a general intensifier. English has
      many options with different registers and strengths.
    teacher_tips:
      how_to_explain: 'Strong: extremely, highly, absolutely. Medium: very, really,
        quite. Mild: fairly, rather, somewhat. Formal: considerably, remarkably, notably.'
      where_to_start: Learn intensity levels and their appropriate contexts.
      sequencing: 'Week1: learn strong/medium/mild intensifiers. Week2: practice in
        different contexts.'
      exercises:
      - name: intensifiers amplifiers Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'intensifiers amplifiers' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: intensifiers amplifiers Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'intensifiers amplifiers'
          errors. Students identify and correct each error.
        duration: 15
      - name: intensifiers amplifiers Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'intensifiers
          amplifiers' structure.
        duration: 10
      - name: intensifiers amplifiers Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'intensifiers
          amplifiers' errors.
        duration: 15
    examples:
    - 'Weak: ''The problem is very big.'' Better: ''The problem is EXTREMELY serious.''
      (formal/stronger)'
    - 'Arabic: ''jiddan sa''eed'' (very happy). Learner: ''very happy'' always. Better:
      ''delighted,'' ''ecstatic,'' ''overjoyed'' (in strong contexts)'
    - 'Formal: ''The findings were remarkably significant.'' Informal: ''The results
      were pretty good.'''
    frequency: 2
    persistence: 2
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Biber, D. (1988). Variation Across Speech and Writing.
    - Quirk, R. et al. (1985). A Comprehensive Grammar of the English Language.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  quantifiers_advanced:
    interference_patterns:
    - Arabic quantifiers like 'kathiir' (much) and 'birfaat' (a lot) don't map to
      specific English quantifiers
    - 'Learners confuse: ''few'' vs. ''a few,'' ''little'' vs. ''a little'', ''several''
      vs. ''many'''
    - Quantifier scope ambiguity differs between languages
    why_it_happens: Arabic has fewer quantifier distinctions. 'Kathir' covers 'many'
      and 'much.' Arabic doesn't distinguish 'few' (negative) from 'a few' (positive).
    teacher_tips:
      how_to_explain: '''A few'' = some (positive). ''Few'' = not enough (negative).
        ''Little'' of uncountable (negative). ''A little'' = some (positive).'
      where_to_start: Learn the positive/negative pairs.
      sequencing: 'Week1: few/a few. Week2: little/a little. Week3: several/many/various.'
      exercises:
      - name: quantifiers advanced Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'quantifiers advanced' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: quantifiers advanced Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'quantifiers advanced'
          errors. Students identify and correct each error.
        duration: 15
      - name: quantifiers advanced Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'quantifiers
          advanced' structure.
        duration: 10
      - name: quantifiers advanced Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'quantifiers
          advanced' errors.
        duration: 15
    examples:
    - 'Correct: A few students passed. (some did — positive). Few students passed.
      (not enough — negative)'
    - 'Correct: I have a little time. (some time). I have little time. (not enough
      time)'
    - 'Arabic: kathiir min al-ghulam (much of the boy). Transfer: ''Many of the boy.''
      Correct: ''Many of the boys.'''
    frequency: 3
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Alhawary, M. (2008). Quantifier scope and transfer in Arabic-English.
    - Eckman, F. (2004). From equivalence to scope.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  modal_continuous_future:
    interference_patterns:
    - 'Arabic lacks modal + continuous forms: ''must be doing,'' ''might be sleeping'''
    - Learners produce modal + simple form instead of modal + be + -ing
    - English uses 'modal + be + -ing' for current speculation
    why_it_happens: Arabic uses simple verb forms after modal expressions. The English
      modal + be + -ing for current speculation has no Arabic structural equivalent.
    teacher_tips:
      how_to_explain: '''Must be + -ing'' = strong guess about right now: ''He must
        be sleeping right now.'' ''Might be + -ing'' = weak guess.'
      where_to_start: Practice speculating about current activities.
      sequencing: 'Week1: must be + -ing. Week2: might/could be + -ing. Week3: practice.'
      exercises:
      - name: modal continuous future Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'modal continuous future' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: modal continuous future Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'modal continuous future'
          errors. Students identify and correct each error.
        duration: 15
      - name: modal continuous future Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'modal
          continuous future' structure.
        duration: 10
      - name: modal continuous future Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'modal continuous
          future' errors.
        duration: 15
    examples:
    - 'Correct: It must be raining. I can hear the thunder.'
    - 'Wrong: He must sleep now. Correct: He MUST BE SLEEPING now. (present speculation)'
    - 'Correct: She might be studying. We can see the light in her room.'
    frequency: 2
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Coates, J. (1983). The semantics of the modal auxiliaries.
    - Palmer, F. R. (2001). Mood and Modality.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  used_to_negation_interrogation:
    interference_patterns:
    - Arabic learners struggle with questions and negatives using 'used to'
    - Producing 'Did you used to...?' instead of 'Did you use to...?'
    - Arabic 'kana' negation doesn't map to English 'used to' negative/question forms
    why_it_happens: Arabic 'kana' has a simple past form. English 'used to' creates
      special question/negative forms that don't follow normal rules.
    teacher_tips:
      how_to_explain: '''Used to'' questions: ''Did you USE TO...?'' (NOT ''Did you
        used to?''). Negative: ''I DIDN''T USE TO...'' (NOT ''I didn''t used to.'')'
      where_to_start: Practice questions and negatives with 'use to.'
      sequencing: 'Week1: affirmative. Week2: negative. Week3: questions.'
      exercises:
      - name: used to negation interrogation Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'used to negation interrogation' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: used to negation interrogation Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'used to negation interrogation'
          errors. Students identify and correct each error.
        duration: 15
      - name: used to negation interrogation Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'used
          to negation interrogation' structure.
        duration: 10
      - name: used to negation interrogation Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'used to negation
          interrogation' errors.
        duration: 15
    examples:
    - 'Wrong: Did you used to live in Cairo? Correct: Did you USE TO live in Cairo?'
    - 'Wrong: I didn''t used to like coffee. Correct: I DIDN''T USE TO like coffee.'
    - 'Arabic: ma kuntush. Direct: ''I.was.not I.used.'' English: ''I didn''t use
      to.'''
    frequency: 2
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Alhawary, M. (2008). Tense and aspect in Arabic-English interlanguage.
    - Collins, L. (2015). Arabic grammar in practice.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  subjunctive_negative:
    interference_patterns:
    - Arabic learners avoid negative subjunctive forms
    - 'Incorrect: ''I suggest that he doesn''t go'' instead of ''I suggest that he
      not go'''
    - Mandative subjunctive with 'not' placement is confusing
    why_it_happens: Arabic negation precedes the verb. English mandative subjunctive
      uses 'not' before the bare infinitive, which has no Arabic pattern.
    teacher_tips:
      how_to_explain: 'After suggest/recommend/demand: ''I suggest that he NOT go.''
        (NOT: ''doesn''t go''). The verb is bare form.'
      where_to_start: Practice subjunctive with 'not.'
      sequencing: 'Week1: affirmative subjunctive. Week2: negative subjunctive. Week3:
        all triggers.'
      exercises:
      - name: subjunctive negative Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'subjunctive negative' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: subjunctive negative Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'subjunctive negative'
          errors. Students identify and correct each error.
        duration: 15
      - name: subjunctive negative Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subjunctive
          negative' structure.
        duration: 10
      - name: subjunctive negative Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subjunctive
          negative' errors.
        duration: 15
    examples:
    - 'Wrong: I recommend that he does not attend. Correct: I recommend that he NOT
      attend.'
    - 'Correct: The teacher insisted that the students NOT use dictionaries during
      the exam.'
    - 'Arabic: ''ana anatamim bi-al-rajul laysa yadhhab.'' Direct: ''I suggest that
      the man not goes.'' English: ''I suggest that the man NOT go.'''
    frequency: 3
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - James, C. (1998). Errors in Language Learning and Use.
    - Kharma, N. (1983). Syntactic relations in Arabic and English.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  ellipsis_in_english:
    interference_patterns:
    - Arabic allows extensive ellipsis due to verb morphology encoding person/number
    - Learners omit subjects/verbs where English requires explicit expression
    - Gapping and sluicing patterns differ between Arabic and English
    why_it_happens: Arabic verb morphology encodes person and number, allowing more
      ellipsis. English requires more explicit subjects and verbs.
    teacher_tips:
      how_to_explain: 'English needs explicit subjects even in second clauses: ''I
        went to school, and SHE went to the market.'' (Arabic might omit ''she.'')'
      where_to_start: Check all sentences for missing required elements.
      sequencing: 'Week1: identify ellipsis. Week2: add required elements.'
      exercises:
      - name: ellipsis in english Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'ellipsis in english' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: ellipsis in english Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'ellipsis in english'
          errors. Students identify and correct each error.
        duration: 15
      - name: ellipsis in english Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'ellipsis
          in english' structure.
        duration: 10
      - name: ellipsis in english Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'ellipsis in
          english' errors.
        duration: 15
    notes: Arabic gapping patterns allow omission of repeated verbs in coordinated
      clauses more freely than English.
    examples:
    - 'Arabic: dhahabtu ila al-madrasa wa saif ila al-suuq. Lit: ''I.went to school
      and Saif to market.'' English: ''I went to school and Saif went to the market.''
      (verb needed)'
    - 'Correct: ''She can swim and I can''t (swim).'' Auxiliary ellipsis IS allowed
      when pattern is shared.'
    - 'Wrong: ''I went to the store and bought milk.'' (OK) vs. ''She went to the
      store and I bought milk.'' (unclear subject in second clause)'
    frequency: 2
    persistence: 3
    communicative_impact: 1
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Hinds, J. (1987). Reader vs. writer responsibility.
    - Bresnan, J. (2001). Lexical-Functional Syntax.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  collocation_awareness:
    interference_patterns:
    - Arabic learners often create non-standard collocations
    - 'Overuse of ''make'' where ''do'' is expected: ''make a mistake'' correct but
      ''make homework'' wrong'
    - English collocations are often unpredictable and must be learned as chunks
    why_it_happens: Arabic verb-noun pairings don't match English collocations. L1
      transfer creates false collocations.
    teacher_tips:
      how_to_explain: Use corpora-based lists to learn common collocations. Read extensively
        to absorb natural patterns.
      where_to_start: Learn 10 adjective-noun and 10 verb-noun collocations per week.
      sequencing: 'Week1: common adjective+noun pairs. Week2: verb+noun pairs. Week3:
        verb+preposition pairs.'
      exercises:
      - name: collocation awareness Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'collocation awareness' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: collocation awareness Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'collocation awareness'
          errors. Students identify and correct each error.
        duration: 15
      - name: collocation awareness Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'collocation
          awareness' structure.
        duration: 10
      - name: collocation awareness Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'collocation
          awareness' errors.
        duration: 15
    notes: This complements the advanced collocations entry but focuses on awareness
      and tools rather than specific errors.
    examples:
    - 'Correct: ''Strong tea'' (NOT ''powerful tea''). Correct: ''Do exercise'' (NOT
      ''make exercise'').'
    - 'Correct: ''Heavy rain'' (NOT ''strong rain''). Correct: ''Fast food'' (NOT
      ''quick food'').'
    - 'Tools: use online collocation dictionaries (e.g., Ozdic.com, JustTheWord.com).'
    frequency: 4
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Nesselhauf, N. (2005). Collocations in a Learner Corpus.
    - Alhawary, M. (2008). Collocational knowledge in L2 English.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  self_monitoring_strategies:
    interference_patterns:
    - Arabic learners benefit from systematic self-monitoring but lack strategies
    - Without explicit monitoring, L1 interference fossilizes
    - Targeted feedback on specific error types is more effective than general correction
    why_it_happens: Prolonged L1 interference creates fossilized errors. Arabic speakers
      at all proficiency levels exhibit the same error patterns without targeted intervention.
    teacher_tips:
      how_to_explain: Create a personal error log. Focus on 2-3 error types per writing
        assignment. Use grammar checkers AND human feedback.
      where_to_start: Identify personal top 3 error patterns. Track them in writing.
      sequencing: 'Week1: identify personal error patterns. Week2: create monitoring
        checklist. Week3: apply during writing.'
      exercises:
      - name: self monitoring strategies Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'self monitoring strategies' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: self monitoring strategies Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'self monitoring strategies'
          errors. Students identify and correct each error.
        duration: 15
      - name: self monitoring strategies Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'self
          monitoring strategies' structure.
        duration: 10
      - name: self monitoring strategies Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'self monitoring
          strategies' errors.
        duration: 15
    notes: Research shows that targeted attention to specific L1-influenced errors
