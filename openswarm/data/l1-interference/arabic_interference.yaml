          comparison' structure.
        duration: 10
      - name: punctuation comparison Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'punctuation
          comparison' errors.
        duration: 15
    notes: Reversed punctuation is a strong signal of L1 interference in formal writing.
    examples:
    - 'Arabic: ما اسمك؟ (reversed question mark). English: What is your name?'
    - 'Arabic: والله، هذا صعب (Arabic comma). English: Wallah, this is hard. (English
      comma: ,)'
