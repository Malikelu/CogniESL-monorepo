  relative_clauses:
    interference_patterns:
    - Arabic relative pronoun 'alladhi' is invariable (no who/which/that distinction)
    - 'Learners omit relative pronouns: ''The man I saw is here'' — confused about
      when to omit'
    - 'Arabic resumptive pronouns in relative clauses transferred: ''The man who I
      saw him'''
    why_it_happens: Arabic uses a single invariable relative pronoun 'alladhi' regardless
      of antecedent type or grammatical role.
    teacher_tips:
      how_to_explain: WHO for people. WHICH for things. THAT for both (defining).
        WHERE for places. WHEN for time. Omit pronoun only when it is the object.
      where_to_start: Identify the role of the relative pronoun (subject/object).
      sequencing: 'Week1: defining relative clauses. Week2: non-defining. Week3: preposition
        + which/whom.'
