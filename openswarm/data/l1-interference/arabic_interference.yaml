  punctuation_comparison:
    interference_patterns:
    - Arabic punctuation system differs significantly from English
    - Arabic question mark opens from right (؟) vs English (?), comma reverses (،)
    - Quotation marks, apostrophes, and capitalization rules differ
    why_it_happens: Arabic punctuation developed independently and is written right-to-left.
    teacher_tips:
      how_to_explain: 'English: , . ? ! '' " ( ) [ ] { }. Practice typing each one
        correctly.'
      where_to_start: Spot-check writing for correct punctuation direction and type.
      sequencing: 'Week1: common punctuation. Week2: quotation marks and apostrophes.
        Week3: colons and semicolons.'
      exercises:
      - name: punctuation comparison Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'punctuation comparison' structure. Emphasize the structural
