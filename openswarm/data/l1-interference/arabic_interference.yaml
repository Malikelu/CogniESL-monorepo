    - Arabic '3an' (about/on) used for English 'on,' 'about,' 'of,' and 'for'
    - Phrasal verb particles (up, off, out) cause confusion as Arabic lacks separable
      verbs
    why_it_happens: Arabic has fewer prepositions than English. Individual prepositions
      cover broader semantic ranges. 'Fi' translates to 'in,' 'on,' 'at,' and even
      'by.'
