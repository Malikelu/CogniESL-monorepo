schema_version: '3.0'
language: Arabic
l1: ar
l2: en
total_grammar_points: 240
grammar_points:
  a_an_the:
    interference_patterns:
    - Arabic has no indefinite article; learners omit articles or overgeneralize 'the'
      (al-)
    - Arabic definite article 'al-' attaches as a prefix and does not distinguish
      a/an/the
    - Learners say 'I went to the school' for general meaning instead of 'I went to
      school'
    why_it_happens: Arabic has no articles like English. Al- is a definite prefix,
      not equivalent to 'the' in all contexts. Indefiniteness is unmarked in Arabic.
    teacher_tips:
      how_to_explain: Use 'the' only when both speaker and listener know which specific
        thing. Use 'a/an' for first mention. Use zero article for general categories.
      where_to_start: Learn when to use the versus a versus zero article.
      sequencing: 'Week1: the for specific. Week2: a/an for new. Week3: zero article
        for general.'
      exercises:
      - name: 'Article Audit: School vs. the School'
        type: error-correction
        description: 'Students receive 15 sentences where Arabic-style article use
          appears. They must identify whether the article is correct, incorrect, or
          missing, then correct errors. Example: "I go to the school every day" (general)
          → "I go to school every day." Targets the al- overgeneralization pattern
          documented by Bataineh & Bataineh (2006).'
        duration: 20
        target_pattern: Omission/overgeneralization of the for generic reference
      - name: First Mention, Second Mention
        type: fill-in-the-blank
        description: A short story with 20 blanks where students must choose a/an,
          the, or zero article. The narrative is designed so first mentions require
          a/an and subsequent mentions require the. Based on the definiteness transfer
          patterns described by Al-Khawalda & Al-Musawi (2020).
        duration: 15
        target_pattern: a/an for first mention; the for subsequent mention
      - name: Zero Article Challenge
        type: sentence-rewrite
        description: 'Students rewrite 10 sentences that overuse the with general
          nouns (languages, meals, institutions, transport). Example: "The breakfast
          is important" → "Breakfast is important." Addresses the core Arabic-English
          contrast where indefiniteness is unmarked in Arabic (Al-Seghayer, 2014).'
        duration: 15
        target_pattern: Zero article with general categories
      - name: Al- Mapping Drill
        type: contrastive-analysis
        description: Students translate 10 Arabic sentences containing al- into English,
          then compare their output with correct English versions. Focus on cases
          where al- does NOT map to the (e.g., generic nouns, proper nouns). Directly
          addresses the prefix-transfer error documented by Saad (2014).
        duration: 25
        target_pattern: Arabic al- overgeneralized to English the
    notes: Fundamental and persistent interference; affects nearly all noun phrases.
    examples:
    - 'Wrong: I went to the school (meaning school in general). Correct: I went to
      school.'
    - 'Wrong: She is teacher. Correct: She is a teacher.'
    - 'Wrong: He bought the car (first mention). Correct: He bought a car.'
    frequency: 5
    persistence: 5
    communicative_impact: 4
    source_type: peer-reviewed
    source_count: 4
    sources:
    - Al-Khawalda, M. & Al-Musawi, N. (2020). Transfer of Arabic article system in
      EFL writing.
    - Bataineh, O. & Bataineh, A. (2006). A contrastive study of English and Arabic
      article systems.
    - Al-Seghayer, K. (2014). Article acquisition by Arabic-speaking learners of English.
    - 'Saad, S. (2014). The Arabic article al and English the: A contrastive analysis.'
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  a_lot_of:
    interference_patterns:
    - Arabic uses 'kathir' for both countable/uncountable without distinction
    - Learners default to 'a lot of' as catch-all quantifier instead of many/much/few/little
    - Overuse of 'a lot of' in formal academic writing
    why_it_happens: Arabic quantifiers do not distinguish countable from uncountable
      nouns the way English many/much/few/little do.
    teacher_tips:
      how_to_explain: A lot of works for both, but many+countable, much+uncountable
        is more precise.
      where_to_start: Practice a lot of/many/much with correct nouns.
      sequencing: 'Week1: a lot of/many/much basics. Week2: few/little/some/any.'
      exercises:
      - name: a lot of Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'a lot of' structure. Emphasize the structural difference between
          Arabic and English.
        duration: 15
      - name: a lot of Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'a lot of' errors. Students
          identify and correct each error.
        duration: 15
      - name: a lot of Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'a
          lot of' structure.
        duration: 10
      - name: a lot of Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'a lot of' errors.
        duration: 15
    examples:
    - 'Wrong: There are a lot of childs. Correct: There are many children.'
    - 'Wrong: I have a lot of homework (acceptable but imprecise). Correct: I have
      a great deal of homework.'
    - 'Wrong: She has a lot of patience (acceptable). Awkward: a lot of information
      could be: He has extensive knowledge.'
    frequency: 4
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 3
    sources:
    - Alhawary, M. (2008). Arabic-English transfer in quantifier use.
    - Eckman, F. (2004). From equivalence to scope.
    - Gass, S. & Selinker, L. (2008). Second Language Acquisition.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  absolute_constructions:
    interference_patterns:
    - Arabic allows absolute object constructions that English does not
    - Learners write 'The weather being hot, we stayed inside' instead of simpler
      alternatives
    - Overuse of absolute participial constructions where English prefers subordinate
      clauses
    why_it_happens: Arabic permits absolute object (indefinite accusative) constructions
      freely. English absolute participial constructions are more restricted.
    teacher_tips:
      how_to_explain: 'Avoid complex absolutes. Use regular sentences: ''Because it
        was hot, we stayed inside.'''
      where_to_start: Identify absolute constructions and rewrite as subordinate clauses.
      sequencing: 'Week1: identify absolutes. Week2: convert to clauses.'
      exercises:
      - name: absolute constructions Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'absolute constructions' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: absolute constructions Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'absolute constructions'
          errors. Students identify and correct each error.
        duration: 15
      - name: absolute constructions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'absolute
          constructions' structure.
        duration: 10
      - name: absolute constructions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'absolute constructions'
          errors.
        duration: 15
    examples:
    - 'Arabic-style absolute: ''The work having been done, we left.'' Natural English:
      ''After the work was done, we left.'''
    - '''The door being open, the cat escaped.'' Better: ''Because the door was open,
      the cat escaped.'''
    frequency: 3
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Rabab'ah, G. (2002). Relative clauses in English and Standard Arabic.
    - Al-Saidat, E. (2010). Absolute participial constructions in English and Arabic.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  absolute_constructions_advanced:
    interference_patterns:
    - Complex Arabic absolute phrases cause unnatural English
    - Learners replace concise English absolutes with longer subordinate clauses
    - Arabic genitive absolute constructions transfer incorrectly into English nominative
      absolutes
    why_it_happens: Arabic has more flexible absolute constructions including genitive
      absolutes not paralleled in English.
    teacher_tips:
      how_to_explain: 'English prefers subordinate clauses for complex absolutes:
        ''After the meeting ended, we left.'''
      where_to_start: Learn simple English absolutes (Weather permitting...), avoid
        complex forms.
      sequencing: 'Week1: simple absolutes. Week2: complex absolutes vs. subordinate
        clauses.'
      exercises:
      - name: absolute constructions advanced Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'absolute constructions advanced' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: absolute constructions advanced Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'absolute constructions
          advanced' errors. Students identify and correct each error.
        duration: 15
      - name: absolute constructions advanced Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'absolute
          constructions advanced' structure.
        duration: 10
      - name: absolute constructions advanced Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'absolute constructions
          advanced' errors.
        duration: 15
    examples:
    - 'Correct: Weather permitting, we will go. Learner error: ''Because weather is
      permitting, we will go.'''
    - '''The test finished, we began to study.'' Learner error: ''After the test having
      been finished, we began to study.'''
    frequency: 2
    persistence: 3
    communicative_impact: 1
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Rabab'ah, G. (2003). A contrastive study of English and Arabic rhetoric.
    - Obeidat, H. (1999). Arabic rhetoric and contrastive analysis.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  adjectives_without_nouns:
    interference_patterns:
    - Arabic allows standalone adjectives as nouns (al-tayyib = the good one)
    - 'Learners omit the head noun: ''The beautiful'' instead of ''The beautiful house'''
    - Arabic participial adjectives used without an English equivalent noun
    why_it_happens: Arabic grammar permits adjectival nouns where English requires
      an explicit head noun.
    teacher_tips:
      how_to_explain: 'Always pair adjectives with nouns in English: ''The beautiful
        HOUSE.'''
      where_to_start: Practice adjective+noun pairs systematically.
      sequencing: 'Week1: basic pairs. Week2: extended practice with abstract adjectives.'
      exercises:
      - name: adjectives without nouns Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'adjectives without nouns' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: adjectives without nouns Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'adjectives without nouns'
          errors. Students identify and correct each error.
        duration: 15
      - name: adjectives without nouns Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'adjectives
          without nouns' structure.
        duration: 10
      - name: adjectives without nouns Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'adjectives without
          nouns' errors.
        duration: 15
    examples:
    - 'Wrong: The beautiful. Correct: The beautiful painting.'
    - 'Arabic: rajul taabiib. Learner: ''A following.'' Correct: ''A follower.'''
    - 'Wrong: al-mashhuur (the famous). Learner: ''The famous.'' Correct: ''The famous
      author.'''
    frequency: 3
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Eckman, F. (1977). Markedness and the contrastive analysis hypothesis.
    - Al-Seghayer, K. (2014). Article acquisition and the role of the NbarAgr node
      in Arabic-English interlanguage.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  advanced_tense_usage:
    interference_patterns:
    - Arabic has only 3 tenses (past/marked, present/unmarked, imperative) vs 12+
      English tenses
    - Learners confuse perfect and perfective aspects in complex time references
    - Incorrect use of progressive aspect with stative verbs in past perfect
    why_it_happens: Arabic has a fundamentally simpler tense-aspect system. The Arabic
      past tense (fa'ila) and present tense (yaf'ilu) do not map one-to-one onto English's
      12 tense-aspect combinations.
    teacher_tips:
      how_to_explain: 'Map Arabic tenses: past (fa''ila)=simple past, present (yaf''ilu)=present
        simple/continuous.'
      where_to_start: Use timeline diagrams to map complex English tenses.
      sequencing: 'Week1: past tenses. Week2: present tenses. Week3: future and perfect.'
      exercises:
      - name: advanced tense usage Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'advanced tense usage' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: advanced tense usage Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'advanced tense usage'
          errors. Students identify and correct each error.
        duration: 15
      - name: advanced tense usage Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'advanced
          tense usage' structure.
        duration: 10
      - name: advanced tense usage Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'advanced tense
          usage' errors.
        duration: 15
    examples:
    - 'Wrong: By 2020, he teaches there for five years. Correct: By 2020, he had been
      teaching there for five years.'
    - 'Wrong: I had been knowing the answer. Correct: I had known the answer.'
    - 'Wrong: She is knowing him since 2010. Correct: She has known him since 2010.'
    frequency: 4
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Alhawary, M. (2008). Tense and aspect in Arabic-English interlanguage.
    - 'Gass, S. & Selinker, L. (2008). Second Language Acquisition: An Introductory
      Course.'
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  adverb_placement:
    interference_patterns:
    - Arabic VSO word order causes adverbs to precede the verb
    - Frequency adverbs (always, usually) placed at sentence-initial or post-object
      positions
    - Manner adverbs placed before the main verb following Arabic patterns
    why_it_happens: In classical Arabic VSO, adverbs naturally precede the verb. Even
      in modern SVO Arabic dialects, adverb placement differs from English mid-position
      rules.
    teacher_tips:
      how_to_explain: 'Frequency adverbs go before the MAIN VERB but after auxiliaries:
        ''I always go.'' ''I have always liked.'' ''She is always late.'''
      where_to_start: Simple present with always/usually/often, then with auxiliaries.
      sequencing: 'Week1: simple verbs. Week2: with auxiliaries. Week3: different
        adverb types. Week4: self-monitoring.'
      exercises:
      - name: adverb placement Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'adverb placement' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: adverb placement Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'adverb placement' errors.
          Students identify and correct each error.
        duration: 15
      - name: adverb placement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'adverb
          placement' structure.
        duration: 10
      - name: adverb placement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'adverb placement'
          errors.
        duration: 15
    notes: In modern spoken Arabic (especially Egyptian and Gulf dialects), SVO order
      is common but adverb placement still differs from English.
    examples:
    - 'Wrong: Always I go to school. Correct: I always go to school.'
    - 'Wrong: I go always to school. Correct: I always go to school.'
    - 'Wrong: Quickly she ran to the door. Correct: She quickly ran to the door.'
    - 'Wrong: He always is late. Correct: He is always late.'
    frequency: 4
    persistence: 4
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 3
    sources:
    - 'Al-Saidat, E. (2012). Adverb placement in Arabic and English: A comparative
      study.'
    - 'Brustad, K. (2000). The syntax of spoken Arabic: A comparative study.'
    - Ryding, K. (2005). A Reference Grammar of Modern Standard Arabic.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  all_most:
    interference_patterns:
    - Arabic 'akthar' covers meanings of both 'most' and 'almost' causing confusion
    - Arabic 'jam' (all) used more broadly than English 'all'
    - Learners produce 'Most all students passed' or confuse 'all' with 'most'
    why_it_happens: Arabic uses approximate quantifiers differently. 'Akthar' means
      both 'most' and 'almost' depending on context.
    teacher_tips:
      how_to_explain: ALL = 100%. MOST = more than half but not all. ALMOST = nearly
        all but not quite.
      where_to_start: Practice sentences with all vs most vs almost vs some.
      sequencing: 'Week1: all vs most. Week2: almost vs most. Week3: quantifier range.'
      exercises:
      - name: all most Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'all most' structure. Emphasize the structural difference between
          Arabic and English.
        duration: 15
      - name: all most Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'all most' errors. Students
          identify and correct each error.
        duration: 15
      - name: all most Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'all
          most' structure.
        duration: 10
      - name: all most Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'all most' errors.
        duration: 15
    examples:
    - 'Wrong: All students passed (meaning most). Correct: Most students passed.'
    - 'Wrong: Almost all the cake was eaten. (Learner confused: ''Most the cake.'')'
    - 'Wrong: All people agree (=most people). Correct: Most people agree.'
    frequency: 3
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Alhawary, M. (2008). Quantifier scope and transfer in Arabic-English.
    - Eckman, F. (2004). Universals and equivalence in second language acquisition.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  alternatives_to_if:
    interference_patterns:
    - Arabic conditional particles (idh/laakin law) do not map to English if/unless/provided
    - 'Overuse of ''if'' where English offers alternatives: unless, provided that,
      as long as'
    - Learners produce 'if not' instead of 'unless' creating wordy constructions
    why_it_happens: Arabic uses different particles for hypothetical conditions (idh
      = if, laakin law = but if) that do not correspond to the full range of English
      conditional connectors.
    teacher_tips:
      how_to_explain: Unless = if not. No will after unless/if in conditionals. Provided
        that = on the condition that.
      where_to_start: Learn if/unless/provided that patterns.
      sequencing: 'Week1: if/unless. Week2: provided that/as long as. Week3: even
        if/in case.'
      exercises:
      - name: alternatives to if Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'alternatives to if' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: alternatives to if Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'alternatives to if' errors.
          Students identify and correct each error.
        duration: 15
      - name: alternatives to if Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'alternatives
          to if' structure.
        duration: 10
      - name: alternatives to if Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'alternatives
          to if' errors.
        duration: 15
    examples:
    - 'Wrong: Unless I will go. Correct: Unless I go.'
    - 'Wrong: If you don''t study, you won''t pass. Better: Unless you study, you
      won''t pass.'
    - 'Wrong: Providing that it will rain, we stay. Correct: Provided that it rains,
      we will stay.'
    frequency: 3
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Rabab'ah, G. (2002). Conditionals in English and Arabic.
    - Al-Saidat, E. (2010). Subordinating conjunctions in EFL writing of Arabic speakers.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  although:
    interference_patterns:
    - Arabic uses 'wa in' or 'wa lakin' for concession causing structural mismatch
    - Learners place 'although' incorrectly in sentence position
    - Failure to use reduced adverbial clauses after 'although'
    why_it_happens: Arabic concessive conjunctions ('wa inna = although') have different
      syntactic properties. Arabic allows different clause orders.
    teacher_tips:
      how_to_explain: Although = despite the fact that. It must begin a subordinate
        clause before the main clause.
      where_to_start: Practice although + clause. NOT clause + although as connector.
      sequencing: 'Week1: although + clause. Week2: although vs. but. Week3: although
        vs. despite.'
      exercises:
      - name: although Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'although' structure. Emphasize the structural difference between
          Arabic and English.
        duration: 15
      - name: although Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'although' errors. Students
          identify and correct each error.
        duration: 15
      - name: although Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'although'
          structure.
        duration: 10
      - name: although Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'although' errors.
        duration: 15
    examples:
    - 'Wrong: He went to school although it was raining. But he was late. Correct:
      Although it was raining, he went to school, but he was late.'
    - 'Wrong: Although he is tired, but he works. Correct: Although he is tired, he
      works.'
    - 'Correct: Although the economy improved, unemployment remained high.'
    frequency: 4
    persistence: 3
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 2
    sources:
    - 'Rabab''ah, G. (2003). Contrastive rhetoric: Arabic and English writing.'
    - Hazzaa, H. (2016). Transfer of concessive markers in EFL writing.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  and_but_or_so:
    interference_patterns:
    - Arabic coordinating conjunctions 'wa' (and) and 'lakin' (but) overused
    - 'Learners stack connectors: ''and but'' or use ''so'' where ''therefore'' needed'
    - Arabic allows multiple conjunctions in one sentence unlike standard English
    why_it_happens: Arabic discourse relies heavily on explicit connectors. 'Wa' (and)
      is used far more frequently than 'and' in English.
    teacher_tips:
      how_to_explain: 'AND = addition. BUT = contrast. SO = result. Do not stack:
        not ''and but''.'
      where_to_start: Practice each conjunction separately before combining.
      sequencing: 'Week1: and/but. Week2: or/so. Week3: transitional alternatives
        (however, therefore, moreover).'
      exercises:
      - name: and but or so Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'and but or so' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: and but or so Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'and but or so' errors.
          Students identify and correct each error.
        duration: 15
      - name: and but or so Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'and
          but or so' structure.
        duration: 10
      - name: and but or so Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'and but or so'
          errors.
        duration: 15
    notes: Arabic discourse is heavily conjunctive. English favors more implicit connections
      in academic writing.
    examples:
    - 'Wrong: He was tired and but kept working. Correct: He was tired, but he kept
      working.'
    - 'Wrong: She studied hard so she passed. Correct but imprecise: better use ''therefore''
      in formal writing.'
    - 'Wrong: I like apples and oranges and bananas so I bought them all. Correct:
      I like apples, oranges, and bananas, so I bought them all.'
    frequency: 4
    persistence: 4
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Al-Khawalda, M. (2020). Conjunctive cohesion in Arabic-English writing.
    - Banshaqfer, S. (2000). Cohesive features in the writing of Arabic EFL learners.
    flagged: false
    tier: 2
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  another_other_others:
    interference_patterns:
    - Arabic does not distinguish singular/plural 'other' the way English does
    - Confusion between 'another' (one more), 'other' (+plural noun), and 'others'
      (standalone pronoun)
    - Learners say 'Give me other one' instead of 'Give me another one'
    why_it_happens: Arabic uses 'akhar' for all forms of other/another without the
      singular/plural and determiner/pronoun distinctions English requires.
    teacher_tips:
      how_to_explain: ANOTHER = one more (singular). OTHER + plural noun. OTHERS =
        other people/things alone.
      where_to_start: Learn another vs other vs others with clear substitution drills.
      sequencing: 'Week1: another. Week2: other + noun. Week3: others.'
      exercises:
      - name: another other others Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'another other others' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
