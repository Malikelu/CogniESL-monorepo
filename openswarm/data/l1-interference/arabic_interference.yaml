  register_formal_informal:
    interference_patterns:
    - Arabic diglossia between MSA and dialect doesn't map to English formal/informal
      register
    - Learners use overly formal language in casual contexts or vice versa
    - Arabic doesn't have the same continuum of formality markers as English
    why_it_happens: Arabic has diglossia (MSA for formal, dialect for informal). English
      register is more continuous and context-dependent rather than language-variety
      based.
    teacher_tips:
      how_to_explain: Register in English varies by context, not by language variety.
        'I wanna go' (casual) vs. 'I would like to go' (formal).
      where_to_start: 'Identify register markers: contractions, phrasal verbs vs.
        Latinate words, hedging.'
      sequencing: 'Week1: identify casual vs. formal vocabulary. Week2: practice switching
        register. Week3: appropriate register for different writing types.'
      exercises:
      - name: register formal informal Contrastive Drill
