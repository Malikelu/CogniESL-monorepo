  idiom_usage:
    interference_patterns:
    - Arabic idioms do not correspond to English idioms word-for-word
    - 'Learners translate Arabic idioms literally: ''he hit the iron while it was
      hot'' for ''strike while the iron is hot'''
    - English idioms are opaque and cannot be understood from individual word meanings
    why_it_happens: Arabic and English have entirely different idiomatic expressions.
      Literal translation produces nonsense.
    teacher_tips:
      how_to_explain: English idioms ('break a leg,' 'piece of cake,' 'cost an arm
        and a leg') must be memorized as whole units.
      where_to_start: Learn 5 common English idioms. Use them in context.
      sequencing: 'Week1: learn 5 idioms. Week2: practice using them. Week3: learn
        5 more.'
      exercises:
      - name: idiom usage Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'idiom usage' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: idiom usage Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'idiom usage' errors.
          Students identify and correct each error.
        duration: 15
      - name: idiom usage Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'idiom
          usage' structure.
        duration: 10
      - name: idiom usage Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'idiom usage'
          errors.
        duration: 15
    notes: Arabic learners often resist idioms as illogical. Encourage learning them
      as fixed phrases.
    examples:
    - 'Arabic: fiis'' al-umr (break/seal of life) = ''at the end of one''s life.''
      NOT ''seal of life'' in English.'
    - 'English: ''It''s RAINING CATS AND DOGS.'' NOT ''It''s raining animals.'''
    - 'English: ''Break a leg!'' means ''Good luck!'' NOT literal injury.'
