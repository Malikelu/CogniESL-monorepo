        ''Turn off the light'' or ''Turn the light off.'' Inseparable: ''Look after
        children.'''
      where_to_start: 'Learn high-frequency phrasal verbs: look up, turn on/off, give
        up, put on.'
      sequencing: 'Week1: common phrasal verbs. Week2: separable vs. inseparable.
        Week3: formal vs. informal register.'
