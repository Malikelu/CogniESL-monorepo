  temporal_subordinate_clauses:
    interference_patterns:
    - Arabic uses 'indama' and 'hina' broadly without distinguishing when/while/as
    - 'Learners use ''when'' for all temporal clauses: ''When eating, he...'' instead
      of ''While eating...'''
    - Arabic doesn't distinguish simultaneous vs. sequential temporal clauses structurally
    why_it_happens: Arabic has limited temporal subordinators. 'Indama' covers both
      'when' (point) and 'while' (duration). English distinguishes precisely.
    teacher_tips:
      how_to_explain: WHEN = at a point in time. WHILE = during a duration/ongoing.
