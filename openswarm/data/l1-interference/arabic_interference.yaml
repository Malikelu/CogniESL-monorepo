    teacher_tips:
      how_to_explain: '''I would rather stay home'' = I prefer to stay. Use ''would
        rather'' + base verb. For others: ''I would rather you came early.'''
      where_to_start: Practice expressing preferences.
      sequencing: 'Week1: I''d rather + base verb. Week2: would rather + subject +
