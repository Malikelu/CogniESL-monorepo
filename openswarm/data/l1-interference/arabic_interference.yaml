  academic_style:
    interference_patterns:
    - Arabic academic writing is more rhetorical and assertive than English
    - Learners avoid hedging and use absolute statements
    - Lack of impersonal constructions makes writing sound subjective
    why_it_happens: Arabic academic tradition values assertiveness and rhetorical
      flourish. English academic writing values caution, objectivity, and hedged claims.
    teacher_tips:
      how_to_explain: 'Use hedging: ''It appears that...'' ''The evidence suggests...''
        ''It could be argued that...'' Avoid absolute claims.'
      where_to_start: Replace absolute verbs with hedged versions in writing.
      sequencing: 'Week1: hedging basics. Week2: impersonal constructions. Week3:
        nominalization for formality.'
      exercises:
      - name: academic style Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'academic style' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: academic style Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'academic style' errors.
          Students identify and correct each error.
        duration: 15
      - name: academic style Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'academic
          style' structure.
        duration: 10
      - name: academic style Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'academic style'
          errors.
        duration: 15
    notes: This affects academic writing quality significantly and is closely related
      to hedging markers and impersonal constructions.
    examples:
    - 'Too direct: ''This proves that climate change is real.'' Better: ''This evidence
      suggests that climate change may be occurring.'''
    - 'Too direct: ''All researchers agree.'' Better: ''It is widely acknowledged
      among researchers that...'''
    - 'Arabic style: ''No doubt this is the best solution.'' English academic: ''This
      is arguably the most effective solution.'''
