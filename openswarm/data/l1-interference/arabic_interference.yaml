    assessment: Expert-evaluated for L1 transfer severity
  topic_comment_writing:
    interference_patterns:
    - Arabic topic-comment structure creates over-fronted topics in English paragraphs
    - Each sentence starts with a new topic rather than building on previous information
    - Arabic paragraph style is 'zigzag' while English prefers linear progression
    why_it_happens: Arabic discourse patterns create a topic-comment-chain structure.
      English paragraphs are expected to develop a single topic progressively.
    teacher_tips:
      how_to_explain: Develop ONE topic per paragraph. Use old information first,
        new information last in each sentence.
      where_to_start: Analyze English paragraph structure in academic texts.
      sequencing: 'Week1: read model paragraphs. Week2: rewrite Arabic-style paragraphs.
        Week3: practice writing.'
      exercises:
      - name: topic comment writing Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'topic comment writing' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: topic comment writing Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'topic comment writing'
          errors. Students identify and correct each error.
        duration: 15
      - name: topic comment writing Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'topic
          comment writing' structure.
        duration: 10
      - name: topic comment writing Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'topic comment
          writing' errors.
        duration: 15
    notes: This is a major discourse-level interference that affects overall writing
      quality.
    examples:
    - 'Arabic-style: ''Climate change is a serious issue. Education is important.
      Teachers have a role. Technology can help.'''
    - 'Better: ''Climate change, a serious issue discussed extensively in recent literature,
      requires educational intervention, particularly through the integration of technology
      in classrooms.'''
    - The English version chains ideas within a single topic-focused paragraph.
    frequency: 4
    persistence: 4
    communicative_impact: 4
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Hinds, J. (1987). Reader vs. writer responsibility.
    - Kaplan, R. B. (1966). Cultural thought patterns in inter-cultural education.
