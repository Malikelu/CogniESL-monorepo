  active_participle_overuse:
    interference_patterns:
    - Arabic extensively uses ism al-faa'il (active participle) as adjectives and
      nouns
    - Learners overuse '-ing' forms where English uses simple adjectives
    - Producing 'a running water' instead of 'running water' or 'the water is running'
    why_it_happens: Arabic active participles function as adjectives and nouns more
      freely than English -ing forms, which can be ambiguous between adjective and
      progressive aspect.
    teacher_tips:
      how_to_explain: English -ing forms can be adjectives ('running water') OR verbs
        ('I am running'). If it can take a time marker, it's a verb. If not, it's
        an adjective.
      where_to_start: Practice categorizing -ing forms as adjective vs. verb.
      exercises:
      - name: active participle overuse Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'active participle overuse' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: active participle overuse Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'active participle overuse'
          errors. Students identify and correct each error.
        duration: 15
      - name: active participle overuse Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'active
          participle overuse' structure.
        duration: 10
      - name: active participle overuse Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'active participle
          overuse' errors.
        duration: 15
    examples:
    - 'Arabic: saahib (possessor, active participle used as noun). Learner: ''a reading
      book'' for ''a book I am reading.'' Correct: ''a book I am reading'' (verb phrase).'
    - 'Correct: ''running water'' (adjective). Correct: ''I am running fast'' (verb).'
    - 'Arabic: mu''allim (one who teaches) = ''a teacher.'' English: -ing form would
      be ''teaching'' (adjective) or ''teaching'' (verb), not a noun.'
    frequency: 2
    persistence: 3
    communicative_impact: 2
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Al-Nassir, A. A. (1985). Sibawayh the phonologist.
    - Ryding, K. C. (2005). A Reference Grammar of Modern Standard Arabic.
    flagged: false
    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  object_pronoun_clitic_positioning:
    interference_patterns:
    - 'Arabic object clitics follow verbs directly: ''katabtu-hu'' (I wrote-it)'
    - 'Learners produce: ''I wrote it the letter'' or misplace object pronouns'
    - Confusion between pre-verbal and post-verbal pronoun placement
    why_it_happens: Arabic attaches object pronouns as suffixes directly to the verb.
      English places object pronouns after the verb but before adverbial phrases,
      with different word order rules.
    teacher_tips:
      how_to_explain: 'English: ''I wrote it'' (pronoun after verb). ''I wrote it
        down.'' NOT ''I wrote down it.'' Practice pronoun placement with phrasal verbs.'
      exercises:
      - name: object pronoun clitic positioning Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'object pronoun clitic positioning' structure. Emphasize the
          structural difference between Arabic and English.
        duration: 15
      - name: object pronoun clitic positioning Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'object pronoun clitic
          positioning' errors. Students identify and correct each error.
        duration: 15
      - name: object pronoun clitic positioning Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'object
          pronoun clitic positioning' structure.
        duration: 10
      - name: object pronoun clitic positioning Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'object pronoun
          clitic positioning' errors.
        duration: 15
    examples:
    - 'Arabic: katabtu-hu (I wrote-him/it). English: ''I wrote it.'' Pronoun comes
      right after the verb.'
    - 'Correct: ''I picked it up.'' Wrong: ''I picked up it.'''
    - 'Correct: ''She told me about it.'' Wrong: ''She told about it me.'''
