  should_vs_would:
    interference_patterns:
    - Arabic modal expressions don't distinguish 'should' (advice) from 'would' (conditional)
    - Learners confuse 'I should go' (advice) with 'I would go' (hypothetical)
    - Past form 'should' used incorrectly for conditional 'would'
    why_it_happens: Arabic uses similar modal expressions for advice and hypothetical
      situations. English clearly distinguishes should (present advice) from would
      (conditional).
    teacher_tips:
      how_to_explain: Should = advice/recommendation. Would = hypothetical/willingness.
        'I should go' (I advise myself to). 'I would go' (if I had the chance).
      where_to_start: Practice should vs. would in context.
      sequencing: 'Week1: should (advice). Week2: would (conditional). Week3: past
        forms.'
      exercises:
      - name: should vs would Contrastive Drill
        type: translation
