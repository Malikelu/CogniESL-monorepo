  verb_subject_inversion_questions:
    interference_patterns:
    - 'Arabic yes/no questions front the interrogative particle without inversion:
      ''Hal tuhibb al-kitab?'' (Do you-love the-book?)'
    - 'Learners fail to invert in English questions: ''You like the book?'''
    - Arabic question particles (hal, ma, man) don't require subject-auxiliary inversion
    why_it_happens: 'Arabic forms yes/no questions with particles (hal = do/does)
      without changing word order. English requires inversion: auxiliary + subject.'
    teacher_tips:
      how_to_explain: 'In English questions: flip the subject and auxiliary. ''You
        ARE going'' → ''ARE you going?'' Hal particle is replaced by inversion.'
      where_to_start: Practice yes/no questions with auxiliary inversion.
      exercises:
      - name: verb subject inversion questions Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'verb subject inversion questions' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: verb subject inversion questions Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'verb subject inversion
          questions' errors. Students identify and correct each error.
        duration: 15
      - name: verb subject inversion questions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'verb
          subject inversion questions' structure.
        duration: 10
      - name: verb subject inversion questions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'verb subject
          inversion questions' errors.
        duration: 15
    examples:
    - 'Arabic: Hal dhahabta? (Did you go?). Learner: ''Did you go?'' ✓. But: ''Go
      you?'' ✗.'
    - 'Wrong: ''You have finished?'' Correct: ''HAVE you finished?'''
    - 'Wrong: ''She can swim?'' Correct: ''CAN she swim?'''
