    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  paraphrasing_skills:
    interference_patterns:
    - Arabic learners tend to quote directly rather than paraphrase
    - Lack of paraphrasing skills leads to potential plagiarism
    - Arabic academic tradition may value direct quotation more than English
    why_it_happens: Arabic academic tradition sometimes favors direct quotation. English
      academic writing values paraphrasing and synthesis.
    teacher_tips:
      how_to_explain: Paraphrase = restate someone else's idea in YOUR OWN words with
        a citation. Never just replace words with synonyms — restructure the sentence
        completely.
      where_to_start: Practice paraphrasing short passages.
      sequencing: 'Week1: identify main ideas. Week2: restructure sentences. Week3:
        practice with academic texts.'
      exercises:
      - name: paraphrasing skills Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'paraphrasing skills' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: paraphrasing skills Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'paraphrasing skills'
          errors. Students identify and correct each error.
        duration: 15
      - name: paraphrasing skills Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'paraphrasing
          skills' structure.
        duration: 10
      - name: paraphrasing skills Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'paraphrasing
          skills' errors.
        duration: 15
    notes: Students may not realize that word-for-word changes with citation but no
      structural change is still problematic in English academic writing.
    examples:
    - 'Original: ''Climate change represents the greatest threat to global biodiversity
      (Smith, 2020).'''
    - 'Bad paraphrase: ''Climate change is the biggest danger to worldwide biodiversity
      (Smith, 2020).'' (just synonym swap)'
    - 'Good paraphrase: ''According to Smith (2020), no other factor poses as significant
      a risk to species diversity worldwide as the changing climate.'' (restructured
      fully)'
