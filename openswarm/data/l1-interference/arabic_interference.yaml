  phrasal_verbs_advanced:
    interference_patterns:
    - Multi-word verbs with separable and inseparable forms confuse learners
    - 'Learners split inseparable phrasal verbs: ''I look after my brother'' → ''I
      look my brother after'''
    - 'Multiple meanings of common phrasal verbs: ''take off,'' ''get over,'' ''put
      up with'''
    why_it_happens: Arabic has no phrasal verb system. Verb+particle combinations
      are semantically opaque and have no structural parallel.
    teacher_tips:
      how_to_explain: 'Separable phrasal verbs: object can go between verb and particle.
        Inseparable: object must follow. Three-word phrasal verbs are always inseparable.'
      where_to_start: Learn common phrasal verbs in groups by particle.
      sequencing: 'Week1: common particles (up, off, on, out). Week2: inseparable
        phrasal verbs. Week3: three-word verbs.'
      exercises:
      - name: phrasal verbs advanced Contrastive Drill
        type: translation
