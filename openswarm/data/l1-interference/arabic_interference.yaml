    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  gender_adjective_agreement:
    interference_patterns:
    - Arabic adjectives agree with noun gender in number, case, and definiteness
    - Learners transfer grammatical gender rules to English adjective placement
    - Over-attention to formality register from Arabic gender system
    why_it_happens: Arabic adjectives follow the noun and must agree in gender, number,
      definiteness, and case. English adjectives precede the noun with no agreement.
    teacher_tips:
      how_to_explain: 'English adjectives go BEFORE nouns with no changes: ''big house,''
        ''beautiful girl.'' No agreement needed.'
      sequencing: 'Week1: adjective position. Week2: adjective form (no changes in
        English).'
      exercises:
      - name: gender adjective agreement Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'gender adjective agreement' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: gender adjective agreement Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'gender adjective agreement'
          errors. Students identify and correct each error.
        duration: 15
      - name: gender adjective agreement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'gender
          adjective agreement' structure.
        duration: 10
      - name: gender adjective agreement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'gender adjective
          agreement' errors.
        duration: 15
    examples:
    - 'Arabic: baytun kabir (house big-masculine) → adjective follows noun. English:
      ''big house'' (adjective before noun).'
    - 'Arabic: baytun kabiira (house big-feminine) → adjective changes form. English:
      ''big house'' — no change.'
    - 'Wrong: ''house big.'' Correct: ''big house.'''
