    interference_patterns:
    - Arabic has no equivalent to 'would rather' construction
    - Learners express preference less precisely or avoid the structure
    - Would rather + past tense for preference is unique to English
    why_it_happens: Arabic expresses preference with 'ufaddil' (I prefer) + noun.
