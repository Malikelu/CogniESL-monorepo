        description: Students create 5 original sentences using correct English 'countable
          uncountable advanced' structure.
        duration: 10
      - name: countable uncountable advanced Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'countable uncountable
          advanced' errors.
        duration: 15
    examples:
    - 'Wrong: I need a furniture. Correct: I need A PIECE OF furniture. (uncountable)'
    - 'Correct: The hotel has 30 rooms. (countable)'
