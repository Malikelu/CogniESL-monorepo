        description: Students create 5 original sentences using correct English 'apostrophe
          s' structure.
        duration: 10
      - name: apostrophe s Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'apostrophe s'
          errors.
        duration: 15
    examples:
