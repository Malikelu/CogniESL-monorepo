    interference_patterns:
    - Arabic conditional 'idh/la' followed by jussive doesn't map to English if-past-perfect
    - Learners produce 'If I will go' instead of 'If I went' for hypothetical conditionals
    - 'Arabic tense-mood system differs from English: no equivalent to Type 2/3 conditionals'
    why_it_happens: Arabic uses 'idh' (if) + subjunctive for real conditions only.
      Hypothetical/unreal conditions have no clear Arabic equivalent.
    teacher_tips:
      how_to_explain: 'Type 1: If + present, will + verb. Type 2: If + past, would
        + verb. Type 3: If + past perfect, would have + past participle.'
      where_to_start: Use timelines to show real vs. unreal conditionals.
      sequencing: 'Week1: Type 1. Week2: Type 2. Week3: Type 3.'
      exercises:
