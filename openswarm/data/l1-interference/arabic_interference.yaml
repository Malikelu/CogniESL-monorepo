    - 'Short vowel omission: Arabic is largely consonantal, leading to vowel spelling
      errors'
    why_it_happens: Arabic has /b/ but not /p/, /f/ but not /v/, /j/ but not /g/.
      Short vowels are not written in standard Arabic script.
    teacher_tips:
      how_to_explain: 'English /p/ is voiceless bilabial. Practice minimal pairs:
        bat/pat, fan/van, jar/gal.'
