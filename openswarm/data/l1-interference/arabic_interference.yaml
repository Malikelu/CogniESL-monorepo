    tier: 3
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
  binomial_expressions:
    interference_patterns:
    - Arabic has no equivalent to English binomials (salt and pepper, give and take)
    - 'Learners change word order in binomials: ''peace and quiet'' → ''quiet and
      peace'''
    - Binomials have fixed word order that must be memorized
    why_it_happens: English has many fixed two-word expressions (binomials) with irreversible
      word order. Arabic does not have this pattern.
    teacher_tips:
      how_to_explain: 'Binomials are fixed: ''black AND white,'' ''more or LESS,''
        ''peace and QUIET.'' The order cannot be changed.'
      where_to_start: Learn common binomials.
      sequencing: 'Week1: learn 10 binomials. Week2: practice in sentences.'
      exercises:
