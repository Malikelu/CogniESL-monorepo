    - Learners simplify to 'must do' or 'was doing', losing aspect precision
    why_it_happens: Arabic has no structural equivalent to modal+have+been+-ing. The
      closest form is a modal + past tense.
    teacher_tips:
      how_to_explain: 'Structure: modal + have + been + -ing. ''He must HAVE BEEN
        SLEEPING.'' Deduce from evidence.'
      where_to_start: Start with must/might/could + have been + -ing.
      sequencing: 'Week1: must have been doing. Week2: might/could have been doing.'
      exercises:
      - name: modal perfect continuous Contrastive Drill
        type: translation
