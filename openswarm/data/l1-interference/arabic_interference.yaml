      how_to_explain: '''A number of'' + plural verb. ''The number of'' + singular
        verb. ''A number of students WERE...'' ''The number of students WAS...'''
      where_to_start: Learn the two patterns as distinct items.
      sequencing: 'Week1: a number of (plural verb). Week2: the number of (singular
        verb).'
      exercises:
