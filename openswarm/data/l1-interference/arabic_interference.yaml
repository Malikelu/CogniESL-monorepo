  simple_past_vs_present_perfect:
    interference_patterns:
    - 'Learners confuse simple past with present perfect: ''I have seen him yesterday'''
    - Just/already/yet placement differs from Arabic equivalents
    - Arabic past tense covers both simple past and present perfect contexts
    why_it_happens: 'Arabic ''qad'' + past tense covers both completed past actions.
      English distinguishes by time reference: specific past time = simple past; unspecified/life
      experience = present perfect.'
    teacher_tips:
      how_to_explain: With yesterday/last week/a specific time = simple past (I SAW).
        With ever/never/already/yet/no specific time = present perfect (I HAVE SEEN).
      where_to_start: 'Practice with time expressions: yesterday vs. ever.'
      sequencing: 'Week1: with time expressions. Week2: with ever/never. Week3: life
