  citation_style_conventions:
    interference_patterns:
    - Arabic academic tradition uses different citation conventions
    - Learners may not use in-text citations or reference lists
    - Arabic scholarly tradition favors attribution through narrative rather than
      parenthetical citation
    why_it_happens: Arabic academic writing traditionally uses narrative attribution
      ('According to al-Biruni...') rather than parenthetical citation (Author, Year).
    teacher_tips:
      how_to_explain: 'In English academic writing: use (Author, Year) for in-text
        citations. List all sources in a References section. Common styles: APA, MLA,
        Chicago.'
      where_to_start: Learn one citation style (APA is most common in social sciences).
      sequencing: 'Week1: understand in-text citation format. Week2: practice reference
        list. Week3: integrate citations into paragraphs.'
      exercises:
      - name: citation style conventions Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'citation style conventions' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: citation style conventions Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'citation style conventions'
          errors. Students identify and correct each error.
        duration: 15
      - name: citation style conventions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'citation
          style conventions' structure.
        duration: 10
      - name: citation style conventions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'citation style
          conventions' errors.
        duration: 15
    examples:
    - 'Arabic style: ''As the great scholar al-Razi stated in his seminal work...''
      English style: ''(al-Razi, 1200)'' or ''Al-Razi (1200) argued that...'''
    - 'Correct: ''According to recent research (Ahmed, 2023), student motivation has
      declined.'''
    - 'Incorrect: ''Ahmed said motivation is low'' without year or proper attribution.
