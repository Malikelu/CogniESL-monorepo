    - Learners unsure when to use -ing vs. to-infinitive after verbs
    - Arabic single form 'al-kiima' covers both 'to eat' and 'eating'
    why_it_happens: Arabic uses a single verbal noun form (masdar) where English distinguishes
      between gerund (-ing) and infinitive (to + verb).
