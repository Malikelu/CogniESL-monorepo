  hedging_with_modals:
    interference_patterns:
    - Arabic learners underhedge in English academic writing
    - 'Prefer absolute statements: ''This proves X'' instead of ''This might suggest
      X'''
    - Arabic academic tradition values directness over hedging
    why_it_happens: Arabic academic culture values assertiveness. English academic
      culture values caution and hedging.
    teacher_tips:
      how_to_explain: 'Replace absolute verbs with hedged forms: ''proves'' → ''suggests,''
        ''always'' → ''tends to,'' ''certain'' → ''likely.'''
      where_to_start: Identify absolute statements and rewrite with hedging modals.
      sequencing: 'Week1: identify hedging markers. Week2: practice in paragraphs.
        Week3: self-edit for hedging.'
      exercises:
      - name: hedging with modals Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'hedging with modals' structure. Emphasize the structural difference
          between Arabic and English.
        duration: 15
      - name: hedging with modals Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'hedging with modals'
          errors. Students identify and correct each error.
        duration: 15
      - name: hedging with modals Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'hedging
          with modals' structure.
        duration: 10
      - name: hedging with modals Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'hedging with
          modals' errors.
        duration: 15
    examples:
    - 'Direct: ''This research PROVES that X causes Y.'' Hedged: ''This research SUGGESTS
      that X may contribute to Y.'''
    - 'Direct: ''All students MUST complete this.'' Hedged: ''Students are generally
      expected to complete this.'''
    - 'Correct: ''It is POSSIBLE that the results reflect a sampling bias.'''
    frequency: 4
    persistence: 4
    communicative_impact: 4
    source_type: peer-reviewed
    source_count: 2
    sources:
    - Banshaqfer, S. (2000). Hedging in Arabic and English academic writing.
