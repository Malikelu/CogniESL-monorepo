      how_to_explain: 'Learn prepositions in collocations: ''interested in,'' ''good
        at,'' ''depend on.'''
      where_to_start: Learn common adjective-preposition and verb-preposition collocations.
      sequencing: 'Week1: basic location prepositions. Week2: time prepositions. Week3:
