    teacher_tips:
      how_to_explain: 'Use passive for impersonal: ''It is believed...'' ''It has
        been reported...'''
      where_to_start: Convert 'People say/think' to impersonal passives.
      sequencing: 'Week1: identify active impersonal. Week2: convert to passive. Week3:
        formal vs. informal.'
      exercises:
      - name: impersonal constructions Contrastive Drill
        type: translation
        description: Students translate 10 Arabic sentences into English, focusing
          on correct 'impersonal constructions' structure. Emphasize the structural
          difference between Arabic and English.
        duration: 15
      - name: impersonal constructions Error Correction
        type: error-correction
        description: Provide 15 sentences with Arabic-style 'impersonal constructions'
          errors. Students identify and correct each error.
        duration: 15
      - name: impersonal constructions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'impersonal
          constructions' structure.
        duration: 10
      - name: impersonal constructions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'impersonal constructions'
          errors.
        duration: 15
    examples:
    - 'Arabic-style: ''People say he is a good doctor.'' Formal: ''It is said that
      he is a good doctor.'''
    - 'Correct: ''It is widely accepted that climate change is real.'''
    - 'Wrong: ''Scientists believe that...'' (overused). Better: ''It is believed
      among scientists that...'''
