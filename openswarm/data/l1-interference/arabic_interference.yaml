    - Learners use singular verbs with 'a number of' (e.g., 'a number of students
      was')
    - Arabic plural-agreement patterns differ from English number agreement
    why_it_happens: Arabic uses singular or broken plurals where English makes semantic
      distinctions between 'a number of' (plural meaning) and 'the number of' (singular
      meaning).
