language: urdu
grammar_points:
  word_order_urdu:
    interference_patterns:
    - Urdu uses postpositions which does not exist in English, causing transfer errors
      related to 'word order'.
    why_it_happens: Urdu handles 'word order' differently from English. Urdu L1 speakers
      transfer native structural patterns to English, leading to systematic errors.
      The error is persistent because the Urdu structure is deeply automatized from
      childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Urdu and English for 'word order'.
        Show the Urdu structure side-by-side with English. Highlight the specific
        error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Urdu handles
        'word order' differently from English. Use visual aids or color-coding to
        highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Urdu sentences, students translate to English, focusing
          on correct 'word order' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Urdu-style 'word order' errors. Students
          identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'word
          order' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'word order'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''Yesterday went I.'' Correct: ''Yesterday I went.'''
    - 'Wrong: ''Here comes he.'' Correct: ''Here he comes.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Sharma, D. (2005). Language transfer and SLA of Hindi-Urdu. Annual Review of
      Applied Linguistics, 25, 1-20.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Urdu
    notes: Most fundamental Urdu L1 interference error. Affects all proficiency levels.
