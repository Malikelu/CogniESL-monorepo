language: russian
schema_version: '3.0'
grammar_points:
  verb_aspect:
    interference_patterns:
    - Russian uses no articles which does not exist in English, causing transfer errors
      related to 'verb aspect'.
    why_it_happens: Russian handles 'verb aspect' differently from English. Russian
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Russian structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Russian and English for 'verb
        aspect'. Show the Russian structure side-by-side with English. Highlight the
        specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Russian
        handles 'verb aspect' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Russian sentences, students translate to English, focusing
          on correct 'verb aspect' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Russian-style 'verb aspect' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'verb
          aspect' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'verb aspect'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I eat now.'' (for ongoing action) Correct: ''I am eating now.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - 'Slabakova, R. (2000). L1 transfer revisited: The L2 acquisition of telicity.
      Linguistics, 38(4), 729-760.'
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Defining feature of Russian grammar.
