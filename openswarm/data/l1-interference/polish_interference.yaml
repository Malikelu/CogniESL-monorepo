language: polish
schema_version: '3.0'
grammar_points:
  gender_agreement:
    interference_patterns:
    - Polish uses no articles which does not exist in English, causing transfer errors
      related to 'gender agreement'.
    why_it_happens: Polish handles 'gender agreement' differently from English. Polish
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Polish structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Polish and English for 'gender
        agreement'. Show the Polish structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Polish handles
        'gender agreement' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Polish sentences, students translate to English, focusing
          on correct 'gender agreement' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Polish-style 'gender agreement' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'gender
          agreement' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'gender agreement'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''She is a big table.'' Correct: ''It is a big table.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Dziemianko, A. (2010). Polish learners and English article acquisition. Studies
      in Second Language Learning and Teaching, 1(1), 45-62.
    - Otwinowska-Kasztelanic, A. (2011). Awareness of lexical transfer in vocabulary
      acquisition. Multilingual Matters.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Polish
    notes: Core structural difference affecting every utterance.
