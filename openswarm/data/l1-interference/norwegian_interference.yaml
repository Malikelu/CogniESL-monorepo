language: norwegian
schema_version: '3.0'
grammar_points:
  tonal_word_accent:
    interference_patterns:
    - Norwegian uses 2 genders which does not exist in English, causing transfer errors
      related to 'tonal word accent'.
    why_it_happens: Norwegian handles 'tonal word accent' differently from English.
      Norwegian L1 speakers transfer native structural patterns to English, leading
      to systematic errors. The error is persistent because the Norwegian structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Norwegian and English for 'tonal
        word accent'. Show the Norwegian structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Norwegian
        handles 'tonal word accent' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Norwegian sentences, students translate to English, focusing
          on correct 'tonal word accent' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Norwegian-style 'tonal word accent'
          errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'tonal
          word accent' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'tonal word accent'
          errors.
        duration: 15
    examples:
    - 'Wrong: Applying Norwegian tonal patterns to English. Correct: English stress
      and intonation.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Philip, W. (2005). Norwegian learners and English article acquisition. Nordic
      Journal of English Studies, 4(1), 45-62.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Norwegian
    notes: Unique phonological feature shared with Swedish.
