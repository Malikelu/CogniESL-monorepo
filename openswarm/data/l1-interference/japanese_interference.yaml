language: japanese
schema_version: '3.0'
grammar_points:
  topic_marker_wa:
    interference_patterns:
    - Japanese uses no articles which does not exist in English, causing transfer
      errors related to 'topic marker wa'.
    why_it_happens: Japanese handles 'topic marker wa' differently from English. Japanese
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Japanese structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Japanese and English for 'topic
        marker wa'. Show the Japanese structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Japanese
        handles 'topic marker wa' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Japanese sentences, students translate to English, focusing
          on correct 'topic marker wa' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Japanese-style 'topic marker wa' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'topic
          marker wa' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'topic marker
          wa' errors.
        duration: 15
    examples:
    - 'Wrong: ''topic marker wa I saw.'' (topic-comment) Correct: ''I saw topic marker
      wa.'' (SVO)'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Liu, J. & Gleason, J. (2002). Acquiring the English article system by Chinese
      speakers. Second Language Research, 18(1), 1-26.
    - Robertson, J. S. (2000). Transfer in Chinese English article use. Studies in
      Second Language Acquisition, 22(3), 379-406.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Japanese
    notes: Fundamental Japanese sentence structure. English speakers constantly force
      SVO pattern.
