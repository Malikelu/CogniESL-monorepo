  wh_questions_bn:
    interference_patterns:
    - pattern: Keeping wh-word in situ instead of fronting
      example_bengali: tumi ki korcho?
      example_gloss: You what are doing?
      example_wrong: You what are doing?
      example_correct: What are you doing?
      explanation: Bengali is a wh-in-situ language — the question word stays in the
        position of the answer. English requires wh-fronting.
    - pattern: Omitting auxiliary 'do/does/did' in questions
      example_bengali: tumi kothay jao?
      example_gloss: You where go?
      example_wrong: Where you go?
      example_correct: Where do you go?
      explanation: Bengali questions are formed by intonation alone. English requires
        'do/does/did' when there is no other auxiliary.
    - pattern: Using rising intonation instead of inversion for yes/no questions
      example_bengali: tumi ki jabe?
      example_gloss: You Q will go?
      example_wrong: You will go? (rising intonation)
      example_correct: Will you go?
      explanation: Bengali yes/no questions use the particle 'ki' and rising intonation.
        English requires subject-auxiliary inversion.
    - pattern: Using 'what' as a universal question word
      example_bengali: ki bolchh?
      example_gloss: what are saying?
      example_wrong: What you are saying? (without inversion)
      example_correct: What are you saying?
      explanation: Bengali 'ki' (what) is used more broadly. Bengali speakers may
        also struggle with inversion in wh-questions.
    examples:
    - 'Wrong: ''You what are doing?'' Correct: ''What are you doing?'''
    - 'Wrong: ''Where you go?'' Correct: ''Where do you go?'''
    - 'Wrong: ''You will go?'' Correct: ''Will you go?'''
    - 'Wrong: ''What you are saying?'' Correct: ''What are you saying?'''
    why_it_happens: 'Bengali question formation is fundamentally different from English.
      Bengali is a wh-in-situ language: the question word stays where the answer would
      appear. No auxiliary ''do'' is added, and word order does not change. Yes/no
      questions use the particle ''ki'' and rising intonation. English requires three
      operations for wh-questions: (1) move the wh-word to the front, (2) add ''do/does/did''
      if no auxiliary exists, (3) invert subject and auxiliary. Bengali speakers must
      learn all three operations simultaneously.'
    teacher_tips:
      how_to_explain: 'Write ''tumi ki korcho?'' (You what are doing?) on the board.
        Underline ''ki'' (what) — it stays in the middle. Then write ''What are you
        doing?'' — underline ''What'' at the beginning. Say: ''In Bengali, the question
        word stays WHERE THE ANSWER IS. In English, it JUMPS TO THE FRONT.'' For do-support:
        ''If there is no helper (is, can, will), add DO.'''
      where_to_start: 'Begin with wh-questions that already have an auxiliary: ''What
        IS he doing?'' These don''t require do-support, so students focus on wh-fronting
        first. Then introduce do/does/did.'
      sequencing: 'Week 1: Wh-questions with existing auxiliaries. Week 2: Wh-questions
        requiring do/does/did. Week 3: Yes/no questions with inversion. Week 4: Embedded
        questions.'
      exercises:
      - name: Wh-Fronting Transformation
        type: transformation
        description: Give 10 Bengali-style in-situ questions. Students rewrite with
          correct English wh-fronting and do-support.
        duration: 15
      - name: Question Formation Rapid Fire
        type: oral-drill
        description: Teacher makes a statement. Students form the correct question
          immediately.
        duration: 10
      - name: Do-Support Detective
        type: error-correction
        description: Provide 15 questions, half missing do/does/did. Students identify
          which are wrong and fix them.
        duration: 15
      - name: Interview a Partner
        type: oral-drill
        description: Students ask 8 questions using different wh-words. Partner answers.
          Teacher circulates to check formation.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Bhattacharya, T. (2007). Question formation in Bengali EFL learners. Indian
      Linguistics, 68, 45-62.
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
