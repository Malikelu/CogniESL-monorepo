  modal_usage_bn:
    interference_patterns:
    - pattern: Adding 'to' after modals
      example_bengali: ami korte parbo
      example_gloss: I to do will be able
      example_wrong: I can to go.
      example_correct: I can go.
      explanation: Bengali uses the infinitive form (korte, 'to do') before the modal
        expression. English modals are followed by the bare infinitive without 'to'.
    - pattern: Using 'must to' or 'should to'
      example_bengali: ami korte hobey
      example_gloss: I to do must
      example_wrong: I must to go now.
      example_correct: I must go now.
      explanation: Bengali obligation expressions use the infinitive. English modals
        (must, should, can, will) are followed directly by the base verb.
    - pattern: Using 'can' for all ability/permission meanings
      example_bengali: ami korte parbo / ami jete parbo
      example_gloss: I can do / I can go
      example_wrong: Can I take your pen? (when 'may' is more appropriate)
      example_correct: May I take your pen?
      explanation: Bengali 'parbo' covers both ability and permission. English distinguishes
        'can' (ability/informal permission) from 'may' (formal permission).
    - pattern: Using double modals
      example_bengali: ami korte parbo na
      example_gloss: I to do can not
      example_wrong: I might can do it.
      example_correct: I might be able to do it.
      explanation: Bengali allows modal-like stacking in some constructions. English
        generally does not allow double modals in standard usage.
    examples:
    - 'Wrong: ''I can to go.'' Correct: ''I can go.'''
    - 'Wrong: ''I must to go.'' Correct: ''I must go.'''
    - 'Wrong: ''Can I take your pen?'' (formal) Correct: ''May I take your pen?'''
    - 'Wrong: ''I might can do it.'' Correct: ''I might be able to do it.'''
    why_it_happens: Bengali modal expressions are constructed differently from English.
      Bengali uses the infinitive form of the main verb (korte, 'to do') before the
      modal expression (parbo, 'can'), so speakers transfer the 'to' into English.
      English modals are a closed class of auxiliary verbs followed by the bare infinitive.
      Bengali does not have a distinct modal auxiliary class in the same way — it
      uses verbal expressions and participles. The can/may distinction is particularly
      challenging because Bengali 'parbo' covers both concepts.
    teacher_tips:
      how_to_explain: 'Write on the board: ''MODAL + BASE VERB (no to!)''. List the
        modals: can, could, will, would, shall, should, may, might, must. Say: ''After
        these words, use the verb WITHOUT to. In Bengali, you say ''korte parbo''
        (to do can). In English, say ''can do'' — NO to.'' Drill: ''I can go'' (NOT
        ''I can to go'').'
      where_to_start: 'Begin with ''can'' and ''must'' as they are the most common.
        Drill the pattern: modal + base verb. Use classroom contexts: ''I can speak
        English.'' ''You must do your homework.'' Then introduce may/might.'
      sequencing: 'Week 1: can/could for ability. Week 2: must/should for obligation.
        Week 3: will/would for willingness/future. Week 4: may/might for permission/possibility.'
      exercises:
      - name: Modal Transformation Drill
        type: transformation
        description: 'Give 15 Bengali-style sentences with ''to'' after modals. Students
          remove ''to'' and correct each sentence. Example: ''I can to swim.'' > ''I
          can swim.'''
        duration: 15
      - name: Modal Gap Fill
        type: fill-in-the-blank
        description: 'Provide 20 sentences with modal blanks. Students choose the
          correct modal and use the base verb form. Example: ''You ___ (must/should)
          ___ (wear) a seatbelt.'' (must wear)'
        duration: 15
      - name: Can or May? Permission Practice
        type: oral-drill
        description: Students practice asking for permission formally and informally.
          'Can I...?' (informal) vs. 'May I...?' (formal). Teacher provides scenarios
          requiring each.
        duration: 10
      - name: Modal Error Correction
        type: error-correction
        description: Provide a dialogue with 10 modal errors (wrong 'to', wrong modal
          choice, double modals). Students find and correct each error.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course, 2nd ed. Heinle & Heinle.'
    - Palmer, F.R. (1990). Modality and the English Modals, 2nd ed. Longman.
