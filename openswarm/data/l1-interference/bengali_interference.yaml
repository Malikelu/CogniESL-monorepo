  verb_tense_bn:
    interference_patterns:
    - pattern: Using present perfect with specific past time markers
      example_bengali: ami kal kheyechi
      example_gloss: I yesterday have eaten
      example_wrong: I have eaten yesterday.
      example_correct: I ate yesterday.
      explanation: Bengali perfective aspect can co-occur with specific past time
        words. English present perfect cannot be used with specific past time references.
    - pattern: Using simple present instead of present perfect for ongoing situations
      example_bengali: ami panch bachhor dhore ekhane thaki
      example_gloss: I five years since here live
      example_wrong: I live here since five years.
      example_correct: I have lived here for five years.
      explanation: Bengali uses simple present with 'dhore' for ongoing situations.
        English requires present perfect with 'for/since'.
    - pattern: Overusing present perfect where English requires simple past
      example_bengali: ami shokale nashta korechhi
      example_gloss: I morning-in breakfast have done
      example_wrong: I have had breakfast this morning.
      example_correct: I had breakfast this morning.
      explanation: Bengali perfective aspect is used more broadly than English present
        perfect. Bengali speakers overgeneralize to contexts requiring simple past.
    - pattern: Using simple past instead of past perfect for sequencing
      example_bengali: ami kheye tarpor bari gelam
      example_gloss: I ate then home went
      example_wrong: When I arrived, he left.
      example_correct: When I arrived, he had left.
      explanation: Bengali uses simple past with sequential markers. English uses
        past perfect to mark which of two past events happened first.
    examples:
    - 'Wrong: ''I have eaten yesterday.'' Correct: ''I ate yesterday.'''
    - 'Wrong: ''I live here since 5 years.'' Correct: ''I have lived here for 5 years.'''
    - 'Wrong: ''I have had breakfast this morning.'' Correct: ''I had breakfast this
      morning.'''
    - 'Wrong: ''When I arrived, he left.'' Correct: ''When I arrived, he had left.'''
    why_it_happens: Bengali verb system is organized around aspect (perfective vs.
      imperfective) rather than tense. The Bengali perfective (marked by '-ech') indicates
      completed action but does not carry the same 'current relevance' meaning as
      English present perfect. Bengali uses simple present for habitual, ongoing,
      and some completed-action contexts. The concept of 'present perfect' connecting
      past action to present moment is foreign to Bengali grammar. Bengali has no
      equivalent of the past perfect, so speakers use simple past with sequential
      markers. The 'for/since' distinction is particularly challenging because Bengali
      uses 'dhore' with simple present tense.
    teacher_tips:
      how_to_explain: 'Draw a timeline on the board: PAST, NOW, FUTURE. Show that
        English present perfect connects PAST to NOW (draw an arrow). Simple past
        is ONLY in the PAST (no arrow). Say: ''In Bengali, you can say ''yesterday
        I have done.'' In English, this is impossible. If you mention WHEN, use simple
        past.'''
      where_to_start: 'Begin with the most critical rule: specific past time = simple
        past. Drill: ''yesterday I ate'' (NOT ''I have eaten yesterday''). Use 10
        examples with different time markers before introducing present perfect.'
      sequencing: 'Week 1: Simple past with specific time markers. Week 2: Present
        perfect for experiences and unfinished time. Week 3: Present perfect with
        for/since. Week 4: Past perfect for sequencing two past events.'
      exercises:
      - name: Timeline Tense Sorting
        type: matching
        description: 'Give students 20 sentence strips. Students place each on a timeline
          poster: past only (simple past), past-to-now (present perfect), or before-past
          (past perfect).'
        duration: 15
      - name: Tense Transformation Drill
        type: transformation
        description: Give 15 Bengali sentences. Students translate to English, choosing
          the correct tense. Focus on Bengali perfective '-ech' form mapping to English
          simple past or present perfect.
        duration: 15
      - name: Story Retelling with Correct Tenses
        type: oral-drill
        description: Teacher tells a short story using mixed tenses. Students retell
          with correct tense sequence. Teacher provides a timeline on the board as
          a visual aid.
        duration: 15
      - name: Tense Error Hunt in Student Writing
        type: error-correction
        description: Provide a 200-word essay with 10 tense errors. Students work
          in pairs to find and correct each error.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Das, S. (2017). Tense-aspect transfer in Bengali EFL learners. Journal of Language
      Teaching and Research, 8(3), 512-520.
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
