      in spoken English. Immediately noticeable to native speakers.
    notes: Very common error in spoken English. Immediately noticeable to native speakers.
      Wh-in-situ transfer is one of the most visible Bengali L1 errors.
  tag_questions_bn:
    interference_patterns:
    - pattern: Using 'no?' or 'right?' as universal tag questions
      example_bengali: tumi jabe, tai na?
      example_gloss: You will go, right?
      example_wrong: You are coming, no?
      example_correct: You are coming, aren't you?
      explanation: Bengali uses 'tai na?' as a universal tag. English tags must match
        the auxiliary and reverse polarity.
    - pattern: Using 'isn't it?' as a universal tag for all sentences
      example_bengali: se esechhe, to?
      example_gloss: He has come, right?
      example_wrong: She went to the market, isn't it?
      example_correct: She went to the market, didn't she?
      explanation: English tags must mirror the auxiliary verb and tense of the main
        clause and reverse the polarity.
    - pattern: Omitting tag questions entirely where English uses them
      example_bengali: bhalo achhe
      example_gloss: good is
      example_wrong: The food is good. (no confirmation tag)
      example_correct: The food is good, isn't it?
      explanation: Bengali seeks confirmation through intonation. English frequently
        uses tag questions for confirmation-seeking.
    - pattern: Using 'yes?' as a tag question
      example_bengali: tumi khabe, hya?
      example_gloss: You will eat, yes?
      example_wrong: You will eat, yes?
      example_correct: You will eat, won't you?
      explanation: English requires a negative tag after a positive statement.
    examples:
    - 'Wrong: ''You are coming, no?'' Correct: ''You are coming, aren''t you?'''
    - 'Wrong: ''She went to the market, isn''t it?'' Correct: ''She went to the market,
      didn''t she?'''
    - 'Wrong: ''The food is good, yes?'' Correct: ''The food is good, isn''t it?'''
    - 'Wrong: ''They like tea, no?'' Correct: ''They like tea, don''t they?'''
    why_it_happens: 'Bengali tag questions are simple and invariant — ''tai na?'',
      ''na?'', or ''hya?'' work with any main clause. English tag questions are complex:
      they must use the same auxiliary, reverse polarity, use the correct pronoun,
      and use ''do'' support when there is no auxiliary. Bengali speakers default
      to a single invariant tag because their L1 has no such system.'
    teacher_tips:
      how_to_explain: 'Write the rule: ''TAG = same verb + opposite polarity + pronoun.''
        Demonstrate: ''You ARE coming, AREN''T you?'' Contrast with Bengali: ''In
        Bengali, you say tai na? for EVERYTHING. In English, the tag CHANGES with
        each sentence.'''
      where_to_start: 'Begin with common tags: ''isn''t it?'', ''aren''t you?'', ''don''t
        they?''. Use a matching game. Then introduce the full rule.'
      sequencing: 'Week 1: Recognition of correct vs. incorrect tags. Week 2: Formation
        with is/are/was/were. Week 3: Formation with do/does/did. Week 4: Special
        cases.'
      exercises:
      - name: Tag Question Matching
        type: matching
        description: Give 15 statement cards and 15 tag cards. Students match each
          statement to its correct tag.
        duration: 15
      - name: Tag Question Formation Drill
        type: transformation
        description: Give 15 statements without tags. Students add the correct tag.
          Include a mix of auxiliaries.
        duration: 15
      - name: Tag Question Conversation
        type: oral-drill
        description: Student A makes a statement. Student B responds with a tag question.
          Practice for 5 minutes, then switch.
        duration: 10
      - name: Universal Tag Error Correction
        type: error-correction
        description: Provide a dialogue with 10 tag errors using 'no?' or 'isn't it?'
          for everything. Students correct each tag.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
