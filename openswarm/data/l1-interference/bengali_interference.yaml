      passive formation is structurally different from English.
  relative_clauses_bn:
    interference_patterns:
    - pattern: Using 'what' instead of 'that/which/who'
      example_bengali: je boi-ta ami porechhi
      example_gloss: that book I read
      example_wrong: The book what I read was interesting.
      example_correct: The book that I read was interesting.
      explanation: Bengali uses 'je' as a general relativizer. English distinguishes
        'who' (people), 'which' (things), and 'that' (both).
    - pattern: Using correlative structure instead of embedded relative clause
      example_bengali: je chhele-ti esechhe se amar bhai
      example_gloss: that boy came he my brother
      example_wrong: The boy what came he is my brother.
      example_correct: The boy who came is my brother.
      explanation: Bengali uses correlative relative clauses (je...se) where the relative
        clause and main clause are more separate. English embeds the relative clause
        directly after the noun.
    - pattern: Omitting relative pronoun where English requires it
      example_bengali: boi-ta ami porechhi bhalo
      example_gloss: book I read good
      example_wrong: The book I read was good. (may cause confusion)
      example_correct: The book that I read was good.
      explanation: Bengali relative clauses do not require a separate relative pronoun
        in the same way English does.
    - pattern: Using 'which' for people instead of 'who'
      example_bengali: je manush-ti
      example_gloss: that person
      example_wrong: The man which lives next door is a doctor.
      example_correct: The man who lives next door is a doctor.
      explanation: Bengali 'je' is used for both people and things. English requires
        'who' for people and 'which' for things.
    examples:
    - 'Wrong: ''The book what I read.'' Correct: ''The book that I read.'''
    - 'Wrong: ''The boy what came he is my brother.'' Correct: ''The boy who came
      is my brother.'''
    - 'Wrong: ''The man which lives next door.'' Correct: ''The man who lives next
      door.'''
    - 'Wrong: ''The car who I bought.'' Correct: ''The car that I bought.'''
    why_it_happens: Bengali relative clauses use a correlative structure (je...se)
      that is fundamentally different from English embedded relative clauses. In Bengali,
      the relative clause is more like a separate clause linked by correlatives, while
      English embeds the relative clause directly after the noun it modifies. Bengali
      uses 'je' as a universal relativizer for both people and things, so speakers
      struggle with English's who/which/that distinction. The word order within the
      relative clause also differs, as Bengali maintains SOV order even in relative
      clauses.
    teacher_tips:
      how_to_explain: 'Write a Bengali correlative sentence: ''je boi-ta ami porechhi
        se-ta bhalo'' (The book that I read, it was good). Show that Bengali has TWO
        parts. Then write the English version: ''The book that I read was good.''
        Show that English puts the description RIGHT AFTER the noun. Say: ''In English,
        put the description immediately after the thing you are describing.'''
      where_to_start: 'Begin with ''that'' as a general relativizer: ''The book that
        I read.'' ''The person that I met.'' Once students are comfortable, introduce
        ''who'' for people and ''which'' for things.'
      sequencing: 'Week 1: Relative clauses with ''that.'' Week 2: ''Who'' for people,
        ''which'' for things. Week 3: Defining vs. non-defining relative clauses.
        Week 4: Relative clauses with prepositions.'
      exercises:
      - name: Relative Clause Combination
        type: transformation
        description: 'Give students pairs of simple sentences. Students combine each
          pair using a relative clause. Example: ''I have a friend. He lives in Dhaka.''
          > ''I have a friend who lives in Dhaka.'''
        duration: 15
      - name: Who, Which, or That? Pronoun Selection
        type: fill-in-the-blank
        description: Provide 15 sentences with relative pronoun blanks. Students choose
          the correct pronoun (who/which/that) based on the antecedent.
        duration: 15
      - name: Relative Clause Error Correction
        type: error-correction
        description: Provide a paragraph with 8 relative clause errors (wrong pronoun,
          correlative structure, word order). Students find and correct each error.
        duration: 15
      - name: Describe Your Classmates
        type: oral-drill
        description: 'Students describe classmates using relative clauses: ''Fatima
          is the student who sits in the front.'' Class guesses who is being described.'
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Bhattacharya, T. (2007). Relative clause formation in Bengali EFL learners.
      Indian Linguistics, 68, 45-62.
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
