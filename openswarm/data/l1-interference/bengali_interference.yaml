  a_an_the_bn:
    interference_patterns:
    - pattern: Complete omission of articles where English requires them
      example_bengali: se Daktar
      example_gloss: He doctor
      example_wrong: He is doctor.
      example_correct: He is a doctor.
      explanation: Bengali has no article system. Nouns appear bare. Bengali speakers
        omit 'a/an/the' because their L1 has no equivalent structure.
    - pattern: Overuse of 'the' based on Bengali definiteness markers
      example_bengali: sei boi-ta
      example_gloss: that book-the
      example_wrong: Give me the book. (when meaning any book)
      example_correct: Give me a book.
      explanation: Bengali uses demonstratives and classifiers to mark definiteness.
        Bengali speakers overuse 'the' by mapping these markers onto English 'the'.
    - pattern: Using 'one' as an indefinite article substitute
      example_bengali: ek-ta boi dao
      example_gloss: one-CL book give
      example_wrong: Give me one book. (when meaning 'a book')
      example_correct: Give me a book.
      explanation: Bengali uses 'ek' (one) plus classifier '-ta' for indefiniteness.
        Bengali speakers transfer this by using 'one' where English requires 'a/an'.
    - pattern: Article omission before superlatives and ordinals
      example_bengali: se shobcheye bhalo chhele
      example_gloss: He most good boy
      example_wrong: He is best boy in class.
      example_correct: He is the best boy in the class.
      explanation: Bengali does not require articles before superlatives. English
        requires 'the' before superlatives and ordinals.
    examples:
    - 'Wrong: ''He is doctor.'' Correct: ''He is a doctor.'''
    - 'Wrong: ''I want water.'' (specific) Correct: ''I want the water.'''
    - 'Wrong: ''Give me one pen.'' Correct: ''Give me a pen.'''
    - 'Wrong: ''She is best student.'' Correct: ''She is the best student.'''
    why_it_happens: Bengali has no article system whatsoever. Nouns appear bare, and
      definiteness is inferred from context, word order, or demonstrative pronouns.
      English requires articles in most noun phrase contexts, making article acquisition
      one of the hardest areas for Bengali learners. The error persists because the
      absence of articles in Bengali is a systematic feature, not random. Bengali
      speakers must learn an entirely new grammatical category with no L1 equivalent.
      Research shows article errors persist even at advanced proficiency because the
      definite/indefinite distinction is grammaticalized differently in Bengali.
    teacher_tips:
      how_to_explain: 'Start with a simple rule: ''In English, most singular countable
        nouns need a word before them — a, an, or the.'' Write three columns: ''a/an''
        (first time, any one), ''the'' (specific, known), ''no article'' (plural general,
        uncountable general). Use a physical prop: hold up a pen and say ''This is
        A pen'' (first mention), then ''Give me THE pen'' (now we both know which
        one).'
      where_to_start: 'Begin with the most basic rule: singular countable nouns need
        an article. Use classroom objects: ''This is a desk. That is a chair. The
        desk is brown.'' Drill extensively before introducing exceptions.'
      sequencing: 'Week 1: a/an with singular countable nouns. Week 2: ''the'' for
        specific/known reference. Week 3: Zero article with plurals and uncountables.
        Week 4: Fixed expressions and exceptions.'
      exercises:
      - name: Article Auction
        type: game
        description: Write 20 sentences on cards, each missing an article. Students
          'bid' on whether the blank needs 'a/an', 'the', or no article. Correct answers
          earn points. Students must justify their choice.
        duration: 15
      - name: Bengali to English Article Insertion
        type: translation
        description: Give 15 Bengali sentences in Roman Bengali with no articles.
          Students translate to English, inserting the correct article.
        duration: 15
      - name: Picture Story with Articles
        type: composition
        description: Show 6 pictures telling a story. Students write a paragraph,
          paying attention to article use. First mention gets 'a/an', subsequent mentions
          get 'the'.
        duration: 15
      - name: Article Error Correction in Context
        type: error-correction
        description: Provide a 150-word essay with 15 article errors. Students work
          in pairs to find and correct each error.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Master, P. (1997). The English article system: Acquisition, function, and pedagogy.
      System, 25(2), 215-232.'
    - Chakraborty, R. (2010). Bengali learners and English article acquisition. Journal
      of Bengali Linguistics, 2(1), 1-18.
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
