  tense_aspect_bn:
    interference_patterns:
    - pattern: Using progressive aspect with stative verbs
      example_bengali: ami bojhchhi
      example_gloss: I am understanding
      example_wrong: I am knowing the answer.
      example_correct: I know the answer.
      explanation: Bengali uses the same progressive marker '-ch' with both action
        and stative verbs. English restricts progressive to action verbs only.
    - pattern: Omitting progressive aspect for ongoing actions
      example_bengali: se boi pore
      example_gloss: He book reads
      example_wrong: He reads a book right now.
      example_correct: He is reading a book right now.
      explanation: Bengali simple present can express ongoing action. English requires
        progressive aspect for actions happening at the moment of speaking.
    - pattern: Using simple present for temporary situations
      example_bengali: ami ekhon Dhakay thaki
      example_gloss: I now Dhaka-in live
      example_wrong: I live in Dhaka this week.
      example_correct: I am living in Dhaka this week.
      explanation: Bengali uses simple present for both permanent and temporary situations.
        English uses present progressive to emphasize temporary nature.
    - pattern: Overusing present progressive for habitual actions
      example_bengali: ami protidin ghume theke uthchhi
      example_gloss: I every morning am waking
      example_wrong: I am waking up at 6 every morning.
      example_correct: I wake up at 6 every morning.
      explanation: Bengali progressive can emphasize ongoing nature of habitual actions.
        English uses simple present for habits and routines.
    examples:
    - 'Wrong: ''I am knowing the answer.'' Correct: ''I know the answer.'''
    - 'Wrong: ''He reads a book right now.'' Correct: ''He is reading a book right
      now.'''
    - 'Wrong: ''I live in Dhaka this week.'' Correct: ''I am living in Dhaka this
      week.'''
    - 'Wrong: ''I am waking up at 6 every morning.'' Correct: ''I wake up at 6 every
      morning.'''
    why_it_happens: Bengali aspectual system is organized differently from English.
      Bengali uses the progressive marker '-ch' more freely than English uses '-ing'
      — it can appear with stative verbs and habitual actions where English would
      forbid it. Conversely, Bengali simple present covers many contexts where English
      requires progressive aspect. The stative/action verb distinction governing English
      progressive usage has no parallel in Bengali grammar. Bengali speakers must
      learn that verbs describing states (know, believe, want, love, need, belong,
      seem) cannot take progressive form in English.
    teacher_tips:
      how_to_explain: 'Create two lists: ACTION VERBS (run, eat, read, write) and
        STATE VERBS (know, believe, want, need, love, belong). Say: ''Action verbs
        can wear the -ing costume. State verbs CANNOT.'' Act out running and say ''I
        am running!'' Then try to act out ''know'' and say ''I am knowing!'' — students
        will see it''s absurd.'
      where_to_start: 'Begin with the progressive form: be + -ing. Use actions happening
        RIGHT NOW: ''Rahim is writing.'' Establish the form first, then introduce
        the restriction: ''We say I am running but NOT I am knowing.'''
      sequencing: 'Week 1: Present progressive for actions happening now. Week 2:
        Stative verbs that CANNOT use progressive. Week 3: Simple present for habits
        vs. progressive for temporary situations. Week 4: Past and future progressive.'
      exercises:
      - name: Action or State? Verb Sorting
        type: matching
        description: Give students 25 verb cards. Students sort into Action (can use
          -ing) and State (cannot use -ing) categories. Then create sentences with
          each.
        duration: 15
      - name: Classroom Action Reporter
        type: oral-drill
        description: One student is the 'reporter' describing what everyone is doing.
          Other students act out actions. Reporter must use correct progressive forms.
          Class corrects stative verb errors.
        duration: 10
      - name: Habit vs. Temporary
        type: fill-in-the-blank
        description: Provide 20 sentences with context clues for habit or temporary
          situation. Students choose simple present or present progressive.
        duration: 15
      - name: Stative Verb Error Correction
        type: error-correction
        description: Provide a dialogue with 10 stative verb progressive errors. Students
          correct each and explain why the progressive is wrong.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course, 2nd ed. Heinle & Heinle.'
    - Das, S. (2017). Tense-aspect transfer in Bengali EFL learners. Journal of Language
      Teaching and Research, 8(3), 512-520.
