    notes: Fundamental grammar challenge. High frequency in all learner levels. The
      'to' after modal error is a strong marker of Bengali L1.
  conditional_bn:
    interference_patterns:
    - pattern: Using 'would' in the if-clause
      example_bengali: jodi ami taka thakto
      example_gloss: if I money would have
      example_wrong: If I would have money, I would buy a car.
      example_correct: If I had money, I would buy a car.
      explanation: Bengali uses the same verb form in both clauses of a conditional.
        English requires past simple in the if-clause and 'would' in the main clause
        for second conditional.
    - pattern: Using 'will' in the if-clause instead of present simple
      example_bengali: jodi bristy hoy
      example_gloss: if rain happens
      example_wrong: If it will rain, I will stay home.
      example_correct: If it rains, I will stay home.
      explanation: Bengali does not distinguish verb forms in conditional clauses
        the way English does. English first conditional uses present simple in the
        if-clause and 'will' in the main clause.
    - pattern: Using 'would have' in both clauses of third conditional
      example_bengali: jodi ami esechhilam tami jete partam
      example_gloss: if I had come you would go could
      example_wrong: If I would have studied, I would have passed.
      example_correct: If I had studied, I would have passed.
      explanation: Bengali does not have a distinct third conditional form. Bengali
        speakers may use 'would have' in both clauses by analogy with the main clause.
    - pattern: Confusing second and third conditional structures
      example_bengali: jodi bristy hoye thakto
      example_gloss: if rain had happened
      example_wrong: If it rained yesterday, I would have stayed home.
      example_correct: If it had rained yesterday, I would have stayed home.
      explanation: Bengali conditional marking does not distinguish between hypothetical
        present and hypothetical past as clearly as English does.
    examples:
    - 'Wrong: ''If I would have money.'' Correct: ''If I had money.'''
    - 'Wrong: ''If it will rain.'' Correct: ''If it rains.'''
    - 'Wrong: ''If I would have studied, I would have passed.'' Correct: ''If I had
      studied, I would have passed.'''
    - 'Wrong: ''If it rained yesterday, I would have stayed.'' Correct: ''If it had
      rained yesterday, I would have stayed.'''
    why_it_happens: 'Bengali conditional sentences are formed with the conjunction
      ''jodi'' (if) and do not require the same verb form distinctions as English.
      Bengali uses the same verb form in both the condition and result clauses, and
      the temporal reference is inferred from context. English conditionals require
      specific tense patterns: first conditional (if + present, will + base), second
      conditional (if + past, would + base), third conditional (if + past perfect,
      would have + past participle). Bengali speakers must learn these distinct patterns,
      which have no parallel in their L1.'
    teacher_tips:
      how_to_explain: 'Draw a table on the board with three types: REAL (if + present,
        will), UNLIKELY (if + past, would), IMPOSSIBLE (if + past perfect, would have).
        Say: ''English changes the verb form to show how likely something is. Present
        = possible. Past = unlikely. Past perfect = impossible (already happened).''
        Contrast with Bengali where ''jodi'' works for all three.'
      where_to_start: 'Begin with first conditional (real/possible): ''If it rains,
        I will stay home.'' This is the most common and most useful. Drill extensively
        before introducing second conditional.'
      sequencing: 'Week 1: First conditional (real/possible). Week 2: Second conditional
        (unlikely/hypothetical). Week 3: Third conditional (impossible/past). Week
        4: Mixed conditionals and unless/until.'
      exercises:
      - name: Conditional Type Sorting
        type: matching
        description: Give students 15 conditional sentences. Students sort them into
          first, second, or third conditional and identify the verb pattern used.
        duration: 15
      - name: Conditional Completion
        type: fill-in-the-blank
        description: 'Provide 20 conditional sentences with blanks. Students fill
          in the correct verb form based on the conditional type. Example: ''If I
          ___ (have) time, I would help you.'' (had)'
        duration: 15
      - name: Conditional Chain Stories
        type: oral-drill
        description: 'Teacher starts a conditional chain: ''If I had a million dollars,
          I would buy a car.'' Next student: ''If I bought a car, I would drive to
          Dhaka.'' Continue around the room.'
        duration: 10
      - name: Conditional Error Correction
        type: error-correction
        description: Provide a paragraph with 8 conditional errors (wrong verb forms,
          'would' in if-clause). Students find and correct each error.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course, 2nd ed. Heinle & Heinle.'
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
