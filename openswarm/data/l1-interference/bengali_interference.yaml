  honorifics_bn:
    interference_patterns:
    - pattern: Using first names for elders/superiors without title
      example_bengali: tumi kemon acho?
      example_gloss: you how are? (informal)
      example_wrong: How are you, Rahman? (to a senior colleague)
      example_correct: How are you, Mr. Rahman? / How are you, Sir?
      explanation: Bengali has a complex honorific system (tumi/apni/tui) that distinguishes
        formality levels. English uses titles (Mr., Mrs., Dr.) and formal register.
        Bengali speakers may use first names inappropriately because English lacks
        the same grammaticalized honorific system.
    - pattern: Using informal 'you' register in formal contexts
      example_bengali: tumi khabe?
      example_gloss: you-informal will eat?
      example_wrong: Do you want tea? (to a respected elder, too informal)
      example_correct: Would you like some tea, sir/ma'am? (formal register)
      explanation: Bengali grammatically encodes formality in the pronoun itself (tumi
        = informal, apni = formal). English uses the same pronoun 'you' for all registers
        and relies on word choice and tone.
    - pattern: Omitting politeness markers in requests
      example_bengali: dao
      example_gloss: give (imperative)
      example_wrong: Give me the book. (to a teacher)
      example_correct: Could you please give me the book? / Would you mind passing
        the book?
      explanation: Bengali imperative can be softened through verb forms and particles.
        English requires modal verbs (could, would) and politeness markers (please)
        for formal requests.
    - pattern: Overusing 'sir/ma'am' in inappropriate contexts
      example_bengali: ji, saab / ji, memsaab
      example_gloss: yes, sir / yes, ma'am
      example_wrong: Yes, sir. I understand, sir. Thank you, sir. (excessive)
      example_correct: Yes, I understand. Thank you. (natural English usage)
      explanation: Bengali speakers may overcompensate for the lack of grammaticalized
        honorifics by using 'sir/ma'am' excessively, which sounds unnatural in English.
    examples:
    - 'Wrong: ''How are you, Rahman?'' (to senior) Correct: ''How are you, Mr. Rahman?'''
    - 'Wrong: ''Do you want tea?'' (to elder) Correct: ''Would you like some tea,
      sir?'''
    - 'Wrong: ''Give me the book.'' (to teacher) Correct: ''Could you please give
      me the book?'''
    - 'Wrong: ''Yes, sir. I understand, sir. Thank you, sir.'' Correct: ''Yes, I understand.
      Thank you.'''
    why_it_happens: Bengali has a grammatically encoded honorific system that distinguishes
      at least three levels of formality through pronoun choice (tumi = intimate/informal,
      apni = formal/respectful, tui = very intimate/disrespectful) and corresponding
      verb forms. English has no such grammaticalized system — the same pronoun 'you'
      is used for all registers, and formality is expressed through word choice, modal
      verbs, and tone. Bengali speakers must learn to express respect and formality
      through lexical and syntactic means rather than grammatical ones. This is a
      pragmatic transfer issue rather than a purely grammatical one, making it particularly
      persistent.
    teacher_tips:
      how_to_explain: 'Say: ''In Bengali, you change the word for ''you'' to show
        respect (tumi vs. apni). In English, we use the same word ''you'' but change
        HOW we say it. For respect, we add ''sir/ma''am'', use ''could/would'' instead
        of ''can/will'', and say ''please'' and ''thank you'' more often.'' Role-play
        formal and informal situations.'
      where_to_start: 'Begin with the most common formal situations: talking to teachers,
        elders, and strangers. Practice: ''Could you please...?'' / ''Would you mind...?''
        / ''May I...?'' Contrast with informal: ''Can you...?'' / ''Will you...?'''
      sequencing: 'Week 1: Formal vs. informal requests (could/would vs. can/will).
        Week 2: Using titles (Mr., Mrs., Dr., Professor). Week 3: Formal greetings
        and small talk. Week 4: Workplace and academic register.'
      exercises:
      - name: Formal or Inappropriate? Register Judgment
        type: matching
        description: Give students 15 sentences. Students judge whether each is appropriate
          for the given situation (talking to a boss, a friend, a teacher). Discuss
          why.
        duration: 15
      - name: Formal Request Transformation
        type: transformation
        description: 'Give 10 informal requests. Students transform each into a formal
          version. Example: ''Give me the report.'' > ''Could you please give me the
          report, sir?'''
        duration: 15
      - name: 'Role-Play: Formal Situations'
        type: oral-drill
        description: 'Students role-play formal situations: job interview, meeting
          a professor, speaking to a customer. Focus on appropriate register, titles,
          and politeness markers.'
        duration: 15
      - name: Register Error Correction
        type: error-correction
        description: Provide a dialogue with 8 register errors (too formal, too informal,
          excessive sir/ma'am). Students correct each error.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - 'Brown, P. & Levinson, S.C. (1987). Politeness: Some Universals in Language
      Usage. Cambridge University Press.'
    - Kachru, Y. (2006). Hindi-Urdu. In The World's Major Languages, 2nd ed. Routledge.
