  a_lot_of_bn:
    interference_patterns:
    - pattern: Using 'much' with countable nouns instead of 'many'
      example_bengali: onek manush
      example_gloss: many/much people
      example_wrong: There are much people in the market.
      example_correct: There are many people in the market.
      explanation: Bengali uses 'onek' for both countable and uncountable nouns. English
        distinguishes 'many' (countable) from 'much' (uncountable).
    - pattern: Overusing 'a lot of' in formal writing
      example_bengali: onek tottho
      example_gloss: a lot of information
      example_wrong: A lot of research has been conducted on this topic.
      example_correct: Much research has been conducted on this topic.
      explanation: Bengali speakers overuse 'a lot of' in formal/academic contexts
        where 'much', 'many', 'considerable', or 'numerous' would be more appropriate.
    - pattern: Omitting quantifiers entirely where English requires them
      example_bengali: boi achhe
      example_gloss: books exist
      example_wrong: I have book.
      example_correct: I have some books.
      explanation: Bare nouns in Bengali express indefinite quantity without any quantifier.
        English requires a quantifier or article before plural and uncountable nouns.
    - pattern: Confusing 'few/a few' and 'little/a little'
      example_bengali: ek-tu jol
      example_gloss: a little water
      example_wrong: I have few water left.
      example_correct: I have a little water left.
      explanation: Bengali uses 'ek-tu' for both countable and uncountable contexts.
        English distinguishes 'few/a few' (countable) from 'little/a little' (uncountable).
    examples:
    - 'Wrong: ''There are much people.'' Correct: ''There are many people.'''
    - 'Wrong: ''I have few water.'' Correct: ''I have a little water.'''
    - 'Wrong: ''She has friend.'' Correct: ''She has some friends.'''
    - 'Wrong: ''He gave me advice.'' Correct: ''He gave me some advice.'''
    why_it_happens: Bengali quantifier system is fundamentally different from English.
      Bengali uses 'onek' as a universal quantifier for both countable and uncountable
      nouns. There is no grammatical countable/uncountable distinction in Bengali
      quantification. Additionally, Bengali allows bare nouns without any quantifier
      to express indefinite quantity. The 'few/a few' vs 'little/a little' distinction
      is particularly challenging because Bengali uses 'ek-tu' for both concepts.
      The semantic difference between 'few' (not enough, negative) and 'a few' (some,
      positive) has no parallel in Bengali.
    teacher_tips:
      how_to_explain: 'Draw a two-column chart: COUNTABLE (many, few, a few, several)
        and UNCOUNTABLE (much, little, a little, a great deal of). Show that Bengali
        ''onek'' covers BOTH columns. Use physical objects: count apples (many apples)
        vs. pour water (much water). Emphasize that English ''counts'' the type of
        noun before choosing the quantifier.'
      where_to_start: Start with the countable/uncountable noun distinction. Give
        students 20 nouns to sort. Then introduce 'many' for countable and 'much'
        for uncountable. Only after this is solid, introduce 'few/a few' vs 'little/a
        little'.
      sequencing: 'Week 1: Countable vs. uncountable nouns. Week 2: many/much with
        practice. Week 3: few/a few vs. little/a little. Week 4: some, any, a lot
        of in affirmative, negative, and interrogative contexts.'
      exercises:
      - name: Quantifier Sorting Game
        type: matching
        description: Prepare cards with quantifiers and nouns. Students match each
          quantifier to appropriate nouns and create sentences.
        duration: 15
      - name: Much or Many? Rapid Fire
        type: oral-drill
        description: Teacher calls out a noun. Students immediately say 'much [noun]'
          or 'many [nouns]' and use it in a sentence. Speed builds automaticity.
        duration: 10
      - name: Quantifier Error Correction
        type: error-correction
        description: Provide a paragraph with 12 quantifier errors typical of Bengali
          speakers. Students identify and correct each error.
        duration: 15
      - name: Shopping List Quantifiers
        type: composition
        description: Students write a shopping list for 20 people using at least 8
          different quantifiers correctly.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Biber, D. et al. (1999). Longman Grammar of Spoken and Written English. Pearson.
    - Chakraborty, R. (2010). Bengali learners and English article acquisition. Journal
      of Bengali Linguistics, 2(1), 1-18.
    - 'Mukherjee, J. (2005). English ditransitive verbs: Aspects of theory, description
      and a usage-based model. Rodopi.'
