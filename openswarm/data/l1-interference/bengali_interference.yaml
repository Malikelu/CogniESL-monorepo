  article_detailed_bn:
    interference_patterns:
    - pattern: Using 'the' with proper nouns
      example_bengali: se Dhaka jabe
      example_gloss: He Dhaka will go
      example_wrong: He went to the Dhaka.
      example_correct: He went to Dhaka.
      explanation: Bengali does not use articles with proper nouns, and speakers may
        overgeneralize 'the' to proper nouns in English based on definiteness patterns.
    - pattern: Omitting 'the' with unique reference nouns
      example_bengali: surjo purbe othe
      example_gloss: sun east rises
      example_wrong: Sun rises in east.
      example_correct: The sun rises in the east.
      explanation: Bengali does not use articles for unique reference. English requires
        'the' with unique nouns (the sun, the moon, the earth).
    - pattern: Using 'a/an' with uncountable nouns
      example_bengali: ek-ta jol dao
      example_gloss: one-CL water give
      example_wrong: Give me a water.
      example_correct: Give me some water. / Give me a glass of water.
      explanation: Bengali uses the classifier '-ta' with uncountable nouns to make
        them countable. Bengali speakers transfer this by using 'a/an' with English
        uncountable nouns.
    - pattern: Omitting articles in fixed expressions
      example_bengali: ami school-e jai
      example_gloss: I school go
      example_wrong: I go to school. (correct) vs. I go to the school. (incorrect
        for general meaning)
      example_correct: I go to school. (general activity) / I go to the school. (specific
        building)
      explanation: Bengali does not distinguish between 'go to school' (general) and
        'go to the school' (specific) through articles. This distinction is uniquely
        English.
    examples:
    - 'Wrong: ''He went to the Dhaka.'' Correct: ''He went to Dhaka.'''
    - 'Wrong: ''Sun rises in east.'' Correct: ''The sun rises in the east.'''
    - 'Wrong: ''Give me a water.'' Correct: ''Give me some water.'''
    - 'Wrong: ''I go to the school every day.'' (general) Correct: ''I go to school
      every day.'''
    why_it_happens: 'This entry covers advanced article usage beyond the basic a/an/the
      rules. Bengali speakers who have mastered basic article usage still struggle
      with subtle distinctions: proper nouns (no ''the'' before Dhaka), unique reference
      (''the sun''), uncountable nouns (''a water'' vs. ''some water''), and fixed
      expressions (''go to school'' vs. ''go to the school''). These errors persist
      because they require understanding English-specific conventions that have no
      parallel in Bengali. The fixed expression errors are particularly persistent
      because they must be learned individually.'
    teacher_tips:
      how_to_explain: 'Say: ''Articles in English have many special rules beyond a/an/the.
        Some places don''t use ''the'' (Dhaka, Bangladesh). Some things always use
        ''the'' (the sun, the internet). Some phrases never use articles (go to school,
        go to bed).'' Create a reference sheet of the most common special cases.'
      where_to_start: 'Begin with proper nouns: countries, cities, lakes (no ''the'')
        vs. rivers, oceans, mountain ranges (with ''the''). Then introduce unique
        reference nouns. Then fixed expressions.'
      sequencing: 'Week 1: Proper nouns and geographical names. Week 2: Unique reference
        (the sun, the internet). Week 3: Fixed expressions (go to school, at home).
        Week 4: Review and practice all special cases.'
      exercises:
      - name: Article Special Cases Quiz
        type: game
        description: 'Teacher reads 20 sentences. Students hold up cards: ''a/an'',
          ''the'', or ''no article''. Discuss each answer. Example: ''He lives in
          ___ Dhaka.'' (no article) / ''___ Nile is in Egypt.'' (the)'
        duration: 15
      - name: Fixed Expression Matching
        type: matching
        description: 'Give students common fixed expressions. Students match each
          to its correct form: go to school (not ''the school''), at home (not ''the
          home''), in bed (not ''the bed'').'
        duration: 10
      - name: Article Special Cases Error Correction
        type: error-correction
        description: Provide a 200-word essay with 10 advanced article errors (proper
          nouns, unique reference, fixed expressions). Students find and correct each
          error.
        duration: 15
      - name: Article Decision Flowchart
        type: composition
        description: Students create a flowchart for deciding which article to use,
          including special cases. Present and discuss with the class.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Master, P. (1997). The English article system: Acquisition, function, and pedagogy.
      System, 25(2), 215-232.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Yule, G. (1998). Explaining English Grammar. Oxford University Press.
