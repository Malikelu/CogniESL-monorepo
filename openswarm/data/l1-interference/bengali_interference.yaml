  copula_omission_bn:
    interference_patterns:
    - pattern: Omitting 'be' copula in equational sentences
      example_bengali: se Daktar
      example_gloss: He doctor
      example_wrong: He doctor.
      example_correct: He is a doctor.
      explanation: Bengali allows zero copula in present tense equational sentences.
        English requires 'be' in all equational sentences.
    - pattern: Omitting 'be' before adjectives
      example_bengali: ami klanto
      example_gloss: I tired
      example_wrong: I tired.
      example_correct: I am tired.
      explanation: Bengali adjectives can predicate directly without a copula. English
        requires 'be' before predicate adjectives.
    - pattern: Omitting 'be' in progressive constructions
      example_bengali: se khachchhe
      example_gloss: He eating
      example_wrong: He eating rice.
      example_correct: He is eating rice.
      explanation: Bengali progressive is marked on the verb alone. English requires
        'be' + -ing for progressive aspect.
    - pattern: Omitting 'be' in passive voice
      example_bengali: boi-ta lekha hoyechhe
      example_gloss: book written has been
      example_wrong: The book written.
      example_correct: The book has been written.
      explanation: Bengali passive is formed with verb conjugation alone. English
        requires 'be' + past participle for passive voice.
    examples:
    - 'Wrong: ''He doctor.'' Correct: ''He is a doctor.'''
    - 'Wrong: ''I tired.'' Correct: ''I am tired.'''
    - 'Wrong: ''He eating rice.'' Correct: ''He is eating rice.'''
    - 'Wrong: ''The book written.'' Correct: ''The book has been written.'''
    why_it_happens: Bengali is a zero-copula language in the present tense. The verb
      'to be' is not required in equational sentences (He doctor), predicate adjective
      constructions (I tired), or locative expressions (He at home). English requires
      'be' in all these contexts. The omission is systematic in Bengali — it is not
      an error in the L1 but a fundamental grammatical feature. Bengali speakers must
      learn that English always requires a copula in these contexts.
    teacher_tips:
      how_to_explain: 'Say: ''In Bengali, you can say ''He doctor'' or ''I tired.''
        In English, these sentences are INCOMPLETE without ''am/is/are.'' English
        always needs a linking word between the subject and what describes it.'' Draw
        a bridge on the board between subject and predicate, labeled ''BE.'' Say:
        ''This bridge is always required in English.'''
      where_to_start: 'Begin with the most common pattern: subject + BE + noun/adjective.
        Use classroom contexts: ''I am a student.'' ''She is tall.'' ''We are happy.''
        Drill the three forms: am (I), is (he/she/it), are (we/you/they).'
      sequencing: 'Week 1: BE with nouns (I am a student). Week 2: BE with adjectives
        (She is tall). Week 3: BE in progressive (He is eating). Week 4: BE in passive
        (It was made).'
      exercises:
      - name: Copula Insertion Drill
        type: fill-in-the-blank
        description: Provide 20 Bengali-style sentences without 'be.' Students insert
          the correct form of 'be' (am/is/are/was/were).
        duration: 15
      - name: Self-Introduction Practice
        type: oral-drill
        description: 'Students introduce themselves and classmates using ''be'': ''I
          am Marcos. She is Fatima. We are students.'' Focus on correct copula use.'
        duration: 10
      - name: BE or BE NOT? Error Correction
        type: error-correction
        description: Provide a paragraph with 10 copula omissions. Students find and
          correct each error.
        duration: 15
      - name: Classroom Description
        type: composition
        description: Students write 10 sentences describing the classroom and people
          in it, using 'be' correctly.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Bhattacharya, T. (2007). Copula omission in Bengali EFL learners. Indian Linguistics,
      68, 45-62.
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
