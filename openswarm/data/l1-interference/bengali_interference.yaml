  plural_marking_bn:
    interference_patterns:
    - pattern: Omitting plural -s after numbers and quantifiers
      example_bengali: panch-ti boi
      example_gloss: five book
      example_wrong: I bought five book yesterday.
      example_correct: I bought five books yesterday.
      explanation: Bengali uses numeral classifiers with the bare noun. English requires
        plural -s even after explicit numbers.
    - pattern: Using irregular plural forms incorrectly
      example_bengali: shishura
      example_gloss: children (regular suffix)
      example_wrong: The childs are playing in the park.
      example_correct: The children are playing in the park.
      explanation: Bengali forms plurals with regular suffixes for all nouns. English
        has irregular plurals that must be memorized.
    - pattern: Double-marking plurals on already-plural forms
      example_bengali: N/A
      example_gloss: N/A
      example_wrong: The peoples are very friendly.
      example_correct: The people are very friendly.
      explanation: Some English nouns have identical singular and plural forms. Bengali
        speakers may add -s because their L1 always marks plural.
    - pattern: Using plural with 'there is' instead of 'there are'
      example_bengali: sekahne onek manush achhe
      example_gloss: there many people exists
      example_wrong: There is many people in the room.
      example_correct: There are many people in the room.
      explanation: Bengali uses a single existential verb 'achhe' regardless of number.
        English requires there is/are agreement.
    examples:
    - 'Wrong: ''I bought five book.'' Correct: ''I bought five books.'''
    - 'Wrong: ''The childs are playing.'' Correct: ''The children are playing.'''
    - 'Wrong: ''The peoples are friendly.'' Correct: ''The people are friendly.'''
    - 'Wrong: ''There is many people.'' Correct: ''There are many people.'''
    why_it_happens: Bengali plural marking is optional and primarily used for animate
      nouns. When a numeral and classifier precede the noun, no plural marking is
      used. Bengali has no irregular plurals — the same suffixes work for all nouns.
      English irregular plurals are challenging because there is no L1 pattern. The
      'there is/are' distinction is problematic because Bengali uses a single existential
      form regardless of number.
    teacher_tips:
      how_to_explain: 'Write: ''In Bengali, you say five book (panch-ti boi). In English,
        you MUST say five books. Even with a number, add -s.'' Create a chart of irregular
        plurals: child>children, man>men, woman>women, foot>feet, tooth>teeth, mouse>mice,
        person>people.'
      where_to_start: 'Begin with the basic rule: add -s. Use classroom objects: ''one
        book, two books.'' Then introduce the rule that even after numbers, English
        adds -s. Then introduce irregular plurals.'
      sequencing: 'Week 1: Regular plural -s. Week 2: Plurals after numbers. Week
        3: Irregular plurals. Week 4: There is/are agreement and zero-plurals.'
      exercises:
      - name: Plural Formation Drill
        type: oral-drill
        description: 'Teacher says a singular noun. Students say the plural immediately.
          Start regular, then mix in irregular. Speed round: how many in 60 seconds?'
        duration: 10
      - name: Number + Noun Plural Practice
        type: fill-in-the-blank
        description: Provide 15 sentences with numbers. Students write the correct
          plural form, including irregulars.
        duration: 15
      - name: There Is / There Are Agreement
        type: error-correction
        description: Provide 12 sentences with there is/are errors. Students correct
          each and explain the rule.
        duration: 15
      - name: Irregular Plural Memory Game
        type: game
        description: 'Matching cards: singular on one, plural on another. Students
          play memory game matching singular to plural.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course, 2nd ed. Heinle & Heinle.'
    - Das, S. (2017). Plural marking transfer in Bengali EFL learners. Journal of
      Language Teaching and Research, 8(3), 512-520.
