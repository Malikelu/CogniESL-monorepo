  passive_voice_bn:
    interference_patterns:
    - pattern: Using past participle without auxiliary 'be'
      example_bengali: boi-ta lekha hoyechhe
      example_gloss: book written has become
      example_wrong: The book written by Tagore.
      example_correct: The book was written by Tagore.
      explanation: Bengali passive is formed with verb conjugation alone. English
        requires 'be' + past participle.
    - pattern: Using base form instead of past participle in passive
      example_bengali: N/A
      example_gloss: N/A
      example_wrong: The letter was send yesterday.
      example_correct: The letter was sent yesterday.
      explanation: Bengali speakers may use the base verb form where English requires
        the past participle in passive constructions.
    - pattern: Avoiding passive voice entirely, using active instead
      example_bengali: se bondho korechhe
      example_gloss: He closed has
      example_wrong: He has closed the door. (when passive is needed)
      example_correct: The door has been closed.
      explanation: Bengali uses passive less frequently than English. Bengali speakers
        may avoid passive constructions even when they are the natural choice in English.
    - pattern: Confusing stative 'be' + adjective with passive 'be' + past participle
      example_bengali: darja khola achhe
      example_gloss: door open exists
      example_wrong: The door is opened. (stative meaning)
      example_correct: The door is open. (stative) / The door was opened. (passive
        action)
      explanation: Bengali uses existential constructions for states that English
        expresses with 'be' + adjective or 'be' + past participle.
    examples:
    - 'Wrong: ''The book written by Tagore.'' Correct: ''The book was written by Tagore.'''
    - 'Wrong: ''The letter was send.'' Correct: ''The letter was sent.'''
    - 'Wrong: ''He has closed the door.'' (when passive needed) Correct: ''The door
      has been closed.'''
    - 'Wrong: ''The door is opened.'' (stative) Correct: ''The door is open.'''
    why_it_happens: Bengali passive voice is formed differently from English. Bengali
      uses verb conjugation patterns (kora hoy, 'is done') rather than 'be' + past
      participle. The Bengali passive is used less frequently than English passive,
      and many concepts expressed with passive in English are expressed with active
      or existential constructions in Bengali. Bengali speakers may avoid passive
      because it feels unnatural, or they may produce incomplete passives by omitting
      the auxiliary 'be'.
    teacher_tips:
      how_to_explain: 'Write on the board: ''PASSIVE = BE + PAST PARTICIPLE.'' Show
        that Bengali says ''kora hoy'' but English says ''is done.'' Emphasize that
        English ALWAYS needs a form of ''be'' before the past participle. Use a simple
        demonstration: break a pencil and say ''The pencil WAS BROKEN (by me).'' Contrast
        with active: ''I broke the pencil.'''
      where_to_start: 'Begin with simple present passive: ''Rice is grown in Bangladesh.''
        / ''English is spoken here.'' Establish the form (be + past participle) before
        introducing past passive.'
      sequencing: 'Week 1: Simple present passive (is/are + past participle). Week
        2: Simple past passive (was/were + past participle). Week 3: Passive with
        modals (can be done, should be made). Week 4: When to use passive vs. active.'
      exercises:
      - name: Active to Passive Transformation
        type: transformation
        description: 'Give 10 active sentences. Students transform each to passive.
          Example: ''Shakespeare wrote Hamlet.'' > ''Hamlet was written by Shakespeare.'''
        duration: 15
      - name: Past Participle Recognition
        type: matching
        description: Give students base verbs and past participles. Students match
          each base form to its past participle. Include irregular forms.
        duration: 10
      - name: Passive Error Correction
        type: error-correction
        description: Provide a paragraph with 8 passive voice errors (missing 'be',
          wrong participle form). Students find and correct each error.
        duration: 15
      - name: News Report in Passive
        type: composition
        description: Students write a short news report (5 sentences) about a fictional
          event, using passive voice appropriately.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course, 2nd ed. Heinle & Heinle.'
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
