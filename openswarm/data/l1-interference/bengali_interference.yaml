language: bengali
schema_version: '3.0'
grammar_points:
  word_order_bn:
    interference_patterns:
    - pattern: SOV word order transferred to English SVO structure
      example_bengali: আমি ভাত খাই (ami bhat khai)
      example_gloss: I rice eat
      example_wrong: I rice eat.
      example_correct: I eat rice.
      explanation: Bengali is a strict SOV language where the verb always comes at
        the end. English requires SVO order. Bengali speakers routinely place the
        object before the verb because their native word order is deeply automatized
        from childhood.
    - pattern: Time expressions placed before the verb instead of at clause boundaries
      example_bengali: আমি গতকাল স্কুলে গেলাম (ami kal school-e gelam)
      example_gloss: I yesterday school went
      example_wrong: I went yesterday to school.
      example_correct: Yesterday I went to school.
      explanation: In Bengali, time adverbials typically appear right before the verb
        (S-Adv-O-V). In English, time expressions usually go at the beginning or end
        of the clause.
    - pattern: Postpositional phrases placed before verb without English preposition
        restructuring
      example_bengali: সে বাড়িতে যায় (se baṛite jay)
      example_gloss: He home-to goes
      example_wrong: He goes to home.
      example_correct: He goes home.
      explanation: Bengali uses postpositions (-te, -er) that come AFTER the noun.
        English uses prepositions that come BEFORE.
    - pattern: Relative clause correlative structure transferred to English
      example_bengali: যে ছেলেটি এসেছে সে আমার ভাই (je chhele-ti esechhe se amar bhai)
      example_gloss: that boy came he my brother
      example_wrong: The boy what came he is my brother.
      example_correct: The boy who came is my brother.
      explanation: Bengali uses correlative relative clauses (je...se) that are structurally
        different from English relative clauses using who/which/that.
    examples:
    - 'Wrong: ''I rice eat.'' Correct: ''I eat rice.'''
    - 'Wrong: ''She book reads.'' Correct: ''She reads a book.'''
    - 'Wrong: ''Yesterday I went to home.'' Correct: ''Yesterday I went home.'''
    - 'Wrong: ''He to school goes every day.'' Correct: ''He goes to school every
      day.'''
    why_it_happens: Bengali is a head-final, Subject-Object-Verb (SOV) language, meaning
      the verb consistently appears at the end of the clause. English is head-initial,
      Subject-Verb-Object (SVO). This is the most fundamental structural difference
      between the two languages. Bengali speakers transfer the SOV order to English
      because their native word order is deeply automatized from childhood acquisition.
      The error persists because Bengali has relatively free word order for emphasis
      with case markers doing the grammatical work, so speakers may not realize English
      word order is rigidly fixed. Additionally, Bengali uses postpositions rather
      than prepositions, which further scrambles the expected English order. The verb-final
      habit is reinforced by Bengali subordinate clauses also placing the verb at
      the end.
    teacher_tips:
      how_to_explain: 'Draw two columns on the board. Write a Bengali sentence in
        SOV order on the left with each word''s role color-coded (Subject=blue, Object=green,
        Verb=red). On the right, show the English SVO equivalent with the same colors.
        Physically move the verb from the end to the middle. Say: ''In Bengali, the
        action word comes LAST. In English, the action word comes in the MIDDLE, right
        after who does it.'' Use three students to physically demonstrate SOV-to-SVO
        rearrangement.'
      where_to_start: 'Begin with the simplest SVO sentence: ''I eat rice.'' Show
        the Bengali equivalent ami bhat khai and map each word. Establish that English
        ALWAYS puts the verb between subject and object. Use 5-6 concrete examples
        before introducing adverbs.'
      sequencing: 'Week 1: Basic SVO order with simple present tense. Week 2: SVO
        with time adverbials. Week 3: SVO with prepositional phrases. Week 4: SVO
        in questions requiring auxiliary inversion.'
      exercises:
      - name: 'Sentence Scramble: SOV to SVO'
        type: transformation
        description: Give students 10 Bengali sentences in Roman Bengali. Students
          identify Subject, Object, and Verb, then rewrite each in correct English
          SVO order. Teacher checks that students move the verb to the middle position.
        duration: 15
      - name: Picture Description Drill
        type: oral-drill
        description: 'Show simple action pictures. Students describe each using correct
          SVO order. Teacher models first: ''The boy eats an apple.'' If a student
          says ''Boy apple eats,'' teacher gently corrects by pointing to the SVO
          diagram.'
        duration: 10
      - name: 'Error Hunt: Find the Word Order Mistake'
        type: error-correction
        description: 'Provide a paragraph of 12 sentences, 8 with Bengali-style SOV
          errors. Students work in pairs to find and correct each error. Example:
          ''She tea drinks every morning.'' / ''They cricket play on Sundays.'''
        duration: 15
      - name: Translation Relay Race
        type: translation
        description: Divide class into two teams. Teacher calls out a Bengali sentence.
          First team member translates to correct English SVO order on the board.
          If correct, team gets a point. If wrong, other team can steal.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Kachru, Y. (2006). Hindi-Urdu. In The World's Major Languages, 2nd ed. Routledge.
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Das, S. (2017). Word order transfer in Bengali EFL learners. Journal of Language
      Teaching and Research, 8(3), 512-520.
    source_count: 4
    source_type: literature
    frequency: 5
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Bengali. Most fundamental
      Bengali L1 interference error. Affects all proficiency levels.
    notes: Most fundamental Bengali L1 interference error. Affects all proficiency
      levels. SOV to SVO transfer is the single most pervasive structural error.
  postpositions_bn:
    interference_patterns:
    - pattern: Postposition placed after noun instead of preposition before noun
      example_bengali: tebiler upor
      example_gloss: table-of on
      example_wrong: table on
      example_correct: on the table
      explanation: Bengali uses postpositions that come AFTER the noun they modify.
        English uses prepositions that come BEFORE.
    - pattern: Locative postposition '-e' causing double preposition
      example_bengali: se Dhakay thake
      example_gloss: He Dhaka-in lives
      example_wrong: He lives in in Dhaka.
      example_correct: He lives in Dhaka.
      explanation: Bengali speakers may double the preposition by translating both
        the Bengali postposition and adding the English preposition.
    - pattern: Source postposition '-theke' causing redundancy
      example_bengali: se Kolkata theke esechhe
      example_gloss: He Kolkata from has come
      example_wrong: He came from from Kolkata.
      example_correct: He came from Kolkata.
      explanation: Bengali speakers may redundantly add 'from' while also translating
        '-theke'.
    - pattern: Genitive postposition '-er' with wrong word order
      example_bengali: Ramer boi
      example_gloss: Ram-of book
      example_wrong: book of Ram
      example_correct: Ram's book
      explanation: Bengali uses '-er' as a genitive postposition after the possessor.
        English uses possessive 's or 'of' with different word order.
    examples:
    - 'Wrong: ''table on'' Correct: ''on the table'''
    - 'Wrong: ''He lives in in Dhaka.'' Correct: ''He lives in Dhaka.'''
    - 'Wrong: ''He came from from Kolkata.'' Correct: ''He came from Kolkata.'''
    - 'Wrong: ''book of Ram'' Correct: ''Ram''s book'''
    why_it_happens: 'Bengali is a postpositional language: relational words come AFTER
      the noun phrase. Key Bengali postpositions include ''-e'' (in/at), ''-theke''
      (from), ''-er'' (of), ''-poryonto'' (until), ''-shoho'' (with), and ''-jonno''
      (for). English places all these relational words BEFORE the noun. This head-final
      vs. head-initial difference means Bengali speakers must restructure their entire
      spatial and relational thinking. The error is particularly persistent because
      Bengali postpositions are bound to the noun with case markers, making the noun-postposition
      unit feel like a single inseparable chunk.'
    teacher_tips:
      how_to_explain: 'Use a physical demonstration with a book and table. Place the
        book ON the table and say ''on the table.'' Move it: ''under,'' ''behind,''
        ''in front of.'' Show the relationship word comes FIRST in English. Contrast
        with Bengali ''tebiler upor'' (table-of on) where it comes LAST. Create a
        reference chart of the 8 most common Bengali postpositions and their English
        equivalents.'
      where_to_start: Begin with spatial prepositions (in, on, under, behind, in front
        of, next to) using real objects. Have students physically place items and
        describe positions. This builds the preposition-before-noun pattern kinesthetically.
      sequencing: 'Week 1: Spatial prepositions with physical objects. Week 2: Time
        prepositions (at, on, in). Week 3: Abstract prepositional uses (about, for,
        with). Week 4: Prepositional verbs and collocations.'
      exercises:
      - name: Classroom Treasure Hunt
        type: oral-drill
        description: 'Hide objects around the classroom. Give clues using prepositions:
          ''The key is UNDER the red book.'' Students find each object and say the
          full sentence. Reinforces preposition-first word order through physical
          action.'
        duration: 15
      - name: Postposition to Preposition Mapping Chart
        type: matching
        description: 'Two-column chart: Bengali postpositions (-e, -theke, -er, -poryonto,
          -shoho, -jonno) and English prepositions (in/at, from, of, until, with,
          for). Students connect each pair and write 2 example sentences.'
        duration: 15
      - name: Preposition Fill-in from Bengali Prompts
        type: fill-in-the-blank
        description: Provide 15 Bengali sentences with postpositions underlined. Students
          translate to English, correctly placing the preposition BEFORE the noun.
        duration: 15
      - name: Picture Description with Prepositions
        type: composition
        description: Show a detailed picture (a room with furniture, people, objects).
          Students write 10 sentences describing where things are, using prepositions
          correctly.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Bhattacharya, T. (2007). Bengali postpositions and their English equivalents.
      Indian Linguistics, 68, 45-62.
    - Mohanan, T. (1994). Argument Structure in Hindi. CSLI Publications.
