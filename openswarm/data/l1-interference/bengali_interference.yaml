  noun_number_bn:
    interference_patterns:
    - pattern: Treating uncountable nouns as countable and adding plural -s
      example_bengali: totthogulo
      example_gloss: informations
      example_wrong: I need some informations about the course.
      example_correct: I need some information about the course.
      explanation: Bengali can pluralize virtually any noun. English has a strict
        countable/uncountable distinction.
    - pattern: Omitting plural -s on countable nouns after numbers
      example_bengali: tin-ti boi
      example_gloss: three book
      example_wrong: I have three book.
      example_correct: I have three books.
      explanation: Bengali nouns do not change form after numeral classifiers. English
        requires plural -s even after numbers.
    - pattern: Using 'many' with uncountable nouns
      example_bengali: onek gobeshona
      example_gloss: many research
      example_wrong: Many research has been done on this topic.
      example_correct: Much research has been done on this topic.
      explanation: Bengali 'onek' works with all nouns. English requires 'many' for
        countable and 'much' for uncountable.
    - pattern: Using plural with 'every', 'each', 'a'
      example_bengali: pratiti shikkharthira
      example_gloss: every students
      example_wrong: Every students should bring their book.
      example_correct: Every student should bring their book.
      explanation: Bengali plural markers can co-occur with distributive quantifiers.
        English requires singular after 'every', 'each', 'a/an'.
    examples:
    - 'Wrong: ''I need some informations.'' Correct: ''I need some information.'''
    - 'Wrong: ''I have three book.'' Correct: ''I have three books.'''
    - 'Wrong: ''Many research has been done.'' Correct: ''Much research has been done.'''
    - 'Wrong: ''Every students should bring their book.'' Correct: ''Every student
      should bring their book.'''
    why_it_happens: 'Bengali noun number system is fundamentally different from English.
      Bengali nouns do not obligatorily mark plural — the bare noun form is used with
      numerals and classifiers. There is no grammatical countable/uncountable distinction
      in Bengali. English has a strict binary: countable nouns must take plural -s,
      and uncountable nouns CANNOT. This creates a double challenge: Bengali speakers
      must learn which English nouns are uncountable AND remember to add -s to countable
      nouns after numbers.'
    teacher_tips:
      how_to_explain: 'Create two boxes: COUNTABLE (books, cars, people) and UNCOUNTABLE
        (water, information, advice, furniture). Say: ''In English, information is
        like water — you can''t count it. You say some information or a piece of information,
        NEVER informations.'' Use the ''Can I count it?'' test.'
      where_to_start: 'Begin with the most common uncountable nouns: information,
        advice, furniture, luggage, equipment, research, homework, news. Create a
        ''NEVER ADD -S'' poster. Drill: ''some information'' (NOT ''informations'').'
      sequencing: 'Week 1: Countable vs. uncountable distinction. Week 2: Plural -s
        after numbers. Week 3: much/many distinction. Week 4: Partitive expressions
        (a piece of, a cup of).'
      exercises:
      - name: Countable or Uncountable? Noun Sorting
        type: matching
        description: Give students 30 noun cards. Students sort into countable and
          uncountable. For each uncountable, create a partitive expression.
        duration: 15
      - name: Plural Error Correction
        type: error-correction
        description: Provide a paragraph with 12 noun number errors. Students identify
          and correct each error.
        duration: 15
      - name: Partitive Expression Builder
        type: fill-in-the-blank
        description: Provide 15 uncountable nouns. Students create partitive expressions
          and use each in a complete sentence.
        duration: 15
      - name: Shopping Quantifiers
        type: composition
        description: Students write a shopping list with correct quantifiers and noun
          forms for at least 5 countable and 5 uncountable items.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Biber, D. et al. (1999). Longman Grammar of Spoken and Written English. Pearson.
    - Master, P. (2002). Information structure and English pedagogy. System, 30(3),
      341-349.
