  pronoun_case_bn:
    interference_patterns:
    - pattern: Using subject pronouns in object positions
      example_bengali: amake — me
      example_gloss: me
      example_wrong: I see he at the market.
      example_correct: I see him at the market.
      explanation: Bengali pronouns change form based on case, but the system differs
        from English. Bengali speakers may use subject forms where English requires
        object forms.
    - pattern: Omitting subject pronouns (pro-drop transfer)
      example_bengali: jai
      example_gloss: go (I)
      example_wrong: Am going to school.
      example_correct: I am going to school.
      explanation: Bengali is a pro-drop language — subject pronouns can be dropped.
        English requires an explicit subject in every sentence.
    - pattern: Using 'he/she' for inanimate objects
      example_bengali: se — used for both people and things
      example_gloss: he/she/it
      example_wrong: Where is the book? He is on the table.
      example_correct: Where is the book? It is on the table.
      explanation: Bengali uses 'se' for both animate and inanimate referents. English
        requires 'it' for inanimate objects.
    - pattern: Confusing pronoun forms in compound subjects/objects
      example_bengali: ami ar se
      example_gloss: I and he
      example_wrong: Me and him went to the store.
      example_correct: He and I went to the store.
      explanation: Bengali does not change pronoun form based on position in compound
        phrases the way English does.
    examples:
    - 'Wrong: ''I see he.'' Correct: ''I see him.'''
    - 'Wrong: ''Am going to school.'' Correct: ''I am going to school.'''
    - 'Wrong: ''Where is the book? He is on the table.'' Correct: ''Where is the book?
      It is on the table.'''
    - 'Wrong: ''Me and him went.'' Correct: ''He and I went.'''
    why_it_happens: Bengali pronouns have a different case system from English. Bengali
      is a pro-drop language, meaning subject pronouns can be omitted when recoverable
      from context — English always requires an explicit subject. Bengali uses the
      same pronoun 'se' for 'he', 'she', and 'it', so speakers struggle with English's
      gender/neuter distinction. Compound subject/object confusion arises because
      Bengali does not change pronoun form based on position in a compound phrase.
    teacher_tips:
      how_to_explain: 'Create a pronoun chart: Subject (I, you, he, she, it, we, they)
        vs. Object (me, you, him, her, it, us, them). Use a test: ''If you can put
        verb right after it, use subject form. If someone does something TO them,
        use object form.'' For pro-drop: ''In English, you MUST say WHO is going.
        Every sentence needs a subject.'''
      where_to_start: 'Begin with subject/object distinction using I/me, he/him, she/her.
        Use simple sentences: ''I see him.'' ''He sees me.'' Drill extensively before
        introducing compound subjects.'
      sequencing: 'Week 1: Subject vs. object pronouns. Week 2: Pro-drop correction.
        Week 3: It for inanimate objects. Week 4: Compound subjects/objects and polite
        order.'
      exercises:
      - name: Pronoun Case Rapid Fire
        type: oral-drill
        description: Teacher says a sentence with a blank. Students fill in the correct
          pronoun form. Speed matters for building automaticity.
        duration: 10
      - name: Pro-Drop Correction
        type: error-correction
        description: Provide 15 sentences with missing subjects. Students add the
          correct subject pronoun and explain their choice.
        duration: 15
      - name: He, She, or It? Pronoun Reference
        type: matching
        description: Give a paragraph with 10 pronoun blanks. Students choose the
          correct pronoun based on the antecedent (people vs. objects).
        duration: 15
      - name: Compound Pronoun Correction
        type: error-correction
        description: Provide 10 sentences with compound pronoun errors. Students correct
          each and explain the rule. Discuss polite order.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Thompson, H.R. (2012). Bengali: A Comprehensive Grammar. Routledge.'
    - Bhattacharya, T. (2007). Pronominal transfer in Bengali EFL learners. Indian
      Linguistics, 68, 45-62.
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
