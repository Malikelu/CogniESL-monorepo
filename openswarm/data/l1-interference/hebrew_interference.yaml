language: hebrew
schema_version: '3.0'
grammar_points:
  article_system_he:
    interference_patterns:
    - Hebrew uses no vowels in writing which does not exist in English, causing transfer
      errors related to 'article system he'.
    why_it_happens: Hebrew handles 'article system he' differently from English. Hebrew
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Hebrew structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Hebrew and English for 'article
        system he'. Show the Hebrew structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Hebrew handles
        'article system he' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Hebrew sentences, students translate to English, focusing
          on correct 'article system he' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Hebrew-style 'article system he' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'article
          system he' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'article system
          he' errors.
        duration: 15
    examples:
    - 'Wrong: ''She is article system he.'' Correct: ''She is a article system he.'''
    - 'Wrong: ''I like the article system he.'' (general) Correct: ''I like article
      system he.'''
    - 'Wrong: ''I have article system he.'' Correct: ''I have a article system he.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Ard, J. & Gass, S. (1987). Lexical constraints on syntactic acquisition. Studies
      in Second Language Acquisition, 9(2), 233-252.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Hebrew
