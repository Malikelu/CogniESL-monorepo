language: swedish
schema_version: '3.0'
grammar_points:
  pitch_accent:
    interference_patterns:
    - Swedish uses 2 genders which does not exist in English, causing transfer errors
      related to 'pitch accent'.
    why_it_happens: Swedish handles 'pitch accent' differently from English. Swedish
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Swedish structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Swedish and English for 'pitch
        accent'. Show the Swedish structure side-by-side with English. Highlight the
        specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Swedish
        handles 'pitch accent' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Swedish sentences, students translate to English, focusing
          on correct 'pitch accent' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Swedish-style 'pitch accent' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'pitch
          accent' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'pitch accent'
          errors.
        duration: 15
    examples:
    - 'Wrong: Applying Swedish ''pitch accent'' structure to English. Correct: Use
      the English structure for ''pitch accent''.'
    - 'Wrong: Direct translation of Swedish ''pitch accent'' pattern. Correct: Follow
      English ''pitch accent'' conventions.'
    - 'Wrong: Correct: Use English-specific ''pitch accent'' patterns.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Philip, W. (2005). Swedish learners and English article acquisition. Nordic
      Journal of English Studies, 4(1), 45-62.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Swedish
    notes: Iconic feature of Swedish prosody.
