language: swahili
schema_version: '3.0'
grammar_points:
  noun_class_agreement_transfer:
    interference_patterns:
    - Swahili uses agglutinative verb morphology which does not exist in English,
      causing transfer errors related to 'noun class agreement transfer'.
    why_it_happens: Swahili handles 'noun class agreement transfer' differently from
      English. Swahili L1 speakers transfer native structural patterns to English,
      leading to systematic errors. The error is persistent because the Swahili structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Swahili and English for 'noun
        class agreement transfer'. Show the Swahili structure side-by-side with English.
        Highlight the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Swahili
        handles 'noun class agreement transfer' differently from English. Use visual
        aids or color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Swahili sentences, students translate to English, focusing
          on correct 'noun class agreement transfer' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Swahili-style 'noun class agreement
          transfer' errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'noun
          class agreement transfer' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'noun class agreement
          transfer' errors.
        duration: 15
    examples:
    - 'Wrong: Applying Swahili ''noun class agreement transfer'' structure to English.
      Correct: Use the English structure for ''noun class agreement transfer''.'
    - 'Wrong: Direct translation of Swahili ''noun class agreement transfer'' pattern.
      Correct: Follow English ''noun class agreement transfer'' conventions.'
    - 'Wrong: Transferring Swahili noun class system (15+ classes) to English ''noun
      class agreement transfer''. Correct: Use English-specific ''noun class agreement
      transfer'' patterns.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Mohamed, M. (2007). Swahili learners and English article acquisition. Journal
      of African Languages and Linguistics, 28(1), 45-62.
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Swahili
    notes: One of the most persistent interference types. Noun class system is deeply
      embedded in Swahili grammar and affects virtually every sentence.
