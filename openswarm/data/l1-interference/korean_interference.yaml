language: korean
grammar_points:
  article_usage_ko:
    interference_patterns:
    - Korean uses no articles which does not exist in English, causing transfer errors
      related to 'article usage ko'.
    why_it_happens: Korean handles 'article usage ko' differently from English. Korean
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Korean structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Korean and English for 'article
        usage ko'. Show the Korean structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Korean handles
        'article usage ko' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Korean sentences, students translate to English, focusing
          on correct 'article usage ko' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Korean-style 'article usage ko' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'article
          usage ko' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'article usage
          ko' errors.
        duration: 15
    examples:
    - 'Wrong: ''She is article usage ko.'' Correct: ''She is a article usage ko.'''
    - 'Wrong: ''I like the article usage ko.'' (general) Correct: ''I like article
      usage ko.'''
    - 'Wrong: ''I have article usage ko.'' Correct: ''I have a article usage ko.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Lee, S. (2005). Korean learners and English article acquisition. Asian EFL Journal,
      7(2), 1-18.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Korean
    notes: Most persistent Korean L1 interference error alongside verb ending omission.
