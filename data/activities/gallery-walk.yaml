instructions:
- Assign each group a different subtopic related to your unit.
- 'Groups research their subtopic and create a poster or display (15 minutes). Include:
  title, key information, images, and examples.'
- Groups post their displays around the room.
- Students walk around the room in pairs. They read each display, discuss it, and
  leave a comment or question on a sticky note.
- After visiting all displays, students return to their own display and read the comments.
- 'Discuss: What did you learn from other groups? What was the most interesting display?'
- Groups revise their displays based on the feedback they received.
script:
- Create a poster about your subtopic. Include key information, images, and examples.
  You have 15 minutes.
- Now walk around. Read each display. Leave a comment or question on a sticky note.
setupInstructions: Assign subtopics to groups. Provide large paper and markers. Have
  sticky notes available for comments.
differentiation:
  support: Provide a poster template. Allow groups to use mostly pictures. Assign
    simpler subtopics.
  extension: Require groups to include a bibliography or sources. Have them create
    a quiz about their display for other students.
