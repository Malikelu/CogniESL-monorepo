id: human-opinion
name: Human Opinion Line
category: speaking
description: Students physically position themselves on a spectrum from strongly agree
  to strongly disagree based on a statement, then defend their position. Encourages
  critical thinking and opinion language.
targetStructures:
- sentence-structure
- speaking-fluency
- discourse
bestForLevels:
- A2
- B1
- B2
- C1
- C2
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Designate one side of the room as 'Strongly Agree' and the other as 'Strongly Disagree.'
- Read a statement related to your lesson or a general discussion topic.
- Students move to the position that matches their opinion.
- Ask 2-3 students at different positions to explain their reasoning.
- Allow students to change their position after hearing arguments.
- Discuss what makes a strong argument and what changed minds.
script:
- '"Homework should be banned. Strongly agree is this wall. Strongly disagree is that
  wall. Go!"'
- '"I see most of you are in the middle. Interesting. Carlos, you are at strongly
  agree. Why?"'
- '"Did anyone change their position? What convinced you?"'
setupInstructions: Clear space for students to move along a line. Prepare 3-5 statements
  related to your lesson topic.
differentiation:
  support: 'Provide sentence starters: ''I agree because'' or ''I disagree because''
    or ''I think.'' Use simpler, more concrete statements.'
  extension: Require students to argue the opposite of their actual opinion. Introduce
    nuanced positions such as 'It depends on' or 'In some cases.'
keywords:
- opinions
- debate
- critical thinking
- movement
- spectrum
l1Enhanced: true
