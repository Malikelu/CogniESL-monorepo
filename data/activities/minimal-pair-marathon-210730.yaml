id: minimal-pair-marathon-210730
name: Minimal Pair Marathon
category: pronunciation
description: Distinguish and produce similar-sounding word pairs to improve listening
  discrimination.
targetStructures:
- pronunciation
bestForLevels:
- A1
- A2
bestForAges:
- adults
duration: 15
groupSize: whole-class
energyRequired: high
prepTime: low
materials:
- audio files
- picture cards
format:
- in-person
requiresTech: true
digitalReady: true
hasAudioComponent: true
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Prepare minimal pair cards: words that differ by only one sound (e.g., ship/sheep,
  bat/bet, cut/cat, light/right).'
- Play the audio or say one word from each pair. Students identify which word they
  heard.
- Students mark their answers. Review as a class, focusing on the sound difference.
- Students practice saying both words in each pair, exaggerating the sound difference.
- 'Play a game: say a minimal pair. Students must use each word in a sentence to show
  they understand the meaning difference.'
- 'Discuss: Which pairs are hardest for your L1? Why?'
- Students add 3 new minimal pairs they have trouble with to their pronunciation journal.
script:
- Listen to minimal pair.
- Identify which word you heard.
- Practice producing both sounds.
differentiation:
  support: Focus on one sound pair per session.
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
keywords:
- minimal pair
