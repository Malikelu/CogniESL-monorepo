id: my-strengths
name: My Strengths
category: speaking
description: Students state a personal talent or strength and provide a related tip
  or piece of advice to the class. Practices giving advice, using modal verbs (should,
  could), and building classroom community through self-reflection.
targetStructures:
- verb-modals
- verb-tenses
bestForLevels:
- A2
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 15
groupSize: whole-class
energyRequired: low
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Model the activity: ''I''m good at remembering vocabulary. My tip is: you should
  review new words every day for 10 minutes.'''
- 'Each student shares their strength and tip: ''I''m good at cooking. You could try
  following a recipe step by step.'''
- 'Other students can ask follow-up questions: ''What''s your favorite recipe?'' ''How
  did you learn?'''
- Optionally, collect all tips on a 'class advice board' for future reference.
script:
- '"I''ll start. I''m good at remembering vocabulary. My tip is: you should review
  new words every day for 10 minutes. Now it''s your turn!"'
- '"Remember: use ''should'' for stronger advice and ''could'' for a softer suggestion.
  ''You should try this'' vs. ''You could try this.''"'
- '"Great tip! Now class, ask a follow-up question: ''How did you learn that?'' ''Can
  you give an example?''"'
setupInstructions: No materials needed. Prepare your own example to model the activity.
exampleSnippet:
  topic: Giving advice with should and could
  execution:
  - 'Student 1: ''I''m good at studying. My tip is: you should make a study schedule.'''
  - 'Student 2: ''I''m good at cooking. You could try watching cooking videos online.'''
  - 'Student 3: ''I''m good at sports. You should exercise for 30 minutes every day.'''
  teacherDialogue:
  - '"Remember: should is stronger advice, could is a softer suggestion."'
  - '"Good! Now ask a follow-up question: How did you learn to cook?"'
differentiation:
  support: 'Provide sentence frames: ''I''m good at ___. My tip is: you should ___.''
    ''I''m good at ___. You could try ___.'' Allow students to write their statement
    before sharing.'
  extension: Have students write their tips on cards and post them on a class 'advice
    wall.' Challenge students to try one classmate's tip during the week and report
    back. At C1 level, require students to give more nuanced advice using 'might want
    to,' 'it would be a good idea to,' or 'if I were you.'
keywords:
- advice
- strengths
- self-reflection
- modal verbs
- speaking
- confidence
l1Enhanced: true
