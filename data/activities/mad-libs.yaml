id: mad-libs
name: Mad Libs
category: grammar-practice
description: Students provide random parts of speech (nouns, verbs, adjectives) to
  fill in blanks in a story they have not seen, creating hilarious results. Reinforces
  parts of speech, word categories, and grammatical awareness in a fun context.
targetStructures:
- adjectives
- adverbs
- nouns
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
- C1
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Mad Libs story templates (printed or projected)
- Word category cards (optional)
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Prepare a short story with blanks for different parts of speech: noun, verb, adjective,
  adverb, plural noun, etc.'
- 'Do NOT show students the story. Instead, ask them to provide words for each blank:
  ''Give me a noun.'' ''Give me an adjective.'' ''Give me a verb in past tense.'''
- Write the students' words in the blanks. Use the first suggestion for each blank
  (do not let students choose strategically).
- Read the completed story aloud. The results are usually hilarious!
- 'Discuss: Why is this funny? Because the words do not match the context. This shows
  why parts of speech matter.'
- Play 2-3 rounds with different stories. Optionally, have students write their own
  Mad Libs templates.
script:
- '"I need a noun -- any noun! Table? Okay, I will use table. Now I need an adjective.
  Happy? Great! Now a verb in past tense. Ran? Perfect!"'
- '"Here is the story: The happy table ran quickly to the store and bought a large
  elephant. See why that is funny? A table cannot run!"'
- '"Let us do another one. Give me a plural noun... shoes! Give me an adverb... beautifully!"'
setupInstructions: Prepare 2-3 Mad Libs story templates with 8-12 blanks each. Each
  blank should be labeled with the required part of speech (noun, verb, adjective,
  adverb, plural noun, past tense verb, etc.). Print or project the template. Keep
  the story hidden from students until all blanks are filled.
exampleSnippet:
  topic: 'Parts of speech: nouns, adjectives, verbs, adverbs'
  execution:
  - 'Template: ''The ___ (adjective) ___ (noun) ___ (past tense verb) ___ (adverb)
    to the ___ (noun).'''
  - 'Student inputs: adjective = ''sparkly,'' noun = ''penguin,'' verb = ''danced,''
    adverb = ''gracefully,'' noun = ''supermarket.'''
  - 'Result: ''The sparkly penguin danced gracefully to the supermarket.'''
  teacherDialogue:
  - '"Give me any adjective -- a word that describes something. Shiny? Great!"'
  - '"Now I need a verb in past tense -- an action that already happened. Swam? Perfect!"'
  - '"Read the story: The shiny elephant swam to the library. Why is funny? Because
    elephants do not usually swim to libraries!"'
differentiation:
  support: 'Use simple, familiar parts of speech: noun, verb, adjective. Provide examples
    of each category. Use shorter stories with fewer blanks (5-6). Allow students
    to consult a word bank. For C1 students, skip this level of scaffolding.'
  extension: 'Include more advanced categories: past participle, gerund, proper noun,
    compound noun. Have students create their own Mad Libs templates. Use the activity
    to practice specific grammar points: irregular past tenses, comparative adjectives,
    etc. At C1 level, require students to use the completed Mad Lib as a basis for
    a longer creative writing piece.'
keywords:
- parts of speech
- grammar game
- word categories
- fill in the blank
- humor
l1Enhanced: true
