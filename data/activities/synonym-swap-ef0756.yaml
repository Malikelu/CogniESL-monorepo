instructions:
- Write 5 sentences from your lesson on the board. Each sentence uses a common word
  that has synonyms.
- 'Example: ''The food was good.'' -> ''The food was delicious / tasty / excellent
  / superb.'''
- Students rewrite each sentence using a synonym. They must not repeat any synonyms.
- 'Compare versions. Discuss: Which synonym is strongest? Most formal? Most emotional?'
- Students write 3 sentences of their own and create synonym variations.
- 'Discuss: Why does English have so many synonyms? How do you choose the right one?'
