id: hangman
name: Hangman
category: games
description: A classic letter-guessing game where students guess letters to complete
  a hidden word before the figure is drawn. Encourages awareness of letter frequency,
  spelling patterns, and vocabulary review in a competitive, low-pressure format.
targetStructures:
- vocabulary
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: low
prepTime: none
materials:
- Whiteboard and markers
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Choose a word from the current lesson vocabulary. Write a blank for each letter
  on the board.
- Students take turns guessing letters. If the letter is in the word, write it in
  the correct blank.
- If the letter is not in the word, draw one part of the hangman figure (head, body,
  arms, legs).
- The students win if they guess the word before the hangman is complete (6 wrong
  guesses).
- The students lose if the hangman is completed before they guess the word.
- 'Discuss: Which letters did you guess first? Why? (Introduce the concept of letter
  frequency.)'
script:
- '"I am thinking of a word. It has 6 letters. What letter do you want to guess first?"'
- '"Yes! There is an ''e'' in the word. Let me write it in."'
- '"No, there is no ''k''. That is one wrong guess. Let me draw the head."'
setupInstructions: Choose 3-4 words from current vocabulary. Have the whiteboard ready.
  Optionally prepare a reference chart showing English letter frequency (E, T, A,
  O, I, N, S, H, R, D, L, C, U, M, W, F, G, Y, P, B are the most common).
exampleSnippet:
  topic: vocabulary review and spelling
  execution:
  - 'Word: ''banana''. Blanks: _ _ _ _ _ _'
  - 'Student guesses ''a''. Result: _ a _ a _ a'
  - 'Student guesses ''n''. Result: _ a n a n a'
  - 'Student guesses ''b''. Result: b a n a n a. Correct!'
  teacherDialogue:
  - '"What is the most common letter in English? Yes, ''e''! That is a good first
    guess."'
  - '"Can anyone guess the word now? It is a yellow fruit!"'
differentiation:
  support: Allow students to work in pairs. Give a hint about the word category. Provide
    a letter frequency chart as reference. Use shorter words.
  extension: Use longer or more complex words. Have students take turns being the
    hangman leader. Challenge students to guess the word before any letters are revealed
    (strategic guessing based on letter frequency).
keywords:
- games
- spelling
- vocabulary
- letters
- guessing
- classic
- letter frequency
l1Enhanced: true
