id: change-chairs
name: Change Chairs
category: warm-up
description: A musical chairs-style game where students change seats when the caller
  says 'Change chairs if...' followed by a personal trait or condition. A high-energy
  warm-up that practices zero and first conditionals, listening for specific information,
  and personal description vocabulary.
targetStructures:
- conditionals
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 10
groupSize: whole-class
energyRequired: high
prepTime: low
materials:
- Chairs arranged in a circle (one fewer than number of students)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Arrange chairs in a circle with one fewer chair than the number of students.
- One student stands in the center and calls out 'Change chairs if...' followed by
  a condition.
- All students who match the condition must find a new seat.
- The student left standing becomes the new caller.
- Encourage use of conditional structures in the calls such as 'Change chairs if you
  can swim' or 'Change chairs if you have visited another country.'
- Continue for 5-8 minutes, then debrief on which conditions were most common.
script:
- '"Everyone, stand up and sit in a circle of chairs. Remember, there is one fewer
  chair than people. When I say ''Change chairs if...'' followed by something true
  about you, you must find a new seat. The person left standing becomes the next caller.
  Ready? Change chairs if you are wearing something blue!"'
- '"Great! Now Ahmed is in the center. Ahmed, call out your condition using ''Change
  chairs if...'' Remember to use present simple for the condition."'
setupInstructions: Arrange chairs in a tight circle with one fewer chair than the
  number of students. Ensure there is enough space for students to move safely between
  seats. Optionally prepare a list of example conditions at different levels for the
  teacher to model.
exampleSnippet:
  topic: zero and first conditional
  execution:
  - 'The teacher models: ''Change chairs if you like chocolate.'' (zero conditional
    — general truth). Then: ''Change chairs if you will travel this summer.'' (first
    conditional — future possibility). Students take turns calling conditions. The
    teacher highlights correct conditional usage and gently corrects errors.'
  teacherDialogue:
  - '"Change chairs if you have a pet! Good — that is a zero conditional, a general
    fact about you. Now try a first conditional: Change chairs if you will... what?
    Yes! ''Change chairs if you will go to the beach this weekend!'' Perfect!"'
differentiation:
  support: Use simple, concrete conditions that are easy to verify such as 'Change
    chairs if you are wearing blue.' Allow students to stay seated if they are unsure.
    Provide a list of useful conditional phrases on the board.
  extension: Advanced students can use more complex conditional structures such as
    second conditional 'Change chairs if you could fly' or add adverbial clauses 'Change
    chairs if you have ever been abroad.' They can also require students to explain
    why they are moving.
keywords:
