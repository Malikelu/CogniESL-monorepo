hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Each student thinks of 3 facts about themselves: 2 true, 1 false. They should be
  believable.'
- Students take turns sharing their 3 facts with the class or in small groups.
- The group asks yes/no questions to try to figure out which statement is the lie.
- After questions, the group votes on which one is the lie.
- 'The student reveals the answer. Discuss: What made the lie convincing?'
- Play 3-4 rounds. Award points for fooling the class.
script:
- '"Three facts about yourself."'
- Two true, one false.
- Class guesses the lie.
differentiation:
  support: Provide sentence starters for the lies. Allow students to write their facts
    in advance. Use simple past tense verbs.
  extension: Require students to ask follow-up questions to detect the lie. Have the
    class discuss what made a lie convincing.
