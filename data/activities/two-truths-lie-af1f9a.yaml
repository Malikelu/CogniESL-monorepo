id: two-truths-lie-af1f9a
name: Two Truths/Lie
category: warm-up
description: Students share three facts about themselves -- two true, one false. The
  class guesses the lie. A fun icebreaker that practices question formation and past
  tense.
targetStructures:
- verb-tenses
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 10
groupSize: individuals
energyRequired: low
prepTime: none
materials:
- paper
format:
- in-person
requiresTech: false
digitalReady: true
