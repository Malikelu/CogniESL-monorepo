id: spelling-mess
name: Spelling Mess
category: listening
description: A phonetic relay under pressure where students whisper individual letters
  of a word across a chain to a writer at the board. Practices phonetic clarity, letter
  discrimination, and spelling accuracy through collaborative listening.
targetStructures:
- listening-comprehension
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Word cards or list of target words
- Board and markers
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Divide the class into two or more teams of 5-8 students. Each team forms a line
  facing the board.
- The last student in each line faces the board with a marker. The first student faces
  the teacher.
- Show the first student in each line a word (or whisper it to them). They must NOT
  say the word aloud.
- On your signal, the first student whispers the FIRST LETTER of the word to the second
  student, who whispers it to the third, and so on down the line.
- The last student writes that letter on the board. Then the first student whispers
  the second letter, and so on.
- The team that correctly spells the word first wins a point. Play 5-6 rounds with
  different words.
script:
- Here is your word. Do not say it out loud! Just whisper the first letter to the
  next person. Go!
- Good, now the second letter. Keep going -- whisper it down the line.
- Last person, write what you have on the board. Let us check -- the word was ELEPHANT.
  Team 1 got it!
setupInstructions: Prepare 5-6 word cards with target vocabulary words (6-10 letters
  long). Write each word clearly on a card. Ensure the board is accessible to the
  last student in each line.
exampleSnippet:
  topic: food vocabulary
  execution:
  - 'Word: S-P-A-G-H-E-T-T-I. First student whispers ''S'' down the line. Then ''P'',
    then ''A''...'
  - Last student writes each letter as they receive it. Team 2 misspells as 'SPAGETTI'
    -- discuss the error.
  - 'Next word: C-H-O-C-O-L-A-T-E. Both teams race to spell it correctly.'
  teacherDialogue:
  - Whisper just the letter -- do not say the word! S... just S.
  - Team 1 wrote SPAGETTI. Is that right? What is missing? The H!
differentiation:
  support: Use shorter words (4-5 letters). Allow the whisperer to repeat the letter
    once. Give the writing student a letter bank to reference.
  extension: Use longer words with silent letters or tricky spelling patterns. Add
    a rule that the team must also define the word to get the point.
keywords:
