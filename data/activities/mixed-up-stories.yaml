id: mixed-up-stories
name: Mixed Up Stories
category: writing
description: The teacher jumbles facts from different students' weekend anecdotes
  on the board. Students must reconstruct who did what by writing coherent sentences
  using narrative tenses. Practices past simple, past continuous, and pronoun reference.
targetStructures:
- pronouns
- verb-tenses
bestForLevels:
