hasVisualComponent: false
adaptableToTopic: true
instructions:
- At the start of class (or the day before), ask students to share one thing they
  did last weekend. Write each fact on the board with the student's name.
- Once you have 8-12 facts from different students, erase the names and scramble the
  facts.
- Students must now write a coherent account of each student's weekend, matching facts
  to the right person and using correct narrative tenses.
- 'Encourage use of both past simple and past continuous: ''Maria was walking in the
  park when she saw a dog.'''
- Students share their reconstructions. Reveal the correct matches.
- 'Discuss: Which tenses did you use? Why?'
script:
- '"Last weekend, Maria went to the mall. Pedro played soccer. Ana watched a movie.
  Now -- I have scrambled all the facts. Who did what? Write a sentence for each person
  using the correct past tense."'
- '"Remember: use past simple for completed actions (Maria went to the mall) and past
  continuous for actions in progress (Maria was walking when she saw a friend)."'
- '"Check your pronoun reference: ''Maria went to the mall. She bought a dress. She
  tried it on.'' Not: ''Maria went to the mall. Maria bought a dress. Maria tried
  it on.'''
setupInstructions: Collect weekend facts from students before or at the start of class.
  Write them on the board with names, then scramble for the activity. Prepare a reference
  sheet showing past simple vs. past continuous forms.
exampleSnippet:
  topic: 'Narrative tenses: past simple and past continuous'
  execution:
  - 'Facts collected: Maria/went to mall, Pedro/played soccer, Ana/watched movie,
    Carlos/cooked dinner.'
  - 'Scrambled on board: went to mall, played soccer, watched movie, cooked dinner.'
  - 'Student writes: ''Maria went to the mall on Saturday. She was walking around
    when she saw a sale. Pedro played soccer with his friends. He was running when
    he fell.'''
  teacherDialogue:
  - '"Which tense should you use for a completed action? Past simple! Which tense
    for an action in progress? Past continuous!"'
  - '"Check your pronouns: use ''she'' for Maria, ''he'' for Pedro. Do not repeat
    the name every time."'
differentiation:
  support: 'Provide fewer facts (6-8) and give pronoun hints: ''She went to the mall.
    He played soccer.'' Use mostly past simple sentences.'
  extension: 'Add more facts and include some that require past perfect: ''By the
    time Ana arrived, Pedro had already left.'' Have students write full paragraphs
    for each person.'
