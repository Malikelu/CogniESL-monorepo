instructions:
- Distribute blank comic strips to pairs. Each strip should have 4-6 panels with characters
  but empty speech bubbles.
- 'Discuss the visual context: What is happening in each panel? Who are the characters?
  What is their relationship?'
- Pairs write dialogue for each speech bubble, matching the tone and emotion shown
  in the illustrations.
- Encourage use of contractions, exclamations, questions, and natural conversational
  language.
- Pairs share their comics with another pair. The other pair reads the dialogue aloud,
  acting out the characters.
- 'Discuss: Which dialogues felt most natural? How did the pictures help determine
  what to write?'
script:
- '"Look at this comic strip. Two friends are at a restaurant. One just found a fly
  in their soup! What would they say? Write the dialogue in the speech bubbles."'
- '"Remember: people do not speak in full, perfect sentences. Use contractions, exclamations,
  and natural expressions."'
setupInstructions: Prepare or source 3-4 blank comic strips (comics with speech bubbles
  whited out). Choose strips with clear emotional content and varied situations. Print
  enough for each pair to have at least one strip.
exampleSnippet:
  topic: conversational English - register
  execution:
  - Pairs receive a comic strip showing a customer returning a broken product to a
    store. They write dialogue for 6 speech bubbles, practicing polite complaints,
    questions, and problem-solving language.
  - Compare formal register vs. informal register and discuss appropriateness.
  teacherDialogue:
  - '"Look at this comic strip. Two friends are at a restaurant. One just found a
    fly in their soup! What would they say?"'
  - '"Now compare your dialogue with the pair next to you. Did you use different phrases?
    Which one sounds more natural?"'
differentiation:
  support: Provide a word bank of useful expressions for the situation. Allow students
    to write just 2-3 speech bubbles. Give a model comic with filled-in dialogue as
    reference.
  extension: Students create their own comic strip from scratch. Add thought bubbles
    as well as speech bubbles. Include stage directions or sound effects. Experiment
    with different registers.
