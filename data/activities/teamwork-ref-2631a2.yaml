id: teamwork-ref-2631a2
name: Teamwork Ref
category: review
description: Students evaluate their group work performance, noting what worked well
  and suggesting improvements. Builds collaborative skills and reflective practice.
targetStructures:
- writing-accuracy
bestForLevels:
- A1
- A2
bestForAges:
- adults
duration: 10
groupSize: individuals
energyRequired: low
prepTime: none
materials:
- paper
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'After a group activity, give each student a reflection form with 3 questions: (1)
  What did our group do well? (2) What could we improve? (3) What is one specific
  thing I contributed?'
- Students write individual reflections (3 minutes).
- Groups share their reflections and discuss common themes.
- Each group creates one goal for their next group activity.
- Collect reflections. Review them to identify common collaboration challenges.
- Start the next group activity by sharing anonymized insights from the reflections.
script:
- '"Group work."'
- '"What worked well."'
- '"Improvements."'
differentiation:
  support: Provide sentence starter.
  extension: Add detailed explanation.
