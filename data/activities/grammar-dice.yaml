id: grammar-dice
name: Grammar Dice
category: grammar-practice
description: Students roll dice to determine the subject, verb, and tense they must
  use to create a sentence. Combines chance with grammar practice.
targetStructures:
- verb-tenses
- sentence-structure
- clauses
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: small-groups
energyRequired: medium
prepTime: low
materials:
- Dice (or digital dice app)
- Subject cards
- Verb cards
- Tense cards
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Prepare three sets of cards: subjects (I, she, they, the dog, my mother), verbs
  (go, eat, make, study, play), and tenses (past simple, present perfect, future).'
- Students roll dice or draw one card from each set. They must create a correct sentence
  using all three.
- 'Example roll: they + eat + present perfect = They have eaten lunch already.'
- If the sentence is correct, the student scores a point. If wrong, they correct it
  with help from the group.
- Play 10-15 rounds. The student with the most points wins.
- Review any sentences that caused difficulty. Discuss the grammar rules.
- 'Extension: Add a fourth category (adverbs, objects, or negative forms) to increase
  difficulty.'
script:
- Roll the dice! You got she, go, and past simple. Make a sentence. Ready?
- She went to the store. Perfect! Next roll.
setupInstructions: Create subject, verb, and tense cards. Have dice available. Prepare
  an answer key for common combinations.
differentiation:
  support: Use simpler subjects and verbs. Provide a grammar reference sheet. Allow
    students to work in pairs.
  extension: Add negative forms, questions, or passive voice. Require students to
    also create a question from their sentence.
keywords:
