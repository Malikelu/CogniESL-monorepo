instructions:
- Students write a short text (100-150 words). This is their first draft.
- 'Give each student a peer editing checklist: grammar, spelling, punctuation, vocabulary,
  organization, clarity.'
- Students exchange papers. They read carefully and mark errors using a colored pen.
- 'For each issue found, the editor writes a suggestion. Example: Check past tense
  here.'
- Partners discuss the feedback. The writer asks questions.
- Students revise their drafts based on the feedback.
- 'Discuss: What was the most common error? What did you learn from editing someone
  else''s work?'
script:
- '"Your first draft. Do not worry about perfection -- just get your ideas down."'
- Now exchange papers. Read carefully. Be helpful, not harsh.
setupInstructions: Create a peer editing checklist with 8-10 items. Prepare writing
  prompts. Have colored pens available.
differentiation:
  support: Provide a simpler checklist. Allow students to focus on just 2-3 error
    types.
  extension: Require editors to also comment on style, tone, and word choice.
keywords:
- peer editing
- feedback
- revision
- checklist
- writing process
l1Enhanced: true
