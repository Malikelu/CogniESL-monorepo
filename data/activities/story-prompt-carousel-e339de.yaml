instructions:
- Each student writes the opening sentence of a story on a piece of paper.
- They pass their paper to the right. The next student reads the opening and adds
  the next sentence.
- Continue passing and adding sentences until the paper returns to the original writer
  (or after 5 passes).
- The original writer reads the completed story aloud.
- 'Discuss: Did the story go where you expected? What was surprising?'
- 'Optional: Students rewrite the story with a different ending.'
script:
- '"Opening sentence."'
- '"To partner for continuation."'
- '"Circle with ending."'
