instructions:
- Select a short text (150-200 words) related to your lesson.
- Read the text aloud first, modeling pronunciation, stress, and intonation.
- Students take turns reading paragraphs aloud. The class listens.
- After each reader, give one specific compliment and one suggestion for improvement.
- 'Focus on: pronunciation of difficult words, sentence stress, and natural pausing.'
- Students practice reading the same text in pairs, helping each other improve.
script:
- '"Turns reading paragraph."'
- '"On clear pronunciation."'
- '"For mistakes."'
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
