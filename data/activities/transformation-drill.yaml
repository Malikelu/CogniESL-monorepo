id: transformation-drill
name: Transformation Drill
category: grammar-practice
description: Students transform sentences from one form to another (active to passive,
  direct to reported, positive to negative, statement to question). Fast-paced grammar
  practice.
targetStructures:
- verb-tenses
- clauses
- verb-passive
- sentence-structure
bestForLevels:
- A2
- B1
- B2
- C1
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- None (sentences on board or projected)
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Write a sentence on the board. Give a transformation instruction.
- 'Example: She wrote the letter. -> Change to passive: The letter was written by
  her.'
- Students write the transformed sentence. The teacher checks and moves to the next
  one.
- Start with easy transformations and increase difficulty.
- 'Transformation types: active/passive, direct/reported, positive/negative, statement/question,
  present/past.'
- 'Play as a game: first student to write the correct transformation scores a point.'
- After 15-20 transformations, review the rules for each type.
- Students write 5 original sentences and transform them in 3 different ways.
script:
- '"This sentence: She wrote the letter. Make it passive. Ready?"'
- 'Now: I have never been to Japan. Change to reported speech.'
setupInstructions: Prepare 20-25 sentences with transformation instructions. Organize
  from easy to difficult. Have an answer key ready.
differentiation:
  support: Use simpler transformations (positive to negative). Provide the first word
    of the answer. Do fewer items.
  extension: Use complex transformations (active perfect passive, reported questions).
    Combine multiple transformations.
keywords:
- transformation
- drill
- active passive
- reported speech
- grammar
l1Enhanced: true
