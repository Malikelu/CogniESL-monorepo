id: charades
name: Charades
category: games
description: Students act out vocabulary words or phrases without speaking while their
  team guesses. Classic game that gets students moving and thinking.
targetStructures:
- vocabulary
- verb-tenses
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: small-groups
energyRequired: high
prepTime: low
materials:
- Word or phrase cards
- Timer
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Divide the class into teams of 4-5. Prepare word cards (verbs, nouns, phrases).
- One student draws a card and acts it out. No speaking, no sounds, no pointing to
  objects.
- Their team guesses. When they guess correctly, the next student acts.
- Set a 60-second time limit per card. If the team cannot guess, the card goes back
  in the pile.
- The team that guesses the most cards wins.
- 'Review any words that were hard to act out. Discuss: What gestures helped?'
script:
- '"Out your word. No talking! Your team guesses. You have 60 seconds. Go!"'
- Time! What was it? Correct! Next actor!
setupInstructions: Prepare 20-30 word cards. Include a mix of easy and challenging
  words. Verbs and action phrases work best.
differentiation:
  support: Use simpler, more concrete words. Allow the actor to make sounds.
  extension: 'Use more abstract words or phrases. Add a rule: the actor must act out
    the word in a specific tense.'
keywords:
- charades
- acting
- guessing
- movement
- team
l1Enhanced: true
