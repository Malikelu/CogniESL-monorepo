instructions:
- 'Explain the game: you will say a vocabulary word, and students have 30 seconds
  to draw it on paper.'
- Say the first word. Start the timer. Students draw.
- After 30 seconds, say 'Stop!' Students hold up their drawings.
- Other students guess the word from the drawing. The drawer confirms or corrects.
- Play 8-10 rounds with words from your current lesson.
- 'At the end, discuss: Which drawings were easiest to guess? Why? How does visual
  memory help vocabulary?'
