id: predict-confirm-reading
name: Predict and Confirm
category: reading
description: Students predict what a text will be about using only the title and images.
  Then they read to confirm or revise their predictions.
targetStructures:
- reading-comprehension
- verb-tenses
- sentence-structure
bestForLevels:
- A2
- B1
- B2
- C1
duration: 20
groupSize: pairs
energyRequired: low
prepTime: low
materials:
- Texts with titles and images covered
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Show students only the title and any images from the text.
- Students write 3 predictions about what the text will be about.
- Students share predictions with the class. Write them on the board.
- Students read the text silently. They check their predictions.
- After reading, students compare predictions with a partner.
- 'Discuss: Which predictions were closest? What clues were most helpful?'
script:
- I am going to show you only the title and picture. What do you think this text will
  be about?
- Interesting predictions! Now read and check. Were you right?
setupInstructions: Select texts with informative titles and relevant images.
differentiation:
  support: Provide sentence starters for predictions. Use shorter texts.
  extension: Ask students to predict specific details, not just the topic.
keywords:
- prediction
- critical reading
- comprehension
- title analysis
l1Enhanced: true
