instructions:
- Create bingo cards with 16 squares. Each square contains a grammar point or vocabulary
  word from the unit.
- Prepare questions or prompts that match each square. For example, if a square says
  'present perfect,' the prompt is 'Make a sentence about something you have never
  done.'
- Call out prompts one at a time. Students must respond correctly to mark the square.
- First student to complete a line (horizontal, vertical, or diagonal) calls 'Bingo!'
- Verify the bingo by having the student demonstrate one of the grammar points on
  their winning line.
- Play 2-3 rounds. Discuss any grammar points students struggled with.
script:
- Draw bingo card with grammar.
- Answer questions to mark squares.
- First line wins.
