instructions:
- Select a short passage (100-150 words) related to your lesson topic. It should contain
  a clear conflict or problem.
- Give students 3 minutes to read the passage silently.
- Ask students to summarize the main conflict in exactly 15 words or fewer. They must
  write it down.
- 'Students share their summaries with a partner. Partners compare: Did they identify
  the same conflict?'
- Ask 3-4 students to read their summaries aloud. Discuss which summaries capture
  the conflict most accurately.
- 'Discuss: What makes a good summary? (Key idea, concise, accurate)'
script:
