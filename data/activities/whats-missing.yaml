id: whats-missing
name: What is Missing?
category: vocabulary
description: Students view a set of items or pictures, then close their eyes while
  the teacher removes one. Students identify what is missing. Sharpens observation,
  vocabulary recall, and descriptive language.
targetStructures:
- vocabulary
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Common classroom items or pictures on the board
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Place 6-10 common items on a table (or display pictures on the board): pen, book,
  phone, water bottle, keys, etc.'
- Give students 30 seconds to memorize the items.
- Ask students to close their eyes. Remove 1-2 items.
- Students open their eyes and identify what is missing.
- 'Ask them to describe the missing item: ''The red pen is missing.'' or ''The water
  bottle is gone.'''
- 'Increase difficulty: remove more items, use less common vocabulary, or describe
  items without naming them.'
script:
- '"Look at these items. You have 30 seconds to memorize them. Ready? Go."'
- '"Close your eyes. No peeking! ... Okay, open! What is missing?"'
- '"Yes! The blue pen is gone. Can you describe it? It is a blue pen with a cap."'
setupInstructions: Gather 6-10 common classroom items (pen, book, eraser, ruler, phone,
  water bottle, keys, notebook, marker, scissors). Alternatively, draw or project
  pictures of items on the board.
differentiation:
  support: Use only 5 items. Remove just one at a time. Allow students to point to
    the empty space rather than verbalize.
  extension: 'Remove 3-4 items at once. Require full sentences: ''The small red pen
    and the black keys are missing.'' Use less common vocabulary items.'
keywords:
- memory
- vocabulary
- observation
- descriptive language
- items
l1Enhanced: true
