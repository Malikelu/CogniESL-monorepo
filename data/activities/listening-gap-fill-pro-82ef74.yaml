instructions:
- Select a short audio recording (1-2 minutes) related to your lesson topic.
- Create a transcript with 10-15 key words blanked out. These should target your current
  grammar or vocabulary focus.
- Give students the gapped transcript. Let them read it first and predict what might
  go in the blanks.
- Play the audio twice. Students fill in the blanks.
- Students compare answers with a partner. Play the audio a third time to resolve
  disagreements.
- 'Review answers as a class. Discuss: What strategies helped you catch the missing
  words?'
script:
- '"To conversation twice."'
- '"Gaps in transcript."'
- '"Reductions heard."'
