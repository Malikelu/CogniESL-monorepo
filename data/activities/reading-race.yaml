id: reading-race
name: Reading Race
category: reading
description: Teams race to find specific information in a text. The first team to
  correctly answer all comprehension questions wins.
targetStructures:
- reading-comprehension
- sentence-structure
bestForLevels:
- A1
- A2
- B1
- B2
duration: 20
groupSize: small-groups
energyRequired: high
prepTime: medium
materials:
- Texts (one per team)
- Question sheets
- Answer key
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Divide the class into teams of 3-4. Give each team a copy of the same text.
- Give each team a question sheet with 10-15 scanning questions.
- Teams race to find the answers. They must write the answer AND the line number.
- The first team to finish calls Done! Check their answers.
- The team with the most correct answers wins.
- 'Discuss: What strategies did you use to find answers quickly?'
script:
- You have 15 questions. Find the answers as fast as you can. Ready? Go!
- Team 3 says they are done! Let us check...
setupInstructions: Prepare a text and 10-15 scanning questions with clear, findable
  answers.
differentiation:
  support: Use shorter texts. Allow teams to have one hint.
  extension: Include inference questions. Add a bonus question.
keywords:
- scanning
- skimming
- speed reading
- comprehension
- competition
l1Enhanced: true
