instructions:
- Write a target sound on the board (e.g., /th/, /sh/, /ch/).
- Say a word containing the sound. Students must write the letter or letter combination
  that makes that sound.
- Students race to the board to write their answer. First correct answer scores a
  point.
- Play 15-20 rounds with different words and sounds.
- 'Review: Which sounds were hardest? Which letter combinations make the same sound?'
- Students create a reference chart of sounds and their spellings.
script:
- '"Initial sound."'
- '"Matching letter."'
- Race to board.
