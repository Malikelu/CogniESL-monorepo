id: timeline
name: Timeline
category: grammar-practice
description: Students receive cards with historical events or story events and must
  place them in chronological order while narrating the sequence using past simple
  and past perfect. Visualizes the relationship between the two past tenses.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 15
groupSize: small-groups
energyRequired: medium
prepTime: medium
materials:
- Event cards (historical events, story events, or daily routine events)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Prepare 8-10 event cards per set. Each card describes an event in simple English
  (e.g., 'The Titanic sank in 1912,' 'World War II ended in 1945').
- Give each group a set of shuffled cards. They must arrange the events in chronological
  order on their desk.
- 'After ordering, each group narrates the timeline using past simple and past perfect:
  ''The Titanic had already sunk before World War II ended.'''
- Groups compare their timelines and discuss any differences.
- As a class, review the correct order and practice the past perfect sentences.
script:
- '"Here are your event cards. Work together to put them in order from earliest to
  most recent."'
- '"Now tell the story of these events. Use past simple for the main events and past
  perfect for things that happened before other things."'
- '"The Titanic had sunk in 1912. World War I had already ended by then. World War
  II ended in 1945, 33 years after the Titanic sank."'
setupInstructions: Create 3-4 sets of 8-10 event cards. Use historical events, story
  events, or daily routine events depending on your lesson topic. Print and cut the
  cards before class.
exampleSnippet:
  topic: past simple and past perfect
  execution:
  - 'Cards: The Wright brothers flew (1903), World War I started (1914), The Titanic
    sank (1912), World War II ended (1945).'
  - 'Correct order: Wright brothers (1903), Titanic (1912), WWI (1914), WWII ends
    (1945).'
  - 'Narrative: The Wright brothers had already flown before the Titanic sank. World
    War I had started before World War II ended.'
  teacherDialogue:
  - '"Which event came first? Use past perfect to show what had already happened."'
  - '"Good: The Titanic had sunk before World War I started. The past perfect shows
    it happened earlier."'
differentiation:
  support: Use only 5-6 cards with very obvious chronological order. Provide the dates
    on the cards. Use simpler past simple sentences without requiring past perfect.
  extension: Use 12-15 cards with less obvious ordering. Require students to write
    a full paragraph using both tenses. Have them create their own timeline events
    for another group to order.
keywords:
- chronology
- past tenses
- sequencing
- narrative
- time markers
- history
- ordering
l1Enhanced: true
