instructions:
- Write 5 direct quotes on the board (e.g., 'I am tired,' said Maria. / 'We will come
  tomorrow,' they said.)
- 'Review the rules for reported speech: tense backshift, pronoun changes, time expression
  changes.'
- 'Students convert each direct quote to reported speech: ''Maria said (that) she
  was tired.'''
- Check answers as a class. Discuss any tricky changes.
- Students write 3 direct quotes from their own life and convert them to reported
  speech.
- 'Partners check each other''s work. Discuss: When do we use reported speech in real
  life?'
script:
- '"Direct quote."'
- '"To reported speech."'
- '"Pronoun changes."'
differentiation:
  support: Provide backshifting chart.
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
