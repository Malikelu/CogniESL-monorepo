instructions:
- Show students a poorly written email (too informal, wrong tone, missing elements).
  Discuss what is wrong.
- 'Review the key elements of a professional email: subject line, greeting, clear
  purpose, polite closing, signature.'
- 'Give students a scenario: write a professional email to a teacher, boss, or client
  requesting something specific.'
- Students draft their email (10 minutes).
- 'Pair students. They exchange emails and peer-edit for: tone, format, grammar, and
  clarity.'
- Each student revises their email based on feedback. Collect final versions or have
  volunteers read theirs aloud.
script:
- Draft professional email.
- '"For tone and format."'
- '"Edit for style."'
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: Include reply-all scenarios.
