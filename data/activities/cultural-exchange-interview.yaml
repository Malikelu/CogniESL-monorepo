id: cultural-exchange-interview
name: Cultural Exchange Interview
category: integrated-skills
description: Students interview each other about cultural topics, then write a profile
  article about their partner. Combines speaking, listening, and writing.
targetStructures:
- speaking-fluency
- writing-accuracy
- verb-tenses
- clauses
bestForLevels:
- A2
- B1
- B2
- C1
duration: 35
groupSize: pairs
energyRequired: medium
prepTime: low
materials:
- Interview question handout
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Pair students (ideally with different cultural backgrounds).
- 'Give students interview questions about culture: food, holidays, traditions, school,
  family.'
- Student A interviews Student B for 7 minutes. Student A takes notes.
- Switch roles. Student B interviews Student A for 7 minutes.
- Students write a short profile article about their partner (10 minutes).
- Students share their articles. The partner checks for accuracy.
- 'Discuss: What did you learn? What was surprising?'
script:
- You are going to interview your partner about their culture. Listen carefully and
  take notes -- you will write an article.
- '"Switch! Now it is your turn to ask questions."'
setupInstructions: Prepare 10-15 cultural interview questions at the appropriate level.
differentiation:
  support: Provide the questions on a handout. Allow students to use their L1 for
    difficult concepts.
  extension: Require students to include direct quotes. Have them write a comparison
    paragraph.
keywords:
- interview
- culture
- profile
- writing
- speaking
l1Enhanced: true
