instructions:
- Assign a topic to the class (e.g., 'The History of Coffee' or 'How Smartphones Changed
  the World').
- Give each group a set of fact cards with different information about the topic.
- Each group writes an informative article using their facts. They must use passive
  voice at least 3 times.
- After 15 minutes, groups pass their articles to the next group.
- The receiving group reads the article and identifies missing facts from their own
  fact cards.
- Groups add the missing facts to the article. The most complete and accurate article
  wins.
- 'Debrief: review passive voice usage and discuss which facts were most important.'
script:
- '"Each group has different facts about the same topic. Write an informative article
  using your facts."'
- '"Remember to use passive voice: ''Coffee was first discovered in Ethiopia.'' Not
  ''Someone discovered coffee.''"'
- '"After 15 minutes, pass your article to the next group. They will add facts you
  missed."'
setupInstructions: Choose a topic and prepare 6-8 fact cards for each group. Each
  group should have different facts about the same topic. Ensure facts are at the
  appropriate level and include opportunities for passive voice usage.
exampleSnippet:
  topic: passive voice and informative writing
  execution:
  - 'Group A facts: Coffee was discovered in Ethiopia. It was first used as food.'
  - 'Group B facts: Coffee was brought to Europe in the 1600s. It was first sold in
    coffeehouses.'
  - Groups write articles, then exchange and add missing facts.
  teacherDialogue:
  - '"How do you write this in passive voice? ''People grow coffee in Brazil'' becomes
    ''Coffee is grown in Brazil.''"'
  - '"Great passive sentence! Now check the other group''s article. What facts are
    missing?"'
differentiation:
  support: 'Provide sentence frames for passive voice: ''___ was ___ by ___.'' ''___
    is ___ in ___.'' Provide a list of linking words for informative writing. Allow
    groups to use a mix of active and passive voice.'
  extension: Challenge groups to include at least 5 passive sentences and to use a
    variety of tenses in passive voice. Require groups to write a concluding paragraph
    synthesizing all the facts.
