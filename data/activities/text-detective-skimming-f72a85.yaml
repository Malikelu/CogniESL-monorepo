id: text-detective-skimming-f72a85
name: Text Detective Skimming
category: reading
description: Quickly scan texts to locate specific information, improving speed and
  accuracy.
targetStructures:
- reading-comprehension
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 20
groupSize: individuals
energyRequired: medium
prepTime: low
materials:
- information sheets
- question list
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Give students a text (300-400 words) and 10 questions that require finding specific
  information.
- 'Explain skimming: reading quickly to find specific information, not reading every
  word.'
- 'Demonstrate: skim the text to find one answer, showing how you move your eyes quickly
  over the text.'
- Students have 5 minutes to find answers to all 10 questions.
- 'Review answers. Discuss: What strategies did you use? Did you read every word?'
- 'Practice: give a new text and 5 questions. Students skim again, trying to be faster.'
script:
- Set timer for 2 minutes.
- Find answers to 10 questions.
- Check accuracy and speed.
differentiation:
  support: Allow glossary for key terms.
  extension: Reduce time for advanced students.
keywords:
- skimming
- scanning
- speed
l1Enhanced: true
