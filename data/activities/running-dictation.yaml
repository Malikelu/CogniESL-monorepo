id: running-dictation
name: Running Dictation
category: listening
description: Texts are posted around the room. One student runs to the text, memorizes
  a portion, runs back, and dictates it to their partner who writes it down.
targetStructures:
- listening-comprehension
- writing-accuracy
bestForLevels:
- A1
- A2
- B1
- B2
duration: 20
groupSize: pairs
energyRequired: high
prepTime: medium
materials:
- Short texts posted around the room
- Paper and pens
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Post short texts on the walls around the room. Each pair gets a different text.
- In each pair, one student is the runner and one is the writer.
- The runner goes to the text, reads and memorizes a chunk, runs back, and dictates
  to the writer.
- The runner can go back as many times as needed.
- When finished, the pair checks their version against the original. They correct
  any errors.
- Switch roles with a new text.
- 'Discuss: What was hardest -- memorizing, dictating, or writing?'
script:
- '"Runner, go to the text. Read it, memorize a chunk, come back and tell your partner.
  Writer, write down exactly what you hear. Ready? Go!"'
- How did it go? Check your version against the original.
setupInstructions: Print 6-8 short texts and post them on walls. Texts should be at
  the appropriate level.
differentiation:
  support: Use shorter texts. Allow the runner to bring a notebook. Use simpler vocabulary.
  extension: 'Use longer texts. Add a rule: the runner can only go to the text 3 times.'
keywords:
- running dictation
- movement
- dictation
- memory
- collaboration
l1Enhanced: true
