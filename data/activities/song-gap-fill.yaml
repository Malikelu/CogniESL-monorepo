instructions:
- Choose a song with clear lyrics related to your lesson. Create a lyric sheet with
  15-20 words blanked out.
- Give students the gapped sheet. Let them read and predict what words might fit.
- Play the song once. Students fill in blanks.
- Play a second time. Students check and complete.
- Play a third time. Students follow along and confirm.
- 'Review answers. Discuss: What clues helped? (Rhyme, grammar, meaning)'
- Discuss the song meaning. How does it connect to your lesson?
script:
- Here are the lyrics with some words missing. Read through first. What words do you
  think might fit?
- Listen to the song. Fill in the blanks.
setupInstructions: Choose a song at the appropriate level. Create gapped lyrics targeting
  your vocabulary or grammar focus.
differentiation:
  support: Remove fewer words. Provide a word bank. Use slower songs.
  extension: Remove more words including function words. Use faster songs.
