instructions:
- At the start of a unit, give each student a goal related to the topic (e.g., 'I
  want to use present perfect correctly').
- Students rate their current ability on a 1-10 scale and write it down.
- Throughout the unit, periodically ask students to re-rate themselves and note what
  helped them improve.
- 'At the end of the unit, students write a short reflection: Where did I start? Where
  am I now? What helped me grow?'
- Students share reflections in small groups. Discuss common growth patterns.
- Collect reflections to track progress and adjust future lessons.
script:
- Mark progress toward goal.
- Use 1-10 scale.
- Share weekly reflection.
