id: reading-response-journal
name: Reading Response Journal
category: reading
description: 'After reading, students write a structured response: summary, personal
  connection, question, and prediction. Develops critical reading and writing skills.'
targetStructures:
- reading-comprehension
- writing-accuracy
bestForLevels:
- A2
- B1
- B2
- C1
duration: 15
groupSize: individuals
energyRequired: low
prepTime: low
materials:
- Reading texts
- Response journal templates
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give students a reading text. They read silently.
- 'After reading, students write a response using the format: (1) Summary: What was
  the text about? (2) Connection: How does this relate to your life? (3) Question:
  What do you still wonder? (4) Prediction: What will happen next?'
- Students write for 10 minutes. Encourage complete sentences and specific details.
- 'Optional: Students share their responses in pairs or small groups.'
- Collect journals periodically to track reading comprehension and writing development.
- 'Discuss: Which part of the response was hardest? Why?'
script:
- '"The text silently. Then write your response: summary, connection, question, and
  prediction."'
- '"Your time. There are no wrong answers -- I want to think about your thinking."'
setupInstructions: Select engaging texts at the appropriate level. Create a response
  journal template with the four sections.
differentiation:
  support: Provide sentence starters for each section. Use shorter texts. Allow drawing
    for the summary.
  extension: 'Require longer, more detailed responses. Add a section: ''What is the
    author''s purpose?'''
keywords:
- response journal
- critical reading
- writing
- reflection
- comprehension
l1Enhanced: true
