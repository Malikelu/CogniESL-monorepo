id: fishbowl
name: Fishbowl
category: speaking
description: 4-5 students sit in an inner circle and discuss while the rest observes.
  Observers can tap in to replace a speaker. Develops discussion skills and active
  listening.
targetStructures:
- speaking-fluency
- discourse
- verb-tenses
bestForLevels:
- B1
- B2
- C1
duration: 20
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Chairs in inner and outer circles
- Discussion topic cards
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Arrange 4-5 chairs in the center (the fishbowl). The rest of the class sits around
  them.
- Give the inner circle a discussion topic. They discuss while the outer circle observes
  silently.
- 'Rules: Everyone must speak at least once. Build on what others say. Disagree politely.'
- After 5 minutes, an outer circle student can tap in -- they tap a speaker on the
  shoulder and take their seat.
- Continue for 15 minutes with several tap-ins.
- 'Debrief: Observers share what they noticed. Inner circle reflects.'
- 'Discuss: What makes a good discussion?'
script:
- 'Inner circle, discuss: Is it better to live in a city or the countryside? Outer
  circle, listen and take notes.'
- '"Observer, if you want to join, tap someone on the shoulder."'
setupInstructions: Arrange chairs in inner and outer circles. Prepare 3-4 discussion
  topics.
differentiation:
  support: Provide discussion frames. Use simpler topics.
  extension: Require the inner circle to reach a consensus. Observers evaluate using
    a rubric.
keywords:
- fishbowl
- discussion
- observation
- inner circle
l1Enhanced: true
