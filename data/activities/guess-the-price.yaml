id: guess-the-price
name: Guess the Price
category: vocabulary
description: Students guess the cost of common items, practicing large numbers, currency,
  and comparative-superlative structures. A market-value estimation game that builds
  real-world vocabulary and numeracy skills.
targetStructures:
- vocabulary
bestForLevels:
- A1
- A2
- B1
bestForAges:
- teens
- adults
duration: 15
groupSize: small-groups
energyRequired: medium
prepTime: medium
materials:
- Photos or actual common products (phone, car, coffee, apartment, etc.)
- Price cards with actual prices hidden
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Show students a photo or actual item (e.g., a smartphone).
- Each group writes down their guess for the price.
- Reveal the actual price. The group closest to the correct price earns a point.
- 'Use comparative and superlative language: ''Group A guessed higher than Group B.''
  ''Group C had the closest guess.'''
- Continue with 8-10 items. The group with the most points wins.
- 'Debrief: discuss which items were hardest to estimate and why.'
script:
- '"Look at this item. How much do you think it costs? Write your guess on your paper."'
- '"Group A guessed $500. Group B guessed $800. The actual price is $650. Group A
  is closer!"'
- '"Which group had the highest guess? Which had the lowest?"'
setupInstructions: Gather photos or actual items of 8-10 common products with varying
  prices. Prepare a price reveal card for each item. Ensure items are culturally appropriate
  and relevant to students' lives.
exampleSnippet:
  topic: numbers, comparatives, and superlatives
  execution:
  - 'Item: A cup of coffee. Groups guess: $2, $5, $10. Actual price: $4.50.'
  - 'Item: A new car. Groups guess: $15,000, $30,000, $50,000. Actual price: $28,000.'
  - 'Teacher: ''Group B guessed the highest. Group A had the closest guess.'''
  teacherDialogue:
  - '"How much does a coffee cost in your country? Is it cheaper or more expensive
    than here?"'
  - '"Which item was the most expensive? Which was the cheapest?"'
differentiation:
  support: Provide a price range for each item (e.g., 'Between $500 and $1000'). Use
    simpler numbers. Allow students to work in larger groups.
  extension: Have students research actual prices online and present findings. Add
    items from different countries. Require students to use comparative and superlative
    structures in full sentences.
keywords:
- vocabulary
- prices
- numbers
- guessing
- real-world
- estimation
- currency
- shopping
l1Enhanced: true
