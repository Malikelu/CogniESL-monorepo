id: recycling-race
name: Recycling Race
category: integrated-skills
description: An environmental sorting relay where teams race to place items in correct
  recycling bins while naming the material. Practices environmental vocabulary, categorization,
  and teamwork.
targetStructures:
- nouns
- verb-passive
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
bestForAges:
- kids
- teens
duration: 15
groupSize: small-groups
energyRequired: high
prepTime: medium
materials:
- Clean rubbish items (plastic bottles, paper, glass jars, food waste)
- Labeled bins (plastic, paper, glass, organic)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Set up 4 labeled bins at one end of the room: PLASTIC, PAPER, GLASS, ORGANIC.'
- Place a bag of clean rubbish items at the other end. Divide students into teams.
- One student from each team runs to the bag, picks up an item, names the material
  ('This is plastic!'), and places it in the correct bin.
- If they name the material incorrectly or put it in the wrong bin, they must try
  again.
- The next team member goes. The first team to sort all items correctly wins.
- 'Debrief: What materials were hardest to identify? Review vocabulary: ''This bottle
  is made of plastic. This jar is made of glass.'''
script:
- '"Ready, set, go! Pick up an item, name the material, and put it in the right bin!"'
- '"What is it made of? Say the material: This is paper! This is glass!"'
- '"Check your bins -- did any team put something in the wrong bin? Let us review."'
setupInstructions: 'Collect clean rubbish items: plastic bottles, cardboard, newspaper,
  glass jars, aluminum cans, food scraps (in a container). Label 4 bins or boxes:
  PLASTIC, PAPER, GLASS, ORGANIC. Arrange the room so teams can run between the bag
  and bins.'
exampleSnippet:
  topic: Environmental vocabulary and categorization
  execution:
  - 'Student picks up a plastic bottle: ''This is plastic!'' Puts it in the PLASTIC
    bin. Correct!'
  - 'Student picks up a banana peel: ''This is... organic?'' Puts it in the ORGANIC
    bin. Correct!'
  - 'Student picks up a cereal box: ''This is paper!'' Puts it in the PAPER bin. Correct!'
  teacherDialogue:
  - '"What material is this? Is it plastic, paper, glass, or organic?"'
  - '"Remember to say the full sentence: This is...!"'
differentiation:
  support: Label the bins with both the material name and a picture. Allow weaker
    students to take their time and think before answering. Provide a word bank of
    material vocabulary.
  extension: 'Challenge stronger teams to use passive voice: ''This bottle is made
    of plastic.'' ''This box is made of cardboard.'' Add a fifth bin for items that
    are not recyclable. At B2 level, require students to explain why certain materials
    go in certain bins.'
keywords:
- environment
- recycling
- categorization
- relay
- vocabulary
- teamwork
l1Enhanced: true
