id: vocabulary-cricket
name: Vocabulary Cricket
category: games
description: A quiz game styled like cricket. One student bats (answers questions)
  while the others field (ask questions). When the batter gets one wrong, they are
  out and the next student bats.
targetStructures:
- vocabulary
- verb-tenses
- sentence-structure
bestForLevels:
- A2
- B1
- B2
- C1
duration: 20
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Question cards (prepared by teacher)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- One student is the batter. The rest of the class are fielders.
- Fielders take turns asking the batter questions (vocabulary, grammar, general knowledge).
- If the batter answers correctly, they score a run. If wrong, they are out and the
  next student bats.
- After 3 outs, switch sides (new batter).
- The student with the most runs wins.
- Review any questions that stumped multiple students.
script:
- Batter, you are up. Fielders, ask your questions. If they get one wrong, they are
  out!
- Correct! One run. Next question!
setupInstructions: Prepare 30-40 question cards at the appropriate level. Include
  a mix of vocabulary, grammar, and general knowledge questions.
differentiation:
  support: Use easier questions. Allow the batter to have 2 lifelines (ask the class
    for help).
  extension: Use harder questions. Require the batter to answer in complete sentences.
keywords:
- cricket
- quiz
- batting
- fielding
- competition
l1Enhanced: true
