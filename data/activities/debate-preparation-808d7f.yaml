instructions:
- Announce a debate topic related to your lesson (e.g., 'Social media is harmful for
  teenagers.').
- Divide the class into 'For' and 'Against' teams.
- Give teams 15 minutes to research and outline 3 main arguments with supporting evidence.
- Teams should also anticipate the other side's arguments and prepare counterarguments.
- Each team selects a speaker for each argument and a rebuttal speaker.
- Conduct the debate in the next class period.
script:
- '"Topic for 10 min."'
- Outline 3 arguments.
- Anticipate counterpoints.
