instructions:
- Choose a simple, neutral story scenario that works across genres (e.g., 'A cat climbed
  a tree and could not get down' or 'A student discovered a lost wallet').
- Prepare a list of 8-10 genres appropriate for the level (news report, fairy tale,
  scientific report, text message, diary entry, formal letter, tabloid headline, academic
  paper, etc.).
- Assign each student a different genre. Provide model paragraphs or word banks for
  lower levels.
- Students write one paragraph about the same event in their assigned genre, focusing
  on register, word choice, and tone.
- Students share their versions in small groups or with the whole class.
- 'Facilitate a class discussion: How did the language change? What words were different?
  How did the tone shift?'
- Optionally, create a class display showing all versions side by side for visual
  comparison.
script:
- '"Everyone will write about the same event: someone finds a mysterious box. But
  each of you will write in a different style. One person writes a news report, another
  writes a horror story, another writes a fairy tale. Same event, very different stories!"'
- '"Think about the words and style of your genre. A news reporter writes differently
  from a horror novelist. What makes each genre unique?"'
setupInstructions: Prepare a simple story scenario that can be adapted to multiple
  genres. Create genre assignment cards (news report, sci-fi, romance, horror, comedy,
  fairy tale, detective, etc.). Provide examples of each genre if possible. Ensure
  paper and pens are available.
exampleSnippet:
  topic: register and genre
  execution:
  - 'The scenario: ''A woman finds a glowing box on her doorstep.'' The news reporter
    writes: ''At approximately 8 PM, a local resident discovered an unusual package...''
    The horror writer writes: ''The box pulsed with an eerie glow. Sarah''s hands
    trembled as she reached for the lid...'' The fairy tale writer writes: ''Once
    upon a time, a kind old woman found a magical box...'''
  teacherDialogue:
  - '"Everyone will write about the same event: someone finds a mysterious box. But
    each of you will write in a different style."'
  - '"Think about the words and style of your genre. A news reporter writes differently
    from a horror novelist. What makes each genre unique?"'
differentiation:
  support: Provide a model paragraph for each genre. Allow students to work in pairs.
    Use simpler genres (fairy tale, news report) for lower levels.
  extension: Students write longer pieces (full page). They can also rewrite their
    paragraph in a second genre. Discuss how genre affects word choice, sentence structure,
    and tone.
keywords:
