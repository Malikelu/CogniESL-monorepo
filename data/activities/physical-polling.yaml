id: physical-polling
name: Physical Polling
category: speaking
description: Students move to different areas of the room based on their agreement
  or disagreement with a statement, then discuss their opinions with classmates nearby.
  An opinion-based movement task that visually represents class data and primes students
  for debate.
targetStructures:
- verb-modals
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
- C1
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Signs for Yes/Agree and No/Disagree zones
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Designate one side of the room as Agree/Yes and the other as Disagree/No. Optionally,
  mark a middle zone as Not Sure.
- Read a statement aloud (e.g., 'Dogs are better than cats,' 'Homework is important,'
  'Summer is the best season').
- Students move to the zone that represents their opinion.
- 'In their zones, students discuss with 2-3 nearby classmates: ''Why do you think
  that?'' ''What is your reason?'''
- Ask 1-2 students from each zone to share their reasoning with the class.
- Repeat with new statements. Vary the difficulty and controversy of topics.
- 'Debrief: What interesting opinions did we hear? Review opinion language on the
  board.'
script:
- '"Here is my statement: Chocolate is the best flavor. If you agree, move to the
  right side. If you disagree, move to the left. If you are not sure, stay in the
  middle."'
- '"Now, talk to the people near you. Why do you agree? Why do you disagree? Give
  your reasons."'
- '"Let us hear from the disagree side. Who can tell us why chocolate is NOT the best
  flavor?"'
setupInstructions: 'Clear space in the classroom so students can move freely. Mark
  three zones on the board or with tape: Agree, Not Sure, Disagree. Prepare 5-8 opinion
  statements at appropriate difficulty levels. Start with light topics and progress
  to more thought-provoking ones.'
exampleSnippet:
  topic: Opinion sharing and agreement
  execution:
  - 'Statement: ''Social media is bad for teenagers.'' Students move to Agree, Disagree,
    or Not Sure zones.'
  - 'In zones, students discuss: ''I agree because...'' ''I disagree because...''
    ''I am not sure because...'''
  - 'Class shares: ''In the Agree zone, Maria says social media causes anxiety. In
    the Disagree zone, Ahmed says it helps people stay connected.'''
  teacherDialogue:
  - '"Move to the zone that matches your opinion. Do not be afraid -- there is no
    wrong answer!"'
  - '"Now explain your opinion to your neighbors. Use: I think... because... In my
    opinion..."'
differentiation:
  support: 'Use simple, low-stakes topics such as favorite colors, foods, and seasons.
    Provide sentence frames: ''I agree because...'' ''I disagree because...'' ''I
    think X is better because...'' Allow students to point to their zone instead of
    speaking.'
  extension: 'Use more controversial or thought-provoking topics. Require students
    to persuade someone from the opposite zone to change their position. Introduce
    debate language: ''I see your point, but...'' ''However, I think...'' ''On the
    other hand...'' Have students write a short paragraph explaining their opinion
    after the activity. At C1 level, require students to use hedging language and
    acknowledge counterarguments.'
keywords:
- opinions
- movement
- polling
- debate
- agreement
- discussion
- survey
l1Enhanced: true
