instructions:
- Give each student 2-3 slips of paper. Pose a question or statement.
- Students write their opinion on a slip. They do NOT write their name.
- Students fold their slips and put them in the box.
- The teacher draws slips one at a time and reads them aloud anonymously.
- 'After each slip, the class discusses: Do you agree? Why or why not?'
- 'Discuss: Were there any surprising opinions?'
script:
- Write your opinion on this slip. Do NOT put your name. Fold it and put it in the
  box.
- Let me read the first one... Do you agree?
setupInstructions: Have slips of paper and a box ready. Prepare 2-3 discussion questions.
differentiation:
  support: Provide sentence starters. Use simpler questions.
  extension: Require 2-3 sentences with reasons. After reading, have students debate.
keywords:
- ballot box
