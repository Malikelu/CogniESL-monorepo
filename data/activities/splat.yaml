id: splat
name: Splat!
category: games
description: A rapid visual identification race where two students compete to swat
  the correct word or picture on the board. Increases reaction time for word recognition
  and auditory processing.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: high
prepTime: low
materials:
- Flashcards or word cards
- Fly swatters (or rolled-up paper)
- Tape or magnets for board display
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Display 8-12 word cards or picture cards on the board where all students can see
  them.
- Two students come to the front, each with a fly swatter. They face the board.
- Call out a word or describe a picture. The first student to swat the correct card
  wins the round.
- The winner stays at the front. The loser sits down and a new challenger comes up.
- Play for 8-10 rounds. The student with the most wins is the champion.
- Rotate so all students get at least one turn.
script:
- '"Ready? SWAT the word that means a large gray animal with a trunk! GO!"'
- ELEPHANT! Maria got it first -- 1 point for Maria! Next challenger, come on up.
- SWAT the past tense of 'run'! Quick! RAN! Carlos got it!
setupInstructions: Prepare 8-12 large word cards or picture cards related to your
  lesson topic. Attach them to the board with tape or magnets. Get two fly swatters
  (or rolled-up paper). Clear space at the front for students to move.
exampleSnippet:
  topic: irregular past tense verbs
  execution:
  - 'Cards on board: went, ate, saw, bought, took, gave, made, wrote, spoke, drove.'
  - 'Teacher says: ''Past tense of SEE.'' Students race to swat SAW.'
  - 'Teacher says: ''Past tense of BUY.'' Students race to swat BOUGHT.'
  teacherDialogue:
  - Get ready... SWAT the past tense of DRIVE! DRIVE -- what's the past tense? GO!
  - Perfect! Drove! Now -- SWAT the word that means to purchase something!
differentiation:
  support: Use pictures alongside words. Give a longer pause before students swat.
    Allow students to point instead of swatting. Provide the word bank on the board
    for reference.
  extension: Call out definitions instead of the word itself. Require students to
    also say a sentence using the word to earn the point. Add a time limit of 3 seconds
    per round.
keywords:
