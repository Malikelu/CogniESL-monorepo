id: cloze-story-builder-fa25af
name: Cloze Story Builder
category: reading
description: Students reconstruct a story by filling in missing words, developing
  reading prediction skills.
targetStructures:
- reading-comprehension
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 30
groupSize: pairs
energyRequired: medium
prepTime: low
materials:
- story with blanks
- word bank
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Select a short story or narrative text (200-300 words). Create a version with 15-20
  key words removed.
- Give students the gapped text. They read it first to understand the overall meaning.
- Students fill in the blanks with appropriate words. They can use a word bank or
  work from context alone.
- 'Students compare answers with a partner. Discuss: Did you choose the same words?
  Why or why not?'
- Review answers as a class. Discuss which clues in the text helped them choose the
  right words.
- 'Extension: Students create their own cloze version of a text for a partner to solve.'
script:
- '"Story with every 5th word missing."'
- '"Missing words from context."'
- '"Predictions with full text."'
differentiation:
  support: Provide multiple-choice options.
  extension: Remove word bank entirely.
keywords:
- cloze
