instructions:
- 'Model the activity: share three statements about yourself (two true, one lie).
  Have the class guess the lie and explain their reasoning.'
- Give students 2-3 minutes to think of their three statements. Encourage creative,
  surprising truths and believable lies.
- Each student shares their three statements with the class (or in small groups for
  larger classes).
- After hearing the three statements, classmates ask follow-up questions to try to
  catch the lie (e.g., 'When did you go to Japan?', 'What was the food like?').
- The class votes on which statement they think is the lie. The student reveals the
  answer.
- Continue until everyone has had a turn, or set a time limit and rotate.
script:
- '"I''ll go first. Here are three things about me: I''ve been to 15 countries. I
  can juggle. I once met the president. Which is the lie?"'
- '"Okay, your turn! Share your three statements. Make us believe the lie!"'
- '"Interesting! Can anyone ask a follow-up question to test that second statement?"'
setupInstructions: No materials needed. Prepare your own example to model the activity.
  Consider the class size -- for large classes, have students do this in groups of
  5-6.
exampleSnippet:
  topic: past simple -- life experiences
  execution:
  - 'Student: ''I broke my arm when I was 8. I''ve never been on a plane. I once sang
    in front of 500 people.'''
  - 'Class asks: ''Which arm did you break? How did it happen? Where were you?'''
  - 'Class votes. Student reveals: ''I have been on a plane -- that was the lie!'''
  teacherDialogue:
  - '"Remember to use past tense for your true statements: I went, I saw, I ate..."'
  - '"Great questions! You''re really interrogating that lie. What else do you want
    to know?"'
differentiation:
  support: Let struggling students write their statements down first. Provide sentence
    starters. Allow them to work with a partner who can help craft believable lies.
  extension: Challenge advanced students to tell all three statements in different
    tenses (past simple, present perfect, past continuous). Require the class to ask
    at least 3 follow-up questions before guessing.
keywords:
