id: word-sorting
name: Word Sorting
category: vocabulary
description: Students receive a set of word cards and must sort them into categories.
  They decide the categories themselves, which encourages deep thinking about word
  relationships.
targetStructures:
- vocabulary
- nouns
- adjectives
- adverbs
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: pairs
energyRequired: medium
prepTime: medium
materials:
- Word cards (20-30 per set)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give each pair a set of 20-30 word cards. The words should be related to your current
  unit.
- Students sort the words into categories. They decide the categories themselves.
- 'Example categories: parts of speech, positive/negative, formal/informal, topics,
  word families.'
- 'After sorting, pairs compare their categories with another pair. Discuss: Why did
  you group them this way?'
- 'Challenge: Can you sort the same words into DIFFERENT categories?'
- 'Discuss: How does organizing words by meaning help you remember them?'
- Students choose 5 words and write sentences using them.
script:
- Sort these words into categories. You decide the categories. There is no single
  right answer.
- Now compare with another pair. Did you group them the same way? Why or why not?
setupInstructions: Create 20-30 word cards per set using vocabulary from your current
  unit. Include words that can be categorized in multiple ways.
differentiation:
  support: Provide suggested category headings. Use fewer words (15). Include pictures
    for concrete nouns.
  extension: Use more words (30-40). Require students to create at least 3 different
    sorting systems. Have them explain their reasoning.
keywords:
- sorting
- categories
- word relationships
- classification
- vocabulary
l1Enhanced: true
