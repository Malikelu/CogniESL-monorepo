instructions:
- Give students a writing prompt related to your lesson.
- Set a timer for 5, 10, or 15 minutes. Students write continuously. No stopping,
  no erasing, no looking up words.
- If they get stuck, they write 'I do not know what to write' until a new idea comes.
- When the timer rings, students stop. They count their words.
- Students share their word count. Celebrate improvement, not just high numbers.
- 'Optional: Students read their writing to a partner. Partner gives one compliment
  and one suggestion.'
- 'Discuss: Was it hard to write without stopping? What did you learn about your writing
  habits?'
script:
- Write for 10 minutes. Do not stop. Do not erase. If you get stuck, write I do not
  know what to write until a new idea comes. Ready? Go!
- Stop! Count your words. How many did you write?
setupInstructions: Prepare 3-4 writing prompts. Have a visible timer. Explain that
  the goal is fluency, not perfection.
differentiation:
  support: Use shorter time (5 minutes). Provide a sentence starter. Allow students
    to write in their L1 if they get stuck.
  extension: Use longer time (15 minutes). Require a minimum word count. Have students
    revise their timed writing after the activity.
