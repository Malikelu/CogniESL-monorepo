id: word-splash
name: Word Splash
category: vocabulary
description: 15-20 vocabulary words from an upcoming text are splashed randomly on
  the board. Students predict how the words connect to each other and the topic.
targetStructures:
- vocabulary
- nouns
- adjectives
bestForLevels:
- A2
- B1
- B2
- C1
duration: 10
groupSize: pairs
energyRequired: low
prepTime: low
materials:
- None (words on board)
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Write 15-20 key vocabulary words randomly on the board.
- Students work in pairs to group words into categories.
- 'Students predict: What will this text be about?'
- Pairs share predictions with the class.
- 'Students read the text or begin the unit. They check: Were our predictions correct?'
- 'Discuss: Which predictions were right? Which surprised you?'
script:
- '"At these words. They are all from our next reading. Group them and predict what
  the text will be about."'
- Interesting predictions! Now let us read and see if you were right.
setupInstructions: Select 15-20 key vocabulary words from your upcoming text. Write
  them randomly on the board.
differentiation:
  support: Provide category headings. Use fewer words. Include pictures.
  extension: Challenge students to create a mind map. Have them write a paragraph
    using 10 words before reading.
keywords:
- word splash
- prediction
- vocabulary
- activation
- pre-reading
l1Enhanced: true
