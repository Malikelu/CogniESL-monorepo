id: audio-jigsaw
name: Audio Jigsaw
category: listening
description: Different students listen to different audio clips on the same topic.
  They share what they heard to build a complete picture.
targetStructures:
- listening-comprehension
- verb-tenses
- discourse
bestForLevels:
- B1
- B2
- C1
duration: 25
groupSize: small-groups
energyRequired: medium
prepTime: medium
materials:
- Different audio clips for each group member
- Note-taking sheets
format:
- in-person
- online
requiresTech: true
digitalReady: true
hasAudioComponent: true
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Prepare 4-5 different audio clips on the same topic. Each clip has different information.
- Each student listens to a DIFFERENT clip. They take notes on key information.
- Students take turns summarizing their clip. Others listen and take notes.
- 'The group discusses: What is the full story? How do the pieces fit together?'
- Groups answer comprehension questions that require information from ALL clips.
- 'Discuss: What was hardest -- listening, summarizing, or combining information?'
script:
- Each of you will listen to a different audio clip. Take careful notes -- your group
  needs the information only YOU have.
- Now share what you heard. Everyone else, listen carefully and take notes.
setupInstructions: Find or create 4-5 audio clips with complementary information.
  Prepare note-taking sheets and comprehension questions.
differentiation:
  support: Use shorter clips. Provide guided note-taking sheets with specific questions.
  extension: Use longer clips. Require students to identify the speaker's attitude,
    purpose, or bias.
keywords:
- audio jigsaw
- listening
- summarizing
- collaboration
- information gap
l1Enhanced: true
