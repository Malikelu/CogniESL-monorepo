instructions:
- 'Review the subjunctive mood: used for wishes, hypotheticals, and demands. Examples:
  ''I wish I were...'' / ''If I were you...'' / ''I suggest that he study.'''
- Give students 10 situations. They must write a subjunctive sentence for each.
- 'Example situations: ''You want to be a bird.'' -> ''I wish I were a bird.'' / ''Your
  friend is always late.'' -> ''I suggest that he arrive on time.'''
- Students share answers. Discuss any tricky cases.
- 'Practice: Students write 5 subjunctive sentences about their own life.'
- 'Review: When do we use ''was'' vs. ''were'' in subjunctive? (Formal: always ''were''.
  Informal: ''was'' is common.)'
script:
- '"Situation describing impossible desire."'
- '"Three sentences using different subjunctive patterns."'
- '"And compare structures."'
differentiation:
  support: Start with 'I wish I had...' formula.
  extension: Add inversion in conditionals.
