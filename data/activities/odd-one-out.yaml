instructions:
- Write a set of 4-5 words on the board (e.g., 'apple, banana, carrot, orange'). Students
  must identify the odd one out and explain why.
- 'Model the activity: ''Carrot is the odd one out because it is a vegetable. The
  others are fruits.'''
- Give each group a set of word cards or write new sets on the board. Groups discuss
  and decide on their answers.
- Each group shares their answer and justification. Accept multiple valid answers
  if well-reasoned.
- 'Discuss: Were there different answers? What different criteria did groups use?
  Category, spelling, pronunciation, meaning?'
- Play additional rounds with more challenging word sets. Increase difficulty by including
  words that could be odd for different reasons.
script:
- '"Look at these words: dog, cat, fish, horse. Which one is the odd one out? Think
  about why. Discuss with your group."'
- '"Group 1, what did you decide? Fish is the odd one out? Why? Because it lives in
  water? That is a valid reason!"'
- '"Group 2, do you agree? Or do you have a different answer? Horse is the odd one
  out because it is the biggest? Also valid!"'
setupInstructions: 'Prepare 5-6 sets of 4-5 words each, with increasing difficulty.
  Write them on the board or print on cards. Good starter sets: (apple, banana, carrot,
  orange), (red, blue, green, run), (piano, guitar, violin, drum).'
exampleSnippet:
  topic: Food vocabulary categorization
  execution:
  - 'Set 1: ''apple, banana, carrot, orange'' -- Carrot is the odd one out because
    it is a vegetable.'
  - 'Set 2: ''milk, juice, water, bread'' -- Bread is the odd one out because it is
    solid. The others are drinks.'
  - 'Set 3: ''pizza, hamburger, sandwich, rice'' -- Rice is the odd one out because
    it is not a prepared dish or it is a side dish.'
  teacherDialogue:
  - '"Which word does not belong? Remember to use the full sentence: X is the odd
    one out because..."'
  - '"Can you think of a different reason? Sometimes there is more than one correct
    answer!"'
differentiation:
  support: 'Use simpler word sets with obvious differences such as colors vs. animals.
    Provide a sentence frame: ''X is the odd one out because it is a Y. The others
    are Z.'' Allow students to work in pairs.'
  extension: 'Use more ambiguous word sets where multiple answers are valid. Require
    students to give at least two different reasons for their choice. Have students
    create their own odd-one-out sets for classmates to solve. Introduce more abstract
    categories such as emotions or abstract nouns. At C1 level, require students to
    use more sophisticated justification language: ''X stands out because...'' ''The
    common thread among the others is...'''
