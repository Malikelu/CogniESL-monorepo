instructions:
- Ask students to draw a simple timeline of their life with 5 key events (birth, school,
  moves, achievements, etc.).
- 'Model first: draw your own timeline and talk about each event using past simple
  and present perfect.'
- Students share their timelines with a partner, explaining each event.
- 'Partners ask follow-up questions: ''How old were you when...?'' / ''What happened
  after...?'''
- Ask 2-3 students to share their timeline with the class.
- 'Discuss: What tense do we use for completed past events? What tense for experiences
  up to now?'
script:
- '"Personal timeline."'
- '"5 life events."'
- '"Follow-up questions."'
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
