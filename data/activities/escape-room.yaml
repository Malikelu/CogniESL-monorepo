id: escape-room
name: Grammar Escape Room
category: review
description: Students solve grammar and vocabulary puzzles to escape the room. Each
  puzzle solved reveals a code that unlocks the next challenge. Highly engaging review.
targetStructures:
- verb-tenses
- vocabulary
- clauses
- sentence-structure
bestForLevels:
- A2
- B1
- B2
- C1
duration: 40
groupSize: small-groups
energyRequired: high
prepTime: high
materials:
- Puzzle cards
- Lock boxes or digital locks
- Answer keys
- Timer
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Create 5-6 puzzle stations. Each station has a grammar or vocabulary challenge.
  Solving it reveals a code for the final lock.
- 'Station examples: error correction, gap fill, word order, matching definitions,
  unscrambling sentences.'
- Divide the class into teams. Each team starts at station 1.
- Teams have 5 minutes per station. When they solve the puzzle, they get the code
  and move to the next station.
- After completing all stations, teams enter the final code to escape.
- The first team to escape wins. Review any puzzles that stumped multiple teams.
- 'Discuss: Which grammar points were hardest? What strategies helped you solve the
  puzzles?'
script:
- Welcome to the Grammar Escape Room! Solve each puzzle to get a code number. Use
  all the numbers to unlock the final lock!
- You have 5 minutes at this station. Work together. When the timer rings, move to
  the next station.
setupInstructions: Create 5-6 puzzle stations with increasing difficulty. Prepare
  lock boxes or use a digital lock system. Test all puzzles before class.
differentiation:
  support: Provide hints at each station. Use simpler puzzles. Allow more time per
    station.
  extension: Add bonus puzzles for fast teams. Include more complex grammar. Reduce
    time per station.
keywords:
- escape room
- puzzle
- review
- competition
- team work
l1Enhanced: true
