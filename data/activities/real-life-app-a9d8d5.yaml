instructions:
- Ask students to think about where they would actually use today's grammar or vocabulary
  outside the classroom.
- 'Examples: ordering food (would like vs. want), job interviews (present perfect
  for experience), travel (directions, prepositions).'
- Students write 2-3 real-life situations where they would use what they learned.
- Share in small groups. Groups choose the most interesting or useful example.
- Each group shares their best example with the class.
- 'Discuss: How can you practice English in real life this week?'
script:
- '"Real situation."'
- '"English grammar use."'
- '"Example."'
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
