instructions:
- 'Review tag questions: positive statement + negative tag (''You like coffee, don''t
  you?'') and negative statement + positive tag (''You don''t like tea, do you?'').'
- Write 10 statements on the board. Students add the correct tag.
- 'Practice pronunciation: rising tone for real questions, falling tone for confirmation.'
- 'Students work in pairs: one makes a statement, the other adds the tag.'
- 'Role play: Student A is a detective asking questions. Student B answers. Use tag
  questions to confirm information.'
- 'Discuss: When do we use tag questions in real life? (Confirming, being polite,
  starting conversation)'
script:
- '"Sentences with appropriate tags."'
- '"Rising/falling intonation."'
- Role play conversations using tags.
differentiation:
  support: Start with common patterns (isn't it, don't you).
  extension: Add emotional tags (right?, OK?).
keywords:
- tag question
- confirmation
- social
l1Enhanced: true
