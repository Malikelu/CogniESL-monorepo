instructions:
- Play music and have students dance freely around the room.
- When the music stops, everyone must freeze in position.
- 'Call out a body part or color. Students must describe their frozen pose: ''My hand
  is on my head.'' / ''I am wearing blue.'''
- Ask 2-3 students to describe their full pose using complete sentences.
- 'Play music again and repeat. Each round, add a requirement: use a specific tense,
  use an adjective, use a preposition.'
- 'After 4-5 rounds, discuss: What vocabulary did we practice? What structures did
  we use?'
script:
- Play music and dance.
- When music stops, freeze.
- Describe pose using colors.
differentiation:
  support: Use simple adjective words.
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
