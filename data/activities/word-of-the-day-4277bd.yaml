instructions:
- Introduce a new challenging word at the start of class. Write it on the board with
  its definition and an example sentence.
- 'Students write the word in their vocabulary notebook with: definition, synonym,
  antonym, and their own example sentence.'
- Throughout the class, try to use the word naturally in context.
- At the end of class, ask students to use the word in a sentence about their day.
- Start the next class by asking students to recall yesterday's word and use it.
- Keep a running list of 'words of the day' on the wall.
script:
- '"Teacher gives challenging word."'
- Students define it.
- '"Synonym and antonym."'
differentiation:
