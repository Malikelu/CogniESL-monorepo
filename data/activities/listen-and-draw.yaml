id: listen-and-draw
name: Listen and Draw
category: listening
description: Listen and Draw -- a listening activity. Prepare a detailed description
  of a scene with specific colors, sizes, positions, numbers. Give students blank
  paper and colored pencils....
targetStructures:
- listening-comprehension
- prepositions
- adjectives
bestForLevels:
- A1
- A2
- B1
duration: 15
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Paper and colored pencils
- Prepared description script
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Prepare a detailed description of a scene with specific colors, sizes, positions,
  numbers.
- Give students blank paper and colored pencils.
- Read the description once at normal speed. Students listen but do not draw.
- Read a second time. Students draw as they listen.
- Read a third time. Students add details they missed.
- Show the original image. Students compare their drawings.
- 'Discuss: What details did you miss? What words helped you draw accurately?'
script:
- Listen carefully. I am going to describe a scene. Just listen first -- do not draw
  yet.
- Now I will read it again. This time, draw what you hear.
setupInstructions: Write a detailed description using vocabulary from your lesson.
  Prepare an answer key image.
differentiation:
  support: Use simpler descriptions. Read more slowly. Allow students to ask you to
    repeat.
  extension: Use more complex descriptions. Read only twice. Have students write the
    description from memory.
keywords:
- listening
- drawing
- description
- details
- comprehension
l1Enhanced: true
