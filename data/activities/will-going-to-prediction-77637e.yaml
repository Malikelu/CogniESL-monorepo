instructions:
- 'Review the difference: ''will'' for spontaneous decisions and predictions, ''going
  to'' for plans and evidence-based predictions.'
- 'Give students 10 scenarios. For each, they must decide: will or going to?'
- 'Example: ''Look at those dark clouds!'' -> ''It is going to rain.'' (evidence)
  / ''I think I will have coffee.'' (spontaneous decision)'
- Students share answers. Discuss any tricky cases.
- Students write 5 predictions about their own life using both 'will' and 'going to'.
- 'Partners discuss: Which predictions do you think will come true? Why?'
script:
- '"Scenario."'
- '"Will or going-to."'
- '"Reasoning."'
differentiation:
