id: photo-prompts
name: Photo Prompts
category: warm-up
description: 'Photo Prompts -- a warm-up activity. Show an interesting photo on the
  screen. Round 1: Students describe what they see....'
targetStructures:
- verb-tenses
- adjectives
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
- B2
- C1
duration: 10
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Interesting photos (projected)
format:
- in-person
- online
requiresTech: true
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: true
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Show an interesting photo on the screen.
- 'Round 1: Students describe what they see.'
- 'Round 2: Students speculate. Who is this person? What happened before? What will
  happen next?'
- 'Round 3: Students create a story.'
- Show 2-3 different photos. Vary the task each time.
- 'Discuss: What vocabulary was most useful?'
script:
- '"At this photo. What can you see? Describe it in as much detail as possible."'
- Now speculate. Who is this person? What happened before this photo?
setupInstructions: Find 3-5 interesting, thought-provoking photos. They should be
  rich in detail.
differentiation:
  support: Use simpler photos. Provide sentence starters.
  extension: Use ambiguous photos. Require a detailed story with beginning, middle,
    and end.
keywords:
- photo
- description
- speculation
- storytelling
- visual
l1Enhanced: true
