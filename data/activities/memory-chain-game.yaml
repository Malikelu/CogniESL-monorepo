id: memory-chain-game
name: Memory Chain Game
category: games
description: Students build a chain of sentences, each repeating all previous sentences
  and adding a new one. Builds memory, listening, and sentence construction.
targetStructures:
- verb-tenses
- vocabulary
- sentence-structure
bestForLevels:
- A1
- A2
- B1
- B2
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Start with a simple sentence. Example: I went to the store.'
- 'Student 1 repeats and adds: I went to the store, and I bought milk.'
- 'Student 2 repeats both and adds: I went to the store, I bought milk, and I saw
  my friend.'
- Continue around the room. Each student repeats the entire chain before adding.
- If a student makes a mistake, they are out or the class helps correct.
- Continue until the chain becomes too long or everyone has had a turn.
script:
- 'I will start: I went to the store. Now you repeat that and add something new.'
- Excellent! The chain is getting long. Can you remember all of it?
setupInstructions: No setup needed. Choose a starting sentence connected to your lesson.
differentiation:
  support: Use shorter chains. Allow students to look at notes.
  extension: 'Require longer chains. Add constraints: each sentence must use a specific
    grammar point.'
keywords:
- memory
- chain
- listening
- repetition
- sentences
l1Enhanced: true
