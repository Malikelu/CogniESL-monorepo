id: vocabulary-journal
name: Vocabulary Journal
category: vocabulary
description: Students maintain a personal vocabulary journal throughout the unit.
  They record new words with definitions, examples, and personal connections. Builds
  independent learning.
targetStructures:
- vocabulary
- nouns
- adjectives
- verb-patterns
bestForLevels:
- A2
- B1
- B2
- C1
duration: 10
groupSize: individuals
energyRequired: low
prepTime: low
materials:
- Notebooks or journal templates
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Give each student a vocabulary journal (notebook or template). Explain the format:
  Word, Definition, Example Sentence, Personal Connection, Drawing (optional).'
- Throughout the unit, when students encounter new words, they add them to their journal.
- Once a week, students review their journals. They test themselves by covering the
  definitions and trying to remember.
- Students share their journals in pairs. They teach each other 3 words from their
  journal.
- Periodically, collect journals to check progress and provide feedback.
- At the end of the unit, students choose their 10 most important words and create
  a quiz for a partner.
script:
- Every time you learn a new word, add it to your journal. Write the definition, an
  example, and a personal connection.
- '"Your journal with your partner. Teach them 3 new words."'
setupInstructions: 'Create a vocabulary journal template with columns: Word, Definition,
  Example, Personal Connection, Drawing. Have notebooks available.'
differentiation:
  support: Provide a word bank of key vocabulary. Allow students to use their L1 for
    definitions. Include pictures.
  extension: Require students to include synonyms, antonyms, and collocations. Have
    them write a short text using 10 journal words.
keywords:
- vocabulary journal
- independent learning
- word bank
- review
l1Enhanced: true
