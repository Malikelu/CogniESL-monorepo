instructions:
- Place a chair at the front facing the class. This is the hot seat.
- One volunteer sits in the hot seat. The class asks them questions.
- The student must answer spontaneously. No preparation time.
- 'Vary the question types: personal, imaginative, review-based, or silly.'
- After 2-3 minutes, switch to a new student.
- Play 3-4 rounds.
- 'Discuss: What was hardest -- answering quickly or thinking of questions?'
script:
- Who wants to sit in the hot seat? The class will ask you questions and you must
  answer immediately.
- Good! Now let us ask some harder questions.
setupInstructions: No setup needed. Optionally prepare question cards for students
  who struggle to think of questions.
differentiation:
  support: Allow a lifeline -- they can ask the class for help once. Use simpler questions.
  extension: 'Add a rule: must answer in complete sentences. Require follow-up questions.'
