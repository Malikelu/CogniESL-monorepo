id: quiz-show
name: Quiz Show
category: games
description: A game-show format review activity. Teams compete to answer questions
  across categories. Includes a final question round for dramatic finishes.
targetStructures:
- verb-tenses
- vocabulary
- clauses
bestForLevels:
- A1
- A2
- B1
- B2
- C1
duration: 30
groupSize: small-groups
energyRequired: high
prepTime: medium
materials:
- Question cards by category and point value
- Scoreboard
- Timer
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Divide into 3-4 teams. Draw a grid: 4 categories x 5 point values (100-500).'
- Teams choose a category and point value. Read the question.
- The team has 30 seconds to discuss and answer. Correct = points. Wrong = other teams
  can steal.
- 'Include special rounds: Double Points and Final Question (all teams wager points).'
- The team with the most points wins.
- Review any questions that stumped multiple teams.
script:
- '"To the Quiz Show! Team 1, choose a category and point value."'
- Grammar for 300! Here is your question... 30 seconds. Go!
setupInstructions: Create 20-30 questions in 4 categories with 5 difficulty levels.
  Prepare a scoreboard.
differentiation:
  support: Use simpler questions for lower points. Allow notes for 100-point questions.
  extension: Include trick questions. Require teams to explain their answers.
keywords:
- quiz show
- game show
- review
- competition
- points
l1Enhanced: true
