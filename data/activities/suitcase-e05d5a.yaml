instructions:
- 'Tell students: ''You are going on a trip. You can only take 5 things in your suitcase.
  What do you take and why?'''
- 'Students write their 5 items with reasons: ''I will take a book because I love
  reading.'''
- In small groups, students share their choices. The group must agree on 5 items for
  a shared suitcase.
- Each group presents their suitcase to the class and explains their choices.
- 'Discuss: How did you negotiate? What grammar did you use? (will, because, so that)'
- 'Extension: Add constraints -- the suitcase can only weigh 10kg, or the trip is
  to a specific country.'
script:
- '"Packing suitcase."'
- '"One rule not to forget."'
- '"Why important."'
