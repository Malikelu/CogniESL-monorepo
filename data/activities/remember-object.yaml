id: remember-object
name: Remember Object
category: integrated-skills
description: A rapid-exposure memory drill where the teacher briefly reveals objects
  on a tray, then covers them and students must list what they saw. Sharpens concentration
  and increases the speed of visual-lexical retrieval.
targetStructures:
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
duration: 10
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Tray of random items (8-12 objects)
- Cloth or towel to cover the tray
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Place 8-12 random objects on a tray. Cover the tray with a cloth.
- Gather students around the table. Uncover the tray for exactly 30 seconds. Students
  must memorize all objects.
- 'Cover the tray again. Students write down as many objects as they can remember,
  using full sentences: ''There was a pen. There was a key.'''
- After 1 minute, uncover the tray and check. Students compare their lists with the
  actual objects.
- Repeat with a new set of objects. Gradually increase the number of objects or decrease
  the viewing time.
- 'Discuss memory strategies: Did you group objects? Did you make a story? Did you
  focus on colors?'
script:
- '"I am going to show you the tray for 30 seconds. Look carefully and try to remember
  everything."'
- '"Time is up! Cover your eyes. Now write down what you saw. Use There was a... or
  There were..."'
- '"Let us check. How many did you remember? Who got all 10?"'
setupInstructions: 'Collect 8-12 small household items: pen, key, coin, eraser, spoon,
  marble, rubber band, paper clip, button, cork, etc. Place them on a tray and cover
  with a cloth. Prepare 2-3 different sets for multiple rounds.'
exampleSnippet:
  topic: Articles and there is/are
  execution:
  - 'Tray items: pen, key, coin, spoon, marble, rubber band, paper clip, button.'
  - 'Student writes: ''There was a pen, a key, a coin, a spoon, a marble, a rubber
    band, a paper clip, and a button.'''
  - 'Check: Student remembered all 8. Discuss: ''How did you remember them all?''
    ''I grouped them: things for writing (pen, paper clip), things for opening (key,
    coin)...'''
  teacherDialogue:
  - '"Use articles: a pen, an eraser, a key. Remember: a before consonants, an before
    vowels."'
  - '"How many did you remember? Who got all 8?"'
differentiation:
  support: Reduce the number of objects to 5-6 and increase viewing time to 45 seconds.
    Provide a word bank of the objects. Allow students to work in pairs.
  extension: 'Increase to 15 objects and reduce viewing time to 20 seconds. Challenge
    students to use more complex descriptions: ''There was a small silver coin.''
    At B2 level, require students to use ''there were'' for plural items and write
    full sentences with adjectives.'
keywords:
- memory
- observation
- vocabulary
- concentration
- visual
- recall
l1Enhanced: true
