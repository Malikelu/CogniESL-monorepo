id: pictionary-relay
name: Pictionary Relay
category: games
description: Teams race to draw and guess vocabulary words. One student draws, their
  team guesses, then the next student draws. Fast-paced team competition.
targetStructures:
- vocabulary
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: small-groups
energyRequired: high
prepTime: low
materials:
- Whiteboard or large paper
- Markers
- Word cards
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Divide the class into teams of 4-5. Line up each team facing the board.
- The first student draws a word card. They have 60 seconds to draw it (no letters,
  no talking).
- Their team guesses. When they guess correctly, the next student draws.
- The first team to finish all their cards wins.
- Review any words that were hard to draw or guess.
script:
- First student, draw your word. No talking, no letters! Your team guesses. Go!
- '"Correct! Next student, draw!"'
setupInstructions: Prepare 15-20 word cards per team using vocabulary from your current
  unit.
differentiation:
  support: Use easier, more concrete words. Allow the drawer to say the first letter.
  extension: 'Use more abstract words. Add a rule: the drawer cannot use stick figures.'
keywords:
- pictionary
- drawing
- guessing
- relay
- team
l1Enhanced: true
