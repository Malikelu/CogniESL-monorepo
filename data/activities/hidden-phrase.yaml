id: hidden-phrase
name: Hidden Phrase
category: listening
description: Partners hide a secret phrase in their dialogue while other students
  listen carefully to catch it. A detail-oriented listening game that practices intensive
  listening for specific detail within natural speech, building awareness of connected
  speech and conversational English.
targetStructures:
- listening-comprehension
- clauses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 15
groupSize: small-groups
energyRequired: medium
prepTime: low
materials:
- Secret phrase cards (one per pair)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Prepare secret phrase cards with common expressions: ''by the way'', ''as soon
  as possible'', ''it depends'', ''no way'', ''I mean'', ''you know'', ''sort of'',
  ''kind of'', etc.'
- Each pair receives a secret phrase card. They must have a natural conversation and
  include their phrase at least twice.
- The listening students must identify the hidden phrase.
- Pairs perform their conversation (2-3 minutes). Listening students write down the
  phrase they heard.
- After each conversation, reveal the secret phrase. Award points to students who
  identified it correctly.
- 'Debrief: discuss which phrases were hardest to catch and why.'
script:
- '"Each pair has a secret phrase. Have a natural conversation and try to include
  your phrase without making it obvious."'
- '"Listeners, your job is to catch the hidden phrase. Write it down when you hear
  it."'
- '"Pair 1, let us hear your conversation. Listeners, are you ready?"'
setupInstructions: Prepare 6-8 secret phrase cards with common English expressions.
  Print enough for each pair. Choose phrases at the appropriate level — common idioms,
  discourse markers, and conversational phrases work well.
exampleSnippet:
  topic: listening for specific phrases
  execution:
  - 'Secret phrase: ''by the way'''
  - 'Conversation: ''I went to the store yesterday. By the way, did you hear about
    the new restaurant? It was crowded, but by the way, the food was amazing.'''
  - 'Listeners identify the phrase: ''by the way''.'
  teacherDialogue:
  - '"Did anyone catch the hidden phrase? What did you hear?"'
  - '"Great listening! The phrase was ''by the way''. How many times did they use
    it?"'
differentiation:
  support: Tell listeners what type of phrase to listen for (e.g., a time expression,
    a connector). Use shorter conversations. Allow the performing pair to use the
    phrase three times instead of two.
  extension: Have pairs use the phrase only once, making it harder to catch. Or have
    multiple pairs perform simultaneously. Use more subtle phrases that blend into
    natural speech.
keywords:
