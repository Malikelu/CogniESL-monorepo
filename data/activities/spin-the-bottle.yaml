id: spin-the-bottle
name: Spin the Bottle
category: review
description: A randomized questioning activity where a bottle is spun and the student
  it points to must answer a review question. Gamifies review sessions and manages
  cold-calling in a low-stress, playful manner.
targetStructures:
- clauses
bestForLevels:
- A1
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Empty bottle or spinner
- Prepared review questions
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Arrange students in a circle (or around a central table). Place the bottle in the
  center.
- Prepare a set of review questions covering recent vocabulary, grammar, or content.
- Spin the bottle. When it stops, ask the student it points to a review question.
- The student answers. If correct, they earn a point (or stay in the game). If incorrect,
  the question goes to the next student.
- Spin again. Continue until all questions are used or time is up.
- Optionally, let the answering student spin the bottle for the next question.
script:
- Spin the bottle! It is pointing to... Ahmed. What is the past tense of 'go'? Go
  ahead!
- Went! Correct! Now Ahmed, you spin for the next question.
- 'The bottle points to Yuki. Complete this sentence: If I had more time, I ____.'
- '"Good try -- ''would travel'' is correct. Yuki, spin again!"'
setupInstructions: Get an empty bottle (or use a digital spinner as an alternative).
  Prepare 10-15 review questions covering your current lesson material. Arrange seating
  in a circle if possible.
exampleSnippet:
  topic: past simple review
  execution:
  - 'Question: ''What did you eat for breakfast?'' Student answers: ''I ate toast
    and eggs.'''
  - 'Question: ''Where did you go last weekend?'' Student answers: ''I went to the
    park.'''
  - 'Question: ''What is the past tense of buy?'' Student answers: ''Bought!'''
  teacherDialogue:
  - Spin! Okay, the bottle chose you. Here is your question...
  - Not quite -- anyone else want to try? The answer is 'bought.'
differentiation:
  support: Give struggling students easier questions or allow them to choose from
    two questions. Let them consult notes.
  extension: Require advanced students to answer with a full sentence and add a follow-up
    detail. Have them also create a follow-up question for the class.
keywords:
- review
- random selection
- cold calling
- bottle
- questioning
- gamified review
l1Enhanced: true
