instructions:
- 'Set up 4 writing stations around the room. Each station has a different writing
  task: (1) Descriptive: Describe a place. (2) Narrative: Tell a story. (3) Persuasive:
  Argue for or against something. (4) Creative: Write a poem or dialogue.'
- Students spend 7 minutes at each station. They write continuously for the full 7
  minutes.
- When the timer rings, students move to the next station. They continue what they
  were writing or start fresh.
- After visiting all stations, students choose their favorite piece to revise and
  share.
- 'Discuss: Which station was hardest? Which was most fun? Why?'
- Students revise their chosen piece for homework.
script:
- You will visit 4 writing stations. At each station, write for 7 minutes. When the
  timer rings, move to the next station.
- Choose your favorite piece to revise and share with the class.
setupInstructions: Create 4 station cards with clear writing prompts. Set up stations
  around the room. Have writing paper at each station.
differentiation:
  support: Provide sentence starters at each station. Allow shorter writing time (5
    minutes). Use simpler prompts.
  extension: Require longer pieces at each station. Add a peer review step after the
    activity.
