instructions:
- Write 5 sentences on the board. Read each one aloud, clapping on stressed syllables.
- 'Students mark the stressed syllables: ''I WANT to GO to the STORE.'''
- Practice saying the sentences with correct stress. Emphasize content words (nouns,
  verbs, adjectives) over function words.
- 'Students work in pairs: one reads, the other marks the stress pattern.'
- 'Discuss: How does stress change meaning? (e.g., ''I didn''t say HE stole it'' vs.
  ''I didn''t say he STOLE it'')'
- Students practice reading a short dialogue with correct stress patterns.
script:
- Clap sentence stress.
- Mark strong/weak beats.
- Record and compare.
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: Practice contrastive stress.
