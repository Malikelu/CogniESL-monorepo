id: consequences
name: Consequences
category: games
description: A collaborative narrative game where each student adds a line to a story,
  folds the paper to hide their contribution, and passes it on. The result is a hilarious,
  unpredictable story created by the whole class.
targetStructures:
- clauses
- conditionals
- verb-tenses
bestForLevels:
- A2
- B1
- B2
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Paper and pens
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give each student a sheet of paper.
- 'Explain the rules: each student writes one line of a story at the top of the paper,
  then folds it over to hide what they wrote, and passes it to the next person.'
- 'Provide a story starter or prompt: ''Once upon a time, there was a...'' or ''Last
  summer, something strange happened...'''
- Students write their line (without seeing previous lines), fold, and pass. Continue
  for 8-10 rounds.
- The last person writes an ending (or the teacher provides one).
- Students unfold the papers and read the complete stories aloud. The class votes
  on the funniest or most creative story.
script:
- '"Write the beginning of a story on the top of your paper. Just one or two sentences.
  Then fold it over so the next person cannot see what you wrote. Pass it to your
  right."'
- '"Now write the next line of the story you received -- without peeking! Fold and
  pass. We will read the results in a few minutes!"'
setupInstructions: Give each student a sheet of paper. Prepare 2-3 story starters
  at the appropriate level. Decide on the number of rounds (8-10 works well for a
  class of 15-20). No other materials needed.
exampleSnippet:
  topic: narrative tenses
  execution:
  - 'Student 1 writes: ''A man walked into a bank on Monday morning.'' Student 2 (without
    seeing line 1) writes: ''He was wearing a bright purple suit.'' Student 3 writes:
    ''Suddenly, he pulled out a water gun.'' Continue for 8-10 rounds, then read the
    complete absurd stories aloud.'
  - 'After reading, teacher highlights correct tense usage: ''Notice we used past
    simple for main events and past continuous for background description.'''
  teacherDialogue:
  - '"Write the beginning of a story on the top of your paper. Just one or two sentences.
    Then fold it over so the next person cannot see what you wrote. Pass it to your
    right."'
  - '"Now write the next line of the story you received -- without peeking! Fold and
    pass. We will read the results in a few minutes!"'
differentiation:
  support: Provide sentence starters for each round ('Suddenly,...', 'Then,...', 'The
    next day,...'). Allow students to write shorter contributions. Pair weaker students
    with stronger ones.
  extension: 'Add constraints: each sentence must include a specific grammar point
    (e.g., a relative clause, a modal verb, a linking word). Students can also illustrate
    their stories after writing. Challenge students to use third conditional for surprising
    cause-effect twists.'
keywords:
