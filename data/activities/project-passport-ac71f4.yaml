adaptableToTopic: true
instructions:
- 'Assign a multi-stage project: research a topic, write a report, and present findings.'
- 'Create a ''passport'' template with stages: Research (20 min), Writing (30 min),
  Editing (15 min), Presentation Prep (15 min).'
- Students work through each stage. At each stage, they get their 'passport' stamped
  by a partner or the teacher.
- During the research stage, students gather information from provided materials.
- During writing, they draft a 10-sentence paragraph about their topic.
- During editing, they check each other's work for grammar and clarity.
- During presentation prep, they prepare a 3-minute summary to share with the class.
script:
- '"Topic and research for 20 minutes."'
- '"10-sentence paragraph."'
- '"3-minute presentation."'
differentiation:
  support: Provide research starting points.
  extension: Add citation requirements.
