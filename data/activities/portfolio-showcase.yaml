id: portfolio-showcase
name: Portfolio Showcase
category: review
description: Students select their best work from the unit and present it to the class.
  They explain what they learned and how they improved. Builds reflection and pride.
targetStructures:
- verb-tenses
- writing-accuracy
- speaking-fluency
bestForLevels:
- A2
- B1
- B2
- C1
duration: 30
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Student work from the unit
- Portfolio reflection sheets
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Students review all their work from the unit (writings, tests, projects, activities).
- 'They select 2-3 pieces they are most proud of. They complete a reflection sheet
  for each: What did I learn? What was hard? How did I improve?'
- Students prepare a 2-minute presentation of their best piece.
- In small groups or to the whole class, students present their work and reflections.
- The audience asks questions and gives compliments.
- 'Optional: Create a class gallery where all selected work is displayed.'
- 'Discuss: What did you notice about your progress this unit? What goals do you have
  for next unit?'
script:
- '"Through all your work from this unit. Choose 2-3 pieces you are most proud of.
  Why did you choose them?"'
- 'Now present your best piece to the group. Tell us: What did you learn? What was
  challenging?'
setupInstructions: Have students collect their work from the unit. Create a reflection
  sheet template. Set up a display area if doing a gallery walk.
differentiation:
  support: Provide reflection sentence starters. Allow students to present in pairs.
  extension: Require students to compare early work with later work, showing specific
    improvement. Have them set goals for the next unit.
keywords:
- portfolio
- reflection
- showcase
- achievement
- self-assessment
l1Enhanced: true
