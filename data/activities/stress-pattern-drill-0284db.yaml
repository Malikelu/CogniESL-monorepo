id: stress-pattern-drill-0284db
name: Stress Pattern Drill
category: pronunciation
description: Mark and produce correct stress patterns in multi-syllable words and
  phrases.
targetStructures:
- pronunciation
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 20
groupSize: pairs
energyRequired: medium
prepTime: low
materials:
- word list
- stress marking sheet
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Write 10 multi-syllable words on the board (e.g., 'photography,' 'comfortable,'
  'interesting').
- Say each word aloud. Students listen and mark the stressed syllable.
- 'Check answers. Discuss patterns: Where does stress usually fall in 2-syllable words?
  3-syllable words?'
- Students practice saying the words with correct stress.
- 'Play a game: say a word with wrong stress. Students correct you.'
- Students add 5 new words to their personal stress pattern reference list.
script:
- '"Stressed syllables in words."'
- '"Words aloud emphasizing stress."'
- '"And compare with native speaker."'
differentiation:
  support: Use color-coding for stress marks.
  extension: Practice compound stress patterns.
keywords:
- stress
- syllable
- rhythm
l1Enhanced: true
