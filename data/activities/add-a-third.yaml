id: add-a-third
name: Add a Third
category: writing
description: Students rewrite a two-person textbook dialogue to include a third speaker,
  adding new dynamics and turn-taking patterns. This activity develops writing fluency,
  awareness of conversational structure, and practice with dialogue punctuation.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 15
groupSize: individuals
energyRequired: low
prepTime: medium
materials:
- Printed two-person dialogues
- Paper and pens
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Distribute a two-person dialogue to each student (4-6 lines each, at the appropriate
  level).
- 'Explain the task: students must add a third character to the conversation with
  at least 6 new lines.'
- Discuss how the third person changes the dynamic -- do they agree, disagree, cause
  a problem, or add information?
- Students write their expanded dialogue, focusing on natural turn-taking and proper
  dialogue punctuation.
- Students practice reading their expanded dialogues aloud in small groups.
- The class votes on the most creative or natural-sounding addition.
script:
- 'Here is a dialogue between a customer and a waiter. Your task: add a third person
  to this conversation. Maybe it is the customer''s friend who arrives late, or the
  chef who comes out to complain. Write at least 6 new lines for your third character.'
- 'Remember to think about: How does the third person change the dynamic? Do they
  agree with one speaker? Do they cause a problem? Make it interesting!'
setupInstructions: 'Prepare or select 3-4 short two-person dialogues (4-6 lines each)
  at the appropriate level. Print enough copies for each student. Optionally prepare
  a model example showing how a third speaker changes a dialogue.

  '
exampleSnippet:
  topic: dialogue writing
  execution:
  - Give students a two-person dialogue about ordering food at a restaurant. Students
    add a third character (a friend who joins late, a manager who intervenes, or a
    child who interrupts). They must maintain the original meaning while naturally
    weaving in the third voice. Students then perform their expanded dialogue aloud.
  teacherDialogue:
  - 'Here is a dialogue between a customer and a waiter. Your task: add a third person
    to this conversation. Maybe it is the customer''s friend who arrives late, or
    the chef who comes out to complain. Write at least 6 new lines for your third
    character.'
  - 'Remember to think about: How does the third person change the dynamic? Do they
    agree with one speaker? Do they cause a problem? Make it interesting!'
differentiation:
  support: Provide a template with sentence starters for the third speaker (Actually,
    I think... Can I add something? That reminds me of...). Allow students to work
    in pairs and focus on adding just 2-3 lines for the third character.
  extension: Advanced students can add stage directions, internal monologue, or shift
    the genre (e.g., turn a casual dialogue into a formal meeting transcript). They
    can also experiment with interruptions, overlapping speech, and subtext.
