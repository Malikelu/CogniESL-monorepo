id: spelling-throw
name: Spelling Throw
category: games
description: A kinetic spelling drill where teams throw a ball to spell words letter
  by letter. Combines physical movement with orthographic memory and team collaboration.
targetStructures:
- verb-tenses
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: small-groups
energyRequired: high
prepTime: low
materials:
- Soft ball or beanbag
- Word list
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Divide the class into two teams. Each team stands in a line facing the other.
- Call out a word from your target vocabulary. The first student on Team 1 says the
  first letter and throws the ball to the first student on Team 2.
- That student says the second letter and throws the ball back. Continue alternating
  until the word is spelled.
- If a student says the wrong letter, the team must start over with the same word.
- The first team to correctly spell the word wins a point. Play 5-6 rounds.
- For an extra challenge, require the team to also define the word or use it in a
  sentence.
script:
- The word is ELEPHANT. Team 1 -- first letter, go! E! Good, throw to Team 2. L! Great!
- 'E-L-E-P-H-A-N-T! Perfect! Team 1 gets a point. Next word: BUTTERFLY.'
- '"-- you said D but it is T. Start over with BUTTERFLY. B!"'
setupInstructions: Get a soft ball or beanbag. Prepare a list of 8-10 target vocabulary
  words. Clear space for students to throw safely.
exampleSnippet:
  topic: animal vocabulary
  execution:
  - 'Word: C-A-T. Quick round -- Team 1 wins.'
  - 'Word: H-I-P-P-O-P-O-T-A-M-U-S. Longer word -- Team 2 makes an error on the second
    P and must restart.'
  - 'Word: B-U-T-T-E-R-F-L-Y. Both teams spell it correctly -- tie round.'
  teacherDialogue:
  - Spell DINOSAUR. First letter? D! Throw it over!
  - I-N-O-S-A-U-R! Correct! Now use it in a sentence -- the dinosaur was huge!
differentiation:
  support: Use shorter words (3-5 letters). Allow students to consult a word bank.
    Let teams huddle before throwing.
  extension: Use longer, more complex words. Require the team to also say the word's
    definition or use it in a sentence to earn the point.
keywords:
- spelling
- ball
- throw
- kinesthetic
- team game
- letters
l1Enhanced: true
