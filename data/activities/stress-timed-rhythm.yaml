id: stress-timed-rhythm
name: Stress-Timed Rhythm
category: pronunciation
description: Students clap, tap, or chant to feel the rhythm of English. They practice
  stress-timed speech by emphasizing content words and reducing function words.
targetStructures:
- pronunciation
- adverbs
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Rhythmic sentences or chants
- 'Optional: drum or percussion instrument'
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Explain that English is stress-timed: content words (nouns, verbs, adjectives)
  are stressed, function words (articles, prepositions, auxiliaries) are reduced.'
- 'Write a sentence on the board. Mark stressed words with capital letters: I WANT
  to GO to the STORE.'
- Clap on stressed words. Students clap and say the sentence together.
- Practice with 5-6 sentences. Start slow, then speed up.
- 'Use a chant or rap: ''I WANT to GO to the STORE, BUY some MILK and SOMETHING MORE.''
  Students chant together.'
- 'Students practice in pairs: one claps the rhythm, the other says the sentence.'
- 'Discuss: How does stress change the sound of English? Why do function words sound
  different?'
script:
- 'English has a rhythm. Clap on the BIG words: I WANT to GO to the STORE. Clap! I
  WANT to GO to the STORE.'
- Feel the rhythm? Now faster!
setupInstructions: Prepare 8-10 sentences with clear stress patterns. Optionally bring
  a drum or percussion instrument.
differentiation:
  support: Use shorter sentences. Clap very slowly. Focus on just 2-3 stressed words
    per sentence.
  extension: 'Use longer sentences. Add reduced forms: want to -> wanna, going to
    -> gonna. Have students create their own rhythmic chants.'
keywords:
- stress-timed
- rhythm
- clapping
- chant
- reduced speech
l1Enhanced: true
