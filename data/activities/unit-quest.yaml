id: unit-quest
name: Unit Quest
category: review
description: 'A gamified review where students complete challenges to earn points
  and level up. Challenges cover all skills: reading, writing, speaking, listening,
  grammar, and vocabulary.'
targetStructures:
- verb-tenses
- vocabulary
- clauses
- sentence-structure
bestForLevels:
- A1
- A2
- B1
- B2
duration: 35
groupSize: small-groups
energyRequired: high
prepTime: high
materials:
- Challenge cards at different stations
- Point tokens or scoreboard
- Timer
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Set up 6-8 challenge stations around the room. Each station has a different type
  of challenge.
- 'Station examples: Grammar gap fill, vocabulary matching, reading comprehension,
  listening task, speaking challenge, writing prompt.'
- Each challenge is worth points (10-30 points based on difficulty).
- Teams rotate through stations, spending 4-5 minutes at each.
- They earn points for correct answers. Keep a running score on the board.
- The team with the most points at the end wins and levels up.
- Review any challenges that were particularly difficult.
- 'Discuss: Which skills are you strongest in? Which do you need to practice more?'
script:
- '"To the Unit Quest! There are 8 challenge stations. Complete each one to earn points.
  The team with the most points wins!"'
- You have 4 minutes at this station. Work together. When the timer rings, move to
  the next station.
setupInstructions: Create 6-8 challenge stations with different activity types. Prepare
  point values and answer keys. Set up a visible scoreboard.
differentiation:
  support: Include easier challenges worth fewer points. Allow teams to skip one station.
    Provide hints.
  extension: Add bonus challenges worth extra points. Include more complex tasks.
    Add a time bonus for finishing early.
keywords:
- quest
- gamified
- review
- stations
- points
l1Enhanced: true
