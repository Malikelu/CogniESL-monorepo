id: literature-circles
name: Literature Circles
category: reading
description: Small groups each read a different book or text. Members have roles (Discussion
  Director, Summarizer, Vocabulary Enricher, Connector). Groups meet to discuss and
  share insights.
targetStructures:
- reading-comprehension
- clauses
- discourse
bestForLevels:
- B1
- B2
- C1
duration: 30
groupSize: small-groups
energyRequired: medium
prepTime: high
materials:
- Different texts for each group
- Role cards
- Discussion guides
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Assign each group a different text at the appropriate level. Assign roles: Discussion
  Director (leads discussion), Summarizer (summarizes key points), Vocabulary Enricher
  (identifies new words), Connector (connects to real life/other texts).'
- Students read their text individually (or as homework) and prepare their role.
- 'In their groups, students discuss the text. Each role contributes: Summarizer gives
  overview, Vocabulary Enricher teaches new words, Discussion Director asks questions,
  Connector makes real-world links.'
- 'Groups rotate: one member from each group moves to another group and shares a summary
  of their text.'
- Back in original groups, students share what they learned from other groups.
- 'Discuss: What did you learn from other groups'' texts? How did your role help you
  understand the text?'
script:
- Each group has a different text. You each have a role. Read your text and prepare
  your role for discussion.
- Now share with your group. Summarizer, start us off.
setupInstructions: Select 4-6 texts at the appropriate level. Create role cards with
  responsibilities. Prepare discussion guides.
differentiation:
  support: Use shorter, simpler texts. Provide reading guides with specific questions.
    Allow more preparation time.
  extension: Use longer, more complex texts. Require groups to create a presentation
    about their text for the class.
keywords:
- literature circles
- roles
- discussion
- reading
- collaboration
l1Enhanced: true
