instructions:
- 'Draw a simple meter on the board with 5 levels: Very Happy, Happy, OK, Sad, Very
  Sad.'
- Ask students to rate their current mood by standing at the corresponding point in
  the room (or holding up 1-5 fingers).
- 'Ask 2-3 students at different levels to explain their mood in English: ''I am happy
  because...'' / ''I feel a bit tired because...'''
- 'Discuss: Is it OK to have different moods? How does mood affect learning?'
- Use this as a regular check-in at the start of class. Track patterns over time.
