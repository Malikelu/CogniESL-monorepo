- Give them 15 minutes to create a simple presentation (3-5 slides or a poster).
- Each student/pair presents for 2-3 minutes.
- After each presentation, the audience asks 1-2 questions.
- 'The audience rates each presentation on: clarity, content, and delivery.'
- 'Discuss: What made the best presentations effective? What tips can we share?'
