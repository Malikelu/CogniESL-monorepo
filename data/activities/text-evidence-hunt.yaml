id: text-evidence-hunt
name: Text Evidence Hunt
category: reading
description: Students answer questions by finding and quoting specific evidence from
  a text. Develops close reading and the ability to support answers with textual proof.
targetStructures:
- reading-comprehension
- clauses
- sentence-structure
bestForLevels:
- B1
- B2
- C1
duration: 20
groupSize: pairs
energyRequired: medium
prepTime: medium
materials:
- Reading texts with evidence-based questions
- Highlighters
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give each pair a text and a set of questions. Questions should require evidence
  from the text.
- 'Example: ''Why was the character afraid? Find evidence in the text.'''
- Students read the text and highlight evidence that answers each question.
- 'For each answer, students must write: the answer + the exact quote from the text
  that supports it.'
- Pairs compare their evidence with another pair. Discuss any disagreements.
- 'Review as a class. Discuss: What makes good evidence? How do you know which part
  of the text to quote?'
- 'Discuss: Why is it important to use evidence when answering questions about a text?'
script:
- Answer each question AND find evidence in the text. Highlight the exact words that
  support your answer.
- What evidence did you find? Read the quote from the text.
setupInstructions: Select texts with clear evidence for questions. Create 8-10 evidence-based
  questions per text.
differentiation:
  support: Use shorter texts with obvious evidence. Provide line numbers where evidence
    can be found.
  extension: Include questions with multiple possible pieces of evidence. Require
    students to evaluate which evidence is strongest.
keywords:
- evidence
- close reading
- quoting
- textual support
- comprehension
l1Enhanced: true
