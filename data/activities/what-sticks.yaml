instructions:
- 'In the last 5 minutes of class, ask: ''What is the one thing from today that will
  stick with you?'''
- Give students 1 minute to think and formulate their answer.
- Go around the room. Each student shares their 'one thing' in one sentence.
- 'If time allows, ask follow-up questions: ''Why did that stick?'' or ''How will
  you use it?'''
- Note which concepts students remember most. This tells you what landed and what
  did not.
script:
- '"Quick: what is the one thing from today you will remember? One sentence. Go!"'
- '"Interesting that many of you mentioned the same thing. That tells me that was
  important."'
setupInstructions: No setup needed.
differentiation:
  support: Allow students to point to something on the board or in their notes rather
    than formulating a new sentence. Accept single words or phrases.
  extension: Ask students to explain not just what stuck, but why. What made it memorable?
    How does it connect to something they already knew?
