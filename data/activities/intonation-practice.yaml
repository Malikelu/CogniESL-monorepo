instructions:
- 'Draw intonation arrows on the board: rising (up arrow) for yes/no questions, falling
  (down arrow) for statements and wh-questions, rising-falling for lists.'
- Model each pattern with a sentence. Students repeat, using hand gestures to follow
  the melody.
- 'Practice: ''Are you happy?'' (rising) / ''Where do you live?'' (falling) / ''I
  bought apples, bananas, and oranges.'' (rise, rise, fall).'
- Give students 10 sentences. They mark the intonation pattern and practice saying
  them.
- 'Students work in pairs: one reads, the other checks the intonation with hand gestures.'
- 'Discuss: How does intonation change meaning? (e.g., ''You like coffee.'' vs. ''You
  like coffee?'')'
script:
- 'Listen: Are you happy? The voice goes UP at the end. Now you try. Use your hand
  to show the melody.'
- 'Good! Now: Where do you live? The voice goes DOWN. Try it!'
setupInstructions: Prepare 10-15 sentences demonstrating different intonation patterns.
  Draw arrows on the board or on handouts.
differentiation:
  support: Focus on one pattern at a time. Use exaggerated intonation. Provide hand
    gestures.
  extension: Include contrastive stress (I didn't say HE stole it vs. I didn't say
    he STOLE it). Have students create their own intonation patterns.
keywords:
- intonation
- melody
- rising
- falling
- stress
l1Enhanced: true
