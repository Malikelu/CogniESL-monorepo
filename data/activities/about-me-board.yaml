id: about-me-board
name: About Me Board
category: speaking
description: Students ask the teacher questions about personal items displayed on
  a board to learn the teacher's history. A rapport-building activity that practices
  interrogative forms and personal vocabulary in a natural, engaging context.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Personal items (photos, tickets, souvenirs)
- Display board or table
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Display 5-6 personal items (ticket stub, photo, souvenir) on a table or board where
  all students can see them.
- Tell students their job is to ask questions to find out the stories behind each
  item.
- 'Model the activity with an example: ''What is that?'' ''Where did you get it?''
  ''How long have you had it?'''
- Students take turns asking questions about each item. Answer naturally, modeling
  extended responses.
- Encourage follow-up questions and deeper inquiry as students become more comfortable.
- After all items have been discussed, ask students to share one thing they learned
  about the teacher.
script:
- '"Welcome! I''ve put some things on the board that are important to me. Your job
  is to ask me questions to find out their stories. For example: ''What is that?''
  ''Where did you get it?'' ''How long have you had it?'' Ready? Start asking!"'
- '"Great question, Maria! This is a ticket from a concert I went to in 2010. I saw
  my favorite band with my best friend. Now, who has another question?"'
setupInstructions: Gather 5-6 personal items with interesting stories (ticket stubs,
  photos, souvenirs). Arrange them on a table or attach them to a display board where
  all students can see them. Prepare brief natural answers for each item.
