differentiation:
  support: Provide question starters on the board (Who gave you..? Where did you get..?
    How long have you had..?). Allow lower-level students to write their questions
    before speaking, and pair them with stronger students for modeling.
  extension: Advanced students can ask follow-up questions using past perfect ('Had
    you already lived there when..?') or speculate about the items ('That must have
    been expensive'). Encourage them to use indirect questions for politeness.
