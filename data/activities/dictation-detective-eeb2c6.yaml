instructions:
- Prepare 5-8 sentences related to your lesson topic. Include target grammar and vocabulary.
- Read each sentence aloud twice at natural speed. Students write exactly what they
  hear.
- After all sentences, students compare their versions with a partner. They discuss
  differences.
- Display the correct sentences on the board. Students check their work.
- 'For each error, discuss: Was it a spelling mistake? A grammar mistake? A listening
  mistake?'
- Read the sentences one more time. Students correct their errors.
- 'Discuss: What strategies help you catch every word? (Predicting, context clues,
  grammar knowledge)'
script:
- '"To sentence twice."'
- '"Exactly what you hear."'
- '"Spelling and punctuation."'
differentiation:
  support: Play segment multiple times.
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
