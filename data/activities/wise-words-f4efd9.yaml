instructions:
- At the end of class, ask students to think about the most interesting, surprising,
  or insightful comment from today's lesson.
- Students write down the quote (or paraphrase it) and who said it.
- Go around the room. Each student shares their 'wise word'.
- 'Discuss: Why did this comment stand out? How does it connect to what we learned?'
- Post the best 'wise words' on a classroom wall or shared document.
- Start the next class by reviewing last class's wise words.
script:
- '"Most interesting class comment."'
- '"Who said it."'
- '"With class."'
