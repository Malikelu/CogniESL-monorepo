id: debate-ladder
name: Debate Ladder
category: integrated-skills
description: A tournament-style debate where pairs debate, winners advance to debate
  other winners, and losers debate other losers. Everyone debates multiple times and
  improves with each round.
targetStructures:
- speaking-fluency
- discourse
- sentence-structure
bestForLevels:
- B1
- B2
- C1
duration: 40
groupSize: pairs
energyRequired: high
prepTime: medium
materials:
- Debate topics
- Timer
- Score sheets
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Pair students randomly. Assign positions (For/Against) and a debate topic.
- 'Round 1: Pairs debate (3 minutes per side). The class votes on the winner.'
- 'Round 2: Winners debate winners. Losers debate losers. New topics.'
- Continue for 4-5 rounds. Students should debate 4-5 different partners.
- Track wins and losses. The student with the most wins is the champion.
- 'Debrief: What made the best debaters successful? What language was most effective?'
- 'Discuss: How did you improve over the rounds?'
script:
- '"Your partner. You are FOR, you are AGAINST. You have 3 minutes per side. Begin!"'
- Round 2! Winners on this side, losers on that side. New partners, new topic. Go!
setupInstructions: Prepare 8-10 debate topics. Create a tournament bracket. Prepare
  score sheets for voting.
differentiation:
  support: Provide argument frames and useful phrases. Use simpler topics. Allow notes.
  extension: Add a rebuttal round. Require formal debate language. Have students research
    their topics before debating.
keywords:
- debate
- tournament
- ladder
- competition
- argument
l1Enhanced: true
