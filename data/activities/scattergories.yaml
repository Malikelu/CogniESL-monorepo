id: scattergories
name: Scattergories
category: games
description: Students race to think of unique words that fit specific categories,
  all starting with a particular letter. Builds vocabulary retrieval speed, spelling
  accuracy, and creative thinking under time pressure.
targetStructures:
- vocabulary
bestForLevels:
- A2
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 15
groupSize: individuals
energyRequired: medium
prepTime: low
materials:
- Category lists (printed or projected)
- Paper and pencils
- Timer
- Letter die or random letter generator
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Prepare a list of 8-10 categories such as animals, foods, countries, things in a
  kitchen, or sports.
- Roll a die or use a random letter generator to select a starting letter.
- Give students 3 minutes to write one word for each category that starts with the
  chosen letter.
- When time is up, students compare answers. Unique answers (no one else wrote the
  same word) earn 2 points. Shared answers earn 1 point. Blank answers earn 0.
- Play 3-4 rounds with different letters. The student with the highest total score
  wins.
- Review interesting or unusual words that came up during the game.
script:
- '"The letter is S! You have 3 minutes. Write one word for each category starting
  with S. Go!"'
- '"Time up! Category 1: Animals. What did you write? Snake -- anyone else? No? That
  is 2 points for you!"'
- '"Category 5: Countries. Did anyone write Sri Lanka? Excellent -- that is a unique
  one!"'
setupInstructions: Create a category list with 8-10 categories appropriate to your
  students' level and vocabulary focus. Print one sheet per student or project the
  list. Prepare a method for generating random letters such as a die with letters,
  an online spinner, or letter cards.
exampleSnippet:
  topic: Food and drink vocabulary
  execution:
  - 'Categories include: ''a fruit,'' ''a vegetable,'' ''a drink,'' ''a dessert,''
    ''something you eat for breakfast,'' ''a spicy food.'''
  - 'Letter is M: students write ''mango,'' ''mushrooms,'' ''milk,'' ''muffin,'' ''muesli,''
    ''mustard.'''
  teacherDialogue:
  - '"The letter is M. Category: a fruit starting with M. What did you write? Mango
    -- great! Anyone else?"'
  - '"Is mayonnaise a drink? No, it is a condiment, so it does not fit that category.
    Try again!"'
differentiation:
  support: Reduce the number of categories to 5-6. Allow students to work in pairs.
    Provide a word bank or picture dictionary. Give extra time (4-5 minutes). Accept
    words in the student's L1 with the English translation.
  extension: Require students to write a sentence using each word to prove they know
    the meaning. Add more abstract categories such as 'something that makes you happy'
    or 'a word that describes the weather.' Play with difficult letters like X, Q,
    or Z for bonus points. At C1 level, require students to use each word in a grammatically
    correct sentence that demonstrates understanding of the word's meaning and usage.
keywords:
