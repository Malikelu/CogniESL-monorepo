instructions:
- Distribute paper and pens to each student. Give them an envelope for their finished
  letter.
- 'Explain the task: students will write a letter to themselves one year in the future.
  They should describe their current life, their goals, and their dreams.'
- 'Provide sentence starters: ''Right now I am...'', ''Next year I hope...'', ''I
  will have... by then'', ''If I work hard, I will...'''
- Students write their letters individually. Encourage use of future tenses, conditional
  language, and personal vocabulary.
- Students seal their letters in envelopes. Collect them to return at the end of the
  year (or a designated future date).
- 'Optional: students share one goal or prediction with a partner before sealing their
  letter.'
script:
- '"Imagine it is one year from now. Write a letter to yourself. What are you doing?
  What have you achieved? What do you hope for? Use future tenses: will, going to,
  and present continuous for future."'
- '"Start with: Dear Future Me, Right now I am... Next year I hope... I will have...
  by then."'
setupInstructions: Distribute paper, pens, and envelopes to each student. Prepare
  a letter template with sentence starters for students who need support. Decide whether
  to collect and return letters at a future date or let students keep them.
exampleSnippet:
  topic: future tenses and goal-setting
  execution:
  - 'Students write letters using all three future forms: ''I will graduate next year''
    (will for prediction), ''I am going to study medicine'' (going to for plan), ''I
    am meeting with my advisor next week'' (present continuous for arrangement).'
  - 'Students also use first conditional: ''If I study hard, I will pass my exams.'''
  teacherDialogue:
  - '"Use different future forms: will for predictions, going to for plans, present
    continuous for arrangements."'
  - '"Try using the first conditional: If I work hard, I will achieve my goals."'
differentiation:
  support: Provide a letter template with sentence starters and examples. Allow students
    to write just 3-4 sentences. Provide a word bank of future time expressions (next
    year, in five years, by then).
  extension: Students write longer letters with multiple paragraphs. They can also
    write a response from their future self back to their present self. Challenge
    them to use future perfect ('I will have graduated by then') and mixed conditionals.
keywords:
- future tenses
- reflective writing
- goal setting
- letter writing
- self-expression
- personal growth
- time capsules
l1Enhanced: true
