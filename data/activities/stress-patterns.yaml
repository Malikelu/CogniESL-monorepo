id: stress-patterns
name: Stress Patterns
category: pronunciation
description: A prosody and emphasis drill where students read the same sentence multiple
  times, each time stressing a different word to change the meaning. Highlights how
  word stress conveys intent in English.
targetStructures:
- pronunciation
bestForLevels:
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 10
groupSize: whole-class
energyRequired: low
prepTime: low
