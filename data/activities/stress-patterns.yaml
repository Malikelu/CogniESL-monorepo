adaptableToTopic: true
instructions:
- 'Write a sentence on the board: ''I didn''t say he stole the money.'' (or similar
  ambiguous sentence).'
- Read the sentence stressing a different word each time. Show how the meaning changes.
- I didn't say he stole the money. (Someone else said it.)
- I didn't SAY he stole the money. (I implied it.)
- I didn't say HE stole the money. (Someone else stole it.)
- I didn't say he STOLE the money. (He borrowed it.)
- I didn't say he stole THE money. (He stole different money.)
- I didn't say he stole the MONEY. (He stole something else.)
- Have students practice in pairs, taking turns stressing different words and guessing
  the intended meaning.
- Extend with new sentences. Students create their own stress-pattern exercises.
script:
- '"Listen: I didn''t say he stole the money. Now: I didn''t SAY he stole the money.
  Did the meaning change? How?"'
- '"The first one means someone else said it. The second means I implied it but didn''t
  say it directly. Stress changes everything!"'
- '"Now you try. Say this sentence six ways: SHE didn''t take the book. SHE didn''t
  take the book. She DIDN''T take the book..."'
setupInstructions: 'Prepare 3-4 ambiguous sentences that change meaning with different
  stress patterns. Write them on the board or on handouts. Classic example: ''I didn''t
  say he stole the money.'''
exampleSnippet:
  topic: sentence stress and meaning
  execution:
  - 'Sentence: ''I didn''t say he stole the money.'' Students practice 6 versions
    with different stress.'
  - 'Sentence: ''She''s not eating the cake.'' Stress on NOT (she''s eating something
    else), SHE (someone else is), EATING (she''s saving it), THE (a different cake),
    CAKE (something else).'
  - Pairs create their own sentences and challenge another pair to identify the meaning.
  teacherDialogue:
  - '"Stress the word SHE. Now stress NOT. How does the meaning change?"'
  - '"In your language, does stress change meaning like this? Let''s compare."'
differentiation:
  support: Provide the sentences with stress marks already indicated (capital letters
    for stressed words). Practice as a class before pair work. Use simpler sentences
    with fewer stress positions.
  extension: Have students create their own ambiguous sentences. Practice with longer
    sentences containing multiple stress points. Record themselves and analyze their
    stress patterns. Introduce contrastive stress vs. emphatic stress.
