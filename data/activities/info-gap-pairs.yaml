id: info-gap-pairs
name: Information Gap Pairs
category: speaking
description: Each partner has different information. They must ask questions and share
  to complete a task. Practices question formation, listening, and information exchange.
targetStructures:
- speaking-fluency
- clauses
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: pairs
energyRequired: medium
prepTime: medium
materials:
- Information gap worksheets (different for Partner A and B)
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Create two versions of a worksheet (A and B). Each version has different missing
  information.
- Partner A has information that Partner B needs, and vice versa.
- Students must ask questions to get the missing information. They should NOT show
  each other their sheets.
- When both partners have completed their worksheets, they compare to check accuracy.
- 'Discuss: What questions did you ask? What was hardest -- asking or answering?'
script:
- You each have different information. Ask your partner questions to fill in the blanks.
  Do NOT show them your sheet!
- What questions did you ask? Did you get all the information?
setupInstructions: 'Create information gap worksheets with complementary information.
  Common formats: schedules, maps, profiles.'
differentiation:
  support: Provide question frames. Use simpler vocabulary.
  extension: Include more complex information. Require students to summarize after
    completing the task.
keywords:
- information gap
- questions
- pair work
- communication
- task
l1Enhanced: true
