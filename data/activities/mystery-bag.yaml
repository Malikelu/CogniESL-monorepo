id: mystery-bag
name: Mystery Bag
category: vocabulary
description: Students reach into an opaque bag and describe an object's texture, shape,
  weight, and size by touch alone while classmates guess what it is. Practices descriptive
  adjectives, sensory vocabulary, and question formation without visual cues.
targetStructures:
- vocabulary
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Opaque bag or pillowcase
- 10-15 household items (spoon, ball, sponge, key, orange, toy, etc.)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Place 10-15 common household items in an opaque bag.
- One student reaches into the bag (without looking) and picks an object.
- 'The student describes the object using only touch: ''It''s smooth and round. It''s
  small. It feels heavy. It''s made of metal.'''
- 'The class asks yes/no questions: ''Is it bigger than a coin?'' ''Is it made of
  plastic?'' ''Can you eat it?'''
- The class guesses the object. The student reveals it.
- Repeat with different students and objects.
script:
- '"Reach into the bag and pick one object. Do not look! Feel it carefully. Now describe
  what you feel."'
- '"Class, ask yes/no questions to guess what it is. Start with: Is it...? Does it...?
  Can you...?"'
- '"What do you think it is? A key? Let''s check! Yes, it''s a key!"'
setupInstructions: Gather 10-15 common objects with distinct textures and shapes.
  Use an opaque bag or pillowcase that students cannot see through.
exampleSnippet:
  topic: Descriptive adjectives and question formation
  execution:
  - 'Student describes: ''It''s smooth and round. It''s small. It feels heavy. It''s
    made of metal.'''
  - 'Class asks: ''Is it bigger than a coin?'' ''Is it a key?'' ''Is it made of plastic?'''
  - 'Class guesses: ''It''s a key!'' Correct!'
  teacherDialogue:
  - '"Describe what you feel. Is it smooth or rough? Is it big or small?"'
  - '"Class, ask yes/no questions. Is it...? Can you...? Does it...?"'
differentiation:
  support: 'Provide an adjective word bank on the board: smooth, rough, hard, soft,
    heavy, light, round, flat, big, small. Allow the describer to see the object first.
    Provide question starters: ''Is it...?'' ''Does it...?'' ''Can you...?'''
  extension: 'Have the describer use comparative language: ''It''s heavier than a
    spoon but lighter than a book.'' Require the class to ask at least 5 questions
    before guessing. At B2 level, require the describer to use more sophisticated
    vocabulary: ''It has a cylindrical shape with a textured surface.'''
keywords:
- descriptive adjectives
- sensory vocabulary
- guessing
- touch
- adjectives
- speaking
l1Enhanced: true
