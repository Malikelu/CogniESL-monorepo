id: whispers
name: Whispers
category: listening
description: A sentence is whispered from student to student down a line. The last
  student writes what they heard on the board. A classic telephone game that highlights
  listening accuracy, pronunciation clarity, and how messages change in transmission.
targetStructures:
- listening-comprehension
bestForLevels:
- A1
- A2
- B1
- B2
duration: 10
groupSize: whole-class
energyRequired: low
prepTime: low
materials:
- Prepared sentences on cards or paper
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Divide the class into two or more teams of 6-10 students. Each team forms a line.
- Show the first student in each line a sentence (or whisper it to them). They must
  not repeat it aloud.
- On your signal, the first student whispers the sentence to the second student, who
  whispers it to the third, and so on down the line.
- The last student in each line writes what they heard on the board.
- Reveal the original sentence. Compare versions and discuss what changed and why.
- Play 3-4 rounds with different sentences. The team with the most accurate final
  sentence wins.
script:
- '''"Here''s the sentence. Read it silently, then whisper it to the next person.
  Go!"'' '
- '''"Okay, last person — write what you heard on the board."'' '
- '''"Original: ''The cat sat on the red mat.'' You wrote: ''The cap sat on the red
  bag.'' What changed?"'' '
setupInstructions: Prepare 4-6 sentences that include target grammar or vocabulary.
  Write each sentence on a separate card. Sentences should be 8-12 words long with
  some phonetically tricky elements.
exampleSnippet:
  topic: present perfect — life experiences
  execution:
  - 'Round 1 sentence: ''I have never eaten sushi but I have tried ramen twice.'''
  - 'Round 2 sentence: ''She has already finished her homework and cleaned her room.'''
  - Students compare the original with the final version and identify where the message
    broke down.
  teacherDialogue:
  - '''"Listen carefully. I''m going to show Maria the sentence. Maria, come here."'' '
  - '''"Last person, write it on the board. Let''s see how well the message traveled!"'' '
  - '''"What happened to the word ''never''? It became ''ever'' — the N got lost!"'' '
differentiation:
  support: Use shorter sentences (5-6 words) for weaker groups. Allow the whisperer
    to repeat the sentence once. Use sentences with high-frequency vocabulary.
  extension: Use longer, more complex sentences with subordinate clauses. Add background
    noise to increase difficulty. Have students analyze WHY specific sounds were confused
    (e.g., /l/ vs /r/ for Japanese speakers).
keywords:
- telephone game
- listening
- pronunciation
- whispering
- message chain
l1Enhanced: true
