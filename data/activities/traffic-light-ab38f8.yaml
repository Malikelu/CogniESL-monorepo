instructions:
- 'Explain the traffic light system: Green = I understand this well. Yellow = I have
  some questions. Red = I do not understand this at all.'
- 'After teaching a concept, ask students to hold up their traffic light (green/yellow/red
  card, or just fingers: 3=green, 2=yellow, 1=red).'
- Quickly scan the room. If most students are green, move on. If yellow, review briefly.
  If red, re-teach.
- Ask a 'green' student to explain the concept to a 'red' student (peer teaching).
- Repeat after each major concept in the lesson.
- At the end, ask students to write down one thing that was red/yellow for them so
  you can address it next class.
script:
- Green = I understand.
- Yellow = I have question.
- Red = I am lost.
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
