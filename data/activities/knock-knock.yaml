id: knock-knock
name: Knock-Knock
category: warm-up
description: A greeting and identity game where students knock on a door or desk and
  give verbal clues for the teacher or classmates to guess their identity. Practices
  introductory questions, personal descriptions, and greeting language in a playful
  format.
targetStructures:
- speaking-fluency
- verb-tenses
bestForLevels:
- A1
- A2
- B1
bestForAges:
- kids
- teens
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- A door, desk, or table to knock on
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- One student goes outside the room (or hides their face) and knocks on the door or
  desk.
- 'The teacher or class says: ''Who is it?'' The student gives a clue without saying
  their name: ''I am tall. I have brown hair. I like pizza.'''
- 'The class asks yes/no questions to narrow down the identity: ''Are you a boy?''
  ''Are you wearing glasses?'' ''Can you swim?'''
- 'The class guesses: ''Are you Maria?'' If correct, the student enters. If not, they
  give another clue.'
- Repeat with different students. Each student takes a turn being the 'knocker.'
- Debrief by reviewing the language of identity and description.
script:
- Knock knock! Who is it? Give us a clue!
- I am wearing a blue shirt. I have short hair. I am good at math. Who am I?
- Class, ask questions! Are you a boy? No! Are you wearing glasses? Yes! Are you Pedro?
  Yes!
setupInstructions: No materials needed. Use the classroom door or a desk. Prepare
  a few example clues to model the activity. Ensure students understand they cannot
  say their name directly.
exampleSnippet:
  topic: Identity questions and personal descriptions
  execution:
  - 'Student knocks. Clue: ''I am tall. I have black hair. I play soccer.'''
  - 'Class asks: ''Are you a boy?'' Yes. ''Are you wearing red?'' No. ''Are you good
    at sports?'' Yes. ''Are you Carlos?'' Yes!'
  teacherDialogue:
  - 'Give us a clue about yourself. Use: ''I am...'' ''I have...'' ''I like...'' ''I
    can...'''
  - 'Class, ask yes/no questions: ''Are you...?'' ''Do you...?'' ''Can you...?'' ''Have
    you got...?'''
  - 'Now guess: ''Are you [name]?'' Remember to use ''Are you'' not ''You are'' for
    questions.'
differentiation:
  support: 'Provide sentence starters on the board: ''I am...'' ''I have...'' ''I
    like...'' ''I can...'' Allow students to give 3-4 clues before the class guesses.
    The teacher can help by asking guiding questions.'
  extension: 'Require students to speak in a funny voice or accent to make guessing
    harder. Limit the number of questions the class can ask (e.g., only 5 questions).
    Add a rule: the student can only answer yes or no -- no additional clues.'
keywords:
- greetings
- identity
- questions
- introductions
- warm-up
l1Enhanced: true
