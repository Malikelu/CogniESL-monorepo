instructions:
- Display 3-4 pictures or paintings on the board showing scenes with multiple objects
  (a room, a street, a park).
- 'Students choose one picture and describe it using prepositions of place: ''The
  cat is under the table.'' / ''The painting is between the windows.'''
- Partners listen to the description and try to identify which picture is being described.
- Students write 5 sentences about their chosen picture using different prepositions.
- 'Review as a class. Discuss: Which prepositions were most useful? Which were hardest
  to use correctly?'
script:
- Look at art arrangement.
- Describe positions using prepositions.
- Compare with partner's description.
