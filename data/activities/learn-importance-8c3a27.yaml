instructions:
- At the end of class, give each student a slip of paper.
- 'Ask them to write: (1) One thing they learned today. (2) Why it is useful or important.'
- Give students 3 minutes to write. Encourage complete sentences.
- Students share with a partner. Partners ask follow-up questions.
- 'Ask 3-4 students to share with the class. Discuss: Why is this important outside
  the classroom?'
- Collect the papers. Review them to see what students valued most.
script:
- '"One thing learned."'
- '"Why useful."'
- '"With partner."'
differentiation:
  support: 'Provide additional scaffolding: simplify instructions, allow pair work,
    offer word banks or sentence starters, and give more time.'
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
