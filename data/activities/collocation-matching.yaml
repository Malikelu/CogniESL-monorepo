id: collocation-matching
name: Collocation Matching
category: vocabulary
description: Students match words that commonly go together (collocations). Helps
  students sound more natural.
targetStructures:
- vocabulary
- nouns
- verb-patterns
bestForLevels:
- A2
- B1
- B2
- C1
duration: 15
groupSize: pairs
energyRequired: medium
prepTime: medium
materials:
- Collocation card sets
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Prepare cards with words that form common collocations: make, do, take, have, give.'
- Shuffle and spread cards face down.
- Students flip two cards. If they form a collocation (make a decision), they keep
  the pair.
- If not, flip them back. The student with the most pairs wins.
- Review all colllocations found. Students write them in vocabulary notebooks.
- Students create sentences using 5 collocations.
script:
- Flip two cards. If they go together -- like make and a decision -- you keep them.
- Why do we say make a decision but do homework? English collocations are tricky!
setupInstructions: Create 30-40 cards with words that form common collocations. Include
  distractors.
differentiation:
  support: Provide a list of possible collocations. Use more common ones.
  extension: Include less common collocations. Challenge students to explain why certain
    words go together.
keywords:
- collocations
- matching
- vocabulary
- word pairs
l1Enhanced: true
