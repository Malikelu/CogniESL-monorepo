instructions:
- Place four signs in the corners of the room.
- 'Read a statement. Example: Homework should be banned.'
- Students move to the corner that matches their opinion.
- In their corner groups, students discuss WHY they chose that position (2-3 minutes).
- Each corner selects a spokesperson to present their arguments.
- After all corners present, allow students to change corners if persuaded.
- 'Discuss: What makes a strong argument? Did anyone change their mind?'
script:
- Homework should be banned. Go to the corner that matches your opinion.
- 'Now discuss with your group: Why do you agree? Give me your best arguments.'
setupInstructions: Create four signs and place them in corners. Prepare 5-8 debatable
  statements.
differentiation:
  support: Use simpler statements. Provide sentence starters.
  extension: Require students to argue the opposite of their actual opinion.
