id: four-corners
name: Four Corners
category: games
description: 'Students move to one of four corners: Agree, Disagree, Strongly Agree,
  Strongly Disagree. They discuss and defend their position.'
targetStructures:
- speaking-fluency
- sentence-structure
- discourse
