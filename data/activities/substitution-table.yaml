id: substitution-table
name: Substitution Table
category: grammar-practice
description: Students use a grid of sentence components to create multiple correct
  sentences. They read them aloud and discuss which combinations work and why.
targetStructures:
- verb-tenses
- sentence-structure
- clauses
bestForLevels:
- A1
- A2
- B1
duration: 15
groupSize: pairs
energyRequired: low
prepTime: medium
materials:
- Substitution table worksheets
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Create a substitution table with 4 columns: Subject, Verb, Object/Complement, Time
  Expression.'
- Each column has 4-5 options. Students create sentences by choosing one item from
  each column.
- 'Example: I/she/they + ate/have eaten/will eat + pizza/lunch/at the restaurant +
  yesterday/already/tomorrow.'
- Students create as many correct sentences as possible in 5 minutes.
- 'Students read their sentences aloud. The class checks: Is it grammatically correct?
  Does it make sense?'
- 'Discuss: Which combinations do NOT work? Why? (e.g., I have eaten yesterday is
  wrong)'
- Students write their 5 best sentences in their notebooks.
script:
- Choose one word from each column to make a sentence. How many correct sentences
  can you make?
- Read your sentence. Is it correct? Does it make sense? Why does I have eaten yesterday
  sound wrong?
setupInstructions: Create substitution tables targeting your grammar focus. Each column
  should have 4-5 options. Include some combinations that do NOT work.
differentiation:
  support: Use simpler vocabulary. Provide fewer columns (3 instead of 4). Include
    pictures for concrete nouns.
  extension: Add more columns (negation, adverbs, questions). Require students to
    also create negative and question forms.
keywords:
- substitution table
- sentence creation
- combinations
- grammar practice
l1Enhanced: true
