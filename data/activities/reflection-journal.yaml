instructions:
- 'Give students a reflection template with prompts: (1) Three things I learned this
  unit. (2) One thing I found challenging. (3) One thing I want to improve. (4) My
  goal for next unit.'
- Students write individually for 10 minutes. Encourage honest, thoughtful responses.
- 'Optional: Students share their reflections in pairs or small groups.'
- Collect the journals. Read them to understand student progress and challenges.
- Start the next unit by addressing common challenges mentioned in the reflections.
- Return journals periodically so students can see their own growth over time.
script:
- Take 10 minutes to reflect on this unit. What did you learn? What was hard? What
  do you want to improve?
- You do not need to share everything with the class. But writing it down helps you
  see your own progress.
setupInstructions: Create a reflection journal template with prompts. Have notebooks
  or paper available.
differentiation:
  support: Provide sentence starters. Allow drawing or single words.
  extension: Require longer reflections with specific examples. Ask students to rate
    their confidence level for each grammar point.
