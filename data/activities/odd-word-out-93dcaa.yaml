instructions:
- Write groups of 4 words on the board. In each group, one word does not belong.
- 'Example groups: (apple, banana, carrot, orange) -- carrot is not a fruit. (run,
  walk, happy, swim) -- happy is not a verb.'
- Students identify the odd word and explain WHY it does not belong using 'because'.
- 'Start with easy groups and increase difficulty. Include grammar categories: (is,
  are, am, go) -- go is not a ''be'' verb.'
- Students create their own odd-one-out groups and challenge their partners.
- 'Discuss: Sometimes there is more than one correct answer. What matters is the reasoning.'
script:
- Circle word that doesn't fit.
- Explain why using 'because'.
- Class discusses answers.
