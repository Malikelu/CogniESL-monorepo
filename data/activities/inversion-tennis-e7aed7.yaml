id: inversion-tennis-e7aed7
name: Inversion Tennis
category: grammar-practice
description: 'Inversion Tennis -- a grammar-practice activity. Review negative inversion
  patterns: ''Never have I...'', ''Not only... but also...'', ''Hardly had I... when...''
  Demonstrate with an example: ''Never have I....'
targetStructures:
- verb-tenses
bestForLevels:
- B1
- B2
bestForAges:
- adults
duration: 20
groupSize: pairs
energyRequired: medium
prepTime: low
materials:
- handouts
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Review negative inversion patterns: ''Never have I...'', ''Not only... but also...'',
  ''Hardly had I... when...'''
- 'Demonstrate with an example: ''Never have I seen such a beautiful sunset.'''
- Pair students. Student A makes a normal sentence. Student B must convert it to an
  inverted form.
- They volley back and forth. If a student cannot convert within 10 seconds, the other
  student scores a point.
- After 5 minutes, switch partners. Play again.
- 'Discuss: When would you use inversion in real life? (Formal writing, speeches,
  emphasis)'
script:
- '"Inverted questions."'
- '"Volley with inversion."'
- '"Rally going."'
differentiation:
  support: Start with yes/no questions.
  extension: Include negative inversion.
keywords:
- inversion
- question
- negative
l1Enhanced: true
