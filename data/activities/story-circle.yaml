id: story-circle
name: Story Circle
category: speaking
description: Students sit in a circle. One student starts a story with one sentence.
  The next continues, and so on. Builds narrative skills, listening, and creative
  thinking.
targetStructures:
- verb-tenses
- clauses
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
- B2
- C1
duration: 15
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Students sit in a circle. One student starts the story with one sentence.
- The next student adds a sentence to continue. They must listen carefully to maintain
  the narrative.
- Continue around the circle. Each student adds one sentence.
- The teacher can call SWITCH at any time. The next student must change the story
  direction.
- Continue until the story reaches a natural end.
- 'Discuss: What happened? What was the most surprising twist?'
- 'Optional: Students write the full story in their notebooks.'
script:
- 'We are going to create a story together. I will start: One day, a strange package
  arrived at my door.'
- '"Good! SWITCH! The next person must change the story direction."'
setupInstructions: No setup needed. Optionally prepare story starter cards.
differentiation:
  support: Allow students to add a phrase instead of a full sentence. Provide connecting
    words.
  extension: 'Add constraints: each sentence must include a specific grammar point.'
keywords:
- story circle
- narrative
- creative
- listening
- collaboration
l1Enhanced: true
