id: strike-a-pose
name: Strike a Pose
category: warm-up
description: An introductory activity where each student introduces themselves with
  a name and a representing gesture. Builds classroom community and facilitates memory
  through name-gesture association.
targetStructures:
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Gather students in a circle. Explain that everyone will introduce themselves with
  a name and a gesture.
- 'Model first: ''My name is Marcos'' (wave hand). ''I''m Maria'' (thumbs up). ''I''m
  Ahmed'' (salute).'
- Each student says their name and creates a gesture. The class repeats the name and
  copies the gesture.
- 'Go around the circle. After each introduction, the whole class says: ''Hello, [name]!''
  and does the gesture.'
- 'After everyone has introduced themselves, test memory: point to a student and the
  class must say their name and do the gesture.'
- 'Optional: play an elimination version -- if you forget someone''s name/gesture,
  you''re out.'
script:
- '"I''ll go first. My name is Marcos! (wave) Now everyone say: Hello, Marcos! And
  do this! (wave)"'
- '"Your turn! Say your name and make a gesture. The class will copy you. Go!"'
- '"Great! Now let''s see -- who remembers? (points to Yuki) Yuki! And her gesture
  was... this! (clap)"'
setupInstructions: No materials needed. Arrange seating in a circle if possible. Prepare
  your own example name + gesture to model.
exampleSnippet:
  topic: introductions and be verb
  execution:
  - 'Student 1: ''I am Carlos!'' (fist pump). Class: ''Hello, Carlos!'' (fist pump).'
  - 'Student 2: ''I am Yuki!'' (peace sign). Class: ''Hello, Yuki!'' (peace sign).'
  - 'Student 3: ''I am Fatima!'' (heart hands). Class: ''Hello, Fatima!'' (heart hands).'
  - Teacher points to students randomly -- class says name and does gesture.
  teacherDialogue:
  - '"Say ''I am'' or ''I''m'' with your name. Then make a gesture -- any gesture!"'
  - '"Everyone copy! Hello, Carlos! (fist pump) Great! Next!"'
differentiation:
  support: Allow students to choose from a few simple gestures (wave, thumbs up, clap).
    Let them practice with a partner first. Write 'My name is...' and 'I'm...' on
    the board as models.
  extension: 'Have students also say one fact about themselves with the gesture: ''I
    am Carlos and I love soccer!'' (kick gesture). Build a chain where each person
    repeats all previous names and gestures.'
keywords:
- icebreaker
- introduction
- gesture
- names
- community building
- warm-up
- be verb
- personal information
l1Enhanced: true
