id: pass-the-ball
name: Pass the Ball
category: vocabulary
description: Students stand in a circle and pass a ball. The student holding the ball
  must say a word from a given category before passing it on. A fast-paced vocabulary
  retrieval game that builds fluency under mild time pressure.
targetStructures:
- vocabulary
bestForLevels:
- A1
- A2
- B1
- B2
bestForAges:
- kids
- teens
duration: 10
groupSize: whole-class
energyRequired: high
prepTime: none
materials:
- Soft ball or beanbag
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Have students stand in a circle. Hold a soft ball or beanbag.
- Announce a category (e.g., 'animals,' 'foods,' 'things in a classroom').
- The student with the ball says a word from the category, then passes the ball to
  the next student.
- The next student must say a different word from the same category and pass the ball
  on.
- No repeating words! If a student cannot think of a word within 5 seconds, they step
  out (or the class helps them).
- Play multiple rounds with different categories. Increase difficulty with more specific
  categories (e.g., 'sea animals' instead of 'animals').
script:
- '"Stand in a circle. The category is: FRUITS. I will start: APPLE! (Pass ball) Your
  turn -- say a fruit and pass the ball!"'
- '"No repeating! If someone has already said banana, you need to think of a different
  fruit. Go!"'
- '"Great! Now the category is: THINGS IN A KITCHEN. Ready? Go!"'
setupInstructions: 'Get a soft ball or beanbag. Prepare a list of categories at different
  difficulty levels. Easy: animals, colors, foods. Medium: clothing, furniture, jobs.
  Hard: sea animals, things made of metal, words ending in -tion.'
exampleSnippet:
  topic: Food vocabulary
  execution:
  - 'Category: Fruits. Student 1: ''Apple!'' (passes ball) Student 2: ''Banana!''
    Student 3: ''Orange!'' Student 4: ''Grape!'''
  - 'Category: Things in a kitchen. Student 1: ''Refrigerator!'' Student 2: ''Spoon!''
    Student 3: ''Plate!'''
  teacherDialogue:
  - '"Quick! Say a word and pass the ball. Do not hold it for too long!"'
  - '"If you cannot think of a word, say Pass and the ball goes to the next person.
    But try to think of one!"'
differentiation:
  support: Use easy, broad categories (colors, animals, foods). Allow more time (10
    seconds). Provide a word bank on the board. Let students work in pairs.
  extension: 'Use more specific categories (e.g., ''things made of glass,'' ''words
    ending in -ing''). Add a rule: students must also use the word in a sentence before
    passing. Play with a timer -- the ball must go around the circle in under 60 seconds.
    At B2 level, require students to use the word in a grammatically correct sentence:
    ''I eat apples every day.'''
keywords:
- vocabulary retrieval
- fluency
- categories
- quick thinking
- speaking
- warm-up
l1Enhanced: true
