id: board-race
name: Board Race
category: games
description: Two teams race to the board to write correct answers to prompts. Fast-paced,
  high-energy competition adaptable to any grammar point.
targetStructures:
- verb-tenses
- vocabulary
- sentence-structure
bestForLevels:
- A1
- A2
- B1
- B2
duration: 15
groupSize: whole-class
energyRequired: high
prepTime: none
materials:
- Whiteboard and markers (two colors)
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Divide the class into two teams. Line up each team facing the board.
- Give each team a different colored marker.
- Call out a prompt. The first student in each line runs to the board and writes the
  answer.
- First correct answer scores a point. They go to the back of the line.
- Play 15-20 rounds. The team with the most points wins.
- Review any answers that were incorrect.
script:
- Line up! When I say the prompt, run to the board. First correct answer wins the
  point. Ready?
- '"The past tense of GO. GO!"'
setupInstructions: Clear a path to the board. Have two colored markers. Prepare 15-20
  prompts.
differentiation:
  support: Use simpler prompts. Allow students to consult a partner.
  extension: 'Use complex prompts: full sentences, error correction. Require correct
    spelling.'
keywords:
- board race
- competition
- fast-paced
- review
l1Enhanced: true
