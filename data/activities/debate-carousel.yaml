id: debate-carousel
name: Debate Carousel
category: speaking
description: Half the class sits in an inner circle, half in an outer circle. Inner
  circle debates while outer circle listens and takes notes. Then switches. Everyone
  debates and observes.
targetStructures:
- speaking-fluency
- discourse
- sentence-structure
bestForLevels:
- B1
- B2
- C1
duration: 25
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Chairs in two concentric circles
- Debate topics
- Note-taking sheets
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Arrange chairs in two concentric circles. Inner circle faces outward, outer circle
  faces inward.
- Assign a debate topic. Inner circle argues FOR, outer circle argues AGAINST.
- Debate for 5 minutes. Encourage students to respond to each other, not just state
  opinions.
- Outer circle takes notes on arguments they hear.
- Switch roles. Outer circle moves to inner circle. Give a new topic.
- 'After both rounds, discuss: What were the strongest arguments? What language was
  most effective?'
script:
- 'Inner circle, you are FOR: Social media is harmful. Outer circle, you are AGAINST.
  Begin!'
- '"Switch! Outer circle moves in. New topic: Homework should be abolished. Go!"'
setupInstructions: Arrange chairs in two circles. Prepare 2-3 debate topics. Create
  note-taking sheets for observers.
differentiation:
  support: Provide argument frames. Use simpler topics.
  extension: Add a rebuttal round. Require formal debate language.
keywords:
- debate
- carousel
- inner circle
- argument
l1Enhanced: true
