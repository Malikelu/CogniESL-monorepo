instructions:
- Create bingo cards with 16 squares. Include minimal pairs on different cards.
- Give each student a bingo card.
- Read words aloud one at a time. Students mark the word if it is on their card.
- First student to mark a line calls Bingo!
- Check the winner's card. Play 2-3 rounds.
- Review the minimal pairs that caused confusion.
script:
- '"Carefully. I am going to say a word. If it is on your card, mark it. Ready? Number
  one: SHIP."'
- Bingo! Let me check.
setupInstructions: Create 20-30 different bingo cards using words that target pronunciation
  difficulties.
differentiation:
  support: Use cards with pictures. Read words slowly and repeat twice.
  extension: Use more challenging minimal pairs. Have students read words aloud when
    checking.
keywords:
- bingo
- minimal pairs
- listening discrimination
- pronunciation
l1Enhanced: true
