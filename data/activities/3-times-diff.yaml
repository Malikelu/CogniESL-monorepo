id: 3-times-diff
name: 3 Times Different
category: speaking
description: Students say the same idea three times, each time using different words
  or structures. Builds paraphrasing skills, flexibility, and vocabulary range.
targetStructures:
- sentence-structure
- vocabulary
- speaking-fluency
bestForLevels:
- A2
- B1
- B2
- C1
duration: 10
groupSize: pairs
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Give students a simple sentence related to your lesson (e.g., 'I like coffee').
- Challenge them to say the same idea three different ways without repeating any words.
- 'Example: ''I enjoy coffee.'' / ''Coffee is my favorite drink.'' / ''I cannot start
  my day without coffee.'''
- Students work in pairs to create their own sets of three.
- Share the best examples with the class.
- Discuss which version sounds most formal, most casual, and most expressive.
script:
- '"Can you say the same thing three different ways? I like coffee. Now you try. No
  repeating words!"'
- '"Excellent! Now try: She is very smart. Three different ways. Go!"'
setupInstructions: Prepare 3-5 simple sentences related to your lesson topic.
differentiation:
  support: Allow students to change just one word at a time. Provide a word bank of
    synonyms. Work as a class for the first example.
  extension: Require increasingly complex sentences. Challenge students to change
    the register (formal to informal) or to use specific grammar structures in each
    version.
keywords:
- paraphrasing
- vocabulary
- flexibility
- speaking
- synonyms
l1Enhanced: true
