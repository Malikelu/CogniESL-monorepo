instructions:
- Choose 5 key vocabulary words from your lesson.
- 'For each word, students rate their knowledge: 1 (heard it) / 2 (know the meaning)
  / 3 (can use it in a sentence) / 4 (can use it in conversation) / 5 (completely
  mastered).'
- 'Students write each word in a chart with columns: Word, Rating, Synonym, Example
  Sentence.'
- Students fill in the chart for each word, using dictionaries if needed.
- Partners compare charts and teach each other words they rated differently.
- 'At the end, students re-rate themselves. Discuss: Which words improved? What helped?'
script:
- '"Vocabulary word."'
- '"Synonyms, collocations."'
- '"Familiarity 1-5."'
