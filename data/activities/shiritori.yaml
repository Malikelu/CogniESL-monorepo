id: shiritori
name: Shiritori
category: games
description: A last-letter word relay where students take turns saying words that
  begin with the final letter of the previous word. A fast-paced vocabulary retrieval
  game that activates mental lexicon scanning and reinforces spelling awareness.
targetStructures:
- vocabulary
bestForLevels:
- A1
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Explain the rules: each new word must start with the final letter of the previous
  word. No repeating words.'
- 'Demonstrate with a quick example chain: apple, elephant, tiger, rabbit, table...'
- Start with a simple word. Go around the room quickly -- each student has 3 seconds.
- If a student cannot think of a word in 3 seconds, or repeats a word, they sit out.
- Optionally restrict the category (animals, food, etc.) to tie to your lesson topic.
- Play until a few students remain. Review any challenging words that came up.
script:
- My word is ocean. What word starts with N? Go!
- Nice! Night. Now we need a word starting with T. You have 3 seconds...
- Tiger! Great. R...? Come on, think of an R word!
- If you cannot think of one in 3 seconds, sit down. Next person -- rabbit!
setupInstructions: No materials needed. Optionally prepare a few starter words related
  to your lesson topic.
exampleSnippet:
  topic: animal vocabulary
  execution:
  - 'Teacher starts with ''dog''. Students continue: goat, tiger, rabbit, turtle,
    eagle, lion...'
  - When a student hesitates on N, the teacher gently moves to the next student.
  teacherDialogue:
  - Dog ends in G. What animal starts with G? Quick!
  - Goat! Perfect. Goat ends in T. What starts with T?
differentiation:
  support: Allow 5 seconds for struggling students. Let them whisper to a partner
    first. Provide a word bank on the board for reference.
  extension: Challenge advanced students by banning common words, requiring words
    of 5+ letters, or adding a semantic connection rule (the word must relate to the
    previous word).
keywords:
