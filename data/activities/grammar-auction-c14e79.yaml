instructions:
- Prepare 15-20 sentences on the board. Some are correct, some have grammar errors.
  Number each sentence.
- Give each team 1000 imaginary dollars (write their total on paper).
- Teams discuss which sentences are correct and which have errors. They decide how
  much to bid on each.
- Auction each sentence. The highest bidder wins. If the sentence is correct, they
  gain the bid amount. If wrong, they lose it.
- After all sentences are auctioned, review each one. Explain the errors in incorrect
  sentences.
- 'The team with the most money wins. Discuss: Which errors were hardest to spot?'
script:
- Bid on grammar sentences.
- '"Errors to win items."'
- '"Budget carefully."'
differentiation:
  support: Limit to high-value items.
  extension: 'Challenge advanced students: require longer or more complex output,
    add grammar constraints, have them create their own version, or teach the concept
    to a peer.'
