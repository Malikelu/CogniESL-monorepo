id: identity-envelopes
name: Identity Envelopes
category: vocabulary
description: Groups examine evidence in an envelope to build a profile of the owner.
  A deductive character analysis task that practices inference, modal verbs, and descriptive
  prose.
targetStructures:
- vocabulary
- adjectives
- adverbs
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 20
groupSize: small-groups
energyRequired: medium
prepTime: high
materials:
- Envelopes filled with scraps (receipts, photos, ticket stubs, notes, etc.)
- Profile worksheets
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Prepare 4-5 envelopes, each containing 5-7 items that suggest a character (e.g.,
  a gym receipt, a movie ticket, a photo of a dog, a foreign coin).
- Divide students into groups and give each group an envelope.
- 'Groups examine each item and discuss: ''Who is this person? What do they like?
  Where do they go?'''
- 'Groups write a character profile using modal verbs: ''This person must be a student
  because they have a library card. They might like movies because they have a cinema
  ticket.'''
- Each group presents their character profile to the class.
- Reveal the actual character (or let groups guess each other's characters).
script:
- Each envelope contains clues about a person. Your job is to figure out who this
  person is.
- '"At each item carefully. What does it tell you about the person?"'
- '"Sentences like: ''This person must be...'' or ''They might like...'' or ''They
  could be...''."'
setupInstructions: Create 4-5 character profiles and gather items that suggest each
  character. Place items in labeled envelopes. Prepare profile worksheets.
exampleSnippet:
  topic: modal verbs of deduction
  execution:
  - 'Envelope contents: gym receipt, vegetarian restaurant receipt, yoga mat photo,
    library card.'
  - 'Group profile: ''This person must be health-conscious. They might be a vegetarian.
    They could be a student because they have a library card.'''
  teacherDialogue:
  - What does the gym receipt tell us? They must exercise regularly.
  - Great use of 'might be'! You are not sure, so 'might' is the right modal.
differentiation:
  support: 'Provide a list of useful phrases: ''This person must be...'', ''They might
    like...'', ''They could have...'''
  extension: Have groups create their own character envelopes for other groups to
    solve.
keywords:
- vocabulary
- deduction
- inference
- modals
- descriptive
- mystery
l1Enhanced: true
