instructions:
- 'Review frequency adverbs and their approximate percentages: always (100%), usually
  (90%), often (70%), sometimes (50%), rarely/seldom (20%), never (0%).'
- Draw a percentage line on the board from 0% to 100%. Students place each adverb
  on the line.
- 'Review word order: frequency adverbs go BEFORE the main verb (I always eat breakfast)
  but AFTER ''be'' (I am always late).'
- Give students 10 sentences with blanks. They fill in the correct frequency adverb
  based on context clues.
- 'Students interview 3 classmates: ''How often do you...?'' They record answers using
  frequency adverbs.'
- 'Students report back: ''Maria always drinks coffee.'' / ''Carlos rarely eats fast
  food.'''
- 'Discuss: Which activities do you do most often? Which do you never do?'
script:
- '"Today we are practicing where to put frequency adverbs in English sentences. The
  rule is simple: the adverb goes BEFORE the main verb. For example: I always drink
  coffee. She never complains."'
- '"Now look at your handout. Each sentence has a frequency adverb in the wrong place.
  Work with your partner to move it to the correct position. You have 10 minutes."'
- '"Time''s up! Compare your answers with another group. Did you agree? Let''s check
  together — which sentences tricked you?"'
differentiation:
  support: Provide sentence starters with highlighted adverbs.
  extension: Create own sentences using all frequency adverbs.
