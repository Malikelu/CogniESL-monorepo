id: two-minute-talk
name: Two Minute Talk
category: warm-up
description: Students draw a topic card and must speak about it for two full minutes
  without stopping. Builds fluency and confidence.
targetStructures:
- speaking-fluency
- verb-tenses
- discourse
bestForLevels:
- A2
- B1
- B2
- C1
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Topic cards
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Prepare topic cards. Examples: Your favorite food, A place you want to visit, The
  best day of your life.'
- Each student draws a card. They have 30 seconds to think.
- The student must speak for 2 full minutes. No stopping, no long pauses.
- If they get stuck, they can say anything related.
- The class listens and can ask 1-2 questions after.
- 'Discuss: What strategies did you use when you ran out of ideas?'
script:
- '"A card. You have 30 seconds to think. Then you must talk for 2 full minutes. No
  stopping!"'
- Excellent! You kept going even when you got stuck. That is fluency.
setupInstructions: Prepare 15-20 topic cards. Topics should be personal and engaging.
differentiation:
  support: Allow 1 minute instead of 2. Provide 3 key words on the card. Allow notes.
  extension: 'Increase to 3 minutes. Add a rule: must use at least 3 different tenses.'
keywords:
- fluency
- speaking
- impromptu
- confidence
- extended speaking
l1Enhanced: true
