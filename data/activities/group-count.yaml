id: group-count
name: Group Count
category: warm-up
description: The whole class must count to a target number (e.g., 20) in order, with
  any student able to say the next number at any time. If two students speak simultaneously,
  the count resets to one.
targetStructures:
- speaking-fluency
bestForLevels:
- A1
- A2
- B1
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: none
materials:
- None
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Clear space for students to stand in a circle (or arrange virtually with cameras
  on).
- 'Explain the rules: The class must count from 1 to the target number (e.g., 20).
  Any student can say the next number, but if two or more students speak at the same
  time, the count resets to 1. No planning, no signaling, no predetermined order.'
- Do a practice round with a low target (e.g., count to 5) to ensure everyone understands.
- Start the activity. Monitor for simultaneous speech and call resets clearly.
- Continue until the class reaches the target number. Celebrate success!
- 'Debrief: Ask students what strategies they used. Discuss the importance of active
  listening and turn-taking in conversation.'
- 'Optionally repeat with variations: count backward, count by twos, count with eyes
  closed.'
script:
- '"Here is the challenge: we must count to 20 together. Anyone can say the next number.
  But if two people talk at the same time, we start over. Ready? Go!"'
- '"Reset! Two people said 7 at the same time. Try again. This time, listen more carefully.
  Wait for a moment of silence before you speak."'
setupInstructions: No materials needed. Clear space if you want students to stand
  in a circle. Decide on the target number (20 for beginners, 30-50 for more advanced
  groups). Optionally prepare variations (count backward, count by twos, count in
  a foreign language).
exampleSnippet:
  topic: turn-taking and listening
  execution:
  - The class attempts to count to 20. Student A says '1,' Student B says '2,' Student
    C says '3,' then both Student A and Student D say '4' at the same time. The teacher
    calls 'Reset!' and the class starts over. After several attempts, they successfully
    reach 20.
  teacherDialogue:
  - '"Here is the challenge: we must count to 20 together. Anyone can say the next
    number. But if two people talk at the same time, we start over. Ready?"'
  - '"Reset! Two people said 7 at the same time. Try again. This time, listen more
    carefully. Wait for a moment of silence before you speak."'
differentiation:
  support: Use a lower target number (10). Allow students to go in a set order (around
    the circle) first, then try random order. Use visual cues (raise hand before speaking).
  extension: 'Increase the target number (30, 50). Add rules: no student can say two
    numbers in a row. Count backward from 20. Count by twos or threes.'
keywords:
- counting
