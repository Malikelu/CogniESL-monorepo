id: attention
name: Attention!
category: warm-up
description: Students must react instantly to physical commands called out by the
  teacher, such as 'Salute,' 'March,' or 'Stop.' A high-energy warm-up activity that
  reinforces imperative verbs, classroom vocabulary, and listening skills through
  Total Physical Response (TPR).
targetStructures:
- verb-tenses
bestForLevels:
- A1
- A2
- B1
duration: 5
groupSize: whole-class
energyRequired: high
prepTime: none
materials:
- Open space for movement
format:
- in-person
requiresTech: false
digitalReady: false
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Clear a space in the classroom where students can move safely.
- Explain that when you call out a command, students must perform the corresponding
  action immediately.
- Start with basic commands such as 'Stand up! Sit down! Clap your hands! Stop!'
- Progress to more complex commands such as 'Salute! March in place! Turn around!
  Touch your nose!'
- Increase speed to make it more challenging.
- Students who perform the wrong action sit out briefly then rejoin.
- 'Debrief: review the commands used and practice pronunciation.'
script:
- '"When I call out a command, you must do it immediately. Ready? Stand up! Sit down!
  Clap your hands! Stop!"'
- '"Now it gets harder. Salute! March in place! Turn around! Touch your nose! Faster!"'
setupInstructions: Clear a space in the classroom where students can move safely.
  Prepare a list of 10-15 commands ranging from simple (stop, go, sit, stand) to more
  complex (salute, march, turn around, touch your nose). No materials needed.
exampleSnippet:
  topic: imperative verbs and classroom commands
  execution:
  - 'The teacher calls out commands: ''Stand up! Sit down! Clap your hands! Stop!
    Salute! March in place!'' Students perform each action immediately. The teacher
    increases speed. Students who perform the wrong action sit out for one round then
    rejoin. After 5 minutes, the teacher reviews all commands and students practice
    saying them.'
  teacherDialogue:
  - '"Stand up! Good! Now sit down! Clap your hands! Stop! Freeze! Nobody move!"'
  - '"Great job! Now let us try faster. Salute! March! Turn around! Touch your nose!
    Faster!"'
differentiation:
  support: Use simple, one-word commands initially. Demonstrate each command physically
    before expecting students to follow. Allow students to watch and join in gradually
    rather than requiring immediate participation.
  extension: Advanced students can give commands to the class or create new commands
    using more complex vocabulary such as 'Form a circle,' 'High-five your neighbor,'
    'Freeze like a statue.' They can also add adverbs such as 'March slowly,' 'Salute
    quickly.'
keywords:
- TPR
- imperative verbs
- classroom commands
- warm-up
- physical response
- listening
- total physical response
l1Enhanced: true
