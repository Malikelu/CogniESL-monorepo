id: stop-continue-95b429
name: Stop/Continue
category: review
description: Students anonymously submit one thing the class should stop doing, one
  thing to continue, and one thing to start doing. Provides honest feedback on classroom
  dynamics.
targetStructures:
- writing-accuracy
bestForLevels:
- A1
- A2
bestForAges:
- adults
duration: 10
groupSize: individuals
energyRequired: low
prepTime: none
materials:
- paper
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Give each student a slip of paper divided into three sections: Stop, Continue,
  Start.'
- 'Ask them to write anonymously: one thing the class should STOP doing, one thing
  to CONTINUE, and one thing to START doing.'
- Collect and read responses aloud without identifying who wrote them.
- Discuss the most common suggestions. Which ones can we act on immediately?
- Create a class agreement based on the feedback. Post it on the wall.
- Revisit the agreement periodically and update it.
script:
- One thing to stop.
- One thing to continue.
- '"Anonymously."'
differentiation:
  support: Provide sentence starter.
  extension: Add detailed explanation.
