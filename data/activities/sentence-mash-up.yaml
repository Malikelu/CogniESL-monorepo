id: sentence-mash-up
name: Sentence Mash-up
category: grammar-practice
description: Students race to reassemble cut-up sentence strips into grammatically
  correct sentences. A fast-paced team activity that reinforces word order, syntax
  awareness, and sentence structure.
targetStructures:
- clauses
- verb-tenses
bestForLevels:
- A1
- A2
- B1
- B2
- C1
bestForAges:
- teens
- adults
duration: 15
groupSize: small-groups
energyRequired: high
prepTime: medium
materials:
- Cut-up sentence strips (one sentence per strip, words separated)
- Envelopes or bags for each set
- Timer
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Prepare 8-10 sentences at the appropriate level. Cut each sentence into individual
  words or phrases and place each set in an envelope.
- Divide the class into small teams (3-4 students each). Give each team an envelope
  with the first scrambled sentence.
- On your signal, teams race to arrange the words into a correct sentence. The first
  team to finish raises their hand.
- Check the sentence for accuracy. If correct, they earn a point and receive the next
  envelope. If incorrect, they must keep trying.
- Continue for 10-15 minutes. The team with the most correctly assembled sentences
  wins.
- Debrief by writing the correct sentences on the board and discussing any common
  word order errors.
script:
- '"Your team has 60 seconds to unscramble this sentence. Ready? Go!"'
- '"Team 2 is first -- let us check. Yes! Subject, verb, object -- perfect. One point!"'
- '"Remember, in English the subject comes before the verb. Look at where always goes
  -- before the main verb."'
setupInstructions: Write 8-10 target sentences on paper, one per strip. Cut each sentence
  into individual words or meaningful chunks such as subject phrase, verb phrase,
  and object phrase. Place each cut-up set in a separate envelope. Prepare enough
  sets for each team to have their own or plan to rotate envelopes between teams.
exampleSnippet:
  topic: Present Simple word order with adverbs of frequency
  execution:
  - 'Give teams scrambled sentences like: always / breakfast / she / eats / at 7am.
    Teams must arrange to: She always eats breakfast at 7am.'
  - Include distractors or extra words for advanced levels to increase difficulty.
  teacherDialogue:
  - '"Team 1, you have never / he / been / has / to / London. What is the correct
    order?"'
  - '"Remember -- in questions with never, we use inversion: Has he never been to
    London?"'
differentiation:
  support: Provide color-coded strips such as blue for subjects, red for verbs, and
    green for objects to help struggling students identify sentence components. Use
    shorter sentences with fewer words. Allow pairs instead of small groups so stronger
    students can guide weaker ones.
  extension: Add extra distractor words that do not belong in the sentence. Use complex
    sentences with relative clauses or conditional structures. Require teams to also
    identify the tense and subject-verb agreement rule for each sentence. At C1 level,
    include sentences with multiple clauses and require teams to explain the grammatical
    structure.
keywords:
- sentence building
- word order
- syntax
- team race
- grammar accuracy
- hands-on
l1Enhanced: true
