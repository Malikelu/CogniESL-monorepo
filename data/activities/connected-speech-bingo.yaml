instructions:
- 'Create bingo cards with connected speech features: linking (consonant-vowel), elision
  (dropped sounds), assimilation (changed sounds), weak forms, contractions.'
- Read sentences aloud naturally (not slowly). Students listen and mark which features
  they hear.
- 'Example sentence: ''What are you going to do?'' -- features: linking (what-are,
  going-to), weak form (to), assimilation (going-to -> gonna).'
- First student to mark a line calls Bingo!
- 'Review the sentences. Discuss: Which features did you hear? How does connected
  speech make English sound different?'
- Students practice saying the sentences with connected speech.
script:
- '"To this sentence. What connected speech features do you hear? Mark them on your
  card."'
- What did you hear? Linking? Elision? Let us check.
setupInstructions: Create bingo cards with 16 connected speech features. Prepare 20-25
  sentences that demonstrate these features.
differentiation:
  support: Use fewer features on the card. Read sentences slowly the first time, then
    naturally.
  extension: Include more subtle features. Have students transcribe what they actually
    hear vs. what is written.
keywords:
