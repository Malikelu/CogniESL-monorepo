instructions:
- At the end of class, give each student a small piece of paper.
- Ask them to write ONE question they still have about the lesson. It can be about
  grammar, vocabulary, or content.
- Collect all questions anonymously.
- Read the questions aloud. Answer them briefly or have other students try to answer.
- If a question is particularly good or common, spend extra time on it.
- Keep the questions to review before the next class. Start the next lesson by answering
  leftover questions.
