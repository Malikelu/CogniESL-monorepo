instructions:
- Prepare 4-5 short audio clips (30-60 seconds each) from speakers with different
  English accents.
- 'Give students a worksheet: For each clip, identify the accent, note specific pronunciation
  differences, and answer comprehension questions.'
- Play each clip twice. Students listen and fill in their worksheets.
- After all clips, students compare answers with a partner.
- 'Review as a class. Play clips again, focusing on specific differences: vowel sounds,
  rhoticity, intonation patterns.'
- 'Discuss: Which accent was easiest to understand? Which was hardest? Why?'
- 'Discuss: Why is it important to understand different English accents?'
script:
- Listen to this speaker. Where are they from? What do you notice about their pronunciation?
- Now listen again. Focus on the vowel sounds. How are they different from what you
  are used to?
setupInstructions: Find audio clips from YouTube or podcasts featuring different English
  accents. Create a worksheet with listening tasks.
differentiation:
  support: Use clips with clear, slow speech. Provide multiple-choice options for
    accent identification.
  extension: Use clips with faster, more natural speech. Have students transcribe
    what they hear and compare with a partner.
