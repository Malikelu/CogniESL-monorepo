id: modal-logic-cards-ffd99e
name: Modal Logic Cards
category: grammar-practice
description: Match real-world scenarios to appropriate modal verbs expressing probability,
  ability, or permission.
targetStructures:
- verb-modals
bestForLevels:
- A2
- B1
bestForAges:
- adults
duration: 20
groupSize: small-groups
energyRequired: medium
prepTime: low
materials:
- scenario cards
- modal verb cards
format:
- in-person
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- 'Prepare two sets of cards: scenario cards (e.g., ''You see someone running for
  a bus'') and modal verb cards (must, might, could, can''t, should).'
- Students draw one scenario card and one modal card.
- 'They must create a logical sentence combining both: ''They must be late for work.''
  / ''They might miss the bus.'''
- 'Students share their sentences. The class discusses: Which modals make sense? Which
  don''t? Why?'
- Discuss the difference between deduction (must/can't) and possibility (might/could).
- Students write 3 deduction sentences about people in the classroom using modals.
script:
- '"Scenario to modal verb."'
- '"Reasoning to group."'
- '"Similar-sounding modals."'
differentiation:
  support: Focus on high-frequency modals first.
  extension: Include semi-modals (have to, need to).
keywords:
- modal
- probability
- advice
l1Enhanced: true
