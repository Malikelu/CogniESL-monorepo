id: error-correction-code
name: Error Correction Code
category: grammar-practice
description: Students receive a text with coded errors (G=grammar, S=spelling, P=punctuation,
  W=word choice, WO=word order). They identify and correct each error type.
targetStructures:
- verb-tenses
- sentence-structure
- clauses
bestForLevels:
- A2
- B1
- B2
- C1
duration: 20
groupSize: pairs
energyRequired: medium
prepTime: medium
materials:
- Texts with coded errors
- Error code reference sheet
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- 'Give each pair a text with 10-15 errors marked with codes: G (grammar), S (spelling),
  P (punctuation), W (word choice), WO (word order).'
- Students work together to identify what is wrong and correct each error.
- 'Example: She go[G] to the store yesterday. -> She went to the store yesterday.'
- When pairs finish, they compare corrections with another pair.
- 'Review as a class. For each error, discuss: What type of error is it? What is the
  rule?'
- 'Students categorize the errors they found: How many of each type?'
- 'Discuss: Which error type is hardest for you? How can you avoid these errors in
  your own writing?'
script:
- This text has 12 errors. Each error has a code. Your job is to find and correct
  all of them.
- What did you find for number 5? G means grammar. What is wrong with the grammar
  here?
setupInstructions: Create texts with 10-15 errors of different types. Mark each error
  with its code. Prepare an answer key.
differentiation:
  support: Use fewer errors (6-8). Include the correction alongside the code. Use
    simpler error types.
  extension: Use more errors (15-20) with subtle mistakes. Remove the codes -- students
    must identify error types themselves.
keywords:
- error correction
- codes
- editing
- grammar
- proofreading
l1Enhanced: true
