id: what-happened
name: What Happened?
category: grammar-practice
description: Students see a flashcard showing the result of an action and must guess
  what just happened using the present perfect with 'just'. Practices forming present
  perfect sentences to describe very recent past events.
targetStructures:
- adverbs
- verb-tenses
bestForLevels:
- A2
- B1
- B2
bestForAges:
- teens
- adults
duration: 10
groupSize: whole-class
energyRequired: medium
prepTime: low
materials:
- Flashcards showing action results (e.g., a broken window, a finished cake, wet hair)
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: true
hasSlidesComponent: false
hasVisualComponent: true
adaptableToTopic: true
instructions:
- Prepare flashcards that show the RESULT of an action (e.g., a person with wet hair,
  a broken vase, a full stomach).
- Show a flashcard to the class. Students must deduce what just happened.
- 'Model the target structure: ''She has just washed her hair.'' / ''Someone has just
  broken the vase.'''
- Students raise their hand to answer. Require the full present perfect + just structure.
- Award points for correct grammar, not just correct guessing. Gently correct errors
  in form.
- Play 8-10 rounds. Increase difficulty by using less obvious images.
script:
- '''"Look at this picture. What has just happened? Use ''has just'' in your answer."'' '
- '''"Good guess! Now say the full sentence: He has just..."'' '
- '''"Almost! Remember — have/has + just + past participle. Try again."'' '
setupInstructions: Prepare 10-12 flashcards or slides showing results of actions.
  Use clear, unambiguous images. Include a mix of 'he', 'she', 'they', and 'someone'
  subjects.
exampleSnippet:
  topic: present perfect with 'just'
  execution:
  - 'Card shows a person with a full plate and a happy face. Student: ''She has just
    eaten dinner.'''
  - 'Card shows a wet dog. Student: ''The dog has just had a bath.'''
  - 'Card shows a person holding a suitcase at an airport. Student: ''He has just
    arrived at the airport.'''
  teacherDialogue:
  - '''"What has just happened to her hair? She has just...?"'' '
  - '''"Perfect! She has just dyed her hair. Now — who can make a question? Has she
    just dyed her hair?"'' '
differentiation:
  support: 'Provide sentence starters on the board: ''He has just...'', ''She has
    just...'', ''They have just...''. Use very obvious images. Accept answers with
    only minor errors.'
  extension: 'Require students to also form the question form: ''Has she just...?''
    Add a follow-up: ''What do you think will happen next?'' to practice future tenses.
    Use ambiguous images that allow multiple valid answers.'
keywords:
- present perfect
- just
- recent past
- flashcards
- deduction
l1Enhanced: true
