id: teach-the-teacher
name: Teach the Teacher
category: review
description: Students prepare a mini-lesson on a grammar point or vocabulary set and
  teach it to the class. The best way to learn is to teach.
targetStructures:
- verb-tenses
- clauses
- vocabulary
- sentence-structure
bestForLevels:
- A2
- B1
- B2
- C1
duration: 30
groupSize: small-groups
energyRequired: medium
prepTime: low
materials:
- Reference materials
- Whiteboard or paper for each group
format:
- in-person
- online
requiresTech: false
digitalReady: true
hasAudioComponent: false
hasPrintableComponent: false
hasSlidesComponent: false
hasVisualComponent: false
adaptableToTopic: true
instructions:
- Assign each group a grammar point or vocabulary set from the unit.
- Groups have 10 minutes to prepare a 3-4 minute mini-lesson. They must explain the
  rule, give examples, and create one practice activity.
- Each group presents their lesson to the class. The students (classmates) must pay
  attention and do the practice activity.
- 'After each lesson, the class gives feedback: Was it clear? Were the examples helpful?
  What could be improved?'
- The teacher adds any missing information or corrects errors after each presentation.
- 'Discuss: What did you learn from teaching? What did you learn from your classmates''
  lessons?'
- Vote on the best lesson. The winning group gets recognition.
script:
- Your group will teach the class about your assigned grammar point. You have 10 minutes
  to prepare.
- '"1, you are up. Class, pay attention -- you will need to do their practice activity!"'
setupInstructions: Assign grammar points to groups. Ensure each group has access to
  reference materials. Prepare a simple rubric for evaluating lessons.
differentiation:
  support: Assign simpler grammar points to lower-level groups. Provide a lesson template.
    Allow more preparation time.
  extension: Require groups to include common errors and how to avoid them. Have them
    create a short quiz for the class.
keywords:
- teach the teacher
- peer teaching
- presentation
- review
- deep learning
l1Enhanced: true
