instructions:
- Select a short audio recording at your students' level. Prepare transcripts.
- 'First listen: Students listen and follow along. They mark stressed words.'
- 'Second listen: Students read aloud AT THE SAME TIME as the speaker. This is shadowing.'
- 'Third listen: Students shadow again, focusing on intonation.'
- Students practice shadowing in pairs.
- 'Discuss: What did you notice about the speaker''s rhythm?'
script:
- '"First. Just follow along. Notice which words are stressed."'
- Now try to read at the same time as the speaker. Match the rhythm.
setupInstructions: Find a clear audio recording at the right level. Prepare transcripts.
differentiation:
  support: Use slower recordings. Focus on one aspect at a time.
  extension: Use faster speech. Challenge students to shadow without the transcript.
keywords:
- shadowing
- prosody
- intonation
- stress
