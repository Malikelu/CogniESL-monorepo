  writing_conventions:
    interference_patterns:
    - pattern: Paragraph structure differences
      example_l1: '[he] example'
      example_gloss: gloss
      example_wrong: A paragraph without a clear topic sentence.
      example_correct: A paragraph with a clear topic sentence followed by supporting
        details.
      explanation: Hebrew writing conventions may differ from English. English academic
        writing values explicit topic sentences and linear argumentation.
      frequency: 3
      persistence: 3
      communicative_impact: 3
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Hebrew rhetorical conventions differ from English. English values
      directness, linear structure, and explicit topic sentences.
    teacher_tips:
      how_to_explain: 'Teach: English paragraphs start with a topic sentence. Each
        paragraph has one main idea. Use transitions.'
      where_to_start: Start with topic sentences. Then teach paragraph structure.
      sequencing: 'Week 1: Topic sentences. Week 2: Paragraph structure. Week 3: Transitions.
        Week 4: Review.'
    flagged: false
    tier: 3
    exercises:
    - name: Paragraph Analysis
      type: error-correction
      description: Identify and fix structural problems in 5 paragraphs.
      duration: 15
    sources:
    - Swan & Smith (2001) Learner English
  root_system:
    interference_patterns:
    - pattern: Root-and-pattern morphology interference
      example_l1: כתב (katav) - write, מכתב (mikhtav) - letter
      example_gloss: root k-t-b, pattern ma-a
      example_wrong: I mikhtav to my friend.
      example_correct: I wrote a letter to my friend.
      explanation: Hebrew uses root-and-pattern morphology (3-consonant roots with
        vowel patterns). English uses separate words.
      frequency: 2
      persistence: 1
      communicative_impact: 1
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Hebrew morphology uses 3-consonant roots with vowel patterns to
      create related words. English uses separate lexical items.
    teacher_tips:
      how_to_explain: 'Teach: English uses separate words for related concepts. Write,
        letter, writing — three separate words.'
      where_to_start: Start with common root families.
      sequencing: 'Week 1: Root families. Week 2: English equivalents. Week 3: Review.'
    flagged: false
    tier: 3
    exercises:
    - name: Word Family Practice
      type: matching
      description: Match 15 Hebrew roots to English word families.
      duration: 10
    sources:
    - Swan & Smith (2001) Learner English
  definite_article_he:
    interference_patterns:
    - pattern: Definite article ה (ha-) prefix
      example_l1: הספר (ha-sefer)
      example_gloss: the-book
      example_wrong: I read ha-book.
      example_correct: I read the book.
      explanation: Hebrew prefixes ה (ha-) for definiteness. English uses a separate
        word 'the'.
      frequency: 3
      persistence: 2
      communicative_impact: 2
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Hebrew attaches the definite article as a prefix (ה-). English
      uses a separate word 'the'.
    teacher_tips:
      how_to_explain: 'Teach: English ''the'' is a separate word. The book (not ha-book).'
      where_to_start: Start with the basic the + noun pattern.
      sequencing: 'Week 1: The + noun. Week 2: Definite vs indefinite. Week 3: Review.'
    flagged: false
    tier: 3
    exercises:
    - name: Article Practice
      type: sentence-rewrite
      description: Rewrite 10 Hebrew sentences.
      duration: 10
    sources:
    - Swan & Smith (2001) Learner English
  binyanim:
    interference_patterns:
    - pattern: Binyanim (verb conjugation patterns) interference
      example_l1: פעל (pa'al) vs. הפעיל (hif'il)
      example_gloss: do vs. cause-to-do
      example_wrong: I did the work (using wrong binyan).
      example_correct: I did the work.
      explanation: Hebrew has 7 binyanim (verb conjugation patterns) that change meaning
        (active, passive, causative). English uses separate verbs.
      frequency: 2
      persistence: 1
      communicative_impact: 1
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Hebrew binyanim system creates verb families with different voices
      and meanings. English uses separate verbs or auxiliary constructions.
    teacher_tips:
      how_to_explain: 'Teach: English uses separate verbs for different meanings.
        Break (active) vs. be broken (passive).'
      where_to_start: Start with active vs passive. Then teach causative.
      sequencing: 'Week 1: Active/passive. Week 2: Causative. Week 3: Review.'
    flagged: false
    tier: 3
    exercises:
    - name: Voice Practice
      type: sentence-rewrite
      description: Rewrite 10 Hebrew sentences.
      duration: 10
    sources:
    - Swan & Smith (2001) Learner English
