  phonology:
    interference_patterns:
    - pattern: Confusion of /v/ and /w/
      example: Confusion of /v/ and /w/
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Confusion of /v/ and /w/.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I am wery happy.
      correct: I am very happy.
    why_it_happens: Hebrew phonology differs from English in several key ways. Hebrew
      lacks the dental fricatives /θ/ and /ð/, and has a different vowel system. Hebrew
      learners may substitute closest Hebrew sounds, producing 'tink' for 'think.'
      These errors persist because the L1 phonological system filters out non-native
      sound distinctions.
    teacher_tips:
      how_to_explain: 'Teach: /v/ vs /w/, /θ/ vs /t/.'
      where_to_start: Start with the phonology pattern.
      sequencing: 'Week 1: phonology. Week 2: Practice. Week 3: Review. Week 4: Mixed.'
