language: Hebrew
language_code: he
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Overuse of definite article (the) due to Hebrew ha- prefix
      example: 'Hebrew prefixes ha- to nouns for definiteness: ''sefer'' (a book)
        vs. ''ha-sefer'' (the book). Because ha- is attached to the noun, learners
        may overuse ''the'' in English, especially with generic or first-mention nouns.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of indefinite article (a/an) — Hebrew has no indefinite article
      example: Hebrew has no word for 'a/an.' 'Sefer' can mean 'a book' or 'book.'
        Learners say 'I want book' instead of 'I want a book.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of definite article with proper nouns and unique entities
      example: Hebrew uses ha- with some proper nouns and unique entities. Learner
        says 'the Mount Everest' or 'the Golda Meir' by analogy with Hebrew ha- usage.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - wrong: Hu more.
      correct: He is a teacher.
      he_original: Hu more. (הוּא מוֹרֶה)
      gloss: He teacher.
      explanation: 'Hebrew has no indefinite article. ''Hu more'' literally means
        ''He teacher.'' English requires ''a'': ''He is a teacher.'''
    - wrong: Katafti sefer.
      correct: I bought a book.
      he_original: Katafti sefer. (קָנִיתִי סֵפֶר)
      gloss: I-bought book.
      explanation: Hebrew 'sefer' (book) has no article — it could be 'a book' or
        'the book' depending on context. English requires 'a' for first mention of
        a singular countable noun.
    - wrong: The cats are cute animals.
      correct: Cats are cute animals.
      he_original: Ha-chatalufim haytafim nisim. (הַחֲתּלוּפִים חֲתַלּוּפִים נִחְמָדִים)
      gloss: The-cats cats cute.
      explanation: 'Hebrew uses ha- for generic plural reference (''the cats'' = cats
        in general). English uses zero article for generic statements: ''Cats are
        cute animals.'''
    - wrong: I need the pen.
      correct: I need a pen.
      he_original: Ani tzarich et ha-et. (אֲנִי צָרִיךְ אֶת הָעֵט)
      gloss: I need ACC the-pen.
      explanation: Hebrew uses ha- (the) more broadly than English. In this context,
        the speaker means 'a pen' (any pen), but Hebrew may use the definite form.
        English requires 'a' for non-specific reference.
    why_it_happens: 'Hebrew has a definite article (ha-, prefixed to nouns) but NO
      indefinite article. This creates a fundamental asymmetry with English. For definite
      nouns, Hebrew attaches ha- directly to the noun: ''sefer'' (book) becomes ''ha-sefer''
      (the book). This is structurally similar to Scandinavian suffix articles, not
      English preposed ''the.'' For indefinite nouns, Hebrew simply uses the bare
      noun with no article: ''sefer'' can mean ''a book'' or ''book.'' There is no
      word for ''a/an'' in Hebrew. This means Hebrew learners face two challenges:
      (1) they must learn to add ''a/an'' where Hebrew has nothing — a completely
      new grammatical concept, and (2) they must learn that ha- corresponds to English
      ''the'' but is used more broadly in Hebrew (with generics, proper nouns, and
      in contexts where English uses zero article). The absence of an indefinite article
      is the more serious and persistent problem.'
    teacher_tips:
      how_to_explain: 'Explain that Hebrew has ''the'' (ha-) but no ''a.'' English
        has BOTH. The concept of ''a/an'' does not exist in Hebrew — this is new for
        learners. Use a simple rule: ''If it''s one thing and you''re mentioning it
        for the first time, use a/an.'' For ''the,'' explain that Hebrew ha- is used
        more freely than English ''the.'' English only uses ''the'' when both speaker
        and listener know which specific thing is meant. For generic statements (cats
        in general, love in general), English often uses NO article.'
      where_to_start: 'Start with the indefinite article since it''s the bigger gap.
        Drill ''a/an + singular countable noun'' as a mandatory pattern. Use physical
        objects: pick up a pen and say ''This is a pen,'' put it down, say ''I need
        a pen.'' Then introduce ''the'' for specific reference. Finally, address overuse
        of ''the'' with generics.'
      sequencing: 'Week 1: Introduce a/an — the concept that English needs a word
        before singular countable nouns. Week 2: Contrast a/an (first mention) vs.
        the (specific/known). Week 3: Zero article with generics and abstract nouns
        — where Hebrew uses ha- but English uses nothing. Week 4: Mixed practice in
        writing and speaking.'
      exercises:
      - name: A or Nothing?
        type: fill-in-the-blank
        description: 20 sentences where learners must add a/an where Hebrew would
          have nothing. E.g., 'I am ___ student. She has ___ cat. He wants ___ apple.'
        duration: 10
      - name: Translate from Hebrew
        type: translation
        description: 15 Hebrew sentences without indefinite articles. Learners translate
          to English, adding a/an where needed.
        duration: 20
      - name: Generic or Specific?
        type: fill-in-the-blank
        description: 15 sentences requiring learners to choose the or zero article
          with generic nouns. E.g., '___ dogs are loyal animals' (zero) vs. '___ dogs
          in my neighborhood are friendly' (the).
        duration: 15
      - name: Edit the Hebrew Speaker's Paragraph
        type: error-correction
        description: 'A paragraph with 10 article errors: missing a/an, overuse of
          the with generics and abstract nouns.'
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hebrew)
    - Parrott "Grammar for English Language Teachers"
    - Glinert "The Grammar of Modern Hebrew"
