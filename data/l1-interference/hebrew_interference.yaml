grammar_points:
  articles:
    interference_patterns:
    - pattern: Overuse of definite article (ha-)
      example: Overuse of definite article (ha-)
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Overuse of definite article (ha-).'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: Hu more.
      correct: He is a teacher.
    why_it_happens: Hebrew has a definite article ha- but no indefinite article. Hebrew
      learners may overuse the and omit a/an.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES articles. ''A/an'' for first mention,
        ''the'' for specific.'
      where_to_start: Start with the articles pattern.
      sequencing: 'Week 1: articles. Week 2: Practice. Week 3: Review. Week 4: Mixed.'
      exercises:
      - name: articles Audit
        type: error-correction
        description: 20 sentences with articles errors.
        duration: 15
      - name: articles Translation
        type: translation
        description: Translate 15 sentences focusing on articles.
        duration: 15
      - name: articles Practice
        type: fill-in-the-blank
        description: 20 sentences practicing articles.
        duration: 10
      - name: articles Error Hunt
        type: error-correction
        description: A paragraph with 10 articles errors.
        duration: 15
    sources: &id001
    - Swan & Smith "Learner English" (Hebrew)
    - Parrott "Grammar for English Language Teachers"
