      / ''I''ve had enough.'''
    - 'Wrong: ''I want to strong my English.'' (Dutch: ''Ik wil mijn Engels sterk
      maken'') Correct: ''I want to strengthen my English.'''
    - 'Wrong: ''He made a photo.'' (Dutch: ''Hij maakte een foto'') Correct: ''He
      took a photo.'''
    why_it_happens: Dutch has many fixed expressions and collocations that don't translate
      literally to English. Dutch learners may translate these expressions word-for-word,
      producing errors like 'I am it sat' (Ik ben het zat = I am fed up) or 'I want
      to strong my English' (Ik wil mijn Engels sterk maken = I want to strengthen
      my English).
    teacher_tips:
      how_to_explain: Explain that every language has fixed expressions that can't
        be translated word-for-word. Make a list of common Dutch expressions and their
        English equivalents. Emphasize that these must be learned as whole chunks.
      where_to_start: 'Begin with the most common Dutch-to-English false friend expressions:
        ''sterk maken'' = strengthen, ''een foto maken'' = take a photo, ''zat zijn''
        = be fed up.'
      sequencing: 'Week 1: Common Dutch-English false friend expressions. Week 2:
        Collocation patterns (make/take/do). Week 3: Idiomatic expressions. Week 4:
        Practice in context.'
