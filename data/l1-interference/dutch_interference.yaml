      flagged: false
      tier: 3
    - pattern: Using diminutive-like forms where English requires different structures
      example: 'Dutch: ''Huisje'' (house-DIM = little house) Wrong: ''I live in a
        houselet.'' / ''I live in a small house.'' Correct: ''I live in a small house.''
        / ''I live in a cottage.'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
