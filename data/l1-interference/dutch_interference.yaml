    examples:
    - 'Wrong: ''I want a bits.'' (Dutch: ''Ik wil een beetje'') Correct: ''I want
      a bit.'' / ''I want a little.'''
    - 'Wrong: ''I live in a houselet.'' (Dutch: ''Ik woon in een huisje'') Correct:
      ''I live in a small house.'' / ''I live in a cottage.'''
    - 'Wrong: ''Can I have a momentje?'' (Dutch: ''Kan ik een momentje hebben?'')
      Correct: ''Can I have a moment?'''
    why_it_happens: Dutch has a highly productive diminutive suffix (-je, -tje, -pje,
      -etje, -kje) that is used far more frequently than any English equivalent. Dutch
      diminutives convey not just smallness but also affection, informality, and nuance.
      English has no equivalent grammatical diminutive. Dutch learners may attempt
      to create English diminutives ('houselet,' 'bits') or overuse 'small' and 'little.'
    teacher_tips:
      how_to_explain: Explain that Dutch has a special word ending (-je) that makes
        things 'small' or 'cute.' English doesn't have this. Instead, English uses
        'small,' 'little,' or different words entirely.
      where_to_start: 'Begin with the most common Dutch diminutives and their English
        equivalents: huisje = small house/cottage, beetje = a bit/a little, momentje
        = a moment.'
      sequencing: 'Week 1: Common Dutch diminutives and their English equivalents.
        Week 2: When to use ''small'' vs. ''little.'' Week 3: Words that change completely.
        Week 4: Practice in context.'
      exercises:
