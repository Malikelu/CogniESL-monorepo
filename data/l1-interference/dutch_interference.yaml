    - pattern: Using present tense with past time reference in passive
      example: 'Dutch: ''De brief is gisteren geschreven.'' Wrong: ''The letter is
        written yesterday.'' Correct: ''The letter was written yesterday.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using present tense with past time reference
        in passive.'
