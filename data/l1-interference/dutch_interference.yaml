  tense_aspect_advanced:
    interference_patterns:
    - pattern: Present perfect vs simple past confusion
      example_l1: '[nl] example'
      example_gloss: gloss
      example_wrong: I have seen him yesterday.
      example_correct: I saw him yesterday.
      explanation: Dutch may use a single past tense form where English distinguishes
        simple past and present perfect.
      frequency: 4
      persistence: 4
      communicative_impact: 3
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Dutch tense-aspect system differs from English. Specific past
      time markers require simple past in English.
    teacher_tips:
      how_to_explain: 'Teach: yesterday/last week/in 2010 -> Simple Past. ever/never/already/yet
        -> Present Perfect.'
      where_to_start: Start with simple past. Then teach present perfect. Then contrast.
      sequencing: 'Week 1: Simple past. Week 2: Present perfect. Week 3: Contrast.
        Week 4: Review.'
