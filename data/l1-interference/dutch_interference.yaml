        description: 'A 150-word text with 8 countability errors. Students identify
          and correct. Duration: 15 minutes.'
        duration: 15
      - name: Piece Of Strategy Practice
        type: sentence-rewrite
        description: '10 sentences with uncountable nouns used incorrectly. Students
          rewrite using ''piece of.'' Duration: 10 minutes.'
        duration: 10
