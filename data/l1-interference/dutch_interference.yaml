    examples:
    - 'Wrong: ''I bore myself.'' (Dutch: ''Ik verveel me'' = I am bored) Correct:
      ''I am bored.'''
    - 'Wrong: ''I enjoy very much.'' (Dutch: ''Ik vermaak me erg'') Correct: ''I enjoy
      myself very much.'' / ''I have a great time.'''
    - 'Wrong: ''He hurt.'' (Dutch: ''Hij verwondde zich'') Correct: ''He hurt himself.'''
    why_it_happens: 'Dutch has a larger set of reflexive verbs than English. Many
      Dutch reflexive verbs correspond to non-reflexive English verbs: ''zich vervelen''
      = ''to be bored,'' ''zich vermaken'' = ''to enjoy oneself,'' ''zich herinneren''
      = ''to remember.'' Conversely, some Dutch verbs can optionally drop the reflexive
      pronoun where English requires it.'
    teacher_tips:
      how_to_explain: 'Show that Dutch has MORE reflexive verbs than English. Make
        a list: ''zich vervelen'' = ''to be bored'' (no reflexive), ''zich vermaken''
        = ''to enjoy oneself'' (reflexive).'
      where_to_start: 'Begin with Dutch reflexive verbs that are NOT reflexive in
        English: zich vervelen (be bored), zich voelen (feel), zich herinneren (remember).'
      sequencing: 'Week 1: Dutch reflexive verbs that are NOT reflexive in English.
        Week 2: Verbs reflexive in both languages. Week 3: Dutch reflexive verbs with
        no direct English equivalent. Week 4: Practice in context.'
      exercises:
      - name: Reflexive or Not? Dutch-English Verb Matching
        type: matching
        description: '20 Dutch reflexive verbs. Students find the correct English
          equivalent. Duration: 15 minutes.'
        duration: 15
      - name: Reflexive Pronoun Insertion
        type: fill-in-the-blank
        description: '12 English sentences with missing reflexive pronouns. Students
          add the correct pronoun. Duration: 10 minutes.'
        duration: 10
      - name: Daily Routine Translation
        type: translation
        description: 'Students translate a Dutch paragraph about a morning routine
          with 8 reflexive verbs. Duration: 20 minutes.'
        duration: 20
      - name: Reflexive Error Correction
        type: error-correction
        description: '10 English sentences with reflexive pronoun errors. Students
          identify and correct. Duration: 15 minutes.'
        duration: 15
    sources:
