  perfectum_vs_imperfectum:
    interference_patterns:
    - pattern: Overuse of present perfect for completed past actions (Dutch perfectum
        is the default past tense)
      example: 'Dutch: ''Ik heb gisteren gefietst.'' Literal: ''I have yesterday cycled.''
        Wrong: ''I have cycled yesterday.'' Correct: ''I cycled yesterday.'''
      frequency: 5
      persistence: 4
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Overuse of present perfect for completed past
        actions (Dutch perfectum is the default past tense).'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using present perfect with specific past time references
      example: 'Dutch: ''Ik heb het in 2010 gedaan.'' Literal: ''I have it in 2010
        done.'' Wrong: ''I have done it in 2010.'' Correct: ''I did it in 2010.'''
      frequency: 4
      persistence: 4
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using present perfect with specific past time
        references.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Underuse of present perfect for ongoing/relevant-to-present situations
      example: 'Dutch: ''Ik woon hier sinds 2015.'' (Dutch uses present) Wrong: ''I
        live here since 2015.'' Correct: ''I have lived here since 2015.'' / ''I have
        been living here since 2015.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Underuse of present perfect for ongoing/relevant-to-present
        situations.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I have seen that movie last week.'' (Dutch: ''Ik heb die film vorige
      week gezien'') Correct: ''I saw that movie last week.'''
    - 'Wrong: ''I live here since 2018.'' (Dutch: ''Ik woon hier sinds 2018'') Correct:
      ''I have lived here since 2018.'''
    - 'Wrong: ''I am here for 3 years.'' (Dutch: ''Ik ben hier 3 jaar'') Correct:
      ''I have been here for 3 years.'''
    why_it_happens: The Dutch perfectum functions as the default past tense in spoken
      Dutch, even with specific time references. English strictly requires simple
      past with specific time references. Conversely, Dutch uses the present tense
      for ongoing situations where English requires present perfect. This creates
      a double error pattern.
    teacher_tips:
      how_to_explain: 'Draw a timeline. English: Simple Past = finished time, Present
        Perfect = unfinished time. Dutch uses perfectum for BOTH. Key teaching point:
        specific past time word = Simple Past in English.'
      where_to_start: 'Start with the most common error: using present perfect with
        specific past time references. Then introduce ''since/for.'''
      sequencing: 'Week 1: Simple Past vs. Present Perfect. Week 2: Present Perfect
        with ''since'' and ''for.'' Week 3: Present Perfect with ''already,'' ''yet,''
