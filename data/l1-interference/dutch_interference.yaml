  compound_nouns_nl:
    interference_patterns:
    - pattern: Creating compound nouns where English uses separate words or prepositional
        phrases
      example: 'Dutch: ''schoolbus'' (one word) Wrong: ''My children take the schoolbus.''
        (actually correct in English too, but Dutch speakers may over-compound) Correct:
        ''My children take the school bus.'' (two words)'
      frequency: 3
      persistence: 3
      communicative_impact: 1
