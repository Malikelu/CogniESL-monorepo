    sources:
    - Swan & Smith (2001) Learner English
  reported_speech_advanced:
    interference_patterns:
    - pattern: No backshift in reported speech
      example_l1: '[nl] example'
      example_gloss: gloss
      example_wrong: She said that she is tired.
      example_correct: She said that she was tired.
      explanation: Dutch may not backshift tenses in reported speech. English requires
        backshift (present -> past).
      frequency: 4
      persistence: 4
      communicative_impact: 3
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Dutch reported speech conventions may not include tense backshift.
      English requires systematic backshift.
    teacher_tips:
      how_to_explain: 'Teach: Backshift rule: present -> past, will -> would, can
        -> could. She said she was tired.'
      where_to_start: Start with say/tell + backshift. Then teach pronoun changes.
      sequencing: 'Week 1: Backshift with say/tell. Week 2: Pronoun changes. Week
        3: Modal backshift. Week 4: Review.'
    flagged: false
    tier: 3
    exercises:
    - name: Reported Speech
      type: sentence-rewrite
      description: Convert 15 direct speech sentences to reported speech.
      duration: 10
    sources:
    - Swan & Smith (2001) Learner English
  countability_advanced:
    interference_patterns:
    - pattern: Pluralization of uncountable nouns
      example_l1: '[nl] example'
      example_gloss: gloss
      example_wrong: I have many homeworks.
      example_correct: I have a lot of homework.
