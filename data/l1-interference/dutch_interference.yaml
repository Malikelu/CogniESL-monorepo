    - Swan & Smith (2001) Learner English
  relative_clauses_advanced:
    interference_patterns:
    - pattern: Use of 'what' as relative pronoun
      example_l1: '[nl] example'
      example_gloss: gloss
      example_wrong: The book what I read was good.
      example_correct: The book that I read was good.
      explanation: Dutch may use a universal relative pronoun that maps to English
        'what', but English 'what' is not a relative pronoun.
      frequency: 3
      persistence: 3
      communicative_impact: 2
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Dutch relative clause structure differs from English. English
      uses that/which/who, never 'what' as a relative pronoun.
    teacher_tips:
      how_to_explain: 'Teach: Use ''that'' or ''which'' for things, ''who'' for people.
        Never use ''what'' as a relative pronoun.'
      where_to_start: Start with that/which/who. Then teach restrictive vs non-restrictive.
      sequencing: 'Week 1: That/which/who. Week 2: Restrictive vs non-restrictive.
        Week 3: Omitting relative pronouns. Week 4: Review.'
