        Dutch ''te + infinitive'').'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overusing 'shall' (Dutch 'zal' is broader than English 'shall')
      example: 'Dutch: ''Ik zal het morgen doen.'' Wrong: ''I shall do it tomorrow.''
        (overly formal) Correct: ''I will do it tomorrow.'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Overusing ''shall'' (Dutch ''zal'' is broader
        than English ''shall'').'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using 'can' for polite requests where English prefers 'could' or 'may'
      example: 'Dutch: ''Kan ik hier roken?'' Wrong: ''Can I smoke here?'' (less polite)
        Correct: ''Could I smoke here?'' / ''May I smoke here?'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using ''can'' for polite requests where English
        prefers ''could'' or ''may''.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I must go to the dentist yesterday.'' (Dutch: ''Ik moest naar de tandarts
      gisteren'') Correct: ''I had to go to the dentist yesterday.'''
    - 'Wrong: ''I shall call you tomorrow.'' (Dutch: ''Ik zal je morgen bellen'')
      Correct: ''I will call you tomorrow.'''
    - 'Wrong: ''Can I borrow your pen?'' (less polite) Correct: ''Could I borrow your
      pen?'' (more polite)'
    why_it_happens: 'Dutch modal verbs (kunnen, moeten, mogen, willen, zullen, hoeven)
      have similar meanings to English modals but differ in form and usage. The most
      significant error is ''moeten'' (must): Dutch uses ''moest'' for past obligation,
      which learners translate as ''must'' + past time. English requires ''had to.''
      Dutch ''zal'' is used more broadly than English ''shall.'''
    teacher_tips:
      how_to_explain: 'Start with ''must -> had to'': ''In English, ''must'' has no
        past form. For the past, we say ''had to.'' Then address ''shall'' vs. ''will'':
        Dutch ''zal'' = English ''will'' (not ''shall''). Finally, discuss politeness.'
      where_to_start: Begin with 'must -> had to' as it's most frequent and impactful.
        Drill present vs. past obligation.
      sequencing: 'Week 1: ''Must'' vs. ''had to.'' Week 2: ''Shall'' vs. ''will.''
        Week 3: ''Can/could/may.'' Week 4: Modals for possibility and advice.'
      exercises:
      - name: Must -> Had To Transformation
        type: transformation
        description: '12 sentences using ''must'' with past time references. Students
          rewrite using ''had to.'' Duration: 10 minutes.'
        duration: 10
      - name: Shall or Will? Judgment
        type: matching
        description: '15 sentences with blanks. Students choose between ''shall''
          and ''will.'' Duration: 15 minutes.'
        duration: 15
      - name: 'Politeness Upgrade: Can -> Could/May'
        type: sentence-rewrite
        description: '10 requests using ''can.'' Students rewrite using ''could''
          or ''may.'' Duration: 10 minutes.'
        duration: 10
      - name: Modal Verb Error Correction
        type: error-correction
        description: 'A 150-word text with 8 modal verb errors. Students identify,
          classify, and correct. Duration: 15 minutes.'
        duration: 15
    sources:
