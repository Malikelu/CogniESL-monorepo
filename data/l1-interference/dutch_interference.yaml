      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Confusing ''it'' and ''that'' (Dutch ''het''
        and ''dat'' have different distributions).'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using subject pronouns instead of object pronouns in compound objects
      example: 'Dutch: ''Ik zie hem en haar.'' Wrong: ''Between you and I.'' Correct:
        ''Between you and me.'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using subject pronouns instead of object pronouns
        in compound objects.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''Is cold today.'' (Dutch speakers may drop ''het'') Correct: ''It is
      cold today.'''
    - 'Wrong: ''I see he.'' (Dutch: ''Ik zie hem'') Correct: ''I see him.'''
    - 'Wrong: ''It is my book.'' (pointing at distant object) Correct: ''That is my
      book.'''
    why_it_happens: Dutch allows subject pronoun drop in certain informal and weather
      contexts ('Regent' = 'It rains'), while English always requires a subject. Dutch
      'het' serves as both subject pronoun (it) and demonstrative (that), creating
      confusion about 'it' vs. 'that.' The most persistent error is the dummy subject.
    teacher_tips:
      how_to_explain: 'Start with the dummy subject rule: English ALWAYS needs a subject.
        Write: Dutch ''Regent'' -> English ''IT rains.'' The ''it'' doesn''t refer
        to anything. Then address ''it/that'' distinction.'
      where_to_start: 'Begin with weather expressions. Drill: ''Het regent'' -> ''It
        rains,'' ''Het sneeuwt'' -> ''It snows.'''
      sequencing: 'Week 1: Dummy ''it'' in weather and time expressions. Week 2: Subject
        pronouns. Week 3: ''It'' vs. ''that.'' Week 4: Object and reflexive pronouns.'
      exercises:
      - name: Dummy It Insertion
        type: fill-in-the-blank
        description: '15 Dutch-style subjectless sentences. Students add the correct
          dummy subject. Duration: 10 minutes.'
        duration: 10
      - name: It or That? Contextual Choice
        type: fill-in-the-blank
        description: '12 sentences with blanks. Students choose ''it'' or ''that''
          based on context. Duration: 10 minutes.'
        duration: 10
      - name: Pronoun Translation Drill
        type: translation
        description: '15 Dutch sentences targeting dummy ''it,'' subject/object pronouns,
          and demonstratives. Duration: 15 minutes.'
        duration: 15
      - name: Subject Drop Error Hunt
        type: error-correction
        description: 'A 200-word dialogue with 8 subject-drop errors. Students find
          and correct. Duration: 15 minutes.'
        duration: 15
    sources:
    - Swan, M. & Smith, B. (2001). Learner English. Cambridge University Press.
    - 'Donaldson, B. (2008). Dutch: A Comprehensive Grammar. Routledge.'
    - Quirk, R. et al. (1985). A Comprehensive Grammar of the English Language. Longman.
