        words or prepositional phrases.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using Dutch compound word order in English
      example: 'Dutch: ''koffiezetapparaat'' (coffee-machine) Wrong: ''I need a coffeemaker.''
        (actually correct, but Dutch speakers may create non-existent compounds) Correct:
        ''I need a coffee maker.'' / ''I need a coffeemaker.'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using Dutch compound word order in English.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Over-compounding in academic/professional writing
      example: 'Dutch: ''onderzoeksresultaat'' (research result) Wrong: ''The researchresult
        was surprising.'' Correct: ''The research result was surprising.'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Over-compounding in academic/professional writing.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''The researchresult was surprising.'' (Dutch: ''Het onderzoeksresultaat
      was verrassend'') Correct: ''The research result was surprising.'''
    - 'Wrong: ''I work in a big companybuilding.'' (Dutch: ''Ik werk in een groot
      bedrijfsgebouw'') Correct: ''I work in a large company building.'''
    - 'Wrong: ''She is a schoolteacher.'' (this is actually correct in English, but
      Dutch speakers may write ''school teacher'' as one word) Correct: ''She is a
      school teacher.'' / ''She is a schoolteacher.'' (both acceptable)'
    why_it_happens: Dutch writes compound nouns as single words (koffiezetapparaat,
      onderzoeksresultaat, schoolbus), while English typically writes them as two
      words (coffee maker, research result, school bus) or hyphenates them. Dutch
      learners may write English compounds as single words, producing errors like
      'researchresult' or 'companybuilding.' The error is more common in writing than
      speaking.
    teacher_tips:
      how_to_explain: Explain that Dutch writes compound nouns as ONE word, but English
        usually writes them as TWO words. Make a list of common Dutch-English compound
        pairs. Note that some English compounds ARE written as one word — these must
        be learned individually.
      where_to_start: 'Begin with the most common compound errors in academic writing:
        research result, school bus, coffee maker, bus stop, train station.'
      sequencing: 'Week 1: Common Dutch-English compound noun differences. Week 2:
        When English compounds ARE one word. Week 3: Hyphenated compounds. Week 4:
        Practice in writing.'
      exercises:
      - name: Compound Noun Spelling Audit
        type: error-correction
        description: 'A 200-word text with 8 compound noun spelling errors (Dutch
          one-word transfer). Students identify and correct. Duration: 15 minutes.'
        duration: 15
      - name: One Word or Two? Compound Judgment
        type: fill-in-the-blank
        description: '15 compound nouns. Students determine if they are written as
          one word, two words, or hyphenated. Duration: 10 minutes.'
        duration: 10
      - name: Dutch-English Compound Translation
        type: translation
        description: '10 Dutch compound nouns. Students translate into English with
          correct spacing. Duration: 10 minutes.'
        duration: 10
      - name: Compound Noun Dictionary Research
        type: practice
        description: 'Students look up 10 compound nouns in an English dictionary
          to verify correct spelling. Duration: 15 minutes.'
        duration: 15
    sources:
