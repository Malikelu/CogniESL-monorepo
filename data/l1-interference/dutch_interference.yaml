      description: 15 sentences choosing correct relative pronoun.
      duration: 10
    sources:
    - Swan & Smith (2001) Learner English
  passive_voice_advanced:
    interference_patterns:
    - pattern: Avoidance of passive voice
      example_l1: '[nl] example'
      example_gloss: gloss
      example_wrong: They built this house in 1900.
      example_correct: This house was built in 1900.
      explanation: Dutch may use active constructions where English prefers passive
        voice, especially in formal writing.
      frequency: 3
      persistence: 2
      communicative_impact: 2
      etiology: interlingual
