      especially in academic and formal writing.
    teacher_tips:
      how_to_explain: 'Teach: Use passive when the action is more important than the
        agent. The house was built (not they built the house).'
      where_to_start: Start with passive formula. Then teach when to use passive.
      sequencing: 'Week 1: Passive formula (be + past participle). Week 2: When to
        use passive. Week 3: Passive in writing. Week 4: Review.'
    flagged: false
    tier: 3
    exercises:
