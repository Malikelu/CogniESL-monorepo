  articles_advanced:
    interference_patterns:
    - pattern: Definite article overgeneralization
      example_l1: '[nl] example'
      example_gloss: gloss
      example_wrong: I went to the school.
      example_correct: I went to school.
      explanation: Dutch uses definite articles in contexts where English omits them
        (school, church, bed).
      frequency: 4
      persistence: 3
      communicative_impact: 3
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Article omission with abstract nouns
      example_l1: '[nl] example'
      example_gloss: gloss
      example_wrong: Patience is important.
      example_correct: Patience is important.
      explanation: Dutch may use articles with abstract nouns where English omits
        them.
      frequency: 3
      persistence: 2
      communicative_impact: 2
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Dutch article usage differs from English in several contexts,
      leading to overgeneralization or omission errors.
    teacher_tips:
      how_to_explain: 'Teach: English omits articles before school, church, bed, work,
        home (when used in their primary sense).'
