      flagged: false
      tier: 3
    - pattern: Using infinitive where English requires gerund
      example: 'Dutch: ''Ik hou van zwemmen.'' (I love of swim) Wrong: ''I love swim.''
        / ''I love to swim.'' (gerund more natural) Correct: ''I love swimming.''
        / ''I love to swim.'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
