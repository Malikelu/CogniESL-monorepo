        has no continuous aspect).'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using 'aan het + infinitive' and translating literally
      example: 'Dutch: ''Ik ben aan het lezen.'' (I am at the reading) Wrong: ''I
        am at reading.'' Correct: ''I am reading.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using ''aan het + infinitive'' and translating
        literally.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overusing present simple for temporary situations
      example: 'Dutch: ''Ik werk hier tijdelijk.'' Wrong: ''I work here temporarily.''
        (misses nuance) Correct: ''I am working here temporarily.'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Overusing present simple for temporary situations.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I eat dinner now.'' (Dutch: ''Ik eet nu avondeten'') Correct: ''I
      am eating dinner now.'''
    - 'Wrong: ''She reads a book at the moment.'' (Dutch: ''Ze leest op dit moment
      een boek'') Correct: ''She is reading a book at the moment.'''
    - 'Wrong: ''I am at cooking.'' (Dutch: ''Ik ben aan het koken'') Correct: ''I
      am cooking.'''
    why_it_happens: Dutch has no grammatical continuous/progressive aspect. Dutch
      uses the simple present for both habitual and ongoing actions. Dutch CAN express
      ongoing action with 'aan het + infinitive' ('Ik ben aan het lezen'), but this
      is a lexical strategy, not a grammatical aspect. English grammatically marks
      the continuous with 'be + -ing.'
    teacher_tips:
      how_to_explain: 'English has TWO present tenses: Simple (habits, facts) and
        Continuous (happening NOW). Dutch has ONE. Address ''aan het'': ''Ik ben aan
        het lezen'' = ''I am reading'' (NOT ''I am at reading'').'
      where_to_start: 'Begin with the most common error: using simple present for
        actions happening now. Give 10 sentences with ''now,'' ''at the moment,''
        ''right now.'''
      sequencing: 'Week 1: Present Continuous for actions happening now. Week 2: Contrast
        with Present Simple for habits. Week 3: Stative verbs that DON''T use continuous.
        Week 4: Dutch ''aan het'' construction.'
      exercises:
      - name: Now or Always? Tense Choice
        type: fill-in-the-blank
        description: '20 sentences with time markers. Students choose between Present
          Simple and Present Continuous. Duration: 15 minutes.'
        duration: 15
      - name: Aan Het Translation Correction
        type: error-correction
        description: '10 English sentences with literal ''aan het'' translations.
          Students correct each one. Duration: 10 minutes.'
        duration: 10
      - name: 'Picture Description: What''s Happening Now?'
        type: oral-drill
        description: 'Show a busy scene picture. Students describe what people are
          doing using Present Continuous. Duration: 15 minutes.'
        duration: 15
      - name: 'Habit vs. Now: Sentence Pairs'
        type: sentence-rewrite
        description: '8 sentences in Present Simple. Students write a pair for each:
          one habit, one happening now. Duration: 15 minutes.'
        duration: 15
    sources:
