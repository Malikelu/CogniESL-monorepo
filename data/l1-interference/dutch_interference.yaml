    - pattern: Using 'were' incorrectly based on Dutch 'waren' (past tense of 'zijn')
      example: 'Dutch: ''Als ik rijk was...'' (If I rich was) — Dutch uses simple
        past, not subjunctive Wrong: ''If I was rich...'' (informal but widely accepted)
        Correct: ''If I were rich...'' (formal subjunctive)'
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using ''were'' incorrectly based on Dutch ''waren''
        (past tense of ''zijn'').'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''If I was rich...'' (informal; formal requires ''were'') Correct: ''If
      I were rich...'''
    - 'Wrong: ''I wish I was taller.'' (informal) Correct: ''I wish I were taller.''
      (formal)'
    why_it_happens: Dutch has largely lost its subjunctive mood, retaining only archaic
      remnants. However, Dutch uses the simple past tense ('was') in hypothetical
      conditional sentences where English traditionally requires the subjunctive ('were').
      Dutch learners therefore use 'was' in formal hypothetical contexts where 'were'
      is expected.
    teacher_tips:
      how_to_explain: 'Explain that English has a ''special past tense'' for unreal/hypothetical
        situations: ''If I WERE rich'' (not ''was''). Dutch uses the normal past tense
        (''was'') in these contexts. Note that ''was'' is widely accepted in informal
        English but ''were'' is expected in formal writing.'
      where_to_start: 'Begin with the most common context: ''If I were...'' (second
        conditional). Show that Dutch ''Als ik was...'' maps to English ''If I WERE...''
        (not ''was'').'
      sequencing: 'Week 1: Second conditional with ''were.'' Week 2: ''I wish I were...''
        and ''If only I were...'' Week 3: Formal vs. informal register. Week 4: Other
        subjunctive remnants.'
      exercises:
      - name: Was or Were? Hypothetical Judgment
        type: fill-in-the-blank
        description: '15 hypothetical sentences. Students choose between ''was'' and
          ''were.'' Duration: 10 minutes.'
        duration: 10
      - name: Second Conditional Translation
        type: translation
        description: '10 Dutch hypothetical sentences. Students translate into English
          using ''were.'' Duration: 15 minutes.'
        duration: 15
      - name: Formal vs. Informal Subjunctive
        type: sentence-rewrite
        description: '8 sentences using ''was'' in hypothetical contexts. Students
          rewrite for formal register using ''were.'' Duration: 10 minutes.'
        duration: 10
      - name: Subjunctive Recognition in Texts
        type: practice
        description: 'Students read a short text and identify all subjunctive forms.
          Duration: 15 minutes.'
        duration: 15
