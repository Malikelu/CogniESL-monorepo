language: turkish
grammar_points:
  articles_tr:
    interference_patterns:
    - Turkish uses vowel harmony which does not exist in English, causing transfer
      errors related to 'articles tr'.
    why_it_happens: Turkish handles 'articles tr' differently from English. Turkish
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Turkish structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Turkish and English for 'articles
        tr'. Show the Turkish structure side-by-side with English. Highlight the specific
        error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Turkish
        handles 'articles tr' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Turkish sentences, students translate to English, focusing
          on correct 'articles tr' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Turkish-style 'articles tr' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'articles
          tr' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'articles tr'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''She is teacher tr.'' Correct: ''She is a teacher tr.'''
    - 'Wrong: ''I like the music tr.'' (general) Correct: ''I like music tr.'''
    - 'Wrong: ''I have book tr.'' Correct: ''I have a book tr.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Kornfilt, J. (1997). Turkish grammar and L1 transfer. Routledge.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Turkish
    notes: Most persistent Turkish L1 error. Documented extensively in SLA literature.
