      example: Conditional structure (thai)
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: If I would have money, I would travel.
      correct: If I had money, I would travel.
    why_it_happens: Thai conditional structure differs from English. Thai learners
      may use wrong tense patterns in English if-clauses. This transfer occurs because
      conditional formation rules differ between the two languages.
    teacher_tips:
      how_to_explain: 'Teach: NO WOULD IN IF-CLAUSE. Use ''were'' for unreal situations.'
