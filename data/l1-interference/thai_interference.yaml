      correct: I am at home.
    why_it_happens: Thai prepositions differ from English. Thai uses fewer prepositions
      and relies more on context. Thai learners may omit prepositions or use wrong
      ones in English. This occurs because the L1 preposition system is simpler and
      maps differently onto English.
    teacher_tips:
