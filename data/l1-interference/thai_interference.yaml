language: thai
schema_version: '3.0'
grammar_points:
  no_conjugation:
    interference_patterns:
    - Thai uses no verb conjugation which does not exist in English, causing transfer
      errors related to 'no conjugation'.
    why_it_happens: Thai handles 'no conjugation' differently from English. Thai L1
      speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Thai structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Thai and English for 'no conjugation'.
        Show the Thai structure side-by-side with English. Highlight the specific
        error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Thai handles
        'no conjugation' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Thai sentences, students translate to English, focusing
          on correct 'no conjugation' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Thai-style 'no conjugation' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'no
          conjugation' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'no conjugation'
          errors.
        duration: 15
    examples:
    - 'Wrong: Applying Thai ''no conjugation'' structure to English. Correct: Use
      the English structure for ''no conjugation''.'
    - 'Wrong: Direct translation of Thai ''no conjugation'' pattern. Correct: Follow
      English ''no conjugation'' conventions.'
    - 'Wrong: Transferring Thai tonal (5 tones) to English ''no conjugation''. Correct:
      Use English-specific ''no conjugation'' patterns.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Bennui, P. (2008). Thai learners and English article acquisition. Asian EFL
      Journal, 10(2), 1-20.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Thai
    notes: Major interference - Thai has zero verb morphology for tense.
