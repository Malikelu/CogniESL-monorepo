  no_conjugation:
    interference_patterns:
    - pattern: No verb conjugation
      example_l1: ฉันกินข้าวเมื่อวาน
      example_gloss: I eat rice yesterday
      example_wrong: I eat rice yesterday.
      example_correct: I ate rice yesterday.
      explanation: Thai verbs don't conjugate for tense. Time is indicated by adverbs.
        English requires tense marking on verbs.
      frequency: 4
      persistence: 4
      communicative_impact: 3
      etiology: interlingual
