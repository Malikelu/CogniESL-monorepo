grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of all articles (Thai has no articles)
      example: Omission of all articles (Thai has no articles)
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Pom pen kru.
      correct: I am a teacher.
    why_it_happens: Thai has no article system. Definiteness is inferred from context
      or classifiers rather than grammatical markers. Thai learners often omit articles
      entirely in English, producing sentences like 'I bought book yesterday' instead
      of 'I bought a book.' This occurs because Thai does not require speakers to
      mark definiteness grammatically.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES articles. ''A/an'' for first mention,
        ''the'' for specific.'
      where_to_start: Start with the articles pattern.
      sequencing: 'Week 1: articles. Week 2: Practice. Week 3: Review. Week 4: Mixed.'
      exercises:
      - name: articles Audit
        type: error-correction
        description: 20 sentences with articles errors.
        duration: 15
      - name: articles Translation
        type: translation
        description: Translate 15 sentences focusing on articles.
        duration: 15
      - name: articles Practice
        type: fill-in-the-blank
        description: 20 sentences practicing articles.
        duration: 10
      - name: articles Error Hunt
        type: error-correction
        description: A paragraph with 10 articles errors.
        duration: 15
    sources: &id001
    - Swan & Smith "Learner English" (Thai)
    - Parrott "Grammar for English Language Teachers"
