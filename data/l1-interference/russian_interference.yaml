  verb_tense_mapping:
    interference_patterns:
    - pattern: Using present perfect for completed past actions -> Use simple past
      frequency: 4
      persistence: 3
      communicative_impact: 1
      example_l1: 'Russian: ''Я уже ел'''
      example_gloss: Ya uzhe el, past + 'already'
      example_wrong: 'wrong: ''I have eaten already'' (specific past time)'
      example_correct: 'correct: ''I already ate'
      explanation: 'Transfer from L1: Using present perfect for completed past actions
        -> Use simple past.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using simple present with 'since' for ongoing states -> Use present
        perfect
      frequency: 4
      persistence: 4
      communicative_impact: 2
      example_l1: 'Russian: ''Я живу здесь 5 лет'''
      example_gloss: Ya zhivu zdes' 5 lit
      example_wrong: 'literal: ''I live here 5 years'
      example_correct: 'wrong: ''I live here for 5 years'' -> correct: ''I have lived
        here for 5 years'
      explanation: 'Transfer from L1: Using simple present with ''since'' for ongoing
        states -> Use present perfect.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using past perfect incorrectly for sequence of events -> Use simple
        past or past perfect correctly
      frequency: 3
      persistence: 3
      communicative_impact: 1
      example_l1: 'Russian: ''Когда я пришёл, он уже ушёл'''
      example_gloss: Kogda ya prishyol, on ushyol
      example_wrong: 'wrong: ''When I arrived, he had left'' (overuse)'
      example_correct: 'correct: ''When I arrived, he had already left'
      explanation: 'Transfer from L1: Using past perfect incorrectly for sequence
        of events -> Use simple past or past perfect correctly.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I have eaten yesterday.'' Correct: ''I ate yesterday.'''
    - 'Wrong: ''I live here since 5 years.'' Correct: ''I have lived here for 5 years.'''
    - 'Wrong: ''When I arrived, he had left.'' (sequential) Correct: ''When I arrived,
      he left.'''
    - 'Wrong: ''I am living here for 10 years.'' Correct: ''I have lived here for
      10 years.'''
    why_it_happens: 'Russian has only three grammatical tenses: past, present, and
      future. English has 12+ tense-aspect combinations. The most common error is
      using the simple present with ''since'' and ''for'' because Russian uses the
      present tense for ongoing states. The present perfect in English has no direct
      equivalent in Russian, making it one of the hardest tenses to master.'
    teacher_tips:
      how_to_explain: 'Use a timeline on the board. Show that Russian has ONE way
        to talk about each point (past, present, future), while English has MULTIPLE
        ways. For the present perfect, use the ''bridge'' metaphor: ''The present
        perfect is a bridge between past and present.'''
      where_to_start: 'Begin with present perfect vs. simple past. Use the ''time
        marker'' test: specific past time -> simple past. Connects past to present
        -> present perfect.'
      sequencing: 'Week 1: Simple past vs. present perfect. Week 2: Present perfect
        with ''for'' and ''since.'' Week 3: Present perfect with ''already,'' ''yet,''
        ''ever,'' ''never.'' Week 4: Past perfect.'
      exercises:
      - name: Timeline Translation
        type: translation
        description: Students draw timelines for 15 Russian sentences and translate
          into correct English tenses.
        duration: 20
      - name: For vs. Since Drill
        type: fill-in-the-blank
        description: Students complete 20 sentences with 'for' or 'since' and the
          correct present perfect form.
        duration: 15
      - name: Tense Detective
        type: error-correction
        description: Students find and correct 12 tense errors in a short story.
        duration: 20
      - name: Life Timeline
        type: composition
        description: Students create a timeline of their life with 8 events, writing
          sentences using correct English tenses.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Slabakova, R. (2000). L1 transfer revisited: The L2 acquisition of telicity.
      Linguistics, 38(4), 729-760.'
    - Housen, A. (2002). The development of tense-aspect in English as a second language
      and the variable influence of inherent aspect. In R. Salaberry & Y. Shirai (Eds.),
      Tense-Aspect Morphology in L2 Acquisition. John Benjamins.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 4
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Core tense mapping challenge. Russian's 3-tense system vs. English's 12+
      tense-aspect combinations.
    source_rank: 1
    citations:
    - claim: Interference pattern for verb tense mapping
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Russian speakers, pp. 143-160'
      tier: 1
    - claim: 'Grammar point: verb tense mapping'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  reflexive_sya:
    interference_patterns:
    - pattern: Omitting reflexive pronoun where English requires one -> Add reflexive
        pronoun
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Я моюсь'''
      example_gloss: Ya moyus'
      example_wrong: 'literal: ''I wash(self)'
      example_correct: 'wrong: ''I wash'' -> correct: ''I wash myself'
      explanation: 'Transfer from L1: Omitting reflexive pronoun where English requires
        one -> Add reflexive pronoun.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overusing reflexive where English uses simple verb -> Drop reflexive
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Он одевается'''
      example_gloss: On odevayetsya
      example_wrong: 'literal: ''He dresses(self)'
      example_correct: 'wrong: ''He dresses himself'' -> correct: ''He is getting
        dressed'
      explanation: 'Transfer from L1: Overusing reflexive where English uses simple
        verb -> Drop reflexive.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using reflexive for reciprocal actions -> Use 'each other'
      frequency: 2
      persistence: 2
      communicative_impact: 2
      example_l1: 'Russian: ''Они встретились'''
      example_gloss: Oni vstretilis'
      example_wrong: 'literal: ''They met(selfs)'
      example_correct: 'wrong: ''They met themselves'' -> correct: ''They met each
        other'
      explanation: 'Transfer from L1: Using reflexive for reciprocal actions -> Use
        ''each other''.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I wash every morning.'' (ambiguous) Correct: ''I wash myself every
      morning.'''
    - 'Wrong: ''He dresses himself.'' (child-like) Correct: ''He is getting dressed.'''
    - 'Wrong: ''They met themselves at the cafe.'' Correct: ''They met at the cafe.'''
    - 'Wrong: ''She taught herself English.'' (meaning ''learned'') Correct: ''She
      learned English.'''
    why_it_happens: Russian uses the reflexive suffix -ся/-сь attached directly to
      the verb to indicate reflexive, reciprocal, or inherent reflexive meaning. This
      suffix is extremely productive and appears on hundreds of verbs. English uses
      separate reflexive pronouns or drops the reflexive meaning. Russian speakers
      may either omit the reflexive pronoun or overuse it. Many Russian -ся verbs
      are not reflexive in meaning at all (надеяться = to hope, бояться = to fear).
    teacher_tips:
      how_to_explain: Explain that Russian has a 'magic suffix' (-ся) meaning 'to
        oneself' or 'each other,' while English uses separate words. Show a list of
        common Russian reflexive verbs and their English equivalents. Some -ся verbs
        don't need any reflexive in English.
      where_to_start: 'Begin with common reflexive actions: wash oneself, dress oneself,
        shave oneself, hurt oneself. Act out each action while saying the correct
        English form.'
      sequencing: 'Week 1: True reflexive actions. Week 2: Inherent -ся verbs (hope,
        fear, laugh). Week 3: Reciprocal actions. Week 4: Verbs that change meaning
        with/without reflexive.'
      exercises:
      - name: Reflexive or Not?
        type: matching
        description: Students determine whether 20 Russian reflexive verbs need a
          reflexive pronoun, a simple verb, or 'each other.'
        duration: 15
      - name: Morning Routine
        type: oral-drill
        description: Students describe their morning routine using reflexive verbs.
        duration: 10
      - name: Reflexive Translation
        type: translation
        description: Students translate 12 Russian -ся sentences into correct English.
        duration: 20
      - name: Reflexive Story
        type: composition
        description: Students write a short story using at least 5 reflexive pronouns
          correctly.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Kempe, V. & MacWhinney, B. (1998). The acquisition of case marking by adult
      learners of Russian and German. Studies in Second Language Acquisition, 20(4),
      543-587.
    - 'Tarelkin, A. (2015). Reflexive verbs in Russian-English translation: A corpus-based
      study. Russian Linguistics, 39(2), 189-210.'
