  participles_as_adj:
    interference_patterns:
    - pattern: Using active participle where English requires passive -> Use past
        participle
      frequency: 2
      persistence: 3
      communicative_impact: 1
      example_l1: 'Russian: ''прочитанный студент'''
      example_gloss: prochitannyy student, passive participle
      example_wrong: 'wrong: ''readed student'
      example_correct: 'correct: ''student who has read'
      explanation: 'Transfer from L1: Using active participle where English requires
        passive -> Use past participle.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using participle where English requires relative clause -> Use relative
        clause
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''человек, стоящий у двери'''
      example_gloss: chelovek, stoyashchyy u dveri
      example_wrong: 'wrong: ''person standing at door'' (formal)'
      example_correct: 'correct: ''person who is standing at the door'
      explanation: 'Transfer from L1: Using participle where English requires relative
        clause -> Use relative clause.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overusing participles in spoken English -> Use simpler structures
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''девушка, сидящая на скамейке'''
      example_gloss: devushka, sidyashchaya na skameyke
      example_wrong: 'wrong: ''the sitting girl on the bench'
      example_correct: 'correct: ''the girl who is sitting on the bench'
      explanation: 'Transfer from L1: Overusing participles in spoken English -> Use
        simpler structures.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''The readed book was interesting.'' Correct: ''The book that was read
      was interesting.'''
    - 'Wrong: ''The sitting girl on the bench.'' Correct: ''The girl who is sitting
      on the bench.'''
    - 'Wrong: ''The broken by the storm tree.'' Correct: ''The tree that was broken
      by the storm.'''
    - 'Wrong: ''The writing on the wall was old.'' (ambiguous) Correct: ''The writing
      that was on the wall was old.'''
    why_it_happens: Russian uses participles extensively as adjectives, both in writing
      and speech. English participles exist but are used more sparingly, especially
      in spoken English. Russian speakers may overuse participles, producing formal
      or awkward constructions. Russian has a richer participle system with more forms
      than English.
    teacher_tips:
      how_to_explain: 'Explain that English has two types of participles: present
        (-ing) and past (-ed/-en). But English uses them MORE SPARINGLY than Russian.
        In spoken English, we prefer relative clauses over participle phrases.'
      where_to_start: 'Begin with common, natural participles: boiling water, broken
        window, interesting book. Then show that more complex participles sound formal.'
      sequencing: 'Week 1: Common -ing and -ed adjectives. Week 2: Participles as
        adjectives before nouns. Week 3: Participle phrases after nouns. Week 4: Participles
        vs. relative clauses.'
      exercises:
      - name: Participle or Relative Clause?
        type: matching
        description: Students decide whether 15 participle phrases sound natural or
          need a relative clause.
        duration: 15
      - name: -ing vs. -ed Adjective Sort
        type: fill-in-the-blank
        description: Students choose between -ing and -ed forms in 20 sentences.
        duration: 15
      - name: Participle Translation
        type: translation
        description: Students translate 10 Russian participle sentences into English.
        duration: 20
      - name: Formal vs. Informal Rewrite
        type: transformation
        description: Students rewrite 10 formal participle sentences using relative
          clauses, then rewrite 5 conversational sentences formally.
        duration: 20
