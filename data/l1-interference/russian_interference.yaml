language: russian
schema_version: '3.0'
grammar_points:
  verb_aspect:
    interference_patterns:
    - pattern: Using simple present for ongoing actions -> Use present continuous
      example: 'Russian: ''Я ем сейчас'' (Ya yem seychas) -> literal: ''I eat now''
        -> wrong: ''I eat now'' -> correct: ''I am eating now'''
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Using present tense for completed actions -> Use present perfect or
        simple past
      example: 'Russian: ''Я уже прочитал эту книгу'' (Ya uzhe prochital etu knigu)
        -> literal: ''I already read(perf.) this book'' -> wrong: ''I already read
        this book'' -> correct: ''I have already read this book'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overusing progressive for habitual actions -> Use simple present
      example: 'Russian: ''Я читаю книги каждый день'' (Ya chitayu knigi kazhdyy den'')
        -> literal: ''I am reading books every day'' (imperf.) -> wrong: ''I am reading
        books every day'' -> correct: ''I read books every day'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: ''I eat now.'' Correct: ''I am eating now.'''
    - 'Wrong: ''I already read this book.'' Correct: ''I have already read this book.'''
    - 'Wrong: ''I am reading books every day.'' Correct: ''I read books every day.'''
    - 'Wrong: ''She is knowing the answer.'' Correct: ''She knows the answer.'''
    why_it_happens: Russian has a grammatical aspect system where every verb is either
      imperfective (ongoing, habitual, or incomplete action) or perfective (completed,
      resultative action). This is marked morphologically through prefixes and suffixes,
      not through auxiliary verbs. English uses progressive/continuous forms (be +
      -ing) for ongoing actions and perfect forms (have + past participle) for completed
      actions relevant to the present. Russian speakers often default to the simple
      present in English because the imperfective aspect in Russian maps naturally
      to the English simple present, even when English requires a progressive form.
      The perfective aspect in Russian does not map neatly onto the English present
      perfect, leading to confusion between simple past and present perfect. Stative
      verbs (know, love, want, belong) are particularly problematic because Russian
      uses imperfective forms for these naturally, but English prohibits the progressive
      form for stative verbs.
    teacher_tips:
      how_to_explain: 'Start by explaining that Russian ''packages'' completion into
        the verb itself (prefixes like про-, с-, на-), while English ''packages''
        it into auxiliary verb structures (have + -ed, be + -ing). Write two columns
        on the board: Russian imperfective on the left, English simple present/progressive
        on the right. Use a timeline diagram: imperfective = ongoing line, perfective
        = completed dot.'
      where_to_start: 'Begin with the most visible error: using simple present for
        actions happening right now. Pick up a book and say ''I am opening the book''
        while doing it, then ask ''Can I say I open the book right now?'''
      sequencing: 'Week 1: Present progressive vs. simple present (ongoing vs. habitual).
        Week 2: Present perfect vs. simple past. Week 3: Stative verbs. Week 4: Aspect
        in narrative.'
      exercises:
      - name: Action Snapshot
        type: oral-drill
        description: Teacher performs actions in class. Students describe what the
          teacher IS DOING RIGHT NOW using present continuous. Then teacher asks 'What
          do I do every day?' to elicit simple present. 10 action pairs.
        duration: 15
      - name: Aspect Auction
        type: error-correction
        description: Teacher displays 20 sentences. Some use correct English aspect,
          others reflect Russian L1 transfer errors. Students 'bid' on whether each
          sentence is correct or incorrect, then must fix the wrong ones.
        duration: 20
      - name: Timeline Translation
        type: translation
        description: Students receive 10 Russian sentences with clear aspectual marking.
          They draw a timeline for each, identify the aspect, then translate into
          correct English.
        duration: 20
      - name: Stative Verb Sort
        type: matching
        description: Students sort 15 verbs into 'stative' and 'dynamic' categories,
          then write one sentence for each verb.
        duration: 15
    sources:
    - 'Slabakova, R. (2000). L1 transfer revisited: The L2 acquisition of telicity.
      Linguistics, 38(4), 729-760.'
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Gor, K. & Chernigovskaya, T. (2003). Mental representation of the aspectual
      contrast in Russian. Journal of Slavic Linguistics, 11(2), 209-230.
    - Nossalik, L. (2008). L1 effects on the processing of grammatical aspect by Russian
      learners of English. Proceedings of the 32nd Annual Boston University Conference
      on Language Development.
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Defining feature of Russian grammar. Every verb in Russian is inherently
      aspectual.
    source_rank: 1
    citations:
    - claim: Interference pattern for verb aspect
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
