  short_adjectives:
    interference_patterns:
    - pattern: Omitting 'to be' with short-form adjectives -> Include 'to be'
      example: 'Russian: ''Он болен'' (On bolen) -> literal: ''He (is) sick'' (no
        verb needed) -> wrong: ''He sick'' -> correct: ''He is sick'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using adjective where English requires adverb -> Use adverb
      example: 'Russian: ''Он говорит громко'' (On govorit gromko) -> wrong: ''He
        speaks loud'' -> correct: ''He speaks loudly'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Wrong adjective order in multi-adjective noun phrase -> Follow English
        adjective order
      example: 'Russian: ''красивый большой белый дом'' (krasivyy bol''shoy belyy
        dom) -> wrong: ''white big beautiful house'' -> correct: ''beautiful big white
        house'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''He sick.'' Correct: ''He is sick.'''
    - 'Wrong: ''She speaks loud.'' Correct: ''She speaks loudly.'''
    - 'Wrong: ''White big beautiful house.'' Correct: ''Beautiful big white house.'''
    - 'Wrong: ''The food tastes well.'' Correct: ''The food tastes good.'''
    why_it_happens: Russian has short-form adjectives used ONLY predicatively that
      do not require a copula verb. 'Он болен' (He sick) is complete — no 'is' needed.
      English always requires a linking verb before a predicative adjective. Russian
      adjectives do not change form to become adverbs, leading to errors like 'speaks
      loud.'
    teacher_tips:
      how_to_explain: 'Start with: ''In English, you ALWAYS need a verb before an
        adjective that describes the subject. He IS tall.'' Russian has ''short-cut''
        adjectives that don''t need a verb, but English doesn''t. For adverbs, English
        adds -ly: quick -> quickly.'
      where_to_start: 'Begin with the ''to be'' + adjective pattern. Use physical
        descriptions: ''I am tall. You are short.'''
      sequencing: 'Week 1: ''To be'' + adjective. Week 2: Adjective order before nouns.
        Week 3: Adjective vs. adverb. Week 4: Linking verbs + adjective.'
      exercises:
      - name: To Be or Not To Be
        type: fill-in-the-blank
        description: Students add the correct form of 'to be' to 20 sentences.
        duration: 10
      - name: Adjective Order Challenge
        type: transformation
        description: Students arrange 15 sets of adjectives in correct English order.
        duration: 15
      - name: Adjective or Adverb?
        type: fill-in-the-blank
        description: Students choose between adjective and adverb forms in 15 sentences.
        duration: 15
      - name: Description Paragraph
        type: composition
        description: Students write a paragraph describing a person using at least
          8 adjectives in correct positions.
        duration: 20
