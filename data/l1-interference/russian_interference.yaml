language: russian
schema_version: '4.0'
grammar_points:
  verb_aspect:
    interference_patterns:
    - pattern: Using simple present for ongoing actions -> Use present continuous
      frequency: 5
      persistence: 4
      communicative_impact: 2
      example_l1: 'Russian: ''Я ем сейчас'''
      example_gloss: Ya yem seychas
      example_wrong: 'literal: ''I eat now'
      example_correct: 'wrong: ''I eat now'' -> correct: ''I am eating now'
      explanation: 'Transfer from L1: Using simple present for ongoing actions ->
        Use present continuous.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using present tense for completed actions -> Use present perfect or
        simple past
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''Я уже прочитал эту книгу'''
      example_gloss: Ya uzhe prochital etu knigu
      example_wrong: 'literal: ''I already read(perf.) this book'
      example_correct: 'wrong: ''I already read this book'' -> correct: ''I have already
        read this book'
      explanation: 'Transfer from L1: Using present tense for completed actions ->
        Use present perfect or simple past.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overusing progressive for habitual actions -> Use simple present
      frequency: 3
      persistence: 3
      communicative_impact: 1
      example_l1: 'Russian: ''Я читаю книги каждый день'''
      example_gloss: Ya chitayu knigi kazhdyy den'
      example_wrong: 'literal: ''I am reading books every day'' (imperf.)'
      example_correct: 'wrong: ''I am reading books every day'' -> correct: ''I read
        books every day'
      explanation: 'Transfer from L1: Overusing progressive for habitual actions ->
        Use simple present.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I eat now.'' Correct: ''I am eating now.'''
    - 'Wrong: ''I already read this book.'' Correct: ''I have already read this book.'''
    - 'Wrong: ''I am reading books every day.'' Correct: ''I read books every day.'''
    - 'Wrong: ''She is knowing the answer.'' Correct: ''She knows the answer.'''
    why_it_happens: Russian has a grammatical aspect system where every verb is either
      imperfective (ongoing, habitual, or incomplete action) or perfective (completed,
      resultative action). This is marked morphologically through prefixes and suffixes,
      not through auxiliary verbs. English uses progressive/continuous forms (be +
      -ing) for ongoing actions and perfect forms (have + past participle) for completed
      actions relevant to the present. Russian speakers often default to the simple
      present in English because the imperfective aspect in Russian maps naturally
      to the English simple present, even when English requires a progressive form.
      The perfective aspect in Russian does not map neatly onto the English present
      perfect, leading to confusion between simple past and present perfect. Stative
      verbs (know, love, want, belong) are particularly problematic because Russian
      uses imperfective forms for these naturally, but English prohibits the progressive
      form for stative verbs.
    teacher_tips:
      how_to_explain: 'Start by explaining that Russian ''packages'' completion into
        the verb itself (prefixes like про-, с-, на-), while English ''packages''
        it into auxiliary verb structures (have + -ed, be + -ing). Write two columns
        on the board: Russian imperfective on the left, English simple present/progressive
        on the right. Use a timeline diagram: imperfective = ongoing line, perfective
        = completed dot.'
      where_to_start: 'Begin with the most visible error: using simple present for
        actions happening right now. Pick up a book and say ''I am opening the book''
        while doing it, then ask ''Can I say I open the book right now?'''
      sequencing: 'Week 1: Present progressive vs. simple present (ongoing vs. habitual).
        Week 2: Present perfect vs. simple past. Week 3: Stative verbs. Week 4: Aspect
        in narrative.'
      exercises:
      - name: Action Snapshot
        type: oral-drill
        description: Teacher performs actions in class. Students describe what the
          teacher IS DOING RIGHT NOW using present continuous. Then teacher asks 'What
          do I do every day?' to elicit simple present. 10 action pairs.
        duration: 15
      - name: Aspect Auction
        type: error-correction
        description: Teacher displays 20 sentences. Some use correct English aspect,
          others reflect Russian L1 transfer errors. Students 'bid' on whether each
          sentence is correct or incorrect, then must fix the wrong ones.
        duration: 20
      - name: Timeline Translation
        type: translation
        description: Students receive 10 Russian sentences with clear aspectual marking.
          They draw a timeline for each, identify the aspect, then translate into
          correct English.
        duration: 20
      - name: Stative Verb Sort
        type: matching
        description: Students sort 15 verbs into 'stative' and 'dynamic' categories,
          then write one sentence for each verb.
        duration: 15
    sources:
    - 'Slabakova, R. (2000). L1 transfer revisited: The L2 acquisition of telicity.
      Linguistics, 38(4), 729-760.'
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Gor, K. & Chernigovskaya, T. (2003). Mental representation of the aspectual
      contrast in Russian. Journal of Slavic Linguistics, 11(2), 209-230.
    - Nossalik, L. (2008). L1 effects on the processing of grammatical aspect by Russian
      learners of English. Proceedings of the 32nd Annual Boston University Conference
      on Language Development.
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Defining feature of Russian grammar. Every verb in Russian is inherently
      aspectual.
    source_rank: 1
    citations:
    - claim: Interference pattern for verb aspect
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Russian speakers, pp. 143-160'
      tier: 1
    - claim: 'Grammar point: verb aspect'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  case_system_6:
    interference_patterns:
    - pattern: Omitting object pronouns or using subject pronouns for objects -> Use
        correct object pronouns
      frequency: 3
      persistence: 2
      communicative_impact: 2
      example_l1: 'Russian: ''Я вижу его'''
      example_gloss: Ya vizhu yego
      example_wrong: 'literal: ''I see him(accusative)'
      example_correct: 'wrong: ''I see he'' -> correct: ''I see him'
      explanation: 'Transfer from L1: Omitting object pronouns or using subject pronouns
        for objects -> Use correct object pronouns.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using wrong preposition due to Russian case government -> Use English
        prepositional patterns
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''думать о'''
      example_gloss: dumat' o + prepositional case
      example_wrong: 'literal: ''think about'' BUT Russian also uses accusative for
        ''think of'' contexts'
      example_correct: 'wrong: ''I think about him'' -> correct: ''I think of him'
      explanation: 'Transfer from L1: Using wrong preposition due to Russian case
        government -> Use English prepositional patterns.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Word order errors from flexible Russian SOV/SVO -> Use fixed English
        SVO
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Книгу я прочитал'''
      example_gloss: Knigu ya prochital
      example_wrong: 'literal: ''Book(accusative) I read'
      example_correct: 'wrong: ''The book I read'' (as main clause) -> correct: ''I
        read the book'
      explanation: 'Transfer from L1: Word order errors from flexible Russian SOV/SVO
        -> Use fixed English SVO.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I help he.'' Correct: ''I help him.'''
    - 'Wrong: ''Give it to she.'' Correct: ''Give it to her.'''
    - 'Wrong: ''The book I read yesterday.'' (as a main clause) Correct: ''I read
      the book yesterday.'''
    - 'Wrong: ''She told to me.'' Correct: ''She told me.'''
    why_it_happens: Russian has six grammatical cases (nominative, accusative, genitive,
      dative, instrumental, prepositional) that mark the function of nouns and pronouns
      through inflectional endings. English has largely lost its case system — only
      pronouns retain subject/object distinctions (I/me, he/him, she/her), and word
      order (SVO) carries the functional load that Russian case endings carry. Russian
      speakers may use subject pronouns where English requires object pronouns because
      the Russian pronoun form changes with case. Additionally, Russian allows relatively
      free word order because case endings identify grammatical roles, so Russian
      speakers may produce English sentences with non-standard word order.
    teacher_tips:
      how_to_explain: 'Draw a simple diagram showing that Russian uses word ENDINGS
        to show who does what to whom, while English uses WORD ORDER. Write the same
        Russian sentence in multiple word orders (all correct in Russian) and show
        that only one English word order works. For pronouns, create a simple chart:
        I/me, he/him, she/her, we/us, they/them.'
      where_to_start: Start with pronoun errors because they are the most visible
        and easiest to correct. Write 'I see he' on the board and ask if it sounds
        right.
      sequencing: 'Week 1: Subject vs. object pronouns. Week 2: Word order in simple
        sentences (SVO is fixed). Week 3: Preposition + object pronoun. Week 4: Ditransitive
        verbs.'
      exercises:
      - name: Pronoun Police
        type: error-correction
        description: Display 15 sentences with pronoun case errors reflecting Russian
          L1 patterns. Students identify the error and correct it.
        duration: 15
      - name: Word Order Freeze
        type: transformation
        description: Give students 10 Russian sentences with scrambled word order.
          Students must rewrite each in the ONE correct English word order.
        duration: 15
      - name: Case-to-Preposition Mapping
        type: matching
        description: Create cards with Russian case functions and cards with English
          prepositional phrases. Students match Russian case functions to their English
          equivalents.
        duration: 20
      - name: Sentence Builder
        type: oral-drill
        description: Teacher provides a Russian sentence. First student translates
          it literally. Second student 'fixes' it to natural English. Rotate through
          10 sentences.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Comrie, B. (1981). Language Universals and Linguistic Typology. University of
      Chicago Press.
    - Kempe, V. & MacWhinney, B. (1998). The acquisition of case marking by adult
      learners of Russian and German. Studies in Second Language Acquisition, 20(4),
      543-587.
    source_count: 3
    source_type: peer-reviewed
    frequency: 3
    persistence: 2
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Fundamental structural challenge. Russian case system carries functional
      load that English distributes across word order and prepositions.
    source_rank: 1
    citations:
    - claim: Interference pattern for case system 6
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Russian speakers, pp. 143-160'
      tier: 1
    - claim: 'Grammar point: case system 6'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  negation_double:
    interference_patterns:
    - pattern: Negating with multiple negative words in one sentence -> Use single
        negation
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''Я ничего не знаю'''
      example_gloss: Ya nichego ne znayu
      example_wrong: 'literal: ''I nothing not know'
      example_correct: 'wrong: ''I don''t know nothing'' -> correct: ''I don''t know
        anything'' / ''I know nothing'
      explanation: 'Transfer from L1: Negating with multiple negative words in one
        sentence -> Use single negation.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using 'no' as a general negator -> Use 'not' with auxiliary
      frequency: 3
      persistence: 2
      communicative_impact: 2
      example_l1: 'Russian: ''Я не студент'''
      example_gloss: Ya ne student
      example_wrong: 'literal: ''I not student'
      example_correct: 'wrong: ''I no student'' -> correct: ''I am not a student'
      explanation: 'Transfer from L1: Using ''no'' as a general negator -> Use ''not''
        with auxiliary.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Placing negation after the verb -> Place negation with auxiliary
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Я знаю не'''
      example_gloss: Ya znayu ne
      example_wrong: 'literal: ''I know not'
      example_correct: 'wrong: ''I know not'' -> correct: ''I do not know'
      explanation: 'Transfer from L1: Placing negation after the verb -> Place negation
        with auxiliary.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I don''t know nothing.'' Correct: ''I don''t know anything.'''
    - 'Wrong: ''I no like coffee.'' Correct: ''I don''t like coffee.'''
    - 'Wrong: ''He never don''t come.'' Correct: ''He never comes.'''
    - 'Wrong: ''She can''t find nowhere.'' Correct: ''She can''t find anywhere.'''
    why_it_happens: 'Russian is a negative concord language, meaning that multiple
      negative elements in a single sentence reinforce rather than cancel each other.
      ''Я ничего не знаю'' (I nothing not know) is perfectly grammatical and standard
      in Russian — both the negative pronoun ''ничего'' (nothing) and the negative
      particle ''не'' (not) are required. English follows the principle of single
      negation: only one negative element is permitted per clause. Additionally, Russian
      negation is achieved simply by placing the particle ''не'' before the verb,
      without any auxiliary ''do'' support, leading to errors like ''I no like'' or
      ''I know not.'''
    teacher_tips:
      how_to_explain: 'Start with a math analogy: ''In Russian, two negatives make
        a stronger negative. In English, two negatives make a positive.'' Write the
        Russian sentence ''Я ничего не знаю'' on the board, show its literal translation,
        then show the correct English. Explain that English requires ''any-'' words
        after a negative, not ''no-'' words.'
      where_to_start: 'Begin with the most common error: ''I don''t know nothing.''
        Explain that while it''s common in some English dialects, standard English
        requires ''I don''t know anything.'''
      sequencing: 'Week 1: Single negation rule + ''any-'' vs. ''no-'' words. Week
        2: ''Do'' support for negation. Week 3: Negative adverbs (never, hardly, seldom).
        Week 4: Register awareness.'
      exercises:
      - name: Negative Makeover
        type: sentence-rewrite
        description: Students receive 15 sentences with Russian-style double negation.
          They must rewrite each in standard English.
        duration: 15
      - name: Any- vs. No- Word Sort
        type: matching
        description: 'Students choose the correct word from pairs: anything/nothing,
          anyone/no one, anywhere/nowhere, either/neither.'
        duration: 15
      - name: Negation Translation Challenge
        type: translation
        description: Students translate 10 Russian sentences with negation into correct
          English.
        duration: 20
      - name: Dialect Detective
        type: composition
        description: Students identify standard vs. dialect English in 5 short dialogues
          and rewrite dialect passages in standard English.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
    - 'Willis, D. (2003). Rules, Patterns and Words: Grammar and Lexis in English
      Language Teaching. Cambridge University Press.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Fundamental difference from English. Russian negative concord is systematic
      and obligatory.
    source_rank: 1
    citations:
    - claim: Interference pattern for negation double
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Russian speakers, pp. 143-160'
      tier: 1
    - claim: 'Grammar point: negation double'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  gender_agreement:
    interference_patterns:
    - pattern: Using 'he' or 'she' for inanimate objects based on Russian grammatical
        gender -> Use 'it'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''Стол большой, он стоит...'''
      example_gloss: Stol bol'shoy, on stoit...
      example_wrong: 'literal: ''Table(masc.) big, he stands...'
      example_correct: 'wrong: ''The table is big. He stands in the corner.'' -> correct:
        ''The table is big. It stands in the corner.'
      explanation: 'Transfer from L1: Using ''he'' or ''she'' for inanimate objects
        based on Russian grammatical gender -> Use ''it''.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using 'she' for feminine nouns like 'car', 'ship', 'country' -> Use
        'it'
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Машина красивая, она...'''
      example_gloss: Mashina krasivaya, ona...
      example_wrong: 'literal: ''Car(fem.) beautiful, she...'
      example_correct: 'wrong: ''The car is beautiful. She is red.'' -> correct: ''The
        car is beautiful. It is red.'
      explanation: 'Transfer from L1: Using ''she'' for feminine nouns like ''car'',
        ''ship'', ''country'' -> Use ''it''.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Adjective-noun gender agreement errors -> English adjectives don't
        agree
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''красивая девушка'''
      example_gloss: krasivaya devushka, fem. adj. + fem. noun
      example_wrong: 'literal: ''beautiful(fem.) girl'
      example_correct: 'correct: ''a beautiful girl'' (adjectives never change in
        English)'
      explanation: 'Transfer from L1: Adjective-noun gender agreement errors -> English
        adjectives don''t agree.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''The table is big. He is in the corner.'' Correct: ''The table is big.
      It is in the corner.'''
    - 'Wrong: ''My car is old. She doesn''t start.'' (neutral context) Correct: ''My
      car is old. It doesn''t start.'''
    - 'Wrong: ''The book is interesting. She is on the table.'' Correct: ''The book
      is interesting. It is on the table.'''
    why_it_happens: Russian has three grammatical genders (masculine, feminine, neuter)
      that apply to ALL nouns, including inanimate objects. Every noun has an inherent
      gender that determines the form of adjectives, pronouns, and even past-tense
      verbs. Russian speakers naturally refer to a table as 'он' (he) because 'стол'
      is masculine, and to a car as 'она' (she) because 'машина' is feminine. English
      uses natural gender — 'he' and 'she' are reserved for people, while 'it' is
      used for everything else. Russian adjectives must agree in gender, number, and
      case with the noun they modify, so Russian speakers may expect English adjectives
      to change form.
    teacher_tips:
      how_to_explain: 'Start by listing common Russian nouns and their genders: стол
        (table, masc.), книга (book, fem.), окно (window, neut.). Then show that in
        English, ALL of these are ''it.'' Use the simple rule: ''If it''s not a person
        (or a pet you love), it''s it.'''
      where_to_start: 'Begin with the pronoun error. Hold up objects in class and
        ask students to describe them. When a student says ''He is big'' about a table,
        write it on the board and ask: ''Is the table a he?'''
      sequencing: 'Week 1: Natural vs. grammatical gender — ''it'' for objects. Week
        2: When ''she'' is acceptable for objects. Week 3: Adjective agreement — English
        adjectives never change. Week 4: Past tense verb agreement.'
      exercises:
      - name: 'Pronoun Police: Object Edition'
        type: error-correction
        description: Display 15 short paragraphs where objects are referred to with
          'he' or 'she' based on Russian grammatical gender. Students identify each
          error and replace with 'it.'
        duration: 15
      - name: Gender Translation
        type: translation
        description: Students translate 10 Russian sentences with gendered pronouns
          referring to objects into English.
        duration: 15
      - name: Adjective Invariance Drill
        type: fill-in-the-blank
        description: Students complete 20 sentences by choosing the correct adjective
          form. All options are the same word since English adjectives don't change.
        duration: 10
      - name: Object Description Game
        type: oral-drill
        description: Students describe objects in English using 3 sentences. Class
          calls 'IT!' if a student uses 'he' or 'she' for an object.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Comrie, B., Stone, G., & Polinsky, M. (1996). The Russian Language in the Twentieth
      Century. Oxford University Press.
    - Kagan, O. (2013). A Study of Heritage Russian. In P. Kagan & M. Polinsky (Eds.),
      Heritage Languages in America. Cambridge University Press.
    source_count: 3
    source_type: peer-reviewed
    frequency: 3
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Core grammar affecting every sentence. Russian grammatical gender system
      affects pronouns, adjectives, and past tense verbs.
    source_rank: 1
    citations:
    - claim: Interference pattern for gender agreement
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Russian speakers, pp. 143-160'
      tier: 1
    - claim: 'Grammar point: gender agreement'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
