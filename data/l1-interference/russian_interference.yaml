  sub_no_backshift:
    interference_patterns:
    - pattern: Using 'would' in if-clause -> Use simple past in if-clause
      example: 'Russian: ''Если бы у меня были деньги...'' (Yesli by u menya byli
        dengi...) -> literal: ''If would at me were money...'' -> wrong: ''If I would
        have money...'' -> correct: ''If I had money...'''
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Backshifting in reported speech where English doesn't require it ->
        Keep original tense for general truths
      example: 'Russian: ''Он сказал, что Земля круглый'' (On skazal, chto Zemli kruglyy)
        -> wrong: ''He said that the Earth was round'' -> correct: ''He said that
        the Earth is round'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
    - pattern: Using 'will' in if-clause -> Use simple present in if-clause
      example: 'Russian: ''Если будет дождь...'' (Yesli budet dozhd''...) -> literal:
        ''If will-be rain...'' -> wrong: ''If it will rain...'' -> correct: ''If it
        rains...'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''If I would have money, I would buy a car.'' Correct: ''If I had money,
      I would buy a car.'''
    - 'Wrong: ''If it will rain, we will stay home.'' Correct: ''If it rains, we will
      stay home.'''
    - 'Wrong: ''He said that the Earth was round.'' (general truth) Correct: ''He
      said that the Earth is round.'''
    - 'Wrong: ''She told me she will come tomorrow.'' (future from past) Correct:
      ''She told me she would come tomorrow.'''
    why_it_happens: 'Russian uses the particle ''бы'' (by) to express hypothetical
      meaning, which can appear in both clauses of a conditional sentence. English
      uses a specific tense pattern: simple past in the if-clause, ''would'' + base
      verb in the main clause. Russian speakers transfer the ''бы'' pattern to English,
      producing ''If I would have...'' For reported speech, Russian does not consistently
      backshift tenses for general truths, while English traditionally backshifts.'
    teacher_tips:
      how_to_explain: 'Start with the conditional pattern: ''In English, when you
        talk about something that isn''t real, you go ONE STEP BACK in time. Present
        becomes past, past becomes past perfect.'' Write: Real: ''I have money'' ->
        Unreal: ''If I HAD money.'''
      where_to_start: Begin with second conditional (present unreal). Use 'If I were
        you...' as a starting point.
      sequencing: 'Week 1: Second conditional (present unreal). Week 2: Third conditional
        (past unreal). Week 3: First conditional (real future). Week 4: Reported speech
        backshift.'
      exercises:
      - name: Conditional Correction
        type: error-correction
        description: Students correct 15 conditional sentences with Russian L1 transfer
          errors.
        duration: 15
      - name: If I Were a Millionaire
        type: composition
        description: Students write 10 second conditional sentences about being millionaires.
        duration: 15
      - name: Reported Speech Relay
        type: oral-drill
        description: Teacher says direct speech. First student reports it. Second
          student checks the backshift. 15 sentences.
        duration: 15
      - name: Conditional Chain Story
        type: composition
        description: Students write a chain story where each sentence is a conditional.
        duration: 20
