  animacy_acc:
    interference_patterns:
    - pattern: Using 'who' for animals or objects -> Use 'which/that' for non-humans
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Кот, который...'''
      example_gloss: Kot, kotoryy...
      example_wrong: 'wrong: ''The cat who...'
      example_correct: 'correct: ''The cat that...'
      explanation: 'Transfer from L1: Using ''who'' for animals or objects -> Use
        ''which/that'' for non-humans.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using different pronouns for people vs. things -> English distinguishes
        who/which
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Человек, который...'' AND ''Стол, который...'''
      example_gloss: same pronoun
      example_wrong: 'wrong: ''The man which...'
      example_correct: 'correct: ''The man who...'' / ''The table which...'
      explanation: 'Transfer from L1: Using different pronouns for people vs. things
        -> English distinguishes who/which.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Word order differences in animate vs. inanimate objects -> English
        uses fixed word order
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Я вижу брата'''
      example_gloss: genitive for animate) vs. 'Я вижу стол' (nominative for inanimate
      example_wrong: 'English: ''I see my brother'
      example_correct: I see the table' (no case distinction)
      explanation: 'Transfer from L1: Word order differences in animate vs. inanimate
        objects -> English uses fixed word order.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''The cat who is sleeping.'' Correct: ''The cat that is sleeping.'''
    - 'Wrong: ''The man which came yesterday.'' Correct: ''The man who came yesterday.'''
    - 'Wrong: ''The book who I read.'' Correct: ''The book that I read.'''
    - 'Wrong: ''The dog who barks.'' Correct: ''The dog that barks.'''
    why_it_happens: 'Russian has an animacy distinction in its case system: masculine
      animate nouns in accusative take the genitive form, while inanimate take the
      nominative. This animacy distinction does not exist in English. Russian speakers
      may transfer this awareness to English, such as using ''who'' for animals. Russian
      uses the same relative pronoun ''который'' for all nouns, while English distinguishes
      ''who'' (people) from ''which/that'' (things).'
    teacher_tips:
      how_to_explain: 'Explain the simple rule: ''who'' for people, ''which'' for
        things, ''that'' for both. Russian uses ''который'' for everything, so you
        need to choose the right English word.'
      where_to_start: 'Begin with the who/which distinction. Write ''The cat who...''
        on the board and ask: ''Is the cat a person?'''
      sequencing: 'Week 1: Who (people) vs. which (things) vs. that (both). Week 2:
        Animacy concept — explain Russian system. Week 3: Practice with relative clauses.
        Week 4: Review and consolidation.'
      exercises:
      - name: Who or Which?
        type: fill-in-the-blank
        description: Students choose between 'who,' 'which,' and 'that' in 20 sentences.
        duration: 10
      - name: Relative Pronoun Correction
        type: error-correction
        description: Students correct 15 sentences with relative pronoun errors.
        duration: 15
      - name: Who/Which Sort
        type: matching
        description: Students create relative clauses for 20 noun cards using the
          correct pronoun.
        duration: 15
      - name: Description Paragraph
        type: composition
        description: Students write a paragraph describing their family and home using
          at least 4 relative clauses.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Comrie, B. (1981). Language Universals and Linguistic Typology. University of
      Chicago Press.
    - Murphy, R. (2019). English Grammar in Use (5th ed.). Cambridge University Press.
