  tense_aspect_advanced:
    interference_patterns:
    - pattern: Present perfect vs simple past confusion
      example_l1: '[ru] example'
      example_gloss: gloss
      example_wrong: I have seen him yesterday.
      example_correct: I saw him yesterday.
      explanation: Russian may use a single past tense form where English distinguishes
