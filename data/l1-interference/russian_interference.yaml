  adverbs_advanced:
    interference_patterns:
    - pattern: Adjective used as adverb
      example_l1: '[ru] example'
      example_gloss: gloss
      example_wrong: He speaks English good.
      example_correct: He speaks English well.
      explanation: Russian may not distinguish morphologically between adjectives
