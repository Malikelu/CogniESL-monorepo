  gen_after_neg:
    interference_patterns:
    - pattern: Using accusative instead of genitive after negation -> English uses
        direct object (no case change)
      example: 'Russian: ''Я не вижу книгу'' becomes ''Я не вижу книги'' (genitive)
        in formal Russian -> wrong: ''I don''t see no book'' -> correct: ''I don''t
        see any book'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using partitive/genitive for 'some/any' distinction -> Use 'any' in
        negatives
      example: 'Russian: ''У меня нет книги'' (U menya net knigi, genitive) -> wrong:
        ''I don''t have no book'' -> correct: ''I don''t have any books'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Omitting object after negation -> Include object
      example: 'Russian: ''Я не знаю'' (Ya ne znayu) -> literal: ''I not know'' ->
        correct: ''I don''t know the answer'' / ''I don''t know anything'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I don''t see no book.'' Correct: ''I don''t see any book.'''
    - 'Wrong: ''I have no nothing.'' Correct: ''I don''t have anything.'''
    - 'Wrong: ''He doesn''t want no help.'' Correct: ''He doesn''t want any help.'''
    - 'Wrong: ''She has no no money.'' Correct: ''She doesn''t have any money.'''
    why_it_happens: 'In Russian, negation triggers a case change: the accusative of
      the direct object is often replaced by the genitive when the verb is negated.
      This is a systematic grammatical rule. English has no such case change. Russian
      speakers may transfer this pattern to English, leading to double negation (using
      ''no'' instead of ''any'').'
    teacher_tips:
      how_to_explain: 'Explain that in Russian, negation changes the ''clothes'' of
        the object (accusative -> genitive). In English, negation does NOT change
        the object — but it DOES change ''some'' to ''any.'' Use the rule: ''In negative
        sentences, change SOME to ANY.'''
      where_to_start: 'Begin with the ''some -> any'' rule. Use real objects: ''I
        have some pens'' -> ''I don''t have any pens.'''
      sequencing: 'Week 1: ''Some'' vs. ''any.'' Week 2: ''No'' as a determiner. Week
        3: Negative pronouns. Week 4: Metalinguistic awareness of Russian system.'
      exercises:
      - name: Some -> Any Transformation
        type: transformation
        description: Students negate 15 affirmative sentences with 'some,' changing
          to 'any.'
        duration: 15
      - name: Negative Sentence Auction
        type: error-correction
        description: Students 'bid' on whether 20 sentences are correct. Wrong sentences
          must be corrected.
        duration: 20
      - name: Russian Negation Explanation
        type: composition
        description: Students write an explanation of how negation works in Russian
          vs. English.
        duration: 15
      - name: Negation Translation
        type: translation
        description: Students translate 10 Russian negated sentences into correct
          English.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Comrie, B. (1981). Language Universals and Linguistic Typology. University of
      Chicago Press.
    - Bickerton, D. (1981). Roots of Language. Karoma Publishers.
