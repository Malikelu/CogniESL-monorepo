  pronoun_drop:
    interference_patterns:
    - pattern: Omitting subject pronoun -> Always include subject pronoun
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''Иду домой'''
      example_gloss: Idu domoy
      example_wrong: 'literal: ''(I) go home'
      example_correct: 'wrong: ''Go home'' (as a statement) -> correct: ''I am going
        home'
      explanation: 'Transfer from L1: Omitting subject pronoun -> Always include subject
        pronoun.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting impersonal 'it' for weather/time -> Include 'it'
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''Идёт дождь'''
      example_gloss: Idyot dozhd'
      example_wrong: 'literal: ''(It) goes rain'
      example_correct: 'wrong: ''Is raining'' -> correct: ''It is raining'
      explanation: 'Transfer from L1: Omitting impersonal ''it'' for weather/time
        -> Include ''it''.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting 'there is/are' existential -> Include 'there'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''Есть книга'''
      example_gloss: Yest' kniga
      example_wrong: 'literal: ''(There) is book'
      example_correct: 'wrong: ''Is a book'' -> correct: ''There is a book'
      explanation: 'Transfer from L1: Omitting ''there is/are'' existential -> Include
        ''there''.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''Go home now.'' (as a statement) Correct: ''I am going home now.'''
    - 'Wrong: ''Is raining.'' Correct: ''It is raining.'''
    - 'Wrong: ''Is a book on the table.'' Correct: ''There is a book on the table.'''
    - 'Wrong: ''Was cold yesterday.'' Correct: ''It was cold yesterday.'''
    why_it_happens: Russian is a pro-drop language, meaning that subject pronouns
      can be omitted because the verb conjugation already indicates the person and
      number of the subject. 'Иду' (idu) can only mean 'I go.' English is a non-pro-drop
      language that requires an explicit subject in every declarative sentence. This
      creates a systematic error where Russian speakers drop subject pronouns in English.
      The problem is compounded by weather and time expressions, where Russian uses
      impersonal constructions without any subject pronoun, but English requires the
      dummy subject 'it'.
    teacher_tips:
      how_to_explain: 'Start with a simple rule: ''Every English sentence needs a
        subject. No exceptions.'' Russian verbs ''wear a name tag'' (conjugation shows
        who), but English verbs don''t. For weather expressions, teach ''it'' as a
        ''placeholder subject'' — it doesn''t refer to anything real.'
      where_to_start: 'Begin with weather expressions. Write ''Is raining'' on the
        board and ask: ''Who is raining?'' This creates a humorous moment that makes
        the correction memorable.'
      sequencing: 'Week 1: Subject pronouns are mandatory. Week 2: Weather/time expressions
        with ''it.'' Week 3: Existential ''there is/are.'' Week 4: Dummy ''it'' in
        expressions.'
      exercises:
      - name: Subject Rescue
        type: fill-in-the-blank
        description: Students add the correct subject pronoun to 20 sentences with
          missing subjects.
        duration: 15
      - name: Weather Report
        type: oral-drill
        description: Students describe the weather in 5 sentences, each beginning
          with 'It is...'
        duration: 10
      - name: Pro-drop Translation
        type: translation
        description: Students translate 10 Russian sentences without subject pronouns
          into English, adding the necessary pronouns.
        duration: 15
      - name: Existential Scavenger Hunt
        type: composition
        description: Students write 10 sentences about what exists in the classroom
          using 'There is/are...'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - White, L. (1985). The 'pro-drop' parameter in adult second language acquisition.
      Language Learning, 35(1), 47-61.
    - 'Kagan, O. & Dillon, K. (2001). A new perspective on teaching Russian: Focus
      on the heritage learner. Slavic and East European Journal, 45(3), 507-518.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Fundamental structural difference. Russian is a consistent pro-drop language;
      English is not.
    source_rank: 1
    citations:
    - claim: Interference pattern for pronoun drop
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Russian speakers, pp. 143-160'
      tier: 1
    - claim: 'Grammar point: pronoun drop'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  motion_verbs:
    interference_patterns:
    - pattern: Using single motion verb where English requires verb + preposition/particle
        -> Use phrasal verbs
      frequency: 4
      persistence: 4
      communicative_impact: 2
      example_l1: 'Russian: ''Я иду'''
      example_gloss: Ya idu, indeterminate) vs. 'Я пойду' (Ya poydu, unidirectional
      example_wrong: 'wrong: ''I go to school'' (single trip)'
      example_correct: 'correct: ''I am going to school'
      explanation: 'Transfer from L1: Using single motion verb where English requires
        verb + preposition/particle -> Use phrasal verbs.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting manner of motion -> Include manner in verb or adverb
      frequency: 3
      persistence: 3
      communicative_impact: 1
      example_l1: 'Russian: ''Он пришёл'''
      example_gloss: On prishyol
      example_wrong: 'literal: ''He came (on foot)'
      example_correct: 'wrong: ''He came by feet'' -> correct: ''He came on foot''
        / ''He walked'
      explanation: 'Transfer from L1: Omitting manner of motion -> Include manner
        in verb or adverb.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Confusing 'go' and 'come' directionality -> Use correct deictic verb
      frequency: 2
      persistence: 2
      communicative_impact: 2
      example_l1: 'Russian: ''Иди сюда!'''
      example_gloss: Idi syuda!
      example_wrong: 'literal: ''Go here!'
      example_correct: 'wrong: ''Go here!'' (meaning ''Come here!'') -> correct: ''Come
        here!'
      explanation: 'Transfer from L1: Confusing ''go'' and ''come'' directionality
        -> Use correct deictic verb.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I go to school every day.'' (single trip) Correct: ''I am going to
      school.'''
    - 'Wrong: ''He came by feet.'' Correct: ''He came on foot.'' / ''He walked.'''
    - 'Wrong: ''Go here!'' (meaning ''Come here!'') Correct: ''Come here!'''
    - 'Wrong: ''She went to Moscow.'' (still there) Correct: ''She has gone to Moscow.'''
    why_it_happens: Russian has a unique system of motion verbs distinguishing between
      unidirectional motion (one specific trip) and indeterminate/habitual motion
      (regular, repeated). 'Иди' (idti) is unidirectional walking vs. 'ходить' (khodit')
      is indeterminate walking. English does not make this distinction grammatically
      — 'go' covers both meanings. Russian motion verbs often encode the means of
      transport in the verb itself, leading to errors when this information is redundantly
      added in English.
    teacher_tips:
      how_to_explain: Explain that Russian has TWO sets of motion verbs (one for 'one
        trip' and one for 'regular/repeated'), while English has ONE set. Draw a single
        arrow (unidirectional) and a double-headed arrow (indeterminate). English
        puts manner in the verb (walk, run, drive, fly) while Russian puts it in the
        adverb.
      where_to_start: 'Begin with the most common motion verbs: go, come, walk, run,
        drive, fly. Create a chart showing the Russian unidirectional/indeterminate
        pairs.'
      sequencing: 'Week 1: Go/come — basic directionality. Week 2: Walk/run/drive
        — manner of motion. Week 3: Phrasal verbs with motion. Week 4: Narrative use
        of motion verbs.'
      exercises:
      - name: Motion Verb Mapping
        type: matching
        description: Students match Russian motion verb pairs to their English equivalents.
        duration: 15
      - name: Directionality Drill
        type: oral-drill
        description: Teacher describes scenarios. Students choose the correct English
          form. 15 scenarios.
        duration: 15
      - name: Motion Narrative
        type: composition
        description: Students write a short story about a journey using at least 6
          different motion verbs.
        duration: 20
      - name: Come vs. Go Game
        type: oral-drill
        description: Students correctly use 'come' (toward speaker) and 'go' (away
          from speaker). 15 rapid-fire scenarios.
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Pavlenko, A. (2010). Verbs of motion in L1 Russian and L2 English. In V. Cook
      & B. Bassetti (Eds.), Language and Bilingual Cognition. Psychology Press.
    - Hasko, V. (2009). The locus of difficulties in the acquisition of motion verbs
      by Russian learners of English. In M. Bowles et al. (Eds.), Selected Proceedings
      of the 2007 Second Language Research Forum. Cascadilla Proceedings Project.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 4
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Unique to Slavic languages — no English parallel. The unidirectional/indeterminate
      distinction is deeply embedded.
    source_rank: 1
    citations:
    - claim: Interference pattern for motion verbs
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Russian speakers, pp. 143-160'
      tier: 1
    - claim: 'Grammar point: motion verbs'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  articles_in_en:
    interference_patterns:
    - pattern: Omitting indefinite article before singular countable nouns -> Add
        'a/an'
      frequency: 5
      persistence: 4
      communicative_impact: 2
      example_l1: 'Russian: ''Я студент'''
      example_gloss: Ya student
      example_wrong: 'literal: ''I student'
      example_correct: 'wrong: ''I am student'' -> correct: ''I am a student'
      explanation: 'Transfer from L1: Omitting indefinite article before singular
        countable nouns -> Add ''a/an''.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting definite article when specificity is required -> Add 'the'
      frequency: 4
      persistence: 4
      communicative_impact: 2
      example_l1: 'Russian: ''Дай мне книгу'''
      example_gloss: Day mne knigu
      example_wrong: 'literal: ''Give me book(accusative)'
      example_correct: 'wrong: ''Give me book'' -> correct: ''Give me the book'
      explanation: 'Transfer from L1: Omitting definite article when specificity is
        required -> Add ''the''.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using 'the' with general plural/uncountable nouns -> Omit article for
        general reference
      frequency: 3
      persistence: 3
      communicative_impact: 1
      example_l1: 'Russian: ''Я люблю музыку'''
      example_gloss: Ya lyublyu muzyku
      example_wrong: 'literal: ''I love music(accusative)'
      example_correct: 'wrong: ''I love the music'' (generally) -> correct: ''I love
        music'
      explanation: 'Transfer from L1: Using ''the'' with general plural/uncountable
        nouns -> Omit article for general reference.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using articles with proper nouns -> Omit article
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Я живу в Москве'''
      example_gloss: Ya zhivu v Moskve
      example_wrong: 'literal: ''I live in Moscow'
      example_correct: 'wrong: ''I live in the Moscow'' -> correct: ''I live in Moscow'
      explanation: 'Transfer from L1: Using articles with proper nouns -> Omit article.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I am student.'' Correct: ''I am a student.'''
    - 'Wrong: ''Give me book.'' Correct: ''Give me the book.'''
    - 'Wrong: ''I love the music.'' (generally) Correct: ''I love music.'''
    - 'Wrong: ''She is the doctor.'' (profession) Correct: ''She is a doctor.'''
    why_it_happens: Russian has no articles whatsoever. Specificity and definiteness
      in Russian are expressed through word order, context, demonstrative pronouns,
      and case endings. This makes articles one of the most persistent error patterns
      for Russian learners. The concept of marking definiteness with a separate word
      (the/a) is entirely foreign to Russian grammar. Russian speakers must learn
      not just the rules, but the very CONCEPT that languages can mark whether a noun
      is specific vs. general.
    teacher_tips:
      how_to_explain: 'Start with: ''English uses little words (a, the) to tell the
        listener whether you mean something specific or general. Russian doesn''t
        have these words.'' Use a simple test: ''First mention?'' -> ''a.'' ''Listener
        knows which one?'' -> ''the.'' ''Talking about ALL of something?'' -> no article.'
      where_to_start: 'Begin with the indefinite article (a/an). Use the ''first mention''
        rule: ''I saw A dog. THE dog was big.'''
      sequencing: 'Week 1: Indefinite article (a/an). Week 2: Definite article (the).
        Week 3: Zero article. Week 4: Tricky cases.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: Students find and correct 15 article errors in a text written
          by a fictional Russian learner.
        duration: 20
      - name: First Mention, Second Mention
        type: composition
        description: 'Students write a short story using the pattern: first mention
          with ''a/an,'' subsequent mentions with ''the.'''
        duration: 15
      - name: General vs. Specific
        type: matching
        description: Students identify which sentence makes a general statement and
          which refers to something specific in 20 sentence pairs.
        duration: 15
      - name: Article Decision Tree
        type: fill-in-the-blank
        description: 'Students complete 25 sentences by choosing: a/an, the, or no
          article.'
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    - 'Cho, J. & Slabakova, R. (2014). Interpreting definiteness in a second language
      without articles: The case of L1-Korean L2-English. Second Language Research,
      30(3), 309-336.'
    - Murphy, R. (2019). English Grammar in Use (5th ed.). Cambridge University Press.
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Major interference — complete L1 gap. Russian has no article system whatsoever.
    source_rank: 1
