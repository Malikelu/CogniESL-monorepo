  negation_double:
    interference_patterns:
    - pattern: Negating with multiple negative words in one sentence -> Use single
        negation
      example: 'Russian: ''Я ничего не знаю'' (Ya nichego ne znayu) -> literal: ''I
        nothing not know'' -> wrong: ''I don''t know nothing'' -> correct: ''I don''t
        know anything'' / ''I know nothing'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'no' as a general negator -> Use 'not' with auxiliary
      example: 'Russian: ''Я не студент'' (Ya ne student) -> literal: ''I not student''
        -> wrong: ''I no student'' -> correct: ''I am not a student'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Placing negation after the verb -> Place negation with auxiliary
      example: 'Russian: ''Я знаю не'' (Ya znayu ne) -> literal: ''I know not'' ->
        wrong: ''I know not'' -> correct: ''I do not know'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I don''t know nothing.'' Correct: ''I don''t know anything.'''
    - 'Wrong: ''I no like coffee.'' Correct: ''I don''t like coffee.'''
    - 'Wrong: ''He never don''t come.'' Correct: ''He never comes.'''
    - 'Wrong: ''She can''t find nowhere.'' Correct: ''She can''t find anywhere.'''
    why_it_happens: 'Russian is a negative concord language, meaning that multiple
      negative elements in a single sentence reinforce rather than cancel each other.
      ''Я ничего не знаю'' (I nothing not know) is perfectly grammatical and standard
      in Russian — both the negative pronoun ''ничего'' (nothing) and the negative
      particle ''не'' (not) are required. English follows the principle of single
      negation: only one negative element is permitted per clause. Additionally, Russian
      negation is achieved simply by placing the particle ''не'' before the verb,
      without any auxiliary ''do'' support, leading to errors like ''I no like'' or
      ''I know not.'''
    teacher_tips:
      how_to_explain: 'Start with a math analogy: ''In Russian, two negatives make
        a stronger negative. In English, two negatives make a positive.'' Write the
        Russian sentence ''Я ничего не знаю'' on the board, show its literal translation,
        then show the correct English. Explain that English requires ''any-'' words
        after a negative, not ''no-'' words.'
      where_to_start: 'Begin with the most common error: ''I don''t know nothing.''
        Explain that while it''s common in some English dialects, standard English
        requires ''I don''t know anything.'''
      sequencing: 'Week 1: Single negation rule + ''any-'' vs. ''no-'' words. Week
        2: ''Do'' support for negation. Week 3: Negative adverbs (never, hardly, seldom).
        Week 4: Register awareness.'
      exercises:
      - name: Negative Makeover
        type: sentence-rewrite
        description: Students receive 15 sentences with Russian-style double negation.
          They must rewrite each in standard English.
        duration: 15
      - name: Any- vs. No- Word Sort
        type: matching
        description: 'Students choose the correct word from pairs: anything/nothing,
          anyone/no one, anywhere/nowhere, either/neither.'
        duration: 15
      - name: Negation Translation Challenge
        type: translation
        description: Students translate 10 Russian sentences with negation into correct
          English.
        duration: 20
      - name: Dialect Detective
        type: composition
        description: Students identify standard vs. dialect English in 5 short dialogues
          and rewrite dialect passages in standard English.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language.
      Cambridge University Press.
    - 'Willis, D. (2003). Rules, Patterns and Words: Grammar and Lexis in English
      Language Teaching. Cambridge University Press.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Fundamental difference from English. Russian negative concord is systematic
      and obligatory.
    source_rank: 1
    citations:
