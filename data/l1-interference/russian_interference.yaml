  prefix_verbs_pf:
    interference_patterns:
    - pattern: Using simple verb where English requires phrasal verb -> Use phrasal
        verb
      example: 'Russian: ''прочитать'' (prochitat'', prefix про- = through) -> wrong:
        ''I read the book'' (completely) -> correct: ''I read through the book'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
    - pattern: Over-specifying completion with 'already' or 'completely' -> Use correct
        English tense
      example: 'Russian: ''Я уже написал'' (Ya uzhe napisal, perfective past) -> wrong:
        ''I already wrote the letter'' -> correct: ''I have already written the letter'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
    - pattern: Using wrong preposition with prefixed verb -> Learn English preposition
        patterns
      example: 'Russian: ''договорить'' (dogovorit'', prefix до- = to end) -> wrong:
        ''I talked to the end the story'' -> correct: ''I finished telling the story'''
      frequency: 2
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: ''I read the book.'' (completely) Correct: ''I read through the book.'''
    - 'Wrong: ''I already wrote the letter.'' Correct: ''I have already written the
      letter.'''
    - 'Wrong: ''I talked to the end the story.'' Correct: ''I finished telling the
      story.'''
    - 'Wrong: ''She came to the store and bought up everything.'' Correct: ''She went
      to the store and bought everything.'''
    why_it_happens: 'Russian creates perfective verbs by adding prefixes to imperfective
      verbs. These prefixes modify meaning: про- (through), до- (to end), на- (onto/a
      lot), с- (down/together). English uses phrasal verbs or different lexical verbs.
      Russian speakers may try to translate prefix meanings directly. Additionally,
      Russian perfective often implies completion that English expresses through present
      perfect.'
    teacher_tips:
      how_to_explain: 'Explain that Russian uses PREFIXES to change verb meaning,
        while English uses separate words (phrasal verbs). Create a chart: про- ->
        through, до- -> finish, на- -> down/a lot, с- -> together.'
      where_to_start: 'Begin with common prefix-verb pairs and their English equivalents:
        про- (read through), до- (finish), на- (write down).'
      sequencing: 'Week 1: Common Russian prefixes and English equivalents. Week 2:
        Phrasal verbs as equivalents. Week 3: Perfective -> present perfect mapping.
        Week 4: Translation practice.'
      exercises:
      - name: Prefix-to-Phrasal Mapping
        type: matching
        description: Students match 20 Russian prefixed verbs to English phrasal verbs.
        duration: 15
      - name: Prefix Translation
        type: translation
        description: Students translate 12 Russian prefixed verb sentences into English.
        duration: 20
      - name: Phrasal Verb Story
        type: composition
        description: Students write a story using at least 6 phrasal verbs corresponding
          to Russian prefixed verbs.
        duration: 20
      - name: Aspect-to-Tense Conversion
        type: transformation
        description: Students translate 10 Russian perfective past sentences into
          English, choosing between simple past and present perfect.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Slabakova, R. (2000). L1 transfer revisited: The L2 acquisition of telicity.
      Linguistics, 38(4), 729-760.'
    - Murphy, R. (2019). English Grammar in Use (5th ed.). Cambridge University Press.
