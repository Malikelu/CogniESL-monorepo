  reported_speech_advanced:
    interference_patterns:
    - pattern: No backshift in reported speech
      example_l1: '[ru] example'
      example_gloss: gloss
      example_wrong: She said that she is tired.
      example_correct: She said that she was tired.
      explanation: Russian may not backshift tenses in reported speech. English requires
