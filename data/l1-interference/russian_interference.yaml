    - pattern: Overusing present tense in narratives -> Use past tense for storytelling
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''И тут он встаёт и говорит...'''
      example_gloss: historical present
      example_wrong: 'wrong: ''And then he stands up and says...'' (in past narrative)'
      example_correct: 'correct: ''And then he stood up and said...'
      explanation: 'Transfer from L1: Overusing present tense in narratives -> Use
        past tense for storytelling.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I walked down the street. It rained.'' (background) Correct: ''I was
      walking down the street. It was raining.'''
    - 'Wrong: ''He has opened the door and has entered.'' (sequential) Correct: ''He
      opened the door and came in.'''
    - 'Wrong: ''And then he stands up and says...'' (past narrative) Correct: ''And
      then he stood up and said...'''
    - 'Wrong: ''I ate breakfast. Then I went to work.'' (scene-setting) Correct: ''I
      was eating breakfast. Then I was going to work.'''
    why_it_happens: Russian uses aspect (perfective/imperfective) to distinguish between
      completed actions and ongoing/background actions in narratives. Imperfective
      = background, perfective = sequential main events. English uses past continuous
      for background and simple past for main events. Russian speakers may use simple
      past for everything. Russian also uses the 'historical present' for vivid storytelling,
      which transfers to English.
    teacher_tips:
      how_to_explain: 'Explain that English storytelling uses TWO past tenses: simple
        past for main events (what happened) and past continuous for background (what
        was happening). Use a movie metaphor: ''Past continuous = background music
        and scenery. Simple past = main action.'''
      where_to_start: 'Begin with the ''interrupted action'' pattern: ''I was walking
        down the street when I saw a friend.'''
      sequencing: 'Week 1: Past continuous for background. Week 2: Simple past for
        main events. Week 3: ''When'' vs. ''while.'' Week 4: Historical present in
        Russian vs. past tense in English.'
      exercises:
      - name: Story Background vs. Action
        type: fill-in-the-blank
        description: Students choose between past continuous and simple past in 15
          sentences.
        duration: 15
      - name: Narrative Translation
        type: translation
        description: Students translate a short Russian narrative into English, paying
          attention to aspect.
        duration: 20
      - name: Story Retelling
        type: oral-drill
        description: Teacher tells a short story. Students retell it using correct
          tenses. 3 stories.
        duration: 15
      - name: Personal Narrative
        type: composition
        description: Students write a personal narrative about a memorable day using
          at least 4 past continuous and 6 simple past sentences.
        duration: 25
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - 'Slabakova, R. (2000). L1 transfer revisited: The L2 acquisition of telicity.
      Linguistics, 38(4), 729-760.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course (2nd ed.). Heinle & Heinle.'
