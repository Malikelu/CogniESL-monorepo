  countability_ru_en:
    interference_patterns:
    - pattern: Using plural form for uncountable nouns -> Use singular form
      example: 'Russian: ''много информации'' (mnogo informatsii) -> literal: ''many
        informations(gen. pl.)'' -> wrong: ''many informations'' -> correct: ''much
        information'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'many' with uncountable nouns -> Use 'much' or 'a lot of'
      example: 'Russian: ''много советов'' (mnogo sovetov) -> wrong: ''many advices''
        -> correct: ''much advice'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'fewer' with uncountable nouns -> Use 'less'
      example: 'Russian: ''меньше денег'' (men''she deneg) -> wrong: ''fewer money''
        -> correct: ''less money'''
      frequency: 3
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: ''I have many informations.'' Correct: ''I have a lot of information.'''
    - 'Wrong: ''He gave me good advices.'' Correct: ''He gave me good advice.'''
    - 'Wrong: ''I need some furnitures.'' Correct: ''I need some furniture.'''
    - 'Wrong: ''She has less friends than me.'' Correct: ''She has fewer friends than
      me.'''
    why_it_happens: 'Russian does not distinguish grammatically between countable
      and uncountable nouns. All Russian nouns can be pluralized and used with ''много''
      (many/much) without any change. English has a strict count/mass distinction:
      countable nouns take ''many/fewer/plural'' while uncountable nouns take ''much/less/singular.''
      Russian speakers treat all nouns as countable.'
    teacher_tips:
      how_to_explain: 'Start with: ''In English, some things you can count (one book,
        two books) and some you CANNOT count (one information? No!).'' Use a physical
        demonstration: hold up a book (countable) and pour water (uncountable). Teach
        the pairs: many/much, fewer/less, a few/a little.'
      where_to_start: 'Begin with common uncountable nouns: information, advice, furniture,
        luggage, news, homework, research, work, money, bread.'
      sequencing: 'Week 1: Countable vs. uncountable. Week 2: Many/much, few/little.
        Week 3: ''A piece of'' — making uncountable countable. Week 4: Nouns that
        can be both.'
      exercises:
      - name: Countable or Uncountable Sort
        type: matching
        description: Students sort 30 nouns into countable, uncountable, and both.
        duration: 15
      - name: Much or Many?
        type: fill-in-the-blank
        description: Students choose between 'much' and 'many' in 20 sentences.
        duration: 10
      - name: Uncountable Noun Correction
        type: error-correction
        description: Students find and correct 12 countability errors in a text.
        duration: 20
      - name: Shopping List
        type: composition
        description: Students write a shopping list with 15 items using correct quantifiers.
        duration: 15
