    - Swan & Smith (2001) Learner English
  conditionals_advanced:
    interference_patterns:
    - pattern: Use of would in if-clause
      example_l1: '[ru] example'
      example_gloss: gloss
      example_wrong: If I would have time, I would go.
      example_correct: If I had time, I would go.
      explanation: Russian may use conditional forms in both clauses. English never
        uses 'would' in the if-clause.
      frequency: 4
      persistence: 4
      communicative_impact: 3
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Russian conditional structures may allow conditional forms in
      both clauses. English strictly avoids 'would' in if-clauses.
    teacher_tips:
      how_to_explain: 'Teach: NO WOULD IN IF-CLAUSE. If + past, would + base. If +
        present, will + base.'
      where_to_start: Start with second conditional. Then teach first conditional.
        Then third.
      sequencing: 'Week 1: Second conditional. Week 2: First conditional. Week 3:
        Third conditional. Week 4: Review.'
    flagged: false
    tier: 3
    exercises:
