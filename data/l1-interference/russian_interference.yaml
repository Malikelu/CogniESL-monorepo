  prep_case:
    interference_patterns:
    - pattern: Using wrong preposition due to Russian case government -> Learn English
        preposition patterns
      frequency: 4
      persistence: 4
      communicative_impact: 2
      example_l1: 'Russian: ''ждать автобус'''
      example_gloss: zhdat' avtobus + accusative
      example_wrong: 'literal: ''wait bus(acc.)'
      example_correct: 'wrong: ''wait the bus'' -> correct: ''wait for the bus'
      explanation: 'Transfer from L1: Using wrong preposition due to Russian case
        government -> Learn English preposition patterns.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting preposition where English requires one -> Add preposition
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''Я слушаю музыку'''
      example_gloss: Ya slushayu muzyku
      example_wrong: 'literal: ''I listen music(accusative)'
      example_correct: 'wrong: ''I listen music'' -> correct: ''I listen to music'
      explanation: 'Transfer from L1: Omitting preposition where English requires
        one -> Add preposition.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Adding preposition where English uses direct object -> Drop preposition
      frequency: 3
      persistence: 3
      communicative_impact: 1
      example_l1: 'Russian: ''Я вошёл в комнату'''
      example_gloss: Ya voshyol v komnatu
      example_wrong: 'literal: ''I entered into room'
      example_correct: 'wrong: ''I entered into the room'' -> correct: ''I entered
        the room'
      explanation: 'Transfer from L1: Adding preposition where English uses direct
        object -> Drop preposition.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''I wait the bus.'' Correct: ''I wait for the bus.'''
    - 'Wrong: ''I listen music.'' Correct: ''I listen to music.'''
    - 'Wrong: ''I entered into the room.'' Correct: ''I entered the room.'''
    - 'Wrong: ''She looked the picture.'' Correct: ''She looked at the picture.'''
    why_it_happens: 'In Russian, prepositions are tied to case government — each preposition
      requires a specific case form. English prepositions are tied to verb+preposition
      or adjective+preposition combinations, not case. This creates a mismatch: Russian
      speakers learn which CASE follows each preposition, but English speakers learn
      which PREPOSITION follows each verb.'
    teacher_tips:
      how_to_explain: 'Explain that Russian prepositions control the ENDING of the
        following word (case), while English prepositions are chosen by the VERB.
        Create a list of verb+preposition chunks: ''listen TO,'' ''wait FOR,'' ''look
        AT,'' ''depend ON,'' ''belong TO.'''
      where_to_start: 'Begin with the most common errors: listen to, wait for, look
        at, depend on, belong to. Create a ''preposition wall'' in the classroom.'
      sequencing: 'Week 1: Verb + preposition combinations. Week 2: Adjective + preposition
        combinations. Week 3: Prepositions of place. Week 4: Prepositions of movement.'
      exercises:
      - name: Preposition Pairing
        type: matching
        description: Students match verbs/adjectives with their correct prepositions.
          20 pairs.
        duration: 15
      - name: Preposition Audit
        type: error-correction
        description: Students find and correct 15 preposition errors in a text.
        duration: 20
      - name: Verb + Preposition Chunking
        type: fill-in-the-blank
        description: Students complete 25 sentences and write each verb+preposition
          combination as a 'chunk.'
        duration: 15
      - name: Preposition Translation
        type: translation
        description: Students translate 12 Russian sentences, paying special attention
          to preposition choice.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Murphy, R. (2019). English Grammar in Use (5th ed.). Cambridge University Press.
    - Lindstromberg, S. (2010). English Prepositions Explained (revised ed.). John
      Benjamins.
