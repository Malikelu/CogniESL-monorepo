  possession_u_gen:
    interference_patterns:
    - pattern: Using 'at me' or 'by me' for possession -> Use 'I have'
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''У меня есть книга'''
      example_gloss: U menya yest' kniga
      example_wrong: 'literal: ''At me there-is book'
      example_correct: 'wrong: ''At me there is a book'' -> correct: ''I have a book'
      explanation: 'Transfer from L1: Using ''at me'' or ''by me'' for possession
        -> Use ''I have''.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using 'у + genitive' structure for possession -> Use 'have' or 'have
        got'
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''У неё есть собака'''
      example_gloss: U neyo yest' sobaka
      example_wrong: 'literal: ''At her there-is dog'
      example_correct: 'wrong: ''At her is a dog'' -> correct: ''She has a dog'
      explanation: 'Transfer from L1: Using ''у + genitive'' structure for possession
        -> Use ''have'' or ''have got''.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting 'have' in possessive sentences -> Include 'have'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: 'Russian: ''У меня брат'''
      example_gloss: U menya brat
      example_wrong: 'literal: ''At me brother'
      example_correct: 'wrong: ''Me brother'' -> correct: ''I have a brother'
      explanation: 'Transfer from L1: Omitting ''have'' in possessive sentences ->
        Include ''have''.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''At me there is a book.'' Correct: ''I have a book.'''
    - 'Wrong: ''At her is a dog.'' Correct: ''She has a dog.'''
    - 'Wrong: ''Me brother is tall.'' Correct: ''I have a brother. He is tall.'''
    - 'Wrong: ''At us there are three cats.'' Correct: ''We have three cats.'''
    why_it_happens: Russian expresses possession using 'У + genitive + есть + nominative,'
      literally 'At [person] there is [thing].' This is the standard way to express
      possession. English uses the verb 'have.' Russian speakers transfer this structure
      to English, producing 'At me there is a book.'
    teacher_tips:
      how_to_explain: 'Show the structural difference: Russian says ''AT me there
        IS a book'' while English says ''I HAVE a book.'' Draw two pictures: things
        existing AT a person (Russian) vs. a person holding things (English). Teach
        ''have'' as the English verb for possession.'
      where_to_start: 'Begin with the basic ''I have'' pattern using concrete possessions.
        Hold up objects: ''I have a pen.'' Point to students: ''You have a book.'''
      sequencing: 'Week 1: ''I/you/we/they have.'' Week 2: ''He/she has.'' Week 3:
        Questions and negatives. Week 4: ''Have got.'''
      exercises:
      - name: Possession Translation
        type: translation
        description: Students translate 12 Russian 'У меня есть...' sentences into
          English using 'have.'
        duration: 15
      - name: Classroom Inventory
        type: oral-drill
        description: Students report what they and others have in the classroom.
        duration: 15
      - name: Have vs. Have Got
        type: fill-in-the-blank
        description: Students choose between 'have' and 'have got' in 20 sentences.
        duration: 15
      - name: Family Tree
        type: composition
        description: Students draw a family tree and write 8 sentences using 'have.'
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Murphy, R. (2019). English Grammar in Use (5th ed.). Cambridge University Press.
    - 'Isurin, L. (2005). Collective Remembering: Memory in the World and in the Mind.
      Cambridge University Press.'
