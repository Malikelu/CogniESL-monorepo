  case_system_6:
    interference_patterns:
    - pattern: Omitting object pronouns or using subject pronouns for objects -> Use
        correct object pronouns
      example: 'Russian: ''Я вижу его'' (Ya vizhu yego) -> literal: ''I see him(accusative)''
        -> wrong: ''I see he'' -> correct: ''I see him'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Using wrong preposition due to Russian case government -> Use English
        prepositional patterns
      example: 'Russian: ''думать о'' (dumat'' o + prepositional case) -> literal:
        ''think about'' BUT Russian also uses accusative for ''think of'' contexts
        -> wrong: ''I think about him'' -> correct: ''I think of him'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Word order errors from flexible Russian SOV/SVO -> Use fixed English
        SVO
      example: 'Russian: ''Книгу я прочитал'' (Knigu ya prochital) -> literal: ''Book(accusative)
        I read'' -> wrong: ''The book I read'' (as main clause) -> correct: ''I read
        the book'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I help he.'' Correct: ''I help him.'''
    - 'Wrong: ''Give it to she.'' Correct: ''Give it to her.'''
    - 'Wrong: ''The book I read yesterday.'' (as a main clause) Correct: ''I read
      the book yesterday.'''
    - 'Wrong: ''She told to me.'' Correct: ''She told me.'''
    why_it_happens: Russian has six grammatical cases (nominative, accusative, genitive,
      dative, instrumental, prepositional) that mark the function of nouns and pronouns
      through inflectional endings. English has largely lost its case system — only
      pronouns retain subject/object distinctions (I/me, he/him, she/her), and word
      order (SVO) carries the functional load that Russian case endings carry. Russian
      speakers may use subject pronouns where English requires object pronouns because
      the Russian pronoun form changes with case. Additionally, Russian allows relatively
      free word order because case endings identify grammatical roles, so Russian
      speakers may produce English sentences with non-standard word order.
    teacher_tips:
      how_to_explain: 'Draw a simple diagram showing that Russian uses word ENDINGS
        to show who does what to whom, while English uses WORD ORDER. Write the same
        Russian sentence in multiple word orders (all correct in Russian) and show
        that only one English word order works. For pronouns, create a simple chart:
        I/me, he/him, she/her, we/us, they/them.'
      where_to_start: Start with pronoun errors because they are the most visible
        and easiest to correct. Write 'I see he' on the board and ask if it sounds
        right.
      sequencing: 'Week 1: Subject vs. object pronouns. Week 2: Word order in simple
        sentences (SVO is fixed). Week 3: Preposition + object pronoun. Week 4: Ditransitive
        verbs.'
      exercises:
      - name: Pronoun Police
        type: error-correction
        description: Display 15 sentences with pronoun case errors reflecting Russian
          L1 patterns. Students identify the error and correct it.
        duration: 15
      - name: Word Order Freeze
        type: transformation
        description: Give students 10 Russian sentences with scrambled word order.
          Students must rewrite each in the ONE correct English word order.
        duration: 15
      - name: Case-to-Preposition Mapping
        type: matching
        description: Create cards with Russian case functions and cards with English
          prepositional phrases. Students match Russian case functions to their English
          equivalents.
        duration: 20
      - name: Sentence Builder
        type: oral-drill
        description: Teacher provides a Russian sentence. First student translates
          it literally. Second student 'fixes' it to natural English. Rotate through
          10 sentences.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Comrie, B. (1981). Language Universals and Linguistic Typology. University of
      Chicago Press.
    - Kempe, V. & MacWhinney, B. (1998). The acquisition of case marking by adult
      learners of Russian and German. Studies in Second Language Acquisition, 20(4),
      543-587.
    source_count: 3
    source_type: peer-reviewed
    frequency: 3
    persistence: 2
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Russian
    notes: Fundamental structural challenge. Russian case system carries functional
      load that English distributes across word order and prepositions.
    source_rank: 1
    citations:
