  relative_clauses_ru:
    interference_patterns:
    - pattern: Using 'what' as a relative pronoun -> Use 'that' or 'which/who'
      example: 'Russian: ''Книга, что я читал...'' (Kniga, chto ya chital...) -> literal:
        ''Book, what I read...'' -> wrong: ''The book what I read...'' -> correct:
        ''The book that I read...'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'which' for people -> Use 'who' for people
      example: 'Russian: ''Человек, который...'' (Chelovek, kotoryy...) -> literal:
        ''Person, which...'' -> wrong: ''The person which...'' -> correct: ''The person
        who...'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Omitting relative pronoun where English requires one -> Include relative
        pronoun
      example: 'Russian: ''Книга, я читал...'' (Kniga, ya chital...) -> literal: ''Book,
        I read...'' -> correct: ''The book that I read was good.'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''The book what I read was good.'' Correct: ''The book that I read was
      good.'''
    - 'Wrong: ''The person which called you.'' Correct: ''The person who called you.'''
    - 'Wrong: ''The man which I met yesterday.'' Correct: ''The man who/that I met
      yesterday.'''
    - 'Wrong: ''The city where I was born there.'' Correct: ''The city where I was
      born.'''
    why_it_happens: Russian uses 'который' (kotoryy) for all relative clauses, declining
      for gender, number, and case. In informal Russian, 'что' (what) is often used
      instead, leading to 'the book what I read.' English distinguishes 'who' (people),
      'which' (things), and 'that' (both). Russian speakers may use 'which' for people
      because 'который' covers both.
    teacher_tips:
      how_to_explain: 'Explain that English has different connector words: ''who''
        for people, ''which'' for things, ''that'' for both. Russian ''который'' =
        all three, but English splits them up.'
      where_to_start: 'Begin with the most common error: using ''what'' as a relative
        pronoun. Write ''The book what I read'' on the board.'
      sequencing: 'Week 1: ''That'' as universal relative pronoun. Week 2: ''Who''
        vs. ''which.'' Week 3: Omitting the relative pronoun. Week 4: ''Where,'' ''when,''
        ''whose.'''
      exercises:
      - name: Relative Pronoun Repair
        type: error-correction
        description: Students correct 15 sentences with relative clause errors.
        duration: 15
      - name: Who vs. Which Sort
        type: matching
        description: Students create relative clauses for 20 noun phrases using the
          correct pronoun.
        duration: 15
      - name: Relative Clause Combination
        type: transformation
        description: Students combine 10 pairs of simple sentences using relative
          clauses.
        duration: 20
      - name: Relative Clause Story
        type: composition
        description: Students write a paragraph describing their hometown using at
          least 4 relative clauses.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Yule, G. (1998). Explaining English Grammar. Oxford University Press.
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course (2nd ed.). Heinle & Heinle.'
