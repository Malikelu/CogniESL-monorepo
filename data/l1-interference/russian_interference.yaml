      tier: 2
  gender_agreement:
    interference_patterns:
    - pattern: Using 'he' or 'she' for inanimate objects based on Russian grammatical
        gender -> Use 'it'
      example: 'Russian: ''Стол большой, он стоит...'' (Stol bol''shoy, on stoit...)
        -> literal: ''Table(masc.) big, he stands...'' -> wrong: ''The table is big.
        He stands in the corner.'' -> correct: ''The table is big. It stands in the
        corner.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'she' for feminine nouns like 'car', 'ship', 'country' -> Use
        'it'
      example: 'Russian: ''Машина красивая, она...'' (Mashina krasivaya, ona...) ->
        literal: ''Car(fem.) beautiful, she...'' -> wrong: ''The car is beautiful.
        She is red.'' -> correct: ''The car is beautiful. It is red.'''
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Adjective-noun gender agreement errors -> English adjectives don't
        agree
      example: 'Russian: ''красивая девушка'' (krasivaya devushka, fem. adj. + fem.
        noun) -> literal: ''beautiful(fem.) girl'' -> correct: ''a beautiful girl''
        (adjectives never change in English)'
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''The table is big. He is in the corner.'' Correct: ''The table is big.
      It is in the corner.'''
    - 'Wrong: ''My car is old. She doesn''t start.'' (neutral context) Correct: ''My
      car is old. It doesn''t start.'''
    - 'Wrong: ''The book is interesting. She is on the table.'' Correct: ''The book
      is interesting. It is on the table.'''
    why_it_happens: Russian has three grammatical genders (masculine, feminine, neuter)
      that apply to ALL nouns, including inanimate objects. Every noun has an inherent
      gender that determines the form of adjectives, pronouns, and even past-tense
      verbs. Russian speakers naturally refer to a table as 'он' (he) because 'стол'
      is masculine, and to a car as 'она' (she) because 'машина' is feminine. English
      uses natural gender — 'he' and 'she' are reserved for people, while 'it' is
      used for everything else. Russian adjectives must agree in gender, number, and
      case with the noun they modify, so Russian speakers may expect English adjectives
      to change form.
    teacher_tips:
      how_to_explain: 'Start by listing common Russian nouns and their genders: стол
        (table, masc.), книга (book, fem.), окно (window, neut.). Then show that in
        English, ALL of these are ''it.'' Use the simple rule: ''If it''s not a person
        (or a pet you love), it''s it.'''
      where_to_start: 'Begin with the pronoun error. Hold up objects in class and
        ask students to describe them. When a student says ''He is big'' about a table,
        write it on the board and ask: ''Is the table a he?'''
      sequencing: 'Week 1: Natural vs. grammatical gender — ''it'' for objects. Week
        2: When ''she'' is acceptable for objects. Week 3: Adjective agreement — English
        adjectives never change. Week 4: Past tense verb agreement.'
      exercises:
      - name: 'Pronoun Police: Object Edition'
        type: error-correction
        description: Display 15 short paragraphs where objects are referred to with
          'he' or 'she' based on Russian grammatical gender. Students identify each
          error and replace with 'it.'
        duration: 15
      - name: Gender Translation
        type: translation
        description: Students translate 10 Russian sentences with gendered pronouns
          referring to objects into English.
        duration: 15
      - name: Adjective Invariance Drill
        type: fill-in-the-blank
        description: Students complete 20 sentences by choosing the correct adjective
          form. All options are the same word since English adjectives don't change.
        duration: 10
      - name: Object Description Game
        type: oral-drill
        description: Students describe objects in English using 3 sentences. Class
          calls 'IT!' if a student uses 'he' or 'she' for an object.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Comrie, B., Stone, G., & Polinsky, M. (1996). The Russian Language in the Twentieth
      Century. Oxford University Press.
    - Kagan, O. (2013). A Study of Heritage Russian. In P. Kagan & M. Polinsky (Eds.),
      Heritage Languages in America. Cambridge University Press.
