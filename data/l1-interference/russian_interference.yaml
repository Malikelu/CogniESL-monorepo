  word_order:
    interference_patterns:
    - pattern: Placing time adverbial at the beginning without subject-verb inversion
        -> Use standard SVO
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Вчера я ходил в магазин'''
      example_gloss: Vchera ya khodil v magazin
      example_wrong: 'literal: ''Yesterday I went to store'
      example_correct: 'wrong: ''Yesterday went I to the store'' -> correct: ''Yesterday
        I went to the store'
      explanation: 'Transfer from L1: Placing time adverbial at the beginning without
        subject-verb inversion -> Use standard SVO.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Placing object before subject (OSV) for emphasis -> Use SVO with stress/intonation
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Книгу я уже прочитал'''
      example_gloss: Knigu ya uzhe prochital
      example_wrong: 'literal: ''Book(acc.) I already read'
      example_correct: 'wrong: ''The book I already read'' (as main clause) -> correct:
        ''I already read the book'
      explanation: 'Transfer from L1: Placing object before subject (OSV) for emphasis
        -> Use SVO with stress/intonation.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Placing verb at end of sentence (SOV pattern) -> Use SVO
      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Russian: ''Я книгу читаю'''
      example_gloss: Ya knigu chitayu
      example_wrong: 'literal: ''I book(acc.) read'
      example_correct: 'wrong: ''I the book read'' -> correct: ''I read the book'
      explanation: 'Transfer from L1: Placing verb at end of sentence (SOV pattern)
        -> Use SVO.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: ''Yesterday went I to the store.'' Correct: ''Yesterday I went to the
      store.'''
    - 'Wrong: ''The book I already read.'' (as a main clause) Correct: ''I already
      read the book.'''
    - 'Wrong: ''I the book read.'' Correct: ''I read the book.'''
    - 'Wrong: ''Here comes she.'' Correct: ''Here she comes.'''
    why_it_happens: Russian has relatively free word order because the six-case system
      marks grammatical functions through inflectional endings rather than position.
      A Russian speaker can say 'Я читаю книгу' (I read book), 'Книгу я читаю' (Book
      I read), or 'Читаю я книгу' (Read I book) — all are grammatically correct. English,
      with its minimal case marking, relies on strict SVO word order to distinguish
      subjects from objects. Russian speakers transfer their native flexibility to
      English, producing sentences that sound unnatural or ungrammatical.
    teacher_tips:
      how_to_explain: 'Use a physical demonstration: give three students name tags
        (Subject, Verb, Object) and have them stand in different orders. In Russian,
        they can stand in any order and still be understood. In English, ONLY SVO
        works. Then explain that English uses STRESS and INTONATION for emphasis,
        not word order.'
      where_to_start: 'Start with the most basic rule: English sentences go Subject-Verb-Object,
        always. Use simple, high-frequency sentences and drill this pattern.'
      sequencing: 'Week 1: Basic SVO pattern. Week 2: Adverbials at the beginning.
        Week 3: Question word order. Week 4: Emphasis through stress, not word order.'
      exercises:
      - name: Sentence Scramble
        type: transformation
        description: Students arrange 15 sets of word cards into correct English word
          order.
        duration: 15
      - name: Word Order Translation
        type: translation
