  coordinating_conjunctions:
    interference_patterns:
    - pattern: Overuse of 'and' for all coordinating functions
      example_l1: 因为下雨，所以没去 (yīnwèi xiàyǔ, suǒyǐ méi qù)
      example_gloss: Because rain, so not go
      example_wrong: He is smart but he studies hard.
      example_correct: He is smart AND he studies hard.
      explanation: Mandarin uses paired conjunctions 因为...所以 (yīnwèi...suǒyǐ "because...so")
        together. English uses only one ("Because it rained, I didn't go" — no "so").
        Learners produce "Because...so" by transferring the Mandarin paired conjunction
        pattern.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: But/so/or used interchangeably
      example_l1: 因为下雨，所以没去 (yīnwèi xiàyǔ, suǒyǐ méi qù)
      example_gloss: 'Literal gloss reflecting Mandarin structure: Do you want tea
        and coffee?'
      example_wrong: Do you want tea and coffee?
      example_correct: Do you want tea OR coffee?
      explanation: Mandarin conjunctions (he, dan shi, suo yi, huo zhe) don't map
        cleanly to English coordinating conjunctions. 'He' covers both 'and' and 'but'
        in some contexts.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Conjunctions placed at wrong positions in complex sentences
      example_l1: 因为下雨，所以没去 (yīnwèi xiàyǔ, suǒyǐ méi qù)
      example_gloss: 'Literal gloss reflecting Mandarin structure: He is smart but
        he studies hard.'
      example_wrong: He is smart but he studies hard.
      example_correct: He is smart AND he studies hard.
      explanation: Mandarin conjunctions (he, dan shi, suo yi, huo zhe) don't map
        cleanly to English coordinating conjunctions. 'He' covers both 'and' and 'but'
        in some contexts.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Mandarin conjunctions (he, dan shi, suo yi, huo zhe) don't map
      cleanly to English coordinating conjunctions. 'He' covers both 'and' and 'but'
      in some contexts.
    teacher_tips:
      how_to_explain: AND = addition. BUT = contrast. SO = result. OR = choice. Practice
        with paired sentences.
      where_to_start: Combine simple sentences with each conjunction.
      exercises:
      - name: coordinating conjunctions Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'coordinating conjunctions' structure. Emphasize the structural
          difference between Mandarin and English.
        duration: 15
      - name: coordinating conjunctions Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'coordinating conjunctions'
          errors. Students identify and correct each error.
        duration: 15
      - name: coordinating conjunctions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'coordinating
          conjunctions' structure.
        duration: 10
      - name: coordinating conjunctions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'coordinating
          conjunctions' errors.
        duration: 15
    examples:
