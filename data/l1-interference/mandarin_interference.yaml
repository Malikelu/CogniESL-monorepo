schema_version: '3.0'
language: Mandarin
l1: zh
l2: en
total_grammar_points: 160
grammar_points:
  articles:
    interference_patterns:
    - pattern: Mandarin has no articles; students omit all articles or overuse 'the'
      example_l1: 他是老师 (tā shì lǎoshī)
      example_gloss: He is teacher
      example_wrong: I am teacher.
      example_correct: I am A teacher.
      explanation: 'Mandarin has no articles — nouns appear bare after the copula
        是 (shì). English requires the indefinite article "a/an" before singular countable
        noun predicates. This is a fundamental structural difference: Mandarin nouns
        are bare by default while English requires determiners.'
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Zero article required for general/abstract nouns but students insert
        'the'
      example_l1: 请把书放在桌子上 (qǐng bǎ shū fàng zài zhuōzi shàng)
      example_gloss: Please BA book put on table
      example_wrong: Put it on THE table
      example_correct: Put it on A table.
      explanation: Mandarin allows bare nouns in all positions — 书 (shū "book") and
        桌子 (zhuōzi "table") appear without any determiner. English requires articles
        or other determiners before most nouns. Learners transfer Mandarin's bare-noun
        default, producing sentences without any article.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: '''The'' overgeneralized to mark specificity even when indefinite reference
        intended'
      example_l1: 音乐很美 (yīnyuè hěn měi)
      example_gloss: Music very beautiful
      example_wrong: THE music is beautiful.
      example_correct: Music is beautiful.
      explanation: Mandarin does not use articles with abstract nouns used in a general
        sense — 音乐 (yīnyuè "music") is bare. English requires zero article for generic
        abstract nouns ("Music is beautiful") but learners may overinsert "the" because
        Mandarin uses demonstratives more frequently than English uses "the".
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Mandarin has zero article system. English articles (a/an/the/zero)
      mark definiteness and specificity — a completely alien grammatical category
      for L1 Mandarin speakers.
    teacher_tips:
      how_to_explain: '''The'' = both speaker and listener know which one. ''A/an''
        = one of many, listener doesn''t know which. Zero = general category.'
      where_to_start: Physical object demonstration with realia, then progress to
        abstract/generic uses.
      sequencing: 'Week1: the vs a with objects. Week2: zero article rules. Week3:
        mixed practice.'
      exercises:
      - 'Article gap-fill: Provide 20 sentences with blanks where articles should
        be. Students choose a/an/the/zero. Include concrete objects, abstract nouns,
        and proper nouns to practice all four contexts.'
      - 'Error correction drill: Give 15 sentences written by a hypothetical Mandarin
        speaker (e.g., ''I am teacher'', ''Put it on THE table'', ''THE music is beautiful'').
        Students identify the article error and correct it, explaining the rule violated.'
      - 'Picture description with realia: Place objects on a desk — one pen, one book,
        some water. Students describe using a/an for first mention, the for subsequent
        mention, and zero for uncountables (''There is A pen and A book on the desk.
        THE pen is blue. There is some water.'')'
      - 'Story retelling: Read a short story aloud. Students retell it, focusing on
        correct article use for first mention (a/an) vs. subsequent mention (the).
        Teacher tracks article accuracy on a checklist.'
    examples:
    - 'Wrong: ''I am teacher.'' Correct: ''I am A teacher.'''
    - 'Wrong: ''Put it on THE table'' (when any table). Correct: ''Put it on A table.'''
    - 'Wrong: ''THE music is beautiful.'' Correct: ''Music is beautiful.'''
    frequency: 5
    persistence: 5
    communicative_impact: 4
    source_type: peer-reviewed
    source_count: 4
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference.'
    - Liu, J. & Gleason, J. (2002). Acquiring the English article system by Chinese
      speakers.
    - Robertson, J. S. (2000). Transfer in Chinese English article use.
    - Thomas, J. (1989). Meaning and interaction in the EFL classroom.
    flagged: true
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
    source_rank: 1
    citations:
    - claim: Interference pattern for articles
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Mandarin speakers, pp. 308-322'
      tier: 1
    - claim: 'Grammar point: articles'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Article usage varies significantly across languages; many languages have
        no article system
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See articles entries 133-142
      tier: 2
    - claim: ELLs commonly omit indefinite article when descriptive adjectives come
        between determiner and noun
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
    - claim: Articles do not exist as a grammatical category in Chinese; misuse of
        articles is one of the most difficult areas for Chinese EAL learners (Luk
        & Shirai, 2009, cited in Li & Luk)
      source: 'Li & Luk (2017) ''Chinese-English Contrastive Grammar: An Introduction'',
        Hong Kong University Press'
      location: 'Chapter 6: Determiners: Articles and Demonstratives'
      tier: 1
  a_an_the:
    interference_patterns:
    - pattern: Confusion between 'a' and 'the' in first vs subsequent mention
      example_l1: 我买了一本书 (wǒ mǎi le yī běn shū)
      example_gloss: I bought one CLF book
      example_wrong: I bought car.
      example_correct: I bought A car.
      explanation: Mandarin uses classifiers (本 běn for books) with numerals instead
        of articles. The concept of "a" vs "the" does not map onto Mandarin grammar
        — 一 (yī "one") + classifier serves as indefinite reference, while demonstratives
        (这 zhè "this", 那 nà "that") handle definite reference.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Indefinite article 'a/an' omitted before singular count nouns
      example_l1: 我看到一只猫。那只猫是黑色的。(wǒ kàndào yī zhī māo. nà zhī māo shì hēisè de)
      example_gloss: I saw one CLF cat. That CLF cat is black.
      example_wrong: She is THE doctor.
      example_correct: She is A doctor.
      explanation: Mandarin uses demonstrative + classifier (那只 nà zhī "that CLF")
        for subsequent reference, not a definite article. English uses "a" for first
        mention and "the" for subsequent mention — a distinction that does not exist
        in Mandarin grammar.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Article insertion before proper nouns and uncountable nouns
      example_l1: 他是医生 (tā shì yīshēng)
      example_gloss: He is doctor
      example_wrong: THE dogs are loyal.
      example_correct: Dogs are loyal.
      explanation: Mandarin does not require any determiner before predicate nominatives
        — 医生 (yīshēng "doctor") appears bare after 是 (shì). English requires "a" before
        singular countable noun predicates. This error is extremely common and persistent.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of 'the' for generic reference (e.g., 'THE dogs are loyal'
        for 'Dogs are loyal')
      example_l1: 请关门 (qǐng guān mén)
      example_gloss: Please close door
      example_wrong: I bought car.
      example_correct: I bought A car.
      explanation: Mandarin nouns have no definite/indefinite marking — 门 (mén "door")
        is bare. English requires "the" for specific reference. Learners transfer
        Mandarin's bare-noun default, producing imperative sentences without articles.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Mandarin classifier system (e.g., 一本书 yi ben shu) misanalyzed as equivalent
        to English 'a', leading to article overgeneralization with classifiers but
        omission elsewhere
      example_l1: 那本书很有趣 (nà běn shū hěn yǒuqù)
      example_gloss: That CLF book very interesting
      example_wrong: She is THE doctor.
      example_correct: She is A doctor.
      explanation: Mandarin uses demonstrative + classifier (那本 nà běn "that CLF")
        where English uses "the". While the reference is similar, Mandarin demonstratives
        are used more frequently and in broader contexts than English "the", leading
        to overgeneralization.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    why_it_happens: Mandarin nouns are bare — no determiner system. The a/an/the distinction
      requires understanding of noun countability and specificity. Mandarin uses classifiers
      (本, 张, 个) with numerals but these do not map onto English articles. Definiteness
      is inferred from word order and context rather than grammatical marking.
    teacher_tips:
      how_to_explain: Use 'a' when introducing something new. Use 'the' when referring
        back to something already mentioned. Zero article for general statements about
        whole categories (Dogs are loyal = all dogs).
      where_to_start: 'Story-telling exercise: introduce characters with ''a'', then
        refer back with ''the''.'
      exercises:
      - 'Article decision tree: Give students a flowchart — (1) Is it a general statement
        about a category? → zero article. (2) Is it the first time mentioning something?
        → a/an. (3) Has it been mentioned before or is it unique? → the. Students
        apply the flowchart to 25 sentences covering concrete nouns, abstract nouns,
        proper nouns, and uncountables.'
      - 'Translation contrast: Provide 10 Mandarin sentences with classifiers (e.g.,
        我有一本书) and 10 without (e.g., 他是老师). Students translate to English, explicitly
        deciding on a/an/the/zero for each. Class discusses where Mandarin has no
        article equivalent and where English requires one.'
      - 'Error correction journal: Students write a 150-word paragraph about their
        daily routine. Peer review focuses exclusively on article use. Each student
        must find and correct at least 3 article errors in their partner''s writing,
        citing the specific rule violated (first mention, generic reference, etc.).'
      - 'Generic vs. specific sorting: Prepare 20 sentence strips — half with generic
        meaning (Water is essential), half with specific meaning (The water in this
        bottle is cold). Students sort into two groups and identify the article pattern
        for each. Then rewrite each sentence switching generic↔specific meaning.'
    examples:
    - 'First mention: ''I saw A cat in the garden.'' Subsequent: ''THE cat was black.'''
    - 'Wrong: ''I bought car.'' Correct: ''I bought A car.'''
    - 'Wrong: ''She is THE doctor.'' (general). Correct: ''She is A doctor.'''
    - 'Wrong: ''THE dogs are loyal.'' (generic). Correct: ''Dogs are loyal.'''
    frequency: 5
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 3
    sources:
    - Robertson, J. S. (2000). Transfer in Chinese English article use.
    - Thomas, J. (1989). Meaning and interaction in the EFL classroom.
    - Liu, J. & Gleason, J. (2002). Acquiring the English article system by Chinese
      speakers.
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
    source_rank: 1
    citations:
    - claim: Interference pattern for a an the
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Mandarin speakers, pp. 308-322'
      tier: 1
    - claim: 'Grammar point: a an the'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  copula_be:
    interference_patterns:
    - pattern: Mandarin copula 'shi' is optional; learners omit 'is/am/are' in English
      example_l1: 她很高兴 (tā hěn gāoxìng)
      example_gloss: She very happy
      example_wrong: She happy today.
      example_correct: She IS happy today.
      explanation: Mandarin does not use a copula before adjective predicates — the
        adjective functions directly as the verb (很高兴 hěn gāoxìng = "is very happy").
        English requires "be" before all adjective predicates. This is one of the
        most frequent errors for Mandarin speakers.
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: '''He teacher'' instead of ''He IS a teacher'''
      example_l1: 我是学生 (wǒ shì xuéshēng)
      example_gloss: I am student
      example_wrong: My father doctor.
      example_correct: My father IS a doctor.
      explanation: Mandarin 是 (shì) is used for equative statements but is often omitted
        with adjective predicates. English requires "be" in all predicative constructions.
        The copula 是 is restricted to specific contexts in Mandarin, not a general
        linking verb like English "be".
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Omission increases with speaking speed and informality
      example_l1: 今天很冷 (jīntiān hěn lěng)
      example_gloss: Today very cold
      example_wrong: They from China.
      example_correct: They ARE from China.
      explanation: In Mandarin, 是 (shì) is typically omitted in present-tense predicate
        adjective sentences. English obligatorily requires "be" in all predicative
        constructions. Learners produce "Today very cold" by transferring the Mandarin
        topic-comment structure directly.
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Learners omit 'be' before adjective predicates (e.g., ''She very happy''
        instead of ''She IS very happy'')
      example_l1: 他是老师 (tā shì lǎoshī)
      example_gloss: He is teacher
      example_wrong: He very tall.
      example_correct: He IS very tall.
      explanation: Mandarin 是 (shì) is required for noun-predicate equative sentences,
        so copula omission is less common here. However, learners may still omit "be"
        by analogy with adjective-predicate patterns where 是 is optional.
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Overinsertion of 'be' in progressive contexts (e.g., 'He is go to school'
        instead of 'He is GOING to school')
      example_l1: 这是我的书 (zhè shì wǒ de shū)
      example_gloss: This is my DE book
      example_wrong: She is go to school.
      example_correct: She IS GOING to school.
      explanation: Mandarin 是 (shì) is used for equative/identity statements. English
        "be" covers the same ground but is required in all registers. In casual Mandarin,
        是 can be omitted, which transfers to English as copula omission.
      frequency: 5
      persistence: 5
      communicative_impact: 5
    why_it_happens: 'Mandarin predicate nominals require no copula: ''Ta lao shi''
      (He is old) or ''Ta shi lao shi'' (He is a teacher). English requires ''be''
      before adjective and noun complements. Mandarin also lacks a progressive aspect
      marked by ''be + -ing'', leading to both omission and overinsertion patterns.'
    teacher_tips:
      how_to_explain: In English, you MUST say 'He IS smart.' The word 'is' connects
        the subject to the description. Every English sentence needs a verb — if there
        is no other verb, 'be' is required.
      where_to_start: 'Drill: Subject + IS/AM/ARE + every sentence. Accept no sentence
        without a verb.'
      sequencing: 'Week 1: Identify missing copula in written sentences. Week 2: Oral
        drills with picture description (forced copula use). Week 3: Error correction
        of own writing. Week 4: Spontaneous speech with copula checklist.'
      exercises:
      - 'Copula insertion drill: Provide 20 Mandarin-style sentences without copula
        (e.g., ''She happy'', ''They students'', ''The weather cold today''). Students
        insert the correct form of ''be'' (am/is/are/was/were) and identify the subject-complement
        relationship. Include present and past tense contexts.'
      - 'Picture description with forced copula: Show 10 images (people, places, weather,
        emotions). Students must describe each using at least one copula sentence.
        Peer checks that every sentence contains a verb. Example: ''The woman IS a
        doctor. She IS tired. The office IS small.'''
      - 'Error correction journal: Students write a 150-word paragraph about their
        family or daily routine. Peer review focuses exclusively on copula use — both
        omissions and overinsertions. Each student must find and correct at least
        3 copula errors in their partner''s writing, citing the specific rule violated.'
      - 'Sentence transformation: Give 10 affirmative sentences with copula (e.g.,
        ''She IS a teacher''). Students transform into negative (''She ISN''T a teacher'')
        and question forms (''IS she a teacher?''). Then give 10 copula-less sentences
        and students add the copula before transforming. This reinforces that the
        copula is the auxiliary for negation and questions.'
      - 'Listening gap-fill: Play an audio recording of a short monologue (60 seconds)
        that includes 8 copula sentences. Students fill in the missing ''be'' forms.
        Then students record their own 30-second monologue about a topic, and self-check
        for copula accuracy using a checklist.'
    examples:
    - 'Wrong: ''She happy today.'' Correct: ''She IS happy today.'''
    - 'Wrong: ''My father doctor.'' Correct: ''My father IS a doctor.'''
    - 'Wrong: ''They from China.'' Correct: ''They ARE from China.'''
    - 'Wrong: ''He very tall.'' Correct: ''He IS very tall.'''
    - 'Wrong: ''She is go to school.'' Correct: ''She IS GOING to school.'''
    frequency: 5
    persistence: 5
    communicative_impact: 5
    source_type: peer-reviewed
    source_count: 3
    sources:
    - 'Li, C. & Thompson, S. (1981). Mandarin Chinese: A Functional Reference Grammar.'
    - Yang, L. (2002). Chinese learners' acquisition of English copula.
    - Jiang, N. (2000). Lexical representation and development in a second language.
