  will_vs_going_to:
    interference_patterns:
    - pattern: Exclusive use of 'will' for all future references
      example_l1: 明天会下雨 (míngtiān huì xiàyǔ)
      example_gloss: Tomorrow will rain
      example_wrong: I will buy a car next month.
      example_correct: I AM GOING TO buy a car next month.
      explanation: Mandarin 会 (huì) expresses prediction, similar to English "will".
        However, "be going to" for evidence-based predictions has no Mandarin equivalent.
        Learners overuse "will" for all predictions.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Failure to distinguish prediction from intention
      example_l1: 看那些云，要下雨了 (kàn nàxiē yún, yào xiàyǔ le)
      example_gloss: Look those clouds, will rain PERF
      example_wrong: Look at those clouds! It is will rain.
      example_correct: It IS GOING TO rain.
      explanation: Mandarin 要...了 (yào...le) expresses imminent events based on evidence.
        English "be going to" is the equivalent. Learners use "It will rain" instead
        of "It is going to rain" because 要 maps to "will".
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: '''Be going to'' structure avoided entirely'
      example_l1: 明天会下雨 (míngtiān huì xiàyǔ)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I will buy a car
        next month.'
      example_wrong: I will buy a car next month.
      example_correct: I AM GOING TO buy a car next month.
      explanation: Mandarin does not grammatically distinguish between predictions
        and intentions. English requires 'will' for spontaneous/prediction and 'be
        going to' for prior plans.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Mandarin does not grammatically distinguish between predictions
      and intentions. English requires 'will' for spontaneous/prediction and 'be going
      to' for prior plans.
    teacher_tips:
      how_to_explain: Both express future, but 'going to' = already decided. 'Will'
        = decided now or predicted. Practice contextual clues.
      where_to_start: 'Decision scenarios: ''What will you do?'' (now) vs ''What are
        you going to do?'' (already planned).'
      exercises:
      - name: will vs going to Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'will vs going to' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: will vs going to Error Correction
        type: error-correction
