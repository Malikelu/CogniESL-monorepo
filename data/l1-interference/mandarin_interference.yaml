        late, but we kept working.'
      example_wrong: Because it was late, but we kept working.
      example_correct: BECAUSE it was late, we kept working.
      explanation: Mandarin subordinators (suiran, yinwei, ru guo) correspond loosely
        to English ones. 'Suiran' (although) and 'yinwei' (because) can be confused.
