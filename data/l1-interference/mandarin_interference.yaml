  unless:
    interference_patterns:
    - '''Unless'' avoided; ''if...not'' used exclusively'
    - 'Confusion: ''unless'' = ''if not'' but not ''until'''
    - '''Unless'' used where ''until'' is needed'
    why_it_happens: Mandarin uses 'ruguo bu' (if not) for unless. English has 'unless'
      as a single negative conditional conjunction.
    teacher_tips:
      how_to_explain: '''UNLESS'' = if not. ''I won''t go UNLESS you come.'' = ''If
        you DON''T come, I won''t go.'' NOT ''until.'''
      where_to_start: Translate 'ruguo bu' as 'unless'.
      exercises:
      - name: unless Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'unless' structure. Emphasize the structural difference between
          Mandarin and English.
        duration: 15
      - name: unless Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'unless' errors. Students
          identify and correct each error.
        duration: 15
      - name: unless Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'unless'
          structure.
        duration: 10
      - name: unless Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'unless' errors.
        duration: 15
    examples:
    - '''I won''t go UNLESS you come with me.'''
    - 'Wrong: ''I''ll wait until you come unless.'' (confused). Correct: ''I''ll wait
      UNTIL you come. / I won''t leave UNLESS you come.'''
