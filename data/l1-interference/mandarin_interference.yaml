  conditionals_overview:
    interference_patterns:
    - Mandarin 'ruguo' used for all conditional types
    - Failure to change tense in if-clause
    - 'Using ''will'' in if-clause: ''If I will go...'''
    why_it_happens: Mandarin uses 'ruguo' (if) for all conditional types without tense
      changes. English requires different tenses in if-clauses for different conditional
      types.
    teacher_tips:
      how_to_explain: 'Type 1: If + present, will + base. Type 2: If + past, would
        + base. Type 3: If + past perfect, would have + past participle.'
      where_to_start: Start with Type 1 (real/future). Use timeline diagrams.
      exercises:
      - name: conditionals overview Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'conditionals overview' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: conditionals overview Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'conditionals overview'
          errors. Students identify and correct each error.
        duration: 15
      - name: conditionals overview Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'conditionals
          overview' structure.
        duration: 10
      - name: conditionals overview Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'conditionals
          overview' errors.
        duration: 15
    examples:
    - 'Wrong: ''If I will have money, I buy a car.'' Correct: ''If I HAVE money, I
      WILL buy a car.'''
    - 'Wrong: ''If she knew, she would tell him.'' (Type 2 — OK for unreal present)'
    - '''If it rains, I''ll stay home.'' (correct Type 1)'
    frequency: 4
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 1
    sources:
