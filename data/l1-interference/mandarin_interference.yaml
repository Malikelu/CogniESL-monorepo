        time, I would travel.'
      example_wrong: If I would have time, I would travel.
      example_correct: If I HAD time, I would travel.
      explanation: Mandarin has no subjunctive mood. Learners transfer indicative
        forms to unreal conditional contexts.
      frequency: 3
      persistence: 4
