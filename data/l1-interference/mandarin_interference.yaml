      example_gloss: 'Literal gloss reflecting Mandarin structure: If you will call
        me, I'
      example_wrong: If you will call me, I
      example_correct: If you CALL me, I
      explanation: Learners confuse Type 1 and Type 2 conditionals. Type 1 uses present
        tense in if-clause, not future.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Learners confuse Type 1 and Type 2 conditionals. Type 1 uses present
      tense in if-clause, not future.
    teacher_tips:
      how_to_explain: 'REAL condition (Type 1): If-clause = present tense. Result
