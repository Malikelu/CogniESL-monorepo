  shall:
    interference_patterns:
    - '''Shall'' avoided or considered archaic'
    - Confusion about when to use 'shall' vs 'will'
    - British vs. American usage differences missed
    why_it_happens: Mandarin has no equivalent to 'shall.' American English nearly
      abandoned it; British English still uses it for offers/suggestions with I/we.
    teacher_tips:
      how_to_explain: 'SHALL is mainly British: ''SHALL I open the window?'' (offer).
        In American English, use ''should'' or ''will.'' ''SHALL'' for legal requirements:
        ''The tenant SHALL vacate.'''
      where_to_start: Learn British usage patterns for shall.
      exercises:
      - name: shall Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'shall' structure. Emphasize the structural difference between
          Mandarin and English.
        duration: 15
      - name: shall Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'shall' errors. Students
          identify and correct each error.
        duration: 15
      - name: shall Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'shall'
          structure.
        duration: 10
      - name: shall Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'shall' errors.
        duration: 15
    examples:
    - '''SHALL I help you with that?'' (British, offer)'
    - '''According to the contract, Party A SHALL provide services by December 31.''
      (legal)'
    - 'Wrong: ''I shall go to school tomorrow.'' (American, sounds formal/archaic).
      Better: ''I will go to school tomorrow.'''
