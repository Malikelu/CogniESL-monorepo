  reflexive_pronouns:
    interference_patterns:
    - pattern: Reflexive pronouns omitted or misused
      example_l1: 他伤了自己 (tā shāng le zìjǐ)
      example_gloss: He hurt PERF self
      example_wrong: I cut me.
      example_correct: I cut MYSELF.
      explanation: Mandarin 自己 (zìjǐ "self") is used less frequently than English
        reflexives and can refer to the subject of a higher clause. English requires
        reflexive pronouns when subject and object are the same. Learners may produce
        "He hurt him" because 自己 is not always obligatory.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: '''He hurt him'' instead of ''He hurt HIMSELF'''
      example_l1: 他伤了自己 (tā shāng le zìjǐ)
      example_gloss: 'Literal gloss reflecting Mandarin structure: The cat washed
        it.'
      example_wrong: The cat washed it.
      example_correct: The cat washed ITSELF.
      explanation: Mandarin uses 'ziji' (self) but doesn't require reflexivity matching.
        English requires reflexives when subject and object are the same entity.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: '''Ziji'' (自己) used where English doesn''t require reflexive'
      example_l1: 他伤了自己 (tā shāng le zìjǐ)
      example_gloss: 'Literal gloss reflecting Mandarin structure: They saw them at
        the mall.'
      example_wrong: They saw them at the mall.
      example_correct: They saw THEMSELVES in the mirror.
      explanation: Mandarin uses 'ziji' (self) but doesn't require reflexivity matching.
        English requires reflexives when subject and object are the same entity.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Mandarin uses 'ziji' (self) but doesn't require reflexivity matching.
      English requires reflexives when subject and object are the same entity.
