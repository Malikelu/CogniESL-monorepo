  it_extraposition:
    interference_patterns:
    - pattern: Extraposed subject structures not used
      example_l1: 下雨了 (xiàyǔ le)
      example_gloss: Rain PERF
      example_wrong: That you passed the exam surprises me.
      example_correct: IT SURPRISES me THAT you passed.
      explanation: Mandarin does not use expletive subjects — 下雨了 (xiàyǔ le "rain
        PERF") has no subject. English requires "It is raining" with expletive "it".
        Learners produce "Rains" or "Is raining" because Mandarin does not use dummy
        subjects.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    - pattern: '''That he came is obvious'' instead of ''It is obvious that he came'''
      example_l1: 下雨了 (xiàyǔ le)
      example_gloss: 'Literal gloss reflecting Mandarin structure: That you passed
        the exam surprises me.'
      example_wrong: That you passed the exam surprises me.
      example_correct: IT SURPRISES me THAT you passed.
      explanation: Mandarin allows heavy subjects in initial position. English prefers
        'it' as a dummy subject with extraposed clauses.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    - pattern: Heavy subjects preferred over extraposition
      example_l1: 下雨了 (xiàyǔ le)
      example_gloss: 'Literal gloss reflecting Mandarin structure: That you passed
        the exam surprises me.'
      example_wrong: That you passed the exam surprises me.
      example_correct: IT SURPRISES me THAT you passed.
      explanation: Mandarin allows heavy subjects in initial position. English prefers
        'it' as a dummy subject with extraposed clauses.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    why_it_happens: Mandarin allows heavy subjects in initial position. English prefers
      'it' as a dummy subject with extraposed clauses.
    teacher_tips:
      how_to_explain: 'Use IT as placeholder: ''IT is obvious THAT he came.'' Not
