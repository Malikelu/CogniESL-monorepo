schema_version: '3.0'
language: Mandarin
l1: zh
l2: en
total_grammar_points: 160
grammar_points:
  articles:
    interference_patterns:
    - Mandarin has no articles; students omit all articles or overuse 'the'
    - Zero article required for general/abstract nouns but students insert 'the'
    - '''The'' overgeneralized to mark specificity even when indefinite reference
      intended'
    why_it_happens: Mandarin has zero article system. English articles (a/an/the/zero)
      mark definiteness and specificity — a completely alien grammatical category
      for L1 Mandarin speakers.
    teacher_tips:
      how_to_explain: '''The'' = both speaker and listener know which one. ''A/an''
        = one of many, listener doesn''t know which. Zero = general category.'
      where_to_start: Physical object demonstration with realia, then progress to
        abstract/generic uses.
      sequencing: 'Week1: the vs a with objects. Week2: zero article rules. Week3:
        mixed practice.'
      exercises:
      - 'Article gap-fill: Provide 20 sentences with blanks where articles should
        be. Students choose a/an/the/zero. Include concrete objects, abstract nouns,
        and proper nouns to practice all four contexts.'
      - 'Error correction drill: Give 15 sentences written by a hypothetical Mandarin
        speaker (e.g., ''I am teacher'', ''Put it on THE table'', ''THE music is beautiful'').
        Students identify the article error and correct it, explaining the rule violated.'
      - 'Picture description with realia: Place objects on a desk — one pen, one book,
        some water. Students describe using a/an for first mention, the for subsequent
        mention, and zero for uncountables (''There is A pen and A book on the desk.
        THE pen is blue. There is some water.'')'
      - 'Story retelling: Read a short story aloud. Students retell it, focusing on
        correct article use for first mention (a/an) vs. subsequent mention (the).
        Teacher tracks article accuracy on a checklist.'
    examples:
    - 'Wrong: ''I am teacher.'' Correct: ''I am A teacher.'''
    - 'Wrong: ''Put it on THE table'' (when any table). Correct: ''Put it on A table.'''
    - 'Wrong: ''THE music is beautiful.'' Correct: ''Music is beautiful.'''
    frequency: 5
    persistence: 5
    communicative_impact: 4
    source_type: peer-reviewed
    source_count: 4
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference.'
    - Liu, J. & Gleason, J. (2002). Acquiring the English article system by Chinese
      speakers.
    - Robertson, J. S. (2000). Transfer in Chinese English article use.
    - Thomas, J. (1989). Meaning and interaction in the EFL classroom.
