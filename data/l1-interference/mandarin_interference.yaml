  countable_uncountable:
    interference_patterns:
    - pattern: Confusion between countable and uncountable nouns
      example_l1: 三条新闻 (sān tiáo xīnwén)
      example_gloss: three CLF news
      example_wrong: I have many homeworks.
      example_correct: I have a lot of HOMEWORK.
      explanation: Mandarin uses classifiers with all nouns, making everything "countable"
        in a sense. English treats some nouns as uncountable (news, information, advice).
        Learners produce "three news" because Mandarin 新闻 (xīnwén) takes a classifier
        and is therefore countable.
      frequency: 3
      persistence: 4
      communicative_impact: 3
    - pattern: Using 'many/much' incorrectly
      example_l1: 三条新闻 (sān tiáo xīnwén)
      example_gloss: 'Literal gloss reflecting Mandarin structure: How many furnitures?'
      example_wrong: How many furnitures?
      example_correct: How MUCH furniture?
      explanation: Mandarin nouns are not marked as countable or uncountable. The
        distinction between 'many' (countable) and 'much' (uncountable) is unfamiliar.
      frequency: 3
      persistence: 4
      communicative_impact: 3
