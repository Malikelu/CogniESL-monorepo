  verb_tense_past:
    interference_patterns:
    - Past tense marker -ed omitted on regular verbs
    - Irregular past forms consistently replaced with base form
    - Past tense confused with present perfect
    why_it_happens: Mandarin does not mark tense on verbs. Time is indicated by context
      or time words, not verb morphology.
    teacher_tips:
      how_to_explain: 'Past = already finished. Add -ed to regular verbs. Memorize
        irregular forms: go→went, see→saw, eat→ate.'
      where_to_start: 'Timeline exercises: place events in past/present/future.'
      exercises:
      - name: verb tense past Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'verb tense past' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: verb tense past Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'verb tense past' errors.
          Students identify and correct each error.
        duration: 15
      - name: verb tense past Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'verb
          tense past' structure.
        duration: 10
      - name: verb tense past Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'verb tense past'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I walk to school yesterday.'' Correct: ''I WALKED to school yesterday.'''
    - 'Wrong: ''She see the movie.'' Correct: ''She SAW the movie.'''
    - 'Wrong: ''He don''t went.'' Correct: ''He DIDN''T go.'''
    frequency: 5
    persistence: 5
