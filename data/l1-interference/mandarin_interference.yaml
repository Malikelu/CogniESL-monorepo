  countable_uncountable:
    interference_patterns:
    - Confusion between countable and uncountable nouns
    - Using 'many/much' incorrectly
    - Adding plural -s to uncountable nouns
    why_it_happens: Mandarin nouns are not marked as countable or uncountable. The
      distinction between 'many' (countable) and 'much' (uncountable) is unfamiliar.
    teacher_tips:
      how_to_explain: 'Countable = you can count: many apples. Uncountable = you can''t
        count: much water. Key uncountables: information, advice, furniture, luggage.'
      where_to_start: Sort nouns into countable/uncountable lists.
      exercises:
      - name: countable uncountable Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'countable uncountable' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: countable uncountable Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'countable uncountable'
          errors. Students identify and correct each error.
        duration: 15
