  stative_verbs:
    interference_patterns:
    - 'Stative verbs used in progressive form: ''I am knowing'''
    - Love, want, need used in -ing form
    - Confusion about which verbs can be progressive
    why_it_happens: Mandarin verbs don't change form for progressive aspect, so learners
      apply -ing to all verbs. English stative verbs (know, love, want, believe) resist
      progressive forms.
