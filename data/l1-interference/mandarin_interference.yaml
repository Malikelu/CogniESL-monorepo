      how_to_explain: Shift pronouns (I→he), time (today→that day), place (here→there),
        and tense back one step.
      where_to_start: Practice with 'He said (that)...' + shifted information.
      exercises:
      - name: reported statements Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
