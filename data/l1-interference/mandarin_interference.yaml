      English requires 'most' (superlative) vs. 'more' (comparative) with correct
      usage.
    teacher_tips:
      how_to_explain: MORE + adjective (comparative). MOST + adjective (superlative).
        'MOST' already means the maximum — never 'more most.'
      where_to_start: Practice two-item vs. three-item comparisons.
      exercises:
      - name: quantifiers advanced Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'quantifiers advanced' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: quantifiers advanced Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'quantifiers advanced'
          errors. Students identify and correct each error.
        duration: 15
      - name: quantifiers advanced Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'quantifiers
          advanced' structure.
        duration: 10
      - name: quantifiers advanced Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'quantifiers
          advanced' errors.
        duration: 15
    examples:
    - 'Wrong: ''She is the more beautiful.'' Correct: ''She is THE MOST beautiful.''
      (among 3+)'
    - 'Wrong: ''This is more better.'' Correct: ''This is BETTER.'' (2-items) or ''This
      is THE BEST.'' (3+ items)'
    - '''Of ALL the students, she studied THE hardest.'''
