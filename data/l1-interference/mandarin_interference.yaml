    - pattern: Confusion between 'many' and 'much'
      example_l1: 很多人 (hěn duō rén)
      example_gloss: very many people
      example_wrong: How many water do you need?
      example_correct: How MUCH water do you need?
      explanation: Mandarin uses 多 (duō "many/much") for both countable and uncountable
        nouns. English distinguishes "many" (countable) from "much" (uncountable).
        Learners produce "much people" or "many information" because 多 covers both.
