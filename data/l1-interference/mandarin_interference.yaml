  passive_voice:
    interference_patterns:
    - pattern: Passive voice avoided; active voice preferred
      example_l1: 书被他拿走了 (shū bèi tā názǒu le)
      example_gloss: Book BEI him take-away PERF
      example_wrong: The cake made by my mother.
      example_correct: The cake WAS MADE by my mother.
      explanation: Mandarin uses the 被 (bèi) passive construction, which is used less
        frequently than English passive and often carries a negative connotation ("adversative
        passive"). English passive is neutral and very common. Learners underuse passive
        voice because Mandarin 被 is restricted to specific contexts.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: 'Omission of ''be'' in passive: ''The book written by me'''
      example_l1: 书被他拿走了 (shū bèi tā názǒu le)
      example_gloss: 'Literal gloss reflecting Mandarin structure: The letter was
        sended.'
      example_wrong: The letter was sended.
      example_correct: The letter was SENT.
      explanation: 'Mandarin uses topic-comment structure to express passive meaning
        without passive morphology: ''Na ben shu shi ta xie de'' (That book is he
        write). English requires be + past participle.'
