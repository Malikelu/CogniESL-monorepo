    why_it_happens: Mandarin conjunctions (yinwei, suiran, ranguo) map loosely to
      English but/because/although/if. Learners select wrong ones.
    teacher_tips:
      how_to_explain: BECAUSE = cause reason. ALTHOUGH = concession. IF = condition.
        WHEN = time placement. BUT (coordinating) = contrast between equal clauses.
      where_to_start: Practice with contrasting sentence pairs.
      exercises:
      - name: conjunctions subordinating Contrastive Drill
