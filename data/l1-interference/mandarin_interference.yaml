    interference_patterns:
    - Adverbs of manner placed before verbs instead of after
    - '''He quickly ate'' instead of ''He ate quickly'''
    - Position confusion when multiple adverbials present
    why_it_happens: Mandarin places manner adverbs pre-verbally (Kuai su de chi).
