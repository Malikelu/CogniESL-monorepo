  reported_questions:
    interference_patterns:
    - pattern: 'Reported questions retain question word order: ''He asked where does
        she live'''
      example_l1: 他问我喜不喜欢 (tā wèn wǒ xǐ bu xǐhuān)
      example_gloss: He ask me like not like
      example_wrong: She asked where is the station.
      example_correct: She asked WHERE the station WAS.
      explanation: Mandarin embeds questions without inversion or DO-support, using
        the A-not-A pattern (喜不喜欢 xǐ bu xǐhuān "like not like"). English requires
        "asked me if I liked" with DO-support and tense backshifting. Learners produce
        "He asked me like or not like".
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Failure to use 'if/whether' for yes/no questions in indirect form
      example_l1: 他问我喜不喜欢 (tā wèn wǒ xǐ bu xǐhuān)
      example_gloss: 'Literal gloss reflecting Mandarin structure: He asked me do
        you like coffee?'
      example_wrong: He asked me do you like coffee?
      example_correct: He asked me IF/WHETHER I liked coffee.
      explanation: Mandarin reported questions often maintain direct speech structure.
        English requires statement word order and conjunction changes.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Missing backshift in reported questions
      example_l1: 他问我喜不喜欢 (tā wèn wǒ xǐ bu xǐhuān)
      example_gloss: 'Literal gloss reflecting Mandarin structure: She asked where
        is the station.'
      example_wrong: She asked where is the station.
      example_correct: She asked WHERE the station WAS.
      explanation: Mandarin reported questions often maintain direct speech structure.
        English requires statement word order and conjunction changes.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    why_it_happens: Mandarin reported questions often maintain direct speech structure.
      English requires statement word order and conjunction changes.
    teacher_tips:
      how_to_explain: 'Indirect questions = statement order. ''Where DOES she live?''
        → ''He asked WHERE she LIVED.'' Yes/no: ''if/whether''.'
      where_to_start: Convert direct questions to indirect.
      exercises:
      - name: reported questions Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'reported questions' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: reported questions Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'reported questions'
          errors. Students identify and correct each error.
        duration: 15
      - name: reported questions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'reported
          questions' structure.
        duration: 10
      - name: reported questions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'reported questions'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''She asked where is the station.'' Correct: ''She asked WHERE the station
      WAS.'''
    - 'Wrong: ''He asked me do you like coffee?'' Correct: ''He asked me IF/WHETHER
      I liked coffee.'''
    - '''Can you help me?'' → She asked if I COULD help her.'
