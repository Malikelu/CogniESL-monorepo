  topic_comment_transfer:
    interference_patterns:
    - Existential sentences structured as topic-comment
    - '''There is'' avoided in favor of topic-comment: ''The weather, it is nice'''
    - Left-dislocation transferred from Mandarin
    why_it_happens: Mandarin allows topic-comment structures freely. English restricts
      them; existential 'there' constructions are preferred for introducing new entities.
    teacher_tips:
      how_to_explain: 'Use ''THERE IS/ARE'' to introduce new topics. Use topic-comment
        only for contrast or emphasis: ''As for math, I like it.'''
      where_to_start: Practice existential sentences without fronted topics.
      exercises:
      - name: topic comment transfer Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'topic comment transfer' structure. Emphasize the structural
          difference between Mandarin and English.
        duration: 15
      - name: topic comment transfer Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'topic comment transfer'
          errors. Students identify and correct each error.
        duration: 15
      - name: topic comment transfer Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'topic
          comment transfer' structure.
        duration: 10
      - name: topic comment transfer Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'topic comment
          transfer' errors.
        duration: 15
    examples:
