  periphrastic_do:
    interference_patterns:
    - 'Emphatic ''do'' not used: ''I like it'' instead of ''I DO like it'''
    - 'Negative ''don''t'' overgeneralized to questions: ''Don''t you like?'''
    - Auxiliary 'do' confused with main verb 'do'
    why_it_happens: Mandarin has no emphatic auxiliary. 'Ai' or stress patterns emphasize,
      but no structural equivalent to English emphatic 'do'.
    teacher_tips:
      how_to_explain: DO = emphasis or question formation. 'I DO like it' (emphasis).
        'DO you like it?' (question). 'WHAT do you DO?' (different uses!).
      where_to_start: Practice emphatic 'do' in contradiction contexts.
      exercises:
      - name: periphrastic do Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'periphrastic do' structure. Emphasize the structural difference
          between Mandarin and English.
