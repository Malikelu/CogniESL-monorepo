  modals:
    interference_patterns:
    - pattern: Overuse of 'will' for future, ignoring other modal nuances
      example_l1: 你能帮我吗？(nǐ néng bāng wǒ ma?)
      example_gloss: You can help me Q
      example_wrong: You must see the doctor.
      example_correct: You SHOULD see the doctor.
      explanation: Mandarin 能 (néng "can") expresses ability, similar to English "can".
        However, 能 also covers permission in some contexts where English uses "may".
        The overlap is partial, leading to overuse of "can" for permission.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Confusion between 'should' (advice) and 'must' (obligation)
      example_l1: 我会说英语 (wǒ huì shuō yīngyǔ)
      example_gloss: I will speak English
      example_wrong: It will rain tomorrow.
      example_correct: It MIGHT rain tomorrow.
      explanation: Mandarin 会 (huì) expresses both future tense and ability ("know
        how to"). English distinguishes "will" (future) from "can" (ability). Learners
        may use "will" for ability ("I will speak English" = "I can speak English")
        because 会 covers both meanings.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Failure to use modals for politeness or hedging
      example_l1: 你必须完成作业 (nǐ bìxū wánchéng zuòyè)
      example_gloss: You must complete homework
      example_wrong: You must see the doctor.
      example_correct: You SHOULD see the doctor.
      explanation: Mandarin 必须 (bìxū "must") is stronger than English "must" in some
        contexts and covers areas where English uses "have to". Learners may overuse
        "must" in situations where "have to" or "should" would be more appropriate.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Mandarin expresses modality through particles, adverbs, or context
      rather than dedicated modal verbs. The nuanced English modal system is unfamiliar.
    teacher_tips:
      how_to_explain: Modals convey attitude not just meaning. MUST=strong obligation,
        SHOULD=advice, MIGHT=low probability. Practice in context.
      where_to_start: 'Scenarios: giving advice (should), making requests (could),
        expressing certainty (must).'
      exercises:
      - name: modals Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'modals' structure. Emphasize the structural difference between
          Mandarin and English.
        duration: 15
      - name: modals Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'modals' errors. Students
          identify and correct each error.
        duration: 15
      - name: modals Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'modals'
          structure.
        duration: 10
      - name: modals Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'modals' errors.
        duration: 15
    examples:
    - 'Wrong: ''You must see the doctor.'' (when giving advice). Correct: ''You SHOULD
      see the doctor.'''
    - 'Wrong: ''It will rain tomorrow.'' (speculation). Correct: ''It MIGHT rain tomorrow.'''
    - 'Wrong: ''Could you give me some water?'' → learner: ''Give me some water.'''
