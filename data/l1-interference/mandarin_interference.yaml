          errors. Students identify and correct each error.
        duration: 15
      - name: aspect perfect confusion Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'aspect
          perfect confusion' structure.
        duration: 10
      - name: aspect perfect confusion Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'aspect perfect
          confusion' errors.
        duration: 15
    examples:
