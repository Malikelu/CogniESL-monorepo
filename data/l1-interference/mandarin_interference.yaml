  gerunds_infinitives:
    interference_patterns:
    - No pattern for choosing between gerund and infinitive
    - Both 'enjoy to do' and 'enjoy doing' produced randomly
    - Verbs that require gerund confused with those requiring infinitive
    why_it_happens: After verbs, English uses either -ing (gerund) or to-infinitive.
      Mandarin uses the same verb complement structure for both. Some verbs require
      one, some the other, some both with different meanings.
    teacher_tips:
      how_to_explain: ENJOY + -ing (NOT to). WANT + to-infinitive (NOT -ing). STOP
        + -ing = quit. STOP + to = pause to do. Create verb lists.
      where_to_start: Learn the 20 most common verb patterns.
      exercises:
      - name: gerunds infinitives Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'gerunds infinitives' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: gerunds infinitives Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'gerunds infinitives'
          errors. Students identify and correct each error.
