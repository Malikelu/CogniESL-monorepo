        than you.'
      example_wrong: I have fewer money than you.
      example_correct: I have LESS money than you.
      explanation: Mandarin uses 'de shao' for both 'few' and 'little,' making the
        countable/uncountable quantifier distinction unfamiliar.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Incorrect quantifier selection
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: How many sugar
        do you want?'
      example_wrong: How many sugar do you want?
      example_correct: How MUCH sugar do you want?
      explanation: Mandarin uses 'de shao' for both 'few' and 'little,' making the
        countable/uncountable quantifier distinction unfamiliar.
      frequency: 3
      persistence: 3
      communicative_impact: 2
