  aspect_perfect_confusion:
    interference_patterns:
    - pattern: Perfect aspect not distinguished from simple past
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I have seen that
        movie last week.'
      example_wrong: I have seen that movie last week.
      example_correct: I SAW that movie last week.
      explanation: Mandarin aspect markers 'le' and 'guo' don't map neatly to English
        present perfect vs. simple past. 'Le' indicates completion but not necessarily
        present relevance.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use 'have + V3' only in fixed expressions ('I have eaten'), not productively
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I have bought a
        new phone two days ago.'
      example_wrong: I have bought a new phone two days ago.
      example_correct: I BOUGHT a new phone two days ago.
      explanation: Mandarin aspect markers 'le' and 'guo' don't map neatly to English
        present perfect vs. simple past. 'Le' indicates completion but not necessarily
        present relevance.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Aspectual distinction between completed vs. ongoing past lost
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I have seen that
        movie last week.'
      example_wrong: I have seen that movie last week.
      example_correct: I SAW that movie last week.
      explanation: Mandarin aspect markers 'le' and 'guo' don't map neatly to English
        present perfect vs. simple past. 'Le' indicates completion but not necessarily
        present relevance.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Mandarin aspect markers 'le' and 'guo' don't map neatly to English
      present perfect vs. simple past. 'Le' indicates completion but not necessarily
      present relevance.
    teacher_tips:
      how_to_explain: PRESENT PERFECT = past + present relevance ('I have lived here
        for 5 years'). SIMPLE PAST = completed event ('I lived there in 2010').
      where_to_start: 'Contrast pairs: ''I ate'' vs ''I have eaten.'' Use timelines.'
      exercises:
      - name: aspect perfect confusion Contrastive Drill
        type: translation
