  aspect_particles_zh:
    interference_patterns:
    - Transfer of Mandarin aspect particles 'le' and 'guo' to English
    - 'Students produce incorrect combinations: ''I have eaten le'''
    - Aspect particles used as English discourse markers
    why_it_happens: Mandarin uses particles 'le' (completion) and 'guo' (experiential)
      that have no direct English form. Students may transfer these or struggle to
      express equivalent meanings.
    teacher_tips:
      how_to_explain: Mandarin 'le' can mean past tense OR completion. English distinguishes
        these. Practice English ways to express both.
      where_to_start: Translate Mandarin sentences with 'le' and 'guo' into correct
        English.
