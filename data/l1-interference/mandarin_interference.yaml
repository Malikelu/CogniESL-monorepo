  used_to:
    interference_patterns:
    - pattern: Past habit not expressed grammatically; described with time words
      example_l1: 我小时候常常去公园 (wǒ xiǎoshíhou chángcháng qù gōngyuán)
      example_gloss: I childhood often go park
      example_wrong: When I was child, I always play outside.
      example_correct: When I was a child, I USED TO play outside.
      explanation: Mandarin uses time expressions (小时候 xiǎoshíhou "in childhood")
        and adverbs (常常 chángcháng "often") to express past habits. English uses "used
        to + verb". Learners produce "I often go to park when I was child" because
        Mandarin has no equivalent of "used to".
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: '''Used to'' confused with ''be used to'' (accustomed)'
      example_l1: 我小时候常常去公园 (wǒ xiǎoshíhou chángcháng qù gōngyuán)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I didn'
      example_wrong: I didn
      example_correct: I USED NOT TO / DIDN
      explanation: Mandarin uses context or 'guoqu' (in the past) for past habits.
        English 'used to' is an unmarked past habitual that has no Mandarin structural
        equivalent.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: 'Adding unnecessary ''did'': ''I didn''t used to...'''
      example_l1: 我小时候常常去公园 (wǒ xiǎoshíhou chángcháng qù gōngyuán)
      example_gloss: 'Literal gloss reflecting Mandarin structure: When I was child,
        I always play outside.'
      example_wrong: When I was child, I always play outside.
      example_correct: When I was a child, I USED TO play outside.
      explanation: Mandarin uses context or 'guoqu' (in the past) for past habits.
        English 'used to' is an unmarked past habitual that has no Mandarin structural
        equivalent.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    why_it_happens: Mandarin uses context or 'guoqu' (in the past) for past habits.
      English 'used to' is an unmarked past habitual that has no Mandarin structural
      equivalent.
    teacher_tips:
      how_to_explain: USED TO = past habit that NO LONGER happens. BE USED TO = being
        accustomed. 'I USED TO play soccer.' (but don't anymore).
      where_to_start: Practice contrasting past habits vs. current habits.
      exercises:
      - name: used to Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'used to' structure. Emphasize the structural difference between
          Mandarin and English.
        duration: 15
      - name: used to Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'used to' errors. Students
          identify and correct each error.
        duration: 15
      - name: used to Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'used
          to' structure.
        duration: 10
      - name: used to Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'used to' errors.
        duration: 15
    examples:
    - 'Wrong: ''When I was child, I always play outside.'' Correct: ''When I was a
      child, I USED TO play outside.'''
    - '''I am used to waking up early.'' (accustomed, NOT past tense)'
    - 'Wrong: ''I didn''t used to like vegetables.'' Correct: ''I USED NOT TO / DIDN''T
      USE TO like vegetables.'''
    frequency: 3
    persistence: 4
    communicative_impact: 2
    source_type: peer-reviewed
