  plural_marking:
    interference_patterns:
    - pattern: Plural -s/-es consistently omitted from countable nouns
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I have two dog.'
      example_wrong: I have two dog.
      example_correct: I have two DOGS.
      explanation: 'Mandarin nouns are completely invariable for number. There is
        no morphological plural marking of any kind -- shu (book) means both book
        and books. Plurality is expressed analytically through number words, quantifiers,
        or simply inferred from context. Mandarin also lacks the count/mass noun distinction
        that governs English pluralizability. Classifiers serve a categorization function
        but do not map '
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Plurality expressed through context, quantifiers, or number words rather
        than noun morphology -- learners rely on two, many, several to signal plural
        and omit -s
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: She like book.'
      example_wrong: She like book.
      example_correct: She likes BOOKS.
      explanation: 'Mandarin nouns are completely invariable for number. There is
        no morphological plural marking of any kind -- shu (book) means both book
        and books. Plurality is expressed analytically through number words, quantifiers,
        or simply inferred from context. Mandarin also lacks the count/mass noun distinction
        that governs English pluralizability. Classifiers serve a categorization function
        but do not map '
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: 'Overgeneralization: adding -s to uncountable or mass nouns (informations,
        furnitures, luggages) because the learner treats -s as a general marker of
        more than one without the count/mass distinction'
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: Many people is
        here.'
      example_wrong: Many people is here.
      example_correct: Many PEOPLE are here.
      explanation: 'Mandarin nouns are completely invariable for number. There is
        no morphological plural marking of any kind -- shu (book) means both book
        and books. Plurality is expressed analytically through number words, quantifiers,
        or simply inferred from context. Mandarin also lacks the count/mass noun distinction
        that governs English pluralizability. Classifiers serve a categorization function
        but do not map '
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Irregular plural forms (children, men, women, teeth) replaced with
        regularized forms (childs, mans, womans, tooths) because the learner applies
        the default -s rule before acquiring irregulars
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I need some informations.'
      example_wrong: I need some informations.
      example_correct: I need some INFORMATION.
