        and that is him book.'
      example_wrong: This is her book and that is him book.
      example_correct: This is HER book and that is HIS book.
      explanation: Mandarin uses 'ta de' for all possessive constructions. English
        distinguishes 'my/mine', 'his/his', 'her/hers' with different forms based
