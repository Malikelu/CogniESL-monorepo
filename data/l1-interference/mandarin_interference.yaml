  infinitive_of_purpose:
    interference_patterns:
    - pattern: Purpose expressed with 'for to' or 'because' instead of 'to + verb'
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I study English
        because get a good job.'
      example_wrong: I study English because get a good job.
      example_correct: I study English TO GET a good job.
      explanation: Mandarin uses 'lai' (come/to) or 'wei le' (for) for purpose. The
        English infinitive of purpose ('to + verb') is a compact structure that must
        be learned.
