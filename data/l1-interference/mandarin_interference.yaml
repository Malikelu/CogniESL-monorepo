  time_tense_mismatch:
    interference_patterns:
    - Present tense used for past events
    - Future marker 'will' omitted or added incorrectly
    - Tense choice based on event importance rather than time
    why_it_happens: Mandarin encodes time through context and adverbials, not verb
      morphology. Learners may not default to past tense for completed actions.
    teacher_tips:
      how_to_explain: Time words signal which tense to use. 'Yesterday' → past. 'Tomorrow'
        → future. 'Every day' → present.
      where_to_start: Match time expressions to tenses.
      exercises:
      - name: time tense mismatch Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
