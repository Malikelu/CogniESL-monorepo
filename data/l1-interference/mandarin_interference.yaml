  adjective_order:
    interference_patterns:
    - pattern: Adjective order based on Mandarin hierarchy applied to English
      example_l1: 大红苹果 (dà hóng píngguǒ)
      example_gloss: big red apple
      example_wrong: A Chinese beautiful vase.
      example_correct: A BEAUTIFUL Chinese vase.
      explanation: Mandarin adjective order is generally the same as English (size
        before color), but the system is less rigid. More importantly, Mandarin uses
        的 (de) between adjectives and nouns, which has no English equivalent. Learners
        may produce "big red apple" correctly but struggle with other ordering rules.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    - pattern: Size before opinion, color before size
      example_l1: 大红苹果 (dà hóng píngguǒ)
      example_gloss: 'Literal gloss reflecting Mandarin structure: A red big car.'
      example_wrong: A red big car.
      example_correct: A BIG RED car.
      explanation: Mandarin adjective order follows different principles than English.
        Adjectives in Mandarin don't require particular ordering and use 'de' particle.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    - pattern: Commas missing between coordinate adjectives
      example_l1: 大红苹果 (dà hóng píngguǒ)
      example_gloss: 'Literal gloss reflecting Mandarin structure: a wooden table
        beautiful.'
      example_wrong: a wooden table beautiful.
      example_correct: A beautiful wooden table.
      explanation: Mandarin adjective order follows different principles than English.
        Adjectives in Mandarin don't require particular ordering and use 'de' particle.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    why_it_happens: Mandarin adjective order follows different principles than English.
      Adjectives in Mandarin don't require particular ordering and use 'de' particle.
    teacher_tips:
      how_to_explain: 'Use the OSASCOMP rule: Opinion-Size-Age-Shape-Color-Origin-Material-Purpose.
        Add commas between same-category adjectives.'
      where_to_start: Practice with adjective pairs from different categories.
      exercises:
      - name: adjective order Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'adjective order' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: adjective order Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'adjective order' errors.
          Students identify and correct each error.
        duration: 15
      - name: adjective order Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'adjective
          order' structure.
        duration: 10
      - name: adjective order Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'adjective order'
          errors.
        duration: 15
