      example_l1: 他是一个学生 (tā shì yī gè xuéshēng)
      example_gloss: He is one CLF student
      example_wrong: I need a information.
      example_correct: I need SOME information.
      explanation: Mandarin uses 一个 (yī gè "one CLF") for indefinite reference, which
        maps partially to English "a". However, 一个 is required in more contexts than
        "a" is in English, leading to overuse. Conversely, learners may omit "a" entirely
        in predicate positions where Mandarin uses no determiner.
