  mixed_conditionals:
    interference_patterns:
    - Mixing Type 2 and Type 3 structures
    - '''If I had studied, I would travel now'' instead of ''...would have traveled'''
    - Confusion about which time frame to reference
    why_it_happens: Mixed conditionals combine different time frames. Mandarin has
      no equivalent complex conditional mixing system.
    teacher_tips:
      how_to_explain: 'If past → present consequence: If + past perfect, would + base.
        If past → past consequence: If + past perfect, would have + past participle.'
      where_to_start: Identify the time frame of each clause.
      exercises:
      - name: mixed conditionals Contrastive Drill
        type: translation
