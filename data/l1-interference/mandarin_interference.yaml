      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Mandarin 'zhe' and 'na' distinctions differ from English this/that
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: This books are
        interesting.'
      example_wrong: This books are interesting.
      example_correct: THESE books are interesting.
      explanation: Mandarin demonstratives 'zhe' (proximal) and 'na' (distal) don't
        fully map onto English this/that/these/those system with singular/plural distinctions.
