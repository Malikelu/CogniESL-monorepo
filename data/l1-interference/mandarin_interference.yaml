  no_plural_marking:
    interference_patterns:
    - pattern: Chinese nouns used without plural -s
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I have three book.'
      example_wrong: I have three book.
      example_correct: I have three BOOKS.
      explanation: Mandarin nouns are unmarked for number. 'Shu' can mean book or
        books. English requires -s/-es for plural count nouns.
      frequency: 3
      persistence: 5
      communicative_impact: 3
    - pattern: Plural meaning expressed only through quantifiers or numbers
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: Many child play
        in the park.'
      example_wrong: Many child play in the park.
      example_correct: Many CHILDREN play in the park.
      explanation: Mandarin nouns are unmarked for number. 'Shu' can mean book or
        books. English requires -s/-es for plural count nouns.
      frequency: 3
      persistence: 5
      communicative_impact: 3
    - pattern: Failure to recognize plural morphology in input
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: There are some
        peoples here.'
      example_wrong: There are some peoples here.
      example_correct: There are some PEOPLE here.
      explanation: Mandarin nouns are unmarked for number. 'Shu' can mean book or
        books. English requires -s/-es for plural count nouns.
      frequency: 3
      persistence: 5
      communicative_impact: 3
    why_it_happens: Mandarin nouns are unmarked for number. 'Shu' can mean book or
      books. English requires -s/-es for plural count nouns.
    teacher_tips:
      how_to_explain: 'In English, count nouns need -s for plural: ''one book'' →
        ''two BOOKS.'' Mass nouns don''t: ''water'' (never ''waters'' in general).'
      where_to_start: 'Practice: give a singular noun, student says the plural.'
