  reflexive_pronouns:
    interference_patterns:
    - Reflexive pronouns omitted or misused
    - '''He hurt him'' instead of ''He hurt HIMSELF'''
    - '''Ziji'' (自己) used where English doesn''t require reflexive'
    why_it_happens: Mandarin uses 'ziji' (self) but doesn't require reflexivity matching.
      English requires reflexives when subject and object are the same entity.
    teacher_tips:
      how_to_explain: 'If the subject and object are the SAME person, use reflexive:
        ''I hurt MYSELF.'' Practice matching subjects to reflexive forms.'
      where_to_start: 'Practice: ''I taught myself English.'' ''She cut herself.'''
      exercises:
      - name: reflexive pronouns Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'reflexive pronouns' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: reflexive pronouns Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'reflexive pronouns'
          errors. Students identify and correct each error.
        duration: 15
      - name: reflexive pronouns Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'reflexive
          pronouns' structure.
        duration: 10
      - name: reflexive pronouns Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'reflexive pronouns'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I cut me.'' Correct: ''I cut MYSELF.'''
    - 'Wrong: ''The cat washed it.'' Correct: ''The cat washed ITSELF.'''
    - 'Wrong: ''They saw them at the mall.'' Correct: ''They saw THEMSELVES in the
      mirror.'''
