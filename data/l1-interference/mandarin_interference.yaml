  present_perfect_vs_past:
    interference_patterns:
    - pattern: Simple past systematically substituted for present perfect (e.g., 'I
        already ate' instead of 'I HAVE already EATEN') because Mandarin uses the
        perfective particle 'le' (了) for both completed actions and present-relevant
        events without distinguishing the two
      example_l1: 我已经吃过了 (wǒ yǐjīng chī guo le)
      example_gloss: I already eat PERF PERF
      example_wrong: I already eat.
      example_correct: I HAVE ALREADY EATEN.
      explanation: Mandarin uses aspect markers 已经 (yǐjīng "already") + 过 (guo) +
        了 (le) to indicate completed action with present relevance. English requires
        present perfect "have eaten". Learners use simple past or base form because
        Mandarin has no auxiliary + past participle structure.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Present perfect avoided with specific past time markers — learners
        correctly avoid it with 'yesterday' but also incorrectly avoid it with 'already',
        'just', 'yet', and 'ever' which require present perfect in English
      example_l1: 他去过中国三次 (tā qù guo zhōngguó sān cì)
      example_gloss: He go PERF China three times
      example_wrong: He has went home.
      example_correct: He HAS GONE home.
      explanation: Mandarin 过 (guo) marks experiential aspect ("have been/experienced
        going"), but the verb stays in base form. English requires "has been to" or
        "has visited". The concept of present perfect as a tense (not just aspect)
        is foreign to Mandarin.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Confusion between 'have gone' (present perfect — still there) and 'went'
        (simple past — completed trip); learners use 'He went to Beijing' for both
        meanings because Mandarin 'ta qu Beijing le' covers both
      example_l1: 我在这里住了三年 (wǒ zài zhèlǐ zhù le sān nián)
      example_gloss: I at here live PERF three years
      example_wrong: I have seen that movie yesterday.
      example_correct: I SAW that movie yesterday.
      explanation: Mandarin uses 了 (le) + time duration to indicate an action continuing
        from past to present. English requires present perfect continuous "have been
        living". Learners use simple past or present because Mandarin does not grammatically
        distinguish these temporal meanings.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Overuse of present perfect with stative verbs (e.g., 'I have known
        him for 10 years' produced correctly but then overgeneralized to 'I have liked
        this movie since yesterday' where simple past is needed)
      example_l1: 他已经走了 (tā yǐjīng zǒu le)
      example_gloss: He already go PERF
      example_wrong: I am waiting for one hour.
      example_correct: I HAVE BEEN WAITING for one hour.
      explanation: Mandarin 已经...了 (yǐjīng...le) indicates completion with current
        relevance, similar to present perfect. But the verb 走 (zǒu) stays in base
        form. English requires "has gone". Learners produce "He already go" or "He
        already went".
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: 'Past participle form errors under L1 transfer pressure: ''He has WENT
        home'' or ''I have SAW it'' — learners treat the ''have + V-ed'' structure
        as auxiliary + base form, producing irregular past forms instead of past participles'
      example_l1: 我认识她很久了 (wǒ rènshi tā hěn jiǔ le)
      example_gloss: I know her very long PERF
      example_wrong: She lived here since 2015.
      example_correct: She HAS LIVED here since 2015.
      explanation: Mandarin stative verbs with 了 (le) and time duration express a
        state that began in the past and continues. English requires present perfect
        "have known". The verb 认识 (rènshi "know") does not change form in Mandarin.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Present perfect progressive ('I have been waiting') almost never produced;
        learners default to present progressive ('I am waiting for one hour') or simple
        past because Mandarin lacks a have + been + -ing equivalent
      example_l1: 你吃过中国菜吗？(nǐ chī guo zhōngguó cài ma?)
      example_gloss: You eat PERF China food Q
      example_wrong: I have graduated in 2010.
      example_correct: I GRADUATED in 2010.
      explanation: Mandarin 过 (guo) marks life experience, similar to present perfect
        "ever" questions. But the verb stays in base form with no auxiliary. English
        requires "Have you ever eaten...?" with auxiliary inversion and past participle.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: 'Mandarin is a tenseless language that marks aspect rather than
      tense. The perfective particle ''le'' (了) signals completion or change of state
      but does NOT encode the present-relevance meaning that English present perfect
      carries. Mandarin has no auxiliary ''have'' + past participle structure. Time
      reference is established through context, time adverbials (已经 yijing = already,
      ganggang = just), and aspect markers (le, guo, zhe) rather than verb morphology.
      English present perfect requires learners to simultaneously manage: (1) auxiliary
      ''have/has'', (2) past participle morphology (including irregular forms), AND
      (3) the abstract semantic concept of ''past-with-present-relevance'' — none
      of which exist in Mandarin grammar. This triple burden makes it one of the last
      structures to be fully acquired by Mandarin-speaking learners (Liu, 2008; Swan
      & Smith, 2001). The aspectual system of Mandarin maps imperfectly onto English
      tense-aspect combinations, leading to both overuse and underuse of present perfect
      across different semantic contexts (Li & Luk, 2017).'
    teacher_tips:
      how_to_explain: 'Present perfect = a PAST action that matters NOW. ''I HAVE
        eaten'' = I''m not hungry NOW. ''I ATE'' = it''s over, done, finished. The
        English present perfect has THREE jobs: (1) life experiences (''I HAVE been
        to Beijing''), (2) unfinished time periods (''I HAVE eaten three times TODAY''),
        (3) past action with present result (''I HAVE lost my keys'' = I still can''t
        find them). Mandarin uses ''le'' or context for all three — English needs
        ''have + past participle''.'
      where_to_start: 'Start with the ''past action with present result'' meaning
        — it''s the most concrete. Use physical demonstrations: ''I HAVE opened the
        door'' (door is open now). Then move to life experiences, then unfinished
        time.'
      sequencing: 'Week 1: Present result meaning (have + past participle, physical
        demonstrations). Week 2: Life experiences with ''ever/never''. Week 3: Unfinished
        time with ''already/just/yet/since/for''. Week 4: Contrastive practice — simple
        past vs present perfect decision tree.'
      exercises:
      - name: Present Result Demonstration
        type: speaking
        description: 'Teacher performs 8 actions (open a book, close a door, write
          on the board, break a pencil, tear paper, drink water, sit down, turn off
          the lights). After each action, students must describe the present result
          using present perfect: ''You HAVE opened the book'' (the book is open now).
          This physically links the past action to the present state. Then students
          perform actions and describe their own results.'
        duration: 15
      - name: Mandarin-to-English Tense Decision Drill
        type: translation
        description: Provide 15 Mandarin sentences — 5 with perfective 'le' that map
          to English simple past (e.g., 我昨天吃了 wǒ zuótiān chī le = I ate yesterday),
          5 with 'le' that map to present perfect (e.g., 我已经吃了 wǒ yǐjīng chī le =
          I have already eaten), and 5 with experiential 'guo' (e.g., 我去过北京 wǒ qù
          guo Běijīng = I have been to Beijing). Students translate each, explicitly
          choosing simple past or present perfect and justifying their choice based
          on the time marker and context.
        duration: 20
      - name: Error Correction — Present Perfect vs Simple Past
        type: error-correction
        description: Provide 20 sentences written by a hypothetical Mandarin speaker.
          10 contain present perfect errors (e.g., 'I already eat lunch', 'She has
          went to the store', 'I have seen that movie yesterday') and 10 are correct.
          Students identify which are errors, correct them, and explain the rule violated.
          Include at least 3 sentences where present perfect is wrongly used instead
          of simple past (e.g., 'I have graduated in 2010').
        duration: 15
      - name: Timeline Sorting Activity
        type: grammar-sort
        description: 'Give students 20 sentence strips with mixed simple past and
          present perfect sentences. Students sort them into two groups using a visual
          timeline: Group A (Simple Past = finished time — point on timeline) and
          Group B (Present Perfect = connects past to present — arrow from past to
          NOW). Sentences include time markers: yesterday, last week, already, just,
          since 2019, ever, never, for three years, this morning (when it is no longer
          morning).'
        duration: 15
      - name: Life Experience Interview
        type: speaking
        description: 'Students interview a partner using present perfect questions:
          ''Have you ever been to...?'' ''Have you ever eaten...?'' ''Have you ever
          tried...?'' Partner answers with ''Yes, I have / No, I haven''t'' and then
          gives details in simple past: ''Yes, I have. I went to Paris in 2019.''
          This practices the natural discourse pattern where present perfect opens
          a topic and simple past provides details. Teacher monitors for correct auxiliary
          + past participle forms.'
        duration: 15
      - name: Writing — My Life Until Now
        type: writing
        description: 'Students write a 200-word autobiographical paragraph titled
          ''My Life Until Now'' using at least 8 present perfect sentences (life experiences,
          achievements, ongoing situations with since/for) and 4 simple past sentences
          (specific completed events). Peer review checklist: (1) Is ''have/has''
          present? (2) Is the past participle correct (not past tense form)? (3) Is
          the time marker compatible with present perfect (no specific past time)?
          (4) Does the sentence express present relevance?'
        duration: 20
    examples:
    - 'Wrong: ''I already eat.'' Correct: ''I HAVE ALREADY EATEN.'''
    - 'Wrong: ''He has went home.'' Correct: ''He HAS GONE home.'''
    - 'Wrong: ''I have seen that movie yesterday.'' Correct: ''I SAW that movie yesterday.'''
    - 'Wrong: ''I am waiting for one hour.'' Correct: ''I HAVE BEEN WAITING for one
      hour.'''
    - 'Wrong: ''She lived here since 2015.'' Correct: ''She HAS LIVED here since 2015.'''
    - 'Wrong: ''I have graduated in 2010.'' Correct: ''I GRADUATED in 2010.'''
