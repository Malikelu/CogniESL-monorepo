  would_rather:
    interference_patterns:
    - Mandarin 'yinggai' used for preference where 'would rather' expected
    - Subjunctive after 'would rather' not produced
    - '''Would rather to + verb'' instead of bare infinitive'
    why_it_happens: Mandarin doesn't have a direct equivalent for 'would rather.'
      'Yinggai' (should) is used instead, losing the preference nuance.
    teacher_tips:
      how_to_explain: '''I''D RATHER + bare verb.'' ''I''d rather STAY home.'' For
        past unreal: ''I''d rather you + past tense.'' ''I''d rather you DIDN''T mention
        it.'''
      where_to_start: Practice preference expressions.
      exercises:
      - name: would rather Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
