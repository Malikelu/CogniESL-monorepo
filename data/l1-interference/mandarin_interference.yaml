  quantifiers_advanced:
    interference_patterns:
    - pattern: Most/least vs more/least confusion
      example_l1: 大部分学生都通过了 (dà bùfen xuéshēng dōu tōngguò le)
      example_gloss: Most students all pass PERF
      example_wrong: She is the more beautiful.
      example_correct: She is THE MOST beautiful.
      explanation: Mandarin uses 大部分 (dà bùfen "most") + 都 (dōu "all") for universal
        quantification with "most". English uses "most" alone. Learners produce "Most
        students all passed" by transferring the Mandarin double-marking pattern.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    - pattern: 'Double comparatives with quantifiers: ''more better'''
      example_l1: 大部分学生都通过了 (dà bùfen xuéshēng dōu tōngguò le)
      example_gloss: 'Literal gloss reflecting Mandarin structure: This is more better.'
      example_wrong: This is more better.
      example_correct: This is BETTER.
      explanation: Mandarin doesn't inflect adjectives or quantifiers for comparison.
        English requires 'most' (superlative) vs. 'more' (comparative) with correct
        usage.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    - pattern: Each/every vs all confusion persists at advanced levels
      example_l1: 大部分学生都通过了 (dà bùfen xuéshēng dōu tōngguò le)
      example_gloss: 'Literal gloss reflecting Mandarin structure: She is the more
        beautiful.'
      example_wrong: She is the more beautiful.
      example_correct: She is THE MOST beautiful.
      explanation: Mandarin doesn't inflect adjectives or quantifiers for comparison.
        English requires 'most' (superlative) vs. 'more' (comparative) with correct
        usage.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    why_it_happens: Mandarin doesn't inflect adjectives or quantifiers for comparison.
      English requires 'most' (superlative) vs. 'more' (comparative) with correct
      usage.
    teacher_tips:
      how_to_explain: MORE + adjective (comparative). MOST + adjective (superlative).
        'MOST' already means the maximum — never 'more most.'
      where_to_start: Practice two-item vs. three-item comparisons.
      exercises:
