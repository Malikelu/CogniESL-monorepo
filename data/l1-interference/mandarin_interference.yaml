  prepositions:
    interference_patterns:
    - pattern: Preposition errors are among the most frequent Mandarin learner errors
      example_l1: 我在学校 (wǒ zài xuéxiào)
      example_gloss: I at school
      example_wrong: I arrived to Beijing.
      example_correct: I arrived IN Beijing.
      explanation: Mandarin uses 在 (zài) for both location and time, covering "at",
        "in", and "on". English distinguishes these prepositions. Learners confuse
        "in", "on", and "at" because 在 covers all three meanings.
      frequency: 5
      persistence: 5
      communicative_impact: 3
    - pattern: Confusion between 'in', 'at', 'on' for time and place
      example_l1: 书在桌子上 (shū zài zhuōzi shàng)
      example_gloss: Book on table
      example_wrong: She is good in math.
      example_correct: She is good AT math.
      explanation: Mandarin 在...上 (zài...shàng "at...on") combines location and surface.
        English uses just "on". Learners may produce "on the table" correctly but
        struggle with other preposition distinctions that 在 does not make.
      frequency: 5
      persistence: 5
      communicative_impact: 3
    - pattern: Verbs paired with wrong prepositions due to Mandarin L1 translation
      example_l1: 我星期一去 (wǒ xīngqīyī qù)
      example_gloss: I Monday go
      example_wrong: Wait of the bus.
      example_correct: Wait FOR the bus.
      explanation: Mandarin does not use prepositions before time expressions — 星期一
        (xīngqīyī "Monday") stands alone. English requires "on Monday". Learners produce
        "I go Monday" by transferring Mandarin's bare time expression pattern.
      frequency: 5
      persistence: 5
      communicative_impact: 3
    why_it_happens: Mandarin prepositions (zai, gei, dui, etc.) don't correspond one-to-one
      with English. English prepositions are highly idiomatic and unpredictable.
    teacher_tips:
      how_to_explain: Prepositions must be learned with their verbs and nouns as collocations.
        'Good AT math', 'interested IN science', 'depend ON'.
      where_to_start: Learn preposition collocations as chunks, not individual words.
      exercises:
      - name: prepositions Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'prepositions' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: prepositions Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'prepositions' errors.
          Students identify and correct each error.
        duration: 15
      - name: prepositions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'prepositions'
          structure.
        duration: 10
      - name: prepositions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'prepositions'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I arrived to Beijing.'' Correct: ''I arrived IN Beijing.'''
    - 'Wrong: ''She is good in math.'' Correct: ''She is good AT math.'''
    - 'Wrong: ''Wait of the bus.'' Correct: ''Wait FOR the bus.'''
