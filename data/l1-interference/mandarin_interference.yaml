  existential_constructions:
    interference_patterns:
    - pattern: Existential 'there is/are' omitted or replaced with personal subject
      example_l1: 桌子上有一本书 (zhuōzi shàng yǒu yī běn shū)
      example_gloss: Table on have one CLF book
      example_wrong: Is a book on the table.
      example_correct: THERE IS a book on the table.
      explanation: Mandarin uses 有 (yǒu "have/exist") for existential sentences, literally
        "On table have one book". English uses "There is/are" with expletive "there".
        Learners produce "On table has a book" or "Have a book on table" because Mandarin
        existential structure is completely different.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: '''It is many people in the room'' instead of ''There are many people'''
      example_l1: 教室里有很多学生 (jiàoshì lǐ yǒu hěn duō xuéshēng)
      example_gloss: Classroom in have very many student
      example_wrong: It are many students in class.
      example_correct: THERE ARE many students in class.
      explanation: Mandarin existential sentences place the location first, then 有
        (yǒu "have"), then the noun. English uses "There are [noun] in [location]".
        The word order and the use of expletive "there" are both foreign concepts.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Confusion between 'there is' and 'it is'
      example_l1: 墙上挂着一幅画 (qiáng shàng guà zhe yī fú huà)
      example_gloss: Wall on hang PERF one CLF painting
      example_wrong: It is a cat on the roof.
      example_correct: THERE IS a cat on the roof.
      explanation: Mandarin uses 着 (zhe) for continuous state and places location
        before the verb. English requires "There is a painting hanging on the wall"
        or "A painting hangs on the wall". The existential "there" construction has
        no Mandarin equivalent.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Mandarin uses 'you' (有) for existence but often omits it in topic-comment
      structures. English requires explicit 'there' as a dummy subject for existential
      constructions.
    teacher_tips:
      how_to_explain: '''THERE is'' = something EXISTS. ''IT is'' = something IS true/described.
        Use ''there'' when introducing new information into existence.'
      where_to_start: 'Practice: ''There is/are'' with classroom objects.'
      exercises:
      - name: existential constructions Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'existential constructions' structure. Emphasize the structural
          difference between Mandarin and English.
        duration: 15
      - name: existential constructions Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'existential constructions'
          errors. Students identify and correct each error.
        duration: 15
      - name: existential constructions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'existential
          constructions' structure.
        duration: 10
      - name: existential constructions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'existential
          constructions' errors.
        duration: 15
    examples:
    - 'Wrong: ''Is a book on the table.'' Correct: ''THERE IS a book on the table.'''
    - 'Wrong: ''It are many students in class.'' Correct: ''THERE ARE many students
      in class.'''
    - 'Wrong: ''It is a cat on the roof.'' Correct: ''THERE IS a cat on the roof.'''
