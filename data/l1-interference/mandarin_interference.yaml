  relative_clauses:
    interference_patterns:
    - pattern: 'Relative clause structure: Mandarin uses topic-comment, not wh-words
        for relative clauses'
      example_l1: 我昨天看到的那个人 (wǒ zuótiān kàndào de nà gè rén)
      example_gloss: I yesterday see DE that CLF person
      example_wrong: The man who he is my teacher.
      example_correct: The man WHO is my teacher.
      explanation: Mandarin relative clauses precede the noun and use 的 (de) as a
        relativizer. English relative clauses follow the noun and use "who/which/that".
        Learners produce "I yesterday saw that person" (two separate clauses) because
        Mandarin relative clause structure is completely different.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Missing or misplaced relative pronouns in English
      example_l1: 我昨天看到的那个人 (wǒ zuótiān kàndào de nà gè rén)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I know the person
        that he lives here.'
      example_wrong: I know the person that he lives here.
      example_correct: I know the person WHO lives here.
      explanation: Mandarin relativizes using topic-comment structure or 'de' particle.
        English uses wh-words as relative pronouns at specific clause positions.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: '''The person who he is tall'' instead of ''The person who is tall'''
      example_l1: 我昨天看到的那个人 (wǒ zuótiān kàndào de nà gè rén)
      example_gloss: 'Literal gloss reflecting Mandarin structure: The man who he
        is my teacher.'
      example_wrong: The man who he is my teacher.
      example_correct: The man WHO is my teacher.
      explanation: Mandarin relativizes using topic-comment structure or 'de' particle.
        English uses wh-words as relative pronouns at specific clause positions.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Mandarin relativizes using topic-comment structure or 'de' particle.
      English uses wh-words as relative pronouns at specific clause positions.
    teacher_tips:
      how_to_explain: Use WHO/WHICH/THAT to connect clauses. 'The man WHO I saw' —
        no extra pronoun after. Practice embedding clauses.
      where_to_start: Start with defining relative clauses using who/which/that.
      exercises:
