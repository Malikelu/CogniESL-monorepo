  first_conditional:
    interference_patterns:
    - 'Using ''will'' in both clauses: ''If it will rain, I will stay'''
    - Using 'if' + past tense for real (Type 1) conditions
    - Omitting the conditional structure entirely
    why_it_happens: Learners confuse Type 1 and Type 2 conditionals. Type 1 uses present
      tense in if-clause, not future.
    teacher_tips:
      how_to_explain: 'REAL condition (Type 1): If-clause = present tense. Result
        = will + base. ''If it RAINS, I WILL stay home.'''
      where_to_start: Practice with likely/real situations.
      exercises:
      - name: first conditional Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'first conditional' structure. Emphasize the structural difference
          between Mandarin and English.
