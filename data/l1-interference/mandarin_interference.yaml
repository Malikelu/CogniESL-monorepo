        description: Students create 5 original sentences using correct English 'conjunctions
          subordinating' structure.
        duration: 10
      - name: conjunctions subordinating Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'conjunctions
          subordinating' errors.
        duration: 15
    examples:
    - 'Wrong: ''Because he was tired, so he went to bed.'' (redundant). Correct: ''BECAUSE
