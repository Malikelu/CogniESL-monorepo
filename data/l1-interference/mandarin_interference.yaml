    interference_patterns:
    - Stative and action verbs not distinguished for progressive use
    - '''I have been liking this song'' instead of ''I like this song'''
    - Some verbs alternate between stative and dynamic meaning
    why_it_happens: The stative/dynamic distinction is grammatical in English but
