  adverb_placement:
    interference_patterns:
    - Adverbs placed in Mandarin order (Time-Manner-Place) instead of English (Manner-Place-Time)
    - '''Yesterday I quickly ran to school'' instead of ''I quickly ran to school
      yesterday'''
    - Adverb 'very' placed after adjective instead of before
    why_it_happens: Mandarin follows TMP (Time-Manner-Place) order before the verb.
      English uses Manner-Place-Time order, creating persistent adverb ordering errors.
    teacher_tips:
      how_to_explain: 'English formula: HOW + WHERE + WHEN. ''She ran QUICKLY to school
        YESTERDAY.'' Drill with one adverb at a time.'
      where_to_start: Start with single adverbials, then combine two, then three.
      exercises:
      - name: adverb placement Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'adverb placement' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: adverb placement Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'adverb placement' errors.
          Students identify and correct each error.
        duration: 15
      - name: adverb placement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'adverb
          placement' structure.
        duration: 10
      - name: adverb placement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'adverb placement'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''Yesterday I quickly went to school.'' Correct: ''I quickly went to
      school YESTERDAY.'''
    - 'Wrong: ''She beautifully sings the song.'' Correct: ''She sings the song BEAUTIFULLY.'''
    - 'Wrong: ''He is extremely smart.'' Correct: ''He is VERY/EXTREMELY smart.''
      (OK, but ''extremely'' goes before adjective, not after)'
