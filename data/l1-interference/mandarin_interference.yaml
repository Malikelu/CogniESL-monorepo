      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: The person which
        helped me.'
      example_wrong: The person which helped me.
      example_correct: The person WHO helped me.
      explanation: Mandarin has no relative pronouns. English selects among who, whom,
        which, that, where, when based on antecedent and clause function.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Omitting relative pronouns where English requires them
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: This is the restaurant
        where I work there.'
      example_wrong: This is the restaurant where I work there.
      example_correct: This is the restaurant WHERE I work.
      explanation: Mandarin has no relative pronouns. English selects among who, whom,
        which, that, where, when based on antecedent and clause function.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Using 'which' for people instead of 'who'
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: She is the girl
        which I told you.'
      example_wrong: She is the girl which I told you.
      example_correct: She is the girl WHO(m) I told you ABOUT.
      explanation: Mandarin has no relative pronouns. English selects among who, whom,
        which, that, where, when based on antecedent and clause function.
      frequency: 3
