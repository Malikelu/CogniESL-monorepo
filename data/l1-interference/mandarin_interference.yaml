  reported_speech:
    interference_patterns:
    - pattern: Failure to backshift tenses in reported speech
      example_l1: 他说他明天来 (tā shuō tā míngtiān lái)
      example_gloss: He say he tomorrow come
      example_wrong: He told me that he will come.
      example_correct: He told me he WOULD come.
      explanation: Mandarin does not backshift tense in reported speech — the verb
        form stays the same as in direct speech. English requires backshifting (present
        → past). Learners produce "He said he will come" instead of "He said he would
        come" because Mandarin does not change verb forms in reported speech.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Direct speech structure used in indirect reporting
      example_l1: 他说他明天来 (tā shuō tā míngtiān lái)
      example_gloss: 'Literal gloss reflecting Mandarin structure: He told me that
        he will come.'
      example_wrong: He told me that he will come.
      example_correct: He told me he WOULD come.
      explanation: Mandarin often quotes directly without backshifting. English requires
        tense backshift and structural changes in indirect speech.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Confusion between 'say' and 'tell' in reporting
      example_l1: 他说他明天来 (tā shuō tā míngtiān lái)
      example_gloss: 'Literal gloss reflecting Mandarin structure: He told me that
        he will come.'
      example_wrong: He told me that he will come.
      example_correct: He told me he WOULD come.
      explanation: Mandarin often quotes directly without backshifting. English requires
        tense backshift and structural changes in indirect speech.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    why_it_happens: Mandarin often quotes directly without backshifting. English requires
      tense backshift and structural changes in indirect speech.
    teacher_tips:
      how_to_explain: 'Reported speech shifts tenses back: ''I am'' → ''he was'',
        ''I will'' → ''he would''. Practice with common reporting verbs.'
      where_to_start: Start with simple present → simple past backshift.
      exercises:
      - name: reported speech Contrastive Drill
