  prepositions_of_time:
    interference_patterns:
    - pattern: Confusion between 'in', 'on', 'at' for time expressions
      example_l1: 我星期一去 (wǒ xīngqīyī qù)
      example_gloss: I Monday go
      example_wrong: I will meet you on Monday morning.
      example_correct: I will meet you IN the morning.
      explanation: Mandarin does not use prepositions before days of the week — 星期一
        (xīngqīyī "Monday") stands alone. English requires "on + day". Learners omit
        "on" because Mandarin time expressions are bare.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Using time prepositions from Mandarin patterns
      example_l1: 我三点去 (wǒ sān diǎn qù)
      example_gloss: I three o'clock go
      example_wrong: She arrived at 2023.
      example_correct: She arrived IN 2023.
      explanation: Mandarin does not use prepositions before clock times — 三点 (sān
        diǎn "three o'clock") stands alone. English requires "at + time". Learners
        omit "at" because Mandarin time expressions require no preposition.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Omitting time prepositions entirely
      example_l1: 我星期一去 (wǒ xīngqīyī qù)
      example_gloss: 'Literal gloss reflecting Mandarin structure: The class starts
        on 8 o'
      example_wrong: The class starts on 8 o
      example_correct: The class starts AT 8 o
      explanation: Mandarin uses 'zai' for most time and place references. English
        differentiates 'in' (long periods), 'on' (days/dates), 'at' (specific times).
      frequency: 4
      persistence: 4
      communicative_impact: 2
    why_it_happens: Mandarin uses 'zai' for most time and place references. English
      differentiates 'in' (long periods), 'on' (days/dates), 'at' (specific times).
    teacher_tips:
      how_to_explain: AT = specific time (at 3pm, at noon). ON = days/dates (on Monday,
        on July 4th). IN = longer periods (in March, in 2020).
      where_to_start: Practice with calendar and clock visuals.
      exercises:
      - name: prepositions of time Contrastive Drill
        type: translation
