  few:
    interference_patterns:
    - Few/a few used incorrectly
    - '''A few'' implies positive (some), ''few'' implies negative (not enough)'
    - Translating Mandarin 'mei you' (don't have) with 'few' instead of 'no'
    why_it_happens: Mandarin doesn't distinguish between 'few' (negative) and 'a few'
      (positive). The subtle connotation difference is unfamiliar.
