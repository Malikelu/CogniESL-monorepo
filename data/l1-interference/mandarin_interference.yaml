        type: peer-review
        description: Students exchange writing samples and check for 'definite article'
          errors.
        duration: 15
    examples:
    - 'First mention: ''I bought A BOOK.'' Second mention: ''THE BOOK is interesting.'''
    - 'Wrong: ''I love THE music.'' (general). Correct: ''I love MUSIC.'''
