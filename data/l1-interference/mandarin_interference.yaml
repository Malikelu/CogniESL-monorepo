  first_conditional:
    interference_patterns:
    - pattern: 'Using ''will'' in both clauses: ''If it will rain, I will stay'''
      example_l1: 如果下雨，我就不去 (rúguǒ xiàyǔ, wǒ jiù bù qù)
      example_gloss: If rain, I then not go
      example_wrong: If you will call me, I
      example_correct: If you CALL me, I
      explanation: Mandarin uses the same verb form in both clauses of a conditional.
        English requires present tense in the if-clause and "will" in the main clause.
        Learners produce "If rain, I no go" by transferring Mandarin's invariant verb
        forms.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'if' + past tense for real (Type 1) conditions
      example_l1: 如果下雨，我就不去 (rúguǒ xiàyǔ, wǒ jiù bù qù)
      example_gloss: 'Literal gloss reflecting Mandarin structure: If she will study
        hard, she will pass.'
      example_wrong: If she will study hard, she will pass.
      example_correct: If she STUDIES hard, she will pass.
      explanation: Learners confuse Type 1 and Type 2 conditionals. Type 1 uses present
        tense in if-clause, not future.
