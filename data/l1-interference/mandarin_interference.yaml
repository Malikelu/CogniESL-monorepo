  third_conditional:
    interference_patterns:
    - Past Perfect + would have + past participle structure avoided
    - 'Confusion with Type 2: past simple instead of past perfect'
    - Failure to express hypothetical past regret correctly
    why_it_happens: Requires past perfect tense + modal perfect — the most complex
      English conditional structure with no Mandarin equivalent.
    teacher_tips:
      how_to_explain: 'TYPE 3 = unreal PAST. If-clause: HAD + past participle. Result:
        would have + past participle. ''If I HAD STUDIED, I would have PASSED.'''
      where_to_start: Practice expressing regrets about the past.
      exercises:
      - name: third conditional Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'third conditional' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
