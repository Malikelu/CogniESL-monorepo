  double_negation:
    interference_patterns:
    - pattern: Double negatives used for emphasis as in Mandarin
      example_l1: 没有人不知道 (méiyǒu rén bù zhīdào)
      example_gloss: Nobody not know
      example_wrong: I don
      example_correct: I DON
      explanation: Mandarin allows and even prefers double negation for emphasis —
        没有...不 (méiyǒu...bù "nobody...not") is standard. English requires "Everybody
        knows" (single negation). Learners produce "Nobody doesn't know" by transferring
        the Mandarin double negation pattern.
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: '''I don''t have nothing'' instead of ''I have nothing'''
      example_l1: 没有人不知道 (méiyǒu rén bù zhīdào)
      example_gloss: 'Literal gloss reflecting Mandarin structure: He can'
      example_wrong: He can
      example_correct: He CAN
      explanation: 'Mandarin allows negative concord: ''mei you ren'' (nobody didn''t
        come). English requires single negation: ''nobody came''.'
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Negative concord from L1 transfer
      example_l1: 没有人不知道 (méiyǒu rén bù zhīdào)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I don'
      example_wrong: I don
      example_correct: I DON
      explanation: 'Mandarin allows negative concord: ''mei you ren'' (nobody didn''t
        come). English requires single negation: ''nobody came''.'
      frequency: 3
      persistence: 4
      communicative_impact: 2
    why_it_happens: 'Mandarin allows negative concord: ''mei you ren'' (nobody didn''t
      come). English requires single negation: ''nobody came''.'
    teacher_tips:
      how_to_explain: In standard English, ONE negative is enough. 'I DON'T have ANY.'
        NOT 'I don't have no.'
      where_to_start: Practice eliminating double negatives.
      exercises:
      - name: double negation Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'double negation' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: double negation Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'double negation' errors.
          Students identify and correct each error.
        duration: 15
      - name: double negation Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'double
          negation' structure.
        duration: 10
      - name: double negation Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'double negation'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I don''t have no money.'' Correct: ''I DON''T have ANY money.'' OR
      ''I have NO money.'''
