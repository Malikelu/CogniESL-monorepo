  gerunds_infinitives:
    interference_patterns:
    - pattern: No pattern for choosing between gerund and infinitive
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I enjoy to swim.'
      example_wrong: I enjoy to swim.
      example_correct: I ENJOY SWIMMING.
      explanation: After verbs, English uses either -ing (gerund) or to-infinitive.
        Mandarin uses the same verb complement structure for both. Some verbs require
        one, some the other, some both with different meanings.
      frequency: 4
      persistence: 4
      communicative_impact: 3
