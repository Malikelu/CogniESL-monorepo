  adverb_placement:
    interference_patterns:
    - pattern: Adverbs placed in Mandarin order (Time-Manner-Place) instead of English
        (Manner-Place-Time)
      example_l1: 他经常去公园 (tā jīngcháng qù gōngyuán)
      example_gloss: He often go park
      example_wrong: Yesterday I quickly went to school.
      example_correct: I quickly went to school YESTERDAY.
      explanation: Mandarin adverbs like 经常 (jīngcháng "often") are placed before
        the verb. English adverbs of frequency go before the main verb but after "be".
        Learners produce "He often goes to park" correctly for simple cases but struggle
        with "be" placement ("He is often late" vs "He often is late").
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: '''Yesterday I quickly ran to school'' instead of ''I quickly ran to
        school yesterday'''
      example_l1: 他经常去公园 (tā jīngcháng qù gōngyuán)
      example_gloss: 'Literal gloss reflecting Mandarin structure: She beautifully
        sings the song.'
      example_wrong: She beautifully sings the song.
      example_correct: She sings the song BEAUTIFULLY.
      explanation: Mandarin follows TMP (Time-Manner-Place) order before the verb.
        English uses Manner-Place-Time order, creating persistent adverb ordering
        errors.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Adverb 'very' placed after adjective instead of before
      example_l1: 他经常去公园 (tā jīngcháng qù gōngyuán)
      example_gloss: 'Literal gloss reflecting Mandarin structure: He is extremely
        smart.'
      example_wrong: He is extremely smart.
      example_correct: He is VERY/EXTREMELY smart.
      explanation: Mandarin follows TMP (Time-Manner-Place) order before the verb.
        English uses Manner-Place-Time order, creating persistent adverb ordering
        errors.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    why_it_happens: Mandarin follows TMP (Time-Manner-Place) order before the verb.
      English uses Manner-Place-Time order, creating persistent adverb ordering errors.
    teacher_tips:
      how_to_explain: 'English formula: HOW + WHERE + WHEN. ''She ran QUICKLY to school
        YESTERDAY.'' Drill with one adverb at a time.'
      where_to_start: Start with single adverbials, then combine two, then three.
      exercises:
      - name: adverb placement Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'adverb placement' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: adverb placement Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'adverb placement' errors.
          Students identify and correct each error.
        duration: 15
      - name: adverb placement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'adverb
          placement' structure.
        duration: 10
      - name: adverb placement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'adverb placement'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''Yesterday I quickly went to school.'' Correct: ''I quickly went to
      school YESTERDAY.'''
    - 'Wrong: ''She beautifully sings the song.'' Correct: ''She sings the song BEAUTIFULLY.'''
    - 'Wrong: ''He is extremely smart.'' Correct: ''He is VERY/EXTREMELY smart.''
      (OK, but ''extremely'' goes before adjective, not after)'
