  unless:
    interference_patterns:
    - pattern: '''Unless'' avoided; ''if...not'' used exclusively'
      example_l1: 除非你努力，否则不会成功 (chúfēi nǐ nǔlì, fǒuzé bù huì chénggōng)
      example_gloss: Unless you work-hard, otherwise not will succeed
      example_wrong: I
      example_correct: I
      explanation: Mandarin uses 除非...否则 (chúfēi...fǒuzé "unless...otherwise") as
        paired conjunctions. English uses "unless" alone. Learners produce "Unless
        you work hard, otherwise you won't succeed" by transferring the paired conjunction
        pattern.
      frequency: 2
      persistence: 3
      communicative_impact: 2
    - pattern: 'Confusion: ''unless'' = ''if not'' but not ''until'''
      example_l1: 除非你努力，否则不会成功 (chúfēi nǐ nǔlì, fǒuzé bù huì chénggōng)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I'
      example_wrong: I
      example_correct: I
      explanation: Mandarin uses 'ruguo bu' (if not) for unless. English has 'unless'
        as a single negative conditional conjunction.
      frequency: 2
      persistence: 3
      communicative_impact: 2
    - pattern: '''Unless'' used where ''until'' is needed'
      example_l1: 除非你努力，否则不会成功 (chúfēi nǐ nǔlì, fǒuzé bù huì chénggōng)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I'
      example_wrong: I
      example_correct: I
      explanation: Mandarin uses 'ruguo bu' (if not) for unless. English has 'unless'
        as a single negative conditional conjunction.
      frequency: 2
      persistence: 3
      communicative_impact: 2
    why_it_happens: Mandarin uses 'ruguo bu' (if not) for unless. English has 'unless'
      as a single negative conditional conjunction.
    teacher_tips:
      how_to_explain: '''UNLESS'' = if not. ''I won''t go UNLESS you come.'' = ''If
        you DON''T come, I won''t go.'' NOT ''until.'''
      where_to_start: Translate 'ruguo bu' as 'unless'.
      exercises:
      - name: unless Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
