  be_going_to:
    interference_patterns:
    - Future meaning expressed with 'will' instead of 'be going to'
    - Structure 'going to' not produced due to L1 transfer
    - Confusion between planned future (be going to) and spontaneous decisions (will)
    why_it_happens: Mandarin uses 'yao' or 'jiu' for both planned and spontaneous
      future. English distinguishes 'be going to' (planned) from 'will' (spontaneous).
    teacher_tips:
      how_to_explain: '''BE going to'' = plans you''ve already decided. ''WILL'' =
        spontaneous decisions made now. ''I''m GOING TO study medicine'' (plan). ''I''ll
        answer the phone'' (spontaneous).'
      where_to_start: Compare planned vs. spontaneous scenarios.
      exercises:
      - name: be going to Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'be going to' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: be going to Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'be going to' errors.
          Students identify and correct each error.
        duration: 15
      - name: be going to Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'be
          going to' structure.
        duration: 10
      - name: be going to Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'be going to'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I will visit my grandparents next week.'' (planned) Correct: ''I AM
      GOING TO visit my grandparents next week.'''
    - It's cold in here. — 'I WILL close the window.' (spontaneous decision)
