  verb_conjugation:
    interference_patterns:
    - pattern: All verbs treated as base form regardless of tense
      example_l1: 我昨天吃了一个苹果 (wǒ zuótiān chī le yī gè píngguǒ)
      example_gloss: I yesterday eat PERF one CLF apple
      example_wrong: I eated lunch.
      example_correct: I ATE lunch.
      explanation: Mandarin verbs never change form for tense. Time is indicated by
        aspect markers (了 le) and time words (昨天 zuótiān "yesterday"). English requires
        past tense inflection (-ed or irregular). Learners use base form because Mandarin
        has no verb conjugation.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Confusion between past simple and past participle forms
      example_l1: 他已经走了 (tā yǐjīng zǒu le)
      example_gloss: He already go PERF
      example_wrong: She have gone.
      example_correct: She HAS gone.
      explanation: Mandarin uses the perfective aspect marker 了 (le) to indicate completed
        action, not verb inflection. English requires past tense or present perfect
        with auxiliary + past participle. The concept of changing the verb form itself
        is foreign to Mandarin grammar.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Verb form errors compound with tense errors
      example_l1: 她去过中国 (tā qù guo zhōngguó)
      example_gloss: She go PERF China
      example_wrong: He don
      example_correct: He DOESN
      explanation: Mandarin uses the experiential aspect marker 过 (guo) to indicate
        past experience, with no verb change. English requires present perfect (have
        + past participle). Learners use base form "She go China" because the Mandarin
        verb 去 (qù) is invariable.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Mandarin verbs are invariable — no conjugation for tense, person,
      or number. English requires memorizing multiple verb forms.
    teacher_tips:
      how_to_explain: 'English has 5 verb forms minimum: base, -s, -ing, past, past
        participle. Practice each verb as a ''family''.'
      where_to_start: Start with irregular verbs (go→went→gone). Then regular verbs
        (walk→walked).
      exercises:
      - name: verb conjugation Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'verb conjugation' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: verb conjugation Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'verb conjugation' errors.
          Students identify and correct each error.
        duration: 15
      - name: verb conjugation Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'verb
          conjugation' structure.
        duration: 10
      - name: verb conjugation Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'verb conjugation'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I eated lunch.'' Correct: ''I ATE lunch.'''
    - 'Wrong: ''She have gone.'' Correct: ''She HAS gone.'''
    - 'Wrong: ''He don''t know.'' Correct: ''He DOESN''T know.'''
