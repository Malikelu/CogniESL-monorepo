  subject_verb_agreement:
    interference_patterns:
    - Third person singular -s consistently omitted
    - Plural -s added where not needed
    - Agreement errors with complex subjects
    why_it_happens: Mandarin verbs have zero inflection for person/number. English
      requires -s for 3rd person singular and plural marking.
    teacher_tips:
      how_to_explain: 'HE/SHE/IT → add -s to verb: ''He RUNS.'' All others → base
        form: ''I/You/We run.'''
      where_to_start: Conjugation drills for all persons with common verbs.
      exercises:
      - name: subject verb agreement Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'subject verb agreement' structure. Emphasize the structural
          difference between Mandarin and English.
        duration: 15
      - name: subject verb agreement Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'subject verb agreement'
          errors. Students identify and correct each error.
        duration: 15
      - name: subject verb agreement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subject
          verb agreement' structure.
        duration: 10
      - name: subject verb agreement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subject verb
          agreement' errors.
        duration: 15
    examples:
    - 'Wrong: ''She go to school.'' Correct: ''She GOES to school.'''
    - 'Wrong: ''They goes home.'' Correct: ''They GO home.'''
    - 'Wrong: ''It look good.'' Correct: ''It LOOKS good.'''
