  subordination_vs_coordination:
    interference_patterns:
    - Overuse of coordination (and, then) where subordination is expected
    - Chained simple sentences instead of complex ones
    - Misuse of subordinating conjunctions
    why_it_happens: Mandarin discourse is predominantly paratactic (coordinated).
