  verb_tense_past:
    interference_patterns:
    - pattern: Past tense marker -ed omitted on regular verbs (e.g., 'I walk to school
        yesterday' instead of 'I WALKED to school yesterday')
      example_l1: 我昨天去商店 (wǒ zuótiān qù shāngdiàn)
      example_gloss: I yesterday go store
      example_wrong: I walk to school yesterday.
      example_correct: I WALKED to school yesterday.
      explanation: Mandarin is a tenseless language — the verb 去 (qù "go") never changes
        form. Past time is indicated by time words (昨天 zuótiān "yesterday") and aspect
        markers (了 le). English requires past tense inflection on the verb itself.
        This is one of the most persistent errors for Mandarin speakers.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Irregular past forms consistently replaced with base form (e.g., 'She
        see the movie' instead of 'She SAW the movie')
      example_l1: 他上周买了一辆车 (tā shàng zhōu mǎi le yī liàng chē)
      example_gloss: He last week buy PERF one CLF car
      example_wrong: She see the movie.
      example_correct: She SAW the movie.
      explanation: Mandarin indicates past time through the perfective marker 了 (le)
        and time expressions, not verb inflection. English requires irregular past
        tense forms (bought, saw, went). Learners use base form "buy" because the
        Mandarin verb 买 (mǎi) is invariable.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Past tense confused with present perfect — learners use 'have + past'
        or bare past where simple past is required, or avoid past tense entirely when
        Mandarin would use the perfective particle 'le' (了)
      example_l1: 我去年在北京 (wǒ qùnián zài běijīng)
      example_gloss: I last-year at Beijing
      example_wrong: He don
      example_correct: He DIDN
      explanation: Mandarin does not mark tense on any verb, including 是 (shì "be").
        English requires "was/were" for past tense of "be". Learners use "I am in
        Beijing last year" because Mandarin 是 does not change for tense.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Overreliance on time adverbials (yesterday, last week) without verb
        morphology change — learners assume the time word alone marks past tense
      example_l1: 她昨天没来 (tā zuótiān méi lái)
      example_gloss: She yesterday not come
      example_wrong: The man who I meet yesterday is my teacher.
      example_correct: The man who I MET yesterday is my teacher.
      explanation: Mandarin negation with 没 (méi) + verb indicates past negation,
        but the verb form stays the same. English requires "did not come" with DO-support
        and base form. The entire English tense system requires restructuring of how
        Mandarin speakers conceptualize time reference.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Double past marking in negation — learners say 'He didn't went' or
        'He didn't came' because the auxiliary 'did' carries past tense but learners
        also mark the main verb
      example_l1: 我们上个月去了上海 (wǒmen shàng gè yuè qù le shànghǎi)
      example_gloss: We last CLF month go PERF Shanghai
      example_wrong: I have went to Beijing last year.
      example_correct: I WENT to Beijing last year.
      explanation: Mandarin uses 了 (le) as a perfective aspect marker, not a past
        tense marker. English requires simple past tense. Learners may overgeneralize
        了 as equivalent to English past tense, but still fail to conjugate the verb
        itself.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Past tense avoided in subordinate clauses even when the event is clearly
        completed (e.g., 'The man who I meet yesterday is my teacher' instead of 'The
        man who I MET yesterday is my teacher')
      example_l1: 他以前住在北京 (tā yǐqián zhù zài běijīng)
      example_gloss: He before live at Beijing
      example_wrong: She goed to the store.
      example_correct: She WENT to the store.
      explanation: Time expressions like 以前 (yǐqián "before/formerly") indicate past
        time in Mandarin without any verb change. English requires past tense "lived".
        The verb 住 (zhù) is invariable in Mandarin.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Regularization of irregular past forms (e.g., 'goed', 'seed', 'eated')
        — overapplication of the -ed rule when irregular forms are not yet acquired
      example_l1: 我昨天看见他了 (wǒ zuótiān kànjiàn tā le)
      example_gloss: I yesterday see him PERF
      example_wrong: I walk to school yesterday.
      example_correct: I WALKED to school yesterday.
      explanation: Mandarin 看见 (kànjiàn "see") does not change form for past tense.
        English requires irregular past tense "saw". The concept of suppletive irregular
        forms (go→went, see→saw) is particularly challenging because Mandarin has
        no equivalent.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Mandarin is a tenseless language — verbs never change form for
      tense. Time reference is established through context, time adverbials (昨天 zuótiān
      'yesterday', last week), and aspect particles like 'le' (了, perfective/completion)
      and 'guo' (过, experiential). The Mandarin aspect system maps poorly onto English
      tense system — 'le' can signal completion (mapped to past) or current relevance
      (mapped to present perfect), creating persistent confusion. Shi (2014) found
      that Mandarin speakers acquire English tense marking slowly and incompletely,
      with -ed omission rates remaining above 30% even at intermediate proficiency.
      Swan & Smith (2001) identify past tense omission as one of the most frequent
      and persistent errors for Mandarin L1 speakers. Li & Luk (2017) note that Mandarin's
      topic-prominent structure means learners often treat the time adverbial as a
      topic marker rather than a tense cue, leading to bare-verb constructions. The
      absence of verb morphology in Mandarin means learners must acquire both the
      concept of grammatical tense and its morphological realization simultaneously
      — a double cognitive burden that explains the high persistence of this error
      (Jia, 2003).
    teacher_tips:
      how_to_explain: English past tense is a MORPHOLOGY change, not just a time word.
        'Yesterday' tells us WHEN. The verb change (-ed or irregular) tells us it's
        PAST. Both are required. Mandarin uses time words alone — English does not.
      where_to_start: 'Timeline exercises: place events in past/present/future. Then
        drill verb changes WITHOUT time words (force morphological awareness).'
      sequencing: 'Week 1: Regular -ed with time adverbs. Week 2: Irregular past forms
        (top 20). Week 3: Past tense without time adverbs (morphology only). Week
        4: Past in narratives and subordinate clauses. Week 5: Past vs. present perfect
        contrast.'
      exercises:
      - name: Timeline Verb Morphology Drill
        type: controlled-writing
        description: 'Draw a timeline on the board with 8 events (4 past, 2 present,
          2 future). Give students base verbs only (go, eat, see, buy, make, write,
          break, speak). Students write one sentence per event using the correct verb
          form — NO time adverbs allowed. This forces morphological marking. Example:
          ''She WROTE a letter'' (not ''She wrote a letter YESTERDAY''). Peer checks
          verb forms.'
        duration: 20
      - name: Irregular Past Form Rapid Fire
        type: oral-drill
        description: Teacher says a base verb, students must produce the irregular
          past form within 3 seconds. Use the top 20 irregular verbs (go→went, see→saw,
          eat→ate, buy→bought, think→thought, write→wrote, speak→spoke, break→broke,
          make→made, take→took, come→came, give→gave, find→found, tell→told, feel→felt,
          leave→left, bring→brought, catch→caught, teach→taught, run→ran). Track accuracy
          on a class chart. Repeat 3 rounds, aiming for 90%+ accuracy.
        duration: 10
      - name: Error Correction — Mandarin Transfer Patterns
        type: error-correction
        description: 'Provide 20 sentences written with Mandarin-style past tense
          errors. Include all 7 interference patterns: -ed omission, irregular replacement,
          double past marking, adverb-only time reference, subordinate clause omission,
          regularization errors, and present perfect confusion. Students identify
          the error type, correct the sentence, and explain the Mandarin-English structural
          difference. Example errors: ''I walk to school yesterday'' (-ed omission),
          ''He didn''t went home'' (double past), ''The woman who I meet yesterday
          is nice'' (subordinate clause), ''I have went to Beijing last year'' (present
          perfect confusion).'
        duration: 20
      - name: Narrative Retelling with Past Tense Checklist
        type: speaking
        description: 'Read a short story (150 words) aloud that uses past tense throughout.
          Students retell the story in pairs, using a self-monitoring checklist: (1)
          Did I change the verb for past? (2) Did I use the correct irregular form?
          (3) Did I mark past in ALL clauses, not just the main clause? Teacher circulates
          and notes persistent error patterns for follow-up.'
        duration: 15
      - name: Mandarin-to-English Contrastive Translation
        type: translation
        description: Provide 10 Mandarin sentences — 5 with 'le' (了) marking completion
          (e.g., 我昨天买了一本书) and 5 with time adverbs but no aspect marker (e.g., 他上周去北京).
          Students translate each into English, explicitly deciding on simple past
          vs. present perfect. Class discusses where Mandarin 'le' maps to English
          past tense vs. present perfect, and where Mandarin has no verb change but
          English requires one.
        duration: 15
      - name: Past Tense in Subordinate Clauses
        type: sentence-completion
        description: Provide 10 sentence stems with subordinate clauses requiring
          past tense (e.g., 'The book that I ___ (read) last week was excellent',
          'The man who ___ (stand) outside is my uncle', 'After she ___ (finish) dinner,
          she went to bed'). Students complete with the correct past form. Focus on
          the pattern that past tense is required in ALL clauses, not just the main
          clause.
        duration: 10
    examples:
    - 'Wrong: ''I walk to school yesterday.'' Correct: ''I WALKED to school yesterday.'''
    - 'Wrong: ''She see the movie.'' Correct: ''She SAW the movie.'''
    - 'Wrong: ''He don''t went.'' Correct: ''He DIDN''T go.'''
    - 'Wrong: ''The man who I meet yesterday is my teacher.'' Correct: ''The man who
      I MET yesterday is my teacher.'''
    - 'Wrong: ''I have went to Beijing last year.'' Correct: ''I WENT to Beijing last
      year.'''
    - 'Wrong: ''She goed to the store.'' Correct: ''She WENT to the store.'''
