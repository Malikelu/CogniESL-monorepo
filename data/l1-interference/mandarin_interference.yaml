  prepositions_of_time:
    interference_patterns:
    - Confusion between 'in', 'on', 'at' for time expressions
    - Using time prepositions from Mandarin patterns
    - Omitting time prepositions entirely
    why_it_happens: Mandarin uses 'zai' for most time and place references. English
      differentiates 'in' (long periods), 'on' (days/dates), 'at' (specific times).
    teacher_tips:
      how_to_explain: AT = specific time (at 3pm, at noon). ON = days/dates (on Monday,
        on July 4th). IN = longer periods (in March, in 2020).
      where_to_start: Practice with calendar and clock visuals.
      exercises:
      - name: prepositions of time Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'prepositions of time' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: prepositions of time Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'prepositions of time'
          errors. Students identify and correct each error.
        duration: 15
      - name: prepositions of time Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'prepositions
          of time' structure.
        duration: 10
      - name: prepositions of time Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'prepositions
          of time' errors.
        duration: 15
    examples:
    - 'Wrong: ''I will meet you on Monday morning.'' Correct: ''I will meet you IN
      the morning.'' (general), ''ON Monday morning'' (specific day).'
    - 'Wrong: ''She arrived at 2023.'' Correct: ''She arrived IN 2023.'''
    - 'Wrong: ''The class starts on 8 o''clock.'' Correct: ''The class starts AT 8
      o''clock.'''
