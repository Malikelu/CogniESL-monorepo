  negation:
    interference_patterns:
    - pattern: Negation placed after auxiliary instead of between auxiliary and main
        verb
      example_l1: 我不喜欢咖啡 (wǒ bù xǐhuān kāfēi)
      example_gloss: I not like coffee
      example_wrong: I not can go.
      example_correct: I CAN not go.
      explanation: Mandarin negation uses 不 (bù) or 没 (méi) placed directly before
        the verb, with no auxiliary. English requires DO-support "do not like". Learners
        produce "I not like coffee" because Mandarin negation is simpler — just add
        不 before the verb.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: 'Double negation: ''I don''t have no money'''
      example_l1: 他没去学校 (tā méi qù xuéxiào)
      example_gloss: He not-go school
      example_wrong: He doesn
      example_correct: He DOESN
      explanation: Mandarin 没 (méi) negates past tense and perfective aspect, placed
        directly before the verb. English requires "did not go" with DO-support. Learners
        produce "He no go school" or "He not go school" by transferring the Mandarin
        negation pattern.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Omission of negation particle in contracted forms
      example_l1: 我不知道 (wǒ bù zhīdào)
      example_gloss: I not know
      example_wrong: I don
      example_correct: I don
      explanation: Mandarin 不 (bù) is placed directly before the main verb. English
        requires "I don't know" with DO-support. This is one of the first phrases
        learners acquire, yet the error "I not know" persists even at intermediate
        levels because the Mandarin pattern is so deeply ingrained.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Mandarin negation uses 'bu' before verbs or 'mei' for past, placed
      differently than English. English requires negation between auxiliary and main
      verb.
    teacher_tips:
      how_to_explain: 'In English, put NOT between the auxiliary and the main verb:
        ''I DO NOT like it.'' NOT after: ''I like NOT it.'''
      where_to_start: 'Practice: auxiliary + NOT + verb with common sentences.'
      exercises:
      - name: negation Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'negation' structure. Emphasize the structural difference between
          Mandarin and English.
        duration: 15
      - name: negation Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'negation' errors. Students
          identify and correct each error.
        duration: 15
      - name: negation Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'negation'
          structure.
        duration: 10
      - name: negation Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'negation' errors.
        duration: 15
    examples:
    - 'Wrong: ''I not can go.'' Correct: ''I CAN not go.'' / ''I CAN''T go.'''
    - 'Wrong: ''He doesn''t comes.'' Correct: ''He DOESN''T come.'''
    - 'Wrong: ''I don''t have no pen.'' Correct: ''I don''t have a pen.'''
