  provided_that:
    interference_patterns:
    - '''Provided that'' confused with ''if'' or ''unless'''
    - Formal conditional connectors avoided
    - Difference between 'provided that' and 'providing that' unclear
    why_it_happens: Mandarin uses 'ruguo' or 'zhiyaohu' for condition. English has
      'provided that' as a formal conditional with specific nuance.
    teacher_tips:
      how_to_explain: '''PROVIDED THAT'' = on the condition that. Formal. ''You can
        go PROVIDED THAT you finish your homework first.'''
      where_to_start: Compare with 'if' and 'as long as'.
      exercises:
      - name: provided that Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'provided that' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: provided that Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'provided that' errors.
          Students identify and correct each error.
        duration: 15
      - name: provided that Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'provided
          that' structure.
        duration: 10
      - name: provided that Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'provided that'
          errors.
        duration: 15
    examples:
    - '''You can borrow the car PROVIDED THAT you return it by 6pm.'''
    - 'Similar to ''as long as'': ''You can borrow the car AS LONG AS you return it
      by 6pm.'''
