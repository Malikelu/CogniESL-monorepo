  question_forms:
    interference_patterns:
    - Failure to invert subject and auxiliary in yes/no questions
    - Using rising intonation with SVO word order instead of inversion
    - Wh-questions retain wh-word in subject position incorrectly
    why_it_happens: Mandarin forms questions by adding 'ma' particle at end or using
      intonation — no word order change needed. English requires subject-auxiliary
      inversion.
    teacher_tips:
      how_to_explain: 'Questions INVERT: ''He is'' → ''IS he?'' Practice flipping
        subject and auxiliary.'
      where_to_start: 'Yes/no questions: take statements and invert. Then practice
        Wh- questions.'
      exercises:
      - name: question forms Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'question forms' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: question forms Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'question forms' errors.
          Students identify and correct each error.
        duration: 15
      - name: question forms Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'question
          forms' structure.
        duration: 10
      - name: question forms Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'question forms'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''You like coffee?'' Correct: ''DO you like coffee?'''
    - 'Wrong: ''Where he went?'' Correct: ''Where DID he go?'''
    - 'Wrong: ''What you want?'' Correct: ''What DO you want?'''
