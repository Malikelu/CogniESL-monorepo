  copula_omission:
    interference_patterns:
    - Omission of 'be' in present and past tense forms
    - 'Consistent pattern across all sentence types: affirmative, negative, question'
    - 'Learners produce telegram-style English: ''Yesterday I go school'''
    why_it_happens: Mandarin allows topic-comment sentences without any verb. English
      requires copula in all tensed clauses.
    teacher_tips:
      how_to_explain: Every English sentence needs a verb. If the main verb is missing,
        add 'am/is/are/was/were'.
      where_to_start: 'Error log exercise: students track copula omission in their
        own writing.'
      exercises:
      - name: copula omission Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'copula omission' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: copula omission Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'copula omission' errors.
          Students identify and correct each error.
        duration: 15
      - name: copula omission Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'copula
          omission' structure.
        duration: 10
      - name: copula omission Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'copula omission'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''This book interesting.'' Correct: ''This book IS interesting.'''
    - 'Wrong: ''Last year I student.'' Correct: ''Last year I WAS a student.'''
    - 'Wrong: ''The weather nice today.'' Correct: ''The weather IS nice today.'''
