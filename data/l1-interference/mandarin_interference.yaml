        description: Students create 5 original sentences using correct English 'modals'
          structure.
        duration: 10
      - name: modals Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'modals' errors.
        duration: 15
    examples:
    - 'Wrong: ''You must see the doctor.'' (when giving advice). Correct: ''You SHOULD
      see the doctor.'''
    - 'Wrong: ''It will rain tomorrow.'' (speculation). Correct: ''It MIGHT rain tomorrow.'''
