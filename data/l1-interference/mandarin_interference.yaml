      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: She has arrived
        yesterday.'
      example_wrong: She has arrived yesterday.
      example_correct: She ARRIVED yesterday.
      explanation: Mandarin uses 'le' (completed aspect) for both present perfect
        and simple past contexts. The English distinction between past events with
        present relevance vs. completed past is unfamiliar.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: '''Already'' and ''yet'' used incorrectly due to L1 transfer'
      example_l1: 中文例子 (zhōngwén lìzi)
