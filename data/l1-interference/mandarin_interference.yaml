        description: Students create 5 original sentences using correct English 'inversion
          negative' structure.
        duration: 10
      - name: inversion negative Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'inversion negative'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I never have been to Australia.'' Correct (formal): ''NEVER HAVE I
      been to Australia.'''
    - 'Correct: ''Rarely does she complain.'''
    - 'Wrong: ''Not only he likes coffee.'' Correct: ''Not only DOES he like coffee...'''
