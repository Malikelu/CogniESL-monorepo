        description: Students create 5 original sentences using correct English 'countable
          uncountable' structure.
        duration: 10
      - name: countable uncountable Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'countable uncountable'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I have many homeworks.'' Correct: ''I have a lot of HOMEWORK.'''
