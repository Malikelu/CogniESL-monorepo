  participial_clauses:
    interference_patterns:
    - Present and past participle clauses confused
    - 'Dangling participles: ''Walking down the street, the tree caught my eye'''
    - Participle clause subjects don't match main clause subjects
    why_it_happens: Mandarin doesn't use participial clauses. Relative or adverbial
      clauses are used instead, leading to confusion about English participial constructions.
    teacher_tips:
      how_to_explain: Participial clause subject MUST match main clause subject. 'WHILE
        WALKING down the street, I SAW a tree.' Not 'the tree caught my eye.'
      where_to_start: Practice matching subjects between participial and main clauses.
      exercises:
      - name: participial clauses Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'participial clauses' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: participial clauses Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'participial clauses'
          errors. Students identify and correct each error.
        duration: 15
      - name: participial clauses Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'participial
          clauses' structure.
        duration: 10
      - name: participial clauses Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'participial
          clauses' errors.
        duration: 15
    examples:
    - 'Wrong: ''Running down the street, the dog chased me.'' (who''s running?). Correct:
      ''Running down the STREET, I SAW a dog chasing me.'''
    - '''Having finished dinner, the dishes were washed by me.'' → ''HAVING FINISHED
      dinner, I WASHED the dishes.'''
    - 'Wrong: ''Opening the book, the page was torn.'' Correct: ''Opening the book,
      I FOUND the page was torn.'''
