      writing requires hedging to show epistemic caution.
    teacher_tips:
      how_to_explain: 'Hedging = showing uncertainty politely. Use: ''It seems that...'',
        ''It is likely that...'', ''This suggests that...'''
      where_to_start: Rewrite absolute statements as hedged ones.
      exercises:
      - name: hedging Contrastive Drill
