  would_rather:
    interference_patterns:
    - pattern: Mandarin 'yinggai' used for preference where 'would rather' expected
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I would rather
        to go.'
      example_wrong: I would rather to go.
      example_correct: I would rather GO.
      explanation: Mandarin doesn't have a direct equivalent for 'would rather.' 'Yinggai'
        (should) is used instead, losing the preference nuance.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    - pattern: Subjunctive after 'would rather' not produced
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I would rather
        to go.'
      example_wrong: I would rather to go.
      example_correct: I would rather GO.
      explanation: Mandarin doesn't have a direct equivalent for 'would rather.' 'Yinggai'
        (should) is used instead, losing the preference nuance.
      frequency: 2
      persistence: 3
      communicative_impact: 1
    - pattern: '''Would rather to + verb'' instead of bare infinitive'
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I would rather
        to go.'
      example_wrong: I would rather to go.
      example_correct: I would rather GO.
      explanation: Mandarin doesn't have a direct equivalent for 'would rather.' 'Yinggai'
        (should) is used instead, losing the preference nuance.
      frequency: 2
