        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'run on sentences comma
          splice' errors. Students identify and correct each error.
        duration: 15
      - name: run on sentences comma splice Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'run
          on sentences comma splice' structure.
        duration: 10
      - name: run on sentences comma splice Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'run on sentences
          comma splice' errors.
        duration: 15
    examples:
