  second_conditional:
    interference_patterns:
    - pattern: 'Using ''would'' in the if-clause: ''If I would have...'''
      example_l1: 如果我有钱，我就去中国 (rúguǒ wǒ yǒu qián, wǒ jiù qù zhōngguó)
      example_gloss: If I have money, I then go China
      example_wrong: If I was you, I would study harder.
      example_correct: If I WERE you, I would study harder.
      explanation: Mandarin does not grammatically distinguish real and unreal conditionals
        — the same structure is used for both. English requires past tense in the
        if-clause and "would" in the main clause for unreal conditions. Learners use
        present tense for both because Mandarin makes no such distinction.
