  copula_be:
    interference_patterns:
    - Mandarin copula 'shi' is optional; learners omit 'is/am/are' in English
    - '''He teacher'' instead of ''He IS a teacher'''
    - Omission increases with speaking speed and informality
    - Learners omit 'be' before adjective predicates (e.g., ''She very happy'' instead
      of ''She IS very happy'')
    - Overinsertion of 'be' in progressive contexts (e.g., 'He is go to school' instead
      of 'He is GOING to school')
    why_it_happens: 'Mandarin predicate nominals require no copula: ''Ta lao shi''
      (He is old) or ''Ta shi lao shi'' (He is a teacher). English requires ''be''
      before adjective and noun complements. Mandarin also lacks a progressive aspect
      marked by ''be + -ing'', leading to both omission and overinsertion patterns.'
    teacher_tips:
      how_to_explain: In English, you MUST say 'He IS smart.' The word 'is' connects
        the subject to the description. Every English sentence needs a verb — if there
        is no other verb, 'be' is required.
      where_to_start: 'Drill: Subject + IS/AM/ARE + every sentence. Accept no sentence
        without a verb.'
      sequencing: 'Week 1: Identify missing copula in written sentences. Week 2: Oral
        drills with picture description (forced copula use). Week 3: Error correction
        of own writing. Week 4: Spontaneous speech with copula checklist.'
      exercises:
      - 'Copula insertion drill: Provide 20 Mandarin-style sentences without copula
        (e.g., ''She happy'', ''They students'', ''The weather cold today''). Students
        insert the correct form of ''be'' (am/is/are/was/were) and identify the subject-complement
        relationship. Include present and past tense contexts.'
      - 'Picture description with forced copula: Show 10 images (people, places, weather,
        emotions). Students must describe each using at least one copula sentence.
        Peer checks that every sentence contains a verb. Example: ''The woman IS a
        doctor. She IS tired. The office IS small.'''
      - 'Error correction journal: Students write a 150-word paragraph about their
        family or daily routine. Peer review focuses exclusively on copula use — both
        omissions and overinsertions. Each student must find and correct at least
        3 copula errors in their partner''s writing, citing the specific rule violated.'
      - 'Sentence transformation: Give 10 affirmative sentences with copula (e.g.,
        ''She IS a teacher''). Students transform into negative (''She ISN''T a teacher'')
        and question forms (''IS she a teacher?''). Then give 10 copula-less sentences
        and students add the copula before transforming. This reinforces that the
        copula is the auxiliary for negation and questions.'
      - 'Listening gap-fill: Play an audio recording of a short monologue (60 seconds)
        that includes 8 copula sentences. Students fill in the missing ''be'' forms.
        Then students record their own 30-second monologue about a topic, and self-check
        for copula accuracy using a checklist.'
    examples:
    - 'Wrong: ''She happy today.'' Correct: ''She IS happy today.'''
    - 'Wrong: ''My father doctor.'' Correct: ''My father IS a doctor.'''
    - 'Wrong: ''They from China.'' Correct: ''They ARE from China.'''
    - 'Wrong: ''He very tall.'' Correct: ''He IS very tall.'''
    - 'Wrong: ''She is go to school.'' Correct: ''She IS GOING to school.'''
    frequency: 5
    persistence: 5
    communicative_impact: 5
    source_type: peer-reviewed
