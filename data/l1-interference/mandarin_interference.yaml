  coordinating_conjunctions:
    interference_patterns:
    - Overuse of 'and' for all coordinating functions
    - But/so/or used interchangeably
    - Conjunctions placed at wrong positions in complex sentences
    why_it_happens: Mandarin conjunctions (he, dan shi, suo yi, huo zhe) don't map
      cleanly to English coordinating conjunctions. 'He' covers both 'and' and 'but'
      in some contexts.
