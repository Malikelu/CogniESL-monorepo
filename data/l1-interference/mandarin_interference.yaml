  definite_article:
    interference_patterns:
    - '''The'' omitted before specific references'
    - '''The'' used for general/universal statements'
    - Second mention not recognized as requiring 'the'
    why_it_happens: Mandarin has no article system. Learners struggle to identify
      when the listener shares knowledge (definite reference) vs. introducing new
      information.
    teacher_tips:
      how_to_explain: '''THE'' = you and listener BOTH know which one. First mention:
        usually no ''the''. Second mention: usually ''THE''.'
      where_to_start: Practice with picture descriptions introducing then referring
        back to objects.
      exercises:
      - name: definite article Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'definite article' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
