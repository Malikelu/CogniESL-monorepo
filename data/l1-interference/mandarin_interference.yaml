    interference_patterns:
    - Existential 'there is/are' omitted or replaced with personal subject
    - '''It is many people in the room'' instead of ''There are many people'''
    - Confusion between 'there is' and 'it is'
    why_it_happens: Mandarin uses 'you' (有) for existence but often omits it in topic-comment
      structures. English requires explicit 'there' as a dummy subject for existential
      constructions.
