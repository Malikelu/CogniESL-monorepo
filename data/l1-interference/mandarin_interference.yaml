  time_tense_mismatch:
    interference_patterns:
    - pattern: Present tense used for past events when a time adverbial is present
        (e.g., 'Yesterday I go to school' instead of 'Yesterday I WENT to school')
        — learners treat the time word as sufficient and leave the verb unmarked
      example_l1: 明天我去商店 (míngtiān wǒ qù shāngdiàn)
      example_gloss: Tomorrow I go store
      example_wrong: Tomorrow I go to the store.
      example_correct: Tomorrow I WILL go to the store.
      explanation: Mandarin uses the same verb form for all time references — 去 (qù
        "go") is used for present, past, and future. English requires "will go" for
        future time. Learners use base form with time words because Mandarin grammar
        does not require tense marking.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Future time expressed with present tense + time adverbial, omitting
        'will' or 'going to' (e.g., 'Tomorrow I go to the store' instead of 'Tomorrow
        I WILL go to the store')
      example_l1: 下个月我毕业 (xià gè yuè wǒ bìyè)
      example_gloss: Next CLF month I graduate
      example_wrong: Last week I visit my grandmother.
      example_correct: Last week I VISITED my grandmother.
      explanation: Mandarin indicates future time through time expressions (下个月 xià
        gè yuè "next month") without verb changes. English requires "will graduate"
        or "am going to graduate". The concept of a grammatical future tense is absent
        from Mandarin.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Past tense avoided in narratives even with sequential past events —
        learners use base verbs throughout, relying on context to convey time
      example_l1: 昨天我去公园 (zuótiān wǒ qù gōngyuán)
      example_gloss: Yesterday I go park
      example_wrong: When I was child, I play outside.
      example_correct: When I was a child, I PLAYED outside.
      explanation: Mandarin time words (昨天 zuótiān "yesterday") carry the temporal
        meaning, so the verb stays in base form. English requires past tense "went".
        This error is extremely common and persistent because the Mandarin strategy
        of using time words is deeply ingrained.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Tense choice driven by aspectual meaning (completion, duration) rather
        than temporal location — Mandarin 'le' (了) maps to both past and present perfect,
        causing inconsistent tense selection
      example_l1: 现在我在学习 (xiànzài wǒ zài xuéxí)
      example_gloss: Now I PROG study
      example_wrong: Yesterday she goes to school.
      example_correct: Yesterday she WENT to school.
      explanation: Mandarin uses 在 (zài) as a progressive marker but does not require
        auxiliary "be" or verb inflection. English requires "am studying" with both
        auxiliary and -ing. Learners produce "I studying" or "I am study" because
        Mandarin progressive marking is simpler.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Overuse of present tense for habitual/general statements extended to
        specific past events (e.g., 'Every day I played outside' instead of 'I played
        outside yesterday')
      example_l1: 我每天六点起床 (wǒ měitiān liù diǎn qǐchuáng)
      example_gloss: I every-day six o'clock get-up
      example_wrong: I will go to school every day.
      example_correct: I GO to school every day.
      explanation: Mandarin present tense is unmarked — the verb 起床 (qǐchuáng "get
        up") is the same for all tenses. English requires present simple "get up"
        (or "gets up" for 3rd person). While the forms may coincide, the underlying
        grammatical concept of tense marking is absent.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Future marker 'will' overinserted in present-tense contexts due to
        hypercorrection (e.g., 'I will go to school every day' for habitual present)
      example_l1: 他下周要去北京 (tā xià zhōu yào qù běijīng)
      example_gloss: He next week will go Beijing
      example_wrong: Tomorrow I go to the store.
      example_correct: Tomorrow I WILL go to the store.
      explanation: Mandarin uses 要 (yào "will/want") as a pre-verbal marker for future,
        similar to English "will". However, the verb 去 (qù) still does not change
        form. English requires "will go" — learners may produce "He will goes" by
        overgeneralizing 3rd person -s to modal constructions.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Mandarin is a tenseless language — verbs never change form for
      tense. Time reference is established through context, time adverbials (昨天 zuótiān
      'yesterday', 明天 míngtiān 'tomorrow'), and aspect particles like 'le' (了, perfective/completion)
      and 'zhe' (着, durative). The Mandarin aspect system maps poorly onto the English
      tense system — 'le' can signal completion (mapped to past) or current relevance
      (mapped to present perfect), creating persistent confusion. Shi (2014) found
      that Mandarin speakers acquire English tense marking slowly and incompletely,
      with tense errors remaining above 30% even at intermediate proficiency. Swan
      & Smith (2001) identify time-tense mismatch as one of the most frequent errors
      for Mandarin L1 speakers, noting that learners consistently rely on time adverbials
      as the sole marker of time reference. Li & Luk (2017) explain that Mandarin's
      topic-prominent structure leads learners to treat time adverbials as topic markers
      rather than tense cues, producing bare-verb constructions. Jia (2003) found
      that Mandarin speakers must acquire both the concept of grammatical tense and
      its morphological realization simultaneously — a double cognitive burden that
      explains the high persistence of this error. Yang (2002) documented that Chinese
      learners' acquisition of English tense-aspect is characterized by prolonged
      reliance on pragmatic and contextual cues rather than morphological marking.
    teacher_tips:
      how_to_explain: 'English requires TWO signals for time: the time word (yesterday,
        tomorrow) AND the verb change. Mandarin only uses the time word. In English,
        ''Yesterday I WENT'' — both ''yesterday'' AND ''went'' mark past. If you say
        ''Yesterday I go,'' the listener hears present tense because the verb didn''t
        change. Train students to always check: Did the verb change? Is the time word
        there? Both are required.'
      where_to_start: 'Timeline exercises: place events in past/present/future. Then
        drill verb changes WITHOUT time adverbs (force morphological awareness). Finally,
        combine both signals.'
      sequencing: 'Week 1: Match time expressions to tenses (yesterday→past, tomorrow→future,
        every day→present). Week 2: Drill verb changes without time adverbs. Week
        3: Combine time adverbials + correct verb form. Week 4: Narrative writing
        with tense consistency. Week 5: Error correction of own writing.'
      exercises:
      - name: Time-Tense Matching Drill
        type: controlled-writing
        description: Provide 20 time adverbials (yesterday, tomorrow, every day, last
          week, now, next month, etc.) and 10 base verbs. Students create one sentence
          per time adverbial using the correct tense. NO time adverb may be used without
          the corresponding verb morphology change. Peer checks both signals are present.
        duration: 15
      - name: Tense Without Time Words
        type: sentence-rewrite
        description: Provide 15 sentences with time adverbials but base-form verbs
          (e.g., 'Yesterday she go to the market'). Students must first REMOVE the
          time adverbial, then rewrite the sentence with correct verb morphology alone.
          This forces morphological awareness. Then students add the time adverbial
          back and verify both signals match.
        duration: 15
      - name: Mandarin-to-English Contrastive Translation
        type: translation
        description: Provide 12 Mandarin sentences — 4 with past time reference (e.g.,
          我昨天去北京), 4 with future time reference (e.g., 明天我要去上海), and 4 with habitual
          present (e.g., 我每天去学校). Students translate each into English, explicitly
          deciding on the tense and verb form. Class discusses where Mandarin has
          no verb change but English requires one.
        duration: 15
      - name: Narrative Tense Consistency Check
        type: speaking
        description: Students tell a 1-minute story about a past event (e.g., 'My
          last vacation'). Listener uses a checklist to track tense consistency —
          marking each verb as correct tense or error. After the story, the listener
          provides feedback on all tense errors. Roles switch. Teacher circulates
          and notes persistent patterns.
        duration: 15
      - name: Error Correction — Time-Tense Mismatch Patterns
        type: error-correction
        description: Provide 20 sentences with Mandarin-style time-tense mismatch
          errors covering all 6 interference patterns. Students identify the error
          type, correct the sentence, and explain the Mandarin-English structural
          difference. Example errors include future-with-present ('Tomorrow I go to
          the store'), past-with-present ('Yesterday she goes to school'), will overinsertion
          ('I will go to school every day'), and past-with-base-form ('Last week I
          meet my friend).
        duration: 20
    examples:
    - 'Wrong: ''Tomorrow I go to the store.'' Correct: ''Tomorrow I WILL go to the
      store.'''
    - 'Wrong: ''Last week I visit my grandmother.'' Correct: ''Last week I VISITED
      my grandmother.'''
    - 'Wrong: ''When I was child, I play outside.'' Correct: ''When I was a child,
      I PLAYED outside.'''
    - 'Wrong: ''Yesterday she goes to school.'' Correct: ''Yesterday she WENT to school.'''
    - 'Wrong: ''I will go to school every day.'' (habitual) Correct: ''I GO to school
      every day.'''
