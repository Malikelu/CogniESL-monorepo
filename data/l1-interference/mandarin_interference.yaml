  negation_placement:
    interference_patterns:
    - pattern: Negative adverbials placed incorrectly in the sentence
      example_l1: 他什么都不知道 (tā shénme dōu bù zhīdào)
      example_gloss: He what all not know
      example_wrong: I never went to Beijing.
      example_correct: I have NEVER been to Beijing.
      explanation: Mandarin uses 什么...都不 (shénme...dōu bù "what...all not") for emphatic
        negation. English requires "He doesn't know anything" with DO-support and
        "anything" (not "nothing"). The double negation pattern in Mandarin transfers
        to English.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: '''Never I have seen this'' instead of ''I have never seen this'''
      example_l1: 我不喜欢也不讨厌 (wǒ bù xǐhuān yě bù tǎoyàn)
      example_gloss: I not like also not dislike
      example_wrong: Rarely he goes out.
      example_correct: He RARELY goes out.
      explanation: Mandarin coordinates negated verbs with 也 (yě "also") + 不 (bù).
        English requires "I don't like or dislike" with DO-support on the first verb
        only. The coordination pattern differs significantly.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Position of negation varies with different sentence constructions
      example_l1: 他没说也没做 (tā méi shuō yě méi zuò)
      example_gloss: He not-say also not-do
      example_wrong: Not she likes coffee.
      example_correct: She does NOT like coffee.
      explanation: Mandarin negates each verb independently with 没 (méi). English
        requires "He didn't say or do anything" with DO-support. The pattern of negating
        each verb separately transfers from Mandarin.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Mandarin allows flexible placement of negative elements like 'cong
      mei' and 'cong bu'. English has stricter rules about negative adverb placement.
    teacher_tips:
      how_to_explain: 'Place negative adverbs (never, rarely, seldom) AFTER the first
        auxiliary: ''I HAVE NEVER seen.'''
      where_to_start: Practice with common negative adverbs and simple past/present
        perfect.
      exercises:
      - name: negation placement Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'negation placement' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: negation placement Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'negation placement'
          errors. Students identify and correct each error.
        duration: 15
      - name: negation placement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'negation
          placement' structure.
        duration: 10
      - name: negation placement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'negation placement'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I never went to Beijing.'' Correct: ''I have NEVER been to Beijing.'''
    - 'Wrong: ''Rarely he goes out.'' Correct: ''He RARELY goes out.'''
    - 'Wrong: ''Not she likes coffee.'' Correct: ''She does NOT like coffee.'''
