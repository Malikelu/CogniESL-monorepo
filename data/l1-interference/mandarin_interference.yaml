        and books. Plurality is expressed analytically through number words, quantifiers,
        or simply inferred from context. Mandarin also lacks the count/mass noun distinction
        that governs English pluralizability. Classifiers serve a categorization function
        but do not map '
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Plural -s omitted after quantifiers and number words even when the
        noun requires it (three cat, several student) -- the quantifier is perceived
        as sufficient marking
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: The childs are
        playing.'
      example_wrong: The childs are playing.
      example_correct: The CHILDREN are playing.
      explanation: 'Mandarin nouns are completely invariable for number. There is
