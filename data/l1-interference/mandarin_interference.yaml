        description: Provide 15 sentences with Mandarin-style 'reported speech' errors.
          Students identify and correct each error.
        duration: 15
      - name: reported speech Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'reported
          speech' structure.
        duration: 10
      - name: reported speech Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'reported speech'
          errors.
        duration: 15
