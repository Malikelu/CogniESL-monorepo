  relative_pronouns:
    interference_patterns:
    - Confusion between who/whom, which/that, where/when
    - Omitting relative pronouns where English requires them
    - Using 'which' for people instead of 'who'
    why_it_happens: Mandarin has no relative pronouns. English selects among who,
      whom, which, that, where, when based on antecedent and clause function.
    teacher_tips:
      how_to_explain: WHO/WHOM = people. WHICH = things. WHERE = places. WHEN = times.
        THAT = people or things (informal).
      where_to_start: Practice replacing underlined nouns in sentences with relative
        clauses.
