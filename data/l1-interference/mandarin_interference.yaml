  modal_verbs:
    interference_patterns:
    - pattern: Limited use of modal verbs; 'yao' used for all modal meanings
      example_l1: 我可以进来吗？(wǒ kěyǐ jìnlái ma?)
      example_gloss: I can enter Q
      example_wrong: I can to go there.
      example_correct: I CAN go there.
      explanation: Mandarin 可以 (kěyǐ "can/may") is placed directly before the main
        verb with no inflection. English modals also precede the main verb, which
        makes this seem similar. However, English modals have no -s form, no infinitive,
        and require specific patterns for past/present that differ from Mandarin.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Confusion between 'can', 'could', 'may', 'might'
      example_l1: 你应该去 (nǐ yīnggāi qù)
      example_gloss: You should go
      example_wrong: You mustn
      example_correct: You MUSTN
      explanation: Mandarin modals (应该 yīnggāi "should", 可以 kěyǐ "can", 必须 bìxū "must")
        are placed before the main verb, similar to English. However, Mandarin modals
        can be negated directly (不应该 bù yīnggāi "should not"), while English requires
        "should not" with the modal before "not".
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Modal verb omission in formal writing
      example_l1: 他必须来 (tā bìxū lái)
      example_gloss: He must come
      example_wrong: I can to go there.
      example_correct: I CAN go there.
      explanation: Mandarin 必须 (bìxū "must") covers both obligation and necessity,
        similar to English "must". However, English "must" has no past tense form
        and "had to" is used instead. Mandarin 必须 is used for all tenses. Learners
        overuse "must" for past obligation.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Mandarin uses few modal verbs. Concepts of permission, possibility,
      and obligation are expressed differently through context, particles, or aspect
      markers rather than modals.
    teacher_tips:
      how_to_explain: 'English modals have distinct meanings: CAN=ability, MAY=permission,
        MUST=obligation, MIGHT=possibility. Practice each separately.'
      where_to_start: Start with can/may/must, then add could/might/would.
      exercises:
      - name: modal verbs Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'modal verbs' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: modal verbs Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'modal verbs' errors.
          Students identify and correct each error.
        duration: 15
      - name: modal verbs Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'modal
          verbs' structure.
        duration: 10
      - name: modal verbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'modal verbs'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I can to go there.'' Correct: ''I CAN go there.'''
    - 'Wrong: ''May I borrow your pen?'' → learner says: ''Can I borrow your pen?''
      (acceptable but less formal)'
    - 'Wrong: ''You mustn''t to worry.'' Correct: ''You MUSTN''T worry.'''
