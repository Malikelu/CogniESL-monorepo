  present_perfect_vs_past:
    interference_patterns:
    - Present perfect not used; simple past substituted
    - '''I have eaten'' produced as ''I ate'' or ''I am eaten'''
    - Confusion about when to use 'have gone' vs 'went'
    why_it_happens: Mandarin has no direct equivalent to present perfect. The past
      tense particle 'le' has broader usage and doesn't distinguish past vs. present
      relevance.
    teacher_tips:
      how_to_explain: Present perfect = past action WITH present relevance. 'I HAVE
        eaten (so I'm not hungry).' Simple past = finished event. 'I ATE lunch (at
        noon).'
      where_to_start: Practice with 'since' and 'for' (present perfect).
      exercises:
      - name: present perfect vs past Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'present perfect vs past' structure. Emphasize the structural
          difference between Mandarin and English.
        duration: 15
