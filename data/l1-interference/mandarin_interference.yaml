  present_continuous:
    interference_patterns:
    - pattern: Present continuous not used; simple present substituted for ongoing
        actions
      example_l1: 我在吃饭 (wǒ zài chīfàn)
      example_gloss: I PROG eat-rice
      example_wrong: I eat lunch now.
      example_correct: I AM EATING lunch now.
      explanation: Mandarin uses 在 (zài) as a progressive marker before the verb.
        English requires "be + -ing". Learners produce "I eating" (omitting "be")
        because 在 alone marks the progressive without an auxiliary. The English requirement
        for both auxiliary AND verb inflection is more complex.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of present continuous for habitual actions
      example_l1: 他在看书 (tā zài kànshū)
      example_gloss: He PROG read-book
      example_wrong: She is always complaining.
      example_correct: She always COMPLAINS.
      explanation: Mandarin 在 (zài) + verb is sufficient for progressive meaning.
        English requires "is reading" with both auxiliary and -ing. Learners may produce
        "He reading" or "He is read" because the Mandarin system only requires one
        marker.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Confusion between '-ing' for progressive vs. gerund
      example_l1: 我在吃饭 (wǒ zài chīfàn)
      example_gloss: 'Literal gloss reflecting Mandarin structure: He is teaching
        English for 10 years.'
      example_wrong: He is teaching English for 10 years.
      example_correct: He HAS TAUGHT English for 10 years.
      explanation: Mandarin does not distinguish between simple and progressive aspects.
        The '-zai' particle marks ongoing action but doesn't change verb form as English
        does.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Mandarin does not distinguish between simple and progressive aspects.
      The '-zai' particle marks ongoing action but doesn't change verb form as English
      does.
    teacher_tips:
      how_to_explain: Present continuous = RIGHT NOW. 'I AM EATING lunch.' Simple
        present = habits. 'I EAT lunch at noon.'
      where_to_start: Act out actions happening now vs. describe routines.
      exercises:
