    interference_patterns:
    - Mandarin vowel system transferred to English
    - Failure to reduce unstressed vowels to schwa
    - Consistent full-vowel pronunciation in unstressed syllables
    why_it_happens: Mandarin vowels are full in all positions. English schwa /ə/ in
