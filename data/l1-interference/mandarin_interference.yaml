  subordinating_conjunctions:
    interference_patterns:
    - Subordinating conjunctions confused with coordinating conjunctions
    - '''Although'' used where ''because'' is needed'
    - Clause order errors when using subordinating conjunctions
    why_it_happens: Mandarin subordinators (suiran, yinwei, ru guo) correspond loosely
      to English ones. 'Suiran' (although) and 'yinwei' (because) can be confused.
    teacher_tips:
      how_to_explain: BECAUSE = cause. ALTHOUGH = concession. IF/WHEN = condition.
        THEY CANNOT be swapped.
      where_to_start: Practice each subordinator with sentence frames.
      exercises:
      - name: subordinating conjunctions Contrastive Drill
