    - pattern: Two independent clauses joined by comma without conjunction
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: It is late, we
        should go home.'
      example_wrong: It is late, we should go home.
      example_correct: It is late; we should go home.
      explanation: Mandarin allows longer unpunctuated sentences and topic chaining.
        English requires proper punctuation between independent clauses.
      frequency: 2
      persistence: 3
      communicative_impact: 2
    - pattern: 'Comma splice: ''It is late, we should go home'''
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I like coffee,
        she likes tea.'
      example_wrong: I like coffee, she likes tea.
      example_correct: I like coffee. She likes tea.
      explanation: Mandarin allows longer unpunctuated sentences and topic chaining.
        English requires proper punctuation between independent clauses.
