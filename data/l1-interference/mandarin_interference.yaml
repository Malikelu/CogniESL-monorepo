      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
    - claim: Articles do not exist as a grammatical category in Chinese; misuse of
        articles is one of the most difficult areas for Chinese EAL learners (Luk
        & Shirai, 2009, cited in Li & Luk)
      source: 'Li & Luk (2017) ''Chinese-English Contrastive Grammar: An Introduction'',
        Hong Kong University Press'
      location: 'Chapter 6: Determiners: Articles and Demonstratives'
      tier: 1
  a_an_the:
    interference_patterns:
    - Confusion between 'a' and 'the' in first vs subsequent mention
    - Indefinite article 'a/an' omitted before singular count nouns
    - Article insertion before proper nouns and uncountable nouns
    - Overuse of 'the' for generic reference (e.g., 'THE dogs are loyal' for 'Dogs
      are loyal')
    - Mandarin classifier system (e.g., 一本书 yi ben shu) misanalyzed as equivalent
      to English 'a', leading to article overgeneralization with classifiers but omission
      elsewhere
    why_it_happens: Mandarin nouns are bare — no determiner system. The a/an/the distinction
      requires understanding of noun countability and specificity. Mandarin uses classifiers
      (本, 张, 个) with numerals but these do not map onto English articles. Definiteness
      is inferred from word order and context rather than grammatical marking.
    teacher_tips:
      how_to_explain: Use 'a' when introducing something new. Use 'the' when referring
        back to something already mentioned. Zero article for general statements about
        whole categories (Dogs are loyal = all dogs).
      where_to_start: 'Story-telling exercise: introduce characters with ''a'', then
        refer back with ''the''.'
      exercises:
      - 'Article decision tree: Give students a flowchart — (1) Is it a general statement
        about a category? → zero article. (2) Is it the first time mentioning something?
        → a/an. (3) Has it been mentioned before or is it unique? → the. Students
        apply the flowchart to 25 sentences covering concrete nouns, abstract nouns,
        proper nouns, and uncountables.'
      - 'Translation contrast: Provide 10 Mandarin sentences with classifiers (e.g.,
        我有一本书) and 10 without (e.g., 他是老师). Students translate to English, explicitly
        deciding on a/an/the/zero for each. Class discusses where Mandarin has no
        article equivalent and where English requires one.'
      - 'Error correction journal: Students write a 150-word paragraph about their
        daily routine. Peer review focuses exclusively on article use. Each student
        must find and correct at least 3 article errors in their partner''s writing,
        citing the specific rule violated (first mention, generic reference, etc.).'
      - 'Generic vs. specific sorting: Prepare 20 sentence strips — half with generic
        meaning (Water is essential), half with specific meaning (The water in this
        bottle is cold). Students sort into two groups and identify the article pattern
        for each. Then rewrite each sentence switching generic↔specific meaning.'
    examples:
    - 'First mention: ''I saw A cat in the garden.'' Subsequent: ''THE cat was black.'''
    - 'Wrong: ''I bought car.'' Correct: ''I bought A car.'''
    - 'Wrong: ''She is THE doctor.'' (general). Correct: ''She is A doctor.'''
    - 'Wrong: ''THE dogs are loyal.'' (generic). Correct: ''Dogs are loyal.'''
    frequency: 5
    persistence: 4
    communicative_impact: 3
    source_type: peer-reviewed
    source_count: 3
    sources:
