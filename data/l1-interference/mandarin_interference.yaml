  conjunctions_subordinating:
    interference_patterns:
    - pattern: Subordinating conjunctions placed incorrectly
      example_l1: 虽然下雨，但是我还是出去了 (suīrán xiàyǔ, dànshì wǒ háishì chūqu le)
      example_gloss: Although rain, but I still go-out PERF
      example_wrong: Because he was tired, so he went to bed.
      example_correct: BECAUSE he was tired, he went to bed.
      explanation: Mandarin uses paired conjunctions 虽然...但是 (suīrán...dànshì "although...but")
        together. English uses only one conjunction ("Although it rained, I still
        went out" — no "but"). Learners produce "Although...but" by transferring the
        Mandarin paired conjunction pattern.
      frequency: 3
      persistence: 4
      communicative_impact: 3
    - pattern: 'Using ''because'' for time: ''Because I arrived, he left'''
      example_l1: 虽然下雨，但是我还是出去了 (suīrán xiàyǔ, dànshì wǒ háishì chūqu le)
      example_gloss: 'Literal gloss reflecting Mandarin structure: If it will rain,
        we stay home.'
      example_wrong: If it will rain, we stay home.
      example_correct: IF it rains, we will stay home.
      explanation: Mandarin conjunctions (yinwei, suiran, ranguo) map loosely to English
        but/because/although/if. Learners select wrong ones.
      frequency: 3
      persistence: 4
      communicative_impact: 3
    - pattern: Multiple conjunctions in complex sentences confused
      example_l1: 虽然下雨，但是我还是出去了 (suīrán xiàyǔ, dànshì wǒ háishì chūqu le)
      example_gloss: 'Literal gloss reflecting Mandarin structure: Because he was
        tired, so he went to bed.'
      example_wrong: Because he was tired, so he went to bed.
      example_correct: BECAUSE he was tired, he went to bed.
      explanation: Mandarin conjunctions (yinwei, suiran, ranguo) map loosely to English
        but/because/although/if. Learners select wrong ones.
