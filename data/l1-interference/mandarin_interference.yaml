    interference_patterns:
    - Chinese nouns used without plural -s
    - Plural meaning expressed only through quantifiers or numbers
    - Failure to recognize plural morphology in input
    why_it_happens: Mandarin nouns are unmarked for number. 'Shu' can mean book or
