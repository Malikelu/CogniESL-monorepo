  temporal_expressions:
    interference_patterns:
    - pattern: Mandarin time words placed sentence-initially transferred to English
      example_l1: 我在中国住了三年 (wǒ zài zhōngguó zhù le sān nián)
      example_gloss: I at China live PERF three years
      example_wrong: Tomorrow I will go to Beijing.
      example_correct: I will go to Beijing TOMORROW.
      explanation: Mandarin places time duration after the verb (住了三年 zhù le sān nián
        "lived three years"). English places "for three years" at the end or beginning.
        More critically, Mandarin does not require perfect tense for this meaning
        — the aspect marker 了 suffices.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Adverbial time expressions appear before verb incorrectly
      example_l1: 他来中国两年了 (tā lái zhōngguó liǎng nián le)
      example_gloss: He come China two years PERF
      example_wrong: Yesterday she eats lunch.
      example_correct: She ATE lunch yesterday.
      explanation: Mandarin places the time expression between the verb and 了 (le).
        English requires present perfect "has been in China for two years". The entire
        structure is different — Mandarin uses a simple verb + time + 了 pattern.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: '''Yesterday I go to school'' instead of ''I went to school yesterday'''
      example_l1: 我们等了半个小时 (wǒmen děng le bàn gè xiǎoshí)
      example_gloss: We wait PERF half CLF hour
      example_wrong: Last year they move to Shanghai.
      example_correct: They MOVED to Shanghai last year.
      explanation: Mandarin time expressions follow the verb directly. English uses
        "for + time" at the end. Learners produce "We waited half hour" without "for"
        because Mandarin does not use a preposition before time duration.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    why_it_happens: Mandarin allows flexible placement of time expressions, often
      sentence-initial. English has stricter position rules for temporal adverbials.
    teacher_tips:
      how_to_explain: 'English typically puts time at end of sentence: ''I went to
        school yesterday.'' Practice end-of-sentence placement.'
      where_to_start: 'Sentence building: start with subject-verb-object, then add
        time at end.'
      exercises:
      - name: temporal expressions Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'temporal expressions' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: temporal expressions Error Correction
        type: error-correction
