    interference_patterns:
    - pattern: Subordinating conjunctions confused with coordinating conjunctions
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: Although it was
        raining, so we stayed inside.'
      example_wrong: Although it was raining, so we stayed inside.
      example_correct: Because it WAS raining, we stayed inside.
      explanation: Mandarin subordinators (suiran, yinwei, ru guo) correspond loosely
        to English ones. 'Suiran' (although) and 'yinwei' (because) can be confused.
      frequency: 3
