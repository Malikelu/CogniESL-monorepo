      example_gloss: 'Literal gloss reflecting Mandarin structure: Did you eat yet.'
      example_wrong: Did you eat yet.
      example_correct: Did you eat yet?
      explanation: Mandarin punctuation conventions differ. Full stops end clauses
        in Chinese (period after each clause). English uses them only at sentence
        boundaries.
