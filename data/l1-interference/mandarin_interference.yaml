  relative_clauses:
    interference_patterns:
    - 'Relative clause structure: Mandarin uses topic-comment, not wh-words for relative
      clauses'
    - Missing or misplaced relative pronouns in English
    - '''The person who he is tall'' instead of ''The person who is tall'''
    why_it_happens: Mandarin relativizes using topic-comment structure or 'de' particle.
      English uses wh-words as relative pronouns at specific clause positions.
    teacher_tips:
      how_to_explain: Use WHO/WHICH/THAT to connect clauses. 'The man WHO I saw' —
        no extra pronoun after. Practice embedding clauses.
      where_to_start: Start with defining relative clauses using who/which/that.
      exercises:
