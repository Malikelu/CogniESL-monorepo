    why_it_happens: Mandarin doesn't use participial adjectives. English -ed = feeling,
      -ing = causing. Learners may translate directly from Mandarin.
    teacher_tips:
      how_to_explain: -ED = how you FEEL. -ING = what CAUSES the feeling. 'I'm BORED'
        (I feel) / 'The movie is BORING' (it causes boredom).
      where_to_start: 'Practice with pairs: bored/boring, excited/exciting, confused/confusing.'
      exercises:
      - name: participial adjectives Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'participial adjectives' structure. Emphasize the structural
          difference between Mandarin and English.
        duration: 15
      - name: participial adjectives Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'participial adjectives'
          errors. Students identify and correct each error.
        duration: 15
      - name: participial adjectives Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'participial
          adjectives' structure.
        duration: 10
      - name: participial adjectives Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'participial
          adjectives' errors.
        duration: 15
    examples:
    - 'Wrong: ''The movie is BORED.'' Correct: ''The movie is BORING.'' (it causes
      boredom)'
    - 'Wrong: ''I am EXCITING.'' Correct: ''I AM EXCITED.'' (I feel excitement)'
