  inversion_negative:
    interference_patterns:
    - Failure to invert subject and auxiliary after negative adverbs
    - '''Never I have seen'' instead of ''Never have I seen'''
    - Arabic-style word order transferred to English
    why_it_happens: Mandarin does not use subject-auxiliary inversion for emphasis
      or after negative adverbs. English requires inversion after 'never, rarely,
      seldom, hardly'.
    teacher_tips:
      how_to_explain: 'After negative adverbs, INVERT: ''NEVER HAVE I seen such beauty.''
        This is formal. In speech: ''I''ve never seen...'''
      where_to_start: Practice formal inversion with 'never' first.
      exercises:
      - name: inversion negative Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'inversion negative' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
