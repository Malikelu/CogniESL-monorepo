  subject_verb_agreement:
    interference_patterns:
    - pattern: Third person singular -s consistently omitted
      example_l1: 她去学校 (tā qù xuéxiào)
      example_gloss: He go school
      example_wrong: She go to school.
      example_correct: She GOES to school.
      explanation: Mandarin verbs have zero inflection — 去 (qù "go") is used for all
        persons and numbers. English requires -s for third person singular present
        tense. This is one of the most well-documented errors for Mandarin speakers
        and is highly persistent because the concept of verb agreement is absent from
        Mandarin.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Plural -s added where not needed
      example_l1: 她每天跑步 (tā měitiān pǎobù)
      example_gloss: She every-day run
      example_wrong: They goes home.
      example_correct: They GO home.
      explanation: Mandarin verbs never change form regardless of subject. The verb
        跑 (pǎo "run") is identical for "I run", "he runs", "they run". English third-person
        singular -s has no equivalent in Mandarin grammar.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Agreement errors with complex subjects
      example_l1: 他们喜欢音乐 (tāmen xǐhuān yīnyuè)
      example_gloss: They like music
      example_wrong: It look good.
      example_correct: It LOOKS good.
      explanation: 'Since Mandarin verbs are invariable, learners must acquire an
        entirely new grammatical concept: subject-verb agreement. The -s suffix is
        meaningless from a Mandarin perspective because person/number are indicated
        by the subject pronoun, not the verb.'
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Mandarin verbs have zero inflection for person/number. English
      requires -s for 3rd person singular and plural marking.
    teacher_tips:
      how_to_explain: 'HE/SHE/IT → add -s to verb: ''He RUNS.'' All others → base
        form: ''I/You/We run.'''
      where_to_start: Conjugation drills for all persons with common verbs.
      exercises:
      - name: subject verb agreement Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'subject verb agreement' structure. Emphasize the structural
          difference between Mandarin and English.
        duration: 15
      - name: subject verb agreement Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'subject verb agreement'
          errors. Students identify and correct each error.
        duration: 15
      - name: subject verb agreement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subject
          verb agreement' structure.
        duration: 10
      - name: subject verb agreement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subject verb
          agreement' errors.
        duration: 15
    examples:
    - 'Wrong: ''She go to school.'' Correct: ''She GOES to school.'''
    - 'Wrong: ''They goes home.'' Correct: ''They GO home.'''
    - 'Wrong: ''It look good.'' Correct: ''It LOOKS good.'''
