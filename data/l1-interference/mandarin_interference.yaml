  adjectives_without_nouns:
    interference_patterns:
    - Mandarin adjectives used without nouns where English requires one
    - '''The rich should help the poor'' — Chinese learners struggle with nominalized
      adjectives'
    - Definite article + adjective = noun group not understood
    why_it_happens: Mandarin can use adjectives predicatively without nominalizing.
      English allows the + adjective as a noun class (the rich, the poor).
    teacher_tips:
      how_to_explain: THE + adjective = a group of people. 'THE RICH get richer.'
        'THE DEAD' = dead people.
