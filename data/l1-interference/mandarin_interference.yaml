  question_forms:
    interference_patterns:
    - pattern: Failure to invert subject and auxiliary in yes/no questions (e.g.,
        ''You like coffee?'' instead of ''DO you like coffee?'')
      example_l1: 你喜欢咖啡吗？(nǐ xǐhuān kāfēi ma?)
      example_gloss: You like coffee Q
      example_wrong: You like coffee?
      example_correct: DO you like coffee?
      explanation: Mandarin forms yes/no questions by adding the particle 吗 (ma) at
        the end of a statement, with no inversion or auxiliary. English requires subject-auxiliary
        inversion and DO-support. The Mandarin question particle strategy transfers
        directly, producing "You like coffee?" without DO.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Using rising intonation with SVO word order instead of inversion —
        Mandarin forms yes/no questions by adding the particle ''ma'' (吗) at the end
        of a declarative sentence with no word order change
      example_l1: 他去哪了？(tā qù nǎ le?)
      example_gloss: He go where PERF
      example_wrong: Where he went?
      example_correct: Where DID he go?
      explanation: Mandarin is a wh-in-situ language — the question word stays in
        its original position (去哪 qù nǎ "go where"). English requires wh-fronting
        and DO-support. Learners produce "Where he went?" instead of "Where did he
        go?" because Mandarin word order is preserved.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Wh-questions formed without do-support or subject-auxiliary inversion
        (e.g., ''Where he went?'' instead of ''Where DID he go?'', ''What you want?''
        instead of ''What DO you want?'')
      example_l1: 你叫什么名字？(nǐ jiào shénme míngzi?)
      example_gloss: You call what name
      example_wrong: What you want?
      example_correct: What DO you want?
      explanation: Mandarin embeds questions without inversion or DO-support. The
        question word (什么 shénme "what") stays in object position. English requires
        DO-support for most wh-questions, which is a structure absent from Mandarin.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: 'Tag question overgeneralization: Chinese learners use all-purpose
        "is it?" or "isn''t it?" for all tag questions because Mandarin uses invariant
        tags like "shi ma" or "dui bu dui"'
      example_l1: 他是谁？(tā shì shéi?)
      example_gloss: He is who
      example_wrong: He liked it, is it?
      example_correct: He liked it, DIDN
      explanation: Mandarin wh-questions with 是 (shì) do not require inversion — the
        wh-word simply replaces the answer position. English requires inversion in
        some wh-questions. Learners transfer the Mandarin in-situ pattern.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Omission of dummy "do" in negated questions (e.g., "You not like it?"
        instead of "DON'T you like it?") because Mandarin negates directly with "bu"
        without an auxiliary
      example_l1: 你昨天做什么了？(nǐ zuótiān zuò shénme le?)
      example_gloss: You yesterday do what PERF
      example_wrong: You not like it?
      example_correct: DON
      explanation: Mandarin does not use DO-support or inversion in questions. The
        question word (什么 shénme "what") stays in object position. English requires
        "What did you do?" with both DO-support and inversion — a double requirement
        absent from Mandarin.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    why_it_happens: Mandarin is a wh-in-situ, topic-prominent language that forms
      questions without word order change. Yes/no questions are created by adding
      the sentence-final particle ''ma'' (吗) to a declarative, preserving SVO order.
      Wh-questions keep the wh-word in its base position (e.g., ''Nǐ qù nǎlǐ?'' —
      You go where?). English, by contrast, requires subject-auxiliary inversion and
      do-support — a typologically rare structure that most world languages do not
      use (Celce-Murcia & Larsen-Freeman, 2015). Mandarin also lacks a system of auxiliary
      verbs comparable to English do/does/did, have/has, or modals, making the entire
      English question architecture foreign. The invariant tag system in Mandarin
      (''shì ma'' 是吗, ''duì bu dui'' 对不对) maps poorly onto English's complex tag system,
      leading to overgeneralization of ''is it?''/''isn't it?'' as default tags (Swan
      & Smith, 2001).
    teacher_tips:
      how_to_explain: English questions INVERT the subject and auxiliary. No auxiliary
        in the statement? Add DO/DOES/DID. 'He likes coffee' → 'DOES he like coffee?'
        'He went home' → 'DID he go home?' 'He is tall' → 'IS he tall?' Mandarin just
        adds 'ma' — English must flip the word order.
      where_to_start: 'Start with yes/no questions: give 10 statements, students invert
        to questions. Then introduce do-support (most error-prone). Finally wh-questions
        with inversion. Drill tag questions last.'
      sequencing: 'Week 1: Yes/no inversion with be/have/can. Week 2: Do/does/did
        insertion. Week 3: Wh-questions with inversion. Week 4: Tag questions. Week
        5: Mixed practice and error correction.'
      exercises:
      - name: Inversion Drill — Be and Modals
        type: sentence-rewrite
        description: Give 15 statements using be, have, can, will, must (e.g., ''She
          is a student'', ''They can swim'', ''He has a car''). Students transform
          each into a yes/no question by inverting subject and auxiliary. No do-support
          needed — this builds the inversion habit first.
        duration: 10
      - name: Do-Support Insertion Drill
        type: sentence-rewrite
        description: Give 15 statements with ordinary verbs (e.g., ''She likes music'',
          ''They went home'', ''He wants coffee''). Students must insert DO/DOES/DID
          and invert to form questions. Emphasize that English needs a helper verb
          for questions — if there is no auxiliary, add DO.
        duration: 15
      - name: Mandarin-to-English Question Translation
        type: translation
        description: Provide 10 Mandarin questions — 5 with ''ma'' particle (e.g.,
          你喜欢咖啡吗？Nǐ xǐhuān kāfēi ma?) and 5 wh-questions (e.g., 你去哪里？Nǐ qù nǎlǐ?).
          Students translate each into English, explicitly identifying where Mandarin
          uses no word order change and where English requires inversion and do-support.
          Class discusses the structural gap.
        duration: 15
      - name: Error Correction - Question Forms
        type: error-correction
        description: Provide 20 sentences with Mandarin-style question errors covering
          all patterns - no inversion (''You like coffee?''), no do-support (''Where
          he went?''), wrong tag (''He liked it, is it?''), negation without do (''You
          not like it?''). Students identify the error type, correct it, and explain
          the rule violated.
        duration: 15
      - name: Tag Question Transformation
        type: sentence-rewrite
        description: Give 15 statements (e.g., ''She is a teacher'', ''They went home'',
          ''He can swim'', ''You like music''). Students create the correct tag question
          for each. Emphasize that the tag matches the auxiliary in the main clause.
          If there is no auxiliary, use do/does/did in the tag.
        duration: 10
      - name: Information Gap Interview
        type: speaking
        description: In pairs, Student A has a profile card (name, job, hobbies, weekend
          plans). Student B must ask questions to fill in their blank profile card.
          Student B must use at least 3 yes/no questions, 3 wh-questions, and 2 tag
          questions. Teacher circulates and tracks question accuracy on a checklist.
        duration: 20
    examples:
    - 'Wrong: ''You like coffee?'' Correct: ''DO you like coffee?'''
    - 'Wrong: ''Where he went?'' Correct: ''Where DID he go?'''
    - 'Wrong: ''What you want?'' Correct: ''What DO you want?'''
    - 'Wrong: ''He liked it, is it?'' Correct: ''He liked it, DIDN''T he?'''
    - 'Wrong: ''You not like it?'' Correct: ''DON''T you like it?'''
    - 'Wrong: ''How many brothers you have?'' Correct: ''How many brothers DO you
      have?'''
