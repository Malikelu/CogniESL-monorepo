  second_conditional:
    interference_patterns:
    - 'Using ''would'' in the if-clause: ''If I would have...'''
    - Confusion between Type 2 and Type 3 conditionals
    - 'Omitting ''were'' for all subjects: ''If I was'' instead of ''If I were'''
    why_it_happens: Mandarin has no subjunctive mood. Learners transfer indicative
      forms to unreal conditional contexts.
    teacher_tips:
      how_to_explain: 'TYPE 2 = unreal/impossible now. If-clause: PAST TENSE (were
        for all persons). Result: would + base. ''If I WERE rich...'''
      where_to_start: Practice 'If I were...' with all subjects.
      exercises:
      - name: second conditional Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'second conditional' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: second conditional Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'second conditional'
          errors. Students identify and correct each error.
        duration: 15
      - name: second conditional Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'second
          conditional' structure.
        duration: 10
      - name: second conditional Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'second conditional'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''If I was you, I would study harder.'' Correct: ''If I WERE you, I
      would study harder.'''
    - 'Wrong: ''If I would have time, I would travel.'' Correct: ''If I HAD time,
      I would travel.'''
    - '''If she were here, she would help us.'''
