  reported_speech_requests_commands_detail:
    interference_patterns:
    - Requests with 'ask' instead of 'tell/order'
    - Indirect requests with wrong verb patterns
    - Politeness level not maintained in reported speech
    why_it_happens: Mandarin 'qing' (please/ask) is used broadly. English distinguishes
      ask (request), tell (command), order (directive), in different syntactic structures.
    teacher_tips:
      how_to_explain: Ask + someone + to + verb (request). Tell + someone + to + verb
        (command). Order + someone + to + verb (directive).
      where_to_start: Practice converting direct speech with different speech acts.
      exercises:
      - name: reported speech requests commands detail Contrastive Drill
