        to the store and I BUY some milk.'
      example_wrong: Yesterday I GO to the store and I BUY some milk.
      example_correct: Yesterday I WENT to the store and BOUGHT some milk.
      explanation: Mandarin narration doesn't always require tense consistency — time
        is indicated by context and time words rather than verb forms.
      frequency: 2
      persistence: 3
      communicative_impact: 2
