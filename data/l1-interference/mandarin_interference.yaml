  inversion_negative:
    interference_patterns:
    - pattern: Failure to invert subject and auxiliary after negative adverbs
      example_l1: 我从来没有见过这么美的风景 (wǒ cónglái méiyǒu jiàn guo zhème měi de fēngjǐng)
      example_gloss: I never not-have see PERF such beautiful scenery
      example_wrong: Not only he likes coffee.
      example_correct: Not only DOES he like coffee...
      explanation: Mandarin does not use inversion for negative fronting. English
        requires "Never have I seen..." with subject-auxiliary inversion. Learners
        produce "Never I have seen..." because Mandarin keeps normal word order with
        从来...没有 (cónglái...méiyǒu "never").
      frequency: 2
      persistence: 4
      communicative_impact: 2
    - pattern: '''Never I have seen'' instead of ''Never have I seen'''
      example_l1: 我从来没有见过这么美的风景 (wǒ cónglái méiyǒu jiàn guo zhème měi de fēngjǐng)
      example_gloss: 'Literal gloss reflecting Mandarin structure: Not only he likes
        coffee.'
      example_wrong: Not only he likes coffee.
      example_correct: Not only DOES he like coffee...
      explanation: Mandarin does not use subject-auxiliary inversion for emphasis
        or after negative adverbs. English requires inversion after 'never, rarely,
        seldom, hardly'.
      frequency: 2
      persistence: 4
      communicative_impact: 2
    - pattern: Arabic-style word order transferred to English
      example_l1: 我从来没有见过这么美的风景 (wǒ cónglái méiyǒu jiàn guo zhème měi de fēngjǐng)
      example_gloss: 'Literal gloss reflecting Mandarin structure: Not only he likes
        coffee.'
      example_wrong: Not only he likes coffee.
      example_correct: Not only DOES he like coffee...
      explanation: Mandarin does not use subject-auxiliary inversion for emphasis
        or after negative adverbs. English requires inversion after 'never, rarely,
        seldom, hardly'.
      frequency: 2
      persistence: 4
      communicative_impact: 2
    why_it_happens: Mandarin does not use subject-auxiliary inversion for emphasis
      or after negative adverbs. English requires inversion after 'never, rarely,
      seldom, hardly'.
    teacher_tips:
      how_to_explain: 'After negative adverbs, INVERT: ''NEVER HAVE I seen such beauty.''
