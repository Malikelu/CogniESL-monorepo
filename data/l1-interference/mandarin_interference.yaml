        type: peer-review
        description: Students exchange writing samples and check for 'passive voice'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''The cake made by my mother.'' Correct: ''The cake WAS MADE by my mother.'''
    - 'Wrong: ''The letter was sended.'' Correct: ''The letter was SENT.'''
