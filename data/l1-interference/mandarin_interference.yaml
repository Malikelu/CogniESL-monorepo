      example_l1: 很多人 (hěn duō rén)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I don'
      example_wrong: I don
      example_correct: I don
      explanation: Mandarin uses same quantifier (hao duo) for both countable and
        uncountable, eliminating the many/much distinction.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using 'a lot of' as default to avoid the distinction
      example_l1: 很多人 (hěn duō rén)
      example_gloss: 'Literal gloss reflecting Mandarin structure: There isn'
      example_wrong: There isn
      example_correct: There isn
      explanation: Mandarin uses same quantifier (hao duo) for both countable and
        uncountable, eliminating the many/much distinction.
      frequency: 3
