  perfect_modals:
    interference_patterns:
    - Modal + have + past participle avoided
    - Present/future modals used for past speculation
    - '''Must have done'' confused with ''must do'''
    why_it_happens: Mandarin has no modal perfect structure. Speculation about the
      past requires adverbials, not modal auxiliaries.
    teacher_tips:
      how_to_explain: MODAL PERFECT = past speculation. MUST HAVE = certainty. MIGHT
        HAVE = less certain. 'He MUST HAVE LEFT. His desk is empty.'
      where_to_start: Practice past scenarios with evidence.
      exercises:
      - name: perfect modals Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'perfect modals' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: perfect modals Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'perfect modals' errors.
          Students identify and correct each error.
        duration: 15
      - name: perfect modals Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'perfect
          modals' structure.
        duration: 10
      - name: perfect modals Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'perfect modals'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''He must left already.'' Correct: ''He MUST HAVE LEFT already.'''
    - '''They might have missed the bus.'' (speculation about past)'
    - '''She can''t have finished yet. She just started.'''
