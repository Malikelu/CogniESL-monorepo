        and books. Plurality is expressed analytically through number words, quantifiers,
        or simply inferred from context. Mandarin also lacks the count/mass noun distinction
        that governs English pluralizability. Classifiers serve a categorization function
        but do not map '
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Failure to recognize plural morphology in listening/reading input,
        leading to misinterpretation of singular vs. plural reference
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: Three student are
        absent.'
      example_wrong: Three student are absent.
      example_correct: Three STUDENTS are absent.
      explanation: 'Mandarin nouns are completely invariable for number. There is
        no morphological plural marking of any kind -- shu (book) means both book
        and books. Plurality is expressed analytically through number words, quantifiers,
        or simply inferred from context. Mandarin also lacks the count/mass noun distinction
        that governs English pluralizability. Classifiers serve a categorization function
        but do not map '
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Mandarin nouns are completely invariable for number. There is
      no morphological plural marking of any kind -- shu (book) means both book and
      books. Plurality is expressed analytically through number words, quantifiers,
      or simply inferred from context. Mandarin also lacks the count/mass noun distinction
      that governs English pluralizability. Classifiers serve a categorization function
      but do not map onto English countability. Research by Jia and Fuse (2007) shows
      that Mandarin-speaking learners acquire English plural morphology later than
      speakers of languages with L1 plural marking, confirming the role of L1 transfer.
      Li and Luk (2017) further document that even advanced Mandarin learners show
      persistent plural omission in spontaneous speech, particularly under processing
      pressure, because the L1 grammar provides no plural feature to transfer.
    teacher_tips:
      how_to_explain: 'English count nouns MUST have -s/-es for more than one. One
        book, two BOOKS. No number word? Still need -s. Dogs are loyal (general plural,
        no number word, still -s). Uncountable nouns NEVER take -s: information (never
        informations), furniture (never furnitures).'
      where_to_start: Start with physical objects and counting (one book, two books).
        Then remove the number word (I like books). Then introduce uncountable nouns
        as the exception. Finally, address irregular plurals.
      sequencing: 'Week 1: Regular -s/-es with number words and objects. Week 2: Plural
        without number words (general statements). Week 3: Countable vs. uncountable
        noun sorting. Week 4: Irregular plurals. Week 5: Error correction and free
        production.'
      exercises:
      - name: Plural Morphology Insertion Drill
        type: error-correction
        description: Provide 20 Mandarin-style sentences with missing plural markers.
          Students identify the error, correct it, and state the rule violated (missing
          -s, irregular form needed, or uncountable noun). Include 5 sentences with
          uncountable nouns where -s should NOT be added.
        duration: 15
      - name: Countable vs. Uncountable Sorting and Production
        type: categorization
        description: Give students a list of 30 nouns (mix of countable and uncountable).
          Students sort into two columns. Then students write 2 sentences for each
          noun -- one singular, one plural (countable) or one with a quantifier phrase
          (uncountable). Class discusses why uncountables cannot take -s and what
          strategies Mandarin speakers can use to remember.
        duration: 20
      - name: Mandarin-to-English Contrastive Translation
        type: translation
        description: Provide 10 Mandarin sentences -- 5 where plurality is expressed
          only through context/quantifiers and 5 where no plural marker exists in
          Mandarin. Students translate each into English, explicitly deciding where
          English requires -s and where Mandarin does not mark it. Class discusses
          the structural gap and why English needs -s even when the number is already
          stated.
        duration: 15
      - name: Picture Description with Forced Plural Production
        type: speaking
        description: Show 10 images depicting multiple objects, people, or animals.
          Students describe each image using at least 3 plural noun phrases. Peer
          checks that every count noun has correct plural marking. Teacher tracks
          plural accuracy on a checklist.
        duration: 15
      - name: Irregular Plural Card Game
        type: game
        description: Create cards with singular nouns on one side (child, man, woman,
          tooth, foot, mouse, person, leaf, knife, life). Students draw a card, say
          the plural, and use it in a sentence. Points for correct irregular forms.
          After the game, students write a rule summary for irregular plural patterns.
        duration: 15
      - name: Editing for Plural Errors in a Text
        type: editing
        description: Provide a 200-word text written by a hypothetical Mandarin speaker
          containing 12 plural-related errors (missing -s, overgeneralized -s on uncountables,
          wrong irregular forms, missing plural after quantifiers). Students find
          and correct all errors, categorizing each by error type. Then students write
          their own 150-word text on a given topic and peer-review for plural accuracy.
        duration: 20
      - name: Listening for Plural Meaning
        type: listening
        description: Play 15 short audio sentences -- some with singular nouns, some
          with plural. Students write S or P for each. Then students answer comprehension
          questions that depend on correct singular/plural interpretation. This trains
          recognition of plural morphology in input, addressing the documented difficulty
          Mandarin speakers have with plural perception.
        duration: 10
    examples:
    - 'Wrong: ''I have two dog.'' Correct: ''I have two DOGS.'''
    - 'Wrong: ''She like book.'' Correct: ''She likes BOOKS.'''
    - 'Wrong: ''Many people is here.'' Correct: ''Many PEOPLE are here.'''
    - 'Wrong: ''I need some informations.'' Correct: ''I need some INFORMATION.'''
    - 'Wrong: ''The childs are playing.'' Correct: ''The CHILDREN are playing.'''
    - 'Wrong: ''Three student are absent.'' Correct: ''Three STUDENTS are absent.'''
    - 'Wrong: ''She has two tooths that hurt.'' Correct: ''She has two TEETH that
      hurt.'''
