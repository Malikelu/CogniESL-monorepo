  passive_voice:
    interference_patterns:
    - Passive voice avoided; active voice preferred
    - 'Omission of ''be'' in passive: ''The book written by me'''
    - Past participle form errors in passive constructions
    why_it_happens: 'Mandarin uses topic-comment structure to express passive meaning
      without passive morphology: ''Na ben shu shi ta xie de'' (That book is he write).
      English requires be + past participle.'
    teacher_tips:
      how_to_explain: Passive = subject receives the action. 'The book WAS WRITTEN
        by the author.' Practice with common verbs.
      where_to_start: Start with simple present/past passive sentences.
      exercises:
      - name: passive voice Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'passive voice' structure. Emphasize the structural difference
          between Mandarin and English.
