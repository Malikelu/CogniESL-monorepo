      how_to_explain: 'Some verbs describe STATES, not ACTIONS. States don''t use
        -ing: ''I KNOW'' (NOT ''I am knowing''). ''I WANT coffee'' (NOT ''I am wanting'').'
      where_to_start: 'Memorize common stative verbs: know, believe, love, hate, want,
        need, belong, own.'
      exercises:
      - name: stative verbs Contrastive Drill
