  run_on_sentences_comma_splice:
    interference_patterns:
    - Two independent clauses joined by comma without conjunction
    - 'Comma splice: ''It is late, we should go home'''
    - Long unpunctuated sentences following Mandarin flow
    why_it_happens: Mandarin allows longer unpunctuated sentences and topic chaining.
      English requires proper punctuation between independent clauses.
    teacher_tips:
      how_to_explain: 'Join independent clauses with: conjunction (and, but), semicolon,
        or period. NEVER just a comma.'
      where_to_start: Identify comma splices and fix with proper connectors.
      exercises:
      - name: run on sentences comma splice Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'run on sentences comma splice' structure. Emphasize the structural
          difference between Mandarin and English.
        duration: 15
