    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity
    source_rank: 1
    citations:
    - claim: Interference pattern for copula be
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Mandarin speakers, pp. 308-322'
      tier: 1
    - claim: 'Grammar point: copula be'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Many languages have no equivalent to the copula be; speakers omit it
        in English
      source: 'Celce-Murcia & Larsen-Freeman (2015) ''The Grammar Book: Form, Meaning,
        and Use for English Language Teachers'', 3rd ed., National Geographic Learning/Cengage'
      location: p. 59
      tier: 2
    - claim: Copula omission occurs in languages without a copula (Arabic, Russian,
        etc.)
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See be entries 17-20
      tier: 2
    - claim: ELLs from languages without copula (Arabic, Russian) omit be; ELLs from
        languages with different copula systems overuse it
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 89
      tier: 2
    - claim: Chinese has no copula be in present tense; learners omit be in English
      source: 'Li & Luk (2017) ''Chinese-English Contrastive Grammar: An Introduction'',
        Hong Kong University Press'
      location: 'Chapter 3: Transitivity and Syntactic Structures'
      tier: 1
  copula_omission:
    interference_patterns:
    - pattern: Copula 'be' omitted before noun predicates (e.g., ''He teacher'' instead
        of ''He IS a teacher'')
      example_l1: 这本书很有趣 (zhè běn shū hěn yǒuqù)
      example_gloss: This CLF book very interesting
      example_wrong: This book interesting.
      example_correct: This book IS interesting.
      explanation: 'Mandarin allows topic-comment structures without a copula: the
        topic (这本书 "this book") is followed directly by the comment (很有趣 "very interesting").
        English requires "be" to link subject and predicate. This is one of the most
        persistent errors for Mandarin speakers.'
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Copula 'be' omitted before adjective predicates (e.g., ''She very happy''
        instead of ''She IS very happy'')
      example_l1: 我哥哥很高 (wǒ gēge hěn gāo)
      example_gloss: My older-brother very tall
      example_wrong: Last year I student.
      example_correct: Last year I WAS a student.
      explanation: Mandarin adjective predicates do not require a copula — 高 (gāo
        "tall") functions as the predicate by itself. English requires "be" before
        adjective predicates. This error is extremely persistent because the Mandarin
        structure is the default pattern.
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Copula 'be' omitted before locative and prepositional phrases (e.g.,
        ''They from China'' instead of ''They ARE from China'')
      example_l1: 去年我是学生 (qùnián wǒ shì xuéshēng)
      example_gloss: Last year I was student
      example_wrong: The weather nice today.
      example_correct: The weather IS nice today.
      explanation: Mandarin does not mark tense on the copula — 是 (shì) is used for
        all tenses. English requires "was/were" for past tense. Learners use "is"
        for all tenses because Mandarin 是 does not change form.
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Learners produce telegram-style English under time pressure (e.g.,
        ''Yesterday I go school'', ''She doctor'')
      example_l1: 今天天气很好 (jīntiān tiānqì hěn hǎo)
      example_gloss: Today weather very good
      example_wrong: She very tall.
      example_correct: She IS very tall.
      explanation: In Mandarin, the topic (今天天气 "today weather") is followed directly
        by the comment (很好 "very good") with no copula. Learners default to this Mandarin
        topic-comment structure, producing telegram-style English without "be".
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Omission increases with speaking speed and in informal registers; more
        frequent in conversation than in writing
      example_l1: 她很高兴 (tā hěn gāoxìng)
      example_gloss: She very happy
      example_wrong: They from China.
      example_correct: They ARE from China.
      explanation: Mandarin adjective predicates function as intransitive verbs without
        any copula. English requires "be" before all predicative adjectives. This
        is a fundamental typological difference — Mandarin is a "no-copula" language
        for adjective predicates.
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Overinsertion of 'be' as a default strategy in some learners (e.g.,
        ''He is go to school'' instead of ''He GOES to school''), suggesting incomplete
        acquisition rather than pure transfer
      example_l1: 我很好 (wǒ hěn hǎo)
      example_gloss: I very good
      example_wrong: My mother doctor.
      example_correct: My mother IS a doctor.
      explanation: The Mandarin sentence 我很好 (wǒ hěn hǎo) translates literally as
        "I very good" with no verb. English requires "I am very good." This is perhaps
        the most basic and persistent copula omission error, affecting the most common
        everyday expressions.
      frequency: 5
      persistence: 5
      communicative_impact: 5
    why_it_happens: Mandarin is a zero-copula language for present-tense predicate
      nominals and adjectives. The structure ''Ta lao shi'' (He [is] teacher) and
      ''Ta hen gao'' (He [is] very tall) require no copula verb. The copula ''shi''
      (是) is used only for specific equative contexts (e.g., identity statements)
      and is optional in many predicate adjective constructions. English, by contrast,
      mandates a finite verb in every clause — the copula ''be'' is structurally required
      even when no semantic action is expressed. This typological difference between
      a zero-copula L1 and an obligatory-copula L2 is one of the most persistent sources
      of error for Mandarin speakers, persisting even at advanced proficiency levels
      (Lardiere, 2007). The topic-comment structure of Mandarin (e.g., ''Zhe ben shu,
      hen you yisi'' — This book, very interesting) further reinforces the absence
      of a linking verb, making English copula insertion feel redundant to learners.
    teacher_tips:
      how_to_explain: Every English sentence MUST have a verb. If there is no action
        verb, you need ''be'' (am/is/are/was/were) to connect the subject to its description.
        ''He IS a teacher.'' ''She IS happy.'' ''They ARE from China.'' No sentence
        is complete without a verb.
      where_to_start: 'Drill: Subject + IS/ARE/AM + complement. Accept NO sentence
        without a verb. Start with written drills, then move to oral fluency activities.'
      sequencing: 'Week 1: Identify missing copula in written sentences. Week 2: Oral
        drills with picture description (forced copula use). Week 3: Error correction
        of own writing. Week 4: Spontaneous speech with copula checklist.'
      exercises:
      - name: Copula Insertion Drill
        type: error-correction
        description: Provide 20 Mandarin-style sentences without copula (e.g., ''She
          happy'', ''They students'', ''The weather cold today'', ''My father doctor'',
          ''We from Beijing''). Students insert the correct form of ''be'' (am/is/are/was/were)
          and identify the subject-complement relationship. Include present and past
          tense contexts.
        duration: 15
      - name: Picture Description with Forced Copula
        type: speaking
        description: 'Show 10 images (people, places, weather, emotions). Students
          must describe each using at least one copula sentence. Peer checks that
          every sentence contains a verb. Example: The woman IS a doctor. She IS tired.
          The office IS small.'
        duration: 15
      - name: Mandarin-to-English Contrastive Translation
        type: translation
        description: Provide 10 Mandarin sentences — 5 with zero copula (e.g., 他是老师,
          今天天气很好) and 5 with 是 (e.g., 这是我的书). Students translate each into English,
          explicitly deciding where English requires ''be'' and where Mandarin does
          not. Class discusses the structural gap.
        duration: 15
      - name: Error Correction Journal
        type: peer-review
        description: Students write a 150-word paragraph about their family or daily
          routine. Peer review focuses exclusively on copula use — both omissions
          and overinsertions. Each student must find and correct at least 3 copula
          errors in their partner''s writing, citing the specific rule violated.
        duration: 15
      - name: Listening Gap-Fill
        type: listening
        description: Play an audio recording of a short monologue (60 seconds) that
          includes 8 copula sentences with the ''be'' forms removed. Students fill
          in the missing ''be'' forms. Then students record their own 30-second monologue
          about a topic and self-check for copula accuracy using a checklist.
        duration: 10
    examples:
    - 'Wrong: ''This book interesting.'' Correct: ''This book IS interesting.'''
    - 'Wrong: ''Last year I student.'' Correct: ''Last year I WAS a student.'''
    - 'Wrong: ''The weather nice today.'' Correct: ''The weather IS nice today.'''
    - 'Wrong: ''She very tall.'' Correct: ''She IS very tall.'''
    - 'Wrong: ''They from China.'' Correct: ''They ARE from China.'''
    - 'Wrong: ''My mother doctor.'' Correct: ''My mother IS a doctor.'''
