  demonstratives:
    interference_patterns:
    - '''This'' and ''that'' used interchangeably'
    - Mandarin 'zhe' and 'na' distinctions differ from English this/that
    - '''These'' and ''those'' forms consistently omitted'
    why_it_happens: Mandarin demonstratives 'zhe' (proximal) and 'na' (distal) don't
      fully map onto English this/that/these/those system with singular/plural distinctions.
    teacher_tips:
      how_to_explain: THIS/THOSE = near speaker. THAT/THOSE = far from speaker. Practice
        with physical objects at different distances.
      where_to_start: 'Point to objects: ''THIS pen'' (near), ''THAT pen'' (far).
        Then plural: ''THESE pens'', ''THOSE pens''.'
      exercises:
      - name: demonstratives Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'demonstratives' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: demonstratives Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'demonstratives' errors.
          Students identify and correct each error.
        duration: 15
      - name: demonstratives Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'demonstratives'
          structure.
        duration: 10
      - name: demonstratives Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'demonstratives'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''Give me that book.'' (book is in your hand). Correct: ''Give me THIS
      book.'''
    - 'Wrong: ''This books are interesting.'' Correct: ''THESE books are interesting.'''
    - 'Wrong: ''I want those.'' (pointing at nearby items). Correct: ''I want THESE.'''
