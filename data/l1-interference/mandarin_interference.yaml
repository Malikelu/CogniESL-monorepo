  a_lot_of:
    interference_patterns:
    - pattern: Confusion between 'a lot of', 'many', 'much', and 'lots of'
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I have many homework.'
      example_wrong: I have many homework.
      example_correct: I have A LOT OF homework.
      explanation: Mandarin uses 'hen duo' (very many) universally for large quantities.
        English distinguishes many (countable), much (uncountable), and a lot of (both,
        informal).
      frequency: 3
      persistence: 3
      communicative_impact: 1
    - pattern: Underuse of 'a lot of' in informal speech
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: She has a lot of
        furnitures.'
      example_wrong: She has a lot of furnitures.
      example_correct: She has a lot of FURNITURE.
      explanation: Mandarin uses 'hen duo' (very many) universally for large quantities.
        English distinguishes many (countable), much (uncountable), and a lot of (both,
        informal).
      frequency: 3
      persistence: 3
      communicative_impact: 1
    - pattern: Using 'many' with uncountable nouns instead of 'a lot of'
      example_l1: 中文例子 (zhōngwén lìzi)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I have many homework.'
      example_wrong: I have many homework.
      example_correct: I have A LOT OF homework.
      explanation: Mandarin uses 'hen duo' (very many) universally for large quantities.
        English distinguishes many (countable), much (uncountable), and a lot of (both,
        informal).
      frequency: 3
      persistence: 3
      communicative_impact: 1
    why_it_happens: Mandarin uses 'hen duo' (very many) universally for large quantities.
      English distinguishes many (countable), much (uncountable), and a lot of (both,
      informal).
    teacher_tips:
      how_to_explain: A LOT OF = informal, works with countable AND uncountable. MANY
        = formal, countable only. MUCH = formal, uncountable only.
      where_to_start: Practice with both countable and uncountable nouns.
      exercises:
      - name: a lot of Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'a lot of' structure. Emphasize the structural difference between
          Mandarin and English.
        duration: 15
      - name: a lot of Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'a lot of' errors. Students
          identify and correct each error.
        duration: 15
      - name: a lot of Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'a
          lot of' structure.
        duration: 10
      - name: a lot of Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'a lot of' errors.
        duration: 15
    examples:
    - 'Wrong: ''I have many homework.'' Correct: ''I have A LOT OF homework.'''
    - '''There are a lot of people at the party.'' (informal) = ''There are MANY people.''
      (formal)'
    - 'Wrong: ''She has a lot of furnitures.'' Correct: ''She has a lot of FURNITURE.''
      (uncountable)'
