  subjunctive_mood:
    interference_patterns:
    - pattern: Mandarin has no subjunctive mood
      example_l1: 我建议他早点去 (wǒ jiànyì tā zǎo diǎn qù)
      example_gloss: I suggest he early go
      example_wrong: The teacher insisted that she APPLIES.
      example_correct: '...insisted that she APPLY.'
      explanation: Mandarin does not have a subjunctive mood — the verb form does
        not change after verbs of suggestion. English requires base form in mandative
        subjunctive ("I suggest he go") or should + verb. Learners produce "I suggest
        he goes" because Mandarin has no subjunctive distinction.
      frequency: 2
      persistence: 4
      communicative_impact: 1
    - pattern: 'Subjunctive forms avoided: ''suggest that he study'' → ''suggest that
        he studies'''
      example_l1: 我建议他早点去 (wǒ jiànyì tā zǎo diǎn qù)
      example_gloss: 'Literal gloss reflecting Mandarin structure: The teacher insisted
        that she APPLIES.'
      example_wrong: The teacher insisted that she APPLIES.
      example_correct: '...insisted that she APPLY.'
      explanation: Mandarin does not have morphological subjunctive. Learners apply
        indicative forms after subjunctive-triggering verbs (suggest, recommend, insist).
      frequency: 2
      persistence: 4
      communicative_impact: 1
    - pattern: Formal English subjunctive declining in use
      example_l1: 我建议他早点去 (wǒ jiànyì tā zǎo diǎn qù)
      example_gloss: 'Literal gloss reflecting Mandarin structure: The teacher insisted
        that she APPLIES.'
      example_wrong: The teacher insisted that she APPLIES.
      example_correct: '...insisted that she APPLY.'
      explanation: Mandarin does not have morphological subjunctive. Learners apply
        indicative forms after subjunctive-triggering verbs (suggest, recommend, insist).
      frequency: 2
      persistence: 4
      communicative_impact: 1
    why_it_happens: Mandarin does not have morphological subjunctive. Learners apply
      indicative forms after subjunctive-triggering verbs (suggest, recommend, insist).
    teacher_tips:
      how_to_explain: 'After SUGGEST, RECOMMEND, INSIST: use base verb (subjunctive):
        ''I suggest he STUDY.'' NOT ''studies.'' This is formal. ''I suggest he STUDIES''
        is acceptable in speech.'
      where_to_start: Practice with suggest, recommend, insist, demand.
      exercises:
      - name: subjunctive mood Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'subjunctive mood' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: subjunctive mood Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'subjunctive mood' errors.
          Students identify and correct each error.
        duration: 15
      - name: subjunctive mood Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subjunctive
          mood' structure.
        duration: 10
      - name: subjunctive mood Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subjunctive
          mood' errors.
        duration: 15
    examples:
    - 'Wrong: ''I suggest that he STUDIES harder.'' (formal). Correct (formal): ''I
      suggest that he STUDY harder.'''
    - 'Wrong: ''The teacher insisted that she APPLIES.'' Correct: ''...insisted that
      she APPLY.'''
    - '''They recommended that the meeting BE postponed.'' (formal subjunctive)'
