  be_going_to:
    interference_patterns:
    - pattern: Future meaning expressed with 'will' instead of 'be going to'
      example_l1: 我打算去中国 (wǒ dǎsuàn qù zhōngguó)
      example_gloss: I plan go China
      example_wrong: I will visit my grandparents next week.
      example_correct: I AM GOING TO visit my grandparents next week.
      explanation: Mandarin uses 打算 (dǎsuàn "plan") or 要 (yào "will") for planned
        future actions. English "be going to" has no direct Mandarin equivalent. Learners
        may use "will" instead of "going to" for plans because 打算 maps more naturally
        to intention.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Structure 'going to' not produced due to L1 transfer
      example_l1: 他要结婚了 (tā yào jiéhūn le)
      example_gloss: He will marry PERF
      example_wrong: I will to study abroad.
      example_correct: I AM GOING TO study abroad.
      explanation: Mandarin 要...了 (yào...le) expresses imminent future. English "be
        going to" or "is about to" are the equivalents. Learners use "He will marry"
        instead of "He is going to get married" because 要 maps to "will".
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion between planned future (be going to) and spontaneous decisions
        (will)
      example_l1: 我打算去中国 (wǒ dǎsuàn qù zhōngguó)
      example_gloss: 'Literal gloss reflecting Mandarin structure: I will visit my
        grandparents next week.'
      example_wrong: I will visit my grandparents next week.
      example_correct: I AM GOING TO visit my grandparents next week.
      explanation: Mandarin uses 'yao' or 'jiu' for both planned and spontaneous future.
        English distinguishes 'be going to' (planned) from 'will' (spontaneous).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    why_it_happens: Mandarin uses 'yao' or 'jiu' for both planned and spontaneous
      future. English distinguishes 'be going to' (planned) from 'will' (spontaneous).
    teacher_tips:
      how_to_explain: '''BE going to'' = plans you''ve already decided. ''WILL'' =
        spontaneous decisions made now. ''I''m GOING TO study medicine'' (plan). ''I''ll
        answer the phone'' (spontaneous).'
      where_to_start: Compare planned vs. spontaneous scenarios.
      exercises:
      - name: be going to Contrastive Drill
        type: translation
        description: Students translate 10 Mandarin sentences into English, focusing
          on correct 'be going to' structure. Emphasize the structural difference
          between Mandarin and English.
        duration: 15
      - name: be going to Error Correction
        type: error-correction
        description: Provide 15 sentences with Mandarin-style 'be going to' errors.
          Students identify and correct each error.
        duration: 15
      - name: be going to Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'be
          going to' structure.
        duration: 10
      - name: be going to Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'be going to'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I will visit my grandparents next week.'' (planned) Correct: ''I AM
      GOING TO visit my grandparents next week.'''
    - It's cold in here. — 'I WILL close the window.' (spontaneous decision)
    - 'Wrong: ''I will to study abroad.'' Correct: ''I AM GOING TO study abroad.'''
