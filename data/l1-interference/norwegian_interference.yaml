    interference_patterns:
    - pattern: V2 word order transfer
      example: V2 word order transfer
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Yesterday went I to school.
      correct: Yesterday I went to school.
    why_it_happens: Norwegian is V2 (verb-second) in main clauses. English is SVO.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object.'
      where_to_start: Start with the word order pattern.
      sequencing: 'Week 1: word order. Week 2: Practice. Week 3: Review. Week 4: Mixed.'
