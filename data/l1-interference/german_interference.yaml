language: German
language_code: de
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of indefinite article after sein (to be) for professions
      example: 'German: ''Ich bin Lehrer'' (I am teacher). Learner says ''I am teacher''
        instead of ''I am a teacher.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Gender-based article transfer (der/die/das vs. the)
      example: 'German has three gendered definite articles: der (masc.), die (fem./pl.),
        das (neut.). All map to English ''the.'' Learners may over-differentiate or
        use ''the'' incorrectly based on German gender assignments, e.g., saying ''the
        sun'' correctly but being confused when German ''die Sonne'' (feminine) becomes
        English ''the sun'' (no gender).'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Overuse of definite article with abstract nouns and general statements
      example: 'German uses the definite article with abstract nouns more freely:
        ''Die Liebe ist schoen'' (The love is beautiful). Learner says ''The love
        is beautiful'' instead of ''Love is beautiful.'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: Ich bin Lehrer.
      correct: I am a teacher.
      de_original: Ich bin Lehrer.
      gloss: I am teacher.
      explanation: 'German omits the indefinite article after ''sein'' (to be) when
        stating professions. English requires ''a/an'': ''I am a teacher.'''
    - wrong: Er ist Arzt.
      correct: He is a doctor.
      de_original: Er ist Arzt.
      gloss: He is doctor.
      explanation: 'Same pattern: German ''sein'' + profession drops the article.
        English never does this.'
    - wrong: The love is beautiful.
      correct: Love is beautiful.
      de_original: Die Liebe ist schoen.
      gloss: The love is beautiful.
      explanation: 'German uses ''die'' (definite article) with abstract nouns for
        general statements. English uses zero article for abstract/general statements:
        ''Love is beautiful,'' not ''The love is beautiful.'''
    - wrong: I go to the school every day.
      correct: I go to school every day.
      de_original: Ich gehe zur Schule.
      gloss: I go to+the school.
      explanation: 'German ''zu + der'' (to + the) = ''zur.'' German uses the definite
        article with institutions. English uses zero article for activities: ''go
        to school,'' ''go to church,'' ''go to bed.'''
    why_it_happens: 'German and English both have article systems, but they differ
      in three key ways. First, German omits the indefinite article after ''sein''
      (to be) when stating professions, nationalities, and religions: ''Ich bin Lehrer''
      (I am teacher), ''Sie ist Amerikanerin'' (She is American). English always requires
      ''a/an'' in these contexts. Second, German has a three-gender article system
      (der/die/das for ''the,'' ein/eine for ''a'') where the article form changes
      based on the grammatical gender of the noun. English has only one form: ''the.''
      This means German learners must ''unlearn'' gender-based article selection.
      Third, German uses the definite article more freely than English with abstract
      nouns (''die Liebe'' = love), institutions (''zur Schule'' = to school), and
      general statements. English uses zero article in these contexts. These differences
      are systematic and predictable.'
    teacher_tips:
      how_to_explain: 'Frame this as ''German and English both have articles, but
        the rules are different.'' (1) After ''to be'' + profession: English ALWAYS
        needs ''a/an.'' German drops it. Drill this as a non-negotiable rule. (2)
        German has three forms of ''the'' (der/die/das) but English has only one.
        Tell learners: ''Forget the German gender — in English, everything is just
        the.'' (3) Abstract nouns and institutions: English often uses zero article
        where German uses ''the.'' Teach common patterns: ''go to school/church/bed''
        (no article), ''love/freedom/happiness is...'' (no article).'
      where_to_start: Start with the profession pattern — it's the most frequent and
        easiest to fix. Drill 'I am a + profession' relentlessly. Then address abstract
        nouns and institutions. The gender issue is lower priority since using 'the'
        for all genders is actually correct in English.
      sequencing: 'Week 1: Indefinite article a/an after ''to be'' + profession/nationality.
        Week 2: Definite article the — simplify from three German forms to one English
        form. Week 3: Zero article with abstract nouns, institutions, and general
        statements. Week 4: Mixed practice with all article choices in extended writing.'
      exercises:
      - name: Profession Flashcards
        type: fill-in-the-blank
        description: '20 sentence frames: ''She is ___ engineer. He is ___ student.
          They are ___ nurses.'' Learners must always supply a/an.'
        duration: 10
      - name: German to English Article Shift
        type: translation
        description: '15 German sentences. Learners translate, paying special attention
          to article changes: professions (add a/an), abstract nouns (remove the),
          institutions (remove the).'
        duration: 20
      - name: Abstract or Specific?
        type: fill-in-the-blank
        description: '15 sentences with abstract nouns and general statements. Learners
          decide: the or zero article? E.g., ''___ freedom is important'' (zero) vs.
          ''___ freedom we enjoy is hard-won'' (the).'
        duration: 15
      - name: Edit the German Speaker's Essay
        type: error-correction
        description: 'A paragraph written by a fictional German learner with 10 article
          errors: missing a/an after sein, overuse of the with abstract nouns and
          institutions.'
        duration: 15
    sources:
    - Swan & Smith "Learner English" (German)
    - Parrott "Grammar for English Language Teachers"
    - Celce-Murcia & Larsen-Freeman "The Grammar Book"
