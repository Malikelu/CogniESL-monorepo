  false_friends:
    interference_patterns:
    - 'French ''actuellement'' (currently) -> English error: ''I am actually going''
      -> Correct: ''I am currently going'''
    - 'French ''assister a'' (attend) -> English error: ''I assisted the meeting''
      -> Correct: ''I attended the meeting'''
    - 'French ''librairie'' (bookshop) -> English error: ''I bought it at the library''
      -> Correct: ''I bought it at the bookshop'''
    why_it_happens: French and English share many cognates with different meanings
      (false friends). French learners assume cognates have the same meaning.
    teacher_tips:
      how_to_explain: False friends are words that look similar but mean different
        things. Always verify meaning.
      where_to_start: Teach the most common French-English false friends.
      exercises:
      - name: False Friend Matching
        type: matching
        description: Match 15 French words to their real English meaning.
        duration: 10
      - name: False Friend Error Correction
        type: error-correction
        description: Fix false friend errors in 15 sentences.
        duration: 10
    examples:
    - 'Wrong: ''I am actually going'' (meaning currently). Correct: ''I am currently
      going.'''
    - 'Wrong: ''I assisted the meeting.'' Correct: ''I attended the meeting.'''
    sources:
