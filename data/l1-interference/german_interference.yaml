  passive_voice:
    interference_patterns:
    - pattern: Avoidance of passive voice (german)
      example: Avoidance of passive voice (german)
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Someone built this house in 1900.
      correct: This house was built in 1900.
    why_it_happens: German uses passive voice less frequently than English. German
      learners may avoid passive constructions in English, preferring active voice
      even where passive is more natural. This avoidance occurs because the L1 does
      not require passive voice for the same communicative purposes.
    teacher_tips:
      how_to_explain: 'Teach the passive formula: be + past participle.'
      where_to_start: Start with the passive voice pattern.
      sequencing: 'Week 1: passive voice. Week 2: Practice. Week 3: Review. Week 4:
