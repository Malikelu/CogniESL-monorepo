language: german
schema_version: '3.0'
grammar_points:
  verb_second_V2:
    interference_patterns:
    - German uses case system (4 cases) which does not exist in English, causing transfer
      errors related to 'verb second V2'.
    why_it_happens: German handles 'verb second V2' differently from English. German
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the German structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between German and English for 'verb
        second V2'. Show the German structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how German handles
        'verb second V2' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 German sentences, students translate to English, focusing
          on correct 'verb second V2' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with German-style 'verb second V2' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'verb
          second V2' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'verb second
          V2' errors.
        duration: 15
    examples:
    - 'Wrong: ''Yesterday went I.'' Correct: ''Yesterday I went.'''
    - 'Wrong: ''Here comes he.'' Correct: ''Here he comes.'''
    sources:
    - Clahsen, H. & Muysken, P. (1986). The availability of universal grammar to adult
      and child learners. Second Language Research, 2(2), 93-119.
    - Schwartz, B. & Sprouse, R. (1996). L2 cognitive states and the Full Transfer/Full
      Access model. Second Language Research, 12(1), 40-72.
    - Vainikka, A. & Young-Scholten, M. (1996). Gradual development of L2 phrase structure.
      Second Language Research, 12(1), 7-39.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — German
    notes: Core German word order rule.
