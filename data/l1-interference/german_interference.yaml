    - pattern: Transfer of german prepositions
      example: Transfer of german prepositions
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I am on home.
      correct: I am at home.
    why_it_happens: German prepositions often differ from English in ways that cause
      systematic errors. German 'in' covers both 'in' and 'at,' and 'auf' covers 'on'
      and 'at.' German learners may say 'I am in school' instead of 'I am at school.'
      This occurs because the L1 preposition system maps differently onto English
      spatial relationships.
