  passive_voice:
    interference_patterns:
    - pattern: Avoidance of passive voice
      example: 'KO prefers active -> Error: ''Someone built this house'' -> Correct:
        ''This house was built'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Avoidance of passive voice.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: Someone built this house in 1900.
      correct: This house was built in 1900.
    why_it_happens: Korean uses passive voice less frequently than English. Korean
      learners may avoid passive constructions in English, preferring active voice
      even where passive is more natural. This avoidance occurs because the L1 does
      not require passive voice for the same communicative purposes.
    teacher_tips:
      how_to_explain: 'Teach the passive formula: be + past participle.'
      where_to_start: Start with the passive formula.
      sequencing: 'Week 1: Passive formula. Week 2: Present and past passive. Week
        3: Review.'
      exercises:
      - name: Active to Passive
        type: sentence-rewrite
        description: Students convert 15 active sentences to passive.
        duration: 15
