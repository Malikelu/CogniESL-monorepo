  relative_clauses:
    interference_patterns:
    - pattern: Pre-nominal relative clauses
      example: 'KO relative clauses precede the noun -> Error: ''I bought book is
        interesting'' -> Correct: ''The book that I bought is interesting'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: I bought book is interesting.
      correct: The book that I bought is interesting.
    why_it_happens: Korean relative clauses precede the noun (prenominal), while English
      relative clauses follow the noun.
    teacher_tips:
      how_to_explain: 'Teach: English relative clauses come AFTER the noun.'
      where_to_start: Start with 'that' as the default.
      sequencing: 'Week 1: That for things and people. Week 2: Who for people. Week
        3: Review.'
      exercises:
      - name: Relative Clause Formation
        type: sentence-rewrite
        description: Students combine 10 pairs of sentences using relative pronouns.
        duration: 15
    sources:
