  prepositions:
    interference_patterns:
    - pattern: Transfer of Korean particles
      example: 'KO ''e'' = to/at -> Error: ''I go to home'' -> Correct: ''I go home'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I go to home.
      correct: I go home.
    why_it_happens: Korean uses particles (e, eseo, ro) to indicate grammatical relationships.
      These do not map 1:1 to English prepositions.
    teacher_tips:
      how_to_explain: Teach common Korean-English preposition differences.
      where_to_start: Start with the most common preposition transfers.
      sequencing: 'Week 1: Verb + preposition. Week 2: Prepositions of place. Week
        3: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 Korean sentences with correct English prepositions.
        duration: 15
    sources:
