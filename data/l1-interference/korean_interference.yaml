      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: See relevant section
      tier: 2
  articles:
    interference_patterns:
    - pattern: Omission of all articles (Korean has no articles)
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: KO 'Na-nun seon-saeng-nim-i-da'
      example_gloss: I teacher am
      example_wrong: I am teacher
      example_correct: I am a teacher
      explanation: 'Transfer from L1: Omission of all articles (Korean has no articles).'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I am teacher.
      correct: I am a teacher.
    why_it_happens: Korean has no article system. Definiteness is inferred from context.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES articles.'
      where_to_start: Start with the profession pattern.
      sequencing: 'Week 1: A/an for professions. Week 2: The for specific reference.
        Week 3: Review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with Korean-influenced article errors.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 18
    - Parrott "Grammar for English Language Teachers"
