language: Korean
language_code: ko
schema_version: '4.0'
grammar_points:
  word_order:
    interference_patterns:
    - pattern: SOV word order transfer
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: KO 'Na-neul chaek-eul sa-da'
      example_gloss: I book buy
      example_wrong: I book buy
      example_correct: I buy a book
      explanation: 'Transfer from L1: SOV word order transfer.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I book bought yesterday.
      correct: I bought a book yesterday.
    why_it_happens: Korean is strictly SOV while English is SVO. Korean learners transfer
      SOV order.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object.'
      where_to_start: Start with basic SVO order.
      sequencing: 'Week 1: Basic SVO. Week 2: Subordinate clauses. Week 3: Review.'
      exercises:
      - name: Word Order Correction
        type: error-correction
        description: 15 sentences with Korean-influenced word order.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 18 (Korean)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 5
    communicative_impact: 4
    flagged: false
    tier: 1
