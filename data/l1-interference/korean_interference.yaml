language: Korean
language_code: ko
schema_version: '3.0'
grammar_points:
  word_order:
    interference_patterns:
    - pattern: SOV word order transfer
      example: 'KO ''Na-neul chaek-eul sa-da'' (I book buy) -> Error: ''I book buy''
        -> Correct: ''I buy a book'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: I book bought yesterday.
      correct: I bought a book yesterday.
    why_it_happens: Korean is strictly SOV while English is SVO. Korean learners transfer
      SOV order.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object.'
      where_to_start: Start with basic SVO order.
      sequencing: 'Week 1: Basic SVO. Week 2: Subordinate clauses. Week 3: Review.'
      exercises:
      - name: Word Order Correction
        type: error-correction
        description: 15 sentences with Korean-influenced word order.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 18 (Korean)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 5
    communicative_impact: 4
    flagged: false
    tier: 1
    source_rank: 1
    citations:
    - claim: Interference pattern for word order
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Korean speakers, pp. 323-340'
      tier: 1
    - claim: 'Grammar point: word order'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Germanic languages and Chinese make rich use of compounding, unlike other
        languages
      source: 'Celce-Murcia & Larsen-Freeman (2015) ''The Grammar Book: Form, Meaning,
        and Use for English Language Teachers'', 3rd ed., National Geographic Learning/Cengage'
      location: p. 39
      tier: 2
    - claim: Korean is topic-prominent, making subject-verb agreement difficult (p.
        61)
      source: 'Celce-Murcia & Larsen-Freeman (2015) ''The Grammar Book: Form, Meaning,
        and Use for English Language Teachers'', 3rd ed., National Geographic Learning/Cengage'
      location: See relevant section
      tier: 2
    - claim: 'Word order varies: SOV, SVO, VSO, V2, free order — all cause transfer
        errors'
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See word order entries
      tier: 2
    - claim: Korean is topic-prominent and SOV (PEU word order entries)
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See relevant entry
      tier: 2
    - claim: 'ELLs transfer L1 word order: subject-verb inversion from Spanish, SOV
        from Arabic/Japanese'
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 199
      tier: 2
    - claim: Korean is SOV (p. 199)
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: See relevant section
      tier: 2
  articles:
    interference_patterns:
    - pattern: Omission of all articles (Korean has no articles)
      example: 'KO ''Na-nun seon-saeng-nim-i-da'' (I teacher am) -> Error: ''I am
        teacher'' -> Correct: ''I am a teacher'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: I am teacher.
      correct: I am a teacher.
    why_it_happens: Korean has no article system. Definiteness is inferred from context.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES articles.'
      where_to_start: Start with the profession pattern.
      sequencing: 'Week 1: A/an for professions. Week 2: The for specific reference.
        Week 3: Review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with Korean-influenced article errors.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 18
    - Parrott "Grammar for English Language Teachers"
