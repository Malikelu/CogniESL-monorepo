  relative_clauses:
    interference_patterns:
    - pattern: Pre-nominal relative clauses
      example: 'KO relative clauses precede the noun -> Error: ''I bought book is
        interesting'' -> Correct: ''The book that I bought is interesting'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Pre-nominal relative clauses.'
