  subject_verb_agreement:
    interference_patterns:
    - pattern: Omission of third-person -s
      example: 'KO verbs do not conjugate for person -> Error: ''He go'' -> Correct:
        ''He goes'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Omission of third-person -s.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: She like chocolate.
      correct: She likes chocolate.
    why_it_happens: Korean verbs do not conjugate for person or number. English third-person
      singular -s is frequently omitted.
    teacher_tips:
      how_to_explain: Teach the 'he/she/it + verb-s' rule as non-negotiable.
      where_to_start: Start with third-person -s.
      sequencing: 'Week 1: Third-person -s. Week 2: Does/doesnt. Week 3: Review.'
      exercises:
      - name: Agreement Drill
        type: oral-drill
        description: Students describe a classmate daily routine using third-person
          -s.
        duration: 10
