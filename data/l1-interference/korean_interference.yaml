  countability:
    interference_patterns:
    - pattern: Pluralization of uncountable nouns
      example: 'KO lacks plural marking on many nouns -> Error: ''informations'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Pluralization of uncountable nouns.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I have many homeworks.
      correct: I have a lot of homework.
    why_it_happens: Korean does not mark plural on most nouns. Korean learners may
      not distinguish countable from uncountable.
    teacher_tips:
      how_to_explain: Create a list of common uncountable nouns.
      where_to_start: Start with the countable/uncountable distinction.
      sequencing: 'Week 1: Common uncountable nouns. Week 2: Much/many. Week 3: Review.'
      exercises:
      - name: Countable or Not?
        type: matching
        description: Students categorize 30 nouns.
        duration: 10
