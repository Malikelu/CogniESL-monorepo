  modal_verbs:
    interference_patterns:
    - pattern: Use of hal su itda for can/may
      example: 'KO ''hal su iss-da'' -> Error: ''I can go?'' -> Correct: ''May I go?'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I can have some water?
      correct: May I have some water?
    why_it_happens: The Korean expression 'hal su itda' covers the meanings of English
      can, could, may, and might. Korean learners may overuse 'can' in English because
      it is the closest single-word equivalent. This occurs because the L1 maps multiple
      English modals onto a single L1 expression.
    teacher_tips:
      how_to_explain: 'Teach modal hierarchy: can, may, could, should, must.'
      where_to_start: Start with 'can' for ability.
      sequencing: 'Week 1: Can. Week 2: May. Week 3: Could. Week 4: Review.'
      exercises:
      - name: Modal Choice
        type: fill-in-the-blank
        description: 15 sentences where students choose the correct modal.
        duration: 10
    sources:
