  negation:
    interference_patterns:
    - pattern: Use of an before the verb
      example: 'KO ''An ga-yo'' (not go) -> Error: ''Not go'' -> Correct: ''Do not
        go'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I not know the answer.
      correct: I do not know the answer.
    why_it_happens: Korean negation uses 'an' (not) before the verb. English uses
      do-support.
    teacher_tips:
      how_to_explain: 'Teach: do/does/did + not + base verb.'
      where_to_start: Start with do/does/did + not.
      sequencing: 'Week 1: Do/does/did + not. Week 2: Be + not. Week 3: Review.'
      exercises:
      - name: Negation Transformation
        type: sentence-rewrite
        description: Students rewrite 15 affirmative sentences as negative.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 18
    - Parrott "Grammar for English Language Teachers"
