  phonology:
    interference_patterns:
    - pattern: Confusion of /l/ and /r/
      example: 'KO lacks /l/-/r/ distinction -> Error: ''fright'' for ''flight'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Confusion of /l/ and /r/.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Difficulty with /θ/ and /ð/
      example: 'KO lacks dental fricatives -> Error: ''tink'' for ''think'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Difficulty with /θ/ and /ð/.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I have a rice of bread.
      correct: I have a loaf of bread.
    - wrong: Tink about it.
      correct: Think about it.
    why_it_happens: Korean does not distinguish /l/ and /r/. Korean also lacks dental
      fricatives.
    teacher_tips:
      how_to_explain: 'Teach: /l/ = tongue touches roof of mouth. /r/ = tongue curls
        back. /θ/ = tongue between teeth.'
      where_to_start: Start with /l/ vs /r/. Then teach TH sounds.
      sequencing: 'Week 1: L vs R. Week 2: TH sounds. Week 3: Review.'
      exercises:
      - name: Minimal Pairs
        type: matching
        description: 'Students distinguish: light/right, lock/rock, think/tink.'
        duration: 10
