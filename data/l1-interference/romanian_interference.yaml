language: romanian
schema_version: '3.0'
grammar_points:
  grammatical_gender_ro:
    interference_patterns:
    - Romanian uses 5 cases which does not exist in English, causing transfer errors
      related to 'grammatical gender ro'.
    why_it_happens: Romanian handles 'grammatical gender ro' differently from English.
      Romanian L1 speakers transfer native structural patterns to English, leading
      to systematic errors. The error is persistent because the Romanian structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Romanian and English for 'grammatical
        gender ro'. Show the Romanian structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Romanian
        handles 'grammatical gender ro' differently from English. Use visual aids
        or color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Romanian sentences, students translate to English, focusing
          on correct 'grammatical gender ro' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Romanian-style 'grammatical gender
          ro' errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'grammatical
          gender ro' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'grammatical
          gender ro' errors.
        duration: 15
    examples:
    - 'Wrong: ''She is a big table.'' Correct: ''It is a big table.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Dafina, I. (2008). Romanian learners and English article acquisition. Romanian
      Journal of English Studies, 5, 45-60.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Romanian
    notes: Similar to other Romance languages in gender assignment.
