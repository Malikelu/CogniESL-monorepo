  modal_verbs:
    interference_patterns:
    - pattern: Use of sakna for can/may
      example: 'UR ''main sakta hoon'' -> Error: ''I can go?'' -> Correct: ''May I
        go?'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I can have some water?
      correct: May I have some water?
    why_it_happens: Urdu 'sakna' covers can/could/may/might.
    teacher_tips:
      how_to_explain: 'Teach modal hierarchy: can, may, could, should, must.'
      where_to_start: Start with 'can' for ability.
      sequencing: 'Week 1: Can. Week 2: May. Week 3: Could. Week 4: Review.'
      exercises:
      - name: Modal Choice
        type: fill-in-the-blank
        description: 15 sentences where students choose the correct modal.
        duration: 10
