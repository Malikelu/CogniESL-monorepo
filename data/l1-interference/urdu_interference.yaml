  phonology:
    interference_patterns:
    - pattern: Confusion of /v/ and /w/
      example: 'UR lacks /w/ -> Error: ''wery'' for ''very'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I am wery happy.
      correct: I am very happy.
    why_it_happens: Urdu lacks the /w/ sound, using /v/ instead. Urdu learners may
      substitute /v/ for /w/ in English, producing 'vater' for 'water' or 'victory'
      for 'wictory.' This error persists because the L1 phonological system does not
      include /w/ as a distinct phoneme.
    teacher_tips:
      how_to_explain: 'Teach: /v/ = lips touch lower teeth. /w/ = lips round.'
      where_to_start: Start with /v/ vs /w/.
      sequencing: 'Week 1: V vs W. Week 2: TH sounds. Week 3: Review.'
      exercises:
      - name: Minimal Pairs
        type: matching
        description: 'Students distinguish: very/water, vest/west.'
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 13
    - Underhill "Sound Foundations"
