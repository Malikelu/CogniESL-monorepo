  false_friends:
    interference_patterns:
    - pattern: Confusion of UR-EN cognates
      example: 'UR ''tim'' = team (not time) -> Error: ''What is the tim?'' -> Correct:
        ''What is the time?'''
      frequency: 3
      persistence: 2
      communicative_impact: 3
    examples:
    - wrong: What is the tim?
      correct: What is the time?
    why_it_happens: Urdu has borrowed words from English that have shifted meaning.
    teacher_tips:
      how_to_explain: Create a list of common UR-EN false friends.
      where_to_start: Start with the highest-impact false friends.
      sequencing: 'Week 1: Top 10 false friends. Week 2: Review.'
      exercises:
