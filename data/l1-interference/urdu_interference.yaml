  prepositions:
    interference_patterns:
    - pattern: Transfer of Urdu postpositions
      example: 'UR ''mez par'' (table on) -> Error: ''table on'' -> Correct: ''on
        the table'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Book the table on is.
      correct: The book is on the table.
    why_it_happens: Urdu uses postpositions. English uses prepositions.
    teacher_tips:
      how_to_explain: 'Teach: English prepositions come BEFORE nouns.'
      where_to_start: Start with common prepositions of place.
      sequencing: 'Week 1: Prepositions of place. Week 2: Prepositions of time. Week
        3: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 Urdu sentences with correct English prepositions.
        duration: 15
