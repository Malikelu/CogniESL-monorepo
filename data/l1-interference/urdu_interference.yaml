  possessives:
    interference_patterns:
    - pattern: Use of ka/ki/ke for possession
      example: 'UR ''mera kitaab'' (my book) -> Error: ''Book of me'' -> Correct:
        ''My book'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: Book of me is interesting.
      correct: My book is interesting.
    why_it_happens: Urdu uses postpositional possessives (ka/ki/ke). English uses
      possessive adjectives before nouns.
    teacher_tips:
      how_to_explain: 'Teach: English uses possessive adjectives (my, your, his) BEFORE
        the noun.'
      where_to_start: Start with possessive adjectives.
      sequencing: 'Week 1: My/your/his/her. Week 2: Our/their. Week 3: Review.'
      exercises:
      - name: Possessive Formation
        type: sentence-rewrite
