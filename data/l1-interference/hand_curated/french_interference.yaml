language: french
schema_version: '3.0'
grammar_points:
  negation_ne_pas:
    interference_patterns:
    - 'French ''Je n''aime pas le cafe'' (literal: I not like the coffee) -> English
      error: ''I not like coffee'' -> Correct: ''I do not like coffee'' (French ne...pas
      wraps the verb; English requires do-support)'
    - 'French ''Il n''est pas venu hier'' -> English error: ''He not came yesterday''
      -> Correct: ''He did not come yesterday'' (French passe compose with ne...pas;
      English requires did + bare infinitive)'
    - 'French ''Nous ne parlons jamais anglais'' -> English error: ''We speak never
      English'' -> Correct: ''We never speak English'' (French negation adverb placement
      differs)'
    why_it_happens: 'French negation uses two particles (ne...pas) that wrap around
      the finite verb: ''Je ne sais pas'' (I not know not). English requires an auxiliary
      verb (do/does/did) + not + base verb: ''I do not know.'' French learners transfer
      the wrapping pattern and omit do-support entirely, producing ''I not like''
      instead of ''I do not like.'' This is the most persistent French L1 error because
      ne...pas is acquired before age 3 and is deeply automatized.'
    teacher_tips:
      how_to_explain: 'Write on board: French ''Je ne mange pas'' vs English ''I do
        not eat.'' Circle the ''do'' in English. Explain: ''In French, you wrap the
        verb with ne...pas. In English, you need a helper verb — do, does, or did
        — and put NOT after it.'' Drill: Subject + do/does/did + not + base verb.'
      where_to_start: 'Start with present tense: ''I like'' -> ''I do not like.''
        Use high-frequency verbs (like, want, have). Master do/does before introducing
        did.'
      sequencing: 'Week 1: Present tense do/does not. Week 2: Past tense did not.
        Week 3: Negative questions. Week 4: Negative adverbs (never, rarely, seldom).'
      exercises:
      - name: Do-Support Drill
        type: transformation
        description: '20 affirmative sentences, students convert to negative using
          do/does/did + not. Timed: 5 minutes.'
        duration: 10
      - name: French Negation Error Correction
        type: error-correction
        description: '15 sentences with French-style negation: ''I not like,'' ''She
          not wants,'' ''He not came.'' Students identify and correct.'
        duration: 15
      - name: Oral Negation Chain
        type: oral-drill
        description: 'Student 1: affirmative. Student 2: negates with do-support.
          Student 3: new affirmative. Builds automaticity.'
        duration: 10
      - name: Negation Diary
        type: composition
        description: Students write about what they don't like, didn't do, or never
          do. Must use 5+ correct negative sentences.
        duration: 20
    examples:
    - 'Wrong: ''I not like coffee.'' Correct: ''I do not like coffee.'''
    - 'Wrong: ''He not came to school.'' Correct: ''He did not come to school.'''
    - 'Wrong: ''We speak never English.'' Correct: ''We never speak English.'''
    sources:
    - Hawkins, R. (1987). Markedness and the acquisition of the English dative alternation
      by French learners.
    - Trevise, A. (1986). Is it transfer or fossilization? The interaction of French
      and English negation rules.
    - Sprouse, R. (1988). Learnability and the acquisition of French negation by English
      speakers.
    source_count: 3
    source_type: literature
    frequency: 5
    persistence: 5
    communicative_impact: 4
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
  question_inversion:
    interference_patterns:
    - 'French ''Aimes-tu le cafe?'' (Like you the coffee?) -> English error: ''Like
      you coffee?'' -> Correct: ''Do you like coffee?'''
    - 'French ''Ou habites-tu?'' (Where live you?) -> English error: ''Where live
      you?'' -> Correct: ''Where do you live?'''
    - 'French ''Parlez-vous anglais?'' (Speak you English?) -> English error: ''Speak
      you English?'' -> Correct: ''Do you speak English?'''
    why_it_happens: 'French forms questions by inverting the verb and subject: ''Aimes-tu?''
      (Like-you?). English forms questions with do/does/did + subject + verb: ''Do
      you like?'' French learners transfer the inversion pattern, producing ''Like
      you coffee?'' instead of ''Do you like coffee?'''
    teacher_tips:
      how_to_explain: 'Write: French ''Aimes-tu?'' vs English ''Do you like?'' Explain:
        ''In French, you flip the verb and subject. In English, you need do/does/did
        BEFORE the subject.'' Drill: Do/Does/Did + Subject + Base Verb.'
      where_to_start: 'Start with yes/no questions: ''You like coffee'' -> ''Do you
        like coffee?'' Then wh- questions: ''Where do you live?'''
      sequencing: 'Week 1: Yes/no questions with do/does. Week 2: Yes/no with did.
        Week 3: Wh- questions. Week 4: Negative questions.'
      exercises:
      - name: Question Formation Drill
        type: transformation
        description: 15 affirmative sentences, students convert to questions using
          do/does/did.
        duration: 15
      - name: Inversion Error Correction
        type: error-correction
        description: '10 sentences with inversion errors: ''Like you coffee?'' Students
          correct.'
        duration: 10
      - name: Interview Activity
        type: speaking
        description: Students interview each other using only questions with do/does/did.
        duration: 20
    examples:
    - 'Wrong: ''Like you coffee?'' Correct: ''Do you like coffee?'''
    - 'Wrong: ''Where live you?'' Correct: ''Where do you live?'''
    - 'Wrong: ''Speak you English?'' Correct: ''Do you speak English?'''
    sources:
    - Hawkins, R. (1987). Markedness and the acquisition of the English dative alternation
      by French learners.
    - Sprouse, R. (1988). Learnability and the acquisition of French negation by English
      speakers.
    source_count: 2
    source_type: literature
    frequency: 4
    persistence: 4
    communicative_impact: 4
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
  verb_be_conjugation:
    interference_patterns:
    - 'French ''Je suis fatigue'' -> English error: ''I am agree'' -> Correct: ''I
      agree'' (French etre + adjective = English simple verb)'
    - 'French ''Il est professeur'' -> English error: ''He is professor'' -> Correct:
      ''He is a professor'' (French omits article before professions)'
    - 'French ''Nous sommes trois'' -> English error: ''We are many people here''
      -> Correct: ''There are many people here'' (French etre for existence = English
      there is/are)'
    why_it_happens: 'French ''etre'' covers a wider range than English ''be.'' French
      uses ''etre'' with adjectives that English expresses with other verbs: ''Je
      suis d''accord'' = ''I agree.'' French omits articles before professions: ''Il
      est professeur.'' English requires ''a/an.'' French uses ''etre'' for existence:
      ''Nous sommes trois.'' English uses ''there is/are.'''
    teacher_tips:
      how_to_explain: 'Three rules: (1) French ''etre + adjective'' often = English
        ''verb'': ''Je suis d''accord'' = ''I agree.'' (2) Professions need ''a/an'':
        ''He is a teacher.'' (3) Existence uses ''there is/are'': ''There are three
        people.'''
      where_to_start: 'Start with professions: ''I am a teacher, you are a doctor.''
        Then ''there is/are'' for existence.'
      sequencing: 'Week 1: Professions with a/an. Week 2: There is/are. Week 3: Adjective
        vs verb. Week 4: Mixed practice.'
      exercises:
      - name: Profession Article Insertion
        type: fill-in-the-blank
        description: 'Add a/an before professions: ''He is ___ teacher.'' Contrast
          with French ''Il est professeur.'''
        duration: 10
      - name: There is/are Transformation
        type: transformation
        description: 'Convert: ''We are many people'' -> ''There are many people.'''
        duration: 15
      - name: Be Overuse Error Correction
        type: error-correction
        description: 'Fix: ''I am agree,'' ''She is have a car.'' Students correct
          and explain.'
        duration: 15
    examples:
    - 'Wrong: ''He is professor.'' Correct: ''He is a professor.'''
    - 'Wrong: ''I am agree.'' Correct: ''I agree.'''
    - 'Wrong: ''We are many people here.'' Correct: ''There are many people here.'''
    sources:
    - Harley, B. (1979). French gender rules in acquisition by English speakers.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.'
    source_count: 2
    source_type: textbook
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
  articles_def_indef_zero:
    interference_patterns:
    - 'French ''J''aime le cafe'' (I like the coffee) -> English error: ''I like the
      coffee'' (general) -> Correct: ''I like coffee'' (French definite article for
      generic = English zero article)'
    - 'French ''La musique est belle'' -> English error: ''The music is beautiful''
      (general) -> Correct: ''Music is beautiful'' (French definite for abstract =
      English zero)'
    - 'French ''J''ai un livre'' -> English error: ''I have book'' -> Correct: ''I
      have a book'' (article omission in transfer)'
    why_it_happens: 'French uses definite articles (le, la, les) much more broadly
      than English. French requires definite articles with abstract nouns (''la musique''),
      generic statements (''j''aime le cafe''), and after verbs of preference. English
      uses zero article for these contexts: ''I like coffee,'' ''Music is beautiful.''
      French learners overuse ''the'' because their L1 requires it.'
    teacher_tips:
      how_to_explain: 'Write: French ''J''aime le cafe'' vs English ''I like coffee.''
        Explain: ''In French, you need ''the'' before nouns in general statements.
        In English, you drop ''the'' when talking about things in general.'' Visual:
        French = always wear a hat (the), English = sometimes hat, sometimes no hat.'
      where_to_start: 'Teach generic vs specific: ''I love music'' (general) vs ''I
        love the music'' (specific song). Use realia.'
      sequencing: 'Week 1: a/an for first mention, the for second. Week 2: Zero article
        for general categories. Week 3: The for specific reference. Week 4: Abstract
        nouns.'
      exercises:
      - name: Article Choice Drill
        type: fill-in-the-blank
        description: '20 sentences: choose the/a/zero. Include generic, first mention,
          specific reference.'
        duration: 15
      - name: Generic vs Specific Contrast
        type: sentence-rewrite
        description: '10 pairs: generic (I love music) and specific (I love the music
          you played).'
        duration: 15
      - name: French-to-English Article Translation
        type: translation
        description: 'Translate 10 French sentences with le/la/les, adjusting articles:
          ''J''aime le chocolat'' -> ''I like chocolate.'''
        duration: 15
    examples:
    - 'Wrong: ''I like the coffee.'' (general) Correct: ''I like coffee.'''
    - 'Wrong: ''The music is beautiful.'' (general) Correct: ''Music is beautiful.'''
    - 'Wrong: ''I have book.'' Correct: ''I have a book.'''
    sources:
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in article interpretation.
    - Snape, N. (2008). Resetting the article parameter in L2 English.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.'
    source_count: 3
    source_type: literature
    frequency: 5
    persistence: 5
    communicative_impact: 4
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
