  conditionals:
    interference_patterns:
    - pattern: Use of conditional mood
      example: 'IT ''Se fossi ricco'' (if I-were rich) -> Error: ''If I would be rich''
        -> Correct: ''If I were rich'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: If I would have money, I would travel.
      correct: If I had money, I would travel.
    why_it_happens: Italian conditional structure differs from English.
    teacher_tips:
      how_to_explain: 'Teach: NO WOULD IN IF-CLAUSE. Use ''were'' for unreal situations.'
      where_to_start: Start with second conditional.
      sequencing: 'Week 1: Second conditional. Week 2: First conditional. Week 3:
        Review.'
      exercises:
      - name: Conditional Practice
        type: sentence-rewrite
        description: Students rewrite 10 conditional sentences.
        duration: 15
    sources:
