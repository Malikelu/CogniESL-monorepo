  prepositions:
    interference_patterns:
    - pattern: Transfer of Italian prepositions
      example: 'IT ''a'' = to/at/in -> Error: ''I go to home'' -> Correct: ''I go
        home'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of di for of
      example: 'IT ''di'' = of -> Error: ''The book of me'' -> Correct: ''My book'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I go to home.
      correct: I go home.
    - wrong: The book of me is interesting.
      correct: My book is interesting.
    why_it_happens: Italian prepositions often differ from English. Italian 'a' covers
      to/at/in. Italian 'di' covers of.
    teacher_tips:
      how_to_explain: Teach common Italian-English preposition differences.
      where_to_start: Start with the most common preposition transfers.
      sequencing: 'Week 1: Verb + preposition. Week 2: Prepositions of place. Week
        3: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 Italian sentences with correct English prepositions.
        duration: 15
