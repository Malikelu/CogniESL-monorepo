  subject_verb_agreement:
    interference_patterns:
    - pattern: Omission of third-person -s
      example: 'IT ''lui legge'' (he reads) -> Error: ''He read'' -> Correct: ''He
        reads'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: She like chocolate.
      correct: She likes chocolate.
    why_it_happens: Italian verb conjugation includes person/number marking. English
      third-person singular -s is frequently omitted.
    teacher_tips:
      how_to_explain: Teach the 'he/she/it + verb-s' rule as non-negotiable.
      where_to_start: Start with third-person -s.
      sequencing: 'Week 1: Third-person -s. Week 2: Does/doesnt. Week 3: Review.'
      exercises:
      - name: Agreement Drill
        type: oral-drill
        description: Students describe a classmate daily routine using third-person
          -s.
        duration: 10
