  false_friends:
    interference_patterns:
    - pattern: Confusion of IT-EN cognates
      example: 'IT ''attualmente'' = currently (not actually) -> Error: ''Actually,
        I live in Rome'' -> Correct: ''Currently, I live in Rome'''
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Confusion of parenti (relatives) with parents
      example: 'IT ''parenti'' = relatives -> Error: ''My parents are nice'' (when
        meaning relatives) -> Correct: ''My relatives are nice'''
      frequency: 4
      persistence: 4
      communicative_impact: 4
    examples:
    - wrong: Actually, I work in a bank.
      correct: Currently, I work in a bank.
    - wrong: My parents are very kind.
      correct: My relatives are very kind.
    why_it_happens: Italian and English share many Latin-derived cognates, but some
      have shifted meaning. These false friends cause high-impact communication errors.
    teacher_tips:
      how_to_explain: Create a 'False Friends Wall' with the top 20 IT-EN false friends.
      where_to_start: 'Start with the highest-impact false friends: actually/currently,
        parents/relatives.'
      sequencing: 'Week 1: Top 10 false friends. Week 2: Next 10. Week 3: Review.'
      exercises:
      - name: False Friend Flashcards
        type: matching
        description: Students create flashcards for 20 false friends.
        duration: 15
      - name: Context Clues
        type: fill-in-the-blank
        description: 15 sentences where students choose between false friend pairs.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 7
    - Parrott "Grammar for English Language Teachers"
