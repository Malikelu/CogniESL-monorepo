  phonology:
    interference_patterns:
    - pattern: Double consonant pronunciation
      example: 'IT double consonants -> Error: ''fato'' vs ''fatto'' confusion in
        English'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Difficulty with /θ/ and /ð/
      example: 'IT lacks dental fricatives -> Error: ''tink'' for ''think'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: Tink about it.
      correct: Think about it.
    - wrong: Dis is my book.
      correct: This is my book.
    why_it_happens: Italian lacks dental fricatives. Italian learners substitute /t/
      and /d/ for /θ/ and /ð/.
    teacher_tips:
      how_to_explain: 'Teach: /θ/ = tongue between teeth. Practice: think-this, three-that.'
      where_to_start: Start with TH sounds.
      sequencing: 'Week 1: TH sounds. Week 2: Other consonant contrasts. Week 3: Review.'
      exercises:
      - name: Minimal Pairs
        type: matching
        description: 'Students distinguish: think/tink, this/dis, thick/tick.'
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 7
    - Underhill "Sound Foundations"
