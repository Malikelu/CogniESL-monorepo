    - claim: Interference pattern for articles
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Italian speakers, pp. 72-87'
      tier: 1
    - claim: 'Grammar point: articles'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Article usage varies significantly across languages; many languages have
        no article system
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See articles entries 133-142
      tier: 2
    - claim: ELLs commonly omit indefinite article when descriptive adjectives come
        between determiner and noun
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
    - claim: Italian uses articles differently from English (p. 153)
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: See relevant section
      tier: 2
  pronouns:
    interference_patterns:
    - pattern: Use of subject pronouns for emphasis
      example: 'IT ''io vado'' (I go) -> Error: overuse of ''I'' -> Correct: ''I go''
        (pronoun optional in Italian)'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of indirect object pronouns
      example: 'IT ''gli do'' (to-him I-give) -> Error: ''Him I give'' -> Correct:
        ''I give to him'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Him I give the book.
      correct: I give the book to him.
    - wrong: To her I spoke yesterday.
      correct: I spoke to her yesterday.
    why_it_happens: Italian uses subject pronouns for emphasis (they are usually optional).
      Italian also places indirect object pronouns before the verb.
    teacher_tips:
      how_to_explain: 'Teach: English places indirect objects AFTER the verb or with
        ''to''.'
      where_to_start: Start with indirect object placement.
      sequencing: 'Week 1: Indirect objects. Week 2: Direct vs indirect. Week 3: Review.'
      exercises:
      - name: Pronoun Placement
        type: sentence-rewrite
        description: Students rewrite 10 sentences with correct pronoun placement.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 7
    - Parrott "Grammar for English Language Teachers"
