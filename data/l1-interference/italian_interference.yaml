language: italian
grammar_points:
  present_perfect_it:
    interference_patterns:
    - Italian uses passato prossimo vs imperfetto which does not exist in English,
      causing transfer errors related to 'present perfect it'.
    why_it_happens: Italian handles 'present perfect it' differently from English.
      Italian L1 speakers transfer native structural patterns to English, leading
      to systematic errors. The error is persistent because the Italian structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Italian and English for 'present
        perfect it'. Show the Italian structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Italian
        handles 'present perfect it' differently from English. Use visual aids or
        color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Italian sentences, students translate to English, focusing
          on correct 'present perfect it' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Italian-style 'present perfect it'
          errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'present
          perfect it' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'present perfect
          it' errors.
        duration: 15
    examples:
    - 'Wrong: ''I have eaten yesterday.'' Correct: ''I ate yesterday.'''
    - 'Wrong: ''I live here since 5 years.'' Correct: ''I have lived here for 5 years.'''
    - 'Wrong: ''When I arrived, he had left.'' (wrong sequence) Correct: ''When I
      arrived, he left.'''
    sources:
    - Serratrice, L. (2005). The role of discourse pragmatics in the acquisition of
      subjects in Italian. Applied Psycholinguistics, 26(3), 437-462.
    - Pinto, M. (1997). Licensing and interpretation of omitted subject in Italian.
      Linguistic Inquiry, 28(2), 349-376.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Italian
    notes: THE most cited Italian L1 error in English. Extremely persistent.
