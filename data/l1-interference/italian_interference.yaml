language: Italian
language_code: it
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of indefinite article after essere
      example: 'IT ''sono insegnante'' (I-am teacher) -> Error: ''I am teacher'' ->
        Correct: ''I am a teacher'''
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of definite article
      example: 'IT ''il/la/lo/l'''' = the -> Error: ''the water is the essential''
        -> Correct: ''Water is essential'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I am teacher.
      correct: I am a teacher.
    - wrong: She is doctor.
      correct: She is a doctor.
    why_it_happens: Italian omits the indefinite article after 'essere' (to be) for
      professions. Italian also uses definite articles more broadly than English.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES ''a/an'' after ''be'' for professions.'
      where_to_start: Start with the profession pattern.
      sequencing: 'Week 1: Articles with professions. Week 2: Definite vs indefinite.
        Week 3: Review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with Italian-influenced article errors.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 7 (Italian)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    source_rank: 1
