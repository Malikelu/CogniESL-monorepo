  reported_speech:
    interference_patterns:
    - pattern: No backshift of tenses
      example: 'HU ''Azt mondta, hogy jon'' (he said that he-comes) -> Error: ''He
        said that he comes'' -> Correct: ''He said that he would come'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: She said that she is tired.
      correct: She said that she was tired.
    - wrong: He told me that he will come.
      correct: He told me that he would come.
    why_it_happens: Hungarian reported speech often retains the original tense. English
      requires backshift.
    teacher_tips:
      how_to_explain: 'Teach the backshift rule: present -> past, will -> would.'
      where_to_start: Start with the basic backshift pattern.
      sequencing: 'Week 1: Say/tell + backshift. Week 2: Pronoun changes. Week 3:
        Modal backshift. Week 4: Review.'
      exercises:
      - name: Backshift Practice
        type: sentence-rewrite
        description: Students convert 15 direct speech sentences to reported speech.
        duration: 15
      - name: HU Reported Speech Translation
        type: translation
        description: Translate 15 Hungarian reported speech sentences into correct
          English.
        duration: 15
