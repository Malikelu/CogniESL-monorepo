  passive_voice:
    interference_patterns:
    - pattern: Avoidance of passive voice
      example: 'HU prefers active -> Error: ''Someone built this house'' -> Correct:
        ''This house was built'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Someone built this house in 1900.
      correct: This house was built in 1900.
    - wrong: My car stole yesterday.
      correct: My car was stolen yesterday.
    why_it_happens: Hungarian uses passive less frequently than English.
    teacher_tips:
      how_to_explain: 'Teach the passive formula: be + past participle.'
      where_to_start: Start with the passive formula.
      sequencing: 'Week 1: Passive formula. Week 2: Present and past passive. Week
        3: When to use passive. Week 4: Review.'
      exercises:
      - name: Active to Passive
        type: sentence-rewrite
        description: Students convert 15 active sentences to passive.
        duration: 15
      - name: HU Passive Translation
        type: translation
        description: Translate 15 Hungarian passive sentences into correct English.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
