      location: See relevant grammar point section
      tier: 2
    - claim: Germanic languages and Chinese make rich use of compounding, unlike other
        languages
      source: 'Celce-Murcia & Larsen-Freeman (2015) ''The Grammar Book: Form, Meaning,
        and Use for English Language Teachers'', 3rd ed., National Geographic Learning/Cengage'
      location: p. 39
      tier: 2
    - claim: 'Word order varies: SOV, SVO, VSO, V2, free order — all cause transfer
        errors'
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See word order entries
      tier: 2
    - claim: 'ELLs transfer L1 word order: subject-verb inversion from Spanish, SOV
        from Arabic/Japanese'
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 199
      tier: 2
  cases:
    interference_patterns:
    - pattern: Transfer of Hungarian case system
      example: 'HU 18+ cases -> Error: ''with I'' -> Correct: ''with me'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Transfer of Hungarian case system.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of suffixes instead of prepositions
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: HU 'hazban'
      example_gloss: house-in
      example_wrong: in house' (missing article)
      example_correct: in the house
      explanation: 'Transfer from L1: Use of suffixes instead of prepositions.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: With I go to school.
      correct: I go to school with me.
    - wrong: He gave the book to I.
      correct: He gave the book to me.
    why_it_happens: Hungarian has 18+ grammatical cases expressed as suffixes. English
      uses prepositions and pronoun case. Hungarian learners may use wrong pronoun
      forms or omit articles after case-like constructions.
    teacher_tips:
      how_to_explain: 'Teach: English uses subject pronouns (I, he, she) and object
        pronouns (me, him, her). After prepositions, use object pronouns.'
      where_to_start: Start with subject vs object pronouns.
      sequencing: 'Week 1: Subject vs object pronouns. Week 2: Pronouns after prepositions.
        Week 3: Who vs whom. Week 4: Review.'
      exercises:
      - name: Pronoun Case Practice
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct pronoun case.
        duration: 10
      - name: HU Pronoun Translation
        type: translation
        description: Translate 15 Hungarian sentences with correct English pronoun
          forms.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
