    examples:
    - wrong: If I would have money, I would travel.
      correct: If I had money, I would travel.
    - wrong: If I was rich, I would buy a house.
      correct: If I were rich, I would buy a house.
    why_it_happens: Hungarian conditional structure differs from English. Hungarian
      learners may use 'would' in the if-clause.
    teacher_tips:
      how_to_explain: 'Teach: NO WOULD IN IF-CLAUSE. Use ''were'' (not ''was'') for
        unreal situations.'
      where_to_start: Start with second conditional.
      sequencing: 'Week 1: Second conditional. Week 2: First conditional. Week 3:
        Zero conditional. Week 4: Review.'
      exercises:
      - name: Conditional Practice
        type: sentence-rewrite
        description: Students rewrite 10 conditional sentences.
        duration: 15
      - name: HU Conditional Translation
        type: translation
        description: Translate 15 Hungarian conditional sentences into correct English.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
