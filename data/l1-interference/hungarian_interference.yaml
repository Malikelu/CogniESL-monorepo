  false_friends:
    interference_patterns:
    - pattern: Confusion of HU-EN cognates
      example: 'HU ''aktualis'' = current (not actual) -> Error: ''The actual news''
        -> Correct: ''The current news'''
      frequency: 4
      persistence: 4
      communicative_impact: 4
    examples:
    - wrong: The actual situation is bad.
      correct: The current situation is bad.
    - wrong: I become a letter.
      correct: I get a letter.
    why_it_happens: Hungarian and English share some cognates with shifted meanings.
    teacher_tips:
      how_to_explain: Create a list of common HU-EN false friends.
      where_to_start: Start with the highest-impact false friends.
      sequencing: 'Week 1: Top 10 false friends. Week 2: Context-based practice. Week
        3: Review.'
      exercises:
      - name: False Friend Flashcards
        type: matching
        description: Students create flashcards for 10 false friends.
        duration: 15
      - name: Context Clues
        type: fill-in-the-blank
        description: 10 sentences where students choose between false friend pairs.
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Hungarian)
