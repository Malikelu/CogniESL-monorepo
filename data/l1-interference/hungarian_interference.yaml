language: Hungarian
language_code: hu
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of indefinite article
      example: 'HU ''orvos vagyok'' (doctor I-am) -> Error: ''I am doctor'' -> Correct:
        ''I am a doctor'''
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of definite article
      example: 'HU ''a/az'' = the -> Error: ''the water is the essential'' -> Correct:
        ''Water is essential'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I am teacher.
      correct: I am a teacher.
    - wrong: She is doctor.
      correct: She is a doctor.
    why_it_happens: Hungarian omits the indefinite article after 'to be' for professions.
      Hungarian has a definite article 'a/az' that is used more broadly than English
      'the'.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES ''a/an'' after ''be'' for professions.'
      where_to_start: Start with the profession pattern.
      sequencing: 'Week 1: Articles with professions. Week 2: Definite vs indefinite.
        Week 3: Zero article. Week 4: Review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with Hungarian-influenced article errors.
        duration: 15
      - name: HU Article Translation
        type: translation
        description: Translate 15 Hungarian sentences focusing on articles.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    source_rank: 2
    citations:
    - claim: 'Grammar point: articles'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Article usage varies significantly across languages; many languages have
        no article system
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See articles entries 133-142
      tier: 2
    - claim: ELLs commonly omit indefinite article when descriptive adjectives come
        between determiner and noun
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
  word_order:
    interference_patterns:
    - pattern: Focus-fronting word order
      example: 'HU ''Ketfeknyitottam'' (two-keys-I-opened) -> Error: ''Two keys I
        opened'' -> Correct: ''I opened two keys'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Verb-final in subordinate clauses
      example: 'HU ''mert fogorvos vagyok'' (because dentist I-am) -> Error: ''because
        dentist I am'' -> Correct: ''because I am a dentist'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: Because dentist I am, I know teeth.
      correct: Because I am a dentist, I know about teeth.
    - wrong: Two books I bought yesterday.
      correct: I bought two books yesterday.
    why_it_happens: Hungarian has flexible word order with focus-fronting (the focused
      element comes first). Hungarian is also verb-final in subordinate clauses. English
      is strictly SVO.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object. No focus-fronting,
        no verb-final.'
      where_to_start: Start with basic SVO order.
      sequencing: 'Week 1: Basic SVO. Week 2: Subordinate clauses. Week 3: Adverb
        placement. Week 4: Review.'
      exercises:
      - name: Word Order Correction
        type: error-correction
        description: 15 sentences with Hungarian-influenced word order.
        duration: 15
      - name: HU Word Order Translation
        type: translation
        description: Translate 15 Hungarian sentences focusing on word order.
        duration: 20
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 5
    communicative_impact: 4
    flagged: false
    tier: 1
    source_rank: 2
    citations:
    - claim: 'Grammar point: word order'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Germanic languages and Chinese make rich use of compounding, unlike other
        languages
      source: 'Celce-Murcia & Larsen-Freeman (2015) ''The Grammar Book: Form, Meaning,
        and Use for English Language Teachers'', 3rd ed., National Geographic Learning/Cengage'
      location: p. 39
      tier: 2
    - claim: 'Word order varies: SOV, SVO, VSO, V2, free order — all cause transfer
        errors'
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See word order entries
      tier: 2
    - claim: 'ELLs transfer L1 word order: subject-verb inversion from Spanish, SOV
        from Arabic/Japanese'
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 199
      tier: 2
  cases:
    interference_patterns:
    - pattern: Transfer of Hungarian case system
      example: 'HU 18+ cases -> Error: ''with I'' -> Correct: ''with me'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of suffixes instead of prepositions
      example: 'HU ''hazban'' (house-in) -> Error: ''in house'' (missing article)
        -> Correct: ''in the house'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: With I go to school.
      correct: I go to school with me.
    - wrong: He gave the book to I.
      correct: He gave the book to me.
    why_it_happens: Hungarian has 18+ grammatical cases expressed as suffixes. English
      uses prepositions and pronoun case. Hungarian learners may use wrong pronoun
      forms or omit articles after case-like constructions.
    teacher_tips:
      how_to_explain: 'Teach: English uses subject pronouns (I, he, she) and object
        pronouns (me, him, her). After prepositions, use object pronouns.'
      where_to_start: Start with subject vs object pronouns.
      sequencing: 'Week 1: Subject vs object pronouns. Week 2: Pronouns after prepositions.
        Week 3: Who vs whom. Week 4: Review.'
      exercises:
      - name: Pronoun Case Practice
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct pronoun case.
        duration: 10
      - name: HU Pronoun Translation
        type: translation
        description: Translate 15 Hungarian sentences with correct English pronoun
          forms.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
