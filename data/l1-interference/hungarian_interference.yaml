        have no reason'
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 1
      tier: 2
  prepositions:
    interference_patterns:
    - pattern: Transfer of Hungarian postpositions
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: HU 'asztal on'
      example_gloss: table on
      example_wrong: table on
      example_correct: on the table
      explanation: 'Transfer from L1: Transfer of Hungarian postpositions.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of -ban/-ben for in
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: HU 'hazban'
      example_gloss: house-in
      example_wrong: in house
      example_correct: in the house
      explanation: 'Transfer from L1: Use of -ban/-ben for in.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: Book the table on is.
      correct: The book is on the table.
    - wrong: I go in house.
      correct: I go in the house.
    why_it_happens: Hungarian uses postpositions (after nouns) and case suffixes instead
      of prepositions. English uses prepositions before nouns.
    teacher_tips:
      how_to_explain: 'Teach: English prepositions come BEFORE nouns. ''On the table''
        (not ''table on'').'
      where_to_start: Start with common prepositions of place.
      sequencing: 'Week 1: Prepositions of place. Week 2: Prepositions of time. Week
        3: Verb + preposition. Week 4: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 Hungarian sentences with correct English prepositions.
        duration: 15
      - name: Preposition Error Hunt
        type: error-correction
        description: A paragraph with 10 preposition errors.
        duration: 15
