language: hungarian
schema_version: '3.0'
grammar_points:
  case_system_18:
    interference_patterns:
    - Hungarian uses vowel harmony which does not exist in English, causing transfer
      errors related to 'case system 18'.
    why_it_happens: Hungarian handles 'case system 18' differently from English. Hungarian
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Hungarian structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Hungarian and English for 'case
        system 18'. Show the Hungarian structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Hungarian
        handles 'case system 18' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Hungarian sentences, students translate to English, focusing
          on correct 'case system 18' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Hungarian-style 'case system 18' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'case
          system 18' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'case system
          18' errors.
        duration: 15
    examples:
    - 'Wrong: ''I help he.'' Correct: ''I help him.'''
    - 'Wrong: ''Give it to she.'' Correct: ''Give it to her.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Dornyei, Z. & Kormos, J. (1998). Problem-solving mechanisms in L2 communication.
      Studies in Second Language Acquisition, 20(3), 349-385.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Hungarian
