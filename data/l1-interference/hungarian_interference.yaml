      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 294
      tier: 2
  negation:
    interference_patterns:
    - pattern: Use of nem before the verb
      example: 'HU ''nem tudom'' (not I-know) -> Error: ''I not know'' -> Correct:
        ''I do not know'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I not know the answer.
      correct: I do not know the answer.
    - wrong: She not likes coffee.
      correct: She does not like coffee.
    why_it_happens: Hungarian negation uses 'nem' (not) before the verb. English uses
      do/does/did + not + base verb.
    teacher_tips:
      how_to_explain: 'Teach: do/does/did + not + base verb. For ''be'' and modals,
        just add ''not'' after.'
      where_to_start: Start with do/does/did + not.
      sequencing: 'Week 1: Do/does/did + not. Week 2: Be + not. Week 3: Modals + not.
        Week 4: Review.'
      exercises:
      - name: Negation Transformation
        type: sentence-rewrite
        description: Students rewrite 15 affirmative sentences as negative.
        duration: 15
      - name: HU Negation Translation
        type: translation
        description: Translate 15 Hungarian negation sentences into correct English.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
