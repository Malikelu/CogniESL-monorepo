  relative_clauses:
    interference_patterns:
    - pattern: Use of aki/ami as relative pronouns
      example: 'HU ''aki'' = who/which -> Error: ''The man which'' -> Correct: ''The
        man who'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: The man which I met is my boss.
      correct: The man who I met is my boss.
    - wrong: The book what I read was interesting.
      correct: The book that I read was interesting.
    why_it_happens: Hungarian uses 'aki' (who) and 'ami' (which/that) as relative
      pronouns. English distinguishes who/which/that.
    teacher_tips:
      how_to_explain: 'Teach: For people -> who/that. For things -> that/which.'
      where_to_start: Start with 'that' as the default.
      sequencing: 'Week 1: That for things and people. Week 2: Who for people. Week
        3: Which for non-restrictive. Week 4: Review.'
      exercises:
      - name: Relative Pronoun Choice
        type: fill-in-the-blank
        description: 15 sentences where students choose that/which/who.
        duration: 10
      - name: HU Relative Translation
        type: translation
        description: Translate 15 Hungarian relative clauses into correct English.
        duration: 15
