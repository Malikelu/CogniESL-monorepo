  subject_verb_agreement:
    interference_patterns:
    - pattern: Omission of third-person -s
      example: 'HU ''olvas'' (he reads) -> Error: ''He read'' -> Correct: ''He reads'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: She like chocolate.
      correct: She likes chocolate.
    - wrong: He go to school every day.
      correct: He goes to school every day.
    why_it_happens: Hungarian verb conjugation includes person/number marking. English
      third-person singular -s is frequently omitted.
    teacher_tips:
      how_to_explain: Teach the 'he/she/it + verb-s' rule as non-negotiable.
      where_to_start: Start with third-person -s in present simple.
      sequencing: 'Week 1: Third-person -s. Week 2: Does/doesn''t. Week 3: Irregular
        forms. Week 4: Review.'
