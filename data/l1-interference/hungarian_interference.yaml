  verb_tenses:
    interference_patterns:
    - pattern: Use of past tense for all past
      example: 'HU ''eltem'' (I-lived) -> Error: ''I lived in 2010'' (correct) but
        overuse of simple past'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of present for future
      example: 'HU ''holnap megyek'' (tomorrow I-go) -> Error: ''Tomorrow I go'' ->
        Correct: ''Tomorrow I will go'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: Tomorrow I go to Budapest.
      correct: Tomorrow I will go to Budapest.
    - wrong: Next week she visits her grandmother.
      correct: Next week she will visit her grandmother.
    why_it_happens: Hungarian uses the present tense for future actions with time
      markers. English requires 'will' or 'going to' for future.
    teacher_tips:
      how_to_explain: 'Teach: Future time markers (tomorrow, next week) require ''will''
        or ''going to'' in English.'
      where_to_start: Start with future tense using 'will'.
      sequencing: 'Week 1: Future with will. Week 2: Future with going to. Week 3:
        Present for future (timetables). Week 4: Review.'
      exercises:
      - name: Future Tense Practice
        type: sentence-rewrite
        description: Students rewrite 15 present tense sentences in future.
        duration: 15
      - name: HU Future Translation
        type: translation
        description: Translate 15 Hungarian future sentences into correct English.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
