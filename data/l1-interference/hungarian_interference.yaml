  prepositions:
    interference_patterns:
    - pattern: Transfer of Hungarian postpositions
      example: 'HU ''asztal on'' (table on) -> Error: ''table on'' -> Correct: ''on
        the table'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of -ban/-ben for in
      example: 'HU ''hazban'' (house-in) -> Error: ''in house'' -> Correct: ''in the
        house'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: Book the table on is.
      correct: The book is on the table.
    - wrong: I go in house.
      correct: I go in the house.
    why_it_happens: Hungarian uses postpositions (after nouns) and case suffixes instead
      of prepositions. English uses prepositions before nouns.
    teacher_tips:
      how_to_explain: 'Teach: English prepositions come BEFORE nouns. ''On the table''
        (not ''table on'').'
      where_to_start: Start with common prepositions of place.
      sequencing: 'Week 1: Prepositions of place. Week 2: Prepositions of time. Week
        3: Verb + preposition. Week 4: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 Hungarian sentences with correct English prepositions.
        duration: 15
      - name: Preposition Error Hunt
        type: error-correction
        description: A paragraph with 10 preposition errors.
        duration: 15
