  questions:
    interference_patterns:
    - pattern: Use of -e question suffix
      example: 'HU ''mersz-e?'' (go-you-question?) -> Error: ''Go you?'' -> Correct:
        ''Do you go?'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: You go to school?
      correct: Do you go to school?
    - wrong: She likes coffee?
      correct: Does she like coffee?
    why_it_happens: Hungarian forms questions with the suffix '-e' attached to the
      verb. English requires do-support and inversion.
    teacher_tips:
      how_to_explain: 'Teach: Do/Does/Did + subject + base verb? For ''be'' and modals,
        just invert.'
      where_to_start: Start with yes/no questions.
      sequencing: 'Week 1: Yes/no questions. Week 2: Wh- questions. Week 3: Tag questions.
        Week 4: Review.'
      exercises:
      - name: Question Formation
        type: sentence-rewrite
        description: Students convert 15 statements to questions.
        duration: 15
      - name: HU Question Translation
        type: translation
        description: Translate 15 Hungarian questions into correct English.
        duration: 15
      - name: Interview Activity
        type: oral-drill
        description: Students interview each other using questions.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
