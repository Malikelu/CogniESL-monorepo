language: Hungarian
language_code: hu
schema_version: '4.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of indefinite article
      frequency: 5
      persistence: 4
      communicative_impact: 3
      example_l1: HU 'orvos vagyok'
      example_gloss: doctor I-am
      example_wrong: I am doctor
      example_correct: I am a doctor
      explanation: 'Transfer from L1: Omission of indefinite article.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overuse of definite article
      example: 'HU ''a/az'' = the -> Error: ''the water is the essential'' -> Correct:
        ''Water is essential'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Overuse of definite article.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I am teacher.
      correct: I am a teacher.
    - wrong: She is doctor.
      correct: She is a doctor.
    why_it_happens: Hungarian omits the indefinite article after 'to be' for professions.
      Hungarian has a definite article 'a/az' that is used more broadly than English
      'the'.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES ''a/an'' after ''be'' for professions.'
      where_to_start: Start with the profession pattern.
      sequencing: 'Week 1: Articles with professions. Week 2: Definite vs indefinite.
        Week 3: Zero article. Week 4: Review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with Hungarian-influenced article errors.
        duration: 15
      - name: HU Article Translation
        type: translation
        description: Translate 15 Hungarian sentences focusing on articles.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    source_rank: 2
    citations:
    - claim: 'Grammar point: articles'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Article usage varies significantly across languages; many languages have
        no article system
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See articles entries 133-142
      tier: 2
    - claim: ELLs commonly omit indefinite article when descriptive adjectives come
        between determiner and noun
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
  word_order:
    interference_patterns:
    - pattern: Focus-fronting word order
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: HU 'Ketfeknyitottam'
      example_gloss: two-keys-I-opened
      example_wrong: Two keys I opened
      example_correct: I opened two keys
      explanation: 'Transfer from L1: Focus-fronting word order.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Verb-final in subordinate clauses
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: HU 'mert fogorvos vagyok'
      example_gloss: because dentist I-am
      example_wrong: because dentist I am
      example_correct: because I am a dentist
      explanation: 'Transfer from L1: Verb-final in subordinate clauses.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: Because dentist I am, I know teeth.
      correct: Because I am a dentist, I know about teeth.
    - wrong: Two books I bought yesterday.
      correct: I bought two books yesterday.
    why_it_happens: Hungarian has flexible word order with focus-fronting (the focused
      element comes first). Hungarian is also verb-final in subordinate clauses. English
      is strictly SVO.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object. No focus-fronting,
        no verb-final.'
      where_to_start: Start with basic SVO order.
      sequencing: 'Week 1: Basic SVO. Week 2: Subordinate clauses. Week 3: Adverb
        placement. Week 4: Review.'
      exercises:
      - name: Word Order Correction
        type: error-correction
        description: 15 sentences with Hungarian-influenced word order.
        duration: 15
      - name: HU Word Order Translation
        type: translation
        description: Translate 15 Hungarian sentences focusing on word order.
        duration: 20
    sources:
    - Swan & Smith "Learner English" (Hungarian)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 5
