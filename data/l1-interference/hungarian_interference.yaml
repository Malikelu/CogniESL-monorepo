  countability:
    interference_patterns:
    - pattern: Pluralization of uncountable nouns
      example: 'HU ''informaciok'' = informations -> Error: ''informations'' -> Correct:
        ''information'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I have many homeworks.
      correct: I have a lot of homework.
    - wrong: She gave me good advices.
      correct: She gave me good advice.
    why_it_happens: Hungarian treats some nouns as countable that are uncountable
      in English.
    teacher_tips:
      how_to_explain: Create a list of common uncountable nouns.
      where_to_start: Start with the countable/uncountable distinction.
      sequencing: 'Week 1: Common uncountable nouns. Week 2: Much/many. Week 3: Partitives.
        Week 4: Review.'
      exercises:
      - name: Countable or Not?
        type: matching
        description: Students categorize 30 nouns.
        duration: 10
      - name: Quantifier Choice
        type: fill-in-the-blank
        description: 20 sentences where students choose much/many.
        duration: 10
