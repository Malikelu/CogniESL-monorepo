language: Indonesian
language_code: id
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of all articles (Indonesian has no article system)
      example: Indonesian has no words for 'a/an' or 'the.' 'Buku' can mean 'a book,'
        'the book,' or 'books.' Learners say 'I want book' instead of 'I want a book.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Use of demonstratives (ini/itu) as article substitutes
      example: Indonesian uses 'ini' (this) and 'itu' (that) for specificity instead
        of articles. Learners may overuse 'this/that' in English where 'a' or 'the'
        would be correct.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'sebuah' (one) or 'seorang' (one person) as indefinite article
        substitutes
      example: 'Indonesian has numeral classifiers like ''sebuah'' (one, for objects)
        and ''seorang'' (one, for people). Learners may overuse ''one'' in English:
        ''I saw one man on the street'' instead of ''I saw a man on the street.'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - wrong: Saya guru.
      correct: I am a teacher.
      id_original: Saya guru.
      gloss: I teacher.
      explanation: 'Indonesian has no article. ''Saya guru'' literally means ''I teacher.''
        English requires ''a'': ''I am a teacher.'''
    - wrong: Saya mau buku.
      correct: I want a book.
      id_original: Saya mau buku.
      gloss: I want book.
      explanation: Indonesian 'buku' (book) has no article. English requires 'a' for
        first mention of a singular countable noun.
    - wrong: Dia beli buku kemarin.
      correct: He bought a book yesterday.
      id_original: Dia beli buku kemarin.
      gloss: He buy book yesterday.
      explanation: Indonesian sentence has no article before 'buku.' English requires
        'a' for first mention.
    - wrong: I saw one man on the street.
      correct: I saw a man on the street.
      id_original: Saya melihat seorang pria di jalan.
      gloss: I see one-person man on street.
      explanation: Indonesian 'seorang' is a numeral classifier meaning 'one person.'
        Learners may translate this as 'one man' instead of 'a man.'
    why_it_happens: 'Indonesian has no article system whatsoever. There are no words
      equivalent to ''a/an'' or ''the'' in Indonesian grammar. Definiteness and specificity
      are expressed through other means: (1) word order — definite nouns often come
      after the verb or are fronted, (2) demonstratives ''ini'' (this) and ''itu''
      (that), (3) numeral classifiers like ''sebuah'' (one, for objects) and ''seorang''
      (one, for people), and (4) context. Because Indonesian speakers never need to
      choose between ''a,'' ''the,'' or zero article, the entire concept of grammatical
      definiteness marking is foreign. This is one of the most persistent and frequent
      errors for Indonesian learners at all levels. The absence of articles in L1
      means learners have no mental framework for understanding why English requires
      them.'
    teacher_tips:
      how_to_explain: 'Start by explaining that English REQUIRES a ''determiner''
        before most singular countable nouns — this is a grammatical rule, not optional.
        Use a simple three-way system: (1) ''a/an'' = one thing, first time mentioning
        it, ''I need a pen'' (any pen). (2) ''the'' = specific thing, both people
        know which one, ''Pass me the pen'' (that specific pen). (3) zero article
        = general statements with plurals or uncountables, ''I like books'' or ''Water
        is important.'' Contrast with Indonesian: show that Indonesian uses ''ini/itu''
        (this/that) or nothing at all. Emphasize that ''a/an'' is the default for
        singular countable nouns — when in doubt, use ''a.'''
      where_to_start: 'Begin with the most basic rule: singular countable nouns MUST
        have a determiner. Drill ''I am a + profession,'' ''I have a + object,'' ''I
        want a + thing.'' Then introduce ''the'' for specific reference. Save zero
        article for later.'
      sequencing: 'Week 1: Introduce a/an with singular countable nouns (professions,
        objects, daily vocabulary). Week 2: Introduce the for specific/known reference.
        Week 3: Contrast a vs the; introduce zero article with plurals and uncountables.
        Week 4: Mixed practice in context (paragraphs, dialogues, picture descriptions).'
      exercises:
      - name: Add the Missing Word
        type: fill-in-the-blank
        description: 20 sentences with singular countable nouns. Learners must add
          a/an or the. Include Indonesian glosses to highlight the structural difference.
        duration: 15
      - name: Translate from Indonesian
        type: translation
        description: 15 Indonesian sentences without articles. Learners translate
          to English, adding the correct article.
        duration: 20
      - name: One or A?
        type: error-correction
        description: 10 sentences where 'one' is incorrectly used instead of 'a/an.'
          Learners correct them. Addresses the 'sebuah/seorang' transfer issue.
        duration: 10
      - name: Picture Story
        type: speaking
        description: Show a sequence of pictures. Learners tell the story, practicing
          'a' for first mention and 'the' for subsequent mention. E.g., 'A man walked
          into a shop. The man bought a book.'
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Indonesian)
    - Parrott "Grammar for English Language Teachers"
    - Celce-Murcia & Larsen-Freeman "The Grammar Book"
