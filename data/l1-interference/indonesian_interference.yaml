language: indonesian
schema_version: '3.0'
grammar_points:
  no_verb_conjugation:
    interference_patterns:
    - Indonesian uses no articles which does not exist in English, causing transfer
      errors related to 'no verb conjugation'.
    why_it_happens: Indonesian handles 'no verb conjugation' differently from English.
      Indonesian L1 speakers transfer native structural patterns to English, leading
      to systematic errors. The error is persistent because the Indonesian structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Indonesian and English for 'no
        verb conjugation'. Show the Indonesian structure side-by-side with English.
        Highlight the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Indonesian
        handles 'no verb conjugation' differently from English. Use visual aids or
        color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Indonesian sentences, students translate to English,
          focusing on correct 'no verb conjugation' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Indonesian-style 'no verb conjugation'
          errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'no
          verb conjugation' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'no verb conjugation'
          errors.
        duration: 15
    examples:
    - 'Wrong: Applying Indonesian ''no verb conjugation'' structure to English. Correct:
      Use the English structure for ''no verb conjugation''.'
    - 'Wrong: Direct translation of Indonesian ''no verb conjugation'' pattern. Correct:
      Follow English ''no verb conjugation'' conventions.'
    - 'Wrong: Correct: Use English-specific ''no verb conjugation'' patterns.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Siregar, F. (2005). Indonesian learners and English article acquisition. TEFLIN
      Journal, 16(1), 45-60.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Indonesian
    notes: Most impactful single difference. Students omit third-person -s constantly.
