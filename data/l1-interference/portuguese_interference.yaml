  even_if:
    interference_patterns:
    - pattern: Use of 'even if' with 'will'
      example_portuguese: Mesmo se chover, eu vou.
      example_gloss: Even if it rains, I will go.
      example_wrong: Even if it will rain, I will go.
      example_correct: Even if it rains, I will go.
      explanation: Portuguese uses the future subjunctive after 'mesmo se.' English
        uses the present simple after 'even if,' not 'will.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Confusion between 'even if' (conditional) and 'even though' (concessive)
      example_portuguese: Mesmo que ele saiba, ele nao vai dizer.
      example_gloss: Even if/even though he knows, he will not say.
      example_wrong: Even if he knows the truth, he will not tell anyone. [when the
        truth is known/factual]
      example_correct: Even though he knows the truth, he will not tell anyone.
      explanation: >-
        Portuguese 'mesmo que' covers both conditional ('even if') and
        concessive ('even though') meanings, using the subjunctive mood for both.
        English distinguishes them sharply: 'even if' for hypothetical/uncertain conditions,
        'even though' for known/factual concessions. Portuguese speakers often use
        'even if' where English requires 'even though,' especially when the condition
        is factual rather than hypothetical.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''Even if it will rain, I will go.'' Correct: ''Even if it rains, I
      will go.'''
    - 'Wrong: ''Even if she is the CEO, she has to follow the rules.'' [factual]
      Correct: ''Even though she is the CEO, she has to follow the rules.'''
    why_it_happens: >-
      Portuguese uses the future subjunctive after 'mesmo se' (even
      if). English uses the present simple after 'even if,' not 'will.' Portuguese
      speakers may use 'will' after 'even if.' Additionally, Portuguese 'mesmo que'
      functions as both 'even if' (conditional) and 'even though' (concessive) depending
      on context, with the subjunctive mood covering both meanings. English requires
      a strict distinction: 'even if' for hypothetical conditions and 'even though'
      for acknowledged facts. Portuguese speakers transfer the single-form 'mesmo que'
      as 'even if' in all contexts, producing errors when the concessive 'even though'
      is required.
    teacher_tips:
      how_to_explain: 'Teach: ''even if + present simple'' (not ''will''). ''Even
        if it rains'' (not ''even if it will rain''). Then explain the difference:
        ''even if'' = maybe it will happen (hypothetical), ''even though'' = it is
        true (factual). ''Even if it rains'' (we don''t know) vs. ''Even though it
        IS raining'' (it is happening).'
      where_to_start: 'Begin with simple conditions: ''Even if it rains, I will go.'''
      sequencing: 'Week 1: ''Even if + present simple.'' Week 2: ''Even if'' vs. ''even
        though'' (hypothetical vs. factual). Week 3: Practice distinguishing the two.
        Week 4: Mixed practice with ''if,'' ''even if,'' and ''even though.'''
      exercises:
      - name: Even If Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students use 'even if' correctly with the
          present simple (no 'will').
        duration: 15
      - name: Even If vs Even Though Sort
        type: sentence-rewrite
        description: Provide 12 sentences using 'mesmo que' in Portuguese. Students
          must decide whether each requires 'even if' (hypothetical) or 'even though'
          (factual) in English and write the correct version.
        duration: 20
