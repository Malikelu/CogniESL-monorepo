  conditional_conditional:
    interference_patterns:
    - pattern: Use of 'would' in both clauses of second conditional
      example_portuguese: Se eu tivesse dinheiro, eu viajaria.
      example_gloss: If I had money, I would travel.
      example_wrong: If I would have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese uses the conditional in the main clause and the imperfect
        subjunctive in the if-clause. English uses the past simple in the if-clause,
        never 'would.' Portuguese speakers transfer the conditional mood (viaria)
        as 'would' into the if-clause, producing the ungrammatical 'If I would have.'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of present tense in if-clause where English requires past simple
        for hypotheticals
      example_portuguese: Se eu tenho dinheiro, eu viajaria.
      example_gloss: If I have money, I would travel.
      example_wrong: If I have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (tivesse) in the if-clause
        for hypothetical conditionals. English uses the past simple (had), not the
        present tense. Portuguese speakers may use the present tense in the if-clause
        because the Portuguese present subjunctive (tenha) and imperfect subjunctive
        (tivesse) distinction does not map neatly onto English tense usage. The result
        is a mixed conditional error — present tense in the if-clause with 'would'
        in the main clause.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''If I would have money, I would travel.'' Correct: ''If I had money,
      I would travel.'''
    - 'Wrong: ''If I have money, I would travel.'' (hypothetical) Correct: ''If I
      had money, I would travel.'''
    why_it_happens: Portuguese has a rich subjunctive system with distinct present
      and imperfect subjunctive forms. For hypothetical conditionals, Portuguese uses
      the imperfect subjunctive in the if-clause (se eu tivesse = if I had) and the
      conditional in the main clause (eu viajaria = I would travel). English uses
      the past simple in the if-clause (had), never 'would,' and 'would' only in the
      main clause. Portuguese speakers make two types of errors because of this mismatch
      (1) they transfer the conditional mood into the if-clause as 'would' (se eu
      tivesse -> if I would have), and (2) they use the present tense in the if-clause
      because the Portuguese present subjunctive (tenha) is used for future hypotheticals,
      leading to 'if I have' instead of 'if I had.' Both errors are documented in
      Swan & Smith (2001) and Azevedo (1996).
    teacher_tips:
      how_to_explain: 'Teach the second conditional formula: ''If + past simple, would
        + base verb.'' Emphasize: ''would'' NEVER goes in the if-clause. The past
        tense in the if-clause does not refer to the past — it shows the situation
        is unreal or unlikely. Contrast: ''If I have money'' (real/possible) vs. ''If
        I had money'' (unreal/hypothetical).'
      where_to_start: 'Begin with clear hypotheticals: ''If I had a car, I would drive
        to work.'' ''If I were rich, I would travel.'' Drill the structure: if + past,
        would + base.'
      sequencing: 'Week 1: Second conditional structure (if + past, would + base).
        Week 2: ''Would'' only in main clause — never in if-clause. Week 3: Present
        vs. past in if-clause (real vs. hypothetical). Week 4: Mixed practice with
        error correction.'
      exercises:
      - name: Would in If-Clause Error Correction
        type: error-correction
        description: Provide 10 sentences with 'would' in the if-clause. Students
          identify the error and correct it.
        duration: 15
      - name: Present or Past in If-Clause
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between present
          tense and past simple in the if-clause, depending on whether the situation
          is real or hypothetical.
        duration: 15
      - name: Second Conditional Transformation
        type: transformation
        description: Give 10 Portuguese sentences with imperfect subjunctive (se eu
          tivesse/se eu fosse). Students translate into correct English second conditional.
        duration: 15
