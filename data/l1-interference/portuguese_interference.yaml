  nominalization:
    interference_patterns:
    - pattern: Use of 'the' + gerund as subject where English uses bare gerund
      example_portuguese: O falar e importante.
      example_gloss: The speaking is important.
      example_wrong: The speaking is important.
      example_correct: Speaking is important.
      explanation: Portuguese uses definite article + infinitive/gerund as a nominalized
        verb form (o falar = the speaking). English uses the gerund alone as a subject
        without any article. Portuguese speakers transfer the article + verb pattern
        directly into English.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of 'the + gerund + of' where English uses gerund + direct object
      example_portuguese: A leitura de livros e importante.
      example_gloss: The reading of books is important.
      example_wrong: The reading of books is important.
      example_correct: Reading books is important.
      explanation: Portuguese nominalized infinitives take a direct object introduced
        by 'de' (a leitura de livros = the reading of books). English gerunds take
        their object directly without 'of' (reading books). Portuguese speakers transfer
        the 'de' linker as 'of' and retain the article, producing 'the reading of
        books' instead of 'reading books.' This pattern is documented in contrastive
        analyses of Romance vs. Germanic nominalization strategies.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''The speaking is important.'' Correct: ''Speaking is important.'''
    - 'Wrong: ''The reading of books is important.'' Correct: ''Reading books is important.'''
    - 'Wrong: ''The writing of letters is a lost art.'' Correct: ''Writing letters
      is a lost art.'''
    why_it_happens: 'Portuguese readily nominalizes verbs by adding a definite article:
      ''o falar'' (the speaking), ''a leitura'' (the reading). English nominalizations
      typically use the gerund without an article (''speaking,'' ''reading'') or a
      derived noun (''speech,'' ''reading''). Portuguese speakers transfer the article
      + verb pattern. Additionally, Portuguese nominalized infinitives take their
      complement with ''de'' (a leitura de livros = the reading of books), while English
      gerunds take direct objects without a preposition (reading books). The transfer
      of both the article and the ''de/of'' linker produces the compound error ''the
      reading of books'' instead of ''reading books.'''
    teacher_tips:
      how_to_explain: 'Show that English gerunds (verb + ing) can be used as nouns
        WITHOUT an article. ''Speaking is fun'' not ''The speaking is fun.'' Also
        show that gerunds take direct objects: ''Reading books'' not ''The reading
        of books.'''
      where_to_start: 'Begin with simple gerund subjects: ''Swimming is fun,'' ''Reading
        is important.'' No ''the.'' Then introduce gerund + object: ''Reading books
        is fun'' not ''The reading of books is fun.'''
      sequencing: 'Week 1: Gerunds as subjects (no article). Week 2: Gerund phrases
        without ''of.'' Week 3: Derived nouns vs. gerunds. Week 4: Mixed practice.'
      exercises:
      - name: Article Deletion with Gerunds
        type: error-correction
        description: Provide 10 sentences with unnecessary 'the' before gerunds. Students
          remove the article.
        duration: 10
      - name: Gerund Phrase Simplification
        type: sentence-rewrite
        description: Give 10 nominalized phrases with 'of.' Students rewrite using
          gerund phrases with direct objects.
        duration: 15
