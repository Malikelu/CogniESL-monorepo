  for_vs_during:
    interference_patterns:
    - pattern: Use of 'for' where 'during' is needed
      example_portuguese: Eu estudei durante a aula.
      example_gloss: I studied during the class.
      example_wrong: I studied for the class.
      example_correct: I studied during the class.
      explanation: Portuguese 'durante' = English 'during.' Portuguese speakers may
        use 'for' by analogy with 'por.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'during' where 'for' is needed
      example_portuguese: Eu estudei por 3 horas.
      example_gloss: I studied for 3 hours.
      example_wrong: I studied during 3 hours.
      example_correct: I studied for 3 hours.
      explanation: Portuguese 'por' = English 'for' (duration). Portuguese 'durante'
        = English 'during' (within a period).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I studied for the class.'' Correct: ''I studied during the class.'''
    - 'Wrong: ''I studied during 3 hours.'' Correct: ''I studied for 3 hours.'''
    why_it_happens: Portuguese 'por' and 'durante' both translate to English 'for'
      and 'during,' but the distribution differs. Portuguese speakers confuse 'for'
      and 'during.'
    teacher_tips:
      how_to_explain: 'Teach: ''for'' = duration (for 3 hours), ''during'' = within
        a period (during the class). ''For'' answers ''how long?''; ''during'' answers
        ''when?'''
      where_to_start: 'Begin with clear examples: ''I studied for 3 hours'' vs. ''I
        studied during the class.'''
      sequencing: 'Week 1: ''For'' for duration. Week 2: ''During'' for within a period.
        Week 3: Contrast. Week 4: Mixed.'
      exercises:
      - name: For vs During Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between 'for' and 'during.'
        duration: 15
