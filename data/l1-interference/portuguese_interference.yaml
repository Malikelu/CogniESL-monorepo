  complex_noun_phrases:
    interference_patterns:
    - pattern: Post-nominal adjective placement transferred to English
      example_portuguese: Uma casa grande e bonita.
      example_gloss: A house big and beautiful.
      example_wrong: A house big and beautiful.
      example_correct: A big and beautiful house.
      explanation: Portuguese places most adjectives after the noun (uma casa grande).
        English places adjectives before the noun (a big house).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'of' in noun + noun compounds
      example_portuguese: Uma xicara de cafe.
      example_gloss: A cup of coffee.
      example_wrong: A cup coffee.
      example_correct: A cup of coffee.
      explanation: Portuguese uses 'de' (of) to link nouns in descriptive phrases.
        English often uses noun + noun compounds without 'of.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''A house big.'' Correct: ''A big house.'''
    - 'Wrong: ''A cup coffee.'' Correct: ''A cup of coffee.'''
    why_it_happens: Portuguese noun phrases have a different internal structure from
      English. Most Portuguese adjectives follow the noun (uma casa bonita = a beautiful
      house), while English adjectives precede the noun. Additionally, Portuguese
      uses the preposition 'de' to link nouns in descriptive phrases (uma xicara de
      cafe = a cup of coffee), while English often creates compound nouns without
      a preposition (a coffee cup).
    teacher_tips:
      how_to_explain: 'Write ''uma casa grande e bonita'' on the board. Underline
        ''casa'' (noun) and ''grande/bonita'' (adjectives). Show that in English,
        the order reverses: adjective + noun.'
      where_to_start: Begin with adjective placement. Write Portuguese noun phrases
        and have students rearrange into English order.
      sequencing: 'Week 1: Adjective placement (before noun in English). Week 2: Noun
        + noun compounds vs. noun + of + noun. Week 3: Multiple adjectives before
        nouns. Week 4: Mixed practice.'
      exercises:
      - name: Adjective Rearrangement
        type: transformation
        description: Give 10 Portuguese noun phrases with post-nominal adjectives.
          Students rearrange into correct English order.
        duration: 15
      - name: Noun Compound Decision
        type: fill-in-the-blank
        description: Provide 15 noun phrases where students must choose between noun
          + noun or noun + of + noun.
        duration: 15
