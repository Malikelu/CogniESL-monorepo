  short_answers:
    interference_patterns:
    - pattern: Use of yes with full verb repetition instead of do/does auxiliary
      example_portuguese: Voce gosta de cafe? Sim, eu gosto.
      example_gloss: You like coffee? Yes, I like.
      example_wrong: Yes, I like.
      example_correct: Yes, I do.
      explanation: Portuguese short answers repeat the main verb (Sim, eu gosto = Yes,
        I like). English short answers use the auxiliary do/does/did, never the main
        verb alone. Portuguese speakers transfer the L1 pattern of verb repetition
        directly, producing "Yes, I like" instead of "Yes, I do."
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Omission of auxiliary in short answers with be and modals
      example_portuguese: Voce esta cansado? Sim, eu estou. / Voce pode ajudar? Sim,
        eu posso.
      example_gloss: You are tired? Yes, I am. / You can help? Yes, I can.
      example_wrong: Yes, I'm tired. / Yes, I can help.
      example_correct: Yes, I am. / Yes, I can.
      explanation: Portuguese short answers with ser/estar and modals repeat the full
        verb (Sim, eu estou = Yes, I am; Sim, eu posso = Yes, I can). While English
        also repeats the auxiliary/modal in short answers, Portuguese speakers may
        over-extend this to full verb repetition ("Yes, I am tired" instead of "Yes,
        I am") or omit the auxiliary entirely in elliptical responses, especially
        under communicative pressure. The L1 pattern of verb repetition bleeds into
        contexts where English requires only the auxiliary.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: Yes, I like. Correct: Yes, I do.'
    - 'Wrong: Yes, I am tired. Correct: Yes, I am.'
    why_it_happens: Portuguese short answers repeat the lexical verb (Sim, eu gosto
      = Yes, I like; Sim, eu sei = Yes, I know). English short answers use do/does/did
      as a pro-form for the verb phrase, never the main verb alone. Portuguese lacks
      do-support entirely, so speakers transfer the L1 strategy of verb repetition.
      With be and modals, both languages repeat the auxiliary, but Portuguese speakers
      may over-extend to full verb repetition or omit the auxiliary under pressure
      because their L1 does not grammatically require it in the same way.
    teacher_tips:
      how_to_explain: 'Write ''Sim, eu gosto'' on the board. Show that English needs
        DO as a ''helper word'': ''Yes, I do (not Yes, I like).'' Then contrast with
        be/modals: ''Yes, I am'' (not ''Yes, I am tired''), ''Yes, I can'' (not ''Yes,
        I can help''). Drill all three types together.'
      where_to_start: Begin with do/does short answers (most different from Portuguese),
        then be short answers, then modal short answers.
      sequencing: 'Week 1: Short answers with do/does/did. Week 2: Short answers with
        be (am/is/are/was/were). Week 3: Short answers with modals (can/could/will/would).
        Week 4: Mixed practice with error correction.'
      exercises:
      - name: Short Answer Drill
        type: fill-in-the-blank
        description: Provide 10 yes/no questions. Students write correct short answers
          using do/does/did, be, or modals as appropriate.
        duration: 10
      - name: Short Answer Discrimination
        type: multiple-choice
        description: 'Present 12 questions with 3 answer options each: (a) Portuguese-style
          verb repetition, (b) correct English short answer, (c) full sentence response.
          Students identify the correct short answer. Example: "Do you like coffee?"
          (a) Yes, I like (b) Yes, I do (c) Yes, I like coffee very much.'
        duration: 12
