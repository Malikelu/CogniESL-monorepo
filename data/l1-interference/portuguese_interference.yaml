  deixis: &id004
    interference_patterns:
    - pattern: Overuse of 'this' for distant referents due to Portuguese three-way demonstrative system
      example_portuguese: Aquele livro e bom.
      example_gloss: That book (over there) is good.
      example_wrong: This book is good. (pointing to a distant book)
      example_correct: That book is good.
      explanation: Portuguese has a three-way demonstrative system distinguishing proximity
        to speaker (este), proximity to listener (esse), and distance from both (aquele).
        English has a two-way system (this/that). Portuguese speakers often map both
        esse and aquele onto 'this' because the English two-way distinction does not
        match their L1 three-way system, leading to overuse of 'this' for referents
        that are not near the speaker.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion of temporal deictic adverbs — 'já' mapped to multiple English equivalents
      example_portuguese: Eu ja terminei.
      example_gloss: I already finished.
      example_wrong: I just finished. / I now finished.
      example_correct: I have already finished. / I just finished.
      explanation: Portuguese 'ja' is a single temporal deictic adverb that covers the
        semantic range of English 'already,' 'just,' and 'now.' Portuguese speakers
        struggle to choose the correct English equivalent because their L1 uses one
        word for all three temporal nuances. 'Ja' with perfective meaning maps to 'already,'
        with recent-past meaning maps to 'just,' and with immediate-future meaning maps
        to 'now' (ja ja = right now). This many-to-many mapping causes persistent
        errors in temporal reference.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of demonstratives for discourse deixis where English prefers other markers
      example_portuguese: Isto e o que eu quero dizer.
      example_gloss: This is what I want to say.
      example_wrong: This is what I want to say. (referring to a complex argument just made)
      example_correct: That is what I wanted to say. / What I mean is this.
      explanation: Portuguese freely uses 'isto' (proximal) and 'aquele' (distal) for
        discourse-level reference to entire propositions, arguments, or stretches of
        text. While English also has discourse deixis, Portuguese speakers tend to
        overuse 'this' to refer to complex or distant discourse referents where English
        would use 'that' or restructure the sentence. Additionally, Portuguese 'isso'
        (meso-distance) has no direct English equivalent, leading to confusion about
        whether 'this' or 'that' is appropriate for mid-distance discourse reference.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: This book is good. (pointing to a distant book) Correct: That book is
      good.'
    - 'Wrong: I now finished. Correct: I have already finished.'
    - 'Wrong: This is the problem. (referring to a complex issue discussed earlier)
      Correct: That is the problem.'
    why_it_happens: 'Portuguese has a three-way demonstrative system (este/esse/aquele)
      that maps onto a two-way English system (this/that). The Portuguese system encodes
      proximity to speaker (este), proximity to listener (esse), and distance from both
      (aquele), while English only encodes proximity vs. non-proximity. This structural
      mismatch causes Portuguese speakers to overuse ''this'' for referents that are
      not near the speaker. Additionally, Portuguese temporal deictic ''ja'' covers
      the semantic range of English ''already,'' ''just,'' and ''now,'' creating a
      many-to-many mapping problem. For discourse deixis, Portuguese ''isso'' (meso-distance)
      has no English equivalent, leading to uncertainty about whether ''this'' or ''that''
      is appropriate for mid-distance discourse reference.'
    teacher_tips:
      how_to_explain: 'Draw three circles on the board: SPEAKER (this), LISTENER (that),
        FAR (that). Show that Portuguese has three words but English only has two. For
        ''ja,'' create a timeline showing already/just/now as different positions relative
        to the present moment.'
      where_to_start: Begin with physical objects at different distances to establish
        the this/that distinction. Then move to temporal ''ja'' with timeline exercises.
        Finally, practice discourse deixis with short texts.
      sequencing: 'Week 1: Spatial this/that with physical objects. Week 2: These/those
        with plurals. Week 3: Temporal ''ja'' — already/just/now. Week 4: Discourse
        deixis with short texts. Week 5: Mixed practice.'
      exercises:
      - name: This or That Distance Game
        type: oral-drill
        description: Place objects at various distances from speaker and listener. Students
          describe them using correct this/that/these/those.
        duration: 10
      - name: Ja Translation Decision
        type: fill-in-the-blank
        description: Provide 15 Portuguese sentences with 'ja.' Students translate each
          into English, choosing the correct temporal adverb (already, just, now) based
          on context.
        duration: 15
      - name: Discourse Deixis Rewriting
        type: sentence-rewrite
        description: Give 10 short paragraphs where students must identify and correct
          demonstrative references to discourse content (this/that for propositions
          and arguments).
        duration: 15
