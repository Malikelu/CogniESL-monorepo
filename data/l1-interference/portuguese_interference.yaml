  negation:
    interference_patterns:
    - pattern: Use of not without do-support
      example_portuguese: Eu nao gosto de cafe.
      example_gloss: I not like coffee.
      example_wrong: I not like coffee.
      example_correct: I do not like coffee.
      explanation: Portuguese places nao before the verb. English requires do/does
        + not for negation.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Use of double negation
      example_portuguese: Eu nao sei nada.
      example_gloss: I not know nothing.
      example_wrong: I do not know nothing.
      example_correct: I do not know anything.
      explanation: Portuguese allows double negation. English uses single negation.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Redundant do-support with negative adverbs (never, hardly, seldom)
      example_portuguese: Eu nunca vou la.
      example_gloss: I never go there.
      example_wrong: I don't never go there.
      example_correct: I never go there.
      explanation: Portuguese nunca (never) is a pre-verbal negative adverb that
        replaces nao in nunca constructions. English never is also a standalone
        negative that does NOT require do-support. Portuguese speakers may transfer
        the do-support requirement from regular negation and produce double negatives
        like don't never or do not never. This compounds two L1 transfers --
        do-support from regular negation and negative concord from Portuguese
        double negation.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I not like coffee. Correct: I do not like coffee.'
    - 'Wrong: I do not know nothing. Correct: I do not know anything.'
    - 'Wrong: I don''t never go there. Correct: I never go there.'
    why_it_happens: 'Portuguese negation is morphologically simple: the pre-verbal particle
      nao precedes the verb (Eu nao sei = I not know). There is no equivalent of English
      do-support. Portuguese is also a negative-concord language, meaning multiple negative
      elements reinforce rather than cancel each other (Eu nao sei nada = I not know nothing).
      English is a single-negation language where two negatives create a positive or are
      ungrammatical. These two structural differences -- absence of do-support and presence
      of negative concord -- are among the most persistent L1 transfers for Portuguese
      learners because negation is acquired early and used constantly, making the L1 pattern
      deeply automatized.'
    teacher_tips:
      how_to_explain: 'Teach: negation requires do/does/did + not. For double negation:
        not...anything or nothing, never both. For "never": it already carries negation,
        so do NOT add "not" — "I never go" not "I do not never go."'
      where_to_start: Begin with do not for present simple negation.
      sequencing: 'Week 1: Do-support in negation. Week 2: Single negation (negative
        concord vs. standard English). Week 3: Negation with modals and be. Week 4:
        "Never" as a negative adverb (no do-support needed). Week 5: Mixed practice.'
      exercises:
      - name: Negation Drill
        type: fill-in-the-blank
        description: Provide 15 affirmative sentences. Students rewrite each using correct
          English negation with do-support.
        duration: 15
      - name: Double Negation Correction
        type: error-correction
        description: Provide 10 sentences with Portuguese-style double negation (e.g.,
          "I don't know nothing"). Students correct each to standard English single
          negation.
        duration: 15
      - name: Never vs Not Ever Discrimination
        type: transformation
        description: Give 10 sentences using "not...ever." Students rewrite using "never"
          and vice versa, then identify which structures incorrectly add do-support
          with "never."
        duration: 10
