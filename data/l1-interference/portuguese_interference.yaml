  collocations: &id019
    interference_patterns:
    - pattern: Transfer of 'fazer' collocations — overuse of 'do' where English requires 'make'
      example_portuguese: Eu fiz meu dever de casa.
      example_gloss: I made my duty of house.
      example_wrong: I did my homework.
      example_correct: I made my homework.
      explanation: Portuguese 'fazer' covers both English 'make' and 'do.' Portuguese
        speakers default to 'do' (the more frequent English equivalent) for all 'fazer'
        collocations, producing 'I did a decision' (fazer uma decisão), 'I did an effort'
        (fazer um esforço), and 'I did my homework' (fazer o dever de casa). The correct
        English collocations require 'make a decision,' 'make an effort,' and 'do homework'
        — a distinction that does not exist in Portuguese since 'fazer' covers both.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Transfer of 'dar' collocations — 'give' where English requires 'take/have'
      example_portuguese: Ela deu um passeio no parque.
      example_gloss: She gave a walk in the park.
      example_wrong: She gave a walk in the park.
      example_correct: She took a walk in the park.
      explanation: "Portuguese uses 'dar' (to give) in many collocations where English uses 'take' or 'have': 'dar um passeio' (give a walk → take a walk), 'dar uma olhada' (give a look → take a look), 'dar uma risada' (give a laugh → have a laugh). Portuguese speakers transfer the verb directly, producing 'give a walk,' 'give a look,' and 'give a laugh' instead of the correct English collocations."
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Transfer of 'ter' + noun collocations — 'have' where English uses 'be' + adjective
      example_portuguese: Eu tenho fome.
      example_gloss: I have hunger.
      example_wrong: I have hunger.
      example_correct: I am hungry.
      explanation: "Portuguese uses 'ter' (to have) + noun for states that English expresses with 'be' + adjective: 'ter fome' (have hunger → be hungry), 'ter sede' (have thirst → be thirsty), 'ter medo' (have fear → be afraid), 'ter razão' (have reason → be right), 'ter sorte' (have luck → be lucky). Portuguese speakers transfer the 'have + noun' pattern directly, producing 'I have hunger,' 'I have fear,' and 'I have luck' instead of 'I am hungry,' 'I am afraid,' and 'I am lucky.'"
      frequency: 5
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: ''I did a decision.'' Correct: ''I made a decision.'' (PT: fazer uma decisão)'
    - 'Wrong: ''She gave a walk.'' Correct: ''She took a walk.'' (PT: dar um passeio)'
    - 'Wrong: ''I have hunger.'' Correct: ''I am hungry.'' (PT: ter fome)'
    - 'Wrong: ''He gave a look at the report.'' Correct: ''He took a look at the report.'' (PT: dar uma olhada)'
    - 'Wrong: ''I have fear of flying.'' Correct: ''I am afraid of flying.'' (PT: ter medo de voar)'
    why_it_happens: Portuguese and English have different verb-noun collocation mappings.
      Portuguese 'fazer' covers both English 'make' and 'do,' so Portuguese speakers
      must learn an arbitrary distinction that does not exist in their L1. Portuguese
      'dar' (give) is used in many light-verb collocations where English uses 'take'
      or 'have' (dar um passeio = take a walk, dar uma olhada = take a look). Portuguese
      'ter' (have) + noun is used for physical and emotional states that English expresses
      with 'be' + adjective (ter fome = be hungry, ter medo = be afraid). These collocational
      mismatches are among the most persistent errors for Portuguese-speaking learners
      because the L1 verb-noun pairings are deeply automatized and the English equivalents
      follow no single predictable rule.
    teacher_tips:
      how_to_explain: 'Create three columns on the board: FAZER → MAKE vs. DO, DAR →
        TAKE/HAVE vs. GIVE, TER → BE + adjective vs. HAVE + noun. Show that Portuguese
        uses one verb where English uses different verbs. Drill with the most common
        collocations: make a decision, make an effort, do homework, do damage, take a
        walk, take a look, take a bath, be hungry, be afraid, be right, be lucky.'
      where_to_start: Begin with the 'ter → be' pattern (fome/hungry, sede/thirsty,
        medo/afraid) since these are the highest-frequency errors and the most intuitive
        for students to grasp.
      sequencing: 'Week 1: TER + noun → BE + adjective (fome, sede, medo, raiva, sorte).
        Week 2: FAZER → MAKE vs. DO (make a decision, do homework, make an effort, do
        damage). Week 3: DAR → TAKE/HAVE (take a walk, take a look, have a laugh, take
        a bath). Week 4: Mixed collocation practice with all three patterns. Week 5:
        Collocation error correction in writing.'
      exercises:
      - name: Collocation Verb Swap
        type: fill-in-the-blank
        description: Provide 20 sentences with the wrong verb (Portuguese transfer). Students
          must choose the correct English collocation verb (make/do/take/have/be).
        duration: 15
      - name: Portuguese to English Collocation Translation
        type: translation
        description: Give 15 Portuguese sentences using fazer, dar, and ter collocations.
          Students translate into correct English, paying attention to the verb-noun
          pairing.
        duration: 20
      - name: Collocation Error Hunt
        type: error-correction
        description: Provide a paragraph with 10 collocation errors transferred from Portuguese.
          Students identify and correct each error.
        duration: 15
