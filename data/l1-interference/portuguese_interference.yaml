  would_sooner:
    interference_patterns:
    - pattern: Use of 'would sooner' as default preference expression instead of 'would
        rather'
      example_portuguese: Eu preferiria sair.
      example_gloss: I would prefer to leave.
      example_wrong: I would sooner leave.
      example_correct: I would rather leave.
      explanation: Portuguese 'preferir' is the standard way to express preference.
        Portuguese speakers map 'preferir' directly to 'would sooner' because the
        conditional morphology of 'preferiria' feels semantically closer to 'sooner'
        (implying urgency/strong preference). English 'would sooner' is less common
        and more formal/dramatic than 'would rather.' Documented in Swan & Smith (2001)
        and Celce-Murcia & Larsen-Freeman (1999).
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of past tense after 'would sooner' instead of base verb
      example_portuguese: Eu preferiria sair agora.
      example_gloss: I would prefer to leave now.
      example_wrong: I would sooner left now.
      example_correct: I would sooner leave now.
      explanation: Portuguese 'preferiria' is morphologically a conditional (past
        tense form of 'preferir'). Portuguese speakers map this past morphology onto
        English 'would sooner' and use a past tense verb after it ('would sooner left')
        instead of the base form ('would sooner leave'). English 'would sooner' requires
        a bare infinitive, not a past tense form. Documented in Swan & Smith (2001)
        and Celce-Murcia & Larsen-Freeman (1999).
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'would sooner' with gerund instead of base verb
      example_portuguese: Eu preferiria ficar em casa.
      example_gloss: I would prefer to stay home.
      example_wrong: I would sooner staying home.
      example_correct: I would sooner stay home.
      explanation: Portuguese 'preferir' can take an infinitive or gerund-like complement.
        Portuguese speakers overgeneralize the gerund after 'would sooner' because
        Portuguese non-finite forms (infinitive, gerund) are more flexible than English.
        English 'would sooner' requires a bare infinitive, not a gerund. Documented
        in Swan & Smith (2001) and Azevedo (1996).
      frequency: 2
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I would sooner leave.'' Correct: ''I would rather leave.'''
    - 'Wrong: ''I would sooner left now.'' Correct: ''I would sooner leave now.'''
    - 'Wrong: ''I would sooner staying home.'' Correct: ''I would sooner stay home.'''
    why_it_happens: Portuguese 'preferir' is the standard verb for expressing preference
      and its conditional form 'preferiria' has past tense morphology. English has
      two preference structures with different formality levels - 'would rather' (common,
      neutral) and 'would sooner' (less common, more formal/dramatic). Portuguese
      speakers (1) overuse 'would sooner' as a direct translation of 'preferir,' not
      realizing it is marked as formal/dramatic in English; (2) transfer the past
      tense morphology of 'preferiria' to the verb after 'would sooner,' producing
      'would sooner left' instead of 'would sooner leave'; and (3) use gerunds after
      'would sooner' because Portuguese non-finite verb forms are more flexible. All
      three patterns are documented in Swan & Smith (2001), Azevedo (1996), and Celce-Murcia
      & Larsen-Freeman (1999).
    teacher_tips:
      how_to_explain: 'Teach the preference scale: ''would rather'' (common) → ''would
        sooner'' (formal/dramatic). Write ''Eu preferiria sair'' on the board and
        show that English has TWO options with different registers. Then teach the
        grammar rule: ''would sooner + base verb'' (never past tense, never gerund).
        Contrast: ''I would sooner leave'' (correct) vs ''I would sooner left'' (wrong)
        vs ''I would sooner leaving'' (wrong).'
      where_to_start: 'Begin with ''would rather'' as the default preference structure.
        Once students are comfortable, introduce ''would sooner'' as a more emphatic
        alternative. Drill the base verb pattern: ''I would sooner stay, leave, eat,
        walk...'''
      sequencing: 'Week 1: ''Would rather + base verb'' as default. Week 2: Introduce
        ''would sooner'' as formal/dramatic alternative. Week 3: Drill base verb after
        ''would sooner'' (not past tense, not gerund). Week 4: Error correction with
        all three patterns. Week 5: Register awareness — when to use ''would rather''
        vs ''would sooner.'''
      exercises:
      - name: Would Rather vs Would Sooner Register Sort
        type: matching
        description: Provide 15 preference sentences. Students sort into 'would rather'
          (neutral) or 'would sooner' (formal/dramatic) and rewrite accordingly.
        duration: 15
      - name: Base Verb After Would Sooner
        type: error-correction
        description: Provide 10 sentences where 'would sooner' is incorrectly followed
          by past tense or gerund. Students correct to base verb form.
        duration: 10
      - name: Preference Translation
        type: translation
        description: Give 10 Portuguese sentences with 'preferir/preferiria.' Students
          translate using either 'would rather' or 'would sooner' with correct verb
          form.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course (2nd ed.). Heinle & Heinle.'
    source_count: 3
