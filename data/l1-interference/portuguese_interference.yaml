      example_portuguese: E hora de sair.
      example_gloss: Is time to leave.
      example_wrong: Is time to leave.
      example_correct: It is time to leave.
      explanation: Portuguese 'e hora de' is an impersonal construction with no
        grammatical subject. English requires the dummy pronoun 'it' as a subject
        in the fixed expression 'it is time to + infinitive.' Portuguese speakers
        drop 'it' because their L1 equivalent does not use a subject pronoun.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'is time for' + verb instead of 'it is time to' + verb
      example_portuguese: E hora de comecar.
      example_gloss: Is time of to-start.
      example_wrong: Is time for start.
      example_correct: It is time to start.
      explanation: Portuguese 'e hora de' is followed by an infinitive (e hora de
        comecar = it is time to start). English requires 'it is time to + infinitive.'
        Portuguese speakers may substitute 'for' (from the parallel construction
        'hora de' ~ 'time for') and use a bare verb or gerund after it, producing
        'is time for start' instead of 'it is time to start.' This reflects transfer
        of the Portuguese preposition 'de' mapped onto English 'for.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: Is time to leave. Correct: It is time to leave.'
    - 'Wrong: Is time for start the meeting. Correct: It is time to start the meeting.'
    - 'Wrong: Is time for bed. Correct: It is time for bed.'
    why_it_happens: Portuguese 'e hora de' is an impersonal, subjectless construction.
      The verb 'e' (is) stands alone with no subject pronoun, and the complement
      is introduced by the preposition 'de' (of/to). English requires a dummy subject
      'it' in the expression 'it is time to + infinitive' or 'it is time for + noun.'
      Portuguese speakers transfer the subjectless structure directly, producing 'is
      time to leave.' Additionally, the Portuguese preposition 'de' maps ambiguously
      onto English 'to' (infinitive marker) or 'for' (preposition), leading to errors
      like 'is time for start' instead of 'it is time to start.' Both patterns are
      documented in Swan & Smith (2001) as characteristic of Portuguese-speaking
      learners of English.
    teacher_tips:
      how_to_explain: "Write 'e hora de sair' on the board. Underline that Portuguese
        has NO subject. Then write 'It is time to leave' and circle 'IT.' Explain:
        'English ALWAYS needs a subject. We add IT as a dummy subject — it doesn't
        mean anything real, it's just grammar.' Then contrast: 'it is time to + verb'
        vs. 'it is time for + noun.'"
      where_to_start: Begin with the fixed expression 'it is time to + verb' using
        daily routine actions (sleep, eat, study, leave).
      sequencing: "Week 1: It is time to + verb (daily routines). Week 2: It is time
        for + noun (break, lunch, class). Week 3: Error correction — remove 'is time'
        and add 'it is time.' Week 4: Mixed practice with both patterns."
      exercises:
      - name: Dummy Subject Insertion
        type: fill-in-the-blank
        description: Provide 15 sentences beginning with '___ is time to/for...' Students
          must insert 'it' and choose the correct complement (to + verb or for + noun).
        duration: 15
      - name: Portuguese to English Translation
        type: translation
        description: Give 10 Portuguese sentences with 'e hora de...' Students translate
          into English, ensuring they include the dummy subject 'it.'
        duration: 15
      - name: Error Correction — Its Time
        type: error-correction
        description: Provide 12 sentences with 'its time' errors (missing 'it,' wrong
          preposition, wrong verb form). Students identify and correct each error.
        duration: 15
