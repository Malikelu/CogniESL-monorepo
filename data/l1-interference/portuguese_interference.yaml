  deduction_speculation:
    interference_patterns:
    - pattern: Use of 'must' for weak speculation where 'might/may' is needed
      example_portuguese: Ele deve estar em casa.
      example_gloss: He must be at home.
      example_wrong: He must be at home. (weak evidence — only a guess)
      example_correct: He might be at home. / He may be at home.
      explanation: Portuguese 'dever (de)' is used for both strong and weak speculation.
        English distinguishes 'must' (strong deduction) from 'might/may' (weak possibility).
        Portuguese speakers overuse 'must' because 'dever' covers the full certainty
        range.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'can' for possibility where 'could' or 'might' is required
      example_portuguese: Ele pode estar cansado.
      example_gloss: He can be tired.
      example_wrong: He can be tired. (expressing possibility)
      example_correct: He could be tired. / He might be tired.
      explanation: Portuguese 'poder' covers both ability and possibility in a single
        form. English restricts 'can' to ability/permission and uses 'could/might'
        for tentative possibility. Portuguese speakers transfer 'poder' directly as
        'can' even when expressing uncertainty, producing 'He can be tired' instead
        of 'He could/might be tired.' This is documented for Romance-language learners
        in contrastive analyses of modal verb systems (Swan & Smith, 2001).
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''He must be at home.'' (weak evidence) Correct: ''He might be at home.'''
    - 'Wrong: ''She can be at the library.'' (possibility) Correct: ''She could/might
      be at the library.'''
    why_it_happens: Portuguese has a less differentiated modal system for epistemic
      meaning. 'Dever (de)' covers the full certainty spectrum from weak guess to
      strong deduction, leading speakers to default to 'must' (the most salient English
      equivalent) even for weak speculation. Similarly, 'poder' covers both ability
      and possibility, so Portuguese speakers use 'can' where English requires 'could'
      or 'might' for tentative possibility. English grammatically encodes degrees
      of certainty through distinct modals (must > will > may > might > could), while
      Portuguese relies more on context and adverbs. This structural asymmetry is
      a well-documented source of L1 transfer for Romance-language learners of English
      (Swan & Smith, 2001; Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'Draw a certainty scale on the board: 95% sure → must (The lights
        are on. He must be home.) 50% sure → might / may (He might be home. I am not
        sure.) 50% tentative → could / might (She could be at the library.) NOT can
        for possibility → ''can'' = ability, ''could/might'' = possibility. Portuguese
        ''deve'' and ''pode'' cover all of these. English splits them.'
      where_to_start: 'Begin with strong deduction: ''The ground is wet. It must have
        rained.'' Then contrast with weak speculation: ''He might be home — I am not
        sure.'''
      sequencing: 'Week 1: ''Must'' for strong deduction. Week 2: ''Might/may'' for
        weak possibility. Week 3: ''Cannot'' for strong negative deduction. Week 4:
        ''Can'' (ability) vs. ''could/might'' (possibility). Week 5: Mixed practice
        with all epistemic modals.'
      exercises:
      - name: Deduction Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with varying levels of evidence. Students
          choose the correct modal (must, might, may, could, cannot) based on the
          strength of the evidence provided.
        duration: 15
      - name: Can vs Could Possibility Sort
        type: error-correction
        description: Give 12 sentences where 'can' is incorrectly used for possibility.
          Students identify the error and rewrite using 'could' or 'might.' Include
          3 distractor sentences where 'can' is correctly used for ability.
        duration: 15
