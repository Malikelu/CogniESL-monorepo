  causative_have_get:
    interference_patterns:
    - pattern: Use of active voice instead of causative have/get for professional
        services
      example_portuguese: Eu consertei o carro.
      example_gloss: I fixed the car.
      example_wrong: 'I fixed the car. (meaning: a mechanic did it)'
      example_correct: I had my car fixed.
      explanation: Portuguese does not have a dedicated causative structure equivalent
        to English 'have/get something done.' Portuguese speakers use the simple active
        verb for both self-performed and other-performed actions. When the intended
        meaning is that someone else performed the service, English requires the causative
        'have + object + past participle.' Portuguese speakers transfer the active
        voice pattern, producing 'I fixed the car' when they mean 'I had the car fixed.'
        This is the most frequently documented causative error for Portuguese learners
        (Swan & Smith, 2001; Azevedo, 1996).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'make' as a direct translation of Portuguese 'fazer' for causative
        meaning
      example_portuguese: Eu fiz cortar o cabelo.
      example_gloss: I made cut the hair.
      example_wrong: I made cut my hair.
      example_correct: I had my hair cut.
      explanation: 'Portuguese uses ''fazer'' (to make/do) as a general-purpose causative
        verb covering both self-performed and arranged actions: ''Eu fiz cortar o
        cabelo'' (I had my hair cut). Portuguese speakers transfer ''fazer'' directly
        as ''make,'' producing ''I made cut my hair.'' English requires ''have + object
        + past participle'' for arranged services. This transfer is documented in
        Swan & Smith (2001) as a core Portuguese L1 error and in Azevedo (1996) as
        a structural consequence of Portuguese having a single general causative verb
        where English has multiple distinct causative structures.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of passive voice ('was done') instead of causative ('had it done')
      example_portuguese: O carro foi consertado.
      example_gloss: The car was repaired.
      example_wrong: My car was repaired. (losing the nuance of personal arrangement)
      example_correct: I had my car repaired.
      explanation: Portuguese uses the passive voice ('ser' + past participle) for
        both events that happened to the subject and events the subject arranged.
        English distinguishes 'My car was repaired' (passive — someone repaired it,
        no emphasis on my involvement) from 'I had my car repaired' (causative — I
        arranged it). Portuguese speakers default to the passive construction, losing
        the causative nuance of personal arrangement. This pattern is documented in
        contrastive analyses of Portuguese-English passive and causative structures
        (Azevedo, 1996; Swan & Smith, 2001).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I fixed the car.'' (meaning a mechanic did it) Correct: ''I had my
      car fixed.'''
    - 'Wrong: ''I made cut my hair.'' Correct: ''I had my hair cut.'''
    - 'Wrong: ''My house was painted.'' (I arranged it) Correct: ''I had my house
      painted.'''
    - 'Wrong: ''She made fix her phone.'' Correct: ''She had her phone fixed.'''
    why_it_happens: 'Portuguese lacks a dedicated causative structure equivalent to
      English ''have/get something done.'' Portuguese uses three strategies where
      English uses the causative: (1) the active voice for both self-performed and
      other-performed actions (''Eu consertei o carro'' = I fixed the car / I had
      the car fixed), (2) the general causative verb ''fazer'' (to make/do) which
      covers both doing and having done (''Eu fiz cortar o cabelo'' = I had my hair
      cut), and (3) the passive voice with ''ser'' + past participle. English splits
      these meanings into distinct structures: active voice (I did it), causative
      (I had it done), and passive (it was done). Portuguese speakers transfer their
      L1 strategies, producing active voice where English requires causative, ''make''
      where English requires ''have,'' and passive where English requires causative.
      All three transfer types are documented in Swan & Smith (2001) and Azevedo (1996).'
    teacher_tips:
      how_to_explain: 'Draw two columns on the board: ''I DID IT MYSELF'' vs. ''SOMEONE
        ELSE DID IT FOR ME.'' In the first column, use simple past: ''I cut my hair,
        I fixed the car, I painted the house.'' In the second column, use ''have +
        object + past participle'': ''I had my hair cut, I had my car fixed, I had
        my house painted.'' Emphasize that English REQUIRES a different structure
        when someone else does it. Then address the ''make'' error: ''In Portuguese
        you say ''''fazer'''' for both. In English, ''''make'''' means FORCE, not
        ARRANGE. For services, use HAVE, not MAKE.'''
      where_to_start: 'Begin with the most common services: haircuts, car repairs,
        house painting, dental work. Use picture prompts showing someone at a salon,
        at a mechanic, at a dentist. Ask: ''Did they do it themselves?'' No. ''Did
        someone else do it?'' Yes. ''So we say: I HAD my hair cut.'''
      sequencing: 'Week 1: ''Have something done'' for professional services (hair,
        car, house). Week 2: ''Get something done'' as informal alternative. Week
        3: Contrast active vs. causative (I cut my hair vs. I had my hair cut). Week
        4: Address the ''make'' error — ''make'' = force, ''have'' = arrange. Week
        5: Causative for unpleasant experiences (I had my wallet stolen). Week 6:
        Mixed practice and error correction.'
      exercises:
      - name: Active or Causative Decision
        type: fill-in-the-blank
        description: Provide 15 situations with context clues (e.g., 'At the salon...'
          vs. 'At home with scissors...'). Students choose between active voice and
          'have something done.'
        duration: 15
      - name: Causative Translation Drill
        type: translation
        description: Give 10 Portuguese sentences using 'fazer' causative and active
          voice. Students translate into English, choosing the correct causative structure
          (have/get + object + past participle).
        duration: 15
      - name: Make vs Have Causative Sort
        type: error-correction
        description: Provide 15 sentences mixing 'make' (force) and 'have' (arrange)
          causative errors. Students identify whether 'make' or 'have' is correct
          and fix the sentence.
        duration: 15
      - name: Unfortunate Events Causative
        type: sentence-rewrite
        description: Give 10 passive voice sentences describing theft, loss, or damage.
          Students rewrite using 'have something done' to show personal experience
          (e.g., 'My wallet was stolen' → 'I had my wallet stolen').
        duration: 10
