  verbs_followed_by_bare_infinitive:
    interference_patterns:
    - pattern: Use of 'to' after causative verbs (make, let, help)
      example_portuguese: Ela me deixou sair.
      example_gloss: She me let to leave.
      example_wrong: She let me to leave.
      example_correct: She let me leave.
      explanation: Portuguese uses 'deixar/mandar/ajudar + a + infinitive' for causative
        constructions. The preposition 'a' (to) is required in Portuguese before the
        infinitive. English causative verbs (let, make, help) take a bare infinitive
        with no preposition. Portuguese speakers transfer the 'a' as 'to,' producing
        'let me to leave' instead of 'let me leave.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'to' before bare infinitive after modal verbs
      example_portuguese: Eu posso nadar.
      example_gloss: I can to swim.
      example_wrong: I can to swim.
      example_correct: I can swim.
      explanation: Portuguese uses the bare infinitive after 'poder.' English also
        uses the bare infinitive after modals, but Portuguese speakers may add 'to'
        by analogy with verbs that require 'to' (want to, need to) or by transfer
        from the causative 'a + infinitive' pattern.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''She let me to leave.'' Correct: ''She let me leave.'''
    - 'Wrong: ''He made me to cry.'' Correct: ''He made me cry.'''
    - 'Wrong: ''I can to swim.'' Correct: ''I can swim.'''
    - 'Wrong: ''She helped me to carry the bags.'' Correct: ''She helped me carry
      the bags.'' (to is optional but bare form is preferred)'
    why_it_happens: Portuguese causative verbs (deixar, mandar, fazer, ajudar) require
      the preposition 'a' before the infinitive (deixar alguém a fazer = let someone
      to do). English causative verbs (let, make, help) take a bare infinitive with
      no preposition (let someone do). Portuguese speakers transfer the 'a' as 'to,'
      producing 'let me to leave.' Additionally, Portuguese modal verbs (poder, dever,
      saber) take a bare infinitive, which aligns with English. However, Portuguese
      speakers may still insert 'to' by analogy with the causative pattern or with
      verbs that require 'to' (querer = want to, precisar = need to). The causative
      error is more frequent and persistent because the Portuguese 'a + infinitive'
      structure is deeply ingrained.
    teacher_tips:
      how_to_explain: 'Write on the board "deixar alguém a fazer" and underline "a."

        Say: "In Portuguese you need ''a'' before the verb. In English, NO preposition.

        Let + person + BARE verb. Make + person + BARE verb. Help + person + BARE
        verb."

        Drill with physical actions: "Let me stand up. Make me laugh. Help me open
        this."

        '
      where_to_start: 'Begin with ''let'': ''Let me go, let him try, let them eat.''
        No ''to.'' Then ''make'': ''Make her stop, make him wait.'' Then ''help'':
        ''Help me carry, help them find.'''
      sequencing: 'Week 1: Let + bare infinitive. Week 2: Make + bare infinitive.
        Week 3: Help + bare infinitive (note: ''to'' is optional but bare is preferred).
        Week 4: Contrast with verbs that DO take ''to'' (want, need, plan). Week 5:
        Mixed practice with modals + bare infinitive.'
      exercises:
      - name: Causative Verb Correction
        type: error-correction
        description: 'Provide 15 sentences with Portuguese-style "to" after causative

          verbs (let, make, help). Students identify and remove the incorrect "to."

          Example: "She let me to go" should become "She let me go."

          '
        duration: 15
      - name: Causative Verb Translation
        type: translation
        description: Give 10 Portuguese sentences using 'deixar/mandar/ajudar + a
          + infinitive.' Students translate into English using bare infinitive after
          causative verbs.
        duration: 15
      - name: Bare or To Decision
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose between bare
          infinitive and 'to + infinitive' after various verbs (let, make, help, want,
          need, plan, hope). Students circle the correct form and explain why.
        duration: 15
      - name: Causative Verb Role Play
        type: role-play
        description: 'In pairs, students act out scenarios. Student A gives commands

          using "let/make/help." Student B responds with the correct bare infinitive

          form. Example: "Let me help you carry that." "Make your partner laugh."

          Teacher monitors for "to" insertion errors.

          '
        duration: 15
