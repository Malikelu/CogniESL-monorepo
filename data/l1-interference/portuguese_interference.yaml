  might:
    interference_patterns:
    - pattern: Use of 'might' for past possibility where 'might have' is needed
      example_portuguese: Ele talvez tenha vindo.
      example_gloss: He maybe has come.
      example_wrong: He might come.
      example_correct: He might have come.
      explanation: Portuguese uses the present subjunctive with 'talvez' for past
        possibility. English uses 'might have + past participle.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Omission of 'might' in present/future possibility, using 'maybe' as
        a standalone adverb without a modal verb
      example_portuguese: Talvez ele venha amanha.
      example_gloss: Maybe he comes tomorrow.
      example_wrong: Maybe he comes tomorrow.
      example_correct: He might come tomorrow.
      explanation: Portuguese 'talvez' functions as a single-word adverb that covers
        the entire meaning of 'it is possible that.' English requires a modal verb
        ('might') in the main clause. Portuguese speakers may translate 'talvez' directly
        as 'maybe' and omit the modal, producing 'Maybe he comes' instead of 'He might
        come.' This is documented in Swan & Smith (2001) as a common Romance-language
        L1 transfer error with English modals.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''He might come.'' (past) Correct: ''He might have come.'''
    - 'Wrong: ''Maybe he comes tomorrow.'' Correct: ''He might come tomorrow.'''
    why_it_happens: Portuguese uses 'talvez' with the subjunctive for both present
      and past possibility. English distinguishes 'might' (present/future) from 'might
      have + past participle' (past). Portuguese speakers may use 'might' for past
      events. Additionally, Portuguese 'talvez' is a single adverb that carries the
      full meaning of possibility, so speakers often translate it as 'maybe' and omit
      the modal verb entirely, producing ungrammatical English like 'Maybe he comes'
      instead of 'He might come.'
    teacher_tips:
      how_to_explain: 'Teach ''might have + past participle'' for past possibility:
        ''He might have come'' (but I am not sure if he did). For present/future possibility,
        teach that English needs a modal verb: ''He might come'' not ''Maybe he comes.''
        Write ''Talvez ele venha'' on the board and show two valid English translations:
        ''He might come'' or ''Maybe he will come.'' The key: English needs a modal
        (might/may/could) in the main clause.'
      where_to_start: 'Begin with past possibility: ''Where is John? He might have
        gone home.'' Then move to present/future: ''He might come tomorrow.'' Emphasize
        that ''maybe'' cannot replace a modal verb.'
      sequencing: 'Week 1: ''Might'' for present/future possibility. Week 2: ''Might
        have'' for past possibility. Week 3: ''Maybe'' as adverb vs. ''might'' as
        modal. Week 4: Mixed practice.'
      exercises:
      - name: Might Have Drill
        type: fill-in-the-blank
        description: Provide 10 sentences about past events. Students use 'might have.'
        duration: 15
      - name: Modal or Adverb Decision
        type: sentence-rewrite
        description: Give 10 Portuguese sentences with 'talvez.' Students must produce
          two English versions each — one with 'might/may' as modal, one with 'maybe'
          as adverb with correct modal structure.
        duration: 15
