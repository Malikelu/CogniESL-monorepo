  comment_clauses: &id016
    interference_patterns:
    - pattern: Use of that where which is needed
      example_portuguese: Ele chegou tarde, que irritou todos.
      example_gloss: He arrived late, that irritated everyone.
      example_wrong: He arrived late, that irritated everyone.
      example_correct: He arrived late, which irritated everyone.
      explanation: Portuguese uses que for both restrictive and non-restrictive relatives.
        English uses that for restrictive and which for non-restrictive.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Omission of expletive 'it' in comment clause constructions
      example_portuguese: E bom que voce veio.
      example_gloss: Is good that you came.
      example_wrong: Is good that you came.
      example_correct: It is good that you came.
      explanation: Portuguese allows subjectless constructions with impersonal expressions
        (e bom que = is good that). English requires the expletive/dummy 'it' as subject
        in such constructions (it is good that). Portuguese speakers omit 'it' because
        their L1 does not require an expletive subject in impersonal expressions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: He arrived late, that irritated everyone. Correct: He arrived late,
      which irritated everyone.'
    - 'Wrong: Is good that you came. Correct: It is good that you came.'
    - 'Wrong: Is important that students study. Correct: It is important that students
      study.'
    why_it_happens: Portuguese uses que for both restrictive and non-restrictive relative
      clauses, leading to that/which confusion. Additionally, Portuguese allows subjectless
      impersonal constructions (e bom que voce veio = is good that you came) because
      Portuguese does not require an expletive subject. English requires dummy 'it'
      in such constructions (it is good that you came). Portuguese speakers transfer
      the subjectless pattern and omit 'it'.
    teacher_tips:
      how_to_explain: 'Teach two rules: (1) that = restrictive (no comma), which =
        non-restrictive (with comma). (2) English needs ''it'' as a subject in impersonal
        expressions: ''It is good that...'' not ''Is good that...'''
      where_to_start: Begin with the that/which distinction, then introduce the dummy
        'it' pattern with common expressions.
      sequencing: 'Week 1: That for restrictive. Week 2: Which for non-restrictive.
        Week 3: Dummy ''it'' in impersonal expressions. Week 4: Mixed practice.'
      exercises:
      - name: Comment Clause Drill
        type: error-correction
        description: Provide 10 sentences with that/which errors.
        duration: 15
      - name: Dummy It Insertion
        type: fill-in-the-blank
        description: Provide 15 Portuguese-style subjectless sentences (e.g., 'Is important
          that...', 'Is good that...'). Students insert 'It' and correct the verb form.
        duration: 15
