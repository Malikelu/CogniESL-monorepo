  be_about_to_due_to:
    interference_patterns:
    - pattern: Overuse of 'be about to' for scheduled or planned future events
      example_portuguese: O aviao esta para partir as 14h.
      example_gloss: The airplane is about to depart at 2pm.
      example_wrong: The airplane is about to depart at 2pm.
      example_correct: The airplane is scheduled to depart at 2pm. / The airplane
        departs at 2pm.
      explanation: Portuguese 'estar para + infinitivo' covers both imminent actions
        AND scheduled/planned events (O aviao esta para partir as 14h = The plane
        is set to depart at 2pm). English 'be about to' is restricted to imminent
        actions only (happening very soon, no specific time expression). Portuguese
        speakers overextend 'be about to' to scheduled events because their L1 uses
        the same structure for both meanings.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'due to' as a preposition replacing 'because of' in informal
        contexts
      example_portuguese: O voo foi cancelado devido a chuva.
      example_gloss: The flight was cancelled due to the rain.
      example_wrong: The flight was cancelled due to the rain was heavy.
      example_correct: The flight was cancelled because the rain was heavy. / The
        flight was cancelled due to heavy rain.
      explanation: Portuguese 'devido a' functions as a preposition meaning 'because
        of' and can introduce both noun phrases and full clauses in informal usage.
        English 'due to' is traditionally restricted to noun phrases (due to heavy
        rain), while 'because of' or 'because' introduces clauses. Portuguese speakers
        transfer the broader Portuguese usage, producing 'due to + clause' errors.
        Additionally, Portuguese speakers may use 'due to' at the start of a sentence
        where English requires 'because of.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''The airplane is about to depart at 2pm.'' Correct: ''The airplane
      is scheduled to depart at 2pm.'' / ''The airplane departs at 2pm.'''
    - 'Wrong: ''The flight was cancelled due to the rain was heavy.'' Correct: ''The
      flight was cancelled because the rain was heavy.'''
    - 'Wrong: ''Due to it was raining, we stayed home.'' Correct: ''Because it was
      raining, we stayed home.'' / ''Due to the rain, we stayed home.'''
    why_it_happens: 'Portuguese has two structures that map imperfectly onto English
      ''be about to'' and ''due to / because of.'' First, Portuguese ''estar para
      + infinitivo'' expresses both imminent action AND scheduled/planned events:
      ''O aviao esta para partir'' can mean ''The plane is about to depart'' (imminent)
      OR ''The plane is set to depart'' (scheduled). English ''be about to'' only
      covers the imminent meaning. When a time expression is added (''as 14h'' = at
      2pm), English requires a different structure (''scheduled to'', ''set to'',
      or simple present). Portuguese speakers overextend ''be about to'' because their
      L1 uses one form for both meanings. Second, Portuguese ''devido a'' functions
      as a flexible causal preposition that can introduce both noun phrases and clauses
      in everyday usage. English ''due to'' is restricted to noun phrases (''due to
      heavy rain''), while ''because'' or ''because of'' introduces clauses (''because
      it was raining''). Portuguese speakers transfer the broader Portuguese pattern,
      producing ''due to + clause'' errors. Both patterns are documented in Swan &
      Smith (2001) for Portuguese learners of English and in Azevedo (1996) for Portuguese
      grammatical structure.'
    teacher_tips:
      how_to_explain: 'For ''be about to'': Write on the board: ''I am about to leave''
        (RIGHT NOW, very soon — no clock time). Then write: ''The train is about to
        depart at 6pm'' — ask: ''Is this natural?'' Explain: ''Be about to'' = imminent,
        no time expression. For scheduled events, use ''scheduled to'', ''set to'',
        or simple present. For ''due to'': Write ''due to + NOUN'' on one side and
        ''because + CLAUSE'' on the other. Show that ''due to'' cannot introduce a
        full clause with a verb. Drill: ''Due to the rain'' (correct) vs. ''Due to
        it was raining'' (wrong → ''Because it was raining'').'
      where_to_start: 'Begin with ''be about to'' for truly imminent actions (no time
        expression): ''I am about to leave,'' ''The phone is about to ring.'' Then
        introduce the contrast with scheduled events. For ''due to'', start with noun
        phrases only: ''due to the rain, due to bad weather.'' Then contrast with
        ''because + clause.'''
      sequencing: 'Week 1: ''Be about to'' for imminent actions only (no time expressions).
        Week 2: Contrast ''be about to'' (imminent) vs. ''scheduled to'' / simple
        present (planned). Week 3: ''Due to + noun phrase'' vs. ''because + clause''.
        Week 4: Mixed practice — students choose between ''be about to'' and ''scheduled
        to'', and between ''due to'' and ''because/because of''. Week 5: Error correction
        with both structures in context.'
      exercises:
      - name: About To or Scheduled To
        type: fill-in-the-blank
        description: Provide 15 sentences describing future events. Students must
          choose between 'be about to' (imminent, no time expression) and 'scheduled
          to' / simple present (planned with time expression). Include a mix of both
          types.
        duration: 15
      - name: Due To vs Because Error Correction
        type: error-correction
        description: Provide 15 sentences with 'due to' errors. Students identify
          whether 'due to' is correctly used (with a noun phrase) or incorrectly used
          (with a clause). For incorrect sentences, students rewrite using 'because'
          or 'because of.'
        duration: 15
      - name: Causal Connector Sort
        type: sorting
        description: Give students 20 sentence beginnings. Students sort them into
          three groups - (1) complete with 'due to' plus noun, (2) complete with 'because'
          plus clause, (3) complete with 'be about to' or 'scheduled to.' Forces recognition
          of which grammatical structure follows each connector.
        duration: 15
