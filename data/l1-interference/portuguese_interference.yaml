    assessment: Expert-evaluated for L1 transfer severity - Portuguese
    notes: 'Three patterns: (1) Overuse of would sooner as default preference (register
      error). (2) Past tense after would sooner (L1 morphology transfer from preferiria).
      (3) Gerund after would sooner (L1 non-finite form transfer). All documented
      in Swan & Smith (2001), Azevedo (1996), and Celce-Murcia & Larsen-Freeman (1999).'
    source_rank: 1
