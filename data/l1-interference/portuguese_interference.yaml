    notes: 'Portuguese has 243 GPs total. This entry covers the contrast_clauses grammar point. Two independent sources:
      contrastive teaching reference (Swan & Smith 2001) and structural linguistics reference (Azevedo 1996). Patterns cover
      (1) enquanto → while/whereas ambiguity and overuse of while for contrast, (2) embora...mas → although...but double conjunction
      transfer, (3) mas register-neutral overuse in formal writing where English requires whereas/while/in contrast, (4) punctuation
      transfer errors for contrast clauses. This entry is closely related to the although entry which covers concessive-specific
      patterns (despite/of, even if vs although, apesar de decomposition). Together they cover the full Portuguese-to-English
      concessive/contrast conjunction system.'
  could:
    interference_patterns:
    - Portuguese speakers overuse 'could' as a general-purpose modal for ability, possibility, and politeness because Portuguese
      'poder' covers all three meanings without a can/could split. Portuguese 'poder' in the present ('posso') and conditional
      ('poderia') maps onto both English 'can' and 'could', leading to errors like 'I could speak English when I was five'
      (meaning 'I was able to / I could' as past ability — acceptable but often overextended) and 'Could you help me?' being
      produced correctly by transfer but 'Can you help me?' being avoided because Portuguese 'Pode me ajudar?' uses the present
      tense of poder for polite requests. The core error is using 'could' where English requires 'can' for present ability or
      'was able to' for achieved past ability — e.g. 'I could escape the fire' (meaning 'I was able to escape') sounds like
      a hypothetical rather than a completed past action.
    - Portuguese speakers use 'could' in hypothetical/conditional clauses where English requires 'would' or 'might', transferring
      the Portuguese pattern where 'poder' appears in both the condition and result clause. Portuguese 'Se eu pudesse, eu faria'
      (If I could, I do → 'If I could, I would do') leads to errors like 'If I could have more money, I could travel the world'
      where the second clause should use 'would' ('I would travel'). Portuguese does not require a distinct modal in the result
      clause the way English does — 'poderia' (conditional of poder) can appear in both clauses, but English 'could' in the result
      clause of a conditional sounds like retained ability rather than a hypothetical result.
    - Portuguese speakers underuse 'could' for past polite requests because Portuguese uses the present tense ('Pode me ajudar?')
      or the conditional ('Poderia me ajudar?') for politeness, and learners often default to 'Can you...?' as the direct transfer
      of the more common Portuguese present-tense polite request. This produces register errors where 'Can you pass the salt?'
      is used in formal contexts where English strongly prefers 'Could you pass the salt?'. The communicative impact is perceived
      abruptness or lack of social awareness, particularly in service encounters and professional settings.
    why_it_happens: Portuguese has a single verb 'poder' that covers ability, possibility, and permission across all tenses and
      moods. English splits this semantic space between 'can' (present ability/permission/informal requests), 'could' (past ability,
      hypothetical ability, polite requests), 'be able to' (achieved ability, especially in past and perfect tenses), and 'would'
      (hypothetical result clauses). Portuguese 'poder' does not require this split — 'posso' (present), 'pude' (preterite, achieved),
      'podia' (imperfect, ongoing/habitual), and 'poderia' (conditional, hypothetical/polite) are all forms of the same verb with
      no need for a separate 'be able to' or 'would' construction. Portuguese speakers transfer this unified system to English,
      producing (1) 'could' overuse for present ability and achieved past ability (where English needs 'can' and 'was able to'),
      (2) 'could' in conditional result clauses (where English needs 'would'), and (3) underuse of 'could' for polite requests
      (transferring Portuguese present-tense politeness directly to English 'can'). These errors are deeply persistent because
      the Portuguese modal system is acquired in early childhood and operates automatically, and because the can/could distinction
      is not salient in Portuguese input.
    teacher_tips:
      how_to_explain: 'Use a semantic map with Portuguese ''poder'' at the center and four English equivalents branching out:
        CAN (present ability/permission), COULD (past ability, hypothetical, polite requests), BE ABLE TO (achieved ability,
        especially past/perfect), and WOULD (hypothetical result clauses). Show that Portuguese uses ONE verb for all four
        English meanings. For the can/could split, use a timeline: present → can, past general → could, past achieved → was
        able to, polite request → could. For conditionals, show that English requires COULD in the if-clause but WOULD in the
        result clause — Portuguese allows poder/poderia in both.'
      where_to_start: >-
        Start with the most communicatively damaging error: using 'could' for achieved past ability
        ('I could escape the fire' when you mean 'I was able to escape'). Use a contrastive scenario:
        tell a story about a past achievement in Portuguese ('Eu consegui escapar do incêndio' /
        'Eu pude escapar') and show why English needs 'was able to' for achieved single events.
        Then move to the conditional result clause error (could -> would). Finally, address the
        polite request underuse, which is the easiest to correct.
      exercises:
      - name: Could vs. was able to — past ability sorting
        type: practice
        description: Provide 20 sentences describing past events. Students must decide whether each describes a general past ability
          ('I could swim as a child' → could) or a specific achieved action ('I could escape the fire' → was able to). Include
          10 ambiguous cases that require context discussion. For each 'was able to' sentence, students also write the Portuguese
          equivalent to see why the error occurs (Portuguese 'pude' covers both).
        duration: 20
      - name: Conditional clause repair — could to would
        type: error-correction
        description: Provide 15 conditional sentences with Portuguese-style 'could' in the result clause (e.g. 'If I could speak
          Japanese, I could work in Tokyo', 'If she could pass the exam, she could go to university', 'If we could save enough
          money, we could buy a house'). Students identify the error (could in result clause → would) and rewrite each sentence
          correctly. Discuss why Portuguese allows 'poderia' in both clauses but English does not.
        duration: 15
      - name: Politeness register transformation
        type: practice
        description: Provide 10 scenarios ranging from informal (asking a friend for a pen) to formal (asking a boss for a day
          off). For each scenario, students write both the 'can' version and the 'could' version, then identify which is
          register-appropriate. Discuss how Portuguese uses the same structure ('Pode/Poderia me ajudar?') for both registers
          but English requires the could/can distinction for politeness.
        duration: 15
      - name: Portuguese-to-English modal translation
        type: drill
        description: Give 15 Portuguese sentences using various forms of 'poder' (posso, pude, podia, poderia, possa). Students
          translate each into English, choosing the correct modal (can, could, was able to, would, may, might). Include at least
          3 sentences where the correct English is NOT 'could' despite Portuguese using poder. Discuss each answer as a class.
        duration: 20
      - name: Error diagnosis — could overuse audit
        type: error-correction
        description: Give students a short paragraph written by a fictional Portuguese learner. The paragraph contains 8 'could'
          errors of all three types (present ability, achieved past ability, conditional result clause). Students must identify
          each error, classify its type, and correct it. This exercise builds pattern recognition for the three major could
          error types simultaneously.
        duration: 15
    examples:
    - 'Wrong: ''I could escape the fire yesterday.'' (Portuguese: ''Eu pude escapar do incêndio.'' — preterite of poder for
      achieved past action) Correct: ''I was able to escape the fire yesterday.'' / ''I managed to escape the fire.'' — English
      requires ''was able to'' for achieved single past events, not ''could''.'
    - 'Wrong: ''If I could speak Japanese, I could work in Tokyo.'' (Portuguese: ''Se eu pudesse falar japonês, eu poderia
      trabalhar em Tóquio.'' — poderia in both clauses) Correct: ''If I could speak Japanese, I would work in Tokyo.'' — English
      requires ''would'' in the result clause.'
    - 'Wrong: ''Can you help me move this table?'' (formal context — Portuguese: ''Pode me ajudar a mover esta mesa?'' — present
      tense for politeness) Correct: ''Could you help me move this table?'' — English requires ''could'' for polite requests
      in formal/professional contexts.'
    - 'Wrong: ''When I was young, I could run very fast.'' (general past ability — this is actually CORRECT in English, but
      Portuguese speakers often avoid it, producing ''When I was young, I was able to run very fast'' which sounds unnatural
      for general ability) Correct: ''When I was young, I could run very fast.'' — ''Could'' is correct for general past ability;
      ''was able to'' is for specific achieved events.'
    - 'Wrong: ''I could pass the test last week.'' (achieved past — Portuguese: ''Eu pude passar na prova.'' / ''Consegui passar
      na prova.'') Correct: ''I was able to pass the test last week.'' / ''I managed to pass the test.'' — Not ''could'' for
      single achieved past events.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents modal verb transfer errors including poder → can/could mapping, conditional clause
      modal errors, and politeness register issues).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on modal verbs — describes
      the Portuguese poder system and its semantic range covering ability, possibility, permission, and politeness without the
      can/could split that English requires).'
