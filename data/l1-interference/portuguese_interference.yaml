  need_to:
    interference_patterns:
    - pattern: Use of 'must' where 'need to' is more natural
      example_portuguese: Eu preciso comprar leite.
      example_gloss: I need to buy milk.
      example_wrong: I must buy milk.
      example_correct: I need to buy milk.
      explanation: Portuguese 'precisar' expresses general necessity and maps most
        naturally onto English 'need to.' Portuguese speakers overuse 'must' because
        'precisar' feels semantically strong in Portuguese, but English 'must' implies
        external obligation or urgency, while 'need to' expresses personal necessity.
        This overuse of 'must' can sound overly authoritative or dramatic in everyday
        English contexts (Swan & Smith, 2001).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'to' after 'need' (bare infinitive transfer)
      example_portuguese: Eu preciso comprar leite.
      example_gloss: I need buy milk.
      example_wrong: I need buy milk.
      example_correct: I need to buy milk.
      explanation: Portuguese 'precisar' can directly take a bare infinitive complement
        (precisar + infinitive) without an intervening preposition. English 'need'
        as a main verb requires 'to' before the infinitive (need + to + verb). Portuguese
        speakers transfer the bare-infinitive structure, producing 'I need buy' instead
        of 'I need to buy.' This error is distinct from the modal 'need' (Need I go?),
        which is rare and formal (Azevedo, 1996; Swan & Smith, 2001).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I must buy milk.'' (general necessity) Correct: ''I need to buy milk.'''
    - 'Wrong: ''I need buy milk.'' Correct: ''I need to buy milk.'''
    - 'Wrong: ''She need to study more.'' (3rd person -s also omitted) Correct: ''She
      needs to study more.'''
    why_it_happens: 'Portuguese "precisar" (to need) expresses necessity and can take
      a bare infinitive complement without a preposition (precisar comprar = need
      buy). English "need to" requires the infinitive marker "to" (need to buy). Portuguese
      speakers transfer the bare-infinitive structure, producing "I need buy." Additionally,
      "precisar" is a single verb covering both "need to" and "must" semantic space.
      Portuguese speakers often choose "must" as the default translation, overusing
      it in contexts where English prefers "need to" for general, non-urgent necessity.
      The two errors compound: speakers may produce "I must buy" (wrong modal) or
      "I need buy" (missing "to").'
    teacher_tips:
      how_to_explain: 'Write "Eu preciso comprar leite" on the board. Show that English
        needs TWO words: NEED + TO + VERB. Drill: "I need to eat, I need to sleep,
        I need to study." Then contrast: "I need to buy milk" (personal necessity)
        vs. "I must buy milk" (urgent/obligatory). Ask: "Is it urgent or just necessary?
        Use need to."'
      where_to_start: 'Begin with daily necessities: ''I need to buy groceries, I
        need to study, I need to sleep.'' Emphasize the ''to'' — write it in a different
        color. Then introduce the need to vs. must contrast.'
      sequencing: 'Week 1: ''Need to'' structure (need + to + verb). Week 2: ''Need
        to'' vs. ''must'' (necessity vs. obligation). Week 3: 3rd person -s (''she
        needs to''). Week 4: Negative forms (''don''t need to'') and mixed practice.'
      exercises:
      - name: Need To Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must insert 'need to' or
          'needs to' in the correct position. Include bare-infinitive distractors.
        duration: 15
      - name: Must or Need To Decision
        type: binary-choice
        description: Give 20 scenarios. Students choose between 'must' and 'need to'
          based on context (urgency vs. personal necessity). Include explanation of
          their choice.
        duration: 15
      - name: Error Correction - Need To
        type: error-correction
        description: Provide 15 sentences with mixed errors (missing 'to,' wrong modal
          'must,' missing 3rd person -s). Students identify and correct each error.
        duration: 15
