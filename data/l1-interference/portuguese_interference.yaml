  adverb_placement:
    interference_patterns:
    - Portuguese speakers place frequency and manner adverbs after the main verb or at the end of the clause, transferring
      Portuguese word order where post-verbal adverb placement is grammatical and often preferred. Portuguese allows "Eu como
      sempre aqui" (I eat always here) and "Ela fala bem ingles" (She speaks well English), but English requires mid-position
      for frequency adverbs ("I always eat here") and has stricter ordering for manner adverbs. This produces errors like
      "I eat never vegetables" (from "Eu nunca como vegetais"), "She drives carefully never" (from "Ela dirige cuidadosamente
      nunca"), and "They study always at the library" (from "Eles estudam sempre na biblioteca"). The error is most visible
      with frequency adverbs (always, never, sometimes, usually, often) which in English must precede the main verb but follow
      the verb "to be."
    - Portuguese speakers use adjective forms where English requires -ly adverbs, because Portuguese does not morphologically
      distinguish adjectives from adverbs in many contexts. Portuguese "Ele fala bom ingles" (He speaks good English) uses
      the adjective "bom" where English requires the adverb "well." This transfers to English as "He speaks very good" (instead
      of "He speaks very well"), "She sings beautiful" (instead of "She sings beautifully"), and "They work hard" (correct
      but "They work hardly" by overcorrection). The Portuguese adverbial form with -mente exists but is used less frequently
      than in English, and many common Portuguese adverbs are identical to adjective forms (e.g. "rápido" = fast/fast, not
      fast/fastly).
    - Portuguese speakers place adverbs between the verb and its direct object (V-Adv-O order), which is grammatical in Portuguese
      but ungrammatical in English. Portuguese "Eu leio frequentemente livros" (I read frequently books) transfers directly
      to English as "I read frequently books" instead of "I frequently read books" or "I read books frequently." English strongly
      disfavors splitting the verb from its direct object with an adverb, while Portuguese allows this freely. This pattern
      is particularly persistent in writing and produces communicatively marked output that sounds unnatural to native English
      speakers.
    why_it_happens: Portuguese has a more flexible adverb placement system than English. Portuguese allows post-verbal position
      for frequency adverbs (Eu nunca como = I never eat / I eat never), clause-final position for manner adverbs, and V-Adv-O
      word order — all of which are restricted or ungrammatical in English. English requires mid-position for frequency adverbs
      (before the main verb, after auxiliary verbs), strongly disfavors splitting verb from object with an adverb, and requires
      morphological -ly marking on manner adverbs. Portuguese does not require -ly equivalent marking because many Portuguese
      adverbs are identical to adjective forms, and the -mente suffix is used less productively than English -ly. These differences
      are deeply automatized from L1 acquisition and persist because adverb placement is a low-salience feature — learners
      often do not notice the difference in input, and the errors rarely cause communication breakdown, reducing corrective
      feedback. The result is fossilization of L1 adverb placement patterns even at advanced proficiency levels.
    teacher_tips:
      how_to_explain: Use a three-column contrastive chart showing (1) Portuguese adverb position, (2) literal English transfer
        (wrong), and (3) correct English position. For frequency adverbs, teach the rule "before the main verb, after be"
        using a visual timeline. For adjective vs adverb, teach the -ly rule explicitly and highlight the Portuguese-English
        false friend pattern where adjective forms look like adverbs. For V-Adv-O, use the "don't split the verb from its
        object" rule and show the two acceptable English positions (before the verb or at the end of the clause).
      where_to_start: Start with frequency adverb placement since it is the most frequent and the most rule-governed pattern.
        Use the "before the main verb, after be" rule with 10 example sentences. Then move to adjective-for-adverb substitution,
        which requires morphological awareness. Finally, address V-Adv-O word order, which is the most subtle and the most
        persistent in writing.
      exercises:
      - name: Frequency adverb repositioning drill
        type: drill
        description: Provide 20 sentences with Portuguese-style post-verbal frequency adverb placement (e.g. "I eat never
          meat," "She goes always to school," "They watch sometimes TV"). Students must reposition each adverb to the correct
          English mid-position. Include sentences with "to be" where the adverb follows the verb. Time pressure to build automaticity.
        duration: 15
      - name: Adjective vs adverb selection
        type: drill
        description: Provide 15 sentences where students must choose between adjective and -ly adverb forms (e.g. "He speaks
          very good/well," "She sings beautiful/beautifully," "They work hard/hardly"). Include Portuguese translations showing
          why the adjective form is tempting. Discuss cases where the adjective form is correct in English (e.g. "work hard"
          not "work hardly").
        duration: 15
      - name: V-Adv-O word order correction
        type: error-correction
        description: Provide 12 sentences with Portuguese-style V-Adv-O word order (e.g. "I read frequently books," "She visits
          often her grandmother," "They study always at home"). Students identify the split verb-object pattern and rewrite
          each sentence with the adverb in one of the two acceptable English positions (before the verb or clause-final).
        duration: 15
      - name: Portuguese-to-English adverb translation
        type: drill
        description: Give 15 Portuguese sentences with various adverb positions and forms (e.g. "Eu nunca como carne," "Ele
          fala bem ingles," "Eu leio frequentemente livros," "Ela canta bonito"). Students translate each into correct English,
          consciously applying the three adverb rules. Discuss which errors are most tempting for each sentence.
        duration: 20
      - name: Writing self-edit — adverb placement awareness
        type: composition
        description: Students write a 150-word paragraph about their daily routine or study habits (a context rich in frequency
          and manner adverbs). Then they exchange paragraphs and check for the three Portuguese adverb transfer patterns (post-verbal
          frequency adverbs, adjective-for-adverb substitution, V-Adv-O word order). Each student provides written feedback
          on adverb usage.
        duration: 25
    examples:
    - 'Wrong: ''I eat never vegetables.'' (Portuguese: ''Eu nunca como vegetais.'' — frequency adverb before verb in Portuguese,
      but English requires mid-position before main verb) Correct: ''I never eat vegetables.'''
    - 'Wrong: ''She goes always to school by bus.'' (Portuguese: ''Ela sempre vai de onibus para a escola.'') Correct: ''She
      always goes to school by bus.'''
    - 'Wrong: ''He speaks very good.'' (Portuguese: ''Ele fala muito bom.'' — adjective form used adverbially) Correct: ''He
      speaks very well.'''
    - 'Wrong: ''I read frequently books.'' (Portuguese: ''Eu leio frequentemente livros.'' — V-Adv-O order) Correct: ''I frequently
      read books.'' / ''I read books frequently.'''
    - 'Wrong: ''She sings beautiful.'' (Portuguese: ''Ela canta bonito.'' — adjective form) Correct: ''She sings beautifully.'''
    - 'Wrong: ''I am always happy'' (correct — after ''be'' is the right position for frequency adverbs) vs ''I always am
      happy'' (wrong — do not place frequency adverb before ''be'')'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents adverb placement transfer errors including post-verbal frequency adverb position,
      adjective-for-adverb substitution, and V-Adv-O word order transfer).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on adverbs and adverbial
      phrases — describes Portuguese adverb placement flexibility including post-verbal position, V-Adv-O order, and the adjective-adverb
      morphological overlap, explaining the structural basis for L1 transfer to English).'
