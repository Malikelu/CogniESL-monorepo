    notes: 'Three documented interference patterns: (1) active voice transfer where
      English prefers passive reporting, (2) confusion between personal-subject (he
      is said to be) and impersonal (it is said that) patterns, producing hybrid errors
      like "he is said that he is rich," (3) tense mismatch - failure to use perfect
