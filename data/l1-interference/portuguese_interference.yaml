  connectors_advanced:
    interference_patterns:
    - pattern: Double conjunction — 'but' after 'however'
      example_portuguese: No entanto, mas eu vou.
      example_gloss: However, but I go.
      example_wrong: However, but I go.
      example_correct: However, I go.
      explanation: Portuguese allows 'no entanto...mas' (however...but) as a paired
        conjunction structure. English never uses 'but' after 'however' because
        'however' already carries the adversative meaning. Portuguese speakers
        transfer the paired structure directly, producing redundant double
        conjunctions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Semantic misuse of 'on the contrary' for simple contrast
      example_portuguese: Pelo contrario, eu prefiro o azul.
      example_gloss: On the contrary, I prefer the blue.
      example_wrong: The first method is expensive. On the contrary, the second is
        affordable.
      example_correct: The first method is expensive. In contrast, the second is
        affordable.
      explanation: Portuguese 'pelo contrário' is used broadly for both corrective
        and simple contrastive meanings. English 'on the contrary' is restricted
        to correcting a previous claim, while 'in contrast' or 'on the other hand'
        signals simple opposition. Portuguese speakers overextend 'on the contrary'
        to all contrastive contexts, creating pragmatic errors in academic and
        formal writing.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Register mismatch — informal connectors in formal writing
      example_portuguese: Alem disso, o estudo tem limitacoes.
      example_gloss: Besides, the study has limitations.
      example_wrong: The sample was small. Besides, the methodology was flawed.
      example_correct: The sample was small. Furthermore, the methodology was flawed.
      explanation: Portuguese 'além disso' maps to both informal 'besides' and
        formal 'furthermore/moreover.' Portuguese speakers often use 'besides'
        in academic essays where English requires a more formal connector.
        This register flattening is documented across Romance-language ESL
        writers and produces an inconsistent tone in student academic prose.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''However, but I disagree.'' Correct: ''However, I disagree.'' OR ''But
      I disagree.'''
    - 'Wrong: ''The results were poor. On the contrary, the second trial succeeded.''
      Correct: ''The results were poor. In contrast, the second trial succeeded.'''
    - 'Wrong: ''Besides, the data supports this.'' Correct: ''Furthermore, the data
      supports this.'''
    why_it_happens: Portuguese discourse-marking system differs from English in
      three key ways. First, Portuguese permits paired conjunctions where English
      requires a single connector — 'no entanto...mas' (however...but), 'embora...mas'
      (although...but) — because Portuguese treats these as a cohesive unit rather
      than redundant. Second, Portuguese contrastive connectors like 'pelo contrário'
      and 'no entanto' have broader semantic coverage than their English cognates,
      leading to overextension errors. Third, Portuguese does not distinguish
      register in connectors as sharply as English — 'além disso' serves in both
      casual and academic contexts, whereas English requires 'furthermore/moreover'
      in formal writing. These three transfer effects are documented in contrastive
      analyses of Romance-language learners of English (Swan & Smith 2001; Folse 2009)
      and in cohesion research (Halliday & Hasan 1976; Celce-Murcia & Larsen-Freeman 1999).
    teacher_tips:
      how_to_explain: 'Rule 1: ONE connector per link. ''However'' OR ''but,'' never
        both. ''Although'' OR ''but,'' never both. Rule 2: ''On the contrary'' corrects
        a wrong idea. ''In contrast'' shows difference. Rule 3: In essays, use formal
        connectors — furthermore, moreover, consequently, nevertheless — not ''besides''
        or ''anyway.'''
      where_to_start: "Begin with the double-conjunction error (most frequent and
        most easily noticed). Write 'However, but...' on the board and ask: 'Is this
        English? No — it is Portuguese word order in English words.'"
      sequencing: 'Week 1: Single connector rule (no double conjunctions). Week 2:
        Semantic precision (on the contrary vs. in contrast vs. on the other hand).
        Week 3: Register awareness (formal vs. informal connectors). Week 4: Editing
        practice — students revise a paragraph with connector errors.'
      exercises:
      - name: Double Conjunction Elimination
        type: error-correction
        description: Provide 15 sentences with redundant paired connectors (however+but,
          although+but, therefore+so). Students delete the redundant word and explain
          why.
        duration: 15
      - name: Connector Semantic Matching
        type: matching
        description: Give 12 discourse contexts. Students choose the correct connector
          from pairs that are commonly confused (on the contrary/in contrast,
          besides/furthermore, therefore/so).
        duration: 15
      - name: Register Sorting
        type: categorization
        description: Provide 20 connector words/phrases. Students sort into Formal
          (academic) and Informal (conversational) columns, then rewrite 5 informal
          sentences using formal connectors.
        duration: 15
      - name: Paragraph Connector Edit
        type: editing
        description: Give a 200-word academic paragraph with 8 connector errors (wrong
          register, semantic misuse, double conjunctions). Students identify and
          correct each error.
        duration: 20
