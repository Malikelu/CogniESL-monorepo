      - name: Passive Voice Drill
        type: transformation
        description: Give 15 active sentences. Students rewrite in passive voice.
        duration: 15
      - name: Passive Translation
        type: translation
        description: Give 10 Portuguese passive sentences. Students translate to English
          passive.
        duration: 15
