  zero_conditional:
    interference_patterns:
    - pattern: Use of 'will' in the main clause of zero conditional
      example_portuguese: Se voce aquece a agua, ela ferve.
      example_gloss: If you heat the water, it boils.
      example_wrong: If you heat the water, it will boil.
      example_correct: If you heat the water, it boils.
      explanation: Portuguese uses the present tense in both clauses for general truths
        (se + presente, presente). English zero conditional also uses present in both
        clauses, but Portuguese speakers often overgeneralize 'will' from the first
        conditional (if + present, will + infinitive) into zero conditional contexts.
        This is because Portuguese does not formally distinguish between the two conditional
        structures the way English does — both use present tense, so learners map
        the English first conditional pattern onto general-truth statements.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of future tense in the if-clause
      example_portuguese: Se voce aquecer a agua, ela ferve.
      example_gloss: If you heat the water, it boils.
      example_wrong: If you will heat the water, it boils.
      example_correct: If you heat the water, it boils.
      explanation: Portuguese uses the future subjunctive (se + futuro do subjuntivo)
        in conditional clauses referring to hypothetical future events (se voce aquecer
        = if you heat). English never uses 'will' in the if-clause of any conditional.
        Portuguese speakers transfer the future subjunctive structure and produce
        'if you will + verb,' which is ungrammatical in English. This error is particularly
        persistent because the Portuguese future subjunctive is the standard way to
        form conditional clauses.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''If you heat the water, it will boil.'' (general truth) Correct: ''If
      you heat the water, it boils.'''
    - 'Wrong: ''If you will press this button, the door opens.'' Correct: ''If you
      press this button, the door opens.'''
    - 'Wrong: ''If you will mix red and blue, you get purple.'' Correct: ''If you
      mix red and blue, you get purple.'''
    why_it_happens: Portuguese and English differ in how they structure conditional
      sentences. Portuguese uses the present tense in both clauses for general truths
      (se + presente, presente) and the future subjunctive in the if-clause for hypothetical
      conditions (se + futuro do subjuntivo, presente/futuro). English has a clear
      structural distinction between zero conditional (if + present, present) for
      general truths and first conditional (if + present, will + infinitive) for specific
      future events. Portuguese speakers (1) overgeneralize 'will' from first conditional
      into zero conditional because Portuguese does not mark this distinction with
      different verb forms, and (2) transfer the future subjunctive into English as
      'if you will + verb' because the Portuguese conditional clause naturally uses
      a future-marked verb form. Both errors are documented in contrastive analyses
      of Portuguese-English conditional structures.
    teacher_tips:
      how_to_explain: 'Write two columns on the board. Left: ZERO conditional (general
        truths) — ''If + present, present.'' Right: FIRST conditional (specific future)
        — ''If + present, will + verb.'' Emphasize: NO ''will'' in the ''if'' clause,
        EVER. For zero conditional, both sides are present simple. Use scientific
        facts and everyday routines as examples: ''If you freeze water, it becomes
        ice.'' ''If I wake up late, I miss the bus.'''
      where_to_start: Begin with scientific facts and natural laws since these are
        the clearest zero conditional contexts. 'If you heat water to 100 degrees,
        it boils.' 'If you drop something, it falls.' Then move to daily routines
        and habits. Finally, contrast with first conditional to prevent overgeneralization
        of will.
      sequencing: 'Week 1: Zero conditional for general truths and scientific facts.
        Week 2: Zero conditional for habits and routines. Week 3: Zero vs. first conditional
        contrast — when to use will and when not to. Week 4: Error correction focusing
        on ''will'' in if-clause and ''will'' in zero conditional main clause. Week
        5: Mixed practice and production.'
      exercises:
      - name: Zero Conditional Drill
        type: fill-in-the-blank
        description: Provide 15 sentences about scientific facts and general truths.
          Students must fill in the correct present tense form in both clauses.
        duration: 15
      - name: Zero vs First Conditional Sort
        type: categorization
        description: Give 20 conditional sentences. Students sort into zero conditional
          (general truth) or first conditional (specific future), then identify and
          correct the 8 sentences with errors (will in wrong place).
        duration: 20
      - name: If-Clause Error Correction
        type: error-correction
        description: Provide 15 sentences with will incorrectly used in if-clauses.
          Students identify the error and rewrite the sentence correctly. Include
          both zero and first conditional contexts.
        duration: 15
