  verbs_followed_by_to_infinitive:
    interference_patterns:
    - pattern: Use of bare infinitive where English requires to-infinitive
      example_portuguese: Eu quero nadar.
      example_gloss: I want to swim.
      example_wrong: I want swim.
      example_correct: I want to swim.
      explanation: Portuguese uses the bare infinitive directly after verbs like 'querer'
        (want), 'precisar' (need), 'planejar' (plan), 'esperar' (hope), 'decidir'
        (decide). English requires 'to + infinitive' after these verbs. Portuguese
        speakers drop the 'to' because their L1 has no equivalent marker before the
        infinitive in these constructions.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Use of to-infinitive where English requires gerund (-ing)
      example_portuguese: Eu parei de fumar.
      example_gloss: I stopped to smoke.
      example_wrong: I stopped to smoke.
      example_correct: I stopped smoking.
      explanation: Portuguese uses the preposition 'de' + infinitive after verbs like
        'parar de' (stop), 'continuar a' (continue), 'acabar de' (finish). Portuguese
        speakers may map 'de' onto 'to' and produce 'stopped to smoke' (meaning intention
        to smoke) instead of 'stopped smoking' (meaning cessation). This is a meaning-altering
        error. Additionally, verbs like 'enjoy,' 'mind,' 'finish,' 'avoid,' 'practice,'
        'consider,' 'suggest,' 'miss,' 'risk,' 'postpone' take gerunds in English
        but infinitives in Portuguese (eu gosto de nadar = I enjoy swimming, not 'I
        enjoy to swim').
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''I want swim.'' Correct: ''I want to swim.'''
    - 'Wrong: ''I stopped to smoke.'' (meaning cessation) Correct: ''I stopped smoking.'''
    - 'Wrong: ''I enjoy to swim.'' Correct: ''I enjoy swimming.'''
    - 'Wrong: ''She needs go home.'' Correct: ''She needs to go home.'''
    why_it_happens: Portuguese verb complementation differs from English in two systematic
      ways. First, Portuguese uses the bare infinitive after modal and semi-modal
      verbs (querer, poder, dever, precisar, conseguir) without any prepositional
      marker, while English requires "to + infinitive" (want to, need to, plan to,
      hope to, decide to, agree to, refuse to, promise to, offer to, learn to, manage
      to, afford to, seem to, appear to, tend to). Portuguese speakers omit "to" because
      their L1 has no equivalent particle. Second, Portuguese uses the preposition
      "de" (or "a") + infinitive after aspectual and attitudinal verbs (parar de =
      stop, continuar a = continue, acabar de = finish, gostar de = enjoy, evitar
      = avoid, praticar = practice), while English uses the gerund (-ing form) after
      many of these same semantic categories (stop smoking, enjoy swimming, avoid
      making, practice speaking). The preposition-to-infinitive mapping produces errors
      like "stopped to smoke" (which in English means "stopped in order to smoke")
      instead of "stopped smoking" (which means "quit smoking"). This is a meaning-altering
      error that can cause genuine miscommunication. Both patterns are well-documented
      in contrastive analyses of Portuguese and English verb complementation (Swan
      & Smith, 2001; Azevedo, 1996; Burns, 1998).
    teacher_tips:
      how_to_explain: 'Create two columns on the board: "TO + infinitive" and "GERUND
        (-ing)." List verbs in each column. Emphasize: "In Portuguese, you say ''eu
        quero nadar'' — no word between the verbs. In English, we NEED ''to'': ''I
        want TO swim.''" Then for the second pattern: "In Portuguese, ''eu parei de
        fumar'' uses an infinitive. In English, ''stop'' takes -ing: ''I stopped SMOKING.''
        If you say ''I stopped to smoke,'' it means you paused in order to light a
        cigarette!"'
      where_to_start: 'Begin with the highest-frequency verbs: want to, need to, plan
        to. Drill the "to" insertion. Then introduce the gerund contrast with stop,
        enjoy, finish, avoid.'
      sequencing: 'Week 1: Verbs that take "to + infinitive" (want, need, plan, hope,
        decide, agree, refuse, promise). Week 2: Drill "to" insertion — Portuguese
        bare infinitive vs. English to-infinitive. Week 3: Verbs that take gerund
        (enjoy, mind, finish, avoid, practice, consider, suggest, miss). Week 4: Contrastive
        practice — to-infinitive vs. gerund with meaning change (stop to do vs. stop
        doing, remember to do vs. remember doing). Week 5: Mixed practice and error
        correction.'
      exercises:
      - name: To Insertion Drill
        type: fill-in-the-blank
        description: Provide 20 sentences with bare infinitives after to-infinitive
          verbs. Students insert "to" in the correct position. Include distractors
          where no "to" is needed.
        duration: 15
      - name: Infinitive or Gerund Decision
        type: multiple-choice
        description: Provide 20 sentences where students must choose between to-infinitive
          and gerund after verbs like stop, remember, forget, try, enjoy, finish,
          avoid. Include meaning-change pairs (stop to do vs. stop doing).
        duration: 20
      - name: Meaning Change Translation
        type: translation
        description: Give 10 Portuguese sentences using "parar de," "continuar a,"
          "acabar de," "gostar de." Students translate into English, choosing between
          to-infinitive and gerund based on meaning.
        duration: 15
