  reported_speech: &id007
    interference_patterns:
    - pattern: Use of present tense in reported speech (no backshift)
      example_portuguese: Ele disse que gosta de cafe.
      example_gloss: He said that likes coffee.
      example_wrong: He said that he likes coffee.
      example_correct: He said that he liked coffee.
      explanation: Portuguese does not always backshift tenses in reported speech.
        When the reported information is still true, Portuguese retains the original
        tense. English typically backshifts regardless of truth value. Portuguese
        speakers transfer this L1 pattern, producing 'He said that he likes coffee'
        instead of 'He said that he liked coffee.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Retention of direct question word order in reported questions
      example_portuguese: Ele perguntou onde voce mora.
      example_gloss: He asked where you live.
      example_wrong: He asked where do you live.
      example_correct: He asked where you live.
      explanation: Portuguese does not change word order when converting direct questions
        to reported questions — the subject-verb order is maintained (Ele perguntou
        onde voce mora = He asked where you live). English requires statement word
        order in reported questions (subject before verb), but Portuguese speakers
        may transfer the direct question structure, producing 'He asked where do you
        live' instead of 'He asked where you live.' This pattern is documented for
        Portuguese speakers in Swan & Smith (2001) and in Folse (2009) for ELLs
        whose L1 does not require word order change in reported questions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: He said that he likes coffee. Correct: He said that he liked coffee.'
    - 'Wrong: He asked where do you live. Correct: He asked where you live.'
    - 'Wrong: She asked what time is it. Correct: She asked what time it was.'
    why_it_happens: Portuguese reported speech differs from English in two key ways.
      First, Portuguese does not always backshift tenses — when the reported information
      is still true, the original tense is retained. English typically backshifts
      regardless. Second, Portuguese does not require word order changes in reported
      questions; the subject-verb order from the direct question is maintained. English
      requires statement word order (subject before verb) in reported questions.
      Portuguese speakers transfer both L1 patterns into English.
    teacher_tips:
      how_to_explain: 'Teach the backshift rule: present to past, past to past perfect,
        will to would. Then teach reported questions: remove the auxiliary "do" and
        use statement word order. Contrast: Direct "Where do you live?" -> Reported
        "He asked where you live" (not "where do you live").'
      where_to_start: Begin with simple backshift of statements. Then introduce reported
        questions with word order change.
      sequencing: 'Week 1: Backshift (present to past). Week 2: Backshift (past to
        past perfect). Week 3: Reported questions (word order). Week 4: Mixed practice.'
      exercises:
      - name: Reported Speech Drill
        type: transformation
        description: Give 10 direct speech sentences. Students report them with correct
          backshift.
        duration: 15
      - name: Reported Question Word Order
        type: error-correction
        description: Provide 10 reported questions with direct-speech word order. Students
          correct the word order and apply backshift.
        duration: 15
