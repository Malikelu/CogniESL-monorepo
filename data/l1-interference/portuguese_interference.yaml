  can_could:
    interference_patterns:
    - pattern: Use of 'can' for hypothetical situations instead of 'could'
      example_portuguese: Se eu pudesse, eu viajaria.
      example_gloss: If I could, I would travel.
      example_wrong: If I can, I will travel.
      example_correct: If I could, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (pudesse) for hypothetical
        conditions. English requires 'could' (past form of 'can') in the if-clause
        and 'would' in the result clause. Portuguese speakers transfer the present-tense
        'can' because the Portuguese present subjunctive (possa) and the conditional
        relationship feel parallel to the English first conditional (If I can... I
        will), leading them to use the wrong conditional type entirely.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'can' for polite requests where 'could' is appropriate
      example_portuguese: Voce pode me ajudar?
      example_gloss: You can me help?
      example_wrong: Can you help me? (overly direct in formal contexts)
      example_correct: Could you help me?
      explanation: Portuguese 'Voce pode me ajudar?' uses the present tense 'pode'
        for both casual and formal requests. English distinguishes 'Can you...?' (informal,
        ability-focused) from 'Could you...?' (polite, deferential). Portuguese speakers
        default to 'Can you...?' in all contexts because their L1 does not grammatically
        mark this politeness distinction with different modal forms. This leads to
        perceived rudeness in formal or professional settings.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'could' for present ability where 'can' is required
      example_portuguese: Eu podia nadar quando era crianca.
      example_gloss: I could swim when I was a child.
      example_wrong: I could swim very well. (present ability)
      example_correct: I can swim very well.
      explanation: Portuguese 'poder' in the imperfect (podia) expresses past ability,
        but Portuguese speakers sometimes overgeneralize 'could' to present contexts
        because both 'can' and 'could' translate to forms of 'poder.' The semantic
        overlap between present ability ('can') and conditional/past ability ('could')
        in the single Portuguese verb 'poder' creates confusion. Portuguese speakers
        may use 'could' for present ability when they want to sound tentative or polite,
        not realizing that in English, 'could' for present ability implies uncertainty
        ('I could swim, but I'm not sure I want to') rather than straightforward ability
        ('I can swim').
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''If I can, I will travel.'' Correct: ''If I could, I would travel.'''
    - 'Wrong: ''Can you help me?'' (formal context) Correct: ''Could you help me?'''
    - 'Wrong: ''I could swim very well.'' (present ability) Correct: ''I can swim
      very well.'''
    why_it_happens: 'The Portuguese verb ''poder'' maps onto both ''can'' and ''could''
      in English, but the

      mapping is not one-to-one. Portuguese uses distinct verb forms (present ''pode,''

      imperfect ''podia,'' conditional ''poderia,'' subjunctive ''possa/pudesse'')
      that do

      not align neatly with the English modal system. Three specific mismatches cause

      interference.


      (1) Hypothetical conditions -- Portuguese uses the imperfect subjunctive (pudesse)

      in the if-clause and the conditional (poderia) in the result, which Portuguese

      speakers may map to English ''can'' and ''will'' (first conditional) instead
      of

      ''could'' and ''would'' (second conditional), because the Portuguese subjunctive

      feels like a ''real'' possibility.


      (2) Politeness -- Portuguese ''pode'' covers both casual and formal requests,
      while

      English uses ''can'' for informal and ''could'' for polite/formal requests.
      Portuguese

      speakers default to ''can'' because their L1 does not require a modal shift
      for

      politeness.


      (3) Present vs. past ability -- Portuguese ''pode'' (present) and ''podia''
      (past)

      are clearly distinguished, but English ''can'' (present) and ''could'' (past/conditional)

      create confusion because ''could'' is also used for tentative present ability.

      Portuguese speakers may overgeneralize ''could'' to present contexts.


      These patterns are documented in Swan & Smith (2001) for Romance language learners

      of English and in Azevedo (1996) for Portuguese-English contrastive analysis
      of

      modal verb systems.

      '
    teacher_tips:
      how_to_explain: 'Create a three-column chart: Portuguese | English Meaning |
        English Form. Show that ''pode'' = can (present ability/permission) AND could
        (polite request). Show that ''pudesse'' = could (hypothetical). Drill the
        distinction: ''Can I...?'' (asking about ability/permission) vs. ''Could I...?''
        (polite request) vs. ''If I could...'' (hypothetical).'
      where_to_start: Begin with the second conditional since it is the most structurally
        different from Portuguese. Write 'Se eu pudesse...' and show that English
        says 'If I could... I would...' — not 'If I can... I will...'
      sequencing: 'Week 1: Second conditional (If I could... I would...). Week 2:
        Polite requests (Could you...? vs. Can you...?). Week 3: Present ability (can)
        vs. past ability (could) vs. tentative present (could). Week 4: Mixed practice
        with all three distinctions. Week 5: Error correction and communicative practice.'
      exercises:
      - name: Conditional Type Sort
        type: transformation
        description: Provide 15 Portuguese sentences with subjunctive conditionals.
          Students translate into English second conditional (If I could... I would...),
          explicitly avoiding the first conditional.
        duration: 20
      - name: Politeness Upgrade Drill
        type: sentence-rewrite
        description: Give 10 informal requests using 'can.' Students rewrite them
          as polite requests using 'could.' Contexts include workplace, restaurant,
          and formal email.
        duration: 15
      - name: Can vs Could Context Decision
        type: fill-in-the-blank
        description: Provide 20 sentences with blank modals. Students choose between
          'can' and 'could' based on context clues (present ability, past ability,
          polite request, hypothetical). Each sentence includes a context tag.
        duration: 15
      - name: Modal Verb Error Correction
        type: error-correction
        description: Provide a dialogue between a Portuguese speaker and a native
          English speaker. The Portuguese speaker makes 8 can/could errors. Students
          identify and correct each error, explaining which rule applies.
        duration: 20
