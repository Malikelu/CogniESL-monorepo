    - 'Wrong: ''I travel tomorrow.'' Correct: ''I will travel tomorrow.'''
    - 'Wrong: ''She comes next week.'' Correct: ''She will come next week.'''
    - 'Wrong: ''I go eat pizza tonight.'' Correct: ''I am going to eat pizza tonight.'''
    - 'Wrong: ''We go travel next month.'' Correct: ''We are going to travel next
