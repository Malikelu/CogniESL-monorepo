  absolute_constructions: &id011
    interference_patterns:
    - pattern: Bare past participle used as absolute construction without auxiliary
      example_portuguese: Feito o trabalho, eu sai.
      example_gloss: Done the work, I left.
      example_wrong: Done the work, I left.
      example_correct: Having finished the work, I left.
      explanation: Portuguese absolute constructions use a bare past participle (feito,
        dito, acabado) followed by a subject + finite verb with no auxiliary or conjunction.
        English requires either a perfect participial clause (having + past participle)
        or a subordinate clause (after/because + subject + verb). Portuguese speakers
        transfer the bare-participle pattern directly, producing fragments like "Done
        the work" instead of "Having finished the work" or "After the work was done."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of conjunction in temporal/causal adverbial clauses
      example_portuguese: Chegando em casa, eu liguei a TV.
      example_gloss: Arriving home, I turned on the TV.
      example_wrong: Arriving home, I turned on the TV.
      example_correct: When I arrived home, I turned on the TV. / After arriving home,
        I turned on the TV.
      explanation: Portuguese routinely uses gerund-participle clauses (chegando, tendo
        feito, estando) as adverbial modifiers without an explicit conjunction. English
        participial clauses at the beginning of sentences are restricted to formal
        registers and often require explicit subordinators (when, after, because). Portuguese
        speakers overuse sentence-initial participial clauses in everyday English, producing
        "Arriving home, I turned on the TV" where a native speaker would say "When I got
        home, I turned on the TV." This is a register mismatch rather than a grammatical
        error per se, but it marks the writer/speaker as non-native.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Participial clause with mismatched (dangling) subject
      example_portuguese: Chegando atrasado, a aula ja tinha comecado.
      example_gloss: Arriving late, the class had already started.
      example_wrong: Arriving late, the class had already started.
      example_correct: Because I arrived late, the class had already starting. / When
        I arrived late, the class had already started.
      explanation: Portuguese participial clauses freely allow the implied subject of
        the participle to differ from the grammatical subject of the main clause (chegando
        atrasado [eu], a aula ja tinha comecado). This is because Portuguese participial
        constructions are pragmatically interpreted. English participial clauses require
        their implied subject to match the main clause subject. Portuguese speakers produce
        dangling participles like "Arriving late, the class had started" where "the class"
        cannot be the one "arriving late." This error is well-documented in ESL contrastive
        analysis of Romance-language speakers (Swan & Smith, 2001; Azevedo, 1996).
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: Done the work, I left. Correct: Having finished the work, I left.'
    - 'Wrong: Arriving late, the class had started. Correct: When I arrived late, the
      class had already started.'
    - 'Wrong: Being a good student, the exam was easy for him. Correct: Because he was
      a good student, the exam was easy for him.'
    why_it_happens: Portuguese has a highly productive absolute construction system
      that differs from English in three key ways. First, Portuguese uses bare past
      participles (feito, dito, acabado) without auxiliaries as clause-initial absolutes
      (Feito o trabalho = the work done / having done the work). English requires the
      perfect participle "having + past participle" or a full subordinate clause. Second,
      Portuguese gerund-participle clauses (chegando, estando, tendo) function as free
      adverbial modifiers that can appear sentence-initially without conjunctions and
      with greater flexibility than their English counterparts. English participial
      adverbials are mainly a formal/literary device and require careful subject matching.
      Third, Portuguese allows the implied subject of the participial clause to differ
      from the main clause subject (a pragmatic interpretation), while English strictly
      requires subject coherence — the subject of the main clause must be the logical
      subject of the participle. These three structural differences lead Portuguese
      learners to produce absolute participles without "having," overuse sentence-initial
      participial clauses in informal contexts, and create dangling participles. The
      frequency of these errors is moderate (absolute constructions are a C1–C2 feature)
      but persistence is high because the Portuguese patterns are deeply embedded and
      the English alternatives require reorganizing the entire clause structure.
    teacher_tips:
      how_to_explain: 'Start with the concept of "having + past participle." Write
        a Portuguese absolute construction on the board (Feito o trabalho, eu sai)
        and ask: "How do we say this in proper English?" Build up step by step:
        (1) Feito = having done/done; (2) o trabalho = the work; (3) eu sai = I left.
        Show that English needs "Having finished the work, I left" or "After the work
        was done, I left." For dangling participles, use humorous examples: "Walking
        to school, the rain started — was the rain walking to school?"'
      where_to_start: Begin with the most common error — bare participles without "having."
        Give students 5 Portuguese absolute constructions and have them convert to
        English using "having + past participle." Then move to conjunction alternatives
        (after, when, because). Finally, address dangling participles.
      sequencing: 'Week 1: Bare participle → having + past participle (time/reason).
        Week 2: Bare participle → subordinate clause with conjunction. Week 3: Dangling
        participle identification and correction. Week 4: Register awareness — when
        participial clauses are appropriate (formal) vs. when to use conjunctions
        (informal). Week 5: Mixed production practice — writing and speaking.'
      exercises:
      - name: Absolute to Perfect Participle Conversion
        type: sentence-rewrite
        description: 'Give 10 Portuguese-style absolute constructions with bare past
          participles (e.g., "Done the work, I left."). Students rewrite each using
          "having + past participle" (e.g., "Having finished the work, I left.").'
        duration: 15
      - name: Conjunction Substitution Drill
        type: transformation
        description: 'Provide 10 sentence-initial participial clauses. Students rewrite
          each using an explicit conjunction (when, after, because, since) and a full
          subordinate clause. Discuss which register each version belongs to.'
        duration: 15
      - name: Dangling Participle Detective
        type: error-correction
        description: 'Present 8 sentences with dangling participle errors (e.g., "Being
          a rainy day, we stayed inside."). Students identify the logical subject mismatch,
          explain why it is problematic, and correct it with a conjunction clause.'
        duration: 15
      - name: Register Consciousness Rewriting
        type: sentence-rewrite
        description: 'Give students a short paragraph (8–10 sentences) written entirely
          with conjunction clauses (because/when/after). Students rewrite it using
          participial constructions where appropriate, then discuss which version sounds
          more formal/natural and why.'
        duration: 20
      - name: Absolute Construction Production
        type: sentence-rewrite
        description: 'Students write 5 original absolute constructions (noun + participle)
          and 5 perfect participial clauses (having + past participle). Peer review:
          check for correct structure, subject matching, and appropriate register.'
        duration: 15
