    notes: 'Portuguese has 243 GPs total. This entry covers the alternatives_to_if grammar point. Two independent sources:
      contrastive teaching reference (Swan & Smith 2001) and structural linguistics reference (Azevedo 1996). Patterns cover
      (1) if overuse as universal conditional, (2) if not for unless transfer, (3) will after unless/provided that from future
      subjunctive transfer, (4) in case vs if confusion from caso cognate, (5) even if overuse from mesmo se. Frequency is
      4 (high -- conditionals are among the most common sentence structures) and persistence is 4 (high -- deeply automatized
      from L1 conditional system).'
  although:
    interference_patterns:
    - Portuguese speakers produce "although...but" double-conjunction errors by transferring the Portuguese pattern "embora...mas"
      where both conjunctions co-occur. Portuguese allows and often prefers the concessive pair "embora [subjunctive]...mas..."
      in emphatic concessive constructions (e.g. "Embora estivesse cansado, mas continuou trabalhando"). English strictly
      forbids "although...but" — only one conjunction is permitted. This produces errors like "Although it was raining, but
      we went out" and "Although he is young, but he is very mature." The error is among the most frequent and visible concessive
      errors for Portuguese speakers.
    - Portuguese speakers overuse "although" in contexts where English requires "despite" or "in spite of" because Portuguese
      "embora" covers a broader semantic range than English "although." Portuguese "embora" can introduce both finite clauses
      ("embora esteja cansado") and noun-phrase equivalents through nominalization, whereas English "although" only introduces
      finite clauses. Portuguese speakers produce errors like "Although the rain, we went out" (transferring "apesar da chuva"
      → "although the rain") instead of "Despite the rain, we went out" or "In spite of the rain, we went out." This pattern
      also produces "although + noun phrase" errors where a prepositional alternative is required.
    - Portuguese speakers use "although" with the indicative mood where English requires a concessive structure with subjunctive-like
      hypothetical meaning, transferring the Portuguese subjunctive after "embora." Portuguese "embora" triggers the subjunctive
      when the concessive meaning is hypothetical or counterfactual ("Embora ele venha, não vou aceitar" — subjunctive "venha").
      English "although" takes the indicative for factual concessions and does not mark mood. Portuguese speakers sometimes
      produce awkward constructions like "Although he would come, I wouldn't accept" where English prefers "Even if he came,
      I wouldn't accept" — the "even if" conditional concessive is the correct English equivalent of the Portuguese subjunctive
      concessive.
    - Portuguese speakers produce "despite of" and "in spite" (missing "of") by direct translation of "apesar de." Portuguese
      "apesar de" is a single preposition meaning "despite/in spite of," and learners decompose it literally — "apesar" maps
      to "despite" and "de" maps to "of" — producing the hypercorrect "despite of" or the incomplete "in spite." Errors include
      "Despite of the rain, we went out" and "In spite the difficulties, she succeeded." This error is extremely persistent
      because "apesar de" is one of the most frequent concessive markers in Portuguese and the decomposition feels logically
      transparent to learners.
    why_it_happens: Portuguese has a concessive conjunction system that differs from English in four critical ways. (1) Portuguese
      allows double conjunction marking in emphatic concessives ("embora...mas") while English strictly permits only one conjunction
      per clause pair. (2) Portuguese "embora" has a broader distribution than English "although" — it can introduce both
      finite clauses and nominalized phrases, whereas "although" is restricted to finite clauses. English splits this function
      between "although/even though" (finite clauses) and "despite/in spite of" (noun phrases). (3) Portuguese "embora" triggers
      the subjunctive mood for hypothetical/counterfactual concessions, a morphological distinction that English lacks — English
      uses "even if" for hypothetical concessives and "although" for factual ones. (4) Portuguese "apesar de" is a single
      compound preposition that learners decompose into "despite + of," producing the ungrammatical "despite of." These four
      structural differences are deeply automatized from L1 acquisition and persist into advanced proficiency because concessive
      structures are acquired early and used frequently in both languages.
    teacher_tips:
      how_to_explain: 'Use a four-cell contrastive chart with four columns: (A) Portuguese concessive structure, (B) Literal
        English transfer — wrong, (C) Correct English equivalent, (D) Rule. Cover the four error zones: (1) embora + mas becomes
        although + but — WRONG, delete but; (2) embora + noun phrase becomes although + noun phrase — WRONG, use despite/in
        spite of; (3) embora + subjunctive becomes even if + past, not although; (4) apesar de becomes despite/in spite of,
        NOT despite of. Emphasize that English has a STRICT ONE-CONJUNCTION RULE for concessives and a CLAUSE vs NOUN PHRASE
        split that Portuguese does not have.'
      where_to_start: Start with the "although...but" error since it is the most visible and the easiest to diagnose. Have
        students underline both conjunctions in "Although it was raining, but we went out" and ask which one to keep. Then
        move to the despite/in spite of pattern, which requires understanding the clause vs noun phrase distinction. Finally,
        address the "despite of" hypercorrection and the even-if/although mood distinction.
      exercises:
      - name: Conjunction deletion drill — although...but
        type: error-correction
        description: Provide 15 sentences with the "although...but" double-conjunction error (e.g. "Although it was raining,
          but we went out", "Although he studied hard, but he failed", "Although she is rich, but she is not happy"). Students
          must delete the incorrect conjunction and explain the rule — English allows only one concessive conjunction per
          clause pair.
        duration: 15
      - name: Although vs despite vs in spite of — structural choice
        type: practice
        description: Provide 20 sentence stems that students must complete with the correct concessive structure. Include
          10 requiring finite clauses (although/even though) and 10 requiring noun phrases (despite/in spite of). Examples
          — "______ the heavy rain, the match continued" (Despite/In spite of), "______ it was raining heavily, the match
          continued" (Although/Even though), "______ his age, he ran the marathon" (Despite/In spite of). Discuss why "although"
          cannot be used with noun phrases.
        duration: 20
      - name: Despite of elimination — hypercorrection repair
        type: error-correction
        description: Provide 12 sentences with "despite of" and "in spite" errors (e.g. "Despite of the traffic, we arrived
          on time", "In spite the problems, she finished the project", "Despite of being tired, he kept working"). Students
          identify the error, explain why it is wrong (apesar de is one word in Portuguese but despite/in spite of are two
          separate words in English), and correct each sentence.
        duration: 10
      - name: Portuguese-to-English concessive translation
        type: drill
        description: Give 15 Portuguese sentences covering all four error zones — (1) "Embora estivesse cansado, mas continuou"
          (double conjunction), (2) "Embora a chuva, saiu" (embora + noun phrase), (3) "Embora ele venha, não aceito" (subjunctive
          concessive → even if), (4) "Apesar do frio, fomos à praia" (apesar de → despite). Students translate each into correct
          English, consciously applying the four rules. Discuss which Portuguese structures have no direct English equivalent.
        duration: 20
      - name: Even if vs although — mood distinction practice
        type: practice
        description: 'Provide 10 scenarios. For each, students write two sentences — one with "although" (factual concessive)
          and one with "even if" (hypothetical concessive). Sample scenario — "You are tired. You keep working." Students
          write: "Although I am tired, I keep working" (fact) and "Even if I were tired, I would keep working" (hypothetical).
          This builds awareness of the Portuguese subjunctive concessive to English "even if" mapping.'
        duration: 15
      - name: Concessive structure acceptability judgment
        type: practice
        description: Provide 20 English sentences with various concessive structures. Students rate each as (1) correct, (2)
          incorrect — explain the error, or (3) correct but formal/literary. Include correct sentences ("Although it was cold,
          we went out"), double-conjunction errors ("Although it was cold, but we went out"), despite-of errors ("Despite
          of the cold, we went out"), although + noun phrase errors ("Although the cold, we went out"), and correct formal
          alternatives ("Despite the cold, we went out", "In spite of the cold, we went out", "Even if it were cold, we would
          go out"). Discuss answers as a class.
        duration: 15
    examples:
    - 'Wrong: ''Although it was raining, but we went out.'' (Portuguese: ''Embora estivesse chovendo, mas saímos.'' — double
      conjunction embora...mas) Correct: ''Although it was raining, we went out.'' / ''It was raining, but we went out.''
      — English allows only ONE concessive conjunction'
    - 'Wrong: ''Although the rain, we went out.'' (Portuguese: ''Embora a chuva, saímos.'' — embora + noun phrase) Correct:
      ''Despite the rain, we went out.'' / ''In spite of the rain, we went out.'' — English ''although'' requires a finite
      clause'
    - 'Wrong: ''Despite of the rain, we went out.'' (Portuguese: ''Apesar da chuva, saímos.'' — literal decomposition: apesar
      = despite, de = of) Correct: ''Despite the rain, we went out.'' / ''In spite of the rain, we went out.'' — ''despite''
      never takes ''of'''
    - 'Wrong: ''Although he would come, I wouldn''t accept.'' (Portuguese: ''Embora ele viesse, não aceitaria.'' — subjunctive
      concessive = hypothetical) Correct: ''Even if he came, I wouldn''t accept.'' — English ''although'' is factual; ''even
      if'' is hypothetical'
    - 'Wrong: ''In spite the difficulties, she succeeded.'' (Portuguese: ''Apesar das dificuldades, ela conseguiu.'' — in
      spite missing ''of'') Correct: ''In spite of the difficulties, she succeeded.'' / ''Despite the difficulties, she succeeded.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents concessive conjunction errors including although...but double marking from embora...mas
      transfer, despite of hypercorrection from apesar de decomposition, and although overuse in noun-phrase contexts).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on subordination and
      concessive clauses — describes the Portuguese concessive system: embora, mesmo que, apesar de, se bem que; the subjunctive
      trigger after embora for hypothetical concessives; and the double-conjunction pattern embora...mas, explaining the structural
      basis for L1 transfer to English concessive structures).'
