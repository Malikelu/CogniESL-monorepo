  adjective_order:
    interference_patterns:
    - pattern: Post-nominal adjective placement
      example_portuguese: Um carro vermelho bonito.
      example_gloss: A car red beautiful.
      example_wrong: A car red beautiful.
      example_correct: A beautiful red car.
      explanation: 'Portuguese places most adjectives after the noun. English places
        all adjectives before the noun in a specific order: opinion before color.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Meaning change from Portuguese pre-nominal vs. post-nominal adjective
        position transferred to English
      example_portuguese: Um grande homem (a great man) vs. um homem grande (a big/tall
        man).
      example_gloss: A great man vs. a big man.
      example_wrong: He is a man great.
      example_correct: He is a great man.
      explanation: 'In Portuguese, adjective position changes meaning: ''um grande
        homem'' (a great man — pre-nominal, figurative) vs. ''um homem grande'' (a
        big/tall man — post-nominal, literal). Portuguese speakers may transfer the
        post-nominal (literal) position to English, producing ''a man great'' instead
        of ''a great man.'' Additionally, Portuguese speakers may struggle to understand
        that English adjective order is fixed and does not carry meaning distinctions
        based on position — the order is purely syntactic (OSASCOMP), not semantic.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''A car red beautiful.'' Correct: ''A beautiful red car.'''
    - 'Wrong: ''A house white big.'' Correct: ''A big white house.'''
    - 'Wrong: ''He is a man great.'' Correct: ''He is a great man.'''
    - 'Wrong: ''She bought a dress expensive beautiful.'' Correct: ''She bought a
      beautiful expensive dress.'''
    why_it_happens: 'Portuguese allows flexible adjective placement with meaning distinctions:
      pre-nominal adjectives often carry figurative/emphatic meaning (um grande homem
      = a great man), while post-nominal adjectives carry literal/descriptive meaning
      (um homem grande = a big man). English places ALL adjectives before the noun
      in a fixed order (OSASCOMP: opinion-size-age-shape-color-origin-material-purpose)
      with no meaning change based on position. Portuguese speakers transfer both
      the post-nominal placement and the flexible-order habit, producing errors like
      ''a car red beautiful'' and ''a man great.'' The semantic weight that Portuguese
      assigns to adjective position does not exist in English, making this a deep
      structural transfer error documented in contrastive analyses of Romance vs.
      Germanic noun phrase structure (Swan & Smith, 2001; Azevedo, 1996).'
    teacher_tips:
      how_to_explain: Teach the OSASCOMP mnemonic. Show that opinion adjectives come
        before fact adjectives. All adjectives go BEFORE the noun in English. Explain
        that in English, changing adjective order does NOT change meaning — it only
        sounds wrong. Contrast with Portuguese where position can change meaning.
      where_to_start: 'Begin with two-adjective combinations: opinion + color, size
        + color. Then introduce the Portuguese meaning-change issue: show ''um grande
        homem'' vs. ''um homem grande'' and explain that English does not work this
        way.'
      sequencing: 'Week 1: All adjectives before the noun (basic rule). Week 2: Two-adjective
        order (opinion before fact). Week 3: Three-adjective order and OSASCOMP. Week
        4: Portuguese meaning-change contrast — why position matters in Portuguese
        but not in English. Week 5: Mixed practice with error correction.'
      exercises:
      - name: Adjective Order Drill
        type: transformation
        description: Give 10 sets of adjectives. Students arrange them in correct
          order before a noun.
        duration: 15
      - name: Portuguese to English Adjective Restructuring
        type: translation
        description: Provide 10 Portuguese noun phrases with post-nominal adjectives
          (including meaning-change pairs like ''grande homem'' vs. ''homem grande'').
          Students translate into correct English, placing all adjectives before the
          noun in OSASCOMP order.
        duration: 20
      - name: Adjective Order Error Correction
        type: error-correction
        description: Provide 12 sentences with Portuguese-influenced adjective order
          errors (post-nominal placement, reversed order). Students identify and correct
          each error, explaining the correct OSASCOMP order.
        duration: 15
