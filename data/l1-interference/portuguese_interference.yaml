  dislocation: &id014
    interference_patterns:
    - pattern: Overuse of left-dislocation in formal contexts
      example_portuguese: O Joao, ele chegou ontem.
      example_gloss: Joao, he arrived yesterday.
      example_wrong: Joao, he arrived yesterday.
      example_correct: Joao arrived yesterday.
      explanation: Portuguese uses left-dislocation (topicalização) freely in both speech
        and writing as a default topic-comment structure. The dislocated NP is followed
        by a resumptive pronoun inside the clause nucleus (O Joao, ele chegou = Joao,
        he arrived). English left-dislocation is restricted to informal speech and oral
        narratives (Huddleston & Pullum, 2002, Ch. 16, sec. 8.1, pp. 1408-1410). In
        formal writing and standard English, the canonical SVO order is required. Portuguese
        speakers transfer the topic-comment structure into formal English registers where
        it is inappropriate.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Overuse of right-dislocation in formal contexts
      example_portuguese: Ele chegou ontem, o Joao.
      example_gloss: He arrived yesterday, Joao.
      example_wrong: He arrived yesterday, Joao.
      example_correct: Joao arrived yesterday.
      explanation: Portuguese also uses right-dislocation (deslocamento à direita) as a
        common information-packaging strategy, placing the dislocated NP after the clause
        with a preceding resumptive pronoun (Ele chegou ontem, o Joao = He arrived
        yesterday, Joao). English right-dislocation is similarly restricted to informal
        speech and serves primarily as a clarification or afterthought device (Huddleston
        & Pullum, 2002, Ch. 16, sec. 8.2, pp. 1411-1415). Portuguese speakers may use
        right-dislocation in formal English writing or presentations, producing sentences
        that sound unprofessional or conversational.
      frequency: 2
      persistence: 2
      communicative_impact: 2
    - pattern: Use of resumptive pronouns in relative clauses (linked dislocation strategy)
      example_portuguese: O homem que eu vi ele ontem.
      example_gloss: The man that I saw him yesterday.
      example_wrong: The man that I saw him yesterday.
      example_correct: The man that I saw yesterday.
      explanation: Portuguese freely uses resumptive pronouns in relative clauses (O homem
        que eu vi ele = the man that I saw him), a strategy related to dislocation syntax.
        English relative clauses never allow resumptive pronouns in standard grammar.
        Portuguese speakers transfer the resumptive pronoun strategy from both dislocation
        and relative clause syntax, producing redundant pronouns in English relative
        clauses. This is documented as a high-frequency error for Portuguese speakers
        (Swan & Smith, 2001).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: Joao, he arrived yesterday. Correct: Joao arrived yesterday.'
    - 'Wrong: He arrived yesterday, Joao. Correct: Joao arrived yesterday.'
    - 'Wrong: The man that I saw him yesterday. Correct: The man that I saw yesterday.'
    - 'Wrong: My sister, she is a doctor. Correct: My sister is a doctor.'
    why_it_happens: Portuguese uses dislocation (topicalização) as a default
      information-packaging strategy in both spoken and written language. Left-dislocation
      places a topic NP before the clause with a resumptive pronoun inside (O Joao, ele
      chegou = Joao, he arrived). Right-dislocation places the NP after the clause (Ele
      chegou, o Joao = He arrived, Joao). Both are grammatically standard in Portuguese
      and appear in formal writing, news broadcasts, and academic discourse. English,
      by contrast, restricts dislocation primarily to informal speech and oral narratives
      (Huddleston & Pullum, 2002, Ch. 16, sec. 8, pp. 1408-1415). In formal English,
      the canonical SVO order is expected. Portuguese speakers transfer the topic-comment
      dislocation pattern into formal English contexts where it sounds inappropriately
      conversational. Additionally, Portuguese relative clauses allow resumptive pronouns
      (O homem que eu vi ele = the man that I saw him), a syntactic feature related to
      the same topic-prominent information structure. English bans resumptive pronouns
      in relative clauses. The combination of dislocation transfer and resumptive pronoun
      transfer creates a cluster of related errors that persist because the underlying
      topic-comment information structure is deeply embedded in Portuguese grammar
      (Azevedo, 1996; Swan & Smith, 2001).
    teacher_tips:
      how_to_explain: 'Write on the board: Portuguese "O Joao, ele chegou" vs. English
        "Joao arrived." Explain: "In Portuguese, you can put the topic first and repeat
        it with a pronoun. In English, this sounds like casual speech. For formal English,
        use the simple sentence: Subject + Verb." Then show the formula:
        Portuguese: TOPIC + PRONOUN + VERB → English: SUBJECT + VERB (no pronoun repeat).
        For relative clauses, write: "O homem que eu vi ele" → "The man I saw." Cross
        out "him." Explain: "English does not repeat the object with a pronoun inside
        the relative clause."'
      where_to_start: 'Begin with left-dislocation. Write 5 Portuguese dislocated sentences
        on the board. Ask: "Which word is repeated? The pronoun. In English, we delete
        the pronoun and put the subject in its normal position." Drill with simple SVO
        transformations.'
      sequencing: 'Week 1: Left-dislocation — identify and remove resumptive pronouns,
        restore SVO order. Week 2: Right-dislocation — same transformation, but the
        dislocated NP is at the end. Week 3: Resumptive pronouns in relative clauses —
        identify and delete redundant pronouns. Week 4: Register awareness — when is
        dislocation acceptable in English (informal speech, storytelling)? When is it
        inappropriate (essays, presentations, formal writing)? Week 5: Mixed practice
        and production.'
      exercises:
      - name: Dislocation Detox
        type: sentence-rewrite
        description: Give 10 Portuguese-style dislocated sentences (5 left, 5 right).
          Students rewrite each in standard English SVO order, removing resumptive
          pronouns.
        duration: 15
      - name: Resumptive Pronoun Hunt
        type: error-correction
        description: Provide 10 English sentences with resumptive pronouns in relative
          clauses (e.g., "The book that I read it was good"). Students identify and
          delete the redundant pronoun.
        duration: 10
      - name: Register Sorting
        type: matching
        description: >
          Give 12 dislocated English sentences. Students sort into two
          columns (OK in informal speech / Not OK in formal writing). Discuss
          why dislocation is register-sensitive in English but not in Portuguese.
        duration: 15
      - name: Formal Rewrite Challenge
        type: transformation
        description: Provide 5 short paragraphs written in a conversational style with
          multiple dislocations. Students rewrite each paragraph in formal academic
          English, eliminating all dislocations and resumptive pronouns.
        duration: 20
