    assessment: Expert-evaluated for L1 transfer severity — Portuguese
    notes: 'Portuguese has 243 GPs total. This entry covers the a/an/the grammar point (slug: a_an_the). Three independent
      sources: peer-reviewed experimental study (Tryzna 2009), contrastive teaching reference (Swan & Smith 2001), and structural
      linguistics reference (Azevedo 1996). Patterns cover omission, overuse, and a/an confusion — the three major article
      error types documented for Portuguese L1 speakers.'
  a_lot_of:
    interference_patterns:
    - Portuguese speakers overuse 'a lot of' as a universal quantifier for both countable and uncountable nouns, replacing
      'many', 'much', 'a few', 'a little', 'several', and 'some'. Portuguese 'muito/muita/muitos/muitas' covers all these
      meanings, so learners default to 'a lot of' in every quantifier context. This produces errors like 'I have a lot of
      friends' (acceptable but marked) instead of 'I have many friends', or 'a lot of information' instead of 'much information'
      / 'a lot of information'. The overuse is the most visible surface error.
    - Portuguese speakers use 'a lot of' in formal and academic registers where English requires more precise quantifiers.
      Portuguese does not have register-sensitive quantifier alternatives the way English does — 'muito' works in all registers.
      This leads to errors in academic writing such as 'A lot of studies show...' instead of 'Numerous studies show...' or
      'Much research indicates...'. The communicative impact is register inappropriateness rather than grammatical incorrectness.
    - Portuguese speakers produce 'a lot' as an adverb without the required preposition or complement structure, transferring
      the Portuguese pattern 'muito' which functions as a standalone adverb. Errors include 'I like it a lot of' (hypercorrection),
      'She talks a lot of' (transfer of Portuguese 'fala muito'), and omission in contexts where 'a lot of + noun' is required
      — e.g. 'I have books' instead of 'I have a lot of books' because Portuguese 'Tenho livros' needs no quantifier.
    why_it_happens: Portuguese has a single dominant quantifier system built around 'muito/muita/muitos/muitas' that does
      not distinguish between countable and uncountable nouns. English requires a split system — 'many/few/fewer' for countables,
      'much/little/less' for uncountables, with 'a lot of' as an informal all-purpose alternative. Portuguese learners map
      'muito' onto 'a lot of' as the closest equivalent and overextend it to all quantifier contexts. Additionally, Portuguese
      does not require an explicit quantifier in many existential/possessive constructions where English does (e.g. 'Tenho
      livros' = 'I have books' with no quantifier), leading to underuse of quantifiers in general and over-reliance on 'a
      lot of' when a quantifier is felt to be needed. The error is deeply persistent because the Portuguese quantifier system
      is acquired in early childhood and operates automatically.
    teacher_tips:
      how_to_explain: Use a quantifier map showing Portuguese 'muito' at the center with arrows splitting to English 'many'
        (countable), 'much' (uncountable), 'a lot of' (informal both), 'a few/a little' (small quantity), 'several' (countable,
        medium). Emphasize that English has a COUNTABILITY SPLIT that Portuguese lacks. For register, show that 'a lot of'
        is informal and that academic writing requires 'numerous', 'substantial', 'considerable', 'much', 'many'.
      where_to_start: Start with the countable/uncountable distinction using the quantifier map. Give students 20 nouns to
        sort into countable vs uncountable, then assign the correct quantifier. Move to register awareness by having students
        rewrite informal paragraphs replacing 'a lot of' with appropriate formal quantifiers.
      exercises:
      - name: Quantifier choice drill — countable vs uncountable
        type: drill
        description: Provide 25 gapped sentences where students must choose between many, much, a lot of, a few, a little,
          several, or some. Include both formal and informal contexts. Time pressure to build automaticity.
        duration: 15
      - name: Register transformation — informal to formal
        type: practice
        description: Give students a paragraph written in informal English full of 'a lot of' (e.g. a student essay about
          social media). They must rewrite it using precise, register-appropriate quantifiers (numerous, substantial, many,
          much, considerable).
        duration: 20
      - name: Portuguese-to-English quantifier translation
        type: drill
        description: Give 15 Portuguese sentences using 'muito/muita/muitos/muitas' in various contexts (countable, uncountable,
          adverbial, formal, informal). Students translate, choosing the correct English quantifier for each context. Include
          'Eu tenho muitos amigos', 'Bebo muita água', 'Ela trabalha muito'.
        duration: 15
      - name: Error correction — quantifier overuse and misuse
        type: error-correction
        description: Provide 15 sentences with Portuguese-style quantifier errors including 'a lot of' overuse, countable/uncountable
          confusion, and register inappropriateness. Students identify and fix each error. Examples — 'A lot of people agrees'
          to 'Many people agree'; 'I have a lot of patience' (formal context) to 'I have considerable patience'.
        duration: 15
      - name: Quantifier sorting — muito mapping
        type: practice
        description: Give students 30 English sentences with quantifiers removed. For each, they must decide if the context
          requires countable or uncountable quantifier, formal or informal register, and fill in the best option. Forces active
          decision-making about the Portuguese-to-English quantifier split.
        duration: 15
    examples:
    - 'Wrong: ''I have a lot of friends.'' (informal, marked) Correct: ''I have many friends.'' (neutral) Portuguese: ''Eu
      tenho muitos amigos.'' — muito maps to many for countables'
    - 'Wrong: ''She drinks a lot of water every day.'' (informal) Correct: ''She drinks much water every day.'' / ''She drinks
      a lot of water every day.'' (acceptable informal) Portuguese: ''Ela bebe muita água.'' — muito maps to much for uncountables'
    - 'Wrong: ''A lot of research shows that...'' (informal register in academic writing) Correct: ''Much research shows that...''
      / ''Numerous studies show that...'' Portuguese: ''Muitas pesquisas mostram que...'' — no register distinction in muito'
    - 'Wrong: ''I like it a lot of.'' (hypercorrection — Portuguese ''Eu gosto muito disso'') Correct: ''I like it a lot.''
      / ''I really like it.'''
    - 'Wrong: ''He gave me a lot of advices.'' (double error: a lot of + uncountable noun treated as countable) Correct: ''He
      gave me a lot of advice.'' / ''He gave me much advice.'' Portuguese: ''Ele me deu muitos conselhos.'' — conselhos is
      countable in Portuguese'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents quantifier transfer errors including muito → a lot of overuse, countable/uncountable
      confusion, and register inappropriateness).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on determiners and
      quantifiers — describes the Portuguese muito system that does not distinguish countability, explaining the structural
      basis for L1 transfer to English quantifiers).'
