  adjectives_without_nouns:
    interference_patterns:
    - Portuguese speakers omit the head noun after adjectives in contexts where English allows bare nominalized adjectives
      with 'the' (e.g. 'the poor', 'the rich', 'the elderly'). Portuguese does not productively use 'article + adjective'
      as a standalone noun phrase the way English does — Portuguese requires an explicit noun ('os pobres / os ricos' is possible
      but less productive, and many adjectives cannot be nominalized this way). This leads to errors like 'The poor people
      need help' being overused even when 'The poor need help' is the natural English form, and conversely, learners produce
      incomplete phrases like 'I help the poor people' where the nominalized form 'the poor' is expected. The underlying issue
      is that Portuguese learners do not fully acquire the English 'the + adjective = group of people' construction.
    - Portuguese speakers struggle with English nominalized adjectives referring to abstract concepts ('the impossible', 'the
      unknown', 'the beautiful') where Portuguese requires a full noun phrase or a different syntactic structure. Portuguese
      'o impossível', 'o desconhecido' exist but are restricted to formal/literary registers and are far less productive than
      in English. Learners produce errors like 'She achieved impossible' (missing 'the') or 'He faced with the unknown things'
      (adding an unnecessary noun) because Portuguese either requires a different construction or uses a more explicit noun
      phrase. The transfer is from Portuguese where bare nominalized adjectives are marked and limited.
    - Portuguese adjective-noun word order (adjective typically follows the noun in Portuguese) interferes with English nominalized
      adjective patterns where the adjective precedes nothing (stands alone). Portuguese speakers may produce errors like
      'I prefer the red one' as 'I prefer the one red' or omit the nominalizer entirely, producing 'I prefer red' when 'I
      prefer the red one' is required. This is a word-order transfer from Portuguese pós-nominal adjective placement combined
      with difficulty acquiring English pronominal 'one' as a nominalizer after adjectives.
    why_it_happens: English allows productive nominalization of adjectives with the definite article 'the' to refer to groups
      of people (the poor, the rich, the elderly, the homeless) or abstract concepts (the impossible, the unknown, the beautiful).
      This construction is highly frequent in English and operates across registers. Portuguese has a much more restricted
      system — while 'os/as + adjective' can function similarly (os pobres, os ricos), it is less productive, more formal,
      and many adjectives resist this nominalization. Portuguese also has a strong preference for pós-nominal adjective placement
      (casa branca, not *branca casa), which means Portuguese speakers are not accustomed to adjectives appearing without
      a following noun. Additionally, English uses 'one/ones' as a pronominal nominalizer after adjectives ('the red one',
      'the big ones'), a structure that does not exist in Portuguese where the noun must be repeated or the adjective stands
      alone with a demonstrative. The combination of (1) restricted L1 nominalized adjective productivity, (2) pós-nominal
      adjective word order, and (3) lack of pronominal 'one' creates systematic transfer errors that persist into intermediate
      and advanced proficiency.
    teacher_tips:
      how_to_explain: 'Use a three-part contrastive chart: (1) English ''the + adjective'' for groups of people (the poor
        = poor people) vs Portuguese ''os/as + adjective + [optional noun]''. (2) English ''the + adjective'' for abstract
        concepts (the impossible) vs Portuguese ''o/a + adjective'' (restricted, formal) or full noun phrase. (3) English
        ''adjective + one/ones'' (the red one) vs Portuguese ''o/a + adjective'' or repetition of the noun. Emphasize that
        English ''the + adjective'' is a productive, everyday construction — not literary or formal. Use the formula: THE
        + ADJECTIVE = a group of people / an abstract concept.'
      where_to_start: 'Start with the most frequent and useful pattern: ''the + adjective'' for social groups (the poor, the
        rich, the elderly, the homeless, the young, the old, the unemployed, the disabled). Have students match ''the + adjective''
        phrases with their full noun equivalents. Then move to abstract concept nominalizations (the impossible, the unknown,
        the unexpected). Finally, teach the pronominal ''one'' pattern (the red one, the big ones) since this is a separate
        but related difficulty.'
      exercises:
      - name: Nominalized adjective matching — social groups
        type: practice
        description: Provide 15 'the + adjective' phrases (the poor, the elderly, the homeless, the unemployed, the disabled,
          the young, the wealthy, the sick, the dead, the living, the brave, the innocent, the guilty, the Portuguese, the
          unknown). Students must write the full noun equivalent for each (the poor = poor people) and use each in a sentence.
          Then they write the Portuguese equivalent to see the structural difference.
        duration: 15
      - name: Portuguese-to-English nominalized adjective translation
        type: drill
        description: Give 12 Portuguese sentences that trigger nominalized adjective errors. Include social group contexts
          ('Os pobres precisam de ajuda'), abstract concepts ('Ela conquistou o impossível'), and pronominal one contexts
          ('Prefiro o vermelho' / 'Prefiro o vermelho one' → 'I prefer the red one'). Students translate each into natural
          English, choosing the correct nominalization strategy.
        duration: 15
      - name: Error correction — nominalized adjective errors
        type: error-correction
        description: 'Provide 15 sentences with Portuguese-style nominalized adjective errors including: (a) unnecessary noun
          addition (''The poor people need more support'' → ''The poor need more support''), (b) missing ''the'' (''She achieved
          impossible'' → ''She achieved the impossible''), (c) word order transfer (''I prefer the one red'' → ''I prefer
          the red one''), (d) over-explicit noun phrases (''He faced with the unknown things'' → ''He faced the unknown'').
          Students identify the error type and correct each sentence.'
        duration: 15
      - name: Nominalized adjective expansion — abstract concepts
        type: practice
        description: 'Give students 10 abstract adjectives (impossible, unknown, unexpected, unthinkable, inevitable, beautiful,
          sublime, absurd, unthinkable, mundane). For each, students write: (a) a sentence using ''the + adjective'' as a
          noun phrase (e.g. ''The impossible became possible''), (b) the Portuguese equivalent, (c) a sentence using the adjective
          with an explicit noun for comparison. Discuss when English prefers the nominalized form vs the full noun phrase.'
        duration: 15
      - name: Pronominal 'one' replacement drill
        type: drill
        description: Provide 20 sentences with repeated nouns (e.g. 'I want the red car, not the blue car'). Students must
          replace the second noun with 'one' ('I want the red car, not the blue one'). Then provide 10 Portuguese sentences
          using 'o/a + adjective' where English requires 'the + adjective + one/ones' (e.g. 'Prefiro a camisa vermelha' →
          'I prefer the red one'). This drills the English pronominal nominalizer that Portuguese lacks.
        duration: 15
    examples:
    - 'Wrong: ''The poor people need more support.'' (over-explicit — Portuguese ''Os pobres precisam de mais apoio'' maps
      to both forms) Correct: ''The poor need more support.'' (natural English nominalization)'
    - 'Wrong: ''She achieved impossible.'' (missing ''the'' — Portuguese ''Ela conquistou o impossível'' has the article but
      learners drop it) Correct: ''She achieved the impossible.'''
    - 'Wrong: ''I prefer the one red.'' (word order transfer from Portuguese ''Prefiro o vermelho'' — adjective after nominalizer)
      Correct: ''I prefer the red one.'''
    - 'Wrong: ''He faced with the unknown things.'' (over-explicit noun — Portuguese ''Ele enfrentou o desconhecido'' needs
      no additional noun) Correct: ''He faced the unknown.'''
    - 'Wrong: ''The beautiful is everywhere.'' (missing context — Portuguese ''O belo está em toda parte'' is formal/literary;
      English ''The beautiful'' as abstract noun is acceptable but marked) Correct: ''The beautiful is everywhere.'' (acceptable
      in literary/philosophical register) / ''Beauty is everywhere.'' (more natural alternative)'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents structural transfer errors including nominalized adjective patterns, article-adjective
      constructions, and word-order differences in adjective-noun sequences).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on noun phrase structure
      and adjective placement — describes Portuguese pós-nominal adjective order and the restricted productivity of article
      + adjective nominalizations, explaining the structural basis for L1 transfer to English nominalized adjective patterns).'
