  because:
    interference_patterns:
    - Portuguese speakers confuse 'because' (conjunction introducing a reason clause) with 'because of' (preposition followed
      by a noun phrase), transferring the Portuguese distinction between 'porque' (conjunction) and 'por causa de' (preposition).
      However, Portuguese 'porque' can sometimes be followed by a noun in colloquial usage, leading to errors like 'Because
      the rain, we stayed home' instead of 'Because of the rain, we stayed home' or 'Because it rained, we stayed home'. The
      error is particularly persistent because Portuguese 'porque' and 'por causa de' are both used for causation and the
      distinction between clause-level and phrase-level causation is not always transparent to learners.
    - Portuguese speakers produce 'because'-clauses as standalone sentence fragments, transferring the Portuguese pattern
      where 'porque' can appear in short answers and elliptical responses. Errors include answering 'Why did you leave?' with
      'Because I was tired' (acceptable in informal English but often overextended to written and formal contexts) or producing
      fragments like 'Because the weather was bad.' as complete sentences without a main clause. Portuguese allows 'Porque...'
      as a more complete standalone response than English allows with 'Because...', leading to overuse of because-clause fragments
      in writing.
    - Portuguese speakers place the 'because'-clause before the main clause but omit the required comma, transferring Portuguese
      punctuation rules where 'porque' at the start of a sentence does not require a comma before the main clause. Errors
      include 'Because I was tired I went to bed' (missing comma after the fronted because-clause) and overuse of sentence-initial
      'Because' in formal writing where English style guides prefer 'since' or 'as' for fronted reason clauses. Portuguese
      places the 'porque'-clause freely at the start of sentences without the same register restrictions that English imposes.
    - Portuguese speakers use 'because' in embedded question contexts where English requires 'why' or a different structure.
      Portuguese 'porque' can appear in indirect questions ('Ele perguntou porque eu saiu' = 'He asked why I left / because
      I left'), creating ambiguity that transfers to English as errors like 'I don't know because he left' instead of 'I don't
      know why he left'. The Portuguese 'porque' covers both the reason (because) and the question-reason (why) territory,
      leading to systematic confusion in embedded contexts.
    why_it_happens: Portuguese 'porque' and 'por causa de' form a two-part causal system that maps imperfectly onto English
      'because' and 'because of'. Portuguese 'porque' is a conjunction that introduces a finite clause, while 'por causa de'
      is a prepositional phrase followed by a noun. However, colloquial Portuguese sometimes allows 'porque' before a noun
      phrase, blurring the conjunction/preposition distinction that English maintains strictly. Additionally, Portuguese 'porque'
      covers both causal conjunction ('because') and embedded question ('why') functions, a polysemy that English splits into
      two separate words. Portuguese punctuation rules for fronted 'porque'-clauses differ from English comma requirements,
      and Portuguese allows more freedom in using 'porque'-clauses as standalone responses. These structural differences —
      the causal conjunction/preposition split, the because/why polysemy, punctuation rules, and fragment usage — are deeply
      automatized from L1 acquisition and transfer systematically to English.
    teacher_tips:
      how_to_explain: 'Use a two-part contrastive chart. Part 1 — show the because vs because of distinction with the formula
        "because + subject + verb" vs "because of + noun". Use the test — if what follows is a full clause with a subject
        and verb, use "because"; if it is just a noun/noun phrase, use "because of". Part 2 — show the because vs why distinction
        in embedded questions. "Because" answers "why" in main clauses; "why" is used in indirect/embedded questions. "I left
        because I was tired" (main clause reason) vs "I know why he left" (embedded question, NOT "I know because he left").
        For punctuation, teach the comma rule — when because-clause comes FIRST, use a comma before the main clause.

        '
      where_to_start: Start with the because vs because of distinction since it is the most frequent and most visible error.
        Use the 'clause or noun?' diagnostic test. Then move to the embedded-question because/why confusion. Finally, address
        punctuation and register (sentence-initial because in formal writing).
      exercises:
      - name: Because vs because of gap-fill
        type: drill
        description: Provide 20 gapped sentences where students must choose between 'because' and 'because of'. Include both
          clause contexts ('___ it rained, we stayed home') and noun phrase contexts ('___ the rain, we stayed home'). Include
          tricky cases where the noun phrase is abstract ('___ his advice' / '___ he advised us'). Time pressure to build
          automaticity.
        duration: 15
      - name: Because vs why in embedded questions
        type: error-correction
        description: Provide 15 sentences with because/why confusion in embedded question contexts (e.g. 'I don't understand
          because he is angry', 'She asked because I was late', 'He explained because the project failed'). Students identify
          whether 'because' or 'why' is correct and fix each error. Include correct sentences as distractors.
        duration: 15
      - name: Portuguese-to-English causal translation
        type: drill
        description: Give 15 Portuguese sentences using 'porque' and 'por causa de' in various contexts (main clause reason,
          embedded question, fronted clause, noun phrase cause). Students translate each into correct English, choosing the
          appropriate structure. Include 'Ele saiu porque estava cansado', 'Porque a chuva, ficamos em casa', 'Ele perguntou
          porque eu saí', 'Por causa do trânsito, cheguei atrasado'.
        duration: 20
      - name: Punctuation and register — fronted because-clauses
        type: practice
        description: Give students 10 sentences with fronted because-clauses missing commas (e.g. 'Because I was tired I went
          to bed'). Students add the correct comma. Then have them rewrite 5 of the sentences using 'since' or 'as' instead
          of 'because' for formal register practice. Discuss when sentence-initial because is appropriate (informal) vs when
          since/as is preferred (formal writing).
        duration: 15
      - name: Fragment repair — because-clause as complete sentence
        type: error-correction
        description: Provide 10 because-clause fragments that are presented as complete sentences (e.g. 'Because the weather
          was bad.', 'Because I didn't study.'). Students must either add a main clause to make a complete sentence or rewrite
          the idea as a full sentence without a fragment. Discuss when 'Because...' is acceptable as a short answer in conversation
          vs when it is inappropriate in writing.
        duration: 15
    examples:
    - 'Wrong: ''Because the rain, we stayed home.'' (Portuguese: ''Porque a chuva, ficamos em casa.'' — porque before noun
      phrase) Correct: ''Because of the rain, we stayed home.'' / ''Because it rained, we stayed home.'''
    - 'Wrong: ''I don''t know because he left.'' (Portuguese: ''Eu não sei porque ele saiu.'' — porque covers both because
      and why) Correct: ''I don''t know why he left.'''
    - 'Wrong: ''Because I was tired I went to bed.'' (Portuguese: ''Porque estava cansado, fui dormir.'' — no comma required
      before main clause) Correct: ''Because I was tired, I went to bed.'''
    - 'Wrong: ''Why did you leave?'' ''Because I was tired.'' (acceptable in speech but a fragment in writing) Correct (written):
      ''I left because I was tired.'' / ''The reason I left is that I was tired.'''
    - 'Wrong: ''She asked because I was late.'' (Portuguese: ''Ela perguntou porque eu estava atrasado.'' — porque in embedded
      question) Correct: ''She asked why I was late.'''
    sources:
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on subordination and
      causal connectors — describes the Portuguese porque/por causa de system and its structural differences from English
      because/because of, including the porque polysemy covering both causal conjunction and embedded question functions).'
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents porque → because transfer errors including because/because of confusion, embedded
      question porque/why errors, and punctuation transfer from Portuguese porque-clause patterns).'
    - Perez-Leroux, A. & Glass, W. (1999). Null postverbal objects in Spanish and Portuguese. Linguistic Inquiry, 30(3), 423-446.
      (Provides structural analysis of Portuguese clause-level vs phrase-level causation that explains the L1 basis for because/because
      of transfer errors).
