  future_perfect:
    interference_patterns:
    - pattern: Use of present perfect with future time marker instead of future perfect
      example_portuguese: Amanha eu ja terminei.
      example_gloss: Tomorrow I already finished.
      example_wrong: Tomorrow I already finished.
      example_correct: By tomorrow I will have finished.
      explanation: Portuguese uses the present perfect (pretérito perfeito composto)
        with a future time marker to express completion before a future point (amanha
        eu ja terminei = tomorrow I already finished). English requires the future
        perfect (will have + past participle) for this meaning. Portuguese speakers
        transfer the present perfect + future adverbial structure directly, producing
        sentences like 'Tomorrow I already finished' instead of 'By tomorrow I will
        have finished.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of simple future (futuro do presente) where English requires future
        perfect for completion-before-deadline meaning
      example_portuguese: Eu terminarei o relatorio antes de sexta.
      example_gloss: I will finish the report before Friday.
      example_wrong: I will finish the report before Friday.
      example_correct: I will have finished the report before Friday.
      explanation: Portuguese uses the simple future (futuro do presente) to express
        both simple future actions and completion before a deadline. English distinguishes
        between simple future (will finish = the finishing happens at that time) and
        future perfect (will have finished = completed before that time). Portuguese
        speakers use the simple future where English requires the future perfect,
        losing the completion-before-deadline nuance. This is a documented tense-aspect
        transfer error in Romance-to-Germanic L2 acquisition (Swan & Smith, 2001;
        Azevedo, 1996).
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'ir + infinitive' periphrastic future losing completion nuance
      example_portuguese: Eu vou terminar ate sexta.
      example_gloss: I go to finish until Friday.
      example_wrong: I am going to finish until Friday.
      example_correct: I will have finished by Friday.
      explanation: Portuguese commonly uses 'ir + infinitive' (vou terminar = I'm
        going to finish) to express future meaning. While this maps to English 'be
        going to,' it does not convey the completion-before-deadline meaning of the
        future perfect. Portuguese speakers use the periphrastic future where English
        requires 'will have + past participle,' losing the retrospective future perspective.
      frequency: 2
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''Tomorrow I already finished.'' Correct: ''By tomorrow I will have
      finished.'''
    - 'Wrong: ''Next week I already left.'' Correct: ''By next week I will have left.'''
    - 'Wrong: ''I will finish the report before Friday.'' Correct: ''I will have finished
      the report before Friday.'''
    - 'Wrong: ''I am going to finish by Friday.'' Correct: ''I will have finished
      by Friday.'''
    why_it_happens: Portuguese and English have fundamentally different tense-aspect
      systems for expressing future completion. Portuguese uses three strategies that
      do not map onto the English future perfect. First, Portuguese uses the present
      perfect (pretérito perfeito composto) with future adverbials to express completion
      before a future point (amanha eu ja terminei). Second, Portuguese uses the simple
      future (futuro do presente) for both simple future and completion-before-deadline
      meanings, collapsing a distinction that English maintains. Third, the periphrastic
      'ir + infinitive' future (vou terminar) maps to English 'be going to' but lacks
      the retrospective future perspective of 'will have + past participle.' These
      are well-documented crosslinguistic differences in Romance vs. Germanic tense-aspect
      morphology (Swan & Smith, 2001; Azevedo, 1996). Portuguese speakers transfer
      all three L1 strategies into English, producing errors with the future perfect.
    teacher_tips:
      how_to_explain: 'Draw a timeline on the board. Mark a future point (Friday).
        Show that the action is COMPLETED before that point. Write: ''By Friday, I
        will have finished.'' Contrast with: ''On Friday, I will finish.'' Emphasize
        that future perfect = looking BACK from a future point at something already
        done. Use the formula: BY + [future time] + will have + [past participle].'
      where_to_start: 'Begin with "By tomorrow I will have..." for common daily tasks.
        Use concrete, personal examples: "By tonight, I will have eaten dinner."'
      sequencing: 'Week 1: Future perfect with ''by'' + time (structure drilling).
        Week 2: Future perfect vs. simple future (contrastive practice). Week 3: Future
        perfect vs. present perfect with future adverbials (L1 transfer focus). Week
        4: Future perfect in context (writing and speaking). Week 5: Mixed practice
        and error correction.'
      exercises:
      - name: Future Perfect Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with 'by' + future time. Students use future
          perfect. Include distractors where simple future is correct.
        duration: 15
      - name: L1 Transfer Error Correction
        type: error-correction
        description: 'Provide 10 sentences showing Portuguese L1 transfer errors with
          future perfect. Students identify the error type and correct each sentence:
          present perfect with future adverbial, simple future for completion meaning,
          and going to for completion meaning.'
        duration: 15
      - name: Future Perfect vs. Simple Future Contrast
        type: sentence-rewrite
        description: Give 10 simple future sentences. Students rewrite using future
          perfect when completion-before-deadline is implied. Discuss meaning differences.
        duration: 15
      - name: By This Time Next Year
        type: free-production
        description: Students write 5 sentences about what they will have achieved
          by specific future dates. Peer review for correct future perfect usage.
        duration: 15
