  subject_questions:
    interference_patterns:
    - pattern: Use of do/does in subject questions
      example_portuguese: Quem gosta de cafe?
      example_gloss: Who likes coffee?
      example_wrong: Who does like coffee?
      example_correct: Who likes coffee?
      explanation: When the question word is the subject, do NOT use do/does. Portuguese
        does not use an auxiliary in questions — the verb simply follows the question
        word (quem gosta = who likes). Portuguese speakers overgeneralize the English
        do/does pattern (needed for object questions) into subject questions, producing
        'Who does like coffee?' instead of 'Who likes coffee?'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of do/does in object questions (reverse transfer)
      example_portuguese: O que voce quer?
      example_gloss: What you want?
      example_wrong: What you want?
      example_correct: What do you want?
      explanation: "Portuguese forms all questions by intonation alone without auxiliary inversion (o que voce quer = what you want). Portuguese speakers may omit do/does in English object questions, producing 'What you want?' instead of 'What do you want?' This is the reverse side of the same structural gap. Portuguese has no auxiliary in any question, so speakers both add do/does where it is not needed (subject questions) and omit it where it is required (object questions)."
      frequency: 5
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: Who does like coffee? Correct: Who likes coffee?'
    - 'Wrong: What you want? Correct: What do you want?'
    - 'Wrong: Who does live here? Correct: Who lives here?'
    - 'Wrong: Where you went? Correct: Where did you go?'
    why_it_happens: "Portuguese does not use auxiliary verbs to form questions. All questions are formed by intonation alone, with the same word order as statements (Quem gosta de cafe? = Who likes coffee? / O que voce quer? = What you want?). English, by contrast, requires do/does for object questions but NOT for subject questions. Portuguese speakers face a double challenge. They must learn to add do/does in object questions (where Portuguese has none) and simultaneously learn NOT to use it in subject questions (where English also has none, but the overgeneralization from object questions creates the error). This bidirectional error pattern is well-documented in contrastive analyses of Portuguese and English interrogative structures."
    teacher_tips:
      how_to_explain: 'Draw two columns on the board: SUBJECT QUESTION and OBJECT
        QUESTION. In the subject column, write: Who likes coffee? (NO do/does). In
        the object column, write: What do you want? (NEEDS do/does). Explain: "In
        Portuguese, both look the same — just change your voice. In English, they
        are different. Subject question = no helper. Object question = needs helper."'
      where_to_start: Begin with who subject questions (Who lives here? Who came
        yesterday?) to establish the no-auxiliary pattern. Then introduce who object
        questions (Who did you see?) to contrast.
      sequencing: 'Week 1: Subject questions with who (no do/does). Week 2: Object
        questions with what (needs do/does). Week 3: Mixed subject vs. object — students
        identify which is which. Week 4: Production practice — students create both
        types from answer prompts.'
      exercises:
      - name: Subject vs Object Question Sort
        type: matching
        description: Provide 20 wh-questions. Students sort into subject questions
          (no auxiliary) and object questions (with do/does). Then they explain why.
        duration: 15
      - name: Auxiliary Decision Drill
        type: fill-in-the-blank
        description: Provide 15 wh-questions with a blank where do/does/did would go.
          Students write the auxiliary or leave it blank (for subject questions).
        duration: 15
      - name: Question Formation from Answers
        type: transformation
        description: >-
          Give 10 answer statements. Students must form both a subject
          question and an object question for each. Example answer -
          "Maria likes coffee." arrow Subject: "Who likes coffee?"
          Object: "What does Maria like?"
        duration: 20
