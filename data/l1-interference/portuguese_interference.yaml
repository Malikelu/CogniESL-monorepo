  linking_words_advanced:
    interference_patterns:
    - pattern: Use of 'so' after 'because' (redundant double connector)
      example_portuguese: Eu nao vou porque estou cansado entao.
      example_gloss: I not go because I am tired so.
      example_wrong: I am not going because I am tired so.
      example_correct: I am not going because I am tired.
      explanation: Portuguese uses 'porque...entao' (because...so) together as a paired
        discourse structure. English never uses 'so' after 'because' — only one connector
        is used per causal relationship. Portuguese speakers transfer the paired connector
        structure directly, producing redundant 'because...so' in English.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'but' after 'although' (double conjunction transfer)
      example_portuguese: Embora esteja cansado, mas eu vou trabalhar.
      example_gloss: Although I am tired, but I will work.
      example_wrong: Although I am tired, but I will go to work.
      example_correct: Although I am tired, I will go to work.
      explanation: Portuguese allows paired concessive connectors 'embora...mas'
        (although...but) in the same sentence. English strictly prohibits using 'but'
        after 'although' or 'even though' — only one concessive marker is permitted.
        Portuguese speakers transfer the double-conjunction pattern, producing 'although...
        but' errors. This is one of the most frequently documented L1 transfer errors
        for Portuguese-speaking learners (Swan & Smith 2001, Parrott 2000).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am not going because I am tired so.'' Correct: ''I am not going
      because I am tired.'' OR ''I am tired, so I am not going.'''
    - 'Wrong: ''Although it was raining, but we went out.'' Correct: ''Although it
      was raining, we went out.'' OR ''It was raining, but we went out.'''
    why_it_happens: "Portuguese discourse structure permits paired connectors where English requires a single connector. The causal pair 'porque...entao' (because...so) and the concessive pair 'embora...mas' (although...but) are grammatical in Portuguese but produce redundancy errors in English. English uses one connector per logical relationship — either 'because' or 'so' for cause, either 'although' or 'but' for concession. Portuguese speakers transfer the paired structure because it is deeply embedded in L1 discourse patterns. Additionally, Portuguese 'alem de' (in addition to) can introduce full clauses, while English 'in addition to' is a preposition requiring a noun or gerund, not a finite clause."
    teacher_tips:
      how_to_explain: 'Write two columns on the board: CAUSE and CONCESSION. Under
        CAUSE write: ''because'' OR ''so'' (never both). Under CONCESSION write: ''although''
        OR ''but'' (never both). Show that Portuguese uses BOTH words together, but
        English uses only ONE. Drill with sentence pairs: ''Because it rained, we stayed
        home'' = ''It rained, so we stayed home.'' ''Although it rained, we went out''
        = ''It rained, but we went out.'''
      where_to_start: Begin with the because/so distinction since it is the most
        frequent error. Use simple cause-effect sentences with visual arrows showing
        the direction of causation.
      sequencing: 'Week 1: ''Because'' OR ''so'' (cause — choose one). Week 2: ''Although''
        OR ''but'' (concession — choose one). Week 3: ''In addition to'' + noun/gerund
        (not clause). Week 4: Mixed practice with all advanced linking words.'
      exercises:
      - name: Redundant Connector Deletion
        type: error-correction
        description: Provide 15 sentences with redundant Portuguese-style paired connectors
          (because...so, although...but). Students identify and delete the redundant
          word in each sentence.
        duration: 15
      - name: Connector Choice Drill
        type: fill-in-the-blank
        description: Give 20 sentence pairs where students must choose the correct single
          connector (because OR so; although OR but) and explain why the other is redundant.
        duration: 15
      - name: In Addition To Restructuring
        type: sentence-rewrite
        description: Provide 10 sentences where 'in addition to' is incorrectly followed
          by a clause. Students rewrite using a noun/gerund or restructure with 'moreover'
          /'furthermore.'
        duration: 10
