  phrasal_verbs:
    interference_patterns:
    - pattern: Use of single-word verb where phrasal verb is needed
      example_portuguese: Eu desliguei a TV.
      example_gloss: I turned off the TV.
      example_wrong: I disconnected the TV.
      example_correct: I turned off the TV.
      explanation: Portuguese uses single-word verbs (desligar, ligar, procurar, entregar)
        where English uses phrasal verbs (turn off/on, look up, give up). Portuguese
        speakers often choose a formal single-word equivalent that sounds unnatural or
        overly formal in English, or they avoid the phrasal verb entirely.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of wrong particle in phrasal verbs
      example_portuguese: Eu procurei a palavra.
      example_gloss: I looked up the word.
      example_wrong: I looked for the word.
      example_correct: I looked up the word.
      explanation: Portuguese uses 'procurar' for both 'look for' (search) and 'look up'
        (consult a reference). English distinguishes the meaning through the particle.
        Portuguese speakers choose the wrong particle because their L1 uses one verb for
        both meanings.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Avoidance of separable phrasal verbs with pronoun objects
      example_portuguese: Eu desliguei ela.
      example_gloss: I turned off it.
      example_wrong: I turned off it.
      example_correct: I turned it off.
      explanation: Portuguese places the pronoun after the verb (desliguei ela = turned
        off it). English separable phrasal verbs require the pronoun between the verb
        and particle (turned it off). Portuguese speakers transfer the post-verbal pronoun
        position, producing 'turned off it' instead of 'turned it off.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I disconnected the TV. Correct: I turned off the TV.'
    - 'Wrong: I looked for the word. Correct: I looked up the word.'
    - 'Wrong: I turned off it. Correct: I turned it off.'
    why_it_happens: Portuguese has very few phrasal verb equivalents. Where English uses
      a verb + particle combination (turn off, look up, give up, pick up, find out),
      Portuguese almost always uses a single lexical verb (desligar, procurar, entregar,
      pegar, descobrir). This structural difference means Portuguese speakers have no
      L1 template for phrasal verbs and must learn each one as a separate vocabulary item.
      Additionally, many English phrasal verbs are polysemous through their particles —
      'look for' (search) vs. 'look up' (consult) vs. 'look after' (care for) — while
      Portuguese uses distinct single verbs (procurar, consultar, cuidar). The particle
      system is essentially absent in Portuguese verbal morphology, making it one of the
      most persistent areas of L1 transfer for Portuguese learners of English. The separable
      nature of English phrasal verbs (turn it off vs. turn off the light) adds a further
      word-order complication that has no parallel in Portuguese clitic placement rules.
    teacher_tips:
      how_to_explain: 'Start by showing that English "packages" meaning into verb + particle
        combinations. Write "desligar = turn off" and "procurar = look for/look up" on
        the board. Emphasize that one Portuguese verb may map to multiple English phrasal
        verbs depending on context. For separable phrasal verbs, demonstrate the rule:
        "If the object is a pronoun, it MUST go in the middle: turn IT off, not turn
        off IT."'
      where_to_start: 'Begin with the most common phrasal verbs that have direct single-verb
        Portuguese equivalents: turn off/on (desligar/ligar), give up (entregar/desistir),
        pick up (pegar), find out (descobrir). Then introduce the particle polysemy
        problem: look for/look up/look after/look into.'
      sequencing: 'Week 1: Common phrasal verbs with single-verb Portuguese equivalents.
        Week 2: Particle polysemy (look for vs. look up vs. look after). Week 3: Separable
        vs. inseparable phrasal verbs. Week 4: Pronoun placement with separable phrasal
        verbs. Week 5: Mixed practice and production.'
      exercises:
      - name: Phrasal Verb Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with single-word verbs. Students replace each
          with the correct phrasal verb from a word bank.
        duration: 15
      - name: Particle Discrimination
        type: multiple-choice
        description: Give 20 sentences where students must choose the correct particle
          (for/up/after/into/out/off) to complete the phrasal verb. Each item includes
          a Portuguese gloss to highlight the meaning distinction.
        duration: 15
      - name: Pronoun Placement with Phrasal Verbs
        type: transformation
        description: Provide 10 sentences with full noun objects (e.g., 'Turn off the
          light'). Students rewrite using a pronoun object (e.g., 'Turn it off'). Then
          provide 10 sentences with wrong pronoun placement for error correction.
        duration: 10
