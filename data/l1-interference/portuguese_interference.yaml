    - pattern: Use of simple past where present perfect is needed
      example_portuguese: Eu comi pizza muitas vezes.
      example_gloss: I ate pizza many times.
      example_wrong: I ate pizza many times.
      example_correct: I have eaten pizza many times.
      explanation: Portuguese uses the simple past for experiences without specific
        time. English uses the present perfect for life experiences.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I have eaten yesterday.'' Correct: ''I ate yesterday.'''
    - 'Wrong: ''I ate pizza many times.'' Correct: ''I have eaten pizza many times.'''
    why_it_happens: Portuguese and English have different rules for present perfect
      vs. simple past. Portuguese uses the present perfect (pretérito perfeito) for
      completed past actions, even with specific time markers like 'ontem' (yesterday).
      English uses the simple past with specific past time references. Conversely,
      Portuguese uses the simple past for life experiences, while English uses the
      present perfect.
