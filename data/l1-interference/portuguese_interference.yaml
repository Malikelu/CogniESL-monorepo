  all_most:
    interference_patterns:
    - pattern: Overuse of 'all' where English requires 'most' due to Portuguese todo/todos
      example_portuguese: Todo mundo gosta de chocolate.
      example_gloss: All world likes chocolate.
      example_wrong: All people like chocolate.
      example_correct: Most people like chocolate.
      explanation: Portuguese todo/todos covers the semantic range of both English
        all (100%) and most (majority, ~51-99%). When a Portuguese speaker says
        "todo mundo gosta de chocolate," the intended meaning is usually "most people
        like chocolate" — not literally every person. English requires the speaker
        to choose explicitly between all (universal, 100%) and most (majority, not
        all). Portuguese speakers default to all because todo is their single undifferentiated
        quantifier for both concepts.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'the' in 'most of the' due to Portuguese 'a maioria de'
      example_portuguese: A maioria dos alunos passou.
      example_gloss: The majority of-the students passed.
      example_wrong: Most of students passed.
      example_correct: Most of the students passed.
      explanation: Portuguese "a maioria dos alunos" includes the definite article
        fused with the preposition "de" (dos = de + os). When Portuguese speakers
        translate this structure into English using "most of," they may omit the
        required definite article after "of," producing "most of students" instead
        of "most of the students." This is a structural transfer error where the
        Portuguese contraction "dos" is not recognized as containing a separate
        article that must be expressed independently in English.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: All people like chocolate. Correct: Most people like chocolate.'
    - 'Wrong: Most of students passed. Correct: Most of the students passed.'
    - 'Wrong: All students passed the test. (when meaning most) Correct: Most students
      passed the test.'
    why_it_happens: Portuguese has a single quantifier "todo/toda/todos/todos" that
      covers the entire semantic range from "most" (majority) to "all" (universal).
      There is no obligatory lexical distinction — context disambiguates. English
      forces a binary choice between "most" (not all, majority) and "all" (every,
      100%). Portuguese speakers must learn to make a distinction their L1 does not
      require, leading to overuse of "all" in contexts where "most" is the intended
      meaning. Additionally, the partitive construction "most of the" requires a
      definite article that Portuguese expresses as a fused contraction (dos, das),
      making it invisible to learners who then omit "the" in English.
    teacher_tips:
      how_to_explain: Draw a number line from 0% to 100%. Mark "most" at 51-99% and
        "all" at 100%. Explain that Portuguese "todo" covers the entire 51-100% range,
        but English forces you to pick. Then drill "most of THE" — always needs "the"
        after "of" when referring to a specific group.
      where_to_start: 'Begin with the contrast: most people vs. all people. Use real
        classroom data: "Most students in this class have brown hair" (not all). Then
        introduce the partitive: most of the students (not most of students).'
      sequencing: 'Week 1: All vs. most (semantic distinction). Week 2: Most of the
        vs. most (partitive with article). Week 3: All of the vs. all (partitive).
        Week 4: Mixed practice with error correction.'
      exercises:
      - name: All vs Most Decision
        type: fill-in-the-blank
        description: "Provide 15 sentences describing general truths and statistics. Students choose between all and most based on whether the claim is universal or majority-based."
        duration: 15
      - name: Most Of The Insertion
        type: fill-in-the-blank
        description: "Provide 15 sentences using 'most of ___ (group).' Students must insert the correct definite article (the, these, those, my, our, etc.) after 'of.'"
        duration: 10
      - name: Quantifier Translation
        type: translation
        description: "Give 10 Portuguese sentences using 'todo/todos/a maioria.' Students translate into English, choosing all, most, or most of the as appropriate."
        duration: 15
