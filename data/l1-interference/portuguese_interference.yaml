  verbs_followed_by_ing:
    interference_patterns:
    - pattern: Use of infinitive where gerund is required after verbs of preference
      example_portuguese: Eu gosto de nadar.
      example_gloss: I like of to swim.
      example_wrong: I like to swim. (intended as general preference)
      example_correct: I like swimming.
      explanation: Portuguese uses 'de + infinitivo' after verbs of preference (gostar
        de, adorar, amar, detestar, odiar). English uses the gerund (not the infinitive)
        after like, love, hate, enjoy, prefer for general preferences. Portuguese
        speakers transfer the infinitive pattern directly, producing 'I like to swim'
        when they mean 'I like swimming.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of infinitive after prepositions where gerund is required
      example_portuguese: Eu pensei em ir ao cinema.
      example_gloss: I thought in to-go to-the cinema.
      example_wrong: I thought of to go to the cinema.
      example_correct: I thought of going to the cinema.
      explanation: Portuguese uses prepositions (em, de, a, para) followed by the
        infinitive after verbs like 'pensar em' (think about), 'sonhar com' (dream
        about), 'insistir em' (insist on), 'ter medo de' (be afraid of). English requires
        the gerund after prepositions. Portuguese speakers transfer the preposition
        + infinitive pattern, producing 'I thought of to go' instead of 'I thought
        of going.' This is one of the most persistent errors because Portuguese prepositional
        verb patterns are deeply ingrained and differ systematically from English.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Use of infinitive after 'suggest' and 'recommend' where gerund is required
      example_portuguese: Eu sugiro voce ir embora.
      example_gloss: I suggest you to-go away.
      example_wrong: I suggest you to go. / I suggest to go.
      example_correct: I suggest going. / I suggest that you go.
      explanation: Portuguese 'sugerir' and 'recomendar' can take a bare infinitive
        clause or 'que + subjunctive.' English 'suggest' and 'recommend' cannot take
        'to + infinitive.' They take either a gerund (suggest going) or a that-clause
        with base-form verb (suggest that you go). Portuguese speakers transfer the
        infinitive pattern, producing 'I suggest you to go' or 'I suggest to go.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I like to swim.'' (general preference) Correct: ''I like swimming.'''
    - 'Wrong: ''I thought of to go.'' Correct: ''I thought of going.'''
    - 'Wrong: ''I suggest you to leave.'' Correct: ''I suggest that you leave.'' /
      ''I suggest leaving.'''
    - 'Wrong: ''She insisted on to pay.'' Correct: ''She insisted on paying.'''
    - 'Wrong: ''He is afraid of to fly.'' Correct: ''He is afraid of flying.'''
    why_it_happens: Portuguese and English differ fundamentally in how they handle
      verb complementation. Portuguese uses the infinitive as the default verb complement
      after prepositions and many verbs (gostar de nadar, pensar em ir, ter medo de
      voar). English uses the gerund (not the infinitive) after prepositions and after
      a specific set of verbs (enjoy, avoid, suggest, finish, mind, consider, miss,
      practice, deny, admit, risk, keep, stop). Portuguese speakers must learn that
      English prepositions are ALWAYS followed by the gerund, never the infinitive.
      Additionally, Portuguese 'sugerir/recomendar' allow infinitive complements,
      while English 'suggest/recommend' require either a gerund or a that-clause.
      This is a well-documented Romance-to-Germanic transfer error in contrastive
      analysis literature (Swan & Smith, 2001; Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'Teach the golden rule: After ANY preposition in English, use
        -ING. Write on the board: ''afraid OF flying'' (not ''of to fly''), ''think
        ABOUT going'' (not ''about to go''), ''insist ON paying'' (not ''on to pay'').
        Then teach the gerund-only verb list: enjoy, avoid, suggest, mind, finish,
        consider, miss, practice, deny, admit, risk, keep. Use the memory phrase:
        ''I ENJOY AVOIDING SUGGESTIONS — I never want to FINISH MINDING them.'' For
        suggest/recommend, teach: ''suggest + -ing'' or ''suggest that + base verb''
        — NEVER ''suggest + to.'''
      where_to_start: Begin with the preposition rule (always -ing after prepositions)
        since it is the most general and applies to many contexts. Then introduce
        the gerund-only verb list. Finally, address suggest/recommend as special cases.
      sequencing: 'Week 1: Preposition + gerund rule (afraid of flying, think about
        going, insist on paying). Week 2: Gerund-only verbs (enjoy, avoid, finish,
        mind, suggest). Week 3: Suggest/recommend patterns (gerund or that-clause,
        never infinitive). Week 4: Contrast with verbs that take infinitive (want
        to, need to, plan to). Week 5: Mixed practice with error correction.'
      exercises:
      - name: Preposition + Gerund Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with prepositions followed by a verb in
          parentheses. Students must convert the verb to -ing form. E.g., 'She is
          afraid of (fly) → She is afraid of flying.'
        duration: 15
      - name: Gerund or Infinitive Decision
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose between gerund
          and infinitive after common verbs. Include distractors with prepositions.
          E.g., 'I enjoy (read) → reading' vs 'I want (read) → to read' vs 'I insist
          on (pay) → paying.'
        duration: 20
      - name: Suggest/Recommend Transformation
        type: sentence-rewrite
        description: Give 10 Portuguese sentences with 'sugerir' and 'recomendar.'
          Students rewrite in English using either gerund or that-clause patterns.
          E.g., 'Eu sugiro voce ir' → 'I suggest that you go' / 'I suggest going.'
        duration: 15
      - name: Error Correction - Preposition + Verb
        type: error-correction
        description: Provide a paragraph with 10 errors involving preposition + infinitive
          (Portuguese transfer). Students identify and correct each error. E.g., 'He
          is thinking about to change jobs' → 'He is thinking about changing jobs.'
        duration: 15
