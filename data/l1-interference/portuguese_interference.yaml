  cleft_sentences:
    interference_patterns:
    - Portuguese uses the "É que..." focus construction (e.g. "É o João que fez isso" / "It's John who did this") far more
      broadly than English uses it-clefts. Portuguese speakers overuse it-clefts in English in contexts where a simple declarative
      sentence would be natural, producing overly emphatic or unnatural sentences like "It was yesterday that I went to the
      store" instead of "I went to the store yesterday." Portuguese "É que..." is a neutral focus marker in spoken Portuguese,
      but its English it-cleft equivalent carries strong emphatic/contrastive force that the learner does not intend.
    - Portuguese speakers avoid it-clefts in contexts where English requires them for clear focus and contrast. Because Portuguese
      can mark focus through prosody and word order alone (e.g. "O JOÃO fez isso" with stress on João, or "Fez isso o João"
      with post-verbal subject), learners produce flat simple sentences like "John did it" when the context demands the emphatic
      "It was JOHN who did it." This avoidance pattern is particularly visible in writing where prosodic cues are absent.
    - Portuguese speakers confuse it-clefts with relative clauses because Portuguese relative clause structures (using "que")
      overlap superficially with the "It is... that/who..." cleft frame. This produces errors like "The man that called me
      was my boss" produced as "It was the man that called me was my boss" (double predicate) or "It was the man called me"
      (missing relative pronoun). The Portuguese "É o homem que ligou" maps onto both structures and learners struggle to
      separate them.
    - Portuguese pseudo-clefts using "O que..." (e.g. "O que eu quero é paz" / "What I want is peace") transfer more directly
      to English wh-clefts, but learners produce errors in the copula agreement and complement structure, such as "What I
      wants is peace" (transferring Portuguese verb agreement onto English "what") or "What I want is to peace" (confusing
      noun and infinitive complements under transfer from Portuguese "O que eu quero é a paz" vs "O que eu quero é ter paz").
    why_it_happens: Portuguese has multiple focus-marking strategies that partially overlap with English cleft structures
      but differ in distribution, frequency, and pragmatic force. The Portuguese "É que..." construction is a general-purpose
      focus marker used in everyday speech, while English it-clefts are strongly emphatic/contrastive and used less frequently.
      Portuguese also marks focus through prosodic stress and word-order variation (post-verbal subjects, topicalization),
      strategies unavailable in English writing. The result is a two-way transfer error — overuse of it-clefts (from "É que..."
      transfer) in neutral contexts, and underuse/avoidance of it-clefts in contexts requiring emphatic focus (because Portuguese
      handles this with prosody). The relative clause / cleft confusion arises because both structures use "que" in Portuguese,
      and learners map this single form onto two distinct English structures. These errors persist because Portuguese focus
      strategies are acquired early and operate automatically, and because the "É que..." pattern is one of the most frequent
      spoken Portuguese constructions.
    teacher_tips:
      how_to_explain: Use a three-way contrastive chart showing (1) Portuguese focus strategy (É que..., stress, word order)
        → (2) literal English transfer (often wrong) → (3) correct English form. For it-clefts, emphasize the PRAGMATIC force
        — "It was JOHN who called" implies "not someone else." For relative clause vs cleft confusion, use the deletion test
        — remove "It was... who/that" and see if the remaining clause is complete. If yes, it is a cleft. If no, it may be
        a relative clause. For pseudo-clefts, show that "What X is Y" = "The thing that X is Y" and practice the copula agreement
        (what + plural verb in formal English, singular in informal).
      where_to_start: Start with the overuse pattern since it is the most frequent and visible. Give students 10 Portuguese
        "É que..." sentences and have them decide whether an English it-cleft or a simple sentence is more natural. Then move
        to the avoidance pattern using contrastive focus scenarios. Finally, address the relative clause / cleft confusion
        with the deletion test.
      exercises:
      - name: It-cleft vs simple sentence choice
        type: practice
        description: Provide 15 scenarios where focus/contrast is or is not needed. For each, students decide whether a simple
          sentence or an it-cleft is more natural in English. Include Portuguese "É que..." source sentences to highlight
          the overuse tendency. Example — the Portuguese sentence "É ontem que fui à loja." could prompt the student choice
          "It was yesterday that I went to the store" (overly emphatic) vs "I went to the store yesterday" (natural). Discuss
          when the cleft IS appropriate (contrastive context — "It was YESTERDAY that I went, not today").
        duration: 20
      - name: Focus identification — when to use clefts
        type: practice
        description: Give students 10 short dialogues where one speaker corrects or contradicts another (e.g. Speaker 1 says
          "Mary called" and Speaker 2 responds "No, it was JOHN who called"). Students identify the focus element and write
          the correct it-cleft. Then they rewrite each dialogue without clefts and discuss how the meaning and pragmatics
          changes.
        duration: 15
      - name: Relative clause vs cleft diagnosis
        type: error-correction
        description: Provide 15 sentences mixing relative clauses, it-clefts, and errors from Portuguese transfer (e.g. "It
          was the man that called me was my boss", "It was the man called me", "The man that called me was my boss"). Students
          classify each as (a) correct relative clause, (b) correct cleft, or (c) error, and fix all errors using the deletion
          test.
        duration: 20
      - name: Portuguese-to-English cleft translation
        type: drill
        description: Give 12 Portuguese sentences using "É que..." focus constructions, post-verbal subject focus, and "O
          que..." pseudo-clefts. Students translate each into the most natural English form, choosing between simple sentences,
          it-clefts, and wh-clefts as appropriate. Include "É o João que fez isso", "Foi ontem que cheguei", "O que eu preciso
          é descanso", "Quem ligou foi o Pedro".
        duration: 20
      - name: Pseudo-cleft transformation drill
        type: drill
        description: Give students 10 simple sentences. For each, they write (a) an it-cleft focusing on the subject, (b)
          an it-cleft focusing on the object, (c) a wh-cleft, and (d) a reverse wh-cleft. Example — "Maria bought the book
          yesterday." → (a) "It was Maria who bought the book yesterday." (b) "It was the book that Maria bought yesterday."
          (c) "What Maria bought yesterday was the book." (d) "The book was what Maria bought yesterday." Forces active manipulation
          of all cleft types.
        duration: 20
    examples:
    - 'Wrong: ''It was yesterday that I went to the store.'' (Portuguese: ''É ontem que fui à loja.'' — É que... overtransfer,
      overly emphatic in English) Correct: ''I went to the store yesterday.'' (Use cleft only in contrastive context: ''It
      was YESTERDAY that I went, not today.'')'
    - 'Wrong: ''John called.'' (when context requires contrastive focus; Portuguese: ''O João ligou'' with stress on João)
      Correct: ''It was JOHN who called.'' (not Mary)'
    - 'Wrong: ''It was the man that called me was my boss.'' (double predicate from cleft/relative confusion; Portuguese:
      ''É o homem que ligou que é meu chefe'') Correct: ''The man who called me was my boss.'' (relative clause) OR ''It was
      the man who called me that was my boss.'' (cleft — different meaning)'
    - 'Wrong: ''What I wants is peace.'' (Portuguese: ''O que eu quero é paz.'' — agreement transfer error) Correct: ''What
      I want is peace.'' / ''What I want is to rest.'''
    - 'Wrong: ''It was the book that I bought it yesterday.'' (resumptive pronoun from Portuguese ''Foi o livro que comprei
      ontem'' with clitic climbing) Correct: ''It was the book that I bought yesterday.'''
    sources:
    - 'Squartini, M. (1998). Verbal periphrases in Romance: Aspect, actionality, and grammaticalization. Mouton de Gruyter.
      (Chapter on focus and cleft constructions in Romance — documents the Portuguese É que... focus construction and its
      distribution compared to other Romance languages, providing the structural basis for L1 transfer to English clefts).'
    - 'Azevedo, M. (1996). Portuguese: A linguistic introduction. Cambridge University Press. (Chapter on information structure
      and focus — describes Portuguese focus-marking strategies including É que..., post-verbal subjects, and prosodic stress,
      explaining why Portuguese speakers overuse and underuse English cleft structures).'
    - Mason, M. (1996). The role of ser and estar in the acquisition of English by Portuguese speakers. Hispania, 79(3), 513-524.
      (Documents systematic transfer errors in Portuguese L1 English acquisition including focus construction errors and copula-related
      cleft mistakes).
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents Portuguese L1 transfer errors in English including focus/emphasis structure confusion,
      relative clause errors, and article/copula patterns that interact with cleft sentence production).'
