  passive_voice:
    interference_patterns:
    - pattern: Use of active voice where passive is more natural
      example_portuguese: Falaram com ele.
      example_gloss: They spoke with him.
      example_wrong: They spoke with him.
      example_correct: He was spoken to.
      explanation: Portuguese uses active voice with indefinite subjects. English
        often uses passive voice for the same meaning.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of 'se' passive where English uses 'be + past participle'
      example_portuguese: Vende-se casas.
      example_gloss: Sells houses.
      example_wrong: Houses sell.
      example_correct: Houses are sold.
      explanation: Portuguese uses the reflexive 'se' for passive voice. English uses
        'be + past participle.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''Houses sell.'' Correct: ''Houses are sold.'''
    - 'Wrong: ''They built the house.'' (impersonal) Correct: ''The house was built.'''
    why_it_happens: 'Portuguese has two passive constructions: the reflexive ''se''
      (vende-se = is sold) and the ''ser + past particimento'' (foi construido = was
      built). English uses ''be + past participle'' for all passive constructions.
      Portuguese speakers may use active voice where English prefers passive.'
    teacher_tips:
      how_to_explain: Teach the passive as 'be + past participle.' Show that Portuguese
        'se' = English 'be + past participle.'
      where_to_start: 'Begin with simple passives: ''The house was built, The letter
        was written.'''
      sequencing: 'Week 1: Passive structure (be + past participle). Week 2: Passive
        in different tenses. Week 3: When to use passive vs. active. Week 4: Mixed
        practice.'
