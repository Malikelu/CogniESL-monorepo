  linking_words:
    interference_patterns:
    - pattern: Use of 'but' after 'although'
      example_portuguese: Embora seja tarde, eu vou.
      example_gloss: Although it is late, I go.
      example_wrong: Although it is late, but I go.
      example_correct: Although it is late, I go.
      explanation: Portuguese uses 'embora...mas' together. English never uses 'but'
        after 'although.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Misplacement of 'also' after the verb instead of before it
      example_portuguese: Eu tambem quero.
      example_gloss: I also want.
      example_wrong: I want also.
      example_correct: I also want.
      explanation: Portuguese places 'tambem' after the verb in many constructions
        ('eu quero tambem' = I want also). English places 'also' before the main verb
        (after auxiliary/modals). Portuguese speakers transfer the post-verbal position
        directly, producing 'I want also' instead of 'I also want.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''Although it is late, but I go.'' Correct: ''Although it is late, I
      go.'''
    - 'Wrong: ''I want also.'' Correct: ''I also want.'''
    why_it_happens: Portuguese allows redundant linking words and flexible adverb placement.
      English uses a single connector and requires 'also' before the main verb (after
      auxiliaries). Portuguese speakers add 'but' after 'although' because 'embora...mas'
      is a paired construction in Portuguese. They also place 'also' after the verb because
      'tambem' commonly appears post-verbally in Portuguese ('eu quero tambem'). Both
      patterns reflect direct L1 transfer of word order and connector conventions.
    teacher_tips:
      how_to_explain: 'Teach one connector per clause: although OR but, never both. For also placement: put also BEFORE the main verb (after be and auxiliaries). Drill with I also like vs I like also.'
      where_to_start: Begin with 'although' without 'but,' then introduce 'also' placement
        with simple present/past sentences.
      sequencing: 'Week 1: Single connectors (although/but). Week 2: ''Also'' placement
        before main verb. Week 3: Combined practice with both patterns. Week 4: Mixed
        linking word exercises.'
      exercises:
      - name: Linking Word Error Correction
        type: error-correction
        description: Provide 10 sentences with redundant connectors. Students correct
          them.
        duration: 15
      - name: Also Placement Drill
        type: sentence-rewrite
        description: Give 10 Portuguese sentences with post-verbal 'tambem.' Students
          rewrite in correct English word order with 'also' before the main verb.
        duration: 15
