  advanced_tense_usage:
    interference_patterns:
    - Portuguese speakers overuse the present perfect (have + past participle) in contexts where English requires the simple
      past, especially with definite past time markers. Portuguese 'pretérito perfeito composto' (tem + past participle) and
      the simple preterite (pretérito perfeito simples) both map onto a single past domain, and Portuguese speakers frequently
      produce 'I have eaten yesterday,' 'I have seen him last week,' 'She has arrived yesterday' — transferring the Portuguese
      pattern where the compound past can co-occur with definite past time reference. English strictly forbids present perfect
      with definite past time markers (yesterday, last week, in 2010).
    - Portuguese speakers overuse the present progressive for habitual and stative situations because Portuguese uses the
      progressive periphrases 'estar a + infinitive' (European) or 'estar + gerund' (Brazilian) more broadly than English
      uses 'be + -ing.' Errors include 'I am living here for 5 years' (instead of 'I have lived here for 5 years'), 'She is
      knowing the answer' (instead of 'She knows the answer'), and 'I am liking this' (instead of 'I like this'). Portuguese
      allows progressive marking on stative verbs and in durative contexts where English requires simple present or present
      perfect.
    - Portuguese speakers confuse 'since' and 'for' in present perfect constructions because Portuguese uses 'há' for both
      duration and point-of-origin meanings. Portuguese 'Eu moro aqui há 5 anos' (I live here há 5 years) and 'Eu moro aqui
      há 2015' (I live here há 2015) both use 'há,' leading to errors like 'I live here since 5 years' (instead of 'I have
      lived here for 5 years') and 'I have lived here for 2015' (instead of 'I have lived here since 2015'). The since/for
      distinction does not exist in Portuguese temporal expressions.
    - Portuguese speakers underuse the past perfect (had + past participle) because Portuguese expresses past-before-past
      through the pluperfect (pretérito mais-que-perfeito) or through contextual/adverbial cues rather than through a dedicated
      tense form. Portuguese speakers produce 'When I arrived, he left' instead of 'When I arrived, he had left' because Portuguese
      'Quando cheguei, ele saiu' is the natural form — the sequence of events is inferred from context rather than marked
      by a distinct tense. This leads to ambiguity in English narratives where the past perfect is required to disambiguate
      event ordering.
    why_it_happens: Portuguese has a fundamentally different tense-aspect system from English. Portuguese has a single simple
      preterite (pretérito perfeito simples) that covers most past meanings, a compound present perfect (pretérito perfeito
      composto) that is used differently from English (it can co-occur with definite past time markers and often expresses
      habitual/repeated action rather than completed action with present relevance), and a pluperfect (pretérito mais-que-perfeito)
      that is used far less frequently than English past perfect because Portuguese relies on adverbial and contextual cues
      for temporal sequencing. Portuguese progressive periphrases (estar a + infinitive in European Portuguese, estar + gerund
      in Brazilian Portuguese) are used more broadly than English progressive, including with stative verbs and in durative/habitual
      contexts. Portuguese temporal expressions use 'há' for both point-of-origin and duration meanings, with no since/for
      distinction. These deeply automatized L1 patterns transfer systematically to English, producing the four major error
      types above. The errors are highly persistent because the Portuguese tense-aspect system is acquired in early childhood
      and operates automatically, and because Portuguese does not provide the same grammaticalized tense-aspect distinctions
      that English requires.
    teacher_tips:
      how_to_explain: 'Use a three-part contrastive framework: (1) Present Perfect vs Simple Past — show that English present
        perfect CANNOT co-occur with definite past time markers (yesterday, last week, in 2010) while Portuguese compound
        past CAN. Use a timeline diagram showing "indefinite past with present relevance" (English present perfect) vs "definite
        past" (English simple past). (2) Progressive overuse — show that English progressive is restricted to dynamic verbs
        and temporary/ongoing situations, while Portuguese progressive extends to statives and habituals. Use the "stative
        verb test" — if the verb describes a state (know, like, believe, own, belong), it cannot take -ing in English. (3)
        Since vs For — teach that since = point in time (since 2015, since Monday, since I arrived), for = duration (for 5
        years, for a long time, for two hours). Show that Portuguese ''há'' covers both. (4) Past Perfect — use narrative
        timelines showing Event A (past perfect) happening before Event B (simple past). Show that Portuguese relies on context/adverbs
        while English grammaticalizes the sequence.'
      where_to_start: Start with the present perfect vs simple past distinction since it is the most frequent and most communicatively
        damaging error. Use the "NO YESTERDAY" rule — if the sentence has a definite past time marker, it CANNOT be present
        perfect. Then move to progressive overuse with stative verbs (the most visible error). Then address since/for confusion.
        Finally, teach past perfect for narrative sequencing.
      exercises:
      - name: Present perfect vs simple past — time marker sorting
        type: drill
        description: 'Provide 20 sentences with the verb removed. Each sentence includes a time marker. Students must decide:
          (a) if the time marker is definite past (yesterday, last week, in 2010, two days ago) → simple past, or (b) if it
          is indefinite/relevant to now (already, yet, ever, never, just, recently, so far) → present perfect. Then they conjugate
          the verb accordingly. Include Portuguese translations to show why the error happens (e.g. ''Eu comi ontem'' → ''I
          ate yesterday'' NOT ''I have eaten yesterday'').'
        duration: 20
      - name: Stative verb detection — progressive or simple?
        type: error-correction
        description: Provide 15 sentences with Portuguese-style progressive overuse errors on stative verbs (e.g. 'I am knowing
          the answer,' 'She is believing in God,' 'He is owning a car,' 'They are liking the movie,' 'I am having two sisters').
          Students identify the stative verb, explain why it cannot take -ing in English, and rewrite with the correct simple
          present form. Include a reference list of common stative verbs (know, believe, own, belong, like, love, hate, want,
          need, prefer, understand, remember, forget, seem, appear, contain, consist, depend, mean, involve).
        duration: 15
      - name: Since vs For — temporal expression repair
        type: drill
        description: Provide 15 sentences with since/for errors from Portuguese transfer (e.g. 'I live here since 5 years,'
          'I have studied English for 2015,' 'She has been waiting since three hours,' 'They have known each other for last
          year'). Students identify whether the expression refers to a point in time (since) or a duration (for) and correct
          the sentence. Include Portuguese translations showing 'há' in both contexts.
        duration: 15
      - name: Past perfect narrative sequencing
        type: practice
        description: Give students 10 pairs of past events presented in chronological order (e.g. 'The train left. Then I
          arrived at the station.'). Students must combine each pair into a single sentence using past perfect for the earlier
          event and simple past for the later event (e.g. 'When I arrived at the station, the train had already left.'). Then
          provide 5 Portuguese sentences using simple past for both events (e.g. 'Quando cheguei à estação, o trem já saiu')
          and have students translate, consciously applying past perfect to the earlier event.
        duration: 20
      - name: Comprehensive tense transformation — Portuguese to English
        type: drill
        description: 'Give students 15 Portuguese sentences specifically designed to trigger all four tense error types: (1)
          compound past with definite time markers (''Eu jantei ontem'' → ''I ate yesterday'' NOT ''I have eaten yesterday''),
          (2) progressive with stative verbs (''Eu estou sabendo a resposta'' → ''I know the answer''), (3) há with duration/point
          confusion (''Eu moro aqui há 5 anos'' → ''I have lived here for 5 years''), (4) past-before-past without pluperfect
          (''Quando cheguei, ele saiu'' → ''When I arrived, he had left''). Students translate each, then self-check against
          the four error types.'
        duration: 25
    examples:
    - 'Wrong: ''I have eaten yesterday.'' (Portuguese: ''Eu comi ontem'' — simple preterite with definite past marker is natural
      in Portuguese; Portuguese compound past ''Eu tenho comido'' can also co-occur with definite time markers) Correct: ''I
      ate yesterday.'' Rule: English present perfect CANNOT co-occur with definite past time markers.'
    - 'Wrong: ''I am living here for 5 years.'' (Portuguese: ''Eu estou morando aqui há 5 anos'' — progressive periphrase
      with durative meaning is natural in Portuguese) Correct: ''I have lived here for 5 years.'' Rule: English present perfect
      (not progressive) is used for duration from past to present.'
    - 'Wrong: ''She is knowing the answer.'' (Portuguese: ''Ela está sabendo a resposta'' — progressive with stative verb
      is acceptable in Brazilian Portuguese) Correct: ''She knows the answer.'' Rule: Stative verbs (know, believe, own, like)
      cannot take -ing in English.'
    - 'Wrong: ''I live here since 5 years.'' (Portuguese: ''Eu moro aqui há 5 anos'' — ''há'' covers both since and for meanings)
      Correct: ''I have lived here for 5 years.'' Rule: ''for'' = duration, ''since'' = point in time. Portuguese ''há'' =
      both.'
    - 'Wrong: ''When I arrived, he left.'' (Portuguese: ''Quando cheguei, ele saiu'' — both in simple preterite; sequence
      inferred from context) Correct: ''When I arrived, he had left.'' Rule: English uses past perfect to mark the earlier
      event in a two-past-event sequence.'
    - 'Wrong: ''I have seen him last week.'' (Portuguese: ''Eu o vi semana passada'' or ''Eu tenho visto ele semana passada''
      — both are possible in Portuguese) Correct: ''I saw him last week.'' Rule: definite past time marker (last week) requires
      simple past in English.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents tense-aspect transfer errors including present perfect overuse with definite
      past time markers, progressive overuse with stative verbs, since/for confusion from Portuguese há, and past perfect
      underuse in narrative sequencing).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on tense and aspect
      — describes the Portuguese tense-aspect system including the simple preterite, compound present perfect with habitual/repeated
      action meaning, pluperfect rarity, and progressive periphrases estar a + infinitive and estar + gerund, explaining the
      structural basis for L1 transfer to English tense-aspect).'
    - 'Squartini, M. (1998). Verbal Periphrases in Romance: Aspect, Actionality, and Grammaticalization. Mouton de Gruyter.
      (Chapter on Portuguese — documents the broader distribution of Portuguese progressive periphrases compared to English,
      including use with stative verbs and in durative/habitual contexts, and the Portuguese compound perfect periphrasis
      that differs from English present perfect in allowing definite past time co-occurrence).'
