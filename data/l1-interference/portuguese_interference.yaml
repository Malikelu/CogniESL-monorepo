  conditionals_advanced:
    interference_patterns:
    - pattern: Use of present tense in hypothetical conditionals
      example_portuguese: Se eu tivesse dinheiro, eu viajaria.
      example_gloss: If I had money, I would travel.
      example_wrong: If I have money, I will travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (tivesse) in hypothetical
        conditionals. English uses the past simple (had) in the if-clause and 'would'
        in the main clause. Portuguese speakers may default to the present tense (first
        conditional structure) when expressing hypotheticals, producing "If I have...,
        I will..." instead of "If I had..., I would..."
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'would' in the if-clause of second conditional
      example_portuguese: Se eu tivesse dinheiro, eu viajaria.
      example_gloss: If I had money, I would travel.
      example_wrong: If I would have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese uses the imperfect subjunctive in the if-clause and
        the conditional tense in the main clause (se eu tivesse... eu viajaria). Because
        the Portuguese conditional form resembles English 'would,' Portuguese speakers
        may transfer 'would' into the if-clause, producing the ungrammatical "If I
        would have..." This error is documented in contrastive analyses of Portuguese
        and English conditional systems (Swan & Smith, 2001; Azevedo, 1996).
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''If I have money, I will travel.'' (hypothetical) Correct: ''If I had
      money, I would travel.'''
    - 'Wrong: ''If I would have more time, I would study more.'' Correct: ''If I had
      more time, I would study more.'''
    - 'Wrong: ''If she would be here, she would help.'' Correct: ''If she were here,
      she would help.'''
    why_it_happens: 'Portuguese has a dedicated subjunctive mood (imperfect subjunctive:
      tivesse, fosse, fizesse) for hypothetical conditionals, paired with the conditional
      tense (viasejaria, faria) in the main clause. English has no subjunctive equivalent
      in this context and instead uses the past simple in the if-clause and ''would''
      in the main clause. Two transfer errors result: (1) Portuguese speakers use
      the present tense (first conditional) for hypotheticals because the Portuguese
      subjunctive form does not resemble the English past tense; (2) Portuguese speakers
      insert ''would'' in the if-clause because the Portuguese conditional tense in
      the main clause resembles English ''would,'' and they extend it to the if-clause
      by analogy. Both patterns are documented in Swan & Smith (2001) and Azevedo
      (1996).'
    teacher_tips:
      how_to_explain: 'Teach the second conditional: ''If I had..., I would...'' for
        hypothetical situations. The past tense does not refer to the past; it refers
        to an unreal present/future. Emphasize: ''would'' NEVER goes in the if-clause.
        Only in the main clause. Write the formula on the board: If + past simple,
        would + base verb.'
      where_to_start: 'Begin with simple hypotheticals: ''If I had a million dollars,
        I would travel the world.'' Then introduce the ''would'' in if-clause error
        explicitly: show ''If I would have...'' is always wrong.'
      sequencing: 'Week 1: Second conditional structure (If + past, would + base).
        Week 2: Hypothetical vs. real conditions (second vs. first conditional). Week
        3: The ''would'' in if-clause error — explicit correction. Week 4: Mixed conditionals
        and practice.'
      exercises:
      - name: Second Conditional Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with hypothetical scenarios. Students fill
          in the if-clause with past simple and the main clause with 'would' + base
          verb.
        duration: 15
      - name: Would in If-Clause Error Correction
        type: error-correction
        description: Provide 10 sentences where 'would' incorrectly appears in the
          if-clause. Students identify the error and rewrite using past simple in
          the if-clause.
        duration: 15
      - name: Hypothetical vs Real Conditional Sort
        type: matching
        description: Give 20 if-sentences. Students classify each as real (first conditional)
          or hypothetical (second conditional) and rewrite any errors.
        duration: 15
