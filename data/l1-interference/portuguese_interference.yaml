    notes: 'Portuguese has 243 GPs total. This entry covers the articles grammar point (slug: articles). Three independent
      sources: peer-reviewed experimental study (Tryzna 2009), contrastive teaching reference (Swan & Smith 2001), and structural
      linguistics reference (Azevedo 1996). Patterns cover omission (professions, bare nouns), overuse (days, body parts,
      languages, generics), a/an confusion, and bare singular noun transfer — the complete set of article error types documented
      for Portuguese L1 speakers. This entry is complementary to a_an_the which covers the same grammar domain with additional
      depth on specific sub-patterns.'
  as_long_as:
    interference_patterns:
    - Portuguese speakers confuse the conditional use of "as long as" (= provided that / on the condition that) with the temporal/duration
      use (= for the length of time), because Portuguese uses different structures for these two meanings. Portuguese "enquanto"
      covers both temporal duration and conditional meaning in a single form, leading Portuguese speakers to use "as long
      as" in temporal contexts where English requires "while" or "for." Errors include "As long as I was studying, the phone
      rang" (meaning "While I was studying") and "I read as long as two hours" (meaning "I read for two hours"). The Portuguese
      "enquanta" / "enquanto" maps onto both English "while" (temporal) and "as long as" (conditional), creating systematic
      confusion between the two English forms.
    - Portuguese speakers use "as long as" with a future tense in the subordinate clause because Portuguese allows present/future
      subjunctive after temporal/conditional conjunctions. Portuguese "enquanto eu estudar" (subjunctive future) transfers
      to "as long as I will study" instead of the correct "as long as I study." This error is parallel to the well-documented
      "if I will" error and reflects the Portuguese subjunctive system where future reference in subordinate clauses requires
      the subjunctive mood, not the indicative. Portuguese speakers perceive the English present tense after "as long as"
      as insufficiently future-marked and insert "will."
    - Portuguese speakers underuse "as long as" in conditional contexts, replacing it with "if" because Portuguese "se" (if)
      covers both conditional meanings. Portuguese does not have a single-word equivalent of the positive-condition nuance
      of "as long as" — Portuguese speakers must use periphrastic structures like "desde que" or "contanto que" (provided
      that). Since these are more formal and less frequent in everyday Portuguese, learners default to "if" in all conditional
      contexts, losing the positive-condition nuance. This produces errors like "If you study, you will pass" (neutral) when
      the intended meaning is "As long as you study, you will pass" (positive condition — the only requirement).
    why_it_happens: Portuguese has a structural split that English does not — Portuguese uses "enquanto" as a single form
      covering both temporal duration ("while") and conditional ("as long as" / "provided that") meanings, while English requires
      two distinct forms. This many-to-one mapping (Portuguese "enquanto" → English "while" OR "as long as") causes Portuguese
      speakers to overextend "as long as" into temporal contexts. Additionally, Portuguese "se" (if) is the default conditional
      conjunction and covers the semantic space that English splits between "if" (neutral condition) and "as long as" (positive
      condition). Portuguese lacks a high-frequency, neutral-register single-word equivalent of "as long as" — "desde que"
      and "contanto que" exist but are more formal. The result is (1) confusion between conditional and temporal uses of "as
      long as," (2) future tense insertion after "as long as" from Portuguese subjunctive transfer, and (3) underuse of "as
      long as" in favor of "if." These errors are moderately persistent because the Portuguese conjunction system is deeply
      automatized, but the conditional/temporal distinction is teachable through explicit contrastive instruction.
    teacher_tips:
      how_to_explain: Use a two-column contrastive chart showing Portuguese "enquanto" splitting into English "while" (temporal)
        and "as long as" (conditional). For each Portuguese sentence, show both possible English translations and explain
        how context determines which is correct. For the "if" vs "as long as" distinction, explain that "as long as" means
        "if and only if" (positive condition — the one thing needed). For the future tense error, group it with the "if I
        will" error and teach the rule — no "will" after conditional/temporal conjunctions (if, unless, as long as, when,
        before, after).
      where_to_start: Start with the conditional vs temporal distinction since it is the most frequent and most confusing
        error. Use the "enquanto test" — if you can replace "as long as" with "while" and the sentence still makes sense,
        it is temporal and should use "while," not "as long as." Then move to the "if" vs "as long as" distinction. Finally,
        address the future tense error as part of the broader "no will after conjunctions" rule.
      exercises:
      - name: Conditional vs Temporal — as long as or while?
        type: practice
        description: Provide 20 sentences with the conjunction removed. Students must decide whether each sentence requires
          "as long as" (conditional) or "while" (temporal) and insert the correct form. Include ambiguous cases where context
          determines the meaning. Examples — "___ I was cooking, the phone rang" (while) vs "___ you cook, I will clean" (as
          long as). Discuss ambiguous cases as a class.
        duration: 15
      - name: Portuguese-to-English conjunction translation
        type: drill
        description: Give 15 Portuguese sentences using "enquanto" in both temporal and conditional contexts (e.g. "Enquanto
          eu estudava, ele chegou" / "Enquanto você estudar, você passa" / "Enquanto você estiver aqui, me ajude"). Students
          translate each, choosing the correct English conjunction (while, as long as, since). Discuss which Portuguese meaning
          maps to which English form.
        duration: 15
      - name: Error correction — as long as overuse and misuse
        type: error-correction
        description: Provide 15 sentences with Portuguese-style "as long as" errors including temporal overuse ("As long as
          I was sleeping, someone knocked"), future tense insertion ("As long as you will study, you will pass"), and "if"
          replacement ("If you water the plants, they grow" when positive-condition meaning is intended). Students identify
          the error type and correct each sentence.
        duration: 15
      - name: If vs As Long As — positive condition nuance
        type: practice
        description: Give students 10 scenarios. For each, they write two sentences — one with "if" (neutral condition) and
          one with "as long as" (positive condition). Discuss the difference in meaning. Example scenario — borrowing your
          friend's car. If version — "If you fill the tank, you can borrow my car." As long as version — "As long as you fill
          the tank, you can borrow my car." (The as long as version emphasizes that filling the tank is the only requirement.)
        duration: 15
      - name: Conjunction tense rule — no will after as long as
        type: drill
        description: Provide 15 sentences with "will" incorrectly used after "as long as" (e.g. "As long as it will rain,
          we will stay inside"). Students remove "will" and use present simple. Group this with parallel errors after "if,"
          "when," "before," "after," and "unless" to reinforce the general rule about future meaning in subordinate clauses.
        duration: 10
    examples:
    - 'Wrong: ''As long as I was studying, the phone rang.'' (Portuguese: ''Enquanto eu estudava, o telefone tocou.'' — temporal
      use of enquanto) Correct: ''While I was studying, the phone rang.'' (NOT as long as — this is temporal, not conditional)'
    - 'Wrong: ''As long as you will study, you will pass.'' (Portuguese: ''Enquanto você estudar, você passa.'' — subjunctive
      future in subordinate clause) Correct: ''As long as you study, you will pass.'' (No will after as long as — use present
      simple for future meaning)'
    - 'Wrong: ''If you water the plants every day, they will grow.'' (when positive-condition meaning is intended) Portuguese:
      ''Se você regar as plantas todos os dias, elas vão crescer.'' — se covers both if and as long as Correct: ''As long
      as you water the plants every day, they will grow.'' (Emphasizes that watering is the only requirement — positive condition)'
    - 'Wrong: ''I waited as long as three hours.'' (Portuguese: ''Esperei por três horas.'' — duration with por) Correct:
      ''I waited for three hours.'' (NOT as long as — use for + time period for duration, not as long as)'
    - 'Correct (conditional): ''As long as you arrive on time, we will leave.'' (Portuguese: ''Desde que você chegue a tempo,
      nós sairemos.'')'
    - 'Correct (temporal — use while): ''While I was cooking, the phone rang.'' (Portuguese: ''Enquanto eu cozinhava, o telefone
      tocou.'')'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents conjunction transfer errors including enquanto → as long as/while confusion,
      conditional conjunction overgeneralization from se, and tense errors in subordinate clauses).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on conjunctions and
      subordinate clauses — describes the Portuguese enquanto system covering both temporal and conditional meanings, the
      se conditional system, and the subjunctive mood in temporal/conditional subordinate clauses, explaining the structural
      basis for L1 transfer to English conjunction usage).'
