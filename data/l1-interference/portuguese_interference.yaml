    notes: Portuguese conjunctions vs. English conjunctions. Covers (1) 'e' overuse
      as default connector replacing 'but', (2) 'porque'/'então' asymmetry with 'because'/'so',
      (3) 'ou' in negatives vs. English 'or' replacing 'and' in negatives. All three
      patterns documented in Swan & Smith (2001) and Parrott (2000).
    source_rank: 1
