language: portuguese
grammar_points:
  adjectives_without_nouns:
    interference_patterns:
    - pattern: Omission of 'one/ones' after adjectives
      example_portuguese: Eu quero o vermelho.
      example_gloss: I want the red.
      example_wrong: I want the red.
      example_correct: I want the red one.
      explanation: Portuguese allows adjectives to stand alone as nouns with an article
        (o vermelho = the red one). English requires 'one/ones' after adjectives when
        the noun is omitted.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'one/ones' after comparative and superlative adjectives
      example_portuguese: Eu quero o maior.
      example_gloss: I want the biggest.
      example_wrong: I want the biggest.
      example_correct: I want the biggest one.
      explanation: Portuguese allows comparative and superlative adjectives to stand
        alone with a definite article (o maior = the biggest one, a melhor = the best
        one). English requires 'one' after the superlative adjective when the noun
        is omitted. This error persists even at intermediate levels because the Portuguese
        structure is deeply ingrained.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: ''I want the red.'' Correct: ''I want the red one.'''
    - 'Wrong: ''Which do you prefer? The big.'' Correct: ''The big one.'''
    why_it_happens: 'Portuguese allows adjectives to function as nouns when preceded
      by a definite article: ''o vermelho'' (the red one), ''os grandes'' (the big
      ones). The article + adjective combination replaces the noun entirely. English
      requires the pronoun ''one'' (singular) or ''ones'' (plural) after the adjective:
      ''the red one,'' ''the big ones.'' Portuguese speakers omit ''one/ones'' because
      their L1 does not need them.'
    teacher_tips:
      how_to_explain: 'Write ''o vermelho'' on the board. Ask: ''The red what? We
        need a word: ONE. The red ONE.'' Drill with classroom objects: ''the blue
        one, the small one, the cheap ones.'''
      where_to_start: 'Begin with concrete objects. Hold up two pens: ''I want the
        blue one.'' ''I want the red one.'''
      sequencing: 'Week 1: ''one'' after adjectives (singular). Week 2: ''ones'' after
        adjectives (plural). Week 3: ''one/ones'' with demonstratives. Week 4: Mixed
        practice.'
      exercises:
      - name: One Ones Insertion
        type: fill-in-the-blank
        description: Provide 15 sentences where students must insert 'one' or 'ones'
          after adjectives.
        duration: 15
      - name: Adjective Pronoun Drill
        type: matching
        description: Give 10 Portuguese sentences with standalone adjectives. Students
          translate, adding 'one/ones.'
        duration: 15
    sources: &id001
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
