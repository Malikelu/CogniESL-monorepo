    notes: 'Portuguese has 243 GPs total. This entry covers the countable_uncountable grammar
      point. Two independent sources: contrastive teaching reference (Swan & Smith 2001) and
      structural linguistics reference (Azevedo 1996). Patterns cover (1) pluralization of
      English uncountable nouns that are countable in Portuguese (informations, advices,
      furnitures, knowledges), (2) many/much quantifier confusion from Portuguese muito that
      does not distinguish countability, (3) phonological transfer producing plural -s on
      uncountable nouns. Frequency is 5 (very high -- uncountable nouns are ubiquitous in
      academic and professional English) and persistence is 4 (high -- the Portuguese patterns
      are semantically motivated and deeply automatized). This entry is closely related to
