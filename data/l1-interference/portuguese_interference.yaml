  prepositions_of_time:
    interference_patterns:
    - pattern: Use of 'em' where English uses 'on' for days
      example_portuguese: Eu trabalho na segunda-feira.
      example_gloss: I work in-the Monday.
      example_wrong: I work in Monday.
      example_correct: I work on Monday.
      explanation: Portuguese 'em' (in) contracts with articles to form 'na/no'
        and is used with days of the week. English uses 'on' for days. Portuguese
        speakers transfer 'em' as 'in.'
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of 'em' where English uses 'at' for clock times
      example_portuguese: Eu cheguei as 3 horas.
      example_gloss: I arrived at-the 3 hours.
      example_wrong: I arrived in 3 hours.
      example_correct: I arrived at 3 o'clock.
      explanation: Portuguese 'a/as' (at) is used with specific clock times. English
        uses 'at.' Portuguese speakers may transfer 'em' (in) instead.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Insertion of 'in' before 'next,' 'last,' 'this,' 'every'
      example_portuguese: Na proxima semana vou viajar.
      example_gloss: In-the next week I will travel.
      example_wrong: In next week I will travel.
      example_correct: Next week I will travel.
      explanation: Portuguese uses 'em' (in) + article before time words like 'proxima'
        (next), 'passada' (last), 'esta' (this). English uses these time words alone
        without any preposition. Portuguese speakers insert 'in' before 'next,'
        'last,' 'this,' and 'every' when referring to time.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: ''I work in Monday.'' Correct: ''I work on Monday.'''
    - 'Wrong: ''I arrived in 3 hours.'' Correct: ''I arrived at 3 o''clock.'''
    - 'Wrong: ''In next week I will travel.'' Correct: ''Next week I will travel.'''
    why_it_happens: Portuguese uses the preposition 'em' (in) for a wide range of
      time expressions where English uses 'on' (days), 'at' (specific times), and
      'in' (months, years, seasons). Portuguese speakers transfer the 'em' pattern
      broadly. Additionally, Portuguese requires a preposition before time words
      like 'proxima' (next) and 'passada' (last), forming 'na proxima semana' (in
      the next week). English uses these time words without any preposition (next week,
      last year). Portuguese speakers insert 'in' before these time words because
      their L1 requires it.
    teacher_tips:
      how_to_explain: 'Teach: ''on'' = days (on Monday), ''at'' = specific times (at
        3 o''clock), ''in'' = months/years/seasons (in January, in 2020, in summer).
        Portuguese ''em'' covers all these. Also teach: ''next, last, this, every''
        do NOT take a preposition in English. ''Next week,'' not ''in next week.'''
      where_to_start: 'Begin with days of the week: on Monday, on Tuesday.'
      sequencing: 'Week 1: ''On'' for days. Week 2: ''At'' for times. Week 3: ''In''
        for months/years. Week 4: No preposition with next/last/this/every. Week 5:
        Mixed practice.'
      exercises:
      - name: Time Preposition Drill
        type: fill-in-the-blank
        description: Provide 20 sentences. Students choose between 'in,' 'on,' and
          'at.'
        duration: 15
      - name: Next Last This Every Preposition Deletion
        type: error-correction
        description: Provide 15 sentences where students must remove the unnecessary
          preposition before 'next,' 'last,' 'this,' and 'every' (e.g., 'In next
          week we have a test' -> 'Next week we have a test').
        duration: 15
