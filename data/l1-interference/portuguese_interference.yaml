  conditionals_overview:
    interference_patterns:
    - pattern: Use of present tense (first conditional) for hypothetical situations
      example_portuguese: Se eu tivesse tempo, eu viajaria.
      example_gloss: If I had time, I would travel.
      example_wrong: If I have time, I will travel.
      example_correct: If I had time, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (tivesse) for hypothetical
        conditionals, which has no formal equivalent in English. English uses the
        past simple (had) in the if-clause to signal hypothetical meaning. Portuguese
        speakers often default to the present tense (first conditional) for hypotheticals
        because the Portuguese subjunctive form does not resemble the English past
        tense, making the mapping non-transparent. This error is documented in Swan
        & Smith (2001) and Azevedo (1996).
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Use of 'would' in the if-clause of second conditional
      example_portuguese: Se eu tivesse dinheiro, eu viajaria.
      example_gloss: If I had money, I would travel.
      example_wrong: If I would have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese uses the conditional tense (viajaria) in the main clause
        of hypothetical conditionals. Because this form resembles English 'would,'
        Portuguese speakers extend it by analogy into the if-clause, producing the
        ungrammatical 'If I would have...' English never uses 'would' in the if-clause
        of a conditional. This transfer error is documented in Swan & Smith (2001)
        and Azevedo (1996).
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''If I have time, I will travel.'' (hypothetical) Correct: ''If I had
      time, I would travel.'''
    - 'Wrong: ''If I would have more money, I would buy a car.'' Correct: ''If I had
      more money, I would buy a car.'''
    - 'Wrong: ''If she would be here, she would help us.'' Correct: ''If she were
      here, she would help us.'''
    why_it_happens: 'Portuguese has a dedicated subjunctive mood (imperfect subjunctive:
      tivesse, fosse, fizesse) for hypothetical conditionals, paired with the conditional
      tense (viajaria, faria) in the main clause. English has no equivalent subjunctive
      form and instead uses the past simple in the if-clause and ''would'' in the
      main clause. Two transfer errors result: (1) Portuguese speakers use the present
      tense (first conditional) for hypotheticals because the Portuguese subjunctive
      form does not resemble the English past tense; (2) Portuguese speakers insert
      ''would'' in the if-clause because the Portuguese conditional tense in the main
      clause resembles English ''would,'' and they extend it to the if-clause by analogy.
      Both patterns are documented in Swan & Smith (2001) and Azevedo (1996).'
    teacher_tips:
      how_to_explain: 'Teach the three main conditionals explicitly: zero (If + present,
        present), first (If + present, will + base), second (If + past simple, would
        + base). Emphasize that the past tense in the second conditional does NOT
        refer to the past — it signals unreality. Write the formula on the board and
        keep it visible: If + past simple | would + base verb. For the ''would'' in
        if-clause error, drill: ''would'' NEVER goes in the if-clause. Only in the
        main clause.'
      where_to_start: Begin with zero and first conditionals (real/likely conditions)
        to establish the basic if-then structure. Then introduce the second conditional
        as the ''unreal'' conditional, contrasting it explicitly with the first.
      sequencing: 'Week 1: Zero and first conditionals (real conditions). Week 2:
        Second conditional (hypothetical present/future) — structure and meaning.
        Week 3: Explicit contrast — first vs. second conditional (real vs. unreal).
        Address the ''would'' in if-clause error directly. Week 4: Third conditional
        (past hypothetical). Week 5: Mixed conditionals and error correction.'
      exercises:
      - name: Conditional Type Decision
        type: fill-in-the-blank
        description: Provide 20 sentences with mixed conditional types. Students choose
          the correct conditional type and fill in the correct verb forms.
        duration: 15
      - name: Would in If-Clause Error Correction
        type: error-correction
        description: Provide 10 sentences where 'would' incorrectly appears in the
          if-clause. Students identify the error and rewrite using past simple in
          the if-clause.
        duration: 15
      - name: Real vs Hypothetical Conditional Sort
        type: matching
        description: Give 20 if-sentences. Students classify each as real (first conditional)
          or hypothetical (second conditional) and rewrite any errors.
        duration: 15
