  subject_verb_agreement:
    interference_patterns:
    - pattern: Omission of third-person -s
      example_portuguese: Ele trabalha muito.
      example_gloss: He works much.
      example_wrong: He work a lot.
      example_correct: He works a lot.
      explanation: Portuguese verb conjugation marks person/number on every form (eu trabalho, ele trabalha, nós trabalhamos), so the third-person marker is deeply internalized. However, English requires -s/-es on third-person singular only, and Portuguese speakers often omit it because the subject pronoun already identifies the person, making the verbal suffix feel redundant. This is one of the most persistent errors in Portuguese-speaking learners of English.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Collective noun agreement — plural verb with collective subjects
      example_portuguese: O time jogaram bem.
      example_gloss: The team played-3PL well.
      example_wrong: The team play well.
      example_correct: The team plays well.
      explanation: In Portuguese, collective nouns (time, governo, equipe) frequently take plural verb forms when the group acts as individuals (o time jogaram = the team played-3PL). English requires singular agreement with collective nouns in American English (the team plays). Portuguese speakers transfer the plural agreement pattern, producing 'the team play' or 'the government decide.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: He work a lot. Correct: He works a lot.'
    - 'Wrong: The team play well. Correct: The team plays well.'
    why_it_happens: Portuguese verb conjugation marks person and number on every form (eu falo, ele fala, nós falamos), so the concept of subject-verb agreement exists in the L1. However, English agreement is reduced to a single marker (-s/-es) on third-person singular only, which Portuguese speakers frequently omit because the subject pronoun already identifies the person. The -s suffix carries low perceptual salience and is often dropped in spontaneous speech (Celce-Murcia & Larsen-Freeman, 2015). Additionally, Portuguese allows plural verbs with collective nouns (o time jogaram = the team played-3PL), while American English requires singular agreement (the team plays). This difference in collective noun agreement transfers directly, producing errors like 'the team play' or 'the government decide' (Swan & Smith, 2001; Folse, 2009). The error persists because the correct and incorrect forms often sound similar in connected speech, reducing the corrective feedback loop.
    teacher_tips:
      how_to_explain: 'Drill third-person -s: he works, she goes, it rains. Make it
        a habit. For collective nouns, explain: "In American English, the team IS one unit — it plays, it wins. Not they play, they win."'
      where_to_start: 'Begin with common verbs: work, go, eat, study. Then introduce collective nouns: team, family, government, class.'
      sequencing: 'Week 1: Third-person -s with common verbs. Week 2: Irregular third-person forms (has, does, says). Week 3: Collective noun agreement (team plays, family is). Week 4: Mixed practice with both patterns.'
      exercises:
      - name: Subject Verb Agreement Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students add -s/-es.
        duration: 15
      - name: Collective Noun Agreement
        type: error-correction
        description: Provide 10 sentences with collective noun agreement errors (e.g., 'The team play well'). Students identify and correct each error, choosing singular or plural verb.
        duration: 15
