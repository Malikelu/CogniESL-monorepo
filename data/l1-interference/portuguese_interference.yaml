  a_lot_of:
    interference_patterns:
    - pattern: Omission of of in a lot of before nouns
      example_portuguese: Eu tenho muita livros.
      example_gloss: I have many books.
      example_wrong: I have a lot books.
      example_correct: I have a lot of books.
      explanation: Portuguese muito/muitos is a single word that directly modifies
        the noun. English a lot of requires the preposition of.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of a lot of in formal and academic contexts where many or much
        is required
      example_portuguese: Muitas pesquisas confirmam esta teoria.
      example_gloss: Many researches confirm this theory.
      example_wrong: A lot of research confirm this theory.
      example_correct: Much research confirms this theory.
      explanation: Portuguese muito is register-neutral and works in both formal and
        informal contexts. English a lot of is informal and inappropriate in academic
        or formal writing, where many (countable) or much (uncountable) is required.
        Portuguese speakers transfer the neutral register of muito to a lot of, producing
        informal-sounding academic prose. Additionally, Portuguese speakers may pair
        a lot of with plural verb agreement when the noun is uncountable (a lot of research
        confirm), because the plural quantifier muitos/muitas in Portuguese triggers
        plural agreement.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: I have a lot books. Correct: I have a lot of books.'
    - 'Wrong: A lot of students was present. Correct: A lot of students were present.'
    - 'Wrong: A lot of research confirm the theory. Correct: Much research confirms
      the theory.'
    why_it_happens: Portuguese muito/muita/muitos/muitas is a single-word quantifier
      that is register-neutral and directly modifies the noun without a preposition.
      English a lot of is a three-word phrase requiring of, is restricted to informal
      registers, and requires the speaker to choose between many (countable) and much
      (uncountable) in formal contexts. Portuguese speakers transfer (1) the single-word
      structure (omitting of), (2) the register neutrality (using a lot of in academic
      writing), and (3) the plural agreement pattern (a lot of + plural verb with uncountable
      nouns) from their L1.
    teacher_tips:
      how_to_explain: 'Write a lot on the board and add ___ after it. Ask: Can we
        say a lot books? No! We need OF. A LOT OF books. Then explain: a lot of is
        informal. In essays, use MANY (countable) or MUCH (uncountable).'
      where_to_start: Begin with a lot books vs. a lot of books. Then introduce register
        awareness.
      sequencing: 'Week 1: A lot of with countable and uncountable nouns. Week 2:
        Register awareness — a lot of vs. many/much. Week 3: Subject-verb agreement
        with a lot of. Week 4: Mixed practice.'
      exercises:
      - name: A Lot Of Insertion
        type: fill-in-the-blank
        description: Provide 15 sentences where students must insert a lot of or a
          lot.
        duration: 10
      - name: Formal or Informal Decision
        type: register-sorting
        description: 'Give 20 sentences. Students identify whether the context is formal
          or informal, then choose between a lot of, many, or much.'
        duration: 15
      - name: Error Correction Paragraph
        type: error-correction
        description: Provide a short academic paragraph with 8 errors involving a lot
          of (missing of, wrong register, wrong verb agreement). Students identify
          and correct all errors.
        duration: 15
