  past_perfect:
    interference_patterns:
    - pattern: Use of simple past where past perfect is needed for sequencing
      example_portuguese: Eu ja tinha comido quando ele chegou.
      example_gloss: I already had eaten when he arrived.
      example_wrong: I already ate when he arrived.
      example_correct: I had already eaten when he arrived.
      explanation: Portuguese uses the past perfect (pretérito mais-que-perfeito)
        for actions completed before another past action. English also requires the
        past perfect (had + past participle) in the same contexts, but Portuguese
        speakers often default to the simple past, especially in spoken English where
        temporal adverbs like 'already' and 'before' seem to make the sequence clear
        without the past perfect form.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of past perfect in narrative sequences due to L1 transfer
      example_portuguese: Ele tinha acordado, tinha tomado cafe e tinha saido.
      example_gloss: He had woken up, had had breakfast and had left.
      example_wrong: He had woken up, had had breakfast, and had left.
      example_correct: He woke up, had breakfast, and left.
      explanation: Portuguese uses the pluperfect (pretérito mais-que-perfeito) more
        broadly in narrative sequences to establish background events. Portuguese
        speakers transfer this pattern and overuse the past perfect in English for
        sequential past events where English requires the simple past. In English,
        the past perfect is only needed for the earlier of two past actions, not for
        every event in a chronological sequence.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion between past perfect and present perfect due to L1 mapping
      example_portuguese: Eu ja tinha visitado Paris.
      example_gloss: I already had visited Paris.
      example_wrong: I have already visited Paris. (when referring to a past-before-past
        context)
      example_correct: I had already visited Paris (before I moved to France).
      explanation: Portuguese 'tinha + past participle' (pluperfect) maps to English
        'had + past participle' (past perfect), but Portuguese speakers sometimes
        confuse this with the present perfect ('have + past participle') because both
        involve auxiliary + past participle structures. The error occurs when the
        temporal context requires past-before-past but the speaker defaults to present
        perfect, especially when the time reference is implicit rather than explicit.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''I already ate when he arrived.'' Correct: ''I had already eaten when
      he arrived.'''
    - 'Wrong: ''She left before I came.'' Correct: ''She had left before I came.'''
    - 'Wrong: ''He had woken up, had breakfast, and had left.'' Correct: ''He woke
      up, had breakfast, and left.'''
    - 'Wrong: ''I have visited Paris before I moved there.'' Correct: ''I had visited
      Paris before I moved there.'''
    why_it_happens: 'Portuguese has two forms of the pluperfect - a synthetic literary
      form (pretérito mais-que-perfeito simples: comera = had eaten) and a compound
      spoken form (tinha comido = had eaten). The compound form maps structurally
      to English had + past participle, which should facilitate positive transfer.
      However, three interference patterns emerge. First, Portuguese speakers often
      use the simple past where English requires the past perfect because temporal
      adverbs (already, before, by the time) make the sequence clear without the marked
      form. Second, Portuguese uses the pluperfect more broadly in narrative sequences,
      leading to overuse of the past perfect in English for chronological events that
      require simple past. Third, the structural similarity between Portuguese tinha
      + participle and English have + participle (present perfect) causes confusion
      in past-before-past contexts, especially when time references are implicit.
      These patterns are documented in contrastive analyses of Romance and Germanic
      tense-aspect systems (Swan & Smith 2001; Azevedo 1996).'
    teacher_tips:
      how_to_explain: 'Teach the past perfect as ''had + past participle'' for the
        earlier of two past actions. Use a timeline on the board: Event A (past perfect)
        -> Event B (simple past). Emphasize that the past perfect is NOT used for
        every past event in a sequence — only for the one that happened first. Contrast
        with present perfect: ''had done'' = before another past action; ''have done''
        = before now.'
      where_to_start: 'Begin with ''before'' and ''after'' clauses: ''Before I arrived,
        she had left.'' Use timelines to visualize the sequence. Then contrast past
        perfect vs. simple past in narratives.'
      sequencing: 'Week 1: Past perfect with ''before'' and ''after.'' Week 2: Past
        perfect with ''by the time'' and ''already.'' Week 3: Past perfect vs. simple
        past in narrative sequences (avoiding overuse). Week 4: Past perfect vs. present
        perfect in past-before-past contexts. Week 5: Mixed practice.'
      exercises:
      - name: Past Perfect or Simple Past
        type: fill-in-the-blank
        description: Provide 20 sentences with two past events. Students must choose
          past perfect for the earlier event and simple past for the later one.
        duration: 15
      - name: Narrative Sequence Correction
        type: error-correction
        description: Give 10 short narratives where the past perfect is overused for
          sequential events. Students identify where simple past should replace past
          perfect.
        duration: 15
      - name: Past Perfect vs Present Perfect Discrimination
        type: fill-in-the-blank
        description: Provide 15 sentences with past-before-past contexts. Students
          must choose between past perfect and present perfect, justifying their choice.
        duration: 15
      - name: Timeline Story Building
        type: composition
        description: Students receive 8 event cards in random order. They must arrange
          them chronologically and write a paragraph using past perfect for earlier
          events and simple past for later ones.
        duration: 20
