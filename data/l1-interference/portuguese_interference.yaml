  modifying_comparatives:
    interference_patterns:
    - pattern: Use of 'very' where 'much' is required before comparatives
      example_portuguese: Ele e muito mais alto.
      example_gloss: He is very more tall.
      example_wrong: He is very taller.
      example_correct: He is much taller.
      explanation: Portuguese uses 'muito' before comparatives. English uses 'much'
        (not 'very') before comparative forms.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'very more' instead of 'much more' before adjectives/adverbs
      example_portuguese: Este livro e muito mais interessante.
      example_gloss: This book is very more interesting.
      example_wrong: This book is very more interesting.
      example_correct: This book is much more interesting.
      explanation: Portuguese 'muito mais' combines the modifier and comparative
        particle into a single unit. English separates them into 'much' (modifier) +
        'more interesting' (comparative phrase). Portuguese speakers transfer 'muito
        mais' as 'very more' because 'muito' = 'very' and 'mais' = 'more' in their
        mental lexicon. This is distinct from the 'very + comparative' error because
        it involves a two-word modifier-comparative sequence.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''He is very taller.'' Correct: ''He is much taller.'''
    - 'Wrong: ''This book is very more interesting.'' Correct: ''This book is much
      more interesting.'''
    why_it_happens: 'Portuguese uses ''muito'' as a single word that covers both English
      ''very'' (modifying base adjectives: very tall) and ''much'' (modifying comparatives:
      much taller). Portuguese ''muito mais'' (much more) is a fixed collocation where
      ''muito'' modifies the comparative particle ''mais''. English requires ''much''
      in this position, not ''very''. Portuguese speakers transfer ''muito'' as ''very''
      because ''very'' is the more frequent and prototypical translation of ''muito''
      in their L1. The distinction between ''very + base adjective'' and ''much + comparative''
      does not exist in Portuguese, making this a persistent cross-linguistic confusion
      documented in Swan & Smith (2001) and Parrott (2000).'
    teacher_tips:
      how_to_explain: 'Teach: ''much'' before comparatives (much taller, much better,
        much more expensive), ''very'' before base adjectives (very tall, very good,
        very interesting). Write a two-column chart: LEFT = ''very + base'' (very tall),
        RIGHT = ''much + comparative'' (much taller).'
      where_to_start: 'Begin with common comparatives: much taller, much better, much
        more. Then introduce ''much more + adjective'' (much more interesting, much
        more expensive).'
      sequencing: 'Week 1: ''Much'' before short comparatives (-er forms). Week 2:
        ''Much more/less'' before long adjectives. Week 3: ''Very'' before base adjectives
        (contrast with Week 1-2). Week 4: Mixed practice — students choose between
        ''very + base'' and ''much + comparative''. Week 5: ''A lot'', ''far'', ''a bit'',
        ''slightly'' as alternatives.'
      exercises:
      - name: Much vs Very Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between 'much' and 'very'
          based on whether the following adjective is in base or comparative form.
        duration: 15
      - name: Modifier + Comparative Matching
        type: matching
        description: "Give two columns. Column A: modifiers (much, very, a lot, a bit,
          slightly, far). Column B: adjective phrases (taller, more interesting, tall,
          interesting, better, more expensive). Students draw correct lines to form
          grammatical phrases."
        duration: 10
      - name: Error Correction — Very vs Much
        type: error-correction
        description: Provide 15 sentences with 'very + comparative' and 'much + base
          adjective' errors. Students identify and correct each error. Include distractors
          with correct usage.
        duration: 15
