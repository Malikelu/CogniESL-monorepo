  have_get_something_done:
    interference_patterns:
    - pattern: Use of bare infinitive with 'fazer' transferred as 'make + bare infinitive'
        instead of 'have + object + past participle'
      example_portuguese: Eu fiz pintar a casa.
      example_gloss: I made paint the house.
      example_wrong: I made paint my house.
      example_correct: I had my house painted.
      explanation: Portuguese uses 'fazer + infinitive' for causative meaning (fiz
        pintar = I made [someone] paint). English uses 'have + object + past participle'
        (I had my house painted). Portuguese speakers transfer the 'make + bare infinitive'
        structure, producing 'I made paint my house' instead of 'I had my house painted.'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'do' or 'make' where English requires 'have something done'
      example_portuguese: Eu fiz o cabelo cortar.
      example_gloss: I made the hair cut.
      example_wrong: I made my hair cut.
      example_correct: I had my hair cut.
      explanation: Portuguese 'fazer' covers both 'do' and 'make' meanings. When Portuguese
        speakers want to express that someone else performed a service, they use 'fazer
        + infinitive' (fiz cortar o cabelo = I made cut the hair). English requires
        the causative 'have + object + past participle' (I had my hair cut). Portuguese
        speakers may produce 'I made my hair cut' which in English implies forced
        action, not a salon visit.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Omission of object before past participle
      example_portuguese: Eu fiz consertar o carro.
      example_gloss: I made fix the car.
      example_wrong: I had fixed my car.
      example_correct: I had my car fixed.
      explanation: Portuguese 'fazer + infinitive' does not require an object between
        the causative verb and the infinitive (fiz consertar o carro = I made fix
        the car). English 'have something done' requires the object between 'have'
        and the past participle (I had my car fixed). Portuguese speakers may omit
        the object and produce 'I had fixed my car' (simple past, meaning they did
        it themselves) instead of 'I had my car fixed' (causative, meaning someone
        else did it). This changes the meaning entirely.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''I made paint my house.'' Correct: ''I had my house painted.'''
    - 'Wrong: ''I made my hair cut.'' Correct: ''I had my hair cut.'''
    - 'Wrong: ''I had fixed my car.'' (meaning I did it myself) Correct: ''I had my
      car fixed.'' (meaning someone else did it)'
    - 'Wrong: ''She made clean her house.'' Correct: ''She had her house cleaned.'''
    why_it_happens: 'Portuguese uses ''fazer'' (to make/do) as the primary causative
      verb, followed by a bare infinitive (fiz pintar a casa = I made paint the house).
      This structure maps onto English ''make + bare infinitive'' but with a fundamentally
      different meaning. In English, ''make someone do something'' implies coercion,
      while ''have something done'' implies arranging a service. Portuguese does not
      have an equivalent of the ''have + object + past participle'' causative construction.
      Additionally, Portuguese ''fazer'' covers both ''do'' and ''make'' meanings,
      so Portuguese speakers may use either ''do'' or ''make'' in English where ''have
      something done'' is required. The word order difference is also critical: Portuguese
      places the object after the infinitive (fiz consertar o carro), while English
      places it between ''have'' and the past participle (I had my car fixed). This
      structural mismatch leads to three distinct error types: (1) ''make + bare infinitive''
      for services, (2) ''do/make'' instead of ''have'', and (3) omission of the object
      before the past participle, which changes the meaning from causative to simple
      past. Documented in Swan & Smith (2001) for Romance language causative transfer
      and Azevedo (1996) for Portuguese ''fazer'' syntax.'
    teacher_tips:
      how_to_explain: 'Write ''Eu fiz pintar a casa'' on the board. Underline ''fiz''
        (made) and ''pintar'' (paint). Ask: ''Did I paint it myself? No! I arranged
        for someone to do it. English says: I HAD my house PAINTED.'' Draw the formula:
        HAVE + OBJECT + PAST PARTICIPLE. Contrast with ''I painted my house'' (I did
        it myself). Emphasize: ''make someone do'' = force; ''have something done''
        = arrange a service.'
      where_to_start: 'Begin with common services students can relate to: haircuts,
        car repairs, house painting, dental work. Use pictures of salons, mechanics,
        and ask: ''What did you have done?'''
      sequencing: 'Week 1: ''Have something done'' for services (haircut, car repair).
        Week 2: ''Get something done'' as informal alternative. Week 3: Contrast with
        ''make someone do'' (coercion) vs. ''have something done'' (service). Week
        4: Object placement - ''I had my car fixed'' NOT ''I had fixed my car.'' Week
        5: Mixed practice with error correction.'
      exercises:
      - name: Causative Transformation
        type: transformation
        description: 'Provide 10 Portuguese sentences with ''fazer + infinitive''
          causative. Students rewrite using ''have + object + past participle.'' Example:
          ''Fiz consertar o carro'' -> ''I had my car fixed.'''
        duration: 15
      - name: Service or Coercion Decision
        type: fill-in-the-blank
        description: 'Provide 12 scenarios. Students choose between ''have something
          done'' (service) and ''make someone do something'' (coercion). Example:
          ''I ___ my house painted last week'' (had) vs. ''I ___ my son clean his
          room'' (made).'
        duration: 15
      - name: Object Placement Fix
        type: error-correction
        description: 'Provide 10 sentences with misplaced objects in causative constructions.
          Students identify and correct each error. Example: ''I had fixed my car''
          -> ''I had my car fixed.'''
        duration: 15
      - name: Real Life Services Role Play
        type: speaking
        description: Students role-play calling service providers (mechanic, salon,
          dentist). They must use 'have something done' correctly. 'I need to have
          my car serviced.' 'I'd like to have my hair cut.'
        duration: 20
