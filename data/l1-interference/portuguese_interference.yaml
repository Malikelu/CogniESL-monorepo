  future_tense:
    interference_patterns:
    - pattern: Use of 'go' + infinitive instead of 'be going to'
      example_portuguese: Eu vou estudar.
      example_gloss: I go to study.
      example_wrong: I go to study.
      example_correct: I am going to study.
      explanation: Portuguese 'ir + infinitivo' is the standard future. English requires
        'be going to' with the auxiliary 'be.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Use of present tense with future time marker
      example_portuguese: Eu viajo amanha.
      example_gloss: I travel tomorrow.
      example_wrong: I travel tomorrow.
      example_correct: I will travel tomorrow. / I am going to travel tomorrow.
      explanation: Portuguese uses the present tense with future time markers. English
        requires a future form.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I go to study.'' Correct: ''I am going to study.'''
    - 'Wrong: ''I travel tomorrow.'' Correct: ''I will travel tomorrow.'''
    why_it_happens: 'Portuguese has two main ways to express the future: ''ir + infinitivo''
      (go + infinitive) and the present tense with a future time marker. English requires
      a future form: ''will,'' ''be going to,'' or present continuous for arrangements.
      Portuguese speakers transfer both patterns, producing ''I go to study'' and
      ''I travel tomorrow.'''
    teacher_tips:
      how_to_explain: 'Teach three ways to express the future in English: ''will''
        (spontaneous decisions/predictions), ''be going to'' (plans/intentions), and
        present continuous (arrangements). Show that Portuguese ''ir'' = ''be going
        to,'' not ''go to.'''
      where_to_start: Begin with 'be going to' for plans since it is the most direct
        translation of Portuguese 'ir + infinitivo.'
      sequencing: 'Week 1: ''Be going to'' for plans. Week 2: ''Will'' for spontaneous
        decisions. Week 3: Present continuous for arrangements. Week 4: Mixed practice.'
      exercises:
      - name: Future Form Decision
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose the correct future
          form.
        duration: 15
      - name: Ir Translation
        type: translation
        description: Give 10 Portuguese sentences with 'ir + infinitivo.' Students
          translate using 'be going to.'
        duration: 15
