  like_love_hate:
    interference_patterns:
    - pattern: Use of infinitive where gerund is more common for general preferences
      example_portuguese: Eu gosto de nadar.
      example_gloss: I like of to swim.
      example_wrong: I like to swim.
      example_correct: I like swimming.
      explanation: Portuguese 'gostar de + infinitivo' maps directly onto English
        'like to + infinitive.' However, English strongly prefers the gerund for general
        preferences (I like swimming = I enjoy it as a habit). The infinitive is used
        for specific occasions or habitual routines with a nuance of choice. Portuguese
        speakers default to the infinitive because their L1 structure uses the infinitive
        for all contexts.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Omission of dummy pronoun 'it' in 'like/love/hate it when' constructions
      example_portuguese: Eu gosto quando voce canta.
      example_gloss: I like when you sing.
      example_wrong: I like when you sing.
      example_correct: I like it when you sing.
      explanation: Portuguese 'gostar quando' takes a bare temporal clause (Eu gosto
        quando voce canta = I like when you sing). English requires the dummy pronoun
        'it' as a cataphoric object before the 'when' clause. Portuguese speakers
        transfer the bare-clause structure and omit 'it,' producing 'I like when you
        sing' instead of 'I like it when you sing.' This pattern is documented in
        Swan & Smith (2001) for Portuguese learners and reflects the broader Romance
        vs. Germanic difference in clausal complementation.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I like to swim.'' (general preference) Correct: ''I like swimming.'''
    - 'Wrong: ''I like when you sing.'' Correct: ''I like it when you sing.'''
    - 'Wrong: ''She hates when it rains.'' Correct: ''She hates it when it rains.'''
    why_it_happens: Two distinct L1 transfer mechanisms are at work. First, Portuguese
      'gostar de + infinitivo' uses the infinitive for all preference contexts, while
      English prefers the gerund for general likes/dislikes and reserves the infinitive
      for specific or habitual-routine contexts. Portuguese speakers map their single
      structure onto the English infinitive by default. Second, Portuguese allows
      'gostar' to take a bare temporal clause with 'quando' (Eu gosto quando voce
      canta), whereas English requires a dummy 'it' object before the 'when' clause
      (I like it when you sing). The Portuguese structure has no equivalent of the
      English expletive 'it,' so speakers omit it. Both patterns are documented in
      Swan & Smith (2001) and in contrastive analyses of Portuguese-English verb complementation
      (Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'For gerund vs. infinitive: Write ''Eu gosto de nadar'' on the
        board. Show that Portuguese always uses the infinitive after ''gostar,'' but
        English prefers the -ing form for general likes. Drill: ''I like swimming,
        I love reading, I hate waiting.'' For the dummy ''it'': Write ''Eu gosto quando
        voce canta'' and show that English needs a placeholder object: ''I like IT
        when you sing.'' The ''it'' doesn''t mean anything specific — English just
        needs it there.'
      where_to_start: 'Begin with general preferences using gerunds: ''I like swimming,
        I love reading, I hate waiting.'' Then introduce the dummy ''it'' with ''when''
        clauses: ''I like it when you smile, I hate it when it rains.'''
      sequencing: 'Week 1: Gerund after like/love/hate for general preferences. Week
        2: Infinitive after like/love/hate for specific/routine contexts. Week 3:
        Dummy ''it'' in like/love/hate + when clauses. Week 4: Mixed practice with
        all three patterns.'
      exercises:
      - name: Like Love Hate Gerund Drill
        type: fill-in-the-blank
        description: Provide 15 sentences about general preferences. Students fill
          in the correct gerund form.
        duration: 15
      - name: Dummy It Insertion
        type: error-correction
        description: Provide 10 sentences where 'it' is missing before 'when' clauses
          after like/love/hate. Students identify the error and insert 'it.'
        duration: 10
      - name: Gerund or Infinitive Decision
        type: fill-in-the-blank
        description: Provide 15 sentences with context clues (general vs. specific).
          Students choose between gerund and infinitive.
        duration: 15
