  pragmatic_particles:
    interference_patterns:
    - pattern: Direct transfer of Portuguese tag particles (né, hein, tá, viu) into English speech
      example_portuguese: Voce gosta de cafe, ne?
      example_gloss: You like coffee, right?
      example_wrong: You like coffee, ne?
      example_correct: You like coffee, right?
      explanation: Portuguese relies on dedicated tag particles — 'né' (isn't it?), 'hein'
        (huh?), 'tá' (okay?), 'viu' (you see?) — that are appended to statements for
        confirmation, emphasis, or solidarity. These particles have no direct lexical
        equivalent in English. Portuguese speakers transfer them directly into English
        utterances, producing sentences like "You like coffee, né?" or "It's hot, tá?"
        that are incomprehensible to English listeners. English instead uses question tags
        ("isn't it?", "don't you?"), discourse markers ("right?", "you know?"), or
        intonation alone.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Overuse of 'you know' and 'right' as universal substitutes for Portuguese discourse particles
      example_portuguese: E dificil, ne? / E bom, hein? / Faz assim, viu?
      example_gloss: It's difficult, right? / It's good, huh? / Do it like this, you see?
      example_wrong: It's difficult, you know? / It's good, you know? / Do it like this, you know?
      example_correct: It's difficult, isn't it? / It's good, right? / Do it like this, okay?
      explanation: When Portuguese speakers learn that English does not use 'né' or 'hein',
        they often default to a single English substitute — typically 'you know' or 'right' —
        for all pragmatic particle functions. This overgeneralization flattens the pragmatic
        range of English discourse markers. Portuguese has a rich inventory of particles
        (né, hein, tá, viu, não é, pois não, olha, deixa ver) each with distinct
        functions (confirmation-seeking, surprise, softening, turn-yielding). English
        distributes these functions across different markers and structures (question tags,
        tag questions, discourse markers, intonation). Mapping one Portuguese particle to
        one English marker loses these distinctions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of English question tags due to L1 intonation-based confirmation strategy
      example_portuguese: Voce vem amanha, ne?
      example_gloss: You come tomorrow, right?
      example_wrong: You come tomorrow?
      example_correct: You're coming tomorrow, aren't you?
      explanation: Portuguese can form confirmation-seeking utterances purely through
        rising intonation plus a particle (né, não é), without any syntactic restructuring.
        English question tags require subject-auxiliary inversion and agreement ("aren't
        you?", "isn't it?", "don't they?"). Portuguese speakers, accustomed to the
        simpler L1 strategy, often omit the tag entirely and rely on intonation alone
        ("You come tomorrow?" with rising intonation). While this is sometimes acceptable
        in informal English, it is pragmatically weaker and can sound uncertain or
        incomplete in formal contexts.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''You like coffee, né?'' Correct: ''You like coffee, right?'''
    - 'Wrong: ''It''s expensive, you know?'' (for all contexts) Correct: ''It''s expensive, isn''t it?'' / ''It''s expensive, right?'''
    - 'Wrong: ''She''s coming, tá?'' Correct: ''She''s coming, isn''t she?'''
    - 'Wrong: ''You understand, viu?'' Correct: ''You understand, okay?'' / ''You see?'''
    why_it_happens: 'Brazilian Portuguese has a rich system of pragmatic/discourse particles
      (né, hein, tá, viu, não é, pois não, olha, deixa ver, bom, então) that serve
      functions English distributes across question tags, discourse markers, and intonation.
      Portuguese particles are syntactically simple — they are appended to the end of an
      utterance without restructuring — while English question tags require auxiliary verb
      agreement and inversion. This structural difference leads to three transfer patterns:
      (1) direct particle transfer (using Portuguese particles in English), (2) overgeneralization
      of a single English substitute, and (3) omission of English tags in favor of intonation-only
      strategies. The phenomenon is documented in contrastive pragmatics research on
      Romance-Germanic transfer (Swan & Smith 2001; Parrott 2000).'
    teacher_tips:
      how_to_explain: 'Write three Portuguese sentences on the board: ''Voce gosta, né?'',
        ''E bom, hein?'', ''Faz assim, viu?'' Ask: ''What do these particles do? They
        check, confirm, soften. English does this differently — with question tags and
        markers.'' Then show the English system: question tags (aren''t you?, isn''t it?),
        tag questions, and discourse markers (right?, you know?, okay?). Emphasize that
        English tags CHANGE with the verb: ''You''re happy, aren''t you?'' / ''She works
        here, doesn''t she?'''
      where_to_start: "Begin with the most frequent particle 'né' → English 'right?' and
        'isn't it?'. Show that 'né' maps to different English forms depending on context."
      sequencing: 'Week 1: Portuguese particles inventory — what does each one do? Week
        2: English question tags — formation rules (auxiliary + subject). Week 3: Mapping
        Portuguese particles to English equivalents (né → right/isn''t it, hein → huh/isn''t
        that so, tá → okay, viu → you see). Week 4: Discourse markers in conversation —
        right, you know, I mean, well, so. Week 5: Production practice — dialogues with
        correct particle/tag use.'
      exercises:
      - name: Particle Translation
        type: translation
        description: Provide 15 Portuguese sentences with pragmatic particles (né, hein, tá,
          viu, não é). Students translate into natural English using appropriate question
          tags and discourse markers.
        duration: 15
      - name: Question Tag Formation
        type: fill-in-the-blank
        description: Provide 20 statements without tags. Students add the correct question
          tag (aren't you?, doesn't she?, is it?, etc.). Include a mix of affirmative
          and negative stems.
        duration: 15
      - name: Discourse Marker Selection
        type: multiple-choice
        description: Provide 15 conversational contexts. Students choose the most appropriate
          discourse marker (right?, you know?, I mean, well, so, okay?) for each blank.
          Explain why other options are less appropriate.
        duration: 15
      - name: Dialogue Pragmatic Repair
        type: error-correction
        description: Provide a 10-line dialogue where a Portuguese speaker uses L1 particle
          transfer (né, hein, tá) and overgeneralized 'you know.' Students identify each
          pragmatic error and rewrite the dialogue with natural English.
        duration: 15
