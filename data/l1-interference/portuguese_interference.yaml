  passive_voice_all_tenses:
    interference_patterns:
    - pattern: Omission of auxiliary 'be' in passive constructions
      example_portuguese: A carta escrita pelo diretor.
      example_gloss: The letter written by-the director.
      example_wrong: The letter written by the director.
      example_correct: The letter was written by the director.
      explanation: Portuguese allows past participle constructions without an auxiliary
        in certain contexts (e.g., reduced relative clauses, newspaper headlines).
        English requires the auxiliary 'be' in all finite passive clauses. Portuguese
        speakers drop 'be' because their L1 permits standalone past participles in
        contexts where English demands a full passive verb phrase.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'ser' + past participle with incorrect English auxiliary form
      example_portuguese: O livro foi escrito por Machado de Assis.
      example_gloss: The book was written by Machado de Assis.
      example_wrong: The book is wrote by Machado de Assis.
      example_correct: The book was written by Machado de Assis.
      explanation: Portuguese marks passive tense on 'ser' (foi = was, é = is, será
        = will be). English marks tense on 'be' but also requires the past participle
        form. Portuguese speakers may correctly transfer the tense but use the simple
        past form of the main verb ('wrote') instead of the past participle ('written'),
        producing 'is wrote' instead of 'is written.' This is because Portuguese past
        participles and simple past forms are often identical (e.g., 'escreveu' wrote
        / 'escrito' written), and learners default to the more frequent simple past
        form.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Overuse of passive voice due to Portuguese stylistic preference
      example_portuguese: Vendem-se apartamentos.
      example_gloss: Sell themselves apartments.
      example_wrong: Apartments are sold. (in a context where English prefers active)
      example_correct: We are selling apartments.
      explanation: Portuguese uses the reflexive passive ('se' passive) extensively
        as a stylistic alternative to the analytical passive. This construction is
        more frequent in Portuguese than the English passive, leading Portuguese speakers
        to overuse passive voice in English, particularly in formal and academic writing.
        The Portuguese 'se' passive (vende-se = one sells / is sold) maps onto English
        passive, but English style guides often prefer active voice in the same contexts.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion between 'ser' and 'estar' passive leading to stative/active
        confusion
      example_portuguese: A porta foi aberta (action) vs. A porta está aberta (state).
      example_gloss: The door was opened (action) vs. The door is open (state).
      example_wrong: The door is opened. (intended meaning - the door is currently
        open)
      example_correct: The door is open.
      explanation: Portuguese distinguishes between 'ser + past participle' (actional
        passive) and 'estar + past participle' (resultant state). English uses the
        past participle for the actional passive ('was opened') but switches to the
        adjective form for the stative meaning ('is open'). Portuguese speakers transfer
        the 'estar + participle' pattern and produce 'is opened' when they mean 'is
        open,' because Portuguese uses the same participle form for both. This distinction
        between actional passive and stative adjective is a well-documented source
        of confusion for Portuguese learners (Swan & Smith, 2001; Azevedo, 1996).
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''The letter written by the director.'' Correct: ''The letter was written
      by the director.'''
    - 'Wrong: ''The book is wrote by Machado.'' Correct: ''The book was written by
      Machado.'''
    - 'Wrong: ''The door is opened.'' (meaning: it is currently open) Correct: ''The
      door is open.'''
    - 'Wrong: ''Apartments are sold.'' (in a sales context) Correct: ''We are selling
      apartments.'''
    why_it_happens: 'Portuguese and English both have passive voice constructions,
      but they differ in three critical ways that cause systematic L1 transfer errors.
      First, Portuguese allows past participle constructions without an auxiliary
      verb in reduced relative clauses and headlines (''a carta escrita'' = the letter
      written), while English always requires the auxiliary ''be'' in finite passive
      clauses. Portuguese speakers drop ''be'' because their L1 permits standalone
      past participles. Second, Portuguese uses two different copular verbs for passive
      and stative meanings: ''ser + past participle'' for the actional passive (''a
      porta foi aberta'' = the door was opened) and ''estar + past participle'' for
      the resultant state (''a porta está aberta'' = the door is in an opened state).
      English uses the past participle for the actional passive (''was opened'') but
      switches to the adjective form for the stative meaning (''is open''). Portuguese
      speakers transfer the ''estar + participle'' pattern and produce ''is opened''
      when they mean ''is open.'' Third, Portuguese uses the reflexive passive (''se''
      passive: ''vendem-se apartamentos'' = apartments are sold) far more frequently
      than English uses the analytical passive, leading Portuguese speakers to overuse
      passive voice in English contexts where active voice is preferred. These patterns
      are documented in Swan & Smith (2001), Azevedo (1996), and in contrastive analyses
      of Romance vs. Germanic voice systems.'
    teacher_tips:
      how_to_explain: 'Start with the core formula: BE + PAST PARTICIPLE. Emphasize
        that English ALWAYS needs ''be'' — there is no passive without it. Then introduce
        the tense variations: is/was/will be/has been/had been + past participle.
        For the ser/estar confusion, write two columns: ACTION (was opened) vs. STATE
        (is open). Show that English changes the word form, not just the auxiliary.
        For the overuse issue, teach students to ask: ''Who does this?'' — if there
        is a clear agent, active voice is usually better in English.'
      where_to_start: Begin with present simple passive (is/are + past participle)
        and past simple passive (was/were + past participle). These are the most common
        and the foundation for all other tenses.
      sequencing: 'Week 1: Present simple passive (is/are + past participle). Week
        2: Past simple passive (was/were + past participle). Week 3: Future and present
        perfect passive. Week 4: Ser vs. estar distinction — actional passive vs.
        stative adjective (''was opened'' vs. ''is open''). Week 5: Reflexive passive
        transfer — when to use active instead of passive. Week 6: Mixed practice across
        all tenses.'
      exercises:
      - name: Auxiliary BE Insertion
        type: fill-in-the-blank
        description: Provide 15 Portuguese-influenced sentences missing the auxiliary
          'be' (e.g., 'The letter written by the director'). Students insert the correct
          form of 'be' and past participle.
        duration: 15
      - name: Past Participle vs. Simple Past Discrimination
        type: error-correction
        description: Provide 15 sentences where the simple past form is incorrectly
          used instead of the past participle in passive constructions (e.g., 'The
          book is wrote'). Students identify and correct each error.
        duration: 15
      - name: Actional Passive vs. Stative Adjective Sort
        type: matching
        description: 'Give 20 sentences. Students classify each as actional passive
          (use past participle) or stative adjective (use adjective form). For example,
          "The door was opened at 8am" (actional) versus "The door is open" (stative).

          '
        duration: 15
      - name: Active or Passive Decision
        type: sentence-rewrite
        description: Provide 10 Portuguese 'se' passive sentences. Students decide
          whether active or passive is more natural in English and rewrite accordingly.
        duration: 15
