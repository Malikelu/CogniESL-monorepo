  distancing:
    interference_patterns:
    - pattern: Use of direct present tense instead of past-tense distancing
      example_portuguese: Eu quero pedir um favor.
      example_gloss: I want to ask a favor.
      example_wrong: I want to ask you a favor.
      example_correct: I wanted to ask you a favor.
      explanation: Portuguese uses the imperfect past (eu queria) for polite distancing,
        which maps onto English past tense (I wanted). However, Portuguese speakers
        sometimes transfer the present tense (eu quero = I want) directly into English,
        producing overly direct-sounding requests. The Portuguese imperfect (queria)
        is perceived as softer than the present (quero), just as English "I wanted"
        is softer than "I want." Learners who do not yet control this mapping use
        the present tense where English requires the past for politeness.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Underuse of conditional 'would' for polite requests
      example_portuguese: Eu gostaria de fazer um pedido.
      example_gloss: I would like to make a request.
      example_wrong: I want to make a request.
      example_correct: I would like to make a request.
      explanation: Portuguese uses the conditional mood (gostaria, poderia, queria)
        as the default polite form for requests and preferences. English similarly
        uses "would like," "could you," and "would you mind" for polite distancing.
        Portuguese speakers at early proficiency levels often default to the direct
        present tense ("I want," "I need," "Can you") because they have not yet
        internalized that English also requires conditional/past forms for politeness.
        This results in speech that native English speakers perceive as rude or
        demanding, even though no rudeness is intended. The L1 transfer is not an
        error of form but of pragmatic mapping — the learner knows the conditional
        exists but does not yet deploy it automatically in face-threatening speech
        acts (requests, refusals, suggestions).
      frequency: 4
      persistence: 3
      communicative_impact: 4
    examples:
    - 'Wrong: ''I want to ask you a favor.'' Correct: ''I wanted to ask you a favor.'''
    - 'Wrong: ''Can you help me?'' (to a boss) Correct: ''Could you help me?'' or ''I was wondering if you could help me.'''
    - 'Wrong: ''I need to talk to you.'' (polite context) Correct: ''I was hoping to talk to you.'''
    - 'Wrong: ''Do you have a minute?'' (to a superior) Correct: ''Would you have a minute?'''
    why_it_happens: Portuguese has a rich system of verbal mood and tense for encoding
      social distance and politeness. The imperfect past (pretérito imperfeito) —
      eu queria, eu podia — functions as a softener, equivalent to English "I wanted"
      or "I could." The conditional (futuro do pretérito) — eu gostaria, eu faria
      — is the standard polite form, equivalent to English "I would like" or "I would
      do." Portuguese speakers learning English must map these L1 pragmatic strategies
      onto English modal and tense forms. At lower proficiency levels, learners default
      to the present tense because it is the simplest form, losing the politeness
      distancing that both languages encode grammatically. The challenge is not grammatical
      but pragmatic — the learner must learn WHEN to deploy past/conditional forms
      for social effect, not just for temporal reference. This is documented in
      contrastive pragmatics research on Portuguese-English interlanguage (Swan &
      Smith, 2001; Parrott, 2000).
    teacher_tips:
      how_to_explain: 'Write two columns on the board: DIRECT and POLITE. Under DIRECT:
        "I want," "Can you," "I need." Under POLITE: "I wanted," "Could you," "I was
        wondering." Explain: "In both Portuguese and English, we use past tense to
        be polite. Portuguese: eu queria. English: I wanted. The past tense does not
        mean past time here — it means distance and politeness." Then introduce the
        conditional: "Portuguese: eu gostaria. English: I would like. This is the
        most polite form."'
      where_to_start: 'Begin with the past-tense softening rule (present → past for
        politeness). Use role-play: asking a friend vs. asking a boss. Then introduce
        conditional forms (would like, could you, would you mind).'
      sequencing: 'Week 1: Past tense for politeness (I wanted, I was wondering).
        Week 2: Conditional for politeness (would like, could you). Week 3: Combining
        past + conditional (I was wondering if you could). Week 4: Pragmatic awareness
        — choosing the right level of formality for the situation. Week 5: Free
        practice with role-plays.'
      exercises:
      - name: Politeness Upgrade
        type: sentence-rewrite
        description: 'Give 10 direct requests. Students rewrite each at three levels
          of politeness (casual, polite, very polite). Example: Help me -> Can
          you help me? -> Could you help me? -> I was wondering if you could help
          me.'
        duration: 15
      - name: Situational Politeness Matching
        type: matching
        description: Provide 8 scenarios (asking a friend for a ride, asking a boss
          for time off, asking a stranger for directions, etc.) and 4 request options
          per scenario at different politeness levels. Students match the appropriate
          level to the situation.
        duration: 15
      - name: Portuguese to English Politeness Translation
        type: translation
        description: Give 10 Portuguese sentences using imperfect past or conditional
          for politeness (e.g., "Eu queria saber se você poderia me ajudar"). Students
          translate into natural-sounding English, preserving the politeness level.
        duration: 15
      - name: Pragmatic Error Detection
        type: error-correction
        description: Provide a dialogue between a student and a professor where the
          student uses overly direct language. Students identify 8 pragmatic errors
          and rewrite with appropriate distancing.
        duration: 15
