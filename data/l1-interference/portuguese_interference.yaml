  infinitive_of_purpose: &id009
    interference_patterns:
    - pattern: Use of for + gerund where to + infinitive is needed
      example_portuguese: Eu estudo para aprender.
      example_gloss: I study for to learn.
      example_wrong: I study for learning.
      example_correct: I study to learn.
      explanation: Portuguese uses para + infinitivo for purpose. English uses to
        + infinitive. Portuguese speakers map para onto for and the infinitive onto
        the gerund, producing the hybrid error 'for learning' instead of 'to learn.'
        This is one of the most frequent and persistent purpose-clause errors among
        Portuguese-speaking learners (Swan & Smith, 2001).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of for + noun where to + infinitive is required for purpose
      example_portuguese: Eu trabalho para dinheiro.
      example_gloss: I work for money.
      example_wrong: I work for money (intending to express purpose).
      example_correct: I work to earn money.
      explanation: Portuguese para covers both purpose (to) and beneficiary/benefit (for).
        English splits these into two distinct structures -- the to-infinitive for purpose
        and for + noun for benefit. Portuguese speakers overextend the for mapping
        because para maps onto both English prepositions, leading to ambiguous or incorrect
        purpose expressions. Azevedo (1996) notes that Portuguese para is semantically
        broader than English to, covering purpose, destination, and recipient roles.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I study for learning. Correct: I study to learn.'
    - 'Wrong: I came for help you. Correct: I came to help you.'
    - 'Wrong: She went to the store for buy milk. Correct: She went to the store to buy milk.'
    why_it_happens: Portuguese uses the preposition para followed by an infinitive to express
      purpose (para + infinitivo). English uses the infinitive marker to without a preposition.
      The problem is compounded because Portuguese para maps onto two English prepositions --
      to (purpose/direction) and for (benefit/recipient). Portuguese speakers must learn
      to split para into two distinct English structures, and they frequently overgeneralize
      the for mapping, producing 'for learning' instead of 'to learn.' Additionally,
      Portuguese allows purpose to be expressed through context alone in some constructions
      where English requires an explicit marker. Swan & Smith (2001) identify this as a
      high-frequency error for Portuguese speakers at all proficiency levels. Azevedo (1996)
      documents the broader semantic range of para compared to English to, explaining why
      the transfer error is so persistent.
    teacher_tips:
      how_to_explain: 'Write on the board: PARA + INFINITIVO = TO + VERB. Show that
        Portuguese uses a preposition (para) but English uses just to. Then introduce
        the contrast: FOR + NOUN (benefit) vs. TO + VERB (purpose). Use two columns:
        "I work FOR money" vs. "I work TO earn money."'
      where_to_start: Begin with common purpose expressions using to + infinitive.
        Use physical actions -- stand up to stretch, open the window to get air.
      sequencing: 'Week 1: To + infinitive for purpose (basic). Week 2: For + noun
        vs. to + infinitive contrast. Week 3: In order to (formal purpose). Week 4:
        So that + clause (purpose with a different subject). Week 5: Mixed practice
        and error correction.'
      exercises:
      - name: Purpose Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with a blank where students must write to
          + infinitive. Include distractors where for + noun is correct.
        duration: 15
      - name: For or To Decision
        type: binary-choice
        description: Give 20 sentences. Students choose between for + noun and to +
          infinitive. Include Portuguese glosses to reinforce the contrastive difference.
        duration: 15
      - name: Purpose Translation
        type: translation
        description: Provide 10 Portuguese sentences with para + infinitivo. Students
          translate into English using to + infinitive, in order to, or so that.
        duration: 15
      - name: Error Correction Purpose
        type: error-correction
        description: Provide a paragraph with 8 purpose-clause errors (for + gerund,
          missing to, wrong preposition). Students identify and correct each error.
        duration: 15
