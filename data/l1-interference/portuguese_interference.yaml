  reason_clauses:
    interference_patterns:
    - pattern: Use of 'so' after 'because' (double conjunction)
      example_portuguese: Eu estou cansado porque trabalhei muito, entao.
      example_gloss: I am tired because I worked much, so.
      example_wrong: I am tired because I worked a lot so.
      example_correct: I am tired because I worked a lot.
      explanation: Portuguese allows 'porque...entao' (because...so) as a paired conjunction
        structure. English never uses 'so' after 'because' — they are mutually exclusive.
        Portuguese speakers transfer the paired conjunction into English, producing
        'because...so' together.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'because' + 'that' (porque que)
      example_portuguese: Eu nao fui porque que choveu muito.
      example_gloss: I didn't go because that it rained much.
      example_wrong: I didn't go because that it rained a lot.
      example_correct: I didn't go because it rained a lot.
      explanation: In colloquial Brazilian Portuguese, 'porque que' is a common interrogative
        and sometimes declarative structure (similar to 'why is it that...'). Portuguese
        speakers may transfer this as 'because that' in English, producing ungrammatical
        sentences. English 'because' takes a direct clause without 'that.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - "Wrong: 'I am tired because I worked much so.' Correct: 'I am tired because
      I worked much.' OR 'I worked much, so I am tired.'"
    - "Wrong: 'She stayed home because that she was sick.' Correct: 'She stayed
      home because she was sick.'"
    - "Wrong: 'He failed because that he did not study.' Correct: 'He failed because
      he did not study.'"
    why_it_happens: Portuguese allows paired conjunction structures that English does
      not. The 'porque...entao' (because...so) pairing is grammatical in Portuguese
      but redundant in English, where 'because' and 'so' are mutually exclusive. Additionally,
      colloquial Brazilian Portuguese uses 'porque que' as an emphatic interrogative
      form, which learners may transfer into declarative English sentences as 'because
      that.' Both patterns reflect L1 transfer of Portuguese clause-linking strategies
      into English.
    teacher_tips:
      how_to_explain: 'Write on the board: ''because = so. Pick ONE, never both.'' Show
        the two correct options: (A) ''I stayed home because it rained.'' (B) ''It rained,
        so I stayed home.'' Then explain: ''because that'' is never correct in English.
        ''Because'' is followed directly by a subject + verb, no ''that.'''
      where_to_start: Begin with the because/so distinction using simple cause-effect
        sentences. Once students can choose one or the other, introduce the 'because
        that' error.
      sequencing: 'Week 1: ''Because'' vs ''so'' — choose one. Week 2: Practice rewriting
        sentences with ''because'' and with ''so.'' Week 3: ''Because that'' error correction.
        Week 4: Mixed practice — all three patterns.'
      exercises:
      - name: Because or So Decision
        type: fill-in-the-blank
        description: Provide 15 sentences with a blank where either 'because' or 'so'
          is missing. Students choose the correct conjunction and eliminate the redundant
          one.
        duration: 15
      - name: Because That Error Correction
        type: error-correction
        description: Provide 10 sentences with 'because that.' Students remove 'that'
          and rewrite correctly.
        duration: 10
      - name: Cause-Effect Rewriting
        type: sentence-rewrite
        description: Give 10 sentences with 'because.' Students rewrite each using 'so'
          instead (and vice versa), maintaining the same meaning.
        duration: 15
