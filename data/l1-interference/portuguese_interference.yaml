  preposition_choice:
    interference_patterns:
    - pattern: Use of 'em' (in/on/at) transferred to English with location nouns
      example_portuguese: Eu estou na escola.
      example_gloss: I am in-the school.
      example_wrong: I am in the school.
      example_correct: I am at school.
      explanation: Portuguese 'em' contracts with articles (em + a = na, em + o = no) and is used broadly for locations. English uses specific prepositions (at, in, on) and often drops the article for institutional locations. Portuguese 'na escola' maps to English 'at school' (no article), not 'in the school.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'a' (to) where English uses 'at' or no preposition with verbs of arrival
      example_portuguese: Eu cheguei a escola.
      example_gloss: I arrived to school.
      example_wrong: I arrived to school.
      example_correct: I arrived at school.
      explanation: Portuguese uses the preposition 'a' (to) after verbs of arrival and destination (chegar a, ir a). English uses 'at' after 'arrive' (arrive at school, arrive at the airport) and no preposition before home (arrive home, go home). Portuguese speakers transfer 'a' as 'to', producing 'arrived to school' instead of 'arrived at school.' This error is documented in Swan and Smith (2001) for Portuguese speakers and in Azevedo (1996) as a systematic feature of Portuguese motion verb complementation.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am in the school.'' Correct: ''I am at school.'''
    - 'Wrong: ''I am in the work.'' Correct: ''I am at work.'''
    - 'Wrong: ''I arrived to school.'' Correct: ''I arrived at school.'''
    - 'Wrong: ''I go to home.'' Correct: ''I go home.'''
    why_it_happens: Portuguese uses the preposition 'em' (in/on/at) more broadly than English, and contracts it with articles (em + a = na, em + o = no). This single Portuguese preposition covers territory that English divides among 'in,' 'on,' and 'at.' Additionally, Portuguese uses 'a' (to) after verbs of motion and arrival (chegar a, ir a), while English uses 'at' after 'arrive' and drops the preposition entirely before 'home.' Portuguese speakers transfer these patterns, producing errors like 'in the school' (from 'na escola'), 'arrived to school' (from 'cheguei a escola'), and 'go to home' (from 'vou para casa'). The article-dropping rule for institutional locations in English (at school, at work, at home, in bed, in prison) has no parallel in Portuguese, where articles are always required. These interference patterns are documented in Swan and Smith (2001) and Azevedo (1996).
    teacher_tips:
      how_to_explain: 'Teach common location expressions without articles: at school, at work, at home, at church, in bed, in prison, in hospital. Then teach verb + preposition pairs: arrive at (not to), go home (not to home), get to (for other destinations).'
      where_to_start: 'Begin with common locations: at school, at work, at home. Then introduce arrive at vs. arrive to.'
      sequencing: 'Week 1: Location expressions without articles. Week 2: Arrive at vs. arrive to. Week 3: Go home (no preposition). Week 4: Mixed practice with all preposition choice patterns.'
      exercises:
      - name: Preposition Choice Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose the correct preposition or no preposition.
        duration: 15
      - name: Location Article Drop
        type: error-correction
        description: Give 12 sentences with Portuguese-influenced article + location errors (e.g., 'I am in the school,' 'She goes to the church'). Students correct by choosing the right preposition and removing unnecessary articles.
        duration: 15
