  unless:
    interference_patterns:
    - pattern: Use of 'if...not' where 'unless' is more idiomatic
      example_portuguese: Eu nao vou se nao parar de chover.
      example_gloss: I not go if not stops to rain.
      example_wrong: I will not go if it does not stop raining.
      example_correct: I will not go unless it stops raining.
      explanation: Portuguese uses 'se...nao' (if...not) for negative conditions.
        English 'unless' is more concise and natural. Portuguese speakers transfer
        the 'se...nao' structure directly as 'if...not,' which is grammatically possible
        but stylistically awkward and less idiomatic than 'unless.' Native English
        strongly prefers 'unless' for negative conditional clauses, and overuse of
        'if...not' marks the speaker as non-native.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of 'if' for all conditional meanings due to single Portuguese
        'se' conjunction
      example_portuguese: Eu facao se voce quiser.
      example_gloss: I do it if you want.
      example_wrong: I will sign the contract if you agree to the terms.
      example_correct: I will sign the contract provided that you agree to the terms.
      explanation: Portuguese uses a single conditional conjunction 'se' for all
        conditional meanings — neutral ('if'), strong/necessary ('provided that'),
        and negative ('unless'). English lexicalizes these distinctions with separate
        words. Portuguese speakers overuse 'if' because their L1 does not require
        them to choose between conditional markers. In formal and business contexts,
        using 'if' instead of 'provided that' or 'unless' can sound vague or insufficiently
        committed. This pattern is particularly persistent because the single 'se'
        system is deeply ingrained in Portuguese grammar from early acquisition.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion of logical polarity with 'unless' (treating it as 'if')
      example_portuguese: Eu vou se nao chover.
      example_gloss: I go if not rain.
      example_wrong: I will go if it does not rain. / I will go unless it does not
        rain.
      example_correct: I will go unless it rains.
      explanation: Portuguese 'se...nao' expresses a negative condition with positive
        polarity in the main clause ('I will go if it does not rain'). English 'unless'
        already contains the negation within the conjunction, so the main clause
        remains positive ('I will go unless it rains'). Portuguese speakers sometimes
        double-negate by saying 'unless it does not rain' (meaning 'if it rains'),
        reversing the intended logic. This polarity confusion is a distinct interference
        pattern from simple 'if...not' overuse and requires explicit instruction
        on the internal logic of 'unless.'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''I will not go if it does not stop raining.'' Correct: ''I will not
      go unless it stops raining.'''
    - 'Wrong: ''I will go unless it does not rain.'' (double negation) Correct: ''I
      will go unless it rains.'''
    - 'Wrong: ''I will sign if you agree.'' (vague) Correct: ''I will sign provided
      that you agree.'' (stipulative)'
    why_it_happens: Portuguese has a single conditional conjunction 'se' that covers
      all conditional meanings — neutral open conditions ('if'), strong stipulative
      conditions ('provided that'), and negative conditions ('unless' / 'if...not').
      English lexicalizes these three distinctions with separate words, requiring
      speakers to choose the correct conditional marker for each context. Portuguese
      speakers transfer the single 'se' pattern and default to 'if' for all conditions,
      producing three distinct error types. (1) For negative conditions, Portuguese
      'se...nao' maps to English 'if...not,' but native English strongly prefers
      'unless.' (2) For stipulative conditions, Portuguese 'se' maps to English
      'if,' but formal English requires 'provided that' or 'as long as.' (3) For
      the logical polarity of 'unless,' Portuguese speakers may double-negate because
      'unless' already contains the negation internally ('unless it rains' = 'if
      it does not rain'), whereas Portuguese keeps the negation in the subordinate
      clause ('se nao chover'). These patterns are documented in Swan and Smith
      (2001) for Portuguese speakers and in Azevedo (1996) for Portuguese conditional
      syntax.
    teacher_tips:
      how_to_explain: 'Create a three-column chart on the board: IF (neutral/open),
        UNLESS (negative = if...not), PROVIDED THAT (strong requirement). Write the
        Portuguese equivalent for each: se (neutral), se...nao (negative), se (strong).
        Show that Portuguese uses one word for all three, but English uses different
        words. For the polarity issue, draw a logic diagram: ''unless it rains'' =
        ''if it does NOT rain'' — the negation is INSIDE ''unless.'' Drill the
        transformation: ''se...nao'' → ''unless'' (drop the ''not'' in the main
        clause).'
      where_to_start: 'Begin with ''unless'' = ''if...not'' since this is the most frequent
        error. Use simple real-life conditions: ''Unless it rains, we will have a picnic.''
        Then introduce the polarity issue: ''unless it rains'' NOT ''unless it does not
        rain.'' Finally, introduce ''provided that'' for formal/stipulative contexts.'
      sequencing: 'Week 1: ''Unless'' = ''if...not'' — basic transformation drill.
        Week 2: Polarity awareness — ''unless + positive verb'' (no double negation).
        Week 3: ''Provided that'' vs ''if'' — formal vs neutral conditions. Week
        4: Mixed practice with all three conditional types. Week 5: Error correction
        in context (emails, contracts, everyday speech).'
      exercises:
      - name: Unless Transformation Drill
        type: sentence-rewrite
        description: Give 10 sentences with 'if...not.' Students rewrite using 'unless.'
          Then give 10 'unless' sentences and students rewrite using 'if...not' to
          confirm equivalence.
        duration: 15
      - name: Polarity Correction
        type: error-correction
        description: Provide 10 sentences with double negation errors using 'unless'
          (e.g., 'unless it does not rain'). Students identify the logic error and
          correct to single negation ('unless it rains').
        duration: 15
      - name: If vs Unless vs Provided That
        type: fill-in-the-blank
        description: Provide 15 sentences with blank conditional conjunctions. Students
          must choose between 'if,' 'unless,' and 'provided that' based on context
          (neutral, negative, or stipulative condition). Include everyday, business,
          and academic contexts.
        duration: 20
      - name: Conditional Logic Translation
        type: translation
        description: Give 10 Portuguese sentences using 'se' and 'se...nao.' Students
          translate into English, choosing the most natural conditional conjunction
          for each context. Discuss as a class why 'unless' or 'provided that' is
          more idiomatic than 'if' in certain sentences.
        duration: 20
