  false_cognates:
    interference_patterns:
    - pattern: Use of false cognates — semantic shift in Latinate cognates
      example_portuguese: Eu estou atualmente trabalhando.
      example_gloss: I am actually working.
      example_wrong: I am actually working.
      example_correct: I am currently working.
      explanation: Portuguese 'atualmente' means 'currently' in English, not 'actually'.
        Portuguese 'pretender' means 'intend/plan to,' not 'pretend.' These are classic
        false friends — words that look similar across languages but differ in meaning.
        Portuguese 'puxar' means 'pull,' not 'push.' Portuguese 'costume' means 'habit/custom,'
        not 'costume' (clothing). These errors are among the most frequent and
        high-impact L1 interference patterns for Portuguese-speaking ESL learners
        (Swan & Smith, 2001; Azevedo, 1996).
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of false cognates — deceptive formal register cognates
      example_portuguese: Eu assisti a um filme ontem.
      example_gloss: I assisted a film yesterday.
      example_wrong: I assisted a film yesterday.
      example_correct: I watched a film yesterday.
      explanation: Portuguese 'assistir a' means 'to watch/attend,' not 'to assist.'
        Portuguese 'colégio' means 'school' (general), not 'college' (university-level).
        Portuguese 'exquisito' means 'strange/unusual,' not 'exquisite' (beautiful).
        Portuguese 'sensível' means 'sensitive' in some contexts but more often means
        'sensible/reasonable.' These formal-register false cognates are particularly
        persistent because learners encounter them in academic and professional contexts
        where they assume the cognate meaning carries over (Swan & Smith, 2001;
        Azevedo, 1996).
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: I am actually working. Correct: I am currently working.'
    - 'Wrong: I pretend to go. Correct: I intend to go.'
    - 'Wrong: I assisted a film yesterday. Correct: I watched a film yesterday.'
    - 'Wrong: She is very exquisite. Correct: She is very strange.'
    - 'Wrong: I go to college. (meaning primary school) Correct: I go to school.'
    why_it_happens: Portuguese and English share a large number of Latinate cognates due
      to historical contact and the shared Latin root of Portuguese. However, many
      of these cognates have undergone semantic drift — the same Latin root word evolved
      different meanings in each language. For example, Latin 'praetendere' gave Portuguese
      'pretender' (to intend) and English 'pretend' (to feign). Latin 'assistere' gave
      Portuguese 'assistir' (to watch/attend) and English 'assist' (to help). Because
      the words look and sound nearly identical, Portuguese speakers assume the meaning
      transfers directly. This is reinforced by the fact that many cognates DO share
      the same meaning (e.g., 'telefone/telephone,' 'animal/animal'), creating a false
      sense of reliability. The errors are persistent because the false cognates are
      high-frequency words encountered daily, and because the correct English word is
      often a less common synonym (e.g., 'currently' instead of 'actually,' 'intend'
      instead of 'pretend') that learners have not yet acquired. Swan & Smith (2001)
      identify false cognates as one of the top three error categories for Portuguese-speaking
      learners, and Azevedo (1996) documents the systematic nature of semantic drift
      in Romance-Germanic cognate pairs.
    teacher_tips:
      how_to_explain: 'Create a three-column FALSE FRIENDS chart: Portuguese word | What
        learners think it means | What it actually means. Start with the most dangerous
        ones (those that cause real miscommunication): atualmente = currently (not
        actually), pretender = intend (not pretend), assistir = watch (not assist),
        costume = habit (not costume), colégio = school (not college). Emphasize:
        "If a word looks too easy, be suspicious."'
      where_to_start: Begin with the 10 most common false cognates that cause actual
        miscommunication. Use real-life scenarios where the wrong word would cause
        confusion (e.g., saying "I assisted at the meeting" when you mean "I attended
        the meeting").
      sequencing: 'Week 1: Top 10 high-danger false cognates (comunicative impact).
        Week 2: Formal/academic false cognates (assistir/assist, colégio/college,
        exquisito/exquisite). Week 3: False cognates in context — reading passages
        with embedded errors. Week 4: Production practice — students write dialogues
        using correct words, then swap and correct each other''s work.'
      exercises:
      - name: False Cognate Drill
        type: error-correction
        description: Provide 15 sentences with false cognate errors. Students identify
          the wrong word and replace it with the correct English equivalent.
        duration: 15
      - name: Cognate or False Friend Decision
        type: matching
        description: Give 20 Portuguese-English word pairs. Students classify each
          as "true cognate (same meaning)" or "false friend (different meaning)" and
          provide the correct English translation for false friends.
        duration: 15
      - name: Contextual False Cognate Challenge
        type: fill-in-the-blank
        description: Provide 10 short paragraphs with blanks where a false cognate
          might be used. Students must choose between the false cognate and the correct
          English word (e.g., "She ___ to study medicine" — pretend vs. intend).
        duration: 15
