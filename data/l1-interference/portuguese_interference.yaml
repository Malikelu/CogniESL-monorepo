  conditionals:
    interference_patterns:
    - pattern: Use of present tense in hypothetical (second conditional) if-clauses
      example_portuguese: Se eu tivesse dinheiro, eu viajaria.
      example_gloss: If I had money, I would travel.
      example_wrong: If I have money, I will travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (tivesse) in hypothetical
        if-clauses, which does not map neatly onto English past simple. Portuguese
        speakers may default to the present tense because the Portuguese present
        indicative is used in some conditional constructions, and because the
        hypothetical meaning is carried by the subjunctive morphology in Portuguese
        rather than by tense shifting as in English.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'would' in the if-clause (double-would error)
      example_portuguese: Se eu teria dinheiro, eu viajaria.
      example_gloss: If I would have money, I would travel.
      example_wrong: If I would have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese permits the conditional tense (teria) in both the
        if-clause and the main clause of hypothetical sentences. English strictly
        restricts 'would' to the main clause only; the if-clause must use the simple
        past (or past subjunctive 'were'). Portuguese speakers transfer the
        double-conditional pattern directly, producing 'If I would... I would...'
        which is ungrammatical in standard English. This is one of the most
        persistent and documented conditional errors among Portuguese speakers.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: If I have money, I will travel. Correct: If I had money, I would travel.'
    - 'Wrong: If I would have money, I would travel. Correct: If I had money, I would travel.'
    - 'Wrong: If she would know, she would tell us. Correct: If she knew, she would tell us.'
    why_it_happens: Portuguese and English have fundamentally different conditional
      sentence architectures. First, Portuguese uses the imperfect subjunctive
      (fosse, tivesse) in hypothetical if-clauses, a morphological form that has
      no direct English equivalent. English uses the past simple (had, knew) to
      express hypothetical meaning, which Portuguese speakers may confuse with
      real past events, leading them to use the present tense instead. Second,
      Portuguese permits the conditional tense (faria, teria) in both the if-clause
      and the main clause, while English restricts 'would' to the main clause
      only. This structural difference produces the double-would error ('If I
      would have... I would...'), which is one of the most frequently documented
      conditional errors for Portuguese speakers (Swan & Smith 2001, pp. 119-120;
      Folse 2009, p. 322). Third, Portuguese uses the present indicative in some
      conditional constructions where English requires the past tense, leading to
      errors like 'If I have money, I will travel' instead of 'If I had money, I
      would travel.' These three structural mismatches make conditionals a
      high-frequency, high-persistence error area for Portuguese learners.
    teacher_tips:
      how_to_explain: 'Write a Portuguese conditional on the board (Se eu tivesse
        dinheiro, eu viajaria). Show that Portuguese uses the subjunctive in the
        if-clause and the conditional in the main clause. Then show the English
        mapping: past simple in if-clause, would + base verb in main clause.
        Emphasize: NEVER put ''would'' in the if-clause. Drill: ''If I had... I
        would...'' Then introduce the double-would error explicitly: ''If I would
        have'' is WRONG. ''If I had'' is CORRECT.'
      where_to_start: Begin with the second conditional (unreal present/future) since
        it is the most frequent. Drill 'If I had... I would...' before introducing
        the double-would error and the third conditional.
      sequencing: 'Week 1: Second conditional — past tense in if-clause, would in
        main clause. Week 2: No ''would'' in if-clause (double-would error
        correction). Week 3: Third conditional — had + past participle in
        if-clause, would have + past participle in main clause. Week 4: Mixed
        practice with all three types. Week 5: Error correction focus on
        double-would and present-tense-in-if-clause errors.'
      exercises:
      - name: Conditionals Drill
        type: fill-in-the-blank
        description: Provide 15 sentences covering first, second, and third
          conditional. Students fill in the correct verb form.
        duration: 15
      - name: Double-Would Error Correction
        type: error-correction
        description: Provide 10 sentences with 'would' incorrectly used in
          if-clauses. Students identify the error and rewrite using the correct
          past tense form.
        duration: 15
      - name: Portuguese to English Conditional Translation
        type: translation
        description: Give 10 Portuguese conditional sentences (using subjunctive
          and conditional tenses). Students translate into correct English,
          paying attention to tense in the if-clause and avoiding double-would.
        duration: 15
