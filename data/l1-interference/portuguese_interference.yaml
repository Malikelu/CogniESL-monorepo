  manner_adverbs:
    interference_patterns:
    - pattern: Use of adjective where adverb is required (no -ly suffix)
      example_portuguese: Ele fala rapido.
      example_gloss: He speaks quick.
      example_wrong: He speaks quick.
      example_correct: He speaks quickly.
      explanation: 'Portuguese uses the same word form for both adjective and adverb
        (rapido = quick/quickly). There is no -mente suffix required in many contexts,
        and even when -mente exists, the bare adjective is frequently used as an adverb.
        English requires the -ly adverb form after verbs to describe manner. Portuguese
        speakers transfer the bare-adjective-as-adverb pattern directly, producing
        ''He speaks quick'' instead of ''He speaks quickly.''

        '
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Incorrect adverb placement before the verb or at sentence-initial position
      example_portuguese: Rapidamente ele terminou o trabalho.
      example_gloss: Quickly he finished the work.
      example_wrong: Quickly he finished the work.
      example_correct: He finished the work quickly.
      explanation: 'Portuguese allows manner adverbs in flexible positions including
        before the verb (Rapidamente ele terminou) or at the start of the sentence.
        English strongly prefers manner adverbs after the verb or at the end of the
        sentence (He finished the work quickly). Sentence-initial placement (Quickly,
        he finished) is grammatical but marked for emphasis and sounds unnatural in
        everyday Portuguese-to-English transfer. Portuguese speakers overuse fronted
        adverbs because their L1 permits this freely.

        '
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''He speaks quick.'' Correct: ''He speaks quickly.'''
    - 'Wrong: ''She drives careful.'' Correct: ''She drives carefully.'''
    - 'Wrong: ''Quickly he finished the work.'' Correct: ''He finished the work quickly.'''
    - 'Wrong: ''She sings beautiful.'' Correct: ''She sings beautifully.'''
    - 'Wrong: ''He runs slow.'' Correct: ''He runs slowly.'''
    why_it_happens: 'Portuguese does not require a special adverb suffix the way English
      does. The same word serves as both adjective and adverb: ''rapido'' means both
      ''quick'' and ''quickly.'' When a Portuguese speaker says ''Ele fala rapido''
      (He speaks quick), the word ''rapido'' modifies the verb directly without any
      morphological change. English, by contrast, requires the -ly suffix to mark
      an adverb: ''quick quickly,'' ''careful carefully,'' ''slow slowly.'' Portuguese
      speakers transfer the bare-adverb pattern because their L1 does not mark the
      adjective-adverb distinction morphologically. Additionally, Portuguese allows
      adverbs in more flexible positions (before the verb, sentence-initially), while
      English manner adverbs strongly prefer post-verbal or sentence-final position.
      This double transfer - wrong form AND wrong position - makes manner adverbs
      a persistent error area for Portuguese speakers.

      '
    teacher_tips:
      how_to_explain: 'Write ''Ele fala rapido'' on the board. Underline ''rapido.''
        Ask: ''Is this describing a noun or a verb? A verb - so we need an adverb.
        Add -LY.'' Show the pattern: quick quickly, careful carefully, slow slowly.
        Then write ''He speaks quickly'' and underline the position: AFTER the verb.
        Drill: ''She drives careful'' ''She drives carefully'' (form) + ''at the end''
        (position). For exceptions, note: fast, hard, early, late have the same form
        (''He runs fast'' - no -ly needed).

        '
      where_to_start: 'Begin with the adjective-to-adverb transformation using common
        pairs: quick/quickly, slow/slowly, careful/carefully, bad/badly. Use classroom
        actions: ''Walk slowly.'' ''Speak clearly.'' ''Write neatly.'' Then introduce
        placement: adverbs go AFTER the verb or at the END of the sentence.

        '
      sequencing: 'Week 1: Adjective to adverb formation (-ly suffix). Week 2: Exceptions
        (fast, hard, early, late - same form). Week 3: Adverb placement (after verb,
        end of sentence). Week 4: Combined practice - form + placement. Week 5: Error
        correction with authentic Portuguese-to-English transfer sentences.

        '
      exercises:
      - name: Adverb Form Drill
        type: fill-in-the-blank
        description: 'Provide 15 adjectives. Students write the adverb form and use
          it in a sentence. Include regular (quick quickly), spelling changes (happy
          happily, simple simply), and exceptions (fast fast, hard hard).

          '
        duration: 15
      - name: Adjective or Adverb Choice
        type: error-correction
        description: 'Give 20 sentences written by a Portuguese speaker. Students
          identify whether an adjective was used where an adverb is needed, correct
          the form, and explain why. Example: ''She drives careful'' ''She drives
          carefully'' (modifies verb ''drives'').

          '
        duration: 15
      - name: Adverb Placement Fix
        type: transformation
        description: 'Provide 10 sentences with correct adverb form but wrong placement
          (fronted or pre-verbal). Students rewrite with the adverb in natural English
          position (post-verbal or sentence-final). Example: ''Quickly she left the
          room'' ''She left the room quickly.''

          '
        duration: 15
      - name: Action Description Game
        type: speaking
        description: 'Teacher performs actions (walking slowly, writing carefully,
          speaking loudly). Students describe what they see using full sentences with
          correct adverb form and placement. ''You are walking slowly.'' ''You are
          writing carefully.'' Rotate students as performers.

          '
        duration: 10
      - name: Portuguese to English Translation Challenge
        type: translation
        description: 'Give 10 Portuguese sentences with bare-adjective adverbs (Ele
          fala rapido, Ela canta bonito, Eles trabalham duro). Students translate
          into English, applying -ly suffix and correct placement. Discuss exceptions
          (duro = hard, same form).

          '
        duration: 15
