  past_simple_vs_continuous:
    interference_patterns:
    - pattern: Use of simple past for ongoing background actions instead of past continuous
      example_portuguese: Eu estudava quando ele chegou.
      example_gloss: I studied when he arrived.
      example_wrong: I studied when he arrived.
      example_correct: I was studying when he arrived.
      explanation: Portuguese uses the imperfect past (pretérito imperfeito) for ongoing
        background actions (estudava = was studying). English requires the past continuous
        (was/were + -ing) for actions in progress at a specific past moment. Portuguese
        speakers transfer the imperfect form directly as simple past, losing the ongoing
        aspect.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of past continuous for completed habitual actions instead of simple
        past
      example_portuguese: Eu fui ao mercado ontem.
      example_gloss: I went to-the market yesterday.
      example_wrong: I was going to the market yesterday.
      example_correct: I went to the market yesterday.
      explanation: Portuguese uses the pretérito perfeito (fui = went) for completed
        past actions with a defined time frame. English uses the past simple for completed
        actions and reserves the past continuous for actions in progress. Portuguese
        speakers sometimes overgeneralize the past continuous to habitual or completed
        past actions because the Portuguese imperfect/perfect distinction does not
        map neatly onto the English simple/continuous distinction. This overgeneralization
        is documented in studies of Portuguese EFL learners' tense-aspect errors (Swan
        & Smith, 2001; Figueiredo, 2001).
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I studied when he arrived.'' Correct: ''I was studying when he arrived.'''
    - 'Wrong: ''She cooked when I called.'' Correct: ''She was cooking when I called.'''
    - 'Wrong: ''I was going to the market yesterday.'' Correct: ''I went to the market
      yesterday.'''
    - 'Wrong: ''They were walking to school every day.'' Correct: ''They walked to
      school every day.'''
    why_it_happens: Portuguese has a three-way past tense distinction that does not
      map onto English's two-way system. Portuguese uses (1) pretérito perfeito (fui)
      for completed actions with a defined endpoint, (2) pretérito imperfeito (ia)
      for ongoing/habitual past actions, and (3) pretérito mais-que-perfeito (tinha
      ido) for past-before-past. English uses (1) past simple (went) for completed
      actions and (2) past continuous (was going) for actions in progress. The Portuguese
      imperfect (estudava) maps functionally to English past continuous (was studying),
      but Portuguese speakers often transfer it as simple past (studied) because both
      are "past tense" forms. Conversely, some Portuguese speakers overgeneralize
      the past continuous to habitual/completed actions because the Portuguese imperfect
      covers both ongoing and habitual meanings. This bidirectional transfer is documented
      in contrastive analyses of Romance and Germanic tense-aspect systems (Swan &
      Smith, 2001; Azevedo, 1996; Figueiredo, 2001).
    teacher_tips:
      how_to_explain: 'Teach the contrast: past continuous (was/were + -ing) = action
        in progress at a specific past moment; past simple = completed action. Use
        the ''interrupted action'' pattern: ''I was [doing] when [something happened].''
        Then teach the habitual past: ''I [went] every day'' (not ''I was going every
        day''). Show that Portuguese ''estudava'' = ''was studying'' (ongoing), not
        ''studied'' (completed).'
      where_to_start: Begin with 'I was [doing something] when [something happened].'
        This is the most common context where the error appears.
      sequencing: 'Week 1: Past continuous for ongoing actions (interrupted action
        pattern). Week 2: Past simple for completed actions. Week 3: Contrast — when
        to use which. Week 4: Habitual past (simple past, not continuous). Week 5:
        Mixed practice.'
      exercises:
      - name: Past Simple vs Continuous Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between past
          simple and past continuous. Include interrupted action contexts and habitual
          past contexts.
        duration: 15
      - name: Interrupted Action Chain
        type: sentence-building
        description: Give students 10 pairs of events (e.g., 'read a book / phone
          rang'). Students write sentences using past continuous for the ongoing action
          and past simple for the interruption (e.g., I was reading a book when the
          phone rang).
        duration: 15
      - name: Habitual Past Correction
        type: error-correction
        description: Provide 10 sentences where past continuous is incorrectly used
          for habitual/completed past actions (e.g., 'I was going to school every
          day'). Students correct to simple past and explain why the continuous is
          wrong.
        duration: 10
