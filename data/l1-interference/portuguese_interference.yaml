  extraposition: &id015
    interference_patterns:
    - pattern: Omission of dummy 'it' in extraposition constructions
      example_portuguese: E importante estudar.
      example_gloss: Is important to study.
      example_wrong: Is important to study.
      example_correct: It is important to study.
      explanation: Portuguese uses impersonal constructions without a subject pronoun
        (e importante estudar = is important to study). English requires the dummy
        subject 'it' in extraposition structures (It is important to study). Portuguese
        speakers omit 'it' because their L1 does not require an overt subject in
        these constructions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of dummy 'it' with seem/appear/happen
      example_portuguese: Parece que ele esta doente.
      example_gloss: Seems that he is sick.
      example_wrong: Seems that he is sick.
      example_correct: It seems that he is sick.
      explanation: Portuguese allows verbs like 'parecer' (to seem) without a subject
        (parece que = seems that). English requires dummy 'it' as the subject with
        seem, appear, happen, and similar verbs (It seems that, It appears that, It
        happens that). Portuguese speakers transfer the subjectless construction directly,
        producing 'Seems that he is sick' instead of 'It seems that he is sick.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'it' in 'it takes / it takes me' time expressions
      example_portuguese: Leva duas horas para chegar.
      example_gloss: Takes two hours to arrive.
      example_wrong: Takes two hours to arrive.
      example_correct: It takes two hours to get there.
      explanation: Portuguese uses 'levar' (to take) without a subject to express
        time duration (leva duas horas = takes two English requires the dummy subject
        'it' in the construction 'it takes + time + to + infinitive' (It takes two
        hours to get there). Portuguese speakers omit 'it' because the Portuguese
        construction has no subject.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: Is important to study. Correct: It is important to study.'
    - 'Wrong: Seems that he is sick. Correct: It seems that he is sick.'
    - 'Wrong: Takes two hours to arrive. Correct: It takes two hours to get there.'
    why_it_happens: |
      Portuguese is a null-subject language (pro-drop), meaning verbs can appear without
      an overt subject pronoun. Sentences like 'E importante estudar' (literally:
      'Is important to study') and 'Parece que ele esta doente' (literally: 'Seems
      that he is sick') have no subject at all. English, by contrast, is a non-null-subject
      language and requires an overt subject in every finite clause. To satisfy this
      requirement, English uses the dummy pronoun 'it' in extraposition constructions:
      'It is important to study,' 'It seems that he is sick,' 'It takes two hours.'
      Portuguese speakers transfer their L1 null-subject pattern and produce subjectless
      English sentences like 'Is important to study' and 'Seems that he is sick.'
      This error is highly persistent because the null-subject parameter is one of
      the most deeply ingrained settings in L1 grammar. The error is communicatively
      significant because missing 'it' makes sentences sound incomplete and can cause
      confusion about what the subject is.
    teacher_tips:
      how_to_explain: |
        Write 'E importante estudar' on the board. Underline the verb 'E' and ask:
        'E what? What is important?' Then write 'IT is important to study.' Explain
        that English always needs a subject, even when there is no real subject — we
        use 'it' as a placeholder. Draw a simple formula on the board: IT + BE + ADJECTIVE
        + TO + VERB. Then show the same pattern with 'seem': 'IT seems that...', 'IT
        appears that...', 'IT happens that...'
      where_to_start: |
        Begin with the most common pattern: 'It is + adjective + to + infinitive.'
        Use everyday examples students can relate to: 'It is hard to learn English.'
        'It is easy to make mistakes.' 'It is important to practice.' Have students
        generate their own examples about their lives.
      sequencing: |
        Week 1: 'It is + adjective + to + infinitive' (It is important to study).
        Week 2: 'It seems/appears/happen + that clause' (It seems that...). Week 3:
        'It takes + time + to + infinitive' (It takes two hours to...). Week 4: Mixed
        practice with all three patterns. Week 5: Error correction and free production.
      exercises:
      - name: Dummy It Insertion
        type: fill-in-the-blank
        description: Provide 15 Portuguese-style subjectless sentences. Students add
          'it' and rewrite in correct English. For example, the blank in "___ is important
          to study" should be filled with "It" to produce "It is important to study."
        duration: 15
      - name: Portuguese to English Translation
        type: translation
        description: Give 10 Portuguese sentences using impersonal constructions (E
          importante..., Parece que..., Leva...). Students translate into English,
          ensuring they include dummy 'it' where required.
        duration: 15
      - name: Error Correction — Missing It
        type: error-correction
        description: Provide a paragraph with 8 sentences missing dummy 'it.' Students
          identify each error and rewrite the sentence correctly. Include a mix of
          'it is + adj + to,' 'it seems that,' and 'it takes' patterns.
        duration: 15
      - name: Pattern Sorting Game
        type: sorting
        description: Give students 20 sentence strips — 10 with correct 'it' usage
          and 10 without. Students sort into 'Correct' and 'Needs It' piles, then
          fix the incorrect ones.
        duration: 10
