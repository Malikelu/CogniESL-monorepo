  much_many:
    interference_patterns:
    - pattern: Use of 'much' with countable nouns due to Portuguese 'muito'
      example_portuguese: Eu tenho muitos livros.
      example_gloss: I have many books.
      example_wrong: I have much books.
      example_correct: I have many books.
      explanation: Portuguese muito/muitos is used with both countable and uncountable
        nouns. English distinguishes many (countable) from much (uncountable).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'many' with uncountable nouns in questions and negatives
      example_portuguese: Voce tem muito dinheiro?
      example_gloss: You have much money?
      example_wrong: Do you have many money?
      example_correct: Do you have much money?
      explanation: Portuguese 'muito' is used in all syntactic positions (affirmative,
        negative, interrogative) regardless of countability. English requires 'much'
        with uncountable nouns in all positions. Portuguese speakers overgeneralize
        'many' (the default quantifier for countable nouns) to uncountable nouns in
        questions and negatives, producing 'Do you have many money?' or 'I don't have
        many time.' This error is especially persistent because in affirmative sentences
        'a lot of' masks the distinction, so learners never encounter the much/many
        contrast until questions and negatives arise.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: I have much books. Correct: I have many books.'
    - 'Wrong: Do you have many money? Correct: Do you have much money?'
    - 'Wrong: I don''t have many time. Correct: I don''t have much time.'
    why_it_happens: 'Portuguese muito/muita/muitos/muitas is a single quantifier that
      works with both countable and uncountable nouns in all sentence types. English
      splits this into two quantifiers: many (countable) and much (uncountable). The
      problem is compounded because in affirmative sentences, English speakers often
      use ''a lot of'' for both (''I have a lot of books'' / ''I have a lot of money''),
      which hides the distinction. Portuguese speakers therefore default to ''many''
      as their go-to quantifier and overgeneralize it to uncountable nouns, especially
      in questions and negatives where ''a lot of'' is less common and the much/many
      contrast becomes visible.'
    teacher_tips:
      how_to_explain: 'Draw two columns: COUNTABLE (many) and UNCOUNTABLE (much).
        Use the ''can you count it?'' test. Then show that ''a lot of'' works for
        both in affirmative sentences, but in questions and negatives the distinction
        appears: ''Do you have much time?'' not ''Do you have many time?'''
      where_to_start: Begin with the countable/uncountable distinction using concrete
        nouns. Then introduce questions and negatives where the error surfaces.
      sequencing: 'Week 1: Many vs. much with simple nouns. Week 2: ''A lot of''
