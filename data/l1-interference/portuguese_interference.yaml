  present_perfect_usage:
    interference_patterns:
    - pattern: Use of present perfect with specific past time markers
      example_portuguese: Eu ja comi ontem.
      example_gloss: I already ate yesterday.
      example_wrong: I have already eaten yesterday.
      example_correct: I already ate yesterday.
      explanation: Portuguese uses the present perfect with specific past time markers.
        English uses the simple past with specific past time references.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Use of simple present with 'since' where English requires present perfect
      example_portuguese: Eu moro aqui desde 2020.
      example_gloss: I live here since 2020.
      example_wrong: I live here since 2020.
      example_correct: I have lived here since 2020.
      explanation: Portuguese uses the simple present tense with 'desde' (since) to
        express a state or action that began in the past and continues to the present.
        English requires the present perfect (have/has + past participle) with 'since'
        for this meaning. Portuguese speakers transfer the simple present directly,
        producing 'I live here since 2020' instead of 'I have lived here since 2020.'
        This error is extremely persistent because the Portuguese simple present +
        desde construction is the default way to express duration from past to present.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: ''I have eaten yesterday.'' Correct: ''I ate yesterday.'''
    - 'Wrong: ''I have seen him last week.'' Correct: ''I saw him last week.'''
    - 'Wrong: ''I live here since 2020.'' Correct: ''I have lived here since 2020.'''
    - 'Wrong: ''She works here since last year.'' Correct: ''She has worked here since
      last year.'''
    why_it_happens: Portuguese uses the present perfect (pretérito perfeito) for completed
      past actions, even with specific time markers. English uses the simple past
      with specific past time references. This is one of the most persistent and frequent
      errors for Portuguese learners. Additionally, Portuguese uses the simple present
      with 'desde' (since) to express states or actions continuing from past to present
      ('Eu moro aqui desde 2020' = I live here since 2020). English requires the present
      perfect with 'since' ('I have lived here since 2020'). Portuguese speakers transfer
      the simple present pattern, producing 'I live here since 2020.' Both errors
      stem from the fact that Portuguese does not restrict the present perfect to
      the same semantic contexts as English (Swan & Smith, 2001; Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'Teach two rules: (1) Specific past time = simple past (yesterday,
        last week, in 2020, ago). (2) Since + starting point = present perfect (since
        2020, since last year, since I was young). Write ''Eu moro aqui desde 2020''
        on the board. Show that Portuguese uses SIMPLE PRESENT (moro) with desde,
        but English needs HAVE + past participle. Drill: ''I have lived here since...'',
        ''She has worked here since...''.'
      where_to_start: 'Begin with the most common error: ''I have eaten yesterday''
        → ''I ate yesterday.'' Then introduce the since-rule: ''I live here since
        2020'' → ''I have lived here since 2020.'' Use timelines to show the difference
        between a completed past action (simple past) and a state/action continuing
        from past to present (present perfect with since).'
      sequencing: 'Week 1: Simple past with specific time markers (yesterday, last
        week, ago). Week 2: Present perfect with since (states and actions from past
        to now). Week 3: Present perfect for experiences (ever, never, already, yet).
        Week 4: Mixed practice — students choose simple past vs. present perfect based
        on time markers and context.'
      exercises:
      - name: Present Perfect Usage Drill
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose between present
          perfect and simple past. Include sentences with specific past time markers
          (yesterday, last week) and sentences with since/for.
        duration: 15
      - name: Since vs Ago Transformation
        type: transformation
        description: 'Give 10 sentences using ''ago'' (simple past). Students rewrite
          them using ''since'' with present perfect. For example: I moved here in
          2020 becomes I have lived here since 2020. Then give 10 sentences with ''since''
          (wrongly in simple present). Students correct to present perfect.'
        duration: 15
      - name: Time Marker Sorting
        type: matching
        description: 'Provide 20 time markers/expressions on cards. Students sort
          into two columns: Simple Past (yesterday, last week, in 2019, ago, when
          I was young) and Present Perfect (since 2020, for 3 years, already, yet,
          ever, never, just). Then write one example sentence for each card.'
        duration: 10
