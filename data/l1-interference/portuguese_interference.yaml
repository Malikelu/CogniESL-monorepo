  cant:
    interference_patterns:
    - pattern: Use of 'cannot' for prohibition where 'must not' or 'are not allowed
        to' is more precise
      example_portuguese: Voce nao pode fumar aqui.
      example_gloss: You cannot smoke here.
      example_wrong: You cannot smoke here. (intended as a rule/prohibition)
      example_correct: You must not smoke here. / You are not allowed to smoke here.
      explanation: Portuguese 'nao pode' covers both inability and prohibition with
        a single form. English 'cannot' can express both, but for formal rules, signs,
        and laws, 'must not' or 'are not allowed to' is more precise and natural.
        Portuguese speakers overuse 'cannot' for prohibition because their L1 does
        not require a distinct form.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'cannot' in contractions — spelling 'can not' as two words
      example_portuguese: Eu nao posso ir.
      example_gloss: I cannot go.
      example_wrong: I can not go.
      example_correct: I cannot go. / I can't go.
      explanation: Portuguese 'nao posso' is a single negation unit. English 'cannot'
        is written as one word in standard usage. Portuguese speakers may split it
        into 'can not' by analogy with 'do not' -> 'don't,' but 'cannot' is an exception
        — it contracts to 'can't,' not 'can not.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''You cannot park here.'' (sign) Correct: ''You must not park here.''
      / ''No parking.'''
    - 'Wrong: ''I can not swim.'' Correct: ''I cannot swim.'' / ''I can''t swim.'''
    - 'Wrong: ''She can not come today.'' Correct: ''She cannot come today.'' / ''She
      can''t come today.'''
    why_it_happens: Portuguese 'nao pode' is a single negation construction that covers
      both inability and prohibition. English splits these into 'cannot/can't' (inability)
      and 'must not / are not allowed to' (prohibition). Portuguese speakers transfer
      the broad 'nao pode' function to 'cannot,' overusing it for prohibition contexts
      where native speakers prefer 'must not.' Additionally, Portuguese negation syntax
      (nao + verb) maps onto English as 'do not + verb,' leading Portuguese speakers
      to incorrectly split 'cannot' into 'can not' by analogy with 'do not,' 'will
      not,' etc. — even though 'cannot' is an irregular one-word modal negation.
    teacher_tips:
      how_to_explain: 'Teach the distinction: ''cannot/can''t'' = inability (I can''t
        swim = I am unable to swim), ''must not'' = prohibition (You must not swim
        here = it is forbidden). For the spelling rule: ''cannot'' is always one word.
        The contraction is ''can''t'' — never ''can not'' in standard writing.'
      where_to_start: 'Begin with prohibition signs: ''No smoking'' = ''You must not
        smoke'' or ''You are not allowed to smoke.'' Then teach the spelling rule:
        ''cannot'' = one word.'
      sequencing: 'Week 1: ''Cannot'' for inability. Week 2: ''Must not'' for prohibition.
        Week 3: ''Cannot'' spelling rule (one word, not two). Week 4: Mixed practice
        with prohibition vs. inability and correct contraction usage.'
      exercises:
      - name: Cannot vs Must Not Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'cannot'
          and 'must not' based on context (inability vs. prohibition).
        duration: 15
      - name: Cannot Spelling Correction
        type: error-correction
        description: Provide 10 sentences where 'can not' is incorrectly written as
          two words. Students correct to 'cannot' or 'can't.'
        duration: 10
