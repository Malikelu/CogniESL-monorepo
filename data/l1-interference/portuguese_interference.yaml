  third_conditional:
    interference_patterns:
    - pattern: Use of simple past or conditional instead of past perfect in if-clause
      example_portuguese: Se eu tivesse estudado, eu teria passado.
      example_gloss: If I had studied, I would have passed.
      example_wrong: If I studied, I would pass.
      example_correct: If I had studied, I would have passed.
      explanation: Portuguese uses the pluperfect subjunctive (tivesse estudado) for
        past hypotheticals. English requires 'had + past participle' in the if-clause
        and 'would have + past participle' in the main clause. Portuguese speakers
        may use the simple past or the conditional form, producing 'If I studied,
        I would pass' instead of the correct third conditional form.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'would have' in the if-clause (double conditional transfer)
      example_portuguese: Se eu teria estudado, eu teria passado.
      example_gloss: If I would have studied, I would have passed.
      example_wrong: If I would have studied, I would have passed.
      example_correct: If I had studied, I would have passed.
      explanation: Portuguese allows the conditional form in both clauses of past
        hypotheticals (se eu teria estudado... eu teria passado). English strictly
        prohibits 'would have' in the if-clause of a third conditional. The if-clause
        must use the past perfect (had studied), while only the main clause uses 'would
        have.' Portuguese speakers transfer the double-conditional structure directly,
        producing 'If I would have studied, I would have passed' — one of the most
        frequently documented errors in Portuguese learner English. This error is
        particularly persistent because it is also common in some native English dialects,
        making it harder for learners to recognize as non-standard.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Use of present perfect instead of past perfect in if-clause
      example_portuguese: Se eu tenho estudado, eu teria passado.
      example_gloss: If I have studied, I would have passed.
      example_wrong: If I have studied, I would have passed.
      example_correct: If I had studied, I would have passed.
      explanation: Portuguese speakers may use the present perfect (have + past participle)
        in the if-clause by analogy with Portuguese compound tenses. Portuguese uses
        the present perfect (tem estudado) for ongoing/relevant-to-present past actions.
        English third conditional requires the simple past perfect (had studied) —
        not the present perfect — because the entire event is situated in a completed
        past timeframe. This error is less frequent but persistent at intermediate
        levels.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''If I studied, I would pass.'' (past hypothetical) Correct: ''If I
      had studied, I would have passed.'''
    - 'Wrong: ''If I would have studied, I would have passed.'' Correct: ''If I had
      studied, I would have passed.'''
    - 'Wrong: ''If I have studied harder, I would have passed.'' Correct: ''If I had
      studied harder, I would have passed.'''
    why_it_happens: Portuguese uses the pluperfect subjunctive (tivesse estudado)
      for past hypotheticals, which maps onto English 'had + past participle.' However,
      Portuguese also allows the conditional form in both clauses of past hypotheticals
      (se eu teria... eu teria), leading to the transfer error 'If I would have...
      I would have.' Additionally, Portuguese speakers may confuse the English present
      perfect with the past perfect because Portuguese compound tenses (tem + past
      participle) cover both completed and ongoing past relevance. The third conditional
      is particularly challenging because it requires a specific tense sequence (past
      perfect → would have) that has no single equivalent in Portuguese verb morphology.
    teacher_tips:
      how_to_explain: 'Teach the third conditional as a two-part structure: IF-clause
        (had + past participle) + MAIN CLAUSE (would have + past participle). Write
        the formula on the board: If + had done → would have done. Emphasize: NEVER
        put "would have" in the if-clause. Drill with regrets: ''If I had studied
        harder, I would have passed the test.'' ''If she had left earlier, she would
        have caught the train.'''
      where_to_start: 'Begin with regrets about the past: ''If I had studied harder,
        I would have passed.'' ''If I had known, I would have helped.'' Contrast with
        second conditional: ''If I had money (now), I would travel'' vs. ''If I had
        had money (then), I would have traveled.'''
      sequencing: 'Week 1: Third conditional structure (had done → would have done).
        Week 2: Contrast with second conditional (present vs. past hypothetical).
