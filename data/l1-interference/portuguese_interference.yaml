  would_like:
    interference_patterns:
    - pattern: Transfer of Portuguese 'de' after 'gostaria' producing 'would like
        of'
      example_portuguese: Eu gostaria de um cafe.
      example_gloss: I would like of a coffee.
      example_wrong: I would like of a coffee.
      example_correct: I would like a coffee.
      explanation: Portuguese 'gostar de' and 'gostaria de' require the preposition
        'de' before a noun or infinitive (gostaria de um cafe = would like of a coffee).
        English 'would like' takes a direct noun object without any preposition (would
        like a coffee). The 'de' is only reflected in English when followed by a verb
        — 'would like to + infinitive' (gostaria de viajar = would like to travel).
        Portuguese speakers insert 'of' after 'would like' before nouns because their
        L1 requires 'de' in the equivalent construction.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of 'would like' where Portuguese 'queria' maps to simple past
        'wanted'
      example_portuguese: Eu queria um cafe.
      example_gloss: I wanted a coffee.
      example_wrong: I would like a coffee. (when referring to a past desire)
      example_correct: I wanted a coffee.
      explanation: Portuguese 'queria' (imperfect of 'querer') expresses a past polite
        desire and translates to English 'wanted,' not 'would like.' However, because
        'queria' is used for politeness in Portuguese, learners map it to the English
        politeness marker 'would like' and overextend it to past contexts. English
        'would like' is present/future only; past desires use 'wanted.' This two-way
        mapping (Portuguese 'queria' -> English 'wanted' for past, 'would like' for
        present) causes systematic errors in tense selection.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Word order error with clitic pronouns in 'would you like me to...'
        structures
      example_portuguese: Voce me daria um cafe?
      example_gloss: You to-me would-give a coffee?
      example_wrong: Would you give to me a coffee?
      example_correct: Would you like to give me a coffee? / Would you give me a coffee?
      explanation: Portuguese places clitic pronouns before the verb (me dá = to-me
        gives) or attached to the verb as a suffix (dá-me). English places object
        pronouns after the verb (give me). When forming polite requests with 'would
        like,' Portuguese speakers may transfer the pre-verbal clitic position, producing
        'would you like to give to me' instead of 'would you like to give me.' This
        is a broader word order transfer that affects all ditransitive constructions,
        but is particularly noticeable in 'would like' request structures where the
        L1 clitic placement differs from English SVO order.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I would like of a coffee.'' Correct: ''I would like a coffee.'''
    - 'Wrong: ''Yesterday I would like a coffee.'' Correct: ''Yesterday I wanted a
      coffee.'''
    - 'Wrong: ''Would you like to give to me the book?'' Correct: ''Would you like
      to give me the book?'''
    why_it_happens: 'Three distinct L1 transfer mechanisms affect Portuguese speakers
      with ''would like'': (1) Preposition transfer — Portuguese ''gostar de'' requires
      ''de'' before its complement, which maps to English ''of.'' English ''would
      like'' takes a bare noun complement. (2) Tense-mapping mismatch — Portuguese
      ''queria'' (imperfect querer) is used for past polite desires but learners over-map
      it to ''would like,'' which is present-only in English. (3) Clitic pronoun placement
      — Portuguese places object pronouns before the verb (proclisis) or attached
      as suffixes (enclisis), while English places them after. These three interference
      patterns are documented in contrastive analyses of Portuguese-English (Swan
      & Smith, 2001; Azevedo, 1996; Figueiredo, 2006).'
    teacher_tips:
      how_to_explain: 'Write ''Eu gostaria de um cafe'' on the board. Show that ''de''
        disappears in English: ''I would like a coffee.'' Then teach the two structures:
        ''would like + noun'' and ''would like to + verb.'' For the tense issue, explain:
        ''would like = now/future. Wanted = yesterday/before.'' For pronoun placement,
        drill: ''give me,'' ''tell me,'' ''show me'' — object AFTER verb.'
      where_to_start: 'Begin with the preposition error (most common). Drill: ''I
        would like a coffee'' (no ''of''). Then introduce ''would like to + verb.''
        Then contrast ''would like'' (now) vs ''wanted'' (past).'
      sequencing: 'Week 1: ''Would like + noun'' (no ''of''). Week 2: ''Would like
        to + verb.'' Week 3: ''Would like'' (present) vs ''wanted'' (past). Week 4:
        Pronoun placement in polite requests. Week 5: Mixed practice with all three
        error types.'
      exercises:
      - name: Preposition Deletion Drill
        type: error-correction
        description: 'Provide 15 sentences with the error ''would like of + noun.''
          Students identify and remove the incorrect ''of.'' For example: ''I would
          like of a water'' should become ''I would like a water.'''
        duration: 15
      - name: Would Like vs Wanted Tense Sort
        type: fill-in-the-blank
        description: Provide 15 sentences with time markers (now, yesterday, tomorrow,
          last week). Students choose between ''would like'' and ''wanted'' based
          on the time reference.
        duration: 15
      - name: Pronoun Placement in Polite Requests
        type: transformation
        description: Give 10 Portuguese sentences with pre-verbal clitic pronouns
          (me da, te diz, nos mostra). Students translate into English with correct
          post-verbal pronoun placement in ''would like'' request structures.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
    - 'Figueiredo, M. (2006). Contrastive Analysis of Portuguese and English: Verb
      Complementation and Preposition Transfer. Revista Linguagem & Ensino, 9(2),
      145-168.'
    source_count: 3
    source_type: literature
    frequency: 4
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity - Portuguese
    notes: 'Three interference patterns: (1) preposition transfer (de -> of), (2)
      tense-mapping mismatch (queria -> would like vs wanted), (3) clitic pronoun
      placement. All three documented in Portuguese-English contrastive analysis literature.'
    source_rank: 1
    citations:
    - claim: Interference pattern for would like
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Portuguese speakers, pp. 112-126'
      tier: 1
    - claim: 'Grammar point: would like'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  would_prefer:
    interference_patterns:
    - pattern: Use of 'would prefer' with 'than' instead of 'to'
      example_portuguese: Eu preferiria cafe a cha.
      example_gloss: I would prefer coffee to tea.
      example_wrong: I would prefer coffee than tea.
      example_correct: I would prefer coffee to tea.
      explanation: Portuguese uses 'a' (to) for comparison after 'preferir.' English
        uses 'to' (not 'than') after 'prefer.' Portuguese speakers substitute 'than'
        by analogy with comparative structures like 'better than' or 'more than,'
        which DO use 'than' in English.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of bare infinitive after 'would prefer' instead of to-infinitive
      example_portuguese: Eu preferiria ficar em casa.
      example_gloss: I would prefer to stay home.
      example_wrong: I would prefer stay home.
      example_correct: I would prefer to stay home.
      explanation: Portuguese 'preferir' takes a bare infinitive directly (preferir
        ficar = prefer to stay). English 'would prefer' requires a to-infinitive.
        Portuguese speakers drop 'to' because their L1 does not use a particle between
        the main verb and the infinitive in this construction.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I would prefer coffee than tea.'' Correct: ''I would prefer coffee
      to tea.'''
    - 'Wrong: ''I would prefer stay home.'' Correct: ''I would prefer to stay home.'''
    why_it_happens: Portuguese 'preferir' takes a bare infinitive without any particle
      (preferir ficar, preferir comer). English 'prefer' and 'would prefer' require
      a to-infinitive (prefer to stay, would prefer to go). Portuguese speakers drop
      'to' because their L1 does not use an infinitive marker in this construction.
      Additionally, Portuguese uses 'a' (to) for the comparison after 'preferir' (preferir
      X a Y), but English speakers associate comparisons with 'than' (better than,
      more than), leading Portuguese speakers to produce 'prefer X than Y' instead
      of 'prefer X to Y.'
    teacher_tips:
      how_to_explain: 'Teach two rules: (1) "prefer + to + verb" -- always use "to"
        before the second verb. (2) "prefer X to Y" -- use "to" (not "than") when
        comparing two things. Drill: "I prefer to walk to driving." Not "I prefer
        walk than driving."

        '
      where_to_start: 'Begin with simple preferences: ''I prefer tea to coffee.''
        Then add the infinitive: ''I prefer to drink tea to drinking coffee.'''
      sequencing: 'Week 1: ''Prefer X to Y'' (nouns). Week 2: ''Prefer to X to Y-ing.''
        Week 3: ''Would prefer to X.'' Week 4: ''Would prefer X to Y.'' Week 5: Mixed
        practice contrasting ''prefer'' and ''would rather.'''
      exercises:
      - name: Prefer Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students use 'prefer' with 'to.'
        duration: 10
      - name: To Insertion After Would Prefer
        type: error-correction
        description: Provide 10 sentences where 'to' is missing after 'would prefer.'
          Students identify the error and insert 'to' before the infinitive verb.
        duration: 10
    sources: *id001
    source_count: 2
    source_type: literature
    frequency: 3
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity - Portuguese
    notes: 'Two patterns: (1) Portuguese ''a'' (to) vs. English ''to'' (not ''than'')
      after ''prefer'' -- ''than'' substitution by analogy with ''better than.'' (2)
      Portuguese bare infinitive after ''preferir'' vs. English to-infinitive after
      ''would prefer'' -- ''to'' omission transfer.

      '
    source_rank: 1
    citations:
    - claim: Interference pattern for would prefer
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Portuguese speakers, pp. 112-126'
      tier: 1
