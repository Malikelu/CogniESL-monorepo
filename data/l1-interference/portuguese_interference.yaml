  however:
    interference_patterns:
    - pattern: Use of 'however' without proper punctuation (comma splice)
      example_portuguese: Eu quero ir, no entanto, estou cansado.
      example_gloss: I want to go, however, I am tired.
      example_wrong: I want to go, however, I am tired.
      example_correct: I want to go; however, I am tired. / I want to go. However, I am tired.
      explanation: Portuguese 'no entanto' can appear mid-sentence surrounded by commas
        without special punctuation. English 'however' as a conjunctive adverb requires
        a semicolon or period before it — never just a comma (comma splice).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'but' at sentence start where 'however' is needed
      example_portuguese: Mas eu acho que devemos ir.
      example_gloss: But I think we should go.
      example_wrong: But, I think we should go.
      example_correct: However, I think we should go.
      explanation: Portuguese 'mas' (but) can begin a sentence followed by a comma.
        English 'but' cannot start a formal sentence — 'however' is required. Portuguese
        speakers transfer the sentence-initial 'mas' pattern to 'but' in English, producing
        'But, I think...' instead of 'However, I think...'. This is a register and
        punctuation transfer error.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I want to go, however, I am tired.'' Correct: ''I want to go; however, I am tired.'' / ''I want to go. However, I am tired.'''
    - 'Wrong: ''But, I think we should go.'' Correct: ''However, I think we should go.'''
    why_it_happens: 'Portuguese ''no entanto'' can appear mid-sentence with commas alone,
      while English ''however'' as a conjunctive adverb requires a semicolon or period
      before it (comma splice error). Additionally, Portuguese ''mas'' (but) can begin
      a sentence with a comma, but English ''but'' cannot start a formal sentence —
      ''however'' is required. Portuguese speakers transfer both patterns: they use
      commas with ''however'' and start sentences with ''but'' where ''however'' is
      needed.'
    teacher_tips:
      how_to_explain: 'Teach the ''semicolon rule'': ''however'' needs a semicolon
        BEFORE it and a comma AFTER it. Never just commas. Also teach: ''But'' cannot
        start a formal sentence — use ''However,'' instead.'
      where_to_start: 'Begin with the punctuation rule: semicolon + however + comma.
        Then teach sentence-initial ''However,'' vs. sentence-initial ''But,'' (informal
        only).'
      sequencing: 'Week 1: Semicolon + however punctuation. Week 2: Sentence-initial
        ''However,'' vs. ''But,'' (register). Week 3: Mid-sentence ''however'' (commas
        on both sides, semicolon before). Week 4: Mixed practice with error correction.'
      exercises:
      - name: However Punctuation Drill
        type: error-correction
        description: Provide 10 sentences with incorrect 'however' punctuation (comma
          splices). Students correct them using semicolons or periods.
        duration: 15
      - name: But to However Transformation
        type: sentence-rewrite
        description: Give 10 sentences starting with 'But,' in informal register. Students
          rewrite them formally using 'However,' with correct punctuation.
        duration: 15
