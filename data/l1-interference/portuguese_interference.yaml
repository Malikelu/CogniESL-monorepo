    notes: 'Portuguese has 243 GPs total. This entry covers the be_about_to_due_to grammar point. Two independent sources:
      contrastive teaching reference (Swan & Smith 2001) and structural linguistics reference (Azevedo 1996). Patterns cover
      (1) be about to confused with be going to due to Portuguese ir + infinitive covering all near-future meanings, (2) be
      about to used with future time adverbials (immediacy constraint violation), (3) due to + finite clause transfer from
      Portuguese devido a + clause, (4) due to in adverbial position where English prescriptively requires because of. The
      grammar point combines two unrelated structures that share the word to — both are covered here since they are taught
      together in the curriculum.'
  be_going_to:
    interference_patterns:
    - Portuguese uses the periphrastic future "ir + infinitive" (e.g. "Vou falar" = "I'm going to speak") which structurally
      mirrors English "be going to" but uses a bare infinitive after "ir" rather than a gerund-participle. Portuguese speakers
      transfer this pattern, producing errors with bare infinitive after "going to" — e.g. "I'm going to go to the store"
      becomes "I'm going to go" (acceptable) but also "I'm going to speak with her" becomes "I'm going to speak with her"
      (also acceptable — the error surfaces when the main verb is "go" itself, producing "I'm going to to the store" by doubling
      the "to", or "I go to speak" by dropping the auxiliary entirely). The most frequent surface error is omission of the
      auxiliary "be" — producing "I going to speak" or "She going to come" — because Portuguese "ir" is a fully conjugated
      verb that does not require an auxiliary, and the Portuguese present tense "vou/ vai/ vamos" can be perceived as a single
      word mapping onto English "going to" as a single chunk, leading to auxiliary drop.
    - Portuguese "ir + infinitive" covers a broader semantic range than English "be going to" — it expresses scheduled future
      ("Amanhã vou viajar" = "Tomorrow I'm going to travel"), imminent action, and even habitual future, while English "be
      going to" is restricted to intention and prediction-with-evidence. Portuguese speakers overextend "be going to" to contexts
      where English requires "will" (spontaneous decisions, promises, predictions without evidence) or present simple (schedules,
      timetables). This produces errors like "The train is going to leave at 8 PM" (for scheduled events — English prefers
      "The train leaves at 8 PM"), "I'm going to help you right now" (spontaneous decision — English prefers "I'll help you"),
      and "I think it's going to rain" (acceptable, but overgeneralized to "I'm going to be 30 next year" where English requires
      "I'll be 30 next year"). The overextension is systematic and persists because Portuguese "ir + infinitive" is the default
      future expression in spoken Portuguese, used far more frequently than the simple future tense (futuro do presente).
    - Portuguese pro-drop allows the subject to be omitted in "ir + infinitive" constructions ("Vou sair" = "[I] am going
      to leave"), and Portuguese speakers transfer this to English, producing subjectless sentences like "Going to the store"
      or "Is going to rain" in contexts where the subject is required in English. Additionally, Portuguese allows "ir" to
      be used with a null subject even in formal writing, making this transfer particularly persistent in written English.
      The error is compounded by the fact that English "be going to" in rapid speech is often reduced to "gonna", which Portuguese
      learners may perceive as a single word and reproduce as "I gonna go" — dropping the auxiliary "be" entirely.
    why_it_happens: Portuguese expresses the future primarily through the periphrastic construction "ir (conjugated) + bare
      infinitive" — a single-verb structure that does not require an auxiliary verb. English "be going to" is a two-element
      auxiliary structure (be + going + to-infinitive) that requires subject-verb agreement on "be" and uses a to-infinitive
      (not bare infinitive) after "going". The structural mismatch produces three error types — (1) auxiliary drop ("I going
      to" from Portuguese "vou" perceived as a single chunk), (2) overextension of "be going to" to all future contexts because
      Portuguese "ir + infinitive" is the default spoken future with no register or semantic restrictions, and (3) subject
      omission from Portuguese pro-drop transfer. The errors are deeply persistent because Portuguese "ir + infinitive" is
      acquired before age 3 and is the dominant future expression in spoken Portuguese (used 5-10x more than the synthetic
      future tense). The auxiliary drop error is particularly resistant to correction because English "gonna" in natural speech
      reinforces the perception that "going to" is a single lexical item that does not require a separate auxiliary.
    teacher_tips:
      how_to_explain: Use a three-column contrastive chart — Portuguese "ir + infinitive" structure → Literal English transfer
        (wrong) → Correct English form. Emphasize that Portuguese "ir" is ONE WORD (vou, vai, vamos) but English "be going
        to" requires THREE elements (am/is/are + going + to). Use color-coding — highlight "be" in red to make it visually
        salient. For the semantic overextension, create a future-expression decision tree — intention/prediction-with-evidence
        → "be going to"; spontaneous decision/promise → "will"; schedule/timetable → present simple. For pro-drop, emphasize
        that English ALWAYS requires an explicit subject (except in imperatives).
      where_to_start: Start with the auxiliary drop error since it is the most visible and the most resistant to correction.
        Use a "find the missing word" exercise with sentences like "I going to eat" and "She going to come" — students must
        insert the correct form of "be". Then move to the semantic overextension using the future-expression decision tree.
        Finally, address pro-drop by having students identify and fix subjectless sentences.
      exercises:
      - name: Auxiliary insertion drill
        type: drill
        description: Provide 20 sentences with auxiliary drop errors typical of Portuguese transfer (e.g. "I going to study
          tonight", "She going to travel next week", "They going to buy a car"). Students must insert the correct form of
          "be" (am/is/are). Time pressure to build automaticity. Include first, second, and third person singular and plural.
        duration: 10
      - name: Future expression decision tree
        type: practice
        description: Give students 20 scenarios. For each, they must decide whether to use "be going to", "will", or present
          simple. Include intention ("I bought a new dress — I ___ wear it tonight"), spontaneous decision ("The phone is
          ringing — I ___ answer it"), schedule ("The flight ___ depart at 6 PM"), and prediction-with-evidence ("Look at
          those clouds — it ___ rain"). Discuss answers as a class, emphasizing that Portuguese "ir + infinitive" covers ALL
          these contexts but English splits them.
        duration: 20
      - name: Portuguese-to-English future translation
        type: drill
        description: Give 15 Portuguese sentences using "ir + infinitive" in various contexts (intention, schedule, spontaneous,
          prediction). Students translate each into correct English, choosing the appropriate future expression for each context.
          Include "Vou estudar amanhã" (intention → "I'm going to study tomorrow"), "O trem vai sair às 8" (schedule → "The
          train leaves at 8"), "Vou te ajudar agora" (spontaneous → "I'll help you right now").
        duration: 15
      - name: Error correction — be going to overextension
        type: error-correction
        description: Provide 15 sentences with Portuguese-style "be going to" overextension errors (e.g. "I'm going to be
          30 next year" → "I'll be 30 next year", "The movie is going to start at 9 PM" → "The movie starts at 9 PM", "I'm
          going to help you with that bag" → "I'll help you with that bag"). Students identify the error type and correct
          each sentence.
        duration: 15
      - name: Pro-drop repair — subject insertion
        type: error-correction
        description: Provide 10 subjectless sentences from Portuguese pro-drop transfer (e.g. "Going to the store after work",
          "Is going to rain later", "Going to visit my grandmother this weekend"). Students must add the correct subject and
          ensure the full "be going to" structure is present.
        duration: 10
    examples:
    - 'Wrong: ''I going to study tonight.'' (Portuguese: ''Vou estudar hoje à noite.'' — vou is one word, no auxiliary) Correct:
      ''I''m going to study tonight.'' (three elements: I + am + going to study)'
    - 'Wrong: ''She going to travel next week.'' (Portuguese: ''Ela vai viajar na semana que vem.'' — vai is one word) Correct:
      ''She''s going to travel next week.'' (She + is + going to travel)'
    - 'Wrong: ''The train is going to leave at 8 PM.'' (Portuguese: ''O trem vai sair às 20h.'' — ir + infinitive used for
      schedules) Correct: ''The train leaves at 8 PM.'' (present simple for timetabled events)'
    - 'Wrong: ''I''m going to help you right now.'' (Portuguese: ''Vou te ajudar agora.'' — ir + infinitive for spontaneous
      decisions) Correct: ''I''ll help you right now.'' (will for spontaneous decisions)'
    - 'Wrong: ''Going to the store after work.'' (Portuguese: ''Vou à loja depois do trabalho.'' — pro-drop allows subject
      omission) Correct: ''I''m going to the store after work.'' (English requires explicit subject)'
    - 'Wrong: ''I gonna call you later.'' (Portuguese: ''Vou te ligar depois.'' — vou perceived as mapping to gonna) Correct:
      ''I''m going to call you later.'' / ''I''m gonna call you later.'' (informal but requires auxiliary)'
    sources:
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on verbal periphrases
      — describes the Portuguese ir + infinitive future construction, its structural properties, and its distribution as the
      dominant spoken future form, providing the structural basis for L1 transfer to English be going to).'
    - Mason, M. (1996). The role of ser and estar in the acquisition of English by Portuguese speakers. Hispania, 79(3), 513-524.
      (Documents systematic auxiliary errors in English production by Portuguese L1 speakers, including auxiliary drop patterns
      in periphrastic constructions that transfer from Portuguese single-verb structures).
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents future expression transfer errors including ir + infinitive → be going to overextension,
      auxiliary omission, and pro-drop transfer in future constructions).'
