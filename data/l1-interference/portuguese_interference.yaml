  can_cant:
    interference_patterns:
    - Portuguese speakers insert the preposition 'de' before the infinitive after 'can', producing "I can de go" or "I can
      to go" by transfer from Portuguese 'poder' + bare infinitive. In Portuguese, 'poder' takes a bare infinitive ('Eu posso
      ir'), but the phonological similarity between Portuguese 'de' and English 'to' leads to hypercorrect insertion of 'to'
      after modals. This produces errors like "I can to swim", "She can to speak English", "They can to come tomorrow" — all
      ungrammatical in English where modals take bare infinitives without 'to'.
    - Portuguese speakers overuse 'can' to express permission, ability, and possibility in contexts where English requires
      'may', 'be able to', or 'might'. Portuguese 'poder' covers all three semantic domains, so learners produce "Can I go
      to the bathroom?" (seeking permission — English prefers 'May I...'), "I can speak three languages" (ability — acceptable
      but 'I am able to...' is more precise), and "It can rain tomorrow" (possibility — English prefers 'It might/may rain').
      The overextension of 'can' to all 'poder' contexts is one of the most frequent and visible errors for Portuguese speakers.
    - Portuguese speakers produce "I can't to" constructions by transferring Portuguese negation patterns. In Portuguese,
      'não poder' + infinitive ('Eu não posso ir') does not require any particle between the negated modal and the infinitive.
      English also uses bare infinitive after "can't", but learners sometimes insert 'to' by analogy with other verb patterns
      ("I want to go" → *"I can't to go"). Additionally, Portuguese speakers may produce "I don't can" by transferring Portuguese
      negation with 'não' + verb (where 'não' alone negates, without do-support), leading to errors like "I don't can swim"
      instead of "I can't swim".
    - Portuguese speakers confuse 'can' with 'know how to' because Portuguese uses 'saber' for knowledge-based ability and
      'poder' for permission/possibility, but the distinction is not always maintained in colloquial speech. This leads to
      errors like "I can swim" (when meaning "I know how to swim" — Portuguese 'Eu sei nadar') and "I can the answer" (transfer
      of Portuguese 'Eu sei a resposta' where 'saber' = 'know'). The conflation of 'can' and 'know' is particularly persistent
      in beginner-to-intermediate learners.
    why_it_happens: Portuguese 'poder' is a semi-modal verb that takes a bare infinitive directly ('posso ir' = 'I can go'),
      which is structurally similar to English modal + bare infinitive. However, the similarity is superficial. Portuguese
      'poder' covers a wider semantic range than English 'can' - it expresses ability, permission, possibility, and epistemic
      modality, all in one verb. English splits these across 'can', 'may', 'might', 'be able to', and 'be allowed to'. Portuguese
      learners overextend 'can' to all 'poder' contexts because it is the default L1 transfer equivalent. The 'to'-insertion
      error arises from the fact that most other English verb patterns require 'to' before the infinitive (want to, need to,
      like to), and learners overgeneralize this pattern to modals. The "I don't can" error transfers Portuguese negation
      structure where 'nao' directly precedes the verb without do-support. These errors are deeply persistent because 'poder'
      is one of the most frequently used verbs in Portuguese, acquired in early childhood, and its patterns are fully automatized.
    teacher_tips:
      how_to_explain: 'Use a three-column chart showing Portuguese ''poder'' context, wrong English transfer, and correct
        English form. Column 1: ability (''posso nadar''), permission (''posso ir?''), possibility (''pode chover''). Column
        2: "I can to swim", "Can I go?", "It can rain". Column 3: "I can swim", "May I go?", "It might rain". For the bare
        infinitive rule, use the mnemonic "MODAL + BARE = ZERO TO" - after can/could/will/would/shall/should/may/might/must,
        there is NO ''to''. For negation, show that Portuguese ''nao + verb'' maps to English "verb + not" (can -> can''t)
        NOT "don''t + verb".'
      where_to_start: Start with the bare infinitive rule (NO 'to' after can) since it is the most visible and easily testable
        error. Use the "MODAL + BARE = ZERO TO" mnemonic. Then move to the semantic overextension of 'can' vs 'may' vs 'be
        able to'. Finally, address the negation error "I don't can" which is common in beginners.
      exercises:
      - name: Bare infinitive drill — modal + verb
        type: drill
        description: Provide 20 gapped sentences where students must choose between the bare infinitive and the to-infinitive
          after modals. Include can, could, will, would, must, should, may, might. Examples — "She can ___ (swim)", "They
          must ___ (leave)", "He should ___ (study)". Time pressure to build automaticity. Include distractors with other
          verbs that DO take 'to' (want, need, like) to sharpen the contrast.
        duration: 15
      - name: Can vs May vs Be able to — semantic choice
        type: practice
        description: Give students 15 scenarios. For each, they must decide whether 'can', 'may', or 'be able to' is most
          appropriate. Example — "Asking teacher for permission to leave" → "May I leave?" (not "Can I leave?"). "Describing
          a skill you have" → "I can swim" / "I am able to swim". "Talking about future possibility" → "It might rain" (not
          "It can rain"). Discuss answers as a class, emphasizing the Portuguese 'poder' overextension.
        duration: 20
      - name: Error correction — Portuguese modal transfer
        type: error-correction
        description: Provide 20 sentences with Portuguese-style modal errors including 'to'-insertion (*"I can to go"), semantic
          overextension (*"Can I go?" for permission in formal contexts), negation errors (*"I don't can"), and can/know confusion
          (*"I can the answer"). Students identify the error type, explain why it is wrong, and rewrite each sentence correctly.
        duration: 20
      - name: Portuguese-to-English modal translation
        type: drill
        description: Give 15 Portuguese sentences using 'poder' in various contexts — ability ('Eu posso nadar'), permission
          ('Posso ir?'), possibility ('Pode chover'), negation ('Eu não posso ir'). Students translate each, choosing the
          correct English modal or semi-modal for the context. Include 'saber' sentences ('Eu sei nadar', 'Eu sei a resposta')
          to practice the can/know distinction.
        duration: 15
      - name: Modal negation transformation
        type: drill
        description: Give 15 affirmative sentences with modals. Students must negate each one correctly. Include can, could,
          will, would, must, should, may, might. Then give 15 negated Portuguese sentences with 'não poder' and have students
          translate, focusing on correct English negation (can't, couldn't) rather than "don't can".
        duration: 10
      - name: Writing — modal verb paragraph
        type: composition
        description: Students write a 100-word paragraph about their abilities, what they are allowed to do at school/work,
          and what might happen tomorrow's weather. They must use at least 6 different modals/semi-modals correctly. Then
          they exchange paragraphs and check for Portuguese-style modal errors.
        duration: 20
    examples:
    - 'Wrong: "I can to swim." (Portuguese: "Eu posso nadar." - poder + bare infinitive, but learner adds ''to'' by analogy
      with want/need/like + to) Correct: "I can swim."'
    - 'Wrong: "Can I go to the bathroom?" (seeking permission - Portuguese: "Posso ir ao banheiro?" - poder covers permission)
      Correct: "May I go to the bathroom?" (formal) / "Can I go to the bathroom?" (informal)'
    - 'Wrong: "It can rain tomorrow." (Portuguese: "Pode chover amanha." - poder covers possibility) Correct: "It might rain
      tomorrow." / "It may rain tomorrow."'
    - 'Wrong: "I don''t can swim." (Portuguese: "Eu nao posso nadar." - nao + verb without do-support) Correct: "I can''t
      swim."'
    - 'Wrong: "I can the answer." (Portuguese: "Eu sei a resposta." - saber = know, but learner conflates with poder = can)
      Correct: "I know the answer."'
    - 'Wrong: "She can to speak three languages." (Portuguese: "Ela pode falar tres linguas.") Correct: "She can speak three
      languages." / "She is able to speak three languages."'
    sources:
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press.'
    - Mason, M. (1996). The role of ser and estar in the acquisition of English by Portuguese speakers. Hispania, 79(3), 513-524.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press.'
