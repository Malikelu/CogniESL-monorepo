  pronoun_object_before_verb:
    interference_patterns:
    - pattern: Proclitic object pronoun before the verb in declarative and imperative sentences
      example_portuguese: Me diz a verdade.
      example_gloss: Me say the truth.
      example_wrong: Me say the truth.
      example_correct: Tell me the truth.
      explanation: Portuguese strongly favors proclisis — object pronouns appear before
        the verb (me diz, te ama, nos viu). English places object pronouns after the
        verb (tell me, love us, saw us). Portuguese speakers transfer proclisis to English,
        producing "Me say" instead of "Tell me" or "He me saw" instead of "He saw me."
        This is one of the most frequent and persistent L1 transfer errors for Portuguese
        ESL learners (Swan & Smith 2001).
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Object pronoun incorrectly placed before the verb with phrasal verbs and multi-word constructions
      example_portuguese: Me liga de volta amanha.
      example_gloss: Me call back tomorrow.
      example_wrong: Me call back tomorrow.
      example_correct: Call me back tomorrow.
      explanation: Portuguese clitic pronouns precede the verb regardless of whether
        the verb is simple or part of a phrasal/multi-word construction. In English,
        object pronouns must go between the verb and particle in separable phrasal
        verbs (call me back, not "me call back" or "call back me"). Portuguese speakers
        transfer the pre-verbal pronoun position, producing "Me call back" instead of
        "Call me back." Azevedo (1996) documents that Portuguese clitic placement is
        strictly pre-verbal in most syntactic environments, which directly conflicts
        with English phrasal verb pronoun placement rules.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: Me say the truth. Correct: Tell me the truth.'
    - 'Wrong: He me saw at the store. Correct: He saw me at the store.'
    - 'Wrong: Me call back tomorrow. Correct: Call me back tomorrow.'
    - 'Wrong: She it gave to me. Correct: She gave it to me.'
    why_it_happens: 'Portuguese is a proclitic language — object pronouns (me, te, se,
      nos, o, a, os, as) are placed before the verb in the vast majority of syntactic
      contexts. This is called proclisis. English is enclitic — object pronouns follow
      the verb or preposition. The difference is systematic and applies across all
      verb types: simple verbs (diz-me → tell me), compound tenses (tinha-me dito →
      had told me), and infinitives (para me dizer → to tell me). Portuguese speakers
      transfer the proclitic pattern because it is the default, unmarked word order
      in their L1. Additionally, English separable phrasal verbs require the pronoun
      between the verb and particle (call me back), which has no equivalent structure
      in Portuguese. The combination of proclisis transfer and lack of phrasal verb
      awareness produces compound errors like "Me call back" instead of "Call me back."
      Swan & Smith (2001) identify this as a high-frequency error for Portuguese learners
      at all proficiency levels. Azevedo (1996) confirms that Portuguese clitic placement
      is strictly pre-verbal in declarative, imperative, and infinitive contexts.'
    teacher_tips:
      how_to_explain: 'Write a Portuguese sentence on the board: "Me diz a verdade."
        Underline "me" and show it comes BEFORE the verb. Then write the English
        equivalent: "Tell me the truth." Show that "me" goes AFTER. Use a simple rule:
        "In English, the person comes AFTER the action. Tell ME. Give IT to HER. Saw
        HIM." For phrasal verbs, add: "If there are two parts (call back, pick up),
        the person goes in the middle: Call ME back. Pick HER up."'
      where_to_start: 'Begin with high-frequency imperative and simple past/present
        verbs: tell me, give me, show me, saw him, called her. Then introduce phrasal
        verbs: call me back, pick her up, turn it off.'
      sequencing: 'Week 1: Object pronouns after simple verbs (tell me, saw him, gave
        her). Week 2: Object pronouns after prepositions (to her, for us, with them).
        Week 3: Pronouns with separable phrasal verbs (call me back, pick it up). Week
        4: Negative imperatives (Don''t tell me) and questions (Did you see him?). Week
        5: Mixed practice with all three contexts.'
      exercises:
      - name: Pronoun Placement Translation Drill
        type: translation
        description: Provide 15 Portuguese sentences with proclitic pronouns (Me diz,
          Te ama, Nos viu, Me liga de volta). Students translate into English, placing
          the pronoun correctly after the verb or between phrasal verb parts.
        duration: 15
      - name: Phrasal Verb Pronoun Insertion
        type: fill-in-the-blank
        description: Provide 10 sentences with separable phrasal verbs where the object
          pronoun is missing. Students insert the pronoun in the correct position (between
          verb and particle). Example with answer key provided.
        duration: 10
      - name: Error Correction — Pronoun Position
        type: error-correction
        description: Provide 15 sentences with Portuguese-influenced pronoun placement
          errors (Me say the truth, He me saw, She it gave to me, Me call back). Students
          identify and correct each error.
        duration: 15
