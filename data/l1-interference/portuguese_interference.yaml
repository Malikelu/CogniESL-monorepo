  possessive_pronouns:
    interference_patterns:
    - pattern: Use of definite article before possessives
      example_portuguese: O meu carro e novo.
      example_gloss: The my car is new.
      example_wrong: The my car is new.
      example_correct: My car is new.
      explanation: Portuguese uses definite articles before possessive pronouns (o
        meu, a sua, o nosso). English never uses 'the' before possessives.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Omission of possessive pronoun before body parts
      example_portuguese: Eu quebrei o braco.
      example_gloss: I broke the arm.
      example_wrong: I broke the arm.
      example_correct: I broke my arm.
      explanation: Portuguese uses the definite article with body parts when the possessive
        is clear from context. English requires a possessive pronoun.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''The my car is new.'' Correct: ''My car is new.'''
    - 'Wrong: ''I broke the arm.'' Correct: ''I broke my arm.'''
    - 'Wrong: ''She washed the hands.'' Correct: ''She washed her hands.'''
    why_it_happens: 'Portuguese grammar requires definite articles before possessive
      pronouns: ''o meu livro'' (the my book), ''a sua casa'' (the your house). This
      is a fundamental structural difference from English, where possessives stand
      alone. Additionally, Portuguese uses the definite article with body parts when
      the possessor is clear from context (Eu quebrei o braco = I broke the arm),
      while English requires a possessive pronoun (I broke my arm).'
    teacher_tips:
      how_to_explain: 'Write ''o meu livro'' on the board. Cross out ''o.'' Write
        ''my book.'' State the rule: ''In English, possessives NEVER have ''the''
        before them.'' For body parts, show that English always needs a possessive:
        ''my arm,'' ''her hands,'' ''his leg.'''
      where_to_start: 'Begin with the possessive + article error. Have students describe
        their possessions: ''My car, my house, my family.'' No ''the.'''
      sequencing: 'Week 1: Possessives without ''the.'' Week 2: Possessives with body
        parts. Week 3: All possessive pronouns. Week 4: Mixed practice.'
      exercises:
      - name: Possessive Article Deletion
        type: error-correction
        description: Provide 15 sentences with 'the' incorrectly placed before possessives.
          Students remove the article.
        duration: 15
      - name: Body Part Possessive Drill
        type: transformation
        description: Give 10 Portuguese sentences with body parts and articles. Students
          translate using possessives.
        duration: 15
