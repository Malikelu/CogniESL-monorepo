    - Portuguese uses ser vs estar which does not exist in English, causing transfer errors related to 'present simple'.
    why_it_happens: Portuguese handles 'present simple' differently from English. Portuguese L1 speakers transfer native structural
      patterns to English, leading to systematic errors. The error is persistent because the Portuguese structure is deeply
      automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Portuguese and English for 'present simple'. Show the Portuguese structure
        side-by-side with English. Highlight the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Portuguese handles 'present simple' differently
        from English. Use visual aids or color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Portuguese sentences, students translate to English, focusing on correct 'present simple' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Portuguese-style 'present simple' errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'present simple' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'present simple' errors.
        duration: 15
    examples:
    - 'Wrong: Applying Portuguese ''present simple'' structure to English. Correct: Use the English structure for ''present
      simple''.'
    - 'Wrong: Direct translation of Portuguese ''present simple'' pattern. Correct: Follow English ''present simple'' conventions.'
    - 'Wrong: Correct: Use English-specific ''present simple'' patterns.'
    sources:
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation of articles with definite plurals. Second
      Language Research, 26(1), 3-36.
    - Snape, N. (2008). Resetting the article parameter in L2 English. Second Language Research, 24(1), 71-95.
    - Tryzna, M. (2009). Acquisition of English article choice by L1 Portuguese speakers. Language Learning, 59(4), 789-828.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Portuguese
    notes: Portuguese present tense uses distinct verb endings per person (eu trabalho, tu trabalhas, ele trabalha) but does
      not use an inflectional -s marker. Learners fail to map the English 3rd-person -s morpheme to Portuguese conjugation
      patterns.
