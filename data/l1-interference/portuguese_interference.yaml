  articles:
    interference_patterns:
    - pattern: Omission of indefinite article before singular countable nouns
      example_portuguese: Eu tenho cachorro.
      example_gloss: I have dog.
      example_wrong: I have dog.
      example_correct: I have a dog.
      explanation: Portuguese can use bare singular nouns in informal speech. English
        requires a/an.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Overuse of definite article with abstract nouns
      example_portuguese: A vida e bela.
      example_gloss: The life is beautiful.
      example_wrong: The life is beautiful.
      example_correct: Life is beautiful.
      explanation: Portuguese requires the definite article before abstract nouns.
        English uses zero article.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: I have dog. Correct: I have a dog.'
    - 'Wrong: The life is beautiful. Correct: Life is beautiful.'
    why_it_happens: Portuguese and English article systems differ in their fundamental
      logic. Portuguese uses articles to mark definiteness, specificity, and grammatical
      gender across virtually all noun phrases.
    teacher_tips:
      how_to_explain: 'Use a contrastive approach: write Portuguese sentences on the
        left and their English equivalents on the right.'
      where_to_start: 'Begin with the most basic rule: English ALWAYS needs a word
        before singular countable nouns.'
      sequencing: 'Week 1: Indefinite article. Week 2: Definite vs. zero article.
        Week 3: Zero article with proper nouns. Week 4: Review.'
      exercises:
      - name: Article Insertion Drill
        type: fill-in-the-blank
        description: Provide 25 gapped sentences where students must insert a, an,
          the, or zero article.
        duration: 20
      - name: Article Error Correction
        type: error-correction
        description: Provide 15 sentences written by a Portuguese speaker with article
          errors (omission of a/an, overuse of the with abstract nouns, unnecessary
          the with proper nouns). Students identify and correct each error.
        duration: 20
