  position_of_adverbs:
    interference_patterns:
    - pattern: Placement of frequency adverbs after the main verb instead of before
      example_portuguese: Ele frequentemente vai ao cinema.
      example_gloss: He frequently goes to-the cinema.
      example_wrong: He goes frequently to the cinema.
      example_correct: He frequently goes to the cinema.
      explanation: Portuguese allows adverbs in multiple positions (before or after the
        verb). English frequency adverbs (always, usually, often, sometimes, never)
        must go BEFORE the main verb but AFTER the verb to be. Portuguese speakers
        frequently place them after the verb because Portuguese word order is more
        flexible.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Placement of manner adverbs before the verb instead of after the verb
        or at end of clause
      example_portuguese: Ela rapidamente correu para casa.
      example_gloss: She quickly ran to home.
      example_wrong: She quickly ran home. / She ran quickly home.
      example_correct: She ran home quickly. / She quickly ran home.
      explanation: Portuguese places manner adverbs (rapidamente, lentamente, cuidadosamente)
        before the verb or immediately after it. English manner adverbs typically go
        at the END of the clause or after the object. Portuguese speakers produce
        'She quickly ran home' (acceptable but marked) or 'She ran quickly home' (unnatural)
        instead of the more natural English order 'She ran home quickly.' This transfer
        is documented in Swan & Smith (2001) for Portuguese speakers.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''He goes frequently to the cinema.'' Correct: ''He frequently goes
      to the cinema.'''
    - 'Wrong: ''She ran quickly home.'' Correct: ''She ran home quickly.'''
    - 'Wrong: ''They carefully drove the car.'' Correct: ''They drove the car carefully.'''
    why_it_happens: 'Portuguese has significantly more flexible adverb placement than
      English. In Portuguese, adverbs can appear before the verb, after the verb, or
      at the beginning or end of the sentence with relatively free word order. English
      has strict positional rules: frequency adverbs go before the main verb (after
        the verb to be), manner adverbs go after the verb or at the end of the clause,
        and time/place adverbs go at the end.Portuguese speakers transfer their L1 flexibility and
      place adverbs in positions that sound unnatural or marked in English. This is
      one of the most persistent word-order transfer errors for Portuguese learners
      (Swan & Smith, 2001; Parrott, 2000).'
    teacher_tips:
      how_to_explain: 'Teach the adverb order formula: Subject + Frequency + Verb +
        Manner + Place + Time. Write ''He always (frequency) drives (verb) carefully
        (manner) to work (place) every day (time).'' Show that Portuguese allows
        ''Ele dirige cuidadosamente para o trabalho sempre'' — the adverbs can move
        around freely, but in English they have fixed positions.'
      where_to_start: Begin with frequency adverbs before the main verb (always, usually,
        often, sometimes, never). These are the most common and the easiest rule.
      sequencing: 'Week 1: Frequency adverb placement (before main verb, after be).
        Week 2: Manner adverb placement (after verb/object, end of clause). Week 3:
        Time and place adverb order (place before time). Week 4: Mixed adverb order
        practice with the full formula.'
      exercises:
      - name: Adverb Position Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with adverbs in parentheses. Students place
          each adverb in the correct position (frequency, manner, or time).
        duration: 15
      - name: Adverb Order Formula Practice
        type: sentence-building
        description: Give students 10 sets of sentence components (subject, frequency
          adverb, verb, object, manner adverb, place, time). Students arrange all
          components into a correct English sentence using the S+F+V+M+P+T formula.
        duration: 20
      - name: Portuguese to English Adverb Restructuring
        type: translation
        description: Provide 10 Portuguese sentences with flexible adverb placement.
          Students translate into English, consciously repositioning each adverb
          according to English rules.
        duration: 15
