  comparatives_superlatives:
    interference_patterns:
    - Portuguese speakers overuse 'more + adjective' for comparative forms where English requires the -er suffix, because
      Portuguese forms all comparatives analytically with 'mais' (more) before the adjective — 'mais alto' (more tall),
      'mais rápido' (more fast), 'mais bonito' (more beautiful). There is no Portuguese equivalent of the English -er/-est
      inflectional system. This produces errors like 'more tall', 'more fast', 'more easy' instead of 'taller', 'faster',
      'easier'. The error is most visible with one-syllable and common two-syllable adjectives that reliably take -er in English.
    - Portuguese speakers overuse 'the most + adjective' for superlative forms where English requires the -est suffix, because
      Portuguese forms all superlatives with 'o/a mais' (the most) before the adjective — 'o mais alto' (the most tall),
      'a mais rápida' (the most fast). Errors include 'the most tall', 'the most fast', 'the most big' instead of 'the tallest',
      'the fastest', 'the biggest'. Portuguese does have an inflected intensifier form (-íssimo/a) but it means 'very/extremely',
      not 'the most', and it does not map onto the English -est system.
    - Portuguese speakers produce double comparatives and double superlatives by combining 'more' with -er or 'the most' with
      -est, producing errors like 'more faster', 'more better', 'the most fastest', 'the most best'. This occurs because
      learners partially acquire the -er/-est rule but retain the Portuguese 'mais' pattern as the dominant strategy, leading
      to hybrid forms. Portuguese 'mais' + adjective is the only native comparative structure, so when learners add -er
      through incomplete rule acquisition, both forms co-occur.
    - Portuguese speakers struggle with irregular comparative and superlative forms (good → better → best, bad → worse → worst,
      far → farther/further → farthest/furthest) because Portuguese uses suppletive but different forms (bom → melhor → o melhor,
      mau → pior → o pior, longe → mais longe → o mais longe). The Portuguese irregular 'melhor' and 'pior' cover both
      comparative and superlative functions, so learners produce errors like 'more good' (instead of 'better'), 'the most good'
      (instead of 'the best'), 'more bad' (instead of 'worse'), and 'the most far' (instead of 'the farthest/furthest').
    - Portuguese speakers may omit 'than' after comparatives because Portuguese can mark comparison with 'de' in certain
      constructions, and the mapping from Portuguese 'mais...do que' to English 'more...than' or '-er...than' is not always
      one-to-one. Errors include 'She is taller me' (omitting 'than'), 'This book is more interesting that one' (using
      'that' instead of 'than'), and 'He runs more fast everyone' (omitting 'than' and using wrong word order).
    why_it_happens: 'Portuguese has no inflectional comparative or superlative system. All standard comparatives are formed
      analytically with ''mais'' (more) + adjective + ''do que'' (than), and all superlatives with ''o/a mais'' (the most) +
      adjective. This is structurally parallel to English ''more/most + adjective'' but covers ALL adjectives, whereas English
      splits the system — one-syllable and many two-syllable adjectives take -er/-est (taller, fastest, easier), while longer
      adjectives take more/most (more beautiful, most interesting). Portuguese learners therefore default to the ''more/most''
      pattern for all adjectives because it is the only pattern in their L1. The Portuguese -íssimo/a form (boníssimo, rapidíssimo)
      is an intensifier meaning ''extremely'', not a true superlative, and its use does not transfer to English -est. Irregular
      English forms (better, best, worse, worst) have no Portuguese structural equivalent since Portuguese ''melhor'' and ''pior''
      are single words covering both comparative and superlative. The ''than'' omission error arises because Portuguese comparison
      can be marked by ''de'' in partitive constructions and because ''do que'' can be reduced in colloquial speech. These errors
      are deeply persistent because the Portuguese comparative system is acquired in early childhood and operates automatically,
      and because the English -er/-est rule must be learned as a completely new grammatical mechanism with many irregular
      forms.'
    teacher_tips:
      how_to_explain: 'Use a two-column contrastive chart — Portuguese ''mais + adjective + do que'' maps to English ''-er + than''
        for short adjectives OR ''more + adjective + than'' for long adjectives. Emphasize that English has a SPLIT system — short
        adjectives get a SUFFIX (-er/-est), long adjectives get a SEPARATE WORD (more/most). Portuguese uses the same structure
        for ALL adjectives. For irregulars, teach them as a separate list to be memorized (good-better-best, bad-worse-worst,
        far-farthest-furthest). For -íssimo, explain that it means ''very/extremely'' in Portuguese, not ''most'' — ''rapidíssimo''
        means ''extremely fast'', NOT ''the fastest''.'
      where_to_start: 'Start with the short-adjective -er/-est rule since it is the most different from Portuguese. Use a syllable-counting
        exercise — one syllable gets -er/-est, two syllables check a list, three+ syllables use more/most. Then teach irregulars
        as a dedicated list. Finally, address double comparatives and ''than'' omission.'
      exercises:
      - name: Syllable-counting comparative formation
        type: drill
        description: 'Give students 30 adjectives of varying syllable counts (tall, fast, easy, happy, beautiful, interesting,
          comfortable, good, bad, far). For each, students produce the correct comparative and superlative form. Emphasize
          the rule: 1 syllable gets -er/-est, 2 syllables check (some -er, some more), 3+ syllables use more/most. Irregulars
          are marked with an asterisk and must be memorized.'
        duration: 15
      - name: Portuguese-to-English comparative translation
        type: drill
        description: 'Give 15 Portuguese sentences using ''mais...do que'' and ''o/a mais'' with adjectives of varying lengths.
          Students translate each into correct English, choosing -er or more appropriately. Include ''Ela é mais alta que o irmão''
          (She is taller than her brother), ''Este é o mais bonito'' (This is the most beautiful), ''Ele é mais rápido'' (He is
          faster). Discuss which English form is correct and why.'
        duration: 15
      - name: Double comparative/superlative error correction
        type: error-correction
        description: 'Provide 15 sentences with double comparative and superlative errors typical of Portuguese transfer (e.g.
          ''She is more taller than me'', ''This is the most fastest car'', ''He is more better at math'', ''That was the most
          worst movie''). Students identify the error (double marking), explain why it occurs (Portuguese ''mais'' + English
          -er/-est hybrid), and correct each sentence.'
        duration: 15
      - name: Irregular comparative/superlative memorization and use
        type: practice
        description: 'Give students a list of 10 irregular English comparatives/superlatives (good-better-best, bad-worse-worst,
          far-farther-farthest, little-less-least, much-more-most, old-older-oldest/elder-eldest, late-later-latest/latter-last).
          For each, they write the Portuguese equivalent to see the structural difference, then write 3 English sentences using
          each form correctly. Quiz each other in pairs.'
        duration: 15
      - name: Comparative paragraph writing with peer review
        type: composition
        description: 'Students write a short paragraph (100 words) comparing two things (two cities, two people, two products)
          using at least 8 comparative and superlative forms. They must include at least 2 irregular forms. After writing,
          they exchange paragraphs and check for Portuguese-style errors (more + -er, the most + -est, missing ''than'', wrong
          irregular forms).'
        duration: 20
    examples:
    - 'Wrong: ''She is more tall than her brother.'' (Portuguese: ''Ela é mais alta que o irmão.'' — mais + adjective for
      all comparatives) Correct: ''She is taller than her brother.'' (-er for short adjectives)'
    - 'Wrong: ''This is the most fast car in the world.'' (Portuguese: ''Este é o carro mais rápido do mundo.'' — o/a mais
      + adjective for all superlatives) Correct: ''This is the fastest car in the world.'' (-est for short adjectives)'
    - 'Wrong: ''He is more better at math than me.'' (Double comparative — Portuguese ''mais'' + English -er hybrid) Correct:
      ''He is better at math than me.'' (Irregular: good → better)'
    - 'Wrong: ''She is taller me.'' (Missing ''than'' — Portuguese ''Ela é mais alta que mim'' but ''que'' can be reduced
      in colloquial speech) Correct: ''She is taller than me.'''
    - 'Wrong: ''This book is more interesting that the other.'' (Wrong word — ''that'' instead of ''than'') Correct: ''This
      book is more interesting than the other.'' (Long adjective → more + adjective + than)'
    - 'Wrong: ''Rapidíssimo means the fastest.'' (Portuguese -íssimo is an intensifier, not a superlative) Correct: ''Rapidíssimo
      means extremely fast. The fastest = o mais rápido.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents comparative formation errors including overuse of more/most for all adjectives,
      double comparatives from L1-L2 hybrid forms, and irregular form acquisition difficulties).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on adjectives and
      comparison — describes the Portuguese analytical comparative system (mais...do que, o/a mais...de) and the -íssimo intensifier,
      explaining the structural basis for L1 transfer to English -er/-est and more/most patterns).'
