  ellipsis_advanced:
    interference_patterns:
    - pattern: Omission of subject pronoun in coordinated clauses with different subjects
      example_portuguese: Eu cheguei e comeu.
      example_gloss: I arrived and ate.
      example_wrong: 'I arrived and ate. (intended: I arrived and he ate.)'
      example_correct: I arrived and he ate.
      explanation: Portuguese is a pro-drop language that allows subject pronoun omission
        in all clauses, including coordinated clauses with different subjects (Eu cheguei
        e comeu = "I arrived and ate [he/she ate]"). English requires an explicit subject
        pronoun in each clause when subjects differ. Portuguese speakers omit the second
        subject pronoun, creating ambiguity or grammatical errors in English.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Omission of dummy subject 'it' in impersonal constructions
      example_portuguese: E dificil entender ela.
      example_gloss: Is difficult to understand her.
      example_wrong: Is difficult to understand her.
      example_correct: It is difficult to understand her.
      explanation: Portuguese does not have an equivalent of the English dummy subject
        'it'. Constructions like 'E dificil' (Is difficult), 'E importante' (Is important),
        'Chove' (Rains) lack an overt subject. English requires the expletive 'it' in
        all such impersonal constructions. Portuguese speakers transfer the subjectless
        structure directly, producing '*Is difficult to understand her' instead of 'It
        is difficult to understand her.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of complement stand-ins after auxiliaries in short answers and ellipsis
      example_portuguese: Voce quer ir? Nao, nao quero.
      example_gloss: You want to go? No, I don't want.
      example_wrong: "Do you want to go? No, I don't want."
      example_correct: "Do you want to go? No, I don't want to."
      explanation: Portuguese allows complete ellipsis of the verb complement after
        auxiliaries in short answers and coordinated clauses (Nao quero = "I don't
        want [to]"). English requires the infinitive marker 'to' to stand in for the
        omitted verb phrase, or uses pro-forms like 'so' and 'it' (I think so, I hope
        so). Portuguese speakers transfer the full ellipsis pattern, producing '*I don't
        want' instead of 'I don't want to', '*I don't think' instead of 'I don't think
        so', and '*I'm used' instead of 'I'm used to it'.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - "Wrong: I arrived and ate. (different subjects) Correct: I arrived and he ate."
    - 'Wrong: Is difficult to understand her. Correct: It is difficult to understand her.'
    - "Wrong: Do you want to go? No, I don't want. Correct: No, I don't want to."
    - "Wrong: Are they coming? No, I don't think. Correct: No, I don't think so."
    why_it_happens: Portuguese is a pro-drop (null-subject) language with flexible word
      order, which allows three types of ellipsis that are ungrammatical in English.
      First, subject pronouns can be omitted in all clauses, including coordinated clauses
      with different subjects, because verb inflection carries person/number information.
      Second, Portuguese lacks the expletive/dummy subject 'it' — impersonal constructions
      (E dificil, Chove, E importante) have no overt subject, while English requires 'it'
      (It is difficult, It rains, It is important). Third, Portuguese allows full verb
      phrase ellipsis after auxiliaries in short answers and coordinated clauses (Nao
      quero = "I don't want [to]"), while English requires a pro-form complement (to, so,
      it) to stand in for the omitted material. All three patterns are documented in
      Swan & Smith (2001) for Portuguese speakers and in contrastive analyses of
      Romance pro-drop languages.
    teacher_tips:
      how_to_explain: 'Teach the three rules of English ellipsis that violate Portuguese
        habits. Rule 1: Every clause needs an explicit subject — even when the verb
        ending shows who. Rule 2: Impersonal sentences always need "it" — "It is difficult,"
        not "Is difficult." Rule 3: When you cut a sentence short after an auxiliary,
        you need a placeholder — "to" after want/would like, "so" after think/hope/suppose,
        "it" after used to / be used to.'
      where_to_start: Begin with dummy 'it' (Rule 2) since it is the most frequent and
        easiest to grasp. Then move to short-answer ellipsis (Rule 3). Finally address
        subject omission in coordination (Rule 1), which requires understanding clause
        boundaries.
      sequencing: 'Week 1: Dummy "it" in impersonal constructions. Week 2: Complement
        stand-ins (to, so, it) after auxiliaries in short answers. Week 3: Subject
        pronouns in coordinated clauses with different subjects. Week 4: Mixed practice
        combining all three patterns.'
      exercises:
      - name: Dummy It Insertion
        type: fill-in-the-blank
        description: Provide 15 Portuguese-style subjectless sentences. Students insert
          'it' where needed (e.g., '___ is difficult to learn English').
        duration: 10
      - name: Short Answer Completion
        type: fill-in-the-blank
        description: "Provide 15 yes/no questions. Students write short answers using correct pro-form complements (to, so, it). Example: \"Do you want to come?\" \"Yes, I want ___.\" (to)"
        duration: 15
      - name: Coordinated Clause Subject Drill
        type: error-correction
        description: Give 10 coordinated sentences with different subjects where the
          second subject pronoun is missing. Students identify and add the missing
          pronoun.
        duration: 15
      - name: Ellipsis Transformation
        type: sentence-rewrite
        description: Provide 10 full Portuguese sentences. Students translate to English,
          ensuring all three ellipsis rules are applied correctly.
        duration: 20
