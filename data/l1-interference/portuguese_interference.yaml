  countable_vs_uncountable:
    interference_patterns:
    - pattern: Use of 'a/an' with uncountable nouns
      example_portuguese: Eu preciso de um conselho.
      example_gloss: I need an advice.
      example_wrong: I need an advice.
      example_correct: I need advice.
      explanation: Portuguese 'conselho' is countable and takes 'um.' English 'advice'
        is uncountable and cannot take 'a/an.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Pluralization of uncountable nouns
      example_portuguese: As noticias sao boas.
      example_gloss: The news are good.
      example_wrong: The news are good.
      example_correct: The news is good.
      explanation: Portuguese 'noticias' is a plural noun. English 'news' looks plural
        but is grammatically singular.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I need an advice.'' Correct: ''I need advice.'''
    - 'Wrong: ''The news are good.'' Correct: ''The news is good.'''
    - 'Wrong: ''She gave me many informations.'' Correct: ''She gave me much information.'''
    why_it_happens: 'Several nouns that are countable in Portuguese are uncountable
      in English: advice (conselho), information (informacao), furniture (moveis),
      luggage (bagagem), research (pesquisa), news (noticias). English ''news'' is
      particularly tricky because it looks plural but takes a singular verb.'
    teacher_tips:
      how_to_explain: 'Create a ''False Friends: Countability'' list. Show Portuguese
        nouns that are countable but their English equivalents are not. For ''news,''
        emphasize: ''The news IS good, not ARE good.'''
      where_to_start: Begin with 'advice' and 'information' since these are the most
        common errors.
      sequencing: 'Week 1: Uncountable nouns that are countable in Portuguese. Week
        2: ''News'' and other deceptive forms. Week 3: Counter words for uncountable
        nouns. Week 4: Mixed practice.'
      exercises:
      - name: Countability Error Hunt
        type: error-correction
        description: Provide a paragraph with 10 countability errors. Students identify
          and correct each one.
        duration: 15
      - name: Counter Word Matching
        type: matching
        description: 'Match uncountable nouns with their counter words: a piece of
          advice, a loaf of bread, a cup of coffee.'
        duration: 10
