  definitely_probably:
    interference_patterns:
    - pattern: Use of 'probably' with wrong word order
      example_portuguese: Eu provavelmente vou viajar.
      example_gloss: I probably go to travel.
      example_wrong: I probably go to travel.
      example_correct: I will probably travel.
      explanation: Portuguese places 'provavelmente' before the verb phrase. English
        places 'probably' after the first auxiliary verb.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Omission of 'will' — present tense used with definitely/probably for
        future reference
      example_portuguese: Ela provavelmente vem amanha.
      example_gloss: She probably comes tomorrow.
      example_wrong: She probably comes tomorrow.
      example_correct: She will probably come tomorrow.
      explanation: Portuguese uses the present tense with adverbs like 'provavelmente'
        and 'definitivamente' to express future meaning (ela provavelmente vem amanha
        = she probably comes tomorrow). English requires 'will' (or another modal)
        to mark future time. Portuguese speakers transfer the present-tense-for-future
        pattern and omit 'will,' producing 'She probably comes tomorrow' instead of
        'She will probably come tomorrow.' This is a well-documented Romance language
        L1 transfer pattern (Swan & Smith, 2001; Azevedo, 1996).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I probably go to travel.'' Correct: ''I will probably travel.'''
    - 'Wrong: ''She probably is coming.'' Correct: ''She is probably coming.'''
    - 'Wrong: ''She probably comes tomorrow.'' Correct: ''She will probably come tomorrow.'''
    - 'Wrong: ''They definitely arrive on time.'' Correct: ''They will definitely
      arrive on time.'''
    why_it_happens: Portuguese places adverbs like 'provavelmente' before the verb
      phrase, and also uses the present tense with future-meaning adverbs (ela provavelmente
      vem amanha = she probably comes tomorrow). English requires both correct adverb
      placement (after the first auxiliary) AND the future marker 'will.' Portuguese
      speakers transfer both the pre-verb adverb placement and the present-tense-for-future
      pattern, producing double errors like 'She probably comes tomorrow' instead
      of 'She will probably come tomorrow.'
    teacher_tips:
      how_to_explain: 'Teach two rules together: (1) ''probably/definitely'' goes
        AFTER the first auxiliary (will, is, has), and (2) future meaning requires
        ''will.'' Write ''Ela provavelmente vem amanha'' on the board. Show that English
        needs BOTH ''will'' AND correct adverb position: ''She will probably come
        tomorrow.'''
      where_to_start: Begin with 'will probably' since it is the most common combination.
      sequencing: 'Week 1: ''Probably'' with ''will.'' Week 2: ''Probably'' with other
        auxiliaries. Week 3: ''Definitely'' and ''certainly.'' Week 4: Mixed practice.'
      exercises:
      - name: Adverb Placement Drill
        type: sentence-rewrite
        description: Give 10 sentences with incorrect adverb placement. Students rewrite
          with correct placement.
        duration: 15
      - name: Future Marker Insertion
        type: fill-in-the-blank
        description: Provide 15 present-tense sentences with definitely/probably that
          refer to future events. Students insert 'will' and fix adverb placement.
        duration: 15
