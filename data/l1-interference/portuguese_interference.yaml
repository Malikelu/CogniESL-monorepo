  will_vs_going_to:
    interference_patterns:
    - pattern: Use of 'will' for pre-planned events
      example_portuguese: Eu vou viajar amanha.
      example_gloss: I go to travel tomorrow.
      example_wrong: I will travel tomorrow.
      example_correct: I am going to travel tomorrow.
      explanation: Portuguese 'ir + infinitivo' expresses planned future events. English
        uses 'be going to' for plans and 'will' for spontaneous decisions. Portuguese
        speakers map 'ir + inf' directly to 'will' because both are single-word/short
        constructions, ignoring the semantic distinction.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'going to' for predictions without present evidence
      example_portuguese: Vai chover amanha.
      example_gloss: Goes to rain tomorrow.
      example_wrong: It is going to rain tomorrow.
      example_correct: It will rain tomorrow.
      explanation: Portuguese 'ir + infinitivo' covers both plans and predictions.
        English requires 'will' for predictions without present evidence (weather,
        opinions about the future) and 'going to' when there is visible evidence (dark
        clouds). Portuguese speakers overextend 'going to' to all predictions because
        their L1 uses one structure for both contexts.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I will travel tomorrow.'' (planned) Correct: ''I am going to travel
      tomorrow.'''
    - 'Wrong: ''Look at those clouds — it will rain.'' (evidence present) Correct:
      ''Look at those clouds — it is going to rain.'''
    - 'Wrong: ''I think Brazil is going to win the cup.'' (opinion) Correct: ''I think
      Brazil will win the cup.'''
    why_it_happens: Portuguese uses a single periphrastic future construction — 'ir
      + infinitivo' — to express plans, intentions, predictions, and scheduled events.
      English splits these functions between 'be going to' (plans, intentions, predictions
      with evidence) and 'will' (spontaneous decisions, predictions without evidence,
      promises, offers). Portuguese speakers overgeneralize 'will' because it is the
      closest single-word equivalent, and overgeneralize 'going to' to all predictive
      contexts because their L1 does not distinguish between prediction types. This
      two-way confusion is well-documented in contrastive analyses of Romance and
      Germanic future-time reference (Swan & Smith, 2001; Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'Draw a two-column chart on the board. Left: BE GOING TO — plans
        (I am going to study tonight), predictions with evidence (Look at those clouds
        — it is going to rain). Right: WILL — spontaneous decisions (I will help you),
        predictions without evidence (I think it will rain tomorrow), promises (I
        will always love you). Show that Portuguese ''ir + inf'' covers ALL of these,
        but English splits them.'
      where_to_start: 'Begin with plans: ''What are you going to do this weekend?''
        Then introduce spontaneous decisions: ''Someone spills coffee — what do you
        say?'''
      sequencing: 'Week 1: ''Be going to'' for pre-made plans. Week 2: ''Will'' for
        spontaneous decisions. Week 3: Predictions — ''will'' (no evidence) vs. ''going
        to'' (visible evidence). Week 4: Mixed practice with context clues.'
      exercises:
      - name: Will vs Going To Decision
        type: fill-in-the-blank
        description: Provide 15 sentences with context clues (plan, spontaneous decision,
          prediction with/without evidence). Students choose between 'will' and 'be
          going to.'
        duration: 15
      - name: Future Tense Context Sort
        type: categorization
        description: Give 20 future-tense scenarios on cards. Students sort into three
          piles — 'be going to' (plan), 'will' (spontaneous), 'will' (prediction no
          evidence) — then write the full sentence.
        duration: 20
