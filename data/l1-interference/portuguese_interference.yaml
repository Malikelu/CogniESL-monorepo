  apposition:
    interference_patterns:
    - pattern: Omission of commas in non-restrictive apposition
      example_portuguese: Meu amigo Joao e professor.
      example_gloss: My friend Joao is teacher.
      example_wrong: My friend Joao is a teacher.
      example_correct: My friend, Joao, is a teacher.
      explanation: Portuguese does not use commas to set off appositive noun phrases.
        English requires commas around non-restrictive appositives (extra information
        that could be removed without changing the referent). Portuguese speakers
        transfer the zero-punctuation pattern, producing run-on noun phrases that
        English readers find ambiguous or ungrammatical.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Restrictive vs. non-restrictive apposition confusion
      example_portuguese: Meu amigo Carlos mora em Lisboa.
      example_gloss: My friend Carlos lives in Lisbon.
      example_wrong: My friend Carlos lives in Lisbon.
      example_correct: My friend, Carlos, lives in Lisbon.
      explanation: "Portuguese uses the same bare-noun apposition structure for both restrictive (identifying which one) and non-restrictive (adding extra info) meanings. English distinguishes them with commas. When a Portuguese speaker has only one friend named Carlos, the appositive is non-restrictive and requires commas in English. But because Portuguese does not mark this distinction with punctuation, speakers omit commas in both cases. The reverse error also occurs: adding commas to restrictive appositives when the speaker has multiple friends and is identifying which one."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: My friend Joao is a teacher. Correct: My friend, Joao, is a teacher.'
    - 'Wrong: The poet Pablo Neruda wrote love sonnets. Correct: The poet, Pablo Neruda,
      wrote love sonnets.'
    - 'Wrong: My friend Carlos lives in Lisbon. Correct: My friend, Carlos, lives in
      Lisbon.'
    why_it_happens: Portuguese apposition places a noun phrase directly next to another
      noun without punctuation (meu amigo Joao = my friend Joao). The language does
      not grammatically distinguish restrictive from non-restrictive apposition through
      commas. English, by contrast, requires commas for non-restrictive appositives
      (My friend, Joao, is a teacher — I have one friend, his name is Joao) and no
      commas for restrictive appositives (My friend Joao is a teacher — I have multiple
      friends, the one named Joao). Portuguese speakers transfer the single zero-punctuation
      strategy to both contexts, producing errors in both directions. Azevedo (1996)
      notes that Portuguese noun phrases rely on context rather than punctuation for
      disambiguation, while Swan & Smith (2001) identify this as a persistent error
      for Portuguese learners at all proficiency levels.
    teacher_tips:
      how_to_explain: 'Write two sentences on the board: (1) "My brother, a doctor, lives
        in Sao Paulo." (2) "My brother Paulo lives in Sao Paulo." Ask: "How many brothers
        does the speaker have in sentence 1? In sentence 2?" Explain: commas = extra
        info (one brother); no commas = identifying which one (multiple brothers).
        Then show that Portuguese uses the same structure for both, but English needs
        commas to show the difference.'
      where_to_start: 'Begin with famous-figure appositives (always non-restrictive): "The writer, Clarice Lispector, is beloved in Brazil." Then move to personal examples where the number of siblings/friends determines comma use.'
      sequencing: 'Week 1: Non-restrictive apposition with commas (famous people, cities).
        Week 2: Restrictive apposition without commas (identifying which one). Week
        3: Contrastive practice — same noun, different contexts. Week 4: Editing
        paragraphs for apposition comma errors.'
      exercises:
      - name: Comma Decision Drill
        type: categorization
        description: Provide 15 sentences with appositives. Students decide whether
          each is restrictive (no commas) or non-restrictive (add commas) and punctuate
          accordingly. Include a mix of personal names, titles, and descriptive phrases.
        duration: 15
      - name: Apposition Translation with Punctuation
        type: translation
        description: Give 10 Portuguese sentences with bare-noun apposition. Students
          translate into English, adding commas where the context requires non-restrictive
          punctuation. Include sentences where the student must decide based on context
          clues.
        duration: 15
      - name: Restrictive or Non-Restrictive Writing
        type: sentence-rewrite
        description: 'Provide 5 nouns (brother, teacher, city, book, actor). For each, students write two sentences — one restrictive and one non-restrictive — demonstrating the comma difference. Use the noun teacher as a model, then have students create their own pairs.'
        duration: 15
