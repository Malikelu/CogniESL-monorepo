  say_vs_tell:
    interference_patterns:
    - pattern: Use of 'say' where 'tell' is needed (missing indirect object)
      example_portuguese: Ele me disse a verdade.
      example_gloss: He me said the truth.
      example_wrong: He said me the truth.
      example_correct: He told me the truth.
      explanation: Portuguese 'dizer' covers both 'say' and 'tell' and takes a clitic
        indirect object (me disse = told me). English requires 'tell' when an indirect
        object is present. Portuguese speakers default to 'say' because their L1 verb
        handles both functions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'tell' with direct speech where 'say' is required
      example_portuguese: Ele disse "oi" para mim.
      example_gloss: He said "hi" to me.
      example_wrong: He told "hi" to me.
      example_correct: He said "hi" to me.
      explanation: Portuguese 'dizer' is used with both direct and indirect objects
        (ele disse "oi" para mim). English 'tell' cannot introduce direct speech —
        only 'say' can. Portuguese speakers overgeneralize 'tell' to direct speech
        contexts because 'dizer' handles both.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Omission of indirect object after 'tell' (clitic transfer)
      example_portuguese: Ele me disse para vir.
      example_gloss: He me told to come.
      example_wrong: He told to come.
      example_correct: He told me to come.
      explanation: Portuguese allows the indirect object clitic to be omitted or attached
        to the infinitive (disse para vir = told to come). English 'tell' requires
        an explicit indirect object before the infinitive clause. Portuguese speakers
        drop the object pronoun because Portuguese can imply it through verbal inflection
        or clitic dropping.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: He said me the truth. Correct: He told me the truth.'
    - 'Wrong: He told "hi" to me. Correct: He said "hi" to me.'
    - 'Wrong: He told to come. Correct: He told me to come.'
    why_it_happens: "Portuguese has a single verb 'dizer' that covers both English 'say' and 'tell'. 'Dizer' takes a clitic indirect object (me disse = told me) and can introduce both direct and indirect speech. English splits this into two verbs with different argument structures: 'tell' requires a person object (tell someone something), while 'say' takes no person object and introduces direct speech (say something to someone). Portuguese speakers (1) use 'say' with an indirect object because 'dizer' allows it, (2) use 'tell' with direct speech because 'dizer' handles both, and (3) omit the indirect object after 'tell' because Portuguese can drop or cliticize the pronoun."
    teacher_tips:
      how_to_explain: 'Write the formula on the board: TELL + PERSON (He told me the
        truth). SAY + NO PERSON (He said the truth). For direct speech: always SAY ("Hello"
        not "told Hello"). Then add: TELL + PERSON + TO + VERB (He told me to come).
        Never "He told to come."'
      where_to_start: Begin with the tell + person vs. say distinction using classroom
        commands. 'The teacher told me to open the book.' 'The teacher said "open the
        book."'
      sequencing: 'Week 1: Tell + person vs. say (no person). Week 2: Say with direct
        speech (never tell + quotation). Week 3: Tell + person + to-infinitive. Week
        4: Mixed practice with all three patterns.'
      exercises:
      - name: Say vs Tell Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with blanks. Students choose between say
          and tell, and must add the indirect object when needed.
        duration: 15
      - name: Direct Speech Rewrite
        type: sentence-rewrite
        description: Give 10 Portuguese sentences with 'dizer' + direct speech. Students
          translate to English using 'say' (not 'tell') with correct word order.
        duration: 15
      - name: Indirect Object Insertion
        type: error-correction
        description: Provide 10 sentences where the indirect object is missing after
          'tell'. Students identify the error and insert the correct pronoun.
        duration: 10
