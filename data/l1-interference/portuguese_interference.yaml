  future_will:
    interference_patterns:
    - pattern: Overuse of 'will' for planned events
      example_portuguese: Eu vou viajar amanha.
      example_gloss: I will travel tomorrow.
      example_wrong: I will travel tomorrow.
      example_correct: I am going to travel tomorrow.
      explanation: Portuguese 'ir + infinitivo' expresses planned future events. English
        uses 'be going to' for plans and 'will' for spontaneous decisions or predictions.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of 'will' in requests where 'would' is polite
      example_portuguese: Voce pode me ajudar?
      example_gloss: Will you can help me?
      example_wrong: Will you can help me?
      example_correct: Would you help me? / Can you help me?
      explanation: Portuguese uses the present tense for polite requests. English
        uses 'would' or 'could' for politeness.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I will travel tomorrow.'' (planned) Correct: ''I am going to travel
      tomorrow.'''
    - 'Wrong: ''Will you can help me?'' Correct: ''Would you help me?'''
    why_it_happens: Portuguese uses 'ir + infinitivo' for planned future events, which
      English expresses with 'be going to.' English 'will' is used for spontaneous
      decisions, predictions, and promises. Portuguese speakers overuse 'will' because
      it is the most familiar future form. Additionally, Portuguese uses the present
      tense for polite requests, while English uses 'would' or 'could.'
    teacher_tips:
      how_to_explain: 'Teach the distinction: ''be going to'' = plans (I am going
        to travel tomorrow), ''will'' = spontaneous decisions (I will help you right
        now). For politeness, teach ''Would you...?'' and ''Could you...?'''
      where_to_start: Begin with the plan vs. spontaneous decision distinction.
      sequencing: 'Week 1: ''Be going to'' vs. ''will.'' Week 2: ''Will'' for predictions
        and promises. Week 3: ''Would'' for polite requests. Week 4: Mixed practice.'
      exercises:
      - name: Will vs Going To Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'will'
          and 'be going to.'
        duration: 15
      - name: Polite Request Drill
        type: sentence-rewrite
        description: Give 10 direct requests. Students rewrite using 'would' or 'could.'
        duration: 15
