  adverb_placement:
    interference_patterns:
    - pattern: Post-verbal placement of frequency adverbs
      example_portuguese: Ele chega sempre atrasado.
      example_gloss: He arrives always late.
      example_wrong: He arrives always late.
      example_correct: He always arrives late.
      explanation: Portuguese allows frequency adverbs after the verb (Ele chega sempre
        atrasado). English requires frequency adverbs before the main verb (He always
        arrives late). Portuguese speakers transfer the post-verb placement, producing
        'He arrives always late' instead of 'He always arrives late.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Adverb placement after 'be' — correct in Portuguese but misleading
      example_portuguese: Ele esta sempre atrasado.
      example_gloss: He is always late.
      example_wrong: He always is late.
      example_correct: He is always late.
      explanation: Both Portuguese and English place adverbs after 'be/esta.' However,
        Portuguese speakers who learn the 'adverb before verb' rule for main verbs
        sometimes overgeneralize it to 'be' sentences, producing 'He always is late'
        instead of 'He is always late.' The Portuguese structure (Ele esta sempre
        atrasado) actually matches English, but the learner's overgeneralization of
        the pre-verb rule creates the error.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''He arrives always late.'' Correct: ''He always arrives late.'''
    - 'Wrong: ''He always is late.'' Correct: ''He is always late.'''
    - 'Wrong: ''She goes usually to the gym.'' Correct: ''She usually goes to the gym.'''
    why_it_happens: 'Portuguese has more flexible adverb placement than English. Frequency
      adverbs (sempre, normalmente, frequentemente, as vezes, nunca) can appear before
      or after the verb in Portuguese, with post-verbal position being very common
      in spoken Brazilian Portuguese. English has stricter rules: frequency adverbs
      go BEFORE the main verb but AFTER ''be.'' Portuguese speakers transfer the
      post-verb placement pattern, producing ''He arrives always late'' instead of
      ''He always arrives late.'' Additionally, learners who acquire the ''before
      the verb'' rule for main verbs may overgeneralize it to ''be'' sentences,
      producing ''He always is late'' instead of ''He is always late.'' Both patterns
      are documented in Swan & Smith (2001), Parrott (2000), and Azevedo (1996).'
    teacher_tips:
      how_to_explain: 'Teach the two-rule system: (1) Frequency adverbs BEFORE the
        main verb: ''He always arrives late.'' (2) Frequency adverbs AFTER ''be'':
        ''He is always late.'' Write both patterns on the board side by side. Show
        that Portuguese allows both positions, but English assigns each to a different
        context.'
      where_to_start: 'Begin with frequency adverbs: always, usually, often, sometimes,
        never. Drill the two positions: before main verb vs. after ''be.'''
      sequencing: 'Week 1: Frequency adverbs before main verbs. Week 2: Frequency
        adverbs after ''be.'' Week 3: Contrastive practice — students choose the
        correct position based on whether the verb is ''be'' or a main verb. Week
        4: Mixed practice with other adverb types (manner, degree). Week 5: Error
        correction with authentic learner sentences.'
      exercises:
      - name: Adverb Placement Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with blanks. Students place the frequency
          adverb in the correct position (before main verb or after 'be'). Include
          5 sentences with 'be' and 10 with main verbs.
        duration: 15
      - name: Portuguese to English Adverb Restructuring
        type: translation
        description: Give 10 Portuguese sentences with post-verbal adverbs (e.g.,
          'Ele chega sempre atrasado'). Students translate into correct English,
          restructuring the adverb position. Include 3 sentences where the adverb
          position happens to match English.
        duration: 15
      - name: Error Correction — Adverb Position
        type: error-correction
        description: Provide 15 sentences with adverb placement errors drawn from
          authentic Portuguese learner output. Students identify the error and rewrite
          the sentence correctly. Include distractors with correct adverb placement.
        duration: 15
