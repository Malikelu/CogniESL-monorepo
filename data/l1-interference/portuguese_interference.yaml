  conditional_past_habitual:
    interference_patterns:
    - pattern: Use of 'would' for past habits where 'used to' is more appropriate
      example_portuguese: Eu jogava futebol todo dia.
      example_gloss: I played football every day.
      example_wrong: I would play football every day.
      example_correct: I used to play football every day.
      explanation: Portuguese uses the imperfect past (pretérito imperfeito) for all
        past habits regardless of whether they are states or actions. English distinguishes
        'used to' (habits and states) from 'would' (repeated actions only). Portuguese
        speakers overuse 'would' because the imperfect maps naturally to it.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of simple past instead of 'used to' for discontinued past habits
      example_portuguese: Eu morava em São Paulo.
      example_gloss: I lived in São Paulo.
      example_wrong: I lived in São Paulo. (when the intended meaning is a discontinued
        habit/state)
      example_correct: I used to live in São Paulo.
      explanation: Portuguese imperfect (morava) covers both habitual and ongoing
        past meanings. English requires 'used to' to signal that a past state or habit
        is discontinued. Portuguese speakers use simple past because their L1 does
        not grammatically mark the discontinued-vs-ongoing distinction.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion between 'used to' (past habit) and 'be used to' (accustomed
        to)
      example_portuguese: Eu era acostumado a acordar cedo.
      example_gloss: I was accustomed to waking up early.
      example_wrong: I used to wake up early. (when meaning 'I was accustomed to')
      example_correct: I was used to waking up early.
      explanation: Portuguese 'ser/estar acostumado a' maps to English 'be used to'
        + gerund. Portuguese learners produce 'used to' + base form because the phonological
        similarity between 'used to' and 'be used to' causes confusion. The distinction
        is structural — 'used to + verb' means past habit no longer true; 'be used
        to + gerund' means be accustomed to.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''I would play football every day.'' Correct: ''I used to play football
      every day.'''
    - 'Wrong: ''I lived in Rio.'' (discontinued state) Correct: ''I used to live in
      Rio.'''
    - 'Wrong: ''I used to wake up early.'' (meaning accustomed) Correct: ''I was used
      to waking up early.'''
    why_it_happens: Portuguese has a single past imperfective form (pretérito imperfeito)
      that covers all past habitual and ongoing meanings. English splits this into
      three distinct structures — 'used to + verb' (discontinued habits/states), 'would
      + verb' (repeated past actions only), and 'be used to + gerund' (accustomed
      to). Portuguese speakers must learn to distinguish three English forms where
      their L1 has one, leading to overgeneralization of 'would', underuse of 'used
      to', and confusion with 'be used to'.
    teacher_tips:
      how_to_explain: 'Draw three columns on the board: USED TO (habits + states,
        now finished), WOULD (repeated actions only, now finished), BE USED TO (accustomed
        to, + gerund). Show that Portuguese ''imperfeito'' covers all three meanings.'
      where_to_start: Begin with 'used to' for past habits and states. Contrast with
        simple past. Then introduce 'would' for repeated actions only. Finally teach
        'be used to + gerund'.
      sequencing: 'Week 1: ''Used to'' for past habits and states. Week 2: ''Would''
        for repeated past actions (not states). Week 3: ''Be used to + gerund'' for
        being accustomed. Week 4: Mixed practice and error correction.'
      exercises:
      - name: Used To vs Would Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between 'used to' and 'would.'
          Include state verbs (live, have, be) that block 'would.'
        duration: 15
      - name: Used To vs Be Used To Sorting
        type: categorization
        description: Give 12 sentences. Students sort into 'past habit' (used to +
          verb) vs 'accustomed to' (be used to + gerund). Then rewrite incorrect ones.
        duration: 15
      - name: Portuguese Imperfect Translation
        type: translation
        description: Provide 10 Portuguese sentences using the imperfect (morava,
          jogava, era). Students translate into English, choosing the correct structure
          (used to, would, was/were used to + gerund).
        duration: 20
      - name: Error Correction Triad
        type: error-correction
        description: Provide 12 sentences with errors across all three patterns. Students
          identify the error type and rewrite correctly.
        duration: 15
