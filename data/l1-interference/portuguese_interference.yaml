  articles:
    interference_patterns:
    - Portuguese speakers omit English articles in contexts where Portuguese uses zero article, especially with professions
      after 'ser' ('She is doctor' / Portuguese 'Ela é médica'), with abstract/generic nouns ('Life is beautiful' produced
      without 'the' even when specificity is required), and before proper nouns. Portuguese does not require an article before
      professions after 'ser', and this transfers directly to English as a persistent omission error.
    - Portuguese overuses the definite article in contexts where English requires zero article — before days of the week ('the
      Monday' / Portuguese 'na segunda-feira'), before body parts with possessive meaning ('I washed the my hands' / Portuguese
      'Lavei as minhas mãos'), with languages ('I speak the English' / Portuguese 'Falo o inglês'), and in generic plural
      statements ('The cats are animals' for general reference / Portuguese 'Os gatos são animais'). Portuguese requires 'o/a/os/as'
      in all these contexts, leading to systematic overuse of 'the' in English.
    - Portuguese speakers confuse 'a' vs 'an' selection because Portuguese 'um/uma' is determined by grammatical gender, not
      phonological environment. This leads to errors like 'a apple' or 'an book' when the learner applies gender-based rather
      than sound-based rules. The Portuguese article system (o, a, os, as, um, uma, uns, umas) is fully inflected for gender
      and number, so the phonological rule for English 'a/an' has no L1 equivalent.
    - Portuguese speakers omit indefinite articles with singular countable nouns in object and complement positions where
      Portuguese does not require them. Errors include 'I have book' (Portuguese 'Tenho livro'), 'She wants coffee' (acceptable
      but 'She wants a coffee' is needed for a cup), and 'He bought car' (Portuguese 'Ele comprou carro'). Portuguese allows
      bare singular nouns in these positions where English requires 'a/an'.
    why_it_happens: Portuguese has a fully developed article system (o, a, os, as, um, uma, uns, umas) but the distribution
      differs significantly from English. Portuguese requires definite articles with proper nouns, body parts, days of the
      week, languages, and generic statements — all contexts where English uses zero article. Conversely, Portuguese drops
      articles after 'ser' with professions and in many generic contexts where English requires 'a/an' or 'the'. The phonological
      rule for 'a/an' (sound-based) has no equivalent in Portuguese where 'um/uma' is gender-based. Portuguese also allows
      bare singular countable nouns in object positions where English requires an indefinite article. These deeply automatized
      L1 patterns transfer systematically and persist into advanced proficiency because the Portuguese article system is acquired
      in early childhood and operates automatically in both speech and writing.
    teacher_tips:
      how_to_explain: Use a contrastive chart showing Portuguese article usage side-by-side with English. Highlight the four
        major divergence zones — (1) professions after be, (2) body parts with possessives, (3) days/languages/countries,
        (4) generic statements. For a vs an, teach the phonological rule explicitly — it is about the SOUND, not the letter.
        For bare noun omissions, emphasize that English singular countable nouns almost always need a determiner.
      where_to_start: Start with the profession pattern since it is the most frequent and visible error. Have students correct
        sentences like 'She is doctor' to 'She is a doctor'. Then move to body parts ('I hurt the my leg' to 'I hurt my leg').
        Build up to generic vs specific article use, then address a/an phonological rules.
      exercises:
      - name: Article insertion drill
        type: drill
        description: Provide 20 gapped sentences where students must insert a, an, the, or zero article. Include profession,
          body part, day of week, language, and generic noun contexts. Time pressure to build automaticity.
        duration: 15
      - name: Portuguese-to-English translation
        type: drill
        description: Give 10 Portuguese sentences that directly trigger article errors (e.g. 'Ela é médica', 'Eu lavo as minhas
          mãos', 'Na segunda-feira', 'Falo o inglês'). Students translate, focusing on correct article choice in English.
        duration: 15
      - name: Error correction — article overuse
        type: error-correction
        description: Provide 15 sentences with Portuguese-style article overuse errors (e.g. 'I go to the school every day',
          'The life is beautiful', 'She plays the piano on the Sundays', 'I speak the French'). Students identify and fix
          each error.
        duration: 15
      - name: A vs An phonological sorting
        type: practice
        description: Give students 30 noun cards. They sort into 'a' pile and 'an' pile based on initial SOUND (not letter).
          Include tricky cases like 'an hour', 'a university', 'an honest person'. Then use each in a sentence.
        duration: 10
      - name: Generic vs specific article choice
        type: practice
        description: Students write 5 pairs of sentences — one generic, one specific — for nouns like 'music', 'cats', 'water',
          'education'. Forces awareness of when English requires zero article vs 'the' for generic reference.
        duration: 15
    examples:
    - 'Wrong: ''She is doctor.'' (Portuguese: ''Ela é médica.'' — no article after ser) Correct: ''She is a doctor.'''
    - 'Wrong: ''I washed the my hands.'' (Portuguese: ''Lavei as minhas mãos.'' — definite article required) Correct: ''I
      washed my hands.'''
    - 'Wrong: ''I go to the school every day.'' (Portuguese: ''Eu vou à escola'' — contracted article+preposition) Correct:
      ''I go to school every day.'''
    - 'Wrong: ''The life is beautiful.'' (Portuguese: ''A vida é bela.'' — definite article with abstract nouns) Correct:
      ''Life is beautiful.'' / ''The life of a doctor is demanding.'''
    - 'Wrong: ''a apple'' / ''an book'' (Portuguese: ''uma maçã'' / ''um livro'' — gender-based, not sound-based) Correct:
      ''an apple'' / ''a book'''
    - 'Wrong: ''I have book.'' (Portuguese: ''Tenho livro.'' — bare singular noun) Correct: ''I have a book.'''
    sources:
    - Tryzna, M. (2009). Acquisition of English article choice by L1 Portuguese speakers. Language Learning, 59(4), 789-828.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter, pp. 168-185).'
    - 'Azevedo, M. (1996). Portuguese: A linguistic introduction. Cambridge University Press.'
