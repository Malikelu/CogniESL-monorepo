  future_in_the_past:
    interference_patterns:
    - pattern: Use of simple past instead of 'was/were going to'
      example_portuguese: Ele disse que ia viajar.
      example_gloss: He said that he went to travel.
      example_wrong: He said he went to travel.
      example_correct: He said he was going to travel.
      explanation: Portuguese uses the imperfect past of 'ir' (ia/iam) for future-in-the-past
        (ele ia viajar = he was going to travel). English requires 'was/were going
        to' or 'would.' Portuguese speakers may translate the imperfect literally
        as simple past, losing the future-in-the-past meaning entirely.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Failure to backshift 'will' to 'would' in reported speech
      example_portuguese: Ela disse que viria amanha.
      example_gloss: She said that she would come tomorrow.
      example_wrong: She said she will come tomorrow.
      example_correct: She said she would come tomorrow.
      explanation: Portuguese uses the conditional form 'viria' (from vir) for future-in-the-past
        in reported speech. English requires backshifting 'will' to 'would.' Portuguese
        speakers may retain 'will' because the Portuguese conditional is a single
        verb form, making the backshift feel redundant. This error is especially common
        when the reported event is still in the future at the time of speaking.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of 'would' for habitual past actions ('used to')
      example_portuguese: Quando crianca, ele brincava no parque.
      example_gloss: When a child, he played in the park.
      example_wrong: When he was a child, he would play in the park every day.
      example_correct: When he was a child, he used to play in the park every day.
      explanation: 'Portuguese uses the imperfect tense for both future-in-the-past
        and habitual past actions. English distinguishes ''would'' for future-in-the-past
        or narrative future, and ''used to'' for past habits. Portuguese speakers
        overuse ''would'' for habitual past because the Portuguese imperfect covers
        both meanings. Note: ''would'' for past habits is grammatically acceptable
        in narrative contexts but ''used to'' is preferred for emphasis on discontinued
        habits.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''He said he went to travel.'' Correct: ''He said he was going to travel.'''
    - 'Wrong: ''She said she will come tomorrow.'' Correct: ''She said she would come
      tomorrow.'''
    - 'Wrong: ''When I was young, I would walk to school every day.'' Correct: ''When
      I was young, I used to walk to school every day.'''
    why_it_happens: 'Portuguese uses the imperfect past of ''ir'' (ia/iam) to express
      future-in-the-past: ''Ele disse que ia viajar'' (He said he was going to travel).
      English requires ''was/were going to'' or ''would.'' Portuguese speakers may
      translate the imperfect literally as simple past, losing the future-in-the-past
      meaning. Additionally, Portuguese uses the conditional form (viria) for future-in-the-past
      in reported speech, which does not map cleanly onto English backshifting rules.
      Finally, the Portuguese imperfect covers both habitual past and future-in-the-past,
      leading to overuse of ''would'' where English prefers ''used to'' for discontinued
      past habits.'
    teacher_tips:
      how_to_explain: 'Teach ''was/were going to'' as the past form of ''be going
        to.'' Show the sequence: present -> ''I am going to travel.'' Past -> ''I
        was going to travel.'' For reported speech, teach the backshift rule: ''will''
        becomes ''would'' after past reporting verbs. For habitual past, show that
        ''used to'' emphasizes a discontinued habit, while ''would'' is for narrative
        past habits.

        '
      where_to_start: 'Begin with ''was/were going to'' for unfulfilled past plans:
        ''I was going to call you (but I didn''t).'' Then move to reported speech
        backshifting.

        '
      sequencing: 'Week 1: ''Was/were going to'' for unfulfilled past intentions.
        Week 2: ''Would'' for future-in-the-past in reported speech. Week 3: ''Would''
        vs. ''used to'' for habitual past. Week 4: Mixed practice with all three structures.

        '
      exercises:
      - name: Future in the Past Transformation
        type: transformation
        description: 'Give 10 present-future sentences. Students rewrite them as future-in-the-past.
          Example: ''I am going to travel'' becomes ''I was going to travel.'''
        duration: 15
      - name: Reported Speech Backshift Drill
        type: fill-in-the-blank
        description: Provide 15 direct speech sentences. Students convert to reported
          speech, backshifting 'will' to 'would' and 'am going to' to 'was going to.'
        duration: 15
      - name: Would vs Used to Sort
        type: matching
