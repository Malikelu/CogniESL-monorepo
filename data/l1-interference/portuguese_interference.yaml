  compound_nouns:
    interference_patterns:
    - Portuguese speakers reverse the word order of English compound nouns, producing head-initial structures that mirror Portuguese
      noun phrase order. Portuguese places the head noun first and the modifier after (often linked by "de/do/da"), so "bus stop"
      becomes "stop of bus" or "stop bus", "classroom" becomes "room of class", and "toothbrush" becomes "brush of teeth".
      This is the most frequent and visible compound noun error for Portuguese speakers because Portuguese noun phrases are
      systematically head-first while English compound nouns are modifier-first.
    - Portuguese speakers use prepositional phrases (with "de", "do", "da", "em", "com") where English requires a closed or
      open compound noun. Portuguese "parada de ônibus" (stop of bus), "escova de dentes" (brush of teeth), "sala de aula"
      (room of class), and "estação de trem" (station of train) transfer directly as "stop of bus", "brush of teeth", "room
      of class", and "station of train" instead of the English compounds "bus stop", "toothbrush", "classroom", and "train
      station". This pattern is especially persistent in writing and formal speech where learners are more likely to translate
      directly from Portuguese.
    - Portuguese speakers struggle with English compound noun pluralization because Portuguese compounds pluralize the first
      element (the head noun) while English pluralizes the last element. Portuguese "mães-de-sábio" (mothers-of-wise) vs
      English "passers-by" (not "passer-bys"), "mothers-in-law" (not "mother-in-laws"). Portuguese speakers produce errors
      like "passer-bys", "mother-in-laws", "toothbrushs" (by analogy with the Portuguese pattern of pluralizing the head),
      and "bus's stops" (overgeneralizing the Portuguese pluralization of the first element).
    - Portuguese speakers stress the second element of English compound nouns, transferring Portuguese prosodic patterns where
      the nuclear stress falls on the final element of a noun phrase. English compound nouns require primary stress on the
      first element ("TOOTHbrush", "BUS stop", "GREENhouse"), but Portuguese speakers produce "toothBRUSH", "bus STOP",
      "greenHOUSE", which can impede comprehension because English listeners use first-element stress to identify compounds
      vs. adjective-noun phrases (e.g., "BLACKboard" [compound] vs. "black BOARD" [adjective + noun]).
    why_it_happens: Portuguese noun phrase structure is fundamentally different from English compound noun structure. Portuguese
      is a head-initial language in noun phrases — the head noun comes first, followed by modifiers linked by prepositions
      (de, do, da, em, com). English compound nouns are modifier-first — the modifier precedes the head noun with no
      intervening preposition. This head-initial vs. modifier-first difference is one of the most robust typological contrasts
      between Portuguese and English and affects all compound noun types (noun+noun, adjective+noun, noun+gerund). Additionally,
      Portuguese pluralization of compound elements follows the head-noun-first principle, while English pluralizes the final
      element. Portuguese prosody places nuclear stress on the final element of noun phrases, while English compound nouns
      require initial stress. These three structural differences (word order, pluralization, prosody) are deeply automatized
      from L1 acquisition and transfer systematically to English. The errors are highly persistent because Portuguese compound
      structures are acquired in early childhood, are used across all registers, and are reinforced by the transparency of the
      Portuguese system (head + modifier = logical and compositional). Learners often do not notice the difference in input
      because both systems are compositional, and the errors rarely cause complete communication breakdown, reducing corrective
      feedback.
    teacher_tips:
      how_to_explain: 'Use a three-column contrastive chart: Portuguese NP structure → Literal English transfer (wrong) → Correct
        English compound. For word order, teach the formula: English compounds = MODIFIER + HEAD (tooth + brush = toothbrush),
        Portuguese = HEAD + de + MODIFIER (escova + de + dentes = brush of teeth). For pluralization, teach: English pluralizes
        the LAST element (toothbrushes, mothers-in-law, passers-by), Portuguese pluralizes the FIRST element. For stress, use
        the "first word LOUD" rule — English compounds stress the first element: TOOTHbrush, BUS stop, GREENhouse. Use hand
        gestures or clapping to mark stress. Emphasize that English compound nouns are vocabulary items that must be memorized
        as whole units — the meaning is not always predictable from the parts (e.g., "butterfly" ≠ butter + fly).'
      where_to_start: Start with the word order reversal since it is the most frequent and most visible error. Use 10 common
        compound nouns (bus stop, toothbrush, classroom, train station, swimming pool, post office, football, notebook,
        sunflower, raincoat) and have students identify the modifier and head in each. Show the Portuguese equivalent to
        highlight the structural difference. Then move to the prepositional strategy (stop of bus → bus stop). Then address
        pluralization and stress, which are subtler but persistent.
      exercises:
      - name: Compound noun word order reversal drill
        type: drill
        description: Provide 15 Portuguese noun phrases that use the "head + de + modifier" structure (e.g., "parada de ônibus",
          "escova de dentes", "sala de aula", "estação de trem", "copo de água", "porta-malas [car trunk — lit. door
          of suitcases]"). Students must produce the correct English compound noun, identifying the modifier and head.
          Include a column where they write the literal (wrong) English transfer to see why the error happens.
        duration: 15
      - name: Prepositional phrase to compound noun conversion
        type: error-correction
        description: Provide 15 sentences with Portuguese-style prepositional phrase transfers (e.g., "I wait at the stop of
          the bus", "She bought a brush of teeth", "The children are in the room of class", "We went to the station of
          train"). Students identify the prepositional phrase, convert it to the correct compound noun, and rewrite the
          sentence.
        duration: 15
      - name: Compound noun pluralization drill
        type: drill
        description: Provide 15 compound nouns and ask students to form the plural. Include regular compounds (toothbrush →
          toothbrushes, bus stop → bus stops, notebook → notebooks) and irregular/passive compounds (mother-in-law →
          mothers-in-law, passer-by → passers-by, editor-in-chief → editors-in-chief, court-martial → courts-martial).
          For each, show the Portuguese equivalent to highlight the different pluralization strategy (Portuguese pluralizes
          the first element).
        duration: 15
      - name: Compound noun stress identification
        type: practice
        description: Provide 20 compound noun pairs where stress distinguishes meaning (e.g., "BLACKboard" [compound — writing
          surface] vs "black BOARD" [adjective + noun — a board that is black], "GREENhouse" [compound — glass building
          for plants] vs "green HOUSE" [adjective + noun — a house painted green], "WHITE House" [compound — US presidential
          residence] vs "white HOUSE" [adjective + noun]). Students listen (teacher says each) and identify whether it is
          a compound (first-element stress) or adjective-noun phrase (second-element stress). Then they practice saying
          each with correct stress.
        duration: 15
      - name: Portuguese-to-English compound noun translation
        type: drill
        description: Give students a short Portuguese text (150 words) describing a daily routine that naturally includes
          many compound noun contexts (getting ready in the morning, going to work/school, activities). Students translate
          it into English, consciously converting every Portuguese "head + de + modifier" structure into an English compound
          noun. Then they exchange translations and check for any remaining Portuguese-style structures.
        duration: 20
    examples:
    - 'Wrong: ''I wait at the stop of the bus.'' (Portuguese: ''Eu espero na parada do ônibus.'' — head + de + modifier)
      Correct: ''I wait at the bus stop.'' (English: modifier + head, no preposition)'
    - 'Wrong: ''She bought a brush of teeth.'' (Portuguese: ''Ela comprou uma escova de dentes.'' — head + de + modifier)
      Correct: ''She bought a toothbrush.'' (English: modifier + head compound)'
    - 'Wrong: ''The children are in the room of class.'' (Portuguese: ''As crianças estão na sala de aula.'' — head + de
      + modifier) Correct: ''The children are in the classroom.'' (English: closed compound noun)'
    - 'Wrong: ''passer-bys'' (Portuguese pluralizes the first element: ''os passantes'' — but English pluralizes the last
      element) Correct: ''passers-by'''
    - 'Wrong: ''toothBRUSH'' (Portuguese prosody stresses the final element; English compounds require first-element stress)
      Correct: ''TOOTHbrush'' (stress on first element signals compound noun vs. adjective-noun phrase)'
    - 'Wrong: ''mother-in-laws'' (Portuguese pluralizes the first/head element) Correct: ''mothers-in-law'' (English pluralizes
      the last element — which is the head noun "mother" in this case)'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter, pp. 168-185 — documents structural transfer errors including noun phrase word order differences,
      head-initial vs. modifier-first compounding strategies, and prepositional phrase overuse where English requires compounds).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on noun phrase structure
      — describes Portuguese head-initial NP order, the productive "noun + de + modifier" compounding strategy, Portuguese
      compound pluralization rules that pluralize the first element, and Portuguese prosodic patterns with final-element
      nuclear stress, explaining the structural basis for L1 transfer to English compound nouns).'
    source_count: 2
    source_type: contrastive_analysis
    frequency: 4
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Portuguese
    notes: 'Portuguese has 243 GPs total. This entry covers the compound_nouns grammar point. Two independent sources:
      contrastive teaching reference (Swan & Smith 2001) and structural linguistics reference (Azevedo 1996). Patterns cover
      (1) head-first word order transfer producing reversed compounds (stop bus instead of bus stop), (2) prepositional strategy
      overuse (stop of bus instead of bus stop), (3) pluralization transfer from Portuguese first-element to English last-element
      rule, (4) prosodic stress transfer from Portuguese final-element to English first-element stress. Frequency is 4 (high —
      compound nouns are ubiquitous in English and the Portuguese structures transfer automatically) and persistence is 4 (high —
      deeply automatized from L1 NP structure acquired in early childhood). Replaces previous stub entry that incorrectly
      attributed ser/estar interference to compound nouns.'
  conditionals_advanced:
    interference_patterns:
    - >-
      Portuguese uses the futuro do pretérito (conditional tense) in both the if-clause and the main
      clause of hypothetical conditionals, a structure that is grammatical in Portuguese but ungrammatical
      in English. The Portuguese sentence "Se eu teria dinheiro, compraria uma casa" (literal: "If I would
      have money, I would buy a house") transfers directly into English as "If I would have money, I would
      buy a house" instead of the correct English form "If I had money, I would buy a house." English
      requires the past simple (not the conditional) in the if-clause of second conditionals. This is one
      of the most frequent and visible errors for Portuguese speakers at intermediate and advanced levels.
    - >-
      Portuguese uses the pretérito imperfeito do subjunctive (imperfect subjunctive) in counterfactual
      if-clauses, which maps structurally to the English past simple but triggers "was" instead of "were"
      for all persons. The Portuguese form "Se eu fosse rico" (If I were-subjunctive rich) correctly maps
      to "If I were rich," but Portuguese speakers frequently produce "If I was rich" because the Portuguese
      subjunctive form "fosse" is felt as a past-tense form rather than a mood distinction. The error extends
      to all persons -- "If he was," "If she was," "If we were" (correct by accident) -- because the underlying
      rule is not mastered. Portuguese does not distinguish "was" vs "were" in the subjunctive.
    - >-
      Portuguese lacks inverted conditional structures such as "Had I known...," "Were she here...," or
      "Should you need...." Portuguese expresses all conditional relationships with "se" (if) plus a finite
      verb, and there is no subject-auxiliary inversion equivalent. Portuguese speakers therefore avoid
      inverted conditionals entirely in formal writing, producing wordy "If I had known, I would have helped"
      where "Had I known, I would have helped" is the expected formal register. When taught the inversion
      pattern, Portuguese speakers produce errors like "Had I would have known" (mixing the Portuguese
      conditional with English inversion) or "If had I known" (hypercorrection with "if" retained).
    - >-
      Portuguese uses "se" plus the subjunctive for implied conditionals where English requires "but for,"
      "without," "otherwise," or "supposing." The Portuguese sentence "Se nao fosse a chuva, teriamos ido"
      (If it were not for the rain, we would have gone) can transfer as "If it was not for the rain, we
      would have gone" instead of "But for the rain, we would have gone" or "Without the rain, we would
      have gone." Portuguese speakers underuse these implied conditional structures in formal English writing
      because the L1 equivalent always requires an explicit "se" clause.
    why_it_happens: >-
      Portuguese has a rich verbal mood system (modo subjuntivo) with three tenses (presente, imperfeito,
      and futuro do subjuntivo) that map onto English conditional structures in non-transparent ways. The
      Portuguese futuro do pretérito (also called condicional) is used for hypothetical results AND in the
      if-clause of certain conditional types, whereas English strictly requires the past simple in the
      if-clause of second conditionals and the past perfect in the if-clause of third conditionals. The
      Portuguese subjunctive mood (imperfeito do subjunctive) is used in counterfactual if-clauses, but
      Portuguese does not distinguish "was" vs "were" -- the form "fosse" covers all persons. English
      requires "were" for all persons in formal counterfactual conditionals (the subjunctive remnant "If
      I were, if he were"). Portuguese has no inverted conditional structure -- all conditional clauses
      require "se" + subject + verb. And Portuguese implied conditionals always use an explicit "se"
      clause, so English structures like "But for + noun" and "Without + noun" have no direct L1 equivalent.
      These errors are deeply persistent because the Portuguese conditional-subjunctive system is acquired
      in early childhood and operates automatically in both speech and writing. The errors persist into
      advanced proficiency because the Portuguese structures are explicitly taught in schools and are markers
      of educated language use.
    teacher_tips:
      how_to_explain: >-
        Use a three-column contrastive chart showing Portuguese conditional structure, then Literal English
        transfer (wrong), then Correct English form. For the second conditional, show that Portuguese
        "Se eu teria" maps to English "If I had" (NOT "If I would have"). For the subjunctive, explain
        that English "were" for all persons is a remnant of the English subjunctive -- Portuguese has a
        full subjunctive system but English only preserves this one trace. For inversion, teach it as a
        formal alternative to "if" -- start with "Had I..." and "Were she..." as the most common patterns.
        For implied conditionals, teach "But for" and "Without" as formal alternatives to "if it were not
        for" and "if it had not been for."
      where_to_start: >-
        Start with the second conditional error ("If I would have" to "If I had") since it is the most
        frequent and visible. Use a timeline showing that the if-clause refers to an unreal present/future,
        so English uses the past simple (not the conditional). Then move to "was" vs "were" in counterfactual
        conditionals. Introduce inversion and implied conditionals at the advanced level once the basic
        conditional system is solid.
      exercises:
      - name: Second conditional repair drill
        type: error-correction
        description: >-
          Provide 15 sentences with Portuguese-style second conditional errors (for example: "If I would
          have more time, I would travel more," "If she would study harder, she would pass the exam," "If
          they would know the answer, they would tell us"). Students identify the error (would in the
          if-clause) and rewrite each sentence correctly using past simple in the if-clause. Include 5
          Portuguese sentences using "se + futuro do pretérito" for direct translation practice.
        duration: 20
      - name: Was vs Were -- counterfactual conditional judgment
        type: practice
        description: >-
          Provide 20 sentences with "was" or "were" in if-clauses (for example: "If I was rich," "If he
          were taller," "If she was here," "If we were late"). Students must decide which form is correct
          in formal English and explain why. Then they rewrite all sentences in formal English using "were"
          for all persons. Discuss the Portuguese connection: Portuguese "fosse" covers all persons, so
          English "were" for all persons is the parallel rule.
        duration: 15
      - name: Inverted conditional transformation
        type: drill
        description: >-
          Give students 12 standard conditional sentences (for example: "If I had known, I would have
          helped," "If she were here, she would agree," "If you should need anything, please call").
          Students transform each into the inverted form ("Had I known, I would have helped," "Were she
          here, she would agree," "Should you need anything, please call"). Then they transform 6 inverted
          sentences back to standard form. Discuss register: inverted conditionals are formal/literary.
        duration: 20
      - name: Implied conditional rewriting
        type: practice
        description: >-
          Provide 10 Portuguese sentences using "se" for implied conditionals (for example: "Se nao fosse
          a chuva, teriamos ido," "Se nao fosse o seu ajuda, eu teria falhado," "Se nao fosse o atraso,
          teriamos chegado a tempo"). Students translate each into natural English using "But for,"
          "Without," or "Otherwise" instead of a literal "if" clause. Then they write 5 original English
          sentences using each implied conditional structure.
        duration: 20
      - name: Mixed conditional error classification
        type: error-correction
        description: >-
          Provide 20 sentences with a mix of Portuguese-style conditional errors: (a) would in the
          if-clause, (b) was instead of were, (c) missing inversion in formal writing, (d) literal "if"
          translation where English prefers implied conditional, (e) correct sentences as distractors.
          Students classify each error type, correct it, and explain the Portuguese structural transfer
          that causes it. This exercise consolidates all four patterns from this entry.
        duration: 25
    examples:
    - 'Wrong: ''If I would have more money, I would buy a car.'' (Portuguese: ''Se eu teria mais dinheiro, compraria
      um carro.'' -- futuro do pretérito in both clauses) Correct: ''If I had more money, I would buy a car.'' (past simple
      in the if-clause, would + base verb in the main clause)'
    - 'Wrong: ''If I was rich, I would travel the world.'' (Portuguese: ''Se eu fosse rico'' -- imperfeito do subjunctive,
      no was/were distinction) Correct (formal): ''If I were rich, I would travel the world.'' (were for all persons
      in counterfactual conditionals)'
    - 'Wrong: ''If I had known, I would have helped.'' (correct but register-mismatched in formal writing) Correct
      (formal): ''Had I known, I would have helped.'' (inverted conditional -- no Portuguese equivalent)'
    - 'Wrong: ''If it was not for the rain, we would have gone.'' (Portuguese: ''Se nao fosse a chuva, teriamos ido.'')
      Correct: ''But for the rain, we would have gone.'' / ''Without the rain, we would have gone.'' / ''If it had not
      been for the rain, we would have gone.'' (mixed conditional with past perfect in the if-clause)'
    - 'Wrong: ''If she would be here, she would help us.'' (Portuguese: ''Se ela estivesse aqui, nos ajudaria.'' -- imperfeito
      do subjunctive of estar) Correct: ''If she were here, she would help us.'' (NOT would be in the if-clause)'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter -- documents conditional structure transfer errors including futuro do pretérito overuse
      in if-clauses, subjunctive-to-indicative transfer producing was/were errors, and avoidance of inverted conditionals
      due to lack of L1 equivalent).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on verbal moods
      and tenses -- describes the Portuguese subjunctive system including imperfeito do subjunctive and futuro do pretérito,
      explaining the structural basis for L1 transfer to English conditional structures).'
