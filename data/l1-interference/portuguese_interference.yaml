    assessment: Expert-evaluated for L1 transfer severity - Portuguese
    notes: >
      Four documented interference patterns: (1) verb-subject inversion after "so,"
      (2) "so much" before adjectives, (3) so/such confusion with noun phrases,
      (4) omission of "that" in result clauses.
      Sources: Swan & Smith (2001), Azevedo (1996), Celce-Murcia & Larsen-Freeman (2015).
    source_rank: 1
    citations:
    - claim: Interference pattern for result clauses (word order, so/such confusion)
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
