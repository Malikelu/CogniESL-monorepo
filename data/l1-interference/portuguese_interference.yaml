  reported_questions:
    interference_patterns:
    - pattern: Use of question word order (subject-auxiliary inversion) in reported questions
      example_portuguese: Ele perguntou onde eu moro.
      example_gloss: He asked where I live.
      example_wrong: He asked where do I live.
      example_correct: He asked where I live.
      explanation: Portuguese retains direct-question word order (verb-subject) in
        reported clauses introduced by question words (onde, o que, quando). English
        reported questions require statement word order (subject-verb). Portuguese speakers
        transfer the inversion pattern, producing 'He asked where do I live' instead
        of 'He asked where I live.' This is one of the most persistent reported-speech
        errors for Portuguese learners.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Omission of 'if' or 'whether' in reported yes/no questions
      example_portuguese: Ela perguntou se eu queria cafe.
      example_gloss: She asked if I wanted coffee.
      example_wrong: She asked me I wanted coffee.
      example_correct: She asked me if I wanted coffee.
      explanation: Portuguese 'se' (if/whether) can be omitted in informal reported
        yes/no questions, and the clause structure closely mirrors direct speech. English
        requires 'if' or 'whether' to introduce reported yes/no questions. Portuguese
        speakers omit the complementizer, producing 'She asked me I wanted coffee'
        instead of 'She asked me if I wanted coffee.' This error is particularly common
        with 'ask,' 'wonder,' and 'want to know.'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: He asked where do I live. Correct: He asked where I live.'
    - 'Wrong: She asked me I wanted coffee. Correct: She asked me if I wanted coffee.'
    - 'Wrong: They asked what time is it. Correct: They asked what time it was.'
    - 'Wrong: She asked me do I like music. Correct: She asked me if I liked music.'
    why_it_happens: "Portuguese reported questions preserve the word order of direct questions. In Portuguese, 'Ele perguntou onde eu moro' uses the same verb-subject order as the direct question 'Onde você mora?' — there is no structural change when reporting. English, by contrast, requires two simultaneous changes when forming reported questions — (1) switch from question word order (auxiliary-subject) to statement word order (subject-verb), and (2) for yes/no questions, add the complementizer 'if' or 'whether.' Portuguese 'se' maps to 'if/whether' but is sometimes omitted in colloquial Portuguese, reinforcing the omission error in English. The combination of retaining inversion and dropping 'if/whether' makes reported questions one of the highest-error grammar points for Portuguese L1 learners (Swan & Smith, 2001; Parrott, 2000)."
    teacher_tips:
      how_to_explain: 'Write a direct question on the board: "Where do you live?" Then say: "He asked me..." and show that the word order FLIPS back to statement order: "He asked me where I live." Emphasize: NO auxiliary "do" in reported questions. For yes/no questions, add: "We need IF or WHETHER — never just the bare clause." Use a visual rule card: "Reported Q = question word + SUBJECT + VERB" and "Reported yes/no = if/whether + SUBJECT + VERB."'
      where_to_start: "Begin with 'asked where' and 'asked what' patterns (wh- questions) since these are the most frequent. Then introduce yes/no reported questions with 'if/whether.'"
      sequencing: 'Week 1: Wh- reported questions (statement word order). Week 2: Yes/no reported questions (if/whether insertion). Week 3: Mixed wh- and yes/no with tense backshifting. Week 4: Real-world practice (reporting conversations, interviews, surveys).'
      exercises:
      - name: Word Order Flip Drill
        type: transformation
        description: "Give 10 direct wh- questions. Students convert to reported speech, changing word order from question to statement order. Focus on removing 'do/does/did' and restoring subject-verb order."
        duration: 15
      - name: If or Whether Insertion
        type: fill-in-the-blank
        description: "Provide 10 reported yes/no questions missing 'if' or 'whether.' Students insert the correct complementizer and fix word order."
        duration: 10
      - name: Reported Question Error Correction
        type: error-correction
        description: "Give a dialogue with 8 reported question errors (inversion errors and missing if/whether). Students identify and correct each error."
        duration: 15
      - name: Conversation Reporter
        type: role-play
        description: "In pairs, Student A asks 5 direct questions. Student B reports each question to Student C using reported speech. Rotate roles."
        duration: 20
