  indirect_questions:
    interference_patterns:
    - pattern: Use of question word order in indirect questions
      example_portuguese: Eu nao sei onde ele esta.
      example_gloss: I not know where he is.
      example_wrong: I do not know where is he.
      example_correct: I do not know where he is.
      explanation: Portuguese maintains subject-verb inversion in indirect questions
        (onde ele esta -> where is he). English requires statement word order in
        indirect questions (where he is). Portuguese speakers transfer the inverted
        word order directly, producing "where is he" instead of "where he is."
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'if/whether' in reported yes/no questions
      example_portuguese: Ela perguntou se eu queria cafe.
      example_gloss: She asked if I wanted coffee.
      example_wrong: She asked me I wanted coffee.
      example_correct: She asked me if I wanted coffee.
      explanation: Portuguese uses 'se' (if) to introduce indirect yes/no questions,
        but the conjunction can be omitted in colloquial speech. English requires
        'if' or 'whether' in reported yes/no questions. Portuguese speakers may omit
        the conjunction entirely, producing "She asked me I wanted coffee" instead
        of "She asked me if I wanted coffee." This error is particularly common with
        verbs like ask, wonder, know, and tell.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I do not know where is he. Correct: I do not know where he is.'
    - 'Wrong: She asked me I wanted coffee. Correct: She asked me if I wanted coffee.'
    - 'Wrong: I wonder where can I find it. Correct: I wonder where I can find it.'
    - 'Wrong: He wanted to know I was coming. Correct: He wanted to know if I was coming.'
    why_it_happens: 'Portuguese has two structural differences from English in indirect
      questions. First, Portuguese maintains subject-verb inversion in indirect questions
      (onde ele esta = where is he), while English uses statement word order (where
      he is). Second, Portuguese uses ''se'' to introduce indirect yes/no questions,
      but the conjunction is sometimes omitted in colloquial speech. English requires
      ''if'' or ''whether'' in all reported yes/no questions. Portuguese speakers transfer
      both patterns - inverted word order in wh- questions and optional omission of
      the yes/no conjunction.'
    teacher_tips:
      how_to_explain: 'Rule 1: Indirect questions use STATEMENT word order. Not "where
        is he" but "where he is." Rule 2: Yes/no questions need "if" or "whether."
        Not "She asked me I wanted coffee" but "She asked me if I wanted coffee."
        Write both rules on the board and drill with examples.'
      where_to_start: Begin with wh- indirect questions (where, what, when) since
        these are more frequent. Then introduce yes/no indirect questions with if/whether.
      sequencing: 'Week 1: Wh- indirect questions (statement word order). Week 2:
        Yes/no indirect questions (if/whether). Week 3: Mixed practice with both types.
        Week 4: Production tasks (asking for information politely).'
      exercises:
      - name: Indirect Question Word Order Drill
        type: error-correction
        description: Provide 10 indirect questions with inverted word order. Students
          rewrite with correct statement word order.
        duration: 15
      - name: If/Whether Insertion
        type: fill-in-the-blank
        description: Provide 10 reported yes/no questions missing 'if' or 'whether.'
          Students insert the correct conjunction.
        duration: 15
      - name: Direct to Indirect Conversion
        type: transformation
        description: Give 10 direct questions. Students rewrite them as indirect
          questions embedded in statements or requests.
        duration: 20
