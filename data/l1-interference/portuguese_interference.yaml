  must_have_to_need:
    interference_patterns:
    - pattern: Use of 'must' for external obligation where 'have to' is needed
      example_portuguese: Eu tenho que trabalhar.
      example_gloss: I have that to work.
      example_wrong: I must work.
      example_correct: I have to work.
      explanation: Portuguese 'ter que' expresses external obligation (rules, requirements).
        English 'have to' is more common for external obligation; 'must' is stronger
        and often implies personal obligation.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of 'must' for necessity where 'need to' is more natural
      example_portuguese: Eu preciso estudar.
      example_gloss: I need to study.
      example_wrong: I must study.
      example_correct: I need to study.
      explanation: Portuguese 'precisar' expresses necessity. English 'need to' is
        more natural for general necessity; 'must' is stronger.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I must work.'' (external obligation) Correct: ''I have to work.'''
    - 'Wrong: ''I must study.'' (general necessity) Correct: ''I need to study.'''
    why_it_happens: 'Portuguese has three main ways to express obligation/necessity:
      ''dever'' (must/should), ''ter que'' (have to), and ''precisar'' (need to).
      English distinguishes these more sharply: ''must'' (strong/personal obligation),
      ''have to'' (external obligation), ''need to'' (necessity). Portuguese speakers
      overuse ''must.'''
    teacher_tips:
      how_to_explain: 'Teach the distinction: ''must'' = strong/personal (I must study
        harder), ''have to'' = external (I have to wear a uniform at work), ''need
        to'' = necessity (I need to buy groceries).'
      where_to_start: Begin with 'have to' for external obligations since it is the
        most common.
      sequencing: 'Week 1: ''Have to'' for external obligation. Week 2: ''Must'' for
        strong/personal obligation. Week 3: ''Need to'' for necessity. Week 4: Mixed
        practice.'
      exercises:
      - name: Must vs Have To vs Need To Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'must,'
          'have to,' and 'need to.'
        duration: 15
      - name: Obligation Translation Challenge
        type: translation
        description: Give 10 Portuguese sentences using 'dever,' 'ter que,' and 'precisar.'
          Students translate each into English, selecting the correct modal/semi-modal.
          Include a mix of external obligation, personal obligation, and necessity
          contexts.
        duration: 20
