  degree_adverbs:
    interference_patterns:
    - pattern: Use of 'very' where 'too' is needed
      example_portuguese: E muito quente.
      example_gloss: It is very hot.
      example_wrong: It is very hot.
      example_correct: It is too hot.
      explanation: Portuguese 'muito' covers both 'very' and 'too.' English distinguishes
        'very' (intensifier) from 'too' (excessive).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'so' where 'such' is required (and vice versa)
      example_portuguese: E tanta bonito.
      example_gloss: It is so beautiful.
      example_wrong: It is so a beautiful day.
      example_correct: It is such a beautiful day.
      explanation: Portuguese 'tanto/tanta' functions as both an intensifier before
        adjectives and before noun phrases, without the structural split English requires.
        English uses 'so' + adjective/adverb (so beautiful, so quickly) and 'such' +
        article + adjective + noun (such a beautiful day). Portuguese speakers transfer
        the single 'tanto' pattern, producing 'so a beautiful day' instead of 'such
        a beautiful day,' or overusing 'such' with bare adjectives.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Placement of 'enough' before the adjective (L1 transfer)
      example_portuguese: Ele e bastante alto.
      example_gloss: He is enough tall.
      example_wrong: He is enough tall.
      example_correct: He is tall enough.
      explanation: Portuguese 'bastante' and 'suficiente' precede the word they modify
        (bastante alto = enough tall). English 'enough' as an adverb of degree follows
        the adjective or adverb it modifies (tall enough, fast enough). Portuguese
        speakers transfer the pre-adjective position, producing 'enough tall' instead
        of 'tall enough.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''It is very hot.'' (meaning excessively) Correct: ''It is too hot.'''
    - 'Wrong: ''It is so a beautiful day.'' Correct: ''It is such a beautiful day.'''
    - 'Wrong: ''He is enough tall.'' Correct: ''He is tall enough.'''
    why_it_happens: 'Portuguese degree modifiers map differently onto English. (1) Portuguese
      ''muito'' covers both ''very'' (intensifier) and ''too'' (excessive), leading
      to overuse of ''very'' when ''too'' is needed. (2) Portuguese ''tanto/tanta''
      functions as a single intensifier regardless of whether it modifies an adjective
      or a noun phrase, while English splits the function: ''so'' + adjective/adverb
      vs. ''such'' + article + adjective + noun. Portuguese speakers transfer the
      unified ''tanto'' pattern and produce ''so a beautiful day'' instead of ''such
      a beautiful day.'' (3) Portuguese ''bastante/suficiente'' precedes the word
      it modifies, while English ''enough'' as a degree adverb follows the adjective/adverb.
      This word-order difference causes Portuguese speakers to say ''enough tall''
      instead of ''tall enough.'' All three patterns are documented in contrastive
      analyses of Portuguese and English (Swan & Smith, 2001; Azevedo, 1996; Folse, 2016).'
    teacher_tips:
      how_to_explain: 'Teach three contrasts on the board: (1) ''very'' = a lot, ''too''
        = more than desired. ''It is very hot'' vs. ''It is too hot to eat.'' (2) ''so''
        + adjective: ''so beautiful.'' ''Such'' + article + adjective + noun: ''such
        a beautiful day.'' Use the memory aid: SO = bare adjective, SUCH = adjective
        + noun. (3) ''Enough'' goes AFTER adjectives: ''tall enough,'' ''fast enough.''
        Compare: Portuguese ''bastante alto'' (enough tall) vs. English ''tall enough.'''
      where_to_start: 'Begin with ''very'' vs. ''too'' (most frequent error). Then introduce
        ''so'' vs. ''such.'' Finally teach ''enough'' placement.'
      sequencing: 'Week 1: ''Very'' as intensifier. Week 2: ''Too'' as excessive. Week
        3: ''So'' + adjective vs. ''such'' + noun phrase. Week 4: ''Enough'' post-adjective
        placement. Week 5: Mixed practice.'
      exercises:
      - name: Very vs Too Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between 'very' and 'too.'
        duration: 15
      - name: So vs Such Decision
        type: fill-in-the-blank
        description: Provide 15 sentences with blank spaces. Students choose between
          'so' and 'such' based on the grammatical structure that follows (bare adjective
          vs. article + adjective + noun).
        duration: 15
      - name: Enough Placement Correction
        type: error-correction
        description: Provide 10 sentences where 'enough' incorrectly precedes the adjective.
          Students rewrite each sentence with 'enough' in the correct post-adjective
          position.
        duration: 10
