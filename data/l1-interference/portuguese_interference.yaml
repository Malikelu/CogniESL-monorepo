  and_but_or_so:
    interference_patterns:
    - Portuguese speakers overuse "and" (from Portuguese "e") in contexts where English prefers asyndeton, separate sentences,
      or subordinate clauses. Portuguese uses "e" to chain clauses in long paratactic sequences ("Ele chegou e sentou e comeu
      e falou" / "He arrived and sat and ate and spoke") where English would use separate sentences or restructuring. Portuguese
      also uses "e" sentence-initially as a discourse marker ("E então fomos" / "And then we went") far more freely than English
      allows, leading to overuse of sentence-initial "And" in writing. Additionally, Portuguese lists routinely include "e"
      before the final item in ways that map to English "and", but Portuguese also inserts "e" between items in compound predicates
      where English requires no conjunction ("She sang and danced and laughed" is natural in Portuguese "Ela cantou e dançou
      e riu" but English prefers "She sang, danced, and laughed").
    - Portuguese speakers overuse "but" (from Portuguese "mas") in formal and academic registers where English requires "however",
      "nevertheless", or "yet". Portuguese "mas" is the default contrastive conjunction in all registers, and Portuguese also
      uses "porém", "contudo", "no entanto", "entretanto" — all of which map to English "but" or other contrastive connectors.
      Portuguese speakers produce "But I think it is wrong" in formal essays where English requires "However, I think it is
      wrong." Portuguese also allows "mas" in sentence-initial position more freely than English prefers in written registers,
      leading to overuse of sentence-initial "But" in student writing.
    - Portuguese speakers overuse "so" (from Portuguese "então") in resultative contexts and confuse it with temporal "then".
      Portuguese "então" covers both resultative "so/therefore" and temporal "then/next", leading to errors like "I was tired
      so I went to bed early so I woke up early" (from "Eu estava cansado então fui dormir cedo então acordei cedo") where
      the second "so" should be "and" or "so that" or a separate sentence. Portuguese speakers also use "so" as a sentence-initial
      discourse marker ("So, what do you think?" / "Então, o que você acha?") more frequently than English academic writing
      allows. In formal contexts, "so" is replaced by "therefore", "consequently", or "as a result".
    - Portuguese speakers produce "and but" or "but so" conjunction stacking, transferring Portuguese patterns like "e mas"
      (and but) or "mas então" (but then/so). Portuguese allows sequences of coordinating conjunctions in ways that are ungrammatical
      in English. Errors include "And but I went anyway" (from "E mas eu fui mesmo assim"), "I was tired but so I went to
      bed" (from "Eu estava cansado mas então fui dormir"), and "It was raining and so we stayed home" (redundant "and so"
      from "e então ficamos em casa"). English requires a single coordinating conjunction between two clauses — not a stack.
    - Portuguese speakers use "and" in negative contexts where English requires "or". Portuguese "e" can appear in some negative
      constructions where English strictly requires "or" ("I don't like coffee and tea" instead of "I don't like coffee or
      tea"). While Portuguese generally uses "ou" in negatives (aligning with English), the frequency of "e" in Portuguese
      creates interference, especially in rapid speech and lower-proficiency writing. The error "I don't want this and that"
      instead of "I don't want this or that" is a direct transfer of Portuguese negative coordination patterns.
    why_it_happens: Portuguese has a coordinating conjunction system built around four core conjunctions — "e" (and), "mas"
      (but), "ou" (or), "então" (so/then) — that differ from English in frequency, register distribution, and combinatorial
      rules. Portuguese "e" is used far more frequently than English "and" because Portuguese discourse favors explicit paratactic
      coordination where English prefers asyndeton, hypotaxis (subordination), or separate sentences. Portuguese "mas" is
      the single default contrastive in all registers, whereas English distributes contrast across "but" (informal), "however",
      "nevertheless", "yet", "although" depending on register and syntactic position. Portuguese "então" is polysemous, covering
      both resultative "so/therefore" and temporal "then/next", whereas English splits these into distinct lexical items.
      Portuguese allows conjunction stacking ("e mas", "mas então") that is ungrammatical in English. These patterns are deeply
      automatized from early L1 acquisition and persist into advanced proficiency, particularly in writing where learners
      have more time to apply L1 discourse planning strategies.
    teacher_tips:
      how_to_explain: 'Use a four-column contrastive chart: Portuguese conjunction → Literal English transfer (wrong or marked)
        → Correct English → Register note. For "and", show that Portuguese "e" chains clauses but English prefers separate
        sentences or restructuring. For "but", show that Portuguese "mas" works in all registers but English "but" is informal
        — formal writing needs "however" or "nevertheless". For "so", split "então" into two English words: "so" (result,
        informal) vs "then" (time) vs "therefore" (result, formal). For conjunction stacking, use the "one bridge only" metaphor
        — between two clauses, you need ONE conjunction, not a stack. For negatives, drill the rule: in English negatives,
        use OR, not AND.'
      where_to_start: Start with the "and" overuse pattern since it is the most frequent and visible error. Have students
        rewrite a Portuguese-style chained paragraph ("I woke up and I ate breakfast and I went to work and I had lunch and
        I came home") into natural English with varied sentence structure. Then move to "but" register awareness, then "so/then"
        splitting, then conjunction stacking, then negative "or".
      exercises:
      - name: And-chain breakdown
        type: practice
        description: 'Give students 10 Portuguese-style "e"-chained paragraphs (5-8 clauses connected by "and"). Students
          must rewrite each into natural English using varied sentence structure — separate sentences, subordinate clauses,
          participial phrases, and asyndeton. Goal: eliminate at least half the "and" conjunctions. Example input: "I woke
          up and I ate breakfast and I went to work and I had a meeting and I came home and I cooked dinner and I watched
          TV and I went to bed." Example output: "I woke up, ate breakfast, and went to work. After a meeting, I came home,
          cooked dinner, watched TV, and went to bed."'
        duration: 20
      - name: But → However register transformation
        type: practice
        description: 'Give students a short essay (150 words) written with Portuguese-style "but" in every contrastive position,
          including formal contexts. Students must replace each "but" with the appropriate English connector: "but" (informal),
          "however" (formal, mid-sentence or sentence-initial), "nevertheless" (formal), "yet" (formal, mid-sentence), or
          "although" (subordinate clause). Discuss which choices are appropriate for academic writing vs. conversation.'
        duration: 20
      - name: So vs Then vs Therefore splitting drill
        type: drill
        description: 'Provide 20 Portuguese sentences using "então" in various contexts (resultative, temporal, discourse
          marker). For each, students must choose the correct English translation: "so" (result, informal), "then" (temporal
          sequence), "therefore" (result, formal), "so that" (purpose), or restructure without a conjunction. Include "Ele
          estudou muito então passou" (result → "so/therefore"), "Ele chegou então sentou" (temporal → "then"), "Então, o
          que você acha?" (discourse marker → "So" or restructure).'
        duration: 15
      - name: Conjunction stacking error correction
        type: error-correction
        description: Provide 15 sentences with Portuguese-style conjunction stacking errors (e.g. "And but I went anyway",
          "It was raining and so we stayed home", "I was tired but so I went to bed", "She called and but he didn't answer").
          Students identify the stacked conjunctions, explain why they are wrong in English (only one coordinating conjunction
          between two clauses), and rewrite each sentence with a single correct conjunction or restructured syntax.
        duration: 15
      - name: Negative coordination — and vs or
        type: drill
        description: 'Provide 20 negative sentences with the conjunction removed (e.g. "I don''t like coffee ___ tea", "She
          didn''t eat breakfast ___ lunch", "They don''t speak French ___ German"). Students must insert "and" or "or" and
          explain their choice. Rule: in standard English negatives, use "or" to connect items. Then give 10 Portuguese negative
          sentences using "e" or "ou" and have students translate, applying the English rule.'
        duration: 10
      - name: Portuguese-to-English conjunction translation
        type: drill
        description: 'Give 15 Portuguese sentences that directly trigger conjunction transfer errors. Students translate each
          into natural English, consciously avoiding direct transfer of Portuguese conjunction patterns. Include: "E então
          fomos e vimos e voltamos" (and-chain), "Mas eu acho que está errado" (but in formal context), "Eu estava cansado
          então fui dormir" (então → so/then), "Não quero café e chá" (negative and). Discuss each answer as a class.'
        duration: 20
    examples:
    - 'Wrong: ''I woke up and I ate breakfast and I went to work and I had lunch and I came home.'' (Portuguese: ''Eu acordei
      e comi o café da manhã e fui trabalhar e almocei e voltei para casa.'' — e-chaining) Correct: ''I woke up, ate breakfast,
      and went to work. After lunch, I came home.'' (restructured, fewer conjunctions)'
    - 'Wrong: ''But I think the government should invest more in education.'' (Portuguese: ''Mas eu acho que o governo deveria
      investir mais em educação.'' — mas in formal register) Correct: ''However, I think the government should invest more
      in education.'' (formal register requires however, not but, in academic writing)'
    - 'Wrong: ''I was tired so I went to bed early so I woke up early.'' (Portuguese: ''Eu estava cansado então fui dormir
      cedo então acordei cedo.'' — então polysemy) Correct: ''I was tired, so I went to bed early and woke up early.'' (split
      então into so + and, not so + so)'
    - 'Wrong: ''And but I went anyway.'' (Portuguese: ''E mas eu fui mesmo assim.'' — conjunction stacking) Correct: ''But
      I went anyway.'' / ''And yet I went anyway.'' (single conjunction only)'
    - 'Wrong: ''I don''t like coffee and tea.'' (Portuguese: ''Eu não gosto de café e chá.'' — e in negative) Correct: ''I
      don''t like coffee or tea.'' (English requires or in negatives)'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents conjunction transfer errors including e → and overuse, mas → but register mismatch,
      então → so/then confusion, and conjunction stacking from L1 transfer).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on coordination and
      discourse connectors — describes the Portuguese conjunction system including e/mas/ou/então frequency, register distribution,
      and combinatorial rules, explaining the structural basis for L1 transfer to English coordinating conjunctions).'
