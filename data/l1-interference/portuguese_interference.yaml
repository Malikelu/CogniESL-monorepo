  neednt:
    interference_patterns:
    - pattern: Use of 'must not' where 'don't have to' is needed
      example_portuguese: Voce nao precisa vir.
      example_gloss: You not need to come.
      example_wrong: You must not come.
      example_correct: You don't have to come. / You needn't come.
      explanation: Portuguese 'nao precisar' expresses lack of necessity. English
        uses 'don't have to' or 'needn't' for lack of necessity, and 'must not' for
        prohibition. Portuguese speakers map 'nao precisar' onto 'must not' because
        both involve negation + verb, but the semantics differ critically.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Insertion of 'to' after 'need not' (treating need as a regular verb)
      example_portuguese: Voce nao precisa vir.
      example_gloss: You not need to-come.
      example_wrong: You need not to come.
      example_correct: You needn't come. / You don't need to come.
      explanation: Portuguese 'precisar' is a regular verb that takes a bare infinitive
        complement (nao precisar vir = not need to come). When Portuguese speakers
        use 'need' in English, they treat it as a regular verb and insert 'to' after
        'need not,' producing 'need not to come.' In English, 'need' as a modal takes
        a bare infinitive (need not come / needn't come), while 'need' as a regular
        verb requires 'to' (don't need to come). The hybrid 'need not to come' is
        an L1 transfer error.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''You must not come.'' (no obligation) Correct: ''You don''t have to
      come.'''
    - 'Wrong: ''You need not to come.'' Correct: ''You needn''t come.'' / ''You don''t
      need to come.'''
    why_it_happens: Portuguese 'nao precisar' expresses lack of necessity. English
      uses 'don't have to' or 'needn't' for lack of necessity. Portuguese speakers
      may use 'must not' which means prohibition, not lack of obligation. Additionally,
      because Portuguese 'precisar' is always a regular verb (never a modal), Portuguese
      speakers treat English 'need' as a regular verb and insert 'to' after 'need
      not,' producing the hybrid error 'need not to come.' This is documented in Swan
      & Smith (2001) for Portuguese learners and in Azevedo (1996) regarding Portuguese
      verb complementation patterns.
    teacher_tips:
      how_to_explain: 'Teach: ''don''t have to/needn''t'' = no obligation (optional),
        ''must not'' = prohibition (forbidden). Also teach: ''need not'' (modal, no
        ''to'') vs ''don''t need to'' (regular verb, with ''to''). The form ''need
        not to'' is always wrong.'
      where_to_start: 'Begin with clear examples: ''You don''t have to wear a tie''
        (optional) vs. ''You must not wear a tie'' (forbidden). Then contrast: ''You
        needn''t come'' (modal, no ''to'') vs ''You don''t need to come'' (regular
        verb, with ''to'').'
      sequencing: 'Week 1: ''Don''t have to'' for lack of obligation. Week 2: ''Needn''t''
        as modal alternative (bare infinitive, no ''to''). Week 3: Contrast with ''must
        not.'' Week 4: Error correction targeting ''need not to.'' Week 5: Mixed practice.'
      exercises:
      - name: Needn't vs Must Not Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'don't
          have to/needn't' and 'must not.'
        duration: 15
      - name: Modal vs Regular Need Correction
        type: error-correction
        description: Provide 10 sentences with the 'need not to' error. Students must
          correct each sentence using either modal 'needn't' or regular 'don't need
          to.'
        duration: 15
