  mixed_conditionals:
    interference_patterns:
    - pattern: Use of simple past instead of past perfect in the if-clause
      example_portuguese: Se eu tivesse estudado mais, eu teria passado.
      example_gloss: If I had studied more, I would have passed.
      example_wrong: If I studied more, I would pass.
      example_correct: If I had studied more, I would have passed.
      explanation: Portuguese uses the pluperfect subjunctive (tivesse + past participle)
        for unreal past conditions. English requires 'had + past participle' (past
        perfect) in the if-clause and 'would have + past participle' in the main clause
        (third conditional). Portuguese speakers often transfer the Portuguese pluperfect
        subjunctive form directly, producing 'If I studied' instead of 'If I had studied,'
        because the Portuguese form maps more closely to English simple past than
        to the English past perfect structure.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'would' in the if-clause (transfer of Portuguese conditional)
      example_portuguese: Se eu teria dinheiro, eu viajaria.
      example_gloss: If I would have money, I would travel.
      example_wrong: If I would have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese allows the conditional tense (teria) in the if-clause
        of some conditional constructions. English strictly prohibits 'would' in the
        if-clause of standard conditionals. Portuguese speakers transfer this L1 pattern
        and produce '*If I would have...' instead of 'If I had...'. This error is
        particularly persistent because Portuguese conditional constructions permit
        the conditional mood in both clauses, while English reserves 'would' exclusively
        for the main clause in second and third conditionals.
      frequency: 3
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''If I studied more, I would pass.'' (past condition) Correct: ''If
      I had studied more, I would have passed.'''
    - 'Wrong: ''If I would have money, I would travel.'' Correct: ''If I had money,
      I would travel.'''
    - 'Wrong: ''If she would have known, she would have come.'' Correct: ''If she
      had known, she would have come.'''
    why_it_happens: Portuguese has a rich subjunctive mood with distinct forms for
      present (se eu tivesse), past (se eu tivesse tido), and future (se eu vier a
      ter) subjunctive. The Portuguese pluperfect subjunctive (se eu tivesse estudado)
      maps functionally to the English third conditional (If I had studied), but the
      surface forms differ significantly. Portuguese speakers often default to simpler
      English structures (simple past) because the Portuguese subjunctive system handles
      the hypothetical meaning morphologically, while English relies on auxiliary
      verb combinations (had + past participle). Additionally, Portuguese permits
      the conditional tense in if-clauses in some dialects and registers (se eu teria),
      which directly transfers to the ungrammatical English '*If I would have...'.
      The lack of a one-to-one mapping between Portuguese subjunctive forms and English
      conditional structures creates persistent interference, especially at intermediate
      levels where students have not yet internalized the English conditional system.
    teacher_tips:
      how_to_explain: 'Draw a timeline on the board. Show that mixed conditionals
        connect PAST conditions to PRESENT results: ''If I had studied (past), I would
        be a doctor now (present).'' For pure past conditionals: ''If I had studied
        (past), I would have passed (past).'' Emphasize: NEVER use ''would'' in the
        if-clause. Drill: ''If I had... I would...'' vs ''If I had... I would have...'''
      where_to_start: 'Begin with clear past vs present result contrasts. Use real-life
        scenarios: ''If I had saved money last year, I would have a car now'' (mixed)
        vs ''If I had saved money last year, I would have bought a car'' (third conditional).'
      sequencing: 'Week 1: Review second conditional (present/future unreal). Week
        2: Third conditional (past unreal). Week 3: Mixed conditional (past condition
        + present result). Week 4: Contrast all three types. Week 5: Error correction
        focus on ''would'' in if-clause.'
      exercises:
      - name: Conditional Type Sort
        type: matching
        description: Provide 15 conditional sentences. Students classify each as second,
          third, or mixed conditional and identify the time reference of the condition
          and result.
        duration: 15
      - name: Would in the If-Clause Error Correction
        type: error-correction
        description: Provide 12 sentences with 'would' incorrectly used in if-clauses.
          Students identify the error and rewrite using the correct structure (had
          + past participle).
        duration: 15
      - name: Mixed Conditional Transformation
        type: transformation
        description: Give 10 third conditional sentences. Students rewrite them as
          mixed conditionals by changing the result clause to a present-time consequence.
        duration: 15
