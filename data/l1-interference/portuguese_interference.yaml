  narrative_tenses:
    interference_patterns:
    - pattern: Use of present tense in narratives (historical present transfer)
      example_portuguese: Eu cheguei em casa e liguei a TV.
      example_gloss: I arrived at home and turned on the TV.
      example_wrong: I arrive at home and turn on the TV.
      example_correct: I arrived at home and turned on the TV.
      explanation: Portuguese can use the present tense for dramatic effect in narratives
        (historical present / presente historico). English uses the past simple for
        completed narratives. Portuguese speakers transfer the historical present
        into English storytelling, producing present-tense verbs where English requires
        past simple.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Overuse of present perfect for completed past events in narratives
      example_portuguese: Eu tenho chegado tarde muitas vezes.
      example_gloss: I have arrived late many times.
      example_wrong: I have arrived at the party at 8pm last night.
      example_correct: I arrived at the party at 8pm last night.
      explanation: Portuguese uses the present perfect (pretérito perfeito composto)
        with a habitual/repeated meaning (tenho chegado = I have been arriving). English
        present perfect cannot be used with specific past time references. Portuguese
        speakers may overuse the present perfect in narrative contexts where English
        requires the past simple for completed actions at a specific time.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I arrive at home and turn on the TV.'' Correct: ''I arrived at home
      and turned on the TV.'''
    - 'Wrong: ''I have arrived at the party at 8pm last night.'' Correct: ''I arrived
      at the party at 8pm last night.'''
    why_it_happens: Portuguese uses the historical present (present tense for past
      events) for dramatic effect in storytelling. English uses the past simple for
      completed narratives. Portuguese speakers may use the present tense in English
      narratives, especially when telling stories. Additionally, Portuguese uses the
      present perfect (compounded form with ter/have) with a habitual or iterative
      meaning (tenho estudado = I have been studying), which does not map onto the
      English present perfect. When narrating specific completed past events, Portuguese
      speakers may incorrectly use the present perfect where English requires the
      past simple, because the Portuguese composto form can refer to past time frames
      more flexibly than the English present perfect.
    teacher_tips:
      how_to_explain: 'Teach that English narratives use the past simple for the main
        events. The present tense is only used for general truths or in direct speech
        within the narrative. For the present perfect, emphasize the rule: do NOT
        use present perfect with a specific past time (yesterday, last night, at 8pm,
        in 2010). Use past simple instead.'
      where_to_start: 'Begin with simple story retelling: ''Yesterday I went to the
        store. I bought some milk. I came home.'' Then move to time-specific events:
        ''I arrived at 8pm'' NOT ''I have arrived at 8pm.'''
      sequencing: 'Week 1: Past simple for narratives (no present tense). Week 2:
        Past continuous for background actions. Week 3: Present perfect vs past simple
        — specific time = past simple. Week 4: Story writing with mixed tenses.'
      exercises:
      - name: Narrative Tense Drill
        type: sentence-rewrite
        description: Give 10 present-tense narrative sentences. Students rewrite in
          past simple.
        duration: 15
      - name: Story Retelling
        type: composition
        description: Students write a short story about yesterday using correct past
          tenses.
        duration: 20
      - name: Present Perfect or Past Simple Decision
        type: fill-in-the-blank
        description: Provide 15 sentences with time markers. Students choose between
