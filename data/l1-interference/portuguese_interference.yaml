  passive_with_reporting_verbs:
    interference_patterns:
    - pattern: Active voice where passive reporting is more natural
      example_portuguese: Dizem que ele e rico.
      example_gloss: They say that he is rich.
      example_wrong: They say that he is rich.
      example_correct: He is said to be rich.
      explanation: Portuguese uses active reporting verbs with an impersonal subject
        (dizem = they say, people say). English frequently uses passive reporting
        structures (He is said to be rich / It is said that he is rich). Portuguese
        speakers default to the active pattern because Portuguese does not have an
        equivalent passive reporting construction. The impersonal "they" in Portuguese
        maps onto "they" in English, producing "They say that he is rich" instead
        of the more natural English passive reporting form.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion between personal-subject and impersonal reporting structures
      example_portuguese: Dizem que ele e rico.
      example_gloss: They say that he is rich.
      example_wrong: He is said that he is rich.
      example_correct: He is said to be rich.
      explanation: 'English has two passive reporting patterns. Pattern A (personal
        subject): "He is said to be rich" - the reported person becomes the subject,
        followed by "to be/to have + past participle." Pattern B (impersonal): "It
        is said that he is rich" - uses dummy "it" as subject with a that-clause.
        Portuguese speakers often confuse these, producing hybrid errors like "He
        is said that he is rich" (mixing Pattern A subject with Pattern B that-clause).
        This confusion arises because Portuguese has only one reporting structure
        (dizem que...) and does not distinguish between personal and impersonal reporting
        forms.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Tense mismatch in passive reporting structures
      example_portuguese: Dizem que ele foi preso.
      example_gloss: They say that he was arrested.
      example_wrong: He is said that he was arrested.
      example_correct: He is said to have been arrested.
      explanation: When the reported event is in the past, English passive reporting
        requires the perfect infinitive (to have + past participle). Portuguese speakers
        may use a that-clause with the past tense ("He is said that he was arrested")
        or fail to use the perfect infinitive ("He is said to be arrested" for a past
        event). This error occurs because Portuguese does not require a structural
        change in the reporting verb to indicate the time relationship - the tense
        information stays in the subordinate clause (dizem que ele foi preso).
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: "They say that he is rich." Correct: "He is said to be rich." / "It
      is said that he is rich."'
    - 'Wrong: "He is said that he is rich." Correct: "He is said to be rich." / "It
      is said that he is rich."'
    - 'Wrong: "He is said that he was arrested." Correct: "He is said to have been
      arrested."'
    - 'Wrong: "People believe that she is a genius." Correct: "She is believed to
      be a genius."'
    why_it_happens: 'Portuguese uses active reporting verbs with an impersonal third-person
      plural subject: "Dizem que..." (They say that...), "Acredita-se que..." (It
      is believed that...). While Portuguese does have an impersonal se construction
      (acredita-se que), it maps onto English "it is believed that" - but Portuguese
      speakers frequently default to the active "they say" pattern because it is more
      colloquial and common in spoken Portuguese. English, by contrast, strongly prefers
      passive reporting structures in formal and written contexts. Additionally, English
      has two distinct passive reporting patterns (personal subject + to-infinitive
      vs. impersonal it + that-clause) with different rules for tense marking (perfect
      infinitive for past events). Portuguese has no equivalent structural distinction,
      so speakers must learn both the concept of passive reporting and the two-pattern
      system simultaneously. These patterns are documented in Swan & Smith (2001)
      for Portuguese ESL learners and in Azevedo (1996) for Portuguese grammatical
      structure.'
    teacher_tips:
      how_to_explain: 'Write two columns on the board. Left: "They say that he is
        rich." Right: "He is said to be rich." Show that both mean the same thing,
        but English prefers the right side in formal contexts. Then teach the two
        patterns: (A) Person + is said + to be/to have done, and (B) It is said +
        that-clause. Drill the difference: "He is said to be rich" NOT "He is said
        that he is rich." For past events, show: "He is said to have been arrested"
        (perfect infinitive).'
      where_to_start: 'Begin with present-tense reporting: "He is said to be rich"
        / "It is said that he is rich." Use common verbs: say, believe, think, know,
        report, expect, understand.'
      sequencing: 'Week 1: Passive reporting with present reference (is said to be).
        Week 2: Two patterns - personal subject (he is said to be) vs. impersonal
        (it is said that). Week 3: Past reference with perfect infinitive (is said
        to have been). Week 4: Mixed practice with multiple reporting verbs. Week
        5: Production - writing news reports using passive reporting.'
      exercises:
      - name: Active to Passive Reporting Transformation
        type: transformation
        description: Give 10 active reporting sentences (e.g., "People say that he
          is a genius"). Students rewrite in both passive reporting patterns (personal
          subject + to-infinitive AND impersonal it + that-clause).
        duration: 15
      - name: Pattern A or Pattern B?
        type: fill-in-the-blank
        description: Provide 12 sentence stems where students must choose between
          Pattern A (personal subject + to-infinitive) and Pattern B (it + that-clause)
          and complete the sentence correctly. Include distractors with the wrong
          pattern to force active decision-making.
        duration: 15
      - name: Tense in Passive Reporting
        type: error-correction
        description: Provide 10 sentences with tense errors in passive reporting (e.g.,
          "He is said that he was arrested" or "He is said to be arrested yesterday").
          Students identify the error and rewrite with the correct structure (perfect
          infinitive for past events).
        duration: 15
      - name: News Report Rewrite
        type: sentence-rewrite
        description: Give a short paragraph of news written in active voice (e.g.,
          "Experts believe the economy will recover. Officials say the plan is working.").
          Students rewrite the entire paragraph using passive reporting structures.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
