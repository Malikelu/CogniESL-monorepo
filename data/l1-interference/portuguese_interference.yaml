    notes: 'Portuguese has 243 GPs total. This entry covers the absolute_constructions_advanced grammar point. Three independent
      sources: contrastive teaching reference (Swan & Smith 2001), structural linguistics reference (Azevedo 1996), and Romance
      verbal periphrasis reference (Squartini 1998). Patterns cover (1) personal infinitive transfer producing ungrammatical
      infinitive clauses in English, (2) compound passive absolute transfer (tendo sido + p.p.) that is ungrammatical in English,
      (3) explicit-subject absolute transfer producing ungrammatical word order. Frequency is 3 (moderate — occurs mainly
      in formal/academic writing) but persistence is 4 (high — these are educated L1 patterns explicitly taught in Portuguese
      schools, making them deeply resistant to change). This entry extends the basic absolute_constructions entry with advanced
