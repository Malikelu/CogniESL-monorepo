  be_going_to:
    interference_patterns:
    - pattern: Use of 'go' without 'be'
      example_portuguese: Eu vou estudar.
      example_gloss: I go to study.
      example_wrong: I go to study.
      example_correct: I am going to study.
      explanation: Portuguese 'ir + infinitivo' omits the auxiliary 'be.' English
        requires 'be going to.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of 'be going to' for spontaneous decisions where 'will' is
        required
      example_portuguese: Eu vou abrir a porta para voce.
      example_gloss: I go to open the door for you.
      example_wrong: I am going to open the door for you.
      example_correct: I will open the door for you.
      explanation: Portuguese uses 'ir + infinitivo' for all future meanings including
        spontaneous decisions. English distinguishes 'be going to' (prior plans, intentions)
        from 'will' (spontaneous decisions, offers, promises). Portuguese speakers
        overextend 'be going to' to contexts where a native speaker would use 'will,'
        making their speech sound overly deliberate or unnatural in conversational
        exchanges.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I go to study.'' Correct: ''I am going to study.'''
    - 'Wrong: ''I am going to open the door for you.'' (spontaneous offer) Correct:
      ''I will open the door for you.'''
    why_it_happens: Portuguese 'ir + infinitivo' is the standard future construction
      without an auxiliary. English requires 'be going to' with the auxiliary 'be.'
      Additionally, Portuguese uses a single future construction ('ir + infinitivo')
      for all future meanings, while English grammatically distinguishes between 'be
      going to' (prior plans and intentions) and 'will' (spontaneous decisions, offers,
      promises, and predictions without evidence). Portuguese speakers transfer their
      single-form future to English and overuse 'be going to' in all future contexts,
      including spontaneous conversational offers and on-the-spot decisions where
      'will' is the natural choice. This is documented in Swan & Smith (2001) as a
      common Romance-language L1 transfer pattern.
    teacher_tips:
      how_to_explain: 'Write ''Eu vou estudar'' on the board. Show that English needs
        ''AM going to study.'' Drill: ''I am going to, You are going to, He/She is
        going to.'' Then contrast: ''be going to = plan made BEFORE speaking'' vs.
        ''will = decision made NOW.'' Role-play: someone drops books — ''I will help
        you'' (not ''I am going to help you'').'
      where_to_start: Begin with 'I am going to' for personal plans.
      sequencing: 'Week 1: ''Be going to'' structure. Week 2: Plans vs. predictions.
        Week 3: ''Will'' for spontaneous decisions and offers. Week 4: Contrasting
        ''be going to'' vs. ''will'' in context. Week 5: Mixed practice.'
      exercises:
      - name: Going To Structure Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students use 'be going to.'
        duration: 15
      - name: Going To vs Will Decision
        type: multiple-choice
        description: Provide 20 scenarios. Students choose 'be going to' or 'will'
          based on whether the decision is pre-planned or spontaneous. Include contextual
          clues like 'suddenly,' 'just decided,' 'yesterday I planned.'
        duration: 20
