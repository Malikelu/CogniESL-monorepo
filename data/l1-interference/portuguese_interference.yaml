  can_cant:
    interference_patterns:
    - pattern: Use of 'can' for past ability where 'could' is needed
      example_portuguese: Eu podia nadar quando era crianca.
      example_gloss: I could swim when I was child.
      example_wrong: I can swim when I was a child.
      example_correct: I could swim when I was a child.
      explanation: Portuguese 'poder' in the imperfect past (podia) expresses past
        ability. English uses 'could' for past ability, not 'can.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'can' for polite requests where 'could' is preferred
      example_portuguese: Voce pode me ajudar?
      example_gloss: You can help me?
      example_wrong: You can help me?
      example_correct: Could you help me?
      explanation: Portuguese uses 'poder' in the present tense for polite requests.
        English uses 'could' (more polite) or 'can' (less formal).
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I can swim when I was a child.'' Correct: ''I could swim when I was
      a child.'''
    - 'Wrong: ''You can help me?'' (polite) Correct: ''Could you help me?'''
    why_it_happens: Portuguese 'poder' covers the semantic range of English 'can,'
      'could,' 'may,' and 'might.' Portuguese uses the imperfect past (podia) for
      past ability, which English expresses with 'could.' Portuguese also uses the
      present tense (pode) for polite requests, where English prefers 'could' for
      greater politeness. Portuguese speakers may use 'can' where English requires
      'could.'
    teacher_tips:
      how_to_explain: Teach 'can' = present ability, 'could' = past ability. For polite
        requests, teach 'Could you...?' as more polite than 'Can you...?'
      where_to_start: 'Begin with present vs. past ability: ''I can swim'' (now) vs.
        ''I could swim'' (when I was young).'
      sequencing: 'Week 1: ''Can'' for present ability. Week 2: ''Could'' for past
        ability. Week 3: ''Can/could'' for requests. Week 4: Mixed practice.'
      exercises:
      - name: Can vs Could Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'can'
          and 'could.'
        duration: 15
      - name: Polite Request Drill
        type: sentence-rewrite
        description: Give 10 direct requests. Students rewrite using 'Could you...?'
        duration: 10
