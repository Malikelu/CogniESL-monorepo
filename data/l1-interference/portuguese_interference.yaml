  comparative_and_superlative:
    interference_patterns:
    - pattern: Use of 'more' with short adjectives
      example_portuguese: Ele e mais alto.
      example_gloss: He is more tall.
      example_wrong: He is more tall.
      example_correct: He is taller.
      explanation: Portuguese uses 'mais + adjective' for all comparatives. English
        uses -er for short adjectives and 'more' for long adjectives.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of 'mais' for superlatives
      example_portuguese: Ele e o mais alto.
      example_gloss: He is the most tall.
      example_wrong: He is the most tall.
      example_correct: He is the tallest.
      explanation: Portuguese uses 'o mais + adjective' for all superlatives. English
        uses -est for short adjectives and 'the most' for long adjectives.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: ''He is more tall.'' Correct: ''He is taller.'''
    - 'Wrong: ''He is the most tall.'' Correct: ''He is the tallest.'''
    why_it_happens: 'Portuguese uses ''mais + adjective'' for all comparatives and
      ''o mais + adjective'' for all superlatives. English has two forms: -er/-est
      for short adjectives (taller, tallest) and more/most for long adjectives (more
      beautiful, most beautiful). Portuguese speakers overuse ''more/most.'''
    teacher_tips:
      how_to_explain: 'Teach the rule: 1-2 syllable adjectives use -er/-est (taller,
        biggest). 3+ syllable adjectives use more/most (more beautiful, most important).
        Drill common short adjectives: tall/taller, big/bigger, happy/happier.'
      where_to_start: 'Begin with common short adjectives: tall, big, small, happy,
        sad.'
      sequencing: 'Week 1: Comparative forms (-er vs. more). Week 2: Superlative forms
        (-est vs. most). Week 3: Irregular forms (good/better/best). Week 4: Mixed
        practice.'
      exercises:
      - name: Comparative Form Drill
        type: fill-in-the-blank
        description: Provide 15 adjectives. Students write the comparative and superlative
          forms.
        duration: 15
      - name: Comparative Error Correction
        type: error-correction
        description: Provide 10 sentences with comparative/superlative errors. Students
          correct them.
        duration: 15
