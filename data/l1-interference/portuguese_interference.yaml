  quantifiers:
    interference_patterns:
    - pattern: Overuse of 'a lot of' in formal and academic writing
      example_portuguese: Existem muitos problemas na cidade.
      example_gloss: There exist many problems in the city.
      example_wrong: There are a lot of problems in the city.
      example_correct: There are many problems in the city.
      explanation: Portuguese 'muitos/muitas' is register-neutral and works in both
        casual and formal contexts. English 'a lot of' is informal and inappropriate
        in academic or professional writing, where 'many' (countable) or 'much'
        (uncountable) is required. Portuguese speakers default to 'a lot of' as
        their go-to quantifier because it mirrors the versatility of 'muito.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'some' in questions where 'any' is required
      example_portuguese: Voce tem algum dinheiro?
      example_gloss: You have any/some money?
      example_wrong: Do you have some money?
      example_correct: Do you have any money?
      explanation: Portuguese 'algum/alguma/alguns/algumas' is used freely in questions,
        affirmatives, and negatives. English restricts 'some' to affirmatives and
        offers, requiring 'any' in questions and negatives. Portuguese speakers
        transfer 'algum' directly as 'some' into questions, producing 'Do you have
        some money?' instead of 'Do you have any money?'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'much' with countable nouns due to Portuguese 'muito'
      example_portuguese: Eu tenho muitos amigos.
      example_gloss: I have many friends.
      example_wrong: I have much friends.
      example_correct: I have many friends.
      explanation: Portuguese 'muito/muitos' works with both countable and uncountable
        nouns. English requires 'many' for countable nouns and 'much' for uncountable
        nouns. Portuguese speakers who have learned 'much' as the English equivalent
        of 'muito' overgeneralize it to countable nouns, producing 'much friends,'
        'much books,' 'much people.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'many' with uncountable nouns in questions and negatives
      example_portuguese: Voce tem muito tempo?
      example_gloss: You have much time?
      example_wrong: Do you have many time?
      example_correct: Do you have much time?
      explanation: Portuguese 'muito' is used in all syntactic positions regardless
        of countability. English requires 'much' with uncountable nouns in all
        positions. Portuguese speakers overgeneralize 'many' (the default quantifier
        for countable nouns) to uncountable nouns in questions and negatives,
        producing 'Do you have many time?' or 'I don't have many money.' This error
        is especially persistent because in affirmative sentences, 'a lot of' masks
        the distinction.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Confusion of 'few' and 'little' due to Portuguese 'pouco'
      example_portuguese: Eu tenho pouco paciencia.
      example_gloss: I have little patience.
      example_wrong: I have few patience.
      example_correct: I have little patience.
      explanation: Portuguese 'pouco/pouca/poucos/poucas' is a single quantifier
        used with both countable and uncountable nouns. English splits this into
        'few' (countable) and 'little' (uncountable). Portuguese speakers transfer
        'few' as the default English equivalent of 'pouco' and produce errors like
        'few patience,' 'few money,' 'few information.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'of' after quantifiers in partitive constructions
      example_portuguese: Um pouco de cafe.
      example_gloss: A little of coffee.
      example_wrong: A little coffee.
      example_correct: A little coffee. / A bit of coffee.
      explanation: Portuguese uses 'de' (of) after quantifiers in partitive
        constructions (um pouco de, bastante de, demasiado de). English drops
        'of' after 'a little' and 'a few' before nouns (a little coffee, a few
        books) but retains it after 'a lot of' and 'plenty of.' Portuguese speakers
        may either insert 'of' where it does not belong or omit it where it does,
        depending on which English quantifier pattern they have internalized.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: There are a lot of problems. Correct: There are many problems.'
    - 'Wrong: Do you have some money? Correct: Do you have any money?'
    - 'Wrong: I have much friends. Correct: I have many friends.'
    - 'Wrong: Do you have many time? Correct: Do you have much time?'
    - 'Wrong: I have few patience. Correct: I have little patience.'
    - 'Wrong: She has a lot of informations. Correct: She has a lot of information.'
    why_it_happens: >
      Portuguese has a simplified quantifier system compared to English. A single
      Portuguese quantifier often maps to two or more English quantifiers depending
      on countability, sentence type, and register. The core mappings that cause
      interference are: (1) Portuguese 'muito/muitos' maps to English 'many'
      (countable), 'much' (uncountable), and 'a lot of' (informal both), but the
      English forms are not interchangeable — 'many' requires countable nouns,
      'much' requires uncountable nouns, and 'a lot of' is register-restricted.
      Portuguese speakers must learn to split one L1 form into three L2 choices
      based on two different criteria (countability and register). (2) Portuguese
      'pouco/poucos' maps to English 'few' (countable) and 'little' (uncountable),
      with the additional complication that 'few' (negative connotation) and 'a few'
      (positive connotation) are distinguished in English but not in Portuguese.
      (3) Portuguese 'algum' maps to English 'some' (affirmatives/offers) and 'any'
      (questions/negatives), requiring Portuguese speakers to learn a syntactic
      distribution that does not exist in their L1. (4) Portuguese 'bastante' maps
      to English 'enough,' 'quite a lot,' or 'plenty,' depending on context, leading
      to overuse of 'enough' as a universal equivalent. The cumulative effect is
      that Portuguese speakers face a many-to-many mapping problem where each
      Portuguese quantifier requires choosing among multiple English options based
      on grammatical criteria (countability, sentence polarity, register) that are
      not marked on the Portuguese form itself.
    teacher_tips:
      how_to_explain: 'Create a master quantifier mapping chart on the board with
        three columns: PORTUGUESE | ENGLISH (countable) | ENGLISH (uncountable).
        Fill in muito -> many/much, pouco -> few/little, bastante -> enough/plenty.
        Then add a row for sentence type: algum -> some (affirmative) vs. any
        (question/negative). Use color coding for register: green for formal
        (many/much), yellow for neutral (a lot of), red for informal (lots of,
        tons of). Drill with the ''Can you count it?'' test for each noun before
        choosing the quantifier.'
      where_to_start: Begin with the countable/uncountable distinction using
        concrete nouns (books vs. water). Have students physically sort objects
        into countable and uncountable piles, then apply the correct quantifier.
        Once the countability split is internalized, introduce the some/any
        distribution by sentence type.
      sequencing: 'Week 1: Countable vs. uncountable nouns + many/much/few/little.
        Week 2: A lot of as the informal workaround + register awareness. Week 3:
        Some vs. any by sentence type (affirmative/question/negative). Week 4:
        Bastante -> enough/plenty. Week 5: Mixed practice with all quantifiers
        across registers and sentence types.'
      exercises:
      - name: Quantifier Mapping Chart
        type: matching
        description: Give 15 Portuguese quantifier phrases. Students map each to
          the correct English quantifier based on countability and register.
        duration: 15
      - name: Countability Decision Drill
        type: fill-in-the-blank
        description: Provide 25 sentences with blank quantifier slots. Students
          must first decide if the noun is countable or uncountable, then choose
          the correct quantifier (many, much, few, little, a lot of).
        duration: 20
      - name: Some or Any Sentence Sort
        type: categorization
        description: Give 20 sentence stems (10 affirmative, 5 questions, 5
          negatives). Students complete each with 'some' or 'any' and sort them
          into the correct sentence-type column.
        duration: 15
      - name: Register Rewrite
        type: sentence-rewrite
        description: Provide 10 informal sentences with 'a lot of.' Students
          rewrite each for a formal/academic context using 'many,' 'much,' 'a
          great deal of,' or 'numerous.'
        duration: 15
      - name: Error Correction Paragraph
        type: error-correction
        description: Provide a short paragraph (150 words) written by a fictional
          Portuguese-speaking student. It contains 12 quantifier errors covering
          countability, some/any, and register. Students identify and correct
          each error.
        duration: 20
