    notes: 'Two core patterns: (1) ''se...nao'' → ''if...not'' overuse where ''unless''
      is idiomatic. (2) Single Portuguese ''se'' covers neutral, strong, and negative
      conditions — English requires ''if,'' ''provided that/as long as,'' and ''unless.''
      Portuguese speakers overuse ''if'' because L1 does not lexicalize the distinction.
      Both patterns documented in Swan and Smith (2001) and Azevedo (1996).'
    source_rank: 1
