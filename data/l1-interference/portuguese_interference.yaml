  all_most:
    interference_patterns:
    - Portuguese speakers overextend 'all' (todos/todas) to contexts where English requires 'most' because Portuguese 'todos'
      is used more loosely for large majorities in everyday speech. In Portuguese, 'Todos os alunos passaram' can colloquially
      mean 'most students passed' (not literally 100%), whereas English 'All students passed' means every single one. Portuguese
      speakers produce errors like 'All students liked the movie' when they mean 'Most students liked the movie', or 'All
      people agree' when the intended meaning is 'Most people agree'. The Portuguese quantifier system does not enforce a
      strict 100% vs majority boundary the way English does.
    - Portuguese speakers confuse 'most' with 'almost' because Portuguese 'quase' (almost) overlaps semantically with both
      English 'most' and 'almost' in quantity expressions. Portuguese 'quase todos' (almost all) can be produced as 'most
      all' or 'almost all' interchangeably by learners, leading to errors like 'Most all students passed' — where the intended
      meaning is 'Almost all students passed' — or 'Almost students passed' — transferring 'quase' directly as 'almost' before
      a noun, where English requires 'almost all students'. The three-way English distinction (all / most / almost all) maps
      onto a less rigidly differentiated Portuguese system (todos / a maioria (de) / quase todos), causing systematic boundary
      errors.
    - Portuguese speakers drop the definite article after 'most of' because Portuguese 'a maioria de' can appear with or without
      the article depending on register. Portuguese allows both 'a maioria dos alunos' and 'a maioria de alunos', leading
      to English errors like 'Most of students passed' (missing 'the') or 'Most students of the class passed' (word order
      transfer from Portuguese 'a maioria dos alunos da turma'). English requires 'most of the + noun' with a determiner after
      'of', whereas Portuguese is more flexible.
    why_it_happens: Portuguese quantifiers operate on a scalar system that does not enforce the same rigid 100% threshold
      as English 'all'. Portuguese 'todos/todas' is frequently used hyperbolically or loosely to mean 'nearly all' / 'the
      vast majority' in everyday speech, whereas English 'all' is semantically strict (every single item). English 'most'
      occupies a distinct semantic zone (more than 50%, less than 100%) that Portuguese expresses with 'a maioria (de)' but
      the boundary between 'todos' and 'a maioria' is less sharply enforced in Portuguese discourse. Additionally, Portuguese
      'quase' (almost) creates a three-way mapping problem because 'quase todos' straddles English 'most' and 'almost all'.
      The article flexibility after 'a maioria de' in Portuguese (dos/de) transfers to incorrect determiner use after 'most
      of' in English. These patterns are deeply automatized because Portuguese quantifier usage is acquired in early childhood
      and operates automatically in both speech and writing.
    teacher_tips:
      how_to_explain: Use a pie-chart visual with three zones — 100 percent ALL (todos), 50-99 percent MOST (a maioria), 95
        percent-plus with exceptions ALMOST ALL (quase todos). Show that Portuguese 'todos' can cover the MOST zone in casual
        speech, but English 'all' cannot. For 'most of the', use a contrastive chart showing Portuguese 'a maioria dos alunos'
        mapped to English 'most of the students' (always needs the/these/my after 'of'). Emphasize that English is stricter
        about the all/most boundary than Portuguese.
      where_to_start: Start with the all vs most semantic boundary using pie charts and class surveys. Ask 'Did ALL students
        pass? (100%) or MOST students pass? (majority)?' Then introduce the almost-all / most confusion using 'quase todos'
        translation exercises. Finally, address the 'most of the' article rule with gap-fill exercises.
      exercises:
      - name: All vs Most semantic boundary drill
        type: drill
        description: Provide 20 scenarios with percentages (e.g. '95% of students passed'). Students must choose 'all', 'most',
          or 'almost all' and justify their choice. Include borderline cases (99%, 90%, 75%, 51%) to sharpen the all/most
          boundary awareness. Time pressure to build automaticity.
        duration: 15
      - name: Portuguese-to-English quantifier translation
        type: drill
        description: Give 15 Portuguese sentences using todos, a maioria (de), and quase todos (e.g. 'Todos os alunos gostaram
          do filme', 'A maioria dos alunos passou', 'Quase todos os estudantes entenderam'). Students translate each, choosing
          the correct English quantifier and paying attention to article use after 'most of'.
        duration: 15
      - name: Error correction — all/most/almost confusion
        type: error-correction
        description: Provide 15 sentences with Portuguese-style all/most/almost errors (e.g. 'All people like music' meaning
          most, 'Most all students passed' meaning almost all, 'Almost students were there' from 'Quase estudantes estavam
          lá', 'Most of students passed' missing 'the'). Students identify the error type, explain why it is wrong, and rewrite
          correctly.
        duration: 15
      - name: Most of the article insertion
        type: drill
        description: Provide 20 gapped sentences where students must insert 'most' or 'most of the/these/my' correctly. Include
          distractors with 'all of the', 'almost all the', and 'most' without 'of'. Focus on the Portuguese transfer error
          of dropping the article after 'most of'.
        duration: 10
      - name: Quantifier survey and report
        type: practice
        description: Students survey classmates on 5 topics (e.g. 'How many students like coffee?'). They must report results
          using all, most, almost all, some, a few, and none — with correct article patterns. Forces real-time quantifier
          choice with accurate English boundaries.
        duration: 20
    examples:
    - 'Wrong: ''All students liked the movie.'' (Portuguese: ''Todos os alunos gostaram do filme.'' — todos used loosely for
      majority) Correct: ''Most students liked the movie.'' (if not literally 100%)'
    - 'Wrong: ''Most all students passed the exam.'' (Portuguese: ''Quase todos os alunos passaram no exame.'' — quase todos
      = almost all, not most all) Correct: ''Almost all students passed the exam.'''
    - 'Wrong: ''Almost students were there.'' (Portuguese: ''Quase estudantes estavam lá.'' — quase directly before noun)
      Correct: ''Almost all students were there.'''
    - 'Wrong: ''Most of students passed.'' (Portuguese: ''A maioria dos alunos passou'' / ''A maioria de alunos passou'' —
      article optional in Portuguese) Correct: ''Most of the students passed.'' / ''Most students passed.'''
    - 'Wrong: ''All people agree with this.'' (Portuguese: ''Todas as pessoas concordam com isso.'' — todos used hyperbolically)
      Correct: ''Most people agree with this.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents L1 transfer errors including quantifier overextension, article omission after
      quantifiers, and semantic boundary confusion between todos/a maioria/quase todos and English all/most/almost all).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on determiners and
      quantifiers — describes the Portuguese todos/a maioria/quase todos system, its flexible article usage, and the semantic
      looseness of todos in everyday speech, explaining the structural basis for L1 transfer to English quantifier distinctions).'
    source_count: 2
    source_type: contrastive_analysis
