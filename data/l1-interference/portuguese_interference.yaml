  passive_with_two_objects:
    interference_patterns:
    - pattern: Preposition omission when direct object is promoted in passive
      example_portuguese: Ela me deu um presente.
      example_gloss: She gave me a present.
      example_wrong: A present was given me.
      example_correct: A present was given to me.
      explanation: When the direct object is promoted to subject in English passive,
        the indirect object requires the preposition ''to'' (or ''for'' depending
        on the verb). Portuguese allows the indirect object as a clitic pronoun (me,
        te, lhe) without a preposition in many constructions, leading speakers to
        omit ''to'' in English.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of indirect-object promotion (avoiding direct-object passive)
      example_portuguese: Ela me deu um presente.
      example_gloss: She gave me a present.
      example_wrong: I was given a present by her. (used exclusively, even when the
        direct-object passive is more natural)
      example_correct: A present was given to me by her.
      explanation: Portuguese speakers tend to promote the indirect object (person)
        to subject position in passive because Portuguese topicalizes the recipient
        with clitic pronouns (me, te, lhe). This leads to overuse of the ''I was given...''
        pattern even when context requires the direct-object passive (''A present
        was given to me''), which sounds more natural when the theme is the discourse
        topic.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''A present was given me.'' Correct: ''A present was given to me.'''
    - 'Wrong: ''I was told the truth.'' (when the topic is ''the truth'') Correct:
      ''The truth was told to me.'''
    why_it_happens: Portuguese and English both have ditransitive verbs (give, tell,
      send, show, offer). English can promote either the indirect or direct object
      to subject in passive, but when the direct object is promoted, the indirect
      object requires the preposition ''to'' (or ''for''). Portuguese marks the indirect
      object with clitic pronouns (me, te, lhes) or prepositional phrases (a ele,
      para mim), and the mapping is not one-to-one. Portuguese speakers (1) omit ''to''
      because their L1 uses clitics without prepositions, and (2) over-promote the
      person/indirect object because Portuguese discourse favors human topicalization.
    teacher_tips:
      how_to_explain: 'Teach both passive patterns with ditransitive verbs: ''I was
        given a present'' (indirect object promoted) and ''A present was given to
        me'' (direct object promoted). Highlight that when the THING comes first,
        you MUST add ''to'': ''A present was given TO me'' — not *''A present was
        given me.'''''
      where_to_start: 'Begin with ''give'': ''She gave me a book'' → ''I was given
        a book'' / ''A book was given to me.'' Drill the ''to'' explicitly: ''Thing
        was given TO person.'''
      sequencing: 'Week 1: Passive with indirect object promoted. Week 2: Passive
        with direct object promoted — emphasize the preposition ''to''. Week 3: Other
        ditransitive verbs (tell, send, offer, show). Week 4: Discourse-based choice
        — which passive sounds more natural in context?'
      exercises:
      - name: Two Object Passive Drill
        type: transformation
        description: Give 10 ditransitive sentences. Students rewrite in both passive
          forms.
        duration: 15
      - name: Preposition Rescue
        type: error-correction
        description: Provide 12 passive sentences with missing or incorrect prepositions
          (e.g., ''A letter was sent me'', ''The job was offered her''). Students
          identify the error and insert the correct preposition (to/for).
        duration: 10
