      example_wrong: Raining penknives.
      example_correct: Raining cats and dogs.
      explanation: Portuguese uses animal and object-based metaphors that do not
        map onto English equivalents. "Chovendo canivetes" (raining penknives) is
        the Portuguese idiom for heavy rain; English uses "raining cats and dogs."
        Additional examples include "matar dois coelhos com uma cajadada" (kill two
        rabbits with one blow) versus English "kill two birds with one stone." Portuguese
        speakers produce communicative but non-English expressions when they translate
        these idioms word-for-word.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Literal translation of Portuguese body-part figurative expressions
      example_portuguese: Ele esta com a pulga atras da orelha.
      example_gloss: He is with the flea behind the ear.
      example_wrong: He has a flea behind his ear.
      example_correct: He is suspicious. / He smells a rat.
      explanation: Portuguese uses body-part metaphors extensively in figurative
        speech. "Estar com a pulga atras da orelha" (to have a flea behind the ear)
        means to be suspicious. "Estar na pindaiba" means to be broke. "Ter mao na
        massa" (to have hand in the dough) means to be actively involved. English
        uses entirely different metaphorical systems for these meanings. Portuguese
        speakers transfer the body-part metaphor literally, producing expressions
        that are opaque or nonsensical to English listeners. This is documented
        in contrastive analyses of Romance-language figurative systems (Swan & Smith
        2001; Azevedo 1996).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: Raining penknives. Correct: Raining cats and dogs.'
    - 'Wrong: He has a flea behind his ear. Correct: He is suspicious.'
    - 'Wrong: He killed two rabbits with one blow. Correct: He killed two birds
      with one stone.'
    - 'Wrong: He has hand in the dough. Correct: He is actively involved.'
    why_it_happens: Portuguese and English have independently developed figurative
      systems that use different source domains for the same target meanings. Portuguese
      relies heavily on body-part metaphors (pulga atras da orelha, mao na massa,
      pe da mesa) and animal/object-based idioms (canivetes, coelhos) that have
      no direct English equivalent. English uses its own conventionalized metaphors
      (cats and dogs, birds with one stone, smell a rat, hard up) that do not map
      onto Portuguese source domains. Portuguese speakers transfer their L1 figurative
      mappings literally because the conceptual metaphor systems differ. This is
      a well-documented area of L1 interference in contrastive analysis literature
      (Swan & Smith 2001, Azevedo 1996).
    teacher_tips:
      how_to_explain: Create a two-column chart with Portuguese idioms on the left
        and English equivalents on the right. Show that the images are completely
        different (flea behind ear vs. smell a rat) but the meaning is the same.
        Emphasize that idioms cannot be translated word-for-word — they must be
        learned as whole units.
      where_to_start: Begin with the most common Portuguese idioms that have direct
        English equivalents, such as weather idioms, animal idioms, and body-part idioms.
      sequencing: 'Week 1: Weather and animal idioms (raining cats and dogs, kill
        two birds with one stone). Week 2: Body-part idioms (smell a rat, keep your
        chin up, get cold feet). Week 3: False-cognate idioms (look like vs. parecer
        with). Week 4: Production practice — students write dialogues using idioms.'
      exercises:
      - name: Idiom Matching
        type: matching
        description: Match 15 Portuguese idioms with their English equivalents. Emphasize
          that the images differ but the meanings align.
        duration: 15
      - name: Idiom Translation Challenge
        type: translation
        description: Give 10 Portuguese figurative expressions. Students must produce
          the correct English idiom — NOT a word-for-word translation. Include body-part
          and animal-based idioms.
        duration: 15
      - name: Contextual Idiom Use
        type: fill-in-the-blank
        description: Provide 10 short dialogues with a missing idiom. Students choose
          the correct English idiom from a bank of 6 options. Focus on idioms where
          Portuguese uses a different metaphorical image.
        duration: 15
