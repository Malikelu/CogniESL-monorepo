  present_perfect_continuous:
    interference_patterns:
    - pattern: Use of present perfect simple where continuous is needed
      example_portuguese: Eu estudo ha 3 anos.
      example_gloss: I study has 3 years.
      example_wrong: I have studied for 3 years.
      example_correct: I have been studying for 3 years.
      explanation: Portuguese uses the present perfect simple (pretérito perfeito)
        with duration markers like 'ha' or 'faz' to express ongoing actions. English
        requires the present perfect continuous (have been + -ing) for actions that
        started in the past and continue to the present. Portuguese speakers default
        to the simple form because Portuguese does not grammatically distinguish perfect
        simple from perfect continuous.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of simple present with 'ha/faz + time' instead of present perfect
        continuous
      example_portuguese: Eu moro aqui ha 5 anos. (lit. I live here has 5 years.)
      example_gloss: I live here has 5 years.
      example_wrong: I live here for 5 years.
      example_correct: I have been living here for 5 years.
      explanation: Portuguese uses the simple present tense with 'ha' or 'faz' + time
        to express duration up to the present (e.g., 'Eu moro aqui ha 5 anos' = I
        have been living here for 5 years). English requires the present perfect continuous
        for this meaning. Portuguese speakers transfer the simple present directly,
        producing 'I live here for 5 years' instead of 'I have been living here for
        5 years.' This is one of the most frequent and persistent errors because the
        Portuguese simple present + 'ha' construction is the default way to express
        ongoing duration.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: ''I have studied for 3 years.'' Correct: ''I have been studying for
      3 years.'''
    - 'Wrong: ''I live here for 5 years.'' Correct: ''I have been living here for
      5 years.'''
    - 'Wrong: ''She works here since 2020.'' Correct: ''She has been working here
      since 2020.'''
    why_it_happens: Portuguese does not have a present perfect continuous tense. To
      express ongoing actions with duration, Portuguese uses either (1) the present
      perfect simple with 'ha/faz' + time ('Eu estudo ha 3 anos') or (2) the simple
      present with 'ha/faz' + time ('Eu moro aqui ha 5 anos'). Both map onto two different
      English structures (present perfect simple vs. present perfect continuous),
      creating systematic confusion. Portuguese speakers must learn that English distinguishes
      between completed duration (have studied for 3 years) and ongoing duration (have
      been studying for 3 years), a distinction their L1 does not make grammatically.
      The 'ha/faz + time' construction is particularly problematic because it is the
      most common way Portuguese expresses duration, leading to persistent transfer
      of the simple present into English.
    teacher_tips:
      how_to_explain: Write 'Eu moro aqui ha 5 anos' on the board. Show that Portuguese
        uses the SIMPLE PRESENT (moro) with 'ha' to mean 'has been -ing.' English
        needs HAVE BEEN + -ING. Contrast three structures side by side. Emphasize
        that 'for/since' with ongoing actions ALWAYS needs have been + -ing in English.
      where_to_start: Begin with the most common error — simple present with 'for/since.'
        Show 'I live here for 5 years' is wrong. Teach 'I have been living here for
        5 years.' Use timelines showing actions starting in the past and continuing
        to now.
      sequencing: 'Week 1: Present perfect continuous with ''for'' and ''since'' (ongoing
        actions). Week 2: Contrast with present perfect simple (completed actions).
        Week 3: Portuguese ''ha/faz + time'' → English ''have been + -ing'' translation
        drills. Week 4: Mixed practice — students choose simple vs. continuous based
        on context.'
      exercises:
      - name: Present Perfect Continuous Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with 'for/since' and a base verb. Students
          conjugate into present perfect continuous. Include distractors where present
          perfect simple is correct.
        duration: 15
      - name: Portuguese to English Duration Translation
        type: translation
        description: Give 10 Portuguese sentences using 'ha/faz + time' with the simple
          present (e.g., 'Eu trabalho aqui ha 10 anos'). Students translate into English
          using present perfect continuous. Focus on recognizing that Portuguese simple
          present + 'ha' = English have been + -ing.
        duration: 15
      - name: Simple Present or Perfect Continuous Error Correction
        type: error-correction
        description: Provide a paragraph with 10 errors where Portuguese speakers
          used simple present instead of present perfect continuous. Students identify
          and correct each error. Include time markers (for, since, all day, how long)
          as clues.
        duration: 15
