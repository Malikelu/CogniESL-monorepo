  used_to:
    interference_patterns:
    - pattern: Use of 'used to' for present habits
      example_portuguese: Eu costumo estudar.
      example_gloss: I usually study.
      example_wrong: I used to study.
      example_correct: I usually study.
      explanation: Portuguese 'costumar' expresses present habits. English 'used to'
        expresses past habits only.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of present tense where 'used to' is needed
      example_portuguese: Eu jogava futebol quando era crianca.
      example_gloss: I played football when I was child.
      example_wrong: I played football when I was a child.
      example_correct: I used to play football when I was a child.
      explanation: Portuguese uses the imperfect past for past habits. English uses
        'used to + infinitive' for past habits that no longer exist.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I used to study.'' (present habit) Correct: ''I usually study.'''
    - 'Wrong: ''I played football when I was a child.'' Correct: ''I used to play
      football when I was a child.'''
    why_it_happens: Portuguese 'costumar' expresses present habits, while the imperfect
      past (jogava) expresses past habits. English 'used to' is only for past habits.
      Portuguese speakers may use 'used to' for present habits by transferring 'costumar.'
    teacher_tips:
      how_to_explain: 'Teach ''used to'' = past habits only. For present habits, use
        ''usually'' or the present simple. Drill: ''I used to play football'' (past,
        I don''t anymore) vs. ''I usually play football'' (present, I still do).'
      where_to_start: 'Begin with past habits: ''I used to play football when I was
        young.'''
      sequencing: 'Week 1: ''Used to'' for past habits. Week 2: Present habits (usually,
        present simple). Week 3: ''Be used to'' (accustomed to) vs. ''used to'' (past
        habit). Week 4: Mixed practice.'
      exercises:
      - name: Used To Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must use 'used to' or present
          simple.
        duration: 15
      - name: Used To vs Usually Drill
        type: fill-in-the-blank
        description: Distinguish between past habits (used to) and present habits
          (usually).
        duration: 15
