  dependent_prepositions:
    interference_patterns:
    - pattern: Use of wrong preposition after verbs
      example_portuguese: Eu sonho com viajar.
      example_gloss: I dream with to travel.
      example_wrong: I dream with traveling.
      example_correct: I dream of traveling.
      explanation: Portuguese uses 'com' (with) after 'sonhar.' English uses 'of'
        after 'dream.' Preposition-verb combinations differ between the languages.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'de' where English uses 'about'
      example_portuguese: Eu preciso de ajuda.
      example_gloss: I need of help.
      example_wrong: I need of help.
      example_correct: I need help.
      explanation: Portuguese uses 'de' after 'precisar.' English uses no preposition
        after 'need.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I dream with traveling.'' Correct: ''I dream of traveling.'''
    - 'Wrong: ''I need of help.'' Correct: ''I need help.'''
    why_it_happens: Portuguese and English have different preposition-verb combinations.
      Portuguese 'sonhar com' = English 'dream of.' Portuguese 'precisar de' = English
      'need' (no preposition). Portuguese speakers transfer Portuguese preposition
      patterns.
    teacher_tips:
      how_to_explain: 'Create a list of common verbs with their prepositions in both
        languages. Drill: ''dream of, think about, look at, wait for, depend on, consist
        of, belong to, apply for, agree with.'''
      where_to_start: 'Begin with the most common errors: dream of, think about, look
        at.'
      sequencing: 'Week 1: Verb + preposition combinations. Week 2: Adjective + preposition.
        Week 3: Noun + preposition. Week 4: Mixed practice.'
      exercises:
      - name: Preposition Matching
        type: matching
        description: Match verbs with their correct prepositions in English.
        duration: 15
      - name: Preposition Error Correction
        type: error-correction
        description: Provide 15 sentences with preposition errors. Students correct
          them.
        duration: 15
