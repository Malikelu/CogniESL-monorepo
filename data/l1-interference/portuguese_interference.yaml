  since_vs_for:
    interference_patterns:
    - pattern: Use of 'since' where 'for' is needed (duration expressed as time span)
      example_portuguese: Eu estudo ha 3 anos.
      example_gloss: I study has 3 years.
      example_wrong: I have studied since 3 years.
      example_correct: I have studied for 3 years.
      explanation: Portuguese uses the single construction 'ha + duration' to express
        how long something has been happening. English requires 'for' with durations
        (for 3 years, for a week). Portuguese speakers map 'ha' onto 'since' because
        'since' feels like the present-perfect preposition, producing 'since 3 years.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'for' where 'since' is needed (point in time / starting point)
      example_portuguese: Eu moro aqui ha 2015.
      example_gloss: I live here has 2015.
      example_wrong: I have lived here for 2015.
      example_correct: I have lived here since 2015.
      explanation: Portuguese 'ha' also covers the meaning of 'since' when referring
        to a starting point in time. Portuguese speakers may overgeneralize 'for' as
        the default duration preposition and use it with a specific year or date, producing
        'for 2015' instead of 'since 2015.' This is the reverse error of the first
        pattern and stems from the same L1 gap — one Portuguese form ('ha') maps to two
        English forms ('since' and 'for').
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I have studied since 3 years. Correct: I have studied for 3 years.'
    - 'Wrong: She has lived here for 2018. Correct: She has lived here since 2018.'
    - 'Wrong: We know each other since 10 years. Correct: We have known each other
      for 10 years.'
    - 'Wrong: He has worked here for last January. Correct: He has worked here since
      last January.'
    why_it_happens: 'Portuguese has a single temporal construction ''ha'' (from ''há'',
      derived from Latin ''habet'') that covers both ''since'' and ''for'' in English.
      ''Eu estudo há 3 anos'' and ''Eu estudo há 2015'' use the same structure in
      Portuguese but require different prepositions in English (''for 3 years'' vs.
      ''since 2015''). Portuguese speakers must learn to split one L1 concept into
      two L1 forms: (1) ''for'' + duration (a week, 3 years, a long time) and (2)
      ''since'' + starting point (2015, last January, I was a child). The bidirectional
      error pattern — using ''since'' for durations and ''for'' for starting points
      — is documented in Swan & Smith (2001) as a characteristic Portuguese-speaker
      error in English tense-preposition mapping. Azevedo (1996) confirms that Portuguese
      ''há'' encodes both point and duration readings without morphological distinction.'
    teacher_tips:
      how_to_explain: 'Draw a timeline on the board. Mark a point in the past with
        a dot (SINCE). Draw a line from that dot to now (FOR). Write: ''SINCE = when
        it started (a point). FOR = how long (a duration).'' Show that Portuguese
        ''ha'' does both jobs, but English needs two different words.'
      where_to_start: Begin with the timeline visual. Give 5 clear examples of each
        type. Have students sort prepositional phrases into ''since'' (point) and ''for''
        (duration) columns.
      sequencing: 'Week 1: Timeline introduction — since = point, for = duration. Week
        2: Practice with dates/years (since) vs. time spans (for). Week 3: Error
        correction — fix ''since 3 years'' and ''for 2015'' type errors. Week 4: Free
        production — students write about their own lives using both structures.'
      exercises:
      - name: Since vs For Drill
        type: fill-in-the-blank
        description: Provide 20 sentences with blank preposition slots. Students choose
          between 'since' and 'for.' Include both point-in-time and duration contexts.
        duration: 15
      - name: Error Correction — Since/For Swap
        type: error-correction
        description: Provide 15 sentences with the wrong preposition (since/for swapped).
          Students identify the error, correct it, and explain whether the context
          is a point in time or a duration.
        duration: 15
      - name: Timeline Translation
        type: translation
        description: Give 10 Portuguese sentences using 'há' with both point and duration
          meanings. Students translate into English, choosing the correct preposition
          based on context.
        duration: 20
