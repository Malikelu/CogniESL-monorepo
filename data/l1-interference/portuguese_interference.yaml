  uncountable_nouns:
    interference_patterns:
    - pattern: Pluralization of uncountable nouns
      example_portuguese: Muitas pesquisas foram feitas.
      example_gloss: Many researches were done.
      example_wrong: Many researches were done.
      example_correct: Much research was done.
      explanation: Portuguese 'pesquisa' has a plural form. English 'research' is
        uncountable and cannot be pluralized.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'a/an' with uncountable nouns
      example_portuguese: Eu tenho uma noticia.
      example_gloss: I have a news.
      example_wrong: I have a news.
      example_correct: I have news.
      explanation: Portuguese 'noticia' is countable. English 'news' is uncountable.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''Many researches.'' Correct: ''Much research.'''
    - 'Wrong: ''I have a news.'' Correct: ''I have news.'''
    - 'Wrong: ''She gave me many advices.'' Correct: ''She gave me much advice.'''
    why_it_happens: 'Several common nouns are countable in Portuguese but uncountable
      in English: research (pesquisa/pesquisas), news (noticia/noticias), advice (conselho/conselhos),
      information (informacao/informacoes). Portuguese speakers systematically pluralize
      these nouns and use ''a/an'' with them.'
    teacher_tips:
      how_to_explain: 'Create a ''Uncountable in English'' poster. List the most common
        nouns. Emphasize: ''If you cannot count it without a counter word, it is uncountable.'''
      where_to_start: Begin with 'information' and 'news' since these are the most
        frequent.
      sequencing: 'Week 1: Common uncountable nouns. Week 2: Counter words. Week 3:
        Subject-verb agreement with uncountable nouns. Week 4: Mixed practice.'
      exercises:
      - name: Uncountable Noun Error Hunt
