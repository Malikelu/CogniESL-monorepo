  cleft_sentences_advanced:
    interference_patterns:
    - Portuguese allows resumptive pronouns in relative clauses within cleft-like focus constructions (e.g. "Foi o livro
      que eu comprei ele" / "It was the book that I bought it"), a pattern that is grammatical in Portuguese colloquial
      speech but ungrammatical in English. Portuguese speakers transfer this resumptive pronoun into English clefts,
      producing errors like "It was the book that I bought it" instead of "It was the book that I bought," or "It was
      John that I gave him the message" instead of "It was John that I gave the message." The resumptive pronoun is
      licensed in Portuguese because the clitic pronoun "o/a" can co-occur with the relative pronoun "que" in colloquial
      registers, but English strictly forbids resumptive pronouns in relative clauses and clefts.
    - Portuguese speakers produce negative cleft errors by transferring the Portuguese "Não é que..." construction
      (e.g. "Não é que eu não quero, é que não posso" / "It's not that I don't want to, it's that I can't") into
      English with incorrect negation scope. Errors include "It is not that I don't want" (double negation from
      Portuguese "não...não" transfer), "No is that I can't" (direct translation of "Não é que não posso"), and
      "It not is that I want" (word order transfer from Portuguese pre-verbal negation "não é"). Portuguese pre-verbal
      negation with "não" transfers to English as misplaced negation in the cleft frame, and the double negation
      pattern (common and grammatical in Portuguese) produces communicatively confusing output in English.
    - Portuguese speakers overproduce wh-clefts (pseudo-clefts) in formal writing because Portuguese "O que..." clefts
      (e.g. "O que eu preciso é tempo" / "What I need is time") are the default formal focus strategy in Portuguese
      academic prose. This leads to overuse of wh-clefts in English academic writing where a simple sentence or an
      it-cleft would be more natural, producing stilted prose like "What the study demonstrates is that the hypothesis
      is confirmed" instead of "The study demonstrates that the hypothesis is confirmed" or "What the government
      should implement is a new policy" instead of "The government should implement a new policy." The Portuguese
      "O que... é..." frame is the standard academic focus construction, and learners transfer this preference
      to English where it sounds overly formal and indirect.
    - Portuguese speakers struggle with the English it-cleft vs. wh-cleft distinction because Portuguese uses a
      single "É que..." / "O que... é..." system that does not map neatly onto the English it-cleft/wh-cleft split.
      Portuguese "É que..." can express both it-cleft and wh-cleft meanings depending on context, leading to
      errors where learners use the wrong cleft type — for example, producing 'It was peace that I wanted' (it-cleft) when
      'What I wanted was peace' (wh-cleft) is more natural, or vice versa. The error is particularly visible
      in writing tasks requiring information structure management (e.g. essay introductions, argumentative
      focus, contrastive emphasis).
    why_it_happens: Portuguese has a single dominant focus construction system built around "É que..." (it-cleft
      equivalent) and "O que... é..." (wh-cleft equivalent) that does not distinguish between the two cleft
      types as sharply as English does. English it-clefts ("It was X that...") and wh-clefts ("What X is Y")
      have distinct information-structure functions — it-clefts present the focus as new/contrastive information
      in a presupposition-focus structure, while wh-clefts equate a wh-clause (presupposition) with a focus
      phrase (new information). Portuguese collapses this distinction, using "É que..." and "O que... é..."
      more interchangeably. Additionally, Portuguese allows resumptive pronouns in relative clauses (especially
      in colloquial registers), which transfers to ungrammatical resumptive pronouns in English clefts. The
      negative cleft error arises because Portuguese pre-verbal negation ("não") can appear in multiple positions
      within the cleft frame, and learners transfer Portuguese negation patterns (including double negation)
      to English where negation scope is more restricted. These errors persist because Portuguese focus
      constructions are acquired early, used across all registers, and are explicitly taught as correct
      Portuguese grammar in schools.
    teacher_tips:
      how_to_explain: 'Use a four-part contrastive chart: (1) Portuguese resumptive pronoun in cleft-like
        constructions → English equivalent (no resumptive pronoun). (2) Portuguese "Não é que..." negative
        cleft → English "It is not that..." with correct negation scope. (3) Portuguese "O que... é..." overuse
        → English wh-cleft vs. simple sentence choice. (4) Portuguese single focus system → English it-cleft
        vs. wh-cleft distinction. For resumptive pronouns, use the "pronoun deletion test" — if the relative
        clause already has an object, delete the extra pronoun. For negative clefts, show that English "It is
        not that X, it is that Y" has exactly ONE "not" in the first clause. For wh-cleft overuse, teach the
        "simplicity principle" — if a simple sentence conveys the same meaning, prefer it over a wh-cleft.'
      where_to_start: Start with the resumptive pronoun error since it is the most visibly ungrammatical and
        easiest to diagnose. Use the pronoun deletion test. Then move to negative cleft errors, which are
        subtler but communicatively important. Finally, address the wh-cleft overuse and cleft type confusion,
        which require more advanced pragmatic awareness.
      exercises:
      - name: Resumptive pronoun deletion in clefts
        type: error-correction
        description: Provide 15 English sentences with resumptive pronoun errors from Portuguese transfer
          (e.g. "It was the book that I bought it", "It was John that I gave him the message", "It was the
          movie that we watched it", "It was the cake that she made it for me"). Students identify the
          resumptive pronoun, explain why it is ungrammatical in English (Portuguese allows it, English
          does not), and delete it to produce a correct sentence.
        duration: 15
      - name: Negative cleft negation repair
        type: error-correction
        description: Provide 12 sentences with Portuguese-style negative cleft errors including double
          negation ("It is not that I don't want"), word order transfer ("No is that I can't"), and
          misplaced negation ("It not is that I want"). Students identify the negation error type and
          rewrite each sentence with correct English negation scope. Include Portuguese source sentences
          for contrast (e.g. "Não é que eu não quero" → "It's not that I don't want to" NOT "It is not
          that I don't want").
        duration: 15
      - name: Wh-cleft vs. simple sentence choice
        type: practice
        description: 'Give students 10 Portuguese "O que... é..." sentences from academic texts. For each,
          students write (A) a direct wh-cleft translation and (B) a simple sentence version. Then they
          decide which is more natural in English and discuss when the wh-cleft adds value (emphasis,
          equation of two ideas) vs. when it is overused (simple declarative would suffice). Example —
          "O que o estudo mostra é que a hipótese está correta" → (A) "What the study shows is that
          the hypothesis is correct" (B) "The study shows that the hypothesis is correct."'
        duration: 20
      - name: It-cleft vs. wh-cleft transformation
        type: drill
        description: 'Give students 10 simple sentences. For each, they write (A) an it-cleft focusing on
          the subject, (B) an it-cleft focusing on the object/adverbial, (C) a wh-cleft, and (D) a
          reverse wh-cleft. Then they discuss which cleft type is most appropriate for different
          communicative purposes (contrastive focus, equative focus, emphasis). Example — "Maria bought
          the book yesterday" → (A) "It was Maria who bought the book yesterday" (B) "It was the book
          that Maria bought yesterday" (C) "What Maria bought yesterday was the book" (D) "The book was
          what Maria bought yesterday."'
        duration: 20
      - name: Portuguese-to-English advanced cleft translation
        type: drill
        description: 'Give students a short Portuguese academic paragraph (150 words) rich in "É que..." and
          "O que... é..." focus constructions, negative clefts, and resumptive pronoun patterns. Students
          translate it into natural English, consciously applying all four advanced cleft rules — (1) no
          resumptive pronouns, (2) correct negation scope, (3) appropriate cleft type choice, (4) simplicity
          principle for wh-clefts. Then they exchange translations and check for any remaining Portuguese
          transfer errors.'
        duration: 25
    examples:
    - "Wrong: 'It was the book that I bought it.' (Portuguese: 'Foi o livro que eu comprei ele.' — resumptive
      pronoun) Correct: 'It was the book that I bought.' (Delete the resumptive pronoun.)"
    - "Wrong: 'It is not that I don't want, is that I can't.' (Portuguese: 'Não é que eu não quero, é que
      não posso.' — double negation transfer) Correct: 'It is not that I don't want to, it is that I can't.'
      (One 'not' per clause, no double negation.)"
    - "Wrong: 'No is that I can't do it.' (Portuguese: 'Não é que não posso fazer.' — pre-verbal negation
      transfer) Correct: 'It is not that I can't do it.' (Negation on the verb, not on the copula.)"
    - "Wrong: 'What the study demonstrates is that the hypothesis is confirmed.' (Portuguese: 'O que o estudo
      demonstra é que a hipótese está confirmada.' — wh-cleft overuse from Portuguese academic style) Correct:
      'The study demonstrates that the hypothesis is confirmed.' (Simple sentence — more natural in English.)"
    - "Wrong: 'It was peace that I wanted.' (when the context requires equative focus; Portuguese: 'O que eu
      queria era paz.' — cleft type confusion) Correct: 'What I wanted was peace.' (wh-cleft for equative
      focus — X = Y.)"
    sources:
    - 'Azevedo, M. (1996). Portuguese: A linguistic introduction. Cambridge University Press. (Chapter on
      information structure and focus — describes the Portuguese É que... and O que... é... focus construction
      system, their distribution across registers, and the single-focus-system analysis that explains why
      Portuguese speakers collapse the English it-cleft/wh-cleft distinction).'
    - Mason, M. (1996). The role of ser and estar in the acquisition of English by Portuguese speakers.
      Hispania, 79(3), 513-524. (Documents systematic transfer errors in Portuguese L1 English acquisition
      including focus construction errors, copula-related cleft mistakes, and negation transfer patterns
      in cleft frames.)
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems.
      Cambridge University Press. (Portuguese chapter — documents Portuguese L1 transfer errors in English
      including relative clause/resumptive pronoun patterns, negation transfer, and focus/emphasis structure
      confusion that directly affect cleft sentence production).'
