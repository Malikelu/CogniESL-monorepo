  a_an_the:
    interference_patterns:
    - pattern: Omission of indefinite article after ser with professions
      example_portuguese: Ela e medica.
      example_gloss: She is doctor.
      example_wrong: She is doctor.
      example_correct: She is a doctor.
      explanation: Portuguese drops the indefinite article after ser when stating
        professions. English requires a/an.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Overuse of definite article with days of the week
      example_portuguese: Eu trabalho na segunda-feira.
      example_gloss: I work on the Monday.
      example_wrong: I work on the Monday.
      example_correct: I work on Monday.
      explanation: Portuguese uses the definite article with days of the week. English
        uses zero article.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Overuse of definite article with body parts and possessives
      example_portuguese: Eu lavei as minhas maos.
      example_gloss: I washed the my hands.
      example_wrong: I washed the my hands.
      example_correct: I washed my hands.
      explanation: Portuguese uses definite articles before possessives with body
        parts. English uses the possessive alone.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Confusion of a/an selection based on Portuguese gender rules
      example_portuguese: E um problema importante.
      example_gloss: It-is a problem important.
      example_wrong: It is a important problem.
      example_correct: It is an important problem.
      explanation: Portuguese um/uma is determined by grammatical gender, not by initial
        sound.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: She is doctor. Correct: She is a doctor.'
    - 'Wrong: I work on the Monday. Correct: I work on Monday.'
    - 'Wrong: I washed the my hands. Correct: I washed my hands.'
    why_it_happens: Portuguese has a fully developed article system but its distribution
      differs from English. Portuguese drops the indefinite article after ser when
      stating professions. Portuguese requires the definite article with body parts
      when a possessive is implied. Portuguese uses articles with days of the week,
      languages, and country names.
    teacher_tips:
      how_to_explain: 'Draw a two-column chart: Portuguese articles vs. English articles.
        Start with the profession pattern.'
      where_to_start: 'Begin with the profession pattern. Have students introduce
        themselves: I am a teacher, I am a doctor.'
      sequencing: 'Week 1: Indefinite article with professions. Week 2: Definite article
        overuse with body parts. Week 3: Zero article with days, languages, countries.
        Week 4: A/an phonological rule.'
      exercises:
      - name: 'Article Audit: Professions'
        type: error-correction
        description: Provide 20 sentences where Portuguese speakers omitted articles.
        duration: 20
    sources:
    - Swan, M. & Smith, B. (2001). Learner English (2nd ed.). Cambridge University
      Press.
    - Tryzna, M. (2009). Acquisition of English article choice by L1 Portuguese speakers.
      Language Learning, 59(1), 1-35.
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
