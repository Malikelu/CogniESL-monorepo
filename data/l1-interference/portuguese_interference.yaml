  causative_have_get:
    interference_patterns:
    - Portuguese speakers overextend 'make' to cover all causative meanings, collapsing the English four-way distinction between
      make/have/get as causative verbs. Portuguese 'fazer' functions as the primary general-purpose causative and its semantic
      range covers both English 'make' (force/compulsion) and 'have/get' (arrangement/persuasion), leading learners to produce
      'I made the mechanic check my car' when the intended meaning is 'I had the mechanic check my car' (arranging a service,
      not forcing someone). This overextension of make into have/get semantic territory is one of the most frequent and persistent
      causative errors for Portuguese learners.
    - Portuguese speakers produce structurally ungrammatical causative strings by transferring Portuguese complement patterns.
      Portuguese 'fazer' takes a bare infinitive complement (e.g., 'Fiz ele trabalhar' = 'I made him work'), and learners
      correctly map this onto English 'make + bare infinitive.' However, when using 'have' and 'get' as causatives, Portuguese
      lacks equivalent dedicated constructions — 'mandar' (send/order) and periphrastic expressions are used instead — leading
      learners to transfer the Portuguese bare-infinitive pattern onto 'have' and 'get,' producing errors like 'I had the
      mechanic to check my car' (have + to-infinitive) and 'She got him clean his room' (got + bare infinitive) instead of
      the required 'She got him to clean his room' (get + to-infinitive).
    - Portuguese speakers omit the past participle in 'have something done' passive causative constructions, producing errors
      like 'I had my hair cut' with a regularized or incorrect participle form ('I had my hair cutted'), and 'I had fix my
      car' (had + bare infinitive instead of had + past participle). Portuguese does not have a productive 'have something
      done' passive causative equivalent — learners may use 'fazer' + infinitive or a simple passive with 'ser,' neither of
      which maps onto the English participial construction, causing persistent difficulty with this pattern.
    why_it_happens: Portuguese has a streamlined causative system with fewer structural distinctions than English. The primary
      causative verb 'fazer' covers the semantic territory of both English 'make' and 'have/get,' so learners collapse this
      distinction and default to 'make' for all causative meanings. Portuguese 'fazer' takes a bare infinitive complement,
      which aligns with English 'make + bare infinitive' but not with 'have + bare infinitive' or 'get + to-infinitive.' Portuguese
      lacks a dedicated 'have someone do / get someone to do' construction, so learners transfer the closest Portuguese pattern
      (bare infinitive after fazer/mandar) onto English 'have' and 'get,' producing wrong complement patterns. The passive
      causative 'have something done' has no direct Portuguese equivalent — Portuguese uses 'ficar' + past participle or a
      simple passive with 'ser' — so learners struggle with the participial structure and either use bare infinitives or produce
      incorrect participle forms. These errors persist because the Portuguese causative system is deeply automatized and learners
      lack awareness that English makes finer semantic and structural distinctions.
    teacher_tips:
      how_to_explain: Use a causative verb map showing the English causative system as a three-part distinction — make + bare
        infinitive (force), have + bare infinitive (arrangement/service), get + to-infinitive (persuasion) — alongside Portuguese
        fazer + bare infinitive (covers make+have+get territory). Highlight the complement pattern differences with color
        coding — make/have + BARE infinitive vs get + TO-infinitive. For passive causatives, contrast 'I had my car fixed'
        with Portuguese 'Fiz consertar meu carro' / 'Meu carro foi consertado' to show that the English participial structure
        has no Portuguese equivalent.
      where_to_start: Start with the semantic distinction between make (force) and have (arrangement), since this is the most
        meaning-critical error. Use scenarios to build awareness — 'Did you force someone, or did you arrange the service?'
        Then move to structural patterns — have + object + bare infinitive vs get + object + to-infinitive. Finally, address
        passive causatives.
      exercises:
      - name: Make vs. Have vs. Get — scenario-based causative selection
        type: drill
        description: Provide 20 scenarios illustrating force (make), arrangement (have), and persuasion (get) contexts. Students
          choose the correct causative verb and write the full sentence. For example, 'You asked your friend to lend you money,
          and they agreed after some convincing' yields 'I got my friend to lend me money.' For another example, 'You arranged
          for a plumber to fix your toilet' yields 'I had a plumber fix my toilet.'
        duration: 20
      - name: Causative complement pattern drill — bare vs. to-infinitive
        type: error-correction
        description: Provide 15 sentences with Portuguese-style causative complement errors including have + to-infinitive
          ('I had the mechanic to check my car'), got + bare infinitive ('She got him clean his room'), had + bare infinitive
          for passive ('I had fix my car'), and make + to-infinitive ('She made him to go'). Students identify each error,
          correct it, and name the required complement pattern for the causative verb used.
        duration: 15
      - name: Portuguese-to-English causative translation
        type: drill
        description: Give 15 Portuguese sentences using 'fazer,' 'mandar,' and periphrastic causatives (e.g., 'Fiz ele trabalhar,'
          'Mandei consertar o carro,' 'Ela me fez ir embora,' 'Meu carro foi consertado,' 'Fiz pintar a casa'). Students translate
          each into natural English, choosing the correct causative verb and complement structure. Discuss as a class which
          Portuguese causative maps onto which English equivalent.
        duration: 20
      - name: Passive causative transformation
        type: practice
        description: Give students 10 active causative sentences (e.g., 'I had the barber cut my hair'). Students transform
          each into the passive causative construction. Then give 10 Portuguese passive causative sentences using 'ser/ficar'
          + participle and 'fazer-se' constructions. Students translate into English using 'have something done,' paying special
          attention to correct past participle forms including irregulars (cut, written, built, made).
        duration: 15
      - name: Causative error classification challenge
        type: practice
        description: Provide 20 sentences with a mix of causative errors (wrong verb choice, wrong complement pattern, passive
          causative errors, participle regularization). Students classify each error type by its Portuguese source, correct
          the sentence, and explain why the error occurs. This consolidates all three interference patterns.
        duration: 20
    examples:
    - 'Wrong: ''I made the mechanic check my car.'' (intended: arranged, not forced. Portuguese: ''Fiz o mecânico verificar
      meu carro.'' — fazer covers both make and have) Correct: ''I had the mechanic check my car.'''
    - 'Wrong: ''I had the mechanic to check my car.'' (Portuguese: ''Fiz o mecânico verificar meu carro.'' — bare infinitive
      transferred to have) Correct: ''I had the mechanic check my car.'' (have + bare infinitive, no "to")'
    - 'Wrong: ''She got him clean his room.'' (Portuguese: ''Ela o fez limpar o quarto.'' — fazer + bare infinitive transferred
      to get) Correct: ''She got him to clean his room.'' (get + to-infinitive required)'
    - 'Wrong: ''I had my hair cutted.'' (Portuguese past participle transfer + regularization. Portuguese: ''Cortei meu cabelo.''
      / ''Fiz cortar meu cabelo.'') Correct: ''I had my hair cut.'' (past participle, not past tense; irregular form)'
    - 'Wrong: ''The house made painted.'' (Portuguese: ''A casa foi pintada.'' / ''Fez-se pintar a casa.'' — passive causative
      transfer) Correct: ''I had the house painted.'' / ''The house was painted.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents causative verb transfer errors including fazer to make/have overuse, complement
      pattern mismatches in have/get constructions, and passive causative structural transfer).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on complementation
      and causative constructions — describes the Portuguese fazer-causative system, its bare-infinitive complement structure,
      and the lack of a multi-verb causative distinction equivalent to English make/have/get, explaining the structural basis
      for L1 transfer).'
