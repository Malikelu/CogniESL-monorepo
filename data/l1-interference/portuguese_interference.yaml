  substitution_advanced:
    interference_patterns:
    - pattern: Omission of 'one/ones' after adjectives when the noun is omitted
      example_portuguese: Eu quero o vermelho.
      example_gloss: I want the red.
      example_wrong: I want the red.
      example_correct: I want the red one.
      explanation: Portuguese allows adjectives to stand alone as noun phrases with a
        definite article (o vermelho = the red one). English requires the pronoun
        'one' (singular) or 'ones' (plural) after the adjective when the noun is omitted.
        Portuguese speakers omit 'one/ones' because their L1 does not need them — the
        article + adjective alone constitutes a complete noun phrase.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'so' after verbs of thinking and believing
      example_portuguese: Voce acha que vai chover? Acho.
      example_gloss: Do you think it will rain? I think.
      example_wrong: Do you think it will rain? I think.
      example_correct: Do you think it will rain? I think so.
      explanation: Portuguese allows bare verb responses to yes/no questions about
        mental states (Acho = I think so). English requires the pro-form 'so' after
        verbs like think, believe, hope, expect, suppose, and afraid. Without 'so',
        the response sounds incomplete or unnatural to native English speakers. Portuguese
        speakers transfer the bare-verb response pattern directly, producing 'I think'
        instead of 'I think so.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Repetition of full noun phrase instead of using 'that/those' in comparisons
      example_portuguese: A populacao de Londres e maior que a populacao de Paris.
      example_gloss: The population of London is greater than the population of Paris.
      example_wrong: The population of London is greater than the population of Paris.
      example_correct: The population of London is greater than that of Paris.
      explanation: In comparative structures, Portuguese repeats the head noun after
        the preposition (a populacao de Paris = the population of Paris). English uses
        the pro-form 'that' (singular) or 'those' (plural) to replace the head noun
        in comparisons to avoid repetition. Portuguese speakers tend to repeat the
        full noun phrase because Portuguese does not use a comparable pro-form in
        this position. This results in wordy, unnatural-sounding comparative sentences.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I want the red.'' Correct: ''I want the red one.'''
    - 'Wrong: ''Do you think it will rain?'' ''I think.'' Correct: ''I think so.'''
    - 'Wrong: ''The population of London is greater than the population of Paris.''
      Correct: ''The population of London is greater than that of Paris.'''
    - 'Wrong: ''Her test scores were higher than the test scores of her classmates.''
      Correct: ''Her test scores were higher than those of her classmates.'''
    why_it_happens: Portuguese and English differ fundamentally in how they handle
      substitution (pro-forms). Three key differences cause L1 transfer errors. First,
      Portuguese allows adjectives to function as complete noun phrases with a definite
      article (o vermelho = the red one), so Portuguese speakers omit 'one/ones' in
      English. Second, Portuguese permits bare verb responses to questions about mental
      states (Acho = I think so), so speakers drop the required English pro-form 'so'
      after think, believe, hope, expect, suppose, and afraid. Third, Portuguese does
      not use a pro-form equivalent to English 'that/those' in comparative structures,
      so speakers repeat the full noun phrase instead of substituting. All three patterns
      reflect a broader typological difference — Portuguese relies more on context and
      bare forms, while English requires explicit pro-forms for grammatical completeness
      and discourse cohesion.
    teacher_tips:
      how_to_explain: 'Teach the three substitution types separately. For one/ones:
        write ''o vermelho'' on the board and ask ''The red WHAT? We need ONE.'' For
        so/not: show that English mental verbs need ''so'' — ''I think SO, I hope SO,
        I''m afraid SO.'' For that/those in comparisons: show that English replaces
        the repeated noun — ''greater than THAT of Paris'' not ''than the population
        of Paris.'' Use color-coding: highlight what gets replaced and what replaces it.'
      where_to_start: 'Begin with one/ones (most concrete, visual). Use classroom
        objects: ''the blue one, the cheap ones.'' Then move to so/not with mental
        verbs (use question-and-answer drills). Finally introduce that/those in comparisons
        (use data comparison tasks).'
      sequencing: 'Week 1: One/ones after adjectives (singular and plural). Week 2:
        So/not with mental verbs (think, believe, hope, expect, suppose, afraid). Week
        3: That/those in comparative structures. Week 4: Mixed practice — all three
        substitution types in discourse.'
      exercises:
      - name: One Ones Insertion
        type: fill-in-the-blank
        description: Provide 15 sentences where students must insert 'one' or 'ones'
          after adjectives when the noun is omitted. Include comparative and superlative
          contexts.
        duration: 15
      - name: So Not Response Drill
        type: sentence-completion
        description: Give 15 yes/no questions with mental verbs. Students must respond
          with 'I think so,' 'I hope not,' 'I believe so,' etc. Include affirmative,
          negative, and uncertain responses.
        duration: 15
      - name: Comparative Pro-form Substitution
        type: sentence-rewrite
        description: Provide 10 comparative sentences with repeated noun phrases.
          Students rewrite using 'that' (singular) or 'those' (plural) to replace the
          repeated noun.
        duration: 15
      - name: Substitution Identification in Text
        type: text-analysis
        description: Students read a short academic paragraph and underline all substitution
          devices (one/ones, so/not, that/those). For each, they identify what is being
          replaced.
        duration: 15
      - name: Portuguese to English Substitution Translation
        type: translation
        description: Give 10 Portuguese sentences that require substitution in English
          (bare adjectives, bare verb responses, repeated nouns in comparisons).
          Students translate, applying the correct English pro-form.
        duration: 15
