  modals_perfect:
    interference_patterns:
    - pattern: Use of 'must have' for weak past speculation where 'might have' is
        needed
      example_portuguese: Ele provavelmente chegou tarde.
      example_gloss: He probably arrived late.
      example_wrong: He must have arrived late.
      example_correct: He might have arrived late.
      explanation: Portuguese 'provavelmente' covers all levels of past speculation.
        English distinguishes 'must have' (strong) from 'might have' (weak).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Overextension of 'should have' to express past probability where 'must
        have' or 'might have' is needed
      example_portuguese: Ele deveria ter chegado as cinco.
      example_gloss: He should have arrived at five.
      example_wrong: 'He should have arrived at five. (meaning: he probably arrived)'
      example_correct: He must have arrived at five. / He might have arrived at five.
      explanation: Portuguese 'deveria ter + past participle' covers both epistemic
        past probability ('he probably arrived') and deontic unfulfilled obligation
        ('he was supposed to arrive but didn't'). English 'should have' is restricted
        to unfulfilled obligation/regret. Portuguese speakers use 'should have' for
        past probability because the L1 form maps onto it, but English listeners interpret
        this as criticism (he was supposed to but didn't), causing pragmatic confusion.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''He must have arrived late.'' (weak evidence) Correct: ''He might have
      arrived late.'''
    - 'Wrong: ''She should have missed the bus.'' (meaning: she probably missed it)
      Correct: ''She must have missed the bus.'' or ''She might have missed the bus.'''
    why_it_happens: Portuguese 'provavelmente' covers all levels of speculation about
      the past. English distinguishes 'must have' (strong deduction) from 'might/may
      have' (weak possibility) and 'cannot have' (strong negative deduction). Additionally,
      Portuguese 'deveria ter + participle' is ambiguous between epistemic probability
      ('he probably arrived') and deontic obligation ('he was supposed to arrive').
      English 'should have' only expresses the deontic reading. Portuguese speakers
      transfer the epistemic reading of 'deveria ter' into English 'should have',
      producing sentences that English listeners interpret as blame or regret rather
      than neutral speculation.
    teacher_tips:
      how_to_explain: 'Teach the past speculation scale: ''must have'' = 95% sure,
        ''might/may have'' = 50% sure, ''cannot have'' = 95% not sure. Then address
        ''should have'': ''Should have means you expected something but it didn''t
        happen. If you want to guess about the past, use must have or might have,
        NOT should have.'''
      where_to_start: 'Begin with strong deduction: ''The ground is wet. It must have
        rained.'' Then introduce the ''should have'' trap: ''He should have arrived''
        = he was supposed to but didn''t. For guessing, say ''He must have arrived''
        or ''He might have arrived.'''
      sequencing: 'Week 1: ''Must have'' for strong deduction. Week 2: ''Might/may
        have'' for weak possibility. Week 3: ''Cannot have'' for strong negative.
        Week 4: ''Should have'' — obligation vs. speculation contrast. Week 5: Mixed
        practice distinguishing speculation from obligation.'
      exercises:
      - name: Past Speculation Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with evidence. Students choose the correct
          past modal (must have, might have, can't have).
        duration: 15
      - name: Should Have or Must Have
        type: error-correction
        description: Provide 10 sentences where Portuguese speakers incorrectly use
          'should have' for past speculation. Students identify the error and replace
          with the correct modal (must have / might have). Include a brief explanation
          of why 'should have' changes the meaning.
        duration: 15
