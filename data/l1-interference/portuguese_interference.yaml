  comment_clauses:
    interference_patterns:
    - "Portuguese speakers overuse 'I think' and 'I believe' as universal epistemic softeners in English, transferring the Portuguese pattern 'eu acho que' and 'eu acredito que' which are used far more frequently and in more discourse contexts than their English equivalents. Portuguese 'achar' covers a wide epistemic range (opinion, assumption, guess) and is used as a default hedge in almost every declarative statement. English 'I think' is more restricted and can sound uncertain or apologetic when overused. This produces errors like 'I think it is a good idea' (where a direct statement 'It is a good idea' is more natural), 'I think that the government should...' in formal essays (where 'The government should...' is preferred), and 'I think yes' / 'I think no' (from Portuguese 'Acho que sim' / 'Acho que nao') where English requires 'I think so' / 'I don't think so'."
    - "Portuguese speakers overuse tag questions with 'isn't it?' as a universal tag, transferring the Portuguese pattern 'nao e?' or 'ne?' which functions as an all-purpose confirmation-seeking tag regardless of the main clause verb, tense, or polarity. Portuguese 'nao e?' is appended to almost any statement, but English requires verb-specific tags that match the auxiliary, tense, and polarity of the main clause. This produces errors like 'He is a doctor, isn't it?' (correct: 'isn't she?'), 'They left, isn't it?' (correct: 'didn't they?'), and 'You like coffee, isn't it?' (correct: 'don't you?'). The overgeneralized 'isn't it?' tag is one of the most recognizable markers of Portuguese-accented English."
    - "Portuguese speakers overuse 'you know' and 'you see' as discourse markers, transferring the Portuguese patterns 'sabe?' and 'entende?' which are used far more frequently in Portuguese conversation than their English equivalents. Portuguese 'sabe?' appears mid-sentence and sentence-finally as a filler/engagement marker, but English 'you know' is more restricted in frequency and position. This produces errors like 'You know, I think that...' as a default sentence opener, 'It is, you know, very important' with question intonation mid-sentence, and overuse of 'you know what I mean?' at the end of statements where Portuguese would use 'sabe?' or 'entende?'."
    - "Portuguese speakers produce 'I mean' as a universal self-correction marker, transferring the Portuguese pattern 'quer dizer' which is used more broadly and frequently than English 'I mean'. Portuguese 'quer dizer' functions as both a self-correction marker and a general discourse filler, leading to overuse of 'I mean' in English where no correction is intended. Errors include 'I mean, I think it is good' (no correction intended), 'The weather is, I mean, very nice' (filler use), and 'I mean, can you help me?' where English requires no discourse marker."
    why_it_happens: "Portuguese has a rich system of epistemic/evidential comment clauses and discourse markers that are used more frequently, in more contexts, and with broader semantic ranges than their closest English equivalents. Portuguese 'achar' (to think/feel) is a default epistemic softener used in nearly every declarative statement, while English 'I think' is more restricted and can imply uncertainty. Portuguese 'nao e?' / 'ne?' is an all-purpose confirmation tag that does not vary by verb, tense, or polarity, while English requires verb-specific tags. Portuguese 'sabe?' / 'entende?' are high-frequency engagement markers that appear mid-sentence, while English 'you know' / 'you see' are more restricted. Portuguese 'quer dizer' is a polysemous discourse marker covering self-correction, reformulation, and filler functions, while English 'I mean' is primarily for self-correction. These L1 patterns are deeply automatized from early childhood acquisition and operate automatically in both speech and writing. The errors persist because comment clauses and discourse markers are low-salience features - learners often do not notice the frequency and distribution differences in input, and the errors rarely cause communication breakdown, reducing corrective feedback."
    teacher_tips:
      how_to_explain: "Use a four-part contrastive framework: (1) Epistemic softeners - show that Portuguese 'eu acho que' is used in nearly every declarative statement, while English 'I think' is more restricted and can sound uncertain. Teach the 'confidence scale'. (2) Tag questions - teach the English tag formation rule: identify the auxiliary verb, match the tense, reverse the polarity. Show that Portuguese 'nao e?' is invariant but English tags are verb-specific. (3) Discourse markers 'you know' / 'you see' - show that Portuguese 'sabe?' / 'entende?' are used 3-5x more frequently than English equivalents. (4) 'I mean' - teach that English 'I mean' is for self-correction only, not as a general filler."
      where_to_start: "Start with tag questions since they are the most rule-governed and the most visibly non-native error. Use the auxiliary-matching drill. Then move to epistemic softener overuse (I think) since it is the most frequent error. Address 'you know' / 'you see' overuse next. Finally, teach 'I mean' restriction as a self-correction marker."
      exercises:
      - name: "Tag question formation drill - auxiliary matching"
        type: drill
        description: "Provide 20 statements without tags. Students must add the correct question tag by identifying the auxiliary verb, matching the tense, and reversing polarity. Include Portuguese translations showing 'nao e?' for all of them, to highlight why the overgeneralized 'isn't it?' error happens. Examples - 'She is a doctor' to 'isn't she?', 'They left yesterday' to 'didn't they?', 'You like coffee' to 'don't you?', 'He can swim' to 'can't he?'. Time pressure to build automaticity."
        duration: 20
      - name: "Epistemic softener reduction - removing unnecessary I think"
        type: practice
        description: "Give students 15 sentences with Portuguese-style 'I think' overuse. Students must decide whether 'I think' is needed (genuine uncertainty) or should be removed (direct statement is more natural). For sentences where 'I think' is removed, they write the more confident direct version. Discuss the confidence scale and when epistemic softening is appropriate in English."
        duration: 15
      - name: "You know / you see - frequency awareness and reduction"
        type: error-correction
        description: "Give students a 200-word dialogue with Portuguese-style overuse of 'you know' and 'you see' (15 instances). Students must identify each instance, decide whether it is necessary (genuine engagement marker) or overuse (filler from Portuguese 'sabe?'/ 'entende?' transfer), and rewrite the dialogue with natural English discourse marker frequency (reduce to 3-4 instances). Discuss how overuse makes speakers sound hesitant and informal."
        duration: 20
      - name: "I mean - self-correction vs. filler distinction"
        type: practice
        description: "Provide 12 sentences using 'I mean'. Students must classify each as (a) genuine self-correction or (b) filler (no correction intended - from Portuguese 'quer dizer' transfer). For filler instances, students rewrite the sentence without 'I mean'."
        duration: 15
      - name: "Portuguese-to-English pragmatic translation"
        type: drill
        description: "Give 15 Portuguese sentences rich in comment clauses and discourse markers. Students translate each into natural English, consciously adjusting comment clause frequency and choosing correct tag questions."
        duration: 20
      - name: "Register awareness - formal vs. informal comment clauses"
        type: practice
        description: "Give students 10 statements. For each, they write two versions - one for informal conversation (using 'I think', 'you know', 'I mean' appropriately) and one for formal writing (removing or replacing comment clauses with more direct language)."
        duration: 15
    examples:
    - "Wrong: 'I think it is a good idea.' (over-softened - Portuguese 'Eu acho que e uma boa ideia' uses acho que as default) Correct: 'It is a good idea.' Use 'I think' only when genuinely uncertain."
    - "Wrong: 'He is a doctor, isn't it?' (Portuguese: 'Ele e médico, nao e?' - invariant tag) Correct: 'He is a doctor, isn't he?' Rule: English tags must match the auxiliary and subject."
    - "Wrong: 'She left yesterday, isn't it?' (Portuguese: 'Ela saiu ontem, nao e?') Correct: 'She left yesterday, didn't she?' Rule: no auxiliary in the main clause, use do/does/did in the tag."
    - "Wrong: 'You know, I think that the government should, you know, invest more, you know?' (Portuguese: 'Sabe, eu acho que o governo deveria, sabe, investir mais, sabe?' - sabe used 3x) Correct: 'I think the government should invest more.' (reduce you know to 0-1 instances)"
    - "Wrong: 'I mean, the weather is nice today.' (filler - Portuguese 'Quer dizer, o tempo está bom hoje') Correct: 'The weather is nice today.' Keep 'I mean' only for genuine self-correction."
    - "Wrong: 'I think yes.' (Portuguese: 'Acho que sim.') Correct: 'I think so.' / 'Yes, I think so.' English requires 'so' not 'yes' after 'I think'."
    sources:
    - "Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University Press. (Portuguese chapter - documents pragmatic and discourse-level transfer errors including epistemic softener overuse from eu acho que to I think, invariant nao e? tag question transfer producing isn't it? overgeneralization, and discourse marker overuse from sabe?/entende? to you know?/you see?)."
    - "Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on clause structure and discourse - describes the Portuguese epistemic/evidential comment clause system including acho que, nao e?, sabe?, entende?, and quer dizer, their frequency distributions, and their pragmatic functions, explaining the structural basis for L1 transfer to English comment clauses and discourse markers)."
