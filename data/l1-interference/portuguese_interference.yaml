  register_variation:
    interference_patterns:
    - pattern: Use of informal register in formal contexts
      example_portuguese: Oi, tudo bem?
      example_gloss: Hi, all good?
      example_wrong: Hi, all good? (in a job interview)
      example_correct: Hello, how are you?
      explanation: Portuguese uses informal greetings like 'Oi, tudo bem?' across most
        social contexts. English requires register-appropriate greetings in formal settings
        (job interviews, business meetings). Portuguese speakers may use casual greetings
        in formal English contexts because Portuguese does not mark formality as strictly
        in greeting routines.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Overuse of formal or stilted language in casual contexts due to address
        form transfer
      example_portuguese: O senhor poderia me ajudar?
      example_gloss: The sir could me help?
      example_wrong: Could you, sir, help me? (to a peer at a casual lunch)
      example_correct: Could you help me?
      explanation: Portuguese has a complex address form system (tu/você/o senhor/a senhora)
        that encodes formality, age, and social distance. English uses 'you' for all
        registers. Portuguese speakers may overcompensate by adding 'sir' or 'ma'am'
        in casual English conversations, or use overly formal phrasing (e.g., 'Could
        you, sir...') when speaking to peers, because their L1 requires constant
        formality marking through pronouns and verb conjugation. This transfer produces
        stilted or excessively polite English in informal settings.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: Hi, all good? (in a job interview) Correct: Hello, how are you?'
    - 'Wrong: Could you, sir, help me? (to a peer) Correct: Could you help me?'
    - 'Wrong: Good morning, sir. I desire to make a reservation. (to a friend)
        Correct: Hey, can I book a table?'
    why_it_happens: "Portuguese and English differ fundamentally in how they encode social register. Portuguese grammar requires speakers to constantly signal formality through pronoun choice (tu/você/o senhor/a senhora), verb conjugation (second-person vs. third-person verb forms), and greeting routines. English uses a single pronoun 'you' for all registers and relies on word choice, tone, and phrasing rather than grammar to signal formality. Portuguese speakers transfer their L1 habits in two directions. First, they may use informal Portuguese greetings in formal English contexts because Portuguese greetings are less register-sensitive. Second, they may overuse formal markers like 'sir/ma'am' or formal phrasing in casual English because their L1 grammar forces constant formality decisions. Additionally, Portuguese speakers may struggle with contractions in formal writing and may avoid phrasal verbs in favor of Latinate alternatives (e.g., 'investigate' instead of 'look into'), producing an overly formal register."
    teacher_tips:
      how_to_explain: "Create a register spectrum on the board: CASUAL ———————— FORMAL. Place greetings, requests, and vocabulary on the spectrum. Show that Portuguese marks formality in grammar (pronouns, verb forms) while English marks it in word choice and phrasing. Practice asking: How would you ask a friend for a pen? How would you ask your boss? Then address the sir/ma'am overuse. Explain that in English, we do not add sir to every sentence. It sounds too formal or even sarcastic among friends."
      where_to_start: Begin with greetings and requests. Show the same message delivered
        in casual, neutral, and formal English.
      sequencing: 'Week 1: Formal vs. informal greetings and introductions. Week 2:
        Formal vs. informal requests (Can you... / Could you... / Would you mind...).
        Week 3: Address forms — when to use sir/ma''am vs. first names. Week 4: Register
        in writing (emails to friends vs. emails to professors). Week 5: Phrasal verbs
        vs. formal alternatives. Week 6: Mixed practice with role-plays.'
      exercises:
      - name: Register Variation Drill
        type: sentence-rewrite
        description: Give 10 sentences. Students rewrite each at three register levels
          (casual, neutral, formal).
        duration: 15
      - name: Context Matching
        type: matching
        description: Provide 12 scenarios (job interview, texting a friend, emailing
          a professor, ordering coffee). Students choose the appropriate register from
          three options.
        duration: 10
      - name: Sir Ma'am Appropriateness
        type: judgment-task
        description: Give 10 dialogues. Students identify whether 'sir/ma'am' is appropriate,
          overused, or missing. They rewrite incorrect ones.
        duration: 10
