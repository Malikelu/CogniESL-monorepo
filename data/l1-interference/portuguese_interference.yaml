  future_going_to:
    interference_patterns:
    - pattern: Use of 'go' + infinitive for future instead of 'be going to'
      example_portuguese: Eu vou viajar amanha.
      example_gloss: I go to travel tomorrow.
      example_wrong: I go to travel tomorrow.
      example_correct: I am going to travel tomorrow.
      explanation: Portuguese 'ir + infinitivo' (go + infinitive) is the standard
        future construction. English uses 'be going to + infinitive' (with the auxiliary
        'be'). Portuguese speakers may omit 'be' and produce 'I go to travel.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of 'will' for planned future events where 'be going to' is
        required
      example_portuguese: Eu vou estudar medicina.
      example_gloss: I go to study medicine.
      example_wrong: I will study medicine.
      example_correct: I am going to study medicine.
      explanation: Portuguese 'ir + infinitivo' expresses planned future intentions.
        English distinguishes between 'be going to' (plans/intentions) and 'will'
        (spontaneous decisions, promises, predictions). Portuguese speakers often
        default to 'will' for all future meanings because Portuguese does not grammatically
        distinguish planned vs. spontaneous future. This results in 'I will study
        medicine' when the speaker has a long-term plan, where English requires 'I
        am going to study medicine.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I go to travel tomorrow.'' Correct: ''I am going to travel tomorrow.'''
    - 'Wrong: ''She go to study.'' Correct: ''She is going to study.'''
    - 'Wrong: ''I will study medicine (it is my plan).'' Correct: ''I am going to
      study medicine.'''
    why_it_happens: 'Portuguese uses ''ir + infinitivo'' as the standard way to express
      future plans: ''Eu vou viajar'' (I go to travel). English uses ''be going to
      + infinitive'': ''I am going to travel.'' Portuguese speakers transfer the structure
      literally and produce ''I go to travel'' instead of ''I am going to travel.''
      The critical difference is the auxiliary ''be'' in English, which has no equivalent
      in the Portuguese construction. Additionally, Portuguese does not grammatically
      distinguish between planned future (''ir + inf'') and spontaneous future — context
      disambiguates. English requires ''be going to'' for pre-existing plans and ''will''
      for spontaneous decisions. Portuguese speakers overgeneralize ''will'' because
      it is perceived as the default English future marker, losing the plan vs. spontaneity
      distinction.'
    teacher_tips:
      how_to_explain: 'Write ''Eu vou viajar'' on the board. Show that English needs
        ''AM going to travel'' — the ''am'' is essential. Drill: ''I am going to,
        You are going to, He/She is going to.'' Then contrast: ''be going to'' = plan
        made before speaking. ''will'' = decision made NOW. ''I am going to study
        tonight'' (I decided earlier). ''I will help you'' (I just decided).'
      where_to_start: Begin with 'I am going to' for personal plans. 'I am going to
        study tonight.'
      sequencing: 'Week 1: ''Be going to'' for plans. Week 2: ''Be going to'' vs.
        ''will.'' Week 3: ''Be going to'' for predictions with evidence. Week 4: Mixed
        practice.'
      exercises:
      - name: Going To Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must use 'be going to' correctly.
        duration: 15
      - name: Future Translation
        type: translation
        description: Give 10 Portuguese sentences with 'ir + infinitivo.' Students
          translate using 'be going to.'
        duration: 15
      - name: Going To or Will Decision
        type: multiple-choice
        description: Provide 15 scenarios. Students choose 'be going to' or 'will'
          based on whether the decision was pre-planned or spontaneous.
        duration: 15
