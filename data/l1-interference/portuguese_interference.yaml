  future_with_ir:
    interference_patterns:
    - pattern: Omission of auxiliary be in be going to future
      example_portuguese: Eu vou estudar.
      example_gloss: I go to study.
      example_wrong: I go to study tomorrow.
      example_correct: I am going to study tomorrow.
      explanation: Portuguese ir + infinitivo expresses future without any auxiliary
        verb (eu vou estudar = I will study). English requires the auxiliary be in
        the be going to construction (I am going to study). Portuguese speakers drop
        be because their L1 has no equivalent auxiliary in this construction.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Use of present tense with future time markers instead of be going to
      example_portuguese: Eu estudo amanha.
      example_gloss: I study tomorrow.
      example_wrong: I study tomorrow.
      example_correct: I am going to study tomorrow.
      explanation: Portuguese commonly uses the present tense with a future time adverb
        (eu estudo amanha = I will study tomorrow). English requires an explicit future
        marker (will or be going to). Portuguese speakers transfer the present-tense
        strategy directly, producing I study tomorrow instead of I am going to study
        tomorrow or I will study tomorrow. This pattern is especially common with
        verbs of intention and planned actions.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: I go to study tomorrow. Correct: I am going to study tomorrow.'
    - 'Wrong: I study tomorrow. Correct: I am going to study tomorrow.'
    - 'Wrong: She goes to travel next week. Correct: She is going to travel next week.'
    why_it_happens: Portuguese has two strategies that cause interference with English
      future forms. First, the ir + infinitivo construction (eu vou estudar) expresses
      future without any auxiliary verb, leading speakers to omit be in English be going
      to (producing I go to study instead of I am going to study). Second, Portuguese
      routinely uses the present tense with a future time adverb (eu estudo amanha =
      I study tomorrow), a strategy that does not exist in English. English requires
      an explicit future marker (will or be going to) regardless of whether a time
      adverb is present. Portuguese speakers transfer both strategies, producing errors
      like I go to study tomorrow (from ir + infinitivo) and I study tomorrow (from
      present tense + future adverb). Both patterns are documented in contrastive
      analyses of Portuguese and English tense-aspect systems.
    teacher_tips:
      how_to_explain: 'Write Eu vou estudar on the board. Underline vou. Ask students:
        What is the English equivalent? Show that English needs AM + GOING TO + VERB. Then
        write Eu estudo amanha. Show that English cannot use present tense for future
        even with tomorrow. English needs AM GOING TO STUDY TOMORROW.'
      where_to_start: 'Begin with the be going to structure. Drill the full form — I
        am going to, you are going to, he/she is going to. Emphasize that be is mandatory.'
      sequencing: 'Week 1: Be going to structure (conjugation of be). Week 2: Be going
        to for plans and intentions. Week 3: Present tense cannot express future in
        English (contrast with Portuguese). Week 4: Be going to vs. will. Week 5: Mixed
        practice with time markers.'
      exercises:
      - name: Be Insertion Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with the be going to structure where be is
          missing. Students insert the correct form of be (am/is/are).
        duration: 15
      - name: Present to Future Conversion
        type: transformation
        description: Give 10 Portuguese-style present tense sentences with future time
          markers (e.g., I travel tomorrow). Students rewrite using be going to.
        duration: 15
      - name: Ir to Be Going To Translation
        type: translation
        description: Provide 15 Portuguese sentences using ir + infinitivo. Students
          translate into English using be going to.
        duration: 15
