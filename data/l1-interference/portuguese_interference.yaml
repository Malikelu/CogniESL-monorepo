    notes: "One of the most basic and persistent errors. Portuguese forms questions by intonation alone (no auxiliary, no inversion). English requires do-support and subject-auxiliary inversion. Two core patterns: (1) do/does omission in yes/no questions, (2) do/does omission in wh-questions. Both stem from the same L1 prosodic strategy for interrogatives."
