    notes: 'Portuguese has no grammaticalized future continuous. Three L1 strategies
      transfer — 1) present tense + future marker, 2) present continuous + future
      marker, 3) ir + infinitive (go + infinitive). All three lead to underuse of
      English will be + -ing. Documented in Swan & Smith (2001) and Azevedo (1996).

      '
