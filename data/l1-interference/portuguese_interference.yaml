  modals:
    interference_patterns:
    - pattern: Use of 'can' for permission where 'may' is formal
      example_portuguese: Posso entrar?
      example_gloss: Can I come in?
      example_wrong: Can I come in?
      example_correct: May I come in?
      explanation: Portuguese 'poder' covers both informal and formal permission.
        English uses 'can' (informal) and 'may' (formal) for permission.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of 'must' for obligation where 'have to' is more common
      example_portuguese: Eu devo estudar.
      example_gloss: I must study.
      example_wrong: I must study.
      example_correct: I have to study.
      explanation: Portuguese 'dever' covers both strong obligation and recommendation.
        English 'must' is strong; 'have to' is more common for general obligation.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''Can I come in?'' (formal) Correct: ''May I come in?'''
    - 'Wrong: ''I must study.'' (general obligation) Correct: ''I have to study.'''
    why_it_happens: Portuguese modal verbs (poder, dever, ter que) do not map one-to-one
      onto English modals (can, could, may, might, must, have to, should). Portuguese
      'poder' covers 'can, could, may, might.' Portuguese 'dever' covers 'must, should,
      ought to.' Portuguese 'ter que' covers 'have to.' Portuguese speakers must learn
      the English modal system from scratch.
    teacher_tips:
      how_to_explain: 'Create a modal verb chart showing Portuguese-English mappings.
        Highlight the major differences: ''poder'' = can/could/may/might; ''dever''
        = must/should; ''ter que'' = have to.'
      where_to_start: 'Begin with the most common modals: can, must, should, have
        to.'
      sequencing: 'Week 1: Ability (can/could). Week 2: Permission (can/may). Week
        3: Obligation (must/have to/should). Week 4: Possibility (may/might/could).'
      exercises:
      - name: Modal Verb Decision
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose the correct modal
          verb.
        duration: 15
      - name: Modal Translation
        type: translation
        description: Give 10 Portuguese sentences with 'poder,' 'dever,' 'ter que.'
          Students translate using English modals.
        duration: 15
