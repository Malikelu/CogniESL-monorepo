  generic_pronouns:
    interference_patterns:
    - pattern: Use of 'a gente' transferred as 'the people' instead of 'we'
      example_portuguese: A gente vai ao cinema.
      example_gloss: The people goes to-the cinema.
      example_wrong: The people goes to the cinema.
      example_correct: We go to the cinema.
      explanation: Portuguese 'a gente' (the people) is an informal first-person plural
        pronoun that takes a third-person singular verb. English uses 'we' with a
        plural verb.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Use of 'voce/voces' with wrong verb form
      example_portuguese: Voce trabalha muito.
      example_gloss: You work much.
      example_wrong: You works a lot.
      example_correct: You work a lot.
      explanation: Portuguese 'voce' takes a third-person singular verb form. English
        'you' takes the base verb form regardless of formality.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''The people goes to the cinema.'' Correct: ''We go to the cinema.'''
    - 'Wrong: ''You works a lot.'' Correct: ''You work a lot.'''
    why_it_happens: Portuguese 'a gente' is a colloquial first-person plural pronoun
      that literally means 'the people' but functions as 'we.' It takes a third-person
      singular verb (a gente vai = the people goes). English speakers use 'we' with
      a plural verb (we go). Portuguese speakers may transfer the literal meaning
      and produce 'the people goes.' Additionally, Portuguese 'voce' (formal you)
      takes a third-person verb form, which can transfer to English as 'you works.'
    teacher_tips:
      how_to_explain: 'Explain that ''a gente'' = ''we'' in Portuguese, not ''the
        people.'' The verb form changes: ''a gente vai'' (third person) becomes ''we
        go'' (first person plural). For ''voce,'' explain that English ''you'' always
        takes the base verb form.'
      where_to_start: Begin with 'a gente' vs 'we.' Write 'A gente vai ao cinema'
        and show that English says 'We go to the cinema.'
      sequencing: 'Week 1: ''a gente'' = ''we.'' Week 2: ''voce/voces'' = ''you.''
        Week 3: Subject-verb agreement with ''you.'' Week 4: Mixed practice.'
      exercises:
      - name: A Gente Translation
        type: translation
        description: Give 10 Portuguese sentences with 'a gente.' Students translate
          using 'we.'
        duration: 15
      - name: You Verb Form Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with 'you.' Students choose the correct
          verb form.
        duration: 10
