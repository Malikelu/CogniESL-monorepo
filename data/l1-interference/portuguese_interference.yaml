  have_got:
    interference_patterns:
    - pattern: Use of 'have got' for possession where 'have' is standard
      example_portuguese: Eu tenho um carro.
      example_gloss: I have a car.
      example_wrong: I have got a car.
      example_correct: I have a car.
      explanation: Portuguese 'ter' is the standard verb for possession. English 'have
        got' is informal British English; 'have' is standard.
      frequency: 2
      persistence: 1
      communicative_impact: 1
    - pattern: Use of 'have got' for obligation where 'have to' is required
      example_portuguese: Eu tenho que trabalhar.
      example_gloss: I have that work.
      example_wrong: I have got work.
      example_correct: I have to work.
      explanation: Portuguese 'ter que' expresses obligation (have to). English 'have
        got' does not express obligation — 'have to' does. Portuguese speakers map
        'ter que' onto 'have got' because both contain 'have', producing 'I have got
        work' instead of 'I have to work.'
      frequency: 3
      persistence: 2
      communicative_impact: 3
    examples:
    - 'Wrong: ''I have got a car.'' (American English) Correct: ''I have a car.'''
    - 'Wrong: ''I have got work tomorrow.'' (obligation) Correct: ''I have to work
      tomorrow.'''
    why_it_happens: Portuguese 'ter' is the standard verb for possession. English
      'have got' is informal British English; 'have' is standard in American English.
      Portuguese speakers may overuse 'have got.' Additionally, Portuguese 'ter que'
      (to have to) expresses obligation. English 'have got' does NOT express obligation
      — 'have to' does. Portuguese speakers may confuse the two because both contain
      'have', mapping 'ter que' onto 'have got' instead of 'have to.'
    teacher_tips:
      how_to_explain: Teach 'have' as the standard form for possession. 'Have got'
        is informal British English. For obligation, teach 'have to' — NOT 'have got.'
        Write 'Eu tenho que trabalhar' and show it maps to 'I have to work,' NOT 'I
        have got work.'
      where_to_start: Begin with 'I have' for possession. Then teach 'have to' for
        obligation as a separate structure.
      sequencing: 'Week 1: ''Have'' for possession. Week 2: ''Have got'' as informal
        alternative. Week 3: ''Have to'' for obligation (contrast with ''have got'').
        Week 4: Mixed practice distinguishing possession vs. obligation.'
      exercises:
      - name: Have vs Have Got Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students choose between 'have' and 'have
          got.'
        duration: 10
      - name: Possession or Obligation Sort
        type: transformation
        description: 'Give 12 Portuguese sentences: 6 with ''ter'' (possession) and
          6 with ''ter que'' (obligation). Students translate each into English using
          ''have'' or ''have to'' — never ''have got'' for obligation.'
        duration: 15
