  both_either_neither:
    interference_patterns:
    - Portuguese allows and requires negative concord — double/multiple negation is grammatical and obligatory in Portuguese
      (e.g. 'Não sei nada' = 'I don't know nothing', 'Ninguém nunca veio' = 'Nobody never came', 'Não quero nenhum' = 'I don't
      want neither'). Portuguese speakers transfer this pattern to English, producing errors like 'I don't want neither',
      'I don't know nothing', 'Nobody never told me', and 'I don't have no money'. The Portuguese negative system uses 'não'
      (verbal negation) + 'nenhum/nada/nunca/nem' (negative words) together as a single negation unit, whereas English treats
      each negative word as an independent negation and requires 'not...any/ever/anyone' instead of 'not...nothing/never/nobody'.
    - Portuguese 'nem...nem' (neither...nor) is used more broadly than English 'neither...nor'. Portuguese 'nem' can function
      as a standalone adverb meaning 'not even' or 'neither' ('Nem eu sei' = 'Not even I know' / 'Neither do I'), and it participates
      in negative concord ('Não sei nem quem fez' = 'I don't know neither who did it'). Portuguese speakers produce errors
      like 'I don't know neither who did it', 'Neither I can go' (from 'Nem eu posso ir'), and 'I want neither this nor that'
      (hypercorrect formal register from overgeneralizing the 'neither...nor' pattern they learned in textbooks). The standalone
      'nem' as 'not even' transfers as 'I don't neither understand' where English requires 'I don't even understand'.
    - Portuguese 'ambos' (both) is used more freely as a pronoun and determiner than English 'both'. Portuguese 'Ambos querem
      ir' (Both want to go) and 'Os dois querem ir' (The two want to go) are both natural, but English 'Both want to go' sounds
      formal and many contexts require 'They both want to go' or 'Both of them want to go'. Portuguese speakers overuse sentence-initial
      'Both' ('Both are good' for 'They are both good'), omit required 'of' ('Both the students' instead of 'Both of the students'
      or 'Both students'), and use 'both' where English requires 'each' or 'together' ('We both went to the store' when meaning
      'We each went to the store' — from Portuguese 'Nós dois fomos à loja' which is ambiguous between both/together).
    - Portuguese 'ou...ou' (either...or) maps structurally to English 'either...or' but Portuguese allows 'ou' to appear only
      once in contexts where English requires the paired correlative ('Ou você sai ou eu saio' = 'Either you leave or I leave').
      Portuguese speakers omit 'either' and produce 'Or you leave or I leave', or place 'either' incorrectly ('You either
      leave or I leave'). Additionally, Portuguese 'ou' can mean 'or' in inclusive contexts where English strongly prefers
      'and/or' or restructures, leading to ambiguity errors in formal writing.
    why_it_happens: Portuguese has a fundamentally different negation system from English. Portuguese is a negative concord
      language where multiple negative elements reinforce rather than cancel each other — 'Não vi ninguém' (I saw nobody /
      I didn't see anybody) is the standard form, and 'Não vi alguém' (with a positive indefinite) is ungrammatical in most
      dialects. English is a negative polarity language where 'not' combines with 'any-/ever-/no-' series but each negative
      word carries its own negation force, making double negation logically positive. The Portuguese 'nem' system (neither/not
      even/nor) is more versatile than English 'neither...nor' and participates in negative concord, leading to 'don't...neither'
      errors. Portuguese 'ambos' is a high-frequency, unmarked pronoun/determiner whereas English 'both' is more restricted
      in position and requires 'of' in many contexts. These are deeply automatized L1 patterns acquired in early childhood
      and operating below conscious awareness, making them highly persistent even at advanced proficiency levels.
    teacher_tips:
      how_to_explain: Use a three-part contrastive chart. Part one — Portuguese negative concord (não + nada/ninguém/nunca/nem)
        becomes English negative polarity (not + anything/anybody/ever/neither). Show that Portuguese stacks negatives but
        English must use 'any-' words after 'not'. Part two — Portuguese nem...nem becomes English neither...nor, but emphasize
        that 'nem' alone means 'not even' and does NOT combine with 'não' in English. Part three — Portuguese ambos becomes
        English both, with position rules (both + noun, pronoun + both, both of + the/these/my + noun). For ou...ou to either...or,
        show the paired correlative structure.
      where_to_start: Start with negative concord since it is the most frequent, most persistent, and most communicatively
        damaging error. Use the 'count the negatives' test — in English, two negatives = positive (or at least very confusing),
        so 'I don't know nothing' logically means 'I know something'. Then move to nem...nem transfer, then both position,
        then either...or pairing.
      exercises:
      - name: Negative concord repair — double negation elimination
        type: error-correction
        description: Provide 20 sentences with Portuguese-style negative concord errors (e.g. 'I don't want nothing', 'Nobody
          never told me', 'I don't know neither', 'She doesn't have no time', 'We didn't see nobody'). Students must rewrite
          each sentence using correct English negative polarity (not...anything, nobody...ever, neither, etc.). Include a
          mix of 'nothing→anything', 'nobody→anybody', 'never→ever', 'neither→either' transformations.
        duration: 20
      - name: Portuguese-to-English negative translation
        type: drill
        description: Give 15 Portuguese sentences using negative concord (e.g. 'Não sei nada', 'Ninguém nunca veio', 'Não
          quero nenhum', 'Nem eu sei', 'Não conheço nem o pai nem a mãe'). Students translate each into correct English, consciously
          converting Portuguese negative concord to English negative polarity. Discuss why the literal translation sounds
          wrong in English.
        duration: 15
      - name: Both position and of-insertion drill
        type: drill
        description: Provide 15 gapped sentences where students must insert 'both' in the correct position or choose between
          'both + noun', 'pronoun + both', or 'both of + the/these/my + noun'. Include errors like 'Both are good' → 'They
          are both good', 'Both the students passed' → 'Both of the students passed' / 'Both students passed', 'We both went'
          (ambiguous) → 'We both went together' or 'We each went'.
        duration: 15
      - name: Either...or pairing and nem translation
        type: error-correction
        description: Provide 15 sentences with either...or and nem transfer errors (e.g. 'Or you leave or I leave', 'You either
          leave or I leave', 'I don't neither understand', 'Neither I can go', 'I want neither this nor that' in informal
          context). Students identify the error type and rewrite correctly. Include nem-as-'not-even' items ('Nem eu sei'
          → 'I don't even know' / 'Neither do I').
        duration: 15
      - name: Register and meaning choice — neither vs not either vs not even
        type: practice
        description: 'Give students 10 scenarios. For each, they write three versions. Version A uses ''neither...nor'' (formal
          correlative). Version B uses ''not...either'' (informal alternative). Version C uses ''not...even'' (for nem as
          ''not even''). Example scenario — ''You want to say that two people didn''t come to the party.'' Version A: ''Neither
          John nor Mary came to the party.'' Version B: ''John didn''t come to the party, and Mary didn''t either.'' Version
          C (for ''not even''): ''John didn''t even come to the party.'' Discuss register and meaning differences.'
        duration: 15
    examples:
    - 'Wrong: ''I don''t want neither.'' (Portuguese: ''Não quero nenhum.'' — negative concord with não + nenhum) Correct:
      ''I don''t want either.'' / ''I want neither.'''
    - 'Wrong: ''I don''t know nothing.'' (Portuguese: ''Não sei nada.'' — negative concord with não + nada) Correct: ''I don''t
      know anything.'' / ''I know nothing.'''
    - 'Wrong: ''Nobody never told me.'' (Portuguese: ''Ninguém nunca me disse.'' — negative concord with ninguém + nunca)
      Correct: ''Nobody ever told me.'' / ''No one ever told me.'''
    - 'Wrong: ''I don''t neither understand.'' (Portuguese: ''Não entendo nem.'' — nem as ''not even'' in negative concord)
      Correct: ''I don''t even understand.'' / ''Neither do I understand.'''
    - 'Wrong: ''Both are good options.'' (from Portuguese ''Ambos são boas opções.'' — sentence-initial ambos is natural in
      Portuguese) Correct: ''They are both good options.'' / ''Both of them are good options.'' (more natural in English)'
    - 'Wrong: ''Both the students passed.'' (from Portuguese ''Os dois alunos passaram.'' — no ''of'' required) Correct: ''Both
      of the students passed.'' / ''Both students passed.'''
    - 'Wrong: ''Or you leave or I leave.'' (from Portuguese ''Ou você sai ou eu saio.'' — ou appears twice, no ''either''
      equivalent) Correct: ''Either you leave or I leave.'''
    - 'Wrong: ''Neither I can go.'' (from Portuguese ''Nem eu posso ir.'' — standalone nem as sentence opener) Correct: ''Neither
      can I go.'' / ''I can''t go either.'' / ''Not even I can go.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents negative concord transfer errors including não + nada/nada/nenhum → don''t +
      nothing/anything, nem → neither/not even confusion, and ambos position/of-insertion errors).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on negation and indefinite
      pronouns — describes the Portuguese negative concord system with não, nada, ninguém, nunca, nenhum, and nem; explains
      the structural basis for L1 transfer to English negative polarity).'
