  definite_article:
    interference_patterns:
    - pattern: Overuse of the with possessive + body part
      example_portuguese: Eu machuquei o meu pe.
      example_gloss: I hurt the my foot.
      example_wrong: I hurt the my foot.
      example_correct: I hurt my foot.
      explanation: Portuguese uses definite articles before possessives with body
        parts. English uses the possessive alone.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Overuse of the with country names
      example_portuguese: O Canada e frio.
      example_gloss: The Canada is cold.
      example_wrong: The Canada is cold.
      example_correct: Canada is cold.
      explanation: Portuguese uses definite articles before many country names. English
        uses zero article.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Overuse of the with languages
