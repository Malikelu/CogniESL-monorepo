  verbs_not_usually_used_in_continuous_forms:
    interference_patterns:
    - pattern: Use of continuous form with stative verbs
      example_portuguese: Eu estou gostando de voce.
      example_gloss: I am liking you.
      example_wrong: I am liking you.
      example_correct: I like you.
      explanation: Portuguese uses continuous forms with stative verbs (gostar, saber,
        querer, precisar). English does not use continuous forms with stative verbs.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of continuous form with dual-meaning verbs (think, have, see, taste,
        feel)
      example_portuguese: Eu estou pensando que ele esta errado.
      example_gloss: I am thinking that he is wrong.
      example_wrong: I am thinking that he is wrong.
      example_correct: I think that he is wrong.
      explanation: Verbs like 'think,' 'have,' 'see,' 'taste,' and 'feel' can be stative
        or active in English. When used in their stative sense (opinion, possession,
        perception), they take the simple form. Portuguese uses the continuous form
        (estar + gerund) freely with these verbs regardless of meaning. Portuguese
        speakers transfer this pattern, producing 'I am thinking that...' (opinion)
        instead of 'I think that...', or 'I am having a car' (possession) instead
        of 'I have a car.' The continuous form is only correct when the verb expresses
        a deliberate action (e.g., 'I am thinking about the problem,' 'I am having
        lunch').
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am liking you.'' Correct: ''I like you.'''
    - 'Wrong: ''I am knowing the answer.'' Correct: ''I know the answer.'''
    - 'Wrong: ''She is having a car.'' Correct: ''She has a car.'''
    - 'Wrong: ''I am thinking that he is wrong.'' Correct: ''I think that he is wrong.'''
    - 'Wrong: ''I am tasting the soup.'' (stative) Correct: ''I taste the soup.''
      / (active) ''I am tasting the soup'' (deliberate action only)'
    why_it_happens: 'Portuguese uses the continuous form (estar + gerund) with many
      verbs that are stative in English: gostar (like), saber (know), querer (want),
      precisar (need), ter (have), pertencer (belong), conter (contain), consistir
      (consist), parecer (seem). English restricts the continuous form to action verbs.
      Additionally, some verbs (think, have, see, taste, feel) can be both stative
      and active in English, but Portuguese speakers tend to use the continuous form
      even when the stative meaning is intended, because Portuguese does not distinguish
      stative vs. active through verb form in the same way. This is a well-documented
      contrastive difference between Portuguese and English aspectual systems.'
    teacher_tips:
      how_to_explain: 'Create a list of stative verbs that cannot be used in continuous
        form: like, love, hate, know, believe, understand, want, need, prefer, remember,
        forget, belong, contain, consist, seem, appear, own, possess. Drill: ''I like''
        (not ''I am liking''), ''I know'' (not ''I am knowing''). Then introduce dual-meaning
        verbs: ''I think it''s great'' (opinion = simple) vs. ''I am thinking about
        the problem'' (action = continuous). ''I have a car'' (possession = simple)
        vs. ''I am having lunch'' (action = continuous).'
      where_to_start: 'Begin with the most common stative verb errors: like, know,
        want, have.'
      sequencing: 'Week 1: Pure stative verbs (no continuous). Week 2: Action verbs
        (can use continuous). Week 3: Dual-meaning verbs (think, have, see, taste,
        feel) — stative vs. active distinction. Week 4: Mixed practice.'
      exercises:
      - name: Stative Verb Error Correction
        type: error-correction
        description: Provide 15 sentences with stative verbs in continuous form. Students
          correct them.
        duration: 15
      - name: Stative vs Active Decision
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between simple and continuous
          forms.
        duration: 15
      - name: Dual-Meaning Verb Classification
        type: matching
        description: Give 20 sentences with dual-meaning verbs (think, have, see,
          taste, feel). Students classify each as stative (simple form) or active
          (continuous form) and explain the meaning difference.
        duration: 20
