  subjunctive_mood:
    interference_patterns:
    - pattern: Use of indicative in subjunctive contexts
      example_portuguese: Eu duvido que ele venha.
      example_gloss: I doubt that he comes.
      example_wrong: I doubt that he comes.
      example_correct: I doubt that he will come. / I doubt that he is coming.
      explanation: Portuguese uses the subjunctive after expressions of doubt. English
        uses the indicative or a future/continuous form.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of infinitive after suggest/recommend/insist instead of base form
        subjunctive
      example_portuguese: Eu sugiro que ele va ao medico.
      example_gloss: I suggest that he go to the doctor.
      example_wrong: I suggest him to go to the doctor.
      example_correct: I suggest that he go to the doctor.
      explanation: Portuguese uses the subjunctive after verbs of suggestion and recommendation
        (eu sugiro que ele va). English uses the base form subjunctive (mandative subjunctive)
        or 'should + infinitive'. Portuguese speakers may transfer the infinitive construction
        from other complement patterns, producing 'suggest him to go' instead of 'suggest
        that he go'.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'was' instead of 'were' in counterfactual and wish clauses
      example_portuguese: Se eu fosse rico, eu viajaria.
      example_gloss: If I were rich, I would travel.
      example_wrong: If I was rich, I would travel.
      example_correct: If I were rich, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (fosse) in counterfactual
        conditionals. English uses 'were' for all persons (past subjunctive). Portuguese
        speakers may use 'was' (indicative) instead of 'were' (subjunctive) because
        Portuguese does not distinguish indicative and subjunctive forms of 'to be'
        in the same way.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I doubt that he comes.'' Correct: ''I doubt that he will come.'''
    - 'Wrong: ''I suggest him to go.'' Correct: ''I suggest that he go.'' or ''I suggest
      he should go.'''
    - 'Wrong: ''If I was rich, I would travel.'' Correct: ''If I were rich, I would
      travel.'''
    why_it_happens: "Portuguese has a fully productive subjunctive mood (present, imperfect, future) that maps onto English's vestigial subjunctive. Three key interference areas documented in Swan & Smith (2001) and Azevedo (1996): (1) Portuguese uses the subjunctive after doubt/denial expressions where English uses the indicative or future; (2) Portuguese uses the subjunctive after suggestion/recommendation verbs where English uses the base form subjunctive or 'should + infinitive'; (3) Portuguese uses the imperfect subjunctive in counterfactuals where English uses 'were' for all persons. Portuguese speakers transfer these patterns, producing errors in all three areas."
    teacher_tips:
      how_to_explain: 'Teach three key areas: (1) After doubt, use indicative/future,
        not subjunctive. (2) After suggest/recommend/insist, use base form (no -s, no
        to) or ''should + infinitive''. (3) In counterfactuals and wishes, use ''were''
        for all persons, not ''was''.'
      where_to_start: 'Begin with the mandative subjunctive (suggest/recommend + base
        form) since it is the most frequent error. Then move to counterfactual ''were''.
        Finally address doubt expressions.'
      sequencing: 'Week 1: Mandative subjunctive (suggest/recommend + base form). Week
        2: Counterfactual ''were'' for all persons. Week 3: Doubt expressions with
        indicative. Week 4: Mixed practice across all three areas.'
      exercises:
      - name: Subjunctive Mood Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students use the correct form after doubt
          expressions.
        duration: 15
      - name: Mandative Subjunctive Transformation
        type: sentence-rewrite
        description: Give 10 sentences using 'suggest him to do' or 'suggest that he
          does'. Students rewrite using the base form subjunctive or 'should + infinitive'.
        duration: 15
      - name: Were vs Was Counterfactual Drill
        type: error-correction
        description: Provide 12 counterfactual conditional and wish sentences using
          'was'. Students correct to 'were' and explain why.
        duration: 15
