  future_perfect_continuous:
    interference_patterns:
    - pattern: Use of present continuous where English requires future perfect continuous
      example_portuguese: Eu estou trabalhando ha 3 anos.
      example_gloss: I am working has 3 years.
      example_wrong: I am working for 3 years.
      example_correct: I will have been working for 3 years.
      explanation: Portuguese uses the present continuous with a duration marker (ha
        X anos = for X years) to express an action that started in the past and continues.
        English requires the future perfect continuous (will have been + -ing) when
        projecting that duration forward to a specific future reference point. Portuguese
        speakers transfer the present continuous + duration pattern directly, producing
        "I am working for 3 years" instead of "I will have been working for 3 years
        (by then)."
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Use of simple future (ir + infinitive) where English requires future
        perfect continuous
      example_portuguese: Eu vou trabalhar aqui ha 5 anos em 2027.
      example_gloss: I go to work here has 5 years in 2027.
      example_wrong: I will work here for 5 years in 2027.
      example_correct: I will have been working here for 5 years in 2027.
      explanation: 'Portuguese uses the periphrastic future (ir + infinitive: vou
        trabalhar = I am going to work / I will work) to express future actions. When
        combined with a duration marker (ha 5 anos), Portuguese speakers transfer
        this structure directly into English as "I will work here for 5 years in 2027."
        English requires the future perfect continuous to express an action that will
        have been ongoing for a duration up to a specific future point. The Portuguese
        simple future does not grammatically distinguish between simple completion
        and ongoing duration in the same way English does.'
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I am working for 3 years.'' Correct: ''I will have been working for
      3 years (by then).'''
    - 'Wrong: ''I will work here for 5 years in 2027.'' Correct: ''I will have been
      working here for 5 years in 2027.'''
    why_it_happens: 'Portuguese lacks a direct equivalent of the future perfect continuous
      (will have been + -ing). To express ongoing actions projected into the future,
      Portuguese uses two structures that both transfer incorrectly to English. (1)
      The present continuous with a duration marker (estou trabalhando ha X anos =
      I have been working for X years / I am working for X years) is used for actions
      continuing from past to present, but Portuguese speakers extend this to future
      reference points. (2) The periphrastic future (ir + infinitive: vou trabalhar
      = I will work) is used for future actions but does not grammatically encode
      the "ongoing duration up to a future point" meaning that the future perfect
      continuous encodes in English. Both patterns are documented in contrastive analyses
      of Romance vs. Germanic tense-aspect systems (Swan & Smith, 2001; Azevedo, 1996).
      Portuguese speakers must learn that English grammaticizes the distinction between
      "will work" (simple future) and "will have been working" (future perfect continuous)
      — a distinction that does not exist in Portuguese verb morphology.'
    teacher_tips:
      how_to_explain: 'Teach the future perfect continuous as ''will have been + -ing''
        for actions continuing up to a future time. Emphasize the three-part structure:
        WILL + HAVE + BEING + -ING. Contrast with simple future (''I will work'')
        and present perfect continuous (''I have been working''). Use a timeline drawn
        on the board showing past → now → future reference point, with the action
        as a continuous line extending to the future point.'
      where_to_start: 'Begin with simple examples: ''By next year, I will have been
        working here for 5 years.'' Draw timelines. Then contrast with the wrong forms:
        ''I am working for 5 years'' and ''I will work for 5 years.'' Show why neither
        captures the intended meaning.'
      sequencing: 'Week 1: Future perfect continuous structure and timeline diagrams.
        Week 2: Contrast with simple future and present perfect continuous. Week 3:
        Practice with "by + future time" markers. Week 4: Mixed practice and error
        correction.'
      exercises:
      - name: Future Perfect Continuous Drill
        type: fill-in-the-blank
        description: Provide 10 sentences with future time markers (by next year,
          by 2027, by the time). Students use future perfect continuous.
        duration: 15
      - name: Future Tense Discrimination
        type: error-correction
        description: Provide 12 sentences mixing simple future, present continuous,
          and future perfect continuous errors. Students identify which tense is correct
          and rewrite the sentence. Focus on distinguishing "I will work for 5 years"
          from "I will have been working for 5 years."
        duration: 20
