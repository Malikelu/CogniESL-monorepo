  future_continuous:
    interference_patterns:
    - pattern: Use of present tense with future time marker instead of future continuous
      example_portuguese: Amanha eu trabalho.
      example_gloss: Tomorrow I work.
      example_wrong: Tomorrow I work.
      example_correct: Tomorrow I will be working.
      explanation: Portuguese uses the simple present tense with a future time marker
        (amanha, na proxima semana) for planned future events. English requires a
        future form — either 'will be + -ing' (future continuous) or 'be going to
        + infinitive.' Portuguese speakers transfer the present-tense + future-marker
        pattern directly, producing 'Tomorrow I work' instead of 'Tomorrow I will
        be working.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of present continuous with future time marker instead of future
        continuous
      example_portuguese: Amanha eu estou trabalhando.
      example_gloss: Tomorrow I am working.
      example_wrong: Tomorrow I am working.
      example_correct: Tomorrow I will be working.
      explanation: Portuguese uses the present continuous (estar + -ando/-endo) with
        a future time marker to express planned future actions. English present continuous
        can express future arrangements (e.g., 'I am working tomorrow'), but for actions
        in progress at a specific future time, English requires 'will be + -ing.'
        Portuguese speakers overgeneralize the present continuous + future marker
        pattern, producing 'Tomorrow I am working' when the intended meaning is 'Tomorrow
        at 3pm I will be working' (action in progress at a specific future moment).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'ir + infinitive' transferred as 'go + infinitive' instead of
        future continuous
      example_portuguese: Eu vou trabalhar amanha.
      example_gloss: I go to work tomorrow.
      example_wrong: I go to work tomorrow.
      example_correct: I will be working tomorrow.
      explanation: Portuguese 'ir + infinitivo' (ir trabalhar = to go to work) is
        the default future construction. Portuguese speakers may transfer this literally
        as 'I go to work tomorrow' or 'I am going to work tomorrow,' missing the future
        continuous form 'will be working' which emphasizes an action in progress at
        a specific future time. The Portuguese 'ir' future does not grammatically
        distinguish between simple future and future continuous, leading to underuse
        of the English future continuous form.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''Tomorrow I work.'' Correct: ''Tomorrow I will be working.'''
    - 'Wrong: ''Tomorrow I am working.'' Correct: ''Tomorrow at 3pm I will be working.'''
    - 'Wrong: ''I go to work tomorrow.'' Correct: ''I will be working tomorrow.'''
    - 'Wrong: ''This time next week I travel.'' Correct: ''This time next week I will
      be traveling.'''
    - 'Wrong: ''At 8pm I eat dinner.'' Correct: ''At 8pm I will be eating dinner.'''
    why_it_happens: 'Portuguese has no grammaticalized future continuous form equivalent
      to English ''will be + -ing.'' Portuguese expresses future meaning through three
      main structures: (1) simple present + future time marker (Amanha eu trabalho
      = Tomorrow I work), (2) present continuous + future time marker (Amanha eu estou
      trabalhando = Tomorrow I am working), and (3) ir + infinitivo (Eu vou trabalhar
      = I go to work / I will work). None of these map onto the English future continuous,
      which specifically marks an action in progress at a defined future moment. Portuguese
      speakers transfer whichever L1 future strategy is most salient, producing three
      distinct error types. The absence of a grammaticalized progressive-aspect-in-future
      construction in Portuguese is the root cause, documented in contrastive analyses
      of Romance vs. Germanic tense-aspect systems (Swan & Smith, 2001; Azevedo, 1996).
      Additionally, Portuguese ''estar a + infinitivo'' (estou a trabalhar = I am
      working), the European Portuguese progressive construction, does not extend
      to future reference the way English ''will be + -ing'' does, further contributing
      to underuse of the future continuous form.'
    teacher_tips:
      how_to_explain: 'Draw a timeline on the board. Mark a specific future time (e.g.,
        ''At 3pm tomorrow''). Draw a bar extending before and after that point to
        show the action is IN PROGRESS at that moment. Contrast: ''I will work at
        3pm'' (starts at 3pm) vs. ''I will be working at 3pm'' (already in progress
        at 3pm). Show that Portuguese uses the present tense or ''ir + infinitive''
        for both meanings, but English needs ''will be + -ing'' for the in-progress
        meaning.'
      where_to_start: 'Begin with specific future time expressions: ''At 8pm tonight,''
        ''This time tomorrow,'' ''At noon on Saturday.'' Have students describe what
        they will be doing at those exact moments. Contrast with Portuguese: ''As
        8h eu trabalho'' (present) vs. English ''At 8pm I will be working.'''
      sequencing: 'Week 1: Future continuous affirmative (will be + -ing) with specific
        future time markers. Week 2: Contrast future continuous vs. future simple
        (will + infinitive) — action in progress vs. single action. Week 3: Contrast
        future continuous vs. present continuous for future arrangements. Week 4:
        Portuguese L1 transfer — present tense + future marker vs. future continuous.
        Week 5: Mixed practice with error correction.'
      exercises:
      - name: Future Continuous Timeline Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with specific future time markers (At 8pm,
          This time tomorrow, When you arrive). Students fill in 'will be + verb-ing.'
          Include a timeline visual for each item.
        duration: 15
      - name: Present vs Future Continuous Contrast
        type: sentence-rewrite
        description: Give 10 Portuguese sentences using present tense or present continuous
          with future time markers. Students rewrite each using the correct English
          future continuous form, then explain the difference in meaning.
        duration: 15
      - name: Future Continuous Error Correction
        type: error-correction
        description: Provide 15 sentences with Portuguese-influenced future continuous
          errors (present tense for future, 'go + infinitive' for future continuous,
          present continuous for future-in-progress). Students identify and correct
          each error.
        duration: 15
      - name: This Time Tomorrow Composition
        type: composition
        description: Students write a paragraph describing what they will be doing
          at three specific future times (e.g., 'This time tomorrow, I will be...
          At 8pm on Saturday, I will be... When you read this, I will be...'). Emphasize
          actions in progress at specific future moments.
        duration: 15
