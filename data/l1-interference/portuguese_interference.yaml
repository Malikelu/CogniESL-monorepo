  definite_article:
    interference_patterns:
    - pattern: Overuse of the with possessive + body part
      example_portuguese: Eu machuquei o meu pe.
      example_gloss: I hurt the my foot.
      example_wrong: I hurt the my foot.
      example_correct: I hurt my foot.
      explanation: Portuguese uses definite articles before possessives with body
        parts. English uses the possessive alone.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Overuse of the with country names
      example_portuguese: O Canada e frio.
      example_gloss: The Canada is cold.
      example_wrong: The Canada is cold.
      example_correct: Canada is cold.
      explanation: Portuguese uses definite articles before many country names. English
        uses zero article.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Overuse of the with languages
      example_portuguese: Eu falo o ingles.
      example_gloss: I speak the English.
      example_wrong: I speak the English.
      example_correct: I speak English.
      explanation: Portuguese uses the definite article before language names. English
        uses zero article.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: I hurt the my foot. Correct: I hurt my foot.'
    - 'Wrong: The Canada is cold. Correct: Canada is cold.'
    - 'Wrong: I speak the English. Correct: I speak English.'
    why_it_happens: Portuguese grammar requires the definite article before possessive
      pronouns and with country and language names. English uses zero article in all
      these contexts.
    teacher_tips:
      how_to_explain: 'Create a rule card: In English, we do NOT use the before: (1)
        possessives, (2) most country names, (3) language names.'
      where_to_start: Begin with body parts. Touch your knee and say my knee, not
        the my knee.
      sequencing: 'Week 1: Possessives and body parts. Week 2: Country names. Week
        3: Language names. Week 4: Review.'
      exercises:
      - name: Possessive Article Deletion
        type: error-correction
        description: Provide 15 sentences with the before possessives. Students remove
          it.
        duration: 15
      - name: Map Description
        type: oral-drill
        description: Students describe a map, naming countries and languages.
        duration: 10
