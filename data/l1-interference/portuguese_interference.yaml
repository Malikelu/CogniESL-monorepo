  wish_if_only_past:
    interference_patterns:
    - pattern: Use of past simple where past perfect is needed after wish
      example_portuguese: Eu queria ter estudado mais.
      example_gloss: I wanted to have studied more.
      example_wrong: I wish I studied more when I was in school.
      example_correct: I wish I had studied more when I was in school.
      explanation: Portuguese expresses past regrets using the conditional perfect
        (ter + past participle) or the imperfect tense with an infinitive complement
        (eu queria ter estudado). English requires wish + past perfect (had + past
        participle) for counterfactual past situations. Portuguese speakers often
        transfer the simpler past tense structure and produce "I wish I studied"
        instead of "I wish I had studied," because the Portuguese imperfect (estudava)
        maps superficially onto English past simple.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of present tense after if only for past counterfactuals
      example_portuguese: Se eu tivesse mais tempo, eu viajava.
      example_gloss: If I had more time, I would travel.
      example_wrong: If only I have more time, I would travel.
      example_correct: If only I had more time, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (tivesse) in
        counterfactual conditional clauses, which does not have a direct English
        equivalent. Portuguese speakers may transfer the present tense form or
        confuse the subjunctive with the indicative, producing "if only I have"
        instead of "if only I had." Additionally, the Portuguese conditional
        (viajava = I would travel) is structurally similar to English "would +
        verb," which reinforces the error in the if-clause by analogy with
        present/future unreal conditionals.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: I wish I studied more when I was young. Correct: I wish I had studied
      more when I was young.'
    - 'Wrong: If only I have more time. Correct: If only I had more time.'
    - 'Wrong: I wish I knew the answer yesterday. Correct: I wish I had known the
      answer yesterday.'
    - 'Wrong: If only she was here last week. Correct: If only she had been here
      last week.'
    why_it_happens: 'Portuguese and English handle past counterfactuals with
      fundamentally different grammatical machinery. Portuguese uses the
      conditional perfect (ter + past participle in the conditional) or the
      imperfect subjunctive (se eu tivesse) for unreal past situations. English
      uses a two-part system — wish/if only + past perfect for past regrets, and
      wish/if only + past simple for present/future unreal situations. Portuguese
      speakers face a mapping problem because (1) Portuguese does not have a
      distinct past perfect form that maps neatly onto English "had + p.p." —
      the Portuguese pluperfect (estudara) is literary and rarely used in speech,
      so speakers default to the imperfect (estudava), which looks like English
      past simple; (2) the Portuguese subjunctive system (se eu tivesse, se eu
      fosse) does not distinguish between present and past counterfactuals as
      English does, leading to overuse of present tense forms after wish/if only;
      (3) the Portuguese conditional (eu teria estudado) is a single-word
      inflected form, while English uses the multi-word "would have + p.p.,"
      creating a structural asymmetry that causes omission of "had." These
      patterns are documented in Swan & Smith (2001) for Portuguese-speaking
      learners and in Azevedo (1996) for Portuguese grammar description.'
    teacher_tips:
      how_to_explain: 'Draw a timeline on the board. Mark NOW and a point in the
        PAST. Say: "I want to change the past. I can''t. So I use WISH + PAST
        PERFECT." Write: "I wish I had studied more." Contrast with: "I wish I
        studied more" (this sounds like a present habit, not a past regret). For
        "if only," explain it works the same way: "If only I had more time" (now)
        vs. "If only I had had more time" (past). Use the Portuguese "se eu
        tivesse" as a bridge: "tivesse looks like past, but in English we need
        HAD + past participle for past meaning."'
      where_to_start: Begin with wish + past perfect for common life regrets
        (studied more, saved money, learned English earlier). These are personally
        relevant and easy to contextualize.
      sequencing: 'Week 1: Wish + past perfect for past regrets (life experiences).
        Week 2: If only + past perfect for past regrets (emphatic form). Week 3:
        Contrast wish + past simple (present) vs. wish + past perfect (past). Week
        4: Mixed practice with error correction. Week 5: Production tasks (write
        a paragraph about regrets).'
      exercises:
      - name: Wish Past Drill
        type: fill-in-the-blank
        description: Provide 15 sentences about past regrets. Students fill in
          the correct form of the verb (past perfect after wish/if only).
        duration: 15
      - name: Present vs Past Wish Sort
        type: sorting
        description: Give 20 wish/if only sentences. Students sort into "present
          regret" (wish + past simple) and "past regret" (wish + past perfect)
          and correct any errors.
        duration: 15
      - name: Regret Rewriting
        type: transformation
        description: Give 10 Portuguese sentences expressing past regrets (e.g.,
          "Eu queria ter viajado mais"). Students translate into English using
          wish/if only + past perfect.
        duration: 15
      - name: If Only Error Correction
        type: error-correction
        description: Provide a dialogue with 10 errors involving wish/if only with
          wrong tense. Students identify and correct each error.
        duration: 15
