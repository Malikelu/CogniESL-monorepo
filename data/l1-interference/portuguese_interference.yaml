  prepositional_phrases:
    interference_patterns:
    - pattern: Use of wrong preposition after adjectives in adjective + preposition collocations
      example_portuguese: Eu sou bom em matematica.
      example_gloss: I am good in math.
      example_wrong: I am good in math.
      example_correct: I am good at math.
      explanation: Portuguese uses 'em' (in) after 'ser bom' (to be good). English uses 'at' after 'good.' This is a systematic collocational mismatch between Portuguese and English adjective + preposition combinations.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of wrong preposition after verbs in verb + preposition collocations
      example_portuguese: Eu dependo de voce.
      example_gloss: I depend of you.
      example_wrong: I depend of you.
      example_correct: I depend on you.
      explanation: Portuguese 'depender de' (to depend of) uses the preposition 'de' (of). English 'depend' takes 'on.' Similarly, Portuguese 'sonhar com' (to dream with) becomes 'dream about' in English, and 'casar com' (to marry with) becomes 'marry' (no preposition). Portuguese speakers transfer the Portuguese preposition in verb + preposition collocations, producing errors like 'depend of,' 'dream with,' and 'marry with.' These mismatches are documented in Swan and Smith (2001) and Azevedo (1996) as systematic features of Portuguese-English prepositional divergence.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am good in math.'' Correct: ''I am good at math.'''
    - 'Wrong: ''I am interested for music.'' Correct: ''I am interested in music.'''
    - 'Wrong: ''I depend of you.'' Correct: ''I depend on you.'''
    - 'Wrong: ''She dreamed with her family.'' Correct: ''She dreamed about her family.'''
    why_it_happens: >-
      Portuguese and English use different prepositions in fixed adjective + preposition
      and verb + preposition collocations. Portuguese "bom em" maps to English "good at",
      "interessado em" maps to "interested in" (this one matches), but "responsavel por"
      maps to "responsible for". Similarly, Portuguese verbs take different prepositions
      than their English cognates: "depender de" uses "of" while English "depend" takes
      "on"; "sonhar com" uses "with" while English "dream" takes "about"; "casar com"
      uses "with" while English "marry" takes no preposition. These collocational
      mismatches are not predictable from meaning alone and must be learned as fixed
      chunks. Portuguese speakers systematically transfer the Portuguese preposition,
      producing errors that persist because the patterns are high-frequency and deeply
      ingrained. Documented in Swan and Smith (2001) and Azevedo (1996).
    teacher_tips:
      how_to_explain: 'Create a two-column list: Portuguese collocation vs. English collocation. Show that the preposition often differs even when the verb or adjective is a cognate. Drill the most common pairs: good at, interested in, afraid of, proud of, different from, responsible for, depend on, dream about, marry (no preposition).'
      where_to_start: Begin with 'good at' since it is the most frequent error. Then move to verb + preposition pairs.
      sequencing: 'Week 1: Adjective + preposition (good at, interested in, afraid of). Week 2: Verb + preposition (depend on, dream about, look for). Week 3: Noun + preposition (key to, reason for). Week 4: Mixed practice with error correction.'
      exercises:
      - name: Prepositional Phrase Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose the correct preposition.
        duration: 15
      - name: Collocation Match
        type: matching
        description: Give 20 Portuguese collocations (e.g., "bom em," "depender de," "sonhar com") and their English equivalents with prepositions. Students match each Portuguese collocation to its correct English counterpart, then write a sentence for each.
        duration: 20
