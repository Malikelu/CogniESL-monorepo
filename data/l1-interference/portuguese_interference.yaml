  i_wish_if_only: &id010
    interference_patterns:
    - pattern: Use of present tense after wish
      example_portuguese: Eu queria ser rico.
      example_gloss: I wanted to be rich.
      example_wrong: I wish I am rich.
      example_correct: I wish I were rich.
      explanation: Portuguese uses the conditional (queria) for present wishes. English
        uses wish + past simple (were for all persons). Portuguese speakers transfer
        the present/conditional mapping and use present tense after wish.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'would' after wish for self-referential wishes
      example_portuguese: Eu queria poder viajar.
      example_gloss: I wanted to be able to travel.
      example_wrong: I wish I would be able to travel.
      example_correct: I wish I could travel.
      explanation: Portuguese uses the conditional (queria poder) for self-referential
        wishes. English 'wish + would' is only used for desires about others' behavior
        or impersonal situations (I wish it would stop raining), never for oneself.
        Portuguese speakers transfer the conditional directly as 'would' and produce
        'I wish I would...' for self-wishes, which is ungrammatical in English.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: I wish I am rich. Correct: I wish I were rich.'
    - 'Wrong: I wish I would be happy. Correct: I wish I were happy.'
    - 'Wrong: I wish I would speak English fluently. Correct: I wish I could speak
      English fluently.'
    why_it_happens: "Portuguese uses the conditional mood (queria, poderia, gostaria) to express present wishes and desires. 'Eu queria ser rico' means 'I would like to be rich', 'Eu poderia viajar' means 'I could travel'. English uses a different system: wish + past simple for present unreal situations (I wish I were rich), wish + could for ability (I wish I could travel), and wish + would only for desires about others' actions or impersonal events (I wish you would listen, I wish it would rain). Portuguese speakers transfer the conditional directly, producing two error types: (1) present tense after wish ('I wish I am') because the Portuguese conditional maps to a present-time reference, and (2) 'would' after wish for self-referential desires ('I wish I would be') because Portuguese uses the same conditional form for both self and other references. The English restriction that 'wish + would' cannot refer to the subject's own state or ability has no parallel in Portuguese grammar."
    teacher_tips:
      how_to_explain: 'Write three columns on the board: WISH + PAST SIMPLE (states),
        WISH + COULD (ability), WISH + WOULD (others only). Show that Portuguese uses
        the same conditional form for all three, but English splits them. Drill: ''I
        wish I were...'' (not ''I wish I am''), ''I wish I could...'' (not ''I wish
        I would'' for self), ''I wish you would...'' (only for others).'
      where_to_start: Begin with present wishes about states (I wish I were...). Then
        move to ability wishes (I wish I could...). Finally teach the restriction on
        wish + would.
      sequencing: 'Week 1: Wish + past simple for states. Week 2: Wish + could for
        ability. Week 3: Wish + would for others (and the restriction). Week 4: If
        only as equivalent. Week 5: Mixed practice with error correction.'
      exercises:
      - name: Wish Drill
        type: fill-in-the-blank
        description: Provide 15 sentences about present wishes. Students fill in the
          correct verb form after wish (were, could, or appropriate past simple).
        duration: 15
      - name: Wish vs Would Sort
        type: error-correction
        description: Give 12 sentences with wish + would errors (self-referential).
          Students identify whether wish + would is correct. If not, they rewrite
          using could or past simple.
        duration: 15
