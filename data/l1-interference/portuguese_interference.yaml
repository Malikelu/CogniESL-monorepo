  used_to_would:
    interference_patterns:
    - pattern: Use of 'would' for past states where only 'used to' works
      example_portuguese: Eu tinha medo de escuro.
      example_gloss: I had fear of dark.
      example_wrong: I would be afraid of the dark.
      example_correct: I used to be afraid of the dark.
      explanation: Portuguese uses the imperfect past for both past habits and past
        states. English 'would' only works for past habits (repeated actions), not
        states. Portuguese speakers transfer the imperfect to 'would' even with stative
        verbs, producing errors like 'I would be tall as a child.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of 'used to' for repeated past actions where 'would' is preferred
      example_portuguese: Quando crianca, eu costumava brincar no parque todo dia.
      example_gloss: When a child, I used-to play in-the park every day.
      example_wrong: When I was a child, I used to play in the park every day.
      example_correct: When I was a child, I would play in the park every day.
      explanation: Portuguese 'costumar' (imperfective past habit) maps directly to
        'used to' but English distinguishes 'would' (repeated past actions, narrative
        flavor) from 'used to' (past states and habits). Portuguese speakers overgeneralize
        'used to' for all habitual past meanings, even in narrative contexts where
        'would' is the natural choice. This overgeneralization is documented in contrastive
        analyses of Romance vs. Germanic past-habitual marking.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I would be afraid of the dark.'' Correct: ''I used to be afraid of
      the dark.'''
    - 'Wrong: ''When I was young, I used to go fishing every Sunday.'' Correct: ''When
      I was young, I would go fishing every Sunday.'''
    why_it_happens: Portuguese uses the imperfect past (pretérito imperfeito) for
      both past habits and past states with a single verb form. English splits this
      into two constructions with different constraints. 'Would' only works for repeated
      past actions (not states), while 'used to' covers both actions and states. Portuguese
      speakers face a two-way mapping problem. They may use 'would' for past states
      (because the Portuguese imperfect covers states) and overuse 'used to' for repeated
      actions (because 'costumar' is their default habitual past marker). The result
      is bidirectional interference. Swan & Smith (2001) document this as a characteristic
      error for Romance-language speakers.
    teacher_tips:
      how_to_explain: 'Teach: ''would'' = repeated past actions only (I would play
        football every day). ''Used to'' = both actions and states (I used to play
        football / I used to be afraid). For storytelling about past routines, ''would''
        sounds more natural: ''Every summer, we would visit grandma.'' vs ''We used
        to visit grandma'' (habit, no narrative context).'
      where_to_start: 'Begin with past states: ''I used to be afraid, I used to live
        in Brazil.'' Then introduce ''would'' for narrative past habits: ''When I
        was young, I would ride my bike after school.'''
      sequencing: 'Week 1: ''Would'' for repeated past actions. Week 2: ''Used to''
        for past states. Week 3: ''Used to'' for both actions and states. Week 4:
        Choosing between ''would'' and ''used to'' in narrative vs. factual contexts.'
      exercises:
      - name: Would vs Used To Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between 'would' and 'used
          to' based on context (state vs. action, narrative vs. factual).
        duration: 15
      - name: Narrative Rewrite
        type: sentence-rewrite
        description: 'Give 10 factual statements about past habits. Students rewrite
          them as narrative memories using would. Example: I played football every
          day -> When I was young, I would play football every day.'
        duration: 15
