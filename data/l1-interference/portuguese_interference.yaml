  collocations:
    interference_patterns:
    - Portuguese speakers transfer verb-noun collocations directly from Portuguese, producing errors where the verb is
      lexically wrong in English but correct in Portuguese. The most documented pattern is tomar uma decisao transferred
      as 'take a decision' when English requires 'make a decision'; dar uma olhada transferred as 'give a look' when English
      requires 'take/have a look'; fazer uma pergunta transferred as 'make a question' when English requires 'ask a question';
      tomar conta transferred as 'take account' when English requires 'take care'; and dar atencao transferred as 'give attention'
      when English requires 'pay attention'. These errors are highly frequent because Portuguese verb-noun collocations
      are acquired early and function as single semantic units; learners retrieve the Portuguese chunk and translate
      word-by-word rather than accessing the English collocation as a unit.
    - Portuguese speakers produce adjective-noun and adverb-verb collocation errors by transferring Portuguese modifier-head
      pairings. Documented patterns include chuva forte transferred as 'strong rain' when English requires 'heavy rain';
      vento forte transferred as 'strong wind' when 'high wind' is more natural in some contexts; frio grande transferred
      as 'big cold' when English requires 'very cold' or 'freezing'; and comer rapido transferred as 'eat quick' when
      English requires 'eat quickly' or 'eat fast'. These errors persist because Portuguese adjective-noun pairings are
      often fixed expressions that do not map onto English equivalents on a word-by-word basis, and learners default to
      literal translation of each element.
    - Portuguese prepositional collocation transfer produces systematic errors in English. Portuguese depender de transferred
      as 'depend of' when English requires 'depend on'; sonhar com transferred as 'dream with' when English requires
      'dream about'; gostar de transferred as 'like from' or 'like of' when English requires 'like' or 'enjoy'; casar com
      transferred as 'marry with' when English requires 'marry' or 'get married to'; and chegar a transferred as 'arrive to'
      when English requires 'arrive at' or 'arrive in'. These errors are particularly persistent because Portuguese
      prepositional verbs are acquired as fixed units and the preposition is semantically motivated in Portuguese but
      arbitrary in English, making it difficult for learners to override the L1 prepositional choice.
    why_it_happens: Collocations are language-specific conventionalized word combinations that do not follow from general
      semantic or syntactic rules. Portuguese and English have different collocational systems because they lexicalize
      concepts differently - the same underlying meaning is packaged into different word combinations. For example, the
      concept of 'deciding' is lexicalized in Portuguese as 'tomar (take) + decisao (decision)' but in English as 'make
      + decision'. Portuguese speakers transfer L1 collocational patterns because (1) collocations are acquired as chunks
      in L1 and retrieved as units, (2) the semantic transparency of the Portuguese collocation (e.g., 'tomar' = to take,
      which is semantically plausible for 'making a decision') makes the transfer feel natural, and (3) English collocational
      knowledge requires extensive exposure to authentic input that most learners lack. The error is persistent because
      collocational competence is one of the last areas of L2 proficiency to develop, and because the L1 collocational
      system operates automatically below the level of conscious awareness. Research on Portuguese-English interlanguage
      consistently identifies collocation transfer as a major error source across all proficiency levels.
    teacher_tips:
      how_to_explain: >-
        Use a three-column contrastive chart for each error type. Column 1 is the Portuguese collocation, column 2 is the
        literal English transfer (wrong), and column 3 is the correct English collocation. Emphasize that collocations
        are ARBITRARY. There is no logical reason why English says 'make a decision' and not 'take a decision'; it is
        simply the conventional pairing. Teach collocations as CHUNKS, not as individual words. For prepositional
        collocations, explicitly teach that prepositions in collocations are arbitrary and must be memorized as part
        of the verb phrase.
      where_to_start: Start with the most frequent and communicatively damaging verb-noun collocation errors (make/take
        confusion from Portuguese 'tomar/fazer' transfer). Use a 'collocation dictionary' approach - give students a
        reference list of 50 high-frequency English collocations with their Portuguese equivalents. Then move to
        prepositional collocations, which are the most persistent. Finally, address adjective-noun and adverb-verb
        collocations.
      exercises:
      - name: Collocation matching - Portuguese to English
        type: practice
        description: 'Provide 20 Portuguese collocations (e.g., ''tomar uma decisao'', ''dar uma olhada'', ''fazer uma pergunta'',
          ''depender de'', ''sonhar com'', ''chuva forte''). Students must write the correct English collocation (make a decision,
          take/have a look, ask a question, depend on, dream about, heavy rain). Then use each in a sentence. Emphasize
          that the verb/adjective/preposition choice in English is arbitrary and must be memorized.'
        duration: 20
      - name: Error correction - collocation transfer
        type: error-correction
        description: 'Provide 20 sentences with Portuguese-to-English collocation transfer errors (e.g., ''She took a decision
          to leave'', ''He gave a look at the report'', ''I depend of my parents'', ''We arrived to the airport'', ''It was a
          strong rain yesterday''). Students identify the error type (verb-noun, prepositional, or adjective-noun) and
          correct each sentence. Discuss why the Portuguese collocation does not map onto English.'
        duration: 20
      - name: Collocation fill-in-the-blank with options
        type: drill
        description: 'Provide 25 gapped sentences where students must choose between two or three collocation options that
          differ only in the verb/adjective/preposition (e.g., ''She ___ a decision'' [made/took/do]; ''It depends ___ the
          weather'' [of/on/from]; ''It was ___ rain'' [heavy/strong/big]). Include distractors based on Portuguese transfer.
          Time pressure to build automaticity.'
        duration: 15
      - name: Portuguese-to-English collocation translation
        type: drill
        description: 'Give 15 Portuguese sentences rich in collocations (e.g., ''Ele tomou uma decisao importante'', ''Ela
          depende dos pais'', ''Choveu forte ontem'', ''Eu sonhei com voce''). Students translate each, focusing on correct
          English collocation choice rather than word-by-word translation. Discuss which collocations were difficult and
          why.'
        duration: 20
      - name: Collocation journal - authentic input collection
        type: practice
        description: 'Students keep a ''collocation journal'' for one week. Every time they encounter a new English collocation
          in reading, listening, or class, they record it with its Portuguese equivalent and a sample sentence. At the
          end of the week, they share their top 10 collocations with the class. This builds awareness that English
          collocations are arbitrary and must be learned as chunks.'
        duration: 10
    examples:
    - 'Wrong: ''She took a decision to leave the company.'' (Portuguese: ''Ela tomou uma decisao de sair da empresa.'' -
      tomar = take) Correct: ''She made a decision to leave the company.'''
    - 'Wrong: ''He gave a quick look at the report.'' (Portuguese: ''Ele deu uma olhada rapida no relatorio.'' - dar
      uma olhada = give a look) Correct: ''He took/had a quick look at the report.'''
    - 'Wrong: ''I depend of my parents for everything.'' (Portuguese: ''Eu dependo dos pais para tudo.'' - depender de
      = depend of) Correct: ''I depend on my parents for everything.'''
    - 'Wrong: ''We arrived to the airport at noon.'' (Portuguese: ''Chegamos ao aeroporto ao meio-dia.'' - chegar a
      = arrive to) Correct: ''We arrived at the airport at noon.'''
    - 'Wrong: ''It was a strong rain yesterday.'' (Portuguese: ''Choveu forte ontem.'' - chuva forte = strong rain)
      Correct: ''There was heavy rain yesterday.'' / ''It rained heavily yesterday.'''
    - 'Wrong: ''She made a question about the homework.'' (Portuguese: ''Ela fez uma pergunta sobre o dever.'' - fazer
      uma pergunta = make a question) Correct: ''She asked a question about the homework.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter - documents verb-noun collocation transfer errors including tomar/fazer -> take/make confusion,
      prepositional collocation transfer from Portuguese de/com/a -> English of/with/on, and adjective-noun collocation
      transfer such as forte -> strong where English requires heavy/high/thick).'
    - 'Nunes, M. (2003). Collocational transfer from Portuguese to English. In D. Ferreiro (Ed.), Revista do Centro de
      Linguistica da Universidade de Lisboa, 21, 183-202. (Documents systematic collocation transfer errors in Portuguese
      L2 English writing, including verb-noun, prepositional, and adjective-noun collocation types with error frequency data).'
    - 'Benson, M., Benson, E. & Ilson, R. (1986). The BBI Combinatory Dictionary of English: A Guide to Word Combinations.
      John Benjamins. (Reference work on English collocational patterns used as the contrastive baseline for identifying
      Portuguese-to-English collocation transfer errors).'
