    notes: 'Portuguese has 243 GPs total. This entry covers the collocations grammar point. Three independent sources:
      contrastive teaching reference (Swan & Smith 2001), Portuguese-specific collocation transfer study (Nunes 2003),
      and English collocational reference (Benson et al. 1986). Patterns cover (1) verb-noun collocation transfer
      (tomar/fazer -> take/make confusion), (2) adjective-noun and adverb-verb collocation transfer (forte -> strong
      vs. heavy/high), (3) prepositional collocation transfer (de -> of vs. on, com -> with vs. to, a -> to vs. at/in).
      Frequency is 5 (very high - collocation errors appear in virtually all Portuguese L2 English output) and persistence
