  collocations_advanced: *id019
  connotation:
    interference_patterns:
    - pattern: Use of 'skinny' for neutral/positive body description
      example_portuguese: Eu sou magro.
      example_gloss: I am thin.
      example_wrong: I am skinny.
      example_correct: I am thin.
      explanation: >
        Portuguese 'magro' is a neutral-to-positive descriptor for a slim person.
        English 'skinny' carries a negative connotation (too thin, unhealthy).
        Portuguese speakers transfer the neutral L1 connotation and produce 'I am skinny'
        when they mean the neutral 'I am thin.' The same applies to describing others:
        'She is skinny' sounds critical in English, while 'Ela e magra' is neutral
        or even complimentary in Portuguese.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'fat' in casual or affectionate contexts
      example_portuguese: Meu filho esta gordinho.
      example_gloss: My son is chubby.
      example_wrong: My son is fat.
      example_correct: My son is chubby.
      explanation: >
        Portuguese 'gordo/gordinho' can be used casually or affectionately,
        especially with the diminutive '-inho' (gordinho = chubby, pudgy). English
        'fat' is strongly negative and almost never used affectionately. Portuguese
        speakers transfer the casual L1 usage and produce sentences like 'He is fat'
        when describing a cute baby or in a friendly context, which sounds offensive
        or insulting in English. The appropriate English equivalents are 'chubby,'
        'plump,' or 'overweight' depending on context.
      frequency: 4
      persistence: 3
      communicative_impact: 4
    examples:
    - 'Wrong: ''I am skinny.'' Correct: ''I am thin.'' (neutral self-description)'
    - 'Wrong: ''She is skinny and pretty.'' Correct: ''She is thin and pretty.'' (neutral/positive)'
    - 'Wrong: ''My baby is fat.'' Correct: ''My baby is chubby.'' (affectionate context)'
    - 'Wrong: ''He is a fat guy.'' (casual) Correct: ''He is a heavy/overweight guy.'' (neutral)'
    why_it_happens: Portuguese and English organize the semantic field of body-description
      words differently. Portuguese 'magro' maps to both English 'thin' and 'skinny,'
      but English splits the concept into 'thin' (neutral/positive) and 'skinny' (negative).
      Similarly, Portuguese 'gordo' covers a wider affective range — from casual/affectionate
      (especially with diminutive suffixes like '-inho') to descriptive — while English
      'fat' is almost exclusively pejorative. Portuguese speakers select the English
      word that matches the L1 denotation but carry over the L1 connotation, producing
      unintended offense or oddness. This is a well-documented area of L1 pragmatic
      transfer in contrastive semantics (Swan & Smith, 2001; Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'Draw a three-column chart on the board: POSITIVE / NEUTRAL /
        NEGATIVE. Place body-description words in each column. Show that Portuguese
        ''magro'' spans positive and neutral, but English ''skinny'' falls in the
        negative column. For ''gordo,'' show that Portuguese can be affectionate but
        English ''fat'' is almost always insulting. Use pictures of people and have
        students choose the appropriate word for each context.'
      where_to_start: Begin with body-description vocabulary since this is the most
        common and highest-impact connotation error. Students need to understand that
        the ''right'' word depends on how the speaker feels about the person.
      sequencing: 'Week 1: Body-description words (thin/skinny/slim vs fat/chubby/overweight).
        Week 2: Personality descriptors (cheap/frugal/economical, aggressive/assertive/bold).
        Week 3: Connotation shifts in formal vs informal registers. Week 4: Context-matching
        practice — same situation, different connotations.'
      exercises:
      - name: Connotation Sort
        type: matching
        description: Give 20 English words (thin, skinny, slim, slender, fat, chubby,
          plump, overweight, cheap, frugal, economical, aggressive, assertive, bold,
          stubborn, determined, curious, nosy, childish, youthful). Students sort
          each into POSITIVE, NEUTRAL, or NEGATIVE columns.
        duration: 15
      - name: Portuguese-to-English Connotation Translation
        type: translation
        description: Provide 10 Portuguese sentences using magro, gordo, gordinho,
          and other connotation-sensitive words. Students translate into English,
          choosing the word that matches the intended tone (affectionate, neutral,
          or critical).
        duration: 15
      - name: Context Word Choice
        type: fill-in-the-blank
        description: Provide 15 sentences with context clues (e.g., ''Speaking affectionately
          about her newborn...'' ''Describing a model for a fashion magazine...'' ''Complaining
          about a rude salesperson...''). Students choose between two near-synonyms
          with different connotations.
        duration: 15
