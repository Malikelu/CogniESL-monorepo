  the_the_comparatives:
    interference_patterns:
    - pattern: Omission of 'the' in proportional comparative 'the...the' structure
      example_portuguese: Quanto mais eu estudo, mais eu aprendo.
      example_gloss: The more I study, the more I learn.
      example_wrong: More I study, more I learn.
      example_correct: The more I study, the more I learn.
      explanation: Portuguese uses 'quanto mais...mais' for proportional comparison
        without any article equivalent to English 'the.' Portuguese speakers omit 'the'
        because their L1 structure does not require a determiner in this construction.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'more + adjective' instead of morphological comparative '-er'
      example_portuguese: Ele e mais alto que o irmao.
      example_gloss: He is more tall than his brother.
      example_wrong: He is more tall than his brother.
      example_correct: He is taller than his brother.
      explanation: Portuguese forms all comparatives analytically with 'mais' (more) before
        the adjective — there is no morphological equivalent to English '-er.' Portuguese
        speakers transfer this analytic pattern and produce 'more big,' 'more tall,'
        'more fast' even with short monosyllabic adjectives that require '-er' in English.
        This error persists because Portuguese has no inflectional comparative morphology.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''More I study, more I learn.'' Correct: ''The more I study, the more
      I learn.'''
    - 'Wrong: ''He is more tall than his brother.'' Correct: ''He is taller than his
      brother.'''
    - 'Wrong: ''This car is more fast.'' Correct: ''This car is faster.'''
    why_it_happens: Portuguese uses 'quanto mais...mais' for proportional comparison
      without any article equivalent to English 'the,' leading to omission of 'the'
      in 'the...the' structures. Additionally, Portuguese forms all comparatives analytically
      with 'mais' (more) before the adjective — there is no morphological comparative
      equivalent to English '-er.' Portuguese speakers transfer this analytic pattern
      and produce 'more big,' 'more tall,' 'more fast' even with short monosyllabic
      adjectives that require '-er' in English. Both patterns are documented in contrastive
      analyses of Portuguese and English comparative structures (Swan & Smith 2001;
      Azevedo 1996).
    teacher_tips:
      how_to_explain: 'Teach two rules: (1) ''the + comparative..., the + comparative...''
        for proportional comparison — ''The more I study, the more I learn.'' (2) Short
        adjectives (1-2 syllables) use -er: ''taller, faster, bigger.'' Long adjectives
        use ''more'': ''more beautiful, more expensive.'' Drill both patterns side by
        side.'
      where_to_start: 'Begin with common proportional expressions: ''The more, the
        merrier.'' Then teach the -er vs. more contrast with common adjectives: tall/taller,
        fast/faster, big/bigger vs. beautiful/more beautiful.'
      sequencing: 'Week 1: ''The...the'' proportional comparative structure. Week 2:
        -er vs. more comparative forms. Week 3: Common errors — ''more tall'' vs ''taller.''
        Week 4: Mixed practice combining both patterns.'
      exercises:
      - name: The The Comparative Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students use 'the...the' comparative structure.
        duration: 15
      - name: Er vs More Decision
        type: fill-in-the-blank
        description: Provide 15 adjectives. Students must choose between -er form or
          "more + adjective" to complete comparative sentences.
        duration: 15
      - name: Comparative Error Correction
        type: error-correction
        description: Provide 10 sentences with comparative errors (both 'the' omission
          and "more + short adjective" errors). Students identify and correct each error.
        duration: 15
