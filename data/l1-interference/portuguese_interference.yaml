  had_better:
    interference_patterns:
    - pattern: Use of 'would better' instead of 'had better'
      example_portuguese: Eu ia era melhor sair.
      example_gloss: I was better to leave.
      example_wrong: I would better leave.
      example_correct: I had better leave.
      explanation: Portuguese uses 'ser melhor' (to be better) to give advice. English
        uses 'had better' as a fixed expression for strong advice or warning. Portuguese
        speakers produce 'would better' by analogy with 'would rather.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Incorrect negation — 'hadn't better' instead of 'had better not'
      example_portuguese: E melhor voce nao sair.
      example_gloss: It is better you not to leave.
      example_wrong: You hadn't better leave.
      example_correct: You'd better not leave.
      explanation: Portuguese places negation after the verb or uses 'nao' before
        the infinitive ('e melhor nao fazer' = it is better not to do). English 'had
        better' negation requires 'not' after 'better' (had better not + base verb).
        Portuguese speakers transfer the negation-before-verb pattern and produce
        'hadn't better' (treating 'had' as an auxiliary that takes n't) instead of
        the correct 'had better not.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I would better leave.'' Correct: ''I had better leave.'''
    - 'Wrong: ''You hadn''t better leave.'' Correct: ''You''d better not leave.'''
    why_it_happens: 'Portuguese uses "ser melhor" (to be better) to give advice:

      "E melhor voce sair" (It is better you leave). English uses "had better"

      as a fixed expression: "You had better leave." Portuguese speakers produce

      "would better" by analogy with "would rather." Additionally, Portuguese

      negation in advice structures places "nao" before the infinitive ("e melhor

      nao fazer" = better not to do). English "had better" negation requires "not"

      after "better": "had better not + verb." Portuguese speakers may produce

      "had not better" by treating "had" as a standard auxiliary that takes the

      clitic "not," rather than recognizing that "had better" is a fixed modal

      idiom where negation attaches after "better." Both patterns are documented

      in Swan & Smith (2001) for Portuguese-speaking learners.

      '
    teacher_tips:
      how_to_explain: 'Teach "had better" as a fixed expression for strong advice

        or warning. Write on the board: "had better + verb" and "had better not +

        verb." Emphasize: "had" here is NOT the past tense of "have." It is a

        fixed phrase. For negation, show that "not" goes AFTER "better," not on

        "had": "had better NOT go," not "had not better go."

        '
      where_to_start: 'Begin with affirmative warnings: "You had better study or you

        will fail." Then introduce negation: "You had better not be late." Contrast

        the two forms side by side.

        '
      sequencing: 'Week 1: ''Had better'' affirmative for advice. Week 2: ''Had better
        not'' for warnings — drill the negation position. Week 3: ''Had better'' vs.
        ''should'' vs. ''must.'' Week 4: Mixed practice including error correction.'
      exercises:
      - name: Had Better Advice Drill
        type: fill-in-the-blank
        description: Provide 10 situations (e.g., 'Your friend has an exam tomorrow').
          Students write advice using 'had better' or 'had better not.' Teacher checks
          for correct negation placement.
        duration: 15
      - name: Negation Error Correction
        type: error-correction
        description: Provide 10 sentences with negation errors (e.g., 'You hadn't
          better forget the tickets'). Students identify the error and rewrite with
          correct 'had better not + verb' structure. Include 5 affirmative distractors.
        duration: 15
