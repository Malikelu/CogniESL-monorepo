  future_perfect_simple:
    interference_patterns:
    - pattern: Use of present perfect with future time markers instead of future perfect
      example_portuguese: Eu ja terminei amanha.
      example_gloss: I already finish tomorrow.
      example_wrong: I already finish tomorrow.
      example_correct: I will have finished by tomorrow.
      explanation: Portuguese uses the present perfect (pretérito perfeito composto)
        with future time markers to express completion before a future point. English
        requires the future perfect (will have + past participle). Portuguese speakers
        transfer the present perfect structure directly, producing 'I already finish
        tomorrow' instead of 'I will have finished by tomorrow.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'ir + ter + past participle' transferred as 'go + have + past
        participle'
      example_portuguese: Eu vou ter terminado ate sexta.
      example_gloss: I go to have finished by Friday.
      example_wrong: I go have finished by Friday.
      example_correct: I will have finished by Friday.
      explanation: Portuguese forms a periphrastic future perfect with 'ir + ter +
        past participle' (vou ter terminado = I will have finished). Portuguese speakers
        may transfer this structure word-for-word, producing 'I go have finished'
        or 'I will go have finished' instead of the correct English future perfect
        'I will have finished.' The Portuguese auxiliary 'ir' (go) is misinterpreted
        as the English main verb 'go.'
      frequency: 2
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I already finish tomorrow.'' Correct: ''I will have finished by tomorrow.'''
    - 'Wrong: ''I go have finished by Friday.'' Correct: ''I will have finished by
      Friday.'''
    why_it_happens: Portuguese expresses future completion in two ways that both transfer
      incorrectly to English. First, Portuguese uses the present perfect with future
      time markers (eu ja terminei amanha = I already finish tomorrow) where English
      requires the future perfect (will have + past participle). Second, Portuguese
      has a periphrastic future perfect formed with 'ir + ter + past participle' (vou
      ter terminado = I will have finished), which Portuguese speakers may translate
      word-for-word as 'I go have finished.' English has a single future perfect form
      (will have + past participle) that does not exist as a direct equivalent in
      Portuguese, forcing speakers to choose between two non-equivalent L1 structures.
    teacher_tips:
      how_to_explain: 'Teach the future perfect as a single structure: will have +
        past participle. Write the Portuguese equivalents on the board and show why
        neither translates directly. Emphasize ''by'' + time marker: ''By Friday,
        I will have finished.'' Drill the contrast: Portuguese ''vou ter terminado''
        does NOT mean ''I go have finished.'' It means ''I will have finished.'''
      where_to_start: Begin with 'By [time], I will have + past participle.' Use concrete
        deadlines such as 'By 5pm I will have sent the email.'
      sequencing: 'Week 1: Future perfect structure (will have + past participle).
        Week 2: Future perfect vs. simple future (completion before a future point).
        Week 3: Future perfect vs. present perfect with future markers. Week 4: Mixed
        practice with all future forms.'
      exercises:
      - name: Future Perfect Simple Drill
        type: fill-in-the-blank
        description: Provide 10 sentences with 'by + time' markers. Students complete
          using future perfect.
        duration: 15
      - name: Portuguese Future Transfer Correction
        type: error-correction
        description: Give 10 sentences showing Portuguese-to-English transfer errors
          (present perfect with future markers, 'ir + ter' literal translations).
          Students identify the error type and rewrite in correct English future perfect.
        duration: 15
