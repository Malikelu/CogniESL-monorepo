  ing_clauses:
    interference_patterns:
    - pattern: Use of infinitive where English requires gerund (-ing form)
      example_portuguese: Eu gosto de nadar.
      example_gloss: I like of to swim.
      example_wrong: I like to swim.
      example_correct: I like swimming.
      explanation: Portuguese uses the infinitive (often preceded by de, a, or another
        preposition) after verbs of preference, avoidance, and mental activity. English
        requires the gerund (-ing form) after many of these same verbs. Portuguese speakers
        transfer the infinitive pattern directly, producing "I like to swim" instead of
        "I like swimming." This affects a wide range of high-frequency verbs including
        gostar (like), apreciar (enjoy), evitar (avoid), terminar (finish), parar (stop),
        and lembrar (remember).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'to' before bare infinitive complements
      example_portuguese: Eu tentei telefonar para voce.
      example_gloss: I tried to telephone to you.
      example_wrong: I tried telephone you.
      example_correct: I tried to telephone you.
      explanation: Portuguese infinitives are often preceded by a preposition (de, a, para).
        When the Portuguese infinitive has NO preposition, speakers may drop "to" before
        the English equivalent infinitive. For example, "tentar" (to try) takes a bare
        infinitive in Portuguese ("eu tentar fazer" = I try to do), but English requires
        "to" after "try" (I try TO do). Portuguese speakers produce "I tried telephone
        you" or "She promised pay everything" because their L1 does not mark the infinitive
        with "to" in these contexts. This is distinct from the gerund/infinitive confusion
        above — here the error is the omission of the infinitive marker "to" itself.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I like to swim. Correct: I like swimming.'
    - 'Wrong: Do you mind to wait? Correct: Do you mind waiting?'
    - 'Wrong: I tried telephone you. Correct: I tried to telephone you.'
    - 'Wrong: She promised pay everything. Correct: She promised to pay everything.'
    why_it_happens: Portuguese and English differ fundamentally in how they handle non-finite
      verb forms. First, Portuguese uses the infinitive as the default non-finite form after
      most verbs, often with a preposition (de, a, para) as a linker. For example, "eu gosto
      de nadar" (I like of to-swim), "eu terminei de comer" (I finished of to-eat). English,
      by contrast, requires the gerund (-ing) after many of these same verbs (like, enjoy,
      finish, stop, mind). There is no Portuguese equivalent of the English gerund as a
      substantival verb form — Portuguese uses the infinitive for this function. Second,
      when Portuguese verbs take a bare infinitive (no preposition), speakers may omit "to"
      in English because their L1 does not require an infinitive marker. For example,
      "tentar" (try) takes a bare infinitive in Portuguese ("eu tentar fazer"), but English
      requires "to" (I try TO do). The result is two distinct error types. First, using the
      infinitive where English needs the gerund. Second, omitting "to" where English needs
      the to-infinitive.
    teacher_tips:
      how_to_explain: 'Create two columns on the board: VERBS THAT TAKE -ING and VERBS
        THAT TAKE TO. Under -ING, write: like, enjoy, finish, stop, mind, avoid, practice,
        remember (for memories), give up. Under TO, write: want, need, plan, decide, promise,
        try (for attempts), hope, learn. Then show the Portuguese equivalents: "gostar de
        + infinitivo" but English says "like + -ING." Drill with "I like swimming" NOT
        "I like to swim." For the second pattern, show that "try" needs "to": "I tried
        TO call you" NOT "I tried call you."'
      where_to_start: 'Begin with the most common gerund verbs: like, enjoy, finish, stop.
        Use real classroom actions: "I enjoy teaching," "I finished writing," "Stop talking."
        Then introduce the to-infinitive verbs: want, need, promise, try.'
      sequencing: 'Week 1: Verbs that take gerund (like, enjoy, finish, stop, mind). Week
        2: Verbs that take to-infinitive (want, need, promise, try, plan). Week 3: Verbs
        that can take both with meaning change (remember, forget, stop, try). Week 4: Mixed
        practice with error correction. Week 5: Production activities (speaking and writing).'
      exercises:
      - name: Gerund or Infinitive Sort
        type: sorting
        description: Give students 20 verb cards (like, enjoy, finish, stop, want, need,
          promise, try, plan, avoid, practice, remember, forget, mind, give up, hope, learn,
          decide, consider, finish). Students sort into three piles - takes -ING, takes TO,
          or both. Then students write one sentence for each verb.
        duration: 15
      - name: Portuguese to English Transformation
        type: translation
        description: Provide 15 Portuguese sentences using infinitive constructions (e.g.,
          "Eu gosto de nadar," "Eu terminei de comer," "Eu quero comer," "Eu tentei ligar
          para voce"). Students translate into correct English, paying attention to whether
          the verb takes -ing or to.
        duration: 20
      - name: Error Correction - Ing Clause Errors
        type: error-correction
        description: Provide a paragraph with 10 errors related to gerund/infinitive and
          to-infinitive omission. Students identify and correct each error. Example errors
          include "I like to swim," "Do you mind to wait?" "I tried telephone you," "She promised
          pay everything."
        duration: 15
      - name: Sentence Completion Race
        type: game
        description: Divide the class into two teams. Write 20 sentence stems on the board
          (e.g., "I enjoy ___," "I want ___," "I tried ___," "I finished ___"). Teams race
          to complete each sentence correctly with the right form. First team to finish with
          all correct answers wins.
        duration: 10
