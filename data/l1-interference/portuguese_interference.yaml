  present_simple:
    interference_patterns:
    - pattern: Use of present continuous for habitual actions
      example_portuguese: Eu estou trabalhando todo dia.
      example_gloss: I am working every day.
      example_wrong: I am working every day.
      example_correct: I work every day.
      explanation: Portuguese can use the present continuous for habitual actions.
        English uses the present simple for habits and routines.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Omission of third-person -s
      example_portuguese: Ele trabalha muito.
      example_gloss: He works much.
      example_wrong: He work a lot.
      example_correct: He works a lot.
      explanation: Portuguese verb conjugation includes the third-person marker, but
        it may not be salient enough to transfer. English requires -s/-es on third-person
        singular present tense verbs.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am working every day.'' Correct: ''I work every day.'''
    - 'Wrong: ''He work a lot.'' Correct: ''He works a lot.'''
    - 'Wrong: ''She go to school.'' Correct: ''She goes to school.'''
    why_it_happens: 'Portuguese uses the present tense for both habitual and ongoing
      actions. English distinguishes: present simple (habits, routines, general truths)
      and present continuous (actions happening now). Portuguese speakers may use
      the continuous form for habits. Additionally, the English third-person -s is
      a common omission because Portuguese verb endings are different and the -s is
      not salient.'
    teacher_tips:
      how_to_explain: 'Teach the distinction: present simple = habits/routines (I
        work every day), present continuous = happening now (I am working right now).
        For third-person -s, drill: he works, she goes, it rains. Make it a habit
        to always add -s in third person.'
      where_to_start: 'Begin with third-person -s since it is the most basic error.
        Drill: he/she/it + verb-s.'
      sequencing: 'Week 1: Third-person -s. Week 2: Present simple for habits. Week
        3: Present continuous for now. Week 4: Mixed practice.'
