  subject_pronoun_dropping:
    interference_patterns:
    - pattern: Omission of subject pronoun in English
      example_portuguese: Esta chovendo.
      example_gloss: Is raining.
      example_wrong: Is raining.
      example_correct: It is raining.
      explanation: 'Portuguese is a pro-drop language: the subject pronoun can be
        omitted when the verb conjugation indicates the person. English requires an
        explicit subject in every finite clause, even when the subject is semantically
        empty (expletive ''it'').'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Omission of expletive 'it' with weather/time expressions
      example_portuguese: E tarde.
      example_gloss: Is late.
      example_wrong: Is late.
      example_correct: It is late.
      explanation: Portuguese uses 'ser' without a subject pronoun for time and weather.
        English requires 'it' as a dummy subject.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''Is raining.'' Correct: ''It is raining.'''
    - 'Wrong: ''Is late.'' Correct: ''It is late.'''
    - 'Wrong: ''Is cold today.'' Correct: ''It is cold today.'''
    why_it_happens: 'Portuguese is a pro-drop language, meaning subject pronouns can
      be omitted when the verb conjugation makes the subject clear. ''Esta chovendo''
      (is raining) has no subject pronoun because the verb form indicates the impersonal
      subject. English, however, requires an explicit subject in every finite clause.
      Weather and time expressions in English use ''it'' as a dummy subject: ''It
      is raining,'' ''It is late,'' ''It is cold.'' Portuguese speakers omit this
      ''it'' because their L1 does not require a subject in these constructions.'
    teacher_tips:
      how_to_explain: 'Write ''Esta chovendo'' on the board. Ask: ''What is raining?
        Nothing! But English needs a word: IT. IT is raining.'' Teach ''it'' as a
        required subject for weather, time, and distance expressions. Drill: ''It
        is raining, It is late, It is cold, It is 5 o''clock.'''
      where_to_start: Begin with weather expressions since they are the most common.
        'It is raining, It is sunny, It is cold.'
      sequencing: 'Week 1: Expletive ''it'' with weather. Week 2: Expletive ''it''
        with time. Week 3: Expletive ''it'' with distance. Week 4: All pro-drop errors.'
      exercises:
      - name: It Insertion Drill
        type: fill-in-the-blank
