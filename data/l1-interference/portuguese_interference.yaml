  mustnt:
    interference_patterns:
    - pattern: Use of 'must not' for lack of obligation where 'don't have to' is needed
      example_portuguese: Voce nao precisa vir.
      example_gloss: You not need to come.
      example_wrong: You must not come.
      example_correct: You don't have to come.
      explanation: Portuguese 'nao precisar' expresses lack of necessity. English
        uses 'don't have to' for lack of obligation and 'must not' for prohibition.
        Portuguese speakers may use 'must not' where English requires 'don't have
        to.'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'must not' where 'should not' is appropriate (overstating advice)
      example_portuguese: Voce nao deve comer tanto doce.
      example_gloss: You not should eat so-much candy.
      example_wrong: You must not eat so much candy.
      example_correct: You should not eat so much candy.
      explanation: Portuguese 'nao dever' covers both strong prohibition and mild
        advice/ recommendation. English sharply distinguishes 'must not' (prohibition,
        you are forbidden) from 'should not' (advice, it is not recommended). Portuguese
        speakers may use 'must not' when giving advice where English requires 'should
        not,' making the statement sound harsher and more authoritarian than intended.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''You must not come.'' (lack of obligation) Correct: ''You don''t have
      to come.'''
    - 'Wrong: ''You must not wear a tie.'' (not required) Correct: ''You don''t have
      to wear a tie.'''
    - 'Wrong: ''You must not eat so much candy.'' (advice) Correct: ''You should not
      eat so much candy.'''
    why_it_happens: 'Portuguese ''nao precisar'' (not need) expresses lack of necessity.
      English distinguishes ''don''t have to'' (lack of obligation) from ''must not''
      (prohibition). Portuguese speakers may use ''must not'' for both, causing confusion:
      ''You must not come'' sounds like a prohibition (you are forbidden) when the
      intended meaning is ''You don''t have to come'' (it is not required). Additionally,
      Portuguese ''nao dever'' covers a wide spectrum from mild advice to strong prohibition,
      while English splits this into ''should not'' (advice) and ''must not'' (prohibition).
      Portuguese speakers may overuse ''must not'' when giving advice, making statements
      sound more authoritarian than intended.'
    teacher_tips:
      how_to_explain: 'Teach the three-way distinction: ''must not'' = prohibition
        (you are forbidden), ''don''t have to'' = no obligation (it is optional),
        ''should not'' = advice (it is not recommended but you can). This is a high-stakes
        error because it changes the meaning entirely.'
      where_to_start: 'Begin with clear examples: ''You must not smoke here'' (prohibition)
        vs. ''You don''t have to smoke here'' (optional) vs. ''You should not smoke
        here'' (advice).'
      sequencing: 'Week 1: ''Must not'' for prohibition. Week 2: ''Don''t have to''
        for lack of obligation. Week 3: ''Should not'' for advice. Week 4: Three-way
        contrast practice.'
      exercises:
      - name: Must Not vs Don't Have To Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'must
          not' and 'don't have to.'
        duration: 15
      - name: Must Not vs Should Not Sort
        type: scenario-sort
        description: Give 20 scenario cards (e.g., 'A doctor advises a patient about
          sugar,' 'A sign forbids entry,' 'A teacher says homework is optional').
          Students sort each into must not / should not / don't have to and write
          the correct sentence.
        duration: 20
