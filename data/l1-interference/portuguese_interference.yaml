  comparative_superlative:
    interference_patterns:
    - pattern: Use of 'more' with short adjectives in comparatives
      example_portuguese: Ele e mais alto.
      example_gloss: He is more tall.
      example_wrong: He is more tall.
      example_correct: He is taller.
      explanation: Portuguese uses 'mais + adjective' for all comparatives regardless
        of syllable count. English uses -er for short adjectives (taller, bigger) and
        'more' for long adjectives (more beautiful). Portuguese speakers overuse 'more'
        with short adjectives because their L1 has no synthetic comparative inflection.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of 'most' with short adjectives in superlatives
      example_portuguese: Ela e a mais alta.
      example_gloss: She is the most tall.
      example_wrong: She is the most tall.
      example_correct: She is the tallest.
      explanation: Portuguese uses 'o/a mais + adjective' for all superlatives regardless
        of syllable count. English uses -est for short adjectives (tallest, biggest) and
        'the most' for long adjectives (the most beautiful). Portuguese speakers overuse
        'most' with short adjectives because their L1 has no synthetic superlative inflection.
        This pattern is documented in ELL error corpora (Folse, 2016) and confirmed by
        contrastive analysis of Romance vs. Germanic adjective morphology (Swan, 2016).
      frequency: 4
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: ''He is more tall.'' Correct: ''He is taller.'''
    - 'Wrong: ''She is the most tall.'' Correct: ''She is the tallest.'''
    - 'Wrong: ''This is the most big.'' Correct: ''This is the biggest.'''
    why_it_happens: 'Portuguese forms all comparatives and superlatives analytically with
      ''mais'' (more/most) + adjective. English has two systems: synthetic (-er/-est) for
      short adjectives and analytic (more/most) for long adjectives. Portuguese lacks
      the synthetic inflection entirely, so speakers default to the analytic pattern for
      all adjectives. This is a direct morphological transfer from a Romance language
      (which uses only analytic comparison) to a Germanic language (which uses both).
      The error persists because the Portuguese system is simpler and deeply automatized.
      Folse (2016) documents ''wrong comparative form'' errors such as ''China is more
      big than India'' in ELL writing, and Swan (2016, Practical English Usage, Section 17)
      confirms that learners from Romance language backgrounds overuse more/most with
      short adjectives.'
    teacher_tips:
      how_to_explain: 'Teach the syllable rule: 1-2 syllables = -er/-est, 3+ syllables
        = more/most. Drill common adjectives. Show that Portuguese uses ''mais'' for
        everything, but English has two systems. Use a chart: tall/taller/tallest vs.
        beautiful/more beautiful/most beautiful.'
      where_to_start: 'Begin with common short adjectives that Portuguese speakers
        most often get wrong: tall, big, small, old, young, fast, slow.'
      sequencing: 'Week 1: Short adjectives (-er comparative). Week 2: Short adjectives
        (-est superlative). Week 3: Long adjectives (more/most). Week 4: Irregular forms
        (good/better/best, bad/worse/worst). Week 5: Mixed practice with error correction.'
      exercises:
      - name: Comparative Superlative Drill
        type: fill-in-the-blank
        description: Provide 15 adjectives. Students write comparative and superlative
          forms using the correct system (-er/-est or more/most).
        duration: 15
      - name: Error Correction - More/Most Overuse
        type: error-correction
        description: Provide 12 sentences with Portuguese L1 comparative/superlative
          errors (e.g., 'She is more tall than me,' 'This is the most big house').
          Students identify the error and correct it, explaining which rule applies.
        duration: 15
