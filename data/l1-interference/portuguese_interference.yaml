  alternatives_to_if:
    interference_patterns:
    - pattern: Use of 'if...not' where 'unless' is needed
      example_portuguese: Eu nao vou se ele nao vier.
      example_gloss: I not go if he not comes.
      example_wrong: I will not go if he does not come.
      example_correct: I will not go unless he comes.
      explanation: Portuguese uses 'se...nao' (if...not) for negative conditions.
        English 'unless' is more concise and natural. Portuguese speakers transfer
        the 'se...nao' structure directly as 'if...not,' which is grammatically possible
        but stylistically awkward and less idiomatic than 'unless.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of 'if' where 'provided that' or 'as long as' is required
      example_portuguese: Eu facao se voce quiser.
      example_gloss: I do it if you want.
      example_wrong: I will do it if you pay me.
      example_correct: I will do it provided that you pay me.
      explanation: Portuguese uses 'se' for all conditional meanings — neutral condition,
        strong condition, and negative condition. English distinguishes 'if' (neutral),
        'provided that'/'as long as' (strong/necessary condition), and 'unless' (negative).
        Portuguese speakers overuse 'if' because their L1 does not lexicalize this
        distinction. In formal and business contexts, using 'if' instead of 'provided
        that' can sound vague or insufficiently committed.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I will not go if he does not come.'' Correct: ''I will not go unless
      he comes.'''
    - 'Wrong: ''I will do it if you pay me.'' Correct: ''I will do it provided that
      you pay me.'''
    - 'Wrong: ''If you are happy, I am happy.'' (neutral) Correct: ''As long as you
      are happy, I am happy.'' (stronger emotional condition)'
    why_it_happens: Portuguese uses a single conditional conjunction 'se' for all
      conditional meanings — neutral ('if'), strong/necessary ('provided that'), and
      negative ('unless'). English lexicalizes these distinctions with separate words.
      Portuguese speakers transfer the single 'se' pattern and overuse 'if' because
      their L1 does not require them to choose between neutral, strong, and negative
      conditional markers. The 'se...nao' structure maps directly to 'if...not' in
      English, but native English strongly prefers 'unless' for negative conditions.
      Additionally, Portuguese speakers may not acquire the register distinction between
      formal 'provided that' and neutral 'as long as,' since both map to 'se' in Portuguese.
    teacher_tips:
      how_to_explain: 'Create a three-column chart on the board: IF (neutral), UNLESS
        (negative = if...not), PROVIDED THAT/AS LONG AS (strong condition). Show that
        Portuguese uses one word (se) for all three, but English uses different words.
        Drill the transformation: ''se...nao'' → ''unless,'' ''se (strong condition)''
        → ''provided that/as long as.'''
      where_to_start: Begin with 'unless' = 'if...not' since this is the most frequent
        error. Then introduce 'provided that' and 'as long as' for strong positive
        conditions.
      sequencing: 'Week 1: ''Unless'' = ''if...not.'' Week 2: ''Provided that'' and
        ''as long as'' (strong conditions). Week 3: ''Even if'' vs ''if'' (contrast).
        Week 4: ''In case'' (preparation) vs ''if.'' Week 5: Mixed practice with all
        alternatives.'
      exercises:
      - name: Unless Transformation Drill
        type: sentence-rewrite
        description: Give 10 sentences with 'if...not.' Students rewrite using 'unless.'
          Then give 10 'unless' sentences and students rewrite using 'if...not' to
          confirm equivalence.
        duration: 15
      - name: If vs Provided That Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'if'
          (neutral condition) and 'provided that' (strong/necessary condition). Contexts
          include business agreements, personal commitments, and formal arrangements.
        duration: 15
      - name: Conditional Alternatives Sort
        type: matching
        description: Give 20 Portuguese sentences using 'se.' Students categorize
          each as requiring 'if,' 'unless,' 'provided that,' 'as long as,' 'even if,'
          or 'in case' in English, then translate.
        duration: 20
    sources: *id001
    source_count: 2
