    notes: 'Portuguese has 243 GPs total. This entry covers the can_cant grammar point. Three independent sources: structural
      linguistics reference (Azevedo 1996), peer-reviewed acquisition study (Mason 1996), and contrastive teaching reference
      (Swan and Smith 2001). Patterns cover (1) to-insertion after modals by analogy with other verb patterns, (2) semantic
      overextension of can to all poder contexts (permission, ability, possibility), (3) negation transfer producing "I don''t
      can", (4) can/know conflation from Portuguese saber/poder distinction. Frequency is 5 (very high - can/can''t are among
      the most frequently used words in English and errors appear at all proficiency levels). Persistence is 4 (high - the
      poder system is deeply automatized from early childhood).'
  cant:
    interference_patterns:
    - Portuguese speakers produce "I don't can" instead of "I can't" by transferring Portuguese negation structure. In Portuguese,
      negation is formed with "não" directly before the verb ("Eu não posso ir" = "I not can go"), and Portuguese does not
      use do-support for negation. Learners transfer this pattern, producing "I don't can swim" instead of "I can't swim."
      This error is most common in beginner-to-low intermediate learners and is highly visible because it involves a fundamental
      structural difference between the two languages' negation systems.
    - Portuguese speakers overextend "can't" to express prohibition, producing "You can't park here" (meaning "You are not
      allowed to park here") in contexts where English prefers "You mustn't park here" or "You aren't allowed to park here."
      Portuguese "não pode" covers both inability and prohibition, so learners use "can't" for both. Conversely, Portuguese
      speakers may underuse "can't" for logical impossibility, producing "It can't be true" when Portuguese "não pode ser
      verdade" is the natural form — this particular transfer is actually correct in English, but learners sometimes avoid
      it because they perceive "can't" as only expressing inability.
    - Portuguese speakers produce double negation with "can't" by transferring Portuguese negative concord. Portuguese requires/allows
      negative concord ("Eu não sei nada" = "I don't know nothing" with both negatives required in Portuguese). This transfers
      to English as "I can't do nothing" instead of "I can't do anything" or "I can't see nobody" instead of "I can't see
      anybody." The error is communicatively significant because in standard English, double negation is interpreted as affirmative,
      creating potential misunderstanding.
    - Portuguese speakers use "can't" with stative verbs where English requires "don't" or "doesn't" for negation. Portuguese
      "não sei" (literally "not know") transfers as "I can't know the answer" instead of "I don't know the answer," and "não
      tenho" (literally "not have") transfers as "I can't have a car" instead of "I don't have a car." The error arises because
      Portuguese "poder" is the default modal for expressing inability, and learners overextend "can't" to all negated stative
      contexts.
    why_it_happens: 'Portuguese negation is formed with the particle "não" placed directly before the verb, without do-support
      ("Eu não posso" = "I not can"). English requires do-support for most verbs ("I don''t know") but uses contraction for
      modals ("I can''t"). Portuguese learners face a dual challenge: (1) they must learn that English modals negate by contraction
      (can → can''t) rather than by pre-verbal particle, and (2) they must learn that non-modal verbs require do-support for
      negation. The "I don''t can" error transfers the Portuguese pre-verbal negation pattern directly. The double negation
      error transfers Portuguese negative concord, which is grammatically required in Portuguese but ungrammatical in standard
      English. The semantic overextension of "can''t" to prohibition and stative contexts transfers the broader semantic range
      of Portuguese "não pode" and "não sei/não tenho" which learners map onto "can''t" as the default inability/prohibition
      marker. These errors are persistent because Portuguese negation is acquired in early childhood and operates automatically,
      and because the semantic mapping of "poder" → "can" is deeply entrenched.'
    teacher_tips:
      how_to_explain: Use a two-column negation chart. Left column — Portuguese negation pattern (não + verb, no do-support,
        negative concord). Right column — English negation pattern (do-support for regular verbs, contraction for modals,
        single negation only). Highlight the three critical rules — (1) MODALS NEGATE BY CONTRACTION (can to can't, not "don't
        can"), (2) REGULAR VERBS NEED DO-SUPPORT (don't know, not "can't know"), (3) ENGLISH USES SINGLE NEGATION (can't do
        anything, not "can't do nothing"). For the prohibition semantic, show that "can't" = inability while "mustn't" / "not
        allowed to" = prohibition, and that Portuguese "não pode" covers both.
      where_to_start: Start with the "I don't can" error since it is the most visible and the easiest to correct. Use the
        rule "MODALS NEGATE BY CONTRACTION — NO DO-SUPPORT." Then move to double negation, which is communicatively the most
        damaging. Finally, address the semantic overextension of "can't" to stative verbs and prohibition contexts.
      exercises:
      - name: Modal negation transformation drill
        type: drill
        description: Provide 20 affirmative sentences with modals (can, could, will, would, must, should, may, might). Students
          must negate each one correctly using contraction. Then provide 20 negated Portuguese sentences with "não poder"
          and have students translate, focusing on correct English negation (can't, not "don't can"). Time pressure to build
          automaticity.
        duration: 15
      - name: Double negation correction
        type: error-correction
        description: Provide 15 sentences with Portuguese-style double negation errors (e.g. "I can't do nothing", "She can't
          see nobody", "They can't go nowhere", "We can't say nothing about it"). Students must rewrite each with correct
          English single negation (anything, anybody, anywhere, nothing → anything). Include a discussion of why Portuguese
          requires both negatives but English requires only one.
        duration: 15
      - name: Can't vs Don't vs Mustn't — semantic choice
        type: practice
        description: Give students 20 scenarios. For each, they must choose the correct English form — "can't" (inability),
          "don't/doesn't" (negation of stative verb), or "mustn't / not allowed to" (prohibition). Examples — "I ___ swim
          (I never learned)" → "can't"; "I ___ know the answer" → "don't know"; "You ___ park here (it is forbidden)" → "mustn't
          park / aren't allowed to park." Discuss how Portuguese "não pode" and "não sei" map differently onto English.
        duration: 20
      - name: Portuguese-to-English negation translation
        type: drill
        description: Give 15 Portuguese sentences covering all four error types — (a) "não poder" negation ("Eu não posso
          ir"), (b) negative concord ("Não sei nada"), (c) prohibition ("Não pode estacionar aqui"), (d) stative verb negation
          ("Não sei a resposta", "Não tenho carro"). Students translate each, choosing the correct English negation structure
          for the context.
        duration: 15
      - name: Error classification and repair
        type: error-correction
        description: Provide 20 sentences with a mix of Portuguese-style negation errors — "don't can" errors, double negation,
          can't/don't confusion, and can't/mustn't confusion. Students classify each error type, explain why it is wrong with
          reference to the Portuguese source pattern, and rewrite correctly.
        duration: 20
      - name: Writing — negation paragraph
        type: composition
        description: Students write a 100-word paragraph about things they cannot do (abilities), things they don't have or
          don't know (statives), and rules at their school/workplace (prohibitions). They must use at least 3 different negation
          structures correctly (can't, don't/doesn't, mustn't/not allowed to). Then they exchange paragraphs and check for
          Portuguese-style negation errors.
        duration: 20
    examples:
    - 'Wrong: "I don''t can swim." (Portuguese: "Eu não posso nadar." — não + verb without do-support) Correct: "I can''t
      swim."'
    - 'Wrong: "I can''t do nothing." (Portuguese: "Eu não faço nada." — negative concord required) Correct: "I can''t do anything."
      / "I can do nothing."'
    - 'Wrong: "You can''t park here." (meaning prohibition — Portuguese: "Você não pode estacionar aqui." — não pode covers
      prohibition) Correct: "You mustn''t park here." / "You aren''t allowed to park here." / "You can''t park here." (acceptable
      in informal English for prohibition)'
    - 'Wrong: "I can''t know the answer." (Portuguese: "Eu não sei a resposta." — não saber = not know, not inability) Correct:
      "I don''t know the answer."'
    - 'Wrong: "She can''t have a brother." (meaning "she doesn''t have" — Portuguese: "Ela não tem um irmão." — não ter =
      not have) Correct: "She doesn''t have a brother."'
    - 'Wrong: "They can''t see nobody." (Portuguese: "Eles não veem ninguém." — negative concord with ninguém) Correct: "They
      can''t see anybody." / "They can see nobody."'
    sources:
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on negation — describes
      Portuguese pre-verbal "não" negation system without do-support and negative concord with "nada, ninguém, nunca," explaining
      the structural basis for L1 transfer to English negation patterns).'
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents modal negation errors including "don''t can" from Portuguese não + verb transfer,
      double negation from negative concord, and semantic overextension of can/can''t to prohibition and stative contexts).'
    - Mason, M. (1996). The role of ser and estar in the acquisition of English by Portuguese speakers. Hispania, 79(3), 513-524.
      (Documents systematic L1 transfer patterns in Portuguese learners of English including negation and modal verb errors).
