  focus_background: *id012
  fronting: &id013
    interference_patterns:
    - pattern: Use of fronting without inversion after negative adverbs
      example_portuguese: Nunca eu vi isso.
      example_gloss: Never I saw that.
      example_wrong: Never I saw that.
      example_correct: Never have I seen that.
      explanation: "Portuguese allows fronting of negative adverbs (nunca, jamais, raramente) without requiring subject-auxiliary inversion. The word order remains Adv-S-V-O. English requires inversion after fronted negative adverbs (Adv-Aux-S-V). Portuguese speakers transfer the L1 word order, producing 'Never I saw that' instead of 'Never have I seen that.'"
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Fronting of only/hardly/scarcely without do-support or inversion
      example_portuguese: Apenas ontem eu fui la.
      example_gloss: Only yesterday I went there.
      example_wrong: Only yesterday I went there.
      example_correct: Only yesterday did I go there.
      explanation: Portuguese freely fronts restrictive adverbs (apenas, somente) without
        any change to the canonical SVO order. English requires do-support (or inversion
        with auxiliary verbs) when restrictive adverbs are fronted for emphasis. Portuguese
        speakers transfer the L1 pattern of simple fronting without do-support, producing
        'Only yesterday I went there' instead of 'Only yesterday did I go there.' This
        pattern also applies to hardly, scarcely, and no sooner.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: Never I saw that. Correct: Never have I seen that.'
    - 'Wrong: Only yesterday I went there. Correct: Only yesterday did I go there.'
    - 'Wrong: Hardly I had arrived when it started. Correct: Hardly had I arrived when
      it started.'
    - 'Wrong: No sooner I left than the phone rang. Correct: No sooner had I left than
      the phone rang.'
    why_it_happens: "Portuguese is a language with relatively free word order for focus and topicalization purposes. Negative adverbs (nunca, jamais, raramente) and restrictive adverbs (apenas, somente) can be fronted to the beginning of the sentence without any change to the subject-verb order — the canonical SVO order is simply preserved after the fronted element (Adv-S-V-O). English, by contrast, has a strict requirement for subject-auxiliary inversion after fronted negative and restrictive adverbs (Adv-Aux-S-V). This is a fundamental syntactic difference between the two languages. Portuguese does not require do-support in declarative sentences, so Portuguese speakers do not insert do/does/did when fronting these adverbs in English. The transfer produces two related error types - (1) fronting without inversion (Never I saw instead of Never have I seen) and (2) fronting without do-support (Only yesterday I went instead of Only yesterday did I go). Both patterns are documented in Swan & Smith (2001) for Romance-language speakers and in Azevedo (1996) regarding Portuguese word-order flexibility."
    teacher_tips:
      how_to_explain: 'Write a Portuguese sentence on the board: Nunca eu vi isso. Underline
        the word order: NEVER + I + SAW. Then write the English version: NEVER + HAVE
        + I + SEEN. Show that English needs an extra step: inversion. Drill with a
        simple rule: "After NEVER, SELDOM, RARELY, HARDLY, NO SOONER, ONLY — flip the
        subject and auxiliary." For do-support: "If there is no auxiliary, add DO/DOES/DID."'
      where_to_start: Begin with 'never' since it is the most frequent. Drill 'Never
        have I...' until automatic. Then introduce 'seldom' and 'rarely.' Then move
        to 'only + time expression' with do-support.
      sequencing: 'Week 1: Inversion after never/seldom/rarely (with existing auxiliary).
        Week 2: Inversion after hardly/scarcely/no sooner (with existing auxiliary). Week
        3: Do-support with fronted only/hardly (no existing auxiliary). Week 4: Mixed
        practice — students must decide whether to use inversion or do-support. Week
        5: Production — writing sentences with fronted adverbs for emphasis.'
      exercises:
      - name: Negative Adverb Inversion Drill
        type: transformation
        description: Give 10 sentences with fronted negative adverbs (never, seldom, rarely,
          hardly, scarcely, no sooner). Students rewrite with correct inversion. Half
          the sentences have an existing auxiliary (have, had, can); half require do-support.
        duration: 15
      - name: Only/Hardly Do-Support Insertion
        type: fill-in-the-blank
        description: "Provide 10 sentences where restrictive adverbs (only, hardly, scarcely) have been fronted. Students must insert the correct form of do/does/did and adjust the main verb to its base form. Example - 'Only last week she arrive' becomes 'Only last week did she arrive.'"
        duration: 15
