  although:
    interference_patterns:
    - pattern: Use of 'but' after 'although'
      example_portuguese: Embora esteja chovendo, eu vou sair.
      example_gloss: Although it is raining, I go out.
      example_wrong: Although it is raining, but I go out.
      example_correct: Although it is raining, I go out.
      explanation: Portuguese uses 'embora...mas' (although...but) together. English
        never uses 'but' after 'although.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'although' with noun phrase where 'despite/in spite of' is required
      example_portuguese: Embora o mau tempo, saimos.
      example_gloss: Although the bad weather, we went out.
      example_wrong: Although the bad weather, we went out.
      example_correct: Despite the bad weather, we went out. / In spite of the bad
        weather, we went out.
      explanation: Portuguese 'embora' can precede a noun phrase in colloquial usage
        and always triggers the subjunctive when followed by a clause. English 'although'
        can only introduce a clause (subject + verb). When the intended meaning is concessive
        with a noun phrase, English requires 'despite' or 'in spite of.' Portuguese
        speakers produce 'although + noun' because 'embora' occupies a broader syntactic
        slot in Portuguese.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''Although it is raining, but I go out.'' Correct: ''Although it is
      raining, I go out.'''
    - 'Wrong: ''Although the bad weather, we went out.'' Correct: ''Despite the bad
      weather, we went out.'''
    why_it_happens: Portuguese allows 'embora...mas' (although...but) together. English
      never uses 'but' after 'although' because 'although' already contains the contrast.
      Portuguese speakers add 'but' after 'although.' Additionally, Portuguese 'embora'
      can precede a noun phrase in colloquial registers, but English 'although' is strictly
      a subordinating conjunction and can only introduce a finite clause. When the complement
      is a noun phrase, English requires 'despite' or 'in spite of.' Portuguese speakers
      transfer the broader distribution of 'embora' and produce ungrammatical 'although
      + noun' structures.
    teacher_tips:
      how_to_explain: 'Teach: ''although'' = ''but.'' You never use both together.
        ''Although it is raining, I go out'' OR ''It is raining, but I go out.'' Not
        both. Also teach: ''although'' needs a subject + verb. For noun phrases, use
        ''despite'' or ''in spite of'': ''Despite the rain'' not ''Although the rain.'''
      where_to_start: 'Begin with simple contrasts: ''Although it is cold, I go for
        a walk.'' Then introduce ''despite + noun'': ''Despite the cold, I go for
        a walk.'''
      sequencing: 'Week 1: ''Although'' without ''but.'' Week 2: ''Although'' vs.
        ''but.'' Week 3: ''Although + clause'' vs. ''despite + noun phrase.'' Week
        4: ''Even though'' as alternative. Week 5: Mixed practice.'
      exercises:
      - name: Although But Error Correction
        type: error-correction
        description: Provide 10 sentences with 'although...but.' Students remove 'but.'
        duration: 15
      - name: Although vs Despite Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'although'
          (with clause) and 'despite/in spite of' (with noun phrase). Include mixed
          items to force the structural decision.
        duration: 15
