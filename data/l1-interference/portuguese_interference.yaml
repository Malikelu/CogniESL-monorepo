  look_sound_feel_smell_taste:
    interference_patterns:
    - pattern: Use of 'be' where sense verb is needed
      example_portuguese: A comida e boa.
      example_gloss: The food is good.
      example_wrong: The food is good.
      example_correct: The food tastes good.
      explanation: 'Portuguese uses ''ser/estar'' for all sensory descriptions (a
        comida e boa = the food is good). English requires specific sense verbs for
        each sensory channel: look, sound, feel, smell, taste. Portuguese speakers
        default to ''be'' because their L1 does not lexicalize the sensory channel
        in the verb.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'have' where sense verb is needed
      example_portuguese: A casa tem um cheiro bom.
      example_gloss: The house has a good smell.
      example_wrong: The house has a good smell.
      example_correct: The house smells good.
      explanation: Portuguese uses ''ter'' (to have) in sensory expressions (tem um
        cheiro bom = has a good smell, tem um gosto estranho = has a strange taste).
        English uses the sense verb directly (smells good, tastes strange). Portuguese
        speakers transfer the ''ter + noun'' pattern and produce ''has a good smell''
        instead of ''smells good.'' This pattern is especially common with smell and
        taste.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''The food is good.'' (taste) Correct: ''The food tastes good.'''
    - 'Wrong: ''The house has a good smell.'' Correct: ''The house smells good.'''
    - 'Wrong: ''The music is nice.'' (sound) Correct: ''The music sounds nice.'''
    - 'Wrong: ''The fabric has a soft touch.'' Correct: ''The fabric feels soft.'''
    why_it_happens: 'Portuguese uses ''ser/estar'' as a general copula for all descriptions,
      so speakers default to ''be'' in English (the food is good instead of the food
      tastes good). Additionally, Portuguese uses ''ter'' (to have) in sensory expressions
      with a noun complement (tem um cheiro bom = has a good smell, tem um gosto estranho
      = has a strange taste). English uses the sense verb directly without a noun
      (smells good, tastes strange). Portuguese speakers transfer both patterns: overusing
      ''be'' for all sensory descriptions and using ''have + noun'' where English
      uses a single sense verb. Both patterns are documented in Swan & Smith (2001)
      and Azevedo (1996).'
    teacher_tips:
      how_to_explain: 'Teach the five sense verbs: look, sound, feel, smell, taste.
        Show that English uses these instead of ''be'' for sensory descriptions. Also
        show that English does NOT use ''have'' for sensory descriptions — ''It smells
        good'' not ''It has a good smell.'' Use a 2x3 grid: rows = look/sound/feel
        and smell/taste, columns = wrong (be/have) vs. right (sense verb).'
      where_to_start: 'Begin with food: ''It tastes good, It smells delicious.'' Then
        move to textures: ''It feels soft, It feels rough.'' Then sounds: ''It sounds
        good, It sounds terrible.'' Finally sights: ''It looks nice, It looks expensive.'''
      sequencing: 'Week 1: Sense verbs vs. ''be'' (all five senses). Week 2: Sense
        verbs vs. ''have + noun'' (focus on smell and taste). Week 3: Each sense verb
        individually with authentic contexts (food, music, fabric, weather). Week
        4: Mixed practice and production.'
      exercises:
      - name: Sense Verb Drill
