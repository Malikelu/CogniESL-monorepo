  order_of_adjectives:
    interference_patterns:
    - pattern: Post-nominal adjective placement
      example_portuguese: Uma casa bonita grande.
      example_gloss: A house beautiful big.
      example_wrong: A house beautiful big.
      example_correct: A big beautiful house.
      explanation: Portuguese places most adjectives after the noun. English places
        all adjectives before the noun in a specific order.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Reversed adjective order
      example_portuguese: Um carro vermelho bonito.
      example_gloss: A car red beautiful.
      example_wrong: A car red beautiful.
      example_correct: A beautiful red car.
      explanation: 'English has a strict adjective order: opinion-size-age-shape-color-origin-material-purpose.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''A house beautiful.'' Correct: ''A beautiful house.'''
    - 'Wrong: ''A car red beautiful.'' Correct: ''A beautiful red car.'''
    - 'Wrong: ''A dress long blue.'' Correct: ''A long blue dress.'''
    why_it_happens: 'Portuguese places most adjectives after the noun (uma casa bonita
      = a beautiful house), while English places all adjectives before the noun. When
      multiple adjectives are used, English follows a strict order: opinion-size-age-shape-color-origin-material-purpose.'
    teacher_tips:
      how_to_explain: 'Teach the English adjective order mnemonic: OSASCOMP (Opinion,
        Size, Age, Shape, Color, Origin, Material, Purpose). Give examples: ''a beautiful
        big old round red Brazilian wooden dining table.'''
      where_to_start: 'Begin with the basic rule: ALL adjectives go BEFORE the noun
        in English.'
      sequencing: 'Week 1: Single adjectives before nouns. Week 2: Two-adjective order.
        Week 3: Three or more adjectives. Week 4: OSASCOMP rule and practice.'
      exercises:
      - name: Adjective Rearrangement
        type: transformation
        description: Give 10 Portuguese noun phrases with post-nominal adjectives.
          Students rearrange into correct English order.
        duration: 15
      - name: OSASCOMP Ordering
        type: fill-in-the-blank
        description: Provide 15 sets of adjectives. Students arrange them in correct
          order before a noun.
        duration: 15
