  time_clauses:
    interference_patterns:
    - pattern: Use of 'will' in time clauses with future reference
      example_portuguese: Quando eu chegar, eu ligo.
      example_gloss: When I arrive, I call.
      example_wrong: When I will arrive, I will call.
      example_correct: When I arrive, I will call.
      explanation: Portuguese uses the future subjunctive (futuro do subjuntivo) in
        time clauses introduced by 'quando', 'antes que', 'depois que', 'até que',
        'enquanto', and 'assim que'. The future subjunctive maps semantically to a
        future event, so Portuguese speakers transfer this future marking directly
        into English using 'will'. English time clauses use the present simple for
        future reference — 'will' is never used in the time clause itself. This is
        one of the most persistent errors for Portuguese speakers because the future
        subjunctive is obligatory in Portuguese time clauses, making the English
        present-simple rule feel counterintuitive.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Use of 'will have' (future perfect) instead of present perfect in
        completion time clauses
      example_portuguese: Quando eu tiver terminado, eu ligo.
      example_gloss: When I have finished, I call.
      example_wrong: When I will have finished, I will call you.
      example_correct: When I have finished, I will call you.
      explanation: Portuguese uses the future perfect (futuro do composto do subjuntivo)
        in time clauses to express completion before a future event ('quando eu tiver
        terminado'). English uses the present perfect (not the future perfect) in
        time clauses to express completion — 'when I have finished', not 'when I will
        have finished'. Portuguese speakers transfer the future perfect from their L1,
        producing 'when I will have finished' instead of 'when I have finished'. This
        error is documented in ESL teaching references as a common L1 transfer issue
        for speakers of languages that mark future completion morphologically in
        subordinate clauses.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''When I will arrive, I will call.'' Correct: ''When I arrive, I will
      call.'''
    - 'Wrong: ''When I will have finished, I will call you.'' Correct: ''When I have
      finished, I will call you.'''
    - 'Wrong: ''As soon as you will get here, we will start.'' Correct: ''As soon as
      you get here, we will start.'''
    why_it_happens: Portuguese has a dedicated future subjunctive tense (futuro do
      subjuntivo) that is obligatory in time clauses introduced by 'quando' (when),
      'antes que' (before), 'depois que' (after), 'até que' (until), 'enquanto'
      (while), and 'assim que' (as soon as). This tense morphologically marks the
      action as future and unrealized, which feels like it should map to English
      'will'. However, English time clauses use the present simple for future reference
      — a rule that contradicts the Portuguese system. Additionally, Portuguese uses
      the future perfect subjunctive ('quando eu tiver terminado') for completion
      before a future event, while English uses the present perfect ('when I have
      finished') — not the future perfect. The combination of these two structural
      differences makes time clauses a high-frequency, persistent error area for
      Portuguese speakers. The error is reinforced because Portuguese also uses the
      future indicative ('quando eu chegar' → 'when I arrive') in some constructions,
      creating confusion about which English tense maps to which Portuguese form.
    teacher_tips:
      how_to_explain: >-
        Write the GOLDEN RULE on the board: NO WILL in time clauses.
        Underline WHEN, BEFORE, AFTER, UNTIL, AS SOON AS, WHILE. Show that English
        uses PRESENT in the time clause and FUTURE in the main clause. For completion
        clauses, teach: present perfect (not future perfect) after time conjunctions.
        'When I have finished' -- NOT 'When I will have finished.'
      where_to_start: >-
        Begin with 'when' + present simple for future events. Drill
        the pattern: When + PRESENT, WILL + verb. Then introduce 'before', 'after',
        'until', 'as soon as'. Finally, teach present perfect in completion clauses.
      sequencing: >-
        Week 1: 'When' clauses with present simple (future meaning). Week
        2: 'Before', 'after', 'until', 'as soon as'. Week 3: Present perfect
        in completion time clauses ('when I have finished'). Week 4: Mixed practice
        with error correction.
      exercises:
      - name: Time Clause Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with time clauses. Students must choose
          between present simple, present perfect, and 'will' forms.
        duration: 15
      - name: Future Subjunctive Transfer Error Correction
        type: error-correction
        description: Provide 10 sentences written by a Portuguese speaker using 'will'
          in time clauses. Students identify and correct each error, explaining why
          the present tense is used instead.
        duration: 15
      - name: Portuguese to English Time Clause Translation
        type: translation
        description: Give 10 Portuguese sentences using the future subjunctive in time
          clauses. Students translate into correct English, avoiding 'will' in the
          time clause.
        duration: 15
      - name: Completion Clause Discrimination
        type: sentence-rewrite
        description: Provide 8 sentences with future perfect in time clauses. Students
          rewrite using present perfect. Include a mix of 'when', 'before', 'after',
          and 'until' clauses.
        duration: 10
