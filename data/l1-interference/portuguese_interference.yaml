      example_portuguese: Voce deve estudar mais.
      example_gloss: You should study more.
      example_wrong: You must study more.
      example_correct: You should study more.
      explanation: Portuguese 'dever' covers both strong obligation and advice. English
        'should' is softer advice; 'must' is stronger obligation.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of 'should not' for prohibition where 'must not' is stronger
      example_portuguese: Voce nao deve fumar.
      example_gloss: You should not smoke.
      example_wrong: You should not smoke.
      example_correct: You must not smoke.
      explanation: Portuguese 'nao dever' covers both mild advice and prohibition.
        English 'should not' is mild advice; 'must not' is prohibition.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''You must study more.'' (advice) Correct: ''You should study more.'''
    - 'Wrong: ''You should not smoke.'' (prohibition) Correct: ''You must not smoke.'''
    why_it_happens: Portuguese 'dever' covers a wide range of obligation and advice,
      from mild suggestion to strong command. English distinguishes 'should' (advice/recommendation)
      from 'must' (strong obligation) from 'must not' (prohibition). Portuguese speakers
      overuse 'must' because 'dever' covers all these meanings.
    teacher_tips:
      how_to_explain: 'Teach the strength scale: ''should'' = advice (you should study),
        ''must'' = strong obligation (you must wear a seatbelt), ''must not'' = prohibition
        (you must not smoke).'
      where_to_start: 'Begin with ''should'' for advice: ''You should study more,
        You should eat healthier.'''
      sequencing: 'Week 1: ''Should'' for advice. Week 2: ''Must'' for strong obligation.
        Week 3: ''Must not'' for prohibition. Week 4: Mixed practice.'
      exercises:
      - name: Should vs Must Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'should'
          and 'must.'
        duration: 15
      - name: Advice or Obligation Sort
        type: categorization
        description: Give 20 scenario cards (e.g., 'A doctor tells a patient to quit
          smoking,' 'A friend suggests studying for a test,' 'A sign says NO PARKING').
          Students sort each into advice (should), obligation (must), or prohibition
          (must not) and write the correct sentence.
        duration: 20
