  discourse_markers_advanced:
    interference_patterns:
    - pattern: Overuse of 'so' and 'then' as universal connectors due to Portuguese
        'entao' covering both meanings
      example_portuguese: Entao, eu acho que devemos mudar de plano.
      example_gloss: So/then, I think that we should change of plan.
      example_wrong: So, we should change the plan. Then, we should change the plan.
        So, we should change the plan.
      example_correct: So, we should change the plan. Then, we changed the plan. Therefore,
        we should reconsider.
      explanation: Portuguese 'entao' functions as both a sequential marker ('then')
        and a result/conclusion marker ('so/therefore'). English requires distinct
        markers for sequence (then), result (so), and conclusion (therefore). Portuguese
        speakers overuse 'so' and 'then' interchangeably, producing flat, repetitive
        discourse in English essays and presentations. This is compounded by the fact
        that Portuguese 'pois' and 'porque' both map onto English 'because/so', further
        narrowing the range of connectors used.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Topic-fronting without discourse markers, producing abrupt or unconnected
        transitions
      example_portuguese: Esse problema, eu ja falei com o gerente.
      example_gloss: This problem, I already spoke with the manager.
      example_wrong: This problem, I already spoke with the manager.
      example_correct: As for this problem, I've already spoken with the manager. /
        Regarding this problem, I've already raised it with the manager.
      explanation: Portuguese freely fronts topic elements to sentence-initial position
        without requiring a discourse marker (Swan & Smith 2001, p.121, example Cakes
        I like). English permits topicalization but typically marks it with discourse
        markers such as 'as for', 'regarding', 'when it comes to', or 'turning to'.
        Portuguese speakers transfer the unmarked topic-comment structure directly,
        producing sentences that sound abrupt, disconnected, or note-like in English
        academic and professional writing. This is especially noticeable in essay
        introductions and presentation transitions.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Underuse of hedging and concessive discourse markers in formal contexts
      example_portuguese: Eu discordo. Voce esta errado.
      example_gloss: I disagree. You are wrong.
      example_wrong: I disagree. You are wrong. The data is wrong.
      example_correct: I beg to differ. You may be mistaken. However, the data appears
        to suggest otherwise.
      explanation: Portuguese discourse tends toward directness in argumentation, especially
        in Brazilian Portuguese. English academic and professional discourse requires
        hedging markers (however, nevertheless, having said that, that said, be that
        as it may) to signal concession and counter-argument. Portuguese speakers often
        produce overly direct arguments in English, omitting the concessive-counter
        structure that English expects (concession → counter-argument). This can be
        perceived as rude or aggressive in academic and professional settings. Parrott
        (2010, Ch.23) identifies this as a key functional gap for Romance-language
        learners.
      frequency: 3
      persistence: 3
      communicative_impact: 4
    examples:
    - 'Wrong: So, I finished the report. So, I sent it to the client. So, he approved
      it. Correct: So, I finished the report. Then, I sent it to the client. As a result,
      he approved it.'
    - 'Wrong: This topic, I have nothing to say. Correct: As for this topic, I have
      nothing further to add. / Regarding this topic, I have no comment at this time.'
    - 'Wrong: Your idea is interesting. But it will not work. Correct: Your idea is
      interesting. Having said that, I do not think it is feasible. / That said, I
      have some concerns about its practicality.'
    why_it_happens: Portuguese and English organize discourse differently at the
      connector and pragmatic levels. First, Portuguese has fewer distinct discourse
      markers for logical relationships — 'entao' covers both sequence and result,
      'pois' and 'porque' both mean 'because', and 'mas' covers both 'but' and 'however'.
      This many-to-one mapping means Portuguese speakers use a narrower range of
      connectors in English, overusing 'so', 'then', and 'but' (Swan & Smith 2001,
      pp. 112-126). Second, Portuguese syntax permits free topic-fronting without
      discourse markers (Azevedo 1996, Cambridge University Press), so learners
      transfer unmarked topic-comment structures into English where markers like
      'as for' or 'regarding' are expected. Third, Portuguese pragmatic norms favor
      directness in argumentation, while English academic and professional discourse
      requires hedged concessive structures (however, nevertheless, having said that)
      to manage face and signal politeness (Parrott 2010, Ch.23). These three factors
      combine to produce Portuguese-English discourse that sounds repetitive, abrupt,
      and overly direct to native English listeners.
    teacher_tips:
      how_to_explain: 'Teach discourse markers by FUNCTION, not as a flat list. Create
        four columns on the board: ADDITION (furthermore, moreover, in addition), CONTRAST
        (however, on the other hand, by contrast), RESULT/CONCLUSION (therefore, consequently,
        as a result, so), and CONCESSION (nevertheless, having said that, that said,
        be that as it may). Show that Portuguese ''entao'' splits into at least three
        English categories. For topic-fronting, show that English needs a ''launch pad''
        phrase: ''As for X...'', ''Regarding X...'', ''When it comes to X...''. For
        hedging, teach the three-stage argument structure: (1) acknowledge, (2) concede,
        (3) counter-argue.'
      where_to_start: Begin with the so/then/therefore distinction since this is the
        highest-frequency error. Use a short student essay and have them identify every
        'so' and 'then', then decide if each one is correct or needs to be replaced.
      sequencing: 'Week 1: Result vs. sequence connectors (so vs. then vs. therefore
        vs. consequently). Week 2: Topic-fronting markers (as for, regarding, when it
        comes to, turning to). Week 3: Concession and hedging (however, nevertheless,
        having said that, that said, be that as it may). Week 4: Contrast markers
        (on the other hand, by contrast, conversely, whereas). Week 5: Addition markers
        (furthermore, moreover, in addition, what is more). Week 6: Integrated practice
        — students write a full argumentative essay using at least 8 different discourse
        markers from different functional categories.'
      exercises:
      - name: Connector Audit
        type: error-correction
        description: Students receive a 200-word essay written by a fictional Portuguese
          speaker. They identify every discourse marker, classify its function, and
          replace overused or incorrect markers with appropriate alternatives, aiming
          to find and fix at least 8 issues.
        duration: 20
      - name: Topic-Fronting Transformation
        type: sentence-rewrite
        description: Give 12 Portuguese-style topic-fronted sentences (e.g., 'This
          problem, I discussed yesterday'). Students rewrite each using an appropriate
          English discourse marker (As for this problem... / Regarding this problem...
          / When it comes to this problem...).
        duration: 15
      - name: Hedging Insertion
        type: sentence-rewrite
        description: Provide 10 direct, unhedged argument statements. Students must
          add appropriate concessive and hedging discourse markers to make them sound
          appropriately diplomatic for academic/professional English.
        duration: 15
      - name: Functional Discourse Marker Sorting
        type: matching
        description: Give 30 discourse marker cards. Students sort them into functional
          categories (addition, contrast, result, concession, topic-shift, summarising).
          Then write one example sentence for each marker.
        duration: 15
      - name: Argument Essay with Discourse Marker Requirement
        type: free-writing
        description: Students write a 300-word argumentative essay on a given topic,
          using at least 8 different discourse markers from at least 4 different
          functional categories. Peer review checks for appropriate usage.
        duration: 30
