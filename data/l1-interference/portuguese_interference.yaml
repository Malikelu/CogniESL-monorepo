  parentheticals:
    interference_patterns:
    - pattern: Use of parenthetical expressions without commas
      example_portuguese: E claro ele nao veio.
      example_gloss: Is clear he not came.
      example_wrong: Is clear he did not come.
      example_correct: Of course, he did not come.
      explanation: Portuguese parenthetical expressions such as 'e claro' (of course),
        'nao e' (isn't it), 'eu acho' (I think) are typically written without commas
        separating them from the main clause. English requires commas to set off parenthetical
        expressions from the main clause. Portuguese speakers omit these commas because
        their L1 does not mark parentheticals with punctuation in the same way.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Sentence-initial parenthetical verbs without comma and with wrong word order
      example_portuguese: Eu acho que ele nao veio.
      example_gloss: I think that he not came.
      example_wrong: I think that he did not come.
      example_correct: He did not come, I think.
      explanation: Portuguese places opinion/comment verbs ('eu acho', 'eu creio', 'nao
        sei') at the beginning of the sentence as a matter of course. English can front
        these but more commonly places them as a trailing parenthetical with a comma
        ('He did not come, I think'). Portuguese speakers produce 'I think that he did
        not come' where a native speaker would more naturally say 'He did not come, I
        think' or use a different parenthetical structure entirely. The transfer involves
        both word order and the overuse of 'that' after parenthetical verbs.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: Is clear he did not come. Correct: Of course, he did not come.'
    - 'Wrong: I think that he did not come. Correct: He did not come, I think.'
    - 'Wrong: She is tired no? Correct: She is tired, isn''t she?'
    why_it_happens: Portuguese does not use commas to set off parenthetical expressions
      the way English does. Expressions like 'e claro' (of course), 'eu acho' (I think),
      'nao e' (isn't it), and 'pois' (well/then) flow directly into the main clause
      in Portuguese writing and speech without punctuation boundaries. Additionally,
      Portuguese routinely places comment clauses sentence-initially ('eu acho que...',
      'eu creio que...') as the default discourse strategy, whereas English more often
      uses trailing parentheticals ('..., I think,' '..., I believe') or integrates
      them differently. The combination of comma omission and word-order transfer from
      Portuguese produces English sentences that sound unnatural even when grammatically
      parseable. Both patterns are documented in Swan & Smith (2001) for Portuguese
      speakers and in Azevedo (1996) regarding Portuguese clause structure and discourse
      organization.
    teacher_tips:
      how_to_explain: 'Write a Portuguese parenthetical sentence on the board without
        commas: "E claro ele nao veio." Ask students: "Where does the comment end and
        the main sentence begin? In English, we need a comma to show this." Then show
        the English version: "Of course, he did not come." For the second pattern, write
        "I think that he did not come" and "He did not come, I think." Ask: "Which sounds
        more natural in English? The second one — we put the comment at the end with
        a comma."'
      where_to_start: 'Begin with the most common parenthetical expressions: of course,
        I think, I believe, isn''t it, you know, well. Teach the comma rule first,
        then address word order.'
      sequencing: 'Week 1: Common parenthetical expressions and comma placement. Week
        2: Sentence-initial vs. sentence-final parentheticals. Week 3: Tag questions
        as parentheticals (nao e? -> isn''t it?). Week 4: Mixed practice in writing
        and speaking.'
      exercises:
      - name: Comma Insertion with Parentheticals
        type: error-correction
        description: 'Provide 15 sentences with parenthetical expressions but no commas. Students identify the parenthetical and insert commas in the correct positions. Include sentence-initial, mid-sentence, and sentence-final parentheticals.'
        duration: 15
      - name: Parenthetical Word Order Restructuring
        type: sentence-rewrite
        description: 'Give 10 Portuguese-style sentence-initial parenthetical sentences. Students rewrite each with the parenthetical in a more natural English position (usually trailing with a comma).'
        duration: 15
      - name: Parenthetical Translation Challenge
        type: translation
        description: 'Provide 10 Portuguese sentences using eu acho que, e claro, nao e, pois, bem. Students translate into natural English, paying attention to comma placement and parenthetical position.'
        duration: 15
