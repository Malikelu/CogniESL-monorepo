  would_rather_prefer:
    interference_patterns:
    - pattern: Use of 'would prefer' with gerund instead of infinitive
      example_portuguese: Eu preferiria ficar.
      example_gloss: I would prefer to stay.
      example_wrong: I would prefer staying.
      example_correct: I would prefer to stay.
      explanation: Portuguese 'preferir' takes a direct infinitive complement (preferir
        ficar = to prefer to stay). English 'prefer' alone can take gerund, but 'would
        prefer' strongly prefers the infinitive. Portuguese speakers overgeneralize
        the gerund after 'would prefer' because Portuguese infinitives and English
        gerunds are both non-finite verb forms, creating a formal overlap.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of past tense after 'would rather' instead of base verb
      example_portuguese: Eu preferiria sair agora.
      example_gloss: I would prefer to leave now.
      example_wrong: I would rather left now.
      example_correct: I would rather leave now.
      explanation: Portuguese 'preferiria' is morphologically a conditional (past
        tense form of 'preferir'). Portuguese speakers map this past morphology onto
        English 'would rather' and use a past tense verb after it ('would rather left')
        instead of the base form ('would rather leave'). English 'would rather' requires
        a bare infinitive, not a past tense form. Documented in Swan & Smith (2001)
        and Celce-Murcia & Larsen-Freeman (1999).
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I would prefer staying.'' Correct: ''I would prefer to stay.'''
    - 'Wrong: ''I would rather left now.'' Correct: ''I would rather leave now.'''
    why_it_happens: Portuguese 'preferir' takes a direct infinitive complement and
      its conditional form 'preferiria' is morphologically past tense. English 'would
      prefer' takes an infinitive (not gerund), and 'would rather' takes a bare infinitive
      (not past tense). Portuguese speakers transfer (1) the gerund as a non-finite
      form equivalent to the Portuguese infinitive, and (2) the past tense morphology
      of 'preferiria' onto the verb following 'would rather.' Both patterns are documented
      in Swan & Smith (2001) and Celce-Murcia & Larsen-Freeman (1999).
    teacher_tips:
      how_to_explain: 'Teach two rules: (1) ''would prefer + to + verb'' (not gerund).
        (2) ''would rather + base verb'' (not past tense). Write ''Eu preferiria sair''
        on the board and show: the Portuguese verb looks past, but English uses the
        base form after ''would rather'': ''I would rather leave,'' not ''left.'''
      where_to_start: 'Begin with ''would prefer to + verb'': ''I would prefer to
        stay.'' Then introduce ''would rather + base verb'': ''I would rather stay.''
        Emphasize that ''would rather'' is followed by the SAME form as the infinitive
        without ''to'' — never past tense.'
      sequencing: 'Week 1: ''Would prefer to + verb.'' Week 2: ''Would rather + base
        verb.'' Week 3: Contrast the two structures. Week 4: Error correction with
        both patterns.'
      exercises:
      - name: Would Prefer Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students use 'would prefer to + verb.'
        duration: 10
      - name: Would Rather Base Verb Correction
        type: error-correction
        description: Provide 10 sentences where 'would rather' is incorrectly followed
          by a past tense verb. Students correct to base form.
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course (2nd ed.). Heinle & Heinle.'
