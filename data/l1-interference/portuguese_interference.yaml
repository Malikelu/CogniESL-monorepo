  modals_overview:
    interference_patterns:
    - pattern: Use of 'can' for obligation (ter que / ter de)
      example_portuguese: Eu tenho que terminar isso hoje.
      example_gloss: I have to finish this today.
      example_wrong: I can finish this today.
      example_correct: I have to finish this today.
      explanation: Portuguese 'ter que' (to have to) expresses external obligation.
        Portuguese speakers sometimes map it to 'can' because 'poder' (can) is the
        first modal they learn, and they overgeneralize it to all modal contexts.
        English 'can' expresses ability or permission, not obligation. 'Have to' or
        'must' is required for obligation.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Overuse of 'must' for advice and possibility (dever)
      example_portuguese: Voce deve descansar mais.
      example_gloss: You should rest more.
      example_wrong: You must rest more.
      example_correct: You should rest more.
      explanation: Portuguese 'dever' covers a wide semantic range from strong obligation
        to mild advice, similar to both 'must' and 'should' in English. Portuguese
        speakers tend to default to 'must' for all uses of 'dever', producing overly
        strong statements where English requires 'should' or 'ought to.' For example,
        'Voce deve descansar' (you should rest) becomes 'You must rest,' which sounds
        like a command rather than advice.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'may' for probability (poder + infinitive)
      example_portuguese: Ele pode estar em casa.
      example_gloss: He may be at home.
      example_wrong: He can be at home.
      example_correct: He may be at home. / He might be at home.
      explanation: Portuguese 'poder' expresses both ability (can) and probability
        (may/might). When used to express uncertainty about a present situation ('Ele
        pode estar em casa' = He may/might be at home), Portuguese speakers often
        choose 'can,' which in English expresses ability, not probability. English
        requires 'may' or 'might' for epistemic possibility.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''I can finish this today.'' (obligation) Correct: ''I have to finish
      this today.'''
    - 'Wrong: ''You must rest more.'' (advice) Correct: ''You should rest more.'''
    - 'Wrong: ''He can be at home.'' (probability) Correct: ''He may be at home.'''
    why_it_happens: 'Portuguese has three core modal expressions with broad, overlapping
      semantic ranges: ''poder'' (ability, permission, possibility), ''dever'' (obligation,
      advice, probability), and ''ter que'' (external obligation). English splits
      these meanings across a larger set of modal verbs (can, could, may, might, must,
      should, ought to, have to, be able to) with sharper boundaries between them.
      Portuguese speakers face a one-to-many mapping problem: each Portuguese modal
      corresponds to multiple English modals depending on context. The result is overgeneralization
      of the first English modal learned (usually ''can'') and failure to distinguish
      between obligation (must/have to), advice (should/ought to), and possibility
      (may/might/could). This is one of the most persistent areas of Portuguese L1
      interference because the modal systems are fundamentally organized differently.
      Swan & Smith (2001) identify modal verb confusion as a core Portuguese learner
      error, and Azevedo (1996) documents the broad semantic range of Portuguese ''poder''
      and ''dever'' as the source of the mapping problem.'
    teacher_tips:
      how_to_explain: 'Draw a 3-column chart on the board: Portuguese | Meaning |
        English. Fill in: poder | ability = can/could; poder | permission = can/may;
        poder | possibility = may/might/could; dever | strong obligation = must; dever
        | advice = should/ought to; ter que | external obligation = have to. Show
        that ONE Portuguese word = MULTIPLE English words depending on meaning. Drill
        with context sentences: ''She ___ swim'' (ability = can), ''She ___ be at
        home'' (possibility = may), ''She ___ study tonight'' (obligation = has to).'
      where_to_start: 'Begin with the ability vs. obligation contrast since these
        are the most frequent and most consequential errors. Use physical demonstrations:
        pick up a chair (''I can lift this'' = ability) vs. point at homework (''I
        have to do this'' = obligation).'
      sequencing: 'Week 1: Ability (can/could) vs. Obligation (must/have to). Week
        2: Permission (can/may) vs. Advice (should/ought to). Week 3: Possibility
        (may/might/could) — epistemic modals. Week 4: Mixed practice with context
        clues. Week 5: Register and politeness (could you vs. can you).'
      exercises:
      - name: Modal Meaning Sort
        type: sorting
        description: Give 20 English sentences with modals. Students sort them by
          meaning — ability, permission, obligation, advice, possibility. Then they
          identify which Portuguese modal (poder/dever/ter que) each meaning comes
          from.
        duration: 15
      - name: Portuguese-to-English Modal Translation
        type: translation
        description: Provide 15 Portuguese sentences using poder, dever, and ter que
          in different contexts. Students translate each, choosing the correct English
          modal based on meaning. Include at least 3 sentences where the same Portuguese
          word requires different English modals.
        duration: 20
      - name: Context Clue Modal Selection
        type: fill-in-the-blank
        description: 'Provide 20 sentences with blanks and context clues. Students
          select the correct modal from a choice of 3. Example: "The doctor said I
          ___ rest." (must/should/can) — answer: should (advice, not command).'
        duration: 15
      - name: Error Correction - Modal Overgeneralization
        type: error-correction
        description: Provide 15 sentences where Portuguese speakers have used the
          wrong modal (e.g., ''You must try this cake'' for advice). Students identify
          the error and correct it, explaining why the original is too strong/weak.
        duration: 15
