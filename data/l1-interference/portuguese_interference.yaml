  gerunds_infinitives:
    interference_patterns:
    - pattern: Use of infinitive where gerund is required
      example_portuguese: Eu gosto de nadar.
      example_gloss: I like of to swim.
      example_wrong: I like to swim.
      example_correct: I like swimming. / I like to swim.
      explanation: Portuguese uses 'de + infinitivo' after 'gostar.' English uses
        either gerund or infinitive after 'like,' but the meaning differs slightly.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of gerund where infinitive is required
      example_portuguese: Eu parei de fumar.
      example_gloss: I stopped to smoke.
      example_wrong: I stopped smoking.
      example_correct: I stopped smoking.
      explanation: Portuguese uses 'de + infinitivo' after 'parar.' English 'stop
        + gerund' means to cease an action; 'stop + infinitive' means to pause in
        order to do something.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''I stopped smoking.'' (meaning paused to smoke) Correct: ''I stopped
      to smoke.'''
    - 'Wrong: ''I remember to lock the door.'' (future) Correct: ''I remember locking
      the door.'' (past)'
    why_it_happens: 'Portuguese uses the infinitive after many verbs that require
      the gerund in English (stop, remember, forget, try). The choice between gerund
      and infinitive in English often changes the meaning: ''stop smoking'' (quit)
      vs. ''stop to smoke'' (pause in order to smoke). Portuguese speakers must learn
      which form each verb requires.'
    teacher_tips:
      how_to_explain: Create a list of verbs that take gerund (stop, remember, forget,
        try, enjoy, finish, mind, practice) and verbs that take infinitive (want,
        need, plan, hope, decide, agree, refuse, promise). Teach the meaning difference
        for verbs that can take both.
      where_to_start: 'Begin with the most common errors: stop, remember, forget.'
      sequencing: 'Week 1: Verbs that take gerund. Week 2: Verbs that take infinitive.
        Week 3: Verbs that can take both (meaning changes). Week 4: Mixed practice.'
      exercises:
      - name: Gerund vs Infinitive Decision
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose between gerund
          and infinitive.
        duration: 15
      - name: Meaning Change Drill
        type: sentence-rewrite
        description: Give 10 sentences with verbs that can take both forms. Students
          rewrite to show both meanings.
        duration: 15
