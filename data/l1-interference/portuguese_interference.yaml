  reported_commands: &id008
    interference_patterns:
    - pattern: Use of 'said' instead of 'told' for reported commands
      example_portuguese: Ele me disse para estudar.
      example_gloss: He me said to study.
      example_wrong: He said me to study.
      example_correct: He told me to study.
      explanation: "Portuguese 'dizer' (to say) is used for both statements and commands
        with an indirect object ('Ele me disse para estudar' = He told me to study). English
        requires 'tell' (not 'say') when there is a person receiving the command. Portuguese
        speakers transfer 'dizer' directly as 'say', producing 'He said me to study.'"
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Double-object construction with reporting verbs without preposition
      example_portuguese: Ela me explicou o problema.
      example_gloss: She me explained the problem.
      example_wrong: She explained me the problem.
      example_correct: She explained the problem to me.
      explanation: Portuguese allows a double-object construction where the indirect object
        pronoun (me, te, lhe) is placed directly after the verb without a preposition (Ela me
        explicou o problema). English requires the indirect object to be introduced by 'to'
        when it follows the direct object (She explained the problem to me). Portuguese
        speakers transfer the double-object order and produce 'She explained me the problem.'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Use of 'say to + person' instead of 'tell + person' for commands
      example_portuguese: Ele disse para mim estudar.
      example_gloss: He said to me to study.
      example_wrong: He said to me to study.
      example_correct: He told me to study.
      explanation: "Portuguese uses 'dizer para alguem' (say to someone) for reported
        commands. English uses 'tell + person' (no preposition) for commands and 'say to
        + person' only for statements. Portuguese speakers transfer the 'dizer para'
        structure as 'say to', producing 'He said to me to study' instead of 'He told me
        to study.' This is a distinct error from the double-object pattern above -- here
        the speaker correctly avoids the double-object but uses the wrong verb + preposition."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: He said me to study. Correct: He told me to study.'
    - 'Wrong: She explained me the problem. Correct: She explained the problem to me.'
    - 'Wrong: He said to me to study. Correct: He told me to study.'
    - 'Wrong: The teacher said us to be quiet. Correct: The teacher told us to be quiet.'
    why_it_happens: >
      Portuguese has one verb 'dizer' (to say) that covers both English 'say' and 'tell'.
      In Portuguese, 'dizer' can take a direct object and an indirect object pronoun without
      any preposition (Ele me disse = He told/said to me). English splits this into two verbs
      with different argument structures. 'Tell' requires a person as its first object (tell
      someone something), while 'say' requires 'to' before the person (say something to
      someone). For reported commands specifically, English uses only 'tell' (tell someone
      to do something), never 'say' (not *'say someone to do something'). Portuguese speakers
      face a triple challenge: choosing 'tell' over 'say' for commands, placing the person
      directly after 'tell' without 'to', and avoiding the double-object construction that
      Portuguese allows with verbs like 'explain' and 'ask'. The error is persistent because
      'dizer' is one of the most frequent verbs in Portuguese, and its argument structure
      is deeply automatized.
    teacher_tips:
      how_to_explain: >
        Write on the board: TELL + PERSON + TO + VERB. Underline TELL and PERSON. Say:
        "In English, commands use TELL, not SAY. And the person goes RIGHT AFTER tell --
        no preposition." Contrast: "He told me to study" (command) vs "He said to me
        that..." (statement). Drill: Give a direct command ("Study!"), then say "He told
        me to study." Then give a statement ("It's true"), then say "He said to me that
        it is true." Show that SAY needs TO before the person, but TELL does not.
      where_to_start: >
        Begin with the tell/say distinction using classroom commands. "The teacher told
        me to sit down" (not "said me"). Use real classroom situations to make it memorable.
      sequencing: >
        Week 1: Tell + person + to + verb (affirmative commands). Week 2: Tell + person
        + not to + verb (negative commands -- "She told me not to worry"). Week 3: Say vs
        tell contrast for statements ("He said to me that..." vs "He told me that...").
        Week 4: Double-object correction with explain, ask, give ("Explain it to me" not
        "Explain me it"). Week 5: Mixed practice -- commands, statements, and double-object
        verbs.
      exercises:
      - name: Tell or Say Decision
        type: fill-in-the-blank
        description: >
          Provide 15 sentences with a blank where the reporting verb should be. Students
          must choose between 'tell' and 'say' and use the correct structure. Include both
          commands and statements. Example: 'He ___ me to close the door.' (told) /
          'He ___ to me that it was true.' (said).
        duration: 15
      - name: Direct to Reported Command Transformation
        type: transformation
        description: >
          Give 10 direct commands (e.g., 'Sit down!', 'Don't touch that!'). Students
          rewrite each as reported speech using 'tell + person + to/not to + verb'.
          Provide the reporting context: 'The teacher said...' to 'The teacher told us
          to sit down.'
        duration: 15
      - name: Double-Object Error Correction
        type: error-correction
        description: >
          Provide 12 sentences with double-object errors transferred from Portuguese.
          Students identify and correct each error. Examples: 'She explained me the
          lesson' to 'She explained the lesson to me'; 'He gave me it' to 'He gave it
          to me'. Include verbs like explain, ask, give, show, tell.
        duration: 15
      - name: Reported Command Role Play
        type: role-play
        description: >
          In pairs, Student A gives a direct command (e.g., 'Open the window!'). Student
          B reports it to Student C: 'Ana told me to open the window.' Then rotate roles.
          Teacher monitors for tell/say errors and double-object errors. Debrief common
          mistakes as a class.
        duration: 20
      - name: Portuguese to English Translation Drill
        type: translation
        description: >
          Give 10 Portuguese sentences using 'dizer' for commands and double-object
          constructions. Students translate into correct English, choosing the right
          reporting verb and word order. Examples: 'Ele me disse para estudar' to
          'He told me to study'; 'Ela me explicou o problema' to 'She explained the
          problem to me'; 'Ele disse para mim que era verdade' to 'He told me it was true.'
        duration: 15
