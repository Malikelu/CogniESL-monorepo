  participial_clauses_advanced:
    interference_patterns:
    - pattern: Dangling participles — participial clause with different subject from main
        clause
      example_portuguese: Chegando em casa, a porta estava aberta.
      example_gloss: Arriving at home, the door was open.
      example_wrong: Arriving at home, the door was open.
      example_correct: When I arrived home, the door was open.
      explanation: Portuguese allows participial clauses (gerund clauses) whose implied
        subject differs from the main clause subject. In ''Chegando em casa, a porta
        estava aberta,'' the participle ''chegando'' (arriving) logically refers to
        a person, but the main clause subject is ''a porta'' (the door). English strictly
        requires the participial clause subject to match the main clause subject. Portuguese
        speakers transfer this flexible subject assignment, producing dangling participles.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Confusion of present vs. past participle in reduced relative and adverbial
        clauses
      example_portuguese: A carta, escrita ontem, chegou hoje.
      example_gloss: The letter, written yesterday, arrived today.
      example_wrong: The letter, writing yesterday, arrived today.
      example_correct: The letter, written yesterday, arrived today.
      explanation: Portuguese participles (participio passado) are used in passive and
        adverbial constructions that map imperfectly onto English present (-ing) and
        past (-ed/en) participles. Portuguese speakers may use a present participle
        where English requires a past participle (passive meaning) or vice versa, especially
        in reduced relative clauses and adverbial participle constructions. The Portuguese
        system does not distinguish active vs. participle voice as rigidly as English.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: Arriving at home, the door was open. Correct: When I arrived home, the
      door was open.'
    - 'Wrong: Walking to school, the rain started. Correct: While I was walking to
      school, the rain started.'
    - 'Wrong: The letter, writing yesterday, arrived today. Correct: The letter, written
      yesterday, arrived today.'
    - 'Wrong: The cake, baking in the oven, smelled delicious. Correct: The cake,
      baked in the oven, smelled delicious.'
    why_it_happens: "Portuguese gerund/participial clauses (orações reduzidas de gerúndio) allow the implied subject of the participial clause to differ from the main clause subject — a construction that is grammatically acceptable in Portuguese but produces dangling participles in English. Additionally, Portuguese has a less rigid distinction between active (gerúndio) and passive (participio passado) participial forms in adverbial and relative clause reductions. English requires strict subject identity between the participial phrase and the main clause, and a clear active (-ing) vs. passive (-ed/en) participle distinction. Portuguese speakers transfer both the flexible subject assignment and the less rigid voice distinction, producing two characteristic error types: dangling participles and present/past participle confusion in reduced clauses."
    teacher_tips:
      how_to_explain: 'Write a dangling participle on the board: ''Walking to school,
        the rain started.'' Ask: ''Who was walking? The rain?'' Explain: the subject
        of the -ing clause MUST be the same as the subject of the main clause. Then
        teach the active/passive distinction: ''-ing = the thing DOES the action; -ed
        = the thing RECEIVES the action.'' Use a two-column chart: ''The letter, writing
        (active?) No — the letter was WRITTEN (passive) → written.'''
      where_to_start: 'Begin with identifying subjects in participial clauses. Use simple pairs: "Sitting in the chair, I read a book" (correct — I am sitting) vs. "Sitting in the chair, the book fell" (wrong — the book is not sitting).'
      sequencing: 'Week 1: Subject identity rule for participial clauses. Week 2: Dangling
        participle error correction. Week 3: Present vs. past participle in reduced
        relative clauses. Week 4: Combined practice — identifying and correcting both
        error types.'
      exercises:
      - name: Dangling Participle Fix
        type: error-correction
        description: Provide 10 sentences with dangling participles. Students must
          rewrite each sentence correctly by either changing the main clause subject
          or converting the participial clause to a full adverbial clause (When I...,
          While she was...).
        duration: 15
      - name: Present or Past Participle Choice
        type: fill-in-the-blank
        description: Provide 15 reduced relative clause sentences where students must
          choose between present participle (-ing) and past participle (-ed/en) based
          on active vs. passive meaning.
        duration: 15
      - name: Participial Clause Translation
        type: translation
        description: Give 10 Portuguese sentences with participial/gerund clauses.
          Students translate into correct English, applying subject identity and
          active/passive participle rules.
        duration: 20
      - name: Sentence Combining with Participles
        type: sentence-rewrite
        description: Provide 10 pairs of simple sentences. Students combine each pair
          into one sentence using a participial clause, ensuring correct subject
          matching and participle form.
        duration: 15
