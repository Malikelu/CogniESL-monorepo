  modals_possibility:
    interference_patterns:
    - pattern: Use of 'can' for specific possibility where 'could/might' is needed
      example_portuguese: Ele pode estar em casa agora.
      example_gloss: He can be at home now.
      example_wrong: He can be at home now.
      example_correct: He could be at home now. / He might be at home now.
      explanation: Portuguese 'poder' covers all levels of possibility — general and
        specific — with a single form. English uses 'can' for general possibility
        ('It can rain in April') but requires 'could' or 'might' for specific present
        or future situations ('He might be at home now'). Portuguese speakers overuse
        'can' for specific possibility because their L1 does not distinguish the two
        with separate modal forms.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'can' in 'it can be that' constructions where English uses 'may/might'
        for hypothetical possibility
      example_portuguese: Pode ser que ele esteja doente.
      example_gloss: It can be that he is sick.
      example_wrong: It can be that he is sick.
      example_correct: He may be sick. / It might be that he is sick.
      explanation: Portuguese 'pode ser que' + subjunctive expresses hypothetical
        possibility and is used frequently in both spoken and written Portuguese.
        English does not use 'can' in impersonal hypothetical constructions. Instead,
        English uses 'may,' 'might,' or 'it might be that.' Portuguese speakers translate
        'pode ser que' literally as 'it can be that,' which sounds unnatural and overly
        direct to English listeners. This pattern is documented in Swan & Smith (2001)
        as a characteristic Romance-language transfer error in epistemic modal usage.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''He can be at home now.'' (specific situation) Correct: ''He might
      be at home now.'''
    - 'Wrong: ''It can be that he is sick.'' Correct: ''He may be sick.'' / ''It might
      be that he is sick.'''
    - 'Wrong: ''She can be tired after the trip.'' Correct: ''She might be tired after
      the trip.'''
    why_it_happens: Portuguese 'poder' is a single modal verb that covers the entire
      spectrum of possibility — from general truths to specific present/future speculation.
      English splits this semantic space across 'can' (general), 'could' (specific/weaker),
      'might' (tentative), and 'may' (formal possibility). Portuguese speakers default
      to 'can' because it is the first and most frequent modal they learn, and because
      their L1 form 'poder' does not require a form change for different degrees of
      possibility. The 'pode ser que' construction further compounds this issue, as
      it is a high-frequency Portuguese pattern that maps literally onto the ungrammatical
      English 'it can be that.'
    teacher_tips:
      how_to_explain: 'Draw a POSSIBILITY SCALE on the board: CAN (general) → COULD
        (specific) → MIGHT (tentative). Show that Portuguese uses ''poder'' for all
        three, but English changes the word. For ''pode ser que,'' teach the direct
        English equivalent: ''It might be that...'' or ''...may...'' — never ''it
        can be that'' for hypothetical meaning.'
      where_to_start: Begin with general possibility vs. specific possibility using
        concrete scenarios. 'It can snow in January' (general truth) vs. 'It might
        snow tonight' (specific forecast). Then introduce 'pode ser que' → 'might/may'
        transformations.
      sequencing: 'Week 1: ''Can'' for general possibility. Week 2: ''Could/might''
        for specific possibility. Week 3: ''Pode ser que'' → ''may/might'' (hypothetical).
        Week 4: Mixed practice — students choose the correct modal based on context.'
      exercises:
      - name: Possibility Modal Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose the correct possibility
          modal (can/could/might/may) based on context clues indicating general vs.
          specific possibility.
        duration: 15
      - name: Pode Ser Que Transformation
        type: translation
        description: Give 10 Portuguese sentences using ''pode ser que'' + subjunctive.
          Students translate into natural English using ''may,'' ''might,'' or ''it
          might be that'' — never ''can.''
        duration: 15
