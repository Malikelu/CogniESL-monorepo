      example_portuguese: Eu vou comer pizza hoje a noite.
      example_gloss: I go eat pizza tonight.
      example_wrong: I go eat pizza tonight.
      example_correct: I am going to eat pizza tonight.
      explanation: Portuguese expresses future with the periphrastic construction
        'ir (conjugated) + infinitive' (vou comer = I am going to eat). Portuguese
        speakers often transfer this literally as 'go + verb' (I go eat) instead of
        the English 'be going to + verb' form. This error is especially common at
        beginner and low-intermediate levels and persists because the Portuguese 'ir
        + infinitive' is the default future expression in spoken Brazilian Portuguese.
