  hedging:
    interference_patterns:
    - pattern: Use of direct assertions where English requires hedged epistemic stance
      example_portuguese: Eu acho que voce esta errado.
      example_gloss: I think that you are wrong.
      example_wrong: I think you are wrong.
      example_correct: I think you might be wrong. / It appears that this is incorrect.
      explanation: Portuguese discourse norms tolerate direct disagreement and unqualified
        assertions, especially in professional and academic contexts. English pragmatics
        requires speakers to soften claims with epistemic hedges (might, may, could,
        it seems, it appears, arguably) to signal politeness and intellectual caution.
        Portuguese speakers transfer the directness norm, producing statements that
        sound blunt, overconfident, or confrontational to English listeners — even
        when no such tone is intended.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Overuse of "I think" as a universal hedge where English demands
        stronger epistemic modifiers
      example_portuguese: Eu acho que isso nao vai funcionar.
      example_gloss: I think that this is not going to work.
      example_wrong: I think this is not going to work. / I think the data shows the
        policy is ineffective.
      example_correct: It seems that this may not work. / The evidence suggests the
        policy may be ineffective.
      explanation: Portuguese "eu acho que" (I think that) is used broadly as a stance
        marker across all registers, from casual conversation to formal presentations.
        In English, "I think" signals personal opinion and can weaken an argument in
        academic/professional contexts. English requires more impersonal hedges — "it
        appears that," "the evidence suggests," "it could be argued that," "one might
        conclude" — to convey authority and epistemological distance. Portuguese speakers
        overuse "I think" as a direct translation of "eu acho que," producing statements
        that sound unsubstantiated or lacking confidence to English-native evaluators
        (e.g., supervisors, peer reviewers, clients).
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: I think you are wrong. Correct: It appears that this may need revision.'
    - 'Wrong: I think the project will fail. Correct: The data suggests the project
      may face significant risks.'
    - 'Wrong: I think this is a bad approach. Correct: This approach could potentially
      present some challenges.'
    - 'Wrong: I think the results are incorrect. Correct: The results appear to be
      inconsistent with the expected outcomes.'
    why_it_happens: Portuguese and English differ fundamentally in how they encode
      epistemic stance (the speaker's degree of certainty toward a claim). Portuguese
      discourse norms, particularly in Brazilian Portuguese, allow and even expect
      direct expression of opinion and disagreement — "eu acho que voce esta errado"
      (I think you are wrong) is pragmatically normal and not considered rude. English
      academic and professional registers operate on a negative-politics principle (Brown
      & Levinson 1987) where direct assertions threaten the listener's face and must
      be softened with hedges. Portuguese speakers transfer their L1 pragmatic norms,
      producing utterances that are grammatically correct but pragmatically inappropriate
      — sounding overconfident, blunt, or unprofessional. Additionally, Portuguese
      "eu acho que" functions as a general-purpose stance marker across all registers,
      while English reserves "I think" for informal contexts and requires more formal
      impersonal hedges in writing and presentations. This pragmatic transfer is documented
      for Portuguese ESL learners in Swan & Smith (2001) and is consistent with broader
      findings on Romance-language directness vs. Anglo hedging in contrastive pragmatics
      (Azevedo 1996; Salsbury & Bardovi-Harlig 2001 on modal hedging development).
    teacher_tips:
      how_to_explain: '''Hedging'' means making your statements softer so they don''t
        sound too strong or rude. In Portuguese you can say directly: ''Eu acho que
        voce esta errado.'' But in English, especially at work or in school, that sounds
        too strong. Instead we say: ''I think you might be wrong,'' or ''It seems like
        this may not be the best approach.'' Use these words to soften: MIGHT, MAY,
        COULD, IT SEEMS, IT APPEARS, ARGUABLY, PERHAPS, POTENTIALLY.'
      where_to_start: 'Begin with the concept of "softening." Give students a direct
        Portuguese opinion ("Este projeto esta errado" / "This project is wrong") and
        show 4-5 increasingly softer English versions. Rank them from most direct to
        most hedged.'
      sequencing: 'Week 1: Concept of hedging and softening. Introduce might/may/could.
        Week 2: Impersonal hedges (it seems, it appears, arguably). Week 3: Hedging
        in academic writing (the evidence suggests, one might argue). Week 4: Hedging
        in professional emails and meetings. Week 5: Practice choosing the right level
        of hedging for different contexts.'
      exercises:
      - name: Hedging Scale Ranking
        type: ranking
        description: Give 5 direct statements. Students rewrite each one at 3 levels of
          hedging (mild, moderate, strong) and rank them by politeness/softness.
        duration: 15
      - name: Direct-to-Hedged Transformation
        type: sentence-rewrite
        description: Provide 10 direct Portuguese-English transfer sentences. Students
          rewrite each with appropriate hedging for (a) a casual conversation and
          (b) a professional email or academic paper.
        duration: 20
      - name: Context Register Matching
        type: matching
        description: Students match 10 hedged statements to the appropriate context
          (text message to friend, office email, academic essay, board presentation)
          and explain why the level of hedging is appropriate or not.
        duration: 15
