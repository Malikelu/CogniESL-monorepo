  peripheral_phenomena:
  peripheral_phenomena:
    interference_patterns:
    - pattern: Transfer of single Portuguese question tag to varied English tags
      example_portuguese: Eles querem ir às sete horas, não é?
      example_gloss: They want to go at seven o'clock, isn't it?
      example_wrong: They want to go at seven o'clock, isn't it?
      example_correct: They want to go at seven o'clock, don't they?
      explanation: Portuguese uses a single invariant question tag "não é (verdade)?" for all persons, tenses, and auxiliaries. English requires the tag to match the auxiliary and subject of the main clause (don't they?, isn't she?, can't we?). Portuguese speakers default to "isn't it?" as a universal tag, producing errors like "They want to go, isn't it?" instead of "don't they?" This is one of the most persistent and frequent transfer errors for Portuguese speakers.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Use of existential "haver/ter" instead of "there is/are"
      example_portuguese: Há muitas pessoas aqui.
      example_gloss: Has many people here.
      example_wrong: Has many people here. / Exists many people here.
      example_correct: There are many people here.
      explanation: Portuguese expresses existence with "haver" (EP, always singular) or "ter" (BP, colloquial), both meaning roughly "have/exist." English uses the presentational "there is/are" construction. Portuguese speakers transfer the verb directly, producing "Has many people here" or "Exists many people here" instead of "There are many people here." The error persists because Portuguese haver/ter is a single high-frequency verb, while English "there is/are" is a multi-word construction with agreement rules.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Declarative word order in exclamations with "how"
      example_portuguese: Como ele é inteligente!
      example_gloss: How he is intelligent!
      example_wrong: How he is intelligent!
      example_correct: How intelligent he is!
      explanation: "Portuguese forms exclamations with 'como' (how) using standard declarative word order. English exclamations with 'how' require subject-auxiliary inversion after the fronted exclamative phrase. Portuguese speakers transfer the declarative order, producing 'How he is intelligent!' which sounds unnatural in English."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion with archaic/fixed English expressions due to L1 formulaic inventory
      example_portuguese: Deus salve o rei.
      example_gloss: God save the king.
      example_wrong: God saves the king.
      example_correct: God save the king.
      explanation: English archaic formulaic subjunctives (God save the king, Long live the Queen, Be that as it may) use the base verb form with third-person subjects, which looks like a grammatical error to learners. Portuguese has its own archaic formulaic expressions (from Biblical and literary Portuguese) that follow different patterns. Portuguese speakers may "correct" English archaic forms to match modern indicative patterns, producing "God saves the king" instead of the formulaic subjunctive "God save the king." Conversely, they may avoid these expressions entirely because they are not part of their L1 formulaic inventory.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: They want to go, isn''t it? Correct: They want to go, don''t they?'
    - 'Wrong: Has many people here. Correct: There are many people here.'
    - 'Wrong: How he is intelligent! Correct: How intelligent he is!'
    - 'Wrong: God saves the king. Correct: God save the king.'
    why_it_happens: Portuguese and English differ systematically in how they handle peripheral grammatical phenomena. For question tags, Portuguese uses a single invariant tag "não é?" while English requires auxiliary-subject matching. For existential constructions, Portuguese uses haver/ter (have/exist) while English uses the presentational "there is/are" with subject-verb agreement. For exclamations, Portuguese retains declarative word order after "como" while English requires inversion after fronted "how + adjective." For archaic/fixed expressions, both languages have formulaic survivals from earlier stages, but the specific forms differ, leading learners to either over-correct English archaic forms or avoid them entirely. These patterns are documented in Swan & Smith (2001) Learner English (Portuguese section, pp. 112-126) and in Huddleston & Pullum (2002) The Cambridge Grammar of the English Language (chapters on clause types, inversion, and the subjunctive).
    teacher_tips:
      how_to_explain: 'For question tags: Write "não é?" on the board. Explain that English has MANY tags, not just one. Create a matching chart: "isn''t it / aren''t they / don''t you / can''t we / won''t she." For existentials: Show that "there is/are" is a fixed phrase — "there" is not a place word here. For exclamations: Show the pattern — "How + ADJECTIVE + subject + verb!" For archaic forms: Explain these are "frozen" expressions — they don''t follow normal rules. Treat them like vocabulary, not grammar.'
      where_to_start: 'Begin with question tags since these are the highest-frequency error. Use a simple matching exercise: main clause → correct tag. Then move to existentials (there is/are vs. has). Exclamations and archaic forms can be taught later as receptive-only at lower levels.'
      sequencing: 'Week 1: Question tags — auxiliary matching (isn''t it → don''t they, can''t she, won''t you). Week 2: Existential there is/are vs. has. Week 3: Exclamations with how/what — inversion practice. Week 4: Archaic/fixed expressions — recognition only. Week 5: Mixed practice and error correction.'
      exercises:
      - name: Question Tag Matching
        type: matching
        description: Provide 15 main clauses. Students write the correct question tag for each. Include a mix of auxiliaries (be, do, can, will, have) and subjects (I, you, he, she, it, we, they).
        duration: 15
      - name: Isn't It? Tag Overgeneralization Correction
        type: error-correction
        description: Provide 10 sentences where "isn't it?" is incorrectly used as a universal tag. Students identify the error and write the correct tag.
        duration: 10
      - name: Existential Translation
        type: translation
        description: Give 10 Portuguese sentences using há/ter for existence. Students translate using "there is/are" with correct agreement.
        duration: 15
      - name: Exclamation Inversion
        type: sentence-rewrite
        description: Provide 8 Portuguese-style exclamations with declarative order (e.g., "How he is tall!"). Students rewrite with correct English inversion ("How tall he is!").
        duration: 10
      - name: Archaic Expression Recognition
        type: matching
        description: Give 10 archaic/fixed English expressions (God save the king, Be that as it may, If need be, Come what may, So be it). Students match each to its modern paraphrase. Discuss why the "grammar looks wrong."
        duration: 15
