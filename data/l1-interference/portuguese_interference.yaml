  frequency_adverbs:
    interference_patterns:
    - pattern: Placement of frequency adverbs after the main verb
      example_portuguese: Ele chega sempre atrasado.
      example_gloss: He arrives always late.
      example_wrong: He arrives always late.
      example_correct: He always arrives late.
      explanation: Portuguese places frequency adverbs after the verb (Ele chega sempre
        atrasado). English places them before the main verb (He always arrives late).
        Portuguese speakers transfer the post-verb placement directly, producing "He
        arrives always late" instead of "He always arrives late."
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Double negation with 'never' (transfer of Portuguese 'não...nunca')
      example_portuguese: Eu não vou nunca lá.
      example_gloss: I don't go never there.
      example_wrong: I don't never go there.
      example_correct: I never go there.
      explanation: Portuguese allows (and often requires) double negation with "nunca"
        preceded by "não" (Eu não vou nunca = I never go there). English forbids
        double negation with "never" — "never" alone carries the full negative meaning.
        Portuguese speakers transfer the "não...nunca" structure as "don't...never,"
        producing "I don't never go" instead of "I never go" or "I don't ever go."
        This is one of the most persistent and socially marked errors for Portuguese
        speakers.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - "Wrong: 'He arrives always late.' Correct: 'He always arrives late.'"
    - "Wrong: 'I don't never go there.' Correct: 'I never go there.'"
    - "Wrong: 'She doesn't never eat meat.' Correct: 'She never eats meat.'"
    why_it_happens: "Two distinct L1 transfer mechanisms are at work. (1) Portuguese
      places frequency adverbs after the verb (Ele chega sempre atrasado = He arrives
      always late), while English places them before the main verb (He always arrives
      late). (2) Portuguese uses double negation with \"nunca\" \u2014 the negative adverb
      \"nunca\" is preceded by \"n\u00e3o\" (Eu n\u00e3o vou nunca = I never go there). English
      \"never\" already contains the negative meaning and cannot be combined with \"don't.\"
      Portuguese speakers transfer the \"n\u00e3o...nunca\" structure as \"don't...never,\" producing
      \"I don't never go\" instead of \"I never go\" or \"I don't ever go.\" Both patterns
      are documented in Swan & Smith (2001) and Azevedo (1996)."
    teacher_tips:
      how_to_explain: "Rule 1: Frequency adverbs go BEFORE the main verb. \"He always
        arrives, She usually eats, They never come.\" Exception: after \"be\" — \"He is
        always late.\" Rule 2: \"Never\" is already negative. NEVER say \"don't never.\"
        \"Never\" = \"not ever.\" Drill: \"Eu não vou nunca\" → \"I NEVER go\" (not \"I don't
        never go\")."
      where_to_start: "Begin with placement: always, usually, often, sometimes, never
        before main verbs. Then introduce the double-negation trap: \"never\" is already
        negative, so \"don't never\" is wrong."
      sequencing: "Week 1: Frequency adverb placement before main verbs. Week 2: Frequency
        adverbs after \"be.\" Week 3: Double negation with \"never\" — \"don't never\" is
        always wrong. Week 4: \"Never\" vs. \"don't ever\" (both correct, \"don't never\"
        is wrong). Week 5: Mixed practice with both patterns."
      exercises:
      - name: Frequency Adverb Placement Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with the frequency adverb in parentheses.
          Students place it in the correct position (before the main verb or after
          "be").
        duration: 15
      - name: Double Negation Correction
        type: error-correction
        description: Provide 10 sentences with double negation errors using "never"
          (e.g., "I don't never eat breakfast"). Students rewrite each sentence correctly
          using either "never" alone or "don't ever."
        duration: 15
      - name: Portuguese to English Translation
        type: translation
        description: Give 10 Portuguese sentences using "sempre, nunca, às vezes, geralmente."
          Students translate into correct English, watching for adverb placement and
          double negation traps.
        duration: 20
