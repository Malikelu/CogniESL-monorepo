    notes: 'Portuguese has 243 GPs total. This entry covers the connotation grammar point. Three independent sources: contrastive
      teaching reference (Swan & Smith 2001), structural linguistics reference (Azevedo 1996), and crosslinguistic influence
      reference (Jarvis & Pavlenko 2008). Patterns cover (1) false friend (falsos amigos) transfer producing words with wrong
      connotative meaning, (2) ser/estar → -ing/-ed adjective pair confusion, (3) register mapping differences between Portuguese
      and English, (4) pragmatic directness transfer in evaluative language. Communicative impact is 5 (maximum) because connotation
      errors cause the speaker to say something they did not intend — the most damaging type of error since the speaker appears
      fluent but conveys the wrong message. This entry was upgraded from a stub (1 pattern, mismatched sources) to full v3.0
      with 4 patterns, specific examples, and properly matched sources.'
  contrast_clauses:
    interference_patterns:
    - Portuguese speakers overuse "while" as a general-purpose contrast conjunction in contexts where English requires "whereas"
      for formal/clarified contrast. Portuguese "enquanto" covers both temporal ("while I was eating") and contrastive
      ("while she prefers tea, I prefer coffee") meanings with no formal distinction, and Portuguese speakers transfer this
      undifferentiated usage to English. This produces errors in formal writing where "while" is ambiguous — e.g. "While the
      North is industrial, the South is agricultural" (acceptable but potentially ambiguous with temporal reading) instead of
      the unambiguous "Whereas the North is industrial, the South is agricultural." The overuse of "while" for contrast is
      the most frequent surface error.
    - Portuguese speakers produce "although...but" double-conjunction errors by transferring the Portuguese pattern "embora...mas"
      where both conjunctions co-occur. Portuguese allows and often prefers the emphatic concessive pair "embora [subjunctive]...mas..."
      (e.g. "Embora estivesse cansado, mas continuou trabalhando"). English strictly forbids "although...but" — only one
      conjunction is permitted per clause pair. This produces errors like "Although it was raining, but we went out" and
      "Although he is young, but he is very mature." This is among the most visible and persistent contrast/concessive errors
      for Portuguese speakers.
    - Portuguese speakers overuse "but" in formal and academic writing where English requires "whereas," "while," or "in contrast."
      Portuguese "mas" is register-neutral and works in all contexts, whereas English "but" is marked as informal in comparative
      and contrastive writing. Portuguese speakers produce errors like "The North is cold but the South is warm" in academic
      essays where English requires "The North is cold, whereas the South is warm" or "While the North is cold, the South is
      warm." The communicative impact is register inappropriateness rather than grammatical incorrectness.
    - Portuguese speakers struggle with the punctuation of contrast clauses, particularly the comma rule for "while" and "whereas"
      joining two independent clauses. Portuguese concessive clauses follow different punctuation norms — the subordinate clause
      is more freely positioned and the comma rules are less rigid. Portuguese speakers produce errors like "While I like coffee
      she likes tea" (missing comma), "I like coffee whereas, she likes tea" (misplaced comma), and "In contrast she likes tea"
      (missing comma after sentence connector). These punctuation errors are persistent because Portuguese punctuation rules
      for subordinate clauses differ systematically from English.
    why_it_happens: Portuguese has a conjunction system for contrast and concession that differs from English in four critical
      ways. (1) Portuguese "enquanto" is a single undifferentiated conjunction covering both temporal and contrastive meanings,
      whereas English splits this into "while" (ambiguous) and "whereas" (contrast-only). Portuguese speakers overuse "while"
      for contrast because "enquanto" does so natively. (2) Portuguese allows double conjunction marking in emphatic concessives
      ("embora...mas") while English strictly permits only one conjunction per clause pair. (3) Portuguese "mas" is register-neutral
      and works in all contexts, whereas English "but" is informal and English requires "whereas/while/in contrast" in formal
      comparative writing. (4) Portuguese punctuation for subordinate/concessive clauses is more flexible than English, leading
      to comma errors when the rigid English rules (comma after introductory while/whereas clause, comma after sentence connectors
      like "in contrast") are not applied. These four structural differences are deeply automatized from L1 acquisition and persist
      into advanced proficiency because contrast conjunctions are acquired early and used frequently in both languages.
    teacher_tips:
      how_to_explain: 'Use a four-column contrastive chart: (A) Portuguese contrast structure, (B) Literal English transfer
        (wrong/ambiguous), (C) Correct English equivalent, (D) Rule. Cover the four error zones: (1) enquanto → while/whereas
        distinction — use "whereas" for unambiguous contrast in formal writing; (2) embora...mas → although...but is WRONG —
        English allows only ONE conjunction; (3) mas in formal writing → use whereas/while/in contrast instead of but; (4) comma
        rules — always use a comma after introductory while/whereas clauses and after sentence connectors like "in contrast."
        Emphasize that English has a REGISTER SPLIT (but = informal, whereas = formal) and a MEANING SPLIT (while = ambiguous,
        whereas = contrast-only) that Portuguese lacks.'
      where_to_start: Start with the "while vs. "whereas" distinction since it is the most frequent error and the easiest
        to demonstrate. Show students an ambiguous "while" sentence and ask whether it means "during" or "but." Then move to
        the "although...but" double-conjunction error, which is the most visibly ungrammatical. Address register (but vs. whereas)
        third, and punctuation last.
      exercises:
      - name: While vs. whereas — disambiguation drill
        type: practice
        description: >
          Provide 15 sentences using "while" with contrastive meaning (e.g. "While the North is industrial,
          the South is agricultural"). For each, students must (a) identify whether "while" is ambiguous
          (could mean "during") or clear, (b) rewrite ambiguous sentences using "whereas" for clarity,
          (c) explain why "whereas" is preferred in formal writing. Include 5 sentences where "while"
          is clearly temporal and should NOT be changed.
        duration: 20
      - name: Double conjunction elimination — although...but
        type: error-correction
        description: Provide 15 sentences with the "although...but" double-conjunction error (e.g. "Although it was raining,
          but we went out", "Although he studied hard, but he failed the exam", "Although she is talented, but she lacks
          confidence"). Students must delete the incorrect conjunction and explain the rule — English allows only one concessive
          conjunction per clause pair. Include 5 correct sentences as distractors.
        duration: 15
      - name: Register transformation — but to whereas/while/in contrast
        type: practice
        description: Give students a short informal paragraph (100 words) comparing two cities, full of "but" as the contrast
          connector (e.g. "London is expensive. But Lisbon is affordable. But London has more jobs."). Students must rewrite
          the paragraph for an academic audience, replacing every "but" with "whereas," "while," or "in contrast" as appropriate.
          Discuss which replacements work best and why.
        duration: 20
      - name: Portuguese-to-English contrast clause translation
        type: drill
        description: Give 15 Portuguese sentences covering all four error zones — (1) "Enquanto o Norte é industrial, o Sul
          é agrícola" (enquanto → while/whereas), (2) "Embora estivesse cansado, mas continuou" (double conjunction), (3) "O
          Norte é frio mas o Sul é quente" (mas in formal context → whereas), (4) punctuation transfer errors. Students translate
          each into correct English, consciously applying the four rules.
        duration: 20
      - name: Contrast clause punctuation repair
        type: error-correction
        description: Provide 15 sentences with Portuguese-style punctuation errors for contrast clauses — missing commas after
          introductory clauses ("While I like coffee she likes tea"), misplaced commas ("I like coffee whereas, she likes
          tea"), missing commas after sentence connectors ("In contrast she prefers tea"), and run-on sentences ("The North
          is cold the South is warm"). Students identify each punctuation error and rewrite the sentence correctly.
        duration: 15
      - name: Contrast clause acceptability judgment — register and clarity
        type: practice
        description: Provide 20 English sentences with various contrast clause structures. Students rate each as (1) correct
          and appropriate for formal writing, (2) correct but informal (should use whereas/while instead of but), (3) ambiguous
          (while could mean during), or (4) incorrect (double conjunction, punctuation error). Include correct formal sentences,
          correct informal sentences, ambiguous "while" sentences, "although...but" errors, and punctuation errors. Discuss
          answers as a class.
        duration: 15
    examples:
    - 'Wrong: ''While the North is industrial, the South is agricultural.'' (ambiguous — could mean "during the time that")
      Correct: ''Whereas the North is industrial, the South is agricultural.'' (unambiguous contrast) Portuguese: ''Enquanto
      o Norte é industrial, o Sul é agrícola.'' — enquanto covers both meanings'
    - 'Wrong: ''Although it was raining, but we went out.'' (Portuguese: ''Embora estivesse chovendo, mas saímos.'' — double
      conjunction embora...mas) Correct: ''Although it was raining, we went out.'' / ''It was raining, but we went out.'' —
      English allows only ONE concessive conjunction'
    - 'Wrong: ''The North is cold but the South is warm.'' (informal register in academic writing) Correct: ''The North is
      cold, whereas the South is warm.'' / ''While the North is cold, the South is warm.'' Portuguese: ''O Norte é frio mas
      o Sul é quente.'' — mas is register-neutral'
    - 'Wrong: ''While I like coffee she likes tea.'' (missing comma — Portuguese punctuation transfer) Correct: ''While I like
      coffee, she likes tea.'' — English requires a comma after introductory while-clauses'
    - 'Wrong: ''In contrast she prefers tea.'' (missing comma after sentence connector) Correct: ''In contrast, she prefers
      tea.'' — English sentence connectors require a following comma'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents structural transfer errors including double conjunction marking with embora...mas,
      register-neutral mas overuse in formal writing, and enquanto ambiguity transfer to English while/whereas).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on subordination and
      conjunction systems — describes the Portuguese enquanto system covering both temporal and contrastive meanings, the
      embora...mas double conjunction pattern, and the register-neutral mas, explaining the structural basis for L1 transfer
      to English contrast clauses).'
