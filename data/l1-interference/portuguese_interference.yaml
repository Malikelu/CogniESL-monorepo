  time_adverbs:
    interference_patterns:
    - pattern: Placement of time adverbs at the beginning instead of end position
      example_portuguese: Ontem eu fui ao cinema.
      example_gloss: Yesterday I went to-the cinema.
      example_wrong: Yesterday I went to the cinema.
      example_correct: I went to the cinema yesterday.
      explanation: Portuguese freely places time adverbs at the beginning of the
        sentence (ontem eu fui = yesterday I went). English can place them at the
        beginning or end, but end position is more common in neutral statements.
        Portuguese speakers overuse the beginning position because Portuguese word
        order is freer and routinely fronts non-subject topic elements.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Adverbs and adverbial phrases separating verb from object
      example_portuguese: Eu gosto muito de samba.
      example_gloss: I like very much of samba.
      example_wrong: I like very much samba.
      example_correct: I like samba very much.
      explanation: Portuguese allows adverbs and adverbial phrases to separate a
        verb from its object (Eu gosto muito de samba = I like very much of samba).
        English does not normally place adverbials between a verb and its object.
        The correct order is verb + object + adverbial. Portuguese speakers transfer
        the split-verb-object pattern, producing sentences like "I like very much
        samba" or "I visited on Sunday afternoon her."
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of front position for frequency and time adverbs
      example_portuguese: Sempre eu chego cedo. / Normalmente eles vêm aqui.
      example_gloss: Always I arrive early. / Normally they come here.
      example_wrong: Always I arrive early. / Normally they come here.
      example_correct: I always arrive early. / They normally come here.
      explanation: Portuguese places frequency adverbs (sempre, normalmente, geralmente)
        before the verb or at the beginning of the sentence. English frequency adverbs
        go in mid-position (before the main verb, after auxiliaries), not at the
        front. Portuguese speakers transfer the front/freer placement, producing
        "Always I arrive early" instead of "I always arrive early." This is compounded
        by Portuguese having freer word order overall.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''Yesterday I went to the cinema.'' Correct: ''I went to the cinema
      yesterday.'' (front position is acceptable but marked/emphatic in English)'
    - 'Wrong: ''I like very much samba.'' Correct: ''I like samba very much.'''
    - 'Wrong: ''Always I arrive early.'' Correct: ''I always arrive early.'''
    - 'Wrong: ''I visited on Sunday afternoon her.'' Correct: ''I visited her on
      Sunday afternoon.'''
    why_it_happens: 'Portuguese word order is considerably freer than English. Portuguese
      routinely fronts non-subject elements for topic prominence (e.g., "Cakes I
      like!"), places time adverbs at the beginning of sentences, and allows adverbs
      to separate verbs from their objects (e.g., "Eu gosto muito de samba" = I like
      very much of samba). English has stricter word order rules. First, time adverbials
      most often go in end position, though front position is possible for emphasis.
      Second, frequency adverbs go in mid-position (before the main verb, after auxiliaries).
      Third, adverbials should not separate a verb from its object. Portuguese speakers
      transfer the freer L1 word order patterns, producing sentences with misplaced
      time adverbs, split verb-object pairs, and fronted frequency adverbs. These
      errors are documented in Swan & Smith (2001) for Portuguese learners and in
      Swan (2005) for general adverb placement rules.'
    teacher_tips:
      how_to_explain: 'Teach the three English adverb positions: front (emphatic),
        mid (frequency adverbs), end (time/place/manner). Write a wrong sentence
        on the board: ''I like very much samba.'' Ask: ''What is the verb? What is
        the object? Can we put the adverb between them? NO.'' Then teach: ''Verb
        + Object stay TOGETHER. Adverb goes AFTER: I like samba very much.'' For
        time adverbs: ''End position is neutral. Beginning position is emphatic.''
        For frequency adverbs: ''Mid-position: before the main verb, after be/auxiliaries.'''
      where_to_start: 'Begin with the verb+object together rule. Use classroom examples:
        ''I like English very much'' not ''I like very much English.'' Then introduce
        time adverb placement (end position). Then frequency adverb mid-position.'
      sequencing: 'Week 1: Verb + object together (no adverb between). Week 2: Time
        adverbs in end position. Week 3: Frequency adverbs in mid-position. Week 4:
        Front position for emphasis vs. neutral end position. Week 5: Mixed practice
        with all three patterns.'
      exercises:
      - name: Adverb Position Sort
        type: categorization
        description: Give 15 adverb cards (time, frequency, manner). Students sort
          them into front/mid/end position columns with example sentences.
        duration: 15
      - name: Verb-Object Protection Drill
        type: error-correction
        description: Provide 10 sentences where adverbs incorrectly separate verbs
          from objects. Students identify the error and rewrite correctly.
        duration: 15
      - name: Time Adverb Placement Drill
        type: sentence-rewrite
        description: Give 10 sentences with time adverbs at the beginning. Students
          rewrite with time adverbs at the end (neutral register).
        duration: 10
      - name: Frequency Adverb Mid-Position Practice
        type: fill-in-the-blank
        description: Provide 15 sentences with frequency adverbs in brackets. Students
          place them in correct mid-position (before main verb, after auxiliaries).
        duration: 15
      - name: Portuguese to English Adverb Translation
        type: translation
        description: Give 10 Portuguese sentences with freer adverb placement. Students
          translate into English with correct adverb positions.
        duration: 20
