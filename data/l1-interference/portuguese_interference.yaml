  first_conditional:
    interference_patterns:
    - pattern: Use of 'will' in the if-clause
      example_portuguese: Se eu tiver tempo, eu vou.
      example_gloss: If I have time, I will go.
      example_wrong: If I will have time, I will go.
      example_correct: If I have time, I will go.
      explanation: Portuguese can use the future subjunctive in the if-clause. English
        uses the present simple in the if-clause, never 'will.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'will' in the main clause (present tense used instead)
      example_portuguese: Se eu tiver tempo, eu vou.
      example_gloss: If I have time, I go.
      example_wrong: If I have time, I go.
      example_correct: If I have time, I will go.
      explanation: Portuguese often uses the present tense (vou = I go / I will go)
        in the main clause of a conditional, where English requires the modal 'will'
        to mark future meaning. Portuguese speakers may drop 'will' and use the bare
        present in the main clause, producing 'If I have time, I go' instead of 'If
        I have time, I will go.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''If I will have time, I will go.'' Correct: ''If I have time, I will
      go.'''
    - 'Wrong: ''If I have time, I go.'' Correct: ''If I have time, I will go.'''
    why_it_happens: Portuguese uses the future subjunctive (tiver) in the if-clause
      for future conditions. English uses the present simple (have) in the if-clause,
      never 'will.' Portuguese speakers may use 'will' in the if-clause. Additionally,
      Portuguese can express future meaning in the main clause with the present tense
      (eu vou = I go / I will go), while English requires the modal 'will' to mark
      future reference in the main clause of a first conditional. This leads Portuguese
      speakers to omit 'will' in the main clause, producing 'If I have time, I go'
      instead of 'If I have time, I will go.'
    teacher_tips:
      how_to_explain: 'Teach: ''will'' only goes in the MAIN clause, never in the
        if-clause. ''If I HAVE..., I WILL...'' Drill the two-part rule: (1) No will
        in the if-clause. (2) Must have will in the main clause.'
      where_to_start: 'Begin with simple first conditionals: ''If it rains, I will
        stay home.'' Contrast with the error: ''If it rains, I stay home'' (missing
        will) and ''If it will rain, I will stay home'' (will in if-clause).'
      sequencing: 'Week 1: First conditional structure (if + present, will + base).
        Week 2: ''Will'' only in main clause (not in if-clause). Week 3: Must include
        ''will'' in main clause (not bare present). Week 4: Mixed practice targeting
        both error types.'
      exercises:
      - name: First Conditional Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students use the first conditional correctly.
        duration: 15
      - name: Will Placement Correction
        type: error-correction
        description: Provide 15 sentences with will in the wrong clause or missing
          from the main clause. Students identify the error and rewrite correctly.
          Covers both 'will in if-clause' and 'missing will in main clause' errors.
        duration: 15
