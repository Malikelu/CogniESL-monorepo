  too_enough_infinitive:
    interference_patterns:
    - pattern: Use of 'very...to' instead of 'too...to' for excess + infinitive
      example_portuguese: E muito quente para beber.
      example_gloss: It is very hot to drink.
      example_wrong: It is very hot to drink.
      example_correct: It is too hot to drink.
      explanation: Portuguese uses 'muito + adjective + para + infinitive' to express
        excess that prevents an action (muito quente para beber = too hot to drink).
        Portuguese speakers transfer 'muito...para' as 'very...to,' losing the meaning
        of excess/impossibility. English 'too...to' conveys that the degree of the
        adjective makes the infinitive action impossible, whereas 'very...to' is
        ungrammatical in this context.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'too much/many' with adjectives instead of 'too + adjective'
      example_portuguese: E muito dificil para entender.
      example_gloss: It is too much difficult to understand.
      example_wrong: It is too much difficult to understand.
      example_correct: It is too difficult to understand.
      explanation: Portuguese 'muito' functions as both an intensifier (very/too) and
        a quantifier (much/many). Portuguese speakers may overgeneralize 'too much'
        as a universal intensifier, producing 'too much difficult' instead of 'too
        difficult.' This reflects the L1 ambiguity where 'muito' covers both domains.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Word order error with 'enough' before adjectives
      example_portuguese: E grande o suficiente para dirigir.
      example_gloss: It is big enough to drive.
      example_wrong: It is enough big to drive.
      example_correct: It is big enough to drive.
      explanation: Portuguese places 'suficiente' after the adjective (grande o suficiente
        = big enough). While English also places 'enough' after adjectives, Portuguese
        learners may overgeneralize from the 'enough + noun' pattern (enough money) and
        place 'enough' before the adjective as well, producing 'enough big.' The
        confusion arises because 'enough' has two different positions in English
        depending on whether it modifies a noun (pre-nominal) or adjective
        (post-adjectival).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Omission of infinitive marker 'to' after too/enough
      example_portuguese: E muito quente beber.
      example_gloss: It is too hot drink.
      example_wrong: It is too hot drink.
      example_correct: It is too hot to drink.
      explanation: In Portuguese, the infinitive after 'para' can sometimes be bare
        in colloquial speech, and the preposition 'para' itself may be omitted in
        certain constructions. Portuguese speakers may drop 'to' after too/enough,
        producing 'It is too hot drink' instead of 'It is too hot to drink.' This
        reflects L1 transfer where the infinitive marker is not always obligatory.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''It is very hot to drink.'' Correct: ''It is too hot to drink.'''
    - 'Wrong: ''It is enough big.'' Correct: ''It is big enough.'''
    - 'Wrong: ''It is too much difficult.'' Correct: ''It is too difficult.'''
    - 'Wrong: ''It is too hot drink.'' Correct: ''It is too hot to drink.'''
    - 'Wrong: ''She is very young to drive.'' Correct: ''She is too young to drive.'''
    why_it_happens: "The Portuguese-to-English transfer errors with too/enough + infinitive
      stem from three structural mismatches. First, Portuguese 'muito...para' maps
      onto English 'too...to' for expressing excess that prevents an action, but Portuguese
      speakers often translate 'muito' as 'very' rather than 'too,' losing the meaning
      of impossibility. Second, Portuguese 'muito' is ambiguous between intensifier
      and quantifier, leading to overgeneralization of 'too much' with adjectives.
      Third, English 'enough' has a split distribution — pre-nominal with nouns (enough
      money) but post-adjectival with adjectives (big enough) — which has no parallel
      in Portuguese where 'suficiente' consistently follows the word it modifies. Finally,
      Portuguese infinitives do not always require an overt marker equivalent to 'to,'
      leading to omission of the infinitive marker in English. These patterns are
      documented in Swan & Smith (2001) for Portuguese-speaking learners and in
      Azevedo (1996) for the structural properties of Portuguese degree expressions.
      The 'too...to' vs. 'very...to' confusion is one of the most persistent errors
      because the semantic distinction between intensification (very) and excess (too)
      is not grammatically marked in Portuguese through different lexical items in
      the same way."
    teacher_tips:
      how_to_explain: "Write two columns on the board: VERY (just a lot) vs. TOO (more
        than needed — impossible). Show: 'It is very hot' (I can still drink it) vs.
        'It is too hot to drink' (I cannot drink it). For enough, teach the rule:
        enough AFTER adjectives (big enough), enough BEFORE nouns (enough money).
        Drill the pattern: too + adjective + to + verb. Then: adjective + enough +
        to + verb."
      where_to_start: "Begin with 'too...to' for physical impossibility (too hot to
        drink, too young to drive). Use real classroom scenarios: 'The coffee is too
        hot to drink.' Then introduce 'enough' with adjectives: 'I am old enough to
        drive.'"
      sequencing: 'Week 1: too + adjective + to + verb (excess/impossibility). Week
        2: very vs. too — semantic distinction. Week 3: adjective + enough + to + verb.
        Week 4: enough + noun vs. adjective + enough. Week 5: too much/many + noun
        vs. too + adjective. Week 6: Mixed practice and error correction.'
      exercises:
      - name: Too or Very Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'too' and
          'very' based on context. Include scenarios where the action is possible (very)
          or impossible (too).
        duration: 15
      - name: Enough Word Order
        type: error-correction
        description: Give 12 sentences with 'enough' in the wrong position. Students
          identify the error and rewrite correctly. Mix adjective + enough, enough +
          noun, and enough + to + verb patterns.
        duration: 15
      - name: Too Enough Infinitive Translation
        type: translation
        description: Provide 10 Portuguese sentences using muito...para and suficiente
          constructions. Students translate into correct English using too/enough +
          infinitive patterns.
        duration: 15
      - name: Too Much vs Too Adjective Sort
        type: matching
        description: Give 20 phrases. Students sort into 'too + adjective' vs. 'too
          much/many + noun' and write a complete sentence for each.
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
    - 'Parrott, M. (2000). Grammar for English Language Teachers. Cambridge University
      Press.'
    source_count: 3
    source_type: literature
    frequency: 4
    persistence: 3
    communicative_impact: 3
