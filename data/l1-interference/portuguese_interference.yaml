  as_long_as:
    interference_patterns:
    - pattern: Use of 'while' where 'as long as' is needed (conditional meaning)
      example_portuguese: Eu vou enquanto voce for.
      example_gloss: I go while you go.
      example_wrong: I will go while you go.
      example_correct: I will go as long as you go.
      explanation: Portuguese 'enquanto' covers both 'while' (time) and 'as long as'
        (condition). English distinguishes these. Portuguese speakers use 'while' for
        both temporal and conditional meanings because 'enquanto' does not make this
        distinction.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'as long as' where 'while' is needed (temporal meaning)
      example_portuguese: Enquanto eu dormia, ele chegou.
      example_gloss: While I slept, he arrived.
      example_wrong: As long as I was sleeping, he arrived.
      example_correct: While I was sleeping, he arrived.
      explanation: The reverse error also occurs. Portuguese speakers who learn that
        'enquanto' = 'as long as' may overgeneralize and use 'as long as' for temporal
        (time-based) contexts where only 'while' is correct in English. 'As long as'
        implies a condition or requirement, creating confusion when used for simultaneous
        events.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I will go while you go.'' (condition) Correct: ''I will go as long
      as you go.'''
    - 'Wrong: ''As long as I was sleeping, he arrived.'' (time) Correct: ''While I
      was sleeping, he arrived.'''
    why_it_happens: 'Portuguese ''enquanto'' covers both ''while'' (time) and ''as
      long as'' (condition). English distinguishes: ''while'' = during the time that,
      ''as long as'' = provided that. Because ''enquanto'' is a single undivided concept
      in Portuguese, speakers map it to whichever English equivalent they learned first
      (often ''while''), producing errors in both directions — using ''while'' for
      conditions and ''as long as'' for temporal overlap.'
    teacher_tips:
      how_to_explain: 'Teach: ''while'' = time (while I was sleeping), ''as long as''
        = condition (as long as you study). Draw a two-column chart: TIME vs. CONDITION.
        Show that Portuguese ''enquanto'' fits in BOTH columns, but English requires
        different words.'
      where_to_start: 'Begin with the distinction: time vs. condition. Use timeline
        visuals for ''while'' and requirement scenarios for ''as long as.'''
      sequencing: 'Week 1: ''While'' for time. Week 2: ''As long as'' for condition.
        Week 3: Contrast — same Portuguese sentence, two English translations. Week
        4: Mixed practice with error correction.'
      exercises:
      - name: While vs As Long As Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students choose between 'while' and 'as
          long as.'
        duration: 15
      - name: Portuguese to English Translation
        type: translation
        description: Give 10 Portuguese sentences with 'enquanto.' Students must decide
          whether each requires 'while' or 'as long as' in English and translate accordingly.
        duration: 20
