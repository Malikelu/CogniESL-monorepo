  definite_article_overuse:
    interference_patterns:
    - pattern: Overuse of the with meals
      example_portuguese: O cafe da manha e importante.
      example_gloss: The breakfast is important.
      example_wrong: The breakfast is important (in general).
      example_correct: Breakfast is important.
      explanation: Portuguese uses the definite article with meals. English uses zero
        article.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Overuse of the with sports
      example_portuguese: O futebol e popular.
      example_gloss: The soccer is popular.
      example_wrong: The soccer is popular.
      example_correct: Soccer is popular.
      explanation: Portuguese uses the definite article with sports. English uses
        zero article.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Overuse of the with school subjects
      example_portuguese: A matematica e dificil.
      example_gloss: The mathematics is difficult.
      example_wrong: The mathematics is difficult.
      example_correct: Mathematics is difficult.
      explanation: Portuguese uses the definite article with school subjects and
        academic disciplines (a matematica, o ingles, a historia). English uses
        zero article with academic subjects when speaking generally.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: The breakfast is important. Correct: Breakfast is important.'
    - 'Wrong: The soccer is popular. Correct: Soccer is popular.'
    - 'Wrong: The mathematics is difficult. Correct: Mathematics is difficult.'
    why_it_happens: Portuguese uses the definite article with meals, sports, school
      subjects, and colors when referring to them in general terms. English treats
      these as uncountable or abstract generalities and uses zero article. In Portuguese,
      the definite article signals that the speaker is referring to the concept as
      a known, defined entity (o cafe da manha = the breakfast, a matematica = the
      mathematics). English does not mark general reference with articles in these
      contexts. This is a systematic transfer documented in contrastive analyses of
      Portuguese and English article systems (Azevedo 1996, Perini 2002).
    teacher_tips:
      how_to_explain: 'Create a poster: Always use THE in Portuguese, NO article in
        English. List categories: meals, sports, school subjects, colors.'
      where_to_start: 'Begin with sports: Eu jogo futebol = I play soccer.'
      sequencing: 'Week 1: Sports. Week 2: Meals. Week 3: School subjects. Week 4:
        Review.'
      exercises:
      - name: Category Article Sort
        type: matching
        description: Give 20 noun cards. Students sort into needs THE and no article
          piles.
        duration: 15
      - name: Article Drop Drill
        type: error-correction
        description: Provide 15 sentences with unnecessary 'the' before meals, sports,
          and school subjects. Students identify and remove the article.
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
    - 'Perini, M. (2002). Modern Portuguese: A Reference Grammar. Yale University
      Press.'
