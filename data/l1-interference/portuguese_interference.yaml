      example_portuguese: Eu nao sei o que voce quer.
      example_gloss: I not know what you want.
      example_wrong: I don't know what you want.
      example_correct: I don't know what you want.
      explanation: Portuguese embedded questions use declarative word order (o que
        voce quer = what you want). English also uses declarative word order in
        embedded questions (what you want), but Portuguese speakers sometimes
        hypercorrect and add do/does in embedded questions, producing "I don't know
        what do you want." This overgeneralization of the do-support rule from
        direct questions to indirect questions is a documented developmental error
        for Portuguese-speaking learners.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: What you want? Correct: What do you want?'
    - 'Wrong: Where you went? Correct: Where did you go?'
    - 'Wrong: I don''t know what do you want. Correct: I don''t know what you want.'
    why_it_happens: 'Portuguese forms all questions — both direct and embedded —
      by intonation alone, without requiring do-support or subject-auxiliary inversion.
      The question word simply replaces the questioned element in its canonical
      position (O que voce quer? = What you want?). English requires do/does/did
      insertion and inversion in direct object questions (What do you want?) but
      NOT in embedded questions (I know what you want). Portuguese speakers face
      a double challenge — they must learn to add do/does in direct questions, and
      then learn NOT to add it in embedded questions. This leads to two opposite
      errors: omission in direct questions and hypercorrection in embedded ones.
      Swan & Smith (2001) document this as a persistent error pattern for Portuguese
      speakers at all proficiency levels.'
    teacher_tips:
      how_to_explain: 'Write O que voce quer? on the board. Show that Portuguese
        keeps the same word order as a statement. Then rewrite: What do you want?
        Highlight the extra word DO that English requires. Then show the contrast:
        Direct question = What DO you want? Embedded = I know what you want (no DO).'
      where_to_start: 'Begin with what and where questions using do/does. Drill the
        pattern — Question word + do/does + subject + verb.'
      sequencing: 'Week 1: Direct object questions with do/does (what, where, when).
        Week 2: Direct object questions with did (past). Week 3: Embedded questions
        (no do-support). Week 4: Mixed direct vs. embedded practice. Week 5: Error
        correction with hypercorrection awareness.'
      exercises:
      - name: Object Question Drill
        type: transformation
        description: Give 10 statements. Students form direct object questions using
          what, where, when, who.
        duration: 15
      - name: Direct vs Embedded Question Sort
        type: sorting
        description: Provide 15 question sentences. Students sort into "direct question
          (needs do/does)" and "embedded question (no do/does)" and write the correct
          form for each.
        duration: 20
