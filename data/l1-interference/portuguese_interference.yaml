  subjunctive_confusion:
    interference_patterns:
    - pattern: Use of 'would' in the if-clause of conditional sentences
      example_portuguese: Se eu fosse rico, eu viajaria.
      example_gloss: If I were rich, I would travel.
      example_wrong: If I would be rich, I would travel.
      example_correct: If I were rich, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (fosse) in the if-clause
        and the conditional (viajaria) in the main clause. English uses the past
        subjunctive ('were') in the if-clause and 'would' in the main clause — never
        'would' in the if-clause. Portuguese speakers transfer the conditional auxiliary
        into the if-clause because the Portuguese imperfect subjunctive and conditional
        share the same stem, creating a false structural parallel.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of parallel verb forms in both clauses of conditionals
      example_portuguese: Se eu vejo eu digo / Se eu fosse visitava o museu.
      example_gloss: If I see I tell / If I went visited the museum.
      example_wrong: If I see him, I tell him. / If I went to London, I visited the
        British Museum.
      example_correct: If I see him, I will tell him. / If I went to London, I would
        visit the British Museum.
      explanation: "Modern spoken Portuguese allows parallel verb forms in both halves of conditional sentences (present-present, past-past). English requires an asymmetric structure where the if-clause uses a past form (subjunctive) while the main clause uses 'would' (conditional). Portuguese speakers transfer the parallel pattern, producing matching tenses in both clauses. Documented in Swan & Smith (2001) pp. 119-120."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''If I would be rich, I would travel.'' Correct: ''If I were rich, I
      would travel.'''
    - 'Wrong: ''If I see him, I tell him.'' (intended future) Correct: ''If I see
      him, I will tell him.'''
    - 'Wrong: ''If I went to London, I visited the museum.'' Correct: ''If I went
      to London, I would visit the museum.'''
    why_it_happens: "Portuguese has a fully productive subjunctive mood with distinct imperfect subjunctive forms (fosse, tivesse, etc.) used in conditional if-clauses. The Portuguese conditional is formed with a synthetic suffix (viajaria = would travel). In modern spoken Portuguese, parallel verb forms are increasingly accepted in both clauses of conditionals (present-present or past-past). English, by contrast, requires an asymmetric structure for unreal/hypothetical conditionals: past subjunctive in the if-clause + 'would' in the main clause. Portuguese speakers face two interference pressures: (1) the Portuguese conditional auxiliary maps onto English 'would', leading to '*if I would...' in the wrong clause, and (2) the Portuguese parallel conditional pattern transfers as matching tenses in both clauses. Both patterns are documented in Swan & Smith (2001) and Parrott (2000)."
    teacher_tips:
      how_to_explain: 'Teach the asymmetry rule: the if-clause and main clause NEVER
        have the same verb pattern in hypothetical conditionals. If-clause = past
        form (were/saw/had). Main clause = WOULD + verb. Drill: ''If I WERE..., I
        WOULD...'' and ''If I SAW..., I WOULD...''. Contrast with real conditionals:
        ''If I SEE him, I WILL tell him.'' (present + will, not past + would).'
      where_to_start: 'Begin with the most common error (''would'' in if-clause). Use a simple rule: WOULD lives in the MAIN clause only. Never in the IF clause. Then introduce the parallel-form error with past-past conditionals.'
      sequencing: 'Week 1: ''Would'' only in main clause (not in if-clause). Week 2:
        ''Were'' for all persons in unreal if-clauses. Week 3: Parallel form error —
        past in if-clause requires WOULD in main clause, not another past. Week 4: Real
        vs. unreal conditionals contrasted. Week 5: Mixed practice.'
      exercises:
      - name: Subjunctive Confusion Drill
        type: error-correction
        description: Provide 10 sentences with 'would' in the if-clause. Students
          correct them by removing 'would' and using the correct past subjunctive form.
        duration: 15
      - name: Parallel Form Conditional Repair
        type: sentence-rewrite
        description: Give 10 conditional sentences with parallel verb forms in both
          clauses (e.g., 'If I went to London, I visited the museum'). Students rewrite
          each with the correct asymmetric English structure (past in if-clause, would
          in main clause).
        duration: 15
      - name: Real vs. Unreal Conditional Sort
        type: matching
        description: Provide 15 if-clauses. Students sort them into real (present/future)
          and unreal (hypothetical) categories, then complete each with the correct
          main clause structure.
        duration: 15
