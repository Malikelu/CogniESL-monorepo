  reflexive_pronouns:
    interference_patterns:
    - pattern: Omission of reflexive pronoun
      example_portuguese: Eu levanto cedo.
      example_gloss: I wake-up early.
      example_wrong: I wake-up early.
      example_correct: I wake up early. / I get up early.
      explanation: Portuguese uses reflexive verbs (levantar-se = to get up) where
        English uses a simple verb or phrasal verb. The reflexive pronoun is built
        into the Portuguese verb form.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Overuse of reflexive pronouns
      example_portuguese: Eu me sento na cadeira.
      example_gloss: I myself sit in-the chair.
      example_wrong: I myself sit in the chair.
      example_correct: I sit in the chair.
      explanation: Portuguese uses reflexive pronouns with many verbs that are not
        reflexive in English (sentar-se = to sit, deitar-se = to lie down).
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I myself sit in the chair.'' Correct: ''I sit in the chair.'''
    - 'Wrong: ''She herself went to bed.'' Correct: ''She went to bed.'''
    why_it_happens: 'Portuguese uses reflexive pronouns with many verbs that are not
      reflexive in English: ''sentar-se'' (to sit), ''deitar-se'' (to lie down), ''levantar-se''
      (to get up), ''chamar-se'' (to be called). English uses simple verbs without
      reflexive pronouns. Portuguese speakers may add unnecessary reflexive pronouns
      in English.'
    teacher_tips:
      how_to_explain: 'Create a list of Portuguese reflexive verbs and their English
        equivalents. Show that English drops the reflexive: ''sentar-se'' = ''sit,''
        ''deitar-se'' = ''lie down,'' ''levantar-se'' = ''get up.'''
      where_to_start: 'Begin with common daily routine verbs: get up, sit down, lie
        down, go to bed.'
      sequencing: 'Week 1: Common reflexive verbs in daily routines. Week 2: Verbs
        that are reflexive in Portuguese but not in English. Week 3: True reflexives
        in English (hurt yourself, enjoy yourself). Week 4: Mixed practice.'
      exercises:
      - name: Reflexive Verb Translation
        type: translation
        description: Give 10 Portuguese reflexive verbs. Students translate to English
          without reflexive pronouns.
        duration: 15
      - name: Reflexive or Not Decision
        type: error-correction
        description: Provide 15 sentences mixing Portuguese-reflexive and English-reflexive
          contexts. Students identify where English DOES and DOES NOT use a reflexive
          pronoun and correct errors (e.g., 'I myself sit' -> 'I sit'; 'She cut' ->
          'She cut herself').
        duration: 15
