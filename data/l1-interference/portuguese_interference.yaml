    assessment: Expert-evaluated for L1 transfer severity - Portuguese
    notes: "Covers four distinct L1 transfer patterns: (1) muito...para -> very...to
      instead of too...to, (2) too much overgeneralization with adjectives, (3) enough
      word order confusion, (4) infinitive marker omission. All four patterns are
      documented in Swan & Smith (2001) and Azevedo (1996). The too/very semantic
      distinction is particularly persistent because Portuguese does not lexicalize
      the intensifier/excess distinction in the same way as English."
    source_rank: 1
    citations:
    - claim: Portuguese muito...para transferred as very...to instead of too...to for
        excess + infinitive constructions
      source: 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to
        Interference and Other Problems (2nd ed.). Cambridge University Press.'
      location: 'Chapter: Portuguese speakers, pp. 112-126'
