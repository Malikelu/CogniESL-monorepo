    - pattern: Use of 'either' with positive verb
      example_portuguese: Qualquer um dos dois e bom.
      example_gloss: Any one of-the two is good.
      example_wrong: Both are good.
      example_correct: Either is good.
      explanation: Portuguese 'qualquer um dos dois' = English 'either.' Portuguese
        speakers may use 'both' where English requires 'either.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''Both did not come.'' Correct: ''Neither came.'''
    - 'Wrong: ''Both are good.'' (meaning either) Correct: ''Either is good.'''
