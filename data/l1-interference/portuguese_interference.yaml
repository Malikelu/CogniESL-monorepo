  participle_clauses: *id017
  relative_clauses: &id018
    interference_patterns:
    - pattern: Use of 'what' instead of 'that/which' in relative clauses
      example_portuguese: O livro que eu li e bom.
      example_gloss: The book that I read is good.
      example_wrong: The book what I read is good.
      example_correct: The book that I read is good.
      explanation: Portuguese 'que' functions as both a relative pronoun (that/which)
        and an interrogative pronoun (what). Portuguese speakers often map 'que' to
        'what' in English relative clauses, producing 'the book what I read' instead
        of 'the book that I read.' This is one of the most frequently documented errors
        for Portuguese ESL learners.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Resumptive pronoun in object relative clauses
      example_portuguese: O homem que eu vi ele e alto.
      example_gloss: The man that I saw him is tall.
      example_wrong: The man that I saw him is tall.
      example_correct: The man that I saw is tall.
      explanation: Portuguese allows resumptive pronouns in relative clauses (o homem
        que eu vi ele = the man that I saw him). English strictly forbids resumptive
        pronouns in relative clauses. Portuguese speakers transfer the resumptive
        pronoun pattern, producing 'the man that I saw him' instead of 'the man that
        I saw.'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Failure to omit relative pronoun when it is the object
      example_portuguese: O livro que eu comprei e bom.
      example_gloss: The book that I bought is good.
      example_wrong: The book that I bought it is good.
      example_correct: The book I bought is good.
      explanation: Portuguese requires the relative pronoun 'que' in all relative clauses
        and does not allow omission. English can omit the relative pronoun when it is
        the object of the relative clause ('the book I bought' = 'the book that I bought').
        Portuguese speakers either keep the pronoun (which is acceptable but formal) or
        add a resumptive pronoun ('the book that I bought it'), which is ungrammatical.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Preposition placement — pied-piping vs. stranding
      example_portuguese: O homem com quem eu falei e meu amigo.
      example_gloss: The man with whom I spoke is my friend.
      example_wrong: The man with who I spoke is my friend.
      example_correct: The man who I spoke to is my friend.
      explanation: Portuguese requires pied-piping in relative clauses with prepositions
        (com quem = with whom). English allows both pied-piping ('with whom I spoke')
        and stranding ('who I spoke to'). Portuguese speakers may produce 'with who'
        (using 'who' instead of 'whom') or avoid stranding entirely, producing overly
        formal structures in casual speech.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: The book what I read is good. Correct: The book that I read is good.'
    - 'Wrong: The man that I saw him is tall. Correct: The man that I saw is tall.'
    - 'Wrong: The woman who I gave the book is my friend. Correct: The woman I gave the book to is my friend.'
    why_it_happens: Portuguese has a single relative pronoun 'que' that covers the functions
      of English 'that,' 'which,' and 'who.' Portuguese 'que' also overlaps with interrogative
      'what,' leading to the common error 'the book what I read.' Additionally, Portuguese
      allows resumptive pronouns in relative clauses (o homem que eu vi ele = the man that
      I saw him), which are ungrammatical in English. Portuguese also requires the relative
      pronoun in all positions (no omission when the pronoun is an object), and requires
      pied-piping with prepositions (com quem, not quem...com). These structural differences
      between the two relative clause systems produce multiple distinct interference patterns
      that persist across proficiency levels.
    teacher_tips:
      how_to_explain: 'Start by showing that Portuguese has one word (que) for four English
        words (that, which, who, what). Write: O livro que eu li → The book that/which I read.
        NOT "what." Then explain: English drops the pronoun when it is the object: "The book
        I read" (no "that"). Finally, teach preposition placement: "who I spoke to" OR "with
        whom I spoke" — both correct, but "with who" is wrong.'
      where_to_start: 'Begin with the that/which/who distinction since this is the most
        frequent error. Use classroom objects: the pen that I am holding is blue.'
      sequencing: 'Week 1: That vs. which vs. who (and NOT what). Week 2: Omitting the
        relative pronoun when it is the object. Week 3: Resumptive pronoun error correction.
        Week 4: Preposition placement in relative clauses. Week 5: Mixed practice.'
      exercises:
      - name: Relative Pronoun Selection
        type: fill-in-the-blank
        description: Provide 20 sentences with gaps. Students choose the correct relative
          pronoun (that, which, who, whom) or omit it where possible. Include distractors
          with 'what.'
        duration: 15
      - name: Resumptive Pronoun Error Correction
        type: error-correction
        description: Provide 15 sentences with resumptive pronoun errors (e.g., 'The man
          that I saw him is tall'). Students identify and remove the extra pronoun.
        duration: 15
      - name: Preposition Placement Rewrite
        type: sentence-rewrite
        description: Give 10 sentences with prepositions in the wrong position. Students
          rewrite using correct pied-piping or stranding. E.g., 'The man who I spoke with
          him' → 'The man I spoke to' or 'The man with whom I spoke.'
        duration: 15
