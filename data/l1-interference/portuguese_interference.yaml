  comparatives_superlatives:
    interference_patterns:
    - pattern: Use of 'that' instead of 'than' after comparatives
      example_portuguese: Ele e mais alto que o irmao.
      example_gloss: He is more tall that the brother.
      example_wrong: He is taller that his brother.
      example_correct: He is taller than his brother.
      explanation: Portuguese uses 'que' for both 'that' and 'than.' English splits
        these into two distinct words. Portuguese speakers map 'que' onto 'that' because
        it is the more frequent English cognate, producing 'taller that' instead of
        'taller than.' This is a classic Romance-language transfer also documented
        in French (Swan & Smith 2001, French speakers section).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of 'more/most' with short adjectives that take -er/-est
      example_portuguese: Ela e mais bonita do que a irma.
      example_gloss: She is more beautiful than the sister.
      example_wrong: She is more tall than her sister.
      example_correct: She is taller than her sister.
      explanation: Portuguese forms all comparatives with 'mais' (more) + adjective,
        regardless of syllable count. English requires -er for short adjectives (taller,
        bigger, faster) and reserves 'more' for longer adjectives (more beautiful, more
        intelligent). Portuguese speakers overgeneralize 'more' to short adjectives
        because their L1 has no comparable inflectional distinction. This Romance-language
        pattern is documented across French, Italian, and Portuguese in Swan & Smith
        (2001) and confirmed by Celce-Murcia & Larsen-Freeman (1999) regarding the
        English -er/-est vs. more/most distinction.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Omission of 'the' before superlatives or use of Portuguese superlative
        structure
      example_portuguese: Ela e a mais bonita da turma.
      example_gloss: She is the most beautiful of-the class.
      example_wrong: She is most beautiful in the class.
      example_correct: She is the most beautiful in the class.
      explanation: Portuguese superlatives use the definite article + 'mais' + adjective
        + 'de' (a mais bonita da turma). English also uses 'the' before superlatives
        but Portuguese speakers may omit it, especially in predicative positions, or
        may use the Portuguese word order. The article is required in English superlative
        constructions (the tallest, the most beautiful) except in predicative positions
        with 'most' meaning 'very.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''He is taller that his brother.'' Correct: ''He is taller than his
      brother.'''
    - 'Wrong: ''She is more tall than me.'' Correct: ''She is taller than me.'''
    - 'Wrong: ''She is most beautiful in class.'' Correct: ''She is the most beautiful
      in class.'''
    why_it_happens: Portuguese and English differ in three key ways for comparatives
      and superlatives. (1) Portuguese 'que' covers both English 'that' and 'than,'
      leading to 'taller that' errors. (2) Portuguese uses 'mais + adjective' for ALL
      comparatives with no inflectional -er/-est distinction, while English requires
      -er for monosyllabic and many disyllabic adjectives. Portuguese speakers overgeneralize
      'more' because their L1 has no equivalent suffix. (3) Portuguese superlatives
      use article + 'mais' + adjective + 'de' (a mais bonita da turma), and while
      English also uses 'the' before superlatives, Portuguese speakers may omit it
      or transfer the Portuguese word order. These patterns are consistent with broader
      Romance-language L1 transfer documented in Swan & Smith (2001) and Azevedo (1996).
    teacher_tips:
      how_to_explain: 'Teach three rules on the board: (1) Comparatives use THAN, not
        that. (2) Short words get -er (taller, bigger), long words get MORE (more beautiful).
        (3) Superlatives need THE (the tallest, the most beautiful). Write the Portuguese
        structure next to the English one to show the contrast: "mais alto" → "taller"
        (not "more tall"), "que" → "than" (not "that"), "a mais bonita" → "the most
        beautiful."'
      where_to_start: 'Begin with the than/that distinction since it is the highest-frequency
        error. Then teach the -er vs. more rule using a syllable-counting activity.
        Finally, add the superlative article rule.'
      sequencing: 'Week 1: Than vs that. Week 2: -er vs more (syllable rule). Week 3:
        Superlatives with THE. Week 4: Irregular forms (good/better/best, bad/worse/worst,
        far/farther/further). Week 5: Mixed practice and communicative activities.'
      exercises:
      - name: Than vs That Drill
        type: error-correction
        description: Provide 10 sentences with 'that' instead of 'than.' Students
          correct them.
        duration: 15
      - name: More or Er Decision
        type: binary-choice
        description: 'Give students pairs of forms (e.g., "more tall" vs "taller",
          "more big" vs "bigger", "more beautiful" vs "beautifuller"). Students
          check the correct form. Include 15 items covering short adjectives, long
          adjectives, and irregular forms.'
        duration: 15
      - name: Superlative Article Insertion
        type: fill-in-the-blank
        description: Provide 12 sentences where 'the' is missing before superlatives.
          Students insert 'the' where required and identify cases where 'the' is
          optional (predicative "most" meaning "very").
        duration: 10
