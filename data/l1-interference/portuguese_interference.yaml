  tenses_overview:
    interference_patterns:
    - pattern: Present perfect overgeneralization for definite past events
      example_portuguese: Eu ja comi pizza ontem.
      example_gloss: I already ate pizza yesterday.
      example_wrong: I have already eaten pizza yesterday.
      example_correct: I already ate pizza yesterday.
      explanation: Portuguese uses the present perfect (pretérito perfeito composto)
        with both ongoing/relevant-to-present actions AND completed past actions with
        definite time markers (ontem, last week). English restricts the present perfect
        to actions without a definite past-time marker. Portuguese speakers overgeneralize
        the present perfect to sentences with 'yesterday,' 'last year,' 'in 2010'
        — all of which require the simple past in English. This is one of the most
        frequently documented tense errors for Portuguese L1 learners (Swan & Smith,
        2001; Azevedo, 1996).
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Ir + infinitivo future transferred as go + bare infinitive
      example_portuguese: Eu vou comer pizza amanha.
      example_gloss: I go eat pizza tomorrow.
      example_wrong: I go eat pizza tomorrow.
      example_correct: I am going to eat pizza tomorrow.
      explanation: Portuguese forms the periphrastic future with 'ir (conjugated)
        + infinitive' (vou comer = I will eat / I am going to eat). Portuguese speakers
        often translate this word-for-word as 'go + bare infinitive' (I go eat), dropping
        the auxiliary 'am' and the particle 'to.' The correct English forms are 'will
        + infinitive' or 'be going to + infinitive.' This error is pervasive across
        all proficiency levels and is documented in contrastive analyses of Romance
        vs. Germanic future-time expression (Swan & Smith, 2001; Azevedo, 1996).
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Imperfect-past habitual transferred as simple past
      example_portuguese: Eu comia pizza toda semana.
      example_gloss: I ate pizza every week. (habitual)
      example_wrong: I ate pizza every week.
      example_correct: I used to eat pizza every week. / I would eat pizza every week.
      explanation: The Portuguese imperfect tense (pretérito imperfeito) expresses
        habitual past actions, ongoing past states, and background actions. English
        requires 'used to + infinitive' or 'would + infinitive' for discontinued habits,
        and past continuous for ongoing background actions. Portuguese speakers default
        to the simple past for all three meanings, losing the habitual nuance. This
        is a well-documented Romance-to-Germanic tense-aspect transfer error (Swan
        & Smith, 2001; Azevedo, 1996).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I have seen that movie last week.'' Correct: ''I saw that movie last
      week.'''
    - 'Wrong: ''I go travel next month.'' Correct: ''I am going to travel next month.'''
    - 'Wrong: ''I ate breakfast at 7 every day.'' (habitual) Correct: ''I used to
      eat breakfast at 7 every day.'''
    why_it_happens: Portuguese and English have fundamentally different tense-aspect
      systems. (1) The Portuguese present perfect (pretérito perfeito composto) is
      used more broadly than English — it covers both ongoing/relevant-to-present
      actions AND completed past actions with definite time markers. English restricts
      the present perfect to indefinite time or present-relevant results. (2) Portuguese
      forms the periphrastic future with 'ir + infinitive' (vou comer), which maps
      to English 'be going to + infinitive' — but Portuguese speakers often drop the
      auxiliary and produce 'go + bare infinitive.' (3) The Portuguese imperfect tense
      covers habitual past, ongoing past, and background actions, while English splits
      these into 'used to/would,' past continuous, and past continuous respectively.
      Portuguese speakers default to the simple past for all three, losing aspectual
      distinctions. All three patterns are documented in Swan & Smith (2001) and Azevedo
      (1996).
    teacher_tips:
      how_to_explain: 'Create a three-column chart: Portuguese tense | English equivalent
        | Common error. For present perfect: show that ''yesterday/last week/in 2010''
        ALWAYS = simple past in English. For future: drill ''be going to + infinitive''
        vs. ''go + bare infinitive.'' For habitual past: teach ''used to'' as the
        default for discontinued habits.'
      where_to_start: Begin with the present perfect vs. simple past distinction —
        it is the highest-frequency error. Then move to future forms, then habitual
        past.
      sequencing: 'Week 1: Present perfect vs. simple past (definite time markers).
        Week 2: Future forms — ''will'' vs. ''be going to'' vs. ''go + infinitive''
        error. Week 3: Habitual past — ''used to'' and ''would'' vs. simple past.
        Week 4: Mixed practice with all three patterns.'
      exercises:
      - name: Present Perfect or Past Simple Decision
        type: fill-in-the-blank
        description: Provide 20 sentences with time markers. Students must choose
          present perfect or simple past and explain why. Include definite markers
          (yesterday, last year) and indefinite ones (already, ever, never).
        duration: 20
      - name: Future Form Correction
        type: error-correction
        description: Give 15 sentences with 'go + bare infinitive' future errors.
          Students rewrite using 'will' or 'be going to.'
        duration: 15
      - name: Habitual Past Transformation
        type: sentence-rewrite
        description: Provide 10 Portuguese imperfect-tense sentences (habitual meaning).
          Students translate using 'used to' or 'would' — NOT simple past.
        duration: 15
