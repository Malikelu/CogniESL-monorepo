    notes: 'Two patterns: (1) Bare ''go + infinitive'' without auxiliary ''be'' (direct
      L1 transfer of ''ir + inf''). (2) Overuse of ''will'' for planned events where
      English requires ''be going to'' (L1 failure to encode plan-vs-spontaneity distinction).
      Both documented in Swan and Smith (2001) and Azevedo (1996).

      '
    source_rank: 1
