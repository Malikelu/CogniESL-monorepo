  some_any:
    interference_patterns:
    - pattern: Use of some in questions where any is required
      example_portuguese: Voce tem algum problema?
      example_gloss: You have some problem?
      example_wrong: Do you have some problem?
      example_correct: Do you have any problem?
      explanation: Portuguese 'algum/alguma' is used in questions as well as affirmatives.
        English restricts 'some' to affirmatives and offers, requiring 'any' in neutral
        questions. Portuguese speakers transfer 'algum' directly as 'some' into English
        questions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of some in negative sentences where any is required
      example_portuguese: Eu nao tenho algum dinheiro.
      example_gloss: I not have some money.
      example_wrong: I don't have some money.
      example_correct: I don't have any money.
      explanation: Portuguese 'algum' can appear in certain negative constructions (e.g.,
        'nao tenho algum' = I don't have some/any). English requires 'any' after negation,
        never 'some'. Portuguese speakers transfer the 'algum' pattern into English
        negatives, producing 'I don't have some' instead of 'I don't have any'.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: Do you have some money? Correct: Do you have any money?'
    - "Wrong: I don't have some money. Correct: I don't have any money."
    why_it_happens: >
      Portuguese 'algum/alguma/alguns/algumas' is a flexible determiner used in
      questions, affirmatives, and certain negative contexts. English has a strict
      distributional split - 'some' is used in affirmative statements and
      offers/requests (expecting 'yes'), while 'any' is used in neutral questions
      and negative sentences. Portuguese speakers transfer the broader distribution
      of 'algum' into English, producing 'some' in contexts that require 'any'.
      This interference affects both questions ('Do you have some money?' for 'Do
      you have any money?') and negatives ('I don't have some money' for 'I don't
      have any money'). The error is persistent because 'algum' is deeply
      automatized as a single form covering both English determiners.
    teacher_tips:
      how_to_explain: 'Create a simple rule: ANY = questions and negatives. SOME =
        affirmative statements and offers. Write three columns on the board: AFFIRMATIVE
        | NEGATIVE | QUESTION. Under AFFIRMATIVE write ''I have SOME money.'' Under NEGATIVE
        write ''I don''t have ANY money.'' Under QUESTION write ''Do you have ANY money?''
        Show that Portuguese ''algum'' maps to both SOME and ANY depending on context.'
      where_to_start: 'Begin with the basic rule: questions and negatives use any.
        Use real classroom objects: ''Do you have any pencils?'' ''I don''t have any
        erasers.'''
      sequencing: 'Week 1: Any in questions and negatives. Week 2: Some in affirmatives.
        Week 3: Some in offers (Would you like some tea?). Week 4: Mixed practice
        with all three contexts.'
      exercises:
      - name: Some vs Any Decision
        type: fill-in-the-blank
        description: Provide 20 sentences covering affirmatives, negatives, and questions.
          Students choose between some and any.
        duration: 15
      - name: Negative Sentence Correction
        type: error-correction
        description: Provide 10 negative sentences where 'some' is incorrectly used
          instead of 'any'. Students identify and correct each error.
        duration: 10
