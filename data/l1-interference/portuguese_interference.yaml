  supposing:
    interference_patterns:
    - pattern: Literal translation of "e se" as "and if" instead of "supposing"
      example_portuguese: E se eu fosse rico?
      example_gloss: And if I were rich?
      example_wrong: And if I were rich, what would I buy?
      example_correct: Supposing I were rich, what would I buy?
      explanation: Portuguese uses "e se" (literally "and if") to introduce hypothetical
        scenarios. English uses "supposing" or "what if" as dedicated hypothetical
        introducers. Portuguese speakers translate "e se" literally as "and if," which
        is grammatically possible in English but sounds unnatural and is not the idiomatic
        equivalent taught at intermediate/advanced levels. "Supposing" is the standard
        classroom target for hypothetical conditionals.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of present tense after "supposing" instead of past subjunctive
      example_portuguese: Supondo que eu sou rico...
      example_gloss: Supposing that I am rich...
      example_wrong: Supposing I am rich, I will buy a house.
      example_correct: Supposing I were rich, I would buy a house.
      explanation: Portuguese uses the present subjunctive or indicative after "supondo
        que" (supposing that) for hypotheticals, and the tense distinction is less
        rigidly marked than in English. English requires the past subjunctive ("were"
        for all persons) in hypothetical "supposing" clauses, paired with "would" in
        the main clause. Portuguese speakers transfer the Portuguese tense pattern,
        using present tense ("am/is") instead of past subjunctive ("were"), producing
        "Supposing I am rich" instead of "Supposing I were rich."
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of "supposing" in favor of "if" for all hypotheticals
      example_portuguese: E se chover amanha?
      example_gloss: And if it rains tomorrow?
      example_wrong: If it rains tomorrow, what do we do?
      example_correct: Supposing it rains tomorrow, what shall we do?
      explanation: Portuguese uses "e se" as a general-purpose hypothetical introducer
        for both remote and open conditions. English distinguishes between open
        conditionals (if + present) and more hypothetical/imaginary scenarios (supposing
        + past subjunctive). Portuguese speakers overuse "if" for all hypothetical
        contexts because Portuguese does not lexicalize this distinction with a
        separate word like "supposing." This results in loss of the nuance that
        "supposing" conveys — a more speculative, imagined scenario.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: And if I were rich, what would I buy? Correct: Supposing I were rich, what would I buy?'
    - 'Wrong: Supposing I am rich, I will buy a house. Correct: Supposing I were rich, I would buy a house.'
    - 'Wrong: If it rains tomorrow, what do we do? Correct: Supposing it rains tomorrow, what shall we do?'
    why_it_happens: Portuguese uses "e se" (literally "and if") as its primary
      hypothetical introducer, which maps onto English "if" but not onto the more
      specialized "supposing." The Portuguese conditional system does not have a
      single-word equivalent of "supposing" — it uses "supondo que" (a gerund
      construction) or "e se" depending on register. When Portuguese speakers
      encounter "supposing" in English, they map it back to "e se" and then
      translate literally as "and if." Additionally, Portuguese does not use a
      past subjunctive form equivalent to English "were" — the Portuguese subjunctive
      in conditional clauses uses the imperfect subjunctive (fosse), which does
      not map onto the English "were" pattern. This leads to two compounding errors.
      First, using "and if" instead of "supposing," and second, using present tense instead
      of past subjunctive in the hypothetical clause. The third error, overusing
      "if" for all hypotheticals, occurs because Portuguese does not lexicalize
      the open-vs-speculative conditional distinction that English marks with "if"
      vs. "supposing."
    teacher_tips:
      how_to_explain: 'Write "E se eu fosse rico?" on the board. Below it, write
        three English options: "If I were rich?", "Supposing I were rich?", "What
        if I were rich?" Explain that all three are correct, but "supposing" is
        used for more speculative, imagined scenarios. Then show the grammar:
        Supposing + subject + were/would. Contrast with: If + subject + present
        (open condition) vs. Supposing + subject + past subjunctive (imagined
        scenario).'
      where_to_start: Begin with the form "Supposing + subject + were" for unreal
        hypotheticals. Use visual scenarios such as "Supposing you found a thousand dollars" and "Supposing you could fly"
      sequencing: 'Week 1: "Supposing" as a hypothetical introducer (vs. "and if"
        literal translation). Week 2: Past subjunctive "were" after "supposing"
        (not "am/is"). Week 3: "Supposing" vs. "if" — open vs. speculative conditions.
        Week 4: Mixed practice with "supposing," "what if," and "if."'
      exercises:
      - name: Supposing vs. And If Correction
        type: error-correction
        description: Provide 10 sentences where "and if" is used as a literal translation
          of "e se." Students replace with "supposing" or "what if."
        duration: 15
      - name: Subjunctive After Supposing
        type: fill-in-the-blank
        description: Provide 12 sentences starting with "Supposing I ___ (be)..."
          Students choose "were" (not "am") and complete the main clause with
          "would."
        duration: 15
      - name: Open or Speculative Decision
        type: sentence-rewrite
        description: Give 10 hypothetical scenarios. Students must decide whether
          to use "if" (open/real condition) or "supposing" (speculative/imagined)
          and write the full sentence.
        duration: 20
