      transfer producing was instead of were, (3) avoidance of inverted conditionals due to lack of L1 equivalent,
      (4) literal se-clause transfer where English requires implied conditional structures (but for, without, otherwise).
      Frequency is 4 (high -- these errors appear at all proficiency levels) and persistence is 4 (high -- the Portuguese
      conditional-subjunctive system is deeply automatized from childhood). This entry extends the basic conditionals
      entries with advanced patterns including mixed conditionals, inverted conditionals, and implied conditionals.'
  conditionals_overview:
    interference_patterns:
    - Portuguese speakers overuse the present tense in first conditional (real future) clauses where English requires the simple
      present, because Portuguese uses the future subjunctive (futuro do subjuntivo) in conditional protases referring to future
      events. Portuguese 'Se eu tiver tempo, vou ao cinema' (literally 'If I will-have [subjunctive] time, I go to the cinema')
      transfers to English as 'If I will have time, I will go to the cinema.' The Portuguese future subjunctive (tiver, fizer,
      puder) has future-marking morphology that learners incorrectly map onto English 'will.' This produces errors like 'If I
      will see him, I will tell him,' 'If it will rain, we will stay home,' and 'If she will come, I will be happy.' English
      strictly requires present tense in if-clauses referring to future events.
    - Portuguese speakers use 'would' in both clauses of second conditional sentences, transferring the Portuguese imperfect
      subjunctive (pretérito imperfeito do subjuntivo) which occupies both the protasis and apodosis in Portuguese conditional
      constructions. Portuguese 'Se eu tivesse dinheiro, compraria um carro' (literally 'If I had [imperfect subjunctive]
      money, I would-buy a car') leads learners to produce 'If I would have money, I would buy a car' instead of the correct
      'If I had money, I would buy a car.' The error is particularly persistent because the Portuguese imperfect subjunctive
      (tivesse, fosse, pudesse) is the standard conditional form taught in Portuguese schools, and learners map it directly
      onto English 'would.'
    - Portuguese speakers underuse the third conditional (had + past participle in the if-clause) because Portuguese expresses
      counterfactual past conditions through the pluperfect subjunctive (pretérito mais-que-perfeito do subjuntivo) or through
      the conditional tense in the main clause, without requiring a dedicated past perfect form in the protasis. Portuguese 'Se
      eu tivesse estudado, teria passado' (literally 'If I had-studied [pluperfect subjunctive], I would-have passed') is
      structurally different from English 'If I had studied, I would have passed.' Portuguese speakers produce 'If I studied, I
      would have passed' (simple past instead of past perfect in the if-clause) or 'If I would have studied, I would have passed'
      (would in both clauses). The error persists because Portuguese does not require the same past-before-past grammaticalization
      in conditional protases.
    - Portuguese speakers produce mixed conditional errors by combining second and third conditional structures incorrectly,
      because Portuguese conditional sentences use a more flexible tense-mood system that does not enforce the same strict
      time-reference matching as English. Portuguese allows combinations like 'Se eu fosse rico, teria comprado uma casa' (If
      I were rich [present counterfactual], I would have bought a house [past consequence]) which maps directly to English mixed
      conditionals, but learners also produce ungrammatical combinations like 'If I was rich, I would have bought' (using 'was'
      instead of 'were' in present counterfactual) or 'If I had been rich, I would buy' (reversed time reference). The Portuguese
      conditional system's flexibility with tense-mood combinations leads to systematic transfer errors in English mixed conditionals.
    - Portuguese speakers use the imperative or infinitive in zero conditional / general truth contexts where English requires
      the present simple in both clauses. Portuguese 'Se você misturar água com óleo, eles não se misturam' (literally 'If you
      mix [present subjunctive] water with oil, they don't mix') uses the present subjunctive in the protasis, which learners
      sometimes transfer as 'If you will mix water with oil, they don't mix' or 'If mixing water with oil, they don't mix.'
      The Portuguese present subjunctive in conditional protases (misturar, fazer, ter) is a standard form that has no direct
      English equivalent, leading to tense-mood transfer errors in zero and first conditionals.
    why_it_happens: Portuguese has a fundamentally different conditional system from English. Portuguese uses three subjunctive
      moods (present, imperfect, pluperfect) in conditional protases, each with distinct temporal and modal meanings, while
      English uses tense backshifting (present → past → past perfect) to signal decreasing probability/counterfactuality. The
      Portuguese future subjunctive (futuro do subjuntivo) in first conditional protases has future-marking morphology that
      transfers as 'will' in English. The Portuguese imperfect subjunctive in second conditional protases and apodoses maps
      onto English 'would' but learners overextend it to the if-clause. The Portuguese pluperfect subjunctive in third conditional
      protases does not require the same past-before-past grammaticalization as English past perfect. These deeply automatized
      L1 patterns transfer systematically and persist because the Portuguese subjunctive system is explicitly taught in schools
      and is a core feature of educated Portuguese usage. The errors are highly visible in both speech and writing and can cause
      communicative misunderstandings about the reality, probability, and temporal reference of conditions.
    teacher_tips:
      how_to_explain: "Use a four-row conditional chart showing the English conditional types (zero, first, second, third) with the Portuguese equivalent structure side-by-side. For each type, highlight the key difference: (1) Zero/First - Portuguese uses subjunctive where English uses present tense; NEVER use 'will' after 'if.' (2) Second - Portuguese imperfect subjunctive maps to English past simple in the if-clause and 'would' in the main clause; NEVER use 'would' in the if-clause. (3) Third - Portuguese pluperfect subjunctive maps to English past perfect in the if-clause; the past-before-past must be grammaticalized. (4) Mixed - show that English matches time reference (present condition -> present consequence; past condition -> past consequence) while Portuguese is more flexible. Use the formula: IF + present -> will (first); IF + past -> would (second); IF + had + p.p. -> would have + p.p. (third). Emphasize the golden rule: NEVER use 'will' or 'would' in the if-clause."
      where_to_start: Start with the first conditional 'will' error since it is the most frequent and the most visibly ungrammatical.
        Use the 'NO WILL AFTER IF' rule with 10 example sentences. Then move to the second conditional 'would' error in the if-clause.
        Address the third conditional past perfect underuse. Finally, teach mixed conditionals for advanced learners.
      exercises:
      - name: Will-in-if-clause error correction
        type: error-correction
        description: Provide 15 sentences with Portuguese-style 'will' in the if-clause errors (e.g. 'If I will see him, I will
          tell him,' 'If it will rain, we will stay home,' 'If she will come, I will be happy'). Students identify the error
          (will after if), explain why it is wrong (Portuguese future subjunctive transferred as will), and rewrite each sentence
          with the correct present tense. Include Portuguese translations showing the future subjunctive form (tiver, fizer, puder).
        duration: 15
      - name: Would-in-if-clause error correction
        type: error-correction
        description: Provide 15 sentences with Portuguese-style 'would' in the if-clause errors (e.g. 'If I would have money, I
          would buy a car,' 'If she would study more, she would pass,' 'If they would know, they would help'). Students identify
          the error (would in the if-clause), explain why it is wrong (Portuguese imperfect subjunctive transferred as would),
          and rewrite each sentence with the correct past simple in the if-clause. Include Portuguese translations showing the
          imperfect subjunctive (tivesse, fosse, pudesse).
        duration: 15
      - name: Third conditional past perfect repair
        type: error-correction
        description: Provide 15 sentences with Portuguese-style third conditional errors (e.g. 'If I studied harder, I would have
          passed,' 'If she would have come, I would have been happy,' 'If they had knew, they would have told us'). Students
          identify the error type (simple past instead of past perfect, or would in the if-clause), explain why it is wrong, and
          rewrite each sentence with the correct past perfect in the if-clause and 'would have + past participle' in the main clause.
        duration: 20
      - name: Conditional type identification and production
        type: practice
        description: "Provide 20 scenarios. For each, students must identify which conditional type (zero, first, second, third, or mixed) is appropriate and write the correct sentence. Include scenarios covering all five types. Example scenarios - (a) 'Water boils at 100 degrees' (zero), (b) 'It might rain tomorrow' (first), (c) 'I don't have a million dollars' (second), (d) 'I didn't study for the exam yesterday' (third), (e) 'I didn't save money in the past, so I can't buy a house now' (mixed). Discuss answers as a class."
        duration: 20
      - name: Portuguese-to-English conditional translation
        type: drill
        description: Give 20 Portuguese sentences covering all conditional types, specifically designed to trigger the five major
          error types. Include future subjunctive protases ('Se eu tiver tempo, vou'), imperfect subjunctive protases ('Se eu
          tivesse dinheiro, compraria'), pluperfect subjunctive protases ('Se eu tivesse estudado, teria passado'), mixed
          conditionals ('Se eu fosse rico, teria comprado'), and present subjunctive protases ('Se você misturar água com óleo').
          Students translate each into correct English, consciously applying the correct conditional structure. Then they self-check
          against the five error types.
        duration: 25
    examples:
    - 'Wrong: ''If I will see him, I will tell him.'' (Portuguese: ''Se eu o vir, eu direi.'' — future subjunctive ''vir'' transferred
      as ''will see'') Correct: ''If I see him, I will tell him.'' Rule: NEVER use ''will'' after ''if'' in first conditionals.'
    - 'Wrong: ''If I would have money, I would buy a car.'' (Portuguese: ''Se eu tivesse dinheiro, compraria um carro.'' — imperfect
      subjunctive ''tivesse'' transferred as ''would have'') Correct: ''If I had money, I would buy a car.'' Rule: NEVER use
      ''would'' in the if-clause of second conditionals.'
    - 'Wrong: ''If I studied harder, I would have passed.'' (Portuguese: ''Se eu tivesse estudado mais, teria passado.'' — pluperfect
      subjunctive ''tivesse estudato'' requires past perfect in English) Correct: ''If I had studied harder, I would have passed.''
      Rule: Third conditionals require past perfect (had + p.p.) in the if-clause.'
    - 'Wrong: ''If she would have come, I would have been happy.'' (Portuguese: ''Se ela tivesse vindo, eu teria ficado feliz.'' —
      would in both clauses from Portuguese subjunctive transfer) Correct: ''If she had come, I would have been happy.'' Rule:
      NEVER use ''would have'' in the if-clause of third conditionals.'
    - 'Wrong: ''If I was rich, I would have bought a house.'' (Portuguese: ''Se eu fosse rico, teria comprado uma casa.'' — mixed
      conditional with present counterfactual condition and past consequence) Correct: ''If I were rich, I would have bought a house.''
      (or ''If I had been rich, I would have bought a house.'' depending on intended time reference) Rule: Match the time reference
      in the if-clause to the consequence.'
    - 'Wrong: ''If you will mix water with oil, they don''t mix.'' (Portuguese: ''Se você misturar água com óleo, eles não se
      misturam.'' — present subjunctive ''misturar'' transferred as ''will mix'') Correct: ''If you mix water with oil, they
      don''t mix.'' Rule: Zero and first conditionals use present tense in the if-clause.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents conditional structure transfer errors including will-in-if-clause from Portuguese future
      subjunctive, would-in-if-clause from Portuguese imperfect subjunctive, and past perfect underuse in third conditionals from
      Portuguese pluperfect subjunctive transfer).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on mood and modality —
      describes the Portuguese subjunctive system including the future subjunctive (futuro do subjuntivo) in conditional protases,
      the imperfect subjunctive (pretérito imperfeito do subjuntivo) in counterfactual conditions, and the pluperfect subjunctive
      (pretérito mais-que-perfeito do subjuntivo) in past counterfactual conditions, explaining the structural basis for L1
      transfer to English conditional structures).'
