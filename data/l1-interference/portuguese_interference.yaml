  other_expressions:
    interference_patterns:
    - pattern: Use of simple present or 'going to' instead of present continuous for fixed
        arrangements
      example_portuguese: Eu viajo amanha. / Eu vou viajar amanha.
      example_gloss: I travel tomorrow. / I am going to travel tomorrow.
      example_wrong: I travel tomorrow. / I am going to travel tomorrow.
      example_correct: I am traveling tomorrow.
      explanation: Portuguese uses the simple present (eu viajo) or periphrastic future
        (eu vou viajar) for planned future events. English requires the present continuous
        for fixed arrangements with others (I am traveling tomorrow). Portuguese speakers
        transfer the simple present or 'going to' pattern, producing 'I travel tomorrow'
        or 'I am going to travel tomorrow' when the arrangement is fixed and confirmed.
        This is one of the most persistent future-form errors for Portuguese speakers.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Use of 'will + infinitive' for both future perfect and future continuous
        meanings
      example_portuguese: Eu vou ter terminado as 8. / Eu vou estar trabalhando as 8.
      example_gloss: I will have finished by 8. / I will be working at 8.
      example_wrong: I will finish by 8. / I will work at 8.
      example_correct: I will have finished by 8. / I will be working at 8.
      explanation: Portuguese expresses both completed-by-future-time and in-progress-at-future-time
        meanings using the simple future (futuro do presente) or 'ir + infinitive.'
        Portuguese speakers transfer this undifferentiated future into English, using
        'will + infinitive' for both concepts. They produce 'I will finish by 8' (instead
        of future perfect 'I will have finished by 8') and 'I will work at 8' (instead
        of future continuous 'I will be working at 8'). The distinction between completion
        and ongoingness at a future time is not grammatically marked in Portuguese
        the way it is in English.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Direct translation of Portuguese fixed expressions into English
      example_portuguese: Tudo bem? / Faz favor. / Com licenca.
      example_gloss: All good? / Make favor. / With license.
      example_wrong: All good? / Make favor. / With license.
      example_correct: How are you? / Please. / Excuse me.
      explanation: Portuguese has many fixed expressions that do not translate word-for-word
        into English. 'Tudo bem?' (literally 'all good?') is used as a greeting but
        English requires 'How are you?' or 'Is everything okay?' 'Faz favor' (literally
        'make favor') means 'please' in English. 'Com licenca' (literally 'with license')
        means 'excuse me.' Portuguese speakers transfer these expressions directly,
        producing comprehensible but non-native English.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I travel tomorrow.'' Correct: ''I am traveling tomorrow.'' (fixed arrangement)'
    - 'Wrong: ''I will finish by 8.'' Correct: ''I will have finished by 8.'' (future
      perfect)'
    - 'Wrong: ''I will work at 8.'' Correct: ''I will be working at 8.'' (future continuous)'
    - 'Wrong: ''All good?'' Correct: ''How are you?'' / ''Is everything okay?'''
    - 'Wrong: ''Make favor.'' Correct: ''Please.'''
    - 'Wrong: ''With license.'' Correct: ''Excuse me.'''
    why_it_happens: Portuguese and English differ fundamentally in how they mark future
      time. Portuguese uses the simple present (eu viajo amanha) or the periphrastic
      future with 'ir' (eu vou viajar) for planned events, while English requires the
      present continuous for fixed arrangements (I am traveling tomorrow). For future
      perfect and future continuous meanings, Portuguese uses the simple future tense
      (futuro do presente) without grammatically distinguishing between 'completed by
      X time' and 'in progress at X time.' English requires two distinct structures
      (will have done vs. will be doing). Additionally, Portuguese has many fixed
      pragmatic expressions (tudo bem, faz favor, com licenca) that are learned as
      chunks and do not translate literally. Portuguese speakers transfer these chunks
      directly into English, producing comprehensible but non-idiomatic language.
    teacher_tips:
      how_to_explain: 'Start with a class calendar. Write three events: ''Maria is
        meeting the director at 3 PM'' (fixed arrangement), ''By Friday, we will have
        finished Unit 5'' (future perfect), ''At 3 PM, Maria will be meeting the director''
        (future continuous). Show that Portuguese uses one future form for all three,
        but English needs three different structures.'
      where_to_start: 'Begin with present continuous for fixed arrangements since this
        is the highest-frequency error. Use real class schedules and appointment-making
        role-plays.'
      sequencing: 'Week 1: Present continuous for fixed arrangements (vs. simple present
        and going to). Week 2: Future continuous (actions in progress at a future time).
        Week 3: Future perfect (completed by a future time). Week 4: Fixed expressions
        and pragmatic chunks. Week 5: Mixed practice contrasting all three structures.'
      exercises:
      - name: Arrangement vs. Plan Sort
        type: matching
        description: Give 15 future-event sentences. Students sort into 'fixed arrangement'
          (present continuous) vs. 'personal plan' (going to) vs. 'prediction' (will).
        duration: 15
      - name: Future Form Decision
        type: fill-in-the-blank
        description: Provide 20 sentences with time markers (by 8 PM, at 8 PM, tomorrow
          at 3). Students choose the correct future form (will, will have done, will
          be doing, present continuous).
        duration: 15
      - name: Expression Translation Challenge
        type: translation
        description: Give 10 Portuguese fixed expressions (tudo bem, faz favor, com
          licenca, poe na mesa, etc.). Students provide the natural English equivalent,
          not a literal translation.
        duration: 10
