      teaching reference (Swan & Smith 2001) and structural linguistics reference (Azevedo 1996). Patterns cover (1) enquanto
      → as long as/while confusion from Portuguese single-form temporal/conditional conjunction, (2) future tense insertion
      after as long as from Portuguese subjunctive transfer, (3) underuse of as long as in favor of if from Portuguese se
