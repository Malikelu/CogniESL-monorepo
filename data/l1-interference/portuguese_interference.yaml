  reciprocal_pronouns:
    interference_patterns:
    - pattern: Use of 'um ao outro' transferred as 'one to the other'
      example_portuguese: Nos ajudamos um ao outro.
      example_gloss: We help one to the other.
      example_wrong: We help one to the other.
      example_correct: We help each other.
      explanation: Portuguese 'um ao outro' (one to the other) is the reciprocal pronoun.
        English uses 'each other' or 'one another.' Portuguese speakers translate
        the multi-word L1 form literally, producing an ungrammatical English phrase.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Omission of reciprocal pronoun after prepositional verbs
      example_portuguese: Eles conversaram o com o outro.
      example_gloss: They talked the with the other.
      example_wrong: They talked with the other.
      example_correct: They talked with each other.
      explanation: Portuguese reciprocal constructions with prepositional verbs (falar
        com = talk to, olhar para = look at) place the reciprocal pronoun after the
        preposition. Portuguese speakers may drop the reciprocal pronoun entirely
        or produce 'the other' instead of 'each other,' because Portuguese can mark
        reciprocity on the verb with clitic pronouns (falarem-se, olharem-se) without
        requiring a separate noun phrase. English requires the explicit reciprocal
        pronoun after the preposition.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''We help one to the other.'' Correct: ''We help each other.'''
    - 'Wrong: ''They looked at one to the other.'' Correct: ''They looked at each
      other.'''
    - 'Wrong: ''They talked the other.'' Correct: ''They talked to each other.'''
    - 'Wrong: ''We need to help the other.'' Correct: ''We need to help each other.'''
    why_it_happens: Portuguese uses 'um ao outro' (one to the other) as the reciprocal
      pronoun, which translates literally but awkwardly to English. English uses 'each
      other' (for two) and 'one another' (for more than two). Portuguese speakers
      transfer the literal translation. Additionally, Portuguese can express reciprocity
      through clitic pronouns attached to the verb (ajudar-se, falar-se), making the
      reciprocal pronoun optional in many contexts. English requires an explicit reciprocal
      pronoun (each other / one another) and cannot mark reciprocity on the verb alone.
      This structural difference leads Portuguese speakers to either translate 'um
      ao outro' literally as 'one to the other' or omit the reciprocal pronoun entirely.
    teacher_tips:
      how_to_explain: 'Teach ''each other'' as a fixed phrase. Show that ''um ao outro''
        = ''each other.'' Drill with common reciprocal verbs: help each other, look
        at each other, talk to each other. Emphasize that English ALWAYS needs ''each
        other'' — it cannot be dropped.'
      where_to_start: Begin with 'help each other' (most common reciprocal expression),
        then move to prepositional patterns like 'talk to each other' and 'look at
        each other.'
      sequencing: 'Week 1: ''each other'' with common verbs. Week 2: ''each other''
        after prepositions (talk to each other, look at each other). Week 3: ''each
        other'' vs ''one another.'' Week 4: Reciprocal vs. reflexive distinction.
        Week 5: Mixed practice.'
      exercises:
      - name: Reciprocal Translation
        type: translation
        description: Give 10 Portuguese sentences with 'um ao outro.' Students translate
          using 'each other.'
        duration: 15
      - name: Reciprocal Pronoun Insertion
        type: fill-in-the-blank
        description: Provide 15 sentences where the reciprocal pronoun is missing.
          Students insert 'each other' or 'one another' in the correct position.
        duration: 15
      - name: Reciprocal vs Refresive Sort
        type: matching
        description: Give 12 sentences. Students identify whether each uses a reciprocal
          pronoun (each other) or a reflexive pronoun (themselves) and correct errors.
        duration: 15
