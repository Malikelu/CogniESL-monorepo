  going_to:
    interference_patterns:
    - pattern: Use of 'go' without 'be'
      example_portuguese: Eu vou estudar.
      example_gloss: I go to study.
      example_wrong: I go to study.
      example_correct: I am going to study.
      explanation: Portuguese 'ir + infinitivo' omits the auxiliary 'be.' English
        requires 'be going to.' Portuguese speakers transfer the bare 'ir + inf' construction
        and produce 'I go to study' instead of 'I am going to study.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of 'will' for planned future events where 'be going to' is
        required
      example_portuguese: Eu vou estudar medicina.
      example_gloss: I go to study medicine.
      example_wrong: I will study medicine.
      example_correct: I am going to study medicine.
      explanation: Portuguese 'ir + infinitivo' expresses planned future intentions,
        but does not grammatically distinguish planned vs. spontaneous future — context
        disambiguates. English requires 'be going to' for pre-existing plans and 'will'
        for spontaneous decisions. Portuguese speakers overgeneralize 'will' as the
        default English future marker, producing 'I will study medicine' when they
        have a long-term plan, where English requires 'I am going to study medicine.'
        This overuse of 'will' for planned events is documented in Swan & Smith (2001)
        as the most common future-form error among Romance L1 learners, and in Azevedo
        (1996) as a direct consequence of the lack of a grammatically encoded plan-vs-spontaneity
        distinction in Portuguese future expressions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I go to study.'' Correct: ''I am going to study.'''
    - 'Wrong: ''I will study medicine (it is my plan).'' Correct: ''I am going to
      study medicine.'''
    - 'Wrong: ''She will go to the store after work (planned).'' Correct: ''She is
      going to go to the store after work.'''
    why_it_happens: 'Portuguese uses ''ir + infinitivo'' (literally ''go + infinitive'')
      as the standard future construction without an auxiliary verb. English requires
      ''be going to + infinitive'' with the obligatory auxiliary ''be.'' Portuguese
      speakers transfer this structure literally and produce ''I go to study'' instead
      of ''I am going to study.'' Additionally, Portuguese does not grammatically
      distinguish between planned future (ir + inf) and spontaneous future — context
      disambiguates. English requires ''be going to'' for pre-existing plans and ''will''
      for spontaneous decisions. Portuguese speakers overgeneralize ''will'' as the
      default English future marker, losing the plan vs. spontaneity distinction.
      Both patterns are documented in Swan and Smith (2001) and Azevedo (1996).

      '
    teacher_tips:
      how_to_explain: 'Write "Eu vou estudar" on the board. Show that English needs
        "AM going to study" — the "am" is essential. Drill: "I am going to, You are
        going to, He/She is going to." Then contrast: "be going to" = plan made before
        speaking. "will" = decision made NOW. "I am going to study tonight" (I decided
        earlier). "I will help you" (I just decided).

        '
      where_to_start: Begin with 'I am going to' for personal plans. 'I am going to
        study tonight.'
      sequencing: 'Week 1: ''Be going to'' structure (auxiliary + going to + infinitive).
        Week 2: ''Be going to'' vs. ''will'' (plan vs. spontaneous decision). Week
        3: ''Be going to'' for predictions with evidence. Week 4: Negative and question
        forms. Week 5: Mixed practice.'
      exercises:
      - name: Going To Structure Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with future meaning. Students fill in the
          correct form of 'be going to' or 'will' based on context (plan vs. spontaneous).
        duration: 15
      - name: Ir Translation
        type: translation
        description: Give 10 Portuguese sentences with 'ir + infinitivo.' Students
          translate using 'be going to.'
        duration: 15
      - name: Going To or Will Decision
        type: multiple-choice
        description: Provide 15 scenarios. Students choose 'be going to' or 'will'
          based on whether the decision was pre-planned or spontaneous. Include distractors
          where context is ambiguous to develop pragmatic sensitivity.
        duration: 15
    sources: *id001
    source_count: 2
    source_type: literature
