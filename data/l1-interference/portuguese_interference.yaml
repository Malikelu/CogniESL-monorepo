  unreal_past:
    interference_patterns:
    - pattern: Use of simple past where past perfect is needed in if-clause for unreal
        past
      example_portuguese: Se eu soubesse, eu teria vindo.
      example_gloss: If I had known, I would have come.
      example_wrong: If I knew, I would come.
      example_correct: If I had known, I would have come.
      explanation: Portuguese uses the pluperfect subjunctive (soubesse) for unreal
        past conditions. English requires 'had + past participle' in the if-clause.
        Portuguese speakers transfer the simple past by analogy with present unreal
        conditionals (second conditional), producing 'If I knew' where English requires
        'If I had known.' This error is documented in Swan & Smith (2001) as characteristic
        of Portuguese learner English at intermediate levels.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'would have' in the if-clause (double conditional transfer)
      example_portuguese: Se eu teria estudado, eu teria passado.
      example_gloss: If I would have studied, I would have passed.
      example_wrong: If I would have studied, I would have passed.
      example_correct: If I had studied, I would have passed.
      explanation: Portuguese allows the conditional form in both clauses of past
        hypotheticals (se eu teria estudado... eu teria passado). English strictly
        prohibits 'would have' in the if-clause of a past unreal conditional. The
        if-clause must use the past perfect (had studied), while only the main clause
        uses 'would have.' Portuguese speakers transfer the double-conditional structure
        directly, producing 'If I would have studied, I would have passed' — a frequently
        documented error in Portuguese learner English. This error is particularly
        persistent because it also occurs in some native English dialects, making
        it harder for learners to recognize as non-standard (Swan & Smith, 2001; Parrott,
        2000).
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''If I knew, I would come.'' (unreal past) Correct: ''If I had known,
      I would have come.'''
    - 'Wrong: ''If I would have studied, I would have passed.'' Correct: ''If I had
      studied, I would have passed.'''
    - 'Wrong: ''If she would have called, I would have answered.'' Correct: ''If she
      had called, I would have answered.'''
    why_it_happens: Portuguese uses the pluperfect subjunctive (soubesse, tivesse
      estudado) for unreal past conditions, which does not map neatly onto English
      past perfect (had known, had studied). Portuguese speakers make two distinct
      transfer errors. First, they use the simple past in the if-clause by analogy
      with present unreal conditionals (second conditional, e.g. 'If I knew the answer,
      I would tell you'), producing 'If I knew, I would come' instead of the required
      'If I had known, I would have come.' Second, Portuguese allows the conditional
      form in both clauses of past hypotheticals (se teria feito...teria conseguido),
      leading speakers to transfer this double-conditional structure as 'If I would
      have studied, I would have passed.' English grammar restricts 'would have' to
      the main clause only. Both errors are well-documented in contrastive analyses
      of Portuguese-English conditional structures (Swan & Smith, 2001; Parrott, 2000;
      Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'Teach the past unreal formula: IF-clause (had + past participle)
        + MAIN CLAUSE (would have + past participle). Write the formula on the board:
        If + had done → would have done. Emphasize two rules: (1) NEVER put "would
        have" in the if-clause. (2) Use "had" in the if-clause, NOT the simple past.
        Drill with regrets: ''If I had studied harder, I would have passed the test.''
        ''If she had left earlier, she would have caught the train.'''
      where_to_start: 'Begin with regrets about the past: ''If I had known, I would
        have helped.'' ''If I had studied, I would have passed.'' Then contrast with
        present hypothetical: ''If I knew the answer (now), I would tell you'' vs.
        ''If I had known the answer (then), I would have told you.'''
      sequencing: 'Week 1: Past unreal structure (had done → would have done). Week
        2: Contrast with present unreal (second conditional). Week 3: Error correction
        focusing on ''would have'' in the if-clause. Week 4: Mixed practice with all
        conditional types.'
      exercises:
      - name: Past Unreal Fill-in-the-Blank
        type: fill-in-the-blank
        description: Provide 15 sentences. Students fill in the correct form of the
          verb using past perfect in the if-clause and 'would have' in the main clause.
        duration: 15
      - name: Would Have in the If-Clause Error Correction
        type: error-correction
        description: Provide 10 sentences with 'would have' incorrectly placed in
          the if-clause. Students identify the error and rewrite using past perfect
          in the if-clause.
        duration: 15
      - name: Present vs Past Unreal Discrimination
        type: sentence-rewrite
        description: Give 10 situations. Students must decide whether each requires
          a present unreal (second conditional) or past unreal (third conditional)
          form and write the correct sentence. For example, 'I didn't study, so I
          failed the exam' → 'If I had studied, I would have passed the exam.'
        duration: 15
      - name: Portuguese to English Unreal Past Translation
        type: translation
        description: Provide 10 Portuguese sentences using pluperfect subjunctive
          (se eu tivesse/se eu teria). Students translate into correct English past
          unreal conditional, avoiding both 'would have' in the if-clause and simple
          past substitution.
        duration: 20
