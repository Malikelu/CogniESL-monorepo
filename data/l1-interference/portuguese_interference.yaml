  bound_to:
    interference_patterns:
    - pattern: Use of 'bound to' for obligation where 'have to' or 'must' is needed
      example_portuguese: Eu tenho que ir.
      example_gloss: I have that to go.
      example_wrong: I am bound to go.
      example_correct: I have to go.
      explanation: Portuguese 'ter que' expresses obligation. English 'bound to' expresses
        certainty about the future, not obligation. Portuguese speakers map 'ter que'
        onto 'bound to' because both convey a sense of inevitability, but the semantic
        domains differ — obligation vs. prediction.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Confusion of 'bound to' (certainty) with 'bound for' (destination)
      example_portuguese: O aviao esta destinado a Lisboa.
      example_gloss: The plane is destined to Lisbon.
      example_wrong: The plane is bound to Lisbon.
      example_correct: The plane is bound for Lisbon.
      explanation: Portuguese 'estar destinado a' covers both certainty and destination
        meanings. English splits these into 'bound to' (certainty) and 'bound for'
        (destination). Portuguese speakers use 'bound for' contexts with 'bound to'
        because their L1 does not distinguish the two prepositions.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am bound to go.'' (obligation) Correct: ''I have to go.'''
    - 'Wrong: ''The plane is bound to Lisbon.'' (destination) Correct: ''The plane
      is bound for Lisbon.'''
    - 'Wrong: ''She is bound to study.'' (obligation) Correct: ''She has to study.'''
    - 'Correct: ''With those dark clouds, it is bound to rain.'' (certainty)'
    why_it_happens: Portuguese 'ter que' expresses obligation, which Portuguese speakers
      may map onto 'bound to' due to the shared sense of inevitability. Additionally,
      Portuguese 'estar destinado a' covers both certainty and destination meanings,
      while English splits these into 'bound to' (certainty) and 'bound for' (destination).
      This L1 transfer leads to two distinct error types — using 'bound to' for obligation,
      and confusing 'bound to' with 'bound for' when indicating travel destinations.
    teacher_tips:
      how_to_explain: 'Teach the three-way distinction: ''bound to'' = certainty (It
        is bound to rain), ''bound for'' = destination (The plane is bound for London),
        ''have to'' = obligation (I have to study). Write all three on the board and
        contrast them with Portuguese ''ter que'' and ''estar destinado a.'''
      where_to_start: Begin with certainty uses of 'bound to' since this is the most
        common meaning. Then introduce 'bound for' for destinations. Finally, contrast
        both with 'have to' for obligation.
      sequencing: 'Week 1: ''Bound to'' for certainty. Week 2: ''Bound for'' for destinations.
        Week 3: Contrast ''bound to'' (certainty) vs. ''have to'' (obligation). Week
        4: Mixed practice with all three.'
      exercises:
      - name: Bound To Or Bound For
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between 'bound to' (certainty)
          and 'bound for' (destination).
        duration: 15
      - name: Obligation vs Certainty Drill
        type: error-correction
        description: Provide 10 sentences where 'bound to' is incorrectly used for
          obligation. Students correct using 'have to' or 'must.'
        duration: 15
      - name: Bound To For Translation
        type: translation
        description: Give 10 Portuguese sentences using 'ter que' and 'estar destinado
          a.' Students translate, choosing the correct English structure.
        duration: 15
