  be_about_to_due_to:
    interference_patterns:
    - Portuguese speakers confuse 'be about to' with 'be going to' and 'will' because Portuguese uses the ir + infinitive
      construction (e.g. 'Eu vou sair' = 'I go to leave') for all near-future meanings, with no structural equivalent to the
      English 'be about to + verb' immediate-future construction. Portuguese learners produce errors like 'I am going to leave
      now' (using going to for an immediate action), 'I will leave right now' (using will), or 'I go to leave' (calque from
      Portuguese ir + infinitive) instead of 'I am about to leave'. The error is compounded because Portuguese 'estar prestes
      a' (to be on the verge of) exists but is formal and less frequent than ir + infinitive, so learners default to the more
      familiar ir-structure mapped onto 'be going to'.
    - Portuguese speakers overuse 'because' and 'because of' in place of 'due to', and conversely use 'due to' in adverbial
      positions where English requires 'because of' or a full because-clause. Portuguese 'devido a' (due to) and 'por causa
      de' (because of) are used more freely in adverbial positions than English 'due to', which is restricted to adjectival/modifier
      positions in formal grammar. Errors include 'He arrived late due to traffic' (informal but widely accepted) being produced
      in formal writing where 'owing to' or 'because of' would be preferred, and 'Due to the rain, the match was cancelled'
      used in contexts where prescriptive grammar requires 'Because of the rain, the match was cancelled' or 'Owing to the
      rain, the match was cancelled'. Portuguese 'devido a' does not carry the same prescriptive restriction.
    - Portuguese speakers produce 'due to + clause' (e.g. 'The match was cancelled due to it was raining') by transferring
      Portuguese 'devido a' which can introduce a full clause with a finite verb ('devido a estar chovendo' / 'due to it was
      raining'). English 'due to' requires a noun phrase complement, not a finite clause. The correct English alternatives
      are 'due to the rain' (noun phrase), 'because it was raining' (finite clause), or 'owing to the fact that it was raining'
      (noun phrase embedding a clause). This error is particularly persistent because Portuguese allows both nominal and clausal
      complements after 'devido a'.
    - Portuguese speakers use 'be about to' with future time expressions (e.g. 'I am about to leave tomorrow', 'We are about
      to start the project next week'), transferring the Portuguese pattern where 'ir + infinitive' can combine with any future
      time marker ('Eu vou sair amanha' = 'I am going to leave tomorrow'). English 'be about to' is restricted to the immediate
      future and cannot co-occur with time adverbials. This error reveals a fundamental misunderstanding of the semantic constraint
      on 'be about to' — it encodes imminence, not just futurity.
    why_it_happens: This grammar point combines two structurally unrelated English constructions that happen to share the
      word 'to'. For 'be about to' (immediate future), Portuguese lacks a dedicated immediate-future periphrasis. The closest
      Portuguese equivalents are 'estar prestes a + infinitive' (formal/literary), 'estar a ponto de + infinitive' (neutral),
      and the general ir + infinitive (vou sair = I am going to leave). Portuguese learners map the general ir + infinitive
      onto English 'be going to' and have no natural equivalent for the immediacy encoded in 'be about to'. For 'due to' (reason),
      Portuguese 'devido a' is grammatically more flexible than English 'due to' — it can modify verbs directly (like 'because
      of') and can take clausal complements. English 'due to' is prescriptively restricted to adjectival/modifier positions
      (the delay was due to fog), though this rule is increasingly relaxed in modern usage. Portuguese speakers transfer the
      broader distribution of 'devido a' to 'due to', producing errors in both formal register and complement structure. Both
      errors are deeply persistent because the Portuguese structures (ir + infinitivo for future, devido a for cause) are
      acquired early and used automatically across all registers.
    teacher_tips:
      how_to_explain: Use a two-part lesson since 'be about to' and 'due to' are unrelated structures. For 'be about to',
        create a timeline showing three future forms — 'will' (any future), 'be going to' (planned future), 'be about to'
        (immediate future, seconds/minutes away). Show that Portuguese 'ir + infinitive' covers all three meanings, which
        is why learners overuse 'be going to'. For 'due to', use a contrastive chart — Portuguese 'devido a' can modify verbs
        directly ('Cheguei tarde devido ao transito') but English 'due to' should modify nouns ('The delay was due to traffic').
        Show that 'because of' is the safe all-purpose alternative. Emphasize the prescriptive rule first, then mention that
        modern usage is relaxing it.
      where_to_start: Start with 'be about to' since the immediacy concept is concrete and demonstrable. Physically perform
        actions and say 'I am about to...' just before doing them. Then move to 'due to' — start with the noun-modifier rule
        ('The cancellation was due to rain') and contrast with 'Because of the rain, the match was cancelled.' Finally, address
        the 'due to + clause' error, which is the most persistent.
      exercises:
      - name: Immediate future identification
        type: practice
        description: Present 15 scenarios on cards (e.g. 'You are standing at the door with your keys in hand', 'The teacher
          is writing on the board', 'A friend is calling you next week'). Students sort into 'be about to' (immediate), 'be
          going to' (planned), or 'will' (general future) and write the correct sentence. Forces awareness of the imminence
          constraint.
        duration: 15
      - name: Be about to vs be going to contrastive drill
        type: drill
        description: Provide 20 gapped sentences where students must choose between 'be about to' and 'be going to'. Include
          time adverbial cues (now, right away, tomorrow, next week) to force the distinction. Examples — 'She ___ leave (she
          has her coat on)' -> 'is about to'; 'They ___ travel to Lisbon (next month)' -> 'are going to'. Include 5 trap sentences
          with 'be about to + tomorrow/next week' that students must identify as incorrect.
        duration: 15
      - name: Due to vs because of vs because — register and grammar sorting
        type: practice
        description: Provide 20 sentences with the reason expression removed. Students must fill in 'due to', 'because of',
          or 'because' based on (a) whether the complement is a noun phrase or clause, and (b) the register (formal vs neutral).
          Include formal news-style sentences ('The flight was diverted ___ severe weather'), everyday sentences ('He stayed
          home ___ he was tired'), and trap sentences where 'due to + clause' must be corrected to 'because + clause'.
        duration: 20
      - name: Portuguese-to-English translation — future and reason
        type: drill
        description: 'Give 15 Portuguese sentences targeting both structures. For "be about to": "Ela esta prestes a sair",
          "O trem vai partir agora", "Nos vamos comecar amanha". For "due to": "O voo foi cancelado devido a nevoeiro", "Cheguei
          tarde devido ao transito", "Devido a chover, o jogo foi cancelado". Students translate, choosing the correct English
          structure for each context. Discuss why "I am about to leave tomorrow" and "The game was cancelled due to it was
          raining" are wrong.'
        duration: 20
      - name: Error correction — combined be about to and due to
        type: error-correction
        description: Provide 20 sentences with a mix of Portuguese-transfer errors — 'be about to' with time adverbials, 'be
          going to' for immediate actions, 'due to + clause', 'due to' in adverbial position in formal writing, and Portuguese
          calques ('I go to leave now'). Students identify the error type, explain why it is wrong, and rewrite correctly.
          Include at least 3 sentences that are correct to prevent over-correction.
        duration: 20
    examples:
    - 'Wrong: ''I am going to leave right now.'' (Portuguese: ''Eu vou sair agora.'' — ir + infinitive for all near future)
      Correct: ''I am about to leave.'' (immediate future, no time adverbial needed — the immediacy is built into the structure)'
    - 'Wrong: ''I am about to start the project next week.'' (Portuguese: ''Eu vou comecar o projeto semana que vem.'' — ir
      + infinitive + time adverbial) Correct: ''I am going to start the project next week.'' / ''I will start the project
      next week.'' (be about to cannot take future time expressions)'
    - 'Wrong: ''The match was cancelled due to it was raining.'' (Portuguese: ''O jogo foi cancelado devido a estar chovendo.''
      — devido a + clause) Correct: ''The match was cancelled due to the rain.'' (noun phrase) / ''The match was cancelled
      because it was raining.'' (finite clause)'
    - 'Wrong: ''He arrived late due to traffic.'' (informal register — Portuguese: ''Ele chegou tarde devido ao transito.''
      — devido a modifies verbs freely) Correct (formal): ''He was late due to traffic.'' (modifies noun ''lateness'') / ''He
      arrived late because of traffic.'' (adverbial — use because of, not due to)'
    - 'Wrong: ''Due to the rain, the match was cancelled.'' (prescriptively disputed — Portuguese: ''Devido a chuva, o jogo
      foi cancelado.'' — devido a at sentence start is standard) Correct (formal/prescriptive): ''Because of the rain, the
      match was cancelled.'' / ''Owing to the rain, the match was cancelled.'' (Due to at sentence start is increasingly accepted
      but still flagged in formal editing)'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents future expression transfer errors including ir + infinitive mapped onto be going
      to, and preposition/cause expression transfer including devido a / por causa de interference with due to / because of).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on verbal periphrases
      — describes the Portuguese ir + infinitive future construction and its lack of an immediate-future equivalent to English
      be about to; Chapter on causal expressions — describes the distribution of devido a and por causa de, which is broader
      than English due to / because of, explaining the structural basis for L1 transfer).'
