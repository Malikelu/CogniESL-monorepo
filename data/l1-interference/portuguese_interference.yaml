  collocations_advanced:
    interference_patterns:
    - Portuguese speakers systematically confuse 'make' and 'do' collocations because Portuguese uses a single verb 'fazer' for both
      meanings. Portuguese 'fazer' covers 'make a decision' (tomar uma decisão), 'do homework' (fazer lição de casa), 'make a mistake'
      (cometer um erro / fazer um erro), and 'do a favor' (fazer um favor). This leads to errors like 'I will do a decision' (from
      'Eu vou fazer uma decisão'), 'She made her homework' (from 'Ela fez a lição de casa'), 'He did a big mistake' (from 'Ele
      cometeu/fez um grande erro'), and 'Can you make me a favor?' (from 'Você pode me fazer um favor?'). The make/do distinction
      in English is lexical-grammatical and must be learned collocation by collocation, but Portuguese speakers default to the
      'fazer = do' mapping because 'do' is the more frequent and prototypical equivalent.
    - Portuguese speakers produce unnatural binomial order and pairing errors by transferring Portuguese binomial expressions
      directly into English. Portuguese has its own set of fixed binomials (e.g. 'mais ou menos' = more or less, 'pouco a pouco'
      = little by little, 'agora ou nunca' = now or never) but the specific pairings and orders differ from English. Errors include
      'take and give' for 'give and take' (from Portuguese 'dar e receber' — give comes first in Portuguese), 'forth and back'
      for 'back and forth' (from Portuguese 'para frente e para trás'), 'pros and cons' produced correctly by some but 'cons
      and pros' by others (from Portuguese 'prós e contras' — pros first in Portuguese too, but the mapping is not always
      noticed). Additionally, Portuguese speakers create non-existent binomials by direct translation — 'salt and pepper' is correct
      but 'rice and beans' (from Portuguese 'arroz e feijão') is not a standard English binomial — it is simply a food combination.
    - Portuguese speakers struggle with delexicalised verb + noun collocations (make a concerted effort, pay lip service to, take
      something into account, give someone the benefit of the doubt) because Portuguese typically uses a single full verb where
      English uses a light verb + noun combination. Portuguese 'levar em conta' (take into account) uses the verb 'levar' (carry),
      'prestar homenagem a' (pay tribute to) uses 'prestar' (render), 'dar o benefício da dúvida' (give the benefit of the doubt)
      is a closer match but still structurally different. Portuguese speakers produce errors like 'I will carry your suggestion in
      my mind' (from 'Vou levar sua sugestão em mente' for 'I will take your suggestion into account'), 'She paid a beautiful
      tribute to the artist' (correct but formal — the error is using 'pay tribute' in casual contexts where English prefers simpler
      alternatives), and 'He made a concerted effort' produced as 'He did a big effort' (from 'Ele fez um grande esforço').
    - Portuguese speakers overuse literal translations of Portuguese idiomatic collocations, producing communicatively marked English.
      Portuguese 'fazer sentido' (make sense) maps correctly, but 'fazer falta' becomes 'make lack' instead of 'miss' ('I make lack
      of you' for 'I miss you' / 'Você me faz falta'), 'fazer anos' becomes 'make years' instead of 'have a birthday' ('I made
      30 years' for 'I turned 30' / 'Eu fiz 30 anos'), and 'dar para' becomes 'give for' instead of 'can be used for' ('This
      gives for many things' for 'This can be used for many things' / 'Isso dá para muitas coisas'). These errors are particularly
      persistent because the Portuguese expressions are high-frequency and deeply automatized.
    why_it_happens: Portuguese and English have fundamentally different lexical-constructional systems for expressing actions and
      events. Portuguese relies heavily on full lexical verbs (fazer, levar, dar, pagar, tomar) where English uses delexicalised
      verb + noun collocations (make a decision, take into account, pay tribute, give the benefit of the doubt). The Portuguese
      verb 'fazer' is a super-verb that covers the semantic territory of both English 'make' and 'do' plus additional meanings
      (fazer anos = have a birthday, falta = miss/be lacking). Portuguese binomials exist but have different pairings and sometimes
      different orders than English binomials. Portuguese idiomatic collocations are often opaque to English speakers and cannot
      be translated word-for-word. These patterns are deeply automatized from early L1 acquisition and persist because collocations
      are acquired as chunks — learners must unlearn L1 chunks and acquire new L2 chunks, which requires explicit attention to
      form-meaning mappings that are not salient in natural input. The errors are particularly persistent in spoken language where
      online processing pressure favors L1 chunk retrieval.
    teacher_tips:
      how_to_explain: 'Use a three-part framework: (1) Make vs Do — teach that ''make'' = create/produce/result (make a decision,
        make a mistake, make an effort) while ''do'' = perform/activity (do homework, do research, do a favor). Show that Portuguese
        ''fazer'' covers both. Use a two-column chart with MAKE on the left and DO on the right, and have students sort common
        collocations. (2) Binomials — teach that English binomials have FIXED order. Use a matching activity where students
        match first and second elements. Show Portuguese binomials side-by-side with English to highlight order differences.
        (3) Delexicalised verb + noun collocations — teach that English often uses a ''light verb'' (make, take, give, pay) +
        noun where Portuguese uses a single full verb. Use a contrastive chart: Portuguese ''levar em conta'' = English ''take
        into account''. For idiomatic collocations, teach them as unbreakable chunks — ''I miss you'' not ''I make lack of you''.'
      where_to_start: Start with the make/do distinction since it is the most frequent and most rule-governed error. Use a sorting
        activity with 20 common collocations. Then move to binomials, which are easier to teach as fixed pairs. Finally, address
        delexicalised verb + noun collocations and idiomatic transfers, which require more contextualized practice.
      exercises:
      - name: Make vs Do collocation sorting
        type: drill
        description: Provide 30 collocations on cards (make a decision, do homework, make a mistake, do research, make an effort,
          do a favor, make progress, do damage, make a suggestion, do business, etc.). Students sort into MAKE and DO piles.
          Then they write a sentence with each collocation. Include Portuguese translations showing why fazer maps to both.
        duration: 20
      - name: Binomial order matching
        type: practice
        description: Provide 20 binomials split into first and second elements on separate cards (give / take, back / forth, pros
          / cons, trial / error, bits / pieces, sooner / later, etc.). Students match and arrange in correct English order.
          Then they write the Portuguese equivalent to compare order (e.g., Portuguese 'dar e receber' = give AND receive, but
          English binomial is 'give and take'). Discuss which binomials have the same order in both languages and which differ.
        duration: 15
      - name: Portuguese-to-English collocation translation
        type: drill
        description: Give 15 Portuguese sentences specifically designed to trigger collocation errors. Include make/do confusion
          ('Vou fazer uma decisão' → 'I will make a decision' NOT 'I will do a decision'), binomial order ('dar e receber'
          → 'give and take'), delexicalised verb collocations ('Vou levar em conta sua sugestão' → 'I will take your suggestion
          into account'), and idiomatic transfers ('Você me faz falta' → 'I miss you' NOT 'You make me lack'). Students translate
          each, then self-check against the four error types.
        duration: 20
      - name: Error correction — collocation transfer
        type: error-correction
        description: Provide 20 sentences with Portuguese-style collocation errors covering all four patterns. Examples include
          'She made her homework' (did), 'I will do a decision' (make), 'He gave a big mistake' (made), 'Take and give is important in
          any relationship' (Give and take), 'I made 25 years last week' (I turned 25), 'This gives for many purposes' (This
          can be used for), and 'She carried my opinion in mind' (took my opinion into account). Students identify the error type
          and correct each sentence.
        duration: 20
      - name: Collocation upgrade — informal to advanced
        type: practice
        description: Give students a paragraph written in simple English (e.g., 'The government tried to fix the problem. They
          looked at different ideas. In the end, they chose the best one.'). Students must rewrite it using advanced collocations
          (make a concerted effort, take something into account, give the benefit of the doubt, weigh the pros and cons, make
          a compelling argument). This exercises the delexicalised verb + noun collocation pattern in a productive context.
        duration: 20
      - name: Binomial dominoes
        type: practice
        description: Create domino cards with binomial halves. Students play dominoes by matching first and second elements of
          English binomials correctly (give-and-take, back-and-forth, pros-and-cons, trial-and-error, bits-and-pieces, sooner-or-later).
          After playing, students write each complete binomial in a sentence. This reinforces fixed binomial order through
          repeated exposure.
        duration: 15
    examples:
    - 'Wrong: ''I will do a decision tomorrow.'' (Portuguese: ''Eu vou fazer uma decisão amanhã.'' — fazer maps to make for
      creation/result meanings) Correct: ''I will make a decision tomorrow.'' Rule: make = create/produce/result.'
    - 'Wrong: ''She made her homework last night.'' (Portuguese: ''Ela fez a lição de casa ontem à noite.'' — fazer maps to
      do for activity/performance meanings) Correct: ''She did her homework last night.'' Rule: do = perform/activity.'
    - 'Wrong: ''Take and give is essential in any relationship.'' (Portuguese: ''Dar e receber é essencial em qualquer relacionamento.''
      — Portuguese order: give then receive) Correct: ''Give and take is essential in any relationship.'' Rule: English binomials
      have fixed word order.'
    - 'Wrong: ''I made 30 years last month.'' (Portuguese: ''Eu fiz 30 anos no mês passado.'' — fazer anos = have a birthday/turn
      an age) Correct: ''I turned 30 last month.'' / ''I had my 30th birthday last month.'' Rule: fazer anos ≠ make years.'
    - 'Wrong: ''You make me lack.'' (Portuguese: ''Você me faz falta.'' — fazer falta = miss/be lacking) Correct: ''I miss
      you.'' Rule: Portuguese idiomatic collocations cannot be translated word-for-word.'
    - 'Wrong: ''He did a big mistake.'' (Portuguese: ''Ele cometeu/fez um grande erro.'' — fazer erro = make a mistake) Correct:
      ''He made a big mistake.'' Rule: make a mistake is a fixed collocation.'
    - 'Wrong: ''She carried my suggestion in mind.'' (Portuguese: ''Ela levou minha sugestão em mente/consideração.'' — levar em
      conta/mente = take into account) Correct: ''She took my suggestion into account.'' Rule: delexicalised verb + noun collocations
      often differ from Portuguese single-verb equivalents.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents lexical transfer errors including make/do confusion from Portuguese fazer, binomial
      order differences, and delexicalised verb collocation mismatches).'
    - 'Nesselhauf, N. (2005). Collocations in a Learner Corpus. John Benjamins. (Documents L1 transfer effects on English
      collocation production by speakers of Romance languages including Portuguese, including delexicalised verb + noun collocation
      errors and binomial pairing difficulties).'
    - 'Yamashita, J. & Jiang, N. (2010). L1 Influence on the Processing of L2 Collocations: A Cross-Linguistic Study. Applied
      Linguistics, 31(4), 503-529. (Documents L1 transfer in collocation processing, including Romance language speakers'' difficulty
      with English collocations that lack direct L1 equivalents).'
