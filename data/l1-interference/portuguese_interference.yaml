  cohesion_advanced:
    interference_patterns:
    - pattern: Double conjunction — 'but' after 'although'
      example_portuguese: Embora seja dificil, mas eu vou tentar.
      example_gloss: Although it is difficult, but I will try.
      example_wrong: Although it is difficult, but I will try.
      example_correct: Although it is difficult, I will try.
      explanation: Portuguese allows 'embora...mas' (although...but) as a paired
        conjunction structure. English never uses 'but' after 'although' because
        'although' already carries the concessive meaning. Portuguese speakers
        transfer the paired structure directly, producing redundant double
        conjunctions. This is one of the most frequently documented L1 transfer
        errors for Portuguese ESL learners (Swan & Smith 2001; Azevedo 1996).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Double causal connector — 'so' after 'because'
      example_portuguese: Eu nao vou porque estou cansado entao.
      example_gloss: I not go because I am tired so.
      example_wrong: I am not going because I am tired so.
      example_correct: I am not going because I will try.
      explanation: Portuguese allows 'porque...entao' (because...so) as a paired
        causal conjunction structure. English never uses 'so' after 'because' —
        only one connector is used per causal relationship. Portuguese speakers
        transfer the paired structure directly, producing 'because...so' in English.
        This pattern is documented in contrastive analyses of Portuguese-English
        discourse structure (Swan & Smith 2001; Azevedo 1996).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Double conjunction — 'but' after 'however'
      example_portuguese: No entanto, mas eu discordo.
      example_gloss: However, but I disagree.
      example_wrong: However, but I disagree.
      example_correct: However, I disagree.
      explanation: Portuguese allows 'no entanto...mas' (however...but) as a paired
        conjunction structure. English never uses 'but' after 'however' because
        'however' already carries the adversative meaning. Portuguese speakers
        transfer the paired structure directly, producing redundant double
        conjunctions in formal and informal registers.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''Although it is difficult, but I will try.'' Correct: ''Although it
      is difficult, I will try.'' OR ''It is difficult, but I will try.'''
    - 'Wrong: ''I am not going because I am tired so.'' Correct: ''I am not going
      because I am tired.'' OR ''I am tired, so I am not going.'''
    - 'Wrong: ''However, but I disagree.'' Correct: ''However, I disagree.'' OR
      ''But I disagree.'''
    why_it_happens: Portuguese discourse-marking system permits paired connectors
      where English strictly requires a single connector per logical relationship.
      Three paired structures transfer directly into English as redundancy errors.
      First, the concessive pair 'embora...mas' (although...but) is grammatical in
      Portuguese but produces 'although...but' in English. Second, the causal pair
      'porque...entao' (because...so) is grammatical in Portuguese but produces
      'because...so' in English. Third, the adversative pair 'no entanto...mas'
      (however...but) is grammatical in Portuguese but produces 'however...but' in
      English. In all three cases, Portuguese treats the paired connectors as a
      cohesive unit marking the relationship from both sides of the clause boundary,
      while English marks the relationship once — either in the subordinate clause
      (although, because) or in the main clause (but, so). This structural difference
      in how the two languages package discourse relations is documented in contrastive
      analyses of Romance-language learners of English (Swan & Smith 2001; Azevedo 1996)
      and in cohesion research (Halliday & Hasan 1976; Celce-Murcia & Larsen-Freeman 1999).
    teacher_tips:
      how_to_explain: 'Rule: ONE connector per logical link. For concession: ''although''
        OR ''but,'' never both. For cause: ''because'' OR ''so,'' never both. For
        contrast: ''however'' OR ''but,'' never both. Write the three Portuguese pairs
        on the board (embora...mas, porque...entao, no entanto...mas) and show that
        English keeps only ONE word from each pair.'
      where_to_start: "Begin with the 'although...but' error since it is the most
        frequent and most easily noticed. Write 'Although it rained, but we went' on
        the board and ask: 'Is this English? No - it is Portuguese word order in
        English words.'"
      sequencing: 'Week 1: Single connector rule - concession (although/but). Week
        2: Single connector rule - cause (because/so). Week 3: Single connector rule
        - contrast (however/but). Week 4: Mixed practice - students identify and
        correct all three error types in a paragraph.'
      exercises:
      - name: Double Conjunction Elimination
        type: error-correction
        description: Provide 15 sentences with redundant paired connectors (although+but,
          because+so, however+but). Students delete the redundant word and explain
          why it is wrong.
        duration: 15
      - name: Connector Choice Practice
        type: fill-in-the-blank
        description: Give 20 sentence pairs where students must choose the correct
          single connector from pairs (although/but, because/so, however/but,
          therefore/so).
        duration: 15
      - name: Paragraph Cohesion Edit
        type: editing
        description: Provide a 200-word academic paragraph with 8 cohesion errors
          (double conjunctions, redundant connectors). Students identify and correct
          each error, then rewrite the paragraph with proper single connectors.
        duration: 20
