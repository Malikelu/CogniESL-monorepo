    assessment: Expert-evaluated for L1 transfer severity — Portuguese
    notes: 'Portuguese "muito" (very/much/many) is uninflected for countability and works for both countable and uncountable
      nouns. English distinguishes "many" (countable) vs "much" (uncountable). Portuguese also allows pluralization of
      virtually all nouns (informações, conselhos, móveis) while English restricts pluralization to count nouns. Students
      default to "a lot of" as a universal quantifier to avoid the many/much split, leading to register inappropriateness
      in formal writing. Four interference patterns documented: (1) pluralization of uncountable nouns, (2) many/much confusion
      from single L1 quantifier, (3) double-marking after quantifiers, (4) register-insensitive "a lot of" overuse. Three
      independent sources: contrastive teaching reference (Swan & Smith 2001), structural linguistics reference (Azevedo 1996),
      and peer-reviewed acquisition study (Tryzna 2009).'
  deduction_speculation:
    interference_patterns:
    - Portuguese uses ser vs estar which does not exist in English, causing transfer errors related to 'deduction speculation'.
    why_it_happens: Portuguese handles 'deduction speculation' differently from English. Portuguese L1 speakers transfer native
      structural patterns to English, leading to systematic errors. The error is persistent because the Portuguese structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Portuguese and English for 'deduction speculation'. Show the Portuguese
        structure side-by-side with English. Highlight the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Portuguese handles 'deduction speculation' differently
        from English. Use visual aids or color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Portuguese sentences, students translate to English, focusing on correct 'deduction speculation'
          structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Portuguese-style 'deduction speculation' errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'deduction speculation' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'deduction speculation' errors.
        duration: 15
    examples:
