  there_vs_it:
    interference_patterns:
    - pattern: Use of 'it' where English uses 'there'
      example_portuguese: Tem muitos livros.
      example_gloss: It has many books.
      example_wrong: It has many books.
      example_correct: There are many books.
      explanation: Portuguese 'ter' (to have) is used existentially (tem muitos livros
        = it has many books). English uses 'there is/there are' for existential statements.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Use of 'there' where English uses 'it'
      example_portuguese: E importante estudar.
      example_gloss: There is important to study.
      example_wrong: There is important to study.
      example_correct: It is important to study.
      explanation: Portuguese uses 'ser' without a subject for impersonal statements.
        English uses 'it' as a dummy subject with 'be' + adjective + infinitive.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''It has many books.'' Correct: ''There are many books.'''
    - 'Wrong: ''There is important to study.'' Correct: ''It is important to study.'''
    - 'Wrong: ''It has a party tonight.'' Correct: ''There is a party tonight.'''
    why_it_happens: 'Portuguese uses ''ter'' (to have) for existential statements:
      ''Tem muitos livros'' (It has many books = There are many books). English uses
      ''there is/there are'' for existential statements and ''it is'' for impersonal
      statements with adjectives. Portuguese speakers confuse these because Portuguese
      uses a single structure (ter/ser without explicit subject) for both meanings.'
    teacher_tips:
      how_to_explain: 'Create two columns: ''THERE IS/ARE'' (existence) and ''IT IS''
        (impersonal). Show that Portuguese ''tem'' = ''there is/are'' and Portuguese
        ''e'' (impersonal) = ''it is.'' Drill: ''There are many people'' (existence)
        vs. ''It is important'' (impersonal).'
      where_to_start: 'Begin with existential ''there is/are.'' Use the classroom:
        ''There are 20 students. There is a board. There are windows.'''
      sequencing: 'Week 1: ''There is/are'' for existence. Week 2: ''It is'' for impersonal
        statements. Week 3: Contrast between ''there'' and ''it.'' Week 4: Mixed practice.'
      exercises:
      - name: There vs It Decision
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose between 'there
          is/are' and 'it is.'
        duration: 15
      - name: Existential Translation
        type: translation
        description: Give 10 Portuguese sentences with 'tem.' Students translate using
          'there is/are.'
        duration: 15
