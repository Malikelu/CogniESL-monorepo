  past_simple:
    interference_patterns:
    - pattern: Use of present perfect where past simple is required
      example_portuguese: Eu ja comi pizza ontem.
      example_gloss: I already ate pizza yesterday.
      example_wrong: I have already eaten pizza yesterday.
      example_correct: I already ate pizza yesterday.
      explanation: Portuguese uses the present perfect for completed past actions,
        even with specific past time markers. English uses the simple past with specific
        past time references.
      frequency: 5
      persistence: 4
      communicative_impact: 2
    - pattern: Use of simple past with 'ever/never' where English requires present
        perfect
      example_portuguese: Voce ja comeu sushi? Eu nunca comi.
      example_gloss: You already ate sushi? I never ate.
      example_wrong: Did you ever eat sushi? I never ate sushi.
      example_correct: Have you ever eaten sushi? I have never eaten sushi.
      explanation: Portuguese uses the simple past (pretérito perfeito) with 'já'
        (already/ever) and 'nunca' (never) for experiential statements. English requires
        the present perfect for life experiences with 'ever' and 'never.' Portuguese
        speakers transfer the simple past pattern, producing 'I never ate sushi' instead
        of 'I have never eaten sushi.' This is one of the most persistent Portuguese
        L1 errors documented in ESL learner corpora.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: ''I have eaten pizza yesterday.'' Correct: ''I ate pizza yesterday.'''
    - 'Wrong: ''I have seen him last week.'' Correct: ''I saw him last week.'''
    - 'Wrong: ''Did you ever eat sushi? I never ate sushi.'' Correct: ''Have you ever
      eaten sushi? I have never eaten sushi.'''
    why_it_happens: Portuguese uses the present perfect (pretérito perfeito) for completed
      past actions, even with specific time markers like 'ontem' (yesterday) and 'na
      semana passada' (last week). English uses the simple past with specific past
      time references. Portuguese speakers transfer the present perfect pattern and
      produce 'I have eaten yesterday.' Additionally, Portuguese uses the simple past
      with 'já' (already/ever) and 'nunca' (never) for experiential statements, while
      English requires the present perfect for life experiences ('Have you ever...?'
      / 'I have never...'). Portuguese speakers transfer the simple past pattern to
      experiential contexts, producing 'I never ate sushi' instead of 'I have never
      eaten sushi.'
    teacher_tips:
      how_to_explain: 'Teach two rules: (1) Specific past time = simple past (yesterday,
        last week, in 2020, ago). (2) Life experiences with ever/never = present perfect.
        Drill: "Have you ever eaten sushi?" not "Did you ever eat sushi?"'
      where_to_start: 'Begin with the most common error: ''I have eaten yesterday''
        → ''I ate yesterday.'' Then move to experiential: ''I never ate'' → ''I have
        never eaten.'''
      sequencing: 'Week 1: Simple past with specific time markers. Week 2: Present
        perfect for life experiences (ever/never). Week 3: Contrast between the two.
        Week 4: Mixed practice.'
      exercises:
      - name: Past Simple Drill
        type: fill-in-the-blank
        description: Provide 20 sentences with past time markers. Students use simple
          past.
        duration: 15
      - name: Present Perfect vs Past Simple Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between present
          perfect and simple past.
        duration: 15
      - name: Experiential Ever Never Drill
        type: fill-in-the-blank
        description: Provide 10 questions and statements with ever/never. Students
          use present perfect for life experiences.
        duration: 10
