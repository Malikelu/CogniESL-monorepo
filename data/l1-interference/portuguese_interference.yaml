  formal_conditionals:
    interference_patterns:
    - pattern: Use of 'were' in formal conditionals
      example_portuguese: Se eu fosse voce, eu nao faria isso.
      example_gloss: If I were you, I would not do that.
      example_wrong: If I was you, I would not do that.
      example_correct: If I were you, I would not do that.
      explanation: Portuguese uses the imperfect subjunctive (fosse) for all persons
        without distinction. English requires 'were' for all persons in formal hypothetical
        conditionals (subjunctive mood), though 'was' is common in informal speech.
        Portuguese speakers default to 'was' because their L1 does not distinguish
        persons in the subjunctive.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of 'would' in the if-clause
      example_portuguese: Se eu faria isso, eu seria feliz.
      example_gloss: If I would do that, I would be happy.
      example_wrong: If I would do that, I would be happy.
      example_correct: If I did that, I would be happy.
      explanation: Portuguese allows the conditional tense (faria) in both clauses
        of a hypothetical sentence. English restricts 'would' to the main clause only;
        the if-clause must use the simple past (or past subjunctive 'were'). Portuguese
        speakers transfer the double-conditional pattern directly, producing 'If I
        would... I would...' which is ungrammatical in standard English.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of present tense instead of past tense in second conditional
      example_portuguese: Se eu tenho dinheiro, eu compro um carro.
      example_gloss: If I have money, I buy a car.
      example_wrong: If I have money, I would buy a car.
      example_correct: If I had money, I would buy a car.
      explanation: Portuguese uses the present indicative (tenho) in conditional clauses
        that express hypothetical future meaning. English requires the past tense
        (had) in the if-clause of a second conditional. Portuguese speakers transfer
        the present-tense conditional pattern, producing 'If I have... I would...'
        instead of the correct 'If I had... I would...' This error is particularly
        persistent because the Portuguese present-conditional is logically transparent
        to the speaker.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: ''If I was you...'' (formal) Correct: ''If I were you...'''
    - 'Wrong: ''If I would have time, I would go.'' Correct: ''If I had time, I would
      go.'''
    - 'Wrong: ''If I have money, I would travel.'' Correct: ''If I had money, I would
      travel.'''
    why_it_happens: Portuguese and English have fundamentally different conditional
      sentence architectures. Portuguese uses the imperfect subjunctive (fosse) for
      all persons in hypothetical if-clauses, which does not map neatly onto English
      'were/was'. Additionally, Portuguese permits the conditional tense (faria) in
      both the if-clause and the main clause, while English restricts 'would' to the
      main clause only. Third, Portuguese uses the present indicative in hypothetical
      conditional clauses where English requires the past tense. These three structural
      differences produce the three most common conditional errors among Portuguese
      speakers.
    teacher_tips:
      how_to_explain: 'Teach the three conditional patterns as a system: (1) If +
        past simple, would + base verb. (2) No ''would'' in the if-clause. (3) ''Were''
        for all persons in formal hypotheticals. Use a table showing Portuguese conditional
        structure side-by-side with English to highlight the differences.'
      where_to_start: Begin with the second conditional (unreal present) since it
        is the most frequent. Drill 'If I had... I would...' before introducing 'were'
        and the double-'would' error.
      sequencing: 'Week 1: Second conditional — past tense in if-clause, would in
        main clause. Week 2: No ''would'' in if-clause (double-would error). Week
        3: ''Were'' for all persons in formal conditionals. Week 4: Mixed practice
        with all three patterns.'
      exercises:
      - name: Formal Conditional Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students use 'were' in formal conditionals.
        duration: 10
      - name: Double-Would Error Correction
        type: error-correction
        description: Provide 10 sentences with 'would' in the if-clause. Students
          identify the error and rewrite using the correct past tense form.
        duration: 15
      - name: Conditional Transformation
        type: transformation
        description: Give 10 Portuguese conditional sentences. Students translate
          into correct English, paying attention to tense in the if-clause and avoiding
          double-would.
        duration: 15
