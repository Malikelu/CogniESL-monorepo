  cohesion_advanced:
    interference_patterns:
    - Portuguese discourse relies heavily on paratactic coordination with "e" (and) to chain clauses together, a pattern that
      transfers directly to English as "and"-overuse. Portuguese speakers produce run-on paragraphs like "I woke up and I ate
      breakfast and I went to work and I had lunch and I came home" where English requires varied structure — separate sentences,
      subordinate clauses, participial phrases, or asyndeton. Portuguese "e" is used far more frequently than English "and" because
      Portuguese discourse favors explicit coordination at every clause boundary, while English academic and professional writing
      expects hypotaxis (subordination) and lexical cohesion instead of relentless conjunction. This is the single most visible
      cohesion error for Portuguese speakers in English writing.
    - Portuguese speakers underuse advanced English discourse markers (however, nevertheless, moreover, furthermore, consequently,
      in contrast, as a result) because Portuguese has a smaller set of general-purpose conjunctions — "mas" (but), "então"
      (so/then), "e" (and) — that cover all registers. Portuguese "mas" works in formal and informal contexts alike, so learners
      default to "but" in academic writing where English requires "however" or "nevertheless". Portuguese "então" covers both
      resultative and temporal meanings, leading to overuse of "so" in contexts requiring "therefore", "consequently", or "as a
      result". The result is writing that sounds informal and lacks the sophisticated cohesive signaling expected in English
      academic and professional discourse.
    - Portuguese speakers repeat nouns instead of using English reference, substitution, and ellipsis. Portuguese tends to
      repeat the full noun phrase for clarity where English uses pronouns (it, they, them), demonstratives (this, that, these,
      those), the former/the latter, substitution (do so, so does he), or ellipsis (omitting the repeated element entirely).
      Errors include "The government made a decision. The government then announced the decision. The decision was controversial"
      instead of "The government made a decision, announced it, and faced controversy over it" or "After the government's decision,
      it...". Portuguese also lacks a productive equivalent of English "one/ones" as a pronominal nominalizer ("the red one"),
      leading to noun repetition where English prefers substitution.
    - Portuguese speakers produce comma splices and run-on sentences by transferring Portuguese punctuation conventions. Portuguese
      allows clause juxtaposition with commas (parataxis with comma) in contexts where English requires a period, semicolon, or
      conjunction. Errors include "It was raining, we stayed home" (comma splice from Portuguese "Estava chovendo, ficamos em
      casa"), "I was tired, I went to bed early, I woke up early" (run-on from Portuguese comma-chaining). Portuguese punctuation
      rules are more permissive about comma use between independent clauses, and this transfers directly to English writing,
      producing comma splices that are considered serious errors in English academic writing.
    why_it_happens: Portuguese discourse organization is fundamentally more paratactic than English. Portuguese relies on a small
      set of high-frequency coordinating conjunctions (e, mas, então, ou) to link clauses, while English has a rich system of
      cohesive devices — discourse markers (however, moreover, consequently), reference (this, that, the former, the latter),
      substitution (do so, so does + subject), ellipsis, and lexical cohesion (synonyms, collocations, superordinate/hyponym
      relations). Portuguese "e" is the default connector at every clause boundary, used 3-4x more frequently than English "and"
      in comparable texts. Portuguese "mas" covers the entire register spectrum from casual to formal, whereas English distributes
      contrast across "but" (informal), "however" (neutral/formal), "nevertheless" (formal), "yet" (formal, mid-sentence), and
      "although" (subordinating). Portuguese "então" is polysemous (resultative + temporal + discourse marker) where English
      splits these into "so/therefore/then". Portuguese punctuation allows comma-chaining of independent clauses that would be
      comma splices in English. These patterns are deeply automatized from early L1 acquisition and persist into advanced
      proficiency, particularly in writing where learners have more time to apply L1 discourse planning strategies. The errors
      are communicatively significant because English academic and professional writing is evaluated partly on cohesive
      sophistication — writing that relies on "and...and...and" and "but" in formal contexts is perceived as immature or
      non-native.
    teacher_tips:
      how_to_explain: 'Use a four-layer cohesion model: (1) Reference — use pronouns, demonstratives, the former/latter instead
        of repeating nouns. (2) Substitution — use "do so", "so does he", "the red one" instead of repeating the verb/noun. (3)
        Ellipsis — omit repeated elements when context makes them clear. (4) Discourse markers — replace "and" chains with
        "moreover", "furthermore", "in addition" for addition; replace "but" with "however", "nevertheless", "yet" for contrast;
        replace "so" with "therefore", "consequently", "as a result" for result. For punctuation, teach the English rule: two
        independent clauses cannot be joined by a comma alone — use a period, semicolon, or comma + coordinating conjunction.
        Show Portuguese and English paragraphs side-by-side to make the paratactic vs. hypotactic difference visible.'
      where_to_start: Start with the "and"-chain breakdown since it is the most frequent and visible error. Give students a
        Portuguese-style chained paragraph and have them rewrite it using varied English cohesion. Then move to discourse marker
        register awareness (but → however/therefore). Then teach reference/substitution/ellipsis as alternatives to noun repetition.
        Finally, address comma splices and run-on sentences from Portuguese punctuation transfer.
      exercises:
      - name: And-chain breakdown and restructuring
        type: practice
        description: 'Give students 8 Portuguese-style "e"-chained paragraphs (5-8 clauses connected by "and"). Students must
          rewrite each into natural English using varied cohesion — separate sentences, subordinate clauses, participial phrases,
          discourse markers (moreover, furthermore, as a result), and asyndeton. Goal: eliminate at least half the "and" conjunctions.
          Example input: "I woke up and I ate breakfast and I went to work and I had a meeting and I came home and I cooked dinner
          and I watched TV and I went to bed." Example output: "I woke up, ate breakfast, and went to work. After a meeting, I
          came home, cooked dinner, watched TV, and went to bed."'
        duration: 20
      - name: Discourse marker upgrade — informal to formal cohesion
        type: practice
        description: 'Give students a 200-word essay written with Portuguese-style basic conjunctions (and, but, so) in every
          position. Students must upgrade each connector to an appropriate English discourse marker: "and" → "moreover", "furthermore",
          "in addition", "as well as"; "but" → "however", "nevertheless", "yet", "on the other hand"; "so" → "therefore",
          "consequently", "as a result", "thus". Discuss which choices are appropriate for academic writing vs. conversation.
          Then students write their own 150-word paragraph on any topic using at least 6 different advanced discourse markers.'
        duration: 20
      - name: Reference, substitution, and ellipsis replacement drill
        type: drill
        description: 'Provide 15 sentences with Portuguese-style noun/verb repetition. Students must rewrite each using English
          reference (it, they, them, this, that, these, those, the former, the latter), substitution (do so, so does/did + subject,
          one/ones), or ellipsis (omitting repeated elements). Examples: "The report was published. The report showed that..." →
          "The report was published and showed that..." or "The report, published last week, showed that..."; "I asked him to leave
          and he did so" (not "and he left"); "I prefer the red one" (not "I prefer the red car" when context is clear).'
        duration: 15
      - name: Comma splice and run-on repair
        type: error-correction
        description: 'Provide 15 sentences with Portuguese-style comma splices and run-ons (e.g. "It was raining, we stayed home",
          "I was tired, I went to bed early, I woke up early", "She studied hard, she passed the exam, she was happy"). Students
          identify each error, explain why it is wrong in English (two independent clauses cannot be joined by a comma alone), and
          rewrite each sentence using correct English punctuation — period, semicolon, or comma + coordinating conjunction. Include
          5 correct sentences as distractors to prevent over-correction.'
        duration: 15
      - name: Cohesion analysis — Portuguese vs. English paragraph comparison
        type: practice
        description: 'Give students two versions of the same paragraph — one written with Portuguese-style cohesion (and-chains,
          noun repetition, basic conjunctions, comma splices) and one written with natural English cohesion (varied discourse markers,
          reference, substitution, ellipsis, correct punctuation). Students must identify and label every cohesion difference between
          the two versions, categorizing each as (a) conjunction overuse, (b) discourse marker underuse, (c) noun repetition vs.
          reference/substitution, or (d) punctuation error. Then they write their own paragraph on a given topic, consciously applying
          English cohesion strategies.'
        duration: 20
    examples:
    - 'Wrong: ''I woke up and I ate breakfast and I went to work and I had lunch and I came home.'' (Portuguese paratactic
      chaining with ''e'') Correct: ''I woke up, ate breakfast, and went to work. After lunch, I came home.'' (English uses varied
      structure — participial phrases, separate sentences, asyndeton)'
    - 'Wrong: ''The results were good. But the sample was small. But the method was rigorous.'' (Portuguese ''mas'' in every
      contrastive position) Correct: ''The results were good. However, the sample was small. Nevertheless, the method was
      rigorous.'' (English varies discourse markers for register and cohesion)'
    - 'Wrong: ''The government made a decision. The government announced the decision. The decision was controversial.'' (Portuguese
      noun repetition for clarity) Correct: ''The government made a controversial decision and announced it immediately.'' (English
      uses pronouns, subordination, and ellipsis)'
    - 'Wrong: ''It was raining, we stayed home, we watched movies.'' (Portuguese comma-chaining) Correct: ''It was raining, so
      we stayed home and watched movies.'' / ''Because it was raining, we stayed home and watched movies.'' (English requires
      conjunction or subordination, not comma alone)'
    - 'Wrong: ''I don''t like coffee and tea.'' (Portuguese negative coordination with ''e'') Correct: ''I don''t like coffee
      or tea.'' (English requires ''or'' in negative coordination)'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents paratactic coordination transfer with ''e'' → ''and'' overuse, discourse marker
      underuse from Portuguese ''mas''/''então'' transfer, register inappropriateness in formal writing, and comma splice errors
      from Portuguese punctuation conventions).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on discourse and
      coordination — describes the Portuguese paratactic coordination system built around ''e'', ''mas'', ''então'', ''ou'' and
      its structural differences from English hypotactic cohesion, explaining the basis for L1 transfer to English writing).'
