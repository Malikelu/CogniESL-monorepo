  countable_uncountable:
    interference_patterns:
    - Portuguese speakers treat English uncountable nouns as countable because the
      corresponding Portuguese nouns are grammatically countable and accept plural
      marking. Portuguese conselho/conselhos maps to English advice/advices, informação/informações
      maps to information/informations, mobília/mobílias maps to furniture/furnitures, and
      equipamento/equipamentos maps to equipment/equipments. All of these are regular count
      nouns in Portuguese. This leads to persistent errors like many informations, good advices,
      some furnitures, and several equipments where English requires bare uncountable forms.
      The error is particularly stubborn because the Portuguese plural is semantically logical
      -- multiple pieces of advice ARE multiple items -- and learners must acquire the arbitrary
      English convention that these nouns resist pluralization regardless of semantic quantity.
    - Portuguese speakers overuse many with uncountable nouns and occasionally use much with
      countable nouns because Portuguese muito/muita/muitos/muitas does not distinguish
      countability. Portuguese muitos conselhos (many pieces of advice) and muita informação
      (much information) use the same root quantifier with only gender/number agreement.
      English requires a hard split -- many for countables, much for uncountables. Portuguese
      speakers produce many information, many research, much people, and much studies because
      the L1 quantifier system maps onto English without the countability filter. This error
      persists into advanced proficiency and academic writing, where it produces register-marked
      output.
    - Portuguese speakers add plural -s to English uncountable nouns that end in consonants
      or -e, where the plural is phonologically salient and easy to produce, while avoiding
      the error with nouns that already end in -s in the singular (e.g., news, means). The
      error pattern follows Portuguese phonotactics -- just as conselho becomes conselhos and
      informação becomes informações in Portuguese, learners produce advices, informations,
      furnitures, homeworks, knowledges, and luggages. The error is reinforced by the fact
      that these Portuguese plurals are semantically transparent -- informações means multiple
      pieces of information -- making the English bare form feel incomplete to L1 Portuguese
      speakers.
    why_it_happens: Portuguese does not have a grammatical countability distinction comparable
      to English. While some Portuguese nouns are typically used in the singular (e.g., água,
      ouro), the vast majority of nouns -- including those that are uncountable in English --
      are fully countable in Portuguese and accept plural marking -- conselhos, informações,
      mobílias, equipamentos, bagagens. The Portuguese quantifier system built around muito
      does not distinguish countability the way English many/much does. Additionally,
      Portuguese does not have a productive piece of partitive construction comparable to
      English a piece of advice/furniture/information -- Portuguese simply pluralizes the
      noun directly. The result is three converging transfer errors -- (1) pluralization of
      English uncountables, (2) many overextension to uncountables, and (3) occasional much
      overextension to countables. These errors are deeply persistent because the Portuguese
      patterns are semantically motivated and acquired in early childhood, making the English
      arbitrary countability distinction feel unnatural. The errors are most visible in
      academic and professional writing where uncountable nouns (information, research,
      evidence, knowledge, equipment) are frequent.
    teacher_tips:
      how_to_explain: 'Use a three-part contrastive chart: (1) Portuguese countable noun +
        plural goes to English uncountable noun (no plural). Show 10 high-frequency pairs:
        conselhos to advice, informações to information, mobília to furniture, equipamento to
        equipment, bagagem to luggage, conhecimento to knowledge, pesquisa to research,
        evidência to evidence, trabalho to homework/work, progresso to progress. (2) Portuguese
        muito (no countability split) becomes English many (countable) vs much (uncountable).
        (3) English partitive rescue strategy: when you need to count an uncountable, use a
        piece of, an item of, a bit of -- not plural -s. Emphasize that English countability
        is ARBITRARY and must be memorized noun by noun -- it is not about logic, it is about
        convention.'
      where_to_start: Start with the highest-frequency uncountable nouns that Portuguese
        speakers pluralize -- information, advice, furniture, luggage, knowledge, research,
        evidence, equipment, homework, progress. Use a sorting exercise where students
        categorize 30 nouns as countable, uncountable, or both (with different meanings).
        For each uncountable, they write the Portuguese equivalent and note whether it is
        countable in Portuguese. Then move to the many/much split using the quantifier map
        from the a_lot_of entry. Finally, teach the partitive construction (a piece of, an
        item of) as the rescue strategy when learners need to express quantity with
        uncountables.
      exercises:
      - name: Countable vs uncountable sorting
        type: practice
        description: Provide 40 noun cards including the 10 high-frequency Portuguese-to-English
          uncountable mismatches (information, advice, furniture, luggage, knowledge, research,
          evidence, equipment, homework, progress) plus 30 control nouns. Students sort into
          countable, uncountable, or both. For each uncountable, they write the Portuguese
          equivalent and note whether it is countable in Portuguese. This makes the L1
          mismatch visible.
        duration: 15
      - name: Plural error correction -- uncountable nouns
        type: error-correction
        description: 'Provide 20 sentences with Portuguese-style uncountable noun
          pluralization errors (e.g. I have many informations about this topic, She gave me
          good advices, We need new furnitures for the office, He has many knowledges about
          history, The police collected many evidences). Students identify the error, explain
          why the noun is uncountable in English, and correct the sentence. Include the
          partitive rescue where appropriate (a piece of information, several pieces of
          advice).'
        duration: 15
      - name: Many vs much quantifier choice drill
        type: drill
        description: 'Provide 25 gapped sentences where students must choose between many and
          much. Include both straightforward cases (many people / much time) and tricky cases
          where Portuguese would use muito for both (many information becomes much information,
          much studies becomes many studies). Time pressure to build automaticity. Include
          academic register sentences with research, evidence, knowledge, progress.'
        duration: 15
      - name: Portuguese-to-English translation -- countable/uncountable mismatch
        type: drill
        description: 'Give 15 Portuguese sentences that directly trigger countable/uncountable
          errors. Include: Ele me deu muitos conselhos (not many advices becomes much advice /
          a lot of advice), Precisamos de mais informações (not more informations becomes more
          information), Comprei mobília nova (not new furnitures becomes new furniture), Ela
          tem muitos conhecimentos (not many knowledges becomes much knowledge / a lot of
          knowledge). Students translate, focusing on correct English countability.'
        duration: 15
      - name: Partitive construction practice
        type: practice
        description: 'Teach the English partitive construction as a rescue strategy for
          uncountable nouns. Provide 15 uncountable nouns (advice, information, furniture,
          luggage, knowledge, research, evidence, equipment, homework, progress, news,
          traffic, weather, work, music). For each, students write a sentence using a
          partitive expression (a piece of advice, an item of information, a piece of
          furniture, a bit of knowledge, a piece of research). Then they write a sentence
          using the same noun with a quantifier (much advice, little information, a lot of
          furniture). This builds the two correct alternatives to the Portuguese plural
          strategy.'
        duration: 15
    examples:
    - 'Wrong: I have many informations about this topic. (Portuguese: Tenho muitas informações
      sobre este assunto. -- informações is countable in Portuguese) Correct: I have a lot
      of information about this topic. / I have much information about this topic. / I have
      several pieces of information about this topic.'
    - 'Wrong: She gave me good advices. (Portuguese: Ela me deu bons conselhos. -- conselhos
      is countable in Portuguese) Correct: She gave me good advice. / She gave me some good
      pieces of advice.'
    - 'Wrong: We need new furnitures for the office. (Portuguese: Precisamos de mobília nova
      para o escritório. -- mobília can pluralize as mobílias) Correct: We need new furniture
      for the office. / We need new pieces of furniture for the office.'
    - 'Wrong: Much people attended the conference. (Portuguese: Muitas pessoas conferiram a
      conferência. -- muito does not distinguish countability) Correct: Many people attended
      the conference.'
    - 'Wrong: She has many knowledges about history. (Portuguese: Ela tem muitos conhecimentos
      sobre história. -- conhecimentos is countable in Portuguese) Correct: She has much
      knowledge about history. / She has a lot of knowledge about history. / She has
      extensive knowledge about history.'
    sources:
