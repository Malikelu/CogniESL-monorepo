      example_gloss: I also not like coffee.
      example_wrong: I also not like coffee.
      example_correct: I do not like coffee either.
      explanation: Portuguese uses 'tambem nao' (also not) in negative additive contexts.
        English requires 'not...either' in negative sentences and 'also/too' only in
        affirmative sentences. Portuguese speakers transfer the single-word additive
        'tambem' into negative English sentences, producing 'I also not like' instead
        of 'I do not like...either.' This is a presupposition transfer error because
        'tambem' presupposes an additive context that English encodes differently in
        negative vs. affirmative polarity.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Failure to recognize factive presupposition with 'saber' vs. 'achar'
      example_portuguese: Eu sei que ele e inocente. / Eu acho que ele e inocente.
      example_gloss: I know he is innocent. / I think he is innocent.
      example_wrong: I think he is innocent. (when the speaker knows it as fact)
      example_correct: I know he is innocent.
      explanation: Portuguese 'saber' is factive (presupposes the truth of its complement)
        while 'achar' is non-factive (does not presuppose truth). English similarly
        distinguishes 'know' (factive) from 'think' (non-factive). However, Portuguese
        speakers frequently use 'achar' (think) in contexts where English requires 'know'
        because Portuguese 'achar' can express confident belief more freely than English
        'think.' This leads to presupposition failure when saying ``I think he is innocent``
        when the speaker knows it as fact cancels the factive presupposition that the
        when the speaker knows it as fact cancels the factive presupposition that the
        listener would otherwise infer. The distinction is documented in Swan & Smith
        (2001) for Portuguese speakers and in Celce-Murcia & Larsen-Freeman (2015) for
        factive verb presuppositions generally.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Presupposition failure with change-of-state verbs 'parar de' and 'comecar a'
      example_portuguese: Ele parou de fumar.
      example_gloss: He stopped of smoking.
      example_wrong: Did he stop to smoke? (asking about cessation of smoking)
      example_correct: Did he stop smoking?
      explanation: Portuguese 'parar de + infinitive' (stop doing something) presupposes
        the prior activity. English 'stop + gerund' carries the same presupposition.
        However, Portuguese speakers may produce 'stop to smoke' (infinitive of purpose)
        instead of 'stop smoking' (cessation), especially under communicative pressure.
        The error changes the meaning entirely. ``Stop to smoke`` means ``pause in order
        to smoke,`` while ``stop smoking`` means ``quit smoking.`` The presupposition of
        prior smoking is preserved in ``stop smoking`` but absent in ``stop to smoke.``
        This pattern is documented in Azevedo (1996) for Portuguese infinitive usage
        and in Swan & Smith (2001) for Portuguese speaker errors with English verb
        patterns.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Overuse of definite descriptions with 'o/a' leading to presupposition failure
      example_portuguese: O presidente do Brasil visitou ontem.
      example_gloss: The president of Brazil visited yesterday.
      example_wrong: President of Brazil visited yesterday.
      example_correct: The president of Brazil visited yesterday.
      explanation: Portuguese requires definite articles before titles and unique referents
        more consistently than English. Portuguese speakers may either overuse 'the'
        (transferring Portuguese article rules) or omit it in English where it is required
        for existential presupposition. In English, 'the president' presupposes existence
        and uniqueness. Omitting 'the' ('President of Brazil visited') sounds unnatural
        and fails to trigger the expected presupposition. Conversely, Portuguese speakers
        may add 'the' before proper nouns where English does not use it ('the Brazil'
        vs. 'Brazil'). This is documented in Azevedo (1996) for Portuguese article usage
        and in Swan & Smith (2001) for Portuguese-English article transfer.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I also not like coffee.'' Correct: ''I do not like coffee either.'''
    - 'Wrong: ''I think he is innocent.'' (when known as fact) Correct: ''I know he
      is innocent.'''
    - 'Wrong: ''Did he stop to smoke?'' (meaning: quit) Correct: ''Did he stop smoking?'''
    - 'Wrong: ''President of Brazil visited.'' Correct: ''The president of Brazil visited.'''
    why_it_happens: 'Portuguese and English encode presuppositions differently across
      several linguistic domains. (1) Additive presupposition: Portuguese ''tambem''
      works in both affirmative and negative contexts (''tambem gosto'' = I also like,
      ''tambem nao gosto'' = I also not like), but English requires polarity-sensitive
      forms: ''also/too'' in affirmative, ''either'' in negative. Portuguese speakers
      transfer ''tambem'' into negative English sentences. (2) Factive presupposition:
      Portuguese ''saber'' and English ''know'' are both factive (presuppose complement
      truth), while ''achar''/''think'' are non-factive. However, Portuguese ''achar''
      covers a wider range of confident belief than English ''think,'' leading Portuguese
      speakers to under-use ''know'' and over-use ''think'' in English. (3) Change-of-state
      presupposition: Portuguese ''parar de + infinitive'' maps to English ''stop + gerund,''
      but the English infinitive marker ''to'' creates ambiguity with purpose clauses
      (''stop to smoke'' = pause in order to smoke). Portuguese speakers may produce
      the infinitive form under L1 transfer. (4) Definite description presupposition:
      Portuguese uses definite articles more consistently with unique referents and
      titles. English article rules differ, leading to both overuse and underuse of
      ''the'' by Portuguese speakers. These patterns are documented in Swan & Smith
      (2001), Azevedo (1996), and Celce-Murcia & Larsen-Freeman (2015).'
    teacher_tips:
      how_to_explain: 'Use the negation test: negate the sentence and see what survives.
        ''She regrets leaving'' -> ''She doesn''t regret leaving'' -> she still left
        (presupposition survives). For ''tambem nao,'' teach: ''In English, we say
        ''either'' at the END of negative sentences, not ''also'' before the verb.''
        Write both on the board: ''I like coffee TOO'' / ''I don''t like coffee EITHER.'''
      where_to_start: 'Begin with the tambem nao / either contrast since it is the most
        frequent error. Then introduce factive vs. non-factive verbs (know vs. think).
        Use the negation test throughout to help students identify what is presupposed
        vs. what is asserted.'
      sequencing: 'Week 1: Additive presupposition (also/too vs. either). Week 2: Factive
        verbs (know, regret, realize) vs. non-factive (think, believe). Week 3: Change-of-state
        verbs (stop, start, continue) and the gerund/infinitive distinction. Week 4:
        Definite descriptions and article usage with presupposition. Week 5: Mixed
        practice with loaded questions and political rhetoric.'
      exercises:
      - name: Either or Also Decision
        type: fill-in-the-blank
        description: Provide 15 sentences (mixed affirmative and negative). Students
          must insert 'also,' 'too,' or 'either' in the correct position.
        duration: 15
      - name: Factive Verb Identification
        type: error-correction
        description: Give 10 sentences where students must identify whether the verb
          is factive (presupposes truth) or non-factive. Then rewrite sentences where
          'think' should be 'know.'
        duration: 15
      - name: Stop Gerund vs. Infinitive
        type: sentence-rewrite
        description: Provide 10 Portuguese sentences with 'parar de + infinitive.'
          Students translate into English using 'stop + gerund,' ensuring the presupposition
          of prior activity is preserved.
        duration: 15
      - name: Presupposition Negation Test
        type: guided-discovery
        description: Give 10 sentences. Students negate each one and identify which
          parts remain true (presupposed) and which change (asserted). Works well
          at B2+ level.
        duration: 20
      - name: Definite Article Presupposition
        type: fill-in-the-blank
        description: Provide 15 noun phrases where students must decide whether 'the'
          is required for existential presupposition. Include titles, unique referents,
          and first-mention vs. subsequent-mention contexts.
        duration: 15
