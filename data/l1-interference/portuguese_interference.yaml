  present_perfect_baseline:
    interference_patterns:
    - pattern: Use of simple past for recent events with present relevance
      example_portuguese: Eu acabei de comer.
      example_gloss: I just ate.
      example_wrong: I just ate.
      example_correct: I have just eaten.
      explanation: Portuguese uses the simple past with 'acabar de' for recent events.
        English uses the present perfect with 'just.'
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of simple past for life experiences where English requires present
        perfect
      example_portuguese: Eu ja visitei Lisboa.
      example_gloss: I already visited Lisbon.
      example_wrong: I already visited Lisbon.
      example_correct: I have already visited Lisbon.
      explanation: Portuguese uses the simple past (pretérito perfeito composto is
        rare and semantically different) for life experiences with 'já.' English requires
        the present perfect for indefinite past experiences with present relevance.
        Portuguese speakers transfer the simple past, producing 'I already visited'
        instead of 'I have already visited.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I just ate.'' Correct: ''I have just eaten.'''
    - 'Wrong: ''She already left.'' Correct: ''She has already left.'''
    - 'Wrong: ''I already visited Lisbon.'' Correct: ''I have already visited Lisbon.'''
    - 'Wrong: ''Did you ever go to Brazil?'' Correct: ''Have you ever been to Brazil?'''
    why_it_happens: 'Portuguese uses ''acabar de + infinitive'' with the simple past
      for recent events: ''Eu acabei de comer'' (I just ate). English uses the present
      perfect with ''just'': ''I have just eaten.'' Portuguese speakers transfer the
      simple past pattern. Additionally, Portuguese uses the simple past (pretérito
      perfeito) for life experiences with ''já'' (already): ''Eu já visitei Lisboa''
      (I already visited Lisbon). English requires the present perfect for indefinite
      past experiences: ''I have already visited Lisbon.'' The Portuguese pretérito
      perfeito composto (tem visitado) exists but has a habitual/repeated meaning
      (has been visiting) rather than the English present perfect experiential meaning.
      This semantic mismatch leads Portuguese speakers to default to the simple past
      in English where the present perfect is required (Swan & Smith, 2001; Azevedo,
      1996).'
    teacher_tips:
      how_to_explain: Teach 'have/has + just + past participle' for very recent events.
        Contrast with 'just + simple past' which is more common in American English
        but less standard. For life experiences, teach 'Have you ever...?' as a fixed
        present perfect question form. Show that Portuguese 'já + simple past' maps
        to English 'have/has + already + past participle.'
      where_to_start: 'Begin with ''I have just eaten'' for recent meals. Then move
        to life experiences: ''Have you ever been to...?'' and ''I have already visited...'''
      sequencing: 'Week 1: Present perfect with ''just.'' Week 2: Present perfect
        with ''already'' and ''yet.'' Week 3: Present perfect with ''ever'' and ''never''
        for life experiences. Week 4: Mixed practice contrasting simple past vs. present
        perfect.'
      exercises:
      - name: Just Already Yet Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must use 'just,' 'already,'
          or 'yet' with present perfect.
        duration: 15
      - name: Life Experience Interview
        type: speaking
        description: 'Students ask and answer ''Have you ever...?'' questions in pairs.
          Topics include travel, food, sports, and culture. Students must use present
          perfect for all answers and follow-up questions.

          '
        duration: 20
