  passive_voice_complex:
    interference_patterns:
    - pattern: Omission of 'be' in modal + passive constructions
      example_portuguese: O trabalho deve ser feito.
      example_gloss: The work must be done.
      example_wrong: The work must done.
      example_correct: The work must be done.
      explanation: Portuguese places 'ser' between the modal and the past participle
        (deve ser feito). English requires 'modal + be + past participle' (must be
        done). Portuguese speakers may omit 'be' because Portuguese does not use an
        auxiliary equivalent to 'be' between the modal and the past participle — the
        structure is modal + ser + participle, and 'ser' maps to 'be' but learners
        often drop it, producing 'must done' instead of 'must be done.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'been' in perfect passive constructions
      example_portuguese: O trabalho tem sido feito.
      example_gloss: The work has been done.
      example_wrong: The work has done.
      example_correct: The work has been done.
      explanation: Portuguese forms the perfect passive with 'ter/haver + sido + past
        participle' (tem sido feito). English uses 'have/has/had + been + past participle'
        (has been done). Portuguese speakers may omit 'been' because the Portuguese
        auxiliary chain (ter + sido) maps imperfectly to English (have + been), and
        learners simplify by using only the past participle after 'have', producing
        'the work has done' instead of 'the work has been done.' This error is particularly
        persistent because Portuguese allows the past participle to stand with 'ter/haver'
        without an intervening passive marker equivalent to 'been.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''The work must done.'' Correct: ''The work must be done.'''
    - 'Wrong: ''The work has done.'' Correct: ''The work has been done.'''
    - 'Wrong: ''The letter should sent.'' Correct: ''The letter should be sent.'''
    - 'Wrong: ''The house had built.'' Correct: ''The house had been built.'''
    why_it_happens: Portuguese and English passive constructions differ in their auxiliary
      chains. In Portuguese, modals combine directly with 'ser' + past participle
      (deve ser feito = must be done), and perfect passives use 'ter/haver' + 'sido'
      + past participle (tem sido feito = has been done). English requires 'be' in
      modal passives (must be done) and 'been' in perfect passives (has been done).
      Portuguese speakers omit these auxiliaries because (1) the Portuguese auxiliary
      'ser' is phonologically reduced and sometimes perceived as optional by learners,
      and (2) Portuguese does not require a separate passive marker between 'ter/haver'
      and the past participle — 'sido' is often dropped in colloquial Portuguese,
      reinforcing the omission of 'been' in English. Both patterns are documented
      in Swan & Smith (2001) for Portuguese learners and in Azevedo (1996) for Portuguese
      auxiliary verb structure.
    teacher_tips:
      how_to_explain: 'Write the formula on the board: MODAL + BE + PAST PARTICIPLE.
        Drill: ''must be done, can be seen, should be finished, will be sent.'' Then
        teach perfect passive: HAVE + BEEN + PAST PARTICIPLE. ''has been done, had
        been built, will have been completed.'' Emphasize that English always needs
        the ''be/been'' link — it is never optional.'
      where_to_start: Begin with modal + be + past participle using 'must be' and
        'should be.' Once students master the 'be' link, introduce perfect passives
        with 'has been' and 'had been.'
      sequencing: 'Week 1: Modal + be + past participle (must be, should be, can be).
        Week 2: Perfect passive with have/has/had + been + past participle. Week 3:
        Mixed modal and perfect passive practice. Week 4: Error correction and production
        tasks.'
      exercises:
      - name: Modal Passive Drill
        type: fill-in-the-blank
        description: Provide 10 sentences with modals. Students insert 'be' and the
          correct past participle form.
        duration: 15
      - name: Been Insertion
        type: error-correction
        description: Provide 10 perfect passive sentences where 'been' has been omitted.
          Students identify the error and insert 'been' in the correct position.
        duration: 15
      - name: Passive Chain Building
        type: sentence-rewrite
        description: Give 10 active voice sentences with modals or perfect tenses.
          Students rewrite them in the passive voice, ensuring all auxiliary links
          are present.
        duration: 20
