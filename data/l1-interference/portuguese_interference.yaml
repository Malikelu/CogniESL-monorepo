  this_that_these_those:
    interference_patterns:
    - pattern: Overuse of this for objects near the listener (Portuguese esse/essa)
      example_portuguese: Esse livro e bom.
      example_gloss: That book is good.
      example_wrong: This book is good. (when referring to object near listener)
      example_correct: That book is good.
      explanation: Portuguese has a three-way demonstrative system este/esse/aquele
        based on proximity to speaker/listener/remote. Esse/essa refers to objects
        near the listener, which maps to English that. Portuguese speakers often
        overuse this because the Portuguese system splits the English that domain
        into two categories (esse for listener-proximate, aquele for remote), and
        the default transfer is this for anything not clearly remote.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of that for objects near the speaker (Portuguese este/esta)
      example_portuguese: Este livro e meu.
      example_gloss: This book is mine.
      example_wrong: That book is mine. (when holding the book)
      example_correct: This book is mine.
      explanation: Portuguese este/esta refers to objects close to the speaker, which
        maps to English this. However, Portuguese speakers sometimes default to that
        as a safer or more neutral choice, especially in formal or written contexts,
        because Portuguese aquele (remote) can be used as a general distal form. This
        leads to underuse of this for speaker-proximate references.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Confusion of these/those plural forms following singular this/that errors
      example_portuguese: Esses livros sao bons.
      example_gloss: Those books are good.
      example_wrong: These books are good. (when books are near listener, not speaker)
      example_correct: Those books are good.
      explanation: The same three-way distance distinction applies to plural demonstratives
        (estes/esses/aqueles). Portuguese speakers who transfer the singular pattern
        (using this for esse-proximate referents) extend the error to plurals, producing
        these where those is required. The plural forms add an additional layer of
        complexity because English requires agreement (this/these, that/those) while
        Portuguese has four forms per number (este/esta/esse/essa).
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: This is good. (pointing to object near listener) Correct: That is good.'
    - 'Wrong: That is my book. (holding own book) Correct: This is my book.'
    - 'Wrong: These are interesting. (referring to listener''s papers) Correct: Those
      are interesting.'
    why_it_happens: 'Portuguese has a three-way demonstrative system based on spatial
      and discourse distance from both speaker and listener: este/esta (near speaker),
      esse/essa (near listener), aquele/aquela (remote from both). English has a
      two-way system: this/these (near speaker) and that/those (everything else).
      The Portuguese system requires speakers to track proximity to both interlocutors,
      while English only tracks proximity to the speaker. This structural mismatch
      causes Portuguese speakers to (a) overuse this for objects near the listener
      (esse-domain), because the English two-way system does not distinguish listener-proximity,
      and (b) sometimes default to that as a neutral distal form. The three-way system
      is documented in Azevedo (1996) as a core feature of Portuguese grammar, and
      the transfer errors to English are documented in Swan & Smith (2001) under
      Romance language speaker profiles. The plural forms (estes/esses/aqueles vs.
      these/those) compound the difficulty because Portuguese has more demonstrative
      forms (12+ including gender/number) than English (4: this/that/these/those).'
    teacher_tips:
      how_to_explain: 'Stand in the middle of the room. Hold up a book: THIS is near
        me (speaker). Point to a book near a student: THAT is near you (listener).
        Point to a book across the room: THAT is far from both of us. Emphasize: English
        only cares about distance from the SPEAKER. Draw a simple diagram: a circle
        around you = THIS, everything else = THAT.'
      where_to_start: Begin with physical objects at different distances. Use the
        classroom as a real-world map.
      sequencing: 'Week 1: This/that with concrete objects (distance from speaker).
        Week 2: These/those with plural objects. Week 3: Abstract/discourse references
        (this idea vs. that idea). Week 4: Portuguese three-way vs. English two-way
        comparison. Week 5: Mixed practice with error correction.'
      exercises:
      - name: This or That Distance Game
        type: oral-drill
        description: Place objects at various distances from the speaker. Students
          must correctly identify each as this/these (near speaker) or that/those
          (near listener or far from both).
        duration: 10
      - name: Portuguese to English Demonstrative Translation
        type: translation
        description: Give 15 Portuguese sentences using este/esse/aquele. Students
          translate into English, choosing this/that/these/those correctly based on
          context provided.
        duration: 15
      - name: Demonstrative Error Correction
        type: error-correction
        description: Provide 12 sentences with demonstrative errors typical of Portuguese
          speakers. Students identify and correct each error, explaining why the
          original was wrong.
        duration: 15
      - name: Picture Description with Demonstratives
        type: speaking
        description: Show a picture with people and objects at various distances. Students
          describe the scene using this/that/these/those correctly, referencing objects
          near different people in the picture.
        duration: 10
