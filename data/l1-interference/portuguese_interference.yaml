  modals_past:
    interference_patterns:
    - pattern: Use of 'could' for single past achievements
      example_portuguese: Eu consegui abrir a porta.
      example_gloss: I managed to open the door.
      example_wrong: I could open the door.
      example_correct: I managed to open the door. / I was able to open the door.
      explanation: Portuguese 'conseguir' + infinitive expresses managed to do something.
        English 'could' expresses general past ability, not single achievements. For
        single achievements, English uses 'managed to' or 'was able to.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'would' for past states where 'used to' is required
      example_portuguese: Eu morava em Lisboa quando era crianca.
      example_gloss: I lived in Lisbon when I was a child.
      example_wrong: I would live in Lisbon when I was a child.
      example_correct: I used to live in Lisbon when I was a child.
      explanation: Portuguese speakers often overextend 'would' to describe past states
        and situations (morava = lived/used to live). English 'would' only describes
        repeated past actions, not past states. For past states and situations, English
        requires 'used to.' This overextension occurs because Portuguese 'imperfeito'
        tense (morava, era, tinha) covers both habitual actions and ongoing states,
        and Portuguese speakers map this single form onto both 'would' and 'used to.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I could open the door.'' (single event) Correct: ''I managed to open
      the door.'''
    - 'Wrong: ''She could pass the test.'' (single event) Correct: ''She managed to
      pass the test.'''
    - 'Wrong: ''I would live in Lisbon when I was a child.'' Correct: ''I used to
      live in Lisbon when I was a child.'''
    - 'Wrong: ''He would have a blue car.'' (past state) Correct: ''He used to have
      a blue car.'''
    why_it_happens: Portuguese 'conseguir' (to manage to) expresses successfully doing
      something on a specific occasion. English 'could' expresses general past ability,
      not single achievements. For single past achievements, English uses 'managed
      to' or 'was able to.' Portuguese speakers use 'could' for both meanings. Additionally,
      Portuguese 'imperfeito' tense (morava, era, tinha) covers both habitual past
      actions and ongoing past states with a single verb form. English splits this
      into two structures — 'would' for repeated actions only, and 'used to' for both
      actions and states. Portuguese speakers overextend 'would' to states because
      their L1 does not distinguish the two. This is documented in Swan & Smith (2001)
      under past tense modal usage and in Azevedo (1996) regarding Portuguese aspectual
      distinctions in the imperfeito.
    teacher_tips:
      how_to_explain: 'Teach the distinction: ''could'' = general past ability (I
        could swim when I was 5), ''managed to/was able to'' = single achievement
        (I managed to fix the car yesterday). Then teach: ''would'' = repeated past
        actions only (Every summer we would visit grandma), ''used to'' = past actions
        AND states (I used to live in Lisbon / I used to play soccer).'
      where_to_start: 'Begin with general ability: ''I could swim when I was young.''
        Then contrast with single achievements: ''I managed to pass the test.'' Then
        introduce the would/used to distinction with actions first, then states.'
      sequencing: 'Week 1: ''Could'' for general past ability. Week 2: ''Managed to''
        for single achievements. Week 3: ''Was able to'' as an alternative. Week 4:
        ''Would'' vs ''used to'' — actions vs states. Week 5: Mixed practice covering
        all four structures.'
      exercises:
      - name: Could vs Managed To Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'could'
          and 'managed to.'
        duration: 15
      - name: Would vs Used To Sort
        type: error-correction
        description: Provide 15 sentences where 'would' is incorrectly used for past
          states. Students identify the error and rewrite using 'used to.' Includes
          5 distractor sentences where 'would' is correctly used for repeated actions.
        duration: 15
