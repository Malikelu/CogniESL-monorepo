  inverted_conditionals:
    interference_patterns:
    - pattern: Omission of subject-auxiliary inversion in formal conditionals
      example_portuguese: Se eu tivesse dinheiro, eu viajaria.
      example_gloss: If I had money, I would travel.
      example_wrong: If I had known, I would have helped.
      example_correct: Had I known, I would have helped.
      explanation: Portuguese does not use subject-auxiliary inversion in conditional
        clauses. All conditional meaning is carried by the conjunction "se" (if) with
        no word-order change. English formal register allows inversion (Had I known
        = If I had known; Were she here = If she were here). Portuguese speakers
        rarely produce these inverted forms and may not recognize them as conditional
        structures when reading.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Overuse of "if" with subjunctive-equivalent structures where English
        uses "were" inversion
      example_portuguese: Se eu fosse rico, eu viajaria.
      example_gloss: If I were rich, I would travel.
      example_wrong: If I were rich, I would buy a house. (not wrong per se, but
        fails to use the formal inverted form)
      example_correct: Were I rich, I would buy a house.
      explanation: 'Portuguese uses "se" + imperfect subjunctive (se eu fosse) for
        hypothetical conditionals. English has two forms for present/future unreal
        conditionals - the standard "if + subject + were" and the formal inverted
        "were + subject" (without "if"). Portuguese speakers almost always produce
        the "if" form because Portuguese has no inverted equivalent. In formal
        writing and exams, this results in a register error rather than a grammatical
        one, but the inability to produce or parse inverted conditionals is a documented
        gap for Portuguese-speaking learners.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Standard: If I had known, I would have helped. Formal inverted: Had I known,
      I would have helped.'
    - 'Standard: If she were here, she would agree. Formal inverted: Were she here,
      she would agree.'
    - 'Standard: If they should arrive early, tell them to wait. Formal inverted:
      Should they arrive early, tell them to wait.'
    why_it_happens: 'Portuguese conditional clauses are formed exclusively with the
      conjunction "se" (if) followed by the appropriate verb form (indicative for
      real or open conditions, subjunctive for unreal or hypothetical). Portuguese has
      no subject-auxiliary inversion in conditional clauses - the word order remains
      the same regardless of conditionality. English, by contrast, allows three
      inversion patterns in formal conditionals - (1) Had + subject + past participle
      (for past unreal), (2) Were + subject (for present unreal), and (3) Should
      + subject + base verb (for future open conditions). Because Portuguese lacks
      this structural option entirely, Portuguese-speaking learners must acquire
      both the form and the register awareness (formal or written) associated with
      inverted conditionals. The error is primarily one of omission - learners
      produce the "if" form correctly but fail to use inversion where formal register
      demands it, and may misparse inverted conditionals in reading comprehension.'
    teacher_tips:
      how_to_explain: 'Write two sentences side by side: "If I had known" and "Had
        I known." Explain that the second is the formal version — the "if" disappears
        and the subject and auxiliary swap places. Use a three-step transformation:
        (1) Start with the "if" version, (2) Remove "if," (3) Move the auxiliary
        before the subject. Drill with the three patterns: Had..., Were..., Should....'
      where_to_start: Begin with "Had + subject + past participle" (past unreal
        conditionals) since this is the most common inverted form in written English.
        Then introduce "Were + subject" (present unreal). Finally cover "Should +
        subject" (future open).
      sequencing: 'Week 1: Recognition — students identify inverted conditionals
        in reading passages. Week 2: Had-inversion transformations (if → had). Week
        3: Were-inversion transformations. Week 4: Should-inversion transformations.
        Week 5: Mixed practice with register awareness (when to use formal inversion).'
      exercises:
      - name: Inversion Recognition
        type: identification
        description: Provide a short formal text (150 words) containing 5 inverted
          conditionals. Students underline each inverted conditional and rewrite
          it in standard "if" form.
        duration: 15
      - name: Had Inversion Transformation
        type: transformation
        description: Give 10 past unreal conditionals with "if." Students rewrite
          each using "Had + subject + past participle."
        duration: 15
      - name: Were and Should Inversion Practice
        type: transformation
        description: Give 10 conditionals (5 present unreal, 5 future open). Students
          rewrite each using the appropriate inversion (Were... or Should...).
        duration: 15
      - name: Register Matching
        type: matching
        description: Provide 10 sentences — 5 formal, 5 informal. Students match
          each "if" conditional to its inverted equivalent and label the register.
        duration: 10
