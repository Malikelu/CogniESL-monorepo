  bound_to:
    interference_patterns:
    - Portuguese speakers avoid or misinterpret the semi-modal "bound to" (meaning "certain to" or "very likely to") because
      Portuguese has no direct structural equivalent. Portuguese expresses certainty/inevitability with adverbs ("certamente,"
      "com certeza"), periphrastic futures ("vai acabar por"), or "estar destinado a" — none of which map onto English "bound
      to." This leads to avoidance (learners use "will certainly" or "probably will" instead of "bound to") and misinterpretation
      (reading "bound to" as "obligated to" by analogy with "bound by" or "bound for"). Errors include "It will certainly
      rain today" where "It's bound to rain today" is more natural, and "He is bound to his contract" (confusing "bound to"
      with "bound by").
    - Portuguese speakers produce ungrammatical transfers when attempting to express the "bound to" meaning, using literal
      translations from Portuguese structures. Errors include "He is bound for fail" (from "Ele esta destinado a falhar" —
      mixing "bound to" with "bound for"), "It is bound that it will rain" (from "E certo que vai chover" — using a finite
      clause where English requires "bound to" + infinitive), and "She bound to come" (omitting the copula "is" — Portuguese
      "Ela vem" can express future without an auxiliary, so learners drop "is" from "She is bound to come"). The copula omission
      is particularly persistent because Portuguese allows subject-verb-complement structures without a copula equivalent
      to "be" in many contexts.
    - Portuguese speakers overuse "going to" as a substitute for "bound to" because Portuguese "ir + infinitive" (vai chover,
      vai acontecer) covers both the predictive "going to" meaning and the certainty/inevitability meaning that English splits
      between "going to" and "bound to." This produces errors like "It's going to rain — look at those clouds" (acceptable
      but less precise than "It's bound to rain") and "He's going to fail — he never studies" (where "He's bound to fail"
      better conveys inevitability). The overuse of "going to" for "bound to" contexts is a register and precision issue rather
      than a grammatical error, but it reduces the learner's expressive range and makes their English sound less idiomatic.
    why_it_happens: English "bound to" is a semi-modal idiom meaning "certain or very likely to happen." It requires the structure
      [be + bound + to-infinitive] and conveys a stronger degree of certainty than "probably will" but is distinct from "obligated
      to" (bound by) and "heading toward" (bound for). Portuguese has no single structural equivalent. Portuguese expresses
      inevitability through (1) adverbial phrases ("certamente," "com certeza," "sem duvida"), (2) the periphrastic future
      with "ir" ("vai chover" = "it's going to rain"), (3) "estar destinado a" + infinitive ("is destined to"), and (4) "acabar
      por" + infinitive ("end up"). None of these map cleanly onto "bound to," so Portuguese learners either avoid the structure
      entirely, confuse it with "bound by" or "bound for," or substitute "going to" as the closest Portuguese equivalent via
      "ir + infinitive." The copula omission error ("She bound to come") arises because Portuguese can express future events
      with just a verb ("Ela vem amanha" = "She comes tomorrow / She is coming tomorrow") without an explicit auxiliary, leading
      learners to drop "is" from the English semi-modal construction. These errors are moderately persistent because the Portuguese
      strategies for expressing certainty are deeply automatized and because "bound to" is a low-frequency item that learners
      encounter relatively late in their studies.
    teacher_tips:
      how_to_explain: Use a certainty scale showing the gradient from "might" (low certainty) → "will probably" → "is going
        to" → "is bound to" (high certainty, inevitability). Show that "bound to" sits at the top of the certainty scale and
        implies the speaker has strong evidence or logical reason. Contrast with "bound by" (obligated) and "bound for" (heading
        toward) to prevent confusion. For the copula omission error, emphasize that English ALWAYS requires "is/are/was/were"
        before "bound to" — there is no subject-drop in English.
      where_to_start: Start with the certainty scale and the "bound to" vs "going to" distinction, since this is the most
        common and most easily testable error. Give students 10 scenarios and have them choose between "going to" and "bound
        to." Then address the copula omission error ("She bound to come" → "She IS bound to come"). Finally, address the "bound
        to" vs "bound by" vs "bound for" confusion with a three-way sorting exercise.
      exercises:
      - name: Certainty scale placement
        type: practice
        description: Give students 20 sentences expressing varying degrees of certainty (e.g. "Look at those dark clouds"
          / "He never studies" / "The sun rises in the east"). Students must rewrite each using the most appropriate certainty
          expression — might, will probably, is going to, or is bound to. Discuss why "bound to" is the best choice for high-certainty
          predictions based on evidence.
        duration: 15
      - name: Bound to vs bound by vs bound for sorting
        type: practice
        description: Provide 18 sentences using "bound" in three ways — "bound to" (certain to), "bound by" (obligated by),
          "bound for" (heading toward). Students sort each sentence into the correct category and explain the difference in
          meaning. Include tricky cases like "The ship is bound for Lisbon" vs "The ship is bound to arrive late" vs "The
          crew is bound by the contract."
        duration: 15
      - name: Copula restoration drill
        type: error-correction
        description: Provide 15 sentences with copula omission errors typical of Portuguese transfer (e.g. "She bound to be
          late," "They bound to win the championship," "It bound to happen eventually"). Students must add the correct form
          of "be" and explain why English requires it. Emphasize that Portuguese can express future/certainty without an auxiliary
          but English cannot.
        duration: 10
      - name: Portuguese-to-English certainty translation
        type: drill
        description: Give 12 Portuguese sentences expressing inevitability/certainty using "certamente," "com certeza," "vai
          acabar por," and "estar destinado a" (e.g. "Certamente vai chover," "Ele esta destinado a falhar," "Vai acabar por
          acontecer"). Students translate each into natural English, choosing between "will probably," "is going to," and
          "is bound to" based on the degree of certainty expressed. Discuss which English option best captures the Portuguese
          meaning.
        duration: 15
      - name: Error correction — bound to confusion
        type: error-correction
        description: Provide 15 sentences with mixed "bound to" errors — copula omission, confusion with "bound by"/"bound
          for," and "going to" substitution where "bound to" would be more precise. Students identify each error type and
          correct it. Examples — "She bound to succeed" (copula omission), "He is bound by his mistakes" (should be "bound
          to repeat his mistakes"), "We are bound for have problems" (should be "bound to have problems").
        duration: 15
    examples:
    - 'Wrong: ''She bound to be late — she always is.'' (Portuguese: ''Ela atrasa sempre'' — no auxiliary needed) Correct:
      ''She is bound to be late — she always is.'' — English requires the copula "is" before "bound to"'
    - 'Wrong: ''It is bound that it will rain.'' (Portuguese: ''E certo que vai chover.'' — finite clause with ''certo que'')
      Correct: ''It is bound to rain.'' — English uses ''bound to'' + infinitive, not a finite clause'
    - 'Wrong: ''He is bound for fail the exam.'' (Portuguese: ''Ele esta destinado a falhar no exame.'' — ''destinado a''
      confused with ''bound for'') Correct: ''He is bound to fail the exam.'' — ''bound to'' (certainty), not ''bound for''
      (direction)'
    - 'Wrong: ''They going to lose — they have no chance.'' (Portuguese: ''Eles vao perder'' — ''ir + infinitive'' covers
      both ''going to'' and ''bound to'') Correct: ''They are bound to lose — they have no chance.'' — ''bound to'' conveys
      stronger inevitability than ''going to'''
    - 'Wrong: ''I am bound by my promise to help.'' (Correct as is — ''bound by'' = obligated by. This is NOT an error but
      a different meaning of ''bound'').'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents modal and semi-modal transfer errors including avoidance of idiomatic English
      semi-modals, copula omission in semi-modal constructions, and overuse of ir + infinitive equivalents).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on future and modal
      expressions — describes the Portuguese ir + infinitive periphrastic future, adverbial certainty markers, and estar destinado
      a, none of which have direct English equivalents, explaining the structural basis for L1 transfer to English semi-modals).'
