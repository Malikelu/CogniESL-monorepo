  capitalization:
    interference_patterns:
    - pattern: Failure to capitalize languages, days, and months
      example_portuguese: Eu estudo ingles e matematica.
      example_gloss: I study english and math.
      example_wrong: I study english and math.
      example_correct: I study English and math.
      explanation: Portuguese does not capitalize languages (ingles), days (segunda-feira),
        or months (janeiro). English capitalizes all of these categories. Portuguese
        speakers transfer the lowercase rule from their L1, producing errors like
        'i study english' and 'i work on monday.'
      frequency: 4
      persistence: 2
      communicative_impact: 1
    - pattern: Failure to capitalize nationalities and geographic proper adjectives
      example_portuguese: Ele e americano e mora no rio.
      example_gloss: He is american and lives in the rio.
      example_wrong: He is american and lives in the rio.
      example_correct: He is American and lives in the Rio.
      explanation: Portuguese does not capitalize nationalities (americano, brasileiro)
        or geographic proper nouns used as adjectives (rio Amazonas -> rio Amazonas).
        English capitalizes all proper adjectives derived from place names (American,
        Brazilian) and geographic proper nouns (the Rio, the Amazon). Portuguese
        speakers transfer the lowercase convention, producing 'he is american' and
        'the rio' instead of 'he is American' and 'the Rio.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: I study english and math. Correct: I study English and math.'
    - 'Wrong: He is american. Correct: He is American.'
    - 'Wrong: I work on monday. Correct: I work on Monday.'
    - 'Wrong: She is brazilian. Correct: She is Brazilian.'
    why_it_happens: Portuguese orthographic rules (Acordo Ortografico) do not capitalize
      languages, days of the week, months, nationalities, or geographic terms used
      generically. English capitalizes all of these categories. The contrast is systematic;
      Portuguese uses lowercase for common nouns and only capitalizes proper names
      in the narrow sense (personal names, specific place names), while English extends
      capitalization to derived proper adjectives (American, Brazilian), languages
      (English, Portuguese), temporal proper nouns (Monday, January), and geographic
      proper nouns (the Rio, the Nile). Portuguese speakers transfer the narrower
      Portuguese capitalization rule, producing systematic lowercase errors across
      all these categories. Azevedo (1996) documents the Portuguese orthographic rules
      in detail, and Swan & Smith (2001) identify this as a persistent error pattern
      for Portuguese-speaking learners of English.
    teacher_tips:
      how_to_explain: 'Create a two-column chart: PORTUGUESE (lowercase) vs. ENGLISH
        (capitalize). List: languages (ingles/English), days (segunda/Monday), months
        (janeiro/January), nationalities (americano/American). Drill: ''In Portuguese,
        it''s lowercase. In English, CAPITALIZE.'''
      where_to_start: Begin with languages and days since these appear most frequently
        in beginner texts.
      sequencing: 'Week 1: Capitalize languages and days. Week 2: Capitalize months
        and nationalities. Week 3: Capitalize geographic proper nouns. Week 4: Mixed
        practice with all categories.'
      exercises:
      - name: Capitalization Drill
        type: error-correction
        description: Provide 15 sentences with capitalization errors across languages,
          days, months, and nationalities. Students identify and correct each error.
        duration: 15
      - name: Portuguese to English Capitalization Transfer
        type: translation
        description: Give 10 Portuguese sentences with lowercase languages, days, and
          nationalities. Students translate into English, applying correct capitalization.
        duration: 15
      - name: Proper Adjective Capitalization
        type: fill-in-the-blank
        description: Provide 12 sentences where students must capitalize proper
          adjectives derived from place names (american, brazilian, chinese, european).
        duration: 10
