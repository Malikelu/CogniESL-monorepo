  there_is_there_are:
    interference_patterns:
    - pattern: Use of 'have' (ter) where there is/are is needed
      example_portuguese: Tem muitos livros na estante.
      example_gloss: It has many books on the shelf.
      example_wrong: It has many books on the shelf.
      example_correct: There are many books on the shelf.
      explanation: Portuguese uses the verb 'ter' (to have) to express existence ('tem
        muitos livros' = there are many books). English requires the existential
        construction 'there is/there are.' Portuguese speakers transfer 'ter' directly
        as 'have,' producing 'it has' instead of 'there are.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Use of 'there is' with plural subjects (agreement error)
      example_portuguese: Tem muitos livros.
      example_gloss: It has many books.
      example_wrong: There is many books.
      example_correct: There are many books.
      explanation: Portuguese 'tem' is invariable — it does not change form for singular
        or plural subjects. English 'there is/there are' requires number agreement
        with the noun that follows. Portuguese speakers, accustomed to the invariable
        'tem,' frequently use 'there is' with plural nouns because the singular/plural
        distinction in the verb form does not exist in their L1 existential construction.
        This error persists even at intermediate levels because the underlying L1
        structure has no agreement requirement.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''It has many books on the shelf.'' Correct: ''There are many books on
      the shelf.'''
    - 'Wrong: ''There is many books on the shelf.'' Correct: ''There are many books
      on the shelf.'''
    - 'Wrong: ''It has a problem here.'' Correct: ''There is a problem here.'''
    why_it_happens: "Portuguese expresses existential statements using the verb 'ter' (to have) in its third-person form 'tem', which is invariable — it does not change for singular or plural subjects. 'Tem um livro' (there is a book) and 'tem muitos livros' (there are many books) use the identical verb form. English, by contrast, requires two distinct structures: 'there is' for singular and 'there are' for plural. Portuguese speakers face two simultaneous challenges: (1) they must replace the conceptual frame of 'having' with the existential 'there is/are', and (2) they must learn to make the verb agree in number with the following noun — a distinction that does not exist in Portuguese existential constructions. The result is a double error pattern: using 'it has' (direct transfer of 'tem') and using 'there is' with plural nouns (transfer of the invariable 'tem' pattern). Both patterns are documented in contrastive analyses of Portuguese and English (Swan & Smith, 2001; Azevedo, 1996)."
    teacher_tips:
      how_to_explain: 'Write ''Tem muitos livros'' on the board. Ask: ''Does English
        say ''it has many books''? No! English says ''THERE ARE many books.'' ''There''
        is not a place here — it is a grammar word.'' Then show the agreement rule:
        ''There IS a book (singular) / There ARE many books (plural).'' Drill both
        the ''there is/are'' frame and the singular/plural agreement.'
      where_to_start: Begin with the concept of 'there is/are' for existence. Contrast
        with 'it has' to break the ter transfer habit. Then introduce singular vs.
        plural agreement.
      sequencing: 'Week 1: There is/are for existence (contrast with ''it has'').
        Week 2: Singular vs. plural agreement with there is/are. Week 3: Question
        forms (Is there? Are there?). Week 4: Negative forms (There isn''t / There
        aren''t). Week 5: Mixed practice with real-world descriptions (classroom,
        city, home).'
      exercises:
      - name: There Is There Are Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with singular and plural subjects. Students
          choose 'there is' or 'there are.'
        duration: 15
      - name: Have-to-There Transformation
        type: transformation
        description: "Give 10 Portuguese-style 'it has' sentences. Students rewrite them using 'there is' or 'there are.' Example: 'It has three parks in my city' becomes 'There are three parks in my city.'"
        duration: 15
      - name: Error Correction - Double Pattern
        type: error-correction
        description: Provide 15 sentences mixing both error types (it has → there
          are; there is + plural → there are). Students identify and correct each
          error.
        duration: 15
