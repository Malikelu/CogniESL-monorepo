  make_vs_do:
    interference_patterns:
    - pattern: Use of make where do is needed (tasks and routines)
      example_portuguese: Eu faco meu dever de casa.
      example_gloss: I make my homework.
      example_wrong: I make my homework.
      example_correct: I do my homework.
      explanation: 'Portuguese fazer covers both English make and do. English
        uses do for tasks, routines, and general activities (do homework, do
        dishes, do exercise). Portuguese speakers transfer fazer → make
        because make is the primary dictionary equivalent.'
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of do where make is needed (creation and production)
      example_portuguese: Eu fiz um bolo para a festa.
      example_gloss: I made a cake for the party.
      example_wrong: I did a cake for the party.
      example_correct: I made a cake for the party.
      explanation: 'English uses make for creating, producing, and constructing
        (make a cake, make a decision, make money, make a plan). Portuguese
        speakers who learn do as the default translation of fazer may overuse
        do in creation contexts, producing errors like "I did a cake" or "She
        did a great job" (acceptable) vs. "She made a great job" (wrong). The
        collocational split between make and do is arbitrary from a Portuguese
        perspective because fazer covers both semantic domains.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I make my homework. Correct: I do my homework.'
    - 'Wrong: I do a cake. Correct: I make a cake.'
    - 'Wrong: She did a mistake. Correct: She made a mistake.'
    - 'Wrong: I need to do a decision. Correct: I need to make a decision.'
    why_it_happens: 'Portuguese has a single verb fazer that covers the semantic
      territory of both English make and do. English splits this domain
      arbitrarily: do is used for tasks, routines, and general activities (do
      homework, do the dishes, do research), while make is used for creating,
      producing, and causing outcomes (make a cake, make a decision, make
      money). Portuguese speakers face a two-way interference problem: they
      may use make where do is needed (I make my homework) because make is
      the primary dictionary equivalent of fazer, or they may use do where
      make is needed (I did a cake) if they have learned do as a safer
      default. The collocational patterns must be memorized individually
      because there is no reliable semantic rule that predicts which verb
      a given noun collocates with. Swan & Smith (2001) document this as
      one of the most persistent lexical errors for Portuguese-speaking
      learners. Azevedo (1996) notes that fazer is among the highest-frequency
      verbs in Portuguese, making its transfer particularly entrenched.'
    teacher_tips:
      how_to_explain: 'Create two columns on the board: DO and MAKE. Under DO,
        list tasks and routines (homework, dishes, laundry, exercise, research).
        Under MAKE, list creation and production (a cake, a decision, money,
        a plan, a mistake, progress). Explain that fazer = both, but English
        splits them. Use the memory aid: DO = duties, MAKE = manufacture.'
      where_to_start: Begin with the most frequent collocations that Portuguese
        speakers get wrong. Start with do homework, do the dishes, make a cake,
        make a decision — the high-frequency pairs that cause the most errors.
      sequencing: 'Week 1: DO collocations (homework, dishes, exercise, laundry,
        research). Week 2: MAKE collocations (a cake, a decision, money, a plan,
        a mistake, progress). Week 3: Mixed practice — students choose make or
        do in context. Week 4: Error correction with authentic Portuguese
        speaker errors. Week 5: Production practice — students write sentences
        about their daily routines using both verbs.'
      exercises:
      - name: Make vs Do Drill
        type: fill-in-the-blank
        description: Provide 20 sentences with gaps. Students choose between
          make and do. Include both task and creation contexts.
        duration: 15
      - name: Fazer Translation Sort
        type: sorting
        description: 'Give 15 Portuguese sentences using fazer. Students sort
          into two piles: those that translate with make and those that
          translate with do. Then translate each sentence.'
        duration: 20
      - name: Error Correction - Make/Do
        type: error-correction
        description: 'Provide 10 sentences written by a hypothetical Portuguese
          speaker. Students identify and correct each make/do error and
          explain why the correction is needed.'
        duration: 15
