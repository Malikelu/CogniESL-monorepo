  advanced_tense_usage:
    interference_patterns:
    - pattern: Use of present perfect where past simple is required
      example_portuguese: Eu ja comi pizza hoje.
      example_gloss: I already ate pizza today.
      example_wrong: I have already eaten pizza today.
      example_correct: I already ate pizza today.
      explanation: Portuguese uses the present perfect (pretérito perfeito) for completed
        past actions, even with specific time markers like 'hoje' (today). English
        uses the past simple with specific past time references.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of present tense in temporal/future clauses where English requires
        specific tense
      example_portuguese: Quando eu chegar em casa, eu ligo para voce.
      example_gloss: When I arrive home, I call you.
      example_wrong: When I arrive home, I call you.
      example_correct: When I arrive home, I will call you.
      explanation: Portuguese uses the present tense (or future subjunctive) in temporal
        clauses introduced by 'quando' (when), 'assim que' (as soon as), 'depois que'
        (after). English requires the present tense in the temporal clause BUT the
        main clause must use a future form. Portuguese speakers transfer the present-tense
        pattern to both clauses, producing 'When I arrive, I call' instead of 'When
        I arrive, I will call.' This is one of the most persistent tense errors for
        Portuguese learners and is documented in contrastive analyses of Romance vs.
        Germanic temporal clause structure.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Underuse of progressive/continuous tenses
      example_portuguese: Eu estudo agora.
      example_gloss: I study now.
      example_wrong: I study now.
      example_correct: I am studying now.
      explanation: Portuguese does not have a grammaticalized progressive aspect equivalent
        to English 'be + -ing.' The Portuguese simple present (eu estudo) covers both
        habitual and ongoing actions. English requires the progressive form for actions
        happening at the moment of speaking. Portuguese speakers systematically underuse
        progressive tenses, producing 'I study now,' 'She reads a book' (when she
        is reading right now), and 'They eat dinner' (ongoing action). This pattern
        is well-documented in ESL error analysis corpora and persists into intermediate
        levels.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I have eaten pizza today.'' Correct: ''I ate pizza today.'''
    - 'Wrong: ''I have seen him yesterday.'' Correct: ''I saw him yesterday.'''
    - 'Wrong: ''When I arrive, I call you.'' Correct: ''When I arrive, I will call
      you.'''
    - 'Wrong: ''I study now.'' Correct: ''I am studying now.'''
    - 'Wrong: ''She reads a book right now.'' Correct: ''She is reading a book right
      now.'''
    why_it_happens: Portuguese and English have fundamentally different tense-aspect
      systems. First, Portuguese uses the compound past (pretérito perfeito composto)
      and simple past (pretérito perfeito simples) with different aspectual meanings
      than English present perfect and simple past. Portuguese speakers overuse the
      present perfect for completed past actions with specific time markers. Second,
      Portuguese temporal clauses (quando, assim que, depois que) use the present
      tense or future subjunctive, and the main clause can also use the present tense
      for future meaning. English requires a future form in the main clause. Third,
      Portuguese lacks a grammaticalized progressive aspect — the simple present covers
      both habitual and ongoing actions. English requires 'be + -ing' for actions
      in progress. These three structural differences produce systematic, predictable
      errors that persist without explicit instruction.
    teacher_tips:
      how_to_explain: 'Teach three rules: (1) Specific past time = simple past, never
        present perfect. (2) In "when/after/before" clauses about the future, use
        present tense in the time clause but WILL in the main clause. (3) For actions
        happening NOW, always use "be + -ing." Write all three rules on the board
        with Portuguese equivalents showing the contrast.'
      where_to_start: 'Begin with the most common error: ''I have eaten today'' →
        ''I ate today.'' Then move to progressive underuse: ''I study now'' → ''I
        am studying now.'' Finally address temporal clauses: ''When I arrive, I call''
        → ''When I arrive, I will call.'''
      sequencing: 'Week 1: Simple past vs present perfect with time markers. Week
        2: Progressive vs simple present for ongoing actions. Week 3: Future time
        clauses (present in time clause, will in main clause). Week 4: Mixed practice
        combining all three patterns. Week 5: Error correction with authentic student
        sentences.'
      exercises:
      - name: Tense Decision Drill
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose between simple
          past and present perfect.
        duration: 15
      - name: Time Marker Sort
        type: matching
        description: Sort time markers into 'simple past' and 'present perfect' columns.
        duration: 10
      - name: Progressive Spot Check
        type: error-correction
        description: Provide 15 sentences describing ongoing actions in simple present.
          Students rewrite each using the correct progressive form.
        duration: 15
      - name: Future Time Clause Builder
        type: sentence-rewrite
        description: Give 10 Portuguese temporal clause sentences (quando/assim que/depois
          que). Students translate, ensuring the main clause uses a future form.
        duration: 15
