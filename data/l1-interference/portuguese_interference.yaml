  compound_nouns:
    interference_patterns:
    - pattern: Use of 'of' where English uses noun + noun compound
      example_portuguese: O suco de laranja.
      example_gloss: The juice of orange.
      example_wrong: The juice of orange.
      example_correct: Orange juice.
      explanation: Portuguese uses 'de' (of) to link nouns. English often creates
        compound nouns without a preposition.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Reversed modifier-head order in compound nouns
      example_portuguese: Uma caneta de tinta azul.
      example_gloss: A pen of ink blue.
      example_wrong: A pen blue ink.
      example_correct: A blue ink pen.
      explanation: In Portuguese, the head noun comes first followed by modifiers
        linked by 'de' (caneta de tinta azul = pen of ink blue). English compound
        nouns place the modifier before the head noun in a fixed order (opinion-color-material-head).
        Portuguese speakers may transfer the head-initial order, producing 'pen ink
        blue' instead of 'blue ink pen.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''The juice of orange.'' Correct: ''Orange juice.'''
    - 'Wrong: ''A pen blue ink.'' Correct: ''A blue ink pen.'''
    - 'Wrong: ''A cup coffee small.'' Correct: ''A small coffee cup.'''
    why_it_happens: 'Portuguese uses the preposition ''de'' to create descriptive
      noun phrases: ''suco de laranja'' (juice of orange). English often creates compound
      nouns without a preposition: ''orange juice.'' Portuguese speakers transfer
      the ''de'' pattern and produce ''juice of orange.'' Additionally, Portuguese
      noun phrases are head-initial with post-nominal modifiers (caneta de tinta azul
      = pen of ink blue), while English compound nouns are head-final with pre-nominal
      modifiers in a strict order (a blue ink pen). This difference in modifier-head
      directionality causes Portuguese speakers to produce reversed compounds like
      ''pen ink blue'' instead of ''blue ink pen.'''
    teacher_tips:
      how_to_explain: 'Create a list of common English compound nouns and their Portuguese
        equivalents. Show that Portuguese uses ''de'' between the nouns, while English
        puts them side by side. Then teach the English modifier order: opinion-size-color-material-head.
        Write ''caneta de tinta azul'' and show how English reverses the entire chain:
        ''blue ink pen.'''
      where_to_start: 'Begin with food vocabulary: orange juice, apple pie, coffee
        cup. Then move to two-modifier compounds: blue ink pen, small coffee cup.'
      sequencing: 'Week 1: Common compound nouns (food, household). Week 2: Compound
        nouns with modifier order (color + noun, size + noun). Week 3: Multi-modifier
        compound order (opinion-size-color-material-head). Week 4: When to use ''of''
        vs. compound. Week 5: Mixed practice.'
      exercises:
      - name: Compound Noun Translation
        type: translation
        description: Give 15 Portuguese 'noun + de + noun' phrases. Students translate
          into English compound nouns.
        duration: 15
      - name: Compound or Of Decision
        type: fill-in-the-blank
        description: Provide 20 phrases where students must choose between compound
          noun or 'of' phrase.
        duration: 15
      - name: Modifier Order Rearrangement
        type: transformation
        description: Give 10 Portuguese multi-modifier noun phrases. Students rearrange
          all modifiers into correct English compound noun order.
        duration: 15
