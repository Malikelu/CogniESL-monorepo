  provided_that:
    interference_patterns:
    - pattern: Use of 'if' where 'provided that' is more precise
      example_portuguese: Eu vou se voce for.
      example_gloss: I go if you go.
      example_wrong: I will go if you go.
      example_correct: I will go provided that you go.
      explanation: Portuguese 'se' covers both 'if' and 'provided that.' English distinguishes
        general conditions ('if') from specific stipulating conditions ('provided that').
        Portuguese speakers default to 'if' for all conditional meanings, missing the
        nuance that 'provided that' signals a requirement or precondition that must be
        fulfilled.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'unless' in place of 'provided that' due to negative condition
        transfer
      example_portuguese: Eu vou a menos que chova.
      example_gloss: I go unless it rains.
      example_wrong: I will go unless it rains.
      example_correct: I will go provided that it does not rain.
      explanation: Portuguese 'a menos que' (unless) is used for negative conditions.
        English 'provided that' can express the same meaning positively ('provided that
        it does not rain'). Portuguese speakers may use 'unless' where 'provided that'
        is more natural, or may confuse the logical polarity. Additionally, Portuguese
        'se' does not distinguish between open conditions ('if') and stipulative conditions
        ('provided that'), leading to overuse of 'if' and underuse of 'provided that.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    why_it_happens: Portuguese has a single conditional conjunction 'se' that covers
      both English 'if' (open condition) and 'provided that' (stipulative condition).
      Portuguese does not grammatically distinguish between a neutral condition ('if
      it rains, I will stay home') and a specific requirement ('provided that you finish
      the work, you can leave'). This L1 transfer causes Portuguese speakers to overuse
      'if' and underuse 'provided that.' Additionally, Portuguese 'a menos que' (unless)
      introduces negative conditions in a way that maps imperfectly onto English 'provided
      that,' which expresses the same logical content in positive form. The result is
      that Portuguese speakers either default to 'if' for all conditions or use 'unless'
      where 'provided that' would be more precise and natural in formal and academic
      English.
    teacher_tips:
      how_to_explain: 'Write three sentences on the board: (1) "If it is sunny, we
        will go." (neutral condition) (2) "Provided that you finish your homework, you
        can go." (specific requirement) (3) "Unless it rains, we will go." (negative
        condition). Explain: "If" = maybe. "Provided that" = you MUST do this first.
        "Unless" = except if. Show that "provided that" is stronger than "if" — it sets
        a rule.'
      where_to_start: Begin with the if vs. provided that distinction using classroom
        rules. 'If you study, you will pass' (maybe) vs. 'Provided that you submit all
        assignments, you will pass' (requirement).
      sequencing: 'Week 1: ''If'' vs. ''provided that'' — neutral vs. stipulative conditions.
        Week 2: ''Provided that'' vs. ''unless'' — positive vs. negative conditions.
        Week 3: ''Providing that'' as alternative form. Week 4: Mixed practice in formal
        and academic contexts.'
      exercises:
      - name: If vs Provided That Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'if' and
          'provided that' based on whether the condition is neutral or a specific requirement.
        duration: 15
      - name: Condition Polarity Rewrite
        type: sentence-rewrite
        description: Give 10 sentences with 'unless.' Students rewrite them using 'provided
          that' with positive polarity (e.g., "unless it rains" -> "provided that it
          does not rain").
        duration: 15
