  prepositions:
    interference_patterns:
    - pattern: Use of 'em' (in/on/at) where English uses different prepositions
      example_portuguese: Eu vou para a escola.
      example_gloss: I go to the school.
      example_wrong: I go to the school.
      example_correct: I go to school.
      explanation: Portuguese 'para' (to) is used for destinations. English uses 'to'
        but often drops the article for common destinations.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Use of 'de' (of/from) where English uses different prepositions
      example_portuguese: Eu sou do Brasil.
      example_gloss: I am of-the Brazil.
      example_wrong: I am of Brazil.
      example_correct: I am from Brazil.
      explanation: Portuguese 'de' (of) expresses origin. English uses 'from.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I go to the school.'' Correct: ''I go to school.'''
    - 'Wrong: ''I am of Brazil.'' Correct: ''I am from Brazil.'''
    why_it_happens: Portuguese prepositions (em, de, para, por, a, com) do not map
      one-to-one onto English prepositions (in, on, at, of, from, to, for, with, by).
      Portuguese 'em' can mean 'in,' 'on,' or 'at.' Portuguese 'de' can mean 'of'
      or 'from.' Portuguese 'para' can mean 'to' or 'for.' Portuguese speakers must
      learn the English preposition system.
    teacher_tips:
      how_to_explain: 'Create a preposition mapping chart: Portuguese ''em'' = in/on/at;
        ''de'' = of/from; ''para'' = to/for; ''por'' = for/by/through; ''com'' = with;
        ''a'' = to/at. Teach the most common uses of each.'
      where_to_start: 'Begin with the most problematic: ''em'' (in/on/at) and ''de''
        (of/from).'
      sequencing: 'Week 1: ''Em'' = in/on/at. Week 2: ''De'' = of/from. Week 3: ''Para''
        = to/for. Week 4: Mixed practice.'
      exercises:
      - name: Preposition Mapping Drill
        type: fill-in-the-blank
        description: Provide 20 sentences. Students choose the correct English preposition.
        duration: 15
      - name: Preposition Translation
        type: translation
        description: Give 10 Portuguese sentences with prepositions. Students translate
          to English.
        duration: 15
