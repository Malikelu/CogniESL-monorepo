  likely:
    interference_patterns:
    - pattern: Use of 'likely' as a standalone adverb without auxiliary structure
      example_portuguese: Ele provavelmente vem.
      example_gloss: He probably comes.
      example_wrong: He likely comes.
      example_correct: He will likely come. / He is likely to come.
      explanation: Portuguese 'provavelmente' is a standalone adverb that can directly
        precede the verb. English 'likely' is primarily an adjective and cannot function
        as a bare adverb before a verb. It requires the structure 'will likely + verb'
        or 'is/are likely to + verb.' Portuguese speakers transfer the standalone
        adverb pattern directly, producing 'He likely comes' instead of 'He will likely
        come.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'to be' in 'is/are likely to' constructions
      example_portuguese: Ele provavelmente chega amanha.
      example_gloss: He probably arrives tomorrow.
      example_wrong: He likely arrives tomorrow.
      example_correct: He is likely to arrive tomorrow.
      explanation: When expressing probability about a future event, Portuguese uses
        'provavelmente' + verb directly. English requires the full 'be likely to'
        construction. Portuguese speakers frequently drop 'be' and use 'likely' as
        a bare adverb, producing 'He likely arrives' instead of 'He is likely to arrive.'
        This error persists because Portuguese does not require a copula in adverbial
        probability expressions.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''He likely comes.'' Correct: ''He will likely come.'' / ''He is likely
      to come.'''
    - 'Wrong: ''She likely wins.'' Correct: ''She is likely to win.'' / ''She will
      likely win.'''
    - 'Wrong: ''It likely rains.'' Correct: ''It will likely rain.'' / ''It is likely
      to rain.'''
    why_it_happens: Portuguese 'provavelmente' functions as a standalone adverb that
      can directly modify a verb without any auxiliary or copula (Ele provavelmente
      vem = He probably comes). English 'likely' is grammatically an adjective, not
      a true adverb. It requires either a modal auxiliary ('will likely + verb') or
      a copula + infinitive ('is/are likely to + verb'). Portuguese speakers transfer
      the L1 adverbial pattern directly, producing bare 'likely' before verbs. This
      is a well-documented Romance-language transfer error (Swan & Smith, 2001; Azevedo,
      1996). The error persists because the Portuguese structure is simpler (one word,
      no auxiliary) and deeply ingrained.
    teacher_tips:
      how_to_explain: 'Write ''provavelmente'' on the board. Explain that English
        has TWO ways to express this: (1) will likely + verb, (2) is/are likely to
        + verb. Emphasize: ''likely'' alone before a verb is NOT correct. Drill both
        patterns with classroom predictions: ''It will likely rain.'' ''She is likely
        to pass.'''
      where_to_start: Begin with 'will likely' since it is the closest to the Portuguese
        structure (adverb after auxiliary). Then introduce 'is/are likely to.'
      sequencing: 'Week 1: ''Will likely + verb.'' Week 2: ''Is/are likely to + verb.''
        Week 3: ''It is likely that...'' (clause pattern). Week 4: Choosing between
        patterns. Week 5: Mixed practice with error correction.'
      exercises:
      - name: Likely Structure Drill
        type: sentence-rewrite
        description: Give 10 sentences with 'probably.' Students rewrite each using
          both 'will likely' and 'is/are likely to' patterns.
        duration: 15
      - name: Bare Likely Error Correction
        type: error-correction
        description: Provide 15 sentences where 'likely' is used as a bare adverb.
          Students identify the error and rewrite using the correct structure (will
          likely or is/are likely to).
        duration: 15
      - name: Likely vs Probably Discrimination
        type: fill-in-the-blank
        description: Give 10 sentences with blanks. Students choose between 'likely'
          (with correct structure) and 'probably' based on context and register.
        duration: 10
