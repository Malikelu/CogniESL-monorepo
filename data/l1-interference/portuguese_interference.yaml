  result_clauses:
    interference_patterns:
    - pattern: Use of 'so' with wrong word order (verb-subject inversion)
      example_portuguese: Eu trabalhei muito, entao estou cansado.
      example_gloss: I worked much, so I am tired.
      example_wrong: I worked much, so am I tired.
      example_correct: I worked much, so I am tired.
      explanation: Portuguese places the verb before the subject after 'entao' (so).
        English keeps normal subject-verb order after 'so.' Portuguese speakers transfer
        the inversion pattern, producing 'so am I tired' instead of 'so I am tired.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'so much' before adjectives instead of 'so'
      example_portuguese: Esta tanto frio que eu fiquei em casa.
      example_gloss: It is so-much cold that I stayed home.
      example_wrong: It was so much cold that I stayed home.
      example_correct: It was so cold that I stayed home.
      explanation: Portuguese 'tanto/tanta' (so much) is used before adjectives and
        adverbs to express degree (esta tanto frio = it is so cold). English 'so'
        is used directly before adjectives/adverbs without 'much' (so cold, so fast).
        Portuguese speakers transfer 'tanto' as 'so much' and produce 'so much cold'
        instead of 'so cold.' This is documented in the phonetics section of the grammar
        point and in contrastive analyses of Portuguese-English degree modifier systems.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion of 'so...that' vs 'such...that' (using 'so' with noun phrases)
      example_portuguese: Foi um dia tao frio que a agua congelou.
      example_gloss: It was a day so cold that the water froze.
      example_wrong: It was so a cold day that the water froze.
      example_correct: It was such a cold day that the water froze.
      explanation: Portuguese uses 'tao' (so) with both adjectives and noun phrases
        (um dia tao frio = a day so cold / such a cold day). English requires 'so'
        before adjectives/adverbs alone (so cold) but 'such' before noun phrases (such
        a cold day). Portuguese speakers overgeneralize 'so' to noun phrases, producing
        'so a cold day' instead of 'such a cold day.' This distinction is a well-documented
        area of L1 transfer from Romance languages to English.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'that' in 'so...that' and 'such...that' clauses
      example_portuguese: Eu estava tao cansado eu fui dormir.
      example_gloss: I was so tired I went to sleep.
      example_wrong: I was so tired I went to sleep.
      example_correct: I was so tired that I went to sleep.
      explanation: In Portuguese, the conjunction 'que' (that) can be omitted in
        informal result clauses (eu estava tao cansado [que] eu fui dormir). English
        'that' is required in formal 'so...that' and 'such...that' structures. Portuguese
        speakers drop 'that' in writing and formal speech, producing 'I was so tired
        I went to sleep' instead of 'I was so tired that I went to sleep.' While omission
        of 'that' is sometimes acceptable in informal English, it is considered an
        error in academic and formal writing contexts.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I worked much, so am I tired.'' Correct: ''I worked much, so I am
      tired.'''
    - 'Wrong: ''It was so much cold that I stayed home.'' Correct: ''It was so cold
      that I stayed home.'''
    - 'Wrong: ''It was so a cold day that the water froze.'' Correct: ''It was such
      a cold day that the water froze.'''
    - 'Wrong: ''I was so tired I went to sleep.'' Correct: ''I was so tired that I
      went to sleep.'''
    why_it_happens: Portuguese result clause structures differ from English in four
      key ways. First, Portuguese 'entao' (so) triggers verb-subject inversion, which
      learners transfer to English. Second, Portuguese 'tanto/tanta' (so much) is used
      before adjectives to express degree, leading to 'so much cold' instead of 'so
      cold.' Third, Portuguese 'tao' (so) is used with both adjectives and noun phrases,
      causing confusion between 'so' and 'such' in English (so a cold day vs. such
      a cold day). Fourth, Portuguese allows omission of 'que' (that) in informal result
      clauses, leading to dropped 'that' in English 'so...that' and 'such...that' structures.
      These patterns are documented in Swan & Smith (2001), Azevedo (1996), and Celce-Murcia
      & Larsen-Freeman (2015).
    teacher_tips:
      how_to_explain: >
        Teach the four key rules: (1) After "so," use normal word order — "so I am" not "so am I."
        (2) "So" goes directly before adjectives — "so cold" not "so much cold."
        (3) "Such" goes before noun phrases — "such a cold day" not "so a cold day."
        (4) "That" is required in "so...that" and "such...that" in formal writing.
        Write the formula on the board: SO + adj + that... / SUCH + (a/an) + adj + noun + that...
      where_to_start: >
        Begin with the so/such distinction using weather vocabulary.
        Show: "so cold" (adjective only) vs. "such a cold day" (noun phrase).
        Then add "that" clauses. Finally, address the word order and "so much" errors.
      sequencing: >
        Week 1: "So + adj" vs. "Such + noun phrase."
        Week 2: "So...that" and "Such...that" with "that" required.
        Week 3: Word order after "so" (no inversion).
        Week 4: "So much + noun" vs. "So + adjective."
        Week 5: Mixed practice and error correction.
      exercises:
      - name: So or Such Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'so' and
          'such' (and 'a/an' where needed). Include both adjective-only and noun phrase
          contexts.
        duration: 15
      - name: Result Clause Error Correction
        type: error-correction
        description: Provide 12 sentences with result clause errors (word order, so/so
          much confusion, so/such confusion, missing 'that'). Students identify and
          correct each error.
        duration: 15
      - name: Portuguese to English Result Translation
        type: translation
        description: Give 10 Portuguese result clauses using 'entao,' 'tanto,' 'tao,'
          and 'que.' Students translate into grammatically correct English, applying
          all four rules.
        duration: 20
