  ed_clauses: &id017
    interference_patterns:
    - pattern: Use of past participle (-ed) where present participle (-ing) is needed for active reduced relative clauses
      example_portuguese: O homem sentado na cadeira e meu pai.
      example_gloss: The man sat in-the chair is my father.
      example_wrong: The man sat in the chair is my father.
      example_correct: The man sitting in the chair is my father.
      explanation: Portuguese uses past participle clauses (participio passado) for both
        active and passive meanings. For example, ''o homem sentado'' (the man sat/sitting)
        uses the past participle ''sentado'' for an active ongoing state. English requires
        the present participle (-ing) for active reduced relative clauses and reserves
        the past participle (-ed) for passive reduced relative clauses. Portuguese speakers
        transfer the past participle form to English active contexts, producing ''the man
        sat in the chair'' instead of ''the man sitting in the chair.''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of active -ing participle where passive -ed participle is required
      example_portuguese: O livro escrito por Machado de Assis e famoso.
      example_gloss: The book written by Machado de Assis is famous.
      example_wrong: The book writing by Machado de Assis is famous.
      example_correct: The book written by Machado de Assis is famous.
      explanation: When the reduced relative clause has a passive meaning, English requires
        the past participle (-ed). Portuguese speakers sometimes overgeneralize the -ing
        form (which they associate with ongoing/active meanings in their L1) to passive
        contexts, producing ''the book writing by...'' instead of ''the book written by...''.
        This error is less frequent than the reverse but appears at intermediate levels
        when students learn the -ing form before fully mastering the active/passive
        participle distinction.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Omission of auxiliary in passive/reduced -ed clauses
      example_portuguese: A carta enviada ontem.
      example_gloss: The letter sent yesterday.
      example_wrong: "The letter sent yesterday arrived today."
      example_correct: "The letter that was sent yesterday arrived today."
      explanation: Portuguese allows past participle clauses without an auxiliary verb
        (`a carta enviada ontem` = the letter sent yesterday). While English does allow
        reduced relative clauses with past participles (`the letter sent yesterday`),
        Portuguese speakers may produce ungrammatical full-clause versions by omitting
        the relative pronoun and auxiliary. The core confusion is that Portuguese past
        participles carry no inherent active/passive marking, so learners struggle to
        determine when English requires -ing vs. -ed.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: The man sat in the chair is my father. Correct: The man sitting in the
      chair is my father.'
    - 'Wrong: The woman stood at the door was my aunt. Correct: The woman standing
      at the door was my aunt.'
    - 'Wrong: The book writing by Machado is famous. Correct: The book written by Machado
      is famous.'
    - 'Wrong: The car parked outside belongs to John. Correct: The car parked outside
      belongs to John. (This one IS correct — passive reduced relative.)'
    why_it_happens: 'Portuguese past participles (participio passado) are used for both
      active and passive meanings, unlike English which distinguishes active (-ing) from
      passive (-ed) participles. In Portuguese, ''o homem sentado'' (the man sat/sitting)
      uses the past participle for an active ongoing state, ''a porta fechada'' (the
      door closed) can mean both ''the door that was closed'' (passive) and ''the door
      that is closed'' (stative). This lack of active/passive distinction in Portuguese
      participles leads speakers to use -ed forms for active meanings in English. Additionally,
      Portuguese reduced clauses do not require an auxiliary verb, which can lead to
      omission errors when Portuguese speakers construct full passive clauses in English.
      The transfer is particularly persistent because the Portuguese system is internally
      consistent and deeply ingrained — learners must acquire a new grammatical distinction
      (active vs. passive participle) that does not exist in their L1.'
    teacher_tips:
      how_to_explain: 'Draw two columns on the board: ACTIVE (-ing) and PASSIVE (-ed).
        In the ACTIVE column: ''The man sitting in the chair'' (he IS sitting — active,
        ongoing). In the PASSIVE column: ''The letter written by the manager'' (it WAS
        written — passive, done to it). Use a simple test: if the noun DOES the action,
        use -ing. If the action is DONE TO the noun, use -ed. Contrast with Portuguese:
        ''o homem sentado'' (looks like -ed but is active!) vs. ''the man sitting'' (must
        use -ing in English).'
      where_to_start: 'Begin with clear active vs. passive contrasts. Show a person
        sitting (active: -ing) vs. a letter that was written (passive: -ed). Use pictures
        to make the distinction visual before introducing the grammar.'
      sequencing: 'Week 1: Active reduced relatives with -ing (the man sitting, the
        woman standing). Week 2: Passive reduced relatives with -ed (the letter written,
        the car parked). Week 3: Active vs. passive contrast — same noun, different
        participles (the man sitting vs. the man injured). Week 4: Error correction
        with Portuguese-influenced errors. Week 5: Production practice — describe scenes
        using both types.'
      exercises:
      - name: Participle Choice - Active or Passive
        type: fill-in-the-blank
        description: Provide 20 sentences with gaps where students must choose between
          the -ing and -ed form of the verb. Include a mix of active and passive contexts.
        duration: 15
      - name: Portuguese to English Participle Translation
        type: translation
        description: Give 10 Portuguese sentences with past participle clauses (participio
          passado). Students must determine whether the English equivalent requires -ing
          or -ed and translate correctly.
        duration: 15
      - name: Reduced Relative Clause Expansion
        type: sentence-rewrite
        description: Provide 10 reduced relative clauses (e.g., ''The man injured in
          the accident''). Students expand them into full relative clauses (''The man
          who was injured in the accident'') and identify whether the original was active
          or passive.
        duration: 15
      - name: Error Correction - Participle Mix-ups
        type: error-correction
        description: Provide a paragraph with 8 participle errors typical of Portuguese
          speakers (active -ed and passive -ing). Students identify and correct each error.
        duration: 15
