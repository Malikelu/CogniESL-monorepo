  complex_noun_phrases:
    interference_patterns:
    - Portuguese places adjectives after the noun (pos-nominal position), while English requires adjectives before the noun
      (pre-nominal). Portuguese speakers transfer this pos-nominal order to English, producing errors like "a house white",
      "the car red", "a man tall and thin". This is the most frequent and visible noun phrase error for Portuguese speakers.
      Unlike Spanish (which also has pos-nominal adjectives but with more flexibility), Portuguese adjective placement
      is strongly pos-nominal for descriptive adjectives, making the transfer highly systematic and persistent across
      all proficiency levels.
    - Portuguese does not have a rigid adjective ordering hierarchy equivalent to English OSASCOMP (Opinion-Size-Age-Shape-Color-Origin-Material-Purpose).
      Portuguese speakers stack multiple adjectives in English using Portuguese ordering principles or random order, producing
      errors like "a Chinese beautiful vase" (origin before opinion), "a red big car" (color before size), "a wooden round table"
      (material before shape), or "a new silk red dress" (age-material-color instead of opinion-age-material-color). English requires
      a specific hierarchy that Portuguese does not enforce, and learners must memorize the OSASCOMP sequence explicitly.
    - Portuguese uses prepositional phrases and relative clauses as post-nominal modifiers far more productively than English.
      Portuguese speakers overuse post-nominal modification in English, producing overly complex noun phrases with resumptive
      pronouns (e.g., "the book that I bought it yesterday was expensive" from Portuguese "O livro que eu comprei ele ontem
      era caro"), resumptive possessives ("the man that his car was stolen"), and resumptive prepositional objects ("the woman
      that I talked with her"). English relative clauses do not allow resumptive pronouns, and this transfer from Portuguese
      relative clause structure is one of the most persistent errors in complex noun phrase production.
    - Portuguese allows preposition dropping in informal relative clause registers, which transfers to English as missing
      prepositions in complex noun phrases. Portuguese speakers produce errors like "The man that I spoke" (missing "with")
      or hypercorrect "The man with who I spoke" (from over-applying the "com quem" pattern). English requires the preposition
      in such contexts, either stranded ("who I spoke with") or fronted ("with whom I spoke"), but never dropped entirely.
    why_it_happens: Portuguese noun phrase structure differs from English in four fundamental ways. First, Portuguese adjectives
      are predominantly pos-nominal while English adjectives are strictly pre-nominal. Second, Portuguese does not enforce a rigid
      adjective ordering hierarchy like English OSASCOMP. Third, Portuguese relative clauses productively use resumptive pronouns
      (especially in spoken registers) while English bans them. Fourth, Portuguese prepositional phrases in relative clauses have
      more flexible placement and can be dropped in informal speech. These four structural differences are deeply automatized
      from early L1 acquisition and transfer systematically to English complex noun phrase production. The errors persist
      because Portuguese noun phrase patterns are acquired before age 5 and operate automatically, and because Portuguese
      educational systems emphasize written Portuguese where pos-nominal adjectives and resumptive pronouns are even more
      frequent than in speech.
    teacher_tips:
      how_to_explain: Use a four-layer contrastive chart. Layer 1 - Portuguese pos-nominal adjective vs English pre-nominal
        (show "casa branca" becomes "WHITE house", not "house white"). Layer 2 - English OSASCOMP hierarchy with the mnemonic
        Opinion-Size-Age-Shape-Color-Origin-Material-Purpose. Layer 3 - Resumptive pronoun ban (Portuguese "O livro que eu
        li ele" becomes English "The book that I read" with no "it"). Layer 4 - Preposition stranding (English allows "who
        I spoke with" but not "who I spoke" without the preposition). Use color-coding for visual clarity.
      where_to_start: Start with the adjective position error (pos-nominal to pre-nominal) since it is the most frequent and
        visible. Use physical objects for demonstration. Then move to OSASCOMP ordering with 2-adjective combinations. Then
        address resumptive pronouns in relative clauses. Finally, teach preposition stranding vs. dropping.
      exercises:
      - name: Adjective position flip drill
        type: drill
        description: Provide 20 Portuguese noun phrases with pos-nominal adjectives (e.g., "casa grande", "carro vermelho",
          "homem alto", "mulher bonita", "problema dificil"). Students must produce the English equivalent with pre-nominal
          adjectives. Time pressure to build automaticity. Include tricky cases where the adjective changes meaning by position
          in English (e.g., "um homem grande" = "a big man" vs. "a great man").
        duration: 15
      - name: OSASCOMP ordering challenge
        type: practice
        description: Give students sets of 3-5 adjectives from different OSASCOMP categories (e.g., "beautiful / Italian / old /
          red / leather"). Students must arrange them in correct English order before a noun ("a beautiful old red Italian
          leather bag"). Start with 2-adjective sets, build to 5-adjective sets. Include a "spot the error" version with
          Portuguese-ordered phrases.
        duration: 20
      - name: Resumptive pronoun elimination
        type: error-correction
        description: Provide 15 English sentences with resumptive pronouns transferred from Portuguese relative clauses (e.g.,
          "The book that I read it was good", "The man that his car broke down was angry", "The woman that I talked with her
          is my teacher"). Students identify the resumptive pronoun, explain why it is ungrammatical in English, and rewrite
          the sentence correctly. Include the Portuguese source sentence for contrast.
        duration: 20
      - name: Preposition recovery drill
        type: drill
        description: Provide 15 sentences where prepositions have been dropped (Portuguese transfer) or incorrectly placed.
          Students must insert the correct preposition or fix its position. Include dropped prepositions ("The man that
          I spoke" to "The man that I spoke WITH"), stranded vs. fronted ("Who did you talk to?" vs. "To whom did you talk?"),
          and hypercorrect forms ("The man with who I spoke" to "The man with WHOM I spoke" or "The man who I spoke with").
        duration: 15
      - name: Complex noun phrase building from Portuguese
        type: composition
        description: Give students 10 Portuguese sentences with complex noun phrases (multiple adjectives, relative clauses,
          prepositional phrases). Students translate each into natural English, consciously applying pre-nominal adjective
          position, OSASCOMP order, no resumptive pronouns, and correct preposition placement. Then they exchange
          translations and check for transfer errors.
        duration: 25
    examples:
    - 'Wrong: ''A house white.'' (Portuguese: ''Uma casa branca.'' - pos-nominal adjective) Correct: ''A WHITE house.'''
    - 'Wrong: ''The car red is mine.'' (Portuguese: ''O carro vermelho e meu.'' - pos-nominal adjective in predicate) Correct:
      ''The RED car is mine.'' / ''The car that is red is mine.'''
    - 'Wrong: ''A Chinese beautiful vase.'' (Portuguese: ''Um vaso chines bonito.'' - origin before opinion in Portuguese)
      Correct: ''A BEAUTIFUL Chinese vase.'' (opinion before origin - OSASCOMP)'
    - 'Wrong: ''A red big car.'' (Portuguese: ''Um carro vermelho grande.'' - color before size in Portuguese) Correct:
      ''A BIG red car.'' (size before color - OSASCOMP)'
    - 'Wrong: ''The book that I read it was expensive.'' (Portuguese: ''O livro que eu li ele era caro.'' - resumptive pronoun
      in relative clause) Correct: ''The book that I read was expensive.'' (no resumptive pronoun)'
    - 'Wrong: ''The man that I spoke is my friend.'' (Portuguese: ''O homem que eu falei e meu amigo.'' - preposition dropping
      in informal Portuguese) Correct: ''The man that I spoke WITH is my friend.'''
    - 'Wrong: ''A new silk red dress.'' (Portuguese: ''Um vestido novo de seda vermelho.'' - age-material-color) Correct:
      ''A NEW RED SILK dress.'' (opinion-age-color-material - OSASCOMP)'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter - documents Portuguese L1 transfer errors including pos-nominal adjective transfer, adjective
      ordering violations, resumptive pronoun overproduction in relative clauses, and preposition dropping/stranding errors in
      complex noun phrase contexts).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on noun phrase structure
      - describes Portuguese pos-nominal adjective placement as the default for descriptive adjectives, the absence of a rigid
      adjective ordering hierarchy, and the productivity of resumptive pronouns in relative clauses, providing the structural
      basis for L1 transfer to English complex noun phrases).'
