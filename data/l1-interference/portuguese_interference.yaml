  negative_questions:
    interference_patterns:
    - pattern: Use of no instead of do not in negative questions
      example_portuguese: Voce nao quer cafe?
      example_gloss: You not want coffee?
      example_wrong: You no want coffee?
      example_correct: Don't you want coffee?
      explanation: Portuguese places the negator 'nao' directly before the main verb with
        no auxiliary. English requires the auxiliary 'do' + 'not' with subject-auxiliary
        inversion. Portuguese speakers transfer the pre-verbal negation pattern and may
        use 'no' (a false cognate of 'nao') instead of 'do not.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Absence of subject-auxiliary inversion in negative questions
      example_portuguese: Voce nao quer cafe?
      example_gloss: You not want coffee?
      example_wrong: Do not you want coffee?
      example_correct: Don't you want coffee?
      explanation: Portuguese forms negative questions by simply adding 'nao' before the
        verb with rising intonation — no inversion is required. English requires subject-auxiliary
        inversion in negative questions (Don't you...? Doesn't she...?). Portuguese speakers
        may place 'do not' at the beginning of the sentence without inverting subject
        and auxiliary, producing 'Do not you want coffee?' instead of 'Don't you want
        coffee?' This reflects the broader Romance-to-Germanic transfer challenge with
        do-support and inversion.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''You no want coffee?'' Correct: ''Don''t you want coffee?'''
    - 'Wrong: ''Do not you like it?'' Correct: ''Don''t you like it?'''
    - 'Wrong: ''She no coming?'' Correct: ''Isn''t she coming?'''
    why_it_happens: Portuguese forms negative questions by placing the negator 'nao' directly
      before the verb with rising intonation — no auxiliary verb and no inversion are
      required ('Voce nao quer cafe?' = 'You not want coffee?'). English requires both
      do-support and subject-auxiliary inversion ('Don't you want coffee?'). Portuguese
      speakers face a double transfer challenge they must add the auxiliary 'do' and
      invert it with the subject. The false cognate 'no' (which resembles Portuguese
      'nao') compounds the error, leading to 'You no want coffee?' Additionally, even
      when learners acquire do-support, they may place it sentence-initially without
      inversion ('Do not you...?') because Portuguese word order does not require inversion
      for questions of any kind.
    teacher_tips:
      how_to_explain: "Write 'Voce nao quer cafe?' on the board. Show that English needs
        TWO changes (1) add DO, (2) invert DON'T with the subject. Drill: 'Don't
        you...?' 'Doesn't she...?' 'Didn't they...?' Emphasize that Portuguese
        only needs rising intonation — English needs grammar changes too."
      where_to_start: Begin with 'Don't you...?' and 'Doesn't she...?' as fixed chunks.
        Use rising intonation to signal the question function.
      sequencing: 'Week 1: Negative questions with Don''t/Doesn''t (as chunks). Week
        2: Negative questions with Isn''t/Aren''t. Week 3: Negative questions for confirmation
        vs. surprise (intonation). Week 4: Mixed practice with error correction.'
      exercises:
      - name: Negative Question Transformation
        type: transformation
        description: Give 15 Portuguese-style negative questions (e.g., 'You not want
          coffee?'). Students rewrite using correct English negative question structure
          with do-support and inversion.
        duration: 15
      - name: Contraction Focus Drill
        type: fill-in-the-blank
        description: Provide 10 sentences with 'do not' / 'does not' in question form.
          Students contract to 'don't' / 'doesn't' and ensure correct word order.
        duration: 10
      - name: Negative Question Intonation Practice
        type: speaking
        description: Students practice saying negative questions with rising intonation
          (genuine question) vs. falling intonation (confirmation/surprise). Partner
          activity with 10 question prompts.
        duration: 15
