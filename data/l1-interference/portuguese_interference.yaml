  cleft_sentences: &id012
    interference_patterns:
    - pattern: Omission of 'it' in it-cleft sentences (present tense)
      example_portuguese: E o Joao que chegou.
      example_gloss: Is Joao that arrived.
      example_wrong: Is Joao that arrived.
      example_correct: It is Joao that arrived.
      explanation: Portuguese forms cleft sentences with 'e' (is) directly followed by the
        focused element and 'que' (that), with no dummy subject. English requires the
        dummy subject 'it' at the beginning of the cleft structure. Portuguese speakers
        transfer the 'e + focused element + que' pattern directly, producing 'Is Joao
        that arrived' instead of 'It is Joao that arrived.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of 'it' in it-cleft sentences (past tense)
      example_portuguese: Foi o Joao que chegou ontem.
      example_gloss: Was Joao that arrived yesterday.
      example_wrong: Was Joao that arrived yesterday.
      example_correct: It was Joao that arrived yesterday.
      explanation: Portuguese 'foi' (was) introduces past-tense clefts without a dummy
        subject. English requires 'it was' + focused element + 'that/who.' Portuguese
        speakers drop 'it' and produce 'Was Joao that arrived yesterday' instead of
        'It was Joao that arrived yesterday.' This error is particularly persistent
        because the Portuguese 'foi...que' structure is the default way to emphasize
        a subject or object in spoken Brazilian Portuguese.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of pseudo-clefts (wh-clefts) as default focus strategy
      example_portuguese: O que eu preciso e de um dicionario.
      example_gloss: What I need is of a dictionary.
      example_wrong: What I need is a dictionary. (used in all focus contexts)
      example_correct: It is a dictionary that I need. (for emphasis in speech)
      explanation: Portuguese uses 'o que' (what) pseudo-clefts as the primary focus
        strategy in both speech and writing. English reserves pseudo-clefts ('What I
        need is...') for specific discourse contexts and uses it-clefts ('It is X that...')
        for emphasis in spoken English. Portuguese speakers overuse pseudo-clefts in
        contexts where a simple sentence or an it-cleft would be more natural, producing
        overly formal or awkward English. Additionally, Portuguese 'o que' clefts
        often include 'de' (of) before the complement, leading to errors like 'What I
        need is of a dictionary.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: Is Joao that arrived. Correct: It is Joao that arrived.'
    - 'Wrong: Was the teacher that gave the homework. Correct: It was the teacher that gave the homework.'
    - 'Wrong: What I need is of a dictionary. Correct: What I need is a dictionary. / It is a dictionary that I need.'
    why_it_happens: Portuguese forms cleft sentences differently from English. The most
      common Portuguese cleft structure is 'ser (to be) + focused element + que (that),'
      as in 'E o Joao que chegou' (literally 'Is Joao that arrived'). There is no dummy
      subject like English 'it.' The verb 'e' (is) or 'foi' (was) comes first, followed
      by the element being emphasized, then 'que' and the rest of the sentence. English,
      by contrast, requires the dummy subject 'it' followed by the verb 'be,' then the
      focused element, and finally 'that/who' plus the remainder. Portuguese speakers
      transfer the word order directly, producing 'Is Joao that arrived' instead of 'It
      is Joao that arrived.' Additionally, Portuguese uses 'o que' (what) pseudo-clefts
      far more frequently than English, and these often include the preposition 'de' (of)
      before the complement, leading to errors like 'What I need is of a dictionary.'
      The 'e...que' cleft is extremely common in spoken Brazilian Portuguese, making
      this a high-frequency transfer error (Swan & Smith, 2001; Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'Write on the board: Portuguese "E o Joao que chegou" vs. English
        "It is Joao that arrived." Circle the "It" in English and say: "English ALWAYS
        needs IT at the start. Portuguese starts with IS. English starts with IT IS."
        Then show the formula on the board: IT + BE + FOCUSED ELEMENT + THAT/WHO + REST.
        Drill with contrastive examples: "E a Maria que cantou" -> "It is Maria that
        sang" (NOT "Is Maria that sang").'
      where_to_start: 'Begin with present tense it-clefts. Write 5 Portuguese e...que
        sentences on the board. Underline "e" and ask: "What do we need before IS in
        English? IT. It is." Have students add "It" to each sentence.'
      sequencing: 'Week 1: Present tense it-clefts (It is...that). Focus on adding the
        dummy subject "it." Week 2: Past tense it-clefts (It was...that/who). Week 3:
        Contrast with pseudo-clefts (What I need is... vs. It is X that I need). Week
        4: Error correction — mixed cleft errors from Portuguese transfer. Week 5: Production
        practice — students write and speak using clefts for emphasis.'
      exercises:
      - name: Dummy Subject Insertion
        type: fill-in-the-blank
        description: Provide 15 Portuguese-style cleft sentences without "it" (e.g.,
          "___ is Maria that called"). Students insert "It" and conjugate the verb
          correctly. Include present and past tense items.
        duration: 15
      - name: Portuguese to English Cleft Translation
        type: translation
        description: Give 10 Portuguese cleft sentences using "e...que" and "foi...que."
          Students translate into correct English it-clefts, ensuring they include the
          dummy subject "it."
        duration: 15
      - name: Cleft vs. Pseudo-Cleft Decision
        type: transformation
        description: Provide 10 simple sentences. Students must create BOTH an it-cleft
          and a pseudo-cleft for each, then decide which is more natural in a given
          context (spoken emphasis vs. written focus).
        duration: 20
      - name: Cleft Sentence Error Correction
        type: error-correction
        description: Provide a paragraph with 10 cleft sentence errors typical of Portuguese
          speakers (missing "it," wrong tense, overused pseudo-clefts with "de/of").
          Students identify and correct each error, explaining the Portuguese source
          of the mistake.
        duration: 15
      - name: Emphasis Speaking Drill
        type: speaking
        description: Teacher makes statements ("John called yesterday"). Students must
          contradict or emphasize different elements using it-clefts ("No, it was MARY
          who called" / "No, it was yesterday that he called"). Focus on correct "it
          + be + focus + that" structure in spontaneous speech.
        duration: 15
