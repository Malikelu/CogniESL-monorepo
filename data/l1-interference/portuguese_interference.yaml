      example_wrong: I am boring.
      example_correct: I am bored.
      explanation: Portuguese uses a single adjective form for both meanings. English
        distinguishes -ed (how you feel) from -ing (what causes the feeling).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of -ed adjective where -ing is required
      example_portuguese: O filme e entediante.
      example_gloss: The film is bored.
      example_wrong: The film is bored.
      example_correct: The film is boring.
      explanation: Portuguese 'entediador/entediante' has both forms but they are
        used differently. English -ing adjectives describe what causes the feeling;
        -ed adjectives describe how you feel.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am boring.'' (meaning bored) Correct: ''I am bored.'''
    - 'Wrong: ''The film is bored.'' Correct: ''The film is boring.'''
    why_it_happens: 'Portuguese uses a single adjective form for both active and passive
      meanings. English distinguishes: -ed adjectives describe how you feel (I am
      bored), -ing adjectives describe what causes the feeling (The film is boring).
      Portuguese speakers confuse these.'
    teacher_tips:
      how_to_explain: 'Teach: -ed = how you feel (I am bored, I am tired, I am excited).
        -ing = what causes the feeling (The film is boring, The work is tiring, The
        news is exciting). Drill with common pairs: bored/boring, tired/tiring, excited/exciting,
        interested/interesting, surprised/surprising.'
      where_to_start: 'Begin with the most common pair: bored/boring. ''I am bored''
