  in_case:
    interference_patterns:
    - pattern: Use of 'in case' with 'will'
      example_portuguese: Leve um guarda-chuva caso chova.
      example_gloss: Take an umbrella in case it rains.
      example_wrong: Take an umbrella in case it will rain.
      example_correct: Take an umbrella in case it rains.
      explanation: Portuguese uses the subjunctive after 'caso.' English uses the
        present simple after 'in case,' not 'will.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Substitution of 'if' for 'in case' (and vice versa)
      example_portuguese: Eu vou comprar mais comida caso eles venham.
      example_gloss: I will buy more food in case they come.
      example_wrong: I will buy more food if they come.
      example_correct: I will buy more food in case they come.
      explanation: Portuguese 'caso' covers both English 'in case' (precaution) and
        'if' (condition). Portuguese speakers often substitute 'if' for 'in case'
        because 'caso' is used for both precautionary and conditional meanings in
        Portuguese. This conflates two distinct English structures and changes the
        meaning from precaution to condition.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''Take an umbrella in case it will rain.'' Correct: ''Take an umbrella
      in case it rains.'''
    - 'Wrong: ''I will buy more food if they come.'' (meaning: as a precaution) Correct:
      ''I will buy more food in case they come.'''
    why_it_happens: Portuguese uses the subjunctive after 'caso' (in case). English
      uses the present simple after 'in case,' not 'will.' Portuguese speakers may
      use 'will' after 'in case.' Additionally, Portuguese 'caso' functions as both
      a conditional conjunction (equivalent to 'if') and a precautionary conjunction
      (equivalent to 'in case'). This dual function leads Portuguese speakers to substitute
      'if' for 'in case' when expressing precaution, collapsing two distinct English
      meanings into one form.
    teacher_tips:
      how_to_explain: 'Teach: ''in case + present simple'' (not ''will''). ''In case
        it rains'' (not ''in case it will rain''). Then distinguish: ''in case'' =
        precaution (I take an umbrella BEFORE it rains), ''if'' = condition (I take
        an umbrella ONLY WHEN it rains).'
      where_to_start: 'Begin with practical advice: ''Take an umbrella in case it
        rains.'' Then contrast with: ''If it rains, I will take an umbrella.'' Show
        the difference in timing and meaning.'
      sequencing: 'Week 1: ''In case + present simple.'' Week 2: ''In case'' vs. ''if''
        (precaution vs. condition). Week 3: Practice distinguishing meanings. Week
        4: Mixed practice with error correction.'
      exercises:
      - name: In Case Drill
        type: fill-in-the-blank
        description: Provide 10 sentences. Students use 'in case' correctly (no 'will').
        duration: 15
      - name: In Case vs If Distinction
        type: multiple-choice
        description: Provide 10 scenarios. Students choose between 'in case' and 'if'
          based on whether the meaning is precaution or condition.
        duration: 15
