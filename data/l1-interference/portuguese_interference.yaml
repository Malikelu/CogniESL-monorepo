  because:
    interference_patterns:
    - pattern: Use of 'so' after 'because'
      example_portuguese: Eu nao vou porque estou cansado.
      example_gloss: I not go because I am tired.
      example_wrong: I am not going because I am tired so.
      example_correct: I am not going because I am tired.
      explanation: Portuguese uses 'porque...entao' together as a paired conjunction.
        English never uses 'so' after 'because' — using both is redundant and ungrammatical.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'because' before a noun phrase instead of 'because of'
      example_portuguese: Eu nao vou porque a chuva.
      example_gloss: I not go because the rain.
      example_wrong: I am not going because the rain.
      example_correct: I am not going because of the rain.
      explanation: Portuguese 'porque' can introduce a noun phrase directly (porque a
        chuva = because the rain). English 'because' requires a full clause (subject +
        verb). When the cause is a noun phrase, English requires 'because of.' Portuguese
        speakers transfer the direct noun-phrase pattern, producing 'because the rain'
        instead of 'because of the rain.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I am not going because I am tired so.'' Correct: ''I am not going
      because I am tired.'''
    - 'Wrong: ''I stayed home because the rain.'' Correct: ''I stayed home because
      of the rain.'''
    - 'Wrong: ''She was late because the traffic.'' Correct: ''She was late because
      of the traffic.'''
    why_it_happens: Portuguese allows two structures that English keeps separate. First,
      Portuguese uses 'porque...entao' (because...so) as a paired conjunction, while
      English uses only one conjunction per clause — either 'because' or 'so,' never
      both. Second, Portuguese 'porque' can introduce a noun phrase directly (porque a
      chuva = because the rain), but English 'because' requires a full clause with a
      subject and verb. When the cause is a noun phrase, English requires 'because of.'
      Portuguese speakers transfer both patterns, producing 'because...so' and 'because +
      noun phrase' errors.
    teacher_tips:
      how_to_explain: 'Teach two rules: (1) ''because'' and ''so'' are synonyms — use
        one OR the other, never both. (2) ''Because'' needs a full sentence after it
        (subject + verb). If there is just a noun, use ''because of.'''
      where_to_start: Begin with the 'because...so' error since it is the most visible.
      sequencing: 'Week 1: ''Because'' without ''so.'' Week 2: ''So'' without ''because.''
        Week 3: ''Because'' + clause vs. ''because of'' + noun. Week 4: Mixed practice.'
      exercises:
      - name: Because So Error Correction
        type: error-correction
        description: Provide 10 sentences with 'because...so.' Students correct them.
        duration: 15
      - name: Because vs Because Of Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'because'
          (followed by clause) and 'because of' (followed by noun phrase). Include
          distractors where the noun phrase looks like a clause.
        duration: 15
