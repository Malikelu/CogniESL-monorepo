  countable_uncountable:
    interference_patterns:
    - pattern: Treatment of uncountable nouns as countable
      example_portuguese: Eu quero dois cafes.
      example_gloss: I want two coffees.
      example_wrong: I want two coffees.
      example_correct: I want two cups of coffee.
      explanation: Portuguese treats many nouns as countable that English treats as
        uncountable.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'many' with uncountable nouns
      example_portuguese: Muitas informacoes.
      example_gloss: Many informations.
      example_wrong: Many informations.
      example_correct: Much information.
      explanation: Portuguese 'informacoes' is a plural countable noun. English 'information'
        is uncountable and cannot be pluralized.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''Many informations.'' Correct: ''Much information.'''
    - 'Wrong: ''Two breads.'' Correct: ''Two loaves of bread.'''
    - 'Wrong: ''I need an advice.'' Correct: ''I need advice.'''
    why_it_happens: Portuguese and English differ in which nouns are treated as countable
      vs. uncountable. Portuguese 'informacao' has a plural form ('informacoes'),
      but English 'information' is always singular and uncountable. Portuguese 'conselho'
      (advice) can be pluralized, but English 'advice' cannot.
    teacher_tips:
      how_to_explain: 'Create two columns: COUNTABLE and UNCOUNTABLE. List common
        nouns that differ between Portuguese and English. Emphasize: ''information,
        advice, furniture, luggage, news, research'' are ALWAYS singular in English.'
      where_to_start: 'Begin with the most common errors: information, advice, furniture.'
      sequencing: 'Week 1: Common uncountable nouns. Week 2: Counter words (a piece
        of, a loaf of, a cup of). Week 3: Nouns countable in Portuguese but uncountable
        in English. Week 4: Mixed practice.'
      exercises:
      - name: Countable or Uncountable Sort
        type: matching
        description: Give 20 noun cards. Students sort into countable and uncountable,
          then write a sentence for each.
        duration: 15
      - name: Uncountable Noun Error Correction
        type: error-correction
        description: Provide 15 sentences with uncountable noun errors. Students identify
          and correct each error.
        duration: 15
