  zero_article:
    interference_patterns:
    - pattern: Overuse of the with abstract nouns
      example_portuguese: A honestidade e importante.
      example_gloss: The honesty is important.
      example_wrong: The honesty is important.
      example_correct: Honesty is important.
      explanation: Portuguese requires the definite article before abstract nouns.
        English uses zero article.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    - pattern: Overuse of the with plural generic nouns
      example_portuguese: Os caes sao leais.
      example_gloss: The dogs are loyal.
      example_wrong: The dogs are loyal (in general).
      example_correct: Dogs are loyal.
      explanation: Portuguese uses the definite article with plural nouns for generic
        reference. English uses bare plurals.
      frequency: 4
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: The honesty is important. Correct: Honesty is important.'
    - 'Wrong: The dogs are loyal animals. Correct: Dogs are loyal animals.'
    why_it_happens: Portuguese uses the definite article far more extensively than
      English. Abstract nouns require a definite article. Generic statements use the
      definite article with both plural and uncountable nouns.
    teacher_tips:
      how_to_explain: Write three Portuguese sentences on the board and show the English
        equivalents without articles. State the rule.
      where_to_start: 'Begin with abstract nouns: life, love, happiness, honesty,
        patience.'
      sequencing: 'Week 1: Zero article with abstract nouns. Week 2: Zero article
        with plural generics. Week 3: Zero article with uncountables. Week 4: Contrast
        generic vs specific.'
      exercises:
      - name: Generic vs Specific Sort
        type: matching
        description: Give 20 sentences. Students sort into General (no article) and
          Specific (needs the).
        duration: 15
      - name: Article Deletion Drill
        type: error-correction
        description: Provide 15 sentences with unnecessary the. Students remove it.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
    - 'Perini, M. (2002). Modern Portuguese: A Reference Grammar. Yale University
      Press.'
