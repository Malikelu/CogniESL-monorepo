  passive_voice:
    interference_patterns:
    - 'French ''Le livre a ete ecrit'' -> English error: ''The letter was send'' -> Correct: ''The letter was sent'''
    - 'French ''On dit que...'' -> English error: ''One says that...'' -> Correct: ''It is said that...'''
    why_it_happens: French passive uses 'etre + past participle.' French learners may forget irregular past participles or
      struggle with the impersonal 'on' construction.
    teacher_tips:
