    notes: 'Portuguese has 243 GPs total. This entry covers the conditionals_overview grammar point. Two independent sources:
      contrastive teaching reference (Swan & Smith 2001) and structural linguistics reference (Azevedo 1996). Patterns cover
      (1) will-in-if-clause from Portuguese future subjunctive transfer, (2) would-in-if-clause from Portuguese imperfect subjunctive
      transfer, (3) past perfect underuse in third conditionals from Portuguese pluperfect subjunctive transfer, (4) mixed
      conditional errors from flexible Portuguese tense-mood combinations, (5) present subjunctive transfer in zero/first conditionals.
      Frequency is 5 (very high — conditionals are among the most common sentence structures) and persistence is 4 (high — deeply
      automatized from L1 subjunctive system). Communicative impact is 4 (high — errors can change the meaning of conditions
      regarding reality, probability, and temporal reference). This entry is distinct from alternatives_to_if which covers
      conditional connectors (unless, provided that, etc.) rather than conditional structure and tense-mood patterns.'
  connectors_advanced:
    interference_patterns:
    - Portuguese speakers produce double conjunction errors by pairing "although/though" with "but" in the same sentence
      (e.g. "Although it was raining, but I went out"), directly transferring the Portuguese pattern "Embora estivesse
      chovendo, mas eu saí." Portuguese requires both the concessive conjunction (embora/apesar de) and the adversative
      conjunction (mas) in the same clause pair, whereas English allows only one conjunction per clause pair. This is one
      of the most frequent and visible connector errors for Portuguese speakers and persists into advanced proficiency.
    - Portuguese speakers overuse "but" as a universal connector in contexts where English requires more specific connectors
      such as "however," "nevertheless," "yet," "although," or "despite." Portuguese "mas" and "porém" cover a broader
      semantic range than English "but," and Portuguese speakers default to "but" in formal and academic writing where
      English expects more precise connectors. This produces register-flattened prose such as "The data is limited, but
      the conclusions are valid" where "The data is limited; nevertheless, the conclusions are valid" is the expected
      academic register.
    - Portuguese speakers confuse "since" (temporal) with "since" (causal) because Portuguese uses "já que" and "como"
      for causal meanings and "desde" / "desde que" for temporal meanings — a distinction English collapses into the
      single polysemous word "since." This produces errors like "Since I was tired, I went to bed early" (ambiguous —
      temporal or causal?) and "Since 2010, I live here" where the temporal meaning is intended but the causal reading
      is also activated. Portuguese speakers also produce "Since it was raining, so I stayed home" by transferring the
      Portuguese causal pattern "Já que estava chovendo, então fiquei em casa" where both conjunctions co-occur.
    - Portuguese speakers use "that" as a connector after prepositions and in complement clauses where English requires
      different structures. Portuguese "que" is a universal complementizer used after prepositions ("antes de que" =
      "before," "depois de que" = "after," "apesar de que" = "despite the fact that"), but English requires gerunds
      or different structures after prepositions. This produces errors like "Before to arrive, he called" (from "Antes
      de chegar, ele ligou" with personal infinitive transfer), "Despite of that, we continued" (from "Apesar disso,
      continuamos"), and "He insisted in that we should go" (from "Ele insistiu em que devíamos ir").
    - Portuguese speakers produce "so...that" and "such...that" errors because Portuguese uses "tão...que" and "tanto...que"
      with a structure that maps deceptively onto English but differs in word order and agreement. Errors include "It was
      so beautiful day that..." (from "Era um dia tão bonito que..." — missing article restructuring), "She is so tired
      that she can't to work" (from "Ela está tão cansada que não pode trabalhar" — infinitive with "to" after modal),
      and "He spoke so fast that nobody understood him" produced correctly but "He spoke so fast that nobody could
      understand" (missing the object pronoun that Portuguese omits through context).
    why_it_happens: Portuguese and English have fundamentally different conjunction and connector systems. Portuguese
      allows (and often requires) paired conjunctions in clause relationships where English permits only one conjunction
      — Portuguese "embora...mas," "já que...então," "se...então" map onto English "although" (alone), "since/because"
      (alone), "if...then" (with "then" optional). Portuguese "que" functions as a universal complementizer after
      prepositions, nouns, and adjectives, while English uses "that," "wh-," gerunds, or preposition + "-ing" depending
      on the context. Portuguese causal connectors (já que, como, pois, por causa de) have different distributional
      constraints than English "since," "because," "as," "so," "therefore." The polysemy of English "since" (temporal
      + causal) has no single Portuguese equivalent, creating mapping confusion. These errors are deeply persistent because
      connector usage is acquired early in L1 and operates automatically in both speech and writing. The paired-conjunction
      error (although...but) is particularly resistant because it is grammatically correct in Portuguese and feels natural
      to the speaker.
    teacher_tips:
      how_to_explain: 'Use a three-part contrastive framework: (1) PAIRED vs. SINGLE CONJUNCTIONS — show that Portuguese
        uses two conjunctions (embora + mas) where English uses only one (although OR but, never both). Use the formula:
        "English: ONE connector per clause pair. Portuguese: often TWO." (2) CONNECTOR SEMANTIC MAP — create a map showing
        Portuguese connectors (mas, porém, contudo, no entanto, entretanto, já que, como, pois, portanto, então) and their
        English equivalents, highlighting where one Portuguese word maps to multiple English words with different registers.
        (3) "SINCE" DISAMBIGUATION — teach the two meanings of "since" (time vs. cause) and show the Portuguese equivalents
        for each (desde que = temporal, já que/como = causal). For "que" complementizer transfer, show that English prepositions
        cannot be followed by "that" — they require a gerund or a different structure.'
      where_to_start: Start with the "although...but" paired conjunction error since it is the most frequent, most visible,
        and easiest to diagnose. Use the "one connector per clause pair" rule. Then move to "since" polysemy, which causes
        genuine communication breakdown. Then address register issues with "but" overuse in academic writing. Finally, tackle
        the "que" complementizer transfer, which is the most structurally complex.
      exercises:
      - name: Paired conjunction error correction
        type: error-correction
        description: Provide 15 sentences with paired conjunction errors typical of Portuguese transfer (e.g. "Although
          it was expensive, but I bought it", "Because I was tired, so I went to bed", "Even though he studied hard, but
          he failed", "Since it was late, so we left"). Students identify the error, explain the "one connector per clause
          pair" rule, and rewrite each sentence correctly with only one conjunction.
        duration: 15
      - name: Connector semantic mapping — Portuguese to English
        type: practice
        description: Give students a table with 20 Portuguese connectors (mas, porém, contudo, no entanto, entretanto, todavia,
          já que, como, pois, portanto, então, logo, assim, apesar disso, mesmo assim, por isso, além disso, ou seja, isto é,
          em outras palavras). For each, students must provide the English equivalent(s) and indicate the register (informal,
          neutral, formal). Then they write one sentence with each English connector.
        duration: 20
      - name: Since-disambiguation drill
        type: practice
        description: Provide 15 sentences using "since" (e.g. "Since 2015, I have lived here", "Since you are here, let us
          begin", "Since it was raining, we stayed home", "I have known her since we were children"). Students must identify
          whether each "since" is temporal or causal, rewrite the sentence using a more explicit connector (ever since,
          because) to disambiguate, and provide the Portuguese equivalent for each meaning.
        duration: 15
      - name: Register transformation — replacing but with precise connectors
        type: practice
        description: >
          Give students a paragraph written in informal English overusing but (e.g. a student essay: "The experiment
          was successful, but the sample size was small, but the results were significant, but more research is needed"). Students
          must rewrite the paragraph using precise connectors (however, nevertheless, yet, although, despite, while) appropriate
          for academic register. Discuss which connectors are formal vs. informal.
        duration: 20
      - name: Complementizer transfer correction — "que" to English structures
        type: error-correction
        description: Provide 12 sentences with "que" complementizer transfer errors (e.g. "Before to arrive, he called",
          "Despite of that, we continued", "He insisted in that we should go", "After to finish the work, they left",
          "He is sure of that he will pass"). Students identify the error type, explain why the Portuguese structure does
          not transfer to English, and rewrite each sentence correctly (e.g. "Before arriving, he called", "Despite that,
          we continued", "He insisted that we should go").
        duration: 20
      - name: Portuguese-to-English connector translation
        type: drill
        description: Give 15 Portuguese sentences using a range of advanced connectors (e.g. "Embora fosse caro, mas comprei",
          "Já que você está aqui, vamos começar", "Apesar disso, continuamos", "Desde 2010, moro aqui", "Ele insistiu em
          que devíamos ir"). Students translate each into natural English, consciously applying the "one connector per
          clause pair" rule and choosing register-appropriate English connectors.
        duration: 20
    examples:
    - 'Wrong: ''Although it was raining, but I went out.'' (Portuguese: ''Embora estivesse chovendo, mas eu saí.'' — paired
      conjunction) Correct: ''Although it was raining, I went out.'' / ''It was raining, but I went out.'' (ONE conjunction
      only)'
    - 'Wrong: ''Because I was tired, so I went to bed early.'' (Portuguese: ''Já que estava cansado, então fui dormir cedo.''
      — paired causal conjunctions) Correct: ''Because I was tired, I went to bed early.'' / ''I was tired, so I went to
      bed early.'''
    - 'Wrong: ''The data is limited, but the conclusions are valid.'' (register-flattened — Portuguese ''mas'' overuse) Correct
      (academic register): ''The data is limited; nevertheless, the conclusions are valid.'' / ''Although the data is limited,
      the conclusions are valid.'''
    - 'Wrong: ''Since it was raining, so I stayed home.'' (Portuguese: ''Já que estava chovendo, então fiquei em casa.'' —
      causal "since" + "so" double marking) Correct: ''Since it was raining, I stayed home.'' / ''It was raining, so I
      stayed home.'''
    - 'Wrong: ''Before to arrive, he called.'' (Portuguese: ''Antes de chegar, ele ligou.'' — personal infinitive + complementizer
      transfer) Correct: ''Before arriving, he called.'' / ''Before he arrived, he called.'''
    - 'Wrong: ''Despite of that, we continued.'' (Portuguese: ''Apesar disso, continuamos.'' — preposition + "que" transfer)
      Correct: ''Despite that, we continued.'' / ''In spite of that, we continued.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents paired conjunction errors including although...but, because...so, and connector
      overuse/underuse patterns; pp. 168-185).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on conjunctions,
      complementizers, and clause structure — describes the Portuguese paired conjunction system (embora/mas, já que/então),
      the universal complementizer "que," and the causal connector system (já que, como, pois), providing the structural
      basis for L1 transfer to English connectors).'
    - 'Cunha, C. & Cintra, L. (1984). Nova Gramática do Português Contemporâneo. Nova Fronteira. (Chapter on conjunctions
      and subordinate clauses — describes the Portuguese paired conjunction patterns (concessivas with embora + mas, causais
      with já que + então) and the productivity of "que" as a universal complementizer after prepositions, nouns, and
      adjectives, providing the contrastive basis for understanding connector transfer errors).'
