    why_it_happens: 'Portuguese uses the present tense with future time markers for
      planned events (Eu viajo amanha = I travel tomorrow) and the periphrastic ''ir
      + infinitive'' construction for near-future plans (vou comer = I am going to
      eat). English requires a future form (will, be going to, or present continuous
      for arrangements). Portuguese speakers transfer both patterns: (1) present tense
      alone with future markers, and (2) literal translation of ''ir + infinitive''
      as ''go + verb'' instead of ''be going to + verb.'' The Portuguese future subjunctive
      (quando eu chegar = when I arrive) also maps onto English present tense in time
      clauses, adding further confusion about which tense to use for future reference.'
    teacher_tips:
      how_to_explain: Teach that English needs a future form when talking about the
        future. Portuguese can use the present tense alone. For the ir + infinitivo
        pattern, show that English uses be going to + verb, not go + verb. Write both
        patterns on the board to contrast them. Drill the be going to form with person/number
        changes.
      where_to_start: Begin with 'be going to' for plans since it is the most direct
        translation of Portuguese 'ir + infinitivo.' Then introduce 'will' for spontaneous
        decisions and predictions.
      sequencing: 'Week 1: Future forms (will, going to, present continuous). Week
        2: Present tense with future markers (error correction). Week 3: Choosing
        the right future form. Week 4: Time clauses with future reference (when I
        arrive, not when I will arrive). Week 5: Mixed practice.'
      exercises:
      - name: Future Form Correction
        type: error-correction
        description: Provide 15 sentences with present tense used for future. Students
          correct to a future form.
        duration: 15
      - name: Go vs Going To Transformation
        type: transformation
        description: Give 10 Portuguese 'ir + infinitivo' sentences. Students translate
          into English using 'be going to,' avoiding the literal 'go + verb' error.
        duration: 15
      - name: Future Time Clause Practice
        type: fill-in-the-blank
        description: Provide 12 sentences with time clauses (when, before, after,
          until, as soon as). Students fill in the correct tense (present for future
          reference in time clauses, future in main clause).
        duration: 15
