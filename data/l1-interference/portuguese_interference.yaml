    notes: 'Portuguese has 243 GPs total. This entry covers the all_most grammar point. Two independent sources: contrastive
      teaching reference (Swan & Smith 2001) and structural linguistics reference (Azevedo 1996). Patterns cover (1) todos
      overextension to most contexts due to loose semantic boundary in Portuguese, (2) quase todos mapping confusion between
      most/almost all, (3) article omission after most of from flexible Portuguese a maioria de/dos usage. Removed misattributed
      sources (Mason 1996 on ser/estar; Perez-Leroux & Glass 1999 on null objects) that do not address quantifier interference.'
  alternatives_to_if:
    interference_patterns:
    - Portuguese speakers overuse 'if' as the universal conditional connector, producing wordy or unnatural English where
      native speakers would use 'unless', 'provided that', 'as long as', 'even if', or 'in case'. Portuguese 'se' covers all
      these conditional meanings, so learners default to 'if' in every conditional context. Errors include 'If you don't study,
      you will fail' (acceptable but marked) instead of the more natural 'Unless you study, you will fail', or 'If it doesn't
      rain, we will go' instead of 'Unless it rains, we will go'. The overuse of 'if' makes Portuguese-accented English sound
      less idiomatic even when grammatically correct.
    - Portuguese speakers produce 'if not' in place of 'unless' because Portuguese 'se nao' maps directly to English 'if not'.
      While 'if not' is grammatically acceptable, it is wordier and less natural than 'unless' in most contexts. Errors include
      'If you don't hurry, you will be late' instead of 'Unless you hurry, you will be late', and 'I won't go if you don't
      come' instead of 'I won't go unless you come'. The 'if not' pattern is the most frequent alternative-to-if error for
      Portuguese speakers and persists into advanced proficiency because 'se nao' is the default negative conditional in Portuguese.
    - Portuguese speakers use 'will' after 'unless' and 'provided that' because Portuguese conditional clauses can use the
      future subjunctive (futuro do subjuntivo) which has a future-marking morphology. Learners transfer this future-marking
      tendency to English, producing errors like 'Unless it will rain, we will go' and 'Provided that you will pay in advance,
      we will hold the room'. The error is particularly persistent because the Portuguese future subjunctive (se chouver,
      se voce pagar) is a standard taught form that learners associate with future conditions, leading them to incorrectly
      insert 'will' in English conditional clauses where present tense is required.
    - Portuguese speakers confuse 'in case' with 'if' because Portuguese 'caso' (as in 'caso chova' = 'if it rains') looks
      cognate with 'in case' but functions as a simple conditional, not as a preparation marker. Learners produce errors like
      'In case it rains, I will stay home' (meaning 'if it rains') instead of the correct 'If it rains, I will stay home'
      for a real condition, or 'Take an umbrella if it rains' instead of 'Take an umbrella in case it rains' for a preparation
      meaning. The confusion is bidirectional -- learners use 'in case' where 'if' is needed and 'if' where 'in case' is needed.
    - Portuguese speakers overuse 'even if' (from Portuguese 'mesmo se') for simple conditional statements where English requires
      only 'if'. Portuguese 'mesmo se' is used more broadly and with lower emphasis than English 'even if', leading to errors
      like 'Even if you study, you will pass' -- intended meaning 'If you study, you will pass' -- where the 'even if' incorrectly
      implies that studying is insufficient or surprising as a condition for passing. The error changes the meaning of the
      sentence and can cause communicative misunderstanding.
    why_it_happens: Portuguese has a single dominant conditional conjunction 'se' that covers all conditional meanings --
      neutral conditions, negative conditions, concessive conditions, and hypothetical scenarios. English splits these meanings
      across multiple connectors -- 'if' for neutral conditions, 'unless' for negative conditions, 'provided that' or 'as
      long as' for positive stipulation, 'even if' for concessive conditions, and 'in case' for preparation. Portuguese learners
      map all conditional meanings onto 'if' because it is the default L1 equivalent. Additionally, Portuguese uses the future
      subjunctive (futuro do subjuntivo) in conditional clauses referring to future events (e.g. 'Se chover, fico em casa'
      or 'Se voce vier, ficarei feliz'), which has future-marking morphology that learners incorrectly transfer as 'will'
      in English conditional clauses. The 'caso' cognate confusion with 'in case' adds another layer of interference. These
      errors are deeply persistent because the Portuguese conditional system is acquired in early childhood and operates automatically,
      and because 'se' is one of the most frequent words in Portuguese.
    teacher_tips:
      how_to_explain: Use a conditional connector map with 'if' at the center and arrows branching to each alternative --
        'unless' (if not), 'provided that' (on the condition that), 'as long as' (only if), 'even if' (despite the condition),
        'in case' (preparation). For each connector, show the Portuguese equivalent and highlight where it differs. For the
        'will' error, emphasize the golden rule -- NEVER use 'will' after 'if', 'unless', 'provided that', 'as long as', or
        'even if'. Use the 'preparation vs. condition' contrast for 'in case' vs 'if' -- 'in case' means doing something BEFORE
        the event as a precaution.
      where_to_start: Start with 'unless' since it is the most common alternative and the most frequent error (if not -> unless).
        Use a transformation drill -- students rewrite 'if not' sentences using 'unless'. Then move to 'provided that/as long
        as' for positive conditions. Address the 'will' error explicitly with a dedicated exercise. Finally, teach 'in case'
        vs 'if' and 'even if' vs 'if' as meaning-distinction exercises.
      exercises:
      - name: Unless transformation -- if not to unless
        type: drill
        description: Provide 20 sentences using 'if not' (e.g. 'If you don't hurry, you will be late'). Students rewrite each
          using 'unless' (e.g. 'Unless you hurry, you will be late'). Emphasize that 'unless' = 'if not' and is more concise
          and natural in English. Include sentences where 'unless' sounds more natural and sentences where both are acceptable.
        duration: 15
      - name: Will-after-unless error correction
        type: error-correction
        description: Provide 15 sentences with the 'will' after 'unless/provided that' error (e.g. 'Unless it will rain, we
          will go', 'Provided that you will study, you will pass', 'As long as you will practice, you will improve'). Students
          identify the error (will in conditional clause) and correct it to present tense. Explain that Portuguese uses future
          subjunctive in these clauses but English uses present tense.
        duration: 15
      - name: In case vs if -- preparation or condition?
        type: practice
        description: Provide 15 scenarios. For each, students must decide whether to use 'in case' (preparation) or 'if' (condition)
          and write the correct sentence. Example scenario -- 'You think it might rain. You take an umbrella before leaving.'
          The answer is 'I'll take an umbrella in case it rains.' Contrast with -- 'It is raining. You need to decide whether
          to go out.' The answer is 'If it rains, I will stay home.' Discuss the difference between preparation, which is
          action before the event, and condition, which is decision after the event.
        duration: 20
      - name: Even if vs if -- meaning distinction
        type: practice
        description: Provide 10 pairs of sentences -- one with 'if' and one with 'even if'. Students explain the meaning difference
          in each pair. Example -- 'If you study, you will pass' (studying is sufficient) vs 'Even if you study, you might
          fail' (studying may not be enough). Then give 10 Portuguese sentences using 'mesmo se' and have students decide
          whether 'if' or 'even if' is the correct English translation based on context.
        duration: 15
      - name: Conditional connector selection -- comprehensive
        type: practice
        description: Provide 20 gapped sentences with the conditional connector removed. Students must choose the best connector
          from if, unless, provided that, as long as, even if, or in case. Each sentence has only one natural choice. Include
          contexts covering all five alternatives. Discuss answers as a class, focusing on why each connector is the best
          fit.
        duration: 20
      - name: Portuguese-to-English conditional translation
        type: drill
        description: Give 15 Portuguese sentences using 'se', 'se nao', 'mesmo se', 'caso', and 'desde que'. Students translate
          each into natural English, choosing the correct conditional connector. Include 'Se nao chover, vamos' (Unless it
          rains, we will go), 'Mesmo se voce estudar, pode reprovar' (Even if you study, you might fail), 'Caso chova, lembre
          o guarda-chuva' (In case it rains, take the umbrella), 'Desde que voce pague, eu faco' (Provided that you pay, I
          will do it).
        duration: 20
    examples:
    - 'Wrong: ''If you don''t study, you will fail.'' (acceptable but marked) Better: ''Unless you study, you will fail.''
      Portuguese: ''Se voce nao estudar, voce vai reprovar.'' -- se nao maps to unless'
    - 'Wrong: ''Unless it will rain, we will go.'' (Portuguese: ''Se nao chover, nos iremos.'' -- future subjunctive chover
      transferred as will) Correct: ''Unless it rains, we will go.'''
    - 'Wrong: ''In case it rains, I will stay home.'' (intended meaning: if it rains) Correct for condition: ''If it rains,
      I will stay home.'' Correct for preparation: ''I will take an umbrella in case it rains.'' Portuguese: ''Caso chova,
      fico em casa.'' -- caso looks like in case but means if'
    - 'Wrong: ''Even if you study, you will pass.'' (intended: if you study, you will pass) Correct: ''If you study, you will
      pass.'' Portuguese: ''Mesmo se voce estudar, voce vai passar.'' -- mesmo se overused for simple conditions'
    - 'Wrong: ''Provided that you will pay in advance, we will hold the room.'' (Portuguese: ''Desde que voce paguem antecadado,
      reservaremos o quarto.'' -- future subjunctive paguem transferred as will) Correct: ''Provided that you pay in advance,
      we will hold the room.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter -- documents conditional connector overuse, if-for-unless transfer, and will-in-conditional-clause
      errors from Portuguese future subjunctive transfer).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on subordination and
      conditionals -- describes the Portuguese se/sistema conditional system including the future subjunctive (futuro do subjuntivo)
      in conditional clauses, the broad use of mesmo se for concessive conditions, and the caso conditional that is cognate
      with but functionally different from English in case).'
    source_count: 2
    source_type: contrastive_analysis
