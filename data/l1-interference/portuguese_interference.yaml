  for_vs_during:
    interference_patterns:
    - pattern: Use of 'for' where 'during' is needed
      example_portuguese: Eu estudei durante a aula.
      example_gloss: I studied during the class.
      example_wrong: I studied for the class.
      example_correct: I studied during the class.
      explanation: Portuguese 'durante' = English 'during.' Portuguese speakers may
        use 'for' by analogy with 'por.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'during' where 'for' is needed
      example_portuguese: Eu estudei por 3 horas.
      example_gloss: I studied for 3 hours.
      example_wrong: I studied during 3 hours.
      example_correct: I studied for 3 hours.
      explanation: Portuguese 'por' = English 'for' (duration). Portuguese 'durante'
        = English 'during' (within a period).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I studied for the class.'' Correct: ''I studied during the class.'''
    - 'Wrong: ''I studied during 3 hours.'' Correct: ''I studied for 3 hours.'''
    why_it_happens: Portuguese uses two prepositions, "por" and "durante", that map onto English "for" and "during", but the mapping is not one-to-one. Portuguese "durante" aligns closely with English "during" (within a time period), but Portuguese "por" can express both duration ("por 3 horas" = for 3 hours) and purpose or reason, leading Portuguese speakers to overuse "for" in temporal contexts where "during" is required. Additionally, Portuguese allows "durante" with both events and bare time expressions, while English restricts "during" to noun phrases denoting events or periods (during the class, during the summer) and requires "for" with bare durations (for 3 hours, for two years). This distributional mismatch causes bidirectional interference. The error is documented in contrastive analyses of Portuguese-English prepositional systems (Swan and Smith, 2001; Azevedo, 1996).
    teacher_tips:
      how_to_explain: 'Teach: ''for'' = duration (for 3 hours), ''during'' = within
        a period (during the class). ''For'' answers ''how long?''; ''during'' answers
        ''when?'''
      where_to_start: 'Begin with clear examples: ''I studied for 3 hours'' vs. ''I
        studied during the class.'''
      sequencing: 'Week 1: ''For'' for duration. Week 2: ''During'' for within a period.
        Week 3: Contrast. Week 4: Mixed.'
      exercises:
      - name: For vs During Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between 'for' and 'during.'
        duration: 15
      - name: Duration vs Event Sort
        type: categorization
        description: Give 20 time expressions (e.g., '3 hours,' 'the meeting,' 'last summer,' 'the exam'). Students sort into 'for' (duration) and 'during' (event/period) columns, then write a sentence for each.
        duration: 20
