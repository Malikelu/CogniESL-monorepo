  would_rather_past_tense:
    interference_patterns:
    - pattern: Use of 'would rather' with past tense verb for present preference
      example_portuguese: Eu preferiria ficar.
      example_gloss: I would prefer to stay.
      example_wrong: I would rather stayed.
      example_correct: I would rather stay.
      explanation: Portuguese uses the conditional mood 'preferiria' (would prefer)
        for present/future preferences, which morphologically resembles a past tense.
        English 'would rather' takes a bare infinitive (base verb) for present preferences.
        Portuguese speakers transfer the conditional-as-past form and produce 'would
        rather stayed' instead of 'would rather stay.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of present tense after 'would rather + someone' instead of past
        subjunctive
      example_portuguese: Eu prefiro que voce fique.
      example_gloss: I prefer that you stay.
      example_wrong: I would rather you stay here.
      example_correct: I would rather you stayed here.
      explanation: Portuguese uses the present subjunctive 'fique' after 'prefiro
        que' (I prefer that). English 'would rather + someone' requires the past simple
        (subjunctive) form to express a present/future preference about another person's
        action. Portuguese speakers transfer the present subjunctive and produce 'I
        would rather you stay' instead of 'I would rather you stayed.' The English
        past tense here is not a real past — it is an irrealis/subjunctive marker,
        which has no direct equivalent in Portuguese.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I would rather stayed.'' Correct: ''I would rather stay.'''
    - 'Wrong: ''I would rather you stay here.'' Correct: ''I would rather you stayed
      here.'''
    - 'Wrong: ''She would rather he comes early.'' Correct: ''She would rather he
      came early.'''
    why_it_happens: Portuguese expresses present/future preference with the conditional
      mood ('eu preferiria ficar' = I would prefer to stay), which is morphologically
      a past-tense form. English 'would rather' takes a bare infinitive for present
      preferences ('I would rather stay'), not a past tense. Portuguese speakers transfer
      the conditional-as-past pattern and produce 'would rather stayed.' Additionally,
      when expressing preferences about another person's actions, Portuguese uses
      'prefiro que + present subjunctive' (eu prefiro que voce fique = I prefer that
      you stay). English requires 'would rather + someone + past simple' (I would
      rather you stayed), where the past tense is an irrealis marker, not a real past.
      Portuguese speakers transfer the present subjunctive and produce 'would rather
      you stay' instead of 'would rather you stayed.' Both errors are documented in
      Swan & Smith (2001) for Portuguese-speaking learners and in Celce-Murcia & Larsen-Freeman
      (1999) for the subjunctive transfer pattern.
    teacher_tips:
      how_to_explain: 'Rule 1: ''Would rather + BASE verb'' for your own preferences.
        ''I would rather stay'' (not ''stayed''). Rule 2: ''Would rather + someone
        + PAST'' for other people. ''I would rather you stayed'' (not ''stay''). The
        past tense after ''would rather + someone'' is NOT real past — it means ''I
        wish you would...'''
      where_to_start: 'Begin with own preferences: ''I would rather stay home tonight.''
        Drill the base verb. Then introduce preferences about others: ''I would rather
        you came early.'' Emphasize that ''came'' is present/future meaning, not past.'
      sequencing: 'Week 1: ''Would rather + base verb'' (own preferences). Week 2:
        ''Would rather + someone + past simple'' (preferences about others). Week
        3: ''Would rather have + past participle'' (past regrets). Week 4: Contrast
        ''would rather'' vs. ''would prefer.'' Week 5: Mixed practice and error correction.'
      exercises:
      - name: Would Rather Base Verb Drill
        type: fill-in-the-blank
        description: Provide 10 sentences about personal preferences. Students fill
          in the correct base verb form after 'would rather.'
        duration: 10
      - name: Would Rather Someone Past Subjunctive
        type: sentence-rewrite
        description: Give 10 sentences with 'would rather + someone + present tense.'
          Students rewrite using the correct past subjunctive form.
        duration: 15
      - name: Would Rather Error Correction
        type: error-correction
        description: Provide 15 sentences mixing both error types (own preference
          with past tense, other preference with present tense). Students identify
          and correct each error.
        duration: 15
      - name: Would Rather vs Would Prefer Contrast
        type: transformation
        description: Give 10 sentences with 'would rather.' Students rewrite using
          'would prefer' and vice versa, adjusting the structure correctly.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course (2nd ed.). Heinle & Heinle.'
