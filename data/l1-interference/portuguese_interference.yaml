  causative:
    interference_patterns:
    - Portuguese speakers transfer the Portuguese fazer + infinitive causative construction directly to English, producing
      ungrammatical strings like "I made to fix my car" (from Portuguese "Eu fiz consertar meu carro") or "She made to bake
      a cake" (from "Ela fez fazer um bolo"). Portuguese uses fazer + bare infinitive as the primary causative strategy, and
      learners map this onto English using "make" but retain the Portuguese infinitive-complement structure instead of the
      English bare-infinitive pattern (make someone do something). The error is "make + to-infinitive" where English requires
      "make + bare infinitive."
    - Portuguese speakers overuse "make" as a universal causative verb, replacing "have," "get," "let," and "help" in contexts
      where English requires these alternatives. Portuguese fazer covers the semantic range of both "make" and "have/get"
      in causative contexts, leading to errors like "I made the mechanic check my car" (when the intended meaning is "I had
      the mechanic check my car") and "She made me to go to the store" — combining make + to-infinitive from Portuguese fazer
      + infinitive. The Portuguese causative system does not distinguish between force (make), arrangement (have), persuasion
      (get), permission (let), and assistance (help) — fazer covers all of these.
    - Portuguese speakers produce passive causative errors by transferring the Portuguese passive causative construction (ser/ficar
      + past participle or fazer-se + infinitive). Errors include "I made repaired my car" (from Portuguese "Fiz consertar
      meu carro" reanalyzed with a passive reading), "The house made painted" (from "A casa foi pintada" / "Fez-se pintar
      a casa"), and "I had my hair cutted" — combining had + past tense instead of past participle, from Portuguese transfer
      of irregular participle forms). Portuguese past participle forms do not always align with English, and the transfer
      produces participle errors alongside structural ones.
    why_it_happens: Portuguese has a streamlined causative system built primarily around "fazer" + bare infinitive (e.g.,
      "Fiz ele trabalhar" = "I made him work") and "dejar" + infinitive for permissive causatives. Unlike English, which has
      a multi-verb causative system (make someone do, have someone do, get someone to do, let someone do, help someone (to)
      do), Portuguese uses fewer structural distinctions and relies more on context. The Portuguese fazer-causative takes
      a bare infinitive complement, which is structurally similar to English "make + bare infinitive" but differs in that
      Portuguese allows the infinitive to be introduced by "a" or "para" in some dialects and registers, leading to "make
      + to-infinitive" transfer errors. Additionally, Portuguese does not have a productive "have someone do" causative equivalent
      — the closest construction is "mandar" (send/order) or "fazer" (make/do), so learners default to "make" for all causative
      meanings. The passive causative is particularly problematic because Portuguese uses ser/ficar + past participle or the
      reflexive fazer-se construction, neither of which maps onto English "have something done." These errors are deeply persistent
      because the Portuguese causative system is acquired in early childhood and operates automatically in both speech and
      writing.
    teacher_tips:
      how_to_explain: Use a causative verb map showing the five English causative verbs (make, have, get, let, help) with
        their complement patterns side-by-side with Portuguese equivalents. Highlight three critical differences — make +
        bare infinitive (no "to"), get + to-infinitive (requires "to"), and have + bare infinitive. Show that Portuguese fazer
        maps onto both "make" and "have" in English, and that Portuguese does not distinguish force vs. arrangement the way
        English does. For passive causatives, contrast "I had my car fixed" (English) with "Fiz consertar meu carro" / "Meu
        carro foi consertado" (Portuguese).
      where_to_start: Start with the make vs. have distinction since it is the most frequent error. Give students scenarios
        (arranging a service vs. forcing someone) and have them choose the correct causative verb. Then move to the bare-infinitive
        vs. to-infinitive pattern. Finally, address passive causatives.
      exercises:
      - name: Causative verb selection — make vs. have vs. get
        type: drill
        description: Provide 20 scenarios where students must choose the correct English causative verb. Include force contexts
          (make), arrangement contexts (have), persuasion contexts (get), permission contexts (let), and assistance contexts
          (help). For each, students write the full sentence. For example, the scenario "You asked a mechanic to fix your
          car. You didn't force them, you arranged it." yields the answer "I had my car fixed by the mechanic."
        duration: 20
      - name: Bare infinitive vs. to-infinitive after causatives
        type: error-correction
        description: Provide 15 sentences with Portuguese-style causative errors including make + to-infinitive ("She made
          him to clean his room"), have + to-infinitive ("I had the mechanic to check my car"), and get + bare infinitive
          ("She got him clean his room"). Students identify the error and correct it, explaining which complement pattern
          each causative verb requires.
        duration: 15
      - name: Portuguese-to-English causative translation
        type: drill
        description: Give 15 Portuguese sentences using fazer, mandar, and deixar as causatives (e.g., "Fiz ele trabalhar",
          "Mandei consertar o carro", "Deixei ela sair", "Meu carro foi consertado"). Students translate each into natural
          English, choosing the correct causative verb and complement structure. Discuss which Portuguese causative maps onto
          which English equivalent.
        duration: 20
      - name: Passive causative transformation
        type: practice
        description: Give students 10 active causative sentences (e.g., "I had the barber cut my hair"). Students transform
          each into a passive causative construction and explain the meaning. Then give 10 Portuguese passive causative sentences
          (e.g., "Fiz pintar a casa", "A casa foi pintada") and have students translate into English using "have something
          done."
        duration: 15
      - name: Causative error classification
        type: practice
        description: Provide 20 sentences with a mix of causative errors (wrong verb choice, wrong complement pattern, passive
          causative errors, participle errors). Students classify each error type, correct it, and explain the Portuguese
          source of the error. This exercise consolidates all three interference patterns.
        duration: 20
    examples:
    - 'Wrong: ''I made to fix my car.'' (Portuguese: ''Fiz consertar meu carro.'' — fazer + infinitive transferred as make
      + to-infinitive) Correct: ''I had my car fixed.'' / ''I had someone fix my car.'''
    - 'Wrong: ''She made me to go to the store.'' (Portuguese: ''Ela me fez ir à loja.'' — fazer + infinitive with clitic
      pronoun) Correct: ''She made me go to the store.'' (make + bare infinitive, no "to")'
    - 'Wrong: ''I made the mechanic check my car.'' (intended meaning: arranged, not forced. Portuguese: ''Eu fiz o mecânico
      verificar meu carro.'' — fazer covers both make and have meanings) Correct: ''I had the mechanic check my car.'' (arrangement)
      vs. ''I made the mechanic check my car.'' (force — different meaning)'
    - 'Wrong: ''I had my hair cutted.'' (double error: had + past tense instead of past participle, from Portuguese participle
      transfer. Portuguese: ''Cortei meu cabelo.'' / ''Fiz cortar meu cabelo.'') Correct: ''I had my hair cut.'' (past participle,
      not past tense)'
    - 'Wrong: ''The house made painted.'' (Portuguese: ''A casa foi pintada.'' / ''Fez-se pintar a casa.'' — passive causative
      transfer) Correct: ''I had the house painted.'' / ''The house was painted.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents causative verb transfer errors including fazer → make/have overuse, complement
      pattern mismatches, and passive causative structural transfer).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on complementation
      and causative constructions — describes the Portuguese fazer-causative system, its bare-infinitive complement structure,
      and the lack of a multi-verb causative distinction equivalent to English make/have/get/let/help, explaining the structural
      basis for L1 transfer).'
