  causative:
    interference_patterns:
    - pattern: Use of 'make' where 'have/get' is needed for professional services
      example_portuguese: Eu fiz cortar o cabelo.
      example_gloss: I made cut the hair.
      example_wrong: I made cut my hair.
      example_correct: I had my hair cut.
      explanation: Portuguese uses 'fazer' (to make/do) as a general causative verb
        for both doing something yourself and having someone else do it. English distinguishes
        'I cut my hair' (myself) from 'I had my hair cut' (by a professional). Portuguese
        speakers transfer 'fazer' directly as 'make', producing 'I made cut my hair.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Insertion of 'to' after 'make' in causative constructions
      example_portuguese: Eu fiz ele fazer o trabalho.
      example_gloss: I made him to do the work.
      example_wrong: I made him to do the work.
      example_correct: I made him do the work.
      explanation: Portuguese causative 'fazer' takes a bare infinitive complement
        (fazer alguem fazer algo). However, Portuguese speakers may add 'to' after
        English 'make' by analogy with other English causative verbs that require
        'to' (tell someone TO do, ask someone TO do, want someone TO do). English
        'make' is a bare-infinitive causative where 'make someone DO something' takes
        no 'to'. This overgeneralization of the 'to' pattern is documented in Swan
        and Smith (2001) for Portuguese learners.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I made cut my hair.'' Correct: ''I had my hair cut.'''
    - 'Wrong: ''I made him to do the work.'' Correct: ''I made him do the work.'''
    - 'Wrong: ''She made the children to clean their rooms.'' Correct: ''She made
      the children clean their rooms.'''
    why_it_happens: 'Portuguese uses ''fazer'' as a general causative verb covering
      both self-performed and other-performed actions: ''Eu fiz cortar o cabelo''
      (I had my hair cut) vs. ''Eu fiz o trabalho'' (I did the work). English splits
      this into two structures: ''I did it myself'' (simple past) and ''I had it done''
      (causative with have/get). Portuguese speakers transfer ''fazer'' as ''make''
      and produce ''I made cut my hair.'' Additionally, Portuguese speakers may insert
      ''to'' after English ''make'' (e.g., ''I made him to do it'') by analogy with
      other English causative verbs that require ''to'' (tell/ask/want someone to
      do something). English ''make'' is exceptional in requiring a bare infinitive
      (make someone DO), which contrasts with the Portuguese pattern where the infinitive
      complement structure differs. Both error types are documented in Swan & Smith
      (2001) and in Azevedo (1996)''s contrastive analysis of Portuguese-English verb
      complementation.'
    teacher_tips:
      how_to_explain: 'Teach two separate points. (1) ''Have something done'' for
        professional services: ''I had my hair cut, I had my car fixed.'' Contrast
        with doing it yourself: ''I cut my hair'' vs. ''I had my hair cut.'' (2) ''Make
        someone DO something'' — no ''to.'' Compare: ''I made him clean his room''
        (make + bare infinitive) vs. ''I told him to clean his room'' (tell + to-infinitive).
        Write both patterns on the board and highlight the difference.'
      where_to_start: Begin with 'have something done' for services (hair cut, car
        fixed, house painted). Then introduce 'make + bare infinitive' and contrast
        with 'tell/ask/want + to-infinitive.'
      sequencing: 'Week 1: ''Have something done'' for professional services. Week
        2: ''Get something done'' as informal alternative. Week 3: ''Make + bare infinitive''
        (no ''to'') vs. ''tell/ask/want + to-infinitive.'' Week 4: Mixed practice
        contrasting all causative patterns.'
      exercises:
      - name: Causative Drill
        type: fill-in-the-blank
        description: Provide 10 situations. Students use 'have something done.'
        duration: 15
      - name: Make vs Tell Causative Sort
        type: error-correction
        description: Provide 15 sentences mixing 'make + bare infinitive' and 'tell/ask/want
          + to-infinitive.' Students identify and correct errors, focusing on removing
          'to' after 'make.'
        duration: 15
