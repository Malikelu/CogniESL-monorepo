  conditional_sentences:
    interference_patterns:
    - pattern: Use of present tense in hypothetical conditionals
      example_portuguese: Se eu fosse rico, eu viajaria.
      example_gloss: If I were rich, I would travel.
      example_wrong: If I am rich, I will travel.
      example_correct: If I were rich, I would travel.
      explanation: Portuguese uses the imperfect subjunctive (fosse) for hypothetical
        conditionals. English uses the past simple (or 'were' for all persons with
        'be'). Portuguese speakers may map the subjunctive onto the English present
        tense, producing 'If I am rich' instead of 'If I were rich' for unreal/hypothetical
        situations.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'would' in the if-clause (conditional mood transfer)
      example_portuguese: Se eu teria dinheiro, eu viajaria.
      example_gloss: If I would have money, I would travel.
      example_wrong: If I would have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese uses the conditional mood (teria = would have) in both
        clauses of a hypothetical. English never uses 'would' in the if-clause of
        a second conditional. Portuguese speakers transfer the conditional mood into
        the if-clause, producing 'If I would have' instead of 'If I had.' This is
        one of the most persistent conditional errors for Portuguese speakers.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: ''If I am rich, I will travel.'' (hypothetical) Correct: ''If I were
      rich, I would travel.'''
    - 'Wrong: ''If I would have money, I would travel.'' Correct: ''If I had money,
      I would travel.'''
    - 'Wrong: ''If she would be here, she would help.'' Correct: ''If she were here,
      she would help.'''
    why_it_happens: Portuguese has a morphological conditional mood (via the future
      subjunctive + conditional endings) that can appear in both the if-clause and
      the main clause. English strictly reserves 'would' for the main clause only
      and uses the past simple (or subjunctive 'were') in the if-clause. Portuguese
      speakers transfer the conditional mood into the if-clause, producing 'would'
      where English requires a past tense form. Additionally, Portuguese uses the
      imperfect subjunctive (fosse) for hypotheticals, which speakers may map onto
      the English present tense rather than the correct past simple/subjunctive form.
    teacher_tips:
      how_to_explain: 'Rule: NEVER put ''would'' in the if-clause. ''Would'' only
        goes in the main clause. If-clause: past simple (''If I had...''). Main clause:
        ''would + verb'' (''I would go''). Write the formula on the board: IF + past
        simple, would + base verb.'
      where_to_start: 'Begin with "If I were rich..." and "If I had money..." to establish
        the past simple in the if-clause. Contrast with first conditional: "If I have
        money, I will go."'
      sequencing: 'Week 1: Second conditional structure (if + past, would + verb).
        Week 2: ''Were'' for all persons in hypotheticals. Week 3: First vs. second
        conditional contrast. Week 4: Error correction focusing on ''would'' in the
        if-clause.'
      exercises:
      - name: Conditional Sentences Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students use the correct conditional form
          (first or second conditional).
        duration: 15
      - name: Would Deletion in If-Clauses
        type: error-correction
        description: Provide 10 sentences where 'would' incorrectly appears in the
          if-clause. Students identify the error and rewrite the sentence correctly.
        duration: 15
