  tense_shifts_narrative:
    interference_patterns:
    - pattern: Inconsistent tense shifts in narratives (historical present transfer)
      example_portuguese: Eu cheguei em casa e liguei a TV.
      example_gloss: I arrived at home and turned on the TV.
      example_wrong: I arrive at home and turned on the TV.
      example_correct: I arrived at home and turned on the TV.
      explanation: Portuguese freely uses the historical present (presente historico)
        in narratives for dramatic effect, shifting between past and present tenses
        within the same story. English maintains consistent past tense for completed
        narratives. Portuguese speakers transfer this tense-shifting habit into English,
        producing jarring mid-narrative switches such as 'I arrive home and turned
        on the TV.'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Overuse of present perfect where English requires simple past
      example_portuguese: Eu tenho visitado Lisboa no ano passado.
      example_gloss: I have visited Lisbon last year.
      example_wrong: I have visited Lisbon last year.
      example_correct: I visited Lisbon last year.
      explanation: Portuguese uses the compound past (pretérito perfeito composto
        — 'tem + past participle') as a habitual or experiential form that does not
        map onto the English present perfect. Portuguese speakers overproduce 'have
        + past participle' in contexts where English requires simple past, especially
        with definite past-time markers ('last year,' 'yesterday,' 'in 2010'). This
        is one of the most frequently documented errors for Portuguese L1 learners
        of English (Swan & Smith, 2001; Azevedo, 1996).
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Underuse of past perfect for flashback sequences in narratives
      example_portuguese: Quando cheguei, ela ja saiu.
      example_gloss: When I arrived, she already left.
      example_wrong: When I arrived, she already left.
      example_correct: When I arrived, she had already left.
      explanation: Portuguese expresses anteriority in past narratives using the pluperfect
        (pretérito mais-que-perfeito — 'ela tinha saído') or simply the simple past
        with adverbs like 'ja' (already). Portuguese speakers often omit the English
        past perfect in flashback or anteriority contexts because their L1 can signal
        the same meaning with an adverb alone. This produces narratives where the
        sequence of events is ambiguous.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: ''I arrive at home and turned on the TV.'' Correct: ''I arrived at home
      and turned on the TV.'''
    - 'Wrong: ''I have visited Paris last summer.'' Correct: ''I visited Paris last
      summer.'''
    - 'Wrong: ''When I arrived, she already left.'' Correct: ''When I arrived, she
      had already left.'''
    why_it_happens: Portuguese and English have fundamentally different tense-aspect
      systems for narration. (1) Portuguese uses the historical present freely — speakers
      shift from past to present tense mid-narrative for vividness. English reserves
      this for stylistic effect and it is not the default. (2) Portuguese compound
      past ('tem + past participle') expresses habitual or experiential meaning and
      is not restricted by definite past-time markers. English present perfect is
      incompatible with definite past-time adverbs ('last year,' 'yesterday'). (3)
      Portuguese can signal anteriority in past contexts with adverbs alone ('ja'
      = already), making the past perfect optional. English requires past perfect
      to clarify the sequence of two past events. These three systemic differences
      combine to make narrative tense usage one of the most persistent challenge areas
      for Portuguese-speaking learners of English.
    teacher_tips:
      how_to_explain: 'Start by showing a short narrative in English written entirely
        in past tense. Then show the same narrative with random present-tense switches
        and ask students why it sounds wrong. For present perfect vs. simple past,
        draw a timeline showing that ''last year'' = finished time = simple past.
        For past perfect, use two-event timelines: ''She left BEFORE I arrived'' =
        she had left.'
      where_to_start: Begin with consistent past tense in simple narratives. Then
        introduce present perfect vs. simple past with time markers. Finally add past
        perfect for flashbacks.
      sequencing: 'Week 1: Consistent past tense in narratives (no historical present).
        Week 2: Present perfect vs. simple past — definite vs. indefinite time. Week
        3: Past perfect for anterior events and flashbacks. Week 4: Full narrative
        writing with all three tense choices. Week 5: Editing and peer review.'
      exercises:
      - name: Narrative Consistency Drill
        type: error-correction
        description: Provide 10 short narratives with inconsistent tense shifts (historical
          present transfers). Students identify each shift and rewrite the entire
          narrative in consistent past tense.
        duration: 15
      - name: Present Perfect vs Simple Past Sort
        type: fill-in-the-blank
        description: Provide 20 sentences with time markers (last year, yesterday,
          already, since 2020, ever, never). Students choose between present perfect
          and simple past, justifying their choice based on the time marker.
        duration: 15
      - name: Past Perfect Flashback Builder
        type: sentence-combination
        description: Give 10 pairs of simple past sentences showing two past events.
          Students combine them using past perfect for the earlier event and add sequencing
          words (before, after, by the time, when).
        duration: 15
