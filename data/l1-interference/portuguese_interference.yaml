  information_packaging:
    interference_patterns:
    - pattern: Fronting new information instead of using English end-focus
      example_portuguese: Um livro eu comprei ontem.
      example_gloss: A book I bought yesterday.
      example_wrong: A book I bought yesterday.
      example_correct: I bought a book yesterday.
      explanation: Portuguese allows flexible word order and routinely fronts focused
        constituents (Um livro eu comprei ontem = A book I bought yesterday). English
        strongly prefers SVO order and places new information at the end (end-focus).
        Portuguese speakers transfer the fronting strategy, producing sentences like
        'A book I bought yesterday' instead of 'I bought a book yesterday.' This is
        one of the most frequent word-order transfers documented for Portuguese ESL
        learners (Swan & Smith 2001).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of cleft constructions where English requires them for focus
      example_portuguese: Foi o João que quebrou a janela.
      example_gloss: It was Joao that broke the window.
      example_wrong: Joao broke the window. (when the identity of the breaker is the
        new/focused information)
      example_correct: It was Joao that broke the window.
      explanation: Portuguese uses the é que cleft construction (Foi o João que... =
        It was Joao that...) to mark focus on a specific constituent. English has
        equivalent cleft structures (It-clefts, wh-clefts) but Portuguese speakers
        often underuse them because the Portuguese é que pattern is more colloquial
        and pervasive, making it feel redundant. Conversely, Portuguese speakers may
        produce non-cleft sentences when English pragmatically requires a cleft for
        contrastive focus, leading to pragmatically flat discourse (Swan & Smith 2001;
        Azevedo 1996).
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Overuse of passive voice as a focus strategy
      example_portuguese: A janela foi quebrada pelo Joao.
      example_gloss: The window was broken by Joao.
      example_wrong: The window was broken by Joao. (when active voice with end-focus
        would be more natural)
      example_correct: Joao broke the window.
      explanation: Portuguese uses passive voice more freely than English as an
        information-packaging device. Portuguese speakers may overuse English passives
        to front the patient/topic, producing sentences that are grammatically correct
        but pragmatically marked. English prefers active voice with end-focus for
        most communicative contexts. This overuse of passives is documented in
        contrastive analyses of Portuguese-English information structure (Azevedo 1996).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: A book I bought yesterday. Correct: I bought a book yesterday.'
    - 'Wrong: The window was broken by Joao. Correct: Joao broke the window.'
    - 'Wrong: Joao broke the window. (as an answer to ''Who broke the window?'') Correct:
      It was Joao that broke the window.'
    - 'Wrong: An interesting book I read last week. Correct: I read an interesting
      book last week.'
    why_it_happens: Portuguese is a pro-drop language with relatively flexible word
      order that allows speakers to front focused or topicalized constituents freely
      (Um livro eu comprei ontem = A book I bought yesterday). English, by contrast,
      has rigid SVO order and relies on prosody, cleft constructions (It was X that...,
      What happened was...), and passive voice to manage information flow. The Portuguese
      é que cleft (Foi o João que...) is far more colloquial and frequent than English
      It-clefts, leading Portuguese speakers to underuse English clefts in contexts
      requiring contrastive focus. Additionally, Portuguese uses passive voice more
      freely as a topic-fronting device, leading to overuse of English passives.
      These differences in information structure are among the most documented L1
      transfer patterns for Portuguese ESL learners (Swan & Smith 2001; Azevedo 1996;
      Parrott 2000).
    teacher_tips:
      how_to_explain: >-
        Teach the end-focus principle: English puts known information first and new
        information last. "I bought a book yesterday" (not "A book I bought yesterday").
        For contrastive focus, teach clefts: "It was Joao that broke the window" (not
        just "Joao broke the window" when answering "Who broke the window?"). Show that
        English passives are for when the doer is unknown or unimportant, not as a
        default focus strategy.
      where_to_start: >-
        Begin with the end-focus principle using simple SVO sentences. Show that English
        word order is rigid and new information goes at the end. Then introduce It-clefts
        for contrastive focus. Finally, address passive overuse.
      sequencing: 'Week 1: End-focus principle (SVO, new info last). Week 2: It-clefts
        for contrastive focus (It was X that...). Week 3: Wh-clefts (What happened
        was...). Week 4: Passive voice — when to use and when to avoid. Week 5: Mixed
        practice with all strategies.'
      exercises:
      - name: End-Focus Rearrangement
        type: sentence-rewrite
        description: >-
          Provide 15 Portuguese sentences with fronted focus constituents. Students
          must rewrite each into natural English using correct end-focus word order.
          Example: ''Um livro eu comprei ontem'' → ''I bought a book yesterday.''
        duration: 15
      - name: Cleft Construction Practice
        type: transformation
        description: >-
          Give 10 questions and answers. Students must rewrite each answer using an
          It-cleft for contrastive focus. Example: Q: ''Who broke the window?'' A:
          ''Joao broke the window.'' → ''It was Joao that broke the window.''
        duration: 15
      - name: Passive or Active Decision
        type: categorization
        description: >-
          Provide 20 sentences (10 active, 10 passive). Students must decide whether
          each sentence is pragmatically appropriate in the given context. For inappropriate
          passives, students rewrite in active voice with correct end-focus.
        duration: 20
      - name: Information Packaging in Discourse
        type: discourse-completion
        description: >-
          Give 5 short dialogues with missing turns. Students must write the missing
          turn using appropriate information packaging (end-focus, cleft, or passive)
          based on the discourse context. Each turn requires a different strategy.
        duration: 20
