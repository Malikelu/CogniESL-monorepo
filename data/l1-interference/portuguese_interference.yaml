  subjunctive:
    interference_patterns:
    - pattern: Use of indicative where mandative subjunctive is required
      example_portuguese: E importante que ele venha.
      example_gloss: It is important that he comes.
      example_wrong: It is important that he comes.
      example_correct: It is important that he come. / It is important that he should
        come.
      explanation: Portuguese uses the subjunctive after expressions of necessity,
        doubt, and emotion. English uses the base form (mandative subjunctive) or
        "should + infinitive." Portuguese speakers transfer the indicative (present
        tense with -s) because the Portuguese subjunctive form does not map onto a
        single English structure.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of present tense after wish instead of past subjunctive
      example_portuguese: Eu queria que ele estivesse aqui.
      example_gloss: I wished that he were here.
      example_wrong: I wish he is here.
      example_correct: I wish he were here.
      explanation: Portuguese uses the imperfect subjunctive (estivesse) after "querer
        que" for hypothetical situations. English "wish" requires the past subjunctive
        ("were" for all persons) to express present unreal states. Portuguese speakers
        transfer the present tense.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Omission of were in counterfactual conditionals
      example_portuguese: Se eu fosse rico, viajaria o mundo.
      example_gloss: If I were rich, I would travel the world.
      example_wrong: If I was rich, I would travel the world.
      example_correct: If I were rich, I would travel the world.
      explanation: Portuguese uses the imperfect subjunctive (fosse) in counterfactual
        if-clauses. English formally requires "were" (past subjunctive) for all persons,
        though "was" is common in informal speech. The Portuguese subjunctive form
        fosse does not transparently map onto "were."
      frequency: 4
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: "It is important that he comes." Correct: "It is important that he come."
      (formal) / "It is important that he should come." (BrE)'
    - 'Wrong: "I wish he is here." Correct: "I wish he were here."'
    - 'Wrong: "If I was rich, I would travel." Correct: "If I were rich, I would travel."
      (formal)'
    - 'Wrong: "I suggest that she takes the exam." Correct: "I suggest that she take
      the exam."'
    - 'Wrong: "I wish I can help you." Correct: "I wish I could help you."'
    why_it_happens: 'Portuguese has a fully productive subjunctive mood with distinct
      present, imperfect, and future subjunctive forms. The subjunctive is triggered
      by expressions of necessity (e importante que), doubt (duvido que), emotion
      (lamento que), desire (quero que), and counterfactual conditionals (se + imperfect
      subjunctive). English has a much more limited subjunctive system. The mandative
      subjunctive (base form after suggest/recommend/insist) survives in formal English,
      and the past subjunctive "were" survives in counterfactual conditionals and
      "wish" clauses. Portuguese speakers face a mapping problem: their rich subjunctive
      system must be compressed into these two vestigial English structures. They
      often default to the indicative because the English subjunctive forms (base
      form, "were") are not transparently marked as subjunctive. Documented in Swan
      & Smith (2001) and Azevedo (1996).'
    teacher_tips:
      how_to_explain: 'Teach three subjunctive contexts separately. (1) Mandative:
        After SUGGEST, RECOMMEND, INSIST, DEMAND, IMPORTANT, NECESSARY use BASE verb
        (no -s). "I suggest he STUDY." (2) Wish clauses: "I wish I WERE" / "I wish
        I COULD." (3) Counterfactual if-clauses: "If I WERE you" (formal).'
      where_to_start: Begin with the mandative subjunctive (most useful in academic/professional
        English). Then teach wish clauses. Then counterfactual conditionals.
      sequencing: 'Week 1: Mandative subjunctive after suggest/recommend/insist. Week
        2: Mandative subjunctive after it is important/necessary that. Week 3: Wish
        + past subjunctive. Week 4: Counterfactual if-clauses (if I were). Week 5:
        Contrastive analysis - Portuguese subjunctive triggers vs. English equivalents.
        Week 6: Mixed practice.'
      exercises:
      - name: Mandative Subjunctive Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with expressions of suggestion, necessity,
          and demand. Students use the correct subjunctive form (base verb) or "should
          + infinitive."
        duration: 15
      - name: Wish Clause Transformation
        type: sentence-rewrite
        description: Give 10 Portuguese sentences with "queria que" + subjunctive.
          Students rewrite using "wish" + past subjunctive in English.
        duration: 15
      - name: Counterfactual Conditional Completion
        type: fill-in-the-blank
        description: Provide 10 counterfactual if-clauses. Students complete with
          "were" and the correct conditional form in the main clause.
        duration: 15
      - name: Subjunctive Error Correction
        type: error-correction
        description: Provide 15 sentences with Portuguese-influenced subjunctive errors
          (indicative where subjunctive required, "was" instead of "were," present
          tense after "wish"). Students identify and correct each error.
        duration: 20
      - name: Portuguese to English Subjunctive Translation
        type: translation
        description: Give 10 Portuguese sentences using the subjunctive mood. Students
          translate into correct English, choosing the appropriate structure (base
          form, "should," "were," or indicative).
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
