  contrast_clauses:
    interference_patterns:
    - pattern: Use of 'but' after 'although'
      example_portuguese: Embora seja dificil, eu vou tentar.
      example_gloss: Although it is difficult, I will try.
      example_wrong: Although it is difficult, but I will try.
      example_correct: Although it is difficult, I will try.
      explanation: Portuguese uses 'embora...mas' (although...but) as a paired conjunction
        structure. English never uses 'but' after 'although' because 'although' already
        carries the adversative meaning. Portuguese speakers transfer the paired structure
        directly, producing a redundant double conjunction.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'despite' with a finite clause instead of noun phrase
      example_portuguese: Apesar de ele ter chegado tarde, comecamos a reuniao.
      example_gloss: Despite he arrived late, we started the meeting.
      example_wrong: Despite he arrived late, we started the meeting.
      example_correct: Despite the fact that he arrived late, we started the meeting.
        / Although he arrived late, we started the meeting.
      explanation: Portuguese 'apesar de' can introduce a finite clause directly (apesar
        de ele ter chegado = despite he arrived). English 'despite' is a preposition
        and can only take a noun phrase or gerund, not a finite clause. When the complement
        is a clause, English requires 'despite the fact that' or 'although.' Portuguese
        speakers transfer the clause-introducing property of 'apesar de' to 'despite,'
        producing ungrammatical 'despite + subject + verb' structures.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''Although it is difficult, but I will try.'' Correct: ''Although it
      is difficult, I will try.'' OR ''It is difficult, but I will try.'''
    - 'Wrong: ''Despite he arrived late, we started.'' Correct: ''Despite the fact
      that he arrived late, we started.'' OR ''Although he arrived late, we started.'''
    why_it_happens: Portuguese has two structural properties that transfer negatively
      to English contrast clauses. First, Portuguese permits paired conjunctions — 'embora...mas'
      (although...but), 'no entanto...mas' (however...but) — because Portuguese treats
      these as a cohesive discourse unit rather than redundant. English requires a single
      connector per link. Second, Portuguese concessive prepositions like 'apesar de'
      and 'embora' can introduce finite clauses directly, but English 'despite' and
      'in spite of' are strictly prepositional and require a noun phrase or gerund.
      When the complement is a clause, English requires 'despite the fact that' or
      the conjunction 'although.' Portuguese speakers transfer both the paired-conjunction
      pattern and the clause-introducing property, producing two distinct error types
      in contrast clause construction. Both patterns are documented in contrastive
      analyses of Romance vs. Germanic conjunction systems (Swan & Smith 2001; Azevedo
      1996).
    teacher_tips:
      how_to_explain: 'Rule 1: ONE connector per link. ''Although'' OR ''but,'' never
        both. ''However'' OR ''but,'' never both. Rule 2: ''Despite'' and ''in spite
        of'' are prepositions — they need a NOUN, not a sentence. For sentences, use
        ''although'' or ''despite the fact that.'' Write on the board: ''Despite the
        rain'' (noun) vs. ''Although it rains'' (sentence).'
      where_to_start: Begin with the double-conjunction error (most frequent and most
        easily noticed). Write 'Although it is raining, but I go out' on the board
        then ask students whether this looks like English or Portuguese word order in English words.
        Then move to the despite + clause error.
      sequencing: 'Week 1: ''Although'' without ''but.'' Week 2: ''Despite + noun''
        vs. ''although + clause.'' Week 3: ''Despite the fact that'' as alternative.
        Week 4: ''Even though'' and ''in spite of.'' Week 5: Mixed error-correction
        practice.'
      exercises:
      - name: Double Conjunction Elimination
        type: error-correction
        description: 'Provide 10 sentences with ''although...but'' or ''however...but.'' Students delete the redundant conjunction and explain why it is wrong.'
        duration: 15
      - name: Despite vs Although Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'despite/in
          spite of' (with noun phrase) and 'although/even though' (with clause). Include
          items requiring 'despite the fact that' for clause complements.
        duration: 15
      - name: Contrast Clause Transformation
        type: transformation
        description: Give 10 Portuguese concessive clauses (e.g., 'Apesar de ele estar
          doente'). Students produce three correct English versions using 'although,'
          'despite + gerund,' and 'despite the fact that.'
        duration: 20
