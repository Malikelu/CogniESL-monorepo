  verb_ser_vs_estar_english: &id002
    interference_patterns:
    - pattern: Use of be for both permanent and temporary states
      example_portuguese: Ele e alto.
      example_gloss: He is tall.
      example_wrong: He is tall.
      example_correct: He is tall.
      explanation: Portuguese distinguishes ser (permanent) from estar (temporary).
        English uses be for both.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of be where get is needed for changes of state
      example_portuguese: Ele ficou cansado.
      example_gloss: He got tired.
      example_wrong: He is tired.
      example_correct: He got tired.
      explanation: Portuguese uses ficar for changes of state. English uses get (get
        tired, get angry).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of be in present progressive due to Portuguese null-copula
        in progressive constructions
      example_portuguese: Ela trabalhando agora.
      example_gloss: She working now.
      example_wrong: She working now.
      example_correct: She is working now.
      explanation: Portuguese can form progressive contexts using the gerund alone
        (ela trabalhando = she working) without an overt copula in colloquial speech.
        English requires the auxiliary be in all progressive constructions (is working,
        are running). Portuguese speakers may drop be because their L1 allows the
        gerund to stand without an auxiliary in informal registers.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of be for location where English requires be + preposition
      example_portuguese: O livro e na mesa.
      example_gloss: The book is on the table.
      example_wrong: The book is the table.
      example_correct: The book is on the table.
      explanation: Portuguese uses ser/estar for location with the preposition often
        fused in speech. Portuguese speakers may produce 'the book is the table'
        by transferring the Portuguese structure directly, omitting the preposition
        or confusing it with the article.
      frequency: 3
      persistence: 2
      communicative_impact: 3
    examples:
    - 'Wrong: He is tired. (meaning became tired) Correct: He got tired.'
    - 'Wrong: She working now. Correct: She is working now.'
    - 'Wrong: The book is the table. Correct: The book is on the table.'
    - 'Wrong: He is angry. (just became angry) Correct: He got angry.'
    why_it_happens: Portuguese has a three-way distinction for states and changes
      of state that English handles differently. SER covers permanent identity and
      characteristics (Ele e professor = He is a teacher), ESTAR covers temporary
      states and locations (Ele esta cansado = He is tired), and FICAR marks changes
      of state (Ele ficou cansado = He got tired). English collapses ser and estar
      into a single copula "be" for states, but uses "get" (not be) for changes of
      state. Portuguese speakers must learn to split their single concept (ficar)
      into a different English verb (get), which is a non-trivial restructuring.
      Additionally, Portuguese progressive constructions in colloquial speech can
      appear without an overt auxiliary (ela trabalhando = she working), leading
      to be-dropping in English. The ser/estar distinction is one of the most
      extensively documented L1 transfer patterns for Portuguese ESL learners
      (Swan & Smith 2001, Azevedo 1996, Parrott 2000).
    teacher_tips:
      how_to_explain: 'Teach: be = state, get = change of state. He is tall (permanent),
        He got tired (change). For actions happening now: always use be + -ing. She
        IS working, not "She working."'
      where_to_start: Begin with common get expressions (get tired, get angry, get
        old, get dark) contrasted with be states (be tall, be Brazilian, be a doctor).
      sequencing: 'Week 1: Be for permanent states. Week 2: Get for changes of state.
        Week 3: Be + -ing for progressive (no be-dropping). Week 4: Mixed practice
        with all three patterns.'
      exercises:
      - name: Be vs Get Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between be and get based
          on whether the sentence describes a permanent state or a change of state.
        duration: 15
      - name: Progressive Be Insertion
        type: error-correction
        description: >-
          Provide 10 sentences with missing be in progressive constructions.
          Students identify the error and insert the correct form of be (is/are/am).
          Example sentence: 'She working now.' should become 'She is working now.'
        duration: 15
      - name: Ser-Estar-Ficar Sorting
        type: categorization
        description: Give 20 Portuguese sentences using ser, estar, and ficar. Students
          sort them into three columns and then translate each into English, choosing
          be or get appropriately.
        duration: 20
    sources: &id003
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University
      Press.'
