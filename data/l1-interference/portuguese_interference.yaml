    notes: 'Portuguese has 243 GPs total. This entry covers the absolute_constructions grammar point. Two independent sources:
      contrastive teaching reference (Swan & Smith 2001) and structural linguistics reference (Azevedo 1996). Patterns cover
      (1) gerundive absolute overuse and dangling participles from pro-drop transfer, (2) past participle absolute transfer
      that sounds unnatural in English, (3) subject-drop transfer creating dangling modifiers. Frequency is 3 (moderate —
      occurs mainly in writing and formal speech) but persistence is 4 (high — deeply automatized from L1 pro-drop and absolute
      construction patterns).'
  absolute_constructions_advanced:
    interference_patterns:
    - Portuguese uses the personal infinitive (infinitivo pessoal/flexionado) in adverbial clauses that function like absolute
      constructions, a structure that does not exist in English. Portuguese speakers transfer this pattern, producing errors
      like "Before to leave, he locked all the doors" (from Portuguese "Antes de sair, ele trancou todas as portas" where
      the infinitive can be inflected as in "Antes de sairmos, trancamos"), "For to understand this, you need to study more"
      (from "Para entender isto, precisa estudar mais" -> "Para nós entendermos isto"), and "After to finish the work, they
      went home" (from "Depois de terminarem o trabalho, foram embora"). The Portuguese personal infinitive allows the adverbial
      clause to have its own explicit subject different from the main clause subject ("Antes de nós sairmos, ele chegou"),
      which has no direct English equivalent and leads to ungrammatical transfers like "Before we to leave, he arrived."
    - Portuguese compound participial absolutes with passive or perfect-passive meaning ("Tendo sido feito o trabalho, saímos"
      / "Having been done the work, we left") are highly productive in formal Portuguese but are ungrammatical or extremely
      unnatural in English. Portuguese speakers produce sentences like "Having been finished the project, the team celebrated"
      or "Having been discussed the matter, a decision was made" where English requires a finite subordinate clause - "After
      the project had been finished, the team celebrated" or "After the matter had been discussed, a decision was made." The
      error is particularly persistent because the Portuguese compound passive absolute is a standard formal register construction
      taught in schools and used in academic writing.
    - Portuguese allows explicit subjects in absolute constructions ("Tendo ele chegado, começamos" / "Having he arrived,
      we started"), which transfers to ungrammatical English with a finite-clause word order inside a participial structure.
      Errors include "Having he arrived, we started the meeting" (from "Tendo ele chegado, começamos a reunião"), "Being the
      weather bad, we canceled the trip" (from "Sendo o tempo ruim, cancelamos a viagem"), and "Having the students finished
      the test, the teacher collected the papers" (from "Tendo os alunos terminado a prova, o professor recolheu as folhas").
      English nominative absolutes with explicit subjects ("He having arrived, we started") are archaic/rare and most English
      speakers find them unnatural, so the Portuguese pattern produces communicatively marked output.
    why_it_happens: Portuguese has three advanced absolute construction mechanisms that have no direct English equivalent
      - (1) the personal infinitive (infinitivo pessoal) which allows inflected infinitive clauses with their own subject
      to function as adverbial adjuncts, (2) compound passive participial absolutes (tendo sido + past participle) that are
      standard in formal Portuguese but ungrammatical in English, and (3) explicit-subject absolute constructions where the
      subject of the absolute clause is overtly expressed and can differ from the main clause subject. English lacks all three
      mechanisms. English adverbial clauses require finite verbs (before he left, after they had finished), English passive
      absolutes are not productive, and English nominative absolutes with explicit subjects are archaic. Portuguese speakers
      transfer these deeply automatized L1 structures, especially in formal and academic writing where the Portuguese patterns
      are most frequent. The errors persist because the Portuguese structures are explicitly taught in schools and are markers
      of educated writing in Portuguese, making learners reluctant to abandon them.
    teacher_tips:
      how_to_explain: 'Use a three-layer contrastive chart for each of the three advanced patterns: (1) Portuguese personal
        infinitive clause → Literal English transfer (wrong) → Correct English finite clause with before/after/since + subject
        + verb. (2) Portuguese compound passive absolute → Literal English transfer (wrong) → Correct English after-clause
        with passive perfect. (3) Portuguese explicit-subject absolute → Literal English transfer (wrong) → Correct English
        finite clause or (if the student insists on the absolute) the archaic English nominative absolute. Emphasize that
        all three Portuguese structures are grammatically correct and even prestigious in Portuguese but are ungrammatical
        or unnatural in English. The key teaching point: when you see a Portuguese adverbial clause with an infinitive or
        a participial absolute, the English equivalent almost always requires a finite clause with an explicit subject.'
      where_to_start: Start with the personal infinitive pattern since it is the most frequent and the most visibly ungrammatical
        in English. Show students 5 Portuguese sentences with infinitivo pessoal and have them identify why the literal English
        translation sounds wrong. Then move to compound passive absolutes, which are subtler. Finally, address explicit-subject
        absolutes, which are the most formal and the least likely to appear in everyday English.
      exercises:
      - name: Personal infinitive identification and repair
        type: error-correction
        description: Provide 15 English sentences with personal infinitive transfer errors (e.g. "Before to leave, he locked
          the doors", "For to understand this, you need to study", "After to finish the work, they went home", "Without to
          know the answer, she raised her hand"). Students identify the error type, explain why it is wrong (Portuguese infinitive
          where English requires finite clause), and rewrite each sentence correctly using before/after/without + subject
          + verb.
        duration: 20
      - name: Compound passive absolute repair
        type: error-correction
        description: Provide 12 sentences with compound passive absolute transfer errors (e.g. "Having been finished the project,
          the team celebrated", "Having been discussed the matter, a decision was made", "Having been completed the course,
          certificates were awarded"). Students rewrite each using a correct English finite clause (after the project had
          been finished, after the matter had been discussed). Discuss why the Portuguese structure is correct in Portuguese
          but wrong in English.
        duration: 20
      - name: Explicit-subject absolute transformation
        type: practice
        description: 'Give students 10 Portuguese sentences with explicit-subject absolute constructions (e.g. "Tendo ele
          chegado, começamos", "Sendo o tempo ruim, cancelamos", "Tendo os alunos terminado a prova, o professor recolheu
          as folhas"). For each, students write: (A) the literal English transfer (to see why it is wrong), (B) the correct
          English finite clause version, and (C) — for discussion only — the archaic English nominative absolute (e.g. "He
          having arrived, we started"). Discuss why (C) is grammatically possible but communicatively marked.'
        duration: 20
      - name: Portuguese-to-English advanced translation
        type: drill
        description: Give students a short Portuguese academic text (200 words) rich in all three advanced absolute construction
          types. Students translate it into natural English, consciously converting every absolute construction to a finite
          adverbial clause. Then they exchange translations and check for any remaining Portuguese-style absolutes.
        duration: 25
      - name: Error classification — basic vs. advanced absolute errors
        type: practice
        description: Provide 20 sentences with a mix of basic absolute construction errors (dangling participles, past participle
          absolutes) and advanced errors (personal infinitive transfer, compound passive absolutes, explicit-subject absolutes).
          Students classify each error type and correct it. This exercise bridges the basic absolute_constructions entry with
          the advanced patterns, helping students see the full spectrum of Portuguese-to-English absolute construction transfer.
        duration: 20
    examples:
    - 'Wrong: ''Before to leave, he locked all the doors.'' (Portuguese: ''Antes de sair, ele trancou todas as portas.'' —
      personal infinitive in adverbial clause) Correct: ''Before he left, he locked all the doors.'' / ''Before leaving, he
      locked all the doors.'''
    - 'Wrong: ''For to understand this, you need to study more.'' (Portuguese: ''Para entender isto, precisa estudar mais.''
      → ''Para nós entendermos isto, precisamos estudar mais.'' — personal infinitive with explicit subject) Correct: ''To
      understand this, you need to study more.'' / ''In order to understand this, you need to study more.'''
    - 'Wrong: ''Having been finished the project, the team celebrated.'' (Portuguese: ''Tendo sido terminado o projeto, a
      equipe comemorou.'' — compound passive absolute) Correct: ''After the project had been finished, the team celebrated.''
      / ''After finishing the project, the team celebrated.'''
    - 'Wrong: ''Having he arrived, we started the meeting.'' (Portuguese: ''Tendo ele chegado, começamos a reunião.'' — explicit-subject
      absolute) Correct: ''After he arrived, we started the meeting.'' / ''When he arrived, we started the meeting.'' (Archaic
      alternative: ''He having arrived, we started the meeting.'')'
    - 'Wrong: ''Without to know the answer, she raised her hand.'' (Portuguese: ''Sem saber a resposta, ela levantou a mão.''
      — but with personal infinitive: ''Sem ela saber a resposta, levantou a mão'') Correct: ''Without knowing the answer,
      she raised her hand.'' / ''Although she did not know the answer, she raised her hand.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference and Other Problems. Cambridge University
      Press. (Portuguese chapter — documents structural transfer errors including participial construction overuse, dangling
      modifiers from pro-drop transfer, and register mismatches in absolute construction usage).'
    - 'Azevedo, M. (1996). Portuguese: A Linguistic Introduction. Cambridge University Press. (Chapter on adverbial clauses
      and absolute constructions — describes the Portuguese gerundive, participial, and infinitive absolute construction system
      and its productivity, including the personal infinitive and compound passive absolutes, explaining the structural basis
      for L1 transfer to English participial clauses).'
    - 'Squartini, M. (1998). Verbal periphrases in Romance: Aspect, actionality, and grammaticalization. Mouton de Gruyter.
      (Chapter on Portuguese compound participial constructions and their aspectual properties, providing the contrastive
      basis for understanding why Portuguese speakers overuse compound passive absolutes in English).'
