  may_might_probability:
    interference_patterns:
    - pattern: Use of 'may' for weak possibility where 'might' is more appropriate
      example_portuguese: Talvez ele venha.
      example_gloss: Maybe he comes.
      example_wrong: He may come.
      example_correct: He might come.
      explanation: Portuguese 'talvez' covers the range of both 'may' and 'might.'
        English uses 'might' for weaker possibility than 'may.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Omission of 'may/might' in purpose clauses requiring modal verbs
      example_portuguese: Eu estudo para que eu possa passar.
      example_gloss: I study so that I can pass.
      example_wrong: I study so that I pass.
      example_correct: I study so that I may/might pass.
      explanation: Portuguese uses 'para que' with the subjunctive to express purpose
        (para que eu possa = so that I can/may). English purpose clauses with 'so
        that' typically require a modal verb ('may,' 'might,' 'can,' 'could'). Portuguese
        speakers may omit the modal in English because the subjunctive in Portuguese
        already conveys the intended meaning without an additional modal marker.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''He may come.'' (weak possibility) Correct: ''He might come.'''
    - 'Wrong: ''I study so that I pass.'' Correct: ''I study so that I may pass.'''
    why_it_happens: Portuguese 'talvez' (maybe) covers the range of both English 'may'
      and 'might.' English uses 'may' for stronger possibility and 'might' for weaker
      possibility. Portuguese speakers may overuse 'may.' Additionally, Portuguese
      purpose clauses use 'para que' with the subjunctive mood, which inherently conveys
      possibility without requiring a separate modal verb. English purpose clauses
      with 'so that' require an explicit modal ('may,' 'might,' 'can,' 'could'). Portuguese
      speakers transfer the bare subjunctive structure and omit the modal.
    teacher_tips:
      how_to_explain: 'Teach the probability scale: ''will'' (100%), ''may'' (50-70%),
        ''might'' (30-50%), ''will not'' (0%). Portuguese ''talvez'' covers the middle
        range. For purpose clauses, show that English ''so that'' needs a modal verb
        after it: ''so that I may/can/might.'' Portuguese ''para que'' does not need
        one because the subjunctive already carries that meaning.'
      where_to_start: 'Begin with ''might'' for uncertain future events: ''It might
        rain tomorrow.'' Then introduce purpose clauses: ''I study so that I may pass.'''
      sequencing: 'Week 1: ''May'' and ''might'' for possibility. Week 2: ''May''
        for permission. Week 3: ''Might'' for weak possibility. Week 4: Purpose clauses
        with ''so that + may/might.'' Week 5: Mixed practice.'
      exercises:
      - name: May vs Might Drill
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'may'
          and 'might.'
        duration: 15
      - name: Purpose Clause Modal Insertion
        type: fill-in-the-blank
        description: Provide 10 purpose clauses without modals. Students insert the
          appropriate modal (may, might, can, could) after 'so that.'
        duration: 15
