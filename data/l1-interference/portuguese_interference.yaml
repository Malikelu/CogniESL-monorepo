  question_forms: *id005
  question_tags: &id006
    interference_patterns:
    - pattern: Use of 'ne' or 'right' as universal question tags
      example_portuguese: Voce gosta de cafe, ne?
      example_gloss: You like coffee, right?
      example_wrong: You like coffee, ne?
      example_correct: You like coffee, don't you?
      explanation: Portuguese uses 'ne' (from 'nao e?') as a universal question tag
        that works with any sentence regardless of verb type, tense, or polarity.
        English requires specific tags that match the auxiliary, tense, and polarity
        of the main clause. Portuguese speakers transfer 'ne' directly as 'right'
        or 'ne' in English, producing non-standard tags.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of 'isn't it?' as a default tag for all sentences
      example_portuguese: Eles chegaram ontem, ne?
      example_gloss: They arrived yesterday, right?
      example_wrong: They arrived yesterday, isn't it?
      example_correct: They arrived yesterday, didn't they?
      explanation: Because Portuguese has a single universal tag ('ne?'), Portuguese
        speakers often select one English tag - typically 'isn't it?' - and apply
        it to all sentences regardless of the subject, verb, or tense. This overgeneralization
        reflects the L1 strategy of using one invariant tag form. Azevedo (1996)
        notes that Portuguese 'ne?' is syntactically invariant and does not change
        based on the main clause verb, leading learners to treat English tags
        similarly.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Omission of question tags in conversational English
      example_portuguese: Voce ja comeu, ne?
      example_gloss: You already ate, right?
      example_wrong: You already ate?
      example_correct: You have already eaten, haven't you?
      explanation: Portuguese can convey tag-question meaning through intonation
        alone without an explicit tag word. Portuguese speakers may drop the
        English tag entirely and rely on rising intonation, producing a declarative
        sentence with question intonation rather than a grammatically complete
        tag question. Swan & Smith (2001) identify this as a common strategy
        among Portuguese learners who find the English tag system unnecessarily
        complex.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: You like coffee, ne? Correct: You like coffee, don''t you?'
    - 'Wrong: They arrived yesterday, isn''t it? Correct: They arrived yesterday, didn''t they?'
    - 'Wrong: She is a doctor, right? (as invariant tag) Correct: She is a doctor, isn''t she?'
    - 'Wrong: You already ate? (no tag) Correct: You have already eaten, haven''t you?'
    why_it_happens: Portuguese uses 'ne?' (a contraction of 'nao e?') as a single
      invariant question tag that works with any verb, tense, subject, or polarity.
      Unlike English, which requires the tag to mirror the auxiliary and invert
      the polarity of the main clause (positive statement -> negative tag, negative
      statement -> positive tag), Portuguese 'ne?' never changes form. This creates
      three distinct error patterns in English. First, learners transfer 'ne' directly
      as 'right' or even leave it as 'ne' in English. Second, they overgeneralize
      one English tag (usually 'isn't it?') to all contexts, mirroring the L1
      invariant-tag strategy. Third, because Portuguese can express tag-like meaning
      through intonation alone, learners sometimes omit the tag entirely. Azevedo
      (1996) documents that Portuguese tag questions are prosodically rather than
      syntactically marked, and Swan & Smith (2001) identify tag question errors
      as among the most persistent for Portuguese learners because the L1 system
      is fundamentally different in its architecture.
    teacher_tips:
      how_to_explain: 'Write three Portuguese sentences with ne? on the board:
        Voce gosta de cafe, ne? / Eles chegaram ontem, ne? / Ela e medica, ne?
        Show that ne? never changes. Then write the English equivalents and show
        that EVERY element changes: auxiliary (do/does/did/is/have), pronoun
        (you/they/she), and polarity (positive->negative). Use a table: Statement
        -> Tag. You like coffee -> don''t you? She is a doctor -> isn''t she?
        They arrived -> didn''t they? Emphasize: English tags are like mirrors
        - they reflect the auxiliary and flip the polarity.'
      where_to_start: Begin with 'be' tags (isn't it? aren't you? is he? are they?)
        since these are the most common. Then move to 'do/does/did' tags. Finally,
        introduce have/modal tags.
      sequencing: 'Week 1: Tags with be (isn''t it, aren''t you, is she). Week
        2: Tags with do/does/did. Week 3: Tags with have and modals. Week 4:
        Polarity reversal practice (positive->negative tag, negative->positive tag).
        Week 5: Mixed practice with error correction.'
      exercises:
      - name: Question Tag Drill
        type: fill-in-the-blank
        description: Provide 20 sentences. Students add the correct question tag
          based on the auxiliary, subject, and polarity of the main clause.
        duration: 15
      - name: Tag Matching
        type: matching
        description: Give 15 main clauses and 15 question tags as separate cards.
          Students match each clause to its correct tag, paying attention to
          auxiliary, pronoun, and polarity.
        duration: 10
      - name: Portuguese to English Tag Translation
        type: translation
        description: Give 10 Portuguese sentences using ne? Students translate
          into English with the grammatically correct question tag (not right or ne).
        duration: 15
      - name: Error Correction - Invariant Tag Overuse
        type: error-correction
        description: Provide 10 sentences where isn''t it? has been incorrectly
          used as a universal tag. Students identify the error and write the
          correct tag.
        duration: 10
