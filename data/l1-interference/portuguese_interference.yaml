  prepositions_of_movement:
    interference_patterns:
    - pattern: Use of 'para' where English uses 'to'
      example_portuguese: Eu vou para a escola.
      example_gloss: I go to the school.
      example_wrong: I go to the school.
      example_correct: I go to school.
      explanation: Portuguese 'para' expresses direction. English uses 'to.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of 'em' where English uses 'into'
      example_portuguese: Eu entrei na sala.
      example_gloss: I entered in-the room.
      example_wrong: I entered in the room.
      example_correct: I entered the room. / I went into the room.
      explanation: Portuguese 'em' (in) is used for both location and movement. English
        distinguishes 'in' (location) from 'into' (movement).
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I entered in the room.'' Correct: ''I entered the room.'' / ''I went
      into the room.'''
    - 'Wrong: ''I walked in the park.'' (movement) Correct: ''I walked into the park.'''
    why_it_happens: 'Portuguese uses ''em'' for both location and movement. English
      distinguishes: ''in/at'' (location) vs. ''into/onto'' (movement). Portuguese
