  could:
    interference_patterns:
    - pattern: Use of 'could' for present ability where 'can' is needed
      example_portuguese: Eu podia nadar.
      example_gloss: I could swim.
      example_wrong: I could swim.
      example_correct: I can swim.
      explanation: Portuguese 'poder' in the imperfect (podia) can express past or
        conditional ability. English distinguishes 'can' (present) from 'could' (past/conditional).
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'could' for polite requests where 'can' or 'would' is more natural
      example_portuguese: Podia me ajudar?
      example_gloss: Could me help?
      example_wrong: Could you help me?
      example_correct: Can you help me? / Would you help me?
      explanation: Portuguese 'poder' in the imperfect (podia) is the standard form
        for polite requests (Podia me ajudar? = Could you help me?). English uses
        'can' for informal polite requests and 'would' for formal ones. 'Could' in
        requests implies conditional willingness, making it less direct. Portuguese
        speakers transfer the imperfect-as-polite-request pattern directly, producing
        'Could you help me?' when 'Can you help me?' or 'Would you help me?' is more
        appropriate.
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''I could swim.'' (present ability) Correct: ''I can swim.'''
    - 'Wrong: ''Could you help me?'' (informal request) Correct: ''Can you help me?'''
    - 'Wrong: ''Could you open the window?'' (formal request) Correct: ''Would you
      open the window?'''
    why_it_happens: Portuguese 'poder' in the imperfect (podia) serves multiple functions
      that English splits across different modals. It can express past ability (Eu
      podia nadar = I could swim), conditional ability (Eu podia ir = I could go),
      and polite requests (Podia me ajudar? = Could you help me?). English uses 'can'
      for present ability, 'could' for past ability and conditional, and 'can/would'
      for polite requests. Portuguese speakers overuse 'could' because the Portuguese
      imperfect form maps onto all three English functions. The polite-request transfer
      is particularly persistent because Portuguese learners perceive 'could' as more
      polite than 'can,' mirroring the Portuguese imperfect's inherent politeness
      function.
    teacher_tips:
      how_to_explain: Teach can = present ability, could = past ability or conditional.
        I can swim (now) vs. I could swim (when I was young). For requests, use Can
        you help me? for informal and Would you help me? for formal. Could in requests
        sounds conditional.
      where_to_start: Begin with present ability sentences, then move to polite requests
        using Can for informal and Would for formal contexts.
      sequencing: 'Week 1: ''Can'' for present ability. Week 2: ''Could'' for past
        ability. Week 3: ''Could'' for conditional. Week 4: Polite requests — can
        vs. would vs. could. Week 5: Mixed practice.'
      exercises:
      - name: Can vs Could Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between 'can'
          and 'could' for ability contexts.
        duration: 15
      - name: Polite Request Modal Choice
        type: fill-in-the-blank
        description: Provide 10 request scenarios at different formality levels. Students
          choose between 'can,' 'could,' and 'would' for each context.
        duration: 15
