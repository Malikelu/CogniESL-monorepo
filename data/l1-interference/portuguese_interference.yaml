  second_conditional:
    interference_patterns:
    - pattern: Use of present tense in hypothetical conditionals
      example_portuguese: Se eu tivesse dinheiro, eu viajaria.
      example_gloss: If I had money, I would travel.
      example_wrong: If I have money, I will travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese uses the imperfect subjunctive in hypothetical conditionals.
        English uses the past simple in the if-clause and 'would' in the main clause.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of 'would' in the if-clause (transfer of Portuguese conditional)
      example_portuguese: Se eu teria dinheiro, eu viajaria.
      example_gloss: If I would have money, I would travel.
      example_wrong: If I would have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Portuguese allows the conditional form in both clauses of hypothetical
        conditionals (se eu teria... eu viajaria). English strictly prohibits 'would'
        in the if-clause of a second conditional. The if-clause must use past simple
        (had), while only the main clause uses 'would.' Portuguese speakers transfer
        the double-conditional structure directly, producing 'If I would have...'
        which is a well-documented error in Portuguese learner English.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Use of 'was' instead of 'were' for all persons in if-clause
      example_portuguese: Se eu fosse rico, eu viajaria.
      example_gloss: If I were rich, I would travel.
      example_wrong: If I was rich, I would travel.
      example_correct: If I were rich, I would travel.
      explanation: Portuguese uses 'fosse' (imperfect subjunctive of 'ser') for all
        persons in hypothetical conditionals, which maps naturally to English. However,
        English requires the subjunctive 'were' for all persons (If I were, If she
        were), while Portuguese speakers may use 'was' by analogy with regular past
        tense forms. This error is compounded by the fact that 'was' is widely accepted
        in informal spoken English, making it harder for Portuguese learners to recognize
        as non-standard in formal writing.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''If I have money, I will travel.'' (hypothetical) Correct: ''If I had
      money, I would travel.'''
    - 'Wrong: ''If I would have time, I would travel.'' Correct: ''If I had time,
      I would travel.'''
    - 'Wrong: ''If she was here, she would help.'' Correct: ''If she were here, she
      would help.'''
    why_it_happens: Portuguese uses the imperfect subjunctive (tivesse, fosse) in
      hypothetical conditionals. English uses the past simple (had) in the if-clause
      and 'would' in the main clause. This is one of the most important conditional
      structures. Additionally, Portuguese allows the conditional form in both clauses
      (se eu teria... eu viajaria), which leads to the transfer error 'If I would
      have...' in English. The subjunctive 'were' for all persons in English also
      poses difficulty since Portuguese 'fosse' does not distinguish between 'was'
      and 'were' forms.
    teacher_tips:
      how_to_explain: 'Teach the second conditional: ''If I had..., I would...'' for
        hypothetical situations. The past tense does not refer to the past; it refers
        to an unreal present/future. Emphasize: NEVER use ''would'' in the if-clause.
        Also teach ''were'' for all persons: ''If I were..., If she were...'''
      where_to_start: 'Begin with simple hypotheticals: ''If I had a million dollars,
        I would travel the world.'' Then introduce ''were'': ''If I were you, I would
        study harder.'''
      sequencing: 'Week 1: Second conditional structure (If + past, would + base).
        Week 2: Hypothetical vs. real conditions. Week 3: ''Were'' for all persons.
        Week 4: Error correction focusing on ''would'' in the if-clause. Week 5: Mixed
        practice.'
      exercises:
      - name: Second Conditional Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students use the second conditional.
        duration: 15
      - name: Would in the If-Clause Error Correction
        type: error-correction
        description: Provide 10 sentences with 'would' incorrectly placed in the if-clause.
          Students identify the error and rewrite using past simple in the if-clause.
        duration: 15
      - name: Were vs. Was Subjunctive Practice
        type: sentence-rewrite
        description: Give 10 sentences with 'was' in hypothetical if-clauses. Students
          rewrite using 'were' for all persons.
        duration: 10
      - name: Portuguese to English Conditional Translation
        type: translation
        description: Provide 10 Portuguese hypothetical conditional sentences. Students
          translate into correct English second conditional, avoiding 'would' in the
          if-clause.
        duration: 20
