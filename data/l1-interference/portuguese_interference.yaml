  question_formation: &id005
    interference_patterns:
    - pattern: Omission of do/does in yes/no questions
      example_portuguese: Voce gosta de cafe?
      example_gloss: You like coffee?
      example_wrong: You like coffee?
      example_correct: Do you like coffee?
      explanation: Portuguese forms yes/no questions by intonation alone with no
        auxiliary verb or subject-verb inversion (Voce gosta? = You like?). English
        requires do/does insertion and subject-auxiliary inversion for questions
        with lexical verbs. Portuguese speakers omit do/does because their L1
        marks interrogative mood prosodically rather than syntactically.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Omission of do/does in wh-questions
      example_portuguese: O que voce quer?
      example_gloss: What you want?
      example_wrong: What you want?
      example_correct: What do you want?
      explanation: Portuguese wh-questions place the question word at the beginning
        but keep standard SVO word order (O que voce quer? = What you want?).
        English requires both wh-fronting AND do/does insertion with subject-auxiliary
        inversion. Portuguese speakers produce "What you want?" instead of "What
        do you want?" because Portuguese does not require an auxiliary in wh-questions.
        This error is particularly persistent because the wh-word at the beginning
        gives the sentence a question-like feel, masking the missing auxiliary.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: You like coffee? Correct: Do you like coffee?'
    - 'Wrong: What you want? Correct: What do you want?'
    - 'Wrong: Where she lives? Correct: Where does she live?'
    - 'Wrong: When they arrived? Correct: When did they arrive?'
    why_it_happens: Portuguese is a null-subject language (pro-drop) that forms
      questions purely through intonation, without requiring auxiliary verbs or
      subject-verb inversion. The interrogative mood is signaled by rising
      intonation alone (Voce gosta de cafe? = You like coffee?). English, by
      contrast, requires do-support (insertion of do/does/did) and
      subject-auxiliary inversion for all questions with lexical verbs. This
      fundamental typological difference means Portuguese speakers must learn an
      entirely new syntactic mechanism (do-support) that has no equivalent in
      their L1. The error persists because (1) the intonation pattern is sufficient
      for communication in Portuguese, making the auxiliary feel redundant, and
      (2) in wh-questions, the fronted wh-word creates a false sense of
      completeness ("What you want?" feels like a question even without do).
      Azevedo (1996) documents that Portuguese interrogatives are distinguished
      from declaratives solely by prosodic contour, with no syntactic rearrangement.
      Swan & Smith (2001) identify do-support omission as the single most frequent
      error for Portuguese learners across all proficiency levels.
    teacher_tips:
      how_to_explain: 'Write a Portuguese question on the board: Voce gosta de
        cafe? Below it, write the literal English: You like coffee? Ask: "Is
        this a question in English? It needs HELP. The helper is DO." Write:
        DO you like coffee? Emphasize: "Normal verbs cannot ask questions alone.
        They need DO or DOES." For wh-questions, show that TWO things happen:
        (1) the question word goes first, (2) DO/DOES still comes before the
        subject. What DO you want? Not "What you want?"'
      where_to_start: Begin with yes/no questions using Do you...? and Does
        he/she...? Drill until automatic. Then introduce wh-questions, emphasizing
        that do/does is still required even with a question word.
      sequencing: 'Week 1: Do/Does in yes/no questions. Week 2: Do/Does in
        wh-questions. Week 3: Past tense did in questions. Week 4: Questions
        with be and modals (no do-support needed — contrast with lexical verbs).
        Week 5: Mixed practice and error correction.'
      exercises:
      - name: Do/Does Insertion Drill
        type: fill-in-the-blank
        description: Provide 20 statements. Students must form questions by
          adding Do/Does/Did and adjusting word order. Include both yes/no and
          wh-questions.
        duration: 15
      - name: Portuguese to English Question Translation
        type: translation
        description: Give 15 Portuguese questions (intonation-only). Students
          translate into grammatically correct English questions, inserting
          do/does/did where needed.
        duration: 15
      - name: Error Correction — Missing Auxiliary
        type: error-correction
        description: Provide a dialogue with 12 questions missing do/does/did.
          Students identify each error and rewrite the question correctly.
        duration: 15
      - name: Question Formation from Answers
        type: transformation
        description: Give 10 answers (e.g., "She lives in Sao Paulo"). Students
          must form the correct question for each ("Where does she live?").
        duration: 10
