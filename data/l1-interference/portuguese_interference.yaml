  and_but_or_so:
    interference_patterns:
    - pattern: Use of 'and' where 'but' is needed for contrast
      example_portuguese: Eu quero ir, mas nao posso.
      example_gloss: I want to go, and I cannot.
      example_wrong: I want to go and I cannot.
      example_correct: I want to go but I cannot.
      explanation: Portuguese 'mas' (but) expresses contrast. English 'but' is the
        equivalent. Portuguese speakers may use 'and' where English requires 'but.'
        Portuguese 'e' (and) is the default conjunction and is overused as a general
        connector, leading speakers to use 'and' in contexts where English requires
        the contrastive 'but.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'because' where 'so' is needed for result (reversed cause-effect)
      example_portuguese: Eu fiquei em casa porque choveu.
      example_gloss: I stayed home because rained.
      example_wrong: "I stayed home because it rained. (intended: It rained, so I stayed home.)"
      example_correct: It rained, so I stayed home.
      explanation: "Portuguese 'porque' (because) introduces a cause. English 'so' introduces
        a result. Portuguese speakers may use 'because' where English requires 'so'
        when the cause precedes the result. The conjunction mapping is asymmetric:
        Portuguese 'porque' = English 'because' (cause), Portuguese 'então' = English
        'so' (result). Portuguese speakers may default to 'because' for both directions
        of the causal relationship, producing 'I stayed home because it rained' when
        the intended meaning is 'It rained, so I stayed home.'"
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'and' in negative sentences where English requires 'or'
      example_portuguese: Eu nao gosto de cha ou cafe.
      example_gloss: I not like of tea or coffee.
      example_wrong: "I don't like tea and coffee. (when meaning neither)"
      example_correct: I don't like tea or coffee.
      explanation: "In English negative sentences, 'or' replaces 'and' to connect
        items: 'I don't like tea or coffee' (not 'tea and coffee'). Portuguese uses
        'ou' (or) in negatives, but Portuguese speakers may transfer the affirmative
        pattern with 'and' into English negatives because the semantic logic feels
        the same. This error is particularly common at A2-B1 levels and can cause
        ambiguity — 'I don't like tea and coffee' could be misinterpreted as 'I don't
        like them together' rather than 'I don't like either one.'"
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I want to go and I cannot.'' Correct: ''I want to go but I cannot.'''
    - 'Wrong: ''I stayed home because it rained.'' (intended result meaning) Correct:
      ''It rained, so I stayed home.'''
    - "Wrong: 'I don't like tea and coffee.' (meaning neither) Correct: 'I don't
      like tea or coffee.'"
    why_it_happens: Portuguese conjunctions (e, mas, ou, então, porque) do not always
      map directly onto English conjunctions (and, but, or, so, because). Portuguese
      'e' (and) is the default conjunction and is overused as a general connector,
      leading speakers to use 'and' where English requires 'but' (contrast) or 'or'
      (in negatives). Additionally, Portuguese 'porque' (because) and 'então' (so/then)
      cover causal relationships differently from English 'because' and 'so'. Portuguese
      speakers may use 'because' where English requires 'so' when expressing result,
      and may use 'and' in negatives where English requires 'or'. These mapping asymmetries
      are documented in contrastive analyses of Romance and Germanic conjunction systems
      (Swan & Smith, 2001; Parrott, 2000).
    teacher_tips:
      how_to_explain: "Teach the conjunctions: 'and' = addition, 'but' = contrast,
        'or' = alternative, 'so' = result, 'because' = cause. Use a 2x2 grid:
        cause (because) vs. result (so), addition (and) vs. contrast (but). For negatives,
        emphasize: 'In English negatives, use OR not AND: I don't like tea OR coffee.'"
      where_to_start: Begin with 'but' for contrast, then 'or' in negatives, then 'so'
        vs. 'because'.
      sequencing: 'Week 1: ''And'' vs. ''but.'' Week 2: ''Or'' in negatives (not ''and''). Week 3:
        ''Because'' vs. ''so.'' Week 4: Mixed practice with all four conjunctions.'
      exercises:
      - name: Conjunction Decision Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose the correct conjunction
          (and, but, or, so, because).
        duration: 15
      - name: Negative Conjunction Correction
        type: error-correction
        description: Provide 10 negative sentences where 'and' is incorrectly used
          instead of 'or.' Students identify and correct each error.
        duration: 10
      - name: Cause or Result Sort
        type: sentence-rewrite
        description: Give 10 sentence pairs. Students must identify which clause is
          the cause and which is the result, then join with 'because' or 'so' correctly.
        duration: 15
