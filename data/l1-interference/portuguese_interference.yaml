  both_either_neither:
    interference_patterns:
    - pattern: Use of 'both' with negative verb
      example_portuguese: Ambos nao vieram.
      example_gloss: Both not came.
      example_wrong: Both did not come.
      example_correct: Neither came. / Neither of them came.
      explanation: Portuguese uses 'ambos nao' (both not) for negative. English uses
        'neither' instead of 'both...not.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of 'either' with positive verb
      example_portuguese: Qualquer um dos dois e bom.
      example_gloss: Any one of-the two is good.
      example_wrong: Both are good.
      example_correct: Either is good.
      explanation: Portuguese 'qualquer um dos dois' = English 'either.' Portuguese
        speakers may use 'both' where English requires 'either.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: ''Both did not come.'' Correct: ''Neither came.'''
    - 'Wrong: ''Both are good.'' (meaning either) Correct: ''Either is good.'''
    why_it_happens: 'Portuguese ''ambos'' = English ''both,'' but the negative form
      differs: Portuguese ''ambos nao'' = English ''neither.'' Portuguese ''qualquer
      um dos dois'' = English ''either.'' Portuguese speakers may use ''both...not''
      where English requires ''neither.'''
    teacher_tips:
      how_to_explain: 'Teach: ''both'' = two positive, ''neither'' = two negative,
        ''either'' = one of two. ''Both came'' (positive), ''Neither came'' (negative),
        ''Either is good'' (one of two).'
      where_to_start: Begin with 'neither' as the negative of 'both.'
      sequencing: 'Week 1: ''Both'' (positive). Week 2: ''Neither'' (negative). Week
        3: ''Either'' (one of two). Week 4: Mixed.'
      exercises:
      - name: Both Either Neither Drill
        type: fill-in-the-blank
        description: Provide 15 sentences. Students choose between 'both,' 'either,'
          and 'neither.'
        duration: 15
      - name: Portuguese to English Contrast Drill
        type: translation
