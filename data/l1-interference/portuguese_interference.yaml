  proverbs:
    interference_patterns:
    - pattern: Literal translation of Portuguese proverbs producing unnatural English
      example_portuguese: Em terra de cego, quem tem olho e rei.
      example_gloss: In land of blind, who has eye is king.
      example_wrong: In land of blind, who has eye is king.
      example_correct: In the land of the blind, the one-eyed man is king.
      explanation: Portuguese proverbs use imagery, vocabulary, and grammatical structures
        that do not map onto English equivalents. Word-for-word translation produces
        sentences that are grammatically broken and semantically opaque to English speakers.
        Portuguese speakers are motivated to use proverbs because they are a high-status
        discourse device in Portuguese culture, but the transfer fails because proverb
        lexicons are language-specific.
      frequency: 2
      persistence: 2
      communicative_impact: 3
    - pattern: Use of Portuguese proverb structures with English words (calque)
      example_portuguese: Agua mole, pedra dura, tanto bate ate que fura.
      example_gloss: Water soft, stone hard, so many hits until it pierces.
      example_wrong: Soft water, hard stone, hits so much until it pierces.
      example_correct: Constant dripping wears away the stone. / Persistence pays off.
      explanation: Portuguese speakers may retain the syntactic frame of a Portuguese
        proverb while substituting English words, producing a calque. The result is
        comprehensible but clearly non-native and sometimes unintelligible. This occurs
        because proverbs are stored as fixed chunks in memory, and the L1 chunk is
        retrieved wholesale during speech production. The learner maps English lexical
        items onto the Portuguese syntactic-prosodic template.
      frequency: 2
      persistence: 2
      communicative_impact: 3
    - pattern: Overuse of proverbs in formal/written English where they are inappropriate
      example_portuguese: E melhor prevenir do que remediar.
      example_gloss: Is better to prevent than to remedy.
      example_wrong: As the Portuguese say, is better to prevent than to remedy, so we
        should invest in cybersecurity now.
      example_correct: It would be prudent to invest in cybersecurity now as a preventive
        measure.
      explanation: Portuguese discourse culture uses proverbs frequently in formal
        argumentation, academic writing, and professional communication as rhetorical
        devices. English academic and professional writing conventions discourage proverb
        use as it is considered informal or clichéd. Portuguese speakers transfer the
        L1 discourse convention of embedding proverbs in formal argumentation, producing
        register-inappropriate English.
      frequency: 2
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: In land of blind, who has eye is king. Correct: In the land of the blind,
      the one-eyed man is king.'
    - 'Wrong: Soft water, hard stone, hits so much until it pierces. Correct: Constant
      dripping wears away the stone.'
    - 'Wrong: As the Portuguese say, is better to prevent than to remedy, so we should
      invest now. Correct: It would be prudent to invest now as a preventive measure.'
    why_it_happens: Proverbs are culturally embedded fixed expressions that are stored
      as holistic chunks in memory. Portuguese has a rich proverb tradition (the Portuguese
      language has thousands of documented proverbs) and they are used more frequently
      in everyday discourse, formal argumentation, and written communication than in
      modern English. When Portuguese speakers encounter a situation that triggers
      a proverb in their L1, the entire Portuguese chunk is activated and transferred
      into English through literal translation (calque). Additionally, many Portuguese
      proverbs use archaic or literary vocabulary and grammatical structures (e.g.,
      subjunctive mood, inverted word order) that have no equivalent in modern English.
      The discourse function of proverbs also differs — Portuguese rhetorical tradition
      values proverb use in formal contexts, while English academic and professional
      writing considers them informal. This is a pragmatic-discourse transfer issue
      as much as a lexical one, documented in contrastive pragmatics research on Romance
      vs. Germanic discourse conventions (Celce-Murcia & Larsen-Freeman, 2015; Swan
      & Smith, 2001).
    teacher_tips:
      how_to_explain: 'Explain that every language has its own proverbs — they cannot
        be translated word-for-word. Write a Portuguese proverb on the board, ask students
        to translate it literally, then show how funny/strange it sounds in English.
        Then reveal the English equivalent. Emphasize: proverbs are like idioms —
        the meaning is not in the individual words.'
      where_to_start: 'Begin with proverbs that have close English equivalents (same
        meaning, different words). Then move to proverbs that exist only in Portuguese
        and require a completely different English expression.'
      sequencing: 'Week 1: Proverbs with direct English equivalents (same meaning,
        different imagery). Week 2: Portuguese proverbs with NO English equivalent —
        teach the meaning, then find an English expression that conveys the same idea.
        Week 3: Register awareness — when NOT to use proverbs in English (academic
        writing, professional emails). Week 4: Practice — students write advice using
        English proverbs appropriately.'
      exercises:
      - name: Proverb Translation Detective
        type: matching
        description: "Give 15 Portuguese proverbs. Students must find the correct English equivalent from a list of 20 options (5 distractors). Emphasize that the words are different but the meaning is the same."
        duration: 15
      - name: Literal Translation vs. Real English
        type: error-correction
        description: "Provide 10 sentences where a Portuguese proverb has been literally translated into English. Students must identify the error and write the correct English proverb or paraphrase."
        duration: 15
      - name: Register Appropriateness Sort
        type: categorization
        description: "Give 12 scenarios (academic essay, casual conversation, business email, giving advice to a friend, political speech). Students decide whether using a proverb is appropriate or not, and if so, which one."
        duration: 15
      - name: Proverb Rewriting
        type: sentence-rewrite
        description: "Provide 8 Portuguese proverbs. Students write a short paragraph (3-4 sentences) advising someone, using the correct English equivalent naturally."
        duration: 20
