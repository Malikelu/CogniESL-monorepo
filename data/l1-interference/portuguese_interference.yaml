  shall:
    interference_patterns:
    - pattern: Use of 'shall' for simple future where 'will' is standard
      example_portuguese: Eu vou viajar amanha.
      example_gloss: I go to travel tomorrow.
      example_wrong: I shall travel tomorrow.
      example_correct: I will travel tomorrow. / I am going to travel tomorrow.
      explanation: Portuguese 'ir + infinitivo' is the standard future construction
        (eu vou viajar = I am going to travel / I will travel). English 'shall' is
        formal/archaic for first person; 'will' is standard for all persons in modern
        English. Portuguese speakers overuse 'shall' as a direct translation of the
        Portuguese future, producing overly formal or archaic-sounding sentences.
      frequency: 2
      persistence: 1
      communicative_impact: 1
    - pattern: Use of 'shall' in second/third person where 'will' is required
      example_portuguese: Ela vai chegar tarde.
      example_gloss: She goes to arrive late.
      example_wrong: She shall arrive late.
      example_correct: She will arrive late.
      explanation: Portuguese 'ir + infinitivo' works for all persons (eu vou, ela
        vai, eles vao). English 'shall' is restricted to first person (I/we) in traditional
        grammar and is increasingly archaic. Portuguese speakers transfer the person-neutral
        Portuguese future to 'shall' in all persons, but native English requires 'will'
        for second and third person. This error is documented in contrastive analyses
        of Romance language learners of English (Swan & Smith, 2001).
      frequency: 2
      persistence: 1
      communicative_impact: 1
    examples:
    - 'Wrong: ''I shall travel.'' (standard future) Correct: ''I will travel.'''
    - 'Wrong: ''She shall arrive late.'' Correct: ''She will arrive late.'''
    - 'Wrong: ''They shall come tomorrow.'' Correct: ''They will come tomorrow.'''
    why_it_happens: Portuguese 'ir + infinitivo' is the standard future construction
      and works identically for all persons (eu vou, tu vais, ele vai, nos vamos,
      eles vao). English 'shall' is formal and primarily used in first person (I/we)
      in British English, and is increasingly archaic in American English. 'Will'
      is the standard future marker for all persons in modern English. Portuguese
      speakers overuse 'shall' as a direct translation of the Portuguese future because
      (a) 'shall' is often taught as the "correct" future form in traditional EFL
      classrooms in Brazil, and (b) Portuguese speakers may perceive 'will' as too
      informal. The result is overuse of 'shall' in contexts where native speakers
      would use 'will' or 'going to.' This pattern is documented in Swan & Smith (2001)
      for Portuguese learners and in Azevedo (1996) for Portuguese-English structural
      contrasts.
    teacher_tips:
      how_to_explain: 'Teach that ''will'' is the standard future form for ALL persons
        in modern English. ''Shall'' is formal and mainly used in British English
        for first person suggestions (''Shall we go?'') and in legal/formal documents.
        Write the paradigm on the board: I will, you will, he/she will, we will, they
        will. Contrast with the archaic/formal: I shall, we shall.'
      where_to_start: 'Begin with ''will'' for all persons: ''I will, you will, he
        will.'' Drill until automatic. Then introduce ''shall'' as a special form
        only for suggestions: ''Shall we eat?'' ''Shall I open the window?'''
      sequencing: 'Week 1: ''Will'' for future (all persons). Week 2: ''Shall'' for
        suggestions (Shall we...? / Shall I...?). Week 3: ''Shall'' in formal/legal
        contexts. Week 4: Mixed practice — students choose between shall, will, and
        going to.'
      exercises:
      - name: Shall vs Will Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with various subjects. Students must choose
          between 'shall' and 'will' and justify their choice.
        duration: 15
      - name: Future Form Sorting
        type: categorization
        description: Give 20 future-tense sentences. Students categorize each as 'shall'
          (suggestion/formal), 'will' (standard future), or 'going to' (plan/intention).
        duration: 15
