  past_perfect_continuous:
    interference_patterns:
    - pattern: Use of imperfect past (pretérito imperfeito) where English requires
        past perfect continuous
      example_portuguese: Eu estudava ha 3 horas quando ela chegou.
      example_gloss: I studied has 3 hours when she arrived.
      example_wrong: I studied for 3 hours when she arrived.
      example_correct: I had been studying for 3 hours when she arrived.
      explanation: Portuguese uses the imperfect past (estava + gerundio or simple
        imperfect) for ongoing past actions, even when one action continues up to
        another past event. English requires the past perfect continuous (had been
        + -ing) specifically for actions continuing up to a past reference point.
        Portuguese speakers transfer the imperfect past pattern and produce simple
        past or past continuous instead of past perfect continuous.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of past perfect simple (pretérito mais-que-perfeito) where English
        requires past perfect continuous
      example_portuguese: Eu havia estudado ha 3 horas quando ela chegou.
      example_gloss: I had studied has 3 hours when she arrived.
      example_wrong: I had studied for 3 hours when she arrived.
      example_correct: I had been studying for 3 hours when she arrived.
      explanation: Portuguese uses 'havia + past participle' (pretérito mais-que-perfeito)
        for both completed and ongoing past-before-past situations. English distinguishes
        past perfect simple (had studied = completed) from past perfect continuous
        (had been studying = ongoing duration). Portuguese speakers lose this aspectual
        distinction and use the simple form even when duration/ongoingness is the
        intended meaning. This is documented in Swan & Smith (2001) as a systematic
        Romance-language transfer error in English tense-aspect marking.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: ''I studied for 3 hours when she arrived.'' Correct: ''I had been studying
      for 3 hours when she arrived.'''
    - 'Wrong: ''I had studied for 3 hours when she arrived.'' Correct: ''I had been
      studying for 3 hours when she arrived.'''
    - 'Wrong: ''She was working there for 10 years when she quit.'' Correct: ''She
      had been working there for 10 years when she quit.'''
    why_it_happens: Portuguese has two structures that map onto English past perfect
      continuous, neither of which preserves the duration-up-to-a-past-point meaning.
      First, the imperfect past (pretérito imperfeito) covers ongoing past actions
      but does not mark the "before another past event" relationship — Portuguese
      speakers use this and produce simple past or past continuous. Second, the past
      perfect simple (pretérito mais-que-perfeito, havia + participle) marks past-before-past
      but does not distinguish completed vs. ongoing aspect — Portuguese speakers
      use this and produce past perfect simple where English requires past perfect
      continuous. The English "had been + -ing" form has no single structural equivalent
      in Portuguese, making it a persistent acquisition difficulty. Both patterns
      are documented in Swan & Smith (2001) Learner English (Portuguese chapter) and
      Azevedo (1996) Portuguese linguistic structure.
    teacher_tips:
      how_to_explain: 'Draw a timeline on the board. Show two past events: one ongoing
        (studying for 3 hours) and one that interrupts (she arrived). The ongoing
        action uses HAD BEEN + -ING. The interrupting action uses simple past. Write:
        ''I had been studying for 3 hours WHEN she arrived.'' Emphasize: the duration
        (for/since) + the interruption = past perfect continuous.'
      where_to_start: 'Begin with interruption sentences: ''I had been waiting for
        3 hours when the bus finally came.'' Use timelines to visualize the duration
        before the past event.'
      sequencing: 'Week 1: Past perfect continuous structure (had been + -ing) with
        timelines. Week 2: Contrast with past perfect simple (completed vs. ongoing).
        Week 3: Contrast with past continuous (no past-before-past reference). Week
        4: Mixed practice with all three forms.'
      exercises:
      - name: Past Perfect Continuous Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with two past events. Students fill in the
          correct form (past perfect continuous for the ongoing action, simple past
          for the interruption).
        duration: 15
      - name: Aspect Distinction Decision
        type: fill-in-the-blank
        description: Provide 15 sentences where students must choose between past
          perfect simple and past perfect continuous based on whether the action is
          completed or ongoing.
        duration: 15
      - name: Portuguese to English Translation
        type: translation
        description: Give 10 Portuguese sentences using imperfeito or mais-que-perfeito
          with duration markers. Students translate into correct English past perfect
          continuous.
        duration: 15
      - name: Error Correction with Explanation
        type: error-correction
        description: Provide 10 sentences with Portuguese L1 transfer errors (simple
          past or past perfect simple where past perfect continuous is needed). Students
          correct each error and explain why the original is wrong.
        duration: 15
