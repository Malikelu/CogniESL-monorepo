  few:
    interference_patterns:
    - pattern: Confusion of few and little due to Portuguese pouco
      example_portuguese: Eu tenho pouco dinheiro.
      example_gloss: I have little money.
      example_wrong: I have few money.
      example_correct: I have little money.
      explanation: Portuguese pouco/pouca is used with both countable and uncountable
        nouns. English distinguishes few (countable) from little (uncountable).
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion of few (negative) and a few (positive)
      example_portuguese: Eu tenho poucos amigos.
      example_gloss: I have few friends.
      example_wrong: I have a few friends.
      example_correct: I have few friends.
      explanation: Portuguese poucos can mean both few (negative) and a few (positive).
        English distinguishes these.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I have few money. Correct: I have little money.'
    - 'Wrong: I have a few friends. Correct: I have few friends.'
    why_it_happens: 'Portuguese pouco/pouca/poucos/poucas is a single quantifier.
