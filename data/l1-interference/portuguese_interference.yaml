  subject_object_pronouns:
    interference_patterns:
    - pattern: Use of subject pronoun in object position
      example_portuguese: Eu vejo ela.
      example_gloss: I see she.
      example_wrong: I see she.
      example_correct: I see her.
      explanation: Portuguese often uses subject pronouns in object position in informal
        speech (eu vejo ela = I see she). English requires object pronouns in object
        positions.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'ele/ela' for inanimate objects
      example_portuguese: O livro? Eu vi ele.
      example_gloss: The book? I saw he.
      example_wrong: The book? I saw he.
      example_correct: The book? I saw it.
      explanation: Portuguese uses 'ele/ela' (he/she) to refer to inanimate objects
        based on grammatical gender. English uses 'it' for all inanimate objects.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: ''I see she.'' Correct: ''I see her.'''
    - 'Wrong: ''The book? I saw he.'' Correct: ''The book? I saw it.'''
    - 'Wrong: ''Give to he.'' Correct: ''Give to him.'''
    why_it_happens: 'Portuguese informal speech often uses subject pronouns in object
      positions: ''Eu vi ela'' (I see she) instead of the formal ''Eu a vi.'' English
      strictly requires object pronouns in object positions: ''I see her,'' ''Give
      to him.'' Additionally, Portuguese uses gendered pronouns (ele/ela) for inanimate
      objects based on grammatical gender, while English uses ''it.'''
    teacher_tips:
      how_to_explain: 'Create a pronoun chart: I/me, he/him, she/her, we/us, they/them.
        Drill the pattern: subject + verb + object pronoun. For inanimate objects,
        emphasize: English uses ''it'' for everything that is not a person.'
      where_to_start: 'Begin with the most common error: ''I see she'' → ''I see her.''
        Use simple sentences with common verbs.'
      sequencing: 'Week 1: Subject vs. object pronouns. Week 2: ''It'' for inanimate
        objects. Week 3: Object pronouns after prepositions. Week 4: Mixed practice.'
      exercises:
      - name: Pronoun Case Drill
        type: fill-in-the-blank
        description: Provide 20 sentences where students must choose between subject
          and object pronouns.
        duration: 15
      - name: Inanimate It Drill
        type: error-correction
        description: Provide 10 sentences with 'he/she' used for objects. Students
          correct to 'it.'
        duration: 10
