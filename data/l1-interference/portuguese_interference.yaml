  bring_vs_take:
    interference_patterns:
    - pattern: Use of 'bring' where 'take' is needed (away from speaker)
      example_portuguese: Eu levo o livro para a escola.
      example_gloss: I take the book to school.
      example_wrong: I bring the book to school.
      example_correct: I take the book to school.
      explanation: "Portuguese 'levar' covers both English 'bring' and 'take.' English distinguishes directionality — 'bring' = movement toward the speaker/listener, 'take' = movement away from the speaker. Portuguese speakers default to 'bring' because 'levar' does not encode this directional distinction, leading to errors when the motion is away from the deictic center."
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of 'take' where 'bring' is needed (toward speaker)
      example_portuguese: Você pode trazer um copo de água?
      example_gloss: Can you bring a glass of water?
      example_wrong: Can you take a glass of water to me?
      example_correct: Can you bring me a glass of water?
      explanation: Portuguese has two verbs — 'trazer' (toward speaker) and 'levar'
        (away from speaker) — but in colloquial Brazilian Portuguese, 'levar' is often
        used for both directions, and 'trazer' is sometimes avoided in informal speech.
        Learners who rely on 'levar' as their default motion verb may overgeneralize
        'take' to contexts requiring 'bring.' Additionally, the Portuguese request
        'leva um copo de água' (literally, take a glass of water) is pragmatically
        understood as 'bring me a glass of water' in context, reinforcing the conflation.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of indirect object with 'bring' (transfer from 'trazer' +
        indirect object)
      example_portuguese: Traz o livro para mim.
      example_gloss: Bring the book for me.
      example_wrong: Bring the book for me.
      example_correct: Bring me the book. / Bring the book to me.
      explanation: Portuguese 'trazer' commonly takes an indirect object introduced
        by 'para' (traz o livro para mim = bring the book for/to me). English 'bring'
        allows double-object construction (bring me the book) or 'to'-phrase (bring
        the book to me), but 'for me' with 'bring' changes the meaning (benefactive
        rather than directional). Portuguese speakers transfer the 'para mim' structure
        as 'for me,' producing pragmatically odd sentences.
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: I bring the book to school every day. Correct: I take the book to school
      every day.'
    - 'Wrong: Can you take a glass of water to me? Correct: Can you bring me a glass
      of water?'
    - 'Wrong: Bring the book for me. Correct: Bring me the book.'
    - 'Wrong: I will bring this to your house. (when not going to speaker''s location)
      Correct: I will take this to your house.'
    why_it_happens: Portuguese has a three-way motion verb system — 'vir' (come/toward
      speaker), 'ir' (go/away from speaker), and 'trazer/lever' (bring/take) — but
      the bring/take distinction is less rigidly observed in colloquial Brazilian Portuguese
      than in English. 'Lever' (to take) is often used as the default transitive motion
      verb regardless of direction, while 'trazer' (to bring) is reserved for explicit
      toward-speaker contexts. English obligatorily marks direction on the verb itself —
      bring = toward deictic center, take = away from deictic center. Portuguese speakers
      must learn to attend to a directional feature that their L1 distributes across
      context rather than encoding lexically. The 'para mim' / 'for me' transfer error
      compounds the problem because Portuguese uses 'para' for both directional and
      benefactive indirect objects, while English uses 'to' for direction and 'for'
      for benefactive meaning.
    teacher_tips:
      how_to_explain: 'Stand in the center of the room. Walk toward a student and say:
        "I am BRINGING the book TO Maria." Walk away and say: "I am TAKING the book
        TO the library." The rule: BRING = come here with something. TAKE = go there
        with something. Draw a diagram with arrows: arrow pointing to speaker = bring,
        arrow pointing away = take.'
      where_to_start: Begin with physical demonstrations. Hold a book, walk toward
        a student ("I'm bringing you the book"), then walk away ("I'm taking the book
        to the shelf"). Have students practice with classroom objects.
      sequencing: 'Week 1: Physical demonstration of bring vs. take (toward vs. away).
        Week 2: Request contexts ("bring me" vs. "take it to"). Week 3: Indirect object
        patterns (bring me X / bring X to me / NOT bring X for me). Week 4: Mixed
        practice with real-world scenarios (restaurant, office, travel).'
      exercises:
      - name: Bring or Take Decision Drill
        type: fill-in-the-blank
        description: Provide 15 sentences with directional context. Students choose
          between 'bring' and 'take' based on whether motion is toward or away from
          the speaker. Include scenarios like "Please ___ me a glass of water" (bring)
          and "Please ___ this letter to the post office" (take).
        duration: 15
      - name: Direction Arrow Mapping
        type: diagram-labeling
        description: Give students 10 short dialogues with locations marked on a simple
          map. Students draw arrows showing direction of movement and label each with
          'bring' or 'take.' Example — Maria is at home. She asks João at the office,
          "Can you ___ the documents to me?" (Answer — bring — toward Maria).
        duration: 15
      - name: Indirect Object Restructuring
        type: sentence-rewrite
        description: Provide 10 Portuguese-style sentences using 'for me/him/her.'
          Students restructure using English double-object or 'to'-phrase patterns.
          Example — "Bring the report for me" → "Bring me the report" or "Bring the
          report to me."
        duration: 10
      - name: Real-World Scenario Role Play
        type: role-play
        description: Students work in pairs with scenario cards (restaurant server,
          office colleague, travel agent). Each card specifies who is where. Students
          must use correct bring/take directionality in requests and instructions.
          Example card — "You are at a restaurant. Ask the waiter to bring you the menu.
          Then ask your friend at the table to take a photo."
        duration: 20
