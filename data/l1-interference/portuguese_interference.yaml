  must_vs_have_to:
    interference_patterns:
    - pattern: Use of must for external obligation
      example_portuguese: Eu tenho que trabalhar amanha.
      example_gloss: I have that to work tomorrow.
      example_wrong: I must work tomorrow.
      example_correct: I have to work tomorrow.
      explanation: Portuguese "ter que" is the default expression for external
        obligation (rules, schedules, other people's demands). English "have to"
        serves this function, while "must" implies the speaker's own authority or
        strong personal conviction. Portuguese speakers overuse "must" because
        "ter que" maps superficially onto it.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of must for logical deduction where English prefers must but
        Portuguese uses different structures
      example_portuguese: Ela deve estar cansada.
      example_gloss: She must be tired.
      example_wrong: She has to be tired.
      example_correct: She must be tired.
      explanation: Portuguese "dever (de)" expresses probability/deduction (ela
        deve estar cansada = she must be tired). English also uses "must" for
        logical deduction, but Portuguese learners may incorrectly choose "have
        to" because "dever" and "ter que" are both obligation markers in their
        L1, leading them to map both onto "have to" and avoid "must" in deduction
        contexts. This is the reverse error of pattern 1 — learners who overuse
        "have to" for everything may produce "She has to be tired" when they mean
        a logical conclusion.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I must work tomorrow (external rule). Correct: I have to work tomorrow.'
    - 'Wrong: She has to be tired (logical deduction). Correct: She must be tired.'
    - 'Wrong: You must wear a uniform at school (school rule). Correct: You have to wear a uniform at school.'
    why_it_happens: 'Portuguese has two main ways to express obligation and probability:
      "ter que" (external obligation — rules, schedules, other people''s demands) and
      "dever (de)" (internal obligation or logical deduction). English collapses both
      into a single modal system where "have to" handles external obligation and "must"
      handles both strong personal obligation and logical deduction. Portuguese speakers
      tend to overgeneralize one English form in both directions — either overusing
      "must" (because it feels more like the Portuguese infinitive "dever") or overusing
      "have to" (because "ter que" is the most frequent obligation structure in spoken
      Portuguese). The result is a bidirectional interference pattern where learners
      use "must" for external rules and/or "have to" for logical deductions, both of
      which sound unnatural to native English speakers. Swan & Smith (2001) document
      this as a characteristic error for Portuguese-speaking learners, and Azevedo
      (1996) confirms the semantic split between "ter que" and "dever" in Portuguese
      modality.'
    teacher_tips:
      how_to_explain: 'Draw two columns on the board: HAVE TO and MUST. Under HAVE
        TO, write: "Someone else says so — rules, laws, bosses, schedules." Under
        MUST, write: "I say so — my own strong feeling" or "Logic — I''m sure this
        is true." Show that Portuguese "ter que" = HAVE TO (external) and "dever"
        = MUST (personal/logical). Drill with scenarios: "Your boss says..." (have
        to), "You believe strongly..." (must), "You see evidence..." (must for deduction).'
      where_to_start: Begin with external obligations (have to) since these are
        the most frequent in daily life. Use real workplace and school rules.
      sequencing: 'Week 1: Have to for external obligation (rules, schedules). Week
        2: Must for personal/strong obligation. Week 3: Must for logical deduction.
        Week 4: Contrastive practice — choose must vs have to. Week 5: Error correction
        with authentic learner sentences.'
      exercises:
      - name: Must vs Have To Drill
        type: fill-in-the-blank
        description: Provide 15 sentences describing external rules, personal obligations,
          and logical deductions. Students choose between must and have to.
        duration: 15
      - name: Obligation vs Deduction Sort
        type: categorization
        description: Give 20 sentences using must/have to. Students categorize each
          as "external obligation," "personal obligation," or "logical deduction"
          and correct any errors.
        duration: 15
