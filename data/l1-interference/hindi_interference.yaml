  conditionals:
    interference_patterns:
    - pattern: Use of agar for if
      example: 'HI ''agar main ameer hota'' (if I rich were) -> Error: ''If I would
        be rich'' -> Correct: ''If I were rich'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: If I would have money, I would travel.
      correct: If I had money, I would travel.
    why_it_happens: Hindi conditional structure differs from English. Hindi learners
      may use 'would' in the if-clause.
    teacher_tips:
      how_to_explain: 'Teach: NO WOULD IN IF-CLAUSE. Use ''were'' (not ''was'') for
        unreal situations.'
      where_to_start: Start with second conditional.
      sequencing: 'Week 1: Second conditional. Week 2: First conditional. Week 3:
        Zero conditional. Week 4: Review.'
      exercises:
      - name: Conditional Practice
        type: sentence-rewrite
        description: Students rewrite 10 conditional sentences.
        duration: 15
    sources:
