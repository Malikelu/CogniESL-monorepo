  negation:
    interference_patterns:
    - pattern: Use of nahin before the verb
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: HI 'main nahin jaanta'
      example_gloss: I not know
      example_wrong: I not know
      example_correct: I do not know
      explanation: 'Transfer from L1: Use of nahin before the verb.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I not know the answer.
      correct: I do not know the answer.
    why_it_happens: Hindi negation uses 'nahin' (not) before the verb. English uses
      do/does/did + not + base verb.
    teacher_tips:
      how_to_explain: 'Teach: do/does/did + not + base verb.'
      where_to_start: Start with do/does/did + not.
      sequencing: 'Week 1: Do/does/did + not. Week 2: Be + not. Week 3: Modals + not.
        Week 4: Review.'
      exercises:
      - name: Negation Transformation
        type: sentence-rewrite
        description: Students rewrite 15 affirmative sentences as negative.
        duration: 15
    sources:
