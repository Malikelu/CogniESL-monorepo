  adverbs:
    interference_patterns:
    - pattern: Use of adjective instead of adverb
      example: 'HI ''tez'' = fast/fast(ly) -> Error: ''He drives very slow'' -> Correct:
        ''He drives very slowly'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: He runs very fastly.
      correct: He runs very fast. / He runs very quickly.
    why_it_happens: Hindi does not always distinguish morphologically between adjectives
      and adverbs. English requires -ly for most adverbs.
    teacher_tips:
      how_to_explain: 'Teach: Adjective describes a noun. Adverb describes a verb.
        Most adverbs add -ly.'
      where_to_start: Start with the -ly rule.
      sequencing: 'Week 1: Adjective vs adverb. Week 2: Adding -ly. Week 3: Exceptions.
        Week 4: Review.'
      exercises:
      - name: Adjective or Adverb?
        type: fill-in-the-blank
        description: 15 sentences where students choose between adjective and adverb
          form.
        duration: 10
    sources:
