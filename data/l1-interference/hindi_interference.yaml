language: Hindi
language_code: hi
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of all articles (Hindi has no articles)
      example: 'HI ''main daktar hoon'' (I doctor am) -> Error: ''I doctor'' -> Correct:
        ''I am a doctor'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: I am teacher.
      correct: I am a am a teacher.
    - wrong: She is doctor.
      correct: She is a doctor.
    why_it_happens: Hindi has no article system. Definiteness is inferred from context
      or word order. Hindi learners struggle with English articles because the concept
      does not exist in Hindi.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES articles. ''A/an'' for first mention,
        ''the'' for specific.'
      where_to_start: Start with the profession pattern.
      sequencing: 'Week 1: A/an for professions. Week 2: The for specific reference.
        Week 3: Zero article. Week 4: Review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with Hindi-influenced article errors.
        duration: 15
      - name: HI Article Translation
        type: translation
        description: Translate 15 Hindi sentences focusing on articles.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 13 (South Asian)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 5
    communicative_impact: 4
    flagged: false
    tier: 1
    source_rank: 1
    citations:
    - claim: Interference pattern for articles
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Hindi speakers, pp. 231-242'
      tier: 1
    - claim: 'Grammar point: articles'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Article usage varies significantly across languages; many languages have
        no article system
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See articles entries 133-142
      tier: 2
    - claim: ELLs commonly omit indefinite article when descriptive adjectives come
        between determiner and noun
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
  word_order:
    interference_patterns:
    - pattern: SOV word order transfer
      example: 'HI ''main kitaab khareedta hoon'' (I book buy) -> Error: ''I book
        buy'' -> Correct: ''I buy a book'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: I book bought yesterday.
      correct: I bought a book yesterday.
    why_it_happens: Hindi is SOV (Subject-Object-Verb) while English is SVO. Hindi
      learners transfer SOV order.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object.'
      where_to_start: Start with basic SVO order.
      sequencing: 'Week 1: Basic SVO. Week 2: Subordinate clauses. Week 3: Adverb
        placement. Week 4: Review.'
      exercises:
      - name: Word Order Correction
        type: error-correction
        description: 15 sentences with Hindi-influenced word order.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 13
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
