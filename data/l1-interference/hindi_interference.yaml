language: hindi
grammar_points:
  postpositions_vs_prepositions:
    interference_patterns:
    - Hindi uses postpositions which does not exist in English, causing transfer errors
      related to 'postpositions vs prepositions'.
    why_it_happens: Hindi handles 'postpositions vs prepositions' differently from
      English. Hindi L1 speakers transfer native structural patterns to English, leading
      to systematic errors. The error is persistent because the Hindi structure is
      deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Hindi and English for 'postpositions
        vs prepositions'. Show the Hindi structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Hindi handles
        'postpositions vs prepositions' differently from English. Use visual aids
        or color-coding to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Hindi sentences, students translate to English, focusing
          on correct 'postpositions vs prepositions' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Hindi-style 'postpositions vs prepositions'
          errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'postpositions
          vs prepositions' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'postpositions
          vs prepositions' errors.
        duration: 15
    examples:
    - 'Wrong: ''I think to you.'' Correct: ''I think of you.'''
    - 'Wrong: ''I go at Paris.'' Correct: ''I go to Paris.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Sharma, D. (2005). Language transfer and SLA of Hindi-Urdu. Annual Review of
      Applied Linguistics, 25, 1-20.
    - Mohanan, K. (1994). Argument structure in Hindi. CSLI Publications.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Hindi
    notes: Most persistent Hindi-specific L1 transfer error. Affects written and spoken
      English at all levels.
