  questions:
    interference_patterns:
    - pattern: Use of kya question word
      example: 'HI ''kya tum jaate ho?'' (question you go?) -> Error: ''Question you
        go?'' -> Correct: ''Do you go?'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: You go to school?
      correct: Do you go to school?
    why_it_happens: Hindi forms questions with 'kya' at the beginning or by intonation.
      English requires do-support and inversion.
    teacher_tips:
      how_to_explain: 'Teach: Do/Does/Did + subject + base verb?'
      where_to_start: Start with yes/no questions.
      sequencing: 'Week 1: Yes/no questions. Week 2: Wh- questions. Week 3: Tag questions.
        Week 4: Review.'
      exercises:
      - name: Question Formation
        type: sentence-rewrite
        description: Students convert 15 statements to questions.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 13
    - Parrott "Grammar for English Language Teachers"
