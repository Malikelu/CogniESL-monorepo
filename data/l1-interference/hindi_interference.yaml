  gerund_infinitive:
    interference_patterns:
    - pattern: Use of infinitive after prepositions
      example: 'HI ''khane se pehle'' (eating before) -> Error: ''Before to eat''
        -> Correct: ''Before eating'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Before to leave, say goodbye.
      correct: Before leaving, say goodbye.
    why_it_happens: Hindi uses the infinitive after prepositions. English uses gerund
      after prepositions.
    teacher_tips:
      how_to_explain: 'Teach: After prepositions (before, after, without, by, for)
        -> always gerund (-ing).'
      where_to_start: Start with preposition + gerund.
      sequencing: 'Week 1: Preposition + gerund. Week 2: Verb + infinitive. Week 3:
        Verb + gerund. Week 4: Review.'
      exercises:
      - name: Preposition + Gerund
        type: fill-in-the-blank
        description: 15 sentences with prepositions followed by blank.
        duration: 10
