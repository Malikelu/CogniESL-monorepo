  linking_words:
    interference_patterns:
    - pattern: Use of lekin at sentence start
      example: 'HI ''lekin'' = but/however -> Error: ''But, I think...'' -> Correct:
        ''However, I think...'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - wrong: But, I think we should go.
      correct: However, I think we should go.
    why_it_happens: Hindi 'lekin' functions as both 'but' and 'however'. Hindi also
      uses double conjunctions.
    teacher_tips:
      how_to_explain: 'Teach: ''However'' for formal writing. ''But'' for informal.
        ''Although'' and ''but'' NEVER together.'
      where_to_start: Start with 'but' vs 'however'.
      sequencing: 'Week 1: But vs however. Week 2: Although/but redundancy. Week 3:
        Other linking words. Week 4: Review.'
      exercises:
      - name: Formal vs Informal
        type: sentence-rewrite
        description: Students rewrite 10 informal sentences using formal linking words.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 13
