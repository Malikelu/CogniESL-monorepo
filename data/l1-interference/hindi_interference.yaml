      English is prepositional (preposition + noun).
    teacher_tips:
      how_to_explain: 'Teach: English prepositions go BEFORE the noun. On the table
        (not table on).'
      where_to_start: Start with common prepositions of place.
      sequencing: 'Week 1: Prepositions of place. Week 2: Prepositions of time. Week
        3: Review.'
