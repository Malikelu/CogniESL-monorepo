  prepositions:
    interference_patterns:
    - pattern: Transfer of Hindi postpositions
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: HI 'mez par'
      example_gloss: table on
      example_wrong: table on
      example_correct: on the table
      explanation: 'Transfer from L1: Transfer of Hindi postpositions.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: Book the table on is.
      correct: The book is on the table.
    why_it_happens: Hindi uses postpositions (after nouns) instead of prepositions.
      English uses prepositions before nouns.
    teacher_tips:
      how_to_explain: 'Teach: English prepositions come BEFORE nouns.'
      where_to_start: Start with common prepositions of place.
      sequencing: 'Week 1: Prepositions of place. Week 2: Prepositions of time. Week
        3: Verb + preposition. Week 4: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 Hindi sentences with correct English prepositions.
        duration: 15
    sources:
