  modal_verbs:
    interference_patterns:
    - pattern: Use of sakna for can/may
      example: 'HI ''main sakta hoon'' -> Error: ''I can go?'' (informal) -> Correct:
        ''May I go?'' (formal)'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I can have some water?
      correct: May I have some water?
    why_it_happens: Hindi 'sakna' covers can/could/may/might. Hindi learners may use
      'can' for all situations.
    teacher_tips:
      how_to_explain: 'Teach modal hierarchy: can (ability), may (permission), could
        (polite request), should (advice), must (obligation).'
      where_to_start: Start with 'can' for ability.
      sequencing: 'Week 1: Can (ability). Week 2: May (permission). Week 3: Could
        (politeness). Week 4: Should/must.'
      exercises:
      - name: Modal Choice
        type: fill-in-the-blank
        description: 15 sentences where students choose the correct modal.
        duration: 10
