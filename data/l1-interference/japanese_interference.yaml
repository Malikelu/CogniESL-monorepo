    interference_patterns:
    - pattern: Linking words (japanese)
      example: Linking words (japanese)
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: But, I think we should go.
      correct: However, I think we should go.
    why_it_happens: Japanese discourse connectors differ from English. Japanese 'demo'
      functions as both 'but' and 'however,' and Japanese allows double conjunctions
      that are redundant in English. Learners may produce sentences like 'Although
      it rained, but we went out.' This transfer occurs because discourse conventions
      are deeply embedded in L1.
    teacher_tips:
      how_to_explain: 'Teach: ''However'' for formal writing. ''But'' for informal.'
      where_to_start: Start with the linking words pattern.
