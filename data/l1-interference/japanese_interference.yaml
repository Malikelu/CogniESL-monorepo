  prepositions:
    interference_patterns:
    - pattern: Transfer of japanese prepositions
      example: Transfer of japanese prepositions
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I am on home.
      correct: I am at home.
    why_it_happens: Japanese uses postpositions rather than prepositions, and the
      system differs significantly from English. Japanese learners may omit prepositions
      or use wrong ones, producing sentences like 'I go school' instead of 'I go to
      school.' This occurs because Japanese spatial relationships are expressed with
      postpositions attached to nouns.
    teacher_tips:
      how_to_explain: Teach common japanese-English preposition differences.
      where_to_start: Start with the prepositions pattern.
      sequencing: 'Week 1: prepositions. Week 2: Practice. Week 3: Review. Week 4:
