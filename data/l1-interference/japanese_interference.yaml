  phonology:
    interference_patterns:
    - pattern: Confusion of /l/ and /r/ (Japanese lacks distinction)
      example: Confusion of /l/ and /r/ (Japanese lacks distinction)
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I have a rice of bread.
      correct: I have a loaf of bread.
    why_it_happens: Japanese phonology does not distinguish /l/ and /r/ as separate
      phonemes. Japanese has a single sound that falls between English /l/ and /r/.
      Japanese learners may confuse these sounds in English, producing 'fright' for
      'flight' or 'lice' for 'rice.' This error persists because the L1 phonological
      system does not mark this distinction.
    teacher_tips:
      how_to_explain: 'Teach: /v/ vs /w/, /θ/ vs /t/.'
      where_to_start: Start with the phonology pattern.
      sequencing: 'Week 1: phonology. Week 2: Practice. Week 3: Review. Week 4: Mixed.'
      exercises:
