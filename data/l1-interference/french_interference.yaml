      tier: 3
    - pattern: Use of devoir for must/should
      example: 'FR ''je dois'' = I must/I should -> Error: ''I must go'' (too strong)
        -> Correct: ''I should go'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Use of devoir for must/should.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I can have some water?
      correct: May I have some water?
    - wrong: You must to go to the doctor.
      correct: You should go to the doctor.
    - wrong: She can to swim very well.
      correct: She can swim very well.
    why_it_happens: French 'pouvoir' covers can/could/may/might. French 'devoir' covers
      must/should/have to. French learners may use 'can' for all situations or 'must'
      when 'should' is more appropriate.
    teacher_tips:
      how_to_explain: 'Teach modal hierarchy: can (ability), may (permission, formal),
        could (polite request), should (advice), must (obligation).'
      where_to_start: Start with 'can' for ability. Then 'may' for permission. Then
        'could' for polite requests.
      sequencing: 'Week 1: Can (ability). Week 2: May (permission). Week 3: Could
        (politeness). Week 4: Should/must (advice/obligation).'
      exercises:
      - name: Modal Choice
        type: fill-in-the-blank
        description: 15 sentences where students choose the correct modal.
        duration: 10
