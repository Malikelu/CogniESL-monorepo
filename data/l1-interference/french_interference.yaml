  possessives:
    interference_patterns:
    - pattern: Use of a + possessive
      example: 'FR ''a moi'' (to me) -> Error: ''The book is to me'' -> Correct: ''The
        book is mine'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of de for possession
      example: 'FR ''le livre de Jean'' -> Error: ''The book of Jean'' -> Correct:
        ''Jean''s book'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: The book is to me.
      correct: The book is mine.
    - wrong: The car of my father is blue.
      correct: My father's car is blue.
    - wrong: He broke the leg.
      correct: He broke his leg.
    why_it_happens: French uses 'de' (of) for possession and 'a moi/toi/lui' for emphasis.
      English uses 's for people and possessive adjectives (my, your, his). French
      learners may transfer the de construction.
    teacher_tips:
      how_to_explain: 'Teach: Use ''s for people (Jean''s book). Use of for things
        (the leg of the table). For body parts and family: use possessive adjectives
        (my mother, his leg).'
      where_to_start: Start with 's for people. Then teach possessive adjectives.
      sequencing: 'Week 1: ''S for people. Week 2: Possessive adjectives. Week 3:
        Of for things. Week 4: Review.'
      exercises:
      - name: Possessive Formation
        type: sentence-rewrite
        description: Students rewrite 10 de phrases using English possessive forms.
        duration: 10
      - name: Body Parts
        type: oral-drill
        description: Students describe injuries using possessives.
        duration: 10
      - name: FR Possessive Translation
        type: translation
        description: Translate 15 French possessive sentences into correct English.
        duration: 15
      - name: Family Description
        type: composition
        description: Students describe their family using possessive adjectives.
        duration: 15
