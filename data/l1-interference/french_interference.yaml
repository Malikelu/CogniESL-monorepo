  adjective_placement:
    interference_patterns:
    - pattern: Post-nominal adjective placement
      frequency: 4
      persistence: 4
      communicative_impact: 2
      example_l1: FR 'une maison blanche'
      example_gloss: a house white
      example_wrong: a house white
      example_correct: a white house
      explanation: 'Transfer from L1: Post-nominal adjective placement.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Adjectives that change meaning by position
      example: FR 'un grand homme' (a great man) vs 'un homme grand' (a tall man)
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Adjectives that change meaning by position.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: She bought a car red.
      correct: She bought a red car.
    - wrong: He has eyes blue.
      correct: He has blue eyes.
    - wrong: I need a pen new.
      correct: I need a new pen.
    why_it_happens: French typically places adjectives AFTER the noun (une maison
      blanche = a house white), unlike English which places most adjectives BEFORE
      the noun. Some French adjectives can go before or after with meaning changes.
      French learners transfer the post-nominal pattern.
    teacher_tips:
      how_to_explain: 'Teach the English order: adjective + noun. French order: noun
        + adjective (usually). Drill: ''a big house'' (not ''a house big''), ''a red
        car'' (not ''a car red'').'
      where_to_start: 'Start with the basic rule: adjective before noun. Then teach
        the OSASCOMP order for multiple adjectives.'
      sequencing: 'Week 1: Single adjective before noun. Week 2: Multiple adjectives
        (OSASCOMP). Week 3: Adjectives that follow nouns (enough, alive). Week 4:
        Review.'
      exercises:
      - name: Adjective Swap
        type: sentence-rewrite
        description: Students rewrite 10 French-influenced phrases with adjectives
          before nouns.
        duration: 10
      - name: FR-to-EN Adjective Translation
        type: translation
        description: Translate 15 French noun phrases into correct English word order.
        duration: 15
      - name: Picture Description
        type: oral-drill
        description: Students describe pictures using correct adjective-noun order.
        duration: 10
      - name: Adjective Order
        type: sentence-rewrite
        description: Students arrange 10 sets of adjectives in correct English order.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 6
    - Parrott "Grammar for English Language Teachers"
