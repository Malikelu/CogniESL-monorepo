  verb_tenses:
    interference_patterns:
    - pattern: Use of present perfect for recent past
      example: 'FR ''J''ai mange'' (I have eaten) -> Error: ''I have eaten lunch''
        (when meaning simple past) -> Correct: ''I ate lunch'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of passe compose for all past
      example: 'FR ''Je suis alle'' (I am gone) -> Error: ''I am gone to the store''
        -> Correct: ''I went to the store'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I have gone to the store yesterday.
      correct: I went to the store yesterday.
    - wrong: She has arrived last week.
      correct: She arrived last week.
    - wrong: We have finished the project on Monday.
      correct: We finished the project on Monday.
    why_it_happens: French uses passe compose (j'ai mange) for completed actions,
      which maps to both English simple past and present perfect. French learners
      may overuse present perfect when simple past is needed, especially with specific
      past time markers (yesterday, last week).
    teacher_tips:
      how_to_explain: 'Teach: Specific past time (yesterday, last week, in 2010) ->
        Simple Past. No specific time + present relevance -> Present Perfect. Words
        like ''yet'', ''already'', ''ever'', ''never'' -> usually Present Perfect.'
      where_to_start: Start with simple past (concrete, easier). Then introduce present
        perfect.
      sequencing: 'Week 1: Simple past with time markers. Week 2: Present perfect
        for experiences. Week 3: Present perfect with already/yet/just. Week 4: Contrastive
        practice.'
      exercises:
      - name: Tense Decision
        type: fill-in-the-blank
        description: 20 sentences with blank for past simple or present perfect. Students
          choose and explain.
        duration: 15
      - name: FR Tense Translation
        type: translation
        description: Translate 15 French passe compose sentences into correct English
          tense.
        duration: 15
      - name: Time Marker Sort
        type: matching
        description: Students match time expressions to the correct tense.
        duration: 10
      - name: Interview Activity
        type: oral-drill
        description: Students ask each other Have you ever...? questions.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 6
    - Parrott "Grammar for English Language Teachers"
