        A Practical Handbook'', University of Michigan Press'
      location: See relevant section
      tier: 2
  negation:
    interference_patterns:
    - pattern: Omission of do-support in negation
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: FR 'Je ne sais pas'
      example_gloss: I not know not
      example_wrong: I not know
      example_correct: I do not know
      explanation: 'Transfer from L1: Omission of do-support in negation.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Post-verbal negation
      example: 'FR ''Je sais not'' -> Error: ''I know not'' -> Correct: ''I do not
        know'''
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Post-verbal negation.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I not know the answer.
      correct: I do not know the answer.
    - wrong: She not likes coffee.
      correct: She does not like coffee.
    - wrong: They not have time.
      correct: They do not have time.
    why_it_happens: French negation wraps the verb with 'ne...pas' (je ne sais pas).
      English uses 'do/does/did + not + base verb'. French learners may transfer the
      post-verbal negation pattern or omit do-support entirely.
    teacher_tips:
      how_to_explain: 'Teach the formula: do/does/did + not + base verb. Drill: I
        do not, you do not, he does not, she does not. Emphasize that ''not'' goes
        AFTER the auxiliary, not after the main verb.'
      where_to_start: Start with present simple negation. Then past simple. Then questions.
      sequencing: 'Week 1: Present simple negation. Week 2: Past simple negation.
        Week 3: Negative questions. Week 4: Review.'
      exercises:
      - name: Negation Transformation
        type: sentence-rewrite
        description: Students rewrite 15 affirmative sentences as negative using do-support.
        duration: 15
      - name: FR Negation Translation
        type: translation
        description: Translate 15 French ne...pas sentences into correct English.
        duration: 15
      - name: Error Correction
        type: error-correction
        description: 15 sentences with negation errors. Students correct.
        duration: 10
      - name: Negative Story
        type: composition
        description: Students write a short story using at least 5 different negative
          forms.
        duration: 15
    sources:
    - Swan & Smith "Learner English" Ch. 6
    - Parrott "Grammar for English Language Teachers"
