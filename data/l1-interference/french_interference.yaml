  prepositions:
    interference_patterns:
    - pattern: Transfer of French prepositions
      example: 'FR ''Je pense a'' (I think to) -> Error: ''I think to you'' -> Correct:
        ''I think of you'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of de/du for possession
      example: 'FR ''Le livre de Jean'' (the book of Jean) -> Error: ''The book of
        Jean'' -> Correct: ''Jean''s book'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I think to you often.
      correct: I think of you often.
    - wrong: The book of Jean is interesting.
      correct: Jean's book is interesting.
    - wrong: I go at school.
      correct: I go to school.
    why_it_happens: French prepositions often differ from English. French 'penser
      a' (think to) vs English 'think of'. French uses 'de' (of) for possession where
      English uses 's or of. French 'aller a' (go to) vs English 'go to'.
    teacher_tips:
      how_to_explain: 'Teach common French-English preposition differences: penser
        a = think of, aller a = go to, parler de = talk about. For possession: use
        ''s for people, of for things.'
      where_to_start: Start with the most common preposition transfers. Then teach
        possession.
      sequencing: 'Week 1: Verb + preposition differences. Week 2: Prepositions of
        place. Week 3: Prepositions of time. Week 4: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 French sentences with correct English prepositions.
        duration: 15
      - name: Preposition Error Hunt
        type: error-correction
        description: A paragraph with 10 preposition errors. Students find and fix.
        duration: 15
      - name: FR Preposition Match
        type: matching
        description: Students match French prepositions with English equivalents.
        duration: 10
      - name: Possession Practice
        type: sentence-rewrite
        description: Students rewrite 10 de phrases using English possessive forms.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 6
