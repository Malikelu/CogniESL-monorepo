    - wrong: I will assist the meeting.
      correct: I will attend the meeting.
    - wrong: The food is exquisite!
      correct: The food is delicious!
    why_it_happens: French and English share many Latin-derived cognates, but some
      have shifted meaning. These 'false friends' cause high-impact communication
      errors because the words look similar but mean different things.
    teacher_tips:
      how_to_explain: Create a 'False Friends Wall' in the classroom. List the top
        20 FR-EN false friends with both meanings. Have students create flashcards.
      where_to_start: 'Start with the highest-impact false friends: actually/currently,
        attend/assist, delicious/exquisite.'
      sequencing: 'Week 1: Top 10 false friends. Week 2: Next 10 false friends. Week
        3: Context-based practice. Week 4: Review.'
      exercises:
      - name: False Friend Flashcards
        type: matching
        description: Students create flashcards for 20 false friends and quiz each
          other.
        duration: 15
      - name: Context Clues
        type: fill-in-the-blank
        description: 15 sentences where students choose between false friend pairs
          based on context.
        duration: 10
      - name: FR-EN False Friend Translation
        type: translation
        description: Translate 10 French sentences containing false friends into correct
          English.
        duration: 15
      - name: False Friend Story
        type: composition
        description: Students write a short story using at least 5 false friends correctly.
        duration: 20
