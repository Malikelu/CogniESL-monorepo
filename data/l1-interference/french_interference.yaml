  modal_usage:
    interference_patterns:
    - 'French ''Je peux'' -> English error: ''I can to go'' -> Correct: ''I can go'''
    - 'French ''Je dois'' -> English error: ''I must to go'' -> Correct: ''I must
      go'''
    - 'French ''Je voudrais'' -> English error: ''I would like go'' -> Correct: ''I
      would like to go'''
    why_it_happens: French modal-like verbs are followed by infinitives directly.
      However, 'vouloir' requires 'to' in English ('would like TO go').
    teacher_tips:
      how_to_explain: English modals (can, must, should, will, would) are followed
        by the BASE verb (no 'to'). But 'want' and 'would like' need 'to'.
      where_to_start: 'Teach the modal rule: modal + base verb.'
      exercises:
      - name: Modal + Base Verb Drill
        type: fill-in-the-blank
        description: 20 sentences practicing modal + base verb (no 'to').
        duration: 10
      - name: To-Deletion After Modals
        type: error-correction
        description: Remove 'to' after modals in 15 sentences.
        duration: 10
    examples:
    - 'Wrong: ''I can to go.'' Correct: ''I can go.'''
    - 'Wrong: ''I must to go.'' Correct: ''I must go.'''
    - 'Wrong: ''I would like go.'' Correct: ''I would like to go.'''
    sources:
    - Sprouse, R. (1988). Learnability and the acquisition of French negation by English
      speakers. Linguistic Inquiry, 19(1), 45-70.
    - Harley, B. (1979). French gender rules in acquisition by English speakers. Language
      Learning, 29(1), 37-56.
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    source_count: 3
    source_type: peer-reviewed
