  relative_clauses:
    interference_patterns:
    - pattern: Use of dont for whose/of which
      example: 'FR ''le livre dont je parle'' (the book of-which I speak) -> Error:
        ''The book of which I speak'' (correct but formal) -> Correct: ''The book
        I''m talking about'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Use of que for both that and which
      example: 'FR ''que'' = that/which -> Error: ''The book which I read'' (correct)
        but overuse of which'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - wrong: The man which I met is my boss.
      correct: The man that I met is my boss.
    - wrong: The car who is parked outside is mine.
      correct: The car that is parked outside is mine.
    - wrong: The book what I read was interesting.
      correct: The book that I read was interesting.
    why_it_happens: French uses 'que' as a universal relative pronoun and 'dont' for
      possession/of-which. English distinguishes that/which/who/whose. French learners
      may overuse 'which' or use 'what' as a relative pronoun.
    teacher_tips:
      how_to_explain: 'Teach: For people -> who/that. For things -> that/which. ''That''
        for essential info (restrictive). ''Which'' for extra info (non-restrictive,
        with comma). ''What'' is NEVER a relative pronoun.'
      where_to_start: Start with 'that' as the default relative pronoun. Then introduce
        'who' for people and 'which' for non-restrictive clauses.
      sequencing: 'Week 1: That for things and people. Week 2: Who for people. Week
        3: Which for non-restrictive clauses. Week 4: Omitting relative pronouns.'
      exercises:
      - name: Relative Pronoun Choice
        type: fill-in-the-blank
        description: 15 sentences where students choose that/which/who.
        duration: 10
      - name: FR Relative Translation
        type: translation
        description: Translate 15 French relative clauses into correct English.
        duration: 15
      - name: Relative Clause Combining
        type: sentence-rewrite
        description: Students combine 10 pairs of sentences using relative pronouns.
        duration: 15
      - name: Description Activity
        type: oral-drill
        description: Students describe people and things using relative clauses.
        duration: 10
