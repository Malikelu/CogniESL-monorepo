  reported_speech:
    interference_patterns:
    - pattern: No backshift of tenses
      example: 'FR ''Il dit qu''il est fatigue'' -> Error: ''He said that he is tired''
        -> Correct: ''He said that he was tired'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Use of que for that
      example: 'FR ''Il dit que'' (he says that) -> Error: ''He says that he is tired''
        (correct) but no backshift'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: She said that she is tired.
      correct: She said that she was tired.
    - wrong: He told me that he will come.
      correct: He told me that he would come.
    - wrong: They said that they are leaving.
      correct: They said that they were leaving.
    why_it_happens: French reported speech often retains the original tense, especially
      when the reported information is still true. English requires backshift (present
      -> past, will -> would). French learners transfer the L1 pattern.
    teacher_tips:
      how_to_explain: 'Teach the backshift rule: Direct speech present -> reported
        past. Direct will -> reported would. Direct can -> reported could.'
      where_to_start: Start with the basic backshift pattern. Then teach pronoun changes.
      sequencing: 'Week 1: Say/tell + backshift. Week 2: Pronoun changes. Week 3:
        Modal backshift. Week 4: Questions and commands in reported speech.'
      exercises:
      - name: Backshift Practice
        type: sentence-rewrite
        description: Students convert 15 direct speech sentences to reported speech.
        duration: 15
      - name: FR Reported Speech Translation
        type: translation
        description: Translate 15 French reported speech sentences into correct English.
        duration: 15
      - name: News Reporter
        type: composition
        description: Students write a short news article using reported speech.
        duration: 20
      - name: Telephone Game
