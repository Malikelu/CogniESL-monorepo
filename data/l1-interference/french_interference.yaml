  gender_of_nouns:
    interference_patterns:
    - 'French ''la table'' (feminine) -> English error: ''she is a big table'' ->
      Correct: ''it is a big table'''
    - 'French ''le soleil'' (masculine) -> English error: ''he is shining'' -> Correct:
      ''it is shining'''
    why_it_happens: French has grammatical gender for all nouns. English has natural
      gender only (he/she for people, it for things).
    teacher_tips:
      how_to_explain: English uses 'it' for all objects. Only use 'he' or 'she' for
        people.
      where_to_start: 'Practice: it for things, he/she for people.'
      exercises:
      - name: Pronoun Choice
        type: fill-in-the-blank
        description: Students choose he/she/it for 20 nouns.
        duration: 10
      - name: Gender Awareness Translation
        type: translation
        description: List 10 French nouns with gender, show English uses 'it' for
          all.
        duration: 10
    examples:
    - 'Wrong: ''She is a big table.'' Correct: ''It is a big table.'''
    - 'Wrong: ''He is shining'' (the sun). Correct: ''It is shining.'''
    sources:
