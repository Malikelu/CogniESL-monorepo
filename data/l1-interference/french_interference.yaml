    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Persistent.
  many_much:
    interference_patterns:
    - 'French ''beaucoup de'' (same for countable/uncountable) -> English error: ''I
      have much books'' -> Correct: ''I have many books'''
    - 'French ''beaucoup de travail'' -> English error: ''I have many work'' -> Correct:
      ''I have much work'''
    why_it_happens: French uses 'beaucoup de' for both countable and uncountable nouns.
      English distinguishes many (countable) from much (uncountable).
    teacher_tips:
      how_to_explain: Use MANY for things you can count (books, people). Use MUCH
        for things you can't count (water, time).
      where_to_start: Teach the count vs non-count distinction.
      exercises:
      - name: Many/Much Sorting
        type: categorization
        description: Students categorize nouns as countable/uncountable, then use
          many/much.
        duration: 10
      - name: Quantifier Error Correction
        type: error-correction
        description: Fix 'much books' -> 'many books', 'many work' -> 'much work'
          in 15 sentences.
        duration: 10
    examples:
    - 'Wrong: ''I have much books.'' Correct: ''I have many books.'''
    - 'Wrong: ''I have many work.'' Correct: ''I have much work.'''
    sources:
    - Sprouse, R. (1988). Learnability and the acquisition of French negation by English
      speakers. Linguistic Inquiry, 19(1), 45-70.
    - Harley, B. (1979). French gender rules in acquisition by English speakers. Language
      Learning, 29(1), 37-56.
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Frequent.
  copula_oubli:
    interference_patterns:
    - 'French ''Il professeur'' -> English error: ''He teacher'' -> Correct: ''He
      is a teacher'''
    - 'French ''Je fatigue'' -> English error: ''I tired'' -> Correct: ''I am tired'''
    why_it_happens: French sometimes omits the copula in informal speech. English
      ALWAYS requires a copula before adjectives and noun predicates.
    teacher_tips:
      how_to_explain: English ALWAYS needs 'be' before adjectives and noun predicates.
        'He IS a teacher' (not 'He teacher').
      where_to_start: 'Practice: Subject + be + adjective/noun.'
      exercises:
      - name: Copula Insertion
        type: fill-in-the-blank
        description: Add 'be' where missing in 20 sentences.
        duration: 10
      - name: Description Activity
        type: writing
        description: Students describe people using 'be + adjective' and 'be + noun.'
        duration: 15
    examples:
    - 'Wrong: ''He teacher.'' Correct: ''He is a teacher.'''
    - 'Wrong: ''I tired.'' Correct: ''I am tired.'''
    sources:
    - Sprouse, R. (1988). Learnability and the acquisition of French negation by English
      speakers. Linguistic Inquiry, 19(1), 45-70.
    - Harley, B. (1979). French gender rules in acquisition by English speakers. Language
      Learning, 29(1), 37-56.
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Common early error.
  passive_voice:
    interference_patterns:
    - 'French ''Le livre a ete ecrit'' -> English error: ''The letter was send'' ->
      Correct: ''The letter was sent'''
    - 'French ''On dit que...'' -> English error: ''One says that...'' -> Correct:
      ''It is said that...'''
    why_it_happens: French passive uses 'etre + past participle.' French learners
      may forget irregular past participles or struggle with the impersonal 'on' construction.
    teacher_tips:
      how_to_explain: 'English passive: be + past participle. The past participle
        never changes form. ''Was written'' (not ''was wrote'').'
      where_to_start: Teach regular vs irregular past participles.
      exercises:
      - name: Active to Passive Conversion
        type: transformation
        description: Convert 15 active sentences to passive voice.
        duration: 15
      - name: Past Participle Drill
        type: fill-in-the-blank
        description: Students provide correct past participles for 20 common verbs.
        duration: 10
    examples:
    - 'Wrong: ''The letter was send.'' Correct: ''The letter was sent.'''
    - 'Wrong: ''One says that he is rich.'' Correct: ''It is said that he is rich.'''
    sources:
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    - Snape, N. (2008). Resetting the article parameter in L2 English. Second Language
      Research, 24(1), 71-95.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
