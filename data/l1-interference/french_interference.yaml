language: French
language_code: fr
schema_version: '4.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of article before professions
      frequency: 5
      persistence: 4
      communicative_impact: 3
      example_l1: FR 'Elle est medecin'
      example_gloss: she is doctor
      example_wrong: She is doctor
      example_correct: She is a doctor
      explanation: 'Transfer from L1: Omission of article before professions.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Partitive article confusion
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: FR 'Je veux du pain'
      example_gloss: I want of-the bread
      example_wrong: I want of bread
      example_correct: I want bread' / 'I want some bread
      explanation: 'Transfer from L1: Partitive article confusion.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: She is doctor.
      correct: She is a doctor.
    - wrong: I want of bread.
      correct: I want some bread.
    - wrong: He is the best student of class.
      correct: He is the best student in the class.
    why_it_happens: French requires an article before professions ('elle est medecin'
      uses 'est' without article in French but English requires 'a/an'). French also
      uses partitive articles (du, de la, des) that have no direct English equivalent.
      French learners may omit articles or transfer partitive constructions.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES ''a/an'' after ''be'' for professions.
        Contrast: FR ''Elle est medecin'' -> EN ''She is a doctor''. For partitives,
        teach: ''du/de la/des'' = ''some'' or nothing in English.'
      where_to_start: Start with the profession pattern (highest frequency). Then
        teach partitive articles.
      sequencing: 'Week 1: Articles with professions. Week 2: Partitive articles.
        Week 3: Definite vs indefinite. Week 4: Article review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with French-influenced article errors. Students
          correct.
        duration: 15
      - name: FR-to-EN Translation
        type: translation
        description: Translate 15 French sentences focusing on article differences.
        duration: 20
      - name: Article Decision Tree
        type: fill-in-the-blank
        description: Students complete a flowchart for article choice.
        duration: 10
      - name: Profession Flashcards
        type: matching
        description: Students match French professions with correct English forms
          (with a/an).
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 6 (French)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
