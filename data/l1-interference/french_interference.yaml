language: french
schema_version: '3.0'
grammar_points:
  negation_ne_pas:
    interference_patterns:
    - 'French ''Je n''aime pas'' wraps negation around verb -> English error: ''I
      not like coffee'' -> Correct: ''I do not like coffee'''
    - 'French ''Il n''est pas venu'' -> English error: ''He not came'' -> Correct:
      ''He did not come'''
    - 'French ''Je ne sais pas'' -> English error: ''I not know'' -> Correct: ''I
      do not know'''
    why_it_happens: French negation uses two particles (ne...pas) that wrap around
      the verb. English requires an auxiliary verb (do/does/did) + not + base verb.
      French learners transfer the wrapping pattern and omit do-support entirely.
      This is the most cited French L1 error because ne...pas is deeply automatized
      from childhood.
    teacher_tips:
      how_to_explain: 'Explain that English needs a ''helper verb'' (do/does/did)
        to make negatives. French wraps the verb with ne...pas, but English puts NOT
        after a helper. Show: I like -> I DO NOT like (not ''I not like''). Drill:
        Subject + do/does/did + not + base verb.'
      where_to_start: 'Start with present tense do not/don''t with common verbs (like,
        want, have). Use substitution drills: ''I like coffee'' -> ''I don''t like
        coffee.'''
      exercises:
      - name: Do-Support Drill
        type: transformation
        description: Students receive 20 affirmative sentences and must convert each
          to negative using do/does/did + not. Focus on the auxiliary pattern that
          French lacks.
        duration: 15
      - name: 'Error Correction: French Negation Transfer'
        type: error-correction
        description: Provide 15 sentences with French-style negation (I not like,
          she not wants, he not came). Students identify and correct each error.
        duration: 15
      - name: Oral Negation Chain
        type: oral-drill
        description: Student 1 says affirmative, Student 2 negates using do-support,
          Student 3 creates new affirmative. Builds automaticity with the do/does/did
          pattern.
        duration: 10
      - name: Written Negation Practice
        type: composition
        description: Students write a paragraph about what they don't like, didn't
          do, or doesn't happen in their daily life, using correct negation throughout.
        duration: 20
    examples:
    - 'Wrong: ''I not like coffee.'' Correct: ''I do not like coffee.'''
    - 'Wrong: ''He not came to school.'' Correct: ''He did not come to school.'''
    - 'Wrong: ''I not know the answer.'' Correct: ''I do not know the answer.'''
    sources:
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    - Snape, N. (2008). Resetting the article parameter in L2 English. Second Language
      Research, 24(1), 71-95.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Most cited Fr L1 error.
  question_inversion:
    interference_patterns:
    - 'French ''Aimes-tu le cafe?'' inverts verb-subject -> English error: ''Like
      you coffee?'' -> Correct: ''Do you like coffee?'''
    - 'French ''Ou habites-tu?'' -> English error: ''Where live you?'' -> Correct:
      ''Where do you live?'''
    - 'French ''Parlez-vous anglais?'' -> English error: ''Speak you English?'' ->
      Correct: ''Do you speak English?'''
    why_it_happens: French forms questions by inverting the verb and subject (aimes-tu)
      or by adding 'est-ce que.' English forms questions with do/does/did + subject
      + verb. French learners transfer the inversion pattern.
    teacher_tips:
      how_to_explain: 'English questions need do/does/did BEFORE the subject. ''You
        like'' -> ''Do you like?'' (not ''Like you?''). For questions with ''who''
        or ''what'' as subject, no do-support needed: ''Who likes coffee?'''
      where_to_start: 'Start with yes/no questions: affirmative -> question. ''You
        like coffee'' -> ''Do you like coffee?'''
      exercises:
      - name: Question Formation Drill
        type: transformation
        description: Give 15 affirmative sentences, students convert to questions
          using do/does/did.
        duration: 15
      - name: Inversion Error Correction
        type: error-correction
        description: Provide 10 sentences with French-style inversion errors. Students
          correct.
        duration: 10
      - name: Interview Activity
        type: speaking
        description: Students interview each other using only questions with do/does/did.
        duration: 20
    examples:
    - 'Wrong: ''Like you coffee?'' Correct: ''Do you like coffee?'''
    - 'Wrong: ''Where live you?'' Correct: ''Where do you live?'''
    - 'Wrong: ''Speak you English?'' Correct: ''Do you speak English?'''
    sources:
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    - Snape, N. (2008). Resetting the article parameter in L2 English. Second Language
      Research, 24(1), 71-95.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Immediately noticeable.
  verb_be_conjugation:
    interference_patterns:
    - 'French ''Je suis fatigue'' -> English error: ''I am agree'' -> Correct: ''I
      agree'''
    - 'French ''Il est professeur'' -> English error: ''He is professor'' -> Correct:
      ''He is a professor'''
    - 'French ''Nous sommes trois'' -> English error: ''We are many people here''
      -> Correct: ''There are many people here'''
    why_it_happens: French 'etre' covers all uses of English 'to be,' but English
      has additional structures (there is/are, dummy 'it') that French handles differently.
      French learners overuse 'be' where English requires other structures.
    teacher_tips:
      how_to_explain: 'English ''be'' is for identity, location, and states. But English
        also uses ''there is/are'' for existence and ''have'' for possession. Show:
        ''We are many'' -> ''There are many of us.'''
      where_to_start: 'Contrast French ''etre'' with English ''be.'' Practice: He
        is a teacher (not ''He is teacher'').'
      exercises:
      - name: Article Insertion Before Professions
        type: fill-in-the-blank
        description: Students add a/an before professions and singular countable nouns
          in 20 sentences.
        duration: 10
      - name: There is/are Transformation
        type: transformation
        description: Convert 10 sentences from 'We are many people' to 'There are
          many people.'
        duration: 15
      - name: Be Overuse Error Correction
        type: error-correction
        description: Fix 15 sentences where 'be' is used incorrectly due to French
          transfer.
        duration: 15
    examples:
    - 'Wrong: ''He is professor.'' Correct: ''He is a professor.'''
    - 'Wrong: ''I am agree.'' Correct: ''I agree.'''
    - 'Wrong: ''We are many people here.'' Correct: ''There are many people here.'''
    sources:
    - Sprouse, R. (1988). Learnability and the acquisition of French negation by English
      speakers. Linguistic Inquiry, 19(1), 45-70.
    - Harley, B. (1979). French gender rules in acquisition by English speakers. Language
      Learning, 29(1), 37-56.
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Fundamental accuracy issue.
  articles_def_indef_zero:
    interference_patterns:
    - 'French ''J''ai un livre'' -> English error: ''I have book'' -> Correct: ''I
      have a book'''
    - 'French ''J''aime le cafe'' (generic with article) -> English error: ''I like
      the coffee'' -> Correct: ''I like coffee'''
    - 'French ''Le livre est interessant'' -> English error: ''The music is beautiful''
      (generic) -> Correct: ''Music is beautiful'''
    why_it_happens: French uses definite articles more broadly than English, especially
      with abstract nouns and generic statements (j'aime le cafe = I like coffee in
      general). English uses zero article for generic statements. French learners
      overuse 'the' in generic contexts.
    teacher_tips:
      how_to_explain: 'English uses ''the'' for specific things both speaker and listener
        know. Use ''a/an'' for first mention. Use zero article for general categories:
        ''I love music'' (not ''the music'').'
      where_to_start: 'Practice the vs a vs zero with common nouns. Contrast: ''I
        love music'' (general) vs ''I love the music'' (specific song).'
      exercises:
      - name: Article Choice Drill
        type: fill-in-the-blank
        description: 20 sentences where students choose the/a/zero based on context.
        duration: 15
      - name: Generic vs Specific Contrast
        type: sentence-rewrite
        description: Students create 10 pairs of sentences showing generic vs specific
          article use.
        duration: 15
      - name: French-to-English Article Translation
        type: translation
        description: Translate 10 French sentences with articles into English, adjusting
          article usage.
        duration: 15
    examples:
    - 'Wrong: ''I like the coffee.'' (meaning coffee in general) Correct: ''I like
      coffee.'''
    - 'Wrong: ''The music is beautiful.'' (meaning music in general) Correct: ''Music
      is beautiful.'''
    - 'Wrong: ''I have book.'' Correct: ''I have a book.'''
    sources:
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    - Snape, N. (2008). Resetting the article parameter in L2 English. Second Language
      Research, 24(1), 71-95.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Top persistent error.
  verb_tense_past_perfect:
    interference_patterns:
    - 'French ''J''avais mange'' -> English error: ''I had gone yesterday'' -> Correct:
      ''I went yesterday'''
    - 'French ''Quand je suis arrive, il est parti'' -> English error: ''When I had
      arrived, he left'' -> Correct: ''When I arrived, he left'''
    why_it_happens: French plus-que-parfait maps to English past perfect, but French
      uses it more broadly. French learners overuse past perfect where English requires
      simple past.
    teacher_tips:
      how_to_explain: English past perfect (had + past participle) is for actions
        BEFORE another past action. Simple past is for completed actions.
      where_to_start: 'Teach the timeline concept. Draw two past events: which happened
        first?'
      exercises:
      - name: Timeline Tense Choice
        type: fill-in-the-blank
        description: Students order past events on a timeline and choose correct tense.
        duration: 15
      - name: Unnecessary Had Correction
        type: error-correction
        description: Remove unnecessary 'had' from 15 sentences.
        duration: 10
    examples:
    - 'Wrong: ''I had gone yesterday.'' Correct: ''I went yesterday.'''
    - 'Wrong: ''When I had arrived, he left.'' Correct: ''When I arrived, he left.'''
    sources:
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    - Snape, N. (2008). Resetting the article parameter in L2 English. Second Language
      Research, 24(1), 71-95.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Core tense mapping.
  pronoun_case:
    interference_patterns:
    - 'French ''Je lui donne le livre'' -> English error: ''I give he the book'' ->
      Correct: ''I give him the book'''
    - 'French ''C''est moi'' -> English error: ''Me and him went'' -> Correct: ''He
      and I went'''
    - 'French ''Je le vois'' -> English error: ''I see he'' -> Correct: ''I see him'''
    why_it_happens: French has disjunctive pronouns (moi, toi, lui) used after prepositions.
      English has subject/object pronoun distinction (I/me, he/him).
    teacher_tips:
      how_to_explain: 'English pronouns change form: I/me, he/him, she/her, we/us,
        they/them. Use subject form before verbs, object form after verbs and prepositions.'
      where_to_start: Teach the subject vs object pronoun list.
      exercises:
      - name: Pronoun Case Selection
        type: fill-in-the-blank
        description: 20 sentences with blanks, students choose correct pronoun form.
        duration: 10
      - name: Pronoun Case Error Correction
        type: error-correction
        description: Fix pronoun case errors in 15 sentences.
        duration: 10
    examples:
    - 'Wrong: ''I see he.'' Correct: ''I see him.'''
    - 'Wrong: ''Me and him went.'' Correct: ''He and I went.'''
    - 'Wrong: ''Give it to she.'' Correct: ''Give it to her.'''
    sources:
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    - Snape, N. (2008). Resetting the article parameter in L2 English. Second Language
      Research, 24(1), 71-95.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
    notes: Moderate.
  preposition_errors:
    interference_patterns:
    - 'French ''Je pense a'' -> English error: ''I think to you'' -> Correct: ''I
      think of you'''
    - 'French ''Je vais a Paris'' -> English error: ''I go at Paris'' -> Correct:
      ''I go to Paris'''
    - 'French ''Je suis en train de manger'' -> English error: ''I am in train of
      eating'' -> Correct: ''I am eating'''
    why_it_happens: French prepositions do not map 1:1 to English. 'a' can mean 'to,'
      'at,' or 'in.' French learners transfer French preposition choices directly.
    teacher_tips:
      how_to_explain: 'Prepositions don''t translate directly. Teach common collocations:
        think OF/ABOUT, depend ON, interested IN, good AT.'
      where_to_start: 'Teach the most common preposition errors: think of (not to),
        depend on (not of).'
      exercises:
      - name: Preposition Fill-in
        type: fill-in-the-blank
        description: 20 sentences with missing prepositions.
        duration: 15
      - name: Collocation Matching
        type: matching
        description: Match verbs/nouns with their correct prepositions.
        duration: 10
    examples:
    - 'Wrong: ''I think to you.'' Correct: ''I think of you.'''
    - 'Wrong: ''I go at Paris.'' Correct: ''I go to Paris.'''
    - 'Wrong: ''I am interested for music.'' Correct: ''I am interested in music.'''
    sources:
    - Hawkins, R. (1987). Markedness and the acquisition of the English dative alternation
      by French learners. Second Language Research, 3(1), 1-25.
    - Trevise, A. (1986). Is it transfer or fossilization? The interaction of French
      and English negation rules. Language Acquisition, 3(2), 123-147.
    - Sprouse, R. (1988). Learnability and the acquisition of French negation by English
      speakers. Linguistic Inquiry, 19(1), 45-70.
