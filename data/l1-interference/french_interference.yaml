      correct: I am very happy.
    - wrong: I have an our.
      correct: I have an hour.
    - wrong: He is from the hitery.
      correct: He is from history.
    why_it_happens: French has many silent final consonants and a silent 'h' at the
      beginning of words. English pronounces most final consonants and has both pronounced
      and silent 'h'. French learners may either pronounce silent letters or fail
      to pronounce required sounds.
    teacher_tips:
      how_to_explain: 'Teach: English ''h'' is pronounced at the start of most words
        (hour, honest are exceptions). Most final consonants are pronounced in English.
        Practice: house, horse, happy (h pronounced). Hour, honest, honor (h silent).'
      where_to_start: Start with 'h' pronunciation. Then teach final consonant pronunciation.
      sequencing: 'Week 1: H pronunciation. Week 2: Final consonants. Week 3: TH sounds.
        Week 4: Review.'
      exercises:
      - name: H Pronunciation
        type: oral-drill
        description: Students practice 20 words with h, distinguishing pronounced
          vs silent.
