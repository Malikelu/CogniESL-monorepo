  pronouns:
    interference_patterns:
    - pattern: Use of on as impersonal pronoun
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: FR 'On mange'
      example_gloss: one eats
      example_wrong: One eats here' (too formal)
      example_correct: People eat here' / 'We eat here
      explanation: 'Transfer from L1: Use of on as impersonal pronoun.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of y and en pronouns
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: FR 'J'y vais'
      example_gloss: I there go
      example_wrong: I go there' (correct) but 'J'en veux' (I of-it want)
      example_correct: 'Error: ''I want of it'' -> Correct: ''I want some'
      explanation: 'Transfer from L1: Use of y and en pronouns.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: One eats here every day.
      correct: People eat here every day.
    - wrong: I of-it want some.
      correct: I want some.
    - wrong: I there go tomorrow.
      correct: I go there tomorrow.
    why_it_happens: French uses 'on' (one/people/we) as an impersonal pronoun, which
      is more natural than English 'one'. French also has unique pronouns 'y' (there/it)
      and 'en' (of it/some) that have no direct English equivalent.
    teacher_tips:
      how_to_explain: 'Teach: French ''on'' = ''people/we/you'' in English (not ''one''
        which is too formal). French ''y'' = ''there''. French ''en'' = ''some/of
        it''.'
      where_to_start: Start with 'on' -> 'people/we'. Then teach 'y' and 'en'.
      sequencing: 'Week 1: On -> people/we. Week 2: Y -> there. Week 3: En -> some/of
        it. Week 4: Review.'
      exercises:
      - name: Pronoun Translation
        type: translation
        description: Translate 15 French sentences with on, y, en into correct English.
        duration: 15
      - name: On Substitution
        type: sentence-rewrite
        description: Students rewrite 10 sentences replacing 'one' with 'people' or
          'we'.
        duration: 10
      - name: Y and En Practice
        type: fill-in-the-blank
        description: 15 sentences where students replace y and en with English equivalents.
        duration: 10
      - name: FR Pronoun Review
        type: error-correction
        description: 10 sentences with pronoun errors. Students correct.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 6
    - Parrott "Grammar for English Language Teachers"
