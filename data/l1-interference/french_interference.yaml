  passive_voice:
    interference_patterns:
    - pattern: Avoidance of passive voice
      example: 'FR uses ''on'' for impersonal -> Error: ''One sells books here'' ->
        Correct: ''Books are sold here'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of on instead of passive
      example: 'FR ''On parle francais'' (one speaks French) -> Error: ''One speaks
        French here'' -> Correct: ''French is spoken here'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: One sells books in this store.
      correct: Books are sold in this store.
    - wrong: One speaks French here.
      correct: French is spoken here.
    - wrong: One built this house in 1900.
      correct: This house was built in 1900.
    why_it_happens: French uses 'on' (one/people) for impersonal constructions where
      English prefers passive voice. French learners may transfer the 'on' construction,
      creating awkward English.
    teacher_tips:
      how_to_explain: 'Teach the passive formula: be + past participle. Show when
        to use it: when the action is more important than the agent, when the agent
        is unknown, or in formal writing.'
      where_to_start: Start with the passive formula. Then teach when to use passive
        vs active.
      sequencing: 'Week 1: Passive formula (be + past participle). Week 2: Present
        and past passive. Week 3: When to use passive. Week 4: Passive in formal writing.'
      exercises:
      - name: Active to Passive
        type: sentence-rewrite
        description: Students convert 15 active sentences to passive voice.
        duration: 15
      - name: FR On to EN Passive
        type: translation
        description: Translate 15 French on sentences into English passive.
        duration: 15
      - name: Passive to Active
        type: sentence-rewrite
        description: Students convert 10 passive sentences to active, adding an agent.
        duration: 10
      - name: News Headlines
        type: composition
        description: Students write 5 news headlines using passive voice.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 6
    - Parrott "Grammar for English Language Teachers"
