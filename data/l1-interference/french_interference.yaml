  linking_words:
    interference_patterns:
    - pattern: Use of mais at sentence start
      example: 'FR ''mais'' = but/however -> Error: ''But, I think...'' -> Correct:
        ''However, I think...'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of donc for so/therefore
      example: 'FR ''donc'' = so/therefore -> Error: ''Donc, we left'' -> Correct:
        ''So, we left'' / ''Therefore, we left'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - wrong: But, I think we should go.
      correct: However, I think we should go.
    - wrong: Donc, we left early.
      correct: So, we left early.
    - wrong: Although it rained, but we went out.
      correct: Although it rained, we went out.
    why_it_happens: French 'mais' functions as both 'but' and 'however'. French also
      uses double conjunctions ('bien que...mais' = although...but), which is redundant
      in English.
    teacher_tips:
      how_to_explain: 'Teach: ''However'' for formal writing. ''But'' for informal.
        ''Although'' and ''but'' NEVER together in English.'
      where_to_start: Start with 'but' vs 'however'. Then teach double conjunction
        redundancy.
      sequencing: 'Week 1: But vs however. Week 2: Although/but redundancy. Week 3:
        Other linking words. Week 4: Review.'
      exercises:
      - name: Formal vs Informal
        type: sentence-rewrite
        description: Students rewrite 10 informal sentences using formal linking words.
        duration: 10
      - name: Double Conjunction Fix
        type: error-correction
        description: 10 sentences with although...but. Students remove the redundant
          conjunction.
        duration: 10
      - name: Linking Word Sort
        type: matching
        description: Students categorize 15 linking words by function.
        duration: 10
      - name: FR Conjunction Translation
        type: translation
        description: Translate 15 French sentences with correct English linking words.
        duration: 15
