  gerund_infinitive:
    interference_patterns:
    - pattern: Use of infinitive after prepositions
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: FR 'avant de manger'
      example_gloss: before to-eat
      example_wrong: Before to eat
      example_correct: Before eating
      explanation: 'Transfer from L1: Use of infinitive after prepositions.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of apres + past infinitive
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: FR 'apres avoir mange'
      example_gloss: after having eaten
      example_wrong: After having eaten' (correct but formal)
      example_correct: After eating
      explanation: 'Transfer from L1: Use of apres + past infinitive.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: Before to leave, say goodbye.
      correct: Before leaving, say goodbye.
    - wrong: After to finish, we went home.
      correct: After finishing, we went home.
    - wrong: I want going to the store.
      correct: I want to go to the store.
    why_it_happens: French uses the infinitive after prepositions (avant de manger
      = before to-eat). English uses gerund after prepositions (before eating). French
      also uses past infinitive (apres avoir mange) where English uses gerund.
    teacher_tips:
      how_to_explain: 'Teach: After prepositions (before, after, without, by, for)
        -> always gerund (-ing). After verbs -> check if it takes infinitive, gerund,
        or both.'
      where_to_start: Start with preposition + gerund (easier rule). Then teach verb
        + infinitive vs verb + gerund.
      sequencing: 'Week 1: Preposition + gerund. Week 2: Verb + infinitive (want,
        need, hope). Week 3: Verb + gerund (enjoy, finish, avoid). Week 4: Verbs that
        take both.'
      exercises:
      - name: Preposition + Gerund
        type: fill-in-the-blank
        description: 15 sentences with prepositions followed by blank. Students fill
          with gerund.
        duration: 10
      - name: FR Gerund Translation
        type: translation
        description: Translate 15 French preposition + infinitive sentences into English
          gerund.
        duration: 15
      - name: Verb Pattern Sort
        type: matching
        description: Students sort 20 verbs into takes infinitive, takes gerund, or
          both columns.
        duration: 10
      - name: Sentence Building
        type: sentence-rewrite
        description: Students rewrite 10 sentences changing the verb form.
        duration: 10
