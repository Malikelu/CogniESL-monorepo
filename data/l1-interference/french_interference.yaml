  comparatives:
    interference_patterns:
    - pattern: Use of plus for all comparatives
      example: 'FR ''plus grand'' (more big) -> Error: ''more big'' -> Correct: ''bigger'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Use of le plus for all superlatives
      example: 'FR ''le plus grand'' (the most big) -> Error: ''the most big'' ->
        Correct: ''the biggest'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - wrong: This car is more big than that one.
      correct: This car is bigger than that one.
    - wrong: She is the most tall in the class.
      correct: She is the tallest in the class.
    - wrong: He is more old than me.
      correct: He is older than me.
    why_it_happens: French forms comparatives with 'plus' + adjective and superlatives
      with 'le/la plus' + adjective. English uses -er/-est for short adjectives and
      more/most for long ones.
    teacher_tips:
      how_to_explain: 'Teach: 1-2 syllable adjectives -> -er/-est. 3+ syllable adjectives
        -> more/most. Exceptions: good -> better -> best.'
      where_to_start: Start with -er/-est rule. Then teach more/most. Then teach irregulars.
      sequencing: 'Week 1: -er/-est with short adjectives. Week 2: More/most with
        long adjectives. Week 3: Irregular comparatives. Week 4: Comparative structures.'
      exercises:
      - name: Comparative Formation
        type: sentence-rewrite
        description: Students rewrite 10 sentences, changing more + adj to -er where
          appropriate.
        duration: 10
      - name: Superlative Challenge
        type: fill-in-the-blank
        description: 15 sentences where students form the correct superlative.
        duration: 10
      - name: FR Comparative Translation
        type: translation
        description: Translate 15 French comparative sentences into correct English.
        duration: 10
      - name: Comparison Paragraph
        type: composition
        description: Students write a paragraph comparing two things using at least
          5 comparatives.
        duration: 15
