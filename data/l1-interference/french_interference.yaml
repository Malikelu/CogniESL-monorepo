  subjunctive:
    interference_patterns:
    - pattern: Use of indicative where subjunctive is needed
      example: 'FR ''Il faut que tu fais'' -> Error: ''It is necessary that you do''
        -> Correct: ''It is necessary that you do'' (same in modern English)'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Overuse of should for subjunctive
      example: 'FR ''Je veux que tu viennes'' -> Error: ''I want that you should come''
        -> Correct: ''I want you to come'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I want that you should come.
      correct: I want you to come.
    - wrong: It is important that he should study.
      correct: It is important that he study.
    - wrong: She suggests that we should leave.
      correct: She suggests that we leave.
    why_it_happens: French has a fully conjugated subjunctive mood used after expressions
      of doubt, desire, and necessity. English has a much-reduced subjunctive (bare
      infinitive in formal contexts). French learners may overuse 'should' as a substitute
      for the subjunctive.
    teacher_tips:
      how_to_explain: 'Teach: After suggest, demand, require, important -> base form
        (no -s, no should). In modern English, ''I suggest that he go'' (formal) =
        ''I suggest that he should go'' (informal). For ''want'', use ''want + person
        + to + verb''.'
      where_to_start: Start with 'want + person + to + verb'. Then teach mandative
        subjunctive.
      sequencing: 'Week 1: Want/wish + person + to. Week 2: Suggest/demand/require
        + base form. Week 3: It is important that + base form. Week 4: Review.'
      exercises:
      - name: Subjunctive Transformation
        type: sentence-rewrite
        description: Students rewrite 10 sentences using correct subjunctive patterns.
        duration: 15
      - name: FR Subjunctive Translation
        type: translation
        description: Translate 15 French subjunctive sentences into correct English.
        duration: 15
      - name: Should or Base Form?
        type: error-correction
        description: 10 sentences where students choose between should and base form.
        duration: 10
      - name: Formal vs Informal
        type: sentence-rewrite
        description: Students rewrite 5 informal sentences in formal subjunctive form.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 6
