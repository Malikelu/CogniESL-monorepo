  subject_verb_agreement:
    interference_patterns:
    - pattern: Omission of third-person -s
      example: 'FR ''il aime'' (he likes) -> Error: ''He like'' -> Correct: ''He likes'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: She like chocolate.
      correct: She likes chocolate.
    - wrong: He go to school every day.
      correct: He goes to school every day.
    - wrong: The news are good.
      correct: The news is good.
    why_it_happens: French verb conjugation includes person/number marking, but the
      third-person singular form is often similar to other persons. English third-person
      singular -s is a unique marker that French learners frequently omit.
    teacher_tips:
      how_to_explain: 'Teach the ''he/she/it + verb-s'' rule as non-negotiable. Drill:
        I like, you like, he likes, she likes, it likes, we like, they like.'
      where_to_start: Start with third-person -s in present simple. Then teach does/doesn't.
      sequencing: 'Week 1: Third-person -s. Week 2: Does/doesn''t in questions/negatives.
        Week 3: Irregular third-person forms. Week 4: Review.'
      exercises:
      - name: Agreement Drill
        type: oral-drill
        description: Students describe a classmate daily routine using third-person
          -s.
        duration: 10
      - name: Subject-Verb Match
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct verb form.
        duration: 10
      - name: Error Correction
        type: error-correction
        description: 15 sentences with agreement errors. Students correct.
        duration: 10
      - name: Daily Routine Writing
        type: composition
        description: Students write about another person daily routine using third-person
          -s.
        duration: 15
    sources:
