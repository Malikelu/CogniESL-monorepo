  conditional_if:
    interference_patterns:
    - 'French ''Si j''aurais'' -> English error: ''If I would have money'' -> Correct:
      ''If I had money'''
    - 'French ''Si je serais riche'' -> English error: ''If I would be rich'' -> Correct:
      ''If I were rich'''
    - 'French ''Si + present, future'' -> English error: ''If I will have time, I
      will go'' -> Correct: ''If I have time, I will go'''
    why_it_happens: French uses the conditional after 'si' (if) where English uses
      the past tense. French learners transfer the conditional to English.
    teacher_tips:
      how_to_explain: 'In English, ''if'' is NEVER followed by ''will'' or ''would''
        in the if-clause. First conditional: If + present, will + base. Second conditional:
        If + past, would + base.'
      where_to_start: Teach the three conditionals as a system.
      exercises:
      - name: Conditional Formation
        type: fill-in-the-blank
        description: Give the 'if' part, students complete with correct tense.
        duration: 15
      - name: Would-Had Correction
        type: error-correction
        description: Fix 'if I would have' -> 'if I had' in 15 sentences.
        duration: 10
    examples:
    - 'Wrong: ''If I would have money, I would buy a car.'' Correct: ''If I had money,
      I would buy a car.'''
    - 'Wrong: ''If I will have time, I will go.'' Correct: ''If I have time, I will
      go.'''
    sources:
    - Harley, B. (1979). French gender rules in acquisition by English speakers. Language
      Learning, 29(1), 37-56.
    - 'Labeau, E. (2005). Beyond the aspect hypothesis: Tense-aspect development in
      advanced L2 French. Language Sciences, 27(4), 347-372.'
    - Ionin, T. & Montrul, S. (2010). The role of L1 transfer in the interpretation
      of articles with definite plurals. Second Language Research, 26(1), 3-36.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — French
