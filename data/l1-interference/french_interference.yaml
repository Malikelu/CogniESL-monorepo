    - French uses gender agreement which does not exist in English, causing transfer
      errors related to 'subjunctive mood'.
    why_it_happens: French handles 'subjunctive mood' differently from English. French
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the French structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between French and English for 'subjunctive
        mood'. Show the French structure side-by-side with English. Highlight the
        specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how French handles
        'subjunctive mood' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 French sentences, students translate to English, focusing
          on correct 'subjunctive mood' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with French-style 'subjunctive mood' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'subjunctive
          mood' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'subjunctive
          mood' errors.
        duration: 15
    examples:
    - 'Wrong: Applying French ''subjunctive mood'' structure to English. Correct:
      Use the English structure for ''subjunctive mood''.'
    - 'Wrong: Direct translation of French ''subjunctive mood'' pattern. Correct:
      Follow English ''subjunctive mood'' conventions.'
    - 'Wrong: Correct: Use English-specific ''subjunctive mood'' patterns.'
