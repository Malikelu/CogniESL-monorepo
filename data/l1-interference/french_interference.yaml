  adverbs:
    interference_patterns:
    - pattern: Use of adjective instead of adverb
      example: 'FR ''lent'' = slow/slowly -> Error: ''He drives very slow'' -> Correct:
        ''He drives very slowly'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: He runs very fastly.
      correct: He runs very fast. / He runs very quickly.
    - wrong: She speaks English good.
      correct: She speaks English well.
    - wrong: They arrived lately.
      correct: They arrived late.
    why_it_happens: French does not always distinguish morphologically between adjectives
      and adverbs. English requires -ly for most adverbs. French learners use adjectives
      where English requires adverbs.
    teacher_tips:
      how_to_explain: 'Teach: Adjective describes a noun. Adverb describes a verb.
        Most adverbs add -ly. Exceptions: fast, hard, late (same form). Good -> well
        (irregular).'
      where_to_start: Start with the -ly rule. Then teach exceptions. Then teach good/well.
      sequencing: 'Week 1: Adjective vs adverb. Week 2: Adding -ly. Week 3: Exceptions.
        Week 4: Good vs well.'
      exercises:
      - name: Adjective or Adverb?
        type: fill-in-the-blank
        description: 15 sentences where students choose between adjective and adverb
          form.
        duration: 10
      - name: Adverb Formation
        type: sentence-rewrite
        description: Students rewrite 10 sentences, changing adjectives to adverbs.
        duration: 10
      - name: FR Adverb Translation
        type: translation
        description: Translate 15 French sentences, choosing correct English adverb
          form.
        duration: 10
      - name: Adverb Error Hunt
        type: error-correction
        description: A paragraph with 10 adverb errors. Students find and fix.
        duration: 15
