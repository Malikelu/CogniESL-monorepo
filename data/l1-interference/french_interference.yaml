  question_formation:
    interference_patterns:
    - pattern: Est-ce que without inversion
      example: 'FR ''Est-ce que tu aimes?'' (is-it that you like?) -> Error: ''Is
        it that you like?'' -> Correct: ''Do you like?'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Use of rising intonation only
      example: 'FR ''Tu aimes le cafe?'' (you like the coffee?) -> Error: ''You like
        coffee?'' -> Correct: ''Do you like coffee?'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: You like coffee?
      correct: Do you like coffee?
    - wrong: Is it that she comes?
      correct: Is she coming?
    - wrong: Where you go?
      correct: Where do you go?
    why_it_happens: French forms questions with 'est-ce que' (is-it that) or simply
      by raising intonation. English requires do-support and subject-verb inversion.
      French learners may transfer the intonation-only pattern or use 'is it that'
      constructions.
    teacher_tips:
      how_to_explain: 'Teach two question types: (1) Yes/no: Do/Does/Did + subject
        + base verb? (2) Wh-: Wh- word + do/does/did + subject + base verb? For ''be''
        and modals, just invert.'
      where_to_start: Start with yes/no questions with 'be' (easier). Then teach do/does/did
        questions.
      sequencing: 'Week 1: Yes/no questions with be. Week 2: Yes/no questions with
        do/does/did. Week 3: Wh- questions. Week 4: Tag questions.'
      exercises:
      - name: Question Formation
        type: sentence-rewrite
        description: Students convert 15 statements to questions using correct inversion
          and do-support.
        duration: 15
      - name: FR Question Translation
        type: translation
        description: Translate 15 French est-ce que questions into correct English.
        duration: 15
      - name: Interview Activity
        type: oral-drill
        description: Students interview each other using wh- and yes/no questions.
        duration: 15
      - name: Question Error Correction
        type: error-correction
        description: 10 sentences with question formation errors. Students correct.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 6
    - Parrott "Grammar for English Language Teachers"
