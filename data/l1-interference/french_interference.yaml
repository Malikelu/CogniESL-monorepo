  countability:
    interference_patterns:
    - pattern: Pluralization of uncountable nouns
      example: 'FR ''des informations'' (some informations) -> Error: ''informations''
        -> Correct: ''information'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Use of des for some
      example: 'FR ''des'' = some -> Error: ''I have some informations'' -> Correct:
        ''I have some information'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I have many homeworks.
      correct: I have a lot of homework.
    - wrong: She gave me good advices.
      correct: She gave me good advice.
    - wrong: We need more furnitures.
      correct: We need more furniture.
    why_it_happens: 'French treats many nouns as countable that are uncountable in
      English: ''des informations'' (informations), ''des conseils'' (advices). French
      learners pluralize these and use ''many'' instead of ''much''.'
    teacher_tips:
      how_to_explain: 'Create a list of common uncountable nouns: information, advice,
        furniture, luggage, homework, research, news, equipment. Teach: ''a piece
        of...'', ''some...'', ''much...'' for uncountables.'
      where_to_start: Start with the countable/uncountable distinction. Then teach
        much/many.
      sequencing: 'Week 1: Common uncountable nouns. Week 2: Much/many vs a lot of.
        Week 3: Partitives. Week 4: Review.'
      exercises:
      - name: Countable or Not?
        type: matching
        description: Students categorize 30 nouns as countable or uncountable.
        duration: 10
      - name: Quantifier Choice
        type: fill-in-the-blank
        description: 20 sentences where students choose much/many/a lot of.
        duration: 10
      - name: FR Countability Translation
        type: translation
        description: Translate 15 French sentences, correcting countability errors.
        duration: 15
      - name: Uncountable Noun Hunt
        type: error-correction
        description: A paragraph with 10 countability errors. Students find and fix.
        duration: 15
