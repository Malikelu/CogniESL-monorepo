  conditionals:
    interference_patterns:
    - pattern: Use of present tense in if-clauses
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: FR 'Si j'ai le temps'
      example_gloss: if I have the time
      example_wrong: If I will have time
      example_correct: If I have time
      explanation: 'Transfer from L1: Use of present tense in if-clauses.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of conditionnel for hypothetical
      example: 'FR ''Si j''avais le temps, je ferais'' -> Error: ''If I would have
        time, I would do'' -> Correct: ''If I had time, I would do'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Use of conditionnel for hypothetical.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: If I will see him, I will tell him.
      correct: If I see him, I will tell him.
    - wrong: If I would have money, I would travel.
      correct: If I had money, I would travel.
    - wrong: If she will come, we will celebrate.
      correct: If she comes, we will celebrate.
    why_it_happens: French uses the present tense in si-clauses (si j'ai = if I have),
      which is similar to English. However, French also uses the conditional in si-clauses
      for hypotheticals, leading to 'would' in the English if-clause.
    teacher_tips:
      how_to_explain: 'Teach: NO WILL/WOULD IN IF-CLAUSE. First conditional: If +
        present, will + base. Second conditional: If + past, would + base. Write the
        formula on the board.'
      where_to_start: Start with first conditional (real/possible). Then teach second
        conditional (unreal/hypothetical).
      sequencing: 'Week 1: First conditional. Week 2: Second conditional. Week 3:
        Zero conditional. Week 4: Mixed conditionals.'
      exercises:
      - name: If-Clause Fix
        type: error-correction
        description: 15 sentences with will/would in the if-clause. Students correct.
        duration: 10
      - name: Conditional Chain
        type: sentence-rewrite
        description: Students transform 10 zero conditionals into first and second
          conditionals.
        duration: 10
      - name: FR Conditional Translation
        type: translation
        description: Translate 15 French conditional sentences into correct English.
        duration: 15
      - name: Hypothetical Discussion
        type: oral-drill
        description: Students discuss hypothetical situations using second conditional.
        duration: 15
