  prepositions:
    interference_patterns:
    - pattern: Transfer of danish prepositions
      example: Transfer of danish prepositions
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I am on home.
      correct: I am at home.
    why_it_happens: Danish prepositions often differ from English in ways that cause
      systematic errors. Danish 'i' covers both 'in' and 'at,' and 'på' covers 'on'
      and 'at.' Danish learners may say 'I am in school' instead of 'I am at school.'
      This occurs because the L1 preposition system maps differently onto English
      spatial relationships.
    teacher_tips:
