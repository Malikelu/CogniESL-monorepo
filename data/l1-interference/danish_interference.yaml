  phonology:
    interference_patterns:
    - pattern: Confusion of /v/ and /w/
      example: Confusion of /v/ and /w/
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I am wery happy.
      correct: I am very happy.
    why_it_happens: Danish phonology differs significantly from English. Danish has
      a different vowel system and lacks several English consonant distinctions. Danish
      learners may struggle with English vowel pairs like /i:/ vs /ɪ/ and /æ/ vs /ɛ/.
      These errors persist because the L1 phonological system filters out distinctions
      that don't exist in Danish.
    teacher_tips:
      how_to_explain: 'Teach: /v/ vs /w/, /θ/ vs /t/.'
      where_to_start: Start with the phonology pattern.
      sequencing: 'Week 1: phonology. Week 2: Practice. Week 3: Review. Week 4: Mixed.'
      exercises:
