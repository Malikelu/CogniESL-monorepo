language: danish
schema_version: '3.0'
grammar_points:
  stod_tegn:
    interference_patterns:
    - Danish uses 2 genders which does not exist in English, causing transfer errors
      related to 'stod tegn'.
    why_it_happens: Danish handles 'stod tegn' differently from English. Danish L1
      speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Danish structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Danish and English for 'stod
        tegn'. Show the Danish structure side-by-side with English. Highlight the
        specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Danish handles
        'stod tegn' differently from English. Use visual aids or color-coding to highlight
        the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Danish sentences, students translate to English, focusing
          on correct 'stod tegn' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Danish-style 'stod tegn' errors. Students
          identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'stod
          tegn' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'stod tegn' errors.
        duration: 15
    examples:
    - 'Wrong: Applying Danish ''stod tegn'' structure to English. Correct: Use the
      English structure for ''stod tegn''.'
    - 'Wrong: Direct translation of Danish ''stod tegn'' pattern. Correct: Follow
      English ''stod tegn'' conventions.'
    - 'Wrong: Correct: Use English-specific ''stod tegn'' patterns.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Philip, W. (2005). Danish learners and English article acquisition. Nordic Journal
      of English Studies, 4(1), 45-62.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Danish
    notes: Major phonological difference that affects intelligibility. Even Danes
      struggle explaining it.
