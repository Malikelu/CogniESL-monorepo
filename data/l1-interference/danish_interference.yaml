language: Danish
language_code: da
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of indefinite article after at vaere (to be) for professions
      example: 'Danish: ''Jeg er laerer'' (I am teacher). Learner says ''I am teacher''
        instead of ''I am a teacher.'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusion of definite article placement (postposed vs. preposed)
      example: 'Danish attaches the definite article as a suffix: ''bilen'' (car+the
        = the car), ''huset'' (house+the = the house). Learners may say ''car the''
        or omit ''the'' entirely, producing ''I bought car.'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Overuse of definite article with generic/general nouns
      example: Danish uses the definite form for generic reference more freely than
        English. Learner says 'The cats are cute animals' (meaning cats in general)
        instead of 'Cats are cute animals.'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    examples:
    - wrong: Jeg er laerer.
      correct: I am a teacher.
      da_original: Jeg er laerer.
      gloss: I am teacher.
      explanation: 'Danish omits the indefinite article after ''at vaere'' (to be)
        when stating professions. English requires ''a/an'': ''I am a teacher.'''
    - wrong: Bilen er roed.
      correct: The car is red.
      da_original: Bilen er roed.
      gloss: Car+the is red.
      explanation: Danish 'bilen' = 'bil' (car) + '-en' (definite suffix). The article
        is attached to the end of the noun, not placed before it. English places 'the'
        before the noun.
    - wrong: I bought car yesterday.
      correct: I bought the car yesterday.
      da_original: Jeg koebte bilen i går.
      gloss: I bought car+the yesterday.
      explanation: Danish 'bilen' has the definite suffix '-en.' Learners may not
        realize this suffix corresponds to English 'the' and omit it.
    - wrong: Cats are the best pets.
      correct: Cats are the best pets.
      da_original: Katte er de bedste kaeledyr.
      gloss: Cats are the-best pets.
      explanation: Danish uses the definite form 'de bedste' for superlatives. This
        example shows correct transfer, but Danish also uses definite forms for generic
        statements where English uses zero article.
    why_it_happens: 'Danish has a two-part article system that differs from English
      in two fundamental ways. First, Danish has preposed indefinite articles (''en''
      for common gender, ''et'' for neuter gender — ''en bil'' = a car, ''et hus''
      = a house) but the definite article is attached as a SUFFIX to the noun (''bilen''
      = the car, ''huset'' = the house). This means Danish learners must learn to
      move the definite marker from the end of the noun to the beginning — a significant
      structural shift. Second, Danish omits the indefinite article after ''at vaere''
      (to be) when stating professions and nationalities: ''Jeg er laerer'' (I am
      teacher), ''Han er dansk'' (He is Danish). English requires ''a/an'' in these
      contexts: ''I am a teacher,'' ''He is a Dane.'' Third, Danish uses the definite
      form more freely for generic reference than English does. These three differences
      create systematic, predictable error patterns.'
    teacher_tips:
      how_to_explain: 'Explain that Danish and English both have ''a'' and ''the,''
        but they work differently. (1) Indefinite: Danish ''en/et'' = English ''a/an''
        — same position (before the noun), but Danish drops it after ''to be'' for
        professions. English NEVER drops it. (2) Definite: Danish adds ''-en/-et/-en''
        to the END of the noun. English puts ''the'' at the BEGINNING. Use a visual:
        write ''bil-en'' on the left and ''the car'' on the right, draw arrows showing
        the article moving from end to beginning. (3) For generic nouns, English often
        uses zero article where Danish uses the definite form.'
      where_to_start: 'Start with the profession pattern since it''s the most frequent
        error: drill ''I am a + profession,'' ''She is a + profession'' until automatic.
        Then teach the suffix-to-prefix shift for ''the.'' Finally, address generic/plural
        zero article.'
      sequencing: 'Week 1: Indefinite article a/an — focus on professions and after
        ''to be.'' Week 2: Definite article the — teach the Danish suffix-to-English
        prefix shift. Week 3: Contrast a/an vs the; introduce zero article with plurals
        and generics. Week 4: Mixed practice — reading and writing tasks requiring
        all article choices.'
      exercises:
      - name: Profession Drill
        type: fill-in-the-blank
        description: '15 sentences: ''He is ___ doctor. She is ___ engineer. They
          are ___ students.'' Focus on always including a/an after ''to be'' with
          professions.'
        duration: 10
      - name: Suffix to Prefix
        type: translation
        description: 10 Danish sentences with postposed definite articles (e.g., 'Huset
          er stort') that learners translate to English, consciously moving the article
          from suffix to preposed position.
        duration: 15
      - name: Article Choice
        type: fill-in-the-blank
        description: 20 sentences requiring a/an, the, or zero article. Include generic/plural
          nouns where Danish would use the definite form but English uses zero article.
        duration: 15
      - name: Proofread a Letter
        type: error-correction
        description: A short letter written by a fictional Danish learner with 10
          article errors (omissions after 'to be,' missing 'the,' overuse of 'the'
          with generics).
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Scandinavian)
    - Parrott "Grammar for English Language Teachers"
    - Celce-Murcia & Larsen-Freeman "The Grammar Book"
