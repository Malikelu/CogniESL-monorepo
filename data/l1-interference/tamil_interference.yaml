  relative_clauses:
    interference_patterns:
    - pattern: Tamil participial relative clause (no relative pronoun) -> English
        requires relative pronoun who/which/that
      example_tamil: neeththu vandha maanavan (நேத்து வந்த மாணவன்)
      example_gloss: Yesterday came student
      example_wrong: Yesterday came student is my brother.
      example_correct: The student who came yesterday is my brother.
      explanation: Tamil forms relative clauses by using a participial form of the
        verb directly before the noun, with no relative pronoun. The verb 'vandha'
        (came) becomes an adjective meaning 'who came.' English requires a relative
        pronoun (who/which/that) to connect the relative clause to the noun. Tamil
        speakers may produce head-final relative clauses without pronouns.
    - pattern: Relative clause placed before noun (prenominal) -> English places relative
        clause after noun (postnominal)
      example_tamil: naan vaangiya puththagam (நான் வாங்கிய புத்தகம்)
      example_gloss: I bought book
      example_wrong: I bought book is on the table.
      example_correct: The book that I bought is on the table.
      explanation: Tamil relative clauses are always prenominal -- they come BEFORE
        the noun they modify. English relative clauses are always postnominal -- they
        come AFTER the noun. This is a fundamental word order difference. Tamil speakers
        may produce 'I bought book' as a noun phrase, missing both the relative pronoun
        and the correct position.
    - pattern: Resumptive pronoun retained in relative clause -> English does not
        use resumptive pronouns
      example_tamil: naan paarththa penn aval en nanbi (நான் பார்த்த பெண் அவள் என்
        நண்பி)
      example_gloss: I saw girl she my friend
      example_wrong: The girl who I saw her is my friend.
      example_correct: The girl who I saw is my friend.
      explanation: Tamil relative clauses can include a resumptive pronoun (aval 'she')
        referring back to the head noun. English relative clauses never use resumptive
        pronouns -- the relative pronoun (who/which/that) does the connecting work.
        Tamil speakers may add 'her/him/they' after the relative clause.
    - pattern: Multiple relative clauses stacked before noun -> English uses postnominal
        relative clauses
      example_tamil: neeththu sinimaavukku poana en nanban vaangiya puththagam (நேத்து
        சினிமாவுக்கு போன என் நண்பன் வாங்கிய புத்தகம்)
      example_gloss: Yesterday cinema-to went my friend bought book
      example_wrong: Yesterday cinema went my friend bought book is interesting.
      example_correct: The book that my friend who went to the cinema yesterday bought
        is interesting.
      explanation: Tamil can stack multiple prenominal relative clauses before a noun.
        English places all relative clauses after the noun, which can create complex
        but grammatical structures. Tamil speakers may try to stack clauses before
        the noun, producing incomprehensible English.
    examples:
    - 'Wrong: ''The man who I saw him yesterday is my teacher.'' Correct: ''The man
      who I saw yesterday is my teacher.'''
    - 'Wrong: ''I read book was very interesting.'' Correct: ''The book that I read
      was very interesting.'''
    - 'Wrong: ''She came yesterday girl is my sister.'' Correct: ''The girl who came
      yesterday is my sister.'''
    - 'Wrong: ''The food which I cooked it was delicious.'' Correct: ''The food which
      I cooked was delicious.'''
    why_it_happens: 'Tamil relative clauses are fundamentally different from English
      relative clauses in three ways: position -- Tamil relative clauses are prenominal
      (before the noun), English are postnominal (after the noun); structure -- Tamil
      uses participial verb forms directly as adjectives with no relative pronoun,
      English requires relative pronouns (who/which/that); and resumptive pronouns
      -- Tamil allows a pronoun inside the relative clause that refers back to the
      head noun, English does not. These three differences combine to make relative
      clauses one of the most challenging grammar points for Tamil learners. The prenominal
      position is particularly difficult because it requires Tamil speakers to plan
      the entire relative clause before saying the noun, whereas in Tamil, the noun
      comes last and the relative clause is built up to it. The absence of relative
      pronouns in Tamil means learners must learn both the concept of relative pronouns
      and the rules for choosing who versus which versus that.'
    teacher_tips:
      how_to_explain: 'Write on board: Tamil = VERB-ed plus NOUN (relative clause
        BEFORE noun, no connecting word). English = NOUN plus who/which/that plus
        VERB (relative clause AFTER noun, with connecting word). Use a simple example:
        ''The man who came yesterday'' -- show that English puts the description AFTER
        the noun, and needs a bridge word (who/which/that) to connect them. Say: ''In
        Tamil, you describe the person FIRST, then say who they are. In English, you
        say who they are FIRST, then describe them.'''
      where_to_start: 'Begin with subject relative clauses using ''who'' for people:
        ''The man who came yesterday.'' Use two simple sentences and show how to combine
        them: ''The man came yesterday. He is my brother.'' becomes ''The man who
        came yesterday is my brother.'' Use color-coding: noun in blue, relative pronoun
        in red, verb in green.'
      sequencing: 'Week 1: Subject relative clauses with ''who'' (people) and ''which''
        (things). Week 2: Object relative clauses (The man who I saw). Week 3: Relative
        clauses with prepositions (The man who I talked to). Week 4: Reducing relative
        clauses (The man sitting there = The man who is sitting there). Week 5: Multiple
        relative clauses and embedded structures.'
      exercises:
      - name: Sentence Combination Workshop
        type: transformation
        description: 'Give students 15 pairs of simple sentences. Students combine
          each pair into one sentence using a relative clause. Example: ''The woman
          is my teacher. She is wearing a blue dress.'' becomes ''The woman who is
          wearing a blue dress is my teacher.'' Start with subject relatives, then
          move to object relatives.'
        duration: 20
      - name: Remove the Resumptive Pronoun
        type: error-correction
        description: 'Provide 12 relative clauses with resumptive pronouns (Tamil
          style). Students must remove the extra pronoun and produce a correct English
          relative clause. Example: ''The book which I read it was interesting.''
          becomes ''The book which I read was interesting.'' Discuss why the pronoun
          is unnecessary in English.'
        duration: 10
      - name: Relative Clause Position Swap
        type: transformation
        description: Give students 10 Tamil-style prenominal relative clause descriptions
          (e.g., '[yesterday came] man,' '[I read] book'). Students must rewrite each
          as a correct English postnominal relative clause with the correct relative
          pronoun. Then use each in a complete sentence.
        duration: 15
      - name: Who versus Which versus That Sort
        type: matching
        description: Give students 20 noun phrases with blanks for relative pronouns.
          Students choose the correct pronoun (who/which/that) for each and explain
          their choice. Include cases where multiple answers are possible and discuss
          the differences.
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - Annamalai, E. & Steever, S.B. (1998). Modern Tamil. In The Dravidian Languages,
      Routledge.
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course (2nd ed.). Heinle & Heinle.'
    - Yule, G. (2010). The Study of Language (4th ed.). Cambridge University Press.
    source_count: 4
    source_type: literature
    frequency: 4
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated. Relative clause restructuring is a major syntactic
      challenge involving word order, pronoun insertion, and resumptive pronoun deletion
      simultaneously.
    notes: 'Tamil relative clauses are prenominal and participial. English relative
      clauses are postnominal and require relative pronouns. This is a triple challenge:
      position, pronoun, and resumptive deletion.'
    source_rank: 1
    citations:
    - claim: Interference pattern for relative clauses
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Tamil speakers, pp. 243-250'
      tier: 1
    - claim: 'Grammar point: relative clauses'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
