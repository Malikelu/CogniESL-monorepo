    assessment: Expert-evaluated. Phonological transfer is the most persistent error type because pronunciation habits are
      motoric and automatic. It rarely blocks communication but is the primary marker of accent.
    notes: 'Tamil has 12 vowels and 16 consonants. Key gaps: no /f/, /v/, /theta/, /z/. Retroflex series is a major accent
