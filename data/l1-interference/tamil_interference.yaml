  formal_informal_register:
    interference_patterns:
    - pattern: Tamil formal 'neer' versus informal 'nee' distinction transferred to English -> English uses the same 'you'
        for all registers
      example_tamil: neer engge poogireergal? (நீர் எங்கே போகிறீர்கள்?)
      example_gloss: You-formal where are-going?
      example_wrong: Where are you going, sir? (overuse of sir/ma'am to mark respect)
      example_correct: Where are you going? (context determines formality in English)
      explanation: 'Tamil has a T-V distinction in pronouns: nee for informal/familiar and neer for formal/respectful address.
        English uses ''you'' for all registers and marks formality through other means (word choice, sentence structure, titles).
        Tamil speakers may overuse ''sir/ma''am'' or produce overly formal language when trying to express the neer register.'
    - pattern: Tamil honorific verb suffix -gireegal transferred -> English lacks verb-based honorifics
      example_tamil: avargal varugiraargal (அவர்கள் வருகிறார்கள்)
      example_gloss: They (honorific) are-coming (honorific)
      example_wrong: They are coming, sir. (adding sir to verb to mark honorific)
      example_correct: They are coming. (English marks respect through word choice, not verb forms)
      explanation: 'Tamil verbs have honorific forms: -giraan for masculine, -giraal for feminine, -giraargal for honorific/plural.
        English has no verb-based honorific system. Tamil speakers may try to add honorific markers to English verbs or overcompensate
        with sir/ma''am.'
    - pattern: Tamil formal request patterns transferred -> English uses different politeness strategies
      example_tamil: dayavu seythu kodikkavum (தயவுசெய்து கொடுக்கவும்)
      example_gloss: Having-done-kindness please-give
      example_wrong: Please kindly give me the book. (overuse of kindly -- direct translation of Tamil formal request)
      example_correct: Could you please give me the book?
      explanation: Tamil formal requests use specific lexical items like dayavu seythu ('having done kindness') and kodikkavum
        ('please give'). English uses modal verbs (could, would, might) and indirect questions for politeness. Tamil speakers
        may produce 'Please kindly...' which sounds unnatural in English.
    examples:
    - 'Wrong: ''Please kindly give me water, sir.'' Correct: ''Could I have some water, please?'''
    - 'Wrong: ''Respected sir, I am writing this letter to inform you...'' Correct: ''Dear Mr. Smith, I am writing to let
      you know...'''
    - 'Wrong: ''You are kindly requested to come here.'' Correct: ''Could you please come here?'''
    - 'Wrong: ''Good morning, sir. How are you, sir?'' Correct: ''Good morning. How are you?'''
    why_it_happens: 'Tamil has an elaborate system of linguistic politeness that operates through multiple grammatical channels:
      pronoun choice (nee versus neer versus avargal), verb suffixes (honorific -giraargal versus non-honorific -giraan),
      and specific lexical items for formal requests (dayavu seythu). English, by contrast, has largely lost its T-V pronoun
      distinction (thou/you) and marks formality through lexical choice, modal verbs, and indirectness rather than grammatical
      morphology. Tamil speakers face the challenge of expressing the same social relationships through completely different
      linguistic means. The error is particularly visible in written English, where Tamil speakers may produce overly formal
      or stilted language by directly translating Tamil politeness markers. The communicative impact is moderate -- the message
      is understood, but the register may sound inappropriate (too formal in casual contexts, or not formal enough in professional
      contexts).'
    teacher_tips:
      how_to_explain: 'Say: ''In Tamil, you change the PRONOUN and the VERB to show respect. In English, we use the same you
        for everyone. Instead, we change the WORDS AROUND you. To be polite in English, we use Could you...? instead of Give
        me... and Would you mind...? instead of Do this.'' Write on board: Direct becomes Polite: ''Give me water'' becomes
        ''Could I have some water?'' becomes ''Would you mind if I had some water?'' Show the spectrum from casual to formal.'
      where_to_start: 'Begin with requests: the difference between imperative (''Sit down''), polite request (''Please sit
        down''), and very formal request (''Would you mind sitting down?''). Use role-play: student is a waiter, teacher is
        a customer. Practice the same request at three formality levels.'
      sequencing: 'Week 1: Requests -- from direct to polite to very formal. Week 2: Apologies and excuses. Week 3: Formal
        versus informal vocabulary (kids/children, dad/father, help/assist). Week 4: Written register -- formal letters versus
        informal emails. Week 5: Professional contexts -- job interviews, business emails, academic writing.'
      exercises:
      - name: Formality Thermometer
        type: transformation
        description: 'Give students 10 direct/imperative sentences (e.g., ''Give me the report,'' ''Sit down,'' ''Tell me
          the answer''). Students rewrite each sentence at three formality levels: casual (to a friend), neutral (to a colleague),
          and formal (to a boss/stranger). Discuss which level is appropriate for different situations.'
        duration: 15
      - name: Register Role-Play
        type: oral-drill
        description: 'Set up scenarios: (1) asking a friend for a pen, (2) asking a teacher for an extension, (3) asking a
          CEO for a job interview. Students practice the same request in all three scenarios, adjusting their language. Partners
          give feedback on whether the register was appropriate.'
        duration: 20
      - name: Formal Letter Makeover
        type: composition
        description: Provide a formal letter written by a Tamil learner with register errors (overuse of 'kindly,' 'respected
          sir,' overly direct requests). Students rewrite the letter with appropriate English register. Compare versions and
          discuss what changed and why.
        duration: 15
      - name: Politeness Strategy Match
        type: matching
        description: 'Give students 15 situations (e.g., ''You need your boss to sign a form,'' ''You want your roommate to
          wash dishes''). Students match each situation with the appropriate politeness strategy from a list: direct imperative,
          ''please plus imperative,'' ''Can you...?'', ''Could you...?'', ''Would you mind...?'', ''I was wondering if...'''
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference and Other Problems (2nd ed.). Cambridge
      University Press.'
    - 'Brown, P. & Levinson, S.C. (1987). Politeness: Some Universals in Language Usage. Cambridge University Press.'
    - Sailaja, P. (2009). Indian English. Edinburgh University Press.
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL Teacher''s Course (2nd ed.). Heinle & Heinle.'
    source_count: 4
    source_type: literature
    frequency: 3
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated. Register errors are moderate in frequency but can cause social awkwardness. Tamil's elaborate
      honorific system has no direct English equivalent.
    notes: 'Tamil T-V distinction: nee (informal) versus neer (formal) versus avargal (honorific). English uses ''you'' for
      all.'
  relative_clauses:
    interference_patterns:
    - pattern: Tamil participial relative clause (no relative pronoun) -> English requires relative pronoun who/which/that
      example_tamil: neeththu vandha maanavan (நேத்து வந்த மாணவன்)
      example_gloss: Yesterday came student
      example_wrong: Yesterday came student is my brother.
      example_correct: The student who came yesterday is my brother.
      explanation: Tamil forms relative clauses by using a participial form of the verb directly before the noun, with no
        relative pronoun. The verb 'vandha' (came) becomes an adjective meaning 'who came.' English requires a relative pronoun
        (who/which/that) to connect the relative clause to the noun. Tamil speakers may produce head-final relative clauses
        without pronouns.
    - pattern: Relative clause placed before noun (prenominal) -> English places relative clause after noun (postnominal)
      example_tamil: naan vaangiya puththagam (நான் வாங்கிய புத்தகம்)
      example_gloss: I bought book
      example_wrong: I bought book is on the table.
      example_correct: The book that I bought is on the table.
      explanation: Tamil relative clauses are always prenominal -- they come BEFORE the noun they modify. English relative
        clauses are always postnominal -- they come AFTER the noun. This is a fundamental word order difference. Tamil speakers
        may produce 'I bought book' as a noun phrase, missing both the relative pronoun and the correct position.
    - pattern: Resumptive pronoun retained in relative clause -> English does not use resumptive pronouns
      example_tamil: naan paarththa penn aval en nanbi (நான் பார்த்த பெண் அவள் என் நண்பி)
      example_gloss: I saw girl she my friend
      example_wrong: The girl who I saw her is my friend.
      example_correct: The girl who I saw is my friend.
      explanation: Tamil relative clauses can include a resumptive pronoun (aval 'she') referring back to the head noun. English
        relative clauses never use resumptive pronouns -- the relative pronoun (who/which/that) does the connecting work.
        Tamil speakers may add 'her/him/they' after the relative clause.
    - pattern: Multiple relative clauses stacked before noun -> English uses postnominal relative clauses
      example_tamil: neeththu sinimaavukku poana en nanban vaangiya puththagam (நேத்து சினிமாவுக்கு போன என் நண்பன் வாங்கிய
        புத்தகம்)
      example_gloss: Yesterday cinema-to went my friend bought book
      example_wrong: Yesterday cinema went my friend bought book is interesting.
      example_correct: The book that my friend who went to the cinema yesterday bought is interesting.
      explanation: Tamil can stack multiple prenominal relative clauses before a noun. English places all relative clauses
        after the noun, which can create complex but grammatical structures. Tamil speakers may try to stack clauses before
        the noun, producing incomprehensible English.
    examples:
    - 'Wrong: ''The man who I saw him yesterday is my teacher.'' Correct: ''The man who I saw yesterday is my teacher.'''
    - 'Wrong: ''I read book was very interesting.'' Correct: ''The book that I read was very interesting.'''
    - 'Wrong: ''She came yesterday girl is my sister.'' Correct: ''The girl who came yesterday is my sister.'''
    - 'Wrong: ''The food which I cooked it was delicious.'' Correct: ''The food which I cooked was delicious.'''
    why_it_happens: 'Tamil relative clauses are fundamentally different from English relative clauses in three ways: position
      -- Tamil relative clauses are prenominal (before the noun), English are postnominal (after the noun); structure -- Tamil
      uses participial verb forms directly as adjectives with no relative pronoun, English requires relative pronouns (who/which/that);
      and resumptive pronouns -- Tamil allows a pronoun inside the relative clause that refers back to the head noun, English
      does not. These three differences combine to make relative clauses one of the most challenging grammar points for Tamil
      learners. The prenominal position is particularly difficult because it requires Tamil speakers to plan the entire relative
      clause before saying the noun, whereas in Tamil, the noun comes last and the relative clause is built up to it. The
      absence of relative pronouns in Tamil means learners must learn both the concept of relative pronouns and the rules
      for choosing who versus which versus that.'
    teacher_tips:
      how_to_explain: 'Write on board: Tamil = VERB-ed plus NOUN (relative clause BEFORE noun, no connecting word). English
        = NOUN plus who/which/that plus VERB (relative clause AFTER noun, with connecting word). Use a simple example: ''The
        man who came yesterday'' -- show that English puts the description AFTER the noun, and needs a bridge word (who/which/that)
        to connect them. Say: ''In Tamil, you describe the person FIRST, then say who they are. In English, you say who they
        are FIRST, then describe them.'''
      where_to_start: 'Begin with subject relative clauses using ''who'' for people: ''The man who came yesterday.'' Use two
        simple sentences and show how to combine them: ''The man came yesterday. He is my brother.'' becomes ''The man who
        came yesterday is my brother.'' Use color-coding: noun in blue, relative pronoun in red, verb in green.'
      sequencing: 'Week 1: Subject relative clauses with ''who'' (people) and ''which'' (things). Week 2: Object relative
        clauses (The man who I saw). Week 3: Relative clauses with prepositions (The man who I talked to). Week 4: Reducing
        relative clauses (The man sitting there = The man who is sitting there). Week 5: Multiple relative clauses and embedded
        structures.'
      exercises:
      - name: Sentence Combination Workshop
        type: transformation
        description: 'Give students 15 pairs of simple sentences. Students combine each pair into one sentence using a relative
          clause. Example: ''The woman is my teacher. She is wearing a blue dress.'' becomes ''The woman who is wearing a
          blue dress is my teacher.'' Start with subject relatives, then move to object relatives.'
        duration: 20
      - name: Remove the Resumptive Pronoun
        type: error-correction
        description: 'Provide 12 relative clauses with resumptive pronouns (Tamil style). Students must remove the extra pronoun
          and produce a correct English relative clause. Example: ''The book which I read it was interesting.'' becomes ''The
          book which I read was interesting.'' Discuss why the pronoun is unnecessary in English.'
        duration: 10
      - name: Relative Clause Position Swap
        type: transformation
        description: Give students 10 Tamil-style prenominal relative clause descriptions (e.g., '[yesterday came] man,' '[I
          read] book'). Students must rewrite each as a correct English postnominal relative clause with the correct relative
          pronoun. Then use each in a complete sentence.
        duration: 15
      - name: Who versus Which versus That Sort
        type: matching
        description: Give students 20 noun phrases with blanks for relative pronouns. Students choose the correct pronoun
          (who/which/that) for each and explain their choice. Include cases where multiple answers are possible and discuss
          the differences.
        duration: 10
