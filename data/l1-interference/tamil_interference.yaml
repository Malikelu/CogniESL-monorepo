  formal_informal_register:
    interference_patterns:
    - pattern: Tamil formal 'neer' versus informal 'nee' distinction transferred to
        English -> English uses the same 'you' for all registers
      example_tamil: neer engge poogireergal? (நீர் எங்கே போகிறீர்கள்?)
      example_gloss: You-formal where are-going?
      example_wrong: Where are you going, sir? (overuse of sir/ma'am to mark respect)
      example_correct: Where are you going? (context determines formality in English)
      explanation: 'Tamil has a T-V distinction in pronouns: nee for informal/familiar
        and neer for formal/respectful address. English uses ''you'' for all registers
        and marks formality through other means (word choice, sentence structure,
        titles). Tamil speakers may overuse ''sir/ma''am'' or produce overly formal
        language when trying to express the neer register.'
    - pattern: Tamil honorific verb suffix -gireegal transferred -> English lacks
        verb-based honorifics
      example_tamil: avargal varugiraargal (அவர்கள் வருகிறார்கள்)
      example_gloss: They (honorific) are-coming (honorific)
      example_wrong: They are coming, sir. (adding sir to verb to mark honorific)
      example_correct: They are coming. (English marks respect through word choice,
        not verb forms)
      explanation: 'Tamil verbs have honorific forms: -giraan for masculine, -giraal
        for feminine, -giraargal for honorific/plural. English has no verb-based honorific
        system. Tamil speakers may try to add honorific markers to English verbs or
        overcompensate with sir/ma''am.'
    - pattern: Tamil formal request patterns transferred -> English uses different
        politeness strategies
      example_tamil: dayavu seythu kodikkavum (தயவுசெய்து கொடுக்கவும்)
      example_gloss: Having-done-kindness please-give
      example_wrong: Please kindly give me the book. (overuse of kindly -- direct
        translation of Tamil formal request)
      example_correct: Could you please give me the book?
      explanation: Tamil formal requests use specific lexical items like dayavu seythu
        ('having done kindness') and kodikkavum ('please give'). English uses modal
        verbs (could, would, might) and indirect questions for politeness. Tamil speakers
        may produce 'Please kindly...' which sounds unnatural in English.
    examples:
    - 'Wrong: ''Please kindly give me water, sir.'' Correct: ''Could I have some water,
      please?'''
    - 'Wrong: ''Respected sir, I am writing this letter to inform you...'' Correct:
      ''Dear Mr. Smith, I am writing to let you know...'''
    - 'Wrong: ''You are kindly requested to come here.'' Correct: ''Could you please
      come here?'''
    - 'Wrong: ''Good morning, sir. How are you, sir?'' Correct: ''Good morning. How
      are you?'''
    why_it_happens: 'Tamil has an elaborate system of linguistic politeness that operates
      through multiple grammatical channels: pronoun choice (nee versus neer versus
      avargal), verb suffixes (honorific -giraargal versus non-honorific -giraan),
      and specific lexical items for formal requests (dayavu seythu). English, by
      contrast, has largely lost its T-V pronoun distinction (thou/you) and marks
      formality through lexical choice, modal verbs, and indirectness rather than
      grammatical morphology. Tamil speakers face the challenge of expressing the
      same social relationships through completely different linguistic means. The
      error is particularly visible in written English, where Tamil speakers may produce
      overly formal or stilted language by directly translating Tamil politeness markers.
      The communicative impact is moderate -- the message is understood, but the register
      may sound inappropriate (too formal in casual contexts, or not formal enough
      in professional contexts).'
    teacher_tips:
      how_to_explain: 'Say: ''In Tamil, you change the PRONOUN and the VERB to show
        respect. In English, we use the same you for everyone. Instead, we change
        the WORDS AROUND you. To be polite in English, we use Could you...? instead
        of Give me... and Would you mind...? instead of Do this.'' Write on board:
        Direct becomes Polite: ''Give me water'' becomes ''Could I have some water?''
        becomes ''Would you mind if I had some water?'' Show the spectrum from casual
        to formal.'
      where_to_start: 'Begin with requests: the difference between imperative (''Sit
        down''), polite request (''Please sit down''), and very formal request (''Would
        you mind sitting down?''). Use role-play: student is a waiter, teacher is
        a customer. Practice the same request at three formality levels.'
      sequencing: 'Week 1: Requests -- from direct to polite to very formal. Week
        2: Apologies and excuses. Week 3: Formal versus informal vocabulary (kids/children,
        dad/father, help/assist). Week 4: Written register -- formal letters versus
        informal emails. Week 5: Professional contexts -- job interviews, business
        emails, academic writing.'
      exercises:
      - name: Formality Thermometer
        type: transformation
        description: 'Give students 10 direct/imperative sentences (e.g., ''Give me
          the report,'' ''Sit down,'' ''Tell me the answer''). Students rewrite each
          sentence at three formality levels: casual (to a friend), neutral (to a
          colleague), and formal (to a boss/stranger). Discuss which level is appropriate
          for different situations.'
        duration: 15
      - name: Register Role-Play
        type: oral-drill
        description: 'Set up scenarios: (1) asking a friend for a pen, (2) asking
          a teacher for an extension, (3) asking a CEO for a job interview. Students
          practice the same request in all three scenarios, adjusting their language.
          Partners give feedback on whether the register was appropriate.'
        duration: 20
      - name: Formal Letter Makeover
        type: composition
        description: Provide a formal letter written by a Tamil learner with register
          errors (overuse of 'kindly,' 'respected sir,' overly direct requests). Students
          rewrite the letter with appropriate English register. Compare versions and
          discuss what changed and why.
        duration: 15
      - name: Politeness Strategy Match
        type: matching
        description: 'Give students 15 situations (e.g., ''You need your boss to sign
          a form,'' ''You want your roommate to wash dishes''). Students match each
          situation with the appropriate politeness strategy from a list: direct imperative,
          ''please plus imperative,'' ''Can you...?'', ''Could you...?'', ''Would
          you mind...?'', ''I was wondering if...'''
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press.'
    - 'Brown, P. & Levinson, S.C. (1987). Politeness: Some Universals in Language
      Usage. Cambridge University Press.'
    - Sailaja, P. (2009). Indian English. Edinburgh University Press.
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL
      Teacher''s Course (2nd ed.). Heinle & Heinle.'
    source_count: 4
    source_type: literature
