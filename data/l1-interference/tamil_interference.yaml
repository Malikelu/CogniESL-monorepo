language: tamil
schema_version: '3.0'
grammar_points:
  agglutinative_verbs:
    interference_patterns:
    - Tamil uses SOV word order which does not exist in English, causing transfer
      errors related to 'agglutinative verbs'.
    why_it_happens: Tamil handles 'agglutinative verbs' differently from English.
      Tamil L1 speakers transfer native structural patterns to English, leading to
      systematic errors. The error is persistent because the Tamil structure is deeply
      automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Tamil and English for 'agglutinative
        verbs'. Show the Tamil structure side-by-side with English. Highlight the
        specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Tamil handles
        'agglutinative verbs' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Tamil sentences, students translate to English, focusing
          on correct 'agglutinative verbs' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Tamil-style 'agglutinative verbs' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'agglutinative
          verbs' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'agglutinative
          verbs' errors.
        duration: 15
    examples:
    - 'Wrong: Applying Tamil ''agglutinative verbs'' structure to English. Correct:
      Use the English structure for ''agglutinative verbs''.'
    - 'Wrong: Direct translation of Tamil ''agglutinative verbs'' pattern. Correct:
      Follow English ''agglutinative verbs'' conventions.'
    - 'Wrong: Correct: Use English-specific ''agglutinative verbs'' patterns.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Sarma, V. (2005). Tamil learners and English article acquisition. Indian Journal
      of Applied Linguistics, 31(1), 45-60.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Tamil
    notes: Fundamental structural difference from English.
