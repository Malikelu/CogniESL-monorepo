    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated. Postposition-to-preposition transfer is a systematic word order error that affects all spatial
      and temporal expressions.
    notes: Tamil postpositions are often compound forms with case markers (e.g., -kku meel 'to-above'). This makes the transfer
      more complex than simple word order reversal.
  phonology:
    interference_patterns:
    - pattern: Tamil retroflex consonants substituted for English alveolar consonants -> perceived as heavy accent
      example_tamil: Tee (டீ) for 'tea'
      example_gloss: tea (with retroflex /ʈ/ instead of alveolar /t/)
      example_wrong: Pronouncing 'tea' with a retroflex /ʈ/ -- tongue curled back against the palate
      example_correct: Pronouncing 'tea' with an alveolar /t/ -- tongue tip against the ridge behind upper teeth
      explanation: 'Tamil has a four-way distinction in stops: labial (p), dental (t), retroflex (T), and velar (k). English
        has a two-way distinction: voiceless (t) versus voiced (d). Tamil speakers use their retroflex T for English ''t''
        and ''d,'' producing a characteristically Indian English sound. The dental Tamil th is closer to English /t/ but still
        different because English /t/ is alveolar, not dental.'
    - pattern: Tamil lacks fricatives /f/, /theta/, /z/ -> substituted with native sounds
      example_tamil: phee (ஃபீ) for 'fee', thinku for 'think'
      example_gloss: fee (with aspirated stop /pʰ/ instead of fricative /f/)
      example_wrong: Pronouncing 'think' as 'tink'
      example_correct: Pronouncing 'think' with dental fricative /theta/
      explanation: Tamil has no labiodental fricative /f/ -- it is replaced by the aspirated bilabial stop /pʰ/. English 'fee'
        becomes 'phee.' Similarly, /theta/ (think) is replaced by dental /t/, and /z/ (zoo) by /s/ or /dz/. The 'th' sounds
        are particularly challenging because Tamil has no dental fricatives at all.
    - pattern: Tamil vowel length distinction replaces English tense/lax distinction -> vowel quality errors
      example_tamil: peetter (பீட்டர்) for 'better'
      example_gloss: better (with long vowels where English has short/lax vowels)
      example_wrong: Pronouncing 'ship' and 'sheep' identically with a long /i/
      example_correct: ship = /ɪ/ (short, lax) versus sheep = /iː/ (long, tense)
      explanation: Tamil distinguishes vowels by length (short versus long) but not by quality (tense versus lax). English
        distinguishes 'ship/sheep' by both length AND tongue position. Tamil speakers may use the same vowel quality for both,
        relying only on length, which can cause confusion between minimal pairs like ship/sheep, pull/pool, and full/fool.
    - pattern: Tamil consonant clusters simplified -> English clusters broken up with epenthetic vowels
      example_tamil: ischool or sakool for 'school'
      example_gloss: school (with epenthetic /ɪ/ before the cluster)
      example_wrong: Pronouncing 'street' as 'istreet' or 'isrit'
      example_correct: Pronouncing 'street' as /striːt/ -- three consonants in a row without extra vowels
      explanation: 'Tamil syllables typically follow a (C)V(C) pattern -- consonant clusters at the beginning of words are
        rare. English allows complex clusters like /str/ (street), /spl/ (splash). Tamil speakers often insert a short vowel
        (usually /ɪ/) before or within clusters to make them pronounceable in Tamil phonotactics: ''school'' becomes /ɪskuːl/,
        ''street'' becomes /ɪsriːt/.'
    examples:
    - 'Wrong: Pronouncing ''very'' as ''wery'' (/v/ -> /w/). Correct: ''very'' with labiodental fricative /v/.'
    - 'Wrong: Pronouncing ''think'' as ''tink''. Correct: ''think'' with dental fricative /theta/.'
    - 'Wrong: Pronouncing ''zebra'' as ''sebra''. Correct: ''zebra'' with voiced fricative /z/.'
    - 'Wrong: Pronouncing ''school'' as ''ischool''. Correct: ''school'' with initial /sk/ cluster.'
    why_it_happens: 'Tamil has a phonological system that is significantly different from English in three key areas: consonant
      inventory -- Tamil has retroflex, dental, and alveolar stops that do not map onto English alveolar stops; it lacks fricatives
      like /f/, /v/, /theta/, /z/; vowel system -- Tamil has 10 vowels distinguished primarily by length, while English has
      12+ vowels distinguished by both length and quality (tense versus lax); and phonotactics -- Tamil strictly limits consonant
      clusters, allowing at most one consonant in the onset and one in the coda, while English allows complex clusters of
      3+ consonants. When Tamil speakers learn English, they apply Tamil phonological rules to English words -- a process
      called phonological transfer. This is particularly persistent because pronunciation habits are deeply motoric and automatic,
      formed through years of Tamil speech production. Unlike grammar errors, pronunciation errors are rarely corrected in
      casual conversation because the meaning is usually understood.'
    teacher_tips:
      how_to_explain: 'Say: ''Your mouth has learned to make sounds one way for Tamil. Now we need to teach it some new tricks.''
        Use a mouth diagram showing tongue position for dental versus alveolar versus retroflex. For /f/: ''Bite your lower
        lip gently and blow air -- this sound does not exist in Tamil.'' For /theta/: ''Put your tongue between your teeth
        and blow -- like you are going to say t but with air flowing.'' For clusters: ''Say s then k then ool -- faster and
        faster until they blend: s-k-ool becomes skool becomes school.'''
      where_to_start: 'Begin with the sounds that do not exist in Tamil: /f/, /v/, /theta/. Use minimal pairs: fan/van, think/tink,
        zoo/sue. Then move to vowel quality: ship/sheep, pull/pool. Finally, address consonant clusters: school, street, spring.'
      sequencing: 'Week 1: New consonants -- /f/, /v/, /theta/ with minimal pair drills. Week 2: /z/ -- zoo/soap, vision/mission.
        Week 3: Vowel quality -- ship/sheep, pull/pool, full/fool. Week 4: Consonant clusters -- initial clusters (school,
        street, spring). Week 5: Final clusters (texts, asked). Week 6: Connected speech -- linking, weak forms, stress patterns.'
      exercises:
      - name: Minimal Pair Bingo
        type: oral-drill
        description: 'Create bingo cards with minimal pairs that contrast Tamil-problematic sounds: fan/van, think/tink, ship/sheep,
          zoo/sue, full/fool. Teacher calls out a word. Students mark the correct square. First to get 5 in a row wins. After
          the game, students practice saying both words in each pair.'
        duration: 20
      - name: Tongue Twister Challenge
        type: oral-drill
        description: 'Provide 5 tongue twisters targeting Tamil-problematic sounds. Example for /theta/: ''The thirty-three
          thieves thought that they thrilled the throne throughout Thursday.'' Students practice individually, then in pairs,
          then perform for the class. Record themselves and compare with a native speaker model.'
        duration: 15
      - name: Sound Substitution Detective
        type: error-correction
        description: Play audio clips of Tamil speakers pronouncing English words. Students identify which sounds were substituted
          (e.g., retroflex /ʈ/ for alveolar /t/) and practice the correct pronunciation. Use 10 audio clips of increasing
          difficulty. Students write the phonetic transcription of both the error and the correct form.
        duration: 15
      - name: Cluster Blending Drill
        type: oral-drill
        description: 'Give students 20 English words with initial consonant clusters. Students first pronounce each consonant
          separately (s...k...ool), then gradually blend them faster (sk...ool, skool, school). Use a metronome app to gradually
          increase speed. Words: school, street, spring, splash, scratch, square, split, scream.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference and Other Problems (2nd ed.). Cambridge
      University Press.'
    - Sailaja, P. (2009). Indian English. Edinburgh University Press.
    - Wells, J.C. (2008). Longman Pronunciation Dictionary (3rd ed.). Pearson Longman.
    - 'Khan, L. (2008). The Phonology of Bangladeshi English. In Varieties of English: South Asia, Mouton de Gruyter.'
