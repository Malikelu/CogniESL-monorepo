language: tamil
schema_version: '3.0'
grammar_points:
  sov_word_order:
    interference_patterns:
    - pattern: Tamil SOV word order transferred to English -> English requires SVO
      example_tamil: naan saappitten saivam (நான் சாப்பிட்டேன் சைவம்)
      example_gloss: I ate vegetarian-food
      example_wrong: I rice ate.
      example_correct: I ate rice.
      explanation: 'Tamil is a rigid SOV language: the verb always comes at the end. English is SVO. Tamil speakers often
        produce sentences like ''I rice ate'' or ''She the book read.'' The error is most visible with direct/indirect object
        pairs: Tamil ''Naan avanukku kaattinaen puttakam'' (I him showed book) becomes ''I him showed the book'' instead of
        ''I showed him the book.'''
    - pattern: Object placed before verb in English -> English requires verb before object complement
      example_tamil: aval paadinaal paattai (அவள் பாடினாள் பாட்டை)
      example_gloss: She sang song-the
      example_wrong: She the song sang beautifully.
      example_correct: She sang the song beautifully.
      explanation: In Tamil, the object precedes the verb and takes the accusative suffix -ai/-ei. English speakers expect
        Verb-Object order. Tamil learners may produce 'She the song sang' or place adverbs in unexpected positions because
        Tamil places adverbs before the verb phrase, not after.
    - pattern: Post-verbal adverb placement transferred from Tamil -> English adverb placement rules differ
      example_tamil: avan oadinaan vegamaaga (அவன் ஓடினான் வேகமாக)
      example_gloss: He ran quickly
      example_wrong: He quickly ran to the store.
      example_correct: He ran to the store quickly.
      explanation: Tamil places manner adverbs immediately before the final verb. English allows both pre-verbal and post-verbal
        adverb positions, but the rules are different. Tamil speakers may overuse pre-verbal placement or produce awkward
        post-verbal orders.
    examples:
    - 'Wrong: ''I the letter wrote yesterday.'' Correct: ''I wrote the letter yesterday.'''
    - 'Wrong: ''She the children taught patiently.'' Correct: ''She taught the children patiently.'''
    - 'Wrong: ''He quickly ran and bought the book.'' Correct: ''He ran quickly and bought the book.'''
    - 'Wrong: ''I him gave the money.'' Correct: ''I gave him the money.'''
    why_it_happens: Tamil is a strictly head-final SOV language, meaning the verb always comes at the end of the clause. This
      is one of the most fundamental typological differences from English, which is SVO. In Tamil, the basic sentence structure
      is Subject plus Adverb plus Object plus Verb, and this order becomes the default cognitive habit from years of daily
      Tamil use. When Tamil speakers learn English, they must restructure their entire sentence planning strategy. The error
      is particularly persistent because word order is processed automatically -- speakers do not consciously choose where
      to place the verb. Additionally, Tamil uses case markers (like -ai for accusative) to mark grammatical roles, so word
      order is actually more flexible in Tamil than in English, where word order IS the primary marker of grammatical function.
      Tamil speakers must learn that in English, 'The dog bit the man' and 'The man bit the dog' have completely different
      meanings, whereas in Tamil, case markers would disambiguate even with scrambled word order.
    teacher_tips:
      how_to_explain: 'Write two columns on the board. Left column: Tamil order (S-O-V). Right column: English order (S-V-O).
        Use a simple sentence: ''I / rice / ate'' versus ''I / ate / rice.'' Say: ''In Tamil, the action word (verb) always
        comes LAST. In English, the action word comes in the MIDDLE, right after the person doing it. English uses WORD ORDER
        to show who did what to whom -- there are no case endings to help.'' Drill with physical movement: have students stand
        in line and rearrange themselves.'
      where_to_start: 'Begin with simple transitive sentences using high-frequency verbs: eat, read, write, buy, see. Use
        color-coded cards: blue for Subject, red for Verb, green for Object. Students physically rearrange cards from Tamil
        order to English order. Start with present tense to avoid additional complexity.'
      sequencing: 'Week 1: Simple SVO with one object (I eat rice). Week 2: SVO with adverbs (I eat rice quickly). Week 3:
        Ditransitive verbs (I gave him the book -- two objects). Week 4: Questions and inversion (Do you eat rice?). Week
        5: Complex sentences with subordinate clauses.'
      exercises:
      - name: 'Card Shuffle: Tamil to English'
        type: transformation
        description: Give students 15 color-coded word cards per set (Subject=Blue, Object=Green, Verb=Red, Adverb=Yellow).
          Call out a Tamil SOV sentence. Students arrange cards in Tamil order first, then physically rearrange to English
          SVO order and read the sentence aloud. Teacher checks and corrects. Each student completes all 15 sentences.
        duration: 20
      - name: Word Order Error Hunt
        type: error-correction
        description: Provide a short paragraph (8-10 sentences) written by a fictional Tamil learner. 7 sentences have SOV
          word order errors. Students identify each error, underline the misplaced word, and rewrite the sentence correctly.
          Discuss as a class why each error changes or confuses the meaning.
        duration: 15
      - name: Live Translation Relay
        type: oral-drill
        description: Teacher reads Tamil sentences aloud (with English gloss). Students race to produce the correct English
          SVO sentence orally. First student to raise hand and produce a correct sentence gets a point. Use 20 sentences of
          increasing complexity. This builds automatic SVO production.
        duration: 15
      - name: Sentence Building with Constraints
        type: sentence-rewrite
        description: Give students a list of 10 Tamil sentences with word-by-word English glosses in SOV order. Students must
          rewrite each sentence in correct English SVO order WITHOUT looking at notes. After writing, they compare with a
          partner and discuss differences. Teacher provides correct versions for self-check.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference and Other Problems (2nd ed.). Cambridge
      University Press.'
    - Lehmann, T. (1993). A Grammar of Modern Tamil. Pondicherry Institute of Linguistics and Culture.
    - Annamalai, E. & Steever, S.B. (1998). Modern Tamil. In The Dravidian Languages, Routledge.
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL Teacher''s Course (2nd ed.). Heinle & Heinle.'
    source_count: 4
    source_type: literature
    frequency: 5
    persistence: 4
    communicative_impact: 4
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated. SOV-to-SVO transfer is the single most pervasive syntactic error for Tamil learners of English.
      It affects every sentence they produce and is highly persistent because word order is processed automatically.
    notes: Tamil is rigidly SOV with case markers. English relies on word order for grammatical roles. This is the foundational
      interference pattern from which many others derive.
  article_usage:
    interference_patterns:
    - pattern: Indefinite article 'a/an' omitted before singular countable nouns -> English requires an article
      example_tamil: avan maanavan (அவன் மாணவன்)
      example_gloss: He student
      example_wrong: He is teacher.
      example_correct: He is a teacher.
      explanation: Tamil has no article system. Definiteness is inferred from context, demonstratives (anda 'that'), or word
        order. English requires 'a/an' before singular countable nouns. Tamil speakers systematically omit articles, producing
        'I bought book' or 'She is doctor.'
    - pattern: Definite article 'the' omitted when specificity is clear from context -> English still requires 'the'
      example_tamil: puththagam mesayil irukkiradhu (புத்தகம் மேசையில் இருக்கிறது)
      example_gloss: Book table-on is
      example_wrong: Book is on table.
      example_correct: The book is on the table.
      explanation: When Tamil speakers know which specific book and table they are referring to, they use no article because
        Tamil lacks them entirely. English requires 'the' for specific, known referents. This leads to bare noun phrases that
        sound telegraphic.
    - pattern: Article 'the' overused with proper nouns and abstract nouns -> English does not use 'the' with most proper
        nouns
      example_tamil: Thiruvalluvar koorinaar (திருவள்ளுவர் கூறினார்)
      example_gloss: Thiruvalluvar said
      example_wrong: The Thiruvalluvar said that the patience is the greatest virtue.
      example_correct: Thiruvalluvar said that patience is the greatest virtue.
      explanation: Because Tamil speakers learn that English uses 'the' for specificity, they may overgeneralize it to proper
        nouns (the Gandhi, the India) and abstract nouns (the patience, the happiness) where English uses zero article.
    - pattern: Generic reference without article -> English requires 'the' or plural for generic reference
      example_tamil: puli azhagaaana vilangu (புலி அழகான விலங்கு)
      example_gloss: Tiger beautiful animal
      example_wrong: Tiger is beautiful animal.
      example_correct: The tiger is a beautiful animal. / Tigers are beautiful animals.
      explanation: Tamil uses bare nouns for generic reference. English requires either 'the + singular' or 'plural without
        article' for generic statements. Tamil speakers produce bare noun generics that sound incomplete in English.
    examples:
    - 'Wrong: ''I want to become engineer.'' Correct: ''I want to become an engineer.'''
    - 'Wrong: ''Please close door.'' Correct: ''Please close the door.'''
    - 'Wrong: ''The gold is expensive metal.'' Correct: ''Gold is an expensive metal.'''
    - 'Wrong: ''She gave me advice.'' Correct: ''She gave me some advice.'''
    why_it_happens: 'Tamil has no article system whatsoever -- no definite article, no indefinite article, no partitive article.
      This is a fundamental typological gap. In Tamil, definiteness and specificity are conveyed through demonstratives (inda
      ''this'', anda ''that''), numeral ''one'' (oru for indefinite), or simply through context and shared knowledge. English,
      by contrast, has a complex article system that distinguishes between specific/definite (the), specific/indefinite (a/an),
      generic (the plus singular or bare plural), and mass/non-count (zero article). Tamil speakers face a triple challenge:
      they must learn that articles exist as a grammatical category, they must learn the complex rules governing when to use
      a versus an versus the versus zero, and they must develop the habit of inserting articles automatically, which requires
      years of practice. The error is highly persistent because article omission does not typically cause communication failure
      -- listeners can usually understand the meaning from context, so the error is rarely corrected naturally.'
    teacher_tips:
      how_to_explain: 'Say: ''In Tamil, you can say just book -- no extra word needed. In English, every singular countable
        noun needs a companion word -- either a or the. Think of it like this: a means ANY one (not specific), the means THIS
        one (specific, we both know which).'' Write on board: ''___ book is on ___ table.'' Ask: ''Which book? Which table?''
        If specific then use the. If any book/table then use a. Use a bag of objects: hold up ''a pencil'' (any pencil) versus
        ''the pencil'' (this specific one).'
      where_to_start: 'Start with the indefinite article ''a/an'' using classroom objects. Hold up objects: ''This is a pen.
        This is a book.'' Then introduce ''the'' by pointing: ''The door is open. The board is clean.'' Establish the ANY
        versus THAT distinction before moving to abstract uses.'
      sequencing: 'Week 1: Indefinite article a/an with singular countable nouns. Week 2: Definite article ''the'' with specific/known
        referents. Week 3: Zero article with plurals and uncountables. Week 4: Generic reference (the tiger / tigers). Week
        5: Fixed expressions and exceptions (go to school, at home, by bus).'
      exercises:
      - name: 'Article Audit: Classroom Edition'
        type: fill-in-the-blank
        description: 'Students walk around the classroom and write 10 sentences about objects they see, using correct articles.
          Example: ''There is ___ whiteboard at the front. ___ whiteboard is new.'' Partners check each other''s articles.
          Teacher circulates and provides feedback.'
        duration: 15
      - name: A versus The Sorting Game
        type: matching
        description: Prepare 30 sentence strips with blanks where articles should go. Students work in pairs to place each
          sentence in the 'a/an' pile or 'the' pile and fill in the correct article. Sentences progress from concrete/visible
          to abstract. Pairs compare answers and discuss disagreements.
        duration: 15
      - name: Article-Free to Article-Full
        type: transformation
        description: Provide 12 Tamil-style bare-noun sentences (e.g., 'I bought book from store near house'). Students must
          add all necessary articles and rewrite the sentences correctly. Then they compare with a partner and explain their
          article choices.
        duration: 15
      - name: Spot the Article Error
        type: error-correction
        description: Give students a 150-word essay written by a fictional Tamil learner. The essay has 15 article errors
          (omissions and overuses). Students must find each error, correct it, and explain why the article was wrong. Class
          discusses the most common patterns found.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference and Other Problems (2nd ed.). Cambridge
      University Press.'
    - 'Master, P. (1997). The English article system: Acquisition, function, and pedagogy. System, 25(2), 215-232.'
    - Robertson, D. (2000). Variability in the use of the English article system by Chinese learners of English. Second Language
      Research, 16(2), 135-172.
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL Teacher''s Course (2nd ed.). Heinle & Heinle.'
    source_count: 4
    source_type: literature
    frequency: 5
    persistence: 5
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated. Article omission is the most frequent and persistent error for Tamil learners. It rarely
      blocks communication but is a major marker of non-nativeness.
    notes: Tamil has zero articles. The closest equivalent is oru (one) for indefinite reference and demonstratives for definite
      reference.
  negation:
    interference_patterns:
    - pattern: Tamil suffix -illai attached to verb for negation -> English requires do-support + not
      example_tamil: naan pookavillai (நான் போகவில்லை)
      example_gloss: I go-not
      example_wrong: I not go.
      example_correct: I do not go. / I do not go.
      explanation: Tamil negates verbs by adding the suffix -illai directly to the verb stem. There is no equivalent of English
        'do-support.' Tamil speakers transfer this pattern by placing 'not' directly after the subject or after the verb,
        producing 'I not like' or 'I like not.'
    - pattern: Double negation retained from Tamil -> English uses single negation with any/no
      example_tamil: yaarum varavillai (யாரும் வரவில்லை)
      example_gloss: Anyone came-not
      example_wrong: Nobody did not come.
      example_correct: Nobody came. / No one came.
      explanation: Tamil uses negative concord (yaarum 'anyone' plus illai 'not' = 'nobody'), which is grammatically correct
        in Tamil. English does not use negative concord -- 'Nobody came' is correct, but 'Nobody did not come' is a double
        negative. Tamil speakers may produce double negatives by transferring the Tamil pattern.
    - pattern: Negation of existential 'there is' -> English requires 'there is no' or 'there is not any'
      example_tamil: panam illai (பணம் இல்லை)
      example_gloss: Money is-not
      example_wrong: Money is not.
      example_correct: There is no money. / There is not any money.
      explanation: Tamil expresses existence and possession with the same construction (X-kku X illai = 'to-X X not-is' =
        'X does not have X'). English distinguishes 'there is no' for existence from 'does not have' for possession. Tamil
        speakers may produce 'Money is not' instead of 'There is no money.'
    - pattern: Negative adverb placement -> English requires specific positions for never, hardly, seldom
      example_tamil: naan orupoadhum podadhillai (நான் ஒருபோதும் போனதில்லை)
      example_gloss: I ever went-not
      example_wrong: I did not never go.
      example_correct: I never went. / I have never gone.
      explanation: Tamil places negative adverbs before the negated verb. English places 'never' before the main verb but
        after the auxiliary. Tamil speakers may produce 'I did not never go' by transferring the Tamil negative concord pattern.
    examples:
    - 'Wrong: ''I not like coffee.'' Correct: ''I do not like coffee.'''
    - 'Wrong: ''He not came to class.'' Correct: ''He did not come to class.'''
    - 'Wrong: ''She can not swim.'' Correct: ''She cannot swim.'''
    - 'Wrong: ''I did not see nobody.'' Correct: ''I did not see anybody.'' / ''I saw nobody.'''
    why_it_happens: 'Tamil negation is achieved through suffixation -- the negative marker -illai is attached directly to
      the verb stem, creating a single word (e.g., pookavillai ''go-not'' = ''did not go''). This is fundamentally different
      from English, which requires an auxiliary verb (''do'') plus a separate negation word (''not'') placed between the auxiliary
      and the main verb. Tamil speakers must learn three things simultaneously: that English requires a separate word ''not''
      rather than a suffix, that ''do'' must be inserted as a carrier for negation (do-support), and that the main verb returns
      to its base form after ''do.'' Additionally, Tamil uses negative concord (multiple negative elements in one sentence),
      which is grammatical in Tamil but produces double negatives in English. The error is persistent because Tamil negation
      is a single morphological operation, while English negation is a multi-word syntactic construction.'
    teacher_tips:
      how_to_explain: 'Write on board: Tamil = VERB plus not-suffix (one word). English = DO plus not plus VERB (three words).
        Say: ''In Tamil, you stick not onto the verb like glue. In English, you need a helper word -- do -- to carry the not.
        The helper changes: I don''t, he doesn''t, she didn''t. The main verb stays in its simple form.'' Use a helper metaphor:
        ''do'' is like a truck that carries ''not'' to the verb.'
      where_to_start: 'Begin with present simple negative: ''I like'' becomes ''I do not like'' becomes ''I don''t like.''
        Use the contraction early -- it is what students will hear most. Drill with high-frequency verbs: like, want, have,
        go, eat. Then move to past simple: ''He came'' becomes ''He did not come.'''
      sequencing: 'Week 1: Present simple negative with don''t/doesn''t. Week 2: Past simple negative with didn''t. Week 3:
        Negative with modals (can''t, won''t, shouldn''t). Week 4: Negative concord versus single negation (nobody versus
        not...anybody). Week 5: Negative adverbs (never, hardly, seldom) and inversion.'
      exercises:
      - name: Do-Support Drill
        type: oral-drill
        description: 'Teacher says affirmative sentences. Students must produce the negative form as quickly as possible.
          Start with present simple (Teacher: ''She likes tea.'' Student: ''She doesn''t like tea.''), then past simple, then
          modals. Use a ball-toss format: teacher tosses ball while saying the affirmative, student catches and produces the
          negative. 20 sentences per round.'
        duration: 15
      - name: Negative Sentence Rewrite
        type: transformation
        description: Provide 15 Tamil-style negative sentences (e.g., 'I not want go.' 'She not can swim.'). Students rewrite
          each one with correct English do-support and negation. After writing, they identify which auxiliary (do/does/did/can/will)
          was needed and why.
        duration: 15
      - name: Double Negative Detective
        type: error-correction
        description: Give students 12 sentences, half with double negatives from Tamil transfer and half correct. Students
          identify which are wrong, explain why, and correct them. Include tricky cases.
        duration: 10
      - name: Negation Translation Challenge
        type: translation
        description: Provide 10 Tamil sentences with illai negation. Students translate each into correct English, paying
          attention to do-support, tense, and negative concord. Sentences progress from simple present to complex past perfect
          negative.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference and Other Problems (2nd ed.). Cambridge
      University Press.'
    - Annamalai, E. (2000). Negation in Tamil. In The Syntax of Negation and the Licensing of Negative Polymorphic Items,
      Lincom Europa.
    - Huddleston, R. & Pullum, G.K. (2002). The Cambridge Grammar of the English Language. Cambridge University Press.
    - 'Celce-Murcia, M. & Larsen-Freeman, D. (1999). The Grammar Book: An ESL/EFL Teacher''s Course (2nd ed.). Heinle & Heinle.'
    source_count: 4
    source_type: literature
    frequency: 4
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated. Negation errors are frequent and persistent due to the fundamental morphological versus
      syntactic difference between Tamil suffixation and English do-support.
    notes: Tamil -illai is a suffix, not a separate word. This is the root cause of do-support errors.
  noun_cases:
    interference_patterns:
    - pattern: Tamil dative case -kku transferred as 'to' but overgeneralized -> English uses word order and prepositions
        differently
      example_tamil: naan avanukku puththagam kodutthen (நான் அவனுக்கு புத்தகம் கொடுத்தேன்)
      example_gloss: I him-to book gave
      example_wrong: I gave the book to him.
      example_correct: I gave him the book. / I gave the book to him.
      explanation: Tamil uses the dative case marker -kku to mark the recipient, and the word order is typically Subject plus
        Dative plus Object plus Verb. English can use either double-object construction ('I gave him the book') or prepositional
        ('I gave the book to him'). Tamil speakers may overuse the 'to' construction because it maps more directly from the
        dative case.
    - pattern: Tamil accusative case -ai omitted in English -> English uses word order, not case markers
      example_tamil: naan puththagaththai vaanginen (நான் புத்தகத்தை வாங்கினேன்)
      example_gloss: I book-accusative bought
      example_wrong: I bought book.
      example_correct: I bought the book.
      explanation: Tamil marks the direct object with the accusative suffix -ai. Since English has no case markers on common
        nouns, Tamil speakers may feel that the object is 'unmarked' and omit articles as well. The accusative case in Tamil
        also signals definiteness, which maps to English 'the.'
    - pattern: Locative case -il transferred as 'in/on/at' with errors -> English preposition choice depends on spatial relationship
      example_tamil: puththagam mesayil irukkiradhu (புத்தகம் மேசையில் இருக்கிறது)
      example_gloss: Book table-on is
      example_wrong: Book is in table.
      example_correct: The book is on the table.
      explanation: Tamil uses the locative suffix -il for all surface contact (on, in, at). English distinguishes 'on' (surface),
        'in' (enclosed), and 'at' (point location). Tamil speakers may use 'in' for all locative meanings because -il covers
        all of them.
    - pattern: Pronoun case forms confused -> English pronouns retain case distinctions (I/me, he/him, she/her)
      example_tamil: enai avan paarththaan (என்னை அவன் பார்த்தான்)
      example_gloss: Me he saw
      example_wrong: Me saw him.
      example_correct: He saw me.
      explanation: 'Tamil pronouns also change form for case (naan ''I'' -> ennai ''me''), but the mapping is not 1:1 with
        English. Tamil speakers may use the wrong English pronoun form, especially in coordinated structures: ''Me and him
        went'' instead of ''He and I went.'''
    examples:
    - 'Wrong: ''I gave the book to him.'' (overuse of ''to'' where double-object is natural) Correct: ''I gave him the book.'''
    - 'Wrong: ''She is in bus.'' Correct: ''She is on the bus.'''
    - 'Wrong: ''Me and him went to store.'' Correct: ''He and I went to the store.'''
    - 'Wrong: ''I bought book from shop.'' Correct: ''I bought the book from the shop.'''
    why_it_happens: 'Tamil is an agglutinative language with 8 grammatical cases marked by suffixes: nominative (unmarked),
      accusative (-ai), dative (-kku), instrumental (-aal), locative (-il), genitive (-udaiya/oda), vocative (-e), and ablative
      (-irundhu). Each suffix is added to the noun stem, and multiple suffixes can stack. English, by contrast, has almost
      no case marking on nouns (only possessive ''s and pronoun forms like I/me/him). English relies on word order and prepositions
      to express the same relationships that Tamil expresses through case suffixes. Tamil speakers must learn to translate
      case suffixes into prepositions, but the mapping is imperfect: one Tamil case may correspond to multiple English prepositions
      depending on context. The locative -il alone can mean ''in,'' ''on,'' ''at,'' or ''upon'' in English. This many-to-many
      mapping causes persistent preposition errors.'
    teacher_tips:
      how_to_explain: 'Draw a diagram on the board showing Tamil noun plus case suffix on one side and English noun plus preposition
        on the other. Say: ''In Tamil, you add a small piece to the END of the noun to show its job in the sentence. In English,
        you put a SMALL WORD BEFORE the noun instead.'' Show: mesai plus il = table plus on = ''on the table.'' Use physical
        objects: put a book ON a table, IN a box, AT a desk -- each time showing the Tamil suffix and the English preposition.'
      where_to_start: Begin with the locative case (-il) and the three English prepositions 'in,' 'on,' 'at.' Use real objects
        in the classroom. Then move to the dative (-kku) and 'to/for.' Finally, cover the accusative (-ai) and its relationship
        to English articles and word order.
      sequencing: 'Week 1: Locative case -- in/on/at with physical objects. Week 2: Dative case -- to/for with verbs of giving
        and telling. Week 3: Accusative case -- word order and article usage. Week 4: Instrumental and ablative cases -- with/from/by.
        Week 5: Pronoun case forms (I/me, he/him, she/her, we/us, they/them).'
      exercises:
      - name: Case-to-Preposition Mapping
        type: matching
        description: Create cards with Tamil case suffixes on one set (8 cards) and English prepositions on another set (15+
          cards). Students match each Tamil case to its possible English preposition equivalents. Discuss cases where one
          Tamil case maps to multiple English prepositions. Then students write 3 example sentences for each mapping.
        duration: 20
      - name: Preposition Picture Dictation
        type: oral-drill
        description: 'Teacher describes scenes using Tamil locative constructions. Students draw what they hear, then write
          the correct English prepositional phrase. Example: ''The cat is -il the table'' becomes students draw and write
          ''The cat is on the table.'' 10 scenes total, progressing from simple to complex spatial relationships.'
        duration: 15
      - name: Pronoun Case Correction
        type: error-correction
        description: Give students a worksheet with 15 sentences containing pronoun case errors typical of Tamil speakers
          (e.g., 'Me and him went,' 'Between you and I,' 'She gave it to he'). Students correct each sentence and identify
          the grammatical role (subject, object, object of preposition) of each pronoun.
        duration: 10
      - name: Tamil Case Translation
        type: translation
        description: Provide 10 Tamil sentences with case-marked nouns. Students must identify each case suffix, determine
          the correct English preposition (or word order), and translate the sentence. Include at least one sentence where
          the Tamil case maps to multiple possible English prepositions, requiring context to choose.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference and Other Problems (2nd ed.). Cambridge
      University Press.'
    - Lehmann, T. (1993). A Grammar of Modern Tamil. Pondicherry Institute of Linguistics and Culture.
    - Asher, R.E. (1982). Tamil. Lingua Descriptive Studies, North-Holland.
    - Murphy, R. (2019). English Grammar in Use (5th ed.). Cambridge University Press.
