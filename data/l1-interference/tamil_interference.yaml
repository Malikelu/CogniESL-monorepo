    source_type: literature
    frequency: 4
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated. Case-to-preposition mapping is a major source of errors. The many-to-many mapping between
      Tamil cases and English prepositions makes this highly persistent.
    notes: Tamil has 8 cases. The locative -il is particularly problematic as it maps to in/on/at.
  postpositions:
    interference_patterns:
    - pattern: Tamil postposition placed after noun -> English preposition must be placed before noun
      example_tamil: mesakkum meel (மேசைக்கு மேல்)
      example_gloss: Table-to above
      example_wrong: Table above is the book.
      example_correct: The book is above the table.
      explanation: Tamil uses postpositions -- relational words that come AFTER the noun. English uses prepositions -- relational
        words that come BEFORE the noun. Tamil speakers may place the relational word after the noun in English, producing
        'table above' instead of 'above the table.'
    - pattern: Compound postpositions transferred word-by-word -> English uses single prepositions
      example_tamil: vittukku pinnal (வீட்டுக்கு பின்னால்)
      example_gloss: House-to behind
      example_wrong: House behind.
      example_correct: Behind the house.
      explanation: Tamil compound postpositions combine a case-marked noun with a relational word (e.g., -kku pinnal 'to-behind'
        = 'behind'). English uses a single preposition. Tamil speakers may produce two-word preposition-like structures or
        place the relational word in the wrong position.
    - pattern: Postposition kkul (inside) transferred -> English 'in/inside' placement
      example_tamil: pettikkuL (பெட்டிக்குள்)
      example_gloss: Box-to inside
      example_wrong: Box inside the pen is.
      example_correct: The pen is inside the box.
      explanation: Tamil postposition kkul means 'into/inside' and follows the noun with a dative case marker. English 'inside'
        precedes the noun as a preposition. Tamil speakers may produce postpositional word order in English.
    examples:
    - 'Wrong: ''The cat is table under.'' Correct: ''The cat is under the table.'''
    - 'Wrong: ''She stood the door behind.'' Correct: ''She stood behind the door.'''
    - 'Wrong: ''He put the keys the bag inside.'' Correct: ''He put the keys inside the bag.'''
    - 'Wrong: ''The picture is the wall on.'' Correct: ''The picture is on the wall.'''
    why_it_happens: 'Tamil is a head-final language, which means that relational words (postpositions) come AFTER the noun
      they modify, just as verbs come after objects. English is largely head-initial: prepositions come BEFORE the noun. This
      is a systematic typological difference -- Tamil speakers must learn to reverse the order of noun plus relational word
      to relational word plus noun. The challenge is compounded because Tamil postpositions are often compound forms that
      include a case marker (e.g., -kku meel ''to-above'' = ''above''), making them two-word units that do not map cleanly
      onto single English prepositions. Additionally, some Tamil postpositions have aspectual or directional meanings (e.g.,
      -kkul ''into'' versus -il ''in'') that require Tamil speakers to learn new semantic distinctions in English prepositions.'
    teacher_tips:
      how_to_explain: 'Hold up a book and place it on a table. Say: ''In Tamil, you say TABLE -- ON (noun first, position
        word second). In English, you say ON -- THE TABLE (position word first, noun second).'' Write the pattern: Tamil =
        NOUN plus POSTPOSITION. English = PREPOSITION plus NOUN. Use hand gestures: left hand = noun, right hand = position
        word. Show that Tamil puts the left hand first, English puts the right hand first.'
      where_to_start: 'Begin with spatial prepositions/postpositions: above/below, in front of/behind, inside/outside, on/under.
        Use real objects in the classroom. Students physically place objects and describe their positions in English. Then
        move to temporal prepositions (before/after, during) and abstract uses.'
      sequencing: 'Week 1: Spatial prepositions (in, on, at, under, above, behind, in front of). Week 2: Directional prepositions
        (into, out of, toward, through). Week 3: Temporal prepositions (before, after, during, since, until). Week 4: Abstract
        prepositions (about, for, with, without, despite). Week 5: Prepositional phrases and collocations.'
      exercises:
      - name: Position Word Swap
        type: transformation
        description: Provide 15 Tamil-style postpositional phrases (e.g., 'table under,' 'house behind,' 'box inside'). Students
          must rewrite each as a correct English prepositional phrase (e.g., 'under the table,' 'behind the house,' 'inside
          the box'). Then use each phrase in a complete sentence.
        duration: 15
      - name: Classroom Treasure Hunt
        type: oral-drill
        description: Hide 10 objects around the classroom. Give students clues using Tamil-style postpositional word order
          (e.g., 'The key is desk under'). Students must first convert the clue to correct English ('The key is under the
          desk') and then find the object. First team to find all 10 wins.
        duration: 20
      - name: Preposition or Postposition
        type: matching
        description: 'Give students 20 sentence pairs: one with Tamil postpositional order and one with correct English prepositional
          order. Students identify which is correct English and explain why. Include tricky cases where the postposition and
          preposition have different meanings.'
        duration: 10
      - name: Draw the Preposition
        type: composition
        description: Students write a 6-sentence description of their bedroom or a room they know well, using at least 8 different
          prepositions correctly. Then they draw the room based on their description. Partners read each other's descriptions
          and try to draw the room without seeing the original. Compare drawings to check preposition accuracy.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference and Other Problems (2nd ed.). Cambridge
      University Press.'
    - Annamalai, E. & Steever, S.B. (1998). Modern Tamil. In The Dravidian Languages, Routledge.
    - Lindstromberg, S. (2010). English Prepositions Explained (revised ed.). John Benjamins.
    - Murphy, R. (2019). English Grammar in Use (5th ed.). Cambridge University Press.
