      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 199
      tier: 2
  articles_advanced:
    interference_patterns:
    - pattern: Definite article overgeneralization
      example_l1: '[ta] example'
      example_gloss: gloss
      example_wrong: I went to the school.
      example_correct: I went to school.
      explanation: Tamil uses definite articles in contexts where English omits them
        (school, church, bed).
      frequency: 4
      persistence: 3
      communicative_impact: 3
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Article omission with abstract nouns
      example_l1: '[ta] example'
      example_gloss: gloss
      example_wrong: Patience is important.
      example_correct: Patience is important.
      explanation: Tamil may use articles with abstract nouns where English omits
        them.
      frequency: 3
      persistence: 2
      communicative_impact: 2
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Tamil article usage differs from English in several contexts,
      leading to overgeneralization or omission errors.
    teacher_tips:
      how_to_explain: 'Teach: English omits articles before school, church, bed, work,
        home (when used in their primary sense).'
      where_to_start: Start with the most common article errors.
      sequencing: 'Week 1: Articles with institutions. Week 2: Articles with abstract
        nouns. Week 3: Review.'
