  preposition_transfer_sw:
    interference_patterns:
    - pattern: Using in for all locations because Swahili uses katika (in/inside/at)
        broadly
      example: 'Swahili: Niko katika duka (I-am in shop) -> Erroneous: I am in the
        shop (when at is more natural) -> Correct: I am at the shop'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omitting prepositions after verbs that take direct objects in Swahili
        but require prepositions in English
      example: 'Swahili: Ninakula chakula (I-eat food, no preposition) -> But English
        look at needs preposition -> Erroneous: I look the picture -> Correct: I look
        at the picture'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Adding prepositions where English uses bare infinitives, by analogy
        with Swahili infinitive marker ku-
      example: 'Swahili: Ninataka kuenda (I-want to-go, ku-=infinitive) -> Erroneous:
        I want go (dropping to) or I want for go -> Correct: I want to go'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using of for possession by transferring Swahili associative construction
        ya
      example: 'Swahili: Kitabu cha mwalimu (Book of teacher, cha=associative) ->
        Erroneous: The book of the teacher -> Correct: The teacher''s book'
      frequency: 3
      persistence: 3
      communicative_impact: 1
    examples:
    - 'Wrong: I arrived to the airport. -> Correct: I arrived at the airport.'
    - 'Wrong: She is good in mathematics. -> Correct: She is good at mathematics.'
    - 'Wrong: I listened the radio. -> Correct: I listened to the radio.'
    - 'Wrong: We discussed about the problem. -> Correct: We discussed the problem.'
    why_it_happens: 'Swahili has a smaller set of prepositions (locatives like katika,
      kwenye, huko) that cover broader semantic ranges than their English equivalents.
      For example, katika can mean in, inside, at, or within depending on context.
      English prepositions are highly specific and often arbitrary: we say at the
      store but in the building, on Monday but in January. Additionally, Swahili verbs
      that are transitive (take direct objects) may correspond to English verbs that
      require prepositions: kulia (to cry) vs. to cry about, kuona (to see) vs. to
      look at. The Swahili infinitive marker ku- (as in kuenda = to go) is attached
      directly to the verb, which can lead learners to omit to in English infinitives
      or to add unnecessary prepositions.'
    teacher_tips:
      how_to_explain: 'Say: Prepositions are one of the hardest parts of English because
        there are no simple rules. In Swahili, katika covers many situations. In English,
        we use different words: at, in, on, by, for, with -- and you have to memorize
        which verb or adjective goes with which preposition. Use a three-column chart:
        Verb/Adjective | Preposition | Example. Say: Think of prepositions as part
        of the verb -- listen TO, look AT, good AT. Learn them together.'
      where_to_start: 'Start with the most common prepositions of time and place:
        at, in, on. Teach the at = point, in = enclosed, on = surface rule. Then move
        to verb+preposition combinations: listen to, look at, wait for, good at.'
      sequencing: 'Week 1: Prepositions of place (at/in/on). Week 2: Prepositions
        of time (at/in/on/for/since/during). Week 3: Verb + preposition combinations.
        Week 4: Adjective + preposition combinations.'
      exercises:
      - name: Preposition Gap Fill
        type: fill-in-the-blank
        description: 'Provide 20 sentences with prepositions removed: I arrived ___
          the airport, She is good ___ tennis, We listened ___ music. Students choose
          the correct preposition.'
        duration: 15
      - name: Verb-Preposition Match
        type: matching
        description: 'Give students two columns: verbs (listen, look, wait, depend,
          believe, arrive) and prepositions (to, at, for, on, in). Students match
          and then write sentences: listen to music, arrive at the airport.'
        duration: 15
      - name: Picture Prepositions
        type: oral-drill
        description: 'Show a picture of a room. Students describe where things are
          using correct prepositions: The book is on the table, The cat is under the
          chair, The picture is on the wall.'
        duration: 10
      - name: Preposition Error Hunt
        type: error-correction
        description: Provide a short text with 10 preposition errors typical of Swahili
          speakers. Students find and correct each one.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - Lindstromberg, S. (2010). English Prepositions Explained. John Benjamins.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity -- Swahili
    notes: Preposition errors are common but rarely cause total communication breakdown.
    source_rank: 1
