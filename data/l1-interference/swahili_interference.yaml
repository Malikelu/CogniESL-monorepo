    - pattern: Adverb placement differences
      example_l1: '[sw] example'
      example_gloss: gloss
      example_wrong: I always am happy.
      example_correct: I am always happy.
      explanation: Swahili places adverbs differently from English, often before the
        verb or at the end of the sentence.
      frequency: 3
      persistence: 3
      communicative_impact: 2
      etiology: interlingual
      flagged: false
      tier: 3
    why_it_happens: Swahili adverb placement rules differ from English. English places
      adverbs after 'be' and before other verbs.
    teacher_tips:
      how_to_explain: 'Teach: Adverbs go after ''be'' (I am always) and before other
        verbs (I always go).'
      where_to_start: Start with adverbs of frequency. Then teach other adverb types.
      sequencing: 'Week 1: Frequency adverbs. Week 2: Manner adverbs. Week 3: Time
        adverbs. Week 4: Review.'
    flagged: false
