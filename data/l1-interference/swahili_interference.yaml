  conditional_mood_sw:
    interference_patterns:
    - pattern: Using would in the if-clause because Swahili conditional uses the same
        verb form in both clauses
      example: 'Swahili: Ningekuwa na pesa, ningenunua gari (If-I-had money, I-would-buy
        car) -> Erroneous: If I would have money, I would buy a car -> Correct: If
        I had money, I would buy a car'
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using would in the if-clause because Swahili
        conditional uses the same verb form in both clauses.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using present tense in the if-clause for hypothetical situations
      example: 'Swahili: Nikikuwa mzuri, ningekuja (If-I-am good, I-would-come) ->
        Erroneous: If I am rich, I will buy a car -> Correct: If I were rich, I would
        buy a car'
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using present tense in the if-clause for hypothetical
        situations.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using will in the if-clause by transferring Swahili future marker -ta-
      example: 'Swahili: Utaenda, utaniona (You-will-go, you-will-see-me) -> Erroneous:
        If you will go, you will see me -> Correct: If you go, you will see me'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using will in the if-clause by transferring
        Swahili future marker -ta-.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: If I would have money, I would travel. -> Correct: If I had money, I
      would travel.'
    - 'Wrong: If I will have time, I will call you. -> Correct: If I have time, I
      will call you.'
    - 'Wrong: If I am you, I would study harder. -> Correct: If I were you, I would
      study harder.'
    - 'Wrong: If she will come, I will be happy. -> Correct: If she comes, I will
      be happy.'
    why_it_happens: 'Swahili conditional sentences use the conditional marker -ng-
      in both the if-clause and the main clause. The same marker appears in both clauses,
      so learners may use would in both clauses in English. Additionally, Swahili
      does not distinguish grammatically between real/possible conditions (first conditional)
      and unreal/hypothetical conditions (second conditional) the way English does.
      English requires different verb forms: If I have... I will (real) vs. If I had...
      I would (unreal). The English subjunctive were (If I were you) is particularly
      challenging because Swahili has no subjunctive form that maps onto this pattern.'
    teacher_tips:
      how_to_explain: 'Say: English has two types of if-sentences. Type 1: REAL possibilities
        -- If I HAVE time, I WILL call you. Type 2: UNREAL/HYPOTHETICAL -- If I HAD
        time, I WOULD call you. The difference is: Type 1 can really happen. Type
        2 is imaginary. For the subjunctive, say: In English, we say If I WERE you,
        not If I WAS you.'
      where_to_start: 'Start with first conditional (real/possible): If it rains,
        I will stay home. Then introduce second conditional (unreal/hypothetical):
        If I were a bird, I would fly.'
      sequencing: 'Week 1: First conditional (real/possible). Week 2: Second conditional
        (unreal/hypothetical). Week 3: The subjunctive were. Week 4: Mixed conditionals
        and error correction.'
      exercises:
      - name: Conditional Sort
        type: matching
        description: Give students 15 if-sentences. They sort them into real/possible
          (first conditional) and unreal/hypothetical (second conditional). Then write
          the correct main clause for each.
        duration: 15
      - name: Conditional Transformation
        type: transformation
        description: 'Give students 10 first conditional sentences. Students transform
          them into second conditional: If I have time, I will help -> If I had time,
          I would help.'
        duration: 15
      - name: Would in the If-Clause Fix
        type: error-correction
        description: 'Provide 10 sentences with would in the if-clause: If I would
          have money, If she would come. Students correct: If I had money, If she
          came.'
        duration: 15
      - name: Conditional Chain Story
        type: composition
        description: 'Students write a chain of conditional sentences: If I won the
          lottery, I would buy a house. If I bought a house, I would invite my friends.
          Minimum 8 sentences.'
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
