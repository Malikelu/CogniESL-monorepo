  negation_patterns:
    interference_patterns:
    - pattern: Placing not directly after the subject without auxiliary do because
        Swahili uses a negative prefix on the verb
      example: 'Swahili: Sisomi (I-not-read, si-=not) -> Literal: I not read -> Erroneous:
        I not like coffee -> Correct: I do not like coffee'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Using no before the verb as a general negator by transferring Swahili
        hapana pattern
      example: 'Swahili: Hapana (no/not) can precede verbs -> Erroneous: I no like
        coffee -> Correct: I do not like coffee'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Double negation by transferring Swahilis multiple negation markers
      example: 'Swahili: Sioni kitu chochote (I-not-see thing any) -- multiple negation
        is grammatical -> Erroneous: I do not see nothing -> Correct: I do not see
        anything'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Placing adverbs of frequency after negation in wrong order
      example: 'Swahili: Sikula kamwe (I-not-eat never) -> Erroneous: I do not eat
        never -> Correct: I never eat'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: I not like coffee. -> Correct: I do not like coffee. / I do not like
      coffee.'
    - 'Wrong: He not came to school. -> Correct: He did not come to school.'
    - 'Wrong: I no want to go. -> Correct: I do not want to go.'
    - 'Wrong: She do not never lie. -> Correct: She never lies. / She does not ever
      lie.'
    why_it_happens: 'Swahili negation is marked by prefixes on the verb: si- (negative
      for 1st person singular), ha- (negative for 3rd person), etc. For example: sisomi
      (I do not read), hataki (he does not want). There is no equivalent of English
      do-support -- the negation is built into the verb itself. Swahili also allows
      multiple negation (sisomi kitu chochote = I do not see anything), which is grammatical
      in Swahili but non-standard in English. When Swahili speakers transfer these
      patterns to English, they produce I not like, I no want, and I do not see nothing.
      The do-support requirement in English negation is particularly challenging because
      it has no counterpart in Swahili -- the learner must insert an entire auxiliary
      word that carries no meaning.'
    teacher_tips:
      how_to_explain: 'Say: In Swahili, you put not inside the verb: sisomi = si-soma.
        In English, you need a helper word: DO. The formula is: Subject + DO/DOES/DID
        + NOT + Base Verb. Write on the board: I like -> I DO NOT like. She likes
        -> She DOES NOT like. He liked -> He DID NOT like. For double negation, say:
        In Swahili, you can say I not see nothing. In English, only one negative is
        allowed: I do not see anything.'
      where_to_start: 'Start with present tense negation using do not and does not.
        Use the helper metaphor: DO carries the negation. The main verb stays in its
        base form. Then move to past tense with did not. Finally, address double negation.'
      sequencing: 'Week 1: Present tense negation (do not/does not). Week 2: Past
        tense negation (did not). Week 3: Negation with modal verbs (can''t, won''t,
        should not). Week 4: Double negation and negative adverbs (never, hardly,
        seldom).'
      exercises:
      - name: Negation Transformation
        type: transformation
        description: 'Give students 15 affirmative sentences. They must make each
          negative: I like coffee -> I do not like coffee. She speaks French -> She
          does not speak French. They went home -> They did not go home.'
        duration: 15
      - name: Double Negation Fix
        type: error-correction
        description: 'Provide 10 sentences with double negation: I do not want nothing,
          She does not never come, We do not have no time. Students correct each one:
          I do not want anything, She never comes, We do not have any time.'
        duration: 15
      - name: Negative Adverb Swap
        type: sentence-rewrite
        description: 'Give students sentences with not...never/nothing/nowhere. Students
          rewrite using the correct negative adverb: I do not eat never -> I never
          eat. She does not see nothing -> She does not see anything.'
        duration: 15
      - name: Negation Interview
        type: oral-drill
        description: 'Students ask each other negative questions: Do you like spinach?
          Partner must answer negatively: No, I do not like spinach. Did you go to
          the party? -> No, I did not go to the party. Practice with 10 question-answer
          pairs.'
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 4
    communicative_impact: 3
