  wh_question_formation:
    interference_patterns:
    - pattern: Forming yes/no questions without do support because Swahili questions
        are formed by intonation or question particles alone
      example: 'Swahili: Unakula? (You-eat? -- just add question intonation) -> Erroneous:
        You eat pizza? -> Correct: Do you eat pizza?'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Keeping the wh-word in situ (in its original position) rather than
        fronting it
      example: 'Swahili: Uliniunzia nini? (You-bought-me what?) -- nini (what) stays
        in object position -> Erroneous: You bought me what? -> Correct: What did
        you buy me?'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Omitting auxiliary do/does/did in wh-questions
      example: 'Swahili: Unakwenda wapi? (You-go where?) -> Erroneous: Where you go?
        -> Correct: Where do you go?'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - 'Wrong: You like coffee? -> Correct: Do you like coffee?'
    - 'Wrong: Where you live? -> Correct: Where do you live?'
    - 'Wrong: What you want? -> Correct: What do you want?'
    - 'Wrong: When she came? -> Correct: When did she come?'
    why_it_happens: 'Swahili forms questions in two ways: (1) by changing intonation
      alone (statement Unakula = You eat -> question Unakula? = You eat?), or (2)
      by adding question particles like je or -je at the end. There is no equivalent
      of English do-support, no subject-auxiliary inversion, and wh-words typically
      remain in their original position (in-situ) rather than moving to the front.
      For example, Uliniunzia nini? literally means You-bought-me what? -- the wh-word
      nini (what) stays where the object would normally be. English requires three
      operations that do not exist in Swahili: (a) insert do/does/did, (b) invert
      the subject and auxiliary, and (c) front the wh-word. This triple requirement
      makes English question formation one of the most complex syntactic operations
      for Swahili learners.'
    teacher_tips:
      how_to_explain: 'Say: In Swahili, you can turn a statement into a question just
        by changing your voice. In English, you need a helper word: DO, DOES, or DID.
        You cannot just say You like coffee? -- you must say DO you like coffee? Write
        the formula on the board: YES/NO QUESTIONS: Do/Does/Did + Subject + Base Verb.
        WH-QUESTIONS: Wh-word + Do/Does/Did + Subject + Base Verb.'
      where_to_start: 'Start with yes/no questions using do and does in the present
        tense. Use the helper metaphor: DO is a helper that English questions need.
        Without the helper, the question is broken. Then move to wh-questions, adding
        the wh-word before the helper.'
      sequencing: 'Week 1: Yes/no questions with do/does. Week 2: Wh-questions with
        do/does. Week 3: Questions in past tense with did. Week 4: Questions with
        modal verbs (can, will, should -- no do-support needed).'
      exercises:
      - name: Do-Support Drill
        type: transformation
        description: 'Give students 15 statements. They must turn each into a question:
          You like pizza -> Do you like pizza? She speaks French -> Does she speak
          French? They went home -> Did they go home?'
        duration: 15
      - name: Question Interview
        type: oral-drill
        description: 'Students pair up and interview each other, asking only questions.
          Partner A answers, Partner B must form correct questions: What do you eat
          for breakfast? Where do you live? Do you like music? Partners switch roles.'
        duration: 15
      - name: Wh-Word Fronting
        type: sentence-rewrite
        description: 'Give students 10 in-situ questions (Swahili-style): You bought
          what? She went where? They came when? Students rewrite with correct English
          word order: What did you buy? Where did she go? When did they come?'
        duration: 15
      - name: Question Formation Race
        type: oral-drill
        description: Teacher says a statement. Students race to form the correct question.
          First student to say the correct question gets a point. Use a mix of yes/no
          and wh-questions.
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
