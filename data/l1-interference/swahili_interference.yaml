  conjunctions_and_contrast:
    interference_patterns:
    - pattern: Using but after although because Swahili allows paired conjunctions
        ingawa...lakini (although...but)
      example: 'Swahili: Ingawa alikuwa mgonjwa, lakini alikuja (Although he-was sick,
        but he-came) -> Erroneous: Although he was sick, but he came -> Correct: Although
        he was sick, he came OR He was sick, but he came'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Using because...so together by transferring Swahili kwa sababu...kwa
        hiyo paired structure
      example: 'Swahili: Kwa sababu alikuwa mgonjwa, kwa hiyo hakukuja -> Erroneous:
        Because he was sick, so he did not come -> Correct: Because he was sick, he
        did not come OR He was sick, so he did not come'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using also at the end of sentences because Swahili pia typically appears
        clause-finally
      example: 'Swahili: Mimi pia ninakula -> Erroneous: I eat also -> Correct: I
        also eat / I eat too'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: Although it rains, but I go. -> Correct: Although it rains, I go. OR
      It rains, but I go.'
    - 'Wrong: Because I was tired, so I slept. -> Correct: Because I was tired, I
      slept. OR I was tired, so I slept.'
    - 'Wrong: I also like music also. -> Correct: I also like music. / I like music
      too.'
    - 'Wrong: Even though he is rich, but he is not happy. -> Correct: Even though
      he is rich, he is not happy.'
    why_it_happens: 'Swahili uses paired conjunctions where English uses a single
      conjunction. Ingawa...lakini (although...but) and kwa sababu...kwa hiyo (because...so)
      are both grammatical in Swahili. English uses only one conjunction per clause:
      although OR but, because OR so, never both. This is a fundamental difference
      in how the two languages organize logical relationships between clauses.'
    teacher_tips:
      how_to_explain: 'Say: In Swahili, you use two words: ingawa...lakini (although...but).
        In English, you use only ONE. Choose: ALTHOUGH... (no but) OR ...BUT (no although).
        Use the one door metaphor: English has one door for each idea.'
      where_to_start: Start with although...but since it is the most frequent error.
        Use the choose one exercise.
      sequencing: 'Week 1: Although/but (choose one). Week 2: Because/so (choose one).
        Week 3: Also/too placement. Week 4: Other conjunction pairs.'
      exercises:
      - name: Conjunction Reduction
        type: sentence-rewrite
        description: 'Give students 10 sentences with double conjunctions: Although
          it was cold, but I went out. Students rewrite using only ONE conjunction.'
        duration: 15
      - name: Conjunction Choice
        type: fill-in-the-blank
        description: Provide 15 sentences with a blank where a conjunction should
          be. Students choose the correct single conjunction.
        duration: 15
      - name: Swahili-to-English Conjunction Translation
        type: translation
        description: Give students 10 Swahili sentences with paired conjunctions.
          Students translate to English using only one conjunction per sentence.
        duration: 15
      - name: Conjunction Essay
        type: composition
        description: 'Students write a short essay about their hometown, using at
          least 5 different conjunctions correctly. Peer review: partners check for
          double conjunctions.'
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
