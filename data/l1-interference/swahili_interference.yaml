  cohesion_and_discourse_markers:
    interference_patterns:
    - pattern: Using so as a universal connector because Swahili kwa hiyo is used
        more broadly than English so/therefore
      example: 'Swahili: Kwa hiyo, nilikuja -> Erroneous: So I went to the store.
        So I bought food. So I went home. -> Correct: Then I went to the store. After
        that, I bought food. Finally, I went home.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
