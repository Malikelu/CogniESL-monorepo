  tonal_interference_in_english:
    interference_patterns:
    - pattern: Applying Swahili penultimate stress pattern to English words, stressing
        the second-to-last syllable
      example: 'Swahili: sahani (plate) -- stress on penultimate: sa-HA-ni -> English:
        banana should be ba-NANA but learner says BAN-a-na with penultimate stress'
      frequency: 4
      persistence: 4
      communicative_impact: 2
    - pattern: Using Swahili syllable-timed rhythm instead of English stress-timed
        rhythm
      example: Swahili is syllable-timed (each syllable roughly equal duration) ->
        English computer should be com-PU-ter but learner says COM-PU-TER with equal
        weight on all syllables
      frequency: 4
      persistence: 5
      communicative_impact: 2
    - pattern: Flat intonation on questions because Swahili uses question particles
        (je) rather than rising intonation
      example: 'Swahili: Unakula? (You-eat? -- question particle optional, intonation
        relatively flat) -> English Are you eating? requires rising intonation ->
        Learner says Are you eating? with flat intonation'
      frequency: 3
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: PHO-to-graph (equal stress) -> Correct: PHO-to-graph (stress on first
      syllable)'
    - 'Wrong: Are you coming? (flat intonation) -> Correct: Are you coming? (rising
      intonation on coming)'
    - 'Wrong: de-CI-sion (penultimate stress) -> Correct: de-CI-sion (stress on second
      syllable)'
    why_it_happens: Swahili is a syllable-timed language with predictable penultimate
      stress -- the second-to-last syllable of every word receives primary stress.
      English is stress-timed with variable stress placement that is largely unpredictable
      (e.g., PHOtograph vs. phoTOGraphy vs. photographic). This fundamental rhythmic
      difference means Swahili speakers apply their L1 prosodic patterns to English,
      producing a distinctive rhythm that can impede intelligibility. Additionally,
      Swahili question formation often relies on the particle je or context rather
      than intonation, so Swahili speakers may not use rising intonation for yes/no
      questions in English. These phonological patterns are among the most persistent
      because they are acquired very early and operate below conscious awareness.
    teacher_tips:
      how_to_explain: 'Say: Swahili words always stress the second-to-last syllable.
        English words do not follow this rule -- you have to learn each words stress
        pattern. Clap out the rhythm: Swahili sa-HA-ni (clap on HA) vs. English ba-NANA
        (clap on NANA). For intonation, demonstrate: say You are coming? with rising
        pitch (question) vs. You are coming. with falling pitch (statement). Exaggerate
        the difference. Say: In English, your voice goes UP for questions.'
      where_to_start: 'Start with word stress: teach students to look up stress patterns
        in dictionaries. Practice with common word families: PHOtograph -> phoTOGraphy
        -> photoGRAPHic. Then move to sentence stress and finally intonation.'
      sequencing: 'Week 1: Word stress patterns -- common words with non-penultimate
        stress. Week 2: Sentence stress -- content words stressed, function words
        reduced. Week 3: Intonation -- rising for yes/no questions, falling for statements
        and wh-questions. Week 4: Connected speech -- linking, reduction, weak forms.'
      exercises:
      - name: Stress Pattern Sort
        type: matching
        description: Give students 30 common English words. They must look up the
          stress pattern and sort them by stress position (first syllable, second
          syllable, third syllable).
        duration: 15
      - name: Clap the Stress
        type: oral-drill
        description: 'Teacher says a sentence. Students clap on the stressed words
          only. Example: I am going to the store -- clap on GO and STORE. This trains
          stress-timed rhythm.'
        duration: 10
      - name: Intonation Pairs
        type: oral-drill
        description: 'Teacher says a sentence as a statement (falling intonation).
          Students repeat it as a question (rising intonation). Example: She is leaving.
          -> She is leaving? Practice with 10 sentence pairs.'
        duration: 10
      - name: Minimal Pair Listening
        type: matching
        description: Play recordings of words with different stress patterns (e.g.,
          REcord vs. reCORD, PREsent vs. preSENT). Students identify which is which
          by stress alone. Then practice saying them.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - Jenkins, J. (2000). The Phonology of English as an International Language. Oxford
      University Press.
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 5
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity -- Swahili
    notes: Tonal transfer is subtle but affects intelligibility. Persistent at all
      levels but may go unnoticed by untrained listeners.
    source_rank: 1
