    interference_patterns:
    - pattern: Reducing English consonant clusters by deleting consonants because
        Swahili has no clusters
      example: 'Swahili CV syllable structure -> English strengths -> Learner says
        stengths or sengths -> Correct: strengths'
      frequency: 4
      persistence: 4
      communicative_impact: 3
