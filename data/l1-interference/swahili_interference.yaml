  copula_absence:
    interference_patterns:
    - pattern: Omitting be (am/is/are) in equational sentences because Swahili uses
        no copula in present tense before adjectives
      example: 'Swahili: Yeye mzuri (He good, NO copula) -> Literal: He good -> Erroneous:
        He good -> Correct: He is good'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Omitting be before locative phrases because Swahili uses bare locatives
        without a verb
      example: 'Swahili: Mtoto shuleni (Child at-school) -> Literal: Child at school
        -> Erroneous: Child at school -> Correct: The child is at school'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Using ni (Swahili copula) directly in English sentences
      example: 'Swahili: Mimi ni mwalimu (I am teacher) -> Erroneous: I ni teacher
        -> Correct: I am a teacher'
      frequency: 2
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: She teacher. -> Correct: She is a teacher.'
    - 'Wrong: I tired. -> Correct: I am tired.'
    - 'Wrong: They in the house. -> Correct: They are in the house.'
    - 'Wrong: The food ready. -> Correct: The food is ready.'
    why_it_happens: 'In Swahili, the copula ni is used only in specific present-tense
      equational sentences (e.g., Mimi ni mwalimu = I am a teacher), but it is frequently
      omitted before adjectives and locatives. For example, Mtoto mgonjwa (child sick)
      has no copula at all -- the adjective simply follows the noun. Similarly, Yeye
      hapa (he here) requires no verb. English, by contrast, requires a form of be
      in virtually every predicate: subject + be + complement. Swahili speakers must
      learn that English sentences cannot exist without a verb, and that be serves
      as the default linking verb even when no action is occurring. The error is persistent
      because the zero-copula pattern is deeply automatized in Swahili and because
      be has no semantic content -- it is purely grammatical, making it hard to notice
      and correct.'
    teacher_tips:
      how_to_explain: 'Tell students: In Swahili, you can say He tall -- no verb needed.
        In English, every sentence MUST have a verb. When you are describing someone
        or something, the verb is be -- am, is, or are. Write on the board: He tall
        -> He IS tall. Draw a bridge between He and tall and label it is. Say: The
        bridge connects the person to the description. Without the bridge, the sentence
        falls down. Use the formula: NOUN + BE + DESCRIPTION.'
      where_to_start: 'Start with the most common pattern: Subject + BE + Adjective.
        Use physical descriptions: I am tall, She is smart, They are happy. Have students
        describe each other, always including be. Then move to Subject + BE + Location:
        The book is on the table.'
      sequencing: 'Week 1: BE + adjective (descriptions). Week 2: BE + location (prepositional
        phrases). Week 3: BE + noun (professions, identities). Week 4: BE in past
        tense (was/were).'
      exercises:
      - name: Bridge Builder
        type: fill-in-the-blank
        description: 'Provide 15 sentences with the copula missing: She ___ a doctor,
          They ___ happy, The cat ___ on the roof. Students fill in the correct form
          of be (am/is/are).'
        duration: 15
      - name: Classroom Description
        type: oral-drill
        description: 'Students describe the classroom using be: The board is green,
          The door is open, Maria is tall. Each student must produce 5 sentences.
          Teacher monitors for copula omission.'
        duration: 10
      - name: Swahili-to-English Copula Insertion
        type: translation
