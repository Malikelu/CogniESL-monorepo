  pronoun_omission:
    interference_patterns:
    - pattern: Subject pronoun dropped because Swahili verb prefixes encode person/number
      example: 'Swahili: Ninakula (I-eat, prefix ni-=I) -> Literal: Eat -> Erroneous:
        Eating now / Eat every day -> Correct: I am eating now / I eat every day'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Expletive pronoun it omitted in weather/time/existential constructions
      example: 'Swahili: Inanyesha (It-rains, prefix i-=it) -> Literal: Rains -> Erroneous:
        Raining / Is rain -> Correct: It is raining'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Object pronoun omitted because Swahili uses object infix in the verb
      example: 'Swahili: Ninamwona (I-see-him, infix -mw-=him) -> Literal: I see ->
        Erroneous: I see (missing object) -> Correct: I see him'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - 'Wrong: Is raining. -> Correct: It is raining.'
    - 'Wrong: Went to store yesterday. -> Correct: I went to the store yesterday.'
    - 'Wrong: Like pizza very much. -> Correct: I like pizza very much.'
    - 'Wrong: She gave to mother. -> Correct: She gave it to her mother.'
    why_it_happens: 'Swahili is a pro-drop language where subject pronouns are optional
      because the verb prefix already encodes person, number, and noun class. For
      example, ninakula (ni- + -na- + -kula) means I eat -- the prefix ni- means I,
      so adding the separate pronoun mimi is unnecessary except for emphasis. Similarly,
      object pronouns are often incorporated as infixes: ninamwona = I-see-him. English
      requires explicit subject pronouns in every finite clause (except imperatives)
      and separate object pronouns. The Swahili speakers brain has automatized the
      pattern: verb prefix = subject, so the separate pronoun feels redundant. This
      is one of the most persistent errors because it is rooted in the fundamental
      architecture of the Swahili verb.'
    teacher_tips:
      how_to_explain: 'Write a Swahili verb like ninakula on the board and break it
        down: ni- (I) + -na- (present) + -kula (eat). Say: The I is already inside
        the verb. But in English, the I must stand outside, in its own word. Then
        write: I eat and underline I separately. Say: English verbs are naked -- they
        do not carry the subject inside them. You must always add the subject word.
        For weather verbs, say: English needs a fake subject -- it. We say it rains
        even though it does not mean anything.'
      where_to_start: 'Start with the most basic rule: Every English sentence needs
        a subject. Use the Who does it? test: point to any verb and ask Who does this?
        Students must supply the subject pronoun. Begin with first person (I), then
        expand to he/she/it/we/they.'
      sequencing: 'Week 1: Subject pronouns with present tense verbs. Week 2: Expletive
        it (weather, time, distance). Week 3: Object pronouns after transitive verbs.
        Week 4: Combined practice -- subject + object pronouns in the same sentence.'
      exercises:
      - name: Subject Rescue
        type: error-correction
        description: Provide 15 sentences with missing subject pronouns (e.g., Went
          to school, Is cold today, Like music). Students must add the correct subject
          pronoun and identify what information was lost without it.
        duration: 15
      - name: Verb Dissection
        type: transformation
        description: 'Give students Swahili sentences with verb prefixes. They must
          (a) identify the subject from the prefix, (b) translate to English with
          the explicit subject pronoun. Example: Anasoma -> prefix a- = she/he ->
          She is reading.'
        duration: 20
      - name: Weather Report
        type: oral-drill
        description: 'Students give weather reports for different cities, forced to
          use it correctly: In Nairobi, it is sunny. In London, it is raining. Teacher
          monitors for Is sunny -> It is sunny.'
        duration: 10
      - name: Object Pronoun Hunt
        type: sentence-rewrite
        description: 'Give 10 Swahili sentences with object infixes (e.g., Ninamwona,
          Alinipiga). Students translate to English, ensuring the object pronoun appears
          as a separate word: I see him, He hit me.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
    - White, L. (1985). The pro-drop parameter in adult second language acquisition.
      Language Learning, 35(1), 47-62.
