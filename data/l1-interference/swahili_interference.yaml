  cohesion_and_discourse_markers:
    interference_patterns:
    - pattern: Using so as a universal connector because Swahili kwa hiyo is used
        more broadly than English so/therefore
      example: 'Swahili: Kwa hiyo, nilikuja -> Erroneous: So I went to the store.
        So I bought food. So I went home. -> Correct: Then I went to the store. After
        that, I bought food. Finally, I went home.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Overusing and then to connect all events because Swahili kisha (then)
        is used frequently
      example: 'Swahili: Nikaenda sokoni kisha nikanunua chakula -> Erroneous: I went
        to the market and then I bought food and then I went home and then... -> Correct:
        I went to the market, bought food, and went home.'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    - pattern: Using now as a discourse filler because Swahili sasa is used conversationally
      example: 'Swahili: Sasa, tutaenda -> Erroneous: Now, I will tell you about...
        Now, the next point is... (overused) -> Correct: Next, I will tell you about...
        The following point is...'
      frequency: 2
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: So I went to the store. So I bought food. -> Correct: First, I went
      to the store. Then, I bought food.'
    - 'Wrong: I woke up and then I brushed my teeth and then I ate breakfast. -> Correct:
      I woke up, brushed my teeth, and ate breakfast.'
    - 'Wrong: Now, let me tell you about my family. Now, I have two brothers. -> Correct:
      Let me tell you about my family. I have two brothers.'
    - 'Wrong: And then he came and then he sat down. -> Correct: He came and sat down.'
    why_it_happens: Swahili discourse relies heavily on sequential connectors like
      kisha (then), kwa hiyo (so/therefore), and sasa (now). These markers are used
      more frequently than their English equivalents. English has a wider variety
      of discourse markers and expects speakers to vary their connectors. Swahili
      speakers tend to overuse so and and then.
    teacher_tips:
      how_to_explain: 'Say: In Swahili, you use kisha (then) and kwa hiyo (so) for
        almost every connection. In English, we have many different words: first,
        then, next, after that, finally, however, in addition. Vary your connectors
        like you vary your vocabulary.'
      where_to_start: 'Start with sequential connectors: first, then, next, after
        that, finally. Give students alternatives for so and and then.'
      sequencing: 'Week 1: Sequential connectors. Week 2: Cause/effect connectors.
        Week 3: Contrast connectors. Week 4: Adding information.'
      exercises:
      - name: Connector Variety
        type: sentence-rewrite
        description: Give students a paragraph where every sentence starts with So
          or And then. Students rewrite using varied connectors.
        duration: 15
      - name: Discourse Marker Match
        type: matching
        description: 'Give students two columns: discourse functions and markers.
          Students match each marker to its function.'
        duration: 15
      - name: Swahili-to-English Discourse Translation
        type: translation
        description: Give students a short Swahili text. Students translate to English,
          varying their discourse markers.
        duration: 20
      - name: Essay with Varied Connectors
        type: composition
        description: Students write a short essay about a memorable day, using at
          least 8 different discourse markers correctly.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
