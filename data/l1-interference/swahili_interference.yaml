  modal_verbs_lakiwe_anaweza:
    interference_patterns:
    - pattern: Adding to after modal verbs because Swahili uses the infinitive marker
        ku- before the main verb
      example: 'Swahili: Ninaweza kuenda (I-can to-go, ku-=infinitive) -> Erroneous:
        I can to go -> Correct: I can go'
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Adding to after modal verbs because Swahili
        uses the infinitive marker ku- before the main verb.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using must without to but then adding a following infinitive with to
      example: 'Swahili: Lazima uende (Must you-go) -> Erroneous: I must to go ->
        Correct: I must go'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using must without to but then adding a following
        infinitive with to.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Confusing can and may because Swahili kuweza covers both ability and
        permission
      example: 'Swahili: Naweza kuenda can mean both I can go (ability) and I may
        go (permission) -> Erroneous: I can go (when asking permission) -> Correct:
        May I go?'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Confusing can and may because Swahili kuweza
        covers both ability and permission.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: I can to swim. -> Correct: I can swim.'
    - 'Wrong: She must to study. -> Correct: She must study.'
    - 'Wrong: I can go to the bathroom? -> Correct: May I go to the bathroom?'
    - 'Wrong: He will can do it. -> Correct: He will be able to do it.'
    why_it_happens: 'Swahili modal expressions use the infinitive marker ku- before
      the main verb: ninaweza kuenda (I-can to-go), lazima uende (must you-go, using
      subjunctive), ninahitaji kufanya (I-need to-do). The ku- is always present,
      so learners transfer this pattern to English by adding to after modals: I can
      to go, I must to study. Additionally, Swahili does not distinguish grammatically
      between ability and permission the way English does with can vs. may. The word
      kuweza covers both meanings, leading to I can I go? when asking permission.
      English modals are also defective verbs (no -s, no -ing, no -ed, no infinitive),
      which is a category that does not exist in Swahili, making them structurally
      unique and difficult to master.'
    teacher_tips:
      how_to_explain: 'Say: In Swahili, you say ninaweza kuenda -- can TO go. In English,
        modal verbs are special: they are followed by the BASE verb, no to. I can
        GO, I must STUDY, she will COME. No to after can, must, will, should, would,
        could, may, might. Write the formula on the board: MODAL + BASE VERB (no -s,
        no -ing, no to).'
      where_to_start: 'Start with can and can''t for ability: I can swim, I cannot
        fly. Then introduce must and mustn''t for obligation. Then should for advice.
        Finally, address the can vs. may distinction for permission.'
      sequencing: 'Week 1: Can/can''t for ability. Week 2: Must/mustn''t for obligation.
        Week 3: Should/should not for advice. Week 4: May for permission; will/won''t
        for future.'
      exercises:
      - name: Modal Transformation
        type: transformation
        description: 'Give students 15 Swahili-style sentences with to after modals:
          I can to swim, She must to go, They should to study. Students remove to
          and correct each sentence.'
        duration: 15
      - name: Modal Gap Fill
        type: fill-in-the-blank
        description: 'Provide 15 sentences with the modal missing: You ___ see a doctor
          (should), I ___ speak French (can), Students ___ wear uniforms (must). Students
          choose the correct modal.'
        duration: 15
      - name: Permission vs. Ability
        type: oral-drill
        description: 'Teacher says a situation. Students must ask correctly: You want
          to leave early -> May I leave early? You are able to lift 50kg -> I can
          lift 50kg. Practice with 10 scenarios.'
        duration: 10
      - name: Modal Story
        type: composition
        description: 'Students write a short story about a day in their life, using
          at least 8 different modal verbs correctly. Peer review: partners check
          that no to appears after modals.'
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
