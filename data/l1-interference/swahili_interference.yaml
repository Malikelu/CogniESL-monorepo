  tense_system_confusion:
    interference_patterns:
    - pattern: Using present tense for past events because Swahili marks time with
        adverbs rather than verb morphology alone
      example: 'Swahili: Jana nikaenda sokoni (Yesterday I-went market) -> Literal:
        Yesterday I went market -> Erroneous: Yesterday I go to market -> Correct:
        Yesterday I went to the market'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of present perfect for simple past because Swahili -me- aspect
        marker resembles English have+V-en
      example: 'Swahili: Nimesoma (I-have-read, perfective) -> Literal: I have read
        -> Erroneous: I have read a book yesterday -> Correct: I read a book yesterday'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Confusing present continuous with simple present because Swahili -na-
        marker covers both habitual and progressive
      example: 'Swahili: Ninakula can mean I eat (habitual) or I am eating (now) ->
        Erroneous: I eat now (for ongoing action) -> Correct: I am eating now'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Future tense formed with present tense + time word, omitting will
      example: 'Swahili: Kesho ninakula (Tomorrow I-eat) -> Literal: Tomorrow I eat
        -> Erroneous: Tomorrow I eat fish -> Correct: Tomorrow I will eat fish'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - 'Wrong: Last week I go to Dar es Salaam. -> Correct: Last week I went to Dar
      es Salaam.'
    - 'Wrong: I have visited my grandmother yesterday. -> Correct: I visited my grandmother
      yesterday.'
    - 'Wrong: She eats dinner right now. -> Correct: She is eating dinner right now.'
    - 'Wrong: Tomorrow we go to beach. -> Correct: Tomorrow we will go to the beach.'
    why_it_happens: 'Swahili has a fundamentally different tense-aspect system. It
      uses prefixes: -na- (present/habitual/progressive), -li- (simple past), -me-
      (perfective/completed), -ta- (future). Crucially, the -na- prefix covers both
      habitual (I eat) and progressive (I am eating) meanings -- context disambiguates.
      English requires distinct forms for these. The -me- prefix indicates completed
      action, which learners map onto English present perfect (have + past participle),
      but Swahili -me- can co-occur with specific past time adverbs (yesterday), which
      English present perfect cannot. Additionally, Swahili can express future time
      with present tense + a time word (kesho ninakula = tomorrow I eat), leading
      learners to omit will in English. The cognitive challenge is that Swahili tense
      markers encode aspect (completion, duration) more than absolute time, while
      English tense encodes both time and aspect in complex ways.'
    teacher_tips:
      how_to_explain: 'Create a timeline on the board with three zones: PAST, NOW,
        FUTURE. Under each, write the Swahili prefix and the English form. Say: Swahili
        uses -li- for past. English changes the verb: go->went, eat->ate, see->saw.
        English verbs change shape for past tense -- you cannot just add a word like
        yesterday and keep the verb the same. For the -na- vs. -me- confusion, say:
        Swahili -na- does two jobs: I eat every day AND I am eating now. English needs
        two different forms.'
      where_to_start: 'Start with the simple past (Swahili -li- -> English -ed/irregular).
        Use time-marker clues: yesterday, last week, in 2010 -> simple past. Then
        introduce present continuous for actions happening now. Finally, address the
        present perfect trap.'
      sequencing: 'Week 1: Simple past vs. present (yesterday -> past tense). Week
        2: Present continuous for actions now. Week 3: Present perfect vs. simple
        past (the -me- trap). Week 4: Future with will and going to.'
      exercises:
      - name: Time Marker Match
        type: matching
        description: 'Give students two columns: time markers (yesterday, now, already,
          last year, right now, since 2020) and tense forms (simple past, present
          continuous, present perfect). Students match each marker to the correct
          tense, then write a sentence using each pair.'
        duration: 15
      - name: Tense Transformation Drill
        type: transformation
        description: 'Provide 10 Swahili sentences with -li-, -na-, -me-, -ta- prefixes.
          Students identify the tense/aspect and translate to the correct English
          tense. Example: Alisoma (-li-) -> He read (simple past).'
        duration: 20
      - name: Yesterday / Today / Tomorrow
        type: oral-drill
        description: Teacher says a verb and a time marker. Students must produce
          the correct English sentence. Eat + yesterday -> I ate yesterday. Eat +
          now -> I am eating now. Eat + tomorrow -> I will eat tomorrow. Increase
          speed.
        duration: 10
      - name: Present Perfect Trap
        type: error-correction
        description: 'Give 10 sentences where -me- has been incorrectly mapped to
          present perfect with specific past time: I have gone to school yesterday.
          Students must identify the error and correct: I went to school yesterday.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
    - Bardovi-Harlig, K. (2000). Tense and Aspect in Second Language Acquisition.
      Blackwell.
