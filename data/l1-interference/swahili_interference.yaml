  relative_clause_ambivalent_constructions:
    interference_patterns:
    - pattern: Using that for all relative clauses (people and things) because Swahili
        uses the same relative marker system for all noun classes
      example: 'Swahili: Mtu ambaye anasoma (Person who reads) / Kitabu ambacho nilikisoma
        (Book which I-read) -> Erroneous: The man that I saw yesterday -> Correct:
        The man who I saw yesterday'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using that for all relative clauses (people
        and things) because Swahili uses the same relative marker system for all noun
        classes.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting relative pronoun entirely because Swahili relative markers
        are verb affixes, not separate words
      example: 'Swahili: Mtu niliyemwona (Person I-saw-him, relative marker -ye- is
        infix) -> Erroneous: The man I saw yesterday (acceptable informally but problematic
        in formal writing) -> Correct: The man whom I saw yesterday'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Omitting relative pronoun entirely because Swahili
        relative markers are verb affixes, not separate words.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Using what as a relative pronoun by analogy with Swahili general relative
        construction
      example: 'Swahili: Kitabu nilichokisoma (Book I-read-it) -> Erroneous: The book
        what I read -> Correct: The book that/which I read'
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Using what as a relative pronoun by analogy
        with Swahili general relative construction.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: The woman that lives next door is kind. -> Correct: The woman who lives
      next door is kind.'
    - 'Wrong: The book what I read was interesting. -> Correct: The book that I read
      was interesting.'
    - 'Wrong: The man which I met was tall. -> Correct: The man who/that I met was
      tall.'
    - 'Wrong: The food what she cooked was delicious. -> Correct: The food that she
      cooked was delicious.'
    why_it_happens: 'Swahili relative clauses are formed by inserting a relative marker
      (-ye-, -cho-, -vyo-, etc.) into the verb complex as an infix or suffix, agreeing
      with the head nouns class. For example: mtu ambaye alikuwa (person who came)
      vs. kitabu ambacho nilisoma (book which I read). The marker is part of the verb,
      not a separate word. English uses separate relative pronouns (who, which, that,
      whom) that must appear as independent words at the start of the relative clause.
      Swahili speakers face two challenges: (1) learning that English requires a separate
      word, not a verb affix, and (2) choosing the correct pronoun (who for people,
      which for things, that for both). The use of what as a relative pronoun is a
      common interlanguage strategy -- it serves as a general-purpose relativizer
      that avoids the who/which distinction entirely.'
    teacher_tips:
      how_to_explain: 'Write on the board: WHO = people, WHICH = things, THAT = both.
        Use a simple mnemonic: Who is a person. Which is a thing. That is flexible.
        Then explain: In Swahili, the relative marker is glued to the verb. In English,
        it is a separate word that comes BEFORE the relative clause. Demonstrate:
        The man [who I saw] -- point to who and say: This little word connects the
        two parts.'
      where_to_start: Start with that as the universal relative pronoun (it works
        for both people and things). Once students are comfortable, introduce who
        for people as the more formal/precise choice. Save which and whom for later.
      sequencing: 'Week 1: Relative clauses with that (people and things). Week 2:
        Who for people -- contrast with that. Week 3: Which for things. Week 4: Omitting
        the relative pronoun when it is the object (the book [that] I read).'
      exercises:
      - name: Who vs. Which vs. That Sort
        type: matching
        description: 'Give students 15 noun phrases (the teacher, the car, the movie,
          the doctor, the house). Students sort them into who (people) and which (things)
          columns. Then write a relative clause for each: the teacher who..., the
          car which...'
        duration: 15
      - name: Relative Clause Combination
        type: sentence-rewrite
        description: 'Give students 10 pairs of simple sentences (e.g., I have a friend.
          She speaks five languages.) Students combine them using relative pronouns:
          I have a friend who speaks five languages.'
        duration: 20
      - name: What Detective
        type: error-correction
        description: 'Provide 10 sentences with what used as a relative pronoun: The
          man what came, The food what she made. Students identify the error and replace
          what with who, which, or that.'
        duration: 15
      - name: Relative Clause Story
        type: composition
        description: 'Students write a short paragraph (8-10 sentences) describing
          their family, using at least 5 relative clauses. Peer review: partners check
          each relative clause for correct pronoun choice.'
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
