  demonstrative_system_sw:
    interference_patterns:
    - pattern: Using this for both near and far objects because Swahili demonstratives
        agree with noun class, not just distance
      example: 'Swahili: hii (this, Class 7), hiyo (that, Class 7) -- but the distinction
        is class-based, not purely distance-based -> Erroneous: This car over there
        -> Correct: That car over there'
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Using this/that for plural nouns instead of these/those
      example: 'Swahili: hivi (these, Class 8 plural) -- one word covers these ->
        Erroneous: This books are good -> Correct: These books are good'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Placing demonstratives after the noun because Swahili demonstratives
        follow the noun
      example: 'Swahili: kitabu hiki (book this) -- demonstrative AFTER noun -> Erroneous:
        Book this is good -> Correct: This book is good'
      frequency: 2
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: This cars are expensive. -> Correct: These cars are expensive.'
    - 'Wrong: That houses near the river. -> Correct: Those houses near the river.'
    - 'Wrong: Book this is interesting. -> Correct: This book is interesting.'
    - 'Wrong: I want that one blue. -> Correct: I want that blue one.'
    why_it_happens: 'Swahili has a complex demonstrative system that agrees with the
      noun class of the referent. For each of the 15+ noun classes, there are different
      forms for this (near), that (far), and that over there (very far). For example,
      Class 7: hiki (this), hicho (that), kile (that over there). The system is more
      complex than English this/that/these/those because it encodes both distance
      AND noun class. However, the distance distinction in Swahili is less rigidly
      observed than in English, leading to confusion about when to use this vs. that.
      Additionally, Swahili demonstratives typically follow the noun (kitabu hiki
      = book this), while English demonstratives precede the noun (this book). The
      plural forms these and those are also challenging because Swahili uses class-specific
      plural demonstratives that do not map neatly onto the English system.'
    teacher_tips:
      how_to_explain: 'Say: English has four demonstrative words: this (near, singular),
        that (far, singular), these (near, plural), those (far, plural). Two things
        matter: how many (singular/plural) and how close (near/far). Draw a diagram
        on the board with two axes: near/far and singular/plural. Place each word
        in the correct quadrant. For word order, say: In Swahili, the demonstrative
        comes after the noun: kitabu hiki. In English, it comes before: this book.'
      where_to_start: 'Start with the near/far distinction using physical objects
        in the classroom. Hold up a near object: This is a pen. Point to a far object:
        That is a door. Then introduce plural: These are pens (near), Those are doors
        (far).'
      sequencing: 'Week 1: This/that with singular objects (near/far). Week 2: These/those
        with plural objects. Week 3: Demonstrative + noun word order (before the noun).
        Week 4: Abstract uses of this/that (referring to ideas, not just objects).'
      exercises:
      - name: Point and Say
        type: oral-drill
        description: 'Teacher points to objects at various distances and with various
          quantities. Students say the correct demonstrative phrase: This pen (near,
          singular), Those windows (far, plural), These books (near, plural).'
        duration: 10
      - name: Demonstrative Sort
        type: matching
        description: 'Give students 20 noun phrases. Students must choose the correct
          demonstrative: this/that/these/those. Include both near and far contexts.'
        duration: 15
      - name: Word Order Fix
        type: sentence-rewrite
        description: 'Give students 10 sentences with Swahili-style demonstrative
          placement: House that is big, Books these are interesting. Students rewrite
          with correct English word order: That house is big, These books are interesting.'
        duration: 15
      - name: Picture Description
        type: composition
        description: 'Show a picture with objects at various distances. Students write
          10 sentences using all four demonstratives correctly. Peer review: partners
          check for correct this/that/these/those and correct word order.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
