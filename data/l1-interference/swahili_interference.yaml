  bantu_vowel_harmony_in_english:
    interference_patterns:
    - pattern: Inserting epenthetic vowels to break up English consonant clusters
        that do not exist in Swahili
      example: 'Swahili has CV (consonant-vowel) syllable structure -> English street
        /stri:t/ -> Learner says sitiriit or sutiriit -> Correct: street'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Adding a final vowel to English words ending in consonants because
        Swahili words typically end in vowels
      example: 'Swahili: meza (table), kiti (chair) -- all end in vowels -> English
        cat -> Learner says cati or cate -> Correct: cat'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Pronouncing English vowel contrasts that do not exist in Swahilis 5-vowel
        system (/a, e, i, o, u/)
      example: 'Swahili has no /ae/ vs. /ʌ/ distinction -> English bat vs. but sound
        the same -> Learner says bat for both -> Correct: bat /bae t/ vs. but /bʌt/'
      frequency: 4
      persistence: 4
      communicative_impact: 2
    examples:
    - 'Wrong: sitiriit -> Correct: street'
    - 'Wrong: bulu -> Correct: blue'
    - 'Wrong: filimu -> Correct: film'
    - 'Wrong: desiki -> Correct: desk'
    why_it_happens: 'Swahili has a strict CV (consonant-vowel) or V syllable structure
      -- consonant clusters like /str/, /bl/, /kt/ do not occur. Every syllable must
      end in a vowel (except in loanwords that have been adapted). When Swahili speakers
      encounter English words with consonant clusters, they insert epenthetic vowels
      to break them up: street becomes sitiriit, blue becomes bulu. This is a universal
      phonological process called epenthesis, and it occurs because the speakers L1
      phonotactic constraints are applied to L2 production. The Swahili vowel system
      has only five vowels (/a, e, i, o, u/) with no length distinction and no diphthongs,
      so English vowel contrasts like /ɪ/ vs. /i:/ (ship vs. sheep) and /ae/ vs. /ʌ/
      (bat vs. but) are also challenging. These patterns are persistent because phonological
      transfer operates below conscious awareness.'
    teacher_tips:
      how_to_explain: 'Say: Swahili syllables go consonant-vowel, consonant-vowel
        -- like a drum beat. English syllables can have clusters: str-, bl-, -sts.
        Your mouth wants to add a vowel between the consonants because that is what
        Swahili does. You need to train your mouth to say the consonants together.
        Demonstrate: say sssssss-treet slowly, then faster, then street. For final
        vowels, say: Swahili words end in vowels: meza, kiti, sahani. English words
        can end in consonants: cat, desk, film. Do not add a vowel at the end.'
      where_to_start: 'Start with initial consonant clusters: str-, bl-, kr-, pl-,
        fl-. Practice saying them without inserting vowels. Use the slow motion technique:
        say each sound separately, then gradually speed up.'
      sequencing: 'Week 1: Initial consonant clusters (str, bl, kr, pl, fl). Week
        2: Final consonant clusters (sts, lks, mps, nds). Week 3: Final consonant
        words (cat, desk, film, help). Week 4: Vowel contrasts (ship/sheep, bat/but,
        pull/pool).'
      exercises:
      - name: Cluster Buster
        type: oral-drill
        description: Give students a list of 20 words with consonant clusters (street,
          blue, glass, problem, spring, clean, black, friend, dream). Students practice
          saying each word without epenthetic vowels. Teacher models first.
        duration: 15
      - name: Final Vowel Check
        type: oral-drill
        description: Teacher says a word ending in a consonant (cat, desk, film, help,
          stop). Students repeat. Teacher listens for added final vowels and provides
          immediate correction.
        duration: 10
      - name: Minimal Pair Practice
        type: matching
        description: 'Practice vowel contrasts that do not exist in Swahili: ship/sheep,
          bat/but, pull/pool, full/fool, look/luck. Students listen to recordings
          and identify which word they hear, then practice saying both.'
        duration: 15
      - name: Tongue Twisters
        type: oral-drill
        description: 'Use tongue twisters targeting consonant clusters: She sells
          seashells, Red lorry, yellow lorry, Three free throws. Students practice
          at increasing speed.'
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Major, R. C. (2001). Foreign Accent: The Ontogeny and Phylogeny of Second Language
      Phonology. Lawrence Erlbaum.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity -- Swahili
    notes: Epenthesis is common especially in early stages. Vowel system differences
      affect intelligibility more than consonants.
    source_rank: 1
