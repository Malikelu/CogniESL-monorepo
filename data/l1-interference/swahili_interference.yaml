  passive_voice_transfer:
    interference_patterns:
    - pattern: Omitting the past participle ending because Swahili passive is marked
        by a verb suffix
      example: 'Swahili: Barua ilitumwa (Letter was-sent, -w-=passive suffix) -> Erroneous:
        The letter was send -> Correct: The letter was sent'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Using active voice to avoid passive because Swahili passive is less
        common
      example: 'Swahili: Aliniua (He-killed-me, active preferred) -> Erroneous: He
        killed me (when passive is needed) -> Correct: I was killed'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Confusing by agent marker with Swahili agent marker na
      example: 'Swahili: Barua ilitumwa na John (Letter was-sent by John) -> Erroneous:
        The letter was sent from John -> Correct: The letter was sent by John'
      frequency: 2
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: The letter was send. -> Correct: The letter was sent.'
    - 'Wrong: The book has wrote. -> Correct: The book has been written.'
    - 'Wrong: The house was build last year. -> Correct: The house was built last
      year.'
    - 'Wrong: I was given a gift from my friend. -> Correct: I was given a gift by
      my friend.'
    why_it_happens: 'Swahili passive voice is formed by adding the suffix -w- to the
      verb: kuandika (to write) -> kuandikwa (to be written). The passive is marked
      on the verb itself, not by adding a separate auxiliary + participle as in English.
      Swahili also uses the passive less frequently than English. When Swahili speakers
      learn English passive, they must acquire a new structure: be + past participle.
      The past participle is challenging because English has many irregular forms
      (written, built, sent, gone, taken) that must be memorized.'
    teacher_tips:
      how_to_explain: 'Say: In Swahili, you change the verb to make it passive: andika
        -> andikwa. In English, you need two words: BE + PAST PARTICIPLE. The past
        participle is the third form: write-wrote-written, build-built-built, send-sent-sent.'
      where_to_start: 'Start with regular past participles: was/were + -ed. Then introduce
        irregular forms: was written, was taken, was given.'
      sequencing: 'Week 1: Passive with regular verbs. Week 2: Passive with irregular
        verbs. Week 3: Passive with modal verbs. Week 4: Active vs. passive transformation.'
      exercises:
      - name: Passive Transformation
        type: transformation
        description: 'Give students 10 active sentences. Students transform each into
          passive: The teacher marked the papers -> The papers were marked by the
          teacher.'
        duration: 15
      - name: Past Participle Drill
        type: fill-in-the-blank
        description: 'Provide 15 passive sentences with the past participle missing:
          The letter was s____, The house was b____. Students fill in the correct
          form.'
        duration: 15
      - name: Active or Passive?
        type: matching
        description: Give students 10 sentences in active voice. Students decide whether
          active or passive is more appropriate and rewrite if necessary.
        duration: 15
      - name: News Report
        type: composition
        description: 'Students write a short news report using at least 5 passive
          constructions: The bank was robbed, Three people were arrested.'
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
