        consonants because Swahili has no clusters.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Substituting Swahili sounds for English sounds that do not exist in
        Swahili
      example: 'Swahili has no th sound -> Learner substitutes t or d -> think becomes
        tink, this becomes dis -> Correct: think /thɪŋk/, this /ðɪs/'
      frequency: 4
      persistence: 5
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Substituting Swahili sounds for English sounds
        that do not exist in Swahili.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Pronouncing English r as a tapped sound because Swahili r is a flap
      example: 'Swahili r is a quick tap -> English right -> Learner says rait with
        a tapped r -> Correct: right with English approximant'
      frequency: 3
      persistence: 4
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Pronouncing English r as a tapped sound because
        Swahili r is a flap.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: tink -> Correct: think'
    - 'Wrong: dis -> Correct: this'
    - 'Wrong: sengths -> Correct: strengths'
    - 'Wrong: birit -> Correct: build'
    why_it_happens: Swahili phonology differs from English in several key ways. First,
      Swahili has no consonant clusters, so English words with clusters are simplified.
      Second, Swahili lacks the English th sounds, which are among the most difficult
      sounds for L2 learners. Third, the Swahili r is an alveolar tap while English
      r is a postalveolar approximant. These phonological differences are deeply persistent
      because they are acquired in early childhood.
    teacher_tips:
      how_to_explain: 'Say: Swahili has fewer sounds than English. Two important English
        sounds that do not exist in Swahili are the th sounds: put your tongue between
        your teeth and blow for think, bite and buzz for this. For consonant clusters,
        practice saying them slowly, then faster.'
      where_to_start: Start with the th sounds since they are the most noticeable.
        Use the bite your tongue technique. Then move to consonant clusters.
      sequencing: 'Week 1: The th sounds. Week 2: Initial consonant clusters. Week
        3: Final consonant clusters. Week 4: The English r.'
      exercises:
      - name: Th Sound Practice
        type: oral-drill
        description: 'Give students 20 minimal pairs: think/tank, this/dis, thick/tick.
          Students practice saying each pair.'
        duration: 15
      - name: Cluster Chant
        type: oral-drill
        description: 'Students practice cluster sequences: str-ay, str-ong; -lps (helps),
          -sts (tests). Start slowly, increase speed.'
        duration: 10
      - name: Tongue Twister Challenge
        type: oral-drill
        description: 'Use tongue twisters: The thirty-three thieves thought that they
          thrilled the throne throughout Thursday.'
        duration: 10
      - name: Recording and Self-Correction
        type: oral-drill
        description: Students record themselves reading a passage with many th sounds
          and clusters. They listen back and re-record.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Major, R. C. (2001). Foreign Accent: The Ontogeny and Phylogeny of Second Language
      Phonology. Lawrence Erlbaum.'
