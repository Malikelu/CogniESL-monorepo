  serial_verb_constructions:
    interference_patterns:
    - pattern: Using multiple verbs in a row without conjunctions because Swahili
        serial verb constructions are grammatical
      example: 'Swahili: Alikuja kunikimbia (He-came to-run) -> Erroneous: He came
        run to me -> Correct: He came running to me'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Omitting infinitive markers between serial verbs because Swahili verbs
        are simply juxtaposed
      example: 'Swahili: Ninataka kuenda kununua (I-want to-go to-buy) -> Erroneous:
        I want go buy food -> Correct: I want to go buy food'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Using and to connect all verbs because Swahili uses juxtaposition
      example: 'Swahili: Alilia akacheka akaimba -> Erroneous: He cried laughed sang
        -> Correct: He cried, laughed, and sang'
      frequency: 2
      persistence: 2
      communicative_impact: 2
    examples:
    - 'Wrong: He came run to me. -> Correct: He came running to me.'
    - 'Wrong: I want go buy food. -> Correct: I want to go buy food.'
    - 'Wrong: She went take the book. -> Correct: She went to take the book.'
    - 'Wrong: They started cry. -> Correct: They started crying / They started to
      cry.'
    why_it_happens: Swahili allows serial verb constructions where multiple verbs
      appear in sequence without conjunctions or infinitive markers. The verbs are
      simply juxtaposed, with the second verb often in the infinitive form (ku-).
      English does not allow bare serial verbs -- it requires either conjunctions
      (and), infinitive markers (to), or gerunds (-ing).
    teacher_tips:
      how_to_explain: 'Say: In Swahili, you can put two verbs side by side. In English,
        you need a connector between verbs. Use to (He came TO run), use -ing (He
        came running), or use and (He came AND ran).'
      where_to_start: Start with verb + to + verb (want to go, like to eat). Then
        introduce verb + -ing (came running, went shopping).
      sequencing: 'Week 1: Verb + to + verb. Week 2: Verb + -ing. Week 3: Verb + and
        + verb. Week 4: Error correction.'
      exercises:
      - name: Serial Verb Fix
        type: error-correction
        description: 'Provide 10 sentences with serial verb errors: He came run, I
          want go buy. Students add the correct connector.'
        duration: 15
      - name: Verb Chain
        type: sentence-rewrite
        description: Give students 5 Swahili-style serial verb sentences. Students
          rewrite with correct English connectors.
        duration: 15
      - name: Connector Choice
        type: fill-in-the-blank
        description: 'Provide 15 sentences with a blank between two verbs: He came
          ___ run, I want ___ go. Students choose the correct connector.'
        duration: 15
      - name: Story Retelling
        type: composition
        description: Students write a short story about a trip, using at least 5 different
          verb+verb patterns correctly.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
