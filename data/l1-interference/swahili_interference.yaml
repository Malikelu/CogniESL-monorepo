language: swahili
schema_version: '4.0'
grammar_points:
  noun_class_agreement_transfer:
    interference_patterns:
    - pattern: Swahili noun class prefixes (m-/wa-, m-/mi-, ki-/vi-, n-/n-, ji-/ma-)
        used as separate words or omitted entirely in English
      example: 'Swahili: Watu wale wameanguka (Those people have fallen) -> Literal:
        People those have-fallen -> Erroneous: People those have fallen -> Correct:
        Those people have fallen'
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Swahili noun class prefixes (m-/wa-, m-/mi-,
        ki-/vi-, n-/n-, ji-/ma-) used as separate words or omitted entirely in English.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Adjective-noun agreement via prefixes transferred to English, producing
        double marking
      example: 'Swahili: Mtu mzuri (Person good-Class1) -> Literal: Person good ->
        Erroneous: A good he person -> Correct: A good person'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Adjective-noun agreement via prefixes transferred
        to English, producing double marking.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: 'Concord agreement errors: demonstratives and adjectives not agreeing
        with English nouns because Swahili requires class concord'
      example: 'Swahili: Kitabu kikubwa kile (Book big-Class7 that-Class7) -> Literal:
        Book big that -> Erroneous: That big it book -> Correct: That big book'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Concord agreement errors: demonstratives and
        adjectives not agreeing with English nouns because Swahili requires class
        concord.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: The mzuri girl came. -> Correct: The beautiful girl came.'
    - 'Wrong: Those watu are coming. -> Correct: Those people are coming.'
    - 'Wrong: This kitabu is good. -> Correct: This book is good.'
    - 'Wrong: The big it house. -> Correct: The big house.'
    why_it_happens: 'Swahili has a noun class system with 15+ classes, each requiring
      agreement prefixes on adjectives, demonstratives, and verbs. For example, Class
      1 (humans singular) uses m- prefix: mtu mzuri (person good), while Class 2 (humans
      plural) uses wa-: watu wazuri (people good). Every modifier must carry the class
      prefix. English has no such system -- adjectives and demonstratives are invariant.
      Swahili speakers, deeply accustomed to this agreement system, may either omit
      the prefixes entirely (producing bare English) or attempt to transfer them (producing
      hybrid forms like mzuri girl). The error is persistent because noun class agreement
      is acquired by age 3 in Swahili and operates automatically. Even advanced learners
      may produce agreement-like errors under cognitive load.'
    teacher_tips:
      how_to_explain: 'Draw two columns on the board: Swahili and English. Write a
        Swahili noun phrase like kitabu kikubwa and show how ki- appears on both the
        noun and adjective. Then write the English equivalent a big book and highlight
        that English adjectives never change form. Say: In Swahili, the adjective
        wears a label that matches the noun. In English, adjectives have no labels
        -- they stay the same no matter what noun they describe. Use color-coding:
        highlight all class prefixes in red in the Swahili column.'
      where_to_start: 'Start with the simplest contrast: Swahili mtu mzuri / watu
        wazuri vs. English a good person / good people. Show that English adjectives
        do not change. Use physical objects -- hold up one book, then many books,
        and demonstrate that big stays the same in English while Swahili changes the
        prefix to match the class.'
      sequencing: 'Week 1: Introduce the concept that English has no noun class system.
        Week 2: Practice adjective-noun phrases with singular and plural. Week 3:
        Address demonstrative errors (this/that/these/those). Week 4: Error correction
        exercises focusing on hybrid Swahili-English forms.'
      exercises:
      - name: Class Prefix Detective
        type: error-correction
        description: Give students 15 sentences mixing Swahili class prefixes with
          English (e.g., The mzuri girl, Those watu came). Students must identify
          the Swahili prefix, name its class, and rewrite the sentence in correct
          English.
        duration: 20
      - name: Adjective Invariance Drill
        type: oral-drill
        description: 'Teacher says a Swahili noun phrase with class agreement (e.g.,
          kitabu kikubwa). Students must say the English equivalent with the correct
          invariant adjective (a big book). Increase speed to build automaticity.
          Vary singular/plural: vitabu vikubwa -> big books.'
        duration: 15
      - name: Translation Contrast
        type: translation
        description: 'Provide 10 Swahili sentences with full noun class agreement.
          Students translate to English, consciously dropping all class prefixes and
          keeping adjectives invariant. Peer-check: partners verify no Swahili prefixes
          remain.'
        duration: 20
      - name: Picture Description Challenge
        type: oral-drill
        description: Show images with multiple objects (one book, many books, one
          person, many people). Students describe using correct English demonstratives
          and adjectives. Teacher monitors for class-prefix transfer errors.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Mohamed, M. (2007). Swahili learners and English article acquisition. Journal
      of African Languages and Linguistics, 28(1), 45-62.
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
    source_count: 4
    source_type: peer-reviewed
    frequency: 4
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity -- Swahili
    notes: One of the most persistent interference types. The noun class system is
      acquired by age 3 in Swahili and operates automatically.
    source_rank: 1
    citations:
    - claim: Interference pattern for noun class agreement transfer
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Swahili speakers, pp. 259-276'
      tier: 1
    - claim: 'Grammar point: noun class agreement transfer'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  article_system_sw:
    interference_patterns:
    - pattern: Omission of indefinite article a/an before singular countable nouns
      example: 'Swahili: Nina kitabu (I-have book) -> Literal: I have book -> Erroneous:
        I have book -> Correct: I have a book'
      frequency: 5
      persistence: 4
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Omission of indefinite article a/an before singular
        countable nouns.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omission of definite article the when specificity is required
      example: 'Swahili: Ninataka kitabu (I-want book) -> Literal: I want book ->
        Erroneous: I want book (when specific) -> Correct: I want the book'
      frequency: 5
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Omission of definite article the when specificity
        is required.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overuse of the with uncountable or generic nouns by analogy with Swahili
        specificity markers
      example: 'Swahili: Ninataka maji (I-want water) -> Literal: I want water ->
        Erroneous: I want the water (generic) -> Correct: I want water'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Overuse of the with uncountable or generic nouns
        by analogy with Swahili specificity markers.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Insertion of a before uncountable nouns treated as countable in Swahili
      example: 'Swahili: Nina habari (I-have news) -> Literal: I have a news -> Erroneous:
        I have a news -> Correct: I have news / I have a piece of news'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Insertion of a before uncountable nouns treated
        as countable in Swahili.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: She is teacher. -> Correct: She is a teacher.'
    - 'Wrong: I bought book yesterday. -> Correct: I bought a book yesterday.'
    - 'Wrong: Please give me water. (specific glass) -> Correct: Please give me the
      water.'
    - 'Wrong: He gave me a good advice. -> Correct: He gave me good advice. / He gave
      me a piece of good advice.'
    why_it_happens: Swahili has no article system whatsoever. Definiteness and indefiniteness
      are inferred from context, word order, or demonstratives -- not from dedicated
      grammatical words. For example, Ninataka kitabu can mean I want a book or I
      want the book depending entirely on context. There is no Swahili word equivalent
      to a or the. When Swahili speakers learn English, they must acquire an entirely
      new grammatical category that has no counterpart in their L1. The indefinite
      article is typically harder to acquire than the definite article because the
      concept of marking indefiniteness is foreign. Additionally, Swahili speakers
      may use demonstratives like hii (this) or hiyo (that) to mark specificity, leading
      to confusion about when the is required in English.
    teacher_tips:
      how_to_explain: 'Start by telling students: Swahili has no words for a or the.
        English does, and you need them. Write on the board: Ninataka kitabu and ask:
        Is this any book or a specific book? Students will say it depends on context.
        Then show: English forces you to choose: a book (any) or the book (specific
        one). Use a physical demonstration: hold up a random book and say I want a
        book, then point to a specific book and say I want the book.'
      where_to_start: 'Begin with the indefinite article a/an using simple singular
        countable nouns. Use the one thing test: if you can put one before the noun,
        you need a. Show: I have one book = I have a book. Then move to the definite
        article the using the which one? test.'
      sequencing: 'Week 1: Indefinite article a/an with singular countable nouns.
        Week 2: Definite article the for specific reference. Week 3: Zero article
        with uncountable and plural generic nouns. Week 4: Contrastive practice --
        when to use a, the, or nothing.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: Provide a short paragraph written by a fictional Swahili speaker
          with all articles removed. Students must insert a, an, the, or zero article
          in every appropriate position. Discuss each choice.
        duration: 20
      - name: A vs. The Picture Game
        type: oral-drill
        description: 'Show a picture scene (a park with one dog, one tree, some children).
          First mention: I see a dog (indefinite). Second mention: The dog is brown
          (now definite). Students practice the first-mention/second-mention pattern.'
        duration: 15
      - name: Swahili-to-English Translation with Articles
        type: translation
        description: Give 10 Swahili sentences without articles. Students translate
          to English, consciously deciding whether each noun needs a, an, the, or
          no article. Include both specific and generic contexts.
        duration: 20
      - name: Uncountable Noun Sort
        type: matching
        description: 'Give students a list of 20 nouns (half countable, half uncountable).
          Students sort them into two columns and write sentences using each correctly.
          Common Swahili trouble words: information, advice, furniture, luggage, research.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Mohamed, M. (2007). Swahili learners and English article acquisition. Journal
      of African Languages and Linguistics, 28(1), 45-62.
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Master, P. (1997). The English article system: Acquisition, instruction, and
      linguistic theory. System, 25(2), 245-258.'
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity -- Swahili
    notes: Extremely high frequency. Article omission is the single most visible marker
      of Swahili L1 interference in English.
    source_rank: 1
    citations:
    - claim: Interference pattern for article system sw
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Swahili speakers, pp. 259-276'
      tier: 1
    - claim: 'Grammar point: article system sw'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  pronoun_omission:
    interference_patterns:
    - pattern: Subject pronoun dropped because Swahili verb prefixes encode person/number
      example: 'Swahili: Ninakula (I-eat, prefix ni-=I) -> Literal: Eat -> Erroneous:
        Eating now / Eat every day -> Correct: I am eating now / I eat every day'
      frequency: 5
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Subject pronoun dropped because Swahili verb
        prefixes encode person/number.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Expletive pronoun it omitted in weather/time/existential constructions
      example: 'Swahili: Inanyesha (It-rains, prefix i-=it) -> Literal: Rains -> Erroneous:
        Raining / Is rain -> Correct: It is raining'
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Expletive pronoun it omitted in weather/time/existential
        constructions.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Object pronoun omitted because Swahili uses object infix in the verb
      example: 'Swahili: Ninamwona (I-see-him, infix -mw-=him) -> Literal: I see ->
        Erroneous: I see (missing object) -> Correct: I see him'
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Object pronoun omitted because Swahili uses
        object infix in the verb.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: Is raining. -> Correct: It is raining.'
    - 'Wrong: Went to store yesterday. -> Correct: I went to the store yesterday.'
    - 'Wrong: Like pizza very much. -> Correct: I like pizza very much.'
    - 'Wrong: She gave to mother. -> Correct: She gave it to her mother.'
    why_it_happens: 'Swahili is a pro-drop language where subject pronouns are optional
      because the verb prefix already encodes person, number, and noun class. For
      example, ninakula (ni- + -na- + -kula) means I eat -- the prefix ni- means I,
      so adding the separate pronoun mimi is unnecessary except for emphasis. Similarly,
      object pronouns are often incorporated as infixes: ninamwona = I-see-him. English
      requires explicit subject pronouns in every finite clause (except imperatives)
      and separate object pronouns. The Swahili speakers brain has automatized the
      pattern: verb prefix = subject, so the separate pronoun feels redundant. This
      is one of the most persistent errors because it is rooted in the fundamental
      architecture of the Swahili verb.'
    teacher_tips:
      how_to_explain: 'Write a Swahili verb like ninakula on the board and break it
        down: ni- (I) + -na- (present) + -kula (eat). Say: The I is already inside
        the verb. But in English, the I must stand outside, in its own word. Then
        write: I eat and underline I separately. Say: English verbs are naked -- they
        do not carry the subject inside them. You must always add the subject word.
        For weather verbs, say: English needs a fake subject -- it. We say it rains
        even though it does not mean anything.'
      where_to_start: 'Start with the most basic rule: Every English sentence needs
        a subject. Use the Who does it? test: point to any verb and ask Who does this?
        Students must supply the subject pronoun. Begin with first person (I), then
        expand to he/she/it/we/they.'
      sequencing: 'Week 1: Subject pronouns with present tense verbs. Week 2: Expletive
        it (weather, time, distance). Week 3: Object pronouns after transitive verbs.
        Week 4: Combined practice -- subject + object pronouns in the same sentence.'
      exercises:
      - name: Subject Rescue
        type: error-correction
        description: Provide 15 sentences with missing subject pronouns (e.g., Went
          to school, Is cold today, Like music). Students must add the correct subject
          pronoun and identify what information was lost without it.
        duration: 15
      - name: Verb Dissection
        type: transformation
        description: 'Give students Swahili sentences with verb prefixes. They must
          (a) identify the subject from the prefix, (b) translate to English with
          the explicit subject pronoun. Example: Anasoma -> prefix a- = she/he ->
          She is reading.'
        duration: 20
      - name: Weather Report
        type: oral-drill
        description: 'Students give weather reports for different cities, forced to
          use it correctly: In Nairobi, it is sunny. In London, it is raining. Teacher
          monitors for Is sunny -> It is sunny.'
        duration: 10
      - name: Object Pronoun Hunt
        type: sentence-rewrite
        description: 'Give 10 Swahili sentences with object infixes (e.g., Ninamwona,
          Alinipiga). Students translate to English, ensuring the object pronoun appears
          as a separate word: I see him, He hit me.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
    - White, L. (1985). The pro-drop parameter in adult second language acquisition.
      Language Learning, 35(1), 47-62.
