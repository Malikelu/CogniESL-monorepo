        because Swahili serial verb constructions are grammatical.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting infinitive markers between serial verbs because Swahili verbs
        are simply juxtaposed
      example: 'Swahili: Ninataka kuenda kununua (I-want to-go to-buy) -> Erroneous:
        I want go buy food -> Correct: I want to go buy food'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
