  adverb_placement:
    interference_patterns:
    - pattern: Placing frequency adverbs after the main verb because Swahili adverbs
        typically follow the verb
      example: 'Swahili: Ninakula mara nyingi (I-eat times many = I eat often) ->
        Erroneous: I eat never -> Correct: I never eat'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Placing adjectives instead of adverbs to modify verbs because Swahili
        uses the same form for both
      example: 'Swahili: Anasema vizuri (He-speaks good/well - same form) -> Erroneous:
        He speaks very good -> Correct: He speaks very well'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Placing adverbs at the end of sentences by transferring Swahili clause-final
        adverb position
      example: 'Swahili: Alikuja jana (He-came yesterday) -> Erroneous: I went yesterday
        to the store (awkward) -> Correct: Yesterday I went to the store / I went
        to the store yesterday'
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - 'Wrong: I eat never. -> Correct: I never eat.'
    - 'Wrong: He speaks very good. -> Correct: He speaks very well.'
    - 'Wrong: She runs fastly. -> Correct: She runs fast.'
    - 'Wrong: I always am late. -> Correct: I am always late.'
    why_it_happens: Swahili adverbs typically appear after the verb or at the end
      of the clause, while English adverbs of frequency (always, never, often, usually,
      sometimes) are placed BEFORE the main verb (but after be). Additionally, Swahili
      does not distinguish morphologically between adjectives and adverbs -- the same
      word (e.g., vizuri = good/well) serves both functions. English requires -ly
      for most adverbs (but has exceptions like fast, hard, well).
    teacher_tips:
      how_to_explain: 'Say: In English, words like always, never, often, usually,
        sometimes go BEFORE the main verb but AFTER the verb be. For good vs. well,
        good describes things (a good book), well describes actions (He speaks well).'
      where_to_start: 'Start with frequency adverbs: always, never, often, usually,
        sometimes. Then move to adjective vs. adverb (good/well, fast/fast).'
      sequencing: 'Week 1: Frequency adverbs. Week 2: Adjective vs. adverb. Week 3:
        Adverb placement. Week 4: Adverbs ending in -ly.'
      exercises:
      - name: Adverb Placement Drill
        type: transformation
        description: 'Give students 15 sentences with adverbs in the wrong position:
          I eat never, She always is late. Students fix errors.'
        duration: 15
      - name: Good vs. Well
        type: fill-in-the-blank
        description: 'Provide 15 sentences: He plays very ___ (good/well), She is
          a ___ singer (good/well). Students choose the correct form.'
        duration: 15
      - name: Adverb Formation
        type: transformation
        description: 'Give students 15 adjectives. Students form the adverb: quick
          -> quickly, careful -> carefully, fast -> fast, good -> well.'
        duration: 15
      - name: Adverb Paragraph
        type: composition
        description: Students write a paragraph about their daily routine, using at
          least 8 different adverbs correctly.
        duration: 20
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - 'Odlin, T. (1989). Language Transfer: Cross-Linguistic Influence in Language
      Learning. Cambridge University Press.'
