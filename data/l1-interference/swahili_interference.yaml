    interference_patterns:
    - pattern: Using multiple verbs in a row without conjunctions because Swahili
        serial verb constructions are grammatical
      example: 'Swahili: Alikuja kunikimbia (He-came to-run) -> Erroneous: He came
        run to me -> Correct: He came running to me'
