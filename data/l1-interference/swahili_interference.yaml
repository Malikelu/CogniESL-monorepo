  plural_marking:
    interference_patterns:
    - pattern: Adding -s to uncountable nouns because Swahili uses noun class prefixes
        for pluralization
      example: 'Swahili: habari (news, uncountable) has no plural -> But learner applies
        English -s rule -> Erroneous: I have many informations -> Correct: I have
        a lot of information'
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Adding -s to uncountable nouns because Swahili
        uses noun class prefixes for pluralization.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omitting plural -s because Swahili marks plurality on the noun prefix,
        not as a suffix
      example: 'Swahili: vitabu (books, vi- = plural prefix) -> No suffix needed ->
        Erroneous: I have three book -> Correct: I have three books'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Omitting plural -s because Swahili marks plurality
        on the noun prefix, not as a suffix.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overregularizing irregular plurals because Swahili has no irregular
        plurals
      example: 'Swahili plurals are formed regularly by prefix change -> Erroneous:
        childs, mans, womans, mouses -> Correct: children, men, women, mice'
      frequency: 3
      persistence: 2
      communicative_impact: 1
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Overregularizing irregular plurals because Swahili
        has no irregular plurals.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - 'Wrong: I have many informations. -> Correct: I have a lot of information.'
    - 'Wrong: He gave me good advices. -> Correct: He gave me good advice.'
    - 'Wrong: I bought three book. -> Correct: I bought three books.'
    - 'Wrong: She has two childs. -> Correct: She has two children.'
    why_it_happens: 'Swahili pluralizes nouns by changing the noun class prefix, not
      by adding a suffix. For example: ki-tabu (singular, Class 7) -> vi-tabu (plural,
      Class 8); m-tu (person, Class 1) -> wa-tu (people, Class 2). There is no equivalent
      of English -s. When Swahili speakers learn English, they must acquire a new
      morphological process (suffixation) that does not exist in their L1. The error
      of adding -s to uncountable nouns (informations, advices, furnitures) occurs
      because the learner overgeneralizes the plural rule: if it is more than one,
      add -s. The omission of -s occurs because the Swahili system marks plurality
      on the prefix, and the noun itself does not change shape. Additionally, some
      English irregular plurals (children, men, women) have no Swahili equivalent
      pattern, leading to overregularization (childs, mans, womans).'
    teacher_tips:
      how_to_explain: 'Say: In Swahili, you change the beginning of the word to make
        it plural: kitabu -> vitabu. In English, you add -s to the end: book -> books.
        But some English words cannot have -s: information, advice, furniture, luggage.
        These are called uncountable nouns. You must memorize them. Create two columns
        on the board: COUNTABLE (add -s) and UNCOUNTABLE (no -s).'
      where_to_start: 'Start with regular plural -s: book/books, car/cars. Then introduce
        the spelling rules: -s, -es, -ies. Then address uncountable nouns: information,
        advice, furniture, luggage, research, homework. Finally, cover irregular plurals:
        child/children, man/men, woman/women, person/people.'
      sequencing: 'Week 1: Regular plural -s. Week 2: Spelling rules (-s, -es, -ies,
        -ves). Week 3: Uncountable nouns. Week 4: Irregular plurals.'
      exercises:
      - name: Countable or Uncountable?
        type: matching
        description: 'Give students a list of 25 nouns. They sort them into countable
          and uncountable columns. Then write sentences using each correctly: I have
          two books (countable) vs. I have some information (uncountable).'
        duration: 15
      - name: Plural Transformation
        type: transformation
        description: 'Give students 15 singular nouns (including uncountable and irregular).
          Students write the plural form. Include: book, box, city, child, man, woman,
          information, advice, furniture, luggage, person, mouse, tooth, foot, sheep.'
        duration: 15
      - name: 'Error Correction: Plural Overgeneralization'
        type: error-correction
        description: 'Provide 10 sentences with plural errors: I have many informations,
          She gave me good advices, He has two childs. Students identify the error
          and correct it.'
        duration: 15
      - name: Shopping List
        type: composition
        description: 'Students write a shopping list using both countable and uncountable
          nouns: three apples, two bottles of water, some rice, a piece of furniture.
          Peer review: partners check plural forms.'
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
    - Chimera, R. (2002). Modern Swahili Grammar. East African Educational Publishers.
    - Murphy, R. (2019). English Grammar in Use. Cambridge University Press.
