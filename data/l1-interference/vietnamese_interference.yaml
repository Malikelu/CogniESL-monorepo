  copula_be:
    interference_patterns:
    - pattern: Omission of copula with adjectives
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: VN 'Co ay dep'
      example_gloss: she beautiful
      example_wrong: She beautiful
      example_correct: She is beautiful
      explanation: 'Transfer from L1: Omission of copula with adjectives.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omission of copula with location
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: VN 'Toi o nha'
      example_gloss: I at home
      example_wrong: I at home
      example_correct: I am at home
      explanation: 'Transfer from L1: Omission of copula with location.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: She beautiful.
      correct: She is beautiful.
    - wrong: I at home now.
      correct: I am at home now.
    - wrong: They students.
      correct: They are students.
    why_it_happens: 'Vietnamese does not require a copula (linking verb) between subject
      and adjective: ''Co ay dep'' (she beautiful) is grammatically complete. The
      copula ''la'' (to be) is used only for identification/classification, not with
      adjectives. Vietnamese learners omit ''be'' because it is not required in their
      L1 for predicative adjectives.'
    teacher_tips:
      how_to_explain: 'Teach: Subject + BE + adjective/noun/location. ALWAYS. ''She
        beautiful'' is wrong. ''She IS beautiful'' is right. Drill: I am, you are,
        he/she/it is, we are, they are + adjective.'
      where_to_start: Teach 'be' with adjectives first (most common error). Then with
        nouns (She is a teacher). Then with locations (I am at home).
      sequencing: 'Week 1: Be + adjective. Week 2: Be + noun. Week 3: Be + location.
        Week 4: Be in questions and negatives.'
      exercises:
      - name: Be Insertion
        type: sentence-rewrite
        description: Students add the correct form of be to 15 Vietnamese-influenced
          sentences.
        duration: 10
      - name: VN Copula Translation
        type: translation
        description: Translate 15 Vietnamese sentences, adding be where needed.
        duration: 15
      - name: Be Conjugation Drill
        type: fill-in-the-blank
        description: 20 sentences where students fill in am/is/are.
        duration: 10
      - name: Description Activity
        type: oral-drill
        description: Students describe people, places, and things using be + adjective/noun.
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Parrott "Grammar for English Language Teachers"
