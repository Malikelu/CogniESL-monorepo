  phonology:
    interference_patterns:
    - pattern: Final consonant cluster simplification
      example: 'VN lacks final clusters -> Error: ''tes'' for ''test'', ''han'' for
        ''hand'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Confusion of th sounds
      example: 'VN lacks dental fricatives -> Error: ''tink'' for ''think'', ''dis''
        for ''this'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I pas the tes.
      correct: I pass the test.
    - wrong: Tink about it.
      correct: Think about it.
    - wrong: Dis is my book.
      correct: This is my book.
    why_it_happens: Vietnamese phonology has a limited set of final consonants. English
      final consonant clusters (tests, hands, asked) are systematically simplified.
      Vietnamese also lacks dental fricatives (th sounds), replacing them with /t/
      and /d/.
    teacher_tips:
      how_to_explain: 'For final clusters: practice saying the full cluster slowly,
        then faster. ''tes-t'', ''han-d'', ''as-ked''. For th sounds: teach tongue-between-teeth
        position. Practice: think-this, three-that, thick-thin.'
      where_to_start: Teach final consonant clusters with common words (test, hand,
        ask, next). Then teach th sounds.
      sequencing: 'Week 1: Final consonant clusters. Week 2: Th sounds. Week 3: L
        vs R distinction. Week 4: Vowel length contrasts.'
      exercises:
      - name: Final Cluster Practice
        type: oral-drill
        description: 'Students practice 20 words with final consonant clusters: test,
          hand, ask, next, last, first.'
        duration: 10
      - name: Minimal Pairs
        type: matching
        description: 'Students distinguish: think/tink, this/dis, thick/tick, that/dat.'
        duration: 10
      - name: Tongue Twisters
        type: oral-drill
        description: Practice tongue twisters with target sounds.
        duration: 10
      - name: Dictation
        type: fill-in-the-blank
        description: Teacher dictates words with target sounds. Students write them.
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Underhill "Sound Foundations"
