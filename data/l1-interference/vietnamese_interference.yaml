language: Vietnamese
language_code: vi
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of all articles
      example: 'VN ''Tôi mua sach'' (I buy book) -> Error: ''I buy book'' -> Correct:
        ''I buy a book'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Overuse of this/that as determiners
      example: 'VN ''cuon sach nay'' (book this) -> Error: ''I want this a book''
        -> Correct: ''I want this book'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I want to buy car.
      correct: I want to buy a car.
    - wrong: She is teacher.
      correct: She is a teacher.
    - wrong: Please give me that the book.
      correct: Please give me that book.
    why_it_happens: Vietnamese has no article system. Definiteness is inferred from
      context or expressed with demonstratives 'nay' (this), 'do' (that). Vietnamese
      learners struggle with English articles because there is no structural equivalent.
      The concept of marking definiteness grammatically is entirely foreign to Vietnamese
      speakers.
    teacher_tips:
      how_to_explain: 'Start with the ''countable noun test'': if you can count it
        (one book, two books), it needs a determiner. Teach ''a/an'' for first mention,
        ''the'' for specific/known. Use visual aids: point to a specific book = ''the
        book'', any book = ''a book''.'
      where_to_start: Teach countable vs uncountable nouns first. Then introduce 'a/an'
        for singular countables. Then 'the' for specific reference.
      sequencing: 'Week 1: Countable vs uncountable. Week 2: A/an for singular countables.
        Week 3: The for specific reference. Week 4: Zero article with plurals/uncountables.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: Students receive 20 Vietnamese-influenced sentences without articles.
          They add the correct article or determine if none is needed.
        duration: 15
      - name: VN-to-EN Translation
        type: translation
        description: Translate 15 Vietnamese sentences, adding appropriate articles
          in English.
        duration: 20
      - name: Article Decision Tree
        type: fill-in-the-blank
        description: 'Students complete a flowchart for article choice: countable?
          singular? first mention? -> a/an. specific? -> the. plural/uncountable general?
          -> zero.'
        duration: 10
      - name: Picture Description
        type: oral-drill
        description: 'Students describe pictures using correct articles: I see a cat.
          The cat is on a chair.'
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 5
    communicative_impact: 4
    flagged: false
    tier: 1
    source_rank: 2
    citations:
    - claim: 'Grammar point: articles'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Article usage varies significantly across languages; many languages have
        no article system
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See articles entries 133-142
      tier: 2
    - claim: Vietnamese has no article system (PEU articles entries)
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See relevant entry
      tier: 2
    - claim: ELLs commonly omit indefinite article when descriptive adjectives come
        between determiner and noun
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
    - claim: Vietnamese has no article system (p. 153)
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: See relevant section
      tier: 2
  plurals:
    interference_patterns:
    - pattern: Omission of plural -s
      example: 'VN ''hai con meo'' (two cat) -> Error: ''two cat'' -> Correct: ''two
        cats'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Use of number + singular noun
      example: 'VN ''nhieu nguoi'' (many person) -> Error: ''many person'' -> Correct:
        ''many people'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I have three dog.
      correct: I have three dogs.
    - wrong: She bought five book.
      correct: She bought five books.
    - wrong: There are many student in the class.
      correct: There are many students in the class.
    why_it_happens: 'Vietnamese nouns do not change form for plural. Plurality is
      expressed through classifiers and quantifiers: ''hai con meo'' (two classifier
      cat), ''nhieu nguoi'' (many person). The noun itself never changes. Vietnamese
      learners must learn that English requires morphological plural marking on the
      noun itself.'
    teacher_tips:
      how_to_explain: 'Teach the rule: number > 1 = noun + s. Use visual: one cat
        (picture of 1), two cats (picture of 2 with -s highlighted). Drill: 1 book,
        2 books, 3 books... 1 child, 2 children (irregular).'
      where_to_start: Teach regular plural -s first. Then -es (boxes, churches). Then
        irregulars (children, people, men, women).
      sequencing: 'Week 1: Regular plural -s. Week 2: Plural -es and -ies. Week 3:
        Irregular plurals. Week 4: Uncountable nouns (no plural).'
      exercises:
      - name: Plural Formation
        type: fill-in-the-blank
        description: 20 sentences with singular nouns. Students write the plural form.
        duration: 10
      - name: VN Classifier Translation
        type: translation
        description: Translate 15 Vietnamese sentences with classifiers into English
          plurals.
        duration: 15
      - name: Plural Error Hunt
        type: error-correction
        description: A paragraph with 10 plural errors. Students find and fix.
        duration: 15
      - name: Shopping List
        type: composition
        description: 'Students write a shopping list with quantities: 3 apples, 2
          loaves of bread, 1 milk.'
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
