  pronouns:
    interference_patterns:
    - pattern: Use of kinship terms as pronouns
      frequency: 4
      persistence: 4
      communicative_impact: 4
      example_l1: VN 'chi'
      example_gloss: older sister/you
      example_wrong: Older sister wants coffee' (meaning 'You want coffee')
      example_correct: Do you want coffee?
      explanation: 'Transfer from L1: Use of kinship terms as pronouns.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omission of subject pronoun
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: VN 'Di cho'
      example_gloss: go market
      example_wrong: Go to the market
      example_correct: I go to the market' (if declarative)
      explanation: 'Transfer from L1: Omission of subject pronoun.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: Older sister wants coffee?
      correct: Do you want coffee?
    - wrong: Younger sibling is studying.
      correct: He is studying. / She is studying.
    - wrong: You go to school now.
      correct: Go to school now.
    why_it_happens: Vietnamese uses a complex kinship term system instead of personal
      pronouns. 'Chi' (older sister), 'anh' (older brother), 'em' (younger sibling)
      are used as I/you/he/she depending on relative age and gender. Vietnamese learners
      may transfer these terms directly, creating confusing English sentences.
    teacher_tips:
      how_to_explain: 'Teach the English pronoun system: I, you, he, she, it, we,
        they. Explain that English uses the same ''you'' regardless of age. Contrast:
        VN ''chi'' (older sister/you) vs EN ''you'' (everyone).'
      where_to_start: Teach personal pronouns (I, you, he, she, it, we, they). Then
        teach possessive adjectives (my, your, his, her).
      sequencing: 'Week 1: Personal pronouns. Week 2: Possessive adjectives. Week
        3: Object pronouns. Week 4: Reflexive pronouns.'
      exercises:
      - name: Pronoun Substitution
        type: sentence-rewrite
        description: Students rewrite 10 Vietnamese kinship-term sentences using English
          pronouns.
        duration: 15
      - name: Pronoun Chart
        type: matching
        description: 'Students fill in a pronoun chart: I-me-my-mine, you-you-your-yours,
          etc.'
        duration: 10
      - name: Role-play Conversation
        type: oral-drill
        description: Students practice conversations using correct pronouns instead
          of kinship terms.
        duration: 15
      - name: Pronoun Error Correction
        type: error-correction
        description: 10 sentences with pronoun errors. Students correct.
        duration: 10
