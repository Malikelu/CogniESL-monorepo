  gerund_infinitive:
    interference_patterns:
    - pattern: Use of infinitive where gerund is required
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: VN 'thich + V'
      example_gloss: like + V
      example_wrong: I enjoy to swim
      example_correct: I enjoy swimming
      explanation: 'Transfer from L1: Use of infinitive where gerund is required.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I enjoy to swim.
      correct: I enjoy swimming.
    - wrong: I want learning English.
      correct: I want to learn English.
    - wrong: She finished to read the book.
      correct: She finished reading the book.
    why_it_happens: 'Vietnamese uses the base verb form after most verbs: ''thich
      boi'' (like swim), ''muon hoc'' (want study). English has a complex system where
      some verbs take gerund (enjoy, finish), some take infinitive (want, need), and
      some take both. Vietnamese learners default to the base form.'
    teacher_tips:
      how_to_explain: 'Teach three categories: (1) Gerund only: enjoy, finish, avoid,
        mind. (2) Infinitive only: want, need, hope, plan. (3) Both (same meaning):
        like, start, continue. Drill: enjoy + -ing, want + to + verb.'
      where_to_start: Teach gerund-only verbs first. Then infinitive-only verbs. Then
        verbs that take both.
      sequencing: 'Week 1: Gerund-only verbs. Week 2: Infinitive-only verbs. Week
        3: Verbs that take both. Week 4: Meaning changes (stop doing vs stop to do).'
      exercises:
      - name: Gerund or Infinitive?
        type: fill-in-the-blank
        description: 15 sentences where students choose between gerund and infinitive.
        duration: 10
      - name: Verb Pattern Sort
        type: matching
        description: Students sort 20 verbs into gerund, infinitive, or both columns.
        duration: 10
      - name: VN Verb Pattern Translation
        type: translation
        description: Translate 15 Vietnamese verb sentences into correct English patterns.
        duration: 15
      - name: Sentence Building
        type: sentence-rewrite
        description: Students rewrite 10 sentences changing the verb form.
        duration: 10
