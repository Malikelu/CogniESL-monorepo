  modal_verbs:
    interference_patterns:
    - pattern: Use of can for all abilities/permissions
      example: 'VN ''co the'' = can/could/may/might -> Error: ''Can I go?'' (informal)
        -> Correct: ''May I go?'' (formal)'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of modal in polite requests
      example: 'VN uses politeness markers -> Error: ''You help me?'' -> Correct:
        ''Could you help me?'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: You help me?
      correct: Could you help me?
    - wrong: I can have some water?
      correct: May I have some water?
    - wrong: She can to swim.
      correct: She can swim.
    why_it_happens: Vietnamese 'co the' covers can/could/may/might. Vietnamese politeness
      is expressed through kinship terms and particles, not through modal verbs. Vietnamese
      learners may use 'can' for all situations or omit modals in polite requests.
    teacher_tips:
      how_to_explain: 'Teach modal hierarchy: can (ability), may (permission, formal),
        could (polite request), should (advice), must (obligation). For politeness:
        ''Could you...?'' is more polite than ''Can you...?'''
      where_to_start: Teach 'can' for ability first. Then 'may' for permission. Then
        'could' for polite requests.
      sequencing: 'Week 1: Can (ability). Week 2: May (permission). Week 3: Could
        (politeness). Week 4: Should/must (advice/obligation).'
      exercises:
      - name: Modal Choice
        type: fill-in-the-blank
        description: 15 sentences where students choose the correct modal.
        duration: 10
      - name: Politeness Role-play
        type: oral-drill
        description: 'Students practice polite requests: Could you pass the salt?
          May I borrow your pen?'
        duration: 15
      - name: Modal Error Correction
        type: error-correction
        description: 10 sentences with modal errors. Students correct.
        duration: 10
      - name: VN Co The Translation
        type: translation
        description: Translate 15 Vietnamese co the sentences into correct English
          modals.
        duration: 15
    sources:
