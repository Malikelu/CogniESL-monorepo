  reported_speech:
    interference_patterns:
    - pattern: No backshift of tenses
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: VN 'Co ay noi co ay den'
      example_gloss: she said she come
      example_wrong: She said she comes
      example_correct: She said she came
      explanation: 'Transfer from L1: No backshift of tenses.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: She said she is tired.
      correct: She said she was tired.
    - wrong: He told me he will come.
      correct: He told me he would come.
    - wrong: They said they are leaving.
      correct: They said they were leaving.
    why_it_happens: Vietnamese reported speech often retains the original tense and
      pronouns, especially when the reported information is still true. English requires
      backshift (present -> past, will -> would) and pronoun adjustment. Vietnamese
      learners transfer the L1 pattern.
    teacher_tips:
      how_to_explain: 'Teach the backshift rule: Direct speech present -> reported
        past. Direct will -> reported would. Direct can -> reported could. Pronouns
        change to match the reporter perspective.'
      where_to_start: Teach the basic backshift pattern with say and tell. Then teach
        pronoun changes.
      sequencing: 'Week 1: Say/tell + backshift. Week 2: Pronoun changes. Week 3:
        Modal backshift. Week 4: Questions and commands in reported speech.'
      exercises:
      - name: Backshift Practice
        type: sentence-rewrite
        description: Students convert 15 direct speech sentences to reported speech.
        duration: 15
      - name: VN Reported Speech Translation
        type: translation
        description: Translate 15 Vietnamese reported speech sentences into correct
          English.
        duration: 15
      - name: News Reporter
        type: composition
        description: Students write a short news article using reported speech for
          5 quotes.
        duration: 20
      - name: Telephone Game
        type: oral-drill
        description: 'Students play telephone: first student says something, next
          reports it, etc.'
        duration: 10
