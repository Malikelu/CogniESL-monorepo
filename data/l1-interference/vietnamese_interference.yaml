language: vietnamese
grammar_points:
  verb_tense_aspect:
    interference_patterns:
    - Vietnamese uses no verb conjugation which does not exist in English, causing
      transfer errors related to 'verb tense aspect'.
    why_it_happens: Vietnamese handles 'verb tense aspect' differently from English.
      Vietnamese L1 speakers transfer native structural patterns to English, leading
      to systematic errors. The error is persistent because the Vietnamese structure
      is deeply automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Vietnamese and English for 'verb
        tense aspect'. Show the Vietnamese structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Vietnamese
        handles 'verb tense aspect' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Vietnamese sentences, students translate to English,
          focusing on correct 'verb tense aspect' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Vietnamese-style 'verb tense aspect'
          errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'verb
          tense aspect' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'verb tense aspect'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I have eaten yesterday.'' Correct: ''I ate yesterday.'''
    - 'Wrong: ''I live here since 5 years.'' Correct: ''I have lived here for 5 years.'''
    - 'Wrong: ''When I arrived, he had left.'' (wrong sequence) Correct: ''When I
      arrived, he left.'''
    sources:
    - 'Ngo, B. (2001). The Vietnamese learner of English: A case study. Journal of
      Southeast Asian Education, 2(1), 45-62.'
    - Nguyen, T. (2005). Vietnamese learners and English article acquisition. Asian
      EFL Journal, 7(3), 1-20.
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Vietnamese
    notes: Most cited L1 transfer error for Vietnamese learners across all proficiency
      levels.
