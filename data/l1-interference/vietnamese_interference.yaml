    examples:
    - wrong: You help me?
      correct: Could you help me?
    - wrong: I can have some water?
      correct: May I have some water?
    - wrong: She can to swim.
      correct: She can swim.
    why_it_happens: Vietnamese 'co the' covers can/could/may/might. Vietnamese politeness
      is expressed through kinship terms and particles, not through modal verbs. Vietnamese
      learners may use 'can' for all situations or omit modals in polite requests.
    teacher_tips:
      how_to_explain: 'Teach modal hierarchy: can (ability), may (permission, formal),
        could (polite request), should (advice), must (obligation). For politeness:
        ''Could you...?'' is more polite than ''Can you...?'''
      where_to_start: Teach 'can' for ability first. Then 'may' for permission. Then
        'could' for polite requests.
      sequencing: 'Week 1: Can (ability). Week 2: May (permission). Week 3: Could
        (politeness). Week 4: Should/must (advice/obligation).'
