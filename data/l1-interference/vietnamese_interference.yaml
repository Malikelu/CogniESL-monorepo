  question_formation:
    interference_patterns:
    - pattern: Use of question particle without inversion
      example: 'VN ''Ban co khong?'' (you yes no?) -> Error: ''You are happy or not?''
        -> Correct: ''Are you happy?'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Use of khong or a as question markers
      example: 'VN ''Ban di khong?'' (you go not?) -> Error: ''You go not?'' -> Correct:
        ''Do you go?'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: You go to school not?
      correct: Do you go to school?
    - wrong: She is teacher or not?
      correct: Is she a teacher?
    - wrong: He likes coffee khong?
      correct: Does he like coffee?
    why_it_happens: Vietnamese forms questions by adding particles 'khong' (not),
      'a' (question marker), or 'co...khong' (yes-no) at the end of a statement. No
      subject-verb inversion or do-support is needed. Vietnamese learners transfer
      this pattern, creating questions without inversion.
    teacher_tips:
      how_to_explain: 'Teach two question types: (1) Yes/no questions: Do/Does/Did
        + subject + base verb? OR Be + subject? (2) Wh- questions: Wh- word + do/does/did
        + subject + base verb? Drill: ''You like coffee'' -> ''Do you like coffee?''
        NOT ''You like coffee?'''
      where_to_start: 'Teach yes/no questions with ''be'' first (easier: just invert).
        Then teach do/does/did questions.'
      sequencing: 'Week 1: Yes/no questions with be. Week 2: Yes/no questions with
        do/does/did. Week 3: Wh- questions. Week 4: Tag questions.'
      exercises:
      - name: Question Formation
        type: sentence-rewrite
        description: Students convert 15 statements to questions using correct inversion
          and do-support.
        duration: 15
      - name: VN Question Translation
        type: translation
        description: Translate 15 Vietnamese particle questions into correct English.
        duration: 15
      - name: Interview Activity
        type: oral-drill
        description: Students interview each other using wh- and yes/no questions.
        duration: 15
      - name: Question Error Correction
        type: error-correction
        description: 10 sentences with question formation errors. Students correct.
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Parrott "Grammar for English Language Teachers"
