  comparatives:
    interference_patterns:
    - pattern: Use of hon (more) for all comparatives
      example: 'VN ''to hon'' (big more) -> Error: ''more big'' -> Correct: ''bigger'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: This car is more big than that one.
      correct: This car is bigger than that one.
    - wrong: She is the most tall in the class.
      correct: She is the tallest in the class.
    - wrong: He is more old than me.
      correct: He is older than me.
    why_it_happens: Vietnamese forms comparatives with 'hon' (more) + adjective and
      superlatives with 'nhat' (most) + adjective. English uses -er/-est for short
      adjectives and more/most for long ones. Vietnamese learners overuse 'more/most'
      because that is the pattern in their L1.
    teacher_tips:
      how_to_explain: 'Teach the rule: 1-2 syllable adjectives -> -er/-est (big ->
        bigger -> biggest). 3+ syllable adjectives -> more/most (beautiful -> more
        beautiful). Exceptions: good -> better -> best.'
      where_to_start: Teach the -er/-est rule with common short adjectives. Then teach
        more/most with long adjectives.
      sequencing: 'Week 1: -er/-est with short adjectives. Week 2: More/most with
        long adjectives. Week 3: Irregular comparatives. Week 4: Comparative structures
        (as...as, than).'
      exercises:
      - name: Comparative Formation
        type: sentence-rewrite
        description: Students rewrite 10 sentences, changing more + adj to -er where
          appropriate.
        duration: 10
      - name: Superlative Challenge
        type: fill-in-the-blank
        description: 15 sentences where students form the correct superlative.
        duration: 10
      - name: VN Comparative Translation
        type: translation
        description: Translate 15 Vietnamese comparative sentences into correct English.
        duration: 10
      - name: Comparison Paragraph
        type: composition
        description: Students write a paragraph comparing two things using at least
          5 comparatives.
        duration: 15
