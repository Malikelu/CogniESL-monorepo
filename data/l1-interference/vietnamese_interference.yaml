  linking_words:
    interference_patterns:
    - pattern: Use of nhung (but) at sentence start
      example: 'VN ''nhung'' = but/however -> Error: ''But, I think...'' -> Correct:
        ''However, I think...'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Double conjunctions
      example: 'VN ''mac du...nhung'' = although...but -> Error: ''Although it rained,
        but we went out'' -> Correct: ''Although it rained, we went out'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: But, I think we should go.
      correct: However, I think we should go.
    - wrong: Although it rained, but we went out.
      correct: Although it rained, we went out.
    - wrong: Because I was sick, so I stayed home.
      correct: Because I was sick, I stayed home.
    why_it_happens: Vietnamese 'nhung' functions as both 'but' and 'however'. Vietnamese
      also uses double conjunctions ('mac du...nhung' = although...but), which is
      redundant in English. Vietnamese learners transfer these patterns to English.
    teacher_tips:
      how_to_explain: 'Teach: ''However'' for formal writing (sentence-initial). ''But''
        for informal/mid-sentence. ''Although'' and ''but'' NEVER together in English.
        ''Because'' and ''so'' NEVER together.'
      where_to_start: Teach 'but' vs 'however' first. Then teach 'because' clause
        structure. Then teach 'although/but' redundancy.
      sequencing: 'Week 1: But vs however. Week 2: Because clauses. Week 3: Although/but
        redundancy. Week 4: Other linking words.'
      exercises:
      - name: Formal vs Informal
        type: sentence-rewrite
        description: Students rewrite 10 informal sentences using formal linking words.
        duration: 10
      - name: Double Conjunction Fix
        type: error-correction
        description: 10 sentences with although...but or because...so. Students remove
          the redundant conjunction.
        duration: 10
      - name: Linking Word Sort
        type: matching
        description: Students categorize 15 linking words by function.
        duration: 10
      - name: VN Conjunction Translation
        type: translation
        description: Translate 15 Vietnamese double-conjunction sentences into correct
          English.
        duration: 15
