  discourse_markers:
    interference_patterns:
    - pattern: Use of a or u as filler words
      example: 'VN ''a'' = uh/well -> Error: ''I a think...'' -> Correct: ''Well,
        I think...'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Use of thi as a discourse connector
      example: 'VN ''thi'' = then/so -> Error: ''I thi went home'' -> Correct: ''So
        I went home'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I a think it is good.
      correct: Well, I think it is good.
    - wrong: I thi went home.
      correct: So I went home.
    why_it_happens: Vietnamese uses discourse particles 'a', 'u', 'thi' extensively
      in speech. These have no direct English equivalent. Vietnamese learners may
      transfer these particles directly, creating unnatural English.
    teacher_tips:
      how_to_explain: 'Teach English discourse markers: ''well'', ''so'', ''you know'',
        ''I mean''. Explain that Vietnamese particles do not translate directly. Practice:
        ''Well, I think...'', ''So, I went home.'''
