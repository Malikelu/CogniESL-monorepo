  possessives:
    interference_patterns:
    - pattern: Use of cua (of) instead of possessive
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: VN 'nha cua toi'
      example_gloss: house of me
      example_wrong: house of me
      example_correct: my house
      explanation: 'Transfer from L1: Use of cua (of) instead of possessive.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: House of me is big.
      correct: My house is big.
    - wrong: Mother goes to the market.
      correct: My mother goes to the market.
    - wrong: He broke leg.
      correct: He broke his leg.
    why_it_happens: 'Vietnamese uses ''cua'' (of/belonging to) to express possession:
      ''nha cua toi'' (house of me). Vietnamese also omits possessives when the possessor
      is clear from context. English requires possessive adjectives (my, your, his,
      her, our, their) in most contexts.'
    teacher_tips:
      how_to_explain: 'Teach: English uses possessive adjectives BEFORE the noun.
        ''My house'' (not ''house of me''). For body parts and family: ''my mother'',
        ''his leg'' (not ''the mother'', ''the leg'').'
      where_to_start: Teach possessive adjectives with family members and body parts
        first.
      sequencing: 'Week 1: My/your/his/her with family. Week 2: Our/their with possessions.
        Week 3: Possessive adjectives vs possessive pronouns. Week 4: Review.'
      exercises:
      - name: Possessive Formation
        type: sentence-rewrite
        description: Students rewrite 10 cua phrases using possessive adjectives.
        duration: 10
