  verb_tenses:
    interference_patterns:
    - pattern: Use of present tense for past events
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: VN 'Hom qua toi di cho'
      example_gloss: yesterday I go market
      example_wrong: Yesterday I go to the market
      example_correct: Yesterday I went to the market
      explanation: 'Transfer from L1: Use of present tense for past events.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of present tense for future
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: VN 'Ngay mai toi di'
      example_gloss: tomorrow I go
      example_wrong: Tomorrow I go
      example_correct: Tomorrow I will go
      explanation: 'Transfer from L1: Use of present tense for future.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: Last week I go to Hanoi.
      correct: Last week I went to Hanoi.
    - wrong: Tomorrow I visit my grandmother.
      correct: Tomorrow I will visit my grandmother.
    - wrong: Yesterday she cook dinner.
      correct: Yesterday she cooked dinner.
    why_it_happens: Vietnamese verbs do not conjugate for tense. Time is indicated
      by temporal adverbs ('hom qua' = yesterday, 'ngay mai' = tomorrow) or aspect
      markers ('da' = past, 'se' = future). The verb form stays the same. Vietnamese
      learners must learn that English requires morphological verb changes for tense.
    teacher_tips:
      how_to_explain: 'Teach the concept: English verbs CHANGE form for time. Draw
        a timeline: past (went) -> present (go) -> future (will go). Emphasize that
        time words (yesterday, tomorrow) are not enough -- the verb must also change.'
      where_to_start: Teach past simple with regular -ed first. Then irregular past
        forms (go->went, eat->ate). Then future with 'will'.
      sequencing: 'Week 1: Past simple regular (-ed). Week 2: Past simple irregular.
        Week 3: Future with will. Week 4: Present vs past vs future contrast.'
      exercises:
      - name: Tense Transformation
        type: sentence-rewrite
        description: Students rewrite 15 present tense sentences in past and future.
        duration: 15
      - name: VN Time Marker Translation
        type: translation
        description: Translate 15 Vietnamese sentences with time markers into correct
          English tenses.
        duration: 20
      - name: Tense Timeline
        type: matching
        description: 'Students match 20 sentences to the correct time: past, present,
          or future.'
        duration: 10
      - name: Daily Journal
        type: composition
        description: Students write a journal entry about yesterday (past), today
          (present), and tomorrow (future).
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Parrott "Grammar for English Language Teachers"
