    interference_patterns:
    - pattern: Equal syllable stress (tone language transfer)
      example: 'VN is tonal -> Error: equal stress on all syllables -> Correct: English
        has variable stress'
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Equal syllable stress (tone language transfer).'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Monotone intonation in questions
      example: 'VN uses particles for questions -> Error: flat intonation in yes/no
        questions -> Correct: rising intonation at end'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Monotone intonation in questions.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: PHOtograph (equal stress)
      correct: PHOtograph (first syllable stress)
    - wrong: Do you like coffee? (flat)
      correct: Do you like coffee? (rising intonation)
    why_it_happens: Vietnamese is a tonal language (6 tones) where pitch distinguishes
      word meaning. English uses stress and intonation for emphasis and meaning. Vietnamese
      learners may apply tonal patterns to English, resulting in equal syllable stress
      and flat intonation in questions.
    teacher_tips:
      how_to_explain: 'Teach English stress patterns: PHOtograph, phoTOGraphy, photoGRAPHic.
        Use clapping: clap on stressed syllables. For questions: practice rising intonation
        at the end.'
      where_to_start: Teach word stress with common words. Then teach sentence stress.
        Then teach question intonation.
      sequencing: 'Week 1: Word stress patterns. Week 2: Sentence stress. Week 3:
        Question intonation. Week 4: Contrastive stress.'
      exercises:
      - name: Stress Clapping
        type: oral-drill
        description: Students clap on stressed syllables of 20 multisyllable words.
        duration: 10
      - name: Question Intonation
        type: oral-drill
        description: Students practice 10 yes/no questions with rising intonation.
        duration: 10
      - name: Stress Shift
        type: matching
        description: Students identify stress shifts in related words.
        duration: 10
      - name: Dialogue Practice
        type: oral-drill
        description: Students read dialogues with correct stress and intonation.
        duration: 15
