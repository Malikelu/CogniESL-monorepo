  negation:
    interference_patterns:
    - pattern: Use of khong after the verb
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: VN 'Toi biet khong'
      example_gloss: I know not
      example_wrong: I know not
      example_correct: I do not know
      explanation: 'Transfer from L1: Use of khong after the verb.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of chua (not yet) as sentence-final negation
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: VN 'Toi di chua'
      example_gloss: I go not-yet
      example_wrong: I go not yet
      example_correct: I have not gone yet
      explanation: 'Transfer from L1: Use of chua (not yet) as sentence-final negation.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I know not the answer.
      correct: I do not know the answer.
    - wrong: She likes not coffee.
      correct: She does not like coffee.
    - wrong: He goes not to school.
      correct: He does not go to school.
    why_it_happens: 'Vietnamese negation uses ''khong'' (not) placed before the verb:
      ''Toi khong biet'' (I not know). While this is structurally similar to English,
      Vietnamese does not use do-support. Vietnamese learners may say ''I know not''
      instead of ''I do not know'' because Vietnamese does not require an auxiliary.'
    teacher_tips:
      how_to_explain: 'Teach: For most verbs, use do/does/did + not + base verb. For
        ''be'' and modals (can, will, should), just add ''not'' after. Example: ''I
        like'' -> ''I do not like''. ''I am'' -> ''I am not''. ''I can'' -> ''I cannot''.'
      where_to_start: Teach do/does/did + not first. Then teach 'be' + not and modals
        + not.
      sequencing: 'Week 1: Do/does/did + not. Week 2: Be + not. Week 3: Modals + not.
        Week 4: Other negative words (never, no one, nothing).'
      exercises:
      - name: Negation Transformation
        type: sentence-rewrite
        description: Students rewrite 15 affirmative sentences as negative using correct
          do-support.
        duration: 15
      - name: VN Negation Translation
        type: translation
        description: Translate 15 Vietnamese negation sentences into correct English.
        duration: 15
      - name: Negation Error Correction
        type: error-correction
        description: 10 sentences with negation errors. Students correct.
        duration: 10
      - name: Negative Story
        type: composition
        description: Students write a short story using at least 5 different negative
          forms.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Parrott "Grammar for English Language Teachers"
