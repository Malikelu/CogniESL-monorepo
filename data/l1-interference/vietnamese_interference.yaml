  classifiers:
    interference_patterns:
    - pattern: Direct number + noun without article
      example: 'VN ''mot con cho'' (one classifier dog) -> Error: ''one dog'' (correct)
        but ''I want dog'' -> Correct: ''I want a dog'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I want dog.
      correct: I want a dog.
    - wrong: She has two cat.
      correct: She has two cats.
    why_it_happens: Vietnamese uses classifiers (cai, con, chien, quyen, etc.) between
      numbers and nouns. These classifiers have no English equivalent. Vietnamese
      learners may omit necessary English articles or plurals because the classifier
      system handles quantification in Vietnamese.
    teacher_tips:
      how_to_explain: Explain that English uses articles and plurals where Vietnamese
        uses classifiers. 'Mot con cho' = 'a dog' (not 'one classifier dog'). 'Ba
        con cho' = 'three dogs'.
      where_to_start: Teach the article system first (a/an/the). Then teach plurals.
        Contrast with Vietnamese classifier system.
      sequencing: 'Week 1: Articles (a/an/the). Week 2: Plurals (-s). Week 3: Quantifiers
        (many, much, a lot of). Week 4: Review.'
      exercises:
      - name: VN Classifier to EN Article
        type: translation
        description: Translate 15 Vietnamese classifier sentences into English with
          correct articles and plurals.
        duration: 15
      - name: Article + Plural Practice
        type: fill-in-the-blank
        description: 20 sentences where students add articles and plural markers.
        duration: 10
      - name: Classifier Comparison
        type: matching
        description: Students match Vietnamese classifier phrases with correct English
          equivalents.
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Parrott "Grammar for English Language Teachers"
