  prepositions:
    interference_patterns:
    - pattern: Transfer of Vietnamese preposition o (at/in/on)
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: VN 'o nha'
      example_gloss: at home
      example_wrong: I at home' (missing be)
      example_correct: I am at home
      explanation: 'Transfer from L1: Transfer of Vietnamese preposition o (at/in/on).'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Omission of preposition with time
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: VN 'thu Hai'
      example_gloss: Monday
      example_wrong: I go Monday
      example_correct: I go on Monday
      explanation: 'Transfer from L1: Omission of preposition with time.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I at home.
      correct: I am at home.
    - wrong: She goes to school in Monday.
      correct: She goes to school on Monday.
    - wrong: We meet at the morning.
      correct: We meet in the morning.
    why_it_happens: 'Vietnamese prepositions differ from English. ''o'' covers at/in/on
      for locations. Vietnamese uses fewer prepositions and relies more on context.
      Time expressions often do not require prepositions: ''thu Hai'' (Monday) vs
      English ''on Monday''. Vietnamese learners omit or misuse prepositions.'
    teacher_tips:
      how_to_explain: 'Teach the at/in/on hierarchy: at = specific point (at home,
        at school), in = enclosed space (in the box, in the room), on = surface (on
        the table, on Monday). For time: at (clock), on (day), in (month/year).'
      where_to_start: Teach at/in/on for place first. Then teach time prepositions.
      sequencing: 'Week 1: At/in/on for place. Week 2: At/in/on for time. Week 3:
        Other prepositions (to, from, with, by). Week 4: Preposition review.'
      exercises:
      - name: Preposition Choice
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct preposition.
        duration: 10
      - name: VN Preposition Translation
        type: translation
        description: Translate 15 Vietnamese sentences with correct English prepositions.
        duration: 15
      - name: Preposition Error Hunt
        type: error-correction
        description: A paragraph with 10 preposition errors. Students find and fix.
        duration: 15
      - name: Map Description
        type: oral-drill
        description: Students describe locations on a map using correct prepositions.
        duration: 10
