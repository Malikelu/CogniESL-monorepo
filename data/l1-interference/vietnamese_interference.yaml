  subject_verb_agreement:
    interference_patterns:
    - pattern: Omission of third-person -s
      example: 'VN ''Co ay di hoc'' (she go study) -> Error: ''She go to school''
        -> Correct: ''She goes to school'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: No agreement with be
      example: 'VN ''Chung toi la sinh vien'' (we are student) -> Error: ''We is students''
        -> Correct: ''We are students'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: She go to school every day.
      correct: She goes to school every day.
    - wrong: He like coffee.
      correct: He likes coffee.
    - wrong: They is happy.
      correct: They are happy.
    why_it_happens: 'Vietnamese verbs do not agree with subjects. The same verb form
      is used regardless of person or number: ''toi di'' (I go), ''anh ay di'' (he
      go), ''ho di'' (they go). English requires -s for third-person singular and
      different forms of ''be'' (am/is/are). This is one of the most persistent errors
      for Vietnamese speakers.'
    teacher_tips:
      how_to_explain: 'Teach the ''he/she/it rule'': add -s to the verb. Drill: I
        go, you go, he goes, she goes, it goes, we go, they go. For ''be'': I am,
        you are, he/she/it is, we are, they are.'
      where_to_start: Teach third-person -s with present simple. Then teach 'be' conjugation
        (am/is/are).
      sequencing: 'Week 1: Third-person -s. Week 2: Be conjugation. Week 3: Have/has.
        Week 4: Does/doesn''t in questions/negatives.'
      exercises:
      - name: Agreement Drill
        type: oral-drill
        description: 'Students describe a classmate using third-person -s: Linh wakes
          up at 6. She brushes her teeth. She eats breakfast.'
        duration: 10
      - name: Subject-Verb Match
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct verb form.
        duration: 10
      - name: Error Correction
        type: error-correction
        description: 15 sentences with agreement errors. Students correct.
        duration: 10
      - name: Daily Routine Writing
        type: composition
        description: Students write about another person daily routine using third-person
          -s throughout.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Vietnamese)
    - Parrott "Grammar for English Language Teachers"
