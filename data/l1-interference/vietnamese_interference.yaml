  adverbs:
    interference_patterns:
    - pattern: Use of adjective instead of adverb
      example: 'VN ''nhanh'' = fast/fast(ly) -> Error: ''He speaks very clear'' ->
        Correct: ''He speaks very clearly'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: He runs very fastly.
      correct: He runs very fast. / He runs very quickly.
    - wrong: She speaks English good.
      correct: She speaks English well.
    - wrong: They arrived lately.
      correct: They arrived late.
    why_it_happens: Vietnamese does not distinguish morphologically between adjectives
      and adverbs. 'Nhanh' can be both 'fast' (adjective) and 'fast/quickly' (adverb).
      English requires -ly for most adverbs. Vietnamese learners use adjectives where
      English requires adverbs.
    teacher_tips:
      how_to_explain: 'Teach: Adjective describes a noun (a fast car). Adverb describes
        a verb (he runs fast/quickly). Most adverbs add -ly: quick -> quickly, clear
        -> clearly. Exceptions: fast, hard, late (same form for both). Good -> well
        (irregular).'
      where_to_start: Teach the -ly rule first. Then teach the exceptions. Then teach
        good/well.
      sequencing: 'Week 1: Adjective vs adverb. Week 2: Adding -ly. Week 3: Exceptions
        (fast, hard, late). Week 4: Good vs well.'
      exercises:
      - name: Adjective or Adverb?
        type: fill-in-the-blank
        description: 15 sentences where students choose between adjective and adverb
          form.
        duration: 10
      - name: Adverb Formation
        type: sentence-rewrite
        description: Students rewrite 10 sentences, changing adjectives to adverbs
          where needed.
        duration: 10
      - name: VN Adverb Translation
        type: translation
        description: Translate 15 Vietnamese sentences, choosing correct English adverb
          form.
        duration: 10
      - name: Adverb Error Hunt
        type: error-correction
        description: A paragraph with 10 adverb errors. Students find and fix.
        duration: 15
