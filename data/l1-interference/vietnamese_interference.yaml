      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Pluralization of uncountable nouns.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of many with uncountable nouns
      example: 'VN ''nhieu'' = many/much -> Error: ''many information'' -> Correct:
        ''much information'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Use of many with uncountable nouns.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I have many homeworks.
      correct: I have a lot of homework.
    - wrong: She gave me good advices.
      correct: She gave me good advice.
    - wrong: We need more furnitures.
      correct: We need more furniture.
    why_it_happens: Vietnamese does not distinguish grammatically between countable
      and uncountable nouns. The quantifier 'nhieu' (many/much) is used for both.
      Vietnamese learners pluralize uncountable nouns and use much and many interchangeably.
    teacher_tips:
      how_to_explain: 'Create a list of common uncountable nouns: information, advice,
        furniture, luggage, homework, research, news, equipment. Teach: ''a piece
        of...'', ''some...'', ''much...'' for uncountables. ''Many...'' only for countables.'
      where_to_start: Teach the countable/uncountable distinction with concrete examples.
        Use 'a piece of' as the test.
      sequencing: 'Week 1: Common uncountable nouns. Week 2: Much/many vs a lot of.
        Week 3: Partitives (a piece of, a cup of). Week 4: Quantifier review.'
      exercises:
      - name: Countable or Not?
        type: matching
        description: Students categorize 30 nouns as countable or uncountable.
        duration: 10
      - name: Quantifier Choice
