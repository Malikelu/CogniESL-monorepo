    examples:
    - wrong: My car stole yesterday.
      correct: My car was stolen yesterday.
    - wrong: This book wrote by a famous author.
      correct: This book was written by a famous author.
    - wrong: Someone broke the window.
      correct: The window was broken.
    why_it_happens: Vietnamese has a passive construction with 'bi' (for adversative/negative
      events) and 'duoc' (for positive events), but it is used much less frequently
      than English passive. Vietnamese prefers active constructions. Learners avoid
      passive or use it incorrectly.
    teacher_tips:
      how_to_explain: 'Teach the passive formula: be + past participle. Show when
        to use it: when the action is more important than the agent, when the agent
        is unknown, or in formal writing.'
      where_to_start: Teach the passive formula with simple present and past. Then
        teach when to use passive vs active.
      sequencing: 'Week 1: Passive formula (be + past participle). Week 2: Present
        and past passive. Week 3: When to use passive. Week 4: Passive in formal writing.'
      exercises:
      - name: Active to Passive
        type: sentence-rewrite
        description: Students convert 15 active sentences to passive voice.
        duration: 15
      - name: Passive to Active
        type: sentence-rewrite
        description: Students convert 10 passive sentences to active, adding an agent.
        duration: 10
