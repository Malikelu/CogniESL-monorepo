  aspect_markers:
    interference_patterns:
    - pattern: Use of da (past) as a separate word
      example: 'VN ''Toi da di'' (I past go) -> Error: ''I already go'' -> Correct:
        ''I went'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Use of dang (progressive) as a separate word
      example: 'VN ''Toi dang an'' (I progressive eat) -> Error: ''I am eat'' -> Correct:
        ''I am eating'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I already go to school.
      correct: I went to school.
    - wrong: I am eat lunch.
      correct: I am eating lunch.
    - wrong: She is study English.
      correct: She is studying English.
    why_it_happens: Vietnamese uses aspect markers 'da' (past/perfective), 'dang'
      (progressive), 'se' (future) as separate words before the verb. English expresses
      these through verb conjugation (-ed, -ing) and auxiliaries (will). Vietnamese
      learners may use the markers without changing the verb form.
    teacher_tips:
      how_to_explain: 'Teach: English verbs CHANGE form for tense and aspect. ''An''
        (eat) -> ''ate'' (past), ''eating'' (progressive), ''will eat'' (future).
        The Vietnamese markers ''da'', ''dang'', ''se'' correspond to English verb
        changes, not separate words.'
      where_to_start: Teach past simple (-ed) first. Then present progressive (be
        + -ing). Then future (will).
      sequencing: 'Week 1: Past simple. Week 2: Present progressive. Week 3: Future.
        Week 4: Aspect review.'
      exercises:
      - name: Aspect Translation
        type: translation
        description: Students translate 15 Vietnamese aspect-marked sentences into
          correct English verb forms.
        duration: 15
      - name: Verb Form Practice
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct verb form.
        duration: 10
      - name: VN Aspect Marker Translation
        type: translation
        description: Translate Vietnamese da, dang, se sentences into English.
        duration: 15
      - name: Tense Timeline
        type: composition
        description: Students write about yesterday, today, and future using correct
          verb forms.
        duration: 15
