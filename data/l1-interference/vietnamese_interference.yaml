  relative_clauses:
    interference_patterns:
    - pattern: Omission of relative pronoun
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: VN 'nguoi den hom qua'
      example_gloss: person came yesterday
      example_wrong: The person came yesterday is my friend
      example_correct: The person who came yesterday is my friend
      explanation: 'Transfer from L1: Omission of relative pronoun.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: The person came yesterday is my friend.
      correct: The person who came yesterday is my friend.
    - wrong: The book I read was interesting.
      correct: The book that I read was interesting.
    - wrong: The man lives next door is a doctor.
      correct: The man who lives next door is a doctor.
    why_it_happens: Vietnamese uses 'ma' as a relative pronoun, but it is often omitted
      in casual speech. Vietnamese relative clauses precede the noun (prenominal),
      while English relative clauses follow the noun (postnominal). Vietnamese learners
      may omit relative pronouns or place clauses before nouns.
    teacher_tips:
      how_to_explain: 'Teach: English relative clauses come AFTER the noun. Use ''who''
        for people, ''which'' for things, ''that'' for both. ''The person WHO came''
        (not ''The person came''). Drill: noun + who/which/that + clause.'
      where_to_start: Teach 'who' for people first. Then 'which' for things. Then
        'that' for both.
      sequencing: 'Week 1: Who for people. Week 2: Which for things. Week 3: That
        for both. Week 4: Omitting relative pronouns (when object).'
      exercises:
      - name: Relative Clause Formation
        type: sentence-rewrite
        description: Students combine 10 pairs of sentences using relative pronouns.
        duration: 15
