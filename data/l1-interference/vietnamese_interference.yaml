  conditionals:
    interference_patterns:
    - pattern: Use of present tense in if-clauses
      example: 'VN ''Neu toi co tien'' (if I have money) -> Error: ''If I will have
        money, I will buy'' -> Correct: ''If I have money, I will buy'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: If I will see him, I will tell him.
      correct: If I see him, I will tell him.
    - wrong: If she will come, we will celebrate.
      correct: If she comes, we will celebrate.
    - wrong: If it will rain, we will stay home.
      correct: If it rains, we will stay home.
    why_it_happens: Vietnamese uses 'neu' (if) with the same verb form as main clauses.
      Vietnamese 'se' (will) can appear in both the if-clause and main clause. English
      NEVER uses 'will' in the if-clause of a first conditional. This is a systematic
      transfer error.
    teacher_tips:
      how_to_explain: 'Teach the ''NO WILL IN IF-CLAUSE'' rule. First conditional:
        If + present, will + base. Second conditional: If + past, would + base. Write
        the formula on the board and drill it.'
      where_to_start: Teach first conditional (real/possible). Then teach second conditional
        (unreal/hypothetical).
      sequencing: 'Week 1: First conditional (If + present, will). Week 2: Second
        conditional (If + past, would). Week 3: Zero conditional (If + present, present).
        Week 4: Mixed conditionals.'
      exercises:
      - name: If-Clause Fix
        type: error-correction
        description: 15 sentences with will in the if-clause. Students correct.
        duration: 10
      - name: Conditional Chain
        type: sentence-rewrite
        description: Students transform 10 zero conditionals into first and second
          conditionals.
        duration: 10
      - name: VN Conditional Translation
        type: translation
        description: Translate 15 Vietnamese conditional sentences into correct English.
        duration: 15
      - name: Hypothetical Discussion
        type: oral-drill
        description: Students discuss hypothetical situations using second conditional.
        duration: 15
