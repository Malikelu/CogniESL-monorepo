      example_l1: VN 'sach tieng Anh'
      example_gloss: book English
      example_wrong: book English
      example_correct: English book
      explanation: 'Transfer from L1: Modifier after head noun.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I have a house big.
      correct: I have a big house.
    - wrong: She reads book English.
      correct: She reads English books.
    - wrong: He drives car red.
      correct: He drives a red car.
    why_it_happens: 'Vietnamese is a head-initial language where modifiers follow
      the head noun: ''nha to'' (house big), ''sach tieng Anh'' (book English). English
      places adjectives before the noun. Vietnamese learners transfer the Vietnamese
      word order, placing adjectives after nouns.'
    teacher_tips:
      how_to_explain: 'Teach: English order = adjective + noun. Vietnamese order =
        noun + adjective. Drill: ''big house'' (not ''house big''), ''red car'' (not
        ''car red''), ''English book'' (not ''book English'').'
      where_to_start: Teach single adjective before noun. Then teach multiple adjectives
        (opinion-size-age-shape-color-origin-material-purpose).
      sequencing: 'Week 1: Single adjective before noun. Week 2: Multiple adjectives.
        Week 3: Adjective vs adverb. Week 4: Review.'
      exercises:
      - name: Adjective Swap
        type: sentence-rewrite
        description: Students rewrite 10 Vietnamese-influenced phrases with adjectives
          before nouns.
        duration: 10
      - name: VN Word Order Translation
        type: translation
        description: Translate 15 Vietnamese noun phrases into correct English word
          order.
        duration: 15
      - name: Picture Description
        type: oral-drill
        description: Students describe pictures using correct adjective-noun order.
        duration: 10
      - name: Adjective Order
        type: sentence-rewrite
        description: Students arrange 10 sets of adjectives in correct English order
          before the noun.
        duration: 10
