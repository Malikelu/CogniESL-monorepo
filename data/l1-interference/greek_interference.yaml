        -> subject omission in English.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Greek has relatively free word order (SVO/VSO/VOS) -> adverb placement
        errors
      example: 'Greek: "Xthes piga sto super" (Yesterday I-went to-the supermarket)
        or "Piga xthes sto super" (I-went yesterday to-the supermarket) - both correct
        in Greek. Greek learners may overuse fronted adverbs: "Yesterday went I to
