  tonos_accent:
    interference_patterns:
    - pattern: Greek is a pitch-accent language with stress on one of last three syllables
        -> English stress placement errors
      example: 'Greek: "To aeroplano" (stress on penultimate syllable pla). Greek
        learners may stress English words following Greek patterns: "aDDRESS" (noun)
        instead of "adDRESS" (verb) because Greek stress rules do not match English
        noun/verb stress alternations.'
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Greek stress is phonemic -> stress-based meaning errors in English
      example: 'Greek: "pote" (when) vs. "pote" (ever/never) - stress and accent mark
        distinguish meaning. Greek learners may not perceive English stress contrasts:
        "REcord" (noun) vs. "reCORD" (verb).'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Greek orthographic accent marks stress in writing -> difficulty predicting
        English stress
      example: 'Greek: Every stressed syllable is marked with an accent. English has
        no such marking. Greek learners struggle to predict stress: "DEvelop" (wrong)
        vs. "deVElop" (correct), "eCOnomy" vs. "eCONomy"'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Greek has no vowel reduction in unstressed syllables -> full vowel
        pronunciation in English unstressed syllables
      example: 'Greek: "kafes" (both vowels fully pronounced). Greek learners say
        "PHO-to-GRAPH" with full vowels instead of "PHO-to-graf" with schwa in unstressed
        syllables.'
      frequency: 4
      persistence: 5
      communicative_impact: 2
    examples:
    - wrong: I live in the California hoTEL.
      correct: I live in the California hotel.
    - wrong: I want to PREsent you with a preSENT.
      correct: I want to preSENT you with a PREsent.
      explanation: Greek uses stress to distinguish meaning, so Greek learners are
        attuned to stress contrasts. English stress patterns for noun/verb pairs must
        be learned individually.
    - wrong: The eCOnomy is growing.
      correct: The eCONomy is growing.
      explanation: Greek stress rules do not transfer to English. Greek learners must
        learn English stress patterns word by word.
    - wrong: PHO-to-GRAPH (all syllables fully stressed, no schwa)
      correct: PHO-to-graf (first syllable stressed, others reduced)
      explanation: Greek does not reduce vowels in unstressed syllables. English reduces
        unstressed vowels to schwa (uh), which Greek learners must acquire as a new
        phonological process.
    why_it_happens: 'Modern Greek is a pitch-accent language with predictable stress
      placement (one of the last three syllables, marked orthographically with the
      tonos accent). Every stressed syllable is explicitly marked in Greek writing,
      making stress a salient and transparent feature. English, by contrast, has free
      stress that is not marked orthographically and must be learned word by word.
      Greek learners face three specific challenges: (1) predicting English stress
      placement, which follows different rules; (2) perceiving and producing English
      stress contrasts for noun/verb pairs (REcord vs. reCORD), which have no parallel
      in Greek; and (3) acquiring vowel reduction (schwa) in unstressed syllables,
      a phonological process that does not exist in Greek. Greek speakers tend to
      give full vowel quality to all syllables, producing a characteristic "staccato"
      rhythm in English.'
    teacher_tips:
      how_to_explain: 'Teach English stress as a "volume knob": one syllable is turned
        UP (louder, longer, higher pitch), while others are turned DOWN (quieter,
        shorter, reduced to schwa). Use hand gestures: raise your hand for the stressed
        syllable, lower it for unstressed. For noun/verb pairs, teach the rule of
        thumb: "nouns stress FIRST, verbs stress SECOND" (REcord vs. reCORD, PREsent
        vs. preSENT). For vowel reduction, demonstrate schwa as the "lazy vowel" -
        the mouth relaxes in unstressed syllables.'
      where_to_start: Begin with noun/verb stress pairs as they are the most visible
        and have a teachable rule. Then move to word stress prediction using common
        patterns. Vowel reduction (schwa) comes later as it requires phonological
        awareness that develops over time.
      sequencing: 'Week 1: Noun/verb stress pairs (REcord/reCORD, PREsent/preSENT).
        Week 2: Word stress patterns for common suffixes (-tion, -ic, -ity, -graphy).
        Week 3: Sentence stress and rhythm - content words vs. function words. Week
        4: Vowel reduction and schwa. Week 5: Stress in connected speech and linking.
        Week 6: Listening discrimination and production practice.'
      exercises:
      - name: Stress Spotter
        type: oral-drill
        description: 'Teacher says 20 words, students identify the stressed syllable
          by clapping on it. Include noun/verb pairs: "REcord" (clap on first syllable
          = noun) vs. "reCORD" (clap on second syllable = verb). Students then use
          each word in a sentence to show the meaning difference.'
        duration: 15
      - name: Schwa Safari
        type: oral-drill
        description: 'Give students a list of 20 multisyllable words. Students must
          identify which syllables contain schwa and mark them. Practice saying the
          words with correct vowel reduction. Example: "banana" -> buh-NA-nuh (schwa
          in 1st and 3rd syllables).'
        duration: 20
      - name: Stress Pattern Sorting
        type: matching
        description: 'Provide 30 word cards. Students sort them into stress pattern
          groups: first-syllable stress (TAble, STUdent), second-syllable stress (hoTEL,
          deCIDE), third-syllable stress (eCONomy, geOGraphy). Discuss patterns: words
          ending in -tion stress the preceding syllable.'
        duration: 15
      - name: Minimal Pair Stress Drill
        type: oral-drill
        description: 'Practice 10 noun/verb minimal pairs with stress contrast: REcord/reCORD,
          PREsent/preSENT, CONduct/conDUCT, PROject/proJECT, CONFLICT/conFLICT, PERmit/perMIT,
          OBject/proDUCE. Students say both forms and use each in a sentence.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press. Greek section on pronunciation
      and stress.'
    - Botinis, A. (2000). Intonation and prosodic structure in Greek. In A. Botinis
      (Ed.), Analysis, Perception and Processing of Spelling Forms, pp. 281-298. Elsevier.
    - Dauer, R.M. (1983). Stress-timing and syllable-timing reanalyzed. Journal of
      Phonetics, 11(1), 51-62.
    - Flege, J.E. (1987). The production of "new" and "similar" phones in a foreign
      language. Journal of Phonetics, 15(1), 47-65.
