  definite_article_greek:
    interference_patterns:
    - pattern: Greek uses definite article with proper nouns -> overuse of "the" with
        names
      example: 'Greek: "O Giorgos ine edo" (The George is here, definite article required
        before proper nouns) -> erroneous English: "The George is here" or "The Maria
        called you"'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Greek uses definite article with abstract nouns and generics -> overuse
        in English generic statements
      example: 'Greek: "I agapi ine oreia" (The love is beautiful, definite article
        with abstract nouns) -> erroneous English: "The love is beautiful" instead
        of "Love is beautiful"'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Greek uses definite article with possessive contexts -> double determination
        errors
      example: 'Greek: "To spiti mou" (The house my, article + noun + possessive)
        -> Greek learners may say "the my house" instead of "my house"'
      frequency: 3
      persistence: 4
      communicative_impact: 2
    - pattern: Greek lacks indefinite article before professions -> article omission
      example: 'Greek: "Ime daskalos" (I-am teacher, no article before professions)
        -> erroneous English: "I am teacher" instead of "I am a teacher"'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: The Maria is my best friend.
      correct: Maria is my best friend.
      explanation: Greek requires the definite article before proper nouns (I Maria).
        English does not use articles with most proper nouns.
    - wrong: I am teacher.
      correct: I am a teacher.
      explanation: Greek does not use an indefinite article before predicate nouns
        denoting profession (Ime daskalos). English requires "a/an" before singular
        countable nouns in this position.
    - wrong: The patience is a virtue.
      correct: Patience is a virtue.
      explanation: Greek uses the definite article with abstract nouns (I ipomoni).
        English uses zero article for abstract nouns in generic statements.
    - wrong: I bought the my car last year.
      correct: I bought my car last year.
      explanation: Greek uses both the definite article and a possessive pronoun together
        (to aftokinito mou = "the car my"). English uses either a possessive OR an
        article, never both.
    why_it_happens: 'The Greek article system is significantly more expansive than
      English. Greek uses the definite article (o, i, to) in contexts where English
      uses zero article: before proper nouns (o Giorgos = "the George"), with abstract
      nouns (i agapi = "the love"), in generic statements (i gates = "the cats" meaning
      cats in general), and alongside possessive pronouns (to spiti mou = "the house
      my"). Conversely, Greek does not use an indefinite article before predicate
      nouns denoting profession or nationality, where English requires one. The Greek
      indefinite article exists but is used less frequently than English "a/an." This
      asymmetry creates a systematic pattern of overuse of "the" and underuse of "a/an"
      by Greek learners.'
    teacher_tips:
      how_to_explain: 'Create an "Article Map" on the board with two columns: Greek
        article use vs. English article use. Show the four main areas of divergence:
        (1) proper nouns: Greek THE + name, English zero article; (2) abstract/generic
        nouns: Greek THE + abstract, English zero article; (3) professions: Greek
        zero article, English A/AN; (4) possessives: Greek THE + noun + possessive,
        English possessive only. Use color-coding: green for "use article," red for
        "no article."'
      where_to_start: 'Begin with the most visible error: "the" with proper nouns.
        This is easy to spot and correct, building student confidence. Then move to
        the profession error ("I am a teacher"), which is high-frequency. Abstract/generic
        nouns and double determination come later.'
      sequencing: 'Week 1: Definite article with proper nouns (the Maria -> Maria).
        Week 2: Indefinite article with professions and roles (I am teacher -> I am
        a teacher). Week 3: Abstract/generic nouns and zero article (the love -> love).
        Week 4: Double determination (the my book -> my book). Week 5: Articles with
        geographical names, institutions, and other special cases. Week 6: Comprehensive
        article review.'
      exercises:
      - name: 'Article Audit: Greek Learner Email'
        type: error-correction
        description: Provide a 200-word email written by a fictional Greek learner,
          containing 18 article errors across all four patterns (the + name, missing
          a/an, the + abstract, the + possessive). Students work individually to find
          and correct each error, then compare answers in pairs.
        duration: 25
      - name: Article Decision Tree
        type: fill-in-the-blank
        description: 'Give students a flowchart for article use: "Is it a proper noun?
          -> NO article. Is it an abstract noun used generally? -> NO article. Is
          it a singular countable noun for the first time? -> A/AN. Is it specific
          and known? -> THE." Students apply the tree to 25 gapped sentences.'
        duration: 20
      - name: Greek vs. English Article Comparison
        type: translation
        description: 'Provide 15 Greek sentences (transliterated) that showcase article
          differences. Students translate each into natural English, paying special
          attention to article use. Example: "O anthropos ine kakos" -> "Man is bad"
          (not "The man is bad" - generic reference).'
        duration: 20
      - name: Possessive Purge
        type: transformation
        description: Give students 15 sentences with double determination errors (e.g.,
          "the my friend," "the her idea," "the their problem"). Students must rewrite
          each sentence correctly and identify the Greek structure that causes this
          error.
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press. Greek section on article
      transfer.'
    - Agathopoulou, E. (2005). The acquisition of the English article system by Greek
      learners of English. Journal of Greek Linguistics, 6(1), 45-62.
    - 'Ionin, T., Ko, H., & Wexler, K. (2004). Article semantics in L2 acquisition:
      The role of specificity. Language Acquisition, 12(1), 3-69.'
    - 'Hawkins, J.A. (1981). Definiteness and Indefiniteness: A Study in Reference
      and Grammaticality Prediction. Croom Helm.'
    source_count: 4
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 2
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity - Greek. Article system
      transfer is high-frequency but moderate communicative impact since meaning is
      usually preserved.
    notes: 'Greek article system is more expansive than English. Key areas: proper
      nouns (Greek requires THE), abstract/generic nouns (Greek uses THE), professions
      (Greek uses zero article), and double determination (Greek THE + possessive).'
    source_rank: 1
    citations:
    - claim: Interference pattern for definite article greek
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Greek speakers, pp. 127-142'
      tier: 1
    - claim: 'Grammar point: definite article greek'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
