  greek_prepositions:
    interference_patterns:
    - pattern: Greek "se" (in/at/to) maps to multiple English prepositions -> overuse
        of "in" or "to"
      example: 'Greek: "Pao sto spiti" (I-go to-the house) uses se+accusative for
        direction. But Greek: "Ime sto spiti" (I-am at-the house) uses the same se
        for location. Greek learners say "I am in home" or "I go in the house" instead
        of "I am at home" or "I go to the house"'
      frequency: 5
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek "se" (in/at/to) maps to multiple English
        prepositions -> overuse of "in" or "to".'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Greek prepositions govern different cases than English -> wrong preposition
        after verbs/adjectives
      example: 'Greek: "Noiazome gia sena" (I-care about-you) uses gia (for/about).
        Greek learners may say "I think to you" instead of "I think of you" because
        Greek "Skefthome gia" uses gia with "think."'
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek prepositions govern different cases than
        English -> wrong preposition after verbs/adjectives.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Greek "me" (with) for instrumental/accusative -> "with" vs. "by" confusion
      example: 'Greek: "Egrapsa me to stylo" (I-wrote with the pen, me = with/instrument).
        But Greek also uses me for accompaniment: "Pao me ti Maria" (I go with Maria).
        Learners may confuse instrumental and comitative uses in English.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek "me" (with) for instrumental/accusative
        -> "with" vs. "by" confusion.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Greek prepositional phrases where English uses phrasal verbs -> missing
        particle
      example: 'Greek: "Vgazo exo" (I-take out) -> "I take it out" - Greek learners
        may drop the particle: "I take it" because Greek expresses this as a single
        verb+preposition unit.'
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek prepositional phrases where English uses
        phrasal verbs -> missing particle.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I am in home right now.
      correct: I am at home right now.
      explanation: Greek "Ime sto spiti" uses se (in/at/to) for both location and
        direction. English distinguishes "at" (location) from "to" (direction) and
        "in" (enclosure).
    - wrong: I go at Paris next week.
      correct: I go to Paris next week.
      explanation: Greek "Pao sto Parisi" uses se + accusative for direction of travel.
        English uses "to" for destinations, not "at."
    - wrong: I think to you often.
      correct: I think of you often.
      explanation: Greek "Skefthome gia sena" uses gia (for/about) with the verb "to
        think." English uses "think of" or "think about," not "think to."
    - wrong: She is married with a doctor.
      correct: She is married to a doctor.
      explanation: Greek "Inai pandremeni me giatro" uses me (with) for marriage.
        English uses "married to," not "married with."
    why_it_happens: 'Greek prepositions are a major source of transfer errors because
      the Greek prepositional system maps onto English in inconsistent and often unpredictable
      ways. The Greek preposition "se" is particularly problematic: it corresponds
      to English "in," "at," "to," and "on" depending on context (location vs. direction,
      case government). Greek "se" + accusative marks direction ("I go to"), while
      "se" + (implied locative context) marks location ("I am at/in"). English uses
      three different prepositions for these meanings. Additionally, Greek verbs and
      adjectives govern different prepositions than their English cognates: Greek
      "noiazome gia" (I care about, literally "I-care for") vs. English "care about";
      Greek "perimeno" (I wait, no preposition) vs. English "wait for."'
    teacher_tips:
      how_to_explain: 'Teach prepositions in semantic groups (time, place, direction)
        and highlight the Greek-English mismatches explicitly. Create a "False Friends"
        chart for prepositions: Greek se is not always "in"; Greek me is not always
        "with"; Greek gia is not always "for." Use visual aids: draw arrows for direction
        (to), dots for location (at), and containers for enclosure (in). For verb+preposition
        collocations, teach them as chunks: "wait FOR," "think OF/ABOUT," "married
        TO," "look AT/UP/FOR."'
      where_to_start: 'Begin with the most frequent and highest-impact errors: the
        se -> in/at/to distinction. Use physical movement in the classroom: walk TO
        the door (direction), stand AT the door (location), go IN the room (enclosure).
        Then move to verb+preposition collocations.'
      sequencing: 'Week 1: Prepositions of place - at/in/on and the Greek se problem.
        Week 2: Prepositions of direction/motion - to/from/into/onto. Week 3: Verb
        + preposition collocations (wait for, think of, look at). Week 4: Adjective
        + preposition collocations (married to, interested in, afraid of). Week 5:
        Prepositions of time (in/on/at for time expressions). Week 6: Phrasal verbs
        and prepositional phrases vs. single-word verbs.'
      exercises:
      - name: Preposition Mismatch Map
        type: matching
        description: 'Create a two-column matching activity: Column A has Greek prepositional
          phrases (transliterated), Column B has correct English translations. Students
          draw lines connecting each Greek phrase to its English equivalent, noting
          where one Greek preposition maps to multiple English prepositions.'
        duration: 20
      - name: Verb + Preposition Chunking
        type: fill-in-the-blank
        description: 'Provide 25 sentences with the verb given but the preposition
          missing. Students must fill in the correct preposition. Include Greek-English
          mismatch items: "She is married ___ a doctor" (to, not with), "I''m waiting
          ___ the bus" (for), "Think ___ it carefully" (about/of).'
        duration: 20
      - name: Preposition Role-Play
        type: oral-drill
        description: Students work in pairs. Student A gives directions using a map
          (e.g., "Go to the bank. It's on Main Street. Turn at the traffic light.").
          Student B follows the directions on a simple map. Focus on prepositions
          of place and direction. After the activity, discuss which prepositions were
          hardest and why (referencing Greek se).
        duration: 20
      - name: Greek Preposition Transfer Journal
        type: composition
        description: 'Students keep a "transfer journal" for one week, noting every
          preposition error they catch in their own English production. For each error,
          they write: the error, the correct form, the Greek preposition that caused
          it, and a rule to remember.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press. Greek section on preposition
      transfer.'
    - Agathopoulou, E. (2005). The acquisition of the English article system by Greek
      learners of English. Journal of Greek Linguistics, 6(1), 45-62.
    - Kamberi, S. (2013). The acquisition of English prepositions by Albanian and
      Greek L2 learners. Journal of Educational and Social Research, 3(7), 467-474.
    - Lindstromberg, S. (2010). English Prepositions Explained (Revised ed.). John
      Benjamins.
