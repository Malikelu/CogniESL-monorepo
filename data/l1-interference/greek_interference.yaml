      location: See relevant grammar point section
      tier: 2
  greek_negation:
    interference_patterns:
    - pattern: Greek negation particle "den" attaches directly to verb without auxiliary
        -> do-support omission
      example: 'Greek: "Den troo kreas" (Not I-eat meat) -> literal: "Not I-eat meat"
        -> erroneous English: "I not eat meat" instead of "I do not eat meat"'
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Greek double negation is grammatical -> transfer to English double
        negation
      example: 'Greek: "Den ida kanenan" (Not I-saw nobody, double negation is standard
        in Greek) -> erroneous English: "I did not see nobody" instead of "I did not
        see anybody"'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Greek negation with "pote/pouthen/tipota" (never/nothing/nowhere) requires
        "den" -> negative adverb placement errors
      example: 'Greek: "Pote den pao ekei" (Never not I-go there, reinforced negation)
        -> erroneous English: "I never not go there" or "I go never there"'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Greek "den" + subjunctive for prohibitions -> imperative negation errors
      example: 'Greek: "Min trovs" (Not you-eat, negated subjunctive for prohibition
        using "min" not "den") -> erroneous English: "Not eat that!" instead of "Don''t
        eat that!"'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I not like coffee.
      correct: I do not like coffee.
      explanation: Greek "Den mou aresei o kafes" places the negation particle directly
        before the verb. English requires the auxiliary "do" + "not" + base verb.
    - wrong: He not came to the party.
      correct: He did not come to the party.
      explanation: 'Greek "Den irthe" negates the past tense directly. English requires
        "did not" + base form (not past form). Note: "came" becomes "come" after "did."'
    - wrong: I did not see nobody at the store.
      correct: I did not see anybody at the store.
      explanation: Greek double negation "Den ida kanenan" (not + nobody) is grammatically
        correct. English requires "not + anybody" (single negation).
    - wrong: I never goes there.
      correct: I never go there.
    why_it_happens: 'Greek negation is fundamentally different from English in three
      ways. First, Greek uses a preverbal negation particle "den" that attaches directly
      to the verb without any auxiliary support. English requires the periphrastic
      construction "do/does/did + not + base verb" for simple present and simple past
      negation. Second, Greek is a negative concord language: multiple negative elements
      in a sentence reinforce rather than cancel each other (e.g., "Den ida kanenan"
      = "Not I-saw nobody" is the standard, grammatical form). English is a non-negative-concord
      language where double negation is either ungrammatical or changes meaning. Third,
      Greek has two negation particles: "den" for indicative (statements/questions)
      and "min" for subjunctive/prohibitions, a distinction that has no parallel in
      English.'
    teacher_tips:
      how_to_explain: 'Teach negation in three stages. Stage 1: Introduce "do-support"
        as English''s way of "carrying" negation. Use the metaphor: "In Greek, the
        verb wears its own negation badge (den + verb). In English, the verb needs
        a helper (do) to carry the negation." Write the formula: Subject + do/does/did
        + not + BASE VERB. Stage 2: Teach the double negation rule: "In English, one
        negative per clause is enough." Stage 3: Teach negative adverb placement:
        "never," "hardly," "seldom" go BEFORE the main verb.'
      where_to_start: 'Start with simple present negation ("I do not like") as it
        is the most frequent error. Use contrastive pairs: Greek "Den troo" -> English
        "I do not eat" (NOT "I not eat"). Once students master do-support in present,
        extend to past ("did not") and then address double negation.'
      sequencing: 'Week 1: Simple present negation with do/does. Week 2: Simple past
        negation with did. Week 3: Negative concord - fixing double negation errors.
        Week 4: Negative adverbs (never, hardly, seldom) and their placement. Week
        5: Prohibitions and imperatives (Don''t...). Week 6: Integration, error correction,
        and free production.'
      exercises:
      - name: Do-Support Surgery
        type: transformation
        description: Give students 20 Greek-style negation sentences (e.g., "She not
          like spinach," "They not went home," "He no can swim"). Students must add
          the correct auxiliary, place "not" correctly, and ensure the main verb is
          in base form. Teacher checks for the common error of keeping the past tense
          after "did" (*"did not went").
        duration: 20
      - name: Double Negation Court
        type: error-correction
        description: Set up a mock "court" where students prosecute double negation
          sentences. Provide 15 sentences with double negation (e.g., "I don't have
          no money," "She can't find nothing"). The "prosecutor" explains why the
          sentence is wrong (citing Greek negative concord), the "judge" delivers
          the corrected sentence.
        duration: 20
      - name: Negation Translation Relay
        type: translation
        description: Students work in teams of 4. Each team receives 10 Greek sentences
          (transliterated) with various negation patterns. Student 1 translates literally,
          Student 2 identifies the negation pattern, Student 3 produces correct English,
          and Student 4 checks against a model answer. Rotate roles for each sentence.
        duration: 25
      - name: Negative Adverb Placement Race
        type: fill-in-the-blank
        description: 'Provide 20 sentences with a negative adverb (never, hardly,
          seldom, rarely) that must be placed in the correct position. Students race
          to complete them correctly. Example: "I ___ go to that restaurant" (never)
          -> "I never go to that restaurant."'
        duration: 15
