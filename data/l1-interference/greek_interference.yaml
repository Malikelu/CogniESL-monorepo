  greek_negation:
    interference_patterns:
    - pattern: Greek negation particle "den" attaches directly to verb without auxiliary
        -> do-support omission
      frequency: 5
      persistence: 4
      communicative_impact: 4
      example_l1: 'Greek: ''Den troo kreas'''
      example_gloss: Not I-eat meat
      example_wrong: 'literal: "Not I-eat meat'
      example_correct: 'erroneous English: "I not eat meat" instead of "I do not eat
        meat'
      explanation: 'Transfer from L1: Greek negation particle "den" attaches directly
        to verb without auxiliary -> do-support omission.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Greek double negation is grammatical -> transfer to English double
        negation
      example: 'Greek: "Den ida kanenan" (Not I-saw nobody, double negation is standard
        in Greek) -> erroneous English: "I did not see nobody" instead of "I did not
        see anybody"'
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek double negation is grammatical -> transfer
        to English double negation.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Greek negation with "pote/pouthen/tipota" (never/nothing/nowhere) requires
        "den" -> negative adverb placement errors
      example: 'Greek: "Pote den pao ekei" (Never not I-go there, reinforced negation)
        -> erroneous English: "I never not go there" or "I go never there"'
      frequency: 3
      persistence: 3
      communicative_impact: 3
