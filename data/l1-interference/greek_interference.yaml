language: greek
schema_version: '3.0'
grammar_points:
  greek_verb_system:
    interference_patterns:
    - pattern: Greek aspectual distinction (perfective/imperfective) mapped onto English
        progressive/simple
      example: 'Greek: "Etroga otan irthes" (I was eating when you came) vs Greek
        perfective "Efaga" (I ate). Greek learners overuse progressive: "I am eating
        dinner yesterday" because Greek imperfective aspect maps to English progressive.'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Greek lacks auxiliary "do" in questions/negations
      example: 'Greek: "Ti theleis?" (What you want?) -> literal: "What you want?"
        -> erroneous English: "What you want?" instead of "What do you want?"'
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Greek synthetic verb forms encode person/number -> subject pronoun
        omission
      example: 'Greek: "Pao spiti" (Go home) -> literal: "Go home" (subject "I" encoded
        in verb ending -o) -> erroneous English: "Go home" instead of "I go home"'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Greek deponent/passive morphology for active meanings -> passive voice
        confusion
      example: 'Greek: "Koimamai" (I sleep, middle/passive form used actively) ->
        Greek learners may overuse passive: "The bed is slept by me" or confuse active/passive
        constructions'
      frequency: 2
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: What you want to eat?
      correct: What do you want to eat?
      explanation: Greek "Ti theleis na fas?" has no auxiliary verb. Greek encodes
        the question in word order and verb morphology alone.
    - wrong: I not know the answer.
      correct: I do not know the answer.
      explanation: Greek "Den ksero" places negation particle "den" directly before
        the verb with no auxiliary.
    - wrong: Yesterday I go to the store.
      correct: Yesterday I went to the store.
      explanation: Greek aspectual system leads learners to use simple present where
        English requires past tense.
    - wrong: She can speaks English very well.
      correct: She can speak English very well.
      explanation: Greek modal-like constructions do not inflect the following verb,
        but learners may over-apply 3rd person -s after modals.
    why_it_happens: 'Modern Greek is a highly inflected language with a rich verbal
      system that encodes aspect (perfective vs. imperfective), voice, person, number,
      and tense within a single synthetic verb form. Unlike English, which relies
      on periphrastic constructions (auxiliaries + main verbs) for questions, negations,
      and many tense-aspect combinations, Greek accomplishes these through verb morphology
      and particles. The Greek negation particle "den" attaches directly to the verb
      without requiring do-support. Questions are formed through intonation and word
      order rather than auxiliary inversion. The aspectual system is fundamentally
      different: Greek marks perfective (completed action) vs. imperfective (ongoing/habitual)
      as a primary distinction, whereas English uses progressive/simple aspect more
      flexibly.'
    teacher_tips:
      how_to_explain: 'Start by showing students a side-by-side comparison: write
        a Greek sentence (transliterated) and its literal word-by-word English translation,
        then the correct English version. For example: Greek "Den troo kreas" -> literal
        "Not I-eat meat" -> correct "I do not eat meat." Explicitly teach that English
        requires the "do" helper for questions and negations in simple present and
        simple past. Use color-coding: mark auxiliaries in red so students notice
        them.'
      where_to_start: 'Begin with simple present tense negations and questions, as
        these are the most frequent errors. Use the contrastive pair: "I like coffee"
        -> "I do not like coffee" (NOT "I not like coffee") and "Do you like coffee?"
        (NOT "You like coffee?"). Establish the concept of "helper verbs" (do, does,
        did) as something Greek simply does not have.'
      sequencing: 'Week 1: Simple present negation with do/does. Week 2: Simple present
        questions with do/does. Week 3: Simple past negation and questions with did.
        Week 4: Contrast with Greek aspectual system and when to use progressive vs.
        simple. Week 5: Modal verbs and bare infinitives after modals. Week 6: Integration
        and error correction practice.'
      exercises:
      - name: Do-Support Detective
        type: error-correction
        description: Provide 20 sentences written by a hypothetical Greek learner,
          all missing do-support (e.g., "Where you live?", "She not like tea.", "He
          no want go."). Students must identify the error, explain why it is wrong
          (referencing Greek structure), and write the correct version.
        duration: 20
      - name: Greek-to-English Translation Challenge
        type: translation
        description: Give students 15 Greek sentences (transliterated into Latin script)
          that exploit the do-support gap. Students translate each into correct English.
          Include a mix of statements, questions, and negations across present and
          simple past.
        duration: 25
      - name: Aspect Auction
        type: matching
        description: Write 20 English sentences on cards. Students must decide whether
          each requires simple or progressive aspect, bidding "simple" or "progressive"
          and justifying their choice. Focus on the Greek perfective/imperfective
          transfer error.
        duration: 15
      - name: Modal Verb Strip Story
        type: transformation
        description: 'Give students 10 sentences with modal verbs where the main verb
          is incorrectly inflected (e.g., "She can speaks", "They must goes", "He
          should studies"). Students rewrite each sentence correctly, then write a
          brief explanation of the rule: after modals, use the bare infinitive.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press. Greek section, pp.
      103-116.'
    - 'Agathopoulou, E. & Papadopoulou, D. (2009). The morphosyntactic interface in
      L2 acquisition: Evidence from Greek learners of English. Proceedings of the
      10th GASLA Conference, pp. 14-23.'
    - Hawkins, R. & Chan, C. (1997). The partial availability of Universal Grammar
      in second language acquisition. Second Language Research, 13(3), 187-226.
    - Tsimpli, I.-M. & Roussou, A. (1991). Parameter resetting in L2? UCL Working
      Papers in Linguistics, 3, 149-169.
    source_count: 4
    source_type: peer-reviewed
    frequency: 5
    persistence: 4
    communicative_impact: 4
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity - Greek. Verb system interference
      is the highest-frequency error category for Greek learners of English.
    notes: The absence of do-support in Greek is the single most impactful structural
      difference. Greek synthetic verb morphology means learners must acquire an entirely
      new syntactic mechanism (auxiliary insertion) that has no equivalent in their
      L1.
    source_rank: 1
    citations:
    - claim: Interference pattern for greek verb system
      source: 'Swan & Smith (2001) ''Learner English: A Teacher''s Guide to Interference
        and Other Problems'', 2nd ed., Cambridge University Press'
      location: 'Chapter: Greek speakers, pp. 127-142'
      tier: 1
    - claim: 'Grammar point: greek verb system'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
  case_system_4_greek:
    interference_patterns:
    - pattern: Greek 4-case system -> English pronoun case errors after verbs and
        prepositions
      example: 'Greek: "Ton ida" (Him I-saw, accusative case marked on article) ->
        Greek learners may say "I saw he" because the case distinction is marked on
        the article (o/ton) rather than the pronoun itself.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Greek genitive case for possession -> word order and of/for confusion
      example: 'Greek: "To spiti tou Giorgou" (The house the-of George) -> erroneous
        English: "The house of the George" instead of "George''s house"'
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Greek accusative prepositional government -> wrong preposition after
        prepositions
      example: 'Greek: "Pao sto spiti" (I-go to-the house, preposition se + accusative)
        -> Greek learners may say "I go at home" due to different prepositional government
        rules'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Greek clitic pronouns in accusative -> double object pronoun errors
      example: 'Greek: "Tou to edosa" (To-him it I-gave, two clitic pronouns before
        verb) -> erroneous English: "I gave to him it" or "Him it I gave"'
      frequency: 2
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I help he with the homework.
      correct: I help him with the homework.
      explanation: Greek marks the accusative case on the article/determiner (e.g.,
        ton Giorgo) rather than on the pronoun itself. English requires object pronoun
        forms (him, her, them) after verbs and prepositions.
    - wrong: Give it to she.
      correct: Give it to her.
      explanation: After prepositions, English requires object pronouns. Greek uses
        the accusative case form, but the mapping is not always transparent to learners.
    - wrong: The book of the Maria is on the table.
      correct: Maria's book is on the table.
      explanation: Greek uses the genitive case (tou/tis/ton) to mark possession,
        which learners translate literally as "of the." English prefers the possessive
        's for people.
    - wrong: I spoke to he yesterday.
      correct: I spoke to him yesterday.
      explanation: After prepositions (to, for, with, etc.), English requires object
        pronouns. Greek uses the accusative case, but learners may not map this correctly
        to English pronoun forms.
    why_it_happens: Modern Greek retains a four-case system (nominative, accusative,
      genitive, vocative) that is marked on articles, adjectives, and pronouns through
      inflectional endings. English, by contrast, has largely lost its case system,
      retaining it only in pronouns (I/me, he/him, she/her, we/us, they/them) and
      the possessive 's. The critical difference is that in Greek, case is marked
      on the article (o/ton/tou) and the noun/adjective ending, creating a system
      of agreement that is largely invisible to English speakers. Greek learners often
      fail to map the Greek accusative onto English object pronouns because the Greek
      system distributes case marking across multiple words in the noun phrase. Additionally,
      Greek uses clitic pronouns (me, se, ton, tin, to) that appear before the verb,
      creating a word order that does not correspond to English object placement.
    teacher_tips:
      how_to_explain: 'Create a visual chart showing Greek case endings alongside
        English pronoun equivalents. Highlight that English "remembers" case only
        in pronouns. Use the simple test: "If you can put ''to'' or ''for'' before
        it, use the object form (him/her/them, not he/she/they)." Write on the board:
        SUBJECT PRONOUNS (I, you, he, she, it, we, they) vs. OBJECT PRONOUNS (me,
        you, him, her, it, us, them).'
      where_to_start: 'Begin with the most common errors: object pronouns after verbs
        ("I saw him" not "I saw he") and after prepositions ("to her" not "to she").
        Use simple, high-frequency verbs (see, help, give, tell, call) and prepositions
        (to, for, with, about).'
      sequencing: 'Week 1: Subject vs. object pronouns after verbs. Week 2: Object
        pronouns after prepositions. Week 3: Possessive ''s vs. "of" constructions.
        Week 4: Clitic pronoun transfer and word order. Week 5: Complex sentences
        with multiple objects. Week 6: Error correction and consolidation.'
      exercises:
      - name: Pronoun Case Sort
        type: matching
        description: 'Prepare 30 sentence strips with gaps where a pronoun should
          be (e.g., "The manager called ___ (I/me) yesterday"). Students sort them
          into "subject position" and "object position" piles, then fill in the correct
          pronoun. Include traps with prepositions: "between you and ___ (I/me)."'
        duration: 15
      - name: Possession Translation
        type: translation
        description: 'Give students 15 Greek genitive constructions (transliterated):
          e.g., "to vivlio tis Marias" (the book of-Maria), "to spiti tou aderfou-mou"
          (the house the-of brother-my). Students must produce natural English using
          ''s or of-constructions appropriately.'
        duration: 20
      - name: 'Error Hunt: Greek Learner Diary'
        type: error-correction
        description: Provide a short "diary entry" written by a fictional Greek learner,
          containing 15 case-related errors (wrong pronoun forms, literal genitive
          translations, preposition errors). Students work in pairs to find and correct
          each error, then write a brief explanation of the Greek structure that caused
          each mistake.
        duration: 20
      - name: Preposition + Pronoun Chain Drill
        type: oral-drill
        description: 'Teacher says a preposition, student must immediately produce
          the preposition + correct object pronoun: "to" -> "to him," "for" -> "for
          her," "with" -> "with them." Speed round: 30 seconds, how many correct combinations?'
        duration: 10
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press. Greek section on case
      and pronoun transfer.'
    - Hadjioannou, X. (2004). The English language in Cyprus. Unpublished doctoral
      dissertation, University of Cambridge.
    - Tsimpli, I.-M. (2003). Clitics and determiners in L2 Greek. Proceedings of the
      6th GASLA Conference, pp. 331-339.
    - Philippaki-Warburton, I. (1987). The theory of empty categories and the pro-drop
      parameter in Modern Greek. Journal of Linguistics, 23(2), 289-318.
    source_count: 4
    source_type: peer-reviewed
    frequency: 3
    persistence: 3
    communicative_impact: 2
