      flagged: false
      tier: 3
    - pattern: Greek clitic pronouns precede the verb -> object pronoun placement
        errors
      example: 'Greek: "Ton ida" (Him I-saw, clitic pronoun before verb) -> erroneous
        English: "Him I saw" instead of "I saw him"'
      frequency: 3
      persistence: 3
      communicative_impact: 2
