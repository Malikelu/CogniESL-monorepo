      frequency: 2
      persistence: 2
      communicative_impact: 1
      example_l1: 'Greek: ''To vivlio to ida xthes'''
      example_gloss: The book it I-saw yesterday, topicalized object with resumptive
        clitic
      example_wrong: 'erroneous English: "The book, I saw it yesterday" (marked'
      example_correct: awkward) instead of "I saw the book yesterday
      explanation: 'Transfer from L1: Greek topicalization through fronting -> overuse
