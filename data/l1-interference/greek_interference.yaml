language: greek
schema_version: '3.0'
grammar_points:
  greek_verb_system:
    interference_patterns:
    - Greek uses 3 genders which does not exist in English, causing transfer errors
      related to 'verb system'.
    why_it_happens: Greek handles 'verb system' differently from English. Greek L1
      speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Greek structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Greek and English for 'verb system'.
        Show the Greek structure side-by-side with English. Highlight the specific
        error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Greek handles
        'verb system' differently from English. Use visual aids or color-coding to
        highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Greek sentences, students translate to English, focusing
          on correct 'verb system' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Greek-style 'verb system' errors. Students
          identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'verb
          system' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'verb system'
          errors.
        duration: 15
    examples:
    - 'Wrong: Applying Greek ''verb system'' structure to English. Correct: Use the
      English structure for ''verb system''.'
    - 'Wrong: Direct translation of Greek ''verb system'' pattern. Correct: Follow
      English ''verb system'' conventions.'
    - 'Wrong: Correct: Use English-specific ''verb system'' patterns.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Agathopoulou, E. (2005). Greek learners and English article acquisition. Journal
      of Greek Linguistics, 6(1), 45-62.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Greek
    notes: Greek verb system is complex but different from English. Transfer errors
      common.
