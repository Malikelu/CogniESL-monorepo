        in conditional) -> Greek learners may say "If you would come, I will be happy"
        instead of "If you come, I will be happy"'
      frequency: 3
      persistence: 4
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek subjunctive in conditional clauses ->
        wrong tense in English conditionals.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I want that I go to the party.
      correct: I want to go to the party.
      explanation: Greek "Thelo na pao" uses the subjunctive marker "na" after verbs
        of desire. English uses the infinitive ("to go"), not a that-clause.
    - wrong: It is necessary that you should study more.
      correct: It is necessary for you to study more.
      explanation: Greek "Inai anagkaios na diavazeis perissotero" uses na + subjunctive
        for necessity. English uses "need to" or "for...to" constructions.
    - wrong: I suggest you that you take the earlier flight.
      correct: I suggest that you take the earlier flight.
      explanation: Greek "Protino na paris" uses na + subjunctive after "suggest."
        English uses "suggest that + base form" or "suggest + gerund."
    - wrong: If you would have told me, I would have helped.
      correct: If you had told me, I would have helped.
      explanation: Greek conditional structures use the subjunctive for counterfactual
        conditions. English uses the past perfect ("had told") in third conditionals,
        not "would have" in the if-clause.
    why_it_happens: 'Modern Greek has a fully productive subjunctive mood marked by
      the particle "na," which is used after verbs of desire, suggestion, necessity,
      fear, and purpose, as well as in conditional and temporal clauses. This is fundamentally
      different from English, where the subjunctive is vestigial (surviving mainly
      in formal "that" clauses: "I suggest that he take the bus") and most complement
      clauses use infinitives ("I want to go") or gerunds ("I suggest going"). Greek
      learners face a systematic mapping problem: Greek "na + subjunctive" must be
      translated variously as English infinitive ("to go"), gerund ("going"), bare
      subjunctive ("that he go"), or modal ("should go"), depending on the matrix
      verb and context. The most persistent error is using "that + clause" where English
      requires an infinitive: "I want that I go" for "I want to go."'
    teacher_tips:
      how_to_explain: 'Teach the "na mapping rule": Greek "na + verb" does NOT always
        equal English "that + verb." Create a decision chart: (1) After want/would
        like/expect -> use TO + infinitive: "I want to go" (NOT "I want that I go").
        (2) After suggest/insist/recommend -> use THAT + base form or GERUND. (3)
        After must/should/have to -> use bare infinitive (no "to"). (4) For conditionals:
        teach the three types explicitly, emphasizing that "would" NEVER appears in
        the if-clause.'
      where_to_start: 'Begin with the most frequent error: "I want that I go" -> "I
        want to go." This is a clear, high-impact correction. Then move to suggest/insist/recommend
        patterns, followed by conditional structures.'
      sequencing: 'Week 1: "Want/would like/expect + to infinitive" (fixing "I want
        that I go"). Week 2: "Suggest/insist/recommend + that-clause or gerund." Week
        3: "Must/should/have to + bare infinitive" (no "to"). Week 4: Conditional
        structures - 1st, 2nd, 3rd conditionals. Week 5: Purpose clauses ("in order
        to" vs. "na"). Week 6: Integration and complex sentence production.'
      exercises:
      - name: Na-Mapping Chart
        type: matching
        description: 'Create a three-column chart: Column A = Greek verb + na (transliterated),
          Column B = literal English translation, Column C = correct English. Students
          draw lines from A to C, ignoring the misleading literal translation. Include
          15 items covering desire, suggestion, necessity, and conditionals.'
        duration: 20
      - name: Conditional Repair Shop
        type: error-correction
        description: Provide 15 conditional sentences with Greek-influenced errors
          (e.g., "If you would come, I will be happy," "If I would have known, I would
          have come"). Students identify the error type, correct the sentence, and
          label it as 1st, 2nd, or 3rd conditional.
        duration: 20
      - name: Subjunctive Transformation Drill
        type: transformation
        description: Give students 20 Greek-style complement clauses (e.g., "I want
          that I go," "She suggested that we should leave," "It is important that
          he studies"). Students transform each into correct English using the appropriate
          structure (infinitive, gerund, that-clause with base form, or modal).
        duration: 20
      - name: Conditional Chain Story
        type: composition
        description: 'Students write a chain story in pairs: each student adds a conditional
          sentence. Student A: "If I had a million dollars, I would travel the world."
          Student B: "If I traveled the world, I would visit Japan." Focus on correct
          conditional forms.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press. Greek section on subjunctive
      and complementation.'
    - 'Agathopoulou, E. & Papadopoulou, D. (2009). The morphosyntactic interface in
      L2 acquisition: Evidence from Greek learners of English. Proceedings of the
      10th GASLA Conference, pp. 14-23.'
    - Hawkins, R. & Chan, C. (1997). The partial availability of Universal Grammar
      in second language acquisition. Second Language Research, 13(3), 187-226.
    - 'Roussou, A. (2000). On the left periphery: Modal particles and complementisers.
      Journal of Greek Linguistics, 1, 65-94.'
