  article_noun_agreement:
    interference_patterns:
    - pattern: Greek articles agree in gender/case/number with nouns -> over-differentiation
        of English "the"
      example: 'Greek: "o anthropos" (masculine), "i gineka" (feminine), "to pedi"
        (neuter) - article changes with gender. Greek learners may overthink article
        choice based on L1 gender associations, even though English has no grammatical
        gender.'
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Greek uses definite article with abstract/generic nouns -> overuse
        of "the" with English generics
      example: 'Greek: "I eleftheria ine simantiki" (The freedom is important, definite
        article with abstract noun) -> erroneous English: "The freedom is important"
        instead of "Freedom is important"'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Greek article-noun agreement in all cases -> article omission in complex
        noun phrases
      example: 'Greek: "Tu agoriou to palto" (The-of-boy the coat, genitive article
        + noun + nominative article + noun). Greek learners may omit articles: "Boy
        coat is on chair" instead of "The boy''s coat is on the chair"'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Greek uses definite article with proper nouns and institutions -> overuse
        of "the"
      example: 'Greek: "Pao sto scholio" (I-go to-the school, definite article with
        institutions) -> Greek learners may say "I go to the school" (building) when
        English requires "I go to school" (purpose)'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: The love is the most important thing in the life.
      correct: Love is the most important thing in life.
      explanation: Greek uses the definite article with abstract nouns (I agapi) and
        in generic statements. English uses zero article for abstract nouns used generically.
    - wrong: The patience is a virtue.
      correct: Patience is a virtue.
      explanation: Greek "I ipomoni ine areti" uses the definite article with the
        abstract noun. English does not use "the" with abstract nouns in generic statements.
    - wrong: The water is essential for the life.
      correct: Water is essential for life.
      explanation: Greek "To nero ine aparaitito gia ti zoi" uses definite articles
        with both the uncountable noun and the abstract noun. English uses zero article
        for generic statements.
    - wrong: I went to the school to pick up the children.
      correct: I went to school to pick up the children.
      explanation: Greek "Piga sto scholio" uses the definite article with institutions.
        English drops "the" when referring to the primary purpose of a place (go to
        school = as a student).
    why_it_happens: 'The Greek article system requires agreement between the article
      and the noun in gender (masculine/feminine/neuter), number (singular/plural),
      and case (nominative/accusative/genitive). This creates a complex system of
      article forms (o, i, to, tou, tis, ton, tin, ton, tis, ta) that must match the
      noun in all three dimensions. English has a single definite article "the" and
      a single indefinite article "a/an" that do not change form. The complexity of
      the Greek system leads to two types of transfer errors: (1) overuse of "the"
      in contexts where Greek requires it but English does not (abstract nouns, generic
      statements, proper nouns, institutions); and (2) article omission in complex
      noun phrases where the Greek agreement system would require multiple articles.
      The generic use of "the" with abstract nouns is the most frequent and persistent
      error.'
    teacher_tips:
      how_to_explain: 'Teach the "Greek Article Overload" concept: "Greek uses THE
        many more times than English. Your job is to DELETE unnecessary THEs." Create
        a checklist for when to REMOVE "the": (1) Abstract nouns used generally: "Love
        is blind" (not "The love"). (2) Uncountable nouns used generally: "Water is
        essential" (not "The water"). (3) Most proper nouns: "Maria" (not "The Maria").
        (4) Institutions for their primary purpose: "go to school/hospital/church"
        (not "go to the school"). Use a red pen exercise: students cross out unnecessary
        "the" in a Greek learner''s text.'
      where_to_start: 'Begin with abstract nouns and generic statements, as these
        are the highest-frequency errors. Use the simple rule: "If you are talking
        about the concept in general, no THE." Then move to institutions and proper
        nouns.'
      sequencing: 'Week 1: Abstract/generic nouns - removing unnecessary "the." Week
        2: Uncountable nouns in generic statements. Week 3: Institutions and places
        (school, hospital, church, prison). Week 4: Proper nouns and geographical
        names. Week 5: Complex noun phrases and article omission. Week 6: Comprehensive
        article review covering all Greek-English article differences.'
      exercises:
      - name: The Deletion Game
        type: error-correction
        description: Provide a 250-word text written by a fictional Greek learner,
          with 20 unnecessary "the" articles inserted (e.g., "The happiness is more
          important than the money. The people who live in the poverty need the help.").
          Students must identify and cross out every unnecessary "the." Compare answers
          and discuss each deletion.
        duration: 20
      - name: Generic or Specific?
        type: matching
        description: 'Give students 20 sentences with "the" - some correct, some incorrect.
          Students must decide whether each sentence is correct or incorrect, and
          if incorrect, whether to add or remove "the." Example: "The coffee keeps
          me awake" (could be specific or generic - discuss the difference).'
        duration: 15
      - name: Article-Free Abstracts
        type: composition
        description: 'Students write a 100-word paragraph about an abstract concept
          (love, freedom, happiness, education, patience) WITHOUT using "the" before
          abstract nouns. Peer review: partners check for unnecessary "the" and discuss
          each case.'
        duration: 20
      - name: Institution Article Rule
        type: fill-in-the-blank
        description: 'Provide 20 sentences with institutions/places where "the" must
          be added or removed. Examples: "She goes to ___ church every Sunday" (zero
          article), "I went to ___ church to fix the roof" (the = building). Students
          fill in "the" or zero article and explain their choice.'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press. Greek section on article
      and agreement transfer.'
    - Agathopoulou, E. (2005). The acquisition of the English article system by Greek
      learners of English. Journal of Greek Linguistics, 6(1), 45-62.
    - 'Ionin, T., Ko, H., & Wexler, K. (2004). Article semantics in L2 acquisition:
      The role of specificity. Language Acquisition, 12(1), 3-69.'
    - 'Master, P. (1997). The English article system: Acquisition, function, and pedagogy.
      System, 25(2), 215-232.'
