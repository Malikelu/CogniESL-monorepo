    examples:
    - wrong: Is raining outside.
      correct: It is raining outside.
      explanation: Greek "Vrechi" has no subject - weather verbs are impersonal in
        Greek. English requires a dummy subject "it" for weather expressions.
    - wrong: Went I to the store yesterday.
      correct: I went to the store yesterday.
      explanation: Greek allows VSO order, especially with past tense verbs. English
        requires SVO in declarative sentences.
    - wrong: Him I saw at the party.
      correct: I saw him at the party.
      explanation: 'Greek clitic pronouns precede the verb (Ton ida = "Him I-saw").
        English object pronouns follow the verb: "I saw him."'
    - wrong: The book, I read it last week.
      correct: I read the book last week.
      explanation: Greek topicalization places the topic first with a resumptive clitic
        pronoun (To vivlio to diavasa). English does not use resumptive pronouns in
        topicalization.
    why_it_happens: Modern Greek has a relatively free word order compared to English,
      with SVO, VSO, VOS, and OVS all being grammatically possible depending on information
      structure (topic, focus, emphasis). This freedom is possible because Greek verb
      morphology encodes person and number, making subject pronouns optional (pro-drop).
      English, by contrast, has rigid SVO order and requires explicit subjects in
      all finite clauses (except imperatives). Greek learners transfer their L1 word
      order flexibility to English, producing subject-less sentences ("Is raining"),
      verb-initial declaratives ("Went I to the store"), and preverbal object pronouns
      ("Him I saw"). The Greek clitic pronoun system places weak object pronouns before
      the verb, directly contradicting English post-verbal object placement.
    teacher_tips:
      how_to_explain: 'Teach English word order as a "fixed train": the engine (subject)
        must always come first, then the verb, then the cargo (object/complement).
        Use the metaphor: "In Greek, the train cars can be rearranged. In English,
        the engine ALWAYS comes first." Write the formula on the board: SUBJECT +
        VERB + OBJECT/COMPLEMENT. For pro-drop errors, explicitly teach that English
        ALWAYS needs a subject - even when there is no real subject ("It is raining,"
        "There is a problem").'
      where_to_start: Begin with the pro-drop error ("Is raining" -> "It is raining")
        as it is the most frequent and easiest to correct. Then move to SVO order
        in declarative sentences. Clitic pronoun placement and topicalization come
        later.
      sequencing: 'Week 1: Subject requirement - fixing pro-drop errors (dummy subjects:
        it, there). Week 2: SVO order in declarative sentences. Week 3: Adverb placement
        (front, mid, end position). Week 4: Object pronoun placement (post-verbal,
        not pre-verbal). Week 5: Topicalization and cleft structures. Week 6: Word
        order in questions and subordinate clauses.'
      exercises:
      - name: Subject Rescue Mission
        type: transformation
        description: 'Provide 20 subject-less sentences (e.g., "Is cold outside,"
          "Went to school," "Raining again," "Seems tired"). Students must add the
          correct subject: either a real subject (from context) or a dummy subject
          (it/there). Discuss when to use "it" (weather, time, distance) vs. "there"
          (existence).'
        duration: 15
      - name: Word Order Fixer-Upper
        type: sentence-rewrite
        description: Give students 15 sentences with scrambled word order reflecting
          Greek patterns (e.g., "Yesterday went she to the store," "The letter sent
          he to his mother"). Students rewrite each in correct English SVO order.
        duration: 20
      - name: Clitic Pronoun Swap
        type: transformation
        description: 'Provide 15 sentences with pre-verbal object pronouns (Greek-style):
          "Her I called yesterday," "The book I read it," "Them we invited to dinner."
          Students rewrite each with correct English post-verbal object placement.'
        duration: 15
      - name: Word Order Debate
        type: oral-drill
        description: 'Teacher says a Greek sentence (transliterated) with non-English
          word order. Students race to produce the correct English version. Include:
          "Ton ida xthes" -> "I saw him yesterday." "Vrechi" -> "It is raining." "Pao
          spiti" -> "I am going home."'
        duration: 15
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems (2nd ed.). Cambridge University Press. Greek section on word
      order.'
    - Tsimpli, I.-M. & Stavrakaki, S. (1999). The effects of morphosyntactic features
      on clitic placement in second language grammars. Proceedings of the 23rd BUCLD,
      pp. 669-680.
    - 'Lozano, C. (2006). Focus and split-intransitivity: The acquisition of word
      order alternations in non-native Spanish. Second Language Research, 22(2), 145-187.'
    - Philippaki-Warburton, I. (1985). Word order in Modern Greek. Transactions of
      the Philological Society, 83(1), 113-143.
