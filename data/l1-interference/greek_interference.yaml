      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek orthographic accent marks stress in writing
        -> difficulty predicting English stress.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Greek has no vowel reduction in unstressed syllables -> full vowel
        pronunciation in English unstressed syllables
      example: 'Greek: "kafes" (both vowels fully pronounced). Greek learners say
        "PHO-to-GRAPH" with full vowels instead of "PHO-to-graf" with schwa in unstressed
        syllables.'
      frequency: 4
