    interference_patterns:
    - pattern: Greek is a pitch-accent language with stress on one of last three syllables
        -> English stress placement errors
      example: 'Greek: "To aeroplano" (stress on penultimate syllable pla). Greek
        learners may stress English words following Greek patterns: "aDDRESS" (noun)
        instead of "adDRESS" (verb) because Greek stress rules do not match English
        noun/verb stress alternations.'
      frequency: 3
      persistence: 4
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek is a pitch-accent language with stress
        on one of last three syllables -> English stress placement errors.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Greek stress is phonemic -> stress-based meaning errors in English
      example: 'Greek: "pote" (when) vs. "pote" (ever/never) - stress and accent mark
        distinguish meaning. Greek learners may not perceive English stress contrasts:
        "REcord" (noun) vs. "reCORD" (verb).'
      frequency: 3
      persistence: 3
      communicative_impact: 3
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Greek stress is phonemic -> stress-based meaning
