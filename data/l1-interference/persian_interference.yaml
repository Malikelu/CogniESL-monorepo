  pronouns:
    interference_patterns:
    - pattern: Use of ân for both it and that
      example: 'FA ''ân'' = it/that -> Error: ''That is good'' (when meaning ''it'')
        -> Correct: ''It is good'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Omission of subject pronoun
      example: 'FA pro-drop -> Error: ''Am going'' -> Correct: ''I am going'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: Am going to school.
      correct: I am going to school.
    - wrong: Is good.
      correct: It is good.
    - wrong: Are students.
      correct: They are students.
    why_it_happens: Persian is a pro-drop language (subject pronouns are optional).
      Persian 'ân' covers both 'it' and 'that'. Persian learners may omit subject
      pronouns or confuse 'it' and 'that'.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES a subject in every sentence. ''It''
        = pronoun for things. ''That'' = demonstrative.'
      where_to_start: Start with subject pronouns. Then teach it vs that.
      sequencing: 'Week 1: Subject pronouns. Week 2: It vs that. Week 3: Possessive
        pronouns. Week 4: Review.'
      exercises:
      - name: Pronoun Insertion
        type: sentence-rewrite
        description: Students add missing subject pronouns to 15 sentences.
        duration: 10
      - name: FA Pronoun Translation
        type: translation
        description: Translate 15 Persian sentences with correct English pronouns.
        duration: 15
      - name: Pronoun Error Correction
        type: error-correction
        description: 10 sentences with pronoun errors.
        duration: 10
