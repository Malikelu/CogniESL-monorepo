  gerund_infinitive:
    interference_patterns:
    - pattern: Use of infinitive after prepositions
      example: 'FA ''qabl az raftan'' (before going) -> Error: ''Before to go'' ->
        Correct: ''Before going'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Before to leave, say goodbye.
      correct: Before leaving, say goodbye.
    - wrong: I want going to the store.
      correct: I want to go to the store.
    why_it_happens: Persian uses the infinitive after prepositions. English uses gerund
      after prepositions.
    teacher_tips:
      how_to_explain: 'Teach: After prepositions (before, after, without, by, for)
        -> always gerund (-ing).'
      where_to_start: Start with preposition + gerund.
      sequencing: 'Week 1: Preposition + gerund. Week 2: Verb + infinitive. Week 3:
        Verb + gerund. Week 4: Review.'
      exercises:
      - name: Preposition + Gerund
        type: fill-in-the-blank
        description: 15 sentences with prepositions followed by blank.
        duration: 10
      - name: FA Gerund Translation
        type: translation
        description: Translate 15 Persian preposition + infinitive sentences into
          English gerund.
        duration: 15
      - name: Verb Pattern Sort
        type: matching
        description: Students sort 20 verbs into gerund, infinitive, or both columns.
        duration: 10
