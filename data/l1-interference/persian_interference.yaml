  conditionals:
    interference_patterns:
    - pattern: Use of present tense in if-clauses
      example: 'FA ''agar man pul dashte basham'' (if I money had) -> Error: ''If
        I would have money'' -> Correct: ''If I had money'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: If I would have money, I would travel.
      correct: If I had money, I would travel.
    - wrong: If I was rich, I would buy a house.
      correct: If I were rich, I would buy a house.
    why_it_happens: Persian conditional structure differs from English. Persian learners
      may use 'would' in the if-clause or 'was' instead of 'were'.
    teacher_tips:
      how_to_explain: 'Teach: NO WOULD IN IF-CLAUSE. Use ''were'' (not ''was'') for
        unreal situations.'
      where_to_start: Start with second conditional. Then teach first conditional.
      sequencing: 'Week 1: Second conditional. Week 2: First conditional. Week 3:
        Zero conditional. Week 4: Review.'
      exercises:
      - name: Conditional Practice
        type: sentence-rewrite
        description: Students rewrite 10 conditional sentences.
        duration: 15
      - name: FA Conditional Translation
        type: translation
        description: Translate 15 Persian conditional sentences into correct English.
        duration: 15
