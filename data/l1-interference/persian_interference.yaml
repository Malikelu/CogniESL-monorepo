  linking_words:
    interference_patterns:
    - pattern: Use of amma at sentence start
      example: 'FA ''amma'' = but/however -> Error: ''But, I think...'' -> Correct:
        ''However, I think...'''
      frequency: 3
      persistence: 2
      communicative_impact: 2
    - pattern: Use of pas for so/therefore
      example: 'FA ''pas'' = so/therefore -> Error: ''Pas, we left'' -> Correct: ''So,
        we left'''
      frequency: 3
      persistence: 2
      communicative_impact: 1
    examples:
    - wrong: But, I think we should go.
      correct: However, I think we should go.
    - wrong: Pas, we left early.
      correct: So, we left early.
    why_it_happens: Persian 'amma' functions as both 'but' and 'however'. Persian
      also uses double conjunctions.
    teacher_tips:
      how_to_explain: 'Teach: ''However'' for formal writing. ''But'' for informal.
        ''Although'' and ''but'' NEVER together.'
      where_to_start: Start with 'but' vs 'however'.
      sequencing: 'Week 1: But vs however. Week 2: Although/but redundancy. Week 3:
        Other linking words. Week 4: Review.'
      exercises:
      - name: Formal vs Informal
        type: sentence-rewrite
        description: Students rewrite 10 informal sentences using formal linking words.
        duration: 10
