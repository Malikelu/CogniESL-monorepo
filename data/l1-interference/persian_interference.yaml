  verb_tenses:
    interference_patterns:
    - pattern: Use of present perfect for all past
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: FA 'rafte am'
      example_gloss: gone I-have
      example_wrong: I have gone yesterday
      example_correct: I went yesterday
      explanation: 'Transfer from L1: Use of present perfect for all past.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of mi- prefix for present continuous
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: FA 'mi-ravam'
      example_gloss: I go
      example_wrong: I am go
      example_correct: I am going
      explanation: 'Transfer from L1: Use of mi- prefix for present continuous.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I have gone to Tehran yesterday.
      correct: I went to Tehran yesterday.
    - wrong: She is go to school.
      correct: She is going to school.
    - wrong: They are eat lunch.
      correct: They are eating lunch.
    why_it_happens: Persian uses the perfect tense (rafte am = I have gone) for completed
      actions, similar to German. The mi- prefix indicates ongoing action. Persian
      learners may overuse present perfect or omit -ing.
    teacher_tips:
      how_to_explain: 'Teach: Specific past time -> Simple Past. Ongoing action ->
        be + -ing.'
      where_to_start: Start with simple past vs present perfect. Then teach present
        continuous.
      sequencing: 'Week 1: Simple past. Week 2: Present perfect. Week 3: Present continuous.
        Week 4: Review.'
      exercises:
      - name: Tense Decision
        type: fill-in-the-blank
        description: 20 sentences with blank for correct tense.
        duration: 15
      - name: FA Tense Translation
        type: translation
        description: Translate 15 Persian tense sentences into correct English.
        duration: 15
      - name: Tense Error Correction
        type: error-correction
        description: 10 sentences with tense errors.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 10
    - Parrott "Grammar for English Language Teachers"
