  phonology:
    interference_patterns:
    - pattern: Confusion of /v/ and /w/
      example: 'FA lacks /w/ -> Error: ''wery'' for ''very'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Difficulty with /θ/ and /ð/
      example: 'FA lacks dental fricatives -> Error: ''tink'' for ''think'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I am wery happy.
      correct: I am very happy.
    - wrong: Tink about it.
      correct: Think about it.
    - wrong: Dis is my book.
      correct: This is my book.
    why_it_happens: Persian lacks /w/ (using /v/ instead) and lacks dental fricatives
      /θ/ and /ð/. Persian learners substitute closest Persian sounds.
    teacher_tips:
      how_to_explain: 'Teach: /v/ = lips touch lower teeth. /w/ = lips round. /θ/
        = tongue between teeth.'
      where_to_start: Start with /v/ vs /w/. Then teach /θ/ and /ð/.
      sequencing: 'Week 1: V vs W. Week 2: TH sounds. Week 3: Other consonant contrasts.
        Week 4: Review.'
      exercises:
      - name: Minimal Pairs
        type: matching
        description: 'Students distinguish: very/water, vest/west, think/tink, this/dis.'
        duration: 10
      - name: TH Practice
        type: oral-drill
        description: Students practice 20 words with th sounds.
        duration: 10
      - name: Dictation
        type: fill-in-the-blank
        description: Teacher dictates words with target sounds.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 10
    - Underhill "Sound Foundations"
