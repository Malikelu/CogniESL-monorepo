    examples:
    - wrong: I am wery happy.
      correct: I am very happy.
    - wrong: Tink about it.
      correct: Think about it.
    - wrong: Dis is my book.
      correct: This is my book.
    why_it_happens: Persian lacks /w/ (using /v/ instead) and lacks dental fricatives
      /θ/ and /ð/. Persian learners substitute closest Persian sounds.
    teacher_tips:
      how_to_explain: 'Teach: /v/ = lips touch lower teeth. /w/ = lips round. /θ/
        = tongue between teeth.'
      where_to_start: Start with /v/ vs /w/. Then teach /θ/ and /ð/.
      sequencing: 'Week 1: V vs W. Week 2: TH sounds. Week 3: Other consonant contrasts.
        Week 4: Review.'
