    - pattern: Use of tavanestan for can/may
      example: 'FA ''mitavanam'' = I can/I may -> Error: ''I can go?'' (informal)
        -> Correct: ''May I go?'' (formal)'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
