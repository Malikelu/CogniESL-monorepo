      location: See relevant section
      tier: 2
  ezāfe_construction:
    interference_patterns:
    - pattern: Transfer of ezāfe construction
      example: 'FA ''ketab-e man'' (book-of me) -> Error: ''book of me'' -> Correct:
        ''my book'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of ezāfe for all possession
      example: 'FA ''dar-e khane'' (door-of house) -> Error: ''door of house'' ->
        Correct: ''house door'' / ''front door'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: Book of me is interesting.
      correct: My book is interesting.
    - wrong: Door of house is red.
      correct: The front door is red.
    - wrong: Car of my father is blue.
      correct: My father's car is blue.
    why_it_happens: 'Persian uses the ezāfe construction (-e/-ye) to link nouns to
      modifiers: ''ketab-e man'' (book-of me = my book). English uses possessive adjectives
      or ''s. Persian learners may transfer the ezāfe construction.'
    teacher_tips:
      how_to_explain: 'Teach: English uses possessive adjectives (my, your, his) BEFORE
        the noun. ''ketab-e man'' = ''my book'' (not ''book of me'').'
      where_to_start: Start with possessive adjectives. Then teach 's for possession.
      sequencing: 'Week 1: Possessive adjectives. Week 2: ''S possession. Week 3:
        Of for things. Week 4: Review.'
      exercises:
      - name: Possessive Translation
        type: translation
        description: Translate 15 Persian ezāfe constructions into English possessives.
        duration: 15
      - name: Possessive Formation
        type: sentence-rewrite
        description: Students rewrite 10 ezāfe phrases using English possessives.
        duration: 10
      - name: Error Correction
        type: error-correction
        description: 10 sentences with possessive errors.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 10
    - Parrott "Grammar for English Language Teachers"
