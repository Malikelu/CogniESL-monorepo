  prepositions:
    interference_patterns:
    - pattern: Transfer of Persian prepositions
      example: 'FA ''az'' = from/of -> Error: ''I am from Tehran'' (correct) but ''I
        heard of it'' -> Error: ''I heard from it'' -> Correct: ''I heard of it'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Use of be for to
      example: 'FA ''be'' = to -> Error: ''I go to school'' (correct) but ''I gave
        to him'' -> Error: ''I gave be him'' -> Correct: ''I gave to him'''
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: I gave be him the book.
      correct: I gave the book to him.
    - wrong: She is from the Iran.
      correct: She is from Iran.
    - wrong: He went to the school.
      correct: He went to school.
    why_it_happens: Persian prepositions often differ from English. 'az' (from/of),
      'be' (to/in), 'dar' (in/at). Persian learners transfer L1 prepositions.
    teacher_tips:
      how_to_explain: Teach common Persian-English preposition differences.
      where_to_start: Start with the most common preposition transfers.
      sequencing: 'Week 1: Verb + preposition. Week 2: Prepositions of place. Week
        3: Prepositions of time. Week 4: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 Persian sentences with correct English prepositions.
        duration: 15
      - name: Preposition Error Hunt
        type: error-correction
        description: A paragraph with 10 preposition errors.
        duration: 15
      - name: Preposition Practice
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct preposition.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 10
