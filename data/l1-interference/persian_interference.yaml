      correct: He goes to school every day.
    why_it_happens: Persian verb conjugation includes person/number marking. English
      third-person singular -s is frequently omitted by Persian learners.
    teacher_tips:
      how_to_explain: Teach the 'he/she/it + verb-s' rule as non-negotiable.
      where_to_start: Start with third-person -s in present simple.
      sequencing: 'Week 1: Third-person -s. Week 2: Does/doesn''t. Week 3: Irregular
        forms. Week 4: Review.'
      exercises:
      - name: Agreement Drill
        type: oral-drill
        description: Students describe a classmate daily routine using third-person
          -s.
        duration: 10
      - name: Subject-Verb Match
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct verb form.
        duration: 10
      - name: Error Correction
        type: error-correction
        description: 15 sentences with agreement errors.
        duration: 10
      - name: Daily Routine Writing
        type: composition
        description: Students write about another person daily routine.
        duration: 15
