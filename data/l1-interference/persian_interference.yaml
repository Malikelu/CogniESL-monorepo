      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
  word_order:
    interference_patterns:
    - pattern: SOV word order transfer
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: FA 'man ketab ra kharidam'
      example_gloss: I book bought
      example_wrong: I book bought
      example_correct: I bought a book
      explanation: 'Transfer from L1: SOV word order transfer.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Postposition instead of preposition
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: FA 'ketab ru-ye miz'
      example_gloss: book on table
      example_wrong: book on table' (correct) but 'book table on
      example_correct: book on the table
      explanation: 'Transfer from L1: Postposition instead of preposition.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I book bought yesterday.
      correct: I bought a book yesterday.
    - wrong: Book the table on is.
      correct: The book is on the table.
    - wrong: She store to went.
      correct: She went to the store.
    why_it_happens: Persian is SOV (Subject-Object-Verb) while English is SVO. Persian
      also uses postpositions instead of prepositions. Persian learners transfer SOV
      order and postposition patterns.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object. Prepositions
        come BEFORE nouns, not after.'
      where_to_start: Start with basic SVO order. Then teach prepositions.
      sequencing: 'Week 1: SVO word order. Week 2: Prepositions. Week 3: Adverb placement.
        Week 4: Review.'
      exercises:
      - name: Word Order Correction
        type: error-correction
        description: 15 sentences with Persian-influenced word order.
        duration: 15
      - name: FA Word Order Translation
        type: translation
        description: Translate 15 Persian sentences focusing on word order.
        duration: 20
      - name: SVO Practice
        type: sentence-rewrite
        description: Students rewrite 10 SOV sentences in SVO order.
        duration: 15
