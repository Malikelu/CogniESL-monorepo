language: Persian
language_code: fa
schema_version: '4.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of indefinite article
      frequency: 5
      persistence: 4
      communicative_impact: 3
      example_l1: FA 'ketab ra kharidam'
      example_gloss: book bought-I
      example_wrong: I bought book
      example_correct: I bought a book
      explanation: 'Transfer from L1: Omission of indefinite article.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Overuse of definite article
      example: 'FA ''al-'' prefix -> Error: ''the water is the essential'' -> Correct:
        ''Water is essential'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
      example_l1: '[L1 example needed]'
      example_gloss: '[gloss needed]'
      example_wrong: '[wrong example needed]'
      example_correct: '[correct example needed]'
      explanation: 'Transfer from L1: Overuse of definite article.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I bought book yesterday.
      correct: I bought a book yesterday.
    - wrong: She is doctor.
      correct: She is a doctor.
    - wrong: The water is the essential for life.
      correct: Water is essential for life.
    why_it_happens: Persian has no indefinite article. Definiteness is marked by context
      or the suffix '-ra' for specific direct objects. Persian learners may omit 'a/an'
      or overuse 'the'.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES ''a/an'' for singular countable nouns.
        Persian ''ketab'' (book) -> English ''a book''.'
      where_to_start: Start with the indefinite article pattern.
      sequencing: 'Week 1: Indefinite articles. Week 2: Definite articles. Week 3:
        Zero article. Week 4: Review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with Persian-influenced article errors.
        duration: 15
      - name: FA-to-EN Translation
        type: translation
        description: Translate 15 Persian sentences focusing on articles.
        duration: 20
      - name: Article Decision Tree
        type: fill-in-the-blank
        description: Students complete a flowchart for article choice.
        duration: 10
    sources:
    - Swan & Smith "Learner English" Ch. 10 (Farsi)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 4
