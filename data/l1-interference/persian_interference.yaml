  negation:
    interference_patterns:
    - pattern: Use of na- prefix for negation
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: FA 'na-ravam'
      example_gloss: not-I-go
      example_wrong: I not go
      example_correct: I do not go
      explanation: 'Transfer from L1: Use of na- prefix for negation.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: I not know the answer.
      correct: I do not know the answer.
    - wrong: She not likes coffee.
      correct: She does not like coffee.
    - wrong: They not have time.
      correct: They do not have time.
    why_it_happens: Persian negation uses the prefix 'na-/ne-' attached to the verb.
      English uses do/does/did + not + base verb. Persian learners may transfer the
      pre-verbal negation pattern.
    teacher_tips:
      how_to_explain: 'Teach: do/does/did + not + base verb. For ''be'' and modals,
        just add ''not'' after.'
      where_to_start: Start with do/does/did + not.
      sequencing: 'Week 1: Do/does/did + not. Week 2: Be + not. Week 3: Modals + not.
        Week 4: Review.'
      exercises:
      - name: Negation Transformation
        type: sentence-rewrite
        description: Students rewrite 15 affirmative sentences as negative.
        duration: 15
      - name: FA Negation Translation
        type: translation
        description: Translate 15 Persian negation sentences into correct English.
        duration: 15
      - name: Negation Error Correction
        type: error-correction
        description: 10 sentences with negation errors.
        duration: 10
