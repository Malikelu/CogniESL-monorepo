  false_friends:
    interference_patterns:
    - pattern: Confusion of EN-FA cognates
      example: 'FA ''mashin'' = car (not machine) -> Error: ''I bought a new mashin''
        -> Correct: ''I bought a new car'''
      frequency: 3
      persistence: 2
      communicative_impact: 3
    examples:
    - wrong: I bought a new mashin.
      correct: I bought a new car.
    - wrong: The maghaze is big.
      correct: The store is big.
    why_it_happens: Persian has borrowed words from English and French, but some have
      shifted meaning. These false friends cause communication errors.
    teacher_tips:
      how_to_explain: Create a list of common FA-EN false friends.
      where_to_start: Start with the most common false friends.
      sequencing: 'Week 1: Top 10 false friends. Week 2: Context-based practice. Week
        3: Review.'
      exercises:
      - name: False Friend Flashcards
        type: matching
        description: Students create flashcards for 10 false friends.
        duration: 15
      - name: Context Clues
        type: fill-in-the-blank
        description: 10 sentences where students choose the correct meaning.
        duration: 10
