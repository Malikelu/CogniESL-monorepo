  questions:
    interference_patterns:
    - pattern: Use of āyā/āyā for questions
      frequency: 5
      persistence: 5
      communicative_impact: 4
      example_l1: FA 'āyā mi-ravi?'
      example_gloss: question-particle go-you?
      example_wrong: Question you go?
      example_correct: Do you go?
      explanation: 'Transfer from L1: Use of āyā/āyā for questions.'
      etiology: interlingual
      flagged: false
      tier: 3
    - pattern: Use of rising intonation only
      frequency: 4
      persistence: 4
      communicative_impact: 3
      example_l1: FA 'mi-ravi?'
      example_gloss: go-you?
      example_wrong: You go?
      example_correct: Do you go?
      explanation: 'Transfer from L1: Use of rising intonation only.'
      etiology: interlingual
      flagged: false
      tier: 3
    examples:
    - wrong: You go to school?
      correct: Do you go to school?
    - wrong: She likes coffee?
      correct: Does she like coffee?
    - wrong: Where you go?
      correct: Where do you go?
    why_it_happens: Persian forms questions with the particle 'āyā' or simply by rising
      intonation. English requires do-support and inversion.
    teacher_tips:
      how_to_explain: 'Teach: Do/Does/Did + subject + base verb? For ''be'' and modals,
        just invert.'
      where_to_start: Start with yes/no questions. Then teach wh- questions.
      sequencing: 'Week 1: Yes/no questions. Week 2: Wh- questions. Week 3: Tag questions.
        Week 4: Review.'
      exercises:
      - name: Question Formation
        type: sentence-rewrite
        description: Students convert 15 statements to questions.
        duration: 15
      - name: FA Question Translation
        type: translation
        description: Translate 15 Persian questions into correct English.
        duration: 15
      - name: Interview Activity
        type: oral-drill
        description: Students interview each other using questions.
        duration: 15
    sources:
