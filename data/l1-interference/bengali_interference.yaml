  linking_words:
    interference_patterns:
    - pattern: Linking words (bengali)
      example: Linking words (bengali)
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: But, I think we should go.
      correct: However, I think we should go.
    why_it_happens: Bengali discourse connectors differ from English. The Bengali
      word 'kintu' functions as both 'but' and 'however,' and Bengali allows double
      conjunctions ('jodi...tahole' = 'if...then') that are redundant in English.
      Learners may produce sentences like 'Although it rained, but we went out.' This
      transfer occurs because discourse conventions are deeply embedded in L1.
    teacher_tips:
      how_to_explain: 'Teach: ''However'' for formal writing. ''But'' for informal.'
      where_to_start: Start with the linking words pattern.
      sequencing: 'Week 1: linking words. Week 2: Practice. Week 3: Review. Week 4:
        Mixed.'
      exercises:
