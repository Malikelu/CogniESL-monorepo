  word_order:
    interference_patterns:
    - pattern: SOV word order transfer
      example: SOV word order transfer
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: Ami boi kinlam.
      correct: I bought a book.
    why_it_happens: Bengali is SOV (Subject-Object-Verb) while English is SVO. In
      Bengali, the verb typically comes at the end of the sentence. Bengali learners
      may transfer this pattern to English, producing sentences like 'I the book bought'
      instead of 'I bought the book.' This transfer occurs because word order is deeply
      automatized from L1 acquisition.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object.'
      where_to_start: Start with the word order pattern.
      sequencing: 'Week 1: word order. Week 2: Practice. Week 3: Review. Week 4: Mixed.'
      exercises:
      - name: word_order Audit
        type: error-correction
        description: 20 sentences with word order errors.
        duration: 15
      - name: word_order Translation
        type: translation
        description: Translate 15 sentences focusing on word order.
        duration: 15
      - name: word_order Practice
        type: fill-in-the-blank
        description: 20 sentences practicing word order.
        duration: 10
      - name: word_order Error Hunt
        type: error-correction
        description: A paragraph with 10 word order errors.
        duration: 15
