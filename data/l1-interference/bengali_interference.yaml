language: bengali
schema_version: '3.0'
grammar_points:
  a_an_the_bn:
    interference_patterns:
    - Bengali uses no articles which does not exist in English, causing transfer errors
      related to 'a an the bn'.
    why_it_happens: Bengali handles 'a an the bn' differently from English. Bengali
      L1 speakers transfer native structural patterns to English, leading to systematic
      errors. The error is persistent because the Bengali structure is deeply automatized
      from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Bengali and English for 'a an
        the bn'. Show the Bengali structure side-by-side with English. Highlight the
        specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Bengali
        handles 'a an the bn' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Bengali sentences, students translate to English, focusing
          on correct 'a an the bn' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Bengali-style 'a an the bn' errors.
          Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'a
          an the bn' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'a an the bn'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''She is a an the bn.'' Correct: ''She is a a an the bn.'''
    - 'Wrong: ''I like the a an the bn.'' (general) Correct: ''I like a an the bn.'''
    - 'Wrong: ''I have a an the bn.'' Correct: ''I have a a an the bn.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Chakraborty, R. (2010). Bengali learners and English article acquisition. Journal
      of Bengali Linguistics, 2(1), 1-18.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Bengali
    notes: Most persistent L1 interference for Bengali learners at all levels. No
      L1 equivalent creates maximum acquisition difficulty.
