language: Bengali
language_code: bn
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of indefinite article (a/an)
      example: Bengali has no indefinite article. Learners say 'I want pen' instead
        of 'I want a pen.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Omission of definite article (the)
      example: Bengali marks definiteness with word order or demonstratives (e.g.,
        'ei boi' = 'this book'), not a separate article. Learners say 'Book is on
        table' instead of 'The book is on the table.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Overuse of demonstratives as article substitutes
      example: Bengali uses 'ei' (this) and 'o/ she' (that) where English might use
        'the.' Learners may say 'This book is good' when referring to a previously
        mentioned book, overusing demonstratives.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: Ami teacher.
      correct: I am a teacher.
      bn_original: Ami teacher. (আমি টিচার।)
      gloss: I teacher.
      explanation: Bengali has no article before the noun. English requires 'a' before
        a singular countable noun in a profession statement.
    - wrong: Boi ta kothay?
      correct: Where is the book?
      bn_original: Boi ta kothay? (বইটা কোথায়?)
      gloss: Book [DEF] where?
      explanation: Bengali uses the suffix '-ta' as a definite marker (like 'the'),
        but it is attached to the noun, not a separate word. Learners omit 'the' in
        English.
    - wrong: I bought book yesterday.
      correct: I bought a book yesterday.
      bn_original: Ami kal boi kinlam. (আমি কাল বই কিনলাম।)
      gloss: I yesterday book bought.
      explanation: Bengali sentence has no article before 'boi' (book). English requires
        'a' for first mention of a singular countable noun.
    - wrong: She is doctor.
      correct: She is a doctor.
      bn_original: She doctor. (সে ডাক্তার।)
      gloss: She doctor.
      explanation: Bengali omits the indefinite article after copula for professions.
        English requires 'a/an'.
    why_it_happens: 'Bengali has no article system whatsoever. There is no equivalent
      of ''a/an'' or ''the'' in Bengali grammar. Definiteness is expressed through
      other means: (1) word order — definite nouns often come before indefinite ones,
      (2) demonstratives like ''ei'' (this) and ''o/she'' (that), (3) the definite
      suffix ''-ta/-ti'' attached directly to nouns (e.g., ''boita'' = ''the book''),
      and (4) context. Because Bengali speakers never need to choose between ''a,''
      ''the,'' or zero article, the entire concept of grammatical definiteness marking
      is foreign. This is one of the most persistent and frequent errors for Bengali
      learners at all levels, from beginner to advanced. Even highly proficient speakers
      may omit articles in spontaneous speech because the habit is so deeply ingrained.'
    teacher_tips:
      how_to_explain: 'Start by explaining that English REQUIRES a ''determiner''
        (article, possessive, or demonstrative) before most singular countable nouns
        — this is a grammatical rule, not optional. Use a three-way contrast: (1)
        ''a/an'' = first mention, one of many, ''I need a pen'' (any pen). (2) ''the''
        = specific, both speaker and listener know which one, ''Pass me the pen''
        (that specific pen). (3) zero article = plural or uncountable nouns in general
        statements, ''I like books'' or ''Water is essential.'' Contrast with Bengali:
        show that Bengali uses ''-ta'' suffix or word order instead. Use visual aids
        — draw a circle labeled ''a'' (new information) and a circle labeled ''the''
        (shared knowledge).'
      where_to_start: 'Begin with the most basic rule: singular countable nouns in
        English MUST have a determiner. Drill ''I am a + profession'' and ''I have
        a + object'' patterns first. Then introduce ''the'' for specific reference.
        Save zero article (plurals, uncountables) for later.'
      sequencing: 'Week 1: Introduce a/an with singular countable nouns (professions,
        objects). Week 2: Introduce the for specific/known reference. Week 3: Contrast
        a vs the; introduce zero article with plurals and uncountables. Week 4: Mixed
        practice with all three choices in context (paragraphs, dialogues).'
      exercises:
      - name: Article Detective
        type: fill-in-the-blank
        description: 20 sentences where learners choose a/an, the, or zero article.
          Include Bengali glosses alongside to highlight the structural difference.
        duration: 15
      - name: Translate from Bengali
        type: translation
        description: 15 Bengali sentences without articles that learners must translate
          into grammatically correct English. Focus on adding the missing article.
        duration: 20
      - name: Error Correction — Article Hunt
        type: error-correction
        description: A short paragraph written by a fictional Bengali learner with
          12 article errors (omissions and overuse). Learners identify and correct
          each error.
        duration: 15
      - name: Picture Description
        type: speaking
        description: Show a picture with multiple objects. Learners describe it, practicing
          'a' for first mention and 'the' for subsequent mention. E.g., 'I can see
          a cat. The cat is sitting on a chair.'
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Bengali)
    - Parrott "Grammar for English Language Teachers"
    - Celce-Murcia & Larsen-Freeman "The Grammar Book"
