  phonology:
    interference_patterns:
    - pattern: Confusion of /v/ and /w/
      example: Confusion of /v/ and /w/
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I am wery happy.
      correct: I am very happy.
    why_it_happens: Bengali phonology differs from English in several key ways. Bengali
      lacks the dental fricatives /θ/ and /ð/ (as in 'think' and 'this'), and has
      a different vowel system. Bengali learners may substitute closest Bengali sounds,
      producing 'tink' for 'think' and 'dis' for 'this.' These errors persist because
      the L1 phonological system filters out non-native sound distinctions.
    teacher_tips:
      how_to_explain: 'Teach: /v/ vs /w/, /θ/ vs /t/.'
      where_to_start: Start with the phonology pattern.
      sequencing: 'Week 1: phonology. Week 2: Practice. Week 3: Review. Week 4: Mixed.'
      exercises:
      - name: phonology Audit
        type: error-correction
        description: 20 sentences with phonology errors.
        duration: 15
      - name: phonology Translation
        type: translation
        description: Translate 15 sentences focusing on phonology.
        duration: 15
      - name: phonology Practice
        type: fill-in-the-blank
        description: 20 sentences practicing phonology.
        duration: 10
      - name: phonology Error Hunt
        type: error-correction
        description: A paragraph with 10 phonology errors.
        duration: 15
