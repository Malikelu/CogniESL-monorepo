  narrative_tenses:
    interference_patterns:
    - pattern: Present tense used for narrative (historical present)
      example_l1: Entonces, el hombre entra y dice...
      example_gloss: Then, the man enters and says...
      example_wrong: Then, the man enters and says...
      example_correct: Then, the man entered and said...
      explanation: Spanish uses the present tense for vivid narrative (presente histórico/narrativo)
        in storytelling. English uses the past tense for narration. Spanish speakers
        may use the present tense in English narratives, transferring the Spanish
        narrative present.
