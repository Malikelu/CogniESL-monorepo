  prepositions_of_movement:
    interference_patterns:
    - pattern: Preposition transfer for movement expressions
      example_l1: Voy a casa. / Entré en la casa.
      example_gloss: I go to home. / I entered in the house.
      example_wrong: I go to home. / I entered in the house.
      example_correct: I am going home. / I entered the house.
      explanation: Spanish uses "a" for destination (voy a casa) and "en" for entry
        (entré en). English uses "to" for destination but zero article with "home"
        (going home, not *going to home), and "enter" takes a direct object without
        preposition (entered the house, not *entered in the house).
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: TO = destination. INTO = entering. THROUGH = passing. OVER = above
      and across.
    teacher_tips:
      how_to_explain: Describe physical movements with objects.
      where_to_start: Practice with physical movement descriptions.
      exercises:
      - name: prepositions of movement Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'prepositions of movement' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: prepositions of movement Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'prepositions of movement'
          errors. Students identify and correct each error.
        duration: 15
      - name: prepositions of movement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'prepositions
          of movement' structure.
        duration: 10
      - name: prepositions of movement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'prepositions
          of movement' errors.
        duration: 15
      sequencing: Introduce prepositions of movement with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
