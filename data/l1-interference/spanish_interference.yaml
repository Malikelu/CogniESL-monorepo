  would_rather_past_tense:
    interference_patterns:
    - pattern: '"Would rather" + past tense for unreal situations'
      example_l1: Preferiría que vinieras.
      example_gloss: I would prefer that you came.
      example_wrong: I would prefer that you come.
      example_correct: I would rather you came.
      explanation: Spanish "preferiría que + subjuntivo" maps to English "would rather
        + past tense" for unreal situations. Spanish speakers may use the present
        tense after "would rather" instead of the past tense.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Similar to subjunctive
      example_l1: Preferiría que no lloviera.
      example_gloss: I would prefer that it did not rain.
      example_wrong: I would prefer that it does not rain.
      example_correct: I would rather it did not rain.
      explanation: Spanish uses the subjunctive after "preferiría que." English uses
        the past tense after "would rather" for present/future unreal situations.
        Spanish speakers may use the present tense instead of the past tense.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: WOULD RATHER + subject + PAST = unreal preference.
    teacher_tips:
      how_to_explain: '''I''d rather you CAME tomorrow.'' (= I wish you would come).'
      where_to_start: Practice expressing preferences about others.
      exercises:
      - name: would rather past tense Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'would rather past tense' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: would rather past tense Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'would rather past tense'
          errors. Students identify and correct each error.
        duration: 15
      - name: would rather past tense Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'would
          rather past tense' structure.
        duration: 10
      - name: would rather past tense Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'would rather
          past tense' errors.
        duration: 15
      sequencing: Introduce would rather past tense with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
    examples:
    - '''I would rather you DIDN''T mention this.'' (I prefer that you don''t, but
      unlikely).'
    - '''I''d rather she WERE here.'' (she''s not here).'
    - 'Spanish: ''Prefiero que vinieras.'' = ''I''d rather you CAME.'''
    sources:
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
