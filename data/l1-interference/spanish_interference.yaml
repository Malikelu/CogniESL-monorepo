  presupposition:
    interference_patterns:
    - pattern: Presuppositions triggered by linguistic structures
      example_l1: ¿Todavía fumas?
      example_gloss: Still you smoke?
      example_wrong: Still you smoke?
      example_correct: Do you still smoke?
      explanation: Spanish "todavía" triggers a presupposition that the action was
        true before. English "still" does the same, but the word order differs. Spanish
        speakers may produce "Still you smoke?" following Spanish word order.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Assumptions embedded in sentences differ between Spanish and English
      example_l1: Dejó de fumar.
      example_gloss: He stopped smoking.
      example_wrong: He stopped to smoke.
      example_correct: He stopped smoking.
      explanation: Spanish "dejar de + infinitive" means to stop doing something.
        English "stop + gerund" has the same meaning, but "stop + infinitive" means
        to stop in order to do something. Spanish speakers may confuse these patterns.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Presuppositions = hidden assumptions in sentence structure.
    teacher_tips:
      how_to_explain: Learn what your sentences PRESUPPOSE. 'Have you STOPPED...'
        presupposes you did it.
      where_to_start: Analyze presupposition triggers.
      exercises:
      - name: presupposition Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'presupposition' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: presupposition Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'presupposition' errors.
          Students identify and correct each error.
        duration: 15
      - name: presupposition Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'presupposition'
          structure.
        duration: 10
      - name: presupposition Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'presupposition'
          errors.
        duration: 15
      sequencing: Introduce presupposition with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Have you STOPPED cheating on exams?'' (= presupposes you used to cheat).'
    - '''When did you stop cheating?'' (= presupposes you cheated).'
    - 'Spanish: ''Has dejado de copiar?'' Same presupposition.'
    sources:
    - Gonzalez Lopez, A. (2010).
    - Levinson, S. C. (1983). Pragmatics.
