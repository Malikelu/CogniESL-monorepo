  will_vs_going_to:
    interference_patterns:
    - pattern: Ir a + infinitive transferred as "go" instead of "going to"
      example_l1: Voy a estudiar.
      example_gloss: I go to study.
      example_wrong: I go to study.
      example_correct: I am going to study.
      explanation: Spanish "ir a + infinitive" (voy a estudiar) is the most common
        future construction. English "be going to" is the equivalent. Spanish speakers
        may produce "I go to study" instead of "I am going to study" — literally translating
        "voy a."
      frequency: 5
      persistence: 4
      communicative_impact: 4
    why_it_happens: '''BEING TO'' = planned. ''WILL'' = decided now or predicted.'
    teacher_tips:
      how_to_explain: '''BE GOING TO'' = decided. ''WILL'' = spontaneous.'
      where_to_start: Practice planned vs. spontaneous scenarios.
      exercises:
      - name: will vs going to Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'will vs going to' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: will vs going to Error Correction
        type: error-correction
