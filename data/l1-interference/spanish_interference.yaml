  verb_conjugation:
    interference_patterns:
    - pattern: Verb conjugation errors due to Spanish rich morphology
      example_l1: Yo hablo, tú hablas, él habla...
      example_gloss: I speak, you speak, he speaks...
      example_wrong: He speak. / They speaks.
      example_correct: He speaks. / They speak.
      explanation: Spanish has rich verb morphology with distinct endings for each
        person/number (hablo, hablas, habla, hablamos, hablan). English has minimal
        conjugation (only 3rd person singular -s). Spanish speakers may omit the -s
        or apply it incorrectly because English conjugation is much simpler.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Irregular verb forms transferred from Spanish
      example_l1: Sabo (for "I know") — but in English context
      example_gloss: I know (irregular)
      example_wrong: I knowed. / I goed.
      example_correct: I knew. / I went.
      explanation: Both languages have irregular verbs, but the irregularities differ.
        Spanish speakers may overregularize English irregular verbs (goed, knowed)
        or apply Spanish irregular patterns to English verbs.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish has 50+ verb forms. English has 3-5. Simplicity causes
      confusion.
    teacher_tips:
      how_to_explain: Focus on irregular verb forms. Make flashcards grouped by pattern.
      where_to_start: 'Group irregulars: go->went->gone, see->saw->seen.'
      exercises:
      - name: verb conjugation Contrastive Drill
