  there_vs_it:
    interference_patterns:
    - pattern: '"There" existential vs "It" dummy subject'
      example_l1: Hay un problema. / Es importante.
      example_gloss: There is a problem. / It is important.
      example_wrong: It has a problem. / Is important.
      example_correct: There is a problem. / It is important.
      explanation: 'Spanish "hay" covers existential "there is." Spanish "es" (ser)
        with adjectives has no subject. English requires "there" for existentials
        (There is a problem) and "it" for dummy subjects (It is important). Spanish
        speakers may confuse these: "It has a problem" (using "it" for existential)
        or "Is important" (omitting "it").'
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Spanish "hay" vs subjectless constructions
      example_l1: Hay mucha gente aquí.
      example_gloss: There are many people here.
      example_wrong: It has many people here.
      example_correct: There are many people here.
      explanation: Spanish "hay" is an impersonal existential verb. English uses "there
        is/are." Spanish speakers may produce "It has many people here" — using "it"
        instead of "there."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: THERE = existence (there is/are). IT = dummy subject (it is important).
    teacher_tips:
      how_to_explain: THERE IS a problem. IT IS important. Different structures, different
        uses.
      where_to_start: Practice existential vs. dummy subject sentences.
      exercises:
      - name: there vs it Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'there vs it' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: there vs it Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'there vs it' errors.
          Students identify and correct each error.
        duration: 15
      - name: there vs it Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'there
          vs it' structure.
        duration: 10
      - name: there vs it Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'there vs it'
          errors.
        duration: 15
      sequencing: Introduce there vs it with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''THERE IS a book on the table.'' (existence).'
    - '''IT IS important to study.'' (dummy subject, no ''there'').'
    - 'Wrong: ''Is important to study.'' Correct: ''IT IS important to study.'''
    sources:
    - Gass, S. & Selinker, L. (2008).
    - Gonzalez Lopez, A. (2010).
