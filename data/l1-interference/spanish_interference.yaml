  passive_voice_all_tenses:
    interference_patterns:
    - Passive attempted only in simple present/past
    - Failure to extend passive to continuous or perfect forms
    why_it_happens: English allows passives in all tenses. Change the 'be' form.
    teacher_tips:
      how_to_explain: IS done, WAS done, HAS BEEN done, WILL BE done, IS BEING done.
      where_to_start: Conjugate 'be' then add past participle.
      exercises:
      - name: passive voice all tenses Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
