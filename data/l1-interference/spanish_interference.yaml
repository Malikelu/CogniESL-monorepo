  first_conditional:
    interference_patterns:
    - Using 'if + will' instead of 'if + present'
    - Failure to use standard Type 1 structure
    why_it_happens: 'Type 1: If PRESENT, WILL + base. Spanish: ''Si + presente indicativo''.'
    teacher_tips:
      how_to_explain: Type 1 = REAL condition. If + SIMPLE PRESENT. Result = WILL
        + base verb.
      where_to_start: Practice with real/possible scenarios.
      exercises:
      - name: first conditional Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'first conditional' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: first conditional Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'first conditional' errors.
          Students identify and correct each error.
        duration: 15
      - name: first conditional Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'first
          conditional' structure.
        duration: 10
      - name: first conditional Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'first conditional'
          errors.
        duration: 15
      sequencing: Introduce first conditional with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''If you will call me, I''ll answer.'' Correct: ''If you CALL, I WILL
      answer.'''
    - 'Wrong: ''If she will study, she will pass.'' Correct: ''If she STUDIES, she
      WILL pass.'''
    - '''If it rains, we WILL stay home.'''
