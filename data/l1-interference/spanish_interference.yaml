        dropping
      source: Silva Valencia (2022) 'A Comparative Linguistic Analysis of English
        and Spanish Phonological System', Gist Education and Learning Research Journal,
        No. 25, pp. 139-155
      location: pp. 139-155
      tier: 2
  ser_estar:
    interference_patterns:
    - pattern: Ser/estar distinction falsely expected in English "to be"
      example_l1: Soy cansado. / Estoy profesor.
      example_gloss: I am (ser) tired. / I am (estar) a teacher.
      example_wrong: I am tired (using ser logic). / I am a teacher (using estar logic).
      example_correct: I am tired. / I am a teacher.
      explanation: Having two copulas in Spanish creates a false expectation that
        English also distinguishes them. Both ser and estar become AM/IS/ARE in English.
        Spanish speakers may hesitate or overanalyze which form of "to be" to use.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Confusion about which English structure corresponds to ser vs estar
      example_l1: Es en la mesa. / Está un libro.
      example_gloss: It is (ser) on the table. / It is (estar) a book.
      example_wrong: It is on the table (using ser for location).
      example_correct: It is on the table.
      explanation: Spanish uses estar for location (Está en la mesa) and ser for identity
        (Es un libro). English uses "is" for both. Spanish speakers may try to find
        two different English forms where only one exists.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Having two copulas creates false expectation that English also
      distinguishes them.
    teacher_tips:
      how_to_explain: Both ser and estar become AM/IS/ARE in English. 'I am tired'
        = Estoy cansado. 'I am a teacher' = Soy profesora.
      where_to_start: Practice converting ser and estar sentences — both become 'am/is/are'.
      sequencing: 'Week 1: ser examples. Week 2: estar examples. Week 3: mixed.'
      exercises:
      - name: ser estar Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'ser estar' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: ser estar Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'ser estar' errors. Students
          identify and correct each error.
        duration: 15
      - name: ser estar Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'ser
          estar' structure.
        duration: 10
      - name: ser estar Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'ser estar' errors.
        duration: 15
    examples:
    - 'Spanish: ''Soy de Mexico.'' = ''I AM from Mexico.'' (ser → am)'
    - 'Spanish: ''Estoy en casa.'' = ''I AM at home.'' (estar → am)'
    - 'No distinction in English: both are ''I am.'''
    sources:
    - Geeslin, K. L. (2000). That's how the dough goes.
    - Perez-Leroux, A. T. et al. (2007). On the crosslinguistic influence of Spanish.
