  verbs_followed_by_bare_infinitive:
    interference_patterns:
    - pattern: Verbs followed by bare infinitive (no "to")
      example_l1: Me hizo reír. / Déjame ir.
      example_gloss: Me it made laugh. / Let me go.
      example_wrong: Me made to laugh. / Let me to go.
      example_correct: It made me laugh. / Let me go.
      explanation: Spanish verbs like "hacer" (make) and "dejar" (let) are followed
        directly by the infinitive without "to." English also uses bare infinitives
        after "make" and "let." Spanish speakers may add "to" after these verbs because
        most English verbs require "to" before the infinitive.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: make, let, help + base verb
      example_l1: Me ayudó a hacerlo.
      example_gloss: Me it helped to do.
      example_wrong: Me helped to do it.
      example_correct: He helped me (to) do it.
      explanation: Spanish "ayudar a + infinitive" requires "a" before the infinitive.
        English "help" can take either bare infinitive or "to" infinitive (help me
        do / help me to do). Spanish speakers may produce "helped to do" — which is
        correct in English but the word order may be wrong.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: MAKE/LET + object + base verb. HEAR/SEE + object + base = perception.
    teacher_tips:
      how_to_explain: '''Let him GO.'' ''Make her STOP.'' ''I saw him LEAVE.'' (NOT
        ''to leave'').'
      where_to_start: Learn verb patterns with bare infinitive.
      exercises:
      - name: verbs followed by bare infinitive Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'verbs followed by bare infinitive' structure. Emphasize the
          structural difference between Spanish and English.
        duration: 15
      - name: verbs followed by bare infinitive Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'verbs followed by bare
          infinitive' errors. Students identify and correct each error.
        duration: 15
      - name: verbs followed by bare infinitive Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'verbs
          followed by bare infinitive' structure.
        duration: 10
      - name: verbs followed by bare infinitive Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'verbs followed
          by bare infinitive' errors.
        duration: 15
      sequencing: Introduce verbs followed by bare infinitive with clear examples.
        Practice recognition before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''She made him to cry.'' Correct: ''She MADE him CRY.'''
    - '''I heard them SING.'' (perception). ''Let me GO.'''
    - '''Help me (TO) carry this.'' (to is optional here).'
    sources:
    - Gonzalez Lopez, A. (2010).
