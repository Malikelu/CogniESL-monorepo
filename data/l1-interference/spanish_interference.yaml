  articles:
    interference_patterns:
    - pattern: Definite articles overused in generic contexts
      example_l1: Los perros son fieles.
      example_gloss: The dogs are faithful.
      example_wrong: The dogs are faithful.
      example_correct: Dogs are faithful.
      explanation: Spanish uses definite articles with plural/generic nouns (los perros
        = dogs in general). English uses zero article for generic statements. Spanish
        speakers overuse "the" when making generalizations, which in English implies
        specific, known dogs rather than dogs as a category.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Zero article not produced for general/abstract nouns
      example_l1: Me gusta la música. / La vida es bella.
      example_gloss: I like the music. / The life is beautiful.
      example_wrong: I like the music. / The life is beautiful.
      example_correct: I like music. / Life is beautiful.
      explanation: Spanish requires definite articles before abstract nouns and nouns
        used in a general sense (la música, la vida, el amor). English uses zero article
        for uncountable/abstract nouns in general statements. Spanish speakers insert
        "the" where English requires none.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Indefinite article omitted before singular count nouns
      example_l1: Es profesor. / Es médico.
      example_gloss: He is professor. / He is doctor.
      example_wrong: He is professor.
      example_correct: He is a teacher.
      explanation: Spanish omits the indefinite article before predicate nouns denoting
        profession (Es profesor, Es médico). English requires "a/an" before singular
        count nouns. This is one of the most persistent and visible errors for Spanish
        speakers.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Spanish always marks nouns with articles. English requires zero
      article for generics.
    teacher_tips:
      how_to_explain: 'Generic plural = NO article: ''Dogs are friendly.'' Specific
        = THE. First mention = A/AN.'
      where_to_start: Practice generic statements with no article.
      exercises:
      - name: articles Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'articles' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: articles Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'articles' errors. Students
          identify and correct each error.
        duration: 15
      - name: articles Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'articles'
          structure.
        duration: 10
      - name: articles Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'articles' errors.
        duration: 15
      sequencing: Introduce articles with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''The dogs are friendly.'' (generic). Correct: ''DOGS are friendly.'''
    - 'Wrong: ''I enjoy the music.'' (general). Correct: ''I enjoy MUSIC.'''
    - 'Wrong: ''She is teacher.'' Correct: ''She is A teacher.'''
    - 'Spanish: ''El agua es importante'' = English: ''WATER is important.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference.'
    - Montrul, S. & Perez-Leroux, A. T. (2003). The generic structure of bare nominals.
    - Schmitt, N. & Marsden, E. (2020). Routledge Handbook of Second Language Acquisition.
