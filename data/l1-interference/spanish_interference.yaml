  possessive_pronouns:
    interference_patterns:
    - pattern: Possessive pronouns agree with possessor instead of possessed
      example_l1: Mi casa es suya.
      example_gloss: My house is his/hers/yours.
      example_wrong: My house is his.
      example_correct: My house is his.
      explanation: Spanish possessive pronouns (mío, tuyo, suyo, nuestro) agree with
        the gender/number of the possessed noun, not the possessor. English possessive
        pronouns (my, your, his, her, our) agree with the possessor. Spanish speakers
        may confuse "his" and "her" because Spanish "suyo" covers both.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish uses 'su/sus' for all 3rd person. English distinguishes
      his/her/its.
    teacher_tips:
      how_to_explain: Before noun = adjective (my book). Alone = pronoun (mine).
      where_to_start: Practice substitution drills.
      exercises:
      - name: possessive pronouns Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'possessive pronouns' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: possessive pronouns Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'possessive pronouns'
          errors. Students identify and correct each error.
        duration: 15
      - name: possessive pronouns Pattern Practice
