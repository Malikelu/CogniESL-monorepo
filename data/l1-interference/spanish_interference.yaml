  phrasal_verbs:
    interference_patterns:
    - pattern: Phrasal verbs avoided or translated literally
      example_l1: Busco mi llave. (look for)
      example_gloss: I look for my key.
      example_wrong: I look my key.
      example_correct: I am looking for my key.
      explanation: English phrasal verbs (look for, give up, turn on, put off) have
        no direct equivalent in Spanish, which uses single verbs (buscar, rendir,
        encender, posponer). Spanish speakers may omit the particle ("I look my key")
        or use a single verb that doesn't capture the meaning. Phrasal verbs are a
        major source of difficulty.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Particle placement errors with phrasal verbs
      example_l1: Apaga la luz.
      example_gloss: Turn off the light.
      example_wrong: Turn off it.
      example_correct: Turn it off.
      explanation: English separable phrasal verbs require the object between verb
        and particle when the object is a pronoun (turn it off, not *turn off it).
        Spanish has no equivalent structure. Spanish speakers may produce "turn off
        it" following Spanish word order.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Phrasal verb meaning not transparent
      example_l1: Me di cuenta. (realize)
      example_gloss: I gave myself account.
      example_wrong: I gave myself account.
      example_correct: I realized.
      explanation: Many English phrasal verbs are idiomatic — their meaning cannot
        be deduced from the parts. "Give up" does not mean "give" + "up." Spanish
        speakers may avoid phrasal verbs or use them incorrectly because their L1
        uses single verbs for these concepts.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Spanish single verbs correspond to English phrasal verbs.
    teacher_tips:
      how_to_explain: Phrasal verbs are vocabulary units. 'TURN OFF' = apagar, 'LOOK
        UP' = buscar.
      where_to_start: Learn high-frequency phrasal verbs as vocabulary units.
      exercises:
      - name: phrasal verbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'phrasal verbs' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: phrasal verbs Error Correction
