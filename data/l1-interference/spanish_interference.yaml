  negative_questions:
    interference_patterns:
    - pattern: Negative question form transferred from Spanish
      example_l1: ¿No quieres café?
      example_gloss: Not you want coffee?
      example_wrong: Not you want coffee?
      example_correct: Don't you want coffee?
      explanation: Spanish negative questions are formed by adding "no" before the
