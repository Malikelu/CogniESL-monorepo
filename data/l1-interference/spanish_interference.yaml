  zero_conditional:
    interference_patterns:
    - pattern: 'Zero conditional: "If + present, present" for universal truths'
      example_l1: Si calientas agua, hierve.
      example_gloss: If you heat water, it boils.
      example_wrong: If you heat water, it boils. (correct in English too)
      example_correct: If you heat water, it boils.
      explanation: 'Both Spanish and English use present/present for zero conditional
        (universal truths, scientific facts). Spanish speakers may use "will" in the
        main clause: "If you heat water, it will boil" — which changes the meaning
        from universal truth to specific prediction.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish "si + presente indicativo"
      example_l1: Si llueve, me quedo en casa.
      example_gloss: If it rains, I stay at home.
      example_wrong: If it rains, I stay at home. (correct for habitual)
      example_correct: If it rains, I stay at home. / If it rains, I will stay at
        home.
      explanation: 'Spanish "si + presente" can be either zero conditional (universal/habitual)
        or first conditional (specific future). English distinguishes these: present/present
        (habitual) vs present/will (future). Spanish speakers may not use "will" in
        the main clause for future conditions.'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: ZERO CONDITIONAL = general truth/scientific fact. If + present,
      present.
    teacher_tips:
      how_to_explain: If you HEAT water to 100°C, it BOILS. Always true.
      where_to_start: Practice scientific facts and universal truths.
      exercises:
      - name: zero conditional Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'zero conditional' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: zero conditional Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'zero conditional' errors.
          Students identify and correct each error.
        duration: 15
      - name: zero conditional Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'zero
          conditional' structure.
        duration: 10
      - name: zero conditional Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'zero conditional'
          errors.
        duration: 15
      sequencing: Introduce zero conditional with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''If you MIX red and blue, you GET purple.'' (always true).'
    - 'Spanish: ''Si calientas agua, hierve.'' = ''If you HEAT water, it BOILS.'''
    - '''If I EAT too much, I FEEL sick.'' (personal fact, always true for me).'
    sources:
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
    - Gonzalez Lopez, A. (2010).
