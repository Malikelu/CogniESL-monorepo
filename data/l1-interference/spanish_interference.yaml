  subordinating_conjunctions:
    interference_patterns:
    - pattern: Subordinating conjunction transfer from Spanish
      example_l1: Porque es importante. / Cuando llegue.
      example_gloss: Because it is important. / When he arrives.
      example_wrong: Because it is important, so I do it.
      example_correct: Because it is important, I do it.
      explanation: Spanish subordinating conjunctions (porque, cuando, aunque, si,
        mientras) do not always map 1:1 to English. Spanish speakers may produce double
        conjunctions or use the wrong English equivalent.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish subordinators have different semantic ranges.
    teacher_tips:
      how_to_explain: BECAUSE=reason. ALTHOUGH=concession. WHEN/WHILE=time. IF=condition.
        UNLESS=neg condition.
      where_to_start: Practice each subordinator with clear examples.
      exercises:
      - name: subordinating conjunctions Contrastive Drill
