  past_continuous:
    interference_patterns:
    - pattern: Past continuous overused for habitual past actions
      example_l1: Cuando era niño, estaba jugando al fútbol.
      example_gloss: When I was a child, I was playing soccer.
      example_wrong: When I was a child, I was playing soccer every day.
      example_correct: When I was a child, I played soccer every day.
      explanation: Spanish uses the imperfect (jugaba) for both ongoing and habitual
        past actions. English distinguishes past continuous (was playing = in progress
        at a moment) from simple past (played = habitual). Spanish speakers may overuse
        the past continuous for habitual actions.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Past continuous not used for interrupted actions
      example_l1: Estudiaba cuando llegaste.
      example_gloss: I was studying when you arrived.
      example_wrong: I studied when you arrived.
      example_correct: I was studying when you arrived.
      explanation: Spanish uses the imperfect (estudiaba) for background actions interrupted
        by another event. English uses past continuous for the background action (was
        studying) and simple past for the interruption (arrived). Spanish speakers
        may use simple past for both.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Past continuous = longer action interrupted by shorter one.
    teacher_tips:
      how_to_explain: WHILE I was cooking, the phone RANG.
      where_to_start: Practice with interruption scenarios.
      exercises:
      - name: past continuous Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'past continuous' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
