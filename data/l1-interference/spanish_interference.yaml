  third_conditional:
    interference_patterns:
    - Spanish compound conditional not matched
    - Failure to use past perfect + would have
    - Using simple past instead of past perfect in if-clause
    why_it_happens: 'Type 3 = UNREAL PAST. If + HAD + V3. Result: WOULD HAVE + V3.'
    teacher_tips:
      how_to_explain: If + HAD + past participle. WOULD HAVE + past participle.
      where_to_start: Practice past regrets and hypothetical events.
      exercises:
      - name: third conditional Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'third conditional' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: third conditional Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'third conditional' errors.
          Students identify and correct each error.
        duration: 15
      - name: third conditional Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'third
          conditional' structure.
        duration: 10
      - name: third conditional Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'third conditional'
          errors.
        duration: 15
      sequencing: Introduce third conditional with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''If I studied harder, I would pass.'' (Type 2). Past: ''If I HAD STUDIED,
      I WOULD HAVE PASSED.'''
    - 'Spanish: ''Si hubiera sabido, habria venido.'' = ''If I HAD KNOWN, I WOULD
      HAVE COME.'''
    - '''If she HAD LEFT earlier, she WOULD HAVE ARRIVED on time.'''
    sources:
