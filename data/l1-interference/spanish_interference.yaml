  gustar_construction:
    interference_patterns:
    - pattern: Producing 'I like' when Spanish requires indirect object
      example_l1: Me gusta el café.
      example_gloss: To me pleases the coffee.
      example_wrong: I am pleasing the coffee.
      example_correct: I like coffee.
      explanation: Spanish "gustar" works like "to please" — the thing liked is the
        subject, and the person who likes is the indirect object (Me gusta el café
        = Coffee pleases me). English "like" works the opposite way — the person is
        the subject (I like coffee). Spanish speakers may produce "I am pleasing the
        coffee" or "To me pleases the coffee" — literally transferring the gustar
        construction.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Confusion between subject and object in gustar-type verbs
      example_l1: Me encanta la música. / Te importa el dinero.
      example_gloss: To me enchants the music. / To you matters the money.
      example_wrong: I enchant the music. / You matter the money.
      example_correct: I love music. / Money matters to you.
      explanation: Spanish gustar-type verbs (encantar, fascinar, molestar, importar,
        interesar, preocupar) have the thing as the subject and the person as the
        indirect object. English uses the person as the subject with regular verbs.
        Spanish speakers may reverse the subject and object, producing "I enchant
        the music" instead of "I love music."
      frequency: 4
      persistence: 4
      communicative_impact: 4
    why_it_happens: 'Spanish: ''Me gusta el libro'' (The book pleases me). English:
      ''I like the book.'''
    teacher_tips:
      how_to_explain: In Spanish the THING is the subject. In English the PERSON is
        the subject. Flip the structure.
      where_to_start: 'Practice: Me gusta X = I like X.'
      exercises:
      - name: gustar construction Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'gustar construction' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: gustar construction Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'gustar construction'
          errors. Students identify and correct each error.
        duration: 15
      - name: gustar construction Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'gustar
          construction' structure.
        duration: 10
      - name: gustar construction Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'gustar construction'
          errors.
        duration: 15
      sequencing: Introduce gustar construction with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish: ''Me gusta el chocolate.'' = English: ''I LIKE chocolate.'' (NOT ''Chocolate
      likes me.'')'
    - 'Spanish: ''Me encanta esta cancion.'' = ''I LOVE this song.'''
    - 'Spanish: ''Nos molesta el ruido.'' = ''The NOISE bothers us.'''
    - 'Wrong: ''I like very much this place.'' Correct: ''I LIKE this place very much.'''
    sources:
    - Bruhn de Garavito, J. & Geeslin, K. (2004). The acquisition of Spanish gustar.
    - Montrul, S. (2004). Subject and object expression in Spanish heritage speakers.
