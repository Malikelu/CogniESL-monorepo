  subjunctive:
    interference_patterns:
    - pattern: Spanish subjunctive mood not transferred to English
      example_l1: Es importante que estudies.
      example_gloss: It is important that you study (subjunctive).
      example_wrong: It is important that you study (indicative).
      example_correct: It is important that you study.
      explanation: 'Spanish has a fully productive subjunctive mood used after expressions
        of doubt, emotion, desire, necessity, and impersonal expressions. English
        has only a vestigial subjunctive (base form after suggest/recommend: "I suggest
        he study"). Spanish speakers may overuse or avoid the English subjunctive
        because the Spanish system is far more extensive and obligatory.'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Using indicative after suggest/recommend (Spanish transfer)
      example_l1: Recomiendo que viene mañana.
      example_gloss: I recommend that he comes (indicative) tomorrow.
      example_wrong: I recommend that he comes tomorrow.
      example_correct: I recommend that he come tomorrow.
      explanation: Spanish requires subjunctive after recomendar que (Recomiendo que
        venga). English also has a subjunctive here but it uses the base form ("he
        come" not "he comes"). Spanish speakers may use the indicative ("he comes")
        because they are not aware of the English subjunctive form.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: English subjunctive avoided or overgeneralized
      example_l1: Quiero que él hace su trabajo.
      example_gloss: I want that he does his work.
      example_wrong: I want that he does his work.
      example_correct: I want him to do his work.
      explanation: Spanish uses subjunctive in noun clauses after verbs of desire,
        command, doubt (Quiero que haga). English uses the infinitive with "to" (I
        want him to do) or, in formal style, the subjunctive (I want that he do).
        Spanish speakers may produce "that he does" (indicative) or "that he do" (hypercorrect
        subjunctive) instead of the natural English infinitive construction.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: English subjunctive is minimal - only base form after certain
      verbs.
    teacher_tips:
      how_to_explain: 'After SUGGEST, RECOMMEND, INSIST, DEMAND: use base verb. ''I
        SUGGEST he STUDY.'''
      where_to_start: Practice suggest/recommend/insist with base verb.
      exercises:
      - name: subjunctive Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'subjunctive' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: subjunctive Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'subjunctive' errors.
          Students identify and correct each error.
        duration: 15
      - name: subjunctive Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subjunctive'
          structure.
        duration: 10
      - name: subjunctive Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subjunctive'
          errors.
        duration: 15
      sequencing: Introduce subjunctive with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I suggest that he STUDIES harder.'' Formal: ''I SUGGEST he STUDY harder.'''
    - 'Wrong: ''The teacher insisted that she APPLIES.'' Correct: ''...insisted that
      she APPLY.'''
    - '''They recommended that the meeting BE postponed.'''
    sources:
    - Huddleston, R. & Pullum, G. (2002). The Cambridge grammar of the English language.
    - Gonzalez Lopez, A. (2010).
