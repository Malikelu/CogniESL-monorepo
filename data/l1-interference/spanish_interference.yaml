          pronouns' structure.
        duration: 10
      - name: possessive pronouns Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'possessive pronouns'
          errors.
        duration: 15
      sequencing: Introduce possessive pronouns with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''This is her.'' (pointing at book). Correct: ''This is HERS.'' or ''This
