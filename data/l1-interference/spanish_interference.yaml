  second_conditional:
    interference_patterns:
    - pattern: Imperfect subjunctive transferred to English conditional
      example_l1: Si tuviera dinero, viajaría.
      example_gloss: If I had (subjunctive) money, I would travel.
      example_wrong: If I would have money, I would travel.
      example_correct: If I had money, I would travel.
      explanation: Spanish conditional sentences use imperfect subjunctive in the
        if-clause (Si tuviera) and conditional in the main clause (viajaría). English
        uses simple past in the if-clause (If I had) and "would" in the main clause.
        Spanish speakers produce "If I would have" — transferring the conditional
        to the if-clause.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    why_it_happens: 'Type 2: UNREAL/NOW. If-clause: PAST TENSE (were for all). Result:
      WOULD + base.'
