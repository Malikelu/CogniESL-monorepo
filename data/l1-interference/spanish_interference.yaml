  substitution_advanced:
    interference_patterns:
    - pattern: Using do so, one, ones to avoid repetition
      example_l1: ¿Te gusta el rojo? Sí, lo prefiero.
      example_gloss: Do you like the red? Yes, I prefer it.
      example_wrong: Do you like the red? Yes, I prefer.
      example_correct: Do you like the red one? Yes, I prefer it.
      explanation: 'Spanish uses "lo/la/los/las" for substitution (Sí, lo prefiero
        = Yes, I prefer it). English uses "one/ones" after adjectives (the red one)
        and "do so" for verb phrases. Spanish speakers may omit the substitute: "I
        prefer" instead of "I prefer it/the red one."'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish "lo" for substitution differs from English
      example_l1: ¿Lo hiciste? Sí, lo hice.
      example_gloss: It you did? Yes, it I did.
      example_wrong: Did you do? Yes, I did.
      example_correct: Did you do it? Yes, I did.
      explanation: Spanish "lo" is a clitic pronoun that precedes the verb. English
        "it" follows the verb. Spanish speakers may omit the object in English because
        the Spanish clitic is obligatory and they transfer this pattern.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Do so = repeat the action. One/ones = repeat the noun.
    teacher_tips:
      how_to_explain: '''Do so'' replaces the whole verb phrase. ''One/ones'' replaces
        the noun.'
      where_to_start: Practice substitution in conversation.
      exercises:
      - name: substitution advanced Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'substitution advanced' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: substitution advanced Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'substitution advanced'
          errors. Students identify and correct each error.
        duration: 15
      - name: substitution advanced Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'substitution
          advanced' structure.
        duration: 10
      - name: substitution advanced Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'substitution
          advanced' errors.
        duration: 15
      sequencing: Introduce substitution advanced with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''I need a red pen.'' ''I have ONE.'' (not ''I have a red pen.'' again)'
    - '''She can''t attend but her sister CAN DO.'' (do so = attend)'
    - '''Do you speak French?'' ''Yes, I DO SO.'' (formal) or ''Yes, I DO.'' (informal).'
    sources:
