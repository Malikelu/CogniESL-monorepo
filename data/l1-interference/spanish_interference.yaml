  copula_be:
    interference_patterns:
    - pattern: Copula "be" used where Spanish uses tener
      example_l1: Tengo hambre. / Tengo frío.
      example_gloss: I have hunger. / I have cold.
      example_wrong: I have hunger. / I have cold.
      example_correct: I am hungry. / I am cold.
      explanation: Spanish uses tener (to have) for states that English expresses
        with "be" (tener hambre = be hungry, tener frío = be cold, tener sed = be
        thirsty, tener razón = be right). Spanish speakers produce "I have hunger"
        instead of "I am hungry."
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Copula "be" used where Spanish uses haber
      example_l1: Hay un problema.
      example_gloss: There is/It has a problem.
      example_wrong: It has a problem. (when existential)
      example_correct: There is a problem.
      explanation: Spanish "hay" covers both existential "there is" and other meanings.
        English distinguishes "there is" (existence) from "it has" (possession). Spanish
        speakers may use "it has" where English requires "there is."
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Copula "be" overused for age (Spanish uses tener)
      example_l1: Tengo veinte años.
      example_gloss: I have twenty years.
      example_wrong: I have twenty years.
      example_correct: I am twenty years old.
      explanation: Spanish expresses age with tener (to have) + number + años. English
        uses "to be" + number + years old. Spanish speakers produce "I have twenty
        years" instead of "I am twenty years old."
      frequency: 5
      persistence: 2
      communicative_impact: 3
    why_it_happens: English sometimes requires 'be' and sometimes doesn't.
    teacher_tips:
      how_to_explain: Use 'am/is/are' for states and identity. NOT with stative verbs.
      where_to_start: Practice present tense copula sentences.
      exercises:
      - name: copula be Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'copula be' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: copula be Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'copula be' errors. Students
          identify and correct each error.
        duration: 15
      - name: copula be Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'copula
          be' structure.
        duration: 10
      - name: copula be Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'copula be' errors.
        duration: 15
      sequencing: Introduce copula be with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
