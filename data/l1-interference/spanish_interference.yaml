  inversion_negative:
    interference_patterns:
    - Failure to invert after negative adverbials
    - Spanish allows adverb-fronting without inversion
    why_it_happens: Spanish doesn't use subject-auxiliary inversion. English requires
      it after negative adverbs.
    teacher_tips:
      how_to_explain: 'After NEVER, RARELY, SELDOM, HARDLY: INVERT subject and auxiliary.'
      where_to_start: Practice with negative adverbials.
      exercises:
      - name: inversion negative Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'inversion negative' structure. Emphasize the structural difference
          between Spanish and English.
