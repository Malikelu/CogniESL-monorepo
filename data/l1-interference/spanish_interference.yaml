  link_words_advanced:
    interference_patterns:
    - pattern: Advanced link words transferred from Spanish
      example_l1: Además, sin embargo, por lo tanto
      example_gloss: Besides, however, therefore
      example_wrong: Besides of this, however that, for this reason that
      example_correct: Besides this, however, for this reason
      explanation: Spanish link words (además, sin embargo, por lo tanto, no obstante)
        do not always map directly to English. Spanish speakers may produce "Besides
        of this" (from además de) instead of "Besides this" or "In addition to this."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Spanish markers (sin embargo, no obstante) have English equivalents.
    teacher_tips:
      how_to_explain: HOWEVER, MOREOVER, FURTHERMORE, CONSEQUENTLY, NEVERTHELESS.
        Use in academic writing.
      where_to_start: Practice academic paragraph transitions.
      exercises:
      - name: link words advanced Contrastive Drill
        type: translation
