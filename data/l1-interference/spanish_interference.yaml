    - Spanish has ~14 tenses; English has ~12 with different usage
    why_it_happens: Each Spanish tense maps to different English tense(s).
    teacher_tips:
      how_to_explain: 'Learn the mapping: pretérito indefinido->simple past, pretérito
        imperfecto->past continuous/did, pretérito perfecto->present perfect, etc.'
      where_to_start: Use a tense comparison chart.
      exercises:
      - name: tenses overview Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'tenses overview' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: tenses overview Error Correction
