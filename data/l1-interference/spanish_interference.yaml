  articles:
    interference_patterns:
    - Definite articles overused in generic contexts
    - Zero article not produced for general/abstract nouns
    - Indefinite article omitted before singular count nouns
    why_it_happens: Spanish always marks nouns with articles. English requires zero
      article for generics.
    teacher_tips:
      how_to_explain: 'Generic plural = NO article: ''Dogs are friendly.'' Specific
        = THE. First mention = A/AN.'
      where_to_start: Practice generic statements with no article.
      exercises:
      - name: articles Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'articles' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: articles Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'articles' errors. Students
          identify and correct each error.
        duration: 15
      - name: articles Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'articles'
          structure.
        duration: 10
      - name: articles Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'articles' errors.
        duration: 15
      sequencing: Introduce articles with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''The dogs are friendly.'' (generic). Correct: ''DOGS are friendly.'''
    - 'Wrong: ''I enjoy the music.'' (general). Correct: ''I enjoy MUSIC.'''
    - 'Wrong: ''She is teacher.'' Correct: ''She is A teacher.'''
    - 'Spanish: ''El agua es importante'' = English: ''WATER is important.'''
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference.'
    - Montrul, S. & Perez-Leroux, A. T. (2003). The generic structure of bare nominals.
    - Schmitt, N. & Marsden, E. (2020). Routledge Handbook of Second Language Acquisition.
