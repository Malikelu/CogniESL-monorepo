  zero_article:
    interference_patterns:
    - pattern: Zero article use for general/abstract/uncountable nouns
      example_l1: Me gusta la música.
      example_gloss: I like the music.
      example_wrong: I like the music.
      example_correct: I like music.
      explanation: Spanish requires definite articles before abstract nouns and nouns
        used in a general sense (la música, la vida, el amor). English uses zero article
        for uncountable/abstract nouns in general statements. Spanish speakers insert
        "the" where English requires none.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: After school, by car, at home, in English
      example_l1: Voy a la escuela. / En coche. / En casa.
      example_gloss: I go to the school. / In car. / In house.
      example_wrong: I go to the school. / By car. / At home.
      example_correct: I go to school. / By car. / At home.
      explanation: Spanish uses definite articles before places (a la escuela, en
        la casa). English uses zero article for institutions (go to school, go to
        church, go to bed) and fixed expressions (by car, at home, at night). Spanish
        speakers overuse "the" in these expressions.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: English uses zero article for general statements, institutions,
      means of transport.
    teacher_tips:
      how_to_explain: 'General plurals: ''DOGS are friendly.'' Abstract: ''LOVE is
        blind.'' Institutions: ''He''s in SCHOOL.'''
      where_to_start: Practice after common prepositions and general statements.
      exercises:
      - name: zero article Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'zero article' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: zero article Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'zero article' errors.
          Students identify and correct each error.
        duration: 15
      - name: zero article Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'zero
          article' structure.
        duration: 10
      - name: zero article Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'zero article'
          errors.
        duration: 15
      sequencing: Introduce zero article with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I went to THE school.'' (general). Correct: ''I went to school.'''
    - '''I go to CHURCH on Sundays.'' (general attendance, not a specific church).'
    - '''By CAR is faster than by bus.'' (means of transport).'
    sources:
    - Swan, M. & Smith, B. (2001).
    - Quirk, R. et al. (1985).
