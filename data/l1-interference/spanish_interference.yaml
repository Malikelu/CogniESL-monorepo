          if only past' structure.
        duration: 10
      - name: wish if only past Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'wish if only
          past' errors.
        duration: 15
      sequencing: Introduce wish if only past with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
