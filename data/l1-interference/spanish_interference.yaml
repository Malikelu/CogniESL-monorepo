  participial_clauses_advanced:
    interference_patterns:
    - pattern: Advanced participial clauses replacing relatives/temporals
      example_l1: Terminado el trabajo, nos fuimos.
      example_gloss: Finished the work, we left.
      example_wrong: Finished the work, we left.
      example_correct: Having finished the work, we left. / After finishing the work,
        we left.
      explanation: 'Spanish uses absolute participial constructions (terminado el
        trabajo) to replace relative or temporal clauses. English requires "having
        + past participle" or "after + gerund." Spanish speakers may produce dangling
        participles: "Finished the work, we left."'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Dangling participles transferred from Spanish
      example_l1: Llegando a casa, sonó el teléfono.
      example_gloss: Arriving home, rang the phone.
      example_wrong: Arriving home, the phone rang.
      example_correct: When I arrived home, the phone rang. / Arriving home, I heard
        the phone ring.
      explanation: 'Spanish allows participial clauses with an implicit subject that
        may differ from the main clause subject. English requires the participial
        clause subject to match the main clause subject. Spanish speakers produce
        dangling participles: "Arriving home, the phone rang."'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Present participle = active/ongoing. Past participle = passive/completed.
    teacher_tips:
      how_to_explain: Participle must share subject with main clause. Check for dangling.
      where_to_start: Practice with clear subject relationships.
      exercises:
      - name: participial clauses advanced Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'participial clauses advanced' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: participial clauses advanced Error Correction
