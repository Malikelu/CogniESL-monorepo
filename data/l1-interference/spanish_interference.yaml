  inversion_negative:
    interference_patterns:
    - pattern: Subject-auxiliary inversion not applied after negative fronting
      example_l1: Nunca he visto eso.
      example_gloss: Never I have seen that.
      example_wrong: Never I have seen that.
      example_correct: Never have I seen that.
      explanation: Spanish places the negative word before the verb without inversion
        (Nunca he visto). English requires subject-auxiliary inversion after fronted
        negative adverbs (Never have I seen, Seldom do we go, Rarely does he call).
        Spanish speakers maintain Spanish word order, producing "Never I have seen."
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish doesn't use subject-auxiliary inversion. English requires
      it after negative adverbs.
    teacher_tips:
      how_to_explain: 'After NEVER, RARELY, SELDOM, HARDLY: INVERT subject and auxiliary.'
      where_to_start: Practice with negative adverbials.
      exercises:
      - name: inversion negative Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'inversion negative' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: inversion negative Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'inversion negative'
          errors. Students identify and correct each error.
        duration: 15
      - name: inversion negative Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'inversion
          negative' structure.
        duration: 10
      - name: inversion negative Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'inversion negative'
          errors.
        duration: 15
      sequencing: Introduce inversion negative with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
