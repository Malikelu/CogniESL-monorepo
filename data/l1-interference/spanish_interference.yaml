    teacher_tips:
      how_to_explain: 'LEARN FALSE COGNATES: embarazada, exito, sopa, ropa, sala,
        vaso, introducir, actual, sensible.'
      where_to_start: Study false cognate lists.
      exercises:
      - name: false cognates Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'false cognates' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
