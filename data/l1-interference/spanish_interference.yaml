          negative' structure.
        duration: 10
      - name: inversion negative Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'inversion negative'
          errors.
        duration: 15
      sequencing: Introduce inversion negative with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''Never I have been to Australia.'' Correct: ''NEVER HAVE I been.'''
