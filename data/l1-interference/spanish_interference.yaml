  past_simple_vs_continuous:
    interference_patterns:
    - pattern: Past simple vs past continuous distinction
      example_l1: Estudiaba cuando llegaste.
      example_gloss: I was studying when you arrived.
      example_wrong: I studied when you arrived.
      example_correct: I was studying when you arrived.
      explanation: Spanish imperfect (estudiaba) covers both English simple past and
        past continuous. English distinguishes completed actions (studied) from ongoing
        actions (was studying). Spanish speakers may use simple past where English
        requires past continuous for background actions.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Spanish uses pretérito for both completed and ongoing past
      example_l1: Comí ayer. / Comía cuando llegó.
      example_gloss: I ate yesterday. / I was eating when he arrived.
      example_wrong: I ate when he arrived. (for ongoing action)
      example_correct: I was eating when he arrived.
      explanation: 'Spanish distinguishes pretérito (completed: comí) from imperfect
        (ongoing: comía). English uses simple past vs past continuous. Spanish speakers
        may not use the past continuous for background actions, producing "I ate when
        he arrived" instead of "I was eating when he arrived."'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: SIMPLE PAST = completed. CONTINUOUS = in progress at past time.
    teacher_tips:
      how_to_explain: WHILE + past continuous (longer action). Simple past (shorter
        interrupting action).
      where_to_start: Practice with interruption scenarios.
      exercises:
      - name: past simple vs continuous Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'past simple vs continuous' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: past simple vs continuous Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'past simple vs continuous'
          errors. Students identify and correct each error.
        duration: 15
      - name: past simple vs continuous Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'past
          simple vs continuous' structure.
        duration: 10
      - name: past simple vs continuous Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'past simple
          vs continuous' errors.
        duration: 15
      sequencing: Introduce past simple vs continuous with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
    examples:
    - '''WHILE I was COOKING (cont.), the phone RANG (simple past).'''
    - 'Wrong: ''When she arrived, I watch TV.'' Correct: ''I WAS WATCHING.'''
    - '''I LIVED in Madrid for 5 years.'' (completed) vs ''I WAS LIVING there when
      I met her.'' (in progress).'
