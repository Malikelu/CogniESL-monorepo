    why_it_happens: WHO did the work? (no inversion for subject questions). Whom DID
      you see? (inversion for object).
    teacher_tips:
      how_to_explain: 'Subject question: Who + verb + object? Object question: Whom
        + auxiliary + subject + verb?'
      where_to_start: Practice distinguishing subject vs object Wh- questions.
      exercises:
      - name: subject questions Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'subject questions' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: subject questions Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'subject questions' errors.
          Students identify and correct each error.
        duration: 15
      - name: subject questions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subject
          questions' structure.
        duration: 10
      - name: subject questions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subject questions'
          errors.
        duration: 15
      sequencing: Introduce subject questions with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Who CAME to the party?'' (subject question, no auxiliary).'
    - '''Whom DID you invite?'' (object question, auxiliary needed).'
    - '''Which book did you read?'' (object). ''Which book is MORE interesting?''
      (subject).'
