        duration: 10
      - name: unreal past Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'unreal past'
          errors.
        duration: 15
      sequencing: Introduce unreal past with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
