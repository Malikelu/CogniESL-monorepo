          vs going to' structure.
        duration: 10
      - name: will vs going to Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'will vs going
          to' errors.
        duration: 15
      sequencing: Introduce will vs going to with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
