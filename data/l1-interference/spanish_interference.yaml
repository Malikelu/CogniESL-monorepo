  conditionals_overview:
    interference_patterns:
    - pattern: Conditional sentence structure transferred from Spanish
      example_l1: Si + imperfect subjunctive, conditional
      example_gloss: If + past tense, would + verb
      example_wrong: If I would have, I would go.
      example_correct: If I had, I would go.
      explanation: Spanish conditional sentences use subjunctive in the if-clause
        and conditional in the main clause. English uses past tense in the if-clause
        and "would" in the main clause. Spanish speakers may transfer the conditional
        to the if-clause ("If I would have").
      frequency: 4
      persistence: 4
      communicative_impact: 4
    - pattern: Present/present pattern for real conditions
      example_l1: Si llueve, me quedo.
      example_gloss: If it rains, I stay.
      example_wrong: If it rains, I stay. (for future)
      example_correct: If it rains, I will stay.
      explanation: Spanish uses present/present for real conditions. English uses
        present/will for future real conditions. Spanish speakers may not use "will"
        in the main clause for future conditions.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Ojalá + subjunctive transferred to English
      example_l1: Ojalá que venga.
      example_gloss: I hope that he comes (subjunctive).
      example_wrong: I hope that he comes. (correct in English)
      example_correct: I hope he comes. / I hope he will come.
      explanation: Spanish uses "ojalá" + subjunctive for wishes. English uses "I
        hope" + present or future (not subjunctive). Spanish speakers may try to use
        the subjunctive in English after "I hope," which is not standard.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Spanish conditionals are simpler. Three English types have different
      tenses.
    teacher_tips:
      how_to_explain: 'Type 1: If + present, will + base. Type 2: If + past, would
        + base. Type 3: If + past perfect, would have + V3.'
      where_to_start: Start with Type 1, then contrast with 2 and 3.
      exercises:
      - name: conditionals overview Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'conditionals overview' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: conditionals overview Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'conditionals overview'
          errors. Students identify and correct each error.
        duration: 15
      - name: conditionals overview Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'conditionals
          overview' structure.
        duration: 10
      - name: conditionals overview Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'conditionals
          overview' errors.
        duration: 15
      sequencing: Introduce conditionals overview with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''If I will have money, I buy.'' Correct: ''If I HAVE money, I WILL
      buy.'''
    - '''If it rains, I''ll stay home.'' (Type 1 - correct).'
    sources:
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
