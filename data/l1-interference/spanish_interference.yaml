        description: Students create 5 original sentences using correct English 'position
          of adverbs' structure.
        duration: 10
      - name: position of adverbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'position of
          adverbs' errors.
        duration: 15
      sequencing: Introduce position of adverbs with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
