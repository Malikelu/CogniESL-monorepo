        duration: 10
      - name: prepositions of time Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'prepositions
          of time' errors.
        duration: 15
      sequencing: Introduce prepositions of time with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
