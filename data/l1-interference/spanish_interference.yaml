          any' structure.
        duration: 10
      - name: some any Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'some any' errors.
        duration: 15
      sequencing: Introduce some any with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - '''Do you have SOME free time?'' (expecting yes). ''Do you have ANY free time?''
      (genuine question).'
    - '''I need SOME help.'' (affirmative). ''I don''t need ANY help.'' (negative).'
    - 'Wrong: ''I don''t have some money.'' Correct: ''I don''t have ANY money.'''
