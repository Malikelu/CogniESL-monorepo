  should_shouldnt:
    interference_patterns:
    - pattern: Spanish "debería" = should; "debería no" = shouldn't
      example_l1: Deberías estudiar más.
      example_gloss: You should study more.
      example_wrong: You should study more. (correct but may be underused)
      example_correct: You should study more.
      explanation: Spanish "debería" maps to English "should" for advice/recommendation.
        Spanish speakers may underuse "should" because Spanish also uses other structures
        for advice (tienes que, hay que, conviene).
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Should for advice/recommendation
      example_l1: No deberías fumar.
      example_gloss: You should not smoke.
      example_wrong: You no should smoke.
      example_correct: You should not smoke.
      explanation: Spanish "no deberías" maps to English "shouldn't/should not." Spanish
        speakers may produce "You no should smoke" — transferring Spanish negation
        placement before the modal.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: SHOULD = advice or recommendation. OUGHT TO = same meaning, more
      formal.
    teacher_tips:
      how_to_explain: You SHOULD study. = Deberias estudiar. No 'to' after should.
      where_to_start: Practice giving and receiving advice.
      exercises:
      - name: should shouldnt Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'should shouldnt' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: should shouldnt Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'should shouldnt' errors.
          Students identify and correct each error.
        duration: 15
      - name: should shouldnt Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'should
          shouldnt' structure.
        duration: 10
      - name: should shouldnt Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'should shouldnt'
          errors.
        duration: 15
      sequencing: Introduce should shouldnt with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''You should to study.'' Correct: ''You SHOULD study.'''
    - '''I shouldn''t have eaten so much.'' (past regret).'
    - '''You should see a doctor.'' (recommendation).'
