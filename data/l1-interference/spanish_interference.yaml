  would_sooner:
    interference_patterns:
    - pattern: '"Would sooner" = "would rather" (more formal/literary)'
      example_l1: Preferiría morir antes que rendirme.
      example_gloss: I would prefer to die before surrendering.
      example_wrong: I would prefer to die before surrendering. (correct but "would
        sooner" is rare)
      example_correct: I would sooner die than surrender.
      explanation: English "would sooner" is a formal/literary equivalent of "would
        rather." Spanish speakers are unlikely to encounter or use this form, preferring
        "would rather" or "would prefer."
      frequency: 1
      persistence: 1
      communicative_impact: 1
    - pattern: Spanish "preferiría"
      example_l1: Preferiría no hacerlo.
      example_gloss: I would prefer not to do it.
      example_wrong: I would prefer not to do it. (correct)
      example_correct: I would prefer not to do it.
      explanation: Spanish "preferiría" maps to English "would prefer" or "would sooner."
        Spanish speakers are unlikely to use "would sooner" as it is rare and formal.
      frequency: 1
      persistence: 1
      communicative_impact: 1
    why_it_happens: WOULD SOONER is rarer and more formal than WOULD RATHER.
    teacher_tips:
      how_to_explain: Interchangeable with 'would rather'. WOULD SOONER + bare verb.
      where_to_start: Recognize in reading; less common in speech.
      exercises:
      - name: would sooner Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
