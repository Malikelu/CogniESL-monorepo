  would_rather_prefer:
    interference_patterns:
    - pattern: '"Would rather" vs "would prefer" patterns'
      example_l1: Prefiero ir. / Preferiría que fueras.
      example_gloss: I prefer to go. / I would prefer that you went.
      example_wrong: I would rather to go. / I would prefer you went.
      example_correct: I would rather go. / I would prefer you to go.
      explanation: 'English "would rather" takes the bare infinitive (would rather
        go) while "would prefer" takes the to-infinitive (would prefer to go). Spanish
        speakers may confuse these patterns: "would rather to go" or "would prefer
        go."'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Different structures for same concept
      example_l1: Prefiero no ir.
      example_gloss: I prefer not to go.
      example_wrong: I would rather not to go.
      example_correct: I would rather not go.
      explanation: English "would rather not" takes the bare infinitive (not go),
        not the to-infinitive (not to go). Spanish speakers may produce "would rather
        not to go" — adding "to" after "rather."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: WOULD RATHER + bare verb. WOULD PREFER + to-infinitive.
    teacher_tips:
      how_to_explain: '''I''d rather STAY.'' = ''I would prefer TO stay.'' Same meaning,
        different structure.'
      where_to_start: Practice both forms.
      exercises:
      - name: would rather prefer Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'would rather prefer' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: would rather prefer Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'would rather prefer'
          errors. Students identify and correct each error.
        duration: 15
      - name: would rather prefer Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'would
          rather prefer' structure.
        duration: 10
      - name: would rather prefer Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'would rather
          prefer' errors.
        duration: 15
      sequencing: Introduce would rather prefer with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''I would rather LEAVE now.'' = ''I would prefer TO leave now.'''
    - '''She would rather EAT at home.'' = ''She would prefer TO eat at home.'''
    - 'Note: ''Would rather'' sounds slightly more direct/informal.'
    sources:
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
