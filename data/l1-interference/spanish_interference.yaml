        description: Students create 5 original sentences using correct English 'phrasal
          verbs' structure.
        duration: 10
      - name: phrasal verbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'phrasal verbs'
          errors.
        duration: 15
      sequencing: Introduce phrasal verbs with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
