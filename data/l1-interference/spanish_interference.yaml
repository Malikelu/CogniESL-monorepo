  subject_object_pronouns:
    interference_patterns:
    - pattern: Subject pronoun case errors
      example_l1: Yo lo vi. / Él me dio.
      example_gloss: I saw him. / He gave me.
      example_wrong: Me saw he. / Him gave I.
      example_correct: I saw him. / He gave me.
      explanation: Spanish subject pronouns (yo, tú, él, ella, nosotros, ellos) and
        object pronouns (me, te, lo, la, nos, los, las) have different forms. English
        also distinguishes subject (I, he, she, we, they) from object (me, him, her,
        us, them) pronouns. Spanish speakers may confuse case forms, especially since
        Spanish clitic pronouns precede the verb while English object pronouns follow.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish pronouns have different subject/object forms. Mapping
      is irregular.
    teacher_tips:
      how_to_explain: 'SUBJECT does the action: HE runs. OBJECT receives: I see HIM.'
      where_to_start: Practice with physical actions.
      exercises:
      - name: subject object pronouns Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'subject object pronouns' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: subject object pronouns Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'subject object pronouns'
          errors. Students identify and correct each error.
        duration: 15
      - name: subject object pronouns Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subject
          object pronouns' structure.
        duration: 10
      - name: subject object pronouns Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subject object
          pronouns' errors.
        duration: 15
      sequencing: Introduce subject object pronouns with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
    examples:
