  past_simple:
    interference_patterns:
    - pattern: Present perfect used where English requires simple past
      example_l1: He viajado a España el año pasado.
      example_gloss: I have traveled to Spain last year.
      example_wrong: I have traveled to Spain last year.
      example_correct: I traveled to Spain last year.
      explanation: Spanish uses the present perfect more broadly than English, often
        for completed past actions with specific time references. English requires
        the simple past with specific past time markers (last year, yesterday, in
        1990).
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Imperfect used where English requires simple past
      example_l1: Cuando era niño, fui al parque todos los días.
      example_gloss: When I was a child, I went/was going to the park every day.
      example_wrong: When I was a child, I was going to the park every day.
      example_correct: When I was a child, I went to the park every day.
      explanation: Spanish imperfect (iba) describes habitual past actions, background,
        and ongoing states. English uses simple past for completed/habitual actions.
        Spanish speakers may overuse the past continuous ("was going") to translate
        the imperfect, when English would use simple past ("went") for habitual actions.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish compound past more salient than simple past.
    teacher_tips:
      how_to_explain: 'Simple past = one form: ''I ATE.'' Regular: add -ed. Irregular:
        memorized.'
      where_to_start: Learn the 50 most common irregular past tense verbs.
      exercises:
      - name: past simple Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'past simple' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: past simple Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'past simple' errors.
          Students identify and correct each error.
        duration: 15
      - name: past simple Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'past
          simple' structure.
        duration: 10
      - name: past simple Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'past simple'
          errors.
        duration: 15
      sequencing: Introduce past simple with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
