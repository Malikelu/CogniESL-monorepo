  much_many:
    interference_patterns:
    - pattern: Much used with countable nouns
      example_l1: Muchos libros.
      example_gloss: Much books.
      example_wrong: Much books.
      example_correct: Many books.
      explanation: 'Spanish "mucho/os/as" is used with both countable and uncountable
        nouns. English distinguishes "much" (uncountable: much water) from "many"
        (countable: many books). Spanish speakers overuse "much" with countable nouns.'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    why_it_happens: MUCH + uncountable noun. MANY + countable noun.
    teacher_tips:
      how_to_explain: 'Ask: Is the noun countable? Yes->many. No->much.'
      where_to_start: Practice with common nouns in both categories.
      exercises:
      - name: much many Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'much many' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: much many Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'much many' errors. Students
          identify and correct each error.
        duration: 15
      - name: much many Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'much
          many' structure.
        duration: 10
      - name: much many Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'much many' errors.
        duration: 15
      sequencing: Introduce much many with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I have many homework.'' Correct: ''I have MUCH homework.'' (uncountable).'
    - 'Wrong: ''How much people?'' Correct: ''How MANY people?'' (countable).'
