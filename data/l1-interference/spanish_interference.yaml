          placement' structure.
        duration: 10
      - name: adverb placement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'adverb placement'
          errors.
        duration: 15
      sequencing: Introduce adverb placement with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
