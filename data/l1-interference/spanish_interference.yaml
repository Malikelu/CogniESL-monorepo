  false_cognates:
    interference_patterns:
    - pattern: Spanish-English false cognates cause frequent lexical errors
      example_l1: La fábrica es grande.
      example_gloss: The fabric/factory is big.
      example_wrong: The fabric is big.
      example_correct: The factory is big.
      explanation: 'False cognates (falsos amigos) are words that look similar in
        both languages but differ in meaning. Classic examples: fábrica (factory,
        not fabric), éxito (success, not exit), embarazada (pregnant, not embarrassed),
        actual (current, not actual), colegio (school, not college), asistir (to attend,
        not to assist). These cause persistent errors because the similar form creates
        a false sense of recognition.'
      frequency: 5
      persistence: 4
      communicative_impact: 5
    - pattern: Deceptive cognates lead to overgeneralization of derivational patterns
      example_l1: '*aborción (for aborto), *deterioración (for deterioro)'
      example_gloss: '*abortion (wrong form), *deterioration (wrong form)'
      example_wrong: '*aborción, *deterioración'
      example_correct: aborto, deterioro
      explanation: 'Spanish speakers may overgeneralize cognate derivational patterns,
        creating "Spanglish" words that do not exist in either language. For example,
        English "-tion" maps to Spanish "-ción," so speakers may create *vaccinación
        (correct: vacunación), *procrastinar (correct: aplazar), *serioso (correct:
        serio). This reflects productive but incorrect morphological transfer.'
      frequency: 4
      persistence: 3
      communicative_impact: 4
    why_it_happens: Many common words look similar but mean different things.
    teacher_tips:
      how_to_explain: 'LEARN FALSE COGNATES: embarazada, exito, sopa, ropa, sala,
        vaso, introducir, actual, sensible.'
      where_to_start: Study false cognate lists.
      exercises:
      - name: false cognates Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'false cognates' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: false cognates Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'false cognates' errors.
          Students identify and correct each error.
        duration: 15
      - name: false cognates Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'false
          cognates' structure.
        duration: 10
      - name: false cognates Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'false cognates'
          errors.
        duration: 15
      sequencing: Introduce false cognates with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Estoy embarazada'' = ''I am PREGNANT.'' NOT ''I am embarrassed.'''
    - '''El exito de la pelicula'' = ''The SUCCESS.'' NOT ''The exit.'''
    - '''Necesito ropa nueva'' = ''I need CLOTHES.'' NOT ''I need rope.'''
    sources:
    - Lado, A. (1957). Linguistics across cultures.
    - Ringbom, H. (2007). The role of the first language in vocabulary learning.
