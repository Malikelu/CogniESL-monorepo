  order_of_adjectives:
    interference_patterns:
    - pattern: Spanish noun-adjective order transferred
      example_l1: un carro rojo
      example_gloss: a car red
      example_wrong: a car red
      example_correct: a red car
      explanation: Spanish places most adjectives AFTER the noun (un carro rojo, una
        casa grande). English places adjectives BEFORE the noun (a red car, a big
        house). This post-nominal adjective placement is one of the most visible transfer
        errors for Spanish speakers.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Participial adjectives misplaced
      example_l1: una casa construida en 1900
      example_gloss: a house built in 1900
      example_wrong: a house built in 1900. (correct but may be underused)
      example_correct: a house built in 1900.
      explanation: Spanish uses post-nominal participial adjectives (una casa construida).
        English also uses post-nominal participial phrases but may prefer pre-nominal
        adjectives in some cases. Spanish speakers may produce overly complex post-nominal
        phrases where a simpler pre-nominal adjective would be more natural.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    why_it_happens: Spanish adjectives typically follow the noun they modify, while
      English adjectives precede the noun. Spanish learners may produce phrases like
      'car red' instead of 'red car.' This transfer occurs because adjective placement
      is deeply automatized from L1 acquisition.
    teacher_tips:
      how_to_explain: Determiner + Opinion + Size + Age + Shape + Color + Origin +
        Material + Purpose + NOUN.
      where_to_start: Practice with 2-adjective combinations.
      exercises:
      - name: order of adjectives Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'order of adjectives' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: order of adjectives Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'order of adjectives'
          errors. Students identify and correct each error.
        duration: 15
      - name: order of adjectives Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'order
          of adjectives' structure.
        duration: 10
      - name: order of adjectives Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'order of adjectives'
          errors.
        duration: 15
      sequencing: Introduce order of adjectives with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
