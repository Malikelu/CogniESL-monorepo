  infinitive_of_purpose:
    interference_patterns:
    - pattern: Infinitive of purpose without "to"
      example_l1: Vengo comer.
      example_gloss: I come eat.
      example_wrong: I come eat.
      example_correct: I come to eat.
      explanation: 'Spanish uses the infinitive directly after verbs of movement for
        purpose (Vengo a comer = I come to eat). English requires "to" before the
        infinitive of purpose. Spanish speakers may omit "to": "I come eat" instead
        of "I come to eat."'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Para + infinitive = 'to + verb'. Formal alternatives include 'in
      order to'.
    teacher_tips:
      how_to_explain: PARA + infinitive = TO + verb. 'Estudio para aprender' = 'I
        study TO learn.'
      where_to_start: Practice purpose expressions.
