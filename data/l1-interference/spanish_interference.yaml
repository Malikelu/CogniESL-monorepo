  passive_voice:
    interference_patterns:
    - pattern: Passive voice avoided in favor of Spanish "se" constructions
      example_l1: Se habla español aquí.
      example_gloss: Speaks itself Spanish here.
      example_wrong: Spanish speaks here.
      example_correct: Spanish is spoken here.
      explanation: Spanish uses "se" constructions (pasiva refleja, impersonal se)
        far more than English uses the passive. "Se habla español" = "Spanish is spoken."
        Spanish speakers may avoid the English passive or use active constructions
        where passive is more natural, or they may try to translate "se" literally.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: English passive = be + past participle. Spanish often uses 'se'
      or active forms.
    teacher_tips:
      how_to_explain: The cake WAS MADE. Practice identifying passive in reading.
      where_to_start: Start with simple present/past passive sentences.
      exercises:
      - name: passive voice Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'passive voice' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
