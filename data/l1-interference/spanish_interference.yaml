  pragmatic_particles:
    interference_patterns:
    - pattern: 'Pragmatic markers: well, okay, right, yeah'
      example_l1: Bueno, vale, claro, ¿no?
      example_gloss: Well, okay, of course, right?
      example_wrong: Good, worth, clear, no?
      example_correct: Well, okay, of course, right?
      explanation: 'Spanish pragmatic particles (bueno, vale, claro, ¿no?, ¿vale?,
        pues) do not map directly to English. Spanish speakers may translate them
        literally: "Good" instead of "Well," "Worth" instead of "Okay," "Clear" instead
        of "Of course."'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish particles differ from English discourse markers
      example_l1: Pues, bueno, o sea, a ver...
      example_gloss: Well, good, that is, to see...
      example_wrong: Well, good, that is, to see...
      example_correct: Well, so, I mean, let's see...
      explanation: Spanish discourse markers (pues, bueno, o sea, a ver, mira, eh)
        have no direct English equivalents. Spanish speakers may transfer these markers
        or use literal translations that sound unnatural in English.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: English and Spanish use different pragmatic particles.
    teacher_tips:
      how_to_explain: WELL = hesitation. OKAY = agreement. RIGHT? = confirmation.
        I MEAN = reformulation.
      where_to_start: Listen for these in natural speech.
      exercises:
      - name: pragmatic particles Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'pragmatic particles' structure. Emphasize the structural difference
          between Spanish and English.
