          followed by ing' structure.
        duration: 10
      - name: verbs followed by ing Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'verbs followed
          by ing' errors.
        duration: 15
      sequencing: Introduce verbs followed by ing with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
