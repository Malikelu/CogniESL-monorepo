  tenses_overview:
    interference_patterns:
    - pattern: Overview of all English tenses vs Spanish system
      example_l1: Estudio / Estudié / Estudiaré / He estudiado
      example_gloss: I study / I studied / I will study / I have studied
      example_wrong: I study / I studied / I will study / I have studied (all correct)
      example_correct: I study / I studied / I will study / I have studied
      explanation: Spanish has approximately 14 tense forms while English has approximately
        12, but they are used differently. Spanish has more synthetic tenses (single-word
        forms) while English uses more analytic forms (auxiliaries + main verbs).
        The systems do not map 1:1.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish has ~14 tenses; English has ~12 with different usage
      example_l1: Si tuviera, viajaría.
      example_gloss: If I had, I would travel.
      example_wrong: If I would have, I would travel.
      example_correct: If I had, I would travel.
      explanation: 'Spanish conditional sentences use subjunctive in the if-clause.
        English uses past tense. Spanish speakers may transfer the conditional to
        the if-clause: "If I would have" instead of "If I had."'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Each Spanish tense maps to different English tense(s).
    teacher_tips:
      how_to_explain: 'Learn the mapping: pretérito indefinido->simple past, pretérito
        imperfecto->past continuous/did, pretérito perfecto->present perfect, etc.'
      where_to_start: Use a tense comparison chart.
      exercises:
      - name: tenses overview Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'tenses overview' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: tenses overview Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'tenses overview' errors.
          Students identify and correct each error.
        duration: 15
      - name: tenses overview Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'tenses
          overview' structure.
        duration: 10
      - name: tenses overview Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'tenses overview'
          errors.
        duration: 15
      sequencing: Introduce tenses overview with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish: ''Como'' (present) = ''I EAT.'' or ''I AM EATING.'' (context-dependent).'
    - 'Spanish: ''Comí'' (pretérito) = ''I ATE.'' or ''I HAVE EATEN.'' (context-dependent).'
    - English context narrows the meaning more than Spanish tense alone.
    sources:
