  concession_clauses:
    interference_patterns:
    - pattern: Concession clause structure transferred from Spanish
      example_l1: Aunque no quiero, lo hago.
      example_gloss: Although I don't want, I do it.
      example_wrong: Although I don't want, but I do it.
      example_correct: Although I don't want to, I do it.
      explanation: Spanish allows "aunque...pero" for concession. English uses only
        one conjunction. Spanish speakers may produce "Although...but" — a double
        conjunction that is ungrammatical in standard English.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish allows double conjunctions like 'aunque...pero' (although...but),
      which is redundant in English. Spanish learners may produce sentences like 'Although
      it rained, but we went out' instead of 'Although it rained, we went out.' This
      transfer occurs because the L1 discourse conventions allow paired conjunctions.
    teacher_tips:
      how_to_explain: ALTHOUGH = even though. Remove 'but' from the sentence.
      where_to_start: Practice 'although' without 'but'.
      exercises:
      - name: concession clauses Contrastive Drill
