  need_to:
    interference_patterns:
    - Spanish 'necesitar + infinitivo' = 'need to'
    - Need to vs must vs have to
    why_it_happens: NEED TO = necessity. Different from MUST (obligation) or HAVE
      TO (external requirement).
    teacher_tips:
      how_to_explain: NEED TO = I need something. MUST = I feel it's necessary. HAVE
        TO = external requirement.
      where_to_start: Practice expressing necessity.
      exercises:
      - name: need to Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'need to' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: need to Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'need to' errors. Students
          identify and correct each error.
        duration: 15
      - name: need to Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'need
          to' structure.
        duration: 10
      - name: need to Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'need to' errors.
        duration: 15
      sequencing: Introduce need to with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - '''I NEED TO study more.'' (I feel the necessity).'
    - 'Wrong: ''I need to must study.'' Choose ONE: ''I NEED TO study.'' or ''I MUST
      study.'''
