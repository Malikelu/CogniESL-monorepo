  pronoun_dropping:
    interference_patterns:
    - pattern: Spanish pro-drop vs English pronoun requirement
      example_l1: Hablo inglés. / Estoy cansado.
      example_gloss: Speak English. / Am tired.
      example_wrong: Speak English. / Am tired.
      example_correct: I speak English. / I am tired.
      explanation: 'Spanish is a pro-drop language — subject pronouns can be omitted
        because verb endings indicate person/number. English requires explicit subjects.
        Spanish speakers frequently omit subject pronouns in English: "Speak English"
        instead of "I speak English," "Am tired" instead of "I am tired." This is
        one of the most persistent errors.'
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: English requires explicit subjects always
      example_l1: Llueve. / Es importante.
      example_gloss: Rains. / Is important.
      example_wrong: Rains. / Is important.
      example_correct: It rains. / It is important.
      explanation: 'Spanish allows subjectless sentences (Llueve = It rains, Es importante
        = It is important). English requires a dummy subject "it" for weather, time,
        and impersonal expressions. Spanish speakers omit "it": "Rains" instead of
        "It rains," "Is important" instead of "It is important."'
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: ENGLISH ALWAYS REQUIRES a subject. 'It is important.' NOT 'Is
      important.'
    teacher_tips:
      how_to_explain: 'Always include a subject: IT, I, HE, SHE, THEY.'
      where_to_start: Practice adding subjects to every sentence.
      exercises:
      - name: pronoun dropping Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'pronoun dropping' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: pronoun dropping Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'pronoun dropping' errors.
          Students identify and correct each error.
        duration: 15
      - name: pronoun dropping Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'pronoun
          dropping' structure.
        duration: 10
      - name: pronoun dropping Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'pronoun dropping'
          errors.
        duration: 15
      sequencing: Introduce pronoun dropping with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''Is raining.'' Correct: ''IT IS RAINING.'''
    - 'Spanish: ''Llueve.'' (no subject) -> English: ''IT rains.'' or ''IT IS RAINING.'''
    - 'Wrong: ''Went to the store.'' Correct: ''I/he/she WENT to the store.'''
    sources:
    - Gonzalez Lopez, A. (2010).
    - Blake, R. (1997). Null subjects in Spanish-English interlanguage.
