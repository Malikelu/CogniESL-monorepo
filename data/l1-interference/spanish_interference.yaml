        description: Students create 5 original sentences using correct English 'pragmatic
          particles' structure.
        duration: 10
      - name: pragmatic particles Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'pragmatic particles'
          errors.
        duration: 15
      sequencing: Introduce pragmatic particles with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
