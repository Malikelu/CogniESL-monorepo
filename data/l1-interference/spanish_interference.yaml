  infinitive_of_purpose:
    interference_patterns:
    - Spanish 'para + infinitive' used but formal alternatives unknown
    - Limited range of purpose expressions
    why_it_happens: Para + infinitive = 'to + verb'. Formal alternatives include 'in
      order to'.
    teacher_tips:
      how_to_explain: PARA + infinitive = TO + verb. 'Estudio para aprender' = 'I
        study TO learn.'
      where_to_start: Practice purpose expressions.
      exercises:
      - name: infinitive of purpose Contrastive Drill
        type: translation
