  present_simple_future:
    interference_patterns:
    - pattern: Present simple for scheduled future events
      example_l1: El tren sale a las seis.
      example_gloss: The train leaves at six.
      example_wrong: The train leaves at six. (correct in English too)
      example_correct: The train leaves at six.
      explanation: Both Spanish and English use the present simple for scheduled future
        events. However, Spanish speakers may overuse this pattern where English would
        prefer "will" or "be going to" for predictions or spontaneous decisions.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Spanish uses present for schedules too
      example_l1: Mañana voy al médico.
      example_gloss: Tomorrow I go to the doctor.
      example_wrong: Tomorrow I go to the doctor.
      example_correct: Tomorrow I am going to the doctor. / I will go to the doctor
        tomorrow.
      explanation: Spanish uses the present tense for near-future plans (Mañana voy).
        English prefers "be going to" or "will" for future plans. Spanish speakers
        may use the present tense where English requires a future form.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: PRESENT SIMPLE for future = timetables, schedules, programs only.
    teacher_tips:
      how_to_explain: 'TIMETABLES only: trains, classes, flights. Personal plans ->
        ''will'' or ''going to''.'
      where_to_start: Identify schedule contexts.
      exercises:
      - name: present simple future Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'present simple future' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: present simple future Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'present simple future'
          errors. Students identify and correct each error.
        duration: 15
      - name: present simple future Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'present
          simple future' structure.
        duration: 10
      - name: present simple future Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'present simple
          future' errors.
        duration: 15
      sequencing: Introduce present simple future with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''The train LEAVES at 6:00 PM.'' (schedule).'
    - '''Classes START at 8 AM.'' (timetable).'
    - 'Wrong: ''I meet my friend tomorrow.'' (personal plan). Correct: ''I AM MEETING''
      or ''I WILL MEET.'''
    sources:
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
