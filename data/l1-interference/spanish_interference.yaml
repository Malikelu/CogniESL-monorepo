  subjunctive_overuse_en:
    interference_patterns:
    - pattern: Subjunctive overused in English due to Spanish L1
      example_l1: Es posible que llueve.
      example_gloss: It is possible that it rains (subjunctive in Spanish).
      example_wrong: It is possible that it rain.
      example_correct: It is possible that it will rain. / It may rain.
      explanation: Spanish requires subjunctive after "es posible que" (es posible
        que llueva). English uses the indicative or modal verbs ("it will rain" /
        "it may rain"). Spanish speakers may try to use the subjunctive in English
        after similar expressions.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: English subjunctive is LIMITED in scope. Spanish subjunctive is
      much broader.
    teacher_tips:
      how_to_explain: '''If I were'' = subjunctive. Not in other ''when'' contexts.'
      where_to_start: Learn the limited contexts for English subjunctive.
      exercises:
      - name: subjunctive overuse en Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'subjunctive overuse en' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: subjunctive overuse en Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'subjunctive overuse
          en' errors. Students identify and correct each error.
        duration: 15
      - name: subjunctive overuse en Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subjunctive
          overuse en' structure.
        duration: 10
      - name: subjunctive overuse en Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subjunctive
          overuse en' errors.
        duration: 15
      sequencing: Introduce subjunctive overuse en with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
