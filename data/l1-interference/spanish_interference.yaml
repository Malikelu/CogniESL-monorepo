  question_forms:
    interference_patterns:
    - pattern: Subject-verb inversion not applied in English questions
      example_l1: ¿Qué quieres tú?
      example_gloss: What want you?
      example_wrong: What you want?
      example_correct: What do you want?
      explanation: Spanish questions maintain declarative word order (¿Qué quieres
        tú? = What want you?) with only intonation or question marks distinguishing
        them. English requires subject-auxiliary inversion and do-support (What do
        you want?). Spanish speakers produce "What you want?" — maintaining Spanish
        word order.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Do-support omitted in questions
      example_l1: ¿Hablas inglés?
      example_gloss: Speak you English?
      example_wrong: You speak English?
      example_correct: Do you speak English?
      explanation: Spanish does not use an auxiliary "do" for questions — the main
        verb carries the tense. English requires "do/does/did" as an auxiliary in
        most questions. Spanish speakers omit "do," producing "You speak English?"
        instead of "Do you speak English?"
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Question word order transferred from Spanish
      example_l1: ¿Cuándo llegaste tú?
      example_gloss: When arrived you?
      example_wrong: When you arrived?
      example_correct: When did you arrive?
      explanation: Spanish questions keep the subject after the verb or at the end.
        English requires auxiliary + subject + main verb (When did you arrive?). Spanish
        speakers transfer the Spanish order, producing "When you arrived?" without
        do-support or inversion.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    why_it_happens: Spanish uses intonation only. English requires subject-auxiliary
      inversion.
    teacher_tips:
      how_to_explain: 'English questions INVERT: ''He is'' -> ''IS he?'' Use DO/DOES
        for present simple.'
      where_to_start: Practice yes/no questions with different tenses.
      exercises:
      - name: question forms Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'question forms' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: question forms Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'question forms' errors.
          Students identify and correct each error.
        duration: 15
      - name: question forms Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'question
          forms' structure.
        duration: 10
      - name: question forms Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'question forms'
          errors.
        duration: 15
      sequencing: Introduce question forms with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''You like pizza?'' Correct: ''DO you LIKE pizza?'''
    - 'Wrong: ''Where he lives?'' Correct: ''WHERE does he LIVE?'''
    - 'Wrong: ''When she arrived?'' Correct: ''WHEN did she ARRIVE?'''
    - '''Can you help me?'' (modal inversion = correct).'
    sources:
    - Gonzalez Lopez, A. (2010).
    - Lipski, J. (1985). Spanish-English interlanguage transfer patterns.
