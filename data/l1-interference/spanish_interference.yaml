  second_conditional:
    interference_patterns:
    - Imperfect subjunctive transferred but main clause wrong
    - Using 'would' in the if-clause
    why_it_happens: 'Type 2: UNREAL/NOW. If-clause: PAST TENSE (were for all). Result:
      WOULD + base.'
    teacher_tips:
      how_to_explain: If I WERE you... WOULD + base. Don't use 'would' in the if-clause.
      where_to_start: Practice with imaginary scenarios.
      exercises:
      - name: second conditional Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'second conditional' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: second conditional Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'second conditional'
          errors. Students identify and correct each error.
        duration: 15
      - name: second conditional Pattern Practice
