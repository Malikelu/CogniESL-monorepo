  pronoun_placement:
    interference_patterns:
    - pattern: Proclitic pronoun placement (before verb) transferred to English
      example_l1: Me lo dio ayer.
      example_gloss: To me it he gave yesterday.
      example_wrong: Me it he gave yesterday.
      example_correct: He gave it to me yesterday.
      explanation: 'Spanish object pronouns are proclitic (placed before the verb):
        me lo dio. English places objects after the verb: "gave it to me." Spanish
        speakers may place pronouns before the verb in English, especially in early
        stages.'
      frequency: 4
      persistence: 3
      communicative_impact: 4
    - pattern: Clitic climbing transferred from Spanish
      example_l1: Quiero verlo.
      example_gloss: I want to see it/him.
      example_wrong: I want it to see.
      example_correct: I want to see it.
      explanation: Spanish allows clitic pronouns to "climb" from an infinitive to
        the main verb (Lo quiero ver / Quiero verlo). English does not have clitic
        climbing — the object stays with its verb. Spanish speakers may misplace pronouns
        when multiple verbs are involved.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Double object pronoun order transferred
      example_l1: Se lo di.
      example_gloss: To him/her it I gave.
      example_wrong: Him it I gave.
      example_correct: I gave it to him.
      explanation: 'Spanish has strict clitic pronoun order (indirect before direct:
        se lo). English uses full noun phrases after the verb. Spanish speakers may
        produce ungrammatical pronoun sequences in English.'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish places object pronouns before conjugated verbs. English
      places them after.
    teacher_tips:
      how_to_explain: Object pronouns ALWAYS go after the verb in English.
      where_to_start: Practice SVO with pronouns.
      exercises:
      - name: pronoun placement Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'pronoun placement' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: pronoun placement Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'pronoun placement' errors.
          Students identify and correct each error.
        duration: 15
      - name: pronoun placement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'pronoun
          placement' structure.
        duration: 10
      - name: pronoun placement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'pronoun placement'
          errors.
        duration: 15
      sequencing: Introduce pronoun placement with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
