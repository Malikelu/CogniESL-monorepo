  non_canonical_clauses:
    interference_patterns:
    - pattern: Non-canonical clause structures transferred from Spanish
      example_l1: Es difícil de entender.
      example_gloss: It is difficult of understanding.
      example_wrong: It is difficult of understanding.
      example_correct: It is difficult to understand.
      explanation: Spanish uses "de" before infinitives in some constructions (difícil
        de entender). English uses "to" (difficult to understand). Spanish speakers
        may produce "of understanding" instead of "to understand."
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish uses 'hay' for existence. English has 'there is/are' with
      different rules.
    teacher_tips:
      how_to_explain: HAY = THERE IS/ARE. 'Hay un problema' = 'There IS a problem.'
      where_to_start: Practice existential sentences.
      exercises:
      - name: non canonical clauses Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'non canonical clauses' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: non canonical clauses Error Correction
