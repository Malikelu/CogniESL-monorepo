  some_any:
    interference_patterns:
    - pattern: Spanish "algún/ningún" vs English "some/any"
      example_l1: ¿Tienes algún libro? No tengo ninguno.
      example_gloss: Do you have some/any book? I don't have none/any.
      example_wrong: Do you have some book? I don't have none.
      example_correct: Do you have any books? I don't have any.
      explanation: Spanish "algún" is used in questions and "ningún" in negatives.
        English uses "any" in both questions and negatives. Spanish speakers may produce
        "Do you have some book?" (using "some" in questions) or "I don't have none"
        (double negation from "ninguno").
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Some in affirmative, any in negative/questions
      example_l1: Quiero algo de pan.
      example_gloss: I want some of bread.
      example_wrong: I want some of bread.
      example_correct: I want some bread.
      explanation: Spanish "algo de" (something of) maps to English "some." Spanish
        speakers may produce "some of bread" instead of "some bread" — transferring
        the Spanish "de."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: SOME in affirmative. ANY in negative and questions. SOME in questions
      = offer/expectation of yes.
    teacher_tips:
      how_to_explain: I have SOME friends. I don't have ANY enemies. Do you have ANY
        questions? (neutral). Would you like SOME tea? (offer).
      where_to_start: Practice with countable and uncountable nouns.
      exercises:
      - name: some any Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'some any' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: some any Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'some any' errors. Students
          identify and correct each error.
        duration: 15
      - name: some any Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'some
          any' structure.
        duration: 10
      - name: some any Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'some any' errors.
        duration: 15
      sequencing: Introduce some any with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - '''Do you have SOME free time?'' (expecting yes). ''Do you have ANY free time?''
      (genuine question).'
    - '''I need SOME help.'' (affirmative). ''I don''t need ANY help.'' (negative).'
    - 'Wrong: ''I don''t have some money.'' Correct: ''I don''t have ANY money.'''
    sources:
