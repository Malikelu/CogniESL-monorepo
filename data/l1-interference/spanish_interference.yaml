  possessive_su:
    interference_patterns:
    - pattern: Spanish "su/sus" ambiguity vs English his/her/its
      example_l1: Su libro. / Su casa.
      example_gloss: His/her/its/your book. / His/her/its/your house.
      example_wrong: His book. (when "her" is intended)
      example_correct: His book. / Her book.
      explanation: Spanish "su" covers his, her, its, your (formal), and their. English
        distinguishes these. Spanish speakers may use "his" for all possessives because
        "su" is ambiguous in Spanish. Context usually clarifies in Spanish, but English
        requires the correct pronoun.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Gender-neutral "su" causes pronoun confusion
      example_l1: María perdió su libro.
      example_gloss: María lost his/her book.
      example_wrong: María lost his book.
      example_correct: María lost her book.
      explanation: Spanish "su" does not indicate the gender of the possessor. English
        requires his/her/its. Spanish speakers may default to "his" for all possessives,
        especially in writing, because Spanish "su" is gender-neutral.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Spanish 'su' = his/her/its/their. English distinguishes.
    teacher_tips:
      how_to_explain: Match pronoun to the subject of the sentence.
      where_to_start: Practice with sentences requiring context for disambiguation.
      exercises:
      - name: possessive su Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'possessive su' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: possessive su Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'possessive su' errors.
          Students identify and correct each error.
        duration: 15
      - name: possessive su Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'possessive
          su' structure.
        duration: 10
      - name: possessive su Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'possessive su'
          errors.
        duration: 15
      sequencing: Introduce possessive su with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish: ''Juan lavo su coche.'' -> English: ''Juan washed HIS car.'' (his
      own).'
    - 'Spanish: ''Maria vio a su madre.'' -> ''Maria saw HER mother.'' (own) or ''his
      mother'' (someone else''s).'
    - '''The dog wagged ITS tail.'' (NOT ''their'' for single animal).'
    sources:
    - Gonzalez Lopez, A. (2010).
    - Swan, M. & Smith, B. (2001).
