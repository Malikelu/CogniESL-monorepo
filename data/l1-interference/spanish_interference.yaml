  unreal_past:
    interference_patterns:
    - pattern: 'Past unreal conditions: "If I had... I would have..."'
      example_l1: Si hubiera estudiado, habría aprobado.
      example_gloss: If I had studied, I would have passed.
      example_wrong: If I would have studied, I would have passed.
      example_correct: If I had studied, I would have passed.
      explanation: Spanish uses pluperfect subjunctive (hubiera estudiado) in the
        if-clause of past unreal conditions. English uses past perfect (had studied).
        Spanish speakers produce "If I would have studied" — transferring the conditional
        to the if-clause.
      frequency: 4
      persistence: 4
      communicative_impact: 4
    - pattern: Spanish "si + pluscuamperfecto de subjuntivo"
      example_l1: Si hubiera sabido, habría venido.
      example_gloss: If I had known, I would have come.
      example_wrong: If I would have known, I would have come.
      example_correct: If I had known, I would have come.
      explanation: Spanish "si + pluscuamperfecto de subjuntivo" (si hubiera sabido)
        is the standard past unreal conditional. English uses "if + past perfect"
        (if I had known). Spanish speakers may produce "If I would have known" — a
        common error driven by L1 transfer.
      frequency: 4
      persistence: 4
      communicative_impact: 4
    why_it_happens: UNREAL PAST = If + past perfect, would have + past participle.
    teacher_tips:
      how_to_explain: If + HAD + V3, WOULD HAVE + V3. For events that didn't happen.
      where_to_start: Practice with past regrets.
      exercises:
      - name: unreal past Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'unreal past' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
