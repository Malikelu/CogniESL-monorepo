        duration: 15
      - name: present perfect baseline Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'present
          perfect baseline' structure.
        duration: 10
      - name: present perfect baseline Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'present perfect
          baseline' errors.
        duration: 15
      sequencing: Introduce present perfect baseline with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
    examples:
