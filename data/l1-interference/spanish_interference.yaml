  order_of_adjectives:
    interference_patterns:
    - Spanish noun-adjective order transferred
    - Participial adjectives misplaced
    why_it_happens: Spanish adjectives typically follow the noun they modify, while
      English adjectives precede the noun. Spanish learners may produce phrases like
      'car red' instead of 'red car.' This transfer occurs because adjective placement
      is deeply automatized from L1 acquisition.
    teacher_tips:
      how_to_explain: Determiner + Opinion + Size + Age + Shape + Color + Origin +
        Material + Purpose + NOUN.
      where_to_start: Practice with 2-adjective combinations.
      exercises:
      - name: order of adjectives Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'order of adjectives' structure. Emphasize the structural difference
          between Spanish and English.
