  tenses:
    interference_patterns:
    - pattern: Tense system differences between Spanish and English
      example_l1: Estudio desde hace dos años.
      example_gloss: I study since two years.
      example_wrong: I study since two years.
      example_correct: I have been studying for two years.
      explanation: Spanish has a different tense system from English. Spanish uses
        the present (estudio) for ongoing actions where English requires present perfect
        continuous (have been studying). Spanish also has more tense distinctions
        (subjunctive, imperfect vs. preterite) that do not map directly to English.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Preterite/imperfect distinction not available in English
      example_l1: Estudiaba (imperfect) vs. Estudié (preterite)
      example_gloss: I was studying (background) vs. I studied (completed)
      example_wrong: I was studying (for completed action)
      example_correct: I studied (completed action)
      explanation: 'Spanish distinguishes preterite (completed action: estudié) from
        imperfect (ongoing/habitual: estudiaba). English uses simple past for both,
        with context or adverbs providing the distinction. Spanish speakers may overuse
        the past continuous to translate the imperfect.'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Present perfect used more broadly in Spanish
      example_l1: He comido ayer.
      example_gloss: I have eaten yesterday.
      example_wrong: I have eaten yesterday.
      example_correct: I ate yesterday.
      explanation: Spanish uses the present perfect (pretérito perfecto) more broadly
        than English, often with specific past time markers. English requires the
        simple past with specific past time references (yesterday, last week, in 2010).
