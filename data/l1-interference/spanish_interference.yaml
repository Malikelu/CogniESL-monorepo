      have NOTHING.'''
    - 'Wrong: ''She doesn''t comes.'' Correct: ''She DOESN''T come.'''
    - '''I did NOT go to the party.'''
    - 'Wrong: ''No I saw him.'' Correct: ''I did NOT see him.'''
