  mixed_conditionals:
    interference_patterns:
    - pattern: Mixed conditional patterns transferred from Spanish
      example_l1: Si hubiera estudiado, sería médico.
      example_gloss: If I had studied (past), I would be (present) a doctor.
      example_wrong: If I would have studied, I would be a doctor.
      example_correct: If I had studied, I would be a doctor.
      explanation: Spanish allows mixed conditionals (pluperfect subjunctive + conditional)
        for past condition with present result. English also allows this (If I had
        studied, I would be). Spanish speakers may produce "If I would have studied"
        instead of "If I had studied."
