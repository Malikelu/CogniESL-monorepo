  irregular_verbs:
    interference_patterns:
    - Spanish irregular verb patterns not equivalent to English
    - 'Regularization of English irregular past: ''goed'', ''buyed'''
    - No cognate help for most high-frequency irregular verbs
    why_it_happens: Spanish irregulars don't correspond to English. Learners default
      to regular patterns.
    teacher_tips:
      how_to_explain: English irregular verbs MUST be memorized. Use grouped lists.
      where_to_start: Learn the top 30 most common irregular verbs.
      exercises:
      - name: irregular verbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'irregular verbs' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: irregular verbs Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'irregular verbs' errors.
          Students identify and correct each error.
        duration: 15
