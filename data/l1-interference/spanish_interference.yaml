  prepositions:
    interference_patterns:
    - pattern: Preposition transfer from Spanish to English
      example_l1: Soy bueno en matemáticas. / Pienso en ti.
      example_gloss: I am good in math. / I think in/of you.
      example_wrong: I am good in math. / I think in you.
      example_correct: I am good at math. / I think of you.
      explanation: Spanish prepositions do not map 1:1 onto English. "en" can mean
        "in," "on," "at." "So bueno en" (good in) should be "good at" in English.
        "Pensar en" can mean "think of" or "think about." Preposition errors are among
        the most persistent because they are highly idiomatic and must be learned
        individually.
      frequency: 5
      persistence: 5
      communicative_impact: 3
    why_it_happens: Spanish prepositions don't correspond 1-to-1 with English.
    teacher_tips:
      how_to_explain: 'Learn prepositions WITH verbs: ''interested IN'', ''depend
        ON'', ''afraid OF''.'
      where_to_start: Learn 20 common preposition collocations.
      exercises:
      - name: prepositions Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'prepositions' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: prepositions Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'prepositions' errors.
          Students identify and correct each error.
        duration: 15
      - name: prepositions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'prepositions'
          structure.
        duration: 10
      - name: prepositions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'prepositions'
          errors.
        duration: 15
      sequencing: Introduce prepositions with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I am interested about the job.'' Correct: ''interested IN the job.'''
    - 'Wrong: ''She arrived to Madrid.'' Correct: ''arrived IN Madrid.'''
    - 'Wrong: ''He depends of his parents.'' Correct: ''depends ON his parents.'''
    sources:
