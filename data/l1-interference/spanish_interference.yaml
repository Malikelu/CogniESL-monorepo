        description: Students exchange writing samples and check for 'reflexive pronouns'
          errors.
        duration: 15
      sequencing: Introduce reflexive pronouns with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I cut me.'' Correct: ''I cut MYSELF.'''
    - 'Spanish: ''Se levanta a las 7.'' = English: ''He GETS UP at 7.'' (not reflexive
