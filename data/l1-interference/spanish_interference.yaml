  nominalization:
    interference_patterns:
    - pattern: Nominalization patterns transferred from Spanish
      example_l1: La realización del proyecto fue difícil.
      example_gloss: The realization of the project was difficult.
      example_wrong: The realization of the project was difficult.
      example_correct: Carrying out the project was difficult.
      explanation: 'Spanish heavily uses nominalization (verb -> noun: realizar ->
        realización). English prefers verb-based constructions. Spanish speakers produce
        overly nominalized English that sounds formal or unnatural: "The realization
        of the project" instead of "Carrying out the project."'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: English prefers noun forms in academic/professional writing.
