  verbs_followed_by_ing:
    interference_patterns:
    - pattern: Verbs followed by -ing form
      example_l1: Evita comer carne.
      example_gloss: Avoid eat meat.
      example_wrong: Avoid to eat meat.
      example_correct: Avoid eating meat.
      explanation: Spanish verbs like "evitar" (avoid) are followed by the infinitive.
        English "avoid" requires the gerund (-ing). Spanish speakers produce "Avoid
        to eat" — using the infinitive where English requires -ing.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: enjoy, mind, avoid, finish, keep, suggest
      example_l1: Disfruta nadando.
      example_gloss: He enjoys swimming.
      example_wrong: He enjoys to swim.
      example_correct: He enjoys swimming.
      explanation: Spanish verbs of enjoyment (disfrutar, gustar) are followed by
        the infinitive or gerund. English "enjoy" requires the gerund. Spanish speakers
        produce "enjoys to swim" — using the infinitive after "enjoy."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: 'VERB + -ING: enjoy, mind, avoid, finish, keep, suggest, consider.'
    teacher_tips:
      how_to_explain: After these verbs, ALWAYS use -ING form, not infinitive.
      where_to_start: Practice common verbs with -ing.
      exercises:
      - name: verbs followed by ing Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
