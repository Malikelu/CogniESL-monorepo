  shall:
    interference_patterns:
    - '''Shall'' rarely encountered by Spanish speakers'
    - Confusion with 'will'
    - '''Shall I...?'' for formal offers/suggestions'
    - '''Will'' replacing ''shall'' in modern English'
    why_it_happens: Shall is formal/archaic in American English. Used for first person
      offers.
    teacher_tips:
      how_to_explain: 'SHALL for first person questions (offers): ''Shall I open the
        window?'' WILL otherwise.'
      where_to_start: Practice formal offers with shall.
      exercises:
      - name: shall Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'shall' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: shall Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'shall' errors. Students
          identify and correct each error.
        duration: 15
      - name: shall Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'shall'
          structure.
        duration: 10
      - name: shall Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'shall' errors.
        duration: 15
      sequencing: Introduce shall with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - '''Shall I help you with that?'' (offer).'
    - '''I shall return.'' (formal/literary). ''I will return.'' (normal).'
    - 'Wrong: ''Shall you go?'' Correct: ''WILL you go?'' (not first person).'
    sources:
    - Quirk, R. et al. (1985).
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
