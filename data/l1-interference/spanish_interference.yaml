          structure.
        duration: 10
      - name: presupposition Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'presupposition'
          errors.
        duration: 15
      sequencing: Introduce presupposition with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Have you STOPPED cheating on exams?'' (= presupposes you used to cheat).'
    - '''When did you stop cheating?'' (= presupposes you cheated).'
    - 'Spanish: ''Has dejado de copiar?'' Same presupposition.'
