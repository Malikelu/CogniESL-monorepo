  reflexive_pronouns:
    interference_patterns:
    - pattern: Reflexive constructions overused or misapplied
      example_l1: Me levanto a las siete.
      example_gloss: I wake myself up at 7.
      example_wrong: I wake myself up at 7.
      example_correct: I get up at 7.
      explanation: 'Spanish uses reflexive pronouns (se, me, te) for many actions
        that English expresses with simple verbs or different constructions: levantarse
        (get up), lavarse (wash), sentarse (sit down), irse (go away). Spanish speakers
        may produce "I wake myself up" instead of "I get up," or "I sit myself down"
        instead of "I sit down."'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Reflexive "se" for reciprocal actions transferred
      example_l1: Se abrazaron.
      example_gloss: They hugged themselves.
      example_wrong: They hugged themselves.
      example_correct: They hugged (each other).
      explanation: Spanish "se" can be reciprocal (se abrazaron = they hugged each
        other) or reflexive (se lavó = he washed himself). English distinguishes "each
        other" from "themselves." Spanish speakers may produce "themselves" when "each
        other" is meant.
      frequency: 3
      persistence: 3
      communicative_impact: 4
    - pattern: Impersonal "se" transferred to English
      example_l1: Se habla español.
      example_gloss: Speaks itself Spanish.
      example_wrong: Speaks Spanish.
      example_correct: Spanish is spoken. / They speak Spanish here.
      explanation: Spanish uses impersonal "se" for general statements (Se habla español
        = Spanish is spoken / They speak Spanish). English requires a passive construction
        or an impersonal subject. Spanish speakers may produce "Speaks Spanish" without
        a subject.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish uses reflexives extensively. English only when subject
      = object.
    teacher_tips:
      how_to_explain: 'Use reflexive when subject and object are SAME: ''I HURT MYSELF.'''
      where_to_start: Practice common reflexive verbs.
      exercises:
      - name: reflexive pronouns Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'reflexive pronouns' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: reflexive pronouns Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'reflexive pronouns'
          errors. Students identify and correct each error.
        duration: 15
      - name: reflexive pronouns Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'reflexive
          pronouns' structure.
        duration: 10
      - name: reflexive pronouns Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'reflexive pronouns'
          errors.
        duration: 15
      sequencing: Introduce reflexive pronouns with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I cut me.'' Correct: ''I cut MYSELF.'''
    - 'Spanish: ''Se levanta a las 7.'' = English: ''He GETS UP at 7.'' (not reflexive
      in English).'
    - '''The cat WASHED ITSELF.'''
