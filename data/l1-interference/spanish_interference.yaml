  reflexive_pronouns:
    interference_patterns:
    - Spanish reflexive verbs not matched with English
    - '''He hurt him'' instead of ''He hurt himself'''
    - Overuse of reflexives
    why_it_happens: Spanish uses reflexives extensively. English only when subject
      = object.
    teacher_tips:
      how_to_explain: 'Use reflexive when subject and object are SAME: ''I HURT MYSELF.'''
      where_to_start: Practice common reflexive verbs.
      exercises:
      - name: reflexive pronouns Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
