  irregular_verbs:
    interference_patterns:
    - pattern: Spanish irregular verb patterns transferred to English
      example_l1: Tengo (tener), voy (ir), hago (hacer)
      example_gloss: I have, I go, I do/make
      example_wrong: I have (for "I am" — tener confusion)
      example_correct: I am hungry (not "I have hunger")
      explanation: Spanish irregular verbs (tener, ir, hacer, ser, estar, poder, poner,
        saber, decir, venir) have unique conjugation patterns. English irregular verbs
        are different. Spanish speakers may apply Spanish irregular patterns to English
        verbs or confuse which English verb corresponds to which Spanish verb.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Stem-changing verbs (e->ie, o->ue) expected in English
      example_l1: Pienso (think), puedo (can), duermo (sleep)
      example_gloss: I think, I can, I sleep
      example_wrong: I thinked (expecting stem change)
      example_correct: I thought
      explanation: Spanish has stem-changing verbs (pensar -> pienso, poder -> puedo,
        dormir -> duermo). English has no equivalent pattern. Spanish speakers may
        expect similar alternations in English or overregularize.
      frequency: 2
      persistence: 2
      communicative_impact: 2
    - pattern: Ser/estar irregularity transferred to English "be"
      example_l1: Soy, eres, es, somos, son / Estoy, estás, está, estamos, están
      example_gloss: I am, you are, he is... / I am, you are, he is...
      example_wrong: I is. / He am.
      example_correct: I am. / He is.
      explanation: Spanish has two completely irregular copulas (ser and estar) with
        different forms. English "be" is also irregular (am, is, are) but has only
        one copula. Spanish speakers may confuse the forms because their L1 has two
        sets of copula forms.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish irregulars don't correspond to English. Learners default
      to regular patterns.
    teacher_tips:
      how_to_explain: English irregular verbs MUST be memorized. Use grouped lists.
      where_to_start: Learn the top 30 most common irregular verbs.
      exercises:
      - name: irregular verbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'irregular verbs' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: irregular verbs Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'irregular verbs' errors.
          Students identify and correct each error.
        duration: 15
      - name: irregular verbs Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'irregular
          verbs' structure.
        duration: 10
      - name: irregular verbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'irregular verbs'
          errors.
        duration: 15
      sequencing: Introduce irregular verbs with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''Yesterday I goed to school.'' Correct: ''Yesterday I WENT to school.'''
    - 'Wrong: ''She buyed a new dress.'' Correct: ''She BOUGHT a new dress.'''
    - '''I have EATEN breakfast.'' (eat -> ate -> eaten)'
    sources:
    - Ellis, R. (2008). The study of second language acquisition.
    - Bardin, H. (2009).
