  proverbs:
    interference_patterns:
    - pattern: Spanish proverbs differ from English proverbs
      example_l1: En casa de herrero, cuchillo de palo.
      example_gloss: In house of blacksmith, knife of wood.
      example_wrong: In the house of the blacksmith, a knife of wood.
      example_correct: The cobbler's children have no shoes.
      explanation: Spanish proverbs (refranes) often have no direct English equivalent.
        Literal translation produces incomprehensible English. Spanish speakers may
        translate proverbs literally, losing the meaning entirely.
      frequency: 2
      persistence: 2
      communicative_impact: 3
    - pattern: Literal translation fails for cultural sayings
      example_l1: Más vale pájaro en mano que cien volando.
      example_gloss: More worth bird in hand than hundred flying.
      example_wrong: More worth a bird in hand than a hundred flying.
      example_correct: A bird in the hand is worth two in the bush.
      explanation: Spanish cultural sayings often have English equivalents with different
        imagery. Spanish speakers may translate literally, producing English that
        is comprehensible but clearly non-native.
      frequency: 2
      persistence: 2
      communicative_impact: 2
    why_it_happens: Each language has unique proverbs tied to culture.
    teacher_tips:
      how_to_explain: Learn English proverbs as fixed expressions.
      where_to_start: Study common English proverbs.
      exercises:
      - name: proverbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'proverbs' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: proverbs Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'proverbs' errors. Students
          identify and correct each error.
        duration: 15
      - name: proverbs Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'proverbs'
          structure.
        duration: 10
      - name: proverbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'proverbs' errors.
        duration: 15
      sequencing: Introduce proverbs with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish: ''Mas vale pajaro en mano...'' -> ''A BIRD IN THE HAND is worth two
      in the bush.'''
    - 'Spanish: ''No hay mal que por bien no venga.'' -> ''Every CLOUD has a silver
      lining.'''
    - 'English: ''The early bird catches the worm.'''
