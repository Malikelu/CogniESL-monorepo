  time_clauses:
    interference_patterns:
    - pattern: Future tense used in time clauses (Spanish allows this)
      example_l1: Cuando llegue, te llamo.
      example_gloss: When I arrive, I call you.
      example_wrong: When I will arrive, I will call you.
      example_correct: When I arrive, I will call you.
      explanation: 'Spanish uses present subjunctive in time clauses for future reference
        (Cuando llegue). English uses present tense (not future) in time clauses with
        future reference (When I arrive, I will call you). Spanish speakers may use
        "will" in the time clause: "When I will arrive."'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: After WHEN/BEFORE/AFTER/UNTIL use simple present for future.
    teacher_tips:
      how_to_explain: '''When I ARRIVE, I''ll call you.'' NOT ''When I will arrive.'''
      where_to_start: Practice time clause sentences.
