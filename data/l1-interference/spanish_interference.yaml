  article_interference:
    interference_patterns:
    - Spanish article 'el/la' overused before proper nouns in English
    - Omission of 'the' where English requires definiteness
    why_it_happens: Spanish uses articles with proper nouns (el Peru, la Argentina).
      English usually doesn't.
    teacher_tips:
      how_to_explain: 'English proper nouns usually have NO article. Exceptions: The
        United States, The Hague.'
      where_to_start: Practice proper nouns with and without articles.
      exercises:
      - name: article interference Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'article interference' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: article interference Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'article interference'
          errors. Students identify and correct each error.
        duration: 15
      - name: article interference Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'article
          interference' structure.
        duration: 10
      - name: article interference Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'article interference'
          errors.
        duration: 15
      sequencing: Introduce article interference with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I visited the Spain.'' Correct: ''I visited Spain.'''
    - 'Wrong: ''The Maria is my friend.'' Correct: ''Maria is my friend.'''
    - '''The United States'' (exception — always with ''the'').'
    - 'Wrong: ''I went to the school.'' (general sense). Correct: ''I went to school.'''
    sources:
    - Swan, M. & Smith, B. (2001).
    - Montrul, S. & Perez-Leroux, A. T. (2003).
