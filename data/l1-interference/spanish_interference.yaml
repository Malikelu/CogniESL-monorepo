  adjective_placement:
    interference_patterns:
    - pattern: Adjective after noun transferred from Spanish to English
      example_l1: un carro rojo
      example_gloss: a car red
      example_wrong: a car red
      example_correct: a red car
      explanation: Spanish places most adjectives AFTER the noun (un carro rojo, una
        casa grande). English places adjectives BEFORE the noun (a red car, a big
        house). This post-nominal adjective placement is one of the most visible transfer
        errors. Some Spanish adjectives can precede the noun (gran, buen, mal) but
        the default is post-nominal.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Multiple adjectives in wrong order
      example_l1: una grande casa roja hermosa
      example_gloss: a big house red beautiful
      example_wrong: a big house red beautiful
      example_correct: a beautiful big red house
      explanation: 'Spanish adjective order is flexible and generally post-nominal.
        English has a rigid pre-nominal adjective order: opinion-size-age-shape-color-origin-material-purpose.
        Spanish speakers transfer their flexible order, producing sequences that sound
        unnatural in English.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Spanish places adjectives AFTER nouns. English BEFORE.
    teacher_tips:
      how_to_explain: 'In English, adjectives go BEFORE the noun: ''A BEAUTIFUL old
        house.'''
      where_to_start: Practice common adjective-noun pairs.
      exercises:
      - name: adjective placement Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'adjective placement' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: adjective placement Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'adjective placement'
          errors. Students identify and correct each error.
        duration: 15
      - name: adjective placement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'adjective
          placement' structure.
        duration: 10
      - name: adjective placement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'adjective placement'
          errors.
        duration: 15
      sequencing: Introduce adjective placement with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I bought a car new.'' Correct: ''I bought a NEW car.'''
    - 'Wrong: ''She has eyes beautiful.'' Correct: ''She has BEAUTIFUL eyes.'''
    - 'Wrong: ''It is a day hot.'' Correct: ''It is a HOT day.'''
    - '''A big red house'' (NOT ''a house red big'').'
