  present_perfect_baseline:
    interference_patterns:
    - pattern: 'Present perfect: have/has + V3 formation'
      example_l1: He comido mucho hoy.
      example_gloss: I have eaten a lot today.
      example_wrong: I ate a lot today.
      example_correct: I have eaten a lot today.
      explanation: Spanish pretérito perfecto (he comido) is used for past actions
        connected to the present. English present perfect (have eaten) is similar
        but used differently. Spanish speakers may use simple past where English requires
        present perfect, especially with time expressions like "today," "this week."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Basic formation and common usage of present perfect
      example_l1: ¿Has estado en España?
      example_gloss: Have you been to Spain?
      example_wrong: Did you go to Spain?
      example_correct: Have you been to Spain?
      explanation: Spanish uses present perfect for life experiences (¿Has estado
        en España?). English also uses present perfect for life experiences (Have
        you been to Spain?). Spanish speakers may use simple past where English prefers
        present perfect for experiences.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: PRESENT PERFECT = have/has + past participle. Experience, change,
      unfinished time.
    teacher_tips:
      how_to_explain: Use for life experiences, changes, and situations that started
        in past and continue.
      where_to_start: Practice with 'Have you ever...?'
      exercises:
      - name: present perfect baseline Contrastive Drill
