  demonstratives:
    interference_patterns:
    - pattern: Three-way demonstrative distinction not made
      example_l1: este (this), ese (that), aquel (that over there)
      example_gloss: this, that, that (far)
      example_wrong: that book (for something near the speaker)
      example_correct: this book (near speaker), that book (near listener), that book
        over there (far from both)
      explanation: 'Spanish has a three-way demonstrative system: este (near speaker),
        ese (near listener), aquel (far from both). English has a two-way system:
        this (near), that (far). Spanish speakers may overuse "that" because their
        L1 has three options and they map ese/aquel both to "that."'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Spanish has 3-way (este/ese/aquel). English has 2-way (this/that).
    teacher_tips:
      how_to_explain: THIS/THAT = near/far. THESE/THOSE = plural. Only 2 levels.
      where_to_start: Practice pointing with correct demonstratives.
      exercises:
      - name: demonstratives Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'demonstratives' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: demonstratives Error Correction
        type: error-correction
