  participle_clauses:
    interference_patterns:
    - pattern: Participle clauses replacing relative clauses for conciseness
      example_l1: La casa construida en 1900 es bonita.
      example_gloss: The house built in 1900 is beautiful.
      example_wrong: The house built in 1900 is beautiful. (correct but may be underused)
      example_correct: The house (that was) built in 1900 is beautiful.
      explanation: Spanish uses participle clauses (construida en 1900) to replace
        relative clauses. English also allows this but Spanish speakers may overuse
        full relative clauses where a participle clause would be more natural, or
        vice versa.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Spanish uses full relative clauses where English prefers participles
      example_l1: El hombre que está sentado allí es mi padre.
      example_gloss: The man who is seated there is my father.
      example_wrong: The man who is seated there is my father.
      example_correct: The man sitting there is my father. / The man seated there
        is my father.
      explanation: Spanish uses full relative clauses with "estar + participle" (que
        está sentado) where English prefers a simple participle (sitting, seated).
        Spanish speakers may produce overly explicit relative clauses.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Participle clauses = reduced relatives.
    teacher_tips:
      how_to_explain: Present participle = active. Past participle = passive.
      where_to_start: Practice compressing relative clauses.
      exercises:
      - name: participle clauses Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'participle clauses' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: participle clauses Error Correction
        type: error-correction
