  need_to:
    interference_patterns:
    - pattern: Necesitar used for "need" without distinguishing verb patterns
      example_l1: Necesito estudiar.
      example_gloss: I need to study.
      example_wrong: I need study.
      example_correct: I need to study.
      explanation: Spanish "necesitar" is followed directly by the infinitive. English
        "need" can be followed by "to + infinitive" (I need to study) or, in British
