          errors. Students identify and correct each error.
        duration: 15
      - name: participle clauses Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'participle
          clauses' structure.
        duration: 10
      - name: participle clauses Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'participle clauses'
          errors.
        duration: 15
      sequencing: Introduce participle clauses with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
