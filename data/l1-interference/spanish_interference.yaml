  pronoun_placement:
    interference_patterns:
    - Object pronouns placed before verbs (Spanish clitic placement)
    - '''Him I saw'' instead of ''I saw him'''
    - Proclitic placement transferred
    why_it_happens: Spanish places object pronouns before conjugated verbs. English
      places them after.
    teacher_tips:
      how_to_explain: Object pronouns ALWAYS go after the verb in English.
      where_to_start: Practice SVO with pronouns.
      exercises:
      - name: pronoun placement Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'pronoun placement' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: pronoun placement Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'pronoun placement' errors.
          Students identify and correct each error.
        duration: 15
      - name: pronoun placement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'pronoun
          placement' structure.
        duration: 10
      - name: pronoun placement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'pronoun placement'
          errors.
        duration: 15
      sequencing: Introduce pronoun placement with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''Him I saw at the store.'' Correct: ''I SAW HIM at the store.'''
    - 'Wrong: ''She gave to me it.'' Correct: ''She GAVE it to me.'''
    - 'Wrong: ''Us they invited.'' Correct: ''THEY INVITED us.'''
    - 'Wrong: ''I told to him the truth.'' Correct: ''I told HIM the truth.'''
    sources:
    - Gonzalez Lopez, A. (2010). Spanish object pronoun placement and English.
    - Montrul, S. (2004). Subject and object expression in Spanish heritage speakers.
