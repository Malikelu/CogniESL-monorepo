  prepositions_of_place:
    interference_patterns:
    - pattern: Preposition transfer for place expressions
      example_l1: En la mesa. / A la escuela.
      example_gloss: In/on the table. / To the school.
      example_wrong: In the table. / In the school.
      example_correct: On the table. / At school.
      explanation: Spanish "en" covers both "in" and "on" (en la mesa = on the table,
        en la casa = in the house). Spanish "a" for destination (a la escuela = to
        school) differs from English "at/in." Spanish speakers confuse "in" and "on"
        because both are "en" in Spanish.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    why_it_happens: Spanish prepositions of place differ from English. Spanish 'en'
      covers 'in,' 'on,' and 'at.' Spanish learners may say 'I am in home' instead
      of 'I am at home,' or 'The book is in the table' instead of 'The book is on
      the table.' This occurs because the L1 preposition system maps differently onto
      English spatial relationships.
    teacher_tips:
      how_to_explain: Practice with familiar locations.
      where_to_start: Use a map/room picture for practice.
      exercises:
      - name: prepositions of place Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'prepositions of place' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: prepositions of place Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'prepositions of place'
          errors. Students identify and correct each error.
        duration: 15
      - name: prepositions of place Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'prepositions
          of place' structure.
        duration: 10
      - name: prepositions of place Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'prepositions
          of place' errors.
        duration: 15
      sequencing: Introduce prepositions of place with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I live at Madrid.'' Correct: ''I live IN Madrid.'''
    - 'Wrong: ''The cat is in the table.'' Correct: ''The cat is ON the table.'''
    - '''I am AT the library.'' vs ''I am IN the library.'' (different meanings!).'
    sources:
    - Swan, M. & Smith, B. (2001).
    - Gonzalez Lopez, A. (2010).
