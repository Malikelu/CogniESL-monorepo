  countable_uncountable:
    interference_patterns:
    - pattern: Uncountable nouns treated as countable
      example_l1: Tres informaciones. / Dos consejos.
      example_gloss: Three informations. / Two advices.
      example_wrong: Three informations. / Two advices.
      example_correct: Three pieces of information. / Two pieces of advice.
      explanation: Some nouns that are uncountable in English (information, advice,
        furniture, luggage, news) are countable in Spanish (informaciones, consejos,
        muebles, equipajes, noticias). Spanish speakers pluralize these nouns and
        use numbers directly, producing "informations," "advices," etc.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Much vs many confusion
      example_l1: Mucha gente.
      example_gloss: Much people.
      example_wrong: Much people.
      example_correct: Many people.
      explanation: 'Spanish uses "mucho/a/os/as" for both countable and uncountable
        nouns. English distinguishes "much" (uncountable) from "many" (countable).
        Spanish speakers overuse "much" with countable nouns: "much people" instead
        of "many people."'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Countability differences between Spanish and English
      example_l1: Un mueble. / Un equipaje.
      example_gloss: A furniture. / A luggage.
      example_wrong: A furniture. / A luggage.
      example_correct: A piece of furniture. / A piece of luggage.
      explanation: Spanish counts nouns that are uncountable in English (mueble, equipaje,
        noticia). English requires partitive constructions (a piece of furniture,
        a piece of luggage, a piece of news). Spanish speakers use the indefinite
        article directly with these nouns.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Spanish doesn't distinguish countable/uncountable the same way.
    teacher_tips:
      how_to_explain: UNCOUNTABLE = no plural, 'much/a lot of'. COUNTABLE = 'many/a
        few'.
      where_to_start: Sort common nouns into countable/uncountable lists.
      exercises:
      - name: countable uncountable Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'countable uncountable' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: countable uncountable Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'countable uncountable'
          errors. Students identify and correct each error.
        duration: 15
      - name: countable uncountable Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'countable
          uncountable' structure.
        duration: 10
      - name: countable uncountable Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'countable uncountable'
          errors.
        duration: 15
      sequencing: Introduce countable uncountable with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I have many homeworks.'' Correct: ''a lot of HOMEWORK.'''
    - 'Wrong: ''Can you give me some advices?'' Correct: ''some ADVICE.'''
    - '''Too MUCH traffic.'' (uncountable) vs ''Too MANY cars.'' (countable).'
    sources:
    - Swan, M. & Smith, B. (2001).
    - Quirk, R. et al. (1985).
