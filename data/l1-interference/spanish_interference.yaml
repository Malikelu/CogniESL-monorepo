  must_have_to_need:
    interference_patterns:
    - '''Must'' vs ''have to'' vs ''need to'''
    - Spanish 'deber/tener que' confuses obligation levels
    why_it_happens: MUST = internal feeling. HAVE TO = external obligation. NEED TO
      = necessity.
    teacher_tips:
      how_to_explain: I MUST = I feel it's necessary. I HAVE TO = someone/something
        requires it.
      where_to_start: Practice contrasting internal vs external obligation.
      exercises:
      - name: must have to need Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'must have to need' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: must have to need Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'must have to need' errors.
          Students identify and correct each error.
        duration: 15
      - name: must have to need Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'must
          have to need' structure.
        duration: 10
      - name: must have to need Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'must have to
          need' errors.
        duration: 15
      sequencing: Introduce must have to need with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''I MUST finish this report.'' (personal feeling). ''I HAVE TO finish.'' (boss
      requires).'
    - 'Wrong: ''I must to go.'' Correct: ''I MUST go.'' (modal + base verb, no ''to'').'
    - '''You NEEDN''T apologize.'' (= there is no need).'
