  supposing:
    interference_patterns:
    - pattern: '"Supposing" as informal conditional'
      example_l1: Suponiendo que venga, ¿qué hacemos?
      example_gloss: Supposing that he comes, what do we do?
      example_wrong: Supposing that he comes, what do we do? (correct but may be underused)
      example_correct: Supposing he comes, what do we do?
      explanation: Spanish "suponiendo que" maps to English "supposing (that)." Spanish
        speakers may not use this informal conditional, preferring "if" in all cases.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Spanish "suponiendo que"
      example_l1: ¿Y si viene?
      example_gloss: And if he comes?
      example_wrong: And if he comes?
      example_correct: What if he comes? / Supposing he comes?
      explanation: Spanish "¿Y si...?" is a common informal conditional. English "What
        if...?" or "Supposing..." are equivalents. Spanish speakers may overuse "And
        if..." which is a literal translation of "Y si."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Supposing = if (informal). Used in hypothetical scenarios.
    teacher_tips:
      how_to_explain: Supposing + subject + verb. Same as 'what if' or 'if'.
      where_to_start: Practice hypothetical questions.
      exercises:
      - name: supposing Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'supposing' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: supposing Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'supposing' errors. Students
          identify and correct each error.
        duration: 15
      - name: supposing Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'supposing'
          structure.
        duration: 10
      - name: supposing Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'supposing' errors.
        duration: 15
      sequencing: Introduce supposing with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - '''Supposing you WON the lottery, what would you do?'''
    - '''Supposing it rains, we''ll stay inside.'' = ''IF it rains...'''
