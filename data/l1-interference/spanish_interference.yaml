  used_to_would:
    interference_patterns:
    - pattern: '"Used to" vs "would" for past repeated actions'
      example_l1: Cuando era niño, jugaba al fútbol.
      example_gloss: When I was a child, I played soccer.
      example_wrong: When I was a child, I would play soccer. (correct for repeated
        actions)
      example_correct: When I was a child, I would play soccer. / I used to play soccer.
      explanation: 'Spanish imperfect (jugaba) covers both "used to" and "would" meanings.
        English distinguishes "used to" (habits and states) from "would" (only repeated
        actions, not states). Spanish speakers may use "would" for states: "I would
        live in Madrid" instead of "I used to live in Madrid."'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: '"Would" only for repeated actions, not states'
      example_l1: Vivía en Madrid.
      example_gloss: I lived in Madrid.
      example_wrong: I would live in Madrid.
      example_correct: I used to live in Madrid.
      explanation: 'Spanish imperfect (vivía) covers both habitual actions and past
        states. English "would" is only for repeated actions, not states. Spanish
        speakers may use "would" for states: "I would live in Madrid" instead of "I
        used to live in Madrid."'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Used to = states AND habits. Would = repeated actions only (not
      states).
    teacher_tips:
      how_to_explain: '''I USED TO live in Madrid.'' (state). ''Every Sunday I WOULD
        visit grandma.'' (action).'
      where_to_start: Practice past narratives.
      exercises:
      - name: used to would Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'used to would' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: used to would Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'used to would' errors.
          Students identify and correct each error.
        duration: 15
      - name: used to would Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'used
          to would' structure.
        duration: 10
      - name: used to would Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'used to would'
          errors.
        duration: 15
      sequencing: Introduce used to would with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''When I was young, I WOULD visit my grandmother every Sunday.'' (repeated
      action).'
    - 'Wrong: ''I would live in Madrid.'' (state - use ''used to''). ''I USED TO live
      in Madrid.'''
    - '''We WOULD go to the beach every summer.'' (repeated action, NOT ''We used
      to go'' in formal).'
    sources:
    - Bardin, H. (2009).
    - Gass, S. & Selinker, L. (2008).
