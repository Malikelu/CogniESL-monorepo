  first_conditional:
    interference_patterns:
    - pattern: Future tense not used in main clause of first conditional
      example_l1: Si tengo tiempo, voy.
      example_gloss: If I have time, I go.
      example_wrong: If I have time, I go.
      example_correct: If I have time, I will go.
      explanation: 'Spanish uses present indicative in both clauses for real conditions
        (Si tengo tiempo, voy). English uses present in the if-clause but future (will)
        in the main clause (If I have time, I will go). Spanish speakers may use present
        in both clauses: "If I have time, I go" — which in English implies a habitual
        action, not a future one.'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: 'Type 1: If PRESENT, WILL + base. Spanish: ''Si + presente indicativo''.'
    teacher_tips:
      how_to_explain: Type 1 = REAL condition. If + SIMPLE PRESENT. Result = WILL
        + base verb.
      where_to_start: Practice with real/possible scenarios.
      exercises:
      - name: first conditional Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'first conditional' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: first conditional Error Correction
