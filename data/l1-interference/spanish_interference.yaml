        description: Provide 15 sentences with Spanish-style 'would sooner' errors.
          Students identify and correct each error.
        duration: 15
      - name: would sooner Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'would
          sooner' structure.
        duration: 10
      - name: would sooner Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'would sooner'
          errors.
        duration: 15
      sequencing: Introduce would sooner with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
