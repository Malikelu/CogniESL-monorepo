  this_that_these_those:
    interference_patterns:
    - pattern: Demonstrative pronouns vs determiners
      example_l1: Este libro. / Ese libro. / Aquel libro.
      example_gloss: This book. / That book. / That book (far).
      example_wrong: That book (for something near the speaker)
      example_correct: This book (near speaker). / That book (near listener). / That
        book over there (far from both).
      explanation: 'Spanish has a three-way demonstrative system: este (near speaker),
        ese (near listener), aquel (far from both). English has a two-way system:
        this (near), that (far). Spanish speakers may overuse "that" because their
        L1 has three options.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish "esto/ese/aquel" system
      example_l1: Esto es importante.
      example_gloss: This is important.
      example_wrong: That is important. (when near the speaker)
      example_correct: This is important.
      explanation: Spanish "esto" (this, near speaker) and "eso" (that, near listener)
        are distinguished. English "this/that" is a simpler two-way system. Spanish
        speakers may use "that" for things near them because their L1 has three options.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: THIS/THAT (singular). THESE/THOSE (plural). THIS/THOSE = near.
      THAT/THOSE = far.
    teacher_tips:
      how_to_explain: THIS/HERE = near. THAT/THERE = far. THESE/THOSE = plural forms.
      where_to_start: Practice pointing and identifying.
      exercises:
      - name: this that these those Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'this that these those' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: this that these those Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'this that these those'
          errors. Students identify and correct each error.
        duration: 15
      - name: this that these those Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'this
          that these those' structure.
        duration: 10
      - name: this that these those Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'this that these
          those' errors.
        duration: 15
      sequencing: Introduce this that these those with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''THIS is mine.'' (near, singular pronoun). ''THESE are mine.'' (near, plural).'
    - '''THAT is yours.'' (far). ''THOSE are yours.'' (far, plural).'
    - 'Wrong: ''This books are mine.'' Correct: ''THESE books are mine.'''
    sources:
