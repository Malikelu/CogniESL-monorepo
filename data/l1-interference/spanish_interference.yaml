  plural_formation:
    interference_patterns:
    - pattern: Plural -s omitted after numbers
      example_l1: Tres libro.
      example_gloss: Three book.
      example_wrong: Three book.
      example_correct: Three books.
      explanation: Spanish nouns after numbers take plural form, but the plural marker
        may be -s or -es. Spanish speakers may occasionally omit the plural -s in
        English, especially with irregular plurals or in rapid speech.
      frequency: 3
      persistence: 2
      communicative_impact: 3
    why_it_happens: English has irregular plurals from Old English/Germanic roots.
    teacher_tips:
      how_to_explain: 'Learn irregulars: child->children, man->men, woman->women,
        tooth->teeth, foot->feet, mouse->mice.'
      where_to_start: Memorize the 20 most common irregular plurals.
      exercises:
      - name: plural formation Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'plural formation' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: plural formation Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'plural formation' errors.
          Students identify and correct each error.
        duration: 15
      - name: plural formation Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'plural
          formation' structure.
        duration: 10
      - name: plural formation Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'plural formation'
          errors.
        duration: 15
      sequencing: Introduce plural formation with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I have two childs.'' Correct: ''two CHILDREN.'''
    - 'Wrong: ''Many mans came.'' Correct: ''Many MEN came.'''
    - '''The SHEEP are in the field.'' (same singular/plural).'
    sources:
    - Swan, M. & Smith, B. (2001).
    - Ellis, R. (2008).
