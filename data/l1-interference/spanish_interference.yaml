  wish_if_only_past:
    interference_patterns:
    - pattern: '"I wish" and "if only" for unreal past and present'
      example_l1: Ojalá hubiera estudiado más.
      example_gloss: I wish I had studied more.
      example_wrong: I wish I would have studied more.
      example_correct: I wish I had studied more.
      explanation: Spanish "ojalá + pluscuamperfecto de subjuntivo" maps to English
        "I wish + past perfect." Spanish speakers may produce "I wish I would have
        studied" — transferring the conditional to the wish clause.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Spanish "ojalá"/"quisiera"
      example_l1: Quisiera ser más alto.
      example_gloss: I would like to be taller.
      example_wrong: I would like to be taller. (correct but may use "wish" incorrectly)
      example_correct: I wish I were taller.
      explanation: Spanish "quisiera" (conditional of querer) is used for polite wishes.
        English "I wish" + past subjunctive (I wish I were) is used for unreal present
        wishes. Spanish speakers may confuse "wish" and "would like."
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: WISH + past = unreal present. WISH + had + V3 = unreal past.
    teacher_tips:
      how_to_explain: I WISH I WERE rich (not true now). I WISH I HAD studied (didn't
        study).
      where_to_start: Practice with 'ojala' equivalents.
      exercises:
      - name: wish if only past Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'wish if only past' structure. Emphasize the structural difference
          between Spanish and English.
