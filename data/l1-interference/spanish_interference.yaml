  word_order_questions:
    interference_patterns:
    - pattern: English SVO vs Spanish flexible word order
      example_l1: ¿Qué quieres tú?
      example_gloss: What want you?
      example_wrong: What you want?
      example_correct: What do you want?
      explanation: Spanish has flexible word order and questions maintain declarative
        order (¿Qué quieres tú? = What want you?). English requires subject-auxiliary
        inversion and do-support (What do you want?). Spanish speakers produce "What
        you want?" — maintaining Spanish word order.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: Wh- questions require inversion
      example_l1: ¿Dónde vives tú?
      example_gloss: Where live you?
      example_wrong: Where you live?
      example_correct: Where do you live?
      explanation: Spanish wh-questions keep the subject after the verb or at the
        end. English requires auxiliary + subject + main verb (Where do you live?).
        Spanish speakers transfer the Spanish order, producing "Where you live?" without
        do-support.
      frequency: 5
      persistence: 4
      communicative_impact: 4
    why_it_happens: 'English: ''What DID you eat?'' NOT ''What you ate?'''
    teacher_tips:
      how_to_explain: 'Wh- question: Wh-word + auxiliary + subject + verb? No auxiliary
        -> add DO/DOES/DID.'
      where_to_start: Practice forming Wh- questions.
      exercises:
      - name: word order questions Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'word order questions' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: word order questions Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'word order questions'
          errors. Students identify and correct each error.
        duration: 15
      - name: word order questions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'word
          order questions' structure.
        duration: 10
      - name: word order questions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'word order questions'
          errors.
        duration: 15
      sequencing: Introduce word order questions with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
