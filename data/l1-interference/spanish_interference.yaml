schema_version: '3.0'
language: Spanish
l1: es
l2: en
total_grammar_points: 136
grammar_points:
  ser_vs_estar:
    interference_patterns:
    - pattern: Spanish uses two copulas (ser/estar) where English has only "to be"
      example_l1: Soy profesor. / Estoy cansado.
      example_gloss: I am (ser) a teacher. / I am (estar) tired.
      example_wrong: I am [ser] a teacher. / I am [estar] tired.
      example_correct: I am a teacher. / I am tired.
      explanation: 'Spanish distinguishes ser (identity, origin, inherent characteristics)
        from estar (location, temporary states, conditions). English uses "to be"
        for both. The distinction is fundamental: ser conveys classification/essence
        (atemporal), while estar conveys contingent states in time (temporal/mutable).'
      frequency: 5
      persistence: 5
      communicative_impact: 5
    - pattern: Estar used for permanent characteristics that require ser
      example_l1: '*Es alto (intended: permanent trait)'
      example_gloss: He is (estar) tall.
      example_wrong: He is tall (conveying temporary condition).
      example_correct: He is tall.
      explanation: Spanish estar implies a change from the norm or a temporary condition.
        In English, "is" covers both inherent and temporary states. Spanish speakers
        must learn that English conveys this distinction through adverbs (always,
        right now) rather than copula choice.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Ser used for temporary states that require estar
      example_l1: '*Es enfermo (intended: temporary illness)'
      example_gloss: He is (ser) sick.
      example_wrong: He is sick (conveying inherent characteristic).
      example_correct: He is sick.
      explanation: Spanish ser + adjective conveys an inherent/normal attribute. In
        English, the copula does not change — the distinction is carried by context
        or adverbs. Spanish speakers may overanalyze which form of "to be" to use.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: English "to be" does not distinguish inherent vs temporary states
      example_l1: 'Es feliz (ser: inherently happy) / Está feliz (estar: currently
        happy)'
      example_gloss: He is (ser) happy by nature. / He is (estar) happy right now.
      example_wrong: He is happy. (ambiguous between inherent and temporary)
      example_correct: He is happy. / He seems happy today.
      explanation: Spanish ser/estar encodes whether an attribute is inherent (norm)
        or a deviation from the norm (change). English "to be" is neutral. Spanish
        speakers must learn that English conveys this distinction through adverbs
        or different verbs (seem, become) rather than copula choice.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Spanish has two copulas; English has only 'to be'.
    teacher_tips:
      how_to_explain: SER=identity/origin/characteristics. ESTAR=location/temporary
        state. Both='am/is/are' in English.
      where_to_start: Teach DOCTOR (ser) and PLACE (estar) mnemonics.
      sequencing: 'Week 1: ser. Week 2: estar. Week 3: contrast.'
      exercises:
      - name: ser vs estar Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'ser vs estar' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: ser vs estar Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'ser vs estar' errors.
          Students identify and correct each error.
        duration: 15
      - name: ser vs estar Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'ser
          vs estar' structure.
        duration: 10
      - name: ser vs estar Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'ser vs estar'
          errors.
        duration: 15
    examples:
    - 'Wrong: ''I am cansado.'' Correct: ''I AM tired.'''
    - 'Spanish: ''Soy profesora'' = English: ''I AM a teacher.'''
    - 'Spanish: ''Estoy enferma'' = English: ''I AM sick.'''
    - There is no ser/estar split in English — both become 'am/is/are'.
    sources:
    - Batterink, L. & Hokao, L. (2005). The role of interpretation in the ser/estar
      acquisition.
    - Montrul, S. (2004). Subject and object expression in Spanish heritage speakers.
    - 'Geeslin, K. L. (2000). That''s how the dough goes: the acquisition of the Spanish
      copula.'
    source_count: 3
    source_type: peer-reviewed
    frequency: 5
    persistence: 5
    communicative_impact: 5
