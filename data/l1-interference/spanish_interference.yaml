  passive_with_two_objects:
    interference_patterns:
    - pattern: 'Passive with ditransitive verbs: two objects'
      example_l1: Me dieron un premio.
      example_gloss: To me they gave a prize.
      example_wrong: I was given a prize. (correct but may be underused)
      example_correct: I was given a prize. / A prize was given to me.
      explanation: Spanish ditransitive verbs (dar, decir, enviar, ofrecer) can have
        either object as the subject in English passive. Spanish speakers may avoid
        the passive with two objects, preferring active constructions where passive
        would be more natural.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish allows both objects as passive subjects
      example_l1: El premio me fue dado.
      example_gloss: The prize to me was given.
      example_wrong: The prize was given me.
      example_correct: The prize was given to me.
      explanation: Spanish allows the indirect object to become the subject in passive
        (Me fue dado el premio). English requires "to" when the indirect object follows
        the verb. Spanish speakers may omit "to" in English passive constructions.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish passive constructions with two objects differ from English.
      Spanish learners may produce non-standard passive sentences when the indirect
      object is promoted. This occurs because the L1 handles ditransitive passives
      differently.
    teacher_tips:
      how_to_explain: 'MARIA was given the prize. NOT: The prize was given to Maria
        (less natural focus).'
      where_to_start: Practice ditransitive verbs in passive.
      exercises:
      - name: passive with two objects Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'passive with two objects' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: passive with two objects Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'passive with two objects'
          errors. Students identify and correct each error.
        duration: 15
      - name: passive with two objects Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'passive
          with two objects' structure.
        duration: 10
      - name: passive with two objects Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'passive with
          two objects' errors.
        duration: 15
      sequencing: Introduce passive with two objects with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
