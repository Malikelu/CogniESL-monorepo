          conditional' structure.
        duration: 10
      - name: second conditional Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'second conditional'
          errors.
        duration: 15
      sequencing: Introduce second conditional with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''If I was you.'' Correct: ''If I WERE you.'''
    - 'Wrong: ''If I would have time, I would travel.'' Correct: ''If I HAD time,
      I WOULD travel.'''
    - '''If she WERE here, she WOULD help us.'''
