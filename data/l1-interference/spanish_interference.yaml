  por_para:
    interference_patterns:
    - pattern: por and para both translate to "for" causing confusion
      example_l1: Lo hice por ti. / Es para ti.
      example_gloss: I did it for (por) you. / It is for (para) you.
      example_wrong: I did it for you. / It is for you.
      example_correct: I did it for you (because of you). / It is for you (intended
        for you).
      explanation: 'Spanish por and para both translate to "for" but with different
        meanings: por = cause/agent/duration/exchange (by, for, through, because of);
        para = purpose/destination/deadline (for, in order to, by). Spanish speakers
        overuse "for" where English requires "by," "through," "because of," "in order
        to," "to," etc.'
      frequency: 5
      persistence: 4
      communicative_impact: 4
    - pattern: por (cause/agent) confused with English prepositions
      example_l1: Fue escrito por Cervantes.
      example_gloss: It was written by (por) Cervantes.
      example_wrong: It was written for Cervantes.
      example_correct: It was written by Cervantes.
      explanation: 'Spanish por covers agent in passive constructions, cause, means,
        and exchange. English uses different prepositions: "by" (agent), "for" (cause/benefit),
        "through" (means). Spanish speakers may use "for" where English requires "by"
        because both por and para can translate as "for."'
      frequency: 4
      persistence: 4
      communicative_impact: 4
    - pattern: Overuse of "for" where English requires different prepositions
      example_l1: Estudio para el examen. / Llegué para las tres.
      example_gloss: I study for (para) the exam. / I arrived for (para) three o'clock.
      example_wrong: I study for the exam. / I arrived for three o'clock.
      example_correct: I study for the exam. / I arrived by three o'clock.
      explanation: Spanish para covers purpose, destination, deadline, and comparison.
        English uses "for" (purpose), "to/toward" (destination), "by" (deadline).
        Spanish speakers overgeneralize "for" to all contexts where para is used.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish por/para cover many meanings of English 'for', 'by', 'through'.
    teacher_tips:
      how_to_explain: POR = reason/cause. PARA = purpose/deadline.
      where_to_start: Practice contrasting por and para sentences.
      exercises:
      - name: por para Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'por para' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: por para Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'por para' errors. Students
          identify and correct each error.
        duration: 15
      - name: por para Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'por
          para' structure.
        duration: 10
      - name: por para Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'por para' errors.
        duration: 15
      sequencing: Introduce por para with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish: ''Estudio PARA aprender.'' = ''I study TO learn.'' (purpose)'
    - 'Spanish: ''Gracias POR tu ayuda.'' = ''Thank you FOR your help.'' (reason)'
    - 'Spanish: ''Trabajo POR dinero.'' = ''I work FOR money.'' (exchange)'
    - 'Spanish: ''Voy PARA casa.'' = ''I''m going HOME.'' (destination)'
    sources:
    - Quirk, R. et al. (1985). A comprehensive grammar of the English language.
    - Gass, S. & Selinker, L. (2008).
