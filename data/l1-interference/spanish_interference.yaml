  short_answers:
    interference_patterns:
    - pattern: Short answers with yes/no + auxiliary
      example_l1: ¿Hablas inglés? Sí, hablo.
      example_gloss: Speak you English? Yes, I speak.
      example_wrong: Yes, I speak. (instead of "Yes, I do")
      example_correct: Yes, I do.
      explanation: Spanish short answers repeat the main verb (Sí, hablo). English
        uses "Yes/No + subject + auxiliary" (Yes, I do). Spanish speakers may produce
        "Yes, I speak" instead of "Yes, I do" — transferring the Spanish pattern.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish uses "sí" + verb repetition instead of auxiliary
      example_l1: ¿Tienes hambre? Sí, tengo.
      example_gloss: Have you hunger? Yes, I have.
      example_wrong: Yes, I have. (when "Yes, I am" is intended)
      example_correct: Yes, I am hungry.
      explanation: Spanish short answers repeat the main verb (Sí, tengo = Yes, I
        have). English uses the auxiliary from the question. Spanish speakers may
        produce "Yes, I have" when the question was "Are you hungry?" — repeating
        "have" instead of "am."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Yes, I did. NOT Yes, I went. Use auxiliary verb in answer.
    teacher_tips:
      how_to_explain: Did you go? -> Yes, I DID. / No, I DIDN'T. Repeat the AUXILIARY,
        not the main verb.
      where_to_start: Practice Q&A pairs with all tenses.
      exercises:
      - name: short answers Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'short answers' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: short answers Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'short answers' errors.
          Students identify and correct each error.
        duration: 15
      - name: short answers Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'short
          answers' structure.
        duration: 10
      - name: short answers Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'short answers'
          errors.
        duration: 15
      sequencing: Introduce short answers with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Did you go?'' ''Yes, I DID.'' (NOT ''Yes, I went.'')'
    - '''Has she finished?'' ''No, she HASN''T.'' (NOT ''No, she didn''t finish.'')'
    - '''Were they happy?'' ''Yes, THEY WERE.'''
    sources:
    - Swan, M. & Smith, B. (2001).
    - Gonzalez Lopez, A. (2010).
