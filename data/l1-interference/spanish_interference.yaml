  conditionals_overview:
    interference_patterns:
    - Spanish 'si + presente' for all condition types
    - Failure to change if-clause tense for unreal conditions
    - Using 'will' in the if-clause
    why_it_happens: Spanish conditionals are simpler. Three English types have different
      tenses.
    teacher_tips:
      how_to_explain: 'Type 1: If + present, will + base. Type 2: If + past, would
        + base. Type 3: If + past perfect, would have + V3.'
      where_to_start: Start with Type 1, then contrast with 2 and 3.
      exercises:
      - name: conditionals overview Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'conditionals overview' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: conditionals overview Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'conditionals overview'
          errors. Students identify and correct each error.
        duration: 15
      - name: conditionals overview Pattern Practice
