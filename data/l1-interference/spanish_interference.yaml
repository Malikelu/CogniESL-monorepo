  the_the_comparatives:
    interference_patterns:
    - pattern: '"The more... the more..." correlative comparative'
      example_l1: Cuanto más estudio, más aprendo.
      example_gloss: The more I study, the more I learn.
      example_wrong: The more I study, more I learn.
      example_correct: The more I study, the more I learn.
      explanation: Spanish "cuanto más... más..." maps to English "the more... the
        more..." but Spanish speakers may omit the second "the" in English, producing
        "The more I study, more I learn."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish "cuanto más... más..." maps directly but may omit "the"
      example_l1: Cuanto más rápido, mejor.
      example_gloss: The more fast, the better.
      example_wrong: More fast, better.
      example_correct: The faster, the better.
      explanation: Spanish "cuanto más... más..." requires "the... the..." in English.
        Spanish speakers may omit "the" in both clauses, producing "More fast, better"
        instead of "The faster, the better."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Double comparative for proportional relationships.
    teacher_tips:
      how_to_explain: THE + comparative, THE + comparative. 'The more you study, the
        better you get.'
      where_to_start: Practice with proportional statements.
      exercises:
      - name: the the comparatives Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'the the comparatives' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
