    teacher_tips:
      how_to_explain: HOWEVER, MOREOVER, FURTHERMORE, CONSEQUENTLY, NEVERTHELESS.
        Use in academic writing.
      where_to_start: Practice academic paragraph transitions.
      exercises:
      - name: link words advanced Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'link words advanced' structure. Emphasize the structural difference
