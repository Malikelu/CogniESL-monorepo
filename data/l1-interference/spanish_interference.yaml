  topic_comment:
    interference_patterns:
    - pattern: Topic-comment structure transferred from Spanish
      example_l1: Ese libro, lo leí ayer.
      example_gloss: That book, I read it yesterday.
      example_wrong: That book, I read it yesterday.
      example_correct: I read that book yesterday.
      explanation: Spanish allows topicalization with left-dislocation (Ese libro,
        lo leí ayer). English has a more rigid SVO order and does not normally front
        objects with a resumptive pronoun. Spanish speakers produce "That book, I
        read it yesterday" — which is acceptable in spoken English but not in formal
        writing.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: In English the topic IS the subject. No resumptive pronoun needed.
    teacher_tips:
      how_to_explain: MY MOTHER is a doctor. NOT 'My mother, she is a doctor.'
      where_to_start: Practice single-subject sentences.
      exercises:
      - name: topic comment Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'topic comment' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: topic comment Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'topic comment' errors.
          Students identify and correct each error.
        duration: 15
      - name: topic comment Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'topic
          comment' structure.
        duration: 10
      - name: topic comment Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'topic comment'
          errors.
        duration: 15
      sequencing: Introduce topic comment with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
