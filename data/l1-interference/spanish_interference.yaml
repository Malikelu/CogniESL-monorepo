  countable_uncountable:
    interference_patterns:
    - Uncountable nouns used as countable in English
    - '''Much'' and ''many'' confused'
    - Plural added to uncountable nouns
    why_it_happens: Spanish doesn't distinguish countable/uncountable the same way.
    teacher_tips:
      how_to_explain: UNCOUNTABLE = no plural, 'much/a lot of'. COUNTABLE = 'many/a
        few'.
      where_to_start: Sort common nouns into countable/uncountable lists.
      exercises:
      - name: countable uncountable Contrastive Drill
        type: translation
