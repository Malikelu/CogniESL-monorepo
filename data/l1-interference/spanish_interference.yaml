  reported_questions:
    interference_patterns:
    - pattern: Question word order maintained in reported questions
      example_l1: Preguntó qué quieres.
      example_gloss: He asked what you want.
      example_wrong: He asked what do you want.
      example_correct: He asked what I wanted.
      explanation: Spanish maintains question word order in reported speech (Preguntó
        qué quieres). English uses declarative word order in reported questions (He
        asked what I wanted). Spanish speakers may produce "He asked what do you want"
        — maintaining question word order.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Do-support not removed in reported questions
      example_l1: Preguntó si quieres café.
      example_gloss: He asked if you want coffee.
      example_wrong: He asked if do you want coffee.
      example_correct: He asked if I wanted coffee.
      explanation: Spanish does not use "do" in questions or reported questions. English
        removes do-support in reported questions. Spanish speakers may produce "He
        asked if do you want" — transferring the Spanish pattern.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Tense not backshifted in reported questions
      example_l1: Preguntó qué hora es.
      example_gloss: He asked what time it is.
      example_wrong: He asked what time it is.
