  few:
    interference_patterns:
    - '''Few'' vs ''a few'' vs ''little'' vs ''a little'''
    - Spanish 'poco' covers both dimensions
    why_it_happens: Spanish 'poco' = both few/a few and little/a little. English distinguishes.
    teacher_tips:
      how_to_explain: FEW = not many (negative). A FEW = some (positive). LITTLE =
        not much. A LITTLE = some.
      where_to_start: Practice with countable (few/many) and uncountable (little/much).
      exercises:
      - name: few Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'few' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: few Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'few' errors. Students
          identify and correct each error.
        duration: 15
      - name: few Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'few'
          structure.
        duration: 10
      - name: few Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'few' errors.
        duration: 15
      sequencing: Introduce few with clear examples. Practice recognition before production.
        Use contrastive analysis with Spanish.
    examples:
    - '''I have few friends.'' (almost none, negative) vs ''I have A FEW friends.''
      (some, positive).'
    - '''She has FEW reasons to complain.'' (= almost no reasons).'
    - '''She has LITTLE money.'' (= almost none) vs ''She has A LITTLE money.'' (=
      some).'
    sources:
