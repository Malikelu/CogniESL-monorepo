  passive_with_reporting_verbs:
    interference_patterns:
    - pattern: 'Passive with reporting verbs: "It is said/reported"'
      example_l1: Se dice que es rico.
      example_gloss: It says itself that he is rich.
      example_wrong: It says that he is rich.
      example_correct: It is said that he is rich. / He is said to be rich.
      explanation: 'Spanish "se dice que" (it says itself that) corresponds to English
        passive reporting constructions: "It is said that" or "He is said to be."
        Spanish speakers may produce "It says that" instead of "It is said that."'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Spanish "se dice que" transferred literally
      example_l1: Se reportó que hubo un accidente.
      example_gloss: It reported itself that there was an accident.
      example_wrong: It reported that there was an accident.
      example_correct: It was reported that there was an accident.
      explanation: Spanish "se + reporting verb" is an impersonal/passive construction.
        English requires a passive construction (It was reported) or an active construction
        with a specific subject. Spanish speakers may produce "It reported" instead
        of "It was reported."
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish does not use the 'it + passive reporting verb + that-clause'
      construction common in English. Spanish learners may produce sentences like
      'People say that he is rich' instead of 'It is said that he is rich.' This occurs
      because the L1 uses different structures for impersonal reporting.
    teacher_tips:
      how_to_explain: IT IS SAID/BELIEVED/REPORTED THAT + clause.
      where_to_start: Practice impersonal reporting structures.
      exercises:
      - name: passive with reporting verbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'passive with reporting verbs' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
