          of purpose' structure.
        duration: 10
      - name: infinitive of purpose Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'infinitive of
          purpose' errors.
        duration: 15
      sequencing: Introduce infinitive of purpose with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
