  past_perfect_continuous:
    interference_patterns:
    - pattern: Had been + -ing for duration before past point
      example_l1: Había estado estudiando por dos horas.
      example_gloss: I had been studying for two hours.
      example_wrong: I was studying for two hours.
      example_correct: I had been studying for two hours.
      explanation: Spanish pluscuamperfecto continuo (había estado + gerundio) corresponds
        to English past perfect continuous (had been + -ing). Spanish speakers may
        use past continuous where English requires past perfect continuous for duration-before-past-point.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish "había estado + gerundio" — rare but testable
      example_l1: Había estado esperando por una hora.
      example_gloss: I had been waiting for an hour.
      example_wrong: I was waiting for an hour.
      example_correct: I had been waiting for an hour.
      explanation: Spanish "había estado + gerundio" is the past perfect continuous,
        used for duration before a past point. English requires "had been + -ing."
        Spanish speakers may use simple past continuous, losing the "before another
        past event" meaning.
      frequency: 2
      persistence: 2
      communicative_impact: 2
    why_it_happens: HAD BEEN + -ING = duration before another past action.
    teacher_tips:
      how_to_explain: Emphasizes duration of a past action before another past event.
      where_to_start: Practice with interruption/time frames.
      exercises:
      - name: past perfect continuous Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'past perfect continuous' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: past perfect continuous Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'past perfect continuous'
          errors. Students identify and correct each error.
        duration: 15
      - name: past perfect continuous Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'past
          perfect continuous' structure.
        duration: 10
      - name: past perfect continuous Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'past perfect
          continuous' errors.
        duration: 15
      sequencing: Introduce past perfect continuous with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
    examples:
    - '''She HAD BEEN WORKING for 10 hours before she took a break.'''
    - 'Wrong: ''I had studied for hours when she called.'' Better: ''I HAD BEEN STUDYING
