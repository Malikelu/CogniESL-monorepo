        description: Students create 5 original sentences using correct English 'the
          the comparatives' structure.
        duration: 10
      - name: the the comparatives Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'the the comparatives'
          errors.
        duration: 15
      sequencing: Introduce the the comparatives with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
