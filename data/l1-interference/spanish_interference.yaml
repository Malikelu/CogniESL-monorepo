    why_it_happens: MAKE/LET + object + base verb. HEAR/SEE + object + base = perception.
    teacher_tips:
      how_to_explain: '''Let him GO.'' ''Make her STOP.'' ''I saw him LEAVE.'' (NOT
        ''to leave'').'
      where_to_start: Learn verb patterns with bare infinitive.
      exercises:
      - name: verbs followed by bare infinitive Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'verbs followed by bare infinitive' structure. Emphasize the
          structural difference between Spanish and English.
