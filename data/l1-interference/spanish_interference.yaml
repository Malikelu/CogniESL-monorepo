  subject_verb_agreement:
    interference_patterns:
    - pattern: Third person singular -s omitted
      example_l1: Ella habla inglés.
      example_gloss: She speaks English.
      example_wrong: She speak English.
      example_correct: She speaks English.
      explanation: 'Spanish verb endings clearly mark person and number (habla, hablas,
        hablamos, hablan), making subject-verb agreement highly visible. English has
        minimal agreement (only 3rd person singular -s: he speaks). Spanish speakers
        frequently omit the -s because English agreement is less salient and their
        L1 does not require a suffix for 3rd person singular.'
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Subject-verb agreement with collective nouns
      example_l1: La gente es...
      example_gloss: The people is...
      example_wrong: The people is nice.
      example_correct: The people are nice.
      explanation: Spanish collective nouns (gente, equipo, familia) take singular
        verbs. English collective nouns can take plural verbs (the people are, the
        team are). Spanish speakers may use singular verbs with English collective
        nouns.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Agreement errors with there is/there are
      example_l1: Hay muchos libros.
      example_gloss: There is many books.
      example_wrong: There is many books.
      example_correct: There are many books.
      explanation: Spanish "hay" is invariable — it does not change for singular or
        plural. English distinguishes "there is" (singular) from "there are" (plural).
        Spanish speakers overuse "there is" because their L1 has only one form.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    why_it_happens: Spanish verbs encode person and number. English only marks 3rd
      person singular.
    teacher_tips:
      how_to_explain: Most English verbs DON'T change form. Only he/she/it adds -s.
      where_to_start: 'Practice with high-frequency verbs: have, go, do, make.'
      exercises:
      - name: subject verb agreement Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'subject verb agreement' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: subject verb agreement Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'subject verb agreement'
          errors. Students identify and correct each error.
        duration: 15
      - name: subject verb agreement Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subject
          verb agreement' structure.
        duration: 10
      - name: subject verb agreement Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subject verb
          agreement' errors.
        duration: 15
      sequencing: Introduce subject verb agreement with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''She go to school.'' Correct: ''She GOES to school.'''
    - 'Wrong: ''He don''t like it.'' Correct: ''He DOESN''T LIKE it.'''
    - 'Wrong: ''They plays football.'' Correct: ''They PLAY football.'''
    - 'Wrong: ''I has a car.'' Correct: ''I HAVE a car.'''
    sources:
