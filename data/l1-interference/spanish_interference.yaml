  a_an_the:
    interference_patterns:
    - Confusion between a/an and the in first vs subsequent mention
    - Zero article omitted before singular count nouns
    why_it_happens: Spanish indefinite article maps loosely to a/an but is used less
      frequently.
    teacher_tips:
      how_to_explain: A/AN = first mention. THE = subsequent mention.
      where_to_start: Practice first mention vs. second mention.
      exercises:
      - name: a an the Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'a an the' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: a an the Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'a an the' errors. Students
          identify and correct each error.
        duration: 15
      - name: a an the Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'a
          an the' structure.
        duration: 10
      - name: a an the Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'a an the' errors.
        duration: 15
      sequencing: Introduce a an the with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'First mention: ''I bought A BOOK at A STORE.'' Second mention: ''THE BOOK was
      interesting.'''
    - 'Wrong: ''I want apple.'' Correct: ''I want AN apple.'''
    - 'Wrong: ''He is the doctor.'' (general). Correct: ''He is A doctor.'' (profession).'
    sources:
    - Robertson, J. S. (2000). Transfer in Spanish English article use.
    - Swan, M. & Smith, B. (2001).
