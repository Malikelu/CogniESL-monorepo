      - name: nominalization Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'nominalization'
          errors.
        duration: 15
      sequencing: Introduce nominalization with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
