  possessive_pronouns:
    interference_patterns:
    - Confusion between possessive adjective and possessive pronoun
    - Spanish 'su' covers all possessive forms
    why_it_happens: Spanish uses 'su/sus' for all 3rd person. English distinguishes
      his/her/its.
    teacher_tips:
      how_to_explain: Before noun = adjective (my book). Alone = pronoun (mine).
      where_to_start: Practice substitution drills.
      exercises:
      - name: possessive pronouns Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'possessive pronouns' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: possessive pronouns Error Correction
        type: error-correction
