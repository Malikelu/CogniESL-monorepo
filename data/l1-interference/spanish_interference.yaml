  relative_pronouns:
    interference_patterns:
    - que/quien/el que used interchangeably for who/which/that
    - Omission of relative pronoun in English where required as subject
    why_it_happens: Spanish uses 'que' for all relative pronouns. English distinguishes
      who/which/that.
    teacher_tips:
      how_to_explain: WHO=humans. WHICH=things. THAT=informal. Never omit if subject.
      where_to_start: Practice identifying the role of the relative pronoun.
      exercises:
      - name: relative pronouns Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'relative pronouns' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: relative pronouns Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'relative pronouns' errors.
          Students identify and correct each error.
        duration: 15
      - name: relative pronouns Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'relative
          pronouns' structure.
        duration: 10
      - name: relative pronouns Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'relative pronouns'
          errors.
        duration: 15
      sequencing: Introduce relative pronouns with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''The person which lives here is nice.'' Correct: ''The person WHO lives
      here is nice.'''
    - 'Wrong: ''The book who I read.'' Correct: ''The book WHICH/THAT I read.'''
    - '''She is someone WHO can help you.'''
    - 'Spanish: ''El libro que lei'' = ''The book THAT I read.'' (object = can omit).'
    sources:
    - Gass, S. & Selinker, L. (2008).
    - Hewings, M. (1991). Relative clauses in English.
