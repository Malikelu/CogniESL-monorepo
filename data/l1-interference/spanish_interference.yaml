  coordinating_conjunctions:
    interference_patterns:
    - pattern: Conjunction "y" overused for all coordination
      example_l1: Pan y mantequilla. / Fui y lo vi.
      example_gloss: Bread and butter. / I went and I saw him.
      example_wrong: I went and saw him. (may be correct but misses nuance)
      example_correct: I went and saw him. / I went to see him.
      explanation: Spanish "y" (and) is used more broadly than English "and." Spanish
        speakers may overuse "and" to connect clauses where English would use "to"
        (I went to see him), "so" (It was raining, so we stayed), or other connectors.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: Spanish 'y/pero/o' map loosely to English but/so/or.
    teacher_tips:
      how_to_explain: AND=addition. BUT=contrast. SO=result. OR=choice.
      where_to_start: Practice combining simple sentences.
      exercises:
      - name: coordinating conjunctions Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'coordinating conjunctions' structure. Emphasize the structural
          difference between Spanish and English.
