  false_friends:
    interference_patterns:
    - pattern: 'False friends: words similar in form but different in meaning'
      example_l1: Estoy embarazada. / El éxito del proyecto.
      example_gloss: I am embarrassed/pregnant. The exit/success of the project.
      example_wrong: I am embarrassed. The exit of the project.
      example_correct: I am pregnant. The success of the project.
      explanation: 'False friends (falsos amigos) are among the most treacherous sources
        of error. Whitley lists: embarazada (pregnant, not embarrassed), éxito (success,
        not exit), fábrica (factory, not fabric), actual (current, not actual), colegio
        (school, not college), asistir (attend, not assist), sensible (sensitive,
        not sensible), largo (long, not large), sano (healthy/hurt, not sane). These
        errors have high communicative impact because they can cause serious misunderstandings.'
      frequency: 5
      persistence: 4
      communicative_impact: 5
    why_it_happens: Deceptive because they look similar but mean different things.
    teacher_tips:
      how_to_explain: Always verify meaning in context. 'Sensible' (Sp=sensitive,
        En=reasonable).
      where_to_start: Study false friend pairs.
      exercises:
      - name: false friends Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'false friends' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: false friends Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'false friends' errors.
          Students identify and correct each error.
        duration: 15
      - name: false friends Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'false
          friends' structure.
        duration: 10
      - name: false friends Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'false friends'
          errors.
        duration: 15
      sequencing: Introduce false friends with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Sensible'' in Spanish = sensitive. In English = reasonable.'
    - '''Constipado'' in Spanish = having a cold. In English = constipated.'
    - '''Largo'' in Spanish = long. In English, ''large'' is for size, ''long'' for
      length.'
    sources:
    - Lado, A. (1957).
    - Ringbom, H. (2007).
