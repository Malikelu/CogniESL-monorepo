  passive_voice_complex:
    interference_patterns:
    - pattern: 'Complex passive structures: get-passive, double passive'
      example_l1: Se le acusó del crimen.
      example_gloss: Himself he accused of the crime.
      example_wrong: He accused himself of the crime.
      example_correct: He was accused of the crime.
      explanation: Spanish uses "se" constructions for complex passive meanings. English
        has get-passive (got accused), double passive, and other complex forms. Spanish
        speakers may avoid these or translate "se" literally, producing ungrammatical
        English.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Spanish lacks complex passives available in English
      example_l1: La casa se está construyendo.
      example_gloss: The house itself is building.
      example_wrong: The house is building.
      example_correct: The house is being built.
      explanation: Spanish uses "se" + progressive for what English expresses with
        passive progressive (is being built). Spanish speakers may produce "The house
        is building" (active) instead of "The house is being built" (passive progressive).
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: GET-PASSIVE = informal. DOUBLE PASSIVE = two passives in one sentence.
    teacher_tips:
      how_to_explain: 'Get-passive: ''He GOT HIT by a car.'' (informal = was hit).'
      where_to_start: Recognize get-passive in informal speech/writing.
      exercises:
      - name: passive voice complex Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'passive voice complex' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: passive voice complex Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'passive voice complex'
          errors. Students identify and correct each error.
        duration: 15
      - name: passive voice complex Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'passive
          voice complex' structure.
        duration: 10
      - name: passive voice complex Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'passive voice
          complex' errors.
        duration: 15
      sequencing: Introduce passive voice complex with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''The criminal GOT SENTENCED to 20 years.'' (get-passive)'
    - '''The project IS BEING WORKED ON by the team.'' (phrasal verb passive).'
    - 'Spanish: ''Se lo envió.'' -> ''It WAS SENT to him.'' or ''He GOT it SENT.'''
    sources:
