  make_vs_do:
    interference_patterns:
    - pattern: Hacer used for both "make" and "do"
      example_l1: Hago mi tarea. / Hago un pastel.
      example_gloss: I do/make my homework. / I do/make a cake.
      example_wrong: I do a cake. / I make my homework.
      example_correct: I do my homework. / I make a cake.
      explanation: 'Spanish uses "hacer" for both English "make" (create/produce)
        and "do" (perform/activity). English distinguishes them: "make" = create/produce
        (make a cake, make a mistake), "do" = perform/activity (do homework, do exercise).
        Spanish speakers confuse "make" and "do" because their L1 uses one verb for
        both.'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Spanish uses 'hacer' for both. English distinguishes them idiomatically.
    teacher_tips:
      how_to_explain: 'DO = duty: do homework. MAKE = create: make a mistake.'
      where_to_start: Learn the 30 most common make/do collocations.
      exercises:
      - name: make vs do Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'make vs do' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: make vs do Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'make vs do' errors.
          Students identify and correct each error.
        duration: 15
      - name: make vs do Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'make
          vs do' structure.
        duration: 10
      - name: make vs do Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'make vs do'
          errors.
        duration: 15
      sequencing: Introduce make vs do with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I make my homework.'' Correct: ''I DO my homework.'''
    - 'Wrong: ''She does a mistake.'' Correct: ''She MAKES a mistake.'''
    - '''MAKE a decision'' (NOT ''do a decision'').'
    - '''DO your best'' (NOT ''make your best'').'
    - '''MAKE sense'' (NOT ''do sense'').'
    sources:
    - Lennon, P. (1990). Investigating structures and collocations.
    - Nesselhauf, N. (2005). Collocations in a learner corpus.
