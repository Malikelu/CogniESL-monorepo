        description: Provide 15 sentences with Spanish-style 'participial clauses
          advanced' errors. Students identify and correct each error.
        duration: 15
      - name: participial clauses advanced Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'participial
          clauses advanced' structure.
        duration: 10
      - name: participial clauses advanced Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'participial
          clauses advanced' errors.
        duration: 15
      sequencing: Introduce participial clauses advanced with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
