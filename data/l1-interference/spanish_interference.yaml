  clitic_climbing:
    interference_patterns:
    - pattern: Clitic climbing transferred to English
      example_l1: Lo quiero ver.
      example_gloss: I want to see it.
      example_wrong: I want it to see.
      example_correct: I want to see it.
      explanation: Spanish allows clitic pronouns to climb from an infinitive complement
        to the main verb (Lo quiero ver = Quiero verlo). English does not have clitic
        climbing — the object stays with its verb. Spanish speakers may misplace pronouns
        in complex verb constructions.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: English requires fixed pronoun order. Spanish allows climbing.
    teacher_tips:
      how_to_explain: I gave HIM the book. or I gave the book TO HIM. Never 'I gave
        to him it.'
      where_to_start: 'Practice ditransitive verbs: give, tell, send, show.'
      exercises:
      - name: clitic climbing Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'clitic climbing' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: clitic climbing Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'clitic climbing' errors.
          Students identify and correct each error.
        duration: 15
      - name: clitic climbing Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'clitic
          climbing' structure.
        duration: 10
      - name: clitic climbing Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'clitic climbing'
          errors.
        duration: 15
      sequencing: Introduce clitic climbing with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
