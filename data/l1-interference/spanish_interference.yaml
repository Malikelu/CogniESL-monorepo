  much_vs_many:
    interference_patterns:
    - pattern: Much vs many confusion due to single Spanish form "mucho"
      example_l1: Mucha gente / Muchos libros
      example_gloss: Much people / Much books
      example_wrong: Much people / Much books
      example_correct: Many people / Many books
      explanation: Spanish "mucho" covers both English "much" and "many." Spanish
        speakers must learn the English count/mass distinction, which does not exist
        in Spanish grammar. This is a persistent error because the L1 does not mark
        the distinction grammatically.
      frequency: 5
      persistence: 4
      communicative_impact: 3
    why_it_happens: MUCH = how much of uncountable. MANY = how many individual items.
    teacher_tips:
      how_to_explain: Use 'many' for countable plurals, 'much' for uncountables.
      where_to_start: Practice sorting nouns by countability.
      exercises:
      - name: much vs many Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'much vs many' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: much vs many Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'much vs many' errors.
          Students identify and correct each error.
        duration: 15
      - name: much vs many Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'much
          vs many' structure.
        duration: 10
      - name: much vs many Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'much vs many'
          errors.
        duration: 15
      sequencing: Introduce much vs many with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''How MANY times have you told me?'' (countable). ''Not MUCH effort was needed.''
      (uncountable).'
    - '''Too MUCH noise.'' (uncountable). ''Too MANY rules.'' (countable).'
    - '''NOT many people came.'' / ''NOT much effort was needed.'''
    sources:
