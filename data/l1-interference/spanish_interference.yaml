  possessive_s:
    interference_patterns:
    - pattern: Possessive "s" not produced (Spanish uses "de")
      example_l1: El libro de Juan.
      example_gloss: The book of John.
      example_wrong: The book of John.
      example_correct: John's book.
      explanation: Spanish expresses possession with "de" (el libro de Juan = the
        book of John). English uses the possessive 's (John's book). Spanish speakers
        overuse "of" for possession, producing "the book of John" instead of "John's
        book." This is especially persistent with inanimate nouns.
      frequency: 4
      persistence: 4
      communicative_impact: 2
    why_it_happens: Spanish uses 'de' (el coche de Juan). English uses 's for people.
    teacher_tips:
      how_to_explain: 'For PEOPLE: use ''s. For THINGS: use of-phrase. Juan''s car.'
      where_to_start: Practice possessives with people's names.
      exercises:
      - name: possessive s Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'possessive s' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: possessive s Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'possessive s' errors.
          Students identify and correct each error.
        duration: 15
      - name: possessive s Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'possessive
          s' structure.
        duration: 10
      - name: possessive s Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'possessive s'
          errors.
        duration: 15
      sequencing: Introduce possessive s with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish: ''El coche de Juan'' = English: ''Juan''s car.'''
    - 'Wrong: ''The Maria''s house.'' Correct: ''Maria''s house.'''
    - 'Wrong: ''the color of the car\''s.'' Correct: ''the color of the car.'''
