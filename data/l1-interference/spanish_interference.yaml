  shall:
    interference_patterns:
    - pattern: '"Shall" rarely encountered by Spanish speakers'
      example_l1: ¿Quieres café?
      example_gloss: Want you coffee?
      example_wrong: Want you coffee?
      example_correct: Would you like some coffee?
      explanation: English "shall" (for suggestions, offers, and formal future) has
        no direct equivalent in Spanish. Spanish speakers rarely encounter "shall"
        and may not use it at all, preferring "will" for all future contexts.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: Confusion with "will"
      example_l1: Iré mañana.
      example_gloss: I will go tomorrow.
      example_wrong: I shall go tomorrow. (overly formal)
      example_correct: I will go tomorrow.
      explanation: Spanish future tense (iré) maps to English "will." English "shall"
        is increasingly rare and mainly used in formal/legal contexts or in first-person
        offers/suggestions. Spanish speakers may overuse "shall" if taught British
        English.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    - pattern: '"Shall I...?" for formal offers/suggestions'
      example_l1: ¿Abro la ventana?
      example_gloss: Open I the window?
      example_wrong: Open I the window?
      example_correct: Shall I open the window?
      explanation: Spanish uses the present tense for offers (¿Abro la ventana?).
        English uses "Shall I...?" for first-person offers/suggestions. Spanish speakers
        may produce "Do I open the window?" instead of "Shall I open the window?"
      frequency: 2
      persistence: 2
      communicative_impact: 2
    - pattern: '"Will" replacing "shall" in modern English'
      example_l1: ¿Te ayudo?
      example_gloss: You I help?
      example_wrong: Do I help you?
      example_correct: Shall I help you? / Can I help you?
      explanation: Spanish offers (¿Te ayudo?) do not use a future tense. English
        uses "Shall I...?" or "Can I...?" for offers. Spanish speakers may produce
        "Do I help you?" which sounds like a genuine question rather than an offer.
      frequency: 2
      persistence: 2
      communicative_impact: 2
    why_it_happens: Shall is formal/archaic in American English. Used for first person
      offers.
    teacher_tips:
      how_to_explain: 'SHALL for first person questions (offers): ''Shall I open the
        window?'' WILL otherwise.'
      where_to_start: Practice formal offers with shall.
      exercises:
      - name: shall Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'shall' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: shall Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'shall' errors. Students
          identify and correct each error.
        duration: 15
      - name: shall Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'shall'
          structure.
        duration: 10
      - name: shall Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'shall' errors.
        duration: 15
      sequencing: Introduce shall with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - '''Shall I help you with that?'' (offer).'
    - '''I shall return.'' (formal/literary). ''I will return.'' (normal).'
    - 'Wrong: ''Shall you go?'' Correct: ''WILL you go?'' (not first person).'
