  present_perfect:
    interference_patterns:
    - pattern: Present perfect overused for completed past actions
      example_l1: ¿Has comido ayer?
      example_gloss: Have you eaten yesterday?
      example_wrong: Have you eaten yesterday?
      example_correct: Did you eat yesterday?
      explanation: Spanish pretérito perfecto (he/has/ha + participle) is used more
        broadly than English present perfect, often with specific past time markers.
        English present perfect cannot be used with specific past time references
        (yesterday, last week, in 2010). Spanish speakers transfer this pattern, producing
        "Have you eaten yesterday?"
      frequency: 5
      persistence: 4
      communicative_impact: 3
    - pattern: Simple past underused where English requires present perfect
      example_l1: Siempre he vivido aquí.
      example_gloss: I always lived here.
      example_wrong: I always lived here.
      example_correct: I have always lived here.
      explanation: English present perfect is used for states/activities continuing
        from the past to the present (I have lived here for 10 years). Spanish can
        use either present perfect or simple past for this. Spanish speakers may use
        simple past where English requires present perfect, losing the "continuing
        to present" meaning.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: English present perfect = past + present relevance (have/has +
      V3).
    teacher_tips:
      how_to_explain: PRESENT PERFECT = life experience, unfinished time. 'Have you
        EVER been?'
      where_to_start: Practice with 'Have you ever...?' questions.
      exercises:
      - name: present perfect Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'present perfect' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: present perfect Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'present perfect' errors.
          Students identify and correct each error.
        duration: 15
      - name: present perfect Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'present
          perfect' structure.
        duration: 10
      - name: present perfect Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'present perfect'
          errors.
        duration: 15
      sequencing: Introduce present perfect with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''Did you go to Paris?'' (neutral). Better for experience: ''Have you
      EVER been to Paris?'''
    - 'Wrong: ''I went to Japan twice.'' (if still relevant). Correct: ''I HAVE been
      to Japan twice.'''
    - '''She HAS LIVED in London for five years.'' (she still lives there).'
    sources:
    - Bardin, H. (2009).
    - Rott, S. (2009). The effect of frequency of input on tense-aspect development.
    - Montrul, S. (2004).
