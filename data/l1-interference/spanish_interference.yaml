  some_any:
    interference_patterns:
    - Spanish 'algun/ningun' vs English 'some/any'
    - Some in affirmative, any in negative/questions
    why_it_happens: SOME in affirmative. ANY in negative and questions. SOME in questions
      = offer/expectation of yes.
    teacher_tips:
      how_to_explain: I have SOME friends. I don't have ANY enemies. Do you have ANY
        questions? (neutral). Would you like SOME tea? (offer).
      where_to_start: Practice with countable and uncountable nouns.
      exercises:
      - name: some any Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'some any' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: some any Error Correction
        type: error-correction
