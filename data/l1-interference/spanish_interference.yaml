  gustar_verbs:
    interference_patterns:
    - encantar, fascinar, molestar, importar treated like regular verbs
    - failure to identify inverted subject constructions
    why_it_happens: Spanish has multiple verbs following the gustar pattern.
    teacher_tips:
      how_to_explain: GUSTAR, ENCANTAR, MOLESTAR, IMPORTAR, FALTAR, PARECER — the
        thing is the subject.
      where_to_start: List gustar-type verbs with example sentences.
      exercises:
      - name: gustar verbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'gustar verbs' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: gustar verbs Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'gustar verbs' errors.
          Students identify and correct each error.
        duration: 15
      - name: gustar verbs Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'gustar
          verbs' structure.
        duration: 10
      - name: gustar verbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'gustar verbs'
          errors.
        duration: 15
      sequencing: Introduce gustar verbs with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Me IMPORTA tu opinion.'' = ''Your opinion MATTERS to me.'''
    - '''Nos HACE FALTA un libro.'' = ''We NEED a book.'' (lit: a book is missing
      to us).'
    - 'Wrong: ''I love very much the movie.'' Correct: ''The movie ENCHANTS me.'''
    sources:
    - Bruhn de Garavito, J. & Geeslin, K. (2004).
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
