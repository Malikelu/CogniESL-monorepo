  tener_age:
    interference_patterns:
    - 'Spanish ''tener X anos'' literally translated: ''I have 25 years'''
    - Possessive 'have' transferred for age expression
    why_it_happens: In Spanish, age = tener (to have). English = to be.
    teacher_tips:
