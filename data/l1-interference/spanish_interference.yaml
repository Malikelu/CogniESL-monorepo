  gustar_verbs:
    interference_patterns:
    - pattern: encantar, fascinar, molestar, importar treated like regular verbs
      example_l1: Me fascina la historia.
      example_gloss: To me fascinates the story.
      example_wrong: I fascinate the story.
      example_correct: I am fascinated by the story. / The story fascinates me.
      explanation: Spanish gustar-type verbs (encantar, fascinar, molestar, importar,
        interesar, preocupar) have inverted subject-object roles compared to English.
        Spanish speakers may treat them like regular verbs, producing "I fascinate
        the story" instead of "The story fascinates me."
      frequency: 4
      persistence: 4
      communicative_impact: 4
    - pattern: failure to identify inverted subject constructions
      example_l1: Nos interesa la política.
      example_gloss: To us interests the politics.
      example_wrong: We interest politics.
      example_correct: Politics interests us. / We are interested in politics.
      explanation: Spanish gustar-type verbs have the thing as the subject and the
        person as the indirect object. English uses either a regular verb with the
        person as subject (We are interested in) or an inverted construction (Politics
        interests us). Spanish speakers may produce "We interest politics" — reversing
        the roles.
      frequency: 4
      persistence: 4
      communicative_impact: 4
    why_it_happens: Spanish has multiple verbs following the gustar pattern.
    teacher_tips:
      how_to_explain: GUSTAR, ENCANTAR, MOLESTAR, IMPORTAR, FALTAR, PARECER — the
        thing is the subject.
      where_to_start: List gustar-type verbs with example sentences.
      exercises:
      - name: gustar verbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'gustar verbs' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: gustar verbs Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'gustar verbs' errors.
          Students identify and correct each error.
        duration: 15
      - name: gustar verbs Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'gustar
          verbs' structure.
        duration: 10
      - name: gustar verbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'gustar verbs'
          errors.
        duration: 15
      sequencing: Introduce gustar verbs with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Me IMPORTA tu opinion.'' = ''Your opinion MATTERS to me.'''
    - '''Nos HACE FALTA un libro.'' = ''We NEED a book.'' (lit: a book is missing
      to us).'
    - 'Wrong: ''I love very much the movie.'' Correct: ''The movie ENCHANTS me.'''
    sources:
    - Bruhn de Garavito, J. & Geeslin, K. (2004).
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher''s Guide to Interference
      and Other Problems. Cambridge University Press.'
