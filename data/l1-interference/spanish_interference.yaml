        No. 25, pp. 139-155
      location: pp. 139-155
      tier: 2
  present_perfect_cont:
    interference_patterns:
    - pattern: Present perfect continuous vs present perfect simple
      example_l1: He estado estudiando todo el día.
      example_gloss: I have been studying all day.
      example_wrong: I have studied all day. (loses the ongoing sense)
      example_correct: I have been studying all day.
      explanation: Spanish uses "estar + gerundio" with "he" for present perfect continuous
        (he estado estudiando). English distinguishes present perfect simple (have
        studied) from present perfect continuous (have been studying). Spanish speakers
        may not make this distinction.
      frequency: 4
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish lacks the present perfect continuous distinction
      example_l1: Lloviendo desde las ocho.
      example_gloss: Raining since eight.
      example_wrong: It rains since eight.
      example_correct: It has been raining since eight.
      explanation: 'Spanish uses "llevar + gerundio" or "hace que + present" for duration-up-to-now.
        English requires present perfect continuous (has been raining). Spanish speakers
        may use simple present: "It rains since eight."'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: HAVE BEEN + -ING = duration, ongoing. HAVE + V3 = completed, result.
    teacher_tips:
      how_to_explain: Continuous = duration/emphasize process. Simple = completed/result.
      where_to_start: Contrast 'I have read 5 books' vs 'I have been reading for 3
        hours.'
      exercises:
      - name: present perfect cont Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'present perfect cont' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: present perfect cont Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'present perfect cont'
          errors. Students identify and correct each error.
        duration: 15
      - name: present perfect cont Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'present
          perfect cont' structure.
        duration: 10
      - name: present perfect cont Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'present perfect
          cont' errors.
        duration: 15
      sequencing: Introduce present perfect cont with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''I HAVE BEEN STUDYING for 3 hours.'' (still going/duration).'
    - 'Present perfect simple: ''I HAVE READ 5 books.'' (completed, result).'
    - 'Present perfect continuous: ''I HAVE BEEN STUDYING English for 10 years.''
      (duration).'
    sources:
    - Bardin, H. (2009).
    - Gass, S. & Selinker, L. (2008).
