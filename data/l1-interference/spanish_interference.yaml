  concession_clauses:
    interference_patterns:
    - Spanish 'aunque' confused with 'pero'
    - 'Redundancy: ''Although...but...'''
    why_it_happens: Spanish allows double conjunctions like 'aunque...pero' (although...but),
      which is redundant in English. Spanish learners may produce sentences like 'Although
      it rained, but we went out' instead of 'Although it rained, we went out.' This
      transfer occurs because the L1 discourse conventions allow paired conjunctions.
    teacher_tips:
      how_to_explain: ALTHOUGH = even though. Remove 'but' from the sentence.
      where_to_start: Practice 'although' without 'but'.
      exercises:
      - name: concession clauses Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'concession clauses' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: concession clauses Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'concession clauses'
          errors. Students identify and correct each error.
        duration: 15
      - name: concession clauses Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'concession
          clauses' structure.
        duration: 10
      - name: concession clauses Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'concession clauses'
          errors.
        duration: 15
      sequencing: Introduce concession clauses with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''Although it was cold, but we went swimming.'' Correct: ''ALTHOUGH
      it was cold, we went.'''
    - 'Spanish: ''Aunque es dificil, lo intento.'' = ''ALTHOUGH it is difficult, I
      try.'''
    - '''EVEN THOUGH he studied hard, he failed.'''
    sources:
    - Gonzalez Lopez, A. (2010).
    - Gass, S. & Selinker, L. (2008).
