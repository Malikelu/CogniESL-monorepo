  mixed_conditionals:
    interference_patterns:
    - Confusion mixing conditionals across time frames
    why_it_happens: Mixed conditionals combine different time frames with no Spanish
      equivalent.
    teacher_tips:
      how_to_explain: 'PAST fact + PRESENT result: If + HAD, WOULD + base. PAST fact
        + PAST result: If + HAD, WOULD HAVE + V3.'
      where_to_start: Identify the time frame in each clause.
      exercises:
      - name: mixed conditionals Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'mixed conditionals' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
