  would_like:
    interference_patterns:
    - pattern: '"Would like" = polite form of "want"'
      example_l1: Quisiera un café.
      example_gloss: I would like a coffee.
      example_wrong: I would like a coffee. (correct but may be underused)
      example_correct: I would like a coffee.
      explanation: Spanish "quisiera" (conditional of querer) is the polite form of
        "want." English "would like" is the equivalent. Spanish speakers may use "want"
        directly where English prefers "would like" for politeness.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish "quisiera" = would like
      example_l1: Me gustaría ir.
      example_gloss: Me it would like to go.
      example_wrong: Me it would like to go.
      example_correct: I would like to go.
      explanation: Spanish "gustaría" (conditional of gustar) maps to English "would
        like." Spanish speakers may produce "Me it would like to go" — literally translating
        the Spanish indirect object construction.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: WOULD LIKE = polite request/wish. More formal than 'want'.
    teacher_tips:
      how_to_explain: '''I WOULD LIKE a coffee, please.'' = ''Quisiera un cafe.'''
      where_to_start: Practice polite requests.
