  tense_shifts_narrative:
    interference_patterns:
    - pattern: Shifting tenses in reported narrative
      example_l1: Dijo que viene mañana.
      example_gloss: He said that he comes tomorrow.
      example_wrong: He said that he comes tomorrow.
      example_correct: He said that he was coming tomorrow.
      explanation: Spanish does not require tense backshift in reported speech when
        the situation is still true. English traditionally requires backshift (present
        -> past). Spanish speakers may not backshift in reported speech.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Spanish often does not shift tenses in reported speech
      example_l1: Me dijo que está enfermo.
      example_gloss: He told me that he is sick.
      example_wrong: He told me that he is sick.
      example_correct: He told me that he was sick.
      explanation: Spanish does not require tense backshift when the reported information
        is still current. English traditionally requires backshift. Spanish speakers
        may not backshift, producing "He said he is sick" instead of "He said he was
        sick."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: When reporting past speech, English shifts tenses back. Spanish
      doesn't always do this.
    teacher_tips:
      how_to_explain: '''I am tired'' -> He said he WAS tired. Backshift in reported
        speech.'
      where_to_start: Practice converting direct speech to narrative reports.
      exercises:
      - name: tense shifts narrative Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'tense shifts narrative' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: tense shifts narrative Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'tense shifts narrative'
          errors. Students identify and correct each error.
        duration: 15
      - name: tense shifts narrative Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'tense
          shifts narrative' structure.
        duration: 10
      - name: tense shifts narrative Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'tense shifts
          narrative' errors.
        duration: 15
      sequencing: Introduce tense shifts narrative with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''I am tired,'' she said. -> She said she WAS tired.'
    - '''I will help you,'' he promised. -> He promised he WOULD help.'
    - 'Spanish: ''Dijo que esta cansado.'' (no shift) -> English requires: ''He said
      he WAS tired.'''
    sources:
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
    - Gonzalez Lopez, A. (2010).
