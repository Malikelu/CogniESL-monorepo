  coordinating_conjunctions:
    interference_patterns:
    - Overuse of 'y' transferred to 'and'
    - Confusion between but/so/or
    why_it_happens: Spanish 'y/pero/o' map loosely to English but/so/or.
    teacher_tips:
      how_to_explain: AND=addition. BUT=contrast. SO=result. OR=choice.
      where_to_start: Practice combining simple sentences.
      exercises:
      - name: coordinating conjunctions Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'coordinating conjunctions' structure. Emphasize the structural
          difference between Spanish and English.
        duration: 15
      - name: coordinating conjunctions Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'coordinating conjunctions'
          errors. Students identify and correct each error.
        duration: 15
      - name: coordinating conjunctions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'coordinating
          conjunctions' structure.
        duration: 10
      - name: coordinating conjunctions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'coordinating
          conjunctions' errors.
        duration: 15
      sequencing: Introduce coordinating conjunctions with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''He is smart but he works hard.'' (contrast?). Correct: ''He is smart
      AND he works hard.'''
    - '''She studied hard, SO she passed.'''
    - 'Wrong: ''Do you want coffee and tea?'' Correct: ''Do you want coffee OR tea?'''
    sources:
