  object_questions:
    interference_patterns:
    - pattern: Object questions with pronouns vs noun phrases
      example_l1: ¿A quién viste? / ¿Qué compraste?
      example_gloss: Whom did you see? / What did you buy?
      example_wrong: Who did you see? (informal) / What you bought?
      example_correct: Who/Whom did you see? / What did you buy?
      explanation: Spanish object questions use "a quién" (whom) and "qué" (what)
        with the same word order as declaratives. English requires do-support and
        inversion in object questions. Spanish speakers may produce "What you bought?"
        without inversion.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    - pattern: Spanish "a quien/lo que" do not map directly to English
      example_l1: ¿A quién buscas?
      example_gloss: Whom look-for you?
      example_wrong: Whom you look for?
      example_correct: Who are you looking for?
      explanation: Spanish "a quién" maps to English "who/whom" but the word order
        differs. Spanish places the object before the verb; English uses inversion
        with do-support. Spanish speakers may produce "Whom you look for?" following
        Spanish word order.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: 'OBJECT questions: Whom/What + auxiliary + subject + verb.'
    teacher_tips:
      how_to_explain: Use WHOM (formal) or WHO (informal) for people. WHAT for things.
      where_to_start: Practice Wh- questions.
      exercises:
      - name: object questions Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'object questions' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: object questions Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'object questions' errors.
          Students identify and correct each error.
        duration: 15
      - name: object questions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'object
          questions' structure.
        duration: 10
      - name: object questions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'object questions'
          errors.
        duration: 15
      sequencing: Introduce object questions with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Whom did you invite?'' (formal). ''Who did you invite?'' (informal).'
    - 'Wrong: ''What did you gave me?'' Correct: ''What DID you GIVE me?'''
    - '''What does this mean?'' (NOT ''What means this?'').'
    sources:
    - Gonzalez Lopez, A. (2010).
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
