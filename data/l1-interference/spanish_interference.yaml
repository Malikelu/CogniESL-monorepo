  reported_speech:
    interference_patterns:
    - pattern: Tense not backshifted in reported speech
      example_l1: Dijo que viene mañana.
      example_gloss: He said that he comes tomorrow.
      example_wrong: He said that he comes tomorrow.
      example_correct: He said that he was coming tomorrow. / He said that he would
        come tomorrow.
      explanation: Spanish does not require tense backshift in reported speech when
        the situation is still true or relevant. English traditionally requires backshift
        (present -> past, will -> would). Spanish speakers may not backshift, producing
        "He said he comes" instead of "He said he was coming."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: Spanish often reports without backshifting. English requires tense
      changes.
    teacher_tips:
      how_to_explain: '''I am'' -> ''he was''. ''I will'' -> ''he would''. Shift tenses
        back.'
      where_to_start: Practice simple present -> simple past backshift.
      exercises:
      - name: reported speech Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'reported speech' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: reported speech Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'reported speech' errors.
          Students identify and correct each error.
        duration: 15
      - name: reported speech Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'reported
          speech' structure.
        duration: 10
      - name: reported speech Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'reported speech'
          errors.
        duration: 15
      sequencing: Introduce reported speech with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
