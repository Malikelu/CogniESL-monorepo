  used_to:
    interference_patterns:
    - pattern: '"Used to" for past habits and states'
      example_l1: Solía jugar al fútbol.
      example_gloss: I used to play soccer.
      example_wrong: I used to play soccer. (correct but may be underused)
      example_correct: I used to play soccer.
      explanation: Spanish "soler + infinitive" (solía jugar) maps to English "used
        to" for past habits. Spanish speakers may not use "used to," preferring simple
        past for all past habits.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish "soler + infinitivo" or imperfecto
      example_l1: Cuando era niño, jugaba al fútbol.
      example_gloss: When I was a child, I played soccer.
      example_wrong: When I was a child, I played soccer. (loses the habitual sense)
      example_correct: When I was a child, I used to play soccer.
      explanation: Spanish uses the imperfect (jugaba) for past habits. English can
        use "used to" or "would" for past habits, or simple past. Spanish speakers
        may not use "used to," losing the habitual nuance.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: USED TO = past habit or state that no longer exists.
    teacher_tips:
      how_to_explain: '''I USED TO live in Madrid.'' = Vivía en Madrid (but not anymore).'
      where_to_start: Practice past habits that have changed.
      exercises:
      - name: used to Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'used to' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: used to Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'used to' errors. Students
          identify and correct each error.
        duration: 15
      - name: used to Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'used
          to' structure.
        duration: 10
      - name: used to Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'used to' errors.
        duration: 15
      sequencing: Introduce used to with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - '''I USED TO play soccer every weekend.'' (but I don''t anymore).'
    - 'Spanish: ''Vivia en Madrid.'' = ''I USED TO live in Madrid.'''
    - 'Be careful: ''I am used to waking up early.'' = Acostumbrado (different meaning).'
    sources:
    - Bardin, H. (2009).
    - Gass, S. & Selinker, L. (2008).
