  negation:
    interference_patterns:
    - pattern: Double negation transferred from Spanish
      example_l1: No tengo nada.
      example_gloss: I don't have nothing.
      example_wrong: I don't have nothing.
      example_correct: I don't have anything. / I have nothing.
      explanation: 'Spanish allows and requires double negation (No tengo nada, No
        vino nadie). English does not: "I don''t have nothing" is non-standard. Spanish
        speakers produce double negatives that are grammatically incorrect in standard
        English.'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Pre-verbal negation without do-support
      example_l1: No como carne.
      example_gloss: No eat meat.
      example_wrong: No eat meat. / I no eat meat.
      example_correct: I don't eat meat.
      explanation: Spanish negation is simply "no" before the verb. English requires
        do-support for negation of main verbs (do not/don't + base form). Spanish
        speakers may produce "I no eat" or "No eat" instead of "I don't eat," especially
        at lower proficiency levels.
      frequency: 4
      persistence: 3
      communicative_impact: 4
    why_it_happens: English requires single negation with auxiliaries.
    teacher_tips:
      how_to_explain: Put NOT/ISN'T/DOESN'T between auxiliary and main verb. NEVER
        use double negation.
      where_to_start: Practice negating sentences with different tenses.
      exercises:
      - name: negation Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'negation' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: negation Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'negation' errors. Students
          identify and correct each error.
        duration: 15
      - name: negation Pattern Practice
