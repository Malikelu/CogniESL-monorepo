  peripheral_phenomena:
    interference_patterns:
    - pattern: 'Peripheral grammar: tags, echo questions, phatic expressions'
      example_l1: ¿Verdad? / ¿No? / ¿De verdad?
      example_gloss: True? / No? / Really?
      example_wrong: True? / You think? / Is that?
      example_correct: Right? / Don't you think? / Really?
      explanation: Spanish question tags (¿verdad?, ¿no?, ¿de verdad?) do not map
        directly to English tags (don't you?, isn't it?, right?). Spanish speakers
        may produce "True?" instead of "Right?" or "Is it?" instead of "Isn't it?"
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish tags differ from English question tags
      example_l1: Hace frío, ¿verdad?
      example_gloss: It is cold, true?
      example_wrong: It is cold, true?
      example_correct: It is cold, isn't it?
      explanation: Spanish uses invariant tags (¿verdad?, ¿no?) while English question
        tags vary by auxiliary and polarity (isn't it?, don't you?, can't she?). Spanish
        speakers may use "true?" or "no?" as invariant tags in English.
      frequency: 4
      persistence: 3
      communicative_impact: 2
