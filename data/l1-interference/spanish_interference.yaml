          canonical clauses' structure.
        duration: 10
      - name: non canonical clauses Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'non canonical
          clauses' errors.
        duration: 15
      sequencing: Introduce non canonical clauses with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish: ''Hay muchos libros.'' = ''There ARE many books.'''
    - 'Spanish: ''Existe un problema.'' = ''There EXISTS a problem.'' (more formal).'
    - 'Wrong: ''Is a book on the table.'' Correct: ''There IS a book on the table.'''
