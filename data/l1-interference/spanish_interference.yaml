  adjective_order:
    interference_patterns:
    - pattern: English adjective order not followed
      example_l1: Una roja grande casa hermosa.
      example_gloss: A red big house beautiful.
      example_wrong: A red big beautiful house.
      example_correct: A beautiful big red house.
      explanation: 'English has a rigid adjective order: opinion-size-age-shape-color-origin-material-purpose.
        Spanish adjective order is more flexible and generally post-nominal. Spanish
        speakers may produce sequences that violate the English order.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: English adjective order follows OSASCOMP hierarchy.
    teacher_tips:
      how_to_explain: 'OSASCOMP: Opinion-Size-Age-Shape-Color-Origin-Material-Purpose.
        Commas between coordinate adjectives.'
      where_to_start: Practice adjective pairs from different categories.
      exercises:
      - name: adjective order Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'adjective order' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: adjective order Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'adjective order' errors.
          Students identify and correct each error.
        duration: 15
      - name: adjective order Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'adjective
          order' structure.
        duration: 10
      - name: adjective order Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'adjective order'
          errors.
        duration: 15
      sequencing: Introduce adjective order with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
