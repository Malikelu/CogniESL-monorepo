  subject_questions:
    interference_patterns:
    - pattern: Subject questions vs object questions
      example_l1: ¿Quién vino?
      example_gloss: Who came?
      example_wrong: Who did come?
      example_correct: Who came?
      explanation: 'Spanish subject questions (¿Quién vino?) have the same word order
        as declaratives. English subject questions also do not use do-support (Who
        came?, not *Who did come?). Spanish speakers may add do-support to subject
        questions: "Who did come?"'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Who/which/whose require different structures
      example_l1: ¿Quién lo hizo?
      example_gloss: Who did it?
      example_wrong: Who did do it?
      example_correct: Who did it?
      explanation: When "who" is the object, English uses do-support (Who did you
        see?). When "who" is the subject, English does not use do-support (Who saw
        you?). Spanish speakers may add do-support to subject questions.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: WHO did the work? (no inversion for subject questions). Whom DID
      you see? (inversion for object).
    teacher_tips:
      how_to_explain: 'Subject question: Who + verb + object? Object question: Whom
        + auxiliary + subject + verb?'
      where_to_start: Practice distinguishing subject vs object Wh- questions.
      exercises:
      - name: subject questions Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'subject questions' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: subject questions Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'subject questions' errors.
          Students identify and correct each error.
        duration: 15
      - name: subject questions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subject
          questions' structure.
        duration: 10
      - name: subject questions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subject questions'
          errors.
        duration: 15
      sequencing: Introduce subject questions with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''Who CAME to the party?'' (subject question, no auxiliary).'
    - '''Whom DID you invite?'' (object question, auxiliary needed).'
    - '''Which book did you read?'' (object). ''Which book is MORE interesting?''
      (subject).'
    sources:
    - Celce-Murcia, M. & Larsen-Freeman, D. (1999).
    - Gonzalez Lopez, A. (2010).
