  wishes_regrets:
    interference_patterns:
    - pattern: Expressing wishes and regrets
      example_l1: Lamento no haber ido.
      example_gloss: I regret not having gone.
      example_wrong: I regret to not have gone.
      example_correct: I regret not having gone. / I regret not going.
      explanation: Spanish "lamentar + infinitivo complejo" (lamento no haber ido)
        maps to English "regret + gerund" (I regret not going). Spanish speakers may
        produce "I regret to not have gone" — using the infinitive where English requires
        the gerund.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: I wish, if only, regret + structure
      example_l1: Si hubiera sabido...
      example_gloss: If I had known...
      example_wrong: If I would have known...
      example_correct: If I had known... / I wish I had known...
      explanation: Spanish "si + pluscuamperfecto de subjuntivo" maps to English "if
        + past perfect" or "I wish + past perfect." Spanish speakers may produce "If
        I would have known" — a common error driven by L1 transfer.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: WISH/REGRET + past subjunctive for unreal situations.
