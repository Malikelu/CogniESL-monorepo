  tener_age:
    interference_patterns:
    - pattern: Tener used for age instead of "to be"
      example_l1: Tengo veinte años.
      example_gloss: I have twenty years.
      example_wrong: I have twenty years.
      example_correct: I am twenty years old.
      explanation: Spanish expresses age with tener (to have) + number + años (years).
        English uses "to be" + number + years old. Spanish speakers produce "I have
        twenty years" instead of "I am twenty years old." This is one of the earliest
        learned and most easily corrected errors.
      frequency: 5
      persistence: 2
      communicative_impact: 3
    why_it_happens: In Spanish, age = tener (to have). English = to be.
    teacher_tips:
      how_to_explain: 'Age in English: I AM 25. NOT I HAVE 25. Question: HOW OLD are
        you?'
      where_to_start: Practice age questions and statements.
      exercises:
      - name: tener age Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'tener age' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: tener age Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'tener age' errors. Students
          identify and correct each error.
        duration: 15
      - name: tener age Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'tener
          age' structure.
        duration: 10
      - name: tener age Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'tener age' errors.
        duration: 15
      sequencing: Introduce tener age with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
