  position_of_adverbs:
    interference_patterns:
    - pattern: Adverb placement within multi-verb phrases
      example_l1: Siempre he querido viajar.
      example_gloss: Always I have wanted to travel.
      example_wrong: I have always wanted to travel. (correct but may be misordered)
      example_correct: I have always wanted to travel.
      explanation: 'Spanish places adverbs more flexibly, often at the beginning or
        after the subject. English has strict mid-position rules: adverbs go between
        the auxiliary and main verb (have always wanted). Spanish speakers may place
        adverbs at the beginning: "Always I have wanted."'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Rules for mid-position adverbs
      example_l1: Probablemente ha llegado.
      example_gloss: Probably he has arrived.
      example_wrong: Probably he has arrived.
      example_correct: He has probably arrived.
      explanation: 'Spanish places probability adverbs (probablemente, quizás) at
        the beginning or after the subject. English places them in mid-position: between
        auxiliary and main verb (has probably arrived). Spanish speakers may produce
        "Probably he has arrived" in writing.'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: 'WITH MODAL: She CAN always go. WITH PERFECT: She has ALWAYS gone.
      WITH PASSIVE: It is always done.'
    teacher_tips:
      how_to_explain: Adverb goes after the first auxiliary.
      where_to_start: Practice with modal, perfect, and passive sentences.
      exercises:
      - name: position of adverbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'position of adverbs' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
