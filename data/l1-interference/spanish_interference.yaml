  passive_with_reporting_verbs:
    interference_patterns:
    - 'Passive with reporting verbs: ''It is said/reported'''
    - Spanish 'se dice que'
    why_it_happens: Spanish does not use the 'it + passive reporting verb + that-clause'
      construction common in English. Spanish learners may produce sentences like
      'People say that he is rich' instead of 'It is said that he is rich.' This occurs
      because the L1 uses different structures for impersonal reporting.
    teacher_tips:
      how_to_explain: IT IS SAID/BELIEVED/REPORTED THAT + clause.
      where_to_start: Practice impersonal reporting structures.
      exercises:
      - name: passive with reporting verbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'passive with reporting verbs' structure. Emphasize the structural
          difference between Spanish and English.
