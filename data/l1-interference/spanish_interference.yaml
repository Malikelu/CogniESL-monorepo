  connectors_advanced:
    interference_patterns:
    - pattern: Connector phrases transferred from Spanish
      example_l1: A pesar de que... / Con tal de que...
      example_gloss: In spite of that... / Provided that...
      example_wrong: In spite of that he is rich, he is unhappy.
      example_correct: Although he is rich, he is unhappy. / Despite being rich, he
        is unhappy.
      explanation: Spanish connector phrases (a pesar de que, con tal de que, siempre
