        duration: 10
      - name: coordinating conjunctions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'coordinating
          conjunctions' errors.
        duration: 15
      sequencing: Introduce coordinating conjunctions with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
