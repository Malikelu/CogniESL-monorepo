  article_interference:
    interference_patterns:
    - pattern: Article usage transferred from Spanish to English
      example_l1: El agua es importante.
      example_gloss: The water is important.
      example_wrong: The water is important. (correct in this case, but overused)
      example_correct: Water is important.
      explanation: Spanish requires definite articles before mass nouns used in a
        general sense (el agua, el arroz, la leche). English uses zero article for
        generics. Spanish speakers overuse "the" in generic statements.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Indefinite article omitted in predicate noun phrases
      example_l1: Es estudiante.
      example_gloss: He is student.
      example_wrong: He is student.
      example_correct: He is a student.
      explanation: Spanish omits the indefinite article before predicate nouns denoting
        profession, nationality, or religion. English requires "a/an" before singular
        count nouns in predicate position.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: Spanish uses articles with proper nouns (el Peru, la Argentina).
      English usually doesn't.
    teacher_tips:
      how_to_explain: 'English proper nouns usually have NO article. Exceptions: The
        United States, The Hague.'
      where_to_start: Practice proper nouns with and without articles.
      exercises:
      - name: article interference Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'article interference' structure. Emphasize the structural difference
          between Spanish and English.
