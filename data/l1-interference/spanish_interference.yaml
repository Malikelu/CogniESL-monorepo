  verbs_not_usually_used_in_continuous_forms:
    interference_patterns:
    - pattern: Stative verbs not used in progressive
      example_l1: '*Estoy sabiendo la respuesta.'
      example_gloss: I am knowing the answer.
      example_wrong: I am knowing the answer.
      example_correct: I know the answer.
      explanation: Spanish allows progressive forms with some stative verbs (estoy
        sabiendo, estoy queriendo). English stative verbs (know, believe, love, hate,
        own, need, seem, belong) are not normally used in the continuous. Spanish
        speakers produce "I am knowing" instead of "I know."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: know, believe, love, hate, own, need, seem, etc.
      example_l1: '*Estoy creyendo en ti.'
      example_gloss: I am believing in you.
      example_wrong: I am believing in you.
      example_correct: I believe in you.
      explanation: Spanish allows "estar + gerundio" with stative verbs for emphasis
        or ongoing process. English does not use the continuous with stative verbs.
        Spanish speakers transfer this pattern, producing "I am believing" instead
        of "I believe."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: STATIVE verbs describe states, not actions. Not used in -ING form.
    teacher_tips:
      how_to_explain: KNOW, BELIEVE, OWN, NEED, WANT, LIKE, LOVE, HATE, SEEM, MEAN
        = NO -ING.
      where_to_start: Learn stative verb categories.
      exercises:
      - name: verbs not usually used in continuous forms Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'verbs not usually used in continuous forms' structure. Emphasize
          the structural difference between Spanish and English.
        duration: 15
      - name: verbs not usually used in continuous forms Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'verbs not usually used
          in continuous forms' errors. Students identify and correct each error.
        duration: 15
      - name: verbs not usually used in continuous forms Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'verbs
          not usually used in continuous forms' structure.
        duration: 10
      - name: verbs not usually used in continuous forms Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'verbs not usually
          used in continuous forms' errors.
        duration: 15
      sequencing: Introduce verbs not usually used in continuous forms with clear
        examples. Practice recognition before production. Use contrastive analysis
        with Spanish.
