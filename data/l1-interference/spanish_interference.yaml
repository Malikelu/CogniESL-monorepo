  adverb_placement:
    interference_patterns:
    - pattern: Adverb placement after verb (Spanish) transferred to English
      example_l1: Habla bien inglés.
      example_gloss: He speaks well English.
      example_wrong: He speaks well English.
      example_correct: He speaks English well.
      explanation: 'Spanish places adverbs more flexibly, often immediately after
        the verb. English has stricter adverb placement rules: manner adverbs typically
        go after the object (speaks English well), not between verb and object (*speaks
        well English). Spanish speakers produce "speaks well English" following Spanish
        word order.'
      frequency: 4
      persistence: 3
      communicative_impact: 2
    why_it_happens: Spanish adverbs often precede verbs. English frequency adverbs
      go between subject and verb.
    teacher_tips:
      how_to_explain: Subject + FREQ ADVERB + Verb. 'I ALWAYS go.'
      where_to_start: Practice with always, usually, often, sometimes, never.
      exercises:
      - name: adverb placement Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'adverb placement' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: adverb placement Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'adverb placement' errors.
          Students identify and correct each error.
        duration: 15
      - name: adverb placement Pattern Practice
        type: sentence-rewrite
