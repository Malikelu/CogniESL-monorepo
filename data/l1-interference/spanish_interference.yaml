  future_will:
    interference_patterns:
    - pattern: Present tense used for future instead of "will"
      example_l1: Mañana voy al cine.
      example_gloss: Tomorrow I go to the cinema.
      example_wrong: Tomorrow I go to the cinema.
      example_correct: Tomorrow I will go to the cinema. / I am going to the cinema.
      explanation: Spanish uses the present tense for near-future actions (Mañana
        voy = Tomorrow I go/will go). English requires "will" or "be going to" for
        future reference. Spanish speakers may use the present tense where English
        requires a future form.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish uses 'ir a + infinitive' for near future. English 'will'
      for predictions/spontaneous.
    teacher_tips:
      how_to_explain: WILL = spontaneous decisions or predictions. GOING TO = planned
        intentions.
      where_to_start: Practice predictions vs. plans.
      exercises:
      - name: future will Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'future will' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: future will Error Correction
