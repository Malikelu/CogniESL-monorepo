        description: Students create 5 original sentences using correct English 'time
          adverbs' structure.
        duration: 10
      - name: time adverbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'time adverbs'
          errors.
        duration: 15
      sequencing: Introduce time adverbs with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
