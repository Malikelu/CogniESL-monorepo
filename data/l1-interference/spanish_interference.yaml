  verbs_followed_by_to_infinitive:
    interference_patterns:
    - pattern: Verbs followed by to + infinitive
      example_l1: Quiero estudiar.
      example_gloss: I want to study.
      example_wrong: I want study.
      example_correct: I want to study.
      explanation: 'Spanish verbs like "querer" (want) are followed directly by the
        infinitive. English "want" requires "to" before the infinitive. Spanish speakers
        may omit "to": "I want study" instead of "I want to study."'
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: want, need, decide, agree, refuse + to + verb
      example_l1: Decidimos ir.
      example_gloss: We decided to go.
      example_wrong: We decided go.
      example_correct: We decided to go.
      explanation: Spanish verbs of decision (decidir, querer, necesitar) are followed
        by the infinitive. English requires "to" before the infinitive after these
        verbs. Spanish speakers may omit "to" because their L1 does not use a preposition
        before the infinitive.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: WANT/DECIDE/AGREE/REFUSE + to + base verb.
