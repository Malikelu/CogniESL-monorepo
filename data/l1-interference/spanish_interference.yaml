  unless:
    interference_patterns:
    - pattern: '"Unless" = "a menos que" (negative condition)'
      example_l1: A menos que estudies, no aprobarás.
      example_gloss: Unless you study, you will not pass.
      example_wrong: Unless you study, you will not pass. (correct but may use "will"
        incorrectly)
      example_correct: Unless you study, you will not pass.
      explanation: 'Spanish "a menos que" + subjunctive maps to English "unless" +
        present tense. Spanish speakers may use "will" in the unless-clause: "Unless
        you will study" — transferring the future tense from Spanish.'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: No "will" in unless-clause
      example_l1: A menos que llueva, iremos.
      example_gloss: Unless it rains, we will go.
      example_wrong: Unless it will rain, we will go.
      example_correct: Unless it rains, we will go.
      explanation: English does not use "will" in unless-clauses (or other conditional/time
        clauses). Spanish uses the subjunctive in "a menos que" clauses. Spanish speakers
        may produce "Unless it will rain" — using "will" where English requires present
        tense.
      frequency: 4
      persistence: 3
      communicative_impact: 3
    why_it_happens: UNLESS = IF NOT. More concise alternative to 'if... not'.
    teacher_tips:
      how_to_explain: UNLESS + simple present. No modal 'will' in the clause.
      where_to_start: Practice replacing 'if... not' with 'unless'.
      exercises:
      - name: unless Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'unless' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: unless Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'unless' errors. Students
          identify and correct each error.
        duration: 15
      - name: unless Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'unless'
          structure.
        duration: 10
      - name: unless Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'unless' errors.
        duration: 15
      sequencing: Introduce unless with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''Unless it will rain, we''ll go.'' Correct: ''Unless it RAINS, we''ll
      go.'''
    - '''Unless you study, you WILL fail.'' (= If you don''t study...)'
    - '''I won''t go unless you GO with me.'' (unless + present tense)'
