    - Future tense overused
    why_it_happens: Spanish uses 'ir a + infinitive' for near future. English 'will'
      for predictions/spontaneous.
    teacher_tips:
      how_to_explain: WILL = spontaneous decisions or predictions. GOING TO = planned
        intentions.
      where_to_start: Practice predictions vs. plans.
      exercises:
      - name: future will Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'future will' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
