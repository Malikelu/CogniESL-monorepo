  conjunctions_subordinating:
    interference_patterns:
    - pattern: Subordinating conjunction transfer
      example_l1: Aunque es caro, lo compro.
      example_gloss: Although it is expensive, I buy it.
      example_wrong: Although it is expensive, but I buy it.
      example_correct: Although it is expensive, I buy it.
      explanation: 'Spanish allows "aunque...pero" (although...but) in some varieties.
        English does not allow "although...but" — only one conjunction is used. Spanish
        speakers may produce double conjunctions: "Although it is expensive, but I
        buy it."'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Spanish subordinators have different ranges than English equivalents.
    teacher_tips:
      how_to_explain: BECAUSE=reason. ALTHOUGH=concession. WHEN/WHILE=time. IF=condition.
      where_to_start: Practice each subordinator with clear examples.
