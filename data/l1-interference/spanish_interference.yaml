  third_conditional:
    interference_patterns:
    - pattern: Pluperfect subjunctive transferred to English third conditional
      example_l1: Si hubiera estudiado, habría aprobado.
      example_gloss: If I had (pluperfect subjunctive) studied, I would have passed.
      example_wrong: If I would have studied, I would have passed.
      example_correct: If I had studied, I would have passed.
      explanation: Spanish third conditional uses pluperfect subjunctive (hubiera
        estudiado) in the if-clause. English uses past perfect (had studied). Spanish
        speakers produce "If I would have studied" — a common error even among native
        English speakers, but especially frequent with Spanish speakers due to L1
        transfer.
      frequency: 4
      persistence: 4
      communicative_impact: 4
    - pattern: Conditional perfect (habría) transferred incorrectly
      example_l1: Habría aprobado si hubiera estudiado.
      example_gloss: I would have passed if I had studied.
      example_wrong: I would pass if I would have studied.
      example_correct: I would have passed if I had studied.
      explanation: Spanish conditional perfect (habría aprobado) is used for unreal
        past results. English uses "would have + past participle." Spanish speakers
        may mix the tenses, producing "I would pass if I would have studied" instead
        of "I would have passed if I had studied."
      frequency: 4
      persistence: 4
      communicative_impact: 4
    - pattern: Conditional sentences with present tense in if-clause
      example_l1: Si estudio, apruebo.
      example_gloss: If I study, I pass.
      example_wrong: If I study, I pass. (for future)
      example_correct: If I study, I will pass.
      explanation: Spanish uses present in both clauses for real/likely conditions.
        English uses present in the if-clause but future (will) in the main clause
        for future conditions. Spanish speakers may not use "will" in the main clause.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: 'Type 3 = UNREAL PAST. If + HAD + V3. Result: WOULD HAVE + V3.'
    teacher_tips:
      how_to_explain: If + HAD + past participle. WOULD HAVE + past participle.
      where_to_start: Practice past regrets and hypothetical events.
      exercises:
      - name: third conditional Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'third conditional' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: third conditional Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'third conditional' errors.
          Students identify and correct each error.
        duration: 15
      - name: third conditional Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'third
          conditional' structure.
        duration: 10
      - name: third conditional Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'third conditional'
          errors.
        duration: 15
      sequencing: Introduce third conditional with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
