    - 'Wrong: ''My brother doctor.'' Correct: ''My brother IS a doctor.'''
    - '''They ARE from Spain.'''
    - 'Wrong: ''I am knowing the answer.'' Correct: ''I KNOW the answer.'' (stative)'
