  present_continuous:
    interference_patterns:
    - pattern: Simple present used where English requires present continuous
      example_l1: ¿Qué haces?
      example_gloss: What do you do?
      example_wrong: What do you do? (right now)
      example_correct: What are you doing?
      explanation: Spanish uses the simple present for ongoing actions (¿Qué haces?
        = What are you doing right now?). English requires the present continuous
        (be + -ing) for actions in progress. Spanish speakers say "What do you do?"
        when they mean "What are you doing?" — which in English asks about habitual
        occupation.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    - pattern: Present continuous overused for stative verbs
      example_l1: '*Estoy sabiendo la respuesta.'
      example_gloss: I am knowing the answer.
      example_wrong: I am knowing the answer.
      example_correct: I know the answer.
      explanation: Spanish allows progressive forms with some stative verbs (Estoy
        pensando, Estoy queriendo) that English does not. English stative verbs (know,
        want, believe, love, belong, seem) are not normally used in the continuous.
        Spanish speakers transfer the progressive to stative verbs, producing "I am
        knowing" instead of "I know."
      frequency: 4
      persistence: 4
      communicative_impact: 3
    why_it_happens: English present continuous = action RIGHT NOW. Habits use simple
      present.
    teacher_tips:
      how_to_explain: 'RIGHT NOW: ''I AM EATING.'' Habit: ''I EAT breakfast every
        day.'''
      where_to_start: Contrast right-now actions vs. habits.
      exercises:
      - name: present continuous Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'present continuous' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: present continuous Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'present continuous'
          errors. Students identify and correct each error.
        duration: 15
      - name: present continuous Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'present
          continuous' structure.
        duration: 10
      - name: present continuous Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'present continuous'
          errors.
        duration: 15
      sequencing: Introduce present continuous with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I am always eating chocolate.'' Correct: ''I ALWAYS EAT chocolate.'''
    - '''Right now, I AM WRITING an email.'' (correct).'
    - 'Wrong: ''She is studying every day.'' Correct: ''She STUDIES every day.'''
    sources:
