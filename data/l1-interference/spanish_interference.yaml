          continuous' structure.
        duration: 10
      - name: past continuous Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'past continuous'
          errors.
        duration: 15
      sequencing: Introduce past continuous with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
