        description: Students create 5 original sentences using correct English 'negation'
          structure.
        duration: 10
      - name: negation Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'negation' errors.
        duration: 15
      sequencing: Introduce negation with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
