  parentheticals:
    interference_patterns:
    - pattern: Parenthetical expressions differ from Spanish
      example_l1: Sin embargo, no estoy de acuerdo.
      example_gloss: Without embargo, I do not agree.
      example_wrong: Without embargo, I do not agree.
      example_correct: However, I do not agree.
      explanation: 'Spanish parenthetical expressions (sin embargo, por lo tanto,
        no obstante, de hecho) do not always have direct English equivalents. Spanish
        speakers may translate them literally: "without embargo" instead of "however."'
      frequency: 3
      persistence: 3
      communicative_impact: 3
    - pattern: Interpolators in discourse transferred from Spanish
      example_l1: Bueno, pues, o sea, ¿verdad?
      example_gloss: Well, then, that is, right?
      example_wrong: Well, then, that is, true?
      example_correct: Well, then, I mean, right?
      explanation: Spanish discourse markers (bueno, pues, o sea, ¿verdad?, ¿no?,
        ¿vale?) do not map directly to English. Spanish speakers may transfer these
        markers, producing "that is" (from o sea) or "true" (from verdad) instead
        of "I mean" or "right."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: English uses specific parenthetical verbs and expressions.
    teacher_tips:
      how_to_explain: 'Use: ''I think'', ''I believe'', ''apparently'', ''as far as
        I know''.'
      where_to_start: Learn common parenthetical verbs.
