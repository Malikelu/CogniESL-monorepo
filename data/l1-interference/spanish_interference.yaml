  tenses:
    interference_patterns:
    - Pretérito overused for English present perfect
    - Failure to use present perfect for life experiences
    - Progressive forms avoided
    why_it_happens: Spanish pretérito and pretérito perfecto don't map 1-to-1 to English
      tenses.
    teacher_tips:
      how_to_explain: Pretérito -> simple past. Pretérito perfecto -> present perfect.
      where_to_start: Practice simple past vs. present perfect with time expressions.
      exercises:
      - name: tenses Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'tenses' structure. Emphasize the structural difference between
          Spanish and English.
        duration: 15
      - name: tenses Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'tenses' errors. Students
          identify and correct each error.
        duration: 15
      - name: tenses Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'tenses'
          structure.
        duration: 10
      - name: tenses Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'tenses' errors.
        duration: 15
      sequencing: Introduce tenses with clear examples. Practice recognition before
        production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I have visited Madrid last year.'' Correct: ''I VISITED Madrid last
      year.'''
    - 'Wrong: ''I went to the store today.'' Correct: ''I HAVE GONE to the store today.'''
    - '''Did you eat?'' vs ''Have you eaten?'''
    sources:
