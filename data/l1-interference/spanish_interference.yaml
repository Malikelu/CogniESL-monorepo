  subjunctive:
    interference_patterns:
    - Spanish subjunctive not transferred to English
    - Using indicative after suggest/recommend
    - English subjunctive avoided or overgeneralized
    why_it_happens: English subjunctive is minimal - only base form after certain
      verbs.
    teacher_tips:
      how_to_explain: 'After SUGGEST, RECOMMEND, INSIST, DEMAND: use base verb. ''I
        SUGGEST he STUDY.'''
      where_to_start: Practice suggest/recommend/insist with base verb.
      exercises:
      - name: subjunctive Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'subjunctive' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: subjunctive Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'subjunctive' errors.
          Students identify and correct each error.
        duration: 15
      - name: subjunctive Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'subjunctive'
          structure.
        duration: 10
      - name: subjunctive Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'subjunctive'
          errors.
        duration: 15
      sequencing: Introduce subjunctive with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Wrong: ''I suggest that he STUDIES harder.'' Formal: ''I SUGGEST he STUDY harder.'''
    - 'Wrong: ''The teacher insisted that she APPLIES.'' Correct: ''...insisted that
      she APPLY.'''
    - '''They recommended that the meeting BE postponed.'''
