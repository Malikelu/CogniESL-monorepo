  present_simple:
    interference_patterns:
    - pattern: Present simple for habits and general truths
      example_l1: Estudio todos los días.
      example_gloss: I study every day.
      example_wrong: I study every day. (correct but may be underused)
      example_correct: I study every day.
      explanation: Spanish presente is used for both current actions and habitual
        actions. English uses present simple for habits (I study every day) and present
        continuous for current actions (I am studying). Spanish speakers may use present
        simple for ongoing actions.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Spanish presente used for current action too
      example_l1: ¿Qué haces?
      example_gloss: What do you do?
      example_wrong: What do you do? (when "right now" is meant)
      example_correct: What are you doing?
      explanation: Spanish uses the present tense for ongoing actions (¿Qué haces?
        = What are you doing right now?). English requires the present continuous
        for actions in progress. Spanish speakers produce "What do you do?" which
        in English asks about occupation.
      frequency: 5
      persistence: 5
      communicative_impact: 4
    why_it_happens: PRESENT SIMPLE = habits, routines, general truths. NOT actions
      happening now.
    teacher_tips:
      how_to_explain: 'Habits and facts: ''I DRINK coffee every morning.'' NOT ''I
        am drinking coffee every morning.'''
      where_to_start: Distinguish habits from current actions.
      exercises:
      - name: present simple Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'present simple' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: present simple Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'present simple' errors.
          Students identify and correct each error.
        duration: 15
      - name: present simple Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'present
          simple' structure.
        duration: 10
      - name: present simple Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'present simple'
          errors.
        duration: 15
      sequencing: Introduce present simple with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''I DRINK coffee every morning.'' (habit).'
    - 'Wrong: ''I am go to school every day.'' Correct: ''I GO to school every day.'''
    - '''The earth GOES around the sun.'' (general truth).'
    sources:
    - Swan, M. & Smith, B. (2001).
    - Gonzalez Lopez, A. (2010).
