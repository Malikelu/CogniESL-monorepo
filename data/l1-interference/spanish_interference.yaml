  prepositions_of_time:
    interference_patterns:
    - pattern: Preposition transfer for time expressions
      example_l1: El lunes. / A las tres. / En enero.
      example_gloss: The Monday. / At the three. / In January.
      example_wrong: The Monday. / I see you the Monday.
      example_correct: On Monday. / I see you on Monday.
      explanation: 'Spanish uses "el" for days of the week (el lunes = on Monday),
        "a" for clock time (a las tres = at three), and "en" for months/seasons. English
        uses "on" for days, "at" for clock time, "in" for months. Spanish speakers
        transfer Spanish prepositions: "the Monday" instead of "on Monday."'
      frequency: 5
      persistence: 4
      communicative_impact: 3
    why_it_happens: AT = specific time. ON = days/dates. IN = longer periods.
    teacher_tips:
      how_to_explain: Use a calendar visual to practice.
      where_to_start: Practice with time expressions.
      exercises:
      - name: prepositions of time Contrastive Drill
        type: translation
