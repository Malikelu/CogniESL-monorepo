  prepositional_phrases:
    interference_patterns:
    - pattern: Prepositional phrase attachment differs
      example_l1: Vi al hombre con el telescopio.
      example_gloss: I saw the man with the telescope.
      example_wrong: I saw the man with the telescope. (ambiguous)
      example_correct: I saw the man who had the telescope. / Using the telescope,
        I saw the man.
      explanation: Spanish prepositional phrase attachment can be ambiguous (con el
        telescopio = with/by means of the telescope). English has the same ambiguity
        but resolves it differently. Spanish speakers may produce ambiguous or unclear
        prepositional phrase attachments.
      frequency: 2
      persistence: 2
      communicative_impact: 2
    - pattern: Spanish and English attach prepositional phrases differently
      example_l1: El libro de la mesa de madera
      example_gloss: The book of the table of wood
      example_wrong: The book of the table of wood.
      example_correct: The book on the wooden table.
      explanation: Spanish chains prepositional phrases with "de" (de la mesa de madera).
        English uses compound nouns and different prepositions (on the wooden table).
        Spanish speakers may produce overly complex "of" chains in English.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: PP can modify verbs, nouns, or entire clauses. Position and attachment
      matter.
    teacher_tips:
      how_to_explain: Be aware of structural ambiguity in PP attachment.
      where_to_start: Practice identifying what a PP modifies.
