  non_defining_relative:
    interference_patterns:
    - pattern: Non-defining relative clauses with who/which
      example_l1: Mi hermano, que vive en Madrid, es médico.
      example_gloss: My brother, that/who lives in Madrid, is a doctor.
      example_wrong: My brother, that lives in Madrid, is a doctor.
      example_correct: My brother, who lives in Madrid, is a doctor.
      explanation: Spanish uses "que" for both defining and non-defining relative
        clauses. English distinguishes "who/which" (non-defining, with commas) from
        "that/which" (defining, no commas). Spanish speakers may use "that" in non-defining
        relatives where English requires "who" or "which."
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Spanish comma clauses do not always distinguish who/which
      example_l1: Los estudiantes, que aprobaron, están contentos.
      example_gloss: The students, that/who passed, are happy.
      example_wrong: The students, that passed, are happy.
      example_correct: The students, who passed, are happy.
      explanation: Spanish "que" is used in both restrictive and non-restrictive relative
        clauses. In English, non-restrictive clauses (set off by commas) require "who"
        or "which," not "that." Spanish speakers may use "that" in non-restrictive
        clauses.
      frequency: 3
      persistence: 3
      communicative_impact: 2
    why_it_happens: NON-DEFINING = extra info, commas. WHO for people, WHICH for things.
      Never 'that'.
    teacher_tips:
      how_to_explain: Set off with commas. WHO (people). WHICH (things/animals). NEVER
        use 'that'.
      where_to_start: Practice identifying defining vs. non-defining.
      exercises:
      - name: non defining relative Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'non defining relative' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: non defining relative Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'non defining relative'
          errors. Students identify and correct each error.
        duration: 15
      - name: non defining relative Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'non
          defining relative' structure.
        duration: 10
      - name: non defining relative Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'non defining
          relative' errors.
        duration: 15
      sequencing: Introduce non defining relative with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''My brother, WHO lives in Madrid, is a doctor.'' (NOT ''that'').'
    - 'Wrong: ''Barcelona, that is beautiful, attracts tourists.'' Correct: ''Barcelona,
      WHICH is beautiful...'''
    - '''The Eiffel Tower, WHICH was built in 1889, is in Paris.'''
    sources:
    - Quirk, R. et al. (1985).
    - Hewings, M. (1991).
