  negative_questions:
    interference_patterns:
    - Negative questions for confirmation/surprise
    - Spanish doesn't use negative questions the same way
    why_it_happens: Negative questions = confirmation (expected yes) or surprise.
    teacher_tips:
      how_to_explain: DON'T + subject + verb = expecting 'yes'. Surprise uses rising
        intonation.
      where_to_start: Practice with confirmation and surprise contexts.
      exercises:
      - name: negative questions Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'negative questions' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: negative questions Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'negative questions'
          errors. Students identify and correct each error.
        duration: 15
      - name: negative questions Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'negative
          questions' structure.
        duration: 10
      - name: negative questions Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'negative questions'
          errors.
        duration: 15
      sequencing: Introduce negative questions with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''DON''T you like coffee?'' (= I thought you did. Confirm).'
    - '''Haven''t you finished YET?'' (= surprise, should have finished).'
    - 'Wrong: ''You don''t like coffee?'' (flat intonation). Better: ''DON''T you
      like coffee?'''
