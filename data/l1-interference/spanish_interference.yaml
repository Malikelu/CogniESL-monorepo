  negative_inversion:
    interference_patterns:
    - pattern: Inversion not applied after negative/restrictive fronting
      example_l1: No solo canta, sino que también baila.
      example_gloss: Not only she sings, but she also dances.
      example_wrong: Not only she sings, but she also dances.
      example_correct: Not only does she sing, but she also dances.
      explanation: English requires inversion after "not only," "never," "seldom,"
        "rarely," "hardly," "no sooner," "little." Spanish does not invert after these
        words. Spanish speakers produce "Not only she sings" instead of "Not only
        does she sing."
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: Inversion with negative/restrictive expressions.
    teacher_tips:
      how_to_explain: NOT ONLY, NO SOONER, HARDLY, NEITHER/NOR + inversion. Same as
        inversion_negative.
      where_to_start: Practice with negative expressions.
      exercises:
      - name: negative inversion Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'negative inversion' structure. Emphasize the structural difference
          between Spanish and English.
