  pragmatic_transfer:
    interference_patterns:
    - pattern: Spanish pragmatic norms transferred to English
      example_l1: ¿Puedes pasarme la sal? (direct request)
      example_gloss: Can you pass me the salt?
      example_wrong: Can you pass me the salt? (may sound too direct)
      example_correct: Could you pass me the salt? / Would you mind passing me the
        salt?
      explanation: Spanish tends to use more direct requests (¿Puedes...?) where English
        prefers more indirect forms (Could you...? Would you mind...?). Spanish speakers
        may sound too direct or even rude in English because they transfer Spanish
        pragmatic norms.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Differences in request/refusal/compliment conventions
      example_l1: No, gracias. (direct refusal)
      example_gloss: No, thank you.
      example_wrong: No, thank you. (may sound too abrupt)
      example_correct: No, thank you. / I'm fine, thanks. / I'd love to, but...
      explanation: Spanish refusals tend to be more direct (No, gracias) while English
        often uses softening strategies (I'd love to, but...). Spanish speakers may
        sound abrupt in English refusals, compliments, and other speech acts because
        they transfer Spanish pragmatic conventions.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: English has different pragmatic conventions for directness and
      politeness.
    teacher_tips:
      how_to_explain: 'Soften requests: ''Could you...'' / ''I would appreciate it
        if...'''
      where_to_start: Practice softening direct Spanish-style requests.
      exercises:
      - name: pragmatic transfer Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'pragmatic transfer' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: pragmatic transfer Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'pragmatic transfer'
          errors. Students identify and correct each error.
        duration: 15
      - name: pragmatic transfer Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'pragmatic
          transfer' structure.
        duration: 10
      - name: pragmatic transfer Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'pragmatic transfer'
          errors.
        duration: 15
      sequencing: Introduce pragmatic transfer with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish direct: ''Dame eso.'' -> English: ''GIVE me that.'' (blunt). Better:
      ''Could you PASS me that, please?'''
    - 'Spanish refusal: ''No puedo.'' -> English: ''I''d LOVE to but I can''t.'' (softened).'
    - 'Spanish: ''Que guapa!'' -> English: ''You look really NICE!'' (context-dependent).'
    sources:
