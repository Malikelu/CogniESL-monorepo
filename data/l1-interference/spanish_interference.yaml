          overview' structure.
        duration: 10
      - name: tenses overview Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'tenses overview'
          errors.
        duration: 15
      sequencing: Introduce tenses overview with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
