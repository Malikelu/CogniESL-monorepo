  time_adverbs:
    interference_patterns:
    - pattern: 'Spanish time adverbs: ayer, hoy, mañana, nunca, siempre'
      example_l1: Siempre llego tarde.
      example_gloss: Always I arrive late.
      example_wrong: Always I arrive late.
      example_correct: I am always late. / I always arrive late.
      explanation: 'Spanish places time adverbs more flexibly, often at the beginning
        of the sentence. English has stricter placement: frequency adverbs go before
        the main verb (I always arrive) or after "be" (I am always late). Spanish
        speakers may produce "Always I arrive late."'
      frequency: 3
      persistence: 3
      communicative_impact: 2
    - pattern: Placement rules differ from Spanish
      example_l1: Ayer fui al cine.
      example_gloss: Yesterday I went to the cinema.
      example_wrong: Yesterday I went to the cinema. (correct in English too)
      example_correct: Yesterday I went to the cinema. / I went to the cinema yesterday.
      explanation: Spanish places time adverbs at the beginning or end of the sentence.
        English also allows both positions but may prefer the end in informal speech.
        Spanish speakers may overuse initial position for time adverbs.
      frequency: 2
      persistence: 2
      communicative_impact: 1
    why_it_happens: English time adverbs are more strict in placement.
    teacher_tips:
      how_to_explain: Manner adverbs go after the verb or at the beginning/end. Time
        adverbs go at the beginning or end.
      where_to_start: Practice with common time adverbs.
      exercises:
      - name: time adverbs Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'time adverbs' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: time adverbs Error Correction
