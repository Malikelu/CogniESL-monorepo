          verbs' errors. Students identify and correct each error.
        duration: 15
      - name: passive with reporting verbs Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'passive
          with reporting verbs' structure.
        duration: 10
      - name: passive with reporting verbs Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'passive with
          reporting verbs' errors.
        duration: 15
      sequencing: Introduce passive with reporting verbs with clear examples. Practice
        recognition before production. Use contrastive analysis with Spanish.
    examples:
    - 'Spanish: ''Se dice que va a llover.'' -> ''It IS SAID that it will rain.'''
    - '''It IS BELIEVED that the suspect fled the country.'''
    - '''It HAS BEEN REPORTED that the meeting is postponed.'''
