          defining relative' structure.
        duration: 10
      - name: non defining relative Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'non defining
          relative' errors.
        duration: 15
      sequencing: Introduce non defining relative with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''My brother, WHO lives in Madrid, is a doctor.'' (NOT ''that'').'
