  past_perfect:
    interference_patterns:
    - pattern: 'Past perfect: had + V3 formation'
      example_l1: Ya había comido cuando llegaste.
      example_gloss: I already had eaten when you arrived.
      example_wrong: I already ate when you arrived.
      example_correct: I had already eaten when you arrived.
      explanation: Spanish pluscuamperfecto (había comido) corresponds to English
        past perfect (had eaten). Spanish speakers may use simple past where English
        requires past perfect, especially when the sequence is clear from context.
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Spanish pluscuamperfecto (había + participio) overused
      example_l1: Había muchas personas en la fiesta.
      example_gloss: There had been many people at the party.
      example_wrong: There had been many people at the party. (when simple past is
        intended)
      example_correct: There were many people at the party.
      explanation: Spanish "había" can be either past perfect (had been) or imperfect
        of "haber" (there were). Spanish speakers may overuse the past perfect in
        English, producing "There had been many people" when "There were many people"
        is intended.
      frequency: 3
      persistence: 3
      communicative_impact: 3
    why_it_happens: HAD + past participle = action completed before another past action.
    teacher_tips:
      how_to_explain: Use past perfect for the EARLIER of two past actions.
      where_to_start: Practice with 'when' and 'by the time' clauses.
      exercises:
      - name: past perfect Contrastive Drill
        type: translation
        description: Students translate 10 Spanish sentences into English, focusing
          on correct 'past perfect' structure. Emphasize the structural difference
          between Spanish and English.
        duration: 15
      - name: past perfect Error Correction
        type: error-correction
        description: Provide 15 sentences with Spanish-style 'past perfect' errors.
          Students identify and correct each error.
        duration: 15
      - name: past perfect Pattern Practice
        type: sentence-rewrite
        description: Students create 5 original sentences using correct English 'past
          perfect' structure.
        duration: 10
      - name: past perfect Peer Review
        type: peer-review
        description: Students exchange writing samples and check for 'past perfect'
          errors.
        duration: 15
      sequencing: Introduce past perfect with clear examples. Practice recognition
        before production. Use contrastive analysis with Spanish.
    examples:
    - '''When I ARRIVED, she HAD ALREADY LEFT.'''
    - 'Wrong: ''When I arrived, she left.'' (sequence unclear).'
    - 'Spanish: ''Cuando llegue, ya se habia ido.'' = ''When I arrived, she HAD ALREADY
      LEFT.'''
    sources:
