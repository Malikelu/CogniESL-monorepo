  prepositions:
    interference_patterns:
    - pattern: Transfer of Czech prepositions
      example: 'CS ''na'' = on/in/at -> Error: ''I am on home'' -> Correct: ''I am
        at home'''
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: I am on home.
      correct: I am at home.
    why_it_happens: Czech prepositions often differ from English. Czech 'na' covers
      on/in/at.
    teacher_tips:
      how_to_explain: Teach common Czech-English preposition differences.
      where_to_start: Start with the most common preposition transfers.
      sequencing: 'Week 1: Verb + preposition. Week 2: Prepositions of place. Week
        3: Review.'
      exercises:
      - name: Preposition Translation
        type: translation
        description: Translate 15 Czech sentences with correct English prepositions.
        duration: 15
    sources:
