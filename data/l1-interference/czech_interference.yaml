language: Czech
language_code: cs
schema_version: '3.0'
grammar_points:
  articles:
    interference_patterns:
    - pattern: Omission of all articles (Czech has no articles)
      example: 'CS ''jsem lekar'' (I-am doctor) -> Error: ''I am doctor'' -> Correct:
        ''I am a doctor'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: I am teacher.
      correct: I am a teacher.
    - wrong: She is doctor.
      correct: She is a doctor.
    why_it_happens: Czech has no article system. Definiteness is inferred from context
      or word order. Czech learners struggle with English articles.
    teacher_tips:
      how_to_explain: 'Teach: English REQUIRES articles. ''A/an'' for first mention,
        ''the'' for specific.'
      where_to_start: Start with the profession pattern.
      sequencing: 'Week 1: A/an for professions. Week 2: The for specific reference.
        Week 3: Zero article. Week 4: Review.'
      exercises:
      - name: Article Audit
        type: error-correction
        description: 20 sentences with Czech-influenced article errors.
        duration: 15
      - name: CS Article Translation
        type: translation
        description: Translate 15 Czech sentences focusing on articles.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Czech)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 5
    persistence: 5
    communicative_impact: 4
    flagged: false
    tier: 1
    source_rank: 2
    citations:
    - claim: 'Grammar point: articles'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Article usage varies significantly across languages; many languages have
        no article system
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See articles entries 133-142
      tier: 2
    - claim: ELLs commonly omit indefinite article when descriptive adjectives come
        between determiner and noun
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 153
      tier: 2
  cases:
    interference_patterns:
    - pattern: Transfer of Czech case system (7 cases)
      example: 'CS ''s kolegou'' (with colleague-instrumental) -> Error: ''with colleague''
        (correct) but wrong pronoun case'
      frequency: 4
      persistence: 3
      communicative_impact: 3
    examples:
    - wrong: With I go to school.
      correct: I go to school with me.
    - wrong: He gave the book to I.
      correct: He gave the book to me.
    why_it_happens: Czech has 7 grammatical cases. English has only subject/object
      pronoun distinction.
    teacher_tips:
      how_to_explain: 'Teach: English uses subject pronouns (I, he, she) and object
        pronouns (me, him, her).'
      where_to_start: Start with subject vs object pronouns.
      sequencing: 'Week 1: Subject vs object pronouns. Week 2: Pronouns after prepositions.
        Week 3: Review.'
      exercises:
      - name: Pronoun Case Practice
        type: fill-in-the-blank
        description: 20 sentences where students choose the correct pronoun case.
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Czech)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    source_rank: 2
    citations:
    - claim: 'Grammar point: cases'
      source: Parrott (2000) 'Grammar for English Language Teachers', Cambridge University
        Press
      location: See relevant grammar point section
      tier: 2
    - claim: Czech has 7 grammatical cases (p. 59)
      source: 'Celce-Murcia & Larsen-Freeman (2015) ''The Grammar Book: Form, Meaning,
        and Use for English Language Teachers'', 3rd ed., National Geographic Learning/Cengage'
      location: See relevant section
      tier: 2
    - claim: Czech has 7 grammatical cases (PEU grammar entries)
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See relevant entry
      tier: 2
    - claim: Czech has 7 grammatical cases (p. 238)
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: See relevant section
      tier: 2
  word_order:
    interference_patterns:
    - pattern: Free word order transfer
      example: 'CS ''Knihu jsem koupil'' (book I-bought) -> Error: ''Book I bought''
        -> Correct: ''I bought a book'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: Book I bought yesterday.
      correct: I bought a book yesterday.
    why_it_happens: Czech has relatively free word order due to its case system. English
      is strictly SVO.
    teacher_tips:
      how_to_explain: 'Teach: English is ALWAYS Subject-Verb-Object.'
      where_to_start: Start with basic SVO order.
      sequencing: 'Week 1: Basic SVO. Week 2: Subordinate clauses. Week 3: Review.'
      exercises:
      - name: Word Order Correction
        type: error-correction
        description: 15 sentences with Czech-influenced word order.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Czech)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
    source_type: textbook
    frequency: 4
