  conditionals:
    interference_patterns:
    - pattern: Use of conditional mood
      example: 'CS ''Kdybych byl'' (if-I-were) -> Error: ''If I would be'' -> Correct:
        ''If I were'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: If I would have money, I would travel.
      correct: If I had money, I would travel.
    why_it_happens: Czech conditional structure differs from English. Czech uses different
      verb forms and word order in conditional clauses. Czech learners may use wrong
      tense patterns in English if-clauses, such as 'If I will have time' instead
      of 'If I have time.' This transfer occurs because conditional formation rules
      differ between the two languages.
    teacher_tips:
      how_to_explain: 'Teach: NO WOULD IN IF-CLAUSE. Use ''were'' for unreal situations.'
      where_to_start: Start with second conditional.
      sequencing: 'Week 1: Second conditional. Week 2: First conditional. Week 3:
        Review.'
      exercises:
      - name: Conditional Practice
        type: sentence-rewrite
        description: Students rewrite 10 conditional sentences.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Czech)
