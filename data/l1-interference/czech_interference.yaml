  countability:
    interference_patterns:
    - pattern: Pluralization of uncountable nouns
      example: 'CS ''informace'' = informations -> Error: ''informations'' -> Correct:
        ''information'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I have many homeworks.
      correct: I have a lot of homework.
    why_it_happens: Czech treats some nouns as countable that are uncountable in English.
    teacher_tips:
      how_to_explain: Create a list of common uncountable nouns.
      where_to_start: Start with the countable/uncountable distinction.
      sequencing: 'Week 1: Common uncountable nouns. Week 2: Much/many. Week 3: Review.'
      exercises:
      - name: Countable or Not?
        type: matching
        description: Students categorize 30 nouns.
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Czech)
    - Parrott "Grammar for English Language Teachers"
