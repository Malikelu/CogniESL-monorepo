      example: 'CS ''vice velky'' (more big) -> Error: ''more big'' -> Correct: ''bigger'''
      frequency: 4
      persistence: 3
      communicative_impact: 2
    examples:
    - wrong: This car is more big than that one.
      correct: This car is bigger than that one.
    why_it_happens: Czech forms comparatives with 'vice' (more) + adjective. English
      uses -er/-est for short adjectives.
    teacher_tips:
      how_to_explain: 'Teach: 1-2 syllable adjectives -> -er/-est. 3+ syllable adjectives
        -> more/most.'
      where_to_start: Start with -er/-est rule.
      sequencing: 'Week 1: -er/-est. Week 2: More/most. Week 3: Review.'
      exercises:
      - name: Comparative Formation
        type: sentence-rewrite
        description: Students rewrite 10 sentences.
        duration: 10
