        errors'
      source: Swan (2016) 'Practical English Usage', 4th ed., Oxford University Press
      location: See word order entries
      tier: 2
    - claim: 'ELLs transfer L1 word order: subject-verb inversion from Spanish, SOV
        from Arabic/Japanese'
      source: 'Folse (2009) ''Keys to Teaching Grammar to English Language Learners:
        A Practical Handbook'', University of Michigan Press'
      location: p. 199
      tier: 2
  questions:
    interference_patterns:
    - pattern: Use of question intonation only
      example: 'CS ''Jdeš?'' (you-go?) -> Error: ''You go?'' -> Correct: ''Do you
        go?'''
      frequency: 5
      persistence: 5
      communicative_impact: 4
    examples:
    - wrong: You go to school?
      correct: Do you go to school?
    why_it_happens: Czech forms questions by rising intonation alone. English requires
      do-support and inversion.
    teacher_tips:
      how_to_explain: 'Teach: Do/Does/Did + subject + base verb?'
      where_to_start: Start with yes/no questions.
      sequencing: 'Week 1: Yes/no questions. Week 2: Wh- questions. Week 3: Review.'
      exercises:
      - name: Question Formation
        type: sentence-rewrite
        description: Students convert 15 statements to questions.
        duration: 15
    sources:
    - Swan & Smith "Learner English" (Czech)
    - Parrott "Grammar for English Language Teachers"
    source_count: 2
