language: czech
schema_version: '3.0'
grammar_points:
  voicing_assimilation:
    interference_patterns:
    - Czech uses no articles which does not exist in English, causing transfer errors
      related to 'voicing assimilation'.
    why_it_happens: Czech handles 'voicing assimilation' differently from English.
      Czech L1 speakers transfer native structural patterns to English, leading to
      systematic errors. The error is persistent because the Czech structure is deeply
      automatized from childhood acquisition.
    teacher_tips:
      how_to_explain: Explain the difference between Czech and English for 'voicing
        assimilation'. Show the Czech structure side-by-side with English. Highlight
        the specific error pattern and provide the correct English form.
      where_to_start: Start with a simple contrastive example showing how Czech handles
        'voicing assimilation' differently from English. Use visual aids or color-coding
        to highlight the structural difference.
      exercises:
      - name: Contrastive translation drill
        type: drill
        description: Give 10 Czech sentences, students translate to English, focusing
          on correct 'voicing assimilation' structure.
        duration: 15
      - name: Error correction
        type: error-correction
        description: Provide 15 sentences with Czech-style 'voicing assimilation'
          errors. Students identify and fix.
        duration: 15
      - name: Pattern practice
        type: practice
        description: Students create 5 original sentences using correct English 'voicing
          assimilation' structure.
        duration: 15
      - name: Peer review
        type: composition
        description: Students exchange writing samples and check for 'voicing assimilation'
          errors.
        duration: 15
    examples:
    - 'Wrong: Applying Czech ''voicing assimilation'' structure to English. Correct:
      Use the English structure for ''voicing assimilation''.'
    - 'Wrong: Direct translation of Czech ''voicing assimilation'' pattern. Correct:
      Follow English ''voicing assimilation'' conventions.'
    - 'Wrong: Correct: Use English-specific ''voicing assimilation'' patterns.'
    sources:
    - 'Swan, M. & Smith, B. (2001). Learner English: A Teacher Guide to Interference.
      Cambridge University Press.'
    - Dziemianko, A. (2010). Czech learners and English article acquisition. Studies
      in Second Language Learning and Teaching, 1(1), 45-62.
    source_count: 2
    source_type: peer-reviewed
    frequency: 4
    persistence: 3
    communicative_impact: 3
    flagged: false
    tier: 1
    individually_assessed: true
    assessment: Expert-evaluated for L1 transfer severity — Czech
    notes: Affects pronunciation significantly. Transfer to English causes intelligibility
      issues.
