  phonology:
    interference_patterns:
    - pattern: Confusion of /v/ and /w/
      example: 'CS lacks /w/ -> Error: ''wery'' for ''very'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    - pattern: Difficulty with /θ/ and /ð/
      example: 'CS lacks dental fricatives -> Error: ''tink'' for ''think'''
      frequency: 4
      persistence: 4
      communicative_impact: 3
    examples:
    - wrong: I am wery happy.
      correct: I am very happy.
    - wrong: Tink about it.
      correct: Think about it.
    why_it_happens: Czech lacks /w/ and dental fricatives. Czech learners substitute
      closest sounds.
    teacher_tips:
      how_to_explain: 'Teach: /v/ = lips touch lower teeth. /w/ = lips round. /θ/
        = tongue between teeth.'
      where_to_start: Start with /v/ vs /w/.
      sequencing: 'Week 1: V vs W. Week 2: TH sounds. Week 3: Review.'
      exercises:
      - name: Minimal Pairs
        type: matching
        description: 'Students distinguish: very/water, vest/west, think/tink.'
        duration: 10
    sources:
    - Swan & Smith "Learner English" (Czech)
    - Underhill "Sound Foundations"
    source_count: 2
