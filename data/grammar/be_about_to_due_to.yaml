grammar_point: be_about_to_due_to
title: Be About To (Immediate Future) and Due To (Reason)
description: 'Two distinct structures: be about to describes actions that will happen
  in the very near future, and due to introduces the reason for a situation or event.'
level: B1
meaning:
  core_meaning: Be about to indicates an action that will happen in the immediate
    future (seconds or minutes away, no time adverbial). Due to introduces the reason
    or cause of a situation.
  timeline: 'Be about to: immediate future (present: am/is/are about to; past: were
    about to). Due to: refers to past or present reasons.'
  contrast: Be about to = immediate future with no time phrase. Due to = reason or
    cause. Be about to cannot be used with time expressions like tomorrow.
  ccqs:
  - question: Is the person leaving now, or tomorrow?
    answer: Now. Be about to means the action is happening very soon.
  - question: The flight was delayed due to fog. Did the fog cause the delay?
    answer: Yes. Due to introduces the reason, which is fog.
  - question: Can you say 'I am about to go next week'?
    answer: No. Be about to cannot be used with future time expressions.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes:
    - Be about to is informal and common in spoken English
    - Due to is formal and common in writing and news reports
    min_examples: 5
form:
  affirmative:
    structure: Be about to + base verb / Due to + noun phrase
    example_generator:
    - I am about to leave.
    - The flight was delayed due to fog.
    min_examples: 4
  negative:
    structure: Be not about to + base verb / negate the main verb with due to
    example_generator:
    - I am not about to give up.
    - The event was not cancelled due to snow.
    min_examples: 4
  questions:
    structure: Are you about to go? / Was the cancellation due to weather?
    example_generator:
    - Are you about to leave?
    - Was the delay due to traffic?
    min_examples: 4
sub_rules:
- rule: Be about to and due to are separate grammar points that share the word to
  type: structural
  examples:
  - I am about to leave (immediate future action)
  - I was late due to traffic (reason or cause)
- rule: Be about to cannot be used with time expressions like tomorrow or next week
  type: grammatical
  examples:
  - I am about to send the email (correct — happening now)
  - I am about to send the email tomorrow (WRONG)
- rule: Due to is an adjectival phrase that modifies a noun and follows a form of
    be
  type: grammatical
  examples:
  - The delay was due to fog (correct — modifies delay)
  - He arrived late due to fog (informal but widely accepted)
- rule: Due to is more formal than because of and common in news and academic writing
  type: register
  examples:
  - The match was postponed due to heavy rain (news headline)
  - Flight 302 cancelled due to technical issues (announcement)
- rule: Was or were about to describes an action on the verge of happening in the
    past
  type: grammatical
  examples:
  - I was about to call you when you walked in
  - She was about to leave when the phone rang
use:
- context: Immediate future (be about to)
  examples:
  - Look out! The car is about to hit the wall.
  - I am about to send the email.
- context: Reason or cause (due to)
  examples:
  - The match was postponed due to heavy snow.
  - She was promoted due to her hard work.
- context: Past immediate future (was or were about to)
  examples:
  - I was about to leave when the phone rang.
  - They were about to start when the power went out.
phonetics:
- note: The word to in be about to is pronounced as a weak form /tə/ or even reduced
    to a glottal stop before consonants. Learners may over-pronounce it as /tuː/.
  example_generator:
  - about to → /əˈbaʊt tə/
  l1_issue: Spanish and French speakers may stress to too strongly, making the phrase
    sound unnatural. Arabic speakers may struggle with the reduced vowel.
- note: In due to, the word due carries primary stress and to is unstressed /tə/.
    The phrase often blends together in connected speech.
  example_generator:
  - due to → /djuː tə/
  l1_issue: Speakers of languages without reduced vowels (Spanish, Italian) may pronounce
    both words with equal stress, sounding overly careful.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Be about to (contrast with going to and will for future).'
  - 'Week 2: Due to (contrast with because of).'
  - 'Week 3: Combined practice with news headlines.'
  - 'Use physical cues for be about to: raise hand to wave, say ''I am about to wave''
    then wave immediately.'
  recommended_activities:
  - name: About To Now!
    duration: 15
    adaptation_notes: Teacher performs actions and students must say 'You are about
      to...' just before the action happens. Builds the sense of immediacy.
  - name: News Headline Rewrite
    duration: 20
    adaptation_notes: Students rewrite neutral sentences as news headlines using due
      to. Provide a word bank for lower levels.
  - name: Interrupted Past Actions
    duration: 15
    adaptation_notes: Student A says 'I was about to...' and Student B interrupts
      with 'when...' to create a complete narrative.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Confusing ''be about to'' and ''due to'': *''I am about to the rain.'''
  correction: '''I am about to leave.'' / ''I stayed home due to the rain.'''
  explanation: '''Be about to'' = immediate future. ''Due to'' = because of (reason).'
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: '''Be about to'' is neutral. ''Due to'' is more formal than ''because of''.'
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: '''Be about to'' expresses immediate future: ''I am about to leave.'''
- note: '''Due to'' explains reasons: ''The flight was delayed due to bad weather.'''
