grammar_point: passive_with_two_objects
title: Passive Voice with Two Objects
description: A passive structure for verbs that take two objects (indirect object
  = person, direct object = thing), allowing either object to become the subject of
  the passive sentence.
level: B2
meaning:
  core_meaning: Shifts focus to either the person (indirect object) or thing (direct
    object) involved in an action, depending on which is more relevant to the context.
  timeline: Follows the same tense rules as regular passive voice (present, past,
    future, etc.).
  contrast: 'Active: ''I gave him a book'' (focus on the giver, ''I'')

    Passive 1: ''He was given a book'' (focus on the receiver, ''him'')

    Passive 2: ''A book was given to him'' (focus on the item, ''book'')

    Passive 1 is far more common in everyday English than Passive 2.

    '
  ccqs:
  - question: Can we make both objects the subject in passive
    answer: Yes. Either object can become the subject.
    purpose: Tests whether the learner understands that verbs with two objects (direct
      and indirect) allow flexibility in passive construction — either object can
      be promoted to subject position, enabling different information focus.
  - question: Can we use a different structure here with the same meaning?
    answer: No — changing the structure would change the meaning or make the sentence
      ungrammatical.
    purpose: Tests whether the learner understands that passive with two objects is
      the only appropriate structure for this meaning/context.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      passive with two objects and explain why they are incorrect.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Passive 1 (Indirect object as subject): Indirect object + be + past
      participle + direct object

      Passive 2 (Direct object as subject): Direct object + be + past participle +
      to/for + indirect object

      Note: Use ''to'' for most verbs; ''for'' for verbs like buy, make, cook, get

      '
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
  negative:
    structure: Indirect object + be + not + past participle + direct object / Direct
      object + be + not + past participle + to/for + indirect object
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
  questions:
    structure: Be + indirect object + past participle + direct object? / Be + direct
      object + past participle + to/for + indirect object?
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
sub_rules:
- rule: When a verb has two objects (direct and indirect), either object can become
    the subject in passive
  type: grammatical
  examples:
  - She gave me a book → I was given a book (indirect object as subject)
  - She gave me a book → A book was given to me (direct object as subject)
- rule: The indirect object (person) is more commonly made the subject in passive
  type: usage
  examples:
  - I was given a book (more common)
  - A book was given to me (less common but correct)
- rule: 'Common verbs with two objects: give, send, offer, tell, show, teach, promise,
    buy, make, write, read, pay'
  type: lexical
  examples:
  - He told me a story → I was told a story
  - She sent him a letter → He was sent a letter
use:
- name: Focus on the Receiver (Person)
  description: Make the person who receives the thing the subject of the sentence
    (most common use).
  examples:
  - The students were taught grammar.
  - I was sent a package.
  key_point: Use this when the person is more important than the thing.
- name: Focus on the Item (Thing)
  description: Make the thing that is given/sent the subject of the sentence (less
    common).
  examples:
  - The package was sent to me yesterday.
  - A new law was passed by the government.
  key_point: Use this when the thing is more important than the person.
- name: Unknown/Unimportant Giver
  description: When the person who performed the action is unknown or irrelevant.
  examples:
  - She was awarded a prize. (we don't care who awarded it)
  key_point: Removes focus from the agent entirely.
phonetics:
- note: 'In passive with two objects, the new subject receives the stress: ''I was
    given a BOOK.'' ''A BOOK was given to me.'''
  example_generator:
    contexts:
    - passive two objects stress
  l1_issue: Learners may struggle with the word order when transforming sentences
    with two objects to passive.
teaching:
  methodology: PPP
  tips:
  - 'Use common two-object verbs: give, send, tell, show, teach, lend, write, buy,
    make.'
  - Start with Passive 1 (person as subject) as it is the most common use.
  - Contrast active and both passive forms with the same sentence to show focus differences.
  recommended_activities:
  - name: Passive Transformation
    duration: 15
    adaptation_notes: Give students active sentences with two objects. They transform
      them to passive in both ways.
  - name: Which Sounds Better
    duration: 10
    adaptation_notes: Students compare the two passive versions and decide which sounds
      more natural in context.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 8:
    Passive Voice, §8.1-8.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using the wrong preposition in Passive 2: *''A book was given for me.'''
  correction: A book was given to me.
  explanation: In Passive 2 (direct object as subject), the indirect object requires
    the preposition ''to'' (or ''for'' with verbs like buy, make, cook). Using the
    wrong preposition changes meaning or creates an ungrammatical sentence.
  l1_groups:
  - Portuguese
  - Spanish
  - French
- error: 'Passivizing only one object when two exist: *''I was given'' (without mentioning
    what was given, in context where it is needed).'
  correction: I was given a book. / A book was given to me.
  explanation: When passivizing two-object verbs, the speaker must include both the
    retained object or the prepositional phrase to produce a complete and meaningful
    sentence. Dropping necessary information confuses the listener.
  l1_groups:
  - Chinese
  - Japanese
  - Portuguese
- error: 'Making an intransitive verb passive: *''I was arrived the package'' (incorrect
    passive of ''I received the package'').'
  correction: I was sent a package. / A package was sent to me.
  explanation: Some learners try to passivize verbs that only take one object (like
    ''receive''). It is more natural to rewrite the sentence with a two-object verb
    like ''send,'' ''give,'' or ''tell'' to create a passive.
  l1_groups:
  - Portuguese
  - Spanish
  - Arabic
register_notes:
- note: In academic writing, passive voice is standard in methodology and results
    sections.
- note: In formal writing, passive voice is used to depersonalize and focus on the
    process.
- note: In conversation, passive voice is less common; active voice is preferred.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In academic writing, passive voice is standard in methodology and results
    sections.
- note: In news reports, passive voice is used when the agent is unknown or irrelevant.
- note: In conversation, passive voice is less common; active voice is preferred.
