grammar_point: could
title: Could (past ability, polite requests, possibility)
description: Modal verb used to talk about past ability, make polite requests, and
  express general possibility in the past or present.
level: A2
meaning:
  core_meaning: Expresses past ability (general skill), polite requests (more formal
    than 'can'), and general possibility (past or present).
  timeline: Primarily past for ability; present for polite requests/possibility.
  contrast: '"Could" = Past general ability: "I could run fast as a kid" (general)


    "Was/were able to" = Past specific achievement: "I was able to run fast in the
    race yesterday" (specific)


    "Could" (request) = More polite than ''can'': "Could you help me?" (polite)

    '
  ccqs:
  - question: Is this about a general skill in the past or a specific event?
    answer: General skill = could. Specific event = was/were able to.
  - question: Is this a request? Is it more polite than 'can'?
    answer: Yes, 'could' is more polite than 'can' for requests.
  - question: Is this about something that was possible (not certain)?
    answer: Yes, 'could' expresses general possibility, not certainty.
  - question: Can we use 'could' for a single past achievement?
    answer: No — use 'was/were able to' for single past achievements. 'Could' is for
      general ability.
  example_generator:
    contexts:
    - everyday situations
    - polite requests
    - childhood memories
    - travel
    cultural_notes:
    - Using 'could' instead of 'can' for requests is a key politeness strategy in
      English
    - In some cultures, directness is valued over politeness — learners may need explicit
      teaching of this distinction
    min_examples: 5
form:
  affirmative:
    structure: Subject + could + base verb
    example_generator:
      contexts:
      - sports and hobbies
      - weather and nature
      - childhood
      min_examples: 4
  negative:
    structure: Subject + couldn't (could not) + base verb
    example_generator:
      contexts:
      - social interactions
      - past limitations
      min_examples: 4
  questions:
    structure: Could + subject + base verb?
    example_generator:
      contexts:
      - everyday situations
      - polite requests
      min_examples: 4
sub_rules:
- rule: '''Could'' for general past ability — something you were able to do regularly'
  type: grammatical
  examples:
  - I could swim when I was five.
  - She could speak three languages as a child.
  - We could see the sea from our house.
- rule: '''Was/were able to'' for specific past achievements — something you managed
    to do on one occasion'
  type: grammatical
  examples:
  - I was able to fix the car yesterday.
  - She was able to contact the doctor.
  - We were able to get tickets for the concert.
- rule: '''Could not/couldn''t'' works for both general and specific past'
  type: grammatical
  examples:
  - I couldn't swim until I was ten. (general)
  - I couldn't fix the car yesterday. (specific)
- rule: '''Could'' for polite requests — more formal than ''can'''
  type: pragmatic
  examples:
  - Could you help me with this?
  - Could I borrow your pen?
  - Could you speak more slowly, please?
- rule: '''Could'' for present/future possibility — less certain than ''will'''
  type: grammatical
  examples:
  - It could rain later.
  - She could be at the library.
  - This could be a mistake.
use:
- context: Past General Ability
  description: Talk about skills or abilities someone had regularly in the past.
  examples:
  - I could play the piano when I was young.
  - She could run very fast as a teenager.
  - We could see the mountains from our old house.
- context: Polite Requests
  description: Ask for help or permission more formally than 'can'.
  examples:
  - Could you pass the salt, please?
  - Could I borrow your pen?
  - Could you tell me the way to the station?
- context: General Possibility
  description: Talk about what was or is generally possible.
  examples:
  - It could rain later. (present possibility)
  - In the 1900s, people could only travel by train. (past possibility)
  - She could be the new teacher. (present speculation)
phonetics:
- note: '''Could'' is pronounced /kʊd/ — the ''l'' is silent'
  example_generator:
    contexts:
    - pronunciation
  l1_issue: Some L1 speakers try to pronounce the 'l' in 'could', producing /kʊld/
- note: In questions, 'could you' is often reduced to /kʊdʒə/ or /kjə/ in fast speech
  example_generator:
    contexts:
    - connected speech
  l1_issue: Learners may not recognise 'could you' in natural speech because of the
    reduction
teaching:
  methodology: PPP
  tips:
  - 'Contrast with ''can'' for present vs past ability: ''I can swim now'' vs ''I
    could swim as a kid''.'
  - 'Role-play polite requests: Student A asks a stranger for help using ''could''.'
  - 'Timeline practice: Mark past general ability (could) vs specific past achievement
    (was able to).'
  - 'Practice with past time markers: when I was young, last year, in 2020.'
  recommended_activities:
  - name: Childhood Abilities
    duration: 10
    adaptation_notes: Students write 5 sentences about what they could/couldn't do
      at age 5, 10, and 15.
  - name: Polite Request Role-Play
    duration: 15
    adaptation_notes: Students practise asking for help, directions, and favours using
      'could' in different social situations (shop, office, street).
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for could.
  correction: Correct form.
  explanation: This is a common error for could.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
