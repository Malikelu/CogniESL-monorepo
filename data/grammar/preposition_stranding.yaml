grammar_point: preposition_stranding
title: Preposition Stranding
description: Ending a sentence with a preposition in informal English. Who did you
  talk to? vs formal To whom did you talk?
level: C1
meaning:
  core_meaning: In informal English, prepositions can go at the end of questions and
    relative clauses. In formal English, they come before the relative pronoun or
    question word.
  timeline: Timeless — a structural choice, not time-related.
  contrast: Stranding (informal) = Who did you talk to? vs Pied-piping (formal) =
    To whom did you talk?
  ccqs:
  - question: Is the preposition at the end of the sentence?
    answer: Yes, that is preposition stranding.
  - question: Is this formal or informal?
    answer: Informal — stranding is common in speech and informal writing.
  example_generator:
    contexts:
    - informal questions
    - relative clauses
    - everyday conversation
    - spoken English
    cultural_notes:
    - Some grammar purists incorrectly consider stranding wrong — it is fully acceptable
      in modern English
    - Formal writing may prefer pied-piping
    min_examples: 5
form:
  affirmative:
    structure: Question word + auxiliary + subject + verb + preposition
    example_generator:
      contexts:
      - informal questions
      - relative clauses
      min_examples: 4
  negative:
    structure: Same pattern with negation
    example_generator:
      contexts:
      - negative questions
      min_examples: 3
  questions:
    structure: This IS the question form — the preposition goes at the end
    example_generator:
      contexts:
      - forming questions
      min_examples: 3
sub_rules:
- rule: Common in informal questions with who, what, which
  type: grammatical
  examples:
  - Who did you go with?
  - What are you talking about?
  - Which hotel are you staying at?
- rule: Also in relative clauses
  type: grammatical
  examples:
  - The person who I talked to was very nice.
  - The book that I was looking for was on the table.
  - The city which I come from is small.
- rule: Formal alternative — move the preposition before the relative pronoun
  type: grammatical
  examples:
  - The person to whom I talked was very nice.
  - The book for which I was looking was on the table.
use:
- context: Informal questions
  description: Everyday conversation and informal writing
  examples:
  - Who are you waiting for?
  - What are you looking at?
  - Where did you come from?
- context: Relative clauses
  description: Informal relative clauses with prepositions
  examples:
  - The friend who I was talking to called me.
  - The hotel which we stayed at was nice.
phonetics:
- note: Stress on the preposition at the end of the sentence
  example_generator:
    contexts:
    - sentence stress
  l1_issue: Some L1 speakers avoid stranding entirely, sounding overly formal. Others
    overuse it in formal writing.
teaching:
  methodology: Guided discovery
  tips:
  - Use real conversation examples to show natural usage
  - Contrast formal vs informal explicitly — both are correct
  - Explain that ending a sentence with a preposition is a myth from Latin grammar
  recommended_activities:
  - name: Formal or Informal?
    duration: 10
    adaptation_notes: Students identify and transform preposition stranding in different
      registers.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
