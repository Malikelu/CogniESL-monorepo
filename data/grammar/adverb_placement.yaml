grammar_point: adverb_placement
title: Adverb Placement
description: Rules for where adverbs are placed in sentences — before adjectives,
  after verbs, front position for emphasis.
level: B2
meaning:
  core_meaning: Adverb placement in English follows specific rules. Adverbs of manner
    usually go after the verb. Adverbs of frequency go before the main verb. Some
    adverbs can go at the beginning of a sentence for emphasis.
  timeline: Timeless — placement rules apply to all tenses.
  contrast: Correct = She quickly ran. vs Incorrect placement = Quickly she ran. (different
    emphasis)
  ccqs:
  - question: Does this adverb sound natural in this position?
    answer: If yes, the placement is correct.
  - question: What type of adverb is it?
    answer: Type determines placement.
  example_generator:
    contexts:
    - sentence structure
    - emphasis
    - formal writing
    - spoken English
    cultural_notes:
    - Adverb placement varies across languages — many L1 speakers struggle with English
      word order
    min_examples: 5
form:
  affirmative:
    structure: 'Adverb of manner after verb: She ran quickly. / Adverb of frequency
      before main verb: I always eat breakfast. / Front position for emphasis: Suddenly,
      the lights went out.'
    example_generator:
      contexts:
      - manner adverbs
      - frequency adverbs
      - front position
      min_examples: 4
  negative:
    structure: 'Same positions: She did not run quickly. / I never eat breakfast.'
    example_generator:
      contexts:
      - negative sentences
      min_examples: 3
  questions:
    structure: 'Adverb placement in questions: Do you always eat breakfast?'
    example_generator:
      contexts:
      - question formation
      min_examples: 3
sub_rules:
- rule: Adverbs of manner — after the verb or at the end
  type: word_order
  examples:
  - She speaks English fluently.
  - He drove carefully.
- rule: Adverbs of frequency — before the main verb, after be
  type: word_order
  examples:
  - I always wake up early.
  - She is never late.
- rule: Adverbs of time — beginning or end of sentence
  type: word_order
  examples:
  - Yesterday, I went to the store.
  - I went to the store yesterday.
- rule: 'Mid-position adverbs: always, never, often, sometimes, usually, already,
    still, just'
  type: word_order
  examples:
  - I have already finished.
  - She is still waiting.
use:
- context: Natural speech
  description: Using adverbs in their natural positions
  examples:
  - I usually have coffee in the morning.
  - She speaks three languages fluently.
- context: Emphasis
  description: Moving adverbs to the front for emphasis
  examples:
  - Suddenly, everyone stopped talking.
  - Never have I seen such a beautiful sunset.
phonetics:
- note: Stress on the adverb when it is fronted for emphasis
  example_generator:
    contexts:
    - emphasis
  l1_issue: Word order — many L1 speakers place adverbs in positions that sound unnatural
    in English
teaching:
  methodology: Guided discovery
  tips:
  - Use the MIFF rule for position
  - Practice moving adverbs and noticing emphasis changes
  - Contrast with L1 adverb placement
  recommended_activities:
  - name: Adverb Shuffle
    duration: 10
    adaptation_notes: Students rearrange sentences with adverbs in different positions.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for adverb_placement.
  correction: Correct form.
  explanation: This is a common error for adverb_placement.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
