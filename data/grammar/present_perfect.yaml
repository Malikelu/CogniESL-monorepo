grammar_point: present_perfect
title: "Present Perfect (have/has + past participle)"
description: "Connects past actions to the present. No specific past time given. Shows experience, change, or unfinished time. One of the most important A2 grammar points."
level: A2

meaning:
  core_meaning: "Describes a past action that has a connection to the present moment. The exact time is not important — what matters is the result or experience NOW. Contrast with Past Simple where the specific time IS important."
  timeline: "Past action → present result. The time period extends from some point in the past up to NOW. The action may be finished or may continue."
  contrast: "'Present Perfect' = 'I have eaten.' (no specific time, connection to now) vs 'Past Simple' = 'I ate yesterday.' (specific time, finished)"
  ccqs:
    - question: "Do we know exactly when this happened?"
      answer: "No — the exact time is not important. What matters is the result or experience now."
    - question: "Is there a connection to the present moment?"
      answer: "Yes — the past action affects the present in some way (experience, result, or unfinished time)."
    - question: "Can we use 'yesterday' or 'last week' with this tense?"
      answer: "No — specific past time expressions (yesterday, last week, in 2020) go with Past Simple, not Present Perfect."
  example_generator:
    contexts:
      - life experiences
      - travel and places
      - work and career
      - recent events
      - unfinished time periods
    cultural_notes:
      - "Use diverse travel destinations and cultural contexts"
      - "Avoid examples that assume specific cultural knowledge"
      - "Include both positive and negative experiences"
    min_examples: 5

form:
  affirmative:
    structure: "Subject + have/has + past participle (V3)"
    example_generator:
      - "I have eaten lunch."
      - "She has gone to Paris."
      - "They have finished the project."
      - "He has lost his keys."
    min_examples: 4
  negative:
    structure: "Subject + have not (haven't) / has not (hasn't) + past participle (V3)"
    example_generator:
      - "I haven't eaten lunch."
      - "She hasn't gone to Paris."
      - "They haven't finished the project."
      - "He hasn't lost his keys."
    min_examples: 4
  questions:
    structure: "Have/Has + subject + past participle (V3)?"
    example_generator:
      - "Have you eaten lunch?"
      - "Has she gone to Paris?"
      - "Have they finished the project?"
      - "Has he lost his keys?"
    min_examples: 4

sub_rules:
  - rule: "Use 'ever' in questions about life experience"
    type: lexical
    examples: ["Have you ever been to Japan?", "Has she ever tried sushi?", "Have they ever seen snow?"]
  - rule: "Use 'never' for negative life experience"
    type: lexical
    examples: ["I have never flown.", "She has never eaten raw fish.", "They have never been abroad."]
  - rule: "Use 'for' with a period of time, 'since' with a point in time"
    type: grammatical
    examples: ["I have lived here for 10 years. (period)", "I have lived here since 2015. (point)", "She has worked here for 3 months.", "He has studied English since January."]
  - rule: "Use 'just' for very recent actions"
    type: lexical
    examples: ["I have just arrived.", "She has just finished lunch.", "They have just left."]
  - rule: "Use 'already' for actions completed before now (often earlier than expected)"
    type: lexical
    examples: ["I have already finished my homework.", "She has already left.", "They have already eaten."]
  - rule: "Use 'yet' in questions and negatives for actions expected to happen"
    type: lexical
    examples: ["Have you finished yet?", "I haven't finished yet.", "Has she arrived yet?", "They haven't called yet."]
  - rule: "Common irregular past participles: go → gone, eat → eaten, see → seen, do → done, write → written, speak → spoken, take → taken, give → given, make → made"
    type: irregular
    examples: ["I have gone to Paris.", "She has eaten sushi.", "They have seen that movie."]

use:
  - context: "Life experience (ever/never)"
    description: "Talking about things you have or have not done in your life up to now"
    examples: ["I have never flown.", "Have you ever been to Japan?", "She has visited 20 countries.", "They have never tried Indian food."]
  - context: "Unfinished time (for/since)"
    description: "Actions that started in the past and continue to the present"
    examples: ["I have lived here for 10 years.", "She has worked at this company since 2020.", "They have known each other for 5 years.", "He has studied English since he was a child."]
  - context: "Recent actions with present result (just)"
    description: "Actions that have just finished, with a visible result now"
    examples: ["I have just arrived. (I am here now)", "She has just finished the report. (it is done now)", "They have just left. (they are not here now)"]
  - context: "Actions completed before now (already/yet)"
    description: "Actions that are completed or expected to be completed"
    examples: ["I have already done my homework. (it is finished)", "Have you done your homework yet? (expecting an answer)", "She hasn't arrived yet. (we are waiting)"]

phonetics:
  - note: "Contractions are essential: I have → I've, she has → she's, they have → they've. Full forms sound overly formal in spoken English."
    example_generator:
      - "I have → I've /aɪv/"
      - "She has → she's /ʃiːz/"
      - "They have → they've /ðeɪv/"
    l1_issue: "Portuguese and Spanish speakers often omit 'have/has' in speech because their languages do not use an auxiliary for this tense. Drill 'I have eaten' NOT 'I eaten'."
  - note: "Weak form of 'have' in connected speech: /həv/ or /əv/. 'I have eaten' sounds like /aɪv ɪtən/ or /aɪ həv ɪtən/."
    example_generator:
      - "have /həv/ or /əv/"
      - "has /həz/ or /əz/"
    l1_issue: "Many L1 speakers over-pronounce 'have' as /hæv/. Teach the weak form for natural speech."

teaching:
  methodology: "Guided discovery with contrastive analysis"
  tips:
    - "Start with the contrast: Present Perfect (no specific time) vs Past Simple (specific time). Use a timeline on the board to visualize the difference."
    - "Use real-life questions: 'Have you ever been to Paris?' 'Have you ever eaten sushi?' This makes the grammar personal and meaningful."
    - "Drill for/since explicitly. This is one of the most common errors at A2 level. Use a calendar to visualize the difference."
    - "Teach just/already/yet as a set. They all relate to the present moment and are very common in everyday English."
    - "Practice irregular past participles systematically. Students need to memorize these — there is no rule."
    - "Use the 'life experience' context first (ever/never). This is the most intuitive use of Present Perfect for A2 students."
  recommended_activities:
    - name: "Find Someone Who"
      duration: 15
      adaptation_notes: "Students ask classmates 'Have you ever...?' questions to find people who match. Great for practicing questions and short answers: 'Yes, I have.' 'No, I haven't.'"
    - name: "For or Since?"
      duration: 10
      adaptation_notes: "Teacher says a time expression. Students decide: 'for' or 'since'? '10 years' (for), '2015' (since), '3 months' (for), 'January' (since). Then students make full sentences: 'I have lived here for 10 years.'"
    - name: "Life Experience Survey"
      duration: 15
      adaptation_notes: "Students survey classmates about life experiences: 'Have you ever been to another country?' 'Have you ever tried an extreme sport?' Then report: 'Pedro has been to Argentina. Maria has never tried bungee jumping.'"
    - name: "Just, Already, or Yet?"
      duration: 10
      adaptation_notes: "Teacher describes a situation. Students choose the correct word: 'I am at the door. I have ___ arrived.' (just) 'The homework is finished. I have ___ done it.' (already) 'The bus has not come. It has ___ come.' (yet)"
