grammar_point: imperatives
title: Imperatives
description: Commands, requests, and instructions. The base form of the verb without
  a subject.
level: A1
meaning:
  core_meaning: Direct commands, instructions, requests, or warnings. The subject
    'you' is implied but not stated.
  timeline: Immediate — the action should happen now or soon.
  contrast: '''Imperative'' = "Sit down." (direct command)

    ''Present Simple'' = "You sit down." (statement of fact)

    '
  ccqs:
  - question: Is the speaker telling someone to do something?
    answer: Yes, it's a command or instruction.
    purpose: Tests whether the learner understands that imperatives use the base form
      of the verb with no subject, and are used for commands, instructions, invitations,
      and warnings.
  - question: Is the subject 'you' stated?
    answer: No, it's implied.
    purpose: 'Tests whether the learner can form negative imperatives with ''don''t'':
      ''Don''t touch that!'' ''Don''t forget to call.'''
  - question: '[Add specific question for CCQ 3]'
    answer: '[Add specific answer for CCQ 3]'
    purpose: 'Tests whether the learner understands how to soften imperatives for
      politeness: ''Please sit down.'' ''Do come in.'''
  - question: '[Add specific question for CCQ 4]'
    answer: '[Add specific answer for CCQ 4]'
    purpose: 'Tests whether the learner can distinguish imperatives from other verb
      forms: ''Sit down.'' (imperative) vs ''He sits down.'' (present simple)'
  example_generator:
    contexts:
    - classroom instructions
    - recipes and cooking
    - directions and navigation
    - rules and warnings
    - advice and suggestions
    cultural_notes:
    - Use 'please' for polite requests
    - Avoid overly direct commands in conservative cultures
    min_examples: 5
form:
  affirmative:
    structure: 'Base verb (no subject): ''Sit down.'' ''Listen carefully.'''
    example_generator:
      contexts:
      - classroom
      - kitchen
      - street directions
      min_examples: 4
  negative:
    structure: 'Don''t + base verb: ''Don''t run.'' ''Don''t touch that.'''
    example_generator:
      contexts:
      - warnings
      - prohibitions
      - safety rules
      min_examples: 4
  questions:
    structure: Imperatives don't have question forms. Use 'Can you...?' or 'Could
      you...?' for polite requests.
    example_generator:
      contexts:
      - polite requests
      - offering help
      min_examples: 3
sub_rules:
- rule: Polite imperatives with 'please'
  type: pragmatic
  examples:
  - Please sit down.
  - Please don't make noise.
- rule: Let's for suggestions including the speaker
  type: pragmatic
  examples:
  - Let's go.
  - Let's have a break.
use:
- context: Classroom instructions
  description: Teachers use imperatives to give instructions
  examples:
  - Open your books.
  - Listen to the audio.
  - Work in pairs.
- context: Recipes and cooking
  description: Step-by-step instructions
  examples:
  - Mix the ingredients.
  - Bake for 30 minutes.
  - Add salt to taste.
- context: Directions
  description: Giving or asking for directions
  examples:
  - Turn left at the traffic lights.
  - Go straight ahead.
  - Take the second exit.
- context: Rules and warnings
  description: Prohibitions and safety instructions
  examples:
  - Don't smoke.
  - Keep off the grass.
  - Watch your step.
phonetics:
- note: Stress on the verb in short imperatives
  example_generator:
    contexts:
    - commands
    - instructions
  l1_issue: Some L1 speakers may add an unnecessary subject pronoun
teaching:
  methodology: PPP (Present-Practice-Produce)
  tips:
  - Use physical actions (TPR) for teaching imperatives to beginners
  - Contrast with 'please' for politeness
  - Use real classroom instructions as practice
  recommended_activities:
  - name: Simon Says
    duration: 10
    adaptation_notes: Great for kids. For adults, use workplace instructions.
  - name: Recipe Instructions
    duration: 15
    adaptation_notes: Students write or follow a simple recipe using imperatives.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 4:
    Basic Structures, §4.9 (imperative mood)'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 4: Mood, §4.6 (imperatives)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 280-285 (imperatives:
    commands, requests, let''s)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    12: Mood, §12.5-12.6'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 9: Imperatives'
common_errors:
- error: 'Adding ''you'' before imperative: *''You sit down.'''
  correction: Sit down.
  explanation: Imperatives don't have a subject. The subject 'you' is implied.
  l1_groups:
  - Portuguese
  - Spanish
- error: 'Using ''to'' before the verb: *''To sit down.'''
  correction: Sit down.
  explanation: Imperatives use the base verb without 'to'.
  l1_groups:
  - Portuguese
  - Spanish
  - French
- error: 'Using ''don''t'' for negative imperatives: *''Not sit down.'''
  correction: Don't sit down.
  explanation: Negative imperatives use 'don't' + base verb.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: 'Imperatives can sound rude. In formal contexts, use ''please'' or indirect
    forms: ''Could you please sit down?'''
- note: 'In instructions and recipes, imperatives are standard: ''Mix the ingredients.
    Bake for 30 minutes.'''
dialectal_variation:
- note: 'In some dialects, ''you'' is added for emphasis: ''You sit down right now!'''
discourse_notes:
- note: 'Imperatives create direct instructions: ''Turn left at the traffic lights.'''
- note: In academic writing, imperatives are rare. Use passive or indirect forms instead.
