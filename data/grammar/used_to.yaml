grammar_point: used_to
title: Used To (Past Habits and States)
description: Used to describe past habits or states that no longer happen or exist
  in the present.
level: A2-B1
meaning:
  core_meaning: Describes past habits or states that were true in the past but are
    no longer true in the present.
  timeline: 'Past only: Refers to repeated actions or states in the past with no present
    connection.'
  contrast: 'Used to (past habit, no more): "I used to smoke." (I don''t smoke now)

    Would (past habit, no states): "I would smoke." (only actions, not states like
    ''be tall'')

    '
  ccqs:
  - question: I used to play tennis. Do I play tennis now?
    answer: No — 'used to' means the action was true in the past but is not true now.
    purpose: Tests whether the learner understands a key concept of used_to. This
      is fundamental for correct use of this grammar point.
  - question: Can we say 'I used to be tall'?
    answer: Yes — 'used to' can describe both past actions and past states. 'I used
      to be tall' means I was tall in the past but I am not now.
    purpose: Tests whether the learner understands a key concept of used_to. This
      is fundamental for correct use of this grammar point.
  - question: Can we say 'I used to go to Paris last year'?
    answer: 'No — ''used to'' is for repeated past habits, not single events. For
      a single event, use Past Simple: ''I went to Paris last year.'''
    purpose: Tests whether the learner understands a key concept of used_to. This
      is fundamental for correct use of this grammar point.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + used to + Base Verb: "I used to smoke." "She used to live
      in Paris."

      Only refers to past; no present or future use.

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: 'Subject + didn''t use to + Base Verb: "I didn''t use to like coffee."
      (preferred in British English)

      Alternative: Subject + used not to + Base Verb: "I used not to like coffee."
      (formal)

      '
    example_generator:
      contexts:
      - work and professional life
      - food and daily routines
      min_examples: 4
  questions:
    structure: 'Did + Subject + use to + Base Verb: "Did you use to live here?" (preferred)

      Alternative: Used + Subject + to + Base Verb: "Used you to live here?" (British
      formal)

      '
    example_generator:
      contexts:
      - work and professional life
      - sports and hobbies
      min_examples: 4
sub_rules:
- rule: Used to + base verb for past habits or states that are no longer true
  type: grammatical
  examples:
  - I used to play football (but I do not now)
  - She used to live in London (but she does not now)
  - They used to be friends (but they are not now)
- rule: 'Negative: did not use to'
  type: grammatical
  examples:
  - I did not use to like coffee
  - She did not use to exercise
  - They did not use to eat out
- rule: 'Question: Did + subject + use to'
  type: grammatical
  examples:
  - Did you use to play football
  - Did she use to live in London
  - Did they use to be friends
use:
- name: Past Habits
  description: Repeated actions in the past that no longer happen.
  examples:
  - I used to go to the gym every day.
  - She used to call me every night.
  key_point: Action happened regularly in the past, stopped now.
- name: Past States
  description: Past states that are no longer true (used to can describe states; would
    cannot).
  examples:
  - I used to be shy.
  - They used to live in a small house.
  key_point: Used to is the only one of the two that can describe past states.
- name: Contrast with Present
  description: Highlight change from past to present.
  examples:
  - I used to hate coffee, but now I love it.
  - She used to be poor, but now she's rich.
  key_point: Common with 'but now' to show change.
phonetics:
- note: Used to is pronounced /juːst tə/ — the 'd' in 'used' is pronounced as /t/
    because it is followed by 'to'. This is different from 'used to' meaning accustomed
    to, which is pronounced /juːzd tə/.
  example_generator:
    contexts:
    - used to pronunciation
  l1_issue: Learners may pronounce 'used to' as /juːzd tə/. Teach the correct pronunciation
    /juːst tə/ for past habits.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Affirmative ''used to'' + base verb for past habits.'
  - 'Week 2: Negative (didn''t use to) and questions (Did you use to...).'
  - 'Week 3: Contrast with ''would'' (only actions, no states).'
  - 'Use timeline: Draw past vs present to show ''used to'' stops in the past.'
  recommended_activities:
  - name: Past and Present
    duration: 15
    adaptation_notes: 'Students compare their past and present habits: ''I used to
      play video games every day, but now I only play on weekends.'''
  - name: Used To Interview
    duration: 15
    adaptation_notes: 'Students interview each other about past habits: ''Did you
      use to have a pet?'' ''What did you use to do after school?'''
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I use to play football.*'
  correction: I used to play football.
  explanation: Used to always has -d in affirmative.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used for everyday communication and is
    among the most frequent patterns in spoken English.
- note: In academic writing, this structure appears in discussions of established
    knowledge, methodology, and findings.
- note: In news reports, this structure is used for reporting events and attributing
    statements.
