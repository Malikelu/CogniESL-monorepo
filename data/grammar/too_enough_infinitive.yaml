grammar_point: too_enough_infinitive
title: Too/Enough + Infinitive (too hot to drink)
description: '''Too + adjective + to'' means something is excessive and the action
  is impossible. ''Adjective + enough + to'' means sufficient and the action is possible.'
level: B1
meaning:
  core_meaning: '''Too'' = more than needed/wanted (negative result). ''Enough'' =
    as much as needed (positive result). Both followed by infinitive to show the consequence.'
  timeline: Present or general time. The result (infinitive) is a consequence of the
    degree (too/enough).
  contrast: '''too hot to drink'' = It is so hot that I CANNOT drink it.

    ''cool enough to drink'' = It is sufficiently cool that I CAN drink it.

    '
  ccqs:
  - question: What is the difference between too and enough?
    answer: Too means more than needed. Enough means sufficient.
    purpose: Tests whether the learner understands the semantic opposition between
      'too' (excess, beyond what is acceptable) and 'enough' (sufficiency, meeting
      the requirement). 'Too hot to drink' = excessively hot. 'Cool enough to drink'
      = sufficiently cool.
  - question: Can we use a different structure here with the same meaning?
    answer: No — changing the structure would change the meaning or make the sentence
      ungrammatical.
    purpose: Tests whether the learner understands that too enough infinitive is the
      only appropriate structure for this meaning/context.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      too enough infinitive and explain why they are incorrect.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'too + adjective + to + V1: "It''s too hot to drink."

      adjective + enough + to + V1: "It''s cool enough to drink."

      '
    example_generator:
      contexts:
      - weather and nature
      min_examples: 4
  negative:
    structure: 'too + adjective + to + V1 (already implies impossibility — no extra
      negation needed).

      not + adjective + enough + to + V1: "It''s not cool enough to drink."

      '
    example_generator:
      contexts:
      - sports and hobbies
      min_examples: 4
  questions:
    structure: Use standard question forms with the adjective.
    example_generator:
      contexts:
      - food and daily routines
      - weather and nature
      min_examples: 4
sub_rules:
- rule: Too + adjective + to + base verb (impossible because of excess)
  type: grammatical
  examples:
  - The suitcase is too heavy to carry
  - I was too tired to concentrate
  - The music was too loud to sleep
- rule: Adjective + enough + to + base verb (possible because of sufficiency)
  type: grammatical
  examples:
  - She is qualified enough to apply for the job
  - The room is big enough to fit 50 people
  - He ran fast enough to win the race
- rule: Not + adjective + enough + to + base verb (insufficient)
  type: grammatical
  examples:
  - He is not experienced enough to lead the team
  - The soup is not hot enough to serve
  - I was not brave enough to ask
use:
- name: Expressing Impossibility (too...to)
  description: Something exceeds the limit, making the action impossible or inadvisable.
  examples:
  - The suitcase is too heavy to carry.
  - I was too tired to concentrate.
  - The music was too loud to sleep.
  key_point: '''Too'' has a negative meaning — the action in the infinitive CANNOT
    happen.'
- name: Expressing Possibility (enough...to)
  description: Something meets the requirement, making the action possible.
  examples:
  - She is qualified enough to apply for the job.
  - The room is big enough to fit 50 people.
  - He ran fast enough to win the race.
  key_point: '''Enough'' has a positive meaning — the action in the infinitive CAN
    happen.'
- name: Expressing Insufficiency (not...enough to)
  description: Something doesn't meet the requirement, making the action impossible.
  examples:
  - He isn't experienced enough to lead the team.
  - The soup isn't hot enough to serve.
  - I wasn't brave enough to ask.
  key_point: '''Not...enough'' is the negative form — the action CANNOT happen.'
phonetics:
- note: 'Too is pronounced /tuː/ and is usually stressed: ''It is TOO heavy.'' Enough
    is pronounced /ɪˈnʌf/ with stress on the second syllable: ''It is big e-NOUGH.'''
  example_generator:
    contexts:
    - too enough pronunciation
  l1_issue: 'Learners may confuse ''too'' and ''two''. Teach the difference: ''too''
    = excessive, ''two'' = the number 2.'
teaching:
  methodology: PPP
  tips:
  - 'Use physical demonstrations: hold a heavy bag — ''This is too heavy to lift.''
    Hold a light one — ''This is light enough to carry.'''
  - 'Drill the word order: TOO + adj + to V / adj + ENOUGH + to V. Write it on the
    board as a formula.'
  - 'Practice with real-life scenarios: ''Am I old enough to...?'' ''Is it safe enough
    to...?'''
  recommended_activities:
  - name: Too or Enough
    duration: 10
    adaptation_notes: 'Students choose: ''It is ___ heavy to carry.'' (too) / ''It
      is big ___ to fit 50 people.'' (enough).'
  - name: Real Life Scenarios
    duration: 15
    adaptation_notes: 'Students describe real situations: ''The box is too heavy to
      lift. I am not strong enough to open the jar. The water is too cold to swim.'''
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I am too tired for go out.*'
  correction: I am too tired to go out.
  explanation: Too + adj + to + base verb.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
