grammar_point: present_perfect_recent
title: Present Perfect with "just," "already," and "yet" (Recent Past)
description: >-
  Using the present perfect tense with adverbs of indefinite recent time —
  "just" (very recently), "already" (sooner than expected), and "yet" (up to
  now, usually in questions and negatives) — to connect very recent past events
  to the present moment.
level: B1
meaning:
  core_meaning: >-
    The present perfect with "just," "already," and "yet" describes events in a
    time frame that extends from the recent past up to and including the present
    moment. "Just" emphasises that something happened moments ago. "Already"
    emphasises that something has happened before now, often sooner than
    expected. "Yet" asks about or negates something expected to happen up to the
    present moment. The key concept is present relevance: the past event has
    consequences or visibility right now.
  timeline: >-
    The time frame is "the recent past leading up to now." It is not a specific
    clock time. "Just" = moments before speaking. "Already" = at some point
    before now (emphasis: sooner than expected). "Yet" = from some point in the
    past up to this moment (used in questions and negatives).
  contrast: >-
    Present perfect with "just" = "I have just arrived" (moments ago, I'm still
    here, it's relevant now) vs Past simple = "I arrived an hour ago" (specific
    finished time, no necessary present connection). The present perfect keeps
    the event "open" to the present; the past simple "closes" it in a finished
    time frame.
  ccqs:
    - question: >-
        If I say "I have just eaten lunch," is it likely that food is still on
        the table or that I am still in the restaurant?
      answer: >-
        Yes, very likely. "Just" with the present perfect means the action
        happened moments ago and its effects are still visible or relevant. If I
        say "I have just eaten," you can probably see the evidence — I might
        still be at the table, or I might have crumbs on my shirt. The present
        perfect keeps the event connected to the present moment, unlike the past
        simple "I ate lunch" which simply reports a completed action with no
        implication about the current situation.
      purpose: >-
        Tests whether the learner understands the "present relevance" component
        of the present perfect with "just."
    - question: >-
        Can I say "I have just arrived yesterday"?
      answer: >-
        No. "Just" with the present perfect refers to an indefinite time in the
        very recent past. "Yesterday" is a specific, finished time expression.
        Combining them creates a contradiction: the present perfect says "this
        is connected to now" while "yesterday" says "this is in a finished past
        time." The correct sentence with "yesterday" uses past simple: "I
        arrived yesterday." The present perfect with "just" cannot co-occur with
        any specific past time expression (yesterday, last week, in 2010, at 3
        o'clock).
      purpose: >-
        Tests whether the learner understands the incompatibility of the present
        perfect with specific past time markers.
    - question: >-
        What is the difference between "Have you finished yet?" and "Have you
        finished already?"
      answer: >-
        "Have you finished yet?" is a neutral question asking whether something
        expected has happened up to now. The speaker doesn't know if it's done.
        "Have you finished already?" expresses surprise — the speaker expected it
        to take longer and is impressed or shocked that it's done. "Yet" is
        neutral/expectant; "already" carries an emotional charge of surprise or
        impatience.
      purpose: >-
        Tests the pragmatic difference between "yet" and "already" in questions.
    - question: >-
        In the sentence "She hasn't called yet," does this mean she will
        probably call soon?
      answer: >-
        Yes, "yet" in negatives implies an expectation that the event will
        happen. "She hasn't called yet" means "up to now, she has not called,
        but I expect she will." If the speaker did not expect her to call, they
        would say "She didn't call" (past simple, no expectation implied). The
        use of "yet" with the present perfect negative creates a sense of
        anticipation — the door is still open for the event to occur.
      purpose: >-
        Tests whether the learner understands the anticipatory meaning of "yet"
        in negative present perfect sentences.
  example_generator:
    contexts:
      - arrivals and departures
      - completed actions
      - news and announcements
      - daily routines
    cultural_notes:
      - >-
        In American English, the simple past is often used where British English
        would use the present perfect with "just": AmE "I just ate" vs BrE "I
        have just eaten." Both are correct in their respective varieties, but
        learners should be aware of the difference.
    min_examples: 6
form:
  affirmative:
    structure: >-
      Subject + have/has + just/already + past participle: "I have just
      arrived." / "She has already finished." / "They have already left."
    example_generator:
      contexts:
      - arrivals and departures
      - completed actions
      - news and announcements
      min_examples: 6
  negative:
    structure: >-
      Subject + have/has + not + past participle + yet: "I haven't finished
      yet." / "She hasn't called yet." / "They haven't arrived yet."
    example_generator:
      contexts:
      - incomplete actions
      - unfulfilled expectations
      min_examples: 4
  questions:
    structure: >-
      Have/Has + subject + past participle + yet?: "Have you finished yet?" /
      Has/Have + subject + already + past participle?: "Has she already left?"
    example_generator:
      contexts:
      - checking completion
      - expressing surprise
      min_examples: 4
sub_rules:
  - type: word_order
    rule: >-
      "Just," "already," and "yet" occupy specific positions in the verb phrase.
      "Just" and "already" go between the auxiliary (have/has) and the past
      participle: "have just finished," "has already left." "Yet" goes at the
      end of the clause: "haven't finished yet," "Has she called yet?"
    examples:
      - I have just arrived. (not *I just have arrived)
      - She has already eaten. (not *She already has eaten)
      - They haven't finished yet. (not *They haven't yet finished — though this is acceptable in formal English)
      - Have you finished yet? (not *Have yet you finished)
    explanation: >-
      The mid-position (between auxiliary and main verb) is the standard
      placement for "just" and "already" in English. Learners from languages
      where adverbs precede the auxiliary (e.g., French "j'ai déjà fini" —
      literally "I have already finished," which happens to match, but German
      "Ich habe schon fertig" shows different ordering) may need practice with
      English adverb placement. "Yet" is end-position only.
  - type: semantic
    rule: >-
      "Just" means "a very short time ago." It is only used with perfect tenses
      (present perfect or past perfect): "I have just seen her" (moments ago) /
      "I had just left when she called" (moments before another past event). It
      is NOT used with the past simple in standard BrE, though AmE does allow
      "I just saw her."
    examples:
      - "I have just heard the news. (present perfect — very recent)"
      - "She had just walked out the door when the phone rang. (past perfect — recent before another past event)"
      - "We've just moved to a new apartment. (present perfect — very recent change)"
    explanation: >-
      "Just" in the "very recent" sense requires a perfect tense because it
      describes a relationship between two time points: the past event and the
      reference point (now for present perfect, another past moment for past
      perfect). The past simple, which describes a single completed time frame,
      is incompatible with this meaning in standard BrE.
  - type: semantic
    rule: >-
      "Already" means "before now" or "sooner than expected." It can be used in
      affirmatives and questions. In affirmatives, it emphasises that something
      has happened: "I've already done it." In questions, it expresses surprise:
      "Have you already finished?" (I'm surprised it's done so soon).
    examples:
      - "I've already seen that movie. (before now)"
      - "She's already left for the airport. (before now)"
      - "Have you already finished your homework? (surprise: that was fast)"
      - "Has it already started? (surprise: I thought we had more time)"
    explanation: >-
      "Already" is versatile but always carries the core meaning of "before the
      expected time." In teaching, it's useful to contrast "already" (affirmative
      and question) with "yet" (question and negative): "already" confirms
      something has happened; "yet" questions or denies it.
  - type: semantic
    rule: >-
      "Yet" means "up to now" and is used in questions and negatives only. It
      implies an expectation that the event will happen: "Have you finished yet?"
      (I expect you to finish) / "I haven't finished yet" (but I will). It
      cannot be used in affirmative statements: *"I have finished yet" is
      ungrammatical.
    examples:
      - "Have you booked the tickets yet? (question — I expect you to)"
      - "She hasn't replied to my email yet. (negative — but I expect she will)"
      - "They haven't announced the results yet. (negative — but they will)"
    explanation: >-
      "Yet" is restricted to non-affirmative contexts (questions and negatives).
      This is a grammatical constraint that learners must memorise. The
      semantic component of "yet" is anticipation — the speaker believes the
      event is expected or possible. This is why "yet" sounds odd with events
      that are not normally expected: *"Has it rained yet?" (with no context of
      expected rain) sounds strange, whereas "Has it rained yet today?" (when
        rain was forecast) is natural.
  - type: grammatical
    rule: >-
      The present perfect with "just," "already," and "yet" cannot co-occur with
      specific past time expressions (yesterday, last week, in 2015, at 3
      o'clock, when I was young). These time expressions require the past
      simple: "I arrived yesterday" (not *"I have arrived yesterday").
    examples:
      - "I have just arrived. (correct — no specific time)"
      - "I arrived an hour ago. (correct — specific time, past simple)"
      - "*I have just arrived an hour ago. (incorrect — mixing present perfect with specific past time)"
    explanation: >-
      This is one of the most important constraints on the present perfect. The
      time frame of the present perfect is "indefinite" — it includes the
      present moment. Specific past time expressions define a "definite" time
      that is separated from the present. These two time frames are
      incompatible. Learners must choose: present perfect (indefinite, present
      relevance) or past simple (definite, finished time).
use:
  - context: Arrivals and departures
    description: >-
      Reporting that someone has very recently arrived or left.
    examples:
      - "I've just arrived at the airport — can you pick me up?"
      - "She's already left, I'm afraid."
      - "Has the train arrived yet?"
  - context: Completed tasks
    description: >-
      Reporting that something has been finished, often in response to a
      question or expectation.
    examples:
      - "I've just finished the report. Here it is."
      - "Have you done the dishes yet?"
      - "She's already completed the assignment."
  - context: News and announcements
    description: >-
      Sharing very recent information.
    examples:
      - "We've just heard that the meeting is cancelled."
      - "Has the news been announced yet?"
      - "They've already made the decision."
phonetics:
  - note: >-
      "Just" is often reduced in connected speech: "I've just" → /aɪv dʒəst/ or
      even /aɪv dʒʌs/. "Already" is stressed on the second syllable: /ɔːlˈrɛdi/.
      "Yet" is /jɛt/ and is typically unstressed in questions: "Have you finished
      yet?" → /həv ju ˈfɪnɪʃt jɛt/.
    contexts:
      - connected speech
      - stress patterns
    l1_issue: >-
      Many L1 speakers (especially from Slavic and Romance language backgrounds)
      use the present simple where English requires the present perfect with
      "just": *"I just arrive" instead of "I have just arrived." This is because
      their languages use a single past tense where English distinguishes
      present perfect from past simple.
teaching:
  methodology: PPP with timeline visualization
  tips:
    - >-
      Use a timeline on the board: draw a line from past to now, and show that
      "just" is a point very close to "now" on the line. Show that "yesterday"
      is a point further away in a "finished" zone.
    - >-
      Act out scenarios: pretend to have just finished eating (wipe mouth, push
      plate away) and say "I've just eaten." The physical evidence reinforces
      the "present relevance" meaning.
    - >-
      Contrast pairs explicitly: "I've just arrived" (I'm still here) vs "I
      arrived an hour ago" (reporting a past fact). Ask CCQs to highlight the
      difference.
    - >-
      Teach the adverb positions as a fixed pattern: have/has + JUST/ALREADY +
      past participle; have/has + not + past participle + YET.
  recommended_activities:
    - name: News Reporter
      duration: 15
      adaptation_notes: >-
        Students take turns being a "news reporter" announcing recent events
        using "just" and "already": "The president has just announced..." / "The
        results have already been confirmed..."
    - name: Yet/Already Survey
      duration: 10
      adaptation_notes: >-
        Students ask each other questions using "yet" and "already": "Have you
        done your homework yet?" / "Have you already finished?" They record
        answers and report back.
sources:
  primary: >-
    Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage. Chapter 5: Present Perfect and Present Perfect
    Progressive, sections on temporal adverbs.
  secondary: >-
    Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press. Chapter 3: Tense and aspect, sections on the
    perfect and temporal adverbials.
  validation: >-
    Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
    Entries on "just," "already," "yet," and "present perfect."
  pedagogical: >-
    Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press. Chapter on aspect and tense, section on the present
    perfect with temporal adverbs.
  teaching_practice: >-
    Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press. Activities for teaching present perfect vs
    past simple, including adverb placement.
common_errors:
  - error: "*I just arrived.* (in BrE formal/written contexts)"
    correction: "I have just arrived."
    explanation: >-
      In British English, "just" with the recent-past meaning requires the
      present perfect: "I have just arrived." Using the past simple ("I just
      arrived") is standard in American English but is considered informal or
      non-standard in BrE. Learners preparing for BrE-based exams (Cambridge,
      IELTS) should use the present perfect. This is one of the most
      well-documented BrE/AmE differences.
    l1_groups:
      - All L1 groups (this is a dialectal difference, not an L1 transfer error)
  - error: "*I have just arrived yesterday.*"
    correction: "I arrived yesterday."
    explanation: >-
      The present perfect with "just" cannot co-occur with specific past time
      expressions like "yesterday," "last week," or "two hours ago." These time
      expressions define a finished past time, which is incompatible with the
      present perfect's "indefinite time up to now" meaning. The correct tense
      with "yesterday" is the past simple: "I arrived yesterday."
    l1_groups:
      - Portuguese
      - Spanish
      - French
      - German
      - Russian
      - Arabic
  - error: "*Did you finish your homework yet?* (in BrE)"
    correction: "Have you finished your homework yet?"
    explanation: >-
      In BrE, "yet" with the meaning "up to now" requires the present perfect.
      Using the past simple ("Did you finish yet?") is standard in AmE but is
      considered informal in BrE. The present perfect is the standard form in
      BrE for any situation where the time frame includes the present moment.
    l1_groups:
      - All L1 groups (dialectal preference)
  - error: "*I have already finished my homework yet.*"
    correction: "I have already finished my homework. / I haven't finished my homework yet."
    explanation: >-
      "Already" and "yet" cannot co-occur in the same clause. "Already" is used
      in affirmatives to say something has happened before now. "Yet" is used in
      questions and negatives to ask about or deny something up to now. They
      have complementary distributions: "already" for affirmatives, "yet" for
      non-affirmatives. Using both creates a contradiction.
    l1_groups:
      - Portuguese
      - Spanish
      - French
      - German
  - error: "*She has yet arrived.*"
    correction: "She hasn't arrived yet. / Has she arrived yet?"
    explanation: >-
      "Yet" cannot be used in affirmative statements. It is restricted to
      questions and negatives. The learner who says *"She has yet arrived" is
      incorrectly placing "yet" in an affirmative context. The correct forms
      are: "She hasn't arrived yet" (negative) or "Has she arrived yet?"
      (question). Note: "yet" can appear in affirmatives in the sense of
      "nevertheless" ("She has yet to arrive" = she still hasn't arrived), but
      this is a different structure.
    l1_groups:
      - Portuguese
      - Spanish
      - French
      - Mandarin
      - Korean
register_notes:
  - note: >-
      In casual spoken AmE, the past simple frequently replaces the present
      perfect with "just" and "already": "I just ate" (AmE) vs "I have just
      eaten" (BrE). Both are correct in their respective varieties. Learners
      should be aware of this difference but not consider either form "wrong."
  - note: >-
      In formal writing (academic, journalistic, business), the present perfect
      with "just," "already," and "yet" is preferred in both BrE and AmE when
      the time frame is indefinite and connected to the present: "The government
      has just announced new measures." / "The results have not yet been
      published."
  - note: >-
      "Already" in questions can express impatience or annoyance in informal
      speech: "Have you finished already? That was fast!" or "Are you leaving
      already?" (I wish you would stay longer). The intonation rises to convey
      surprise or disappointment.
  - note: >-
      In informal speech, "yet" is sometimes replaced by "still...not" in
      negatives: "I haven't finished yet" = "I still haven't finished." The
      meaning is similar, but "still...not" emphasises the ongoing nature of the
      non-completion more strongly.
dialectal_variation:
  - note: >-
      The most significant BrE/AmE difference: AmE freely uses the past simple
      with "just," "already," and "yet" where BrE requires the present perfect.
      AmE: "I just ate." / "Did you finish yet?" / "I already told you." BrE: "I
      have just eaten." / "Have you finished yet?" / "I have already told you."
      Both are grammatical in their respective varieties.
  - note: >-
      In Irish English, "after" + V-ing can express recent completion: "She is
      after leaving" = "She has just left." This is a distinct construction
      unrelated to the present perfect but serves a similar communicative
      function.
  - note: >-
      In Scottish English, "just" can mean "simply" or "only" in addition to the
      temporal meaning: "I just wanted to ask" = "I simply wanted to ask." This
      can cause ambiguity for learners.
  - note: >-
      In some varieties of African American English, "done" + past participle
      can express recent completion: "I done finished" = "I have just
      finished." This is a distinct grammatical construction, not an error.
discourse_notes:
  - note: >-
      In conversation, "just" with the present perfect is a primary device for
      introducing news. When someone says "I've just heard that...," they are
      framing the information as fresh and relevant. This creates a sense of
      immediacy and invites the listener to react. The present perfect keeps the
      news "alive" in the conversation.
  - note: >-
      "Yet" in questions functions as a prompt or reminder. "Have you done your
      homework yet?" is not a neutral inquiry — it implies the speaker expects
      the homework to be done and is checking. This makes "yet" questions
      inherently face-threatening in Brown and Levinson's politeness theory: they
      imply the listener should have acted by now.
  - note: >-
      "Already" in affirmatives often serves to preempt or counter an
      assumption: "I've already done it" = "You don't need to ask me to do it;
      it's taken care of." In questions, it challenges the listener's pace:
      "Have you already finished?" = "That was surprisingly fast." The adverb
      carries pragmatic weight beyond its temporal meaning.
  - note: >-
      In narrative discourse, the present perfect with "just" creates a "hot
      news" effect, pulling the listener into the story as if the events are
      unfolding now: "The door opens. A man steps in. He has just escaped from
      prison." This literary use of the present perfect is called the "historic
      perfect" and creates dramatic immediacy.
