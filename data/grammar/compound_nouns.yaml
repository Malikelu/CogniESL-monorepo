grammar_point: compound_nouns
title: Compound Nouns (Two+ Words as One Noun)
description: Nouns formed by combining two or more words to act as a single noun,
  with different spelling patterns.
level: A2
meaning:
  core_meaning: Combines two or more words to create a single noun with a specific
    meaning that is more than the sum of its parts.
  timeline: N/A (Noun form, not tense-based).
  contrast: 'Closed: ''Toothbrush'' (one word, common objects)


    Open: ''Bus stop'' (two words, locations/services)


    Hyphenated: ''Mother-in-law'' (hyphenated, family terms or adjectives)


    Stress is almost always on the first word: ''TOOTHbrush'', ''BUS stop'', ''MOTHER-in-law''.

    '
  ccqs:
  - question: Is this one word, two words, or hyphenated?
    answer: One word = closed (toothbrush). Two words = open (bus stop). Hyphenated
      = mother-in-law.
    purpose: Tests whether the learner understands that '-ed' adjectives describe
      how someone feels (experiencer) while '-ing' adjectives describe what causes
      the feeling (stimulus).
  - question: Where is the stress in this compound noun?
    answer: 'Almost always on the first word: TOOTHbrush, BUS stop, MOTHER-in-law.'
    purpose: Tests whether the learner understands the key concept of compound nouns.
      This is important because mastering this distinction is essential for accurate
      and natural English at A2 level.
  - question: What is the plural form — where does the -s go?
    answer: 'On the last word: toothbrushes, bus stops, mothers-in-law.'
    purpose: Tests whether the learner understands how cleft sentences (it-clefts
      and wh-clefts) are used to emphasize specific information. The structure changes
      the focus of the sentence.
  - question: Can you guess the meaning from the two words?
    answer: Sometimes yes (bedroom = bed + room), sometimes no (butterfly ≠ butter
      + fly).
    purpose: Tests whether the learner understands the difference between present
      ability (can) and past ability or polite possibility (could). This is important
      for expressing ability and making requests.
  example_generator:
    contexts:
    - everyday situations
    - home and family
    - travel
    - work
    cultural_notes:
    - English has many compound nouns and new ones are created all the time (e.g.,
      'smartphone', 'earbuds')
    - The spelling (closed/open/hyphenated) must often be memorised — there is no
      single rule
    min_examples: 5
form:
  affirmative:
    structure: 'Closed (one word): toothbrush, toothpaste, bedroom

      Hyphenated (with hyphen): mother-in-law, well-known, self-esteem

      Open (two separate words): bus stop, post office, high school

      Plural rule: Pluralize the last word (toothbrushes, bus stops, mothers-in-law)

      '
    example_generator:
      contexts:
      - family and relationships
      - travel and places
      - daily routines
      min_examples: 4
  negative:
    structure: No + compound noun (plural for countable)
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: How many + plural compound noun? / Is this a + singular compound noun?
    example_generator:
      contexts:
      - education and school
      - shopping
      min_examples: 4
sub_rules:
- rule: Closed compound nouns are one word — most common for everyday objects
  type: orthographic
  examples:
  - toothbrush
  - bedroom
  - notebook
  - sunflower
  - football
  - raincoat
- rule: Open compound nouns are two separate words — common for locations and services
  type: orthographic
  examples:
  - bus stop
  - post office
  - swimming pool
  - train station
  - police station
  - high school
- rule: Hyphenated compound nouns use a hyphen — common for family terms and some
    adjectives
  type: orthographic
  examples:
  - mother-in-law
  - father-in-law
  - well-known
  - self-esteem
  - check-in
  - editor-in-chief
- rule: Plural is formed on the last element, not the first
  type: grammatical
  examples:
  - toothbrush → toothbrushes
  - bus stop → bus stops
  - mother-in-law → mothers-in-law
  - passer-by → passers-by
- rule: Stress is almost always on the first element of a compound noun
  type: phonological
  examples:
  - TOOTHbrush (not toothBRUSH)
  - BUS stop (not bus STOP)
  - MOTHER-in-law (not mother-in-LAW)
use:
- context: Common Objects
  description: Closed compound nouns for everyday objects.
  examples:
  - I need a new toothbrush.
  - She left her notebook on the desk.
  - We sat on the bookshelf.
- context: Locations and Services
  description: Open compound nouns for places or services.
  examples:
  - I'm waiting at the bus stop.
  - Let's go to the post office.
  - The children are at the swimming pool.
- context: Family Terms and Adjectives
  description: Hyphenated compound nouns for family or descriptive adjectives.
  examples:
  - My mother-in-law is visiting.
  - She is a well-known author.
  - He has low self-esteem.
phonetics:
- note: 'Primary stress on the first element: TOOTHbrush, BUS stop, MOTHER-in-law'
  example_generator:
    contexts:
    - word stress
    - pronunciation drills
  l1_issue: Many L1 speakers stress the second element, which can make the compound
    hard to recognise
- note: No pause between the elements — they are pronounced as one unit
  example_generator:
    contexts:
    - connected speech
  l1_issue: Some L1 speakers insert a small pause between the words, breaking the
    compound into separate words
teaching:
  methodology: PPP
  tips:
  - Sort common compound nouns into closed, hyphenated, and open categories.
  - Practice pronunciation with stress on the first word.
  - 'Drill plural forms: ''toothbrushes'', ''mothers-in-law''.'
  - Use picture flashcards — students guess the compound noun from an image.
  recommended_activities:
  - name: Compound Noun Sort
    duration: 10
    adaptation_notes: Students sort a list of compound nouns into closed, open, and
      hyphenated columns on the board.
  - name: Create a Compound
    duration: 15
    adaptation_notes: Students combine two simple words to make compound nouns and
      illustrate them. Check if the meaning is transparent or opaque.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.6-12.13'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I need a brush of teeth.*'
  correction: I need a toothbrush.
  explanation: English uses noun-noun compounds (toothbrush), not noun + of + noun
    for common objects. L1s that use 'of' constructions (Portuguese 'escova de dentes')
    transfer this pattern incorrectly.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Italian
- error: '*I stop at the station to wait for the bus.* (confusing terms)'
  correction: I wait at the bus stop for the bus.
  explanation: 'Confusing similar compound nouns: ''bus stop'' (a place where buses
    stop briefly, for passengers) vs ''bus station'' (a large terminus where buses
    are stored and depart). Choosing the wrong compound changes the meaning.'
  l1_groups:
  - Portuguese
  - Spanish
- error: '*Two teethbrush are in the bathroom.*'
  correction: Two toothbrushes are in the bathroom.
  explanation: 'Compound noun plurals are formed on the main noun (the last word):
    toothbrush to toothbrushes. Some learners incorrectly pluralize the first element
    (*teethbrush) following the compound''s internal logic.'
  l1_groups:
  - Portuguese
  - Spanish
  - French
- error: '*My mother in law is visiting.*'
  correction: My mother-in-law is visiting.
  explanation: 'Compound nouns with family terms use hyphens: mother-in-law, father-in-law,
    brother-in-law. Without hyphens, the words read as separate nouns rather than
    a single compound. This is a spelling convention, not a grammar error.'
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
  - Japanese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
