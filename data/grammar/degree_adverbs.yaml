grammar_point: degree_adverbs
title: Degree Adverbs (very, quite, too, enough, extremely)
description: Adverbs that modify adjectives or other adverbs to show intensity. Essential
  for gradation and emphasis.
level: A2
meaning:
  core_meaning: 'Indicates the intensity or degree of a quality: low (slightly) to
    high (extremely).'
  timeline: N/A (Degree adverbs describe intensity, not time.)
  contrast: '''Very'' = high degree (neutral)

    ''Too'' = excessive (negative meaning)

    ''Enough'' = sufficient (positive meaning)

    ''Quite'' = moderate degree (UK: less; US: more)

    ''Extremely'' = highest degree

    '
  ccqs:
  - question: Is 'very hot' comfortable to touch?
    answer: No — 'very hot' means it has a high temperature, probably too hot to touch.
    purpose: 'Tests whether the learner understands degree adverbs and their different
      meanings: ''very'' (high degree), ''too'' (excessive, negative), and ''enough''
      (sufficient, positive).'
  - question: Does 'too heavy' mean the weight is acceptable?
    answer: No — 'too' means more than wanted or needed, with a negative meaning.
    purpose: 'Tests whether the learner understands degree adverbs and their different
      meanings: ''very'' (high degree), ''too'' (excessive, negative), and ''enough''
      (sufficient, positive).'
  - question: If she is 'tall enough to reach the shelf,' can she reach it?
    answer: Yes — 'enough' means sufficient.
    purpose: Tests whether the learner understands that 'enough' expresses sufficiency
      for a purpose. The structure 'adjective + enough + to + infinitive' means the
      degree is sufficient to achieve the result.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Degree adverb + adjective/adverb: "very hot", "quite quickly"

      Too + adjective + for + noun: "too hot for coffee"

      Adjective + enough (+ for + noun): "warm enough (for tea)"

      '
    example_generator:
      contexts:
      - sports and hobbies
      - weather and nature
      min_examples: 4
  negative:
    structure: 'Degree adverb position unchanged: ''It''s not very hot.'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Degree adverb before adjective: ''Is it very cold?'' ''Is it too expensive?'''
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
sub_rules:
- rule: Very, extremely, incredibly intensify adjectives and go before them
  type: grammatical
  examples:
  - very hot
  - extremely difficult
  - incredibly beautiful
- rule: Fairly, quite, rather reduce or moderate adjectives
  type: grammatical
  examples:
  - fairly good (OK but not great)
  - quite nice (pleasant)
  - rather difficult (more than expected)
- rule: Much, a lot, far go before comparative adjectives to intensify them
  type: grammatical
  examples:
  - much better
  - a lot more expensive
  - far more interesting
use:
- name: Intensifying Adjectives
  description: Make adjectives stronger or weaker.
  examples:
  - very tired
  - extremely difficult
  - slightly nervous
  key_point: Very is most common intensifier for adjectives.
- name: Expressing Excess
  description: Show something is more than needed or wanted.
  examples:
  - too noisy
  - too expensive
  - too fast
  key_point: Too has negative meaning = 'more than good/necessary'.
- name: Expressing Sufficiency
  description: Show something is adequate or sufficient.
  examples:
  - big enough
  - warm enough
  - experienced enough
  key_point: Enough comes AFTER adjective (different from very/too).
phonetics:
- note: 'Degree adverbs are usually stressed when they intensify: ''It was VERY hot.''
    ''She is EXTREMELY talented.'''
  example_generator:
    contexts:
    - degree adverb stress
  l1_issue: Learners may not stress the degree adverb sufficiently, making the intensification
    less effective.
teaching:
  methodology: Use a lexical-set approach grouped by function (intensifiers, excess,
    sufficiency). Present through visual scales and realia (thermometer, objects of
    different sizes). Controlled practice via gap-fills and sentence transformation,
    followed by communicative tasks (problem-solving scenarios, object comparisons).
    Contrastive analysis with L1 helps clarify the very/too/enough distinction.
  tips:
  - 'Use temperature scale: freezing → cold → cool → warm → hot → boiling with degree
    adverbs.'
  - 'Practice ''too'' vs ''enough'' with real objects: ''Is this book too heavy? Heavy
    enough?'''
  - 'Show ''very'' vs ''too'' difference: ''very hungry'' (good) vs ''too hungry''
    (uncomfortable).'
  recommended_activities:
  - name: Intensity Scale
    duration: 10
    adaptation_notes: 'Students arrange adverbs on a scale from weak to strong: slightly,
      fairly, quite, very, extremely, incredibly.'
  - name: Describe the Picture
    duration: 15
    adaptation_notes: 'Show dramatic photos. Students describe them: ''The sunset
      is incredibly beautiful. The mountain is extremely tall.'''
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*She is very taller than me.*'
  correction: She is much taller than me.
  explanation: Use much/far with comparatives, not very.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
