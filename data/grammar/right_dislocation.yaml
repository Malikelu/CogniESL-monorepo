grammar_point: right_dislocation
title: Right-Dislocation
description: 'Moving a noun phrase to the end of a sentence for emphasis or clarification,
  with a pronoun in the normal subject position: ''She is really smart, my sister.'''
level: C1
meaning:
  core_meaning: A structure where a noun phrase is moved to the end of a sentence
    and replaced by a pronoun. Used for emphasis or clarification in spoken English.
  timeline: Present — the dislocated element refers to the present.
  contrast: Standard = My sister is really smart. vs Right-dislocation = She is really
    smart, my sister.
  ccqs:
  - question: Is there a pronoun at the beginning and a noun at the end?
    answer: Yes, that is right-dislocation.
    purpose: Tests whether the learner can identify the structural signature of right-dislocation
      -- a pronoun in the subject position with the full noun phrase appearing after
      a comma at the end of the clause.
  - question: Is this formal or informal?
    answer: Informal — used in spoken English.
    purpose: Tests the learner's awareness that right-dislocation is a feature of
      informal spoken English and would be inappropriate in formal writing, helping
      them match structure to register.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      right dislocation and explain why they are incorrect.
example_generator:
  contexts:
  - spoken English
  - informal conversation
  - emphasis
  - clarification
  cultural_notes: []
  min_examples: 5
form:
  affirmative:
    structure: 'Pronoun + verb + complement + comma + noun phrase: She is really smart,
      my sister.'
    example_generator:
      contexts:
      - spoken English
      - informal conversation
      - emphasis
      min_examples: 4
  negative:
    structure: 'Same pattern: He did not show up, John.'
    example_generator:
      contexts:
      - spoken English
      - informal conversation
      - emphasis
      min_examples: 4
  questions:
    structure: Not typically used in questions.
    example_generator:
      contexts:
      - spoken English
      - informal conversation
      - emphasis
      min_examples: 4
sub_rules:
- rule: The dislocated noun clarifies the pronoun
  type: pragmatic
  examples:
  - She is really smart, my sister.
  - He did not show up, John.
  - They are very kind, my neighbors.
use:
- context: Clarification
  description: Used when the listener might not know who the pronoun refers to
  examples:
  - She is really smart, my sister.
  - They are very kind, my neighbors.
phonetics:
- note: Stress on the dislocated noun
  example_generator:
    contexts:
    - emphasis
  l1_issue: Some L1 speakers are not familiar with this structure.
teaching:
  methodology: Guided discovery
  tips:
  - Use authentic spoken examples
  - Explain the clarifying function
  - Practice with real names and relationships
  recommended_activities:
  - name: Dislocation Practice
    duration: 10
    adaptation_notes: Students transform standard sentences into right-dislocation.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Omitting the pronoun at the beginning: *''Is really smart, my sister.'''
  correction: She is really smart, my sister.
  explanation: Right-dislocation requires a pronoun in the subject position to serve
    as the grammatical subject. The full noun phrase appears only at the end. Omitting
    the pronoun creates an ungrammatical sentence.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Using wrong pronoun case: *''Her is really smart, my sister.'''
  correction: She is really smart, my sister.
  explanation: The right-dislocation structure requires a subject pronoun (she/he/they)
    in the initial position, not an object pronoun. The pronoun functions as the grammatical
    subject of the sentence.
  l1_groups:
  - Portuguese
  - Spanish
  - Korean
- error: 'Forgetting the comma: *''She is really smart my sister.'''
  correction: She is really smart, my sister.
  explanation: A comma is essential to signal the right-dislocation structure without
    it, the sentence reads as if 'my sister' is an appositive but without proper punctuation,
    it becomes confusing or ungrammatical.
  l1_groups:
  - Portuguese
  - Spanish
  - Japanese
register_notes:
- note: Right-dislocation is an informal spoken structure and is not appropriate for
    formal or academic writing.
dialectal_variation:
- note: No significant BrE/AmE differences; both varieties use this structure in informal
    speech.
discourse_notes:
- note: This structure is used exclusively in spoken discourse for clarification and
    emphasis. It is not found in written English except in dialogue or informal messaging.
