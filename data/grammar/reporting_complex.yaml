grammar_point: reporting_complex
title: Complex Reporting Structures (It is widely believed that...)
description: Advanced passive reporting structures used in formal, academic, and journalistic
  English to report information while distancing the writer from the claim.
level: C1
meaning:
  core_meaning: Complex reporting structures allow speakers and writers to report
    beliefs, opinions, and information without stating who holds them, creating an
    impression of objectivity or general consensus.
  timeline: The tense of the reporting verb indicates when the reporting occurred;
    the tense in the that-clause or infinitive reflects the time of the reported event.
  contrast: 'Direct reporting: Scientists believe that the climate is changing. Complex
    passive: It is believed that the climate is changing. Or: Scientists are believed
    to have predicted this.'
  ccqs:
  - question: Does the speaker necessarily agree with the reported information?
    answer: No, the speaker distances themselves and does not take responsibility
      for the claim.
  - question: Is this structure more common in formal or informal English?
    answer: Formal — especially in journalism, academic writing, and official reports.
  - question: Can we use this structure with any reporting verb?
    answer: No, only certain verbs work such as say, believe, think, consider, know,
      report, allege, expect, understand, and claim.
  example_generator:
    contexts:
    - news reporting
    - academic writing
    - official statements
    - legal documents
    cultural_notes:
    - This structure is extremely common in BBC news and quality newspapers
    - It can be used to present opinions as facts, so critical readers should be cautious
    min_examples: 5
form:
  affirmative:
    structure: 'It + passive reporting verb + that + clause. For example: It is believed
      that... / It has been reported that... / It was announced that...'
    example_generator:
      contexts:
      - news headlines
      - academic introductions
      - official announcements
      min_examples: 4
  negative:
    structure: 'It + passive reporting verb + not + that + clause. For example: It
      is not believed that... / Subject + passive reporting verb + not + to-infinitive.
      For example: He is not considered to be...'
    example_generator:
      contexts:
      - refuting claims
      - expressing doubt
      - legal denials
      min_examples: 3
  questions:
    structure: 'Is/Was it + past participle + that...? For example: Is it believed
      that...? / Is/Was + subject + past participle + to-infinitive? For example:
      Is he known to have...?'
    example_generator:
      contexts:
      - journalistic enquiry
      - academic questioning
      - legal cross-examination
      min_examples: 3
sub_rules:
- rule: It + passive reporting verb + that-clause — the most common pattern for impersonal
    reporting.
  type: grammatical
  examples:
  - It is widely believed that artificial intelligence will transform the workplace.
  - It has been reported that the company is facing financial difficulties.
  - It was announced that the prime minister would resign.
  - It is thought that the ancient city was destroyed by an earthquake.
- rule: Subject + passive reporting verb + to-infinitive — used when the subject of
    the reporting is specified.
  type: grammatical
  examples:
  - She is said to be the best surgeon in the country.
  - He was believed to have fled the country.
  - They are known to have donated millions to charity.
  - The building is considered to be unsafe.
- rule: Perfect infinitive (to have + past participle) is used when the reported event
    happened before the reporting.
  type: grammatical
  examples:
  - She is thought to have left the country last week.
  - He was reported to have been involved in the scandal.
  - The painting is believed to have been stolen in the 1970s.
- rule: Continuous infinitive (to be + -ing) is used when the reported event is ongoing.
  type: grammatical
  examples:
  - He is said to be working on a new novel.
  - They are believed to be living abroad.
  - The company is thought to be considering a merger.
- rule: 'Common reporting verbs used in this structure: say, believe, think, consider,
    know, report, allege, claim, expect, understand, estimate, assume, suppose.'
  type: lexical
  examples:
  - It is estimated that over a million people attended the march.
  - He was alleged to have accepted bribes.
  - The project is expected to be completed by June.
- rule: 'The structure can be used with seem and appear in a similar pattern: It seems/appears
    that... / Subject + seems/appears + to-infinitive.'
  type: grammatical
  examples:
  - It seems that the meeting has been cancelled.
  - She appears to have changed her mind.
  - It appears that no one was injured in the accident.
use:
- context: Journalism and news reporting
  description: Complex reporting is the backbone of news writing, allowing journalists
    to report claims without endorsing them.
  examples:
  - It is understood that the two sides are close to reaching an agreement.
  - It has been claimed that the evidence was fabricated.
  - The president is said to be considering a cabinet reshuffle.
- context: Academic writing
  description: Scholars use these structures to report findings and theories while
    maintaining an objective tone.
  examples:
  - It has been argued that social media has a negative impact on mental health.
  - This theory is widely considered to be outdated.
  - The results are believed to be statistically significant.
- context: Legal and official contexts
  description: Legal documents use these structures to report allegations and findings
    without prejudice.
  examples:
  - The defendant is alleged to have committed the offence on the night of 14 June.
  - It was reported that the suspect had been seen near the scene.
  - The building is known to contain asbestos.
- context: Everyday formal conversation
  description: Even in conversation, these structures appear when discussing rumours
    or second-hand information.
  examples:
  - He is supposed to be incredibly rich.
  - She is said to speak five languages.
  - It is thought that they are moving to Canada.
phonetics:
- note: In the 'It + passive + that' pattern, the reporting verb is typically unstressed,
    with the main stress falling on the that-clause content.
  example_generator:
    contexts:
    - news broadcasts
    - formal presentations
  l1_issue: Learners may over-stress the passive verb, making the sentence sound unnatural.
- note: In the 'subject + passive + to-infinitive' pattern, the auxiliary is or was
    is often reduced in connected speech.
  example_generator:
    contexts:
    - spoken English
    - interviews
  l1_issue: Learners may produce the full form where native speakers would use the
    weak form.
teaching:
  methodology: Guided discovery
  tips:
  - Start by showing authentic news headlines and asking students to identify the
    reporting pattern.
  - Contrast direct speech with complex reporting to show the distancing effect.
  - 'Drill the most common verbs first: say, believe, think, consider, know, report.'
  - 'Use a tense-matching exercise: present reporting with to-infinitive; past reporting
    with to have + past participle.'
  - Warn students that overuse in IELTS essays can sound unnatural — it should be
    used sparingly and appropriately.
  recommended_activities:
  - name: Headline Rewrite
    duration: 15
    adaptation_notes: Students rewrite direct quotes from news articles using complex
      reporting structures.
  - name: Tense Transformation
    duration: 10
    adaptation_notes: Given a sentence in present reporting, students transform it
      to past reporting with perfect infinitive.
  - name: Source Detective
    duration: 15
    adaptation_notes: Students read a news article and identify all complex reporting
      structures, then discuss why the journalist chose this pattern.
  - name: Academic Paragraph Writing
    duration: 20
    adaptation_notes: Students write a short academic paragraph about a topic, using
      at least three different complex reporting structures.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
