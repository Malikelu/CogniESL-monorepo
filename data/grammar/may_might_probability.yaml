grammar_point: may_might_probability
title: May and Might (Probability)
description: Modal verbs used to express possibility or probability.
level: B1
meaning:
  core_meaning: Express probability or possibility. May suggests higher likelihood
    than might. This grammar point is essential for expressing may might probability
    in English. Learners at this level need to understand both the form and the appropriate
    contexts for use. Common errors include confusion with related structures and
    inappropriate register use.
  timeline: Present and future possibilities.
  contrast: May = more likely. Might = less likely. Could = general possibility.
  ccqs:
  - question: Is may stronger or weaker than might?
    answer: May is stronger.
    purpose: Tests whether the learner understands that 'may' and 'might' express
      possibility, with 'might' suggesting slightly less certainty.
  - question: '[Add specific question for CCQ 2]'
    answer: '[Add specific answer for CCQ 2]'
    purpose: Tests whether the learner can distinguish 'may/might' (possibility) from
      'can' (ability/permission) and 'must' (strong probability).
  - question: '[Add specific question for CCQ 3]'
    answer: '[Add specific answer for CCQ 3]'
    purpose: 'Tests whether the learner understands that ''may'' is used for formal
      permission: ''May I ask a question?'' (not *''Can I ask a question?'' in formal
      contexts).'
  - question: '[Add specific question for CCQ 4]'
    answer: '[Add specific answer for CCQ 4]'
    purpose: 'Tests whether the learner can use ''may/might have + past participle''
      for past possibility: ''She may have forgotten.'''
  example_generator:
    contexts:
    - weather predictions
    - future plans
    cultural_notes:
    - May is more common in British English for requests
    min_examples: 5
form:
  affirmative:
    structure: Subject + may + base verb / Subject + might + base verb / Subject +
      could + base verb
    example_generator:
    - It may rain tomorrow.
    - She might get the job.
    min_examples: 4
  negative:
    structure: Subject + may not + base verb / Subject + might not + base verb
    example_generator:
    - It may not rain today.
    - She might not come.
    min_examples: 4
  questions:
    structure: Do you think it may rain
    example_generator:
    - Do you think it may rain
    min_examples: 3
sub_rules:
- rule: 'May and might: same structure, different probability'
  type: semantic
  examples:
  - It may rain (50 percent plus)
  - It might rain (under 50 percent)
- rule: Could expresses general probability
  type: semantic
  examples:
  - It could rain
- rule: May for formal permission
  type: pragmatic
  examples:
  - May I use your phone
use:
- context: Future probability
  examples:
  - I may travel next year
  - She might get the job
- context: Present probability
  examples:
  - He may be at home
- context: Polite requests
  examples:
  - May I use your phone
phonetics:
  note: May is /meɪ/. Might is /maɪt/.
  example_generator:
    contexts:
    - modal pronunciation
  l1_issue: Portuguese and Spanish speakers often use maybe where English requires
    may or might.
teaching:
  methodology: PPP with probability scales
  tips:
  - 'Week 1: May and might for future probability.'
  - 'Week 2: Present probability.'
  - 'Week 3: May for formal requests.'
  recommended_activities:
  - name: Probability Scale
    duration: 10
    adaptation_notes: Students place modals on a scale.
  - name: Weather Predictions
    duration: 15
    adaptation_notes: Students make predictions using may and might.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 9:
    Modals, §9.2 (possibility and probability)'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 3: The Verb, §3.9 (epistemic modality)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 136-139 (may/might:
    possibility, permission)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    9: Modals, §9.2 (possibility)'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 8: May and might'
common_errors:
- error: '*It may rain tomorrow.* (less likely than might)'
  correction: It might rain tomorrow. / It may rain tomorrow.
  explanation: '''May'' suggests higher probability than ''might''. ''It might rain''
    = less certain. ''It may rain'' = more possible. Both are correct but express
    different degrees of certainty.'
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: 'In academic writing, ''may'' and ''might'' are essential hedging devices:
    ''These findings may have important implications.'''
- note: 'In conversation, ''might'' is more common than ''may'' for possibility: ''It
    might rain later.'''
- note: 'In formal requests, ''may'' is the standard permission modal: ''May I ask
    a question?'''
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: 'In academic writing, ''may'' and ''might'' are essential hedging devices:
    ''These findings may have important implications.'' ''This could potentially lead
    to...'''
- note: 'In conversation, ''might'' is more common than ''may'' for possibility: ''It
    might rain later.'''
- note: 'In formal requests, ''may'' is the standard permission modal: ''May I ask
    a question?'''
