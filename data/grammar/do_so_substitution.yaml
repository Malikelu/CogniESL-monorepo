grammar_point: do_so_substitution
title: Do so / So / Not (Substitution)
description: Using do so, so, and not to substitute for previously mentioned phrases,
  avoiding repetition in formal and informal English.
level: C1
meaning:
  core_meaning: Substitution with do so, so, and not allows speakers to refer back
    to previously mentioned actions, ideas, or clauses without repeating them. This
    creates more concise, natural-sounding discourse.
  timeline: Varies — the tense is carried by the auxiliary verb in the substitution.
  contrast: Without substitution = She asked me to leave and I left. With substitution
    = She asked me to leave and I did so. / She asked me to leave and so I did.
  ccqs:
  - question: Does do so replace a verb phrase that was mentioned earlier?
    answer: Yes, it substitutes for the entire verb phrase.
  - question: Does so in 'so I did' replace a that-clause?
    answer: Yes, so substitutes for the content of the that-clause.
  example_generator:
    contexts:
    - formal writing
    - academic discussion
    - legal language
    - everyday conversation
    cultural_notes:
    - The phrase do so is more formal than simply repeating the verb
    - So and not in response clauses are very common in spoken English
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + auxiliary + do so: She said she would finish the report
      and she did so. / So + auxiliary + subject: She was tired, and so was he.'
    example_generator:
      contexts:
      - formal reports
      - agreeing with statements
      - confirming actions
      min_examples: 4
  negative:
    structure: 'Subject + auxiliary + not do so: He promised to come but did not do
      so. / Not + auxiliary + subject: She was not happy, and neither was he.'
    example_generator:
      contexts:
      - disagreeing
      - reporting failures
      - negative agreement
      min_examples: 3
  questions:
    structure: 'Auxiliary + subject + do so?: Did she do so? / So + auxiliary + subject?:
      Was she angry, and so was he?'
    example_generator:
      contexts:
      - confirming
      - checking understanding
      min_examples: 3
sub_rules:
- rule: 'Do so substitutes for a verb phrase (action): She asked him to apologise,
    and he did so immediately.'
  type: grammatical
  examples:
  - The company promised to compensate customers and has now done so.
  - He was told to leave, and he did so without argument.
  - She asked me to review the document, and I did so last night.
- rule: 'So substitutes for a that-clause after verbs of thinking, saying, and hoping:
    I think so, I hope so, I believe so, I imagine so'
  type: grammatical
  examples:
  - Will she come? I think so.
  - Is it true? I believe so.
  - Will they win? I hope so.
- rule: 'So + auxiliary + subject expresses agreement with a positive statement: I
    was delighted, and so was she.'
  type: grammatical
  examples:
  - He can speak French, and so can his sister.
  - I have finished the report, and so has everyone else.
  - She loves jazz, and so do I.
- rule: 'Neither/Nor + auxiliary + subject expresses agreement with a negative statement:
    I was not impressed, and neither was he.'
  type: grammatical
  examples:
  - She cannot drive, nor can her husband.
  - I have not been to Japan, and neither has my brother.
  - He does not like spicy food, and neither do I.
- rule: 'Not substitutes for a negative that-clause: I hope not, I think not, I am
    afraid not'
  type: grammatical
  examples:
  - Will it rain? I hope not.
  - Is she coming? I think not.
  - Can you help? I am afraid not.
- rule: 'So at the beginning of a sentence (formal/literary): So it proved. So it
    would seem.'
  type: grammatical
  examples:
  - The plan was risky. So it proved.
  - He was, so it would seem, the only survivor.
use:
- context: Formal and legal writing
  description: Do so is widely used in legal and official documents to refer back
    to obligations and actions.
  examples:
  - The tenant is required to pay rent on time. Failure to do so may result in eviction.
  - The applicant must submit all documents by the deadline. Those who do so will
    be considered.
- context: Everyday conversation
  description: So and not in responses are extremely common in casual speech.
  examples:
  - Are you coming tonight? I think so.
  - Did he pass the exam? I hope so.
  - Can she speak German? I believe so.
- context: Expressing agreement
  description: So + auxiliary + subject and neither + auxiliary + subject are standard
    patterns for agreeing.
  examples:
  - I love Italian food. So do I.
  - She was not happy about it. Neither was I.
- context: Academic and professional writing
  description: Do so allows writers to refer back to complex actions without repetition.
  examples:
  - The participants were asked to complete a questionnaire. Those who did so were
    included in the analysis.
  - The government pledged to reduce emissions. Whether it will do so remains to be
    seen.
phonetics:
- note: Do so in speech is often reduced, with so carrying light stress.
  example_generator:
    contexts:
    - formal speech
    - presentations
  l1_issue: Learners may repeat the full verb phrase instead of using substitution,
    sounding unnatural.
- note: So and not in responses are typically unstressed and produced quickly.
  example_generator:
    contexts:
    - casual conversation
    - quick responses
  l1_issue: Speakers from languages without equivalent substitution patterns may find
    these structures unfamiliar.
teaching:
  methodology: PPP
  tips:
  - Introduce substitution as a natural way to avoid repetition — compare repetitive
    and substituted versions.
  - Teach do so for verb phrases and so/not for that-clauses as two separate substitution
    types.
  - Practice agreement patterns (so do I, neither do I) as a separate but related
    skill.
  - Use gap-fill exercises where students must choose between repeating and substituting.
  recommended_activities:
  - name: Substitution Race
    duration: 10
    adaptation_notes: Students rewrite repetitive sentences using do so, so, and not
      as quickly as possible.
  - name: Response Drill
    duration: 10
    adaptation_notes: Teacher makes statements; students respond with so do I, neither
      can she, I think so, etc.
  - name: Legal Language Analysis
    duration: 15
    adaptation_notes: Students identify and explain do so substitutions in authentic
      legal or official texts.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for do_so_substitution.
  correction: Correct form.
  explanation: This is a common error for do_so_substitution.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
