grammar_point: ed_clauses
title: -ed Clauses (Past Participle Clauses)
description: Clauses using past participle forms to show passive voice or completed
  states. Essential for concise formal writing.
level: B2
meaning:
  core_meaning: Shows passive voice (something done to the subject) or a completed
    state/condition.
  timeline: 'Often implies completed action before main verb: ''Built in 1990, the
    house...'' (built first, then house exists).'
  contrast: '''-ed'' = passive (something done TO the subject)

    ''-ing'' = active (subject does the action)

    ''-ed clause'' = reduced passive clause

    ''-ed adjective'' = state (not action)

    '
  ccqs:
  - question: '''Built in 1900, the house is old.'' Who built the house?'
    answer: We don't know — the house was built (passive) in 1900. The -ed clause
      describes the house.
    purpose: Tests whether the learner understands that past participle (-ed) clauses
      at the beginning of a sentence are reduced passive relative clauses. 'Built
      in 1900' = 'which was built in 1900.' This is common in formal and academic
      writing.
  - question: '''Exhausted by the race, he collapsed.'' Was he tired or energetic?'
    answer: Exhausted (very tired). The -ed clause tells us why he collapsed.
    purpose: Tests whether the learner understands that past participle clauses can
      express cause/reason. 'Exhausted by the race' = 'Because he was exhausted by
      the race.' The -ed clause gives the reason for the main clause event.
  - question: '''I am interested in art.'' Am I causing interest or feeling it?'
    answer: Feeling it — 'interested' describes your feeling.
    purpose: Tests whether the learner understands the '-ed/-ing' adjective distinction.
      '-ed' adjectives (interested, exhausted, bored) describe how someone feels.
      '-ing' adjectives (interesting, exhausting, boring) describe what causes the
      feeling. This distinction affects adjective choice with -ed clauses.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: '-ed at sentence start: "Built in 1990, the house is old." (The house
      was built...)

      -ed after noun: "The house built in 1990 is old." (which was built...)

      -ed as adjective: "I''m interested in art."

      '
    example_generator:
      contexts:
      - work and professional life
      - entertainment and media
      min_examples: 4
  negative:
    structure: Not typically negated (use 'not + -ed' rarely).
    example_generator:
      contexts:
      - social interactions
      min_examples: 4
  questions:
    structure: Questions not common with -ed clauses.
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
sub_rules:
- rule: Ed clauses (reduced relative clauses) use a past participle to modify a noun.
    They are equivalent to passive relative clauses
  type: grammatical
  examples:
  - The book written by Chomsky (which was written by Chomsky)
  - The man injured in the accident (who was injured)
  - The money stolen from the bank (which was stolen)
- rule: Ed clauses can also express a state resulting from a past action
  type: grammatical
  examples:
  - The broken window (the window that was broken)
  - The excited children (the children who were excited)
  - The closed door (the door that was closed)
- rule: 'Position: ed clauses go immediately after the noun they modify'
  type: word_order
  examples:
  - The letter posted yesterday arrived today
  - The students selected for the team were excited
use:
- name: Reduced Passive Clauses
  description: Replace 'which/who + be + -ed' with just -ed.
  examples:
  - The car driven by Tom (which was driven by Tom)...
  key_point: Subject of main clause = thing that -ed was done TO.
- name: Fronted -ed Clauses
  description: -ed clause at sentence start for cause/reason.
  examples:
  - Exhausted by the race, he collapsed.
  - Built in 1900, the house has history.
  key_point: Shows reason or background information.
- name: -ed as Adjective
  description: Words like 'interested', 'bored', 'tired' as states.
  examples:
  - I'm interested.
  - He's bored.
  - We're tired.
  key_point: These describe permanent or temporary states.
phonetics:
- note: 'In ed clauses, the past participle is usually stressed: ''The book WRITTEN
    by Chomsky.'''
  example_generator:
    contexts:
    - ed clause stress
  l1_issue: Learners may not stress the past participle sufficiently, making the sentence
    structure unclear.
teaching:
  methodology: 'Use a consciousness-raising approach: present full relative clauses
    alongside their reduced -ed forms and guide students to discover the reduction
    rule. Start with recognition tasks (identifying -ed clauses in texts), then move
    to controlled production (sentence combining), and finally free writing (describing
    pictures or experiences). Use physical gestures to reinforce the passive meaning
    (done TO vs done BY).'
  tips:
  - 'Use ''done TO'' gesture: point to self for -ed (something done to me).'
  - 'Practice minimal pairs: ''I''m boring'' (I bore others) vs ''I''m bored'' (others
    bore me).'
  - 'Show reduction: ''which was built'' → ''built''.'
  recommended_activities:
  - name: Expand the Clause
    duration: 15
    adaptation_notes: Give students ed clauses. They expand them into full relative
      clauses.
  - name: Reduce the Clause
    duration: 15
    adaptation_notes: Give students full relative clauses. They reduce them to ed
      clauses.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 8:
    Passive Voice, §8.1-8.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I was boring at the meeting.*'
  correction: I was bored at the meeting.
  explanation: -ed for feelings, -ing for cause.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, relative clauses are essential for precision and are a
    marker of proficient writing.
- note: In conversation, defining relative clauses are more common than non-defining.
- note: In academic writing, both defining and non-defining relative clauses are used
    extensively.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used for everyday communication and is
    among the most frequent patterns in spoken English.
- note: In academic writing, this structure appears in discussions of established
    knowledge, methodology, and findings.
- note: In news reports, this structure is used for reporting events and attributing
    statements.
