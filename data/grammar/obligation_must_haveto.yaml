grammar_point: obligation_must_haveto
title: 'Obligation: Must and Have to'
description: Expressing obligation, necessity, and rules using must and have to, and
  understanding the difference between internal and external obligation.
level: A2
meaning:
  core_meaning: '"Must" and "have to" both express obligation or necessity — something
    that is required or compulsory. "Must" often suggests the speaker''s personal
    authority or feelings, while "have to" suggests an external rule, law, or someone
    else''s authority. Both are used when there is no choice about doing something.'
  timeline: '"Must" and "have to" express present or future obligation: "I must finish
    this today." / "I have to finish this today." For past obligation, "had to" is
    used: "I had to work yesterday." "Must" has no past form.'
  contrast: 'Must (internal obligation): \"I must call my mother.\" (I feel it is
    important; my own decision.)

    Have to (external obligation): "I have to wear a uniform at work." (The rule comes
    from outside; the company requires it.)

    Must not (prohibition): "You must not smoke here." (It is forbidden.)

    Don''t have to (no obligation): "You don''t have to wear a tie." (It is optional;
    no one is forcing you.)

    '
  ccqs:
  - question: If I say 'I must study tonight,' who decided — me or someone else?
    answer: You decided. "Must" often shows the speaker's own feeling of obligation.
    purpose: 'Tests whether the learner can distinguish between three levels of obligation:
      must (strong/personal), have to (external/rule), should (advice/recommendation).'
  - question: If I say 'I have to study tonight,' who decided — me or someone else?
    answer: Probably someone else — a teacher, a parent, or a rule. "Have to" often
      shows external obligation.
    purpose: Tests understanding of obligation_must_haveto.
  - question: What is the difference between 'must not' and 'don't have to'?
    answer: '"Must not" means it is prohibited (you are not allowed). "Don''t have
      to" means it is not necessary (you can if you want, but it is not required).'
    purpose: Tests understanding of obligation_must_haveto.
  - question: Can we use 'must' to talk about the past?
    answer: 'No. "Must" has no past form. For the past, use "had to": "I had to leave
      early yesterday."'
    purpose: Tests understanding of obligation_must_haveto.
  example_generator:
    contexts:
    - everyday situations
    - workplace rules
    - school requirements
    - laws and regulations
    - health advice
    cultural_notes:
    - In British English, "have to" is much more common in everyday speech than "must."
      "Must" can sound quite formal or strong. In American English, "have to" is also
      preferred in casual conversation.
    - Learners from languages with no equivalent distinction may overuse "must" because
      it is taught first. Emphasise that "have to" is the safer, more neutral choice
      for general obligations.
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + must/have to + base verb: "I must go." / "She has to work."
      / "They have to study." Note: "must" does not change form (no -s for third person).
      "Have to" conjugates: I/you/we/they HAVE to; he/she HAS to.'
    example_generator:
      contexts:
      - rules and laws
      - work obligations
      - health advice
      - school requirements
      min_examples: 4
  negative:
    structure: 'Must not: Subject + must not (mustn''t) + base verb — expresses prohibition:
      "You must not park here." Don''t have to: Subject + don''t/doesn''t have to
      + base verb — expresses lack of obligation: "You don''t have to pay now."'
    example_generator:
      contexts:
      - prohibitions
      - optional situations
      - exemptions from rules
      min_examples: 3
  questions:
    structure: 'Must: Must + subject + base verb? "Must I wear a tie?" Have to: Do/Does
      + subject + have to + base verb? "Do I have to wear a tie?" / "Does she have
      to work on Saturday?"'
    example_generator:
      contexts:
      - asking about rules
      - checking obligations
      - clarifying requirements
      min_examples: 3
sub_rules:
- rule: Must — internal obligation or strong recommendation
  type: grammatical
  examples:
  - I must remember to call her. (I feel it is important.)
  - You must see that film — it is brilliant! (Strong recommendation.)
  - We must be quiet in the library. (I feel this is necessary.)
- rule: Have to — external obligation from rules, laws, or other people
  type: grammatical
  examples:
  - I have to wear a seatbelt. (The law requires it.)
  - She has to finish the report by Friday. (Her boss requires it.)
  - Students have to pass the exam to graduate. (The school requires it.)
- rule: Must not (mustn't) — prohibition; something is forbidden
  type: grammatical
  examples:
  - You must not use your phone during the exam.
  - Visitors must not feed the animals.
  - You mustn't tell anyone — it is a secret.
- rule: Don't have to — no obligation; it is optional
  type: grammatical
  examples:
  - You don't have to bring food — lunch is provided.
  - She doesn't have to work on Sundays.
  - We don't have to decide today.
- rule: Past obligation — had to (no past form of must)
  type: grammatical
  examples:
  - I had to walk to school when I was young.
  - She had to apologise to the teacher.
  - They had to sell their house.
- rule: Future obligation — will have to
  type: grammatical
  examples:
  - You will have to show your passport.
  - We will have to leave early tomorrow.
  - She will have to retake the exam.
use:
- context: Rules and laws
  description: Used to express legal requirements and official rules.
  examples:
  - You must stop at a red light.
  - Passengers have to fasten their seatbelts.
  - You must not drive without a licence.
- context: Work and school
  description: Used to describe requirements and expectations in professional and
    educational settings.
  examples:
  - Employees have to attend the training session.
  - You must submit your assignment by Friday.
  - Staff must wear ID badges at all times.
- context: Health and advice
  description: Used to give strong advice, especially about health.
  examples:
  - You must see a doctor if the pain continues.
  - I have to take this medicine three times a day.
  - You must not skip meals.
- context: Everyday obligations
  description: Used to talk about daily routines and personal responsibilities.
  examples:
  - I have to pick up the children at 3 p.m.
  - We must buy groceries on the way home.
  - She has to walk the dog every morning.
phonetics:
- note: '"Must" is pronounced /mʌst/ in its strong form but is often reduced to /məs/
    in connected speech: "I must go" /aɪ məs ɡəʊ/. "Mustn''t" is pronounced /ˈmʌsənt/.'
  example_generator:
    contexts:
    - connected speech
    - weak forms
  l1_issue: Learners may pronounce every word with full stress, making speech sound
    unnatural. Drill the reduced form /məs/ in natural sentences.
- note: '"Have to" in connected speech is pronounced /ˈhæf tə/ (not /hæv tuː/). The
    /v/ becomes /f/ because the following /t/ is voiceless. "Has to" is pronounced
    /ˈhæs tə/.'
  example_generator:
    contexts:
    - connected speech
    - assimilation
  l1_issue: Learners often say /hæv tuː/ clearly, which sounds overly careful. Teach
    the natural pronunciation /hæf tə/ early.
teaching:
  methodology: PPP
  tips:
  - 'Start with a context: show pictures of signs (no smoking, wear a seatbelt, etc.)
    and elicit the rules. This makes the meaning clear before introducing the form.'
  - 'Use a simple diagram: MUST = my decision / strong feeling vs. HAVE TO = someone
    else''s rule / law. This helps learners understand the nuance.'
  - Drill the pronunciation of "have to" as /hæf tə/ from the beginning. It is one
    of the most common pronunciation errors at this level.
  - Contrast "mustn't" (prohibition) with "don't have to" (no obligation) explicitly.
    These are commonly confused.
  - 'Provide plenty of personalisation: "What do you have to do at work/school?" /
    "What must you do this week?"'
  recommended_activities:
  - name: Signs and rules
    duration: 15
    adaptation_notes: Show 8-10 signs (no entry, wear a helmet, silence please, etc.).
      Students must/have to sentences to describe each sign. Pair work, then class
      feedback.
  - name: Obligation questionnaire
    duration: 20
    adaptation_notes: 'Students interview each other: "Do you have to wear a uniform?"
      / "What must you do to keep healthy?" Students report back: "Maria has to wear
      a uniform, but I don''t."'
  - name: Mustn't vs don't have to
    duration: 15
    adaptation_notes: Give students 10 sentences. They decide if each means "it is
      forbidden" (mustn't) or "it is not necessary" (don't have to). Discuss in pairs,
      then check as a class.
  - name: My obligations
    duration: 15
    adaptation_notes: Students write 5 sentences about their own obligations using
      must and have to, and 2 things they don't have to do. Share with a partner.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 9:
    Modals, §9.1-9.6'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I must to study every day.*'
  correction: I must study every day. / I have to study every day.
  explanation: Modal 'must' is followed by the base verb (no 'to'). 'Have to' requires
    'to'. This is a very common structural error.
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: 'In formal writing, modals express hedging and caution: ''These results may
    suggest...'''
- note: 'In conversation, modals are essential for politeness: ''Could you pass the
    salt?'''
- note: 'In legal language, ''must'' expresses strong obligation: ''All passengers
    must wear seatbelts.'''
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, modals are essential for politeness, expressing degrees of
    certainty, and making requests.
- note: 'In academic writing, modals express hedging and caution: ''These results
    may suggest...'' ''It could be argued that...'''
- note: 'In legal and regulatory language, modals express obligation and permission:
    ''All passengers must wear seatbelts.'''
