grammar_point: expanded_prepositions
title: Expanded Prepositions
description: 'Multi-word prepositions: in addition to, with regard to, on behalf of,
  in spite of, due to, owing to.'
level: C1
meaning:
  core_meaning: Fixed multi-word units that function as single prepositions with idiomatic
    meanings that cannot be deduced from the individual words.
  timeline: Timeless — used across all tenses.
  contrast: Simple = on the table vs Expanded = in front of the television vs In spite
    of the rain, we went for a walk.
  ccqs:
  - question: Does this expression function as a single preposition?
    answer: Yes, the words together act as one prepositional unit.
  - question: Can you change any of the words in the middle without changing the meaning?
    answer: No, the expression is fixed.
  example_generator:
    contexts:
    - formal writing
    - academic essays
    - business correspondence
    - legal documents
    cultural_notes:
    - More common in formal British English than casual American English
    - Avoid overusing in spoken conversation
    min_examples: 5
form:
  affirmative:
    structure: Expanded preposition + noun phrase
    example_generator:
      contexts:
      - formal letters
      - academic writing
      - business reports
      min_examples: 4
  negative:
    structure: Expanded preposition + negative phrase
    example_generator:
      contexts:
      - formal contexts
      min_examples: 3
  questions:
    structure: 'Can appear in questions: In terms of cost, is this feasible?'
    example_generator:
      contexts:
      - formal discussions
      min_examples: 3
sub_rules:
- rule: Two-word expanded prepositions
  type: grammatical
  examples:
  - according to the report
  - because of the delay
  - instead of waiting
  - prior to the meeting
- rule: Three-word expanded prepositions
  type: grammatical
  examples:
  - in addition to the main course
  - with regard to your complaint
  - on behalf of the team
  - in front of the building
- rule: Expanded prepositions followed by gerunds
  type: grammatical
  examples:
  - Instead of complaining, try to help.
  - In addition to teaching, she writes textbooks.
use:
- context: Formal writing and academic discourse
  description: Preferred in formal registers where precision and tone matter
  examples:
  - In accordance with the regulations, all participants must register.
  - With respect to your proposal, we have several concerns.
phonetics:
- note: Stress typically falls on the content word within the expanded preposition
  example_generator:
    contexts:
    - formal speech
  l1_issue: Speakers of syllable-timed languages may give equal stress to all words
    in the expression
teaching:
  methodology: Guided discovery with contrastive analysis
  tips:
  - Teach as fixed chunks — students should memorize them as single units
  - Contrast with simple prepositions to show register difference
  - Provide a reference list organized by function
  recommended_activities:
  - name: Register transformation
    duration: 15
    adaptation_notes: Students rewrite informal sentences using expanded prepositions
      for a formal register.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
