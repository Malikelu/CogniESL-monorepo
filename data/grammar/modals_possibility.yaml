grammar_point: modals_possibility
title: Modals of Possibility (may/might/could for present/future)
description: Uses may, might, and could to express that something is possible in the
  present or future, but not certain.
level: B1
meaning:
  core_meaning: Expresses uncertainty about the present or future. The speaker believes
    something is possible but not sure.
  timeline: Present or future. The speaker is guessing about now or later.
  contrast: '''may'' = "She may be at home." (50% sure, neutral)

    ''might'' = "She might be at home." (30-40% sure, less certain)

    ''could'' = "She could be at home." (possible, open option)

    ''will'' = "She will be at home." (certain)

    '
  ccqs:
  - question: Which modal expresses the highest probability
    answer: Will expresses certainty. May expresses high possibility. Might expresses
      low possibility.
    purpose: Tests whether the learner understands a key concept of modals_possibility.
      This is fundamental for correct use of this grammar point.
  - question: Is could stronger or weaker than might
    answer: They are similar but could is more general while might suggests lower
      probability.
    purpose: Tests whether the learner understands a key concept of modals_possibility.
      This is fundamental for correct use of this grammar point.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      modals possibility and explain why they are incorrect.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + may/might/could + V1 (base form): "It may rain." "She might
      come." "He could be right."

      Note: ''may not'' and ''might not'' express negative possibility. ''Could''
      in possibility is affirmative only.

      '
    example_generator:
      contexts:
      - education and school
      - entertainment and media
      - weather and nature
      - social interactions
      min_examples: 4
  negative:
    structure: 'Subject + may not / might not + V1: ''It may not work.'' ''She might
      not agree.'''
    example_generator:
      contexts:
      - weather and nature
      min_examples: 4
  questions:
    structure: '''May'' is rarely used in questions for possibility.

      ''Might'' in questions is formal: "Might she be lying?"

      ''Could'' is common in questions: "Could he be at home?" "Could this be correct?"

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: May expresses moderate possibility (about 50% chance)
  type: semantic
  examples:
  - It may rain tomorrow (50% chance)
  - She may get the job (possible)
  - He may be at home (perhaps)
- rule: Might expresses weak possibility (under 50% chance)
  type: semantic
  examples:
  - It might rain (less likely than may)
  - She might come (I doubt it)
  - He might have left (perhaps)
- rule: Could expresses general possibility without specifying likelihood
  type: semantic
  examples:
  - It could rain (it is possible)
  - Anyone could make that mistake (general possibility)
  - She could be right (it is possible)
use:
- name: Present Possibility
  description: Guessing about a current situation when you don't have full information.
  examples:
  - He might be sleeping right now.
  - She may not know about the meeting.
  - They could be lost.
  key_point: Use when you're not sure about what's happening now.
- name: Future Possibility
  description: Talking about something that is possible but not guaranteed in the
    future.
  examples:
  - It may rain this afternoon.
  - We might go to the beach this weekend.
  - She could get the promotion.
  key_point: Use for plans that are not confirmed or predictions without strong evidence.
- name: Polite Suggestions
  description: Using 'might' or 'could' to suggest something without being direct.
  examples:
  - You might want to check that again.
  - We could try the new restaurant.
  - He might consider studying more.
  key_point: Softer and more polite than 'should' or 'must'.
phonetics:
- note: May is pronounced /meɪ/, might is /maɪt/, and could is /kʊd/. In connected
    speech, could is often reduced to /kəd/.
  example_generator:
    contexts:
    - modal pronunciation
  l1_issue: Learners may confuse may and might by not distinguishing the vowel sounds
    clearly.
teaching:
  methodology: PPP
  tips:
  - 'Use a probability line: certain (will) → probable (should) → possible (may/might/could)
    → impossible (can''t).'
  - 'Practice with weather forecasts: ''It might rain.'' ''It may be sunny.'' ''It
    could snow.'''
  - 'Role-play guessing games: ''Where is John?'' ''He might be at the gym.'' ''He
    could be at home.'''
  recommended_activities:
  - name: Probability Scale
    duration: 10
    adaptation_notes: 'Students place modals on a probability scale: could (30%),
      might (40%), may (50%), will (90%).'
  - name: Speculation Practice
    duration: 15
    adaptation_notes: 'Students speculate about situations using may, might, and could:
      ''Where is Maria?'' ''She may be at home. She might be at the gym.'''
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 9:
    Modals, §9.1-9.6'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*It will possibly rain.*'
  correction: It may rain. / It might rain.
  explanation: '''Will'' expresses certainty, not possibility. For possibility, use
    ''may'', ''might'', or ''could''. ''Possibly'' is an adverb, not a modal.'
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: 'In formal writing, modals express hedging and caution: ''These results may
    suggest...'''
- note: 'In conversation, modals are essential for politeness: ''Could you pass the
    salt?'''
- note: 'In legal language, ''must'' expresses strong obligation: ''All passengers
    must wear seatbelts.'''
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used for everyday communication and is
    among the most frequent patterns in spoken English.
- note: In academic writing, this structure appears in discussions of established
    knowledge, methodology, and findings.
- note: In news reports, this structure is used for reporting events and attributing
    statements.
