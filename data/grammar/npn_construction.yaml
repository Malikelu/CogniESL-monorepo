grammar_point: npn_construction
title: N-P-N Construction
description: 'Noun + Preposition + Noun constructions: a glass of water, a piece of
  advice, a cup of tea.'
level: B1
meaning:
  core_meaning: N-P-N constructions use a noun + preposition + noun to quantify or
    describe non-count nouns. The first noun is a unit or quantity, the preposition
    is usually 'of'.
  timeline: Timeless — describes quantities, not time.
  contrast: Direct = some water vs N-P-N = a glass of water (specific quantity)
  ccqs:
  - question: Is this a specific quantity of something?
    answer: Yes, it is an N-P-N construction.
  - question: What is the unit of measurement?
    answer: The first noun (glass, piece, cup, etc.).
  example_generator:
    contexts:
    - food and drink
    - measurements
    - quantities
    - everyday objects
    cultural_notes:
    - Different languages use different units — a piece of advice not a bit of advice
    - Some N-P-N are fixed expressions that must be memorized
    min_examples: 5
form:
  affirmative:
    structure: 'Unit noun + of + noun: a glass of water, a piece of advice, a cup
      of tea'
    example_generator:
      contexts:
      - food
      - drink
      - measurements
      min_examples: 4
  negative:
    structure: 'No/not any + noun: no water / not any advice'
    example_generator:
      contexts:
      - negation
      min_examples: 3
  questions:
    structure: 'How much/many + noun?: How much water do you want?'
    example_generator:
      contexts:
      - asking about quantity
      min_examples: 3
sub_rules:
- rule: Common N-P-N with 'of'
  type: lexical
  examples:
  - a glass of water
  - a piece of advice
  - a cup of tea
  - a slice of bread
  - a bottle of milk
- rule: Other prepositions in N-P-N
  type: lexical
  examples:
  - a bag of rice
  - a box of chocolates
  - a jar of jam
  - a can of soda
use:
- context: Food and drink
  description: Ordering or describing quantities
  examples:
  - Can I have a glass of water?
  - She gave me a piece of advice.
  - I would like a cup of tea.
phonetics:
- note: 'Stress on the unit noun: a GLASS of water'
  example_generator:
    contexts:
    - sentence stress
  l1_issue: Some L1 speakers use direct translation (a water instead of a glass of
    water)
teaching:
  methodology: PPP
  tips:
  - Teach as fixed expressions
  - Use real objects for demonstration
  - Practice with food and drink contexts
  recommended_activities:
  - name: Shopping List
    duration: 10
    adaptation_notes: Students create shopping lists using N-P-N constructions.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
