grammar_point: npn_construction
title: N-P-N Construction
description: 'Noun + Preposition + Noun constructions: a glass of water, a piece of
  advice, a cup of tea.'
level: B1
meaning:
  core_meaning: N-P-N constructions use a noun + preposition + noun to quantify or
    describe non-count nouns. The first noun is a unit or quantity, the preposition
    is usually 'of'.
  timeline: Timeless — describes quantities, not time.
  contrast: Direct = some water vs N-P-N = a glass of water (specific quantity)
  ccqs:
  - question: Is this an N-P-N construction?
    answer: Yes, it is an N-P-N construction.
    purpose: Tests whether the learner can identify N-P-N (noun-preposition-noun)
      constructions like 'a glass of water' or 'a piece of advice.' The first noun
      specifies the unit/quantity, and the preposition 'of' links it to the second
      noun.
  - question: What is the unit of measurement?
    answer: The first noun (glass, piece, cup, etc.).
    purpose: Tests whether the learner understands that in N-P-N constructions, the
      first noun functions as a unit of measurement or container. 'A glass of water'
      = the glass is the unit. Different nouns specify different units (a piece of,
      a cup of, a slice of).
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      npn construction and explain why they are incorrect.
  example_generator:
    contexts:
    - food and drink
    - measurements
    - quantities
    - everyday objects
    cultural_notes:
    - Different languages use different units — a piece of advice not a bit of advice
    - Some N-P-N are fixed expressions that must be memorized
    min_examples: 5
form:
  affirmative:
    structure: 'Unit noun + of + noun: a glass of water, a piece of advice, a cup
      of tea'
    example_generator:
      contexts:
      - food
      - drink
      - measurements
      min_examples: 4
  negative:
    structure: 'No/not any + noun: no water / not any advice'
    example_generator:
      contexts:
      - negation
      min_examples: 3
  questions:
    structure: 'How much/many + noun?: How much water do you want?'
    example_generator:
      contexts:
      - asking about quantity
      min_examples: 3
sub_rules:
- rule: Common N-P-N with 'of'
  type: lexical
  examples:
  - a glass of water
  - a piece of advice
  - a cup of tea
  - a slice of bread
  - a bottle of milk
- rule: Other prepositions in N-P-N
  type: lexical
  examples:
  - a bag of rice
  - a box of chocolates
  - a jar of jam
  - a can of soda
use:
- context: Food and drink
  description: Ordering or describing quantities
  examples:
  - Can I have a glass of water?
  - She gave me a piece of advice.
  - I would like a cup of tea.
phonetics:
- note: 'Stress on the unit noun: a GLASS of water'
  example_generator:
    contexts:
    - sentence stress
  l1_issue: Some L1 speakers use direct translation (a water instead of a glass of
    water)
teaching:
  methodology: PPP
  tips:
  - Teach as fixed expressions
  - Use real objects for demonstration
  - Practice with food and drink contexts
  recommended_activities:
  - name: Shopping List
    duration: 10
    adaptation_notes: Students create shopping lists using N-P-N constructions.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.6-12.13'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I need an advice.*'
  correction: I need some advice.
  explanation: Advice is uncountable.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
