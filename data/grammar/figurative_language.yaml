grammar_point: figurative_language
title: "Figurative Language"
description: "Non-literal language including metaphors, similes, personification, hyperbole, and other figures of speech that create vivid, expressive meaning."
level: C2

meaning:
  core_meaning: "Figurative language uses words and phrases in non-literal ways to create vivid imagery, emotional impact, and expressive depth. It goes beyond the dictionary meaning of words to convey complex ideas and feelings."
  timeline: "Timeless — figurative language describes qualities and relationships, not temporal events."
  contrast: "Literal = She is very happy. Figurative = She is on cloud nine. / She is over the moon."
  ccqs:
    - question: Does this expression mean something different from its literal words?
      answer: Yes, it is figurative language.
    - question: Does it create a comparison, exaggeration, or image?
      answer: Yes, that is the function of figurative language.
  example_generator:
    contexts:
      - literature and poetry
      - everyday conversation
      - advertising and media
      - political rhetoric
    cultural_notes:
      - Many figurative expressions are culture-specific and do not translate directly
      - Understanding figurative language is essential for advanced comprehension of English media and literature
    min_examples: 5

form:
  affirmative:
    structure: "Various forms: metaphor (A is B), simile (A is like/as B), personification (giving human qualities to non-human things), hyperbole (deliberate exaggeration)"
    example_generator:
      contexts:
        - literary analysis
        - casual speech
        - advertising
      min_examples: 4
  negative:
    structure: "Negated figurative expressions: He is not the sharpest tool in the shed. / It is not rocket science."
    example_generator:
      contexts:
        - understatement
        - litotes
      min_examples: 3
  questions:
    structure: "Rhetorical questions with figurative language: Is the Pope Catholic? / Does a bear live in the woods?"
    example_generator:
      contexts:
        - emphatic agreement
        - sarcasm
      min_examples: 3

sub_rules:
  - rule: "Metaphor: a direct comparison stating one thing IS another, without like or as"
    type: rhetorical
    examples:
      - Time is money.
      - He has a heart of gold.
      - The world is a stage.
      - Her voice is music to my ears.
  - rule: "Simile: a comparison using like or as"
    type: rhetorical
    examples:
      - She is as busy as a bee.
      - He runs like the wind.
      - It is like talking to a brick wall.
      - She sings like an angel.
  - rule: "Personification: giving human qualities to animals, objects, or abstract concepts"
    type: rhetorical
    examples:
      - The wind howled through the trees.
      - Opportunity knocked at his door.
      - The flowers danced in the breeze.
      - Fear gripped the nation.
  - rule: "Hyperbole: deliberate exaggeration for emphasis or effect"
    type: rhetorical
    examples:
      - I have told you a million times.
      - This bag weighs a ton.
      - I am so hungry I could eat a horse.
      - She is older than the hills.
  - rule: "Litotes: deliberate understatement, often using a negative to affirm a positive"
    type: rhetorical
    examples:
      - She is not unkind. (meaning: she is quite kind)
      - It was not a bad performance. (meaning: it was good)
      - He is not the friendliest person. (meaning: he is unfriendly)
      - That is not impossible. (meaning: it is possible)
  - rule: "Idiomatic expressions: fixed phrases whose meaning cannot be deduced from the individual words"
    type: lexical
    examples:
      - break the ice (start a conversation)
      - hit the nail on the head (be exactly right)
      - let the cat out of the bag (reveal a secret)
      - burn the midnight oil (work late into the night)
  - rule: "Synecdoche and metonymy: using a part to represent the whole, or an associated thing to represent the concept"
    type: rhetorical
    examples:
      - The Crown announced new policies. (The Crown = the monarchy)
      - All hands on deck. (hands = sailors/workers)
      - The pen is mightier than the sword. (pen = written words; sword = military force)

use:
  - context: "Literature and poetry"
    description: "Figurative language is the foundation of literary expression, creating imagery and emotional resonance."
    examples:
      - Hope is the thing with feathers that perches in the soul. (Emily Dickinson)
      - The fog comes on little cat feet. (Carl Sandburg)
      - All the world is a stage, and all the men and women merely players. (Shakespeare)
  - context: "Everyday conversation"
    description: "Native speakers use figurative language constantly, often without realising it."
    examples:
      - I am feeling under the weather today.
      - That test was a piece of cake.
      - He spilled the beans about the surprise party.
      - She has a heart of gold.
  - context: "Advertising and media"
    description: "Advertisers use figurative language to make products memorable and appealing."
    examples:
      - Red Bull gives you wings.
      - Melts in your mouth, not in your hands. (M&Ms)
      - The ultimate driving machine. (BMW)
  - context: "Political and persuasive rhetoric"
    description: "Politicians and activists use figurative language to inspire and persuade."
    examples:
      - We stand at the crossroads of history.
      - The tide of public opinion is turning.
      - A wall of silence surrounds the investigation.
      - The seeds of change have been planted.

phonetics:
  - note: "Figurative expressions are often produced as fixed chunks with a specific stress pattern that should not be broken up."
    example_generator:
      contexts:
        - spoken idioms
        - literary reading
    l1_issue: "Learners may try to translate figurative expressions literally from their L1, leading to confusion."
  - note: "Hyperbole is typically spoken with exaggerated intonation and emphasis: I have told you a MILLION times!"
    example_generator:
      contexts:
        - emphatic speech
        - storytelling
    l1_issue: "Learners from cultures that value literal accuracy may find hyperbole uncomfortable or dishonest."

teaching:
  methodology: "Guided discovery"
  tips:
    - "Start with the most common figurative types: metaphor, simile, and hyperbole."
    - "Use visual aids — draw the literal meaning vs. the figurative meaning to highlight the difference."
    - "Teach idioms in thematic groups (body, animals, weather) to aid memorisation."
    - "Encourage students to keep a figurative language journal, collecting examples from media they consume."
    - "Discuss cultural differences — many figurative expressions do not translate across languages."
  recommended_activities:
    - name: "Literal vs Figurative"
      duration: 15
      adaptation_notes: "Students draw both the literal and figurative meaning of expressions, then explain the difference."
    - name: "Metaphor Hunt"
      duration: 15
      adaptation_notes: "Students find and categorise figurative language in a song, poem, or news article."
    - name: "Create Your Own"
      duration: 20
      adaptation_notes: "Students write original metaphors, similes, and hyperboles on a given topic, then share with the class."
