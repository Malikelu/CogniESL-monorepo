grammar_point: possessive_adjectives
title: Possessive Adjectives
description: 'Words that show ownership or relationship: my, your, his, her, its,
  our, their.'
level: A1
meaning:
  core_meaning: Possessive adjectives show who owns or is related to something. They
    come BEFORE the noun.
  timeline: Timeless — shows a permanent or ongoing relationship.
  contrast: '''Possessive adjective'' = ''my book'' (before noun) vs ''Possessive
    pronoun'' = ''mine'' (replaces noun)'
  ccqs:
  - question: Does this word come before a noun?
    answer: Yes — it's a possessive adjective.
    purpose: Tests whether the learner understands that possessive adjectives (my,
      your, his, her, its, our, their) show ownership and agree with the possessor,
      not the possessed noun.
  - question: Does it show who owns something?
    answer: Yes — that's its purpose.
    purpose: 'Tests whether the learner can choose the correct possessive adjective
      based on the subject: I → my, you → your, he → his, she → her, it → its, we
      → our, they → their.'
  - question: '[Add specific question for CCQ 3]'
    answer: '[Add specific answer for CCQ 3]'
    purpose: 'Tests whether the learner can distinguish possessive adjectives from
      possessive pronouns: ''my book'' (adjective) vs ''mine'' (pronoun).'
  - question: '[Add specific question for CCQ 4]'
    answer: '[Add specific answer for CCQ 4]'
    purpose: Tests whether the learner understands that 'its' (possessive) is different
      from 'it's' (contraction of 'it is').
  example_generator:
    contexts:
    - family and relationships
    - personal belongings
    - daily routines
    - describing people
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Possessive adjective + noun: ''my book'', ''her house'''
    example_generator:
      contexts:
      - family and relationships
      - personal belongings
      - daily routines
      min_examples: 4
  negative:
    structure: 'Subject + be + not + possessive + noun: ''This is not my book.'''
    example_generator:
      contexts:
      - family and relationships
      - personal belongings
      - daily routines
      min_examples: 4
  questions:
    structure: 'Whose + noun?: ''Whose book is this?'' → ''It''s mine.'''
    example_generator:
      contexts:
      - family and relationships
      - personal belongings
      - daily routines
      min_examples: 4
sub_rules:
- rule: '''Its'' (possessive) vs ''it''s'' (it is)'
  type: spelling
  examples:
  - The dog wagged its tail. (possessive)
  - It's raining. (it is)
- rule: Possessive adjectives don't change for plural nouns
  type: grammatical
  examples:
  - my book / my books
  - her car / her cars
use:
- context: Family and relationships
  description: Describing family members
  examples:
  - My mother is a teacher.
  - His brother lives in London.
- context: Personal belongings
  description: Talking about possessions
  examples:
  - This is my phone.
  - Where is your bag?
phonetics:
- note: Weak form of 'your' /jɔːr/ → /jər/ in connected speech
  contexts:
  - connected speech
  l1_issue: Some L1 speakers confuse 'his' and 'her'
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use real objects to demonstrate possession
  - Contrast with possessive 's
  recommended_activities:
  - name: Whose Is It?
    duration: 10
    adaptation_notes: Students guess ownership of classroom objects.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.18-12.19'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 5: Nouns and Noun Phrases, §5.8 (possessives)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 96-100 (possessives:
    my, your, his, her, its, our, their)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    11: Possessives, §11.3'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 6: Possessive adjectives'
common_errors:
- error: 'Confusing ''your'' and ''you''re'': *''You''re book is here.'''
  correction: Your book is here.
  explanation: '''Your'' shows possession. ''You''re'' = ''you are''.'
  l1_groups:
  - All L1 groups
- error: 'Confusing ''its'' and ''it''s'': *''The dog wagged it''s tail.'''
  correction: The dog wagged its tail.
  explanation: '''Its'' shows possession. ''It''s'' = ''it is'' or ''it has''.'
  l1_groups:
  - All L1 groups
- error: 'Using ''his'' for female possessors: *''Mary lost his keys.'''
  correction: Mary lost her keys.
  explanation: Use 'her' for female possessors, 'his' for male.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: Possessive adjectives are consistent across registers.
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: 'Possessive adjectives create cohesion: ''John lost his keys. He was upset.'''
- note: '''Its'' vs ''it''s'' is one of the most common spelling errors in English.'
