grammar_point: reported_commands
title: Reported Commands, Requests, and Advice
description: A structure to paraphrase orders, requests, or advice given in the past,
  using reporting verbs followed by an infinitive.
level: B1
meaning:
  core_meaning: Reports orders, polite requests, or advice given in the past, using
    an infinitive structure instead of the original imperative.
  timeline: The reporting verb is in past tense; the infinitive (to + base verb) does
    not change tense (no backshift).
  contrast: 'Direct command: ''Sit down!'' (imperative, exclamation mark)

    Reported command: He told me to sit down (infinitive, no exclamation)

    ''Tell'' = Order (direct); ''ask'' = Polite request; ''advise'' = Advice

    ''Say'' is never used for commands – use ''tell'', ''ask'', or ''order''.

    '
  ccqs:
  - question: How do we report a command
    answer: Use tell or ask or order plus person plus to plus base verb.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Orders: Tell/order + someone + to + base verb

      Requests: Ask + someone + to + base verb (more polite)

      Advice: Advise + someone + to + base verb

      No tense backshift for the infinitive (always base verb)

      '
    example_generator:
      contexts:
      - education and school
      min_examples: 4
  negative:
    structure: Reporting verb + someone + not to + base verb
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: N/A (Reported commands are statements about an order/request, no interrogative
      form)
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Tell/ask/order + object + to + base verb
  type: grammatical
  examples:
  - He told me to sit down
  - She asked him to be quiet
  - The teacher ordered them to stop
- rule: 'Negative: tell/ask/order + object + not to + base verb'
  type: grammatical
  examples:
  - He told me not to worry
  - She asked him not to be late
  - The teacher ordered them not to talk
- rule: 'Other reporting verbs for commands: advise, warn, remind, encourage'
  type: grammatical
  examples:
  - She advised me to study more
  - He warned us not to go there
  - She reminded me to call
use:
- name: Authority Orders
  description: Report commands from people in authority (bosses, teachers, parents).
  examples:
  - The teacher told the students to open their books.
  - The boss ordered the team to finish the project.
  key_point: Use 'tell' or 'order' for direct commands.
- name: Polite Requests
  description: Report polite requests or favors asked in the past.
  examples:
  - He asked me to pick up some groceries.
  - 'She asked if I could wait (wait, no – that''s a question. For requests: ''She
    asked me to wait''.)'
  key_point: Use 'ask' for polite, non-authoritative requests.
- name: Advice Reporting
  description: Report advice or recommendations given to you.
  examples:
  - My doctor advised me to exercise more.
  - She advised me not to quit my job.
  key_point: Use 'advise' for professional or personal recommendations.
phonetics:
- note: 'To is weak before verbs: ''told me to sit'' → /təʊld miː tə sɪt/. The to
    reduces to a schwa.'
  example_generator:
    contexts:
    - reported speech pronunciation
  l1_issue: 'Portuguese speakers may omit ''to'' in reported commands. Teach the full
    structure: ''told me to sit'' NOT ''told me sit.'''
teaching:
  methodology: PPP
  tips:
  - Start with simple 'tell' commands, then add 'ask' and 'order'.
  - Contrast direct imperatives with reported commands side by side.
  - Practice negative commands early to avoid 'to not' errors.
  recommended_activities:
  - name: Command Reporting
    duration: 15
    adaptation_notes: 'Teacher gives direct commands. Students report them: ''Sit
      down!'' → ''He told us to sit down.'' ''Do not talk!'' → ''She told us not to
      talk.'''
  - name: Reporting Verbs
    duration: 10
    adaptation_notes: 'Students match reporting verbs to situations: ''Be quiet!''
      (order), ''Please help me'' (ask), ''You should study'' (advise).'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
