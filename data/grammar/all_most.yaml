grammar_point: all_most
title: All and Most (Quantifiers for Groups)
description: 'Quantifiers to describe entire or majority groups: all (100% of a countable
  plural/uncountable noun), most (more than 50% but not 100% of a countable plural/uncountable
  noun).'
level: A2
meaning:
  core_meaning: All indicates the entire group (100% of items). Most indicates the
    majority of the group (more than 50% but less than 100% of items). Both work with
    countable plural and uncountable nouns.
  timeline: N/A (Quantifiers are not tense-based; they describe group size regardless
    of time.)
  contrast: 'All = 100%: "All dogs bark" (every single dog)

    Most = Majority: "Most dogs bark" (more than half, but not all)

    Never use with singular countable nouns: "All dog" (wrong) → "All dogs" (plural)

    '
  ccqs:
  - question: All students passed the exam. Did every single student pass?
    answer: Yes. All means 100 percent — every student without exception.
    purpose: Tests understanding that all means 100 percent, no exceptions
  - question: Most students passed the exam. Did every student pass?
    answer: No. Most means more than half but not all. Some students failed.
    purpose: Tests understanding that most means majority, not all
  - question: Can we say All water are wet? Why or why not?
    answer: No. Water is uncountable, so we say All water is wet (singular verb).
      All with uncountable nouns uses a singular verb.
    purpose: Tests understanding of verb agreement with all plus uncountable nouns
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'All + countable plural noun: "All students passed the exam."

      All + uncountable noun: "All water is wet."

      Most + countable plural noun: "Most students passed the exam."

      Most + uncountable noun: "Most water on Earth is salt water."

      '
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
  negative:
    structure: 'All/most follow negative verbs: ''Not all students passed.'' ''Most
      people don''t like spiders.'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'All/most follow auxiliary verbs in questions: ''Do all students have
      to attend?'' ''Does most water come from oceans?'''
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
sub_rules:
- type: grammar
  rule: All with countable plural nouns takes a plural verb; with uncountable nouns,
    a singular verb
  examples:
  - All students are here. (plural)
  - All the water is gone. (singular)
  explanation: The verb agrees with the noun type, not with all.
- type: grammar
  rule: Most takes the same verb agreement as the noun it modifies
  examples:
  - Most students are happy. (plural)
  - Most information is online. (singular)
  explanation: Most follows the same agreement rules as all.
- type: usage
  rule: Not all is a partial negation (not the same as none)
  examples:
  - Not all birds can fly. (Some can, some cannot — not zero)
  - All birds cannot fly. (ambiguous — avoid this structure)
  explanation: Not all means some but not all. It does not mean none.
- type: contrast
  rule: All vs Every — all works with plural nouns; every with singular
  examples:
  - All students passed. (plural noun)
  - Every student passed. (singular noun, same meaning)
  explanation: Every is used with singular countable nouns and emphasises individuals
    within the group.
- type: usage
  rule: Most of the requires a determiner before the noun
  examples:
  - Most of the students passed. (correct)
  - Most of students passed. (incorrect — needs the/these/my etc.)
  explanation: When using most of, a determiner is required before the noun.
use:
- name: Generalizations (All)
  description: Make statements about an entire group without exception.
  examples:
  - All humans need water.
  - All planets orbit the sun.
  key_point: 100% of the group applies.
- name: Generalizations (Most)
  description: Make statements about the majority of a group, allowing for exceptions.
  examples:
  - Most birds can fly.
  - Most phones have cameras.
  key_point: More than 50%, not 100%.
- name: Countable and Uncountable Nouns
  description: Work with both countable plural and uncountable nouns.
  examples:
  - All cars (countable)
  - All traffic (uncountable)
  - Most apples (countable)
  - Most rain (uncountable)
  key_point: No need to distinguish noun type.
phonetics:
- note: All is often reduced in connected speech
  l1_issue: Many L1 speakers over-pronounce all as a full, stressed word. In natural
    speech, it is often unstressed.
  practice: Drill all the as a weak, unstressed unit.
  example_generator:
    contexts:
    - connected speech
- note: Most of the with weak forms in connected speech
  l1_issue: Speakers may pronounce most of the with full vowels on each word. In connected
    speech, of and the reduce.
  practice: Drill most of the people with reduced forms.
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Use pie charts: 100% = all, 75% = most, 25% = few.'
  - 'Week 2: Class surveys: ''All students like pizza?'' (check 100%) vs ''Most students
    like pizza?'' (check majority).'
  - 'Week 3: Contrast all/most with every/each (singular countable).'
  recommended_activities:
  - name: Class Survey and Report
    duration: 15
    adaptation_notes: 'Students survey classmates about habits and preferences using
      ''Do you...?'' questions. They report back using all, most, some, few, no: ''Most
      students like music. Few students play an instrument.'''
  - name: True or False Generalisations
    duration: 10
    adaptation_notes: 'Students make generalisations about their class using all,
      most, some, few: ''All students have a phone. Most students like pizza.'' Class
      votes on whether each statement is true.'
  - name: Pie Chart Description
    duration: 15
    adaptation_notes: 'Show pie charts with data. Students describe them using quantifiers:
      ''Most people prefer tea. Few people drink coffee. Some people prefer juice.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
