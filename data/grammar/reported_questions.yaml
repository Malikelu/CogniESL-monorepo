grammar_point: reported_questions
title: Reported Questions (Indirect Questions)
description: A structure to paraphrase questions someone asked in the past, with tense
  backshifting and no question inversion or question marks.
level: B1
meaning:
  core_meaning: Reports a question that was asked in the past, paraphrasing the original
    question without using its exact words or question structure.
  timeline: 'Same backshift rules as reported statements: tenses shift to past relative
    to the past reporting verb.'
  contrast: 'Direct question: ''Where are you going?'' (inverted, question mark) Reported
    question: He asked where I was going (no inversion, no question mark) ''Say''
    is used for statements; ''ask''/''inquire'' is used for questions. '
  ccqs:
  - question: Do we use question word order in reported questions
    answer: No. Reported questions use statement word order.
    purpose: Tests whether the learner understands that reported questions lose subject-auxiliary
      inversion and become statement-ordered clauses, which is the most critical structural
      change from direct to reported questions.
  - question: Can we use a different structure here with the same meaning?
    answer: No — changing the structure would change the meaning or make the sentence
      ungrammatical.
    purpose: Tests whether the learner understands that reported questions is the
      only appropriate structure for this meaning/context.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      reported questions and explain why they are incorrect.
example_generator:
  contexts:
  - everyday situations
  cultural_notes: []
  min_examples: 5
form:
  affirmative:
    structure: 'Yes/No questions: Reporting verb (ask/inquire) + if/whether + subject
      + backshifted verb Wh-questions: Reporting verb + wh-word + subject + backshifted
      verb Same backshift rules as reported statements apply No question mark, no
      auxiliary verb inversion '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: Reporting verb + if/whether + subject + negative backshifted verb /
      Reporting verb + wh-word + subject + negative backshifted verb
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: N/A (Reported questions are statements about a question, so no interrogative
      form for the reported clause)
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: 'Wh- questions: reporting verb + wh-word + subject + verb (statement order)'
  type: grammatical
  examples:
  - He asked where I lived
  - She wanted to know what I was doing
  - They asked why I was late
- rule: 'Yes/no questions: reporting verb + if/whether + subject + verb'
  type: grammatical
  examples:
  - He asked if I was hungry
  - She wanted to know whether I had finished
  - They asked if I could help
- rule: No auxiliary inversion in reported questions
  type: grammatical
  examples:
  - He asked where I lived (NOT where did I live)
  - She asked if I was hungry (NOT if was I hungry)
use:
- name: Conversation Reporting
  description: Summarize questions asked in past conversations.
  examples:
  - She asked if I wanted to join the meeting.
  - He asked where the bathroom was.
  key_point: Most common everyday use.
- name: Interview Reporting
  description: Report questions from job interviews, surveys, or research.
  examples:
  - The interviewer asked if I had any relevant experience.
  - They asked why I applied for the role.
  key_point: 'Uses formal reporting verbs: inquire, question, ask.'
- name: News and Media
  description: Report questions asked to public figures.
  examples:
  - The journalist asked whether the prime minister would resign.
  key_point: Formal register for public reporting.
phonetics:
- note: 'Reported questions typically have falling intonation (not rising like direct
    questions): ''He asked where I lived ↘'' NOT ''He asked where I lived ↗.'''
  example_generator:
    contexts:
    - reported question intonation
  l1_issue: Many L1 speakers use rising intonation for reported questions. Teach falling
    intonation — they are statements, not questions.
teaching:
  methodology: PPP
  tips:
  - Start with yes/no questions (if/whether) before moving to wh-questions.
  - Contrast direct and reported questions side by side to show word order changes.
  - 'Practice with common wh-words: what, where, when, why, how.'
  recommended_activities:
  - name: Direct to Reported
    duration: 15
    adaptation_notes: 'Give students direct questions. They convert to reported speech:
      ''Where do you live?'' → ''He asked where I lived.'' ''Are you hungry?'' → ''She
      asked if I was hungry.'''
  - name: Statement Order
    duration: 10
    adaptation_notes: 'Students identify and correct word order errors in reported
      questions: ''He asked where did I live'' → ''He asked where I lived.'''
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Keeping question word order in reported questions: *''He asked where did
    I live.'''
  correction: He asked where I lived.
  explanation: Reported questions use statement word order (subject before verb),
    not question word order. The auxiliary 'did' is removed and the verb takes the
    appropriate past tense form.
  l1_groups:
  - Portuguese
  - Spanish
  - French
- error: 'Using ''that'' instead of ''if/whether'' for yes/no questions: *''He asked
    that I was hungry.'''
  correction: He asked if/whether I was hungry.
  explanation: Yes/no questions in reported speech require 'if' or 'whether', not
    'that'. 'That' is used for reported statements, not questions.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Forgetting tense backshift: *''He asked where I live.'''
  correction: He asked where I lived.
  explanation: When the reporting verb is in the past tense, the verb in the reported
    clause must be backshifted. Present simple becomes past simple.
  l1_groups:
  - Portuguese
  - Spanish
  - Japanese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
