grammar_point: future_continuous
title: Future Continuous (Will be + Verb-ing)
description: 'Structure used to describe an action that will be in progress at a specific
  time in the future: will be + verb-ing.'
level: B1
meaning:
  core_meaning: An action that is in progress at a specific future time, or a future
    action that is already planned.
  timeline: 'Future: Action starts before a specific time and continues after.'
  contrast: '''Future Continuous'' = In progress at future time: "I will be eating
    at 7 (started before 7, continues after)"

    ''Future Will'' = Simple future action: "I will eat at 7 (single action starting
    at 7)"

    ''Future Going To'' = Planned future: "I am going to eat at 7 (plan)"

    '
  ccqs:
  - question: '''I will be eating at 7pm.'' Will I start eating at 7pm?'
    answer: No — you will already be in the middle of eating at 7pm.
  - question: '''Will you be using the car tomorrow?'' Is this polite or direct?'
    answer: Polite — the future continuous is used for less direct questions about
      plans.
  - question: '''This time tomorrow, I will be flying to Paris.'' Where am I now?'
    answer: Not flying yet. At this time tomorrow, you will be in the middle of your
      flight.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Will be + verb-ing: ''I will be eating at 7pm.'''
    example_generator:
      contexts:
      - work and professional life
      - travel and places
      min_examples: 4
  negative:
    structure: 'Will not be + verb-ing: ''I won''t be eating at 7pm.'''
    example_generator:
      contexts:
      - health and wellbeing
      - social interactions
      min_examples: 4
  questions:
    structure: 'Invert will and subject: ''Will you be eating at 7pm?'''
    example_generator:
      contexts:
      - work and professional life
      min_examples: 4
sub_rules:
- rule: Future continuous (will be + ing) describes an action that will be in progress
    at a specific time in the future
  type: semantic
  examples:
  - At 8pm tonight, I will be having dinner
  - This time next week, we will be lying on the beach
  - When you arrive, I will be cooking dinner
- rule: It can also describe a planned or expected future action, often with a polite
    tone
  type: semantic
  examples:
  - I will be seeing John at the meeting (so I can give him your message)
  - We will be arriving around 6pm (polite way to state plans)
  - Will you be using the car tonight? (polite request)
- rule: Future continuous is not used with stative verbs (know, believe, love, etc.)
  type: grammatical
  examples:
  - I will be working tomorrow (correct — action verb)
  - I will be knowing the answer (WRONG — stative verb)
  - I will know the answer by then (correct — simple future with stative)
use:
- name: Action in Progress at Future Time
  description: Describe what will be happening at a specific future moment.
  examples:
  - This time tomorrow, I will be flying to Paris.
  - At 8pm, we will be watching a movie.
  key_point: Use with specific future time expressions.
- name: Planned Future Actions
  description: Polite way to ask about future plans without implying intention.
  examples:
  - Will you be using the car tomorrow? (polite ask)
  key_point: More polite than 'Are you going to use the car?'
- name: Predictions About Future
  description: Predict future actions in progress.
  examples:
  - I think he will be working late tonight.
  key_point: Similar to future will, but emphasizes duration.
phonetics:
- note: 'In connected speech, will be is often reduced: ''I will be'' → /aɪl bi/,
    ''She will be'' → /ʃiːl bi/. The contraction ''ll be is very common.'
  example_generator:
    contexts:
    - will be reduction
  l1_issue: Learners may over-pronounce 'will be' as /wɪl biː/ in all contexts. Teach
    the reduced form.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Affirmative future continuous (will be + verb-ing).'
  - 'Week 2: Negative and questions, polite requests.'
  - 'Week 3: Contrast with future will/going to.'
  - 'Use timeline visuals: Mark specific future time, show action in progress.'
  recommended_activities:
  - name: This Time Tomorrow
    duration: 15
    adaptation_notes: 'Students describe what they will be doing at specific times
      tomorrow: ''At 8am, I will be having breakfast.'''
  - name: Polite Requests
    duration: 10
    adaptation_notes: 'Students practice polite requests using future continuous:
      ''Will you be using the car tonight?'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for future_continuous.
  correction: Correct form.
  explanation: This is a common error for future_continuous.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
