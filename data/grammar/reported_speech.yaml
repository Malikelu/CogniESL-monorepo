grammar_point: reported_speech
title: Reported Speech (Indirect Speech)
description: Retelling what someone said without using their exact words, with changes
  to tense, pronouns, and time/place expressions.
level: B1
meaning:
  core_meaning: Reported speech (also called indirect speech) conveys someone else's
    words in a new context. Instead of quoting exact words, we paraphrase what was
    said and adjust grammar (tense, pronouns, time expressions) to fit the current
    speaker's perspective.
  timeline: 'Tense backshift moves the original tense one step back in time: present
    → past, past → past perfect, future → conditional. This reflects that the original
    statement was made earlier.'
  contrast: '''Direct Speech'' = ''I am happy.'' (exact words, in quotes) vs ''Reported
    Speech'' = ''He said (that) he was happy.'' (paraphrased, no quotes, tense shifted
    back)'
  ccqs:
  - question: Are we using the speaker's exact words, or paraphrasing?
    answer: Paraphrasing -- that is reported speech.
    purpose: Tests whether the learner understands that reported speech involves backshifting
      tenses (present → past, past → past perfect).
  - question: Does the tense change in reported speech?
    answer: Yes -- tenses shift one step back (present → past, past → past perfect).
    purpose: Tests whether the learner knows the tense backshift rule, which is the
      most important structural feature of reported speech. This rule applies in formal
      reported speech (though AmE sometimes omits it in informal contexts).
  - question: Do we use quotation marks in reported speech?
    answer: No -- reported speech does not use quotation marks.
    purpose: Tests whether the learner can distinguish the punctuation difference
      between direct and reported speech. This is a common error -- learners often
      mix direct speech punctuation with reported speech structure.
  example_generator:
    contexts:
    - everyday conversations
    - news reports
    - workplace communication
    - storytelling
    cultural_notes:
    - Reported speech is essential for news reporting, academic writing, and everyday
      conversation
    - In informal speech, some native speakers do not always apply tense backshift,
      but it is expected in formal writing and exams
    - 'The word ''that'' is optional in reported statements: ''He said that he was
      tired'' = ''He said he was tired'''
    min_examples: 5
form:
  affirmative:
    structure: Reporting verb (say/tell) + (that) + reported clause (with tense backshift)
    example_generator:
    - 'He said (that) he was tired. (Direct: ''I am tired.'')'
    - 'She told me (that) she liked pizza. (Direct: ''I like pizza.'')'
    - 'They said (that) they would come. (Direct: ''We will come.'')'
    min_examples: 4
  negative:
    structure: Reporting verb + (that) + subject + not + verb (with tense backshift)
    example_generator:
    - 'She said (that) she didn''t like tea. (Direct: ''I don''t like tea.'')'
    - 'He told me (that) he hadn''t finished. (Direct: ''I haven''t finished.'')'
    - 'They said (that) they wouldn''t come. (Direct: ''We won''t come.'')'
    min_examples: 4
  questions:
    structure: 'Yes/no questions: reporting verb + if/whether + subject + verb (statement
      order, no auxiliary inversion) / Wh- questions: reporting verb + wh- word +
      subject + verb (statement order)'
    example_generator:
    - 'He asked if I liked coffee. (Direct: ''Do you like coffee?'')'
    - 'She asked whether I had a car. (Direct: ''Do you have a car?'')'
    - 'He asked where I lived. (Direct: ''Where do you live?'')'
    - 'She asked why I was late. (Direct: ''Why are you late?'')'
    min_examples: 4
sub_rules:
- rule: 'Tense backshift: present → past, past → past perfect, future → conditional
    (will → would)'
  type: grammatical
  examples:
  - '''I am happy.'' → He said he was happy.'
  - '''I ate lunch.'' → She said she had eaten lunch.'
  - '''I will come.'' → They said they would come.'
- rule: 'Pronoun changes: I → he/she, you → I/he/she, we → they, my → his/her, your
    → my/his/her'
  type: grammatical
  examples:
  - '''I like my job.'' → He said he liked his job.'
  - '''You need your passport.'' → She said I needed my passport.'
- rule: 'Time/place expression changes: now → then, today → that day, yesterday →
    the day before, tomorrow → the next day, here → there'
  type: grammatical
  examples:
  - '''I am leaving today.'' → He said he was leaving that day.'
  - '''I will come tomorrow.'' → She said she would come the next day.'
- rule: 'Say vs tell: ''say'' does not take an object; ''tell'' requires an object
    (tell someone)'
  type: grammatical
  examples:
  - He said (that) he was tired. (no object)
  - 'He told me (that) he was tired. (with object: me)'
- rule: Reported questions use statement word order (subject before verb), not question
    order
  type: grammatical
  examples:
  - '''Do you like coffee?'' → He asked if I liked coffee. (NOT ''did I like'')'
  - '''Where do you live?'' → She asked where I lived. (NOT ''where did I live'')'
- rule: The word 'that' is optional in reported statements
  type: grammatical
  examples:
  - He said that he was tired. = He said he was tired.
use:
- context: Reporting statements
  description: Retelling what someone said
  examples:
  - She said (that) she was leaving.
  - He told me (that) he liked pizza.
  - They said (that) they would help us.
- context: Reporting yes/no questions
  description: Retelling questions that can be answered with yes or no
  examples:
  - He asked if I was hungry.
  - She asked whether I had a car.
  - They asked if we wanted to come.
- context: Reporting wh- questions
  description: Retelling questions that begin with what, where, when, why, who, how
  examples:
  - He asked where I lived.
  - She asked why I was late.
  - They asked how I knew.
- context: News reporting
  description: Journalists use reported speech to convey what sources said
  examples:
  - The president said that the economy was improving.
  - The spokesperson told reporters that the meeting had been postponed.
  - Witnesses said they had seen a man running from the scene.
phonetics:
- note: 'Weak form of ''that'' in reported speech: /ðət/ not /ðæt/. ''He said that
    he was tired'' sounds like /hiː sed ðət hiː wəz taɪəd/.'
  example_generator:
  - that /ðət/
  - said /sed/
  l1_issue: Many L1 speakers over-pronounce 'that' as /ðæt/. Teach the weak form for
    natural speech.
- note: 'Contractions are natural in spoken reported speech: ''He said he was...''
    /hiː sed hiː wəz/, ''She said she''d...'' /ʃiː sed ʃiːd/.'
  example_generator:
  - he was /hiː wəz/
  - she had → she'd /ʃiːd/
  l1_issue: Portuguese and Spanish speakers often avoid contractions. Teach them for
    natural-sounding speech.
teaching:
  methodology: PPP with transformation drills
  tips:
  - 'Teach tense backshift systematically: present → past, past → past perfect, future
    → would. Use a chart on the board.'
  - 'Practice pronoun changes explicitly: I → he/she, you → I, my → his/her. This
    is a common source of errors.'
  - 'Use direct speech cards: students convert direct quotes to reported speech in
    pairs. Start with statements, then move to questions.'
  - 'Teach the difference between ''say'' and ''tell'': ''say'' (no object) vs ''tell''
    (with object). Drill: ''He said...'' vs ''He told me...'''
  - Emphasize that reported questions use statement word order (no auxiliary inversion).
    This is one of the most common errors.
  recommended_activities:
  - name: Telephone Game
    duration: 15
    adaptation_notes: 'Student A says a sentence. Student B reports it to Student
      C: ''Maria said she was tired.'' Student C reports to Student D. Practices reported
      speech in a fun chain.'
  - name: Direct to Reported
    duration: 10
    adaptation_notes: 'Give students direct speech sentences. They convert to reported
      speech: ''I am happy.'' → He said he was happy. Then check as a class.'
  - name: News Reporter
    duration: 15
    adaptation_notes: 'Students play the role of news reporters. They interview classmates
      about their weekend, then report to the class: ''Pedro said he had visited his
      grandmother.'' Practices past tense reporting.'
  - name: Reported Questions
    duration: 10
    adaptation_notes: 'Teacher asks direct questions. Students report them: ''Where
      do you live?'' → The teacher asked where I lived. Practices question transformation.'
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 11:
    Reported Speech, §11.6-11.8'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 11: Reported Speech, §11.1-11.3'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 486-495 (reported
    speech: backshift, pronoun changes, time expressions)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    13: Reported speech, §13.9-13.10'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 12: Reported speech'
common_errors:
- error: 'Not backshifting tenses: *''She said she is happy.'''
  correction: She said she was happy.
  explanation: In reported speech, tenses typically shift back.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - German
register_notes:
- note: Reported speech is common in formal writing, journalism, and academic prose.
- note: 'In news reporting, reported speech is used to convey what sources said: ''The
    minister stated that the policy would be reviewed.'''
- note: 'In academic writing, reported speech is used to discuss other researchers''
    findings: ''Smith (2020) argued that...'''
- note: 'In legal contexts, reported speech is used for witness testimony: ''The defendant
    stated that he had not been present.'''
dialectal_variation:
- note: No significant BrE/AmE differences in reported speech formation.
- note: 'In informal speech, ''that'' is often omitted: ''She said she was tired''
    (without ''that'').'
- note: 'In some dialects, backshift may be omitted when the situation is still true:
    ''She said she is a doctor'' (she is still a doctor).'
discourse_notes:
- note: Reported speech creates cohesion in narratives by integrating characters'
    words into the story.
- note: In news reporting, direct quotes are used for impact, while reported speech
    is used for summarizing.
- note: In academic writing, reported speech allows writers to engage with other researchers'
    ideas.
- note: 'Reported speech can be used to create distance or neutrality: ''The government
    claimed that...'' (the writer does not endorse the claim)'
