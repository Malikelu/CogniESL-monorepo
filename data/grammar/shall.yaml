grammar_point: shall
title: Shall (Formal Future, Offers, Suggestions, Obligations)
description: A modal verb used in formal contexts to express future plans, make offers,
  give suggestions, or state legal obligations. Rare in informal spoken English.
level: B2
meaning:
  core_meaning: Expresses formal future actions, polite offers, suggestions, or mandatory
    obligations (legal/formal).
  timeline: 'Future: Refers to future actions or obligations.'
  contrast: 'Shall (formal): "We shall arrive." (formal/legal) Will (neutral): "We
    will arrive." (standard) Going to (informal): "We''re going to arrive." (casual) '
  ccqs:
  - question: When do we use shall
    answer: Mainly in British English for suggestions and formal future.
    purpose: Tests whether the learner knows the primary contexts where 'shall' is
      used in modern English (formal future, suggestions/offers, and legal obligations),
      and understands its register as primarily British and formal.
  - question: Can we use a different structure here with the same meaning?
    answer: No — changing the structure would change the meaning or make the sentence
      ungrammatical.
    purpose: Tests whether the learner understands that shall is the only appropriate
      structure for this meaning/context.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      shall and explain why they are incorrect.
example_generator:
  contexts:
  - everyday situations
  cultural_notes: []
  min_examples: 5
form:
  affirmative:
    structure: 'Shall + Base Verb: "We shall arrive by 6 PM." "I shall call you tomorrow."
      Common in formal writing, legal documents, and British English. '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: 'Shall + not (shan''t) + Base Verb: "I shan''t be attending the meeting."
      "We shan''t forget." Shan''t is rare in American English. '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Shall + Subject + Base Verb: "Shall we go?" "Shall I close the window?"
      Common for offers and suggestions. '
    example_generator:
      contexts:
      - food and daily routines
      - entertainment and media
      - social interactions
      min_examples: 4
sub_rules:
- rule: Shall for suggestions (Shall I/we)
  type: pragmatic
  examples:
  - Shall we go
  - Shall I help you
  - Shall we dance
  - Shall I open the window
- rule: Shall for offers
  type: pragmatic
  examples:
  - Shall I carry that for you
  - Shall I make some tea
  - Shall I turn on the light
- rule: Shall for formal future (mainly British, first person)
  type: grammatical
  examples:
  - I shall return
  - We shall overcome
  - I shall be there at 8pm
use:
- name: Formal Future
  description: Express future plans in formal writing or speech.
  examples:
  - The conference shall take place in June.
  - I shall return next week.
  key_point: More common in British English formal contexts; rare in American English.
- name: Offers/Suggestions
  description: Make polite offers or suggestions (questions with 'shall I/we').
  examples:
  - Shall I open the door?
  - Shall we go to the cinema?
  key_point: Polite alternative to 'can I' or 'let's'.
- name: Legal/Official Obligations
  description: State mandatory rules in laws, contracts, or official documents.
  examples:
  - The tenant shall pay rent by the 1st.
  - All employees shall wear ID badges.
  key_point: Legally binding; 'shall' means 'must' in official contexts.
phonetics:
- note: 'Shall is pronounced /ʃæl/ (strong) or /ʃəl/ (weak). In questions, it is often
    weak: ''Shall we?'' → /ʃəl wiː/.'
  example_generator:
    contexts:
    - shall pronunciation
  l1_issue: Portuguese speakers may pronounce 'shall' as /ʃaʊl/ or /ʃeɪl/. Teach the
    correct pronunciation /ʃæl/.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Shall for offers/suggestions (Shall I/we...).'
  - 'Week 2: Shall for formal future/legal obligations.'
  - 'Week 3: Contrast with will/going to; highlight regional (British vs American)
    differences.'
  - 'Use legal text examples: Students rewrite ''must'' as ''shall'' in mock contracts.'
  recommended_activities:
  - name: Shall I
    duration: 10
    adaptation_notes: 'Students practice making offers with shall: ''Shall I open
      the window?'' ''Shall I help you?'' ''Shall we go?'''
  - name: Shall or Will
    duration: 10
    adaptation_notes: 'Students choose the correct form for different situations:
      suggestions (shall), promises (will), formal future (shall -- BrE).'
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 9:
    Modals, §9.1-9.6'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''shall'' in American English contexts where ''will'' is expected:
    *''I shall call you tomorrow'' (AmE)'
  correction: I will call you tomorrow.
  explanation: In American English, 'shall' sounds overly formal or old-fashioned
    for simple future statements. 'Will' is the standard choice. 'Shall' in AmE is
    mostly limited to legal/formal documents and the fixed phrase 'Shall we?'
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Using ''shall'' with second and third persons for predictions: *''You shall
    be fine'''
  correction: You will be fine.
  explanation: For predictions and simple future statements about second and third
    persons, use 'will', not 'shall'. 'Shall' with second/third persons now sounds
    archaic or overly formal in most contexts.
  l1_groups:
  - Portuguese
  - Spanish
  - French
- error: 'Confusing ''shall'' with ''should'': *''I shall study harder'' (when giving
    advice to oneself)'
  correction: I should study harder.
  explanation: '''Should'' expresses advice, recommendation, or mild obligation, while
    ''shall'' (in affirmative statements) expresses formal future intent or legal
    obligation. They are not interchangeable.'
  l1_groups:
  - Portuguese
  - Spanish
  - German
register_notes:
- note: '''Shall'' is formal and primarily British. In American English it is limited
    to legal documents and formal questions (''Shall we?'').'
dialectal_variation:
- note: Primarily British English. In American English, 'will' has almost entirely
    replaced 'shall' for ordinary future reference. American legal/formal writing
    still uses 'shall' for obligations.
discourse_notes:
- note: In modern English, 'shall' appears mainly in formal questions for suggestions
    ('Shall we go?'), legal/formal documents, and British English formal prose.
