grammar_point: shall
title: Shall (Formal Future, Offers, Suggestions, Obligations)
description: A modal verb used in formal contexts to express future plans, make offers,
  give suggestions, or state legal obligations. Rare in informal spoken English.
level: B2
meaning:
  core_meaning: Expresses formal future actions, polite offers, suggestions, or mandatory
    obligations (legal/formal).
  timeline: 'Future: Refers to future actions or obligations.'
  contrast: 'Shall (formal): "We shall arrive." (formal/legal)

    Will (neutral): "We will arrive." (standard)

    Going to (informal): "We''re going to arrive." (casual)

    '
  ccqs:
  - question: When do we use shall
    answer: Mainly in British English for suggestions and formal future.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Shall + Base Verb: "We shall arrive by 6 PM." "I shall call you tomorrow."

      Common in formal writing, legal documents, and British English.

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: 'Shall + not (shan''t) + Base Verb: "I shan''t be attending the meeting."
      "We shan''t forget."

      Shan''t is rare in American English.

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Shall + Subject + Base Verb: "Shall we go?" "Shall I close the window?"

      Common for offers and suggestions.

      '
    example_generator:
      contexts:
      - food and daily routines
      - entertainment and media
      - social interactions
      min_examples: 4
sub_rules:
- rule: Shall for suggestions (Shall I/we)
  type: pragmatic
  examples:
  - Shall we go
  - Shall I help you
  - Shall we dance
  - Shall I open the window
- rule: Shall for offers
  type: pragmatic
  examples:
  - Shall I carry that for you
  - Shall I make some tea
  - Shall I turn on the light
- rule: Shall for formal future (mainly British, first person)
  type: grammatical
  examples:
  - I shall return
  - We shall overcome
  - I shall be there at 8pm
use:
- name: Formal Future
  description: Express future plans in formal writing or speech.
  examples:
  - The conference shall take place in June.
  - I shall return next week.
  key_point: More common in British English formal contexts; rare in American English.
- name: Offers/Suggestions
  description: Make polite offers or suggestions (questions with 'shall I/we').
  examples:
  - Shall I open the door?
  - Shall we go to the cinema?
  key_point: Polite alternative to 'can I' or 'let's'.
- name: Legal/Official Obligations
  description: State mandatory rules in laws, contracts, or official documents.
  examples:
  - The tenant shall pay rent by the 1st.
  - All employees shall wear ID badges.
  key_point: Legally binding; 'shall' means 'must' in official contexts.
phonetics:
- note: 'Shall is pronounced /ʃæl/ (strong) or /ʃəl/ (weak). In questions, it is often
    weak: ''Shall we?'' → /ʃəl wiː/.'
  example_generator:
    contexts:
    - shall pronunciation
  l1_issue: Portuguese speakers may pronounce 'shall' as /ʃaʊl/ or /ʃeɪl/. Teach the
    correct pronunciation /ʃæl/.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Shall for offers/suggestions (Shall I/we...).'
  - 'Week 2: Shall for formal future/legal obligations.'
  - 'Week 3: Contrast with will/going to; highlight regional (British vs American)
    differences.'
  - 'Use legal text examples: Students rewrite ''must'' as ''shall'' in mock contracts.'
  recommended_activities:
  - name: Shall I
    duration: 10
    adaptation_notes: 'Students practice making offers with shall: ''Shall I open
      the window?'' ''Shall I help you?'' ''Shall we go?'''
  - name: Shall or Will
    duration: 10
    adaptation_notes: 'Students choose the correct form for different situations:
      suggestions (shall), promises (will), formal future (shall — BrE).'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
