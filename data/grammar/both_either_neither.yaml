grammar_point: both_either_neither
title: Both / Either / Neither
description: 'Quantifiers used to talk about two people or things: both (two together),
  either (one of two), neither (not one of two).'
level: A2
meaning:
  core_meaning: Both means two things together. Either means one of two (a choice).
    Neither means not one of two (negative choice).
  timeline: N/A ‚Äî these are quantifiers showing quantity or choice between two items.
  contrast: Both = two together. Either = one of two. Neither = not one of two.
  ccqs:
  - question: Both students passed the exam. Did one pass or two pass?
    answer: Two. Both always means the two together.
    purpose: Tests whether the learner can distinguish between 'both' (two together),
      'either' (one of two), and 'neither' (not one of two). These quantifiers have
      distinct meanings and grammatical requirements.
  - question: You can take either road. Can you take both roads?
    answer: No. Either means one of the two, not both.
    purpose: Tests whether the learner understands the difference between present
      ability (can) and past ability or polite possibility (could). This is important
      for expressing ability and making requests.
  - question: Neither restaurant is open. Is the first restaurant open? Is the second?
    answer: No. Neither restaurant is open. Both are closed.
    purpose: Tests whether the learner knows that superlatives require the definite
      article 'the'. Omitting the article is a common error, especially for learners
      from article-less L1s.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes:
    - Me neither is extremely common in informal spoken English
    - Either and neither take singular verbs in formal English
    min_examples: 5
form:
  affirmative:
    structure: Both + plural noun / Either + singular noun / Neither + singular noun
    example_generator:
    - Both students are here.
    - Either option works.
    - Neither student came.
    min_examples: 4
  negative:
    structure: Not + either / Neither (already negative, never add not)
    example_generator:
    - I do not like either.
    - I like neither.
    - Neither option suits me.
    min_examples: 4
  questions:
    structure: Are both...? / Do both...? / Is either...?
    example_generator:
    - Are both students coming?
    - Do both of you agree?
    - Is either option acceptable?
    min_examples: 4
sub_rules:
- rule: Both is always followed by a plural noun or pronoun, and the verb is plural
  type: grammatical
  examples:
  - Both dogs are friendly (correct)
  - Both dog is friendly (WRONG)
- rule: Either and neither are followed by a singular noun and take a singular verb
  type: grammatical
  examples:
  - Either option is fine (correct)
  - Neither student came (correct)
- rule: With either of and neither of, the noun must be plural but the verb is usually
    singular in formal English
  type: grammatical
  examples:
  - Either of the answers is correct (formal)
  - Either of the answers are correct (informal, common)
  - Neither of them was available
- rule: Me neither is a common informal short response to agree with a negative statement
  type: pragmatic
  examples:
  - I do not like spinach. ‚Äî Me neither.
  - I cannot swim. ‚Äî Neither can I.
- rule: Neither is already negative ‚Äî never use not with neither (double negative)
  type: grammatical
  examples:
  - I like neither (correct)
  - I do not like neither (WRONG ‚Äî double negative)
use:
- context: Showing agreement (both)
  examples:
  - Both Maria and Juan are teachers.
  - I like both movies.
  - They both passed the exam.
- context: Making choices (either)
  examples:
  - You can take either road.
  - Either answer is acceptable.
  - Sit on either side.
- context: Negative choices (neither)
  examples:
  - Neither option suits me.
  - I like neither team.
  - Neither restaurant is open.
phonetics:
- note: The th in both, either, neither is the voiced dental fricative /√∞/. The tongue
    tip touches the back of the upper teeth.
  example_generator:
  - both ‚Üí /b…ô ä√∞/
  - either ‚Üí /Ààa…™√∞…ô/
  - neither ‚Üí /Ààna…™√∞…ô/
  l1_issue: Many learners substitute /d/ or /z/ for /√∞/. Spanish speakers may use
    /d/; French and German speakers may use /z/ or /s/.
- note: 'Either and neither have first-syllable stress: /Ààa…™√∞…ô/ and /Ààna…™√∞…ô/. The
    second syllable is reduced to a schwa.'
  example_generator:
  - either ‚Üí /Ààa…™√∞…ô/
  - neither ‚Üí /Ààna…™√∞…ô/
  l1_issue: Some learners use second-syllable stress /a…™Àà√∞…ô/, which is a regional
    variant but can confuse.
teaching:
  methodology: PPP
  tips:
  - 'Use two real objects: ''Both pens are blue.'' ''Either pen works.'' ''Neither
    pen is red.'''
  - 'Practice with student pairs: ''Both Maria and You...'' makes it concrete.'
  - Teach 'Me neither' as a short response early ‚Äî very common in speech.
  - 'Contrast: all (3+) vs both (2) vs each (one by one).'
  recommended_activities:
  - name: Two Objects Three Words
    duration: 10
    adaptation_notes: Hold up two objects. Students make sentences using both, either,
      and neither.
  - name: Neither Do I
    duration: 15
    adaptation_notes: Students take turns making negative statements. The next student
      agrees using neither or me neither.
  - name: Either Or Decision Game
    duration: 15
    adaptation_notes: Present pairs of options. Students discuss using either and
      neither to make a group decision.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, ¬ß12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''either'' for two positive items: *''I like either coffee or tea.''
    (both)'
  correction: I like both coffee and tea.
  explanation: '''Both'' = two together. ''Either'' = one of two. ''Neither'' = not
    one or the other.'
  l1_groups:
  - Portuguese
  - Spanish
- error: 'Using ''neither'' without ''nor'': *''I like neither coffee.'''
  correction: I like neither coffee nor tea.
  explanation: '''Neither'' must be paired with ''nor''.'
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: '''Both/either/neither'' are neutral in register.'
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: 'These determiners specify quantity: ''Both books are good.'' / ''Either option
    works.'' / ''Neither answer is correct.'''
