grammar_point: causative_have_get
title: Causative Have and Get (Have/Get Something Done)
description: 'Structures used to describe arranging for someone else to do a task
  for you, rather than doing it yourself: ''have/get + object + past participle''.'
level: B1
meaning:
  core_meaning: Indicate that the subject arranges for someone else to perform an
    action, rather than doing it themselves.
  timeline: 'Present: have/has/get/gets + past participle. Past: had/got + past participle.
    Future: will have/get + past participle.'
  contrast: '''Have/get something done'' = arrange for others: "I had my car washed"
    (I paid someone to wash it)

    ''Do something yourself'' = active: "I washed my car" (I did it myself)

    ''Get'' is more informal than ''have'' in causative structures.

    '
  ccqs:
  - question: I had my hair cut. Did I cut my own hair?
    answer: No. Someone else cut it. You arranged for them to do it.
  - question: She got her car repaired. Did she repair it herself?
    answer: No. She arranged for someone else to repair it.
  - question: Is 'I had my house painted' the same as 'I painted my house'?
    answer: No. In the first sentence, someone else painted it. In the second, you
      did it yourself.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Have + object + past participle: "I had my hair cut." (arranged for
      someone to cut it)

      Get + object + past participle: "I got my car repaired." (more informal than
      have)

      Have + person + base verb: "I had the mechanic fix my car." (less common, informal)

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: 'Do/does/did not + have/get + object + past participle: ''I didn''t
      have my phone fixed.'' ''She doesn''t get her nails done often.'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Invert subject and auxiliary: ''Did you have your suit tailored?''
      ''Has she got her bike serviced?'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: The most common causative structure is have + object + past participle. The
    subject does not perform the action
  type: grammatical
  examples:
  - I had my hair cut yesterday
  - She had her car repaired
  - They had their house painted
- rule: Get + object + past participle means the same as have + object + past participle
    but is more informal
  type: grammatical
  examples:
  - I got my hair cut yesterday
  - She got her car fixed
  - They got the roof repaired
- rule: Another structure is have + person + base verb. This specifies who performed
    the action
  type: grammatical
  examples:
  - I had the mechanic check my car
  - She had her assistant book the tickets
  - They had the chef prepare a special meal
- rule: Get + person + to + base verb implies persuasion or effort. The person may
    have been reluctant
  type: grammatical
  examples:
  - I got the mechanic to check my car for free
  - She got her assistant to work late
  - They got the chef to make a vegan option
- rule: The causative can also describe things that happen to you without arranging
    them, often unpleasant events
  type: semantic
  examples:
  - I had my wallet stolen on the bus
  - She had her bag snatched
  - They had their car broken into
use:
- name: Arrange Services
  description: Hire professionals to perform tasks (repairs, grooming, maintenance).
  examples:
  - I had my computer upgraded.
  - She gets her hair dyed every 6 weeks.
  key_point: Most common use for daily services.
- name: Repairs and Maintenance
  description: Fix broken items or maintain property.
  examples:
  - We had the leak fixed.
  - He got his bike tuned up.
  key_point: Past participle of the action verb is required.
- name: Informal Requests (Get)
  description: More casual way to describe arranging tasks, common in spoken English.
  examples:
  - I got my friend to help me move.
  - She got her brother to fix the sink.
  key_point: Get is preferred in informal spoken contexts.
phonetics:
- note: 'In the causative structure, the past participle carries the main stress:
    ''I had my HAIR CUT.'' The focus is on what was done, not who did it.'
  example_generator:
    contexts:
    - causative stress patterns
  l1_issue: Learners may stress the wrong word, making the sentence sound unnatural.
    Drill the stress pattern.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Have something done (present/past forms).'
  - 'Week 2: Get something done (informal contrast).'
  - 'Week 3: Contrast causative with active voice (I washed car vs I had car washed).'
  - 'Use real-life scenarios: ''What services do you have done regularly? (haircut,
    car wash)'''
  recommended_activities:
  - name: Causative Chain
    duration: 15
    adaptation_notes: 'Students create a chain of causative sentences: ''I had my
      hair cut. I got my car fixed. I had my house painted.'''
  - name: Get Someone To
    duration: 15
    adaptation_notes: 'Students role-play persuading someone to do something: ''Can
      you get the teacher to extend the deadline?'''
  - name: What Happened To You
    duration: 10
    adaptation_notes: 'Students describe unfortunate events using the causative: ''I
      had my phone stolen. She had her bike taken.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for causative_have_get.
  correction: Correct form.
  explanation: This is a common error for causative_have_get.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
