grammar_point: prepositions_of_time
title: Prepositions of Time (in, on, at)
description: Words that show when an action happens. Critical for time clarity in
  English.
level: A1
meaning:
  core_meaning: 'Prepositions of time answer the question ''When?'' They show the
    relationship between an action and a time period. The correct preposition depends
    on how specific the time reference is: ''at'' for exact times, ''on'' for days
    and dates, ''in'' for longer periods.'
  timeline: Specific time points (at 3pm), days (on Monday), months/years (in 2023),
    duration (for 2 hours), starting point (since 2020).
  contrast: '''At'' = specific time (at 5pm, at noon) vs ''On'' = days/dates (on Monday,
    on July 4th) vs ''In'' = months/years/parts of day (in July, in 2023, in the morning)'
  ccqs:
  - question: Is this an exact time, a day, or a longer period?
    answer: Exact time = at. Day/date = on. Month/year/part of day = in.
    purpose: Tests whether the learner can distinguish between the three main categories
      of time prepositions. This is the foundational concept -- the granularity of
      the time reference determines the preposition.
  - question: Do we say 'in Monday' or 'on Monday'?
    answer: '''On Monday'' -- days always use ''on''.'
    purpose: Tests whether the learner knows the specific rule for days of the week.
      This is one of the most basic and frequently tested rules at A1 level.
  - question: What is the difference between 'for' and 'since'?
    answer: '''For'' = duration (for 2 hours). ''Since'' = starting point (since 2020).'
    purpose: Tests whether the learner can distinguish between duration (how long)
      and starting point (when began). This is essential for present perfect and is
      a common source of confusion across all L1 groups.
  example_generator:
    contexts:
    - daily routines
    - schedules and appointments
    - holidays and special days
    - seasons and months
    cultural_notes:
    - Use diverse cultural holidays and celebrations
    - Avoid assuming specific cultural practices
    - Keep examples concrete and relatable
    min_examples: 5
form:
  affirmative:
    structure: Subject + verb + preposition + time expression
    example_generator:
    - I work in the morning.
    - She arrived on Monday.
    - The class starts at 9am.
    - We have lived here for 5 years.
    - He has worked here since 2020.
    min_examples: 4
  negative:
    structure: Subject + don't/doesn't/didn't + verb + preposition + time
    example_generator:
    - I don't work in the morning.
    - She didn't arrive on Monday.
    - The class doesn't start at 9am.
    min_examples: 4
  questions:
    structure: Do/Does/Did + subject + verb + preposition + time?
    example_generator:
    - Do you work in the morning?
    - Did she arrive on Monday?
    - What time does the class start?
    min_examples: 4
sub_rules:
- rule: 'At: exact times (at 3pm, at noon, at midnight, at night, at the moment, at
    present)'
  type: grammatical
  examples:
  - at 8am
  - at 5:30
  - at noon
  - at midnight
  - at night
  - at the moment
- rule: 'On: days and dates (on Monday, on July 4th, on Christmas Day, on my birthday)'
  type: grammatical
  examples:
  - on Monday
  - on Tuesday morning
  - on July 4th
  - on Christmas Day
  - on my birthday
  - on weekends
- rule: 'In: months, years, seasons, parts of day (in July, in 2023, in the morning,
    in summer)'
  type: grammatical
  examples:
  - in July
  - in 2023
  - in the morning
  - in the afternoon
  - in the evening
  - in summer
  - in winter
- rule: 'Exception: ''at night'' (NOT ''in night''), ''at the weekend'' (British)
    / ''on the weekend'' (American)'
  type: grammatical
  examples:
  - at night
  - at the weekend (BrE)
  - on the weekend (AmE)
- rule: 'For: duration of time (for 2 hours, for 3 days, for a week, for years)'
  type: grammatical
  examples:
  - for 2 hours
  - for 3 days
  - for a week
  - for months
  - for years
- rule: 'Since: starting point in time (since 2020, since Monday, since I was a child)'
  type: grammatical
  examples:
  - since 2020
  - since Monday
  - since January
  - since I was a child
  - since last year
use:
- context: Daily routines
  description: Talking about when things happen regularly
  examples:
  - I wake up at 7am.
  - I have lunch at noon.
  - I go to bed at 11pm.
  - I exercise in the morning.
  - I relax in the evening.
- context: Schedules and appointments
  description: Talking about fixed times
  examples:
  - The class starts at 9am.
  - The meeting is on Monday.
  - The flight leaves at 6pm.
  - The doctor's appointment is on Wednesday at 2pm.
- context: Holidays and special days
  examples:
  - We celebrate on Christmas Day.
  - The party is on Saturday.
  - I was born on July 4th.
  - We have a holiday on Independence Day.
- context: Duration and starting points
  examples:
  - I have lived here for 5 years.
  - She has worked here since 2020.
  - We have been waiting for 2 hours.
  - He has known her since childhood.
phonetics:
- note: 'Prepositions of time are usually unstressed in connected speech: ''at'' →
    /ət/, ''on'' → /ɒn/, ''in'' → /ɪn/. ''I work in the morning'' sounds like /aɪ
    wɜːk ɪn ðə mɔːnɪŋ/.'
  example_generator:
  - at /ət/
  - on /ɒn/
  - in /ɪn/
  - for /fə/
  - since /sɪns/
  l1_issue: Portuguese and Spanish speakers often over-pronounce prepositions. Teach
    the weak forms for natural speech.
- note: 'Contractions with ''at'': ''What time''s it at?'' /wɒts ɪt ət/. The preposition
    often comes at the end of questions in informal speech.'
  example_generator:
  - What time is it at? /wɒts ɪt ət/
  - Where are you at? /weər ɑːr juː ət/
  l1_issue: Many L1 speakers are taught that prepositions should not end sentences.
    Explain that in informal spoken English, this is very common.
teaching:
  methodology: PPP with visual timelines and calendars
  tips:
  - Use a clock for 'at' times, a calendar for 'on' days, and a timeline for 'in'
    periods. Visual aids make the rules concrete.
  - 'Drill with schedules: ''The bus leaves at 8am on Monday in July.'' This practices
    all three prepositions in one sentence.'
  - 'Contrast ''for'' and ''since'' with timelines: ''for'' = a line (duration), ''since''
    = a point (starting point).'
  - 'Use real examples from students'' lives: ''What time do you wake up? When is
    your birthday? How long have you studied English?'''
  - 'Teach the exception: ''at night'' (NOT ''in night''). This is a very common error.'
  recommended_activities:
  - name: At, On, or In?
    duration: 10
    adaptation_notes: 'Teacher says a time expression. Students choose the correct
      preposition: ''___ Monday'' (on), ''___ 3pm'' (at), ''___ July'' (in). Practices
      choosing the right preposition.'
  - name: Daily Routine Interview
    duration: 15
    adaptation_notes: 'Students ask about each other''s daily routines: ''What time
      do you wake up?'' ''I wake up at 7am.'' ''When do you exercise?'' ''I exercise
      in the morning.'' Practices prepositions of time in context.'
  - name: For or Since?
    duration: 10
    adaptation_notes: 'Teacher says a time expression. Students choose ''for'' or
      ''since'': ''___ 2 hours'' (for), ''___ 2020'' (since), ''___ Monday'' (since),
      ''___ a week'' (for).'
  - name: Calendar Game
    duration: 15
    adaptation_notes: 'Students ask about each other''s schedules: ''When is your
      birthday?'' ''It''s on July 4th.'' ''When do you have English class?'' ''It''s
      on Monday at 9am.'' Practices prepositions with real dates and times.'
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 15:
    Prepositions, §15.5-15.7'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 7: Prepositions and Prepositional Phrases, §7.3 (temporal prepositions)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 240-255 (prepositions
    of time: at, in, on, for, since, during)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    14: Prepositions, §14.5-14.7'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 10: Prepositions of time'
common_errors:
- error: 'Using ''in'' with days: *''I see him in Monday.'''
  correction: I see him on Monday.
  explanation: Use 'on' with days, 'in' with months/years, 'at' with times.
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: Prepositions of time are consistent across registers.
- note: 'In formal writing, ''on'' is used with specific dates: ''On the 15th of March.'''
dialectal_variation:
- note: BrE uses 'at the weekend'; AmE uses 'on the weekend'.
- note: BrE uses 'in hospital'; AmE uses 'in the hospital'.
discourse_notes:
- note: 'Prepositions of time create temporal cohesion: ''In 2020, the pandemic began.
    By March, schools had closed.'''
- note: '''At'', ''on'', ''in'' form a hierarchy of specificity: at 3pm, on Monday,
    in March.'
