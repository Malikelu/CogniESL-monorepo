grammar_point: distancing
title: Distancing Structures
description: Structures used to report information without the speaker committing
  to its truth, often found in journalism, academic writing, and formal speech.
level: B2
meaning:
  core_meaning: Distancing structures allow speakers and writers to present information
    as hearsay, rumour, or general belief without personally vouching for its accuracy.
    The speaker distances themselves from the claim.
  timeline: Varies — distancing can refer to past, present, or future events depending
    on the tense used.
  contrast: Direct = The economy is improving. Distanced = It is said that the economy
    is improving. / The economy is said to be improving.
  ccqs:
  - question: Does the speaker confirm that this information is true?
    answer: No, the speaker is distancing themselves from the claim.
  - question: Could you add 'according to some people' or 'reportedly' to this sentence?
    answer: Yes, that is the function of distancing structures.
  example_generator:
    contexts:
    - news reporting
    - academic hedging
    - gossip and rumour
    - formal announcements
    cultural_notes:
    - Distancing is a key feature of journalistic objectivity
    - In academic writing, distancing structures help writers avoid overgeneralisation
    min_examples: 5
form:
  affirmative:
    structure: 'It + be + past participle + that + clause: It is believed that...
      / Subject + be + past participle + to-infinitive: He is said to...'
    example_generator:
      contexts:
      - news reports
      - academic writing
      - formal statements
      min_examples: 4
  negative:
    structure: 'It + be + not + past participle + that + clause: It is not thought
      that... / Subject + be + not + past participle + to-infinitive: He is not believed
      to...'
    example_generator:
      contexts:
      - denying rumours
      - correcting misinformation
      min_examples: 3
  questions:
    structure: Is it true that...? / Is it believed that...? / Is he thought to...?
    example_generator:
      contexts:
      - checking information
      - expressing doubt
      min_examples: 3
sub_rules:
- rule: 'Impersonal passive with ''it'': It is said/believed/thought/reported/rumoured/claimed/understood
    + that clause'
  type: grammatical
  examples:
  - It is said that she is the best surgeon in the country.
  - It is believed that the ancient city was destroyed by an earthquake.
  - It has been reported that three people were injured in the accident.
- rule: 'Personal passive with subject: Subject + is/was + said/believed/thought/reported
    + to-infinitive'
  type: grammatical
  examples:
  - She is said to be the best surgeon in the country.
  - He was believed to have left the country.
  - They are thought to be living abroad.
- rule: 'Perfect infinitive for prior events: Subject + is/was + said + to have +
    past participle'
  type: grammatical
  examples:
  - He is said to have resigned last week.
  - She was believed to have been working undercover.
  - They are thought to have fled the country.
- rule: 'Modal distancing: apparently, reportedly, allegedly, supposedly, ostensibly'
  type: lexical
  examples:
  - He allegedly stole the documents.
  - She reportedly earns over a million a year.
  - The building supposedly dates back to the 15th century.
- rule: 'Hedging with ''seem'', ''appear'', ''tend'': It seems that... / He appears
    to... / They tend to...'
  type: lexical
  examples:
  - It seems that the meeting has been postponed.
  - She appears to have changed her mind.
  - People tend to underestimate the difficulty.
use:
- context: News reporting
  description: Journalists use distancing to report unverified information and protect
    themselves legally.
  examples:
  - It is reported that the Prime Minister will resign tomorrow.
  - The suspect is believed to be armed and dangerous.
  - Three people are said to have been killed in the explosion.
- context: Academic writing
  description: Researchers use distancing to present findings cautiously and avoid
    overclaiming.
  examples:
  - It has been suggested that climate change may accelerate beyond current predictions.
  - The results appear to support the initial hypothesis.
  - This phenomenon is thought to be caused by a combination of factors.
- context: Gossip and informal speech
  description: Speakers use distancing to share rumours without taking responsibility.
  examples:
  - Apparently, they are getting divorced.
  - He is supposed to have a secret second family.
  - It is rumoured that the company is going bankrupt.
- context: Legal and official statements
  description: Officials use distancing to present sensitive information carefully.
  examples:
  - It has been alleged that funds were misappropriated.
  - The minister is understood to be considering his position.
  - It is not thought that any staff were at risk.
phonetics:
- note: Distancing structures in speech are often accompanied by a slight pause and
    a change in intonation, signalling the speaker's detachment.
  example_generator:
    contexts:
    - news broadcasts
    - formal announcements
  l1_issue: Learners may not use distancing structures, making their statements sound
    overly direct or committed.
- note: Words like 'allegedly' and 'reportedly' carry stress to emphasise the unverified
    nature of the information.
  example_generator:
    contexts:
    - spoken news
    - gossip
  l1_issue: Speakers may place these adverbs in the wrong position within the sentence.
teaching:
  methodology: Guided discovery
  tips:
  - Use real news articles to show how journalists use distancing to report unconfirmed
    stories.
  - Compare direct statements with distanced versions to highlight the difference
    in commitment.
  - Practice transforming active sentences into passive distancing structures.
  - Discuss why distancing matters — legal protection, academic caution, politeness.
  recommended_activities:
  - name: News Reporter Role-Play
    duration: 15
    adaptation_notes: Students report 'breaking news' using distancing structures
      to avoid committing to unverified facts.
  - name: Direct to Distanced
    duration: 10
    adaptation_notes: Students rewrite direct statements as distanced reports, practising
      both impersonal and personal passive forms.
  - name: Rumour Mill
    duration: 10
    adaptation_notes: Students spread classroom 'rumours' using distancing language
      (apparently, reportedly, it is said that...).
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for distancing.
  correction: Correct form.
  explanation: This is a common error for distancing.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
