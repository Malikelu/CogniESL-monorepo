grammar_point: verbs_followed_by_bare_infinitive
title: Verbs Followed by Bare Infinitive (make, let, help)
description: Verbs that are followed by base form without 'to'. Essential for accurate
  verb patterns with causatives and modals.
level: B1
meaning:
  core_meaning: These verbs take the base form (no 'to', no -ing). Causatives (make/let)
    show cause; modals show ability/permission/obligation.
  timeline: 'Modal verbs don''t show tense (use context): ''I can go'' (present) vs
    ''I could go'' (past/polite).'
  contrast: '''Make/let'' + base (correct) vs ''make/let'' + to (wrong)

    ''Can/could'' + base (correct) vs ''can'' + to (wrong)

    ''Help'' can take base OR ''to'' (both correct)

    '
  ccqs:
  - question: Which verbs are followed by bare infinitive
    answer: Let, make, help, and modals (can, should, must, etc.).
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Verb + object + base verb: "I made him go."

      Modal verbs + base verb: "I can go."

      Common verbs: make, let, help (also: see, hear, watch, feel)

      Modal verbs: can, could, will, would, shall, should, may, might, must

      '
    example_generator:
      contexts:
      - sports and hobbies
      min_examples: 4
  negative:
    structure: 'Modal + not + base verb: ''I cannot swim.'' Verb + object + not +
      base verb: ''I made him not go.'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Modal verb first: ''Can you swim?'' Verb + object: ''Did you make
      him go?'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Let, make, help followed by bare infinitive (without to)
  type: grammatical
  examples:
  - Let me help you
  - She made him apologize
  - He helped me carry the bags
  - My parents let me stay out late
- rule: All modals (can, should, must, will, would, may, might, could, shall) followed
    by bare infinitive
  type: grammatical
  examples:
  - I can swim
  - You should study
  - He must leave
  - She will come
  - They might agree
- rule: Had better and would rather are also followed by bare infinitive
  type: grammatical
  examples:
  - You had better study
  - I would rather stay home
  - She had better not be late
use:
- name: Causatives (make, let, have)
  description: Cause someone to do something.
  examples:
  - I made him clean.
  - Let me try.
  - I had him fix it.
  key_point: Make = force; let = allow; have = arrange for (all + base form).
- name: Modals (can, must, should, etc.)
  description: Show ability, permission, obligation, possibility.
  examples:
  - I can swim.
  - You must go.
  - She should try.
  key_point: ALL modals take base form (no 'to', no -ing, no -s).
- name: Perception Verbs (see, hear, watch, feel)
  description: Verbs of sensing + object + base form.
  examples:
  - I saw him leave.
  - She heard him sing.
  - We watched them play.
  key_point: Base form = complete action; -ing = ongoing action.
phonetics:
- note: 'After bare infinitive verbs, the main verb carries the stress: ''Let me HELP
    you.'' ''She made him apoloGIZE.'' The causative verb is less stressed.'
  example_generator:
    contexts:
    - bare infinitive stress
  l1_issue: Learners may add 'to' after these verbs. Teach that let, make, help, and
    modals are followed by the base verb without to.
teaching:
  methodology: PPP
  tips:
  - 'Chant modals: ''can, could, will, would, shall, should, may, might, must'' -
    all + base form.'
  - 'Practice ''make/let'' with classroom: ''The teacher made us study.'' ''Let''s
    go!'''
  - 'Show ''see + base'' (complete) vs ''see + -ing'' (ongoing): ''I saw him cross''
    vs ''I saw him crossing''.'
  recommended_activities:
  - name: Bare or To
    duration: 10
    adaptation_notes: 'Students choose: ''She made him (to) apologize.'' (bare) ''She
      wanted him (to) apologize.'' (to).'
  - name: Classroom Commands
    duration: 15
    adaptation_notes: 'Students practice using let and make: ''Let us take a break.''
      ''Make your partner repeat the sentence.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
