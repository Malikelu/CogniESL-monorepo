grammar_point: indefinite_pronouns
title: Indefinite Pronouns
description: 'Pronouns that refer to non-specific people or things: someone, anyone,
  everyone, no one, something, anything, everything, nothing.'
level: A2
meaning:
  core_meaning: Indefinite pronouns refer to people or things without specifying who
    or what exactly.
  timeline: Timeless — the reference is general, not specific.
  contrast: '''Indefinite pronoun'' = ''Someone called.'' (I don''t know who) vs ''Definite''
    = ''Maria called.'' (specific person)'
  ccqs:
  - question: Does this pronoun refer to a specific person?
    answer: No — it refers to an unspecified person or people.
    purpose: Tests whether the learner understands that indefinite pronouns (someone,
      anyone, everyone, no one) refer to unspecified people.
  - question: Is this affirmative, negative, or a question?
    answer: 'It determines which pronoun to use: some- (affirmative), any- (negative/questions),
      no- (negative), every- (universal).'
    purpose: Tests whether the learner can choose the correct indefinite pronoun based
      on sentence type.
  - question: Is the verb singular or plural?
    answer: Singular — indefinite pronouns take singular verbs.
    purpose: Tests whether the learner understands that indefinite pronouns are grammatically
      singular and require singular verbs.
  example_generator:
    contexts:
    - describing unknown people
    - talking about things
    - making general statements
    - questions and negatives
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Indefinite pronoun + verb: ''Someone is here.'', ''Everything is ready.'''
    example_generator:
      contexts:
      - describing unknown people
      - talking about things
      - making general statements
      min_examples: 4
  negative:
    structure: 'Use ''any-'' forms: ''Nobody came.'', ''Nothing happened.'' / ''Not...any-'':
      ''I didn''t see anyone.'''
    example_generator:
      contexts:
      - describing unknown people
      - talking about things
      - making general statements
      min_examples: 4
  questions:
    structure: 'Use ''any-'' forms: ''Did anyone call?'', ''Is anything wrong?'''
    example_generator:
      contexts:
      - describing unknown people
      - talking about things
      - making general statements
      min_examples: 4
sub_rules:
- rule: Some- for positive, Any- for questions and negatives
  type: grammatical
  examples:
  - Someone called. (positive)
  - Did anyone call? (question)
  - Nobody called. (negative)
- rule: Indefinite pronouns take singular verbs
  type: grammatical
  examples:
  - Everyone is here. ✅ / Everyone are here. ❌
- rule: Someone = positive, Anyone = question/negative, No one = negative
  type: grammatical
  examples:
  - I saw someone.
  - Did you see anyone?
  - I saw no one.
use:
- context: Describing unknown people
  description: When you don't know or don't want to say who
  examples:
  - Someone knocked on the door.
  - Everybody loves chocolate.
- context: Making general statements
  description: Talking about things in general
  examples:
  - Everything is fine.
  - Nothing is impossible.
phonetics:
- note: 'Stress on first syllable: /ˈsʌmwʌn/, /ˈeniwʌn/'
  contexts:
  - pronunciation
  l1_issue: Some L1 speakers stress the wrong syllable
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Contrast some- vs any- explicitly
  - Use real situations (knocking on door, finding something)
  recommended_activities:
  - name: Mystery Person
    duration: 10
    adaptation_notes: Students describe unknown people using indefinite pronouns.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, 12.16-12.17'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 5: Nouns and Noun Phrases, 5.8 (indefinite pronouns)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 490-515 (indefinite
    pronouns: some-, any-, every-, no- compounds)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    11: Pronouns, 11.4-11.5'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 6: Indefinite pronouns'
common_errors:
- error: '*Everyone are here.*'
  correction: Everyone is here.
  explanation: Indefinite pronouns (everyone, everybody, each, somebody) take singular
    verbs. This is one of the most common errors at A2-B1.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Arabic
register_notes:
- note: Indefinite pronouns are neutral in register.
- note: 'In formal writing, singular indefinite pronouns take singular verbs: ''Everyone
    has...'''
- note: In conversation, 'somebody' and 'someone' are interchangeable.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: 'In conversation, indefinite pronouns are used for vague reference: ''Someone
    left their bag.'''
- note: 'In academic writing, indefinite pronouns appear in generalizations: ''Everyone
    has the right to education.'''
- note: 'In informal speech, singular ''they'' is used: ''Someone left their bag.'''
