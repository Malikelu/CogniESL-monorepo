grammar_point: other_expressions
title: Other Future Expressions (present continuous, future perfect, future continuous)
description: Alternative structures to talk about future events, including present
  continuous for fixed arrangements, future perfect for completed actions by a future
  time, and future continuous for ongoing future actions.
level: B1
meaning:
  core_meaning: 'Different future structures emphasize different aspects: fixed arrangements
    (present continuous), completed actions by a future time (future perfect), or
    ongoing actions at a future time (future continuous).'
  timeline: 'Present continuous: Future time with fixed plan (arranged with others)

    Future perfect: Action completed before a specific future time

    Future continuous: Action in progress at a specific future time

    '
  contrast: 'Present continuous (future) = Fixed arrangement with others: "I''m meeting
    John at 5" (arranged)

    Be going to = Personal plan: "I''m going to meet John next week" (personal plan,
    not fixed yet)

    Future perfect = Completed by X time: "I''ll have eaten by 7 PM"

    Future continuous = In progress at X time: "I''ll be eating at 7 PM"

    '
  ccqs:
  - question: What type of expressions are covered here
    answer: Common fixed expressions and idiomatic phrases.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Present continuous (fixed arrangements): Subject + am/is/are + verb-ing
      (with future time marker)

      Future perfect: Subject + will + have + past participle

      Future continuous: Subject + will + be + verb-ing

      '
    example_generator:
      contexts:
      - work and professional life
      - social interactions
      min_examples: 4
  negative:
    structure: 'Present continuous: Subject + am/is/are + not + verb-ing

      Future perfect: Subject + will + not + have + past participle

      Future continuous: Subject + will + not + be + verb-ing

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Present continuous: Am/Is/Are + subject + verb-ing?

      Future perfect: Will + subject + have + past participle?

      Future continuous: Will + subject + be + verb-ing?

      '
    example_generator:
      contexts:
      - health and wellbeing
      min_examples: 4
sub_rules:
- rule: Fixed expressions must be learned as chunks — the grammar may not follow normal
    rules
  type: lexical
  examples:
  - by the way (NOT by the road)
  - as a matter of fact (NOT as a matter of the fact)
  - in spite of (NOT in spite for)
  - it is high time (NOT it is high hour)
- rule: 'Register awareness: know when each expression is appropriate'
  type: pragmatic
  examples:
  - 'Formal: ''I am writing to inform you that...'''
  - 'Informal: ''Just wanted to let you know that...'''
  - 'Neutral: ''I wanted to tell you that...'''
use:
- name: Fixed Arrangements (Present Continuous)
  description: Talk about future events arranged with other people (confirmed plans).
  examples:
  - I am having dinner with my parents tonight.
  - She is taking the train to London tomorrow.
  key_point: Requires a future time marker and confirmation with others.
- name: Completed Actions by Future Time (Future Perfect)
  description: Talk about actions that will be finished before a specific future moment.
  examples:
  - By the time you arrive, I will have cleaned the house.
  - We will have saved enough money by December.
  key_point: Always use with a 'by [time]' phrase.
- name: Ongoing Future Actions (Future Continuous)
  description: Talk about actions that will be in progress at a specific future time.
  examples:
  - This time tomorrow, I will be flying to New York.
  - At 8 PM, we will be watching a movie.
  key_point: Focuses on the action being in progress, not completed.
phonetics:
- note: 'Fixed expressions are often pronounced as chunks: ''by the way'' → /baɪ ðə
    weɪ/, ''as a matter of fact'' → /əz ə ˈmætər əv fækt/.'
  example_generator:
    contexts:
    - fixed expression chunks
  l1_issue: Learners may pronounce each word separately, sounding stilted. Teach fixed
    expressions as single units.
teaching:
  methodology: PPP
  tips:
  - 'Use a class calendar: Mark fixed arrangements (present continuous), deadlines
    (future perfect), and scheduled activities (future continuous).'
  - 'Role-play: Student A makes a fixed arrangement, Student B uses present continuous
    to confirm.'
  - 'Timeline practice: Draw a line with ''now'' and ''future time'' to mark completed
    (future perfect) vs in-progress (future continuous) actions.'
  - Contrast with be going to/will using real class examples.
  recommended_activities:
  - name: Expression Matching
    duration: 10
    adaptation_notes: Students match expressions to their meanings and appropriate
      contexts.
  - name: Context Practice
    duration: 15
    adaptation_notes: Students practice using expressions in appropriate formal and
      informal contexts.
