grammar_point: modals_overview
title: Modal Verbs Overview (All Functions & Levels)
description: Comprehensive overview of all modal verbs, their functions, CEFR levels
  (A2-C1), and common uses. Serves as a teacher reference.
level: A2-C1
meaning:
  core_meaning: 'Modals express speaker attitude: ability, permission, possibility,
    obligation, prediction, deduction, or request.'
  timeline: 'Present: can, may, will, must; Past: could, might, would, should; Future:
    will, shall'
  contrast: Each modal has unique functions; no two modals are identical in all contexts.
  ccqs:
  - question: What do modal verbs express
    answer: Modals express ability, permission, obligation, possibility, and advice.
  - question: Do modals change form for he/she/it
    answer: No. Modals never add -s for third person singular.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + modal + base verb (no to, no -s): ''I can swim'', ''She
      might come'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: 'Subject + modal + not + base verb: ''I can''t swim'', ''She might
      not come'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Modal + subject + base verb: ''Can you swim?'', ''Might she come?'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Modals never change form for third person singular — no -s ending
  type: grammatical
  examples:
  - He can swim (NOT He cans swim)
  - She must go (NOT She musts go)
  - It will rain (NOT It wills rain)
- rule: Modals are followed by the base form of the verb without to
  type: grammatical
  examples:
  - I can swim (NOT I can to swim)
  - She must go (NOT She must to go)
  - They should study (NOT They should to study)
- rule: 'Common modals: can (ability), could (past ability), may (permission), might
    (possibility), will (future), would (conditional), shall (suggestion), should
    (advice), must (obligation)'
  type: lexical
  examples:
  - I can help you
  - She could swim when she was 5
  - You may leave now
  - It might rain
  - I will call you
  - I would go if I had time
  - Shall we dance?
  - You should study
  - You must wear a seatbelt
use:
- name: Ability (can, could)
  level: A2
  description: Present/past ability.
  examples:
  - I can swim.
  - I could swim when I was 10.
  key_point: Could for past ability, can for present.
- name: Permission (can, may, could)
  level: A2
  description: Ask/give permission.
  examples:
  - Can I go?
  - May I enter?
  key_point: May is more formal than can.
- name: Possibility (may, might, could)
  level: B1
  description: Likelihood of events.
  examples:
  - It may rain.
  - It could be true.
  key_point: Might is less certain than may.
- name: Obligation (must, should, ought to)
  level: A2-B1
  description: Duty/necessity.
  examples:
  - You must wear a helmet.
  - You should study.
  key_point: Must is stronger than should.
- name: Prediction (will, shall)
  level: A2
  description: Future events.
  examples:
  - It will rain tomorrow.
  - We shall overcome.
  key_point: Shall is formal, mostly British English.
- name: Deduction (must, can't)
  level: B2
  description: Logical conclusion.
  examples:
  - He must be tired.
  - She can't be at home.
  key_point: Must = positive deduction, can't = negative deduction.
phonetics:
- note: 'Modal verbs are usually unstressed in connected speech: ''I can go'' → /aɪ
    kən ɡəʊ/, ''She must leave'' → /ʃi məst liːv/. The stress falls on the main verb.'
  example_generator:
    contexts:
    - modal reduction
  l1_issue: Learners may over-pronounce modals, making their speech sound unnatural.
    Teach the weak forms.
teaching:
  methodology: PPP
  tips:
  - Map modals by function and level for staged teaching.
  - 'Use color-coded charts: green for ability, blue for permission, etc.'
  - Practice deduction modals (must/can't) with mystery scenarios.
  recommended_activities:
  - name: Modal Verb Sorting
    duration: 10
    adaptation_notes: 'Students sort modals by function: ability, permission, obligation,
      possibility, advice.'
  - name: Modal Gap Fill
    duration: 15
    adaptation_notes: 'Students complete sentences with the correct modal: ''You ___
      wear a seatbelt.'' (must) ''She ___ swim when she was 5.'' (could).'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
