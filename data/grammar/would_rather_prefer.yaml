grammar_point: would_rather_prefer
title: Would Rather and Would Prefer (Preferences)
description: Expressing preferences using 'would rather' (followed by base verb) and
  'would prefer' (followed by to + verb or -ing) for present/future choices.
level: B1
meaning:
  core_meaning: Express personal preferences for one option over another in present/future
    situations.
  timeline: 'Present/Future: Refers to current or future preferences (not past).'
  contrast: 'Would Rather: followed by base verb: "I''d rather go."

    Would Prefer: followed by to + verb/-ing: "I''d prefer to go." / "I''d prefer
    going."

    '
  ccqs:
  - question: I ___ rather stay home than go out. (would / do)
    answer: 'would — ''would rather'' expresses a preference. The structure is: would
      rather + base verb.'
  - question: 'Which is more informal: ''I would rather go'' or ''I would prefer to
      go''?'
    answer: '''I would rather go'' is more informal. ''I would prefer to go'' is more
      formal and polite.'
  - question: Can we say 'I would rather to go'?
    answer: No — 'would rather' is followed by the base verb WITHOUT to. 'I would
      rather go' NOT 'I would rather to go.'
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Would Rather: Subject + would rather + Base Verb: "I would rather
      stay home than go out."

      Would Prefer: Subject + would prefer + to + Verb (or -ing): "I would prefer
      to stay home." / "I would prefer staying home."

      Contraction: ''d rather / ''d prefer (I''d rather, She''d prefer)

      '
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
  negative:
    structure: 'Would Rather: Subject + would rather + not + Base Verb: "I would rather
      not go."

      Would Prefer: Subject + would prefer + not + to + Verb: "I would prefer not
      to go."

      '
    example_generator:
      contexts:
      - work and professional life
      - food and daily routines
      min_examples: 4
  questions:
    structure: 'Would Rather: Would + Subject + rather + Base Verb: "Would you rather
      stay or go?"

      Would Prefer: Would + Subject + prefer + to + Verb: "Would you prefer to stay
      or go?"

      '
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
sub_rules:
- rule: Would rather is more informal than would prefer
  type: register
  examples:
  - I would rather go (informal)
  - I would prefer to go (formal)
  - She would rather stay (informal)
  - She would prefer to stay (formal)
- rule: Would rather + base verb (without to)
  type: grammatical
  examples:
  - I would rather go
  - She would rather stay
  - They would rather wait
- rule: Would prefer + to + base verb
  type: grammatical
  examples:
  - I would prefer to go
  - She would prefer to stay
  - They would prefer to wait
use:
- name: Present/Future Preferences
  description: Express what you want to do now or in the future.
  examples:
  - I'd rather drink coffee than tea.
  - She'd prefer to go to the beach.
  key_point: Both refer to present/future, not past.
- name: Choice Between Two Options
  description: 'Use ''than'' after would rather, ''to'' after would prefer: ''I''d
    rather A than B'' / ''I''d prefer A to B''.'
  examples:
  - I'd rather read than watch TV.
  - I'd prefer reading to watching TV.
  key_point: Than (would rather) vs To (would prefer) for comparisons.
- name: Polite Preferences
  description: Soften requests or preferences in social situations.
  examples:
  - I'd rather not discuss this now.
  - We'd prefer to sit inside, please.
  key_point: More polite than 'I want' or 'I like'.
phonetics:
- note: 'Would rather is often contracted: ''I''d rather'' /aɪd ˈrɑːðə/. Would prefer
    is contracted: ''I''d prefer'' /aɪd prɪˈfɜː/.'
  example_generator:
    contexts:
    - would rather prefer contraction
  l1_issue: Learners may confuse would rather and would prefer. Teach that rather
    takes the base verb (no to) while prefer takes to + verb.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Would rather + base verb (I''d rather stay).'
  - 'Week 2: Would prefer + to + verb/-ing (I''d prefer to stay).'
  - 'Week 3: Comparisons (than vs to) and polite use.'
  - 'Use role-play: Students order food using ''I''d rather'' and ''I''d prefer''.'
  recommended_activities:
  - name: Formal or Informal
    duration: 10
    adaptation_notes: 'Students rewrite sentences changing the level of formality:
      ''I would rather go'' (informal) → ''I would prefer to go'' (formal).'
  - name: Preference Practice
    duration: 15
    adaptation_notes: 'Students practice expressing preferences: ''Would you rather
      stay in or go out?'' ''I would rather stay in.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for would_rather_prefer.
  correction: Correct form.
  explanation: This is a common error for would_rather_prefer.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
