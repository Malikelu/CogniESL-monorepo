grammar_point: present_perfect_resultative
title: Present Perfect — Resultative Use (Past Action with Present Result)
description: The present perfect used to express a completed past action whose result
  is visible or relevant in the present moment. The focus is on the current state,
  not the past event itself.
level: B1
meaning:
  core_meaning: The resultative present perfect describes a past action that has produced
    a present state. The action is completed, but its consequences are felt now. The
    speaker is looking back from the present at something that has changed the current
    situation.
  timeline: Past action → Present result. The action happened at an unspecified time
    before now, and its effect is visible or relevant at the moment of speaking.
  contrast: 'Present perfect resultative: ''I have lost my keys'' (I still cannot
    find them now). Past simple: ''I lost my keys'' (a past event — I may have found
    them since). Present perfect resultative focuses on the current situation; past
    simple focuses on the past event.'
  ccqs:
  - question: If I say 'I have broken my leg,' can you see the result now?
    answer: Yes — the leg is still broken. The present result is visible.
  - question: Can I say 'I have broken my leg in 1995'?
    answer: 'No — adding a specific past time (''in 1995'') forces the past simple:
      ''I broke my leg in 1995.'' The resultative present perfect cannot be used with
      definite past time expressions.'
  - question: What is the difference between 'She has gone to Paris' and 'She went
      to Paris'?
    answer: '''She has gone to Paris'' means she is still there (or at least has not
      returned yet). ''She went to Paris'' simply reports a past event — she may have
      returned by now.'
  example_generator:
    contexts:
    - everyday conversation
    - news reports
    - medical consultations
    - customer service
    - describing changes
    cultural_notes:
    - 'British English uses the present perfect more consistently for resultative
      meaning than American English, where the past simple is often acceptable: ''I
      just ate'' (AmE) vs ''I have just eaten'' (BrE).'
    - In many languages (e.g., German, French), a different tense or construction
      is used for this meaning, which causes interference errors.
    min_examples: 5
form:
  affirmative:
    structure: Subject + have/has + past participle. The resultative meaning is conveyed
      by context — the structure is the same as other present perfect uses, but the
      focus is on the present state resulting from the past action.
    example_generator:
      contexts:
      - describing current states
      - reporting recent changes
      - explaining present situations
      min_examples: 4
  negative:
    structure: 'Subject + have/has + not + past participle. The negative resultative
      means the expected result has not been achieved: ''I have not finished the report''
      (it is still incomplete), ''She has not replied to my email'' (I am still waiting).'
    example_generator:
      contexts:
      - reporting incomplete tasks
      - describing unchanged situations
      - expressing frustration
      min_examples: 3
  questions:
    structure: 'Have/Has + subject + past participle? Used to check whether a result
      has been achieved: ''Have you finished your homework?'' (Is it done now?), ''Has
      the post arrived yet?'' (Is there post here now?)'
    example_generator:
      contexts:
      - checking completion
      - enquiring about results
      - confirming changes
      min_examples: 3
sub_rules:
- rule: Resultative with 'lost,' 'broken,' 'fallen,' 'dropped' — physical results
  type: semantic
  examples:
  - I have lost my wallet. (I cannot find it now.)
  - She has broken her arm. (It is still in a cast.)
  - The vase has fallen off the shelf. (It is on the floor now.)
  - He has dropped his phone. (It is on the ground.)
- rule: Resultative with 'gone,' 'left,' 'arrived,' 'come' — change of location
  type: semantic
  examples:
  - She has gone to the shops. (She is still there.)
  - The bus has already left. (We missed it.)
  - Has the train arrived yet? (Is it at the station now?)
  - My parents have come to visit. (They are here now.)
- rule: Resultative with 'finished,' 'completed,' 'done' — task completion
  type: semantic
  examples:
  - I have finished the report. (It is ready now.)
  - Have you done your homework? (Is it complete?)
  - She has completed the course. (She has the certificate now.)
- rule: Resultative with 'changed,' 'improved,' 'deteriorated' — change of state
  type: semantic
  examples:
  - The weather has improved. (It is nice now.)
  - His English has got much better. (He speaks well now.)
  - The situation has changed completely. (It is different now.)
- rule: Resultative with 'just,' 'already,' 'yet' — temporal markers
  type: grammatical
  examples:
  - I have just arrived. (A moment ago — I am here now.)
  - She has already left. (She is not here now.)
  - Have you finished yet? (Is it done at this point?)
use:
- context: Describing visible present results
  description: The speaker points to a current state and explains it with a past action.
  examples:
  - I have cut my finger. (You can see the blood.)
  - Someone has broken the window. (The glass is on the floor.)
  - The dog has dug up the garden. (There are holes everywhere.)
- context: Reporting news and recent events
  description: News reports use the resultative present perfect to announce events
    whose consequences are still unfolding.
  examples:
  - The Prime Minister has resigned. (The position is now vacant.)
  - A tornado has hit the town. (The damage is visible now.)
  - Scientists have discovered a new species. (It is now known to science.)
- context: Explaining current situations
  description: The speaker explains why things are the way they are now.
  examples:
  - I cannot drive — I have lost my licence.
  - She is not here. She has gone to the dentist.
  - We have run out of milk. I will go to the shop.
- context: Checking completion and progress
  description: Used to ask whether a task has been completed and the result is available.
  examples:
  - Have you booked the tickets?
  - Has the doctor called back yet?
  - I have not received the package yet.
- context: Medical and health contexts
  description: Patients and doctors use the resultative to describe current conditions
    resulting from past events.
  examples:
  - I have sprained my ankle. (It is swollen now.)
  - He has had a heart attack. (He is in hospital now.)
  - She has developed an allergy. (She reacts to it now.)
phonetics:
- note: 'In resultative present perfect, the past participle typically carries the
    main stress, as it conveys the result: ''I have lost my WALlet,'' ''She has gone
    to LONdon.'''
  example_generator:
    contexts:
    - spoken English
    - news reporting
  l1_issue: Learners may stress the auxiliary 'have/has' instead of the past participle,
    which can sound unnatural.
- note: 'The auxiliary ''have/has'' is usually reduced in connected speech: ''I''ve
    lost it,'' ''She''s gone home,'' ''They''ve finished.'' The /v/ or /z/ may be
    barely audible.'
  example_generator:
    contexts:
    - casual speech
    - connected speech
  l1_issue: Learners may pronounce the full form 'I have' /aɪ hæv/ in contexts where
    the contracted form /aɪv/ is expected, sounding overly formal or unnatural.
- note: 'With ''just,'' the stress falls on ''just'' to emphasise recency: ''I have
    JUST arrived.'' With ''already,'' stress falls on ''already'': ''She has ALREADY
    left.'''
  example_generator:
    contexts:
    - spoken emphasis
    - time expressions
  l1_issue: Learners from languages without equivalent temporal adverbs may omit 'just'
    and 'already,' losing important nuances of recency and expectation.
teaching:
  methodology: PPP (Presentation, Practice, Production) — present the concept through
    visual scenarios (before/after pictures), then practise with gap-fills and picture-based
    exercises, then produce in role-plays and storytelling.
  tips:
  - 'Use before-and-after pictures to make the resultative meaning concrete: show
    a clean room, then a messy room — ''Someone has made a mess.'''
  - 'Contrast with past simple explicitly: ''I lost my keys (last week)'' vs ''I have
    lost my keys (I cannot get in now).'''
  - 'Teach the time expression restriction: no definite past time with resultative
    present perfect.'
  - 'Use the ''Can you see the result?'' test: if the result is visible now, the resultative
    present perfect is appropriate.'
  - 'Introduce common resultative verbs early: lose, break, go, come, arrive, finish,
    change.'
  - Use news headlines as authentic input — they are full of resultative present perfect.
  recommended_activities:
  - name: Before and After
    duration: 15
    adaptation_notes: 'Show pairs of pictures (before/after). Learners describe the
      change using the resultative present perfect: ''Someone has painted the wall,''
      ''The cat has knocked over the vase.'''
  - name: Result or Event?
    duration: 15
    adaptation_notes: Give learners sentences in present perfect. They decide whether
      the focus is on the present result or the past event, and explain their reasoning.
  - name: News Reporter Role-play
    duration: 20
    adaptation_notes: 'Learners work in pairs. One is a news reporter, the other a
      witness. They report recent events using the resultative present perfect: ''A
      fire has broken out in the city centre.'''
  - name: What Has Happened?
    duration: 15
    adaptation_notes: Describe a current situation (e.g., 'The office is empty. The
      lights are off. There is a note on the door.'). Learners deduce what has happened
      using the resultative present perfect.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
