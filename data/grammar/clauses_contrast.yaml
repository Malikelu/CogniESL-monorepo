grammar_point: clauses_contrast
title: Clauses of Contrast
description: 'Structures used to show contrast between two ideas: although, even though,
  though, despite, in spite of, while, whereas.'
level: B1
meaning:
  core_meaning: Contrast clauses show that two ideas are different or surprising in
    relation to each other. Although X, Y = X is true, but Y is also true (surprisingly).
  timeline: Depends on the tense used in each clause.
  contrast: Although = Although it was raining, we went out. (contrast) vs Because
    = Because it was raining, we stayed home. (cause)
  ccqs:
  - question: Are these two ideas surprising together?
    answer: Yes, that is contrast.
  - question: Is one idea a cause and the other a result?
    answer: No, that is cause, not contrast.
  example_generator:
    contexts:
    - comparing and contrasting
    - expressing surprise
    - academic writing
    - balanced arguments
    cultural_notes:
    - Some languages use different structures for contrast
    - English has many options — choosing the right one depends on register
    min_examples: 5
form:
  affirmative:
    structure: Although/Even though + clause, + main clause / Despite/In spite of
      + noun/-ing + comma + main clause
    example_generator:
      contexts:
      - contrast with clauses
      - contrast with nouns
      min_examples: 4
  negative:
    structure: 'Same structure: Although he did not study, he passed. / Despite not
      studying, he passed.'
    example_generator:
      contexts:
      - negative contrast
      min_examples: 3
  questions:
    structure: Not typically used in questions.
    example_generator:
      contexts: []
    min_examples: 0
sub_rules:
- rule: Although/Even though + clause (subject + verb)
  type: grammatical
  examples:
  - Although she was tired, she kept working.
  - Even though he tried hard, he failed.
- rule: Despite/In spite of + noun or -ing (no subject + verb)
  type: grammatical
  examples:
  - Despite the rain, we went out.
  - In spite of feeling tired, she kept working.
- rule: Though is more informal, can go at the end
  type: register
  examples:
  - It was raining. We went out, though.
- rule: While and whereas for direct contrast between two clauses
  type: grammatical
  examples:
  - I like coffee, while my sister prefers tea.
  - She is outgoing, whereas her brother is shy.
use:
- context: Expressing surprise
  description: When two facts are unexpectedly both true
  examples:
  - Although he is young, he is very mature.
  - Despite the traffic, we arrived on time.
- context: Balanced arguments
  description: Showing both sides of an issue
  examples:
  - While technology has benefits, it also has risks.
  - Although the plan is good, it is expensive.
phonetics:
- note: Stress on the contrasting element
  example_generator:
    contexts:
    - contrastive stress
  l1_issue: Some L1 speakers use but instead of although in formal writing
teaching:
  methodology: PPP
  tips:
  - Use real-life surprising situations
  - Contrast with because (cause) vs although (contrast)
  - Practice all structures explicitly
  recommended_activities:
  - name: Surprising Facts
    duration: 10
    adaptation_notes: Students create sentences about surprising facts using although/despite.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for clauses_contrast.
  correction: Correct form.
  explanation: This is a common error for clauses_contrast.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
