grammar_point: subject_verb_agreement
title: Subject-Verb Agreement
description: Rules for matching the form of the verb to the number (singular/plural)
  and person (1st/2nd/3rd) of the subject in a sentence.
level: A2-B1
meaning:
  core_meaning: The verb must agree with the subject in number (singular/plural) and
    person (1st/2nd/3rd) to form grammatically correct sentences.
  timeline: 'Present Simple only: Subject-verb agreement is most critical in present
    simple tense; past simple uses same verb for all subjects (worked).'
  contrast: 'Singular: "He works." (verb + s)

    Plural: "They work." (verb no s)

    Exception: "I/You work." (no s even for singular I/you)

    '
  ccqs:
  - question: Everyone ___ here. (is / are)
    answer: is — 'everyone' is an indefinite pronoun and takes a singular verb, even
      though it refers to multiple people.
  - question: The team ___ playing well. (is / are)
    answer: Both can be correct. 'The team is playing' (American English — team as
      one unit). 'The team are playing' (British English — team as individual members).
  - question: She ___ to the gym every day. (go / goes)
    answer: goes — third person singular (she) requires the verb to take -s/-es in
      present simple.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Singular Subject (he/she/it/单数名词) + Verb + s/es: "She works." "The
      dog runs."

      Plural Subject (we/you/they/复数名词) + Base Verb: "They work." "The dogs run."

      3rd Person Singular Present Simple: add s/es to verb (works, watches, goes).

      '
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
  negative:
    structure: 'Singular: Subject + doesn''t + Base Verb: "He doesn''t work."

      Plural: Subject + don''t + Base Verb: "They don''t work."

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Singular: Does + Subject + Base Verb: "Does he work?"

      Plural: Do + Subject + Base Verb: "Do they work?"

      '
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
sub_rules:
- rule: Third person singular (he/she/it) adds -s/-es to present simple verbs
  type: grammatical
  examples:
  - He works
  - She watches
  - It goes
- rule: Plural subjects use the base verb (no -s)
  type: grammatical
  examples:
  - They work
  - We watch
  - The children play
- rule: I and you use the base verb (no -s) even though they are singular
  type: grammatical
  examples:
  - I work
  - You study
- rule: Indefinite pronouns (everyone, someone, no one, anybody) are singular
  type: grammatical
  examples:
  - Everyone likes pizza
  - Someone is here
  - No one knows
- rule: Collective nouns (team, family, group) can be singular (unit) or plural (members)
  type: grammatical
  examples:
  - The team is winning (unit)
  - The team are arguing (members — BrE)
use:
- name: Basic Agreement
  description: Match verb to subject number in present simple.
  examples:
  - The cat sleeps.
  - The cats sleep.
  key_point: 3rd person singular (he/she/it) always takes verb + s/es.
- name: Indefinite Pronouns
  description: 'Someone, anyone, no one, everyone are singular: ''Everyone likes pizza.'''
  examples:
  - Someone is here.
  - No one knows the answer.
  key_point: Indefinite pronouns ending in -one/-body/-thing are singular.
- name: Collective Nouns
  description: 'Team, family, group can be singular (as a unit) or plural (individual
    members): ''The team is winning.'' (unit) vs ''The team are arguing.'' (members).'
  examples:
  - The family has a dog.
  - The family have different opinions.
  key_point: British English uses plural more often for collective nouns; American
    English uses singular.
phonetics:
- note: 'The -s ending has three pronunciations: /s/ after voiceless sounds (works
    /wɜːks/), /z/ after voiced sounds (plays /pleɪz/), /ɪz/ after sibilant sounds
    (watches /wɒtʃɪz/).'
  example_generator:
    contexts:
    - verb ending pronunciation
  l1_issue: Portuguese and Spanish speakers often omit the third person -s. Drill
    this explicitly.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Basic 3rd person singular s/es (he/she/it + verb s).'
  - 'Week 2: Indefinite pronouns (everyone, someone) = singular.'
  - 'Week 3: Collective nouns and exceptions (I/you no s).'
  - 'Use subject cards: Hold up ''he'' card, students say verb + s; hold up ''they''
    card, students say base verb.'
  recommended_activities:
  - name: Subject Verb Match
    duration: 10
    adaptation_notes: 'Teacher holds up subject cards (he, they, everyone, the children).
      Students say the correct verb form: ''He works'', ''They work'', ''Everyone
      works'', ''The children work.'''
  - name: Error Correction
    duration: 10
    adaptation_notes: 'Show sentences with agreement errors. Students identify and
      fix them: ''He work'' → ''He works'', ''They works'' → ''They work.'''
  - name: Everyone or Every One
    duration: 10
    adaptation_notes: 'Students practice indefinite pronouns: ''Everyone likes...''
      (NOT ''Everyone like''). Students create sentences with everyone, someone, no
      one, anybody.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
