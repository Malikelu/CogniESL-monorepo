grammar_point: phrasal_verbs
title: Phrasal Verbs (Verb + Particle)
description: Verbs combined with prepositions or adverbs (particles) that create new
  meanings, often idiomatic. Very common in informal spoken English.
level: B1
meaning:
  core_meaning: A phrasal verb is a verb + particle (preposition or adverb) that together
    have a meaning different from the individual words. The meaning is often idiomatic
    — you cannot guess it from the parts. Phrasal verbs are extremely common in everyday
    spoken English.
  timeline: 'Follows normal tense rules: get up (present), got up (past), will get
    up (future). The tense is carried by the verb, not the particle.'
  contrast: '''Get up'' = ''wake up and leave bed'' (idiomatic) vs ''get'' + ''up''
    = literal movement upward (not idiomatic). ''Give up'' = ''quit'' (idiomatic)
    vs ''give'' + ''up'' = literal.'
  ccqs:
  - question: Can you guess the meaning of this phrasal verb from the individual words?
    answer: Usually not — phrasal verbs are idiomatic and must be learned as a unit.
  - question: Is this phrasal verb separable or inseparable?
    answer: Separable = object can go between verb and particle. Inseparable = object
      must come after.
  - question: Where does a pronoun go with a separable phrasal verb?
    answer: 'Always between the verb and particle: ''Turn it on'' NOT ''Turn on it.'''
  example_generator:
    contexts:
    - daily routines
    - travel
    - work and office
    - relationships
    - health
    cultural_notes:
    - Phrasal verbs are more common in informal speech; formal writing often uses
      single-word equivalents
    - Some phrasal verbs have multiple meanings depending on context
    - Use diverse scenarios to show range of meanings
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + verb + particle (+ object). Separable: verb + object + particle
      OR verb + particle + object. Inseparable: verb + particle + object (no separation).'
    example_generator:
    - I get up at 7am.
    - She turned on the light.
    - They looked after the children.
    - He gave up smoking.
    min_examples: 4
  negative:
    structure: Subject + don't/doesn't/didn't + verb + particle
    example_generator:
    - I don't get up early.
    - She didn't turn on the light.
    - They don't look after the dog.
    - He didn't give up.
    min_examples: 4
  questions:
    structure: Do/Does/Did + subject + verb + particle?
    example_generator:
    - Do you get up early?
    - Did she turn on the light?
    - Do they look after the children?
    - Did he give up?
    min_examples: 4
sub_rules:
- rule: 'Separable phrasal verbs: object can go between verb and particle or after
    the particle'
  type: grammatical
  examples:
  - Turn on the light. = Turn the light on.
  - Pick up the book. = Pick the book up.
  - Turn off the TV. = Turn the TV off.
- rule: 'Inseparable phrasal verbs: object must come after the particle (no separation)'
  type: grammatical
  examples:
  - Look after the dog. (NOT Look the dog after)
  - Run into an old friend. (NOT Run an old friend into)
  - Look into the problem. (NOT Look the problem into)
- rule: Pronouns always go between verb and particle in separable phrasal verbs
  type: grammatical
  examples:
  - Turn it on. (NOT Turn on it)
  - Pick it up. (NOT Pick up it)
  - Turn it off. (NOT Turn off it)
- rule: Three-part phrasal verbs (verb + particle + preposition) are always inseparable
  type: grammatical
  examples:
  - Look forward to meeting you.
  - Get along with your colleagues.
  - Come up with an idea.
  - Put up with the noise.
- rule: 'Common phrasal verbs by particle: get (get up, get over, get along, get by),
    take (take off, take up, take after, take over), put (put on, put off, put up
    with, put away), turn (turn on, turn off, turn up, turn down), look (look after,
    look into, look forward to, look up)'
  type: lexical
  examples:
  - get up = wake up
  - take off = remove / depart
  - put off = postpone
  - turn down = reject / lower volume
  - look forward to = anticipate with pleasure
use:
- context: Daily routines
  description: Common phrasal verbs for everyday actions
  examples:
  - I get up at 7am.
  - She turns on the coffee maker.
  - He puts on his shoes.
  - They wake up early.
  - We eat out on Fridays.
- context: Travel
  description: Phrasal verbs commonly used when traveling
  examples:
  - The plane took off on time.
  - We checked into the hotel.
  - She picked up her luggage.
  - They set off early in the morning.
  - The car broke down on the highway.
- context: Work and office
  description: Phrasal verbs for workplace situations
  examples:
  - I need to fill out this form.
  - She handed in her report.
  - He called off the meeting.
  - They put off the deadline.
  - We ran out of paper.
- context: Relationships and social life
  description: Phrasal verbs for interpersonal situations
  examples:
  - I get along with my colleagues.
  - She ran into an old friend.
  - He broke up with his girlfriend.
  - They made up after the argument.
  - We look after our elderly parents.
phonetics:
- note: 'The particle is usually stressed in phrasal verbs: ''turn ON'', ''get UP'',
    ''look AFTER''. The verb may be unstressed.'
  example_generator:
  - turn ON /tɜːn ɒn/
  - get UP /ɡet ʌp/
  - look AFTER /lʊk ɑːftə/
  l1_issue: Many L1 speakers stress the verb instead of the particle. Teach correct
    stress patterns for natural speech.
- note: 'In connected speech, the verb and particle often blend: ''get up'' → /ɡet
    ʌp/, ''turn on'' → /tɜːn ɒn/.'
  example_generator:
  - get up → /ɡet ʌp/
  - pick up → /pɪk ʌp/
  l1_issue: Portuguese and Spanish speakers often separate the verb and particle too
    much. Teach blending for natural speech.
teaching:
  methodology: Chunk-based teaching with contextual practice
  tips:
  - Teach phrasal verbs as chunks, not as separate words. Students should memorize
    'get up' as one unit, not 'get' + 'up'.
  - 'Group phrasal verbs by particle: all ''get'' phrasal verbs together, all ''take''
    phrasal verbs together. This helps students see patterns.'
  - 'Use daily routine dialogues: ''What time do you get up?'' ''I turn on the coffee
    first.'' Makes the grammar personal and practical.'
  - 'Contrast phrasal verbs with single-word equivalents: ''look into'' = ''investigate'',
    ''put off'' = ''postpone'', ''give up'' = ''quit''. This helps students understand
    meaning.'
  - 'Drill separable vs inseparable explicitly. This is a common source of errors.
    Use pronouns to test: ''Turn it on'' (correct) vs ''Turn on it'' (incorrect).'
  recommended_activities:
  - name: Phrasal Verb Matching
    duration: 10
    adaptation_notes: 'Students match phrasal verbs to their meanings: ''give up''
      = ''quit'', ''look after'' = ''take care of'', ''run into'' = ''meet by chance''.
      Practices vocabulary.'
  - name: Daily Routine Dialogue
    duration: 15
    adaptation_notes: 'Students ask about each other''s daily routines using phrasal
      verbs: ''What time do you get up?'' ''What do you put on first?'' ''Do you eat
      out or eat in?'''
  - name: Separable or Inseparable?
    duration: 10
    adaptation_notes: 'Give students phrasal verbs. They decide if they are separable
      or inseparable and create sentences: ''Turn on the light'' = separable. ''Look
      after the dog'' = inseparable.'
  - name: Phrasal Verb Story
    duration: 15
    adaptation_notes: Students write a short story using at least 8 phrasal verbs
      from a list. They underline the phrasal verbs. Practices using multiple phrasal
      verbs in context.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for phrasal_verbs.
  correction: Correct form.
  explanation: This is a common error for phrasal_verbs.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
