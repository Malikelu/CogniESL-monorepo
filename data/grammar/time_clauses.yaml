grammar_point: time_clauses
title: Time Clauses (when, before, after, while)
description: Clauses that show when something happens.
level: A2
meaning:
  core_meaning: 'A time clause tells us WHEN the main action happens. The key rule
    is: NEVER use will in a time clause. Use present simple even for future meaning.'
  timeline: Time clause uses present tense. Main clause uses future or present.
  contrast: 'Wrong: When I will arrive. Correct: When I arrive.'
  ccqs:
  - question: Can we use will in a time clause
    answer: No. Never use will. Use present simple.
    purpose: Tests whether the learner understands the time reference of the situation.
      Correct temporal identification is essential for selecting the right grammatical
      structure.
  - question: Which clause uses future tense
    answer: The main clause uses future. The time clause uses present simple.
    purpose: Tests whether the learner understands the time reference of the situation.
      Correct temporal identification is essential for selecting the right grammatical
      structure.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      time clauses and explain why they are incorrect.
  example_generator:
    contexts:
    - daily routines
    - future plans
    cultural_notes:
    - This is one of the most important rules at A2 level
    min_examples: 5
form:
  affirmative:
    structure: Conjunction + subject + present, subject + will + verb
    example_generator:
    - When I arrive, I will call you.
    - Before she leaves, she will lock the door.
    min_examples: 4
  negative:
    structure: Conjunction + subject + don't/doesn't + verb
    example_generator:
    - When I don't understand, I ask.
    min_examples: 3
  questions:
    structure: What will happen when + subject + present
    example_generator:
    - What will you do when you arrive
    min_examples: 3
sub_rules:
- rule: Never use will in a time clause
  type: grammatical
  examples:
  - When I arrive, I will call
- rule: Use a comma when the time clause comes first
  type: punctuation
  examples:
  - When I arrive, I will call you
- rule: For habits both clauses use present simple
  type: grammatical
  examples:
  - When I wake up, I brush my teeth
- rule: While describes simultaneous actions
  type: grammatical
  examples:
  - While I was cooking, she was setting the table
use:
- context: Future time clauses
  examples:
  - When I arrive, I will call you
  - We will leave before it rains
- context: Habits and routines
  examples:
  - When I wake up, I brush my teeth
  - After dinner, we watch TV
phonetics:
- note: Time conjunctions are usually unstressed
  example_generator:
  - when as /wen/
  l1_issue: Portuguese and Spanish speakers often use future tense in time clauses
teaching:
  methodology: PPP with timeline visualization
  tips:
  - 'Teach the golden rule: NO WILL after WHEN, BEFORE, AFTER, WHILE'
  - Use a timeline to show event order
  recommended_activities:
  - name: Time Clause Chain
    duration: 15
    adaptation_notes: Students build chains about their daily routine
  - name: Correct the Error
    duration: 10
    adaptation_notes: Students correct sentences with will in time clauses
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 16:
    Coordination, §16.7 (time clauses)'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 15: Coordination, §15.3'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 570-580 (time
    clauses: when, while, before, after)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    15: Time clauses'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 12: Time clauses'
common_errors:
- error: '*When I will arrive, I will call you.*'
  correction: When I arrive, I will call you.
  explanation: Never use 'will' after 'when' in a time clause. Use present simple
    for future reference. This is the single most important rule for time clauses
    and is violated across all L1 backgrounds because many L1s use future tense after
    temporal conjunctions.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Chinese
  - Arabic
  - Korean
- error: '*Before she will leave, she will lock the door.*'
  correction: Before she leaves, she will lock the door.
  explanation: Time clauses introduced by 'before', 'after', 'when', 'while', 'until'
    use present simple to refer to the future -- never 'will'. This rule applies regardless
    of the main clause tense.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Arabic
- error: '*After I will finish, I will call you.*'
  correction: After I finish, I will call you.
  explanation: In time clauses referring to the future, use present simple (not 'will')
    after time conjunctions. This applies to 'after', 'before', 'when', 'while', 'until',
    'as soon as', and 'by the time'.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
  - French
- error: '*I will wait here until the bus will come.*'
  correction: I will wait here until the bus comes.
  explanation: The time clause (after 'until') uses present simple for future meaning.
    The future meaning is understood from the main clause. 'Until' never takes 'will'
    in standard English time clauses.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Chinese
register_notes:
- note: In formal writing, relative clauses are essential for precision and are a
    marker of proficient writing.
- note: In conversation, defining relative clauses are more common than non-defining.
- note: In academic writing, both defining and non-defining relative clauses are used
    extensively.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In academic writing, relative clauses are essential for precision and are
    a marker of proficient writing.
- note: In conversation, defining relative clauses are more common than non-defining.
- note: In formal writing, 'whom' is used for object relative clauses.
