grammar_point: cleft_sentences_advanced
title: Cleft Sentences (Advanced)
description: 'Advanced cleft structures for emphasis: it-clefts, wh-clefts, and reversed
  wh-clefts.'
level: C1
meaning:
  core_meaning: Advanced cleft sentences divide a single clause into two parts for
    emphasis. It-clefts emphasize one element. Wh-clefts (pseudo-clefts) put the focus
    at the end. Reversed wh-clefts put the focus at the beginning.
  timeline: Depends on the tense used.
  contrast: Simple = John broke the window. vs It-cleft = It was John who broke the
    window. vs Wh-cleft = What John did was break the window.
  ccqs:
  - question: Is this sentence dividing information into two parts for emphasis?
    answer: Yes, it is a cleft sentence.
    purpose: 'Tests whether the learner understands that cleft sentences (it-cleft,
      wh-cleft, reversed wh-cleft) divide information into two parts: the emphasized
      element and the background information in a relative clause.'
  - question: What element is being emphasized?
    answer: The element after it was or at the end of a wh-cleft.
    purpose: 'Tests whether the learner can identify the emphasized element in different
      cleft types: it-cleft (It was X that...), wh-cleft (What X is...), and reversed
      wh-cleft (X is what...). Recognizing the focus is essential for both production
      and comprehension.'
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      cleft sentences advanced and explain why they are incorrect.
  example_generator:
    contexts:
    - emphasis
    - contrast
    - correcting misunderstandings
    - formal writing
    - academic English
    cultural_notes:
    - Cleft sentences are very common in spoken English for emphasis
    - Overuse can sound unnatural — teach appropriate contexts
    min_examples: 5
form:
  affirmative:
    structure: 'It-cleft: It + be + focused element + who/that + clause / Wh-cleft:
      What + subject + do/be + is/was + focused element'
    example_generator:
      contexts:
      - it-cleft
      - wh-cleft
      min_examples: 4
  negative:
    structure: 'Same patterns: It was not John who broke the window. / What John did
      not do was break the window.'
    example_generator:
      contexts:
      - negative emphasis
      min_examples: 3
  questions:
    structure: 'Can appear in questions: Was it John who broke the window?'
    example_generator:
      contexts:
      - question formation
      min_examples: 3
sub_rules:
- rule: It-cleft — emphasizes one element of the sentence
  type: grammatical
  examples:
  - It was Mary who called. (not John)
  - It was yesterday that she arrived. (not today)
  - It is the price that matters most. (not the quality)
- rule: Wh-cleft (pseudo-cleft) — puts focus at the end
  type: grammatical
  examples:
  - What I need is a good night's sleep.
  - What she did was incredible.
  - What matters most is your health.
- rule: Reversed wh-cleft — puts focus at the beginning
  type: grammatical
  examples:
  - A good night's sleep is what I need.
  - Incredible is what she did.
use:
- context: Emphasis
  description: Highlighting specific information
  examples:
  - It was the teacher who explained it best.
  - What I appreciate most is your honesty.
- context: Correcting misunderstandings
  description: Clarifying what actually happened
  examples:
  - It was not me who broke the window — it was John.
  - What happened was an accident, not intentional.
phonetics:
- note: Stress on the focused element in cleft sentences
  example_generator:
    contexts:
    - emphasis
  l1_issue: Many L1 speakers do not use cleft sentences, missing opportunities for
    natural emphasis
teaching:
  methodology: Guided discovery
  tips:
  - Use contrastive contexts (I thought it was X, but it was actually Y)
  - Practice all three types: it-cleft, wh-cleft, reversed wh-cleft
  - Record students and have them identify emphasis patterns
  recommended_activities:
  - name: Emphasis Practice
    duration: 15
    adaptation_notes: Students rewrite simple sentences using cleft structures for
      emphasis.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 16:
    Information Packaging, §16.1-16.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*It was John which broke the window.*'
  correction: It was John who broke the window.
  explanation: Use 'who' for people and 'that' for things in cleft sentences. 'Which'
    is not standard in cleft sentences for people.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: '*What I need is a holiday I was desperate.* (missing relative clause)'
  correction: What I need is a holiday that I have been desperate for.
  explanation: Advanced wh-cleft sentences require a complete relative clause. The
    relative pronoun (that/which/who) and any prepositions must be included.
  l1_groups:
  - Portuguese
  - Spanish
  - French
- error: '*It was in Paris where we met.* (less standard)'
  correction: It was in Paris that we met.
  explanation: In standard English, it-cleft sentences use 'that' (not 'where/when/how')
    after the emphasized element, even when emphasizing place, time, or manner.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - German
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
