grammar_point: relative_clauses
title: Relative Clauses (Defining and Non-Defining)
description: Clauses that modify nouns, providing essential (defining) or extra (non-defining)
  information about the noun they describe.
level: B1
meaning:
  core_meaning: Relative clauses add information about a noun. Defining relative clauses
    identify WHICH person or thing we mean (essential information). Non-defining relative
    clauses add extra information that is not essential (the sentence would still
    make sense without it).
  timeline: N/A — relative clauses match the tense of the main clause. They can refer
    to past, present, or future.
  contrast: '''Defining'' = ''The book that I bought is red.'' (specific book — essential
    info) vs ''Non-defining'' = ''The book, which I bought yesterday, is red.'' (extra
    info — can be removed)'
  ccqs:
  - question: Is the information essential to identify the noun?
    answer: Yes = defining (no commas). No = non-defining (use commas).
  - question: Can we remove the relative clause and the sentence still makes sense?
    answer: Yes = non-defining. No = defining.
  - question: Do we use 'that' in non-defining relative clauses?
    answer: No — only 'who' or 'which'. 'That' is for defining clauses only.
  example_generator:
    contexts:
    - describing people
    - describing things
    - describing places
    - describing times
    cultural_notes:
    - Use diverse names and cultural contexts
    - Avoid examples that assume specific cultural knowledge
    - Keep examples concrete and relatable
    min_examples: 5
form:
  affirmative:
    structure: 'Defining: Noun + relative pronoun (who/which/that) + clause (no commas)
      / Non-defining: Noun + comma + relative pronoun (who/which) + clause + comma'
    example_generator:
    - The book that I bought is red. (defining)
    - The book, which I bought yesterday, is red. (non-defining)
    - The woman who lives next door is a doctor. (defining)
    - My sister, who lives in Paris, is visiting. (non-defining)
    min_examples: 4
  negative:
    structure: Negative relative clauses add 'not' before the verb
    example_generator:
    - The book that I didn't buy is blue.
    - The woman who doesn't live here anymore moved away.
    - The restaurant, which we didn't like, has closed.
    min_examples: 4
  questions:
    structure: Questions with relative clauses follow standard question order
    example_generator:
    - Do you know the girl who lives next door?
    - Have you read the book that I recommended?
    - Is this the restaurant where we had dinner?
    min_examples: 4
sub_rules:
- rule: 'Relative pronouns: who (people), which (things), that (people and things,
    defining only), whose (possession), where (places), when (time)'
  type: grammatical
  examples:
  - The man who called you is my brother.
  - The book which I read was interesting.
  - The student that passed the exam studied hard.
  - The woman whose car was stolen called the police.
  - The city where I was born is beautiful.
  - I remember the day when we met.
- rule: 'Defining relative clauses: no commas, can use ''that'', essential information'
  type: punctuation
  examples:
  - The book that I bought is red. (no commas, essential)
  - I like movies that have happy endings.
- rule: 'Non-defining relative clauses: use commas, cannot use ''that'', extra information'
  type: punctuation
  examples:
  - My sister, who lives in Paris, is visiting. (commas, extra info)
  - The Eiffel Tower, which is in France, is famous.
- rule: Relative pronoun can be omitted when it is the object of the clause (defining
    only)
  type: grammatical
  examples:
  - The book (that) I bought is red. (object — can omit)
  - The girl (who) you met is my sister. (object — can omit)
  - The man who called you is my brother. (subject — CANNOT omit)
- rule: Prepositions can go before the relative pronoun (formal) or at the end (informal)
  type: grammatical
  examples:
  - The person to whom I spoke was helpful. (formal)
  - The person who I spoke to was helpful. (informal)
  - The city in which I live is beautiful. (formal)
  - The city which I live in is beautiful. (informal)
use:
- context: Describing people
  description: Identifying or giving information about people
  examples:
  - The woman who lives next door is a doctor.
  - I have a friend whose father is a pilot.
  - The teacher that taught me English was from London.
  - My brother, who is 25, works in finance.
- context: Describing things
  description: Identifying or giving information about things
  examples:
  - The book that I bought is very interesting.
  - I like movies that have happy endings.
  - The phone, which I bought last year, still works well.
  - The car that broke down was old.
- context: Describing places
  description: Identifying or giving information about places
  examples:
  - The restaurant where we had dinner was excellent.
  - I visited the city where my grandparents were born.
  - The park, which is near my house, is very beautiful.
  - The school that I attended was very small.
- context: Describing times
  examples:
  - I remember the day when we first met.
  - The year when I graduated was 2015.
  - That was the moment when everything changed.
phonetics:
- note: 'Relative pronouns are usually unstressed in connected speech: ''who'' → /huː/
    or even /uː/, ''which'' → /wɪtʃ/ with weak stress, ''that'' → /ðət/.'
  example_generator:
  - who /huː/ or /uː/
  - which /wɪtʃ/
  - that /ðət/
  l1_issue: Portuguese and Spanish speakers often over-pronounce relative pronouns.
    Teach weak forms for natural speech.
- note: 'In non-defining clauses, the comma creates a pause in speech: ''My sister,
    / pause / who lives in Paris, / pause / is visiting.'''
  example_generator:
  - Pause before and after non-defining clauses
  l1_issue: Many L1 speakers do not pause for commas in relative clauses. Teach the
    pause to improve clarity.
teaching:
  methodology: Guided discovery with sentence combining
  tips:
  - Start with defining relative clauses using 'who' and 'which'. Master these before
    introducing non-defining.
  - 'Use color coding: highlight nouns in blue, relative clauses in yellow. Defining
    = no commas, non-defining = commas.'
  - Teach the comma rule explicitly. This is the most common error — students forget
    commas in non-defining clauses.
  - 'Practice relative pronoun omission: ''The book (that) I bought.'' Only omit when
    the pronoun is the object.'
  - 'Use sentence combining: give two simple sentences and students combine them with
    a relative clause. ''The woman is a doctor. She lives next door.'' → ''The woman
    who lives next door is a doctor.'''
  recommended_activities:
  - name: Sentence Combining
    duration: 15
    adaptation_notes: 'Give students pairs of simple sentences. They combine them
      using relative clauses: ''The man is my brother. He called you.'' → ''The man
      who called you is my brother.'''
  - name: Defining or Non-Defining?
    duration: 10
    adaptation_notes: Show sentences with and without commas. Students identify whether
      they are defining or non-defining and explain why.
  - name: Describe the Picture
    duration: 15
    adaptation_notes: 'Show a busy picture. Students describe people and things using
      relative clauses: ''The woman who is wearing a red dress is my teacher.'' ''The
      car, which is parked outside, is mine.'''
  - name: Relative Pronoun Quiz
    duration: 10
    adaptation_notes: 'Students choose the correct relative pronoun: ''The person
      ___ called you is my brother.'' (who/which/that). Practices choosing the right
      pronoun.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''that'' in non-defining clauses: *''My sister, that lives in Paris,
    is visiting.'''
  correction: My sister, who lives in Paris, is visiting.
  explanation: '''That'' cannot be used in non-defining relative clauses.'
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
  - note: "Relative clauses are used in all registers, from informal conversation to academic writing."
  - note: "In academic writing, relative clauses are essential for precision: 'The participants who completed the survey were aged 18-25.'"
  - note: "In formal writing, non-defining clauses add supplementary information: 'The study, which was conducted in 2020, found that...'"
  - note: "In conversation, relative clauses are often reduced or omitted: 'The guy (who) I met yesterday' (informal)."
dialectal_variation:
  - note: "In BrE, 'which' can be used in defining clauses: 'The book which I read.' AmE strongly prefers 'that' in defining clauses."
  - note: "In some dialects, 'what' replaces 'that': 'The book what I read.' (non-standard)"
  - note: "In informal speech, relative pronouns are often omitted when they are the object: 'The guy (who) I met yesterday.'"
discourse_notes:
  - note: "Relative clauses create cohesion by linking new information to known information: 'A man walked into the bar. The man, who was wearing a hat, ordered a drink.'"
  - note: "Defining clauses identify which person/thing we mean: 'The book that I recommended' (specific book)."
  - note: "Non-defining clauses add extra information: 'My sister, who lives in Paris, is visiting' (we already know which sister)."
  - note: "In academic writing, relative clauses allow complex ideas to be expressed concisely: 'The theory that was proposed by Smith has been widely accepted.'"
