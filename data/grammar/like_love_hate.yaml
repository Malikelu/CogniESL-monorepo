grammar_point: like_love_hate
title: Like / Love / Hate + Noun/Gerund
description: Expressing preferences, enjoyment, and strong feelings about things,
  people, or activities using like, love, and hate with nouns or gerunds.
level: A1
meaning:
  core_meaning: Expressing how you feel about something or someone — from mild enjoyment
    (like) to strong positive feeling (love) to strong negative feeling (hate). These
    are general preferences, not feelings happening only right now.
  timeline: Present time — describes general, ongoing preferences. Not about a single
    moment but about how you usually feel.
  contrast: '''I like coffee'' = I enjoy it generally. vs ''I am enjoying this coffee''
    = right now, this particular cup. / ''I love chocolate'' = very strong positive
    feeling, stronger than ''like''. / ''I hate spinach'' = very strong negative feeling,
    stronger than ''don''t like''.'
  ccqs:
  - question: Is this about how you feel in general or just right now?
    answer: In general — it is a preference I have.
  - question: Is 'love' stronger or weaker than 'like'?
    answer: Stronger — love is a very strong positive feeling.
  - question: Can I use these with activities as well as things?
    answer: Yes — with a gerund (I love swimming) or a noun (I love music).
  example_generator:
    contexts:
    - food and drink
    - hobbies and free time
    - music and entertainment
    - daily routines
    - sports and activities
    cultural_notes:
    - In British English, 'I quite like' means 'I like a little' — not very strong
    - '''I love you'' is a very strong statement in English and used carefully'
    - Saying 'I hate' about a person is very strong; 'I don't like' is softer
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + like/love/hate + noun/gerund: ''I like chocolate.'' / ''She
      loves reading.'' / ''They hate waiting.'''
    example_generator:
      contexts:
      - food
      - hobbies
      - music
      - sports
      - daily activities
      min_examples: 4
  negative:
    structure: 'Subject + do not/does not + like/love/hate + noun/gerund: ''I don''t
      like spinach.'' / ''She doesn''t love crowded places.'' / ''They don''t hate
      it, but they don''t love it.'''
    example_generator:
      contexts:
      - dislikes
      - things you avoid
      - neutral feelings
      min_examples: 3
  questions:
    structure: 'Do/Does + subject + like/love/hate + noun/gerund?: ''Do you like coffee?''
      / ''Does she love dancing?'' / ''Do they hate flying?'''
    example_generator:
      contexts:
      - asking about preferences
      - getting to know someone
      - making suggestions
      min_examples: 3
sub_rules:
- rule: Use a noun after like/love/hate for things, people, or places
  type: grammatical
  examples:
  - I like chocolate.
  - She loves her grandmother.
  - They hate big cities.
- rule: Use a gerund (verb + -ing) after like/love/hate for activities
  type: grammatical
  examples:
  - I like swimming.
  - She loves reading.
  - They hate getting up early.
- rule: 'Gradation of feeling: like → really like → love / don''t like → really don''t
    like → hate'
  type: lexical
  examples:
  - I like pizza. → I really like pizza. → I love pizza.
  - I don't like spinach. → I really don't like spinach. → I hate spinach.
- rule: Use 'quite' before 'like' to reduce the strength (British English)
  type: lexical
  examples:
  - I quite like jazz. (I like it a little, not a lot)
  - She quite likes her new boss.
use:
- context: Talking about food preferences
  description: One of the most common everyday uses — discussing what you enjoy or
    dislike eating.
  examples:
  - I love Italian food.
  - Do you like spicy dishes?
  - She hates mushrooms.
- context: Discussing hobbies and free time
  description: Talking about activities you enjoy or dislike doing.
  examples:
  - I like watching films at the weekend.
  - He loves playing football.
  - They hate doing housework.
- context: Expressing feelings about people
  description: Like and love can express feelings about people; hate expresses strong
    dislike.
  examples:
  - I like my new colleague.
  - She loves her children.
  - He hates his neighbour.
phonetics:
- note: 'In natural speech, ''like'' is often reduced: ''I like it'' → /aɪ laɪk ɪt/
    with weak stress on ''like'' in connected speech.'
  example_generator:
    contexts:
    - connected speech
  l1_issue: Some L1 speakers confuse 'like' (enjoy) with 'like' (similar to). Context
    usually clarifies, but learners may produce 'I am like coffee' by analogy with
    their L1.
- note: 'Stress can change meaning: ''I LOVE chocolate'' (strong emphasis) vs ''I
    love CHOCOLATE'' (contrasting with something else).'
  example_generator:
    contexts:
    - emphasis and contrast
  l1_issue: Learners may not use stress to intensify, making 'I love' sound flat and
    less natural.
teaching:
  methodology: PPP
  tips:
  - Start with food and drink — it is the most relatable context for all learners.
  - 'Use picture flashcards: show images and students say ''I like / I love / I hate...'''
  - 'Introduce the gradation scale early: like → really like → love.'
  - 'Practice the gerund form explicitly: ''I like + verb-ing'' is a common error
    point.'
  - 'Use surveys: students ask each other ''Do you like...?'' and report back.'
  recommended_activities:
  - name: Preference Survey
    duration: 10
    adaptation_notes: 'Students circulate and ask 5 classmates ''Do you like...?''
      about food, hobbies, and activities. They report findings: ''Maria loves swimming
      but hates running.'''
  - name: Like/Love/Hate Line-Up
    duration: 10
    adaptation_notes: Teacher calls out items (coffee, spiders, football, etc.). Students
      physically position themselves on a line from 'hate' to 'love' and say their
      sentence.
  - name: My Favourites Poster
    duration: 15
    adaptation_notes: 'Students create a simple poster or digital slide: ''I like...
      / I love... / I hate...'' with images. Present to the class.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
