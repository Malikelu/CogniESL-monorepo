grammar_point: reporting_verbs
title: Reporting Verbs (Beyond Say and Tell)
description: Verbs used to report what someone said, thought, or felt, with different
  grammatical structures depending on the verb's meaning and register. More precise
  and formal than 'say' and 'tell'.
level: B2
meaning:
  core_meaning: Reporting verbs convey not just WHAT was said, but HOW and WHY it
    was said. Each verb carries a specific nuance — whether the speaker is promising,
    refusing, suggesting, admitting, etc. The grammatical structure changes depending
    on the verb (that-clause, to-infinitive, gerund, etc.).
  timeline: 'Follows standard tense rules: reporting verb tense determines the tense
    of the following clause (backshift for past reporting verbs).'
  contrast: '''Say'' = neutral, general reporting (He said that...) vs ''Promise''
    = commitment (He promised to...) vs ''Suggest'' = proposal (He suggested going...)
    vs ''Admit'' = confession (He admitted that...)'
  ccqs:
  - question: Is this a neutral report, or does the verb add meaning about the speaker's
      intent?
    answer: The verb adds meaning — it tells us whether the speaker was promising,
      refusing, suggesting, admitting, etc.
    purpose: Tests whether the learner understands that reporting verbs are not just
      alternatives for 'say' but carry specific meaning about the speaker's intention,
      attitude, or the speech act being performed.
  - question: What grammatical structure follows this reporting verb?
    answer: 'It depends on the verb: that-clause, to-infinitive, gerund, or object
      + to-infinitive. Each verb has its own pattern.'
    purpose: Tests whether the learner knows that different reporting verbs require
      different syntactic patterns after them, which is a common source of errors
      at B2 level.
  - question: Is this verb formal or informal?
    answer: Some reporting verbs are formal (state, argue, claim) and others are neutral
      (say, tell). Choose based on context.
    purpose: Tests the learner's awareness of the register of reporting verbs, helping
      them select the appropriate verb for the context (formal writing vs casual conversation).
example_generator:
  contexts:
  - everyday conversations
  - news reports
  - academic writing
  - workplace communication
  - legal contexts
  cultural_notes:
  - Formal reporting verbs (state, argue, claim) are common in academic writing and
    news reports
  - Informal reporting verbs (say, tell) are more common in everyday conversation
  - Some reporting verbs have cultural implications (admit, deny, claim)
  min_examples: 5
form:
  affirmative:
    structure: 'Category 1: Verb + (that) + clause / Category 5: Verb + gerund'
    example_generator:
    - He said (that) he was tired. (Category 1)
    - She told me (that) she was leaving. (Category 2)
    - He promised to help. (Category 3)
    - She asked me to help. (Category 4)
    - He suggested going to the cinema. (Category 5)
    min_examples: 4
  negative:
    structure: Verb + not + (structure) depending on category
    example_generator:
    - He said (that) he wasn't tired.
    - She told me (that) she wasn't leaving.
    - He refused to help.
    - She asked me not to tell anyone.
    - He denied stealing the money.
    min_examples: 4
  questions:
    structure: Verb + if/whether/wh-word + (structure) depending on category
    example_generator:
    - He asked if I was tired.
    - She asked me whether I wanted to come.
    - He wanted to know what I thought.
    min_examples: 4
sub_rules:
- rule: 'Category 1: Verb + (that) + clause (say, think, believe, report, claim, state,
    argue, explain, mention, notice, realize, suggest)'
  type: grammatical
  examples:
  - He said (that) he was tired.
  - She believed (that) it was true.
  - They reported (that) the situation was improving.
- rule: 'Category 2: Verb + object + (that) + clause (tell, inform, remind, warn,
    assure, convince, persuade)'
  type: grammatical
  examples:
  - She told me (that) she was leaving.
  - He informed us (that) the meeting was cancelled.
  - They warned us (that) it was dangerous.
- rule: 'Category 3: Verb + to-infinitive (agree, promise, refuse, offer, decide,
    hope, plan, threaten, demand, claim)'
  type: grammatical
  examples:
  - He agreed to help.
  - She promised to call.
  - They refused to pay.
  - He offered to drive.
- rule: 'Category 4: Verb + object + to-infinitive (ask, tell, order, advise, invite,
    allow, encourage, warn, instruct, persuade)'
  type: grammatical
  examples:
  - She asked me to help.
  - He told me to wait.
  - They ordered us to leave.
  - She advised me to study more.
- rule: 'Category 5: Verb + gerund (suggest, recommend, deny, admit, avoid, enjoy,
    finish, imagine, mind, practice)'
  type: grammatical
  examples:
  - He suggested going to the cinema.
  - She recommended reading this book.
  - He denied stealing the money.
  - She admitted making a mistake.
use:
- context: Speech reporting with nuance
  description: Reporting what someone said with specific meaning about their intent
  examples:
  - He admitted that he had made a mistake.
  - She promised to call me the next day.
  - They refused to accept the offer.
  - He threatened to call the police.
  - She offered to help with the project.
- context: Thought and opinion reporting
  description: Reporting what someone thinks or believes
  examples:
  - I think that this is a good idea.
  - They believe the project will succeed.
  - She argued that the policy was unfair.
  - He claimed that he had been at home all evening.
- context: Formal and academic reporting
  description: Using formal reporting verbs in professional or academic contexts
  examples:
  - The study states that climate change is accelerating.
  - Smith (2020) argues that this theory is correct.
  - The report claims that unemployment is falling.
  - The authors suggest that further research is needed.
- context: Requests and commands
  description: Reporting requests, orders, and advice
  examples:
  - She asked me to help with the project.
  - He told the students to be quiet.
  - The doctor advised him to exercise more.
  - They invited us to the party.
  - She warned me not to go alone.
phonetics:
- note: 'Many reporting verbs have stress on the second syllable: re''PORT, sug''GEST,
    re''COMMEND, a''DMIT, de''NY, a''GREE, pro''MISE, re''FUSE.'
  example_generator:
  - report /rɪˈpɔːt/
  - suggest /səˈdʒest/
  - recommend /rekəˈmend/
  l1_issue: Portuguese speakers may stress the wrong syllable in multi-syllable reporting
    verbs. Drill correct stress patterns.
- note: 'Weak form of ''that'' in reported speech: /ðət/. ''He said that he was tired''
    sounds like /hiː sed ðət hiː wəz taɪəd/.'
  example_generator:
  - that /ðət/
  l1_issue: Many L1 speakers over-pronounce 'that' as /ðæt/. Teach the weak form for
    natural speech.
teaching:
  methodology: Categorization and pattern recognition
  tips:
  - Teach reporting verbs in 5 categories based on their grammatical structure. This
    makes the patterns clear and memorable.
  - Create a reference list of common reporting verbs with their structures. Students
    should keep this as a study aid.
  - 'Practice matching verbs to contexts: formal academic writing (state, argue, claim)
    vs casual conversation (say, tell).'
  - Drill the difference between 'suggest going' (gerund) and 'suggest that...' (that-clause).
    This is a common error.
  - 'Use news headlines as authentic examples: ''The president claims that...'' ''Scientists
    report that...'''
  recommended_activities:
  - name: Reporting Verb Categorization
    duration: 10
    adaptation_notes: Give students a list of 20 reporting verbs. They categorize
      them into 5 groups based on their grammatical structure. Then check as a class.
  - name: News Headline Reporting
    duration: 15
    adaptation_notes: 'Show real news headlines. Students rewrite them using different
      reporting verbs: ''The president says...'' → ''The president claims/argues/states...''
      Practices formal reporting.'
  - name: Direct to Reported
    duration: 15
    adaptation_notes: 'Give students direct speech. They rewrite using appropriate
      reporting verbs: ''I will help you.'' → He promised to help. ''Don''t touch
      that!'' → She warned me not to touch it.'
  - name: Verb Structure Quiz
    duration: 10
    adaptation_notes: 'Students choose the correct structure: ''He suggested ___ (to
      go/going).'' ''She asked me ___ (to help/helping).'' Practices the 5 categories.'
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using wrong structure after reporting verb: *''He suggested to go.'''
  correction: He suggested going. / He suggested that we go.
  explanation: '''Suggest'' takes a gerund or a that-clause, NOT a to-infinitive.
    Many learners incorrectly pair it with the infinitive because other reporting
    verbs (like ''agree'' or ''promise'') take the infinitive.'
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Using ''say'' with object + that-clause: *''He said me that he was tired.'''
  correction: He told me that he was tired. / He said that he was tired.
  explanation: '''Say'' cannot take a direct object before a that-clause. Use ''tell''
    when the person being addressed is specified. This is one of the most common reporting
    verb errors.'
  l1_groups:
  - Portuguese
  - Spanish
  - Japanese
- error: 'Using gerund after Category 4 verbs: *''She asked me helping.'''
  correction: She asked me to help.
  explanation: '''Ask'' is a Category 4 verb (object + to-infinitive), not a gerund
    verb. Using a gerund after ''ask'' is ungrammatical. Learners often confuse Category
    4 and Category 5 patterns.'
  l1_groups:
  - Portuguese
  - Spanish
  - Korean
register_notes:
- note: Formal reporting verbs (state, argue, claim) are preferred in academic and
    journalistic writing.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
