grammar_point: possessive_pronouns
title: Possessive Pronouns
description: 'Pronouns that replace possessive noun phrases to show ownership without
  repeating the owned noun: mine, yours, his, hers, its, ours, theirs.'
level: A1
meaning:
  core_meaning: Show ownership of a noun without repeating the noun itself. A possessive
    pronoun replaces a possessive adjective + noun phrase. 'My book' becomes 'mine'.
    The noun is understood from context and is not repeated.
  timeline: N/A — possessive pronouns are not tense-based. They show ownership regardless
    of time.
  contrast: '''Possessive adjectives'' = modify nouns and are followed by the noun
    (''my book''). ''Possessive pronouns'' = replace the noun phrase and stand alone
    (''mine'' — no noun follows).'
  ccqs:
  - question: Does a noun follow a possessive pronoun?
    answer: No — possessive pronouns stand alone. 'This is mine' NOT 'This is mine
      book.'
  - question: What is the difference between 'my' and 'mine'?
    answer: '''My'' is a possessive adjective (followed by a noun: my book). ''Mine''
      is a possessive pronoun (stands alone: This is mine).'
  - question: Do possessive pronouns use apostrophes?
    answer: No — never use apostrophes. 'Hers' NOT 'her's'. 'Its' NOT 'it's' (it's
      = it is).
  example_generator:
    contexts:
    - everyday objects
    - classroom items
    - personal belongings
    cultural_notes:
    - Use diverse objects and contexts
    - Avoid assuming specific cultural items
    - Keep examples concrete and visual
    min_examples: 5
form:
  affirmative:
    structure: Possessive pronoun stands alone (no noun follows). This is mine. =
      This is my book.
    example_generator:
    - This is mine.
    - That is yours.
    - The red one is hers.
    - The blue one is ours.
    min_examples: 4
  negative:
    structure: 'Possessive pronoun follows negative verb: It''s not theirs. That''s
      not mine.'
    example_generator:
    - It's not theirs.
    - That's not mine.
    - This isn't hers.
    - The car isn't ours.
    min_examples: 4
  questions:
    structure: 'Possessive pronoun follows auxiliary verb in questions: Is this theirs?
      Whose is this? It''s mine.'
    example_generator:
    - Is this theirs?
    - Whose is this? It's mine.
    - Is that yours?
    - Are these ours?
    min_examples: 4
sub_rules:
- rule: 'Complete list of possessive pronouns: mine, yours, his, hers, its, ours,
    theirs'
  type: lexical
  examples:
  - This is mine.
  - That is yours.
  - The book is his.
  - The car is hers.
  - The decision is ours.
  - The house is theirs.
- rule: Possessive pronouns never use apostrophes
  type: spelling
  examples:
  - hers (NOT her's)
  - ours (NOT our's)
  - theirs (NOT their's)
  - its (NOT it's — it's = it is)
- rule: No noun follows a possessive pronoun
  type: grammatical
  examples:
  - This is mine. (NOT This is mine book.)
  - The car is hers. (NOT The car is hers car.)
- rule: 'Possessive adjective vs possessive pronoun: my/mine, your/yours, his/his,
    her/hers, its/its, our/ours, their/theirs'
  type: grammatical
  examples:
  - my book → mine
  - your car → yours
  - his house → his
  - her bag → hers
  - our home → ours
  - their dog → theirs
use:
- context: Avoiding repetition
  description: Replace possessive adjective + noun to avoid redundancy
  examples:
  - My bag is heavy. Yours is light.
  - His car broke down. Ours is fine.
  - Her room is big. Theirs is small.
- context: Clarifying ownership
  description: Explicitly state who owns something without repeating the item name
  examples:
  - Whose keys are these? They're hers.
  - The decision is ours.
  - This seat is mine.
  - The mistake was theirs.
phonetics:
- note: 'Stress on the possessive pronoun when contrasting: ''This is MINE, not YOURS.''
    In unstressed positions, they are shorter: ''It''s mine'' /ɪts maɪn/.'
  example_generator:
  - mine /maɪn/
  - yours /jɔːz/
  - hers /hɜːz/
  - ours /aʊəz/
  - theirs /ðeəz/
  l1_issue: 'Portuguese and Spanish speakers may add a vowel sound before ''mine''
    or ''yours''. Teach the correct pronunciation: /maɪn/ not /maɪni/.'
teaching:
  methodology: PPP with real objects
  tips:
  - 'Memorize the complete list: mine, yours, his, hers, its, ours, theirs. Use a
    chant or song to help memorization.'
  - 'Contrast with possessive adjectives explicitly: ''my book'' vs ''mine''. Use
    real objects: hold up your bag → ''This is mine'' vs ''This is my bag''.'
  - 'Drill the apostrophe rule: possessive pronouns NEVER use apostrophes. ''Hers''
    not ''her''s''. This is a very common error.'
  - 'Use classroom objects: ''Whose pen is this? It''s mine. It''s hers. It''s theirs.''
    Makes the grammar physical and immediate.'
  recommended_activities:
  - name: Whose Is It?
    duration: 10
    adaptation_notes: 'Collect objects from students. Hold up each object: ''Whose
      is this?'' Students respond: ''It''s mine.'' ''It''s hers.'' Practices possessive
      pronouns with real objects.'
  - name: Possessive Pronoun Chant
    duration: 5
    adaptation_notes: 'Students chant the complete list: ''Mine, yours, his, hers,
      its, ours, theirs.'' Repetition helps memorization.'
  - name: My vs Mine
    duration: 10
    adaptation_notes: 'Teacher says a sentence with a possessive adjective. Students
      rewrite with a possessive pronoun: ''My book is red.'' → ''Mine is red.'' Practices
      the transformation.'
  - name: Ownership Game
    duration: 15
    adaptation_notes: 'Students describe their belongings using possessive pronouns:
      ''My phone is new. Yours is old. His is broken.'' Practices contrasting ownership.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Confusing ''its'' and ''it''s'': *''The dog wagged it''s tail.'''
  correction: The dog wagged its tail.
  explanation: '''Its'' shows possession. ''It''s'' = ''it is''.'
  l1_groups:
  - All L1 groups
- error: 'Using ''mine'' instead of ''my'': *''This is mine book.'''
  correction: This is my book.
  explanation: '''My'' is a possessive adjective (before a noun). ''Mine'' is a possessive
    pronoun (stands alone).'
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: Possessive pronouns are consistent across registers.
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: 'Possessive pronouns replace noun phrases: ''This is my book. It''s mine.'''
