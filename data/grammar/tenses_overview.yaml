grammar_point: tenses_overview
title: Tenses Overview (All 12 English Tenses)
description: A comprehensive summary of all 12 English verb tenses, including their
  form, core meaning, and common uses for quick teacher reference.
level: A1-B2
meaning:
  core_meaning: Tenses indicate the time (past/present/future) and aspect (simple/continuous/perfect)
    of an action or state.
  timeline: 'Past (before now), Present (now), Future (after now); Aspects: Simple
    (fact), Continuous (ongoing), Perfect (completed with present relevance).'
  contrast: 'Present Simple (fact): "I work here."

    Present Continuous (ongoing): "I am working now."

    Present Perfect (completed with relevance): "I have worked here for 5 years."

    '
  ccqs:
  - question: How many tenses does English have
    answer: '12 main tenses: 4 present, 4 past, 4 future.'
    purpose: Tests whether the learner understands a key concept of tenses_overview.
      This is fundamental for correct use of this grammar point.
  - question: Can we use a different structure here with the same meaning?
    answer: No — changing the structure would change the meaning or make the sentence
      ungrammatical.
    purpose: Tests whether the learner understands that tenses overview is the only
      appropriate structure for this meaning/context.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      tenses overview and explain why they are incorrect.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Present Tenses:

      - Present Simple: Subject + Base Verb (s/es for 3rd sing): "I work."

      - Present Continuous: Subject + am/is/are + Verb-ing: "I am working."

      - Present Perfect: Subject + have/has + Past Participle: "I have worked."

      - Present Perfect Continuous: Subject + have/has + been + Verb-ing: "I have
      been working."

      Past Tenses:

      - Past Simple: Subject + Past Verb: "I worked."

      - Past Continuous: Subject + was/were + Verb-ing: "I was working."

      - Past Perfect: Subject + had + Past Participle: "I had worked."

      - Past Perfect Continuous: Subject + had + been + Verb-ing: "I had been working."

      Future Tenses:

      - Future Simple: Subject + will + Base Verb: "I will work."

      - Future Continuous: Subject + will be + Verb-ing: "I will be working."

      - Future Perfect: Subject + will have + Past Participle: "I will have worked."

      - Future Perfect Continuous: Subject + will have been + Verb-ing: "I will have
      been working."

      '
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
  negative:
    structure: 'Add ''not'' after auxiliary verb: "I don''t work." "I am not working."
      "I haven''t worked."

      '
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
  questions:
    structure: 'Auxiliary + Subject + Main Verb: "Do you work?" "Are you working?"
      "Have you worked?"

      '
    example_generator:
      contexts:
      - work and professional life
      min_examples: 4
sub_rules:
- rule: 'Present tenses: simple (I work), continuous (I am working), perfect (I have
    worked), perfect continuous (I have been working)'
  type: grammatical
  examples:
  - I work every day
  - I am working now
  - I have worked here for 5 years
  - I have been working all day
- rule: 'Past tenses: simple (I worked), continuous (I was working), perfect (I had
    worked), perfect continuous (I had been working)'
  type: grammatical
  examples:
  - I worked yesterday
  - I was working when he called
  - I had worked there for 5 years
  - I had been working all day
- rule: 'Future tenses: simple (I will work), continuous (I will be working), perfect
    (I will have worked), perfect continuous (I will have been working)'
  type: grammatical
  examples:
  - I will work tomorrow
  - I will be working at 8pm
  - I will have worked here for 5 years by then
  - I will have been working all day
use:
- name: Present Tenses
  description: 'Present Simple: habits, facts; Present Continuous: ongoing actions;
    Present Perfect: past actions with present relevance; Present Perfect Continuous:
    ongoing actions with duration.'
  examples:
  - I drink coffee. (habit)
  - I am drinking coffee. (now)
  - I have drunk coffee. (relevance)
  key_point: Present tenses refer to now or general time.
- name: Past Tenses
  description: 'Past Simple: completed past actions; Past Continuous: ongoing past
    actions; Past Perfect: past action before another past action; Past Perfect Continuous:
    ongoing past action before another past action.'
  examples:
  - I worked yesterday. (completed)
  - I was working when he called. (ongoing)
  key_point: Past tenses refer to time before now.
- name: Future Tenses
  description: 'Future Simple: predictions, promises; Future Continuous: ongoing future
    actions; Future Perfect: completed future actions; Future Perfect Continuous:
    ongoing future actions with duration.'
  examples:
  - I will work tomorrow. (prediction)
  - I will be working at 5 PM. (ongoing)
  key_point: Future tenses refer to time after now.
phonetics:
- note: Each tense has distinct pronunciation patterns. Teach the pronunciation of
    each tense separately, focusing on the auxiliary verbs and their contractions.
  example_generator:
    contexts:
    - all tenses
  l1_issue: Many L1 speakers struggle with the variety of English tenses. Use timelines
    to visualize the differences.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Present Simple vs Present Continuous.'
  - 'Week 2: Past Simple vs Present Perfect.'
  - 'Week 3: Future forms (will vs going to).'
  - 'Use timeline drawings: Visualize past/present/future on a line to show tense
    relationships.'
  recommended_activities:
  - name: Tense Timeline
    duration: 15
    adaptation_notes: Students draw a timeline and place all 12 tenses on it. Visual
      support helps understanding.
  - name: Tense Identification
    duration: 10
    adaptation_notes: Show sentences. Students identify the tense and explain why
      it is used.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I am going to school yesterday.*'
  correction: I went to school yesterday.
  explanation: Past time requires past tense.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used for everyday communication and is
    among the most frequent patterns in spoken English.
- note: In academic writing, this structure appears in discussions of established
    knowledge, methodology, and findings.
- note: In news reports, this structure is used for reporting events and attributing
    statements.
