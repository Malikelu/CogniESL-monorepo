grammar_point: simple_passive
title: Simple Passive (Present and Past)
description: Basic passive voice in present and past simple. Used when the action
  or receiver is more important than the doer.
level: B1
meaning:
  core_meaning: The passive voice focuses on the action or the receiver of the action,
    not the doer. The doer is often unknown, unimportant, or obvious.
  timeline: Present passive = general truths, habits. Past passive = completed actions.
  contrast: Active = Someone stole my bike. vs Passive = My bike was stolen. (focus
    on the bike, not the thief)
  ccqs:
  - question: Is the focus on the action or the doer?
    answer: Action/receiver = passive.
  - question: Do we know who did it?
    answer: No or it is not important = passive.
  example_generator:
    contexts:
    - news reports
    - process descriptions
    - formal writing
    - when doer is unknown
    cultural_notes:
    - Passive is very common in news, science, and formal writing
    - Some languages use passive much less frequently
    min_examples: 5
form:
  affirmative:
    structure: 'Present: am/is/are + past participle / Past: was/were + past participle'
    example_generator:
      contexts:
      - present passive
      - past passive
      min_examples: 4
  negative:
    structure: 'Present: am/is/are + not + past participle / Past: was/were + not
      + past participle'
    example_generator:
      contexts:
      - negative passive
      min_examples: 3
  questions:
    structure: Is/Are/Was/Were + subject + past participle?
    example_generator:
      contexts:
      - passive questions
      min_examples: 3
sub_rules:
- rule: Use by + agent only when the doer is important
  type: grammatical
  examples:
  - The book was written by Shakespeare. (important)
  - My bike was stolen. (unknown doer — no by)
- rule: Passive is common in news, science, and formal writing
  type: register
  examples:
  - It is reported that... (news)
  - The solution was heated. (science)
  - Mistakes were made. (formal)
- rule: Some verbs are rarely used in passive (intransitive verbs)
  type: grammatical
  examples:
  - The accident happened. (not was happened)
  - I have a car. (not a car is had by me)
use:
- context: News reports
  description: Reporting events when the doer is unknown or unimportant
  examples:
  - Three people were injured in the accident.
  - The building was destroyed by fire.
- context: Process descriptions
  description: Explaining how something is made or done
  examples:
  - The grapes are harvested in October.
  - The data is analyzed by computers.
phonetics:
- note: Stress on the past participle in passive sentences
  example_generator:
    contexts:
    - sentence stress
  l1_issue: Many L1 speakers avoid passive voice entirely
teaching:
  methodology: PPP
  tips:
  - Use news headlines as examples
  - Practice transforming active to passive
  - Explain when passive is appropriate
  recommended_activities:
  - name: News Report
    duration: 15
    adaptation_notes: Students rewrite news headlines in passive voice.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
