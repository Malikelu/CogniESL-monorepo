grammar_point: simple_passive
title: Simple Passive (Present and Past)
description: Basic passive voice in present and past simple. Used when the action
  or receiver is more important than the doer.
level: B1
meaning:
  core_meaning: The passive voice focuses on the action or the receiver of the action,
    not the doer. The doer is often unknown, unimportant, or obvious.
  timeline: Present passive = general truths, habits. Past passive = completed actions.
  contrast: Active = Someone stole my bike. vs Passive = My bike was stolen. (focus
    on the bike, not the thief)
  ccqs:
  - question: Is the focus on the action or the doer?
    answer: Action/receiver = passive.
    purpose: Tests whether the learner understands the fundamental purpose of the
      passive voice -- to shift focus from the agent (doer) to the action and its
      recipient, which is the core reason for choosing passive over active.
  - question: Do we know who did it?
    answer: No or it is not important = passive.
    purpose: Tests whether the learner can identify the most common pragmatic triggers
      for using the passive -- when the agent is unknown, irrelevant, or obvious --
      which guides them in choosing active vs passive voice.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      simple passive and explain why they are incorrect.
example_generator:
  contexts:
  - news reports
  - process descriptions
  - formal writing
  - when doer is unknown
  cultural_notes:
  - Passive is very common in news, science, and formal writing
  - Some languages use passive much less frequently
  min_examples: 5
form:
  affirmative:
    structure: 'Present: am/is/are + past participle / Past: was/were + past participle'
    example_generator:
      contexts:
      - present passive
      - past passive
      min_examples: 4
  negative:
    structure: 'Present: am/is/are + not + past participle / Past: was/were + not
      + past participle'
    example_generator:
      contexts:
      - negative passive
      min_examples: 3
  questions:
    structure: Is/Are/Was/Were + subject + past participle?
    example_generator:
      contexts:
      - passive questions
      min_examples: 3
sub_rules:
- rule: Use by + agent only when the doer is important
  type: grammatical
  examples:
  - The book was written by Shakespeare. (important)
  - My bike was stolen. (unknown doer -- no by)
- rule: Passive is common in news, science, and formal writing
  type: register
  examples:
  - It is reported that... (news)
  - The solution was heated. (science)
  - Mistakes were made. (formal)
- rule: Some verbs are rarely used in passive (intransitive verbs)
  type: grammatical
  examples:
  - The accident happened. (not was happened)
  - I have a car. (not a car is had by me)
use:
- context: News reports
  description: Reporting events when the doer is unknown or unimportant
  examples:
  - Three people were injured in the accident.
  - The building was destroyed by fire.
- context: Process descriptions
  description: Explaining how something is made or done
  examples:
  - The grapes are harvested in October.
  - The data is analyzed by computers.
phonetics:
- note: Stress on the past participle in passive sentences
  example_generator:
    contexts:
    - sentence stress
  l1_issue: Many L1 speakers avoid passive voice entirely
teaching:
  methodology: PPP
  tips:
  - Use news headlines as examples
  - Practice transforming active to passive
  - Explain when passive is appropriate
  recommended_activities:
  - name: News Report
    duration: 15
    adaptation_notes: Students rewrite news headlines in passive voice.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 8:
    Passive Voice, §8.1-8.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using passive with intransitive verbs: *''The accident was happened.'''
  correction: The accident happened.
  explanation: Intransitive verbs (happen, arrive, sleep, die) cannot be made passive
    because they have no direct object to become the subject of a passive sentence.
    Only transitive verbs take the passive voice.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Including unnecessary ''by'' agent: *''My bike was stolen by someone.'''
  correction: My bike was stolen.
  explanation: When the agent is unknown or unimportant, there is no need to include
    it. Adding 'by someone' sounds unnatural because it adds information that is already
    obvious or irrelevant.
  l1_groups:
  - Portuguese
  - Spanish
  - Japanese
- error: 'Forming passive with base participle: *''The letter was send.'''
  correction: The letter was sent.
  explanation: The passive voice requires a past participle, not the base form of
    the verb. Regular verbs like 'send' have an irregular past participle (sent).
    This is a common formation error at B1 level.
  l1_groups:
  - Portuguese
  - Spanish
  - Korean
register_notes:
- note: The passive voice is standard in news, science, academic writing, and formal
    contexts. Overuse in casual speech can sound unnatural.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: Extremely common in news headlines, scientific writing (methods sections),
    and formal reports. In everyday speech, used less frequently.
