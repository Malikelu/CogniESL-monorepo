grammar_point: complex_reporting
title: Complex Reporting Structures
description: 'Advanced reporting structures: passive reporting verbs, reporting with
  that-clauses, and reporting questions.'
level: C1
meaning:
  core_meaning: Reporting what others said or thought using complex structures. Includes
    passive reporting (It is said that...), reporting verbs with that-clauses, and
    reported questions.
  timeline: Depends on the tense of the reporting verb.
  contrast: Simple reporting = He said that he was tired. vs Passive reporting = It
    is said that he is rich.
  ccqs:
  - question: Is the speaker reporting their own words or someone else's?
    answer: Someone else's — that is reporting.
    purpose: Tests whether the learner understands that '-ed' adjectives describe
      how someone feels (experiencer) while '-ing' adjectives describe what causes
      the feeling (stimulus).
  - question: Is the reporting verb active or passive?
    answer: Passive = impersonal, Active = attributed.
    purpose: Tests whether the learner can identify whether a sentence is active or
      passive. Understanding voice is essential for choosing the correct verb form
      and word order.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      complex reporting and explain why they are incorrect.
  example_generator:
    contexts:
    - news reporting
    - academic writing
    - formal communication
    - indirect speech
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Passive: It is said/reported/believed + that + clause / Active: Subject
      + reporting verb + that + clause'
    example_generator:
      contexts:
      - news reporting
      - academic writing
      - formal communication
      min_examples: 4
  negative:
    structure: It is not believed that... / Experts deny that...
    example_generator:
      contexts:
      - news reporting
      - academic writing
      - formal communication
      min_examples: 4
  questions:
    structure: Not typically used in questions.
    example_generator:
      contexts:
      - news reporting
      - academic writing
      - formal communication
      min_examples: 4
sub_rules:
- rule: Passive reporting verbs with it + passive + that
  type: grammatical
  examples:
  - It is believed that the economy will improve.
  - It is known that smoking causes cancer.
- rule: Active reporting verbs
  type: grammatical
  examples:
  - Scientists claim that the study is flawed.
  - The government denied that there was a problem.
- rule: Reported questions use whether or if, not question word order
  type: grammatical
  examples:
  - She asked whether I was coming.
  - They wanted to know if I had finished.
use:
- context: News reporting
  description: Reporting information from sources
  examples:
  - It is reported that the president will resign.
  - Sources claim that negotiations are ongoing.
- context: Academic writing
  description: Reporting research findings
  examples:
  - Studies suggest that exercise improves mental health.
  - It has been argued that technology is harmful.
phonetics:
- note: Stress on the reporting verb in passive structures
  example_generator:
    contexts:
    - emphasis
  l1_issue: Word order in reported questions — some L1 speakers keep question order.
teaching:
  methodology: Guided discovery
  tips:
  - Use real news headlines as examples
  - Practice transforming direct speech to reported speech
  - Contrast active and passive reporting
  recommended_activities:
  - name: News Reporter
    duration: 15
    adaptation_notes: Students rewrite news headlines using passive reporting structures.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 8:
    Passive Voice, §8.1-8.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*It is said that he is the richest man is in the world.*'
  correction: It is said that he is the richest man in the world.
  explanation: 'Double ''is'': the passive reporting verb (''is said'') and the main
    verb (''is the richest'') must not be duplicated. The ''that'' clause contains
    one complete sentence with one main verb.'
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
  - Arabic
- error: '*She asked me where was the station.*'
  correction: She asked me where the station was.
  explanation: Reported questions use statement word order (subject + verb), not question
    word order (verb + subject). This is one of the most persistent reported errors
    at B2-C1 level across all L1 backgrounds.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
  - Arabic
  - Korean
- error: '*Experts claim the study is flawed that.*'
  correction: Experts claim that the study is flawed.
  explanation: The 'that' complementizer must come immediately after the reporting
    verb, not at the end of the clause. In English, complementizer 'that' begins the
    complement clause; it does not close it. Germanic L1 speakers transfer verb-final
    patterns.
  l1_groups:
  - German
  - Dutch
  - Portuguese
- error: '*Scientists deny there was a problem that existed.*'
  correction: Scientists deny that there was a problem.
  explanation: Doubling the clause content with a relative ('that existed') after
    'deny that' creates redundancy. The 'that' clause after 'deny' already expresses
    what is denied. This is a processing error from monitoring multiple clauses.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
