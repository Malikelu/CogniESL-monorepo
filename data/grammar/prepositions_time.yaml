grammar_point: prepositions_time
title: Prepositions of Time (At, In, On)
description: 'Prepositions used to talk about when something happens: at (specific
  time), in (months/years/seasons), on (days/dates).'
level: A1
meaning:
  core_meaning: Prepositions of time tell us WHEN something happens. Each preposition
    is used with different time expressions.
  timeline: Specific to the time expression used with each preposition.
  contrast: '''At'' = specific time (at 3pm) vs ''In'' = longer periods (in July)
    vs ''On'' = days/dates (on Monday)'
  ccqs:
  - question: Is it a specific clock time?
    answer: Use 'at' (at 3pm)
    purpose: 'Tests whether the learner can distinguish between the three main time
      prepositions: at (exact time), on (days/dates), in (months/years/periods).'
  - question: Is it a day or date?
    answer: Use 'on' (on Monday)
    purpose: Tests understanding of prepositions_time.
  - question: Is it a month, year, or season?
    answer: Use 'in' (in July)
    purpose: Tests understanding of prepositions_time.
  example_generator:
    contexts:
    - schedules and appointments
    - daily routines
    - holidays and special dates
    - telling time
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'at + specific time: ''at 3pm'', ''at noon'' / in + month/year/season:
      ''in July'', ''in 2024'' / on + day/date: ''on Monday'', ''on July 4th'''
    example_generator:
      contexts:
      - schedules and appointments
      - daily routines
      - holidays and special dates
      min_examples: 4
  negative:
    structure: 'Same preposition, negated verb: ''The class doesn''t start at 9am.'''
    example_generator:
      contexts:
      - schedules and appointments
      - daily routines
      - holidays and special dates
      min_examples: 4
  questions:
    structure: 'When + be/auxiliary?: ''When is the meeting?'' → ''At 3pm.'''
    example_generator:
      contexts:
      - schedules and appointments
      - daily routines
      - holidays and special dates
      min_examples: 4
sub_rules:
- rule: 'at: at 3pm, at noon, at night, at the weekend'
  type: grammatical
  examples:
  - I wake up at 7am.
  - We rest at night.
- rule: 'in: in the morning, in July, in 2024, in summer'
  type: grammatical
  examples:
  - I was born in 1990.
  - We swim in summer.
- rule: 'on: on Monday, on July 4th, on my birthday'
  type: grammatical
  examples:
  - The class is on Monday.
  - We celebrate on Christmas Day.
- rule: 'No preposition with: today, tomorrow, yesterday, last, next, this, every'
  type: grammatical
  examples:
  - I study every day. (not 'on every day')
  - See you tomorrow. (not 'on tomorrow')
use:
- context: Making appointments
  description: Scheduling meetings and events
  examples:
  - Let's meet at 3pm.
  - The party is on Saturday.
- context: Talking about routines
  description: Describing when things happen regularly
  examples:
  - I exercise in the morning.
  - We have class on Mondays.
phonetics:
- note: 'Weak forms: /æt/ → /ət/, /ɪn/ → /ən/, /ɒn/ → /ən/'
  contexts:
  - connected speech
  l1_issue: Prepositions are often omitted or confused by L1 speakers
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use a timeline to visualize at/in/on
  - Create a chart with time expressions
  recommended_activities:
  - name: Time Preposition Sort
    duration: 10
    adaptation_notes: Students sort time expressions into at/in/on columns.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 15:
    Prepositions, §15.1-15.7'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I will meet you in Monday.*'
  correction: I will meet you on Monday.
  explanation: '''On'' is for days and dates (on Monday, on July 4th). ''In'' is for
    months, years, and parts of day (in July, in 2023, in the morning). ''At'' is
    for exact times (at 5pm, at noon).'
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
