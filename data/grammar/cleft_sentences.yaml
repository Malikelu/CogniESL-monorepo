grammar_point: cleft_sentences
title: Cleft Sentences (It-Clefts and Wh-Clefts)
description: Sentence structures that emphasize a specific word or phrase by splitting
  the sentence into two parts, using 'it' (it-clefts) or 'wh-' words (wh-clefts) as
  the focus.
level: C1
meaning:
  core_meaning: Emphasize a specific part of a sentence to correct misinformation
    or highlight importance, rather than stating a neutral fact.
  timeline: 'It-clefts: Present (it is) and past (it was). Wh-clefts: Present and
    past tense agreement with the emphasized element.'
  contrast: '''Neutral sentence'' = No emphasis: "John called me." (fact)

    ''It-cleft'' = Emphasize John: "It was John that called me." (not Mary)

    ''Wh-cleft'' = Emphasize the action: "What John did was call me." (not text)

    '
  ccqs:
  - question: It was John that called me. Did Mary call?
    answer: No. John called. The speaker is correcting the assumption that Mary called.
  - question: What I need is a holiday. Does the speaker need a new phone?
    answer: No. The speaker needs a holiday. This is the emphasized element.
  - question: Is 'It was in Paris that we met' emphasizing the time or the place?
    answer: The place. 'In Paris' is the emphasized element.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'It-cleft: It + be + emphasized element + that/who + remaining clause:
      "It was John that called." (emphasizes John)

      Wh-cleft: Wh-word (what/where/when) + clause + be + emphasized element: "What
      I need is sleep." (emphasizes sleep)

      It-cleft past: It + was + emphasized element + that/who: "It was yesterday that
      we met."

      '
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
  negative:
    structure: 'It + be + not + emphasized element + that/who: ''It wasn''t me that
      broke the vase.'' Wh-cleft negative: ''What I don''t like is spicy food.'''
    example_generator:
      contexts:
      - education and school
      min_examples: 4
  questions:
    structure: 'Invert be verb for it-cleft questions: ''Is it coffee that you drink?''
      ''Was it John that called?'' Wh-cleft questions: ''What is it that you want?'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: 'The it-cleft follows the pattern: It + be + focused element + that/who +
    clause. Use who for people and that for everything else'
  type: grammatical
  examples:
  - It was Maria who called (not that called)
  - It was the blue car that caused the accident
  - It is the teacher that students remember most
- rule: 'The wh-cleft follows the pattern: What/Where/When + subject + verb + be +
    focused element. What is by far the most common wh-word'
  type: grammatical
  examples:
  - What I need is a good night's sleep
  - What she said was very helpful
  - What we want is more time
- rule: In it-clefts, always use that for time and place, never when or where
  type: grammatical
  examples:
  - It was last summer that I visited Paris (not when)
  - It was in London that they met (not where)
use:
- name: Correct Misinformation (It-Clefts)
  description: Emphasize the correct person, thing, time, or place to correct a mistake.
  examples:
  - It was Tuesday that we arrived, not Monday.
  - It is Mary who won the prize, not Sarah.
  key_point: Most common use of it-clefts.
- name: Highlight Importance (Wh-Clefts)
  description: Emphasize the most important part of a situation, often in spoken English.
  examples:
  - What I really need is a vacation.
  - Where we should go is the beach.
  key_point: Wh-clefts are more common in spoken than written English.
- name: Emphasize Time/Place (It-Clefts)
  description: Focus on when or where an action happened.
  examples:
  - It was in 2020 that the pandemic started.
  - It is at 5pm that the meeting ends.
  key_point: Use 'that' for time/place, never 'when/where' in it-clefts.
phonetics:
- note: 'In cleft sentences, the focused element receives strong stress: ''It was
    MARIA who called.'' ''What I NEED is a good night''s sleep.'''
  example_generator:
    contexts:
    - cleft sentence stress
  l1_issue: Learners may not stress the focused element sufficiently, making the cleft
    sentence sound flat.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: It-clefts (present/past, correct misinformation).'
  - 'Week 2: Wh-clefts (what/where/when, highlight importance).'
  - 'Week 3: Contrast neutral sentences with cleft sentences.'
  - 'Use dialogue scenarios: ''I thought you liked tea.'' ''No, it is coffee that
    I like!'''
  recommended_activities:
  - name: Cleft Sentence Transformation
    duration: 15
    adaptation_notes: 'Give students simple sentences. They transform them into cleft
      sentences: ''Maria called.'' → ''It was Maria who called.'''
  - name: Focus on the Important Part
    duration: 15
    adaptation_notes: Students write a paragraph about an important event, then rewrite
      key sentences using cleft structures to emphasize different elements.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for cleft_sentences.
  correction: Correct form.
  explanation: This is a common error for cleft_sentences.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
