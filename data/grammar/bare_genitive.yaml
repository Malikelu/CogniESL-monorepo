grammar_point: bare_genitive
title: Bare Genitive
description: 'The possessive form without an apostrophe for certain fixed expressions:
  for goodness sake, at death''s door.'
level: C2
meaning:
  core_meaning: The bare genitive is a fixed expression where the possessive 's is
    used without an apostrophe in certain idiomatic phrases. These are fossilized
    expressions from older forms of English.
  timeline: Timeless — fixed expressions.
  contrast: Regular possessive = the dog's bone vs Bare genitive = for goodness sake
    (no apostrophe)
  ccqs:
  - question: Is this a fixed expression?
    answer: Yes, bare genitives are always fixed idiomatic expressions.
    purpose: Tests whether the learner understands that bare genitives are fixed idiomatic
      expressions. This is important because these are fossilized forms from older
      English and cannot be created with new expressions.
  - question: Does it have an apostrophe?
    answer: No, these are fossilized forms without apostrophes.
    purpose: Tests whether the learner knows that these fixed forms do not use apostrophes.
      This is important because the lack of apostrophe in these expressions is a historical
      artifact that learners must simply memorize.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      bare genitive and explain why they are incorrect.
  example_generator:
    contexts:
    - fixed expressions
    - idiomatic English
    - formal/literary English
    cultural_notes:
    - These are very advanced, rare expressions
    - Most native speakers are not aware of the term bare genitive
    min_examples: 3
form:
  affirmative:
    structure: 'Fixed expression: for goodness sake, at death''s door, out of harm''s
      way, for old times sake'
    example_generator:
      contexts:
      - fixed expressions
      min_examples: 4
  negative:
    structure: Not applicable — these are fixed expressions.
    example_generator:
      contexts: []
    min_examples: 0
  questions:
    structure: Not used in questions.
    example_generator:
      contexts: []
    min_examples: 0
sub_rules:
- rule: These are fossilized expressions from older English
  type: historical
  examples:
  - for goodness sake (from for God's sake)
  - at death's door (from at the door of death)
- rule: No apostrophe is used in these fixed forms
  type: spelling
  examples:
  - for goodness sake is correct
  - for goodness's sake is incorrect
use:
- context: Fixed expressions
  description: Used in specific idiomatic phrases
  examples:
  - For goodness sake, be quiet!
  - He was at death's door.
  - They moved the children out of harm's way.
phonetics:
- note: These expressions are pronounced as single chunks
  example_generator:
    contexts:
    - connected speech
  l1_issue: Very advanced — most L1 speakers will not encounter these expressions
    frequently
teaching:
  methodology: Guided discovery
  tips:
  - Teach as fixed expressions, not as a grammar rule
  - Use authentic examples from literature and film
  - Explain the historical origin
  recommended_activities:
  - name: Expression Matching
    duration: 10
    adaptation_notes: Students match bare genitive expressions to their meanings.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''s with inanimate objects: *''The table''s leg.'''
  correction: The leg of the table.
  explanation: Use 'of' for inanimate objects, 's for people and animals.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: Possessive 's is more common in informal writing. 'Of' is preferred in formal
    writing for inanimate objects.
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: 'Possessive ''s shows relationships: ''John''s car'', ''the company''s policy''.'
