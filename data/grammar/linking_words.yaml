grammar_point: linking_words
title: Linking Words (Addition, Contrast, Cause, Result)
description: Words and phrases that connect ideas in sentences and paragraphs.
level: B1
meaning:
  core_meaning: Linking words show relationships between ideas — adding information,
    showing contrast, explaining causes, or describing results.
  timeline: N/A — linking words match the tense of the clauses they connect.
  contrast: 'Addition: and adds similar ideas. Contrast: but shows opposition. Cause:
    because explains why. Result: so shows the outcome.'
  ccqs:
  - question: Does and add similar ideas or show contrast
    answer: And adds similar ideas. But shows contrast.
  - question: What is the difference between because and so
    answer: Because introduces the reason. So introduces the result.
  example_generator:
    contexts:
    - academic writing
    - everyday conversation
    cultural_notes:
    - Formal linking words are essential for academic writing
    min_examples: 5
form:
  affirmative:
    structure: 'Addition: and, also, in addition, moreover Contrast: but, however,
      although, nevertheless Cause: because, since, as, due to Result: so, therefore,
      as a result, consequently

      '
    example_generator:
    - I like coffee and tea.
    - She is smart. Moreover, she is kind.
    - I like coffee but not tea.
    - Although it rained, we went out.
    min_examples: 4
  negative:
    structure: Negative clauses with linking words. Nor + auxiliary + subject for
      addition of negatives.
    example_generator:
    - I do not like coffee, nor do I like tea.
    - She did not come because she was sick.
    min_examples: 4
  questions:
    structure: Questions with linking words. Or for alternatives. Why for cause.
    example_generator:
    - Do you like coffee or tea
    - Why did you stay home since you were sick
    min_examples: 4
sub_rules:
- rule: 'Addition: and (informal), moreover and furthermore (formal)'
  type: grammatical
  examples:
  - I like coffee and tea
  - She is smart. Moreover, she is kind
- rule: 'Contrast: but (informal), however and although (formal)'
  type: grammatical
  examples:
  - I like coffee but not tea
  - However, I prefer tea
- rule: 'Cause: because (common), due to (formal with noun)'
  type: grammatical
  examples:
  - I drink coffee because I like it
  - Due to the rain, we stayed home
- rule: 'Result: so (informal), therefore (formal)'
  type: grammatical
  examples:
  - I like coffee, so I drink it daily
  - It rained. Therefore, we stayed home
use:
- context: Addition
  examples:
  - I like coffee and tea
  - She is smart. Moreover, she is kind
- context: Contrast
  examples:
  - I like coffee but not tea
  - Although it rained, we went out
- context: Cause and reason
  examples:
  - I drink coffee because I like it
  - Due to the traffic, we were late
- context: Result
  examples:
  - I like coffee, so I drink it daily
  - It rained. As a result, we stayed home
phonetics:
  note: 'Linking words are usually unstressed: ''and'' → /ən/, ''but'' → /bət/, ''because''
    → /bɪˈkɒz/ (standard weak form) or /kəz/ (very informal/casual). Formal linking
    words receive more stress.'
  example_generator:
    contexts:
    - connected speech
  l1_issue: Portuguese and Spanish speakers often use 'but' where English requires
    'however' in formal writing. Teach the register difference.
teaching:
  methodology: PPP with paragraph building
  tips:
  - 'Week 1: Basic addition (and) and contrast (but).'
  - 'Week 2: Cause (because) and result (so).'
  - 'Week 3: Formal linking words (moreover, however, therefore).'
  recommended_activities:
  - name: Linking Word Sort
    duration: 10
    adaptation_notes: Students sort linking words into categories.
  - name: Paragraph Building
    duration: 15
    adaptation_notes: Students connect short sentences with linking words to create
      a coherent paragraph.
  - name: Formal or Informal
    duration: 10
    adaptation_notes: Students rewrite informal sentences using formal linking words.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
