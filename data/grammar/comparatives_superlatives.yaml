grammar_point: comparatives_superlatives
title: Comparatives & Superlatives (Adjectives & Adverbs)
description: 'Forms used to compare two or more people/things: comparatives (compare
  two, -er/more) and superlatives (compare three+, -est/most).'
level: A2
meaning:
  core_meaning: Compare differences between two (comparative) or more than two (superlative)
    people/things in terms of quality, quantity, or manner.
  timeline: N/A (Applies to all tenses; form of adjective/adverb does not change with
    tense).
  contrast: '"Comparative" = Two items: "taller than" (A vs B)


    "Superlative" = Three+ items: "tallest" (A vs B vs C)


    "Regular" = -er/-est/more/most: "happy → happier → happiest"


    "Irregular" = Special forms: "good → better → best"

    '
  ccqs:
  - question: Are we comparing two things or a group of three or more?
    answer: Two = comparative. Three or more = superlative.
    purpose: Tests whether the learner understands the difference between comparative
      (comparing two items) and superlative (comparing one item to a group).
  - question: Is the comparative form using -er or more?
    answer: Short adjectives (1 syllable) always use -er. Many 2-syllable adjectives
      also use -er (happier, simpler, narrower). Adjectives with 3+ syllables use
      more. Some 2-syllable adjectives can use either (e.g., cleverer or more clever).
    purpose: Tests whether the learner knows the spelling rules for comparative formation.
      The -er vs more distinction is one of the most common errors at A2-B1 level.
  - question: Do we need 'the' before the adjective?
    answer: Yes, for superlatives (the tallest, the most beautiful). Not for comparatives.
    purpose: Tests whether the learner knows that superlatives require the definite
      article 'the', while comparatives do not. This is a reliable structural rule
      that helps learners self-correct.
  - question: Is this an irregular form?
    answer: Good/better/best, bad/worse/worst, far/further/furthest are irregular
      -- they do not follow the -er/-est pattern.
    purpose: Tests whether the learner knows the most common irregular comparative/superlative
      forms. These three sets (good, bad, far) are extremely common and must be memorized.
  example_generator:
    contexts:
    - everyday situations
    - shopping
    - sports
    - describing people
    cultural_notes:
    - Many languages use a separate word for comparison rather than changing the adjective
      form
    - Irregular forms are very common and must be memorised early
    min_examples: 5
form:
  affirmative:
    structure: 'Short adjectives (1 syllable): Comparatives add -er, superlatives
      add -est: "taller", "tallest"

      Long adjectives (2+ syllables): Comparatives use more/less, superlatives use
      most/least: "more beautiful", "most beautiful"

      Irregular adjectives: "good → better → best", "bad → worse → worst"

      Adverb comparatives/superlatives: "faster", "fastest" (regular adverbs); "more
      carefully", "most carefully" (adverbs ending in -ly)

      '
    example_generator:
      contexts:
      - family and relationships
      - entertainment and media
      - sports
      min_examples: 4
  negative:
    structure: 'Use less/least for negative comparisons: ''less interesting'', ''least
      popular''. Negate verb: ''She isn''t taller than him.'''
    example_generator:
      contexts:
      - entertainment and media
      - opinions
      min_examples: 4
  questions:
    structure: 'Invert verb for questions: ''Is she taller than him?'' ''What''s the
      most popular sport?'''
    example_generator:
      contexts:
      - family and relationships
      - quizzes
      min_examples: 4
sub_rules:
- rule: 'Spelling: double the final consonant after a short vowel (big → bigger, sad
    → sadder)'
  type: grammatical
  examples:
  - big → bigger → biggest
  - sad → sadder → saddest
  - thin → thinner → thinnest
- rule: 'Spelling: change y to i after a consonant (happy → happier, dry → drier)'
  type: grammatical
  examples:
  - happy → happier → happiest
  - dry → drier → driest
  - pretty → prettier → prettiest
- rule: 'Spelling: just add -r/-st to adjectives ending in -e (nice → nicer, large
    → larger)'
  type: grammatical
  examples:
  - nice → nicer → nicest
  - large → larger → largest
  - simple → simpler → simplest
- rule: 'Irregular forms: good → better → best; bad → worse → worst; far → farther/further
    → farthest/furthest'
  type: lexical
  examples:
  - good → better → best
  - bad → worse → worst
  - far → further → furthest
- rule: Adverbs ending in -ly always use more/most (more carefully, most quickly)
  type: grammatical
  examples:
  - carefully → more carefully → most carefully
  - quickly → more quickly → most quickly
- rule: Superlative with 'the' — except before possessives (the tallest girl / my
    best friend)
  type: grammatical
  examples:
  - the tallest building in the city
  - my best friend
  - her worst nightmare
use:
- context: Compare Two Items (Comparatives)
  description: Show difference between two people/things using 'than'.
  examples:
  - My car is faster than yours.
  - She is more experienced than him.
  - This book is cheaper than that one.
- context: Compare Three+ Items (Superlatives)
  description: Show the highest/lowest degree among three or more, use 'the' before
    superlative.
  examples:
  - He is the tallest in the class.
  - This is the most delicious cake I've ever eaten.
  - That was the worst film of the year.
- context: Negative Comparisons
  description: Use less/least to show lower degree.
  examples:
  - This task is less difficult than I thought.
  - He is the least prepared student.
  - She is less outgoing than her sister.
- context: Adverb Comparisons
  description: Compare how actions are performed.
  examples:
  - She speaks more quietly than her sister.
  - He works the hardest in the team.
  - I drive more carefully than my brother.
phonetics:
- note: 'Stress on the comparative/superlative adjective: She is TALLER. She is the
    TALLest.'
  example_generator:
    contexts:
    - sentence stress
  l1_issue: Some L1 speakers give equal stress to all syllables, losing the contrastive
    emphasis
- note: Weak form of 'than' /ðæn/ → /ðən/; 'the' before superlative is often reduced
    to /ðə/
  example_generator:
    contexts:
    - connected speech
  l1_issue: Speakers whose L1 lacks dental fricatives may substitute /d/, /z/, or
    /t/ for the 'th' sound
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Short adjectives (-er/-est), comparatives with ''than''.'
  - 'Week 2: Long adjectives (more/most), superlatives with ''the''.'
  - 'Week 3: Irregular adjectives, adverb comparisons.'
  - 'Use real objects: Compare two pencils (longer/shorter), three students (tallest/shortest).'
  recommended_activities:
  - name: Object Comparison Game
    duration: 10
    adaptation_notes: Students pick two objects from a bag and make comparative sentences.
      Then add a third for superlatives.
  - name: Class Superlatives
    duration: 15
    adaptation_notes: Students vote on class superlatives (the funniest, the most
      talkative, the tallest) and write sentences about the results.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 13:
    Adjectives, §13.6-13.8'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 13: Comparatives, §13.1-13.4'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 101-120 (comparatives
    and superlatives: -er/more, -est/most, irregular forms)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    13: Comparatives, §13.6-13.8'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 11: Comparatives and superlatives'
common_errors:
- error: 'Using double comparative: *''She is more taller.'''
  correction: She is taller.
  explanation: Use either -er OR more, never both.
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: Comparatives and superlatives are used in all registers.
- note: 'In academic writing, comparatives are used for analysis: ''Group A performed
    better than Group B.'''
- note: 'In advertising, superlatives are common: ''The best coffee in town.'''
- note: 'In formal writing, ''more'' is preferred over ''-er'' for longer adjectives:
    ''more significant'' (not ''significanter'').'
dialectal_variation:
- note: 'In AmE, ''gotten'' is the past participle of ''get'': ''She has gotten better.''
    BrE uses ''got'': ''She has got better.'''
- note: 'In some dialects, double comparatives are used for emphasis: ''more bigger''
    (non-standard).'
- note: 'In informal speech, ''way'' replaces ''much'' as an intensifier: ''way better''
    (informal).'
discourse_notes:
- note: 'Comparatives create cohesion by linking two items: ''I bought two shirts.
    The red one was cheaper than the blue one.'''
- note: 'Superlatives establish a ranking within a group: ''Of all the students, Maria
    is the most diligent.'''
- note: 'In academic writing, hedged comparatives are common: ''somewhat better'',
    ''slightly more effective''.'
- note: 'Comparatives can be used for persuasion: ''Our product is better than the
    competition.'''
