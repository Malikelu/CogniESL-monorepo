grammar_point: assumptions_present
title: Present Assumptions with Must and Can't
description: Using must and can't to express logical deductions or assumptions about
  present situations based on evidence or reasoning.
level: B1
meaning:
  core_meaning: Must is used to express a strong assumption or logical conclusion
    about a present situation (the speaker is almost certain). Can't is used to express
    that something is impossible or the speaker believes it is not true.
  timeline: Present reference - deductions about now.
  contrast: 'Must (strong assumption): "She must be tired." (I''m almost certain she
    is tired)

    Can''t (impossible assumption): "She can''t be tired." (I''m almost certain she
    is NOT tired)

    May or Might (weak assumption): "She may be tired." (it''s possible, but I''m
    not sure)

    '
  ccqs:
  - question: Is the speaker certain or just guessing?
    answer: The speaker is almost certain - must and can't express strong belief based
      on evidence.
    purpose: Tests whether the learner understands that "must" and "can't" express
      strong beliefs based on evidence, not obligation or prohibition. This is a critical
      distinction because "must" has two very different meanings (obligation vs. deduction).
  - question: Is the speaker talking about now or the past?
    answer: Now - must and can't for present deductions. For the past, we use must
      have or can't have.
    purpose: Tests whether the learner understands that "must/can't" for present deductions
      refer to NOW, not the past. This is important because for past deductions, the
      structure changes to "must have" / "can't have".
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      assumptions present and explain why they are incorrect.
  example_generator:
    contexts:
    - deducing situations
    - explaining behaviour
    - reading body language
    - solving mysteries
    - everyday reasoning
    cultural_notes:
    - In some cultures, making direct assumptions about others is considered rude
      - soften with I think or it seems
    - Must and can't for deduction is very common in British English
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + must + base verb. Example: She must be very tired. / He
      must know the answer.'
    example_generator:
      contexts:
      - deducing from evidence
      - explaining behaviour
      - logical conclusions
      min_examples: 4
  negative:
    structure: 'Subject + can''t + base verb. Example: She can''t be at home - her
      car isn''t there. / He can''t be a doctor - he''s too young.'
    example_generator:
      contexts:
      - expressing impossibility
      - contradicting assumptions
      - logical denial
      min_examples: 4
  questions:
    structure: 'Questions about assumptions use must less commonly, but can is used.
      Example: Can she be serious? / Can that be true?'
    example_generator:
      contexts:
      - expressing disbelief
      - checking assumptions
      - showing surprise
      min_examples: 3
sub_rules:
- rule: Must for positive logical deduction
  type: semantic
  examples:
  - She must be Japanese - she speaks Japanese fluently.
  - He must be rich - he drives a Ferrari.
  - They must be lost - they're looking at a map.
- rule: Can't for negative logical deduction
  type: semantic
  examples:
  - She can't be at home - the lights are off.
  - He can't be a teacher - he's only 16.
  - That can't be right - it doesn't make sense.
- rule: Must be plus -ing for present continuous deduction
  type: grammatical
  examples:
  - She must be sleeping - it's 3 a.m.
  - They must be waiting for us.
  - He must be working late again.
- rule: Must for deduction (not obligation)
  type: semantic
  examples:
  - You must be exhausted! (deduction - I can see you're tired)
  - You must be joking! (deduction - I think you're joking)
- rule: Can't vs. mustn't
  type: semantic
  examples:
  - He can't be at home (deduction - I believe he is NOT at home)
  - You mustn't park here (prohibition - it is not allowed)
use:
- name: Deducing from evidence
  description: Used when the speaker draws a conclusion based on what they can see,
    hear, or know.
  examples:
  - The ground is wet - it must have rained.
  - She's carrying a guitar - she must play.
  - The lights are on - someone must be home.
  key_point: Very common in everyday reasoning and conversation.
- name: Expressing surprise or disbelief
  description: Used when something unexpected is discovered.
  examples:
  - You must be joking!
  - That can't be true!
  - She must be at least 60!
  key_point: Adds emotional emphasis to the deduction.
- name: Explaining behaviour
  description: Used to suggest reasons for someone's actions or state.
  examples:
  - He must be very happy - he's smiling from ear to ear.
  - She must be nervous - she's shaking.
  - They must be lost - they keep looking around.
  key_point: Helps show empathy and understanding of others.
phonetics:
- note: 'Must is often unstressed in deduction sentences: ''She must be tired.'' Can''t
    is always stressed: ''She CAN''T be tired.'''
  example_generator:
    contexts:
    - natural conversation
    - expressing surprise
  l1_issue: Learners may confuse must (deduction) with must (obligation), or use mustn't
    for deduction instead of can't.
teaching:
  methodology: Contextualised discovery with visual prompts
  recommended_activities:
  - name: Picture deduction
    duration: 15
    adaptation_notes: 'Show pictures with clues (e.g., wet ground, dark clouds). Students
      deduce: It must have rained. / It must be cold.'
  - name: Mystery guest
    duration: 20
    adaptation_notes: 'Describe a person (clothes, behaviour, location). Students
      deduce: She must be a doctor. / He must be cold.'
  - name: Must or can't choice
    duration: 10
    adaptation_notes: 'Give students situations and they choose must or can''t: The
      phone is ringing but no one answers. They ___ be home.'
  tips:
  - Clearly distinguish must and can't (deduction) from must and mustn't (obligation
    and prohibition).
  - Use visual aids (pictures, video clips) to provide evidence for deductions.
  - Contrast must (almost certain), may or might (possible), and can't (impossible)
    on a certainty scale.
  - 'Practise with real classroom situations: Ahmed isn''t here. He must be ill.'
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 9:
    Modals, §9.1-9.6'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''will'' after ''assume'': *''I assume he will come.'' (present assumption)'
  correction: '''I assume he is coming.'''
  explanation: For present assumptions, use present tense after 'assume'.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: '''Assume'' and ''suppose'' are neutral in register.'
- note: 'In academic writing, ''assume'' is used for hypotheses: ''We assume that...'''
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: '''Assume'' introduces hypothetical premises: ''Assuming that X is true, Y
    follows.'''
