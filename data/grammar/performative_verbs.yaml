grammar_point: performative_verbs
title: Performative Verbs (I promise / I apologise / I declare / I suggest)
description: Verbs that perform an action simply by being uttered — the act of speaking
  IS the act of promising, apologising, ordering, etc.
level: B2
meaning:
  core_meaning: 'Performative verbs are verbs where saying the words is itself the
    performance of the action. When you say ''I promise,'' you are not describing
    a promise — you are making one. When you say ''I apologise,'' you are not reporting
    an apology — you are giving one. These verbs blur the line between language and
    action: the utterance IS the act.'
  timeline: 'Performatives are typically used in the simple present tense because
    the action happens at the moment of speaking: ''I promise to help you.'' (The
    promise is made now, as I speak.) / ''I declare the meeting open.'' (The meeting
    becomes open as I say this.) Past tense performatives describe a past speech act:
    ''I promised to help.'' (The promise was made in the past.)'
  contrast: 'Performative (doing the action now): "I promise I will help you." (By
    saying this, I am making a promise.)

    Descriptive (reporting the action): "She promised she would help me." (She made
    a promise in the past; I am reporting it.)

    Performative: "I apologise for being late." (I am apologising right now.)

    Descriptive: "He apologised for being late." (He apologised in the past.)

    '
  ccqs:
  - question: If I say 'I promise to come,' am I describing a promise or making a
      promise?
    answer: I am making a promise. The act of saying 'I promise' IS the promise.
    purpose: Tests whether the learner understands that some verbs (promise, apologize,
      declare, name) perform the action they describe when spoken. These are called
      performative verbs.
  - question: Can you perform a performative in the past tense?
    answer: 'Yes, but it becomes descriptive. ''I promised'' reports a past speech
      act. The true performative force is in the present: ''I promise.'''
    purpose: Tests understanding of performative_verbs.
  - question: Is 'I think it will rain' a performative?
    answer: No. 'Think' is not a performative verb. You are describing your mental
      state, not performing an action by speaking.
    purpose: Tests understanding of performative_verbs.
  - question: Why are performatives important in English?
    answer: 'They are essential for social functions: making promises, giving apologies,
      making offers, giving warnings, and issuing formal declarations. Understanding
      them helps learners use language appropriately in social and professional contexts.'
    purpose: Tests understanding of performative_verbs.
  example_generator:
    contexts:
    - formal ceremonies
    - legal proceedings
    - everyday apologies
    - making promises
    - giving advice
    - official announcements
    cultural_notes:
    - Performative verbs are culturally significant. In English-speaking cultures,
      explicit performatives like 'I apologise' and 'I promise' are important for
      social harmony. In some cultures, apologies or promises may be implied rather
      than stated directly, which can lead to cross-cultural misunderstandings.
    - 'In legal and ceremonial contexts, performatives are essential: ''I sentence
      you to...'' / ''I name this ship...'' / ''I pronounce you husband and wife.''
      These words have legal and social force.'
    min_examples: 5
form:
  affirmative:
    structure: 'Subject (usually ''I'' or ''we'') + performative verb (present simple)
      + complement. Common patterns: I/We + verb + (that) clause — ''I promise (that)
      I will help.'' / I/We + verb + to-infinitive — ''I agree to pay.'' / I/We +
      verb + object — ''I congratulate you.'' / I/We + verb + object + on + noun —
      ''I congratulate you on your promotion.'''
    example_generator:
      contexts:
      - promises
      - apologies
      - declarations
      - suggestions
      - warnings
      min_examples: 4
  negative:
    structure: 'Negatives are less common with true performatives because the act
      of saying ''I do not promise'' is not itself a promise. However, some performatives
      can be negated: ''I do not recommend this restaurant.'' (I am actively advising
      against it.) / ''I deny the allegations.'' (I am performing the act of denial.)
      / ''I refuse to answer.'' (I am performing the act of refusal.)'
    example_generator:
      contexts:
      - denial
      - refusal
      - negative recommendation
      min_examples: 3
  questions:
    structure: 'Questions with performatives are usually indirect speech acts — they
      perform a different function: ''Do you promise to help?'' (This is a request
      for a promise, not a promise itself.) / ''Can I suggest something?'' (This is
      a polite way of introducing a suggestion.) / ''Would you agree to this?'' (This
      is a request for agreement.)'
    example_generator:
      contexts:
      - requesting promises
      - offering suggestions
      - seeking agreement
      min_examples: 3
sub_rules:
- rule: Promising — I promise, I swear, I guarantee, I vow
  type: grammatical
  examples:
  - I promise to be on time.
  - I swear I am telling the truth.
  - I guarantee that the product is authentic.
  - I vow to protect this country.
- rule: Apologising — I apologise, I regret, I am sorry
  type: grammatical
  examples:
  - I apologise for the delay.
  - I regret any inconvenience caused.
  - I am sorry for what happened.
  - We apologise for the mistake.
- rule: Declaring and announcing — I declare, I announce, I pronounce, I name
  type: grammatical
  examples:
  - I declare the meeting open.
  - I am pleased to announce the winner.
  - I pronounce you husband and wife.
  - I name this ship the Queen Elizabeth.
- rule: Advising and recommending — I suggest, I recommend, I advise, I urge
  type: grammatical
  examples:
  - I suggest that you arrive early.
  - I recommend the fish.
  - I advise you to save money.
  - I urge everyone to vote.
- rule: Ordering and requesting — I order, I request, I demand, I ask
  type: grammatical
  examples:
  - I order you to leave.
  - I request that all passengers remain seated.
  - I demand an explanation.
  - I ask you to be quiet.
- rule: Congratulating and thanking — I congratulate, I thank, I welcome
  type: grammatical
  examples:
  - I congratulate you on your success.
  - I thank you for your support.
  - I welcome you to our school.
  - I congratulate the team on their victory.
- rule: Warning — I warn, I caution
  type: grammatical
  examples:
  - I warn you — this is dangerous.
  - I caution against making hasty decisions.
  - I warn you not to go there alone.
use:
- context: Formal and ceremonial contexts
  description: Performatives are essential in ceremonies, legal proceedings, and official
    events where words have legal or social force.
  examples:
  - I declare the Olympic Games open.
  - I sentence you to five years in prison.
  - I name this ship the HMS Endeavour.
  - I pronounce you partners in marriage.
- context: Everyday social interactions
  description: Performatives are used constantly in daily life for apologies, promises,
    and thanks.
  examples:
  - I apologise for being late.
  - I promise I will call you tomorrow.
  - Thank you so much for your help.
  - I am sorry about yesterday.
- context: Professional and business communication
  description: Used in meetings, emails, and professional interactions to make commitments
    and recommendations.
  examples:
  - I recommend that we invest in new technology.
  - I guarantee the quality of our service.
  - I suggest we postpone the meeting.
  - I am writing to apologise for the error.
- context: Legal and official documents
  description: Legal language relies heavily on performatives to create binding commitments
    and declarations.
  examples:
  - I hereby declare that the information is true.
  - I agree to the terms and conditions.
  - I certify that this is a genuine document.
  - I accept full responsibility for my actions.
phonetics:
- note: 'Performative verbs in the first person often carry strong stress because
    they represent a personal commitment or declaration: ''I PROMISE I will help.''
    /aɪ ˈprɒmɪz aɪ wɪl help/. The stress on the performative verb signals sincerity
    and commitment.'
  example_generator:
    contexts:
    - stress for emphasis
    - sincerity
  l1_issue: Learners may use flat intonation for performatives, which can sound insincere
    or uncertain. Practice with emphatic stress on the performative verb.
- note: 'In formal performatives, each word tends to be clearly articulated: ''I declare
    the meeting open.'' /aɪ dɪˈkleə ðə ˈmiːtɪŋ ˈəʊpən/. In informal performatives,
    connected speech applies: ''I apologise'' → /aɪ əˈpɒlədʒaɪz/.'
  example_generator:
    contexts:
    - formal vs informal pronunciation
    - connected speech
  l1_issue: Learners may use overly careful pronunciation in informal contexts or
    overly casual pronunciation in formal contexts. Discuss register-appropriate pronunciation.
teaching:
  methodology: Guided discovery
  tips:
  - 'Start with a simple question: ''What happens when you say I promise?'' Elicit
    that the act of saying it IS the promise. This helps learners understand the concept
    before introducing the term ''performative.'''
  - 'Use role plays: set up scenarios where students must apologise, promise, suggest,
    or declare. This makes the performative function concrete and memorable.'
  - 'Create a categorised list of performative verbs: promises, apologies, declarations,
    suggestions, warnings, orders. Have students add to each category.'
  - 'Contrast performatives with descriptives: ''I promise to help'' (performative
    — I am making a promise now) vs. ''She promised to help'' (descriptive — reporting
    a past promise). This clarifies the key distinction.'
  - 'Discuss cultural differences: in some cultures, apologies are implied rather
    than stated explicitly. Explain that in English, saying ''I apologise'' is important
    and expected.'
  recommended_activities:
  - name: Performative or descriptive?
    duration: 15
    adaptation_notes: 'Give students 12 sentences. They identify whether each is performative
      (doing the action now) or descriptive (reporting a past action): ''I promise
      to help.'' (performative) / ''She promised to help.'' (descriptive). Discuss
      the difference.'
  - name: Role play scenarios
    duration: 25
    adaptation_notes: 'Students work in pairs. Each card describes a scenario: you
      are late for a meeting, you want to make a promise, you need to apologise, you
      are opening a ceremony. Students act out the scenario using appropriate performative
      verbs.'
  - name: Categorisation activity
    duration: 15
    adaptation_notes: 'Give students a list of 20 performative verbs. They categorise
      them: promising, apologising, declaring, suggesting, warning, ordering, thanking,
      congratulating. Discuss any that could fit multiple categories.'
  - name: Formal ceremony writing
    duration: 20
    adaptation_notes: Students write a short script for a formal ceremony (opening
      a conference, naming a ship, a wedding) using at least 6 performative verbs.
      Perform for the class.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I will promise to help you.* (redundant)'
  correction: I promise to help you.
  explanation: Performative verbs (promise, apologize, declare) perform the action
    in the present simple. 'I promise' IS the promise. 'I will promise' is redundant.
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
