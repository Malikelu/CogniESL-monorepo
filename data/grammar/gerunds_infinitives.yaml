grammar_point: gerunds_infinitives
title: Gerunds & Infinitives (Verb + -ing / To + Base Verb)
description: Verb patterns where some verbs are followed by gerund (-ing), some by
  infinitive (to + base verb), and some by both with different meanings.
level: B1
meaning:
  core_meaning: 'Fixed verb patterns for what follows: gerund (action as noun) or
    infinitive (purpose/future action).'
  timeline: N/A (Applies to all tenses; verb pattern does not change with tense).
  contrast: 'Gerund = Action as noun: Swimming is fun.


    Infinitive = Purpose/future: I went to swim.


    Same meaning = like/love/hate: I like swimming/to swim.


    Different meaning = stop/remember/forget: Stop doing (quit) vs stop to do (purpose).

    '
  ccqs:
  - question: If I say 'I enjoy swimming,' can I also say 'I enjoy to swim'?
    answer: No. 'Enjoy' is always followed by a gerund, not an infinitive.
  - question: If I say 'I stopped smoking,' did I quit smoking or pause to smoke?
    answer: It means I quit smoking. 'Stop + gerund' means to quit.
  - question: If I say 'I want to go,' is 'want' followed by a gerund or an infinitive?
    answer: It is followed by an infinitive. 'Want' always takes the infinitive.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Verb + gerund: I enjoy swimming.


      Verb + infinitive: I want to swim.


      Verb + object + infinitive: I told him to swim.


      Verb + gerund/infinitive (same meaning): I like swimming/to swim.


      Verb + gerund/infinitive (different meaning): I stopped smoking (quit) vs I
      stopped to smoke (purpose).

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: 'Verb + not + gerund/infinitive: I enjoy not swimming. I decided not
      to go.'
    example_generator:
      contexts:
      - work and professional life
      min_examples: 4
  questions:
    structure: 'Invert auxiliary: Do you enjoy swimming? Did he decide to go?'
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: 'Some verbs are followed only by gerunds (ing): enjoy, avoid, finish, mind,
    suggest, recommend, deny, admit, consider, imagine, practice, risk, miss'
  type: grammatical
  examples:
  - I enjoy reading
  - She avoids eating meat
  - He finished working
  - Do you mind waiting
- rule: 'Some verbs are followed only by infinitives (to + verb): want, need, decide,
    plan, hope, agree, refuse, promise, offer, afford, manage, fail, seem, appear'
  type: grammatical
  examples:
  - I want to go
  - She needs to study
  - He decided to leave
  - They plan to travel
- rule: 'Some verbs can take both gerund and infinitive with a change in meaning:
    stop, remember, forget, try, regret, go on'
  type: semantic
  examples:
  - I stopped smoking (quit the habit)
  - I stopped to smoke (paused in order to smoke)
  - I remember locking the door (memory of past action)
  - I remembered to lock the door (did not forget to do it)
use:
- name: Verbs + Gerund
  description: 'Verbs like enjoy, avoid, suggest, finish: I enjoy reading.'
  examples:
  - She avoids driving.
  - He finished working.
  key_point: Memorise these verb patterns.
- name: Verbs + Infinitive
  description: 'Verbs like want, decide, promise, hope: I want to go.'
  examples:
  - She decided to leave.
  - He promised to help.
  key_point: Memorise these verb patterns.
- name: Verbs + Object + Infinitive
  description: 'Verbs like tell, ask, want, expect: I told him to go.'
  examples:
  - She asked me to help.
  - He wanted us to stay.
  key_point: Object between verb and infinitive.
- name: Same Meaning (Like/Love/Hate)
  description: 'Gerund and infinitive have same meaning: I like swimming/to swim.'
  examples:
  - She loves dancing/to dance.
  key_point: No meaning change.
- name: Different Meaning (Stop/Remember/Forget)
  description: 'Gerund = action stopped; Infinitive = purpose: I stopped smoking (quit)
    vs I stopped to smoke (purpose).'
  examples:
  - I remembered locking the door (memory of past action) vs I remembered to lock
    the door (didn't forget).
  key_point: Meaning changes completely.
phonetics:
- note: 'When a verb is followed by a gerund, the stress falls on the gerund: ''I
    enjoy READING.'' When followed by an infinitive, the stress falls on the infinitive:
    ''I want to GO.'''
  example_generator:
    contexts:
    - gerund vs infinitive stress
  l1_issue: Learners may stress the wrong word, making the sentence sound unnatural.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Verbs + gerund (enjoy, avoid, finish).'
  - 'Week 2: Verbs + infinitive (want, decide, promise).'
  - 'Week 3: Verbs with different meanings (stop, remember, forget).'
  - 'Use verb pattern charts: List verbs by pattern for students to memorise.'
  recommended_activities:
  - name: Verb Sorting
    duration: 10
    adaptation_notes: 'Students sort verbs into three groups: gerund only, infinitive
      only, and both (with meaning change).'
  - name: Meaning Change
    duration: 15
    adaptation_notes: 'Students create pairs of sentences showing the meaning change:
      ''I stopped smoking'' vs ''I stopped to smoke.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using infinitive after ''enjoy'': *''I enjoy to swim.'''
  correction: I enjoy swimming.
  explanation: '''Enjoy'' is followed by a gerund, not an infinitive.'
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
  - note: "Gerund/infinitive choice is consistent across registers."
  - note: "In academic writing, gerunds are common as subjects: 'Swimming is good exercise.'"
  - note: "In formal writing, infinitives often express purpose: 'The study was conducted to investigate...'"
  - note: "In conversation, gerunds are common after phrasal verbs: 'I gave up smoking.'"
dialectal_variation:
  - note: "No significant BrE/AmE differences in gerund/infinitive usage."
  - note: "In some dialects, 'like' + infinitive is common: 'I like to swim' (standard) vs 'I like swimming' (also standard). Both are acceptable."
  - note: "In informal speech, 'try and' replaces 'try to': 'Try and finish' (informal) vs 'Try to finish' (standard)."
discourse_notes:
  - note: "Gerunds create cohesion by turning actions into nouns: 'I enjoy swimming' (the activity itself)."
  - note: "Infinitives express purpose and intention: 'I went to the store to buy milk.'"
  - note: "In academic writing, gerunds are used for describing processes: 'Collecting data involves...'"
  - note: "The choice between gerund and infinitive can change meaning: 'I stopped smoking' (quit) vs 'I stopped to smoke' (paused for a purpose)."
