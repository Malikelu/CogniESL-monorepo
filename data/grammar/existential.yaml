grammar_point: existential
title: Existential Constructions (There is/are)
description: Using there is/are to say that something exists or is present.
level: A2
meaning:
  core_meaning: There is/are introduces the existence of something. There is not a
    place — it is a grammatical subject. The real subject comes after the verb.
  timeline: Present (there is/are) or past (there was/were).
  contrast: There is = There is a book on the table. (existence) vs A book is on the
    table. (location)
  ccqs:
  - question: Are we saying something exists?
    answer: Yes — use there is/are.
    purpose: Tests whether the learner understands that 'there is/are' is used to
      state the existence of something. 'There is a book on the table' = a book exists
      on the table. This is the fundamental structure for introducing new information.
  - question: Is this new information?
    answer: Yes — there is/are introduces new information.
    purpose: 'Tests whether the learner understands that ''there is/are'' is used
      for first mention (new information). Once introduced, use ''the'' for subsequent
      reference: ''There is a book on the table. The book is red.'''
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      existential and explain why they are incorrect.
  example_generator:
    contexts:
    - describing places
    - talking about what exists
    - introducing new information
    - describing scenes
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'There is + singular noun: There is a book on the table. / There are
      + plural noun: There are many people in the room.'
    example_generator:
      contexts:
      - describing places
      - talking about what exists
      - introducing new information
      min_examples: 4
  negative:
    structure: 'There is/are + not + noun: There is not a solution. / There are not
      any tickets left.'
    example_generator:
      contexts:
      - describing places
      - talking about what exists
      - introducing new information
      min_examples: 4
  questions:
    structure: 'Is/Are + there + noun?: Is there a problem? / Are there any questions?'
    example_generator:
      contexts:
      - describing places
      - talking about what exists
      - introducing new information
      min_examples: 4
sub_rules:
- rule: Use is with singular nouns and non-count nouns
  type: grammatical
  examples:
  - There is a book.
  - There is some water.
- rule: Use are with plural nouns
  type: grammatical
  examples:
  - There are many people.
  - There are three books.
- rule: There is not a place in this structure
  type: semantic
  examples:
  - There is a book. (existence)
  - The book is there. (location)
use:
- context: Describing places
  description: Saying what exists in a location
  examples:
  - There is a park near my house.
  - There are many restaurants in this area.
- context: Introducing new information
  description: Presenting something for the first time
  examples:
  - There is a new student in our class.
  - There are some things I need to tell you.
phonetics:
- note: Weak form of there /ðeər/ → /ðər/
  example_generator:
    contexts:
    - connected speech
  l1_issue: Some L1 speakers omit there or it as dummy subjects.
teaching:
  methodology: PPP
  tips:
  - Use real situations to demonstrate existence
  - Contrast with location (the book is there)
  - Practice with classroom objects and people
  recommended_activities:
  - name: What is in the Room?
    duration: 10
    adaptation_notes: Students describe what exists in different locations using there
      is/are.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*It is many books on the table.*'
  correction: There are many books on the table.
  explanation: Use there is/are for existence.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
