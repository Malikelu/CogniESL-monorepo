grammar_point: adverbs_frequency
title: Adverbs of Frequency
description: 'Words that tell us how often something happens: always, usually, often,
  sometimes, rarely, never.'
level: A1
meaning:
  core_meaning: Adverbs of frequency tell us how often something happens — from 100%
    (always) to 0% (never).
  timeline: Timeless — describes habitual frequency.
  contrast: '''Always'' = 100% of the time vs ''Never'' = 0% of the time'
  ccqs:
  - question: Does this happen all the time?
    answer: Yes = always, No = never
  - question: Is it more than 50% or less than 50%?
    answer: More = usually/often, Less = sometimes/rarely
  example_generator:
    contexts:
    - daily routines
    - habits and preferences
    - schedules and timetables
    - lifestyle
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + adverb + verb: ''I always wake up early.'' / Subject + be
      + adverb: ''He is never late.'''
    example_generator:
      contexts:
      - daily routines
      - habits and preferences
      - schedules and timetables
      min_examples: 4
  negative:
    structure: 'Use ''never'' for negative meaning: ''I never eat meat.'' (not ''I
      don''t never'')'
    example_generator:
      contexts:
      - daily routines
      - habits and preferences
      - schedules and timetables
      min_examples: 4
  questions:
    structure: 'How often + do/does + subject + verb?: ''How often do you exercise?'''
    example_generator:
      contexts:
      - daily routines
      - habits and preferences
      - schedules and timetables
      min_examples: 4
sub_rules:
- rule: 'Position: before main verb, after ''be'''
  type: word_order
  examples:
  - I always eat breakfast. (before verb)
  - She is always happy. (after be)
- rule: 'Scale: always (100%) > usually > often > sometimes > rarely > never (0%)'
  type: semantic
  examples:
  - I always brush my teeth. (100%)
  - I never eat insects. (0%)
use:
- context: Daily routines
  description: Describing how often you do things
  examples:
  - I always have breakfast.
  - She never drinks coffee.
- context: Habits and preferences
  description: Talking about regular activities
  examples:
  - We often go to the park on Sundays.
  - He rarely watches TV.
phonetics:
- note: 'Stress on first syllable: /ˈɔːlweɪz/, /ˈjuːʒuəli/'
  contexts:
  - pronunciation
  l1_issue: Word order — some L1 speakers put the adverb at the end of the sentence
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use a frequency line (0%-100%) to visualize
  - Have students survey classmates about habits
  recommended_activities:
  - name: Frequency Survey
    duration: 15
    adaptation_notes: Students ask classmates 'How often do you...?' and report results.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
