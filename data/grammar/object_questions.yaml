grammar_point: object_questions
title: Object Questions (Who/What/Which as Object)
description: Questions where the question word (who, what, which) is the object of
  the sentence, requiring auxiliary verb inversion.
level: A2
meaning:
  core_meaning: Asks about the object (receiver) of an action, with the question word
    functioning as the sentence's object.
  timeline: Uses auxiliary verbs do/does (present) or did (past) to match the action's
    tense.
  contrast: 'Object question: ''Who did you see?'' (who is the object, uses did +
    inversion)

    Subject question: ''Who saw you?'' (who is the subject, no inversion)

    ''What'' and ''which'' follow the same rule: ''What did you break?'' (object)
    vs ''What broke?'' (subject)

    '
  ccqs:
  - question: Do we use do/does/did in object questions
    answer: Yes. Object questions need an auxiliary.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Question word (who/what/which + noun) + auxiliary (do/does/did) +
      subject + main verb

      Auxiliary matches the tense of the action (do/does for present, did for past)

      '
    example_generator:
      contexts:
      - entertainment and media
      - shopping and commerce
      min_examples: 4
  negative:
    structure: Question word + auxiliary + subject + not + main verb
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
  questions:
    structure: Same as affirmative, with question mark
    example_generator:
      contexts:
      - entertainment and media
      - social interactions
      min_examples: 4
sub_rules:
- rule: 'Object questions use the pattern: wh-word + auxiliary + subject + main verb'
  type: word_order
  examples:
  - Who did you call? (you = subject, who = object)
  - What did she buy? (she = subject, what = object)
  - Where did they go? (they = subject, where = adverb)
- rule: 'Subject questions use the pattern: wh-word + verb (no auxiliary needed)'
  type: word_order
  examples:
  - Who called you? (who = subject)
  - What happened? (what = subject)
  - Who wants coffee? (who = subject)
- rule: 'The key difference: subject questions do not use do/does/did'
  type: grammatical
  examples:
  - Who called you? (subject question — no auxiliary)
  - Who did you call? (object question — uses auxiliary)
use:
- name: Asking About the Receiver
  description: Ask who or what received an action.
  examples:
  - Who did you call?
  - What did you cook for dinner?
  key_point: The question word is the one that the action was done to.
- name: Asking About Things/Choices
  description: Ask what thing or which option was the object.
  examples:
  - What did you find in the box?
  - Which color did you choose?
  key_point: Use 'what' for unknown things, 'which' for known choices.
- name: Past and Present Events
  description: Ask about past or present actions where the object is unknown.
  examples:
  - Who did you meet yesterday?
  - What do you want for lunch?
  key_point: Auxiliary (do/does/did) matches the event's time.
phonetics:
- note: 'Object questions typically have falling intonation: ''Who did you call? ↘''
    Subject questions also fall: ''Who called you? ↘'''
  example_generator:
    contexts:
    - question intonation
  l1_issue: Portuguese and Spanish speakers often use rising intonation for all questions.
    Teach falling intonation for wh- questions.
teaching:
  methodology: PPP
  tips:
  - First contrast object and subject questions side by side to highlight the inversion
    difference.
  - Start with 'who' questions, then add 'what' and 'which'.
  - Use timeline drills to practice present (do/does) vs past (did) auxiliaries.
  recommended_activities:
  - name: Subject or Object
    duration: 10
    adaptation_notes: 'Students identify whether questions are subject or object:
      ''Who called you?'' (subject) vs ''Who did you call?'' (object).'
  - name: Question Formation
    duration: 15
    adaptation_notes: 'Give students answers. They form the correct question: ''I
      called Maria.'' → ''Who did you call?'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
