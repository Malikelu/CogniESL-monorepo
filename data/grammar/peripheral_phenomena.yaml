grammar_point: peripheral_phenomena
title: Peripheral Grammatical Phenomena (Archaic, Fixed, and Marginal Constructions)
description: Grammatical structures that exist at the margins of standard English
  — archaic survivals, fixed expressions, formulaic subjunctives, and constructions
  that defy regular syntactic rules but persist in idiomatic, literary, or ceremonial
  use.
level: C2
meaning:
  core_meaning: Peripheral phenomena are grammatical constructions that fall outside
    the productive rules of modern English grammar. They include archaic verb forms
    (subjunctive survivals, old imperatives), fixed expressions that resist normal
    syntactic analysis (be that as it may, come what may), formulaic uses (if need
    be, far be it from me), and marginal constructions that exist only in specific
    registers or contexts. These forms survive because they carry cultural, literary,
    or ritual weight that standard paraphrases cannot replicate.
  timeline: 'Most peripheral phenomena are tenseless or use frozen forms. The archaic
    subjunctive uses the base form of the verb regardless of subject: ''Long live
    the Queen'' (not *lives*). Formulaic expressions are fixed and do not change with
    tense: ''If need be'' (present/future), not *if needed be*.'
  contrast: 'Standard modern English: "I suggest that he leave early." (mandative
    subjunctive)

    Archaic peripheral: "God save the king." (formulaic subjunctive — base verb with
    third-person subject)

    Standard: "Whatever happens, I will be there."

    Peripheral: "Come what may, I will be there." (fixed archaic inversion)

    Standard: "Although that is true, I disagree."

    Peripheral: "Be that as it may, I disagree." (frozen concessive)

    '
  ccqs:
  - question: Is 'God save the king' in the present simple tense?
    answer: No. It is an archaic formulaic subjunctive — a wish or invocation. The
      base form 'save' is used instead of 'saves' because it is not a normal indicative
      statement.
  - question: Can you change 'Come what may' to 'Whatever may come'?
    answer: Yes, the meaning is similar, but 'Come what may' is a fixed expression
      with an archaic word order (verb before subject). It carries a more dramatic,
      literary tone.
  - question: Is 'Be that as it may' the same as 'Although that may be the case'?
    answer: Yes, in meaning. But 'Be that as it may' is a frozen concessive formula
      — it uses an archaic subjunctive 'be' and cannot be modified. You cannot say
      *'Be this as it may'* or *'Is that as it may'*.
  - question: Why do these forms still exist if they are archaic?
    answer: They survive in fixed expressions because they carry ceremonial, literary,
      or rhetorical weight. They are preserved by tradition, not by productive grammar.
      Learners encounter them in literature, speeches, and formal contexts.
  example_generator:
    contexts:
    - literary texts
    - formal speeches
    - ceremonial language
    - proverbs and sayings
    - legal and religious language
    cultural_notes:
    - Many peripheral phenomena survive from Early Modern English (Shakespeare's era)
      and are preserved in fixed expressions. Learners may encounter them in literature,
      films, and formal speeches.
    - 'Religious language preserves many archaic forms: ''The Lord be with you'' /
      ''Thy kingdom come'' / ''Peace be upon him.'' These are not errors — they are
      formulaic subjunctives.'
    - 'Legal English retains some peripheral constructions: ''Be it enacted that...''
      / ''If any person be found guilty...'' These are formal and archaic but still
      used in statutes.'
    min_examples: 5
form:
  affirmative:
    structure: 'Peripheral phenomena do not follow standard affirmative/negative/question
      patterns. They are typically fixed expressions with frozen word orders. Common
      patterns include: Formulaic subjunctive: Subject + base verb — ''God save the
      king.'' / Inverted concessive: Be + subject + complement — ''Be that as it may.''
      / Fixed imperative: Verb + complement — ''Come what may.'' / Formulaic conditional:
      If + need/be — ''If need be, we will help.'''
    example_generator:
      contexts:
      - fixed expressions
      - archaic survivals
      - formulaic language
      min_examples: 4
  negative:
    structure: 'Negation in peripheral phenomena is rare because the expressions are
      fixed. Some can be negated within the clause: ''Far be it from me to criticise''
      (not negating the performative, but the infinitive clause). ''If need be not''
      is not grammatical — the expression is always affirmative.'
    example_generator:
      contexts:
      - negation within fixed expressions
      - limitations
      min_examples: 3
  questions:
    structure: 'Peripheral phenomena do not form questions. They are declarative,
      imperative, or exclamatory in force. A learner might ask about them: ''Is ''God
      save the king'' a question?'' — No, it is an invocation.'
    example_generator:
      contexts:
      - metalinguistic questions about form
      min_examples: 2
sub_rules:
- rule: Archaic formulaic subjunctive — base verb with third-person subject
  type: archaic
  examples:
  - God save the king.
  - Long live the Queen!
  - Heaven forbid that this should happen.
  - The Lord be with you.
  - Peace be upon him.
  - Truth be told, I never liked him.
  - Suffice it to say, the project was a disaster.
  - Be that as it may, we must continue.
- rule: Inverted concessive expressions — verb-subject inversion in fixed phrases
  type: archaic
  examples:
  - Come what may, I will stand by you.
  - Come rain or shine, the match will go ahead.
  - Say what you will, I still disagree.
  - Try as she might, she could not open the door.
  - Fail though he did, he gained valuable experience.
- rule: Formulaic conditionals with ellipsis — 'if need be', 'if truth be told'
  type: elliptical
  examples:
  - If need be, we can take a taxi.
  - If truth be told, I was never interested.
  - If the worst comes to the worst, we will cancel.
  - If so, what do we do next?
  - If not, we should reconsider.
- rule: Performative and exclamatory fixed phrases
  type: formulaic
  examples:
  - Far be it from me to interfere, but you should reconsider.
  - God forbid! (exclamation of horror)
  - Heaven help us! (exclamation of dismay)
  - So be it. (acceptance)
  - As you wish. (compliance)
  - Enough said. (conclusion)
- rule: Archaic comparative and superlative forms in fixed expressions
  type: archaic
  examples:
  - Best foot forward. (not *bestest*)
  - Foremost in my mind.
  - Next door neighbour. (frozen form)
  - The utmost importance. (frozen superlative)
- rule: Marginal modals and semi-auxiliaries in fixed uses
  type: marginal
  examples:
  - You need not worry. (need as modal, formal/British)
  - I dare say it will rain. (dare as semi-modal)
  - She need only ask. (need as modal)
  - How dare you! (fixed exclamation)
use:
- context: Literary and poetic language
  description: Peripheral phenomena are common in literature, poetry, and drama, especially
    works influenced by Early Modern English or the King James Bible.
  examples:
  - Never was seen so black a day as this. (Shakespeare, Romeo and Juliet)
  - If music be the food of love, play on. (Shakespeare, Twelfth Night)
  - Far from the madding crowd's ignoble strife. (Thomas Gray)
  - Come live with me and be my love. (Christopher Marlowe)
- context: Ceremonial and ritual language
  description: Weddings, coronations, religious services, and official ceremonies
    use archaic forms for their solemn and traditional character.
  examples:
  - I pronounce you husband and wife.
  - I name this ship the Queen Elizabeth.
  - We are gathered here today...
  - By the power vested in me...
  - Long live the King!
- context: Formal speeches and rhetoric
  description: Politicians and orators use peripheral phenomena for dramatic, memorable
    phrasing.
  examples:
  - Be that as it may, the facts remain unchanged.
  - Come what may, we shall not surrender.
  - Suffice it to say, the situation is grave.
  - If need be, we will take further action.
- context: Everyday fixed expressions
  description: Many peripheral phenomena have become so common that speakers use them
    without awareness of their archaic origins.
  examples:
  - So be it.
  - God forbid!
  - Far be it from me to...
  - If need be...
  - Truth be told...
  - Come rain or shine...
- context: Legal and religious language
  description: Legal statutes and religious texts preserve archaic grammatical forms
    that have disappeared from everyday English.
  examples:
  - Be it enacted by the Queen's most Excellent Majesty...
  - If any person be found guilty, he shall be liable to...
  - The Lord is my shepherd; I shall not want.
  - Hallowed be Thy name.
  - Thy kingdom come, Thy will be done.
phonetics:
- note: Formulaic expressions are often pronounced as fixed chunks with characteristic
    intonation patterns. 'God save the king' /ɡɒd seɪv ðə kɪŋ/ has a rising-falling
    intonation typical of invocations. 'Be that as it may' /biː ðæt əz ɪt meɪ/ is
    often said quickly as a discourse marker.
  example_generator:
    contexts:
    - intonation of fixed expressions
    - formulaic pronunciation
  l1_issue: Learners may not recognise these expressions as fixed chunks and may try
    to parse them word by word, leading to confusion. Teach them as unanalysed wholes.
- note: 'Archaic forms may contain words or pronunciations that are no longer common:
    ''forbid'' /fəˈbɪd/ (not /fərˈbɪd/ in British English), ''suffice'' /səˈfaɪs/,
    ''hallowed'' /ˈhæləʊd/.'
  example_generator:
    contexts:
    - archaic vocabulary pronunciation
  l1_issue: Learners may mispronounce archaic words by applying modern spelling-to-sound
    rules. Provide explicit pronunciation guidance for high-frequency archaic forms.
teaching:
  methodology: Guided discovery
  tips:
  - Do not teach peripheral phenomena as productive grammar. They are fixed expressions
    to be recognised and understood, not generated by rule.
  - Use authentic texts (literature, speeches, ceremonies) to show these forms in
    context. Learners are more likely to encounter them in reading and listening than
    to produce them.
  - 'Group peripheral phenomena by function: invocations (God save...), concessives
    (Be that as it may), conditionals (If need be), and exclamations (God forbid!).
    This helps learners recognise patterns.'
  - 'Explain the historical context briefly: many of these forms come from Early Modern
    English or the King James Bible. This helps learners understand why they look
    ''wrong'' by modern standards.'
  - Focus on receptive skills. At C2 level, learners should be able to recognise and
    understand peripheral phenomena, but they are not expected to produce them freely.
  - Create a 'peripheral phenomena wall' in the classroom — a display where students
    add examples they encounter in their reading and listening.
  recommended_activities:
  - name: Archaic or modern?
    duration: 15
    adaptation_notes: 'Give students 15 sentences. They identify whether each uses
      modern standard grammar or an archaic/peripheral form. For archaic forms, they
      provide a modern paraphrase: ''God save the king'' → ''I hope the king lives
      long.'' / ''Come what may'' → ''Whatever happens.'''
  - name: Literature hunt
    duration: 20
    adaptation_notes: Provide a short literary extract (Shakespeare, the King James
      Bible, or a 19th-century novel). Students identify all peripheral phenomena
      and discuss their effect. How would the meaning change if modern grammar were
      used?
  - name: Fixed expression matching
    duration: 15
    adaptation_notes: 'Students match 10 peripheral expressions to their meanings:
      ''Be that as it may'' → ''Although that is true'', ''If need be'' → ''If it
      is necessary'', ''God forbid'' → ''I hope that never happens''. Discuss register
      and tone.'
  - name: Ceremony script writing
    duration: 25
    adaptation_notes: Students write a short script for a formal ceremony (a wedding,
      an awards ceremony, a ship naming) incorporating at least 5 peripheral phenomena.
      Perform for the class and discuss the effect of the archaic language.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
