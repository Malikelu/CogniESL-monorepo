grammar_point: gerund_participle
title: Verb + -ing (Gerund-Participle)
description: The -ing form of a verb used as a noun (gerund) or in continuous tenses
  (participle). After prepositions, certain verbs, and as the subject of a sentence.
level: A2
meaning:
  core_meaning: 'The -ing form has two main uses: (1) as a gerund (noun) — ''Swimming
    is fun.'' (2) as a participle in continuous tenses — ''I am swimming.'''
  timeline: Depends on context — gerund is timeless, participle shows ongoing action.
  contrast: '''Gerund (noun)'' = "I enjoy swimming." (activity as thing)

    ''Infinitive'' = "I want to swim." (purpose/intention)

    ''Participle'' = "I am swimming." (ongoing action)

    '
  ccqs:
  - question: Is the -ing word the subject or object of the sentence?
    answer: If yes, it's a gerund (noun).
    purpose: Tests whether the learner understands that a gerund (-ing form) functions
      as a noun in the sentence, even though it looks like a verb.
  - question: Is there a 'be' verb before the -ing?
    answer: If yes, it's a participle (continuous tense).
    purpose: 'Tests whether the learner can distinguish between a present participle
      (adjective: ''The movie is boring'') and a gerund (noun: ''Watching movies is
      fun'').'
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      gerund participle and explain why they are incorrect.
  example_generator:
    contexts:
    - hobbies and interests
    - sports and activities
    - daily routines
    - likes and dislikes
    cultural_notes:
    - Some languages don't have an equivalent gerund form — explain the concept clearly
    min_examples: 5
form:
  affirmative:
    structure: 'Gerund (noun): Verb + -ing as subject or object

      "Swimming is healthy." / "I enjoy swimming."

      Participle (continuous): be + verb + -ing

      "I am swimming." / "She was reading."

      '
    example_generator:
      contexts:
      - sports
      - hobbies
      - daily activities
      min_examples: 4
  negative:
    structure: 'Gerund: "not + verb + -ing" or "No + verb + -ing"

      "Not swimming is boring." / "No smoking."

      Participle: "be + not + verb + -ing"

      "I am not swimming." / "She wasn''t reading."

      '
    example_generator:
      contexts:
      - prohibitions
      - negative statements
      min_examples: 4
  questions:
    structure: 'Gerund: "Is [activity] [adjective]?" / "Do you enjoy [activity]?"

      "Is swimming fun?" / "Do you enjoy cooking?"

      Participle: "Are you [activity]?" / "What are you doing?"

      "Are you swimming?" / "What are you reading?"

      '
    example_generator:
      contexts:
      - asking about activities
      - current actions
      min_examples: 4
sub_rules:
- rule: Verbs followed by gerund (not infinitive)
  type: grammatical
  examples:
  - enjoy + -ing (I enjoy reading)
  - finish + -ing (I finished eating)
  - mind + -ing (Do you mind waiting?)
- rule: Verbs followed by infinitive (not gerund)
  type: grammatical
  examples:
  - want + to (I want to go)
  - need + to (I need to study)
  - hope + to (I hope to travel)
- rule: Verbs that can take both with different meanings
  type: grammatical
  examples:
  - stop + -ing (stop talking) vs stop + to (stop to talk)
  - remember + -ing (remember doing) vs remember + to (remember to do)
- rule: Spelling rules for -ing
  type: spelling
  examples:
  - run → running (double consonant)
  - write → writing (drop -e)
  - lie → lying (ie → y)
use:
- context: As a noun (gerund)
  description: The -ing form acts as a noun — subject or object
  examples:
  - Swimming is good exercise.
  - I enjoy cooking.
  - Reading is my favorite hobby.
- context: After prepositions
  description: Always use -ing after prepositions
  examples:
  - I'm good at drawing.
  - She's interested in learning.
  - Thank you for helping.
- context: In continuous tenses
  description: be + -ing shows ongoing action
  examples:
  - I am studying right now.
  - She was cooking when I arrived.
phonetics:
- note: Stress on the first syllable of gerunds used as nouns
  example_generator:
    contexts:
    - noun stress patterns
  l1_issue: Some L1 speakers may use infinitive where gerund is required
teaching:
  methodology: PPP (Present-Practice-Produce)
  tips:
  - Start with gerund as noun (easier concept)
  - Contrast gerund vs infinitive explicitly
  - Use verb sorting activities (gerund verbs vs infinitive verbs)
  recommended_activities:
  - name: Verb Sorting
    duration: 10
    adaptation_notes: Students sort verbs into 'gerund', 'infinitive', or 'both' categories.
  - name: Find Someone Who
    duration: 15
    adaptation_notes: Students ask classmates about hobbies using 'Do you enjoy...?'
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I enjoy to read.*'
  correction: I enjoy reading.
  explanation: '''Enjoy'' must be followed by a gerund (-ing), not an infinitive.
    This is a common error because many verbs in other languages use infinitive after
    ''enjoy''.'
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Italian
- error: '*The movie was bored.*'
  correction: The movie was boring.
  explanation: Use '-ing' form to describe what something does (The movie bores viewers
    → boring). Use '-ed' form to describe how someone feels (I was bored).
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
  - Japanese
  - Korean
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
