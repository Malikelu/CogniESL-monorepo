grammar_point: dependent_prepositions
title: Dependent Prepositions (listen to, depend on, interested in)
description: Prepositions that must follow specific verbs, adjectives, or nouns. Essential
  for collocation accuracy.
level: B1
meaning:
  core_meaning: Certain words require specific prepositions to complete their meaning.
    These are fixed collocations.
  timeline: N/A (Dependent prepositions are about collocation, not time.)
  contrast: '''Listen to'' (action) vs ''hear'' (no preposition needed)

    ''Look at'' (action) vs ''see'' (no preposition needed)

    ''Interested in'' vs ''interesting to''

    '
  ccqs:
  - question: Is 'I listen music' correct?
    answer: No — you need 'to.' The correct form is 'I listen to music.'
  - question: Is 'good in maths' the correct preposition?
    answer: No — the correct collocation is 'good at maths.'
  - question: Can you say 'depend of' or 'depend from'?
    answer: No — the only correct form is 'depend on.'
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Verb + dependent preposition + object: "listen to music"

      Adjective + dependent preposition + object: "interested in art"

      Noun + dependent preposition + object: "reason for delay"

      '
    example_generator:
      contexts:
      - family and relationships
      - entertainment and media
      min_examples: 4
  negative:
    structure: 'Preposition unchanged: ''I don''t listen to rock.'''
    example_generator:
      contexts:
      - sports and hobbies
      min_examples: 4
  questions:
    structure: 'Preposition stays with verb: ''Do you listen to jazz?'' ''Are you
      good at tennis?'''
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
sub_rules:
- rule: Many adjectives, verbs, and nouns require specific prepositions. These must
    be learned as chunks
  type: lexical
  examples:
  - interested in (NOT interested about)
  - afraid of (NOT afraid from)
  - depend on (NOT depend of)
  - good at (NOT good in)
- rule: Some adjectives change meaning depending on the preposition used
  type: semantic
  examples:
  - angry with someone (person)
  - angry about something (situation)
  - different from (standard)
  - different to (British informal)
- rule: 'Preposition choice after verbs: verb + preposition + noun, or verb + noun
    + preposition + noun'
  type: grammatical
  examples:
  - listen to music
  - look at the picture
  - wait for the bus
  - apologize for being late
use:
- name: Verb + Preposition
  description: Verbs that require specific prepositions.
  examples:
  - depend on
  - listen to
  - look at
  - wait for
  - belong to
  key_point: 'Memorize as chunks: ''listen to'' not ''listen at''.'
- name: Adjective + Preposition
  description: Adjectives followed by specific prepositions.
  examples:
  - afraid of
  - good at
  - interested in
  - different from
  - similar to
  key_point: Adjective determines preposition, not meaning.
- name: Noun + Preposition
  description: Nouns followed by specific prepositions.
  examples:
  - reason for
  - solution to
  - need for
  - example of
  key_point: 'Often parallels verb form: ''solve'' → ''solution to''.'
phonetics:
- note: 'Dependent prepositions are usually unstressed: ''interested in'' → /ˈɪntrəstɪd
    ɪn/, ''afraid of'' → /əˈfreɪd əv/. The preposition often reduces to a schwa.'
  example_generator:
    contexts:
    - preposition reduction
  l1_issue: Learners may over-pronounce the preposition, breaking the natural flow.
    Teach the reduced forms.
teaching:
  methodology: 'Teach collocations as fixed chunks rather than rules. Use a text-based
    approach: present a reading passage rich in dependent prepositions, have students
    identify patterns, then categorise by preposition type (verb+prep, adjective+prep,
    noun+prep). Reinforce through spaced repetition (flashcards, bingo, matching games).
    Encourage use of collocation dictionaries for independent study.'
  tips:
  - 'Teach as chunks: ''listen + to'' as one unit, not verb + separate preposition.'
  - 'Group by preposition: ''of'' words (afraid of, tired of, think of).'
  - Use collocation dictionaries or apps for self-study.
  recommended_activities:
  - name: Preposition Gap Fill
    duration: 10
    adaptation_notes: Students complete sentences with the correct preposition. Focus
      on high-frequency collocations.
  - name: Preposition Error Hunt
    duration: 15
    adaptation_notes: Give students a text with deliberate preposition errors. Students
      identify and correct them.
  - name: Preposition Memory Game
    duration: 10
    adaptation_notes: Create cards with adjectives/verbs on one side and prepositions
      on the other. Students match them from memory.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
