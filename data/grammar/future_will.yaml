grammar_point: future_will
title: 'Future: Will (Spontaneous Decisions, Predictions, Promises)'
description: 'Structure used for spontaneous decisions, predictions, promises, and
  offers: will + base verb.'
level: A1
meaning:
  core_meaning: Spontaneous decisions made at moment of speaking, general predictions,
    promises, and offers.
  timeline: 'Future: Actions that will happen after the moment of speaking.'
  contrast: 'Will = Spontaneous decision: I will help you! (decide now)


    Going To = Pre-made plan: I am going to help you (planned earlier)


    Present Continuous = Fixed arrangement: I am helping you tomorrow (booked)

    '
  ccqs:
  - question: If I say 'I will help you' right now, did I plan to help before?
    answer: No, you decided at that moment. It was not planned.
    purpose: Tests whether the learner understands that 'will' expresses predictions,
      spontaneous decisions, promises, and willingness.
  - question: If someone says 'It will rain tomorrow,' do they see rain now?
    answer: No, it is a general prediction without current evidence.
    purpose: Tests whether the learner can distinguish between predictions with evidence
      ('going to' -- dark clouds visible) and general predictions without evidence
      ('will' -- general belief about the future).
  - question: Is 'I will always love you' a promise or a plan?
    answer: It is a promise -- a strong statement about the future.
    purpose: Tests whether the learner understands that 'will' is invariable (no -s
      in third person) and is followed by the base form of the verb.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Will + base verb: I will call you.'
    example_generator:
      contexts:
      - travel and places
      min_examples: 4
  negative:
    structure: 'Will not (won''t) + base verb: I won''t call you.'
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Invert will and subject: Will you call me?'
    example_generator:
      contexts:
      - travel and places
      min_examples: 4
sub_rules:
- rule: Will is used for spontaneous decisions made at the moment of speaking
  type: semantic
  examples:
  - I will help you with that (just decided)
  - I will have the pasta, please (deciding now)
  - I will call her right now (spontaneous decision)
- rule: Will is used for predictions without specific evidence, often with I think,
    I believe, probably
  type: semantic
  examples:
  - I think it will rain tomorrow
  - She will probably pass the exam
  - I believe he will succeed
- rule: Will is used for promises, offers, and requests
  type: pragmatic
  examples:
  - I will always love you (promise)
  - I will carry that for you (offer)
  - Will you help me? (request)
  - Will you marry me? (proposal)
- rule: Will is used for habits and typical behavior, often with a tone of annoyance
    or admiration
  type: semantic
  examples:
  - He will leave his clothes on the floor (annoying habit)
  - She will sit and read for hours (typical behavior)
  - The cat will sleep all day (characteristic behavior)
use:
- name: Spontaneous Decisions
  description: Decisions made at the moment of speaking.
  examples:
  - I will buy it! (decide now)
  - I will call you back.
  key_point: Decision happens when speaking.
- name: Predictions (No Evidence)
  description: General predictions without current evidence.
  examples:
  - It will rain tomorrow. (general belief)
  - People will live on Mars.
  key_point: No current evidence, unlike going to.
- name: Promises & Offers
  description: Make promises or offers to help.
  examples:
  - I will help you.
  - Will you open the door? (request)
  key_point: Common in everyday conversation.
- name: Facts About the Future
  description: General facts that will happen.
  examples:
  - The sun will rise at 6am.
  key_point: Unchanging future facts.
phonetics:
- note: 'In connected speech, will is often reduced to /l/ after pronouns: ''I will''
    → /aɪl/, ''She will'' → /ʃiːl/. The full form /wɪl/ is used only for emphasis.'
  example_generator:
    contexts:
    - will reduction
  l1_issue: Learners may over-pronounce 'will' as /wɪl/ in all contexts. Teach the
    reduced form /l/ for natural speech.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Affirmative will (spontaneous decisions).'
  - 'Week 2: Negative and questions, predictions.'
  - 'Week 3: Contrast with going to and present continuous.'
  - 'Use instant decision scenarios: You drop a pen, someone says I will pick it up!'
  recommended_activities:
  - name: Spontaneous Decisions
    duration: 10
    adaptation_notes: 'Teacher creates scenarios. Students respond: ''It is cold.''
      → ''I will close the window.'' ''You look tired.'' → ''I will make you some
      coffee.'''
  - name: Predictions
    duration: 15
    adaptation_notes: 'Students make predictions about the future using will: ''In
      50 years, people will live on Mars.'''
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 8:
    Future Tenses, §8.1-8.3'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 3: The Verb, §3.10 (future time)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 600-610 (will:
    prediction, willingness, spontaneous decisions)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    8: Future tenses, §8.5-8.7'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 5: Will for the future'
common_errors:
- error: 'Using ''will'' for planned events: *''I will meet John tomorrow.'' (planned)'
  correction: I am meeting John tomorrow.
  explanation: Use present continuous for fixed plans. 'Will' is for spontaneous decisions.
  l1_groups:
  - Portuguese
  - Spanish
- error: 'Using ''will'' in time/condition clauses: *''When I will arrive, I will
    call you.'''
  correction: When I arrive, I will call you.
  explanation: In time and condition clauses (when, if, before, after), use present
    simple, not 'will'.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - German
register_notes:
- note: '''Will'' is neutral in register. In formal writing, ''shall'' may be used
    for first person (BrE).'
- note: 'In news reporting, ''will'' is used for predictions: ''The economy will grow
    by 2%.'''
dialectal_variation:
- note: 'BrE uses ''shall'' for first person: ''I shall go.'' AmE uses ''will'' for
    all persons.'
discourse_notes:
- note: '''Will'' expresses spontaneous decisions: ''The phone is ringing. I''ll get
    it.'''
- note: '''Will'' is used for promises and offers: ''I will help you.'''
