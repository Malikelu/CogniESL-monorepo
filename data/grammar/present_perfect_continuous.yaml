grammar_point: present_perfect_continuous
title: Present Perfect Continuous (have/has been + V-ing)
description: Action started in past, continues to present, emphasizes duration or
  recent activity with visible result.
level: B1
meaning:
  core_meaning: Past action continuing to present, emphasizes duration or recent activity
    with visible result.
  timeline: Past start → present (still ongoing or just finished with result).
  contrast: '''Present Perfect'' = "I have eaten (completed, no duration)."

    ''Present Perfect Continuous'' = "I have been eating for 1 hour (duration)."

    '
  ccqs:
  - question: I have been studying for 3 hours. Am I still studying now?
    answer: Yes — present perfect continuous emphasizes that the action started in
      the past and continues now (or has just stopped with a visible result).
    purpose: Tests whether the learner understands the core temporal meaning of present
      perfect continuous — that the action is ongoing up to the present moment, which
      distinguishes it from present perfect simple which presents the action as completed.
  - question: What is the difference between 'I have studied' and 'I have been studying'?
    answer: '''I have studied'' focuses on completion (the action is done). ''I have
      been studying'' focuses on duration (how long the action has been happening).'
    purpose: 'Tests whether the learner understands the aspectual distinction between
      the two forms: present perfect simple emphasizes the result/completion while
      present perfect continuous emphasizes the duration/ongoing process.'
  - question: Can we say 'I have been knowing him for 5 years'?
    answer: No — 'know' is a stative verb and is not normally used in continuous forms.
      We say 'I have known him for 5 years.'
    purpose: Tests whether the learner knows the stative verb restriction on continuous
      forms. Stative verbs describe states rather than actions and are grammatically
      incompatible with the progressive aspect, even when duration is being expressed.
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + have/has been + V-ing: ''I have been walking.'' ''She has
      been working.'''
    example_generator:
      contexts:
      - education and school
      - food and daily routines
      min_examples: 4
  negative:
    structure: 'Subject + haven''t/hasn''t been + V-ing: ''I haven''t been walking.''
      ''She hasn''t been working.'''
    example_generator:
      contexts:
      - work and professional life
      - health and wellbeing
      min_examples: 4
  questions:
    structure: 'Have/has + subject + been + V-ing: ''Have you been walking?'' ''Has
      she been working?'''
    example_generator:
      contexts:
      - education and school
      - food and daily routines
      min_examples: 4
sub_rules:
- rule: 'Structure: have/has been + verb-ing'
  type: grammatical
  examples:
  - I have been studying for 3 hours
  - She has been working here since 2020
  - They have been living in London for 5 years
- rule: Used with for and since to show duration
  type: grammatical
  examples:
  - I have been studying for 3 hours
  - She has been working since morning
- rule: Focuses on the duration or ongoing nature of an action, not its completion
  type: semantic
  examples:
  - I have been reading this book for weeks (still reading)
  - She has been working all day (focus on the long period)
use:
- name: Duration to Present
  description: How long an action has been happening, still ongoing.
  examples:
  - I have been learning English for 5 years.
  - It has been raining all day.
  key_point: Use with 'for', 'since', 'how long'.
- name: Recent Activity with Visible Result
  description: Just finished, result visible now.
  examples:
  - I'm tired because I have been running.
  - She has been gardening (dirty hands).
  key_point: Result is obvious in present.
- name: Temporary Repeated Action
  description: Repeated action recently, may not be permanent.
  examples:
  - I have been going to the gym lately.
  - She has been calling me every day.
  key_point: Use with 'lately', 'recently'.
phonetics:
- note: 'Have been is often contracted: ''I''ve been studying'' /aɪv biːn ˈstʌdɪɪŋ/.
    The contraction is very common in connected speech.'
  example_generator:
    contexts:
    - have been contraction
  l1_issue: Many L1 speakers do not contract 'have been' in speech. Teach the contracted
    forms.
teaching:
  methodology: PPP
  tips:
  - 'Contrast Present Perfect and Continuous with duration: ''I have eaten (done)
    vs I have been eating for 1 hour (ongoing)''.'
  - Practice with 'for'/'since' and 'how long'.
  - 'Drill visible result sentences: ''Why are you sweaty? I have been running.'''
  recommended_activities:
  - name: How Long
    duration: 15
    adaptation_notes: Students ask each other 'How long have you been...?' 'How long
      have you been studying English?' 'I have been studying for 3 years.'
  - name: Present Perfect or Present Perfect Continuous
    duration: 10
    adaptation_notes: 'Students choose the correct form based on context: completed
      action vs ongoing action.'
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 7:
    Perfect Aspect, §7.1-7.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I have been knowing him for years.*'
  correction: I have known him for years.
  explanation: 'Stative verbs (know, believe, love, hate) are not normally used in
    continuous forms. Use present perfect simple: ''I have known him'' NOT ''I have
    been knowing him''.'
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used for everyday communication and is
    among the most frequent patterns in spoken English.
- note: In academic writing, this structure appears in discussions of established
    knowledge, methodology, and findings.
- note: In news reports, this structure is used for reporting events and attributing
    statements.
