grammar_point: wishes_regrets
title: Wishes and Regrets (I wish, If only, Should have)
description: Expressing wishes about present/future (unreal past) and regrets about
  past (past perfect), including 'should have' for past regrets.
level: B2
meaning:
  core_meaning: Wishes express desire for different present/future situations (unreal
    past). Regrets express sadness about past actions/inactions (past perfect or should
    have).
  timeline: 'Present/Future Wishes: Now/Future (unreal). Past Regrets: Past (unreal,
    didn''t happen).'
  contrast: 'Wish (present): "I wish I was tall." (present unreal)

    Wish (past): "I wish I had been tall." (past unreal)

    Should have: "I should have been tall." (regret about past)

    '
  ccqs:
  - question: What structure do we use for present wishes
    answer: I wish plus past simple for present wishes.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Present/Future Wishes: I wish/If only + Past Simple: "I wish I was/were
      taller." "If only I had more time."

      Past Regrets: I wish/If only + Past Perfect: "I wish I had studied." "If only
      I hadn''t eaten so much."

      Should Have (Regret): Subject + should have + Past Participle: "I should have
      studied." "You should have listened."

      '
    example_generator:
      contexts:
      - entertainment and media
      - social interactions
      min_examples: 4
  negative:
    structure: 'Present/Future: I wish + Past Simple negative: "I wish I didn''t have
      to work."

      Past: I wish + Past Perfect negative: "I wish I hadn''t been rude."

      Should have negative: shouldn''t have + Past Participle: "I shouldn''t have
      eaten that."

      '
    example_generator:
      contexts:
      - weather and nature
      min_examples: 4
  questions:
    structure: 'Wishes: "Do you wish you were taller?"

      Should have: "Should I have apologized?"

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: I wish + past simple for present wishes (things you want to be different now)
  type: grammatical
  examples:
  - I wish I had more money (but I do not)
  - I wish she were here (but she is not)
  - I wish I could speak French (but I cannot)
- rule: I wish + past perfect for past regrets (things you wish had been different)
  type: grammatical
  examples:
  - I wish I had studied harder (but I did not)
  - I wish she had come to the party (but she did not)
  - I wish I had known earlier (but I did not)
- rule: If only is a more emphatic form of I wish
  type: semantic
  examples:
  - If only I had more money
  - If only she were here
  - If only I had studied harder
use:
- name: Present/Future Wishes
  description: Desire for different current or future situations.
  examples:
  - I wish I spoke French.
  - If only it wasn't Monday.
  key_point: Use Past Simple for present/future unreal situations.
- name: Past Regrets (I wish)
  description: 'Sadness about past actions/inactions: ''I wish I had studied.'''
  examples:
  - I wish I hadn't eaten so much.
  - If only I had listened.
  key_point: Use Past Perfect for past regrets with 'I wish/If only'.
- name: Past Regrets (Should have)
  description: 'Regret about past actions: ''I should have studied.'' (I didn''t study,
    regret it).'
  examples:
  - You should have told me.
  - I shouldn't have trusted him.
  key_point: Should have = regret about past action/inaction.
phonetics:
- note: 'In wish sentences, the auxiliary verb is often contracted: ''I wish I''d
    studied harder'' /aɪ wɪʃ aɪd ˈstʌdɪd ˈhɑːdə/. The contraction is very common in
    speech.'
  example_generator:
    contexts:
    - wish contractions
  l1_issue: Learners may not recognize the contracted forms in listening. Teach both
    full and contracted forms.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Present/future wishes with Past Simple (I wish I had...).'
  - 'Week 2: Past regrets with Past Perfect (I wish I had studied...).'
  - 'Week 3: Should have for past regrets (I should have studied...).'
  - 'Use regret prompts: Students write 3 past regrets with ''I wish'' and ''should
    have''.'
  recommended_activities:
  - name: Present Wishes
    duration: 15
    adaptation_notes: 'Students write 5 wishes about their present life: ''I wish
      I had more free time.'' ''I wish I could play an instrument.'''
  - name: Past Regrets
    duration: 15
    adaptation_notes: 'Students write 5 regrets about the past: ''I wish I had studied
      harder at school.'' ''I wish I had traveled more when I was young.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
