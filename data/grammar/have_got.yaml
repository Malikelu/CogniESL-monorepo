grammar_point: have_got
title: "Have Got (I've got, Have you got?, I haven't got)"
description: "The use of 'have got' as an alternative to 'have' for possession, obligation, and relationships, particularly in British English."
level: A2

meaning:
  core_meaning: "'Have got' is an informal alternative to 'have' used to express possession, relationships, characteristics, and (in some contexts) obligation. It is extremely common in British English and increasingly common in spoken American English. The form is fixed: 'have/has + got' (present only — there is no past form '*had got' in standard usage; 'had' is used instead)."
  timeline: "Present tense only. 'Have got' refers to current possession or state. For the past, use 'had' (not '*had got'). For the future, use 'will have' (not '*will have got')."
  contrast: "Formal: 'I have a car.' / Informal: 'I've got a car.' — Same meaning, but 'have got' is more common in spoken British English."
  ccqs:
    - question: "Is 'I've got' the same as 'I have'?"
      answer: "Yes, for possession and relationships — 'I've got a sister' = 'I have a sister'."
    - question: "Can we say 'I had got' for the past?"
      answer: "Not in standard English. Use 'I had' for the past: 'I had a car when I was younger.'"
    - question: "Is 'have got' formal or informal?"
      answer: "Informal. In formal writing, use 'have' without 'got'."
  example_generator:
    contexts: ["describing possessions", "talking about family", "describing symptoms", "everyday conversation", "informal writing"]
    cultural_notes: ["'Have got' is far more common in British English than American English. In American English, 'have' or 'got' alone is more typical: 'I have a car' or 'I got a car' (informal)."]
    min_examples: 5

form:
  affirmative:
    structure: "Subject + have/has + got + noun phrase: 'I've got a new phone.' / 'She's got two brothers.' / 'We've got a problem.'"
    example_generator:
      contexts: ["describing possessions", "talking about family", "describing health", "everyday situations"]
      min_examples: 4
  negative:
    structure: "Subject + haven't/hasn't + got + noun phrase: 'I haven't got any money.' / 'She hasn't got a car.' / 'We haven't got time.'"
    example_generator:
      contexts: ["lacking possessions", "absence of something", "health symptoms"]
      min_examples: 3
  questions:
    structure: "Have/Has + Subject + got + noun phrase?: 'Have you got a pen?' / 'Has she got any children?' / 'Have they got the tickets?'"
    example_generator:
      contexts: ["asking about possession", "checking availability", "health enquiries"]
      min_examples: 3

sub_rules:
  - rule: "Have got for possession"
    type: "grammatical"
    examples:
      - "I've got a new laptop."
      - "She's got a beautiful garden."
      - "They've got three children."
      - "We've got everything we need."
  - rule: "Have got for relationships"
    type: "grammatical"
    examples:
      - "I've got two sisters and a brother."
      - "She's got a lot of friends in London."
      - "Have you got any family nearby?"
  - rule: "Have got for characteristics"
    type: "grammatical"
    examples:
      - "He's got blue eyes and dark hair."
      - "She's got a lovely smile."
      - "You've got a terrible cold — you should see a doctor."
  - rule: "Have got to for obligation (informal)"
    type: "grammatical"
    examples:
      - "I've got to go now — I'm late for work."
      - "She's got to finish the report by Friday."
      - "We've got to be there by six."
  - rule: "Contractions are almost always used in speech"
    type: "phonological"
    examples:
      - "I've got (not 'I have got' — sounds unnatural in casual speech)"
      - "She's got (not 'She has got')"
      - "Haven't got / Hasn't got (contractions in negatives are standard)"

use:
  - context: "Everyday conversation"
    description: "'Have got' is the default form for expressing possession in spoken British English."
    examples:
      - "Have you got the time?"
      - "I've got a headache."
      - "We've got loads of food — don't bring anything."
  - context: "Describing people"
    description: "Used to describe physical characteristics and personal attributes."
    examples:
      - "He's got the most amazing voice."
      - "She's got her mother's eyes."
      - "You've got paint in your hair!"
  - context: "Health and symptoms"
    description: "Very common when describing illness or physical conditions."
    examples:
      - "I think I've got a cold coming on."
      - "She's got a temperature — she's staying home today."
      - "Have you got any pain in your chest?"
  - context: "Obligation (have got to)"
    description: "'Have got to' expresses necessity or obligation, similar to 'must' but more informal."
    examples:
      - "I've got to pick up the kids at three."
      - "You've got to see this film — it's brilliant."
      - "We haven't got to decide today, have we?"
  - context: "Informal writing"
    description: "Appropriate in emails, texts, and informal messages, but not in formal writing."
    examples:
      - "I've got some news — I'm moving to Edinburgh!"
      - "Have you got the address? I've lost it."
      - "Sorry, I haven't got time to explain now."

phonetics:
  - note: "In connected speech, 'have got' is almost always contracted: /v gɒt/ or /əv gɒt/. The full form 'I have got' sounds stilted."
    example_generator:
      - contexts: ["connected speech with have got"]
    l1_issue: "Learners may over-pronounce 'have' as /hæv/ instead of the weak form /əv/ or /v/, making their speech sound unnatural."
  - note: "'Got' in 'have got' is typically unstressed: 'I've GOT a car' (stress on the object, not on 'got')."
    example_generator:
      - contexts: ["stress patterns in have got"]
    l1_issue: "Learners may stress 'got' too heavily: *'I've GOT a car' instead of 'I've got a CAR'."
  - note: "In negatives, the stress pattern shifts: 'I haven't got ANY money' (stress on 'any')."
    example_generator:
      - contexts: ["stress in negative have got"]
    l1_issue: "Learners may struggle with the interaction between negation and stress placement."

teaching:
  methodology: "PPP (Presentation, Practice, Production)"
  tips:
    - "Introduce 'have got' early (A2) as it is extremely common in spoken English."
    - "Emphasise that it is present tense only — no past form '*had got'."
    - "Teach the contraction from the start: 'I've got', not 'I have got'."
    - "Contrast with 'have' to show register difference: 'I have a car' (formal) vs 'I've got a car' (informal)."
    - "Use visual prompts (pictures of people, objects) for practice: 'Has she got long hair?'"
    - "Introduce 'have got to' for obligation separately, as it is a different structure."
  recommended_activities:
    - name: "Picture Description"
      duration: 15
      adaptation_notes: "Show a picture of a person. Students describe them using 'has got': 'He's got brown hair. He's got a beard. He's got blue eyes.'"
    - name: "Classroom Survey"
      duration: 20
      adaptation_notes: "Students mingle and ask each other 'Have you got...?' questions: 'Have you got a pet? Have you got any brothers or sisters?' They report back to the class."
    - name: "Have Got Bingo"
      duration: 15
      adaptation_notes: "Students fill a bingo grid with items (a red car, a big house, a pet cat, etc.). The teacher describes people: 'She's got a pet cat.' Students cross off matching items."
    - name: "Obligation Chain"
      duration: 15
      adaptation_notes: "Students take turns saying what they've got to do today: 'I've got to go to work.' Next student: 'She's got to go to work, and I've got to do the shopping.' Builds memory and grammar practice."
