grammar_point: demonstratives
title: Demonstratives (This, That, These, Those)
description: 'Words that point to specific things based on distance: this (near),
  that (far), these (near plural), those (far plural).'
level: A1
meaning:
  core_meaning: Demonstratives point to specific things. This/these = near the speaker.
    That/those = far from the speaker.
  timeline: Present — refers to things visible or known in the current context.
  contrast: '''This'' = near (this book here) vs ''That'' = far (that book there)'
  ccqs:
  - question: Is the thing near or far?
    answer: Near = this/these, Far = that/those
    purpose: 'Tests whether the learner understands the two-way distinction: ''this/these''
      (near speaker) vs ''that/those'' (far from speaker).'
  - question: Is it one thing or more than one?
    answer: One = this/that, More = these/those
    purpose: Tests whether the learner can choose singular ('this/that') vs plural
      ('these/those') based on the noun.
  - question: '[Add specific question for CCQ 3]'
    answer: '[Add specific answer for CCQ 3]'
    purpose: Tests whether the learner understands that demonstratives can be used
      as pronouns ('This is nice.') or determiners ('This book is nice.').
  - question: '[Add specific question for CCQ 4]'
    answer: '[Add specific answer for CCQ 4]'
    purpose: 'Tests whether the learner can use demonstratives for discourse reference:
      ''This is what I mean...'' (referring to upcoming information)'
  example_generator:
    contexts:
    - classroom objects
    - shopping
    - pointing at things
    - describing locations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'This/That + singular noun: ''This book is mine.'' / These/Those +
      plural noun: ''These books are mine.'''
    example_generator:
      contexts:
      - classroom objects
      - shopping
      - pointing at things
      min_examples: 4
  negative:
    structure: 'This/That + be + not: ''This is not my book.'''
    example_generator:
      contexts:
      - classroom objects
      - shopping
      - pointing at things
      min_examples: 4
  questions:
    structure: 'Is this/that...?: ''Is this your bag?'' / Are these/those...?: ''Are
      those your shoes?'''
    example_generator:
      contexts:
      - classroom objects
      - shopping
      - pointing at things
      min_examples: 4
sub_rules:
- rule: This/That for singular, These/Those for plural
  type: grammatical
  examples:
  - this book / these books
  - that car / those cars
- rule: Can be used alone as pronouns
  type: grammatical
  examples:
  - This is nice. (no noun)
  - I want that. (no noun)
use:
- context: Pointing at objects
  description: Identifying things near or far
  examples:
  - This is my pen.
  - That is a beautiful painting.
- context: Shopping
  description: Referring to items
  examples:
  - I'd like this one.
  - How much are those?
phonetics:
- note: Strong /ðiːs/ when emphasizing vs weak /ðɪs/ in connected speech
  contexts:
  - emphasis
  l1_issue: Some L1 speakers use 'this' for both singular and plural
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use real objects at different distances
  - Gesture to reinforce near/far concept
  recommended_activities:
  - name: Point and Say
    duration: 10
    adaptation_notes: Students point to objects and describe them with demonstratives.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.22-12.23'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 5: Nouns and Noun Phrases, §5.9 (demonstratives)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 560-565 (demonstratives:
    this, that, these, those)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    10: Demonstratives, §10.9'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 7: Demonstratives'
common_errors:
- error: 'Using ''this'' for plural: *''This books are mine.'''
  correction: These books are mine.
  explanation: Use 'this/that' for singular, 'these/those' for plural.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: Demonstratives are consistent across registers.
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: 'Demonstratives create spatial and discourse reference: ''This idea (near)
    vs that idea (far).'''
