grammar_point: subjunctive
title: The Subjunctive Mood (I suggest he go)
description: The present subjunctive mood in formal English, using the base form of
  the verb after certain verbs, adjectives, and expressions to convey demands, suggestions,
  recommendations, and necessity.
level: B2
meaning:
  core_meaning: The subjunctive mood expresses things that are not factual — suggestions,
    demands, wishes, recommendations, and hypothetical necessities. In the present
    subjunctive, the base form of the verb is used for all persons (no -s for third
    person singular).
  timeline: The present subjunctive refers to present or future time. The past subjunctive
    (were) is used for hypothetical present situations and is covered separately.
  contrast: 'Indicative: She insists that he is present. Subjunctive: She insists
    that he be present. The subjunctive version expresses a demand, not a fact.'
  ccqs:
  - question: Does the subjunctive use the third person -s?
    answer: 'No, the base form is used for all persons: I suggest that she study,
      not studies.'
  - question: Is the subjunctive common in British English?
    answer: It is more common in American English. British English often uses 'should
      + infinitive' instead, though the pure subjunctive is still used in formal writing.
  - question: Can the subjunctive be used with any verb?
    answer: 'No, it only appears after specific triggers: verbs like suggest, demand,
      insist, recommend, and adjectives like essential, vital, important, necessary.'
  example_generator:
    contexts:
    - formal meetings
    - legal documents
    - academic writing
    - official recommendations
    cultural_notes:
    - American English uses the subjunctive far more than British English
    - In British English, 'should + infinitive' is often an acceptable alternative
    - The subjunctive is a marker of formal, educated English
    min_examples: 5
form:
  affirmative:
    structure: 'Verb/adjective + that + subject + base form of verb. For example:
      I suggest that he study. / It is essential that she be present.'
    example_generator:
      contexts:
      - making recommendations
      - formal proposals
      - official requirements
      min_examples: 4
  negative:
    structure: 'Verb/adjective + that + subject + not + base form of verb. For example:
      I recommend that he not attend. / It is important that she not be informed.'
    example_generator:
      contexts:
      - prohibitions
      - warnings
      - formal restrictions
      min_examples: 3
  questions:
    structure: 'The subjunctive is not typically used in direct questions. It appears
      in indirect questions: She asked that he be present. (not ''Be he present?'')'
    example_generator:
      contexts:
      - indirect questions
      - reported demands
      min_examples: 3
sub_rules:
- rule: 'After verbs of suggestion, demand, and recommendation: suggest, recommend,
    propose, demand, insist, request, require, urge, advise, ask (when meaning request).'
  type: grammatical
  examples:
  - The committee recommended that the policy be changed.
  - I suggest that she apply for the position immediately.
  - They demanded that the manager resign.
  - The doctor advised that he take more exercise.
  - We request that all visitors sign in at reception.
- rule: 'After impersonal expressions with ''it'' + be + adjective: it is essential,
    it is vital, it is important, it is necessary, it is imperative, it is crucial,
    it is advisable, it is desirable.'
  type: grammatical
  examples:
  - It is vital that every member be present at the meeting.
  - It is important that the information remain confidential.
  - It is essential that the work be completed by Friday.
  - It is necessary that he submit the application in person.
- rule: 'The negative subjunctive uses ''not'' before the base verb: I suggest that
    he not go. / It is important that she not be told.'
  type: grammatical
  examples:
  - The judge ordered that the defendant not be released.
  - I recommend that you not accept the first offer.
  - It is crucial that the data not be shared with third parties.
- rule: 'In British English, ''should + infinitive'' is often used as an alternative:
    I suggest that he should study. / It is important that she should be present.'
  type: grammatical
  examples:
  - The doctor recommended that I should reduce my sugar intake.
  - It is essential that students should attend all lectures.
  - They suggested that we should arrive early.
- rule: 'Fixed expressions and formulaic subjunctives: God save the Queen. / Come
    what may. / Be that as it may. / Far be it from me to... / Suffice it to say...
    / Heaven forbid.'
  type: lexical
  examples:
  - God bless you.
  - Come what may, I will stand by you.
  - Be that as it may, we still need to act.
  - Far be it from me to criticise, but this needs improvement.
  - Suffice it to say, the project was not a success.
  - Heaven forbid that anything should happen to them.
- rule: 'The past subjunctive ''were'' is used for hypothetical present situations:
    If I were you... / I wish she were here. / As it were... / If need be...'
  type: grammatical
  examples:
  - If I were you, I would accept the offer.
  - I wish he were more considerate.
  - She acted as it were the owner of the company.
  - If need be, we can work through the weekend.
use:
- context: Formal meetings and minutes
  description: Minutes of meetings frequently record decisions using the subjunctive.
  examples:
  - It was proposed that the budget be increased by ten per cent.
  - The board recommended that a new committee be established.
  - It was agreed that the matter be deferred to the next meeting.
- context: Legal and official documents
  description: Contracts, regulations, and official orders use the subjunctive for
    precision and formality.
  examples:
  - The court ordered that the defendant be held without bail.
  - It is required that all applicants be over eighteen years of age.
  - The regulation stipulates that the equipment be inspected annually.
- context: Academic writing
  description: Scholars use the subjunctive when making recommendations and proposals.
  examples:
  - I propose that further research be conducted in this area.
  - It is recommended that these findings be treated with caution.
- context: Everyday formal advice
  description: Even in less formal contexts, the subjunctive appears in advice-giving.
  examples:
  - I would suggest that you take some time off.
  - My advice is that she see a specialist as soon as possible.
  - If I were you, I would think carefully before deciding.
phonetics:
- note: The subjunctive is often indistinguishable from the indicative in speech except
    in the third person singular (he study vs. he studies) and with 'be' (that she
    be vs. that she is).
  example_generator:
    contexts:
    - formal speech
    - presentations
  l1_issue: Learners may add third person -s to the subjunctive verb, producing ungrammatical
    forms like 'I suggest that he studies'.
- note: The negative form 'that he not go' can sound formal or archaic to some ears;
    in casual speech, learners may prefer 'that he does not go'.
  example_generator:
    contexts:
    - formal writing
    - legal language
  l1_issue: Learners from languages without a subjunctive mood may find the concept
    entirely foreign and default to indicative forms.
teaching:
  methodology: PPP
  tips:
  - Introduce the subjunctive as a 'special form' used after certain trigger words
    — provide a clear list of triggers.
  - 'Contrast indicative and subjunctive side by side: ''She insists that he is''
    (fact) vs. ''She insists that he be'' (demand).'
  - Teach the American (pure subjunctive) and British (should + infinitive) variants
    so students recognise both.
  - 'Use role-play scenarios: a doctor giving advice, a manager making recommendations,
    a lawyer drafting a contract.'
  - Warn students that overuse can sound pompous — the subjunctive should be used
    where it is expected, not forced.
  recommended_activities:
  - name: Trigger Word Sort
    duration: 10
    adaptation_notes: Students sort verbs and adjectives into those that trigger the
      subjunctive and those that do not.
  - name: Subjunctive or Indicative?
    duration: 10
    adaptation_notes: Students choose between subjunctive and indicative forms in
      context, discussing the meaning difference.
  - name: Formal Minutes Writing
    duration: 20
    adaptation_notes: Students write mock meeting minutes using at least five subjunctive
      structures.
  - name: American vs British
    duration: 15
    adaptation_notes: Students rewrite American English subjunctive sentences using
      British 'should + infinitive' alternatives.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for subjunctive.
  correction: Correct form.
  explanation: This is a common error for subjunctive.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
