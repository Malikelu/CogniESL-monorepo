grammar_point: would_like
title: Would like (polite desires, requests)
description: Phrase used to express polite desires, preferences, or make polite requests
  (more formal than 'want').
level: A2
meaning:
  core_meaning: Expresses polite desires, preferences, or requests; more formal and
    polite than 'want'.
  timeline: Refers to present desires or future plans; never used for past desires
    (used 'wanted' instead).
  contrast: 'Would like = Polite desire/request: "I''d like a coffee" (polite)

    Want = Casual desire: "I want a coffee" (casual)

    Would like to = Future plan: "I''d like to visit Rome" (plan)

    '
  ccqs:
  - question: What is the difference between would like and want
    answer: Would like is more polite and formal than want.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: Subject + would like (I'd like) + noun/to + base verb
    example_generator:
      contexts:
      - travel and places
      min_examples: 4
  negative:
    structure: Subject + wouldn't like + noun/to + base verb
    example_generator:
      contexts:
      - food and daily routines
      - weather and nature
      min_examples: 4
  questions:
    structure: Would + subject + like + noun/to + base verb?
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Would like + to + base verb (more polite than want)
  type: grammatical
  examples:
  - I would like to go
  - She would like to study
  - They would like to visit
- rule: Would like + noun
  type: grammatical
  examples:
  - I would like some coffee
  - She would like a new car
  - They would like more information
- rule: Would you like...? is used for offers and invitations
  type: pragmatic
  examples:
  - Would you like some tea (offer)
  - Would you like to come to dinner (invitation)
  - Would you like me to help (offer of assistance)
use:
- name: Polite Requests
  description: Make polite requests for items or services.
  examples:
  - I would like the menu, please.
  - We would like to book a table.
  key_point: More polite than 'I want'.
- name: Polite Desires
  description: Express what you want in a polite way.
  examples:
  - I would like a new phone.
  - She would like to learn Spanish.
  key_point: Shows good manners in formal settings.
- name: Invitations
  description: Politely invite someone to do something.
  examples:
  - Would you like to come to my party?
  - Would you like to join us for dinner?
  key_point: More polite than 'Do you want to come?'
phonetics:
- note: 'Would like is often contracted: ''I''d like'' /aɪd laɪk/, ''She''d like''
    /ʃiːd laɪk/. The contraction is very common in offers and requests.'
  example_generator:
    contexts:
    - would like contraction
  l1_issue: Learners may not recognize 'I'd like' in listening. Teach the contraction
    as the standard form for offers and requests.
teaching:
  methodology: PPP
  tips:
  - 'Use restaurant scenarios: ''I would like a burger, please''.'
  - 'Role-play: Student orders food using ''would like''.'
  - 'Contrast with ''want'' using casual vs formal settings: ''I want a coffee'' (casual)
    vs ''I would like a coffee'' (formal).'
  - 'Practice invitations: ''Would you like to...?'''
  recommended_activities:
  - name: Polite Requests
    duration: 10
    adaptation_notes: 'Students practice making polite requests: ''I would like some
      water, please.'' ''Would you like to sit down?'''
  - name: Restaurant Role Play
    duration: 15
    adaptation_notes: 'Students role-play ordering food: ''I would like the pasta.''
      ''Would you like anything to drink?'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for would_like.
  correction: Correct form.
  explanation: This is a common error for would_like.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
