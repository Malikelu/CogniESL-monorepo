grammar_point: prepositions_of_movement
title: "Prepositions of Movement (to, from, into, out of, across, through)"
description: "Words that show direction of movement from one place to another. Essential for describing travel and motion."
level: A1

meaning:
  core_meaning: "Prepositions of movement show the direction or path of movement — where something or someone is going. They answer 'Where to?' or 'Where from?' The key idea is motion, not static position."
  timeline: "N/A — movement prepositions describe direction, not time. They can be used with any tense."
  contrast: "'To' = toward a destination (go to school) vs 'From' = starting point (come from Spain) vs 'Into' = entering a space (walk into the room) vs 'Across' = surface movement (walk across the street) vs 'Through' = movement inside/among (drive through the tunnel)"
  ccqs:
    - question: "Is this about movement or static position?"
      answer: "Movement — the preposition shows direction of travel."
    - question: "Do we say 'go to home' or 'go home'?"
      answer: "'Go home' — no preposition before 'home'. We say 'go to school' but 'go home'."
    - question: "What is the difference between 'across' and 'through'?"
      answer: "'Across' = on a surface (across the street). 'Through' = inside something (through the tunnel)."
  example_generator:
    contexts:
      - daily travel
      - giving directions
      - describing movement
    cultural_notes:
      - "Use diverse locations and contexts"
      - "Avoid assuming specific cultural knowledge"
      - "Keep examples concrete and visual"
    min_examples: 5

form:
  affirmative:
    structure: "Verb of movement + preposition + destination/source"
    example_generator:
      - "I go to school."
      - "She came from Spain."
      - "He walked into the room."
      - "They ran across the street."
      - "We drove through the tunnel."
    min_examples: 4
  negative:
    structure: "Subject + don't/doesn't/didn't + verb + preposition + destination"
    example_generator:
      - "I don't go to school on Sundays."
      - "She didn't come from Spain."
      - "He didn't walk into the room."
    min_examples: 4
  questions:
    structure: "Where + do/does/did + subject + go/come from?"
    example_generator:
      - "Where did you go?"
      - "Where are you from?"
      - "Where does she go to school?"
    min_examples: 4

sub_rules:
  - rule: "To: movement toward a destination (go to school, come to my house, walk to the park)"
    type: grammatical
    examples: ["go to school", "come to my house", "walk to the park", "drive to work", "fly to London"]
  - rule: "From: starting point of movement (come from Spain, from the beginning, from here)"
    type: grammatical
    examples: ["come from Spain", "from the beginning", "from here to there", "from my house to school"]
  - rule: "Into: entering a 3D space (walk into the room, jump into the pool, get into the car)"
    type: grammatical
    examples: ["walk into the room", "jump into the pool", "get into the car", "go into the building"]
  - rule: "Out of: exiting a 3D space (walk out of the room, get out of the car, run out of the building)"
    type: grammatical
    examples: ["walk out of the room", "get out of the car", "run out of the building", "climb out of the window"]
  - rule: "Across: movement on a surface (walk across the street, swim across the river, fly across the ocean)"
    type: grammatical
    examples: ["walk across the street", "swim across the river", "fly across the ocean", "run across the field"]
  - rule: "Through: movement inside or among something (drive through the tunnel, walk through the forest, look through the window)"
    type: grammatical
    examples: ["drive through the tunnel", "walk through the forest", "look through the window", "go through the door"]
  - rule: "Exception: 'go home' (no preposition) vs 'go to school' (with preposition)"
    type: grammatical
    examples: ["go home (NOT go to home)", "go to school", "go to the park", "go to work"]

use:
  - context: "Daily travel"
    description: "Talking about regular travel routes"
    examples: ["I go to school by bus.", "She walks to work.", "He drives to the office.", "They come from the city center.", "We go home at 5pm."]
  - context: "Giving directions"
    description: "Telling someone how to get somewhere"
    examples: ["Go to the end of the street.", "Turn left and walk across the park.", "Go through the tunnel.", "Come from the station and go into the building.", "Walk along the road until you see the bank."]
  - context: "Describing movement"
    description: "Talking about how someone or something moves"
    examples: ["The cat jumped into the box.", "She ran across the street.", "He walked through the door.", "They swam across the river.", "The bird flew through the window."]

phonetics:
  - note: "Prepositions of movement are usually unstressed: 'to' → /tə/, 'from' → /frəm/, 'into' → /ɪntə/. 'I go to school' sounds like /aɪ gəʊ tə skuːl/."
    example_generator:
      - "to /tə/"
      - "from /frəm/"
      - "into /ɪntə/"
      - "across /əˈkrɒs/"
    l1_issue: "Portuguese and Spanish speakers often over-pronounce prepositions. Teach the weak forms for natural speech."
  - note: "Contractions with 'to': 'want to' → /wɒnə/, 'going to' → /ɡənə/, 'got to' → /ɡɒtə/."
    example_generator:
      - "want to → wanna /wɒnə/"
      - "going to → gonna /ɡənə/"
    l1_issue: "Many L1 speakers are not aware of these reductions. Teach them for listening comprehension."

teaching:
  methodology: "PPP with physical movement and maps"
  tips:
    - "Use the classroom: students physically move 'to the door', 'into the hallway', 'across the front'. This makes the meaning physical and memorable."
    - "Draw arrows on the board: → (to), ← (from), ↗ (through), ↔ (across). Visual support helps."
    - "Practice with maps: 'Go from A to B through C.' Uses prepositions in a real context."
    - "Teach the exception: 'go home' (no preposition) vs 'go to school' (with preposition). This is a very common error."
    - "Use action verbs: walk, run, drive, fly, swim, jump. These naturally pair with movement prepositions."
  recommended_activities:
    - name: "Classroom Movement"
      duration: 10
      adaptation_notes: "Teacher gives commands: 'Walk to the door. Go into the hallway. Run across the room.' Students physically perform the actions. Makes the grammar physical."
    - name: "Map Directions"
      duration: 15
      adaptation_notes: "Students give directions using a map: 'Go from the station to the park through the city center.' Practices prepositions with real locations."
    - name: "To, From, or Into?"
      duration: 10
      adaptation_notes: "Teacher says a destination. Students choose the correct preposition: '___ school' (to), '___ Spain' (from), '___ the room' (into)."
    - name: "Story Journey"
      duration: 15
      adaptation_notes: "Students write a short story about a journey using at least 6 prepositions of movement: 'I went to the station. I came from home. I walked through the park...'"
