grammar_point: object_pronouns
title: Object Pronouns
description: 'Pronouns that replace the object of a sentence: me, you, him, her, it,
  us, them.'
level: A1
meaning:
  core_meaning: Object pronouns receive the action of the verb. They come after the
    verb or preposition.
  timeline: Timeless — applies to all tenses.
  contrast: '''Subject pronoun'' = ''I see her.'' (I do the action) vs ''Object pronoun''
    = ''She sees me.'' (I receive the action)'
  ccqs:
  - question: Is the pronoun receiving the action?
    answer: Yes — it's an object pronoun.
  - question: Does it come after the verb?
    answer: Yes — object pronouns follow the verb.
  example_generator:
    contexts:
    - daily activities
    - interactions
    - requests
    - describing relationships
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Verb + object pronoun: ''She sees me.'', ''I like him.'''
    example_generator:
      contexts:
      - daily activities
      - interactions
      - requests
      min_examples: 4
  negative:
    structure: 'Verb + not + object pronoun or auxiliary + not: ''She doesn''t see
      me.'''
    example_generator:
      contexts:
      - daily activities
      - interactions
      - requests
      min_examples: 4
  questions:
    structure: 'Auxiliary + subject + verb + object pronoun?: ''Does she see me?'''
    example_generator:
      contexts:
      - daily activities
      - interactions
      - requests
      min_examples: 4
sub_rules:
- rule: '''You'' and ''it'' are the same for subject and object'
  type: grammatical
  examples:
  - I like you. / You like me.
  - I see it. It is here.
- rule: Object pronouns after prepositions
  type: grammatical
  examples:
  - Give it to me.
  - She's talking to him.
use:
- context: Daily interactions
  description: Using object pronouns in conversation
  examples:
  - Can you help me?
  - I don't know him.
  - She called us.
- context: After prepositions
  description: Object pronouns always follow prepositions
  examples:
  - This is for you.
  - Come with me.
phonetics:
- note: 'Weak forms: /hiːm/ → /ɪm/ (him), /hɜːr/ → /ər/ (her)'
  contexts:
  - connected speech
  l1_issue: Some L1 speakers use subject pronouns in object position
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Contrast subject vs object pronouns explicitly
  - Use physical actions to show who receives the action
  recommended_activities:
  - name: Object Pronoun Bingo
    duration: 10
    adaptation_notes: Students match sentences with correct object pronouns.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
