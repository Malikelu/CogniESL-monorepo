grammar_point: object_pronouns
title: Object Pronouns
description: 'Pronouns that replace the object of a sentence: me, you, him, her, it,
  us, them.'
level: A1
meaning:
  core_meaning: Object pronouns receive the action of the verb. They come after the
    verb or preposition.
  timeline: Timeless — applies to all tenses.
  contrast: '''Subject pronoun'' = ''I see her.'' (I do the action) vs ''Object pronoun''
    = ''She sees me.'' (I receive the action)'
  ccqs:
  - question: Does the pronoun receive the action in this sentence?
    answer: Yes — the object pronoun is the receiver of the action.
    purpose: Tests whether the learner can identify the object of a sentence and choose
      the correct object pronoun (me, you, him, her, it, us, them).
  - question: Does the pronoun come before or after the verb?
    answer: After the verb (or after a preposition).
    purpose: Tests whether the learner understands that object pronouns follow the
      verb or preposition, unlike subject pronouns which precede the verb.
  - question: Is this a subject or object position?
    answer: Object position — the pronoun receives the action.
    purpose: Tests whether the learner can distinguish subject position (before verb)
      from object position and choose the correct pronoun form.
  example_generator:
    contexts:
    - daily activities
    - interactions
    - requests
    - describing relationships
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Verb + object pronoun: ''She sees me.'', ''I like him.'''
    example_generator:
      contexts:
      - daily activities
      - interactions
      - requests
      min_examples: 4
  negative:
    structure: 'Verb + not + object pronoun or auxiliary + not: ''She doesn''t see
      me.'''
    example_generator:
      contexts:
      - daily activities
      - interactions
      - requests
      min_examples: 4
  questions:
    structure: 'Auxiliary + subject + verb + object pronoun?: ''Does she see me?'''
    example_generator:
      contexts:
      - daily activities
      - interactions
      - requests
      min_examples: 4
sub_rules:
- rule: '''You'' and ''it'' are the same for subject and object'
  type: grammatical
  examples:
  - I like you. / You like me.
  - I see it. It is here.
- rule: Object pronouns after prepositions
  type: grammatical
  examples:
  - Give it to me.
  - She's talking to him.
use:
- context: Daily interactions
  description: Using object pronouns in conversation
  examples:
  - Can you help me?
  - I don't know him.
  - She called us.
- context: After prepositions
  description: Object pronouns always follow prepositions
  examples:
  - This is for you.
  - Come with me.
phonetics:
- note: 'Weak forms: /hiːm/ → /ɪm/ (him), /hɜːr/ → /ər/ (her)'
  contexts:
  - connected speech
  l1_issue: Some L1 speakers use subject pronouns in object position
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Contrast subject vs object pronouns explicitly
  - Use physical actions to show who receives the action
  recommended_activities:
  - name: Object Pronoun Bingo
    duration: 10
    adaptation_notes: Students match sentences with correct object pronouns.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, 12.14-12.15'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 5: Nouns and Noun Phrases, 5.8 (pronouns)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 85-95 (pronouns:
    object forms, word order)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    11: Pronouns, 11.2-11.3'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 6: Object pronouns'
common_errors:
- error: 'Using subject pronouns as objects: *''I saw she.'''
  correction: I saw her.
  explanation: Use object pronouns (me, you, him, her, it, us, them) after verbs and
    prepositions.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Confusing ''I'' and ''me'': *''Me and John went.'''
  correction: John and I went.
  explanation: Use subject pronouns (I, you, he, she, we, they) as the subject of
    a sentence.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: Object pronouns are neutral in register.
- note: 'In formal writing, ''whom'' is used as an object pronoun: ''The candidate
    whom we interviewed was impressive.'''
- note: 'In conversation, ''who'' often replaces ''whom'': ''Who did you see?'' (informal)'
dialectal_variation:
- note: 'In informal speech, ''me'' is sometimes used as subject: ''Me and him went.''
    (non-standard)'
discourse_notes:
- note: 'In conversation, object pronouns avoid repetition: ''I saw John. I spoke
    to him.'''
- note: 'In academic writing, object pronouns create cohesion: ''The participants
    were interviewed. They were asked about their experiences.'''
- note: 'In informal speech, object pronouns are common in phrasal verbs: ''Pick it
    up.'' ''Throw them away.'''
