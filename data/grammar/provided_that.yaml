grammar_point: provided_that
title: Provided That (Formal Condition)
description: Formal conjunction meaning 'if' or 'on the condition that', used to set
  strict conditions. More formal than 'if'.
level: C1
meaning:
  core_meaning: Sets a formal, strict condition that must be met for the main action
    to happen. It implies that the condition is non-negotiable — if the condition
    is not met, the main action will not happen. More formal than 'if' and often used
    in contracts, agreements, and formal writing.
  timeline: Used in first conditional (future) and zero conditional (general truths).
    The tense of the main clause determines the time reference.
  contrast: '''Provided that'' = formal condition (''Provided that you pay, you can
    enter.'') vs ''If'' = neutral condition (''If you pay, you can enter.'') vs ''As
    long as'' = similar but slightly less formal.'
  ccqs:
  - question: Is this a strict condition or a general possibility?
    answer: A strict condition — 'provided that' implies the condition must be met.
  - question: Is this formal or informal?
    answer: Very formal — used in contracts, agreements, and formal writing. Not used
      in casual conversation.
  - question: Can we use 'that' after 'provided'?
    answer: Yes — 'that' is optional. 'Provided you pay' = 'Provided that you pay'.
      Both are correct.
  example_generator:
    contexts:
    - formal agreements
    - contracts and rules
    - conditions and requirements
    - professional communication
    cultural_notes:
    - Very common in legal and business English
    - Rarely used in casual conversation
    - The word 'that' is optional but adds formality
    min_examples: 5
form:
  affirmative:
    structure: Provided (that) + present simple, will + base verb (first conditional)
      / Present simple + provided (that) + present simple (zero conditional)
    example_generator:
    - Provided that you arrive on time, we will leave.
    - I will sign the contract provided that you read the terms.
    - Plants grow provided that you water them.
    min_examples: 4
  negative:
    structure: Provided (that) + don't/doesn't + present simple, will + base verb
    example_generator:
    - Provided that you don't mind, I will sit here.
    - We will go ahead provided that no one objects.
    - Provided that she isn't too busy, she will help.
    min_examples: 4
  questions:
    structure: Will + subject + base verb + provided (that) + present simple?
    example_generator:
    - Will you sign provided that I read the terms?
    - Will they agree provided that we meet their conditions?
    min_examples: 4
sub_rules:
- rule: '''That'' is optional after ''provided'' — both forms are correct'
  type: grammatical
  examples:
  - Provided that you pay, you can enter.
  - Provided you pay, you can enter.
- rule: Provided that for strict conditions (the condition MUST be met)
  type: semantic
  examples:
  - Provided that you follow the rules, you may stay.
  - I will attend provided that my schedule allows it.
  - The deal will go ahead provided that both parties agree.
- rule: Contrast with 'if' (neutral) and 'as long as' (slightly less formal)
  type: semantic
  examples:
  - If you pay, you can enter. (neutral)
  - Provided that you pay, you can enter. (formal, strict)
  - As long as you pay, you can enter. (slightly less formal)
- rule: Common in legal, business, and academic writing
  type: register
  examples:
  - Provided that the terms are met, the contract is valid.
  - Entry is free provided that you register in advance.
  - Provided that all requirements are met, the application will be approved.
use:
- context: Formal agreements and contracts
  description: Setting strict conditions in formal documents
  examples:
  - Provided that you follow the rules, you may stay.
  - I will sign provided that you read the terms.
  - The loan will be approved provided that you meet the requirements.
  - Provided that all conditions are met, the agreement is binding.
- context: Professional communication
  description: Setting conditions in workplace or professional contexts
  examples:
  - Provided that the project is completed on time, we will pay the bonus.
  - I will attend the meeting provided that my schedule allows it.
  - Provided that the budget is approved, we can start the project.
- context: General truths with conditions
  description: Describing general truths that depend on a condition
  examples:
  - Plants grow provided that you water them.
  - Provided that you study regularly, you will improve.
  - Provided that the weather is good, we will have a picnic.
phonetics:
- note: 'Stress falls on ''proVIDED'' (second syllable) and the key words in the condition:
    ''proVIDED that you PAY, you can ENTER.'''
  example_generator:
  - provided /prəˈvaɪdɪd/
  - that /ðət/ (weak)
  l1_issue: Portuguese speakers may stress the first syllable 'PROvided'. Teach correct
    stress on the second syllable.
- note: 'When ''that'' is omitted, the sentence flows more smoothly: ''Provided you
    pay'' /prəˈvaɪdɪd juː peɪ/.'
  example_generator:
  - provided /prəˈvaɪdɪd/
  - you /juː/ (weak)
  l1_issue: Many L1 speakers over-pronounce 'that' in 'provided that'. Teach the optional
    omission for natural speech.
teaching:
  methodology: Guided discovery with contract scenarios
  tips:
  - 'Use contract scenarios: ''Provided that you pay, you get the service.'' This
    shows the formal, conditional nature.'
  - 'Contrast with ''if'' and ''as long as'' for formality levels: if (neutral) <
    as long as (less formal) < provided that (very formal).'
  - 'Role-play: students set formal conditions using ''provided that'' in business
    or legal scenarios.'
  - Explain that 'that' is optional but adds formality. 'Provided that you pay' is
    more formal than 'Provided you pay'.
  recommended_activities:
  - name: Formal Conditions
    duration: 15
    adaptation_notes: 'Students write formal conditions using ''provided that'': ''Provided
      that you complete the course, you will receive a certificate.'' Practices formal
      conditional structures.'
  - name: If vs Provided That
    duration: 10
    adaptation_notes: 'Give students neutral sentences with ''if''. They rewrite them
      using ''provided that'': ''If you pay, you can enter.'' → ''Provided that you
      pay, you can enter.'''
  - name: Contract Role Play
    duration: 15
    adaptation_notes: 'Students role-play negotiating a contract. They set conditions
      using ''provided that'': ''Provided that you deliver on time, we will pay the
      full amount.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for provided_that.
  correction: Correct form.
  explanation: This is a common error for provided_that.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
