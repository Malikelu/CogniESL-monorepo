grammar_point: this_that_these_those
title: This / That / These / Those
description: Demonstrative determiners and pronouns used to point to specific people
  or things based on distance (near/far) and number (singular/plural). Essential for
  spatial and temporal reference.
level: A1
meaning:
  core_meaning: This/These = near the speaker (physically or psychologically). That/Those
    = far from speaker. Singular vs Plural based on count.
  timeline: 'Present-focused, but can refer to past (that) or future (this) in time:
    ''This morning'' (near past), ''That day'' (far past).'
  contrast: '''THIS/THESE'' = Near (here): "This phone" (in my hand), "These shoes"
    (on my feet)

    ''THAT/THOSE'' = Far (there): "That building" (over there), "Those stars" (in
    the sky)

    Time: ''THIS'' = current/recent, ''THAT'' = distant past/future

    '
  ccqs:
  - question: Do we use this or that for something near the speaker
    answer: This for near. That for far.
    purpose: Tests whether the learner understands the basic near/far distinction
      between "this" (near) and "that" (far). This is the foundational concept for
      all demonstrative reference in English.
  - question: Can we use a different structure here with the same meaning?
    answer: No — changing the structure would change the meaning or make the sentence
      ungrammatical.
    purpose: Tests whether the learner understands that this that these those is the
      only appropriate structure for this meaning/context.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      this that these those and explain why they are incorrect.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'This + singular (near): "this book" (here)

      That + singular (far): "that book" (there)

      These + plural (near): "these books" (here)

      Those + plural (far): "those books" (there)

      '
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
  negative:
    structure: 'This/That/These/Those + noun + isn''t/aren''t: "This isn''t mine."

      As pronouns: "That isn''t true." "Those aren''t ready."

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Is this/that...? Are these/those...?

      What is this/that? What are these/those?

      '
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
sub_rules:
- rule: This for singular near, that for singular far
  type: grammatical
  examples:
  - This book is mine (near)
  - That book is yours (far)
  - This is my car (near)
  - That is your car (far)
- rule: These for plural near, those for plural far
  type: grammatical
  examples:
  - These are my friends (near)
  - Those are your friends (far)
  - These apples are fresh (near)
  - Those apples are old (far)
- rule: This/that can also refer to ideas or situations (not just physical objects)
  type: grammatical
  examples:
  - This is a good idea
  - That was a great movie
  - I like this
  - I do not like that
use:
- name: Physical Distance (Near/Far)
  description: Point to objects based on physical distance from speaker.
  examples:
  - This cup (in hand)
  - That car (across street)
  - These apples (here)
  - Those mountains (far)
  key_point: 'Physical proximity determines choice: near = this/these, far = that/those.'
- name: Temporal Reference (Current/Distant)
  description: Refer to time periods as near or far.
  examples:
  - This week (current)
  - That year (long ago)
  - These days (now)
  - Those times (past)
  key_point: This/These = recent/current time; That/Those = distant past or future.
- name: Psychological Distance (Known/Unknown)
  description: Show involvement (this) or detachment (that).
  examples:
  - This idea of yours (familiar)
  - That problem over there (distant)
  key_point: This shows speaker involvement; that creates distance/detachment.
phonetics:
- note: 'This and that are usually unstressed: ''This is'' → /ðɪs ɪz/, ''That was''
    → /ðæt wəz/. They are stressed only when contrasting: ''THIS one, not THAT one.'''
  example_generator:
    contexts:
    - demonstrative stress
  l1_issue: Portuguese speakers may confuse 'this' and 'that' because Portuguese uses
    a three-way distance system. Teach the simple English two-way system.
teaching:
  methodology: PPP
  tips:
  - 'Use real objects at different distances: hold one (this), point far (that), show
    group near (these), point to far group (those).'
  - 'Practice with classroom: ''This desk'' (teacher''s), ''That desk'' (far corner),
    ''These students'' (near), ''Those students'' (far side).'
  - 'Teach time expressions early: this morning, that day, these days.'
  - 'Role-play phone calls: ''Who is that?'' (formal) vs ''Is that Maria?'' (informal
    checking).'
  recommended_activities:
  - name: Point and Say
    duration: 10
    adaptation_notes: 'Teacher points to objects near and far. Students say: ''This
      is a pen. That is a book. These are my keys. Those are your glasses.'''
  - name: Near or Far
    duration: 10
    adaptation_notes: 'Show pictures of objects at different distances. Students choose
      the correct demonstrative: near = this/these, far = that/those.'
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''this'' for plural: *''This books are mine.'''
  correction: These books are mine.
  explanation: Use 'this/that' for singular, 'these/those' for plural.
  l1_groups:
  - Portuguese
  - Spanish
- error: 'Using ''that'' for near objects: *''That is my pen.'' (near)'
  correction: This is my pen.
  explanation: Use 'this/these' for near, 'that/those' for far.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: Demonstratives are consistent across registers.
- note: In formal writing, 'the former/the latter' may replace 'this/that'.
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: 'Demonstratives create spatial reference: ''This book (near) is better than
    that one (far).'''
