grammar_point: attributive_position
title: Attributive Adjectives
description: Adjectives that are placed directly before the noun they modify, as opposed
  to predicative adjectives which come after a linking verb.
level: B1
meaning:
  core_meaning: Attributive adjectives are placed immediately before the noun they
    describe. This is the most common position for adjectives in English, unlike many
    other languages where adjectives typically follow the noun.
  timeline: Timeless - applies regardless of tense.
  contrast: 'Attributive (before noun): "The tall man is my uncle."

    Predicative (after verb): "The man is tall."

    Some adjectives ONLY work predicatively: "The child is awake" (NOT "the awake
    child")

    '
  ccqs:
  - question: Is the adjective before or after the noun?
    answer: Before - attributive adjectives go directly before the noun.
    purpose: Tests whether the learner understands that attributive adjectives go
      directly before the noun they modify. This is important because English strongly
      prefers pre-noun adjectives, unlike many other languages where adjectives typically
      follow the noun.
  - question: Can all adjectives go before a noun?
    answer: No - some adjectives (like asleep, afraid, alive, alone) can only go after
      a linking verb (predicative).
    purpose: Tests whether the learner knows that some adjectives (asleep, afraid,
      alive, alone) can only be used predicatively, not attributively. This is important
      because saying "the asleep child" is a common error for learners who do not
      know this restriction.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      attributive position and explain why they are incorrect.
  example_generator:
    contexts:
    - describing people
    - describing objects
    - everyday conversation
    - writing descriptions
    - shopping
    cultural_notes:
    - Many languages place adjectives after the noun (e.g.
    - French
    - Spanish
    - Arabic)
    - which makes attributive position challenging for learners
    - English is unusual in strongly preferring pre-noun adjectives
    min_examples: 5
form:
  affirmative:
    structure: 'Attributive adjective + noun. Example: a beautiful garden / the tall
      boy / an interesting book / my old car'
    example_generator:
      contexts:
      - describing people
      - describing places
      - describing objects
      - shopping
      min_examples: 4
  negative:
    structure: 'Negative sentences use the same attributive position. Example: She
      isn''t a tall woman. / It wasn''t an interesting film. / He''s not a good student.'
    example_generator:
      contexts:
      - negative descriptions
      - contradicting
      - correcting
      min_examples: 3
  questions:
    structure: 'Questions also use attributive position. Example: Is she a tall woman?
      / Was it an interesting film? / Are they good students?'
    example_generator:
      contexts:
      - asking for descriptions
      - confirming information
      - quizzes
      min_examples: 3
sub_rules:
- rule: Most adjectives can be both attributive and predicative
  type: grammatical
  examples:
  - a happy child / the child is happy
  - a large house / the house is large
  - an interesting book / the book is interesting
- rule: Some adjectives are only predicative (a-words)
  type: grammatical
  examples:
  - The child is asleep (NOT the asleep child)
  - She is afraid (NOT the afraid girl)
  - He is alive (NOT the alive man)
  - She is alone (NOT the alone woman)
- rule: Some adjectives change meaning by position
  type: semantic
  examples:
  - the present situation (current) / the people present (who are here)
  - the proper way (correct) / the town proper (the town itself)
  - a responsible person (reliable) / the person responsible (the one who did it)
- rule: Adjective + noun combinations that function as compound nouns
  type: grammatical
  examples:
  - a fast food restaurant
  - a high school teacher
  - a real estate agent
  - a hard hat area
- rule: Postpositive adjectives (after the noun) in fixed expressions
  type: grammatical
  examples:
  - the president elect
  - the people present
  - something interesting
  - nothing special
  - attorney general
use:
- name: Describing people and things
  description: The most common use of attributive adjectives in everyday speech and
    writing.
  examples:
  - She has beautiful eyes.
  - He drives an expensive car.
  - They live in a small flat.
  - I need a new phone.
  key_point: This is the default position for adjectives in English.
- name: Identifying and classifying
  description: Used to specify which person or thing is meant.
  examples:
  - I want the red one, not the blue one.
  - She's a medical student.
  - He's a professional footballer.
  - We need a different approach.
  key_point: Helps narrow down which specific item is being referred to.
- name: Fixed expressions and compound nouns
  description: Some adjective + noun combinations are fixed expressions.
  examples:
  - a heavy smoker
  - a hard worker
  - a good loser
  - a fast learner
  - a close friend
  key_point: These combinations often have idiomatic meanings.
phonetics:
- note: 'In attributive position, the adjective and noun form a single stress unit.
    Stress typically falls on the noun: a BEAU-ti-ful GAR-den, a TALL BOY.'
  example_generator:
    contexts:
    - natural conversation
    - descriptions
  l1_issue: Speakers of languages where adjectives follow the noun (e.g., Spanish,
    French, Arabic, Hindi) may naturally place adjectives after the noun in English.
teaching:
  methodology: Contrastive analysis with L1 awareness
  recommended_activities:
  - name: Attributive or predicative?
    duration: 15
    adaptation_notes: Give students adjectives and have them decide if they can go
      before the noun, after the verb, or both. Include a-words (asleep, afraid, alive).
  - name: Picture description race
    duration: 10
    adaptation_notes: 'Show pictures and students race to describe them using attributive
      adjectives: a tall man, a red car, a beautiful garden.'
  - name: Meaning change by position
    duration: 15
    adaptation_notes: Show how adjectives like present, proper, and responsible change
      meaning depending on position. Students create sentences for each meaning.
  tips:
  - Raise awareness that English strongly prefers pre-noun adjectives, unlike many
    other languages.
  - Teach the a-words (asleep, awake, afraid, alive, alone, aware) as a group that
    can only be predicative.
  - Highlight adjectives that change meaning by position (present, proper, responsible,
    involved).
  - Use translation exercises to help students see the difference between their L1
    and English.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 11:
    Relative Clauses, §11.1-11.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Placing adjectives after nouns: *''A car red.'''
  correction: A red car.
  explanation: In English, adjectives typically go before nouns.
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: Adjective position is consistent across registers.
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: 'Adjectives modify nouns to add detail: ''The tall man in the red coat.'''
