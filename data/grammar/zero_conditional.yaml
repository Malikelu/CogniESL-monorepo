grammar_point: zero_conditional
title: Zero Conditional (General Truths)
description: 'Conditional structure used to talk about general truths, scientific
  facts, and habits. Structure: if + present simple, present simple.'
level: A2
meaning:
  core_meaning: Describes things that are ALWAYS true — scientific facts, general
    truths, and habits. The result always happens when the condition is met. There
    is no uncertainty — it is a fact, not a possibility.
  timeline: No specific time. Refers to general, timeless facts or habits that are
    always true.
  contrast: '''Zero conditional'' = ''If you heat ice, it melts.'' (always true, general
    fact) vs ''First conditional'' = ''If you heat this ice, it will melt.'' (specific
    situation, future)'
  ccqs:
  - question: Is this always true, or is it about a specific situation?
    answer: Always true — it is a general fact or habit.
  - question: Do we use 'will' in this conditional?
    answer: No — both clauses use present simple. No 'will' in zero conditional.
  - question: Can this be a scientific fact?
    answer: Yes — zero conditional is perfect for scientific facts and natural laws.
  example_generator:
    contexts:
    - scientific facts
    - general truths
    - daily habits
    - instructions and rules
    cultural_notes:
    - Use universal facts that are true across cultures
    - Avoid culturally specific examples that may not be universal
    - Keep examples simple and concrete for A2 level
    min_examples: 5
form:
  affirmative:
    structure: If + present simple, present simple (both clauses use present simple
      — no 'will')
    example_generator:
    - If you heat ice, it melts.
    - If you drop something, it falls.
    - If I am tired, I drink coffee.
    min_examples: 4
  negative:
    structure: If + don't/doesn't + present simple, don't/doesn't + present simple
    example_generator:
    - If you don't water plants, they die.
    - If she doesn't study, she doesn't pass.
    - If it doesn't rain, the grass doesn't grow.
    min_examples: 4
  questions:
    structure: Do/Does + subject + verb if + present simple?
    example_generator:
    - Do you eat breakfast if you are hungry?
    - Does she take the bus if it rains?
    - Do plants die if you don't water them?
    min_examples: 4
sub_rules:
- rule: Both clauses use present simple — never use 'will' in zero conditional
  type: grammatical
  examples:
  - If you heat water, it boils. (NOT If you heat water, it will boil.)
  - If I am tired, I sleep. (NOT If I am tired, I will sleep.)
- rule: The 'if' clause can come first or second. When it comes first, use a comma.
  type: punctuation
  examples:
  - If you heat ice, it melts. (comma after if-clause)
  - It melts if you heat ice. (no comma when if-clause is second)
- rule: Zero conditional for scientific facts and natural laws
  type: semantic
  examples:
  - If you freeze water, it becomes ice.
  - If you mix red and blue, you get purple.
  - If you drop something, it falls.
- rule: Zero conditional for general habits
  type: semantic
  examples:
  - I drink coffee if I am tired.
  - She takes the bus if it rains.
  - They go for a walk if the weather is nice.
- rule: Zero conditional for instructions and rules
  type: semantic
  examples:
  - If the alarm rings, press the red button.
  - If you see a snake, don't touch it.
  - If the light is red, stop.
use:
- context: Scientific facts
  description: Stating scientific or natural facts that are always true
  examples:
  - If you drop something, it falls.
  - If you freeze water, it becomes ice.
  - If you heat ice, it melts.
  - If you mix yellow and blue, you get green.
- context: General habits
  description: Talking about habits that happen when a condition is met
  examples:
  - I drink coffee if I am tired.
  - She takes the bus if it rains.
  - They go for a walk if the weather is nice.
  - He listens to music if he is stressed.
- context: Instructions and rules
  description: Giving general instructions that apply in any situation
  examples:
  - If the alarm rings, press the red button.
  - If you see a snake, don't touch it.
  - If the light is red, stop.
  - If you feel sick, see a doctor.
phonetics:
- note: 'Weak form of ''if'' in connected speech: /ɪf/. ''If you heat it'' sounds
    like /ɪf juː hiːt ɪt/.'
  example_generator:
  - if /ɪf/
  - if you /ɪf juː/
  l1_issue: Portuguese speakers may pronounce 'if' as /ifi/ with an extra syllable.
    Teach the short form /ɪf/.
- note: 'Contractions in the present simple are natural: ''If you don''t...'' /ɪf
    juː dəʊnt/, ''If she doesn''t...'' /ɪf ʃiː dʌzənt/.'
  example_generator:
  - don't /dəʊnt/
  - doesn't /dʌzənt/
  l1_issue: Many L1 speakers struggle with 'doesn't' pronunciation /dʌzənt/. Drill
    explicitly.
teaching:
  methodology: Guided discovery with real-world examples
  tips:
  - 'Start with science facts: ''If you mix red and blue, you get purple.'' Students
    already know these facts — they just need to learn the English structure.'
  - 'Use daily habits: ''What do you do if you are tired?'' ''I drink coffee.'' This
    makes the grammar personal.'
  - 'Contrast with first conditional early: ''If you heat ice, it melts'' (always
    true) vs ''If you heat this ice, it will melt'' (specific situation).'
  - 'Emphasize: NO ''will'' in zero conditional. Both clauses are present simple.'
  - 'Use experiments: ''If I drop this pen, what happens?'' ''It falls!'' Makes the
    grammar physical and memorable.'
  recommended_activities:
  - name: Science Facts
    duration: 10
    adaptation_notes: 'Teacher says the condition. Students say the result: ''If you
      freeze water...'' → ''It becomes ice.'' ''If you drop something...'' → ''It
      falls.'' Practices the structure with known facts.'
  - name: What Do You Do If...?
    duration: 15
    adaptation_notes: 'Students ask each other about habits: ''What do you do if you
      are tired?'' ''I drink coffee.'' Then report: ''Pedro drinks coffee if he is
      tired.'' Practices zero conditional with personal habits.'
  - name: General Knowledge Quiz
    duration: 10
    adaptation_notes: 'Students complete zero conditional sentences: ''If you mix
      red and blue, you get ___.'' ''If you don''t water plants, they ___.'' Practices
      scientific facts.'
  - name: Instructions Game
    duration: 15
    adaptation_notes: 'Students give instructions for different situations: ''If the
      fire alarm rings, ___.'' ''If you feel sick, ___.'' Practices zero conditional
      for instructions.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
