grammar_point: continuous_perfect_infinitive
title: Continuous and Perfect Infinitive
description: 'Infinitive forms showing aspect: continuous (to be doing), perfect (to
  have done), perfect continuous (to have been doing).'
level: C1
meaning:
  core_meaning: Infinitives can show aspect. Continuous infinitive = ongoing action.
    Perfect infinitive = completed action. Perfect continuous = ongoing action completed
    before another point.
  timeline: Continuous = ongoing. Perfect = completed before reference point. Perfect
    continuous = ongoing and completed.
  contrast: Simple infinitive = I want to go. vs Continuous = I want to be going.
    (ongoing)
  ccqs:
  - question: Is the action ongoing or completed?
    answer: Ongoing = continuous, completed = perfect
    purpose: Tests whether the learner understands that '-ed' adjectives describe
      how someone feels (experiencer) while '-ing' adjectives describe what causes
      the feeling (stimulus).
  - question: Does the infinitive show aspect?
    answer: Yes — continuous or perfect infinitive.
    purpose: Tests whether the learner can distinguish between existential 'there'
      (indicating existence) and dummy 'it' (used for weather, time, distance). Confusing
      these is a very common beginner error.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      continuous perfect infinitive and explain why they are incorrect.
  example_generator:
    contexts:
    - after certain verbs
    - expressing regret
    - reporting
    - formal writing
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Continuous: to be + -ing: I want to be studying. / Perfect: to have
      + past participle: I want to have finished.'
    example_generator:
      contexts:
      - after certain verbs
      - expressing regret
      - reporting
      min_examples: 4
  negative:
    structure: 'Not + infinitive: I want not to be studying.'
    example_generator:
      contexts:
      - after certain verbs
      - expressing regret
      - reporting
      min_examples: 4
  questions:
    structure: Not typically used in questions.
    example_generator:
      contexts:
      - after certain verbs
      - expressing regret
      - reporting
      min_examples: 4
sub_rules:
- rule: Continuous infinitive — ongoing action
  type: grammatical
  examples:
  - She seems to be working hard.
  - I want to be traveling the world.
- rule: Perfect infinitive — completed action
  type: grammatical
  examples:
  - I am glad to have met you.
  - She claims to have seen a UFO.
- rule: Perfect continuous — ongoing and completed
  type: grammatical
  examples:
  - He seems to have been waiting for hours.
  - I would like to have been working on that project.
use:
- context: Expressing regret
  description: Using perfect infinitive for things you wish had happened
  examples:
  - I would like to have studied harder.
  - She regrets not to have traveled more.
- context: Reporting
  description: Using infinitives in reported speech
  examples:
  - He claimed to have seen the accident.
  - She seems to be working on something important.
phonetics:
- note: Weak form of to /tuː/ → /tə/
  example_generator:
    contexts:
    - connected speech
  l1_issue: Very advanced structure — most L1 speakers will not use this.
teaching:
  methodology: Guided discovery
  tips:
  - Start with simple infinitives, then add aspect
  - Use real examples from news and literature
  recommended_activities:
  - name: Infinitive Transformation
    duration: 10
    adaptation_notes: Students transform simple infinitives into continuous/perfect
      forms.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 17:
    Complementation, §17.1-17.4'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*He seems to works very hard.*'
  correction: He seems to work very hard.
  explanation: After infinitive 'to', always use the base form of the verb (without
    -s). Adding third-person -s to an infinitive verb is a common agreement error.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
  - Arabic
- error: '*I would like to have been travel the world.*'
  correction: I would like to have travelled the world.
  explanation: After 'to have', use the past participle (not base verb). Perfect infinitive
    = to have + past participle. Using the base form shows incomplete acquisition
    of the perfect infinitive structure.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Chinese
- error: '*She is said being the best doctor.*'
  correction: She is said to be the best doctor.
  explanation: After passive reporting verbs, use 'to + infinitive', not '-ing'. The
    structure is 'be said to be' or 'be said to do'. Learners who overgeneralize progressive
    forms might use '-ing' here.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Chinese
- error: '*He seems to has finished the project.*'
  correction: He seems to have finished the project.
  explanation: After infinitive 'to', use the base form 'have' (not 'has'). Third-person
    singular -s is never added to infinitive verbs.
  l1_groups:
  - Portuguese
  - Spanish
  - Arabic
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
