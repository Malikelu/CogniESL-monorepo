grammar_point: continuous_perfect_infinitive
title: "Continuous and Perfect Infinitive"
description: "Infinitive forms showing aspect: continuous (to be doing), perfect (to have done), perfect continuous (to have been doing)."
level: C1

meaning:
  core_meaning: "Infinitives can show aspect. Continuous infinitive = ongoing action. Perfect infinitive = completed action. Perfect continuous = ongoing action completed before another point."
  timeline: "Continuous = ongoing. Perfect = completed before reference point. Perfect continuous = ongoing and completed."
  contrast: "Simple infinitive = I want to go. vs Continuous = I want to be going. (ongoing)"
  ccqs:
    - question: Is the action ongoing or completed?
      answer: Ongoing = continuous, completed = perfect
    - question: Does the infinitive show aspect?
      answer: Yes — continuous or perfect infinitive.
  example_generator:
    contexts:
      - after certain verbs
      - expressing regret
      - reporting
      - formal writing
    cultural_notes: []
    min_examples: 5

form:
  affirmative:
    structure: "Continuous: to be + -ing: I want to be studying. / Perfect: to have + past participle: I want to have finished."
    example_generator:
      contexts:
        - after certain verbs
        - expressing regret
        - reporting
      min_examples: 4
  negative:
    structure: "Not + infinitive: I want not to be studying."
    example_generator:
      contexts:
        - after certain verbs
        - expressing regret
        - reporting
      min_examples: 4
  questions:
    structure: "Not typically used in questions."
    example_generator:
      contexts:
        - after certain verbs
        - expressing regret
        - reporting
      min_examples: 4

sub_rules:
  - rule: Continuous infinitive — ongoing action
    type: grammatical
    examples:
      - She seems to be working hard.
      - I want to be traveling the world.
  - rule: Perfect infinitive — completed action
    type: grammatical
    examples:
      - I am glad to have met you.
      - She claims to have seen a UFO.
  - rule: Perfect continuous — ongoing and completed
    type: grammatical
    examples:
      - He seems to have been waiting for hours.
      - I would like to have been working on that project.

use:
  - context: Expressing regret
    description: Using perfect infinitive for things you wish had happened
    examples:
      - I would like to have studied harder.
      - She regrets not to have traveled more.
  - context: Reporting
    description: Using infinitives in reported speech
    examples:
      - He claimed to have seen the accident.
      - She seems to be working on something important.

phonetics:
  - note: Weak form of to /tuː/ → /tə/
    example_generator:
      contexts:
        - connected speech
    l1_issue: Very advanced structure — most L1 speakers will not use this.

teaching:
  methodology: Guided discovery
  tips:
    - Start with simple infinitives, then add aspect
    - Use real examples from news and literature
  recommended_activities:
    - name: Infinitive Transformation
      duration: 10
      adaptation_notes: Students transform simple infinitives into continuous/perfect forms.