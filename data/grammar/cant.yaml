grammar_point: cant
title: Can't (inability, impossibility)
description: Modal verb used to express inability (present/past) or that something
  is impossible.
level: A2
meaning:
  core_meaning: Expresses present inability (can't) or past inability (couldn't);
    also used for impossibility (it can't be true).
  timeline: Present inability (can't), past inability (couldn't), present impossibility
    (can't be).
  contrast: 'Can''t = Present inability: "I can''t drive" (now)

    Couldn''t = Past inability: "I couldn''t drive last year" (past)

    Can''t be = Impossibility: "It can''t be raining" (impossible)

    '
  ccqs:
  - question: I can't drive. Is this about now or the past?
    answer: Now. 'Can't' is present inability.
  - question: It can't be 10 PM already! Does the speaker think it is possible?
    answer: No. The speaker believes it is impossible or very surprising.
  - question: She couldn't come yesterday. Was she able to come?
    answer: No. 'Couldn't' means she was not able to come in the past.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: N/A (can't is negative; affirmative is 'can')
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: Subject + can't (cannot) + base verb
    example_generator:
      contexts:
      - sports and hobbies
      min_examples: 4
  questions:
    structure: Can't + subject + base verb? (negative question, meaning 'is it impossible?')
    example_generator:
      contexts:
      - entertainment and media
      - social interactions
      min_examples: 4
sub_rules:
- rule: Can't expresses that someone does not have the ability to do something now
  type: grammatical
  examples:
  - I can't speak Japanese
  - She can't drive
  - They can't come today
- rule: For past inability, use couldn't (the past form of can't)
  type: grammatical
  examples:
  - I couldn't sleep last night
  - She couldn't come yesterday
  - They couldn't find the address
- rule: Can't expresses that something is logically impossible or the speaker believes
    it is not true
  type: semantic
  examples:
  - That can't be right — I checked twice
  - It can't be 10 PM already
  - She can't be 40 — she looks 25
- rule: Can't means inability or impossibility. Mustn't means prohibition. They are
    completely different
  type: semantic
  examples:
  - You can't park here (it is not possible)
  - You mustn't park here (it is forbidden)
  - I can't eat nuts (I am allergic)
- rule: In informal English, can't is sometimes used to mean not allowed to, especially
    with children
  type: register
  examples:
  - You can't eat sweets before dinner
  - You can't stay up late on school nights
  - You can't use your phone at the table
use:
- name: Present Inability
  description: Talk about things you don't know how to do or can't do now.
  examples:
  - I can't fix the computer.
  - He can't lift 50kg.
  key_point: Inability is current.
- name: Past Inability
  description: Talk about things you couldn't do in the past.
  examples:
  - I couldn't run fast as a kid.
  - She couldn't come yesterday.
  key_point: Past uses 'couldn't'.
- name: Impossibility
  description: State that something is impossible or not true.
  examples:
  - It can't be 10 PM already! (surprise)
  - That can't be her; she's in London.
  key_point: Based on logical impossibility.
phonetics:
- note: The key difference between can and can't in speech is the vowel. Can is reduced
    to /kən/ (schwa), while can't has a full vowel /kɑːnt/ (British) or /kænt/ (American).
  example_generator:
    contexts:
    - can vs can't distinction
  l1_issue: Learners often struggle to hear the difference, especially in fast speech.
    Spanish and Japanese speakers may not distinguish the vowel quality clearly.
- note: Couldn't is pronounced /ˈkʊdənt/. The first syllable has a short /ʊ/ vowel,
    and the second syllable is reduced to a schwa. The l in couldn't is silent.
  example_generator:
    contexts:
    - couldn't pronunciation
  l1_issue: Learners may pronounce the l in couldn't — it is silent. Arabic speakers
    may struggle with the /d/ to /n/ transition.
teaching:
  methodology: PPP
  tips:
  - 'Contrast with ''can'' for ability vs inability: ''I can swim'' vs ''I can''t
    swim''.'
  - 'Practice with past time markers: ''yesterday'', ''last year'' and use ''couldn''t''.'
  - 'Role-play: Student expresses inability to do a task using ''can''t''.'
  - 'Use surprise scenarios for impossibility: ''It can''t be Monday already!'''
  recommended_activities:
  - name: I Can't Yet
    duration: 15
    adaptation_notes: 'Students make a list of things they can''t do but want to learn.
      They share with a partner: ''I can''t cook Thai food, but I want to learn.''
      Add ''yet'' for a growth mindset focus.'
  - name: Mystery Object
    duration: 10
    adaptation_notes: 'Show a strange object. Students guess what it is using ''It
      can''t be a...'' and ''It might be a...'': ''It can''t be a kitchen tool — it
      is too small.'''
  - name: Then and Now
    duration: 15
    adaptation_notes: 'Students compare what they couldn''t do in the past with what
      they can do now: ''I couldn''t read English when I was six, but I can read it
      now.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
