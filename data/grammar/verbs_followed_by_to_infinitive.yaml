grammar_point: verbs_followed_by_to_infinitive
title: Verbs Followed by To-Infinitive (want, decide, hope)
description: Verbs that must be followed by 'to + verb' (infinitive). Essential for
  accurate verb patterns.
level: A2
meaning:
  core_meaning: These verbs require 'to + verb' as their complement. Expresses intention,
    decision, or future-related action.
  timeline: The 'to' infinitive often refers to future actions from the perspective
    of the main verb.
  contrast: '''Want + to'' (correct) vs ''want + -ing'' (wrong)

    ''Decide + to'' (correct) vs ''decide + -ing'' (wrong)

    These are MEMORIZED patterns - no logic rule

    '
  ccqs:
  - question: Which verbs are followed by to infinitive
    answer: Want, need, decide, plan, hope, agree, refuse, promise, offer.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Verb + to + base verb: "I want to go."

      Verb + object + to + base verb: "I told him to go."

      Common verbs: want, need, decide, hope, plan, expect, promise, agree, offer,
      refuse

      '
    example_generator:
      contexts:
      - education and school
      - travel and places
      min_examples: 4
  negative:
    structure: 'Verb + not + to + base verb: ''I told him not to go.'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: Question word + auxiliary + subject + verb + to + base verb?
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Want, need, decide, plan, hope, agree, refuse, promise, offer followed by
    to infinitive
  type: grammatical
  examples:
  - I want to study
  - She needs to work
  - He decided to leave
  - They plan to travel
  - We hope to see you
- rule: Would like, would love, would hate, would prefer followed by to infinitive
  type: grammatical
  examples:
  - I would like to go
  - She would love to visit
  - He would hate to miss it
  - They would prefer to stay
- rule: Learn, teach, manage, afford, seem, appear followed by to infinitive
  type: grammatical
  examples:
  - I learned to swim when I was 5
  - She taught me to cook
  - He managed to finish on time
  - They cannot afford to buy a house
use:
- name: Wants/Needs (want, need, would like)
  description: Verbs about desires and necessities.
  examples:
  - I want to sleep.
  - She needs to go.
  - I'd like to help.
  key_point: Most common group - everyday communication.
- name: Decisions/Plans (decide, plan, hope, expect)
  description: Verbs about future intentions.
  examples:
  - I decided to go.
  - We plan to visit.
  - He expects to win.
  key_point: These all look toward future actions.
- name: Communication/Orders (tell, ask, invite, remind)
  description: Verbs that tell others what to do.
  examples:
  - I told him to wait.
  - She asked me to help.
  - They invited us to come.
  key_point: 'These take object + to + verb: ''tell SOMEONE to do''.'
phonetics:
- note: 'The to in to infinitives is usually reduced to /tə/ in connected speech:
    ''I want to go'' → /aɪ wɒnt tə ɡəʊ/. The to is never pronounced as /tuː/ in connected
    speech.'
  example_generator:
    contexts:
    - to infinitive reduction
  l1_issue: Learners may over-pronounce 'to' as /tuː/ before infinitives. Teach the
    reduced form /tə/ for natural speech.
teaching:
  methodology: PPP
  tips:
  - 'Use ''to'' as arrow pointing to future: ''want → to go''.'
  - 'Group: ''want, need, decide, plan'' as ''future intention'' group.'
  - Practice 'tell/ask someone to...' with classroom commands.
  recommended_activities:
  - name: Verb Sorting
    duration: 10
    adaptation_notes: 'Students sort verbs into groups: to infinitive only, ing only,
      and both.'
  - name: Future Plans
    duration: 15
    adaptation_notes: 'Students describe their future plans using want, plan, hope,
      decide: ''I want to travel to Japan. I plan to save money.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
