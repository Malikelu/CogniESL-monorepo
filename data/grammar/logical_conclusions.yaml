grammar_point: logical_conclusions
title: Logical Conclusions (Should)
description: Use of 'should' to express what is logical, expected, or probable based
  on available information or common sense.
level: C1
meaning:
  core_meaning: '''Should'' can express a logical conclusion or expectation about
    a present or past situation. It means ''I expect this is true'' or ''This is the
    logical/reasonable thing to happen''. It is weaker than ''must'' (which expresses
    near certainty) but stronger than ''might'' (which expresses possibility).'
  timeline: 'Present: ''should'' + base verb (logical conclusion about now). Past:
    ''should have'' + past participle (logical conclusion about the past).'
  contrast: 'Must: "She must be at home." (I am almost certain — I can see her car.)

    Should: "She should be at home." (It is logical/expected, but I am not certain.)

    Might: "She might be at home." (It is possible, but I have no strong reason to
    think so.)

    '
  ccqs:
  - question: Is the speaker almost certain or just expecting something?
    answer: Expecting — 'should' expresses a logical expectation, not near certainty.
  - question: Is the speaker basing this on evidence or common sense?
    answer: Yes — 'should' implies the conclusion is based on what is reasonable or
      expected.
  example_generator:
    contexts:
    - making predictions
    - expressing expectations
    - giving advice based on logic
    - speculating about situations
    - academic reasoning
    cultural_notes:
    - In British English, 'should' for logical conclusions is very common and natural
    - In American English, 'ought to' or 'would' may be preferred in some of these
      contexts
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + should + base verb (present conclusion): ''She should be
      there by now.'' / Subject + should + have + past participle (past conclusion):
      ''They should have arrived by now.'''
    example_generator:
      contexts:
      - predicting arrival
      - expecting results
      - logical expectations
      min_examples: 4
  negative:
    structure: 'Subject + should not + base verb: ''It should not take long.'' / Subject
      + should not + have + past participle: ''They should not have had any problems.'''
    example_generator:
      contexts:
      - expecting something will not happen
      - negative expectations
      min_examples: 4
  questions:
    structure: 'Should + subject + base verb?: ''Should the package have arrived by
      now?'' / Wh- + should + subject + base verb?: ''Why should he be surprised?'''
    example_generator:
      contexts:
      - checking expectations
      - expressing surprise
      - rhetorical questions
      min_examples: 3
sub_rules:
- rule: Present logical conclusion — 'should' + base verb
  type: semantic
  examples:
  - The train should arrive at 6pm. (according to the timetable)
  - She should know the answer — she studied hard. (it is logical)
  - They should be tired after such a long journey. (I expect this)
- rule: Past logical conclusion — 'should have' + past participle
  type: semantic
  examples:
  - They should have arrived by now. (I expected them earlier)
  - The letter should have been delivered yesterday. (it was sent in time)
  - He should have finished the report. (he had enough time)
- rule: Contrast with 'must' for logical conclusions
  type: semantic
  examples:
  - 'Must: She must be tired. (I am almost certain — strong evidence)'
  - 'Should: She should be tired. (it is logical, but I am not certain)'
- rule: Contrast with 'might' for logical conclusions
  type: semantic
  examples:
  - 'Might: She might be tired. (it is possible, no strong expectation)'
  - 'Should: She should be tired. (I have a reason to expect this)'
- rule: '''Should'' for expectations about the future'
  type: semantic
  examples:
  - The weather should improve by the weekend.
  - The new policy should reduce unemployment.
  - This medicine should help with the pain.
use:
- name: Making predictions based on evidence or logic
  description: Used to predict what is likely to be true based on available information.
  examples:
  - The traffic should be lighter after 7pm.
  - She should pass the exam — she has studied very hard.
  - The package should arrive tomorrow — it was sent on Monday.
  key_point: The speaker has a reason for the expectation.
- name: Expressing what is expected or supposed to happen
  description: Used to say what is supposed to happen according to a plan, schedule,
    or norm.
  examples:
  - The meeting should start at 9am.
  - Students should complete the assignment by Friday.
  - The new law should come into effect next year.
  key_point: Expresses what is expected according to a plan or rule.
- name: Giving advice based on what is logical
  description: Used to suggest what would be the sensible or logical thing to do.
  examples:
  - You should see a doctor if the pain continues.
  - We should leave early to avoid traffic.
  - They should invest in renewable energy.
  key_point: The advice is based on logic, not just opinion.
- name: Expressing surprise when expectations are not met
  description: Used to express that something was expected but did not happen.
  examples:
  - The package should have arrived by now. Where is it?
  - He should have known better — he is an expert.
  - The instructions should have been clearer.
  key_point: Often implies mild criticism or disappointment.
phonetics:
- note: '''Should'' is typically unstressed in logical conclusion use: /ʃəd/ or /ʃd/.
    ''Should have'' is often reduced to /ʃədəv/ or /ʃədə/: ''She should have gone''
    → /ʃiː ʃədəv ɡɒn/.'
  example_generator:
    contexts:
    - natural conversation
    - speculation
  l1_issue: Learners may confuse 'should' for advice ('You should study') with 'should'
    for logical conclusions ('She should be there'). Context distinguishes them.
teaching:
  methodology: Guided discovery with contextualised scenarios
  tips:
  - 'Use a certainty scale: must (95%) > should (70-80%) > might (30-50%) to show
    the difference.'
  - 'Provide scenarios and have students choose the appropriate modal: ''The train
    left an hour ago. It ___ be there by now.'' (should)'
  - Contrast 'should' for advice vs. 'should' for logical conclusions explicitly.
  - Use timetables, schedules, and logical scenarios to practise expectations.
  recommended_activities:
  - name: Certainty scale placement
    duration: 10
    adaptation_notes: Give students sentences and have them place them on a certainty
      scale (must/should/might). Discuss the degree of certainty.
  - name: Scenario-based conclusions
    duration: 15
    adaptation_notes: 'Provide scenarios: ''The letter was posted on Monday. Today
      is Wednesday.'' Students make logical conclusions: ''It should have arrived
      by now.'''
  - name: Advice vs. conclusion sorting
    duration: 10
    adaptation_notes: Give students sentences with 'should' and have them classify
      as advice or logical conclusion.
  - name: Expectation role-play
    duration: 15
    adaptation_notes: 'Students discuss plans and make predictions: ''The meeting
      starts at 2. It''s 1:30. We should be fine.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
