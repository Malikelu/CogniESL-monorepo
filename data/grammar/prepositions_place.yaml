grammar_point: prepositions_place
title: Prepositions of Place (At, In, On)
description: 'Prepositions used to talk about where something is: at (specific point),
  in (enclosed space), on (surface).'
level: A1
meaning:
  core_meaning: Prepositions of place tell us WHERE something is located. Each preposition
    describes a different spatial relationship.
  timeline: Timeless — describes location, not time.
  contrast: '''At'' = specific point (at the door) vs ''In'' = enclosed space (in
    the box) vs ''On'' = surface (on the table)'
  ccqs:
  - question: Is it a specific point or address?
    answer: Use 'at' (at the bus stop)
  - question: Is it inside an enclosed space?
    answer: Use 'in' (in the room)
  - question: Is it on a surface?
    answer: Use 'on' (on the wall)
  example_generator:
    contexts:
    - giving directions
    - describing locations
    - talking about where things are
    - addresses
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'at + specific point: ''at the door'', ''at the bus stop'' / in + enclosed
      space: ''in the room'', ''in London'' / on + surface: ''on the table'', ''on
      the wall'''
    example_generator:
      contexts:
      - giving directions
      - describing locations
      - talking about where things are
      min_examples: 4
  negative:
    structure: 'Same preposition, negated verb: ''The book isn''t on the table.'''
    example_generator:
      contexts:
      - giving directions
      - describing locations
      - talking about where things are
      min_examples: 4
  questions:
    structure: 'Where + be?: ''Where is the cat?'' → ''On the table.'''
    example_generator:
      contexts:
      - giving directions
      - describing locations
      - talking about where things are
      min_examples: 4
sub_rules:
- rule: 'at: at the door, at home, at school, at work, at the bus stop'
  type: grammatical
  examples:
  - I'm at home.
  - Wait at the traffic lights.
- rule: 'in: in the box, in the room, in London, in the park, in the car'
  type: grammatical
  examples:
  - The keys are in my pocket.
  - I live in Brazil.
- rule: 'on: on the table, on the wall, on the floor, on the bus, on Main Street'
  type: grammatical
  examples:
  - The book is on the desk.
  - I'm on the bus.
use:
- context: Giving directions
  description: Telling someone where to go or where something is
  examples:
  - Turn left at the bank.
  - The pharmacy is on Main Street.
- context: Describing locations
  description: Talking about where things are
  examples:
  - My phone is in my bag.
  - There's a picture on the wall.
phonetics:
- note: 'Weak forms: /æt/ → /ət/, /ɪn/ → /ən/, /ɒn/ → /ən/'
  contexts:
  - connected speech
  l1_issue: Some L1 speakers use 'in' for all locations
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use real objects to demonstrate spatial relationships
  - Draw diagrams to show at/in/on
  recommended_activities:
  - name: Where Is It?
    duration: 10
    adaptation_notes: Hide objects and describe their location using prepositions.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
