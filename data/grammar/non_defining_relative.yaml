grammar_point: non_defining_relative
title: Non-Defining Relative Clauses (who/which/where with commas)
description: Adds extra, non-essential information about a noun. The sentence still
  makes sense without the clause. Set off with commas.
level: B1
meaning:
  core_meaning: Gives extra information that is NOT essential to identify the noun.
    The sentence works without it.
  timeline: Same time reference as the main clause. No special tense rules inside
    the relative clause.
  contrast: 'Defining (no commas): "The woman who called you is my boss." (Which woman?
    The one who called.)

    Non-defining (commas): "My mother, who is 65, lives in Lisbon." (We already know
    who — extra info only.)

    '
  ccqs:
  - question: Can we remove a non-defining clause and the sentence still makes sense
    answer: Yes. That is how you know it is non-defining.
  - question: Can we use that in non-defining clauses
    answer: No. Only who or which.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Noun + COMMA + who/which/where + clause + COMMA (or end of sentence).

      Who = people. Which = things/animals. Where = places.

      '
    example_generator:
      contexts:
      - family and relationships
      min_examples: 4
  negative:
    structure: 'Negative inside the relative clause uses standard negation: ''who
      doesn''t...'', ''which isn''t...'''
    example_generator:
      contexts:
      - family and relationships
      - travel and places
      - weather and nature
      min_examples: 4
  questions:
    structure: Questions normally come in the main clause, not the relative clause.
    example_generator:
      contexts:
      - family and relationships
      - travel and places
      min_examples: 4
sub_rules:
- rule: Non-defining relative clauses add extra (non-essential) information about
    a noun. They are set off by commas
  type: punctuation
  examples:
  - My sister, who lives in Paris, is visiting (extra info — I have one sister)
  - The Eiffel Tower, which is in France, is famous (extra info)
  - London, where I was born, is a great city (extra info)
- rule: Only who (people) and which (things) can be used in non-defining clauses —
    never that
  type: grammatical
  examples:
  - My sister, who lives in Paris... (NOT that)
  - The book, which I bought yesterday... (NOT that)
  - The car, which was parked outside... (NOT that)
- rule: The relative pronoun cannot be omitted in non-defining clauses
  type: grammatical
  examples:
  - My sister, who lives in Paris... (NOT My sister, lives in Paris...)
  - The book, which I read... (NOT The book, I read...)
use:
- name: Adding Extra Details About People
  description: Gives additional, non-essential information about a specific person.
  examples:
  - My father, who is a doctor, lives in Madrid.
  - Maria, who I met at university, just got promoted.
  key_point: Use 'who' for people. Always use commas.
- name: Adding Extra Details About Things
  description: Gives additional, non-essential information about a specific thing.
  examples:
  - My new phone, which cost $800, has a great camera.
  - The Mona Lisa, which hangs in the Louvre, is very famous.
  key_point: Use 'which' for things (NOT 'that' in non-defining clauses).
- name: Adding Extra Details About Places
  description: Gives additional, non-essential information about a specific place.
  examples:
  - Barcelona, which is in Spain, has beautiful architecture.
  - I grew up in Liverpool, where the Beatles started.
  key_point: Use 'where' for places.
phonetics:
- note: 'The commas in non-defining clauses create pauses in speech: ''My sister,
    / pause / who lives in Paris, / pause / is visiting.'' These pauses are essential
    for clarity.'
  example_generator:
    contexts:
    - relative clause pauses
  l1_issue: Many L1 speakers do not pause for commas in relative clauses. Teach the
    pause to improve clarity.
teaching:
  methodology: PPP
  tips:
  - Practice by giving students a noun and asking them to add a 'useful detail' commas
    included.
  - 'Contrast side-by-side: defining vs non-defining to show how commas change meaning.'
  - 'Remind: no ''that'' with commas. Ever.'
  recommended_activities:
  - name: Defining or Non-Defining
    duration: 10
    adaptation_notes: Students identify whether clauses are defining (essential, no
      commas) or non-defining (extra info, commas).
  - name: Add Extra Information
    duration: 15
    adaptation_notes: 'Students add non-defining relative clauses to simple sentences:
      ''I visited Paris.'' → ''I visited Paris, which is the capital of France.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
