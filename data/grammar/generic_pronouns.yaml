grammar_point: generic_pronouns
title: Generic Pronouns (you, one, they)
description: 'Pronouns used to refer to people in general (not specific individuals)
  for advice, proverbs, or unspecified sources: generic you (informal), generic one
  (formal), generic they (neutral).'
level: B1
meaning:
  core_meaning: Refer to people in general (all people, or an unspecified group) without
    naming specific individuals. Not tied to the listener (you) or speaker (I).
  timeline: N/A (Generic pronouns are not tense-based; they describe general truths.)
  contrast: 'Generic you = Informal general reference (not the listener specifically)


    Generic one = Formal general reference (rare in spoken English)


    Generic they = Neutral, refers to an unspecified group/source


    Specific you = Refers to the listener directly

    '
  ccqs:
  - question: If I say 'You should drink more water,' am I talking to you specifically
      or to people in general?
    answer: It could be either — context tells us. Generic 'you' means people in general.
  - question: In 'They say it will rain tomorrow,' who are 'they'?
    answer: An unspecified group — maybe the weather forecast, maybe people in general.
      Not specific people.
  - question: Is 'One should always be polite' formal or informal?
    answer: It is formal. In everyday speech, we would say 'You should always be polite.'
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Generic you + verb: You can''t judge a book by its cover.


      Generic one + verb: One should always arrive on time.


      Generic they + verb: They say exams are difficult.

      '
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: 'Generic pronouns follow negative verbs: You don''t get something for
      nothing. One shouldn''t be rude.'
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Generic pronouns follow auxiliary verbs in questions: Do you think
      it''s going to rain? Should one apologise?'
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Generic pronouns (one, you, we, they) refer to people in general, not specific
    individuals
  type: semantic
  examples:
  - One should always be polite (formal, general)
  - You never know what might happen (informal, general)
  - We all make mistakes (inclusive, general)
  - They say it is going to rain (vague source)
- rule: One is formal and used in academic and professional writing. You is informal
    and common in speech
  type: register
  examples:
  - One must consider all options (formal)
  - You should always be honest (informal)
- rule: They can refer to an unspecified group of people or a vague authority
  type: semantic
  examples:
  - They say smoking is bad for you (vague authority)
  - They have discovered a new planet (unspecified scientists)
  - They are building a new road (unspecified builders)
use:
- name: General Advice/Proverbs
  description: Give advice or state general truths for all people.
  examples:
  - You reap what you sow.
  - One should save money for emergencies.
  key_point: No specific person is being addressed.
- name: Unspecified Sources
  description: Refer to rumours, news, or common beliefs without naming the source.
  examples:
  - They say the company is closing.
  - They report a storm is coming.
  key_point: They here refers to an unknown group, not specific people.
phonetics:
- note: 'Generic you is often reduced in connected speech: ''You should'' → /jə ʃʊd/,
    ''You never'' → /jə ˈnevə/. The pronoun reduces to /jə/ in unstressed positions.'
  example_generator:
    contexts:
    - generic you reduction
  l1_issue: Learners may over-pronounce generic you as /juː/ in all contexts, sounding
    unnatural.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Use common proverbs with generic you (You can''t teach an old dog new
    tricks).'
  - 'Week 2: Contrast generic vs specific you in roleplays (general advice vs direct
    instruction).'
  - 'Week 3: Introduce generic one for formal writing, generic they for news reports.'
  recommended_activities:
  - name: Formal or Informal
    duration: 10
    adaptation_notes: 'Students rewrite sentences changing the generic pronoun: ''One
      should exercise'' → ''You should exercise'' → ''We should exercise.'''
  - name: General Statements
    duration: 15
    adaptation_notes: Students write general advice using different generic pronouns.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
