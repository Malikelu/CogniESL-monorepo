grammar_point: first_conditional
title: First Conditional (Real Future)
description: 'Structure used to talk about real, possible future situations and their
  consequences: If + present simple, will + base verb.'
level: B1
meaning:
  core_meaning: Expresses real, possible future situations and their likely results.
    The condition is possible — it might happen. The main clause shows what will happen
    IF the condition is met.
  timeline: Future time frame. The if-clause uses present simple (not future), and
    the main clause uses will + base verb.
  contrast: '''First Conditional'' = ''If I study, I will pass.'' (real, possible
    future) vs ''Second Conditional'' = ''If I studied, I would pass.'' (hypothetical,
    unlikely)'
  ccqs:
  - question: Is this situation possible in the future, or is it hypothetical?
    answer: Possible — first conditional is for real, possible future situations.
  - question: Do we use 'will' in the if-clause?
    answer: No — the if-clause always uses present simple. Never 'will' in the if-clause.
  - question: Is this a promise, warning, or general truth?
    answer: It could be a promise or encouragement. General truths use zero conditional.
  example_generator:
    contexts:
    - future plans and predictions
    - promises and warnings
    - instructions
    - consequences
    cultural_notes:
    - Use diverse scenarios (workplace, school, travel, daily life)
    - Avoid examples with alcohol, gambling, or illegal activities
    - Include both positive and negative conditions
    min_examples: 5
form:
  affirmative:
    structure: If + present simple, will + base verb
    example_generator:
    - If it rains, I will stay home.
    - If you study, you will pass.
    - If we finish early, we will go to the park.
    min_examples: 4
  negative:
    structure: If + don't/doesn't + present simple, won't + base verb
    example_generator:
    - If it doesn't rain, I won't stay home.
    - If you don't study, you won't pass.
    - If she doesn't hurry, she won't catch the bus.
    min_examples: 4
  questions:
    structure: Will + subject + base verb if + present simple?
    example_generator:
    - Will you stay home if it rains?
    - Will she pass if she studies?
    - Will they come if we invite them?
    min_examples: 4
sub_rules:
- rule: No 'will' in the if-clause — always present simple
  type: grammatical
  examples:
  - If it rains, I will stay. (correct)
  - If it will rain, I will stay. (incorrect)
- rule: 'Comma rule: when if-clause comes first, use a comma. When it comes second,
    no comma.'
  type: punctuation
  examples:
  - If it rains, I will stay home. (comma)
  - I will stay home if it rains. (no comma)
- rule: Unless = if not
  type: grammatical
  examples:
  - If you don't study, you will fail.
  - Unless you study, you will fail.
- rule: Other modals can replace 'will' in the main clause
  type: grammatical
  examples:
  - If it rains, we can stay inside.
  - If you study, you should pass.
  - If she asks, I might help.
- rule: Imperative in the main clause for instructions and warnings
  type: grammatical
  examples:
  - If the alarm goes off, press the red button.
  - If you get lost, call me.
  - If it hurts, stop.
use:
- context: Real future plans
  description: Talking about possible future actions and their results
  examples:
  - If I save money, I will buy a car.
  - If we finish early, we will go to the park.
  - If she gets the job, she will move to London.
- context: Promises and warnings
  description: Making promises or giving warnings based on conditions
  examples:
  - If you help me, I will pay you back.
  - If you touch that, you will get hurt.
  - If you don't hurry, you will miss the bus.
- context: Instructions
  description: Giving instructions for future situations
  examples:
  - If the alarm goes off, press the red button.
  - If you get lost, call me.
  - If the light is red, stop.
phonetics:
- note: 'Weak form of ''if'' in connected speech: /ɪf/ or even /ə/. ''If you study''
    sounds like /ɪf juː stʌdi/.'
  example_generator:
  - if /ɪf/
  - if you /ɪf juː/
  l1_issue: Spanish speakers may use 'will' in the if-clause. Chinese speakers may
    omit 'if' entirely. Drill the correct structure explicitly.
- note: 'Contraction of ''will'': I will → I''ll /aɪl/, you will → you''ll /juːl/,
    he will → he''ll /hiːl/. Full forms sound overly formal.'
  example_generator:
  - I'll /aɪl/
  - you'll /juːl/
  - he'll /hiːl/
  l1_issue: Many L1 speakers over-pronounce 'will' as /wɪl/. Teach the contracted
    forms for natural speech.
teaching:
  methodology: Structured input-to-output progression
  tips:
  - Start with affirmative first conditional. Master this before introducing negative
    and question forms.
  - Emphasize the 'no will in the if-clause' rule through error correction. This is
    the most common mistake.
  - 'Use future plan scenarios: ''If I get a raise, I will buy a gift.'' Makes the
    grammar personal and meaningful.'
  - 'Contrast with second conditional: ''If I study, I will pass'' (possible) vs ''If
    I studied, I would pass'' (unlikely).'
  - 'Practice with promises and warnings: ''If you help me, I will help you.'' ''If
    you don''t study, you will fail.'''
  recommended_activities:
  - name: Chain Conditionals
    duration: 10
    adaptation_notes: 'Students build a chain: ''If I study, I will pass.'' Next student:
      ''If I pass, I will celebrate.'' Continues around the class. Practices the structure
      in a fun, memorable way.'
  - name: Promise and Warning Cards
    duration: 15
    adaptation_notes: 'Students draw scenario cards and create promises or warnings:
      ''If you help me with my homework, I will buy you lunch.'' ''If you don''t wear
      a coat, you will get cold.'''
  - name: Real-Life First Conditional
    duration: 10
    adaptation_notes: 'Students write 5 first conditional sentences about their own
      plans: ''If I get a good job, I will buy a car.'' ''If it rains tomorrow, I
      will stay home.'' Pair work for lower levels.'
  - name: What Will You Do If...?
    duration: 15
    adaptation_notes: "Teacher asks questions: 'What will you do if it rains tomorrow?' Students answer with first conditional. Practices question form."
register_notes:
  - note: "First conditional is neutral in register — used in both formal and informal contexts."
  - note: "In formal writing, first conditional is used for predictions and hypotheses: 'If the temperature rises, the ice will melt.'"
  - note: "In conversation, first conditional is common for making offers and suggestions: 'If you're hungry, I'll make dinner.'"
  - note: "In academic writing, first conditional is used for research hypotheses: 'If the intervention is effective, scores will improve.'"
dialectal_variation:
  - note: "No significant BrE/AmE differences in first conditional formation."
  - note: "In some dialects, 'shall' may replace 'will' in first person: 'If I study, I shall pass.' (formal BrE)"
  - note: "In informal speech, 'will' is often contracted to 'll: 'If it rains, I'll stay home.'"
discourse_notes:
  - note: "First conditional is used for making promises and threats: 'If you study hard, you will pass.' (promise) 'If you don't leave, I will call the police.' (threat)"
  - note: "First conditional is used for giving warnings: 'If you don't wear sunscreen, you will get burned.'"
  - note: "First conditional is used for making offers: 'If you're tired, I'll drive.'"
  - note: "In academic writing, first conditional creates hypothetical scenarios for discussion: 'If we accept this premise, then...'"
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''will'' in the if-clause: *''If it will rain, I will stay home.'''
  correction: If it rains, I will stay home.
  explanation: In first conditional, the if-clause uses present simple, not will.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - German
