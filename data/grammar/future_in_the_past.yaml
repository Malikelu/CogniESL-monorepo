grammar_point: future_in_the_past
title: Future in the Past (Was/Were Going To, Would)
description: 'Structures used to talk about future actions from a past perspective:
  past plans that didn''t happen (was/were going to) or future in past narrative (would).'
level: B2
meaning:
  core_meaning: Describe future intentions or events from a past point of view, often
    used in reported speech or to describe past plans that failed.
  timeline: 'Past perspective: Actions that were future at a past time.'
  contrast: '''Was/Were Going To'' = Past plan (maybe failed): "I was going to call
    (but didn''t)"

    ''Would'' = Future from past: "He said he would come (from past perspective)"

    ''Will'' = Future from present: "He says he will come."

    '
  ccqs:
  - question: '''I was going to call you yesterday.'' Did I call you?'
    answer: No -- the plan existed, but it probably didn't happen.
  - question: '''She said she would help me.'' Is she talking about the past or the
      future?'
    answer: The future -- but from a past perspective. She said it in the past about
      something that was future then.
  - question: '''They were going to move to Spain.'' Do they live in Spain now?'
    answer: Probably not -- ''was/were going to'' often implies the plan didn't happen.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Was/were going to + base verb: "I was going to call you." (past plan,
      maybe didn''t happen)

      Would + base verb: "He said he would come." (future from past perspective)

      '
    example_generator:
      contexts:
      - travel and places
      - health and wellbeing
      min_examples: 4
  negative:
    structure: 'Was/were not going to + base verb: ''I wasn''t going to call you.''
      Would not + base verb: ''He said he wouldn''t come.'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Invert was/were or would: ''Were you going to call?'' ''Did she say
      she would come?'''
    example_generator:
      contexts:
      - travel and places
      min_examples: 4
sub_rules:
- rule: Future in the past describes something that was in the future from a past
    perspective. Used in reported speech and narrative
  type: semantic
  examples:
  - She said she would call me (at that time, the call was in the future)
  - I thought it was going to rain (at that time, rain was in the future)
  - We were about to leave when the phone rang (leaving was imminent)
- rule: 'Common structures: was/were going to, would, was/were about to, was/were
    on the verge of'
  type: grammatical
  examples:
  - I was going to study, but I fell asleep
  - She would later become the CEO
  - They were about to announce the results
  - He was on the verge of quitting
- rule: Future in the past is essential for reported speech when the original statement
    used will or going to
  type: grammatical
  examples:
  - '''I will help you.'' → He said he would help me'
  - '''I am going to travel.'' → She said she was going to travel'
  - '''We will be late.'' → They said they would be late'
use:
- name: Failed Past Plans (Was/Were Going To)
  description: Past intentions that didn't happen, often with 'but'.
  examples:
  - I was going to buy it, but I forgot my wallet.
  - She was going to visit, but she got sick.
  key_point: Common with 'but' to show failure.
- name: Reported Speech (Would)
  description: Report what someone said about the future from a past perspective.
  examples:
  - He said he would call.
  - She told me she would be late.
  key_point: Would replaces will in reported speech.
- name: Narrative Future (Would)
  description: Describe future actions in past stories.
  examples:
  - He packed his bags; he would leave at dawn.
  key_point: Used in storytelling.
phonetics:
- note: 'In future in the past structures, would is often reduced to /d/ in connected
    speech: ''I would go'' → /aɪd ɡəʊ/. This reduction is very common in narrative.'
  example_generator:
    contexts:
    - would reduction
  l1_issue: Learners may not recognize would when reduced to /d/, confusing it with
    had. Teach the context clues.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Was/were going to (failed plans).'
  - 'Week 2: Would (reported speech).'
  - 'Week 3: Contrast with present future (will).'
  - 'Use story scenarios: ''I was going to go to the party, but I got sick.'''
  recommended_activities:
  - name: Narrative Retelling
    duration: 15
    adaptation_notes: 'Students retell a story using future in the past: ''The hero
      was about to give up when...'' ''She would later discover that...'''
  - name: Reported Speech Transformation
    duration: 15
    adaptation_notes: 'Students transform direct speech into reported speech: ''I
      will come.'' → He said he would come.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
