grammar_point: causative
title: Causative Structures
description: 'Structures showing that someone causes something to happen: have something
  done, get something done, make someone do something.'
level: B2
meaning:
  core_meaning: Causative structures show that someone causes something to happen
    or causes someone to do something. Have/get something done = arrange for someone
    else to do it. Make/let/have someone do = cause/allow someone to do it.
  timeline: Depends on the tense used.
  contrast: Causative = I had my hair cut. (someone else cut it) vs Active = I cut
    my hair. (I did it myself)
  ccqs:
  - question: Did the subject do the action themselves?
    answer: No, someone else did it (causative).
    purpose: Tests whether the learner understands the causative structure (have/get
      something done) for arranging services, and the difference between 'have' (neutral/formal)
      and 'get' (informal).
  - question: Is this about arranging or forcing?
    answer: Arrange = have/get, Force/Allow = make/let/have.
    purpose: Tests whether the learner understands that '-ed' adjectives describe
      how someone feels (experiencer) while '-ing' adjectives describe what causes
      the feeling (stimulus).
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      causative and explain why they are incorrect.
  example_generator:
    contexts:
    - services and arrangements
    - obligations and permissions
    - everyday situations
    - formal contexts
    cultural_notes:
    - Causative structures are used very frequently in English
    - Some L1 speakers avoid them, making speech sound unnatural
    min_examples: 5
form:
  affirmative:
    structure: 'Have/get + object + past participle: I had my hair cut. / Make/let/have
      + person + base verb: She made him apologize.'
    example_generator:
      contexts:
      - services
      - obligations
      - permissions
      min_examples: 4
  negative:
    structure: 'Same patterns with negation: I did not have my hair cut. / She did
      not make him apologize.'
    example_generator:
      contexts:
      - negative causatives
      min_examples: 3
  questions:
    structure: 'Did + subject + have + object + past participle?: Did you have your
      hair cut?'
    example_generator:
      contexts:
      - question formation
      min_examples: 3
sub_rules:
- rule: Have/get something done — arrange for someone to do it
  type: grammatical
  examples:
  - I had my car serviced.
  - She got her nails done.
  - We need to have the roof repaired.
- rule: Make someone do something — force or require
  type: grammatical
  examples:
  - The teacher made us apologize.
  - My boss made me work late.
- rule: Let someone do something — allow or permit
  type: grammatical
  examples:
  - My parents let me stay out late.
  - Let me help you.
- rule: Have someone do something — arrange or request (less forceful than make)
  type: grammatical
  examples:
  - I had the mechanic check the car.
  - She had her assistant book the tickets.
- rule: Have something happen — experience something (often unpleasant)
  type: semantic
  examples:
  - I had my car stolen last week.
  - She had her bag snatched on the bus.
  - He had his phone hacked.
use:
- context: Services
  description: Arranging for someone to do something for you
  examples:
  - I had my hair cut yesterday.
  - We need to get the car serviced.
  - She had her house painted.
- context: Obligations and permissions
  description: Making or allowing someone to do something
  examples:
  - The teacher made the students rewrite the essay.
  - My parents let me go to the party.
phonetics:
- note: Stress on the causative verb (have/get/make/let) to show who is causing the
    action
  example_generator:
    contexts:
    - sentence stress
  l1_issue: Many L1 speakers avoid causative structures, using longer paraphrases
    instead
teaching:
  methodology: PPP
  tips:
  - Use real-life scenarios (services, obligations)
  - Contrast causative vs active explicitly
  - Practice all four patterns: have, get, make, let
  recommended_activities:
  - name: Service Role Play
    duration: 15
    adaptation_notes: Students practice arranging services using have/get something
      done.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 8:
    Passive Voice, §8.6 (causative constructions)'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 16: Information Packaging, §16.3'
  validation: Swan (2016) Practical English Usage, 4th ed. Entries 95-100 (causative
    have/get)
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    8: Causative structures'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 4: Causative'
common_errors:
- error: '*I did my hair cut yesterday.* (arranged for someone)'
  correction: I had my hair cut yesterday.
  explanation: The causative uses 'have/get + object + past participle' to express
    arranging a service. Using 'do' changes the meaning to performing the action yourself.
    'Do' is not used as a causative verb for services.
  l1_groups:
  - Portuguese
  - Spanish
- error: '*I made him to apologize.*'
  correction: I made him apologize.
  explanation: After 'make' (causative meaning 'force'), use the bare infinitive (without
    'to'). 'Make + person + base verb' is a fixed structure. Adding 'to' before the
    verb is influenced by other causative patterns like 'ask him to apologize'.
  l1_groups:
  - Portuguese
  - Spanish
  - French
  - Chinese
- error: '*She let me to borrow her car.*'
  correction: She let me borrow her car.
  explanation: After 'let', use the bare infinitive (without 'to'). 'Let + person
    + base verb' is the fixed pattern. Adding 'to' occurs because most other causatives
    ('ask', 'tell', 'want') do take 'to'.
  l1_groups:
  - Portuguese
  - Spanish
  - French
- error: '*I had repaired my car by the mechanic.*'
  correction: I had my car repaired by the mechanic.
  explanation: In causative 'have', the object (what is done) comes immediately after
    'have', not at the end. 'Had my car repaired' (not 'had repaired my car'). The
    past participle modifies the object.
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
