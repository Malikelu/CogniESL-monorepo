grammar_point: causative
title: "Causative Structures"
description: "Structures showing that someone causes something to happen: have something done, get something done, make someone do something."
level: B2

meaning:
  core_meaning: "Causative structures show that someone causes something to happen or causes someone to do something. Have/get something done = arrange for someone else to do it. Make/let/have someone do = cause/allow someone to do it."
  timeline: "Depends on the tense used."
  contrast: "Causative = I had my hair cut. (someone else cut it) vs Active = I cut my hair. (I did it myself)"
  ccqs:
    - question: Did the subject do the action themselves?
      answer: No, someone else did it (causative).
    - question: Is this about arranging or forcing?
      answer: Arrange = have/get, Force/Allow = make/let/have.
  example_generator:
    contexts:
      - services and arrangements
      - obligations and permissions
      - everyday situations
      - formal contexts
    cultural_notes:
      - Causative structures are used very frequently in English
      - Some L1 speakers avoid them, making speech sound unnatural
    min_examples: 5

form:
  affirmative:
    structure: "Have/get + object + past participle: I had my hair cut. / Make/let/have + person + base verb: She made him apologize."
    example_generator:
      contexts:
        - services
        - obligations
        - permissions
      min_examples: 4
  negative:
    structure: "Same patterns with negation: I did not have my hair cut. / She did not make him apologize."
    example_generator:
      contexts:
        - negative causatives
      min_examples: 3
  questions:
    structure: "Did + subject + have + object + past participle?: Did you have your hair cut?"
    example_generator:
      contexts:
        - question formation
      min_examples: 3

sub_rules:
  - rule: "Have/get something done — arrange for someone to do it"
    type: grammatical
    examples:
      - I had my car serviced.
      - She got her nails done.
      - We need to have the roof repaired.
  - rule: "Make someone do something — force or require"
    type: grammatical
    examples:
      - The teacher made us apologize.
      - My boss made me work late.
  - rule: "Let someone do something — allow or permit"
    type: grammatical
    examples:
      - My parents let me stay out late.
      - Let me help you.
  - rule: "Have someone do something — arrange or request (less forceful than make)"
    type: grammatical
    examples:
      - I had the mechanic check the car.
      - She had her assistant book the tickets.

use:
  - context: "Services"
    description: "Arranging for someone to do something for you"
    examples:
      - I had my hair cut yesterday.
      - We need to get the car serviced.
      - She had her house painted.
  - context: "Obligations and permissions"
    description: "Making or allowing someone to do something"
    examples:
      - The teacher made the students rewrite the essay.
      - My parents let me go to the party.

phonetics:
  - note: "Stress on the causative verb (have/get/make/let) to show who is causing the action"
    example_generator:
      contexts:
        - sentence stress
    l1_issue: "Many L1 speakers avoid causative structures, using longer paraphrases instead"

teaching:
  methodology: "PPP"
  tips:
    - Use real-life scenarios (services, obligations)
    - Contrast causative vs active explicitly
    - Practice all four patterns: have, get, make, let
  recommended_activities:
    - name: "Service Role Play"
      duration: 15
      adaptation_notes: "Students practice arranging services using have/get something done."
