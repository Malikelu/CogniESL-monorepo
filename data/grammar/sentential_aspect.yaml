grammar_point: sentential_aspect
title: Sentential Aspect
description: 'The relationship between action and time: perfective (completed) vs
  progressive (ongoing) vs habitual (repeated).'
level: C1
meaning:
  core_meaning: Sentential aspect describes how an action relates to time. Perfective
    = completed action. Progressive = ongoing action. Habitual = repeated action.
  timeline: Varies by aspect — perfective = completed, progressive = ongoing, habitual
    = repeated.
  contrast: Perfective = I wrote a letter. (completed) vs Progressive = I was writing
    a letter. (ongoing)
  ccqs:
  - question: Is the action completed or ongoing?
    answer: Completed = perfective, ongoing = progressive
    purpose: Tests whether the learner can distinguish between the two primary sentential
      aspects (perfective and progressive), which is fundamental to understanding
      how English conveys the internal structure of events.
  - question: Does this happen regularly?
    answer: Yes = habitual aspect.
    purpose: Tests whether the learner can identify the habitual aspect as a distinct
      category from perfective and progressive, which helps them understand how English
      encodes repeated or customary actions.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      sentential aspect and explain why they are incorrect.
example_generator:
  contexts:
  - academic writing
  - linguistic analysis
  - advanced grammar
  - formal descriptions
  cultural_notes: []
  min_examples: 5
form:
  affirmative:
    structure: 'Perfective: Subject + past simple: I wrote a letter. / Progressive:
      Subject + be + verb-ing: I was writing a letter.'
    example_generator:
      contexts:
      - academic writing
      - linguistic analysis
      - advanced grammar
      min_examples: 4
  negative:
    structure: 'Same patterns with negation: I did not write a letter. / I was not
      writing a letter.'
    example_generator:
      contexts:
      - academic writing
      - linguistic analysis
      - advanced grammar
      min_examples: 4
  questions:
    structure: 'Did + subject + verb?: Did you write a letter?'
    example_generator:
      contexts:
      - academic writing
      - linguistic analysis
      - advanced grammar
      min_examples: 4
sub_rules:
- rule: Perfective aspect — completed actions
  type: grammatical
  examples:
  - I wrote a letter.
  - She finished the project.
- rule: Progressive aspect — ongoing actions
  type: grammatical
  examples:
  - I was writing a letter.
  - She was working on the project.
- rule: Habitual aspect — repeated actions
  type: grammatical
  examples:
  - I write letters every day.
  - She always arrives early.
use:
- context: Academic analysis
  description: Describing how actions relate to time
  examples:
  - The perfective aspect presents the action as completed.
  - The progressive aspect focuses on the internal structure of the event.
phonetics:
- note: No specific phonetic pattern
  example_generator:
    contexts:
    - written English
  l1_issue: This is a metalinguistic concept — most L1 speakers do not analyze aspect
    explicitly.
teaching:
  methodology: Guided discovery
  tips:
  - Use timelines to visualize aspects
  - Contrast perfective vs progressive explicitly
  - Use authentic texts for analysis
  recommended_activities:
  - name: Aspect Identification
    duration: 15
    adaptation_notes: Students identify and classify aspect in authentic texts.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using progressive for habitual actions: *''I am writing letters every day.'''
  correction: I write letters every day.
  explanation: The progressive aspect describes an ongoing action at a specific moment,
    not a repeated or customary action. Habitual actions use the present simple, not
    the present continuous.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Using perfective for ongoing actions: *''He wrote the report at 3pm yesterday''
    (meaning he was in the process)'
  correction: He was writing the report at 3pm yesterday.
  explanation: The perfective (past simple) suggests a completed action. To describe
    an action in progress at a specific past time, use the progressive (past continuous)
    instead.
  l1_groups:
  - Portuguese
  - Spanish
  - Japanese
- error: 'Confusing tense with aspect: treating ''past tense'' and ''perfective aspect''
    as the same concept.'
  correction: Past simple can be progressive (was writing). Present can be perfective
    (I write now). Aspect and tense are independent.
  explanation: Tense locates an event in time (past, present, future). Aspect describes
    how the event unfolds in time (completed, ongoing, repeated). A past tense sentence
    can have progressive aspect, and a present tense sentence can have perfective
    aspect. Learners from aspect-prominent languages may find this distinction difficult.
  l1_groups:
  - Russian
  - Arabic
  - Chinese
register_notes:
- note: This is a metalinguistic concept used primarily in academic and linguistic
    contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core theory of sentential aspect.
discourse_notes:
- note: This concept is relevant to academic and linguistic discourse rather than
    everyday conversation.
