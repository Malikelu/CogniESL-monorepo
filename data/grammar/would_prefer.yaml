grammar_point: would_prefer
title: Would prefer (polite preference)
description: Phrase used to express polite preferences, more formal than 'prefer'.
level: B2
meaning:
  core_meaning: Expresses polite preferences, more formal than 'prefer'. This grammar
    point is essential for expressing would prefer in English. Learners at this level
    need to understand both the form and the appropriate contexts for use. Common
    errors include confusion with related structures and inappropriate register use.
  timeline: Refers to present or future preferences; past form is 'would have preferred'.
  contrast: 'Would prefer = Polite preference: "I''d prefer tea" (polite)

    Prefer = Neutral preference: "I prefer tea" (neutral)

    Would rather = Choice between actions: "I''d rather stay home" (action choice)

    '
  ccqs:
  - question: I ___ prefer tea to coffee. (would / do)
    answer: would — 'would prefer' expresses a polite preference. 'I do prefer' is
      also correct but has a different nuance (emphasis).
    purpose: Tests whether the learner understands a key concept of would_prefer.
      This is fundamental for correct use of this grammar point.
  - question: 'Which is more polite: ''I want tea'' or ''I would prefer tea''?'
    answer: '''I would prefer tea'' — using ''would'' makes the request more polite
      and indirect.'
    purpose: Tests whether the learner understands a key concept of would_prefer.
      This is fundamental for correct use of this grammar point.
  - question: Can we say 'I would prefer going' or only 'I would prefer to go'?
    answer: Both are correct. 'I would prefer to go' is more common. 'I would prefer
      going' is also acceptable but less frequently used.
    purpose: Tests whether the learner understands a key concept of would_prefer.
      This is fundamental for correct use of this grammar point.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: Subject + would prefer + noun/to + base verb (+ rather than/to + base
      verb)
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  negative:
    structure: Subject + wouldn't prefer + noun/to + base verb
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: Would + subject + prefer + noun/to + base verb?
    example_generator:
      contexts:
      - food and daily routines
      - weather and nature
      min_examples: 4
sub_rules:
- rule: Would prefer + to + base verb
  type: grammatical
  examples:
  - I would prefer to stay
  - She would prefer to leave
  - They would prefer to wait
- rule: Would prefer noun to noun
  type: grammatical
  examples:
  - I would prefer tea to coffee
  - She would prefer the blue one to the red one
  - They would prefer summer to winter
- rule: Would prefer is more formal than would like and expresses a stronger preference
  type: register
  examples:
  - I would prefer to speak to the manager (formal)
  - I would like to speak to the manager (less formal)
use:
- name: Polite Preferences for Things
  description: Express polite preferences for items or choices.
  examples:
  - I would prefer a non-smoking room.
  - She would prefer the blue dress.
  key_point: More polite than 'prefer'.
- name: Polite Preferences for Actions
  description: Express polite preferences for actions.
  examples:
  - I would prefer to walk rather than take the bus.
  - We would prefer to leave early.
  key_point: Uses 'to + verb'.
- name: Past Preferences
  description: 'Past form: would have preferred + noun/to + base verb.'
  examples:
  - I would have preferred to stay home.
  - She would have preferred a different gift.
  key_point: Past polite preference.
phonetics:
- note: 'Would prefer is often contracted: ''I''d prefer'' /aɪd prɪˈfɜː/. The stress
    falls on the second syllable of prefer: /prɪˈfɜː/.'
  example_generator:
    contexts:
    - would prefer pronunciation
  l1_issue: Learners may stress the first syllable 'PREfer'. Teach correct stress
    on the second syllable.
teaching:
  methodology: PPP
  tips:
  - 'Use hotel/restaurant scenarios: ''I would prefer a quiet room''.'
  - Contrast with 'prefer' and 'would rather'.
  - 'Role-play: Student makes polite choices using ''would prefer''.'
  - 'Explain past form: would have preferred.'
  recommended_activities:
  - name: Preference Questions
    duration: 10
    adaptation_notes: 'Students ask each other about preferences: ''Would you prefer
      tea or coffee?'' ''Would you prefer to stay in or go out?'''
  - name: Travel Preferences
    duration: 15
    adaptation_notes: 'Students discuss travel preferences: ''I would prefer a beach
      holiday to a city break. I would prefer to fly than to drive.'''
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 9:
    Modals, §9.1-9.6'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I would prefer to don''t go.*'
  correction: I would prefer not to go.
  explanation: Would prefer + not to + verb.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
