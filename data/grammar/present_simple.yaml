  reliability: B
  source: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 5: Present
    Tenses, §5.1-5.3'
  tier: 1
- claim: 'Discourse function: Present simple is used in instructions and recipes:
    ''First, you chop the onions. Then you heat the o'
  reliability: B
  source: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 5: Present
