grammar_point: purpose_clauses_a2
title: Purpose Clauses (so that / in order to)
description: Simple structures to express why someone does something. At A2, we focus
  on 'to + verb', 'in order to', and 'so that' to explain reasons and goals.
level: A2
meaning:
  core_meaning: Expresses the goal or intention behind an action -- answers 'Why?'
    with intention, not cause.
  timeline: Present or past form shows when the intention existed.
  contrast: '''To + verb'' = simple purpose (same subject): "I went to buy milk."

    ''In order to'' = more formal/emphatic: "I went in order to buy milk."

    ''So that'' = purpose with different subjects or modals: "I went so that I could
    buy milk."

    '
  ccqs:
  - question: When do we use so that instead of to
    answer: When the purpose clause has a different subject.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'to + verb: "I went to buy milk."

      in order to + verb: "I went in order to buy milk."

      so that + subject + can/will: "I went so that I can buy milk."

      '
    example_generator:
      contexts:
      - education and school
      - shopping and commerce
      - health and wellbeing
      min_examples: 4
  negative:
    structure: 'in order not to + verb: "I left early in order not to be late."

      so that + subject + won''t/can''t: "I left early so that I won''t be late."

      '
    example_generator:
      contexts:
      - education and school
      min_examples: 4
  questions:
    structure: Why + auxiliary + subject + verb? 'Why did you go?' 'To buy milk.'
    example_generator:
      contexts:
      - social interactions
      min_examples: 4
sub_rules:
- rule: To + base verb for same subject
  type: grammatical
  examples:
  - I went to the store to buy milk
  - She studies to pass the exam
- rule: So that + subject + can/will/could/would (different subject)
  type: grammatical
  examples:
  - I spoke slowly so that they could understand
  - She left early so that she would not be late
use:
- name: Simple Purpose (to + verb)
  description: The most common way to express purpose. Same subject in both clauses.
  examples:
  - I came to see you.
  - She called to say hello.
  - I study to pass the exam.
  key_point: Subject of main clause and purpose clause is the same.
- name: Emphatic/Formal Purpose (in order to)
  description: More formal or emphatic than 'to'. Same meaning, stronger tone.
  examples:
  - I'm studying in order to pass.
  - We met in order to discuss the plan.
  key_point: In order to = 'to' with extra emphasis or formality.
- name: Purpose with Modals (so that)
  description: Used when you want to include a modal verb (can, could, will, would)
    or a different subject.
  examples:
  - I told him so that he would know.
  - She left early so that she wouldn't be late.
  - I speak slowly so that everyone can understand.
  key_point: So that + subject + modal verb (can, will, could, would).
phonetics:
- note: 'To is weak before verbs: ''to buy'' → /tə baɪ/, ''to study'' → /tə ˈstʌdi/.'
  example_generator:
    contexts:
    - purpose clause pronunciation
  l1_issue: Portuguese speakers may say 'for buy' instead of 'to buy'. Teach the correct
    form.
teaching:
  methodology: PPP
  tips:
  - 'Ask ''Why?'' and get ''To...'' answers: ''Why did you come?'' ''To see you.'''
  - 'Practice the most common pattern first: ''I went to + verb''.'
  - 'Compare: ''I came because I was invited'' (reason) vs ''I came to see you'' (purpose).'
  recommended_activities:
  - name: Why Did You Do That
    duration: 15
    adaptation_notes: 'Students explain their daily actions using purpose clauses:
      ''I woke up early to catch the bus.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for purpose_clauses_a2.
  correction: Correct form.
  explanation: This is a common error for purpose_clauses_a2.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
