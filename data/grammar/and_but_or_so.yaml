grammar_point: and_but_or_so
title: Coordinating Conjunctions (and, but, or, so)
description: Words that join equal grammatical elements (words, phrases, clauses).
  Essential for sentence connection.
level: A1
meaning:
  core_meaning: 'Connects equal elements: addition (and), contrast (but), choice (or),
    result (so).'
  timeline: N/A (Conjunctions show relationships, not time.)
  contrast: '''And'' = addition (positive connection)

    ''But'' = contrast (opposite ideas)

    ''Or'' = choice/alternative

    ''So'' = result/consequence

    '
  ccqs:
  - question: I like tea and coffee. Do I like only one drink or both?
    answer: Both. And means both things are true — I like tea AND coffee.
    purpose: Tests understanding that and adds or combines items
  - question: It is cold but sunny. Is the weather only cold?
    answer: No. It is cold AND sunny. But shows these two ideas are surprising together.
    purpose: Tests understanding that but shows contrast between two true ideas
  - question: Do you want tea or coffee? Can I choose both?
    answer: Usually or means choose one. If you want both, you would say and instead.
    purpose: Tests understanding that or presents alternatives, not combinations
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Word + conjunction + word: "apples and oranges"

      Phrase + conjunction + phrase: "in the morning and in the evening"

      Clause + conjunction + clause: "I like tea, and she likes coffee."

      '
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
  negative:
    structure: 'Conjunction unchanged in negatives: ''I don''t like tea or coffee.'''
    example_generator:
      contexts:
      - entertainment and media
      min_examples: 4
  questions:
    structure: 'Conjunction in same position: ''Do you want tea or coffee?'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- type: grammar
  rule: And joins similar or related ideas
  examples:
  - bread and butter (common pair)
  - I cooked and she cleaned. (two related actions)
  explanation: And adds information. Both parts are true or desired together.
- type: grammar
  rule: But joins contrasting or unexpected ideas
  examples:
  - She is smart but lazy. (positive and negative)
  - I called but she did not answer. (expected vs actual)
  explanation: But signals that the second idea contrasts with or surprises given
    the first.
- type: grammar
  rule: Or presents alternatives and in negatives it replaces and
  examples:
  - Tea or coffee? (positive choice)
  - I do not like tea or coffee. (negative — or replaces and)
  explanation: In negative sentences, use or not and to connect items.
- type: grammar
  rule: So shows result or consequence (cause then effect)
  examples:
  - It rained, so we stayed home. (rain is cause, staying home is result)
  - I was tired, so I went to bed. (tiredness is cause, bed is result)
  explanation: So answers what happened because of this. The clause before so is the
    cause.
- type: punctuation
  rule: Use a comma before the conjunction when joining two independent clauses
  examples:
  - I like tea, and she likes coffee. (comma before and)
  - It was late, so we left. (comma before so)
  - I like tea and coffee. (no comma — joining words, not clauses)
  explanation: When both sides of the conjunction can stand alone as sentences, use
    a comma.
use:
- name: Addition (and)
  description: Add similar ideas or items.
  examples:
  - I like tea and coffee.
  - She sings and dances.
  key_point: And joins equal elements (both nouns, both verbs, both clauses).
- name: Contrast (but)
  description: Show opposite or unexpected ideas.
  examples:
  - It's cold but sunny.
  - He is rich but unhappy.
  key_point: But shows surprise or opposition between ideas.
- name: Choice (or)
  description: Offer alternatives or choices.
  examples:
  - Tea or coffee?
  - Now or later?
  key_point: Or means choose one (not both).
- name: Result (so)
  description: Show consequence of an action.
  examples:
  - It rained, so we stayed home.
  - I was hungry, so I ate.
  key_point: So means the result of what came before.
phonetics:
- note: And is almost always reduced to a weak form in connected speech
  l1_issue: Many L1 speakers pronounce and as a full word with a clear vowel. In natural
    speech, it reduces to a schwa or even just /n/.
  practice: Drill common pairs like fish and chips and salt and pepper with reduced
    and.
  example_generator:
    contexts:
    - connected speech
- note: But — the vowel reduces to schwa in connected speech
  l1_issue: Speakers may over-pronounce but with full stress. In natural speech, it
    is usually unstressed.
  practice: Drill but in phrases like cheap but good and small but strong.
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - 'Use colored blocks: blue for and, red for but, green for or, yellow for so.'
  - 'Practice with shopping lists: I need apples and oranges (both), tea or coffee
    (choice).'
  - 'Act out but: I am happy (smile) plus but I am tired (yawn) equals contrast.'
  - 'Use cause-effect cards for so: match cause cards (It rained) with effect cards
    (We stayed home).'
  recommended_activities:
  - name: Conjunction Sorting Game
    duration: 10-15 min
    description: Students receive sentence halves and must match them using the correct
      conjunction (and, but, or, so).
    adaptation: For A1, provide the conjunction. For A2+, students choose the conjunction
      themselves.
  - name: Four Corners
    duration: 10 min
    description: Label four corners of the room AND, BUT, OR, SO. The teacher reads
      a sentence with a blank, and students run to the corner with the correct conjunction.
    adaptation: Use simpler sentences for beginners. For stronger students, discuss
      nuance.
  - name: Story Building with Conjunctions
    duration: 15 min
    description: Students build a story together, each adding a sentence that must
      start with a different conjunction (and to but to or to so).
    adaptation: Provide a story starter for weaker groups. Stronger groups can create
      stories independently.
