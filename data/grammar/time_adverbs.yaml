grammar_point: time_adverbs
title: Time Adverbs (now, yesterday, today, soon, already, yet)
description: Adverbs that indicate when an action happens. Essential for temporal
  context in communication.
level: A1
meaning:
  core_meaning: 'Specifies the time frame of an action: past, present, future, or
    relative time.'
  timeline: 'Time adverbs anchor actions to specific points: past (yesterday), present
    (now), future (tomorrow).'
  contrast: '''Already'' = earlier than expected (positive sentences)

    ''Yet'' = up to now (negative/questions)

    ''Still'' = continuing longer than expected

    ''Just'' = very recently

    '
  ccqs:
  - question: Where do time adverbs usually go
    answer: At the beginning or end of the sentence.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Time adverb at end (most common): "I went yesterday."

      Time adverb at beginning (for emphasis): "Yesterday, I went."

      Already/yet with perfect tenses: "I have already finished."

      '
    example_generator:
      contexts:
      - food and daily routines
      - entertainment and media
      min_examples: 4
  negative:
    structure: 'Time adverb position unchanged in negatives: ''I haven''t finished
      yet.'''
    example_generator:
      contexts:
      - social interactions
      min_examples: 4
  questions:
    structure: 'Time adverb at end: ''Did you go yesterday?'' ''Have you eaten yet?'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: 'Past time expressions: yesterday, last week, last month, ago'
  type: lexical
  examples:
  - I went yesterday
  - She visited last week
  - They moved 3 years ago
  - He called this morning
- rule: 'Present time expressions: today, this week, this month, this year'
  type: lexical
  examples:
  - I am busy today
  - She is traveling this week
  - They are working this month
- rule: 'Future time expressions: tomorrow, next week, next month, next year'
  type: lexical
  examples:
  - I will go tomorrow
  - She is visiting next week
  - They are moving next year
- rule: 'Position: time adverbs usually go at the end or beginning of the sentence'
  type: word_order
  examples:
  - Yesterday I went to the store (beginning)
  - I went to the store yesterday (end)
  - Tomorrow we will leave (beginning)
  - We will leave tomorrow (end)
use:
- name: Past Time Reference
  description: Indicate when past actions occurred.
  examples:
  - I called yesterday.
  - She arrived last week.
  key_point: Past time adverbs trigger past tense verbs.
- name: Future Time Reference
  description: Indicate when future actions will occur.
  examples:
  - We'll leave tomorrow.
  - She is coming soon.
  key_point: Future time adverbs with will/going to.
- name: Perfect Tense Time Markers
  description: Already, yet, just, ever, never with present perfect.
  examples:
  - I have already seen it.
  - Have you ever been there?
  key_point: Already = positive, yet = negative/questions.
phonetics:
- note: 'Time adverbs at the end of the sentence are usually stressed: ''I went to
    the store YESTERDAY.'' ''She is visiting NEXT WEEK.'''
  example_generator:
    contexts:
    - time adverb stress
  l1_issue: 'Portuguese and Spanish speakers often place time adverbs in different
    positions. Teach the standard English position: end or beginning of sentence.'
teaching:
  methodology: PPP
  tips:
  - 'Create a classroom timeline: past on left, future on right, stick adverbs on
    it.'
  - 'Practice with personal calendars: ''What did you do yesterday? What will you
    do tomorrow?'''
  - Drill already/yet contrast with present perfect.
  recommended_activities:
  - name: Past Present or Future
    duration: 10
    adaptation_notes: 'Teacher says a time expression. Students identify: past, present,
      or future? ''Yesterday'' (past), ''This week'' (present), ''Next year'' (future).'
  - name: Sentence Building
    duration: 15
    adaptation_notes: 'Students build sentences using time adverbs: ''I + go + yesterday''
      → ''I went yesterday.'' Practices correct tense with time expressions.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Placing time adverbs at the beginning only: *''Yesterday I went to the store.''
    (only position)'
  correction: I went to the store yesterday.
  explanation: Time adverbs can go at the beginning or end of a sentence.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: Time adverbs are neutral in register.
dialectal_variation:
- note: No significant BrE/AmE differences.
discourse_notes:
- note: 'Time adverbs create temporal cohesion: ''Yesterday I went to the store. Today
    I stayed home.'''
