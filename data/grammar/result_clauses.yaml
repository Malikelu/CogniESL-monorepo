grammar_point: result_clauses
title: Result Clauses (so...that, such...that, therefore)
description: Structures that show the consequence or outcome of an action. Essential
  for showing cause-effect relationships.
level: B2
meaning:
  core_meaning: Shows the consequence or outcome that results from a situation or
    action.
  timeline: N/A (Result clauses show logical relationships, not time sequence.)
  contrast: '''So + adj + that'' = result (emphasis on degree)

    ''Such + noun + that'' = result (emphasis on noun)

    ''Therefore'' = formal result connector

    ''So'' (simple) = result without ''that'' clause

    '
  ccqs:
  - question: What conjunctions introduce result clauses
    answer: So...that, such...that, so, therefore.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'So + adjective/adverb + that + clause: "It was so hot that we left."

      Such + (a/an) + noun + that + clause: "It was such a hot day that we left."

      Main clause + therefore + clause: "It was hot; therefore, we left."

      '
    example_generator:
      contexts:
      - entertainment and media
      - health and wellbeing
      min_examples: 4
  negative:
    structure: Negative in either part.
    example_generator:
      contexts:
      - weather and nature
      min_examples: 4
  questions:
    structure: Questions less common; use 'so' in statement questions.
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: So + adjective/adverb + that + clause
  type: grammatical
  examples:
  - It was so cold that the water froze
  - She spoke so fast that I could not understand
  - He ran so quickly that he won
- rule: Such + noun phrase + that + clause
  type: grammatical
  examples:
  - It was such a cold day that the water froze
  - She is such a good speaker that everyone listens
  - He made such a big mistake that he was fired
- rule: So (informal, without that)
  type: grammatical
  examples:
  - It was so cold I stayed inside
  - She spoke so fast I could not understand
use:
- name: Degree Result (so...that)
  description: Emphasizes how extreme something is that it causes a result.
  examples:
  - So hungry that I fainted.
  - So loudly that everyone heard.
  key_point: So + adjective/adverb (not noun).
- name: Noun Result (such...that)
  description: Emphasizes a noun so much that it causes a result.
  examples:
  - Such a mess that we couldn't find anything.
  - Such heavy rain that roads flooded.
  key_point: Such + (a/an) + adjective + noun.
- name: Formal Result (therefore)
  description: Formal connector between sentences.
  examples:
  - It rained; therefore, the game was cancelled.
  key_point: Therefore = very formal, needs semicolon or period before.
phonetics:
- note: 'So is stressed in result clauses: ''It was SO cold that...'' ''Such'' is
    also stressed: ''It was SUCH a cold day that...'''
  example_generator:
    contexts:
    - result clause stress
  l1_issue: 'Portuguese speakers may use ''so much'' instead of ''so'' before adjectives.
    Teach: ''so cold'' NOT ''so much cold.'''
teaching:
  methodology: PPP
  tips:
  - 'Use thermometer analogy: ''so hot'' (temperature) vs ''such heat'' (noun).'
  - 'Practice with weather: ''So cold that...'', ''Such a storm that...'''
  - 'Show formality: ''so'' (speaking) vs ''therefore'' (writing).'
  recommended_activities:
  - name: Result Chain
    duration: 15
    adaptation_notes: 'Students create result chains: ''It was so cold that... the
      water froze. The water froze so... people could skate.'''
  - name: So or Such
    duration: 10
    adaptation_notes: 'Students choose: ''It was ___ cold that...'' (so) / ''It was
      ___ a cold day that...'' (such).'
