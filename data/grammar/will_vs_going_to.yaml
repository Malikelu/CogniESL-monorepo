grammar_point: will_vs_going_to
title: Will vs Going To (Future)
description: 'Two ways to talk about the future: ''will'' for spontaneous decisions
  and predictions without evidence, ''going to'' for plans and predictions with evidence.
  Essential for everyday future expressions.'
level: A2
meaning:
  core_meaning: Both 'will' and 'going to' talk about the future, but they express
    different mindsets. 'Will' = spontaneous decision, promise, or prediction without
    evidence (you decide NOW). 'Going to' = plan/intention or prediction with evidence
    (you decided BEFORE or you can SEE it coming).
  timeline: Both refer to the future. The difference is in the speaker's mindset,
    not the time.
  contrast: '''Will'' = ''I''ll open the door.'' (just decided now, spontaneous) vs
    ''Going to'' = ''I''m going to travel next week.'' (already planned, decided before)'
  ccqs:
  - question: Did the speaker decide right now, or was this planned before?
    answer: Right now = will. Planned before = going to.
  - question: Is there visible evidence that something is about to happen?
    answer: Yes = going to (prediction with evidence). No = will (opinion/guess).
  - question: Is this a promise or offer?
    answer: Yes = will (I'll help you = promise/offer).
  example_generator:
    contexts:
    - spontaneous decisions
    - plans and intentions
    - predictions with evidence
    - predictions without evidence
    - promises and offers
    cultural_notes:
    - Use diverse scenarios (restaurant, travel, daily life, weather)
    - Avoid examples that assume specific cultural knowledge
    - Include both formal and informal contexts
    min_examples: 5
form:
  affirmative:
    structure: 'Will: Subject + will + base verb (V1) / Going to: Subject + am/is/are
      + going to + base verb (V1)'
    example_generator:
    - I will go.
    - She will eat.
    - I am going to go.
    - She is going to eat.
    min_examples: 4
  negative:
    structure: 'Will: Subject + will not (won''t) + base verb / Going to: Subject
      + am/is/are + not + going to + base verb'
    example_generator:
    - I won't go.
    - She won't eat.
    - I am not going to go.
    - She is not going to eat.
    min_examples: 4
  questions:
    structure: Will + subject + base verb? / Am/Is/Are + subject + going to + base
      verb?
    example_generator:
    - Will you go?
    - Is she going to eat?
    - Are they going to come?
    - Will he help?
    min_examples: 4
sub_rules:
- rule: 'Contractions are essential in spoken English: I will → I''ll, I am going
    to → I''m going to, will not → won''t'
  type: grammatical
  examples:
  - I'll go.
  - She's going to eat.
  - They won't come.
  - We're going to study.
- rule: Will for spontaneous decisions (decided at the moment of speaking)
  type: semantic
  examples:
  - I'll have the pasta, please. (deciding now in restaurant)
  - It's cold. I'll close the window. (reacting now)
  - I'll help you with that. (offering now)
- rule: Going to for plans and intentions (decided before speaking)
  type: semantic
  examples:
  - I'm going to study tonight. (planned before)
  - We're going to visit grandma on Sunday. (already planned)
  - She's going to learn French. (her intention)
- rule: Going to for predictions with visible evidence
  type: semantic
  examples:
  - Look at those clouds! It's going to rain. (you can see the evidence)
  - Watch out! You're going to fall! (you can see it happening)
  - She's studying hard. She's going to pass the exam. (evidence of effort)
- rule: Will for predictions without evidence (opinions, guesses)
  type: semantic
  examples:
  - I think it will be sunny tomorrow. (opinion)
  - You will love this movie. (prediction)
  - People will live longer in the future. (general prediction)
- rule: Will for promises and offers
  type: pragmatic
  examples:
  - I'll help you. (promise)
  - I'll carry that for you. (offer)
  - I won't tell anyone. (promise of secrecy)
use:
- context: Spontaneous decisions (will)
  description: Decisions made at the moment of speaking
  examples:
  - I'll have the pasta, please.
  - It's cold. I'll close the window.
  - I'll help you with that.
  - The phone is ringing. I'll answer it.
- context: Plans and intentions (going to)
  description: Things you have already decided to do
  examples:
  - I'm going to study tonight.
  - We're going to visit grandma on Sunday.
  - She's going to learn French.
  - They're going to buy a new car.
- context: Predictions with evidence (going to)
  description: When you can see something is about to happen
  examples:
  - Look at those clouds! It's going to rain.
  - Watch out! You're going to fall!
  - She's going to have a baby. (she's pregnant)
  - He's driving too fast. He's going to crash.
- context: Predictions without evidence (will)
  description: General predictions, opinions about the future
  examples:
  - I think it will be sunny tomorrow.
  - You will love this movie.
  - People will live longer in the future.
  - I don't think she will come.
- context: Promises and offers (will)
  description: Committing to do something or offering help
  examples:
  - I'll help you with your homework.
  - I'll carry that for you.
  - I won't tell anyone. (promise)
  - Will you marry me? (proposal)
phonetics:
- note: 'Contractions are essential: I will → I''ll /aɪl/, he will → he''ll /hiːl/,
    will not → won''t /wəʊnt/. Full forms sound overly formal in casual speech.'
  example_generator:
  - I'll /aɪl/
  - he'll /hiːl/
  - won't /wəʊnt/
  l1_issue: Portuguese and Spanish speakers often pronounce 'will' as /wɪl/ with a
    full vowel. Teach the contracted forms for natural speech.
- note: Going to is often reduced to /ɡənə/ or even /ɡɒnə/ in connected speech. 'I'm
    going to go' sounds like /aɪm ɡənə ɡəʊ/.
  example_generator:
  - going to → /ɡənə/
  - I'm going to → /aɪm ɡənə/
  l1_issue: Many L1 speakers over-prounce 'going to' as /ɡəʊɪŋ tuː/. Teach the reduced
    form for natural speech.
teaching:
  methodology: PPP (Present-Practice-Produce)
  tips:
  - 'Act out spontaneous decisions: pick up a bag and say ''I''ll help you!'' This
    makes the concept physical and immediate.'
  - 'Show a photo of dark clouds: ''What do you think? It''s going to rain!'' This
    demonstrates prediction with evidence.'
  - 'Compare side by side: ''I''ll make tea'' (just decided) vs ''I''m going to make
    tea'' (my plan for this evening).'
  - 'Use a calendar to practice plans: ''What are you going to do on Saturday?'' ''I''m
    going to visit my friend.'''
  - 'Practice predictions with weather forecasts: ''It will be sunny tomorrow'' (opinion)
    vs ''Look at those clouds — it''s going to rain'' (evidence).'
  recommended_activities:
  - name: Spontaneous Decisions Game
    duration: 10
    adaptation_notes: 'Teacher creates situations. Students respond with ''I''ll...'':
      ''It''s cold.'' → ''I''ll close the window.'' ''You look tired.'' → ''I''ll
      help you.'' Practices spontaneous decisions.'
  - name: Weekend Plans
    duration: 15
    adaptation_notes: 'Students ask about each other''s weekend plans: ''What are
      you going to do on Saturday?'' ''I''m going to visit my grandmother.'' Practices
      going to for plans.'
  - name: Weather Predictions
    duration: 10
    adaptation_notes: 'Show weather maps or photos. Students make predictions: ''It''s
      going to rain in London.'' (evidence) ''I think it will be sunny in Madrid.''
      (opinion). Practices both forms.'
  - name: Promise Chain
    duration: 10
    adaptation_notes: 'Student A makes a promise: ''I''ll help you with your homework.''
      Student B responds with another promise: ''I''ll bring the books.'' Continues
      around the class. Practices will for promises.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for will_vs_going_to.
  correction: Correct form.
  explanation: This is a common error for will_vs_going_to.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
