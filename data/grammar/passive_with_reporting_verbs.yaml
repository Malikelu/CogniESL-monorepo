grammar_point: passive_with_reporting_verbs
title: "Passive Voice with Reporting Verbs"
description: "A formal structure to report information using reporting verbs (say, report, claim, believe) in passive voice, often removing focus from the original speaker. Common in news and academic writing."
level: C1

meaning:
  core_meaning: "Reports information from an unspecified or unimportant source, making the statement seem more objective and formal. The focus is on the INFORMATION, not on WHO said it. This structure is very common in news reports, academic writing, and official statements."
  timeline: "Covers present (is said), past (was said), future (is expected to), and past completed actions (is said to have done). The tense of 'be' determines the time reference."
  contrast: "'Active' = 'People say the company is closing.' (focus on people) vs 'Passive' = 'The company is said to be closing.' (focus on company, more formal and objective)"
  ccqs:
    - question: "Is the focus on who said it, or on the information itself?"
      answer: "On the information — the speaker is unknown, unimportant, or obvious."
    - question: "Is this structure more common in formal or informal English?"
      answer: "Formal — news reports, academic writing, official statements. Rare in casual conversation."
    - question: "Which structure is more concise: 'It is said that...' or 'Subject is said to...'?"
      answer: "'Subject is said to...' is more concise. Both are correct and mean the same thing."
  example_generator:
    contexts:
      - news reports
      - academic writing
      - official statements
      - general knowledge
    cultural_notes:
      - "This structure is essential for academic writing (CAE, CPE, IELTS)"
      - "Common in news headlines and reports"
      - "Makes statements sound more objective and less biased"
    min_examples: 5

form:
  affirmative:
    structure: "Structure 1 (that-clause): It + be + past participle of reporting verb + that + clause / Structure 2 (infinitive): Subject + be + past participle + to + infinitive / Structure 3 (perfect infinitive): Subject + be + past participle + to have + past participle"
    example_generator:
      - "It is said that the company is closing. (Structure 1)"
      - "The company is said to be closing. (Structure 2)"
      - "The company is said to have closed. (Structure 3 — past action)"
    min_examples: 4
  negative:
    structure: "It + be + not + past participle + that / Subject + be + not + past participle + to + infinitive"
    example_generator:
      - "It is not believed that the story is true."
      - "The story is not believed to be true."
      - "He is not thought to have been involved."
    min_examples: 4
  questions:
    structure: "Be + it + past participle + that...? / Be + subject + past participle + to + infinitive?"
    example_generator:
      - "Is it said that the company is closing?"
      - "Is the company said to be closing?"
      - "Was he thought to have been involved?"
    min_examples: 4

sub_rules:
  - rule: "Structure 1: It + be + reporting verb (past participle) + that + clause"
    type: grammatical
    examples: ["It is said that the company is closing.", "It is believed that the earth is round.", "It was reported that three people were injured."]
  - rule: "Structure 2: Subject + be + reporting verb (past participle) + to + infinitive (present/future meaning)"
    type: grammatical
    examples: ["The company is said to be closing.", "The earth is believed to be round.", "Three people were reported to be injured."]
  - rule: "Structure 3: Subject + be + reporting verb (past participle) + to have + past participle (past meaning)"
    type: grammatical
    examples: ["The company is said to have closed.", "He is believed to have left the country.", "She is thought to have stolen the money."]
  - rule: "Common reporting verbs in passive: say, report, claim, believe, think, expect, know, allege, understand, estimate"
    type: lexical
    examples: ["It is said that...", "It is reported that...", "It is claimed that...", "It is believed that...", "It is expected that..."]
  - rule: "Structure 1 is more common in written English; Structure 2 is more concise"
    type: stylistic
    examples: ["It is said that he is rich. (written)", "He is said to be rich. (more concise)"]

use:
  - context: "Formal reporting in news and academic writing"
    description: "Presenting information objectively without naming the source"
    examples: ["It is claimed that the new drug is effective.", "The new drug is claimed to be effective.", "It is reported that unemployment is falling.", "Unemployment is reported to be falling."]
  - context: "Unknown or unimportant agent"
    description: "When the original speaker is unknown, irrelevant, or obvious"
    examples: ["It is thought that the ancient ruins are 2000 years old.", "The ruins are thought to be 2000 years old.", "It is known that smoking causes cancer.", "Smoking is known to cause cancer."]
  - context: "Objective tone"
    description: "Removing personal bias by not focusing on the speaker"
    examples: ["It is expected that the economy will grow.", "The economy is expected to grow.", "It is estimated that 1000 people attended.", "1000 people are estimated to have attended."]

phonetics:
  - note: "In passive reporting structures, the reporting verb is usually stressed: 'is SAID', 'is beLIEVED', 'is rePORTED'. The 'to' in infinitive structures is weak: /tə/."
    example_generator:
      - "is said /ɪz sed/"
      - "is believed /ɪz bɪˈliːvd/"
      - "to be /tə biː/"
    l1_issue: "Many L1 speakers struggle with the passive reporting structure. Drill the pattern: 'Subject + is/are + past participle + to + infinitive'."
  - note: "In Structure 1, 'it' is unstressed: /ɪt ɪz sed ðət/. The stress falls on the reporting verb and the content of the that-clause."
    example_generator:
      - "It is said that... /ɪt ɪz sed ðət/"
    l1_issue: "Portuguese and Spanish speakers may over-pronounce 'it' in 'It is said that...'. Teach the weak form."

teaching:
  methodology: "Guided discovery with news headlines"
  tips:
    - "Start with news headlines: rewrite active news sentences into passive reporting structures. 'People say the company is closing' → 'The company is said to be closing.'"
    - "Contrast Structure 1 and Structure 2 with the same content to show they mean the same thing."
    - "Create a reference list of common reporting verbs for passive structures: say, report, claim, believe, think, expect, know, allege."
    - "Practice transforming active to passive reporting: 'People believe he is guilty' → 'He is believed to be guilty.'"
    - "Use authentic news articles as examples. This structure is extremely common in journalism."
  recommended_activities:
    - name: "News Headline Transformation"
      duration: 15
      adaptation_notes: "Give students active news sentences. They transform them into passive reporting structures: 'People say the president will resign' → 'The president is said to be going to resign.'"
    - name: "Structure 1 or Structure 2?"
      duration: 10
      adaptation_notes: "Give students Structure 1 sentences. They rewrite them using Structure 2: 'It is believed that...' → 'Subject is believed to...'"
    - name: "Reporting Verb Matching"
      duration: 10
      adaptation_notes: "Students match reporting verbs to their meanings: 'claim' = state without proof, 'allege' = accuse without proof, 'estimate' = calculate approximately."
    - name: "Academic Writing Practice"
      duration: 15
      adaptation_notes: "Students write sentences using passive reporting structures for academic writing: 'It is argued that...' 'Studies suggest that...' 'It is estimated that...'"
