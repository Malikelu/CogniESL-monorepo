grammar_point: its_time
title: It is Time (Due or Overdue Actions)
description: A structure used to indicate that an action is due to happen now, often
  with a sense of urgency or that it is overdue.
level: B2
meaning:
  core_meaning: Signals that an action is due, expected, or overdue, often with mild
    urgency or reproach.
  timeline: Refers to present time. The action should happen now or very soon.
  contrast: It is time to X = general reminder. It is time subject + past simple =
    personal, specific.
  ccqs:
  - question: Is this a general reminder or about a specific person
    answer: It is time to X = general. It is time you + past simple = specific person.
    purpose: Tests whether the learner understands that 'it's time' is followed by
      a past tense verb to express that something should have already happened. This
      is a very unusual structure.
  - question: What tense follows the subject in it is time you
    answer: Past simple, even though we mean now or the future.
    purpose: Tests whether the learner can identify and apply the correct form/meaning
      of this grammar point in context. The question 'What tense follows the subject
      in it is time you...' checks conceptual understanding, not just memorization.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      its time and explain why they are incorrect.
  example_generator:
    contexts:
    - everyday situations
    - giving advice
    cultural_notes:
    - The past simple after it is time is subjunctive
    min_examples: 5
form:
  affirmative:
    structure: 'It is time to base verb or It is time subject past simple

      '
    example_generator:
    - It is time to wake up.
    - It is time for class to start.
    - It is time we cleaned the garage.
    min_examples: 4
  negative:
    structure: It is time not to base verb
    example_generator:
    - It is time not to worry so much.
    min_examples: 3
  questions:
    structure: 'Is it time to base verb or Is it time subject past simple

      '
    example_generator:
    - Is it time to leave
    - Is it time we went home
    min_examples: 3
sub_rules:
- rule: It is time to base verb for general reminders
  type: grammatical
  examples:
  - It is time to wake up
  - It is time to go home
- rule: It is time subject past simple for specific people
  type: grammatical
  examples:
  - It is time you apologized
  - It is time we left
- rule: It is high time subject past simple for strong emphasis
  type: grammatical
  examples:
  - It is high time you got a job
- rule: It is about time subject past simple for frustration
  type: grammatical
  examples:
  - It is about time you visited your parents
use:
- context: Routine reminders
  examples:
  - It is time to wake up
  - It is time for class to start
- context: Overdue actions
  examples:
  - It is time we cleaned the garage
  - It is time you apologized
phonetics:
- note: The word time is stressed. The past simple verb is usually unstressed.
  example_generator:
  - time as /taɪm/
  l1_issue: Many L1 speakers use present tense after it is time you. Teach that past
    simple is required.
teaching:
  methodology: Guided discovery with real-life scenarios
  tips:
  - Start with daily routines using It is time to X.
  - 'Contrast the two structures: general vs specific.'
  recommended_activities:
  - name: Daily Routine Reminders
    duration: 10
    adaptation_notes: Students create reminders using It is time to.
  - name: Overdue Actions
    duration: 15
    adaptation_notes: Students write sentences about overdue actions.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 10:
    Conditionals, §10.5 (it is time + past subjunctive)'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 8: Conditionals, §8.4'
  validation: Swan (2016) Practical English Usage, 4th ed. Entries 280-285 (it is
    time)
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    9: It-constructions'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 8: It is time'
common_errors:
- error: '*It''s time to go to the doctor.* (less urgent)'
  correction: It's time you went to the doctor.
  explanation: '''It''s time + subject + past tense'' expresses urgency/that something
    is overdue. ''It''s time to + verb'' is more neutral.'
  l1_groups:
  - Portuguese
  - Spanish
  - French
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
