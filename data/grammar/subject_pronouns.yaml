grammar_point: subject_pronouns
title: Subject Pronouns
description: 'Pronouns that replace the subject of a sentence: I, you, he, she, it,
  we, they.'
level: A1
meaning:
  core_meaning: Subject pronouns replace nouns to avoid repetition. They refer to
    the person or thing performing the action.
  timeline: Timeless — applies to all tenses.
  contrast: '''Subject pronoun'' = ''She reads.'' (replaces a name) vs ''Noun'' =
    ''Maria reads.'' (specific name)'
  ccqs:
  - question: Does the subject pronoun perform the action in this sentence?
    answer: Yes — the subject pronoun is the doer of the action.
    purpose: Tests whether the learner can identify the subject of a sentence and
      choose the correct subject pronoun (I, you, he, she, it, we, they). This tests
      grammatical role recognition, not just meaning.
  - question: Is the pronoun singular or plural?
    answer: It depends on the referent — singular (I, you, he, she, it) or plural
      (we, they).
    purpose: Tests whether the learner understands that subject pronouns must agree
      in number with their referent, which affects verb agreement in the sentence.
  - question: Can we omit the subject pronoun in English?
    answer: No — English requires an explicit subject pronoun in all finite clauses.
    purpose: Tests whether the learner understands that English is not a pro-drop
      language. This is critical for speakers of Spanish, Arabic, Japanese, and other
      pro-drop L1s who may produce '*Am happy' instead of 'I am happy'.
  example_generator:
    contexts:
    - introductions
    - describing people
    - daily activities
    - family
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + verb: ''I walk.'', ''She reads.'''
    example_generator:
      contexts:
      - introductions
      - describing people
      - daily activities
      min_examples: 4
  negative:
    structure: 'Subject + don''t/doesn''t + verb: ''I don''t walk.'', ''She doesn''t
      read.'''
    example_generator:
      contexts:
      - introductions
      - describing people
      - daily activities
      min_examples: 4
  questions:
    structure: 'Do/Does + subject + verb?: ''Do I walk?'', ''Does she read?'''
    example_generator:
      contexts:
      - introductions
      - describing people
      - daily activities
      min_examples: 4
sub_rules:
- rule: '''I'' is always capitalized'
  type: spelling
  examples:
  - I am happy. ✅ / i am happy. ❌
- rule: '''You'' is the same for singular and plural'
  type: grammatical
  examples:
  - You are my friend. (singular)
  - You are my friends. (plural)
use:
- context: Introducing yourself
  description: Using 'I' to talk about yourself
  examples:
  - I am a student.
  - I live in Brazil.
- context: Talking about others
  description: Using he/she/they to refer to people
  examples:
  - She is a teacher.
  - They are my friends.
phonetics:
- note: Weak form of 'he' /hiː/ → /hɪ/ in connected speech
  contexts:
  - connected speech
  l1_issue: Some L1 speakers over-pronounce subject pronouns
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use substitution drills (name → pronoun)
  - Use visual aids showing who each pronoun refers to
  recommended_activities:
  - name: Pronoun Substitution
    duration: 10
    adaptation_notes: Replace nouns with pronouns in simple sentences.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, 12.14-12.15'
  secondary: 'Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Ch. 5: Nouns and Noun Phrases, 5.8 (pronouns)'
  validation: 'Swan (2016) Practical English Usage, 4th ed. Entries 81-100 (pronouns:
    personal, possessive, reflexive)'
  pedagogical: 'Parrott (2010) Grammar for English Language Teachers, 2nd ed. Ch.
    11: Pronouns, 11.1-11.3'
  teaching_practice: 'Folse (2009) Keys to Teaching Grammar to English Language Learners.
    Ch. 6: Pronouns'
common_errors:
- error: 'Using object pronouns as subjects: *''Me and John went.'''
  correction: John and I went.
  explanation: Use subject pronouns (I, you, he, she, we, they) as the subject.
  l1_groups:
  - Portuguese
  - Spanish
- error: 'Using ''I'' after prepositions: *''Between you and I.'''
  correction: Between you and me.
  explanation: Use object pronouns (me, you, him, her, us, them) after prepositions.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: Subject pronouns are used in all registers, from casual conversation to academic writing, with formality marked by contraction use rather than pronoun choice.
- note: 'In formal writing, avoid contractions with subject pronouns: ''I am'' (not
    ''I''m''), ''they are'' (not ''they''re'').'
- note: In conversation, subject pronouns are among the most frequent words in English.
dialectal_variation:
- note: 'In informal speech, ''me'' is sometimes used as subject: ''Me and him went.''
    (non-standard)'
discourse_notes:
- note: In conversation, subject pronouns are often omitted in pro-drop languages
    (Spanish, Arabic, Japanese) but are required in English.
- note: In academic writing, subject pronouns create cohesion by referring back to
    previously mentioned nouns.
- note: 'In informal speech, ''you'' is used generically: ''You never know what might
    happen.'' (meaning ''people in general'').'
