grammar_point: reciprocal_pronouns
title: Reciprocal Pronouns (each other, one another)
description: 'Pronouns that show a mutual action or relationship between two or more
  people/things: each other (traditionally two), one another (traditionally three+;
  modern English often uses each other for all cases).'
level: A2
meaning:
  core_meaning: Indicate that two or more people/things perform the same action toward
    each other mutually.
  timeline: N/A (Reciprocal pronouns are not tense-based; they describe mutual relationships
    regardless of time.)
  contrast: 'each other = Traditionally two people/things (modern English: any number)

    one another = Traditionally three+ people/things (modern English: interchangeable
    with each other)

    Never add ''s'': "each others" (wrong) vs "each other" (right)

    '
  ccqs:
  - question: What is the difference between each other and one another
    answer: Each other is for two people. One another is for more than two.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + verb + reciprocal pronoun: "They like each other."

      Reciprocal pronouns act as objects: "We help one another."

      '
    example_generator:
      contexts:
      - family and relationships
      - sports and hobbies
      min_examples: 4
  negative:
    structure: 'Reciprocal pronouns follow negative verbs: ''They don''t see each
      other often.'' ''We haven''t met one another yet.'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Reciprocal pronouns follow verbs in questions: ''Do they know each
      other?'' ''Have you met one another?'''
    example_generator:
      contexts:
      - education and school
      min_examples: 4
sub_rules:
- rule: Each other for two people
  type: grammatical
  examples:
  - They love each other
  - We help each other
  - The two friends hugged each other
- rule: One another for more than two (traditional usage)
  type: grammatical
  examples:
  - The students helped one another
  - The team members support one another
- rule: 'Position: reciprocal pronouns usually come after the verb'
  type: word_order
  examples:
  - They love each other (NOT Each other they love)
  - We help each other (NOT Each other we help)
- rule: 'Possessive form: each other''s / one another''s'
  type: grammatical
  examples:
  - They read each other's emails
  - We respect one another's opinions
use:
- name: Mutual Actions
  description: Describe actions done by two+ people to each other.
  examples:
  - They kissed each other.
  - The neighbors help one another.
  key_point: Action flows both ways between the subjects.
- name: Mutual Relationships
  description: Describe connections between two+ people.
  examples:
  - The two dogs play with each other.
  - The club members care for one another.
  key_point: Always refers to a two-way relationship.
phonetics:
- note: 'Each other is often reduced in connected speech: /iːtʃ ʌðə/. One another
    → /wʌn ənʌðə/.'
  example_generator:
    contexts:
    - connected speech
  l1_issue: Portuguese speakers may say 'each one other' separately. Teach the blended
    pronunciation.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Explain mutual action with pair drawings (two stick figures with arrows
    between them).'
  - 'Week 2: Drill ''each other'' with pairs, ''one another'' with groups.'
  - 'Use roleplay: Two students act out mutual actions (hug, argue) and describe with
    reciprocal pronouns.'
  recommended_activities:
  - name: Each Other or Themselves
    duration: 10
    adaptation_notes: 'Students choose: ''They love each other'' (two people) vs ''They
      love themselves'' (reflexive).'
  - name: Reciprocal Pronoun Practice
    duration: 15
    adaptation_notes: 'Students write sentences about their relationships: ''My best
      friend and I help each other.'''
