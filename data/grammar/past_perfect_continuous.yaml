grammar_point: past_perfect_continuous
title: Past Perfect Continuous (had been + -ing)
description: Describes actions that were ongoing before another action or moment in
  the past. Emphasizes duration.
level: B1
meaning:
  core_meaning: An action that was in progress for a period of time before another
    action or a specific moment in the past.
  timeline: Before-past. One ongoing past action is interrupted or referenced by another
    past event.
  contrast: '''Past Perfect Continuous'' = "She had been studying for 3 hours when
    I arrived."

    ''Past Simple'' = "She studied for 3 hours."

    Emphasizes the duration leading up to a past moment.

    '
  ccqs:
  - question: What is the difference between past perfect and past perfect continuous
    answer: Past perfect = completed action. Past perfect continuous = ongoing action
      with focus on duration.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + had + been + V-ing: "I had been walking."

      Same for all subjects (no 3rd person variation).

      '
    example_generator:
      contexts:
      - education and school
      - food and daily routines
      min_examples: 4
  negative:
    structure: 'Subject + had not (hadn''t) + been + V-ing: ''I hadn''t been sleeping.''
      ''She hadn''t been working.'''
    example_generator:
      contexts:
      - shopping and commerce
      - social interactions
      min_examples: 4
  questions:
    structure: 'Had + subject + been + V-ing: ''Had you been running?'' ''Had she
      been studying?'''
    example_generator:
      contexts:
      - health and wellbeing
      min_examples: 4
sub_rules:
- rule: 'Structure: had been + verb-ing'
  type: grammatical
  examples:
  - I had been waiting for 2 hours
  - She had been studying all day
  - They had been living there for 5 years
- rule: Used to show duration of an action that was in progress before another past
    action
  type: semantic
  examples:
  - I had been waiting for 2 hours when the bus finally came
  - She had been studying all day when she fell asleep
- rule: Often used with for and since to show duration
  type: grammatical
  examples:
  - I had been waiting for 2 hours
  - She had been studying since morning
use:
- name: Duration Before a Past Event
  description: Shows how long something had been happening before something else occurred.
  examples:
  - I had been waiting for 20 minutes when the bus finally arrived.
  - She had been working there for 5 years when she got promoted.
  key_point: 'Often used with time expressions: for, since, all morning, all day.'
- name: Cause of a Past Situation
  description: Explains why something was the way it was at a past moment.
  examples:
  - He was tired because he had been running.
  - The kitchen was dirty because they had been cooking all day.
  key_point: The continuous action explains a visible result in the past.
- name: Ongoing Past Actions Interrupted
  description: An action in progress that is interrupted by a sudden past event (often
    with 'when').
  examples:
  - We had been walking home when it started raining.
  - She had been reading when the phone rang.
  key_point: Use Past Perfect Continuous for the ongoing action, Past Simple for the
    interruption.
phonetics:
- note: 'Had been is often contracted in speech: ''I''d been waiting'' /aɪd biːn ˈweɪtɪŋ/.
    The contraction is very common.'
  example_generator:
    contexts:
    - had been contraction
  l1_issue: Many L1 speakers do not contract 'had been' in speech. Teach the contracted
    forms.
teaching:
  methodology: PPP
  tips:
  - 'Use a timeline diagram: show Past Perfect Continuous as a long line leading up
    to a point, then Past Simple as a dot.'
  - 'Practice with ''why'' questions: ''Why were you wet?'' ''Because I had been walking
    in the rain.'''
  - 'Contrast with Past Perfect Simple: ''I had read 10 books'' (completed) vs ''I
    had been reading all night'' (ongoing).'
  recommended_activities:
  - name: Duration Before Past
    duration: 15
    adaptation_notes: 'Students describe what had been happening before a past event:
      ''When the teacher arrived, the students had been talking for 10 minutes.'''
  - name: Past Perfect or Past Perfect Continuous
    duration: 10
    adaptation_notes: 'Students choose the correct form based on context: completed
      action vs ongoing action.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
