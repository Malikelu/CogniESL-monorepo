grammar_point: verbs_followed_by_ing
title: Verbs Followed by -ing (enjoy, avoid, suggest)
description: Verbs that must be followed by the -ing form (gerund), not the infinitive.
  Essential for accurate verb patterns.
level: B1
meaning:
  core_meaning: These verbs require -ing form as their direct object. The -ing acts
    as a noun (gerund).
  timeline: N/A (Verb pattern is about grammar, not time - though meaning of verb
    affects tense.)
  contrast: '''Enjoy + -ing'' (correct) vs ''enjoy + to'' (wrong)

    ''Suggest + -ing'' (correct) vs ''suggest + to'' (wrong)

    These are MEMORIZED patterns - no logic rule

    '
  ccqs:
  - question: Which verbs are followed by ing
    answer: Enjoy, avoid, finish, mind, suggest, recommend, deny, admit.
    purpose: Tests whether the learner understands a key concept of verbs_followed_by_ing.
      This is fundamental for correct use of this grammar point.
  - question: Can we use a different structure here with the same meaning?
    answer: No — changing the structure would change the meaning or make the sentence
      ungrammatical.
    purpose: Tests whether the learner understands that verbs followed by ing is the
      only appropriate structure for this meaning/context.
  - question: What would be wrong with [alternative structure]?
    answer: '[Alternative structure] would be incorrect because [reason].'
    purpose: Tests whether the learner can identify common errors associated with
      verbs followed by ing and explain why they are incorrect.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Verb + -ing: "I enjoy swimming."

      Verb + object + -ing: "I caught him leaving."

      Common verbs: enjoy, avoid, suggest, mind, finish, keep, practice, consider,
      deny, imagine

      '
    example_generator:
      contexts:
      - food and daily routines
      - weather and nature
      min_examples: 4
  negative:
    structure: 'Verb + not + -ing: ''I suggest not going.'''
    example_generator:
      contexts:
      - work and professional life
      - food and daily routines
      min_examples: 4
  questions:
    structure: Question word + auxiliary + subject + verb + -ing?
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Enjoy, avoid, finish, mind, suggest, recommend, deny, admit followed by ing
  type: grammatical
  examples:
  - I enjoy reading
  - She avoids eating sugar
  - He finished working
  - Do you mind waiting
  - I suggest taking a break
- rule: Preposition + ing (interested in, good at, keen on, afraid of)
  type: grammatical
  examples:
  - I am interested in learning languages
  - She is good at playing tennis
  - He is keen on hiking
  - They are afraid of flying
- rule: 'Some verbs can take both ing and to with different meanings: stop, remember,
    forget, try, regret, go on'
  type: semantic
  examples:
  - I stopped smoking (quit the habit)
  - I stopped to smoke (paused in order to smoke)
  - I remember locking the door (memory of past action)
  - I remembered to lock the door (did not forget to do it)
use:
- name: Enjoyment/Experience (enjoy, like, love, hate, prefer)
  description: Verbs about liking/disliking take -ing.
  examples:
  - I enjoy swimming.
  - She hates waking up early.
  key_point: These can also take 'to' with meaning change (like to swim = habit; like
    swimming = general).
- name: Avoidance/Completion (avoid, finish, stop, quit)
  description: Verbs about stopping or completing actions.
  examples:
  - Avoid smoking.
  - Finish writing.
  - Stop talking.
  key_point: These ONLY take -ing, never 'to'.
- name: Suggestion/Mind (suggest, mind, recommend, admit)
  description: Verbs about suggestions or admissions.
  examples:
  - I suggest going.
  - Do you mind waiting?
  - He admitted stealing.
  key_point: Suggest is ALWAYS followed by -ing, never 'to suggest to do'.
phonetics:
- note: The ing ending is pronounced /ɪŋ/ in standard English. Some learners may pronounce
    it as /ɪn/ or /ɪŋg/. Teach the correct /ɪŋ/ pronunciation.
  example_generator:
    contexts:
    - ing pronunciation
  l1_issue: Portuguese and Spanish speakers may pronounce the ing ending as /in/ or
    /iŋg/. Drill the correct /ɪŋ/ sound.
teaching:
  methodology: PPP
  tips:
  - 'Group verbs by category: enjoyment, avoidance, suggestion.'
  - 'Use memory aids: ''Enjoy, avoid, suggest'' all end with similar sounds, all take
    -ing.'
  - Practice with 'Do you mind...?' as polite classroom requests.
  recommended_activities:
  - name: Verb Sorting
    duration: 10
    adaptation_notes: 'Students sort verbs into three groups: ing only, to only, and
      both (with meaning change).'
  - name: Meaning Change
    duration: 15
    adaptation_notes: 'Students create pairs of sentences showing the meaning change:
      ''I stopped smoking'' vs ''I stopped to smoke.'' ''I remember locking'' vs ''I
      remembered to lock.'''
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 9:
    Modals, §9.1-9.6'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*I want that he comes.*'
  correction: I want him to come.
  explanation: Want + person + to + verb.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
