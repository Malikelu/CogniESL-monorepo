grammar_point: passive_voice
title: Passive Voice (be + past participle)
description: Focuses on the action or recipient of the action, not the doer. Formed
  with be + past participle (V3). Used when the doer is unknown, unimportant, or obvious.
level: B1
meaning:
  core_meaning: Shifts focus from the doer (agent) to the action or the person/thing
    affected by the action. The doer can be omitted or added with 'by' if needed.
    The passive is used when the action itself is more important than who did it.
  timeline: 'Follows active voice tense: Present Passive = present action, Past Passive
    = past action, Future Passive = future action. The tense of ''be'' determines
    the time.'
  contrast: '''Active'' = ''I wrote the book.'' (focus on doer: I) vs ''Passive''
    = ''The book was written (by me).'' (focus on book, the recipient of the action)'
  ccqs:
  - question: Is the focus on who did the action, or on the action itself?
    answer: On the action or the recipient — that is passive voice.
  - question: Do we know who did the action?
    answer: Not necessarily — the doer may be unknown, unimportant, or obvious.
  - question: Can we add 'by + doer' to a passive sentence?
    answer: Yes, but only when the doer is important or unknown. Often it is omitted.
  example_generator:
    contexts:
    - news reports
    - formal writing
    - scientific descriptions
    - everyday situations
    - processes and instructions
    cultural_notes:
    - Passive voice is very common in news reports, scientific writing, and formal
      texts
    - Some languages use passive voice much less frequently than English
    - Overuse of passive can make writing sound impersonal — teach appropriate use
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + be + past participle (V3). The tense of ''be'' determines
      the time: present = am/is/are, past = was/were, future = will be, modal = modal
      + be.'
    example_generator:
    - The book is written. (present)
    - The book was written. (past)
    - The book will be written. (future)
    - The book must be written. (modal)
    min_examples: 4
  negative:
    structure: Subject + be + not + past participle
    example_generator:
    - The book isn't written.
    - The car wasn't repaired.
    - The letter won't be sent.
    - The work can't be finished today.
    min_examples: 4
  questions:
    structure: Be + subject + past participle?
    example_generator:
    - Is English spoken here?
    - Was the car repaired?
    - Will the report be finished?
    - Can the work be done today?
    min_examples: 4
sub_rules:
- rule: Only transitive verbs (verbs that take an object) can be made passive
  type: grammatical
  examples:
  - The window was broken. (break = transitive, can be passive)
  - The accident was happened. (happen = intransitive, CANNOT be passive — a common
    learner error)
  - The train was arrived on time. (arrive = intransitive, CANNOT be passive — another
    common error)
- rule: The doer can be added with 'by' when it is important or informative
  type: grammatical
  examples:
  - The book was written by Shakespeare.
  - The cake was made by my mother.
  - The building was designed by a famous architect.
- rule: When the doer is unknown, unimportant, or obvious, omit the 'by' phrase
  type: grammatical
  examples:
  - The bank was robbed last night. (unknown doer)
  - English is spoken here. (unimportant doer)
  - The patient was treated immediately. (obvious doer = doctor)
- rule: Present passive for general truths and processes
  type: semantic
  examples:
  - Rice is grown in Asia.
  - Coffee is produced in Brazil.
  - The Eiffel Tower is visited by millions of people every year.
- rule: Past passive for completed actions in the past
  type: semantic
  examples:
  - The bridge was built in 1990.
  - The letter was sent yesterday.
  - The window was broken during the storm.
use:
- context: News reports
  description: Reporting events when the doer is unknown or unimportant
  examples:
  - The bank was robbed last night.
  - Three people were injured in the accident.
  - The president was elected yesterday.
- context: Formal and academic writing
  description: Creating an objective, impersonal tone
  examples:
  - The study was conducted in 2023.
  - Results are presented below.
  - The data was analyzed using statistical methods.
- context: Processes and instructions
  description: Describing how something is made or done
  examples:
  - The grapes are harvested in September.
  - The wine is aged for two years.
  - The product is packaged and shipped.
- context: Everyday situations
  description: When the action or recipient is more important than the doer
  examples:
  - The package will be delivered tomorrow.
  - My car was repaired last week.
  - The restaurant is closed on Mondays.
phonetics:
- note: 'The past participle ending -ed has three pronunciations: /t/ (worked, stopped),
    /d/ (played, lived), /ɪd/ (wanted, needed). This is the same as Past Simple -ed
    pronunciation.'
  example_generator:
  - worked /wɜːkt/ (voiceless → /t/)
  - played /pleɪd/ (voiced → /d/)
  - wanted /wɒntɪd/ (/t/ ending → /ɪd/)
  l1_issue: Portuguese and Spanish speakers often pronounce -ed as a full syllable
    /ed/ in all cases. Drill the three pronunciations.
- note: 'Weak form of ''be'' in passive: ''is'' → /z/ or /s/, ''are'' → /ə/, ''was''
    → /wəz/, ''were'' → /wə/. ''The book is written'' sounds like /ðə bʊk z rɪtn/.'
  example_generator:
  - is /z/ or /s/
  - are /ə/
  - was /wəz/
  l1_issue: Many L1 speakers over-pronounce 'be' in passive sentences. Teach weak
    forms for natural speech.
teaching:
  methodology: Guided discovery with contrastive analysis
  tips:
  - 'Start with present passive: ''The window is cleaned every week.'' This is the
    most common and useful form.'
  - 'Contrast active and passive with the same sentence: ''I clean the window'' vs
    ''The window is cleaned.'' Use the same context to show the difference in focus.'
  - 'Use real examples from news headlines: ''Three people were injured in an accident.''
    This shows authentic use of passive.'
  - 'Teach the ''by'' phrase as optional: ''The book was written (by Shakespeare).''
    Only add ''by'' when the doer is important.'
  - Practice transforming active to passive and vice versa. This helps students understand
    the relationship between the two forms.
  recommended_activities:
  - name: News Headlines
    duration: 10
    adaptation_notes: Show real news headlines using passive voice. Students identify
      the passive structure and rewrite in active voice (if possible). 'Three people
      were injured' → 'An accident injured three people.'
  - name: Process Description
    duration: 15
    adaptation_notes: 'Students describe how something is made (chocolate, coffee,
      cars) using present passive: ''The beans are harvested. They are dried. They
      are roasted.'' Practices present passive for processes.'
  - name: Active or Passive?
    duration: 10
    adaptation_notes: 'Teacher says a sentence. Students identify if it is active
      or passive. Then transform it: ''The teacher explained the lesson.'' (active)
      → ''The lesson was explained by the teacher.'' (passive)'
  - name: Mystery Stories
    duration: 15
    adaptation_notes: 'Students write a short mystery story using passive voice: ''The
      window was broken. The jewelry was stolen. The door was locked.'' Practices
      past passive for storytelling.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using intransitive verbs in passive: *''The accident was happened.'''
  correction: The accident happened.
  explanation: Only transitive verbs can be made passive.
  l1_groups:
  - Portuguese
  - Spanish
  - Arabic
register_notes:
- note: Passive voice is more common in formal and academic writing than in conversation.
- note: In scientific writing, passive is traditional but modern style guides accept
    active voice.
- note: Overuse of passive can make writing sound impersonal and wordy.
dialectal_variation:
- note: 'BrE sometimes uses "get-passive" informally: "He got promoted."'
discourse_notes:
- note: Passive voice foregrounds the patient rather than the agent.
- note: Passive is used when the agent is unknown, unimportant, or obvious.
- note: In scientific writing, passive creates an impersonal tone.
