grammar_point: definitely_probably
title: Definitely / Probably (certainty, probability)
description: Adverbs used to express degrees of certainty (definitely = 100%) and
  probability (probably = 70-80%).
level: B1
meaning:
  core_meaning: Definitely = 100% certainty; probably = 70-80% probability that something
    will happen.
  timeline: Refers to future events; can also refer to present certainty.
  contrast: 'Definitely = 100% sure: "I will definitely come" (no doubt)

    Probably = 70-80% sure: "I will probably come" (very likely)

    Possibly = 30-50% sure: "I might possibly come" (maybe)

    '
  ccqs:
  - question: '"She will definitely pass the exam." Does this mean there is some doubt?'
    answer: No — "definitely" means 100% certainty, no doubt at all.
  - question: '"It will probably rain" — is this more or less certain than "It might
      rain"?'
    answer: More certain — "probably" (70-80%) is stronger than "might" (30-50%).
  - question: Can you use "definitely" to talk about the present, or only the future?
    answer: Both — "She is definitely at home" (present) and "She will definitely
      come" (future).
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + will + definitely/probably + base verb (or: It is definitely/probably
      + adjective)'
    example_generator:
      contexts:
      - entertainment and media
      - weather and nature
      - social interactions
      min_examples: 4
  negative:
    structure: Subject + will + probably + not + base verb (definitely not = 0% chance)
    example_generator:
      contexts:
      - weather and nature
      - social interactions
      min_examples: 4
  questions:
    structure: Will + subject + definitely/probably + base verb?
    example_generator:
      contexts:
      - weather and nature
      min_examples: 4
sub_rules:
- rule: Definitely expresses 95-100% certainty — the speaker has no doubt
  type: semantic
  examples:
  - She will definitely pass the exam
  - It will definitely rain tomorrow
  - He is definitely coming to the party
- rule: Probably expresses 70-90% certainty — the speaker thinks it is likely but
    is not sure
  type: semantic
  examples:
  - She will probably pass the exam
  - It will probably rain tomorrow
  - He is probably coming to the party
- rule: 'Position: these adverbs go before the main verb but be and after the first
    auxiliary'
  type: word_order
  examples:
  - She will definitely come (before main verb)
  - She is definitely coming (after be)
  - She has definitely come (after auxiliary)
use:
- name: Certain Promises (Definitely)
  description: Make promises or state absolute certainty.
  examples:
  - I will definitely finish the work by Friday.
  - She will definitely get the job.
  key_point: No doubt; 100% sure.
- name: High Probability (Probably)
  description: State something is very likely to happen.
  examples:
  - It will probably take 2 hours to get there.
  - We will probably see higher prices.
  key_point: 70-80% chance; very likely.
- name: Present Certainty
  description: Express certainty about present situations.
  examples:
  - She is definitely at home now.
  - This is probably the best option.
  key_point: Based on current knowledge.
phonetics:
- note: Definitely is pronounced /ˈdefɪnətli/ with stress on the first syllable. Probably
    is /ˈprɒbəbli/ and is often reduced to /ˈprɒbli/.
  example_generator:
    contexts:
    - adverb reduction
  l1_issue: Learners may over-pronounce every syllable, sounding unnatural. Teach
    the reduced forms.
teaching:
  methodology: Use a communicative approach with real-life contexts (weather forecasts,
    promises, predictions). Begin with a contextualised presentation using a short
    dialogue or video clip, then move to controlled drills (sentence completion) and
    freer practice (role-plays and surveys). Emphasise the probability scale as a
    visual scaffold throughout.
  tips:
  - Use probability scales (0-100%) to contrast definitely (100), probably (70-80),
    possibly (30-50).
  - 'Role-play: Student makes promises using ''definitely''.'
  - 'Practice weather predictions: ''It will probably rain''.'
  - Contrast with 'might' and 'could' for lower probability.
  recommended_activities:
  - name: Probability Line
    duration: 10
    adaptation_notes: 'Draw a line from 0% to 100%. Students place expressions: definitely
      (95%), probably (70%), maybe (50%), probably not (30%), definitely not (5%).'
  - name: Prediction Game
    duration: 15
    adaptation_notes: Students make predictions about the weekend, next year, or classmates
      using definitely and probably.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
