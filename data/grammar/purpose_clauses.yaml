grammar_point: purpose_clauses
title: Purpose Clauses (to infinitive, in order to, so that)
description: Structures that express why someone does something. Essential for explaining
  intentions.
level: B1
meaning:
  core_meaning: Expresses the intention or goal behind an action - answers 'Why?'
    with intention, not cause.
  timeline: Present/past form shows when intention existed, not when goal is achieved.
  contrast: '''To infinitive'' = simple purpose (most common)

    ''In order to'' = emphatic/formal purpose

    ''So that'' = purpose with subject change (often modal)

    ''For + noun'' = purpose (simpler): "I went for milk."

    '
  ccqs:
  - question: What conjunctions introduce purpose clauses
    answer: To plus base verb, so that plus clause, in order to plus base verb.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Main clause + to + verb: "I went to buy milk."

      Main clause + in order to + verb: "I went in order to buy milk."

      Main clause + so that + clause: "I went so that I could buy milk."

      '
    example_generator:
      contexts:
      - education and school
      - shopping and commerce
      - health and wellbeing
      min_examples: 4
  negative:
    structure: 'To + not + verb: ''I went to not see him'' (rare) OR ''I didn''t go
      to see him'' (better).'
    example_generator:
      contexts:
      - education and school
      min_examples: 4
  questions:
    structure: Why + auxiliary + subject + verb? 'Why did you go?' 'To buy milk.'
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: To + base verb (most common)
  type: grammatical
  examples:
  - I study to pass the exam
  - She went to the store to buy milk
  - They called to invite us
- rule: So that + subject + verb (with a different subject)
  type: grammatical
  examples:
  - I study hard so that I can pass
  - She left early so that she would not be late
- rule: In order to + base verb (more formal)
  type: grammatical
  examples:
  - I study in order to pass
  - She left in order to arrive on time
use:
- name: Simple Purpose (to + verb)
  description: Most common way to express purpose.
  examples:
  - I came to see you.
  - She called to say hello.
  key_point: Same subject for main clause and purpose clause.
- name: Emphatic Purpose (in order to)
  description: More formal or emphatic than 'to'.
  examples:
  - I'm studying in order to pass.
  - We met in order to discuss the plan.
  key_point: In order to = 'to' with extra emphasis.
- name: Purpose with Different Subjects (so that)
  description: When subjects differ between main and purpose clause.
  examples:
  - I told him so that he would know.
  - She left early so that she wouldn't be late.
  key_point: So that + subject + modal (can, will, could, would).
phonetics:
- note: 'To is usually weak before a verb: ''I study to pass'' → /aɪ ˈstʌdi tə pɑːs/.
    So that → /səʊ ðət/.'
  example_generator:
    contexts:
    - purpose clause pronunciation
  l1_issue: 'Portuguese speakers may use ''for'' instead of ''to'' for purpose. Teach:
    ''I study to pass'' NOT ''I study for pass.'''
teaching:
  methodology: PPP
  tips:
  - 'Ask ''Why?'' and accept ''To...'' answers: ''Why did you come?'' ''To see you.'''
  - 'Practice ''so that'' with modals: ''so that I can/will/could/would...'''
  - 'Compare: ''I came because I was invited'' (reason) vs ''I came to see you'' (purpose).'
  recommended_activities:
  - name: Why
    duration: 10
    adaptation_notes: 'Teacher says an action. Students explain the purpose: ''I went
      to the store.'' → ''I went to the store to buy milk.'''
  - name: Purpose Chain
    duration: 15
    adaptation_notes: 'Students create chains: ''I woke up early to catch the bus.
      I caught the bus to get to school.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
