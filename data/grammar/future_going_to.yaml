grammar_point: future_going_to
title: 'Future: Going To (Plans & Predictions)'
description: 'Structure used to talk about planned future actions and predictions
  based on current evidence: am/is/are going to + base verb.'
level: A2
meaning:
  core_meaning: Planned future actions (intentions) and predictions based on current
    evidence.
  timeline: 'Future: Plans made before speaking, predictions based on what you see
    now.'
  contrast: '''Going To'' = Plan/prediction with evidence: "I''m going to travel (plan)",
    "Look at the clouds, it''s going to rain (evidence)"

    ''Will'' = Spontaneous decision: "I will travel (decide now)"

    ''Present Continuous'' = Fixed arrangement: "I''m traveling tomorrow (booked)"

    '
  ccqs:
  - question: '''I am going to travel next month.'' Did I decide just now or before
      now?'
    answer: Before now — 'going to' is for plans made before speaking.
  - question: '''Look at those clouds! It is going to rain.'' What evidence do I have?'
    answer: The dark clouds — 'going to' is for predictions based on visible evidence.
  - question: '''I am going to eat pizza tonight.'' Is this a spontaneous decision?'
    answer: No — it is a plan. For spontaneous decisions, use 'will.'
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Am/is/are + going to + base verb: ''I am going to travel next month.'''
    example_generator:
      contexts:
      - food and daily routines
      - shopping and commerce
      min_examples: 4
  negative:
    structure: 'Am/is/are not + going to + base verb: ''I am not going to travel.'''
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: 'Invert am/is/are and subject: ''Are you going to travel?'''
    example_generator:
      contexts:
      - shopping and commerce
      min_examples: 4
sub_rules:
- rule: Be going to expresses plans and intentions made before the moment of speaking
  type: semantic
  examples:
  - I am going to study medicine (plan made earlier)
  - We are going to move to a bigger house (intention)
  - She is going to learn to drive this summer (plan)
- rule: Be going to also expresses predictions based on present evidence
  type: semantic
  examples:
  - 'Look at those clouds — it is going to rain (evidence: dark clouds)'
  - 'She is going to have a baby (evidence: she is pregnant)'
  - 'He is going to fall — he is walking on ice (evidence: dangerous situation)'
- rule: 'Contrast with will: going to = plan or evidence-based prediction. Will =
    spontaneous decision or general prediction'
  type: semantic
  examples:
  - I am going to buy a car next month (plan)
  - I will help you with that (spontaneous decision)
  - 'It is going to rain (evidence: dark clouds)'
  - I think it will rain tomorrow (general prediction)
use:
- name: Planned Future Actions
  description: Intentions and plans made before speaking.
  examples:
  - I am going to study medicine.
  - They are going to get married.
  key_point: Plan exists before the moment of speaking.
- name: Predictions With Evidence
  description: Predict future based on what you see now.
  examples:
  - Look at the sky, it's going to rain.
  - He's going to fail; he never studies.
  key_point: Evidence is visible now.
- name: Instant Decisions (Rare)
  description: Less common, but can be used for quick plans.
  examples:
  - I'm going to call him now.
  key_point: Will is more common for instant decisions.
phonetics:
- note: In informal speech, going to is often reduced to gonna /ˈɡʌnə/. This is extremely
    common in American English. However, gonna should not be used in formal writing.
  example_generator:
    contexts:
    - gonna reduction
  l1_issue: Learners may over-pronounce 'going to' in all contexts, sounding overly
    formal. Teach gonna for natural speech but emphasize it is informal.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Affirmative going to (plans).'
  - 'Week 2: Negative and questions, predictions with evidence.'
  - 'Week 3: Contrast with will and present continuous.'
  - 'Use real plans: ''What are you going to do this weekend?'''
  recommended_activities:
  - name: Plans and Evidence
    duration: 15
    adaptation_notes: 'Students sort sentences into two groups: plans (going to) and
      evidence-based predictions (going to). Then they create their own examples.'
  - name: Going To or Will
    duration: 10
    adaptation_notes: 'Students choose between going to and will in context: ''I just
      decided — I ___ help you.'' (will) ''I planned this morning — I ___ help you.''
      (going to).'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for future_going_to.
  correction: Correct form.
  explanation: This is a common error for future_going_to.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
