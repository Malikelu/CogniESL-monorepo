grammar_point: postposing
title: "Postposing (Heavy Subject Postposing, Extraposition, and Rightward Movement)"
description: "The syntactic operation of moving a heavy or complex element to the rightmost position in a sentence, after lighter elements, to improve processing and naturalness. Includes subject postposing, complement postposing, and existential postposing."
level: C1

meaning:
  core_meaning: "Postposing is the movement of a grammatically heavy or informationally complex element to a position later in the sentence than its canonical (default) position. English has a strong preference for placing heavy constituents at the end of a clause (the 'end-weight' principle). Postposing allows speakers to keep light elements (especially pronouns) early in the sentence and push complex material to the right, making sentences easier to process and more natural-sounding. Common types include: subject postposing (moving a clausal subject to the end and filling the subject position with 'it'), complement postposing, and existential postposing with 'there'."
  timeline: "Postposing is not tense-dependent. It applies across all tenses and aspects. The choice to postpose is driven by information structure and processing ease, not by time reference."
  contrast: |
    Canonical (heavy subject first): "That she managed to escape from the burning building amazed everyone."
    Postposed (light 'it' first): "It amazed everyone that she managed to escape from the burning building."
    Canonical: "For a child to say such a thing is shocking."
    Postposed: "It is shocking for a child to say such a thing."
    Canonical: "A man who claimed to be a doctor appeared."
    Postposed (existential): "There appeared a man who claimed to be a doctor."
  ccqs:
    - question: "In 'It surprised me that he left,' what is the real subject?"
      answer: "The real subject is the that-clause 'that he left.' The word 'it' is a dummy subject (expletive) that fills the subject position. The heavy subject has been postposed to the end."
    - question: "Why do we say 'It is important to study' instead of 'To study is important'?"
      answer: "Both are grammatically correct, but English strongly prefers to postpose heavy subjects. 'It is important to study' sounds more natural because the heavy infinitive clause is at the end, following the end-weight principle."
    - question: "What is the difference between 'There arrived three guests' and 'Three guests arrived'?"
      answer: "Both are grammatical, but 'There arrived three guests' uses existential postposing to present new information. The 'there' construction signals that the postposed subject ('three guests') is new or unexpected. 'Three guests arrived' is a neutral statement."
    - question: "Can any subject be postposed?"
      answer: "Only clausal subjects (that-clauses, infinitive clauses, wh-clauses) can be postposed with 'it'. Noun phrase subjects cannot: '*It arrived three guests' is ungrammatical. However, existential 'there' can postpose some NP subjects in specific contexts."
  example_generator:
    contexts: ["academic writing", "formal prose", "news reporting", "literary narrative", "everyday speech"]
    cultural_notes: [
      "Postposing is a fundamental feature of English information structure. Native speakers use it automatically, but learners whose L1 has different word order preferences (e.g., verb-final languages like Japanese or Korean) may find it counterintuitive.",
      "In academic writing, postposing is extremely common: 'It has been demonstrated that...' / 'It is widely believed that...' / 'It remains unclear whether...' Mastering these structures is essential for formal written English.",
      "Existential 'there' postposing is one of the most frequent structures in spoken English: 'There's a problem' / 'There were several people waiting' / 'There seems to be a misunderstanding.'"
    ]
    min_examples: 5

form:
  affirmative:
    structure: "Subject-to-it postposing: It + verb + complement + postponed clause. 'It surprises me that he came.' / 'It is clear that she is talented.' / 'It seems that they have left.' / Existential postposing: There + verb + postponed subject. 'There are three books on the table.' / 'There appears to be a problem.' / 'There arose a terrible storm.' / Complement postposing: Subject + verb + object + postponed complement. 'He made it clear that he disagreed.' (The object 'it' stands in for the postponed that-clause.)"
    example_generator:
      contexts: ["subject postposing", "existential postposing", "complement postposing"]
      min_examples: 4
  negative:
    structure: "Negative postposing follows the same patterns with negation on the main verb or auxiliary: 'It is not surprising that he failed.' / 'There is no reason to worry.' / 'It has not been proven that the drug is safe.' / 'There were no survivors.'"
    example_generator:
      contexts: ["negative existential", "negative postposing"]
      min_examples: 3
  questions:
    structure: "Questions with postposed structures: 'Is it true that she resigned?' / 'Are there any questions?' / 'Does it matter what they think?' / 'Was there anyone at home?' / 'Is there a reason to be concerned?'"
    example_generator:
      contexts: ["questions with postposed subjects", "existential questions"]
      min_examples: 3

sub_rules:
  - rule: "Extraposition of clausal subjects — moving a that-clause or infinitive subject to the end and inserting 'it'"
    type: "syntactic"
    examples: [
      "It is obvious that he is lying. (That he is lying is obvious.)",
      "It was surprising for her to react like that. (For her to react like that was surprising.)",
      "It remains unclear whether the plan will work. (Whether the plan will work remains unclear.)",
      "It is a well-known fact that smoking causes cancer. (That smoking causes cancer is a well-known fact.)",
      "It seems that nobody was informed. (That nobody was informed seems to be the case.)"
    ]
  - rule: "Existential 'there' — postposing the subject after the verb 'be' or other intransitive verbs of existence/appearance"
    type: "syntactic"
    examples: [
      "There are many reasons to be optimistic.",
      "There was a knock at the door.",
      "There appears to have been a mistake.",
      "There arose a great wind.",
      "There exist several possible solutions.",
      "There came a time when he had to decide.",
      "There followed a long period of silence.",
      "There remains one question to be answered."
    ]
  - rule: "Postposing with 'make it + adjective' — the object 'it' stands in for a postponed clause"
    type: "syntactic"
    examples: [
      "She made it clear that she disagreed. (She made [that she disagreed] clear.)",
      "He made it obvious that he was unhappy.",
      "They made it possible for us to attend.",
      "I find it difficult to believe. (I find [to believe] difficult.)",
      "She considers it unlikely that he will come."
    ]
  - rule: "Postposing of heavy noun phrases — moving a complex NP to the right in literary or formal style"
    type: "stylistic"
    examples: [
      "Then came the moment we had all been waiting for.",
      "Into the room walked a tall, distinguished-looking man.",
      "At the top of the hill stood an ancient castle.",
      "On the table lay a letter addressed to the king.",
      "From the ashes rose a new hope."
    ]
  - rule: "Postposing with reporting verbs — 'It is said/believed/reported that...'"
    type: "syntactic"
    examples: [
      "It is said that the castle is haunted.",
      "It was believed that the earth was flat.",
      "It has been reported that the president will resign.",
      "It is thought that the treasure is buried nearby.",
      "It was rumoured that the king had been poisoned."
    ]

use:
  - context: "Academic and formal writing"
    description: "Postposing is essential in academic English, where complex clausal subjects are common. The 'it + passive reporting verb + that-clause' pattern is a staple of scholarly writing."
    examples: [
      "It has been argued that climate change is the greatest threat facing humanity.",
      "It is generally accepted that the experiment was flawed.",
      "It remains to be seen whether the policy will be effective.",
      "It should be noted that these results are preliminary.",
      "It is worth considering the implications of this finding."
    ]
  - context: "News and journalism"
    description: "Journalists use postposing to present new information and to create dramatic opening sentences."
    examples: [
      "There were reports of gunfire in the capital overnight.",
      "It is understood that the prime minister will resign.",
      "There followed a tense standoff between police and protesters.",
      "It has been confirmed that three people were injured.",
      "There are fears that the virus may spread further."
    ]
  - context: "Everyday conversation"
    description: "Existential 'there' is one of the most common postposing structures in spoken English."
    examples: [
      "There's a good film on tonight.",
      "There were loads of people at the party.",
      "There seems to be a problem with the booking.",
      "There's no need to worry.",
      "There isn't much time left."
    ]
  - context: "Literary and narrative writing"
    description: "Authors use postposing for dramatic effect, especially with verbs of motion and appearance."
    examples: [
      "There once lived a king who had three daughters.",
      "Into the darkness rode the knight, his sword gleaming.",
      "There came a knock at the door — loud and insistent.",
      "At the end of the road stood a house unlike any other.",
      "There followed a silence so profound that you could hear your own heartbeat."
    ]
  - context: "Professional and business communication"
    description: "Postposing is used in formal emails, reports, and presentations to maintain an objective, impersonal tone."
    examples: [
      "It is recommended that all staff attend the training session.",
      "There are several issues that need to be addressed.",
      "It should be emphasised that this is a preliminary report.",
      "There is a possibility that the deadline will be extended.",
      "It is essential that we act quickly."
    ]

phonetics:
  - note: "In postposed structures, the dummy subject 'it' or 'there' is typically unstressed in connected speech: 'It is IMPORTANT to STUDY.' /ɪt ɪz ɪmˈpɔːtənt tu ˈstʌdi/. The main stress falls on the complement or the postposed clause."
    example_generator:
      contexts: ["stress patterns in postposed sentences", "dummy subject pronunciation"]
    l1_issue: "Learners may stress the dummy 'it' or 'there' too heavily, making speech sound unnatural. Drill the weak forms: 'it' /ɪt/ → /ɪt/ or /t/, 'there' /ðeə/ → /ðə/."
  - note: "In existential 'there' constructions, 'there' is pronounced with the weak form /ðə/ (not /ðeðeə/): 'There are three books' /ðər ɑː θriː bʊks/. The contraction 'there's' /ðez/ is extremely common in speech."
    example_generator:
      contexts: ["existential there pronunciation", "weak forms"]
    l1_issue: "Learners may pronounce 'there' as /ðeə/ with full stress in existential sentences, which sounds overly careful. Encourage the weak form for natural speech."
  - note: "In literary postposing with inversion ('Into the room walked a man'), the fronted adverbial carries strong stress, and the verb is unstressed: 'Into the ROOM WALKED a MAN.'"
    example_generator:
      contexts: ["literary inversion stress patterns"]
    l1_issue: "Learners may struggle with the unusual word order and stress pattern. Use reading aloud and listening exercises to build familiarity."

teaching:
  methodology: "Guided discovery"
  tips:
    - "Start with the most common pattern: existential 'there.' Students encounter this from A1 level, so build on their existing knowledge to introduce the concept of postposing."
    - "Use the 'end-weight' principle as a guiding concept: English likes to put heavy things at the end. Show how postposing improves sentence flow with side-by-side comparisons."
    - "Introduce extraposition ('It is clear that...') separately from existential 'there.' They are different structures but share the same underlying principle."
    - "Use transformation exercises: give students canonical sentences and have them postpose the heavy element. Then reverse: give postposed sentences and have students identify the canonical form."
    - "Emphasise that postposing is a matter of style and naturalness, not grammaticality. Both 'That he left surprised me' and 'It surprised me that he left' are correct, but the postposed version is far more common."
    - "For literary postposing, use authentic texts (novels, fairy tales) and focus on receptive understanding rather than production."
  recommended_activities:
    - name: "Heavy or light? — Postposing decision exercise"
      duration: 15
      adaptation_notes: "Give students 10 pairs of sentences: one with a heavy subject in canonical position, one with postposing. They choose which sounds more natural and explain why. Discuss the end-weight principle."
    - name: "Canonical to postposed transformation"
      duration: 20
      adaptation_notes: "Students rewrite 10 sentences using postposing: 'That she passed the exam surprised everyone.' → 'It surprised everyone that she passed the exam.' Include that-clauses, infinitive clauses, and existential 'there' patterns."
    - name: "Existential there vs. postposed subject"
      duration: 15
      adaptation_notes: "Students are given 8 sentences and must decide whether to use existential 'there' or subject postposing with 'it': 'Several problems remain' → 'There remain several problems.' / 'That he lied is obvious' → 'It is obvious that he lied.'"
    - name: "Literary postposing analysis"
      duration: 20
      adaptation_notes: "Provide a short literary extract (opening of a novel or fairy tale). Students identify all examples of postposing, classify the type, and discuss the effect. How would the passage sound with canonical word order?"
    - name: "Academic writing practice"
      duration: 25
      adaptation_notes: "Students write a short academic paragraph (100-150 words) on a given topic, using at least 5 postposed structures: 'It has been shown that...' / 'There is evidence to suggest that...' / 'It is important to note that...' Peer review for naturalness."
