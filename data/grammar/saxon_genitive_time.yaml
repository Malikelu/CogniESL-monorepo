grammar_point: saxon_genitive_time
title: Saxon Genitive with Time Expressions
description: Using the Saxon genitive (apostrophe s) with time expressions such as
  today, yesterday, last week, and this month to show possession or association with
  a point in time.
level: B1
meaning:
  core_meaning: The Saxon genitive can be used with time expressions to indicate that
    something belongs to or is associated with a particular time period. This is a
    natural and common pattern in English.
  timeline: 'The time expression determines the temporal reference: today''s news
    (now), yesterday''s events (past), tomorrow''s meeting (future).'
  contrast: Today's weather (Saxon genitive) vs. The weather today (adverbial). Both
    are correct, but the genitive form is more common with nouns like news, meeting,
    paper, events, decision.
  ccqs:
  - question: Can we use the Saxon genitive with any time expression?
    answer: No, it works best with common time nouns like today, yesterday, tomorrow,
      tonight, and with expressions like last week, this month, next year.
    purpose: Tests whether the learner understands that not all time expressions can
      take the Saxon genitive, and that the pattern is most natural with specific,
      short time expressions.
  - question: Is 'today's news' the same as 'the news today'?
    answer: They are very similar in meaning, but 'today's news' treats 'today' as
      a possessor, while 'the news today' uses 'today' as an adverb.
    purpose: Tests whether the learner can distinguish between the genitive (possessive)
      and adverbial (adverb) use of time expressions, which helps them choose the
      appropriate structure for different contexts.
  - question: Do we use the Saxon genitive with plural time expressions?
    answer: Yes, for example 'two weeks' notice' or 'three days' holiday' — the apostrophe
      comes after the plural s.
    purpose: Tests whether the learner knows the rule for plural time genitives (apostrophe
      after the -s), which differs from singular genitives and is a common source
      of punctuation errors.
example_generator:
  contexts:
  - daily conversation
  - news and media
  - workplace communication
  - academic schedules
  cultural_notes:
  - This pattern is extremely common in British English journalism
  - Headlines frequently use this structure for brevity
  min_examples: 5
form:
  affirmative:
    structure: 'Time expression + ''s + noun. For example: today''s newspaper / yesterday''s
      meeting / tomorrow''s weather / this week''s episode'
    example_generator:
      contexts:
      - morning routines
      - news consumption
      - planning ahead
      min_examples: 4
  negative:
    structure: 'Time expression + ''s + no/noun + verb. For example: Today''s meeting
      has been cancelled. / There was no yesterday''s paper available.'
    example_generator:
      contexts:
      - cancellations
      - absences
      - unavailable items
      min_examples: 3
  questions:
    structure: 'Whose + noun + is this? — It is today''s. / Is this + time expression
      + ''s + noun? For example: Is this today''s paper?'
    example_generator:
      contexts:
      - identifying items
      - checking schedules
      - confirming dates
      min_examples: 3
sub_rules:
- rule: 'Singular time expressions take ''s: today''s, yesterday''s, tomorrow''s,
    tonight''s.'
  type: grammatical
  examples:
  - Today's forecast is for rain.
  - Yesterday's match was a thrilling encounter.
  - Tomorrow's deadline cannot be extended.
  - Tonight's performance starts at eight o'clock.
- rule: 'Plural time expressions take an apostrophe after the s: two weeks'' notice,
    three days'' holiday, five years'' experience.'
  type: grammatical
  examples:
  - You must give two weeks' notice before leaving.
  - We went on a two weeks' holiday to Spain.
  - She has ten years' experience in teaching.
  - The project requires six months' preparation.
- rule: 'Compound time expressions use the genitive on the last element: last week''s,
    next month''s, this year''s.'
  type: grammatical
  examples:
  - Last week's lecture was fascinating.
  - Next month's conference has been postponed.
  - This year's results are much better than last year's.
- rule: 'The Saxon genitive with time is commonly used with specific nouns: news,
    paper, meeting, decision, events, weather, forecast, deadline, episode, show,
    results.'
  type: lexical
  examples:
  - Have you read today's paper?
  - Yesterday's decision was final.
  - This week's episode is the season finale.
- rule: 'The genitive can be doubled when both the time and another noun are possessive:
    yesterday''s Prime Minister''s speech.'
  type: grammatical
  examples:
  - I missed yesterday's manager's announcement.
  - Did you attend last week's director's briefing?
- rule: 'With ''of'' phrases, the genitive is usually not needed: the events of yesterday
    (more formal) vs yesterday''s events (more natural).'
  type: grammatical
  examples:
  - Yesterday's events shocked the nation.
  - The events of yesterday shocked the nation.
  - Last week's results were impressive.
  - The results of last week were impressive.
use:
- context: News and journalism
  description: Headlines and news reports frequently use time genitives for conciseness
    and impact.
  examples:
  - Today's top stories include a major political development.
  - Yesterday's earthquake measured 6.5 on the Richter scale.
  - This month's unemployment figures show a slight improvement.
- context: Workplace and professional settings
  description: Colleagues use time genitives to refer to meetings, decisions, and
    schedules.
  examples:
  - I have not finished today's report yet.
  - Can we reschedule tomorrow's meeting to Friday?
  - Last week's minutes have been circulated.
- context: Daily conversation
  description: Speakers naturally use time genitives when discussing everyday topics.
  examples:
  - What is on tonight's menu?
  - Did you see yesterday's football match?
  - I love this week's playlist on the radio.
- context: Academic contexts
  description: Students and teachers refer to lectures, assignments, and deadlines
    using time genitives.
  examples:
  - This week's reading assignment is quite long.
  - Next Friday's exam has been moved to the following Monday.
  - Last term's grades are now available online.
phonetics:
- note: The 's in the Saxon genitive is pronounced as /s/ after voiceless consonants
    and /z/ after voiced sounds, including vowels.
  example_generator:
    contexts:
    - spoken English
    - presentations
  l1_issue: Learners whose L1 does not use possessive markers may omit the apostrophe
    s entirely, saying 'today news' instead of 'today's news'.
- note: 'In plural time genitives, the extra syllable is often dropped in rapid speech:
    ''two weeks'' notice'' sounds like ''two week''s notice''.'
  example_generator:
    contexts:
    - fast speech
    - informal conversation
  l1_issue: Learners may be confused by the apparent mismatch between the plural form
    and the pronunciation.
teaching:
  methodology: PPP
  tips:
  - 'Start with the most common examples: today''s, yesterday''s, tomorrow''s — these
    are the ones students will encounter most.'
  - Use a calendar or timeline visual to show how the genitive links a time to a noun.
  - 'Contrast the genitive with the ''of'' phrase to show register difference: yesterday''s
    news (natural) vs. the news of yesterday (formal).'
  - 'Drill the plural genitive rule carefully: two weeks'' notice, not two week''s
    notice.'
  - Use real newspaper headlines as authentic material for practice.
  recommended_activities:
  - name: Headline Match
    duration: 10
    adaptation_notes: Students match time expressions to nouns to create authentic-sounding
      headlines.
  - name: Calendar Challenge
    duration: 15
    adaptation_notes: Given a calendar with events, students describe each event using
      the time genitive.
  - name: Singular vs Plural Drill
    duration: 10
    adaptation_notes: Students practise the difference between one week's holiday
      and two weeks' holiday.
  - name: News Report Writing
    duration: 20
    adaptation_notes: Students write a short news bulletin using at least five time
      genitive expressions.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''of'' with short time expressions: *''the news of today'' instead
    of ''today''s news'''
  correction: today's news
  explanation: While 'the news of today' is technically grammatical, the Saxon genitive
    ('today's news') is far more natural and common in everyday English. Learners
    whose L1 uses prepositional phrases for possession tend to overuse 'of' instead
    of the genitive.
  l1_groups:
  - Portuguese
  - Spanish
  - French
- error: 'Adding ''s to plural time expressions: *''two weeks''s notice'''
  correction: two weeks' notice
  explanation: Plural time expressions that already end in 's' take only an apostrophe
    after the existing 's', not an additional 's. This follows the standard plural
    possessive rule in English.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Confusing time genitive with contracted ''is'': *''Yesterday''s sunny''
    (meaning ''Yesterday is sunny'')'
  correction: Yesterday was sunny. / Yesterday's weather was sunny.
  explanation: The apostrophe-s in time genitives is possessive, not a contraction
    of 'is'. 'Yesterday's sunny' reads as 'Yesterday is sunny' to a native ear, which
    is ungrammatical. 'Yesterday's weather was sunny' is correct.
  l1_groups:
  - Portuguese
  - Spanish
  - Arabic
register_notes:
- note: The Saxon genitive with time is standard in both formal and informal contexts.
    It is especially common in journalism.
dialectal_variation:
- note: This pattern is more common in British English journalism; American English
    uses it as well but may occasionally prefer alternative constructions in headlines.
discourse_notes:
- note: This structure is extremely common in news headlines, workplace communication,
    and everyday conversation.
