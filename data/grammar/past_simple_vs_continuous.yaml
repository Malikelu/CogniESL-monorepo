grammar_point: past_simple_vs_continuous
title: Past Simple vs Past Continuous
description: 'Two past tenses with different uses: Past Simple for completed actions,
  Past Continuous for ongoing actions in the past. Essential for telling stories and
  describing past events.'
level: A2
meaning:
  core_meaning: Past Simple = finished action in the past. Past Continuous = action
    in progress at a past moment.
  timeline: 'Past Simple: completed point in the past. Past Continuous: ongoing period
    in the past.'
  contrast: '''Past Simple'' = "I ate dinner (finished)."

    ''Past Continuous'' = "I was eating dinner (in progress, not finished)."

    '
  ccqs:
  - question: Which tense describes a completed past action
    answer: Past simple. Past continuous describes actions in progress.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Past Simple: Subject + V2 (ed): "I walked. She ate."

      Past Continuous: Subject + was/were + V-ing: "I was walking. She was eating."

      '
    example_generator:
      contexts:
      - food and daily routines
      - entertainment and media
      min_examples: 4
  negative:
    structure: 'Past Simple: Subject + didn''t + V1: "I didn''t walk."

      Past Continuous: Subject + wasn''t/weren''t + V-ing: "I wasn''t walking."

      '
    example_generator:
      contexts:
      - food and daily routines
      - entertainment and media
      min_examples: 4
  questions:
    structure: 'Past Simple: Did + subject + V1: "Did you walk?"

      Past Continuous: Was/Were + subject + V-ing: "Were you walking?"

      '
    example_generator:
      contexts:
      - food and daily routines
      - entertainment and media
      min_examples: 4
sub_rules:
- rule: Past simple describes completed actions, habits, and sequences of events
  type: semantic
  examples:
  - I woke up at 7 (completed action)
  - She visited Paris last year (completed action)
  - First I ate, then I left (sequence)
- rule: Past continuous describes actions in progress, background situations, and
    interrupted actions
  type: semantic
  examples:
  - I was eating when the phone rang (interrupted action)
  - She was living in London at the time (background)
  - The sun was shining (scene setting)
- rule: Past continuous + past simple describes interrupted actions
  type: semantic
  examples:
  - I was cooking when the phone rang
  - She was walking home when it started to rain
use:
- name: Interrupted Actions
  description: A short action (Past Simple) interrupts a longer action (Past Continuous).
  examples:
  - I was sleeping when the phone rang.
  - She was walking when it started to rain.
  key_point: Long action = Past Continuous. Short interrupting action = Past Simple.
- name: Background Events
  description: Past Continuous sets the scene; Past Simple tells what happened.
  examples:
  - The sun was shining. People were sitting in the park. Suddenly, a dog ran across
    the grass.
  key_point: Use Past Continuous for atmosphere, Past Simple for main events.
- name: Simultaneous Actions
  description: Two actions happening at the same time in the past.
  examples:
  - I was cooking while she was watching TV.
  - They were dancing while we were singing.
  key_point: Both actions use Past Continuous. Use 'while' to connect.
phonetics:
- note: 'Past continuous often uses weak forms: ''I was eating'' → /aɪ wəz iːtɪŋ/.
    The was is reduced to /wəz/.'
  example_generator:
    contexts:
    - past continuous weak forms
  l1_issue: Portuguese and Spanish speakers often use past simple where English requires
    past continuous. Teach the distinction.
teaching:
  methodology: PPP
  tips:
  - 'Use a timeline on the board: draw a long line (continuous) with a dot (simple)
    crossing it.'
  - 'Tell a simple story: ''I was walking home. It was raining. Suddenly, I saw a
    cat.'''
  - Practice with 'when' (Past Simple) vs 'while' (Past Continuous).
  recommended_activities:
  - name: Scene Setting
    duration: 15
    adaptation_notes: 'Students describe a scene using past continuous: ''The sun
      was shining. People were walking.'' Then add a past simple event: ''Suddenly,
      it started to rain.'''
  - name: Interrupted Actions
    duration: 10
    adaptation_notes: 'Students practice interrupted actions: ''I was ___ing when
      ___ happened.'''
