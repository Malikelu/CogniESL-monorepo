grammar_point: left_dislocation
title: Left-Dislocation (Topic-Comment Structure)
description: A discourse strategy where a noun phrase is moved to the beginning of
  the sentence and replaced by a pronoun in its original position, used to establish
  topic or contrast.
level: C1
meaning:
  core_meaning: Left-dislocation involves taking a noun phrase (the topic) from inside
    a sentence and placing it at the front, leaving a pronoun or pro-form in the original
    position. This highlights the topic and creates a clear topic-comment structure.
  timeline: Can be used with any tense. The structure is about discourse organisation,
    not time reference.
  contrast: 'Standard: I love that new restaurant on the corner. Left-dislocation:
    That new restaurant on the corner, I love it. Same meaning, different focus. Cleft
    sentence: It is that new restaurant on the corner that I love. Different emphasis.
    Right-dislocation: I love it, that new restaurant on the corner. Topic comes after.'
  ccqs:
  - question: In the sentence That book, I really enjoyed it, what is the topic?
    answer: That book. It has been moved to the front for emphasis.
  - question: Is left-dislocation grammatically correct in formal writing?
    answer: It is more common in speech and informal writing. In formal writing, cleft
      sentences are preferred.
  - question: What replaces the dislocated noun in the main clause?
    answer: A pronoun such as it, he, she, they, this, or that.
  example_generator:
    contexts:
    - casual conversation
    - spoken narratives
    - informal writing
    - discourse analysis
    cultural_notes:
    - Left-dislocation is extremely common in spoken English across all dialects
    - It is a natural feature of topic-prominent discourse
    - Learners may not encounter it in textbooks but will hear it constantly
    min_examples: 5
form:
  affirmative:
    structure: Dislocated noun phrase, comma, main clause with pronoun or pro-form
      referring back to the dislocated element.
    example_generator:
      contexts:
      - everyday conversation
      - spoken narratives
      - informal writing
      min_examples: 4
  negative:
    structure: Dislocated noun phrase, comma, negative main clause with pronoun or
      pro-form.
    example_generator:
      contexts:
      - expressing dislike
      - negative opinions
      min_examples: 3
  questions:
    structure: Dislocated noun phrase, comma, question with pronoun or pro-form.
    example_generator:
      contexts:
      - asking about topics
      - checking knowledge
      min_examples: 3
sub_rules:
- rule: The dislocated element is always followed by a comma in writing or a pause
    in speech
  type: punctuation
  examples:
  - Your brother, I saw him at the shop.
  - That film we watched last night, it was brilliant.
- rule: The pronoun in the main clause must agree with the dislocated noun in number
    and gender
  type: grammatical
  examples:
  - Those students, they always arrive late.
  - My sister, she works in London.
- rule: Left-dislocation can dislocate objects, subjects, and prepositional phrases
  type: grammatical
  examples:
  - The money, I put it in the bank.
  - John, he never calls.
  - In London, I lived there for ten years.
- rule: The dislocated element can be modified by relative clauses or other structures
  type: grammatical
  examples:
  - The man who lives next door, he is a doctor.
  - That book you recommended, I finished it yesterday.
- rule: Left-dislocation is distinct from topicalisation, which does not leave a pronoun
  type: grammatical
  examples:
  - That book I really enjoyed. (topicalisation, no pronoun)
  - That book, I really enjoyed it. (left-dislocation, with pronoun)
use:
- name: Establishing topic in conversation
  description: Introducing or shifting to a new topic in spoken discourse
  examples:
  - That new teacher, she is really strict.
  - Your cousin from Canada, is he still visiting?
  key_point: Helps listeners identify what the sentence is about before processing
    the comment.
- name: Expressing contrast
  description: Highlighting one item against another
  examples:
  - I like Sarah, but her brother, I cannot stand him.
  - The food was good. The service, I was not impressed by it.
  key_point: The dislocation creates a natural contrastive focus.
- name: Managing information flow
  description: Presenting known information first, then adding new information
  examples:
  - That meeting on Friday, I have already prepared for it.
  - The report you asked about, I finished it this morning.
  key_point: Follows the given-before-new information principle.
- name: Emphatic or emotional expression
  description: Adding emotional weight to a statement
  examples:
  - That song, it always makes me cry.
  - My grandmother, she was the strongest person I ever knew.
  key_point: The separation of topic from comment creates dramatic emphasis.
phonetics:
- note: The dislocated element is spoken with a distinct intonation contour, followed
    by a pause before the main clause
  example_generator:
    contexts:
    - spoken English
  l1_issue: Learners from topic-prominent languages such as Japanese, Korean, or Turkish
    may find this structure natural but overuse it in formal writing
- note: The pronoun referring back to the dislocated element is typically unstressed
  example_generator:
    contexts:
    - connected speech
  l1_issue: Learners may stress the pronoun, making the sentence sound redundant or
    unnatural
teaching:
  methodology: Guided discovery
  tips:
  - Use authentic spoken examples from films, interviews, and conversations
  - Ask students to identify the topic and the comment in left-dislocated sentences
  - Contrast left-dislocation with standard word order and with cleft sentences
  - 'Discuss register: when is it appropriate in conversation vs inappropriate in
    formal essays'
  recommended_activities:
  - name: Spot the dislocation
    duration: 10
    adaptation_notes: Play audio clips from films or interviews. Students identify
      left-dislocated structures and explain their function.
  - name: Topic-comment transformation
    duration: 15
    adaptation_notes: Students rewrite standard sentences using left-dislocation.
      Then rewrite the same sentences using cleft structures. Compare the effects.
  - name: Conversation practice
    duration: 20
    adaptation_notes: Students practise natural conversation using left-dislocation
      to introduce and contrast topics. Pair work with feedback.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
