grammar_point: verbs_two_objects
title: Verbs with Two Objects (Ditransitive)
description: 'Verbs that can take two objects: a direct object and an indirect object.
  Common verbs: give, send, tell, show, buy, make, bring, offer.'
level: A2
meaning:
  core_meaning: Ditransitive verbs transfer something (direct object) to someone (indirect
    object). The indirect object can come before or after the direct object.
  timeline: Depends on the tense used.
  contrast: '''Two objects'' = ''She gave me a book.'' (indirect + direct) vs ''One
    object'' = ''She read a book.'' (direct only)'
  ccqs:
  - question: She gave me a book. Who received the book?
    answer: '''Me'' is the indirect object — the person receiving something. ''A book''
      is the direct object — the thing being given.'
    purpose: Tests whether the learner understands a key concept of verbs_two_objects.
      This is fundamental for correct use of this grammar point.
  - question: She gave a book to me. Is 'me' still the indirect object here?
    answer: Yes — when the indirect object comes after the direct object, it is introduced
      by 'to' or 'for.' 'She gave a book to me' = 'She gave me a book.'
    purpose: Tests whether the learner understands a key concept of verbs_two_objects.
      This is fundamental for correct use of this grammar point.
  - question: Can we say 'She said me a story'?
    answer: No — 'say' is not a ditransitive verb. We say 'She told me a story' (tell
      takes two objects) or 'She said that...' (say takes only one object).
    purpose: Tests whether the learner understands a key concept of verbs_two_objects.
      This is fundamental for correct use of this grammar point.
  example_generator:
    contexts:
    - giving and receiving
    - telling stories
    - buying and making things
    - offering help
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + verb + indirect object + direct object: ''She gave me a
      book.'' / Subject + verb + direct object + to/for + indirect object: ''She gave
      a book to me.'''
    example_generator:
      contexts:
      - giving and receiving
      - telling stories
      - buying and making things
      min_examples: 4
  negative:
    structure: 'Subject + don''t/doesn''t + verb + objects: ''She didn''t give me
      a book.'''
    example_generator:
      contexts:
      - giving and receiving
      - telling stories
      - buying and making things
      min_examples: 4
  questions:
    structure: 'Who + verb + indirect object?: ''Who did she give the book to?'' /
      What + verb + direct object?: ''What did she give you?'''
    example_generator:
      contexts:
      - giving and receiving
      - telling stories
      - buying and making things
      min_examples: 4
sub_rules:
- rule: Some verbs use 'to' (give, send, show, tell, bring, offer)
  type: grammatical
  examples:
  - Give it to me.
  - Send the email to John.
- rule: Some verbs use 'for' (buy, make, cook, get, find)
  type: grammatical
  examples:
  - Buy a gift for her.
  - Make a cake for the party.
- rule: 'Word order: indirect object comes BEFORE direct object (no preposition)'
  type: word_order
  examples:
  - She gave me a book. ✅ / She gave a book to me. ✅ / She gave to me a book. ❌
use:
- context: Giving and receiving
  description: Describing transfers of things or information
  examples:
  - Can you lend me your pen?
  - She told me a secret.
  - I bought my mom flowers.
- context: Offering and requesting
  description: Making offers or asking for things
  examples:
  - Could you show me the way?
  - I'll make you a sandwich.
phonetics:
- note: Stress on the verb, not the objects
  contexts:
  - sentence stress
  l1_issue: Word order — some L1 speakers put the direct object first
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use real objects to demonstrate giving/receiving
  - Practice both word orders (indirect+direct vs direct+to/for)
  recommended_activities:
  - name: Give and Tell
    duration: 15
    adaptation_notes: Students practice ditransitive verbs in a gift-giving role play.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 9:
    Modals, §9.1-9.6'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: A common error for verbs_two_objects
  correction: Correct form for verbs_two_objects
  explanation: This error occurs when learners apply L1 rules to verbs_two_objects.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
