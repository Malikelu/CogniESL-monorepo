grammar_point: be_going_to
title: Be going to (future plans and predictions)
description: A future tense structure used to talk about planned actions or predictions
  based on present evidence.
level: A2
meaning:
  core_meaning: Expresses future plans (intentions made before speaking) or predictions
    based on current evidence (dark clouds mean rain is coming).
  timeline: Refers to future time, near or distant, relative to the present moment.
  contrast: Be going to = pre-planned actions or evidence-based predictions. Will
    = spontaneous decisions or predictions without evidence.
  ccqs:
  - question: She is going to study medicine. Did she decide now, or before?
    answer: Before. Be going to is for plans made before the moment of speaking.
  - question: Look at those dark clouds! Is this a plan or a prediction?
    answer: A prediction based on present evidence (the clouds).
  - question: Can we use be going to for a decision you just made right now?
    answer: No. For spontaneous decisions, use will instead.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes:
    - Be going to is one of the most common ways to talk about the future in spoken
      English
    - The contraction gonna is extremely common in informal speech but should not
      be used in writing
    min_examples: 5
form:
  affirmative:
    structure: Subject + am/is/are + going to + base verb
    example_generator:
    - I am going to travel to Japan next year.
    - She is going to study medicine.
    - They are going to move to a bigger house.
    min_examples: 4
  negative:
    structure: Subject + am/is/are + not + going to + base verb
    example_generator:
    - I am not going to eat meat anymore.
    - She is not going to come to the party.
    - They are not going to watch the game.
    min_examples: 4
  questions:
    structure: Am/Is/Are + subject + going to + base verb?
    example_generator:
    - Are you going to finish that report today?
    - Is she going to apply for the job?
    - Are they going to visit us next week?
    min_examples: 4
sub_rules:
- rule: 'Be going to has two main uses: plans made before speaking, and predictions
    based on visible evidence'
  type: semantic
  examples:
  - I am going to paint my room this weekend (plan decided earlier)
  - She is going to fall — she is walking on ice (prediction based on what we see)
- rule: In informal speech, going to is often pronounced as gonna — not appropriate
    in formal writing
  type: phonological
  examples:
  - I am gonna call you later (informal speech)
  - I am going to call you later (written and formal)
- rule: Unlike be about to, be going to can be used with future time expressions
  type: grammatical
  examples:
  - I am going to travel to Japan next year (correct — time expression is fine)
  - She is going to start her new job next Monday (correct)
- rule: Negation is formed by adding not after the be verb
  type: grammatical
  examples:
  - They are not going to come to the party
  - I am not going to eat meat anymore
  - She is not going to apply for the job
- rule: Questions are formed by inverting the subject and the be verb
  type: grammatical
  examples:
  - Are you going to finish that report today?
  - Is she going to apply for the job?
use:
- context: Future plans and intentions
  examples:
  - I am going to learn Spanish next semester.
  - We are going to move to a bigger house.
  - She is going to apply for a new job.
- context: Evidence-based predictions
  examples:
  - She is going to fail the test; she has not studied at all.
  - The baby is going to wake up soon; it is crying.
  - Look at those clouds! It is going to rain.
phonetics:
- note: In connected speech, going to is very commonly reduced to gonna. The ing syllable
    is lost entirely in casual speech.
  example_generator:
  - going to → gonna /ˈɡʌnə/
  l1_issue: Learners whose first language does not reduce function words (Spanish,
    Japanese) may always pronounce the full going to, which sounds overly formal.
- note: The word to in going to is almost always pronounced as a schwa /tə/, never
    as a clear /tuː/.
  example_generator:
  - to → /tə/
  l1_issue: French and Italian speakers may be tempted to pronounce a clear vowel,
    which sounds stilted.
teaching:
  methodology: PPP
  tips:
  - 'Use real class examples: ''I am going to teach you grammar today'' (plan).'
  - 'Show evidence for predictions: point to a broken chair and say ''It is going
    to break.'''
  - 'Practice with timelines: mark past (plan made), present, and future (action).'
  - 'Contrast with will using role-plays: spontaneous offers vs pre-planned actions.'
  recommended_activities:
  - name: Weekend Plans Survey
    duration: 15
    adaptation_notes: Students mingle and ask each other 'What are you going to do
      this weekend?' They find classmates with similar plans.
  - name: Weather Reporter
    duration: 15
    adaptation_notes: 'Show weather maps. Students play weather reporters: ''It is
      going to rain in the north, and it is going to be sunny in the south.'''
  - name: Evidence or Opinion
    duration: 10
    adaptation_notes: Show images (dark clouds, packed suitcase, crying baby). Students
      decide if each image shows evidence for a prediction, then make sentences.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: 'Using ''going to'' without ''be'': *''I going to study.'''
  correction: I am going to study.
  explanation: '''Going to'' requires the verb ''be'' (am/is/are).'
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
- error: 'Confusing ''going to'' with present continuous: *''I am going to the store
    tomorrow.'' (intention)'
  correction: I am going to go to the store tomorrow.
  explanation: Present continuous for future requires context showing it's a plan.
    'Going to' is clearer for intentions.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: '''Going to'' is neutral in register. In formal writing, ''will'' or ''intend
    to'' may be preferred.'
- note: In conversation, 'gonna' is common but non-standard in writing.
dialectal_variation:
- note: In informal speech, 'going to' is often reduced to 'gonna'.
discourse_notes:
- note: '''Going to'' expresses prior intention: ''I''m going to study medicine.''
    (decided before speaking)'
- note: '''Going to'' can also express prediction based on evidence: ''Look at those
    clouds. It''s going to rain.'''
