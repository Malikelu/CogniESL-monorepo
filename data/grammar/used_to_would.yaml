grammar_point: used_to_would
title: Used To vs Would (Past Habits)
description: Contrast between 'used to' (past habits + states) and 'would' (past habits
  only, no states) for describing repeated past actions.
level: B1-B2
meaning:
  core_meaning: Both describe past habits, but 'used to' can also describe past states;
    'would' only describes past actions (no states).
  timeline: 'Past only: Both refer to repeated past actions/states that no longer
    happen.'
  contrast: 'Used to (actions + states): "I used to be tall." (state) / "I used to
    run." (action)

    Would (only actions): "I would run." (action) / "I would be tall." (incorrect,
    state)

    '
  ccqs:
  - question: What is the difference between used to and would
    answer: Used to describes past states and habits. Would describes repeated past
      actions only.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Used to: Subject + used to + Base Verb (actions or states): "I used
      to smoke." "I used to be shy."

      Would: Subject + would + Base Verb (only actions, no states): "I would smoke."
      (correct) / "I would be shy." (incorrect)

      '
    example_generator:
      contexts:
      - weather and nature
      min_examples: 4
  negative:
    structure: 'Used to: didn''t use to + Base Verb: "I didn''t use to like coffee."

      Would: wouldn''t + Base Verb: "I wouldn''t smoke." (but less common than used
      to negative)

      '
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
  questions:
    structure: 'Used to: Did + Subject + use to + Base Verb: "Did you use to live
      here?"

      Would: Would + Subject + Base Verb: "Would you go to the park?" (less common
      for habits)

      '
    example_generator:
      contexts:
      - sports and hobbies
      min_examples: 4
sub_rules:
- rule: Used to describes past states and habits
  type: semantic
  examples:
  - I used to live in London (state)
  - I used to play football every day (habit)
  - She used to have long hair (state)
- rule: Would describes repeated past actions only (not states)
  type: semantic
  examples:
  - Every summer we would go to the beach (repeated action)
  - He would always bring flowers (habitual action)
  - She would sit and read for hours (repeated action)
- rule: Would cannot be used for past states — only for repeated actions
  type: grammatical
  examples:
  - I would live in London (WRONG — state, use used to)
  - I would play football every day (OK — repeated action)
  - She would have long hair (WRONG — state, use used to)
use:
- name: Past Habits (Actions)
  description: Both 'used to' and 'would' work for repeated past actions.
  examples:
  - I used to/would walk to school.
  - We used to/would visit grandma every summer.
  key_point: Interchangeable for actions, but 'would' is more literary/storytelling.
- name: Past States
  description: Only 'used to' works for past states (be, have, know).
  examples:
  - I used to be happy. (correct) / I would be happy. (incorrect)
  key_point: Would cannot describe states; only actions.
- name: Storytelling
  description: '''Would'' is more common in stories/narratives about past habits.'
  examples:
  - Every morning, he would wake up early and walk to the market.
  key_point: Would adds a nostalgic, narrative tone.
phonetics:
- note: 'Would is often reduced to /d/ in narrative: ''Every summer we''d go to the
    beach'' /ˈevri ˈsʌmə wiːd ɡəʊ tə ðə biːtʃ/. This reduction is very common in storytelling.'
  example_generator:
    contexts:
    - would reduction
  l1_issue: Learners may not recognize would when reduced to /d/. Teach the context
    clues that distinguish it from had.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Used to for past habits + states.'
  - 'Week 2: Would for past habits (actions only, storytelling).'
  - 'Week 3: Contrast used to vs would; highlight state vs action.'
  - 'Use childhood stories: Students write past habits with ''used to'' and ''would''
    (actions only).'
  recommended_activities:
  - name: Used To or Would
    duration: 10
    adaptation_notes: 'Students choose: ''I ___ live in London.'' (used to — state)
      ''I ___ play football every day.'' (used to or would — habit).'
  - name: Childhood Memories
    duration: 15
    adaptation_notes: 'Students describe their childhood using both structures: ''I
      used to live in a small house. Every day I would walk to school.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for used_to_would.
  correction: Correct form.
  explanation: This is a common error for used_to_would.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
