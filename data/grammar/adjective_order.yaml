grammar_point: adjective_order
title: Adjective Order
description: The fixed sequence in which multiple adjectives appear before a noun
  in English, following a set order of opinion, size, age, shape, colour, origin,
  material and purpose.
level: B2
meaning:
  core_meaning: When two or more adjectives modify the same noun, they must follow
    a specific order that native speakers use intuitively. Violating this order sounds
    unnatural even if grammatically understandable.
  timeline: Timeless - the order rule applies regardless of tense.
  contrast: 'Correct order: "a beautiful large old round red Italian wooden dining
    table"

    Incorrect order: "a red beautiful Italian old large wooden round dining table"

    '
  ccqs:
  - question: Does this adjective describe what someone thinks of the thing, or what
      it is made of?
    answer: Opinion adjectives (beautiful, ugly, nice) come before material adjectives
      (wooden, plastic, silk).
  - question: Can you say 'a red big car'?
    answer: No - size comes before colour, so it should be 'a big red car'.
  example_generator:
    contexts:
    - describing objects
    - shopping
    - writing descriptions
    - travel
    - home and furniture
    cultural_notes:
    - This order is intuitive for native speakers but must be learned explicitly by
      L2 speakers
    - Some languages place adjectives after the noun
    - making pre-noun ordering challenging
    min_examples: 5
form:
  affirmative:
    structure: 'Determiner + opinion + size + age + shape + colour + origin + material
      + purpose + noun. Example: ''a lovely small old rectangular brown French oak
      writing desk'''
    example_generator:
      contexts:
      - describing products
      - estate agent descriptions
      - museum catalogues
      - travel writing
      min_examples: 4
  negative:
    structure: 'The same adjective order applies in negative sentences. Example: ''It
      wasn''t a beautiful large old house.'' / ''I don''t want a cheap plastic Chinese
      phone.'''
    example_generator:
      contexts:
      - complaints
      - expressing dissatisfaction
      - negative reviews
      min_examples: 4
  questions:
    structure: 'Questions follow the same order. Example: ''Is this a genuine Italian
      leather bag?'' / ''Did you see the tall young blonde woman?'''
    example_generator:
      contexts:
      - asking for descriptions
      - identifying people
      - shopping questions
      min_examples: 3
sub_rules:
- rule: Opinion before fact
  type: grammatical
  examples:
  - a delicious meal (opinion) vs. a French meal (fact)
  - an ugly building (opinion) vs. a brick building (material)
- rule: Size before age
  type: grammatical
  examples:
  - a big old house
  - a small young puppy
  - a tiny new-born baby
- rule: Age before shape
  type: grammatical
  examples:
  - an old round table
  - a new square box
  - a young slender model
- rule: Shape before colour
  type: grammatical
  examples:
  - a round red ball
  - a flat blue screen
  - a long black dress
- rule: Colour before origin
  type: grammatical
  examples:
  - a red Italian sports car
  - a blue Japanese motorbike
  - a green Egyptian cotton shirt
- rule: Origin before material
  type: grammatical
  examples:
  - a French silk scarf
  - a Brazilian leather bag
  - a Chinese porcelain vase
- rule: Material before purpose
  type: grammatical
  examples:
  - a wooden cooking spoon
  - a plastic gardening pot
  - a stainless steel frying pan
- rule: Maximum of three adjectives is most natural
  type: pragmatic
  examples:
  - a beautiful old house (3 is natural)
  - a beautiful large old round red Italian wooden dining table (grammatically correct
    but unwieldy in speech)
use:
- name: Describing objects and products
  description: Used when giving detailed descriptions of items, especially in shopping,
    catalogues, and reviews.
  examples:
  - She bought a beautiful small silver Swiss watch.
  - He drives a fast new black German car.
  - I'd like a large round wooden dining table.
  key_point: Essential for natural-sounding descriptions in both speech and writing.
- name: Writing and storytelling
  description: Used in creative writing, travel writing, and journalism to create
    vivid descriptions.
  examples:
  - They lived in a charming little old stone cottage.
  - The museum displayed a rare ancient Egyptian gold necklace.
  - We sat at a long white marble bar.
  key_point: Good adjective ordering makes writing sound fluent and native-like.
- name: Identifying people
  description: Used when describing someone's appearance to help identify them.
  examples:
  - I saw a tall young blonde woman.
  - He's a short middle-aged bald man.
  - She was carrying a small brown leather handbag.
  key_point: Common in police descriptions, lost-person reports, and everyday conversation.
phonetics:
- note: 'When multiple adjectives precede a noun, stress typically falls on the noun
    and the first (opinion) adjective: ''a BEAUTIFUL BIG house''. Later adjectives
    receive progressively less stress.'
  example_generator:
    contexts:
    - natural conversation
    - descriptions
  l1_issue: Speakers of languages where adjectives follow the noun (e.g., Spanish,
    Arabic, French) may struggle with both the order and the pre-noun placement.
teaching:
  methodology: Mnemonic-based explicit instruction with practice
  recommended_activities:
  - name: OSASCOMP mnemonic
    duration: 10
    adaptation_notes: 'Teach the mnemonic: Opinion, Size, Age, Shape, Colour, Origin,
      Material, Purpose. Have students memorise it and apply it to example sentences.'
  - name: Adjective ordering game
    duration: 15
    adaptation_notes: Give students sets of jumbled adjectives and a noun. They must
      arrange them in the correct order. Works well as a team competition.
  - name: Picture description
    duration: 15
    adaptation_notes: Show pictures of objects and have students describe them using
      at least three adjectives in the correct order. Peer correction encouraged.
  - name: Error correction
    duration: 10
    adaptation_notes: Provide sentences with incorrect adjective order and have students
      identify and correct them. Good for individual or pair work.
  tips:
  - Teach the OSASCOMP mnemonic (Opinion, Size, Age, Shape, Colour, Origin, Material,
    Purpose) as a memory aid.
  - Point out that native speakers follow this order intuitively but cannot always
    explain why.
  - Limit practice to 2-3 adjectives at a time; more than three sounds unnatural in
    most contexts.
  - Contrast with the student's L1 adjective order to raise awareness of differences.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for adjective_order.
  correction: Correct form.
  explanation: This is a common error for adjective_order.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
