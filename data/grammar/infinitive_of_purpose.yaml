grammar_point: infinitive_of_purpose
title: "Infinitive of Purpose (to + verb for why)"
description: "Uses 'to + infinitive' to explain WHY someone does something. Answers the question 'What for?' or 'Why?'"
level: B1

meaning:
  core_meaning: "Explains the reason or goal behind an action. The infinitive tells you the purpose."
  timeline: "The purpose comes after the action in the sentence, but logically it exists before (it's the reason you do the action)."
  contrast: "'I went to the store to buy milk.' = purpose (why I went).\n\n'I went to the store and bought milk.' = sequence of actions (no purpose, just what happened).\n\n"
  ccqs:
    - question: "Does 'to + verb' explain why someone does something?"
      answer: "Yes — it shows the purpose or reason."
    - question: "Can we answer 'Why did you go?' with 'To buy milk'?"
      answer: "Yes — 'to + verb' can stand alone as a short answer about purpose."
    - question: "Is 'I went to the store to buy milk' the same as 'I went to the store for buy milk'?"
      answer: "No — 'for' must be followed by a noun (for milk), not a verb. Use 'to + verb' for purpose with a verb."
    - question: "Does the subject of the main clause and the infinitive have to be the same person?"
      answer: "Yes — 'I went to buy milk' means I buy the milk. For different subjects, use 'for + person + to'."
  example_generator:
    contexts: ["everyday situations", "shopping and commerce", "social interactions", "work and professional life"]
    cultural_notes: ["One of the first ways learners express purpose in English — simpler than 'so that' or 'in order to'", "Common in instructions, recipes, and directions"]
    min_examples: 5

form:
  affirmative:
    structure: "Main clause + to + V1 (infinitive of purpose).\n\nCan also use 'in order to' (more formal) or 'so as to' (more formal).\n\n"
    example_generator:
      contexts: ["shopping and commerce", "social interactions", "work and professional life"]
      min_examples: 4
  negative:
    structure: "Use 'in order not to' or 'so as not to' for negative purpose."
    example_generator:
      contexts: ["everyday situations", "negation"]
      min_examples: 4
  questions:
    structure: "Questions about purpose use 'Why...?' or 'What...for?'"
    example_generator:
      contexts: ["shopping and commerce", "social interactions"]
      min_examples: 4

sub_rules:
  - rule: "The subject of the main clause and the infinitive must be the same person"
    type: grammatical
    examples: ["I went to the shop to buy bread. (I buy — same subject)", "I went to the shop for my wife to buy bread. (different subjects — use 'for + person + to')"]
  - rule: "'In order to' and 'so as to' are more formal alternatives to 'to'"
    type: register
    examples: ["She studied hard in order to pass the exam. (formal)", "She studied hard to pass the exam. (neutral)"]
  - rule: "Negative purpose uses 'in order not to' or 'so as not to' — not 'to not'"
    type: grammatical
    examples: ["He left early so as not to miss the train. (correct)", "He left early to not miss the train. (less formal, sometimes considered incorrect)"]
  - rule: "Short answers can use just 'to + verb'"
    type: grammatical
    examples: ["Why are you here? — To learn English.", "What's this for? — To open jars."]
  - rule: "'For + noun' can also express purpose but cannot take a verb"
    type: grammatical
    examples: ["I went to the shop for milk. (for + noun)", "I went to the shop to buy milk. (to + verb)"]

use:
  - name: Explaining Why You Do Something
    description: "The most common use — giving the reason for an action."
    examples:
      - "I go to the gym to stay healthy."
      - "She took a taxi to save time."
      - "We moved to London to find a better job."
    key_point: "The subject of the main clause and the infinitive must be the same person."
  - name: Answering 'Why?' Questions
    description: "Short answers using just the infinitive."
    examples:
      - "Why are you here? — To learn English."
      - "Why did he quit? — To spend more time with his family."
    key_point: "In short answers, 'to + verb' replaces a full clause."
  - name: Formal Purpose (in order to / so as to)
    description: "More formal alternatives to 'to + verb'."
    examples:
      - "The company invested in technology in order to improve efficiency."
      - "He left early so as not to miss his flight."
    key_point: "'In order to' and 'so as to' are more formal but mean the same as 'to'."

phonetics:
  - note: "The 'to' in infinitive of purpose is often reduced to /tə/ in connected speech"
    example_generator:
      contexts: ["connected speech"]
    l1_issue: "Learners may over-pronounce 'to' as /tuː/ in all positions, sounding unnatural in fluent speech."
  - note: "Stress falls on the main verb of purpose, not on 'to': I went to the shop to BUY milk."
    example_generator:
      contexts: ["sentence stress"]
    l1_issue: "Equal stress on all words makes the purpose less clear to listeners."

teaching:
  methodology: "PPP"
  tips:
    - "Ask students 'Why do you...?' questions and have them answer with 'to + verb'."
    - "Contrast purpose vs function: 'I use a pen to write' (purpose) vs 'A pen is for writing' (function)."
    - "Practice the 'for + person + to' structure: 'I made lunch for my kids to eat at school.'"
    - "Use real-life scenarios: Why do you study English? Why do you go to the gym?"
  recommended_activities:
    - name: "Why Chain"
      duration: 10
      adaptation_notes: "Students ask each other 'Why...?' questions and must answer with 'to + verb'. Chain continues with follow-up questions."
    - name: "Purpose or Sequence?"
      duration: 10
      adaptation_notes: "Students are given sentences and must identify whether 'to + verb' shows purpose or sequence."
    - name: "Daily Routine Interview"
      duration: 15
      adaptation_notes: "Students interview a partner about their daily routine, asking 'Why do you...?' and recording answers with infinitives of purpose."
