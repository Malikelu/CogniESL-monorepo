grammar_point: collocations
title: Collocations (Natural Word Combinations)
description: Words that naturally go together in English, forming fixed or semi-fixed
  combinations that sound natural to native speakers (e.g., 'make a decision' not
  'do a decision').
level: B1
meaning:
  core_meaning: Fixed or semi-fixed word combinations that are natural in English,
    not determined by grammar rules but by common usage.
  timeline: N/A (Collocations are not tense-based; they apply to all tenses and word
    forms.)
  contrast: '''Correct collocation'' = Natural: "make a decision"

    ''Incorrect literal translation'' = Unnatural: "do a decision"

    ''Strong collocation'' = Fixed: "fast food" (never "quick food")

    ''Weak collocation'' = Flexible: "big house" (also "large house")

    '
  ccqs:
  - question: Do we say 'make a decision' or 'do a decision'?
    answer: '''Make a decision'' is the correct collocation in English.'
    purpose: Tests whether the learner understands that collocations are fixed word
      combinations that cannot be predicted from individual word meanings. 'Make a
      decision' is correct; 'do a decision' sounds unnatural to native speakers even
      though 'do' and 'make' are similar verbs.
  - question: '''Heavy rain'' and ''strong rain'' — which sounds natural to a native
      speaker?'
    answer: '''Heavy rain''. ''Strong rain'' is a literal translation that sounds
      unnatural.'
    purpose: Tests whether the learner knows which words naturally combine in English.
      Collocations are arbitrary and must be learned as fixed chunks rather than translated
      from L1.
  - question: Can we say 'fast food' or 'quick food'?
    answer: '''Fast food'' is the fixed collocation. ''Quick food'' sounds unnatural.'
    purpose: Tests whether the learner understands the difference between present
      ability (can) and past ability or polite possibility (could). This is important
      for expressing ability and making requests.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Verb + Noun: "make a mistake", "take a photo", "do homework"

      Adjective + Noun: "heavy rain", "strong coffee", "bright idea"

      Adverb + Adjective: "deeply sorry", "highly likely", "completely wrong"

      Noun + Noun: "bus stop", "credit card", "weather forecast"

      '
    example_generator:
      contexts:
      - food and daily routines
      - weather and nature
      - social interactions
      min_examples: 4
  negative:
    structure: 'Collocations are negated by negating the verb or adjective: ''She
      didn''t make a mistake.'' ''It''s not heavy rain.'''
    example_generator:
      contexts:
      - work and professional life
      - education and school
      min_examples: 4
  questions:
    structure: 'Invert verb for questions: ''Did you make a mistake?'' ''Is it heavy
      rain?'''
    example_generator:
      contexts:
      - weather and nature
      min_examples: 4
sub_rules:
- rule: Collocations are words that naturally go together in English. Using the wrong
    collocation sounds unnatural even if the grammar is correct
  type: lexical
  examples:
  - make a decision (NOT do a decision)
  - take a photo (NOT make a photo)
  - heavy rain (NOT strong rain)
- rule: Verb + noun collocations are the most common type and must be learned as chunks
  type: lexical
  examples:
  - make a mistake
  - take a break
  - do homework
  - pay attention
  - catch a cold
- rule: Adjective + noun collocations often have no logical pattern and must be memorized
  type: lexical
  examples:
  - fast food (NOT quick food)
  - strong coffee (NOT powerful coffee)
  - heavy smoker (NOT big smoker)
use:
- name: Verb-Noun Collocations
  description: Common verb and noun pairings (e.g., do, make, take, have).
  examples:
  - do the dishes
  - make breakfast
  - take a break
  - have a shower
  key_point: Memorize verb-noun pairs as single units.
- name: Adjective-Noun Collocations
  description: Natural adjective and noun pairings.
  examples:
  - strong tea
  - bitter cold
  - false alarm
  - public transport
  key_point: Avoid literal translations from L1.
- name: Adverb-Adjective Collocations
  description: Natural adverb and adjective pairings.
  examples:
  - utterly exhausted
  - tightly secured
  - well prepared
  - badly damaged
  key_point: These improve fluency and sound more native.
- name: Noun-Noun Collocations
  description: Two nouns combined to form a single concept.
  examples:
  - phone charger
  - bus driver
  - coffee cup
  - history book
  key_point: Often written as single words or hyphenated.
phonetics:
- note: 'Collocations are often pronounced as chunks with connected speech: ''make
    a decision'' → /meɪk ə dɪˈsɪʒən/, ''take a break'' → /teɪk ə breɪk/.'
  example_generator:
    contexts:
    - collocation chunks
  l1_issue: Learners may pronounce each word separately, sounding stilted. Teach collocations
    as single units.
teaching:
  methodology: PPP
  tips:
  - 'Week 1: Verb-noun collocations (do, make, take, have).'
  - 'Week 2: Adjective-noun and adverb-adjective collocations.'
  - 'Week 3: Noun-noun collocations and fluency practice.'
  - 'Use collocation cards: Write verb on one side, noun on the other, match them.'
  recommended_activities:
  - name: Collocation Matching
    duration: 10
    adaptation_notes: 'Students match verbs to their correct nouns: make/do, take/pay,
      etc.'
  - name: Wrong Collocation Hunt
    duration: 15
    adaptation_notes: Give students a text with deliberate collocation errors. Students
      identify and correct them.
  - name: Collocation Diary
    duration: 10
    adaptation_notes: Students keep a diary of new collocations they encounter and
      share with the class.
sources:
  primary: 'Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. Ch. 12:
    Nouns and Determiners, §12.1-12.5'
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: '*make a photo*'
  correction: take a photo
  explanation: Collocations are fixed. We take photos, not make them.
  l1_groups:
  - Portuguese
  - Spanish
  - Chinese
register_notes:
- note: In formal writing, this structure is standard and expected. Register variation
    is marked by vocabulary and style rather than grammatical form.
- note: In formal writing, avoid contractions and use full forms.
- note: In conversation, contractions and reduced forms are common.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: In conversation, this structure is used in everyday communication.
- note: In academic writing, this structure appears in formal contexts and is a marker
    of proficient English.
- note: In professional contexts, correct use of this structure is expected in formal
    writing.
