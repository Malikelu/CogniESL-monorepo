grammar_point: negative_questions
title: Negative Questions (Surprise/Assumption Checking)
description: Questions that start with a negative auxiliary (n't or not) to express
  surprise, check assumptions, or confirm expectations.
level: B1
meaning:
  core_meaning: Expresses surprise at something unexpected, checks an assumption the
    speaker has, or confirms a shared expectation. 'Why don't you X?' is a fixed suggestion
    structure, not a true negative question.
  timeline: Uses the same auxiliary tenses as positive questions (present, past, etc.).
  contrast: 'Positive question: ''Do you like coffee?'' (neutral information)

    Negative question: ''Don''t you like coffee?'' (surprise that you don''t, or assumes
    you do)

    ''Why don''t you X?'' = Suggestion: ''Why don''t you sit down?'' (not a real negative
    question)

    '
  ccqs:
  - question: When do we use negative questions
    answer: To express surprise, make suggestions, or check information.
  - question: How do we answer negative questions
    answer: Answer based on the fact, not the question form.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Yes/No negative questions: Auxiliary + n''t + subject + verb / Auxiliary
      + subject + not + verb (less common)

      Wh- negative questions: Wh-word + auxiliary + n''t + subject + verb

      Auxiliary matches the tense (do/does/did for present/past, is/are/was/were for
      be)

      '
    example_generator:
      contexts:
      - entertainment and media
      - social interactions
      min_examples: 4
  negative:
    structure: 'Double negative is incorrect: ''Don''t you not like coffee?'' is wrong'
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
  questions:
    structure: Same as affirmative, with question mark
    example_generator:
      contexts:
      - everyday situations
      min_examples: 4
sub_rules:
- rule: Negative questions express surprise or disbelief
  type: pragmatic
  examples:
  - Do not you like coffee? (I am surprised you do not)
  - Is she not coming? (I thought she was)
  - Have they not finished yet? (I am surprised)
- rule: Negative questions can make suggestions or invitations
  type: pragmatic
  examples:
  - Will you not sit down? (please sit)
  - Shall we not go out for a change? (suggestion)
  - Do not you want to try some? (invitation)
- rule: Answer negative questions based on the fact, not the question form
  type: pragmatic
  examples:
  - Do not you like coffee? — Yes, I do (I like it) / No, I do not (I do not like
    it)
  - Is she not coming? — Yes, she is (she is coming) / No, she is not (she is not
    coming)
use:
- name: Expressing Surprise
  description: Show surprise that something is not the case.
  examples:
  - Don't you know the answer? (I expected you to know)
  - Haven't you eaten yet? (I thought you had)
  key_point: Implies the speaker thought the opposite was true.
- name: Checking Assumptions
  description: Confirm a belief or assumption the speaker holds.
  examples:
  - Aren't you hungry? (I assume you are)
  - Didn't we meet last year? (I think we did)
  key_point: Seeks confirmation of the speaker's belief.
- name: Suggestion (Why don't you?)
  description: Fixed structure 'Why don't you X?' to make a polite suggestion (not
    a true negative question).
  examples:
  - Why don't you take a break?
  - Why doesn't he call her?
  key_point: This is a set suggestion phrase, not a question about a negative action.
phonetics:
- note: 'Negative questions often have rising intonation when expressing surprise:
    ''Do not you like coffee? ↗'' Falling intonation when expecting agreement: ''Do
    not you like coffee? ↘'''
  example_generator:
    contexts:
    - negative question intonation
  l1_issue: Portuguese and Spanish speakers often use rising intonation for all questions.
    Teach falling intonation for negative questions expecting agreement.
teaching:
  methodology: PPP
  tips:
  - Contrast positive and negative questions with clear examples of speaker expectations.
  - Teach 'Why don't you X?' as a separate suggestion structure early to avoid confusion.
  - 'Practice with role-plays: use negative questions to express surprise politely.'
  recommended_activities:
  - name: Surprise Questions
    duration: 10
    adaptation_notes: 'Teacher makes statements. Students respond with negative questions
      expressing surprise: ''I do not eat meat.'' → ''Do not you eat meat?!'''
  - name: Negative Question Practice
    duration: 15
    adaptation_notes: 'Students practice forming and answering negative questions:
      ''Do not you like...?'' ''Yes, I do.'' / ''No, I do not.'''
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
common_errors:
- error: Common error for negative_questions.
  correction: Correct form.
  explanation: This is a common error for negative_questions.
  l1_groups:
  - Portuguese
  - Spanish
register_notes:
- note: This grammar point is used in both formal and informal contexts.
dialectal_variation:
- note: No significant BrE/AmE differences in the core grammar of this structure.
discourse_notes:
- note: This structure is used in both spoken and written discourse.
