grammar_point: deixis
title: Deixis (Spatial, Temporal, Social)
description: 'Words whose meaning depends entirely on the context of the utterance:
  here/there, now/then, I/you. The same word points to different things depending
  on who speaks, where, and when.'
level: C2
meaning:
  core_meaning: Deictic words 'point to' elements in the context of the utterance
    — they cannot be understood without knowing who is speaking, where they are, and
    when the utterance occurs.
  timeline: Varies — deictic words shift meaning based on the moment of speaking.
    'Now' always means the present moment of the speaker; 'tomorrow' is always the
    day after the utterance.
  contrast: '''The cat is here'' (near me) vs ''The cat is there'' (away from me).
    The physical meaning changes entirely based on the speaker''s location. Unlike
    non-deictic words, deictic words have no fixed reference.'
  ccqs:
  - question: If I say 'here' and you say 'here' from a different room, do we mean
      the same place?
    answer: No — 'here' points to each speaker's location.
  - question: If I say 'tomorrow' on Monday and you say 'tomorrow' on Friday, do we
      mean the same day?
    answer: No — 'tomorrow' is always the day after the utterance.
  - question: Does 'I' always refer to the same person?
    answer: No — 'I' refers to whoever is speaking at that moment.
  example_generator:
    contexts:
    - giving directions
    - telling stories
    - phone conversations
    - written narratives
    - classroom instructions
    cultural_notes:
    - Deixis in written English requires the reader to reconstruct the context
    - Some languages have more complex deictic systems (e.g., three-way spatial distinction)
    - Phone conversations rely heavily on spatial deixis without visual support
    min_examples: 5
form:
  affirmative:
    structure: 'Deictic word placed according to its function: spatial (= this/that,
      here/there), temporal (= now/then, today/yesterday), personal (= I/you, we/they).
      No conjugation changes for deixis itself.'
    example_generator:
      contexts:
      - spatial references
      - temporal references
      - social references
      min_examples: 4
  negative:
    structure: 'Negation applies to the main verb, not the deictic word: ''This is
      not mine'' / ''I do not want that now'' / ''They are not here.'''
    example_generator:
      contexts:
      - rejecting
      - denying
      - correcting
      min_examples: 3
  questions:
    structure: 'Deictic words in questions often involve shifting to the listener''s
      perspective: ''Can you bring that here?'' / ''Will you be there tomorrow?''
      / ''Is this yours?'''
    example_generator:
      contexts:
      - checking location
      - confirming time
      - asking about ownership
      min_examples: 3
sub_rules:
- rule: Spatial deixis — pointing to physical location relative to the speaker
  type: grammatical
  examples:
  - This book (near me) is interesting.
  - That book (away from mine) is yours.
  - Come here (towards me).
  - Go there (away from me).
  - Bring it here (to my location).
- rule: Temporal deixis — pointing to time relative to the moment of speaking
  type: grammatical
  examples:
  - I am busy now (at this moment).
  - I will do it later (after now).
  - We met then (at that past time).
  - See you this Friday (the Friday of this week).
- rule: Social (person) deixis — pointing to participants in the conversation
  type: grammatical
  examples:
  - I will help you (speaker = I, listener = you).
  - We should discuss it (speaker + others).
  - They do not know (third parties, not present).
- rule: Discourse deixis — pointing to parts of the text or conversation itself
  type: grammatical
  examples:
  - This is important (what I am about to say).
  - That was a good point (what you just said).
  - As mentioned above (earlier in the text).
use:
- context: Giving directions
  description: Spatial deixis is essential when guiding someone through physical space.
  examples:
  - Turn left here. The shop is just there.
  - Come this way. Do not go that way.
- context: Narrating past events
  description: Temporal deixis shifts in narratives — 'now' refers to the story's
    present, not the real present.
  examples:
  - He walked into the room. Now he could see everything clearly.
  - At that moment, she realised the truth.
- context: Written vs spoken English
  description: In writing, deictic words require the reader to mentally reconstruct
    the context. In speech, context is shared.
  examples:
  - As mentioned above (written) vs As I just said (spoken)
  - See the diagram below (written) vs Look at this (spoken)
phonetics:
- note: Spatial deictic words are often accompanied by gestures in speech (pointing,
    nodding towards a location).
  example_generator:
    contexts:
    - face-to-face communication
  l1_issue: Learners whose L1 has fewer deictic distinctions (e.g., one word for this/that)
    may under-use English spatial deixis or confuse here/there.
- note: 'Temporal deictic words are unstressed in natural speech unless contrasted:
    ''I said THEN, not now.'''
  example_generator:
    contexts:
    - emphasis and contrast
  l1_issue: Some L1 speakers may over-use explicit time phrases (at 3pm on Monday)
    where native speakers would use deixis (then, that day).
teaching:
  methodology: Guided discovery
  tips:
  - 'Use physical objects in the classroom to demonstrate spatial deixis: hold up
    a pen and say ''this'', point to a pen on a student''s desk and say ''that''.'
  - Role-play phone conversations where visual context is absent — students must use
    deixis without pointing.
  - Compare deictic systems across languages to raise awareness of differences.
  - 'Use classroom timeline activities for temporal deixis: ''now'', ''yesterday'',
    ''next week''.'
  - 'Show how deixis shifts in reported speech: ''here'' becomes ''there'', ''now''
    becomes ''then''.'
  recommended_activities:
  - name: Classroom Treasure Hunt
    duration: 15
    adaptation_notes: Hide objects around the room. Students give directions using
      spatial deixis (here/there/this/that). Works well for A1-B1 levels.
  - name: Deixis Transformation
    duration: 10
    adaptation_notes: Students rewrite a passage converting direct speech to reported
      speech, changing all deictic references (I→he/she, here→there, now→then, etc.).
  - name: Point and Say
    duration: 5
    adaptation_notes: 'Quick-fire activity: teacher points to objects/times/people
      and students produce correct deictic expression. Great warm-up.'
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
