grammar_point: adverbs_manner
title: Adverbs of Manner
description: 'Words that tell us how something is done: quickly, slowly, carefully,
  well, badly, quietly, loudly.'
level: A1
meaning:
  core_meaning: Adverbs of manner describe HOW an action is performed. They usually
    go after the verb.
  timeline: Timeless — describes the manner of an action in any tense.
  contrast: '''Adverb of manner'' = ''She sings beautifully.'' (how?) vs ''Adverb
    of frequency'' = ''She always sings.'' (how often?)'
  ccqs:
  - question: Does this word tell us HOW something is done?
    answer: Yes — it describes the manner of the action.
  - question: Does it go after the verb?
    answer: Yes — adverbs of manner usually go after the main verb or at the end of
      the sentence.
  example_generator:
    contexts:
    - describing actions
    - giving instructions
    - telling stories
    - describing people's behavior
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: 'Subject + verb + adverb: ''She sings beautifully.'', ''He drives carefully.'''
    example_generator:
      contexts:
      - describing actions
      - giving instructions
      - telling stories
      min_examples: 4
  negative:
    structure: 'Subject + verb + adverb (same position): ''She doesn''t sing beautifully.'''
    example_generator:
      contexts:
      - describing actions
      - giving instructions
      - telling stories
      min_examples: 4
  questions:
    structure: 'How + do/does + subject + verb?: ''How does she sing?'' → ''Beautifully.'''
    example_generator:
      contexts:
      - describing actions
      - giving instructions
      - telling stories
      min_examples: 4
sub_rules:
- rule: 'Most adverbs of manner: adjective + -ly'
  type: spelling
  examples:
  - quick → quickly
  - careful → carefully
  - quiet → quietly
- rule: 'Irregular: good → well, fast → fast, hard → hard'
  type: irregular
  examples:
  - She sings well. (not goodly)
  - He runs fast. (not fastly)
- rule: 'Position: after the verb or at the end of the sentence'
  type: word_order
  examples:
  - She speaks English fluently.
  - He drove carefully.
use:
- context: Describing how people do things
  description: Talking about the quality of actions
  examples:
  - She speaks English very well.
  - He drives too fast.
- context: Giving instructions
  description: Telling someone how to do something
  examples:
  - Listen carefully.
  - Speak slowly and clearly.
phonetics:
- note: -ly ending pronounced as /li/
  contexts:
  - pronunciation
  l1_issue: Some L1 speakers omit the -ly ending
  example_generator:
    contexts:
    - connected speech
teaching:
  methodology: PPP
  tips:
  - Use actions and demonstrations
  - Contrast adjective vs adverb (quick vs quickly)
  recommended_activities:
  - name: Act and Describe
    duration: 10
    adaptation_notes: Students act out actions, others describe using adverbs.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
