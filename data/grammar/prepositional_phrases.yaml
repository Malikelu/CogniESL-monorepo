grammar_point: prepositional_phrases
title: Complex Prepositional Phrases (Multi-word Prepositions and Extended Phrases)
description: Multi-word prepositions and complex prepositional phrases that express
  relationships of time, place, cause, manner, and other semantic roles in formal
  and informal English.
level: B2
meaning:
  core_meaning: Prepositional phrases consist of a preposition (simple or complex)
    followed by a noun phrase. Complex prepositions are multi-word units that function
    as a single preposition (e.g., 'in spite of,' 'with regard to,' 'by means of').
    They express more precise relationships than simple prepositions alone.
  timeline: Timeless — prepositional phrases are not tied to any tense.
  contrast: 'Simple preposition: ''because of the rain'' vs Complex preposition: ''on
    account of the rain.'' Simple: ''about the problem'' vs Complex: ''with regard
    to the problem.'' Complex prepositions are generally more formal.'
  ccqs:
  - question: Is 'in spite of' one preposition or three separate words?
    answer: It functions as a single complex preposition — it has one meaning (despite)
      and cannot be broken apart.
  - question: Can we replace 'with regard to' with 'about'?
    answer: In most cases, yes, but 'with regard to' is more formal and precise. 'About'
      can be vaguer.
  - question: What is the difference between 'in front of' and 'in the front of'?
    answer: '''In front of'' means outside and before something (in front of the house
      = on the street). ''In the front of'' means inside the front part (in the front
      of the house = in the front room).'
  example_generator:
    contexts:
    - formal writing
    - academic essays
    - business communication
    - legal documents
    - everyday conversation
    cultural_notes:
    - Complex prepositions are far more common in formal British English than in casual
      American English, where simpler alternatives are preferred.
    - 'Legal and bureaucratic English relies heavily on complex prepositions: ''in
      accordance with,'' ''in the event of,'' ''subject to.'''
    min_examples: 5
form:
  affirmative:
    structure: Preposition (simple or complex) + Noun Phrase. Complex prepositions
      can be two words (in spite of, due to, apart from) or three+ words (in addition
      to, with regard to, by means of, in the event of). The noun phrase may include
      its own determiners and modifiers.
    example_generator:
      contexts:
      - formal writing
      - academic essays
      - business communication
      min_examples: 4
  negative:
    structure: 'Negation within a prepositional phrase typically involves ''no'' or
      ''not'' in the noun phrase: ''in the absence of any evidence,'' ''with no regard
      for safety,'' ''without consideration of the consequences.'''
    example_generator:
      contexts:
      - formal negation
      - legal language
      - academic writing
      min_examples: 3
  questions:
    structure: 'Prepositional phrases in questions often use fronted prepositions
      (formal) or stranded prepositions (informal): ''With regard to what are you
      writing?'' (formal) vs ''What are you writing with regard to?'' (less common).
      More naturally: ''What are you writing about?'''
    example_generator:
      contexts:
      - formal enquiries
      - academic discussion
      - business meetings
      min_examples: 3
sub_rules:
- rule: Complex prepositions of cause and reason (due to, owing to, because of, on
    account of, thanks to)
  type: grammatical
  examples:
  - The flight was delayed due to fog.
  - Owing to unforeseen circumstances, the event has been cancelled.
  - Thanks to her hard work, the project was a success.
  - On account of the strike, all trains have been cancelled.
- rule: Complex prepositions of contrast and concession (in spite of, despite, regardless
    of, notwithstanding)
  type: grammatical
  examples:
  - In spite of the heavy rain, the match went ahead.
  - Despite having no experience, she got the job.
  - Regardless of the cost, we must proceed.
  - Notwithstanding the objections, the plan was approved.
- rule: Complex prepositions of reference and addition (with regard to, with respect
    to, in addition to, as for, as regards)
  type: grammatical
  examples:
  - With regard to your enquiry, we are unable to help at this time.
  - In addition to English, she speaks Mandarin and Arabic.
  - As for the budget, that has already been approved.
  - As regards your second point, I disagree entirely.
- rule: Complex prepositions of means and instrument (by means of, by way of, by virtue
    of, in terms of)
  type: grammatical
  examples:
  - The data was collected by means of a questionnaire.
  - By way of introduction, let me outline the main issues.
  - She succeeded by virtue of her determination.
  - In terms of value for money, this is the best option.
- rule: Complex prepositions of condition and exception (in case of, in the event
    of, subject to, but for, apart from, except for)
  type: grammatical
  examples:
  - In case of fire, break the glass.
  - In the event of a tie, a penalty shootout will decide the winner.
  - This offer is subject to availability.
  - But for your help, I would have failed.
  - Apart from the weather, everything was perfect.
use:
- context: Formal and academic writing
  description: Complex prepositions are essential for precise, formal expression in
    essays, reports, and research papers.
  examples:
  - In terms of methodology, the study has several limitations.
  - With regard to the findings, further research is needed.
  - In addition to the primary data, supplementary interviews were conducted.
- context: Business and professional communication
  description: Business emails and reports use complex prepositions for clarity and
    formality.
  examples:
  - With respect to your proposal, we have the following comments.
  - In the event of a delay, please notify the client immediately.
  - Subject to board approval, the merger will proceed in June.
- context: Legal and official documents
  description: Legal language relies on complex prepositions for precision and unambiguity.
  examples:
  - In accordance with Section 3 of the Act, all applicants must provide identification.
  - The tenant shall not, without the prior written consent of the landlord, make
    alterations.
  - In the event of breach, the injured party is entitled to compensation.
- context: Everyday conversation (simpler complex prepositions)
  description: 'Some complex prepositions are common in spoken English: ''because
    of,'' ''instead of,'' ''in front of,'' ''out of.'''
  examples:
  - We stayed in because of the rain.
  - She ordered tea instead of coffee.
  - He parked in front of the building.
- context: Expressing nuanced relationships
  description: Complex prepositions allow speakers to express subtle distinctions
    that simple prepositions cannot.
  examples:
  - Regardless of what anyone says, I believe you.
  - By virtue of his position, he had access to classified information.
  - Thanks to modern technology, we can work from anywhere.
phonetics:
- note: 'In complex prepositions, stress typically falls on the content word within
    the phrase, not the function words: ''in spite of'' (stress on ''spite''), ''with
    regard to'' (stress on ''gard''), ''by means of'' (stress on ''means'').'
  example_generator:
    contexts:
    - spoken English
    - formal presentations
  l1_issue: Learners may give equal stress to all words in a complex preposition,
    making speech sound unnatural and difficult to follow.
- note: 'In connected speech, complex prepositions often reduce: ''because of'' becomes
    /bɪˈkɒzəv/ or even /bɪˈkɒz/; ''in front of'' may reduce to /ɪn ˈfrʌntəv/.'
  example_generator:
    contexts:
    - casual speech
    - connected speech
  l1_issue: Learners who pronounce every word fully and separately may sound overly
    formal or stilted in casual conversation.
teaching:
  methodology: PPP (Presentation, Practice, Production) — present complex prepositions
    grouped by function, then practise with gap-fills and matching, then produce in
    writing tasks.
  tips:
  - Group complex prepositions by function (cause, contrast, reference, means, condition)
    to make them easier to learn.
  - 'Teach the formality spectrum: ''because of'' (neutral) -> ''due to'' (formal)
    -> ''owing to'' (very formal) -> ''on account of'' (most formal).'
  - 'Highlight common errors: ''*despite of'' (incorrect — ''despite'' stands alone),
    ''*in despite of'' (archaic).'
  - 'Use substitution exercises: replace simple prepositions with complex ones to
    upgrade register.'
  - Provide authentic texts (news articles, business emails) and have learners identify
    complex prepositions.
  - Warn learners not to overuse complex prepositions in casual speech — it can sound
    pompous.
  recommended_activities:
  - name: Complex Preposition Matching
    duration: 15
    adaptation_notes: 'Give learners two lists: simple meanings and complex prepositions.
      They match ''despite'' to ''in spite of,'' ''about'' to ''with regard to,''
      etc.'
  - name: Register Upgrade
    duration: 20
    adaptation_notes: 'Give learners informal sentences using simple prepositions.
      They rewrite them for a formal context using complex prepositions: ''Because
      of the rain...'' -> ''Owing to the inclement weather...'''
  - name: Gap-fill with Complex Prepositions
    duration: 15
    adaptation_notes: Provide a text with gaps where complex prepositions should go.
      Learners choose from a bank, considering meaning and register.
  - name: Preposition Error Hunt
    duration: 10
    adaptation_notes: Display sentences with common errors ('despite of,' 'in spite,'
      'regardless to'). Learners identify and correct each error.
sources:
  primary: Celce-Murcia & Larsen-Freeman (2015) The Grammar Book, 3rd ed. National
    Geographic Learning/Cengage.
  secondary: Huddleston & Pullum (2002) The Cambridge Grammar of the English Language.
    Cambridge University Press.
  validation: Swan (2016) Practical English Usage, 4th ed. Oxford University Press.
  pedagogical: Parrott (2010) Grammar for English Language Teachers, 2nd ed. Cambridge
    University Press.
  teaching_practice: Folse (2009) Keys to Teaching Grammar to English Language Learners.
    University of Michigan Press.
