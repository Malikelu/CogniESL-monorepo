grammar_point: should_shouldnt
title: Should / Shouldn't (advice, recommendations, expectations)
description: Modal verbs used to give advice, make recommendations, and talk about
  what is the right or sensible thing to do.
level: A2
meaning:
  core_meaning: Expresses advice, recommendations, or what is the correct/sensible
    action in a situation.
  timeline: Refers to present or future actions; used for general advice or specific
    situations.
  contrast: 'Should = Advice/recommendation: "You should see a doctor" (suggestion)

    Must = Obligation/rule: "You must wear a seatbelt" (rule)

    Ought to = Similar to should, more formal: "You ought to apologize" (formal)

    '
  ccqs:
  - question: Is should stronger or weaker than must
    answer: Weaker. Should is advice. Must is obligation.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: Subject + should + base verb
    example_generator:
      contexts:
      - education and school
      - food and daily routines
      min_examples: 4
  negative:
    structure: Subject + shouldn't (should not) + base verb
    example_generator:
      contexts:
      - food and daily routines
      min_examples: 4
  questions:
    structure: Should + subject + base verb?
    example_generator:
      contexts:
      - health and wellbeing
      - social interactions
      min_examples: 4
sub_rules:
- rule: Should for advice and recommendations
  type: semantic
  examples:
  - You should study more
  - She should see a doctor
  - We should leave early
- rule: Should not for negative advice
  type: semantic
  examples:
  - You should not eat so much sugar
  - She should not work so hard
  - We should not waste time
- rule: Should for expectations
  type: semantic
  examples:
  - The train should arrive at 8pm
  - He should be there by now
  - It should be easy
use:
- name: Giving Advice
  description: Suggest what someone ought to do in a situation.
  examples:
  - If you're tired, you should go to bed early.
  - You should try the new Italian restaurant.
  key_point: Advice is subjective; the speaker thinks it's a good idea.
- name: Making Recommendations
  description: Recommend actions or choices to others.
  examples:
  - We should buy the blue one; it's cheaper.
  - You should visit Paris in spring.
  key_point: Recommendations are based on the speaker's opinion or experience.
- name: Expectations
  description: Talk about what is likely or expected to happen.
  examples:
  - The train should arrive at 5 PM.
  - He should be here soon.
  key_point: Expectation is based on probability, not certainty.
phonetics:
- note: 'Should is often weak: /ʃəd/ or even /ʃd/. ''You should study'' → /juː ʃəd
    ˈstʌdi/. Should not → /ˈʃʊdənt/.'
  example_generator:
    contexts:
    - should pronunciation
  l1_issue: Portuguese speakers may pronounce 'should' as /ʃaʊld/ or /ʃuːld/. Teach
    the correct pronunciation /ʃʊd/.
teaching:
  methodology: PPP
  tips:
  - 'Use real class scenarios: ''I have a headache'' → ''You should take medicine''.'
  - 'Role-play: Student A has a problem, Student B gives advice using ''should''.'
  - 'Contrast with ''must'' using rules vs advice: ''You must stop at red lights''
    (rule) vs ''You should stop for pedestrians'' (advice).'
  - Practice with health, travel, and study scenarios.
  recommended_activities:
  - name: Advice Column
    duration: 15
    adaptation_notes: 'Students write problem letters. Others respond with advice
      using should: ''You should talk to your teacher.'' ''You should not worry so
      much.'''
  - name: Should or Must
    duration: 10
    adaptation_notes: 'Students choose: ''You ___ wear a seatbelt'' (must — law) vs
      ''You ___ exercise more'' (should — advice).'
