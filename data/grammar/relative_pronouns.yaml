grammar_point: relative_pronouns
title: Relative Pronouns (Who/Which/That/Whose/Where/When)
description: Words that connect a relative clause to a noun, giving more information
  about the noun (person, thing, place, time, possession).
level: B1
meaning:
  core_meaning: Connects a relative clause to a noun to add essential (defining) or
    extra (non-defining) information about the noun.
  timeline: Verb tense in the relative clause matches the time of the action described.
  contrast: 'Defining: ''The book that I bought is good.'' (essential: which book?
    The one I bought)

    Non-defining: ''My book, which I bought yesterday, is good.'' (extra: I have one
    book, here''s more info)

    ''That'' is only used in defining clauses; ''which'' can be used in both defining
    and non-defining.

    '
  ccqs:
  - question: When do we use who and when do we use which
    answer: Who for people. Which for things. That for both in defining clauses.
  example_generator:
    contexts:
    - everyday situations
    cultural_notes: []
    min_examples: 5
form:
  affirmative:
    structure: "Defining relative clauses (essential info, no commas): Noun + relative\
      \ pronoun + clause\nNon-defining relative clauses (extra info, commas): Noun\
      \ + , + relative pronoun + clause + ,\nPronoun rules:\n  Who/whom = People (who\
      \ = subject, whom = object, formal)\n  Which = Things\n  That = People or things\
      \ (defining clauses only)\n  Whose = Possession (people or things)\n  Where\
      \ = Places\n  When = Times\n"
    example_generator:
      contexts:
      - education and school
      - family and relationships
      - health and wellbeing
      min_examples: 4
  negative:
    structure: Noun + relative pronoun + negative clause
    example_generator:
      contexts:
      - entertainment and media
      - shopping and commerce
      min_examples: 4
  questions:
    structure: Same as affirmative, with question mark if the whole sentence is a
      question
    example_generator:
      contexts:
      - social interactions
      min_examples: 4
sub_rules:
- rule: Who for people, which for things, that for both (defining only)
  type: grammatical
  examples:
  - The man who called is my friend
  - The book which I read was interesting
  - The man that called is my friend
- rule: Whose for possession (people and things)
  type: grammatical
  examples:
  - The woman whose car was stolen called the police
  - The house whose roof was damaged needs repairs
- rule: Where for places, when for times
  type: grammatical
  examples:
  - The restaurant where we had dinner was excellent
  - I remember the day when we first met
- rule: Relative pronoun can be omitted when it is the object of the clause
  type: grammatical
  examples:
  - The book (that) I read was interesting
  - The man (who) I met was friendly
use:
- name: Defining Relative Clauses
  description: Give essential information to identify the noun (no commas, 'that'
    allowed).
  examples:
  - The woman who called you is my boss.
  - The car that I rented broke down.
  key_point: 'Omit the relative pronoun if it is the object: ''The car I rented broke
    down'' (correct).'
- name: Non-Defining Relative Clauses
  description: Give extra, non-essential information (commas required, no 'that').
  examples:
  - My car, which I rented yesterday, broke down.
  - Paris, where I lived for 2 years, is beautiful.
  key_point: Cannot omit the relative pronoun in non-defining clauses.
- name: Possession, Place, Time
  description: Use whose (possession), where (place), when (time) to connect clauses.
  examples:
  - The house where I grew up is for sale.
  - The day when we met was sunny.
  key_point: '''Where'' and ''when'' replace ''in which''/''on which'' in casual speech.'
phonetics:
- note: 'Relative pronouns are usually unstressed: ''The man who called'' → /ðə mæn
    huː kɔːld/. The stress falls on the main clause.'
  example_generator:
    contexts:
    - relative pronoun stress
  l1_issue: Portuguese and Spanish speakers often omit relative pronouns. Teach that
    English requires them.
teaching:
  methodology: PPP
  tips:
  - Start with defining clauses (essential info) before non-defining (extra info).
  - Contrast 'that' (defining only) and 'which' (both) early.
  - 'Practice omitting the pronoun in defining object clauses: ''The man I saw'' instead
    of ''who I saw''.'
  recommended_activities:
  - name: Who Which or That
    duration: 10
    adaptation_notes: 'Students choose the correct relative pronoun: ''The person
      ___ called'' (who/that), ''The book ___ I read'' (which/that).'
  - name: Sentence Combining
    duration: 15
    adaptation_notes: 'Students combine two simple sentences with a relative pronoun:
      ''The man is my friend. He called me.'' → ''The man who called me is my friend.'''
